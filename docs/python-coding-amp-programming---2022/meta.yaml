    \ create something like:\n\nSTEP 9 The result is a string of random numbers followed\
    \ by the value of Pi as pulled from the Math module using the `print(math.pi)`\
    \ function. You can also pull in certain functions from a module by using the\
    \ from and import commands, such as:\n\n```\nfor i in range(10):\n    print(random.randint(1,\
    \ 25))\n```\n\n```\nfrom random import randint\n\nfor i in range(5):\n    print(randint(1,\
    \ 25))\n```\n\n![](img/e4c529ac6a286a7773e0e7c17e263180_54_2.png)\n\n![](img/e4c529ac6a286a7773e0e7c17e263180_54_3.png)\n\
    \nSTEP 7 This code, when saved and executed, will display ten random numbers from\
    \ 1 to 25. You can play around with the code to display more or less, and from\
    \ a great or lesser range. For example:\n\nSTEP 10 This helps create a more streamlined\
    \ approach to programming. You can also use `import module*`, which will import\
    \ everything defined within the named module. However, it's often regarded as\
    \ a waste of resources but it works nonetheless. Finally, modules can be imported\
    \ as aliases:\n\n```\nimport random\n\nfor i in range(25):\n    print(random.randint(1,\
    \ 100))\n```\n\n```\nimport math as m\n\nprint(m.pi)\n```\n\nOf course, adding\
    \ comments helps to tell others what's going on.\n\n![](img/e4c529ac6a286a7773e0e7c17e263180_54_4.png)\n\
    \n![](img/e4c529ac6a286a7773e0e7c17e263180_54_5.png)"
- md: "## Python Errors\n\nIt goes without saying that you'll eventually come across\
    \ an error in your code, where Python declares it's not able to continue due to\
    \ something being missed out, wrong or simply unknown. Being able to identify\
    \ these errors makes for a good programmer.\n\n## DEBUGGING\n\nErrors in code\
    \ are called bugs and are perfectly normal. They can often be easily rectified\
    \ with a little patience. The important thing is to keep looking, experimenting\
    \ and testing. Eventually your code will be bug free.\n\n**STEP 1** Code isn't\
    \ as fluid as the written word, no matter how good the programming language is.\
    \ Python is certainly easier than most languages but even it is prone to some\
    \ annoying bugs. The most common are typos by the user and whilst easy to find\
    \ in simple dozen-line code, imagine having to debug multi-thousand line code.\n\
    \n**STEP 3** Thankfully Python is helpful when it comes to displaying error messages.\
    \ When you receive an error, in red text from the IDLE Shell, it will define the\
    \ error itself along with the line number where the error has occurred. Whilst\
    \ in the IDLE Editor this is a little daunting for lots of code; text editors\
    \ help by including line numbering.\n\n![](img/e4c529ac6a286a7773e0e7c17e263180_55_0.png)\n\
    \n![](img/e4c529ac6a286a7773e0e7c17e263180_55_1.png)\n\n**STEP 2** The most common\
    \ of errors is the typo, as we've mentioned. The typos are often at the command\
    \ level: mistyping the print command for example. However, they also occur when\
    \ you have numerous variables, all of which have lengthy names. The best advice\
    \ is to simply go through the code and check your spelling.\n\n**STEP 4** Syntax\
    \ errors are probably the second most common errors you'll come across as a programmer.\
    \ Even if the spelling is correct, the actual command itself is wrong. In Python\
    \ 3 this often occurs when Python 2 syntaxes are applied. The most annoying of\
    \ these is the print function. In Python 3 we use `print(\"words\")`, whereas\
    \ Python 2 uses `print \"words\"`.\n\n```\nPython 3.4.2 Shell\n>>> apples=10\n\
    >>> print(apples)\n10\n>>> print(apples)\nTraceback (most recent call last):\n\
    \  File \"<pyshell#1>\", line 1, in <module>\n    print(apples)\nNameError: name\
    \ 'apples' is not defined\n>>>\n```\n\n```\nPython 3.4.2 Shell\n>>> print\"Hello\
    \ world!\"\nSyntaxError: invalid syntax\n>>>\n```\n\nSTEP 5 Pesky brackets are\
    \ also a nuisance in programming errors, especially when you have something like:\n\
    `print(balanced_check(input()))`\nRemember that for every '(' there must be an\
    \ equal number of ')'.\n\n```\n1 import sys\n2\n3 def balanced_check(data):\n\
    4     stack = []\n5     characters = list(data)\n6\n7     for character in characters:\n\
    8         reference = {\n9             '(': ')',\n10            '{': '}',\n11\
    \            '[': ']',\n12        }\n13        if character in reference.keys():\n\
    14            stack.append(character)\n15\n16        elif character in reference.values()\
    \ and len(stack) > 0:\n17            char = stack.pop()\n18            if reference.get(char)\
    \ != character:\n19                return \"No\"\n20        else:\n```\n\nSTEP\
    \ 8 An excellent way to check your code step-by-step is to use Python Tutor's\
    \ Visualise web page, found at www.pythontutor.com/visualize.html#mode=edit. Simply\
    \ paste your code into the editor and click the Visualise Execution button to\
    \ run the code line-by-line. This helps to clear bugs and any misunderstandings.\n\
    \n![](img/e4c529ac6a286a7773e0e7c17e263180_56_0.png)\n\nSTEP 6 There are thousands\
    \ of online Python resources, code snippets and lengthy discussions across forums\
    \ on how best to achieve something. Whilst 99 per cent of it is good code, don't\
    \ always be lured into copying and pasting random code into your editor. More\
    \ often than not, it won't work and the worst part is that you haven't learnt\
    \ anything.\n\n```\nYou have a bare except clause, i.e.,\ntry:\n    some_code()\n\
    except:\n    clean_up()\n\nThe problem with a bare except is that it will catch\
    \ all exceptions, including ones you really don't want to be ignoring (like KeyboardInterrupt\
    \ and SystemExit). It would be much better if your except block only caught the\
    \ specific exception you expect, and let all others bubble up as normal.\n\nA\
    \ few other general comments on your code:\n\n• In line 200, you have this construction:\n\
    \nfor letter in range(len(chosen_word)):\n    if player_guess == chosen_word[letter]:\n\
    \        word_guessed[letter] = player_guess\n\nYou're looping over the index\
    \ variable, but also using the list element. It would be better to write:\n\n\
    for idx, letter in enumerate(chosen_word):\n    if player_guess == letter:\n```\n\
    \nSTEP 9 Planning makes for good code. Whilst a little old school, it's a good\
    \ habit to plan what your code will do before sitting down to type it out. List\
    \ the variables that will be used and the modules too; then write out a script\
    \ for any user interaction or outputs.\n\n![](img/e4c529ac6a286a7773e0e7c17e263180_56_1.png)\n\
    \nSTEP 7 Indents are a nasty part of Python programming that a lot of beginners\
    \ fall foul of. Recall the If loop from the Conditions and Loops section, where\
    \ the colon means everything indented following the statement is to be executed\
    \ as long as it's true? Missing the indent, or having too much of indent, will\
    \ come back with an error.\n\n```\nFile Edit Format Run Options Windows Help\n\
    word=input(\"Please enter a four-letter word: \")\nword_length=len(word)\nif word_length\
    \ == 4:\n    print (word, \"is a four-letter word. Well done.\")\nelse:\n    print\
    \ (word, \"is not a four-letter word.\")\n```\n\n![](img/e4c529ac6a286a7773e0e7c17e263180_56_2.png)\n\
    \nSTEP 10 Purely out of interest, the word debugging in computing terms comes\
    \ from Admiral Grace Hopper, who back in the '40s was working on a monolithic\
    \ Harvard Mark II electromechanical computer. According to legend Hopper found\
    \ a moth stuck in a relay, thus stopping the system from working. Removal of the\
    \ moth was hence called debugging.\n\n![](img/e4c529ac6a286a7773e0e7c17e263180_56_3.png)\n\
    \n## Combining What You Know So Far\n\nWe've reached the end of this section so\
    \ let's take a moment to combine everything we've looked at so far, and apply\
    \ it to writing a piece of code. This code can then be used and inserted into\
    \ your own programs in future; either part of it or as a whole.\n\n## PLAYING\
    \ WITH PI\n\nFor this example we're going to create a program that will calculate\
    \ the value of Pi to a set number of decimal places, as described by the user.\
    \ It combines much of what we've learnt, and a little more.\n\n- **STEP 1**\n\
    \  Start by opening Python and creating a New File in the Editor. First we need\
    \ to get hold of an equation that can accurately calculate Pi without rendering\
    \ the computer's CPU useless for several minutes. The recommended calculation\
    \ used in such circumstances is the Chudnovsky Algorithm, you can find more information\
    \ about it at [en.wikipedia.org/wiki/Chudnovsky_algorithm](https://en.wikipedia.org/wiki/Chudnovsky_algorithm).\n\
    - **STEP 2**\n  You can utilise the Chudnovsky Algorithm to create your own Python\
    \ script based on the calculation. Begin by importing some important modules and\
    \ functions within the modules:\n  `from decimal import Decimal, getcontext`\n\
    \  `import math`\n  This uses the decimal and getcontext functions from the Decimal\
    \ module, both of which deal with large decimal place numbers and naturally the\
    \ Math module.\n- **STEP 3**\n  Now you can insert the Pi calculation algorithm\
    \ part of the code. This is a version of the Chudnovsky Algorithm:\n  ```python\n\
    \  def calc(n):\n      t = Decimal(0)\n      pi = Decimal(0)\n      deno = Decimal(0)\n\
    \      k = 0\n      for k in range(n):\n          t = (Decimal(-1)**k)*(math.factorial(Decimal(6)*k))*(13591409\
    \ +545140134*k)\n          deno = math.factorial(3*k)*(math.factorial(k)**Decimal(3))*(640320**(3*k))\n\
    \          pi += Decimal(t)/Decimal(deno)\n      pi = pi * Decimal(12)/Decimal(640320**Decimal(1.5))\n\
    \      pi = 1/pi\n      return str(pi)\n  ```\n- **STEP 4**\n  The previous step\
    \ defines the rules that make up the algorithm and creates the string that will\
    \ eventually display the value of Pi, according the Chudnovsky brothers' algorithm.\
    \ You have no doubt already surmised that it would be handy to actually output\
    \ the value of Pi to the screen. To rectify that you can add:\n  `print(calc(1))`\n\
    - **STEP 5**\n  You can save and execute the code at this point if you like. The\
    \ output will print the value of Pi to 27 decimal places: **3.141592653589734207668453591**.\
    \ Whilst pretty impressive on its own, you want some user interaction, to ask\
    \ the user as to how many places Pi should be calculated.\n- **STEP 6**\n  You\
    \ can insert an input line before the Pi calculation Def command. It needs to\
    \ be an integer, as it will otherwise default to a string. We can call it numberofdigits\
    \ and use the getcontext function:\n  `numberofdigits = int(input(\"please enter\
    \ the number of decimal place to calculate Pi to: \"))`\n  `getcontext().prec\
    \ = numberofdigits`\n\n![](img/e4c529ac6a286a7773e0e7c17e263180_57_0.png)\n\n\
    ![](img/e4c529ac6a286a7773e0e7c17e263180_57_1.png)"
  mdcn: "## Python 错误\n\n不用说，你最终会在代码中遇到错误。Python 会因为某些内容缺失、错误或根本未知而无法继续运行。能够识别这些错误是成为优秀程序员的关键。\n\
    \n## 调试\n\n代码中的错误被称为漏洞，这非常常见。只要有耐心，它们通常很容易修复。重要的是保持探索、实验和测试。最终，你的代码将不再有漏洞。\n\n\
    **步骤 1** 无论编程语言多好，代码都不像文字那样流畅。Python 当然比大多数语言更容易，但它也会产生一些烦人的漏洞。最常见的是用户的拼写错误，虽然在简单的十几行代码中很容易找到，但想象一下要调试成千上万行代码。\n\
    \n**步骤 3** 值得庆幸的是，Python 在显示错误信息方面很有帮助。当你收到一个错误时，IDLE Shell 会以红色文本显示错误本身及其发生的行号。不过，在\
    \ IDLE Editor 中处理大量代码时，这有点令人望而生畏；文本编辑器通过包含行号来提供帮助。\n\n![](img/e4c529ac6a286a7773e0e7c17e263180_55_0.png)\n\
    \n![](img/e4c529ac6a286a7773e0e7c17e263180_55_1.png)\n\n**步骤 2** 正如我们提到的，最常见的错误是拼写错误。拼写错误通常出现在命令层面：例如错误地输入\
    \ print 命令。然而，当变量很多且名称都很长时，它们也会出现。最好的建议就是通读代码，检查你的拼写。\n\n**步骤 4** 语法错误可能是你作为程序员遇到的第二常见错误。即使拼写正确，实际的命令本身也是错的。在\
    \ Python 3 中，当应用了 Python 2 的语法时，这种情况经常发生。其中最烦人的是 print 函数。在 Python 3 中，我们使用 `print(\"\
    words\")`，而 Python 2 使用 `print \"words\"`。\n\n```\nPython 3.4.2 Shell\n>>> apples=10\n\
    >>> print(apples)\n10\n>>> print(apples)\nTraceback (most recent call last):\n\
    \  File \"<pyshell#1>\", line 1, in <module>\n    print(apples)\nNameError: name\
    \ 'apples' is not defined\n>>>\n```\n\n```\nPython 3.4.2 Shell\n>>> print\"Hello\
    \ world!\"\nSyntaxError: invalid syntax\n>>>\n```\n\n**步骤 5** 讨厌的括号也是编程错误的一个麻烦点，特别是当你有这样的情况时：\n\
    `print(balanced_check(input()))`\n请记住，每个左括号 `(` 都必须有对应数量的右括号 `)`。\n\n```\n1 import\
    \ sys\n2\n3 def balanced_check(data):\n4     stack = []\n5     characters = list(data)\n\
    6\n7     for character in characters:\n8         reference = {\n9            \
    \ ': ')',\n10            '{': '}',\n11            '[': ']',\n12        }\n13 \
    \       if character in reference.keys():\n14            stack.append(character)\n\
    15\n16        elif character in reference.values() and len(stack) > 0:\n17   \
    \         char = stack.pop()\n18            if reference.get(char) != character:\n\
    19                return \"No\"\n20        else:\n```\n\n**步骤 8** 一个逐步检查代码的好方法是使用\
    \ Python Tutor 的可视化网页，在 www.pythontutor.com/visualize.html#mode=edit 找到它。只需将你的代码粘贴到编辑器中，然后单击“Visualise\
    \ Execution”按钮，即可逐行运行代码。这有助于清除漏洞和任何误解。\n\n![](img/e4c529ac6a286a7773e0e7c17e263180_56_0.png)\n\
    \n**步骤 6** 有成千上万的在线 Python 资源、代码片段以及论坛上关于如何最好地实现某个功能的冗长讨论。虽然 99% 的代码是好的，但不要总是被诱惑去复制粘贴随机代码到你的编辑器中。往往它并不能运行，最糟糕的是你什么都没学到。\n\
    \n```\n你有一个裸的 except 子句，即：\ntry:\n    some_code()\nexcept:\n    clean_up()\n\n\
    裸的 except 问题在于它会捕获所有异常，包括那些你确实不想忽略的异常（如 KeyboardInterrupt 和 SystemExit）。如果你的 except\
    \ 块只捕获你预期的特定异常，并让其他所有异常正常向上冒泡，那将好得多。\n\n关于你的代码，还有一些其他通用注释：\n\n• 在第 200 行，你有这种构造：\n\
    \nfor letter in range(len(chosen_word)):\n    if player_guess == chosen_word[letter]:\n\
    \        word_guessed[letter] = player_guess\n\n你循环的是索引变量，但也使用了列表元素。最好这样写：\n\n\
    for idx, letter in enumerate(chosen_word):\n    if player_guess == letter:\n```\n\
    \n**步骤 9** 计划成就好的代码。虽然有点老派，但在坐下编写代码之前，规划代码的功能是个好习惯。列出将要使用的变量和模块；然后写出任何用户交互或输出的脚本。\n\
    \n![](img/e4c529ac6a286a7773e0e7c17e263180_56_1.png)\n\n**步骤 7** 缩进是 Python 编程中一个令人头疼的部分，许多初学者都会栽跟头。回想一下“条件与循环”一节中的\
    \ If 循环，其中冒号表示只要条件为真，其后缩进的所有语句都会被执行？缺少缩进或缩进过多都会导致错误。\n\n```\nFile Edit Format\
    \ Run Options Windows Help\nword=input(\"Please enter a four-letter word: \")\n\
    word_length=len(word)\nif word_length == 4:\n    print (word, \"is a four-letter\
    \ word. Well done.\")\nelse:\n    print (word, \"is not a four-letter word.\"\
    )\n```\n\n![](img/e4c529ac6a286a7773e0e7c17e263180_56_2.png)\n\n**步骤 10** 纯粹出于兴趣，计算术语中的“调试”一词源于格蕾丝·霍珀海军上将。早在\
    \ 40 年代，她就在处理一台巨型哈佛 Mark II 机电计算机。根据传说，霍珀发现一只蛾子卡在继电器中，导致系统停止工作。移除这只蛾子因而被称为“调试”。\n\
    \n![](img/e4c529ac6a286a7773e0e7c17e263180_56_3.png)\n\n## 综合运用你所学的知识\n\n我们已经到达本节的结尾，让我们花点时间综合运用目前为止所学的一切，并将其应用于编写一段代码。这段代码可以在未来你自己的程序中使用和插入；可以是其中一部分，也可以是整体。\n\
    \n## 圆周率趣味实践\n\n在这个示例中，我们将创建一个程序，根据用户设置的精度计算圆周率的值。它结合了我们所学的许多内容，以及更多。\n\n- **步骤\
    \ 1**\n  首先打开 Python 并在编辑器中创建一个新文件。首先，我们需要找到一个方程，它能准确计算圆周率而不会让计算机的 CPU 闲置几分钟。在这种情况下，推荐使用的计算是\
    \ Chudnovsky 算法，你可以在 [en.wikipedia.org/wiki/Chudnovsky_algorithm](https://en.wikipedia.org/wiki/Chudnovsky_algorithm)\
    \ 上找到更多信息。\n- **步骤 2**\n  你可以利用 Chudnovsky 算法，基于该计算创建自己的 Python 脚本。首先导入一些重要的模块和函数：\n\
    \  `from decimal import Decimal, getcontext`\n  `import math`\n  这使用了 Decimal\
    \ 模块中的 decimal 和 getcontext 函数，它们都处理大位数的十进制数，当然还有 Math 模块。\n- **步骤 3**\n  现在，你可以插入圆周率计算算法部分的代码。这是\
    \ Chudnovsky 算法的一个版本：\n  ```python\n  def calc(n):\n      t = Decimal(0)\n   \
    \   pi = Decimal(0)\n      deno = Decimal(0)\n      k = 0\n      for k in range(n):\n\
    \          t = (Decimal(-1)**k)*(math.factorial(Decimal(6)*k))*(13591409 +545140134*k)\n\
    \          deno = math.factorial(3*k)*(math.factorial(k)**Decimal(3))*(640320**(3*k))\n\
    \          pi += Decimal(t)/Decimal(deno)\n      pi = pi * Decimal(12)/Decimal(640320**Decimal(1.5))\n\
    \      pi = 1/pi\n      return str(pi)\n  ```\n- **步骤 4**\n  上一步定义了构成算法规则，并创建了最终将根据\
    \ Chudnovsky 兄弟的算法显示圆周率值的字符串。你毫无疑问已经推测出，实际将圆周率值输出到屏幕上会很方便。为了解决这个问题，你可以添加：\n  `print(calc(1))`\n\
    - **步骤 5**\n  如果你愿意，此时可以保存并执行代码。输出将打印出圆周率到 27 位小数的值：**3.141592653589734207668453591**。虽然这本身已经相当令人印象深刻，但你想要一些用户交互，询问用户圆周率应该计算到多少位。\n\
    - **步骤 6**\n  你可以在圆周率计算的定义命令之前插入一个输入行。它需要是一个整数，否则它将默认为一个字符串。我们可以将其称为 numberofdigits，并使用\
    \ getcontext 函数：\n  `numberofdigits = int(input(\"please enter the number of decimal\
    \ place to calculate Pi to: \"))`\n  `getcontext().prec = numberofdigits`\n\n\
    ![](img/e4c529ac6a286a7773e0e7c17e263180_57_0.png)\n\n![](img/e4c529ac6a286a7773e0e7c17e263180_57_1.png)"
