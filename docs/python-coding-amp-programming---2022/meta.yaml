    # Python in Focus: Gaming


    Although not always considered as the ideal programming language for developing
    games, Python has come a long way in recent years and is now one of the contributing
    elements to a huge number of titles.


    The video game industry generates something in the region of $140 billion each
    year, and that number is growing fast. It’s a long way from the 8-bit days of
    the Commodore 64 and ZX Spectrum; the arcade titles that used to devour our pocket
    money and the wood panelled home consoles that Atari lovingly developed. These
    days, it’s all about teams of coders, graphic artists, musicians, PR, projects
    and development platforms.


    # GAME CODE


    Coding a game from scratch, using raw code, has become something of the past.
    Most games these days are created using a range of development tools. These tools
    can be off-the-shelf engines, such as the Unreal Engine, while others are custom
    built around an original product, such as the world generating engine that Bethesda
    use for the Skyrim and Fallout series of games. Others examples can be coded from
    the ground up, but these are generally few and far between. So where does Python
    fit into all this?


    The limiting factor with Python is performance. While most games require a huge
    degree of performance from the platform for which they are written, Python’s code,
    which is good, isn’t really designed to cope with the fast-paced formula on which
    games such as Battlefield or the Call of Duty series are based. These games are
    often coded with C++, or some other form of low-level programming language. But
    that doesn’t mean Python is left out in the cold when it comes to game development,
    in fact it’s quite the opposite.


    ![](img/e4c529ac6a286a7773e0e7c17e263180_85_0.png)


    # BUILDING TOOLS


    In the game industry, Python is mostly limited to the development of in-game tools
    used by the developers of the game, or to help bridge the gaps between different
    areas of code. For example, in-game tools coded in Python can be used by designers
    to create levels for the game, or specific elements that would make up a character’s
    inventory, or even creating dialog between the player and non-playing characters
    in the game.


    You will also find that Python can be used to control the game’s AI (Artificial
    Intelligence), which will give the characters in a game a certain element of life.
    As an example, the popular Sims games consist of characters other than the one
    the gamer controls. These Sims will go about their business with their actions
    determined by the player’s choices, this involves an advanced form of Artificial
    Intelligence that is coded using Python.


    Other examples include many of the available open world games, where the introduction
    of the player will change the course of a village’s, Town’s, or even city’s inhabitant’s
    behaviour. Blow up a few cars in the middle of the street and it’ll affect the
    way the other drivers behave; jump up and down on top of a market stall in the
    middle of a medieval village and the folk around you will react. This, again,
    is all down to Python code written within the main code of the game, alongside
    the game development engine.


    ```

