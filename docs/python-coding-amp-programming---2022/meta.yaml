  md: "# STEP 5\n\nSave and execute the code from Step 5 and a window appears with\
    \ 'Hello everyone!' inside. If you click the Hello everyone! button, the Shell\
    \ will output the text 'You just clicked me!'. It's simple but shows you what\
    \ can be achieved with a few lines of code.\n\n![](img/e4c529ac6a286a7773e0e7c17e263180_98_0.png)\n\
    \n# STEP 6\n\nYou can also display both text and images within a Tkinter window.\
    \ However, only GIF, PGM or PPM formats are supported. So find an image and convert\
    \ it before using the code. Here's an example using the BDM Publishing logo:\n\
    \n```\npython\nfrom tkinter import *\n\nroot = Tk()\nlogo = PhotoImage(file=\"\
    /home/pi/Downloads/BDM_logo.gif\")\nw1 = Label(root, root.title(\"BDM Publications\"\
    ), image=logo).pack(side=\"right\")\ncontent = \"\"\" From its humble beginnings\
    \ in 2004, the BDM brand quickly grew from a single publication produced by a\
    \ team of just two to one of the biggest names in global bookazine publishing,\
    \ for two simple reasons. Our passion and commitment to deliver the very best\
    \ product each and every volume. While the company has grown with a portfolio\
    \ of over 250 publications delivered by our international staff, the foundation\
    \ that it has been built upon remains the same, which is why we believe BDM isn't\
    \ just the first choice it's the only choice for the smart consumer. \"\"\"\n\
    w2 = Label(root, justify=LEFT, padx = 10, text=content).pack(side=\"left\")\n\
    root.mainloop()\n\n```\n\n# STEP 7\n\nThe previous code is quite weighty, mostly\
    \ due to the content variable holding a part of BDM's About page from the company\
    \ website. You can obviously change the content, the root.title and the image\
    \ to suit your needs.\n\n![](img/e4c529ac6a286a7773e0e7c17e263180_98_1.png)\n\n\
    # STEP 8\n\nYou can create radio buttons too. Try:\n\n```\npython\nfrom tkinter\
    \ import *\n\nroot = Tk()\nv = IntVar()\nLabel(root, root.title(\"Options\"),\
    \ text=\"\"\"Choose a preferred language:\"\"\", justify = LEFT, padx = 20).pack()\n\
    Radiobutton(root, text=\"Python\", padx = 20, variable=v, value=1).pack(anchor=W)\n\
    Radiobutton(root, text=\"C++\", padx = 20, variable=v, value=2).pack(anchor=W)\n\
    mainloop()\n\n```\n\n# STEP 9\n\nYou can also create check boxes, with buttons\
    \ and output to the Shell:\n\n```\npython\nfrom tkinter import *\n\nroot = Tk()\n\
    def var_states():\n    print(\"Warrior: %d,\\nMage: %d\" % (var1.get(), var2.get()))\n\
    Label(root, root.title(\"Adventure Game\"), text=\">>>>>>>>Your adventure role<<<<<<<<\"\
    ).grid(row=0, sticky=N)\nvar1 = IntVar()\nCheckbutton(root, text=\"Warrior\",\
    \ variable=var1).grid(row=1, sticky=W)\nvar2 = IntVar()\nCheckbutton(root, text=\"\
    Mage\", variable=var2).grid(row=2, sticky=W)\nButton(root, text='Quit', command=root.destroy).grid(row=3,\
    \ sticky=W, pady=4)\nButton(root, text='Show', command=var_states).grid(row=3,\
    \ sticky=E, pady=4)\nmainloop()\n\n```\n\n# STEP 10\n\nThe code from Step 9 introduced\
    \ some new geometry elements into Tkinter. Note the sticky=N, E and W arguments.\
    \ These describe the locations of the check boxes and buttons (North, East, South\
    \ and West). The row argument places them on separate rows. Have a play around\
    \ and see what you get.\n\n![](img/e4c529ac6a286a7773e0e7c17e263180_98_2.png)"
