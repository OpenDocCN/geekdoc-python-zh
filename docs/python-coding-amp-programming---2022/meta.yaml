  md: '# Using the Filesystm


    To master Linux, it’s important to understand how the filesystem works. What’s
    more, it’s also important to become familiar with the Terminal, or shell. This
    command line environment may appear daunting at first, but with practise, it soon
    becomes easy to use.


    # GETTING AROUND


    To drop into the Terminal, click on the fourth icon from the left along the top
    of the Raspberry Pi desktop, the one with a right-facing arrow and an underscore.
    This is the shell, or Terminal.


    ```

    bash

    pi@raspberrypi:~ $ pwd

    /home/pi

    pi@raspberrypi:~ $

    ```


    First, you’re going to look at directories and the directory path. A directory
    is the same thing as a folder, however in Linux it’s always called a directory.
    These are placed inside each other using a "/" character. So when you see /home/pi
    it means the pi directory is inside the home directory. Enter: clear and press
    return to clean the screen. Now enter: pwd. This stands for Print Working Directory
    and displays /home/pi.


    ```

    bash

    pi@raspberrypi ~ $ pwd

    /home/pi

    pi@raspberrypi ~ $ ls

    Desktop Documents Downloads exit indiecity python_games Scratch

    pi@raspberrypi ~ $

    ```


    Enter: ls to view the contents of the current directory. You should see Desktop,
    Documents, and Downloads and Scratch in Blue. You may also see other items depending
    on how much you have used your Raspberry Pi. The colour code is worth knowing:
    directories are blue while most files are white. As you go on you’ll see other
    colours: executable files (programs) are bright green, archived files are red
    and so on. Blue and white are the two you need to know to get started.


    ```

    bash

    pi@raspberrypi ~ $ pwd

    /home/pi

    pi@raspberrypi ~ $

    ```


    When you log in to your Raspberry Pi, you don’t start at the base of the hard
    drive, known as the ‘root’ (also known as the topmost directory). Instead you
    begin inside your user directory, which is named ‘pi’ by default and is itself
    in a directory called ‘home’. Directories are indicated by the "/" symbol. So,
    "/home/pi" tells you that in the root is a directory called home, and the next
    "/" says that inside "home" is a directory called "pi". That’s where you start.


    ```

    bash

    pi@raspberrypi ~ $ pwd

    /home/pi

    pi@raspberrypi ~ $ ls

    Desktop Documents Downloads exit indiecity python_games Scratch

    pi@raspberrypi ~ $ cd Documents

    pi@raspberrypi ~/Documents $ pwd

    /home/pi/Documents

    pi@raspberrypi ~/Documents $ ls

    Amber  archive.tar  Crypto101.pdf  dog_jump  euro  fizzbang_backup.py  fizzbang.py  nds

    pi@raspberrypi ~/Documents $ _

    ```


    Now you’re going to move from the pi directory into the Documents directory. Enter:
    cd Documents. Note the capital “D”. Linux is case sensitive, which means you have
    to enter the exact name including correct capitalisation. The cd command stands
    for change directory. Now enter: pwd again to view the directory path. It will
    display /home/pi/Documents. Enter: ls to view the files inside the Documents directory.'
