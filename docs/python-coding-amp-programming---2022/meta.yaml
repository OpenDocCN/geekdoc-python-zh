    # Date and Time


    When working with data it’s often handy to have access to the time. For example,
    you may want to time-stamp an entry or see at what time a user logged into the
    system and for how long. Luckily acquiring the date and time is easy, thanks to
    the Time module.


    ## TIME LORDS


    The Time module contains functions that help you retrieve the current system time,
    reads the date from strings, formats the time and date and much more.


    First you need to import the Time module. It’s one that’s built-in to Python 3
    so you shouldn’t need to drop into a command prompt and pip install it. Once it’s
    imported, you can call the current time and date with a simple command:


    ```

    import time

    time.asctime()

    ```


    ![](img/e4c529ac6a286a7773e0e7c17e263180_73_0.png)


    The time function is split into nine tuples, these are divided up into indexed
    items, as with any other tuple, and shown in the screen shot below.


    | Index | Field | Values |

    |-------|-------|--------|

    | 0 | 4-digit year | 2016 |

    | 1 | Month | 1 to 12 |

    | 2 | Day | 1 to 31 |

    | 3 | Hour | 0 to 23 |

    | 4 | Minute | 0 to 59 |

    | 5 | Second | 0 to 61 (60 or 61 are leap-seconds) |

    | 6 | Day of Week | 0 to 6 (0 is Monday) |

    | 7 | Day of year | 1 to 366 (Julian day) |

    | 8 | Daylight savings | -1, 0, 1, -1 means library determines DST |


    You can see the structure of how time is presented by entering:


    ```

    time.localtime()

    ```


    The output is displayed as such: ''time.struct_time(tm_year=2017, tm_mon=9, tm_mday=7,
    tm_hour=9, tm_min=6, tm_sec=13, tm_wday=3, tm_yday=250, tm_isdst=0)'', obviously
    dependent on your current time as opposed to the time this book was written.


    ![](img/e4c529ac6a286a7773e0e7c17e263180_73_1.png)


    There are numerous functions built into the Time module. One of the most common
    of these is .strftime(). With it, you’ll be able to present a wide range of arguments
    as it converts the time tuple into a string. For example, to display the current
    day of the week you can use:


    ```

    time.strftime(''%A'')

    ```


    ![](img/e4c529ac6a286a7773e0e7c17e263180_73_2.png)


    ## STEP 5


    This naturally means you can incorporate various functions into your own code,
    such as:


    ```

    time.strftime("%a")

    time.strftime("%B")

    time.strftime("%b")

    time.strftime("%H")

    time.strftime("%H%M")

    ```


    ![](img/e4c529ac6a286a7773e0e7c17e263180_74_0.png)


    ## STEP 8


    You saw at the end of the previous section, in the code to calculate Pi to however
    many decimal places the users wanted, you can time a particular event in Python.
    Take the code from above and alter it slightly by including:


    ```

    start_time=time.time()

    ```


    Then there’s:


    ```

    endtime=time.time()-start_time

    ```


    ![](img/e4c529ac6a286a7773e0e7c17e263180_74_1.png)


    ## STEP 6


    Note the last two entries, with %H and %H%M, as you can see these are the hours
    and minutes and as the last entry indicates, entering them as %H%M doesn’t display
    the time correctly in the Shell. You can easily rectify this with:


    ```

    time.strftime("%H:%M")

    ```


    ![](img/e4c529ac6a286a7773e0e7c17e263180_74_2.png)


    ## STEP 9


    The output will look similar to the screenshot below. The timer function needs
    to be either side of the input statement, as that’s when the variable name is
