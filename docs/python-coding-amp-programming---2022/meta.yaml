    \ fill='red') and the gui.mainloop() lines. Save the code and Run it as normal.\
    \ If you've entered the code correctly, then you will see the red ball bounce\
    \ off the edges of the window until you close the program.\n\n# STEP 7\n\nThe\
    \ bouncing animation takes place within the while True loop. First, we have the\
    \ values of xa and xy before the loop, both of 5 and 10. The pos=canvas.coords(ball1)\
    \ line takes the value of the ball's location in the window. When it reaches the\
    \ limits of the window, 800 or 600, it will make the values negative; moving the\
    \ ball around the screen.\n\n![](img/e4c529ac6a286a7773e0e7c17e263180_104_0.png)\n\
    \n# STEP 8\n\nPygame, however, is a much better module at producing higher-end\
    \ animations. Begin by creating a New File and entering:\n\n```\nimport pygame\n\
    from random import randrange\n\nMAX_STARS = 250\nSTAR_SPEED = 2\n\ndef init_stars(screen):\n\
    \    \"\"\" Create the starfield \"\"\"\n    global stars\n    stars = []\n  \
    \  for i in range(MAX_STARS):\n        # A star is represented as a list with\
    \ this\n        format: [X,Y]\n        star = [randrange(0, screen.get_width()\
    \ - 1),\n                randrange(0, screen.get_height() - 1)]\n        stars.append(star)\n\
    \ndef move_and_draw_stars(screen):\n    \"\"\" Move and draw the stars \"\"\"\n\
    \    global stars\n    for star in stars:\n        star[1] += STAR_SPEED\n   \
    \     if star[1] >= screen.get_height():\n            star[1] = 0\n          \
    \  star[0] = randrange(0, 639)\n        screen.set_at(star, (255,255,255))\n```\n\
    \n# STEP 9\n\nNow add the following:\n\n```\ndef main():\n    pygame.init()\n\
    \    screen = pygame.display.set_mode((640,480))\n    pygame.display.set_caption(\"\
    Starfield\\nSimulation\")\n    clock = pygame.time.Clock()\n\n    init_stars(screen)\n\
    \n    while True:\n        # Lock the framerate at 50 FPS\n        clock.tick(50)\n\
    \n        # Handle events\n        for event in pygame.event.get():\n        \
    \    if event.type == pygame.QUIT:\n                return\n\n        screen.fill((0,0,0))\n\
    \        move_and_draw_stars(screen)\n        pygame.display.flip()\n\nif __name__\
    \ == \"__main__\":\n    main()\n```\n\n```\ndef main():\n    pygame.init()\n \
    \   screen = pygame.display.set_mode((640,480))\n    pygame.display.set_caption(\"\
    Starfield Simulation\")\n    clock = pygame.time.Clock()\n\n    init_stars(screen)\n\
    \n    while True:\n        # Lock the framerate at 50 FPS\n        clock.tick(50)\n\
    \n        # Handle events\n        for event in pygame.event.get():\n        \
    \    if event.type == pygame.QUIT:\n                return\n\n        screen.fill((0,0,0))\n\
    \        move_and_draw_stars(screen)\n        pygame.display.flip()\n\nif __name__\
    \ == \"__main__\":\n    main()\n```\n\n# STEP 10\n\nSave and Run the code. You\
    \ will agree that the simulated starfield code looks quite impressive. Imagine\
    \ this as the beginning of some game code, or even the start to a presentation?\
    \ Using a combination of Pygame and Tkinter, your Python animations will look\
    \ fantastic.\n\n![](img/e4c529ac6a286a7773e0e7c17e263180_104_1.png)"
- md: "## Create Your Own Modules\n\nLarge programs can be much easier to manage if\
    \ you break them up into smaller parts and import the parts you need as modules.\
    \ Learning to build your own modules also makes it easier to understand how they\
    \ work.\n\n## BUILDING MODULES\n\nModules are Python files, containing code, that\
    \ you save using a `.py` extension. These are then imported into Python using\
    \ the now familiar `import` command.\n\n### STEP 1\n\nLet's start by creating\
    \ a set of basic mathematics functions. Multiply a number by two, three and square\
    \ or raise a number to an exponent (power). Create a New File in the IDLE and\
    \ enter:\n\n```python\ndef timestwo(x):\n    return x * 2\n\ndef timesthree(x):\n\
    \    return x * 3\n\ndef square(x):\n    return x * x\n\ndef power(x,y):\n   \
    \ return x ** y\n```\n\n![](img/e4c529ac6a286a7773e0e7c17e263180_105_0.png)\n\n\
    ### STEP 2\n\nUnder the above code, enter functions to call the code:\n\n```python\n\
    print (timestwo(2))\nprint (timesthree(3))\nprint (square(4))\nprint (power(5,3))\n\
    ```\n\nSave the program as `basic_math.py` and execute it to get the results.\n\
    \n![](img/e4c529ac6a286a7773e0e7c17e263180_105_1.png)\n\n### STEP 3\n\nNow you're\
    \ going to take the function definitions out of the program and into a separate\
    \ file. Highlight the function definitions and choose Edit > Cut. Choose File\
    \ > New File and use Edit > Paste in the new window. You now have two separate\
    \ files, one with the function definitions, the other with the function calls.\n\
    \n![](img/e4c529ac6a286a7773e0e7c17e263180_105_2.png)\n\n### STEP 4\n\nIf you\
    \ now try and execute the `basic_math.py` code again, the error **'NameError:\
    \ name 'timestwo' is not defined'** will be displayed. This is due to the code\
    \ no longer having access to the function definitions.\n\n```plaintext\nTraceback\
    \ (most recent call last):\n  File \"/home/pi/Documents/Python Code/basic_math.py\"\
    , line 3, in <module>\n    print (timestwo(2))\nNameError: name 'timestwo' is\
    \ not defined\n>>>\n```\n\n### STEP 5\n\nReturn to the newly created window containing\
    \ the function definitions, and click File > Save As. Name this `minimath.py`\
    \ and save it in the same location as the original `basic_math.py` program. Now\
    \ close the `minimath.py` window, so the `basic_math.py` window is left open.\n\
    \n![](img/e4c529ac6a286a7773e0e7c17e263180_105_3.png)\n\n### STEP 6\n\nBack to\
    \ the basic_math.py window: at the top of the code enter:\n\n```\nfrom minimath\
    \ import *\n```\n\nThis will import the function definitions as a module. Press\
    \ F5 to save and execute the program to see it in action.\n\n![](img/e4c529ac6a286a7773e0e7c17e263180_106_0.png)\n\
    \n### STEP 7\n\nYou can now use the code further to make the program a little\
    \ more advanced, utilising the newly created module to its full. Include some\
    \ user interaction. Start by creating a basic menu the user can choose from:\n\
    \n```\nprint(\"Select operation.\\n\")\nprint(\"1.Times by two\")\nprint(\"2.Times\
    \ by Three\")\nprint(\"3.Square\")\nprint(\"4.Power of\")\n\nchoice = input(\"\
    \\nEnter choice (1/2/3/4) :\")\n```\n\n![](img/e4c529ac6a286a7773e0e7c17e263180_106_1.png)\n\
    \n### STEP 8\n\nNow we can add the user input to get the number the code will\
    \ work on:\n\n```\nnum1 = int(input(\"\\nEnter number: \"))\n```\n\nThis will\
    \ save the user-entered number as the variable num1.\n\n![](img/e4c529ac6a286a7773e0e7c17e263180_106_2.png)\n\
    \n### STEP 9\n\nFinally, you can now create a range of if statements to determine\
    \ what to do with the number and utilise the newly created function definitions:\n\
    \n```\nif choice == '1':\n    print(timestwo(num1))\nelif choice == '2':\n   \
    \ print(timesthree(num1))\nelif choice == '3':\n    print(square(num1))\nelif\
    \ choice == '4':\n    num2 = int(input(\"Enter second number: \"))\n    print(power(num1,\
    \ num2))\nelse:\n    print(\"Invalid input\")\n```\n\n![](img/e4c529ac6a286a7773e0e7c17e263180_106_3.png)\n\
    \n### STEP 10\n\nNote that for the last available options, the Power of choice,\
    \ we've added a second variable, num2. This passes a second number through the\
    \ function definition called power. Save and execute the program to see it in\
    \ action.\n\n![](img/e4c529ac6a286a7773e0e7c17e263180_106_4.png)\n\n# Python in\
    \ Focus: Artificial Intelligence\n\nArtificial Intelligence (AI) and Machine Learning\
    \ (ML) are the new hot topics of the IT industry. AI is fast becoming the working\
    \ science fiction that it has been portrayed as in the past, and behind it is\
    \ Python.\n\nDespite how close AI and ML are, there are distinct differences between\
    \ the two technologies. AI refers to the study of how to train a computer to accomplish\
    \ the things that humans can do significantly better and faster. Whereas, ML is\
    \ the ability for a computer to learn from its experiences, so that the outcome\
    \ and performance will eventually become more accurate and accomplished.\n\nWhile\
    \ different, they are both essentially discussing the same element: training a\
    \ system to learn and do things independently. Where AI is said to lead to wisdom,\
    \ ML reportedly leads to knowledge and, thanks to Python, that gap is getting\
    \ closer every day.\n\n```python\nimport keras\nfrom keras.datasets import mnist\n\
    from keras.models import Sequential\nfrom keras.layers import Dense, Dropout,\
    \ Flatten\nfrom keras.layers import Conv2D, MaxPooling2D\n\nbatch_size = 128\n\
    num_classes = 10\nepochs = 12\n\n# input image dimensions\nimg_rows, img_cols\
    \ = 28, 28\n\n(x_train, y_train), (x_test, y_test) = mnist.load_data()\n```\n\n\
    ![](img/e4c529ac6a286a7773e0e7c17e263180_107_0.png)\n\n## APPLICATIONS\n\nBoth\
    \ AI and ML are hugely present in today’s technology. Where, just a few years\
    \ ago, most of us associated AI with the rise of a super-intelligent legion of\
    \ killer robots, nowadays you’d be amazed at the numerous examples of AI in your\
    \ house, and even being carried around with you.\n\nLet’s begin with the obvious\
    \ use of AI and ML, the smartphone. These devices have infiltrated most of our\
    \ modern world, with global coverage reaching 5.5 billion for 2019 and set to\
    \ rise to over 6 billion by the end of 2020, it’s little surprise to discover\
    \ that AI and ML are advancing in leaps and bounds.\n\nWith nearly all of the\
    \ population of humanity within reach of a smartphone, the coding behind these\
    \ devices has been developed to take individuals into account. These devices are\
    \ designed to learn what the user requires, or uses, the device for. Common numbers\
    \ called are pushed to the top of the list, in-app and in-game advertising is\
    \ moulded around our browser and search preferences, as well as other apps we’ve\
    \ installed in the past. And even our voices, fingerprints and faces are stored\
    \ and analysed by AI and ML in order to recognise who we are.\n\n## DIGITAL ASSISTANTS\n\
    \nThe rise of digital assistants has been one of the kick-starters of AI and ML\
    \ programming. Siri, Cortana, Alexa and Google Assistant are all coded using Python,\
    \ and are designed to listen, learn and respond to what we ask of them. With Python,\
    \ this level of AI is surprisingly simple, thanks to the many libraries and customisation\
    \ of the language. These frameworks make creating AI and ML easy for intelligent\
    \ coders, cutting down on the development time in other languages and, thanks\
    \ to Python’s easy to read code and complex algorithms, these developers can devote\
    \ significant time to improving the performance and accuracy of AI.\n\nEvery time\
    \ we ask one of these digital assistants for something, the Python-driven AI code\
    \ is reading our voice, determining what it is we’re asking by plucking out key\
    \ words and acting on them. If we ask for a thirty second countdown, it’ll start\
    \ the device’s stopwatch function; if we ask for dinner suggestions, it’ll open\
    \ a specific set of web pages, and if we ask it to play some music, it’ll interrogate\
    \ the available music apps to select what it is we wanted. All the time, the AI\
    \ code is being trained to listen more intently, while the ML is learning from\
    \ the AI results so that its accuracy is improved for future questions and requests.\n\
    \n## BEYOND THE SMARTPHONE\n\nConsider Google, social media and the content you\
    \ look up. How many times have you entered a search string into Google, such as\
    \ car parts for a Mk1 Ford Escort and, when you’ve opened Facebook, you suddenly\
    \ find a group suggestion of Ford Escort owners? That’s AI and ML injecting themselves\
    \ into your everyday computing tasks.\n\nAnother example of AI and ML working\
    \ together is Gmail’s recent addition of suggested completions for sentences you\
    \ are typing. If you frequently sign off with ‘See you soon’, or ‘All the best’,\
    \ then typing ‘See’ or ‘All’ will prompt the ML side of the equation to autofill\
    \ the remainder of the words for you. All the time, the ML is learning while the\
    \ AI is telling it what to improve on.\n\nFacial recognition is another element\
    \ of AI and ML that’s been the target of the popular press for some time. Throughout\
    \ 2019, facial recognition systems on both smartphones and CCTV footage have improved\
    \ dramatically. Agencies controlling this level of AI now have the ability to\
    \ single out an individual from a crowded street and, while that’s great for law\
    \ and order, it does pose a potential threat to our privacy. After all, who watches\
    \ the watcher?\n\nTesla’s work on self-driving cars means they are getting closer\
    \ to being the norm, and it’s Python along with its controlling AI and ML work\
    \ that’s, excuse the pun, driving it forward. In these circumstances, Python is\
    \ doing a lot of the heavy lifting, providing the connective tissue and libraries\
    \ that are designed to implement AI and ML. In the background, you’ll usually\
    \ find C++, or some other language, that’s supporting the performance and overall\
    \ program in which the AI and ML are working.\n\nWhile it’s easy to portray a\
    \ bleak AI future, let’s not forget the many great instances of AI we currently\
    \ enjoy: optical character recognition, handwriting recognition, image processing,\
    \ helping people with visual and hearing disabilities, advancements in space exploration,\
    \ engineering improvements, conservation, pharmaceutical and drug improvements\
    \ and greater freedom for those limited in their ability to travel. It’s not all\
    \ about two AI bots arguing about eliminating the human race.\n\n## THE FUTURE\
    \ OF AI\n\nWhether we’ll end up creating true AI, killer robots and self-aware\
    \ androids is up for debate. There are plenty of arguments for and against the\
    \ evolution of AI, with many believing that AI will be the worst possible future\
    \ humans can create – worse even than nuclear war. For the moment, however, we’re\
    \ at the early stages of AI development, but with Python’s continual advancements\
    \ and improved libraries, it may not be too long before we’ve got an AI system\
    \ that’s getting better by the hour.\n\n![](img/e4c529ac6a286a7773e0e7c17e263180_108_0.png)\n\
    \n![](img/e4c529ac6a286a7773e0e7c17e263180_108_1.png)"
  mdcn: "## 创建你自己的模块\n\n如果你将大型程序拆分成更小的部分，并将需要的部分作为模块导入，那么管理它们会容易得多。学习构建自己的模块也有助于理解它们的工作原理。\n\
    \n## 构建模块\n\n模块是包含代码的 Python 文件，使用 `.py` 扩展名保存。然后，使用我们现在熟悉的 `import` 命令将它们导入到\
    \ Python 中。\n\n### 第 1 步\n\n让我们从创建一组基本的数学函数开始。将一个数字乘以二、乘以三、求平方或将数字提升到指数（幂）。在 IDLE\
    \ 中新建一个文件并输入：\n\n```python\ndef timestwo(x):\n    return x * 2\n\ndef timesthree(x):\n\
    \    return x * 3\n\ndef square(x):\n    return x * x\n\ndef power(x,y):\n   \
    \ return x ** y\n```\n\n![](img/e4c529ac6a286a7773e0e7c17e263180_105_0.png)\n\n\
    ### 第 2 步\n\n在上述代码下方，输入函数来调用这些代码：\n\n```python\nprint (timestwo(2))\nprint (timesthree(3))\n\
    print (square(4))\nprint (power(5,3))\n```\n\n将程序保存为 `basic_math.py` 并运行它以获取结果。\n\
    \n![](img/e4c529ac6a286a7773e0e7c17e263180_105_1.png)\n\n### 第 3 步\n\n现在，你将把函数定义从程序中取出，放入一个单独的文件中。选中函数定义，然后选择“编辑”\
    \ > “剪切”。选择“文件” > “新建文件”，然后在新窗口中使用“编辑” > “粘贴”。现在你有了两个独立的文件，一个包含函数定义，另一个包含函数调用。\n\
    \n![](img/e4c529ac6a286a7773e0e7c17e263180_105_2.png)\n\n### 第 4 步\n\n如果你现在再次尝试执行\
    \ `basic_math.py` 代码，将显示错误 **'NameError: name 'timestwo' is not defined'**。这是因为代码不再能访问函数定义。\n\
    \n```plaintext\nTraceback (most recent call last):\n  File \"/home/pi/Documents/Python\
    \ Code/basic_math.py\", line 3, in <module>\n    print (timestwo(2))\nNameError:\
    \ name 'timestwo' is not defined\n>>>\n```\n\n### 第 5 步\n\n返回到包含函数定义的新创建窗口，然后单击“文件”\
    \ > “另存为”。将其命名为 `minimath.py` 并将其保存在与原始 `basic_math.py` 程序相同的位置。现在关闭 `minimath.py`\
    \ 窗口，这样 `basic_math.py` 窗口就保持打开了。\n\n![](img/e4c529ac6a286a7773e0e7c17e263180_105_3.png)\n\
    \n### 第 6 步\n\n回到 basic_math.py 窗口：在代码顶部输入：\n\n```\nfrom minimath import *\n```\n\
    \n这将把函数定义作为模块导入。按 F5 保存并运行程序以查看效果。\n\n![](img/e4c529ac6a286a7773e0e7c17e263180_106_0.png)\n\
    \n### 第 7 步\n\n你现在可以进一步使用代码，让程序更高级一些，充分利用新创建的模块。包含一些用户交互。首先创建一个用户可以选择的基本菜单：\n\n\
    ```\nprint(\"Select operation.\\n\")\nprint(\"1.Times by two\")\nprint(\"2.Times\
    \ by Three\")\nprint(\"3.Square\")\nprint(\"4.Power of\")\n\nchoice = input(\"\
    \\nEnter choice (1/2/3/4) :\")\n```\n\n![](img/e4c529ac6a286a7773e0e7c17e263180_106_1.png)\n\
    \n### 第 8 步\n\n现在我们可以添加用户输入，以获取代码将要处理的数字：\n\n```\nnum1 = int(input(\"\\nEnter\
    \ number: \"))\n```\n\n这将把用户输入的数字保存为变量 num1。\n\n![](img/e4c529ac6a286a7773e0e7c17e263180_106_2.png)\n\
    \n### 第 9 步\n\n最后，你现在可以创建一系列 if 语句，以确定如何处理该数字并利用新创建的函数定义：\n\n```\nif choice ==\
    \ '1':\n    print(timestwo(num1))\nelif choice == '2':\n    print(timesthree(num1))\n\
    elif choice == '3':\n    print(square(num1))\nelif choice == '4':\n    num2 =\
    \ int(input(\"Enter second number: \"))\n    print(power(num1, num2))\nelse:\n\
    \    print(\"Invalid input\")\n```\n\n![](img/e4c529ac6a286a7773e0e7c17e263180_106_3.png)\n\
    \n### 第 10 步\n\n请注意，对于最后一个可用选项“幂运算”，我们添加了第二个变量 num2。这会将第二个数字传递给名为 power 的函数定义。保存并运行程序以查看效果。\n\
    \n![](img/e4c529ac6a286a7773e0e7c17e263180_106_4.png)\n\n# 聚焦 Python：人工智能\n\n\
    人工智能（AI）和机器学习（ML）是 IT 行业的新热点。AI 正迅速成为过去所描绘的那种工作中的科幻小说，而其背后正是 Python。\n\n尽管 AI\
    \ 和 ML 非常接近，但这两项技术之间存在明显的区别。AI 指的是研究如何训练计算机完成人类能够显著更好、更快完成的事情。而 ML 是计算机从其经验中学习的能力，因此结果和性能最终会变得更加准确和出色。\n\
    \n尽管不同，但它们本质上都在讨论同一个元素：训练系统自主学习和做事。据称 AI 通向智慧，而 ML 通向知识，多亏了 Python，这种差距每天都在缩小。\n\
    \n```python\nimport keras\nfrom keras.datasets import mnist\nfrom keras.models\
    \ import Sequential\nfrom keras.layers import Dense, Dropout, Flatten\nfrom keras.layers\
    \ import Conv2D, MaxPooling2D\n\nbatch_size = 128\nnum_classes = 10\nepochs =\
    \ 12\n\n# 输入图像尺寸\nimg_rows, img_cols = 28, 28\n\n(x_train, y_train), (x_test,\
    \ y_test) = mnist.load_data()\n```\n\n![](img/e4c529ac6a286a7773e0e7c17e263180_107_0.png)\n\
    \n## 应用\n\nAI 和 ML 在当今技术中无处不在。就在几年前，我们大多数人还将 AI 与超级智能杀手机器人军团的崛起联系在一起，而如今，你会惊讶于\
    \ AI 在你家中甚至随身携带的设备中的众多例子。\n\n让我们从 AI 和 ML 最显而易见的应用——智能手机开始。这些设备已经渗透到我们现代世界的大部分地区，2019\
    \ 年全球覆盖率达到 55 亿，到 2020 年底预计将超过 60 亿，因此 AI 和 ML 正在突飞猛进也就不足为奇了。\n\n随着几乎全球人口都能接触到智能手机，这些设备背后的编码已经发展到考虑个体需求。这些设备旨在学习用户使用设备的目的。常用号码被推送到列表顶部，应用内和游戏内广告根据我们的浏览和搜索偏好以及其他过去安装的应用进行定制。甚至我们的声音、指纹和面部都由\
    \ AI 和 ML 存储和分析，以识别我们是谁。\n\n## 数字助手\n\n数字助手的兴起是 AI 和 ML 编程的催化剂之一。Siri、Cortana、Alexa\
    \ 和 Google Assistant 都是使用 Python 编码的，旨在倾听、学习并响应我们提出的要求。借助 Python，这种程度的 AI 简单得令人惊讶，这要归功于众多的库和语言的可定制性。这些框架使智能编码人员能够轻松创建\
    \ AI 和 ML，减少了在其他语言上的开发时间，并且得益于 Python 易于阅读的代码和复杂的算法，这些开发人员可以投入大量时间来提高 AI 的性能和准确性。\n\
    \n每次我们向这些数字助手下达指令时，Python 驱动的 AI 代码都在读取我们的语音，通过提取关键词来确定我们要求的内容并据此执行操作。如果我们要求 30\
