    # ## STEP 8


    Emacs can offer an uncomplicated view of your text file or one with a plethora
    of information regarding the structure of the file in question; it''s up to you
    to work out your own preference. There''s also a hidden text adventure in Emacs,
    which we cover later in this book, why not see if you can find it without our
    help.


    ![](img/e4c529ac6a286a7773e0e7c17e263180_154_1.png)


    # ## STEP 6


    The previous command contacts the Debian (Raspbian is based on a Debian Linux
    distribution) repositories and pulls down the information needed to install Emacs.
    When the Pi asks to continue with the installation, press Y. This installs the
    latest version and when it''s done, you''ll be back to the command prompt.


    ![](img/e4c529ac6a286a7773e0e7c17e263180_154_2.png)


    # ## STEP 9


    Gedit is another excellent text editor for Linux. Again, it''s not installed by
    default on the Raspberry Pi; however, by entering: sudo apt-get install gedit
    and accepting the installation, the program can be on the Pi in a matter of seconds.
    Once it''s installed, use gedit in the Terminal to launch it. Gedit is a great
    text editor for coding.


    ```

    sudo apt-get install gedit

    ```


    ![](img/e4c529ac6a286a7773e0e7c17e263180_154_3.png)


    # ## STEP 7


    Once the installation is complete, enter: emacs into the Terminal. The Emacs splash
    screen opens in a new window, offering a tutorial (which we recommend you run
    through) and a guided tour amongst other information.


    ```

    emacs

    ```


    ![](img/e4c529ac6a286a7773e0e7c17e263180_154_4.png)


    # ## STEP 10


    Finally, Jed is an Emacs-like, cross-platform text editor that''s lightweight
    and comes with a wealth of features. To install it, enter: sudo apt-get install
    jed. Accept the installation and when it''s complete, use: jed to launch.


    ```

    sudo apt-get install jed

    ```


    ![](img/e4c529ac6a286a7773e0e7c17e263180_154_5.png)'
  - '[PAGE 155]


    # Linux Tips and Tricks


    The Linux Terminal, you''ll no doubt agree, is an exceptional environment and
    with a few extra apps installed along with a smidgen of command knowledge, incredible
    and often quite strange things can be accomplished.


    # TAKING COMMAND


    There are countless Linux tips, secrets, hacks and tricks out there. Some are
    very old, originating from Linux''s Unix heritage, while others are recent additions
    to Linux lore. Here are our ten favourite tips and tricks.


    # EASTER EGGS


    Emacs text editor, is a great piece of software but did you know it also contains
    a hidden Easter Egg? With Emacs installed (sudo apt-get install emacs24), drop
    to a Terminal session and enter:


    ```

    emacs -batch -l dunnet

    ```


    Dunnet is a text adventure written by Ron Schnell in 1982, and hidden in Emacs
    since 1994.


    ![](img/e4c529ac6a286a7773e0e7c17e263180_155_0.png)


    # TERMINAL BROWSING


    Ever fancied being able to browse the Internet from the Terminal? While not particularly
    useful, it is a fascinating thing to behold. To do so, enter:


    ```

    sudo apt-get install elinks

    ```


    Then:


    ```

    elinks

    ```


    Enter the website you want to visit.


    ![](img/e4c529ac6a286a7773e0e7c17e263180_155_1.png)


    # MOON BUGGY


    Based on the classic 1982 arcade game, Moon Patrol, Moon Buggy appeared on home
    computers in 1985 amid much praise. It''s a cracking Atari game available in the
    Linux Terminal by entering:


    ```

    sudo apt-get install moon-buggy

    ```


    Then:


    ```

    moon-buggy

    ```


    Enjoy.


    ![](img/e4c529ac6a286a7773e0e7c17e263180_155_2.png)


    # LET IT SNOW


    Snowing in the Terminal console isn''t something you come across every day. If
    you''re interested, however, enter:


    ```

    wget https://gist.githubusercontent.com/sontek/1505483/raw/7d024716ea57e69fb52632fee09f42753361c4a2/snowjob.sh

    ```


    ```

    chmod +x snowjob.sh

    ```


    ```

    ./snowjob.sh

    ```


    ![](img/e4c529ac6a286a7773e0e7c17e263180_155_3.png)'
  - '[PAGE 156]


    # # Linux Tips and Tricks


    # ## MEMORY HOGS


    Memory Hogs – If you need to see which apps are consuming the most memory on your
    Raspberry Pi, simple enter:


    ```

    ps aux | sort -rnk 4

    ```


    This sorts the output by system memory use.


    ![](img/e4c529ac6a286a7773e0e7c17e263180_156_0.png)


    # ## SHREDDER


    When you delete a file, there''s still a chance of someone with the right software
    being able to retrieve it. However, files can be securely and permanently deleted
    using Shred:


    ```

    shred -zvu NAMEOFFILE.txt

    ```


    Replace NAMEOFFILE with the name of the file to delete.


    ![](img/e4c529ac6a286a7773e0e7c17e263180_156_1.png)


    # ## ASCII ART


    ASCII art can be quite striking when applied to some images. However, it''s often
    difficult to get just right. You can create some great ASCII art from the images
    you already have on the Raspberry Pi by using img2txt:


    ```

    img2txt NAMEOFIMAGEFILE.png

    ```


    Replace NAMEOFIMAGEFILE with the actual name of the image file on your system.


    ![](img/e4c529ac6a286a7773e0e7c17e263180_156_2.png)


    # ## BBS


    Back in the days of dial-up connections, the online world was made up of Bulletin
    Board Systems. These remote servers provided hangouts for users to chat, swap
    code, play games and more. Using Telnet in Linux, you can still connect to some
    active BBSes:


    ```

    telnet battlestarbbs.dyndns.org

    ```


    There are countless operational BBSes available; check out www.telnetbbsguide.com/bbs/list/detail/
    for more.


    ![](img/e4c529ac6a286a7773e0e7c17e263180_156_3.png)


    # ## DIRECTORY TREES


    If you want to create an entire directory (or folder) tree with a single command,
    you can use:


    ```

    mkdir -p New-Dir/{subfolder1,subfolder2,subfolder3,subfolder4}

    ```


    This creates a New-Dir with four sub folders within.


    ![](img/e4c529ac6a286a7773e0e7c17e263180_156_4.png)


    # ## FORGOTTEN COMMANDS


    It''s not easy trying to remember all the available Linux commands. Thankfully,
    you can use apropos to help. Simply use it with a description of the command:


    ```

    apropos "copy files"

    apropos "rename files"

    ```


    ![](img/e4c529ac6a286a7773e0e7c17e263180_156_5.png)'
