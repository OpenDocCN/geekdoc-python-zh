  md: '# STEP 5


    Although it’s not common practise, it is possible to import functions from a module
    and rename them. In this example, we’re importing floor from Math and renaming
    it to f. Although where lengthy code is in use, this process can quickly become
    confusing:


    ```

    from math import floor as f

    f(1.2)

    ```


    ![](img/e4c529ac6a286a7773e0e7c17e263180_94_0.png)


    # STEP 6


    Importing all the functions of the Math Module can be done by entering:


    ```

    from math import *

    ```


    While certainly handy, this is often frowned upon by the developer community as
    it takes up unnecessary resources and isn’t an efficient way of coding. However,
    if it works for you then go ahead.


    ![](img/e4c529ac6a286a7773e0e7c17e263180_94_1.png)


    # STEP 7


    Interestingly, some functions within the Math module are more accurate, or to
    be more precise are designed to return a more accurate value, than others. For
    example:


    ```

    sum([.1, .1, .1, .1, .1, .1, .1, .1, .1])

    fsum([.1, .1, .1, .1, .1, .1, .1, .1, .1])

    ```


    will return the value of 0.999999999. Whereas:

    returns the value of 1.0.


    ![](img/e4c529ac6a286a7773e0e7c17e263180_94_2.png)


    # STEP 8


    For further accuracy, when it comes to numbers the exp and expm1 functions can
    be used to compute precise values:


    ```

    from math import exp, expm1

    exp(1e-5) - 1 # value accurate to 11 places

    expm1(1e-5) # result accurate to full precision

    ```


    ![](img/e4c529ac6a286a7773e0e7c17e263180_94_3.png)


    # STEP 9


    This level of accuracy is really quite impressive, but quite niche for the most
    part. Probably the two most used functions are e and Pi, where e is the numerical
    constant equal to 2.71828 (where the circumference of a circle is divided by its
    diameter):


    ```

    import math

    print(math.e)

    print(math.pi)

    ```


    ![](img/e4c529ac6a286a7773e0e7c17e263180_94_4.png)


    # STEP 10


    The wealth of mathematical functions available through the Math module is vast
    and covers everything from factors to infinity, powers to trigonometry and angular
    conversion to constants. Look up https://docs.python.org/3/library/math.html#
    for a list of available Math module functions.


    ![](img/e4c529ac6a286a7773e0e7c17e263180_94_5.png)'
