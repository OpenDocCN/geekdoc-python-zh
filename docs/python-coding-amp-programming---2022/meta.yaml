    29 30\n>>> \n>>>\n```\n\n**STEP 2**\n\nYou can see that the days of September\
    \ 2019 are displayed in a wall calendar fashion. Naturally you can change the\
    \ 2019, 9 part of the second line to any year and month you want, a birthday for\
