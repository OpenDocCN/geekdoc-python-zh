  md: '# # Your First Code


    Essentially, you’ve already written your first piece of code with the ‘print(“Hello
    everyone!”)’ function from the previous tutorial. However, let’s expand that and
    look at entering your code and playing around with some other Python examples.


    ## PLAYING WITH PYTHON


    With most languages, computer or human, it’s all about remembering and applying
    the right words to the right situation. You’re not born knowing these words, so
    you need to learn them.


    ### STEP 1


    If you’ve closed Python 3 IDLE, reopen it in whichever operating system version
    you prefer. In the Shell, enter the familiar following:


    ```

    print("Hello")

    ```


    ![](img/e4c529ac6a286a7773e0e7c17e263180_35_0.png)


    ### STEP 3


    You can see that instead of the number 4, the output is the 2+2 you asked to be
    printed to the screen. The quotation marks are defining what’s being outputted
    to the IDLE Shell; to print the total of 2+2 you need to remove the quotes:


    ```

    print(2+2)

    ```


    ![](img/e4c529ac6a286a7773e0e7c17e263180_35_1.png)


    ### STEP 2


    Just as predicted, the word Hello appears in the Shell as blue text, indicating
    output from a string. It’s fairly straightforward and doesn’t require too much
    explanation. Now try:


    ```

    print("2+2")

    ```


    ![](img/e4c529ac6a286a7773e0e7c17e263180_35_2.png)


    ### STEP 4


    You can continue as such, printing 2+2, 464+2343 and so on to the Shell. An easier
    way is to use a variable, which is something we will cover in more depth later.
    For now, enter:


    ```

    a=2

    b=2

    ```


    ![](img/e4c529ac6a286a7773e0e7c17e263180_35_3.png)'
  merge: -1
  pgno: 35
- img_proc: true
  md: '# STEP 5


    What you have done here is assign the letters a and b two values: 2 and 2. These
    are now variables, which can be called upon by Python to output, add, subtract,
    divide and so on for as long as their numbers stay the same. Try this:


    ```

    python

    print (a)

    print (b)

    ```


    ![](img/e4c529ac6a286a7773e0e7c17e263180_36_0.png)


    # STEP 8


    Now let''s add a surname:


    ```

    python

    surname="Hayward"

    print (surname)

    ```


    You now have two variables containing a first name and a surname and you can print
    them independently.


    ![](img/e4c529ac6a286a7773e0e7c17e263180_36_1.png)


    # STEP 6


    The output of the last step displays the current values of both a and b individually,
    as you''ve asked them to be printed separately. If you want to add them up, you
    can use the following:


    ```

    python

    print (a+b)

    ```


    This code simply takes the values of a and b, adds them together and outputs the
    result.


    ![](img/e4c529ac6a286a7773e0e7c17e263180_36_2.png)


    # STEP 9


    If we were to apply the same routine as before, using the + symbol, the name wouldn''t
    appear correctly in the output in the Shell. Try it:


    ```

    python

    print (name+surname)

    ```


    You need a space between the two, defining them as two separate values and not
    something you mathematically play around with.


    ![](img/e4c529ac6a286a7773e0e7c17e263180_36_3.png)


    # STEP 7


    You can play around with different kinds of variables and the Print function.
    For example, you could assign variables for someone''s name:


    ```

    python

    name="David"

    print (name)

    ```


    ![](img/e4c529ac6a286a7773e0e7c17e263180_36_4.png)


    # STEP 10


    In Python 3 you can separate the two variables with a space using a comma:


    ```

    python

    print (name, surname)

    ```


    Alternatively, you can add the space yourself:


    ```

    python

    print (name+" "+surname)

    ```


    The use of the comma is much neater, as you can see. Congratulations, you''ve
    just taken your first steps into the wide world of Python.


    ![](img/e4c529ac6a286a7773e0e7c17e263180_36_5.png)'
