    # User Input


    We’ve seen some basic user interaction with the code from a few of the examples
    earlier, so now would be a good time to focus solely on how you would get information
    from the user then store and present it.


    # USER FRIENDLY


    The type of input you want from the user will depend greatly on the type of program
    you’re coding. For example, a game may ask for a character’s name, whereas a database
    can ask for personal details.


    # STEP 1


    If it’s not already, open the Python 3 IDLE Shell, and start a New File in the
    Editor. Let’s begin with something really simple, enter:


    ```

    print("Hello")

    firstname=input("What is your first name? ")

    print("Thanks.")

    surname=input("And what is your surname? ")

    ```


    ![](img/e4c529ac6a286a7773e0e7c17e263180_47_0.png)


    # STEP 2


    Save and execute the code, and as you already no doubt suspected, in the IDLE
    Shell the program will ask for your first name, storing it as the variable firstname,
    followed by your surname; also stored in its own variable (surname).


    ![](img/e4c529ac6a286a7773e0e7c17e263180_47_1.png)


    # STEP 3


    Now that we have the user’s name stored in a couple of variables we can call them
    up whenever we want:


    ```

    print("Welcome", firstname, surname, ". I hope you’re well today.")

    ```


    ![](img/e4c529ac6a286a7773e0e7c17e263180_47_2.png)


    # STEP 4


    Run the code and you can see a slight issue, the full stop after the surname follows
    a blank space. To eliminate that we can add a plus sign instead of the comma in
    the code:


    ```

    print("Welcome", firstname, surname+". I hope you’re well today.")

    ```


    ![](img/e4c529ac6a286a7773e0e7c17e263180_47_3.png)'
