    \ into a variable, thus allowing you to call it again when needed:\n\n```\npoem=open(\"\
    /home/pi/Documents/Poem.txt\")\nline=poem.readline()\nline\n```\n\n## STEP 9\n\
    \nYou can also use the for statement to read the lines of text back to us:\n\n\
    ```\nfor lines in lines:\n    print(lines)\n```\n\nSince this is Python, there\
    \ are other ways to produce the same output:\n\n```\npoem=open(\"/home/pi/Documents/Poem.txt\"\
    )\nfor lines in poem:\n    print(lines)\n```\n\n![](img/e4c529ac6a286a7773e0e7c17e263180_76_3.png)\n\
    \n## STEP 10\n\nLet’s imagine that you want to print the text one character at\
    \ a time, like an old dot matrix printer would. You can use the Time module mixed\
    \ with what you’ve looked at here. Try this:\n\n```\nimport time\npoem=open(\"\
    /home/pi/Documents/Poem.txt\")\nlines=poem.read()\nfor lines in lines:\n    print(lines,\
    \ end=\"\")\n    time.sleep(.15)\n```\n\n# Writing to Files\n\nThe ability to\
    \ read external files within Python is certainly handy but writing to a file is\
    \ better still. Using the write() function, you're able to output the results\
    \ of a program to a file, that you can then read() back into Python.\n\n# WRITE\
    \ AND CLOSE\n\nThe write() function is slightly more complex than read(). Along\
    \ with the filename you must also include an access mode which determines whether\
    \ the file in question is in read or write mode.\n\n**STEP 1** Start by opening\
    \ IDLE and enter the following:\n`t=open(\"/home/pi/Documents/text.txt\", \"w\"\
    )`\nChange the destination from /home/pi/Documents to your own system. This code\
    \ will create a text file called text.txt in write mode using the variable 't'.\
    \ If there's no file of that name in the location, it will create one. If one\
    \ already exits, it will overwrite it, so be careful.\n\n**STEP 3** However, the\
    \ actual text file is still blank (you can check by opening it up). This is because\
    \ you've written the line of text to the file object but not committed it to the\
    \ file itself. Part of the write() function is that you need to commit the changes\
    \ to the file; you can do this by entering:\n`t.close()`\n\n![](img/e4c529ac6a286a7773e0e7c17e263180_77_0.png)\n\
    \n![](img/e4c529ac6a286a7773e0e7c17e263180_77_1.png)\n\n**STEP 2** You can now\
    \ write to the text file using the write() function. This works opposite to read(),\
    \ writing lines instead of reading them. Try this:\n`t.write(\"You awake in a\
    \ small, square room. A single table stands to one side, there is a locked door\
    \ in front of you.\")`\nNote the 109. It's the number of characters you've entered.\n\
    \n**STEP 4** If you now open the text file with a text editor, you can see that\
    \ the line you created has been written to the file. This gives us the foundation\
    \ for some interesting possibilities: perhaps the creation of your own log file\
    \ or even the beginning of an adventure game.\n\n![](img/e4c529ac6a286a7773e0e7c17e263180_77_2.png)\n\
    \n![](img/e4c529ac6a286a7773e0e7c17e263180_77_3.png)\n\n## STEP 5\n\nTo expand\
    \ this code, you can reopen the file using 'a', for access or append mode. This\
    \ will add any text at the end of the original line instead of wiping the file\
    \ and creating a new one. For example:\n\n```\nt=open(\"/home/pi/Documents/text.txt\"\
    ,\"a\")\nt.write(\"\\n\")\nt.write(\" You stand and survey your surroundings.\
    \ On top of the table is some meat, and a cup of water.\\n\")\n```\n\n![](img/e4c529ac6a286a7773e0e7c17e263180_78_0.png)\n\
    \n## STEP 6\n\nYou can keep extending the text line by line, ending each with\
    \ a new line (\\n). When you're done, finish the code with t.close() and open\
    \ the file in a text editor to see the results:\n\n```\nt.write(\"The door is\
    \ made of solid oak with iron strips. It's bolted from the outside, locking you\
    \ in. You are a prisoner!.\\n\")\nt.close()\n```\n\n![](img/e4c529ac6a286a7773e0e7c17e263180_78_1.png)\n\
    \n## STEP 7\n\nThere are various types of file access to consider using the open()\
    \ function. Each depends on how the file is accessed and even the position of\
    \ the cursor. For example, r+ opens a file in read and write and places the cursor\
    \ at the start of the file.\n\n![](img/e4c529ac6a286a7773e0e7c17e263180_78_2.png)\n\
    \n## STEP 8\n\nYou can pass variables to a file that you've created in Python.\
    \ Perhaps you want the value of Pi to be written to a file. You can call Pi from\
    \ the Math module, create a new file and pass the output of Pi into the new file:\n\
    \n```\nimport math\nprint(\"Value of Pi is: \",math.pi)\nprint(\"\\nWriting to\
    \ a file now...\")\n```\n\n![](img/e4c529ac6a286a7773e0e7c17e263180_78_3.png)\n\
    \n## STEP 9\n\nNow let's create a variable called pi and assign it the value of\
    \ Pi:\n\npi=math.pi\n\nYou also need to create a new file in which to write Pi\
    \ to:\nt=open(\"/home/pi/Documents/pi.txt\",\"w\")\n\nRemember to change your\
    \ file location to your own particular system setup.\n\n![](img/e4c529ac6a286a7773e0e7c17e263180_78_4.png)\n\
    \n## STEP 10\n\nTo finish, you can use string formatting to call the variable\
    \ and write it to the file, then commit the changes and close the file:\n\nt.write(\"\
    Value of Pi is: {}\".format(pi))\nt.close()\n\nYou can see from the results that\
    \ you're able to pass any variable to a file.\n\n![](img/e4c529ac6a286a7773e0e7c17e263180_78_5.png)\n\
    \n# Exceptions\n\nWhen coding, you’ll naturally come across some issues that are\
    \ out of your control. Let’s assume you ask a user to divide two numbers and they\
    \ try to divide by zero. This will create an error and break your code.\n\n# EXCEPTIONAL\
    \ OBJECTS\n\nRather than stop the flow of your code, Python includes exception\
    \ objects which handle unexpected errors in the code. You can combat errors by\
    \ creating conditions where exceptions may occur.\n\n## STEP 1\n\nYou can create\
    \ an exception error by simply trying to divide a number by zero. This will report\
    \ back with the ZeroDivisionError: Division by zero message, as seen in the screenshot.\
    \ The ZeroDivisionError part is the exception class, of which there are many.\n\
    \n![](img/e4c529ac6a286a7773e0e7c17e263180_79_0.png)\n\n## STEP 2\n\nMost exceptions\
    \ are raised automatically when Python comes across something that’s inherently\
    \ wrong with the code. However, you can create your own exceptions that are designed\
    \ to contain the potential error and react to it, as opposed to letting the code\
    \ fail.\n\n![](img/e4c529ac6a286a7773e0e7c17e263180_79_1.png)\n\n## STEP 3\n\n\
    You can use the functions raise exception to create our own error handling code\
    \ within Python. Let’s assume your code has you warping around the cosmos, too\
    \ much however results in a warp core breach. To stop the game from exiting due\
    \ to the warp core going supernova, you can create a custom exception:\n\n```\n\
    raise Exception(\"warp core breach\")\n```\n\n![](img/e4c529ac6a286a7773e0e7c17e263180_79_2.png)\n\
    \n## STEP 4\n\nTo trap any errors in the code you can enclose the potential error\
    \ within a try: block. This block consists of try, except, else, where the code\
    \ is held within try:; then if there’s an exception do something, else do something\
    \ else.\n\n![](img/e4c529ac6a286a7773e0e7c17e263180_79_3.png)\n\n## STEP 5\n\n\
    For example, use the divide by zero error. You can create an exception where the\
    \ code can handle the error without Python quitting due to the problem:\n\n```\n\
    python\ntry:\n    a=int(input(\"Enter the first number: \"))\n    b=int(input(\"\
    Enter the second number: \"))\n    print(a/b)\nexcept ZeroDivisionError:\n   \
    \ print(\"You have tried to divide by zero!\")\nelse:\n    print(\"You didn't\
    \ divide by zero. Well done!\")\n```\n\n![](img/e4c529ac6a286a7773e0e7c17e263180_80_0.png)\n\
    \n## STEP 6\n\nYou can use exceptions to handle a variety of useful tasks. Using\
    \ an example from our previous tutorials, let's assume you want to open a file\
    \ and write to it:\n\n```\npython\ntry:\n    txt = open(\"/home/pi/Documents/textfile.txt\"\
    , \"r\")\n    txt.write(\"This is a test. Normal service will shortly resume!\"\
    )\nexcept IOError:\n    print (\"Error: unable to write the file. Check permissions\"\
    )\nelse:\n    print (\"Content written to file successfully. Have a nice day.\"\
    )\n    txt.close()\n```\n\n![](img/e4c529ac6a286a7773e0e7c17e263180_80_1.png)\n\
    \n## STEP 7\n\nObviously this won't work due to the file textfile.txt being opened\
    \ as read only (the \"r\" part). So in this case rather than Python telling you\
    \ that you're doing something wrong, you've created an exception using the IOError\
    \ class informing the user that the permissions are incorrect.\n\n![](img/e4c529ac6a286a7773e0e7c17e263180_80_2.png)\n\
    \n## STEP 8\n\nNaturally, you can quickly fix the issue by changing the \"r\"\
    \ read only instance with a \"w\" for write. This, as you already know, will create\
    \ the file and write the content then commit the changes to the file. The end\
    \ result will report a different set of circumstances, in this case, a successful\
    \ execution of the code.\n\n![](img/e4c529ac6a286a7773e0e7c17e263180_80_3.png)\n\
    \n## STEP 9\n\nYou can also use a finally: block, which works in a similar fashion\
    \ but you can't use else with it. To use our example from Step 6:\n\n```\npython\n\
    try:\n    txt = open(\"/home/pi/Documents/textfile.txt\", \"r\")\n    try:\n \
    \       txt.write(\"This is a test. Normal service will shortly resume!\")\n \
    \   finally:\n        print (\"Content written to file successfully. Have a nice\
    \ day.\")\n        txt.close()\nexcept IOError:\n    print (\"Error: unable to\
    \ write the file. Check permissions\")\n```\n\n![](img/e4c529ac6a286a7773e0e7c17e263180_80_4.png)\n\
    \n## STEP 10\n\nAs before an error will occur as you've used the \"r\" read-only\
    \ permission. If you change it to a \"w\", then the code will execute without\
    \ the error being displayed in the IDLE Shell. Needless to say, it can be a tricky\
    \ getting the exception code right the first time. Practise though, and you will\
    \ get the hang of it.\n\n![](img/e4c529ac6a286a7773e0e7c17e263180_80_5.png)"
