  md: '# # PYTHON IN NUMBERS


    > > Python creator Guido Van Rossum named Python after reading scripts from Monty
    Python''s Flying Circus.


    There’s a lot to like about Python, but don’t just take our word for it. Here
    are some amazing facts and figures surrounding one of the most popular programming
    languages of recent years.


    ![](img/e4c529ac6a286a7773e0e7c17e263180_13_0.png)


    Alexa, Amazon’s Virtual Personal Assistant, uses Python to help with speech recognition.


    ![](img/e4c529ac6a286a7773e0e7c17e263180_13_1.png)


    PYTHON AND LINUX SKILLS ARE THE THIRD MOST POPULAR I.T. SKILLS IN THE UK.


    ![](img/e4c529ac6a286a7773e0e7c17e263180_13_2.png)


    Data analysis and Machine Learning are the two most used Python examples.


    ![](img/e4c529ac6a286a7773e0e7c17e263180_13_3.png)


