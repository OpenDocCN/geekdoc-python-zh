  md: "# Simple Python Calculator\n\nSometimes the simplest code can be the most effective.\
    \ Take for example, this Simple Python Calculator script. It's based on the Create\
    \ Your Own Modules section seen earlier but doesn't utilise any external modules.\n\
    \n![](img/e4c529ac6a286a7773e0e7c17e263180_132_0.png)\n\n# CALCULATOR.PY\n\nWe\
    \ created some function definitions to begin with, then lead on to the user menu\
    \ and inputs. It's an easy piece of code to follow and as such can also be expanded\
    \ well too.\n\n```\npython\nprint(\"-----------Simple Python Calculator-----------\\\
    n\")\n\ndef add(x, y):\n    return x + y\n\ndef subtract(x, y):\n    return x\
    \ - y\n\ndef multiply(x, y):\n    return x * y\n\ndef divide(x, y):\n    return\
    \ x / y\n\nprint(\"Select operation.\\n\")\nprint(\"1.Add\")\nprint(\"2.Subtract\"\
    )\nprint(\"3.Multiply\")\nprint(\"4.Divide\")\n\nchoice = input(\"\\nEnter choice\
    \ (1/2/3/4):\")\n\nnum1 = int(input(\"\\nEnter first number: \"))\nnum2 = int(input(\"\
    Enter second number: \"))\n\nif choice == '1':\n    print(num1,\"+\",num2,\"=\"\
    , add(num1,num2))\n\nelif choice == '2':\n    print(num1,\"-\",num2,\"=\", subtract(num1,num2))\n\
    \nelif choice == '3':\n    print(num1,\"*\",num2,\"=\", multiply(num1,num2))\n\
    \nelif choice == '4':\n    print(num1,\"/\",num2,\"=\", divide(num1,num2))\nelse:\n\
    \    print(\"Invalid input\")\n```\n\n![](img/e4c529ac6a286a7773e0e7c17e263180_132_1.png)\n\
    \n# Improved Calculations\n\nThe obvious contender for improvement here is using\
    \ the Create Your Own Modules route and extracting the function definitions as\
    \ a module. You can then call the module and focus on the body of the code.\n\n\
    The other area of improvement is code itself. Where there's just a single shot\
    \ at making a calculation, you could encase it in a while loop, so once a value\
    \ is presented the user is sent back to the main menu. Perhaps, improvement to\
    \ the Invalid Input section is worth looking into as well."
