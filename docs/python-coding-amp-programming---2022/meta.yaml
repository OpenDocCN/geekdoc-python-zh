  md: '**STEP 5** Adding to a dictionary is easy too. You can include a new data item
    entry by adding the new key and value items like:


    ```

    phonebook["David"] = "0987 654 321"

    phonebook

    ```


    ![](img/e4c529ac6a286a7773e0e7c17e263180_68_0.png)


    **STEP 8** Next, you need to define the user inputs and variables: one for the
    person’s name, the other for their phone number (let’s keep it simple to avoid
    lengthy Python code):


    ```

    name=input("Enter name: ")

    number=int(input("Enter phone number: "))

    ```


    ![](img/e4c529ac6a286a7773e0e7c17e263180_68_1.png)


    **STEP 6** You can also remove items from a dictionary by issuing the del command
    followed by the item’s key; the value will be removed as well, since both work
    as a pair of data items:


    ```

    del phonebook["David"]

    ```


    ![](img/e4c529ac6a286a7773e0e7c17e263180_68_2.png)


    **STEP 9** Note we’ve kept the number as an integer instead of a string, even
    though the value can be both an integer or a string. Now you need to add the user’s
    inputted variables to the newly created blank dictionary. Using the same process
    as in Step 5, you can enter:


    ```

    phonebook[name] = number

    ```


    ![](img/e4c529ac6a286a7773e0e7c17e263180_68_3.png)


    **STEP 7** Taking this a step further, how about creating a piece of code that
    will ask the user for the dictionary key and value items? Create a new Editor
    instance and start by coding in a new, blank dictionary:


    ```

    phonebook={}

    ```


    ![](img/e4c529ac6a286a7773e0e7c17e263180_68_4.png)


    **STEP 10** Now when you save and execute the code, Python will ask for a name
    and a number. It will then insert those entries into the phonebook dictionary,
    which you can test by entering into the Shell:


    ```

    phonebook

    phonebook["David"]

    ```


    If the number needs to contain spaces you need to make it a string, so remove
    the int part of the input.


