- md: '## Python on the Pi


    If you''re considering on which platform to install and use Python, then give
    some thought to one of the best coding bases available: the Raspberry Pi. The
    Pi has many advantages for the coder: it''s cheap, easy to use, and extraordinarily
    flexible.


    ## THE POWER OF PI


    While having a far more powerful coding platform on which to write and test your
    code is ideal, it''s not often feasible. Most of us are unable to jump into a
    several hundred-pound investment when we''re starting off and this is where the
    Raspberry Pi can help out.


    While having a far more powerful coding platform on which to write and test your
    code is ideal, it''s not often feasible. Most of us are unable to jump into a
    several hundred-pound investment when we''re starting off and this is where the
    Raspberry Pi can help out.


    kits available will provide the Pi with a pre-loaded SD card (with the latest
    Raspbian OS), a case, power socket and cables, this is a good idea as you could,
    with very little effort, leave the Pi plugged into the wall under a desk, while
    still being able to connect to it and code.


    The Raspberry Pi is a fantastic piece of modern hardware that has created, or
    rather re-created, the fascination we once all had about computers, how they work,
    how to code and foundation level electronics. Thanks to its unique mix of hardware
    and custom software, it has proved itself to be an amazing platform on which to
    learn how to code; specifically, using Python.


    The main advantage is, of course, the extra content that the Raspberry Pi Foundation
    has included out of the box. The reason for this is that the Raspberry Pi''s goal
    is to help educate the user, whether that''s coding, electronics, or some other
    aspect of computing. To achieve that goal the Pi Foundation includes different
    IDEs for the user to compile Python code on; as well as both Python 2 and Python
    3, there''s even a Python library that allows you to communicate with Minecraft.


    While you''re able, with ease, to use the Raspberry Pi to learn to code with other
    programming languages, it''s Python that has been firmly pushed to the forefront.
    The Raspberry Pi uses Raspbian as its recommended, default operating system. Raspbian
    is a Linux OS, or to be more accurate, it''s a Debian-based distribution of Linux.
    This means that there''s already a built-in element of Python programming, as
    opposed to a fresh installation of Windows 10, which has no Python-specific base.
    However, the Raspberry Pi Foundation has gone the extra mile to include a vast
    range of Python modules, extensions and even examples, out of the box. So, essentially,
    all you need to do is buy a Raspberry Pi, follow the instructions on how to set
    one up (by using one of our excellent Raspberry Pi guides found at www.bdmpublications.com)
    and you can start coding with Python as soon as the desktop has loaded.


    There are other advantages, such as being able to combine Python code with Scratch
    (an Object-Oriented programming language developed by MIT, for children to understand
    how coding works) and being able to code the GPIO connection on the Pi to further
    control any attached robotics or electronics projects. Raspbian also includes
    a Sense HAT Emulator (a HAT is a hardware attached piece of circuitry that offers
    different electronics, robotics and motorisation projects to the Pi), which can
    be accessed via Python code.


    Significantly, there''s a lot more to the Raspberry Pi, which makes it an excellent
    choice for someone who is starting to learn how to code in Python. The Pi is remarkably
    easy to set up as a headless node. This means that, with a few tweaks here and
    there, you''re able to remotely connect to the Raspberry Pi from any other computer,
    or device, on your home network. For example, once you''ve set up the remote connectivity
    options, you can simply plug the Pi into the power socket anywhere in your house
    within range of your wireless router. As long as the Pi is connected, you will
    be able to remotely access the desktop from Windows or macOS as easily as if you
    were sitting in front of the Pi with a keyboard and mouse.


    Consequently, the Raspberry Pi is an excellent coding base, as well as a superb
    project foundation. It is for these, and many other, reasons we''ve used the Raspberry
    Pi as our main Python codebase throughout this title. While the code is written
    and performed on a Pi, you''re also able to use it in Windows, other versions
    of Linux and macOS. If the code requires a specific operating system, then, don''t
    worry; we will let you know in the text.


    Using this method saves a lot of money, as you don''t need another keyboard, mouse
    and monitor, plus, you won''t need to allocate sufficient space to accommodate
    those extras either. If you''re pushed for space and money, then for around £60,
    buying one of the many


    ![](img/e4c529ac6a286a7773e0e7c17e263180_17_0.png)


    ## PI 4-EVER!


    Introduced on 24th June 2019, the Raspberry Pi 4 Model B is a significant leap
    in terms of Pi performance and hardware specifications. It was also one of the
    quickest models, aside from the original Pi, to sell out.


    With a new 1.5GHz, 64-bit, quad-core ARM Cortex-A72 processor, and a choice of
    1GB, 2GB, or 4GB memory versions, the Pi 4 is one-step closer to becoming a true
    desktop computer. In addition, the Pi 4 was launched with the startling decision
    to include dual-monitor support, in the form of a pair of two micro-HDMI ports.
    You''ll also find a pair of USB 3.0 ports, Bluetooth 5.0, and a GPU that''s capable
    of handling 4K resolutions and OpenGL ES 3.0 graphics.


    In short, the Pi 4 is the most powerful of the current Raspberry Pi models. However,
    the different memory versions have an increased cost. The 1GB version costs £34,
    2GB is £44, and the 4GB version will set you back £54. Remember to also factor
    in one or two micro-HDMI cables with your order.


    ## RASPBIAN BUSTER


    In addition to releasing the Pi 4, the Raspberry Pi team also compiled a new version
    of the Raspbian operating system, codenamed Buster.


    In conjunction with the new hardware the Pi 4 boasts, Buster does offer a few
    updates. Although on the whole it''s very similar in appearance and operation
    to the previous version of Raspbian. The updates are mainly in-line with the 4K''s
    display and playback, giving the Pi 4 a new set of graphical drivers and performance
    enhancements.


    In short, what you see in this book will work with the Raspberry Pi 4 and Raspbian
    Buster!


    ![](img/e4c529ac6a286a7773e0e7c17e263180_18_1.png)


    Once set up, you can remotely connect to the Pi''s desktop from any device/PC.


    You can even test connected hardware with Python remotely, via Windows.


    ![](img/e4c529ac6a286a7773e0e7c17e263180_18_2.png)


    ![](img/e4c529ac6a286a7773e0e7c17e263180_18_3.png)


    # Using Virtual Machines


    A Virtual Machine allows you to run an entire operating system from within an
    app on your desktop. This way, you’re able to host multiple systems in a secure,
    safe and isolated environment. In short, it’s an ideal way to code.


    Sounds good, but what exactly is a Virtual Machine (VM) and how does it work?


    The official definition of a virtual machine is ''an efficient, isolated duplicate
    of a real computer machine''. This basically means that a virtual machine is an
    emulated computer system that can operate in exactly the same way as a physical
    machine, but within the confines of a dedicated virtual machine operator, or Hypervisor.


    The Hypervisor itself, is an app that will allow you to install a separate operating
    system, creating a virtual computer system within itself, complete with access
    to the Internet, your home network and so on.


    The Hypervisor will take resources from the host system - your physical computer,
    to create the virtual computer. This means that part of your physical computer’s:
    memory, CPU, hard drive space and other shared resources, will be set aside for
    use in the virtual machine and therefore won’t be available to the physical computer
    until the hypervisor has been closed down.


    ![](img/e4c529ac6a286a7773e0e7c17e263180_19_0.png)


    The limit to how many different virtual machines you host on your physical computer
    is restricted, therefore, by the amount of physical system resources you can allocate
    to each, while still leaving enough for your physical computer to operate on.


    -   Our Linux titles contain steps on how to install a hypervisor and OS.


    ![](img/e4c529ac6a286a7773e0e7c17e263180_19_1.png)


    This resource overhead can be crippling for the physical machine if you don’t
    already have enough memory, or hard drive space available, or your computer has
    a particularly slow processor. While it’s entirely possible to run virtual machines
    on as little as 2GB of memory, it’s not advisable. Ideally, you will need a minimum
    of 8GB of memory (you can get away with 4GB, but again, your physical computer
    will begin to suffer with the loss of memory to the virtual machine), at least
    25 to 50GB of free space on your hard drive and a quad-core processor (again,
    you can have a dual-core CPU, but that can cause a bottleneck on your physical
    computer).


    -   You’re able to install Linux, and code inside a virtual machine on a Windows
    10 host.


    ## VIRTUAL OS


    From within a hypervisor you’re able to run a number of different operating systems.
    The type of OS depends greatly on the hypervisor you’re running, as some are better
    at emulating a particular system over others. For example, VirtualBox, a free
    and easy to use hypervisor from Oracle, is great at running Windows and Linux
    virtual machines, but isn’t so good at Android or macOS. QEMU is good for emulating
    ARM processors, therefore ideal for Android and such, but it can be difficult
    to master.


    There are plenty of hypervisors available to try for free, with an equal amount
    commercially available that are significantly more powerful and offer better features.
    However, for most users, both beginner and professional, VirtualBox does a good
    enough job.


    Within a hypervisor, you’re able to set up and install any of the newer distributions
    of Linux, or if you feel the need, you’re also able to install some of the more
    antiquated versions. You can install early versions of Windows, even as far back
    as Windows 3 complete with DOS 6.22 – although you may find some functionality
    of the VM lost due to the older drivers (such as access to the network).


    With this in mind then, you’re able to have an installation of Linux Mint, or
    the latest version of Ubuntu, running in an app on your Windows 10 PC. This is
    the beauty of using a virtual machine. Conversely, if your physical computer has
    Linux as its installed operating system, then with a hypervisor you’re able to
    create a Windows 10 virtual machine – although you will need to have a licence
    code available to register and activate Windows 10.'
  mdcn: '## 在树莓派上使用Python


    如果你正在考虑在哪个平台上安装和使用Python，那么不妨考虑一下目前最好的编程平台之一：树莓派。树莓派对程序员来说有许多优势：它价格低廉、易于使用，并且具有非凡的灵活性。


    ## 树莓派的强大之处


    虽然拥有一个功能更强大的编程平台来编写和测试代码是理想的选择，但这并不总是可行的。我们大多数人在刚开始时无法投入数百英镑的投资，而这正是树莓派可以提供帮助的地方。


    虽然拥有一个功能更强大的编程平台来编写和测试代码是理想的选择，但这并不总是可行的。我们大多数人在刚开始时无法投入数百英镑的投资，而这正是树莓派可以提供帮助的地方。


    市面上的套件通常会提供一张预装了最新Raspbian操作系统的SD卡、一个外壳、电源插座和线缆，这是一个好主意，因为你可以毫不费力地将树莓派插在桌子下面的墙上，同时仍然能够连接到它并进行编程。


    树莓派是一款出色的现代硬件，它创造——或者更准确地说，是重新创造了我们曾经对计算机、它们的工作原理、如何编程以及基础电子学所怀有的那种迷恋。得益于其独特的硬件和定制软件组合，它已被证明是一个令人惊叹的学习编程的平台；特别是使用Python。


    当然，主要优势在于树莓派基金会开箱即用提供的额外内容。这样做的原因是树莓派的目标是帮助教育用户，无论是编程、电子学还是计算的其他方面。为了实现这一目标，树莓派基金会为用户提供了不同的集成开发环境来编译Python代码；除了Python
    2和Python 3，甚至还有一个允许你与Minecraft通信的Python库。


    虽然你可以轻松地使用树莓派来学习使用其他编程语言进行编程，但Python已被坚定地推到了最前沿。树莓派使用Raspbian作为其推荐的默认操作系统。Raspbian是一个Linux操作系统，或者更准确地说，它是一个基于Debian的Linux发行版。这意味着它已经内置了Python编程元素，这与全新安装的Windows
    10不同，后者没有特定的Python基础。然而，树莓派基金会更进一步，开箱即用地包含了大量Python模块、扩展甚至示例。因此，本质上，你所需要做的就是购买一个树莓派，按照说明设置好它（使用我们在www.bdmpublications.com上提供的优秀树莓派指南），然后在桌面加载完成后就可以立即开始使用Python编程。


    还有其他优势，例如能够将Python代码与Scratch（麻省理工学院开发的一种面向对象的编程语言，旨在帮助儿童理解编程的工作原理）结合起来，以及能够对树莓派上的GPIO连接进行编程，以进一步控制任何连接的机器人或电子项目。Raspbian还包括一个Sense
    HAT模拟器（HAT是一种硬件附加电路板，为树莓派提供不同的电子、机器人和自动化项目），可以通过Python代码访问。


    重要的是，树莓派还有更多优点，这使其成为开始学习Python编程的人的绝佳选择。树莓派非常容易设置为无头节点。这意味着，只需进行一些调整，你就可以从家庭网络中的任何其他计算机或设备远程连接到树莓派。例如，一旦你设置了远程连接选项，你只需将树莓派插入无线路由器覆盖范围内的家中任何地方的电源插座即可。只要树莓派已连接，你就可以像坐在树莓派前使用键盘和鼠标一样轻松地从Windows或macOS远程访问桌面。


    因此，树莓派不仅是一个出色的编程平台，也是一个极佳的项目基础。正是由于这些以及许多其他原因，我们在本书中一直将树莓派作为主要的Python编程平台。虽然代码是在树莓派上编写和运行的，但你也可以在Windows、其他版本的Linux和macOS上使用它。如果代码需要特定的操作系统，别担心；我们会在文中说明。


    使用这种方法可以节省大量资金，因为你不需要另一个键盘、鼠标和显示器，而且你也不需要分配足够的空间来容纳这些额外的设备。如果你空间和资金紧张，那么只需大约60英镑，购买一个市面上的许多


    ![](img/e4c529ac6a286a7773e0e7c17e263180_17_0.png)


    ## 树莓派4，永恒经典！


    树莓派4型号B于2019年6月24日发布，在性能和硬件规格方面实现了重大飞跃。它也是继初代树莓派之后最快售罄的型号之一。


    凭借全新的1.5GHz、64位、四核ARM Cortex-A72处理器，以及1GB、2GB或4GB内存版本的选择，树莓派4向成为真正的台式计算机迈进了一步。此外，树莓派4发布时做出了一个惊人的决定，即通过一对两个micro-HDMI端口提供双显示器支持。你还会发现一对USB
    3.0端口、蓝牙5.0，以及一个能够处理4K分辨率和OpenGL ES 3.0图形的GPU。


    简而言之，树莓派4是目前最强大的树莓派型号。然而，不同的内存版本成本有所增加。1GB版本售价34英镑，2GB版本44英镑，4GB版本则需要54英镑。记得在订单中也考虑一两条micro-HDMI线缆。


    ## RASPBIAN BUSTER


    除了发布树莓派4，树莓派团队还编译了新版本的Raspbian操作系统，代号为Buster。


    结合树莓派4所搭载的新硬件，Buster确实提供了一些更新。尽管总体上，它在外观和操作上与之前的Raspbian版本非常相似。更新主要与4K显示和播放有关，为树莓派4提供了一套新的图形驱动程序和性能增强。


    简而言之，你在本书中看到的内容将适用于树莓派4和Raspbian Buster！


    ![](img/e4c529ac6a286a7773e0e7c17e263180_18_1.png)


    设置完成后，你可以从任何设备/PC远程连接到树莓派的桌面。


    你甚至可以通过Windows远程测试连接的硬件。


    ![](img/e4c529ac6a286a7773e0e7c17e263180_18_2.png)


    ![](img/e4c529ac6a286a7773e0e7c17e263180_18_3.png)


    # 使用虚拟机


    虚拟机允许你从桌面应用程序中运行整个操作系统。这样，你可以在一个安全、可靠且隔离的环境中托管多个系统。简而言之，这是一种理想的编程方式。


    听起来不错，但虚拟机（VM）到底是什么，它是如何工作的？


    虚拟机的官方定义是“真实计算机的高效、隔离的副本”。这基本上意味着虚拟机是一个模拟的计算机系统，其运行方式与物理机器完全相同，但局限于专用的虚拟机管理程序或Hypervisor内。


    Hypervisor本身是一个应用程序，它允许你安装一个单独的操作系统，在其内部创建一个虚拟计算机系统，并完整地访问互联网、你的家庭网络等。


    Hypervisor将从主机系统——你的物理计算机中获取资源来创建虚拟计算机。这意味着你的物理计算机的部分：内存、CPU、硬盘空间和其他共享资源，将被预留用于虚拟机，因此在Hypervisor关闭之前，这些资源将无法供物理计算机使用。


    ![](img/e4c529ac6a286a7773e0e7c17e263180_19_0.png)


    因此，你可以在物理计算机上托管的不同虚拟机的数量受到限制，这取决于你可以分配给每个虚拟机的物理系统资源量，同时还要为物理计算机的运行留出足够的资源。


    -   我们的Linux书籍包含了如何安装Hypervisor和操作系统的步骤。


    ![](img/e4c529ac6a286a7773e0e7c17e263180_19_1.png)


    如果你没有足够的内存或硬盘空间，或者你的计算机处理器特别慢，这种资源开销可能会对物理机造成严重影响。虽然完全可以在只有2GB内存的情况下运行虚拟机，但这并不建议。理想情况下，你至少需要8GB内存（4GB也可以，但同样，你的物理计算机会因为内存分配给虚拟机而开始受影响），硬盘上至少有25到50GB的可用空间，以及一个四核处理器（同样，双核CPU也可以，但这可能会导致物理计算机出现瓶颈）。


    -   你可以在Windows 10主机上的虚拟机中安装Linux并进行编程。


    ## 虚拟操作系统


    在Hypervisor内，你可以运行多种不同的操作系统。操作系统的类型在很大程度上取决于你所使用的Hypervisor，因为有些Hypervisor在模拟特定系统方面比其他Hypervisor更出色。例如，VirtualBox是Oracle提供的一款免费且易于使用的Hypervisor，它在运行Windows和Linux虚拟机方面表现出色，但在运行Android或macOS方面则不那么好。QEMU擅长模拟ARM处理器，因此非常适合Android等系统，但它可能难以掌握。


    有许多免费的Hypervisor可供尝试，同样也有许多商业可用的Hypervisor，它们功能更强大，提供更好的特性。然而，对于大多数用户，无论是初学者还是专业人士，VirtualBox都做得足够好。


    在Hypervisor内，你可以设置和安装任何较新的Linux发行版，或者如果你觉得有必要，也可以安装一些较旧的版本。你可以安装早期版本的Windows，甚至可以追溯到带有DOS
    6.22的Windows 3——尽管你可能会发现由于旧驱动程序（例如网络访问）的原因，虚拟机的某些功能会丢失。


    考虑到这一点，你可以在Windows 10 PC上的应用程序中运行Linux Mint或最新版本的Ubuntu。这就是使用虚拟机的魅力所在。相反，如果你的物理计算机安装的是Linux操作系统，那么通过Hypervisor，你可以创建一个Windows
    10虚拟机——尽管你需要一个许可证密钥来注册和激活Windows 10。'
