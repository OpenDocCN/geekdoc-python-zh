  md: '# Saving and Executing Your Code


    While working in the IDLE Shell is perfectly fine for small code snippets, it’s
    not designed for entering longer program listings. In this section you’re going
    to be introduced to the IDLE Editor, where you will be working from now on.


    # EDITING CODE


    You will eventually reach a point where you have to move on from inputting single
    lines of code into the Shell. Instead, the IDLE Editor will allow you to save
    and execute your Python code.


    **STEP 1** First, open the Python IDLE Shell and when it’s up, click on File ->
    New File. This will open a new window with Untitled as its name. This is the Python
    IDLE Editor and within it you can enter the code needed to create your future
    programs.


    **STEP 3** You can see that the same colour coding is in place in the IDLE Editor
    as it is in the Shell, enabling you to better understand what’s going on with
    your code. However, to execute the code you need to first save it. Press F5 and
    you get a Save...Check box open.


    ![](img/e4c529ac6a286a7773e0e7c17e263180_37_0.png)


    ![](img/e4c529ac6a286a7773e0e7c17e263180_37_1.png)


    **STEP 2** The IDLE Editor is, for all intents and purposes, a simple text editor
    with Python features, colour coding and so on; much in the same vein as Sublime.
    You enter code as you would within the Shell, so taking an example from the previous
    tutorial, enter:


    `print("Hello everyone!")`


    **STEP 4** Click on the OK button in the Save box and select a destination where
    you’ll save all your Python code. The destination can be a dedicated folder called
    Python or you can just dump it wherever you like. Remember to keep a tidy drive
    though, to help you out in the future.


    ![](img/e4c529ac6a286a7773e0e7c17e263180_37_2.png)


    ![](img/e4c529ac6a286a7773e0e7c17e263180_37_3.png)'
  merge: -1
  pgno: 37
- img_proc: true
  md: '# STEP 5


    Enter a name for your code, ''print hello'' for example, and click on the Save
    button. Once the Python code is saved it''s executed and the output will be detailed
    in the IDLE Shell. In this case, the words ''Hello everyone!''.


    ![](img/e4c529ac6a286a7773e0e7c17e263180_38_0.png)


    # STEP 6


    This is how the vast majority of your Python code will be conducted. Enter it
    into the Editor, hit F5, save the code and look at the output in the Shell. Sometimes
    things will differ, depending on whether you''ve requested a separate window,
    but essentially that''s the process. It''s the process we will use throughout
    this book, unless otherwise stated.


    ![](img/e4c529ac6a286a7773e0e7c17e263180_38_1.png)


    # STEP 7


    If you open the file location of the saved Python code, you can see that it ends
    in a .py extension. This is the default Python file name. Any code you create
    will be whatever.py and any code downloaded from the many Internet Python resource
    sites will be .py. Just ensure that the code is written for Python 3.


    ![](img/e4c529ac6a286a7773e0e7c17e263180_38_2.png)


    # STEP 8


    Let''s extend the code and enter a few examples from the previous tutorial:


    ```

    a=2

    b=2

    name="David"

    surname="Hayward"

    print (name, surname)

    print (a+b)

    ```


    If you press F5 now you''ll be asked to save the file, again, as it''s been modified
    from before.


    ![](img/e4c529ac6a286a7773e0e7c17e263180_38_3.png)


    # STEP 9


    If you click the OK button, the file will be overwritten with the new code entries,
    and executed, with the output in the Shell. It''s not a problem with just these
    few lines but if you were to edit a larger file, overwriting can become an issue.
    Instead, use File > Save As from within the Editor to create a backup.


    ![](img/e4c529ac6a286a7773e0e7c17e263180_38_4.png)


    # STEP 10


    Now create a new file. Close the Editor, and open a new instance (File > New File
    from the Shell). Enter the following and save it as hello.py:


    ```

    a="Python"

    b="is"

    c="cool!"

    print(a, b, c)

    ```


    You will use this code in the next tutorial.


    ![](img/e4c529ac6a286a7773e0e7c17e263180_38_5.png)'
