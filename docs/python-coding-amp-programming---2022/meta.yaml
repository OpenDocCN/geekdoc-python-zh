    在终端中创建、移动和删除目录不像在桌面界面中那样简单直观。你需要指示 Linux 将目录移动到其他目录内，这个过程被称为递归。听起来复杂，但你应该很快就能掌握。


    ### 管理文件和目录


    既然你已经知道如何创建文件，接下来你会想学习如何创建目录（这与文件夹是同一回事），以及如何移动项目。如果你更习惯于使用桌面界面，这可能需要一点时间来适应。


    **步骤 1** 输入：`ls` 以快速查看当前主位置中的所有目录。目录是使用“mkdir”命令（创建目录）来创建的。输入：`mkdir testdir`
    以在你的主目录中创建一个新目录。再次输入：`ls` 来查看它。


    ```bash

    pi@raspberrypi ~ $ ls

    Desktop Documents Downloads indicity python_games Scra

    pi@raspberrypi ~ $ mkdir testdir

    pi@raspberrypi ~ $ ls

    Desktop Documents Downloads indicity python_games Scra

    pi@raspberrypi ~ $ _

    ```


    **步骤 2** “mkdir”命令与 touch 不同，因为如果你用它对一个已存在的目录操作，它不会更新时间戳。再次输入：`mkdir testdir`，你会得到错误信息
    “mkdir: cannot create directory ‘testdir’: File exists”。


    ```bash

    pi@raspberrypi ~ $ mkdir testdir

    mkdir: cannot create directory ‘testdir’: File exists

    pi@raspberrypi ~ $ _

    ```


    **步骤 3** 与 touch 类似，你可以使用 mkdir 命令一次创建多个目录。输入：`mkdir testdir2 testdir3`，然后输入：`ls`。你现在会发现几个名为
    testdir 的目录。另外，和文件一样，你应该知道这意味着你不能（而且真的不应该）创建包含空格的目录。与文件一样，请使用下划线（“_”）字符代替空格。


    ```bash

    pi@raspberrypi ~ $ mkdir testdir2 testdir3

    pi@raspberrypi ~ $ ls

    Desktop Documents Downloads indicity python_games Scra

    pi@raspberrypi ~ $ _

    ```


    **步骤 4** 你可以使用目录路径在目录内创建目录。输入：`mkdir Documents/photos` 以在你的文档目录内创建一个名为“photos”的新目录。不过，该目录必须已存在，尝试输入：`mkdir
    articles/reports`，你会得到一个错误，因为没有 articles 目录。


    ```bash

    pi@raspberrypi ~ $ ls

    Desktop Documents Downloads indicity python_games Scra

    pi@raspberrypi ~ $ mkdir Documents/photos

    pi@raspberrypi ~ $ mkdir articles/reports

    mkdir: cannot create directory ‘articles/reports’: No such f

    pi@raspberrypi ~ $ _

    ```


    **步骤 5** 要创建目录路径，你需要向 mkdir 传递“p”选项（代表“parents”）。如果你记得，选项跟在命令后面，以“-”开头。所以输入：`mkdir
    -p articles/reports`。输入：`ls` 查看 articles 目录，或输入 `ls articles` 查看其中的 reports 目录。


    **步骤 6** 现在你开始接触更高级的内容，我们要重申一点。在 Linux 中，命令结构始终是：命令、选项和参数，按此顺序。命令是功能，接下来是选项（通常是带“-”开头的单个字母），最后是参数（通常是文件或目录结构）。始终是命令、选项，然后是参数。


    ```bash

    pi@raspberrypi ~ $ mkdir -p articles/reports

    ```


    ```bash

    pi@raspberrypi ~ $ ls -l articles

    total 4

    drwxr-xr-x 2 pi pi 4096 May 13 12:36 reports

    pi@raspberrypi ~ $ _

    ```


    ### 删除目录


    在 Linux 中，删除目录和文件相当容易，但这可能成为一个问题。很容易删除包含文件的整个目录，而且这些内容会被立即移除，不会进入回收站。请务必谨慎操作。


    **步骤 1** 我们将使用“rmdir”命令删除之前创建的一个目录。输入：`ls` 查看当前目录中的文件和目录。我们先从删除一个测试目录开始。输入：`rmdir
    testdir3`，然后再次输入 `ls` 以确认该目录已被移除。


    ```bash

    pi@raspberrypi ~ $ ls

    articles Desktop Documents Downloads indiecity python_g

    pi@raspberrypi ~ $ rmdir testdir3_

    ```


    **步骤 2** 现在我们尝试删除 articles 目录（其中包含 reports 目录）。输入：`rmdir articles` 并按回车键。你会得到一个错误信息：“rmdir:
    failed to remove ''articles'': Directory not empty”。这很令人困惑；rmdir 命令只能删除其中没有任何内容（没有文件或其他目录）的目录。


    ```bash

    pi@raspberrypi ~ $ rmdir articles

    rmdir: failed to remove ''articles'': Directory not empty

    pi@raspberrypi ~ $ _

    ```


    **步骤 3** 要删除包含文件或其他目录的目录，你需要回到用于删除文件的“rm”命令，只是现在我们需要使用“-R”选项（代表“recursive”）。使用“rm
    -R”会递归删除你指向的所有文件和目录。输入：`rm -R articles` 以移除 articles 目录。


    ```bash

    pi@raspberrypi ~ $ ls

    articles Desktop Downloads indiecity python_games Scrat

    pi@raspberrypi ~ $ rm -R articles

    pi@raspberrypi ~ $ ls

    Desktop Documents Downloads indiecity python_games Scrat

    pi@raspberrypi ~ $

    ```


    **步骤 4** 与删除多个文件一样，你可以使用带有通配符（*）的“rm”命令删除同一目录内的多个目录。不过，应谨慎操作，因此使用 `-i` 选项（代表“interactive”）。这会在每次删除前提示你。输入：`rm
    -Ri test*`，并在每次提示时按 `y` 和 `return` 键。在使用 rm 命令时，使用 `-i` 选项是一个好习惯。


    ```bash

    pi@raspberrypi ~ $ rm -Ri test*

    rm: remove directory `testdir''? y

    rm: remove directory `testdir2''? y

    rm: remove directory `testdir3''? y_

    ```


    ## 复制、移动和重命名文件


    在学习树莓派操作系统工作原理时，掌握终端命令至关重要。文件的复制、移动和重命名同样重要，因为你会在树莓派项目中大量进行这些操作。


    ### 使用移动命令


    在 Linux 中，重命名文件就是将它从一个名称移动到另一个名称，而复制文件则是移动它而不删除原始文件。别慌，这很容易掌握。


    **步骤 1** 在移动任何东西之前，我们需要在主目录中有一些测试项目。输入：`touch testfile` 和 `mkdir testdir` 以在你的主目录中创建一个测试文件和测试目录。输入：`ls`
    检查它们是否都存在。


    ```bash

    pi@raspberrypi ~ $ touch testfile

    pi@raspberrypi ~ $ mkdir testdir

    pi@raspberrypi ~ $ ls

    Desktop  Documents  Downloads  indexcity  python_games  Scr...

    pi@raspberrypi ~ $

    ```


    **步骤 2** 文件和目录使用 mv 命令移动。这与我们之前看过的命令不同，因为它有两个参数（记住 Linux 命令行是 命令，选项，参数）。第一个参数是源（要移动的文件或目录），第二个是目标。


    ```bash

    pi@raspberrypi ~ $ ls

    Desktop  Documents  Downloads  indexcity  python_games  Scra...

    pi@raspberrypi ~ $ mv testfile testdir

    pi@raspberrypi ~ $

    ```


    **步骤 3** 输入：`mv testfile testdir` 并按回车键，将 testfile 文档移动到 testdir 目录中。输入：`ls` 查看它不再位于主目录中，输入
    `ls testdir` 查看 testfile 现在位于 testdir 目录中。现在输入：`mkdir newparent` 以创建一个新目录。


    ```bash

    pi@raspberrypi ~ $ ls

    Desktop  Documents  Downloads  indexcity  python_games  Sca...

    pi@raspberrypi ~ $ mv testfile testdir

    pi@raspberrypi ~ $ ls testdir

    testfile

    pi@raspberrypi ~ $

    ```


    **步骤 4** 包含文件的目录移动方式相同。输入：`mv testdir newparent` 将 testdir 目录移动到 newparent 目录内。让我们进入该目录查看文件。输入：`cd
    newparent/testdir`，然后输入：`ls` 查看目录内的 testfile。


    ```bash

    pi@raspberrypi ~ $ ls

    Desktop  Documents  Downloads  indexcity  python_games  Sca...

    pi@raspberrypi ~ $ mkdir newparent

    pi@raspberrypi ~ $ mv testdir newparent

    pi@raspberrypi ~ $ cd newparent/testdir

    pi@raspberrypi ~/newparent/testdir $ ls

    testfile

    pi@raspberrypi ~/newparent/testdir $

    ```'
