    \ 术语表\n\n![](img/e4c529ac6a286a7773e0e7c17e263180_5_0.png)\n\n# 入门\n\nPython 是一种高级、通用编程语言，由吉多·范罗苏姆在八十年代末开发，它基于多种其他语言，同时是流行的\
    \ ABC 语言的后继者。\n\n它的设计旨在符合人类思维，因此可读性强、易于理解，无需深入钻研晦涩的机器代码、十六进制字符，甚至是 0 和 1。它清晰、逻辑性强、全面、强大且实用，同时易于上手和学习。\n\
    \n你会发现 Python 是世界上一些最有趣、最前沿技术的核心。它是连接超级计算机算法的代码；它用于航天工业、科学和工程领域。人工智能，以及 Alexa\
    \ 和 Siri、Cortana 和 Google 助手等，都利用 Python 实现其强大的语音识别技术。它简直是一种令人惊叹、多功能且不可思议的语言。\n\
    \n那么，让我们开始探索成为一名 Python 程序员需要了解什么。\n\n- 8 成为一名程序员\n- 10 编码简史\n- 12 你能用 Python\
