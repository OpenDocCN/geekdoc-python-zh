- md: "## Conditions and Loops\n\nConditions and loops are what make a program interesting;\
    \ they can be simple or rather complex. How you use them depends greatly on what\
    \ the program is trying to achieve; they could be the number of lives left in\
    \ a game or just displaying a countdown.\n\n## TRUE CONDITIONS\n\nKeeping conditions\
    \ simple to begin with makes learning to program a more enjoyable experience.\
    \ Let's start then by checking if something is TRUE, then doing something else\
    \ if it isn't.\n\n### STEP 1\n\nLet's create a new Python program that will ask\
    \ the user to input a word, then check it to see if it's a four-letter word or\
    \ not. Start with File > New File, and begin with the input variable:\n\n```\n\
    word=input(\"Please enter a four-letter word: \")\n```\n\n### STEP 2\n\nNow we\
    \ can create a new variable, then use the len function and pass the word variable\
    \ through it to get the total number of letters the user has just entered:\n\n\
    ```\nword=input(\"Please enter a four-letter word: \")\nword_length=len(word)\n\
    ```\n\n### STEP 3\n\nNow you can use an if statement to check if the word_length\
    \ variable is equal to four and print a friendly confirmation if it applies to\
    \ the rule:\n\n```\nword=input(\"Please enter a four-letter word: \")\nword_length=len(word)\n\
    if word_length == 4:\n    print (word, \"is a four-letter word. Well done.\")\n\
    ```\n\nThe double equal sign (==) means check if something is equal to something\
    \ else.\n\n### STEP 4\n\nThe colon at the end of IF tells Python that if this\
    \ statement is true do everything after the colon that's indented. Next, move\
    \ the cursor back to the beginning of the Editor:\n\n```\nword=input(\"Please\
    \ enter a four-letter word: \")\nword_length=len(word)\nif word_length == 4:\n\
    \    print (word, \"is a four-letter word. Well done.\")\nelse:\n    print (word,\
    \ \"is not a four-letter word.\")\n```\n\n### STEP 5\n\nPress F5 and save the\
    \ code to execute it. Enter a four-letter word in the Shell to begin with, you\
    \ should have the returned message that it's the word is four letters. Now press\
    \ F5 again and rerun the program but this time enter a five-letter word. The Shell\
    \ will display that it's not a four-letter word.\n\n### STEP 6\n\nNow expand the\
    \ code to include another condition. Eventually, it could become quite complex.\
    \ We've added a condition for three-letter words:\n\n```\nword=input(\"Please\
    \ enter a four-letter word: \")\nword_length=len(word)\nif word_length == 4:\n\
    \    print (word, \"is a four-letter word. Well done.\")\nelif word_length ==\
    \ 3:\n    print (word, \"is a three-letter word. Try again.\")\nelse:\n    print\
    \ (word, \"is not a four-letter word.\")\n```\n\n## LOOPS\n\nA loop looks quite\
    \ similar to a condition but they are somewhat different in their operation. A\
    \ loop will run through the same block of code a number of times, usually with\
    \ the support of a condition.\n\n### STEP 1\n\nLet's start with a simple While\
    \ statement. Like IF, this will check to see if something is TRUE, then run the\
    \ indented code:\n\n```\nx = 1\nwhile x < 10:\n    print (x)\n    x = x + 1\n\
    ```\n\n### STEP 2\n\nThe difference between if and while is when while gets to\
    \ the end of the indented code, it goes back and checks the statement is still\
    \ true. In our example x is less than 10. With each loop it prints the current\
    \ value of x, then adds one to that value. When x does eventually equal 10 it\
    \ stops.\n\n### STEP 3\n\nThe For loop is another example. For is used to loop\
    \ over a range of data, usually a list stored as variables inside square brackets.\
    \ For example:\n\n```\nwords=[\"Cat\", \"Dog\", \"Unicorn\"]\nfor word in words:\n\
    \    print (word)\n```\n\n### STEP 4\n\nThe For loop can also be used in the countdown\
    \ example by using the range function:\n\n```\nfor x in range (1, 10):\n    print\
    \ (x)\n```\n\nThe x=x+1 part isn't needed here because the range function creates\
    \ a list between the first and last numbers used.\n\n## Python Modules\n\nWe’ve\
    \ mentioned modules previously, (the Math module) but as modules are such a large\
    \ part of getting the most from Python, it’s worth dedicating a little more time\
    \ to them. In this instance we’re using the Windows version of Python 3.\n\n##\
    \ MASTERING MODULES\n\nThink of modules as an extension that’s imported into your\
    \ Python code to enhance and extend its capabilities. There are countless modules\
    \ available and as we’ve seen, you can even make your own.\n\n### STEP 1\n\nAlthough\
    \ good, the built-in functions within Python are limited. The use of modules,\
    \ however, allows us to make more sophisticated programs. As you are aware, modules\
    \ are Python scripts that are imported, such as import math.\n\n### STEP 2\n\n\
    Some modules, especially on the Raspberry Pi, are included by default, the Math\
    \ module being a prime example. Sadly, other modules aren’t always available.\
    \ A good example on non-Pi platforms is the Pygame module, which contains many\
    \ functions to help create games. Try: `import pygame`.\n\n### STEP 3\n\nThe result\
    \ is an error in the IDLE Shell, as the Pygame module isn’t recognised or installed\
    \ in Python. To install a module we can use PIP (Pip Installs Packages). Close\
    \ down the IDLE Shell and drop into a command prompt or Terminal session. At an\
    \ elevated admin command prompt, enter: `pip install pygame`\n\n### STEP 4\n\n\
    The PIP installation requires an elevated status due it installing components\
    \ at different locations. Windows users can search for CMD via the Start button\
    \ and right-click the result then click Run as Administrator. Linux and Mac users\
    \ can use the Sudo command, with sudo pip install package.\n\n### STEP 5\n\nClose\
    \ the command prompt or Terminal and relaunch the IDLE Shell. When you now enter:\
    \ `import pygame`, the module will be imported into the code without any problems.\
    \ You'll find that most code downloaded or copied from the Internet will contain\
    \ a module, mainstream of unique, these are usually the source of errors in execution\
    \ due to them being missing.\n\n### STEP 6\n\nThe modules contain the extra code\
    \ needed to achieve a certain result within your own code, as we've previously\
    \ experimented with. For example:\n\n`import random`\n\nBrings in the code from\
    \ the Random Number Generator module. You can then use this module to create something\
    \ like:\n\n```\nfor i in range(10):\n    print(random.randint(1, 25))\n```\n\n\
    ### STEP 7\n\nThis code, when saved and executed, will display ten random numbers\
    \ from 1 to 25. You can play around with the code to display more or less, and\
    \ from a great or lesser range. For example:\n\n```\nimport random\n\nfor i in\
    \ range(25):\n    print(random.randint(1, 100))\n```\n\n### STEP 8\n\nMultiple\
    \ modules can be imported within your code. To extend our example, use:\n\n```\n\
    import random\nimport math\n\nfor i in range(5):\n    print(random.randint(1,\
    \ 25))\n\nprint(math.pi)\n```\n\n### STEP 9\n\nThe result is a string of random\
    \ numbers followed by the value of Pi as pulled from the Math module using the\
    \ `print(math.pi)` function. You can also pull in certain functions from a module\
    \ by using the from and import commands, such as:\n\n```\nfrom random import randint\n\
    \nfor i in range(5):\n    print(randint(1, 25))\n```\n\n### STEP 10\n\nThis helps\
    \ create a more streamlined approach to programming. You can also use `import\
    \ module*`, which will import everything defined within the named module. However,\
    \ it's often regarded as a waste of resources but it works nonetheless. Finally,\
    \ modules can be imported as aliases:\n\n```\nimport math as m\n\nprint(m.pi)\n\
    ```\n\nOf course, adding comments helps to tell others what's going on."
  mdcn: "## 条件与循环\n\n条件与循环是让程序变得有趣的关键；它们可以简单，也可以相当复杂。如何使用它们在很大程度上取决于程序要实现的功能；它们可以是游戏中剩余生命数，或者仅仅显示一个倒计时。\n\
    \n## 真值条件\n\n一开始保持条件简单，能让学习编程的体验更加愉快。那么，让我们从检查某件事是否为**真**开始，如果不是，则执行其他操作。\n\n\
    ### 第1步\n\n让我们创建一个新的Python程序，它会要求用户输入一个单词，然后检查它是否是一个四个字母的单词。从“文件 > 新建文件”开始，并从\
    \ `input` 变量开始：\n\n```\nword=input(\"Please enter a four-letter word: \")\n```\n\
    \n### 第2步\n\n现在我们可以创建一个新变量，然后使用 `len` 函数并传递 `word` 变量，以获取用户刚刚输入的字母总数：\n\n```\n\
    word=input(\"Please enter a four-letter word: \")\nword_length=len(word)\n```\n\
    \n### 第3步\n\n现在你可以使用一个 `if` 语句来检查 `word_length` 变量是否等于四，如果符合条件，则打印一条友好的确认信息：\n\
    \n```\nword=input(\"Please enter a four-letter word: \")\nword_length=len(word)\n\
    if word_length == 4:\n    print (word, \"is a four-letter word. Well done.\")\n\
    ```\n\n双等号（`==`）表示检查某物是否等于另一物。\n\n### 第4步\n\n`IF` 行末的冒号告诉Python，如果此语句为真，则执行冒号后所有缩进的内容。接下来，将光标移回编辑器开头：\n\
    \n```\nword=input(\"Please enter a four-letter word: \")\nword_length=len(word)\n\
    if word_length == 4:\n    print (word, \"is a four-letter word. Well done.\")\n\
    else:\n    print (word, \"is not a four-letter word.\")\n```\n\n### 第5步\n\n按F5并保存代码以执行它。首先在Shell中输入一个四个字母的单词，你应该会收到该单词确实是四个字母的返回消息。现在再次按F5重新运行程序，但这次输入一个五个字母的单词。Shell将显示它不是一个四个字母的单词。\n\
    \n### 第6步\n\n现在扩展代码以包含另一个条件。最终，它可能变得相当复杂。我们为三个字母的单词添加了一个条件：\n\n```\nword=input(\"\
    Please enter a four-letter word: \")\nword_length=len(word)\nif word_length ==\
    \ 4:\n    print (word, \"is a four-letter word. Well done.\")\nelif word_length\
    \ == 3:\n    print (word, \"is a three-letter word. Try again.\")\nelse:\n   \
    \ print (word, \"is not a four-letter word.\")\n```\n\n## 循环\n\n循环看起来与条件非常相似，但它们的操作方式有些不同。循环会重复运行同一代码块多次，通常有某个条件的支持。\n\
    \n### 第1步\n\n让我们从一个简单的 `While` 语句开始。像 `IF` 一样，这将检查某事是否为**真**，然后运行缩进的代码：\n\n```\n\
    x = 1\nwhile x < 10:\n    print (x)\n    x = x + 1\n```\n\n### 第2步\n\n`if` 和 `while`\
    \ 之间的区别在于，当 `while` 到达缩进代码的末尾时，它会返回并检查语句是否仍然为真。在我们的示例中，`x` 小于10。每次循环，它都打印当前值 `x`，然后将该值加一。当\
    \ `x` 最终等于10时，它就停止。\n\n### 第3步\n\n`For` 循环是另一个例子。`For` 用于遍历一系列数据，通常是存储在方括号内的列表中的变量。例如：\n\
    \n```\nwords=[\"Cat\", \"Dog\", \"Unicorn\"]\nfor word in words:\n    print (word)\n\
    ```\n\n### 第4步\n\n`For` 循环也可以通过使用 `range` 函数用于倒计时示例：\n\n```\nfor x in range (1,\
    \ 10):\n    print (x)\n```\n\n这里不需要 `x=x+1` 部分，因为 `range` 函数在使用的第一个和最后一个数字之间创建了一个列表。\n\
    \n## Python 模块\n\n我们之前提到过模块（Math模块），但由于模块是充分利用Python的重要部分，值得花更多时间了解它们。在这个实例中，我们使用的是Windows版的Python\
    \ 3。\n\n## 掌握模块\n\n将模块视为导入到你的Python代码中以增强和扩展其功能的扩展程序。有无数的模块可用，正如我们所见，你甚至可以制作自己的模块。\n\
    \n### 第1步\n\n尽管很好，但Python内置的功能是有限的。然而，模块的使用使我们能够创建更复杂的程序。正如你所知，模块是被导入的Python脚本，例如\
    \ `import math`。\n\n### 第2步\n\n一些模块，尤其是在树莓派上，默认就包含在内，Math模块就是一个典型的例子。遗憾的是，其他模块并不总是可用。在非Pi平台上的一个好例子是Pygame模块，它包含许多帮助创建游戏的功能。尝试：`import\
    \ pygame`。\n\n### 第3步\n\n结果是IDLE Shell中出现一个错误，因为Pygame模块未被识别或未安装在Python中。要安装模块，我们可以使用PIP（Pip\
    \ Installs Packages）。关闭IDLE Shell，进入命令提示符或终端会话。在提升的管理员命令提示符下，输入：`pip install pygame`。\n\
    \n### 第4步\n\nPIP安装需要提升的权限，因为它在不同位置安装组件。Windows用户可以通过“开始”按钮搜索CMD，右键单击结果，然后单击“以管理员身份运行”。Linux和Mac用户可以使用Sudo命令，如\
    \ `sudo pip install package`。\n\n### 第5步\n\n关闭命令提示符或终端，重新启动IDLE Shell。当你现在输入 `import\
    \ pygame` 时，该模块将毫无问题地导入到代码中。你会发现大多数从互联网下载或复制的代码都包含一个模块，主流或独特的，这些通常是执行中错误的来源，因为它们缺失。\n\
    \n### 第6步\n\n模块包含在你自己的代码中实现特定结果所需的额外代码，正如我们之前试验过的那样。例如：\n\n`import random`\n\n\
    引入了来自随机数生成器模块的代码。然后你可以使用此模块创建类似这样的内容：\n\n```\nfor i in range(10):\n    print(random.randint(1,\
    \ 25))\n```\n\n### 第7步\n\n这段代码在保存并执行后，将显示从1到25的十个随机数字。你可以尝试修改代码以显示更多或更少，以及从更大或更小的范围。例如：\n\
    \n```\nimport random\n\nfor i in range(25):\n    print(random.randint(1, 100))\n\
    ```\n\n### 第8步\n\n可以在你的代码中导入多个模块。要扩展我们的示例，请使用：\n\n```\nimport random\nimport math\n\
    \nfor i in range(5):\n    print(random.randint(1, 25))\n\nprint(math.pi)\n```\n\
    \n### 第9步\n\n结果是一系列随机数字，后跟使用 `print(math.pi)` 函数从Math模块中提取的Pi值。你也可以使用 `from` 和\
    \ `import` 命令从模块中提取某些函数，例如：\n\n```\nfrom random import randint\n\nfor i in range(5):\n\
    \    print(randint(1, 25))\n```\n\n### 第10步\n\n这有助于创建更精简的编程方法。你也可以使用 `import module*`，它将导入命名模块中定义的所有内容。然而，这通常被视为浪费资源，但尽管如此它仍然有效。最后，模块可以作为别名导入：\n\
    \n```\nimport math as m\n\nprint(m.pi)\n```\n\n当然，添加注释有助于告诉别人正在发生什么。"
