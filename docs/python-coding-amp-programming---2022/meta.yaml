    \\n\" *200)\nprint(\"Here's your character stats:\\n\")\nprint(name)\nprint(\"\
    Combat Rating =\", CR)\nprint(\"Strength =\", Strength)\nprint(\"Health =\", Health)\n\
    print(\"Luck =\", Luck)\nprint(\"\\n\" * 5)\nprint(\"Press Enter to start your\
    \ adventure...\")\ninput()\nprint(\"\\n\" * 200)\n\nprint('''    You find yourself\
    \ at a small inn. There's little gold in your purse\nbut your sword is sharp,\
    \ and you're ready for adventure.\n    With you are three other customers.\n \
    \   A ragged looking man, and a pair of dangerous looking guards.''')\n\ndef start():\n\
    \    print(\"-----------------------\")\n    print(\"Do you approach the...\"\
    )\n    print(\"\\n\")\n    print(\"1. Ragged looking man\")\n    print(\"2. Dangerous\
    \ looking guards\")\n```\n\nwww.bdmpublications.com\n\n## Python Scrolling Ticker\
    \ Script\n\nYou may be surprised to hear that one of the snippets of code we're\
    \ often asked for is some form of scrolling ticker. Whilst we've covered various\
    \ forms of scrolling text previously, the ticker is something that seems to keep\
    \ cropping up. So, here it is.\n\n### Ticker Time\n\nThe obvious improvements\
    \ to the Ticker code lie in the speed of the text and what the text will display.\
    \ Otherwise you can change the background colour of the ticker window, the font\
    \ and the font colour, along with the geometry of the Tkinter window if you want\
    \ to.\n\nYet another interesting element that could be introduced is one of the\
    \ many text to Speech modules available for Python 3. You could pip install one,\
    \ import it, then as the ticker displays the text, the text to speech function\
    \ will read out the variable at the same time, since the entire text is stored\
    \ in the variable labelled 's'.\n\n![](img/e4c529ac6a286a7773e0e7c17e263180_131_0.png)\n\
    \nThe ticker example can be used for system warnings, perhaps something that will\
    \ display across your work or home network detailing the shutting down of a server\
    \ over the weekend for maintenance; or even just to inform everyone as to what's\
    \ happening. We're sure you will come up with some good uses for it.\n\n### TICKER.PY\n\
    \nWe're using Tkinter here along with the Time module to determine the speed the\
    \ text is displayed across the window.\n\n```python\nimport time\nimport tkinter\
    \ as tk\n\nroot = tk.Tk()\ncanvas = tk.Canvas(root, root.title(\"Ticker Code\"\
    ), height=80, width=600, bg=\"yellow\")\ncanvas.pack()\nfont = ('courier', 48,\
    \ 'bold')\ntext_width = 15\n\n#Text blocks insert here....\n\ns1 = \"This is a\
    \ scrolling ticker example. As you can see, it's quite long but can be a lot longer\
    \ if necessary...\"\ns2 = \"We can even extend the length of the ticker message\
    \ by including more variables...\"\ns3 = \"The variables are within the s-values\
    \ in the code.\"\ns4 = \"Don't forget to concatenate them all before the For loop,\
    \ and rename the 'spacer' s-variable too.\"\n\n# pad front and end of text with\
    \ spaces\ns5 = ' ' * text_width\n# concatenate it all\ns = s5 + s1 + s2 + s3 +\
    \ s4 + s5\nx = 1\ny = 2\ntext = canvas.create_text(x, y, anchor='nw', text=s,\
    \ font=font)\ndx = 1\ndy = 0  # use horizontal movement only\n\n# the pixel value\
    \ depends on dx, font and length of text\npixels = 9000\n\nfor p in range(pixels):\n\
    \    # move text object by increments dx, dy\n    # -dx --> right to left\n  \
    \  canvas.move(text, -dx, dy)\n    canvas.update()\n    # shorter delay --> faster\
    \ movement\n    time.sleep(0.005)\n    #print(k)  # test, helps with pixel value\n\
    \nroot.mainloop()\n```"
