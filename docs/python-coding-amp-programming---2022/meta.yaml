  mdcn: "# 使用手册页\n\nLinux 自带 man（manual）手册页，用于解释每个命令并展示所有可用选项。一旦你掌握了阅读手册页的方法，就能在 Linux\
    \ 中找到并执行几乎任何操作。\n\n## 嘿，man！\n\n手册页是 Linux 最出色的功能之一，作为内置工具，无论是对初学者还是高级 Linux 管理员都极为宝贵。让我们看看它是如何工作的。\n\
    \n**步骤 1** Linux 有一个内置手册，简称 man。使用 man 命令，你可以获取我们讨论过的所有 Linux 命令的信息。只需输入：`man`\
    \ 以及你想了解更多信息的命令名称。首先在命令行输入：`man ls`。\n\n![](img/e4c529ac6a286a7773e0e7c17e263180_151_0.png)\n\
    \n**步骤 2** 手册页可能比你习惯的更详细一些。首先是一个名称，告诉你这个命令叫什么；在这里是“列出目录内容”，然后摘要部分展示了它是如何工作的。在这里是：`ls\
    \ [OPTION]... [FILE]...`。所以你需要输入：`ls`，后跟选项（例如 `-la`）以及要列出的文件或目录。\n\n![](img/e4c529ac6a286a7773e0e7c17e263180_151_1.png)\n\
    \n**步骤 3** 大多数命令的使用方法都相当容易理解，所以你在手册页花费的大部分时间是在“描述”部分查找。在这里你会看到所有选项及其对应的激活字母。大多数手册页都长于一页，所以按下任意键，例如空格键，移动到下一页内容。\n\
    \n![](img/e4c529ac6a286a7773e0e7c17e263180_151_2.png)\n\n**步骤 4** 查看手册页时按下 H 键，可以查看用于控制视图的命令。这被称为\
    \ Less 命令摘要（less 命令是我们后面在编辑文本时会接触到的内容）。目前你知道可以用 Z 和 W 前后移动。按下 Q 退出此帮助屏幕并返回到手册页。\n\
    \n![](img/e4c529ac6a286a7773e0e7c17e263180_151_3.png)\n\n**步骤 5** 滚动到手册页底部以获取更多信息。通常你会发现作者姓名以及关于报告错误的信息，包括可用于获取更多信息的网页链接。按下\
    \ Q 退出手册页并返回到命令行。\n\n**步骤 6** man 命令可用于你在 Linux 中使用的几乎每个命令。你甚至可以输入：man man 来获取关于使用\
    \ man 工具本身的信息。从现在开始，无论你何时在本书中遇到新命令，如 \"nano\" 或 \"chmod\"，都花时间输入：man nano 或 man\
    \ chmod 来阅读说明。\n\n```\nassume tab stops at each COLS instead of 8\n-u with -lt:\
    \ sort by, and show, access time with -l show access time and sort by name otherwise\n\
    -U do not sort; list entries in directory order\n-natural sort of (version) numbers\
    \ within text\n-w, --width=COLS\nassume screen width instead of current value\n\
    -x list entries by lines instead of by columns\n-X sort alphabetically by entry\
    \ extension\n-Z, --context\nprint any SELinux security context of each file\n\
    -1 list one file per line\n--help display this help and exit\n--version\noutput\
    \ version information and exit\nSIZE may be (or may be an integer optionally followed\
    \ by) one of following: KB 1000, K 1024, MB 1000000, M 1048576, and so on.\nUsing\
    \ color to distinguish file types is disabled both by default and with --color=never.\
    \ With --color=auto, ls emits color codes only when standard output is connected\
    \ to a terminal. The LS_COLORS environment variable can change the settings. Use\
    \ the dircolors command to set it.\nexit status:\n0\n```\n\n```\nMAN(1)      \
    \               Manual pager utils                     MAN(1)\n\nNAME\n      \
    \ man - an interface to the on-line reference manuals\n\nSYNOPSIS\n       man\
    \ [-C file] [-d] [-D] [--warnings[=warnings]] [-R encoding] [-L locale] [-m system[,...]]\
    \ [-M path] [-T pager] [-S section] [-e extension] [-r|-i|-p|-t] [-W] [--no-hyphenation]\
    \ [--no-justification] [-P pager] [-b string] [-n] ...] [-c] [[section] page ...]\
    \ ...\n       man -l [-C file] [-d] [-D] [--warnings[=warnings]] [-R encoding]\
    \ [-L locale] [-P pager] [-r|-i|-p|-t] [-W] [--no-hyphenation] [--no-justification]\
    \ [-P pager] [-b string] [-n] ...] [-c] file ...\n       man -k [apropos options]\
    \ regexp ...\n       man -f [whatis options] page ...\n       man -l [-C file]\
    \ [-d] [-D] [--warnings[=warnings]] [-R encoding] [-L locale] [-P pager] [-r|-i|-p|-t]\
    \ [-W] [--no-hyphenation] [--no-justification] [-P pager] [-b string] [-n] ...]\
    \ [-c] file ...\n       man -w [-C file] [-d] [-D] page ...\n       man -W [-C\
    \ file] [-d] [-D] page ...\n\nDESCRIPTION\n       man is the system's manual pager.\
    \ Each page argument given to man is normally the name of a program, utility or\
    \ function.  The manual page associated with each of these arguments is then found\
    \ and displayed. A section, if provided, will direct man to look in that section\
    \ of the manual.  The default action is to search in all of the available sections\
    \ following a pre-defined order (see DEFAULTS), and to show only the first page\
    \ found, even if page exists in several sections.\n\n       The table below shows\
    \ the section numbers of the manual followed by the types of pages they contain.\n\
    \n       1   Executable programs or shell commands\n       2   System calls (functions\
    \ provided by the kernel)\n       3   Library calls (functions within program\
    \ libraries)\n       4   Special files (usually found in /dev)\n       5   File\
    \ formats and conventions eg /etc/passwd\n       6   Games\n```\n\n## 使用手册页选项\n\
    \n因为 man 不像 `mv` 或 `mkdir` 那样会改变任何东西，人们很容易不把它看作一个命令。但它确实是命令，并且像所有其他命令一样，它也有选项。这些选项非常值得学习。\n\
    \n**步骤 1** 输入：`man man` 可以让你查看一些选项，但有时你只是想要一个快速概览。幸运的是，man 有一个内置的帮助选项，可以快速列出选项。如果你当前在手册页中，按下\
    \ Q 退出，然后在命令行输入：`man -h`。\n\n**步骤 3** 最强大的 man 选项之一是 `-k` 选项，它对应 \"apropos\"。这使你能够搜索比精确命令更广泛的手册页范围。输入：`man\
    \ -k directory` 来查看所有与目录相关的手册页（用 `man -k directory | less` 可一次查看一页）。在这里你会找到诸如\
    \ \"ls\"、\"mkdir\" 和 \"cd\" 等命令及其描述。\n\n```\nman(1)                     Manual\
    \ pager utils                     man(1)\n\nNAME\n       man - an interface to\
    \ the on-line reference manuals\n\nSYNOPSIS\n       man [-C file] [-d] [-D] [--warnings[=warnings]]\
    \ [-R encoding] [-L locale] [-m system[,...]] [-M path] [-T pager] [-S section]\
    \ [-e extension] [-r|-i|-p|-t] [-W] [--no-hyphenation] [--no-justification] [-P\
    \ pager] [-b string] [-n] ...] [-c] [[section] page ...] ...\n       man -l [-C\
    \ file] [-d] [-D] [--warnings[=warnings]] [-R encoding] [-L locale] [-P pager]\
    \ [-r|-i|-p|-t] [-W] [--no-hyphenation] [--no-justification] [-P pager] [-b string]\
    \ [-n] ...] [-c] file ...\n       man -k [apropos options] regexp ...\n      \
    \ man -f [whatis options] page ...\n       man -l [-C file] [-d] [-D] [--warnings[=warnings]]\
    \ [-R encoding] [-L locale] [-P pager] [-r|-i|-p|-t] [-W] [--no-hyphenation] [--no-justification]\
    \ [-P pager] [-b string] [-n] ...] [-c] file ...\n       man -w [-C file] [-d]\
    \ [-D] page ...\n       man -W [-C file] [-d] [-D] page ...\n\nDESCRIPTION\n \
    \      man is the system's manual pager. Each page argument given to man is normally\
    \ the name of a program, utility or function.  The manual page associated with\
    \ each of these arguments is then found and displayed. A section, if provided,\
    \ will direct man to look in that section of the manual.  The default action is\
    \ to search in all of the available sections following a pre-defined order (see\
    \ DEFAULTS), and to show only the first page found, even if page exists in several\
    \ sections.\n\n       The table below shows the section numbers of the manual\
    \ followed by the types of pages they contain.\n\n       1   Executable programs\
    \ or shell commands\n       2   System calls (functions provided by the kernel)\n\
    \       3   Library calls (functions within program libraries)\n       4   Special\
    \ files (usually found in /dev)\n       5   File formats and conventions eg /etc/passwd\n\
    \       6   Games\n```\n\n```\napropos (1) - search the manual page names and\
    \ descriptions\napropos (1) - search the manual page names and descriptions\n\
