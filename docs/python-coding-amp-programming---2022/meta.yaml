  - '[PAGE 151]


    # Using the Man Pages


    Linux comes with man (manual) pages that explain each command and show you all
    the options you can use. Once you get the hang of reading the man pages, you’ll
    be able to find and do just about anything in Linux.


    # HEY, MAN!


    The man pages are one of the best features of Linux, and as a built-in tool it’s
    invaluable for both beginner and senior level Linux administrators. Let’s see
    how it works.


    **STEP 1** Linux has a built-in manual, known as man for short. Using the man
    command you can obtain information on all the Linux commands we’ve talked about.
    Simply enter: `man` and the name of the command you want to learn more about.
    Start by entering: `man ls` in the command line.


    ![](img/e4c529ac6a286a7773e0e7c17e263180_151_0.png)


    **STEP 2** The man pages are a bit more detailed than you might be used to. First
    you have a name, which tells you what the command is called; in this case "list
    directory contents" and then the synopsis shows you how it works. In this case:
    `ls [OPTION]... [FILE]...`. So you enter: `ls` followed by options (such as `-la`)
    and the file or directory to list.


    ![](img/e4c529ac6a286a7773e0e7c17e263180_151_1.png)


    **STEP 3** Most commands are pretty easy to figure out how to use, so what you
    spend most of the time in the man pages is looking under the Description. Here
    you will see all the options and the letters used to activate them. Most man pages
    are longer than a single page, so press any key, such as the space bar, to move
    to the next page of content.


    ![](img/e4c529ac6a286a7773e0e7c17e263180_151_2.png)


    **STEP 4** Press the H key while looking at a man page to view the commands you
    can use to control the view. This is called the Summary of Less Commands (the
    less command is something we’ll come to when we look at editing text). For now
    realise that you can move back and forward with Z and W. Press Q to quit this
    help screen and return to the man page.


    ![](img/e4c529ac6a286a7773e0e7c17e263180_151_3.png)'
  - "[PAGE 152]\n\n# Using the Man Pages\n\nSTEP 5 Scroll to the bottom of the man\
    \ page to discover more information. Typically you will find the author's name\
    \ and information on reporting bugs, including web links that can be useful for\
    \ more information. Press Q to exit the man page and return to the command line.\n\
    \nSTEP 6 The man command can be used for just about every command you use in Linux.\
    \ You can even enter: man man to get information on using the man tool. From now\
    \ on, whenever you come across a new command in this book, such as \"nano\" or\
    \ \"chmod\", take time to enter: man nano or man chmod and read the instructions.\n\
    \n```\nassume tab stops at each COLS instead of 8\n-u with -lt: sort by, and show,\
    \ access time with -l show access time and sort by name otherwise\n-U do not sort;\
    \ list entries in directory order\n-natural sort of (version) numbers within text\n\
    -w, --width=COLS\nassume screen width instead of current value\n-x list entries\
    \ by lines instead of by columns\n-X sort alphabetically by entry extension\n\
    -Z, --context\nprint any SELinux security context of each file\n-1 list one file\
    \ per line\n--help display this help and exit\n--version\noutput version information\
    \ and exit\nSIZE may be (or may be an integer optionally followed by) one of following:\
    \ KB 1000, K 1024, MB 1000000, M 1048576, and so on.\nUsing color to distinguish\
    \ file types is disabled both by default and with --color=never. With --color=auto,\
    \ ls emits color codes only when standard output is connected to a terminal. The\
    \ LS_COLORS environment variable can change the settings. Use the dircolors command\
    \ to set it.\nexit status:\n0\n```\n\n```\nMAN(1)                     Manual pager\
    \ utils                     MAN(1)\n\nNAME\n       man - an interface to the on-line\
    \ reference manuals\n\nSYNOPSIS\n       man [-C file] [-d] [-D] [--warnings[=warnings]]\
    \ [-R encoding] [-L locale] [-m system[,...]] [-M path] [-T pager] [-S section]\
    \ [-e extension] [-r|-i|-p|-t] [-W] [--no-hyphenation] [--no-justification] [-P\
    \ pager] [-b string] [-n] ...] [-c] [[section] page ...] ...\n       man -l [-C\
    \ file] [-d] [-D] [--warnings[=warnings]] [-R encoding] [-L locale] [-P pager]\
    \ [-r|-i|-p|-t] [-W] [--no-hyphenation] [--no-justification] [-P pager] [-b string]\
    \ [-n] ...] [-c] file ...\n       man -k [apropos options] regexp ...\n      \
    \ man -f [whatis options] page ...\n       man -l [-C file] [-d] [-D] [--warnings[=warnings]]\
    \ [-R encoding] [-L locale] [-P pager] [-r|-i|-p|-t] [-W] [--no-hyphenation] [--no-justification]\
    \ [-P pager] [-b string] [-n] ...] [-c] file ...\n       man -w [-C file] [-d]\
    \ [-D] page ...\n       man -W [-C file] [-d] [-D] page ...\n\nDESCRIPTION\n \
    \      man is the system's manual pager. Each page argument given to man is normally\
    \ the name of a program, utility or function.  The manual page associated with\
    \ each of these arguments is then found and displayed. A section, if provided,\
    \ will direct man to look in that section of the manual.  The default action is\
    \ to search in all of the available sections following a pre-defined order (see\
    \ DEFAULTS), and to show only the first page found, even if page exists in several\
    \ sections.\n\n       The table below shows the section numbers of the manual\
    \ followed by the types of pages they contain.\n\n       1   Executable programs\
    \ or shell commands\n       2   System calls (functions provided by the kernel)\n\
    \       3   Library calls (functions within program libraries)\n       4   Special\
    \ files (usually found in /dev)\n       5   File formats and conventions eg /etc/passwd\n\
    \       6   Games\n```\n\n# USING MAN OPTIONS\n\nBecause man doesn't change anything,\
    \ like mv or mkdir, it is tempting not to see it as a command. But it is, and\
    \ like all other commands it has options. These can be very handy to learn.\n\n\
    STEP 1 Entering: man man enables you to view some of the options, but sometimes\
    \ you'll just want a quick overview. Fortunately man has a built-in help option\
    \ that quickly lists the options. Press Q if you're in a man page and enter: man\
    \ -h at the command line.\n\nSTEP 3 One of the most powerful man options is the\
    \ -k option, which is for \"apropos\". This enables you to search a wider range\
    \ of man pages than the exact command. Enter: man -k directory to view all of\
    \ the man pages relating to directories (\"man -k directory | less\" to view one\
    \ page at a time). Here you'll find commands like \"ls\", \"mkdir\" and \"cd\"\
    \ along with their description.\n\n```\nman(1)                     Manual pager\
    \ utils                     man(1)\n\nNAME\n       man - an interface to the on-line\
    \ reference manuals\n\nSYNOPSIS\n       man [-C file] [-d] [-D] [--warnings[=warnings]]\
    \ [-R encoding] [-L locale] [-m system[,...]] [-M path] [-T pager] [-S section]\
    \ [-e extension] [-r|-i|-p|-t] [-W] [--no-hyphenation] [--no-justification] [-P\
    \ pager] [-b string] [-n] ...] [-c] [[section] page ...] ...\n       man -l [-C\
    \ file] [-d] [-D] [--warnings[=warnings]] [-R encoding] [-L locale] [-P pager]\
    \ [-r|-i|-p|-t] [-W] [--no-hyphenation] [--no-justification] [-P pager] [-b string]\
    \ [-n] ...] [-c] file ...\n       man -k [apropos options] regexp ...\n      \
