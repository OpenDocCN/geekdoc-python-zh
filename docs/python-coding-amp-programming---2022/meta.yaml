    # 日期与时间

    处理数据时，能够访问时间信息通常非常方便。例如，你可能想为某个条目添加时间戳，或者查看用户登录系统的时间及登录时长。幸运的是，由于 Time 模块的存在，获取日期和时间非常简单。


    ## 时间领主

    Time 模块包含一些函数，可以帮助你获取当前系统时间、从字符串中读取日期、格式化时间和日期等等。


    首先，你需要导入 Time 模块。它是 Python 3 的内置模块之一，因此你不需要进入命令行提示符使用 `pip install` 进行安装。一旦导入，你就可以使用一个简单的命令来调用当前时间和日期：


    ```

    import time

    time.asctime()

    ```


    ![](img/e4c529ac6a286a7773e0e7c17e263180_73_0.png)


    时间函数被划分为九个元组，这些元组被划分为索引项，就像任何其他元组一样，如下截图所示。


    | 索引 | 字段 | 值 |

    |-------|-------|--------|

    | 0 | 四位年份 | 2016 |

    | 1 | 月份 | 1 到 12 |

    | 2 | 日期 | 1 到 31 |

    | 3 | 小时 | 0 到 23 |

    | 4 | 分钟 | 0 到 59 |

    | 5 | 秒 | 0 到 61 (60 或 61 是闰秒) |

    | 6 | 星期几 | 0 到 6 (0 是星期一) |

    | 7 | 一年中的天数 | 1 到 366 (儒略日) |

    | 8 | 夏令时 | -1, 0, 1, -1 表示由库决定夏令时 |


    你可以通过输入以下命令来查看时间呈现的结构：


    ```

    time.localtime()

    ```


    输出显示如下：''time.struct_time(tm_year=2017, tm_mon=9, tm_mday=7, tm_hour=9, tm_min=6,
    tm_sec=13, tm_wday=3, tm_yday=250, tm_isdst=0)''，这显然取决于你当前的时间，而不是本书编写的时间。


    ![](img/e4c529ac6a286a7773e0e7c17e263180_73_1.png)


    Time 模块内置了大量函数。其中最常用的是 `.strftime()`。借助它，你能够将时间元组转换为字符串，并呈现各种各样的参数。例如，要显示当前是星期几，你可以使用：


    ```

    time.strftime(''%A'')

    ```


    ![](img/e4c529ac6a286a7773e0e7c17e263180_73_2.png)


    ## 第5步

    这自然意味着你可以将各种函数融入到你自己的代码中，例如：


    ```

    time.strftime("%a")

    time.strftime("%B")

    time.strftime("%b")

    time.strftime("%H")

    time.strftime("%H%M")

    ```


    ![](img/e4c529ac6a286a7773e0e7c17e263180_74_0.png)


