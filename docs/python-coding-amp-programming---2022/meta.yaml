    /dev/mmcblk0p5   60M   15M   43M  25% /boot

    pi@raspberrypi ~ $

    ```


    **STEP 2** Enter: `df -h` to get the list in human readable form. The first two
    lines should read “rootfs” and “/dev/ root” and have matching Size, Used, Avail
    and Use% listings. This is the main drive, and is an indication of how much space
    you have used, and have free, on your Raspbian OS. The other volumes are for booting
    and initialising devices (you can ignore these for now).


    ```

