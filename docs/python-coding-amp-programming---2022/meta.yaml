    # # Useful System and Disk Commands


    **STEP 5** Enter: `vcgencmd measure_temp` to view the current operating system
    temperature of your Raspberry Pi. Enter: `vcgencmd get_mem arm` to view the RAM
    available, and `vcgencmd get_mem gpu` to view the memory available to the graphics
    chip. Finally try `ls usb` to view a list of attached USB devices.


    ```

    bash

    pi@raspberrypi ~ $ vcgencmd measure_temp

    temp=46.1''C

    pi@raspberrypi ~ $ vcgencmd get_mem arm

    arm=800M

