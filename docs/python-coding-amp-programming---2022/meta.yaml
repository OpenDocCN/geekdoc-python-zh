    # # Formatting Strings


    # ## STRING FORMATTING


    Since Python 3, string formatting has become a much neater process, using the
    .format function combined with curly brackets. It’s a more logical and better
    formed approach than previous versions.


    The basic formatting in Python is to call each variable into the string using
    the curly brackets:


    ```

    name="Conan"

    print("The barbarian hero of the Hyborian Age is: {}".format(name))

    ```


    ![](img/e4c529ac6a286a7773e0e7c17e263180_71_0.png)


    Remember to close the print function with two sets of brackets, as you’ve encased
    the variable in one, and the print function in another. You can include multiple
    cases of string formatting in a single print function:


    ```

    name="Conan"

    place="Cimmeria"

    print("{} hailed from the North, in a cold land known as {}".format(name, place))

    ```


    ![](img/e4c529ac6a286a7773e0e7c17e263180_71_1.png)


    You can of course also include integers into the mix:


    ```

    number=10000

    print("{} of {} was a skilled mercenary, and thief too. He once stole {} gold
    from a merchant.".format(name, place, number))

    ```


    ![](img/e4c529ac6a286a7773e0e7c17e263180_71_2.png)


    There are many different ways to apply string formatting, some are quite simple,
    as we’ve shown you here; others can be significantly more complex. It all depends
    on what you want from your program. A good place to reference frequently regarding
    string formatting is the Python Docs webpage, found at www.python.org/3.1/library/string.html.
    Here, you will find tons of help.


    ![](img/e4c529ac6a286a7773e0e7c17e263180_71_3.png)'
