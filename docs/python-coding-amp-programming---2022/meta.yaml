    \ getcmd(cmdlist)\n    elif cmd == \"quit\":\n        print(\"\\n-----------------------\"\
    )\n        time.sleep(1)\n        print(\"Sadly you return to your homeland without\n\
    fame or fortune...\")\n        time.sleep(5)\n        exit()\n\nif __name__ ==\"\
    __\":\n    start()\n```\n\n## Adventure Time\n\nThis, as you can see, is just\
    \ the beginning of the adventure and takes up a fair few lines of code. When you\
    \ expand it, and weave the story along, you'll find that you can repeat certain\
    \ instances such as a chance meeting with an enemy or the like.\n\nWe've created\
    \ each of the two encounters as a defined set of functions, along with a list\
    \ of possible choices under the cmdlist list, and cmd variable, of which is also\
    \ a defined function. Expanding on this is quite easy, just map out each encounter\
    \ and choice and create a defined function around it. Providing the user doesn't\
    \ enter quit into the adventure, they can keep playing.\n\nThere's also room in\
    \ the adventure for a set of variables designed for combat, luck, health, endurance\
    \ and even an inventory or amount of gold earned. Each successful combat situation\
    \ can reduce the main character's health but increase their combat skills or endurance.\
    \ Plus, they could loot the body and gain gold, or earn gold through quests.\n\
    \nFinally, how about introducing the Random module. This will enable you to include\
    \ an element of chance in the game. For example, in combat, when you strike an\
    \ enemy you will do a random amount of damage as will they. You could even work\
    \ out the maths behind improving the chance of a better hit based on your or your\
    \ opponent's combat skills, current health, strength and endurance. You could\
    \ create a game of dice in the inn, to see if you win or lose gold (again, improve\
    \ the chances of winning by working out your luck factor into the equation).\n\
    \nNeedless to say, your text adventure can grow exponentially and prove to be\
    \ a work of wonder. Good luck, and have fun with your adventure.\n\n```\nAdventure.py\
