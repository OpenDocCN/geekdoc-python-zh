  md: "# Python Modules\n\nSTEP 5 Close the command prompt or Terminal and relaunch\
    \ the IDLE Shell. When you now enter: `import pygame`, the module will be imported\
    \ into the code without any problems. You'll find that most code downloaded or\
    \ copied from the Internet will contain a module, mainstream of unique, these\
    \ are usually the source of errors in execution due to them being missing.\n\n\
    STEP 8 Multiple modules can be imported within your code. To extend our example,\
    \ use:\n\n```\nimport random\nimport math\n\nfor I in range(5):\n    print(random.randint(1,\
    \ 25))\n\nprint(math.pi)\n```\n\n![](img/e4c529ac6a286a7773e0e7c17e263180_54_0.png)\n\
    \n![](img/e4c529ac6a286a7773e0e7c17e263180_54_1.png)\n\nSTEP 6 The modules contain\
    \ the extra code needed to achieve a certain result within your own code, as we've\
    \ previously experimented with. For example:\n\n`import random`\n\nBrings in the\
    \ code from the Random Number Generator module. You can then use this module to\
    \ create something like:\n\nSTEP 9 The result is a string of random numbers followed\
    \ by the value of Pi as pulled from the Math module using the `print(math.pi)`\
    \ function. You can also pull in certain functions from a module by using the\
    \ from and import commands, such as:\n\n```\nfor i in range(10):\n    print(random.randint(1,\
    \ 25))\n```\n\n```\nfrom random import randint\n\nfor i in range(5):\n    print(randint(1,\
