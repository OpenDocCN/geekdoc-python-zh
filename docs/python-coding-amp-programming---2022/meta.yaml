    \n# 异常\n在编码过程中，你自然会遇到一些超出你控制范围的问题。假设你要求用户将两个数字相除，而他们试图除以零。这将产生一个错误并破坏你的代码。\n\n\
    # 异常对象\nPython 包含异常对象，用于处理代码中意外的错误，而不是停止代码的执行。你可以通过创建可能发生异常的条件来应对错误。\n\n## 步骤\
    \ 1\n你可以简单地尝试将一个数字除以零来创建一个异常错误。这将报告 ZeroDivisionError: Division by zero 消息，如截图所示。ZeroDivisionError\
    \ 部分是异常类，其中有许多这样的类。\n\n![](img/e4c529ac6a286a7773e0e7c17e263180_79_0.png)\n\n\
    ## 步骤 2\n大多数异常是在 Python 遇到代码中本质上错误的内容时自动引发的。然而，你可以创建自己的异常，这些异常旨在包含潜在的错误并对其作出反应，而不是让代码失败。\n\
    \n![](img/e4c529ac6a286a7773e0e7c17e263180_79_1.png)\n\n## 步骤 3\n你可以使用函数 raise\
    \ exception 在 Python 中创建我们自己的错误处理代码。假设你的代码让你在宇宙中跃迁，然而跃迁过多会导致曲速核心破裂。为了防止游戏因曲速核心发生超新星而退出，你可以创建一个自定义异常：\n\
    ```\nraise Exception(\"warp core breach\")\n```\n\n![](img/e4c529ac6a286a7773e0e7c17e263180_79_2.png)\n\
    \n## 步骤 4\n为了捕获代码中的任何错误，你可以将潜在的错误包含在 try: 块中。此块由 try、except、else 组成，其中代码包含在 try:\
    \ 中；然后如果发生异常则执行某些操作，否则执行其他操作。\n\n![](img/e4c529ac6a286a7773e0e7c17e263180_79_3.png)\n\
    \n## 步骤 5\n例如，使用除以零的错误。你可以创建一个异常，让代码能够处理错误，而不是因为问题导致 Python 退出：\n```\npython\n\
    try:\n    a=int(input(\"Enter the first number: \"))\n    b=int(input(\"Enter\
    \ the second number: \"))\n    print(a/b)\nexcept ZeroDivisionError:\n    print(\"\
    You have tried to divide by zero!\")\nelse:\n    print(\"You didn't divide by\
    \ zero. Well done!\")\n```\n\n![](img/e4c529ac6a286a7773e0e7c17e263180_80_0.png)\n\
    \n## 步骤 6\n你可以使用异常来处理各种有用的任务。使用我们之前教程中的一个例子，假设你想打开一个文件并向其写入内容：\n```\npython\n\
    try:\n    txt = open(\"/home/pi/Documents/textfile.txt\", \"r\")\n    txt.write(\"\
    This is a test. Normal service will shortly resume!\")\nexcept IOError:\n    print\
    \ (\"Error: unable to write the file. Check permissions\")\nelse:\n    print (\"\
    Content written to file successfully. Have a nice day.\")\n    txt.close()\n```\n\
    \n![](img/e4c529ac6a286a7773e0e7c17e263180_80_1.png)\n\n## 步骤 7\n显然这不会起作用，因为文件\
    \ textfile.txt 是以只读方式打开的（即 \"r\" 部分）。所以在这种情况下，与其让 Python 告诉你做错了什么，不如你使用 IOError\
    \ 类创建一个异常，告知用户权限不正确。\n\n![](img/e4c529ac6a286a7773e0e7c17e263180_80_2.png)\n\n\
    ## 步骤 8\n当然，你可以通过将 \"r\" 只读实例更改为 \"w\" 写入来快速修复问题。正如你已经知道的，这将创建文件、写入内容，然后将更改提交到文件。最终结果将报告一组不同的情形，在这种情况下，是代码的成功执行。\n\
    \n![](img/e4c529ac6a286a7773e0e7c17e263180_80_3.png)\n\n## 步骤 9\n你也可以使用 finally:\
    \ 块，它的作用方式类似，但不能与 else 一起使用。使用我们在步骤 6 中的例子：\n```\npython\ntry:\n    txt = open(\"\
    /home/pi/Documents/textfile.txt\", \"r\")\n    try:\n        txt.write(\"This\
    \ is a test. Normal service will shortly resume!\")\n    finally:\n        print\
    \ (\"Content written to file successfully. Have a nice day.\")\n        txt.close()\n\
    except IOError:\n    print (\"Error: unable to write the file. Check permissions\"\
    )\n```\n\n![](img/e4c529ac6a286a7773e0e7c17e263180_80_4.png)\n\n## 步骤 10\n如前所述，由于使用了\
    \ \"r\" 只读权限，将会发生错误。如果你将其更改为 \"w\"，那么代码将执行而不会在 IDLE Shell 中显示错误。不用说，第一次正确编写异常代码可能很棘手。但只要你练习，就会掌握它。\n\
    \n![](img/e4c529ac6a286a7773e0e7c17e263180_80_5.png)"
