    ## Lists


    Lists are one of the most common types of data structures you will come across
    in Python. A list is simply a collection of items, or data if you prefer, that
    can be accessed as a whole, or individually if wanted.


    ### Working with Lists


    Lists are extremely handy in Python. A list can be strings, integers and also
    variables. You can even include functions in lists, and lists within lists.


    **STEP 1** A list is a sequence of data values called items. You create the name
    of your list followed by an equals sign, then square brackets and the items separated
    by commas; note that strings use quotes:


    ```python

    numbers = [1, 4, 7, 21, 98, 156]

    mythical_creatures = ["Unicorn", "Balrog", "Vampire", "Dragon", "Minotaur"]

    ```


    **STEP 2** Once you''ve defined your list you can call each by referencing its
    name, followed by a number. Lists start the first item entry as 0, followed by
    1, 2, 3 and so on. For example:


    ```python

    numbers

    ```


    To call up the entire contents of the list.


    ```python

    numbers[3]

    ```


    To call the third from zero item in the list (21 in this case).


    **STEP 3** You can also access, or index, the last item in a list by using the
    minus sign before the item number [-1], or the second to last item with [-2] and
    so on. Trying to reference an item that isn''t in the list, such as [10] will
    return an error:


    ```python

    numbers[-1]

    mythical_creatures[-4]

    ```


    **STEP 4** Slicing is similar to indexing but you can retrieve multiple items
    in a list by separating item numbers with a colon. For example:


    ```python

    numbers[1:3]

    ```


    Will output the 4 and 7, being item numbers 1 and 2. Note that the returned values
    don''t include the second index position (as you would numbers[1:3] to return
    4, 7 and 21).


    **STEP 5** You can update items within an existing list, remove items and even
    join lists together. For example, to join two lists you can use:


    ```python

    everything = numbers + mythical_creatures

    ```


    Then view the combined list with:


    ```python

    everything

    ```


    **STEP 6** Items can be added to a list by entering:


    ```python

    numbers=numbers+[201]

    ```


    Or for strings:


    ```python

    mythical_creatures=mythical_creatures+["Griffin"]

    ```


    Or by using the append function:


    ```python

    mythical_creatures.append("Nessie")

    numbers.append(278)

    ```


    **STEP 7** Removal of items can be done in two ways. The first is by the item
    number:


    ```python

    del numbers[7]

    ```


    Alternatively, by item name:


    ```python

    mythical_creatures.remove("Nessie")

    ```


    **STEP 8** You can view what can be done with lists by entering dir(list) into
    the Shell. The output is the available functions, for example, insert and pop
    are used to add and remove items at certain positions. To insert the number 62
    at item index 4:


    ```python

    numbers.insert(4, 62)

    ```


    To remove it:


    ```python

    numbers.pop(4)

    ```


    **STEP 9** You also use the list function to break a string down into its components.
    For example:


    ```python

    list("David")

    ```


    Breaks the name David into ''D'', ''a'', ''v'', ''i'', ''d''. This can then be
    passed to a new list:


    ```python

    name=list("David Hayward")

    name

    age=[44]

    user = name + age

    user

    ```


    **STEP 10** Based on that, you can create a program to store someone''s name and
    age as a list:


    ```python

    name=input("What''s your name? ")

    lname=list(name)

    age=int(input("How old are you: "))

    lage=[age]

    user = lname + lage

    ```


    The combined name and age list is called user, which can be called by entering
    user into the Shell. Experiment and see what you can do.


    ## Tuples


    Tuples are very much identical to lists. However, where lists can be updated,
    deleted or changed in some way, a tuple remains a constant. This is called immutable
    and they’re perfect for storing fixed data items.


    ### The Immutable Tuple


    Reasons for having tuples vary depending on what the program is intended to do.
    Normally, a tuple is reserved for something special but they’re also used for
    example, in an adventure game, where non-playing character names are stored.


    A tuple is created the same way as a list but in this instance you use curved
    brackets instead of square brackets. For example:


    ```python

    months=("January", "February", "March", "April", "May", "June")

    ```


    You can create grouped tuples into lists that contain multiple sets of data. For
    instance, here is a tuple called NPC (Non-Playable Characters) containing the
    character name and their combat rating for an adventure game:


    ```python

    NPC=[("Conan", 100), ("Belit", 80), ("Valeria", 95)]

    ```


    Just as with lists, the items within a named tuple can be indexed according to
    their position in the data range, i.e.:


    ```python

    months[0]

    months[5]

    ```


    Each of these data items can be accessed as a whole by entering NPC into the Shell;
    or they can be indexed according to their position NPC[0]. You can also index
    the individual tuples within the NPC list:


    ```python

    NPC[0][1]

    ```


    Will display 100.


    However, any attempt at deleting or adding to the tuple will result in an error
    in the Shell.


    It''s worth noting that when referencing multiple tuples within a list, the indexing
    is slightly different from the norm. You would expect the 95 combat rating of
    the character Valeria to be NPC[4][5], but it''s not. It''s actually:


    ```python

    NPC[2][1]

    ```


    Now unpack the tuple into two corresponding variables:


    ```python

    (name, combat_rating)=NPC

    ```


    You can now check the values by entering name and combat_rating.


    This means of course that the indexing follows thus:


    - 0, 0

    - 1, 1

    - 0, 1

    - 2, 0

    - 1

    - 2, 1

    - 1, 0


    Which as you can imagine, gets a little confusing when you''ve got a lot of tuple
    data to deal with.


    ```python

    >>> NPC=[(''Conan'', 100), (''Belit'', 80), (''Valeria'', 95)]

    >>> NPC[0]

    (''Conan'', 100)

    >>> NPC[0][0]

    ''Conan''

    >>> NPC[0][1]

    100

    >>> NPC[1]

    (''Belit'', 80)

    >>> NPC[1][0]

    ''Belit''

    >>> NPC[1][1]

    80

    >>> NPC[2]

    (''Valeria'', 95)

    >>> NPC[2][0]

    ''Valeria''

    >>> NPC[2][1]

    95

    ```


    Remember, as with lists, you can also index tuples using negative numbers which
    count backwards from the end of the data list. For our example, using the tuple
    with multiple data items, you would reference the Valeria character with:


    ```python

    NPC[2][-1]

    ```


    Tuples though utilises a feature called unpacking, where the data items stored
    within a tuple are assigned variables. First create the tuple with two items (name
    and combat rating):


    ```python

    NPC= ("Conan", 100)

    ```


    You can use the max and min functions to find the highest and lowest values of
    a tuple composed of numbers. For example:


    ```python

    numbers=(10.3, 23, 45.2, 109.3, 6.1, 56.7, 99)

    ```


    The numbers can be integers and floats. To output the highest and lowest, use:


    ```python

    print(max(numbers))

    print(min(numbers))

    ```'
