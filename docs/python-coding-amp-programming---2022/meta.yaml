  md: "# # Basic GUI File Browser\n\nHere's a helpful and interesting piece of code.\
    \ It's an extremely basic file browser that's presented in a graphical user interface\
    \ using the Tkinter module. There's a lot you can learn from this code and implement\
    \ into your own programs.\n\n# ## FILEBROWSER.PY\n\nTkinter is the main module\
    \ in use here but we're also using idlelib, so you may need to pip install any\
    \ extras if the dependencies fail when you execute the code.\n\n```\npython\n\
    from tkinter import Tk\n\nfrom idlelib.TreeWidget import ScrolledCanvas, FileTreeItem,\
    \ TreeNode\nimport os\n\nroot = Tk()\nroot.title(\"File Browser\")\n\nsc = ScrolledCanvas(root,\
    \ bg=\"white\",\n    highlightthickness=0, takefocus=1)\nsc.frame.pack(expand=1,\
    \ fill=\"both\", side=\"left\")\n\nitem = FileTreeItem(os.getcwd())\nnode = TreeNode(sc.canvas,\
    \ None, item)\nnode.expand()\n\nroot.mainloop()\n```\n\n![](img/e4c529ac6a286a7773e0e7c17e263180_119_0.png)\n\
    \n![](img/e4c529ac6a286a7773e0e7c17e263180_119_1.png)\n\n![](img/e4c529ac6a286a7773e0e7c17e263180_119_2.png)"
