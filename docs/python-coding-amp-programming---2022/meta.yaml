    )\n```\n\n![](img/e4c529ac6a286a7773e0e7c17e263180_96_4.png)\n\n# Tkinter 模块\n\
    \n虽然从命令行甚至在 Shell 中运行代码完全没问题，但 Python 的能力远不止于此。Tkinter 模块使程序员能够设置图形用户界面（GUI）与用户交互，而且它功能强大得令人惊讶。\n\
    \n## 获取 GUI\n\nTkinter 易于使用，但你可以用它做更多的事情。让我们从了解它的工作原理并编写一些代码开始。不久你就会发现这个模块到底有多强大。\n\
    \nTkinter 通常内置于 Python 3 中。然而，如果输入 `import tkinter` 时它不可用，那么你需要从命令提示符使用 pip install\
    \ tkinter。我们可以开始以不同于以前的方式导入模块，以节省输入时间，并通过导入它们的所有内容：\n\n```python\nimport tkinter\
    \ as tk\nfrom tkinter import *\n```\n\n![](img/e4c529ac6a286a7773e0e7c17e263180_97_0.png)\n\
