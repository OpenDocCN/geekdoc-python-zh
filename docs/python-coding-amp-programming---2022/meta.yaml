    ### 步骤 6

    最后，你应该知道在Linux中有很多隐藏文件。这些文件使用`-a`参数列出。隐藏文件和目录以点（.）开头，所以除非你想隐藏它，否则不应以点开头命名文件或目录。通常，你可以将所有三个参数组合到命令`ls
    -lah`中。


