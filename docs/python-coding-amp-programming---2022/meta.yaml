  md: 'Python is a high-level, general-purpose programming language that was developed
    by Guido van Rossum in the late eighties and is based upon a number of other languages,
    while being the successor to the popular ABC language.

    It has been devised to work on a human level, so it’s readable and understandable
    without needing to delve into obscure volumes of machine code, hexadecimal characters,
    or even ones and zeros. It’s clear, logical, comprehensive, powerful and functional,
    yet also easy to follow and learn.

    You will find Python at the heart of some of the most interesting and cutting-edge
    technologies in the world. It’s the code that binds supercomputer algorithms together;
    it’s used in the space industry, and in science and engineering. AI, and the likes
    of Alexa and Siri, Cortana and the Google Assistant all utilise Python for their
    powerful voice recognition technology. It’s simply an amazing, versatile and incredible
    language to learn.

    So let’s get started and explore what you need to become a Python programmer.


