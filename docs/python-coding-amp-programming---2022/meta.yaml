  md: '# Python Modules


    We’ve mentioned modules previously, (the Math module) but as modules are such
    a large part of getting the most from Python, it’s worth dedicating a little more
    time to them. In this instance we’re using the Windows version of Python 3.


    # MASTERING MODULES


    Think of modules as an extension that’s imported into your Python code to enhance
    and extend its capabilities. There are countless modules available and as we’ve
    seen, you can even make your own.


    STEP 1 Although good, the built-in functions within Python are limited. The use
    of modules, however, allows us to make more sophisticated programs. As you are
    aware, modules are Python scripts that are imported, such as import math.


    STEP 3 The result is an error in the IDLE Shell, as the Pygame module isn’t recognised
    or installed in Python. To install a module we can use PIP (Pip Installs Packages).
    Close down the IDLE Shell and drop into a command prompt or Terminal session.
    At an elevated admin command prompt, enter: `pip install pygame`


    ![](img/e4c529ac6a286a7773e0e7c17e263180_53_0.png)


    ![](img/e4c529ac6a286a7773e0e7c17e263180_53_1.png)


    STEP 2 Some modules, especially on the Raspberry Pi, are included by default,
    the Math module being a prime example. Sadly, other modules aren’t always available.
    A good example on non-Pi platforms is the Pygame module, which contains many functions
    to help create games. Try: `import pygame`.


    STEP 4 The PIP installation requires an elevated status due it installing components
    at different locations. Windows users can search for CMD via the Start button
    and right-click the result then click Run as Administrator. Linux and Mac users
    can use the Sudo command, with sudo pip install package.


    ![](img/e4c529ac6a286a7773e0e7c17e263180_53_2.png)


    ![](img/e4c529ac6a286a7773e0e7c17e263180_53_3.png)'
