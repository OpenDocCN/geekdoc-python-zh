- md: '## STEP 5


    Enter a name for your code, ''print hello'' for example, and click on the Save
    button. Once the Python code is saved it''s executed and the output will be detailed
    in the IDLE Shell. In this case, the words ''Hello everyone!''.


    ![](img/e4c529ac6a286a7773e0e7c17e263180_38_0.png)


    ## STEP 6


    This is how the vast majority of your Python code will be conducted. Enter it
    into the Editor, hit F5, save the code and look at the output in the Shell. Sometimes
    things will differ, depending on whether you''ve requested a separate window,
    but essentially that''s the process. It''s the process we will use throughout
    this book, unless otherwise stated.


    ![](img/e4c529ac6a286a7773e0e7c17e263180_38_1.png)


    ## STEP 7


    If you open the file location of the saved Python code, you can see that it ends
    in a .py extension. This is the default Python file name. Any code you create
    will be whatever.py and any code downloaded from the many Internet Python resource
    sites will be .py. Just ensure that the code is written for Python 3.


    ![](img/e4c529ac6a286a7773e0e7c17e263180_38_2.png)


    ## STEP 8


    Let''s extend the code and enter a few examples from the previous tutorial:


    ```

    a=2

    b=2

    name="David"

    surname="Hayward"

    print (name, surname)

    print (a+b)

    ```


    If you press F5 now you''ll be asked to save the file, again, as it''s been modified
    from before.


    ![](img/e4c529ac6a286a7773e0e7c17e263180_38_3.png)


    ## STEP 9


    If you click the OK button, the file will be overwritten with the new code entries,
    and executed, with the output in the Shell. It''s not a problem with just these
    few lines but if you were to edit a larger file, overwriting can become an issue.
    Instead, use File > Save As from within the Editor to create a backup.


    ![](img/e4c529ac6a286a7773e0e7c17e263180_38_4.png)


    ## STEP 10


    Now create a new file. Close the Editor, and open a new instance (File > New File
    from the Shell). Enter the following and save it as hello.py:


    ```

    a="Python"

    b="is"

    c="cool!"

    print(a, b, c)

    ```


    You will use this code in the next tutorial.


    ![](img/e4c529ac6a286a7773e0e7c17e263180_38_5.png)


    # Executing Code from the Command Line


    Although we’re working from the GUI IDLE throughout this book, it’s worth taking
    a look at Python’s command line handling. We already know there’s a command line
    version of Python but it’s also used to execute code.


    ## COMMAND THE CODE


    Using the code we created in the previous tutorial, the one we named hello.py,
    let’s see how you can run code that was made in the GUI at the command line level.


    ### STEP 1

    Python, in Linux, comes with two possible ways of executing code via the command
    line. One of the ways is with Python 2, whilst the other uses the Python 3 libraries
    and so on. First though, drop into the command line or Terminal on your operating
    system.


    ### STEP 2

    Just as before, we’re using a Raspberry Pi; Windows users will need to click the
    Start button and search for CMD, then click the Command Line returned search;
    and macOS users can get access to their command line by clicking Go > Utilities
    > Terminal.


    ![](img/e4c529ac6a286a7773e0e7c17e263180_39_2.png)


    ### STEP 3

    Now you’re at the command line we can start Python. For Python 3 you need to enter
    the command `python3` and press Enter. This will put you into the command line
    version of the Shell, with the familiar three right-facing arrows as the cursor
    (>>>).


    ![](img/e4c529ac6a286a7773e0e7c17e263180_39_0.png)

    ![](img/e4c529ac6a286a7773e0e7c17e263180_39_1.png)


    ### STEP 4

    From here you’re able to enter the code you’ve looked at previously, such as:


    ```

    a=2

    print(a)

    ```


    You can see that it works exactly the same.


    ![](img/e4c529ac6a286a7773e0e7c17e263180_39_3.png)


    ### STEP 5

    Now enter: `exit()` to leave the command line Python session and return you back
    to the command prompt. Enter the folder where you saved the code from the previous
    tutorial and list the available files within; hopefully you should see the `hello.py`
    file.


    ![](img/e4c529ac6a286a7773e0e7c17e263180_40_0.png)


    ### STEP 6

    From within the same folder as the code you''re going to run, enter the following
    into the command line:


    ```

    python3 hello.py

    ```


    This will execute the code we created, which to remind you is:


    ```

    a="Python"

    b="is"

    c="cool!"

    print(a, b, c)

    ```


    ![](img/e4c529ac6a286a7773e0e7c17e263180_40_1.png)


    ### STEP 7

    Naturally, since this is Python 3 code, using the syntax and layout that''s unique
    to Python 3, it only works when you use the `python3` command. If you like, try
    the same with Python 2 by entering:


    ```

    python hello.py

    ```


    ![](img/e4c529ac6a286a7773e0e7c17e263180_40_2.png)


    ### STEP 8

    The result of running Python 3 code from the Python 2 command line is quite obvious.
    Whilst it doesn''t error out in any way, due to the differences between the way
    Python 3 handles the Print command over Python 2, the result isn''t as we expected.
    Using Sublime for the moment, open the `hello.py` file.


    ![](img/e4c529ac6a286a7773e0e7c17e263180_40_3.png)


    ### STEP 9

    Since Sublime Text isn''t available for the Raspberry Pi, you''re going to temporarily
    leave the Pi for the moment and use Sublime as an example that you don''t necessarily
    need to use the Python IDLE. With the `hello.py` file open, alter it to include
    the following:


    ```

    name=input("What is your name? ")

    print("Hello,", name)

    ```


    ![](img/e4c529ac6a286a7773e0e7c17e263180_40_4.png)


    ### STEP 10

    Save the `hello.py` file and drop back to the command line. Now execute the newly
    saved code with:


    ```

    python3 hello.py

    ```


    The result will be the original `Python is cool!` statement, together with the
    added input command asking you for your name, and displaying it in the command
    window.


    ![](img/e4c529ac6a286a7773e0e7c17e263180_40_5.png)


    # Numbers and Expressions


    We''ve seen some basic mathematical expressions with Python, simple addition and
    the like. Let''s expand on that now and see just how powerful Python is as a calculator.
    You can work within the IDLE Shell or in the Editor, whichever you like.


    ## IT''S ALL MATHS, MAN


    You can get some really impressive results with the mathematical powers of Python;
    as with most, if not all, programming languages, maths is the driving force behind
    the code.


    ### STEP 1

    Open up the GUI version of Python 3, as mentioned you can use either the Shell
    or the Editor. For the time being, you''re going to use the Shell just to warm
    our maths muscle, which we believe is a small gland located at the back of the
    brain (or not).


    ![](img/e4c529ac6a286a7773e0e7c17e263180_41_0.png)


    ### STEP 2

    In the Shell enter the following:


    ```

    2+2

    54356+34553245

    99867344*27344484221

    ```


    You can see that Python can handle some quite large numbers.


    ![](img/e4c529ac6a286a7773e0e7c17e263180_41_1.png)


    ### STEP 3

    You can use all the usual mathematical operations: divide, multiply, brackets
    and so on. Practise with a few, for example:


    ```

    1/2

    6/2

    2+2*3

    (1+2) + (3*4)

    ```


    ![](img/e4c529ac6a286a7773e0e7c17e263180_41_2.png)


    ### STEP 4

    You''ve no doubt noticed, division produces a decimal number. In Python these
    are called floats, or floating point arithmetic. However, if you need an integer
    as opposed to a decimal answer, then you can use a double slash:


    ```

    1//2

    6//2

    ```


    And so on.


    ![](img/e4c529ac6a286a7773e0e7c17e263180_41_3.png)


    ### STEP 5

    You can also use an operation to see the remainder left over from division. For
    example:


    ```

    10/3

    ```


    Will display 3.33333333, which is of course 3.3-recurring. If you now enter:


    ```

    10%3

    ```


    This will display 1, which is the remainder left over from dividing 10 by 3.


    ![](img/e4c529ac6a286a7773e0e7c17e263180_42_0.png)


    ### STEP 6

    Next up we have the power operator, or exponentiation if you want to be technical.
    To work out the power of something you can use a double multiplication symbol
    or double-star on the keyboard:


    ```

    2**3

    10**10

    ```


    Essentially, it''s 2x2x2 but we''re sure you already know the basics behind maths
    operators. This is how you would work it out in Python.


    ![](img/e4c529ac6a286a7773e0e7c17e263180_42_1.png)


    ### STEP 7

    Numbers and expressions don''t stop there. Python has numerous built-in functions
    to work out sets of numbers, absolute values, complex numbers and a host of mathematical
    expressions and Pythagorean tongue-twisters. For example, to convert a number
    to binary, use:


    ```

    bin(3)

    ```


    ![](img/e4c529ac6a286a7773e0e7c17e263180_42_2.png)


    ### STEP 8

    This will be displayed as ''0b11'', converting the integer into binary and adding
    the prefix `0b` to the front. If you want to remove the `0b` prefix, then you
    can use:


    ```

    format(3, ''b'')

    ```


    The Format command converts a value, the number 3, to a formatted representation
    as controlled by the format specification, the ''b'' part.


    ![](img/e4c529ac6a286a7773e0e7c17e263180_42_3.png)


    ### STEP 9

    A Boolean Expression is a logical statement that will either be true or false.
    We can use these to compare data and test to see if it''s equal to, less than
    or greater than. Try this in a New File:


    ```

    a = 6

    b = 7

    print(1, a == 6)

    print(2, a == 7)

    print(3, a == 6 and b == 7)

    print(4, a == 7 and b == 7)

    print(5, not a == 7 and b == 7)

    print(6, a == 7 or b == 7)

    print(7, a == 7 or b == 6)

    print(8, not (a == 7 and b == 6))

    print(9, not a == 7 and b == 6)

    ```


    ![](img/e4c529ac6a286a7773e0e7c17e263180_42_4.png)


    ### STEP 10

    Execute the code from Step 9, and you can see a series of True or False statements,
    depending on the result of the two defining values: 6 and 7. It''s an extension
    of what you''ve looked at, and an important part of programming.


    ![](img/e4c529ac6a286a7773e0e7c17e263180_42_5.png)'
