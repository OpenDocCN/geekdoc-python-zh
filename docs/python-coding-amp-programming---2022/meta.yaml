  - "[PAGE 122]\n\n# # Python Alarm Clock\n\nEver taken a quick break from working\
    \ at the computer, then suddenly realised many minutes later that you’ve spent\
    \ all that time on Facebook? Introducing the Python alarm clock code, where you\
    \ can drop into the command prompt and tell the code how many minutes until the\
    \ alarm goes off.\n\n# ## ALARMCLOCK.PY\n\nThis code is designed for use in the\
    \ command prompt, be that Windows, Linux or macOS. There are some instructions\
    \ on how to use it in the main print section but essentially it’s: python3 AlarmClock.py\
    \ 10 (to go off in ten minutes).\n\n```\n\nimport sys\nimport string\nfrom time\
    \ import sleep\n\nsa = sys.argv\nlsa = len(sys.argv)\nif lsa != 2:\n    print\
    \ (\"Usage: [ python3 ] AlarmClock.py duration _ in _ minutes\")\n    print (\"\
    Example: [ python3 ] AlarmClock.py 10\")\n    print (\"Use a value of 0 minutes\
    \ for testing the alarm immediately.\")\n    print (\"Beeps a few times after\
    \ the duration is over.\")\n    print (\"Press Ctrl-C to terminate the alarm clock\
    \ early.\")\n    sys.exit(1)\n\ntry:\n    minutes = int(sa[1])\nexcept ValueError:\n\
    \    print (\"Invalid numeric value (%s) for minutes\" % sa[1])\n    print (\"\
    Should be an integer >= 0\")\n    sys.exit(1)\n\nif minutes < 0:\n    print (\"\
    Invalid value for minutes, should be >= 0\")\n    sys.exit(1)\n\nseconds = minutes\
    \ * 60\n\nif minutes == 1:\n    unit_word = \" minute\"\nelse:\n    unit_word\
    \ = \" minutes\"\n\ntry:\n    if minutes > 0:\n        print (\"Sleeping for \"\
    \ + str(minutes) + unit_word)\n        sleep(seconds)\n    print (\"Wake up\"\
    )\n    for i in range(5):\n        print (chr(7)),\n        sleep(1)\nexcept KeyboardInterrupt:\n\
    \    print (\"Interrupted by user\")\n    sys.exit(1)\n```\n\n> ### Wakey Wakey\n\
    There’s some good use of try and except blocks here, alongside some other useful\
    \ loops that can help you get a firmer understanding of how they work in Python.\
    \ The code itself can be used in a variety of ways: in a game where something\
    \ happens after a set amount of time or simply as a handy desktop alarm clock\
    \ for your tea break.\nLinux users, try making the alarm clock code into an alias,\
    \ so you can run a simple command to execute it. Then, why not integrate a user\
    \ input at the beginning to ask the user for the length of time they want until\
