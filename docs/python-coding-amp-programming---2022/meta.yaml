    # **Python in Focus: Artificial Intelligence**


    # **BEYOND THE SMARTPHONE**


    Consider Google, social media and the content you look up. How many times have
    you entered a search string into Google, such as car parts for a Mk1 Ford Escort
    and, when you’ve opened Facebook, you suddenly find a group suggestion of Ford
    Escort owners? That’s AI and ML injecting themselves into your everyday computing
    tasks.


    Another example of AI and ML working together is Gmail’s recent addition of suggested
    completions for sentences you are typing. If you frequently sign off with ‘See
    you soon’, or ‘All the best’, then typing ‘See’ or ‘All’ will prompt the ML side
    of the equation to autofill the remainder of the words for you. All the time,
    the ML is learning while the AI is telling it what to improve on.


    Facial recognition is another element of AI and ML that’s been the target of the
    popular press for some time. Throughout 2019, facial recognition systems on both
    smartphones and CCTV footage have improved dramatically. Agencies controlling
    this level of AI now have the ability to single out an individual from a crowded
    street and, while that’s great for law and order, it does pose a potential threat
    to our privacy. After all, who watches the watcher?


    Tesla’s work on self-driving cars means they are getting closer to being the norm,
    and it’s Python along with its controlling AI and ML work that’s, excuse the pun,
    driving it forward. In these circumstances, Python is doing a lot of the heavy
    lifting, providing the connective tissue and libraries that are designed to implement
    AI and ML. In the background, you’ll usually find C++, or some other language,
    that’s supporting the performance and overall program in which the AI and ML are
    working.


    While it’s easy to portray a bleak AI future, let’s not forget the many great
    instances of AI we currently enjoy: optical character recognition, handwriting
    recognition, image processing, helping people with visual and hearing disabilities,
    advancements in space exploration, engineering improvements, conservation, pharmaceutical
    and drug improvements and greater freedom for those limited in their ability to
    travel. It’s not all about two AI bots arguing about eliminating the human race.


    # **THE FUTURE OF AI**


    Whether we’ll end up creating true AI, killer robots and self-aware androids is
    up for debate. There are plenty of arguments for and against the evolution of
    AI, with many believing that AI will be the worst possible future humans can create
    – worse even than nuclear war. For the moment, however, we’re at the early stages
    of AI development, but with Python’s continual advancements and improved libraries,
    it may not be too long before we’ve got an AI system that’s getting better by
    the hour.


