  md: "# Basic Animation\n\nPython’s modules make it relatively easy to create shapes,\
    \ or display graphics and animate them accordingly. Animation though, can be a\
    \ tricky element to get right in code. There are many different ways of achieving\
    \ the same end result and we’ll show you one such example here.\n\n# LIGHTS, CAMERA,\
    \ ACTION\n\nThe Tkinter module is an ideal starting point for learning animation\
    \ within Python. Naturally, there are better custom modules out there, but Tkinter\
    \ does the job well enough to get a grasp on what’s needed.\n\nSTEP 1\n\nLet’s\
    \ make a bouncing ball animation. First, we will need to create a canvas (window)\
    \ and the ball to animate:\n\n```\nfrom tkinter import *\nimport time\n\ngui =\
    \ Tk()\ngui.geometry(\"800x600\")\ngui.title(\"Pi Animation\")\ncanvas = Canvas(gui,\n\
    \    width=800,height=600,bg='white')\ncanvas.pack()\n\nball1 = canvas.create_oval(5,5,60,60,\
    \ fill='red')\n\ngui.mainloop()\n```\n\nSTEP 2\n\nSave and Run the code. You will\
    \ see a blank window appear, with a red ball sitting in the upper left corner\
    \ of the window. While this is great, it’s not very animated. Let’s add the following\
    \ code:\n\n```\na = 5\nb = 5\n\nfor x in range(0,100):\n    canvas.move(ball1,a,b)\n\
    \    gui.update()\n    time.sleep(.01)\n```\n\nSTEP 3\n\nInsert the new code between\
    \ the `ball1 = canvas.create_oval(5,5,60,60, fill='red')` line and the `gui.mainloop()`\
    \ line. Save it and Run. You will now see the ball move from the top left corner\
    \ of the animation window, down to the bottom right corner. You can alter the\
    \ speed in which the ball traverses the window by altering the `time.sleep(.01)`\
    \ line. Try (.05).\n\n![](img/e4c529ac6a286a7773e0e7c17e263180_103_0.png)\n\n\
    STEP 4\n\nThe `canvas.move (ball1,a,b)` line is the part that moves the ball from\
    \ one corner to the other; obviously with both a and b equalling 5. We can change\
    \ things around a bit already, such as the size and colour of the ball, with the\
    \ line: `ball1 = canvas.create_oval (5,5,60,60, fill='red')` and we can change\
    \ the values of a and b to something else.\n\n```\nball1 = canvas.create_oval(7,7,60,60,\
    \ fill='red')\n\na = 8\nb = 3\n\nfor x in range(0,100):\n    canvas.move(ball1,a,b)\n\
    \    gui.update()\n    time.sleep(.05)\n```\n\n![](img/e4c529ac6a286a7773e0e7c17e263180_103_1.png)"
  merge: -1
  pgno: 103
- img_proc: true
  md: "# Basic Animation\n\n# STEP 5\n\nLet's see if we can animate the ball so that\
    \ it bounces around the window until you close the program.\n\n```\nxa = 5\nya\
    \ = 10\n\nwhile True:\n    canvas.move(ball1, xa, ya)\n    pos = canvas.coords(ball1)\n\
    \    if pos[3] >= 600 or pos[1] <= 0:\n        ya = -ya\n    if pos[2] >= 800\
    \ or pos[0] <= 0:\n        xa = -xa\n    gui.update()\n    time.sleep(.025)\n\
    ```\n\n# STEP 6\n\nRemove the code you entered in Step 2 and insert the code from\
    \ Step 5 in its place again, between the ball1 = canvas.create_oval(5,5,60,60,\
    \ fill='red') and the gui.mainloop() lines. Save the code and Run it as normal.\
    \ If you've entered the code correctly, then you will see the red ball bounce\
    \ off the edges of the window until you close the program.\n\n# STEP 7\n\nThe\
    \ bouncing animation takes place within the while True loop. First, we have the\
    \ values of xa and xy before the loop, both of 5 and 10. The pos=canvas.coords(ball1)\
    \ line takes the value of the ball's location in the window. When it reaches the\
    \ limits of the window, 800 or 600, it will make the values negative; moving the\
    \ ball around the screen.\n\n![](img/e4c529ac6a286a7773e0e7c17e263180_104_0.png)\n\
    \n# STEP 8\n\nPygame, however, is a much better module at producing higher-end\
    \ animations. Begin by creating a New File and entering:\n\n```\nimport pygame\n\
    from random import randrange\n\nMAX_STARS = 250\nSTAR_SPEED = 2\n\ndef init_stars(screen):\n\
    \    \"\"\" Create the starfield \"\"\"\n    global stars\n    stars = []\n  \
    \  for i in range(MAX_STARS):\n        # A star is represented as a list with\
    \ this\n        format: [X,Y]\n        star = [randrange(0, screen.get_width()\
    \ - 1),\n                randrange(0, screen.get_height() - 1)]\n        stars.append(star)\n\
    \ndef move_and_draw_stars(screen):\n    \"\"\" Move and draw the stars \"\"\"\n\
    \    global stars\n    for star in stars:\n        star[1] += STAR_SPEED\n   \
    \     if star[1] >= screen.get_height():\n            star[1] = 0\n          \
    \  star[0] = randrange(0, 639)\n        screen.set_at(star, (255,255,255))\n```\n\
    \n# STEP 9\n\nNow add the following:\n\n```\ndef main():\n    pygame.init()\n\
    \    screen = pygame.display.set_mode((640,480))\n    pygame.display.set_caption(\"\
    Starfield\\nSimulation\")\n    clock = pygame.time.Clock()\n\n    init_stars(screen)\n\
    \n    while True:\n        # Lock the framerate at 50 FPS\n        clock.tick(50)\n\
    \n        # Handle events\n        for event in pygame.event.get():\n        \
    \    if event.type == pygame.QUIT:\n                return\n\n        screen.fill((0,0,0))\n\
    \        move_and_draw_stars(screen)\n        pygame.display.flip()\n\nif __name__\
    \ == \"__main__\":\n    main()\n```\n\n```\ndef main():\n    pygame.init()\n \
    \   screen = pygame.display.set_mode((640,480))\n    pygame.display.set_caption(\"\
    Starfield Simulation\")\n    clock = pygame.time.Clock()\n\n    init_stars(screen)\n\
    \n    while True:\n        # Lock the framerate at 50 FPS\n        clock.tick(50)\n\
