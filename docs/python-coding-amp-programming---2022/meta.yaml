    \ winsound.Beep( lF, 2*t)\n    winsound.Beep( F, t)\n    winsound.Beep( A, t)\n\
    \    winsound.Beep( hC, t)\n    time.sleep(p)\n\n    winsound.Beep( lG, 2*t)\n\
    \    winsound.Beep( G, t)\n    winsound.Beep( B, t)\n    winsound.Beep( hD, t)\n\
    \    time.sleep(p)\n```\n\n# Sweet Music\n\nObviously the Winsound module is a\
    \ Windows-only set of functions for Python. Open your IDLE in Windows and copy\
    \ the code in. Press F5 to save and execute, then press the Enter key, as instructed\
    \ in the code, to start the music.\n\nNaturally you can swap out the winsound.Beep\
    \ frequency and durations to suit your own particular music; or you can leave\
    \ it as is and enjoy. Perhaps play around with the various methods to make other\
    \ music.\n\nFor example, players of the Nintendo classic game, The Legend of Zelda:\
    \ Ocarina of Time, can enjoy the game's titular musical intro by entering:\n\n\
    ```\nimport winsound\nbeep = winsound.Beep\n\nc = [\n    (880, 700),\n    (587,\
    \ 1000),\n    (698, 500),\n    (880, 500),\n    (587, 1000),\n    (698, 500),\n\
    \    (880, 250),\n    (1046, 250),\n    (988, 500),\n    (784, 500),\n    (699,\
    \ 230),\n    (784, 250),\n    (880, 500),\n    (587, 500),\n    (523, 250),\n\
    \    (659, 250),\n    (587, 750)\n]\n\ns = c + c\n\nfor f, d in s:\n    beep(f,\
    \ d)\n```\n\n![](img/e4c529ac6a286a7773e0e7c17e263180_128_0.png)\n\n+   1. The\
    \ start of the code imports the Winsound and Tie modules; remember, this is a\
    \ Windows-only Python script. The variable t is setting the duration, while p\
