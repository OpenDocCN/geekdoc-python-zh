  md: "# Mouse Controlled Turtle\n\nWe’ve already seen the Turtle module being controlled\
    \ by the user via the keyboard but now we thought we’d see how the user can use\
    \ their mouse as a drawing tool within Python. We have two possible code examples\
    \ here, pick which works best for you.\n\n![](img/e4c529ac6a286a7773e0e7c17e263180_121_0.png)\n\
    \n![](img/e4c529ac6a286a7773e0e7c17e263180_121_1.png)\n\n# MOUSETURTLE.PY\n\n\
    The first piece of code presents the standard Turtle window. Press Space and then\
    \ click anywhere on the screen for the Turtle to draw to the mouse pointer. The\
    \ second allows you to click the Turtle and drag it around the screen; but be\
    \ warned, it can crash Python.\n\n1st Code Example:\n\n```\nfrom turtle import\
    \ Screen, Turtle\nscreen = Screen()\nyertle = Turtle()\ndef k101():\n    screen.onscreenclick(click_handler)\n\
    def click_handler(x, y):\n    screen.onscreenclick(None) # disable event inside\
    \ event handler\n    yertle.setheading(yertle.towards(x, y))\n    yertle.goto(x,\
    \ y)\n    screen.onscreenclick(click_handler) # reenable event on event handler\
    \ exit\nscreen.onkey(k101, \" \") # space turns on mouse drawing\nscreen.listen()\n\
    screen.mainloop()\n```\n\n2nd Code Example:\n\n```\nfrom turtle import *\nshape(\"\
    circle\")\npencolor(\"blue\")\nwidth(2)\nondrag(goto)\nlisten()\n```\n\n> Ninja\
    \ TurtleMouse\nThis code utilises some interesting skills. Obviously it will stretch\
    \ your Python Turtle skills to come up with any improvements, which is great,\
    \ but it could make for a nice piece of code to insert into something a young\
    \ child will use. Therefore it can be a fantastic project for a younger person\
    \ to get their teeth into; or perhaps even as part of a game where the main character\
    \ is tasked to draw a skull and crossbones or something similar."
