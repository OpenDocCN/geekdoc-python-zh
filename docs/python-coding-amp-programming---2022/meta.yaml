    \ folder on the system. In our example that’s /home/pi; it will be different depending\
    \ on the user name you log in as and the operating system you use. For example,\
    \ Windows 10 will output: C:\\Program Files (x86)\\Python36-32.\n\nThe Windows\
    \ output is different as that’s the current working directory of Python, as determined\
    \ by the system; as you might suspect, the os.getcwd() function is asking Python\
    \ to retrieve the Current Working Directory. Linux users will see something along\
    \ the same lines as the Raspberry Pi, as will macOS users.\n\nYet another interesting\
    \ element to the OS module, is its ability to launch programs that are installed\
    \ in the host system. For instance, if you wanted to launch the Chromium browser\
    \ from within a Python program you can use the command:\n\n```python\nimport os\n\
    browser=os.system(\"/usr/bin/chromium-browser\")\n```\n\n### STEP 5\n\nThe os.system()\
