- md: '## Starting Python for the First Time


    The Raspberry Pi offers one of the best all-round solutions on which to learn
    and code, in particular, Python. Raspbian, the Pi’s recommended OS, comes pre-installed
    with the latest stable version of Python 3, which makes it a superb coding platform.


    ## STARTING PYTHON


    Everything you need to begin programming with Python is available from the Raspberry
    Pi desktop. However, if you want, drop into the Terminal and update the system
    with: sudo apt-get update.


    **STEP 1** With the Raspbian desktop loaded, click on the Menu button followed
    by Programming > Python 3 (IDLE). This opens the Python 3 Shell. Windows and Mac
    users can find the Python 3 IDLE Shell from within the Windows Start button menu
    and via Finder.


    **STEP 2** The Shell is where you can enter code and see the responses and output
    of code you’ve programmed into Python. This is a kind of sandbox, where you’re
    able to try out some simple code and processes.


    **STEP 3** For example, in the Shell enter: 2+2 After pressing Enter, the next
    line displays the answer: 4. Basically, Python has taken the ‘code’ and produced
    the relevant output.


    ![](img/e4c529ac6a286a7773e0e7c17e263180_33_0.png)


    ![](img/e4c529ac6a286a7773e0e7c17e263180_33_1.png)


    **STEP 4** The Python Shell acts very much like a calculator, since code is basically
    a series of mathematical interactions with the system. Integers, which are the
    infinite sequence of whole numbers can easily be added, subtracted, multiplied
    and so on.


    ![](img/e4c529ac6a286a7773e0e7c17e263180_33_2.png)


    ![](img/e4c529ac6a286a7773e0e7c17e263180_33_3.png)


    **STEP 5** While that’s very interesting, it’s not particularly exciting. Instead,
    try this: `print("Hello everyone!")` Just enter it into the IDLE as you’ve done
    in the previous steps.


    ![](img/e4c529ac6a286a7773e0e7c17e263180_34_0.png)


    **STEP 6** This is a little more like it, since you’ve just produced your first
    bit of code. The Print command is fairly self-explanatory, it prints things. Python
    3 requires the brackets as well as quote marks in order to output content to the
    screen, in this case the ‘Hello everyone!’ bit.


    ![](img/e4c529ac6a286a7773e0e7c17e263180_34_2.png)


    **STEP 7** You may have noticed the colour coding within the Python IDLE. The
    colours represent different elements of Python code. They are:

    - Black – Data and Variables

    - Green – Strings

    - Purple – Functions

    - Orange – Commands

    - Blue – User Functions

    - Dark Red – Comments

    - Light Red – Error Messages


    | Colour   | Use for          | Examples               |

    |----------|------------------|------------------------|

    | Black    | Data & Variables | 23.6 area              |

    | Green    | Strings          | "Hello World"          |

    | Purple   | Functions        | len() print()          |

    | Orange   | Commands         | if for else            |

    | Blue     | User functions   | get_area()             |

    | Dark red | Comments         | #Remember VAT          |

    | Light red| Error messages   | SyntaxError:           |


    **STEP 8** The Python IDLE is a configurable environment. If you don’t like the
    way the colours are represented, then you can always change them via Options >
    Configure IDLE and clicking on the Highlighting tab. However, we don’t recommend
    that, as you won’t be seeing the same as our screenshots.


    ![](img/e4c529ac6a286a7773e0e7c17e263180_34_1.png)


    **STEP 9** Just like most programs available, regardless of the operating system,
    there are numerous shortcut keys available. We don’t have room for them all here
    but within the Options > Configure IDLE and under the Keys tab, you can see a
    list of the current bindings.


    ![](img/e4c529ac6a286a7773e0e7c17e263180_34_3.png)


    **STEP 10** The Python IDLE is a powerful interface and one that’s actually been
    written in Python using one of the available GUI toolkits. If you want to know
    the many ins and outs of the Shell, we recommend you take a few moments to view
    www.docs.python.org/3/library/idle.html, which details many of the IDLE’s features.


    ![](img/e4c529ac6a286a7773e0e7c17e263180_34_4.png)


    ## Your First Code


    Essentially, you’ve already written your first piece of code with the ‘print(“Hello
    everyone!”)’ function from the previous tutorial. However, let’s expand that and
    look at entering your code and playing around with some other Python examples.


    ### PLAYING WITH PYTHON


    With most languages, computer or human, it’s all about remembering and applying
    the right words to the right situation. You’re not born knowing these words, so
    you need to learn them.


    ### STEP 1


    If you’ve closed Python 3 IDLE, reopen it in whichever operating system version
    you prefer. In the Shell, enter the familiar following:


    ```

    print("Hello")

    ```


    ![](img/e4c529ac6a286a7773e0e7c17e263180_35_0.png)


    ### STEP 2


    Just as predicted, the word Hello appears in the Shell as blue text, indicating
    output from a string. It’s fairly straightforward and doesn’t require too much
    explanation. Now try:


    ```

    print("2+2")

    ```


    ![](img/e4c529ac6a286a7773e0e7c17e263180_35_2.png)


    ### STEP 3


    You can see that instead of the number 4, the output is the 2+2 you asked to be
    printed to the screen. The quotation marks are defining what’s being outputted
    to the IDLE Shell; to print the total of 2+2 you need to remove the quotes:


    ```

    print(2+2)

    ```


    ![](img/e4c529ac6a286a7773e0e7c17e263180_35_1.png)


    ### STEP 4


    You can continue as such, printing 2+2, 464+2343 and so on to the Shell. An easier
    way is to use a variable, which is something we will cover in more depth later.
    For now, enter:


    ```

    a=2

    b=2

    ```


    ![](img/e4c529ac6a286a7773e0e7c17e263180_35_3.png)


    ### STEP 5


    What you have done here is assign the letters a and b two values: 2 and 2. These
    are now variables, which can be called upon by Python to output, add, subtract,
    divide and so on for as long as their numbers stay the same. Try this:


    ```

    print (a)

    print (b)

    ```


    ![](img/e4c529ac6a286a7773e0e7c17e263180_36_0.png)


    ### STEP 6


    The output of the last step displays the current values of both a and b individually,
    as you''ve asked them to be printed separately. If you want to add them up, you
    can use the following:


    ```

    print (a+b)

    ```


    This code simply takes the values of a and b, adds them together and outputs the
    result.


    ![](img/e4c529ac6a286a7773e0e7c17e263180_36_2.png)


    ### STEP 7


    You can play around with different kinds of variables and the Print function.
    For example, you could assign variables for someone''s name:


    ```

    name="David"

    print (name)

    ```


    ![](img/e4c529ac6a286a7773e0e7c17e263180_36_4.png)


    ### STEP 8


    Now let''s add a surname:


    ```

    surname="Hayward"

    print (surname)

    ```


    You now have two variables containing a first name and a surname and you can print
    them independently.


    ![](img/e4c529ac6a286a7773e0e7c17e263180_36_1.png)


    ### STEP 9


    If we were to apply the same routine as before, using the + symbol, the name wouldn''t
    appear correctly in the output in the Shell. Try it:


    ```

    print (name+surname)

    ```


    You need a space between the two, defining them as two separate values and not
    something you mathematically play around with.


    ![](img/e4c529ac6a286a7773e0e7c17e263180_36_3.png)


    ### STEP 10


    In Python 3 you can separate the two variables with a space using a comma:


    ```

    print (name, surname)

    ```


    Alternatively, you can add the space yourself:


    ```

    print (name+" "+surname)

    ```


    The use of the comma is much neater, as you can see. Congratulations, you''ve
    just taken your first steps into the wide world of Python.


    ![](img/e4c529ac6a286a7773e0e7c17e263180_36_5.png)


    ## Saving and Executing Your Code


    While working in the IDLE Shell is perfectly fine for small code snippets, it’s
    not designed for entering longer program listings. In this section you’re going
    to be introduced to the IDLE Editor, where you will be working from now on.


    ### EDITING CODE


    You will eventually reach a point where you have to move on from inputting single
    lines of code into the Shell. Instead, the IDLE Editor will allow you to save
    and execute your Python code.


    **STEP 1** First, open the Python IDLE Shell and when it’s up, click on File ->
    New File. This will open a new window with Untitled as its name. This is the Python
    IDLE Editor and within it you can enter the code needed to create your future
    programs.


    **STEP 2** The IDLE Editor is, for all intents and purposes, a simple text editor
    with Python features, colour coding and so on; much in the same vein as Sublime.
    You enter code as you would within the Shell, so taking an example from the previous
    tutorial, enter:


    `print("Hello everyone!")`


    **STEP 3** You can see that the same colour coding is in place in the IDLE Editor
    as it is in the Shell, enabling you to better understand what’s going on with
    your code. However, to execute the code you need to first save it. Press F5 and
    you get a Save...Check box open.


    ![](img/e4c529ac6a286a7773e0e7c17e263180_37_0.png)


    ![](img/e4c529ac6a286a7773e0e7c17e263180_37_1.png)


    **STEP 4** Click on the OK button in the Save box and select a destination where
    you’ll save all your Python code. The destination can be a dedicated folder called
    Python or you can just dump it wherever you like. Remember to keep a tidy drive
    though, to help you out in the future.


    ![](img/e4c529ac6a286a7773e0e7c17e263180_37_2.png)


    ![](img/e4c529ac6a286a7773e0e7c17e263180_37_3.png)'
