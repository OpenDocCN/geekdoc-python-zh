  md: "# Text to Binary Convertor\n\n1000010 1101001 1101110 1100001 1110010 1111001\n\
    \nThe text to binary convertor does offer some room for improvement and enhancement.\
    \ There are many uses: it could be utilised in a password or secret word script,\
    \ as part of an adventure game or just a novel way to display someone's name.\n\
    \nWith regards to improvements, you could display the binary conversion in a Pygame\
    \ window, using the animated text options from page 100. You could also ask the\
    \ user if they wanted to have another go, or even ask if they wanted the binary\
    \ output to be saved to a file.\n\nWith regards to rendering the outputted binary\
    \ conversion to a Pygame window, complete with rotating text, you can use:\n\n\
    ```\nimport pygame\npygame.init()\n\nBLACK = (0, 0, 0)\nWHITE = (255, 255, 255)\n\
    BLUE = (0, 0, 255)\nGREEN = (0, 255, 0)\nRED = (255, 0, 0)\n\nprint(\">>>>>>>>>>Text\
    \ to Binary Convertor<<<<<<<<<<\\n\")\n\nconversion=input(\"Enter text to convert\
    \ to Binary: \")\n\nsize = (600, 400)\nscreen = pygame.display.set_mode(size)\n\
    ```\n\n```\npygame.display.set_caption(\"Binary Conversion\")\n\ndone = False\n\
    clock = pygame.time.Clock()\n\ntext_rotate_degrees = 0\n\nBinary=(' '.join(format(ord(x),\
    \ 'b') for x in conversion))\n\nwhile not done:\n    for event in pygame.event.get():\n\
    \        if event.type == pygame.QUIT:\n            done = True\n\n    screen.fill(WHITE)\n\
    \    font = pygame.font.SysFont('Calibri', 25, True, False)\n\n    text = font.render(Binary,\
    \ True, BLACK)\n    text = pygame.transform.rotate(text, text_rotate_degrees)\n\
    \    text_rotate_degrees += 1\n    screen.blit(text, [100, 50])\n    pygame.display.flip()\n\
    \n    clock.tick(60)\n\npygame.quit()\n\nprint(' '.join(format(ord(x), 'b') for\
    \ x in conversion))\n```\n\n![](img/e4c529ac6a286a7773e0e7c17e263180_118_0.png)"
