  md: "# Python Errors\n\nSTEP 5 Pesky brackets are also a nuisance in programming\
    \ errors, especially when you have something like:\n`print(balanced_check(input()))`\n\
    Remember that for every '(' there must be an equal number of ')'.\n\n```\n1 import\
    \ sys\n2\n3 def balanced_check(data):\n4     stack = []\n5     characters = list(data)\n\
    6\n7     for character in characters:\n8         reference = {\n9            \
    \ '(': ')',\n10            '{': '}',\n11            '[': ']',\n12        }\n13\
    \        if character in reference.keys():\n14            stack.append(character)\n\
    15\n16        elif character in reference.values() and len(stack) > 0:\n17   \
    \         char = stack.pop()\n18            if reference.get(char) != character:\n\
    19                return \"No\"\n20        else:\n```\n\nSTEP 8 An excellent way\
    \ to check your code step-by-step is to use Python Tutor's Visualise web page,\
    \ found at www.pythontutor.com/visualize.html#mode=edit. Simply paste your code\
    \ into the editor and click the Visualise Execution button to run the code line-by-line.\
    \ This helps to clear bugs and any misunderstandings.\n\n![](img/e4c529ac6a286a7773e0e7c17e263180_56_0.png)\n\
    \nSTEP 6 There are thousands of online Python resources, code snippets and lengthy\
    \ discussions across forums on how best to achieve something. Whilst 99 per cent\
    \ of it is good code, don't always be lured into copying and pasting random code\
    \ into your editor. More often than not, it won't work and the worst part is that\
    \ you haven't learnt anything.\n\n```\nYou have a bare except clause, i.e.,\n\
    try:\n    some_code()\nexcept:\n    clean_up()\n\nThe problem with a bare except\
    \ is that it will catch all exceptions, including ones you really don't want to\
    \ be ignoring (like KeyboardInterrupt and SystemExit). It would be much better\
    \ if your except block only caught the specific exception you expect, and let\
    \ all others bubble up as normal.\n\nA few other general comments on your code:\n\
    \n• In line 200, you have this construction:\n\nfor letter in range(len(chosen_word)):\n\
    \    if player_guess == chosen_word[letter]:\n        word_guessed[letter] = player_guess\n\
    \nYou're looping over the index variable, but also using the list element. It\
    \ would be better to write:\n\nfor idx, letter in enumerate(chosen_word):\n  \
    \  if player_guess == letter:\n```\n\nSTEP 9 Planning makes for good code. Whilst\
    \ a little old school, it's a good habit to plan what your code will do before\
    \ sitting down to type it out. List the variables that will be used and the modules\
    \ too; then write out a script for any user interaction or outputs.\n\n![](img/e4c529ac6a286a7773e0e7c17e263180_56_1.png)\n\
    \nSTEP 7 Indents are a nasty part of Python programming that a lot of beginners\
    \ fall foul of. Recall the If loop from the Conditions and Loops section, where\
    \ the colon means everything indented following the statement is to be executed\
    \ as long as it's true? Missing the indent, or having too much of indent, will\
    \ come back with an error.\n\n```\nFile Edit Format Run Options Windows Help\n\
    word=input(\"Please enter a four-letter word: \")\nword_length=len(word)\nif word_length\
    \ == 4:\n    print (word, \"is a four-letter word. Well done.\")\nelse:\n    print\
    \ (word, \"is not a four-letter word.\")\n```\n\n![](img/e4c529ac6a286a7773e0e7c17e263180_56_2.png)\n\
    \nSTEP 10 Purely out of interest, the word debugging in computing terms comes\
    \ from Admiral Grace Hopper, who back in the '40s was working on a monolithic\
    \ Harvard Mark II electromechanical computer. According to legend Hopper found\
    \ a moth stuck in a relay, thus stopping the system from working. Removal of the\
    \ moth was hence called debugging.\n\n![](img/e4c529ac6a286a7773e0e7c17e263180_56_3.png)"
