    A lot of the online, MMORPG (Massively Multiplayer Online Role-Playing Game) games
    available utilise Python as a companion language for the server-side elements.
    These include: code to search for potential cheating, load balancing across the
    game''s servers, player skill matchmaking and to check whether the player''s client-side
    game matches the server''s versions. There''s also a Python module that can be
    included in a Minecraft server, enabling the server admin to add blocks, send
    messages and automate a lot of the background complexities of the game.


    # WEB DEVELOPMENT


    Web development has moved on considerably since the early days of HTML scripting
    in a limited text editor. The many frameworks and web management services available
    now means that building a page has become increasingly complex.

    With Python, the web developer has the ability to create dynamic and highly secure
    web apps, enabling interaction with other web services and apps such as Instagram
    and Pinterest. Python also allows the collection of data from other websites and
    even apps built within other websites.


    ![](img/e4c529ac6a286a7773e0e7c17e263180_12_1.png)


    # PYTHON EVERYWHERE


    As you can see, Python is quite a versatile programming language. By learning
    Python, you are creating a well-rounded skillset that''s able to take you into
    the next generation of computing, either professionally or simply as a hobbyist.

    Whatever route you decide to take on your coding journey, you will do well to
    have Python in your corner.


    ![](img/e4c529ac6a286a7773e0e7c17e263180_12_2.png)'
