    ## 一些常见目录


    现在你知道了如何查看硬盘驱动器的内容，你将开始注意到很多名为`bin`、`sbin`、`var`和`dev`的目录。这些是在Mac上被隐藏起来，在Windows
    PC上也不会遇到的文件和目录。


    ### 步骤 1

    输入：`ls -lah /` 以查看硬盘驱动器根目录中的所有文件和目录，包括隐藏项目。在这里你将看到构成你的Raspbian操作系统（Linux的一个版本）的所有项目。值得花时间了解其中一些。


