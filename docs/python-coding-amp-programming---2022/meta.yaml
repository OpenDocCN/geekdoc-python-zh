  md: '# Exceptions


    When coding, you’ll naturally come across some issues that are out of your control.
    Let’s assume you ask a user to divide two numbers and they try to divide by zero.
    This will create an error and break your code.


    # EXCEPTIONAL OBJECTS


    Rather than stop the flow of your code, Python includes exception objects which
    handle unexpected errors in the code. You can combat errors by creating conditions
    where exceptions may occur.


    # STEP1


    You can create an exception error by simply trying to divide a number by zero.
    This will report back with the ZeroDivisionError: Division by zero message, as
    seen in the screenshot. The ZeroDivisionError part is the exception class, of
    which there are many.


    ![](img/e4c529ac6a286a7773e0e7c17e263180_79_0.png)


    # STEP2


    Most exceptions are raised automatically when Python comes across something that’s
    inherently wrong with the code. However, you can create your own exceptions that
    are designed to contain the potential error and react to it, as opposed to letting
    the code fail.


    ![](img/e4c529ac6a286a7773e0e7c17e263180_79_1.png)


    # STEP3


    You can use the functions raise exception to create our own error handling code
    within Python. Let’s assume your code has you warping around the cosmos, too much
    however results in a warp core breach. To stop the game from exiting due to the
    warp core going supernova, you can create a custom exception:


    ```

    raise Exception("warp core breach")

    ```


    ![](img/e4c529ac6a286a7773e0e7c17e263180_79_2.png)


    # STEP4


    To trap any errors in the code you can enclose the potential error within a try:
    block. This block consists of try, except, else, where the code is held within
    try:; then if there’s an exception do something, else do something else.


    ![](img/e4c529ac6a286a7773e0e7c17e263180_79_3.png)'
  merge: -1
  pgno: 79
