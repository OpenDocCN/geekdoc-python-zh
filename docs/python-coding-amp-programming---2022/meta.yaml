    drwxr-xr-x 2 pi pi 4096 May 13 11:05 Scratch

    -rw-r--r-- 1 pi pi    0 May 13 11:15 test

    -rw-r--r-- 1 pi pi    0 May 13 11:10 testfile

    -rw-r--r-- 1 pi pi    0 May 13 11:12 Testfile

    pi@raspberrypi ~ $ _

    ```


    ```

    pi@raspberrypi ~ $ touch don''t.use(oddsymbols&in<filenames>or-you''ll"confu

    ```


    # REMOVING FILES


    We''ve created some files that we don''t want, so how do we go about removing
    them? It turns out that deleting files in your Raspberry Pi is really easy, which
    may be a problem, so be careful.


    **STEP 1** Enter `ls -l` to view the files in your home directory. If you''ve
    followed the steps before then you should have three files: "test", "testfile",
    and "Testfile". We''re going to get rid of these items because they were created
    as an example.


    **STEP 3** We''re going to use a wildcard (*) to delete our next two files, but
    again this is something you really need to do with care. First use "ls" to list
    the files and make sure it''s the one you want to delete. Enter `ls test*` to
    view files that match the word "test" and any other characters. The "*" character
    is called a "wildcard" and it means any characters here.


    ```

    pi@raspberrypi ~ $ ls -l

    total 24

    drwxr-xr-x 2 pi pi 4096 Apr 21 17:55 Desktop

    drwxr-xr-x 5 pi pi 4096 May 13 10:57 Documents

    drwx------ 2 pi pi 4096 May 13 11:01 Downloads

    -rw-r--r-- 1 pi pi    0 May 13 11:01 file

    drwxr-xr-x 3 pi pi 4096 Apr 17 18:48 indiocity

    drwxrwxr-x 2 pi pi 4096 Jan  1  1970 python_games

    drwxr-xr-x 2 pi pi 4096 May 13 11:05 Scratch

    -rw-r--r-- 1 pi pi    0 May 13 11:15 test

    -rw-r--r-- 1 pi pi    0 May 13 11:10 testfile

    -rw-r--r-- 1 pi pi    0 May 13 11:46 Testfile

    pi@raspberrypi ~ $ _

    ```


    ```

    pi@raspberrypi ~ $ ls -l

    total 24

    drwxr-xr-x 2 pi pi 4096 Jul  9 08:36 Desktop

    drwxr-xr-x 5 pi pi 4096 Jul  9 08:36 Documents

    drwx------ 2 pi pi 4096 Jul  9 08:36 Downloads

    -rw-r--r-- 1 pi pi    0 Jul  9 08:37 file

    drwxr-xr-x 3 pi pi 4096 Jul  9 08:36 indiocity

    drwxrwxr-x 2 pi pi 4096 Jan  1  1970 python_games

    drwxr-xr-x 2 pi pi 4096 Jul  9 08:36 Scratch

    -rw-r--r-- 1 pi pi    0 Jul  9 08:37 test

    -rw-r--r-- 1 pi pi    0 Jul  9 08:37 testfile

    pi@raspberrypi ~ $ ls test*

    test  testfile

    pi@raspberrypi ~ $ _

    ```


    **STEP 2** To get rid of files you use the "rm" command. Enter `rm Testfile` to
    delete the file called "Testfile" (with the uppercase "t"). Enter: `ls -l` and
    you''ll find it''s gone. Where is it? It''s not in the Trash or Recycle Bin, like
    on a Mac or Windows PC. It''s deleted completely and cannot be recovered. Bear
    this in mind and always think before deleting files.


    **STEP 4** We see that "ls test*" matches two files: "test" and "testfile", but
    not the file called "file". That''s because it didn''t match the "test" part of
    "test*". Check carefully over groups of files you want to remove (remember you
    can''t recover them) and replace the "ls" with "rm". Enter `rm test*` to remove
    both files. Finally enter `rm file` to get rid of the confusing file.


    ```

    pi@raspberrypi ~ $ rm Testfile

    pi@raspberrypi ~ $ ls -l

    total 24

    drwxr-xr-x 2 pi pi 4096 Apr 21 17:55 Desktop

    drwxr-xr-x 5 pi pi 4096 May 13 10:57 Documents

