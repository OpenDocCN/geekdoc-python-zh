    # Creating and Deleting Files


    **STEP 5** Another important thing to know is never to use a space in your file
    names. If you try to enter: `touch test file`, you create a document called "test"
    and another called "file". Technically there are ways to create files containing
    a space but you should always use an underscore character ("_") instead of a space,
    such as "touch test_file".


    **STEP 6** Here are some other files names to avoid: `#%&\|<>?/$!":@+|=.` The
    full stop (.) is used to create an extension to a file; usually used to indicate
    a file type, such as textfile.txt or compressedfile.zip, and starting a file with
    a full stop makes it invisible. Don''t use full stop in place of a space though;
    stick to underscores.


    ```

    pi@raspberrypi ~ $ touch test file

    pi@raspberrypi ~ $ ls -l

    total 24

    drwxr-xr-x 2 pi pi 4096 Apr 21 17:55 Desktop

    drwxr-xr-x 5 pi pi 4096 May 13 10:57 Documents

