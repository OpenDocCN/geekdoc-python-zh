  - '[PAGE 20]


    Using virtual machines removes the need to dual-boot. Dual-booting is having two,
    or more, physical operating systems installed on the same, or multiple, hard drives
    on a single computer. As the computer powers up, you''re given the option to choose
    which OS you want to boot into. While this sounds like a more ideal scenario it
    isn''t always as straight forward as it sounds, as all the operating systems that
    are booted into will have full access to the computer''s entire system resources.


    The problems with dual-booting come when one of the operating systems is updated.
    Most updates cover security patching, or bug fixing, however, some updates can
    alter the core - the kernel, of the OS. When these changes are applied, the update
    may alter the way in which the OS starts up, meaning the initial boot choice you
    made could be overwritten, leaving you without the ability to access the other
    operating systems installed on the computer. To rectify this, you''ll need to
    access the Master Boot Record and alter the configuration to re-allow booting
    into the other systems. There''s also the danger of possibly overwriting the first
    installed OS, or overwriting data and more often than not, most operating systems
    don''t play well when running side-by-side. Indeed, while good, dual-booting has
    more than its fair share of problems. In contrast, using a virtual machine environment,
    while still problematic at times, takes out some of the more nasty and disastrous
    aspects of using multiple operating systems on a single computer.


    ![](img/e4c529ac6a286a7773e0e7c17e263180_20_0.png)


    ![](img/e4c529ac6a286a7773e0e7c17e263180_20_1.png)


    # ADVANTAGES FOR CODERS


    For the coder, having a virtual machine setup offers many advantages, the most
    popular being cross-platform code. Meaning if you write code within Windows 10,
    then with an installation of a Linux distro in a hypervisor, you''re able to quickly
    and effortlessly power up the virtual machine and test your code in a completely
    different operating system. From this, you''re able to iron out any bugs, tweak
    the code so it works better on a different platform and expand the reach of your
    code to non-Windows users.


    The advantage of being able to configure a development environment, in specific
    ways for specific projects, is quite invaluable. Using a virtual machine setup
    greatly reduces the uncertainties that are inherent to having multiple versions
    of programming languages, libraries, IDEs and modules installed, to support the
    many different projects you may become involved in as a coder. Elements of code
    that ''talk'' directly to specifics of an operating system can easily be overcome,
    without the need to clutter up your main, host system with cross-platform libraries,
    which in turn may have an effect on other libraries within the IDE.


    Another element to consider is stability. If you''re writing code that could potentially
    cause some instability to the core OS during its development phase, then executing
    and testing that code on a virtual machine makes more sense than testing it on
    your main computer; where having to repeatedly reboot, or reset something due
    to the code''s instabilities, can become inefficient and just plain annoying.


    ![](img/e4c529ac6a286a7773e0e7c17e263180_20_2.png)


    The virtual machine environment can be viewed as a sandbox, where you''re able
    to test unsecure, or unstable code without it causing harm, or doing damage, to
    your main, working computer. Viruses and malware can be isolated within the VM
    without infecting the main computer, you''re able to set up anonymity Internet
    use within the VM and you''re able to install third-party software without it
    slowing down your main computer.


    # GOING VIRTUAL


    While you''re at the early stages of coding, using a virtual machine may seem
    a little excessive. However, it''s worth looking into because coding in Linux
    can often be easier than coding in Windows, as some versions of Linux have IDEs
    pre-installed. Either way, virtualisation of an operating system is how many of
    the professional and successful coders and developers work, so getting used to
    it early on in your skill set is advantageous.


    To start, look at installing VirtualBox. Then consider taking a look at our Linux
    titles, [https://bdmpublications.com/?s=linux&post_type=product](https://bdmpublications.com/?s=linux&post_type=product),
    to learn how to install Linux in a virtual environment and how best to utilise
    the operating system.'
  - '[PAGE 21]


    # Creating a Coding Platform


    The term ‘Coding Platform’ can denote a type of hardware, on which you can code,
    or a particular operating system, or even a custom environment that’s pre-built
    and designed to allow the easy creation of games. In truth it’s quite a loose
    term, as a Coding Platform can be a mixture of all these ingredients, it’s simply
    down to what programming language you intend to code in and what your end goals
    are.


    **Coding can be one of those experiences that sounds fantastic, but to get going
    with it, is often confusing.** After all, there''s a plethora of languages to
    choose from, numerous apps that will enable you to code in a specific, or range,
    of languages and an equally huge amount of third-party software to consider. Then
    you access the Internet and discover that there are countless coding tutorials
    available, for the language in which you''ve decided you want to program, alongside
    even more examples of code. It''s all a little too much at times.


    The trick is to slow down and, to begin with, not look too deeply into coding.
    Like all good projects, you need a solid foundation on which to build your skill
    and to have all the necessary tools available to hand to enable you to complete
    the basic steps. This is where creating a coding platform comes in, as it will
    be your learning foundation while you begin to take your first tentative steps
    into the wider world of coding.


    # HARDWARE


    ![](img/e4c529ac6a286a7773e0e7c17e263180_21_0.png)


    Thankfully, coding at the foundation level doesn''t require specialist equipment,
    or a top of the range, liquid hydrogen-cooled PC. If you own a computer, no matter
    how basic, you can begin to learn how to code. Naturally, if your computer in
    question is a Commodore 64 then you may have some difficulty following a modern
    language tutorial, but some of the best programmers around today started on an
    8-bit machine, so there''s hope yet.


    Access to the Internet is necessary to download, install and update the coding
    development environment, alongside a computer with either: Windows 10, macOS,
    or Linux installed. You can use other operating systems, but these are the ''big
    three'' and you will find that most code resources are written with one, or all
    of these, in mind.


    # SOFTWARE


    ![](img/e4c529ac6a286a7773e0e7c17e263180_21_1.png)


    In terms of software, most of the development environments - the tools that allow
    you to code, compile the code and execute it - are freely available to download
    and install. There are some specialist tools available that will cost, but at
    this level they''re not necessary; so don''t be fooled into thinking you need
    to purchase any extra software in order to start learning how to code.


    Over time, you may find yourself changing from the mainstream development environment
    and using a collection of your own, discovered, tools to write your code in. It''s
    all personal preference in the end and as you become more experienced, you will
    start to use different tools to get the job done.'
  - '[PAGE 22]


    # # OPERATING SYSTEMS


    Windows 10 is the most used operating system in the world, so it''s natural that
    the vast majority of coding tools are written for Microsoft''s leading operating
    system. However, don''t discount macOS and especially Linux.


    ![](img/e4c529ac6a286a7773e0e7c17e263180_22_0.png)


    macOS users enjoy an equal number of coding tools to their Windows counterparts.
    In fact, you will probably find that a lot of professional coders use a Mac over
    a PC, simply because of the fact that the Mac operating system is built on top
    of Unix (the command-line OS that powers much of the world''s filesystems and
    servers). This Unix layer lets you test programs in almost any language without
    using a specialised IDE.


    Linux, however, is by far one of the most popular and important, coding operating
    systems available. Not only does it have a Unix-like backbone, but also it''s
    also free to download, install and use and comes with most of the tools necessary
    to start learning how to code. Linux powers most of the servers that make up the
    Internet. It''s used on nearly all of the top supercomputers, as well as specifically
    in organisations such as NASA, CERN and the military and it forms the base of
    Android-powered devices, smart TVs and in-car systems. Linux, as a coding platform,
    is an excellent idea and it can be installed inside a virtual machine without
    ever affecting the installation of Windows or macOS.


    # # VIRTUAL MACHINES


    A virtual machine is a piece of software that allows you to install a fully working,
    operating system within the confines of the software itself. The installed OS
    will allocate user-defined resources from the host computer, providing memory,
    hard drive space etc., as well as sharing the host computer''s Internet connection.


    ![](img/e4c529ac6a286a7773e0e7c17e263180_22_1.png)


    The advantage of a virtual machine is that you can work with Linux, for example,
    without it affecting your currently installed host OS. This means that you can
    have Windows 10 running, launch your virtual machine client, boot into Linux and
    use all the functionality of Linux while still being able to use Windows.


    This, of course, makes it a fantastic coding platform, as you can have different
    installations of operating systems running from the host computer while using
    different coding languages. You can test your code without fear of breaking your
    host OS and it''s easy to return to a previous configuration without the need
    to reinstall everything again.


    Virtualisation is the key to most big companies now. You will probably find, for
    example, rather than having a single server with an installation of Windows Server,
    the IT team have instead opted for a virtualised environment whereby each Windows
    Server instance is a virtual machine running from several powerful machines. This
    cuts down on the number of physical machines, allows the team to better manage
    resources and enables them to deploy an entire server dedicated to a particular
    task in a fraction of the time.


    # # THE RASPBERRY PI


    If you haven''t already heard of the Raspberry Pi, then we suggest you head over
    to www.raspberrypi.org, and check it out. In short, the Raspberry Pi is a small,
    fully functional computer that comes with its own customised Linux-based operating
    system, pre-installed with everything you need to start learning how to code in
    Python, C++, Scratch and more.


    ![](img/e4c529ac6a286a7773e0e7c17e263180_22_2.png)


    It''s incredibly cheap, costing around £35 and allows you to utilise different
    hardware, in the form of robotics and electronics projects, as well as offering
    a complete desktop experience. Although not the most powerful computing device
    in the world, the Raspberry Pi has a lot going for it, especially in terms of
    being one of the best coding platforms available.


    # # MINIX NEO N42C-4


    The NEO N42C-4 is an extraordinarily small computer from mini-PC developer, MINIX.
    Measuring just 139 x 139 x 30mm, this Intel N4200 CPU powered, Windows 10 Pro
    pre-installed computer is one of the best coding platforms we''ve come across.


    ![](img/e4c529ac6a286a7773e0e7c17e263180_22_3.png)


    The beauty, of course, lies in the fact that with increased storage and memory
    available, you''re able to create a computer that can easily host multiple virtual
    machines. The virtual machines can cover Linux, Android and other operating systems,
    allowing you to write and test cross-platform code without fear of damaging, or
    causing problems, with other production or home computers.


    The MINIX NEO N42C-4 starts at around £250, with the base 32GB eMMC and 4GB of
    memory. You''ll need to add another hundred and fifty, or so, to increase the
    specifications, but consider that a license for Windows 10 Pro alone costs £219
    from the Microsoft Store and you can begin to see the benefits of opting for a
    more impressive hardware foundation over the likes of the Raspberry Pi.


    # # YOUR OWN CODING PLATFORM


    Whichever method you choose, remember that your coding platform will probably
    change, as you gain experience and favour one language over another. Don''t be
    afraid to experiment along the way, as you will eventually create your own unique
    platform that can handle all the code you enter into it.'
- md: '# Hello, World


    ![](img/e4c529ac6a286a7773e0e7c17e263180_23_0.png)


    Getting started with Python may seem a little daunting at first, but, thankfully,
    the language has been designed with simplicity in mind. Like most things, you
    need to start slow, master the basics, learn how to get a result, and how to get
    what you want from the code.


    This section covers numbers and expressions, user input, conditions and loops
    and the types of errors you will undoubtedly come across in your time with Python:
    the core foundations of good coding and Python code.


    - 26 Equipment You Will Need

    - 28 Getting to Know Python

    - 30 How to Set Up Python in Windows

    - 32 How to Set Up Python in Linux

    - 34 Starting Python for the First Time

    - 36 Your First Code

    - 38 Saving and Executing Your Code

    - 40 Executing Code from the Command Line

    - 42 Numbers and Expressions

    - 44 Using Comments

    - 46 Working with Variables

    - 48 User Input

    - 50 Creating Functions

    - 52 Conditions and Loops

    - 54 Python Modules

    - 56 Python Errors

    - 58 Combining What You Know So Far

    - 60 Python in Focus: Stitching Black Holes


    ## Equipment You Will Need


    You can learn Python with very little hardware or initial financial investment.
    You don''t need an incredibly powerful computer and any software that''s required
    is freely available.


    ### WHAT WE''RE USING


    Thankfully, Python is a multi-platform programming language available for Windows,
    macOS, Linux, Raspberry Pi and more. If you have one of those systems, then you
    can easily start using Python.


    ![](img/e4c529ac6a286a7773e0e7c17e263180_25_0.png)


    ### COMPUTER


    Obviously you''re going to need a computer in order to learn how to program in
    Python and to test your code. You can use Windows (from XP onward) on either a
    32 or 64-bit processor, an Apple Mac or Linux installed PC.


    ### AN IDE


    An IDE (Integrated Developer Environment) is used to enter and execute Python
    code. It enables you to inspect your program code and the values within the code,
    as well as offering advanced features. There are many different IDEs available,
    so find the one that works for you and gives the best results.


    ### PYTHON SOFTWARE


    macOS and Linux already come with Python preinstalled as part of the operating
    system, as does the Raspberry Pi. However, you need to ensure that you''re running
    the latest version of Python. Windows users need to download and install Python,
    which we''ll cover shortly.


    ![](img/e4c529ac6a286a7773e0e7c17e263180_25_1.png)


    ### TEXT EDITOR


    Whilst a text editor is an ideal environment to enter code into, it''s not an
    absolute necessity. You can enter and execute code directly from the IDLE but
    a text editor, such as Sublime Text or Notepad++, offers more advanced features
    and colour coding when entering code.


    ### INTERNET ACCESS


    Python is an ever evolving environment and as such new versions often introduce
    new concepts or change existing commands and code structure to make it a more
    efficient language. Having access to the Internet will keep you up-to-date, help
    you out when you get stuck and give access to Python''s immense number of modules.


    ![](img/e4c529ac6a286a7773e0e7c17e263180_25_2.png)


    ### TIME AND PATIENCE


    ## THE RASPBERRY PI


    Why use a Raspberry Pi? The Raspberry Pi is a tiny computer that’s very cheap
    to purchase, but offers the user a fantastic learning platform. Its main operating
    system, Raspbian, comes preinstalled with the latest Python along with many modules
    and extras.


    ### RASPBERRY PI


    The Raspberry Pi 4 Model B is the latest version, incorporating a more powerful
    CPU, a choice of 1GB, 2GB or 4GB memory versions and Wi-Fi and Bluetooth support.
    You can pick up a Pi from around £33, increasing up to £54 for the 4GB memory
    version, or as a part of kit for £50+, depending on the kit you’re interested
    in.


    ![](img/e4c529ac6a286a7773e0e7c17e263180_26_0.png)


    ![](img/e4c529ac6a286a7773e0e7c17e263180_26_1.png)


    ### FUZE PROJECT


    The FUZE is a learning environment built on the latest model of the Raspberry
    Pi. You can purchase the workstations that come with an electronics kit and even
    a robot arm for you to build and program. You can find more information on the
    FUZE at www.fuze.co.uk.


    ### RASPBIAN


    The Raspberry Pi''s main operating system is a Debian-based Linux distribution
    that comes with everything you need in a simple to use package. It’s streamlined
    for the Pi and is an ideal platform for hardware and software projects, Python
    programming and even as a desktop computer.


    ![](img/e4c529ac6a286a7773e0e7c17e263180_26_2.png)


    ### BOOKS


    We have several great Raspberry Pi titles available via **www.bdmpublications.com**.
    Our Pi books cover how to buy your first Raspberry Pi, set it up and use it; there
    are some great step-by-step project examples and guides to get the most from the
    Raspberry Pi too.


    ![](img/e4c529ac6a286a7773e0e7c17e263180_26_3.png)


    ## Getting to Know Python


    Python is the greatest computer programming language ever created. It enables
    you to fully harness the power of a computer, in a language that’s clean and easy
    to understand.


    ### WHAT IS PROGRAMMING?


    It helps to understand what a programming language is before you try to learn
    one, and Python is no different. Let’s take a look at how Python came about and
    how it relates to other languages.


    ### PYTHON


    A programming language is a list of instructions that a computer follows. These
    instructions can be as simple as displaying your name or playing a music file,
    or as complex as building a whole virtual world. Python is a programming language
    conceived in the late 1980s by Guido van Rossum at Centrum Wiskunde & Informatica
    (CWI) in the Netherlands as a successor to the ABC language.


    **Guido van Rossum, the father of Python.**


    ![](img/e4c529ac6a286a7773e0e7c17e263180_27_0.png)


    ### PROGRAMMING RECIPES


    Programs are like recipes for computers. A recipe to bake a cake could go like
    this:


    - Put 100 grams of self-raising flour in a bowl.

    - Add 100 grams of butter to the bowl.

    - Add 100 millilitres of milk.

    - Bake for half an hour.


    ![](img/e4c529ac6a286a7773e0e7c17e263180_27_1.png)


    ### CODE


    Just like a recipe, a program consists of instructions that you follow in order.
    A program that describes a cake might run like this:


    ```python

    bowl = []

    flour = 100

    butter = 50

    milk = 100

    bowl.append([flour, butter, milk])

    cake.cook(bowl)

    ```


    ![](img/e4c529ac6a286a7773e0e7c17e263180_27_2.png)


    ### PROGRAM COMMANDS


    You might not understand some of the Python commands, like bowl.append and cake.cook(bowl).
    The first is a list, the second an object; we’ll look at both in this book. The
    main thing to know is that it’s easy to read commands in Python. Once you learn
    what the commands do, it’s easy to figure out how a program works.


    ![](img/e4c529ac6a286a7773e0e7c17e263180_27_3.png)


    ## HIGH-LEVEL LANGUAGES


    Computer languages that are easy to read are known as “high-level”. This is because
    they fly high above the hardware (also referred to as “the metal”). Languages
    that “Fly close to the metal,” like Assembly, are known as “low-level”. Low-level
    languages commands read a bit like this: msg db , 0xa 1en equ $ - msg.


    ![](img/e4c529ac6a286a7773e0e7c17e263180_28_0.png)


    ## ZEN OF PYTHON


    Python lets you access all the power of a computer in a language that humans can
    understand. Behind all this is an ethos called “The Zen of Python.” This is a
    collection of 20 software principles that influences the design of the language.
    Principles include “Beautiful is better than ugly” and “Simple is better than
    complex.” Type **import this** into Python and it will display all the principles.


    ![](img/e4c529ac6a286a7773e0e7c17e263180_28_1.png)


    ## PYTHON 3 VS PYTHON 2


    In a typical computing scenario, Python is complicated somewhat by the existence
    of two active versions of the language: Python 2 and Python 3.


    ## WORLD OF PYTHON


    Python 3.7 is the newest release of the programming language. However, if you
    dig a little deeper into the Python site, and investigate Python code online,
    you will undoubtedly come across Python 2. Although you can run Python 3 and Python
    2 alongside each other, it’s not recommended. Always opt for the latest stable
    release as posted by the Python website.


    ![](img/e4c529ac6a286a7773e0e7c17e263180_28_2.png)


    ## PYTHON 3.X


    In 2008 Python 3 arrived with several new and enhanced features. These features
    provide a more stable, effective and efficient programming environment but sadly,
    most (if not all) of these new features are not compatible with Python 2 scripts,
    modules and tutorials. Whilst not popular at first, Python 3 has since become
    the cutting edge of Python programming.


    ![](img/e4c529ac6a286a7773e0e7c17e263180_28_3.png)


    ## PYTHON 2.X


    So why two? Well, Python 2 was originally launched in 2000 and has since then
    adopted quite a large collection of modules, scripts, users, tutorials and so
    on. Over the years Python 2 has fast become one of the first go to programming
    languages for beginners and experts to code in, which makes it an extremely valuable
    resource.


    ![](img/e4c529ac6a286a7773e0e7c17e263180_28_4.png)


    ## 3.X WINS


    Python 3’s growing popularity has meant that it’s now prudent to start learning
    to develop with the new features and begin to phase out the previous version.
    Many development companies, such as SpaceX and NASA use Python 3 for snippets
    of important code.


    ![](img/e4c529ac6a286a7773e0e7c17e263180_28_5.png)'
  mdcn: '# 你好，世界


    ![](img/e4c529ac6a286a7773e0e7c17e263180_23_0.png)


    开始学习 Python 一开始可能有点令人望而生畏，但幸运的是，这门语言在设计时注重简洁。与大多数事情一样，你需要慢慢开始，掌握基础，学习如何获得结果，以及如何从代码中得到你想要的东西。


    本节涵盖数字和表达式、用户输入、条件和循环，以及你在使用 Python 期间无疑会遇到的各种错误类型：这些都是良好编码和 Python 代码的核心基础。


    - 26 你需要的设备

    - 28 认识 Python

    - 30 如何在 Windows 上设置 Python

    - 32 如何在 Linux 上设置 Python

    - 34 第一次启动 Python

    - 36 你的第一行代码

    - 38 保存并执行你的代码

    - 40 从命令行执行代码

    - 42 数字和表达式

    - 44 使用注释

    - 46 使用变量

    - 48 用户输入

    - 50 创建函数

    - 52 条件和循环

    - 54 Python 模块

    - 56 Python 错误

    - 58 综合运用你已学的知识

    - 60 Python 专题：缝合黑洞


    ## 你需要的设备


    你可以用极少的硬件或前期资金投入来学习 Python。你不需要一台功能极其强大的计算机，所需的任何软件都是免费的。


    ### 我们使用的环境


    幸运的是，Python 是一种多平台编程语言，可用于 Windows、macOS、Linux、Raspberry Pi 等等。如果你拥有其中一种系统，那么你可以轻松地开始使用
    Python。


    ![](img/e4c529ac6a286a7773e0e7c17e263180_25_0.png)


    ### 计算机


    显然，你需要一台计算机来学习如何用 Python 编程并测试你的代码。你可以使用 Windows（从 XP 版本开始），无论是 32 位还是 64 位处理器，Apple
    Mac 或安装了 Linux 的 PC。


    ### 一种 IDE


    IDE（集成开发环境）用于输入和执行 Python 代码。它使你能够检查程序代码和代码中的值，同时还提供高级功能。有许多不同的 IDE 可用，因此找到适合你并能提供最佳结果的
    IDE。


    ### Python 软件


    macOS 和 Linux 以及 Raspberry Pi 都已经预装了 Python 作为操作系统的一部分。然而，你需要确保你运行的是最新版本的 Python。Windows
    用户需要下载并安装 Python，我们稍后会介绍。


    ![](img/e4c529ac6a286a7773e0e7c17e263180_25_1.png)


    ### 文本编辑器


    虽然文本编辑器是输入代码的理想环境，但它并非绝对必需。你可以直接从 IDLE 输入和执行代码，但像 Sublime Text 或 Notepad++ 这样的文本编辑器在输入代码时提供更高级的功能和颜色编码。


    ### 互联网访问


    Python 是一个不断发展的环境，因此新版本通常会引入新概念或更改现有命令和代码结构，使其成为更高效的编程语言。能够访问互联网将使你保持最新状态，在你遇到困难时提供帮助，并能访问
    Python 海量的模块。


    ![](img/e4c529ac6a286a7773e0e7c17e263180_25_2.png)


    ### 时间和耐心


    ## RASPBERRY PI


    为什么使用 Raspberry Pi？Raspberry Pi 是一台微型计算机，购买成本非常低，但却为用户提供了一个出色的学习平台。其主要操作系统 Raspbian
    预装了最新的 Python 以及许多模块和附加组件。


    ### RASPBERRY PI


    Raspberry Pi 4 Model B 是最新版本，集成了更强大的 CPU，提供 1GB、2GB 或 4GB 内存版本可选，并支持 Wi-Fi 和蓝牙。你可以从约
    33 英镑购买一块 Pi，4GB 内存版本价格高达 54 英镑，或者作为套件的一部分，价格为 50 英镑以上，具体取决于你感兴趣的套件。


    ![](img/e4c529ac6a286a7773e0e7c17e263180_26_0.png)


    ![](img/e4c529ac6a286a7773e0e7c17e263180_26_1.png)


    ### FUZE 项目


    FUZE 是一个基于最新型号 Raspberry Pi 构建的学习环境。你可以购买带有电子套件甚至机械臂的工作站，供你组装和编程。你可以在 www.fuze.co.uk
    找到更多关于 FUZE 的信息。


    ### RASPBIAN


    Raspberry Pi 的主要操作系统是一个基于 Debian 的 Linux 发行版，它在一个易于使用的软件包中提供了你需要的一切。它为 Pi 进行了优化，是硬件和软件项目、Python
    编程甚至作为台式计算机的理想平台。


    ![](img/e4c529ac6a286a7773e0e7c17e263180_26_2.png)


    ### 书籍


    我们通过 **www.bdmpublications.com** 提供几本很棒的 Raspberry Pi 相关书籍。我们的 Pi 书籍涵盖了如何购买你的第一个
    Raspberry Pi，设置和使用它；还有一些很棒的分步骤项目示例和指南，以帮助你充分利用 Raspberry Pi。


    ![](img/e4c529ac6a286a7773e0e7c17e263180_26_3.png)


    ## 认识 Python


    Python 是有史以来最伟大的计算机编程语言。它让你能够以一种简洁易懂的语言充分发挥计算机的能力。


    ### 什么是编程？


    在尝试学习编程语言之前，先了解什么是编程语言会有所帮助，Python 也不例外。让我们来看看 Python 是如何诞生的，以及它与其他语言的关系。


    ### PYTHON


    编程语言是计算机遵循的一系列指令。这些指令可以简单到显示你的名字或播放音乐文件，也可以复杂到构建一个完整的虚拟世界。Python 是一种编程语言，于 1980
    年代末由荷兰 Centrum Wiskunde & Informatica（CWI）的 Guido van Rossum 构思，作为 ABC 语言的继承者。


    **Guido van Rossum，Python 之父。**


    ![](img/e4c529ac6a286a7773e0e7c17e263180_27_0.png)


    ### 编程食谱


    程序就像计算机的食谱。烤蛋糕的食谱可能是这样的：


    - 将 100 克自发粉放入碗中。

    - 向碗中加入 100 克黄油。

    - 加入 100 毫升牛奶。

    - 烘烤半小时。


    ![](img/e4c529ac6a286a7773e0e7c17e263180_27_1.png)


    ### 代码


    就像食谱一样，程序由你按顺序执行的指令组成。一个描述蛋糕制作过程的程序可能这样运行：


    ```python

    bowl = []

    flour = 100

    butter = 50

    milk = 100

    bowl.append([flour, butter, milk])

    cake.cook(bowl)

    ```


    ![](img/e4c529ac6a286a7773e0e7c17e263180_27_2.png)


    ### 程序命令


    你可能不理解其中一些 Python 命令，比如 `bowl.append` 和 `cake.cook(bowl)`。第一个是一个列表，第二个是一个对象；我们将在本书中介绍这两者。主要要知道的是，在
    Python 中阅读命令很容易。一旦你了解了这些命令的功能，就很容易弄清楚程序是如何工作的。


    ![](img/e4c529ac6a286a7773e0e7c17e263180_27_3.png)


    ## 高级语言


    易于阅读的计算机语言被称为“高级”。这是因为它们“高高在上”于硬件（也称为“the metal”）之上。像汇编语言这样“贴近硬件”运行的语言被称为“低级”。低级语言的命令读起来有点像这样：`msg
    db , 0xa 1en equ $ - msg`。


    ![](img/e4c529ac6a286a7773e0e7c17e263180_28_0.png)


    ## Python 之禅


    Python 让你能够以人类可以理解的语言访问计算机的所有强大功能。这一切背后有一个被称为“Python 之禅”的理念。这是影响该语言设计的 20 条软件原则的集合。原则包括“美优于丑”和“简单优于复杂”。在
    Python 中输入 **import this**，它将显示所有这些原则。


    ![](img/e4c529ac6a286a7773e0e7c17e263180_28_1.png)


    ## Python 3 对比 Python 2


    在典型的计算场景中，Python 因为存在两个活跃版本而显得有些复杂：Python 2 和 Python 3。


    ## Python 世界


    Python 3.7 是该编程语言的最新发布版本。然而，如果你深入研究 Python 网站，并在线调查 Python 代码，你无疑会遇到 Python 2。尽管你可以同时运行
    Python 3 和 Python 2，但这并不推荐。始终选择 Python 网站上发布的最新稳定版本。


    ![](img/e4c529ac6a286a7773e0e7c17e263180_28_2.png)


    ## PYTHON 3.X


    2008 年，Python 3 随着几个新的和增强的功能一同到来。这些功能提供了更稳定、更有效、更高效的编程环境，但遗憾的是，这些新功能大多（如果不是全部的话）与
    Python 2 的脚本、模块和教程不兼容。虽然起初并不受欢迎，但 Python 3 此后已成为 Python 编程的前沿。


    ![](img/e4c529ac6a286a7773e0e7c17e263180_28_3.png)


    ## PYTHON 2.X


    那么为什么有两个版本呢？嗯，Python 2 最初于 2000 年推出，此后积累了相当庞大的模块、脚本、用户、教程等集合。多年来，Python 2 很快成为初学者和专家编码的首选编程语言之一，这使其成为一项极其宝贵的资源。


    ![](img/e4c529ac6a286a7773e0e7c17e263180_28_4.png)


    ## 3.X 胜出


    Python 3 日益增长的受欢迎程度意味着，现在开始学习使用其新特性进行开发，并逐步淘汰旧版本，是明智之举。许多开发公司，如 SpaceX 和 NASA，都在重要代码片段中使用
    Python 3。


    ![](img/e4c529ac6a286a7773e0e7c17e263180_28_5.png)'
