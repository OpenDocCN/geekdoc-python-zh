  md: '# # How to Set Up Python in Windows


    Windows users can easily install the latest version of Python via the main Python
    Downloads page. Whilst most seasoned Python developers may shun Windows as the
    platform of choice for building their code, it''s still an ideal starting point
    for beginners.


    # ## INSTALLING PYTHON 3.X


    Microsoft Windows doesn''t come with Python preinstalled as standard, so it will
    be necessary to install it yourself manually. Thankfully, it''s an easy process
    to follow.


    # ### STEP 1


    Start by opening your web browser to www.python.org/downloads/. Look for the button
    detailing the Download link for Python 3.x. Python is regularly updated, changing
    the last digit for each bug fix and update. Therefore, don''t worry if you see
    Python 3.8, or more, as long as it''s Python 3, the code in this book will work
    fine.


    ![](img/e4c529ac6a286a7773e0e7c17e263180_29_0.png)


    # ### STEP 2


    Click the Download button for version 3.x and save the file to your Downloads
    folder. When the file is downloaded, double-click the executable and the Python
    installation wizard will launch. From here, you have two choices: Install Now
    and Customise Installation. We recommend opting for the Customise Installation
    link.


    ![](img/e4c529ac6a286a7773e0e7c17e263180_29_1.png)


    # ### STEP 3


    Choosing the Customise option allows you to specify certain parameters, and whilst
    you may stay with the defaults, it''s a good habit to adopt as, sometimes (not
    with Python, thankfully), installers can include unwanted additional features.
    On the first screen available, ensure all boxes are ticked and click the Next
    button.


    ![](img/e4c529ac6a286a7773e0e7c17e263180_29_2.png)


    # ### STEP 4


    The next page of options include some interesting additions to Python. Ensure
    the Associate file with Python, Create Shortcuts, Add Python to Environment Variables,
    Precompile Standard Library and Install for All Users options are ticked. These
    make using Python later much easier. Click Install when you''re ready to continue.


    ![](img/e4c529ac6a286a7773e0e7c17e263180_29_3.png)'
