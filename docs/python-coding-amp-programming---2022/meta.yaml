  md: "# Conditions and Loops\n\n**STEP 5** Press F5 and save the code to execute\
    \ it. Enter a four-letter word in the Shell to begin with, you should have the\
    \ returned message that it's the word is four letters. Now press F5 again and\
    \ rerun the program but this time enter a five-letter word. The Shell will display\
    \ that it's not a four-letter word.\n\n![](img/e4c529ac6a286a7773e0e7c17e263180_52_0.png)\n\
    \n**STEP 6** Now expand the code to include another conditions. Eventually, it\
    \ could become quite complex. We've added a condition for three-letter words:\n\
    \n```\npython\nword=input(\"Please enter a four-letter word: \")\nword_length=len(word)\n\
    if word_length == 4:\n    print (word, \"is a four-letter word. Well done.\")\n\
    elif word_length == 3:\n    print (word, \"is a three-letter word. Try again.\"\
    )\nelse:\n    print (word, \"is not a four-letter word.\")\n```\n\n![](img/e4c529ac6a286a7773e0e7c17e263180_52_1.png)\n\
    \n# LOOPS\n\nA loop looks quite similar to a condition but they are somewhat different\
    \ in their operation. A loop will run through the same block of code a number\
    \ of times, usually with the support of a condition.\n\n**STEP 1** Let's start\
    \ with a simple While statement. Like IF, this will check to see if something\
    \ is TRUE, then run the indented code:\n\n```\npython\nx = 1\nwhile x < 10:\n\
    \    print (x)\n    x = x + 1\n```\n\n![](img/e4c529ac6a286a7773e0e7c17e263180_52_2.png)\n\
    \n**STEP 3** The For loop is another example. For is used to loop over a range\
    \ of data, usually a list stored as variables inside square brackets. For example:\n\
    \n```\npython\nwords=[\"Cat\", \"Dog\", \"Unicorn\"]\nfor word in words:\n   \
    \ print (word)\n```\n\n![](img/e4c529ac6a286a7773e0e7c17e263180_52_3.png)\n\n\
    **STEP 2** The difference between if and while is when while gets to the end of\
    \ the indented code, it goes back and checks the statement is still true. In our\
    \ example x is less than 10. With each loop it prints the current value of x,\
    \ then adds one to that value. When x does eventually equal 10 it stops.\n\n![](img/e4c529ac6a286a7773e0e7c17e263180_52_4.png)\n\
    \n**STEP 4** The For loop can also be used in the countdown example by using the\
    \ range function:\n\n```\npython\nfor x in range (1, 10):\n    print (x)\n```\n\
    \nThe x=x+1 part isn't needed here because the range function creates a list between\
    \ the first and last numbers used.\n\n![](img/e4c529ac6a286a7773e0e7c17e263180_52_5.png)"
