- md: '## Dictionaries


    Lists are extremely useful but dictionaries in Python are by far the more technical
    way of dealing with data items. They can be tricky to get to grips with at first
    but you''ll soon be able to apply them to your own code.


    ## KEY PAIRS


    A dictionary is like a list but instead each data item comes as a pair, these
    are known as Key and Value. The Key part must be unique and can either be a number
    or string whereas the Value can be any data item you like.


    STEP 1 Let''s say you want to create a phonebook in Python. You would create the
    dictionary name and enter the data in curly brackets, separating the key and value
    by a colon Key:Value. For example:


    ```

    phonebook={"Emma": 1234, "Daniel": 3456, "Hannah": 6789}

    ```


    STEP 3 As with lists and tuples, you can check the contents of a dictionary by
    giving the dictionary a name: phonebook, in this example. This will display the
    data items you''ve entered in a similar fashion to a list, which you''re no doubt
    familiar with by now.


    ![](img/e4c529ac6a286a7773e0e7c17e263180_67_0.png)


    ![](img/e4c529ac6a286a7773e0e7c17e263180_67_1.png)


    STEP 2 Just as with most lists, tuples and so on, strings need to be enclosed
    in quotes (single or double), whilst integers can be left open. Remember that
    the value can be either a string or an integer, you just need to enclose the relevant
    one in quotes:


    ```

    phonebook2={"David": "0987 654 321"}

    ```


    STEP 4 The benefit of using a dictionary is that you can enter the key to index
    the value. Using the phonebook example from the previous steps, you can enter:


    ```

    phonebook["Emma"]

    phonebook["Hannah"]

    ```


    ![](img/e4c529ac6a286a7773e0e7c17e263180_67_2.png)


    ![](img/e4c529ac6a286a7773e0e7c17e263180_67_3.png)


    **STEP 5** Adding to a dictionary is easy too. You can include a new data item
    entry by adding the new key and value items like:


    ```

    phonebook["David"] = "0987 654 321"

    phonebook

    ```


    ![](img/e4c529ac6a286a7773e0e7c17e263180_68_0.png)


    **STEP 8** Next, you need to define the user inputs and variables: one for the
    person’s name, the other for their phone number (let’s keep it simple to avoid
    lengthy Python code):


    ```

    name=input("Enter name: ")

    number=int(input("Enter phone number: "))

    ```


    ![](img/e4c529ac6a286a7773e0e7c17e263180_68_1.png)


    **STEP 6** You can also remove items from a dictionary by issuing the del command
    followed by the item’s key; the value will be removed as well, since both work
    as a pair of data items:


    ```

    del phonebook["David"]

    ```


    ![](img/e4c529ac6a286a7773e0e7c17e263180_68_2.png)


    **STEP 9** Note we’ve kept the number as an integer instead of a string, even
    though the value can be both an integer or a string. Now you need to add the user’s
    inputted variables to the newly created blank dictionary. Using the same process
    as in Step 5, you can enter:


    ```

    phonebook[name] = number

    ```


    ![](img/e4c529ac6a286a7773e0e7c17e263180_68_3.png)


    **STEP 7** Taking this a step further, how about creating a piece of code that
    will ask the user for the dictionary key and value items? Create a new Editor
    instance and start by coding in a new, blank dictionary:


    ```

    phonebook={}

    ```


    ![](img/e4c529ac6a286a7773e0e7c17e263180_68_4.png)


    **STEP 10** Now when you save and execute the code, Python will ask for a name
    and a number. It will then insert those entries into the phonebook dictionary,
    which you can test by entering into the Shell:


    ```

    phonebook

    phonebook["David"]

    ```


    If the number needs to contain spaces you need to make it a string, so remove
    the int part of the input.


    ![](img/e4c529ac6a286a7773e0e7c17e263180_68_5.png)


    ## Splitting and Joining Strings


    When dealing with data in Python, especially from a user’s input, you will undoubtedly
    come across long sets of strings. A useful skill to learn in Python programming
    is being able to split those long strings for better readability.


    ## STRING THEORIES


    You’ve already looked at some list functions, using .insert, .remove, and .pop
    but there are also functions that can be applied to strings.


    **STEP 1** The main tool in the string function arsenal is .split(). With it you’re
    able to split apart a string of data, based on the argument within the brackets.
    For example, here’s a string with three items, each separated by a space:


    ```

    text="Daniel Hannah Emma"

    ```


    **STEP 3** Note that the text.split part has the brackets, quotes, then a space
    followed by closing quotes and brackets. The space is the separator, indicating
    that each list item entry is separated by a space. Likewise, CSV (Comma Separated
    Value) content has a comma, so you’d use:


    ```

    text="January,February,March,April,May,June"

    months=text.split(",")

    months

    ```


    ![](img/e4c529ac6a286a7773e0e7c17e263180_69_0.png)


    ![](img/e4c529ac6a286a7773e0e7c17e263180_69_1.png)


    **STEP 2** Now let’s turn the string into a list and split the content accordingly:


    ```

    names=text.split(" ")

    ```


    Then enter the name of the new list, names, to see the three items.


    **STEP 4** You’ve previously seen how you can split a string into individual letters
    as a list, using a name:


    ```

    name=list("David")

    name

    ```


    The returned value is ‘D’, ‘a’, ‘v’, ‘i’, ‘d’. Whilst it may seem a little useless
    under ordinary circumstances, it could be handy for creating a spelling game for
    example.


    ![](img/e4c529ac6a286a7773e0e7c17e263180_69_2.png)


    ![](img/e4c529ac6a286a7773e0e7c17e263180_69_3.png)


    ## Splitting and Joining Strings


    STEP 5


    The opposite of the .split function is join, where you will have separate items
    in a string and can join them all together to form a word or just a combination
    of items, depending on the program you''re writing. For instance:


    ```

    alphabet="".join(["a","b","c","d","e"])

    alphabet

    ```


    This will display ''abcde'' in the Shell.


    ![](img/e4c529ac6a286a7773e0e7c17e263180_70_0.png)


    STEP 8


    As with the .split function, the separator doesn''t have to be a space, it can
    also be a comma, a full stop, a hyphen or whatever you like:


    ```

    colours=["Red", "Green", "Blue"]

    col=", ".join(colours)

    col

    ```


    ![](img/e4c529ac6a286a7773e0e7c17e263180_70_1.png)


    STEP 6


    You can therefore apply .join to the separated name you made in Step 4, combining
    the letters again to form the name:


    ```

    name="".join(name)

    name

    ```


    We''ve joined the string back together, and retained the list called name, passing
    it through the .join function.


    ![](img/e4c529ac6a286a7773e0e7c17e263180_70_2.png)


    STEP 9


    There''s some interesting functions you apply to a string, such as .capitalize
    and .title. For example:


    ```

    title="conan the cimmerian"

    title.capitalize()

    title.title()

    ```


    ![](img/e4c529ac6a286a7773e0e7c17e263180_70_3.png)


    STEP 7


    A good example of using the .join function is when you have a list of words you
    want to combine into a sentence:


    ```

    list=["Conan", "raised", "his", "mighty", "sword",

    "and", "struck", "the", "demon"]

    text=" ".join(list)

    text

    ```


    Note the space between the quotes before the .join function (where there were
    no quotes in Step 6''s .join).


    ![](img/e4c529ac6a286a7773e0e7c17e263180_70_4.png)


    STEP 10


    You can also use logic operators on strings, with the ''in'' and ''not in'' functions.
    These enable you to check if a string contains (or does not contain) a sequence
    of characters:


    ```

    message="Have a nice day"

    "nice" in message

    "bad" not in message

    "day" not in message

    "night" in message

    ```


    ![](img/e4c529ac6a286a7773e0e7c17e263180_70_5.png)


    ## Formatting Strings


    ### STRING FORMATTING


    Since Python 3, string formatting has become a much neater process, using the
    .format function combined with curly brackets. It’s a more logical and better
    formed approach than previous versions.


    The basic formatting in Python is to call each variable into the string using
    the curly brackets:


    ```

    name="Conan"

    print("The barbarian hero of the Hyborian Age is: {}".format(name))

    ```


    ![](img/e4c529ac6a286a7773e0e7c17e263180_71_0.png)


    Remember to close the print function with two sets of brackets, as you’ve encased
    the variable in one, and the print function in another. You can include multiple
    cases of string formatting in a single print function:


    ```

    name="Conan"

    place="Cimmeria"

    print("{} hailed from the North, in a cold land known as {}".format(name, place))

    ```


    ![](img/e4c529ac6a286a7773e0e7c17e263180_71_1.png)


    You can of course also include integers into the mix:


    ```

    number=10000

    print("{} of {} was a skilled mercenary, and thief too. He once stole {} gold
    from a merchant.".format(name, place, number))

    ```


    ![](img/e4c529ac6a286a7773e0e7c17e263180_71_2.png)


    There are many different ways to apply string formatting, some are quite simple,
    as we’ve shown you here; others can be significantly more complex. It all depends
    on what you want from your program. A good place to reference frequently regarding
    string formatting is the Python Docs webpage, found at www.python.org/3.1/library/string.html.
    Here, you will find tons of help.


    ![](img/e4c529ac6a286a7773e0e7c17e263180_71_3.png)'
  mdcn: '## 字典


    列表极其有用，但 Python 中的字典目前为止是处理数据项更专业的方式。它们一开始可能有点难掌握，但你很快就能将它们应用到自己的代码中。


    ## 键值对


    字典类似于列表，但每个数据项是以**一对**的形式出现的，这被称为**键（Key）**和**值（Value）**。键部分必须是唯一的，可以是数字或字符串，而值可以是任何你想要的数据项。


    **步骤 1** 假设你想在 Python 中创建一个电话簿。你需要创建字典名称，并在花括号中输入数据，用冒号分隔键和值（键:值）。例如：


    ```

    phonebook={"Emma": 1234, "Daniel": 3456, "Hannah": 6789}

    ```


    **步骤 3** 与列表和元组类似，你可以通过给出字典名称来检查其内容：本例中为 `phonebook`。这将显示你输入的数据项，其方式与你现在无疑已经熟悉的列表类似。


    ![](img/e4c529ac6a286a7773e0e7c17e263180_67_0.png)


    ![](img/e4c529ac6a286a7773e0e7c17e263180_67_1.png)


    **步骤 2** 就像大多数列表、元组等一样，字符串需要用引号（单引号或双引号）括起来，而整数可以不用引号。记住，值可以是字符串或整数，你只需要将相关类型用引号括起来：


    ```

    phonebook2={"David": "0987 654 321"}

    ```


    **步骤 4** 使用字典的好处在于，你可以输入键来索引对应的值。使用前面步骤中的电话簿示例，你可以输入：


    ```

    phonebook["Emma"]

    phonebook["Hannah"]

    ```


    ![](img/e4c529ac6a286a7773e0e7c17e263180_67_2.png)


    ![](img/e4c529ac6a286a7773e0e7c17e263180_67_3.png)


    **步骤 5** 向字典中添加内容也很容易。你可以通过添加新的键值对来包含新的数据项条目，例如：


    ```

    phonebook["David"] = "0987 654 321"

    phonebook

    ```


    ![](img/e4c529ac6a286a7773e0e7c17e263180_68_0.png)


    **步骤 8** 接下来，你需要定义用户输入和变量：一个用于人名，另一个用于其电话号码（为避免冗长的 Python 代码，我们简化处理）：


    ```

    name=input("Enter name: ")

    number=int(input("Enter phone number: "))

    ```


    ![](img/e4c529ac6a286a7773e0e7c17e263180_68_1.png)


    **步骤 6** 你也可以通过发出 `del` 命令后跟条目的键来从字典中删除条目；其对应的值也会被删除，因为它们是成对工作的数据项：


    ```

    del phonebook["David"]

    ```


    ![](img/e4c529ac6a286a7773e0e7c17e263180_68_2.png)


    **步骤 9** 注意，我们将电话号码保持为整数而不是字符串，尽管值既可以是整数也可以是字符串。现在你需要将用户输入的变量添加到新创建的空白字典中。使用与步骤
    5 相同的过程，你可以输入：


