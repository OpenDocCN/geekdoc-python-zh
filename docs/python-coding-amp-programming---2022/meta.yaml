    \ the double quotes open the specified page. You can even use variables to call\
    \ multiple tabs in the same browser:\n\n```\nimport os\na=('chromium-browser \"\
    http://bdmpublications.com/\"')\nb=('chromium-browser \"http://www.google.co.uk\"\
    ')\nos.system(a + b)\n```\n\n![](img/e4c529ac6a286a7773e0e7c17e263180_92_2.png)\n\
    \n# STEP 8\n\nThe ability to manipulate directories, or folders if you prefer,\
    \ is one of the OS module's best features. For example, to create a new directory\
    \ you can use:\n\n```\nimport os\nos.mkdir(\"NEW\")\n```\n\nThis creates a new\
    \ directory within the Current Working Directory, named according to the object\
    \ in the mkdir function.\n\n![](img/e4c529ac6a286a7773e0e7c17e263180_92_3.png)\n\
    \n# STEP 9\n\nYou can also rename any directories you've created by entering:\n\
    \n```\nimport os\nos.rename(\"NEW\", \"OLD\")\n```\n\nTo delete them:\n\n```\n\
