  - "[PAGE 118]\n\n# Text to Binary Convertor\n\n1000010 1101001 1101110 1100001 1110010\
    \ 1111001\n\nThe text to binary convertor does offer some room for improvement\
    \ and enhancement. There are many uses: it could be utilised in a password or\
    \ secret word script, as part of an adventure game or just a novel way to display\
    \ someone's name.\n\nWith regards to improvements, you could display the binary\
    \ conversion in a Pygame window, using the animated text options from page 100.\
    \ You could also ask the user if they wanted to have another go, or even ask if\
    \ they wanted the binary output to be saved to a file.\n\nWith regards to rendering\
    \ the outputted binary conversion to a Pygame window, complete with rotating text,\
    \ you can use:\n\n```\nimport pygame\npygame.init()\n\nBLACK = (0, 0, 0)\nWHITE\
    \ = (255, 255, 255)\nBLUE = (0, 0, 255)\nGREEN = (0, 255, 0)\nRED = (255, 0, 0)\n\
    \nprint(\">>>>>>>>>>Text to Binary Convertor<<<<<<<<<<\\n\")\n\nconversion=input(\"\
    Enter text to convert to Binary: \")\n\nsize = (600, 400)\nscreen = pygame.display.set_mode(size)\n\
    ```\n\n```\npygame.display.set_caption(\"Binary Conversion\")\n\ndone = False\n\
    clock = pygame.time.Clock()\n\ntext_rotate_degrees = 0\n\nBinary=(' '.join(format(ord(x),\
    \ 'b') for x in conversion))\n\nwhile not done:\n    for event in pygame.event.get():\n\
    \        if event.type == pygame.QUIT:\n            done = True\n\n    screen.fill(WHITE)\n\
    \    font = pygame.font.SysFont('Calibri', 25, True, False)\n\n    text = font.render(Binary,\
    \ True, BLACK)\n    text = pygame.transform.rotate(text, text_rotate_degrees)\n\
    \    text_rotate_degrees += 1\n    screen.blit(text, [100, 50])\n    pygame.display.flip()\n\
    \n    clock.tick(60)\n\npygame.quit()\n\nprint(' '.join(format(ord(x), 'b') for\
    \ x in conversion))\n```\n\n![](img/e4c529ac6a286a7773e0e7c17e263180_118_0.png)"
- md: "## Basic GUI File Browser\n\nHere's a helpful and interesting piece of code.\
    \ It's an extremely basic file browser that's presented in a graphical user interface\
    \ using the Tkinter module. There's a lot you can learn from this code and implement\
    \ into your own programs.\n\n### FILEBROWSER.PY\n\nTkinter is the main module\
    \ in use here but we're also using idlelib, so you may need to pip install any\
    \ extras if the dependencies fail when you execute the code.\n\n```python\nfrom\
    \ tkinter import Tk\n\nfrom idlelib.TreeWidget import ScrolledCanvas, FileTreeItem,\
    \ TreeNode\nimport os\n\nroot = Tk()\nroot.title(\"File Browser\")\n\nsc = ScrolledCanvas(root,\
    \ bg=\"white\",\n    highlightthickness=0, takefocus=1)\nsc.frame.pack(expand=1,\
    \ fill=\"both\", side=\"left\")\n\nitem = FileTreeItem(os.getcwd())\nnode = TreeNode(sc.canvas,\
    \ None, item)\nnode.expand()\n\nroot.mainloop()\n```\n\n![](img/e4c529ac6a286a7773e0e7c17e263180_119_0.png)\n\
    \n![](img/e4c529ac6a286a7773e0e7c17e263180_119_1.png)\n\n![](img/e4c529ac6a286a7773e0e7c17e263180_119_2.png)\n\
    \n## Advanced Filing\n\nWhen executed, the code will display the current directory's\
    \ contents. If you want to see the contents of another directory, you can run\
    \ the code from a command line within the chosen directory; just remember to call\
    \ the code from where it's located on your system, as per the second screenshot.\
    \ You can also double-click any of the file names shown in the directory tree\
    \ and rename them.\n\nThis is an interesting piece of code and one that you can\
    \ insert into your own programs. You can extend the code to include a user specified\
    \ directory to browse, perhaps your own unique file icons too. If you're using\
    \ Linux, create an alias to execute the code and then you can run it from wherever\
    \ you are in the system.\n\nWindows users may have some trouble with the above\
    \ code, an alternative can be achieved by using the following:\n\n```python\n\
    from tkinter import *\nfrom tkinter import ttk\nfrom tkinter.filedialog import\
    \ askopenfilename\n\nroot = Tk( )\n\ndef OpenFile():\n    name = askopenfilename(initialdir=\"\
    C:/\",\n                           filetypes =((\"Text File\", \"*.txt\"),(\"\
    All Files\",\"*.*\")),\n                           title = \"Choose a file.\"\n\
    \                           )\n    print (name)\n```\n\n```python\ntry:\n    with\
    \ open(name,'r') as UseFile:\n        print(UseFile.read())\nexcept:\n    print(\"\
    No files opened\")\n```\n\n```python\nTitle = root.title( \"File Opener\")\nlabel\
    \ = ttk.Label(root, text =\"File Open\",foreground=\"red\",font=(\"Helvetica\"\
    , 16))\nlabel.pack()\n```\n\n```python\nmenu = Menu(root)\nroot.config(menu=menu)\n\
    \nfile = Menu(menu)\n\nfile.add_command(label = 'Open', command = OpenFile)\n\
    file.add_command(label = 'Exit', command = lambda:exit())\n\nmenu.add_cascade(label\
    \ = 'File', menu = file)\n\nroot.mainloop()\n```\n\nIt's not quite the same but\
    \ this code allows you to open files in your system via the familiar Windows Explorer.\
    \ It's worth experimenting with to see what you can do with it.\n\n![](img/e4c529ac6a286a7773e0e7c17e263180_120_0.png)\n\
    \n## Mouse Controlled Turtle\n\nWe’ve already seen the Turtle module being controlled\
    \ by the user via the keyboard but now we thought we’d see how the user can use\
    \ their mouse as a drawing tool within Python. We have two possible code examples\
    \ here, pick which works best for you.\n\n![](img/e4c529ac6a286a7773e0e7c17e263180_121_0.png)\n\
    \n![](img/e4c529ac6a286a7773e0e7c17e263180_121_1.png)\n\n### MOUSETURTLE.PY\n\n\
    The first piece of code presents the standard Turtle window. Press Space and then\
    \ click anywhere on the screen for the Turtle to draw to the mouse pointer. The\
    \ second allows you to click the Turtle and drag it around the screen; but be\
    \ warned, it can crash Python.\n\n1st Code Example:\n\n```python\nfrom turtle\
    \ import Screen, Turtle\nscreen = Screen()\nyertle = Turtle()\ndef k101():\n \
    \   screen.onscreenclick(click_handler)\ndef click_handler(x, y):\n    screen.onscreenclick(None)\
    \ # disable event inside event handler\n    yertle.setheading(yertle.towards(x,\
    \ y))\n    yertle.goto(x, y)\n    screen.onscreenclick(click_handler) # reenable\
    \ event on event handler exit\nscreen.onkey(k101, \" \") # space turns on mouse\
    \ drawing\nscreen.listen()\nscreen.mainloop()\n```\n\n2nd Code Example:\n\n```python\n\
    from turtle import *\nshape(\"circle\")\npencolor(\"blue\")\nwidth(2)\nondrag(goto)\n\
    listen()\n```\n\n> Ninja TurtleMouse\n\nThis code utilises some interesting skills.\
    \ Obviously it will stretch your Python Turtle skills to come up with any improvements,\
    \ which is great, but it could make for a nice piece of code to insert into something\
    \ a young child will use. Therefore it can be a fantastic project for a younger\
    \ person to get their teeth into; or perhaps even as part of a game where the\
    \ main character is tasked to draw a skull and crossbones or something similar.\n\
    \n## Python Alarm Clock\n\nEver taken a quick break from working at the computer,\
    \ then suddenly realised many minutes later that you’ve spent all that time on\
    \ Facebook? Introducing the Python alarm clock code, where you can drop into the\
    \ command prompt and tell the code how many minutes until the alarm goes off.\n\
    \n### ALARMCLOCK.PY\n\nThis code is designed for use in the command prompt, be\
    \ that Windows, Linux or macOS. There are some instructions on how to use it in\
    \ the main print section but essentially it’s: python3 AlarmClock.py 10 (to go\
    \ off in ten minutes).\n\n```python\nimport sys\nimport string\nfrom time import\
    \ sleep\n\nsa = sys.argv\nlsa = len(sys.argv)\nif lsa != 2:\n    print (\"Usage:\
    \ [ python3 ] AlarmClock.py duration_in_minutes\")\n    print (\"Example: [ python3\
    \ ] AlarmClock.py 10\")\n    print (\"Use a value of 0 minutes for testing the\
    \ alarm immediately.\")\n    print (\"Beeps a few times after the duration is\
    \ over.\")\n    print (\"Press Ctrl-C to terminate the alarm clock early.\")\n\
    \    sys.exit(1)\n\ntry:\n    minutes = int(sa[1])\nexcept ValueError:\n    print\
    \ (\"Invalid numeric value (%s) for minutes\" % sa[1])\n    print (\"Should be\
    \ an integer >= 0\")\n    sys.exit(1)\n\nif minutes < 0:\n    print (\"Invalid\
    \ value for minutes, should be >= 0\")\n    sys.exit(1)\n\nseconds = minutes *\
    \ 60\n\nif minutes == 1:\n    unit_word = \" minute\"\nelse:\n    unit_word =\
    \ \" minutes\"\n\ntry:\n    if minutes > 0:\n        print (\"Sleeping for \"\
    \ + str(minutes) + unit_word)\n        sleep(seconds)\n    print (\"Wake up\"\
    )\n    for i in range(5):\n        print (chr(7)),\n        sleep(1)\nexcept KeyboardInterrupt:\n\
    \    print (\"Interrupted by user\")\n    sys.exit(1)\n```\n\n> ### Wakey Wakey\n\
    \nThere’s some good use of try and except blocks here, alongside some other useful\
    \ loops that can help you get a firmer understanding of how they work in Python.\
    \ The code itself can be used in a variety of ways: in a game where something\
    \ happens after a set amount of time or simply as a handy desktop alarm clock\
    \ for your tea break.\n\nLinux users, try making the alarm clock code into an\
    \ alias, so you can run a simple command to execute it. Then, why not integrate\
    \ a user input at the beginning to ask the user for the length of time they want\
    \ until the alarm goes off, rather than having to include it in the command line.\n\
    \n![](img/e4c529ac6a286a7773e0e7c17e263180_122_0.png)\n\nWindows users, if Python\
    \ 3 is the only version installed on your system then you will need to execute\
    \ the code without adding the 3 to the end of the Python command. For example:\n\
    \n```\npython AlarmClock.py 10\n```\n\nAgain, you could easily incorporate this\
    \ into a Windows batch file and even set a schedule to activate the alarm at certain\
    \ times of the day.\n\n## Vertically Scrolling Text\n\nWhat's not to like about\
    \ vertically scrolling text? Its uses are many: the beginning of a game or introduction\
    \ to something epic, like the beginning of every Star Wars movie; a list of credits\
    \ at the end of something, such as a Python presentation. The list goes on.\n\n\
    ### EPICSCROLL.PY\n\nWe've used the poem Cimmeria by Robert E. Howard for the\
    \ code's scrolling text, along with a dramatic black background and red text.\
    \ We think you'll agree, it's quite epic.\n\n![](img/e4c529ac6a286a7773e0e7c17e263180_123_0.png)\n\
    \n```python\nimport pygame as pg\nfrom pygame.locals import *\n\npg.init()\n\n\
    text_list = '''\nI remember\nThe dark woods, masking slopes of sombre hills;\n\
    The grey clouds' leaden everlasting arch;\nThe dusky streams that flowed without\
    \ a sound,\nAnd the lone winds that whispered down the passes.\n\nVista on vista\
    \ marching, hills on hills,\nSlope beyond slope, each dark with sullen trees,\n\
    Our gaunt land lay. So when a man climbed up\nA rugged peak and gazed, his shaded\
    \ eye\nSaw but the endless vista - hill on hill,\nSlope beyond slope, each hooded\
    \ like its brothers.\n\nIt was a gloomy land that seemed to hold\nAll winds and\
    \ clouds and dreams that shun the sun,\nWith bare boughs rattling in the lonesome\
    \ winds,\nAnd the dark woodlands brooding over all,\nNot even lightened by the\
    \ rare dim sun\nWhich made squat shadows out of men; they called it\nCimmeria,\
    \ land of Darkness and deep Night.\n\nIt was so long ago and far away\nI have\
    \ forgot the very name men called me.\nThe axe and flint-tipped spear are like\
    \ a dream,\nAnd hunts and wars are shadows. I recall\nOnly the stillness of that\
    \ sombre land;\nThe clouds that piled forever on the hills,\nThe dimness of the\
    \ everlasting woods.\nCimmeria, land of Darkness and the Night.\n\nOh, soul of\
    \ mine, born out of shadowed hills,\nTo clouds and winds and ghosts that shun\
    \ the sun,\nHow many deaths shall serve to break at last\nThis heritage which\
    \ wraps me in the grey\nApparel of ghosts? I search my heart and find\nCimmeria,\
    \ land of Darkness and the Night!\n'''.split('\\n')\n```\n\n![](img/e4c529ac6a286a7773e0e7c17e263180_123_1.png)"
  mdcn: "## 基本图形用户界面文件浏览器\n\n这是一个实用且有趣的代码示例。它展示了如何使用 Tkinter 模块构建一个极其基础的图形用户界面文件浏览器。从这段代码中你可以学到很多东西，并将其应用到自己的程序中。\n\
