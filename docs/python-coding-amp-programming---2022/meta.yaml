  - "[PAGE 131]\n\n# # Python Scrolling Ticker Script\n\nYou may be surprised to hear\
    \ that one of the snippets of code we’re often asked for is some form of scrolling\
    \ ticker. Whilst we’ve covered various forms of scrolling text previously, the\
    \ ticker is something that seems to keep cropping up. So, here it is.\n\n# ##\
    \ Ticker Time\n\nThe obvious improvements to the Ticker code lie in the speed\
    \ of the text and what the text will display. Otherwise you can change the background\
    \ colour of the ticker window, the font and the font colour, along with the geometry\
    \ of the Tkinter window if you want to.\n\nYet another interesting element that\
    \ could be introduced is one of the many text to Speech modules available for\
    \ Python 3. You could pip install one, import it, then as the ticker displays\
    \ the text, the text to speech function will read out the variable at the same\
    \ time, since the entire text is stored in the variable labelled ‘s’.\n\n![](img/e4c529ac6a286a7773e0e7c17e263180_131_0.png)\n\
    \nThe ticker example can be used for system warnings, perhaps something that will\
    \ display across your work or home network detailing the shutting down of a server\
    \ over the weekend for maintenance; or even just to inform everyone as to what’s\
    \ happening. We’re sure you will come up with some good uses for it.\n\n# ## TICKER.PY\n\
    \nWe’re using Tkinter here along with the Time module to determine the speed the\
    \ text is displayed across the window.\n\n```\npython\nimport time\nimport tkinter\
    \ as tk\n\nroot = tk.Tk()\ncanvas = tk.Canvas(root, root.title(\"Ticker Code\"\
    ), height=80, width=600, bg=\"yellow\")\ncanvas.pack()\nfont = ('courier', 48,\
    \ 'bold')\ntext_width = 15\n\n#Text blocks insert here....\n\ns1 = \"This is a\
    \ scrolling ticker example. As you can see, it’s quite long but can be a lot longer\
    \ if necessary...\"\ns2 = \"We can even extend the length of the ticker message\
    \ by including more variables...\"\ns3 = \"The variables are within the s-values\
    \ in the code.\"\ns4 = \"Don’t forget to concatenate them all before the For loop,\
    \ and rename the ‘spacer’ s-variable too.\"\n\n# pad front and end of text with\
    \ spaces\ns5 = ' ' * text_width\n# concatenate it all\ns = s5 + s1 + s2 + s3 +\
    \ s4 + s5\nx = 1\ny = 2\ntext = canvas.create_text(x, y, anchor='nw', text=s,\
    \ font=font)\ndx = 1\ndy = 0  # use horizontal movement only\n\n# the pixel value\
    \ depends on dx, font and length of text\npixels = 9000\n\nfor p in range(pixels):\n\
    \    # move text object by increments dx, dy\n    # -dx --> right to left\n  \
    \  canvas.move(text, -dx, dy)\n    canvas.update()\n    # shorter delay --> faster\
    \ movement\n    time.sleep(0.005)\n    #print(k)  # test, helps with pixel value\n\
    \nroot.mainloop()\n\n```"
- md: "## Simple Python Calculator\n\nSometimes the simplest code can be the most\
    \ effective. Take for example, this Simple Python Calculator script. It's based\
    \ on the Create Your Own Modules section seen earlier but doesn't utilise any\
    \ external modules.\n\n![](img/e4c529ac6a286a7773e0e7c17e263180_132_0.png)\n\n\
    ## CALCULATOR.PY\n\nWe created some function definitions to begin with, then lead\
    \ on to the user menu and inputs. It's an easy piece of code to follow and as\
    \ such can also be expanded well too.\n\n```python\nprint(\"-----------Simple\
    \ Python Calculator-----------\\n\")\n\ndef add(x, y):\n    return x + y\n\ndef\
    \ subtract(x, y):\n    return x - y\n\ndef multiply(x, y):\n    return x * y\n\
    \ndef divide(x, y):\n    return x / y\n\nprint(\"Select operation.\\n\")\nprint(\"\
    1.Add\")\nprint(\"2.Subtract\")\nprint(\"3.Multiply\")\nprint(\"4.Divide\")\n\n\
    choice = input(\"\\nEnter choice (1/2/3/4):\")\n\nnum1 = int(input(\"\\nEnter\
    \ first number: \"))\nnum2 = int(input(\"Enter second number: \"))\n\nif choice\
    \ == '1':\n    print(num1,\"+\",num2,\"=\", add(num1,num2))\n\nelif choice ==\
    \ '2':\n    print(num1,\"-\",num2,\"=\", subtract(num1,num2))\n\nelif choice ==\
    \ '3':\n    print(num1,\"*\",num2,\"=\", multiply(num1,num2))\n\nelif choice ==\
    \ '4':\n    print(num1,\"/\",num2,\"=\", divide(num1,num2))\nelse:\n    print(\"\
    Invalid input\")\n```\n\n![](img/e4c529ac6a286a7773e0e7c17e263180_132_1.png)\n\
    \n## Improved Calculations\n\nThe obvious contender for improvement here is using\
    \ the Create Your Own Modules route and extracting the function definitions as\
    \ a module. You can then call the module and focus on the body of the code.\n\n\
    The other area of improvement is code itself. Where there's just a single shot\
    \ at making a calculation, you could encase it in a while loop, so once a value\
    \ is presented the user is sent back to the main menu. Perhaps, improvement to\
    \ the Invalid Input section is worth looking into as well.\n\n## Hangman Game\
    \ Script\n\nHangman is a great game to program into Python. It can be extremely\
    \ complex, displaying graphics, the number of guesses left in the secret word,\
    \ a huge bank of available words picked at random and countless other elements.\
    \ It can also be quite simple. Here we have a mix between the two.\n\n![](img/e4c529ac6a286a7773e0e7c17e263180_133_0.png)\n\
    \n![](img/e4c529ac6a286a7773e0e7c17e263180_133_1.png)\n\n![](img/e4c529ac6a286a7773e0e7c17e263180_133_2.png)\n\
    \n## HANGMAN.PY\n\nWe've made a Hangman game board (the gallows) out of characters\
    \ that can be displayed in the IDLE Shell, along with a huge bank of words to\
    \ randomly choose from.\n\n```python\nimport random\n\nboard = ['''\n\n>>>>>>>>>Hangman<<<<<<<<<<\n\
    \n+---+\n|   |\n|\n|\n|\n|\n=========''', '''\n\n+---+\n|   |\n|   O\n|\n|\n|\n\
    =========''', '''\n\n+---+\n|   |\n|   O\n|   |\n|\n|\n=========''', '''\n\n+---+\n\
    |   |\n|   O\n|  /|\n|\n|\n=========''', '''\n\n+---+\n|   |\n|   O\n|  /|\\n|\n\
    |\n=========''', '''\n\n+---+\n|   |\n|   O\n|  /|\\n|  /\n|\n=========''', '''\n\
    \n+---+\n|   |\n|   O\n|  /|\\n|  / \\n|\n========='''\n]\n```\n\n```python\n\
    class Hangman:\n    def __init__(self, word):\n        self.word = word\n    \
    \    self.missed_letters = []\n        self.guessed_letters = []\n\n    def guess(self,\
    \ letter):\n        if letter in self.word and letter not in self.guessed_letters:\n\
    \            self.guessed_letters.append(letter)\n        elif letter not in self.word\
    \ and letter not in self.missed_letters:\n            self.missed_letters.append(letter)\n\
    \        else:\n            return False\n        return True\n\n    def hangman_over(self):\n\
    \        return self.hangman_won() or (len(self.missed_letters) == 6)\n\n    def\
    \ hangman_won(self):\n        if \"_\" not in self.hide_word():\n            return\
    \ True\n        return False\n\n    def hide_word(self):\n        rtn = \"\"\n\
    \        for letter in self.word:\n            if letter not in self.guessed_letters:\n\
    \                rtn += \"_\"\n            else:\n                rtn += letter\n\
    \        return rtn\n\n    def print_game_status(self):\n        print(board[len(self.missed_letters)])\n\
    \        print(\"Word:\" + self.hide_word())\n        print(\"Letters Missed:\"\
    )\n        for letter in self.missed_letters:\n            print(letter,)\n  \
    \      print()\n        print(\"Letters Guessed:\")\n        for letter in self.guessed_letters:\n\
    \            print(letter,)\n        print()\n\ndef rand_word():\n    bank = \"\
    ability about above absolute accessible accommodation accounting beautiful bookstore\
    \ calculator clever engaged engineer enough handsome refrigerator opposite socks\
    \ interested strawberry backgammon anniversary confused dangerous entertainment\
    \ exhausted impossible overweight temperature vacation scissors accommodation\
    \ appointment decrease development earthquake environment brand environment necessary\
    \ luggage responsible ambassador circumstance congratulate frequent\".split()\n\
    \    return bank[random.randint(0, len(bank))]\n\ndef main():\n    game = Hangman(rand_word())\n\
    \    while not game.hangman_over():\n        game.print_game_status()\n      \
    \  user_input = input(\"\\nEnter a letter: \")\n        game.guess(user_input)\n\
    \n    game.print_game_status()\n    if game.hangman_won():\n        print(\"\\\
    nCongratulations! You have won!!\")\n    else:\n        print(\"\\nSorry, you\
    \ have lost.\")\n        print(\"The word was: \", game.word)\n\n    print(\"\\\
    nGoodbye!\\n\")\n\nif __name__ == \"__main__\":\n    main()\n```\n\n## QUIT()\n\
    \nSince this is the last example in our Python code repository, we thought we’d\
    \ go out with a bang and feature the hangman gallows being drawn with each incorrect\
    \ guess of the word. Don’t worry if it looks misaligned in the text here, this\
    \ is merely due to the differences between using the Python IDLE editor and pasting\
    \ the code into a word processor (which formats things differently).\n\nThere’s\
    \ plenty you can do to improve, enhance and expand on what we’ve presented here.\
    \ You can include a routine that returns an error if the user enters a number\
    \ or character. You can include extra points for someone who guesses the entire\
    \ word in one go rather than one letter at a time and you could perhaps add Chopin’s\
    \ Funeral March should you lose the game; or something celebratory if you win.\n\
    \n![](img/e4c529ac6a286a7773e0e7c17e263180_134_0.png)\n\nConsider replacing the\
    \ bank of words too. They’re found under the bank list, and could easily be swapped\
    \ out for something more difficult. If you download www.github.com/dwyl/english-words\
    \ you can find a text document with over 466,000 words. Perhaps you could swap\
    \ the words in the bank to instead read the contents of the text file:\n\n```python\n\
    def rand_word():\n    with open(\"/home/pi/Downloads/words.txt\", \"rt\") as f:\n\
    \        bank=f.readlines()\n    return bank[random.randint(0, len(bank))]\n```\n\
    \n## Understanding Linux\n\nLinux is a remarkably versatile and powerful operating\
    \ system. It’s used throughout the programming and engineering world, in science,\
    \ space exploration, education, gaming and everything else in between. It’s the\
    \ OS of choice for high-performance servers, it’s the backbone of the Internet\
    \ and it powers the fastest supercomputers in the world.\n\nKnowing how to use\
    \ Linux, and how it’s structured, is key to being able to create better Python\
    \ content. The Raspberry Pi, for example, uses a Linux-based OS and, as such,\
    \ makes for an excellent coding platform. Regardless of whether you’re using a\
    \ Pi, like us, or a Linux Mint or Ubuntu, these pages will prove invaluable for\
    \ your Python learning. Master Linux, master Python, and start engineering your\
    \ coding future.\n\n1. 138 What is Linux?\n2. 140 Using the Filesystem\n3. 142\
    \ Listing and Moving Files\n4. 144 Creating and Deleting Files\n5. 146 Create\
    \ and Remove Directories\n6. 148 Copying, Moving and Renaming Files\n7. 150 Useful\
    \ System and Disk Commands\n8. 152 Using the Man Pages\n9. 154 Editing Text Files\n\
    10. 156 Linux Tips and Tricks\n11. 158 A-Z of Linux Commands\n12. 160 Glossary\
    \ of Python Terms\n\n## What is Linux?\n\n> The Raspberry Pi operating system\
    \ is Raspbian, which is a Linux operating system; but what exactly is Linux? Where\
    \ did it come from and what does it do? In a world where Windows and macOS have\
    \ supremacy of the desktop, it’s easy to overlook it, but there’s more to Linux\
    \ than you might imagine.\n\nLinux is a surprisingly powerful, fast, secure and\
    \ capable operating system. It’s used as the OS of choice for the Raspberry Pi,\
    \ in the form of Raspbian OS, as well as in some of the most unlikely places.\n\
    \nDespite only enjoying a 1.96% share (according to netmarketshare.com) of the\
    \ total desktop operating system market, Linux has a dedicated following of enthusiasts,\
    \ users and contributors. It was created in 1991 by University of Helsinki student,\
    \ Linus Torvalds, who had become frustrated with the limitations and licensing\
    \ of the popular educational system Minix, a miniature version of the Unix operating\
    \ system, in use at the time.\n\nTorvalds needed a system that could mirror Unix’s\
    \ performance and features, without the licensing cost. Thus was born Linux, the\
    \ Unix-like operating system which used freely available code from the GNU project.\
    \ This enabled users around the world to utilise the power of the Unix-like system,\
    \ completely free of charge, an ethos that still holds today: Linux is free to\
    \ download, install and use.\n\nLinux is much like any other operating system,\
    \ such as Windows or macOS in that it manages the computer hardware, provides\
    \ an interface for the user to access that hardware and comes with programs for\
    \ productivity, communications, gaming, science, education and more. Linux can\
    \ be broken up into a number of significant elements:\n\n### BOOTLOADER\n\nThe\
    \ bootloader is the software that initialises and boots up your computer. It loads\
    \ up the various modules the OS uses to begin to access the hardware in the system.\
    \ You can modify a bootloader to load more than one OS installed on the system.\n\
    \n### GRAPHICAL SERVER\n\nThis is a module within Linux that provides a graphical\
    \ output to your monitor. It’s referred to as the X server or simply just X. X\
    \ is an application that manages one or more graphical displays and one or more\
    \ input devices (keyboard, mouse, etc.) connected to the computer.\n\n### DAEMONS\n\
    \nDaemons are background services that start as the operating system is booting.\
    \ These can enable printing, sound, networking and so on. They run unobtrusively\
    \ rather than under the direct control of the user, often waiting to be activated\
    \ by an event or condition.\n\n### KERNEL\n\nThe kernel is the core of the system\
    \ and the single element that is actually called Linux. The Linux kernel manages\
    \ the computer processor, memory, storage and any peripherals you have attached\
    \ to your computer. It provides the basic services for all other parts of the\
    \ OS.\n\n### DESKTOP ENVIRONMENT\n\nThe Desktop Environment, or DE, is the main\
    \ Graphical User Interface (GUI) that users interact with. It’s the desktop, that\
    \ includes internet browsers, productivity, games and whatever program or app\
    \ you’re using. There are countless DEs available. Raspbian uses PIXEL.\n\n###\
    \ PROGRAMS/APPLICATIONS\n\nWith Linux being an open source, free operating system,\
    \ it also makes use of the tens of thousands of freely available applications.\
    \ The likes of LibreOffice, GIMP and Python are just the tip of the iceberg."
  mdcn: "## 简易Python计算器\n\n有时最简单的代码可能最有效。以这个简易Python计算器脚本为例。它基于之前介绍的“创建你自己的模块”部分，但没有使用任何外部模块。\n\
    \n![](img/e4c529ac6a286a7773e0e7c17e263180_132_0.png)\n\n## CALCULATOR.PY\n\n\
    我们首先创建了一些函数定义，然后引向用户菜单和输入。这是一段易于理解的代码，因此也具有很好的可扩展性。\n\n```python\nprint(\"-----------Simple\
    \ Python Calculator-----------\\n\")\n\ndef add(x, y):\n    return x + y\n\ndef\
    \ subtract(x, y):\n    return x - y\n\ndef multiply(x, y):\n    return x * y\n\
    \ndef divide(x, y):\n    return x / y\n\nprint(\"Select operation.\\n\")\nprint(\"\
    1.Add\")\nprint(\"2.Subtract\")\nprint(\"3.Multiply\")\nprint(\"4.Divide\")\n\n\
    choice = input(\"\\nEnter choice (1/2/3/4):\")\n\nnum1 = int(input(\"\\nEnter\
    \ first number: \"))\nnum2 = int(input(\"Enter second number: \"))\n\nif choice\
    \ == '1':\n    print(num1,\"+\",num2,\"=\", add(num1,num2))\n\nelif choice ==\
    \ '2':\n    print(num1,\"-\",num2,\"=\", subtract(num1,num2))\n\nelif choice ==\
    \ '3':\n    print(num1,\"*\",num2,\"=\", multiply(num1,num2))\n\nelif choice ==\
    \ '4':\n    print(num1,\"/\",num2,\"=\", divide(num1,num2))\nelse:\n    print(\"\
    Invalid input\")\n```\n\n![](img/e4c529ac6a286a7773e0e7c17e263180_132_1.png)\n\
    \n## 改进计算\n\n这里显而易见的改进点是使用“创建你自己的模块”的方法，将函数定义提取为一个模块。然后你可以调用该模块，并专注于代码的主体部分。\n\
    \n另一个改进领域是代码本身。目前每次只进行一次计算，你可以将其封装在一个 `while` 循环中，这样在显示结果后，用户会被送回主菜单。或许，对“无效输入”部分的改进也值得考虑。\n\
