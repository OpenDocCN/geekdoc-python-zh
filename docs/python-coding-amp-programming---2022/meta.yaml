  md: '# Glossary of Python Terms


    Just like most technology, Python contains many confusing words and acronyms.
    Here then, for your own sanity, is a handy glossary to help you keep on top of
    what’s being said when the conversation turns to Python programming.


    +   **Argument**

    The detailed extra information used by Python to perform more detailed commands.
    Can also be used in the command prompt to specify a certain runtime event.


    **Block**

    Used to describe a section or sections of code that are grouped together.


    **Break**

    A command that can be used to exit a for or while loop. For example, if a key
    is pressed to quit the program, Break will exit the loop.


    **Class**

    A class provides a means of bundling data and functionality together. They are
    used to encapsulate variables and functions into a single entity.


    **Comments**

    A comment is a section of real world wording inserted by the programmer to help
    document what’s going on in the code. They can be single line or multi-line and
    are defined by a # or """.


    **Debian**

    A Linux-based distro or distribution that forms the Debian Project. This environment
    offers the user a friendly and stable GUI to interact with along with Terminal
    commands and other forms of system level administration.


    **Def**

    Used to define a function or method in Python.


    **Dictionaries**

    A dictionary in Python is a data structure that consists of key and value pairs.


    **Distro**

    Also Distribution, an operating system that uses the Linux Kernel as its core
    but offers something different in its presentation to the end user.


    **Editor**

    An individual program, or a part of the graphical version of Python, that enables
    the user to enter code ready for execution.


    **Exceptions**

    Used as a means of breaking from the normal flow of a code block in order to handle
    any potential errors or exceptional conditions within the program.


    **Expression**

    Essentially, Python code that produces a value of something.


    **Float**

    An immutable floating point number used in Python.


    **Function**

    Used in Python to define a sequence of statements that can be called or referenced
    at any time by the programmer.


    **GitHub**

    A web-based version control and collaboration portal designed for software developers
    to better manage source code.


    **Global Variable**

    A variable that is useable anywhere in the program.


    **Graphics**

    The use of visual interaction with a program, game or operating system. Designed
    to make it easier for the user to manage the program in question.


    **GUI**

    Graphical User Interface. The interface which most modern operating systems use
    to enable the user to interact with the core programming of the system. A friendly,
    easy to use graphical desktop environment.


    **High-Level Language**

    A programming language that’s designed to be easy for people to read.


    **IDLE**

    Stands for Integrated Development Environment or Integrated Development and Learning
    Environment.


    **Immutable**

    Something that cannot be changed after it is created.


    **Import**

    Used in Python to include modules together with all the accompanying code, functions
    and variables they contain.


    **Indentation**

    Python uses indentation to delimit blocks of code. The indents are four spaces
    apart, and are often created automatically after a colon is used in the code.'
  merge: -1
