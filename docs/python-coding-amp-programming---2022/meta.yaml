  md: '# Dictionaries


    Lists are extremely useful but dictionaries in Python are by far the more technical
    way of dealing with data items. They can be tricky to get to grips with at first
    but you''ll soon be able to apply them to your own code.


    # KEY PAIRS


    A dictionary is like a list but instead each data item comes as a pair, these
    are known as Key and Value. The Key part must be unique and can either be a number
    or string whereas the Value can be any data item you like.


    STEP 1 Let''s say you want to create a phonebook in Python. You would create the
    dictionary name and enter the data in curly brackets, separating the key and value
    by a colon Key:Value. For example:


    phonebook={"Emma": 1234, "Daniel": 3456, "Hannah": 6789}


    STEP 3 As with lists and tuples, you can check the contents of a dictionary by
    giving the dictionary a name: phonebook, in this example. This will display the
    data items you''ve entered in a similar fashion to a list, which you''re no doubt
    familiar with by now.


    ![](img/e4c529ac6a286a7773e0e7c17e263180_67_0.png)


    ![](img/e4c529ac6a286a7773e0e7c17e263180_67_1.png)


    STEP 2 Just as with most lists, tuples and so on, strings need to be enclosed
    in quotes (single or double), whilst integers can be left open. Remember that
    the value can be either a string or an integer, you just need to enclose the relevant
    one in quotes:


    phonebook2={"David": "0987 654 321"}


    STEP 4 The benefit of using a dictionary is that you can enter the key to index
    the value. Using the phonebook example from the previous steps, you can enter:


    phonebook["Emma"]

    phonebook["Hannah"]


    ![](img/e4c529ac6a286a7773e0e7c17e263180_67_2.png)


    ![](img/e4c529ac6a286a7773e0e7c17e263180_67_3.png)'
