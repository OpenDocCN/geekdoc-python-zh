  md: "# Basic GUI File Browser\n\n# Advanced Filing\n\nWhen executed, the code will\
    \ display the current directory's contents. If you want to see the contents of\
    \ another directory, you can run the code from a command line within the chosen\
    \ directory; just remember to call the code from where it's located on your system,\
    \ as per the second screenshot. You can also double-click any of the file names\
    \ shown in the directory tree and rename them.\n\nThis is an interesting piece\
    \ of code and one that you can insert into your own programs. You can extend the\
    \ code to include a user specified directory to browse, perhaps your own unique\
    \ file icons too. If you're using Linux, create an alias to execute the code and\
    \ then you can run it from wherever you are in the system.\n\nWindows users may\
    \ have some trouble with the above code, an alternative can be achieved by using\
    \ the following:\n\n```\nfrom tkinter import *\nfrom tkinter import ttk\nfrom\
    \ tkinter.filedialog import askopenfilename\n\nroot = Tk( )\n\ndef OpenFile():\n\
    \    name = askopenfilename(initialdir=\"C:/\",\n                           filetypes\
    \ =((\"Text File\", \"*.txt\"),(\"All Files\",\"*.*\")),\n                   \
    \        title = \"Choose a file.\"\n                           )\n    print (name)\n\
    ```\n\n```\ntry:\n    with open(name,'r') as UseFile:\n        print(UseFile.read())\n\
    except:\n    print(\"No files opened\")\n```\n\n```\nTitle = root.title( \"File\
    \ Opener\")\nlabel = ttk.Label(root, text =\"File Open\",foreground=\"red\",font=(\"\
    Helvetica\", 16))\nlabel.pack()\n```\n\n```\nmenu = Menu(root)\nroot.config(menu=menu)\n\
    \nfile = Menu(menu)\n\nfile.add _command(label = 'Open', command = OpenFile)\n\
    file.add _command(label = 'Exit', command = lambda:exit())\n\nmenu.add _cascade(label\
    \ = 'File', menu = file)\n\nroot.mainloop()\n```\n\nIt's not quite the same but\
    \ this code allows you to open files in your system via the familiar Windows Explorer.\
    \ It's worth experimenting with to see what you can do with it.\n\n![](img/e4c529ac6a286a7773e0e7c17e263180_120_0.png)"
