    \ by simply entering `import math` into the Shell, or as part of your code in\
    \ the Editor.\n\n**STEP 2** Importing the Math module will give you access to\
    \ the module's code. From there, you can call up any of the available functions\
    \ within Math by using `math`, followed by the name of the function in question.\
    \ For example, enter:\n\n`math.sin(2)`\n\nThis displays the sine of 2.\n\n**STEP\
    \ 3** As you will no doubt be aware by now, if you know the name of the individual\
    \ functions within the module you can specifically import them. For instance,\
    \ the Floor and Ceil functions round down and up a float:\n\n```python\nfrom math\
    \ import floor, ceil\nfloor(1.2) # returns 1\nceil(1.2) # returns 2\n```\n\n**STEP\
    \ 4** The Math module can also be renamed as you import it, as with the other\
    \ modules on offer within Python. This often saves time, but don't forget to make\
    \ a comment to show someone else looking at your code what you've done:\n\n```python\n\
    import math as m\nm.trunc(123.45) # Truncate removes the fraction\n```"
