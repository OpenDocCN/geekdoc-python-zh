  md: '# # A Brief History of Coding


    It''s easy to think that programming a machine to automate a process, or calculate
    a value, is a modern concept that''s only really happened in the last fifty years
    or so. However, that assumption is quite wrong, coding has actually been around
    for quite some time.


    ```


    01000011 01101111 01100100 01101001 01101110 01100111


    ```


    +   - ~87 BC

    - ~850 AD

    - 1800

    - 1842-1843

    - 1930-1950


    It''s difficult to pinpoint an exact start of when humans began to ''program''
    a device. However, it''s widely accepted that the Antikythera Mechanism is possibly
    the first ''coded'' artefact. It''s dated to about 87 BC and is an ancient Greek
    analogue computer and orrery used to predict astronomical positions.


    ![](img/e4c529ac6a286a7773e0e7c17e263180_9_0.png)


    The Banū Mūsā brothers, three Persian scholars who worked in the House of Wisdom
    in Baghdad, published the Book of Ingenious Devices in around 850 AD. Among the
    inventions listed was a mechanical musical instrument: a hydro-powered organ that
    played interchangeable cylinders automatically.


    ![](img/e4c529ac6a286a7773e0e7c17e263180_9_1.png)


    Joseph Marie Jacquard invents a programmable loom, which used cards with punched
    holes to create the textile design. However, it is thought that he based his design
    on a previous automated weaving process from 1725, by Basile Bouchon.


    ![](img/e4c529ac6a286a7773e0e7c17e263180_9_2.png)


    Ada Lovelace translated the memoirs of the Italian mathematician, Francis Manclan,
    regarding Charles Babbage''s Analytical Engine. She made copious notes within
    her writing, detailing a method of calculating Bernoulli Numbers using the engine.
    This is recognised as the first computer program. Not bad, considering there were
    no computers available at the time.


    ![](img/e4c529ac6a286a7773e0e7c17e263180_9_3.png)'
  merge: -1
  pgno: 9
- img_proc: true
  md: 'During the Second World War, significant advances were made in programmable
    machines. Most notably, the cryptographic machines used to decipher military codes
    used by the Nazis. The Enigma was invented by the German engineer Arthur Scherbius,
    but was made famous by Alan Turing at Bletchley Park''s codebreaking centre.


    ![](img/e4c529ac6a286a7773e0e7c17e263180_10_0.png)


    From the 1970s, the development of the likes of C, SQL, C with Classes (C++),
    MATLAB, Common Lisp and more, came to the fore. The 80s was undoubtedly the golden
    age of the home computer, a time when silicon processors were cheap enough for
    ordinary folk to buy. This led to a boom in home/bedroom coders with the rise
    of 8-bit machines.


    ![](img/e4c529ac6a286a7773e0e7c17e263180_10_1.png)


    # 1951-1958


    # 1959


    # 1960-1970


    # 1970-1985


    # 1990s-Present Day


    ```


    MONITOR FOR 4802 1.4

    9-14-80 TSC ASSEMBLER PAGE 2

    0000 8E 00 70 START LDS #STACK

    ... (additional assembly code lines)


    ```


    The first true computer code was Assembly Language (ASM) or Regional Assembly
    Language. ASM was specific to the architecture of the machine on which it was
    being used. In 1951, programming languages fell under the generic term Autocode.
    Soon languages such as IPL, FORTRAN and ALGOL 58 were developed.


    Computer programming was mainly utilised by universities, the military and big
    corporations during the ''60s and the ''70s. A notable step toward a more user-friendly,
    or home user, language was the development of BASIC (Beginners All-purpose Symbolic
    Instruction Code) in the mid-sixties.


    ```


    10 INPUT "What is your name? "; U$

    20 PRINT "Hello "; U$

    30 REM

    40 INPUT "How many stars do you want? "; N

    50 S$ = ""

    60 FOR I = 1 TO N

    70 S$ = S$ + "*"

    80 NEXT I

    90 PRINT S$

    100 INPUT "Do you want more stars? "; A$

    110 IF A$ = "Y" THEN GOTO 70

    120 END


    ```


    The Internet age brought a wealth of new programming languages and allowed people
    access to the tools and knowledge needed to learn coding in a better way. Not
    only could a user learn how to code, they could also freely share their code and
    source other code to improve their own.


    ![](img/e4c529ac6a286a7773e0e7c17e263180_10_2.png)


    Admiral Grace Hopper was part of the team that developed the UNIVAC I computer
    and she eventually developed a compiler for it. In time, the compiler she developed
    became COBOL (Common Business-oriented Language), a computer language that''s
    still in use today.


    ![](img/e4c529ac6a286a7773e0e7c17e263180_10_3.png)'
