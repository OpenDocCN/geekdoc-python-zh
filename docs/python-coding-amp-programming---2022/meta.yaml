  md: "# # STEP 6\n\nInterestingly, you can also use a function within the Random\
    \ module to shuffle the items in the list, thus adding a little more randomness\
    \ into the equation:\n\n```\npython\nrandom.shuffle(lst)\nprint(lst)\n\n```\n\n\
    ![](img/e4c529ac6a286a7773e0e7c17e263180_96_0.png)\n\n# # STEP 7\n\nUsing shuffle,\
    \ you can create an entirely random list of numbers. For example, within a given\
    \ range:\n\n```\npython\nimport random\nlst=[[i for I in range(20)]]\nrandom.shuffle(lst)\n\
    print(lst)\n\n```\n\n![](img/e4c529ac6a286a7773e0e7c17e263180_96_1.png)\n\n# #\
    \ STEP 8\n\nYou can also select a random number from a given range in steps, using\
    \ the start, stop, step loop:\n\n```\npython\nimport random\nfor i in range(10):\n\
    \    print(random.randrange(0, 200, 7))\n\n```\n\n![](img/e4c529ac6a286a7773e0e7c17e263180_96_2.png)\n\
    \n# # STEP 9\n\nLet’s use an example piece of code which flips a virtual coin\
    \ ten thousand times and counts how many times it will land on heads or tails:\n\
    \n```\npython\nimport random\noutput={\"Heads\":0, \"Tails\":0}\ncoin=list(output.keys())\n\
    \nfor i in range(10000):\n    output[random.choice(coin)] +=1\n\nprint(\"Heads:\"\
    , output[\"Heads\"])\nprint(\"Tails:\", output[\"Tails\"])\n\n```\n\n![](img/e4c529ac6a286a7773e0e7c17e263180_96_3.png)\n\
