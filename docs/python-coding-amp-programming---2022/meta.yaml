  md: 'It''s worth noting that when referencing multiple tuples within a list, the
    indexing is slightly different from the norm. You would expect the 95 combat rating
    of the character Valeria to be NPC[4][5], but it''s not. It''s actually:


    ```

    NPC[2][1]

    ```


    ![](img/e4c529ac6a286a7773e0e7c17e263180_66_0.png)


    Now unpack the tuple into two corresponding variables:


    ```

    (name, combat_rating)=NPC

    ```


    You can now check the values by entering name and combat_rating.


    ![](img/e4c529ac6a286a7773e0e7c17e263180_66_1.png)


    This means of course that the indexing follows thus:


    +   0, 0

    1, 1

    0, 1

    2, 0

    1

    2, 1

    1, 0


    Which as you can imagine, gets a little confusing when you''ve got a lot of tuple
    data to deal with.


    ```

    Type "copyright", "credits" or "license()" for more information.

    >>> NPC=[(''Conan'', 100), (''Belit'', 80), (''Valeria'', 95)]

    >>> NPC[0]

    (''Conan'', 100)

