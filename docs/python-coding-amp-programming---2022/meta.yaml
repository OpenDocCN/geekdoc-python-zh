    \ of the text and store them as multiple lists. These can then be stored as a\
    \ variable:\n\n```\npoem=open(\"/home/pi/Documents/Poem.txt\")\nlines=poem.readlines()\n\
    lines[0]\nlines[1]\nlines[2]\n```\n\n![](img/e4c529ac6a286a7773e0e7c17e263180_76_2.png)\n\
    \nSTEP 7\n\nYou may have guessed that you can pass the readline() function into\
    \ a variable, thus allowing you to call it again when needed:\n\n```\npoem=open(\"\
    /home/pi/Documents/Poem.txt\")\nline=poem.readline()\nline\n```\n\nSTEP 9\n\n\
    You can also use the for statement to read the lines of text back to us:\n\n```\n\
    for lines in lines:\n    print(lines)\n```\n\nSince this is Python, there are\
    \ other ways to produce the same output:\n\n```\npoem=open(\"/home/pi/Documents/Poem.txt\"\
    )\nfor lines in poem:\n    print(lines)\n```\n\n![](img/e4c529ac6a286a7773e0e7c17e263180_76_3.png)\n\
    \nSTEP 10\n\nLet’s imagine that you want to print the text one character at a\
    \ time, like an old dot matrix printer would. You can use the Time module mixed\
