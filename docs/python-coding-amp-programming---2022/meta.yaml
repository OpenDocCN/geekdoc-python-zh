- md: '## A Brief History of Coding


    It''s easy to think that programming a machine to automate a process, or calculate
    a value, is a modern concept that''s only really happened in the last fifty years
    or so. However, that assumption is quite wrong, coding has actually been around
    for quite some time.


    ```

    01000011 01101111 01100100 01101001 01101110 01100111

    ```


    - ~87 BC

    - ~850 AD

    - 1800

    - 1842-1843

    - 1930-1950


    It''s difficult to pinpoint an exact start of when humans began to ''program''
    a device. However, it''s widely accepted that the Antikythera Mechanism is possibly
    the first ''coded'' artefact. It''s dated to about 87 BC and is an ancient Greek
    analogue computer and orrery used to predict astronomical positions.


    ![](img/e4c529ac6a286a7773e0e7c17e263180_9_0.png)


    The Banū Mūsā brothers, three Persian scholars who worked in the House of Wisdom
    in Baghdad, published the Book of Ingenious Devices in around 850 AD. Among the
    inventions listed was a mechanical musical instrument: a hydro-powered organ that
    played interchangeable cylinders automatically.


    ![](img/e4c529ac6a286a7773e0e7c17e263180_9_1.png)


    Joseph Marie Jacquard invents a programmable loom, which used cards with punched
    holes to create the textile design. However, it is thought that he based his design
    on a previous automated weaving process from 1725, by Basile Bouchon.


    ![](img/e4c529ac6a286a7773e0e7c17e263180_9_2.png)


    Ada Lovelace translated the memoirs of the Italian mathematician, Luigi Menabrea,
    regarding Charles Babbage''s Analytical Engine. She made copious notes within
    her writing, detailing a method of calculating Bernoulli Numbers using the engine.
    This is recognised as the first computer program. Not bad, considering there were
    no computers available at the time.


    ![](img/e4c529ac6a286a7773e0e7c17e263180_9_3.png)


    During the Second World War, significant advances were made in programmable machines.
    Most notably, the cryptographic machines used to decipher military codes used
    by the Nazis. The Enigma was invented by the German engineer Arthur Scherbius,
    but was made famous by Alan Turing at Bletchley Park''s codebreaking centre.


    ![](img/e4c529ac6a286a7773e0e7c17e263180_10_0.png)


    From the 1970s, the development of the likes of C, SQL, C with Classes (C++),
    MATLAB, Common Lisp and more, came to the fore. The 80s was undoubtedly the golden
    age of the home computer, a time when silicon processors were cheap enough for
    ordinary folk to buy. This led to a boom in home/bedroom coders with the rise
    of 8-bit machines.


    ![](img/e4c529ac6a286a7773e0e7c17e263180_10_1.png)


    ### 1951-1958


    ### 1959


    ### 1960-1970


    ### 1970-1985


    ### 1990s-Present Day


    ```

    MONITOR FOR 4802 1.4

    9-14-80 TSC ASSEMBLER PAGE 2

    0000 8E 00 70 START LDS #STACK

    ... (additional assembly code lines)

    ```


    The first true computer code was Assembly Language (ASM) or Register Assembly
    Language. ASM was specific to the architecture of the machine on which it was
    being used. In 1951, programming languages fell under the generic term Autocode.
    Soon languages such as IPL, FORTRAN and ALGOL 58 were developed.


    Computer programming was mainly utilised by universities, the military and big
    corporations during the ''60s and the ''70s. A notable step toward a more user-friendly,
    or home user, language was the development of BASIC (Beginners All-purpose Symbolic
    Instruction Code) in the mid-sixties.


    ```

    10 INPUT "What is your name? "; U$

    20 PRINT "Hello "; U$

    30 REM

    40 INPUT "How many stars do you want? "; N

    50 S$ = ""

    60 FOR I = 1 TO N

    70 S$ = S$ + "*"

    80 NEXT I

    90 PRINT S$

    100 INPUT "Do you want more stars? "; A$

    110 IF A$ = "Y" THEN GOTO 70

    120 END

    ```


    The Internet age brought a wealth of new programming languages and allowed people
    access to the tools and knowledge needed to learn coding in a better way. Not
    only could a user learn how to code, they could also freely share their code and
    source other code to improve their own.


    ![](img/e4c529ac6a286a7773e0e7c17e263180_10_2.png)


    Admiral Grace Hopper was part of the team that developed the UNIVAC I computer
    and she eventually developed a compiler for it. In time, the compiler she developed
    became COBOL (Common Business-oriented Language), a computer language that''s
    still in use today.


    ![](img/e4c529ac6a286a7773e0e7c17e263180_10_3.png)


    ## What can You Do with Python?


    Python is an open-source, object-oriented programming language that’s simple to
    understand and write, yet also powerful and extremely malleable. It’s these characteristics
    that help make it such an important language to learn.


    Python’s ability to create highly readable code within a small set of instructions
    has a considerable impact on our modern digital world. From the ideal, first programmers’
    choice to its ability to create interactive stories and games; from scientific
    applications to artificial intelligence and web-based applications, the only limit
    to Python is the imagination of the person coding in it.


    It’s Python’s malleable design that makes it an ideal language for many different
    situations and roles. Even certain aspects of the coding world, that require more
    efficient code, still use Python. For example, NASA utilises Python both as a
    stand-alone language and as a bridge between other programming languages. This
    way, NASA scientists and engineers are able to get to the data they need without
    having to cross multiple language barriers; Python fills the gaps and provides
    the means to get the job done. You’ll find lots of examples of this, where Python
    is acting behind the scenes. This is why it’s such an important language to learn.


    > Beautiful is better than ugly.

    Explicit is better than implicit.

    Simple is better than complex.

    Complex is better than complicated.

    Flat is better than nested.

    Sparse is better than dense.

    Readability counts.

    Special cases aren’t special enough to break the rules.

    Although practicality beats purity.

    Errors should never pass silently.

    Unless explicitly silenced.

    In the face of ambiguity, refuse the temptation to guess.

    There should be one-- and preferably only one --obvious way to do it.

    Although that way may not be obvious at first unless you’re Dutch.

    Now is better than never.

    Although never is often better than *right* now.

    If the implementation is hard to explain, it’s a bad idea.

    If the implementation is easy to explain, it may be a good idea.

    Namespaces are one honking great idea -- let’s do more of those!


    ## BIG DATA


    Big data is a buzzword you’re likely to have come across in the last couple of
    years. Basically, it means extremely large data sets that are available for analysis
    to reveal patterns, trends and interactions between humans, society and technology.
    Of course, it’s not just limited to those areas, big data is currently being used
    in a variety of industries, from social media to health and welfare, engineering
    to space exploration and beyond.


    Python plays a substantial role in the world of big data. It’s extensively used
    to analyse huge chunks of the available big data and extract specific information
    based on what the user/company requires from the wealth of numbers present. Thanks
    to an impressive set of data processing libraries, Python makes the act of getting
    to the data, in amongst the numbers, that counts and presenting it in a fashion
    that’s readable and useable for humans.


    There are countless libraries and freely available modules that enable fast, secure
    and more importantly, accurate processing of data from the likes of supercomputing
    clusters. For example, CERN uses a custom Python module to help analyse the 600
    million collisions per second that the Large Hadron Collider (LHC) produces. A
    different language handles the raw data, but Python is present to help sift through
    the data so scientists can get to the content they want without the need to learn
    a far more complex programming language.


    ![](img/e4c529ac6a286a7773e0e7c17e263180_11_0.png)


    ## What can You Do with Python?


    ### ARTIFICIAL INTELLIGENCE


    Artificial Intelligence and Machine Learning are two of the most groundbreaking
    aspects of modern computing. AI is the umbrella term used for any computing process
    wherein the machine is doing something intelligent, working and reacting in similar
    ways to humans. Machine Learning is a subset of AI and provides the overall AI
    system with the ability to learn from its experiences.


    However, AI isn''t simply the creation of autonomous robots intent on wiping out
    human civilisation. Indeed, AI can be found in a variety of day-to-day computing
    applications where the ''machine'', or more accurately the code, needs to learn
    from the actions of some form of input and anticipate what the input is likely
    to require, or do, next.


    This model can be applied to Facebook, Google, Twitter, Instagram and so on. Have
    you ever looked up a celebrity on Instagram and then discovered that your searches
    within other social media platforms are now specifically targeted toward similar
    celebrities? This is a prime example of using AI in targeted advertising and behind
    the code and algorithms that predict what you''re looking for, is Python.


    Spotify, for example, uses Python based code, among other things, to analyse your
    musical habits and offer playlists based on what you''ve listened to in the past.
    It''s all clever stuff and, moving forward, Python is at the forefront of the
    way the Internet will work in the future.


    ![](img/e4c529ac6a286a7773e0e7c17e263180_12_0.png)


    ### GAMING


    Although you won''t find too many triple-A rated games coded using Python, you
    may be surprised to learn that Python is used as an extra on many of the high-ranking
    modern games.


