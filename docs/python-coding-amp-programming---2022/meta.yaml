- img_proc: true
  md: '# STEP 5


    To expand this code, you can reopen the file using ''a'', for access or append
    mode. This will add any text at the end of the original line instead of wiping
    the file and creating a new one. For example:


    ```


    t=open("/home/pi/Documents/text.txt","a")

    t.write("\n")

    t.write(" You stand and survey your surroundings. On top of the table is some
    meat, and a cup of water.\n")


    ```


    ![](img/e4c529ac6a286a7773e0e7c17e263180_78_0.png)


    # STEP 6


    You can keep extending the text line by line, ending each with a new line (\n).
    When you''re done, finish the code with t.close() and open the file in a text
    editor to see the results:


    ```


    t.write("The door is made of solid oak with iron strips. It''s bolted from the
    outside, locking you in. You are a prisoner!.\n")

    t.close()


    ```


    ![](img/e4c529ac6a286a7773e0e7c17e263180_78_1.png)


    # STEP 7


    There are various types of file access to consider using the open() function.
    Each depends on how the file is accessed and even the position of the cursor.
    For example, r+ opens a file in read and write and places the cursor at the start
    of the file.


    ![](img/e4c529ac6a286a7773e0e7c17e263180_78_2.png)


    # STEP 8


    You can pass variables to a file that you''ve created in Python. Perhaps you want
    the value of Pi to be written to a file. You can call Pi from the Math module,
    create a new file and pass the output of Pi into the new file:


    ```


    import math

    print("Value of Pi is: ",math.pi)

    print("\nWriting to a file now...")


    ```


    ![](img/e4c529ac6a286a7773e0e7c17e263180_78_3.png)


    # STEP 9


    Now let''s create a variable called pi and assign it the value of Pi:


    pi=math.pi


    You also need to create a new file in which to write Pi to:

    t=open("/home/pi/Documents/pi.txt","w")


    Remember to change your file location to your own particular system setup.


    ![](img/e4c529ac6a286a7773e0e7c17e263180_78_4.png)


    # STEP 10


    To finish, you can use string formatting to call the variable and write it to
    the file, then commit the changes and close the file:


    t.write("Value of Pi is: {}".format(pi))

    t.close()


    You can see from the results that you''re able to pass any variable to a file.


    ![](img/e4c529ac6a286a7773e0e7c17e263180_78_5.png)'
