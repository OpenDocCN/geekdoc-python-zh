    \n## Pygame 模块\n\n我们已经简要了解过 Pygame 模块，但它还有更多值得探索的内容。Pygame 的开发是为了帮助 Python 程序员创建图形化或基于文本的游戏。\n\
    \n### PYGAMING\n\nPygame 不是 Python 的固有模块，但使用树莓派的用户已经安装了它。其他用户需要在命令提示符下使用：`pip\
    \ install pygame`。\n\n**步骤 1** 当然，在利用 Pygame 模块之前，你需要先将其加载到内存中。完成后，Pygame 要求用户在使用任何函数之前进行初始化：\n\
    \n```python\nimport pygame\npygame.init()\n```\n\n![](img/e4c529ac6a286a7773e0e7c17e263180_99_0.png)\n\
