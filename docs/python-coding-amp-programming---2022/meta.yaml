    You can pick up a Pi from around £33, increasing up to £54 for the 4GB memory
    version, or as a part of kit for £50+, depending on the kit you’re interested
    in.


    ![](img/e4c529ac6a286a7773e0e7c17e263180_26_0.png)


    ![](img/e4c529ac6a286a7773e0e7c17e263180_26_1.png)


    # ## FUZE PROJECT


    The FUZE is a learning environment built on the latest model of the Raspberry
    Pi. You can purchase the workstations that come with an electronics kit and even
    a robot arm for you to build and program. You can find more information on the
    FUZE at www.fuze.co.uk.


    # ## RASPBIAN


    The Raspberry Pi''s main operating system is a Debian-based Linux distribution
    that comes with everything you need in a simple to use package. It’s streamlined
    for the Pi and is an ideal platform for hardware and software projects, Python
    programming and even as a desktop computer.


    ![](img/e4c529ac6a286a7773e0e7c17e263180_26_2.png)


    # ## BOOKS


    We have several great Raspberry Pi titles available via **www.bdmpublications.com**.
    Our Pi books cover how to buy your first Raspberry Pi, set it up and use it; there
    are some great step-by-step project examples and guides to get the most from the
    Raspberry Pi too.


    ![](img/e4c529ac6a286a7773e0e7c17e263180_26_3.png)'
  - '[PAGE 27]


    # # Getting to Know Python


    Python is the greatest computer programming language ever created. It enables
    you to fully harness the power of a computer, in a language that’s clean and easy
    to understand.


    # ## WHAT IS PROGRAMMING?


    It helps to understand what a programming language is before you try to learn
    one, and Python is no different. Let’s take a look at how Python came about and
    how it relates to other languages.


    # ### PYTHON


    A programming language is a list of instructions that a computer follows. These
    instructions can be as simple as displaying your name or playing a music file,
    or as complex as building a whole virtual world. Python is a programming language
    conceived in the late 1980s by Guido van Rossum at Centrum Wiskunde & Informatica
    (CWI) in the Netherlands as a successor to the ABC language.


    **Guido van Rossum, the father of Python.**


    ![](img/e4c529ac6a286a7773e0e7c17e263180_27_0.png)


    # ### PROGRAMMING RECIPES


    Programs are like recipes for computers. A recipe to bake a cake could go like
    this:


    +   - Put 100 grams of self-raising flour in a bowl.

    - Add 100 grams of butter to the bowl.

    - Add 100 millilitres of milk.

    - Bake for half an hour.


    ![](img/e4c529ac6a286a7773e0e7c17e263180_27_1.png)


    # ### CODE


    Just like a recipe, a program consists of instructions that you follow in order.
    A program that describes a cake might run like this:


    ```

    python

    bowl = []

    flour = 100

    butter = 50

    milk = 100

    bowl.append([flour, butter, milk])

    cake.cook(bowl)

    ```


    ![](img/e4c529ac6a286a7773e0e7c17e263180_27_2.png)


    # ### PROGRAM COMMANDS


    You might not understand some of the Python commands, like bowl.append and cake.cook(bowl).
    The first is a list, the second an object; we’ll look at both in this book. The
    main thing to know is that it’s easy to read commands in Python. Once you learn
    what the commands do, it’s easy to figure out how a program works.


    ![](img/e4c529ac6a286a7773e0e7c17e263180_27_3.png)'
  - '[PAGE 28]


    # # HIGH-LEVEL LANGUAGES


    Computer languages that are easy to read are known as “high-level”. This is because
    they fly high above the hardware (also referred to as “the metal”). Languages
    that “Fly close to the metal,” like Assembly, are known as “low-level”. Low-level
    languages commands read a bit like this: msg db , 0xa 1en equ $ - msg.


    ![](img/e4c529ac6a286a7773e0e7c17e263180_28_0.png)


    # # ZEN OF PYTHON


    Python lets you access all the power of a computer in a language that humans can
    understand. Behind all this is an ethos called “The Zen of Python.” This is a
    collection of 20 software principles that influences the design of the language.
    Principles include “Beautiful is better than ugly” and “Simple is better than
    complex.” Type **import this** into Python and it will display all the principles.


    ![](img/e4c529ac6a286a7773e0e7c17e263180_28_1.png)


    # # PYTHON 3 VS PYTHON 2


    In a typical computing scenario, Python is complicated somewhat by the existence
    of two active versions of the language: Python 2 and Python 3.


    # # WORLD OF PYTHON


    Python 3.7 is the newest release of the programming language. However, if you
    dig a little deeper into the Python site, and investigate Python code online,
    you will undoubtedly come across Python 2. Although you can run Python 3 and Python
    2 alongside each other, it’s not recommended. Always opt for the latest stable
    release as posted by the Python website.


    ![](img/e4c529ac6a286a7773e0e7c17e263180_28_2.png)


    # # PYTHON 3.X


    In 2008 Python 3 arrived with several new and enhanced features. These features
    provide a more stable, effective and efficient programming environment but sadly,
    most (if not all) of these new features are not compatible with Python 2 scripts,
    modules and tutorials. Whilst not popular at first, Python 3 has since become
    the cutting edge of Python programming.


    ![](img/e4c529ac6a286a7773e0e7c17e263180_28_3.png)


    # # PYTHON 2.X


    So why two? Well, Python 2 was originally launched in 2000 and has since then
    adopted quite a large collection of modules, scripts, users, tutorials and so
    on. Over the years Python 2 has fast become one of the first go to programming
    languages for beginners and experts to code in, which makes it an extremely valuable
    resource.


    ![](img/e4c529ac6a286a7773e0e7c17e263180_28_4.png)


    # # 3.X WINS


    Python 3’s growing popularity has meant that it’s now prudent to start learning
    to develop with the new features and begin to phase out the previous version.
    Many development companies, such as SpaceX and NASA use Python 3 for snippets
    of important code.


    ![](img/e4c529ac6a286a7773e0e7c17e263180_28_5.png)'
- md: "## How to Set Up Python in Windows\n\nWindows users can easily install the\
    \ latest version of Python via the main Python Downloads page. Whilst most seasoned\
    \ Python developers may shun Windows as the platform of choice for building their\
    \ code, it's still an ideal starting point for beginners.\n\n### INSTALLING PYTHON\
    \ 3.X\n\nMicrosoft Windows doesn't come with Python preinstalled as standard,\
    \ so it will be necessary to install it yourself manually. Thankfully, it's an\
    \ easy process to follow.\n\n#### STEP 1\n\nStart by opening your web browser\
    \ to www.python.org/downloads/. Look for the button detailing the Download link\
    \ for Python 3.x. Python is regularly updated, changing the last digit for each\
    \ bug fix and update. Therefore, don't worry if you see Python 3.8, or more, as\
    \ long as it's Python 3, the code in this book will work fine.\n\n![](img/e4c529ac6a286a7773e0e7c17e263180_29_0.png)\n\
    \n#### STEP 2\n\nClick the Download button for version 3.x and save the file to\
    \ your Downloads folder. When the file is downloaded, double-click the executable\
    \ and the Python installation wizard will launch. From here, you have two choices:\
    \ Install Now and Customise Installation. We recommend opting for the Customise\
    \ Installation link.\n\n![](img/e4c529ac6a286a7773e0e7c17e263180_29_1.png)\n\n\
    #### STEP 3\n\nChoosing the Customise option allows you to specify certain parameters,\
    \ and whilst you may stay with the defaults, it's a good habit to adopt as, sometimes\
    \ (not with Python, thankfully), installers can include unwanted additional features.\
    \ On the first screen available, ensure all boxes are ticked and click the Next\
    \ button.\n\n![](img/e4c529ac6a286a7773e0e7c17e263180_29_2.png)\n\n#### STEP 4\n\
    \nThe next page of options include some interesting additions to Python. Ensure\
    \ the Associate file with Python, Create Shortcuts, Add Python to Environment\
    \ Variables, Precompile Standard Library and Install for All Users options are\
    \ ticked. These make using Python later much easier. Click Install when you're\
    \ ready to continue.\n\n![](img/e4c529ac6a286a7773e0e7c17e263180_29_3.png)\n\n\
    #### STEP 5\n\nYou may need to confirm the installation with the Windows authentication\
    \ notification. Simply click Yes and Python will begin to install. Once the installation\
    \ is complete, the final Python wizard page will allow you to view the latest\
    \ release notes and follow some online tutorials.\n\n#### STEP 6\n\nBefore you\
    \ close the install wizard window however, it's best to click on the link next\
    \ to the shield detailed Disable Path Length Limit. This will allow Python to\
    \ bypass the Windows 260 character limitation, enabling you to execute Python\
    \ programs stored in deep folders arrangements. Click Yes again, to authenticate\
    \ the process, then you can Close the installation window.\n\n#### STEP 7\n\n\
    Windows 10 users can now find the installed Python 3.x within the Start button\
    \ Recently Added section. The first link, Python 3.x (32-bit) will launch the\
    \ command line version of Python when clicked (more on that in a moment). To open\
    \ the IDLE, type IDLE into Windows start.\n\n#### STEP 8\n\nClicking on the IDLE\
    \ (Python 3.x 32-bit) link will launch the Python Shell, where you can begin your\
    \ Python programming journey. Don't worry if your version is newer, as long as\
    \ it's Python 3.x our code works inside your Python 3 interface.\n\n![](img/e4c529ac6a286a7773e0e7c17e263180_30_0.png)\n\
    \n![](img/e4c529ac6a286a7773e0e7c17e263180_30_1.png)\n\n#### STEP 9\n\nIf you\
    \ now click on the Windows Start button again, and this time type: CMD, you'll\
    \ be presented with the Command Prompt link. Click it to get to the Windows command\
    \ line environment. To enter Python within the command line, you need to type:\
    \ `python` and press Enter.\n\n![](img/e4c529ac6a286a7773e0e7c17e263180_30_2.png)\n\
    \n![](img/e4c529ac6a286a7773e0e7c17e263180_30_3.png)\n\n#### STEP 10\n\nThe command\
    \ line version of Python works in much the same way as the Shell you opened in\
    \ Step 8; note the three left-facing arrows (>>>). Whilst it's a perfectly fine\
    \ environment, it's not too user-friendly, so leave the command line for now.\
    \ Enter: `exit()` to leave and close the Command Prompt window.\n\n![](img/e4c529ac6a286a7773e0e7c17e263180_30_4.png)\n\
    \n![](img/e4c529ac6a286a7773e0e7c17e263180_30_5.png)\n\n## How to Set Up Python\
    \ in Linux\n\nWhile the Raspberry Pi’s operating system contains the latest, stable\
    \ version of Python, other Linux distros don’t come with Python 3 pre-installed.\
    \ If you’re not going down the Pi route, then here’s how to check and install\
    \ Python for Linux.\n\n### PYTHON PENGUIN\n\nLinux is such a versatile operating\
    \ system that it’s often difficult to nail down just one-way of doing something.\
    \ Different distributions go about installing software in different ways, so for\
    \ this particular tutorial we will stick to Linux Mint.\n\n#### STEP 1\n\nFirst\
    \ you need to ascertain which version of Python is currently installed in your\
    \ Linux system. To begin with, drop into a Terminal session from your distro’s\
    \ menu, or hit the Ctrl+Alt+T keys.\n\n![](img/e4c529ac6a286a7773e0e7c17e263180_31_0.png)\n\
    \n#### STEP 2\n\nNext, enter: `python --version` into the Terminal screen. You\
    \ should have the output relating to version 2.x of Python in the display. Most\
    \ Linux distro come with both Python 2 and 3 by default, as there’s plenty of\
    \ code out there still available for Python 2. Now enter: `python3 --version`.\n\
    \n![](img/e4c529ac6a286a7773e0e7c17e263180_31_1.png)\n\n#### STEP 3\n\nIn our\
    \ case we have both Python 2 and 3 installed. As long as Python 3.x.x is installed,\
    \ then the code in our tutorials will work. It’s always worth checking to see\
    \ if the distro has been updated with the latest versions, enter: `sudo apt-get\
    \ update && sudo apt-get upgrade` to update the system.\n\n![](img/e4c529ac6a286a7773e0e7c17e263180_31_2.png)\n\
    \n#### STEP 4\n\nOnce the update and upgrade completes, enter: `python3 --version`\
    \ again to see if Python 3.x is updated, or even installed. As long as you have\
    \ Python 3.x, you’re running the most recent major version, the numbers after\
    \ the 3. indicate patches plus further updates. Often they’re unnecessary, but\
    \ they can contain vital new elements.\n\n![](img/e4c529ac6a286a7773e0e7c17e263180_31_3.png)\n\
    \n#### STEP 5\n\nHowever, if you want the latest, cutting edge version, you’ll\
    \ need to build Python from source. Start by entering these commands into the\
    \ Terminal:\n\n```\nsudo apt-get install build-essential checkinstall\nsudo apt-get\
    \ install libreadline-gplv2-dev\nlibncursesw5-dev libssl-dev libsqlite3-dev tk-dev\n\
    libgdbm-dev libc6-dev libbz2-dev\n```\n\n![](img/e4c529ac6a286a7773e0e7c17e263180_31_4.png)\n\
    \n#### STEP 6\n\nOpen up your Linux web browser and go to the Python download\
    \ page: https://www.python.org/downloads. Click on the Downloads, followed by\
    \ the button under the Python Source window. This opens a download dialogue box,\
    \ choose a location, then start the download process.\n\n![](img/e4c529ac6a286a7773e0e7c17e263180_32_0.png)\n\
    \n#### STEP 7\n\nIn the Terminal, go to the Downloads folder by entering: `cd\
    \ Downloads/`. Then unzip the contents of the downloaded Python source code with:\
    \ `tar -xvf Python-3.Y.Y.tar.xz` (replace the Y's with the version numbers you've\
    \ downloaded). Now enter the newly unzipped folder with: `cd Python-3.Y.Y/`.\n\
    \n```\nPython-3.7.2/Objects/clinic/floatobject.c\nPython-3.7.2/Objects/clinic/funcobject.c\n\
    Python-3.7.2/Objects/clinic/longobject.c\nPython-3.7.2/Objects/clinic/dictobject.c\n\
    Python-3.7.2/Objects/clinic/structseq.c\nPython-3.7.2/Objects/clinic/structmember.c\n\
    Python-3.7.2/Objects/clinic/moduleobject.c\nPython-3.7.2/Objects/clinic/odictobject.c\n\
    Python-3.7.2/Objects/clinic/bytearrayobject.c\nPython-3.7.2/Objects/clinic/bytesobject.c\n\
    Python-3.7.2/Objects/clinic/itertypes.txt\nPython-3.7.2/Objects/clinic/methodobject.c\n\
    Python-3.7.2/Objects/clinic/tupleobject.c\nPython-3.7.2/Objects/clinic/enumobject.c\n\
    Python-3.7.2/Objects/clinic/object.c\nPython-3.7.2/Objects/clinic/abstract.c\n\
    Python-3.7.2/Objects/clinic/listobject.c\nPython-3.7.2/Objects/clinic/clinic_methods.c\n\
    Python-3.7.2/Objects/clinic/dictnotes.txt\nPython-3.7.2/Objects/clinic/typeslots.inc\n\
    david@david-Mint:~/Downloads$ cd Python-3.7.2/\ndavid@david-Mint:~/Downloads/Python-3.7.2$\n\
    ```\n\n#### STEP 8\n\nWithin the Python folder, enter:\n\n`./configure`\n`sudo\
    \ make altinstall`\n\nThis could take a while, depending on the speed of your\
    \ computer. Once finished, enter: `python3.7 --version` to check the latest installed\
    \ version. You now have Python 3.7 installed, alongside older Python 3.x.x and\
    \ Python 2.\n\n```\nchecking whether compiling against openssl is sane... no\n\
    configure: error: openssl not found\nconfig.status: creating ./config.status\n\
    config.status: creating Makefile.pre\nconfig.status: creating Misc/python.pc\n\
    config.status: creating Misc/python-config.sh\nconfig.status: creating Modules/ld_so_aix\n\
    config.status: creating pyconfig.h\ncreating Modules/Setup\ncreating Modules/Setup.local\n\
    creating Makefile\n\nIf you want a release build with all stable optimizations\
    \ active (PGO, etc.),\nplease run ./configure --enable-optimizations\n\ndavid@david-Mint:~/Downloads/Python-3.7.2$\
    \ sudo make altinstall\n```\n\n#### STEP 9\n\nFor the GUI IDLE, you'll need to\
    \ enter the following command into the Terminal:\n\n`sudo apt-get install idle3`\n\
    \nThe IDLE can then be started with the command: `idle3`. Note, that IDLE runs\
    \ a different version to the one you installed from source.\n\n```\ndavid@david-Mint:~/Downloads/Python-3.7.2$\
    \ sudo apt-get install idle3\nReading package lists... Done\nBuilding dependency\
    \ tree\nReading state information... Done\nThe following additional packages will\
    \ be installed:\n  blt idle-python3.6 python3-tk tk8.6-blt2.5\nSuggested packages:\n\
    \  blt-demo tix python3-tk-dbg\nThe following NEW packages will be installed:\n\
    \  blt idle-python3.6 idle3 python3-tk tk8.6-blt2.5\n0 to upgrade, 6 to newly\
    \ install, 0 to remove and 3 not to upgrade.\nNeed to get 938 kB of archives.\n\
    After this operation, 4,221 kB of additional disk space will be used.\nDo you\
    \ want to continue? [Y/n]\n```\n\n#### STEP 10\n\nYou'll also need PIP (Pip Installs\
    \ Packages), which is a tool to help you install more modules and extras.\n\n\
    Enter: `sudo apt-get install python3-pip`\n\nOnce PIP is installed, check for\
    \ the latest update with:\n\n`pip3 install --upgrade pip`\n\nWhen complete, close\
    \ the Terminal and Python 3.x will be available via the Programming section in\
    \ your distro's menu.\n\n```\ndavid@david-Mint:~/Downloads/Python-3.7.2$ sudo\
    \ apt-get install python3-pip\nReading package lists... Done\nBuilding dependency\
    \ tree\nReading state information... Done\nThe following additional packages will\
    \ be installed:\n  python-pip-whl python3-distutils python3-lib2to3\nSuggested\
    \ packages:\n  python3-dev python3-setuptools python3-wheel\nThe following NEW\
    \ packages will be installed:\n  python-pip-whl python3-distutils python3-lib2to3\
    \ python3-pip\n0 to upgrade, 4 to newly install, 0 to remove and 3 not to upgrade.\n\
    Need to get 1,984 kB of archives.\nAfter this operation, 4,569 kB of additional\
    \ disk space will be used.\nDo you want to continue? [Y/n]\n```\n\n## PYTHON ON\
    \ macOS\n\nInstallation of Python on macOS can be done in much the same way as\
    \ the Windows installation. Simply go to the Python webpage, hover your mouse\
    \ pointer over the Downloads link and select Mac OS X from the options. You will\
    \ then be guided to the Python releases for Mac versions, along with the necessary\
    \ installers for macOS 64-bit for OS X 10.9 and later."
  mdcn: "好的，我将作为高级文档工程师和翻译员，严格遵循您提供的注意事项和示例，将给定的英文Markdown文档翻译成中文。\n\n以下是翻译后的内容：\n\
    \n\n## 如何在Windows上设置Python\n\nWindows用户可以通过Python主下载页面轻松安装最新版本的Python。尽管大多数经验丰富的Python开发者可能更倾向于在其他平台构建代码，但它仍然是初学者理想的入门选择。\n\
    \n### 安装Python 3.X\n\nMicrosoft Windows 默认不预装 Python，因此需要您手动安装。幸运的是，这个过程很简单。\n\
    \n#### 第1步\n\n首先，打开您的网页浏览器，访问 `www.python.org/downloads/`。查找标有 Python 3.x 下载链接的按钮。Python会定期更新，每个错误修复和更新都会改变最后的数字版本号。因此，如果您看到的是\
    \ Python 3.8 或更高版本，也无需担心，只要是 Python 3，本书中的代码都能正常工作。\n\n![](img/e4c529ac6a286a7773e0e7c17e263180_29_0.png)\n\
    \n#### 第2步\n\n点击版本3.x的下载按钮，并将文件保存到您的“下载”文件夹。文件下载后，双击可执行文件，Python安装向导将会启动。此时，您有两个选择：“立即安装”和“自定义安装”。我们建议选择“自定义安装”链接。\n\
    \n![](img/e4c529ac6a286a7773e0e7c17e263180_29_1.png)\n\n#### 第3步\n\n选择“自定义”选项允许您指定某些参数。虽然您可能选择使用默认设置，但养成自定义的习惯是一个好方法，因为有时（谢天谢地，Python安装程序不会这样）安装程序可能包含不必要的附加功能。在第一个可用界面上，确保勾选所有框，然后点击“下一步”按钮。\n\
    \n![](img/e4c529ac6a286a7773e0e7c17e263180_29_2.png)\n\n#### 第4步\n\n下一页选项包含一些对Python有用的附加功能。确保勾选“将文件与Python关联”、“创建快捷方式”、“将Python添加到环境变量”、“预编译标准库”和“为所有用户安装”选项。这些选项使得后续使用Python变得更加容易。准备好继续后，点击“安装”。\n\
    \n![](img/e4c529ac6a286a7773e0e7c17e263180_29_3.png)\n\n#### 第5步\n\n您可能需要通过Windows身份验证通知来确认安装。只需点击“是”，Python就会开始安装。安装完成后，最终的Python向导页面将允许您查看最新的发行说明并遵循一些在线教程。\n\
    \n#### 第6步\n\n不过，在关闭安装向导窗口之前，最好点击“禁用路径长度限制”旁边的链接（旁边有一个盾牌图标）。这将允许Python绕过Windows的260个字符路径长度限制，使您能够执行存储在深层文件夹结构中的Python程序。再次点击“是”以验证该过程，然后您可以关闭安装窗口。\n\
    \n#### 第7步\n\nWindows 10 用户现在可以在“开始”按钮的“最近添加”部分找到已安装的Python 3.x。点击第一个链接 Python\
    \ 3.x (32-bit) 将启动Python的命令行版本（稍后会详细介绍）。要打开IDLE，请在Windows“开始”菜单中输入“IDLE”。\n\n\
    #### 第8步\n\n点击IDLE (Python 3.x 32-bit)链接将启动Python Shell，您可以在此开始您的Python编程之旅。如果您的版本更新，也无需担心，只要它是Python\
    \ 3.x，我们的代码就能在您的Python 3界面中运行。\n\n![](img/e4c529ac6a286a7773e0e7c17e263180_30_0.png)\n\
    \n![](img/e4c529ac6a286a7773e0e7c17e263180_30_1.png)\n\n#### 第9步\n\n如果您现在再次点击Windows“开始”按钮，并输入：CMD，您将看到命令提示符链接。点击它进入Windows命令行环境。要在命令行中进入Python，您需要输入：`python`\
    \ 并按回车键。\n\n![](img/e4c529ac6a286a7773e0e7c17e263180_30_2.png)\n\n![](img/e4c529ac6a286a7773e0e7c17e263180_30_3.png)\n\
    \n#### 第10步\n\n命令行版本的Python与您在步骤8中打开的Shell工作方式非常相似；注意三个向左的箭头（`>>>`）。虽然它是一个完全可用的环境，但用户友好性稍差，所以暂时离开命令行。输入：`exit()`\
    \ 退出并关闭命令提示符窗口。\n\n![](img/e4c529ac6a286a7773e0e7c17e263180_30_4.png)\n\n![](img/e4c529ac6a286a7773e0e7c17e263180_30_5.png)\n\
    \n## 如何在Linux上设置Python\n\n虽然树莓派的操作系统包含了最新、稳定的Python版本，但其他Linux发行版默认并未预装Python\
    \ 3。如果您不打算使用树莓派，那么以下是如何检查并安装适用于Linux的Python。\n\n### PYTHON PENGUIN\n\nLinux是一个如此通用的操作系统，以至于往往难以确定一种固定的做事方法。不同的发行版安装软件的方式也不同，因此本教程我们将专注于Linux\
    \ Mint发行版。\n\n#### 第1步\n\n首先，您需要确认您的Linux系统中当前安装了哪个版本的Python。首先，从发行版的菜单中打开终端会话，或按下Ctrl+Alt+T键。\n\
    \n![](img/e4c529ac6a286a7773e0e7c17e263180_31_0.png)\n\n#### 第2步\n\n接下来，在终端屏幕中输入：`python\
    \ --version`。您应该会看到与Python 2.x版本相关的输出。大多数Linux发行版默认同时安装Python 2和3，因为仍然有大量适用于Python\
    \ 2的代码。现在输入：`python3 --version`。\n\n![](img/e4c529ac6a286a7773e0e7c17e263180_31_1.png)\n\
    \n#### 第3步\n\n在我们的案例中，Python 2和3都已安装。只要安装了Python 3.x.x，我们教程中的代码就能运行。值得检查一下发行版是否已更新到最新版本，输入：`sudo\
    \ apt-get update && sudo apt-get upgrade` 以更新系统。\n\n![](img/e4c529ac6a286a7773e0e7c17e263180_31_2.png)\n\
    \n#### 第4步\n\n更新和升级完成后，再次输入：`python3 --version` 查看Python 3.x是否已更新，甚至是刚安装完成。只要您有Python\
    \ 3.x，就运行着最新的主要版本；3.后面的数字表示补丁和进一步的更新。通常它们不是必须的，但可能包含重要的新功能。\n\n![](img/e4c529ac6a286a7773e0e7c17e263180_31_3.png)\n\
    \n#### 第5步\n\n然而，如果您想要最新、最前沿的版本，您需要从源代码构建Python。首先在终端中输入以下命令：\n\n```\nsudo apt-get\
    \ install build-essential checkinstall\nsudo apt-get install libreadline-gplv2-dev\n\
    libncursesw5-dev libssl-dev libsqlite3-dev tk-dev\nlibgdbm-dev libc6-dev libbz2-dev\n\
    ```\n\n![](img/e4c529ac6a286a7773e0e7c17e263180_31_4.png)\n\n#### 第6步\n\n打开您的Linux网页浏览器，访问Python下载页面：https://www.python.org/downloads。点击“Downloads”，然后在“Python\
    \ Source”窗口下方点击按钮。这将打开一个下载对话框，选择保存位置，然后开始下载过程。\n\n![](img/e4c529ac6a286a7773e0e7c17e263180_32_0.png)\n\
    \n#### 第7步\n\n在终端中，通过输入 `cd Downloads/` 进入“下载”文件夹。然后用以下命令解压下载的Python源代码：`tar -xvf\
    \ Python-3.Y.Y.tar.xz`（将 Y 替换为您下载的版本号）。现在使用以下命令进入新解压的文件夹：`cd Python-3.Y.Y/`。\n\
    \n```\nPython-3.7.2/Objects/clinic/floatobject.c\nPython-3.7.2/Objects/clinic/funcobject.c\n\
    Python-3.7.2/Objects/clinic/longobject.c\nPython-3.7.2/Objects/clinic/dictobject.c\n\
    Python-3.7.2/Objects/clinic/structseq.c\nPython-3.7.2/Objects/clinic/structmember.c\n\
    Python-3.7.2/Objects/clinic/moduleobject.c\nPython-3.7.2/Objects/clinic/odictobject.c\n\
    Python-3.7.2/Objects/clinic/bytearrayobject.c\nPython-3.7.2/Objects/clinic/bytesobject.c\n\
    Python-3.7.2/Objects/clinic/itertypes.txt\nPython-3.7.2/Objects/clinic/methodobject.c\n\
    Python-3.7.2/Objects/clinic/tupleobject.c\nPython-3.7.2/Objects/clinic/enumobject.c\n\
    Python-3.7.2/Objects/clinic/object.c\nPython-3.7.2/Objects/clinic/abstract.c\n\
    Python-3.7.2/Objects/clinic/listobject.c\nPython-3.7.2/Objects/clinic/clinic_methods.c\n\
    Python-3.7.2/Objects/clinic/dictnotes.txt\nPython-3.7.2/Objects/clinic/typeslots.inc\n\
    david@david-Mint:~/Downloads$ cd Python-3.7.2/\ndavid@david-Mint:~/Downloads/Python-3.7.2$\n\
    ```\n\n#### 第8步\n\n在Python文件夹内，输入：\n\n`./configure`\n`sudo make altinstall`\n\n\
    这可能需要一些时间，具体取决于您计算机的速度。完成后，输入：`python3.7 --version` 检查最新安装的版本。现在您已安装Python 3.7，同时还有旧的Python\
    \ 3.x.x和Python 2。\n\n```\nchecking whether compiling against openssl is sane...\
    \ no\nconfigure: error: openssl not found\nconfig.status: creating ./config.status\n\
    config.status: creating Makefile.pre\nconfig.status: creating Misc/python.pc\n\
    config.status: creating Misc/python-config.sh\nconfig.status: creating Modules/ld_so_aix\n\
    config.status: creating pyconfig.h\ncreating Modules/Setup\ncreating Modules/Setup.local\n\
    creating Makefile\n\nIf you want a release build with all stable optimizations\
    \ active (PGO, etc.),\nplease run ./configure --enable-optimizations\n\ndavid@david-Mint:~/Downloads/Python-3.7.2$\
    \ sudo make altinstall\n```\n\n#### 第9步\n\n要安装图形界面IDLE，您需要在终端中输入以下命令：\n\n`sudo\
    \ apt-get install idle3`\n\n然后可以使用命令启动IDLE：`idle3`。请注意，IDLE运行的版本与您从源代码安装的版本不同。\n\
    \n```\ndavid@david-Mint:~/Downloads/Python-3.7.2$ sudo apt-get install idle3\n\
    Reading package lists... Done\nBuilding dependency tree\nReading state information...\
    \ Done\nThe following additional packages will be installed:\n  blt idle-python3.6\
    \ python3-tk tk8.6-blt2.5\nSuggested packages:\n  blt-demo tix python3-tk-dbg\n\
    The following NEW packages will be installed:\n  blt idle-python3.6 idle3 python3-tk\
