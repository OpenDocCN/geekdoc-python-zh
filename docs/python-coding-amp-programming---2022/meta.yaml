    # Using the Math Module


    One of the most used modules you will come across is the Math module. As we''ve
    mentioned previously in this book, mathematics is the backbone of programming
    and there''s an incredible number of uses the Math module can have in your code.


    # E = MC²


    The Math module provides access to a plethora of mathematical functions, from
    simply displaying the value of PI, to helping you create complex 3D shapes.


    **STEP 1** The Math module is built-in to Python 3; so there''s no need to PIP
    install it. As with the other modules present, you can import the module''s function
    by simply entering `import math` into the Shell, or as part of your code in the
    Editor.


    **STEP 3** As you will no doubt be aware by now, if you know the name of the individual
    functions within the module you can specifically import them. For instance, the
    Floor and Ceil functions round down and up a float:


    ```

    python

    from math import floor, ceil

    floor(1.2) # returns 1

    ceil(1.2) # returns 2

    ```


    ![](img/e4c529ac6a286a7773e0e7c17e263180_93_0.png)


    ![](img/e4c529ac6a286a7773e0e7c17e263180_93_1.png)


    **STEP 2** Importing the Math module will give you access to the module''s code.
    From there, you can call up any of the available functions within Math by using
    `math`, followed by the name of the function in question. For example, enter:


    `math.sin(2)`


    This displays the sine of 2.


    **STEP 4** The Math module can also be renamed as you import it, as with the other
    modules on offer within Python. This often saves time, but don''t forget to make
    a comment to show someone else looking at your code what you''ve done:


    ```

    python

    import math as m

    m.trunc(123.45) # Truncate removes the fraction

    ```


    ![](img/e4c529ac6a286a7773e0e7c17e263180_93_2.png)


    ![](img/e4c529ac6a286a7773e0e7c17e263180_93_3.png)'
- md: "## STEP 5\n\nAlthough it’s not common practise, it is possible to import functions\
    \ from a module and rename them. In this example, we’re importing floor from Math\
    \ and renaming it to f. Although where lengthy code is in use, this process can\
    \ quickly become confusing:\n\n```python\nfrom math import floor as f\nf(1.2)\n\
    ```\n\n![](img/e4c529ac6a286a7773e0e7c17e263180_94_0.png)\n\n## STEP 6\n\nImporting\
    \ all the functions of the Math Module can be done by entering:\n\n```python\n\
    from math import *\n```\n\nWhile certainly handy, this is often frowned upon by\
    \ the developer community as it takes up unnecessary resources and isn’t an efficient\
    \ way of coding. However, if it works for you then go ahead.\n\n![](img/e4c529ac6a286a7773e0e7c17e263180_94_1.png)\n\
    \n## STEP 7\n\nInterestingly, some functions within the Math module are more accurate,\
    \ or to be more precise are designed to return a more accurate value, than others.\
    \ For example:\n\n```python\nsum([.1, .1, .1, .1, .1, .1, .1, .1, .1])\nfsum([.1,\
    \ .1, .1, .1, .1, .1, .1, .1, .1])\n```\n\nwill return the value of 0.999999999.\
    \ Whereas:\nreturns the value of 1.0.\n\n![](img/e4c529ac6a286a7773e0e7c17e263180_94_2.png)\n\
    \n## STEP 8\n\nFor further accuracy, when it comes to numbers the exp and expm1\
    \ functions can be used to compute precise values:\n\n```python\nfrom math import\
    \ exp, expm1\nexp(1e-5) - 1 # value accurate to 11 places\nexpm1(1e-5) # result\
    \ accurate to full precision\n```\n\n![](img/e4c529ac6a286a7773e0e7c17e263180_94_3.png)\n\
    \n## STEP 9\n\nThis level of accuracy is really quite impressive, but quite niche\
    \ for the most part. Probably the two most used functions are e and Pi, where\
    \ e is the numerical constant equal to 2.71828 (where the circumference of a circle\
    \ is divided by its diameter):\n\n```python\nimport math\nprint(math.e)\nprint(math.pi)\n\
    ```\n\n![](img/e4c529ac6a286a7773e0e7c17e263180_94_4.png)\n\n## STEP 10\n\nThe\
    \ wealth of mathematical functions available through the Math module is vast and\
    \ covers everything from factors to infinity, powers to trigonometry and angular\
    \ conversion to constants. Look up https://docs.python.org/3/library/math.html#\
    \ for a list of available Math module functions.\n\n![](img/e4c529ac6a286a7773e0e7c17e263180_94_5.png)\n\
    \n# Random Module\n\nThe Random module is one you will likely come across many\
    \ times in your Python programming lifetime; as the name suggests, it's designed\
    \ to create random numbers or letters. However, it's not exactly random but it\
    \ will suffice for most needs.\n\n## RANDOM NUMBERS\n\nThere are numerous functions\
    \ within the Random module, which when applied can create some interesting and\
    \ very useful Python programs.\n\n### STEP 1\n\nJust as with other modules you\
    \ need to import random before you can use any of the functions we're going to\
    \ look at in this tutorial. Let's begin by simply printing a random number from\
    \ 1 to 5:\n\n```python\nimport random\nprint(random.randint(0,5))\n```\n\n![](img/e4c529ac6a286a7773e0e7c17e263180_95_0.png)\n\
    \n### STEP 2\n\nIn our example the number four was returned. However, enter the\
    \ print function a few more times and it will display different integer values\
    \ from the set of numbers given, zero to five. The overall effect, although pseudo-random,\
    \ is adequate for the average programmer to utilise in their code.\n\n![](img/e4c529ac6a286a7773e0e7c17e263180_95_1.png)\n\
    \n### STEP 3\n\nFor a bigger set of numbers, including floating point values,\
    \ you can extend the range by using the multiplication sign:\n\n```python\nimport\
    \ random\nprint(random.random() *100)\n```\n\nWill display a floating point number\
    \ between 0 and 100, to the tune of around fifteen decimal points.\n\n![](img/e4c529ac6a286a7773e0e7c17e263180_95_2.png)\n\
    \n### STEP 4\n\nHowever, the Random module isn't used exclusively for numbers.\
    \ You can use it to select an entry from a list from random, and the list can\
    \ contain anything:\n\n```python\nimport random\nrandom.choice([\"Conan\", \"\
    Valeria\", \"Belit\"])\n```\n\nThis will display one of the names of our adventurers\
    \ at random, which is a great addition to a text adventure game.\n\n![](img/e4c529ac6a286a7773e0e7c17e263180_95_3.png)\n\
    \n### STEP 5\n\nYou can extend the previous example somewhat by having random.choice()\
    \ select from a list of mixed variables. For instance:\n\n```python\nimport random\n\
    lst=[\"David\", 44, \"BDM Publications\", 3245.23, \"Pi\", True, 3.14, \"Python\"\
    ]\nrnd=random.choice(lst)\nprint(rnd)\n```\n\n![](img/e4c529ac6a286a7773e0e7c17e263180_95_4.png)\n\
    \n## STEP 6\n\nInterestingly, you can also use a function within the Random module\
    \ to shuffle the items in the list, thus adding a little more randomness into\
    \ the equation:\n\n```python\nrandom.shuffle(lst)\nprint(lst)\n```\n\n![](img/e4c529ac6a286a7773e0e7c17e263180_96_0.png)\n\
    \n## STEP 7\n\nUsing shuffle, you can create an entirely random list of numbers.\
    \ For example, within a given range:\n\n```python\nimport random\nlst=[[i for\
    \ i in range(20)]]\nrandom.shuffle(lst)\nprint(lst)\n```\n\n![](img/e4c529ac6a286a7773e0e7c17e263180_96_1.png)\n\
    \n## STEP 8\n\nYou can also select a random number from a given range in steps,\
    \ using the start, stop, step loop:\n\n```python\nimport random\nfor i in range(10):\n\
    \    print(random.randrange(0, 200, 7))\n```\n\n![](img/e4c529ac6a286a7773e0e7c17e263180_96_2.png)\n\
    \n## STEP 9\n\nLet’s use an example piece of code which flips a virtual coin ten\
    \ thousand times and counts how many times it will land on heads or tails:\n\n\
    ```python\nimport random\noutput={\"Heads\":0, \"Tails\":0}\ncoin=list(output.keys())\n\
    \nfor i in range(10000):\n    output[random.choice(coin)] +=1\n\nprint(\"Heads:\"\
    , output[\"Heads\"])\nprint(\"Tails:\", output[\"Tails\"])\n```\n\n![](img/e4c529ac6a286a7773e0e7c17e263180_96_3.png)\n\
    \n## STEP 10\n\nHere’s an interesting piece of code. Using a text file containing\
    \ 466 thousand words, you can pluck a user generated number of words from the\
    \ file (text file found at: www.github.com/dwyl/english-words):\n\n```python\n\
    import random\n\nprint(\">>>>>>>>>>Random Word Finder<<<<<<<<<<\")\nprint(\"\\\
    nUsing a 466K English word text file I can pick any words at random.\\n\")\n\n\
    wds=int(input(\"\\nHow many words shall I choose? \"))\n\nwith open(\"/home/pi/Downloads/words.txt\"\
    , \"rt\") as f:\n    words = f.readlines()\nwords = [w.rstrip() for w in words]\n\
    \nprint(\"------------------------\")\n\nfor w in random.sample(words, wds):\n\
    \    print(w)\n\nprint(\"------------------------\")\n```\n\n![](img/e4c529ac6a286a7773e0e7c17e263180_96_4.png)\n\
    \n# Tkinter Module\n\nWhile running your code from the command line, or even in\
    \ the Shell, is perfectly fine, Python is capable of so much more. The Tkinter\
    \ module enables the programmer to set up a Graphical User Interface to interact\
    \ with the user, and it's surprisingly powerful too.\n\n## GETTING GUI\n\nTkinter\
    \ is easy to use but there's a lot more you can do with it. Let's start by seeing\
    \ how it works and getting some code into it. Before long you will discover just\
    \ how powerful this module really is.\n\nTkinter is usually built into Python\
    \ 3. However, if it's available when you enter: `import tkinter`, then you need\
    \ to pip install tkinter from the command prompt. We can start to import modules\
    \ differently than before, to save on typing and by importing all their contents:\n\
    \n```python\nimport tkinter as tk\nfrom tkinter import *\n```\n\n![](img/e4c529ac6a286a7773e0e7c17e263180_97_0.png)\n\
    \nThe ideal approach is to add mainloop() into the code to control the Tkinter\
    \ event loop, but we'll get to that soon. You've just created a Tkinter widget\
    \ and there are several more we can play around with:\n\n```python\nbtn=Button()\n\
    btn.pack()\nbtn[\"text\"]=\"Hello everyone!\"\n```\n\nThe first line focuses on\
    \ the newly created window. Click back into the Shell and continue the other lines.\n\
    \n![](img/e4c529ac6a286a7773e0e7c17e263180_97_1.png)\n\nIt's not recommended to\
    \ import everything from a module using the asterisk but it won't do any harm\
    \ normally. Let's begin by creating a basic GUI window, enter:\n\n```python\n\
    wind=Tk()\n```\n\nThis creates a small, basic window. There's not much else to\
    \ do at this point but click the X in the corner to close the window.\n\n![](img/e4c529ac6a286a7773e0e7c17e263180_97_2.png)\n\
    \nYou can combine the above into a New File:\n\n```python\nimport tkinter as tk\n\
    from tkinter import *\nbtn=Button()\nbtn.pack()\nbtn[\"text\"]=\"Hello everyone!\"\
    \n```\n\nThen add some button interactions:\n\n```python\ndef click():\n    print(\"\
    You just clicked me!\")\nbtn[\"command\"]=click\n```\n\n![](img/e4c529ac6a286a7773e0e7c17e263180_97_3.png)"
  mdcn: "## 第5步\n\n虽然这不是常见的做法，但可以从模块中导入函数并重命名它们。在这个例子中，我们从 Math 模块导入 floor 并将其重命名为\
