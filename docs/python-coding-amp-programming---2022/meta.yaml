    testfile

    pi@raspberrypi ~ $


    ```


    STEP 4: Directories with files are moved in the same way. Enter: mv testdir newparent
    to move the testdir directory inside the newparent directory. Let’s move into
    the directory to find the file. Enter: cd newparent/testdir and enter: ls to view
    the testfile sitting inside the directory.


    ```


    pi@raspberrypi ~ $ ls

    Desktop  Documents  Downloads  indexcity  python_games  Sca...

    pi@raspberrypi ~ $ mkdir newparent

    pi@raspberrypi ~ $ mv testdir newparent

    pi@raspberrypi ~ $ cd newparent/testdir

    pi@raspberrypi ~/newparent/testdir $ ls

    testfile

    pi@raspberrypi ~/newparent/testdir $


    ```'
- md: "## STEP 5\n\nFiles and directories can be moved up using the double dot (\"\
    ..\") as an argument. Enter: `ls -la` to view your testfile and the single and\
    \ double dot files. The single dot is the current directory and the double dot\
    \ is the parent directory. Enter: `mv testfile ..` to move the testfile up into\
    \ the newparent directory. Enter: `cd ..` to move up to the parent directory.\n\
    \n```\npi@raspberrypi ~ $ cd newparent/testdir\npi@raspberrypi ~/newparent/testdir\
    \ $ ls\ntestfile\npi@raspberrypi ~/newparent/testdir $ mv testfile ..\npi@raspberrypi\
    \ ~/newparent/testdir $ cd\n```\n\n## STEP 6\n\nYou can also move files using\
    \ longer paths. Enter: `cd ~` to return to the home directory and `mv newparent/testfile\
    \ newparent/testdir/testfile` to move the testfile from its current location back\
    \ inside the testdir directory. Enter: `ls newparent/testdir` to view the file\
    \ back in its current directory.\n\n```\npi@raspberrypi ~/newparent $ cd ~\npi@raspberrypi\
    \ ~ $ ls\nDesktop  Documents  Downloads  indiecity  newparent  python_game\npi@raspberrypi\
    \ ~ $ mv newparent/testfile newparent/testdir/\npi@raspberrypi ~ $ ls newparent/testdir\n\
    testfile\npi@raspberrypi ~ $ _\n```\n\n## RENAME FILES AND DIRECTORIES\n\nThe\
    \ `mv` command isn't used just to move files; it also serves the purpose of renaming\
    \ files (effectively it moves it from its old name to a new name). Let's see how\
    \ to use `mv` to rename items.\n\n### STEP 1\n\nLet's start by making a new test\
    \ file called \"names\". Enter: `touch testfile` and then `ls` to make sure the\
    \ testfile is present. We're going to turn this into a file that contains the\
    \ names of some people. So let's call it something more appropriate, like \"names\"\
    .\n\n```\npi@raspberrypi ~ $ ls\nDesktop  Documents  Downloads  indiecity  newparent\
    \  python_game\npi@raspberrypi ~ $ mv testfile names\npi@raspberrypi ~ $ ls\n\
    Desktop  Documents  Downloads  indiecity  names  newparent\npi@raspberrypi ~ $\n\
    ```\n\n### STEP 2\n\nEnter `mv testfile names` and `ls` Now we can see the new\
    \ \"names\" file in our directory. The `mv` command can also be used to rename\
    \ directories. We should still have our newparent directory in our home directory.\
    \ Enter: `mv newparent people` to rename the newparent directory. Enter: `ls`\
    \ to view it.\n\n```\npi@raspberrypi ~ $ touch testfile\npi@raspberrypi ~ $ ls\n\
    Desktop  Documents  Downloads  indiecity  newparent  python_game\npi@raspberrypi\
    \ ~ $ mv newparent people\npi@raspberrypi ~ $ ls\nDesktop  Documents  Downloads\
    \  indiecity  people  python_game\npi@raspberrypi ~ $\n```\n\n### STEP 3\n\nYou\
    \ can rename directories inside other directories using paths. Let's rename the\
    \ testdir directory, which is now inside the people directory. Enter: `mv names/testdir\
    \ names/friends`. Now enter: `mv names people/friends` to move the names file\
    \ inside the friends directory.\n\n```\npi@raspberrypi ~ $ ls\nDesktop  Documents\
    \  Downloads  indiecity  names  people  python_game\npi@raspberrypi ~ $ mv people/testdir\
    \ people/friends\n```\n\n### STEP 4\n\nIt is easy to overwrite files using the\
    \ `mv` command, so if you have files with the same name use the `-n` option, which\
    \ stands for \"no overwrite\". Enter: `touch testfile` to create a new file and\
    \ `mv -n testfile people/friends`. There's no error report though, enter: `ls`\
    \ and you'll find testfile still there.\n\n```\npi@raspberrypi ~ $ touch testfile\n\
    pi@raspberrypi ~ $ mv -n testfile people/friends\npi@raspberrypi ~ $ ls\nDesktop\
    \  Documents  Downloads  indiecity  people  python_game\npi@raspberrypi ~ $ ls\n\
    Desktop  Documents  Downloads  indiecity  people  python_game\npi@raspberrypi\
    \ ~ $ ls people/friends\nnames  testfile\npi@raspberrypi ~ $\n```\n\n## Useful\
    \ System and Disk Commands\n\nUnderstanding these core Linux commands will enable\
    \ you to not only master the inner workings of your Raspberry Pi but also to transfer\
    \ those skills to other Linux distros, such as Ubuntu or Linux Mint.\n\n## LOTS\
    \ OF LINUX\n\nLinux is a huge and versatile command line language and there are\
    \ hundreds of commands you can learn and use. Here are a few that can help you\
    \ get more from your Raspberry Pi.\n\n### STEP 1\n\nThe Raspberry Pi is a great\
    \ little computer, so let's start by getting some information. Enter: `cat /proc/cpuinfo`\
    \ to view some details on your Raspberry Pi processors. If you have a Raspberry\
    \ Pi 3 you will see four processors, along with the model name and other info.\n\
    \n```\npi@raspberrypi ~ $ cat /proc/cpuinfo\nprocessor\t: 0\nmodel name\t: ARMv7\
    \ Processor rev 5 (v7l)\nBogoMIPS\t: 38.40\nFeatures\t: half thumb fastmult vfp\
    \ edsp neon vfpv3 tls vfpv4 idiva idivt vfpd32 lpae evtstrm\nCPU implementer\t\
    : 0x41\nCPU architecture: 7\nCPU variant\t: 0x0\nCPU part\t: 0xc07\nCPU revision\t\
    : 5\n\nprocessor\t: 1\nmodel name\t: ARMv7 Processor rev 5 (v7l)\nBogoMIPS\t:\
    \ 38.40\nFeatures\t: half thumb fastmult vfp edsp neon vfpv3 tls vfpv4 idiva idivt\
    \ vfpd32 lpae evtstrm\nCPU implementer\t: 0x41\nCPU architecture: 7\nCPU variant\t\
    : 0x0\nCPU part\t: 0xc07\nCPU revision\t: 5\n\nprocessor\t: 2\nmodel name\t: ARMv7\
    \ Processor rev 5 (v7l)\nBogoMIPS\t: 38.40\nFeatures\t: half thumb fastmult vfp\
    \ edsp neon vfpv3 tls vfpv4 idiva idivt vfpd32 lpae evtstrm\nCPU implementer\t\
    : 0x41\nCPU architecture: 7\nCPU variant\t: 0x0\nCPU part\t: 0xc07\nCPU revision\t\
    : 5\n```\n\n### STEP 2\n\nRemember that cat is used to list the contents of a\
    \ text file, which is what cpuinfo is. There are other text files with system\
    \ info available. Try \"cat /proc/meminfo\" to get information about your memory,\
    \ \"cat /proc/partitions\" for information about your SD card, and \"cat /proc/version\"\
    \ shows which version of Raspberry Pi you are using.\n\n```\npi@raspberrypi ~\
    \ $ cat /proc/meminfo\nMemTotal:\t  885760 kB\nMemFree:\t   795576 kB\nMemAvailable:\t\
    \  831660 kB\nBuffers:\t    11660 kB\nCached:\t\t   56380 kB\nSwapCached:\t  \
    \      0 kB\nActive:\t\t   49140 kB\nInactive:\t    17920 kB\nActive(anon):\t\
    \   11256 kB\nInactive(anon):\t     0 kB\nActive(file):\t   37884 kB\nInactive(file):\t\
    \  17920 kB\nUnevictable:\t        0 kB\nMlocked:\t        0 kB\nSwapTotal:\t\
    \   102396 kB\nSwapFree:\t   102396 kB\nDirty:\t\t       36 kB\nWriteback:\t \
    \       0 kB\nAnonPages:\t    11132 kB\nMapped:\t\t    5728 kB\nShmem:\t\t   \
    \  260 kB\nSlab:\t\t    14512 kB\nSReclaimable:\t     4512 kB\nSUnreclaim:\t \
    \   10000 kB\nKernelStack:\t     1720 kB\nPageTables:\t      564 kB\nVmallocTotal:\t\
    \ 1140736 kB\nVmallocUsed:\t        0 kB\nWritebackTmp:\t        0 kB\nCommitLimit:\t\
    \   544548 kB\nCommitted_AS:\t    43712 kB\nHugePages_Total:\t       0\nHugePages_Free:\t\
    \        0\nHugepagesize:\t     2048 kB\npi@raspberrypi ~ $ cat /proc/partitions\n\
    major minor  #blocks  name\n 179        0    7761920 mmcblk0\n 179        1  \
    \  8350720 mmcblk0p1\n 179        2          1 mmcblk0p2\n```\n\n### STEP 3\n\n\
    Enter: `uname` to view the name of the operating system's kernel, this is the\
    \ element that sits between the interface and hardware. Just as you would suspect,\
    \ the response from the command is Linux, as Raspbian is a Linux distro, which\
    \ in itself is based on another Linux distro called Debian. While it may sound\
    \ complicated, it actually demonstrates how versatile Linux is.\n\n```\npi@raspberrypi\
    \ ~ $ uname\nLinux\npi@raspberrypi ~ $\n```\n\n### STEP 4\n\nEnter: `uname -a`\
    \ to view some more detailed information. Here you'll see the kernel name, hostname\
    \ and kernel version (3.18.7-v7 on ours). If you have a Raspberry Pi 2 you'll\
    \ see SMP (symmetric multiprocessing), followed by the system date, CPU architecture\
    \ and operating system (GNU/Linux).\n\n```\npi@raspberrypi ~ $ uname\nLinux\n\
    pi@raspberrypi ~ $ uname -a\nLinux raspberrypi 3.18.7-v7+ #755 SMP PREEMPT Thu\
    \ Feb 12 17:14:31 GMT 2015 armv7l GNU/Linux\npi@raspberrypi ~ $ _\n```\n\n###\
    \ STEP 5\n\nEnter: `vcgencmd measure_temp` to view the current operating system\
    \ temperature of your Raspberry Pi. Enter: `vcgencmd get_mem arm` to view the\
    \ RAM available, and `vcgencmd get_mem gpu` to view the memory available to the\
    \ graphics chip. Finally try `lsusb` to view a list of attached USB devices.\n\
    \n```\npi@raspberrypi ~ $ vcgencmd measure_temp\ntemp=46.1'C\npi@raspberrypi ~\
    \ $ vcgencmd get_mem arm\narm=800M\npi@raspberrypi ~ $ vcgencmd get_mem gpu\n\
    gpu=16M\npi@raspberrypi ~ $ lsusb\nBus 001 Device 002: ID 0424:9514 Standard Microsystems\
    \ Corp.\nBus 001 Device 001: ID 1d6b:0002 Linux Foundation 2.0 root hub\nBus 001\
    \ Device 003: ID 0424:ec00 Standard Microsystems Corp.\nBus 001 Device 004: ID\
    \ 0499:1503 Holtek Semiconductor, Inc. Shortboard Lefty\nBus 001 Device 005: ID\
    \ 1a40:0101 Terminus Technology Inc. 4-Port HUB\nBus 001 Device 006: ID 276d:1105\n\
    pi@raspberrypi ~ $\n```\n\n### STEP 6\n\nOne command you might be wondering about\
    \ is how to switch off or restart your Raspberry Pi from the command line. Don't\
    \ just hit the power switch. Enter: `sudo shutdown -h now` to shut down the Raspberry\
    \ Pi (the “-h” option stands for “halt”), or enter: `sudo shutdown -r now` to\
    \ restart your Raspberry Pi.\n\n```\npi@raspberrypi ~ $ sudo shutdown -r now\n\
    \nBroadcast message from root@raspberrypi (tty1) (Thu May 14 12:20:29 2015):\n\
    The system is going down for reboot NOW!\n```\n\n## DISK COMMANDS\n\nLearn the\
    \ two commands that enable you to view your disk space and the files on it: `df`\
    \ (disk free space) and `du` (disk usage). With these two commands you can view\
    \ the file usage on your SD card.\n\n### STEP 1\n\nStart by entering: `df` in\
    \ the command line. It returns a list of the volumes contained on your SD card.\
    \ You might be wondering what a volume is. It's best to think of your SD card\
    \ as the drive. This contains partitions, which is where you split one drive to\
    \ act like two or more drives. And each partition can contain volumes, which are\
    \ storage spaces.\n\n```\npi@raspberrypi ~ $ df\nFilesystem     1K-blocks    Used\
    \ Available Use% Mounted on\nrootfs          6581636 3408164   2749096  56% /\n\
    /dev/root       6581636 3408164   2749096  56% /\ndevtmpfs          428700   \
    \    0    428700   0% /dev\ntmpfs              80432     260     80172   1% /run\n\
    tmpfs               5120       0      5120   0% /run/lock\ntmpfs             176860\
    \       0    176860   0% /run/shm\n/dev/mmcblk0p5    60479   14536     45943 \
    \ 25% /boot\npi@raspberrypi ~ $\n```\n\n### STEP 2\n\nEnter: `df -h` to get the\
    \ list in human readable form. The first two lines should read “rootfs” and “/dev/\
    \ root” and have matching Size, Used, Avail and Use% listings. This is the main\
    \ drive, and is an indication of how much space you have used, and have free,\
    \ on your Raspbian OS. The other volumes are for booting and initialising devices\
    \ (you can ignore these for now).\n\n```\npi@raspberrypi ~ $ df -h\nFilesystem\
    \      Size  Used Avail Use% Mounted on\nrootfs          6.3G  3.4G  2.7G  56%\
    \ /\n/dev/root       6.3G  3.4G  2.7G  56% /\ndevtmpfs        428M     0  428M\
    \   0% /dev\ntmpfs            87M  260K   87M   1% /run\ntmpfs           5.0M\
    \     0  5.0M   0% /run/lock\ntmpfs           173M     0  173M   0% /run/shm\n\
    /dev/mmcblk0p5   60M   15M   43M  25% /boot\npi@raspberrypi ~ $\n```\n\n### STEP\
    \ 3\n\nNow enter: `du`. You should see lots of text fly up the screen. This is\
    \ the disk usage for the files contained in your home directory and their sub-directories.\
    \ As with `df`, it is better to use `du` with the “-h” option to humanise the\
    \ output. If you want to slow down the output, you'll also need to pipe it through\
    \ `less`. Enter: `du -h | less` to view the files and their respective usage one\
    \ page at a time.\n\n```\npi@raspberrypi ~ $ du -h | less\n22M     ./.minecraft/games/com.mojang/minecraftWorlds/world\n\
    22M     ./.minecraft/games/com.mojang/minecraftWorlds\n22M     ./.minecraft/games/com.mojang\n\
    22M     ./.minecraft/games\n4.0K    ./.pulse\n16K     ./.config/gedit\n8.0K  \
    \  ./.config/libfm\n1.4M    ./.config/epiphany/adblock\n12M     ./.config/epiphany\n\
    8.0K    ./.config/lxsession/LXDE-pi\n12K     ./.config/lxsession\n8.0K    ./.config/dconf\n\
    8.0K    ./.config/rncb.org\n8.0K    ./.config/lxterminal\n8.0K    ./.config/uk.ac.cam.cl\n\
    8.0K    ./.config/inflexcity\n8.0K    ./.config/handbrake\n```\n\n### STEP 4\n\
    \nYou don't typically enter: `du` on its own; most of the time you want to view\
    \ the disk usage of a specific directory. Enter: `du -h python_games` to view\
    \ how much space the `python_games` directory (installed alongside Raspbian) takes\
    \ up. It should be 1.8M. If you want a more comprehensive breakdown of the files\
    \ contained, use the “-a” option (all). Enter: `du -ha python_games` to view all\
    \ the files contained and their disk usage.\n\n```\npi@raspberrypi ~ $ ls\nDownloads\
    \  inflexity  people  python_games  Scratch  testfile\npi@raspberrypi ~ $ du -h\
    \ python_games\n1.8M    python_games\npi@raspberrypi ~ $ du -ha python_games\n\
    12K     python_games/RedSelector.png\n12K     python_games/4row_board.png\n12K\
    \     python_games/Star.png\n20K     python_games/CrazyGnomes.png\n12K     python_games/Red_Block_Tall.png\n\
    8.0K    python_games/princess.png\n8.0K    python_games/4row_white.png\n8.0K \
    \   python_games/4row_black.png\n4.0K    python_games/catsanimation.py\n8.0K \
    \   python_games/catch3.py\n36K     python_games/Match3.py\n24K     python_games/starpusher.py\n\
    ```"
  mdcn: "## 第五步\n\n可以使用双点（“..”）作为参数将文件和目录向上移动。输入：`ls -la` 查看你的测试文件以及单点和双点文件。单点代表当前目录，双点代表父目录。输入：`mv\
    \ testfile ..` 将测试文件移上一层到新的父目录。输入：`cd ..` 移动到父目录。\n\n```\npi@raspberrypi ~ $ cd\
    \ newparent/testdir\npi@raspberrypi ~/newparent/testdir $ ls\ntestfile\npi@raspberrypi\
    \ ~/newparent/testdir $ mv testfile ..\npi@raspberrypi ~/newparent/testdir $ cd\n\
    ```\n\n## 第六步\n\n也可以使用更长的路径移动文件。输入：`cd ~` 返回到主目录，然后输入 `mv newparent/testfile newparent/testdir/testfile`\
    \ 将测试文件从其当前位置移回 testdir 目录内。输入：`ls newparent/testdir` 查看文件是否已回到其当前目录。\n\n```\n\
    pi@raspberrypi ~/newparent $ cd ~\npi@raspberrypi ~ $ ls\nDesktop  Documents \
    \ Downloads  indiecity  newparent  python_game\npi@raspberrypi ~ $ mv newparent/testfile\
    \ newparent/testdir/\npi@raspberrypi ~ $ ls newparent/testdir\ntestfile\npi@raspberrypi\
    \ ~ $ _\n```\n\n## 重命名文件和目录\n\n`mv` 命令不仅用于移动文件；它也用于重命名文件（实际上就是将其从旧名移动到新名）。让我们看看如何使用\
    \ `mv` 来重命名项目。\n\n### 第一步\n\n首先创建一个名为 \"names\" 的新测试文件。输入：`touch testfile`，然后输入\
    \ `ls` 确保 testfile 存在。我们将把它变成一个包含一些人名的文件。所以给它起个更合适的名字，比如 \"names\"。\n\n```\npi@raspberrypi\
    \ ~ $ ls\nDesktop  Documents  Downloads  indiecity  newparent  python_game\npi@raspberrypi\
    \ ~ $ mv testfile names\npi@raspberrypi ~ $ ls\nDesktop  Documents  Downloads\
    \  indiecity  names  newparent\npi@raspberrypi ~ $\n```\n\n### 第二步\n\n输入 `mv testfile\
    \ names` 和 `ls`，现在我们可以看到目录中的新 \"names\" 文件。`mv` 命令也可用于重命名目录。我们的主目录中应该还有 newparent\
    \ 目录。输入：`mv newparent people` 将 newparent 目录重命名。输入：`ls` 查看它。\n\n```\npi@raspberrypi\
    \ ~ $ touch testfile\npi@raspberrypi ~ $ ls\nDesktop  Documents  Downloads  indiecity\
    \  newparent  python_game\npi@raspberrypi ~ $ mv newparent people\npi@raspberrypi\
    \ ~ $ ls\nDesktop  Documents  Downloads  indiecity  people  python_game\npi@raspberrypi\
    \ ~ $\n```\n\n### 第三步\n\n你可以使用路径重命名其他目录内的目录。让我们重命名现在位于 people 目录内的 testdir 目录。输入：`mv\
    \ names/testdir names/friends`。然后输入：`mv names people/friends` 将 names 文件移入 friends\
    \ 目录内。\n\n```\npi@raspberrypi ~ $ ls\nDesktop  Documents  Downloads  indiecity\
    \  names  people  python_game\npi@raspberrypi ~ $ mv people/testdir people/friends\n\
    ```\n\n### 第四步\n\n使用 `mv` 命令很容易覆盖文件，所以如果你有同名文件，请使用 `-n` 选项，它代表“不覆盖”。输入：`touch\
    \ testfile` 创建一个新文件，然后输入 `mv -n testfile people/friends`。不过没有错误报告，输入：`ls`，你会发现\
    \ testfile 仍然在那里。\n\n```\npi@raspberrypi ~ $ touch testfile\npi@raspberrypi ~\
    \ $ mv -n testfile people/friends\npi@raspberrypi ~ $ ls\nDesktop  Documents \
    \ Downloads  indiecity  people  python_game\npi@raspberrypi ~ $ ls\nDesktop  Documents\
    \  Downloads  indiecity  people  python_game\npi@raspberrypi ~ $ ls people/friends\n\
    names  testfile\npi@raspberrypi ~ $\n```\n\n## 实用的系统和磁盘命令\n\n理解这些核心 Linux 命令将使你不仅能掌握树莓派的内部工作原理，还能将这些技能转移到其他\
    \ Linux 发行版，如 Ubuntu 或 Linux Mint。\n\n## 丰富的 Linux 命令\n\nLinux 是一个庞大而通用的命令行语言，有成百上千的命令可供你学习和使用。以下是一些能帮助你更好地使用树莓派的命令。\n\
    \n### 第一步\n\n树莓派是一台很棒的小型计算机，所以让我们先获取一些信息。输入：`cat /proc/cpuinfo` 查看你树莓派处理器的详细信息。如果你有树莓派\
    \ 3，你将看到四个处理器，以及型号名称和其他信息。\n\n```\npi@raspberrypi ~ $ cat /proc/cpuinfo\nprocessor\t\
    : 0\nmodel name\t: ARMv7 Processor rev 5 (v7l)\nBogoMIPS\t: 38.40\nFeatures\t\
    : half thumb fastmult vfp edsp neon vfpv3 tls vfpv4 idiva idivt vfpd32 lpae evtstrm\n\
    CPU implementer\t: 0x41\nCPU architecture: 7\nCPU variant\t: 0x0\nCPU part\t:\
    \ 0xc07\nCPU revision\t: 5\n\nprocessor\t: 1\nmodel name\t: ARMv7 Processor rev\
    \ 5 (v7l)\nBogoMIPS\t: 38.40\nFeatures\t: half thumb fastmult vfp edsp neon vfpv3\
    \ tls vfpv4 idiva idivt vfpd32 lpae evtstrm\nCPU implementer\t: 0x41\nCPU architecture:\
    \ 7\nCPU variant\t: 0x0\nCPU part\t: 0xc07\nCPU revision\t: 5\n\nprocessor\t:\
    \ 2\nmodel name\t: ARMv7 Processor rev 5 (v7l)\nBogoMIPS\t: 38.40\nFeatures\t\
    : half thumb fastmult vfp edsp neon vfpv3 tls vfpv4 idiva idivt vfpd32 lpae evtstrm\n\
    CPU implementer\t: 0x41\nCPU architecture: 7\nCPU variant\t: 0x0\nCPU part\t:\
    \ 0xc07\nCPU revision\t: 5\n```\n\n### 第二步\n\n记住，`cat` 用于列出文本文件的内容，cpuinfo 就是这样一个文件。还有其他包含系统信息的文本文件可用。试试\
    \ \"cat /proc/meminfo\" 获取内存信息，\"cat /proc/partitions\" 获取 SD 卡信息，以及 \"cat /proc/version\"\
    \ 显示你正在使用的树莓派版本。\n\n```\npi@raspberrypi ~ $ cat /proc/meminfo\nMemTotal:\t  885760\
    \ kB\nMemFree:\t   795576 kB\nMemAvailable:\t  831660 kB\nBuffers:\t    11660\
    \ kB\nCached:\t\t   56380 kB\nSwapCached:\t        0 kB\nActive:\t\t   49140 kB\n\
    Inactive:\t    17920 kB\nActive(anon):\t   11256 kB\nInactive(anon):\t     0 kB\n\
    Active(file):\t   37884 kB\nInactive(file):\t  17920 kB\nUnevictable:\t      \
    \  0 kB\nMlocked:\t        0 kB\nSwapTotal:\t   102396 kB\nSwapFree:\t   102396\
    \ kB\nDirty:\t\t       36 kB\nWriteback:\t        0 kB\nAnonPages:\t    11132\
    \ kB\nMapped:\t\t    5728 kB\nShmem:\t\t     260 kB\nSlab:\t\t    14512 kB\nSReclaimable:\t\
    \     4512 kB\nSUnreclaim:\t    10000 kB\nKernelStack:\t     1720 kB\nPageTables:\t\
    \      564 kB\nVmallocTotal:\t 1140736 kB\nVmallocUsed:\t        0 kB\nWritebackTmp:\t\
