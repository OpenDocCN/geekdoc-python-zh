  md: "# Random Password Generator\n\nWe're always being told that our passwords aren't\
    \ secure enough; well here's a solution for you to implement into your own future\
    \ programs. The random password generator code below will create a 12-letter string\
    \ of words (both cases) and numbers each time it's executed.\n\n# RNDPASSWORD.PY\n\
    \nCopy the code and run it; each time you'll get a random string of characters\
    \ that can easily be used as a secure password which will be very difficult for\
    \ a password cracker to hack.\n\n```\nimport string\nimport random\n\ndef randompassword():\n\
    \    chars=string.ascii_uppercase + string.ascii_lowercase + string.digits\n \
    \   size= 8\n    return ''.join(random.choice(chars) for x in range(size,20))\n\
    \nprint(randompassword())\n```\n\n# Secure Passwords\n\nThere's plenty you can\
    \ do to modify this code and improve it further. For one, you can increase the\
    \ number of characters the generated password displays and perhaps you can include\
    \ special characters too, such as signs and symbols. Then, you can output the\
    \ chosen password to a file, then securely compress it using the previous random\
    \ number generator as a file password and send it to a user for their new password.\n\
    \nAn interesting aspect to this code is the ability to introduce a loop and print\
    \ any number of random passwords. Let's assume you have a list of 50 users for\
    \ a company and you're in charge of generating a random password for them each\
    \ month.\n\nAdding a loop to print a password fifty times is extremely easy, for\
    \ example:\n\n```\nimport string\nimport random\n\ndef randompassword():\n   \
    \ chars=string.ascii_uppercase + string.ascii_lowercase + string.digits\n    size=\
    \ 4\n    return ''.join(random.choice(chars) for x in range(size,20))\n\nn=0\n\
    while n<50:\n    print(randompassword())\n    n=n+1\n```\n\n![](img/e4c529ac6a286a7773e0e7c17e263180_116_0.png)\n\
    \nThis will output fifty random passwords based on the previous random selection\
    \ of characters.\n\n![](img/e4c529ac6a286a7773e0e7c17e263180_116_1.png)"
