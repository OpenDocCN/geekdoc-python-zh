    8.0K    ./.config/uk.ac.cam.cl

    8.0K    ./.config/inflexcity

    8.0K    ./.config/handbrake

    ```


    **STEP 4** You don''t typically enter: `du` on its own; most of the time you want
    to view the disk usage of a specific directory. Enter: `du -h python_games` to
    view how much space the `python_games` directory (installed alongside Raspbian)
    takes up. It should be 1.8M. If you want a more comprehensive breakdown of the
    files contained, use the “-a” option (all). Enter: `du -ha python_games` to view
    all the files contained and their disk usage.


