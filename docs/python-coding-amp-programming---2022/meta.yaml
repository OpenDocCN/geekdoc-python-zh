  - "[PAGE 57]\n\n# Combining What You Know So Far\n\nWe've reached the end of this\
    \ section so let's take a moment to combine everything we've looked at so far,\
    \ and apply it to writing a piece of code. This code can then be used and inserted\
    \ into your own programs in future; either part of it or as a whole.\n\n# PLAYING\
    \ WITH PI\n\nFor this example we're going to create a program that will calculate\
    \ the value of Pi to a set number of decimal places, as described by the user.\
    \ It combines much of what we've learnt, and a little more.\n\n+   1. **STEP 1**\n\
    Start by opening Python and creating a New File in the Editor. First we need to\
    \ get hold of an equation that can accurately calculate Pi without rendering the\
    \ computer's CPU useless for several minutes. The recommended calculation used\
    \ in such circumstances is the Chudnovsky Algorithm, you can find more information\
    \ about it at [en.wikipedia.org/wiki/Chudnovsky_algorithm](https://en.wikipedia.org/wiki/Chudnovsky_algorithm).\n\
    2. **STEP 2**\nYou can utilise the Chudnovsky Algorithm to create your own Python\
    \ script based on the calculation. Begin by importing some important modules and\
    \ functions within the modules:\n`from decimal import Decimal, getcontext`\n`import\
    \ math`\nThis uses the decimal and getcontext functions from the Decimal module,\
    \ both of which deal with large decimal place numbers and naturally the Math module.\n\
    3. **STEP 3**\nNow you can insert the Pi calculation algorithm part of the code.\
    \ This is a version of the Chudnovsky Algorithm:\npython\ndef calc(n):\n    t\
    \ = Decimal(0)\n    pi = Decimal(0)\n    deno = Decimal(0)\n    k = 0\n    for\
    \ k in range(n):\n        t = (Decimal(-1)**k)*(math.factorial(Decimal(6)*k))*(13591409\
    \ +545140134*k)\n        deno = math.factorial(3*k)*(math.factorial(k)**Decimal(3))*(640320**(3*k))\n\
    \        pi += Decimal(t)/Decimal(deno)\n    pi = pi * Decimal(12)/Decimal(640320**Decimal(1.5))\n\
    \    pi = 1/pi\n    return str(pi)\n\n4. **STEP 4**\nThe previous step defines\
    \ the rules that make up the algorithm and creates the string that will eventually\
    \ display the value of Pi, according the Chudnovsky brothers' algorithm. You have\
    \ no doubt already surmised that it would be handy to actually output the value\
    \ of Pi to the screen. To rectify that you can add:\n`print(calc(1))`\n5. **STEP\
    \ 5**\nYou can save and execute the code at this point if you like. The output\
    \ will print the value of Pi to 27 decimal places: **3.141592653589734207668453591**.\
    \ Whilst pretty impressive on its own, you want some user interaction, to ask\
    \ the user as to how many places Pi should be calculated.\n6. **STEP 6**\nYou\
    \ can insert an input line before the Pi calculation Def command. It needs to\
    \ be an integer, as it will otherwise default to a string. We can call it numberofdigits\
    \ and use the getcontext function:\n`numberofdigits = int(input(\"please enter\
    \ the number of decimal place to calculate Pi to: \"))`\n`getcontext().prec =\
    \ numberofdigits`\n\n![](img/e4c529ac6a286a7773e0e7c17e263180_57_0.png)\n\n![](img/e4c529ac6a286a7773e0e7c17e263180_57_1.png)"
