    \ and\nsnarl at you.\n        \"What do you want, barbarian?\" One guard reaches\n\
    for the hilt of his sword...\")\n    time.sleep(2)\n\ndef getcmd(cmdlist):\n \
    \   cmd = input(name+\">\")\n    if cmd in cmdlist:\n        return cmd\n    elif\
