    \n## 鼠标控制的海龟画图\n\n我们已经见过用户通过键盘控制海龟模块，但现在我们想看看用户如何在 Python 中使用鼠标作为绘图工具。这里我们有两个可能的代码示例，选择最适合你的那个。\n\
    \n![](img/e4c529ac6a286a7773e0e7c17e263180_121_0.png)\n\n![](img/e4c529ac6a286a7773e0e7c17e263180_121_1.png)\n\
    \n### MOUSETURTLE.PY\n\n第一段代码展示了标准的海龟窗口。按下空格键，然后在屏幕任意位置点击，海龟就会移动到鼠标指针的位置进行绘制。第二段代码允许你点击海龟并将其拖动到屏幕各处；但要小心，它可能会导致\
    \ Python 崩溃。\n\n第一个代码示例：\n\n```python\nfrom turtle import Screen, Turtle\nscreen\
    \ = Screen()\nyertle = Turtle()\ndef k101():\n    screen.onscreenclick(click_handler)\n\
    def click_handler(x, y):\n    screen.onscreenclick(None) # 在事件处理程序内禁用事件\n    yertle.setheading(yertle.towards(x,\
    \ y))\n    yertle.goto(x, y)\n    screen.onscreenclick(click_handler) # 在事件处理程序退出时重新启用事件\n\
    screen.onkey(k101, \" \") # 空格键开启鼠标绘图\nscreen.listen()\nscreen.mainloop()\n```\n\
    \n第二个代码示例：\n\n```python\nfrom turtle import *\nshape(\"circle\")\npencolor(\"\
    blue\")\nwidth(2)\nondrag(goto)\nlisten()\n```\n\n> 忍者海龟鼠标\n\n这段代码利用了一些有趣的技巧。显然，想要做出任何改进都会拓展你的\
    \ Python 海龟技能，这很好，但它也可以成为插入到小孩子会使用的应用程序中的一段不错的代码。因此，它可能是一个非常适合年轻人深入钻研的项目；或者甚至作为游戏的一部分，其中主角被要求绘制骷髅旗或类似的图案。\n\
    \n## Python 闹钟\n\n有没有过从电脑前快速离开一会儿，却突然意识到几分钟后你把所有时间都花在了 Facebook 上？介绍 Python 闹钟代码，你可以打开命令提示符，告诉代码多少分钟后闹钟会响。\n\
    \n### ALARMCLOCK.PY\n\n这段代码设计用于命令提示符环境，无论是 Windows、Linux 还是 macOS。在主打印部分有一些使用说明，但本质上就是：`python3\
    \ AlarmClock.py 10`（十分钟后响）。\n\n```python\nimport sys\nimport string\nfrom time\
    \ import sleep\n\nsa = sys.argv\nlsa = len(sys.argv)\nif lsa != 2:\n    print\
    \ (\"Usage: [ python3 ] AlarmClock.py duration_in_minutes\")\n    print (\"Example:\
    \ [ python3 ] AlarmClock.py 10\")\n    print (\"Use a value of 0 minutes for testing\
    \ the alarm immediately.\")\n    print (\"Beeps a few times after the duration\
    \ is over.\")\n    print (\"Press Ctrl-C to terminate the alarm clock early.\"\
    )\n    sys.exit(1)\n\ntry:\n    minutes = int(sa[1])\nexcept ValueError:\n   \
    \ print (\"Invalid numeric value (%s) for minutes\" % sa[1])\n    print (\"Should\
    \ be an integer >= 0\")\n    sys.exit(1)\n\nif minutes < 0:\n    print (\"Invalid\
    \ value for minutes, should be >= 0\")\n    sys.exit(1)\n\nseconds = minutes *\
    \ 60\n\nif minutes == 1:\n    unit_word = \" minute\"\nelse:\n    unit_word =\
    \ \" minutes\"\n\ntry:\n    if minutes > 0:\n        print (\"Sleeping for \"\
    \ + str(minutes) + unit_word)\n        sleep(seconds)\n    print (\"Wake up\"\
    )\n    for i in range(5):\n        print (chr(7)),\n        sleep(1)\nexcept KeyboardInterrupt:\n\
    \    print (\"Interrupted by user\")\n    sys.exit(1)\n```\n\n> ### 醒醒吧\n\n这段代码很好地运用了\
    \ `try` 和 `except` 块，以及一些其他有用的循环，这些可以帮助你更牢固地理解它们在 Python 中的工作原理。这段代码本身可以用于多种场景：比如在某个事件在设定时间后发生的游戏，或者仅仅作为一个方便的桌面闹钟，用于你的茶歇时间。\n\
    \nLinux 用户，试试将闹钟代码设置为别名，这样你就可以用一个简单的命令来执行它。然后，为什么不在开头加入用户输入，询问用户想要闹钟在多少时间后响，而不是必须在命令行中包含时间呢？\n\
    \n![](img/e4c529ac6a286a7773e0e7c17e263180_122_0.png)\n\nWindows 用户，如果你的系统上只安装了\
