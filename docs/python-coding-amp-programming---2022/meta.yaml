    Hello, World


    # # Creating Functions


    Now that you’ve mastered the use of variables and user input, the next step is
    to tackle functions. You’ve already used a few functions, such as the print command
    but Python enables you to define your own functions.


    # ## FUNKY FUNCTIONS


    A function is a command that you enter into Python to do something. It’s a little
    piece of self-contained code that takes data, works on it and then returns the
    result.


    # ### STEP 1


    It’s not just data that a function works on. They can do all manner of useful
    things in Python, such as sort data, change items from one format to another and
    check the length or type of items. Basically, a function is a short word that’s
    followed by brackets. For example, `len()`, `list()` or `type()`.


    ![](img/e4c529ac6a286a7773e0e7c17e263180_49_0.png)


    # ### STEP 2


    A function takes data, usually a variable, works on it depending on what the function
    is programmed to do and returns the end value. The data being worked on goes inside
    the brackets, so if you wanted to know how many letters are in the word antidisestablishmentarianism,
    then you’d enter: `len("antidisestablishmentarianism")` and the number 28 would
    return.


    ![](img/e4c529ac6a286a7773e0e7c17e263180_49_1.png)


    # ### STEP 3


    You can pass variables through functions in much the same manner. Let’s assume
    you want the number of letters in a person’s surname, you could use the following
    code (enter the text editor for this example):


    ```


    name=input ("Enter your surname: ")

    count=len(name)

    print ("Your surname has", count, "letters in it.")

    ```


    Press F5 and save the code to execute it.


    ![](img/e4c529ac6a286a7773e0e7c17e263180_49_2.png)


    # ### STEP 4


    Python has tens of functions built into it, far too many to get into in the limited
    space available here. However, to view the list of built-in functions available
    to Python 3, navigate to www.docs.python.org/3/library/functions.html. These are
    the predefined functions, but since users have created many more, they’re not
    the only ones available.


    ![](img/e4c529ac6a286a7773e0e7c17e263180_49_3.png)'
