  md: '# # Useful System and Disk Commands


    **STEP 5** Enter: `vcgencmd measure_temp` to view the current operating system
    temperature of your Raspberry Pi. Enter: `vcgencmd get_mem arm` to view the RAM
    available, and `vcgencmd get_mem gpu` to view the memory available to the graphics
    chip. Finally try `ls usb` to view a list of attached USB devices.


    ```

    bash

    pi@raspberrypi ~ $ vcgencmd measure_temp

    temp=46.1''C

    pi@raspberrypi ~ $ vcgencmd get_mem arm

    arm=800M

    pi@raspberrypi ~ $ vcgencmd get_mem gpu

    gpu=16M

    pi@raspberrypi ~ $ lsusb

    Bus 001 Device 002: ID 0424:9514 Standard Microsystems Corp.

    Bus 001 Device 001: ID 1d6b:0002 Linux Foundation 2.0 root hub

    Bus 001 Device 003: ID 0424:ec00 Standard Microsystems Corp.

    Bus 001 Device 004: ID 0499:1503 Holtek Semiconductor, Inc. Shortboard Lefty

    Bus 001 Device 005: ID 1a40:0101 Terminus Technology Inc. 4-Port HUB

    Bus 001 Device 006: ID 276d:1105

    pi@raspberrypi ~ $

    ```


    **STEP 6** One command you might be wondering about is how to switch off or restart
    your Raspberry Pi from the command line. Don''t just hit the power switch. Enter:
    `sudo shutdown -h now` to shut down the Raspberry Pi (the “-h” option stands for
    “halt”), or enter: `sudo shutdown -r now` to restart your Raspberry Pi.


    ```

    bash

    pi@raspberrypi ~ $ sudo shutdown -r now


    Broadcast message from root@raspberrypi (tty1) (Thu May 14 12:20:29 2015):

    The system is going down for reboot NOW!

    ```


    # # DISK COMMANDS


    Learn the two commands that enable you to view your disk space and the files on
    it: `df` (disk free space) and `du` (disk usage). With these two commands you
    can view the file usage on your SD card.


    **STEP 1** Start by entering: `df` in the command line. It returns a list of the
    volumes contained on your SD card. You might be wondering what a volume is. It''s
    best to think of your SD card as the drive. This contains partitions, which is
    where you split one drive to act like two or more drives. And each partition can
    contain volumes, which are storage spaces.


    ```

    bash

    pi@raspberrypi ~ $ df

    Filesystem     1K-blocks    Used Available Use% Mounted on

    rootfs          6581636 3408164   2749096  56% /

    /dev/root       6581636 3408164   2749096  56% /

    devtmpfs          428700       0    428700   0% /dev

    tmpfs              80432     260     80172   1% /run

    tmpfs               5120       0      5120   0% /run/lock

    tmpfs             176860       0    176860   0% /run/shm

    /dev/mmcblk0p5    60479   14536     45943  25% /boot

    pi@raspberrypi ~ $

    ```


    **STEP 3** Now enter: `du`. You should see lots of text fly up the screen. This
    is the disk usage for the files contained in your home directory and their sub-directories.
    As with `df`, it is better to use `du` with the “-h” option to humanise the output.
    If you want to slow down the output, you''ll also need to pipe it through `less`.
    Enter: `df -h | less` to view the files and their respective usage one page at
    a time.


    ```

    bash

    pi@raspberrypi ~ $ df -h

    Filesystem      Size  Used Avail Use% Mounted on

    rootfs          6.3G  3.4G  2.7G  56% /

    /dev/root       6.3G  3.4G  2.7G  56% /

    devtmpfs        428M     0  428M   0% /dev

    tmpfs            87M  260K   87M   1% /run

    tmpfs           5.0M     0  5.0M   0% /run/lock

    tmpfs           173M     0  173M   0% /run/shm

    /dev/mmcblk0p5   60M   15M   43M  25% /boot

    pi@raspberrypi ~ $

    ```


    **STEP 2** Enter: `df -h` to get the list in human readable form. The first two
    lines should read “rootfs” and “/dev/ root” and have matching Size, Used, Avail
    and Use% listings. This is the main drive, and is an indication of how much space
    you have used, and have free, on your Raspbian OS. The other volumes are for booting
    and initialising devices (you can ignore these for now).


    ```

    bash

    pi@raspberrypi ~ $ du -h | less

    22M     ./.minecraft/games/com.mojang/minecraftWorlds/world

    22M     ./.minecraft/games/com.mojang/minecraftWorlds

    22M     ./.minecraft/games/com.mojang

    22M     ./.minecraft/games

