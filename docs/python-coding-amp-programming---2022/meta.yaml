    \ 22 创建编码平台\n\n# 成为一名程序员\n\n程序员、开发者、编码员，这些都是对同一职业的不同称呼，即创建代码的人。他们创建代码的目的是什么，可以是任何东西，从电子游戏到国际空间站上的关键部件。但你如何成为一名程序员呢？\n\
    \n![](img/e4c529ac6a286a7773e0e7c17e263180_7_0.png)\n\n![](img/e4c529ac6a286a7773e0e7c17e263180_8_0.png)\n\
