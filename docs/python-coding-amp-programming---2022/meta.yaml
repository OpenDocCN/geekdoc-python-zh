    There’s a lot that can be done with the Time module; some of it is quite complex
    too, such as displaying the number of seconds since January 1st 1970. If you want
    to drill down further into the Time module, then in the Shell enter: help(time)
    to display the current Python version help file for the Time module.


    ![](img/e4c529ac6a286a7773e0e7c17e263180_74_5.png)'
