  md: '# Python in Focus: Stitching Black Holes


    ![](img/e4c529ac6a286a7773e0e7c17e263180_60_0.png)


    # BIG DATA AND PYTHON


    # RESULTS


    This data was then collated across all the telescope arrays to the tune of over
    a thousand hard drives, which came to an astonishing 5 Petabytes of raw data.
    The problem now was collating all that data into a workable form and presenting
    it as an image.


    The end result is, of course, the image of the black hole at the centre of the
    M87 galaxy that''s surrounded by a ring of burning gasses. The resolution isn''t
    great, as the team have since admitted, but, as they also state, give it a couple
    of years and they''ll be able to increase the image resolution significantly.


    Katie Bouman, a Ph.D. in electrical engineering and computer science from MIT,
    was pivotal in creating the Python code that was able to stitch all that data
    together and form the eventual, historic image of a black hole.


    ![](img/e4c529ac6a286a7773e0e7c17e263180_60_1.png)


    All this is thanks to some clever Python code and some very brilliant scientists
    and engineers.


    Bouman used a number of Python libraries to achieve the result, Numpy, Scipy,
    Pandas, Jupyter, Matplotlib and Astropy, plus some unique custom Python code –
    which can be found on Github at: https://github.com/achael/eht-imaging.


    ```

    from os import path, environ


    # set as true if you want to use a model image, false will load the specified
    image

    usemodel = True

    # path to model image

    sampleimage = ''../models/lores_M87.txt''


    # path to array file for loading uvfits and site locations

    array = ''../arrays/EHT2017_M87.txt''


    # parameters for model image

    npix = 128

    size = 10*eh.RADPERUAS

    source = ''M87''

    ra = 17.761483521482148015

    dec = 12.391123157756647915

    dist = 1.7e9

    rf = 23000000000.0

    mjd = 57850


    ring_radius = 20*eh.RADPERUAS # the radius of the ring

    ring_width = 10*eh.RADPERUAS # the width of the ring

    brightc = 0.5 # defines how much brighter the brighter location is on the ring

    brightfrac = 0.5 # defines the location of the brightest location

    fracpol = 0.4 # fractional polarization on model image

    corr = 5 * eh.RADPERUAS # the coherence length of the polarization


    # parameters for simulated data

    add_th_noise = True # if True there are no flags. In ehtim it will use the sigma
    for each data point

    ampcal = False # if False then add random phases to simulate atmosphere

    dphasecal = False # if False then add random gain errors

    phasecal = False # if False then add random phase error for each scan to set clutter
    to adhoc phasing

    stabilize_scan_amp = True # if True then add a single gain error at each scan

    Dterm = True # to apply Jones matrix for including noise in the measurements (including
    leakage)

    Dterm_mean = 0.0 # mean of Dterm

    frcal = True # True if you do not include effects of field rotation

    ```


