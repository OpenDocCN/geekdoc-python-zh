    \ == \"2\":\n        guards()\n\ndef ragged():\n    print(\"\\n\" * 200)\n   \
    \ print('''You walk up to the ragged looking man and\ngreet him.\n        He smiles\
    \ a toothless grin and, with a strange\naccent, says.\n        \"Buy me a cup\
