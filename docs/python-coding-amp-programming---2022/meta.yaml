  md: "# # Number Guessing Game\n\nThis is a simple little piece of code but it makes\
    \ good use of the Random module, print and input, and a while loop. The number\
    \ of guesses can be increased from 5 and the random number range can easily be\
    \ altered too.\n\n![](img/e4c529ac6a286a7773e0e7c17e263180_113_0.png)\n\n![](img/e4c529ac6a286a7773e0e7c17e263180_113_1.png)\n\
    \n# ## NUMBERGUESS.PY\n\nCopy the code and see if you can beat the computer within\
    \ five guesses. It's an interesting bit of code that can be quite handy when your\
    \ implementing a combination of the Random module alongside a while loop.\n\n\
    ```\npython\nimport random\n\nguessesUsed = 0\nName=input('Hello! What is your\
    \ name? ')\nnumber = random.randint(1, 30)\nprint('Greetings, ' + Name + ', I'm\
    \ thinking of a number between 1 and 30.')\nwhile guessesUsed < 5:\n    guess=int(input('Guess\
    \ the number within 5 guesses...'))\n    guessesUsed = guessesUsed + 1\n    if\
    \ guess < number:\n        print('Too low, try again.')\n    if guess > number:\n\
    \        print('Too high, try again.')\n    if guess == number:\n        break\n\
    \nif guess == number:\n    guessesUsed = str(guessesUsed)\n    print('Well done,\
    \ ' + Name + '! You guessed correctly in ' + guessesUsed + ' guesses.')\n\nif\
    \ guess != number:\n    number = str(number)\n    print('Sorry, out of guesses.\
    \ The number I was thinking of is ' + number)\n```\n\nAlthough this is a reasonably\
    \ easy to follow program, there are some elements to the code that are worth pointing\
    \ out. To begin with, you need to import the Random module, as you're using random\
    \ numbers within the code.\n\nThis section of the code creates the variables for\
    \ the number of guesses used, along with the name of the player, and also sets\
    \ up the random number between 1 and 30. If you want a wider range of random number\
    \ selection, then increase the number=random.randint(1, 30) end value of 30; don't\
    \ make it too high though or the player will never be able to guess it. If the\
    \ player guesses too low or too high, they are given the appropriate output and\
    \ asked to try again, while the number of guesses is less than five. You can also\
    \ increase the number of guesses from 5 by altering the while guessesUsed < 5:\
    \ value.\n\nIf the player guessed the correct number then they are given a 'well\
    \ done' output, along with how many guesses they used up. If the player runs out\
    \ of guesses, then the game over output is displayed instead, along with revealing\
    \ the number the computer was thinking of. Remember, if you do alter the values\
    \ of the random number chosen by the computer, or the number of guesses the player\
    \ can take, then along with the variable values, you also need to amend the instructions\
    \ given in the print statements at the start of the code."
