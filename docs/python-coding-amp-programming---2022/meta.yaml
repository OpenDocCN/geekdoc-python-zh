    ```\npip install colorama\n```\n\n**STEP 9**\n\nNow we need to import the Colorama\
    \ module (which will output text in different colours) along with the Fore function\
    \ (which dictates the foreground, ink, colour) and the Time module to start a\
    \ virtual stopwatch to see how long our calculations take:\n\n```\nimport time\n\
    import colorama\nfrom colorama import Fore\n```\n\n![](img/e4c529ac6a286a7773e0e7c17e263180_58_1.png)\n\
    \n**STEP 10**\n\nTo finish our code, we need to initialise the Colorama module\
    \ and start the time function at the point where the calculation starts, and when\
    \ it finishes. The end result is a coloured ink displaying how long the process\
    \ took (in the Terminal or command line):\n\n```\nfrom decimal import Decimal,\
    \ getcontext\nimport math\nimport time\nimport colorama\nfrom colorama import\
    \ Fore\ncolorama.init()\n\nnumberofdigits = int(input(\"please enter the number\
    \ of decimal places to calculate Pi to: \"))\ngetcontext().prec = numberofdigits\n\
    \nstart_time = time.time()\ndef calc(n):\n```\n\n```\nt = Decimal (0)\npi = Decimal\
    \ (0)\ndeno = Decimal (0)\nk = 0\n\nfor k in range (n) :\n    t = (Decimal(-1)**k)*(math.\n\
    \    factorial(Decimal (6)*k))*(13591409+545140134*k)\n    deno = math.factorial(3*k)*(math.\n\
    \    factorial(k)**Decimal (3))*(640320**(3*k))\n    pi += Decimal(t)/Decimal(deno)\n\
    \    pi = pi * Decimal(12)/\n    Decimal(640320**Decimal (1.5))\n    pi = 1/pi\n\
    \    return str(pi)\n\nprint(calc(1))\nprint(Fore.RED + \"\\nTime taken:\", time.time()\
    \ -\n    start_time)\n```\n\n![](img/e4c529ac6a286a7773e0e7c17e263180_58_2.png)"
