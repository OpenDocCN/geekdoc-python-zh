    \ ~ $ cat /proc/partitions\nmajor minor  #blocks  name\n 179        0    7761920\
    \ mmcblk0\n 179        1    8350720 mmcblk0p1\n 179        2          1 mmcblk0p2\n\
    ```\n\n### 第三步\n\n输入：`uname` 查看操作系统的内核名称，这是位于界面和硬件之间的组件。正如你所料，命令的响应是 Linux，因为\
    \ Raspbian 是一个 Linux 发行版，而它本身基于另一个名为 Debian 的 Linux 发行版。虽然这听起来可能很复杂，但它实际上展示了 Linux\
    \ 的多功能性。\n\n```\npi@raspberrypi ~ $ uname\nLinux\npi@raspberrypi ~ $\n```\n\n\
    ### 第四步\n\n输入：`uname -a` 查看更详细的信息。在这里你会看到内核名称、主机名和内核版本（我们的是 3.18.7-v7）。如果你有树莓派\
    \ 2，你会看到 SMP（对称多处理），后跟系统日期、CPU 架构和操作系统（GNU/Linux）。\n\n```\npi@raspberrypi ~ $\
