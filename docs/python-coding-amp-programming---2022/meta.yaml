    \ the top left corner of the animation window, down to the bottom right corner.\
    \ You can alter the speed in which the ball traverses the window by altering the\
    \ `time.sleep(.01)` line. Try (.05).\n\n![](img/e4c529ac6a286a7773e0e7c17e263180_103_0.png)\n\
    \n## STEP 4\n\nThe `canvas.move(ball1,a,b)` line is the part that moves the ball\
