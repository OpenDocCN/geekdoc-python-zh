  md: "# # Calendar Module\n\n# ## STEP 5\n\nYou can also create a program that will\
    \ display all the days, weeks and months within a given year:\n\n```\nimport calendar\n\
    year=int(input(\"Enter the year to display: \"))\nprint(calendar.prcal(year))\n\
    ```\n\nWe're sure you'll agree that's quite a handy bit of code to have to hand.\n\
    \n![](img/e4c529ac6a286a7773e0e7c17e263180_90_0.png)\n\n# ## STEP 6\n\nInterestingly\
    \ we can also list the number of days in a month by using a simple: for loop:\n\
    \n```\nimport calendar\ncal=calendar.TextCalendar(calendar.SUNDAY)\nfor i in cal.itermonthdays(2019,\
    \ 6):\n    print(i)\n```\n\n![](img/e4c529ac6a286a7773e0e7c17e263180_90_1.png)\n\
    \n# ## STEP 7\n\nYou can see that, at the outset, the code produced some zeros.\
    \ This is due to the starting day of the week, Sunday in this case, plus overlapping\
    \ days from the previous month. Meaning the counting of the days will start on\
    \ Saturday 1st June 2019 and will total 30, as the output correctly displays.\n\
    \n![](img/e4c529ac6a286a7773e0e7c17e263180_90_2.png)\n\n# ## STEP 8\n\nYou're\
    \ also able to print the individual months, or days, of the week:\n\n```\nimport\
    \ calendar\nfor name in calendar.month_name:\n    print(name)\n\nimport calendar\n\
    for name in calendar.day_name:\n    print(name)\n```\n\n![](img/e4c529ac6a286a7773e0e7c17e263180_90_3.png)\n\
    \n# ## STEP 9\n\nThe Calendar module also allows us to write the functions in\
    \ HTML, so that you can display it on a website. Let's start by creating a new\
    \ file:\n\n```\nimport calendar\ncal=open(\"/home/pi/Documents/cal.html\", \"\
    w\")\nc=calendar.HTMLCalendar(calendar.SUNDAY)\ncal.write(c.formatmonth(2019,\
    \ 1))\ncal.close()\n```\n\nThis code will create an HTML file called cal, open\
    \ it with a browser and it displays the calendar for January 2019.\n\n![](img/e4c529ac6a286a7773e0e7c17e263180_90_4.png)\n\
    \n# ## STEP 10\n\nOf course, you can modify that to display a given year as a\
    \ web page calendar:\n\n```\nimport calendar\nyear=int(input(\"Enter the year\
    \ to display as a webpage: \"))\ncal=open(\"/home/pi/Documents/cal.html\", \"\
    w\")\ncal.write(calendar.HTMLCalendar(calendar.MONDAY).formatyear(year))\ncal.close()\n\
    ```\n\nThis code asks the user for a year and then creates the necessary webpage.\
    \ Remember to change your file destination.\n\n![](img/e4c529ac6a286a7773e0e7c17e263180_90_5.png)"
