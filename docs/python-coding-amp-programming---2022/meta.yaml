    \ file_ in files:\n        src_file = os.path.join(src_dir, file_)\n        dst_file\
    \ = os.path.join(dst_dir, file_)\n        if os.path.exists(dst_file):\n     \
    \       os.remove(dst_file)\n        shutil.copy(src_file, dst_dir)\n\nprint(\"\
    >>>>>>>>>Backup complete<<<<<<<<<<\")\n```\n\n![](img/e4c529ac6a286a7773e0e7c17e263180_92_5.png)"
