    \n![](img/e4c529ac6a286a7773e0e7c17e263180_129_2.png)\n\n```python\nimport time\n\
    \nprint(\"\\n\" * 200)\nprint(\">>>>>>>>>>Awesome Adventure<<<<<<<<<<\\n\")\n\
    print(\"\\n\" * 3)\ntime.sleep(3)\nprint(\"\\nA long time ago, a warrior strode\
    \ forth from the frozen north.\")\ntime.sleep(1)\nprint(\"Does this warrior have\
    \ a name?\")\nname=input(\"> \")\nprint(name, \"the barbarian, sword in hand and\
    \ looking for adventure!\")\ntime.sleep(1)\nprint(\"However, evil is lurking nearby....\"\
    )\ntime.sleep(1)\nprint(\"A pair of bulbous eyes regards the hero...\")\ntime.sleep(1)\n\
    print(\"Will\", name, \"prevail, and win great fortune...\")\ntime.sleep(1)\n\
    print(\"Or die by the hands of great evil...?\")\ntime.sleep(1)\nprint(\"\\n\"\
    \ *3)\nprint(\"Only time will tell....\")\ntime.sleep(1)\nprint('...')\ntime.sleep(1)\n\
    print('...')\ntime.sleep(1)\nprint('...')\ntime.sleep(1)\nprint('...')\ntime.sleep(5)\n\
    print(\"\\n\" *200)\n\nprint('''       You find yourself at a small inn. There's\n\
    little gold in your purse but your sword is sharp,\nand you're ready for adventure.\n\
    \ With you are three other customers.\nA ragged looking man, and a pair of dangerous\n\
    looking guards.''')\n\ndef start():\n    print(\"\\n ----------\")\n    print(\"\
    Do you approach the...\")\n    print(\"\\n\")\n    print(\"1. Ragged looking man\"\
