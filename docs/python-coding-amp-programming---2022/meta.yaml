    # Working with Variables


    We’ve seen some examples of variables in our Python code already but it’s always
    worth going through the way they operate and how Python creates and assigns certain
    values to a variable.


    # VARIOUS VARIABLES


    You’ll be working with the Python 3 IDLE Shell in this tutorial. If you haven’t
    already, open Python 3 or close down the previous IDLE Shell to clear up any old
    code.


    STEP 1: In some programming languages you’re required to use a dollar sign to
    denote a string, which is a variable made up of multiple characters, such as a
    name of a person. In Python this isn’t necessary. For example, in the Shell enter:
    name="David Hayward" (or use your own name, unless you’re also called David Hayward).


    ![](img/e4c529ac6a286a7773e0e7c17e263180_45_0.png)


    STEP 2: You can check the type of variable in use by issuing the type () command,
    placing the name of the variable inside the brackets. In our example, this would
    be: type (name). Add a new string variable: title="Descended from Vikings".


    ![](img/e4c529ac6a286a7773e0e7c17e263180_45_1.png)


    STEP 3: You’ve seen previously that variables can be concatenated using the plus
    symbol between the variable names. In our example we can use: print (name + ":
    " + title). The middle part between the quotations allows us to add a colon and
    a space, as variables are connected without spaces, so we need to add them manually.


    ![](img/e4c529ac6a286a7773e0e7c17e263180_45_2.png)


    STEP 4: You can also combine variables within another variable. For example, to
    combine both name and title variables into a new variable we use: character=name
    + ": " + title. Then output the content of the new variable as: print (character).
    Numbers are stored as different variables: age=44. Type (age). Which, as we know,
    are integers.


    ![](img/e4c529ac6a286a7773e0e7c17e263180_45_3.png)'
  - '[PAGE 46]


    # STEP 5


    However, you can''t combine both strings and integer type variables in the same
    command, as you would a set of similar variables. You need to either turn one
    into the other or vice versa. When you do try to combine both, you get an error
    message:


    ```

    print (name + age)

    ```


    ![](img/e4c529ac6a286a7773e0e7c17e263180_46_0.png)


    # STEP 6


    This is a process known as TypeCasting. The Python code is:


    ```

    print (character + " is " + str(age) + " years old.")

    ```


    or you can use:


    ```

    print (character, "is", age, "years old.")

    ```


    Notice again that in the last example, you don''t need the spaces between the
    words in quotes as the commas treat each argument to print separately.


    ![](img/e4c529ac6a286a7773e0e7c17e263180_46_1.png)


    # STEP 7


    Another example of TypeCasting is when you ask for input from the user, such as
    a name. for example, enter:


    ```

    age= input ("How old are you? ")

    ```


    All data stored from the input command is stored as a string variable.


    ![](img/e4c529ac6a286a7773e0e7c17e263180_46_2.png)


    # STEP 8


    This presents a bit of a problem when you want to work with a number that''s been
    inputted by the user, as age + 10 won''t work due to being a string variable and
    an integer. Instead, you need to enter:


    ```

    int(age) + 10

    ```


    This will TypeCast the age string into an integer that can be worked with.


    ![](img/e4c529ac6a286a7773e0e7c17e263180_46_3.png)


    # STEP 9


    The use of TypeCasting is also important when dealing with floating point arithmetic;
    remember: numbers that have a decimal point in them. For example, enter:


    ```

    shirt=19.99

    ```


    Now enter type (shirt) and you''ll see that Python has allocated the number as
    a ''float'', because the value contains a decimal point.


    ![](img/e4c529ac6a286a7773e0e7c17e263180_46_4.png)


    # STEP 10


    When combining integers and floats Python usually converts the integer to a float,
    but should the reverse ever be applied it''s worth remembering that Python doesn''t
    return the exact value. When converting a float to an integer, Python will always
    round down to the nearest integer, called truncating; in our case instead of 19.99
    it becomes 19.


    ![](img/e4c529ac6a286a7773e0e7c17e263180_46_5.png)'
- md: "# User Input\n\nWe’ve seen some basic user interaction with the code from a\
    \ few of the examples earlier, so now would be a good time to focus solely on\
    \ how you would get information from the user then store and present it.\n\n#\
    \ USER FRIENDLY\n\nThe type of input you want from the user will depend greatly\
    \ on the type of program you’re coding. For example, a game may ask for a character’s\
    \ name, whereas a database can ask for personal details.\n\n# STEP 1\n\nIf it’s\
    \ not already, open the Python 3 IDLE Shell, and start a New File in the Editor.\
    \ Let’s begin with something really simple, enter:\n\n```\nprint(\"Hello\")\n\
    firstname=input(\"What is your first name? \")\nprint(\"Thanks.\")\nsurname=input(\"\
    And what is your surname? \")\n```\n\n![](img/e4c529ac6a286a7773e0e7c17e263180_47_0.png)\n\
    \n# STEP 2\n\nSave and execute the code, and as you already no doubt suspected,\
    \ in the IDLE Shell the program will ask for your first name, storing it as the\
    \ variable firstname, followed by your surname; also stored in its own variable\
    \ (surname).\n\n![](img/e4c529ac6a286a7773e0e7c17e263180_47_1.png)\n\n# STEP 3\n\
    \nNow that we have the user’s name stored in a couple of variables we can call\
    \ them up whenever we want:\n\n```\nprint(\"Welcome\", firstname, surname, \"\
    . I hope you’re well today.\")\n```\n\n![](img/e4c529ac6a286a7773e0e7c17e263180_47_2.png)\n\
    \n# STEP 4\n\nRun the code and you can see a slight issue, the full stop after\
    \ the surname follows a blank space. To eliminate that we can add a plus sign\
    \ instead of the comma in the code:\n\n```\nprint(\"Welcome\", firstname, surname+\"\
    . I hope you’re well today.\")\n```\n\n![](img/e4c529ac6a286a7773e0e7c17e263180_47_3.png)\n\
    \n# STEP 5\n\nYou don't always have to include quoted text within the input command.\
    \ For example, you can ask the user their name, and have the input in the line\
    \ below:\n\n```\nprint(\"Hello. What's your name?\")\nname=input()\n```\n\n![](img/e4c529ac6a286a7773e0e7c17e263180_48_0.png)\n\
    \n# STEP 6\n\nThe code from the previous step is often regarded as being a little\
    \ neater than having a lengthy amount of text in the input command, but it's not\
    \ a rule that's set in stone, so do as you like in these situations. Expanding\
    \ on the code, try this:\n\n```\nprint(\"Halt! Who goes there?\")\nname=input()\n\
    ```\n\n![](img/e4c529ac6a286a7773e0e7c17e263180_48_2.png)\n\n# STEP 7\n\nIt's\
    \ a good start to a text adventure game, perhaps? Now you can expand on it and\
    \ use the raw input from the user to flesh out the game a little:\n\n```\nif name==\"\
    David\":\n    print(\"Welcome, good sir. You may pass.\")\nelse:\n    print(\"\
    I know you not. Prepare for battle!\")\n```\n\n![](img/e4c529ac6a286a7773e0e7c17e263180_48_4.png)\n\
    \n# STEP 8\n\nWhat you've created here is a condition, which we will cover soon.\
    \ In short, we're using the input from the user and measuring it against a condition.\
    \ So, if the user enters David as their name, the guard will allow them to pass\
    \ unhindered. Else, if they enter a name other than David, the guard challenges\
    \ them to a fight.\n\n![](img/e4c529ac6a286a7773e0e7c17e263180_48_1.png)\n\n#\
    \ STEP 9\n\nJust as you learned previously, any input from a user is automatically\
    \ a string, so you need to apply a TypeCast in order to turn it into something\
    \ else. This creates some interesting additions to the input command. For example:\n\
    \n```\n# Code to calculate rate and distance\nprint(\"Input a rate and a distance\"\
    )\nrate = float(input(\"Rate: \"))\n```\n\n![](img/e4c529ac6a286a7773e0e7c17e263180_48_3.png)\n\
    \n# STEP 10\n\nTo finalise the rate and distance code, we can add:\n\n```\ndistance\
    \ = float(input(\"Distance: \"))\nprint(\"Time:\", (distance / rate))\n```\n\n\
    Save and execute the code and enter some numbers. Using the float(input) element,\
    \ we've told Python that anything entered is a floating point number rather than\
    \ a string.\n\n![](img/e4c529ac6a286a7773e0e7c17e263180_48_5.png)\n\n# Hello,\
    \ World\n\n# # Creating Functions\n\nNow that you’ve mastered the use of variables\
    \ and user input, the next step is to tackle functions. You’ve already used a\
    \ few functions, such as the print command but Python enables you to define your\
    \ own functions.\n\n# ## FUNKY FUNCTIONS\n\nA function is a command that you enter\
    \ into Python to do something. It’s a little piece of self-contained code that\
    \ takes data, works on it and then returns the result.\n\n# ### STEP 1\n\nIt’s\
    \ not just data that a function works on. They can do all manner of useful things\
    \ in Python, such as sort data, change items from one format to another and check\
    \ the length or type of items. Basically, a function is a short word that’s followed\
    \ by brackets. For example, `len()`, `list()` or `type()`.\n\n![](img/e4c529ac6a286a7773e0e7c17e263180_49_0.png)\n\
    \n# ### STEP 2\n\nA function takes data, usually a variable, works on it depending\
    \ on what the function is programmed to do and returns the end value. The data\
    \ being worked on goes inside the brackets, so if you wanted to know how many\
    \ letters are in the word antidisestablishmentarianism, then you’d enter: `len(\"\
    antidisestablishmentarianism\")` and the number 28 would return.\n\n![](img/e4c529ac6a286a7773e0e7c17e263180_49_1.png)\n\
    \n# ### STEP 3\n\nYou can pass variables through functions in much the same manner.\
    \ Let’s assume you want the number of letters in a person’s surname, you could\
    \ use the following code (enter the text editor for this example):\n\n```\nname=input\
    \ (\"Enter your surname: \")\ncount=len(name)\nprint (\"Your surname has\", count,\
    \ \"letters in it.\")\n```\n\nPress F5 and save the code to execute it.\n\n![](img/e4c529ac6a286a7773e0e7c17e263180_49_2.png)\n\
    \n# ### STEP 4\n\nPython has tens of functions built into it, far too many to\
    \ get into in the limited space available here. However, to view the list of built-in\
    \ functions available to Python 3, navigate to www.docs.python.org/3/library/functions.html.\
    \ These are the predefined functions, but since users have created many more,\
    \ they’re not the only ones available.\n\n![](img/e4c529ac6a286a7773e0e7c17e263180_49_3.png)\n\
    \n# Creating Functions\n\n## STEP 5\n\nAdditional functions can be added to Python\
    \ through modules. Python has a vast range of modules available that can cover\
    \ numerous programming duties. They add functions and can be imported as and when\
    \ required. For example, to use advanced mathematics functions enter:\n\nOnce\
    \ entered, you have access to all the Math module functions.\n\n```\nimport math\n\
    ```\n\n![](img/e4c529ac6a286a7773e0e7c17e263180_50_0.png)\n\n## STEP 6\n\nTo use\
    \ a function from a module enter the name of the module followed by a full stop,\
    \ then the name of the function. For instance, using the Math module, since you’ve\
    \ just imported it into Python, you can utilise the square root function. To do\
    \ so, enter:\n\nYou can see that the code is presented as module.function(data).\n\
    \n```\nmath.sqrt(16)\n```\n\n![](img/e4c529ac6a286a7773e0e7c17e263180_50_1.png)\n\
    \n# ## FORGING FUNCTIONS\n\nThere are many different functions you can import\
    \ created by other Python programmers and you will undoubtedly come across some\
    \ excellent examples in the future; you can also create your own with the def\
    \ command.\n\n## STEP 1\n\nChoose File > New File to enter the editor, let’s create\
    \ a function called Hello, that greets a user. Enter:\n\nPress F5 to save and\
    \ run the script. You can see Hello in the Shell, type in Hello() and it returns\
    \ the new function.\n\n```\ndef Hello():\n    print(\"Hello\")\n\nHello()\n```\n\
    \n![](img/e4c529ac6a286a7773e0e7c17e263180_50_2.png)\n\n## STEP 2\n\nLet’s now\
    \ expand the function to accept a variable, the user’s name for example. Edit\
    \ your script to read:\n\nThis will now accept the variable name, otherwise it\
    \ prints Hello David. In the Shell, enter: name=(\"Bob\"), then: Hello(name).\
    \ Your function can now pass variables through it.\n\n```\ndef Hello(name):\n\
    \    print(\"Hello\", name)\n\nHello(\"David\")\n```\n\n![](img/e4c529ac6a286a7773e0e7c17e263180_50_3.png)\n\
    \n## STEP 3\n\nTo modify it further, delete the Hello(\"David\") line, the last\
    \ line in the script and press Ctrl+S to save the new script. Close the Editor\
    \ and create a new file (File > New File). Enter the following:\n\nPress F5 to\
    \ save and execute the code.\n\n```\nfrom Hello import Hello\n\nHello(\"David\"\
    )\n```\n\n![](img/e4c529ac6a286a7773e0e7c17e263180_50_4.png)\n\n## STEP 4\n\n\
    What you’ve just done is import the Hello function from the saved Hello.py program\
    \ and then used it to say hello to David. This is how modules and functions work:\
    \ you import the module then use the function. Try this one, and modify it for\
    \ extra credit:\n\n```\ndef add(a, b):\n    result = a + b\n    return result\n\
    ```\n\n![](img/e4c529ac6a286a7773e0e7c17e263180_50_5.png)"
  mdcn: "# 用户输入\n\n我们在前面的一些示例中已经见过一些与代码进行基本用户交互的例子，所以现在很适合专注于如何从用户那里获取信息，然后将其存储和呈现出来。\n\
    \n# 用户友好\n\n你想要从用户那里获取的输入类型将很大程度上取决于你正在编写的程序类型。例如，游戏角色可能会询问角色名字，而数据库可能会询问个人详细信息。\n\
    \n# 步骤 1\n\n如果尚未打开，请打开 Python 3 IDLE Shell，并在编辑器中新建一个文件。让我们从一个非常简单的例子开始，输入：\n\n\
    ```\nprint(\"Hello\")\nfirstname=input(\"What is your first name? \")\nprint(\"\
    Thanks.\")\nsurname=input(\"And what is your surname? \")\n```\n\n![](img/e4c529ac6a286a7773e0e7c17e263180_47_0.png)\n\
    \n# 步骤 2\n\n保存并执行代码，正如你无疑已经猜到的那样，IDLE Shell 中的程序会询问你的名字，并将其存储为变量 `firstname`，接着是你的姓氏；同样存储在其自身的变量（`surname`）中。\n\
    \n![](img/e4c529ac6a286a7773e0e7c17e263180_47_1.png)\n\n# 步骤 3\n\n现在，我们已经将用户的名字存储在几个变量中，我们可以随时调用它们：\n\
    \n```\nprint(\"Welcome\", firstname, surname, \". I hope you’re well today.\"\
    )\n```\n\n![](img/e4c529ac6a286a7773e0e7c17e263180_47_2.png)\n\n# 步骤 4\n\n运行代码，你可以看到一个小问题：姓氏后面的句点紧跟在一个空格后面。为了消除这个问题，我们可以在代码中用加号代替逗号：\n\
    \n```\nprint(\"Welcome\", firstname, surname+\". I hope you’re well today.\")\n\
    ```\n\n![](img/e4c529ac6a286a7773e0e7c17e263180_47_3.png)\n\n# 步骤 5\n\n你并不总是需要在\
    \ `input` 命令中包含带引号的文本。例如，你可以询问用户的名字，然后在下一行输入：\n\n```\nprint(\"Hello. What's your\
    \ name?\")\nname=input()\n```\n\n![](img/e4c529ac6a286a7773e0e7c17e263180_48_0.png)\n\
    \n# 步骤 6\n\n上一步中的代码通常被认为比在 `input` 命令中放置大量文本要简洁一些，但这并非一成不变的规则，所以在这些情况下你可以随心所欲。扩展一下代码，试试这个：\n\
    \n```\nprint(\"Halt! Who goes there?\")\nname=input()\n```\n\n![](img/e4c529ac6a286a7773e0e7c17e263180_48_2.png)\n\
    \n# 步骤 7\n\n这或许是一个文字冒险游戏不错的开端？现在你可以扩展它，并使用用户的原始输入来稍微充实一下游戏：\n\n```\nif name==\"\
    David\":\n    print(\"Welcome, good sir. You may pass.\")\nelse:\n    print(\"\
    I know you not. Prepare for battle!\")\n```\n\n![](img/e4c529ac6a286a7773e0e7c17e263180_48_4.png)\n\
    \n# 步骤 8\n\n你在这里创建的是一个条件判断，我们很快会介绍它。简而言之，我们正在使用用户的输入并将其与一个条件进行衡量。所以，如果用户输入 `David`\
    \ 作为名字，守卫就会允许他们畅通无阻地通过。否则，如果他们输入一个不是 `David` 的名字，守卫就会挑战他们进行战斗。\n\n![](img/e4c529ac6a286a7773e0e7c17e263180_48_1.png)\n\
    \n# 步骤 9\n\n正如你之前所学，来自用户的任何输入自动都是字符串，因此你需要应用**类型转换**才能将其转换为其他类型。这为 `input` 命令添加了一些有趣的扩展。例如：\n\
    \n```\n# Code to calculate rate and distance\nprint(\"Input a rate and a distance\"\
    )\nrate = float(input(\"Rate: \"))\n```\n\n![](img/e4c529ac6a286a7773e0e7c17e263180_48_3.png)\n\
    \n# 步骤 10\n\n为了完成速率和距离的代码，我们可以添加：\n\n```\ndistance = float(input(\"Distance: \"\
    ))\nprint(\"Time:\", (distance / rate))\n```\n\n保存并执行代码，然后输入一些数字。使用 `float(input)`\
    \ 元素，我们告诉 Python 输入的任何内容都是一个浮点数而不是字符串。\n\n![](img/e4c529ac6a286a7773e0e7c17e263180_48_5.png)\n\
    \n# 你好，世界\n\n# # 创建函数\n\n既然你已经掌握了变量和用户输入的用法，下一步就是处理函数。你已经使用过一些函数，比如 `print` 命令，但\
    \ Python 允许你定义自己的函数。\n\n# ## 奇特的函数\n\n函数是你输入到 Python 中以执行某项操作的命令。它是一小段自包含的代码，接收数据，对其进行处理，然后返回结果。\n\
    \n# ### 步骤 1\n\n函数处理的不仅仅是数据。它们可以在 Python 中完成各种有用的事情，比如排序数据、将项目从一种格式转换为另一种格式，以及检查项目的长度或类型。基本上，函数是一个简短的单词，后面跟着括号。例如，`len()`、`list()`\
    \ 或 `type()`。\n\n![](img/e4c529ac6a286a7773e0e7c17e263180_49_0.png)\n\n# ### 步骤\
    \ 2\n\n函数接收数据（通常是一个变量），根据函数的编程逻辑对其进行处理，并返回最终值。被处理的数据放在括号内，所以如果你想知道单词 `antidisestablishmentarianism`\
    \ 有多少个字母，你可以输入：`len(\"antidisestablishmentarianism\")`，数字 28 就会返回。\n\n![](img/e4c529ac6a286a7773e0e7c17e263180_49_1.png)\n\
    \n# ### 步骤 3\n\n你可以以类似的方式将变量传递给函数。假设你想知道一个人姓氏中的字母数，你可以使用以下代码（本例中请输入文本编辑器）：\n\n\
    ```\nname=input (\"Enter your surname: \")\ncount=len(name)\nprint (\"Your surname\
    \ has\", count, \"letters in it.\")\n```\n\n按 F5 并保存代码来执行它。\n\n![](img/e4c529ac6a286a7773e0e7c17e263180_49_2.png)\n\
    \n# ### 步骤 4\n\nPython 内置了数十个函数，多到无法在有限的篇幅中全部介绍。但是，要查看 Python 3 可用的内置函数列表，请导航至\
    \ www.docs.python.org/3/library/functions.html。这些是预定义的函数，但由于用户创建了更多函数，它们并不是唯一可用的。\n\
    \n![](img/e4c529ac6a286a7773e0e7c17e263180_49_3.png)\n\n# 创建函数\n\n## 步骤 5\n\n\
    可以通过模块为 Python 添加额外的函数。Python 有大量可用的模块，可以涵盖众多编程任务。它们添加函数，并可根据需要导入。例如，要使用高级数学函数，请输入：\n\
    \n输入后，你就可以使用 Math 模块的所有函数了。\n\n```\nimport math\n```\n\n![](img/e4c529ac6a286a7773e0e7c17e263180_50_0.png)\n\
    \n## 步骤 6\n\n要使用模块中的函数，请输入模块名称，后跟一个句点，然后是函数名称。例如，使用 Math 模块（因为你刚刚将其导入到 Python\
    \ 中），你可以利用平方根函数。为此，请输入：\n\n你可以看到代码呈现为 `module.function(data)` 的形式。\n\n```\nmath.sqrt(16)\n\
    ```\n\n![](img/e4c529ac6a286a7773e0e7c17e263180_50_1.png)\n\n# ## 自定义函数\n\n你可以导入许多由其他\
    \ Python 程序员创建的不同函数，你将来无疑会遇到一些优秀的示例；你也可以使用 `def` 命令创建自己的函数。\n\n## 步骤 1\n\n选择 **文件\
    \ > 新建文件** 进入编辑器，让我们创建一个名为 `Hello` 的函数，用于向用户问好。输入：\n\n按 F5 保存并运行脚本。你可以在 Shell\
    \ 中看到 `Hello`，输入 `Hello()`，它就会返回这个新函数。\n\n```\ndef Hello():\n    print(\"Hello\"\
    )\n\nHello()\n```\n\n![](img/e4c529ac6a286a7773e0e7c17e263180_50_2.png)\n\n##\
    \ 步骤 2\n\n现在让我们扩展这个函数以接受一个变量，例如用户名。编辑你的脚本，使其如下：\n\n这将接受变量 `name`，否则它会打印 `Hello\
    \ David`。在 Shell 中，输入：`name=(\"Bob\")`，然后输入：`Hello(name)`。你的函数现在可以通过它传递变量了。\n\n\
    ```\ndef Hello(name):\n    print(\"Hello\", name)\n\nHello(\"David\")\n```\n\n\
    ![](img/e4c529ac6a286a7773e0e7c17e263180_50_3.png)\n\n## 步骤 3\n\n要进一步修改，删除 `Hello(\"\
    David\")` 这一行（脚本中的最后一行），然后按 Ctrl+S 保存新脚本。关闭编辑器并创建一个新文件（**文件 > 新建文件**）。输入以下内容：\n\
    \n按 F5 保存并执行代码。\n\n```\nfrom Hello import Hello\n\nHello(\"David\")\n```\n\n![](img/e4c529ac6a286a7773e0e7c17e263180_50_4.png)\n\
    \n## 步骤 4\n\n你刚才做的是从保存的 `Hello.py` 程序中导入 `Hello` 函数，然后用它向 David 问好。这就是模块和函数的工作方式：你导入模块，然后使用函数。试试这个，并为获得额外加分而修改它：\n\
    \n```\ndef add(a, b):\n    result = a + b\n    return result\n```\n\n![](img/e4c529ac6a286a7773e0e7c17e263180_50_5.png)"
