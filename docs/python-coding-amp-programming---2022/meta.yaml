    GPS、超级计算机、物联网设备以及树莓派中找到。美国宇航局（NASA）在控制中心和国际空间站（ISS）上都使用它。Linux 服务器支撑着互联网的骨干网络，以及你日常访问的大多数网站。Android
    使用了 Linux 内核的组件，机顶盒、游戏机，甚至你的冰箱、冰柜、烤箱和洗衣机也都是如此。


    Linux 不仅仅是一个免费使用的操作系统。它稳定、强大且快速，易于定制，并且只需要很少的维护。然而，它远不止是性能数据；Linux 意味着摆脱其他操作系统“围墙花园”式的方法。它是一个充满活力的社区，由志同道合的个体组成，他们希望从自己的计算机中获得更多，而不受价格或统一性的束缚。Linux
    意味着选择。


    在树莓派上，Raspbian 是首选的 Linux 发行版。


    ![](img/e4c529ac6a286a7773e0e7c17e263180_138_2.png)


    ## 使用文件系统


    要精通 Linux，理解文件系统的工作方式非常重要。此外，熟悉终端或 Shell 也很重要。这个命令行环境起初可能看起来令人望而生畏，但经过练习，它很快就会变得易于使用。


    ### 导航


    要进入终端，请点击树莓派桌面顶部从左数第四个图标，即带有向右箭头和下划线的那个。这就是 Shell 或终端。


    ```

    bash

    pi@raspberrypi:~ $ pwd

    /home/pi

    pi@raspberrypi:~ $

    ```


    首先，你将了解目录和目录路径。目录与文件夹是同一回事，但在 Linux 中它始终被称为目录。它们使用“/”字符相互嵌套放置。因此，当你看到 /home/pi
    时，这意味着 pi 目录在 home 目录内部。输入：clear 并按回车键以清屏。现在输入：pwd。这代表打印工作目录（Print Working Directory），并显示
    /home/pi。


    ```

    bash

    pi@raspberrypi ~ $ pwd

    /home/pi

    pi@raspberrypi ~ $ ls

    Desktop Documents Downloads exit indiecity python_games Scratch

    pi@raspberrypi ~ $

    ```


    输入：ls 以查看当前目录的内容。你应该能看到蓝色的 Desktop、Documents、Downloads 和 Scratch。根据你使用树莓派的频率，还可能看到其他项目。颜色代码值得了解：目录是蓝色的，而大多数文件是白色的。随着学习的深入，你会看到其他颜色：可执行文件（程序）是亮绿色的，归档文件是红色的，等等。蓝色和白色是入门时需要了解的两种颜色。


    ```

    bash

    pi@raspberrypi ~ $ pwd

    /home/pi

    pi@raspberrypi ~ $

    ```


    当你登录树莓派时，你并不是从硬盘驱动器的底部开始，即所谓的“root”（也称为最顶层目录）。相反，你从用户目录内部开始，默认情况下该目录名为“pi”，而它本身位于名为“home”的目录中。目录由“/”符号指示。因此，“/home/pi”告诉你，在根目录中有一个名为
    home 的目录，下一个“/”表示在“home”内部有一个名为“pi”的目录。这就是你的起始位置。


    ```

    bash

    pi@raspberrypi ~ $ pwd

    /home/pi

    pi@raspberrypi ~ $ ls

    Desktop Documents Downloads exit indiecity python_games Scratch

    pi@raspberrypi ~ $ cd Documents

    pi@raspberrypi ~/Documents $ pwd

    /home/pi/Documents

    pi@raspberrypi ~/Documents $ ls

    Amber  archive.tar  Crypto101.pdf  dog_jump  euro  fizzbang_backup.py  fizzbang.py  nds

    pi@raspberrypi ~/Documents $ _

    ```


    现在你将从 pi 目录移动到 Documents 目录。输入：cd Documents。注意大写的“D”。Linux 区分大小写，这意味着你必须输入完全正确的名称，包括正确的大写字母。cd
    命令代表切换目录（change directory）。现在再次输入：pwd 以查看目录路径。它将显示 /home/pi/Documents。输入：ls 以查看
    Documents 目录内的文件。


    步骤 5 如何回到 pi 目录？使用命令“cd ..”。在 Linux 中，两个点表示上一级目录，也称为父目录。顺便一提，单个点“.”用于表示当前目录。你永远不会使用“cd
    .”来切换到当前目录，但了解这一点很有价值，因为有些命令需要你指定当前目录。


    步骤 6 “ls”和“cd”命令也可以与更复杂的路径一起使用。输入：`ls Documents/Pictures` 以查看 Documents 目录内 Pictures
    目录的内容。你可以使用 `cd Documents/Pictures` 切换到此目录；使用 `cd ../..` 可以向上移动两级父目录。


    ```

    pi@raspberrypi ~/Documents $ pwd

    /home/pi/Documents

    pi@raspberrypi ~/Documents $ cd ..

    pi@raspberrypi ~ $ pwd

    /home/pi

    pi@raspberrypi ~ $

    ```


    ```

    pi@raspberrypi ~ $ ls Documents/Pictures

    BDM-Web-logo-dark1.jpg  David Hayward.jpg  raspberry_pi_2_photographs

    pi@raspberrypi ~ $ cd Documents/Pictures

    pi@raspberrypi ~/Documents/Pictures $ pwd

    /home/pi/Documents/Pictures

    pi@raspberrypi ~/Documents/Pictures $ cd ../..

    pi@raspberrypi ~ $ pwd

    /home/pi

    pi@raspberrypi ~ $

    ```


    ### 绝对路径与相对路径


    了解工作目录、根目录和 home 目录之间的区别非常重要。路径也有两种类型：绝对路径和相对路径。它们比听起来更容易理解。让我们来看一下……


    步骤 1 默认情况下，像“ls”这样的命令使用工作目录。这是你当前正在查看的目录，默认设置为你的 home 目录（/users/pi）。使用“pwd”（打印工作目录）可以让你知道当前的工作目录是什么，而使用“cd”则可以更改工作目录。


    步骤 2 根目录始终是‘/’。输入 `ls /` 会列出根目录的内容，输入：`cd /` 会切换到根目录。这很重要，因为“ls Documents/Pictures”和“ls
    /Documents/Pictures”是有区别的。第一个命令列出工作目录（如果你在 home 目录中，它会正常工作）内 Documents 目录中的 Pictures
    目录的内容。


    步骤 3 第二个命令（“ls /Documents/Pictures”）尝试列出根目录内 Documents 目录（因为路径以‘/’开头，即根目录）中 Pictures
    目录的内容。根目录中通常没有 Documents 目录，因此你会收到“没有此类文件或目录”的错误。以‘/’开头的路径称为“绝对路径”，而不以‘/’开头的路径称为“相对路径”，因为它相对于你的工作目录。


    ```

    pi@raspberrypi ~ $ pwd

    /home/pi

    pi@raspberrypi ~ $

    ```


    ```

    pi@raspberrypi ~ $ ls /

    bin  boot  dev  etc  home  lib  lost+found  media  mnt  opt  proc  ...

    pi@raspberrypi ~ $ ls /Documents/Pictures

    ls: cannot access /Documents/Pictures: No such file or directory

    pi@raspberrypi ~ $

    ```


    步骤 4 还有一个指向用户目录的绝对路径快捷方式，即波浪号“~”字符。输入：`ls ~` 总是列出你的 home 目录的内容，而“cd ~”会直接移动到你的
    home 目录，无论你当前的工作目录是什么。你也可以在任何地方使用这个快捷方式：输入：`ls ~/Documents/Pictures` 以显示 Pictures
    的内容。


    ```

    pi@raspberrypi:~ $ pwd

    /home/pi

    pi@raspberrypi:~ $ ls Documents/Pictures

    BDM-Web-logo-dark1.jpg  David Hayward.jpg  RPi.png

    pi@raspberrypi:~ $

    ```


    ```

    pi@raspberrypi:~ $ cd ~

    pi@raspberrypi:~ $ pwd

    /home/pi

    pi@raspberrypi:~ $ ls ~/Documents/Pictures

    BDM-Web-logo-dark1.jpg  David Hayward.jpg  RPi.png

    pi@raspberrypi:~ $

    ```'
