    ## 列出和移动文件


    ### 步骤 5

    下一个数字与文件大小相关，单位是字节。在Linux中，每个文本文件由字母组成，每个字母占用一个字节，所以我们的`names.txt`文件有37个字节，文档中有37个字符。文件和目录可能非常大且难以确定，因此使用`ls
    -lh`。“h”参数使数字人性化，更易于阅读。


    ```

    pi@raspberrypi ~ $ ls -l

    total 44K

    drwxr-xr-x  7 pi pi 4.0K May 11 21:15 .

