    ## SHELL


    Linux Shell 是一个命令行界面环境，Linux 用户可以使用它向操作系统发送直接影响系统的命令。在 Shell 中，你可以添加新用户、重启系统、创建和删除文件与文件夹，以及执行更多操作。BASH（Bourne
    Again Shell）是 Linux 中最常用的 Shell，尽管还有更多其他选择。Shell 也被称为终端（Terminal），在本书的这一部分中，你将通过它来完成所有操作。


