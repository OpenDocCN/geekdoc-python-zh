    \ SMP PREEMPT Thu Feb 12 17:14:31 GMT 2015 armv7l GNU/Linux\npi@raspberrypi ~\
    \ $ _\n```\n\n### 第五步\n\n输入：`vcgencmd measure_temp` 查看树莓派当前的操作系统温度。输入：`vcgencmd\
    \ get_mem arm` 查看可用的 RAM，`vcgencmd get_mem gpu` 查看图形芯片可用的内存。最后试试 `lsusb` 查看连接的\
    \ USB 设备列表。\n\n```\npi@raspberrypi ~ $ vcgencmd measure_temp\ntemp=46.1'C\npi@raspberrypi\
    \ ~ $ vcgencmd get_mem arm\narm=800M\npi@raspberrypi ~ $ vcgencmd get_mem gpu\n\
    gpu=16M\npi@raspberrypi ~ $ lsusb\nBus 001 Device 002: ID 0424:9514 Standard Microsystems\
    \ Corp.\nBus 001 Device 001: ID 1d6b:0002 Linux Foundation 2.0 root hub\nBus 001\
    \ Device 003: ID 0424:ec00 Standard Microsystems Corp.\nBus 001 Device 004: ID\
    \ 0499:1503 Holtek Semiconductor, Inc. Shortboard Lefty\nBus 001 Device 005: ID\
    \ 1a40:0101 Terminus Technology Inc. 4-Port HUB\nBus 001 Device 006: ID 276d:1105\n\
    pi@raspberrypi ~ $\n```\n\n### 第六步\n\n你可能想知道的一个命令是如何从命令行关闭或重启树莓派。不要直接按电源开关。输入：`sudo\
    \ shutdown -h now` 关闭树莓派（“-h”选项代表“halt”），或输入：`sudo shutdown -r now` 重启树莓派。\n\n\
    ```\npi@raspberrypi ~ $ sudo shutdown -r now\n\nBroadcast message from root@raspberrypi\
    \ (tty1) (Thu May 14 12:20:29 2015):\nThe system is going down for reboot NOW!\n\
    ```\n\n## 磁盘命令\n\n学习两个命令，它们使你能够查看磁盘空间和其上的文件：`df`（磁盘空闲空间）和 `du`（磁盘使用情况）。通过这两个命令，你可以查看\
    \ SD 卡上的文件使用情况。\n\n### 第一步\n\n首先在命令行输入：`df`。它返回 SD 卡上包含的卷列表。你可能会想知道什么是卷。最好将你的\
    \ SD 卡视为驱动器。这包含分区，分区是将一个驱动器分割以充当两个或多个驱动器的方式。每个分区可以包含卷，卷是存储空间。\n\n```\npi@raspberrypi\
    \ ~ $ df\nFilesystem     1K-blocks    Used Available Use% Mounted on\nrootfs \
    \         6581636 3408164   2749096  56% /\n/dev/root       6581636 3408164  \
    \ 2749096  56% /\ndevtmpfs          428700       0    428700   0% /dev\ntmpfs\
    \              80432     260     80172   1% /run\ntmpfs               5120   \
    \    0      5120   0% /run/lock\ntmpfs             176860       0    176860  \
    \ 0% /run/shm\n/dev/mmcblk0p5    60479   14536     45943  25% /boot\npi@raspberrypi\
    \ ~ $\n```\n\n### 第二步\n\n输入：`df -h` 获取人类可读形式的列表。前两行应该是 “rootfs” 和 “/dev/root”，并且具有匹配的大小、已用、可用和使用百分比列表。这是主驱动器，表示你在\
    \ Raspbian 操作系统上已使用和可用的空间。其他卷用于启动和初始化设备（你现在可以忽略这些）。\n\n```\npi@raspberrypi ~ $\
    \ df -h\nFilesystem      Size  Used Avail Use% Mounted on\nrootfs          6.3G\
    \  3.4G  2.7G  56% /\n/dev/root       6.3G  3.4G  2.7G  56% /\ndevtmpfs      \
    \  428M     0  428M   0% /dev\ntmpfs            87M  260K   87M   1% /run\ntmpfs\
    \           5.0M     0  5.0M   0% /run/lock\ntmpfs           173M     0  173M\
    \   0% /run/shm\n/dev/mmcblk0p5   60M   15M   43M  25% /boot\npi@raspberrypi ~\
    \ $\n```\n\n### 第三步\n\n现在输入：`du`。你应该会看到大量文本飞速闪过屏幕。这是你的主目录及其子目录中包含的文件的磁盘使用情况。与\
    \ `df` 类似，最好使用带 “-h” 选项的 `du` 以使输出人性化。如果你想减慢输出速度，还需要将其通过 `less` 管道传递。输入：`du -h\
    \ | less` 逐页查看文件及其各自的使用情况。\n\n```\npi@raspberrypi ~ $ du -h | less\n22M     ./.minecraft/games/com.mojang/minecraftWorlds/world\n\
    22M     ./.minecraft/games/com.mojang/minecraftWorlds\n22M     ./.minecraft/games/com.mojang\n\
    22M     ./.minecraft/games\n4.0K    ./.pulse\n16K     ./.config/gedit\n8.0K  \
    \  ./.config/libfm\n1.4M    ./.config/epiphany/adblock\n12M     ./.config/epiphany\n\
    8.0K    ./.config/lxsession/LXDE-pi\n12K     ./.config/lxsession\n8.0K    ./.config/dconf\n\
    8.0K    ./.config/rncb.org\n8.0K    ./.config/lxterminal\n8.0K    ./.config/uk.ac.cam.cl\n\
    8.0K    ./.config/inflexcity\n8.0K    ./.config/handbrake\n```\n\n### 第四步\n\n\
    通常你不会单独输入：`du`；大多数时候你想查看特定目录的磁盘使用情况。输入：`du -h python_games` 查看 `python_games`\
    \ 目录（与 Raspbian 一起安装）占用多少空间。应该是 1.8M。如果你想查看更全面的文件分解，请使用 “-a” 选项（all）。输入：`du -ha\
    \ python_games` 查看所有包含的文件及其磁盘使用情况。\n\n```\npi@raspberrypi ~ $ ls\nDownloads  inflexity\
    \  people  python_games  Scratch  testfile\npi@raspberrypi ~ $ du -h python_games\n\
    1.8M    python_games\npi@raspberrypi ~ $ du -ha python_games\n12K     python_games/RedSelector.png\n\
