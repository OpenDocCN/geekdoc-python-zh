  md: "# Vertically Scrolling Text\n\n```\nclass Credits:\n    def __init__(self,\
    \ screen_rect, lst):\n        self.srect = screen_rect\n        self.lst = lst\n\
    \        self.size = 16\n        self.color = (255,0,0)\n        self.buff_centery\
    \ = self.srect.height/2 + 5\n        self.buff_lines = 50\n        self.timer\
    \ = 0.0\n        self.delay = 0\n        self.make_surfaces()\n\n    def make_text(self,message):\n\
    \        font = pg.font.SysFont('Arial', self.size)\n        text = font.render(message,True,self.color)\n\
    \        rect = text.get_rect(center = (self.srect.centerx, self.srect.centery\
    \ + self.buff_centery) )\n        return text,rect\n\n    def make_surfaces(self):\n\
    \        self.text = []\n        for i, line in enumerate(self.lst):\n       \
    \     l = self.make_text(line)\n            l[1].y += i*self.buff_lines\n    \
    \        self.text.append(l)\n\n    def update(self):\n        if pg.time.get_ticks()-self.timer\
    \ > self.delay:\n            self.timer = pg.time.get_ticks()\n            for\
    \ text, rect in self.text:\n                rect.y -= 1\n\n    def render(self,\
    \ surf):\n        for text, rect in self.text:\n            surf.blit(text, rect)\n\
    \nscreen = pg.display.set_mode((800,600))\nscreen_rect = screen.get_rect()\nclock\
    \ = pg.time.Clock()\nrunning=True\ncred = Credits(screen_rect, text_list)\n\n\
    while running:\n    for event in pg.event.get():\n        if event.type == QUIT:\n\
    \            running = False\n    screen.fill((0,0,0))\n    cred.update()\n  \
    \  cred.render(screen)\n    pg.display.update()\n    clock.tick(60)\n```\n\n#\
    \ A Long Time Ago...\n\nThe obvious main point of enhancement is the actual text\
    \ itself. Replace it with a list of credits, or an equally epic opening storyline\
    \ to your Python game, and it will certainly hit the mark with whoever plays it.\
    \ Don't forget to change the screen resolution if needed; we're currently running\
    \ it at 800 x 600.\n\n![](img/e4c529ac6a286a7773e0e7c17e263180_124_0.png)\n\n\
    ![](img/e4c529ac6a286a7773e0e7c17e263180_124_1.png)"
