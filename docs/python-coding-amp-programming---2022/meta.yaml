    # STEP 5


    To expand this code, you can reopen the file using ''a'', for access or append
    mode. This will add any text at the end of the original line instead of wiping
    the file and creating a new one. For example:


    ```


    t=open("/home/pi/Documents/text.txt","a")

    t.write("\n")

    t.write(" You stand and survey your surroundings. On top of the table is some
    meat, and a cup of water.\n")


    ```


    ![](img/e4c529ac6a286a7773e0e7c17e263180_78_0.png)


    # STEP 6


    You can keep extending the text line by line, ending each with a new line (\n).
    When you''re done, finish the code with t.close() and open the file in a text
    editor to see the results:


    ```


    t.write("The door is made of solid oak with iron strips. It''s bolted from the
    outside, locking you in. You are a prisoner!.\n")

    t.close()


    ```


    ![](img/e4c529ac6a286a7773e0e7c17e263180_78_1.png)


    # STEP 7


    There are various types of file access to consider using the open() function.
    Each depends on how the file is accessed and even the position of the cursor.
    For example, r+ opens a file in read and write and places the cursor at the start
    of the file.


    ![](img/e4c529ac6a286a7773e0e7c17e263180_78_2.png)


    # STEP 8


    You can pass variables to a file that you''ve created in Python. Perhaps you want
    the value of Pi to be written to a file. You can call Pi from the Math module,
    create a new file and pass the output of Pi into the new file:


    ```


    import math

    print("Value of Pi is: ",math.pi)

    print("\nWriting to a file now...")


    ```


    ![](img/e4c529ac6a286a7773e0e7c17e263180_78_3.png)


    # STEP 9


    Now let''s create a variable called pi and assign it the value of Pi:


    pi=math.pi


    You also need to create a new file in which to write Pi to:

    t=open("/home/pi/Documents/pi.txt","w")


    Remember to change your file location to your own particular system setup.


    ![](img/e4c529ac6a286a7773e0e7c17e263180_78_4.png)


    # STEP 10


    To finish, you can use string formatting to call the variable and write it to
    the file, then commit the changes and close the file:


    t.write("Value of Pi is: {}".format(pi))

    t.close()


    You can see from the results that you''re able to pass any variable to a file.


    ![](img/e4c529ac6a286a7773e0e7c17e263180_78_5.png)'
  - '[PAGE 79]


    # Exceptions


    When coding, you’ll naturally come across some issues that are out of your control.
    Let’s assume you ask a user to divide two numbers and they try to divide by zero.
    This will create an error and break your code.


    # EXCEPTIONAL OBJECTS


    Rather than stop the flow of your code, Python includes exception objects which
    handle unexpected errors in the code. You can combat errors by creating conditions
    where exceptions may occur.


    # STEP1


    You can create an exception error by simply trying to divide a number by zero.
    This will report back with the ZeroDivisionError: Division by zero message, as
    seen in the screenshot. The ZeroDivisionError part is the exception class, of
    which there are many.


    ![](img/e4c529ac6a286a7773e0e7c17e263180_79_0.png)


    # STEP2


    Most exceptions are raised automatically when Python comes across something that’s
    inherently wrong with the code. However, you can create your own exceptions that
    are designed to contain the potential error and react to it, as opposed to letting
    the code fail.


    ![](img/e4c529ac6a286a7773e0e7c17e263180_79_1.png)


    # STEP3


    You can use the functions raise exception to create our own error handling code
    within Python. Let’s assume your code has you warping around the cosmos, too much
    however results in a warp core breach. To stop the game from exiting due to the
    warp core going supernova, you can create a custom exception:


    ```

    raise Exception("warp core breach")

    ```


    ![](img/e4c529ac6a286a7773e0e7c17e263180_79_2.png)


    # STEP4


    To trap any errors in the code you can enclose the potential error within a try:
    block. This block consists of try, except, else, where the code is held within
    try:; then if there’s an exception do something, else do something else.


    ![](img/e4c529ac6a286a7773e0e7c17e263180_79_3.png)'
  - "[PAGE 80]\n\n# STEP 5\n\nFor example, use the divide by zero error. You can create\
    \ an exception where the code can handle the error without Python quitting due\
    \ to the problem:\n\n```\npython\ntry:\n    a=int(input(\"Enter the first number:\
    \ \"))\n    b=int(input(\"Enter the second number: \"))\n    print(a/b)\nexcept\
    \ ZeroDivisionError:\n    print(\"You have tried to divide by zero!\")\nelse:\n\
    \    print(\"You didn't divide by zero. Well done!\")\n\n```\n\n![](img/e4c529ac6a286a7773e0e7c17e263180_80_0.png)\n\
    \n# STEP 6\n\nYou can use exceptions to handle a variety of useful tasks. Using\
    \ an example from our previous tutorials, let's assume you want to open a file\
    \ and write to it:\n\n```\npython\ntry:\n    txt = open(\"/home/pi/Documents/textfile.txt\"\
    , \"r\")\n    txt.write(\"This is a test. Normal service will shortly resume!\"\
    )\nexcept IOError:\n    print (\"Error: unable to write the file. Check permissions\"\
    )\nelse:\n    print (\"Content written to file successfully. Have a nice day.\"\
    )\n    txt.close()\n\n```\n\n![](img/e4c529ac6a286a7773e0e7c17e263180_80_1.png)\n\
    \n# STEP 7\n\nObviously this won't work due to the file textfile.txt being opened\
    \ as read only (the \"r\" part). So in this case rather than Python telling you\
    \ that you're doing something wrong, you've created an exception using the IOError\
    \ class informing the user that the permissions are incorrect.\n\n![](img/e4c529ac6a286a7773e0e7c17e263180_80_2.png)\n\
    \n# STEP 8\n\nNaturally, you can quickly fix the issue by changing the \"r\" read\
    \ only instance with a \"w\" for write. This, as you already know, will create\
    \ the file and write the content then commit the changes to the file. The end\
    \ result will report a different set of circumstances, in this case, a successful\
    \ execution of the code.\n\n![](img/e4c529ac6a286a7773e0e7c17e263180_80_3.png)\n\
    \n# STEP 9\n\nYou can also use a finally: block, which works in a similar fashion\
    \ but you can't use else with it. To use our example from Step 6:\n\n```\npython\n\
    try:\n    txt = open(\"/home/pi/Documents/textfile.txt\", \"r\")\n    try:\n \
    \       txt.write(\"This is a test. Normal service will shortly resume!\")\n \
    \   finally:\n        print (\"Content written to file successfully. Have a nice\
    \ day.\")\n        txt.close()\nexcept IOError:\n    print (\"Error: unable to\
    \ write the file. Check permissions\")\n\n```\n\n![](img/e4c529ac6a286a7773e0e7c17e263180_80_4.png)\n\
    \n# STEP 10\n\nAs before an error will occur as you've used the \"r\" read-only\
    \ permission. If you change it to a \"w\", then the code will execute without\
    \ the error being displayed in the IDLE Shell. Needless to say, it can be a tricky\
    \ getting the exception code right the first time. Practise though, and you will\
    \ get the hang of it.\n\n![](img/e4c529ac6a286a7773e0e7c17e263180_80_5.png)"
- md: "# Python Graphics\n\nWhile dealing with text on the screen, either as a game\
    \ or in a program, is great, there will come a time when a bit of graphical representation\
    \ wouldn't go amiss. Python 3 has numerous ways in which to include graphics and\
    \ they're surprisingly powerful too.\n\n## GOING GRAPHICAL\n\nYou can draw simple\
    \ graphics, lines, squares and so on, or you can use one of the many Python modules\
    \ available, to bring out some spectacular effects.\n\n**STEP 1** One of the best\
    \ graphical modules to begin learning Python graphics is Turtle. The Turtle module\
    \ is, as the name suggests, based on the turtle robots used in many schools, that\
    \ can be programmed to draw something on a large piece of paper on the floor.\
    \ The Turtle module can be imported with: `import turtle`.\n\n**STEP 2** Let's\
    \ begin by drawing a simple circle. Start a New File, then enter the following\
    \ code:\n```python\nimport turtle\n\nturtle.circle(50)\nturtle.getscreen()._root.mainloop()\n\
    ```\nAs usual press F5 to save the code and execute it. A new window will now\
    \ open up and the 'Turtle' will draw a circle.\n\n**STEP 3** The command `turtle.circle(50)`\
    \ is what draws the circle on the screen, with 50 being the size. You can play\
    \ around with the sizes if you like, going up to 100, 150 and beyond; you can\
    \ draw an arc by entering: `turtle.circle(50, 180)`, where the size is 50, but\
    \ you're telling Python to only draw 180° of the circle.\n\n**STEP 4** The last\
    \ part of the circle code tells Python to keep the window where the drawing is\
    \ taking place to remain open, so the user can click to close it. Now, let's make\
    \ a square:\n```python\nimport turtle\n\nprint(\"Drawing a square...\")\n\nfor\
    \ t in range(4):\n    turtle.forward(100)\n    turtle.left(90)\nturtle.getscreen()._root.mainloop()\n\
    ```\nYou can see that we've inserted a loop to draw the sides of the square.\n\
    \n**STEP 5** You can add a new line to the square code to add some colour:\n```python\n\
    turtle.color(\"Red\")\n```\nThen you can even change the character to an actual\
    \ turtle by entering:\n```python\nturtle.shape(\"turtle\")\n```\nYou can also\
    \ use the command `turtle.begin_fill()`, and `turtle.end_fill()` to fill in the\
    \ square with the chosen colours; red outline, yellow fill in this case.\n\n**STEP\
    \ 6** You can see that the Turtle module can draw out some pretty good shapes\
    \ and become a little more complex as you begin to master the way it works. Enter\
    \ this example:\n```python\nfrom turtle import *\ncolor('red', 'yellow')\nbegin_fill()\n\
    while True:\n    forward(200)\n    left(170)\n    if abs(pos()) < 1:\n       \
    \ break\nend_fill()\ndone()\n```\nIt's a different method, but very effective.\n\
    \n**STEP 7** Another way in which you can display graphics is by using the Pygame\
    \ module. There are numerous ways in which pygame can help you output graphics\
    \ to the screen but for now let's look at displaying a predefined image. Start\
    \ by opening a browser and finding an image, then save it to the folder where\
    \ you save your Python code.\n\n**STEP 8** Now let's get the code by importing\
    \ the Pygame module:\n```python\nimport pygame\npygame.init()\n\nimg = pygame.image.load(\"\
    RPi.png\")\n\nwhite = (255, 255, 255)\nw = 900\nh = 450\nscreen = pygame.display.set_mode((w,\
    \ h))\nscreen.fill((white))\n\nscreen.fill((white))\nscreen.blit(img, (0,0))\n\
    pygame.display.flip()\n\nwhile True:\n    for event in pygame.event.get():\n \
    \       if event.type == pygame.QUIT:\n            pygame.quit()\n```\n\n**STEP\
    \ 9** In the previous step you imported pygame, initiated the pygame engine and\
    \ asked it to import our saved Raspberry Pi logo image, saved as RPi.png. Next\
    \ you defined the background colour of the window to display the image and the\
    \ window size as per the actual image dimensions. Finally you have a loop to close\
    \ the window.\n\n**STEP 10** Press F5 to save and execute the code and your image\
    \ will be displayed in a new window. Have a play around with the colours, sizes\
    \ and so on and take time to look up the many functions within the Pygame module\
    \ too.\n\n# Combining What You Know So Far\n\nBased on what you've looked at over\
    \ this section, let's combine it all and come up with a piece of code that can\
    \ easily be applied into a real-world situation; or at the very least, something\
    \ which you can incorporate into your programs.\n\n## LOGGING IN\n\nFor this example,\
    \ let's look to a piece of code that creates user logins and then allows them\
    \ to log into the system and write the time they logged in at. You can even include\
    \ an option to quit the program by pressing 'q'.\n\n**STEP 1** Begin by importing\
    \ the Time module, creating a new dictionary to handle the usernames and passwords\
    \ and creating a variable to evaluate the current status of the program:\n```python\n\
    import time\nusers = {}\nstatus = \"\"\n```\n\n**STEP 2** Next you need to define\
    \ some functions. You can begin by creating the main menu, where all users will\
    \ return to after selecting the available options:\n```python\ndef mainMenu():\n\
    \    global status\n    status = input(\"Do you have a login account? y/n? Or\
    \ press q to quit.\")\n    if status == \"y\":\n        oldUser()\n    elif status\
    \ == \"n\":\n        newUser()\n    elif status == \"q\":\n        quit()\n```\n\
    \n**STEP 3** The global status statement separates a local variable from one that\
    \ can be called throughout the code, this way you can use the q=quit element without\
    \ it being changed inside the function. We've also referenced some newly defined\
    \ functions: oldUser and newUser which we'll get to next.\n\n**STEP 4** The newUser\
    \ function is next:\n```python\ndef newUser():\n    createLogin = input(\"Create\
    \ a login name: \")\n    if createLogin in users:\n        print (\"\\nLogin name\
    \ already exists!\\n\")\n    else:\n        createPassw = input(\"Create password:\
    \ \")\n        users[createLogin] = createPassw\n        print(\"\\nUser created!\\\
    n\")\n        logins=open(\"/home/pi/Documents/logins.txt\", \"a\")\n        logins.write(\"\
    \\n\" + createLogin + \" \" + createPassw)\n        logins.close()\n```\nThis\
    \ creates a new user and password, and writes the entries into a file called logins.txt.\n\
    \n**STEP 5** You will need to specify your own location for the logins.txt file,\
    \ since we're using a Raspberry Pi. Essentially, this adds the username and password\
    \ inputs from the user to the existing users{} dictionary, so the key and value\
    \ structure remains: each user is the key, the password is the value.\n\n**STEP\
    \ 6** Now to create the oldUser function:\n```python\ndef oldUser():\n    login\
    \ = input(\"Enter login name: \")\n    passw = input(\"Enter password: \")\n \
    \   \n    # check if user exists and login matches\n    # password\n    if login\
    \ in users and users[login] == passw:\n        print (\"\\nLogin successful!\\\
    n\")\n        print (\"User:\", login, \"accessed the system on:\", time.asctime())\n\
    \        \n    else:\n        print (\"\\nUser doesn't exist or wrong password!\\\
    n\")\n```\n\n**STEP 7** There's a fair bit happening here. There are login and\
    \ passw variables, which are then matched to the users dictionary. If there's\
    \ a match, then you have a successful login and the time and date of the login\
    \ is outputted. If they don't match, then you print an error and the process starts\
    \ again.\n\n**STEP 8** Finally, you need to continually check that the 'q' key\
    \ hasn't been pressed to exit the program. We can do this with:\n```python\nwhile\
    \ status != \"q\":\n    status = displayMenu()\n```\n\n**STEP 9** Although a seemingly\
    \ minor two lines, the while loop is what keeps the program running. At the end\
    \ of every function it's checked against the current value of status. If that\
    \ global value isn't 'q' then the program continues. If it's equal to 'q' then\
    \ the program can quit.\n\n**STEP 10** You can now create users, then log in with\
    \ their names and passwords, with the logins.txt file being created to store the\
    \ login data and successful logins being time-stamped. Now it's up to you to further\
    \ improve the code. Perhaps you can import the list of created users from a previous\
    \ session and display a graphic upon a successful login?"
  mdcn: "# Python 图形编程\n\n虽然在屏幕上处理文本——无论是游戏还是程序——都很棒，但有时加入一些图形化表示会更锦上添花。Python 3 提供了多种包含图形的方式，而且它们的功能出奇地强大。\n\
    \n## 走向图形化\n\n你可以绘制简单的图形，如线条、正方形等，或者使用众多可用的 Python 模块之一，来呈现一些惊人的效果。\n\n**第一步**\
    \ 开始学习 Python 图形编程的最佳模块之一是 Turtle。顾名思义，Turtle 模块基于许多学校使用的海龟机器人，这些机器人可以被编程在地板上的大张纸上绘制东西。可以通过以下方式导入\
    \ Turtle 模块：`import turtle`。\n\n**第二步** 让我们从绘制一个简单的圆开始。新建一个文件，然后输入以下代码：\n```python\n\
    import turtle\n\nturtle.circle(50)\nturtle.getscreen()._root.mainloop()\n```\n\
    像往常一样，按 F5 保存并执行代码。现在将打开一个新窗口，“海龟”会画出一个圆。\n\n**第三步** 命令 `turtle.circle(50)` 用于在屏幕上绘制圆形，其中\
    \ 50 是大小。你可以随意调整大小，比如 100、150 甚至更大；你也可以通过输入 `turtle.circle(50, 180)` 来绘制一段弧线，其中大小是\
    \ 50，但你告诉 Python 只绘制圆的 180°。\n\n**第四步** 圆形代码的最后一部分告诉 Python 保持绘图窗口打开，以便用户可以点击关闭它。现在，让我们来画一个正方形：\n\
    ```python\nimport turtle\n\nprint(\"Drawing a square...\")\n\nfor t in range(4):\n\
    \    turtle.forward(100)\n    turtle.left(90)\nturtle.getscreen()._root.mainloop()\n\
    ```\n你可以看到我们插入了一个循环来绘制正方形的边。\n\n**第五步** 你可以在正方形代码中添加一行来添加一些颜色：\n```python\nturtle.color(\"\
    Red\")\n```\n然后，你甚至可以通过输入以下代码将角色更改为真正的海龟：\n```python\nturtle.shape(\"turtle\"\
    )\n```\n你还可以使用命令 `turtle.begin_fill()` 和 `turtle.end_fill()` 来用选定的颜色填充正方形；本例中是红色轮廓，黄色填充。\n\
    \n**第六步** 你可以看到 Turtle 模块可以绘制出相当不错的形状，并且随着你开始掌握其工作方式，它会变得稍微复杂一些。输入这个例子：\n```python\n\
    from turtle import *\ncolor('red', 'yellow')\nbegin_fill()\nwhile True:\n    forward(200)\n\
    \    left(170)\n    if abs(pos()) < 1:\n        break\nend_fill()\ndone()\n```\n\
    这是一种不同的方法，但非常有效。\n\n**第七步** 另一种显示图形的方式是使用 Pygame 模块。Pygame 有多种方式可以帮助你将图形输出到屏幕，但现在让我们看看如何显示一个预定义的图像。首先打开浏览器，找到一张图片，然后将其保存到你保存\
    \ Python 代码的文件夹中。\n\n**第八步** 现在让我们通过导入 Pygame 模块来获取代码：\n```python\nimport pygame\n\
    pygame.init()\n\nimg = pygame.image.load(\"RPi.png\")\n\nwhite = (255, 255, 255)\n\
    w = 900\nh = 450\nscreen = pygame.display.set_mode((w, h))\nscreen.fill((white))\n\
    \nscreen.fill((white))\nscreen.blit(img, (0,0))\npygame.display.flip()\n\nwhile\
    \ True:\n    for event in pygame.event.get():\n        if event.type == pygame.QUIT:\n\
    \            pygame.quit()\n```\n\n**第九步** 在上一步中，你导入了 pygame，初始化了 pygame 引擎，并要求它导入我们保存的树莓派标志图像（保存为\
    \ RPi.png）。接下来，你定义了显示图像的窗口背景颜色，并根据实际图像尺寸设置了窗口大小。最后，你有一个循环来关闭窗口。\n\n**第十步** 按 F5\
    \ 保存并执行代码，你的图像将显示在一个新窗口中。尝试调整颜色、大小等，并花时间查阅 Pygame 模块中的众多函数。\n\n# 综合运用你目前所学\n\n\
    基于你在本节中所学的内容，让我们将它们结合起来，编写一段可以轻松应用于现实世界的代码；或者至少，是一些你可以融入自己程序中的东西。\n\n## 登录系统\n\
    \n在这个例子中，让我们看一段创建用户登录，然后允许他们登录系统并记录登录时间的代码。你甚至可以包含一个通过按 'q' 退出程序的选项。\n\n**第一步**\
    \ 首先导入 Time 模块，创建一个新字典来处理用户名和密码，并创建一个变量来评估程序的当前状态：\n```python\nimport time\nusers\
    \ = {}\nstatus = \"\"\n```\n\n**第二步** 接下来你需要定义一些函数。你可以从创建主菜单开始，所有用户在选择可用选项后都会返回到这里：\n\
    ```python\ndef mainMenu():\n    global status\n    status = input(\"Do you have\
    \ a login account? y/n? Or press q to quit.\")\n    if status == \"y\":\n    \
    \    oldUser()\n    elif status == \"n\":\n        newUser()\n    elif status\
    \ == \"q\":\n        quit()\n```\n\n**第三步** `global status` 语句将局部变量与可以在整个代码中调用的变量区分开来，这样你就可以使用\
    \ q=quit 元素，而不会在函数内部被更改。我们还引用了一些新定义的函数：oldUser 和 newUser，我们接下来会讲到。\n\n**第四步**\
    \ 接下来是 newUser 函数：\n```python\ndef newUser():\n    createLogin = input(\"Create\
    \ a login name: \")\n    if createLogin in users:\n        print (\"\\nLogin name\
    \ already exists!\\n\")\n    else:\n        createPassw = input(\"Create password:\
    \ \")\n        users[createLogin] = createPassw\n        print(\"\\nUser created!\\\
    n\")\n        logins=open(\"/home/pi/Documents/logins.txt\", \"a\")\n        logins.write(\"\
    \\n\" + createLogin + \" \" + createPassw)\n        logins.close()\n```\n这会创建一个新用户和密码，并将条目写入名为\
    \ logins.txt 的文件中。\n\n**第五步** 你需要为 logins.txt 文件指定自己的位置，因为我们使用的是树莓派。本质上，这会将用户输入的用户名和密码添加到现有的\
    \ users{} 字典中，因此键值结构保持不变：每个用户是键，密码是值。\n\n**第六步** 现在创建 oldUser 函数：\n```python\n\
    def oldUser():\n    login = input(\"Enter login name: \")\n    passw = input(\"\
    Enter password: \")\n    \n    # check if user exists and login matches\n    #\
    \ password\n    if login in users and users[login] == passw:\n        print (\"\
    \\nLogin successful!\\n\")\n        print (\"User:\", login, \"accessed the system\
    \ on:\", time.asctime())\n        \n    else:\n        print (\"\\nUser doesn't\
    \ exist or wrong password!\\n\")\n```\n\n**第七步** 这里发生了很多事情。有 login 和 passw 变量，然后它们与\
    \ users 字典进行匹配。如果匹配成功，那么你就成功登录了，并且会输出登录的时间和日期。如果不匹配，那么你会打印一条错误信息，然后过程重新开始。\n\n\
    **第八步** 最后，你需要持续检查是否按下了 'q' 键来退出程序。我们可以通过以下方式实现：\n```python\nwhile status != \"\
    q\":\n    status = displayMenu()\n```\n\n**第九步** 虽然看似只有两行，但 while 循环是保持程序运行的关键。在每个函数结束时，它都会根据\
    \ status 的当前值进行检查。如果该全局值不是 'q'，则程序继续。如果它等于 'q'，则程序可以退出。\n\n**第十步** 你现在可以创建用户，然后用他们的名字和密码登录，logins.txt\
    \ 文件会被创建来存储登录数据，成功的登录会被加上时间戳。现在轮到你进一步改进代码了。也许你可以从之前的会话中导入已创建的用户列表，并在成功登录时显示一个图形？"
