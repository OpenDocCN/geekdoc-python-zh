  md: '# Listing and Moving Files


    Admittedly, using the desktop GUI to list and move files is much easier than using
    the Terminal and keyboard. However, it’s an important skill that you will appreciate
    as you advance with the Raspberry Pi and Linux.


    # LOOKING AT FILES


    Operating systems are built on files and folders, or directories if you prefer.
    While you’re used to viewing your own files, most operating systems keep other
    files out of sight. In Raspbian, you have access to every file in the system.


    STEP 1 We’ve already looked at “ls”, which lists the files in the working directory,
    but you are more likely to use a command like “ls -l”. The bit after the command
    (the ‘-lah’) is known as the argument. This is an option that modifies the behaviour
    of the command.


    STEP 3 After the permission letters come a single number. This is the number of
    files in the item. If it’s a file then it’ll be 1, but if it’s a directory it’ll
    be at least 2. This is because each directory contains two hidden files; one with
    a single dot (.) and one with two dots (..). Directories containing files or other
    directories will have a higher number.


    ```

    pi@raspberrypi ~ $ ls -l_

    ```


    ```

    pi@raspberrypi ~ $ ls -l

    total 24

    -rw-r--r-- 1 pi pi    0 May 11 20:56 articles.txt

    drwxr-xr-x 2 pi pi 4096 Apr 21 17:55 Desktop

    drwxr-xr-x 5 pi pi 4096 Apr 21 14:50 Documents

    drwx------ 2 pi pi 4096 Apr 21 15:23 Downloads

    drwxr-xr-x 3 pi pi 4096 Apr 17 18:48 Instructables

    -rw-r--r-- 1 pi pi    0 May 11 20:56 names.txt

    drwxrwxr-x 2 pi pi 4096 Jan  1  1970 python_games

    drwxr-xr-x 2 pi pi 4096 Apr 17 12:53 Scratch

    pi@raspberrypi ~ $

    ```


    STEP 2 The “-l” argument lists files and directories in long format. Each file
    and directory is now on a single line, and before each file is a lot of text.
    First you’ll see lots of letters and dashes, like ‘drwxr-xr-x’. Don’t worry about
    these for now; they are known as ‘permissions’ and we’ll come to those later.


    STEP 4 Next you’ll see the word “pi” listed twice on each line. This refers to
    the user rather than the name of your computer (your default username is “pi”).
    The first is the owner of the file, and the second is the group. Typically these
    will both be the same and you’ll see either ‘pi’ or ‘root’. You can enter: ls
    -l / to view the files and directories in the root directory that belong to the
    root account.


    ```

    pi@raspberrypi ~ $ ls -l

    total 24

    -rw-r--r-- 1 pi pi    0 May 11 20:56 articles.txt

    drwxr-xr-x 2 pi pi 4096 Apr 21 17:55 Desktop

    drwxr-xr-x 5 pi pi 4096 Apr 21 14:50 Documents

    drwx------ 2 pi pi 4096 Apr 21 15:23 Downloads

    drwxr-xr-x 3 pi pi 4096 Apr 17 18:48 Instructables

    -rw-r--r-- 1 pi pi    0 May 11 20:56 names.txt

    drwxrwxr-x 2 pi pi 4096 Jan  1  1970 python_games

    drwxr-xr-x 2 pi pi 4096 Apr 17 12:53 Scratch

    pi@raspberrypi ~ $

    ```


    ```

    pi@raspberrypi ~ $ ls -l

    total 28

    -rw-r--r-- 1 pi pi    0 May 11 20:56 articles.txt

    drwxr-xr-x 2 pi pi 4096 Apr 21 17:55 Desktop

    drwxr-xr-x 5 pi pi 4096 Apr 21 14:50 Documents

