  md: "# Conditions and Loops\n\nConditions and loops are what make a program interesting;\
    \ they can be simple or rather complex. How you use them depends greatly on what\
    \ the program is trying to achieve; they could be the number of lives left in\
    \ a game or just displaying a countdown.\n\n# TRUE CONDITIONS\n\nKeeping conditions\
    \ simple to begin with makes learning to program a more enjoyable experience.\
    \ Let's start then by checking if something is TRUE, then doing something else\
    \ if it isn't.\n\n# STEP 1\n\nLet's create a new Python program that will ask\
    \ the user to input a word, then check it to see if it's a four-letter word or\
    \ not. Start with File > New File, and begin with the input variable:\n\n```\n\
    word=input(\"Please enter a four-letter word: \")\n```\n\n![](img/e4c529ac6a286a7773e0e7c17e263180_51_0.png)\n\
    \n# STEP 2\n\nNow we can create a new variable, then use the len function and\
    \ pass the word variable through it to get the total number of letters the user\
    \ has just entered:\n\n```\nword=input(\"Please enter a four-letter word: \")\n\
    word_length=len(word)\n```\n\n![](img/e4c529ac6a286a7773e0e7c17e263180_51_1.png)\n\
    \n# STEP 3\n\nNow you can use an if statement to check if the word_length variable\
    \ is equal to four and print a friendly conformation if it applies to the rule:\n\
    \n```\nword=input(\"Please enter a four-letter word: \")\nword_length=len(word)\n\
    if word_length == 4:\n    print (word, \"is a four-letter word. Well done.\")\n\
    ```\n\nThe double equal sign (==) means check if something is equal to something\
    \ else.\n\n![](img/e4c529ac6a286a7773e0e7c17e263180_51_2.png)\n\n# STEP 4\n\n\
    The colon at the end of IF tells Python that if this statement is true do everything\
    \ after the colon that's indented. Next, move the cursor back to the beginning\
    \ of the Editor:\n\n```\nword=input(\"Please enter a four-letter word: \")\nword_length=len(word)\n\
    if word_length == 4:\n    print (word, \"is a four-letter word. Well done.\")\n\
    else:\n    print (word, \"is not a four-letter word.\")\n```\n\n![](img/e4c529ac6a286a7773e0e7c17e263180_51_3.png)"
