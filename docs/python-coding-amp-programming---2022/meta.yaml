- md: "# Python in Focus: Gaming\n\nAlthough not always considered as the ideal programming\
    \ language for developing games, Python has come a long way in recent years and\
    \ is now one of the contributing elements to a huge number of titles.\n\nThe video\
    \ game industry generates something in the region of $140 billion each year, and\
    \ that number is growing fast. It’s a long way from the 8-bit days of the Commodore\
    \ 64 and ZX Spectrum; the arcade titles that used to devour our pocket money and\
    \ the wood-panelled home consoles that Atari lovingly developed. These days, it’s\
    \ all about teams of coders, graphic artists, musicians, PR, projects and development\
    \ platforms.\n\n## GAME CODE\n\nCoding a game from scratch, using raw code, has\
    \ become something of the past. Most games these days are created using a range\
    \ of development tools. These tools can be off-the-shelf engines, such as the\
    \ Unreal Engine, while others are custom built around an original product, such\
    \ as the world generating engine that Bethesda use for the Skyrim and Fallout\
    \ series of games. Other examples can be coded from the ground up, but these are\
    \ generally few and far between. So where does Python fit into all this?\n\nThe\
    \ limiting factor with Python is performance. While most games require a huge\
    \ degree of performance from the platform for which they are written, Python’s\
    \ code, which is good, isn’t really designed to cope with the fast-paced formula\
    \ on which games such as Battlefield or the Call of Duty series are based. These\
    \ games are often coded with C++, or some other form of low-level programming\
    \ language. But that doesn’t mean Python is left out in the cold when it comes\
    \ to game development, in fact it’s quite the opposite.\n\n![](img/e4c529ac6a286a7773e0e7c17e263180_85_0.png)\n\
    \n## BUILDING TOOLS\n\nIn the game industry, Python is mostly limited to the development\
    \ of in-game tools used by the developers of the game, or to help bridge the gaps\
    \ between different areas of code. For example, in-game tools coded in Python\
    \ can be used by designers to create levels for the game, or specific elements\
    \ that would make up a character’s inventory, or even creating dialog between\
    \ the player and non-playing characters in the game.\n\nYou will also find that\
    \ Python can be used to control the game’s AI (Artificial Intelligence), which\
    \ will give the characters in a game a certain element of life. As an example,\
    \ the popular Sims games consist of characters other than the one the gamer controls.\
    \ These Sims will go about their business with their actions determined by the\
    \ player’s choices, this involves an advanced form of Artificial Intelligence\
    \ that is coded using Python.\n\nOther examples include many of the available\
    \ open world games, where the introduction of the player will change the course\
    \ of a village’s, Town’s, or even city’s inhabitant’s behaviour. Blow up a few\
    \ cars in the middle of the street and it’ll affect the way the other drivers\
    \ behave; jump up and down on top of a market stall in the middle of a medieval\
    \ village and the folk around you will react. This, again, is all down to Python\
    \ code written within the main code of the game, alongside the game development\
    \ engine.\n\n```\nMONITOR FOR 6802 1.4    9-14-80  TSC ASSEMBLER  PAGE  2\n\n\
    C000          ORG    ROM+$0000 BEGIN MONITOR\nC000 8E 00 70 START  LDS    #STACK\n\
    \n***************************\n* FUNCTION: INITA - Initialize ACIA\n* INPUT: none\n\
    * OUTPUT: none\n* CALLS: none\n* DESTROYS: acc A\n\n0013          RESETA EQU \
    \   %00010011\n0011          CTLREG EQU    %00010001\n\nC003 86 13    INITA  LDA\
    \ A  #RESETA  RESET ACIA\nC005 B7 80 04        STA A  ACIA\nC008 86 11       \
    \    LDA A  #CTLREG  SET 8 BITS AND 2 STOP\nC00A B7 80 04        STA A  ACIA\n\
    \nC00D 7E C0 F1        JMP    SIGNON   GO TO START OF MONITOR\n\n***************************\n\
    * FUNCTION: INCH - Input character\n* INPUT: none\n* OUTPUT: char in acc A\n*\
    \ DESTROYS: acc A\n* CALLS: none\n* DESCRIPTION: Gets 1 character from terminal\n\
    ```\n\n## PYTHON-POWERED GAMES\n\nSome good examples of the types of games in\
    \ which Python is used are the following:\n\n- **Battlefield 2** – Python is used\
    \ for the game’s add-ons and functionality of the player elements.\n- **The Sims**\
    \ – AI, and many of the game’s interactions.\n- **Civilisation** – Python is used\
    \ throughout the Civ games, controlling movement and the non-player AI.\n- **Eve\
    \ Online** – Utilises Python for floating point number calculations and other\
    \ tasks.\n- **World of Tanks** – Python is used to control AI objects and detail\
    \ the large amount of graphical data.\n\nIn particular, it’s worth noting that\
    \ Python’s use in games is due to its ability to automate repetitive tasks quickly.\
    \ While another programming language may be faster at drawing the graphics on\
    \ the screen, Python can quickly repeat resizing hundreds of textures in batches.\
    \ There’s also Python’s excellent and sizeable libraries that can be tweaked for\
    \ certain tasks, specifically in-game tasks freeing up other components to deliver\
    \ the performance that modern games need.\n\n![](img/e4c529ac6a286a7773e0e7c17e263180_86_0.png)\n\
    \n![](img/e4c529ac6a286a7773e0e7c17e263180_86_1.png)\n\n![](img/e4c529ac6a286a7773e0e7c17e263180_86_2.png)\n\
    \n## KEEP ON GAMING\n\nIn short, while Python may not be the ideal language with\
    \ which to create a modern game entirely, its use is often behind the scenes,\
    \ in areas where other programming languages will struggle. Python can be used\
    \ as the glue that sticks elements of game technologies together, creating complex\
    \ AI or simply designing a dialog box.\n\n![](img/e4c529ac6a286a7773e0e7c17e263180_86_3.png)\n\
    \n# Using Modules\n\nA Python module is a Python-created source file that contains\
    \ the necessary code for classes, functions and global variables. You can bind\
    \ and reference modules to extend functionality, and create even more spectacular\
    \ Python programs.\n\nAre you curious about how to improve your use of these modules\
    \ to add a little something extra to your code? Then read on and learn how they\
    \ can be used to fashion fantastic code with graphics, animations and operating\
    \ system specific commands.\n\n- 90 Calendar Module\n- 92 OS Module\n- 94 Using\
    \ the Math Module\n- 96 Random Module\n- 98 Tkinter Module\n- 100 Pygame Module\n\
    - 104 Basic Animation\n- 106 Create Your Own Modules\n- 108 Python in Focus: Artificial\
    \ Intelligence\n\n## Calendar Module\n\nBeyond the Time module, the Calendar module\
    \ can produce some interesting results when executed within your code. It does\
    \ far more than simply display the date in the Time module-like format, you can\
    \ actually call up a wall calendar type display.\n\n## WORKING WITH DATES\n\n\
    The Calendar module is built into Python 3. However, if for some reason it’s not\
    \ installed you can add it using `pip install calendar` as a Windows administrator,\
