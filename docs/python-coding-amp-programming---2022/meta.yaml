    \n```python\nimport os\nos.system('chromium-browser \"http://bdmpublications.com/\"\
    ')\n```\n\n### STEP 7\n\nNote in the previous step's example the use of single\
    \ and double-quotes. The single quotes encase the entire command and launching\
    \ Chromium, whereas the double quotes open the specified page. You can even use\
    \ variables to call multiple tabs in the same browser:\n\n```python\nimport os\n\
    a=('chromium-browser \"http://bdmpublications.com/\"')\nb=('chromium-browser \"\
    http://www.google.co.uk\"')\nos.system(a + b)\n```\n\n### STEP 8\n\nThe ability\
    \ to manipulate directories, or folders if you prefer, is one of the OS module's\
    \ best features. For example, to create a new directory you can use:\n\n```python\n\
    import os\nos.mkdir(\"NEW\")\n```\n\nThis creates a new directory within the Current\
    \ Working Directory, named according to the object in the mkdir function.\n\n\
    ### STEP 9\n\nYou can also rename any directories you've created by entering:\n\
    \n```python\nimport os\nos.rename(\"NEW\", \"OLD\")\n```\n\nTo delete them:\n\n\
    ```python\nimport os\nos.rmdir(\"OLD\")\n```\n\n### STEP 10\n\nAnother module\
    \ that goes together with OS is shutil. You can use the Shutil module together\
    \ with OS and time to create a time-stamped backup directory, and copy files into\
    \ it:\n\n```python\nimport os, shutil, time\n\nroot_src_dir = r'/home/pi/Documents'\n\
    root_dst_dir = '/home/pi/backup/' + time.asctime()\n\nfor src_dir, dirs, files\
    \ in os.walk(root_src_dir):\n    dst_dir = src_dir.replace(root_src_dir, root_dst_dir,\
    \ 1)\n    if not os.path.exists(dst_dir):\n        os.makedirs(dst_dir)\n    for\
    \ file_ in files:\n        src_file = os.path.join(src_dir, file_)\n        dst_file\
    \ = os.path.join(dst_dir, file_)\n        if os.path.exists(dst_file):\n     \
    \       os.remove(dst_file)\n        shutil.copy(src_file, dst_dir)\n\nprint(\"\
    >>>>>>>>>Backup complete<<<<<<<<<<\")\n```\n\n## Using the Math Module\n\nOne\
    \ of the most used modules you will come across is the Math module. As we've mentioned\
    \ previously in this book, mathematics is the backbone of programming and there's\
    \ an incredible number of uses the Math module can have in your code.\n\n### E\
    \ = MC²\n\nThe Math module provides access to a plethora of mathematical functions,\
    \ from simply displaying the value of PI, to helping you create complex 3D shapes.\n\
    \n**STEP 1** The Math module is built-in to Python 3; so there's no need to PIP\
