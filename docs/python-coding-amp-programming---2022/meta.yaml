    ![](img/e4c529ac6a286a7773e0e7c17e263180_138_1.png)


    Linux is used throughout the world, in a number of basic and quite unique uses.
    While it may look radically different from one environment to the next, the actual
    Linux kernel, can be found in modern smart TVs, in-car entertainment systems and
    GPS, supercomputers, IoT devices and the Raspberry Pi. It''s used by NASA, both
    in the command centre and on-board the ISS. Linux servers power the backbone of
    the Internet, along with most of the websites you visit daily. Android utilises
    components of the Linux kernel, as do set top boxes, games consoles and even your
    fridge, freezer, oven and washing machine.


    Linux isn''t just a free to use operating system. It''s stable, powerful and fast,
    easily customised and requires very little maintenance. However, it''s more than
    just performance stats; Linux means freedom from the walled garden approach of
    other operating systems. It''s a lively community of like-minded individuals who
    want more from their computers without the shackles of price or conformity. Linux
    means choice.


    Raspbian on the Raspberry Pi, is the Linux distribution of choice.


    ![](img/e4c529ac6a286a7773e0e7c17e263180_138_2.png)


    ## Using the Filesystem


    To master Linux, it’s important to understand how the filesystem works. What’s
    more, it’s also important to become familiar with the Terminal, or shell. This
    command line environment may appear daunting at first, but with practise, it soon
    becomes easy to use.


    ### GETTING AROUND


    To drop into the Terminal, click on the fourth icon from the left along the top
    of the Raspberry Pi desktop, the one with a right-facing arrow and an underscore.
    This is the shell, or Terminal.


    ```

    bash

    pi@raspberrypi:~ $ pwd

    /home/pi

    pi@raspberrypi:~ $

    ```


    First, you’re going to look at directories and the directory path. A directory
    is the same thing as a folder, however in Linux it’s always called a directory.
    These are placed inside each other using a "/" character. So when you see /home/pi
    it means the pi directory is inside the home directory. Enter: clear and press
    return to clean the screen. Now enter: pwd. This stands for Print Working Directory
    and displays /home/pi.


    ```

    bash

    pi@raspberrypi ~ $ pwd

    /home/pi

    pi@raspberrypi ~ $ ls

    Desktop Documents Downloads exit indiecity python_games Scratch

    pi@raspberrypi ~ $

    ```


    Enter: ls to view the contents of the current directory. You should see Desktop,
    Documents, and Downloads and Scratch in Blue. You may also see other items depending
    on how much you have used your Raspberry Pi. The colour code is worth knowing:
    directories are blue while most files are white. As you go on you’ll see other
    colours: executable files (programs) are bright green, archived files are red
    and so on. Blue and white are the two you need to know to get started.


    ```

    bash

    pi@raspberrypi ~ $ pwd

    /home/pi

    pi@raspberrypi ~ $

    ```


    When you log in to your Raspberry Pi, you don’t start at the base of the hard
    drive, known as the ‘root’ (also known as the topmost directory). Instead you
    begin inside your user directory, which is named ‘pi’ by default and is itself
    in a directory called ‘home’. Directories are indicated by the "/" symbol. So,
    "/home/pi" tells you that in the root is a directory called home, and the next
    "/" says that inside "home" is a directory called "pi". That’s where you start.


    ```

    bash

    pi@raspberrypi ~ $ pwd

    /home/pi

    pi@raspberrypi ~ $ ls

    Desktop Documents Downloads exit indiecity python_games Scratch

    pi@raspberrypi ~ $ cd Documents

    pi@raspberrypi ~/Documents $ pwd

    /home/pi/Documents

    pi@raspberrypi ~/Documents $ ls

    Amber  archive.tar  Crypto101.pdf  dog_jump  euro  fizzbang_backup.py  fizzbang.py  nds

    pi@raspberrypi ~/Documents $ _

    ```


    Now you’re going to move from the pi directory into the Documents directory. Enter:
    cd Documents. Note the capital “D”. Linux is case sensitive, which means you have
    to enter the exact name including correct capitalisation. The cd command stands
    for change directory. Now enter: pwd again to view the directory path. It will
    display /home/pi/Documents. Enter: ls to view the files inside the Documents directory.


    STEP 5 How do you get back up to the pi directory? By using a command "cd ..".
    In Linux two dots means the directory above, also known as the parent directory.
    Incidentally, a single dot "." is used for the same directory. You never use "cd
    ." to switch to the same directory but it''s worth knowing because some commands
    need you to specify the current directory.


    STEP 6 The "ls" and "cd" commands can also be used with more complex paths. Enter:
    `ls Documents/Pictures` to view the contents of a Pictures directory inside your
    Documents directory. You can switch to this directory using `cd Documents/Pictures`;
    use `cd ../..` to move back up two parent directories.


    ```

    pi@raspberrypi ~/Documents $ pwd

    /home/pi/Documents

    pi@raspberrypi ~/Documents $ cd ..

    pi@raspberrypi ~ $ pwd

    /home/pi

    pi@raspberrypi ~ $

    ```


    ```

    pi@raspberrypi ~ $ ls Documents/Pictures

    BDM-Web-logo-dark1.jpg  David Hayward.jpg  raspberry_pi_2_photographs

    pi@raspberrypi ~ $ cd Documents/Pictures

    pi@raspberrypi ~/Documents/Pictures $ pwd

    /home/pi/Documents/Pictures

    pi@raspberrypi ~/Documents/Pictures $ cd ../..

    pi@raspberrypi ~ $ pwd

    /home/pi

    pi@raspberrypi ~ $

    ```


    ### ABSOLUTE VS RELATIVE PATHS


    It is important to know the difference between the working directory, root directory
    and home. There are also two types of path: Absolute and Relative. These are easier
    to understand than they sound. Let''s take a look...


    STEP 1 By default, commands like "ls" use the working directory. This is the current
    directory that you''re looking at and is set to your home directory by default
    (/users/pi). Using "pwd" (Print Working Directory) lets you know what the working
    directory is, and using "cd" changes the working directory.


    STEP 2 The root directory is always ''/''. Entering `ls /` lists the contents
    of root, and entering: `cd /` switches to the root directory. This is important
    because there is a difference between "ls Documents/Pictures" and "ls /Documents/Pictures".
    The first command lists the contents of the Pictures directory in Documents inside
    the working directory (which, if you are in the home directory, will work).


    STEP 3 The second command ("ls /Documents/Pictures") attempts to list the content
    of Pictures in a directory called Documents inside the root directory (because
    the path started with ''/'', which is root). There is typically no Documents directory
    in root, so you will get a "No such file or directory" error. Starting a path
    with ''/'' is known as an "absolute path", while starting without the ''/'' is
    known as a "relative path" because it is relative to your working directory.


    ```

    pi@raspberrypi ~ $ pwd

    /home/pi

    pi@raspberrypi ~ $

    ```


    ```

    pi@raspberrypi ~ $ ls /

    bin  boot  dev  etc  home  lib  lost+found  media  mnt  opt  proc  ...

    pi@raspberrypi ~ $ ls /Documents/Pictures

    ls: cannot access /Documents/Pictures: No such file or directory

    pi@raspberrypi ~ $

    ```


    STEP 4 There is also an absolute path shortcut to your user directory, and that
    is the tilde "~" character. Entering: `ls ~` always lists the contents of your
    home directory, while "cd ~" moves straight to your home directory, no matter
    what your working directory is. You can also use this shortcut wherever you are:
    enter: `ls ~/Documents/Pictures` to display the contents of the Pictures.


    ```

    pi@raspberrypi:~ $ pwd

    /home/pi

    pi@raspberrypi:~ $ ls Documents/Pictures

    BDM-Web-logo-dark1.jpg  David Hayward.jpg  RPi.png

    pi@raspberrypi:~ $

    ```


    ```

    pi@raspberrypi:~ $ cd ~

    pi@raspberrypi:~ $ pwd

    /home/pi

    pi@raspberrypi:~ $ ls ~/Documents/Pictures

    BDM-Web-logo-dark1.jpg  David Hayward.jpg  RPi.png

    pi@raspberrypi:~ $

    ```'
