  md: '# PythonŌĆÖs Logging Library


    PythonŌĆÖs standard library offers support for logging via logging, logging.config,
    and logging.handlers modules.


    +   - logging module provides the primary client-facing API.

    - logging.config module provides the API to configure logging in a client.

    - logging.handlers module provides different handlers that cover common ways of
    processing and storing log records.


    We collectively refer to these modules as *PythonŌĆÖs logging library*.

    These modules realize the concepts introduced in the previous section as classes,
    a set of module-level functions, or a set of constants. Figure 2 shows these classes
    and the associations between them.


    ![](img/82d135619560522edcfdfa69b3d3cda0_9_0.png)


    # Logging Level


    Out of the box, PythonŌĆÖs logging library supports five logging levels: *critical*,
    *error*, *warning*, *info*, and *debug*. These levels are denoted by constants
    with the same name in the logging module, i.e., logging.CRITICAL, logging.ERROR,
    logging.WARNING, logging.INFO, and logging.DEBUG. The values of these constants
    are 50, 40, 30, 20, and 10, respectively.


    At runtime, the numeric value of a logging level determines the meaning of a logging
    level. Consequently, clients can introduce new logging levels by using numeric
    values that are greater than 0 and not equal to pre-defined logging levels as
    logging levels.'
  merge: -1
