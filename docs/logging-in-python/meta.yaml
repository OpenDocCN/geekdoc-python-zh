    # Preface


    This booklet is about *how to use the built-in support for logging in Python*.
    It introduces various concepts relevant to understanding logging in Python, discusses
    the corresponding logging APIs in Python and how to use them, and presents best
    practices and performance considerations for using these APIs.


    The booklet does not provide language-agnostic general information about logging,
    e.g., the purpose of logging, best practices while logging, and technologies to
    store and process logs.


    The booklet assumes that the reader has a good grasp of programming in Python,
    specifically, concepts and constructs pertaining to both general and object-oriented
    programming. The information and examples in the booklet are based on Python version
    3.8.'
  - '[PAGE 7]


    # Concepts and API


    Python has offered built-in support for logging since version 2.3. This support
    includes library APIs for common concepts and tasks that are specific to logging
    and language-agnostic. This chapter introduces these concepts and tasks as realized
    and supported in PythonŌĆÖs logging library.


    # Logging Concepts


    When we use a logging library, we perform/trigger the following common tasks while
    using the associated concepts (highlighted in bold).


    +   1. A client issues a **log request** by executing a **logging statement**.
    Often, such logging statements invoke a function/method in the **logging (library)
    API** by providing the **log data** and the **logging level** as arguments. The
    logging level specifies the importance of the log request. Log data is often a
    **log message**, which is a string, along with some **extra data** to be logged.
    Often, the logging API is exposed via **logger** objects.

    2. To enable the processing of a request as it threads through the logging library,
    the logging library creates a **log record** that represents the log request and
    captures the corresponding log data.

    3. Based on how the logging library is configured (via a **logging configuration**),
    the logging library filters the log requests/records. This filtering involves
    comparing the requested logging level to the threshold logging level and passing
    the log records through user-provided **filters**.

    4. **Handlers** process the filtered log records to either store the log data
    (e.g., write the log data into a file) or perform other actions involving the
    log data (e.g., send an email with the log data). In some logging libraries, before
    processing log records, a handler may again filter the log records based on the
    handlerŌĆÖs logging level and user-provided handler-specific **filters**. Also,
    when needed, handlers often rely on user-provided **formatters** to format log
    records into strings, i.e., **log entries**.


    Independent of the logging library, the above tasks are performed in an order
    similar to that shown in Figure 1.'
  - '[PAGE 8]


    ![](img/82d135619560522edcfdfa69b3d3cda0_8_0.png)


    Figure 1: The flow of tasks when logging via a logging library'
