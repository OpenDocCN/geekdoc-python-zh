    This booklet is about *how to use the built-in support for logging in Python*.
    It introduces various concepts relevant to understanding logging in Python, discusses
    the corresponding logging APIs in Python and how to use them, and presents best
    practices and performance considerations for using these APIs.


    The booklet does not provide language-agnostic general information about logging,
    e.g., the purpose of logging, best practices while logging, and technologies to
    store and process logs.


