  - '[PAGE 28]


    # What about caching references to loggers?


    Before moving on to gotchas, letŌĆÖs consider the goodness of the common practice
    of *caching references to loggers and accessing loggers via cached references*,
    e.g., how the `_logger` attribute was used in the previous code snippets.


    This coding pattern avoids repeated invocations of `logging.getLogger()` function
    to retrieve the same module-level logger; hence, it helps eliminate redundant
    retrievals. However, such eliminations can lead to lost log requests if retrievals
    are not redundant. For example, suppose the logging library configuration in a
    long-running web service is updated with `disable_existing_loggers` option. Since
    such an update would disable cached loggers, none of the logging statements that
    use cached loggers would log any requests. While we can remedy this situation
    by updating cached references to loggers, a simpler solution would be to use `logging.getLogger()`
    function instead of caching references.


    In short, caching references to loggers is not always a good practice. So, consider
    the context of the program while deciding to cache references to loggers.


    # Gotchas


    # Filters fail


    When the logging library invokes the filters associated with handlers and loggers,
    the library assumes the filters will always execute to completion, i.e., not fail
    on errors. So, there is no error handling logic in the library to deal with failing
    filters. Consequently, when a filter fails (to execute to completion), the corresponding
    log request will not be logged.


    *Ensure filters will execute to completion. More so, when using custom filters
    and using additional data in filtering.*


    # Formatters fail


    The logging library makes a similar assumption about formatters, i.e., formatters
    will always execute to completion. Consequently, when a formatter fails to execute
    to completion, the corresponding log request will not be logged.


    *Ensure formatters will execute to completion.*


    # Required keys are missing in the `extra` argument


    If the filters/formatters refer to keys of the `extra` argument provided as part
    of logging methods, then the filters/formatters can fail when the `extra` argument
    does not provide a referred key.


    *Ensure every key of the `extra` argument used in a filter or a formatter are
    available in every triggering logging statement.*'
  - '[PAGE 29]


    # Keys in the `extra` argument clash with required attributes


    The logging library adds the keys of the `extra` argument (to various logging
    methods) as attributes to log records. However, if `asctime` and `message` occur
    as keys in the `extra` argument, then the creation of log records will fail, and
    the corresponding log request will not be logged.


    Similar failure occurs if `args`, `exc_info`, `lineno`, `msg`, `name`, or `pathname`
    occur as keys in the `extra` argument; these are attributes of `LogRecord` class.


    > Ensure `asctime`, `message`, and certain attributes of `LogRecord` do not appear
    as keys in the `extra` argument of logging methods.


    # Libraries using custom logging levels are combined


    When a program and its dependent libraries use the logging library, their logging
    requirements are combined by the underlying logging library that services these
    requirements. In this case, if the components of a program use custom logging
    levels that are mutually inconsistent, then the logging outcome can be unpredictable.


    > Don''t use custom logging levels, specifically, in libraries.


    # Filters of ancestor loggers do not fire


    By default, log requests are propagated up the logger hierarchy to be processed
    by the handlers of ancestor loggers. While the filters of the handlers process
    such log requests, the filters of the corresponding loggers do not process such
    log requests.


    > To apply a filter to all log requests submitted to a logger, add the filter
    to the logger.


    # Ids of handlers/filters/formatters clash


    If multiple handlers share the same handler id in a configuration, then the handler
    id refers to the handler that is created last when the configuration is processed.
    The same happens amongst filters and formatters that share ids.


    When a client terminates, the logging library will execute the cleanup logic of
    the handler associated with each handler id. So, if multiple handlers have the
    same id in a configuration, then the cleanup logic of all but the handler created
    last will not be executed and, hence, result in resource leaks.


    > Use unique ids for objects of a kind in a configuration.'
  - '[PAGE 30]


    # Performance Considerations


    While logging statements help capture information at locations in a program, they
    contribute to the cost of the program in terms of execution time (e.g., logging
    statements in loops) and storage (e.g., logging lots of data). Although cost-free
    yet useful logging is impossible, we can reduce the cost of logging by making
    choices that are informed by performance considerations.


    # Configuration-Based Considerations


    After adding logging statements to a program, we can use the support to configure
    logging (described earlier) to control the execution of logging statements and
    the associated execution time. In particular, consider the following configuration
    capabilities when making decisions about logging-related performance.


    +   1. **Change logging levels of loggers**: This change helps suppress log messages
    below a certain log level. This helps reduce the execution cost associated with
    *unnecessary creation of log records*.

    2. **Change handlers**: This change helps replace slower handlers with faster
    handlers (e.g., during testing, use a transient handler instead of a persistent
    handler) and even remove context-irrelevant handlers. This reduces the execution
    cost associated with *unnecessary handling of log records*.

    3. **Change format**: This change helps exclude unnecessary parts of a log record
    from the log (e.g., exclude IP addresses when executing in a single node setting).
    This reduces the execution cost associated with *unnecessary handling of parts
    of log records*.


    The above changes range over coarser to finer aspects of logging support in Python.


    # Code-Based Considerations


    While the support to configure logging is powerful, it cannot help control the
    performance impact of implementation choices baked into the source code. Here
    are a few such logging-related implementation choices and the reasons why you
    should consider them when making decisions about logging-related performance.'
  - "[PAGE 31]\n\n# Do not execute inactive logging statements\n\nUpon adding the\
    \ `logging` module to Python's standard library, there were concerns about the\
    \ execution cost associated with *inactive logging statements* ŌĆö logging statements\
    \ that issue log requests with logging level lower than the threshold logging\
    \ level of the target logger. For example, *how much extra time will a logging\
    \ statement that invokes `logger.debug(...)` add to a program's execution time\
    \ when the threshold logging level of `logger` is `logging.WARN`?* This concern\
    \ led to client-side coding patterns (as shown below) that used the threshold\
    \ logging level of the target logger to control the execution of the logging statement.\n\
    \n```\n# client code\n...\nif logger.isEnabledFor(logging.DEBUG):\n    logger.debug(msg)\n\
    ...\n```\n\nToday, this concern is not valid because the logging methods in `logging.Logger`\
    \ class perform similar checks and process the log requests only if the checks\
    \ pass. For example, as shown below, the above check is performed in the `logging.Logger.debug`\
    \ method.\n\n```\n# client code\n...\nlogger.debug(msg)\n...\n\n# logging library\
    \ code\n\nclass Logger:\n    ...\n    def debug(self, msg, *args, **kwargs):\n\
    \        if self.isEnabledFor(DEBUG):\n            self._log(DEBUG, msg, args,\
    \ **kwargs)\n```\n\nConsequently, inactive logging statements *effectively* turn\
    \ into no-op statements and do not contribute to the execution cost of the program.\n\
    \nEven so, one should consider the following two aspects when adding logging statements.\n\
    \n+   1. Each invocation of a logging method incurs a small overhead associated\
    \ with the invocation of the logging method and the check to determine if the\
    \ logging request should proceed, e.g., a million invocations of `logger.debug(...)`\
    \ when threshold logging level of `logger` was `logging.WARN` took half a second\
    \ on a typical laptop. So, while the cost of an inactive logging statement is\
    \ trivial, the total execution cost of numerous inactive logging statements can\
    \ quickly add up to be non-trivial."
- md: '## Do not construct log messages eagerly


    Clients can construct log messages in two ways: eagerly and lazily.


    1.  The client constructs the log message and passes it on to the logging method,
    e.g., `logger.debug(f''Entering method Foo: {x=}, {y=}'')`. This approach offers
    formatting flexibility via f-strings and `format()` method, but it involves the
    eager construction of log messages, i.e., before the logging statements are deemed
    as active.

    2.  The client provides a printf-style message format string (as msg argument)
    and the values (as args argument) to construct the log message to the logging
    method, e.g., `logger.debug(''Entering method %s: x=%d, y=%f'', ''Foo'', x, y)`.
    After the logging statement is deemed as active, the logger constructs the log
    message using the string formatting operator %. This approach relies on an older
    and quirky string formatting feature of Python but it involves the lazy construction
    of log messages.


    While both approaches result in the same outcome, they exhibit different performance
    characteristics due to the eagerness and laziness of message construction.


    For example, on a typical laptop, a million inactive invocations of `logger.debug(''Test
    message {0}''.format(t))` takes 2197ms while a million inactive invocations of
    `logger.debug(''Test message %s'', t)` takes 1111ms when t is list of four integers.
    In the case of a million active invocations, the first approach takes 11061ms
    and the second approach took 10149ms. **A savings of 9ŌĆō50% of the time taken for
    logging!**


    So, the second (lazy) approach is more performant than the first (eager) approach
    in cases of both inactive and active logging statements. Further, the gains would
    be larger when the message construction is non-trivial, e.g., use of many arguments,
    conversion of complex arguments to strings.


    ## Do not gather unnecessary under-the-hood information


    By default, when a log record is created, the following data are captured in the
    log record.


    1.  Identifier of the current process

    2.  Identifier and name of the current thread

    3.  Name of the current process in the multiprocessing framework

    4.  Filename, line number, function name, and call stack info of the logging statement


    Unless these bits of data are logged, gathering them unnecessarily increases the
    execution cost. So, if these bits of data will not be logged, then configure the
    logging framework to not gather them by setting the following flags.


    1.  `logging.logProcesses = False`

    2.  `logging.logThreads = False`

    3.  `logging.logMultiProcessing = False`

    4.  `logging._srcFile = None`


    ## Do not block the main thread of execution


    There are situations where we may want to log data in the main thread of execution
    without spending almost any time logging the data. Such situations are common
    in web services, e.g., a request processing thread needs to log incoming web requests
    without significantly increasing its response time. We can tackle these situations
    by *separating concerns across threads*: a client/main thread creates a log record
    while a logging thread logs the record. Since the task of logging is often slower
    as it involves slower resources (e.g., secondary storage) or other services (e.g.,
    logging services such as Coralogix, pub-sub systems such as Kafka), this separation
    of concerns helps minimize the effort of logging on the execution time of the
    main/client thread.


    The Python logging library helps handle such situations via the [QueueHandler](https://docs.python.org/3/library/logging.handlers.html#logging.handlers.QueueHandler)
    and [QueueListener](https://docs.python.org/3/library/logging.handlers.html#queuehandler)
    classes as follows.


    1.  A pair of `QueueHandler` and `QueueListener` instances are initialized with
    a queue.

    2.  When the `QueueHandler` instance receives a log record from the client, it
    merely places the log request in its queue while executing in the client''s thread.
    Given the simplicity of the task performed by the `QueueHandler`, the client thread
    hardly pauses.

    3.  When a log record is available in the `QueueListener`''s queue, the listener
    retrieves the log record and executes the handlers registered with the listener
    to handle the log record. In terms of execution, the listener and the registered
    handlers execute in a dedicated thread that is different from the client thread.


    **Note:** While `QueueListener` comes with a default threading strategy, developers
    are not required to use this strategy to use `QueueHandler`. Instead, developers
    can use alternative threading strategies that meet their needs.'
