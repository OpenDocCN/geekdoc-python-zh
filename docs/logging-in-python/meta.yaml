  - "[PAGE 19]\n\n# # Configuration\n\nThe logging classes introduced in the previous\
    \ chapter provide methods to configure their instances and, consequently, customize\
    \ the use of the logging library. Snippet 1 demonstrates how to use configuration\
    \ methods. These methods are best used in simple single-file programs.\n\nWhen\
    \ involved programs (e.g., apps, libraries) use the logging library, a better\
    \ option is to *externalize the configuration of the logging library*. Such externalization\
    \ allows users to customize certain facets of logging in a program (e.g., specify\
    \ the location of log files, use custom loggers/handlers/formatters/filters) and,\
    \ hence, ease the deployment and use of the program. We refer to this approach\
    \ to configuration as *data-based approach*.\n\n# ## Configuring the Library\n\
    \nClients can configure the logging library by invoking `logging.config.dictConfig(config:\
    \ Dict)` function. The `config` argument is a dictionary and the following optional\
    \ keys can be used to specify a configuration.\n\n+   - `filters` key maps to\
    \ a dictionary of strings and dictionaries. The strings serve as *filter ids*\
    \ used to refer to filters in the configuration (e.g., adding a filter to a logger)\
    \ while the mapped dictionaries serve as filter configurations. The string value\
    \ of the `name` key in filter configurations is used to construct `logging.Filter`\
    \ instances.\n\n```\njson\n\"filters\": {\n  \"io_filter\": {\n    \"name\": \"\
    app.io\"\n  }\n}\n```\n\nThis configuration snippet results in the creation of\
    \ a filter that admits all records created by the logger named ŌĆśapp.ioŌĆÖ or its\
    \ descendants.\n\n+   - `formatters` key maps to a dictionary of strings and dictionaries.\
    \ The strings serve as *formatter ids* used to refer to formatters in the configuration\
    \ (e.g., adding a formatter to a handler) while the mapped dictionaries serve\
    \ as formatter configurations. The string values of the `datefmt` and `format`\
    \ keys in formatter configurations are used as the date and log entry formatting\
    \ strings, respectively, to construct `logging.Formatter` instances. The boolean\
    \ value of the (optional) `validate` key controls the validation of the format\
    \ strings during the construction of a formatter."
- md: "## Customizing via Factory Functions\n\nThe configuration schema for filters\
    \ supports a pattern to specify a factory function to create a filter. In this\
    \ pattern, a filter configuration maps the `()` key to the fully qualified name\
    \ of a filter creating factory function along with a set of keys and values to\
    \ be passed as keyword arguments to the factory function. In addition, attributes\
    \ and values can be added to custom filters by mapping `.` key to a dictionary\
    \ of attribute names and values.\n\nFor example, the below configuration will\
    \ cause the invocation of `app.logging.customFilterFactory(startTime='6PM', endTime='6AM')`\
    \ to create a custom filter and the addition of `local` attribute with the value\
    \ `True` to this filter.\n\n```\n\"filters\": {\n    \"time_filter\": {\n    \
    \    \"()\": \"app.logging.create_custom_factory\",\n        \"startTime\": \"\
    6PM\",\n        \"endTime\": \"6PM\",\n        \".\": {\n            \"local\"\
    : true\n        }\n    }\n}\n```\n\nConfiguration schemas for formatters, handlers,\
    \ and loggers also support the above pattern. In the case of handlers/loggers,\
    \ if this pattern and the `class` key occur in the configuration dictionary, then\
    \ this pattern is used to create handlers/loggers. Refer to [User-defined Objects](https://docs.python.org/3/library/logging.config.html#user-defined-objects)\
    \ for more details.\n\n## Configuring using Configparse-Format Files\n\nThe logging\
    \ library also supports loading configuration from a [configparser](https://docs.python.org/3/library/configparser.html#module-configparser)-format\
    \ file via the [logging.config.fileConfig()](https://docs.python.org/3/library/logging.config.html#logging.config.fileConfig)\
    \ function. Since this is an older API that does not provide all of the features\
    \ of the dictionary-based configuration described above, it is not covered in\
    \ this tutorial.\n\n## Configuration Dictionary Schema\n\nThis section describes\
    \ the keys and values expected in a configuration dictionary passed to `logging.config.dictConfig()`.\n\
    \n### Formatters\n\nThe `formatters` key maps to a dictionary of strings and dictionaries.\
    \ The strings serve as *formatter ids* used to refer to formatters in the configuration\
    \ (e.g., in a handler configuration). The mapped dictionaries are formatter configurations.\
    \ The string value of the `format` key specifies the format string for the log\
    \ entry. The string value of the `datefmt` key specifies the date format string.\
    \ The `style` key, if present, specifies the style for the format string (`%`,\
    \ `{`, or `$`). The `class` key, if present, specifies the formatter class to\
    \ use.\n\n```\n\"formatters\": {\n    \"simple\": {\n        \"format\": \"%(asctime)s\
    \ - %(message)s\",\n        \"datefmt\": \"%y%j-%H%M%S\"\n    },\n    \"detailed\"\
    : {\n        \"format\": \"%(asctime)s - %(pathname)s:%(lineno)s - %(message)s\"\
    \n    }\n}\n```\n\nThis configuration snippet results in the creation of two formatters.\
    \ A *simple* formatter with the specified log entry and date formatting strings\
    \ and *detailed* formatter with specified log entry formatting string and default\
    \ date formatting string.\n\n### Handlers\n\nThe `handlers` key maps to a dictionary\
    \ of strings and dictionaries. The strings serve as *handler ids* used to refer\
    \ to handlers in the configuration (e.g., adding a handler to a logger) while\
    \ the mapped dictionaries serve as handler configurations. The string value of\
    \ the `class` key in a handler configuration names the class to instantiate to\
    \ construct a handler. The string value of the (optional) `level` key specifies\
    \ the logging level of the instantiated handler. The string value of the (optional)\
    \ `formatter` key specifies the id of the formatter of the handler. Likewise,\
    \ the list of values of the (optional) `filters` key specifies the ids of the\
    \ filters of the handler. The remaining keys are passed as keyword arguments to\
    \ the handlerŌĆÖs constructor.\n\n```\n\"handlers\": {\n    \"stderr\": {\n    \
    \    \"class\": \"logging.StreamHandler\",\n        \"level\": \"INFO\",\n   \
    \     \"filters\": [\"io_filter\"],\n        \"formatter\": \"simple\",\n    \
    \    \"stream\": \"ext://sys.stderr\"\n    },\n    \"alert\": {\n        \"class\"\
    : \"logging.handlers.SMTPHandler\",\n        \"level\": \"ERROR\",\n        \"\
    formatter\": \"detailed\",\n        \"mailhost\": \"smtp.skynet.com\",\n     \
    \   \"fromaddr\": \"logging@skynet.com\",\n        \"toaddr\": [ \"admin1@skynet.com\"\
    , \"admin2@skynet.com\" ],\n        \"subject\": \"System Alert\"\n    }\n}\n\
    ```\n\nThis configuration snippet results in the creation of two handlers.\n\n\
    - A *stderr* handler that formats log requests with INFO and higher logging level\
    \ log via the *simple* formatter and emits the resulting log entry into the standard\
    \ error stream. The `stream` key is passed as keyword arguments to `logging.StreamHandler`\
    \ constructor. The value of the `stream` key illustrates how to access objects\
    \ external to the configuration. The `ext://` prefixed string refers to the object\
    \ that is accessible when the string without the `ext://` prefix (i.e., `sys.stderr`)\
    \ is processed via the normal importing mechanism. Refer to [Access to external\
    \ objects](https://docs.python.org/3/library/logging.config.html#access-to-external-objects)\
    \ for more details. Refer to [Access to internal objects](https://docs.python.org/3/library/logging.config.html#access-to-internal-objects)\
    \ for details about a similar mechanism based on `cfg://` prefix to refer to objects\
    \ internal to a configuration.\n\n- An *alert* handler that formats ERROR and\
    \ CRITICAL log requests via the *detailed* formatter and emails the resulting\
    \ log entry to the given email addresses. The keys `mailhost`, `fromaddr`, `toaddrs`,\
    \ and `subject` are passed as keyword arguments to `logging.handlers.SMTPHandler`'s\
    \ constructor.\n\n### Loggers\n\nThe `loggers` key maps to a dictionary of strings\
    \ that serve as *logger names* and dictionaries that serve as logger configurations.\
    \ The string value of the (optional) `level` key specifies the logging level of\
    \ the logger. The boolean value of the (optional) `propagate` key specifies the\
    \ propagation setting of the logger. The list of values of the (optional) `filters`\
    \ key specifies the ids of the filters of the logger. Likewise, the list of values\
    \ of the (optional) `handlers` key specifies the ids of the handlers of the logger.\n\
    \n```\n\"loggers\": {\n    \"app\": {\n        \"handlers\": [\"stderr\", \"alert\"\
    ],\n        \"level\": \"WARNING\"\n    },\n    \"app.io\": {\n        \"level\"\
    : \"INFO\"\n    }\n}\n```\n\nThis configuration snippet results in the creation\
    \ of two loggers. The first logger is named *app*, its threshold logging level\
    \ is set to WARNING, and it is configured to forward log requests to *stderr*\
    \ and *alert* handlers. The second logger is named *app.io*, and its threshold\
    \ logging level is set to INFO. Since a log request is propagated to the handlers\
    \ associated with every ascendant logger, every log request with INFO or higher\
    \ logging level made via *app.io* logger will be propagated to and handled by\
    \ both *stderr* and *alert* handlers.\n\n### Root Logger\n\nThe `root` key maps\
    \ to a dictionary of configuration for the root logger. The format of the mapped\
    \ dictionary is the same as the mapped dictionary for a logger.\n\n### Incremental\
    \ Configuration\n\nThe `incremental` key maps to either `True` or `False` (default).\
    \ If `True`, then only logging levels and propagate options of loggers, handlers,\
    \ and root loggers are processed, and all other bits of the configuration is ignored.\
    \ This key is useful to alter existing logging configuration. Refer to [Incremental\
    \ Configuration](https://docs.python.org/3/library/logging.config.html#logging-config-dict-incremental)\
    \ for more details.\n\n### Disabling Existing Loggers\n\nThe `disable_existing_loggers`\
    \ key maps to either `True` (default) or `False`. If `False`, then all existing\
    \ non-root loggers are disabled as a result of processing this configuration.\n\
    \n### Version\n\nThe `version` key must be set to 1. This key is required for\
    \ the configuration dictionary to be processed by `logging.config.dictConfig()`.\n\
    \n## Complete Configuration Example\n\nHere's the complete configuration composed\
    \ of the above snippets.\n\n```\n{\n    \"version\": 1,\n    \"filters\": {\n\
    \        \"io_filter\": {\n            \"name\": \"app.io\"\n        }\n    },\n\
    \    \"formatters\": {\n        \"simple\": {\n            \"format\": \"%(asctime)s\
    \ - %(message)s\",\n            \"datefmt\": \"%y%j-%H%M%S\"\n        },\n   \
    \     \"detailed\": {\n            \"format\": \"%(asctime)s - %(pathname)s:%(lineno)s\
    \ - %(message)s\"\n        }\n    },\n    \"handlers\": {\n        \"stderr\"\
    : {\n            \"class\": \"logging.StreamHandler\",\n            \"level\"\
    : \"INFO\",\n            \"filters\": [\"io_filter\"],\n            \"formatter\"\
    : \"simple\",\n            \"stream\": \"ext://sys.stderr\"\n        },\n    \
    \    \"alert\": {\n            \"class\": \"logging.handlers.SMTPHandler\",\n\
    \            \"level\": \"ERROR\",\n            \"formatter\": \"detailed\",\n\
    \            \"mailhost\": \"smtp.skynet.com\",\n            \"fromaddr\": \"\
    logging@skynet.com\",\n            \"toaddrs\": [ \"admin1@skynet.com\", \"admin2@skynet.com\"\
    \ ],\n            \"subject\": \"System Alert\"\n        }\n    },\n    \"loggers\"\
    : {\n        \"app\": {\n            \"handlers\": [\"stderr\", \"alert\"],\n\
    \            \"level\": \"WARNING\"\n        },\n        \"app.io\": {\n     \
    \       \"level\": \"INFO\"\n        }\n    }\n}\n```"
