  md: "# Do not execute inactive logging statements\n\nUpon adding the `logging` module\
    \ to Python's standard library, there were concerns about the execution cost associated\
    \ with *inactive logging statements* ŌĆö logging statements that issue log requests\
    \ with logging level lower than the threshold logging level of the target logger.\
    \ For example, *how much extra time will a logging statement that invokes `logger.debug(...)`\
    \ add to a program's execution time when the threshold logging level of `logger`\
    \ is `logging.WARN`?* This concern led to client-side coding patterns (as shown\
    \ below) that used the threshold logging level of the target logger to control\
    \ the execution of the logging statement.\n\n```\n# client code\n...\nif logger.isEnabledFor(logging.DEBUG):\n\
    \    logger.debug(msg)\n...\n```\n\nToday, this concern is not valid because the\
    \ logging methods in `logging.Logger` class perform similar checks and process\
    \ the log requests only if the checks pass. For example, as shown below, the above\
    \ check is performed in the `logging.Logger.debug` method.\n\n```\n# client code\n\
    ...\nlogger.debug(msg)\n...\n\n# logging library code\n\nclass Logger:\n    ...\n\
    \    def debug(self, msg, *args, **kwargs):\n        if self.isEnabledFor(DEBUG):\n\
    \            self._log(DEBUG, msg, args, **kwargs)\n```\n\nConsequently, inactive\
    \ logging statements *effectively* turn into no-op statements and do not contribute\
    \ to the execution cost of the program.\n\nEven so, one should consider the following\
    \ two aspects when adding logging statements.\n\n+   1. Each invocation of a logging\
    \ method incurs a small overhead associated with the invocation of the logging\
    \ method and the check to determine if the logging request should proceed, e.g.,\
    \ a million invocations of `logger.debug(...)` when threshold logging level of\
    \ `logger` was `logging.WARN` took half a second on a typical laptop. So, while\
    \ the cost of an inactive logging statement is trivial, the total execution cost\
    \ of numerous inactive logging statements can quickly add up to be non-trivial."
  merge: -1
  pgno: 31
- img_proc: true
  md: '2. While disabling a logging statement inhibits the processing of log requests,
    it does not inhibit the calculation/creation of arguments to the logging statement.
    So, if such calculations/creations are expensive, then they can contribute non-trivially
    to the execution cost of the program even when the corresponding logging statement
    is inactive.


    # Do not construct log messages eagerly


    Clients can construct log messages in two ways: eagerly and lazily.


    +   1. The client constructs the log message and passes it on to the logging method,
    e.g., `logger.debug(f''Entering method Foo: {x=}, {y=}'')`. This approach offers
    formatting flexibility via f-strings and `format()` method, but it involves the
    eager construction of log messages, i.e., before the logging statements are deemed
    as active.

    2. The client provides a printf-style message format string (as msg argument)
    and the values (as args argument) to construct the log message to the logging
    method, e.g., `logger.debug(''Entering method %s: x=%d, y=%f'', ''Foo'', x, y)`.
    After the logging statement is deemed as active, the logger constructs the log
    message using the string formatting operator %. This approach relies on an older
    and quirky string formatting feature of Python but it involves the lazy construction
    of log messages.


    While both approaches result in the same outcome, they exhibit different performance
    characteristics due to the eagerness and laziness of message construction.


    For example, on a typical laptop, a million inactive invocations of `logger.debug(''Test
    message {0}''.format(t))` takes 2197ms while a million inactive invocations of
    `logger.debug(''Test message %s'', t)` takes 1111ms when t is list of four integers.
    In the case of a million active invocations, the first approach takes 11061ms
    and the second approach took 10149ms. **A savings of 9ŌĆō50% of the time taken for
    logging!**


    So, the second (lazy) approach is more performant than the first (eager) approach
    in cases of both inactive and active logging statements. Further, the gains would
    be larger when the message construction is non-trivial, e.g., use of many arguments,
    conversion of complex arguments to strings.


    # Do not gather unnecessary under-the-hood information


    By default, when a log record is created, the following data are captured in the
    log record.


    +   1. Identifier of the current process

    2. Identifier and name of the current thread

    3. Name of the current process in the multiprocessing framework'
