  md: 'Logging levels can have names. When names are available, logging levels appear
    by their names in log entries. Every pre-defined logging level has the same name
    as the name of the corresponding constant; hence, they appear by their names in
    log entries, e.g., `logging.WARNING` and 30 levels appear as ŌĆśWARNINGŌĆÖ. In contrast,
    custom logging levels are unnamed by default. So, an unnamed custom logging level
    with numeric value n appears as ŌĆśLevel nŌĆÖ in log entries, and this results in
    inconsistent and human-unfriendly log entries. To address this, clients can name
    a custom logging level using the module-level function `logging.addLevelName(level,
    levelName)`ŌüČ. For example, by using `logging.addLevelName(33, ''CUSTOM1'')`, level
    33 will be recorded as ŌĆśCUSTOM1ŌĆÖ.


    PythonŌĆÖs logging library adopts the community-wide applicability rules for logging
    levels, i.e., *when should logging level X be used?*ŌüĘ


    +   1. Use `logging.DEBUG` to log detailed information, typically of interest
    only when diagnosing problems, e.g., when the app starts.

    2. Use `logging.INFO` to confirm the software is working as expected, e.g., when
    the app initializes successfully.

    3. Use `logging.WARNING` to report behaviors that are unexpected or are indicative
    of future problems but do not affect the current functioning of the software,
    e.g., when the app detects low memory, and this could affect the future performance
    of the app.

    4. Use `logging.ERROR` to report the software has failed to perform some function,
    e.g., when the app fails to save the data due to insufficient permission.

    5. Use `logging.CRITICAL` to report serious errors that may prevent the continued
    execution of the software, e.g., when the app fails to allocate memory.


    # Loggers


    The `logging.Logger`ŌüĖ objects offer the primary interface to the logging library.
    These objects provide the logging methods to issue log requests along with the
    methods to query and modify their state. (We will refer to Logger objects as loggers.)


    **Creation** The factory function `logging.getLogger(name)`Ōü╣ is typically used
    to create loggers. By using the factory function, clients can rely on the library
    to manage loggers and to access loggers via their names instead of storing and
    passing references to loggers.


    The `name` argument in the factory function is typically a dot-separated hierarchical
    name, e.g., *a.b.c*. This naming convention enables the library to maintain a
    hierarchy of loggers. Specifically, when the factory function creates a logger,
    the library ensures a logger exists for each level of the hierarchy specified
    by the name and every logger in the hierarchy is linked to its parent and child
    loggers.


    **Threshold Logging Level** Each logger has a threshold logging level that determines
    if a log request should be processed. A logger processes a log request if the
    numeric value of the requested logging


