    When the factory function is used to create a logger, the function sets a logger''s
    threshold logging level to the threshold logging level of its parent logger as
    determined by its name.


    ## Logging Methods


    Every logger offers the following logging methods to issue log requests.


    - `Logger.critical(msg, *args, **kwargs)`

    - `Logger.error(msg, *args, **kwargs)`

    - `Logger.debug(msg, *args, **kwargs)`

    - `Logger.info(msg, *args, **kwargs)`

    - `Logger.warn(msg, *args, **kwargs)`


    Each of these methods is a shorthand to issue log requests with corresponding
    pre-defined logging level as the requested logging level.


    In addition to the above methods, loggers also offer the following two methods.


    - `Logger.log(level, msg, *args, **kwargs)` issues log requests with explicitly
    specified logging levels. This method is useful when using custom logging levels.

    - `Logger.exception(msg, *args, **kwargs)` issues log requests with the logging
    level ERROR and that capture the current exception as part of the log entries.
    Consequently, clients should invoke this method only from an exception handler.


    `msg` and `args` arguments in the above methods are combined to create log messages
    captured by log entries. All of the above methods support the keyword argument
    `exc_info` to add exception information to log entries and `stack_info` and `stacklevel`
    to add call stack information to log entries. Also, they support the keyword argument
    `extra`, which is a dictionary, to pass values relevant to `filters`, `handlers`,
    and `formatters`.


    When executed, the above methods perform/trigger all of the tasks shown in Figure
    1 and the following two tasks.


    1. After deciding to process a log request based on its logging level and the
    threshold logging level, the logger creates a `LogRecord` object to represent
    the log request in the downstream processing of the request. LogRecord objects
    capture the msg and args arguments of logging methods and the exception and call
    stack information along with source code information. They also capture the keys
    and values in the extra argument of the logging method as fields.


    2. After every handler of a logger has processed a log request, the handlers of
    its ancestor loggers process the request (in the order they are encountered walking
    up the logger hierarchy). The Logger.propagate field controls this aspect, which
    is True by default.


    Beyond logging levels, filters provide a finer means to filter log requests based
    on the information in a log record, e.g., ignore log requests issued in a specific
    class. Clients can add and remove filters to/from loggers using Logger.addFilter(filter)
    and Logger.removeFilter(filter) methods, respectively.


    ## Filters


    Any function or callable that accepts a log record argument and returns zero to
    reject the record and a non-zero value to admit the record can serve as a filter.
    Any object that offers a method with the signature filter(record: LogRecord) ->
    int can also serve as a filter.


    A subclass of logging.Filter(name: str) that optionally overrides the logging.Filter.filter(record)
    method can also serve as a filter. Without overriding the filter method, such
    a filter will admit records emitted by loggers that have the same name as the
    filter and are children of the filter (based on the name of the loggers and the
    filter). If the name of the filter is empty, then the filter admits all records.
    If the method is overridden, then it should return zero value to reject the record
    and non-zero value to admit the record.


    ## Handlers


    The logging.Handler objects perform the final processing of log records, i.e.,
    logging log requests. This final processing often translates into storing the
    log record, e.g., write it into system logs or files. It can also translate into
    communicating the data in log record to specific entities (e.g., send an email)
    or passing the log record to other entities for further processing (e.g., provide
    the log record to a log collection process or a log collection service).


    Like loggers, handlers have a threshold logging level, which can be set via Handler.setLevel(level)
    method. They also support filters via Handler.addFilter(filter) and Handler.removeFilter(filter)
    methods.


    The handlers use their threshold logging level and filters to filter log records
    for processing. This additional filtering allows context-specific control over
    logging, e.g., a notifying handler should only process log requests that are critical
    or from a flaky module.


    While processing the log records, handlers format log records into log entries
    using their formatters. Clients can set the formatter for a handler via `Handler.setFormatter(formatter)`
    method. If a handler does not have a formatter, then it uses the default formatter
    provided by the library.


    The `logging.handler` module provides a rich collection of 15 useful handlers
    that cover many common use cases (including the ones mentioned above). So, instantiating
    and configuring these handlers suffices in many situations.


    In situations that warrant custom handlers, developers can extend the Handler
    class or one of the pre-defined Handler classes by implementing `Handler.emit(record)`
    method to log the provided log record.


    ## Formatters


    The handlers use `logging.Formatter` objects to format a log record into a string-based
    log entry. [Note: Formatters do not control the creation of log messages.] A formatter
    works by combining the fields/data in a log record with the user-specified format
    string.


    Unlike handlers, the logging library only provides a basic formatter that logs
    the requested logging level, the logger''s name, and the log message. So, beyond
    simple use cases, clients need to create new formatters by creating `logging.Formatter`
    objects with the necessary format strings.


    Formatters support three styles of format strings:


    - `printf`, e.g., `''%(levelname)s:%(name)s:%(message)s''`

    - `str.format()`, e.g., `''{levelname}:{name}:{message}''`

    - `str.template`, e.g., `$levelname:$name:$message`


    The format string of a formatter can refer to any field of `LogRecord` objects,
    including the fields based on the keys of the `extra` argument of the logging
    method.


    Before formatting a log record, the formatter uses the `LogRecord.getMessage()`
    method to construct the log message by combining the `msg` and `args` arguments
    of the logging method (stored in the log record) using the string formatting operator
    (`%`). The formatter then combines the resulting log message with the data in
    the log record using the specified format string to create the log entry.'
