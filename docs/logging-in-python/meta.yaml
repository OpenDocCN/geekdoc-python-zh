    level is greater than or equal to the numeric value of the logger''s threshold
    logging level. Clients can retrieve and change the threshold logging level of
    a logger via `Logger.getEffectiveLevel()` and `Logger.setLevel(level)` methods,
    respectively.


    When the factory function is used to create a logger, the function sets a logger''s
    threshold logging level to the threshold logging level of its parent logger as
    determined by its name.


    **Logging Methods** Every logger offers the following logging methods to issue
    log requests.


    +   - `Logger.critical(msg, *args, **kwargs)`

    - `Logger.error(msg, *args, **kwargs)`

    - `Logger.debug(msg, *args, **kwargs)`

    - `Logger.info(msg, *args, **kwargs)`

    - `Logger.warn(msg, *args, **kwargs)`


    Each of these methods is a shorthand to issue log requests with corresponding
    pre-defined logging level as the requested logging level.


    In addition to the above methods, loggers also offer the following two methods.


    +   - `Logger.log(level, msg, *args, **kwargs)` issues log requests with explicitly
    specified logging levels. This method is useful when using custom logging levels.

    - `Logger.exception(msg, *args, **kwargs)` issues log requests with the logging
    level ERROR and that capture the current exception as part of the log entries.
    Consequently, clients should invoke this method only from an exception handler.


    `msg` and `args` arguments in the above methods are combined to create log messages
    captured by log entries. All of the above methods support the keyword argument
    `exc_info` to add exception information to log entries and `stack_info` and `stacklevel`
    to add call stack information to log entries. Also, they support the keyword argument
    `extra`, which is a dictionary, to pass values relevant to `filters`, `handlers`,
    and `formatters`.


    When executed, the above methods perform/trigger all of the tasks shown in Figure
    1 and the following two tasks.


    +   1. After deciding to process a log request based on its logging level and
    the threshold logging level, the logger creates a `LogRecord` object to represent
    the log request in the downstream


