    # Customizing via Factory Functions


    The configuration schema for filters supports a pattern to specify a factory function
    to create a filter. In this pattern, a filter configuration maps the `()` key
    to the fully qualified name of a filter creating factory function along with a
    set of keys and values to be passed as keyword arguments to the factory function.
    In addition, attributes and values can be added to custom filters by mapping `.`
    key to a dictionary of attribute names and values.


    For example, the below configuration will cause the invocation of `app.logging.customFilterFactory(startTime=''6PM'',
    endTime=''6AM'')` to create a custom filter and the addition of `local` attribute
    with the value `True` to this filter.


    ```

    1   "filters": {

    2     "time_filter": {

    3       "()": "app.logging.create_custom_factory",

    4       "startTime": "6PM",

    5       "endTime": "6PM",

    6       ".": {

    7         "local": true

    8       }

    9     }

    10   }

    ```


    Configuration schemas for formatters, handlers, and loggers also support the above
    pattern. In the case of handlers/loggers, if this pattern and the `class` key
    occur in the configuration dictionary, then this pattern is used to create handlers/loggers.
    Refer to [User-defined Objects](https://docs.python.org/3/library/logging.config.html#user-defined-objects)
    for more details.


