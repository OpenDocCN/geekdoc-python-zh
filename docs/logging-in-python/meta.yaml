- md: "## Configuring Over The Wire\n\nWhile the above APIs can be used to update\
    \ the logging configuration when the client is running (e.g., web services), programming\
    \ such update mechanisms from scratch can be cumbersome. The `logging.config.listen()`\
    \ function alleviates this issue. This function starts a socket server that accepts\
    \ new configurations over the wire and loads them via `dictConfig()` or `fileConfig()`\
    \ functions. Refer to `logging.config.listen()`<sup>51</sup> for more details.\n\
    \n## Loading and Storing Configuration\n\nSince the configuration provided to\
    \ `dictConfig()` is nothing but a collection of nested dictionaries, a logging\
    \ configuration can be easily represented in JSON and YAML format. Consequently,\
    \ programs can use the `json` module in Python's standard library or external\
    \ YAML processing libraries to read and write logging configurations from files.\n\
    \nFor example, the following snippet suffices to load logging configuration stored\
    \ in JSON format.\n\n```python\nimport json, logging.config\n\nwith open('logging-config.json',\
    \ 'rt') as f:\n    config = json.load(f)\n    logging.config.dictConfig(config)\n\
    ```\n\n## Limitations\n\nIn the supported configuration scheme, we cannot configure\
    \ filters to filter beyond simple name-based filtering. For example, we cannot\
    \ create a filter that admits only log requests created between 6 PM and 6 AM.\
    \ We need to program such filters in Python and add them to loggers and handlers\
    \ via `factory functions` or `addFilter()` method.\n\n<sup>51</sup>https://docs.python.org/3/library/logging.config.html#logging.config.listen\n\
    \n## Good Practices and Gotchas\n\nIn this chapter, we will list few good practices\
    \ and gotchas related to the logging library. This list stems from on our experience,\
    \ and we intend it complements the extensive information available in the [Logging\
    \ HOWTO](https://docs.python.org/3/howto/logging.html#logging-howto) and [Logging\
    \ Cookbook](https://docs.python.org/3/howto/logging-cookbook.html#logging-cookbook)\
    \ sections of PythonŌĆÖs documentation.\n\nSince there are no silver bullets, all\
    \ good practices and gotchas have exceptions that are almost always contextual.\
    \ So, before using the following good practices and gotchas, consider their applicability\
    \ in the context of your application and ascertain that they are appropriate in\
    \ your applicationŌĆÖs context.\n\n## Good Practices\n\n### Create loggers using\
    \ the `logging.getLogger()` factory function\n\nThe factory function helps the\
    \ library manager the mapping from logger names to logger instances and maintain\
    \ a hierarchy of loggers. In turn, this mapping and hierarchy offer the following\
    \ benefits.\n\n1. Clients can use the factory function to access the same logger\
    \ in different parts of the program by merely retrieving the logger by its name.\n\
    2. Only a finite number of loggers are created at runtime (except under pathological\
    \ circumstances).\n3. Log requests can be propagated up the logger hierarchy.\n\
    4. When unspecified, the threshold logging level of a logger can be inferred from\
    \ its ascendants.\n5. The configuration of the logging library can be updated\
    \ at runtime by merely relying on the logger names.\n\n### Use `logging.<logging\
    \ level>()` function or `Logger.<logging level>()` methods to log at pre-defined\
    \ logging levels\n\nBesides making the code a bit shorter, the use of these functions/methods\
    \ helps partition the logging statements in a program into two sets: those that\
    \ issue log requests with pre-defined logging levels and those that issue log\
    \ requests with custom logging levels.\n\n### Use pre-defined logging levels\n\
    \nAs described in the [Logging Level](https://docs.python.org/3/library/logging.html#logging-levels)\
    \ section in [Concepts and API](https://docs.python.org/3/library/logging.html#concepts-and-terminology)\
    \ chapter, the pre-defined logging levels offered by the library capture almost\
    \ all logging scenarios that occur in programs. Further, since most developers\
    \ are familiar with pre-defined logging levels (as most logging libraries across\
    \ different programming languages offer very similar levels), the use of pre-defined\
    \ levels can help lower deployment, configuration, and maintenance burden. So,\
    \ unless required, use pre-defined logging levels.\n\n### Create module-level\
    \ loggers\n\nWhile creating loggers, we can create a logger for each class or\
    \ create a logger for each module. While the first option enables fine-grained\
    \ configuration, it leads to more number of loggers in a program, i.e., one per\
    \ class. In contrast, the second option can help reduce the number of loggers\
    \ in a program. So, unless such fine-grained configuration is necessary, create\
    \ module-level loggers.\n\n### Name module-level loggers with the name of the\
    \ corresponding modules.\n\nSince the logger names are string values that are\
    \ not part of the namespace of a Python program, they will not clash with module\
    \ names. Hence, use the name of a module as the name of the corresponding module-level\
    \ logger. With this naming, logger naming piggybacks on the dot notation based\
    \ module naming and, consequently, simplifies referring of loggers.\n\n### Use\
    \ `logging.LoggerAdapter` to inject local contextual information\n\nAs demonstrated\
    \ in [Snippet 4](https://docs.python.org/3/library/logging.html#snippet-4), we\
    \ can use `logging.LoggerAdapter`[^54] to inject contextual information into log\
    \ records. LoggerAdapter can also be used to modify the log message and the log\
    \ data provided as part of a log request.\n\nSince the logging library does not\
    \ manage these adapters, they cannot be accessed via common names. For this reason,\
    \ use them to inject contextual information that is local to a module or a class.\n\
    \n### Use filters or `logging.setLogRecordFactory()` to inject global contextual\
    \ information\n\nThere are two options to seamlessly inject global contextual\
    \ information (that is common across an app) into log records.\n\n1. The first\
    \ option is to use the filter support to modify the log record arguments provided\
    \ to filters. For example, the following filter injects version information into\
    \ incoming log records.\n\n[^54]: https://docs.python.org/3/library/logging.html#loggeradapter-objects\n\
    \n```python\ndef version_injecting_filter(logRecord):\n    logRecord.version =\
    \ '3'\n    return True\n```\n\nThere are two downsides to this option. First,\
    \ if filters depend on the data in log records, then filters that inject data\
    \ into log records should be executed before filters that use the injected data.\
    \ Hence, the order of filters added to loggers and handlers becomes crucial. Second,\
    \ the option ŌĆ£abusesŌĆØ the support to filter log records to extend log records.\n\
    \n2. The second option is to initialize the logging library with a log record\
    \ creating factory function via `logging.setLogRecordFactory()`[^55]. Since the\
    \ injected contextual information is global, it can be injected into log records\
    \ when they are created in the factory function and be sure the data will be available\
    \ to every filter, formatter, logger, and handler in the program.\n\nThe downside\
    \ of this option is that we have to ensure factory functions contributed by different\
    \ components in a program play nice with each other. While `log record factory\
    \ functions could be chained`[^56], such chaining increases the complexity of\
    \ programs.\n\n### Use the data-based approach to configure the logging library\n\
    \nIf your program involves multiple modules and possibly third-party components,\
    \ then use the data-based approach described in the `Configuration` chapter to\
    \ configure the logging library.\n\n### Attach common handlers to the loggers\
    \ higher up the logger hierarchy\n\nIf a handler is common to two loggers of which\
    \ one is the descendant of the other, then attach the handler to the ascendant\
    \ logger and rely on the logging library to propagate the log requests from the\
    \ descendant logger to the handlers of the ascendant logger. If the `propagate`[^57]\
    \ attribute of loggers has not been modified, this pattern helps avoid duplicate\
    \ messages.\n\n### Use `logging.disable()` function to inhibit the processing\
    \ of log requests below a certain logging level across all loggers\n\nA logger\
    \ processes a log request if the logging level of the log request is at least\
    \ as high as the loggerŌĆÖs effective logging level. A loggerŌĆÖs effective logging\
    \ level is the higher of two logging levels: the loggerŌĆÖs threshold logging level\
    \ and the library-wide logging level. We can set the library-wide logging level\
    \ via `logging.disable(level)`[^58] function. By default, the library-wide logging\
    \ level is 0, i.e., log requests of every logging level will be processed.\n\n\
    Using this function, we can throttle the logging output of an app by increasing\
    \ the logging level across the entire app.\n\n[^55]: https://docs.python.org/3/library/logging.html#logging.setLogRecordFactory\n\
    [^56]: https://docs.python.org/3/library/logging.html#logrecord-objects\n[^57]:\
    \ https://docs.python.org/3/library/logging.html#logging.Logger.propagate\n[^58]:\
    \ https://docs.python.org/3/library/logging.html#logging.disable"
