  md: '# Keys in the `extra` argument clash with required attributes


    The logging library adds the keys of the `extra` argument (to various logging
    methods) as attributes to log records. However, if `asctime` and `message` occur
    as keys in the `extra` argument, then the creation of log records will fail, and
    the corresponding log request will not be logged.


    Similar failure occurs if `args`, `exc_info`, `lineno`, `msg`, `name`, or `pathname`
    occur as keys in the `extra` argument; these are attributes of `LogRecord` class.


    > Ensure `asctime`, `message`, and certain attributes of `LogRecord` do not appear
    as keys in the `extra` argument of logging methods.


    # Libraries using custom logging levels are combined


    When a program and its dependent libraries use the logging library, their logging
    requirements are combined by the underlying logging library that services these
    requirements. In this case, if the components of a program use custom logging
    levels that are mutually inconsistent, then the logging outcome can be unpredictable.


    > Don''t use custom logging levels, specifically, in libraries.


    # Filters of ancestor loggers do not fire


    By default, log requests are propagated up the logger hierarchy to be processed
    by the handlers of ancestor loggers. While the filters of the handlers process
    such log requests, the filters of the corresponding loggers do not process such
    log requests.


    > To apply a filter to all log requests submitted to a logger, add the filter
    to the logger.


    # Ids of handlers/filters/formatters clash


    If multiple handlers share the same handler id in a configuration, then the handler
    id refers to the handler that is created last when the configuration is processed.
    The same happens amongst filters and formatters that share ids.


    When a client terminates, the logging library will execute the cleanup logic of
    the handler associated with each handler id. So, if multiple handlers have the
    same id in a configuration, then the cleanup logic of all but the handler created
    last will not be executed and, hence, result in resource leaks.


    > Use unique ids for objects of a kind in a configuration.'
  merge: -1
