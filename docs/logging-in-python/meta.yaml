  md: '# Good Practices and Gotchas


    In this chapter, we will list few good practices and gotchas related to the logging
    library. This list stems from on our experience, and we intend it complements
    the extensive information available in the [Logging HOWTO](https://docs.python.org/3/howto/logging.html#logging-howto)
    and [Logging Cookbook](https://docs.python.org/3/howto/logging-cookbook.html#logging-cookbook)
    sections of PythonŌĆÖs documentation.


    Since there are no silver bullets, all good practices and gotchas have exceptions
    that are almost always contextual. So, before using the following good practices
    and gotchas, consider their applicability in the context of your application and
    ascertain that they are appropriate in your applicationŌĆÖs context.


    # Good Practices


    # Create loggers using the `logging.getLogger()` factory function


    The factory function helps the library manager the mapping from logger names to
    logger instances and maintain a hierarchy of loggers. In turn, this mapping and
    hierarchy offer the following benefits.


    +   1. Clients can use the factory function to access the same logger in different
    parts of the program by merely retrieving the logger by its name.

    2. Only a finite number of loggers are created at runtime (except under pathological
    circumstances).

    3. Log requests can be propagated up the logger hierarchy.

    4. When unspecified, the threshold logging level of a logger can be inferred from
    its ascendants.

    5. The configuration of the logging library can be updated at runtime by merely
    relying on the logger names.


    # Use `logging.<logging level>()` function or `Logger.<logging level>()` methods
    to log at pre-defined logging levels


    Besides making the code a bit shorter, the use of these functions/methods helps
    partition the logging statements in a program into two sets: those that issue
    log requests with pre-defined logging levels and those that issue log requests
    with custom logging levels.'
  merge: -1
  pgno: 25
- img_proc: true
  md: '# Use pre-defined logging levels


    As described in the [Logging Level](https://docs.python.org/3/library/logging.html#logging-levels)
    section in [Concepts and API](https://docs.python.org/3/library/logging.html#concepts-and-terminology)
    chapter, the pre-defined logging levels offered by the library capture almost
    all logging scenarios that occur in programs. Further, since most developers are
    familiar with pre-defined logging levels (as most logging libraries across different
    programming languages offer very similar levels), the use of pre-defined levels
    can help lower deployment, configuration, and maintenance burden. So, unless required,
    use pre-defined logging levels.


    # Create module-level loggers


    While creating loggers, we can create a logger for each class or create a logger
    for each module. While the first option enables fine-grained configuration, it
    leads to more number of loggers in a program, i.e., one per class. In contrast,
    the second option can help reduce the number of loggers in a program. So, unless
    such fine-grained configuration is necessary, create module-level loggers.


    # Name module-level loggers with the name of the corresponding modules.


    Since the logger names are string values that are not part of the namespace of
    a Python program, they will not clash with module names. Hence, use the name of
    a module as the name of the corresponding module-level logger. With this naming,
    logger naming piggybacks on the dot notation based module naming and, consequently,
    simplifies referring of loggers.


    # Use `logging.LoggerAdapter` to inject local contextual information


    As demonstrated in [Snippet 4](https://docs.python.org/3/library/logging.html#snippet-4),
    we can use `logging.LoggerAdapter`[^54] to inject contextual information into
    log records. LoggerAdapter can also be used to modify the log message and the
    log data provided as part of a log request.


    Since the logging library does not manage these adapters, they cannot be accessed
    via common names. For this reason, use them to inject contextual information that
    is local to a module or a class.


    # Use filters or `logging.setLogRecordFactory()` to inject global contextual information


    There are two options to seamlessly inject global contextual information (that
    is common across an app) into log records.


    +   1. The first option is to use the filter support to modify the log record
    arguments provided to filters. For example, the following filter injects version
    information into incoming log records.


    [^54]: https://docs.python.org/3/library/logging.html#loggeradapter-objects'
