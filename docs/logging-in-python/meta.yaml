- img_proc: true
  md: '4. Filename, line number, function name, and call stack info of the logging
    statement


    Unless these bits of data are logged, gathering them unnecessarily increases the
    execution cost. So, if these bits of data will not be logged, then configure the
    logging framework to not gather them by setting the following flags.


    +   1. logging.logProcesses = False

    2. logging.logThreads = False

    3. logging.logMultiProcessing = False

    4. logging._srcFile = None


    # Do not block the main thread of execution


    There are situations where we may want to log data in the main thread of execution
    without spending almost any time logging the data. Such situations are common
    in web services, e.g., a request processing thread needs to log incoming web requests
    without significantly increasing its response time. We can tackle these situations
    by *separating concerns across threads*: a client/main thread creates a log record
    while a logging thread logs the record. Since the task of logging is often slower
    as it involves slower resources (e.g., secondary storage) or other services (e.g.,
    logging services such as Coralogix, pub-sub systems such as Kafka), this separation
    of concerns helps minimize the effort of logging on the execution time of the
    main/client thread.


    The Python logging library helps handle such situations via the [QueueHandler](https://docs.python.org/3/library/logging.handlers.html#logging.handlers.QueueHandler)
    and [QueueListener](https://docs.python.org/3/library/logging.handlers.html#queuehandler)
    classes as follows.


    +   1. A pair of `QueueHandler` and `QueueListener` instances are initialized
    with a queue.

    2. When the `QueueHandler` instance receives a log record from the client, it
    merely places the log request in its queue while executing in the client''s thread.
    Given the simplicity of the task performed by the `QueueHandler`, the client thread
    hardly pauses.

    3. When a log record is available in the `QueueListener`''s queue, the listener
    retrieves the log record and executes the handlers registered with the listener
    to handle the log record. In terms of execution, the listener and the registered
    handlers execute in a dedicated thread that is different from the client thread.


    **Note:** While `QueueListener` comes with a default threading strategy, developers
    are not required to use this strategy to use `QueueHandler`. Instead, developers
    can use alternative threading strategies that meet their needs.'
  merge: -1
