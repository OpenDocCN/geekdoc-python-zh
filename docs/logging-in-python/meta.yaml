  - '[PAGE 12]


    processing of the request. LogRecord objects capture the msg and args arguments
    of logging methods and the exception and call stack information along with source
    code information. They also capture the keys and values in the extra argument
    of the logging method as fields.


    +   2. After every handler of a logger has processed a log request, the handlers
    of its ancestor loggers process the request (in the order they are encountered
    walking up the logger hierarchy). The Logger.propagate field controls this aspect,
    which is True by default.


    Beyond logging levels, filters provide a finer means to filter log requests based
    on the information in a log record, e.g., ignore log requests issued in a specific
    class. Clients can add and remove filters to/from loggers using Logger.addFilter(filter)20
    and Logger.removeFilter(filter)21 methods, respectively.


    # Filters


    Any function or callable that accepts a log record argument and returns zero to
    reject the record and a non-zero value to admit the record can serve as a filter22.
    Any object that offers a method with the signature filter(record: LogRecord) ->
    int can also serve as a filter.


    A subclass of logging.Filter(name: str) that optionally overrides the logging.Filter.filter(record)
    method can also serve as a filter. Without overriding the filter method, such
    a filter will admit records emitted by loggers that have the same name as the
    filter and are children of the filter (based on the name of the loggers and the
    filter). If the name of the filter is empty, then the filter admits all records.
    If the method is overridden, then it should return zero value to reject the record
    and non-zero value to admit the record.


    # Handlers


    The logging.Handler23 objects perform the final processing of log records, i.e.,
    logging log requests. This final processing often translates into storing the
    log record, e.g., write it into system logs24 or files25. It can also translate
    into communicating the data in log record to specific entities (e.g., send an
    email26) or passing the log record to other entities for further processing (e.g.,
    provide the log record to a log collection process27 or a log collection service28).


    Like loggers, handlers have a threshold logging level, which can be set via Handler.setLevel(level)29
    method). They also support filters via Handler.addFilter(filter)30 and Handler.removeFilter(filter)31
    methods.


