    ## Preface


    This booklet is about *how to use the built-in support for logging in Python*.
    It introduces various concepts relevant to understanding logging in Python, discusses
    the corresponding logging APIs in Python and how to use them, and presents best
    practices and performance considerations for using these APIs.


    The booklet does not provide language-agnostic general information about logging,
    e.g., the purpose of logging, best practices while logging, and technologies to
    store and process logs.


    The booklet assumes that the reader has a good grasp of programming in Python,
    specifically, concepts and constructs pertaining to both general and object-oriented
    programming. The information and examples in the booklet are based on Python version
    3.8.


    ## Concepts and API


    Python has offered built-in support for logging since version 2.3. This support
    includes library APIs for common concepts and tasks that are specific to logging
    and language-agnostic. This chapter introduces these concepts and tasks as realized
    and supported in PythonŌĆÖs logging library.


    ## Logging Concepts


    When we use a logging library, we perform/trigger the following common tasks while
    using the associated concepts (highlighted in bold).


    1.  A client issues a **log request** by executing a **logging statement**. Often,
    such logging statements invoke a function/method in the **logging (library) API**
    by providing the **log data** and the **logging level** as arguments. The logging
    level specifies the importance of the log request. Log data is often a **log message**,
    which is a string, along with some **extra data** to be logged. Often, the logging
    API is exposed via **logger** objects.

    2.  To enable the processing of a request as it threads through the logging library,
    the logging library creates a **log record** that represents the log request and
    captures the corresponding log data.

    3.  Based on how the logging library is configured (via a **logging configuration**),
    the logging library filters the log requests/records. This filtering involves
    comparing the requested logging level to the threshold logging level and passing
    the log records through user-provided **filters**.

    4.  **Handlers** process the filtered log records to either store the log data
    (e.g., write the log data into a file) or perform other actions involving the
    log data (e.g., send an email with the log data). In some logging libraries, before
    processing log records, a handler may again filter the log records based on the
    handlerŌĆÖs logging level and user-provided handler-specific **filters**. Also,
    when needed, handlers often rely on user-provided **formatters** to format log
    records into strings, i.e., **log entries**.


    Independent of the logging library, the above tasks are performed in an order
    similar to that shown in Figure 1.


    ![](img/82d135619560522edcfdfa69b3d3cda0_8_0.png)


    Figure 1: The flow of tasks when logging via a logging library


    ## PythonŌĆÖs Logging Library


    PythonŌĆÖs standard library offers support for logging via logging, logging.config,
    and logging.handlers modules.


    - logging module provides the primary client-facing API.

    - logging.config module provides the API to configure logging in a client.

    - logging.handlers module provides different handlers that cover common ways of
    processing and storing log records.


    We collectively refer to these modules as *PythonŌĆÖs logging library*.

    These modules realize the concepts introduced in the previous section as classes,
    a set of module-level functions, or a set of constants. Figure 2 shows these classes
    and the associations between them.


    ![](img/82d135619560522edcfdfa69b3d3cda0_9_0.png)


    ## Logging Level


    Out of the box, PythonŌĆÖs logging library supports five logging levels: *critical*,
    *error*, *warning*, *info*, and *debug*. These levels are denoted by constants
    with the same name in the logging module, i.e., logging.CRITICAL, logging.ERROR,
    logging.WARNING, logging.INFO, and logging.DEBUG. The values of these constants
    are 50, 40, 30, 20, and 10, respectively.


    At runtime, the numeric value of a logging level determines the meaning of a logging
    level. Consequently, clients can introduce new logging levels by using numeric
    values that are greater than 0 and not equal to pre-defined logging levels as
    logging levels.


    Logging levels can have names. When names are available, logging levels appear
    by their names in log entries. Every pre-defined logging level has the same name
    as the name of the corresponding constant; hence, they appear by their names in
    log entries, e.g., `logging.WARNING` and 30 levels appear as ŌĆśWARNINGŌĆÖ. In contrast,
    custom logging levels are unnamed by default. So, an unnamed custom logging level
    with numeric value n appears as ŌĆśLevel nŌĆÖ in log entries, and this results in
    inconsistent and human-unfriendly log entries. To address this, clients can name
    a custom logging level using the module-level function `logging.addLevelName(level,
    levelName)`ŌüČ. For example, by using `logging.addLevelName(33, ''CUSTOM1'')`, level
    33 will be recorded as ŌĆśCUSTOM1ŌĆÖ.


    PythonŌĆÖs logging library adopts the community-wide applicability rules for logging
    levels, i.e., *when should logging level X be used?*ŌüĘ


    1.  Use `logging.DEBUG` to log detailed information, typically of interest only
    when diagnosing problems, e.g., when the app starts.

    2.  Use `logging.INFO` to confirm the software is working as expected, e.g., when
    the app initializes successfully.

    3.  Use `logging.WARNING` to report behaviors that are unexpected or are indicative
    of future problems but do not affect the current functioning of the software,
    e.g., when the app detects low memory, and this could affect the future performance
    of the app.

    4.  Use `logging.ERROR` to report the software has failed to perform some function,
    e.g., when the app fails to save the data due to insufficient permission.

    5.  Use `logging.CRITICAL` to report serious errors that may prevent the continued
    execution of the software, e.g., when the app fails to allocate memory.


    ## Loggers


    The `logging.Logger`ŌüĖ objects offer the primary interface to the logging library.
    These objects provide the logging methods to issue log requests along with the
    methods to query and modify their state. (We will refer to Logger objects as loggers.)


    **Creation** The factory function `logging.getLogger(name)`Ōü╣ is typically used
    to create loggers. By using the factory function, clients can rely on the library
    to manage loggers and to access loggers via their names instead of storing and
    passing references to loggers.


    The `name` argument in the factory function is typically a dot-separated hierarchical
    name, e.g., *a.b.c*. This naming convention enables the library to maintain a
    hierarchy of loggers. Specifically, when the factory function creates a logger,
    the library ensures a logger exists for each level of the hierarchy specified
    by the name and every logger in the hierarchy is linked to its parent and child
    loggers.


