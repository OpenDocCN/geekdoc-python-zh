  - '[PAGE 13]


    The handlers use their threshold logging level and filters to filter log records
    for processing. This additional filtering allows context-specific control over
    logging, e.g., a notifying handler should only process log requests that are critical
    or from a flaky module.


    While processing the log records, handlers format log records into log entries
    using their [formatters](https://docs.python.org/3/library/logging.html#formatter-objects).
    Clients can set the formatter for a handler via `Handler.setFormatter(formatter)`[^32]
    method. If a handler does not have a formatter, then it uses the default formatter
    provided by the library.


    The `logging.handler` module provides [a rich collection of 15 useful handlers](https://docs.python.org/3/howto/logging.html#useful-handlers)[^33]
    that cover many common use cases (including the ones mentioned above). So, instantiating
    and configuring these handlers suffices in many situations.


    In situations that warrant custom handlers, developers can extend the [Handler](https://docs.python.org/3/library/logging.html#logging.Handler)[^34]
    class or one of the [pre-defined Handler classes](https://docs.python.org/3/library/logging.handlers.html)[^35]
    by implementing `Handler.emit(record)`[^36] method to log the provided log record.


    # Formatters


    The handlers use [`logging.Formatter`](https://docs.python.org/3/library/logging.html#formatter-objects)[^37]
    objects to format a log record into a string-based log entry. [Note: Formatters
    do not control the creation of log messages.] A formatter works by combining the
    fields/data in a log record with the user-specified format string.


    Unlike handlers, the logging library only provides a basic formatter that logs
    the requested logging level, the logger''s name, and the log message. So, beyond
    simple use cases, clients need to create new formatters by creation `logging.Formatter`
    objects with the necessary format strings.


    Formatters support three styles of format strings:


    +   - [`printf`](https://docs.python.org/3/library/stdtypes.html#old-string-formatting)[^38],
    e.g., `''%(levelname)s:%(name)s:%(message)s''`

    - [`str.format()`](https://docs.python.org/3/library/stdtypes.html#str.format)[^39],
    e.g., `''{levelname}:{name}:{message}''`

    - [`str.template`](https://docs.python.org/3/library/string.html#template-strings)[^40],
    e.g., `$levelname:$name:$message`


    The format string of a formatter can refer to any field of `LogRecord` objects,
    including the fields based on the keys of the `extra` argument of the logging
    method.


    Before formatting a log record, the formatter uses the `LogRecord.getMessage()`
    method to construct the log message by combining the `msg` and `args` arguments
    of the logging method (stored in the log record) using the [string formatting
    operator (`%`)](https://docs.python.org/3/library/stdtypes.html#printf-style-string-formatting)[^41].
    The formatter then combines the resulting log message with the data in the log
    record using the specified format string to create the log entry.


    [^32]: https://docs.python.org/3/library/logging.html#logging.Handler.setFormatter

    [^33]: https://docs.python.org/3/howto/logging.html#useful-handlers

    [^34]: https://docs.python.org/3/library/logging.html#logging.Handler

    [^35]: https://docs.python.org/3/library/logging.handlers.html

    [^36]: https://docs.python.org/3/library/logging.html#logging.Handler.emit

    [^37]: https://docs.python.org/3/library/logging.html#formatter-objects

    [^38]: https://docs.python.org/3/library/stdtypes.html#old-string-formatting

    [^39]: https://docs.python.org/3/library/stdtypes.html#str.format

    [^40]: https://docs.python.org/3/library/string.html#template-strings

    [^41]: https://docs.python.org/3/library/stdtypes.html#printf-style-string-formatting'
- md: "## Logging Module\n\nTo maintain a hierarchy of loggers, when a client uses\
    \ the logging library, the library creates a *root logger* that serves as the\
    \ root of the hierarchy of loggers. The default threshold logging level of the\
    \ root logger is `logging.WARNING`.\n\nThe module offers all of the logging methods\
    \ offered by Logger class as module-level functions with identical names and signature,\
    \ e.g., `logging.debug(msg, *args, **kwargs)`[^42]. Clients can use these functions\
    \ to issue log requests without creating loggers, and the root logger services\
    \ these requests. If the root logger has no handlers when servicing log requests\
    \ issued via these methods, then the logging library adds a `logging.StreamHandler`\
    \ instance based on `sys.stderr` stream as a handler to the root logger.\n\nWhen\
    \ loggers without handlers receive log requests, the logging library directs such\
    \ log requests to the *last resort handler*, which is a `logging.StreamHandler`\
    \ instance based on `sys.stderr` stream. This handler is accessible via `logging.lastResort`\
    \ attribute.\n\n## Using PythonŌĆÖs Logging Library\n\nHere are few code snippets\
    \ illustrating how to use PythonŌĆÖs logging library.\n\n### Snippet 1: Creating\
    \ a logger with a handler and a formatter\n\n```python\n# main.py\nimport logging,\
    \ sys\n\ndef _init_logger():\n    logger = logging.getLogger('app')  #1\n    logger.setLevel(logging.INFO)\
    \  #2\n    handler = logging.StreamHandler(sys.stderr)  #3\n    handler.setLevel(logging.INFO)\
    \  #4\n    formatter = logging.Formatter(\n        '%(created)f:%(levelname)s:%(name)s:%(module)s:%(message)s')\
    \ #5\n    handler.setFormatter(formatter)  #6\n    logger.addHandler(handler)\
    \  #7\n\n_init_logger()\n_logger = logging.getLogger('app')\n```\n\nThis snippet\
    \ does the following.\n\n1. Create a logger named ŌĆśappŌĆÖ.\n2. Set the threshold\
    \ logging level of the logger to INFO.\n3. Create a stream-based handler that\
    \ writes the log entries into the standard error stream.\n4. Set the threshold\
    \ logging level of the handler to INFO.\n5. Create a formatter to capture\n  \
    \ - the time of the log request as the number of seconds since epoch,\n   - the\
    \ logging level of the request,\n   - the loggerŌĆÖs name,\n   - the name of the\
    \ module issuing the log request, and\n   - the log message.\n6. Set the created\
    \ formatter as the formatter of the handler.\n7. Add the created handler to this\
    \ logger.\n\nBy changing the handler created in step 3, we can redirect the log\
    \ entries to different locations or processors.\n\n### Snippet 2: Issuing log\
    \ requests\n\n```python\n# main.py\n_logger.info('App started in %s', os.getcwd())\n\
    ```\n\nThis snippet logs informational message stating the app has started.\n\
    When the app is started in the folder /home/kali with the logger created using\
    \ snippet 1, this snippet will generate the log entry `1586147623.484407:INFO:app:main:App\
    \ started in /home/kali/` in standard error stream.\n\n### Snippet 3: Issuing\
    \ log requests\n\n```python\n# app/io.py\nimport logging\n\ndef _init_logger():\n\
    \    logger = logging.getLogger('app.io')\n    logger.setLevel(logging.INFO)\n\
    \n_init_logger()\n_logger = logging.getLogger('app.io')\n\ndef write_data(file_name,\
    \ data):\n    try:\n        # write data\n        _logger.info('Successfully wrote\
    \ %d bytes into %s', len(data), file_name)\n    except FileNotFoundError:\n  \
    \      _logger.exception('Failed to write data into %s', file_name)\n```\n\nThis\
    \ snippet logs an informational message every time data is written successfully\
    \ via write_data. If a write fails, then the snippet logs an error message that\
    \ includes the stack trace in which the exception occurred.\n\nWith the logger\
    \ created using snippet 1, if the execution of `app.write_data('/tmp/tmp_data.txt',\
    \ image_data)` succeeds, then this snippet will generate a log entry similar to\
    \ `1586149091.005398:INFO:app.io:io:Successfully wrote 134 bytes into /tmp/tmp_data.txt`.\
    \ If the execution of `app.write_data('/tmp/tmp_data.txt', image_data)` fails,\
    \ then this snippet will generate the following log entry.\n\n```\n1586149219.893821:ERROR:app:io:Failed\
    \ to write data into /tmp1/tmp_data.txt\nTraceback (most recent call last):\n\
    \  File \"/home/kali/program/app/io.py\", line 12, in write_data\n    print(open(file_name),\
    \ data)\nFileNotFoundError: [Errno 2] No such file or directory: '/tmp1/tmp_data.txt'\n\
    ```\n\nInstead of using positional arguments in the format string in the logging\
    \ method, we could achieve the same output by using the arguments via their names\
    \ as follows:\n\n```python\n_logger.info('Successfully wrote %(data_size)s bytes\
    \ into %(file_name)s',\n    {'data_size': len(data), 'file_name': file_name})\n\
    ```\n\n### Snippet 4: Filtering log requests\n\n```python\n# main.py\nimport logging,\
    \ os, sys\nimport app.io\n\ndef _init_logger():\n    logger = logging.getLogger('app')\n\
    \    logger.setLevel(logging.INFO)\n    formatter = logging.Formatter(\n     \
    \   '%(created)f:%(levelname)s:%(name)s:%(module)s:%(message)s')\n    handler\
    \ = logging.StreamHandler(sys.stderr)\n    handler.setLevel(logging.INFO)\n  \
    \  handler.setFormatter(formatter)\n    handler.addFilter(lambda record: record.version\
    \ > 5 or #1\n        record.levelno >= logging.ERROR) #1\n    logger.addHandler(handler)\n\
    \n_init_logger()\n_logger = logging.LoggerAdapter(logging.getLogger('app'), {'version':\
    \ 6})  #2\n```\n\nThis snippet modifies Snippet 1 as follows.\n\n1. Lines marked\
    \ #1 add a filter to the handler. This filter admits log records only if their\
    \ logging level is greater than or equal to `logging.ERROR` or they are from a\
    \ component whose version is higher than 4.\n2. Line marked #2 wraps the logger\
    \ in a `logging.LoggerAdapter` object to inject version information into log records.\n\
    \nThe `logging.LoggerAdapter` class provides a mechanism to inject contextual\
    \ information into log records. We discuss other mechanisms to inject contextual\
    \ information in Good Practices section of Good Practices and Gotchas chapter.\n\
    \n```python\n# app/io.py\nimport logging\n\ndef _init_logger():\n    logger =\
    \ logging.getLogger('app.io')\n    logger.setLevel(logging.INFO)\n\n_init_logger()\n\
    _logger = logging.LoggerAdapter(logging.getLogger('app.io'), {'version': 3}) \
    \ # 1\n\ndef write_data(file_name, data):\n    try:\n        # write data\n  \
    \      _logger.info('Successfully wrote %d bytes into %s', len(data),\n      \
    \               file_name)\n    except FileNotFoundError:\n        _logger.exception('Failed\
    \ to write data into %s', file_name)\n```\n\nThis snippet modifies Snippet 3 by\
    \ wrapping the logger in a LoggerAdapter object to inject version information.\n\
    \nAll of the above changes affect the logging behavior of the app described in\
    \ Snippet 2 and Snippet 3 as follows.\n\n1. The request to log the informational\
    \ message about the start of the app is processed as the version info supplied\
    \ by the module satisfies the filter.\n2. The request to log the informational\
    \ message about the successful write is ignored as the version info supplied by\
    \ the module fails to satisfy the filter.\n3. The request to log the error message\
    \ about the failure to write data is processed as the logging level of the message\
    \ satisfies the filter.\n\nWhat do you suppose would have happened if the filter\
    \ was added to the logger instead of the handler? See [Gotchas](Gotchas) section\
    \ in [Good Practices and Gotchas](Good Practices and Gotchas) chapter for the\
    \ answer.\n\n## Configuration\n\nThe logging classes introduced in the previous\
    \ chapter provide methods to configure their instances and, consequently, customize\
    \ the use of the logging library. Snippet 1 demonstrates how to use configuration\
    \ methods. These methods are best used in simple single-file programs.\n\nWhen\
    \ involved programs (e.g., apps, libraries) use the logging library, a better\
    \ option is to *externalize the configuration of the logging library*. Such externalization\
    \ allows users to customize certain facets of logging in a program (e.g., specify\
    \ the location of log files, use custom loggers/handlers/formatters/filters) and,\
    \ hence, ease the deployment and use of the program. We refer to this approach\
    \ to configuration as *data-based approach*.\n\n### Configuring the Library\n\n\
    Clients can configure the logging library by invoking `logging.config.dictConfig(config:\
    \ Dict)` function. The `config` argument is a dictionary and the following optional\
    \ keys can be used to specify a configuration.\n\n- `filters` key maps to a dictionary\
    \ of strings and dictionaries. The strings serve as *filter ids* used to refer\
    \ to filters in the configuration (e.g., adding a filter to a logger) while the\
    \ mapped dictionaries serve as filter configurations. The string value of the\
    \ `name` key in filter configurations is used to construct `logging.Filter` instances.\n\
    \n```json\n\"filters\": {\n  \"io_filter\": {\n    \"name\": \"app.io\"\n  }\n\
    }\n```\n\nThis configuration snippet results in the creation of a filter that\
    \ admits all records created by the logger named ŌĆśapp.ioŌĆÖ or its descendants.\n\
    \n- `formatters` key maps to a dictionary of strings and dictionaries. The strings\
    \ serve as *formatter ids* used to refer to formatters in the configuration (e.g.,\
    \ adding a formatter to a handler) while the mapped dictionaries serve as formatter\
    \ configurations. The string values of the `datefmt` and `format` keys in formatter\
    \ configurations are used as the date and log entry formatting strings, respectively,\
    \ to construct `logging.Formatter` instances. The boolean value of the (optional)\
    \ `validate` key controls the validation of the format strings during the construction\
    \ of a formatter.\n\n[^42]: https://docs.python.org/3/library/logging.html#logging.debug"
