  md: '# What about caching references to loggers?


    Before moving on to gotchas, letŌĆÖs consider the goodness of the common practice
    of *caching references to loggers and accessing loggers via cached references*,
    e.g., how the `_logger` attribute was used in the previous code snippets.


    This coding pattern avoids repeated invocations of `logging.getLogger()` function
    to retrieve the same module-level logger; hence, it helps eliminate redundant
    retrievals. However, such eliminations can lead to lost log requests if retrievals
    are not redundant. For example, suppose the logging library configuration in a
    long-running web service is updated with `disable_existing_loggers` option. Since
    such an update would disable cached loggers, none of the logging statements that
    use cached loggers would log any requests. While we can remedy this situation
    by updating cached references to loggers, a simpler solution would be to use `logging.getLogger()`
    function instead of caching references.


    In short, caching references to loggers is not always a good practice. So, consider
    the context of the program while deciding to cache references to loggers.


    # Gotchas


    # Filters fail


    When the logging library invokes the filters associated with handlers and loggers,
    the library assumes the filters will always execute to completion, i.e., not fail
    on errors. So, there is no error handling logic in the library to deal with failing
    filters. Consequently, when a filter fails (to execute to completion), the corresponding
    log request will not be logged.


    *Ensure filters will execute to completion. More so, when using custom filters
    and using additional data in filtering.*


    # Formatters fail


    The logging library makes a similar assumption about formatters, i.e., formatters
    will always execute to completion. Consequently, when a formatter fails to execute
    to completion, the corresponding log request will not be logged.


    *Ensure formatters will execute to completion.*


    # Required keys are missing in the `extra` argument


    If the filters/formatters refer to keys of the `extra` argument provided as part
    of logging methods, then the filters/formatters can fail when the `extra` argument
    does not provide a referred key.


    *Ensure every key of the `extra` argument used in a filter or a formatter are
    available in every triggering logging statement.*'
