  - "[PAGE 14]\n\n# Logging Module\n\nTo maintain a hierarchy of loggers, when a client\
    \ uses the logging library, the library creates a *root logger* that serves as\
    \ the root of the hierarchy of loggers. The default threshold logging level of\
    \ the root logger is `logging.WARNING`.\n\nThe module offers all of the logging\
    \ methods offered by Logger class as module-level functions with identical names\
    \ and signature, e.g., `logging.debug(msg, *args, **kwargs)`[^42]. Clients can\
    \ use these functions to issue log requests without creating loggers, and the\
    \ root logger services these requests. If the root logger has no handlers when\
    \ servicing log requests issued via these methods, then the logging library adds\
    \ a `logging.StreamHandler` instance based on `sys.stderr` stream as a handler\
    \ to the root logger.\n\nWhen loggers without handlers receive log requests, the\
    \ logging library directs such log requests to the *last resort handler*, which\
    \ is a `logging.StreamHandler` instance based on `sys.stderr` stream. This handler\
    \ is accessible via `logging.lastResort` attribute.\n\n# Using PythonŌĆÖs Logging\
    \ Library\n\nHere are few code snippets illustrating how to use PythonŌĆÖs logging\
    \ library.\n\n# Snippet 1: Creating a logger with a handler and a formatter\n\n\
    ```\npython\n# main.py\nimport logging, sys\n\ndef _init_logger():\n    logger\
    \ = logging.getLogger('app')  #1\n    logger.setLevel(logging.INFO)  #2\n    handler\
    \ = logging.StreamHandler(sys.stderr)  #3\n    handler.setLevel(logging.INFO)\
    \  #4\n    formatter = logging.Formatter(\n        '%(created)f:%(levelname)s:%(name)s:%(module)s:%(message)s')\
    \ #5\n    handler.setFormatter(formatter)  #6\n    logger.addHandler(handler)\
    \  #7\n\n_init_logger()\n_logger = logging.getLogger('app')\n```\n\nThis snippet\
    \ does the following.\n\n[^42]: https://docs.python.org/3/library/logging.html#logging.debug"
