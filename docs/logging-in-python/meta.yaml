  - "[PAGE 24]\n\nthe functionalities offered by the dictionary-based configuration\
    \ scheme, the use of `dictConfig()` function is recommended; hence, we do not\
    \ discuss `fileConfig()` function and the `configparser` file format in this chapter.\n\
    \n# Configuring Over The Wire\n\nWhile the above APIs can be used to update the\
    \ logging configuration when the client is running (e.g., web services), programming\
    \ such update mechanisms from scratch can be cumbersome. The `logging.config.listen()`\
    \ function alleviates this issue. This function starts a socket server that accepts\
    \ new configurations over the wire and loads them via `dictConfig()` or `fileConfig()`\
    \ functions. Refer to `logging.config.listen()`<sup>51</sup> for more details.\n\
    \n# Loading and Storing Configuration\n\nSince the configuration provided to `dictConfig()`\
    \ is nothing but a collection of nested dictionaries, a logging configuration\
    \ can be easily represented in JSON and YAML format. Consequently, programs can\
    \ use the `json` module in Python's standard library or external YAML processing\
    \ libraries to read and write logging configurations from files.\n\nFor example,\
    \ the following snippet suffices to load logging configuration stored in JSON\
    \ format.\n\n```\npython\nimport json, logging.config\n\nwith open('logging-config.json',\
    \ 'rt') as f:\n    config = json.load(f)\n    logging.config.dictConfig(config)\n\
    ```\n\n# Limitations\n\nIn the supported configuration scheme, we cannot configure\
    \ filters to filter beyond simple name-based filtering. For example, we cannot\
    \ create a filter that admits only log requests created between 6 PM and 6 AM.\
    \ We need to program such filters in Python and add them to loggers and handlers\
    \ via `factory functions` or `addFilter()` method.\n\n<sup>51</sup>https://docs.python.org/3/library/logging.config.html#logging.config.listen"
  - '[PAGE 25]


    # Good Practices and Gotchas


    In this chapter, we will list few good practices and gotchas related to the logging
    library. This list stems from on our experience, and we intend it complements
    the extensive information available in the [Logging HOWTO](https://docs.python.org/3/howto/logging.html#logging-howto)
    and [Logging Cookbook](https://docs.python.org/3/howto/logging-cookbook.html#logging-cookbook)
    sections of PythonŌĆÖs documentation.


    Since there are no silver bullets, all good practices and gotchas have exceptions
    that are almost always contextual. So, before using the following good practices
    and gotchas, consider their applicability in the context of your application and
    ascertain that they are appropriate in your applicationŌĆÖs context.


    # Good Practices


    # Create loggers using the `logging.getLogger()` factory function


    The factory function helps the library manager the mapping from logger names to
    logger instances and maintain a hierarchy of loggers. In turn, this mapping and
    hierarchy offer the following benefits.


    +   1. Clients can use the factory function to access the same logger in different
    parts of the program by merely retrieving the logger by its name.

    2. Only a finite number of loggers are created at runtime (except under pathological
    circumstances).

    3. Log requests can be propagated up the logger hierarchy.

    4. When unspecified, the threshold logging level of a logger can be inferred from
    its ascendants.

    5. The configuration of the logging library can be updated at runtime by merely
    relying on the logger names.


    # Use `logging.<logging level>()` function or `Logger.<logging level>()` methods
    to log at pre-defined logging levels


    Besides making the code a bit shorter, the use of these functions/methods helps
    partition the logging statements in a program into two sets: those that issue
    log requests with pre-defined logging levels and those that issue log requests
    with custom logging levels.'
  - '[PAGE 26]


    # Use pre-defined logging levels


    As described in the [Logging Level](https://docs.python.org/3/library/logging.html#logging-levels)
    section in [Concepts and API](https://docs.python.org/3/library/logging.html#concepts-and-terminology)
    chapter, the pre-defined logging levels offered by the library capture almost
    all logging scenarios that occur in programs. Further, since most developers are
    familiar with pre-defined logging levels (as most logging libraries across different
    programming languages offer very similar levels), the use of pre-defined levels
    can help lower deployment, configuration, and maintenance burden. So, unless required,
    use pre-defined logging levels.


    # Create module-level loggers


    While creating loggers, we can create a logger for each class or create a logger
    for each module. While the first option enables fine-grained configuration, it
    leads to more number of loggers in a program, i.e., one per class. In contrast,
    the second option can help reduce the number of loggers in a program. So, unless
    such fine-grained configuration is necessary, create module-level loggers.


    # Name module-level loggers with the name of the corresponding modules.


    Since the logger names are string values that are not part of the namespace of
    a Python program, they will not clash with module names. Hence, use the name of
    a module as the name of the corresponding module-level logger. With this naming,
    logger naming piggybacks on the dot notation based module naming and, consequently,
    simplifies referring of loggers.


    # Use `logging.LoggerAdapter` to inject local contextual information


    As demonstrated in [Snippet 4](https://docs.python.org/3/library/logging.html#snippet-4),
    we can use `logging.LoggerAdapter`[^54] to inject contextual information into
    log records. LoggerAdapter can also be used to modify the log message and the
    log data provided as part of a log request.


    Since the logging library does not manage these adapters, they cannot be accessed
    via common names. For this reason, use them to inject contextual information that
    is local to a module or a class.


    # Use filters or `logging.setLogRecordFactory()` to inject global contextual information


    There are two options to seamlessly inject global contextual information (that
    is common across an app) into log records.


    +   1. The first option is to use the filter support to modify the log record
    arguments provided to filters. For example, the following filter injects version
    information into incoming log records.


    [^54]: https://docs.python.org/3/library/logging.html#loggeradapter-objects'
  - "[PAGE 27]\n\n```\npython\ndef version_injecting_filter(logRecord):\n    logRecord.version\
    \ = '3'\n    return True\n```\n\nThere are two downsides to this option. First,\
    \ if filters depend on the data in log records, then filters that inject data\
    \ into log records should be executed before filters that use the injected data.\
    \ Hence, the order of filters added to loggers and handlers becomes crucial. Second,\
    \ the option ŌĆ£abusesŌĆØ the support to filter log records to extend log records.\n\
    \n2. The second option is to initialize the logging library with a log record\
    \ creating factory function via `logging.setLogRecordFactory()`[^55]. Since the\
    \ injected contextual information is global, it can be injected into log records\
    \ when they are created in the factory function and be sure the data will be available\
    \ to every filter, formatter, logger, and handler in the program.\n\nThe downside\
    \ of this option is that we have to ensure factory functions contributed by different\
    \ components in a program play nice with each other. While `log record factory\
    \ functions could be chained`[^56], such chaining increases the complexity of\
    \ programs.\n\n# Use the data-based approach to configure the logging library\n\
    \nIf your program involves multiple modules and possibly third-party components,\
    \ then use the data-based approach described in the `Configuration` chapter to\
    \ configure the logging library.\n\n# Attach common handlers to the loggers higher\
    \ up the logger hierarchy\n\nIf a handler is common to two loggers of which one\
    \ is the descendant of the other, then attach the handler to the ascendant logger\
    \ and rely on the logging library to propagate the log requests from the descendant\
    \ logger to the handlers of the ascendant logger. If the `propagate`[^57] attribute\
    \ of loggers has not been modified, this this pattern helps avoid duplicate messages.\n\
    \n# Use `logging.disable()` function to inhibit the processing of log requests\
    \ below a certain logging level across all loggers\n\nA logger processes a log\
    \ request if the logging level of the log request is at least as high as the loggerŌĆÖs\
    \ effective logging level. A loggerŌĆÖs effective logging level is the higher of\
    \ two logging levels: the loggerŌĆÖs threshold logging level and the library-wide\
    \ logging level. We can set the library-wide logging level via `logging.disable(level)`[^58]\
    \ function. By default, the library-wide logging level is 0, i.e., log requests\
    \ of every logging level will be processed.\n\nUsing this function, we can throttle\
    \ the logging output of an app by increasing the logging level across the entire\
    \ app.\n\n[^55]: https://docs.python.org/3/library/logging.html#logging.setLogRecordFactory\n\
    [^56]: https://docs.python.org/3/library/logging.html#logrecord-objects\n[^57]:\
    \ https://docs.python.org/3/library/logging.html#logging.Logger.propagate\n[^58]:\
    \ https://docs.python.org/3/library/logging.html#logging.disable"
- md: "## What about caching references to loggers?\n\nBefore moving on to gotchas,\
    \ letŌĆÖs consider the goodness of the common practice of *caching references to\
    \ loggers and accessing loggers via cached references*, e.g., how the `_logger`\
    \ attribute was used in the previous code snippets.\n\nThis coding pattern avoids\
    \ repeated invocations of `logging.getLogger()` function to retrieve the same\
    \ module-level logger; hence, it helps eliminate redundant retrievals. However,\
    \ such eliminations can lead to lost log requests if retrievals are not redundant.\
    \ For example, suppose the logging library configuration in a long-running web\
    \ service is updated with `disable_existing_loggers` option. Since such an update\
    \ would disable cached loggers, none of the logging statements that use cached\
    \ loggers would log any requests. While we can remedy this situation by updating\
    \ cached references to loggers, a simpler solution would be to use `logging.getLogger()`\
    \ function instead of caching references.\n\nIn short, caching references to loggers\
    \ is not always a good practice. So, consider the context of the program while\
    \ deciding to cache references to loggers.\n\n## Gotchas\n\n### Filters fail\n\
    \nWhen the logging library invokes the filters associated with handlers and loggers,\
    \ the library assumes the filters will always execute to completion, i.e., not\
    \ fail on errors. So, there is no error handling logic in the library to deal\
    \ with failing filters. Consequently, when a filter fails (to execute to completion),\
    \ the corresponding log request will not be logged.\n\n*Ensure filters will execute\
    \ to completion. More so, when using custom filters and using additional data\
    \ in filtering.*\n\n### Formatters fail\n\nThe logging library makes a similar\
    \ assumption about formatters, i.e., formatters will always execute to completion.\
    \ Consequently, when a formatter fails to execute to completion, the corresponding\
    \ log request will not be logged.\n\n*Ensure formatters will execute to completion.*\n\
    \n### Required keys are missing in the `extra` argument\n\nIf the filters/formatters\
    \ refer to keys of the `extra` argument provided as part of logging methods, then\
    \ the filters/formatters can fail when the `extra` argument does not provide a\
    \ referred key.\n\n*Ensure every key of the `extra` argument used in a filter\
    \ or a formatter are available in every triggering logging statement.*\n\n###\
    \ Keys in the `extra` argument clash with required attributes\n\nThe logging library\
    \ adds the keys of the `extra` argument (to various logging methods) as attributes\
    \ to log records. However, if `asctime` and `message` occur as keys in the `extra`\
    \ argument, then the creation of log records will fail, and the corresponding\
    \ log request will not be logged.\n\nSimilar failure occurs if `args`, `exc_info`,\
    \ `lineno`, `msg`, `name`, or `pathname` occur as keys in the `extra` argument;\
    \ these are attributes of `LogRecord` class.\n\n> Ensure `asctime`, `message`,\
    \ and certain attributes of `LogRecord` do not appear as keys in the `extra` argument\
    \ of logging methods.\n\n### Libraries using custom logging levels are combined\n\
    \nWhen a program and its dependent libraries use the logging library, their logging\
    \ requirements are combined by the underlying logging library that services these\
    \ requirements. In this case, if the components of a program use custom logging\
    \ levels that are mutually inconsistent, then the logging outcome can be unpredictable.\n\
    \n> Don't use custom logging levels, specifically, in libraries.\n\n### Filters\
    \ of ancestor loggers do not fire\n\nBy default, log requests are propagated up\
    \ the logger hierarchy to be processed by the handlers of ancestor loggers. While\
    \ the filters of the handlers process such log requests, the filters of the corresponding\
    \ loggers do not process such log requests.\n\n> To apply a filter to all log\
    \ requests submitted to a logger, add the filter to the logger.\n\n### Ids of\
    \ handlers/filters/formatters clash\n\nIf multiple handlers share the same handler\
    \ id in a configuration, then the handler id refers to the handler that is created\
    \ last when the configuration is processed. The same happens amongst filters and\
    \ formatters that share ids.\n\nWhen a client terminates, the logging library\
    \ will execute the cleanup logic of the handler associated with each handler id.\
    \ So, if multiple handlers have the same id in a configuration, then the cleanup\
    \ logic of all but the handler created last will not be executed and, hence, result\
    \ in resource leaks.\n\n> Use unique ids for objects of a kind in a configuration.\n\
    \n## Performance Considerations\n\nWhile logging statements help capture information\
    \ at locations in a program, they contribute to the cost of the program in terms\
    \ of execution time (e.g., logging statements in loops) and storage (e.g., logging\
    \ lots of data). Although cost-free yet useful logging is impossible, we can reduce\
    \ the cost of logging by making choices that are informed by performance considerations.\n\
    \n### Configuration-Based Considerations\n\nAfter adding logging statements to\
    \ a program, we can use the support to configure logging (described earlier) to\
    \ control the execution of logging statements and the associated execution time.\
    \ In particular, consider the following configuration capabilities when making\
    \ decisions about logging-related performance.\n\n1. **Change logging levels of\
    \ loggers**: This change helps suppress log messages below a certain log level.\
    \ This helps reduce the execution cost associated with *unnecessary creation of\
    \ log records*.\n2. **Change handlers**: This change helps replace slower handlers\
    \ with faster handlers (e.g., during testing, use a transient handler instead\
    \ of a persistent handler) and even remove context-irrelevant handlers. This reduces\
    \ the execution cost associated with *unnecessary handling of log records*.\n\
    3. **Change format**: This change helps exclude unnecessary parts of a log record\
    \ from the log (e.g., exclude IP addresses when executing in a single node setting).\
    \ This reduces the execution cost associated with *unnecessary handling of parts\
    \ of log records*.\n\nThe above changes range over coarser to finer aspects of\
    \ logging support in Python.\n\n### Code-Based Considerations\n\nWhile the support\
    \ to configure logging is powerful, it cannot help control the performance impact\
    \ of implementation choices baked into the source code. Here are a few such logging-related\
    \ implementation choices and the reasons why you should consider them when making\
    \ decisions about logging-related performance.\n\n### Do not execute inactive\
    \ logging statements\n\nUpon adding the `logging` module to Python's standard\
    \ library, there were concerns about the execution cost associated with *inactive\
    \ logging statements* ŌĆö logging statements that issue log requests with logging\
    \ level lower than the threshold logging level of the target logger. For example,\
    \ *how much extra time will a logging statement that invokes `logger.debug(...)`\
    \ add to a program's execution time when the threshold logging level of `logger`\
    \ is `logging.WARN`?* This concern led to client-side coding patterns (as shown\
    \ below) that used the threshold logging level of the target logger to control\
    \ the execution of the logging statement.\n\n```\n# client code\n...\nif logger.isEnabledFor(logging.DEBUG):\n\
    \    logger.debug(msg)\n...\n```\n\nToday, this concern is not valid because the\
    \ logging methods in `logging.Logger` class perform similar checks and process\
    \ the log requests only if the checks pass. For example, as shown below, the above\
    \ check is performed in the `logging.Logger.debug` method.\n\n```\n# client code\n\
    ...\nlogger.debug(msg)\n...\n\n# logging library code\n\nclass Logger:\n    ...\n\
    \    def debug(self, msg, *args, **kwargs):\n        if self.isEnabledFor(DEBUG):\n\
    \            self._log(DEBUG, msg, args, **kwargs)\n```\n\nConsequently, inactive\
    \ logging statements *effectively* turn into no-op statements and do not contribute\
    \ to the execution cost of the program.\n\nEven so, one should consider the following\
    \ two aspects when adding logging statements.\n\n1. Each invocation of a logging\
    \ method incurs a small overhead associated with the invocation of the logging\
    \ method and the check to determine if the logging request should proceed, e.g.,\
    \ a million invocations of `logger.debug(...)` when threshold logging level of\
    \ `logger` was `logging.WARN` took half a second on a typical laptop. So, while\
    \ the cost of an inactive logging statement is trivial, the total execution cost\
    \ of numerous inactive logging statements can quickly add up to be non-trivial."
