    This configuration snippet results in the creation of two loggers. The first logger
    is named *app*, its threshold logging level is set to WARNING, and it is configured
    to forward log requests to *stderr* and *alert* handlers. The second logger is
    named *app.io*, and its threshold logging level is set to INFO. Since a log request
    is propagated to the handlers associated with every ascendant logger, every log
    request with INFO or higher logging level made via *app.io* logger will be propagated
    to and handled by both *stderr* and *alert* handlers.


