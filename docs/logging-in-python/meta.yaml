    \ function and the `configparser` file format in this chapter.\n\n# Configuring\
    \ Over The Wire\n\nWhile the above APIs can be used to update the logging configuration\
    \ when the client is running (e.g., web services), programming such update mechanisms\
    \ from scratch can be cumbersome. The `logging.config.listen()` function alleviates\
    \ this issue. This function starts a socket server that accepts new configurations\
    \ over the wire and loads them via `dictConfig()` or `fileConfig()` functions.\
    \ Refer to `logging.config.listen()`<sup>51</sup> for more details.\n\n# Loading\
    \ and Storing Configuration\n\nSince the configuration provided to `dictConfig()`\
    \ is nothing but a collection of nested dictionaries, a logging configuration\
    \ can be easily represented in JSON and YAML format. Consequently, programs can\
    \ use the `json` module in Python's standard library or external YAML processing\
    \ libraries to read and write logging configurations from files.\n\nFor example,\
    \ the following snippet suffices to load logging configuration stored in JSON\
    \ format.\n\n```\npython\nimport json, logging.config\n\nwith open('logging-config.json',\
