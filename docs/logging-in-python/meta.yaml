- md: '## About Coralogix, the sponsor of this work


    Coralogix provides an ML-powered logging solution that accelerates the delivery
    pipeline for cloud companies focused on CI/CD.


    Beyond searching, visualizing, and creating alerts, our solution detects anomalies.
    It provides automatic version benchmarks so that you can move with confidence.
    It simplifies your ELK stack and Grafana workflows with a 100% managed, scaled,
    and secured platform and never get lost with 24/7 instant (human) support to help
    with any logging challenges. It supports notifications via email/Slack/PagerDuty/OpsGini
    or any custom webhook destination. It easily integrates with Python, Node.js,
    Java, .Net, Ruby, Rsyslog, Auditbeat, Filebeat, Packetbeat, Logstash, Filebeat,
    FluentD, CircleCI, Jenkins, Fastly, Okta, Akamai, Kubernetes, Docker, CloudTrial,
    Cloudwatch Logs and Metrics, and other AWS services like Kinesis, ELB/ALB logs,
    S3, VPC flow logs, and many more.


    Our solution is enabled by a powerful parsing engine that can rapidly parse, extract,
    map, convert, and filter log entries in any way necessary. This ability helps
    convert unstructured data to JSON; extracting key info from logs while filtering
    streaming logs according to specific conditions. Advanced rules can help block
    or mask specific log data to ensure privacy and avoid log data quota overages.


    Customers can optimize their logging ROI by assigning levels of priority to control
    the quota usage based on the type of ingested log data. They can process data
    at varying degrees, depending on assigned value, while still archiving all data
    for easy reindexing.


    To get started, visit [Coralogix Website](https://coralogix.com) or easily add
    Coralogix from the AWS or the Heroku marketplaces for a simple pay-as-you-go option
    paid via your existing account. Manage the setup yourself, or schedule a free
    1:1 session with one of our logging experts, and we will help ship and parse your
    data for you.


