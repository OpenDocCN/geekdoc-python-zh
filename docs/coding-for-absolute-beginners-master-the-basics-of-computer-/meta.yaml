  mdcn: "## HTML 模板\n\nHTML 网站模板是开发网站的一种快速简便的方式。由于此模板是一个预先构建的网站，开发者可以根据需要修改和添加功能。使用\
    \ HTML 模板的最大优势在于，开发者无需花费数小时设计网站，而可以专注于编写实际代码以满足网站功能需求。此外，HTML 模板最适合那些无法设计出吸引人的网站的人，因为它也可以根据给定的说明进行自定义。\n\
    \n## 使用 HTML 的实用技巧\n\n即使我们已经讨论了 HTML 的所有主要标签、属性和功能，还有一些其他重要方面需要关注，以使您的网站更具生产力和效率。使用\
    \ HTML 开始标签时，请务必在开始编写元素和属性之前写上对应的结束标签。例如，`<p>...</p>`。这将确保您的 HTML 页面在所有浏览器上正常工作，并尝试通过\
    \ CSS 来设置网页样式。\n\n在完成所有网页的 HTML 代码编写后，在发布到互联网之前，请通过 HTML 验证器运行代码。此操作将提前发现任何错误或缺失的标签，以便您的网站在在线发布时不会缺乏功能。此外，请注意图像或视频的格式，因为它们在上传到互联网时有时会被破坏。在图像标签中指定宽度和高度可以帮助您解决此问题。\n\
    \n尽管表格是在页面上布局内容的一种简单方式，但您应该专注于 CSS 规则，并通过 CSS 构建 HTML 页面内容。这不仅将以更好的方式格式化您的网站，您还可以从\
    \ CSS 定位中受益，并提高网站的响应能力。\n\n# 第九章\n\n## CSS\n\n### 什么是 CSS？\n\nCSS 代表“层叠样式表”，负责控制网页文档的样式、设计和外观。这种设计语言能够简化网页设计过程，并增加网站的灵活性。通过\
    \ CSS，我们可以通过在 CSS 中进行适当的调整来改变整个网站的外观、字体、设计、外观和格式。\n\n学习 CSS 和 HTML 一样简单，因为这两种语言相互关联，并且具有几乎相同的语法。使用\
    \ CSS 后，我们可以为每个 HTML 元素定义特定的样式，并将其应用于多个网页。此外，无需每次都编写 HTML 标签属性或元素，这使得页面加载更快。使用\
    \ CSS，我们可以为网页提供更好的外观，因为与 HTML 相比，它具有更广泛的属性范围，并且样式表提供了不同版本的网站，以便在台式机、智能手机和平板电脑上完美显示。\n\
    \n## CSS 的类型\n\nCSS 的三种主要类型是内联 CSS、内部 CSS 和外部 CSS。\n\n### 内联 CSS\n\n内联 CSS 的 CSS\
    \ 属性实现于 HTML 文档中与元素相连的特定部分。例如：\n\n```html\n<html>\n    <head>\n        <title>Inline\
    \ CSS</title>\n    </head>\n\n    <body>\n        <p style = \"color:Blue; font-size:50px;\n\
    \                    font-style:italic; text-align:center;\">\n            Cascading\
    \ Style sheets\n        </p>\n    </body>\n</html>\n```\n\n输出：\n\n### 内部 CSS\n\
    \n内部 CSS 实现于单个 HTML 文档上，以赋予其独特的样式。请记住，规则必须在 HTML 文件的 head 部分内实现。\n\n实现内部 CSS 的语法：\n\
    \n```html\n<head>\n    <title>Internal css</title>\n    <style>\n        selector{\n\
    \            Property:value;\n        }\n    </style>\n</head>\n```\n\n### 外部\
    \ CSS\n\n外部 CSS 有一个单独的 CSS 文件，其中仅包含一个样式属性以及标签属性。外部 CSS 文件需要使用 Link 标签与 HTML 文档链接。\n\
    \n外部 CSS 示例：\n\n```css\nbody {\n    background-color:Green;\n}\n.main {\n    text-align:center;\n\
    }\n.GFG {\n    color:#009900;\n    font-size:50px;\n    font-weight:bold;\n}\n\
    ```\n\n### 基本语法和在 HTML 中的包含\n\nCSS 由多个样式规则组成，这些规则由浏览器解释并应用于网页。通常，一个样式规则由三个关键元素组成，称为选择器、属性和值。\n\
    \n选择器是可以应用 CSS 样式的 HTML 标签，例如 `<h1>`，而属性是 HTML 标签的属性，例如颜色。值被分配给属性。创建 CSS 样式规则的基本语法定义如下：\n\
    \n`Selector {property: value}`\n\n通常，内联和外部 CSS 方法用于将样式与 HTML 文档关联，其中 `<style>`\
    \ 元素放置在 `<head>` 和 `</head>` 标签内。CSS 在 HTML 文档中包含的语法定义如下：\n\n```html\n<html>\n\
    \    <head>\n        <style type = \"text/css\" media = \"all\">\n        body\
    \ {\n            background-color: Grey;\n        }\n        h1 {\n          \
    \  color: White;\n            margin-left: 40px;\n        }\n        </style>\n\
    \    </head>\n    <body>\n        <h1>Sample heading</h1>\n        <p>Sample paragraph</p>\n\
    \    </body>\n</html>\n```\n\n### 导入 CSS 文件\n\n要导入外部样式表，可以实现以下规则：\n\n```html\n\
    <head>\n    <@import “URL”;\n</head>\n```\n\n## 颜色和背景\n\n### 颜色\n\n在 CSS 中，颜色可以通过名称或不同类型的值来定义。要指定颜色代码，可以使用的可能格式详细说明如下：\n\
    \n| 名称 | 语法 |\n| --- | --- |\n| 关键字 | Green, Blue 等 |\n| 十六进制代码 | #RRGGBB |\n\
    | RGB 百分比 | Rgb( rrr%, ggg%, bbb%) |\n| RGB 绝对值 | Rgb(rrr, ggg, bbb) |\n| 短十六进制代码\
    \ | #RGB |\n\n例如，我们可以使用以下 CSS 语法设置文本颜色：\n\n`<h1 style= “color: Green;”> Cascading\
    \ Style Sheets </h1>`\n\n### 背景\n\n可以考虑不同的属性来定义网站的 CSS 背景。这些属性包括 CSS 背景的颜色、图像、重复、附件和位置。\n\
    \n#### 背景颜色\n\n要设置网页的背景颜色，可以使用以下 CSS 语法：\n\n```css\nbody {\n  background-color:\
    \ Red;\n}\n```\n\n#### 背景图像\n\n添加背景图像的语法：\n\n```css\nbody {\n  background-image:\
    \ url(\"image.gif\");\n}\n```\n\n重复图像：\n\n```css\nbody {\n  background-image:\
    \ url(“gradient_image.gif”);\n}\n```\n\n不重复的背景：\n\n```css\nbody {\n  background-image:\
    \ url(\"image_bike.jpg\");\n  background-repeat: no-repeat;\n}\n```\n\n#### 背景位置\n\
    \n背景图像可以设置为不同的位置，例如右、左、居中、顶部和底部。例如：\n\n```css\nbody {\n  background-image: url(\"\
    Image.jpg \");\n  background-position: center;\n}\n```\n\n## 格式化和设计\n\n### 边框\n\
    \nCSS 边框属性可用于设置 HTML 文档中元素边框的独特样式、颜色和宽度。使用 CSS 创建边框的不同样式包括点线、实线、虚线、凹槽、双线、内嵌、外凸、隐藏、脊线和无。\n\
    \n创建不同边框样式的语法：\n\n```css\np.dotted {border-style: dotted;}\np.solid {border-style:\
    \ solid;}\np.dashed {border-style: dashed;}\np.groove {border-style: groove;}\n\
    p.double {border-style: double;}\np.inset {border-style: inset;}\np.outset {border-style:\
    \ outset;}\np.hidden {border-style: hidden;}\np.ridge {border-style: ridge;}\n\
    p.none {border-style: none;}\n```\n\n### 高度和宽度\n\n在 CSS 中，高度和宽度属性可用于设置元素的高度和宽度。在\
    \ CSS 中实现高度和宽度属性的语法定义如下：\n\n```css\ndiv {\n  height: 200px;\n  width: 50%;\n \
    \ background-color: Green;\n}\n```\n\n## 外边距和内边距\n\n### 外边距\n\n在 CSS 中，外边距属性用于在元素周围创建空间。我们可以为每一侧设置不同的外边距大小。外边距属性具有不同的值，例如长度、宽度和外边距，由浏览器计算。\n\
    \n```css\n语法：\nbody\n{\n    margin: size;\n}\n```\n\n### 内边距\n\nCSS 内边距可用于定义边框或在元素周围创建空间。有多种方法可以在\
    \ HTML 网站上为各个边（如顶部、右侧、底部和左侧）设置 CSS 内边距。内边距具有长度和宽度值，可以使用以下 CSS 语法：\n\n```css\n\
    Body\n{\nPadding: size;\n}\n```\n\n## 字体和文本\n\n### 字体\n\nCSS 中的字体属性用于指定其他字体属性并设置内容的字体。CSS\
    \ 中不同的字体属性包括字体样式、字体系列、字体粗细、字体变体、字体粗细和字体大小。以下是每个字体属性的简单 CSS 语法：\n\n字体样式"
