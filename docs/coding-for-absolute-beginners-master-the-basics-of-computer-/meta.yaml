- img_proc: true
  md: "![](img/9d932bec53e523b8d8b7b8134cf77ca7_140_0.png)\n\n# # Visibility\n\nThe\
    \ Visibility property in CSS allows us to hide an element from view mode and this\
    \ property can also be used to hide error messages and to retain text privacy.\
    \ Visibility property has predefined values including Visible, Hidden, and Collapse.\n\
    Syntax for implementing Visibility property in a paragraph through CSS:\n\n```\n\
    \n<p>\n    Text visible.\n</p>\n\n<p style = \"visibility:hidden;\">\n    Text\
    \ should not be visible.\n</p>\n```\n\n# # Layout and Animations\n\n# ## Layout\n\
    \nThe CSS layout techniques are a great way to take elements contained in a web\
    \ page and present them in different layouts. This technique is generally used\
    \ to change the position of elements or a container. Modules for CSS layout include\
    \ Normal Flow, the display property, Flexbox, Grid, Floats, Positioning, Table\
    \ Layout, and Multiple column layout. Remember that all of the methods of achieving\
    \ a page layout in CSS are conducted through the display property.\n\n# ## Animation\n\
    \nCSS animations allow an element to change style from one to another for"
  merge: -1
  pgno: 140
- img_proc: true
  md: "which we can implement multiple properties as well. For using CSS animations,\
    \ we are required to specify some key frames through the @keyframes rule.\nFor\
    \ example:\n\n```\n@keyframes sample {\n  from {background-color: blue;}\n  to\
    \ {background-color: brown;}\n}\n```\n\n```\n/* The element to apply the animation\
    \ to */\ndiv {\n  width: 100px;\n  height: 100px;\n  background-color: blue;\n\
    \  animation-name: example;\n  animation-duration: 4s;\n}\n```\n\n# How to Effectively\
    \ Use CSS\n\nThere are several other CSS custom properties and elements that can\
    \ be implemented to improve the graphics, display, and attractiveness of a web\
    \ page. Although it is critical to learn and implement all properties of CSS,\
    \ using a good editor can help create a perfect website design. Furthermore, every\
    \ method used in CSS should be consistent so that there are no problems such as\
    \ misinterpretation.\nWhile writing CSS, you should also avoid using inline code\
    \ and place the styles or attributes only in the external stylesheets. Checking\
    \ that your code works on the latest internet browsers such as Internet Explorer,\
    \ Chrome, and Safari can be a great idea so that you can ensure proper display\
    \ and formatting of the web pages. Moreover, CSS code can also be reused as a\
    \ template for other projects and you can recycle the pre-existing code into new\
    \ ones as well. Multiple classes can also be implemented with space separation\
    \ and we can benefit from CSS inheritance by applying specific CSS elements."
