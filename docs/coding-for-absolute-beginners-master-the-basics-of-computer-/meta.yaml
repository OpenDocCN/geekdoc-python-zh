    \ | #RRGGBB |\n| RGB % | Rgb( rrr%, ggg%, bbb%) |\n| RGB Absolute | Rgb(rrr, ggg,\
    \ bbb) |\n| Short Hex Code | #RGB |\n\nFor example, we can set the color of the\
    \ text by using the following CSS syntax:\n\n`<h1 style= “color: Green;”> Cascading\
