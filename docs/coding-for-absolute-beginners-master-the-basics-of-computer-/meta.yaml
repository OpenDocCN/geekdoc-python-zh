- md: "## Regular Expressions\n\nRegular expressions is an API that is used to define\
    \ string patterns and is also used for searching, editing, and manipulating text.\
    \ Java has predefined java.util.regex package that consists of a Pattern class,\
    \ Matcher Class, and PatternSyntaxException object. The Pattern class requires\
    \ the developers to start with the compile() methods and return a pattern object\
    \ as it provides no public constructors.\nFor the Matcher class, the matcher object\
    \ finds and compares the operations against an input string in order to obtain\
    \ a Matcher object through the Matcher() method. The PatternSyntaxException is\
    \ used to indicate an error or mistake in the regular expression pattern.\n\n\
    ## Files and I/O\n\nJava programming language features a built-in package that\
    \ is responsible for data input and output operations. The stream is known as\
    \ java.io and supports multiple operations and functionality to handle data. There\
    \ are two general types of streams in Java which are known as Input Stream and\
    \ Output Stream.\nInput Stream is used to read data whereas the Output stream\
    \ is used for writing data in a file.\nJava language features various I/O data\
    \ handling streams that include the following:\n\n- Byte Streams\n- Character\
    \ Streams\n- Standard Streams\n- File Input Stream\n- File Output Stream\n\n##\
    \ Object Oriented Java\n\nObject Oriented Programming is an approach that includes\
    \ the use of classes and objects. By using multiple concepts such as inheritance,\
    \ polymorphism, Encapsulation and Abstraction, programmers can develop java applications\
    \ and programs.\n\n## Inheritance\n\nInheritance is a feature in Java programming\
    \ language that allows it to inherit the features and properties of another class.\
    \ This can be done between the subclass and superclass. The class whose features\
    \ are inherited is called the superclass whereas the class that inherits the properties\
    \ of another class is called as the subclass.\nTo use Inheritance in Java programming\
    \ language, you can follow the syntax as mentioned below:\n\n```\nClass derived-class\
    \ extends base-class\n{\n    //methods\n}\n```\n\n## Polymorphism\n\nThe technique\
    \ of doing a single task in multiple ways is known as Polymorphism. In Java programming,\
    \ we can use method overriding and method overloading techniques to achieve polymorphism.\
    \ It is essential to know that an object can also be accessed through a reference\
    \ variable and once it has been reassigned to other objects, the type of reference\
    \ variable can be used to determine the method that is to be used to access the\
    \ object.\nFor example:\nPublic interface School{}\nPublic class Student{}\nPublic\
    \ class John extends Student implements School{}\nIn the above case, *John* is\
    \ known to be polymorphic because it has multiple inheritance and we can apply\
    \ the reference variable for the same object as well.\n\n## Abstraction\n\nAn\
    \ Abstract Class is one which includes an abstract keyword in its declaration\
    \ and it can or might not contain abstract methods. In a case where a class has\
    \ an abstract method, it cannot be instantiated and the programmer will have to\
    \ inherit it from another class to implement the abstract method.\n\n## Encapsulation\n\
    \nEncapsulation in Java programming is the process of wrapping data and methods\
    \ together. Generally, the variable of one class will be hidden from another class\
    \ and it can only be accessed through the methods that are being used in their\
    \ current class. The advantages of encapsulation are that a class could be made\
    \ read only or write only and it can also have total control over the data stored.\n\
    \n## Recursion\n\nRecursion is a technique referred to a method which calls itself\
    \ within the program. The recurse() method is called from the main method and\
    \ can also be called from the same recurse() method as well. This process continues\
