- md: "## SQL Index\n\nTo speed up WHERE clauses and SELECT queries as well. To create\
    \ an Index, we can use the CREATE INDEX statement along with the UNIQUE constraint\
    \ to prevent duplicate entries.\n\nSyntax for using CREATE INDEX:\n**CREATE INDEX**\
    \ index_name **ON** table_name;\n\nSyntax for using DROP INDEX:\n**DROP INDEX**\
    \ index_name;\n\n## Truncate Table\n\nThe TRUNCATE TABLE command in SQL is implemented\
    \ to delete complete data from an existing table.\nBasic syntax:\nTRUNCATE TABLE\
    \ table_name;\n\n## SQL Primary and Foreign Key\n\n### Primary Key\n\nThe PRIMARY\
    \ KEY constraint in SQL is implemented to uniquely identify each record in a table.\
    \ Primary keys should always contain unique values and do not have any NULL values.\
    \ Moreover, one table can only have one unique primary key which can be made up\
    \ of single or multiple columns.\nFor example, to define PRIMARY KEY on the ID\
    \ column when the \"Students\" table is created, we can use the following SQL\
    \ statement:\n\n```sql\nCREATE TABLE Students (\n    ID int NOT NULL,\n    FirstName\
    \ varchar(255),\n    LastName varchar(255) NOT NULL,\n    Marks int,\n    PRIMARY\
    \ KEY (ID)\n);\n```\n\n### Foreign Key\n\nThe FOREIGN KEY constraint in SQL is\
    \ implemented to link two tables together for which the FOREIGN KEY in one table\
    \ refers to the PRIMARY KEY from the other table.\nSyntax for implementing the\
    \ FOREIGN KEY constraint on \"StudentID\" column to create \"Student\" table:\n\
    ```sql\nCREATE TABLE Student (\n    StudentID int NOT NULL,\n    StudentMarks\
    \ int NOT NULL,\n    ClassID int,\n    PRIMARY KEY (StudentID),\n    FOREIGN KEY\
    \ (ClassID) REFERENCES Students(StudentID)\n);\n```\n\n## Constraints and Useful\
    \ Resources\n\nConstraints are the specific rules that are implemented on data\
    \ columns of a table. Generally, constraints are implemented to limit the type\
    \ of data that can be inserted into a table. Most commonly, this includes NOT\
    \ NULL Constraint, DEFAULT Constraint, UNIQUE Constraint, PRIMARY KEY, FOREIGN\
    \ KEY, CHECK Constraint, and INDEX.\nFurthermore, Integrity constraints can also\
    \ be used to avail better consistency and accuracy of data present in the relational\
    \ database. Usually, PRIMARY KEY, FOREIGN KEY, and UNIQUE Constraints are a part\
    \ of Referential Integrity (RI).\nIn order to improve the performance of SQL database,\
    \ there are several important factors that can be implemented with ease. While\
    \ writing a column name, it is advised that SELECT statement is used rather than\
    \ the * delimiter.\nFor example:\n```sql\nSELECT * FROM Students\n```\nFurthermore,\
    \ setting the NOCOUNT ON statement will reduce the time required for SQL Server\
    \ to update rows for INSERT, DELETE or UPDATE operations.\n\n## CHAPTER FOUR:\
    \ C\n\nC programming language was developed at AT&T's Bell Laboratories in the\
    \ USA in 1972. Generally, there are two major categories of programming languages\
    \ known as High Level language and Low-level Language but C is ranged as a Middle\
    \ Level language. The purpose of this language is to provide low level access\
    \ to memory and has also given syntax to other major programming languages such\
    \ as PHP and Java.\n\n## Introduction and Simple Programs\n\nBeing a structured\
    \ language, programmers can create partitioned code blocks and create business\
    \ applications by implementing different approaches and programming techniques.\
    \ Moreover, we can also write new functions and repeat them throughout the application\
    \ in the C library.\n\n## Starting with C Programming\n\nWriting a C program is\
    \ simple and easy for beginners. Starting with the basic program syntax, we can\
    \ develop C applications and programs as follows:\n\n```c\n#include <stdio.h>\n\
    int main()\n{\n    int a = 2;\n    printf(\"%d\", a);\n    return 0;\n}\n```\n\
    \n## Header Files\n\nThe first part of writing a C program is selection of header\
    \ files. Generally, a header file is written with extension .h and also contains\
    \ function declarations. To include a header file, we can follow the syntax as\
    \ follows:\n```c\n#include <string.h>\n```\nExamples of C header files:\n\n| Header\
    \ File | Definition |\n|---|---|\n| stdio.h | Used to define input and output\
    \ functions |\n| string.h | Used for string handling |\n| stddef.h | Defines useful\
    \ types and macros |\n| stdlib.h | Defines memory allocation |\n| stdint.h | Used\
    \ for defining integer types |\n| math.h | Used to perform mathematical functions\
    \ |\n\n## Methods and Variable Declaration\n\nThe next part of writing a C program\
    \ is to define a method and declare the variables. Syntax for declaring main method\
