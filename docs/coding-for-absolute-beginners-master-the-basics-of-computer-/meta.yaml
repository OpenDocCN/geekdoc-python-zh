    \ by implementing certain conditions. In Python programming, Loops can be used\
    \ to execute several statements or a set of instructions by using the given control\
    \ structures.\n\nTypes of Loops in Python:\n\n### While Loop\n\nWhile loop is\
    \ used to repeat a statement or iteration ‘n’ number of times within the program.\
    \ Syntax for using While loop in Python is:\n\n```\nWhile expression:\n    Statement\
    \ (s)\n```\n\nSample program:\n\n```\n#!/usr/bin/python\n\ncount = 0\nwhile (count\
    \ < 10):\n    print 'The count is:', count\n    count = count + 2\n```\n\n```\n\
    1  #!/usr/bin/python\n2  \n3  count = 0\n4  while (count < 5):\n5      print 'The\
    \ count is:', count\n6      count = count + 2\n7  |\n```\n\nOutput:\n\n```\nThe\
