    \    font-weight:bold;\n}\n```\n\n# Basic Syntax and Inclusion in HTML\n\nCSS\
    \ is made up of several style rules which are interpreted by the browser and applied\
    \ over the web page. Generally, a style rule is made up of 3 key elements known\
    \ as Selector, Property, and Value.\nSelector is an HTML tag at which a CSS style\
    \ can be applied such as <h1> whereas Property is an attribute of HTML tag such\
    \ as color. Values are assigned to the properties. The basic syntax for creating\
    \ CSS style rule is defined as follows:\nSelector {property: value}\nGenerally,\
    \ inline and external CSS approaches are used to associate styles with the HTML\
    \ document for which the <style> element is placed inside the <head> and </head>\
    \ tags. The syntax for CSS inclusion in an HTML document is defined as follows:\n\
    \n```\n<html>\n    <head>\n        <style type = \"text/css\" media = \"all\"\
    >\n```"
