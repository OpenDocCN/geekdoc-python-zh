    \        caption.left {caption-side:left}\n        caption.right {caption-side:right}\n\
    \    </style>\n</head>\n```\n\nSyntax for Empty Sides Property\n\n```\nhtml\n\
    <head>\n    <style type = \"text/css\">\n        table.empty {\n            width:350px;\n\
