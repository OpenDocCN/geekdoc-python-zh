    \ Margin, Margin-bottom, Margin-top, Margin-left, and Margin-right. Syntax for\
    \ implementing Margin property:\n<p style = \"margin-property: 10px; border:1px\
    \ solid black;\">\n    all four margins will be 10px\n</p>\n\n# Lists, Icons,\
    \ and Dropdowns\n\n# Lists\n\nThere two types of lists used in CSS known as Ordered\
    \ lists and Unordered lists. In the ordered lists, all of the list items are marked\
    \ with serial numbers or alphabets whereas in unordered lists, the list items\
    \ are generally marked"
  merge: -1
  pgno: 134
- img_proc: true
  md: "with bullets. The list value can be created by using values such as circle,\
    \ decimal, lower-roman, upper-roman, decimal-leading zeros, lower-alpha, upper-alpha,\
    \ and square.\nFor example:\n\n```\n<html>\n    <head>\n        <style>\n    \
    \        ul.a\n            {\n                list-style-type:square;\n      \
    \      }\n            ol.c\n            {\n                list-style-type:lower-alpha;\n\
    \            }\n        </style>\n    </head>\n    <body>\n        <h2>\n    \
    \        CSS ORDERED & UNORDERED LISTS\n        </h2>\n        <p>\n         \
    \   Unordered lists\n        </p>\n        <ul class=\"a\">\n            <li>one</li>\n\
    \            <li>two</li>\n            <li>three</li>\n        </ul>\n       \
    \ <ul class=\"b\">\n            <li>one</li>\n            <li>two</li>\n     \
    \       <li>three</li>\n        </ul>\n        <p>\n            Ordered Lists\n\
    \        </p>\n```"
  merge: -1
  pgno: 135
- img_proc: true
  md: "```\n<ol class=\"c\">\n  <li>one</li>\n  <li>two</li>\n  <li>three</li>\n</ol>\n\
    <ol class=\"d\">\n  <li>one</li>\n  <li>two</li>\n  <li>three</li>\n</ol>\n</body>\n\
    </html>\n```\n\nOutput:\n\n# CSS ORDERED & UNORDERED LISTS\n\nUnordered lists\n\
    \n+   - one\n- two\n- three\n- one\n- two\n- three\n\nOrdered Lists\n\n+   a.\
    \ one\nb. two\nc. three\n1. one\n2. two\n3. three\n\n# Icons\n\nBy using the icon\
    \ library from HTML, we can add different types of icons through CSS as well.\
    \ These types of icons include Font awesome icons, Bootstrap icons, and Google\
    \ icons."
