- md: "## Problem Solving with Computer Programming\n\nIn essence, a computer program\
    \ is supposed to solve a specific problem by following a set of instructions.\
    \ People can write a program by following multiple techniques and approaches.\
    \ In order to solve a problem, you need to determine the code flow and fulfill\
    \ the requirements step by step to achieve the desired output. In some cases,\
    \ your computer program may not work even after hours of struggle because of inappropriate\
    \ syntax or flow for which you need to focus on the sequence of instructions and\
    \ computer programming language requirements.\n\nUsing this example of preparing\
    \ a wooden table, you would need to write down the instructions as follows:\n\n\
    1.  Get the most suitable pieces of wood required to make the table.\n2.  Get\
    \ the essential tools and equipment that will be used during the procedure.\n\
    3.  Join the pieces and build your table.\n4.  Polish the end product to make\
    \ it look attractive.\n\nWhen giving such instructions to the computer, you need\
    \ to be more specific and precise because a computer cannot perform operations\
    \ on its own. As it is created to follow instructions, your computer program should\
    \ always follow an incremental approach in order to achieve the desired outcome.\n\
    \nOn the topic of the natural language of a computer, they are unable to understand\
    \ human language and therefore, we need to communicate with the system through\
    \ another language called binary code. Binary code is made up of a series of 1s\
    \ and 0s and is the natural communicating language of computers. In order to help\
    \ the computer understand human language, we use translators and editors for writing\
    \ programs. Translators have the capability to convert the source code into the\
    \ machine’s language.\n\nThere are multiple types of translators known as Interpreters,\
    \ Compilers, and Assemblers. Interpreters are generally used to interpret languages\
    \ which are then processed line by line to run the final program. Moreover, any\
    \ syntax errors or mistakes are also outlined by the interpreter so the programmer\
    \ can clear out the mistakes and execute the program.\n\nWith the help of compilers,\
    \ the source code is converted to binary code through a compilation process and\
    \ is then executed to deliver the output. If there are no errors or mistakes in\
    \ the source code, all of the lines are translated and executed at once by the\
