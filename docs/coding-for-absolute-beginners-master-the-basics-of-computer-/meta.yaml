- img_proc: true
  md: "# Layers\n\nThrough CSS, we can create multiple layers of various divisions\
    \ by implementing the z-index CSS property. For example:\n\n```\n<html>\n    <head>\n\
    \    </head>\n\n    <body>\n        <div style = \"background-color:Blue;\n  \
    \          width:300px;\n            height:100px;\n            position:relative;\n\
    \            top:10px;\n            left:80px;\n            z-index:2\">\n   \
    \     </div>\n\n        <div style = \"background-color:Red;\n            width:300px;\n\
    \            height:100px;\n            position:relative;\n            top:-60px;\n\
    \            left:35px;\n            z-index:1;\">\n        </div>\n\n       \
    \ <div style = \"background-color:Black;\n            width:300px;\n         \
    \   height:100px;\n            position:relative;\n            top:-220px;\n \
    \           left:120px;\n            z-index:3;\">\n        </div>\n    </body>\n\
    </html>\n```\n\nOutput:"
  merge: -1
