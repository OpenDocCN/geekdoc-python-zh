    \ to declare the class variables and attributes as private and read or modify\
    \ the value of a private member through getter and setter methods. The syntax\
    \ for accessing private members is defined as follows:\n\n```\n#include <iostream>\n\
    using namespace std;\n\nclass Employee {\nprivate:\n    // Private attribute\n\
    \    int salary;\n\npublic:\n    // Setter\n    void setSalary(int s) {\n    \
    \    salary = s;\n    }\n    // Getter\n    int getSalary() {\n        return\
    \ salary;\n    }\n};\n\nint main() {\n    Employee myObj;\n    myObj.setSalary(50000);\n\
    \    cout << myObj.getSalary();\n    return 0;\n}\n```"
