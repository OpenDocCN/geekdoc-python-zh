    execution paths as well. As they are lightweight processes, a thread can save
    wastage of CPU cycle and in return boost efficiency of the program.

    There are four main states in the lifecycle of a thread which include Unstarted
    State, Ready State, Not Runnable State, and Dead State. Threads can be created,
    managed, and destroyed by implementing specific C# methods.


    # File I/O


    C# provides different classes to operate with the File system and data handling.
    As these classes can be used to open files, access files, access directories,
    and update existing files, C# includes a specific File class to perform all of
    the I/O operations.

    The class names with details are briefed as follows:


    # File


    File is a static class which provides different operations including move, delete,
    create, open, copy, read, and write.


    # FileInfo


    The FileInfo class performs the same as the static File class and programmers
    can read and write operations by writing the code manually for a specific file.


    # Directory


    The Directory class is also static and provides support for creating, deleting,
    accessing, and moving subdirectories within a file.


    # DirectoryInfo


    The DirectoryInfo class provides different instance methods for accessing, deleting,
    moving, and creating subdirectories.


    # Path


    The Path static class delivers functionality for changing the extension of a file,
    retrieving extension of a file, and retrieving the absolute physical path of a
    specific file.


