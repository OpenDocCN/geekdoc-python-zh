- md: "## CHAPTER EIGHT\n\nHTML\n\n### Introduction and Overview\n\nHyper Text Markup\
    \ Language (HTML) is a standard markup language used to create websites to display\
    \ colors, fonts, displays graphics, media, and images. HTML is comprised of different\
    \ tags that can be used to describe the structure of a web page and tell the browser\
    \ to display the content over the internet.\n\n### What are Tags?\n\nTags give\
    \ instructions to web browsers regarding the structure, display, and content of\
    \ any web page. As they are defined through enclosed angle brackets: <>, tags\
    \ are comprised of attributes and elements. An element is an object on a page\
    \ whereas an attribute describes the quality or details of that element. Remember\
    \ that tags are to be used in pairs and opening tag <tag> and closing tags are\
    \ differentiated by </tag>.\n\nYour first sample HTML web page be created by using\
    \ the following tags:\n\n```html\n<html>\n<head>\n<body>\n<h1>My First Heading</h1>\n\
    <p>My first paragraph</p>\n</body>\n</html>\n```\n\n### Description of Tags\n\n\
    In the above-written HTML document, the <html> tag encloses the complete HTML\
    \ document and is comprised of other major tags including <head>, <body>, and\
    \ <p>. The <head> tag represents the file’s head whereas the <title> tag is used\
    \ to show the document’s header. <body> includes several other tags that are to\
    \ be used to create a web page such as heading <h1> and paragraph <p>.\n\nHTML\
    \ Tags are not case sensitive but they should be used in lower case. To define\
    \ the version of HTML, we can use the following tag:\n\n```html\n<!DOCTYPE html>\n\
    ```\n\nBeginners can run HTML pages by using Notepad PC and save the file in .html\
    \ format. This will allow them to view the webpages in a browser.\n\n### Basic\
    \ Tags and Attributes\n\n#### Basic Tags\n\nEach HTML document is supposed to\
    \ start with a title, heading, and paragraph. After the <body> tag, the next major\
    \ tag to be used is <h1> or heading tag. depending on your content requirements,\
    \ heading tags are defined with <h1> to <h6>. For example:\n\nHeadings:\n\n```html\n\
    <html>\n<body>\n<h1> First heading </h1>\n<h2> Second heading </h2>\n<h3> Third\
    \ heading </h3>\n<h4> Fourth heading </h4>\n<h5> Fifth heading </h5>\n<h6> Sixth\
    \ heading </h6>\n</body>\n</html>\n```\n\nOutput:\n\n![](img/9d932bec53e523b8d8b7b8134cf77ca7_106_0.png)\n\
    \n#### Paragraph\n\nFor adding content, we need to include paragraphs in the HTML\
    \ document. For example:\n\n```html\n<html>\n<head>\n<h1> heading </h1>\n</head>\n\
    <body>\n    <p> First Paragraph </p>\n    <p> Second Paragraph </p>\n</body>\n\
    </html>\n```\n\nOutput:\n\n# heading\n\nFirst Paragraph\n\nSecond Paragraph\n\n\
    To add break between a paragraph, we can use the line break tag <br>.\n\n####\
    \ Summary Tag\n\nTo add summary for the paragraph, the HTML syntax with Summary\
    \ tag is defined as follows:\n\n```html\n<details>\n  <summary>Sample Text</summary>\n\
    \  <p> Web development tutorials</p>\n</details>\n```\n\n#### Span\n\nSpan tag\
    \ is used to color specific part of a text. For example:\n\n```html\n<p> Web development\
    \ is <span style=\"color:red\"> interesting </span> to learn </p>\n```\n\n####\
    \ Select\n\nThe select tag is used for selecting one option from a drop down list.\
    \ For example:\n\n```html\n<select>\n  <option value=\"Red\">Red</option>\n  <option\
    \ value=\"Blue\">Blue</option>\n  <option value=\"Green\">Green</option>\n  <option\
    \ value=\"White\">White</option>\n</select>\n```\n\n#### Thead\n\nThe thead tag\
    \ is used to create a group header content and is used along with <tbody> and\
    \ <tfoot> elements. For example:\n\n```html\n<table>\n  <thead>\n    <tr>\n  \
    \    <th>Course</th>\n      <th>Max Marks</th>\n    </tr>\n  </thead>\n  <tbody>\n\
    \    <tr>\n      <td>Web Engineering</td>\n      <td>85</td>\n    </tr>\n    <tr>\n\
    \      <td>English</td>\n      <td>90</td>\n    </tr>\n  </tbody>\n  <tfoot>\n\
    \    <tr>\n      <td>Sum</td>\n      <td>$180</td>\n    </tr>\n  </tfoot>\n</table>\n\
    ```\n\n| Course | Max Marks |\n|---|---|\n| Web Engineering | 85 |\n| English\
    \ | 90 |\n| Sum | $180 |\n\n### Formatting Tags\n\nTexts within an html document\
    \ can be formatted to different styles, fonts, and sizes. The tags to format text,\
    \ headings, paragraphs, and tables are as follows:\n\n#### Bold\n\nAny text that\
    \ is written between the `<b>` and `</b>` tags is displayed in bold style. For\
    \ example:\n\n`<p> <b> Web development </b> is interesting </p>`\n\nOutput: **Web\
    \ development** is interesting\n\n#### Italic\n\nAny text that is written between\
    \ `<i>` and `</i>` is displayed in italic style. For example:\n\n`<p> <i> Web\
    \ development is interesting </i> </p>`\n\nOutput: *Web development is interesting*\n\
    \n#### Superscript/Subscript\n\nTo display content in superscript, we can use\
    \ <sup>…</sup> tags whereas <sub> and </sub> tags are used for adding subscripts.\
    \ For example:\n\n`<p> This text uses a <sup> superscript </sup> </p>`\n\nOutput:\
    \ The following word uses a superscript\n\n#### Underline\n\nText written between\
    \ <u> and </u> tag is underlined.\n\n`<p> <u> Sample text </u> </p>`\n\nOutput:\
    \ Sample text\n\n#### Insert and Delete tags\n\nTo insert, the <ins> and </ins>\
    \ tags are used, whereas to delete any text, we can use <del> and </del> tags.\n\
    \n#### Link\n\nTo add a link within the text, we can use the following tag:\n\n\
    `<p> <a href = “document location”> </a> </p>`\n\n#### Marquee Tag\n\n<marquee>\
    \ tag can be used with different attributes including width, height, direction,\
    \ behavior, scrollamount, scrolldelay, loop, bgcolor, hspace, and vspace.\n\n\
    Demonstration of marquee tag:\n\n```html\n<html>\n    <head>\n        <title>HTML\
    \ marquee Tag</title>\n    </head>\n    <body>\n        <marquee>Sample text</marquee>\n\
    \    </body>\n</html>\n```\n\n#### Container Tags\n\nIn HTML, the following container\
    \ tags are used to format the text:\n\n| Opening Tag | Closing Tag | Functionality\
    \ |\n|---|---|---|\n| <p> | </p> | Paragraph |\n| <span> | </span> | To add inline\
    \ content within a paragraph |\n| <em> | </em> | Used to give text emphasis |\n\
    | <ol> | </ol> | Ordered list(numbers) |\n| <ul> | </ul> | Unordered list (bullets)\
    \ |\n| <li> | </li> | List item |\n\n### Tables, Images, and Frames\n\n#### Tables\n\
    \nTables are an essential part of any website as they help us to illustrate and\
    \ elaborate key information in a suitable manner. In HTML, there are predefined\
    \ tags that can be used to create and design tables.\n\n##### Tags for Creating\
    \ Tables in HTML\n\nTo create a table, we can use the following tag:\n\n`<table>.....</table>`\n\
    \n**Table Rows**\n\nTag for creating table rows:\n\n`<tr>...</tr>`\n\n**Table\
    \ Height**\n\n`<th>... </th>`. The sample attribute for creating a table to display\
    \ data is scope = “row” and “column” as they define whether the given tag is for\
    \ row header or column header.\n\n**Table data cell**\n\n`<td>...</td>`. The attributes\
    \ for table data cell are colspan = “number” and rowspan = “number” for which\
    \ we need to use the tag along with <th> or <td> elements to span cells across\
    \ multiple rows and columns.\n\n#### Images\n\nImages are an essential part of\
    \ any website. As they help us to illustrate the concepts, services, and information\
    \ in a better way, it is quite simple to insert and manage images in HTML.\n\n\
    Tag for inserting image:\n\n`<img src = “Image URL” ../>`\n\n`<img src = “desktop/images/image1.png”\
    \ alt = “Sample Image” />`\n\nTo set a specific height and width of an image,\
    \ the following syntax can be used:\n\n`<img src = “desktop/images/image1.png”\
    \ alt = “Sample Image” width = “100” height = “100” />`\n\n#### Videos\n\nTo add\
    \ videos in an HTML web page, <video> tag can be used with the following syntax:\n\
    \n```html\n<video>\n    <source src= “Samplevideo.mp4” type= “video/mp4”> </video>\n\
    ```\n\n#### Alignment and Border\n\nThere are three positions to align an image\
    \ on a webpage known as Center, Right, and Left. For this, we can use the align\
    \ attribute. For example:\n\n`<img src = “desktop/images/image1.png” alt = “Sample\
    \ Image” align = “center”/>`\n\nFor creating image border, the attribute is border.\
    \ For example:\n\n`<img src = “desktop/images/image1.png” alt = “Sample Image”\
    \ border = “4”/>`\n\n#### Frames\n\nIn HyperText Markup Language, frames are added\
    \ to create multiple sections in the browser window so that each section can be\
    \ loaded with a unique HTML document. To use frames in a web page, <frameset>\
    \ tag should be used instead of <body> tag which can then be defined with specific\
    \ rows and cols attributes.\n\nSample HTML tags for creating frames:\n\n```html\n\
    <html>\n    <head>\n        <title>HTML Frames</title>\n    </head>\n```"
  mdcn: "## 第八章\n\nHTML\n\n### 简介与概述\n\n超文本标记语言（HTML）是一种标准的标记语言，用于创建网站以显示颜色、字体、图形、媒体和图像。HTML由不同的标签组成，这些标签可用于描述网页的结构，并指示浏览器在互联网上显示内容。\n\
    \n### 什么是标签？\n\n标签向网页浏览器提供关于任何网页的结构、显示和内容的指令。由于它们是通过尖括号 `<>` 定义的，标签由属性和元素组成。元素是页面上的一个对象，而属性描述该元素的特性或细节。请记住，标签需要成对使用，开始标签\
    \ `<tag>` 和结束标签通过 `</tag>` 来区分。\n\n你的第一个示例HTML网页可以使用以下标签创建：\n\n```html\n<html>\n\
    <head>\n<body>\n<h1>My First Heading</h1>\n<p>My first paragraph</p>\n</body>\n\
    </html>\n```\n\n### 标签描述\n\n在上面编写的HTML文档中，`<html>` 标签包含了整个HTML文档，并由其他主要标签组成，包括\
    \ `<head>`、`<body>` 和 `<p>`。`<head>` 标签代表文件的头部，而 `<title>` 标签用于显示文档的标题。`<body>`\
    \ 包含几个其他标签，这些标签用于创建网页，例如标题 `<h1>` 和段落 `<p>`。\n\nHTML标签不区分大小写，但应使用小写字母。要定义HTML的版本，我们可以使用以下标签：\n\
    \n```html\n<!DOCTYPE html>\n```\n\n初学者可以使用记事本（Notepad）运行HTML页面，并将文件保存为.html格式。这将允许他们在浏览器中查看网页。\n\
    \n### 基本标签和属性\n\n#### 基本标签\n\n每个HTML文档都应该以标题、标题和段落开始。在 `<body>` 标签之后，下一个要使用的主要标签是\
    \ `<h1>` 或标题标签。根据你的内容需求，标题标签定义为 `<h1>` 到 `<h6>`。例如：\n\n标题：\n\n```html\n<html>\n\
    <body>\n<h1> First heading </h1>\n<h2> Second heading </h2>\n<h3> Third heading\
    \ </h3>\n<h4> Fourth heading </h4>\n<h5> Fifth heading </h5>\n<h6> Sixth heading\
    \ </h6>\n</body>\n</html>\n```\n\n输出：\n\n![](img/9d932bec53e523b8d8b7b8134cf77ca7_106_0.png)\n\
    \n#### 段落\n\n要添加内容，我们需要在HTML文档中包含段落。例如：\n\n```html\n<html>\n<head>\n<h1> heading\
    \ </h1>\n</head>\n<body>\n    <p> First Paragraph </p>\n    <p> Second Paragraph\
    \ </p>\n</body>\n</html>\n```\n\n输出：\n\n# heading\n\nFirst Paragraph\n\nSecond\
    \ Paragraph\n\n要在段落之间添加换行，我们可以使用换行标签 `<br>`。\n\n#### 摘要标签\n\n要为段落添加摘要，使用摘要标签的HTML语法定义如下：\n\
    \n```html\n<details>\n  <summary>Sample Text</summary>\n  <p> Web development\
    \ tutorials</p>\n</details>\n```\n\n#### Span\n\nSpan标签用于为文本的特定部分着色。例如：\n\n```html\n\
    <p> Web development is <span style=\"color:red\"> interesting </span> to learn\
    \ </p>\n```\n\n#### Select\n\nselect标签用于从下拉列表中选择一个选项。例如：\n\n```html\n<select>\n\
    \  <option value=\"Red\">Red</option>\n  <option value=\"Blue\">Blue</option>\n\
    \  <option value=\"Green\">Green</option>\n  <option value=\"White\">White</option>\n\
    </select>\n```\n\n#### Thead\n\nthead标签用于创建组标题内容，并与 `<tbody>` 和 `<tfoot>` 元素一起使用。例如：\n\
    \n```html\n<table>\n  <thead>\n    <tr>\n      <th>Course</th>\n      <th>Max\
    \ Marks</th>\n    </tr>\n  </thead>\n  <tbody>\n    <tr>\n      <td>Web Engineering</td>\n\
    \      <td>85</td>\n    </tr>\n    <tr>\n      <td>English</td>\n      <td>90</td>\n\
    \    </tr>\n  </tbody>\n  <tfoot>\n    <tr>\n      <td>Sum</td>\n      <td>$180</td>\n\
    \    </tr>\n  </tfoot>\n</table>\n```\n\n| 课程 | 最高分数 |\n|---|---|\n| Web Engineering\
    \ | 85 |\n| English | 90 |\n| Sum | $180 |\n\n### 格式化标签\n\nHTML文档中的文本可以格式化为不同的样式、字体和大小。用于格式化文本、标题、段落和表格的标签如下：\n\
    \n#### 粗体\n\n写在 `<b>` 和 `</b>` 标签之间的任何文本都将以粗体样式显示。例如：\n\n`<p> <b> Web development\
    \ </b> is interesting </p>`\n\n输出：**Web development** is interesting\n\n#### 斜体\n\
    \n写在 `<i>` 和 `</i>` 之间的任何文本都将以斜体样式显示。例如：\n\n`<p> <i> Web development is interesting\
    \ </i> </p>`\n\n输出：*Web development is interesting*\n\n#### 上标/下标\n\n要显示上标内容，我们可以使用\
    \ `<sup>…</sup>` 标签，而 `<sub>` 和 `</sub>` 标签用于添加下标。例如：\n\n`<p> This text uses a\
    \ <sup> superscript </sup> </p>`\n\n输出：The following word uses a superscript\n\
    \n#### 下划线\n\n写在 `<u>` 和 `</u>` 标签之间的文本带有下划线。\n\n`<p> <u> Sample text </u> </p>`\n\
    \n输出：Sample text\n\n#### 插入和删除标签\n\n要插入，使用 `<ins>` 和 `</ins>` 标签，而要删除任何文本，我们可以使用\
    \ `<del>` 和 `</del>` 标签。\n\n#### 链接\n\n要在文本中添加链接，我们可以使用以下标签：\n\n`<p> <a href =\
    \ “document location”> </a> </p>`\n\n#### Marquee标签\n\n`<marquee>` 标签可以与不同的属性一起使用，包括宽度、高度、方向、行为、滚动量、滚动延迟、循环、背景色、水平间距和垂直间距。\n\
    \nmarquee标签示例：\n\n```html\n<html>\n    <head>\n        <title>HTML marquee Tag</title>\n\
    \    </head>\n    <body>\n        <marquee>Sample text</marquee>\n    </body>\n\
    </html>\n```\n\n#### 容器标签\n\n在HTML中，以下容器标签用于格式化文本：\n\n| 开始标签 | 结束标签 | 功能 |\n|---|---|---|\n\
    | `<p>` | `</p>` | 段落 |\n| `<span>` | `</span>` | 在段落内添加内联内容 |\n| `<em>` | `</em>`\
    \ | 用于强调文本 |\n| `<ol>` | `</ol>` | 有序列表（数字） |\n| `<ul>` | `</ul>` | 无序列表（项目符号）\
    \ |\n| `<li>` | `</li>` | 列表项 |\n\n### 表格、图像和框架\n\n#### 表格\n\n表格是任何网站的重要组成部分，因为它们帮助我们以合适的方式说明和阐述关键信息。在HTML中，有预定义的标签可用于创建和设计表格。\n\
    \n##### 在HTML中创建表格的标签\n\n要创建表格，我们可以使用以下标签：\n\n`<table>.....</table>`\n\n**表格行**\n\
    \n创建表格行的标签：\n\n`<tr>...</tr>`\n\n**表格标题**\n\n`<th>... </th>`。用于创建显示数据的表格的示例属性是\
    \ `scope = “row”` 和 `scope = “column”`，因为它们定义了给定标签是行标题还是列标题。\n\n**表格数据单元格**\n\n\
    `<td>...</td>`。表格数据单元格的属性是 `colspan = “number”` 和 `rowspan = “number”`，我们需要将该标签与\
    \ `<th>` 或 `<td>` 元素一起使用，以跨多行和多列合并单元格。\n\n#### 图像\n\n图像是任何网站的重要组成部分。由于它们帮助我们以更好的方式说明概念、服务和信息，在HTML中插入和管理图像非常简单。\n\
    \n插入图像的标签：\n\n`<img src = “Image URL” ../>`\n\n`<img src = “desktop/images/image1.png”\
    \ alt = “Sample Image” />`\n\n要设置图像的特定高度和宽度，可以使用以下语法：\n\n`<img src = “desktop/images/image1.png”\
    \ alt = “Sample Image” width = “100” height = “100” />`\n\n#### 视频\n\n要在HTML网页中添加视频，可以使用\
    \ `<video>` 标签，语法如下：\n\n```html\n<video>\n    <source src= “Samplevideo.mp4” type=\
    \ “video/mp4”> </video>\n```\n\n#### 对齐和边框\n\n在网页上对齐图像有三个位置，称为居中、右对齐和左对齐。为此，我们可以使用\
    \ `align` 属性。例如：\n\n`<img src = “desktop/images/image1.png” alt = “Sample Image”\
    \ align = “center”/>`\n\n要创建图像边框，属性是 `border`。例如：\n\n`<img src = “desktop/images/image1.png”\
    \ alt = “Sample Image” border = “4”/>`\n\n#### 框架\n\n在超文本标记语言中，添加框架是为了在浏览器窗口中创建多个部分，以便每个部分可以加载唯一的HTML文档。要在网页中使用框架，应使用\
    \ `<frameset>` 标签代替 `<body>` 标签，然后可以使用特定的 `rows` 和 `cols` 属性进行定义。\n\n创建框架的示例HTML标签：\n\
    \n```html\n<html>\n    <head>\n        <title>HTML Frames</title>\n    </head>\n\
    ```"
