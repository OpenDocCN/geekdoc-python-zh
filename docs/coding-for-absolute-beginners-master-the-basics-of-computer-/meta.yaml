    # ## Introduction and Overview


    Hyper Text Markup Language (HTML) is a standard markup language used to create
    websites to display colors, fonts, displays graphics, media, and images. HTML
    is comprised of different tags that can be used to describe the structure of a
    web page and tell the browser to display the content over the internet.


    # ### What are Tags?


    Tags give instructions to web browsers regarding the structure, display, and content
    of any web page. As they are defined through enclosed angle brackets: <>, tags
    are comprised of attributes and elements. An element is an object on a page whereas
    an attribute describes the quality or details of that element. Remember that tags
    are to be used in pairs and opening tag <tag> and closing tags are differentiated
    by </tag>.'
