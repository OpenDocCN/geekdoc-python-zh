    \ a C# program is comprised of Namespace declaration, Class, Class methods, attributes,\
    \ Main method, and Statements.\n\nHere is a simple program to print \"Welcome\
    \ to C# programming\" in C#:\n```csharp\nusing System;\n\nnamespace CSharpProgramming\n\
    {\n    class Programming\n    {\n        // Main function\n        static void\
