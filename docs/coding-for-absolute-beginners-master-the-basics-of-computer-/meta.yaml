    # Types of Databases


    There are different types of databases that are classified as per their organizational
    approach and functionality.


    # Relational Database


    A relational database is where the data is defined, organized, and accessed in
    multiple ways. Being a tabular database, the table consists of rows and columns
    which is managed through Structured Query Language (SQL).


    # Distributed Database


    The distributed database has its data stored at multiple sites which are interconnected
    with each other through communication links. This database is further classified
    into Homogeneous and Heterogeneous categories. For the homogeneous distributed
    database system, the same type of hardware, OS, and database applications are
    connected together whereas for the heterogeneous distributed database system,
    the system can be different for each location and connection.


    # Cloud Database


    The Cloud Database environment is designed and built to store data in private,
    public, or hybrid cloud. Providing better scalability and greater storage capacity,
    users can benefit from high availability. It is the best suitable option for business
    applications.


    # NoSQL Database


    NoSQL Database is best suited for large distributed data and it is conveniently
    managed through relational databases. Furthermore, they are effective for big
    data performance issues which cannot be easily solved by using relational databases.


    # Object Oriented Database


    Object Oriented Database is supported by the relational database and is based
    on objects rather than actions.


    # End User Database


    End User Database is a shared database that is specifically designed and created
    for the end user. As it features a summary of the whole database, the end user
    certainly needs not to worry about the operations that are being'
