- md: "## Object Oriented Python\n\nIn object-oriented programming, we are required\
    \ to define classes and objects to perform various functions within the program.\
    \ Like other major programming languages such as C++ and C, we can create, access,\
    \ and update classes by using the object-oriented techniques.\nTo create a student\
    \ class in Python, the code is written as follows:\n\n```python\nclass student:\n\
    \    def __init__(self, ID, name):\n        self.r = ID\n        self.n = name\n\
    \        print(self.n)\n\n# ...\nstud1 = student(1, \"James\")\nstud2 = student(2,\
    \ \"William\")\n\nprint(\"Data successfully stored in variables\")\n```\n\nFor\
    \ accessing the object’s variable, dot operator (.) is used for which the syntax\
    \ is:\n`My_object_name.variable_name`\n\n## Inheritance\n\nInheritance is a useful\
    \ feature of Object-Oriented Programming which allows developers to create a new\
    \ class to inherit all of the methods and properties of an existing class. We\
    \ can define a new child class or derived class with the properties of a parent\
    \ class or base class by using inheritance techniques.\nThe syntax for implementing\
    \ Inheritance in Python is defined as follows:\n```python\nclass BaseClass1:\n\
    \    #Body of Base Class\n    pass\n\nclass DerivedClass(BaseClass1):\n    #body\
    \ of derived class\n    pass\n```\nThe following program shows Vehicle as a parent\
    \ class along with a derived class which will inherit features of parent class\
    \ Vehicle and invoke its functions as well.\n\n```python\nclass Vehicle:  #parent\
    \ class\n    \"\"\"Parent Class\"\"\"\n    def __init__(self, price):\n      \
    \  self.price = price\n    def display(self):\n        print('Price = $', self.price)\n\
    \nclass Category(Vehicle):  #derived class\n    \"\"\"Child/Derived class\"\"\"\
    \n    def __init__(self, price, name):\n        Vehicle.__init__(self, price)\n\
    \        self.name = name\n\n    def disp_name(self):\n        print('Vehicle\
    \ = ', self.name)\n\nobj = Category(2000, 'Mercedes')\nobj.disp_name()\nobj.display()\n\
    ```\n\nOutput:\n```\nVehicle = Mercedes\nPrice = $ 2000\n```\n\nTo override any\
    \ method in the base class, we can define a new method along with the same name\
    \ and parameters in the derived class. The syntax is as follows:\n\n```python\n\
    class A:  #parent class\n    \"\"\"Parent Class\"\"\"\n    def display(self):\n\
    \        print('This is base class.')\n\nclass B(A):  #derived class\n    \"\"\
    \"Child/Derived class\"\"\"\n    def display(self):\n        print('This is derived\
    \ class.')\n\nobj = B()\nobj.display()\n```\n\n## Regular Expressions\n\nIn python\
    \ programming, regular expressions are used to extract information from text including\
    \ documents, log files, spreadsheets, or code. Regular expressions are known as\
    \ characters in special order that allow programmers to find relevant sequence\
    \ or characters or set of strings by using a specialized syntax. Whenever regular\
    \ expressions are written in Python programming language, we are supposed to begin\
    \ raw strings with prefix ‘r’ and other special meta characters as well.\n\n###\
    \ Match Function\nThe match() function is used to check whether the given regular\
    \ expression matches a string in Python or not. In case the pattern does not match,\
    \ we can use the re.match() function.\n\n### Search Function\nThis function attempts\
    \ to search for all of the possible starting points within the string and scans\
    \ through the input string to match any location. It includes the search() or\
    \ re.search() functions.\n\n### Split Function\nThe split function can be applied\
    \ directly on a string whereas the re.split() accepts a pattern which specifies\
    \ the delimiter.\n\n## File I/O\n\nFile is a specific location on a disk which\
    \ is used to store information and data. As it is stored in a hard disk, we can\
    \ also perform read and write operations by implementing python programming methods\
    \ and techniques. File operation in Python consists of three major aspects which\
    \ are open a file, read or write, and close the file.\nOpen() is the built-in\
    \ function in Python programming language which has two parameters known as filename\
    \ and mode. The following methods can be implemented to perform different operations\
    \ in a file:\n\n- “r” = Open or read a file.\n- “w” = Write into a file and create\
    \ a new file if it does not exist.\n- “a” = Open the file for appending and create\
    \ a new file if it does not exist.\n- “x” = Create a new file and return an error\
    \ if file is already present.\n- “t” = Open in text mode.\n- “b” = Open in binary\
    \ mode.\n- “+” = Open file for reading or writing purpose.\n\nSyntax for implementing\
    \ these methods:\n```python\nf = open(\"sample.txt\")\nf = open(\"img.jpg\", \"\
    r\")\n```\nTo close a file, we can use the f.close() function.\n\n## Reading files\
    \ in Python\n\nReading a specific file through Python programming language is\
    \ simple for which we can implement the read(size) method. For example:\n\n```python\n\
    >>> f = open(\"Sample.txt\", 'r')\n>>> f.read(4)    # read the first 4 data\n\
    'This'\n>>> f.read(4)    # read the next 4 data\n' is '\n>>> f.read()     # read\
    \ in the rest till end of file\n'my first file\\nThis file\\ncontains four lines\\\
    n'\n>>> f.read()\n```\n\n## Opening a file on server\n\nTo open the file by using\
    \ the built in open() function, we can use the following syntax:\n\n```python\n\
    f = open(\"Samplefile.txt\", \"r\")\nprint(f.read())\n```\n\nFor reading a specific\
    \ line, we can implement the readline() function:\n\n```python\nf = open(\"Samplefile.txt\"\
    , \"r\")\nprint(f.readline())\n```\n\n## Writing into an existing file\n\nThe\
    \ following Python programming syntax will open the sample file and append content\
    \ as well:\n\n```python\nf = open(\"Samplefile.txt\", \"a\")\nf.write(\"Update\
    \ your content\")\nf.close()\n```\n\n```python\n#open and read the file after\
    \ the appending:\nf = open(\"Samplefile.txt\", \"r\")\nprint(f.read())\n```\n\n\
    ## Creating a file\n\nTo create a new file, open() method will be used which can\
    \ have Create, Append, or Write parameters. The syntax for creating a file in\
    \ Python is defined as follows:\n```python\nf = open(\"Newfile.txt\", \"w\")\n\
    ```\n\n## Delete a File\n\nTo delete an existing file, os.remove() function should\
    \ be used with the following syntax:\n\n```python\nimport os\nos.remove(\"Samplefile.txt\"\
    )\n```\n\nSyntax to check whether a file exists or not. If yes, then delete it:\n\
    \n```python\nimport os\nif os.path.exists(\"Samplefile.txt\"):\n    os.remove(\"\
    Samplefile.txt\")\nelse:\n    print(\"The file does not exist\")\n```\n\n## Advanced\
    \ Python\n\n## Exception Handling\n\nThere are three main methods of exception\
    \ handling in Python programming language. Try, Except, and Finally blocks are\
    \ used to handle errors that occur during program execution.\n\n### Try\nTo generate\
    \ an exception through try block, the following syntax can be implemented:\n\n\
    ```python\ntry:\n    print(x)\nexcept:\n    print(\"An exception occurred\")\n\
    ```\n\nIf no errors were raised, the sample code is as follows:\n\n```python\n\
    try:\n    print(\"Python\")\nexcept:\n    print(\"An exception occurred\")\nelse:\n\
    \    print(\"No exception occurred\")\n```\n\n### Finally\nIn exception handling,\
    \ the finally block will be executed even if the try block has raised an exception\
    \ or not. For example:\n\n```python\ntry:\n    print(\"Python\")\nexcept:\n  \
    \  print(\"An exception occurred\")\nfinally:\n    print(\"try exception finished\"\
    )\n```\n\n## User defined exceptions\n\nAlthough there are several built-in exceptions\
    \ in Python programming language that can be used to force the program to show\
    \ an error when something is wrong, developers can also create custom exceptions\
    \ to fulfill their requirements. To create a new exception, a new class must be\
    \ created from Exception class.\nUser-defined exceptions can be implemented in\
    \ the same way as a normal class because most of the built-in exceptions are derived\
    \ from Exception class.\n\n## Tips for Learning Python\n\nPython Programming language\
    \ is best suitable for programmers who are having interest in Artificial Intelligence,\
    \ Machine Learning, Robotics, or App development. Before starting with programming\
    \ itself, it is compulsory that you are well aware of the basic Python syntax.\
    \ Learning the methods, approaches, and syntax will make it easier for beginners\
    \ to start coding and developing any kind of application on their own.\nFor beginners,\
    \ taking small coding exercises are really beneficial. They can develop sharp\
    \ problem-solving skills and utilize their programming concepts as well. Moreover,\
    \ Python programs or applications can also be contributed to open source from\
    \ where beginners can get comments and suggestions regarding their work.\n\nI\
    \ have also written a book on Python. [Python for Absolute Beginners](https://example.com)\
    \ will help you achieve a solid foundation in Python programming."
  mdcn: "## 面向对象的Python\n\n在面向对象编程中，我们需要定义类和对象来执行程序中的各种功能。与其他主要编程语言（如C++和C）一样，我们可以使用面向对象技术来创建、访问和更新类。\n\
    在Python中创建一个学生类，代码如下：\n\n```python\nclass student:\n    def __init__(self, ID,\
    \ name):\n        self.r = ID\n        self.n = name\n        print(self.n)\n\n\
    # ...\nstud1 = student(1, \"James\")\nstud2 = student(2, \"William\")\n\nprint(\"\
    Data successfully stored in variables\")\n```\n\n要访问对象的变量，使用点运算符（.），其语法为：\n`My_object_name.variable_name`\n\
    \n## 继承\n\n继承是面向对象编程的一个有用特性，它允许开发者创建一个新类来继承现有类的所有方法和属性。我们可以使用继承技术，利用父类或基类的属性来定义一个新的子类或派生类。\n\
    在Python中实现继承的语法定义如下：\n```python\nclass BaseClass1:\n    #基类的主体\n    pass\n\nclass\
    \ DerivedClass(BaseClass1):\n    #派生类的主体\n    pass\n```\n以下程序展示了Vehicle作为父类，以及一个派生类，该派生类将继承父类Vehicle的特性并调用其函数。\n\
    \n```python\nclass Vehicle:  #父类\n    \"\"\"父类\"\"\"\n    def __init__(self, price):\n\
    \        self.price = price\n    def display(self):\n        print('Price = $',\
    \ self.price)\n\nclass Category(Vehicle):  #派生类\n    \"\"\"子类/派生类\"\"\"\n    def\
    \ __init__(self, price, name):\n        Vehicle.__init__(self, price)\n      \
    \  self.name = name\n\n    def disp_name(self):\n        print('Vehicle = ', self.name)\n\
    \nobj = Category(2000, 'Mercedes')\nobj.disp_name()\nobj.display()\n```\n\n输出：\n\
    ```\nVehicle = Mercedes\nPrice = $ 2000\n```\n\n要覆盖基类中的任何方法，我们可以在派生类中定义一个具有相同名称和参数的新方法。语法如下：\n\
    \n```python\nclass A:  #父类\n    \"\"\"父类\"\"\"\n    def display(self):\n     \
    \   print('This is base class.')\n\nclass B(A):  #派生类\n    \"\"\"子类/派生类\"\"\"\n\
    \    def display(self):\n        print('This is derived class.')\n\nobj = B()\n\
    obj.display()\n```\n\n## 正则表达式\n\n在Python编程中，正则表达式用于从文本（包括文档、日志文件、电子表格或代码）中提取信息。正则表达式被称为特殊顺序的字符，允许程序员使用专门的语法来查找相关的序列、字符或字符串集。每当在Python编程语言中编写正则表达式时，我们应该以原始字符串前缀‘r’以及其他特殊元字符开头。\n\
    \n### 匹配函数\n`match()`函数用于检查给定的正则表达式是否与Python中的字符串匹配。如果模式不匹配，我们可以使用`re.match()`函数。\n\
    \n### 搜索函数\n此函数尝试搜索字符串中所有可能的起始点，并扫描输入字符串以匹配任何位置。它包括`search()`或`re.search()`函数。\n\
    \n### 分割函数\n`split`函数可以直接应用于字符串，而`re.split()`接受一个指定分隔符的模式。\n\n## 文件I/O\n\n文件是磁盘上的一个特定位置，用于存储信息和数据。由于它存储在硬盘中，我们也可以通过实现Python编程方法和技术来执行读写操作。Python中的文件操作主要包括三个方面：打开文件、读写和关闭文件。\n\
    `Open()`是Python编程语言中的内置函数，它有两个参数，称为文件名和模式。以下方法可用于在文件中执行不同的操作：\n\n- “r” = 打开或读取文件。\n\
    - “w” = 写入文件，如果文件不存在则创建新文件。\n- “a” = 打开文件进行追加，如果文件不存在则创建新文件。\n- “x” = 创建新文件，如果文件已存在则返回错误。\n\
    - “t” = 以文本模式打开。\n- “b” = 以二进制模式打开。\n- “+” = 打开文件用于读写目的。\n\n实现这些方法的语法：\n```python\n\
    f = open(\"sample.txt\")\nf = open(\"img.jpg\", \"r\")\n```\n要关闭文件，我们可以使用`f.close()`函数。\n\
    \n## 在Python中读取文件\n\n通过Python编程语言读取特定文件很简单，我们可以实现`read(size)`方法。例如：\n\n```python\n\
    >>> f = open(\"Sample.txt\", 'r')\n>>> f.read(4)    # 读取前4个数据\n'This'\n>>> f.read(4)\
    \    # 读取接下来的4个数据\n' is '\n>>> f.read()     # 读取剩余部分直到文件末尾\n'my first file\\nThis\
    \ file\\ncontains four lines\\n'\n>>> f.read()\n```\n\n## 在服务器上打开文件\n\n要使用内置的`open()`函数打开文件，我们可以使用以下语法：\n\
    \n```python\nf = open(\"Samplefile.txt\", \"r\")\nprint(f.read())\n```\n\n要读取特定行，我们可以实现`readline()`函数：\n\
    \n```python\nf = open(\"Samplefile.txt\", \"r\")\nprint(f.readline())\n```\n\n\
    ## 写入现有文件\n\n以下Python编程语法将打开示例文件并追加内容：\n\n```python\nf = open(\"Samplefile.txt\"\
    , \"a\")\nf.write(\"Update your content\")\nf.close()\n```\n\n```python\n# 追加后打开并读取文件：\n\
    f = open(\"Samplefile.txt\", \"r\")\nprint(f.read())\n```\n\n## 创建文件\n\n要创建新文件，将使用`open()`方法，该方法可以具有Create、Append或Write参数。在Python中创建文件的语法定义如下：\n\
    ```python\nf = open(\"Newfile.txt\", \"w\")\n```\n\n## 删除文件\n\n要删除现有文件，应使用`os.remove()`函数，语法如下：\n\
    \n```python\nimport os\nos.remove(\"Samplefile.txt\")\n```\n\n检查文件是否存在。如果存在，则删除它的语法：\n\
    \n```python\nimport os\nif os.path.exists(\"Samplefile.txt\"):\n    os.remove(\"\
    Samplefile.txt\")\nelse:\n    print(\"The file does not exist\")\n```\n\n## 高级Python\n\
    \n## 异常处理\n\nPython编程语言中有三种主要的异常处理方法。Try、Except和Finally块用于处理程序执行期间发生的错误。\n\n###\
    \ Try\n要通过try块生成异常，可以使用以下语法：\n\n```python\ntry:\n    print(x)\nexcept:\n    print(\"\
    An exception occurred\")\n```\n\n如果没有错误发生，示例代码如下：\n\n```python\ntry:\n    print(\"\
    Python\")\nexcept:\n    print(\"An exception occurred\")\nelse:\n    print(\"\
    No exception occurred\")\n```\n\n### Finally\n在异常处理中，即使try块没有引发异常，finally块也会被执行。例如：\n\
    \n```python\ntry:\n    print(\"Python\")\nexcept:\n    print(\"An exception occurred\"\
    )\nfinally:\n    print(\"try exception finished\")\n```\n\n## 用户定义的异常\n\n尽管Python编程语言中有几个内置异常可用于在出错时强制程序显示错误，但开发者也可以创建自定义异常以满足他们的需求。要创建新异常，必须从Exception类创建一个新类。\n\
    用户定义的异常可以像普通类一样实现，因为大多数内置异常都派生自Exception类。\n\n## 学习Python的技巧\n\nPython编程语言最适合对人工智能、机器学习、机器人技术或应用开发感兴趣的程序员。在开始编程本身之前，你必须对基本的Python语法有充分的了解。学习方法、途径和语法将使初学者更容易开始编码并独立开发任何类型的应用程序。\n\
    对于初学者来说，进行小型编码练习非常有益。他们可以培养敏锐的问题解决能力并运用他们的编程概念。此外，Python程序或应用程序也可以贡献给开源，初学者可以从那里获得关于他们工作的评论和建议。\n\
    \n我也写了一本关于Python的书。[Python for Absolute Beginners](https://example.com)将帮助你打下坚实的Python编程基础。"
