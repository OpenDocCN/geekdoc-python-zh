  mdcn: "## Java 标识符与修饰符\n\nJava 标识符应以 A 到 Z 或 a 到 z 的字母开头，因为标识符也区分大小写。你必须记住，关键字永远不能用作标识符，并且标识符在第一个字符之后可以包含任意字符组合。例如，month、$price\
    \ 或 _place。Java 编程语言中有两种类型的修饰符。一种称为访问修饰符，另一种称为非访问修饰符。修饰符通常用于修饰方法或类。\n\n## 对象、类与构造函数\n\
    \n### 类与对象\n\n对象是类的一部分，也被称为类的实例。类代表一组所有对象共有的属性，是一个定义好的原型，对象就是从这个原型创建的。要声明一个类，我们需要包含修饰符、类名、父类、接口和类体。此外，Java\
    \ 中的一切都与对象和类相关联，它们也与方法和属性相结合。以现实生活中的手机为例，它具有颜色、内存、显示屏和重量等属性。要在 Java 中创建一个类，你需要遵循以下语法：\n\
    \n```java\nPublic class NewClass {\n    Int a = 1;\n}\n```\n\n创建一个名为 \"newObj\"\
    \ 的对象：\n\n```java\nPublic class NewClass {\n    Int a = 1;\n    Public static\
    \ void main (String[] args ) {\n        MyClass NewObj = new NewClass();\n   \
    \     System.out.println(newObj.x);\n    }\n}\n```\n\n创建对象需要声明、实例化和初始化。声明是声明变量名和对象类型的过程，而实例化则使用\
    \ new 关键字来创建一个对象。然后程序会调用构造函数来初始化新对象。\n\n## 基本数据类型与变量\n\n在 Java 程序中，数据存储在变量中，程序首先声明变量，将数据读入变量，然后执行提供的操作。一旦过程完成，变量就会被再次写入一个新的位置。变量提供了一个保留的内存位置来存储值，内存由操作系统分配。\n\
    \n### 数据类型\n\nJava 编程语言中有两种不同的数据类型，称为基本数据类型和对象数据类型。基本数据类型分为 8 类：Byte、Short、Int、Long、Float、Double、Boolean\
    \ 和 Char。对象数据类型是通过使用类的构造函数创建的，它们也负责访问对象。每个可用的引用变量的默认值都设置为 null，它也可以用来引用声明类型的对象。\n\
    \n### 变量\n\nJava 编程语言中使用三种类型的变量：\n\n- 1. 局部变量\n- 2. 实例变量\n- 3. 类/静态变量\n\n### 局部变量\n\
    \n局部变量通常在构造函数和方法中声明。由于它们是与构造函数一起创建的，因此不能与局部变量一起使用访问修饰符。局部变量没有默认值。\n\n### 实例变量\n\
    \n实例变量在类中声明，并在每次创建对象时创建。它们应该保存被多个构造函数或方法引用的值。也可以为实例变量指定访问修饰符。\n\n## 运算符、控制语句与决策\n\
    \n### 运算符\n\nJava 编程语言中可用的基本运算符说明如下：\n\n- 算术运算符：算术运算符可用于在程序中执行数学计算和方程求解。这包括加法、减法、乘法、除法、取模以及自增和自减函数。\n\
    - 一元运算符：后缀：expr++ 和前缀 ++expr –expr 表达式。\n- 逻辑运算符：(A && B) 为 false，(A || B) 为 true，!(A\
    \ && B) 为 true。\n- 位运算符：执行逐位操作。\n- 赋值：=, +=, |=, ^=。\n\n### 控制语句\n\nJava 语言的控制语句与其他主要编程语言（如\
    \ C 或 C++）类似。条件详细说明如下：\n\nIf Else：if 语句用于检查给定条件是 true 还是 false。Java 编程语言中有不同类型的\
    \ if 语句，称为 if 语句、if-else 语句、if-else-if 阶梯和嵌套 if 语句。\n\n这是一个演示 if 语句的简单 Java 程序：\n\
    \n```java\npublic class Marks {\n    public static void main(String[] args) {\n\
    \        int Marks=50;\n        if(age<50){\n            System.out.print(\"Your\
    \ marks are less than 50\");\n        }\n    }\n}\n```\n\n上述程序的输出为：Your marks\
    \ are less than 50。\n\nIf-else：该语句用于测试条件，如果结果为 true，则执行 If 块；如果为 false，则执行 else\
    \ 语句。\n\nSwitch：Switch 语句用于从多个条件中执行单个语句。该语句可以处理包括 short、int、long、byte、String 和\
    \ Long 在内的数据类型。\n\nSwitch 语句的语法如下：\n\n```java\nswitch(expression){\n    case value1:\n\
    \        //code to be executed;\n        break;\n    case value2:\n        //code\
    \ to be executed;\n        break;\n    default:\n        //code to be executed\
    \ if all cases are not matched;\n}\n```\n\n### 循环\n\n编程语言中通常使用三种循环。\n\n- For 循环\n\
    - While 循环\n- Do-while 循环\n\n### For 循环\n\nFor 循环用于在程序的一部分中执行迭代。如果迭代次数是固定的，建议你在程序中使用\
    \ For 循环。\n\n### While 循环\n\nWhile 循环具有重复单个或一组语句以测试给定条件是否为 true 的特性。当迭代次数不固定时使用它。\n\
    \n### Do While 循环\n\nDo While 循环用于多次迭代程序的一部分。如果迭代次数不固定，你需要至少执行一次程序。\n\n有一些特定的循环控制语句需要将执行更改为正常顺序。Java\
    \ 编程语言中使用的两个控制语句包括：\n\n- Break 语句：终止 switch 或循环以开始下一个循环。\n- Continue 语句：允许循环重新测试其条件并跳过循环体的其余部分。\n\
    \n### 决策\n\n决策结构的特点是一个或多个条件需要在给定场景下进行测试。如果条件为 true，则可以执行下一条语句；如果给定条件为 false，则程序将终止。下图正确展示了决策过程的实际工作方式：\n\
    \n## 字符、字符串、数组与正则表达式\n\nJava 编程语言使用 Character 包装类，并提供多种静态方法来操作字符。要创建一个字符对象，你需要遵循以下语法：\n\
    \n```java\nCharacter ch = new Character ('a');\n```\n\n编译器将自动创建一个 Character 对象，如果你将任何原始\
    \ char 传递给该方法，编译器将使用语言中的各种方法将 Char 转换为 Character。\n\n正如我们之前讨论过字符串的重要性和功能，Java\
    \ 平台也提供了来自字符串类的支持。程序员可以通过多种方式操作字符串。在 Java 语言中创建字符串的示例代码如下：\n\n```java\npublic\
    \ class NewString {\n    public static void main(String args[]) {\n        char[]\
    \ StudentArray = { 'S', 'T', 'U', 'D', 'E', 'N', 'T'};\n        String StudentString\
    \ = new String(StudentArray);\n        System.out.println( StudentString );\n\
    \    }\n}\n```\n\n该程序的输出为：Student。\n\n此外，我们还可以在 Java 编程语言中使用简单的连接方法来连接字符串，如下所示：\n\
    \n```java\nString1.concat( string2);\n```\n\n要在 Java 中创建一个字符串对象，程序员可以选择字面量或关键字方法。\n\
    \n### 数组\n\n数组是每种编程语言的重要组成部分，因为它们允许程序员处理和存储数据到变量中。由于它们用于存储大量数据集合，你也可以将数组视为相同类别变量的集合。要声明一个数组，你可以遵循以下简要语法：\n\
    \n```java\ndatatype[] arrayRefVar;\n```\n\n在 Java 中创建数组很简单，你可以使用以下语法：\n\n```java\n\
    arrayRefVar = new datatype[arraySize];\n```\n\n此语句将创建一个给定大小的数组，并将此数组的引用分配给给定的变量。通常，数组使用\
    \ for 循环或 foreach 循环进行处理，因为数组内的元素具有相同的类型和大小。\n\n用于排序、搜索、比较和填充数组元素的静态方法："
