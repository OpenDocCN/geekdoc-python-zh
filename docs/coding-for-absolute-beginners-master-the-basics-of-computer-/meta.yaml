    \ add a new HTML document into an existing one. To create an iFrame, the following\
    \ syntax can be implemented along with the `<iframe>` tag:\n`<iframe src= https://www.samplewebsite.com></iframe>`\n\
    \nComplete table of basic HTML tags:\n\n| <a> | <abbr> | <acronym> | <address>\
    \ | <applet> |\n| <area> | <article> | <aside> | <audio> | <b> |\n| <base> | <basefont>\
    \ | <bdi> | <bdo> | <big> |\n| <blockquote> | <body> | <br> | <button> | <canvas>\
    \ |\n| <caption> | <center> | <cite> | <code> | <col> |\n| <colgroup> | <data>\
    \ | <datalist> | <dd> | <del> |\n| <details> | <dfn> | <dialog> | <dir> | <div>\
    \ |\n| <dl> | <dt> | <em> | <embed> | <fieldset> |\n| <figcaption> | <figure>\
    \ | <font> | <footer> | <form> |\n| <frame> | <frameset> | <h1> - <h6> | <head>\
    \ | <header> |\n| <hr> | <html> | <i> | <iframe> | <img> |\n| <input> | <ins>\
    \ | <kbd> | <label> | <legend> |\n| <li> | <link> | <main> | <map> | <mark> |\n\
    | <meta> | <meter> | <nav> | <noframes> | <noscript> |\n| <object> | <ol> | <optgroup>\
    \ | <option> | <output> |\n| <p> | <param> | <picture> | <pre> | <progress> |\n\
    | <q> | <rp> | <rt> | <ruby> | <s> |\n| <samp> | <script> | <section> | <select>\
    \ | <small> |\n| <source> | <span> | | <strong> | <style> |\n| <sub> | <summary>\
    \ | <sup> | <svg> | <table> |\n| <tbody> | <td> | <template> | <textarea> | <tfoot>\
    \ |\n| <th> | <thead> | <time> | <title> | <tr> |\n| <track> | <tt> | <u> | <ul>\
    \ | <var> |\n| <video> | <wbr> | | | |\n\n## Forms\n\nHTML forms are one of the\
    \ key aspects of interaction between a website and a user. A form is created by\
    \ using widgets such as text fields, buttons, select boxes, radio buttons, file\
    \ select boxes, hidden controls, and clickable controls. Data collected through\
    \ forms is sent to the web server and the web page can also intercept the data\
    \ on its own. Most of the times, widgets are linked with a label in order to describe\
    \ their purpose.\nSyntax for creating a form in HTML:\n```html\n<form action =\
    \ \"Script URL\" method = \"GET|POST\">\n    form elements like input, buttons\
    \ etc.\n</form>\n```\nInput form to take Name and Age from user:\n```html\n<html>\n\
    \    <head>\n        <title>My first HTML form</title>\n    </head>\n    <body>\n\
    \        <form >\n            Name: <input type = \"text\" name = \"Name\" />\n\
    \            <br>\n            Age: <input type = \"text\" name = \"last name\"\
    \ />\n        </form>\n    </body>\n</html>\n```\n\nOutput:\n\n![](img/9d932bec53e523b8d8b7b8134cf77ca7_114_0.png)\n\
    \n## Text Fields\n\nText fields in HTML allow users to input text into the form.\
    \ The general syntax for creating text fields is defined as follows:\n`<input\
    \ type = \"text\" type = \"text\" value = \"text\">`\n\n## Button controls\n\n\
    There are different ways to submit data into forms. We can add clickable buttons\
    \ by using the following HTML tags:\n`<input type = \"submit\" name = \"submit\"\
    \ value = \"Submit\" />`\n`<input type = \"reset\" name = \"reset\" value = \"\
    Reset\" />`\n`<input type = \"button\" name = \"button\" value = \"button\" />`\n\
    \nOutput:\n\n![](img/9d932bec53e523b8d8b7b8134cf77ca7_114_1.png)\n\n## Select\
    \ box\n\nTo create a dropdown list in HTML forms, we can use the `<select>` and\
    \ `<option>` element.\nFor example:\n```html\n<html>\n<head>\n    <title>File\
    \ Upload Box</title>\n</head>\n<body>\n    <form>\n        <label for=\"Course\"\
    >Course:</label>\n        <select name=\"Course\" id=\"course\">\n           \
    \ <option value=\"Web Engineering\">Web Engineering</option>\n            <option\
    \ value=\"Calculus\">Calculus</option>\n            <option value=\"Data Science\"\
    >Data Science</option>\n        </select>\n    </form>\n</body>\n</html>\n```\n\
    \nOutput:\n\n![](img/9d932bec53e523b8d8b7b8134cf77ca7_115_0.png)\n\n## Select\
    \ Box\n\nThe Select Box element gives an option to list down multiple options\
    \ in HTML form.\nFor example:\n```html\n<html>\n    <head>\n        <title>Select\
    \ your course</title>\n    </head>\n    <body>\n        <form>\n            <select\
    \ name = \"dropdown\">\n                <option value = \"Math\" selected>Math</option>\n\
    \                <option value = \"Physics\">Physics</option>\n            </select>\n\
    \        </form>\n    </body>\n</html>\n```\n\nOutput:\n\n![](img/9d932bec53e523b8d8b7b8134cf77ca7_116_0.png)\n\
    \n## Form Element\n\nOnce the HTML form has been completed, the two attributes\
    \ Action and Method are required to store and send form data. Action contains\
    \ the address which defines where the form data will be sent whereas Method can\
    \ either be GET or POST as it defines how to handle form information. The syntax\
    \ for creating Form element is defined as follows:\n`<form action = \"/login\"\
    \ method = \"POST\">`\n\n## Designing\n\nIn HTML, the default background color\
    \ for any webpage is white. To change the background color, the following tags\
    \ and attributes can be used:\n`<tagname bgcolor = \"color value/color name\"\
    >`\nFor example:\n`<table bgcolor = \"green\">`\n`<table bgcolor = \"#f1f1f1\"\
    >`\n\n## Fonts\n\nFonts are an essential part of any website and enhance the readability\
    \ of your content. The `<font>` tag can be used to give a specific style, size,\
    \ and color to the text and its attributes include size, color, and face.\nTo\
    \ set the font size, the tags and attributes are:\n`<font size = \"14\"> Text\
    \ </font>`\nFont face tags and attributes:\n`<font face = \"Times New Roman\"\
    \ size = \"14\"> Text </font>`\n\n## Font color\n\nTo change the font color, the\
    \ following HTML tags and attributes can be used:\n```html\n<html>\n    <head>\n\
    \        <title>Setting Font Color</title>\n    </head>\n    <body>\n        <font\
    \ color = \"Blue\">This text is blue</font>\n    </body>\n</html>\n```\n\nOutput:\
    \ This text is blue\n\n## Marked text\n\nThe text written between `<mark>` and\
    \ `</mark>` elements is displayed as marked with yellow.\nFor example:\n`<p> This\
    \ text is marked as <mark> Yellow </mark> </p>`\nOutput: This text is marked as\
    \ Yellow.\n\n## Meta Tags\n\nIn HTML, meta tags can be used to add metadata into\
    \ your web pages. The attributes of meta tags include Name, Content, Scheme, and\
    \ http-equiv. We can use `<meta>` tag to give a short description about the document\
    \ which can also improve search engine indexing for your web page.\nFor example:\n\
    ```html\n<html>\n    <head>\n        <title>Meta Tags Example</title>\n      \
    \  <meta name = \"keywords\" content = \"HTML, Meta Tags, Metadata\" />\n    \
    \    <meta name = \"description\" content = \"Meta Tags.\" />\n        <meta name\
    \ = \"revised\" content = \"3/7/2019\" />\n        <meta http-equiv = \"cookie\"\
    \ content = \"userid = abc; expires = Monday, 08-Sep-19 23:59:59 GMT;\" />\n \
    \   </head>\n    <body>\n        <p>Welcome to HTML</p>\n    </body>\n</html>\n\
    ```\n\n## Comments\n\nTo place comments in HTML code, the following syntax can\
    \ be followed:\n```html\n<html>\n    <head> <!-- Document Header Starts -->\n\
    \        <title>Document title</title>\n    </head> <!-- Document Header Ends\
    \ -->\n\n    <body>\n        <p>Document content goes here.....</p>\n    </body>\n\
    </html>\n```\n\n## HTML Style Sheets\n\nFor further design of HTML documents,\
    \ Cascading Style Sheets (CSS) are implemented over the website. They provide\
    \ easy, effective, and manageable alternatives to specify certain attributes for\
    \ a website. We will be discussing CSS in full detail in the next chapter.\n\n\
    ## Layout and Responsiveness\n\nHTML includes various types of semantic elements\
    \ that are used to define different parts of a web page. These elements include\
    \ Header, Container, Section, Article, Aside, Details, and Footer. Although CSS\
    \ is the best approach to design layout of a web page, we can also complete the\
    \ procedure through these HTML elements.\nA responsive web design is created by\
    \ using HTML and CSS. This procedure automatically resizes and adjusts a website\
    \ to make it look suitable on all devices such as desktop, smartphone, and tablet.\
    \ For more details regarding responsiveness, learning about CSS and Bootstrap\
    \ language will prove to be of great advantage."
  mdcn: "## iFrame\n\n要创建嵌套浏览上下文，可以使用 iFrame 标签将新的 HTML 文档添加到现有文档中。要创建 iFrame，可以结合\
    \ `<iframe>` 标签使用以下语法：\n`<iframe src= https://www.samplewebsite.com></iframe>`\n\
    \n基本 HTML 标签完整表格：\n\n| <a> | <abbr> | <acronym> | <address> | <applet> |\n| <area>\
    \ | <article> | <aside> | <audio> | <b> |\n| <base> | <basefont> | <bdi> | <bdo>\
    \ | <big> |\n| <blockquote> | <body> | <br> | <button> | <canvas> |\n| <caption>\
    \ | <center> | <cite> | <code> | <col> |\n| <colgroup> | <data> | <datalist> |\
    \ <dd> | <del> |\n| <details> | <dfn> | <dialog> | <dir> | <div> |\n| <dl> | <dt>\
    \ | <em> | <embed> | <fieldset> |\n| <figcaption> | <figure> | <font> | <footer>\
    \ | <form> |\n| <frame> | <frameset> | <h1> - <h6> | <head> | <header> |\n| <hr>\
    \ | <html> | <i> | <iframe> | <img> |\n| <input> | <ins> | <kbd> | <label> | <legend>\
    \ |\n| <li> | <link> | <main> | <map> | <mark> |\n| <meta> | <meter> | <nav> |\
    \ <noframes> | <noscript> |\n| <object> | <ol> | <optgroup> | <option> | <output>\
    \ |\n| <p> | <param> | <picture> | <pre> | <progress> |\n| <q> | <rp> | <rt> |\
    \ <ruby> | <s> |\n| <samp> | <script> | <section> | <select> | <small> |\n| <source>\
    \ | <span> | | <strong> | <style> |\n| <sub> | <summary> | <sup> | <svg> | <table>\
    \ |\n| <tbody> | <td> | <template> | <textarea> | <tfoot> |\n| <th> | <thead>\
    \ | <time> | <title> | <tr> |\n| <track> | <tt> | <u> | <ul> | <var> |\n| <video>\
    \ | <wbr> | | | |\n\n## 表单\n\nHTML 表单是网站与用户交互的关键方面之一。表单通过使用诸如文本框、按钮、选择框、单选按钮、文件选择框、隐藏控件和可点击控件等小部件来创建。通过表单收集的数据会发送到\
    \ Web 服务器，网页本身也可以拦截这些数据。大多数情况下，小部件会与标签关联以描述其用途。\n在 HTML 中创建表单的语法：\n```html\n<form\
    \ action = \"Script URL\" method = \"GET|POST\">\n    form elements like input,\
    \ buttons etc.\n</form>\n```\n用于从用户获取姓名和年龄的输入表单：\n```html\n<html>\n    <head>\n\
    \        <title>My first HTML form</title>\n    </head>\n    <body>\n        <form\
    \ >\n            Name: <input type = \"text\" name = \"Name\" />\n           \
    \ <br>\n            Age: <input type = \"text\" name = \"last name\" />\n    \
    \    </form>\n    </body>\n</html>\n```\n\n输出：\n\n![](img/9d932bec53e523b8d8b7b8134cf77ca7_114_0.png)\n\
    \n## 文本框\n\nHTML 中的文本框允许用户在表单中输入文本。创建文本框的一般语法定义如下：\n`<input type = \"text\" type\
    \ = \"text\" value = \"text\">`\n\n## 按钮控件\n\n有多种方式可以将数据提交到表单中。我们可以使用以下 HTML 标签添加可点击的按钮：\n\
    `<input type = \"submit\" name = \"submit\" value = \"Submit\" />`\n`<input type\
    \ = \"reset\" name = \"reset\" value = \"Reset\" />`\n`<input type = \"button\"\
    \ name = \"button\" value = \"button\" />`\n\n输出：\n\n![](img/9d932bec53e523b8d8b7b8134cf77ca7_114_1.png)\n\
    \n## 选择框\n\n要在 HTML 表单中创建下拉列表，我们可以使用 `<select>` 和 `<option>` 元素。\n例如：\n```html\n\
    <html>\n<head>\n    <title>File Upload Box</title>\n</head>\n<body>\n    <form>\n\
    \        <label for=\"Course\">Course:</label>\n        <select name=\"Course\"\
    \ id=\"course\">\n            <option value=\"Web Engineering\">Web Engineering</option>\n\
    \            <option value=\"Calculus\">Calculus</option>\n            <option\
    \ value=\"Data Science\">Data Science</option>\n        </select>\n    </form>\n\
    </body>\n</html>\n```\n\n输出：\n\n![](img/9d932bec53e523b8d8b7b8134cf77ca7_115_0.png)\n\
    \n## 选择框\n\n选择框元素提供了在 HTML 表单中列出多个选项的功能。\n例如：\n```html\n<html>\n    <head>\n \
    \       <title>Select your course</title>\n    </head>\n    <body>\n        <form>\n\
    \            <select name = \"dropdown\">\n                <option value = \"\
    Math\" selected>Math</option>\n                <option value = \"Physics\">Physics</option>\n\
    \            </select>\n        </form>\n    </body>\n</html>\n```\n\n输出：\n\n\
    ![](img/9d932bec53e523b8d8b7b8134cf77ca7_116_0.png)\n\n## 表单元素\n\nHTML 表单完成后，需要\
    \ Action 和 Method 两个属性来存储和发送表单数据。Action 包含定义表单数据发送地址的地址，而 Method 可以是 GET 或 POST，因为它定义了如何处理表单信息。创建表单元素的语法定义如下：\n\
    `<form action = \"/login\" method = \"POST\">`\n\n## 设计\n\n在 HTML 中，任何网页的默认背景颜色都是白色。要更改背景颜色，可以使用以下标签和属性：\n\
    `<tagname bgcolor = \"color value/color name\">`\n例如：\n`<table bgcolor = \"green\"\
    >`\n`<table bgcolor = \"#f1f1f1\">`\n\n## 字体\n\n字体是任何网站的重要组成部分，可以增强内容的可读性。`<font>`\
    \ 标签可用于为文本指定特定的样式、大小和颜色，其属性包括 size、color 和 face。\n要设置字体大小，标签和属性为：\n`<font size\
    \ = \"14\"> Text </font>`\n字体名称标签和属性：\n`<font face = \"Times New Roman\" size\
    \ = \"14\"> Text </font>`\n\n## 字体颜色\n\n要更改字体颜色，可以使用以下 HTML 标签和属性：\n```html\n\
    <html>\n    <head>\n        <title>Setting Font Color</title>\n    </head>\n \
    \   <body>\n        <font color = \"Blue\">This text is blue</font>\n    </body>\n\
    </html>\n```\n\n输出：This text is blue\n\n## 标记文本\n\n写在 `<mark>` 和 `</mark>` 元素之间的文本将以黄色标记显示。\n\
    例如：\n`<p> This text is marked as <mark> Yellow </mark> </p>`\n输出：This text is\
    \ marked as Yellow.\n\n## Meta 标签\n\n在 HTML 中，meta 标签可用于向网页添加元数据。meta 标签的属性包括\
    \ Name、Content、Scheme 和 http-equiv。我们可以使用 `<meta>` 标签为文档提供简短描述，这也可以改善网页的搜索引擎索引。\n\
    例如：\n```html\n<html>\n    <head>\n        <title>Meta Tags Example</title>\n \
    \       <meta name = \"keywords\" content = \"HTML, Meta Tags, Metadata\" />\n\
    \        <meta name = \"description\" content = \"Meta Tags.\" />\n        <meta\
    \ name = \"revised\" content = \"3/7/2019\" />\n        <meta http-equiv = \"\
    cookie\" content = \"userid = abc; expires = Monday, 08-Sep-19 23:59:59 GMT;\"\
    \ />\n    </head>\n    <body>\n        <p>Welcome to HTML</p>\n    </body>\n</html>\n\
    ```\n\n## 注释\n\n要在 HTML 代码中添加注释，可以遵循以下语法：\n```html\n<html>\n    <head> <!-- Document\
    \ Header Starts -->\n        <title>Document title</title>\n    </head> <!-- Document\
    \ Header Ends -->\n\n    <body>\n        <p>Document content goes here.....</p>\n\
    \    </body>\n</html>\n```\n\n## HTML 样式表\n\n为了进一步设计 HTML 文档，在网站上实现了层叠样式表（CSS）。它们为网站指定某些属性提供了简单、有效且易于管理的替代方案。我们将在下一章详细讨论\
    \ CSS。\n\n## 布局和响应式设计\n\nHTML 包含各种类型的语义元素，用于定义网页的不同部分。这些元素包括 Header、Container、Section、Article、Aside、Details\
    \ 和 Footer。虽然 CSS 是设计网页布局的最佳方法，但我们也可以通过这些 HTML 元素来完成此过程。\n响应式网页设计是通过使用 HTML 和\
    \ CSS 创建的。此过程会自动调整网站的大小和布局，使其在桌面、智能手机和平板电脑等所有设备上都能呈现合适的外观。有关响应式设计的更多详细信息，学习 CSS\
    \ 和 Bootstrap 语言将大有裨益。"
