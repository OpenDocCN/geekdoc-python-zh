- md: "## HTML Templates\n\nHTML website templates are a quick and easy way to develop\
    \ a website. As this template is a pre-built website, developers can modify and\
    \ add functionalities as required. The greatest advantage of using an HTML template\
    \ is that developers do not need to spend hours designing the website and focus\
    \ on actual code to meet website functionality requirements. Moreover, HTML templates\
    \ are best suited for those who are not able to design an attractive website as\
    \ it can also be customized as per the given instructions.\n\n## Helpful Tips\
    \ for Using HTML\n\nEven after we have discussed all of the major tags, attributes,\
    \ and functionality of HTML, there are some other important aspects that need\
    \ to be focused on to make your website more productive and efficient. When using\
    \ an opening HTML tag, always write the corresponding closing tag before you begin\
    \ writing the elements and attributes. For example, `<p>...</p>`. This will make\
    \ sure your HTML pages are working properly on all browsers and try to style your\
    \ web pages through CSS.\n\nAfter you are done writing the HTML code for all of\
    \ the web pages, run the code through an HTML validator before publishing on the\
    \ internet. This activity will disclose any errors or missing tags in advance\
    \ so that your website does not lack functionality when published online. Moreover,\
    \ pay attention to formatting of images or videos because they are sometimes disrupted\
    \ when uploaded on the internet. Specifying the width and height along with the\
    \ image tag can help you overcome this problem.\n\nAlthough tables are a simple\
    \ way to lay out content on the page, you should focus on CSS rules and build\
    \ HTML page content through CSS. Not only this will format your website in a better\
    \ way, you can also benefit from CSS positioning and increase the responsiveness\
    \ of your website as well.\n\n# CHAPTER NINE\n\n## CSS\n\n### What is CSS?\n\n\
    CSS stands for “Cascading Style Sheet” and is responsible for controlling the\
    \ style, design, and appearance of a web document. This design language has the\
    \ capability to simplify the process of web designing and also increases the flexibility\
    \ of a website. Through CSS, we can change the outlook, fonts, design, appearance,\
    \ and format of the whole website by making appropriate adjustments in the CSS.\n\
    \nLearning CSS is as simple as HTML because both of the languages are linked together\
    \ and have almost the same syntax. Upon using CSS, we can define a specific style\
    \ for each HTML element and apply it to multiple web pages. Moreover, there is\
    \ no need to write HTML tag attributes or elements each time which makes pages\
    \ load faster. With CSS, we can give a better appearance to our web pages because\
    \ there is a wider range of attributes compared to HTML and the style sheets provide\
    \ different versions of a website to display perfectly on desktop PCs, smartphones,\
    \ and tablets.\n\n## Types of CSS\n\nThe three main types of CSS are Inline CSS,\
    \ Internal CSS, and External CSS.\n\n### Inline CSS\n\nInline CSS has the CSS\
    \ property implemented in a specific section attached with the element in HTML\
    \ document. For example:\n\n```html\n<html>\n    <head>\n        <title>Inline\
    \ CSS</title>\n    </head>\n\n    <body>\n        <p style = \"color:Blue; font-size:50px;\n\
    \                    font-style:italic; text-align:center;\">\n            Cascading\
    \ Style sheets\n        </p>\n    </body>\n</html>\n```\n\nOutput:\n\n### Internal\
    \ CSS\n\nInternal CSS is implemented over a single HTML document to give it a\
    \ unique style. Remember that the rule must be implemented within the HTML file\
    \ in head section.\n\nSyntax for implementing Internal CSS:\n\n```html\n<head>\n\
    \    <title>Internal css</title>\n    <style>\n        selector{\n           \
    \ Property:value;\n        }\n    </style>\n</head>\n```\n\n### External CSS\n\
    \nThe External CSS has a separate CSS file which includes only one style property\
    \ along with the tag attributes. External CSS file needs to be linked with the\
    \ HTML document by using the Link tag.\n\nExample of External CSS:\n\n```css\n\
    body {\n    background-color:Green;\n}\n.main {\n    text-align:center;\n}\n.GFG\
    \ {\n    color:#009900;\n    font-size:50px;\n    font-weight:bold;\n}\n```\n\n\
    ### Basic Syntax and Inclusion in HTML\n\nCSS is made up of several style rules\
    \ which are interpreted by the browser and applied over the web page. Generally,\
    \ a style rule is made up of 3 key elements known as Selector, Property, and Value.\n\
    \nSelector is an HTML tag at which a CSS style can be applied such as `<h1>` whereas\
    \ Property is an attribute of HTML tag such as color. Values are assigned to the\
    \ properties. The basic syntax for creating CSS style rule is defined as follows:\n\
    \n`Selector {property: value}`\n\nGenerally, inline and external CSS approaches\
    \ are used to associate styles with the HTML document for which the `<style>`\
    \ element is placed inside the `<head>` and `</head>` tags. The syntax for CSS\
    \ inclusion in an HTML document is defined as follows:\n\n```html\n<html>\n  \
    \  <head>\n        <style type = \"text/css\" media = \"all\">\n        body {\n\
    \            background-color: Grey;\n        }\n        h1 {\n            color:\
    \ White;\n            margin-left: 40px;\n        }\n        </style>\n    </head>\n\
