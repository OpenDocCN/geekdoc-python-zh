    ## 文本\n\n通过 CSS 文本属性，现在可以将文本转换为不同的颜色、样式和缩进。这些文本属性包括：\n\n- **文本颜色：** 更改文本的颜色。\n\
    - **文本对齐：** 指定文本的水平或垂直对齐方式。\n- **文本装饰：** 概述文本的装饰效果。\n- **文本转换：** 控制文本的大小写。\n-\
    \ **文本缩进：** 指定首行的缩进。\n- **字母间距：** 增加或减少单词之间的间距。\n- **行高：** 指定行高。\n- **文本方向：**\
    \ 设置书写方向。\n- **单词间距：** 设置单词之间的间距。\n- **文本阴影：** 为文本添加阴影效果。\n\nCSS 文本属性的语法：\n\n\
    ```\n文本颜色：\nbody\n{\n    color: Red;\n}\n```\n\n```\n文本对齐：\nh1 {\n    text-align:\
    \ center;\n}\n\nh2 {\n    text-align: left;\n}\n\nh3 {\n    text-align: right;\n\
    }\n```\n\n```\n文本装饰\nh1\n{\n    text-decoration: overline/underline/line-through;\n\
    }\n```\n\n## 文本转换\n\n```\np.uppercase {\n  text-transform: uppercase;\n}\n\np.lowercase\
    \ {\n  text-transform: lowercase;\n}\n\np.capitalize {\n  text-transform: capitalize;\n\
    }\n```\n\n## 文本缩进\n\n```\np\n{\n    Text-indent: 100px;\n}\n```\n\n## 字母间距\n\n\
    ```\nh1 {\n  letter-spacing: 3px;\n}\n\nh2 {\n  letter-spacing: -3px;\n}\n```\n\
    \n## 行高\n\n```\np.small {\n  line-height: 0.6;\n}\n\np.big {\n  line-height: 1.6;\n\
