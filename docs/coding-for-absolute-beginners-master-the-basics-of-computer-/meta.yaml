  md: '# CHAPTER ONE


    # WHAT IS PROGRAMMING?


    Generally, programming is referred to as a set of instructions that the computer
    utilizes to complete certain tasks. This is also known as coding. Before delving
    into an in-depth discussion, you must be well aware of how programming works and
    how the set of instructions are processed by the computer. When you are able to
    follow the correct approach of writing computer programs, it can become quite
    easy to implement functions, operators, and syntax for any language. Moreover,
    programming is a way to communicate with computers through binary language for
    which programmers need to understand high level and low-level languages including
    syntax as well.


    In order to solve a problem with a computer, users are required to present the
    solution for the problem through a set of instructions which can be utilized to
    execute the program. As a program is a collection of instructions that are required
    to solve a problem, appropriate statements and functionality must be added in
    order to achieve the desired outcome. For example, if you are given the task to
    develop a program to add two integers (numbers), the set of statements that will
    perform the addition operation will be known as the program. The algorithm for
    adding two integers will be expressed through the statements of a particular computer
    language like C++, C, C# or Java. If the program is not able to execute properly,
    there might be a problem with your algorithm or syntax because the compiler or
    editor will be unable to execute the program if there are any type of errors or
    syntax mistakes.


    Programming can be better learned through practice and writing code rather'
  merge: -1
  pgno: 10
- img_proc: true
  md: 'than learning long methodologies or complex techniques. Although it might seem
    like a fun activity at the start, it can also turn out to be time-consuming and
    frustrating if you are not following the correct approach. Furthermore, this book
    will make it easier for beginners to choose the most suitable programming languages
    and enter the world of computer programming without much hassle.


    # Problem Solving with Computer Programming


    In essence, a computer program is supposed to solve a specific problem by following
    a set of instructions. People can write a program by following multiple techniques
    and approaches. In order to solve a problem, you need to determine the code flow
    and fulfill the requirements step by step to achieve the desired output. In some
    cases, your computer program may not work even after hours of struggle because
    of inappropriate syntax or flow for which you need to focus on the sequence of
    instructions and computer programming language requirements.


    Using this example of preparing a wooden table, you would need to write down the
    instructions as follows:


    +   1. Get the most suitable pieces of wood required to make the table.

    2. Get the essential tools and equipment that will be used during the procedure.

    3. Join the pieces and build your table.

    4. Polish the end product to make it look attractive.


    When giving such instructions to the computer, you need to be more specific and
    precise because a computer cannot perform operations on its own. As it is created
    to follow instructions, your computer program should always follow an incremental
    approach in order to achieve the desired outcome.


    On the topic of the natural language of a computer, they are unable to understand
    human language and therefore, we need to communicate with the system through another
    language called binary code. Binary code is made up of a series of 1s and 0s and
    is the natural communicating language of computers. In order to help the computer
    understand human language, we'
  merge: -1
  pgno: 11
- img_proc: true
  md: 'use translators and editors for writing programs. Translators have the capability
    to convert the source code into the machine’s language.


    There are multiple types of translators known as Interpreters, Compilers, and
    Assemblers. Interpreters are generally used to interpret languages which are then
    processed line by line to run the final program. Moreover, any syntax errors or
    mistakes are also outlined by the interpreter so the programmer can clear out
    the mistakes and execute the program.


    With the help of compilers, the source code is converted to binary code through
