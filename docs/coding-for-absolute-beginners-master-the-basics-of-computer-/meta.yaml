    \ support to perform several programming tasks such as object persistence, text\
    \ pattern matching, and internet scripting as well.\n\nSyntax for import statement\
    \ in Python:\n\n```\nImport module_name1 [, module_name2 [module_nameN]]\n```\n\
    \nThe runtime operational statements to use ‘import’ module are:\n\n1. Find\n\
    2. Compile\n\nTo use the module named as newmodule, we can call the function as:\n\
    \n```\nImport newmodule\nNewmodule.functionname (“Name”)\n```\n\nTo import from\
    \ module in Python, the syntax is:\n\n```\ndef newmodule(name):\n    print(\"\
    Hello, \" + name)\n\nperson1 = {\n    \"name\": \"James\",\n    \"age\": 30,\n\
    ```"
  mdcn: "## 第七章\n\n## PYTHON\n\n## 概述与基本语法\n\nPython 是一种著名的编程语言，由吉多·范罗苏姆于 1991 年开发。作为一种高级、面向对象的交互式脚本语言，Python\
    \ 可用于系统脚本编写、软件开发以及服务器端 Web 开发。\n\n## 特性\n\n作为一种基于解释器的语言，Python 允许一次执行一条指令，并支持广泛的数据类型。该编程语言易于学习和编码，因为它的关键字很少，语法定义清晰。凭借丰富的标准库，Python\
    \ 还支持交互模式，使开发人员更容易测试和调试代码。此外，该语言可用于 GUI 编程，并开发具有系统调用、窗口系统和库功能的应用程序。除了这些特性，Python\
    \ 还支持自动垃圾回收，提供高级动态数据类型，并且可以与 C++、C、Java 和 CORBA 集成。用户可以直接与 Python 解释器交互来编写程序，因为它也提供了低级模块。\n\
    \nPython 需要安装在您的 PC 上，源代码可以在 GNU 通用公共许可证 (GPL) 下下载。不同的基于 GUI 的 Python 集成开发环境 (IDE)\
