    which is managed through Structured Query Language (SQL).


    # Distributed Database


    The distributed database has its data stored at multiple sites which are interconnected
    with each other through communication links. This database is further classified
    into Homogeneous and Heterogeneous categories. For the homogeneous distributed
    database system, the same type of hardware, OS, and database applications are
    connected together whereas for the heterogeneous distributed database system,
    the system can be different for each location and connection.


    # Cloud Database


    The Cloud Database environment is designed and built to store data in private,
    public, or hybrid cloud. Providing better scalability and greater storage capacity,
    users can benefit from high availability. It is the best suitable option for business
    applications.


