    # Loops


    Loop statements in C++ programming language are implemented to execute a specific
    block of code for a certain number of iterations until it satisfies the provided
    condition. As they allow programmers to perform multiple tasks at a time, a loop
    statement executes the first statement in the function and moves onto the next
    as required.


    Types of Loops


    +   - **While Loop:** Repeats a statement while the provided condition is true
    and rechecks before executing the loop body.

    - **Do While loop:** Checks the condition while the loop is being executed.

    - **For loop:** Executes a specific statement multiple times and manages the loop
    variable as well.

    - **Nested Loops:** More than one loop inside another loop.


    Loops can be executed through different control statements such as Break statement,
    Continue Statement, and goto statement.


