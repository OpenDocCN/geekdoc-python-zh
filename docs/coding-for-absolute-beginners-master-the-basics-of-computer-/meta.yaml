    \ auto\n        }\n        table.fixed {\n            table-layout: fixed\n  \
    \      }\n    </style>\n</head>\n```\n\n## 边距\n\nCSS 边距属性用于在 HTML 元素周围创建空间或边距。有多种属性可通过\
    \ CSS 设置元素边距，例如 Margin、Margin-bottom、Margin-top、Margin-left 和 Margin-right。实现\
    \ Margin 属性的语法：\n\n<p style = \"margin-property: 10px; border:1px solid black;\"\
    >\n    所有四个边距都将是 10px\n</p>\n\n## 列表、图标和下拉菜单\n\n## 列表\n\nCSS 中使用的列表有两种类型，称为有序列表和无序列表。在有序列表中，所有列表项都用序列号或字母标记，而在无序列表中，列表项通常用项目符号标记。列表值可以使用\
    \ circle、decimal、lower-roman、upper-roman、decimal-leading zeros、lower-alpha、upper-alpha\
    \ 和 square 等值创建。\n例如：\n\n```\n<html>\n    <head>\n        <style>\n          \
    \  ul.a\n            {\n                list-style-type:square;\n            }\n\
    \            ol.c\n            {\n                list-style-type:lower-alpha;\n\
    \            }\n        </style>\n    </head>\n    <body>\n        <h2>\n    \
    \        CSS 有序和无序列表\n        </h2>\n        <p>\n            无序列表\n        </p>\n\
    \        <ul class=\"a\">\n            <li>一</li>\n            <li>二</li>\n  \
    \          <li>三</li>\n        </ul>\n        <ul class=\"b\">\n            <li>一</li>\n\
    \            <li>二</li>\n            <li>三</li>\n        </ul>\n        <p>\n\
    \            有序列表\n        </p>\n        <ol class=\"c\">\n          <li>一</li>\n\
    \          <li>二</li>\n          <li>三</li>\n        </ol>\n        <ol class=\"\
    d\">\n          <li>一</li>\n          <li>二</li>\n          <li>三</li>\n     \
    \   </ol>\n    </body>\n</html>\n```\n\n输出：\n\n### CSS 有序和无序列表\n\n无序列表\n\n- 一\n\
    - 二\n- 三\n- 一\n- 二\n- 三\n\n有序列表\n\n- a. 一\n- b. 二\n- c. 三\n- 1. 一\n- 2. 二\n- 3.\
    \ 三\n\n## 图标\n\n通过使用 HTML 的图标库，我们也可以通过 CSS 添加不同类型的图标。这些类型的图标包括 Font Awesome 图标、Bootstrap\
