  md: "# Dropdowns\n\nWe can also create dropdown menus through CSS. Being the same\
    \ as HTML elements, a drop down consists of an unordered list and nested lists\
    \ are used to create the drop-down structure. For example:\n\n```\n<html>\n  \
    \  <head>\n        <title>Dropdown CSS</title>\n    </head>\n    <body>\n    \
    \    <nav>\n            <ul>\n                <li class=\"Lev-1\">\n         \
    \           <a href=\"\">List</a>\n                    <ul>\n                \
    \        <li><a href=\"\">Page 1</a></li>\n                        <li><a href=\"\
    \">Page 2</a></li>\n                        <li><a href=\"\">Page 3</a></li>\n\
    \                        <li><a href=\"\">Page 4</a></li>\n                  \
    \  </ul>\n                </li>\n            </ul>\n        </nav>\n    </body>\n\
    </html>\n```\n\nOutput:\n\n![](img/9d932bec53e523b8d8b7b8134cf77ca7_138_0.png)\n\
    \n# Layers and Visibility"
