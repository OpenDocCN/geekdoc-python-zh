    \ main()\n{\n    int z;\n}\n```\n\n## Program Body\n\n```c\nint main()\n{\n  \
    \  int z;\n    printf(\"%d\", z);\n    return 0;\n}\n```\nTo terminate the program,\
    \ we can use the return statement: return 0.\n\n## Keywords\n\nKeywords are the\
    \ main driving force of any programming language and are also known as reserved\
