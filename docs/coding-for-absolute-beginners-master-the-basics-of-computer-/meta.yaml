    <p style = \"font-size:small;\">\n    Small font\n</p>\n<p style = \"font-size:large;\"\
    >\n    Large font\n</p>\n```\n\nFont size 20 pixels\n\nSmall font\n\nLarge font\n\
    \n## Text\n\nTransforming text into different colors, styles, and indentation\
    \ is now possible with CSS text property. These text properties include:\n\n-\
    \ **Text color:** Change color of the text.\n- **Text Alignment:** Specify horizontal\
    \ or vertical alignment of the text.\n- **Text Decoration:** Outline the decoration\
    \ of text.\n- **Text Transformation:** Control capitalization of text.\n- **Text\
    \ Indentation:** Specify the indentation of first line.\n- **Letter Spacing:**\
    \ Increase or decrease space between words.\n- **Line Height:** Specify line height.\n\
    - **Text Direction:** Set direction of writing.\n- **Word Spacing:** Set space\
    \ between words.\n- **Text Shadow:** Adds shadow effect on text.\n\nSyntax for\
    \ CSS text properties:\n\n```\nText Color:\nbody\n{\n    color: Red;\n}\n```\n\
    \n```\nText Alignment:\nh1 {\n    text-align: center;\n}\n\nh2 {\n    text-align:\
    \ left;\n}\n\nh3 {\n    text-align: right;\n}\n```\n\n```\nText Decoration\nh1\n\
    {\n    text-decoration: overline/underline/line-through;\n}\n```\n\n## Text Transformation\n\
    \n```\np.uppercase {\n  text-transform: uppercase;\n}\n\np.lowercase {\n  text-transform:\
    \ lowercase;\n}\n\np.capitalize {\n  text-transform: capitalize;\n}\n```\n\n##\
    \ Text Indentation\n\n```\np\n{\n    Text-indent: 100px;\n}\n```\n\n## Letter\
    \ Spacing\n\n```\nh1 {\n  letter-spacing: 3px;\n}\n\nh2 {\n  letter-spacing: -3px;\n\
    }\n```\n\n## Line Height\n\n```\np.small {\n  line-height: 0.6;\n}\n\np.big {\n\
    \  line-height: 1.6;\n}\n```\n\n## Text Direction\n\n```\np\n{\ndirection: rtl;\n\
    }\n```\n\n## Text Shadow\n\n```\nh1\n{\n    text-shadow: 4px 3px green;\n}\n```\n\
    \n## Word Spacing\n\n```\nh1 {\n    word-spacing: 10px;\n}\n\nh2 {\n    word-spacing:\
    \ -5px;\n}\n```\n\n## Links, Tables and Margins\n\n## Links\n\nThere are different\
    \ CSS properties to implement hyperlink through CSS. These properties include\
    \ :link, :visited, :hover, and :active. The CSS syntax for implementing link property\
    \ is defined as follows:\n\n```\n<style type = \"text/css\">\n    a:link {color:\
    \ #000000}\n    a:visited {color: #006600}\n    a:hover {color: #FFCC00}\n   \
    \ a:active {color: #FF00CC}\n</style>\n```\n\n## Tables\n\nHere are the different\
    \ CSS properties that can be used to transform and design a HTML table.\n\n- Border\
    \ collapse\n- Border spacing\n- Caption side\n- Empty Cells\n- Table Layout\n\n\
    Syntax for creating simple table using CSS:\n\n```\n<html>\n<body>\n<table class=\"\
    Table\" border = \"1\">\n<tr>\n  <th>First Name</th>\n  <th>Last Name</th>\n \
    \ <th>Marks</th>\n</tr>\n<tr>\n  <td>John</td>\n  <td>Harry</td>\n  <td>40</td>\n\
    </tr>\n</table>\n</body>\n</html>\n```\n\nOutput:\n\n| First Name | Last Name\
    \ | Marks |\n|---|---|---|\n| John | Harry | 40 |\n\n## Border Collapse\n\n```\n\
    <html>\n  <head>\n    <style type = \"text/css\">\n      table.one {border-collapse:collapse;}\n\
    \      table.two {border-collapse:separate;}\n\n      td.a {\n        border-style:dotted;\n\
    \        border-width:3px;\n        border-color:#000000;\n        padding: 10px;\n\
    \      }\n      td.b {\n        border-style:solid;\n        border-width:3px;\n\
    \        border-color:#333333;\n        padding:10px;\n      }\n    </style>\n\
    \  </head>\n```\n\n## Border Spacing\n\n```\n<html>\n<head>\n<style type = \"\
    text/css\">\ntable.one {\nborder-collapse:separate;\nwidth:400px;\nborder-spacing:10px;\n\
    }\ntable.two {\nborder-collapse:separate;\nwidth:400px;\nborder-spacing:10px 50px;\n\
    }\n</style>\n</head>\n<body>\n<table class = \"one\" border = \"1\">\n<caption>Separate\
    \ Border Table with border-spacing</caption>\n<tr><td> Cell A</td></tr>\n<tr><td>\
    \ Cell B</td></tr>\n</table>\n<br />\n<table class = \"two\" border = \"1\">\n\
    <caption>Separate Border Table with border-spacing</caption>\n<tr><td> Cell A</td></tr>\n\
    <tr><td> Cell B</td></tr>\n</table>\n</body>\n</html>\n```\n\nOutput:\n\n![](img/9d932bec53e523b8d8b7b8134cf77ca7_133_0.png)\n\
    \nSyntax for caption side property:\n\n```\nhtml\n<head>\n    <style type = \"\
