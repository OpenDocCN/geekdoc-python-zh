    \ only 32 keywords are allowed to be used in C which are as follows:\n\n| | |\
    \ | |\n|---|---|---|---|\n| double | long | int | switch |\n| case | register\
    \ | enum | typedef |\n| union | extern | const | for |\n| do | while | static\
    \ | default |\n| auto | break | else | struct |\n| float | short | char | return\
    \ |\n| void | continue | for | if |\n| signed | goto | sizeof | volatile |\n\n\
    ## Data Types and Variables\n\nIn the C programming language, data types are used\
    \ to define a variable so that storage can be assigned before it is being used\
    \ in the program. The built-in data types of the C programming language include\
    \ float, int, char, and double. These data types have modifiers called short,\
    \ long, signed, and unsigned.\nFollowing are the valid numbers, alphabets, and\
    \ symbols that are allowed in the C programming language:\n**Alphabets:** A-Z,\
    \ a-z.\n**Symbols:** - ~ ` ! @ # % ^ & * ( ) _ - + = | \\ { } [ ] : ; \" ' <>\
    \ , . ? /\n**Digits:** 0, 1, 2, 3, 4, 5....\n\n## Variables\n\nTo declare the\
    \ variables in C, we can follow the program syntax as follows:\n\n```c\n#include\
    \ <stdio.h>\n// Variable declaration:\nextern int a, b;\nextern int c;\n\nint\
    \ main() {\n\n    /* variable definition: */\n    int a, b;\n    int c;\n    float\
    \ f;\n\n    /* initialization */\n    a = 30;\n    b = 20;\n    c = a + b;\n \
    \   printf(\"value of c : %d \\n\", c);\n\n    return 0;\n}\n```\nThe output of\
    \ this program is: 50.\n\n## Scope of Variables\n\nThe scope of variables in any\
    \ programming language is set to allow certain permissions to the variables. Generally,\
    \ variables are categorized as Local variables, Global variables, and Formal parameters.\n\
    Local variables are declared within a block and can be only used by statements\
    \ that are written in a specific region of the program. As they are not known\
    \ to other functions in the program, we cannot access local variables outside\
    \ the function.\nGlobal variables are usually defined outside a function and hold\
    \ their values throughout the program. It can be accessed and called by any function\
    \ within the program. Local variables need to be initialized by the programmer\
    \ whereas the global variables get initialized automatically.\n\n## Loops and\
    \ Functions\n\n### Loops\n\nLoops are an essential part of every programming language\
    \ and allow the developers to execute a specific statement multiple times. There\
    \ are 4 different types of loops used in the C programming language that are briefed\
    \ as follows:\n\n1.  **For Loop:** Used to execute a statement a specific number\
    \ of times and is also considered to abbreviate the code to handle loop variable.\n\
    2.  **While Loop:** Repeats the given statement and checks whether the given condition\
    \ is true or false. Before executing the loop body, it checks all of the conditions.\n\
