    \ Python 官方网站找到：[https://www.python.org](https://www.python.org)\n\n## 变量类型、基本运算符和数据类型\n\
    \n### 变量类型\n\n在 Python 编程中，变量不需要声明以保留内存位置，因为当值赋给变量时，声明会自动发生。根据变量的数据类型，解释器分配内存并允许程序员存储小数、字符或整数。\n\
    \n以下是 Python 编程语言中为变量赋值的语法：\n\n```\n#!/usr/bin/python\n\nID = 100          # An\
    \ integer assignment\nWeight  = 100.0   # A floating point\nname = \"William\"\
    \  # A string\n\nprint ID\nprint weight\nprint name\n```\n\nPython 的保留关键字列表：\n\
    \n| Del | Else | And | Assert | In | Raise |\n| --- | --- | --- | --- | --- |\
    \ --- |\n| From | Continue | If | Finally | Not | Pass |\n| As | Return | Not\
    \ | Pass | Yield | Break |\n| Except | Import | For | Global | While | print |\n\
    | With | Try | Exec | Or | Is | Elif |\n\n### 基本运算符\n\nPython 具有内置运算符，例如算术运算符、赋值运算符、逻辑运算符、位运算符、比较运算符和成员运算符。\n\
    \nPython 运算符的详细信息在下表中简要说明：\n\n| 算术运算符 | 赋值运算符 | 比较运算符 | 逻辑运算符 | 位运算符 |\n| :---\
    \ | :--- | :--- | :--- | :--- |\n| 加法 (+) | 等于 (=) | 双等于 (==) | 逻辑或 or | 按位与 (&)\
    \ |\n| 减法 (-) | 加等于 (+=) | 不等于 (<>) | 逻辑与 and | 按位或 (|) |\n| 乘法 (*) | 减等于 (-=)\
    \ | 大于 (>) | 逻辑非 not | 按位异或 (^) |\n| 除法 (/) | 乘等于 (*=) | 小于 (<) | | 左移 (<<) |\n\
    | 取模 % | 除等于 (/=) | 小于等于 (<=) | | 右移 (>>) |\n| 整除 (//) | 取模等于 (%=) | 大于等于 (>=)\
    \ | | 按位取反 (~) |\n| 幂 (**) | 整除等于 (//=) | | | |\n\n### 数据类型\n\n在 Python 编程语言中，每个对象都有自己的类型和值。Python\
    \ 的内置数据类型：\n\n- 数字包括整数、浮点数、分数以及复数。Python 中的预定义数据类型有 int、float、long 和 complex。\n\
    - 序列由字符串、字节、列表和元组组成。\n- 布尔值保存 true 或 false。\n- 字典包括以无序方式设置的键值对。\n- 集合涵盖无序的值容器。\n\
    \n## 流程控制\n\n控制流语句允许程序员改变程序的流程并执行特定操作。与其他高级编程语言一样，Python 中使用的三种主要控制流语句是 If、For\
    \ 和 While。下图展示了控制流语句在程序中实际如何工作：\n\n## 条件语句\n\n### If 语句\n\nIf 语句是一个布尔表达式，以 TRUE\
    \ 或 FALSE 的形式显示结果。\n\n### If else 语句\n\nIf else 语句也是一个布尔表达式，它包含一个可选的 else 语句。如果表达式显示为\
    \ False，则执行 else 语句。\n\n### 嵌套语句\n\n语句中的语句称为嵌套语句。\n\n## 循环\n\n循环是一系列指令，允许程序员通过实现特定条件来执行特定任务。在\
    \ Python 编程中，循环可用于使用给定的控制结构执行多个语句或一组指令。\n\nPython 中的循环类型：\n\n### While 循环\n\n\
    While 循环用于在程序中重复执行语句或迭代 'n' 次。在 Python 中使用 While 循环的语法是：\n\n```\nWhile expression:\n\
    \    Statement (s)\n```\n\n示例程序：\n\n```\n#!/usr/bin/python\n\ncount = 0\nwhile\
    \ (count < 10):\n    print 'The count is:', count\n    count = count + 2\n```\n\
    \n```\n1  #!/usr/bin/python\n2  \n3  count = 0\n4  while (count < 5):\n5     \
    \ print 'The count is:', count\n6      count = count + 2\n7  |\n```\n\n输出：\n\n\
    ```\nThe count is: 0\nThe count is: 2\nThe count is: 4\nThe count is: 6\nThe count\
    \ is: 8\n```\n\n### For 循环\n\n为了迭代任何序列（包括字符串或列表）的项目，我们可以使用 For 循环。\n\n语法：\n\n\
    ```\nFor iterating_var in sequence:\n    Statement(s)\n```\n\n示例程序：\n\n```\nfruits\
    \ = [\"apple\", \"banana\", \"cherry\"]\nfor x in fruits:\n    print(x)\n```\n\
    \n为了在循环遍历所有项目之前停止循环，我们可以使用 Break 语句，而 Continue 语句可用于停止当前循环迭代并继续下一次迭代。\n\n## 函数和模块\n\
    \n### 什么是函数？\n\n函数是一组可重用且有组织的代码，用于在程序中执行特定任务和操作。尽管 Python 编程语言中有几个内置函数可用，但开发人员也可以创建自己的函数，这些函数也称为用户定义函数。在\
    \ Python 中定义函数的语法如下所述：\n\n```\ndef functionname( parameters ):\n    \"function_docstring\"\
    \n    function_suite\n    return [expression]\n```\n\n要引入函数定义，我们可以使用关键字 'def'，然后是函数体所需的语句。分配给函数的变量通常将其值存储在本地符号表中，这意味着除非声明为\
    \ global 语句，否则无法在函数内为全局变量赋值。\n\n### 调用函数\n\nPython 编程语言中的函数可以通过提供所有参数、提供可选参数或仅提供必需参数来调用。Python\
    \ 函数最大化了代码重用性，并使程序更易于阅读和理解。以下是用于在 Python 中定义和使用函数的语句：\n\n```\ndef : def display(message):\n\
    print ('Hi' + message)\n· Call Expression: myfun ('karl', 'os', *rest)\n· global\
    \ : x = 'hello'\ndef printer():\nglobal x; x='hi'\n· yield : def sq(k)\nfor I\
    \ in range(k): yield i**2\n· return : def sum(a, b=2)\nreturn a+b\n· nonlocal\
    \ : def outer():\na = 'old'\ndef inner():\nnonlocal a; a = 'new'\n```\n\n### 模块\n\
    \n模块化编程是将程序的不同组件或部分组织成一个系统的方法。这种方法使代码更易于理解和实现，它绑定数据并允许程序员将其用作参考。在 Python 中，模块允许程序员将源代码保存在文件中并多次重新运行，因为它们作为自然的编程工具发挥作用。\n\
    \nPython 编程语言中有大量的标准库模块，包含超过两百个模块。此外，它们还提供平台无关的支持来执行多种编程任务，例如对象持久化、文本模式匹配以及互联网脚本编写。\n\
    \nPython 中 import 语句的语法：\n\n```\nImport module_name1 [, module_name2 [module_nameN]]\n\
    ```\n\n使用 'import' 模块的运行时操作语句是：\n\n1. 查找\n2. 编译\n\n要使用名为 newmodule 的模块，我们可以这样调用函数：\n\
    \n```\nImport newmodule\nNewmodule.functionname (“Name”)\n```\n\n在 Python 中从模块导入的语法是：\n\
    \n```\ndef newmodule(name):\n    print(\"Hello, \" + name)\n\nperson1 = {\n  \
    \  \"name\": \"James\",\n    \"age\": 30,\n```"
