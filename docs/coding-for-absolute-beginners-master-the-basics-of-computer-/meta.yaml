    \ result;\n\n    if (num1 < num2)\n        result = num1;\n    else\n        result\
    \ = num2;\n\n    return result;\n}\n```\n\n## Function Calling\n\nTo call a function\
    \ in C++, we can use the following methods:\n\n- Call by reference.\n- Call by\
    \ Value.\n- Call by Pointer.\n\n## Function Overloading\n\nWhen two or more functions\
    \ have the same name but different arguments, the process is known as overloaded\
    \ functions. The syntax for function overloading in C++ is mentioned as follows:\n\
    \n```\nvoid sameFunction(int a);\nint sameFunction(float a);\nvoid sameFunction(int\
    \ a, double b);\n```\n\n## Arrays, Strings, Pointers, and References\n\n## Arrays\n\
    \nArrays are frequently used in programming languages as they allow us to handle\
    \ a huge volume of data of the same type. Generally, an array is referred to as\
    \ a collection of data which holds a fixed number of values.\n\nSyntax for declaring\
    \ an Array in C++:\n\n```\ndatatype arrayName[arraySize];\n```\n\nInitialization:\n\
    \n```\nint age[5] = {15, 20, 25, 30, 35};\n```\n\nSample program in C++ to find\
    \ a sum of 10 numbers using Arrays:\n\n```\n#include <iostream>\nusing namespace\
    \ std;\nint main()\n{\n    int numbers[10], sum = 0;\n    cout << \"Enter 10 numbers:\
    \ \";\n\n    for (int i = 0; i < 10; ++i)\n    {\n        cin >> numbers[i];\n\
    \        sum += numbers[i];\n    }\n    cout << \"Sum = \" << sum << endl;\n \
    \   return 0;\n}\n```\n\n## Strings\n\nStrings are referred to as a collection\
    \ of characters. In C++ programming, the two common types of strings used are\
    \ C-strings and the standard C++ Library String Class.\n\nThe following syntax\
    \ can be used to define a string:\n\n```\nchar str[] = \"Programming\";\n```\n\
    \n## Pointers\n\nA pointer is defined as a variable that has a value which is\
    \ considered as the address of another variable. To use pointers in C++ programming\
    \ language, we are required to define a pointer variable and also assign address\
    \ of a variable to a pointer. Afterwards, we can access the value through the\
    \ address given in the pointer variable.\n\nThe whole of this operation is performed\
    \ by using the Unary operator `*`. The following are the pointers that are most\
    \ frequently used in C++ programming:\n\n- Null pointers\n- Array of pointers\n\
    - Pointer to pointer\n- Passing pointers to Functions\n- Return pointer to Functions\n\
    \n## Object Oriented C++\n\n## Classes and Objects\n\nObject Oriented Programming\
    \ in C++ language is a simple way to create objects and perform multiple operations.\
    \ At first, we are required to define a class before creating an object for which\
    \ the below mentioned syntax could be used:\n\n```\nclass className\n{\n    //data\n\
    };\n```\n\nA class can be defined as Public, Private, or Protected so that the\
    \ data members could only be accessed specifically within the program.\n\nSample\
    \ code:\n\n```\nclass student\n{\n    private:\n        char name[20];\n     \
    \   int rollNo;\n        int total;\n        float perc;\n    public:\n      \
    \  //member function to get student's details\n        void getDetails(void);\n\
    \        //member function to print student's details\n        void putDetails(void);\n\
    };\n```\n\n## Inheritance and Polymorphism\n\nWhen writing a program to implement\
    \ Inheritance, we can consider the concept of Base class and Derived class in\
    \ C++. As a class can be derived from one or more classes, we can also inherit\
    \ functions and data from different base classes as well.\n\nA derived class can\
    \ access all of the non-private members of its base class. Along with inheriting\
    \ the properties from the base class, users can also create a new class from an\
    \ existing class. The syntax for inheritance in C++ is defined as follows:\n\n\
    ```\nclass A  // base class\n{\n    .........\n};\nclass B : access_specifier\
    \ A  // derived class\n{\n    .........\n};\n```\n\n## Access Specifiers\n\nIn\
    \ C++, the access specifiers are used to determine the limits for the availability\
    \ of class members beyond that class. Private, Protected and Public are the major\
    \ access specifiers that define the accessibility of level of class members.\n\
    \nA private access specifier is used when creating a class so that the protected\
    \ and public data members of the base class become the private member of the derived\
    \ class whereas the private member of base class still remains private.\n\nIn\
    \ the protected access specifier, the public and protected data members of the\
    \ base class become the protected member of the derived class. The private member\
    \ of the base class still remains inaccessible.\n\nPublic Access specifier is\
    \ used when the public data members of the base class become the public member\
    \ of the derived class. The protected members become protected in derived class\
    \ whereas the private members of the base class remain inaccessible.\n\nSyntax\
    \ for using Access specifiers in C++:\n\n```\nclass MyClass {  // class\npublic:\
    \ // Access specifier\n// class members\n};\n```\n\n## Friend Function, Data Structures,\
    \ and Encapsulation\n\n## Friend Function\n\nIn Object Oriented Programming, the\
    \ nonmember function is not given access to private and protected data of an object.\
    \ To allow access for private or protected data in this case, we can use Friend\
    \ function or Friend class which allows programmers to access the private and\
    \ protected data of a class. The function is declared by the keyword ‘Friend’\
    \ and should be used within the body of the class. To declare the friend function\
    \ in C++ programming language, we can use the syntax as mentioned below:\n\n```\n\
    class class_name\n{\n    friend return_type function_name(argument);\n};\n```\n\
    \n## Data Structures\n\nAlthough Data Structures are required to be briefed in\
    \ depth with detail to clear objectives of this topic, we will be discussing how\
    \ a structure is defined and used in C++. Structure is a user defined datatype\
    \ which can be implemented in a program by using the following syntax:\n\n```\n\
    struct [structure tag]\n{\n    member definition;\n}\n```\n\nFor example:\n\n\
    ```\nstruct vehicle {\n    char name[50];\n    char category[100];\n    int model_year;\n\
    } vehicle;\n```\n\nFor accessing any member within the structure, we can use the\
    \ member access operator (`.`). Defining pointers to structures is made simple\
    \ through data structures for which we can use the following syntax:\n\n```\n\
    struct vehicle *struct_pointer;\n```\n\n## Encapsulation\n\nThe term ‘Encapsulation’\
    \ is defined as the approach to hide sensitive data from users in programming.\
    \ To perform encapsulation, we are required to declare the class variables and\
    \ attributes as private and read or modify the value of a private member through\
    \ getter and setter methods. The syntax for accessing private members is defined\
    \ as follows:\n\n```\n#include <iostream>\nusing namespace std;\n\nclass Employee\
    \ {\nprivate:\n    // Private attribute\n    int salary;\n\npublic:\n    // Setter\n\
    \    void setSalary(int s) {\n        salary = s;\n    }\n    // Getter\n    int\
    \ getSalary() {\n        return salary;\n    }\n};\n\nint main() {\n    Employee\
    \ myObj;\n    myObj.setSalary(50000);\n    cout << myObj.getSalary();\n    return\
    \ 0;\n}\n```"
  mdcn: "## Go To 语句\n\nC++ 中的 `goto` 语句用于改变程序的执行流程，并将控制权转移到同一程序内的另一个带标签的语句。`goto`\
    \ 语句的语法为：`goto label;`\n\n## 循环与函数\n\n## 循环\n\nC++ 编程语言中的循环语句用于执行特定的代码块，直到满足给定条件为止。由于它们允许程序员同时执行多个任务，循环语句会执行函数中的第一条语句，并根据需要继续执行下一条。\n\
    \n循环的类型\n\n- **While 循环：** 在提供的条件为真时重复执行一条语句，并在执行循环体之前重新检查条件。\n- **Do While 循环：**\
    \ 在循环执行过程中检查条件。\n- **For 循环：** 多次执行特定语句，并管理循环变量。\n- **嵌套循环：** 一个循环内部包含多个循环。\n\n\
    循环可以通过不同的控制语句来执行，例如 `Break` 语句、`Continue` 语句和 `goto` 语句。\n\n## 函数\n\n函数负责将不同的代码段组合在一起并执行它们，以完成给定的操作。C++\
    \ 编程语言中的两种主要函数类型包括库函数和用户自定义函数。库函数在 C++ 中是预定义的，而用户自定义函数则由程序员自己创建。\n\n要定义一个函数，我们可以使用以下语法：\n\
    \n```\nReturn_type function_name(parameter list) {\n    Function body\n}\n```\n\
    \n`min()` 函数的示例代码：\n\n```\nint min(int num1, int num2) { //function declaration\n\
    \    // local variable declaration\n    int result;\n\n    if (num1 < num2)\n\
    \        result = num1;\n    else\n        result = num2;\n\n    return result;\n\
    }\n```\n\n## 函数调用\n\n在 C++ 中调用函数，我们可以使用以下方法：\n\n- 按引用调用。\n- 按值调用。\n- 按指针调用。\n\n\
    ## 函数重载\n\n当两个或多个函数具有相同的名称但参数不同时，这个过程被称为函数重载。C++ 中函数重载的语法如下所示：\n\n```\nvoid sameFunction(int\
    \ a);\nint sameFunction(float a);\nvoid sameFunction(int a, double b);\n```\n\n\
    ## 数组、字符串、指针和引用\n\n## 数组\n\n数组在编程语言中被频繁使用，因为它们允许我们处理大量相同类型的数据。通常，数组被定义为一个数据集合，它保存固定数量的值。\n\
    \n在 C++ 中声明数组的语法：\n\n```\ndatatype arrayName[arraySize];\n```\n\n初始化：\n\n```\n\
    int age[5] = {15, 20, 25, 30, 35};\n```\n\n使用数组计算 10 个数字之和的 C++ 示例程序：\n\n```\n\
    #include <iostream>\nusing namespace std;\nint main()\n{\n    int numbers[10],\
    \ sum = 0;\n    cout << \"Enter 10 numbers: \";\n\n    for (int i = 0; i < 10;\
    \ ++i)\n    {\n        cin >> numbers[i];\n        sum += numbers[i];\n    }\n\
    \    cout << \"Sum = \" << sum << endl;\n    return 0;\n}\n```\n\n## 字符串\n\n字符串被定义为字符的集合。在\
    \ C++ 编程中，常用的两种字符串类型是 C 字符串和标准 C++ 库字符串类。\n\n可以使用以下语法来定义一个字符串：\n\n```\nchar str[]\
    \ = \"Programming\";\n```\n\n## 指针\n\n指针被定义为一个变量，其值被视为另一个变量的地址。要在 C++ 编程语言中使用指针，我们需要定义一个指针变量，并将一个变量的地址赋给该指针。之后，我们可以通过指针变量中给出的地址来访问该值。\n\
    \n整个操作是通过使用一元运算符 `*` 来执行的。以下是 C++ 编程中最常用的指针：\n\n- 空指针\n- 指针数组\n- 指向指针的指针\n- 将指针传递给函数\n\
    - 从函数返回指针\n\n## 面向对象的 C++\n\n## 类和对象\n\nC++ 语言中的面向对象编程是创建对象并执行多种操作的简单方法。首先，我们需要在创建对象之前定义一个类，可以使用下面提到的语法：\n\
    \n```\nclass className\n{\n    //data\n};\n```\n\n一个类可以被定义为 Public、Private 或 Protected，以便数据成员只能在程序内特定访问。\n\
    \n示例代码：\n\n```\nclass student\n{\n    private:\n        char name[20];\n     \
    \   int rollNo;\n        int total;\n        float perc;\n    public:\n      \
    \  //member function to get student's details\n        void getDetails(void);\n\
    \        //member function to print student's details\n        void putDetails(void);\n\
    };\n```\n\n## 继承和多态\n\n在编写实现继承的程序时，我们可以考虑 C++ 中的基类和派生类的概念。由于一个类可以从一个或多个类派生，我们也可以从不同的基类继承函数和数据。\n\
    \n派生类可以访问其基类的所有非私有成员。除了从基类继承属性外，用户还可以从现有类创建一个新类。C++ 中继承的语法定义如下：\n\n```\nclass\
    \ A  // base class\n{\n    .........\n};\nclass B : access_specifier A  // derived\
    \ class\n{\n    .........\n};\n```\n\n## 访问说明符\n\n在 C++ 中，访问说明符用于确定类成员在该类之外的可用性限制。Private、Protected\
    \ 和 Public 是主要的访问说明符，它们定义了类成员的可访问级别。\n\n在创建类时使用私有访问说明符，这样基类的受保护和公共数据成员就成为派生类的私有成员，而基类的私有成员仍然是私有的。\n\
    \n在受保护访问说明符中，基类的公共和受保护数据成员成为派生类的受保护成员。基类的私有成员仍然不可访问。\n\n公共访问说明符用于当基类的公共数据成员成为派生类的公共成员时。受保护成员在派生类中成为受保护成员，而基类的私有成员仍然不可访问。\n\
    \n在 C++ 中使用访问说明符的语法：\n\n```\nclass MyClass {  // class\npublic: // Access specifier\n\
    // class members\n};\n```\n\n## 友元函数、数据结构和封装\n\n## 友元函数\n\n在面向对象编程中，非成员函数通常无法访问对象的私有和受保护数据。为了允许访问这些私有或受保护数据，我们可以使用友元函数或友元类，它们允许程序员访问类的私有和受保护数据。该函数通过关键字\
    \ `Friend` 声明，并应在类体内使用。要在 C++ 编程语言中声明友元函数，我们可以使用下面提到的语法：\n\n```\nclass class_name\n\
    {\n    friend return_type function_name(argument);\n};\n```\n\n## 数据结构\n\n虽然数据结构需要深入详细地介绍以明确本主题的目标，但我们将讨论如何在\
    \ C++ 中定义和使用结构体。结构体是一种用户定义的数据类型，可以通过使用以下语法在程序中实现：\n\n```\nstruct [structure tag]\n\
    {\n    member definition;\n}\n```\n\n例如：\n\n```\nstruct vehicle {\n    char name[50];\n\
    \    char category[100];\n    int model_year;\n} vehicle;\n```\n\n要访问结构体内的任何成员，我们可以使用成员访问运算符（`.`）。通过数据结构，定义指向结构体的指针变得简单，我们可以使用以下语法：\n\
    \n```\nstruct vehicle *struct_pointer;\n```\n\n## 封装\n\n术语“封装”被定义为在编程中隐藏敏感数据的方法。要执行封装，我们需要将类变量和属性声明为私有，并通过\
    \ getter 和 setter 方法读取或修改私有成员的值。访问私有成员的语法定义如下：\n\n```\n#include <iostream>\nusing\
    \ namespace std;\n\nclass Employee {\nprivate:\n    // Private attribute\n   \
    \ int salary;\n\npublic:\n    // Setter\n    void setSalary(int s) {\n       \
    \ salary = s;\n    }\n    // Getter\n    int getSalary() {\n        return salary;\n\
    \    }\n};\n\nint main() {\n    Employee myObj;\n    myObj.setSalary(50000);\n\
    \    cout << myObj.getSalary();\n    return 0;\n}\n```"
