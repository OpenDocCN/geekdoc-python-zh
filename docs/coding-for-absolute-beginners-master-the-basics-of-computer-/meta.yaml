    \ with an object type whereas Instantiation is used to create an object with a\
    \ new keyword. The program is then continued by a call to the constructor in order\
    \ to initialize the new object.\n\n## Basic Data Types and Variables\n\nIn a Java\
    \ program, the data is stored in variables and the program at first declares the\
    \ variables, reads data onto the variables, and then executes the provided operations.\
    \ Once the process is completed, the variables are then written once again at\
    \ a new location. Variables provide a reserved memory location to store values\
    \ and the memory is allocated by the operating system.\n\n### Data Types\n\nThere\
    \ are two different data types in Java programming language known as Primitive\
    \ Data Types and Object Data Types. Primitive data types are classified into 8\
    \ categories: Byte, Short, Int, Long, Float, Double, Boolean, and Char. Object\
    \ data types are created by using the constructors of the classes and they are\
    \ also responsible for accessing objects. The default value of every available\
    \ reference variable is set to null and it can also be used to refer to an object\
    \ of the declared type.\n\n### Variables\n\nThere are three types of variables\
    \ used in the Java programming language:\n\n- 1. Local variables\n- 2. Instance\
    \ variables\n- 3. Class/Static variables\n\n### Local variables\n\nLocal variables\
    \ are generally declared on constructors and methods. As they are created with\
    \ a constructor, access modifiers cannot be used along with local variables. There\
    \ is no default value for local variables.\n\n### Instance variables\n\nInstance\
    \ variables are declared within a class and it is created whenever an object is\
    \ created. They are supposed to hold values that are referred to by more than\
    \ one constructor or method. Access modifiers can also be given to instance variables.\n\
    \n## Operators, Control Statements and Decision Making\n\n### Operators\n\nThe\
    \ basic operators that are available in the Java programming language are explained\
    \ as follows:\n\n- Arithmetic Operators: Arithmetic operators can be used to perform\
    \ mathematical calculations and equation solving within the program. This includes\
    \ Addition, Subtraction, Multiplication, Division, Modulus, and Increment and\
    \ Decrement functions.\n- Unary Operators: Postfix: expr++ and Prefix ++expr –expr\
    \ expressions.\n- Logical Operators: (A && B) for false, (A || B) for true and\
    \ !(A && B) for true.\n- Bitwise Operators: To perform bit-by-bit operation.\n\
    - Assignment: =, +=, |=, ^=.\n\n### Control Statements\n\nThe control statements\
    \ for the Java language are similar to that of other major programming languages\
    \ such as C or C++. The conditions are briefed in detail as follows:\n\nIf Else:\
    \ The if statement is used to check whether the given condition is true or false.\
    \ There are different types of if statements in the Java programming language\
    \ which are called an if statement, if-else statement, if-else-if ladder, and\
    \ nested if statement.\n\nHere is a simple Java program to demonstrate the if\
    \ statement:\n\n```java\npublic class Marks {\n    public static void main(String[]\
    \ args) {\n        int Marks=50;\n        if(age<50){\n            System.out.print(\"\
    Your marks are less than 50\");\n        }\n    }\n}\n```\n\nOutput for the above\
    \ program is: Your marks are less than 50.\n\nIf-else: The statement is used to\
    \ test the condition and if the results are true, the If block is executed and\
    \ in case of false, the else statement is executed.\n\nSwitch: The Switch statement\
