- md: "## Rules for the Members\n\nRules for the members whereas the default access\
    \ specifier for a class in C# program is known as internal. In order to access\
    \ class members, we can use the (.) operator. It also links the name of an object\
    \ along with the name of a member.\n\nA class is also considered a reference type\
    \ and the variable contains null value after declaration until we create an instance\
    \ of the class by using the new operator. To declare the class in C#, we can follow\
    \ the syntax mentioned below:\n\n```csharp\npublic class Student\n{\n    //properties,\
    \ methods and structure\n}\n```\n\nSample:\n\n```csharp\nMyClass student = new\
    \ MyClass();\nMyClass student2 = student;\n```\n\n### Class Including Different\
    \ Data Members and Member Functions\n\n```csharp\npublic class Student\n{\n  \
    \  public int id = 0;\n    public string name = string.Empty;\n    public Student()\n\
    \    {\n        // Constructor Statements\n    }\n\n    public void GetStudentDetails(int\
    \ uid, string uname)\n    {\n        id = uid;\n        uname = name;\n      \
    \  Console.WriteLine(\"Id: {0}, Name: {1}\", id, name);\n    }\n\n    public int\
    \ Designation { get; set; }\n\n    public string Location { get; set; }\n}\n```\n\
    \n## Creating an Object\n\nIn C# programming, an object is entirely based on class.\
    \ A class defines a type of object. It is also known as an instance of a class\
    \ and can be created by using the following syntax:\n\n```csharp\nStudent Object1\
    \ = new Student();\n```\n\nOnce the instance of a class has been created, the\
    \ object reference is passed back automatically. For example:\n\n```csharp\nStudent\
    \ object2 = new Student();\nStudent object3 = object2;\n```\n\nThe following program\
    \ shows how an object is created in C# programming language:\n\n```csharp\nusing\
    \ System;\n\nnamespace Tutlane\n{\n    class Program\n    {\n        static void\
    \ Main(string[] args)\n        {\n            Users user = new Users(\"Harry Potter\"\
    , 20);\n            user.GetUserDetails();\n            Console.WriteLine(\"Press\
    \ Enter Key to Exit..\");\n            Console.ReadLine();\n        }\n    }\n\
    \    public class Users\n    {\n        public string Name { get; set; }\n   \
    \     public int Age { get; set; }\n        public Users(string name, int age)\n\
    \        {\n            Name = name;\n            Age = age;\n        }\n    \
    \    public void GetUserDetails()\n        {\n            Console.WriteLine(\"\
    Name: {0}, Age: {1}\", Name, Age);\n        }\n    }\n}\n```\n\n## Inheritance\
    \ and Polymorphism\n\n### Inheritance\n\nInheritance is a major part of C# as\
    \ it is an object-oriented programming language. Allowing the programmers to reuse\
    \ different classes that require the same functionality, inheritance works in\
    \ the same method to that of a parent and child. Parent is considered as the base\
    \ class whereas child is known as the derived class which inherits all of the\
    \ functionality from its parent class.\n\n```csharp\nSyntax:\n<access-specifier>\
    \ class <base_class> {\n    ...\n}\n\nclass <derived_class> : <base_class> {\n\
    \    ...\n}\n```\n\nFor multilevel inheritance:\n\n```csharp\npublic class A\n\
    {\n    // Implementation\n}\npublic class B : A\n{\n    // Implementation\n}\n\
    public class C : B\n{\n    // Implementation\n}\n```\n\n### Polymorphism\n\nPolymorphism\
    \ refers to the technique where multiple functionality is performed through a\
    \ single operation. Static polymorphism is performed at compile time whereas the\
    \ dynamic polymorphism is decided at the run time. In static polymorphism, C#\
    \ allows programmers to implement the following two approaches:\n\n#### Function\
    \ Overloading\n\nFunction overloading provides multiple definitions for the same\
    \ function name in the given scope. Moreover, function definition should differ\
    \ from each other by types so that you do not overload function declarations that\
    \ have a different return type.\n\n### Constructors\n\nIn C# programming, a constructor\
    \ is automatically called whenever a struct or class is created. As a class can\
    \ have multiple constructors to handle different arguments, constructors allow\
    \ the programmers to set limit instantiation and default values as well.\n\nSyntax\
    \ for creating constructors:\n\n```csharp\npublic class Person\n{\n    private\
    \ string last;\n    private string first;\n    public Person(string lastName,\
    \ string firstName)\n    {\n        last = lastName;\n        first = firstName;\n\
    \    }\n    // Remaining implementation of Person class.\n}\n```\n\nThe three\
    \ types of constructors used in C# programming are known as Instance constructors,\
    \ Static constructors, and Private constructors.\n\n### Exception Handling\n\n\
    Exceptions are how to transfer control from one segment of the program to another.\
    \ Generally, an exception is considered a problem that is seen during the execution\
    \ of a program. To cater the circumstance, C# gives multiple exception handling\
    \ approaches known as try, catch, throw, and finally. A try block outlines a block\
    \ of code for which the exception is being used whereas the catch exception allows\
    \ the programmer to handle the problem from anywhere in the program. Throw exception\
    \ is launched whenever a problem is faced whereas the finally exception is used\
    \ to execute a provided set of statements.\n\nSyntax for using exception handling\
    \ in C# programming language:\n\n```csharp\npublic class Person\n{\n    private\
    \ string last;\n    private string first;\n    public Person(string lastName,\
    \ string firstName)\n    {\n        last = lastName;\n        first = firstName;\n\
    \    }\n    // Remaining implementation of Person class.\n}\n```\n\n### Multithreading\n\
    \nIn C# programming language, a thread is considered the execution path for a\
    \ program as it defines a specific flow control and is responsible for defining\
    \ execution paths as well. As they are lightweight processes, a thread can save\
    \ wastage of CPU cycle and in return boost efficiency of the program.\n\nThere\
    \ are four main states in the lifecycle of a thread which include Unstarted State,\
    \ Ready State, Not Runnable State, and Dead State. Threads can be created, managed,\
    \ and destroyed by implementing specific C# methods.\n\n### File I/O\n\nC# provides\
    \ different classes to operate with the File system and data handling. As these\
    \ classes can be used to open files, access files, access directories, and update\
    \ existing files, C# includes a specific File class to perform all of the I/O\
    \ operations.\n\nThe class names with details are briefed as follows:\n\n####\
    \ File\n\nFile is a static class which provides different operations including\
    \ move, delete, create, open, copy, read, and write.\n\n#### FileInfo\n\nThe FileInfo\
    \ class performs the same as the static File class and programmers can read and\
    \ write operations by writing the code manually for a specific file.\n\n#### Directory\n\
    \nThe Directory class is also static and provides support for creating, deleting,\
    \ accessing, and moving subdirectories within a file.\n\n#### DirectoryInfo\n\n\
    The DirectoryInfo class provides different instance methods for accessing, deleting,\
    \ moving, and creating subdirectories.\n\n#### Path\n\nThe Path static class delivers\
    \ functionality for changing the extension of a file, retrieving extension of\
    \ a file, and retrieving the absolute physical path of a specific file.\n\n####\
    \ FileStream Class\n\nThe FileStream class in the System.IO namespace is used\
    \ to create, write, and close a specific file through C# programming language.\
    \ Syntax for creating a FileStream class and object is defined as follows:\n\n\
    ```csharp\nFileStream <object_name> = new FileStream( <file_name>, <FileMode Enumerator>,\n\
    <FileAccess Enumerator>, <FileShare Enumerator>);\n```\n\nAdvanced file operations\
    \ in C# include:\n\n- Reading and Writing into Text Files.\n- Reading and Writing\
    \ into Binary Files.\n- Manipulating the Windows File System.\n\nRemember that\
    \ System.IO.Stream is an abstract class which provides all of the standard methods\
    \ required to transfer bytes to the source. Classes which inherit Stream class\
    \ to perform certain read/write operations include FileStream, MemoryStream, BufferedStream,\
    \ NetworkStream, PipeStream, and CryptoStream.\n\n## Advantages of Learning C#\n\
    \nC# programming language delivers fast execution time and provides a structured\
    \ approach to solve a specific problem. With the availability of advanced functions\
    \ and built-in libraries, beginners can build different types of applications\
    \ and programs without any hassle. As C# is an object-oriented programming language,\
    \ the development and maintenance are simpler compared to other high-level programming\
    \ languages.\n\nMoreover, C# is best suited for creating robust applications with\
    \ proper interoperability. To start with C# programming, learning the basic syntax,\
    \ methods and structures is immensely important so that you can develop particular\
    \ applications without any hassle. C# language features built in libraries and\
    \ functions which can be used by programmers to make their development fast and\
    \ responsive."
  mdcn: "## 成员规则\n\n成员规则，其中 C# 程序中类的默认访问修饰符被称为 `internal`。为了访问类成员，我们可以使用 `.` 运算符。它还将对象的名称与成员的名称连接起来。\n\
    \n类也被视为引用类型，在声明后变量包含 `null` 值，直到我们使用 `new` 运算符创建类的实例。要在 C# 中声明类，我们可以遵循以下语法：\n\n\
    ```csharp\npublic class Student\n{\n    //properties, methods and structure\n\
    }\n```\n\n示例：\n\n```csharp\nMyClass student = new MyClass();\nMyClass student2\
    \ = student;\n```\n\n### 包含不同数据成员和成员函数的类\n\n```csharp\npublic class Student\n\
    {\n    public int id = 0;\n    public string name = string.Empty;\n    public\
    \ Student()\n    {\n        // Constructor Statements\n    }\n\n    public void\
    \ GetStudentDetails(int uid, string uname)\n    {\n        id = uid;\n       \
    \ uname = name;\n        Console.WriteLine(\"Id: {0}, Name: {1}\", id, name);\n\
    \    }\n\n    public int Designation { get; set; }\n\n    public string Location\
    \ { get; set; }\n}\n```\n\n## 创建对象\n\n在 C# 编程中，对象完全基于类。类定义了一种对象类型。它也被称为类的实例，可以使用以下语法创建：\n\
    \n```csharp\nStudent Object1 = new Student();\n```\n\n一旦创建了类的实例，对象引用会自动返回。例如：\n\
    \n```csharp\nStudent object2 = new Student();\nStudent object3 = object2;\n```\n\
    \n以下程序展示了如何在 C# 编程语言中创建对象：\n\n```csharp\nusing System;\n\nnamespace Tutlane\n\
    {\n    class Program\n    {\n        static void Main(string[] args)\n       \
    \ {\n            Users user = new Users(\"Harry Potter\", 20);\n            user.GetUserDetails();\n\
    \            Console.WriteLine(\"Press Enter Key to Exit..\");\n            Console.ReadLine();\n\
    \        }\n    }\n    public class Users\n    {\n        public string Name {\
    \ get; set; }\n        public int Age { get; set; }\n        public Users(string\
    \ name, int age)\n        {\n            Name = name;\n            Age = age;\n\
    \        }\n        public void GetUserDetails()\n        {\n            Console.WriteLine(\"\
    Name: {0}, Age: {1}\", Name, Age);\n        }\n    }\n}\n```\n\n## 继承与多态\n\n###\
    \ 继承\n\n继承是 C# 的主要部分，因为它是一种面向对象的编程语言。继承允许程序员重用需要相同功能的不同类，其工作方式与父类和子类相同。父类被视为基类，而子类被称为派生类，它从其父类继承所有功能。\n\
    \n```csharp\n语法：\n<access-specifier> class <base_class> {\n    ...\n}\n\nclass\
    \ <derived_class> : <base_class> {\n    ...\n}\n```\n\n对于多级继承：\n\n```csharp\n\
    public class A\n{\n    // Implementation\n}\npublic class B : A\n{\n    // Implementation\n\
    }\npublic class C : B\n{\n    // Implementation\n}\n```\n\n### 多态\n\n多态是指通过单个操作执行多个功能的技术。静态多态在编译时执行，而动态多态在运行时决定。在静态多态中，C#\
    \ 允许程序员实现以下两种方法：\n\n#### 函数重载\n\n函数重载在给定范围内为同一函数名提供多个定义。此外，函数定义应通过类型相互区分，这样你就不会重载具有不同返回类型的函数声明。\n\
    \n### 构造函数\n\n在 C# 编程中，每当创建结构体或类时，构造函数会自动调用。由于一个类可以有多个构造函数来处理不同的参数，构造函数允许程序员设置实例化限制和默认值。\n\
    \n创建构造函数的语法：\n\n```csharp\npublic class Person\n{\n    private string last;\n\
    \    private string first;\n    public Person(string lastName, string firstName)\n\
    \    {\n        last = lastName;\n        first = firstName;\n    }\n    // Remaining\
    \ implementation of Person class.\n}\n```\n\nC# 编程中使用的三种构造函数类型被称为实例构造函数、静态构造函数和私有构造函数。\n\
    \n### 异常处理\n\n异常是如何将控制从程序的一个部分转移到另一个部分的方法。通常，异常被视为在程序执行期间出现的问题。为了处理这种情况，C# 提供了多种异常处理方法，称为\
    \ `try`、`catch`、`throw` 和 `finally`。`try` 块定义了正在使用异常的代码块，而 `catch` 异常允许程序员从程序中的任何地方处理问题。`throw`\
    \ 异常在遇到问题时启动，而 `finally` 异常用于执行一组给定的语句。\n\n在 C# 编程语言中使用异常处理的语法：\n\n```csharp\n\
    public class Person\n{\n    private string last;\n    private string first;\n\
    \    public Person(string lastName, string firstName)\n    {\n        last = lastName;\n\
    \        first = firstName;\n    }\n    // Remaining implementation of Person\
    \ class.\n}\n```\n\n### 多线程\n\n在 C# 编程语言中，线程被视为程序的执行路径，因为它定义了特定的流程控制，并负责定义执行路径。由于它们是轻量级进程，线程可以节省\
    \ CPU 周期的浪费，从而提高程序的效率。\n\n线程的生命周期中有四个主要状态，包括未启动状态、就绪状态、不可运行状态和死亡状态。线程可以通过实现特定的\
    \ C# 方法来创建、管理和销毁。\n\n### 文件 I/O\n\nC# 提供了不同的类来操作文件系统和处理数据。由于这些类可用于打开文件、访问文件、访问目录和更新现有文件，C#\
    \ 包含一个特定的 `File` 类来执行所有 I/O 操作。\n\n类名及其详细信息简要如下：\n\n#### File\n\n`File` 是一个静态类，提供不同的操作，包括移动、删除、创建、打开、复制、读取和写入。\n\
    \n#### FileInfo\n\n`FileInfo` 类的功能与静态 `File` 类相同，程序员可以通过为特定文件手动编写代码来执行读写操作。\n\n\
    #### Directory\n\n`Directory` 类也是静态的，提供在文件内创建、删除、访问和移动子目录的支持。\n\n#### DirectoryInfo\n\
    \n`DirectoryInfo` 类提供了不同的实例方法，用于访问、删除、移动和创建子目录。\n\n#### Path\n\n`Path` 静态类提供了更改文件扩展名、检索文件扩展名以及检索特定文件的绝对物理路径的功能。\n\
    \n#### FileStream 类\n\n`System.IO` 命名空间中的 `FileStream` 类用于通过 C# 编程语言创建、写入和关闭特定文件。创建\
    \ `FileStream` 类和对象的语法定义如下：\n\n```csharp\nFileStream <object_name> = new FileStream(\
    \ <file_name>, <FileMode Enumerator>,\n<FileAccess Enumerator>, <FileShare Enumerator>);\n\
    ```\n\nC# 中的高级文件操作包括：\n\n-   读取和写入文本文件。\n-   读取和写入二进制文件。\n-   操作 Windows 文件系统。\n\
    \n请记住，`System.IO.Stream` 是一个抽象类，它提供了将字节传输到源所需的所有标准方法。继承 `Stream` 类以执行特定读/写操作的类包括\
    \ `FileStream`、`MemoryStream`、`BufferedStream`、`NetworkStream`、`PipeStream` 和\
    \ `CryptoStream`。\n\n## 学习 C# 的优势\n\nC# 编程语言提供了快速的执行时间，并提供了一种结构化的方法来解决特定问题。借助高级功能和内置库，初学者可以轻松构建不同类型的应用程序和程序。由于\
    \ C# 是一种面向对象的编程语言，与其他高级编程语言相比，其开发和维护更为简单。\n\n此外，C# 非常适合创建具有适当互操作性的健壮应用程序。要开始 C#\
    \ 编程，学习基本语法、方法和结构非常重要，这样你才能轻松开发特定的应用程序。C# 语言具有内置库和函数，程序员可以使用它们来加快开发速度并提高响应能力。"
