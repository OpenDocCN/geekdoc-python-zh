    \ Java, you need to follow the syntax as mentioned below:\n\n```java\nPublic class\
    \ NewClass {\n    Int a = 1;\n}\n```\n\nTo create object called “newObj”:\n\n\
    ```java\nPublic class NewClass {\n    Int a = 1;\n    Public static void main\
    \ (String[] args ) {\n        MyClass NewObj = new NewClass();\n        System.out.println(newObj.x);\n\
    \    }\n}\n```\n\nCreating an object requires declaration, instantiation, and\
