- md: "## Dropdowns\n\nWe can also create dropdown menus through CSS. Being the same\
    \ as HTML elements, a drop down consists of an unordered list and nested lists\
    \ are used to create the drop-down structure. For example:\n\n```html\n<html>\n\
    \    <head>\n        <title>Dropdown CSS</title>\n    </head>\n    <body>\n  \
    \      <nav>\n            <ul>\n                <li class=\"Lev-1\">\n       \
    \             <a href=\"\">List</a>\n                    <ul>\n              \
    \          <li><a href=\"\">Page 1</a></li>\n                        <li><a href=\"\
    \">Page 2</a></li>\n                        <li><a href=\"\">Page 3</a></li>\n\
    \                        <li><a href=\"\">Page 4</a></li>\n                  \
    \  </ul>\n                </li>\n            </ul>\n        </nav>\n    </body>\n\
    </html>\n```\n\nOutput:\n\n![](img/9d932bec53e523b8d8b7b8134cf77ca7_138_0.png)\n\
    \n## Layers and Visibility\n\n### Layers\n\nThrough CSS, we can create multiple\
    \ layers of various divisions by implementing the z-index CSS property. For example:\n\
    \n```html\n<html>\n    <head>\n    </head>\n\n    <body>\n        <div style =\
    \ \"background-color:Blue;\n            width:300px;\n            height:100px;\n\
    \            position:relative;\n            top:10px;\n            left:80px;\n\
    \            z-index:2\">\n        </div>\n\n        <div style = \"background-color:Red;\n\
    \            width:300px;\n            height:100px;\n            position:relative;\n\
    \            top:-60px;\n            left:35px;\n            z-index:1;\">\n \
    \       </div>\n\n        <div style = \"background-color:Black;\n           \
    \ width:300px;\n            height:100px;\n            position:relative;\n  \
    \          top:-220px;\n            left:120px;\n            z-index:3;\">\n \
    \       </div>\n    </body>\n</html>\n```\n\nOutput:\n\n![](img/9d932bec53e523b8d8b7b8134cf77ca7_140_0.png)\n\
    \n### Visibility\n\nThe Visibility property in CSS allows us to hide an element\
    \ from view mode and this property can also be used to hide error messages and\
    \ to retain text privacy. Visibility property has predefined values including\
    \ Visible, Hidden, and Collapse.\nSyntax for implementing Visibility property\
    \ in a paragraph through CSS:\n\n```html\n<p>\n    Text visible.\n</p>\n\n<p style\
    \ = \"visibility:hidden;\">\n    Text should not be visible.\n</p>\n```\n\n###\
    \ Layout and Animations\n\n#### Layout\n\nThe CSS layout techniques are a great\
    \ way to take elements contained in a web page and present them in different layouts.\
    \ This technique is generally used to change the position of elements or a container.\
    \ Modules for CSS layout include Normal Flow, the display property, Flexbox, Grid,\
    \ Floats, Positioning, Table Layout, and Multiple column layout. Remember that\
    \ all of the methods of achieving a page layout in CSS are conducted through the\
    \ display property.\n\n#### Animation\n\nCSS animations allow an element to change\
    \ style from one to another for which we can implement multiple properties as\
    \ well. For using CSS animations, we are required to specify some key frames through\
    \ the @keyframes rule.\nFor example:\n\n```css\n@keyframes sample {\n  from {background-color:\
    \ blue;}\n  to {background-color: brown;}\n}\n```\n\n```css\n/* The element to\
    \ apply the animation to */\ndiv {\n  width: 100px;\n  height: 100px;\n  background-color:\
    \ blue;\n  animation-name: example;\n  animation-duration: 4s;\n}\n```\n\n## How\
    \ to Effectively Use CSS\n\nThere are several other CSS custom properties and\
    \ elements that can be implemented to improve the graphics, display, and attractiveness\
    \ of a web page. Although it is critical to learn and implement all properties\
    \ of CSS, using a good editor can help create a perfect website design. Furthermore,\
    \ every method used in CSS should be consistent so that there are no problems\
    \ such as misinterpretation.\nWhile writing CSS, you should also avoid using inline\
    \ code and place the styles or attributes only in the external stylesheets. Checking\
    \ that your code works on the latest internet browsers such as Internet Explorer,\
    \ Chrome, and Safari can be a great idea so that you can ensure proper display\
    \ and formatting of the web pages. Moreover, CSS code can also be reused as a\
    \ template for other projects and you can recycle the pre-existing code into new\
    \ ones as well. Multiple classes can also be implemented with space separation\
    \ and we can benefit from CSS inheritance by applying specific CSS elements.\n\
    \n![](img/9d932bec53e523b8d8b7b8134cf77ca7_142_0.png)\n\n# CHAPTER TEN\n\n## PROGRAMMING\
    \ ESSENTIALS\n\n### Selecting the Programming Language\n\nAs we have thoroughly\
    \ discussed all of the major programming languages and their syntax in detail,\
    \ beginners can choose the language which seems easiest to learn and implement.\
    \ Although most of the major programming languages such as C, C++, and Java have\
    \ similar syntax, there are several important aspects that need to be focused\
    \ on when writing a program. C and C++ are the best options for developing computer\
    \ applications for beginners because they provide an in-depth understanding of\
    \ programming and clear concepts as well.\n\nFor developing web plugins, desktop\
    \ applications, or mobile applications, Java language can be considered because\
    \ it provides complete support and functionality. HTML, CSS, and PHP are the core\
    \ languages for website development and can be easily learned by beginners. As\
    \ a programmer, one should never limit themselves to a single language and try\
    \ the latest techniques and implementations.\n\nMultiple computer programming\
    \ languages can be used to solve a specific problem. To make things easier, beginners\
    \ can look at their skills and select the programming language which is most suitable\
    \ and easy to implement. Programming is dependent on several other factors such\
    \ as usability of application, security, compatibility, and response time.\n\n\
    ### Tips for Efficient Programming\n\nAlthough writing understandable code and\
    \ satisfying program requirements are a major part of computer programming, there\
    \ are some essential tips and tricks that can increase efficiency of the programmer.\
    \ Starting with the most vital point to be considered, programmers should avoid\
    \ passing long argument lists to functions and only try to use int, pointer, or\
    \ void function types. Moreover, do not convert chars to another data type because\
    \ char variables can be located anywhere in the RAM.\nFurthermore, global variables\
    \ must never be initialized with a small function and minimize the use of mathematical\
    \ operations with floating point numbers. This will reduce the execution time\
    \ and consume less memory as well. Global variables and loops can make it difficult\
    \ for programmers to handle the application when the code reaches thousands of\
    \ lines and making a slight change will result in a huge problem.\nWriting switch\
    \ cases, statements, loops, and try-catch inside a method or function is an ideal\
    \ approach. Remember that methods should also be written inside class and function\
    \ definitions. Moreover, structuring the application by using appropriate structures\
    \ is a good approach which also improves coding standards.\nLast but not least,\
    \ version control software can also be considered in order to improve application\
    \ performance and to deliver updates as well. Although it is an approach used\
    \ by professional programmers, tools such as Mercurial or Git are easy to learn\
    \ and use by beginners as well.\nWhile writing your code, avoiding deep nesting\
    \ and limit line length because it can make the code difficult to read.\n\n###\
    \ Strengthen Your Basic Skills\n\nIn order to become a good programmer, it is\
    \ mandatory that you are aware of all of the critical and major concepts of computer\
    \ programming. Knowing the basics in algorithms and data structures is a great\
    \ way to improve your problem-solving skills. Moreover, writing unit tests is\
    \ yet another impeccable approach to boost your thinking and coding skills. After\
    \ you are done with coding, it is recommended that you perform in depth code review\
    \ and find any mistakes or areas of improvement. In return, this activity will\
    \ improve application performance and efficiency as well.\nThe code must always\
    \ be simple and meaningful. By using proper naming conventions, you can replace\
    \ variables or methods without any hassle. Remember that creating a specific folder\
    \ and file for your application can deliver great benefits as you can maintain\
    \ and debug with ease. Learning programming fundamentals is the key aspect of\
    \ developing strong development and analytical skills.\nFurthermore, try to implement\
    \ your coding skills by solving programming exercises and write simple code. Not\
    \ only will this boost your programming skills, but you will also be able to develop\
    \ new solutions that are efficient and effective. Spending time to learn the basics\
    \ of programming also makes it easier to adapt to the latest technologies and\
    \ learn new programming methods as well. Programming can be made interesting by\
    \ learning and implementing new methods, functions, and approaches."
  mdcn: "## 下拉菜单\n\n我们也可以通过CSS创建下拉菜单。与HTML元素相同，下拉菜单由一个无序列表构成，并使用嵌套列表来创建下拉结构。例如：\n\n\
    ```html\n<html>\n    <head>\n        <title>Dropdown CSS</title>\n    </head>\n\
    \    <body>\n        <nav>\n            <ul>\n                <li class=\"Lev-1\"\
    >\n                    <a href=\"\">List</a>\n                    <ul>\n     \
    \                   <li><a href=\"\">Page 1</a></li>\n                       \
    \ <li><a href=\"\">Page 2</a></li>\n                        <li><a href=\"\">Page\
    \ 3</a></li>\n                        <li><a href=\"\">Page 4</a></li>\n     \
    \               </ul>\n                </li>\n            </ul>\n        </nav>\n\
    \    </body>\n</html>\n```\n\n输出：\n\n![](img/9d932bec53e523b8d8b7b8134cf77ca7_138_0.png)\n\
    \n## 层与可见性\n\n### 层\n\n通过CSS，我们可以使用`z-index` CSS属性创建多个不同层级的区域。例如：\n\n```html\n\
    <html>\n    <head>\n    </head>\n\n    <body>\n        <div style = \"background-color:Blue;\n\
    \            width:300px;\n            height:100px;\n            position:relative;\n\
    \            top:10px;\n            left:80px;\n            z-index:2\">\n   \
    \     </div>\n\n        <div style = \"background-color:Red;\n            width:300px;\n\
    \            height:100px;\n            position:relative;\n            top:-60px;\n\
    \            left:35px;\n            z-index:1;\">\n        </div>\n\n       \
    \ <div style = \"background-color:Black;\n            width:300px;\n         \
    \   height:100px;\n            position:relative;\n            top:-220px;\n \
    \           left:120px;\n            z-index:3;\">\n        </div>\n    </body>\n\
    </html>\n```\n\n输出：\n\n![](img/9d932bec53e523b8d8b7b8134cf77ca7_140_0.png)\n\n\
    ### 可见性\n\nCSS中的`Visibility`属性允许我们从视图模式中隐藏一个元素，该属性也可用于隐藏错误信息和保护文本隐私。`Visibility`属性具有预定义的值，包括`Visible`、`Hidden`和`Collapse`。\n\
    通过CSS在段落实现`Visibility`属性的语法：\n\n```html\n<p>\n    Text visible.\n</p>\n\n<p style\
    \ = \"visibility:hidden;\">\n    Text should not be visible.\n</p>\n```\n\n###\
    \ 布局与动画\n\n#### 布局\n\nCSS布局技术是处理网页中包含的元素并以不同布局呈现它们的绝佳方式。此技术通常用于更改元素或容器的位置。CSS布局模块包括普通流、`display`属性、Flexbox、Grid、浮动、定位、表格布局和多列布局。请记住，所有在CSS中实现页面布局的方法都是通过`display`属性进行的。\n\
    \n#### 动画\n\nCSS动画允许元素从一种样式更改为另一种样式，为此我们也可以实现多个属性。要使用CSS动画，我们需要通过`@keyframes`规则指定一些关键帧。\n\
    例如：\n\n```css\n@keyframes sample {\n  from {background-color: blue;}\n  to {background-color:\
    \ brown;}\n}\n```\n\n```css\n/* The element to apply the animation to */\ndiv\
    \ {\n  width: 100px;\n  height: 100px;\n  background-color: blue;\n  animation-name:\
    \ example;\n  animation-duration: 4s;\n}\n```\n\n## 如何有效使用CSS\n\n还有其他一些CSS自定义属性和元素可以实现，以改善网页的图形、显示和吸引力。虽然学习和实现所有CSS属性至关重要，但使用一个好的编辑器可以帮助创建完美的网站设计。此外，CSS中使用的所有方法都应保持一致，以避免出现误解等问题。\n\
    编写CSS时，你还应避免使用内联代码，只将样式或属性放在外部样式表中。检查你的代码是否在最新的互联网浏览器（如Internet Explorer、Chrome和Safari）上运行是一个好主意，这样你可以确保网页的正确显示和格式化。此外，CSS代码也可以作为其他项目的模板重用，你也可以将预先存在的代码回收到新的代码中。多个类也可以通过空格分隔来实现，我们可以通过应用特定的CSS元素从CSS继承中受益。\n\
    \n![](img/9d932bec53e523b8d8b7b8134cf77ca7_142_0.png)\n\n# 第十章\n\n## 编程基础\n\n\
    ### 选择编程语言\n\n正如我们已经详细讨论了所有主要编程语言及其语法，初学者可以选择看起来最容易学习和实现的语言。虽然大多数主要编程语言（如C、C++和Java）具有相似的语法，但在编写程序时有几个重要方面需要关注。C和C++是初学者开发计算机应用程序的最佳选择，因为它们提供了对编程的深入理解和清晰的概念。\n\
    \n对于开发网络插件、桌面应用程序或移动应用程序，可以考虑使用Java语言，因为它提供了完整的支持和功能。HTML、CSS和PHP是网站开发的核心语言，初学者可以轻松学习。作为程序员，永远不应将自己局限于一种语言，并尝试最新的技术和实现。\n\
    \n多种计算机编程语言可用于解决特定问题。为了简化事情，初学者可以查看自己的技能，并选择最适合且易于实现的编程语言。编程依赖于其他几个因素，例如应用程序的可用性、安全性、兼容性和响应时间。\n\
    \n### 高效编程技巧\n\n虽然编写可理解的代码和满足程序要求是计算机编程的主要部分，但有一些基本的技巧和窍门可以提高程序员的效率。从最重要的考虑点开始，程序员应避免向函数传递长参数列表，并只尝试使用`int`、指针或`void`函数类型。此外，不要将`char`转换为另一种数据类型，因为`char`变量可以位于RAM中的任何位置。\n\
    此外，全局变量绝不能用小函数初始化，并尽量减少使用浮点数的数学运算。这将减少执行时间并消耗更少的内存。当代码达到数千行时，全局变量和循环会使程序员难以处理应用程序，而进行微小的更改会导致巨大的问题。\n\
    在方法或函数内部编写`switch`语句、语句、循环和`try-catch`是理想的方法。请记住，方法也应在类和函数定义内部编写。此外，使用适当的结构来构建应用程序是一种好方法，也可以提高编码标准。\n\
    最后但同样重要的是，可以考虑使用版本控制软件来提高应用程序性能并交付更新。虽然这是专业程序员使用的方法，但像Mercurial或Git这样的工具也易于初学者学习和使用。\n\
    编写代码时，避免深度嵌套并限制行长度，因为它会使代码难以阅读。\n\n### 加强你的基本技能\n\n为了成为一名优秀的程序员，你必须了解计算机编程的所有关键和主要概念。了解算法和数据结构的基础知识是提高解决问题能力的好方法。此外，编写单元测试是另一种提升思维和编码技能的完美方法。完成编码后，建议你进行深入的代码审查，并找出任何错误或需要改进的地方。作为回报，此活动也将提高应用程序的性能和效率。\n\
    代码必须始终简单且有意义。通过使用适当的命名约定，你可以轻松地替换变量或方法。请记住，为你的应用程序创建特定的文件夹和文件可以带来巨大的好处，因为你可以轻松地进行维护和调试。学习编程基础是培养强大开发和分析能力的关键方面。\n\
    此外，尝试通过解决编程练习和编写简单代码来实现你的编码技能。这不仅会提升你的编程技能，而且你还将能够开发出高效且有效的新解决方案。花时间学习编程基础也使适应最新技术和学习新的编程方法变得更容易。通过学习和实现新的方法、函数和方法，编程可以变得有趣。"
