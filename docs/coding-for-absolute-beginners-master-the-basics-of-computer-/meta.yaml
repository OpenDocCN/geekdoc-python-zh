- md: '## Types of Databases


    There are different types of databases that are classified as per their organizational
    approach and functionality.


    ## Relational Database


    A relational database is where the data is defined, organized, and accessed in
    multiple ways. Being a tabular database, the table consists of rows and columns
    which is managed through Structured Query Language (SQL).


    ## Distributed Database


    The distributed database has its data stored at multiple sites which are interconnected
    with each other through communication links. This database is further classified
    into Homogeneous and Heterogeneous categories. For the homogeneous distributed
    database system, the same type of hardware, OS, and database applications are
    connected together whereas for the heterogeneous distributed database system,
    the system can be different for each location and connection.


    ## Cloud Database


    The Cloud Database environment is designed and built to store data in private,
    public, or hybrid cloud. Providing better scalability and greater storage capacity,
    users can benefit from high availability. It is the best suitable option for business
    applications.


    ## NoSQL Database


    NoSQL Database is best suited for large distributed data and it is conveniently
    managed through relational databases. Furthermore, they are effective for big
    data performance issues which cannot be easily solved by using relational databases.


    ## Object Oriented Database


    Object Oriented Database is supported by the relational database and is based
    on objects rather than actions.


    ## End User Database


    End User Database is a shared database that is specifically designed and created
    for the end user. As it features a summary of the whole database, the end user
    certainly needs not to worry about the operations that are being performed at
    any database level.


    ## Database Syntax, Data Type and Operators


    Standard Query Language (SQL) is used for storing, manipulating, and retrieving
    data within a database. SQL allows database administrators to perform multiple
    operations that are required to manage a database. The language allows you to
    execute queries, retrieve data, insert records, update records, delete records,
    create new databases, create new tables, and set permissions in a database just
    by writing simple queries.


    There are different versions of SQL and all of them support major functionalities
    such as SELECT, DELETE, INSERT, WHERE, and UPDATE.


    ## Structured Query Language (SQL)


    SQL is the language that is used for relational database systems such as MySQL,
    Sybase, Oracle, and SQL Server. Being a standard database language, SQL allows
    users to describe the data, access data, and manipulate the relational database
    management systems. Furthermore, users can also create, view, and drop databases
    through the Structured Query Language.


    The different components that are included in this process are Optimization Engines,
    SQL Query Engine, Classic Query Engine, and Query Dispatcher.


    To perform specific operations in a relational database management system, we
    can use the commands mentioned below:


    | Command | Description |

    | :--- | :--- |

    | CREATE | User can create a new table or an object within the database. |

    | READ | User can read the data stored in the tables. |

    | UPDATE | Update the tables to modify records. |

    | DELETE | Delete any record from the table. |

    | INSERT | Insert a new record into the table. |

    | SELECT | Select specific records from the tables within the database. |

    | ALTER | Bring changes within a database object. |

    | DROP | Delete the entire table from the database. |


    By using the above operations, we can perform different operations from the sample
    table named ‘Students’ given below:


    | Student ID | Student Name | City | Subject | Marks | Percentage |

    |---|---|---|---|---|---|

    | 1 | William | New York | Mathematics | 85 | 60% |

    | 2 | James | California | English | 79 | 58% |


    The SQL statement to fetch records from the above table will have the following
    syntax:


    ```sql

    SELECT * FROM Students;

    ```


    ## 1. SQL Queries


    In order to perform specific operations with tables in a database, we are required
    to use different queries that are explained as follows:


    | Query | Syntax |

    |---|---|

    | INSERT INTO | INSERT INTO table_name(column1, column2,...) VALUES (Value1, Value2,...)
    |

    | UPDATE | UPDATE table_name SET column1 = value1, column2 = value2,... WHERE
    condition |

    | DELETE | DELETE FROM table_name WHERE condition; |

    | ORDER BY | SELECT column1, ..FROM table_name ORDER BY column1, ASC/DESC; |

    | MIN() | SELECT MIN(column_name) FROM table_name WHERE condition; |

    | MAX() | SELECT MAX(column_name) FROM table_name WHERE condition; |

    | WHERE | SELECT column1,... FROM table_name WHERE condition; |


    ## SQL Joins


    Taking the example of relational database with table A and table B, the table
    can also be joined through the SQL JOIN query. The Venn diagram clearly shows
    how both of the tables are joined together to share data:


    We will implement various JOIN clause operations on the example tables ‘Patients’
    below:


    Table 1:


    | PatientID | CaseNO | Date |

    |---|---|---|

    | 43221 | 1 | 9-2-2011 |

    | 82357 | 3 | 8-12-2015 |


    Table 2:


    | CaseNo | PatientName | City |

    |---|---|---|

    | 1 | Andrew | Chicago |

    | 3 | John | LA |


    To join both tables, we can write the SQL JOIN statement as follows:


    ```sql

    SELECT Patient.PatientID, Case.CaseNo, Date

    FROM Patients

    INNER JOIN Patients ON Case.CaseNo = PatientName.PatientID;

    ```


    There are four different types of SQL JOIN queries known as:


    - INNER JOIN

    - LEFT OUTER JOIN

    - RIGHT OUTER JOIN

    - FULL OUTER JOIN


    ## Inner Join


    Inner join selects the entire record from Table A and Table B where the Join condition
    is satisfied. The syntax for creating inner join in SQL is defined as follows:


    ```sql

    SELECT column_name

    FROM table1

    INNER JOIN table2

    ON table1.column_name = table2.column_name;

    ```


    ## Left Join


    The Left join selects the entire record from Table A combined with the records
    from Table B where the join condition is satisfied. Syntax for creating LEFT JOIN
    in SQL is defined as follows:


    ```sql

    SELECT column_name

    FROM table1

    LEFT JOIN table2

    ON table1.column_name = table2.column_name;

    ```


    ## Right Join


    The Right join selects all records from Table B combined with the records from
    Table A where the join condition is satisfied. Syntax for creating RIGHT JOIN
    in SQL is defined as follows:


    ```sql

    SELECT column_name

    FROM table1

    RIGHT JOIN table2

    ON table1.column_name = table2.column_name;

    ```


    ## Full Outer Join


    The Full outer Join selects all records from Table A and Table B even if the join
    condition is not met. Syntax for creating FULL JOIN in SQL is defined as follows:


    ```sql

    SELECT column_name

    FROM table1

    FULL OUTER JOIN table2

    ON table1.column_name = table2.column_name

    WHERE condition;

    ```


    ## Union Operator


