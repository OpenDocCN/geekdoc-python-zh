    # # CHAPTER NINE


    CSS


    # ## What is CSS?


    CSS stands for “Cascading Style Sheet” and is responsible for controlling the
    style, design, and appearance of a web document. This design language has the
    capability to simplify the process of web designing and also increases the flexibility
    of a website. Through CSS, we can change the outlook, fonts, design, appearance,
    and format of the whole website by making appropriate adjustments in the CSS.

    Learning CSS is as simple as HTML because both of the languages are linked together
    and have almost the same syntax. Upon using CSS, we can define a specific style
    for each HTML element and apply it to multiple web pages. Moreover, there is no
    need to write HTML tag attributes or elements each time which makes pages load
    faster. With CSS, we can give a better appearance to our web pages because there
    is a wider range of attributes compared to HTML and the style sheets provide different
    versions of a website to display perfectly on desktop PCs, smartphones, and tablets.'
