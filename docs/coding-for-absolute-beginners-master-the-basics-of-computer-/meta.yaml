  md: "# Types of CSS\n\nThe three main types of CSS are Inline CSS, Internal CSS,\
    \ and External CSS.\n\n# Inline CSS\n\nInline CSS has the CSS property implemented\
    \ in a specific section attached with the element in HTML document. For example:\n\
    \n```\n<html>\n    <head>\n        <title>Inline CSS</title>\n    </head>\n\n\
    \    <body>\n        <p style = \"color:Blue; font-size:50px;\n              \
    \      font-style:italic; text-align:center;\">\n            Cascading Style sheets\n\
    \        </p>\n    </body>\n</html>\n```\n\nOutput:\n\n![](img/9d932bec53e523b8d8b7b8134cf77ca7_121_0.png)\n\
    \n# Internal CSS\n\nInternal CSS is implemented over a single HTML document to\
    \ give it a unique style. Remember that the rule must be implemented within the\
    \ HTML file in head section.\nSyntax for implementing Internal CSS:\n\n```\n<head>\n\
    \    <title>Internal css</title>\n    <style>\n        selector{\n           \
    \ Property:value;\n        }\n    </style>\n</title>\n```"
  merge: -1
