    \ \")` 会将字符串拆分为单词，然后输出结果为 `\"ABC\"` `\"PQR\"` `\"XYZ\"`。\n\n## 程序\n\n```python\n\
    # Function to split into words\n# and print words with its length\n\ndef splitString(str):\n\
    \    # split the string by spaces\n    str = str.split(' ')\n    # iterate words\
    \ in string\n    for words in str:\n        print(words, \"(\", len(words), \"\
    )\")\n\n# Main code\n# declare string and assign value\nstr = \"Hello World How\
    \ are you?\"\n\n# call the function\nsplitString(str)\n```\n\n## 输出\n\n```\nHello\
    \ ( 5 )\nWorld ( 5 )\nHow ( 3 )\nare ( 3 )\nyou? ( 4 )\n```\n\n## 统计字符串中的元音字母数量\n\
    \n**示例：**\n\n输入：\nStr = \"Hello world\"\n\n输出：\n元音字母总数为：3\n\n## 程序\n\n```python\n\
    # count vowels in a string\n\n# declare, assign string\nstr = \"Hello world\"\n\
    \n# declare count\ncount = 0\n\n# iterate and check each character\nfor i in str:\n\
    \    # check the conditions for vowels\n    if (i == 'A' or i == 'a' or i == 'E'\
    \ or i == 'e'\n        or i == 'I' or i == 'i' or i == 'O' or i == 'o'\n     \
    \   or i == 'U' or i == 'u'):\n        count += 1\n\n# print count\nprint(\"Total\
    \ vowels are: \", count)\n```\n\n## 输出\n\n```\nTotal vowels are: 3\n```\n\n##\
    \ 使用乘法运算符创建字符串的多个副本\n\n使用乘法运算符（`*`）来创建字符串的多个副本。\n\n## 示例：\n\n输入：\nstr1 = \"Hello\"\
    \nn = 3\n\n逻辑：\nstr2 = str1 * 3\n\n输出：\nstr2 = \"HelloHelloHello\"\n\n## 程序：\n\
    \n```python\n# Python program to create N copies\n# of a given string\n\n# define\
    \ inputs: string and N\nstr1 = \"Hello\"\nn = 3\n\n# create copies\nstr2 = str1\
    \ * 3\n\n# print\nprint(\"str1: \", str1)\nprint(\"str2: \", str2)\n```\n\n##\
    \ 输出\n\n```\nstr1: Hello\nstr2: HelloHelloHello\n```"
