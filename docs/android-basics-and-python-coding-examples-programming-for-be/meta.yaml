    \     android:layout_marginEnd = \"8dp\"\n        android:layout_marginStart =\
    \ \"8dp\"\n        android:layout_marginTop = \"124dp\"\n        android:ems =\
    \ \"10\"\n        android:textSize = \"22dp\"\n        android:text = \"This activity\
    \ is portrait orientation\"\n        app:layout_constraintEnd_toEndOf = \"parent\"\
    \n        app:layout_constraintHorizontal_bias = \"0.502\"\n        app:layout_constraintStart_toStartOf\
    \ = \"parent\"\n        app:layout_constraintTop_toTopOf = \"parent\"  />\n</android.support.constraint.ConstraintLayout>\n\
    ```\n\n## Activity class\n\nFile: MainActivity.java\n\n```java\npackage example.javatpoint.com.screenorientation;\n\
    \nimport android.content.Intent;\nimport android.support.v7.app.AppCompatActivity;\n\
    import android.os.Bundle;\nimport android.view.View;\nimport android.widget.Button;\n\
    \npublic class MainActivity extends AppCompatActivity {\n\n    Button button1;\n\
    \    @Override\n    protected void onCreate(Bundle savedInstanceState) {\n   \
    \     super.onCreate(savedInstanceState);\n        setContentView(R.layout.activity_main);\n\
    \        button1=(Button)findViewById(R.id.button1);\n    }\n    public void onClick(View\
    \ v) {\n        Intent intent = new Intent(MainActivity.this, SecondActivity.class);\n\
    \        startActivity(intent);\n    }\n}\n```\n\n## activity_second.xml\n\nFile:\
    \ activity_second.xml\n\n```xml\n<?xml version=\"1.0\" encoding=\"utf-8\"?>\n\
    <android.support.constraint.ConstraintLayout xmlns:android=\"http://schemas.android.com/apk/res/android\"\
    \n    xmlns:app=\"http://schemas.android.com/apk/res-auto\"\n    xmlns:tools=\"\
    http://schemas.android.com/tools\"\n    android:layout_width=\"match_parent\"\n\
    \    android:layout_height=\"match_parent\"\n    tools:context=\"example.javatpoint.com.screenorientation.SecondActivity\"\
    >\n\n    <TextView\n        android:id=\"@+id/textView\"\n        android:layout_width=\"\
    wrap_content\"\n        android:layout_height=\"wrap_content\"\n        android:layout_marginEnd\
    \ = \"8dp\"\n        android:layout_marginStart = \"8dp\"\n        android:layout_marginTop\
    \ = \"180dp\"\n        android:text = \"this is landscape orientation\"\n    \
    \    android:textSize = \"22dp\"\n        app:layout_constraintEnd_toEndOf = \"\
    parent\"\n        app:layout_constraintHorizontal_bias = \"0.502\"\n        app:layout_constraintStart_toStartOf\
    \ = \"parent\"\n        app:layout_constraintTop_toTopOf = \"parent\" />\n</android.support.constraint.ConstraintLayout>\n\
    ```\n\n## SecondActivity class\n\nFile: SecondActivity.java\n\n```java\npackage\
    \ example.javatpoint.com.screenorientation;\n\nimport android.support.v7.app.AppCompatActivity;\n\
    import android.os.Bundle;\n\npublic class SecondActivity extends AppCompatActivity\
    \ {\n\n    @Override\n    protected void onCreate(Bundle savedInstanceState) {\n\
    \        super.onCreate(savedInstanceState);\n        setContentView(R.layout.activity_second);\n\
    \    }\n}\n```\n\n## AndroidManifest.xml\n\nFile: AndroidManifest.xml\n\nAdd the\
    \ screenOrientation attribute to the operation in the AndroidManifest.xml file\
    \ and specify its orientation. We provide \"portrait\" orientation for MainActivity\
    \ and \"landscape\" for SecondActivity in this example.\n\n```xml\n<?xml version\
