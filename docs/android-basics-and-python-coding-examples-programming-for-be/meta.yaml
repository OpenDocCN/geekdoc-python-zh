    # # Android Architecture


    The Android architecture, also known as the Android software stack, is divided
    into five parts:


    +   1. linux kernel

    2. native libraries (middleware),

    3. Android Runtime

    4. Application Framework

    5. Applications


    ![](img/1380176b7af4c30b37d89ed0fc7a0cfe_12_0.png)'
  - '[PAGE 13]


    # 1) Linux kernel


    It is at the root of android architecture that the core of android architecture
    resides.


    Device drivers, power management, memory management, device management, and resource
    access are all handled by the Linux kernel.


    # 2) Native Libraries


    Native libraries such as WebKit, OpenGL, FreeType, SQLite, Media, C runtime library
    (libc), and others are built on top of the Linux kernel.


    The WebKit library is in charge of browser support, while SQLite is in charge
    of databases, FreeType is in charge of font support, and Media is in charge of
    playing and recording audio and video formats.


    # 3) Android Runtime


    There are main libraries and DVM (Dalvik Virtual Machine) in the Android runtime,
    which are responsible for running android applications.


    DVM is similar to JVM, but it is designed specifically for mobile devices. It
    uses less memory and has a fast response time.'
- md: "## 4) Android Framework\n\nThe Android system sits on top of native libraries\
    \ and the Android runtime.\n\nAndroid APIs such as UI (User Interface), telephony,\
    \ services, places, Content Providers (data), and package managers are all part\
    \ of the Android system.\n\nIt includes a large number of classes and interfaces\
    \ for developing Android apps.\n\n## 5) Applications\n\nThere are applications\
    \ that run on top of the Android platform.\n\nThe Android system, which includes\
    \ the Android runtime and libraries, is used for all applications such as home,\
    \ touch, settings, games, and browsers.\n\nThe Linux kernel is used by the Android\
    \ runtime and native libraries.\n\n## Android Core Building Blocks\n\nA component\
    \ in Android is simply a piece of code with a well-defined life cycle, such as\
    \ Activity, Receiver, Service, and so on.\nActivities, views, intents, utilities,\
    \ content providers, fragments, and AndroidManifest.xml are the basic building\
    \ blocks or fundamental components of Android.\n\n### Activity\n\nA single screen\
    \ is represented by an activity, which is a class. In AWT, it's similar to a Frame.\n\
    \n### View\n\nA view is a user interface feature such as a button, mark, or text\
    \ sector. A view is something that you can see.\n\n### Intent\n\nComponents are\
    \ invoked using intent. It's really used for:\n\n- Start the service\n- Launch\
    \ an activity\n- Display a web page\n- Display a list of contacts\n- Broadcast\
    \ a message\n- Dial a phone call etc.\n\n### Service\n\nService is a background\
    \ operation that can be left running indefinitely.\n\nThere are two kinds of services\
    \ available. Local services can only be accessed from inside the application,\
    \ while remote services can be accessed from other apps on the same device.\n\n\
    ### Content Provider\n\nData is shared between applications using Content Providers.\n\
    \n### Fragment\n\nFragments are identical to activity elements. One or more fragments\
    \ may be viewed on the screen at the same time by an activity.\n\n### AndroidManifest.xml\n\
    \nIt includes information about activities, service providers, and permissions,\
    \ among other things. It's similar to Java EE's web.xml format.\n\n## Android\
    \ Virtual Device (AVD)\n\nIt's used to test Android apps without the need for\
    \ a smartphone or tablet. It can be designed in a number of ways to replicate\
    \ a variety of real-world devices.\n\n## Android Emulator\n\nAn Android emulator\
    \ is an Android Virtual Device (AVD) that simulates a particular Android device.\n\
    \nOn our PC, we can use the Android emulator as a target platform to run and test\
    \ our Android app.\n\nThe Android emulator simulates nearly all of the features\
    \ of a real computer. Incoming phone calls and text messages are visible to us.\n\
    \nIt also displays the device's location and simulates various network speeds.\n\
    \nRotation and other hardware sensors are simulated by the Android emulator.\n\
    \nIt has access to the Google Play store, among other things.\n\n![](img/1380176b7af4c30b37d89ed0fc7a0cfe_18_0.png)\n\
    \nTesting Android apps on an emulator can be quicker and simpler than testing\
    \ them on a real computer.\nFor example, we can pass data to the emulator much\
    \ faster than we can to a real device connected via USB.\nThe Android emulator\
    \ provides pre-configured settings for a range of Android phones, Wear OS, tablet,\
    \ and Android TV devices.\n\n### Requirement and recommendations\n\nBeyond the\
    \ basic device specifications for Android Studio, the Android emulator has additional\
    \ requirements.\nThe following are the requirements:\n\n- SDK Tools 26.1.1 or\
    \ higher\n- 64-bit processor\n- Windows: CPU with UG (unrestricted guest) support\n\
    - HAXM 6.2.1 or later (recommended HAXM 7.2.0 or later)\n\n### Install the emulator\n\
    \nWhen installing Android Studio, the Android emulator is also installed.\nHowever,\
    \ when installing Android Studio, certain emulator components can or may be installed.\n\
    \nPick the Android Emulator component in the SDK Tools tab of the SDK Manager\
    \ to install the emulator component.\n\n### Run an Android app on the Emulator\n\
    \nWe can run an Android app developed in Android Studio or an app installed on\
    \ the Android Emulator in the same way we would any other app on a smartphone.\n\
    \nTo open the Android Emulator and run an app in our project, follow these steps:\n\
    \n1. Build an Android Virtual Device (AVD) in Android Studio so that the emulator\
    \ can install and run your app. To make a new AVD, follow these steps:\n\n   \
    \ 1.1 Go to Tools > AVD Manager to access the AVD Manager.\n\n    1.2 At the bottom\
    \ of the AVD Manager dialog, click Create Virtual Device. Then the page Pick Hardware\
    \ appears.\n\n    ![](img/1380176b7af4c30b37d89ed0fc7a0cfe_21_0.png)\n\n    1.3\
    \ Click Next after selecting a hardware profile. If the hardware profile we need\
    \ is not available, we may build or import one. The page System Image appears.\n\
    \n    ![](img/1380176b7af4c30b37d89ed0fc7a0cfe_22_0.png)\n\n    1.4 Select the\
    \ system image for the API level you're working with and then select Next. This\
    \ opens a page called Verify Configuration.\n\n    ![](img/1380176b7af4c30b37d89ed0fc7a0cfe_23_0.png)\n\
    \n    1.5 Make any necessary changes to the AVD properties, then press Finish.\n\
    \n2. From the drop-down menu in the toolbar, pick the AVD from which we want to\
    \ run our app from the target device.\n\n    ![](img/1380176b7af4c30b37d89ed0fc7a0cfe_23_1.png)\n\
    \n3. Click **Run**.\n\n### Launch the Emulator without first running an app\n\n\
    To start emulator:\nThe AVD Manager now be open.\nAVD can be run by double-clicking\
    \ them or by clicking Run.\nWe can run the Android Studio project and pick the\
    \ emulator as the target device while the emulator is running.\nWe can also drag\
    \ and drop APK files onto an emulator to load and run them.\n\n### Start the emulator\
    \ from the command line\n\nThe Android computer simulator is included in the Android\
    \ SDK.\nYou can use an Android emulator to build and test your app without having\
    \ to use a physical computer.\n\n### Starting the emulator\n\nWe'll launch an\
    \ emulator with the emulator command. It is an option to run our project or to\
    \ begin using the AVD Manager.\n\nThe basic command-line syntax for launching\
    \ a virtual system is as follows:\n\n```\n$ emulator -avd avd_name [ {-option\
    \ [value]} ... ]\nor\n$ emulator @avd_name [ {-option [value]} ... ]\n```\n\n\
    ### Run and stop an emulator, and clear data\n\nTo use an AVD to run an Android\
    \ emulator, double-click the AVD or click Launch.\n\nTo stop the simulator from\
    \ running, right-click and choose Stop, or go to Menu and choose Stop.\n\nRight-click\
    \ an AVD and select Wipe Data to clear the data from the emulator and return it\
    \ to the state it was in when it was first defined.\n\nAlternatively, pick Wipe\
    \ Data from the menu.\n\n## Install Android\n\nAndroid programs can be written\
    \ in Java, C++, C#, and other languages. Android's official supported language\
    \ is Java. This site's Android examples were created with the Java programming\
    \ language and the Eclipse IDE.\n\nHere, we'll go over the tools that you'll need\
    \ to build Android apps with the Eclipse IDE.\n\nAndroid can be installed in two\
    \ ways.\n\n1. By ADT Bundle\n2. By Setup Eclipse Manually\n\n## By Android Studio\n\
    \nIt is the most straightforward method of installing the required applications\
    \ for an Android application. It contains the following items:\n\n- Eclipse IDE\n\
    - Android SDK\n- Eclipse Plugin\n\nYou don't need eclipse IDE, android SDK, or\
    \ eclipse Plugin if you download Android Studio from the Android website because\
    \ they're already included.\n\nIf you've downloaded Android Studio, unzip it,\
    \ open Eclipse IDE, and click on the eclipse icon to launch it. You don't need\
    \ to take any additional steps in this situation.\n\n## Setup Android for Eclipse\
    \ IDE\n\nOn this tab, you'll find out what program you'll need to run an Android\
    \ application on the Eclipse IDE.\n\nYou will learn how to install the Android\
    \ SDK and ADT plugin for the Eclipse IDE here.\n\nLet's look at the list of apps\
    \ needed to manually configure Android for Eclipse IDE.\n\n1. Install the JDK\n\
    2. Download and install the Eclipse for developing android application\n3. Download\
    \ and Install the android SDK\n4. Install the ADT plugin for eclipse\n5. Configure\
    \ the ADT plugin\n6. Create the AVD\n7. Create the hello android application\n\
    \n### 1) Install the Java Development Kit (JDK)\n\nIf you're making an Android\
    \ app with the Java programming language, you'll need to install JDK. JDK is available\
    \ for free.\n\n### 2) Download and install the Eclipse IDE"
  mdcn: "## 4) Android 框架\n\nAndroid 系统构建在原生库和 Android 运行时之上。\n\nAndroid API，例如 UI（用户界面）、电话、服务、位置、内容提供程序（数据）和包管理器，都是\
    \ Android 系统的一部分。\n\n它包含大量用于开发 Android 应用程序的类和接口。\n\n## 5) 应用程序\n\n应用程序运行在 Android\
    \ 平台之上。\n\nAndroid 系统（包括 Android 运行时和库）用于所有应用程序，例如主屏幕、触摸、设置、游戏和浏览器。\n\nLinux 内核被\
    \ Android 运行时和原生库使用。\n\n## Android 核心构建块\n\nAndroid 中的组件就是一段具有明确定义生命周期的代码，例如 Activity、Receiver、Service\
    \ 等。\nActivity、视图、Intent、工具类、内容提供程序、Fragment 和 AndroidManifest.xml 是 Android 的基本构建块或基础组件。\n\
    \n### Activity\n\nActivity 代表一个单独的屏幕，它是一个类。在 AWT 中，它类似于 Frame。\n\n### View\n\n\
    视图是用户界面元素，例如按钮、标记或文本区域。视图是你能看到的东西。\n\n### Intent\n\n组件通过 Intent 被调用。它主要用于：\n\n\
    - 启动服务\n- 启动一个 Activity\n- 显示一个网页\n- 显示联系人列表\n- 广播消息\n- 拨打电话等。\n\n### Service\n\
    \nService 是一个可以在后台无限期运行的操作。\n\n有两种可用的服务。本地服务只能从应用程序内部访问，而远程服务可以从同一设备上的其他应用程序访问。\n\
    \n### Content Provider\n\n数据通过内容提供程序在应用程序之间共享。\n\n### Fragment\n\nFragment 与 Activity\
    \ 元素相同。一个 Activity 可以在屏幕上同时显示一个或多个 Fragment。\n\n### AndroidManifest.xml\n\n它包含有关\
    \ Activity、服务提供程序和权限等信息。它类似于 Java EE 的 web.xml 格式。\n\n## Android 虚拟设备 (AVD)\n\n\
    它用于测试 Android 应用程序，无需智能手机或平板电脑。它可以被设计成多种方式以模拟各种真实设备。\n\n## Android 模拟器\n\nAndroid\
    \ 模拟器是一个模拟特定 Android 设备的 Android 虚拟设备 (AVD)。\n\n在我们的 PC 上，我们可以使用 Android 模拟器作为目标平台来运行和测试我们的\
    \ Android 应用程序。\n\nAndroid 模拟器模拟了真实计算机的几乎所有功能。我们可以看到来电和短信。\n\n它还显示设备的位置并模拟各种网络速度。\n\
    \nAndroid 模拟器模拟旋转和其他硬件传感器。\n\n它可以访问 Google Play 商店等。\n\n![](img/1380176b7af4c30b37d89ed0fc7a0cfe_18_0.png)\n\
    \n在模拟器上测试 Android 应用程序可能比在真实计算机上测试更快、更简单。\n例如，我们可以比通过 USB 连接的真实设备更快地向模拟器传递数据。\n\
    Android 模拟器为一系列 Android 手机、Wear OS、平板电脑和 Android TV 设备提供了预配置设置。\n\n### 要求和建议\n\
    \n除了 Android Studio 的基本设备规格外，Android 模拟器还有额外的要求。\n以下是要求：\n\n- SDK Tools 26.1.1\
    \ 或更高版本\n- 64 位处理器\n- Windows：支持 UG（无限制客户机）的 CPU\n- HAXM 6.2.1 或更高版本（建议 HAXM 7.2.0\
    \ 或更高版本）\n\n### 安装模拟器\n\n安装 Android Studio 时，Android 模拟器也会被安装。\n但是，在安装 Android\
    \ Studio 时，某些模拟器组件可以或可能会被安装。\n\n在 SDK Manager 的 SDK Tools 选项卡中选择 Android Emulator\
    \ 组件以安装模拟器组件。\n\n### 在模拟器上运行 Android 应用程序\n\n我们可以像在智能手机上运行任何其他应用程序一样，运行在 Android\
    \ Studio 中开发的 Android 应用程序或安装在 Android 模拟器上的应用程序。\n\n要打开 Android 模拟器并在我们的项目中运行应用程序，请按照以下步骤操作：\n\
    \n1. 在 Android Studio 中构建一个 Android 虚拟设备 (AVD)，以便模拟器可以安装和运行你的应用程序。要创建新的 AVD，请按照以下步骤操作：\n\
    \n    1.1 转到 Tools > AVD Manager 以访问 AVD Manager。\n\n    1.2 在 AVD Manager 对话框底部，单击\
    \ Create Virtual Device。然后出现 Pick Hardware 页面。\n\n    ![](img/1380176b7af4c30b37d89ed0fc7a0cfe_21_0.png)\n\
    \n    1.3 选择硬件配置文件后单击 Next。如果我们需要的硬件配置文件不可用，我们可以构建或导入一个。出现 System Image 页面。\n\n\
    \    ![](img/1380176b7af4c30b37d89ed0fc7a0cfe_22_0.png)\n\n    1.4 选择你正在使用的 API\
    \ 级别的系统映像，然后选择 Next。这将打开一个名为 Verify Configuration 的页面。\n\n    ![](img/1380176b7af4c30b37d89ed0fc7a0cfe_23_0.png)\n\
    \n    1.5 对 AVD 属性进行任何必要的更改，然后按 Finish。\n\n2. 从工具栏的下拉菜单中，选择我们要从中运行应用程序的目标设备 AVD。\n\
    \n    ![](img/1380176b7af4c30b37d89ed0fc7a0cfe_23_1.png)\n\n3. 单击 **Run**。\n\n\
    ### 在不先运行应用程序的情况下启动模拟器\n\n要启动模拟器：\n现在应该打开 AVD Manager。\n可以通过双击 AVD 或单击 Run 来运行\
    \ AVD。\n我们可以在模拟器运行时运行 Android Studio 项目并选择模拟器作为目标设备。\n我们还可以将 APK 文件拖放到模拟器上以加载和运行它们。\n\
    \n### 从命令行启动模拟器\n\nAndroid 计算机模拟器包含在 Android SDK 中。\n你可以使用 Android 模拟器来构建和测试你的应用程序，而无需使用物理计算机。\n\
    \n### 启动模拟器\n\n我们将使用 emulator 命令启动模拟器。这是一个运行我们的项目或开始使用 AVD Manager 的选项。\n\n启动虚拟系统的基本命令行语法如下：\n\
    \n```\n$ emulator -avd avd_name [ {-option [value]} ... ]\nor\n$ emulator @avd_name\
    \ [ {-option [value]} ... ]\n```\n\n### 运行和停止模拟器，以及清除数据\n\n要使用 AVD 运行 Android\
    \ 模拟器，请双击 AVD 或单击 Launch。\n\n要停止模拟器运行，请右键单击并选择 Stop，或者转到 Menu 并选择 Stop。\n\n右键单击\
    \ AVD 并选择 Wipe Data 以清除模拟器中的数据并将其恢复到首次定义时的状态。\n\n或者，从菜单中选择 Wipe Data。\n\n## 安装\
    \ Android\n\nAndroid 程序可以用 Java、C++、C# 和其他语言编写。Android 官方支持的语言是 Java。本站的 Android\
    \ 示例是使用 Java 编程语言和 Eclipse IDE 创建的。\n\n在这里，我们将介绍使用 Eclipse IDE 构建 Android 应用程序所需的工具。\n\
    \nAndroid 可以通过两种方式安装。\n\n1. 通过 ADT Bundle\n2. 通过手动设置 Eclipse\n\n## 通过 Android\
    \ Studio\n\n这是安装 Android 应用程序所需应用程序的最直接方法。它包含以下项目：\n\n- Eclipse IDE\n- Android\
    \ SDK\n- Eclipse Plugin\n\n如果你从 Android 网站下载 Android Studio，则不需要 Eclipse IDE、Android\
    \ SDK 或 Eclipse Plugin，因为它们已经包含在内。\n\n如果你已经下载了 Android Studio，请解压缩它，打开 Eclipse\
    \ IDE，然后单击 eclipse 图标启动它。在这种情况下，你不需要采取任何额外的步骤。\n\n## 为 Eclipse IDE 设置 Android\n\
    \n在此选项卡上，你将找到在 Eclipse IDE 上运行 Android 应用程序所需的程序。\n\n你将在此处学习如何为 Eclipse IDE 安装\
    \ Android SDK 和 ADT 插件。\n\n让我们看看手动为 Eclipse IDE 配置 Android 所需的应用程序列表。\n\n1. 安装\
    \ JDK\n2. 下载并安装用于开发 Android 应用程序的 Eclipse\n3. 下载并安装 Android SDK\n4. 为 Eclipse\
    \ 安装 ADT 插件\n5. 配置 ADT 插件\n6. 创建 AVD\n7. 创建 hello android 应用程序\n\n### 1) 安装 Java\
    \ 开发工具包 (JDK)\n\n如果你使用 Java 编程语言制作 Android 应用程序，则需要安装 JDK。JDK 可免费获取。\n\n### 2)\
    \ 下载并安装 Eclipse IDE"
