  md: '# Setup Android for Eclipse IDE


    On this tab, you''ll find out what program you''ll need to run an Android application
    on the Eclipse IDE.


    You will learn how to install the Android SDK and ADT plugin for the Eclipse IDE
    here.


    Let''s look at the list of apps needed to manually configure Android for Eclipse
    IDE.


    +   1. Install the JDK

    2. Download and install the Eclipse for developing android application

    3. Download and Install the android SDK

    4. Intall the ADT plugin for eclipse

    5. Configure the ADT plugin

    6. Create the AVD

    7. Create the hello android application


    # 1) Install the Java Development Kit (JDK)


    If you''re making an Android app with the Java programming language, you''ll need
    to install JDK. JDK is available for free.


    # 2) Download and install the Eclipse IDE'
  merge: -1
