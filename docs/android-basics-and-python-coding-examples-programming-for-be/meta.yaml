    \ {\n    private EditText edittext1, edittext2;\n    private Button buttonSum;\n\
    \n    @Override\n    protected void onCreate(Bundle savedInstanceState) {\n  \
    \      super.onCreate(savedInstanceState);\n        setContentView(R.layout.activity_main);\n\
    \n        addListenerOnButton();\n    }\n\n    public void addListenerOnButton()\
    \ {\n        edittext1 = (EditText) findViewById(R.id.editText1);\n        edittext2\
    \ = (EditText) findViewById(R.id.editText2);\n        buttonSum = (Button) findViewById(R.id.button);\n\
    \n        buttonSum.setOnClickListener(new View.OnClickListener() {\n        \
    \    @Override\n            public void onClick(View view) {\n               \
    \ String value1=edittext1.getText().toString();\n                String value2=edittext2.getText().toString();\n\
    \                int a=Integer.parseInt(value1);\n                int b=Integer.parseInt(value2);\n\
    \                int sum=a+b;\n                Toast.makeText(getApplicationContext(),String.valueOf(sum),\
    \ Toast.LENGTH_LONG).show();\n            }\n        });\n    }\n}\n```\n\n##\
    \ Android Toast Example\n\nAndroid is a term that refers to a Toast may be used\
    \ to view data for a limited amount of time. A toast includes a message that is\
    \ shown briefly and then vanishes.\n\n**The android.widget.Toast class is the\
    \ subclass of java.lang.Object class.**\n\nYou can also make your own toast, such\
    \ as one that shows a picture. The code for custom toast can be found on the next\
    \ tab.\n\n### Toast class\n\nThe Toast class is used to display notifications\
    \ for a specific time period. It vanishes after a moment. It does not prohibit\
    \ the user from communicating with the device.\n\nToast class constants\n\nThe\
    \ Toast class has only two constants, which are mentioned below.\n\n| Constant\
    \ | Description |\n| :--- | :--- |\n| public static final int LENGTH_LONG | displays\
    \ view for the long duration of time. |\n| public static final int LENGTH_SHORT\
    \ | displays view for the short duration of time. |\n\n### Methods of Toast class\n\
    \nThe methods of the Toast class that are most frequently used are described below.\n\
    \n| Method | Description |\n|---|---|\n| public static Toast makeText(Context\
    \ context, CharSequence text, int duration) | makes the toast containing text\
    \ and duration. |\n| public void show() | displays toast. |\n| public void setMargin\
    \ (float horizontalMargin, float verticalMargin) | changes the horizontal and\
    \ vertical margin difference. |\n\n## Android Toast Example\n\n```java\nToast.makeText(getApplicationContext()\
    \ , \"Hello Javalearn \" ,Toast.LENGTH_SHORT).show();\n```\n\nAnother code:\n\n\
    ```java\nToast toast=Toast.makeText(getApplicationContext() , \"Hello Javalearn\
    \ \" ,Toast.LENGTH_SHORT);\ntoast.setMargin ( 5 0 , 5 0 );\ntoast.show();\n```\n\
    \nThe getApplicationContext() method returns a Context instance in this case.\n\
    \n## Full code of activity class displaying Toast\n\nFile: MainActivity.java\n\
    \n```java\npackage example.javalearn.com.toast;\n\nimport android.support.v7.app.AppCompatActivity;\n\
    import android.os.Bundle;\nimport android.widget.Toast;\n\npublic class MainActivity\
    \ extends AppCompatActivity {\n\n    @Override\n    protected void onCreate(Bundle\
    \ savedInstanceState) {\n        super.onCreate(savedInstanceState);\n       \
    \ setContentView(R.layout.activity_main);\n\n        //Displaying Toast with Hello\
    \ Javalearn message\n        Toast.makeText(getApplicationContext(), \"Hello Javalearn\"\
    , Toast.LENGTH_SHORT).show();\n    }\n}\n```\n\n## Toast\n\nHello World!\n\nHello\
    \ Java\n\n## PYTHON CODING EXAMPLES\n\n## PROGRAMMING FOR BEGINNERS\n\nJ KING\n\
    \n## PYTHON CODING EXAMPLES\n\n## ASCII value of character in Python\n\nIn python,\
    \ we use the function ord() to obtain an ASCII code of a character. Ord() accepts\
    \ a character, returns its ASCII value.\n\n**Syntax:**\nord(character);\n\n**Example:**\n\
    Input:\nchar_var = 'A'\n\nFunction call:\nord(char_var)\n\nOutput:\n65\n\n## Code\
    \ to find ASCII value of a character\n\n```python\n# python program to print ASCII\n\
    # value of a given character\n\n# Assigning character to a variable\nchar_var\
    \ = 'A'\n\n# printing ASCII code\nprint(\"ASCII value of \" + char_var + \" is\
    \ = \", ord(char_var))\n\nchar_var = 'x'\n# printing ASCII code\nprint(\"ASCII\
    \ value of \" + char_var + \" is = \", ord(char_var))\n\nchar_var = '9'\n# printing\
    \ ASCII code\nprint(\"ASCII value of \" + char_var + \" is = \", ord(char_var))\n\
    ```\n\n## Output\n\nASCII value of A is = 65\nASCII value of x is = 120\nASCII\
    \ value of 9 is = 57\n\n## Calculate simple interest\n\nWe use the following formula\
    \ to calculate simple interest,\n(P * R * T) / 100\nWhere,\n\n- **P** – Principle\
    \ amount\n- **R** – Rate of the interest, and\n- **T** – Time in the years\n\n\
    **Example:**\nInput:\np = 250000\nr = 36\nt = 1\n\n```python\n# formula\nsi =\
    \ (p*r*t)/100\nprint(si)\n```\n\nOutput:\n90000\n\n## Python program for simple\
    \ interest\n\n```python\n# Python program to find simple interest\n\np = float(input(\"\
    Enter the principle amount : \"))\nr = float(input(\"Enter the rate of interest\
    \ : \"))\nt = float(input(\"Enter the time in the years: \"))\n\n# calculating\
    \ simple interest\nsi = (p*r*t)/100\n\n# printing the values\nprint(\"Principle\
    \ amount: \", p)\nprint(\"Interest rate   : \", r)\nprint(\"Time in years   :\
    \ \", t)\nprint(\"Simple Interest : \", si)\n```\n\n## Output\n\nFirst run:\n\n\
    Enter the principle amount : 10000\nEnter the rate of interest : 3.5\nEnter the\
    \ time in the years: 1\n\nPrinciple amount:  10000.0\nInterest rate   :  3.5\n\
    Time in years   :  1.0\nSimple Interest :  350.0\n\nSecond run:\n\nEnter the principle\
    \ amount : 250000\nEnter the rate of interest : 36\nEnter the time in the years:\
    \ 1\n\nPrinciple amount: 250000.0\nInterest rate : 36.0\nTime in years : 1.0\n\
    Simple Interest : 90000.0\n\n## Calculate compound interest\n\nWe use the equation\
    \ below to calculate compound interest\n\n**P(1 + R / 100) ^ T**\n\nWhere,\n\n\
    **P** – Principle amount\n\n**R** – Rate of the interest, and\n\n**T** – Time\
    \ in the years\n\n## Example:\n\nInput:\n\np = 250000\n\nr = 36\n\nt = 1\n\n```python\n\
    # formula\nci = p * (pow((1 + r / 100), t))\nprint(ci)\n```\n\nOutput:\n\n339999.99999999994\n\
    \n## Python program\n\n```python\n# Python program to find compound interest\n\
    \np = float(input(\"Enter the principle amount : \"))\nr = float(input(\"Enter\
