    Where,


    **P** – Principle amount


    **R** – Rate of the interest, and


    **T** – Time in the years


    # Example:


    Input:


    p = 250000


    r = 36


    t = 1


    ```

    # formula

    ci = p * (pow((1 + r / 100), t))

    print(ci)

