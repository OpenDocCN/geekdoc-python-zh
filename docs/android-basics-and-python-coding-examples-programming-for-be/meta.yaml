  md: '# # Android Toast Example


    Andorid is a term that refers to a Toast may be used to view data for a limited
    amount of time. A toast includes a message that is shown briefly and then vanishes.


    **The android.widget.Toast class is the subclass of java.lang.Object class.**


    You can also make your own toast, such as one that shows a picture. The code for
    custom toast can be found on the next tab.


    # ## Toast class


    The Toast class is used to display notifications for a specific time period. It
    vanishes after a moment. It does not prohibit the user from communicating with
    the device.


    Toast class constants


    The Toast class has only two constants, which are mentioned below.


    | Constant | Description |

    | :--- | :--- |

    | public static final int LENGTH_LONG | displays view for the long duration of
    time. |

    | public static final int LENGTH_SHORT | displays view for the short duration
    of time. |


    # ## Methods of Toast class


    The methods of the Toast class that are most frequently used are described below.'
