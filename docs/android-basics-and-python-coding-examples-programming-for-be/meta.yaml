    \ {\n        public static final int ic_launcher= 0x7f020000 ;\n    }\n    public\
    \ static final class id {\n        public static final int menu_settings= 0x7f070000\
    \ ;\n    }\n    public static final class layout {\n        public static final\
    \ int activity_main= 0x7f030000 ;\n    }\n    public static final class menu {\n\
    \        public static final int activity_main= 0x7f060000 ;\n    }\n    public\
    \ static final class string {\n        public static final int app_name= 0x7f040000\
    \ ;\n        public static final int hello_world= 0x7f040001 ;\n        public\
    \ static final int menu_settings= 0x7f040002 ;\n    }\n    public static final\
    \ class style {\n        /**\n        Base application theme, dependent on API\
    \ level. This theme is replaced\n        by AppBaseTheme from res/values-vXX/styles.xml\
    \ on newer devices.\n\n        Theme customizations available in newer API levels\
    \ can go in\n        res/values-vXX/styles.xml, while customizations related to\n\
    \        backward-compatibility can go here.\n        */\n        public static\
    \ final int AppBaseTheme= 0x7f050000 ;\n        /** Application theme.\n     \
    \   All customizations that are NOT specific to a particular API-level can go\
    \ here.\n        */\n        public static final int AppTheme= 0x7f050001 ;\n\
    \    }\n}\n```\n\nBase application theme for API 11+. This theme completely replaces\
    \ AppBaseTheme from res/values/styles.xml on API 11+ devices.\n\nAPI 11 theme\
    \ customizations can go here.\n\nBase application theme for API 14+. This theme\
    \ completely replaces AppBaseTheme from BOTH res/values/styles.xml and res/values-v11/styles.xml\
    \ on API 14+ devices.\n\nAPI 14 theme customizations can go here.\n\n## Android\
    \ Screen Orientation Example\n\nThe activity feature has a screenOrientation attribute.\n\
    Android operation may be in portrait, landscape, sensor, or unspecified orientation.\n\
    It must be defined in the AndroidManifest.xml format.\n\n### Syntax:\n\n```\n\
    <activity android:name = \"package_name.Your_ActivityName\"\n    android:screenOrientation\
    \ = \"orientation_type\" >\n</activity>\n```\n\n### Example:\n\n```\n<activity\
    \ android:name =\n\" example.javatpoint.com.screenorientation.MainActivity\"\n\
    \    android:screenOrientation = \"portrait\" >\n</activity>\n```\n\n```\n<activity\
    \ android:name = \".SecondActivity\"\n    android:screenOrientation = \"landscape\"\
    \ >\n</activity>\n```"
