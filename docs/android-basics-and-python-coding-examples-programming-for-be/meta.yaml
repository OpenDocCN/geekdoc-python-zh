  md: '# # ANDROID INTRODUCTION


    The Android tutorial, also known as the Android Studio tutorial, covers the fundamentals
    and advanced concepts of Android technology.


    Our Android development tutorial is suitable for both beginners and experts.


    Android is a full suite of apps for mobile devices such as tablets, laptops, smartphones,
    e-readers, set-top boxes, and other similar devices.


    It includes a linux-based operating system, middleware, and main mobile apps.


    It''s equivalent to a smartphone operating system.


    However, it is not limited to mobile devices. It''s now used in a range of products,
    including phones, tablets, and televisions.'
  merge: -1
  pgno: 5
- img_proc: true
  md: '# # What is Android


    It is necessary to understand what android is before learning about all of its
    topics.


    Android is a linux-based software kit and operating system for mobile devices
    including tablets and smartphones.


    It was created by Google and then by the OHA (Open Handset Alliance). While other
    languages may be used, the Java language is most widely used to write android
    code.


    The Android project''s mission is to develop a good real-world app that enhances
    end users'' mobile experience.


    Lollipop, Kitkat, Jelly Bean, Ice Cream Sandwich, Froyo, Ecliar, Donut, and other
    Android code names are addressed on the next page.


    # # Open Handset Alliance


    It is a partnership between 84 firms, including Google, Samsung, AKM, Synaptics,
    KDDI, Garmin, Teleca, Ebay, Intel, and others.


    It was founded on November 5, 2007, under the leadership of Google.


    It is dedicated to advancing open standards, providing utilities, and deploying
    Android-based handsets.'
  merge: -1
  pgno: 6
- img_proc: true
  md: '# Features of Android


    Let''s look at the features of Android now that we''ve learned what it is.


    The following are some of Android''s main features:


    +   1) It is free and open-source software.

    2) The Android Platform can be customized by anyone.

    3) The user has a wide variety of smartphone apps from which to choose.

    4) It has a lot of cool features, such as weather information, an opening screen,
    and live RSS (Really Simple Syndication) feeds.


    It supports SMS and MMS messaging, as well as a web browser, storage (SQLite),
    networking (GSM, CDMA, Bluetooth, Wi-Fi, and so on), media, and handset style.


    # Categories of Android applications


    +   - Entertainment

    - Tools

    - Communication

    - Productivity

    - Personalization

    - Music and Audio

    - Social

    - Media and Video'
