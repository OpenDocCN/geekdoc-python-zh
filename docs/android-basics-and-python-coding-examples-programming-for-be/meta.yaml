    \              <category android:name = \"android.intent.category.LAUNCHER\" />\n\
    \            </intent-filter>\n        </activity>\n        <activity android:name\
    \ = \".SecondActivity\"\n            android:screenOrientation = \"landscape\"\
    \ >\n        </activity>\n    </application>\n</manifest>\n```\n\n# OUTPUT\n\n\
    ![](img/1380176b7af4c30b37d89ed0fc7a0cfe_59_0.png)\n\n## Android Widgets\n\n###\
