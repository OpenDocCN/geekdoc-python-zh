    # ANDROID BASICS


    # PROGRAMMING FOR BEGINNERS


    J KING


    ## ANDROID INTRODUCTION


    The Android tutorial, also known as the Android Studio tutorial, covers the fundamentals
    and advanced concepts of Android technology.


    Our Android development tutorial is suitable for both beginners and experts.


    Android is a full suite of apps for mobile devices such as tablets, laptops, smartphones,
    e-readers, set-top boxes, and other similar devices.


    It includes a linux-based operating system, middleware, and main mobile apps.


    It''s equivalent to a smartphone operating system.


    However, it is not limited to mobile devices. It''s now used in a range of products,
    including phones, tablets, and televisions.


    ## What is Android


    It is necessary to understand what android is before learning about all of its
    topics.


    Android is a linux-based software kit and operating system for mobile devices
    including tablets and smartphones.


    It was created by Google and then by the OHA (Open Handset Alliance). While other
    languages may be used, the Java language is most widely used to write android
    code.


    The Android project''s mission is to develop a good real-world app that enhances
    end users'' mobile experience.


    Lollipop, Kitkat, Jelly Bean, Ice Cream Sandwich, Froyo, Eclair, Donut, and other
    Android code names are addressed on the next page.


    ## Open Handset Alliance


    It is a partnership between 84 firms, including Google, Samsung, AKM, Synaptics,
    KDDI, Garmin, Teleca, Ebay, Intel, and others.


    It was founded on November 5, 2007, under the leadership of Google.


    It is dedicated to advancing open standards, providing utilities, and deploying
    Android-based handsets.


    ## Features of Android


    Let''s look at the features of Android now that we''ve learned what it is.


    The following are some of Android''s main features:


    1. It is free and open-source software.

    2. The Android Platform can be customized by anyone.

    3. The user has a wide variety of smartphone apps from which to choose.

    4. It has a lot of cool features, such as weather information, an opening screen,
    and live RSS (Really Simple Syndication) feeds.


    It supports SMS and MMS messaging, as well as a web browser, storage (SQLite),
    networking (GSM, CDMA, Bluetooth, Wi-Fi, and so on), media, and handset style.


    ## Categories of Android applications


    - Entertainment

    - Tools

    - Communication

    - Productivity

    - Personalization

    - Music and Audio

    - Social

    - Media and Video

    - Travel and Local etc.


    ## History of Android


    It''s fascinating to learn about Android''s past and different models. Aestro,
    Blender, Cupcake, Donut, Eclair, Froyo, Gingerbread, Honeycomb, Ice Cream Sandwich,
    Jelly Bean, KitKat, and Lollipop are some of the latest Android code names. Let''s
    take a look at the past of Android in order.


    1. In October of 2003, Andy Rubin founded Android Incorporation in Palo Alto,
    California, United States.

    2. Google purchased android Incorporation on August 17, 2005. Since then, it has
    been a Google Integration affiliate.

    3. Andy Rubin, Rich Miner, Chris White, and Nick Sears are the main employees
    of Android Incorporation.

    4. Initially designed for cameras, but later moved to smart phones due to the
    low demand for cameras alone.

    5. Andy Rubin''s colleagues call him "Android" because of his fascination with
    robots.

    6. In 2007, Google announced the development of the Android operating system.

    7. HTC released the first Android phone in 2008.


    ## Android versions, name, and API level


    | Code name | Version numbers | API level | Release date |

    |---|---|---|---|

    | No codename | 1.0 | 1 | September 23, 2008 |

    | No codename | 1.1 | 2 | February 9, 2009 |

    | Cupcake | 1.5 | 3 | April 27, 2009 |

    | Donut | 1.6 | 4 | September 15, 2009 |

    | Eclair | 2.0 - 2.1 | 5 - 7 | October 26, 2009 |

    | Froyo | 2.2 - 2.2.3 | 8 | May 20, 2010 |

    | Gingerbread | 2.3 - 2.3.7 | 9 - 10 | December 6, 2010 |

    | Honeycomb | 3.0 - 3.2.6 | 11 - 13 | February 22, 2011 |

    | Ice Cream Sandwich | 4.0 - 4.0.4 | 14 - 15 | October 18, 2011 |

    | Jelly Bean | 4.1 - 4.3.1 | 16 - 18 | July 9, 2012 |

    | KitKat | 4.4 - 4.4.4 | 19 - 20 | October 31, 2013 |

    | Lollipop | 5.0 - 5.1.1 | 21 - 22 | November 12, 2014 |

    | Marshmallow | 6.0 - 6.0.1 | 23 | October 5, 2015 |

    | Nougat | 7.0 | 24 | August 22, 2016 |

    | Nougat | 7.1.0 - 7.1.2 | 25 | October 4, 2016 |

    | Oreo | 8.0 | 26 | August 21, 2017 |

    | Oreo | 8.1 | 27 | December 5, 2017 |

    | Pie | 9.0 | 28 | August 6, 2018 |

    | Android 10 | 10.0 | 29 | September 3, 2019 |

    | Android 11 | 11 | 30 | September 8, 2020 |


    ## Android Architecture


    The Android architecture, also known as the Android software stack, is divided
    into five parts:


    1. linux kernel

    2. native libraries (middleware),

    3. Android Runtime

    4. Application Framework

    5. Applications


    ## 1) Linux kernel


    It is at the root of android architecture that the core of android architecture
    resides.


    Device drivers, power management, memory management, device management, and resource
    access are all handled by the Linux kernel.


    ## 2) Native Libraries


    Native libraries such as WebKit, OpenGL, FreeType, SQLite, Media, C runtime library
    (libc), and others are built on top of the Linux kernel.


    The WebKit library is in charge of browser support, while SQLite is in charge
    of databases, FreeType is in charge of font support, and Media is in charge of
    playing and recording audio and video formats.


    ## 3) Android Runtime


    There are main libraries and DVM (Dalvik Virtual Machine) in the Android runtime,
    which are responsible for running android applications.


    DVM is similar to JVM, but it is designed specifically for mobile devices. It
    uses less memory and has a fast response time.'
