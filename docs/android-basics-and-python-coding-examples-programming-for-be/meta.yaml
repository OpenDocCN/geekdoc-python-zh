- md: "The following are some of the most common screenOrientation values:\n\n| Value\
    \ | Description |\n|---|---|\n| unspecified | It is the default value. In such\
    \ case, system chooses the orientation. |\n| portrait | taller not wider |\n|\
    \ landscape | wider not taller |\n| sensor | orientation is determined by the\
    \ device orientation sensor. |\n\n## Android Portrait and Landscape mode screen\
    \ orientation example\n\nWe'll make two activities in this example, each with\
    \ a different screen orientation.\n\nThe first activity (MainActivity) will be\
    \ oriented \"portrait\" and the second activity (SecondActivity) will be oriented\
    \ \"landscape.\"\n\n## activity_main.xml\n\nFile: activity_main.xml\n\n```xml\n\
