    \ Asset Packaging Tool). When you build a part on activity main, an ID is provided\
    \ in the R.java file that you can later use in the Java Source file.\n\nFile:\
    \ R.java\n\n```\n/* AUTO-GENERATED FILE. DO NOT MODIFY.\n *\n * This class was\
