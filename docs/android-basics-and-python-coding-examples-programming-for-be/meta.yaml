    \   level can go here.\n        */\n        public static final int AppTheme=\
    \ 0x7f050001 ;\n    }\n}\n```\n\n## APK (Android Package)\n\nThe system generates\
    \ an apk file on its own. Move and install the Android program if you want to\
    \ use it on your computer.\n\n## Availability of resources\n\nIt includes resource\
    \ files such as activity main, strings, and styles, among others.\n\n## Manifest\
    \ document\n\nIt includes information about the kit, including events, programs,\
    \ content providers, and so on.\n\n## AndroidManifest.xml file in android\n\n\
    The AndroidManifest.xml file includes information about your package, such as\
    \ operations, programs, broadcast receivers, content providers, and other device\
    \ components.\n\nIt also performs the following functions:\n\n- It is the duty\
    \ of the user to protect the application by granting permissions to access any\
    \ protected sections.\n- It also specifies which Android API the application can\
    \ use.\n- It includes a list of instrumentation groups. Profiling and other details\
    \ are provided by the instrumentation groups. These details are deleted shortly\
    \ before the application is published, for example.\n\nThis is the mandatory xml\
    \ file for all Android applications, which can be found in the root directory.\n\
    \nThe following is an example of an AndroidManifest.xml file:\n\n```\n<manifest\
    \ xmlns:android = \"http://schemas.android.com/apk/res/android\"\n    package\
    \ = \"com.javatpoint.hello\"\n    android:versionCode = \"1\"\n    android:versionName\
    \ = \"1.0\" >\n\n    <uses-sdk\n        android:minSdkVersion = \"8\"\n      \
    \  android:targetSdkVersion = \"15\" />\n\n    <application\n        android:icon\
    \ = \"@drawable/ic_launcher\"\n        android:label = \"@string/app_name\"\n\
    \        android:theme = \"@style/AppTheme\" >\n        <activity\n          \
    \  android:name = \".MainActivity\"\n            android:label = \"@string/title_activity_main\"\
    \ >\n            <intent-filter>\n                <action android:name = \"android.intent.action.MAIN\"\
    \ />\n\n                <category android:name = \"android.intent.category.LAUNCHER\"\
    \ />\n            </intent-filter>\n        </activity>\n    </application>\n\n\
    </manifest>\n```\n\n## Elements of the AndroidManifest.xml file\n\nThe elements\
    \ in the xml file mentioned above are listed below.\n\n### manifest\n\nThe root\
    \ part of the AndroidManifest.xml file is manifest. It has a package attribute\
    \ that defines the activity class's package name.\n\n### <application>\n\nThe\
    \ manifest's subelement is operation. It also contains the declaration of a namespace.\
    \ This element has many subelements that declare application components like operation\
    \ and so on.\n\nIcon, mark, and theme are some of the most commonly used attributes\
    \ of this element.\n\nThe icon for all Android device components is defined by\
    \ android:icon.\n\nAll device components use android:label as the default label.\n\
    \nA general theme for all Android activities is represented by android:theme.\n\
    \n## Android R.java file\n\nAndroid R.java is an aapt (Android Asset Packaging\
    \ Tool)-generated file that contains resource IDs for all of the resources in\
    \ the res/ directory.\n\nIf you create a component in the activity main.xml file,\
    \ an id for that component is generated in this file as well. This id can be used\
    \ to perform any action on the component in the activity source file.\n\nNote:\
    \ If you delete the R.jar file, Android will create it for you.\n\nLet's take\
    \ a look at the R.java file for Android. It has several static nested classes\
    \ including menu, id, layout, attr, drawable, string, and so on.\n\n```\n/* AUTO-GENERATED\
    \ FILE. DO NOT MODIFY.\n *\n * This class was automatically generated by the\n\
    \ * aapt tool from the resource data it found.  It\n * should not be modified\
    \ by hand.\n */\n\npackage com.example.helloandroid;\n\npublic final class R {\n\
