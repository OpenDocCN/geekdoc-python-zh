    \ is a widget for Android.\n\nTextView is a subclass of Button, and Button is\
    \ a subclass of CompoundButton.\n\nRadioButton, ToggleButton, CompoundButton,\
    \ and other types of buttons are available in Android.\n\n### Android Button Example\
    \ with Listener\n\nFor the sum of two numbers, we'll build two textfields and\
    \ one mouse. When the user clicks the button, the Toast displays the number of\
    \ two input values.\n\nWe may use various types of actions on buttons, such as\
    \ calling a listener on the button or adding the onClick property of the button\
    \ to the activity's xml file.\n\n```java\nbutton.setOnClickListener(new View.OnClickListener()\
    \ {\n    @Override\n    public void onClick(View view) {\n        //code\n   \
    \ }\n});\n```\n\n```xml\n<Button\n    android:onClick = \"methodName\"\n/>\n```\n\
