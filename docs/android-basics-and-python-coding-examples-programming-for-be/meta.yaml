  - '[PAGE 14]


    # 4) Android Framework


    The android system sits on top of native libraries and the Android runtime.


    Android APIs such as UI (User Interface), telephony, services, places, Content
    Providers (data), and package managers are all part of the Android system.


    It includes a large number of classes and interfaces for developing Android apps.


    # 5) Applications


    There are applications that run on top of the Android platform.


    The android system, which includes the android runtime and libraries, is used
    for all applications such as home, touch, settings, games, and browsers.


    The linux kernel is used by the Android runtime and native libraries.'
  - '[PAGE 15]


    # # Android Core Building Blocks


    A component in Android is simply a piece of code with a well-defined life cycle,
    such as Operation, Receiver, Service, and so on.

    Activities, views, intents, utilities, content providers, fragments, and AndroidManifest.xml
    are the basic building blocks or fundamental components of Android.


    # ## Activity


    A single screen is represented by an operation, which is a class. In AWT, it''s
    similar to a Picture.


    # ## View


    A view is a user interface feature such as a button, mark, or text sector. A view
    is something that you can see.


    # ## Intent


    Components are invoked using purpose. It''s really used for:


    +   - Start the service

    - Launch an activity

    - Display a web page

    - Display a list of contacts

    - Broadcast a message

    - Dial a phone call etc.


    # ## Service'
  - '[PAGE 16]


    Service is a background operation that can be left running indefinitely.


    There are two kinds of programs available. Both nearby and far away Local services
    can only be accessed from inside the application, while remote services can be
    accessed from other apps on the same computer.


    # Content Provider


    Data is shared between applications using Content Providers.


    # Fragment


    Fragments are identical to action elements. One or more fragments may be viewed
    on the screen at the same time by an operation.


    # AndroidManifest.xml


    It includes information about operations, service providers, and permissions,
    among other things. It''s similar to Java EE''s web.xml format.'
  - '[PAGE 17]


    # Android Virtual Device (AVD)


    It''s used to test Android apps without the need for a smartphone or tablet. It
    can be designed in a number of ways to replicate a variety of real-world devices.'
  - '[PAGE 18]


    # # Android Emulator


    An Android emulator is an Android Virtual Device (AVD) that simulates a particular
    Android device.


    On our PC, we can use the Android emulator as a target platform to run and test
    our Android app.


    The Android emulator simulates nearly all of the features of a real computer.
    Incoming phone calls and text messages are visible to us.


    It also displays the device''s location and simulates various network speeds.


    Rotation and other hardware sensors are simulated by the Android emulator.


    It has access to the Google Play store, among other things.


    ![](img/1380176b7af4c30b37d89ed0fc7a0cfe_18_0.png)'
  - '[PAGE 19]


    Testing Android apps on an emulator can be quicker and simpler than testing them
    on a real computer.

    For example, we can pass data to the emulator much faster than we can to a real
    device connected via USB.

    The Android emulator provides pre-configured settings for a range of Android phones,
    Wear OS, tablet, and Android TV devices.


    # Requirement and recommendations


    Beyond the basic device specifications for Android Studio, the Android emulator
    has additional requirements.

    The following are the requirements:


    +   - SDK Tools 26.1.1 or higher

    - 64-bit processor

    - Windows: CPU with UG (unrestricted guest) support

    - HAXM 6.2.1 or later (recommended HAXM 7.2.0 or later)


    # Install the emulator


    When installing Android Studio, the Android emulator is also installed.

    However, when installing Android Studio, certain emulator components can or may
    not be installed.'
  - '[PAGE 20]


    Pick the Android Emulator component in the SDK Tools tab of the SDK Manager to
    install the emulator component.


    # Run an Android app on the Emulator


    We can run an Android app developed in Android Studio or an app installed on the
    Android Emulator in the same way we would any other app on a smartphone.


    To open the Android Emulator and run an app in our project, follow these steps:


    +   1. Build an Android Virtual Device (AVD) in Android Studio so that the emulator
    can install and run your app. To make a new AVD, follow these steps:


    1.1 Go to Tools > AVD Manager to access the AVD Manager.


    1,2 At the bottom of the AVD Manager dialog, click Create Virtual Device. Then
    the page Pick Hardware appears.'
  - '[PAGE 21]


    ![](img/1380176b7af4c30b37d89ed0fc7a0cfe_21_0.png)


    1.3 Click Next after selecting a hardware profile. If the hardware profile we
    need is not available, we may build or import one. The page System Picture appears.'
  - '[PAGE 22]


    ![](img/1380176b7af4c30b37d89ed0fc7a0cfe_22_0.png)


    1:4 Select the system picture for the API level you''re working with and then
    select Next. This opens a page called Verify Configuration.'
  - '[PAGE 23]


    ![](img/1380176b7af4c30b37d89ed0fc7a0cfe_23_0.png)


    1.5 Make any necessary changes to the AVD properties, then press Finish.


    2. From the drop-down menu in the toolbar, pick the AVD from which we want to
    run our app from the target device.


    ![](img/1380176b7af4c30b37d89ed0fc7a0cfe_23_1.png)'
  - '[PAGE 24]


    3. Click **Run**.


    # Launch the Emulator without first running an app


    To start emulator:

    The AVD Manager now be open.

    AVD can be run by double-clicking them or by clicking Run.

    We can run the Android Studio project and pick the emulator as the target device
    while the emulator is running.

    We can also drag and drop APK files onto an emulator to load and run them.


    # Start the emulator from the command line


    The Android computer simulator is included in the Android SDK.

    You can use an Android emulator to build and test your app without having to use
    a physical computer.


    # Starting the emulator'
  - '[PAGE 25]


    We''ll launch an emulator with the emulator command. It is an option to run our
    project or to begin using the AVD Manager.


    The basic command-line syntax for launching a virtual system is as follows:


    ```

    $ emulator -avd avd_name [ {-option [value]} ... ]

    or

    $ emulator @avd_name [ {-option [value]} ... ]

    ```


    # Run and stop an emulator, and clear data


    To use an AVD to run an Android emulator, double-click the AVD or click Launch.


    To stop the simulator from running, right-click and choose Stop, or go to Menu
    and choose Stop.


    Right-click an AVD and select Wipe Data to clear the data from the emulator and
    return it to the state it was in when it was first defined.


    Alternatively, pick Wipe Data from the menu.'
  - '[PAGE 26]


    # # Install Android


    Android programs can be written in java, c++, c#, and other languages. Android''s
    official supported language is Java. This site''s android examples were created
    with the Java programming language and the Eclipse IDE.


    Here, we''ll go over the tools that you''ll need to build Android apps with the
    Eclipse IDE.


    Android can be installed in two ways.


    +   1. By ADT Bundle

    2. By Setup Eclipse Manually


    # # By Android Studio


    It is the most straightforward method of installing the required applications
    for an Android application. It contains the following items:


    +   - Eclipse IDE

    - Android SDK

    - Eclipse Plugin


    You don''t need eclipse IDE, android SDK, or eclipse Plugin if you download Android
    Studio from the Android website because they''re already included.'
  - '[PAGE 27]


    If you''ve downloaded Android Studio, unzip it, open Eclipse IDE, and click on
    the eclipse icon to launch it. You don''t need to take any additional steps in
    this situation.'
  - '[PAGE 28]


    # Setup Android for Eclipse IDE


    On this tab, you''ll find out what program you''ll need to run an Android application
    on the Eclipse IDE.


    You will learn how to install the Android SDK and ADT plugin for the Eclipse IDE
    here.


    Let''s look at the list of apps needed to manually configure Android for Eclipse
    IDE.


    +   1. Install the JDK

    2. Download and install the Eclipse for developing android application

    3. Download and Install the android SDK

    4. Intall the ADT plugin for eclipse

    5. Configure the ADT plugin

    6. Create the AVD

    7. Create the hello android application


    # 1) Install the Java Development Kit (JDK)


    If you''re making an Android app with the Java programming language, you''ll need
    to install JDK. JDK is available for free.


    # 2) Download and install the Eclipse IDE'
- md: "You must install Eclipse in order to create an Android application using the\
    \ Eclipse IDE. You can get it from here: Eclipse Download. Although the classic\
    \ Eclipse version is recommended, we use the Eclipse IDE for JavaEE Developers.\n\
    \n## 3) Download and install the Android SDK\n\nFirst and foremost, get the Android\
    \ SDK. We've installed the Android SDK for Windows in this example (.exe version).\n\
    After that, double-click the exe file to install it.\n\n## 4) Download the ADT\
    \ plugin for Eclipse\n\nIn order to build an Android application in the Eclipse\
    \ IDE, you'll need ADT (Android Development Tools). It's an Eclipse IDE plugin\
    \ that's designed to provide an optimized setting.\nYou must complete the following\
    \ steps in order to receive the ADT:\n\n- 1) Launch the Eclipse IDE and go to\
    \ Help > Install new applications...\n- 2) Type https://dl-ssl.google.com/android/eclipse/\
    \ in the work with combo box.\n- 3) Pick the Developer Tools checkbox and then\
    \ press Next.\n- 4) Click next to see a list of resources that can be downloaded.\n\
    - 5) Press the Finish button.\n- 6) Restart the Eclipse IDE once the installation\
    \ is complete.\n\n## 5) Configuring the ADT plugin\n\nAfter you've installed the\
    \ ADT plugin, you'll need to tell the Eclipse IDE where your Android SDK is located.\
    \ To do so, take these steps:\n\n- 1) Select Preferences from the Window menu.\n\
    - 2) From the left screen, pick the Android. A dialog box can appear, asking if\
    \ you want to send the statistics to Google. Go ahead and click the next button.\n\
    - 3) Locate your SDK directory by clicking the browse button, for example, my\
    \ SDK is located in C:Program FilesAndroidandroid-sdk.\n- 4) After that, click\
    \ the submit button and then OK.\n\n## 6) Create an Android Virtual Device (AVD)\n\
    \nYou must build an AVD in order to run the Android application in the Android\
    \ Emulator. The following steps were taken to create the AVD:\n\n- 1) Select AVD\
    \ Manager from the Window menu.\n- 2) To build the AVD, click the new button.\n\
    - 3) Now, in the dialog box that appears, type the AVD name, such as myavd. Now\
    \ choose the Android version you want to use, such as android2.2.\n- 4) Build\
    \ an AVD by clicking the Create AVD button.\n\n## 7) Create and run the simple\
    \ Android example\n\n### Android apps\n\nYou can learn how to make a simple hello\
    \ Android application on this page. Using the Eclipse IDE, we're making a simple\
    \ Android example. To make the simple example, follow these steps:\n\n### Hello\
    \ Android Example\n\nTo make the Hello Android application, follow the three steps.\n\
    \n#### 1) Begin making a new Android project.\n\nTo make a new Android Studio\
    \ project, follow these steps:\n\n- 1) Select Build a new Android Studio project\
    \ from the drop-down menu.\n\n2) Fill in the following details: application name,\
    \ company domain, project location, and application package name, then click Next.\n\
    \n3) Choose the application's API level and then press Next.\n\n4) Pick an activity\
    \ type (Empty Activity).\n\n5) Type in the name of the activity and press Finish.\n\
    \nAndroid Studio creates the activity class and other necessary configuration\
    \ files after you finish configuring the activity.\n\nA project for Android has\
    \ now been created. You should look at the basic program in the Android project,\
    \ which looks like this:\n\n#### 2) Write the message\n\nFile: activity_main.xml\n\
    \nThe code for the activity_main.xml file is generated automatically by Android\
    \ Studio. You are free to modify this file to meet your needs.\n\n```xml\n<?xml\
    \ version=\"1.0\" encoding=\"utf-8\" ?>\n<android.support.constraint.ConstraintLayout\
    \ xmlns:android=\n\"http://schemas.android.com/apk/res/android\"\n    xmlns:app=\"\
    http://schemas.android.com/apk/res-auto\"\n    xmlns:tools=\"http://schemas.android.com/tools\"\
    \n    android:layout_width=\"match_parent\"\n    android:layout_height=\"match_parent\"\
    \n    tools:context=\"first.javatpoint.com.welcome.MainActivity\" >\n\n    <TextView\n\
    \        android:layout_width=\"wrap_content\"\n        android:layout_height=\"\
    wrap_content\"\n        android:text=\"Hello Android!\"\n        app:layout_constraintBottom_toBottomOf=\"\
    parent\"\n        app:layout_constraintLeft_toLeftOf=\"parent\"\n        app:layout_constraintRight_toRightOf=\"\
    parent\"\n        app:layout_constraintTop_toTopOf=\"parent\" />\n</android.support.constraint.ConstraintLayout>\n\
    ```\n\nFile: MainActivity.java\n\n```java\npackage first.javalearn.com.welcome;\n\
    \nimport android.support.v7.app.AppCompatActivity;\nimport android.os.Bundle;\n\
    \npublic class MainActivity extends AppCompatActivity {\n    @Override\n    protected\
    \ void onCreate(Bundle savedInstanceState) {\n        super.onCreate(savedInstanceState);\n\
    \        setContentView(R.layout.activity_main);\n    }\n}\n```\n\n#### 3) Run\
    \ Android application\n\nTo start the Android app, press Shift + F10 or click\
    \ the run icon on the toolbar.\n\nIt's possible that the Android emulator would\
    \ take 2 or 3 minutes to start up.\nThe Android Studio downloads the program and\
    \ starts the operation after booting the emulator. You'll see something similar\
    \ to this:\n\n## Internal Details of Hello Android Example\n\nHere, we'll look\
    \ at the internals of the hello Android example and how it functions.\nDifferent\
    \ components of an Android application include java source code, string tools,\
    \ images, manifest files, and apk files, among others. Let's look at the layout\
    \ of an Android application project.\n\n### Java Source Code\n\nLet's look at\
    \ the Java source file that the Eclipse IDE generated:\nFile: MainActivity.java\n\
    \n```java\npackage com.example.helloandroid;\nimport android.os.Bundle;\nimport\
    \ android.app.Activity;\nimport android.view.Menu;\nimport android.widget.TextView;\n\
    public class MainActivity extends Activity { //(1)\n    @Override\n    protected\
    \ void onCreate(Bundle savedInstanceState) { //(2)\n        super.onCreate(savedInstanceState);\n\
    \n        setContentView(R.layout.activity_main); //(3)\n    }\n}\n```\n\n```java\n\
    @Override\npublic boolean onCreateOptionsMenu(Menu menu) { //(4)\n\n// Inflate\
    \ the menu; this adds items to the action bar if it is present.\n    getMenuInflater().inflate(R.menu.activity_main,\
    \ menu);\n    return true;\n}\n}\n```\n\n(1) Activity is a Java class that creates\
    \ a default window on the screen where we can position various components including\
    \ Button, EditText, TextView, Spinner, and so on. It's identical to the Java AWT\
    \ Frame.\n\nIt includes life cycle approaches for activities like onCreate, onStop,\
    \ and OnResume, among others.\n\n(2) When the Activity class is first generated,\
    \ the onCreate method is named.\n\n(3) The setContentView(R.layout.activity_main)\
    \ function returns data about our layout resource. In the activity_main.xml format,\
    \ we describe our layout resources.\n\nFile: activity_main.xml\n\n```xml\n<RelativeLayout\
    \ xmlns:androclass =\n\"http://schemas.android.com/apk/res/android\"\n    xmlns:tools\
    \ = \"http://schemas.android.com/tools\"\n    android:layout_width = \"match_parent\"\
    \n    android:layout_height = \"match_parent\"\n    tools:context = \".MainActivity\"\
    \ >\n    <TextView\n        android:layout_width = \"wrap_content\"\n        android:layout_height\
    \ = \"wrap_content\"\n        android:layout_centerHorizontal = \"true\"\n   \
    \     android:layout_centerVertical = \"true\"\n        android:text = \"@string/hello_world\"\
    \ />\n</RelativeLayout>\n```\n\nAs you can see, the framework automatically creates\
    \ a textview. The message for this string, on the other hand, is defined in the\
    \ strings.xml file. @string/hello_world is a string that contains information\
    \ about the textview post. In the strings.xml format, the value of the attribute\
    \ hello world is specified.\n\nFile: strings.xml\n\n```xml\n<?xml version = \"\
    1.0\" encoding = \"utf-8\" ?>\n<resources>\n    <string name = \"app_name\"> helloandroid\
    \ </string>\n    <string name = \"hello_world\"> Hello world! </string>\n    <string\
    \ name = \"menu_settings\"> Settings </string>\n</resources>\n```"
  mdcn: "你必须安装 Eclipse 才能使用 Eclipse IDE 创建 Android 应用程序。你可以从这里获取：Eclipse 下载。虽然推荐使用经典版\
    \ Eclipse，但我们使用的是面向 JavaEE 开发者的 Eclipse IDE。\n\n## 3) 下载并安装 Android SDK\n\n首先，获取\
    \ Android SDK。在本例中，我们安装了 Windows 版的 Android SDK（.exe 版本）。\n之后，双击 exe 文件进行安装。\n\
    \n## 4) 下载 Eclipse 的 ADT 插件\n\n为了在 Eclipse IDE 中构建 Android 应用程序，你需要 ADT（Android\
    \ 开发工具）。它是一个旨在提供优化设置的 Eclipse IDE 插件。\n你必须完成以下步骤才能获取 ADT：\n\n- 1) 启动 Eclipse IDE\
    \ 并转到帮助 > 安装新应用程序...\n- 2) 在“工作于”组合框中输入 `https://dl-ssl.google.com/android/eclipse/`。\n\
    - 3) 选择开发者工具复选框，然后按下一步。\n- 4) 单击下一步以查看可下载的资源列表。\n- 5) 按完成按钮。\n- 6) 安装完成后重启 Eclipse\
    \ IDE。\n\n## 5) 配置 ADT 插件\n\n安装 ADT 插件后，你需要告诉 Eclipse IDE 你的 Android SDK 位于何处。为此，请执行以下步骤：\n\
    \n- 1) 从窗口菜单中选择首选项。\n- 2) 从左侧屏幕中，选择 Android。可能会出现一个对话框，询问你是否要将统计数据发送给 Google。请继续并单击下一步按钮。\n\
    - 3) 通过单击浏览按钮定位你的 SDK 目录，例如，我的 SDK 位于 `C:Program FilesAndroidandroid-sdk`。\n-\
    \ 4) 之后，单击提交按钮，然后单击确定。\n\n## 6) 创建 Android 虚拟设备 (AVD)\n\n你必须构建一个 AVD 才能在 Android\
    \ 模拟器中运行 Android 应用程序。创建 AVD 的步骤如下：\n\n- 1) 从窗口菜单中选择 AVD 管理器。\n- 2) 要构建 AVD，请单击新建按钮。\n\
    - 3) 现在，在出现的对话框中，输入 AVD 名称，例如 `myavd`。现在选择你要使用的 Android 版本，例如 `android2.2`。\n\
    - 4) 单击创建 AVD 按钮来构建 AVD。\n\n## 7) 创建并运行简单的 Android 示例\n\n### Android 应用程序\n\n\
    你可以在此页面上学习如何制作一个简单的 hello Android 应用程序。我们正在使用 Eclipse IDE 制作一个简单的 Android 示例。要制作这个简单的示例，请遵循以下步骤：\n\
    \n### Hello Android 示例\n\n要制作 Hello Android 应用程序，请遵循以下三个步骤。\n\n#### 1) 开始创建一个新的\
    \ Android 项目。\n\n要创建一个新的 Android Studio 项目，请遵循以下步骤：\n\n- 1) 从下拉菜单中选择构建新的 Android\
    \ Studio 项目。\n\n2) 填写以下详细信息：应用程序名称、公司域名、项目位置和应用程序包名称，然后单击下一步。\n\n3) 选择应用程序的 API\
    \ 级别，然后按下一步。\n\n4) 选择一个活动类型（空活动）。\n\n5) 输入活动的名称并按完成。\n\n完成活动配置后，Android Studio\
    \ 会创建活动类和其他必要的配置文件。\n\n现在已创建一个 Android 项目。你应该查看 Android 项目中的基本程序，它看起来像这样：\n\n\
    #### 2) 编写消息\n\n文件：`activity_main.xml`\n\n`activity_main.xml` 文件的代码由 Android Studio\
    \ 自动生成。你可以自由修改此文件以满足你的需求。\n\n```xml\n<?xml version=\"1.0\" encoding=\"utf-8\"\
    \ ?>\n<android.support.constraint.ConstraintLayout xmlns:android=\n\"http://schemas.android.com/apk/res/android\"\
    \n    xmlns:app=\"http://schemas.android.com/apk/res-auto\"\n    xmlns:tools=\"\
    http://schemas.android.com/tools\"\n    android:layout_width=\"match_parent\"\n\
    \    android:layout_height=\"match_parent\"\n    tools:context=\"first.javatpoint.com.welcome.MainActivity\"\
    \ >\n\n    <TextView\n        android:layout_width=\"wrap_content\"\n        android:layout_height=\"\
    wrap_content\"\n        android:text=\"Hello Android!\"\n        app:layout_constraintBottom_toBottomOf=\"\
    parent\"\n        app:layout_constraintLeft_toLeftOf=\"parent\"\n        app:layout_constraintRight_toRightOf=\"\
    parent\"\n        app:layout_constraintTop_toTopOf=\"parent\" />\n</android.support.constraint.ConstraintLayout>\n\
    ```\n\n文件：`MainActivity.java`\n\n```java\npackage first.javalearn.com.welcome;\n\
    \nimport android.support.v7.app.AppCompatActivity;\nimport android.os.Bundle;\n\
    \npublic class MainActivity extends AppCompatActivity {\n    @Override\n    protected\
    \ void onCreate(Bundle savedInstanceState) {\n        super.onCreate(savedInstanceState);\n\
    \        setContentView(R.layout.activity_main);\n    }\n}\n```\n\n#### 3) 运行\
    \ Android 应用程序\n\n要启动 Android 应用，请按 `Shift + F10` 或单击工具栏上的运行图标。\n\nAndroid 模拟器可能需要\
    \ 2 或 3 分钟才能启动。\n启动模拟器后，Android Studio 会下载程序并开始运行。你将看到类似这样的内容：\n\n## Hello Android\
    \ 示例的内部细节\n\n在这里，我们将探讨 hello Android 示例的内部结构及其工作原理。\nAndroid 应用程序的不同组件包括 Java\
    \ 源代码、字符串工具、图像、清单文件和 apk 文件等。让我们看看 Android 应用程序项目的布局。\n\n### Java 源代码\n\n让我们看看\
    \ Eclipse IDE 生成的 Java 源文件：\n文件：`MainActivity.java`\n\n```java\npackage com.example.helloandroid;\n\
    import android.os.Bundle;\nimport android.app.Activity;\nimport android.view.Menu;\n\
    import android.widget.TextView;\npublic class MainActivity extends Activity {\
    \ //(1)\n    @Override\n    protected void onCreate(Bundle savedInstanceState)\
    \ { //(2)\n        super.onCreate(savedInstanceState);\n\n        setContentView(R.layout.activity_main);\
    \ //(3)\n    }\n}\n```\n\n```java\n@Override\npublic boolean onCreateOptionsMenu(Menu\
    \ menu) { //(4)\n\n// Inflate the menu; this adds items to the action bar if it\
    \ is present.\n    getMenuInflater().inflate(R.menu.activity_main, menu);\n  \
    \  return true;\n}\n}\n```\n\n(1) Activity 是一个 Java 类，它在屏幕上创建一个默认窗口，我们可以在其中放置各种组件，包括\
    \ Button、EditText、TextView、Spinner 等。它与 Java AWT Frame 类似。\n\n它包含活动的生命周期方法，如 `onCreate`、`onStop`\
    \ 和 `OnResume` 等。\n\n(2) 当 Activity 类首次生成时，`onCreate` 方法被调用。\n\n(3) `setContentView(R.layout.activity_main)`\
    \ 函数返回关于我们布局资源的数据。在 `activity_main.xml` 格式中，我们描述我们的布局资源。\n\n文件：`activity_main.xml`\n\
    \n```xml\n<RelativeLayout xmlns:androclass =\n\"http://schemas.android.com/apk/res/android\"\
    \n    xmlns:tools = \"http://schemas.android.com/tools\"\n    android:layout_width\
    \ = \"match_parent\"\n    android:layout_height = \"match_parent\"\n    tools:context\
    \ = \".MainActivity\" >\n    <TextView\n        android:layout_width = \"wrap_content\"\
    \n        android:layout_height = \"wrap_content\"\n        android:layout_centerHorizontal\
    \ = \"true\"\n        android:layout_centerVertical = \"true\"\n        android:text\
    \ = \"@string/hello_world\" />\n</RelativeLayout>\n```\n\n如你所见，框架自动创建了一个 textview。然而，此字符串的消息是在\
    \ `strings.xml` 文件中定义的。`@string/hello_world` 是一个包含有关 textview 位置信息的字符串。在 `strings.xml`\
    \ 格式中，指定了 `hello world` 属性的值。\n\n文件：`strings.xml`\n\n```xml\n<?xml version = \"\
    1.0\" encoding = \"utf-8\" ?>\n<resources>\n    <string name = \"app_name\"> helloandroid\
    \ </string>\n    <string name = \"hello_world\"> Hello world! </string>\n    <string\
    \ name = \"menu_settings\"> Settings </string>\n</resources>\n```"
