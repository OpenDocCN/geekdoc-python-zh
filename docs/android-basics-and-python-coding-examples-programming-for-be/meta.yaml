  md: '# # Install Android


    Android programs can be written in java, c++, c#, and other languages. Android''s
    official supported language is Java. This site''s android examples were created
    with the Java programming language and the Eclipse IDE.


    Here, we''ll go over the tools that you''ll need to build Android apps with the
    Eclipse IDE.


    Android can be installed in two ways.


    +   1. By ADT Bundle

    2. By Setup Eclipse Manually


    # # By Android Studio


    It is the most straightforward method of installing the required applications
    for an Android application. It contains the following items:


    +   - Eclipse IDE

    - Android SDK

    - Eclipse Plugin


    You don''t need eclipse IDE, android SDK, or eclipse Plugin if you download Android
    Studio from the Android website because they''re already included.'
