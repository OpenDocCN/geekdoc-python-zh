    +   - Travel and Local etc.'
  - '[PAGE 9]


    # History of Android


    It''s fascinating to learn about Android''s past and different models. Aestro,
    Blender, Cupcake, Donut, Eclair, Froyo, Gingerbread, Honeycomb, Ice Cream Sandwitch,
    Jelly Bean, KitKat, and Lollipop are some of the latest Android code names. Let''s
    take a look at the past of Android in order.


    +   1) In October of 2003, Andy Rubin founded Android Incorporation in Palo Alto,
    California, United States.

    2) Google purchased android Incorporation on August 17, 2005. Since then, it has
    been a Google Integration affiliate.

    3) Andy Rubin, Rich Miner, Chris White, and Nick Sears are the main employees
    of Android Incorporation.

    4) Initially designed for cameras, but later moved to smart phones due to the
    low demand for cameras alone.

    5) Andy Rubin''s colleagues call him "Android" because of his fascination with
    robots.

    6) In 2007, Google announced the development of the Android operating system.

    7) HTC released the first Android phone in 2008.


