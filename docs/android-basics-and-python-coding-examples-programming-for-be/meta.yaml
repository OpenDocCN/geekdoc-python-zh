    ```\n\n## AndroidManifest.xml 文件的元素\n\n上面提到的 xml 文件中的元素如下所列。\n\n### manifest\n\
    \nAndroidManifest.xml 文件的根部分是 manifest。它有一个 package 属性，定义了 activity 类的包名。\n\n\
    ### <application>\n\nmanifest 的子元素是 operation。它还包含一个命名空间的声明。此元素有许多子元素，用于声明应用程序组件，如\
    \ operation 等。\n\n图标、标记和主题是此元素最常用的属性之一。\n\n所有 Android 设备组件的图标由 `android:icon`\
    \ 定义。\n\n所有设备组件都使用 `android:label` 作为默认标签。\n\n所有 Android activity 的通用主题由 `android:theme`\
    \ 表示。\n\n## Android R.java 文件\n\nAndroid R.java 是一个由 aapt（Android 资源打包工具）生成的文件，包含\
    \ `res/` 目录中所有资源的资源 ID。\n\n如果你在 activity main.xml 文件中创建一个组件，该文件中也会生成该组件的 id。此\
    \ id 可用于在 activity 源文件中对组件执行任何操作。\n\n注意：如果你删除 R.jar 文件，Android 会为你创建它。\n\n让我们看看\
    \ Android 的 R.java 文件。它有几个静态嵌套类，包括 menu、id、layout、attr、drawable、string 等。\n\n\
    ```\n/* AUTO-GENERATED FILE. DO NOT MODIFY.\n *\n * This class was automatically\
    \ generated by the\n * aapt tool from the resource data it found.  It\n * should\
    \ not be modified by hand.\n */\n\npackage com.example.helloandroid;\n\npublic\
    \ final class R {\n    public static final class attr {\n    }\n    public static\
    \ final class drawable {\n        public static final int ic_launcher= 0x7f020000\
    \ ;\n    }\n    public static final class id {\n        public static final int\
    \ menu_settings= 0x7f070000 ;\n    }\n    public static final class layout {\n\
    \        public static final int activity_main= 0x7f030000 ;\n    }\n    public\
    \ static final class menu {\n        public static final int activity_main= 0x7f060000\
    \ ;\n    }\n    public static final class string {\n        public static final\
    \ int app_name= 0x7f040000 ;\n        public static final int hello_world= 0x7f040001\
    \ ;\n        public static final int menu_settings= 0x7f040002 ;\n    }\n    public\
    \ static final class style {\n        /**\n        Base application theme, dependent\
    \ on API level. This theme is replaced\n        by AppBaseTheme from res/values-vXX/styles.xml\
    \ on newer devices.\n\n        Theme customizations available in newer API levels\
    \ can go in\n        res/values-vXX/styles.xml, while customizations related to\n\
    \        backward-compatibility can go here.\n        */\n        public static\
    \ final int AppBaseTheme= 0x7f050000 ;\n        /** Application theme.\n     \
    \   All customizations that are NOT specific to a particular API-level can go\
    \ here.\n        */\n        public static final int AppTheme= 0x7f050001 ;\n\
    \    }\n}\n```\n\n适用于 API 11+ 的基础应用程序主题。此主题完全替换了 API 11+ 设备上 `res/values/styles.xml`\
    \ 中的 AppBaseTheme。\n\nAPI 11 主题自定义可以放在这里。\n\n适用于 API 14+ 的基础应用程序主题。此主题完全替换了 API\
    \ 14+ 设备上 `res/values/styles.xml` 和 `res/values-v11/styles.xml` 中的 AppBaseTheme。\n\
    \nAPI 14 主题自定义可以放在这里。\n\n## Android 屏幕方向示例\n\nactivity 特性有一个 `screenOrientation`\
    \ 属性。\nAndroid 操作可以是竖屏、横屏、传感器或未指定的方向。\n它必须在 AndroidManifest.xml 格式中定义。\n\n###\
    \ 语法：\n\n```\n<activity android:name = \"package_name.Your_ActivityName\"\n  \
    \  android:screenOrientation = \"orientation_type\" >\n</activity>\n```\n\n###\
    \ 示例：\n\n```\n<activity android:name =\n\" example.javatpoint.com.screenorientation.MainActivity\"\
    \n    android:screenOrientation = \"portrait\" >\n</activity>\n```\n\n```\n<activity\
    \ android:name = \".SecondActivity\"\n    android:screenOrientation = \"landscape\"\
    \ >\n</activity>\n```"
