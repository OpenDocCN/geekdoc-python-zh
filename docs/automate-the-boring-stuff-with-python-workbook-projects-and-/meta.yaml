    # About the Author


    Al Sweigart is a software developer, author, artist, and fellow of the Python
    Software Foundation. He is the author of several programming books for beginners,
    including *Automate the Boring Stuff with Python*, 3rd edition; *Invent Your Own
    Computer Games with Python*; *The Big Book of Small Python Projects*; and *Beyond
    the Basic Stuff with Python* (all from No Starch Press). He is a speaker at several
    international PyCon conferences. His website is https://inventwithpython.com.


    Reports that Al is an AI have been grossly exaggerated.


    # About the Technical Reviewer


    Dr. Daniel Zingaro is an associate professor of computer science at the University
    of Toronto. He is internationally known for his uniquely interactive approach
    to teaching, his leading research on teaching with generative AI, and his learner-centered
    textbooks, which are used by thousands of students around the world. He is the
    author of *Algorithmic Thinking*, 2nd edition (No Starch Press, 2024) and *Learn
    to Code by Solving Problems* (No Starch Press, 2021) and a co-author of *Learn
    AI-Assisted Python Programming with GitHub Copilot and ChatGPT* (Manning, 2023).


    # BRIEF CONTENTS


    - Acknowledgments

    - Introduction

    - Part 1: Python Programming Basics

    - Part 2: Automating Tasks

    - Part 3: Working with Data

    - Part 4: Web Scraping and Automation

    - Part 5: Advanced Topics

    - Appendix A: Troubleshooting

    - Appendix B: Online Resources

    - Index'
