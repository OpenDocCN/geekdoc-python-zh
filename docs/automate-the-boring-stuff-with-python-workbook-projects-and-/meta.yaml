    \ to tell the user to enter the width, then call input() to accept the width.\n\
    - Store the width returned from input() in a variable.\n- The input() function\
    \ returns strings, but we want an integer form of the user input, so pass the\
    \ variable to the int() function and store what int() returns in a variable.\n\
    - Use string replication to create a string of O letters of the desired width.\
    \ (If a variable named width has 8 in it, then O * width will evaluate to 00000000.)\n\
    - Call print() five times to produce five rows of the string replication letters.\n\
    \nSave this program in a file named rectPrint.py.\n\n### Perimeter and Area Calculator\n\
    \nWrite a program that accepts the width and length of a rectangular space from\
