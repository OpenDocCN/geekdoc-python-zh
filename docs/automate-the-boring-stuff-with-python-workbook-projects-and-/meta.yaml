    ## RECOGNIZING TEXT IN IMAGES


    While the Pillow package in the previous chapter can easily create images with
    text, extracting text from images is an advanced topic in computer science. Fortunately,
    the PyTesseract package handles the details of machine learning and image processing
    for you. With a small amount of preparation, your programs can convert screenshots
    and scanned documents into text strings using just a few lines of code.


    ![](img/11f9f70403175f96d058cd4bde194c77_176_0.png)


    ### LEARNING OBJECTIVES


    - Install the Tesseract OCR engine and the PyTesseract package so that your Python
    scripts can use it.

    - Know the limitations of OCR and the Tesseract engine.

    - Enhance your OCR scan with pre-process and post-process techniques.

    - Perform OCR in languages other than English.

    - Produce PDFs with embedded text from the Tesseract-powered NAPS2 application.


    # Practice Questions


    These questions test your knowledge of PyTesseract and the NAPS2 scanner application.


    # Installing Tesseract and PyTesseract


    To work with PyTesseract, you must install the free Tesseract optical character
    recognition (OCR) engine software on your Windows, macOS, or Linux computer. You
    can also choose to install language packs for non-English languages. Then, you
    must install the PyTesseract package so that your Python scripts can interact
    with Tesseract.


    1. What is the difference between Tesseract and PyTesseract?

    2. Can your Python scripts do OCR with just PyTesseract installed, and not Tesseract?

    3. What do the eng.traineddata and jpn.traineddata files contain?

    4. Is Tesseract installed in the same way on Windows, macOS, and Linux?


    # OCR Fundamentals


    Using PyTesseract and the Pillow image library, you can extract text from an image
    in four lines of code. OCR has limitations, however, and you need to understand
    what kinds of images are suitable for it.


    5. Does PyTesseract require Pillow to be installed?

    6. What PyTesseract function takes an Image object argument and returns a string
    of the text in that image?

    7. Can PyTesseract identify fonts, font sizes, and font colors?

    8. Can PyTesseract extract text from a scanned document of typed text?

    9. Can PyTesseract extract text from a scanned document of handwritten text?

    10. Can PyTesseract extract the text of a license plate from a photo of a car?

    11. In general, will PyTesseract preserve the layout of the source text, such
    as hyphenated words broken across lines?

    12. In general, how reliable are LLMs at cleaning up the extracted text from PyTesseract?

    13. Can you usually use the spellchecker to identify incorrectly extracted words
    from PyTesseract?

    14. What about to identify incorrectly extracted numbers?


    # Recognizing Text in Non-English Languages


    Tesseract can extract text in languages other than English if you install additional
    language packs, then specify the language PyTesseract should recognize.


    15. Tesseract identifies characters of what language by default?

    16. How can you view a list of all the languages that Tesseract supports?

    17. What keyword argument would you pass to make the `image_to_string()` function
    recognize Japanese characters?

    18. What happens if you don''t pass this keyword argument to `image_to_string()`
    while passing it an image of Japanese characters?

    19. What keyword argument would you pass to make the `image_to_string()` function
    recognize English and Japanese characters in the same document?


    # The NAPS2 Scanner Application


    A common use case for OCR is creating PDF documents of scanned images with searchable
    text. Although there are apps to do this, they often don''t offer the flexibility
    needed to automate PDF generation for hundreds or thousands of images. For tasks
    like these, you can use the open source Not Another PDF Scanner 2 (NAPS2) application,
    which runs Tesseract and adds text to PDF documents.


    20. How much does the NAPS2 app cost?

    21. Which operating systems is the NAPS2 app available on?

    22. What Python module allows you to run NAPS2 from your Python program?

    23. What does the command line flag `-i` followed by `frankenstein.png` mean to
    the NAPS2 app?

    24. What does the command line flag `-o` followed by `output.pdf` mean to the
    NAPS2 app?

    25. If you already have the English language pack installed, what does the command
    line flag `--install` followed by `ocr-eng` do?

    26. What command line flags would you pass to install the Japanese language pack
    for NAPS2?

    27. What does the command line flag `-n` followed by `0` mean to the NAPS2 app?

    28. What does the command line flag `-i` followed by `page1.png;page2.png` mean
    to the NAPS2 app?


    # Practice Projects


    In the following projects, you’ll extract text from a collection of comics in
    order to search images, and automate resizing images.


    # Searchable Web Comics


    I like to download the images of various web comics and memes I find online. I
    have a large collection of these—so large that I have trouble finding specific
    ones. I can’t do a text search for the contents of images, but I could use PyTesseract
    to extract the text from the images, then search that text. It won’t be perfect,
    but it should work most of the time.


    Create a program that runs PyTesseract on every .png image in the current working
    directory and creates a dictionary that maps the image filename to its extracted
    text. You can store this dictionary as JSON in a file named imageText.json so
    that you need to run the extraction program only once. Then, you can open the
    JSON file in any editor and CTRL-F for the text you are looking for.


    You can download a selection of images to use from this book’s downloadable contents
    at https://nostarch.com/automate-workbook.


    Save this program in a file named makeImageTextJSON.py.


    # Enhancing Text in Web Comics


    Let’s extend the program from the previous practice project. Web comic images
    are usually smaller and simpler than high-resolution photos. Sometimes their text
    is too small for PyTesseract to accurately recognize. One trick you can try is
    increasing the size of the web comic image using Pillow and checking if this improves
    PyTesseract’s text recognition.


    For example, when I run PyTesseract on the original image at https://xkcd.com/1968/,
    it returns the following string:


    ```

    ''fo SOMES AD NCED A UELOES SELRQURE\nEROUEE fb OMB, NGREEPARLE PRD REBELS AGRO\nee
    HUMAN CONTROL 22\n\n+ >\n\n2\nTHE PART LOTS OF PEOPLE\nSEEM To WORRY ABOUT\n\nTHE
    PART I WORRY ABOUT\n\n''

    ```


    If I first use Pillow to double the size of the image and then run PyTesseract,
    it gives me more accurate results:


    ```

    ''AI BECOMES SELF-AWARE\nAND REBELS AGAINST\nHUMAN CONTROL\n\nA\nTHE PART LOTS
    OF PEOPLE\nSEEM To WORRY ABOUT\n\nTHE PART I WORRY ABOUT\n\n''

    ```


    Many people misread my name, Al, as the term AI, but PyTesseract seems to make
    the opposite mistake in this case. Your machine may produce slightly different
    text based on the PyTesseract version used.


    Create an updated version of the program from the previous practice project that
    automatically resizes the image to twice the original width and height and then
    performs OCR on the enlarged image. Save the dictionary mapping the enlarged filenames
    to the extracted text as JSON in a file named imageTextEnlarged.json. Compare
    the accuracy of the text in this file with that of the text in imageText.json
    from the previous project.


    Save this program in a file named makeImageTextEnlargedJSON.py.


    ## 23


    ## CONTROLLING THE KEYBOARD AND MOUSE


    Whether you need to click through repetitive menus, fill out forms, or interact
    with graphical applications, PyAutoGUI enables your scripts to mimic human interactions
    with the computer. Mastering its use will help you automate almost any task you
    perform, saving you time and reducing your manual effort.


    ### LEARNING OBJECTIVES


    - Control the mouse cursor to make it click, drag, and scroll in other applications
    running on your computer.

    - Control the keyboard to send key presses to other applications, including shortcut
    hotkey combinations.

    - Know the limitations of GUI automation and how to do an emergency shutdown if
    your program gets stuck or goes out of control.

    - Use PyAutoGUI''s MouseInfo feature to help you plan where your Python script
    should move and click the mouse.'
  mdcn: '## 22


    ## 识别图像中的文本


    虽然上一章的 Pillow 包可以轻松创建带有文本的图像，但从图像中提取文本是计算机科学中的一个高级主题。幸运的是，PyTesseract 包为你处理了机器学习和图像处理的细节。只需少量的准备工作，你的程序就能用几行代码将截图和扫描文档转换为文本字符串。


    ![](img/11f9f70403175f96d058cd4bde194c77_176_0.png)


    ### 学习目标


    - 安装 Tesseract OCR 引擎和 PyTesseract 包，以便你的 Python 脚本可以使用它。

    - 了解 OCR 和 Tesseract 引擎的局限性。

    - 通过预处理和后处理技术增强你的 OCR 扫描效果。

    - 执行非英语语言的 OCR。

    - 使用由 Tesseract 驱动的 NAPS2 应用程序生成带有嵌入文本的 PDF。


    # 练习题


    这些问题测试你对 PyTesseract 和 NAPS2 扫描仪应用程序的了解。


    # 安装 Tesseract 和 PyTesseract


    要使用 PyTesseract，你必须在你的 Windows、macOS 或 Linux 计算机上安装免费的 Tesseract 光学字符识别 (OCR)
    引擎软件。你还可以选择安装非英语语言的语言包。然后，你必须安装 PyTesseract 包，以便你的 Python 脚本可以与 Tesseract 交互。


    1. Tesseract 和 PyTesseract 之间有什么区别？

    2. 仅安装 PyTesseract 而不安装 Tesseract，你的 Python 脚本能进行 OCR 吗？

    3. `eng.traineddata` 和 `jpn.traineddata` 文件包含什么内容？

    4. Tesseract 在 Windows、macOS 和 Linux 上的安装方式相同吗？


    # OCR 基础


    使用 PyTesseract 和 Pillow 图像库，你可以用四行代码从图像中提取文本。然而，OCR 有其局限性，你需要了解哪些类型的图像适合它。


    5. PyTesseract 是否需要安装 Pillow？

    6. 哪个 PyTesseract 函数接受一个 Image 对象参数并返回该图像中文本的字符串？

    7. PyTesseract 能识别字体、字号和字体颜色吗？

    8. PyTesseract 能从打印文本的扫描文档中提取文本吗？

    9. PyTesseract 能从手写文本的扫描文档中提取文本吗？

    10. PyTesseract 能从汽车照片中提取车牌文本吗？

    11. 通常，PyTesseract 会保留源文本的布局吗，例如跨行断开的连字符单词？

    12. 通常，大语言模型在清理 PyTesseract 提取的文本方面有多可靠？

    13. 你通常可以使用拼写检查器来识别 PyTesseract 错误提取的单词吗？

    14. 那么识别错误提取的数字呢？


    # 识别非英语语言的文本


    如果你安装了额外的语言包，然后指定 PyTesseract 应该识别的语言，Tesseract 可以提取英语以外的语言文本。


    15. Tesseract 默认识别哪种语言的字符？

    16. 如何查看 Tesseract 支持的所有语言列表？

    17. 你会传递哪个关键字参数来使 `image_to_string()` 函数识别日语字符？

    18. 如果你向 `image_to_string()` 传递一张日语字符的图像，但没有传递这个关键字参数，会发生什么？

    19. 你会传递哪个关键字参数来使 `image_to_string()` 函数在同一文档中识别英语和日语字符？


    # NAPS2 扫描仪应用程序


    OCR 的一个常见用例是创建带有可搜索文本的扫描图像 PDF 文档。虽然有应用程序可以做到这一点，但它们通常不提供自动化生成数百或数千张图像 PDF 所需的灵活性。对于此类任务，你可以使用开源的
    Not Another PDF Scanner 2 (NAPS2) 应用程序，它运行 Tesseract 并向 PDF 文档添加文本。


    20. NAPS2 应用程序多少钱？

    21. NAPS2 应用程序可在哪些操作系统上使用？

    22. 哪个 Python 模块允许你从 Python 程序运行 NAPS2？

    23. 命令行标志 `-i` 后跟 `frankenstein.png` 对 NAPS2 应用程序意味着什么？

