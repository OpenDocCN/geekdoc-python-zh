- md: '## Installing Python Packages with pip


    While Python''s standard library comes with modules such as sys, random, and os,
    there are also hundreds of thousands of third-party packages you can find on the
    Python Package Index (PyPI) at https://pypi.org. In Python, a *package* is a collection
    of Python code made available on PyPI, and a *module* is an individual .py file
    containing Python code. You install packages from PyPI that contain modules, and
    you import modules with an import statement.


    - 28. What program on Windows, macOS, and Linux installs third-party Python packages?

    - 29. Where are third-party Python packages downloaded from?

    - 30. What does the command `pip install automateboringstuff3` do? What is automateboringstuff3?


    ## Self-Aware Python Programs


    Several built-in variables can give your Python program useful information about
    itself, the operating system it''s on, and the Python interpreter running it.
    Answer the following questions about Python functions that hold information about
    the Python program and interpreter.


    - 31. What is in the `__file__` variable?

    - 32. What happens if you enter `__file__` into the interactive shell?

    - 33. What variable holds the filepath of the Python interpreter program?

    - 34. What is the data type of `sys.version`?

    - 35. What is the data type of `sys.version_info.major` and `sys.version_info.minor`?

    - 36. Write an if statement that checks whether the Python program is being run
    by version 3 or later of the Python interpreter.

    - 37. What does the `sys.platform` variable contain when the Python program is
    run on Windows, macOS, and Linux?

    - 38. What exception is raised if you try to import a module that isn''t installed?


    ## Text-Based Program Design


    Even when limited to text, software applications can still provide a user interface
    similar to modern GUIs. These kinds of applications are called *text-based user
    interface (TUI)* applications, and they''re simpler to develop than GUI applications.
    Answer the following questions about making programs that run in the command line
    terminal.


    - 39. Why should commands have short names when variables should have long, descriptive
    names?

    - 40. If `python3 yourScript.py download confirm` is run from the terminal, what
    does `sys.argv` contain?

    - 41. If `python3 yourScript.py download_confirm` is run from the terminal, what
    does `sys.argv` contain?

    - 42. Does the order of command line arguments matter?

    - 43. What `pyperclip` function returns the text that is currently on the clipboard?

    - 44. What `pyperclip` function puts text on the clipboard?

    - 45. What is the command to clear the terminal window of text on macOS and Linux?

    - 46. What is the command to clear the terminal window of text on Windows?

    - 47. Write the code to play the audio in a file named `hello.mp3` using the `playsound`
    module.

    - 48. What does it mean to say a function call blocks until it''s finished?

    - 49. What do the terms *quiet mode* and *verbose mode* mean for commands?


    ## Pop-Up Message Boxes with PyMsgBox


    You can add small GUI message boxes to your program with the third-party PyMsgBox
    package. PyMsgBox lets you create dialogs using Tkinter, which comes with Python
    on Windows and macOS. On Ubuntu Linux, you must first install Tkinter by running
    `sudo apt install python3-tk` in the terminal. The PyMsgBox functions follow the
    names of message box functions in JavaScript: `alert()`, `confirm()`, `prompt()`,
    and `password()`.


    - 50. Do the dialog boxes that PyMsgBox create appear in the terminal window?

    - 51. What two PyMsgBox functions allow the user to enter text into a dialog box?

    - 52. What PyMsgBox function displays a text message in a dialog box to the user?

    - 53. What PyMsgBox function presents the user with OK and Cancel buttons?

    - 54. Can you create an entire program that uses PyMsgBox functions instead of
    `print()` and `input()`?


    ## Deploying Python Programs


    You can deploy your Python program so that you can run it in as few keystrokes
    as possible. First, you''ll need to add your program''s folder to the PATH environment
    variable. Answer the following questions about setting up your Python programs.


    - 55. What operating system uses batch files?

    - 56. What does the Windows pause command do?

    - 57. What operating system uses .command files?

    - 58. What does the chmod u+x yourScript command do?

    - 59. Should the batch file, command file, or shell script you create to run your
    program automatically activate a virtual environment before running the Python
    interpreter?


    ## Compiling Python Programs with PyInstaller


    It''s possible to create executable programs from Python code with the PyInstaller
    package, which generates executable programs you can run from the command line.
    PyInstaller doesn''t compile Python programs into machine code, per se; rather,
    it creates an executable program that contains a copy of the Python interpreter
    and your script. The benefit of compiling your Python program is that you can
    share your program with others who don''t have Python installed.


    - 60. Are Python programs mostly compiled, or mostly run by interpreters?

    - 61. What is the benefit of compiling a Python program?

    - 62. What terminal command would run PyInstaller to compile a program named yourScript.py?

    - 63. PyInstaller creates two folders named build and dist when it compiles a
    program. Which folder contains the compiled program?

    - 64. Can you run PyInstaller on one operating system to produce compiled programs
    for another operating system?

    - 65. How large are the smallest compiled Python programs: several kilobytes,
    several megabytes, or several gigabytes?


    ## Practice Projects


    The following projects will give you a chance to practice designing and deploying
    programs.


    ### Guess the Number with PyMsgBox


    Create a dialog-based GUI for the Guess the Number game from Chapter 3 of *Automate
    the Boring Stuff with Python*. Copy the source code from the book (which you can
    find in the downloadable content at https://nostarch.com/automate-boring-stuff-python-3rd-edition)
    and replace the print() and input() calls with calls to pymsgbox.alert() and pymsgbox.prompt().
    When you run this program, the terminal window won''t show any text; instead,
    a series of dialog boxes will handle displaying output and accepting keyboard
    input.

    Save this program in a file named *msgBoxGuess.py*.


    ### Timer with PyMsgBox


    Create a dialog-based GUI for a simple timer program. Instead of making print()
    and input() calls, your program should call pymsgbox.alert() and pymsgbox.prompt().
    Have the program ask the user how many seconds the program should pause for. Then,
    after that amount of time has passed, display an alert message box that says,
    “Time’s up!”

    Save this program in a file named *msgBoxTimer.py*.


    ### Compiling the Timer and Guess the Number Programs


    Use the PyInstaller package to create an executable program for the *msgBoxGuess.py*
    and *msgBoxTimer.py* programs from the previous two practice projects. You should
    be able to run the resulting executables on other computers without having Python
    installed. Record the terminal command you used to instruct PyInstaller to generate
    these programs as a single file.


    # 13 WEB SCRAPING


    The internet has made computing a part of everyday life. While the web is mainly
    designed for human consumption, your programs, too, can download web pages and
    interact with websites. The Requests, Beautiful Soup, Selenium, and Playwright
    packages add these powerful features to your Python code.


    ## LEARNING OBJECTIVES


    - Know what the HTTP and HTTPS protocols do, including what encryption features
    HTTPS and VPNs provide.

    - Be able to download websites and other files with the Requests package.

    - Learn the basics of HTML and CSS and how websites are written in them.

    - Be able to parse the HTML of downloaded websites with the Beautiful Soup package.

    - Know how to control the browser using the Selenium library.

    - Understand how to control the browser using the newer Playwright library, including
    in headless mode.'
