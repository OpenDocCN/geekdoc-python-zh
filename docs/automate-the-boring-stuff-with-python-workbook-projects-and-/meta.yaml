    \ height - 1 以覆盖整个图像。确保你的旗帜条纹之间没有间隙。\n\n例如，如果你调用 `create_rainbow_flag(640, 480)`，你的代码应生成一个宽度为\
    \ 640 像素、高度为 480 像素的 Image 对象。你可以调用此 Image 对象的 `show()` 或 `save()` 方法来查看彩虹旗帜。通过使用不同的参数调用你的函数来测试它，并确保生成的图像大小正确。\n\
