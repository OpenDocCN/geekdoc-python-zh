- md: "## Practice Projects\n\nContinue working with regexes as you complete these\
    \ short projects.\n\n## Hashtag-Finding Regex\n\nCreate a regex that can find\
    \ social media hashtags. For the purposes of this project, a “hashtag” pattern\
    \ begins with a # character followed by one or more alphanumeric characters (letters,\
    \ numbers, or underscores). Write a function named get_hashtags(sentence) that\
    \ takes a string argument and returns a list of the hashtags. For example, get_hashtags('Remember\
    \ to #vote on #electionday.') should return ['#vote', '#electionday'].\n\nFinish\
    \ the program by asking the user to enter a sentence and then print the hashtags.\
    \ For example, the running program could look like this:\n\n```\nEnter a sentence:\n\
    Remember to #vote on #electionday.\n#vote\n#electionday\n```\n\nSave this function\
    \ as a program named hashtagRegex.py.\n\n## Price-Finding Regex\n\nMany websites\
    \ go to great lengths to describe how great their product is without ever telling\
    \ you the price. I often find myself pressing CTRL-F to search for “$” to get\
    \ this information. Let’s write a program that immediately finds prices in text\
    \ using regular expressions.\n\nCreate a function named get_price(sentence) that\
    \ takes a string argument and returns the prices in it. For this project, a price\
    \ is the dollar sign '$' followed by one or more digits, optionally followed by\
    \ a period and two more digits. For example, get_price('It was $5.99 but is now\
    \ on sale for $5.95!!') would return ['$5.99', '$5.95'].\n\nSave this function\
    \ as a program named priceRegex.py.\n\n## Creating a CSV File of PyCon Speakers\n\
    \nMany countries and regions have conferences on Python, called PyCons. The https://pyvideo.org\
    \ website hosts a collection of recorded talks from various PyCon conferences.\
    \ Who has given the most PyCon talks? What is the median number of PyCon talks\
    \ that speakers give? There are several statistics you could gather, but first\
    \ you need to organize this information into some sort of data structure.\n\n\
    If you select all of the text from https://pyvideo.org/speakers.html and paste\
    \ it into a text editor, you’ll find a series of speakers followed by the number\
    \ of talks they’ve given:\n\n```\nA Bessas 1\nA Bingham 1\nA Cuni 3\nA Garassino\
    \ 1\nA Jesse Jiryu Davis 13\nA Kanterakis 1\n--snip--\n```\n\nYou can use this\
    \ example text for the project if, for some reason, you can't retrieve the web\
    \ page. Place the text into a single multiline string by enclosing it with triple\
    \ quotes. Then, call the splitlines() method and store the returned list of strings\
    \ in a variable named speakers:\n\n```\nspeakers = \"\"\"\n    A Bessas 1\n  \
    \  A Bingham 1\n    A Cuni 3\n--snip--\n    Žygimantas Medelis 1\"\"\".splitlines()\n\
    ```\n\nTo put this information into a spreadsheet, you could try formatting it\
    \ as comma-separated values (CSV), discussed in Chapter 18 of *Automate the Boring\
    \ Stuff with Python*.\nTo do so, you need to write a regex to pass to the re.sub()\
    \ function. Each speaker line consists of four spaces (which we want to remove),\
    \ followed by the speaker name, then a space (which we want to replace with a\
    \ comma) and one or more digits at the end of the line. Write the code that changes\
    \ the string in speakers to this:\n\n```\nA Bessas,1\nA Bingham,1\nA Cuni,3\n\
    A Garassino,1\nA Jesse Jiryu Davis,13\nA Kanterakis,1\n--snip--\n```\n\nThe speaker\
    \ names have different widths, and some include non-English characters. To accommodate\
    \ this, your regex will need to capture the speaker name in a group with (.*),\
    \ then store it in the \\1 back reference. The number of talks the speaker has\
    \ given can be a varying number of digits but always comes at the end of the line.\
    \ So, you can use the $ regex character to match it.\nOnce you've put the entire\
    \ string in CSV format, you can place the text in a text file and save it as *speakers.csv*.\
    \ Excel, Google Sheets, and other spreadsheet applications can then structure\
    \ the speaker name and number of talks into separate columns to make further sorting\
    \ and processing easier. Note that some of the speaker names have commas in them,\
    \ which will make some rows in the CSV file contain more than two columns. This\
    \ is fine for our purposes.\nSave this program in a file named *pyconSpeakers.py*.\
    \ When you run the program, the *speakers.csv* file it creates should have a column\
    \ of speakers and how many talks they've given.\n\n## Laugh Score\n\nWe can scientifically\
    \ measure how funny a joke is based on the length of the text-based laughing response.\
    \ For example, a joke that elicits the response \"Hahaha\" is objectively funnier\
    \ than a joke that gets only a \"Haha\" response. A joke that provokes a \"HAHAaaHAhhAHAHA\"\
    \ response is a very funny joke. (On a personal note, I've never understood humor,\
    \ and no one has ever said I am funny, but that doesn't matter now that I have\
    \ software to understand humor for me.)\n\nLet's write a function called laugh_score(laugh)\
    \ that uses a regular expression to identify and measure the length of laughing\
    \ specified by the laugh string argument. A text-based laugh is defined as beginning\
    \ with ha, then consisting of any number of consecutive h or a characters. Both\
    \ lower-case and uppercase characters are acceptable. If there are multiple laughs\
    \ in a string, count only the first one.\nTo write the function, you can complete\
    \ the following template:\n\n```\nimport re\n\ndef laugh_score(laugh):\n    #\
    \ YOUR CODE GOES HERE\n\nassert laugh_score('abcdefg') == 0\nassert laugh_score('h')\
    \ == 0\nassert laugh_score('ha') == 2\nassert laugh_score('HA') == 2\nassert laugh_score('hahaha')\
    \ == 6\nassert laugh_score('ha ha ha') == 2\nassert laugh_score('haaaaa') == 6\n\
    assert laugh_score('ahaha') == 4\nassert laugh_score('Harry said Hahaha') == 2\n\
    ```\n\nSave this function in a file named laughScore.py.\n\n## Word Twister—ordW\
    \ wisterT\n\nWrite a program that “twists” the words in a string. For example,\
    \ calling twist_words('Hello world! How are you? I am fine.') returns 'oHell dworl!\
    \ wHo ear uyo? I ma efin.' To do so, the sub() method for Pattern objects can\
    \ move the last letter of every word in a string to the front of the word.\nAs\
    \ arguments, the sub() method accepts a regex of the pattern to match, a string\
    \ to replace the matches with, and the string to search for matches. Your regex\
    \ should use the \\b shorthand character class for word boundaries. For example,\
    \ the regex \\b[AEIOUaeiou]\\w*\\b would match every word that begins with an\
    \ uppercase or lowercase vowel.\nThe regex should also use parentheses to put\
    \ the first letter of each word in one group and the remaining letters in a second\
    \ group. This way, the second argument can include the \\1 and \\2 back references\
    \ to reorder these two groups.\nYour code needs to be only three lines long:\n\
    \n```\nimport re\npattern = re.compile(r'THE_REGEX')\nprint(pattern.sub(r'REPLACEMENT',\
    \ 'Hello world! How are you? I am fine.'))\n```\n\nSave this program in a file\
    \ named wordTwister.py.\n\n## 10 READING AND WRITING FILES\n\nYour Python programs\
    \ can directly interact with the contents of text files. By saving and opening\
    \ files, they can store the data they work with, then continue where they left\
    \ off the next time you run them. Reading data from files on the hard drive also\
    \ lets your programs process data from other applications.\n\n### LEARNING OBJECTIVES\n\
    \n- Understand the filesystem, including how filenames and paths serve as addresses\
    \ for files.\n- Know how Python represents filepaths, both as strings and using\
    \ the pathlib module.\n- Read and write text files using Path methods and the\
    \ open() function.\n- Be able to save Python data structures using shelf files\
    \ and the shelve module.\n\n## Practice Questions\n\nThese questions test your\
    \ understanding of how computer files and file-systems work, as well as how to\
    \ read and write text data to these files.\n\n## Files and Filepaths\n\nA file\
    \ has two key properties: a filename (usually written as one word) and a path.\
    \ The path specifies the location of a file on the computer. Your computer’s filesystem\
    \ begins with a root folder that contains all other files and subfolders. Python’s\
    \ pathlib module and Path objects represent filepaths and provide several methods\
    \ for manipulating them.\n\n1. What is another term for folder?\n2. What character\
    \ separates folders and filenames on Windows?\n3. What character separates folders\
    \ and filenames on macOS and Linux?\n4. What is a root folder?\n5. What does an\
    \ absolute filepath begin with?\n6. What is a relative filepath relative to?\n\
    7. What common import statement lets your Python code use Path objects?\n\nFor\
    \ questions 8 through 10, determine what the expression evaluates to, then note\
    \ whether it’s a relative or an absolute path.\n\n8. Path('spam', 'bacon', 'eggs')\n\
    9. Path('spam') / Path('bacon') / Path('eggs')\n10. Path('spam') / 'bacon' / 'eggs'\n\
    11. Does 'spam' / 'bacon' / 'eggs' evaluate to a Path object?\n12. If the current\
    \ working directory is Path(r'C:\\spam'), what does Path('eggs.txt') refer to?\n\
    13. Which function changes the Python program’s current working directory?\n14.\
    \ If the current working directory is Path(r'C:\\spam'), what does Path(r'..\\\
