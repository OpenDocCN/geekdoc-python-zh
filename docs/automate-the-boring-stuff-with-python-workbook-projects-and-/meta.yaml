    The second piece of advice is to work on your own projects. While this is a good
    idea, it doesn’t offer guidance as to what sorts of projects one can make. Beginners
    often don’t know what’s possible, or what is beyond their capabilities. “Create
    an operating system” and “create an AI helper” sound cool but are far too complicated
    for a single individual of any skill level to tackle.


    Beginners need guide rails rather than vague advice. Here are my recommendations
    for coming up with a software project to create:


    +   - **Choose something you’re interested in** Automate a task you regularly
    perform, make a small game you like, or replicate an app you’ve seen elsewhere
    and enjoyed.

    - **Keep the scale small** Don’t try to make a commercial application with many
    features. Projects always take longer than you think, so imagine the simplest
    version of the program you want to make.

    - **Come up with several ideas** You’ll find it encouraging to write multiple
    programs and frustrating to end up with one half-finished, large program.

    - **Write a list of features your program *won’t* have** Avoid the temptation
    to tell yourself “It’d be cool if the program did this” by committing to a set
    of features you’ll leave out.

    - **Stick to the Python standard library, third-party packages, and platforms
    you already know** If you find yourself saying, “Before I start coding this, I
    need to learn X,” you should find a different project.


