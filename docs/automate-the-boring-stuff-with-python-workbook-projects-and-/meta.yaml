  - "[PAGE 26]\n\nwith no other information. It's hard as an instructor to help in\
    \ these cases; the comment isn't even a question! One way to ask thoughtful questions\
    \ is via *rubber duck debugging*: Put a rubber duck or some other inanimate object\
    \ on your desk and explain your problem to it. You can do this out loud, or write\
    \ your questions in an empty document on your computer. The key is to articulate\
    \ your thoughts with actual words. Explain to the duck the answers to the following\
    \ questions:\n\n+   - What do I want my program to do, really?\n- What does the\
    \ program seem to be doing instead?\n- Does the program partially work? If so,\
    \ where does it seem to break?\n- Is there an error message, and if so, what does\
    \ it say?\n- What other questions could I ask myself to help me figure this issue\
    \ out?\n\nProgramming is not a passive or magical activity: There are real, concrete\
    \ answers to your questions, but you'll have to reach for them yourself. Whenever\
    \ you don't understand why your program is doing something, remember that the\
    \ answer always ends up being \"The program did that because, well, technically\
    \ that's what the code I wrote does.\"\n\nAnother way to answer your questions\
    \ is to run some code in the interactive shell. By entering Python instructions\
    \ at the `>>>` prompt, you can execute a single instruction and immediately see\
    \ its result. For example, if you pass 9.9 to the `int()` function, will it return\
    \ 9 or 10? What error message will it show if you pass a blank string instead?\
    \ And if you pass a variable that contains an integer to `int()`, does it raise\
    \ an exception or work fine? You don't need to look up the Python documentation\
    \ to answer these questions; just enter the code into the interactive shell and\
    \ find out:\n\n```\n>>> int(9.9)\n9\n\n>>> int('')\nTraceback (most recent call\
    \ last):\n  File \"<stdin>\", line 1, in <module>\nValueError: invalid literal\
    \ for int() with base 10: ''\n\n>>> some_variable = 42\n>>> int(some_variable)\n\
    42\n```\n\nMany of the questions in this book can be answered in this way. If\
    \ you're wondering how some code works, the best way to find out is to execute\
    \ it yourself.\n\nAlso note that, even though error messages like `ValueError:\
    \ invalid literal for int() with base 10: ''` aren't very clear, you can copy\
    \ and paste such messages into an internet search engine to find other people\
    \ who have encountered the same error, then read their explanations on how to\
    \ fix it.\n\n# Continuing Your Programming Journey\n\nWhen experienced software\
    \ developers try to help beginners, they commonly give two bits of misguided advice.\
    \ The first is that beginners should contribute to open source projects as a way\
    \ to build experience. In reality, open source projects tend to be large, complicated\
