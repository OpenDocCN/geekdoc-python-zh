    # ## DESIGNING AND DEPLOYING COMMAND LINE PROGRAMS


    Users are accustomed to interacting with the computer through a graphical user
    interface (GUI), but experienced programmers are much more effective when working
    in a command line terminal. Once you’ve mastered the command line, you’ll know
    how to create minimal but efficient programs with simple text-based interfaces.


    ![](img/11f9f70403175f96d058cd4bde194c77_108_0.png)


