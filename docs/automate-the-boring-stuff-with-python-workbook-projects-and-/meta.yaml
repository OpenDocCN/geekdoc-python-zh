    ## 练习项目


    你现在将创建一些包含字符串和文本编辑的简短程序。


    ## 单词匹配游戏


    单词游戏 Jotto 创建于 1955 年，1980 年代的游戏节目 Lingo 后来重新利用了它的概念（你可能认出这是另一个更新的游戏）。你可以在 Python
    中制作自己的版本。


    创建一个让用户猜测五个字母单词的程序。你的代码应包含一个名为 `get_word_hint(secret_word, guess_word)` 的函数，该函数返回一个五个字符的提示字符串。提示是：对于在秘密单词中相同位置的正确字母，使用大写
    `O`；对于在秘密单词中不同位置的正确字母，使用小写 `o`；对于不在秘密单词中的字母，使用 `x`。如果猜测的单词与秘密单词相同，该函数应返回 `OOOOO`。


    例如，如果秘密单词是 `CRANE`，猜测单词是 `CANDY`，`get_word_hint(''CRANE'', ''CANDY'')` 应返回 `Oooxx`，因为
    `CANDY` 中的第一个字母与秘密单词 `CRANE` 中的第一个字母匹配。接下来的两个提示字符是 `oo`，因为 `CANDY` 中的 `A` 和 `N`
    字符存在于 `CRANE` 中，但索引不同。最后两个提示字符是 `xx`，因为 `CANDY` 中的 `D` 和 `Y` 根本没有出现在 `CRANE` 中。


    程序的其余部分应从五个字母的单词列表中随机选择一个秘密单词，然后给用户六次尝试机会来猜测它。你可以使用这个单词列表：


