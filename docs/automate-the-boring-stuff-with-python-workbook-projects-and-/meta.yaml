    # # 12


    # ## DESIGNING AND DEPLOYING COMMAND LINE PROGRAMS


    Users are accustomed to interacting with the computer through a graphical user
    interface (GUI), but experienced programmers are much more effective when working
    in a command line terminal. Once you’ve mastered the command line, you’ll know
    how to create minimal but efficient programs with simple text-based interfaces.


    ![](img/11f9f70403175f96d058cd4bde194c77_108_0.png)


    # ### LEARNING OBJECTIVES


    +   - Know how to set up your Python programs to easily run them outside the code
    editor.

    - Understand command line interfaces, including how programs present information
    as output and accept user input.

    - Become familiar and comfortable with software jargon.

    - Be able to create virtual environments for your programming projects and avoid
    package version conflicts.

    - Master the use of PyMsgBox to create dialog boxes for a lightweight GUI.

    - Know how to compile your Python programs with PyInstaller so that you can run
    them on computers that don’t have Python installed.'
