    \ but only if the table doesn't already exist.\n16. The SQLite data types `NULL`,\
    \ `INTEGER`, `REAL`, `TEXT`, and `BLOB` are analogous to Python's `NoneType`,\
    \ `int`, `float`, `str`, and `bytes` data types.\n17. SQLite's type affinity feature\
    \ will convert the `TEXT` value `'42'` to the `INTEGER` value `42`.\n18. Because\
    \ `'Hello'` cannot be converted to an `INTEGER`, SQLite inserts it as a `TEXT`\
