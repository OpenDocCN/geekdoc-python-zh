    # Practice Questions


    These questions test your understanding of the particular style of regex that
    Python uses in its re module.


    # The Syntax of Regular Expressions


    Regular expressions allow you to specify a pattern of text to search for. For
    example, the characters \d in a regex stand for a decimal numeral between 0 and
    9, and adding a numeral, such as 3, in curly brackets ({3}) after a pattern is
    like saying, “Match this pattern three times.” Further, parentheses can create
    groups in the regex string that let you grab different portions of the matched
    text.


    +   1. What is the difference between the re.compile() function and the search()
    method?

    2. How many groups are in the regex (\d{3})-(\d{3})-(\d{4})?

    3. What about in the regex (\d{3})-(\d{3}-(\d{4}))?

    4. Rewrite this regex using a raw string: \(\d{3}\)-(\d{3})-(\d{4}).

    5. List four characters that have special meaning in regex strings and must be
    escaped if you want to literally match them.

    6. Write a regex that uses the alternation syntax to match the word clutter, clue,
    or club.

    7. Which of the following strings does the regex (A|B)(A|B) match: A, B, AA, AB,
    BA, or BB?

    8. What is the main difference between the search() method and the findall() method?

    9. If findall() were called on a Pattern object of the regex r''\d{3}-\d{3}-\d{4}'',
    which could it possibly return: [''415-555-9999''] or [(''415'', ''555'', ''9999'')]?

    10. If findall() were called on a Pattern object of the regex r''(\d{3})-(\d{3})-(\d{4})'',
    which could it possibly return: [''415-555-9999''] or [(''415'', ''555'', ''9999'')]?'
