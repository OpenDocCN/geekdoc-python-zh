    # Matching at the Start and End of a String


    You can use the caret symbol (^) at the start of a regex to indicate that a match
    must occur at the beginning of the searched text. Likewise, you can put a dollar
    sign ($) at the end of the regex to indicate that the string must end with this
    regex pattern. Lastly, you can use ^ and $ together to indicate that the entire
    string must match the regex—that is, it''s not enough for a match to be made on
    some subset of the string. Python''s regex syntax also includes matching on word
    boundaries (separated by whitespace) with \b.


