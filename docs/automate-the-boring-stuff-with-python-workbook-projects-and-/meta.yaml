    \ 84 represent, both as an exponent like 2^10 and a whole number like 1,024. You\
    \ can enter an expression like 2 ** 10 into the interactive shell to calculate\
    \ 2^10.\n\n- 81. Kilobyte\n- 82. Megabyte\n- 83. Gigabyte\n- 84. Terabyte\n\n\
    - 85. Decimal 2 is 10 in binary. What is decimal 3 in binary?\n- 86. Decimal 7\
    \ is 111 in binary. What is decimal 8 in binary?\n\n## Practice Projects\n\nThe\
    \ following practice projects will illustrate the concepts you've learned so far.\n\
    \n### Rectangle Printer\n\nWrite a program that prints a rectangle of capital\
    \ O characters. For example, the following rectangle has a width of eight and\
    \ a height of five:\n\n```\n00000000\n00000000\n00000000\n00000000\n00000000\n\
    ```\n\nThe program should always print a rectangle of O characters that has a\
