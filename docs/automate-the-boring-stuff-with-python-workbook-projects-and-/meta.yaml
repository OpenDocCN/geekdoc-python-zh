- md: "## The Integer, Floating-Point, and String Data Types\n\nA data type is a category\
    \ for values, and every value belongs to exactly one data type. The integer (or\
    \ int) data type includes values that are whole numbers. Numbers with a decimal\
    \ point, such as 3.14, are called floating-point numbers (or floats). Text values\
    \ are called strings, or strs (pronounced *stirs*).\n\nLabel the data types of\
    \ the values in questions 23 through 29 as either int, float, or string. Hint:\
    \ You can pass them to the type() function in the interactive shell to find the\
    \ answers, such as type(2) or type('hello').\n\n- 23. 2\n- 24. -2\n- 25. 2.0\n\
    - 26. 'hello'\n- 27. 2.2\n- 28. '2'\n- 29. '2.2'\n\n30. What is the difference\
    \ between the values 10, 10.0, and '10'?\n\n## String Concatenation and Replication\n\
    \nWhen the + operator combines two string values, it joins the strings as the\
    \ string concatenation operator. When the * operator is used on one string value\
    \ and one integer value, it becomes the string replication operator.\n\nWhat do\
    \ the following expressions evaluate to?\n\n- 31. 'Hello' + 'Hello' + 'Hello'\n\
    - 32. 'Hello' * 3\n- 33. 3 * 'Hello'\n- 34. (2 * 2) * 'Hello'\n- 35. '13' + '12'\n\
    \nWhich of the following expressions produce errors?\n\n- 36. 'Forgot the closing\
    \ quote\n- 37. 'Hello' * 3.0\n- 38. 'Hello' + 3\n- 39. Hello + Hello + Hello\n\
    - 40. 'Alice' * 'Bob'\n- 41. 'Hello' / 5\n- 42. 'Hello' / 'Hello'\n\n## Storing\
    \ Values in Variables\n\nA variable is like a box in the computer's memory that\
    \ can store a single value. If you want to use the result of an evaluated expression\
