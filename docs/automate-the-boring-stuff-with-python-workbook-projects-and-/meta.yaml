    ## Mouse Movement Recorder


    Write a program that monitors the position of the mouse every 0.1 seconds and
    records its coordinates to a JSON file. We''ll use this data in the next practice
    project, “Mouse Movement Playback.”

    The program should run an infinite while loop that records the mouse position
    by calling `pyautogui.position()`, waits one-tenth of a second by calling `pyautogui.sleep(0.1)`,
    and then repeats. When the user presses the CTRL-C keyboard combination, Python
    will raise a `KeyboardInterrupt` exception. Your program should catch this exception,
    write the recorded mouse positions as JSON data to a file named `mousePositions.json`,
    and then exit.

    The JSON file may look something like this:


    ```

    [[1331, 1073], [1517, 944], [1619, 727], [1615, 562], [1566, 452],

    --snip--

    [1855, 948], [1855, 948], [1855, 948], [1855, 948], [1855, 948]]

    ```


    To indicate to the user that the program is working, print the text “Recording
    mouse positions. Press CTRL-C to quit.” when the program first starts. When the
    user presses CTRL-C to stop the program, print the text “Done. 473 positions recorded.”
    (or however many mouse positions the program recorded).


    ## Mouse Movement Playback


    Write a program that takes the x- and y-coordinates recorded by the “Mouse Movement
    Recorder” program from the previous exercise and moves the mouse cursor to each
    location, with a 0.1-second pause in between. Doing so effectively “plays back”
    the movements of the mouse. You could extend this functionality in your own programs
    to carry out actions the user recorded.


    The first part of the program reads the JSON data from *mousePositions.json*.
    The second part of the program calls `pyautogui.moveTo()` to move the mouse cursor
    to a given position, then calls `pyautogui.sleep(0.1)` to pause for one-tenth
    of a second.


    While this program isn’t particularly useful on its own, you could use this sort
    of record-and-playback feature as part of a more elaborate GUI automation program.


    Save this program in a file named *playbackMouseMove.py*.


