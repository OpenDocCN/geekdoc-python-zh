- md: '## Mocking Spongebob Meme


    You may have seen the “Mocking Spongebob” meme format, which renders a statement
    in alternating uppercase and lowercase letters. Write a function named `spongecase(text)`
    that takes a string argument and returns the string in this format. Apply the
    following rules:


    - Leave non-letters unmodified.

    - Make the first letter lowercase.

    - For every letter, set the next letter to the opposite case. (Non-letter characters
    don’t change the case used for the next letter.)


    The program should ask the user for a sentence and then display that sentence
    with “Mocking Spongebob” casing:


    ```

    Enter a sentence:

    Hello. It is nice to meet you.

    hElLo. It Is NiCe To MeEt YoU.

    ```


    Save this function in a file named *mockingSpongebob.py*.


    ## 9. Text Pattern Matching with Regular Expressions


    Most programming languages implement regular expressions, or *regexes*, because
    they make it easy to locate particular patterns of text. An understanding of Python’s
    regexes can prepare you for learning regexes in any programming language and in
    many word processor applications as well, so digging into this topic is a worthy
    investment.


    ### Learning Objectives


    - Master the basics of regular expression syntax in the Python programming language.

    - Know how to use qualifiers to describe what characters to match.

    - Know how to use quantifiers to describe the number of characters to match.

    - Be able to resolve the ambiguity between greedy and non-greedy matching using
    the question mark (?) syntax.

    - Understand how to pass flags such as `re.IGNORECASE` to the `re.compile()` function
    to do case-insensitive matching.

    - Be able to use verbose mode to write larger regexes across multiple lines.

    - Know how to write human-readable regular expressions using the Humre module.


    ### Practice Questions


    These questions test your understanding of the particular style of regex that
    Python uses in its `re` module.


    ### The Syntax of Regular Expressions


    Regular expressions allow you to specify a pattern of text to search for. For
    example, the characters `\d` in a regex stand for a decimal numeral between 0
    and 9, and adding a numeral, such as 3, in curly brackets (`{3}`) after a pattern
    is like saying, “Match this pattern three times.” Further, parentheses can create
    groups in the regex string that let you grab different portions of the matched
    text.


    1. What is the difference between the `re.compile()` function and the `search()`
    method?

    2. How many groups are in the regex `(\d{3})-(\d{3})-(\d{4})`?

    3. What about in the regex `(\d{3})-(\d{3}-(\d{4}))`?

    4. Rewrite this regex using a raw string: `\(\d{3}\)-(\d{3})-(\d{4})`.

    5. List four characters that have special meaning in regex strings and must be
    escaped if you want to literally match them.

    6. Write a regex that uses the alternation syntax to match the word clutter, clue,
    or club.

    7. Which of the following strings does the regex `(A|B)(A|B)` match: A, B, AA,
    AB, BA, or BB?

    8. What is the main difference between the `search()` method and the `findall()`
    method?

    9. If `findall()` were called on a Pattern object of the regex `r''\d{3}-\d{3}-\d{4}''`,
    which could it possibly return: `[''415-555-9999'']` or `[(''415'', ''555'', ''9999'')]`?

    10. If `findall()` were called on a Pattern object of the regex `r''(\d{3})-(\d{3})-(\d{4})''`,
    which could it possibly return: `[''415-555-9999'']` or `[(''415'', ''555'', ''9999'')]`?


    ### Qualifier Syntax: What Characters to Match


    The qualifiers of a regular expression dictate what characters you''re trying
    to match. You can specify these using character classes, shorthand character classes,
    and characters with special meaning in regular expressions. Test your understanding
    of qualifier syntax.


    11. Write a regex with a character class that is equivalent to `a|b|c|d`.

    12. Write a regex that uses shorthand character classes to match strings like
    `a1z`, `B3x`, and `L0L`.

    13. Will the regex `[a-z]` match the string `é` (an e with an accent mark)?

    14. Will the regex `\w` match the string `é` (an e with an accent mark)?

    15. Will the regex `\W` match the string `é` (an e with an accent mark)?

    16. Will the regex `[A-Z]` match the string `z`?

    17. Will the regex `.` match the string `é` (an e with an accent mark)?

    18. Will the regex `r''\.''` match the string `é` (an e with an accent mark)?

    19. Name two shorthand character classes that will match the string `5`.


    ### Quantifier Syntax: How Many Qualifiers to Match


    In a regular expression string, quantifiers follow qualifier characters to dictate
    how many of them to match. For example, a `{3}` might follow `\d` to match exactly
    three digits. Answer the following questions about quantifier syntax.


    20. Which of the following strings does the regex `(A|B?)(A|B)?` match: A, B,
    AA, AB, BA, or BB?

    21. Write a regex that matches both `Cheese?` and `Cheese`.

    22. What string will the regexes `X?` and `X*` match that `X+` won''t match?

    23. Write a regex that matches the same thing as the regex `X{1,}`.

    24. Do the regexes `X{3,}` and `XX{2,}` and `XXX+` match the same strings?

    25. What is the difference between the regexes `Ha{3}` and `(Ha){3}`?

    26. Write a regex that matches a dot-com website address. The address should begin
    with `https://`, may optionally have `www.`, should include at least one letter
    or number for the website name, and should end with `.com`.

    27. In the XKCD comic at https://xkcd.com/1105/, the main character has a license
    plate made up of a jumble of 1s and capital letter Is: III-III. Write a regular
    expression that matches all possible license plates in this style. Such a license
    plate consists of three 1s or Is, a dash, then four more 1s or Is.


    ### Greedy and Non-Greedy Matching


    In ambiguous situations, a greedy match will match the longest string possible.
    A non-greedy match (also called a *lazy match*) will match the shortest string
    possible. Answer the following questions about greedy and non-greedy matching.


    28. Between greedy and non-greedy matching, which is the default behavior of Python
    regular expressions?

    29. Is greedy/non-greedy matching a feature of qualifier syntax or quantifier
    syntax?

    30. What does the regex `.*` mean?

    31. What does the regex `.*?` mean?

    32. What is the difference between the Pattern object returned by `re.compile(''.*'')`
    and the one returned by `re.compile(''.*'', re.DOTALL)`?


    ### Matching at the Start and End of a String


    You can use the caret symbol (`^`) at the start of a regex to indicate that a
    match must occur at the beginning of the searched text. Likewise, you can put
    a dollar sign (`$`) at the end of the regex to indicate that the string must end
    with this regex pattern. Lastly, you can use `^` and `$` together to indicate
    that the entire string must match the regex—that is, it''s not enough for a match
    to be made on some subset of the string. Python''s regex syntax also includes
    matching on word boundaries (separated by whitespace) with `\b`.


    33. Which regex matches the entire string `spam`: `spam`, `$spam^`, or `^spam$`?

    34. While `\b` matches a word boundary, what does `\B` match?


    ### Case-Insensitive Matching


    Normally, regular expressions match text with the exact casing you specify. To
    make your regex case insensitive, you can pass `re.IGNORECASE` or `re.I` as a
    second argument to `re.compile()`. Answer the following questions about case-insensitive
    matching.


    35. Does Python''s `re` module do case-insensitive matching by default?

    36. What are the two arguments you can pass to `re.compile()` that enable case-insensitive
    matching?

    37. Will a case-insensitive search with the regex `^[A-Z]$` match the string `Sinéad`?

    38. Does case-insensitive matching have any effect for the regex `r''\d+''`?


    ### Substituting Strings


    The `sub()` method for Pattern objects accepts two arguments. The first is a string
    that should replace any matches. The second is the string of the regular expression.
    The `sub()` method returns a string with the substitutions applied. Answer the
    following questions about the `sub()` method.


    39. What are `\1`, `\2`, and `\3` in regular expressions?

    40. Does the `sub()` method return a Match object?

    41. What arguments does the `sub()` method take?


    ### Managing Complex Regexes with Verbose Mode


    Matching complicated text patterns might require long, convoluted regular expressions.
    You can mitigate this complexity and enable “verbose mode” by passing the variable
    `re.VERBOSE` as the second argument to `re.compile()`. Answer the following questions
    about verbose mode.


    42. What flag do you pass to `re.compile()` to enable verbose mode?

    43. How does verbose mode make regular expression strings more readable?

    44. What do verbose mode comments look like?


    ### Humre: A Module for Human-Readable Regexes


    The third-party Humre Python module takes the good ideas of verbose mode even
    further by using human-readable, plain-English names to create readable regex
    code. Answer the following questions about the Humre module.


    45. What is the return data type of Humre functions?

    46. What does the Humre function `exactly(3, ''A'')` return?

    47. What value does the Humre constant `PERIOD` have?

    48. What do the Humre functions `either(exactly(3, ''A''), exactly(2, ''B''))`
    return?

    49. Name two benefits of Humre over the `re` module.'
  mdcn: '## 嘲讽海绵宝宝梗图


    你可能见过“嘲讽海绵宝宝”梗图格式，它将文本以大小写字母交替的方式呈现。编写一个名为 `spongecase(text)` 的函数，该函数接受一个字符串参数，并返回这种格式的字符串。应用以下规则：


