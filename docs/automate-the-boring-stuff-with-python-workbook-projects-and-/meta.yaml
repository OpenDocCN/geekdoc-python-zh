    # # 13 WEB SCRAPING


    The internet has made computing a part of everyday life. While the web is mainly
    designed for human consumption, your programs, too, can download web pages and
    interact with websites. The Requests, Beautiful Soup, Selenium, and Playwright
    packages add these powerful features to your Python code.


    ![](img/11f9f70403175f96d058cd4bde194c77_116_0.png)


    # ## LEARNING OBJECTIVES


    +   - Know what the HTTP and HTTPS protocols do, including what encryption features
    HTTPS and VPNs provide.

    - Be able to download websites and other files with the Requests package.

    - Learn the basics of HTML and CSS and how websites are written in them.

    - Be able to parse the HTML of downloaded websites with the Beautiful Soup package.

    - Know how to control the browser using the Selenium library.

    - Understand how to control the browser using the newer Playwright library, including
    in headless mode.'
