    \ `Sheet` 对象的 `add_chart()` 方法传递哪两样东西？\n\n## 实践项目\n\n运用你关于 Excel 电子表格的新知识来完成这些实践项目。\n\
    \n### 搜索词查找器\n\n虽然你总是可以在 Excel 中按 CTRL-F 来查找电子表格中的特定文本，但你无法一次搜索整个文件夹中的 .xlsx 电子表格文件。编写一个名为\
    \ `find_in_excel(search_text)` 的函数，该函数在当前工作目录（不包括子文件夹）中的每个 .xlsx 文件的每个工作表中搜索给定的\
    \ `search_text` 字符串。\n\n搜索应不区分大小写，并进行部分文本匹配。例如，`find_in_excel('name')` 将匹配包含 `filename`\
    \ 或 `Name` 的 Excel 单元格。为简单起见，该函数应仅检查 Excel 文件中的活动工作表，并将所有单元格值视为字符串。记得向 `load_workbook()`\
    \ 传递关键字参数 `data_only=True`，以便你也可以搜索公式的计算结果。\n\n该函数应返回一个字典，其键是文件名字符串，值是包含 `search_text`\
    \ 的单元格地址字符串列表。例如，调用 `find_in_excel('name')` 可能返回 `{'example.xlsx': ['A2'], 'spam.xlsx':\
    \ ['D1', 'D2']}`，表示在 `example.xlsx` 的单元格 A2 和 `spam.xlsx` 的单元格 D1 和 D2 中找到了 `name`。\n\
    \n你需要遍历 `os.listdir()` 返回的文件以查找当前工作目录中的所有电子表格，跳过不以 `.xlsx` 结尾的文件。\n\n将此程序保存在名为\
    \ `findAllExcel.py` 的文件中。\n\n### Excel 主文件夹报告\n\n假设你的经理希望你释放硬盘上的磁盘空间。他们希望你提供一份关于你主文件夹中所有文件及其大小的报告，并以格式良好的\
