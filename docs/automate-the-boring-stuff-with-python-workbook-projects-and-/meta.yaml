  - '[PAGE 27]


    making meaningful contributions to them is beyond the ability of beginners. Even
    trying to create a “small feature” or fix a “simple bug” involves learning the
    entire structure of the project. These projects are often maintained by unpaid
    volunteers who might not have time to help drop-in, one-off contributors become
    familiar with the code base.


    The second piece of advice is to work on your own projects. While this is a good
    idea, it doesn’t offer guidance as to what sorts of projects one can make. Beginners
    often don’t know what’s possible, or what is beyond their capabilities. “Create
    an operating system” and “create an AI helper” sound cool but are far too complicated
    for a single individual of any skill level to tackle.


    Beginners need guide rails rather than vague advice. Here are my recommendations
    for coming up with a software project to create:


    +   - **Choose something you’re interested in** Automate a task you regularly
    perform, make a small game you like, or replicate an app you’ve seen elsewhere
    and enjoyed.

    - **Keep the scale small** Don’t try to make a commercial application with many
    features. Projects always take longer than you think, so imagine the simplest
    version of the program you want to make.

    - **Come up with several ideas** You’ll find it encouraging to write multiple
    programs and frustrating to end up with one half-finished, large program.

    - **Write a list of features your program *won’t* have** Avoid the temptation
    to tell yourself “It’d be cool if the program did this” by committing to a set
    of features you’ll leave out.

    - **Stick to the Python standard library, third-party packages, and platforms
    you already know** If you find yourself saying, “Before I start coding this, I
    need to learn X,” you should find a different project.


    My other Python books have several such projects. They are short, simple, and
    complete examples of basic programs that don’t require a lot of setup or complex
    third-party packages:


    +   - ***The Big Book of Small Python Projects* (No Starch Press, 2021)** A collection
    of 81 projects ranging from games to simulations to digital art.

    - ***Invent Your Own Computer Games with Python*, 4th edition (No Starch Press,
    2016)** A book for complete Python beginners that walks through the creation of
    projects including Hangman, Tic-Tac-Toe, and games with 2D graphics.

    - ***Cracking Codes with Python* (No Starch Press, 2018)** A guide to creating
    classic encryption and code-breaking programs for your laptop that don’t require
    a supercomputer, such as the Caesar cipher, Vigenère cipher, and brute-force dictionary
    hacking programs.


    The solution programs to this book’s practice projects are available in the downloadable
    resources at https://nostarch.com/automate-workbook. You can use these projects
    as inspiration for making more elaborate projects of your own.


    These simple programs should give you an idea of what’s possible at the beginner
    level. Testing your Python knowledge and writing code should make you well equipped
    to continue your programming journey.'
