    - 18. 函数调用`pyautogui.move(-100, 0)`将鼠标光标向左移动100像素，因为水平x坐标向左移动时会减小。\n- 19. `pyautogui.moveTo()`函数将光标移动到屏幕上的绝对坐标，而`pyautogui.move()`函数将光标相对于其当前位置移动。\n\
