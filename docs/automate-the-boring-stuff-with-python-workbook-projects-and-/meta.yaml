    \ same for the length.\n- Store the width and length returned from input() in\
    \ two separate variables.\n- The input() function returns strings, but we want\
    \ an integer form of the user input, so pass the variable to the int() function\
    \ and store what int() returns in a variable.\n- The perimeter is the sum of twice\
    \ the width and twice the length. The area is the width multiplied by the length.\n\
    \nSave this program in a file named *perimeterAreaCalculator.py*.\n\n# IF-ELSE\
    \ AND FLOW CONTROL\n\nYou can make a program execute some instructions and skip\
    \ others based on whether conditions evaluate to a Boolean True or False value.\
    \ These activities test your ability to work with the if, elif, and else flow\
