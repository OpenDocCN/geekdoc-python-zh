    \ program should pass the list to the `get_end_coordinates()` function.\n\nGoing\
    \ north should increase the y-coordinate by one, while going south should decrease\
    \ it by one. Likewise, going east should increase the x-coordinate by one, while\
    \ going west should decrease it by one.\n\nYou can represent the coordinates in\
    \ another list. For example, the function call `get_end_coordinates(['N', 'N',\
