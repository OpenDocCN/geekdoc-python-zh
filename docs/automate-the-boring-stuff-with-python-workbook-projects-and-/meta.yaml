    # # 4 FUNCTIONS


    Functions are a great tool to help you organize your code, but to write your own
    functions, you must understand def statements, parameters, arguments, and return
    values. Functions also bring to light new programming concepts, such as the call
    stack and scopes.


    The following activities test your ability to create functions and use them effectively.
    Almost every program you write of significant length is better served by including
    functions, so it’s important to understand their behavior.


    +   ### LEARNING OBJECTIVES


    * Master the structure of a def statement and how it can include parameters.

    * Identify the value a function returns and know how to set its return value with
    the return keyword.

    * Understand the behavior of the None value and when functions return it.

    * Be able to explain how Python represents function calls using the underlying
    call stack.'
