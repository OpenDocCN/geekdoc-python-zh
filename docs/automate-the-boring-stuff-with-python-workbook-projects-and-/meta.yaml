    # The Gmail API


    Gmail owns close to one-third of the email client market share, and you''ve most
    likely had at least one Gmail email address. Because of Gmail''s additional security
    and antispam measures, controlling a Gmail account is best done through the ezgmail
    module rather than through the smtplib and imaplib modules in Python''s standard
