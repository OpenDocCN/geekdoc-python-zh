    \ 1 到 9。（程序员没有发明棒球，所以第一局不是零。）为了建模这场比赛，创建一个字典，键为 'Home' 和 'Visitor'。这两个键的值也应是字典，整数键从\
    \ 1 到 9，代表每一局。每个局键的值应为该局的得分。除了第三局主队得了一分外，所有局的得分都是 0。（这不是一场激动人心的比赛。）编写此字典的代码。\n\
    \n36. 不要手动编写上一题中的字典，而是编写一个 for 循环来自动生成它。你可以从以下模板开始：\n\n```\ngame = {'Home': {},\
    \ 'Visitor': {}}\nfor inning in range(1, 10):  # Loop from 1 to 9.\n    # Fill\
    \ in the code for this part.\ngame['Home'][3] = 1  # Set one run in third inning.\n\
    ```\n\n37. 一位疯狂的亿万富翁购买了整个棒球联盟，以便实施以下规则变更：所有棒球比赛现在将有 9,999 局，而不是 9 局。更改你上一题的答案中的代码以反映这个新比赛。同样，唯一得分是主队在第三局得了一分。（两队在比赛后期太累了，无法再得分。）\n\
    \n## 实践项目\n\n以下实践项目将巩固你关于字典和数据结构的知识。\n\n### 随机天气数据生成器\n\n编写一个名为 get_random_weather_data()\
    \ 的函数，返回一个随机天气数据的字典。该字典应包含表 7-1 中的键和值。\n\n表 7-1：天气字典的键和值\n\n| 键 | 值 |\n| :---\
    \ | :--- |\n| 'temp' | -50 到 50 之间的随机浮点数 |\n| 'feels_like' | 在 'temp' 值 10 度范围内的浮点数\
    \ |\n| 'humidity' | 0 到 100 之间的随机整数 |\n| 'pressure' | 990 到 1010 之间的随机整数 |\n\n\
    然后，程序应在一个循环中调用此函数 100 次，将返回的字典存储在一个列表中。最后，打印该列表。将此程序保存在名为 weatherDataGen.py 的文件中。\n\
    \n### 平均温度分析器\n\n在上一个实践项目的程序中添加一个名为 get_average_temperature(weather_data) 的函数。此函数应接受上一个项目中描述的天气数据字典列表，并返回其\
    \ 'temp' 键的平均温度。要计算平均值，请将字典中所有温度数字相加，然后将结果除以字典的数量。\n\n传递给 get_average_temperature()\
    \ 的列表可以包含任意数量的字典，但应始终至少包含一个。通过调用 `get_random_weather_data()` 生成一个包含 100 个天气字典的列表，然后将此列表传递给\
    \ `get_average_temperature()` 并打印其返回的平均值。将此新函数添加到你的 `weatherDataGen.py` 程序中，并将此新程序保存为\
    \ `avgTemp.py`。\n\n### 国际象棋车吃子预测器\n\n在《Python编程快速上手——让繁琐工作自动化》第 7 章中，我们使用字符串键为每个方格建模棋盘。例如，字符串\
    \ 'a1' 代表左下角的方格，'h8' 代表右上角的方格。字典中的值是代表棋子的两个字符的字符串。第一个字符是小写的 w 代表白方或 b 代表黑方，第二个字符是大写的\
    \ P、N、B、R、K 或 Q，分别代表兵、马、象、车、王或后。例如，'wQ' 代表白后，'bB' 代表黑象。因此，以下字典代表一个棋盘，左上角方格有一个白后，其下方方格有一个黑象：`{'a8':\
    \ 'wQ', 'a7': 'bB'}`。如果一个方格在字典中没有键，我们假设该方格为空。\n\n在国际象棋中，车可以沿棋盘垂直或水平移动无限个方格。如果对手的任何棋子在同一行（在国际象棋中称为\
    \ *rank*）或同一列（称为 *file*），车就可以吃掉它。\n\n编写一个名为 `white_rook_can_capture(rook, board)`\
    \ 的函数，它接受两个参数：`rook` 是一个字符串，表示白车所在的方格，`board` 是一个棋盘字典。该函数返回一个列表，包含白车可以吃掉的所有黑棋所在的方格——即与白车在同一行或同一列的所有黑棋（包括黑王）所在的方格。列表中方格的顺序无关紧要。如果白车无法吃掉任何黑棋，函数返回一个空列表。\n\
    \n为简单起见，我们将忽略其他棋子阻挡白车吃掉任何棋子的情况。你的函数只需找到与白车在同一行或同一列的所有黑棋。返回的列表不应包含任何有白棋的方格。\n\n\
    例如，函数调用 `white_rook_can_capture('d3', {'d7': 'bQ', 'd2': 'wB', 'f1': 'bP', 'a3':\
    \ 'bN'})` 应返回列表 `['d7', 'a3']`，因为方格 d7 和 a3 包含白车在 d3 可以吃掉的黑棋。方格 d7 与 d3 在同一列，方格\
    \ a3 与 d3 在同一行。然而，f1 与 d3 不在同一列或同一行。虽然 d2 与 d3 在同一列，但它包含一个白棋。\n\n将此程序保存在名为 `rookCapture.py`\
    \ 的文件中。\n\n# 8\n\n## 字符串和文本编辑\n\nPython 让你能够比任何人类文件管理员都更高效地处理海量文本数据，但首先你必须知道 Python\
    \ 提供了哪些文本编辑操作。通过学习 Python 的字符串操作，你将免于自己重新发明这些文本编辑代码。\n\n### 学习目标\n\n- 知道如何编写字符串字面量并在程序中使用字符串值。\n\
    - 能够编写 f-string 作为连接字符串的快捷方式。\n- 熟悉各种字符串方法以及它们如何操作大小写、添加或删除空格以及描述字符串值的特征。\n- 理解文本如何在计算机上编码为数字，以及\
    \ ord() 和 chr() 函数如何在文本字符和数字码点之间转换。\n- 知道如何使用 Pyperclip 第三方包将剪贴板作为程序的输入和输出系统。"
