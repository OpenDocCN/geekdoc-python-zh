- md: "## 24 TEXT-TO-SPEECH AND SPEECH RECOGNITION ENGINES\n\n161\n\n- Practice Questions\n\
    \  - Text-to-Speech Engine\n  - Speech Recognition\n  - Creating Subtitle Files\n\
    \  - Downloading Videos from Websites\n\n- Practice Projects\n  - Knock-Knock\
    \ Jokes\n  - 12 Days of Christmas\n  - Podcast Word Search\n\n## ANSWERS\n\n167\n\
    \n## ACKNOWLEDGMENTS\n\nIt’s misleading to have just my name on the cover.\nI\
    \ couldn’t have written this book without the help of a lot of people. I’d like\
    \ to thank my publisher, Bill Pollock; my editors, Jill Franklin, Sabrina Plomitallo-González,\
    \ Allison Felus, Frances Saux, and Audrey Doyle; and the rest of the staff at\
    \ No Starch Press for their invaluable help. Thanks so much to my tech reviewer,\
    \ Daniel Zingaro, for great suggestions, edits, and support.\nMany thanks to everyone\
    \ at the Python Software Foundation for their great work. The organizers and volunteers\
    \ of all the various PyCon and DjangoCon conferences are extraordinary. The Python\
    \ community is the best one I’ve found in the tech industry.\nThank you.\n\n##\
    \ INTRODUCTION\n\nProgramming can be an intimidating topic. When people ask me\
    \ if they’re learning the “right” way or reading the “right” books, I remind them\
    \ that programming is a skill. Like all skills, you get better by doing it and\
    \ challenging yourself. Calm seas don’t make skilled sailors.\n\nI wrote the original\
    \ *Automate the Boring Stuff with Python* book over 10 years ago, and since then\
    \ it has sold over a half-million copies. That book teaches the syntax and third-party\
    \ packages of the Python programming language, but you probably picked up this\
    \ workbook because you know that the world of programming can’t be captured by\
    \ any single text. In these pages, you’ll find additional practice questions and\
    \ projects to challenge your ability to automate boring tasks with code.\n\n##\
    \ How to Use This Workbook\n\nThe 24 chapters in this book correspond to the 24\
    \ chapters of *Automate the Boring Stuff with Python*, 3rd edition. You can work\
    \ through the two books simultaneously or use this workbook if you’ve already\
    \ read the original text and want to assess how well you’ve retained that knowledge.\n\
    \nBut even if you haven’t read the source text, you’ll find this workbook useful,\
    \ especially if you fall into any of the following categories:\n\n- Students of\
    \ other Python textbooks or courses looking to fill in the gaps in their knowledge\n\
    - Self-taught programmers who want to test how well they’ve mastered Python’s\
    \ syntax and ecosystem\n- Instructors looking for additional curriculum materials\n\
    - Programmers experienced in other languages who want to include Python in their\
    \ toolkit of skills\n\nNo matter which group you fall into, I recommend working\
    \ through the workbook’s problems multiple times to secure your understanding\
    \ of the underlying ideas. Mastery comes not from obtaining knowledge but from\
    \ being able to recall knowledge you’ve previously obtained. One way to achieve\
    \ mastery is through *spaced repetition*: the practice of answering questions\
    \ over time, with a focus on the questions you find most difficult. (Flash cards\
    \ are a common form of spaced repetition studying.) Use this workbook for continuous\
    \ practice, rather than reading it once and putting it back on the shelf to gather\
    \ dust.\n\n## About the Activities\n\nThis book contains questions and practice\
    \ projects organized in chapters and sections that correspond to those in *Automate\
    \ the Boring Stuff with Python*. You’ll find the answers to the questions at the\
    \ back of the workbook, along with light explanations and complete, runnable solution\
    \ programs for the practice projects. There are many correct ways to write a program,\
    \ and yours don’t have to match these solutions exactly. If you’re at a loss as\
    \ to where to begin with your program, however, you can glance at the solution\
    \ code before making a renewed attempt.\n\nHere’s a brief rundown of the kinds\
    \ of questions you’ll encounter in each chapter:\n\n**Chapter 1: Python Basics**\
    \ What do expressions and statements look like? What are variables, and what kinds\
    \ of data can they hold?\n\n**Chapter 2: if-else and Flow Control** How do conditions\
    \ and expressions evaluate to Boolean values? How does indentation create blocks?\
    \ What’s the difference between if, elif, and else statements?\n\n**Chapter 3:\
    \ Loops** What’s the difference between for and while loops, and what are the\
    \ different arguments to the range() function? What do break and continue statements\
    \ do?\n\n**Chapter 4: Functions** How can you create your own functions with parameters\
    \ and return values? How do variables work in global and local scopes?\n\n**Chapter\
    \ 5: Debugging** How do logging and the debugger save you time when fixing your\
    \ programs? What are breakpoints and the different ways to step through a program?\n\
    \n**Chapter 6: Lists** What do lists make possible? How can you add, access, change,\
    \ and remove data from lists? How do lists inside lists work?\n\n**Chapter 7:\
    \ Dictionaries and Structuring Data** How are key-value pairs in dictionaries\
    \ different from data in lists? How can dictionaries and lists model real-world\
    \ things as data?\n\n**Chapter 8: Strings and Text Editing** How does data represent\
    \ text, and what are all the text-related methods that Python offers?\n\n**Chapter\
    \ 9: Text Pattern Matching with Regular Expressions** How can you specify not\
    \ just text, but a pattern of text using the mini-language of regular expressions?\n\
    \n**Chapter 10: Reading and Writing Files** How do computers organize files and\
    \ folders in a filesystem? What does the pathlib module do? How does Python store\
    \ data in text files and then read them back into programs later?\n\n**Chapter\
    \ 11: Organizing Files** How can you list, move, rename, copy, and delete files\
    \ on your computer?\n\n**Chapter 12: Designing and Deploying Command Line Programs**\
    \ Once you get your program working, how can you easily run it without opening\
    \ the code editor? How can you get it to run on someone else's computer?\n\n**Chapter\
    \ 13: Web Scraping** How can your Python scripts download files, control a web\
    \ browser, and retrieve information off of the internet?\n\n**Chapter 14: Excel\
    \ Spreadsheets** How can you create, access, and edit Excel spreadsheets files\
    \ (even if you don't have Excel installed)? How do you create charts and formulas\
    \ in these files?\n\n**Chapter 15: Google Sheets** How can you create, access,\
    \ and edit online Google Sheets spreadsheets? How do you set up your Python script\
    \ to safely use your Google account?\n\n**Chapter 16: SQLite Databases** What\
    \ are databases and tables, and what is the language for accessing and updating\
    \ data in them? What are the advantages of SQLite's simplicity compared to other\
    \ databases?\n\n**Chapter 17: PDF and Word Documents** How can you read and edit\
    \ the content of PDF and Microsoft Word files?\n\n**Chapter 18: CSV, JSON, and\
    \ XML Files** What are data serialization formats, and what are they used for?\
    \ What's the difference between CSV, JSON, and XML, and how have their histories\
    \ shaped their use?\n\n**Chapter 19: Keeping Time, Scheduling Tasks, and Launching\
    \ Programs** How are dates, timestamps, and calendars represented as data by programs?\
    \ How can you schedule your Python programs to run other programs?\n\n**Chapter\
    \ 20: Sending Email, Texts, and Push Notifications** How can your Python scripts\
    \ send notifications to your email address or mobile phone?\n\n**Chapter 21: Making\
    \ Graphs and Manipulating Images** How do computers represent images and color\
    \ as data, and how can your programs create and modify images? How can you create\
    \ images of different types of graphs?\n\n**Chapter 22: Recognizing Text in Images**\
    \ How can your programs read the text from an image or scanned document? How can\
    \ you fix errors in the extraction process?\n\n**Chapter 23: Controlling the Keyboard\
    \ and Mouse** How do you send mouse clicks and keyboard key presses to other software\
    \ so that your Python code can interact with them? How can your programs “see”\
    \ what’s on the screen?\n\n**Chapter 24: Text-to-Speech and Speech Recognition\
    \ Engines** How do you make your programs say words through your computer’s speakers?\
    \ How can your programs understand words in an audio file? What are the formats\
    \ for video subtitles?\n\n## A Note for Instructors\n\nThis workbook can be a\
    \ useful resource for instructors teaching from *Automate the Boring Stuff with\
    \ Python*, or other sources. The questions in Chapters 1 through 11 in particular\
    \ cover the Python language and standard library and can supplement any general\
    \ Python curriculum.\n\nAll of the questions are answered in the back of the workbook,\
    \ and any student with a copy of the workbook can read these answers. This may\
    \ be of concern for instructors who want to assign these questions as homework.\
    \ (Moreover, answers to these straightforward questions are readily found online\
    \ or can be generated by large language model AIs such as ChatGPT.) Nevertheless,\
    \ you can use these questions in the classroom or modify them for your own purposes.\n\
    \nThe questions use the free-response format, meaning the student must directly\
    \ provide the answer. They often encourage the student to experiment in the Python\
    \ interactive shell. For example, a student can answer the question “Does round(4.9)\
    \ evaluate to the integer 5 or the float 5.0?” by running the code. If the student\
    \ doesn’t have access to a computer, you can make the questions easier by providing\
    \ a multiple-choice answer format or an answer bank they can match to a set of\
    \ questions.\n\n## How to Answer Your Own Questions\n\nSoftware development is\
    \ a large field, and no one can expect to memorize every part of it. It should\
    \ come as no surprise, then, that programmers have created software to help them\
    \ program. Search engines and Python’s interactive shell are also great ways to\
    \ find the information you’re looking for. You should never consider it “cheating”\
    \ to search for something online. Professional software engineers do it dozens\
    \ of times a day!\n\nKnowing how to find information online is an important skill,\
    \ and it requires you to carefully think about what exactly it is you want to\
    \ know. It’s often much faster to find existing answers online than it is to post\
    \ your question somewhere and wait hours (or days or weeks!) for a reply.\n\n\
    If you do need to post a question, be specific. When I teach coding online to\
    \ others, I often get comments like, “My program doesn’t work,”"
  mdcn: "## 24 文本转语音与语音识别引擎\n\n161\n\n- 练习题\n  - 文本转语音引擎\n  - 语音识别\n  - 创建字幕文件\n \
    \ - 从网站下载视频\n\n- 练习项目\n  - 敲门笑话\n  - 圣诞十二天\n  - 播客单词搜索\n\n## 答案\n\n167\n\n## 致谢\n\
    \n仅将我的名字印在封面上是有误导性的。\n没有许多人的帮助，我无法完成这本书。我要感谢我的出版商比尔·波洛克；我的编辑吉尔·富兰克林、萨布丽娜·普洛米塔洛-冈萨雷斯、艾莉森·费勒斯、弗朗西斯·索和奥黛丽·多伊尔；以及No\
    \ Starch Press的其他员工，感谢他们宝贵的帮助。非常感谢我的技术审稿人丹津加罗，他提出了很棒的建议、编辑和支持。\n非常感谢Python软件基金会的所有成员，感谢他们的出色工作。各种PyCon和DjangoCon会议的组织者和志愿者都非常出色。Python社区是我在科技行业发现的最好的社区。\n\
    谢谢。\n\n## 引言\n\n编程可能是一个令人生畏的话题。当人们问我他们是否在以“正确”的方式学习或阅读“正确”的书籍时，我提醒他们编程是一项技能。像所有技能一样，通过实践和挑战自己，你会变得更好。平静的海面造就不了熟练的水手。\n\
    \n我在十多年前写了最初的《Python编程快速上手——让繁琐工作自动化》一书，自那以后，它已经售出了超过五十万册。那本书教授了Python编程语言的语法和第三方包，但你可能拿起这本练习册是因为你知道编程世界无法被任何单一文本所涵盖。在这些页面中，你会发现额外的练习题和项目，以挑战你用代码自动化繁琐任务的能力。\n\
    \n## 如何使用本练习册\n\n本书的24章对应《Python编程快速上手——让繁琐工作自动化》第三版的24章。你可以同时学习这两本书，或者如果你已经阅读了原文并想评估自己对知识的掌握程度，可以使用这本练习册。\n\
    \n但即使你没有阅读原文，你也会发现这本练习册很有用，特别是如果你属于以下任何一类：\n\n- 正在学习其他Python教材或课程的学生，希望填补知识空白\n\
    - 自学成才的程序员，想测试自己对Python语法和生态系统的掌握程度\n- 正在寻找额外课程材料的讲师\n- 熟悉其他语言的程序员，希望将Python纳入自己的技能工具包\n\
    \n无论你属于哪个群体，我建议多次完成练习册中的问题，以巩固你对基本概念的理解。精通并非来自获取知识，而是来自能够回忆起先前获得的知识。实现精通的一种方法是通过*间隔重复*：随着时间的推移回答问题，重点关注你觉得最困难的问题。（抽认卡是间隔重复学习的一种常见形式。）使用这本练习册进行持续练习，而不是读一遍就放回书架上积灰。\n\
    \n## 关于活动\n\n本书包含按章节和部分组织的问题和练习项目，这些章节和部分对应《Python编程快速上手——让繁琐工作自动化》中的章节。你可以在练习册的末尾找到问题的答案，以及练习项目的简要说明和完整、可运行的解决方案程序。编写程序有许多正确的方法，你的程序不必与这些解决方案完全匹配。然而，如果你不知道从哪里开始编写程序，可以在重新尝试之前浏览一下解决方案代码。\n\
    \n以下是每章中你会遇到的问题类型的简要概述：\n\n**第1章：Python基础** 表达式和语句是什么样子的？变量是什么，它们可以容纳哪些类型的数据？\n\
    \n**第2章：if-else与流程控制** 条件和表达式如何求值为布尔值？缩进如何创建代码块？if、elif和else语句之间有什么区别？\n\n**第3章：循环**\
    \ for循环和while循环有什么区别？range()函数的不同参数是什么？break和continue语句的作用是什么？\n\n**第4章：函数** 如何创建带有参数和返回值的自定义函数？变量在全局作用域和局部作用域中是如何工作的？\n\
    \n**第5章：调试** 日志记录和调试器如何在修复程序时节省你的时间？什么是断点，以及单步执行程序的不同方式是什么？\n\n**第6章：列表** 列表使什么成为可能？如何向列表中添加、访问、更改和删除数据？列表中的列表是如何工作的？\n\
    \n**第7章：字典与数据结构** 字典中的键值对与列表中的数据有何不同？如何使用字典和列表将现实世界的事物建模为数据？\n\n**第8章：字符串与文本编辑**\
    \ 数据如何表示文本？Python提供了哪些与文本相关的方法？\n\n**第9章：使用正则表达式进行文本模式匹配** 如何不仅指定文本，还使用正则表达式的微型语言指定文本模式？\n\
    \n**第10章：读写文件** 计算机如何在文件系统中组织文件和文件夹？pathlib模块的作用是什么？Python如何将数据存储在文本文件中，然后在以后将其读回程序？\n\
    \n**第11章：组织文件** 如何在计算机上列出、移动、重命名、复制和删除文件？\n\n**第12章：设计与部署命令行程序** 一旦你的程序运行起来，如何在不打开代码编辑器的情况下轻松运行它？如何让它在别人的计算机上运行？\n\
    \n**第13章：网络爬虫** 你的Python脚本如何下载文件、控制网络浏览器并从互联网上检索信息？\n\n**第14章：Excel电子表格** 如何创建、访问和编辑Excel电子表格文件（即使你没有安装Excel）？如何在这些文件中创建图表和公式？\n\
