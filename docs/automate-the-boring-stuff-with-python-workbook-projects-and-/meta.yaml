    # 关于作者


    Al Sweigart 是一位软件开发者、作家、艺术家，也是 Python 软件基金会的会士。他是多本面向初学者的编程书籍的作者，包括《用Python编程快速入门》（第3版）、《用Python发明自己的电脑游戏》、《Python小型项目大全》和《超越Python基础》（均由
    No Starch Press 出版）。他是多个国际 PyCon 大会的演讲者。他的网站是 https://inventwithpython.com。


    关于 Al 是人工智能的报道被大大夸大了。


    # 关于技术审校


    Daniel Zingaro 博士是多伦多大学的计算机科学副教授。他因其独特的互动式教学方法、在生成式AI教学方面的领先研究以及以学习者为中心的教科书而享誉国际，这些教科书被世界各地成千上万的学生使用。他是《算法思维》（第2版，No
    Starch Press，2024）和《通过解决问题学习编程》（No Starch Press，2021）的作者，也是《使用GitHub Copilot和ChatGPT学习AI辅助Python编程》（Manning，2023）的合著者。


    # 简要目录


