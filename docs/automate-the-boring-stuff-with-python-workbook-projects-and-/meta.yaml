    # # 9


    # ## TEXT PATTERN MATCHING WITH REGULAR EXPRESSIONS


    Most programming languages implement regular expressions, or *regexes*, because
    they make it easy to locate particular patterns of text. An understanding of Python’s
    regexes can prepare you for learning regexes in any programming language and in
    many word processor applications as well, so digging into this topic is a worthy
    investment.


    ![](img/11f9f70403175f96d058cd4bde194c77_88_0.png)


    # ### LEARNING OBJECTIVES


    +   - Master the basics of regular expression syntax in the Python programming
    language.

    - Know how to use qualifiers to describe what characters to match.

    - Know how to use quantifiers to describe the number of characters to match.

    - Be able to resolve the ambiguity between greedy and non-greedy matching using
    the question mark (?) syntax.

    - Understand how to pass flags such as re.IGNORECASE to the re.compile() function
    to do case-insensitive matching.


    *(continued)*'
