    # # 19


    # ## KEEPING TIME, SCHEDULING TASKS, AND LAUNCHING PROGRAMS


    Clocks and calendars aren’t as straightforward as text and numeric data, but Python’s
    time and datetime modules make timestamps and date information easy to handle.
    Your computer’s clock can schedule programs to run code at some specified time
    and date or at regular intervals. By learning to leverage these features, you
    can make use of all the software available on your computer.


    ![](img/11f9f70403175f96d058cd4bde194c77_158_0.png)


    # ### LEARNING OBJECTIVES


    +   - Understand how Python programs can access your computer’s system clock.

    - Use the datetime module to perform time- and calendar-related operations.

    - Learn how the datetime and timedelta data types represent durations and moments
    in time.

    - Run other programs from your Python script, either immediately or on a schedule.'
- md: '## Practice Questions


    These questions test your ability to work with time and calendar data, as well
    as your ability to schedule your Python programs to run other apps on your computer.


    ## The time Module


    Your computer''s system clock is set to a specific date, time, and time zone.
    The built-in time module allows your Python programs to read the system clock
    and retrieve the current time.


    1. What time zone is the Unix epoch timestamp in?

    2. What function returns a string of the current time, like ''Tue Mar 17 11:05:45
    2026''?

    3. What function returns a float of the current time, like 1773813875.3518236?

    4. Say you''ve run `import time`. What is `time`? What is `time.time()`?

    5. What does the expression `time.time() + 10` evaluate to?

    6. What does the expression `time.ctime(time.time() - 10)` evaluate to?

    7. What is profiling? What does it mean to profile code?

    8. How do you make your program pause its execution for one-half of a second?

    9. Say you decide a timestamp like 1773813875.3518236 has too many digits after
    the decimal point. What code returns the current time rounded to the nearest second?


    ## The datetime Module


    The time module is useful for getting a Unix epoch timestamp to work with. But
    if you want to display a date in a more convenient format or do arithmetic with
    dates (for example, figuring out what date was 205 days ago or what date is 123
    days from now), you should use the datetime module.


    10. Say you''ve run `import datetime`. What is wrong with the code `datetime.now()`?

    11. If you run `current_time = datetime.datetime.now()`, how can you get an integer
    of the current year?

    12. What date and time does the datetime object from this expression represent:
    `datetime.datetime.fromtimestamp(0)`? (Assume you''re in the UTC time zone.)

    13. Objects of what data type represent a moment in time?

    14. Objects of what data type represent a duration of time?

    15. The `datetime.timedelta()` function can have keyword arguments like `datetime.timedelta(days=11,
    hours=10, minutes=9, seconds=8)`. Why can''t you specify the number of months
    or years?

    16. What code creates a timedelta object that represents 1,000 days?

    17. Reuse the code from the previous question in an expression that evaluates
    to a timedelta object that represents 2,000 days.

    18. If you add a `datetime.datetime` object to a `datetime.timedelta` object,
    what is the data type of the evaluated result?

    19. If you add a `datetime.timedelta` object to a `datetime.timedelta` object,
    what is the data type of the evaluated result?

    20. Assume you run `from datetime import timedelta`. What does the expression
    `timedelta(seconds=15) - timedelta(seconds=5) == timedelta(seconds=10)` evaluate
    to?

    21. Assume you run `from datetime import timedelta`. Does `timedelta(seconds=15)
    + 5 == timedelta(seconds=20)` evaluate to True?

    22. What does `datetime.timedelta(seconds=60) == datetime.timedelta(minutes=1)`
    evaluate to?

    23. What does the "f" in `strftime()` stand for?

    24. What does the "p" in `strptime()` stand for?

    25. Which function takes a date and time as a human-readable string, along with
    a string to parse it, and then returns a `datetime.datetime` object: `strftime()`
    or `strptime()`?

    26. Which function returns a date and time as a human-readable string: `strftime()`
    or `strptime()`?

    27. Does `datetime.datetime.strptime(''26'', ''%y'')` evaluate to a datetime object
    with the year 1926 or 2026?

    28. Does `datetime.datetime.strptime(''76'', ''%y'')` evaluate to a datetime object
    with the year 1976 or 2076?

    29. What datetime object does `datetime.datetime.strptime("October of ''26", "%B
    of ''%y")` evaluate to?

    30. What does the expression `datetime.timedelta(days=0, hours=0, minutes=1, seconds=5).total_seconds()`
    evaluate to?


    ## Launching Other Programs from Python


    Your Python program can start other programs on your computer. If you want to
    start an external program from your Python script, pass the program''s filename
    to `subprocess.run()`. Multiple open instances of an application are separate
    processes of the same program.


    31. What is the difference between a process and a program?

    32. What is the data type of the argument passed to `subprocess.run()`?

    33. Why doesn''t `subprocess.run([''/System/Applications/Calculator.app''])` run
    the calculator app on macOS?

    34. How is the `subprocess.Popen()` function different from the `subprocess.run()`
    function?

    35. The `subprocess.run()` and `subprocess.Popen()` functions return Popen objects.
    What does the `poll()` method of Popen objects return if the launched program
    is still running at the time of the method call?

    36. What does the `poll()` method of Popen objects return if the launched program
    has quit?

    37. If a program has quit without errors, what is its exit code?

    38. What happens when you call a Popen object''s `kill()` method?

    39. What happens when you call a Popen object''s `wait()` method?

    40. Write the code to open a `hello.txt` file using the default application for
    opening `.txt` files on Windows.

    41. Write the code to open a `hello.txt` file using the default application for
    opening `.txt` files on macOS and Linux.

    42. Write the code to run a Python script named `spam.py`.


    ## Practice Projects


    In the following projects, you''ll create an alarm, an image opener, and a holiday
    reminder.


    ### Alarm with Sound


    Write a function called `alarm_with_audio(alarm_time, audio_filename)` whose first
    argument is a `datetime.datetime` object that sets an alarm and whose second argument
    is a string representing an audio filename to play at that time. The function
    should return only after playing the audio file at the time of the alarm.


    This function has a few special requirements. It should check whether the audio
    file exists when first called and should raise an exception if it doesn''t. After
    all, you don''t want the function to pause for hours and then fail to play any
    sound because the audio filename had a typo. To know when the time of the alarm
    has arrived, the function should enter a loop that repeatedly calls `time.sleep(0.1)`
    (to add a slight pause and avoid hogging the CPU) until one second after the alarm
    time.


    To play the audio file, call `subprocess.run()` to open the file with the operating
    system''s default application for audio files. Keep in mind that you won''t hear
    the audio if your volume is muted.


    Save this program in a file named `alarmWithSound.py`.


    ### Image Opener


    Write a function named `open_images_by_name(image_folder, name_match)` that takes
    two string arguments. The first string is the name of a folder containing images,
    and the second string is a search term with which to perform a case-insensitive
    match. If `image_folder` is `r''C:\memes''` and `name_match` is `''cat''`, the
    function should search `C:\memes` and open any image filenames that contain the
    word cat, such as `cat-snuggle.png` or `muffin_cat.jpg`.


    For the purposes of this exercise, an *image file* is any file that ends with
    `.png`, `.jpg`, or `.webp`. Use `subprocess.run()` to open the image with the
    operating system''s default application for image files.


    My well-organized `memes` folder contains 3,300 carefully named image files, so
    I find this program quite useful for seeing all images of a certain topic. It
    may or may not be as useful to others.


    Save this function in a file named `openImagesByName.py`.


    ### “Next Holiday” Reporter


    Here is a dictionary of dates formatted as strings, along with the name of the
    holiday on that date: `{''October 31'': ''Halloween'', ''February 14'': "Valentine''s
    Day", ''April 1'': "April Fool''s Day", ''May 1'': ''May Day'', ''May 5'': ''Cinco
    de Mayo''}`.


    Write a function named `next_holiday(from_date)` that accepts a `datetime.datetime`
    object and returns either the holiday on that day or the next upcoming holiday.
    For example, if you called `next_holiday(datetime.datetime(2028, 10, 31, 0, 0,
    0))`, the function should return `''Halloween''` because October 31, 2028, is
    on Halloween. On the other hand, if you call `next_holiday(datetime.datetime(3000,
    1, 1, 0, 0, 0))`, the function should return `"Valentine''s Day"` because that
    is the first holiday after January 1, 3000, in our dictionary of holidays.


    Hint: `from_date.strftime(''%B'')` will return the name of the month as a string,
    like `''November''` or `''May''`, and `from_date.strftime(''%d'')` will return
    the day of the month, like `01` or `31`. The day will always be two digits long,
    with a leading zero if necessary, which doesn''t match the keys in our dictionary
    of holidays. You''ll have to strip out this leading zero by calling the `lstrip()`
    string method.


    Save this program in a file named `nextHoliday.py`.'
  mdcn: '## 练习题


    这些题目测试你处理时间和日历数据的能力，以及将你的 Python 程序设置为在计算机上运行其他应用程序的能力。


    ## time 模块


    你的计算机系统时钟被设置为特定的日期、时间和时区。内置的 `time` 模块允许你的 Python 程序读取系统时钟并获取当前时间。


    1.  Unix 纪元时间戳处于哪个时区？

    2.  哪个函数返回当前时间的字符串，例如 `''Tue Mar 17 11:05:45 2026''`？

    3.  哪个函数返回当前时间的浮点数，例如 `1773813875.3518236`？

    4.  假设你已经运行了 `import time`。`time` 是什么？`time.time()` 是什么？

    5.  表达式 `time.time() + 10` 的求值结果是什么？

    6.  表达式 `time.ctime(time.time() - 10)` 的求值结果是什么？

    7.  什么是性能分析？对代码进行性能分析意味着什么？

    8.  如何让你的程序暂停执行半秒钟？

    9.  假设你认为像 `1773813875.3518236` 这样的时间戳小数点后的位数太多了。什么代码可以返回四舍五入到最近秒的当前时间？


    ## datetime 模块


    `time` 模块对于获取 Unix 纪元时间戳很有用。但如果你想以更方便的格式显示日期或对日期进行算术运算（例如，计算出 205 天前是哪一天或 123
    天后是哪一天），你应该使用 `datetime` 模块。


    10. 假设你已经运行了 `import datetime`。代码 `datetime.now()` 有什么问题？

    11. 如果你运行 `current_time = datetime.datetime.now()`，如何获取当前年份的整数？

    12. 表达式 `datetime.datetime.fromtimestamp(0)` 中的 `datetime` 对象代表什么日期和时间？（假设你处于
    UTC 时区。）

    13. 什么数据类型的对象代表时间中的一个时刻？

    14. 什么数据类型的对象代表一段时间的持续时间？

    15. `datetime.timedelta()` 函数可以有像 `datetime.timedelta(days=11, hours=10, minutes=9,
    seconds=8)` 这样的关键字参数。为什么不能指定月份或年份的数量？

    16. 什么代码创建一个代表 1,000 天的 `timedelta` 对象？

    17. 在一个表达式中重用上一题的代码，该表达式求值结果为一个代表 2,000 天的 `timedelta` 对象。

    18. 如果你将一个 `datetime.datetime` 对象与一个 `datetime.timedelta` 对象相加，求值结果的数据类型是什么？

    19. 如果你将一个 `datetime.timedelta` 对象与另一个 `datetime.timedelta` 对象相加，求值结果的数据类型是什么？

    20. 假设你运行了 `from datetime import timedelta`。表达式 `timedelta(seconds=15) - timedelta(seconds=5)
    == timedelta(seconds=10)` 的求值结果是什么？

    21. 假设你运行了 `from datetime import timedelta`。`timedelta(seconds=15) + 5 == timedelta(seconds=20)`
    的求值结果是 True 吗？

    22. `datetime.timedelta(seconds=60) == datetime.timedelta(minutes=1)` 的求值结果是什么？

    23. `strftime()` 中的 "f" 代表什么？

    24. `strptime()` 中的 "p" 代表什么？

    25. 哪个函数接受一个日期和时间作为人类可读的字符串，以及一个用于解析它的字符串，然后返回一个 `datetime.datetime` 对象：`strftime()`
    还是 `strptime()`？

    26. 哪个函数返回一个日期和时间作为人类可读的字符串：`strftime()` 还是 `strptime()`？

    27. `datetime.datetime.strptime(''26'', ''%y'')` 的求值结果是一个年份为 1926 还是 2026 的 `datetime`
    对象？

    28. `datetime.datetime.strptime(''76'', ''%y'')` 的求值结果是一个年份为 1976 还是 2076 的 `datetime`
    对象？

    29. `datetime.datetime.strptime("October of ''26", "%B of ''%y")` 的求值结果是一个什么 `datetime`
    对象？

    30. 表达式 `datetime.timedelta(days=0, hours=0, minutes=1, seconds=5).total_seconds()`
    的求值结果是什么？


    ## 从 Python 启动其他程序


    你的 Python 程序可以启动计算机上的其他程序。如果你想从 Python 脚本启动一个外部程序，请将程序的文件名传递给 `subprocess.run()`。一个应用程序的多个打开实例是同一程序的独立进程。


    31. 进程和程序有什么区别？

    32. 传递给 `subprocess.run()` 的参数的数据类型是什么？

    33. 为什么 `subprocess.run([''/System/Applications/Calculator.app''])` 在 macOS 上无法运行计算器应用程序？

    34. `subprocess.Popen()` 函数与 `subprocess.run()` 函数有何不同？

    35. `subprocess.run()` 和 `subprocess.Popen()` 函数返回 `Popen` 对象。如果启动的程序在方法调用时仍在运行，`Popen`
    对象的 `poll()` 方法返回什么？

    36. 如果启动的程序已经退出，`Popen` 对象的 `poll()` 方法返回什么？

    37. 如果一个程序没有错误就退出了，它的退出代码是什么？

    38. 当你调用 `Popen` 对象的 `kill()` 方法时会发生什么？

    39. 当你调用 `Popen` 对象的 `wait()` 方法时会发生什么？

    40. 编写代码，在 Windows 上使用打开 `.txt` 文件的默认应用程序打开一个 `hello.txt` 文件。

    41. 编写代码，在 macOS 和 Linux 上使用打开 `.txt` 文件的默认应用程序打开一个 `hello.txt` 文件。

    42. 编写代码来运行一个名为 `spam.py` 的 Python 脚本。


    ## 练习项目


    在以下项目中，你将创建一个闹钟、一个图像打开器和一个节日提醒器。


    ### 带声音的闹钟


    编写一个名为 `alarm_with_audio(alarm_time, audio_filename)` 的函数，其第一个参数是一个设置闹钟的 `datetime.datetime`
    对象，第二个参数是一个表示要在该时间播放的音频文件名的字符串。该函数应在闹钟时间播放音频文件后才返回。


    这个函数有一些特殊要求。它应该在首次调用时检查音频文件是否存在，如果不存在则引发异常。毕竟，你不想让函数暂停几个小时，然后因为音频文件名有拼写错误而无法播放任何声音。为了知道闹钟时间何时到来，该函数应进入一个循环，反复调用
    `time.sleep(0.1)`（以添加轻微暂停并避免占用 CPU），直到闹钟时间过后一秒。


    要播放音频文件，请调用 `subprocess.run()` 以使用操作系统默认的音频文件应用程序打开该文件。请记住，如果你的音量被静音，你将听不到音频。


    将此程序保存在名为 `alarmWithSound.py` 的文件中。


    ### 图像打开器


    编写一个名为 `open_images_by_name(image_folder, name_match)` 的函数，它接受两个字符串参数。第一个字符串是包含图像的文件夹的名称，第二个字符串是用于执行不区分大小写匹配的搜索词。如果
    `image_folder` 是 `r''C:\memes''`，`name_match` 是 `''cat''`，则该函数应搜索 `C:\memes` 并打开任何文件名包含单词
    cat 的图像，例如 `cat-snuggle.png` 或 `muffin_cat.jpg`。


    出于本练习的目的，*图像文件*是指任何以 `.png`、`.jpg` 或 `.webp` 结尾的文件。使用 `subprocess.run()` 以操作系统默认的图像文件应用程序打开图像。


    我组织良好的 `memes` 文件夹包含 3,300 个命名仔细的图像文件，因此我发现这个程序对于查看某个主题的所有图像非常有用。它对其他人可能有用，也可能没用。


    将此函数保存在名为 `openImagesByName.py` 的文件中。


    ### “下一个节日”报告器


    这是一个以字符串格式表示的日期字典，以及该日期的节日名称：`{''October 31'': ''Halloween'', ''February 14'':
    "Valentine''s Day", ''April 1'': "April Fool''s Day", ''May 1'': ''May Day'',
    ''May 5'': ''Cinco de Mayo''}`。


    编写一个名为 `next_holiday(from_date)` 的函数，它接受一个 `datetime.datetime` 对象，并返回当天的节日或下一个即将到来的节日。例如，如果你调用
    `next_holiday(datetime.datetime(2028, 10, 31, 0, 0, 0))`，该函数应返回 `''Halloween''`，因为
    2028 年 10 月 31 日是万圣节。另一方面，如果你调用 `next_holiday(datetime.datetime(3000, 1, 1, 0,
    0, 0))`，该函数应返回 `"Valentine''s Day"`，因为这是我们节日字典中 3000 年 1 月 1 日之后的第一个节日。


    提示：`from_date.strftime(''%B'')` 将返回月份的名称作为字符串，例如 `''November''` 或 `''May''`，而
    `from_date.strftime(''%d'')` 将返回月份中的日期，例如 `01` 或 `31`。日期总是两位数长，必要时带前导零，这与我们节日字典中的键不匹配。你必须通过调用
    `lstrip()` 字符串方法来去掉这个前导零。


    将此程序保存在名为 `nextHoliday.py` 的文件中。'
