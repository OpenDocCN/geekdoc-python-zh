    \ 5 or the float 5.0?\n- 76. Describe what the abs() function returns.\n- 77.\
    \ What does abs(5) return?\n- 78. What does abs(-5) return?\n\n## How Computers\
    \ Store Data with Binary Numbers\n\nBinary, also called the base-2 number system,\
    \ can represent all of the same numbers that our more familiar base-10 decimal\
    \ number system can. Decimal has 10 digits, 0 through 9, but binary has only 0\
    \ and 1. By representing text, image, audio, and other kinds of data as binary\
    \ numbers, computers can store and process the data. Answer the following questions\
