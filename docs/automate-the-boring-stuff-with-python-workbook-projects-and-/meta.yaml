    ```\n\n## Mouse Movement Recorder\n\n```python\nimport pyautogui, json\n\n# Begin\
    \ recording XY mouse positions to the positions list:\nprint('Recording mouse\
    \ positions. Press Ctrl-C to quit.')\npositions = []\n\ntry:\n    # Constantly\
    \ record the positions of the mouse every one-tenth of a second.\n    while True:\n\
    \        positions.append(pyautogui.position())\n        pyautogui.sleep(0.1)\n\
    except KeyboardInterrupt:\n    # When the user presses Ctrl-C, save the positions\
    \ to a JSON file:\n    with open('mousePositions.json', 'w', encoding='utf-8')\
    \ as file_obj:\n        file_obj.write(json.dumps(positions))\n    print(f'Done.\
    \ {len(positions)} positions recorded.')\n```\n\n## Mouse Movement Playback\n\n\
