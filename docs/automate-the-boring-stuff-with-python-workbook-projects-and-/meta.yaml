    # Practice Projects


    In the following projects, you''ll automate the creation of Pollock-like paintings,
    and record and play back mouse movements.


    # Jackson Pollock Bot


    The American artist Jackson Pollock is known for his “drip technique” of painting,
    which produced interesting art. Let’s write a program that moves the mouse randomly
    in a graphics app (such as MS Paint on Windows or Paintbrush on macOS) to create
    our own Pollock-like paintings.

    Your program should use PyAutoGUI to perform the following actions while the graphics
    app is in focus:


    +   1. Prompt the user to “Hover the mouse cursor at the top-left corner of the
    canvas . . .” and pause for five seconds. This pause gives the user time to determine
    where on the screen the program should draw.

    2. Record the current mouse cursor position in the variables left and top.

    3. Prompt the user to “Hover the mouse cursor at the bottom-right corner of the
    canvas . . .” and pause for five seconds. This position sets the lower bounds
    of the canvas in which to draw.

    4. Record the current mouse cursor position in the variables right and bottom.

    5. Move the mouse to a random position between these two corners. This will be
    the starting point for a randomly drawn line in the graphics app.

    6. Drag the mouse to a random position between these two corners, drawing a line.

    7. Repeat the previous two steps 30 times in total.'
