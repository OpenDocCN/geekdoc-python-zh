    \ the pattern of text produced if the size is, say, 5. There are five rows of\
    \ tree branches, the same as the size. Each row consists of two parts: a number\
    \ of spaces of indentation followed by a number of ^ tree branch characters. I’ve\
    \ replaced the spaces with periods to make them easier to count:\n\n```\nsize\
    \ == 5\n....^    4 spaces, 1 branch\n...^^^   3 spaces, 3 branches\n..^^^^^  2\
    \ spaces, 5 branches\n.^^^^^^^ 1 spaces, 7 branches\n^^^^^^^^^ 0 spaces, 9 branches\n\
    ```\n\nNotice the pattern: The first row has four spaces (one less than the size)\
    \ and one branch character. In the later rows, the number of spaces decreases\
    \ by one and the number of branches increases by two. If we use the statement\
    \ for row_num in range(1, size + 1): for our loop, the number of ' ' space characters\
    \ in each row is (size - row_num) and the number of ^ branch characters in each\
    \ row is (row_num * 2 - 1). You can then use string replication to create the\
    \ string to print: If row_num is 3, then ^ * (row_num * 2 - 1) evaluates to ^^^^^."
