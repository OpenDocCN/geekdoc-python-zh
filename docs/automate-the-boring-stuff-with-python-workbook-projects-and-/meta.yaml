    run the program at *C:\Users\al\Scripts\subfolder\spam.exe*?

    20. What file do you edit on macOS to edit the PATH environment variable?

    21. What file do you edit on Linux to edit the PATH environment variable?

    22. What commands (on Windows and on macOS/Linux) would tell you the folder location
    of a program named *abcd* if you entered abcd in the terminal?


    # Virtual Environments


    Virtual environments are separate installations of Python that have their own
    sets of installed third-party packages. In general, each Python application you
    create needs its own virtual environment. This prevents Python programs that require
    different versions of packages from conflicting with each other.


    +   23. Can Python have multiple versions of the same package installed at the
    same time?

    24. What built-in Python module creates virtual environments?

    25. What is the name commonly used for virtual environment folders?

    26. Once you''ve activated a virtual environment, what command can you run to
