    \n## 嵌套字典和列表\n\n当你对更复杂的事物建模时，你可能会发现需要使用包含其他字典和列表的字典和列表。列表适用于保存有序的值序列，而字典适用于将键与值关联。回答以下关于嵌套字典和列表的问题。\n\
    \n30. 一所学校有学生爱丽丝、鲍勃和卡罗尔，他们都在七年级。另一个学生大卫在六年级。编写一个字典列表来建模此信息。字典应包含键 'name' 和 'grade'。'grade'\
