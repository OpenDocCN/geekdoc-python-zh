    \n19. 假设你有一个名为 `zophie.png` 的图像。如何找到此图像的宽度和高度？\n\n20. 哪个是正确的：`im.crop(335, 345,\
    \ 565, 560)` 还是 `im.crop((335, 345, 565, 560))`？\n\n21. 方法调用 `im.crop((335, 345,\
    \ 565, 560))` 会改变 `im` 中 Image 对象的大小吗？\n\n22. `copy()` 方法是做什么的？\n\n23. `copy()`\
