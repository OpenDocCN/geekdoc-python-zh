- md: '## 20 SENDING EMAIL, TEXTS, AND PUSH NOTIFICATIONS


    Practice Questions


    20.1. A user reports that they are not receiving push notifications from your
    application on their Android device. They have confirmed that notifications are
    enabled in the app settings and in the device settings. What are three possible
    reasons why the notifications might not be arriving?


    20.2. You are designing an email notification system for an e-commerce website.
    The system needs to send order confirmations, shipping updates, and promotional
    emails. Describe the key considerations for ensuring high deliverability and avoiding
    the spam folder.


    20.3. Explain the difference between a transactional email and a marketing email.
    Provide an example of each.


    20.4. What is the purpose of an email service provider (ESP) like SendGrid or
    Mailgun? What are the benefits of using an ESP versus sending emails directly
    from your own server?


    20.5. Describe the process of setting up a domain for email authentication using
    SPF, DKIM, and DMARC. Why is this important?


    20.6. You need to implement a system that sends a text message (SMS) to a user
    when their order ships. What are the key components of such a system, and what
    third-party services might you use?


    20.7. What are the key differences between push notifications on iOS (via Apple
    Push Notification service - APNs) and Android (via Firebase Cloud Messaging -
    FCM)?


    20.8. Explain the concept of a "notification channel" in Android. How does it
    improve the user experience?


    20.9. What are some best practices for crafting effective push notification messages?
    Consider factors like length, timing, and personalization.


    20.10. You are building a feature that allows users to send a "share" link via
    email or text. What security considerations should you keep in mind to prevent
    abuse of this feature?'
  mdcn: '## 20 发送电子邮件、短信和推送通知


    练习题


    20.1. 一位用户报告说，他们无法在自己的 Android 设备上收到来自您应用程序的推送通知。他们已确认在应用设置和设备设置中都启用了通知。通知可能无法送达的三个可能原因是什么？


    20.2. 您正在为一个电子商务网站设计一个电子邮件通知系统。该系统需要发送订单确认、发货更新和促销邮件。请描述确保高送达率并避免进入垃圾邮件文件夹的关键考虑因素。


    20.3. 解释事务性电子邮件和营销电子邮件之间的区别。请各提供一个例子。


    20.4. 像 SendGrid 或 Mailgun 这样的电子邮件服务提供商（ESP）的目的是什么？与直接从您自己的服务器发送电子邮件相比，使用 ESP
    有什么好处？


    20.5. 描述使用 SPF、DKIM 和 DMARC 为电子邮件身份验证设置域名的过程。为什么这很重要？


    20.6. 您需要实现一个系统，在用户订单发货时向他们发送短信（SMS）。此类系统的关键组件是什么？您可能会使用哪些第三方服务？


    20.7. iOS（通过 Apple 推送通知服务 - APNs）和 Android（通过 Firebase 云消息传递 - FCM）上的推送通知有哪些关键区别？


    20.8. 解释 Android 中“通知渠道”的概念。它如何改善用户体验？


    20.9. 制作有效的推送通知消息有哪些最佳实践？请考虑长度、时机和个性化等因素。


    20.10. 您正在构建一个允许用户通过电子邮件或短信发送“分享”链接的功能。为了防止此功能被滥用，您应该考虑哪些安全注意事项？'
