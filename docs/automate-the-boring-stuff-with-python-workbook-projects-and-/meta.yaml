    Each of these projects re-creates a feature that is already available in a PDF
    or word processing app, but implementing them as Python code lets you automatically
    process hundreds or thousands of documents.


    ## PDF Document Word Counter


    Write a function named `pdf_word_count(pdf_filename)` that opens the given PDF
    file, extracts the text from it, and returns a word count of the document. To
    calculate the word count, call the `split()` method on the text. Different PDF
    files and packages may produce different word counts, but a rough value suffices
    for the purposes of this project.


    ## Searching All PDFs in a Folder


    While PDF apps allow you to search for text in a PDF file with CTRL-F, most won''t
    allow you to search an entire folder of files all at once. Write a program that
    extracts all the text from the PDF, searches for some given text, and returns
    each instance where it''s found.


    Define a function named `search_all_PDFs(text, folder=''.'', case_sensitive=False)`
    that searches for the text string argument in PDF files in the folder named `folder`.
    The `case_sensitive` parameter should have a default value of `False`, but if
    passed `True`, the function should report only matches in the same case as text.


    The function should return a list of strings formatted as `''In {filename} on
    page {page_number}''`.


    ## Word Document Logger for Guess the Number


    Your boss wants to see the output of the Guess the Number game in Chapter 3 of
    *Automate the Boring Stuff with Python*. They have the peculiar demand that the
    text be presented in a Word document. Their personal assistant will print the
    Word document, add it to a pile on their desk, and throw it away next week, unread.


    Take the Guess the Number game and add code to it to generate a `guessWordLog.docx`
    file. You can find this source code in the downloadable resources link at https://nostarch.com/automate-boring-stuff-python-3rd-edition.
    After each `print()` function call in the original code, insert code that writes
    the printed text to the Word document as a new paragraph. For example, your code
    could contain something like this:


    ```

    print(''I am thinking of a number between 1 and 20.'')

    doc.add_paragraph(''I am thinking of a number between 1 and 20.'')

    ```


    Follow every call to `input()` with code that adds the player''s input to the
    Word document as well. If the `guessWordLog.docx` file already exists, your program
    should add the new paragraphs to it, after the existing text.


    Save this program in a file named `guessWordLog.py`.


    ## Converting Text Files to Word Documents


    Write a function named `str_to_docx(text, word_filename)`. The text argument should
    be a multiline string of contents to write to a new Word document, while the `word_filename`
    argument should be a string representing the Word document''s filename. Each line
    in the multiline string should become its own `Paragraph` object in the Word file.


    Next, write code for a program that calls `str_to_docx()` to create Word documents
    for every `.txt` file in the current working directory. The program should add
    the `.docx` extension to the end of a file, saving the contents of `spam.txt`
    as a file named `spam.txt.docx`, for example.


    Save this program in a file named `txt2docx.py`.


    ## Bolding Words in a Word Document


    Write a function named `bold_words(filename, word)` that opens the Word document
    in the `filename` file and formats every occurrence of the string in `word` as
    bold text. The function shouldn''t modify the original document''s filename; instead,
    it should write the results to a file with `.bold.docx` appended to the end. For
    example, calling `bold_words(''demo.docx'', ''hello'')` would create a `demo.docx.bold.docx`
    file in which every case-sensitive match of ''hello'' has been bolded. The original
    Word document should remain the same.


    For simplicity, you may assume that the original Word document has no styling
    in it and uses only the default font. Your `bold_words()` function should construct
    the new Word document by creating `Paragraph` objects with separate `Run` objects
    that each have the bold attribute set to True or False. For example, if `demo.docx`
    contained a single paragraph with the text "Say hello to Alice," calling `bold_words(''demo.docx'',
    ''hello'')` would create a Word document with one `Paragraph` object and three
    `Run` objects for the text ''Say '', ''hello'', and '' to Alice''. The middle
    `Run` object containing ''hello'' would be set to bold.


    Save this program in a file named `boldWords.py`.


    # 18


    ## CSV, JSON, AND XML FILES


    CSV, JSON, and XML are all data serialization formats used to store data as plaintext
    files. Whether you’re dealing with spreadsheets exported as CSV files or web APIs
    returning JSON data, being able to read, write, and edit serialization formats
    with Python code will help you automate data-related tasks with ease.


    ### LEARNING OBJECTIVES


    - Understand the popular plaintext data serialization formats CSV, JSON, and XML.

    - Know the difference between the spreadsheet-like CSV format and the data structure–like
    JSON and XML formats.

    - Know the benefits of using the Python packages for the CSV, JSON, and XML formats
    over writing and reading these plaintext files directly.

    - Be able to use the advanced features of the csv module, such as DictReader and
    DictWriter objects.

    - Understand the role of JSON and XML data in accessing online service APIs.


    ## Practice Questions


    These questions test your understanding of Python’s csv, json, and xml modules
    for working with text-based file formats.


    ## The CSV Format


    Each line in a CSV file (which uses the .csv file extension) represents a row
    in a spreadsheet, and commas separate the cells in the row. Many apps and programming
    languages support these files, making them a straightforward way to represent
    spreadsheet data.


    1. Of the CSV, JSON, and XML formats, which most closely resembles a spreadsheet?

    2. What does CSV stand for?

    3. Are CSV files plaintext files? Can you view them in a text editor such as Notepad
    or TextEdit?

    4. What data types do CSV files support?

    5. CSV files don’t have as many features as Excel spreadsheet files. What is their
    main advantage?

    6. True or false: The data in a CSV file cannot include commas.

    7. Passing the filename of a CSV file to csv.reader() and csv.writer() doesn’t
    seem to work. Why?

    8. The csv.reader() function returns a reader object. How can you get a list value
    containing all the rows of data from this object?

    9. The csv.reader() function returns a reader object. How can you loop over each
    row of data from this object?

    10. Assume the reader object’s data has been converted into a list value stored
    in a variable named example_data. Which row and column does example_data[6][1]
    access?

    11. What data type can you pass to the writerow() method of writer objects?

    12. A reader object represents each row as a list of strings. How does a DictReader
    object represent each row?

    13. When you read a CSV file with a DictReader object, where does the object get
    its keys?

    14. What data type can you pass to the writerow() method of DictWriter objects?

    15. What is wrong with the following code?


    ```

    file_obj = open(''example.csv'')

    writer = csv.writer(file_obj)

    ```


    16. What does TSV stand for?

    17. How can you make the csv module read a TSV file?


    ## Versatile Plaintext Formats


    While CSV files are useful for storing rows of data that have the exact same columns,
    the JSON and XML formats can store a variety of data structures. These formats
    aren''t specific to Python; many programming languages have functions for reading
    and writing this kind of data. Both JSON and XML organize data using the equivalent
    of nested Python dictionaries and lists.


    18. What is one term for dictionary-like data structures used in other programming
    languages?

    19. What is a term for list-like data structures used in other programming languages?

    20. Plaintext formats like JSON and XML aren''t disk-space efficient. What advantage
    do they have?

    21. What does JSON stand for?

    22. What does XML stand for?

    23. Which format resembles Python syntax more closely, JSON or XML?

    24. Of [''cat'', ''dog'',] and ["cat", "dog"], which is Python syntax and which
    is JSON syntax?

    25. Of [True, False] and [true, false], which is Python syntax and which is JSON
    syntax?

    26. Which format do APIs usually use to deliver their responses, JSON or XML?

    27. In the JSON module, what does the s in loads() and dumps() stand for?

    28. What code takes the Python dictionary {''temperature'': 72} and returns the
    Python string ''{"temperature": 72}''?

    29. What other markup language does XML syntax resemble?

    30. What is the closing XML tag for <spam>?

    31. Why is <person><name>Alice Doe</person></name> invalid XML syntax?

    32. Write the following Python data as JSON: {"address": {"street": "100 Larkin
    St.", "city": "San Francisco", "zip": "94102"}}.

    33. Write the following Python data as XML: {"address": {"street": "100 Larkin
    St.", "city": "San Francisco", "zip": "94102"}}.

    34. What are the names of the XML attributes in the following XML: <address street="100
    Larkin St." city="San Francisco" zip="94102" />?'
