  md: '# INTRODUCTION


    Programming can be an intimidating topic. When people ask me if they’re learning
    the “right” way or reading the “right” books, I remind them that programming is
    a skill. Like all skills, you get better by doing it and challenging yourself.
    Calm seas don’t make skilled sailors.


    I wrote the original *Automate the Boring Stuff with Python* book over 10 years
    ago, and since then it has sold over a half-million copies. That book teaches
    the syntax and third-party packages of the Python programming language, but you
    probably picked up this workbook because you know that the world of programming
    can’t be captured by any single text. In these pages, you’ll find additional practice
    questions and projects to challenge your ability to automate boring tasks with
    code.'
