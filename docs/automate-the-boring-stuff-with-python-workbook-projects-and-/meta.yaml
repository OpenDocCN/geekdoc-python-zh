    # INTRODUCTION


    Programming can be an intimidating topic. When people ask me if they’re learning
    the “right” way or reading the “right” books, I remind them that programming is
    a skill. Like all skills, you get better by doing it and challenging yourself.
    Calm seas don’t make skilled sailors.


    I wrote the original *Automate the Boring Stuff with Python* book over 10 years
    ago, and since then it has sold over a half-million copies. That book teaches
    the syntax and third-party packages of the Python programming language, but you
    probably picked up this workbook because you know that the world of programming
    can’t be captured by any single text. In these pages, you’ll find additional practice
    questions and projects to challenge your ability to automate boring tasks with
    code.'
  - '[PAGE 23]


    # How to Use This Workbook


    The 24 chapters in this book correspond to the 24 chapters of *Automate the Boring
    Stuff with Python*, 3rd edition. You can work through the two books simultaneously
    or use this workbook if you’ve already read the original text and want to assess
    how well you’ve retained that knowledge.


    But even if you haven’t read the source text, you’ll find this workbook useful,
    especially if you fall into any of the following categories:


    +   - Students of other Python textbooks or courses looking to fill in the gaps
    in their knowledge

    - Self-taught programmers who want to test how well they’ve mastered Python’s
    syntax and ecosystem

    - Instructors looking for additional curriculum materials

    - Programmers experienced in other languages who want to include Python in their
    toolkit of skills


    No matter which group you fall into, I recommend working through the workbook’s
    problems multiple times to secure your understanding of the underlying ideas.
    Mastery comes not from obtaining knowledge but from being able to recall knowledge
    you’ve previously obtained. One way to achieve mastery is through *spaced repetition*:
    the practice of answering questions over time, with a focus on the questions you
    find most difficult. (Flash cards are a common form of spaced repetition studying.)
    Use this workbook for continuous practice, rather than reading it once and putting
    it back on the shelf to gather dust.


    # About the Activities


    This book contains questions and practice projects organized in chapters and sections
    that correspond to those in *Automate the Boring Stuff with Python*. You’ll find
    the answers to the questions at the back of the workbook, along with light explanations
    and complete, runnable solution programs for the practice projects. There are
    many correct ways to write a program, and yours don’t have to match these solutions
    exactly. If you’re at a loss as to where to begin with your program, however,
    you can glance at the solution code before making a renewed attempt.


    Here’s a brief rundown of the kinds of questions you’ll encounter in each chapter:


    **Chapter 1: Python Basics** What do expressions and statements look like? What
    are variables, and what kinds of data can they hold?


    **Chapter 2: if-else and Flow Control** How do conditions and expressions evaluate
    to Boolean values? How does indentation create blocks? What’s the difference between
    if, elif, and else statements?


    **Chapter 3: Loops** What’s the difference between for and while loops, and what
    are the different arguments to the range() function? What do break and continue
    statements do?


    **Chapter 4: Functions** How can you create your own functions with parameters
    and return values? How do variables work in global and local scopes?'
  - '[PAGE 24]


    **Chapter 5: Debugging** How do logging and the debugger save you time when fixing
    your programs? What are breakpoints and the different ways to step through a program?


    **Chapter 6: Lists** What do lists make possible? How can you add, access, change,
    and remove data from lists? How do lists inside lists work?


    **Chapter 7: Dictionaries and Structuring Data** How are key-value pairs in dictionaries
    different from data in lists? How can dictionaries and lists model real-world
    things as data?


    **Chapter 8: Strings and Text Editing** How does data represent text, and what
    are all the text-related methods that Python offers?


    **Chapter 9: Text Pattern Matching with Regular Expressions** How can you specify
    not just text, but a pattern of text using the mini-language of regular expressions?


    **Chapter 10: Reading and Writing Files** How do computers organize files and
    folders in a filesystem? What does the pathlib module do? How does Python store
    data in text files and then read them back into programs later?


    **Chapter 11: Organizing Files** How can you list, move, rename, copy, and delete
    files on your computer?


    **Chapter 12: Designing and Deploying Command Line Programs** Once you get your
    program working, how can you easily run it without opening the code editor? How
    can you get it to run on someone else''s computer?


    **Chapter 13: Web Scraping** How can your Python scripts download files, control
    a web browser, and retrieve information off of the internet?


    **Chapter 14: Excel Spreadsheets** How can you create, access, and edit Excel
    spreadsheets files (even if you don''t have Excel installed)? How do you create
    charts and formulas in these files?


    **Chapter 15: Google Sheets** How can you create, access, and edit online Google
    Sheets spreadsheets? How do you set up your Python script to safely use your Google
    account?


    **Chapter 16: SQLite Databases** What are databases and tables, and what is the
    language for accessing and updating data in them? What are the advantages of SQLite''s
    simplicity compared to other databases?


    **Chapter 17: PDF and Word Documents** How can you read and edit the content of
    PDF and Microsoft Word files?


    **Chapter 18: CSV, JSON, and XML Files** What are data serialization formats,
    and what are they used for? What''s the difference between CSV, JSON, and XML,
    and how have their histories shaped their use?


    **Chapter 19: Keeping Time, Scheduling Tasks, and Launching Programs** How are
    dates, timestamps, and calendars represented as data by programs? How can you
    schedule your Python programs to run other programs?


    **Chapter 20: Sending Email, Texts, and Push Notifications** How can your Python
    scripts send notifications to your email address or mobile phone?'
