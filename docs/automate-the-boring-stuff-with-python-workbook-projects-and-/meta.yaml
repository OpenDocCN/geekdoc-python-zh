    # 实践项目


    在以下项目中，你将从一组漫画中提取文本，以便搜索图像，并自动调整图像大小。


    # 可搜索的网络漫画


    我喜欢下载我在网上找到的各种网络漫画和表情包的图片。我有一个很大的收藏——大到我很难找到特定的那些。我无法对图像内容进行文本搜索，但我可以使用 PyTesseract
    从图像中提取文本，然后搜索该文本。它不会完美，但大多数时候应该有效。


    创建一个程序，对当前工作目录中的每个 .png 图像运行 PyTesseract，并创建一个将图像文件名映射到其提取文本的字典。你可以将此字典作为 JSON
    存储在名为 `imageText.json` 的文件中，这样你只需运行一次提取程序。然后，你可以在任何编辑器中打开 JSON 文件，并使用 CTRL-F 查找你要查找的文本。


    你可以从本书的可下载内容 https://nostarch.com/automate-workbook 下载一组要使用的图像。


    将此程序保存在名为 `makeImageTextJSON.py` 的文件中。


    # 增强网络漫画中的文本


    让我们扩展上一个实践项目的程序。网络漫画图像通常比高分辨率照片更小、更简单。有时它们的文本太小，PyTesseract 无法准确识别。你可以尝试的一个技巧是使用
    Pillow 增加网络漫画图像的大小，并检查这是否改善了 PyTesseract 的文本识别。


    例如，当我对 https://xkcd.com/1968/ 上的原始图像运行 PyTesseract 时，它返回以下字符串：


    ```

    ''fo SOMES AD NCED A UELOES SELRQURE\nEROUEE fb OMB, NGREEPARLE PRD REBELS AGRO\nee
    HUMAN CONTROL 22\n\n+ >\n\n2\nTHE PART LOTS OF PEOPLE\nSEEM To WORRY ABOUT\n\nTHE
    PART I WORRY ABOUT\n\n''

    ```


    如果我先使用 Pillow 将图像大小加倍，然后运行 PyTesseract，它会给我更准确的结果：


    ```

    ''AI BECOMES SELF-AWARE\nAND REBELS AGAINST\nHUMAN CONTROL\n\nA\nTHE PART LOTS
    OF PEOPLE\nSEEM To WORRY ABOUT\n\nTHE PART I WORRY ABOUT\n\n''

    ```


    许多人误读我的名字 Al 为术语 AI，但 PyTesseract 在这种情况下似乎犯了相反的错误。你的机器可能会根据使用的 PyTesseract 版本产生略有不同的文本。


    创建上一个实践项目程序的更新版本，该版本自动将图像大小调整为原始宽度和高度的两倍，然后对放大的图像执行 OCR。将放大文件名到提取文本的映射字典作为 JSON
    保存在名为 `imageTextEnlarged.json` 的文件中。将此文件中的文本准确性与上一个项目中的 `imageText.json` 中的文本进行比较。


    将此程序保存在名为 `makeImageTextEnlargedJSON.py` 的文件中。


    ## 23


    ## 控制键盘和鼠标


    无论你需要点击重复的菜单、填写表单，还是与图形应用程序交互，PyAutoGUI 都能使你的脚本模拟人类与计算机的交互。掌握它的使用将帮助你自动化几乎任何你执行的任务，节省你的时间并减少你的手动工作。


    ### 学习目标


    - 控制鼠标光标，使其在你计算机上运行的其他应用程序中点击、拖动和滚动。

    - 控制键盘向其他应用程序发送按键，包括快捷键组合。

    - 了解 GUI 自动化的局限性，以及在程序卡住或失控时如何进行紧急关闭。

    - 使用 PyAutoGUI 的 MouseInfo 功能来帮助你规划 Python 脚本应该移动和点击鼠标的位置。'
