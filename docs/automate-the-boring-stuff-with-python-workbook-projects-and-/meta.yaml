    # Chapter 22: Recognizing Text in Images


    Answers to the Practice Questions


    +   1. Tesseract is the actual OCR engine, and PyTesseract is the Python package
    that works with Tesseract.

    2. No. Your Python scripts require both PyTesseract and Tesseract to be installed.

    3. The `eng.traineddata` and `jpn.traineddata` files contain the language packs
    for English and Japanese, respectively.

    4. No. Tesseract has different installation steps for Windows, macOS, and Linux.

    5. Yes. PyTesseract requires Pillow to be installed.

    6. The `image_to_string()` function takes an Image object argument and returns
    a string of the text in that image.

    7. No. PyTesseract cannot identify fonts, font sizes, and font colors. Tesseract
    returns only plaintext strings.

    8. Yes. PyTesseract can extract text from a scanned document of typed text.

    9. No. PyTesseract cannot extract text from a scanned document of handwritten
    text (or, at least, not with any degree of reliability). That’s because the language
    pack models have been trained on typed text.

    10. No. PyTesseract cannot extract the text of a license plate (or any other text)
    from photographs. That’s because the language pack models have been trained on
    typed text.

    11. Yes. PyTesseract preserves the layout of text such as hyphenated words broken
    across lines.

    12. LLMs are somewhat reliable at “cleaning up” the extracted text from PyTesseract,
    but this output always requires human review to confirm its accuracy.

    13. Yes and no. While the spellchecker can identify incorrectly extracted words
    from PyTesseract, the spellchecker will also identify correctly extracted words
    misspelled in the original image.

    14. No. The spellchecker does not identify correctly or incorrectly extracted
    numbers.

    15. Tesseract identifies English characters by default.

    16. The `get_languages()` function returns a list of all the languages that Tesseract
    supports.'
