  - '[PAGE 161]


    +   31. What is the difference between a process and a program?

    32. What is the data type of the argument passed to `subprocess.run()`?

    33. Why doesn''t `subprocess.run([''/System/Applications/Calculator.app''])` run
    the calculator app on macOS?

    34. How is the `subprocess.Popen()` function different from the `subprocess.run()`
    function?

    35. The `subprocess.run()` and `subprocess.Popen()` functions return Popen objects.
    What does the `poll()` method of Popen objects return if the launched program
    is still running at the time of the method call?

    36. What does the `poll()` method of Popen objects return if the launched program
    has quit?

    37. If a program has quit without errors, what is its exit code?

    38. What happens when you call a Popen object''s `kill()` method?

    39. What happens when you call a Popen object''s `wait()` method?

    40. Write the code to open a `hello.txt` file using the default application for
    opening `.txt` files on Windows.

    41. Write the code to open a `hello.txt` file using the default application for
    opening `.txt` files on macOS and Linux.

    42. Write the code to run a Python script named `spam.py`.


    # Practice Projects


    In the following projects, you''ll create an alarm, an image opener, and a holiday
    reminder.


    # Alarm with Sound


    Write a function called `alarm_with_audio(alarm_time, audio_filename)` whose first
    argument is a `datetime.datetime` object that sets an alarm and whose second argument
    is a string representing an audio filename to play at that time. The function
    should return only after playing the audio file at the time of the alarm.


    This function has a few special requirements. It should check whether the audio
    file exists when first called and should raise an exception if it doesn''t. After
    all, you don''t want the function to pause for hours and then fail to play any
    sound because the audio filename had a typo. To know when the time of the alarm
    has arrived, the function should enter a loop that repeatedly calls `time.sleep(0.1)`
    (to add a slight pause and avoid hogging the CPU) until one second after the alarm
    time.


    To play the audio file, call `subprocess.run()` to open the file with the operating
    system''s default application for audio files. Keep in mind that you won''t hear
    the audio if your volume is muted.


    Save this program in a file named `alarmWithSound.py`.'
  - '[PAGE 162]


    # Image Opener


    Write a function named `open_images_by_name(image_folder, name_match)` that takes
    two string arguments. The first string is the name of a folder containing images,
    and the second string is a search term with which to perform a case-insensitive
    match. If `image_folder` is `r''C:\memes''` and `name_match` is `''cat''`, the
    function should search `C:\memes` and open any image filenames that contain the
    word cat, such as `cat-snuggle.png` or `muffin_cat.jpg`.


    For the purposes of this exercise, an *image file* is any file that ends with
    `.png`, `.jpg`, or `.webp`. Use `subprocess.run()` to open the image with the
    operating system''s default application for image files.


    My well-organized `memes` folder contains 3,300 carefully named image files, so
    I find this program quite useful for seeing all images of a certain topic. It
    may or may not be as useful to others.


    Save this function in a file named `openImagesByName.py`.


    # “Next Holiday” Reporter


    Here is a dictionary of dates formatted as strings, along with the name of the
    holiday on that date: `{''October 31'': ''Halloween'', ''February 14'': ''Valentine''s
    Day'', ''April 1'': ''April Fool''s Day'', ''May 1'': ''May Day'', ''May 5'':
    ''Cinco de Mayo''}`.


    Write a function named `next_holiday(from_date)` that accepts a `datetime.datetime`
    object and returns either the holiday on that day or the next upcoming holiday.
    For example, if you called `next_holiday(datetime.datetime(2028, 10, 31, 0, 0,
    0))`, the function should return `''Halloween''` because October 31, 2028, is
    on Halloween. On the other hand, if you call `next_holiday(datetime.datetime(3000,
    1, 1, 0, 0, 0))`, the function should return `''Valentine''s Day''` because that
    is the first holiday after January 1, 3000, in our dictionary of holidays.


    Hint: `from_date.strftime(''%B'')` will return the name of the month as a string,
    like `''November''` or `''May''`, and `from_date.strftime(''%d'')` will return
    the day of the month, like `01` or `31`. The day will always be two digits long,
    with a leading zero if necessary, which doesn''t match the keys in our dictionary
    of holidays. You''ll have to strip out this leading zero by calling the `lstrip()`
    string method.


    Save this program in a file named `nextHoliday.py`.'
- md: '## 20 SENDING EMAIL, TEXTS, AND PUSH NOTIFICATIONS


    At this point, you’ve written programs to work with strings and text pattern recognition,
    but you’ve been limited to accessing text data on your computer. You can also
    send text to other people through email, SMS, and push notifications. Python’s
    rich ecosystem of packages has third-party libraries for all of these features.


    ### LEARNING OBJECTIVES

    - Be able to log in to your Gmail account using Python to search, read, and send
    email.

    - Use code to make and download attachments to your email.

    - Send SMS messages from Python scripts by using SMS email gateways, while understanding
    their limitations.

    - Send and receive push notifications that you can view on your smartphone.


    ## Practice Questions


    These questions test your understanding of the EZGmail package and ntfy service
    that your internet-connected computer can use to communicate across the globe.


    ### The Gmail API


    Gmail owns close to one-third of the email client market share, and you''ve most
    likely had at least one Gmail email address. Because of Gmail''s additional security
    and antispam measures, controlling a Gmail account is best done through the ezgmail
    module rather than through the smtplib and imaplib modules in Python''s standard
    library.


    1. What should you do if you accidentally share the credentials or token files
    for the Gmail API?

    2. What variable in the ezgmail module contains the email address from which you''re
    sending email?

    3. What does this function call do: `ezgmail.send(''alice@example.com'', ''Hello!'',
    ''Here is that graduation photo.'', [''grad.jpg''])`?

    4. What data type represents a single received email?

    5. What data type represents a series of back-and-forth emails?

    6. Name two attributes of a GmailMessage object.

    7. What function call returns the 50 most recent email threads?

    8. What function call returns email messages that mention "cake recipes"?

    9. What does `ezgmail.search(''from:alice@example.com'')` return?

    10. What does `ezgmail.summary(ezgmail.unread())` do?

    11. If the variable spam contains a GmailMessage object, what code downloads all
    of the file attachments in that email?

    12. What happens if you download an attachment that has the same filename as a
    file on your computer?


    ### SMS Email Gateways


    People are more likely to be near their smartphones than their computers, so text
    messages are often a more reliable way of sending immediate notifications than
    email. Also, text messages are usually shorter, making it more likely that a person
    will get around to reading them. The easiest, though not most reliable, way to
    send text messages is by using an SMS email gateway, an email server that a cell
    phone provider has set up to receive texts via email and then forward them to
    the recipient as text messages.


    13. What does *SMS* stand for?

    14. What does *MMS* stand for?

    15. Can your Python program send text messages by sending email to an SMS email
    gateway?

    16. Can your Python program receive text messages by receiving email from an SMS
    email gateway?

    17. What information besides the phone number do you need to send a text through
    an SMS email gateway?

    18. How much do SMS email gateways cost to use?

    19. What are two disadvantages of using SMS email gateways instead of a dedicated
    telecommunications API?


    ### Push Notifications


    HTTP pub-sub notification services allow you to send and receive short, disposable
    messages over the internet via HTTP web requests. Installing the ntfy app on your
    mobile phone allows you to receive these notifications. This open source app can
    be found in the app stores for Android and iPhone. You can also receive notifications
    in your web browser by going to https://ntfy.sh/app. Your Python programs can
    send push notifications using the Requests package covered in Chapter 13 of this
    workbook.


    20. What module can you use for interacting with the ntfy service?

    21. How can you receive ntfy notifications on your smartphone?

    22. Can you receive ntfy notifications on your laptop without using Python?

    23. What protocol does the ntfy service use to send and receive push notifications?

    24. What function do you use to send a push notification to the ntfy service?

    25. How much does it cost to use the ntfy service?

    26. What are the lowest and highest priority levels for ntfy messages?

    27. What does this code do: `requests.post(''https://ntfy.sh/hello'', ''goodbye'')`?

    28. What can keyword arguments for the headers parameter in `requests.post()`
    do?


    ## Practice Projects


    Automate sending “quote of the day” messages with the following projects.


    ### “Quote of the Day” Email


    Create a text file named `qotd.txt` that has one inspirational or memorable quote
    per line. Then, create a program that reads this file and randomly selects one
    quote to send in an email message. Place the recipient’s email address in a variable
    named `RECIPIENT`. The program should also print the email recipient and the quote
    sent, and maintain a text file named `qotdLastSent.txt` with the last date on
    which an email was sent.


    If it already sent an email today, the program should print “Email already sent
    today. Exiting . . .” and quit. You can get a string of the current date by calling
    `str(datetime.date.today())`.


    Save this program in a file named `qotdEmail.py`.


    ### “Quote of the Day” Push Notification


    This project is the same as the previous project, except it should send the quote
    as an ntfy notification. The `RECIPIENT` variable should be a string of the topic
    to which the quote was sent. Unlike with the email version, anyone listening to
    the ntfy topic can receive this message, so multiple people can enjoy the quote.


    Save this program in a file named `qotdPush.py`.


    ## 21 MAKING GRAPHS AND MANIPULATING IMAGES


    A picture is worth a thousand words, and your code can handle high-resolution
    image files just as it can any other form of data. The third-party Pillow package
    has several functions for editing images and drawing lines and text with the precision
    and speed of automated scripts. To generate line graphs, bar graphs, scatter plots,
    and pie charts, you can use Matplotlib, a popular library for making professional-looking
    graphs.


    ### LEARNING OBJECTIVES

    - Understand how computers store images, pixels, and colors.

    - Perform basic image editing by resizing, cropping, and rotating images with
    Pillow.

    - Draw shapes and text onto images, or overlay images on top of each other.

    - Copy and paste images to the clipboard.

    - Generate graphs using Matplotlib.


    ## Practice Questions


    These questions test your knowledge of the Pillow library, image file concepts
    in general, and graphing with Matplotlib.


    ### Computer Image Fundamentals


    Computer programs often represent a color in an image as an *RGBA value*, a group
    of numbers that specify the amount of red, green, blue, and alpha (transparency)
    to include. Image pixels are addressed with x- and y-coordinates, which, respectively,
    specify a pixel''s horizontal and vertical locations.


    1. What color is (0, 255, 0, 0)?

    2. What does the *A* in *RGBA* represent?

    3. What function can you call to get the RGBA value of the color “chocolate”?

    4. What code returns a list of all the color names in the Pillow library?

    5. What are the x- and y-coordinates of the origin?

    6. In which corner of an image is the origin?

    7. What is the RGBA tuple for the color purple?

    8. (255, 255, 255, 255) is the RGBA tuple for what color?

    9. (0, 0, 0, 255) is the RGBA tuple for what color?

    10. In a 100-pixel-wide and 100-pixel-tall image, what is the coordinate of the
    pixel in the bottom-right corner?

    11. What is a box tuple in the context of the Pillow library?

    12. How can you calculate the width of the box from the data in a box tuple?

    13. What are the width and height of a (5, 20, 10, 30) box tuple?


    ### Manipulating Images with Pillow


    An *Image* object has several useful attributes that give you basic information
    about the image file from which it was loaded: its width and height, the filename,
    and the graphics format. The object''s methods allow you to crop, rotate, resize,
    extract, and duplicate portions of the image.


    14. You do not run `import pillow` to import Pillow. What instruction do you run?

    15. Can Pillow read images in the `.png`, `.jpg`, and `.gif` formats?

    16. What does the `Image.open()` function return?'
  mdcn: '## 20 发送电子邮件、短信和推送通知


    至此，你已经编写了处理字符串和文本模式识别的程序，但一直局限于访问计算机上的文本数据。你也可以通过电子邮件、短信和推送通知向其他人发送文本。Python丰富的生态系统中有第三方库支持所有这些功能。


    ### 学习目标

    - 能够使用Python登录你的Gmail账户，以搜索、阅读和发送电子邮件。

    - 使用代码创建和下载电子邮件附件。

    - 通过短信电子邮件网关从Python脚本发送短信，同时了解其局限性。

    - 发送和接收可以在智能手机上查看的推送通知。


    ## 练习题


    这些题目测试你对EZGmail包和ntfy服务的理解，你的联网计算机可以使用它们进行全球通信。


    ### Gmail API


    Gmail占据了近三分之一的电子邮件客户端市场份额，你很可能至少拥有一个Gmail电子邮件地址。由于Gmail额外的安全和反垃圾邮件措施，最好通过`ezgmail`模块而不是Python标准库中的`smtplib`和`imaplib`模块来控制Gmail账户。


    1. 如果你不小心泄露了Gmail API的凭据或令牌文件，应该怎么办？

    2. `ezgmail`模块中的哪个变量包含你发送电子邮件的地址？

    3. 这个函数调用做什么：`ezgmail.send(''alice@example.com'', ''Hello!'', ''Here is that graduation
    photo.'', [''grad.jpg''])`？

    4. 什么数据类型表示单个收到的电子邮件？

    5. 什么数据类型表示一系列来回的电子邮件？

    6. 列出`GmailMessage`对象的两个属性。

    7. 哪个函数调用返回最近的50个电子邮件线程？

    8. 哪个函数调用返回提及“蛋糕食谱”的电子邮件消息？

    9. `ezgmail.search(''from:alice@example.com'')`返回什么？

    10. `ezgmail.summary(ezgmail.unread())`做什么？

    11. 如果变量`spam`包含一个`GmailMessage`对象，什么代码可以下载该电子邮件中的所有文件附件？

    12. 如果你下载的附件与计算机上的文件同名会发生什么？


    ### 短信电子邮件网关


    人们更可能靠近智能手机而不是电脑，因此短信通常是比电子邮件更可靠的即时通知方式。此外，短信通常更短，使得人们更有可能抽空阅读它们。发送短信最简单（尽管不是最可靠）的方法是使用短信电子邮件网关，这是由手机运营商设置的电子邮件服务器，用于通过电子邮件接收短信，然后将其作为短信转发给收件人。


    13. *SMS*代表什么？

    14. *MMS*代表什么？

    15. 你的Python程序可以通过向短信电子邮件网关发送电子邮件来发送短信吗？

    16. 你的Python程序可以通过从短信电子邮件网关接收电子邮件来接收短信吗？

    17. 除了电话号码，你还需要什么信息才能通过短信电子邮件网关发送短信？

    18. 使用短信电子邮件网关需要花费多少？

    19. 使用短信电子邮件网关而不是专用电信API的两个缺点是什么？


    ### 推送通知


    HTTP发布-订阅通知服务允许你通过HTTP网络请求在互联网上发送和接收简短、一次性的消息。在你的手机上安装ntfy应用程序可以让你接收这些通知。这个开源应用程序可以在Android和iPhone的应用商店中找到。你也可以通过访问https://ntfy.sh/app在网页浏览器中接收通知。你的Python程序可以使用本工作手册第13章介绍的Requests包发送推送通知。


    20. 你可以使用哪个模块与ntfy服务交互？

    21. 你如何在智能手机上接收ntfy通知？

    22. 你可以在不使用Python的情况下在笔记本电脑上接收ntfy通知吗？

    23. ntfy服务使用什么协议发送和接收推送通知？

    24. 你使用哪个函数向ntfy服务发送推送通知？

    25. 使用ntfy服务需要花费多少？

    26. ntfy消息的最低和最高优先级级别是什么？

    27. 这段代码做什么：`requests.post(''https://ntfy.sh/hello'', ''goodbye'')`？

    28. `requests.post()`中`headers`参数的关键字参数可以做什么？


    ## 练习项目


    通过以下项目自动化发送“每日一言”消息。


    ### “每日一言”电子邮件


    创建一个名为`qotd.txt`的文本文件，每行包含一句鼓舞人心或令人难忘的名言。然后，创建一个程序读取该文件并随机选择一句名言，通过电子邮件发送。将收件人的电子邮件地址放在名为`RECIPIENT`的变量中。程序还应打印电子邮件收件人和发送的名言，并维护一个名为`qotdLastSent.txt`的文本文件，记录上次发送电子邮件的日期。


    如果今天已经发送过电子邮件，程序应打印“Email already sent today. Exiting . . .”并退出。你可以通过调用`str(datetime.date.today())`获取当前日期的字符串。


    将此程序保存在名为`qotdEmail.py`的文件中。


    ### “每日一言”推送通知


    此项目与前一个项目相同，只是它应该将名言作为ntfy通知发送。`RECIPIENT`变量应该是名言发送到的主题字符串。与电子邮件版本不同，任何监听该ntfy主题的人都可以接收此消息，因此多个人可以欣赏这句名言。


    将此程序保存在名为`qotdPush.py`的文件中。


    ## 21 制作图表和处理图像


    一图胜千言，你的代码可以像处理任何其他形式的数据一样处理高分辨率图像文件。第三方Pillow包提供了多个函数，用于以自动化脚本的精确度和速度编辑图像、绘制线条和文本。要生成折线图、条形图、散点图和饼图，你可以使用Matplotlib，这是一个用于制作专业外观图表的流行库。


    ### 学习目标

    - 理解计算机如何存储图像、像素和颜色。

    - 使用Pillow通过调整大小、裁剪和旋转图像来执行基本图像编辑。

    - 在图像上绘制形状和文本，或将图像叠加在一起。

    - 将图像复制和粘贴到剪贴板。

    - 使用Matplotlib生成图表。


    ## 练习题


    这些题目测试你对Pillow库、通用图像文件概念以及使用Matplotlib绘图的知识。


    ### 计算机图像基础


    计算机程序通常将图像中的颜色表示为*RGBA值*，这是一组数字，指定要包含的红色、绿色、蓝色和alpha（透明度）的量。图像像素通过x和y坐标寻址，分别指定像素的水平和垂直位置。


    1. (0, 255, 0, 0)是什么颜色？

    2. *RGBA*中的*A*代表什么？

    3. 你可以调用哪个函数来获取颜色“chocolate”的RGBA值？

    4. 什么代码返回Pillow库中所有颜色名称的列表？

    5. 原点的x和y坐标是什么？

    6. 原点在图像的哪个角落？

    7. 紫色的RGBA元组是什么？

    8. (255, 255, 255, 255)是什么颜色的RGBA元组？

    9. (0, 0, 0, 255)是什么颜色的RGBA元组？

    10. 在一个宽100像素、高100像素的图像中，右下角像素的坐标是什么？

    11. 在Pillow库的上下文中，什么是框元组？

    12. 如何从框元组的数据计算框的宽度？

    13. (5, 20, 10, 30)框元组的宽度和高度是多少？


    ### 使用Pillow处理图像


    *Image*对象有几个有用的属性，提供有关从中加载的图像文件的基本信息：其宽度和高度、文件名和图形格式。该对象的方法允许你裁剪、旋转、调整大小、提取和复制图像的部分。


    14. 你不是运行`import pillow`来导入Pillow。你运行什么指令？

    15. Pillow可以读取`.png`、`.jpg`和`.gif`格式的图像吗？

    16. `Image.open()`函数返回什么？'
