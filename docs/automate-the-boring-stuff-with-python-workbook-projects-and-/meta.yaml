    Clocks and calendars aren’t as straightforward as text and numeric data, but Python’s
    time and datetime modules make timestamps and date information easy to handle.
    Your computer’s clock can schedule programs to run code at some specified time
    and date or at regular intervals. By learning to leverage these features, you
    can make use of all the software available on your computer.


    ![](img/11f9f70403175f96d058cd4bde194c77_158_0.png)


