    \n许多错误的发生是因为程序员错误地识别了变量存在的作用域。为了测试你是否正确理解 Python 的作用域规则，判断以下每个程序的输出。\n\n```\n\
    36. def func(spam):\n        print(spam)\n        spam = 'dog'\n    func('cat')\n\
    \n37. def func(eggs):\n        print(spam)\n        spam = 'dog'\n    func('cat')\n\
