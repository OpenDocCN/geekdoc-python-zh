    \ spreadsheet app. Describe what strike=True did to the cell's font style.\n\n\
    ## Formulas\n\nExcel formulas, which begin with an equal sign (=), can configure\
    \ cells to contain values calculated from other cells. OpenPyXL can place formulas\
    \ into cells, but it doesn't have the ability to calculate Excel formulas or populate\
    \ cells with the results. You'll need to open the spreadsheet in Excel to have\
    \ it run the formulas and save their results.\n\n- 27. What character do cells\
    \ with Excel formulas begin with?\n- 28. Name one Excel formula.\n- 29. Are Excel\
    \ formulas the same as Python functions?\n- 30. Can OpenPyXL carry out the calculations\
    \ of Excel formulas?\n- 31. How can you have OpenPyXL return the resulting calculation\
    \ of an Excel formula in a cell, instead of the text of the formula itself?\n\
    - 32. How can you have OpenPyXL return the text of the formula itself in a cell,\
    \ instead of the resulting calculation?\n\n## Adjusting Rows and Columns\n\nIn\
    \ Excel, adjusting the sizes of rows and columns is as easy as clicking and dragging\
    \ the edges of a row or column header. But if you need to set the size of a row\
    \ or column based on its cells' contents, or if you want to set sizes in a large\
    \ number of spreadsheet files, it's much quicker to write a Python program to\
    \ do it. You can also hide rows and columns from view, or freeze them in place\
    \ so that they're always visible on the screen and appear on every page when you\
    \ print the spreadsheet, which is handy for headers.\n\nAnswer the following questions\
    \ about changing the sizes of cells, merging cells, and freezing cells with OpenPyXL.\
    \ Where relevant, imagine that a variable named sheet stores a Worksheet object.\n\
    \n- 33. What code would set the height of row 3 to 100?\n- 34. What code would\
    \ set cell D2 to a square shape with sides of length 200?\n- 35. What's wrong\
    \ with the following code: `sheet.row_dimensions[1].width = 70`?\n- 36. What code\
    \ would merge the cells A10 and A22?\n- 37. What code would unmerge the cells\
    \ merged in the previous question?\n- 38. Which rows are frozen if `sheet.freeze_panes\
    \ = 'A2'`?\n- 39. Which rows are frozen if `sheet.freeze_panes = 'A1'`?\n- 40.\
    \ How do you unfreeze all rows and columns in sheet?\n\n## Charts\n\nOpenPyXL\
    \ lets you create multiple kinds of charts using the data in a sheet's cells.\
    \ Your Python code can automatically generate and insert these graphs into your\
    \ Excel spreadsheets. Answer the following questions about creating different\
    \ kinds of charts with OpenPyXL.\n\n- 41. What are four different types of charts\
    \ you can make with OpenPyXL?\n- 42. What five things do you pass to the Reference()\
    \ function?\n- 43. What two things do you pass to the Series() function?\n- 44.\
    \ What two things do you pass to the add_chart() method for Sheet objects?\n\n\
    ## Practice Projects\n\nApply your new knowledge of Excel spreadsheets with these\
    \ practice projects.\n\n### Search Term Finder\n\nWhile you can always press CTRL-F\
    \ in Excel to find specific text in a spreadsheet, you can't search an entire\
    \ folder of .xlsx spreadsheet files at once. Write a function named find_in_excel(search_text)\
    \ that searches every worksheet in every .xlsx file in the current working directory\
    \ (but not its subfolders) for the given search_text string.\n\nThe search should\
    \ be a case-insensitive, partial text match. For example, find_in_excel('name')\
    \ would match with Excel cells that contain filename or Name. For simplicity,\
    \ the function should check only the active worksheet in the Excel file and treat\
    \ all cell values as strings. Remember to pass in the keyword argument data_only=True\
    \ to load_workbook() so that you can search calculated formula results for search_text\
    \ as well.\n\nThe function should return a dictionary whose keys are filename\
    \ strings and whose values are a list of strings of cell addresses containing\
    \ search_text. For example, calling find_in_excel('name') could return {'example.xlsx':\
    \ ['A2'], 'spam.xlsx': ['D1', 'D2']} to indicate that name was found in cell A2\
    \ in example.xlsx and in cells D1 and D2 of spam.xlsx.\n\nYou'll want to loop\
    \ over the files returned by os.listdir() to find all the spreadsheets in the\
    \ current working directory, skipping the files that don't end with .xlsx.\n\n\
    Save this program in a file named findAllExcel.py.\n\n### Excel Home Folder Report\n\
    \nImagine that your manager wants you to free up disk space on your hard drive.\
    \ They'd like a report of all the files in your home folder, along with their\
    \ sizes, in a nicely formatted Excel spreadsheet. Oh, and if you could email it\
    \ to them by the end of the day, that would be great. (They will then forget to\
    \ read it.)\n\nStart this project by writing a function named get_home_folder_size()\
    \ that returns a list of tuples. Each tuple should have two items: a filename\
    \ string and an integer of the file's size in bytes. Using the os.listdir() function\
    \ and the stat() method of Path objects discussed in Chapter 10 of *Automate the\
    \ Boring Stuff with Python*, your program can examine every file in the home folder.\n\
    \nNote that you should enclose the call to stat() in try and except blocks so\
    \ that you can skip the file if file permissions or some other issue causes an\
    \ error. You can write the function code yourself or use the following template:\n\
    \n```python\nimport openpyxl, os\nfrom pathlib import Path\n\ndef get_home_folder_size():\n\
    \    filenames_and_sizes = []\n\n    # Loop over everything in the home folder:\n\
    \    for filename in os.listdir(Path.home()):\n        absolute_file_path = Path.home()\
    \ / filename\n\n        # Skip folders/directories:\n        if absolute_file_path.is_dir():\n\
    \            continue\n\n        # Get file size:\n        try:\n            file_size\
    \ = absolute_file_path.stat().st_size\n        except Exception:\n           \
    \ # Skip files with permissions errors:\n            continue\n\n        # Record\
    \ filename and size:\n        filenames_and_sizes.append((filename, file_size))\n\
    \n    return filenames_and_sizes\n\n# Uncomment to print the hundred largest filenames\
    \ and sizes:\n#print(get_home_folder_size())\n\n# TODO: Write code that puts the\
    \ filenames and sizes into a spreadsheet:\n```\n\nIf you use the provided code,\
    \ the returned list of tuples could look like this:\n\n```\n[('.bash_history',\
    \ 3557), ('.python_history', 2601), ('calc.exe', 27648), ('deleteme.mp3', 7200),\
    \ ('donut.py', 2519), ... ('ttt.py', 2607)]\n```\n\nNext, use this data to create\
    \ an Excel spreadsheet. Write a function named make_excel_report(filenames_and_sizes)\
    \ that calls the get_home_folder_size() function and places the results in an\
    \ Excel file named *homeFilesReport.xlsx*. In this Excel spreadsheet, column A\
    \ should list the filenames and column B should list the file sizes.\n\nSave this\
    \ program in a file named *homeFilesReportExcel.py*."
