    \ the comment isn't even a question! One way to ask thoughtful questions is via\
    \ *rubber duck debugging*: Put a rubber duck or some other inanimate object on\
    \ your desk and explain your problem to it. You can do this out loud, or write\
    \ your questions in an empty document on your computer. The key is to articulate\
    \ your thoughts with actual words. Explain to the duck the answers to the following\
    \ questions:\n\n- What do I want my program to do, really?\n- What does the program\
    \ seem to be doing instead?\n- Does the program partially work? If so, where does\
    \ it seem to break?\n- Is there an error message, and if so, what does it say?\n\
    - What other questions could I ask myself to help me figure this issue out?\n\n\
    Programming is not a passive or magical activity: There are real, concrete answers\
    \ to your questions, but you'll have to reach for them yourself. Whenever you\
    \ don't understand why your program is doing something, remember that the answer\
    \ always ends up being \"The program did that because, well, technically that's\
    \ what the code I wrote does.\"\n\nAnother way to answer your questions is to\
    \ run some code in the interactive shell. By entering Python instructions at the\
    \ `>>>` prompt, you can execute a single instruction and immediately see its result.\
    \ For example, if you pass 9.9 to the `int()` function, will it return 9 or 10?\
    \ What error message will it show if you pass a blank string instead? And if you\
    \ pass a variable that contains an integer to `int()`, does it raise an exception\
    \ or work fine? You don't need to look up the Python documentation to answer these\
    \ questions; just enter the code into the interactive shell and find out:\n\n\
    ```\n>>> int(9.9)\n9\n\n>>> int('')\nTraceback (most recent call last):\n  File\
    \ \"<stdin>\", line 1, in <module>\nValueError: invalid literal for int() with\
    \ base 10: ''\n\n>>> some_variable = 42\n>>> int(some_variable)\n42\n```\n\nMany\
    \ of the questions in this book can be answered in this way. If you're wondering\
    \ how some code works, the best way to find out is to execute it yourself.\n\n\
    Also note that, even though error messages like `ValueError: invalid literal for\
    \ int() with base 10: ''` aren't very clear, you can copy and paste such messages\
    \ into an internet search engine to find other people who have encountered the\
    \ same error, then read their explanations on how to fix it.\n\n## Continuing\
    \ Your Programming Journey\n\nWhen experienced software developers try to help\
    \ beginners, they commonly give two bits of misguided advice. The first is that\
    \ beginners should contribute to open source projects as a way to build experience.\
    \ In reality, open source projects tend to be large, complicated pieces of software,\
    \ and making meaningful contributions to them is beyond the ability of beginners.\
    \ Even trying to create a “small feature” or fix a “simple bug” involves learning\
    \ the entire structure of the project. These projects are often maintained by\
    \ unpaid volunteers who might not have time to help drop-in, one-off contributors\
    \ become familiar with the code base.\n\nThe second piece of advice is to work\
    \ on your own projects. While this is a good idea, it doesn’t offer guidance as\
    \ to what sorts of projects one can make. Beginners often don’t know what’s possible,\
    \ or what is beyond their capabilities. “Create an operating system” and “create\
    \ an AI helper” sound cool but are far too complicated for a single individual\
    \ of any skill level to tackle.\n\nBeginners need guide rails rather than vague\
    \ advice. Here are my recommendations for coming up with a software project to\
    \ create:\n\n- **Choose something you’re interested in** Automate a task you regularly\
    \ perform, make a small game you like, or replicate an app you’ve seen elsewhere\
    \ and enjoyed.\n- **Keep the scale small** Don’t try to make a commercial application\
    \ with many features. Projects always take longer than you think, so imagine the\
    \ simplest version of the program you want to make.\n- **Come up with several\
    \ ideas** You’ll find it encouraging to write multiple programs and frustrating\
    \ to end up with one half-finished, large program.\n- **Write a list of features\
    \ your program *won’t* have** Avoid the temptation to tell yourself “It’d be cool\
    \ if the program did this” by committing to a set of features you’ll leave out.\n\
    - **Stick to the Python standard library, third-party packages, and platforms\
    \ you already know** If you find yourself saying, “Before I start coding this,\
    \ I need to learn X,” you should find a different project.\n\nMy other Python\
    \ books have several such projects. They are short, simple, and complete examples\
    \ of basic programs that don’t require a lot of setup or complex third-party packages:\n\
    \n- ***The Big Book of Small Python Projects* (No Starch Press, 2021)** A collection\
    \ of 81 projects ranging from games to simulations to digital art.\n- ***Invent\
    \ Your Own Computer Games with Python*, 4th edition (No Starch Press, 2016)**\
    \ A book for complete Python beginners that walks through the creation of projects\
    \ including Hangman, Tic-Tac-Toe, and games with 2D graphics.\n- ***Cracking Codes\
    \ with Python* (No Starch Press, 2018)** A guide to creating classic encryption\
    \ and code-breaking programs for your laptop that don’t require a supercomputer,\
    \ such as the Caesar cipher, Vigenère cipher, and brute-force dictionary hacking\
    \ programs.\n\nThe solution programs to this book’s practice projects are available\
    \ in the downloadable resources at https://nostarch.com/automate-workbook. You\
    \ can use these projects as inspiration for making more elaborate projects of\
    \ your own.\n\nThese simple programs should give you an idea of what’s possible\
    \ at the beginner level. Testing your Python knowledge and writing code should\
    \ make you well equipped to continue your programming journey.\n\n# 1\n\n## PYTHON\
    \ BASICS\n\nYou’ll begin this workbook by exploring the basic building blocks\
    \ of programming: writing expressions, experimenting with the interactive shell,\
    \ and creating your first program. You’ll also work with concepts such as values,\
    \ data types, and a few functions, such as print() and input().\n\n### LEARNING\
    \ OBJECTIVES\n\n- Experiment with instructions in the interactive shell.\n- Identify\
    \ the expressions, values, operators, and data types in code.\n- Understand how\
    \ to write strings and do string concatenation or replication.\n- Use variables\
    \ to store values and include variables in expressions.\n- Become comfortable\
    \ encountering errors and reading error messages.\n- Write, run, and dissect the\
    \ individual parts of a program.\n- Call functions such as print(), input(), len(),\
    \ abs(), and round().\n- Discover and convert data types with the type(), int(),\
    \ float(), and str() functions.\n\n## Practice Questions\n\nThe following questions\
    \ cover your knowledge of technical terms and basic concepts. For many of these\
    \ questions, you can get the answer by entering the code into the interactive\
    \ shell. This isn’t “cheating”; rather, it’s how many professional software developers\
    \ verify that the code they write actually works in the way they intended. Think\
    \ of the interactive shell as a way you can double-check your work.\n\n## Entering\
    \ Expressions into the Interactive Shell\n\nEntering code into the interactive\
    \ shell lets you experiment with running instructions one at a time. At the >>>\
    \ prompt, you can enter expressions made up of values, operators, and other Python\
    \ code. After running the code, the interactive shell prints the result.\n\nMatch\
    \ the names for questions 1 through 7 to these math operators:\n+ - * / ** //\
    \ %\n\n1. Division\n2. Multiplication\n3. Subtraction\n4. Modulo\n5. Addition\n\
    6. Exponentiation\n7. Floor division\n\nAn expression is the most basic kind of\
    \ programming instruction in the language. Expressions consist of values (such\
    \ as 2) and operators (such as +), and they can always evaluate (that is, reduce)\
    \ down to a single value.\n\n8. Is there a difference in how Python interprets\
    \ these two expressions?\n2 + 2 and 2 + 2\n9. If the expression 26 / 8 evaluates\
    \ to 3.25, what does the expression 26 // 8 evaluate to?\n10. 26 divided by 8\
    \ is 3 with a remainder of 2. What does the expression 26 % 8 evaluate to?\n11.\
    \ Write the expression that adds the numbers 1 to 10. (Hint: It begins with 1\
    \ + 2 + 3 + and so on.)\n\nWhich of the two operators in the following expressions\
    \ is evaluated first according to Python’s order of operation rules?\n\n12. (4\
    \ + 5) * 6\n13. 2 ** 3 + 1"
  mdcn: "在没有其他信息的情况下，作为讲师很难提供帮助；这些评论甚至都不是问题！提出深思熟虑问题的一种方法是通过*橡皮鸭调试法*：在你的桌子上放一只橡皮鸭或其他无生命的物体，并向它解释你的问题。你可以大声说出来，或者在电脑上的空白文档中写下你的问题。关键在于用实际的语言清晰地表达你的想法。向鸭子解释以下问题的答案：\n\
    \n- 我希望我的程序真正做什么？\n- 程序似乎在做什么别的事情？\n- 程序是否部分有效？如果是，它似乎在哪里出错了？\n- 是否有错误信息？如果有，它说了什么？\n\
    - 我还能问自己哪些其他问题来帮助解决这个问题？\n\n编程不是一种被动或神奇的活动：你的问题有真实、具体的答案，但你必须自己去寻找。每当你不理解你的程序为什么做某事时，请记住答案最终总是“程序这样做是因为，嗯，从技术上讲，这就是我写的代码所做的。”\n\
    \n回答你的问题的另一种方法是在交互式shell中运行一些代码。通过在`>>>`提示符下输入Python指令，你可以执行单个指令并立即看到其结果。例如，如果你将9.9传递给`int()`函数，它会返回9还是10？如果你传递一个空字符串，它会显示什么错误信息？如果你将一个包含整数的变量传递给`int()`，它会引发异常还是正常工作？你不需要查阅Python文档来回答这些问题；只需将代码输入交互式shell并找出答案：\n\
    \n```\n>>> int(9.9)\n9\n\n>>> int('')\nTraceback (most recent call last):\n  File\
    \ \"<stdin>\", line 1, in <module>\nValueError: invalid literal for int() with\
    \ base 10: ''\n\n>>> some_variable = 42\n>>> int(some_variable)\n42\n```\n\n本书中的许多问题都可以用这种方式回答。如果你想知道某些代码是如何工作的，最好的方法是自己执行它。\n\
    \n另外请注意，即使像`ValueError: invalid literal for int() with base 10: ''`这样的错误信息不是很清楚，你也可以将这些消息复制并粘贴到互联网搜索引擎中，找到遇到相同错误的其他人，然后阅读他们关于如何修复的解释。\n\
    \n## 继续你的编程之旅\n\n当经验丰富的软件开发人员试图帮助初学者时，他们通常会给出两个误导性的建议。第一个是初学者应该为开源项目做贡献，以此来积累经验。实际上，开源项目往往是大型、复杂的软件，对它们做出有意义的贡献超出了初学者的能力。即使是尝试创建一个“小功能”或修复一个“简单的错误”，也需要学习整个项目的结构。这些项目通常由无偿志愿者维护，他们可能没有时间帮助临时的、一次性的贡献者熟悉代码库。\n\
    \n第二个建议是做你自己的项目。虽然这是个好主意，但它没有提供关于可以制作什么样的项目的指导。初学者通常不知道什么是可能的，或者什么是超出他们能力的。“创建一个操作系统”和“创建一个AI助手”听起来很酷，但对于任何技能水平的个人来说都过于复杂，无法处理。\n\
    \n初学者需要的是明确的指导，而不是模糊的建议。以下是我对如何想出要创建的软件项目的建议：\n\n- **选择你感兴趣的东西** 自动化你经常执行的任务，制作一个你喜欢的小游戏，或者复制你在其他地方看到并喜欢的应用程序。\n\
    - **保持小规模** 不要试图制作一个具有许多功能的商业应用程序。项目总是比你想象的要花更长时间，所以想象你想要制作的程序的最简单版本。\n- **想出几个想法**\
    \ 你会发现编写多个程序是令人鼓舞的，而最终只完成一个半成品的大型程序是令人沮丧的。\n- **列出你的程序*不会*有的功能** 通过承诺一组你将排除的功能，避免告诉自己“如果程序能做这个会很酷”的诱惑。\n\
    - **坚持使用Python标准库、第三方包和你已经熟悉的平台** 如果你发现自己说，“在我开始编写这个代码之前，我需要学习X”，那么你应该找一个不同的项目。\n\
    \n我的其他Python书籍中有几个这样的项目。它们是简短、简单且完整的示例，展示了基本程序，不需要大量设置或复杂的第三方包：\n\n- ***《小Python项目大全》*（No\
    \ Starch Press，2021）** 一个包含81个项目的合集，涵盖游戏、模拟到数字艺术。\n- ***《用Python发明你自己的电脑游戏》*，第4版（No\
    \ Starch Press，2016）** 一本面向完全Python初学者的书，指导创建包括井字棋、猜数字和2D图形游戏在内的项目。\n- ***《用Python破解密码》*（No\
    \ Starch Press，2018）** 一本指南，教你如何在笔记本电脑上创建经典的加密和密码破解程序，这些程序不需要超级计算机，例如凯撒密码、维吉尼亚密码和暴力字典破解程序。\n\
    \n本书练习项目的解决方案可在 https://nostarch.com/automate-workbook 的可下载资源中找到。你可以将这些项目作为灵感，制作更精细的自己的项目。\n\
    \n这些简单的程序应该能让你了解在初学者水平上什么是可能的。测试你的Python知识和编写代码应该能让你为继续你的编程之旅做好充分准备。\n\n# 1\n\n\
    ## PYTHON基础\n\n你将从探索编程的基本构建块开始这本练习册：编写表达式、在交互式shell中进行实验以及创建你的第一个程序。你还将处理诸如值、数据类型以及一些函数（如`print()`和`input()`）等概念。\n\
    \n### 学习目标\n\n- 在交互式shell中尝试指令。\n- 识别代码中的表达式、值、运算符和数据类型。\n- 理解如何编写字符串以及进行字符串连接或复制。\n\
    - 使用变量存储值并在表达式中包含变量。\n- 习惯遇到错误并阅读错误信息。\n- 编写、运行和剖析程序的各个部分。\n- 调用`print()`、`input()`、`len()`、`abs()`和`round()`等函数。\n\
    - 使用`type()`、`int()`、`float()`和`str()`函数发现和转换数据类型。\n\n## 练习题\n\n以下问题涵盖了你对技术术语和基本概念的理解。对于其中许多问题，你可以通过将代码输入交互式shell来获得答案。这不是“作弊”；相反，这是许多专业软件开发人员验证他们编写的代码是否确实按预期工作的方式。将交互式shell视为一种可以双重检查你工作的方式。\n\
    \n## 在交互式shell中输入表达式\n\n在交互式shell中输入代码可以让你一次运行一条指令进行实验。在`>>>`提示符下，你可以输入由值、运算符和其他Python代码组成的表达式。运行代码后，交互式shell会打印结果。\n\
    \n将问题1到7的名称与这些数学运算符匹配：\n+ - * / ** // %\n\n1. 除法\n2. 乘法\n3. 减法\n4. 取模\n5. 加法\n\
    6. 求幂\n7. 整数除法\n\n表达式是语言中最基本的编程指令。表达式由值（如2）和运算符（如+）组成，它们总是可以求值（即简化）为单个值。\n\n8.\
    \ Python对这两个表达式的解释有区别吗？\n2 + 2 和 2 + 2\n9. 如果表达式26 / 8求值为3.25，那么表达式26 // 8求值为什么？\n\
    10. 26除以8等于3余2。表达式26 % 8求值为什么？\n11. 写出将数字1到10相加的表达式。（提示：它以1 + 2 + 3 + 等等开头。）\n\
    \n根据Python的运算顺序规则，以下表达式中哪个运算符先被求值？\n\n12. (4 + 5) * 6\n13. 2 ** 3 + 1"
