- md: "## Practice Projects\n\nAutomate mundane tasks with these short projects.\n\
    \n## Duplicate Filename Finder\n\nLet's say your coworker has a massive project\
    \ consisting of hundreds of .txt files in different folders on their computer,\
    \ but they want to make sure the filenames are all unique so that they don't accidentally\
    \ copy over any of them. Create a function named `find_dup_filenames(folder)`\
    \ to find files with the same filename in different subfolders of `folder`. This\
    \ function should return a dictionary whose keys are filenames and whose values\
    \ are lists of absolute paths to the files. For example, let's say the following\
    \ files exist on your computer:\n\n```\nC:\\Users\\Al\\spam.txt\nC:\\Users\\Al\\\
    eggs.txt\nC:\\Users\\Al\\subfolder1\\spam.txt\n```\n\nCalling `find_dup_filenames(r'C:\\\
    Users\\Al')` would return this dictionary:\n\n```\n{'spam.txt': ['C:\\\\Users\\\
    \\Al\\\\spam.txt', 'C:\\\\Users\\\\Al\\\\subfolder1\\\\spam.txt']}\n```\n\nYour\
    \ program should call this function, then go through the returned dictionary to\
    \ print duplicate filenames. Print the filename first, then each of the absolute\
    \ filepaths with four spaces of indentation, so that the output looks like this:\n\
    \n```\nspam.txt\n    C:\\Users\\Al\\spam.txt\n    C:\\Users\\Al\\subfolder1\\\
    spam.txt\n```\n\nYou don't need to test this program on your computer's root folder;\
    \ running it on every file on your computer would take too long. Instead, select\
    \ your home folder or another folder containing only a handful of files and subfolders.\
    \ Once you know your program works correctly, run it on your root folder to find\
    \ all duplicate filenames on your computer.\n\nSave this program in a file named\
    \ `dupFilename.py`.\n\n## Alphabetized Folders\n\nLet's say your manager has very\
    \ odd ideas about how the folders on your computer should be organized. They want\
    \ you to have 26 folders named A through Z; in each of these folders, there should\
    \ be another 26 folders for each letter of the alphabet. For example, the A folder\
    \ would have 26 folders named AA through AZ, the B folder would have 26 folders\
    \ named BA through BZ, and so on. This means you need to create 702 folders on\
    \ your computer. This task is boring (and not useful), but your manager wants\
    \ it done.\n\nCreate a function named `make_alpha_folders(root_folder)` that creates\
    \ these 702 subfolders in the `root_folder` folder. For example, calling `make_alpha_folders(r'C:\\\
    Users\\Al\\Desktop')` would create these folders:\n\n```\nC:\\Users\\Al\\Desktop\\\
    A\nC:\\Users\\Al\\Desktop\\A\\AA\nC:\\Users\\Al\\Desktop\\A\\AB\nC:\\Users\\Al\\\
    Desktop\\A\\AC\n--snip--\nC:\\Users\\Al\\Desktop\\B\nC:\\Users\\Al\\Desktop\\\
    B\\BA\nC:\\Users\\Al\\Desktop\\B\\BB\n--snip--\nC:\\Users\\Al\\Desktop\\Z\\ZA\n\
    --snip--\nC:\\Users\\Al\\Desktop\\Z\\ZZ\n```\n\nSave this program in a file named\
    \ `alphaFolders.py`.\n\n## ZIP File Folder Extractor\n\nLet's say your coworker\
    \ has thousands of ZIP files, but they only want to extract files in a particularly\
    \ named folder inside the ZIP file. Write a function named `extract_in_folder(zip_filename,\
    \ folder)` that takes the string of a ZIP filename and a string of a folder name.\
    \ The function should extract only the files in that folder of the ZIP file to\
    \ the current working directory. For example, if `eggs.zip` contains the files\
    \ `data1.txt`, `spam/data2.txt`, `spam/data3.txt`, and `bacon/data4.txt` and you\
    \ call `extract_in_folder('eggs.zip', 'spam')`, the function should extract `data2.txt`\
    \ and `data3.txt` only.\n\nSave this program in a file named `extractZipFolder.py`.\n\
    \n# 12\n\n## DESIGNING AND DEPLOYING COMMAND LINE PROGRAMS\n\nUsers are accustomed\
    \ to interacting with the computer through a graphical user interface (GUI), but\
    \ experienced programmers are much more effective when working in a command line\
    \ terminal. Once you’ve mastered the command line, you’ll know how to create minimal\
    \ but efficient programs with simple text-based interfaces.\n\n### LEARNING OBJECTIVES\n\
    \n- Know how to set up your Python programs to easily run them outside the code\
    \ editor.\n- Understand command line interfaces, including how programs present\
    \ information as output and accept user input.\n- Become familiar and comfortable\
    \ with software jargon.\n- Be able to create virtual environments for your programming\
    \ projects and avoid package version conflicts.\n- Master the use of PyMsgBox\
    \ to create dialog boxes for a lightweight GUI.\n- Know how to compile your Python\
    \ programs with PyInstaller so that you can run them on computers that don’t have\
    \ Python installed.\n\n## Practice Questions\n\nThese questions test your understanding\
    \ of the terminal in Windows, macOS, and Linux and your ability to run Python\
    \ programs from them.\n\n### A Program by Any Other Name\n\nProgramming uses many\
    \ terms that mean “a program” or some slight variation of the term. But there\
    \ are subtle differences between what these names mean. Answer the following questions\
    \ about different jargon terms.\n\n1. What’s the difference between a program\
    \ and a command?\n2. What’s the difference between a command and an application?\n\
    3. What’s an interactive command?\n4. Do the terms *script*, *command*, *application*,\
    \ and *web app* all refer to types of programs?\n\n### Using the Terminal\n\n\
    A command line interface doesn’t have the icons, buttons, and graphics of a GUI,\
    \ but it’s an effective way to use a computer once you’ve learned several of its\
    \ commands. Answer the following questions about the command line terminal.\n\n\
    5. What are the names of the terminal applications on Windows, macOS, and Linux?\n\
    6. What does the tilde character (~) represent in the terminal?\n7. What is the\
    \ filename of the Python interpreter called on Windows?\n8. What does the `pwd`\
    \ command do?\n9. How can you find out what the current working directory is on\
    \ Windows?\n10. What commands display the contents of the current working directory\
    \ on Windows, macOS, and Linux?\n11. How do you display all the executable files\
    \ in the current working directory on Windows?\n12. How do you display all the\
    \ executable files in the current working directory on macOS and Linux?\n13. What\
    \ command do you enter if you want to open *example.txt* with the default text\
    \ editor app on Windows?\n14. What command do you enter if you want to open *example.txt*\
    \ with the default text editor app on macOS?\n15. Say you have a program named\
    \ *eggs* or *eggs.exe* in the current working directory. What command do you enter\
    \ if you want to run this program on Windows, macOS, and Linux?\n16. If the *eggs*\
    \ program isn't in the current working directory, what happens when you run `eggs`\
    \ in the terminal?\n17. How can you show the contents of the PATH environment\
    \ variable on Windows, macOS, and Linux?\n18. What character separates the folder\
    \ names in the PATH environment variable on Windows, macOS, and Linux?\n19. If\
    \ *C:\\Users\\al\\Scripts* is the current working directory and the only folder\
    \ name in the PATH environment variable, would entering *spam.exe* into the terminal\
    \ run the program at *C:\\Users\\al\\Scripts\\subfolder\\spam.exe*?\n20. What\
    \ file do you edit on macOS to edit the PATH environment variable?\n21. What file\
    \ do you edit on Linux to edit the PATH environment variable?\n22. What commands\
    \ (on Windows and on macOS/Linux) would tell you the folder location of a program\
    \ named *abcd* if you entered `abcd` in the terminal?\n\n### Virtual Environments\n\
    \nVirtual environments are separate installations of Python that have their own\
    \ sets of installed third-party packages. In general, each Python application\
    \ you create needs its own virtual environment. This prevents Python programs\
    \ that require different versions of packages from conflicting with each other.\n\
    \n23. Can Python have multiple versions of the same package installed at the same\
    \ time?\n24. What built-in Python module creates virtual environments?\n25. What\
    \ is the name commonly used for virtual environment folders?\n26. Once you've\
    \ activated a virtual environment, what command can you run to make sure that\
    \ running `python3` or `python` accesses the virtual environment's Python interpreter\
    \ and not the system's Python interpreter?\n27. What command shows you all of\
    \ the third-party packages currently installed?"
  mdcn: "## 实践项目\n\n通过以下简短项目来自动化处理日常任务。\n\n## 重复文件名查找器\n\n假设你的同事有一个庞大的项目，包含数百个位于电脑不同文件夹中的\
    \ `.txt` 文件，但他们希望确保所有文件名都是唯一的，以免意外覆盖任何文件。创建一个名为 `find_dup_filenames(folder)` 的函数，用于在\
    \ `folder` 的不同子文件夹中查找具有相同文件名的文件。该函数应返回一个字典，其键是文件名，值是文件绝对路径的列表。例如，假设你的电脑上存在以下文件：\n\
    \n```\nC:\\Users\\Al\\spam.txt\nC:\\Users\\Al\\eggs.txt\nC:\\Users\\Al\\subfolder1\\\
    spam.txt\n```\n\n调用 `find_dup_filenames(r'C:\\Users\\Al')` 将返回以下字典：\n\n```\n{'spam.txt':\
    \ ['C:\\\\Users\\\\Al\\\\spam.txt', 'C:\\\\Users\\\\Al\\\\subfolder1\\\\spam.txt']}\n\
    ```\n\n你的程序应调用此函数，然后遍历返回的字典以打印重复的文件名。首先打印文件名，然后每个绝对文件路径缩进四个空格，使输出如下所示：\n\n```\n\
    spam.txt\n    C:\\Users\\Al\\spam.txt\n    C:\\Users\\Al\\subfolder1\\spam.txt\n\
    ```\n\n你不需要在电脑的根文件夹上测试此程序；在电脑上运行所有文件会花费太长时间。相反，选择你的主文件夹或另一个仅包含少量文件和子文件夹的文件夹。一旦确认程序运行正确，再在根文件夹上运行它以查找电脑上所有重复的文件名。\n\
    \n将此程序保存在名为 `dupFilename.py` 的文件中。\n\n## 字母排序文件夹\n\n假设你的经理对电脑文件夹的组织方式有非常奇特的想法。他们希望你拥有\
    \ 26 个名为 A 到 Z 的文件夹；在每个文件夹中，还应有另外 26 个以字母表中每个字母命名的文件夹。例如，A 文件夹将包含 26 个名为 AA 到\
    \ AZ 的文件夹，B 文件夹将包含 26 个名为 BA 到 BZ 的文件夹，依此类推。这意味着你需要在电脑上创建 702 个文件夹。这项任务很无聊（且无用），但你的经理希望完成它。\n\
    \n创建一个名为 `make_alpha_folders(root_folder)` 的函数，在 `root_folder` 文件夹中创建这 702 个子文件夹。例如，调用\
    \ `make_alpha_folders(r'C:\\Users\\Al\\Desktop')` 将创建以下文件夹：\n\n```\nC:\\Users\\\
    Al\\Desktop\\A\nC:\\Users\\Al\\Desktop\\A\\AA\nC:\\Users\\Al\\Desktop\\A\\AB\n\
    C:\\Users\\Al\\Desktop\\A\\AC\n--snip--\nC:\\Users\\Al\\Desktop\\B\nC:\\Users\\\
    Al\\Desktop\\B\\BA\nC:\\Users\\Al\\Desktop\\B\\BB\n--snip--\nC:\\Users\\Al\\Desktop\\\
    Z\\ZA\n--snip--\nC:\\Users\\Al\\Desktop\\Z\\ZZ\n```\n\n将此程序保存在名为 `alphaFolders.py`\
    \ 的文件中。\n\n## ZIP 文件文件夹提取器\n\n假设你的同事有数千个 ZIP 文件，但他们只想提取 ZIP 文件中特定命名文件夹内的文件。编写一个名为\
    \ `extract_in_folder(zip_filename, folder)` 的函数，该函数接受一个 ZIP 文件名字符串和一个文件夹名字符串。该函数应仅将\
    \ ZIP 文件中该文件夹的文件提取到当前工作目录。例如，如果 `eggs.zip` 包含文件 `data1.txt`、`spam/data2.txt`、`spam/data3.txt`\
    \ 和 `bacon/data4.txt`，并且你调用 `extract_in_folder('eggs.zip', 'spam')`，则该函数应仅提取 `data2.txt`\
    \ 和 `data3.txt`。\n\n将此程序保存在名为 `extractZipFolder.py` 的文件中。\n\n# 12\n\n## 设计和部署命令行程序\n\
    \n用户习惯于通过图形用户界面（GUI）与计算机交互，但经验丰富的程序员在命令行终端中工作时效率要高得多。一旦你掌握了命令行，你将知道如何创建具有简单文本界面的最小但高效的程序。\n\
    \n### 学习目标\n\n- 了解如何设置你的 Python 程序，以便在代码编辑器之外轻松运行它们。\n- 理解命令行界面，包括程序如何将信息作为输出呈现以及接受用户输入。\n\
    - 熟悉并适应软件术语。\n- 能够为你的编程项目创建虚拟环境并避免包版本冲突。\n- 掌握使用 PyMsgBox 创建轻量级 GUI 对话框。\n- 了解如何使用\
    \ PyInstaller 编译你的 Python 程序，以便在未安装 Python 的计算机上运行它们。\n\n## 练习题\n\n这些问题测试你对 Windows、macOS\
    \ 和 Linux 中终端的理解，以及你从中运行 Python 程序的能力。\n\n### 任何其他名称的程序\n\n编程使用许多表示“程序”或该术语略有变化的术语。但这些名称的含义之间存在细微差别。回答以下关于不同术语的问题。\n\
    \n1. 程序和命令之间有什么区别？\n2. 命令和应用程序之间有什么区别？\n3. 什么是交互式命令？\n4. 术语 *脚本*、*命令*、*应用程序* 和\
    \ *Web 应用* 是否都指代程序的类型？\n\n### 使用终端\n\n命令行界面没有 GUI 的图标、按钮和图形，但一旦你学会了几个命令，它就是使用计算机的有效方式。回答以下关于命令行终端的问题。\n\
    \n5. Windows、macOS 和 Linux 上的终端应用程序名称是什么？\n6. 在终端中，波浪号字符（~）代表什么？\n7. 在 Windows\
    \ 上，Python 解释器的文件名是什么？\n8. `pwd` 命令的作用是什么？\n9. 如何在 Windows 上找出当前工作目录是什么？\n10.\
    \ 哪些命令显示 Windows、macOS 和 Linux 上当前工作目录的内容？\n11. 如何在 Windows 上显示当前工作目录中的所有可执行文件？\n\
    12. 如何在 macOS 和 Linux 上显示当前工作目录中的所有可执行文件？\n13. 如果你想在 Windows 上用默认文本编辑器应用程序打开 *example.txt*，应输入什么命令？\n\
    14. 如果你想在 macOS 上用默认文本编辑器应用程序打开 *example.txt*，应输入什么命令？\n15. 假设当前工作目录中有一个名为 *eggs*\
    \ 或 *eggs.exe* 的程序。如果你想在 Windows、macOS 和 Linux 上运行此程序，应输入什么命令？\n16. 如果 *eggs*\
    \ 程序不在当前工作目录中，当你在终端中运行 `eggs` 时会发生什么？\n17. 如何在 Windows、macOS 和 Linux 上显示 PATH\
    \ 环境变量的内容？\n18. 在 Windows、macOS 和 Linux 上，PATH 环境变量中分隔文件夹名称的字符是什么？\n19. 如果 *C:\\\
    Users\\al\\Scripts* 是当前工作目录，并且是 PATH 环境变量中唯一的文件夹名称，在终端中输入 *spam.exe* 会运行 *C:\\\
    Users\\al\\Scripts\\subfolder\\spam.exe* 处的程序吗？\n20. 在 macOS 上，你编辑哪个文件来编辑 PATH\
    \ 环境变量？\n21. 在 Linux 上，你编辑哪个文件来编辑 PATH 环境变量？\n22. 如果你在终端中输入 `abcd`，哪些命令（在 Windows\
    \ 上和在 macOS/Linux 上）会告诉你名为 *abcd* 的程序的文件夹位置？\n\n### 虚拟环境\n\n虚拟环境是 Python 的独立安装，具有自己的第三方包安装集。通常，你创建的每个\
    \ Python 应用程序都需要自己的虚拟环境。这可以防止需要不同版本包的 Python 程序相互冲突。\n\n23. Python 能否同时安装同一包的多个版本？\n\
    24. 哪个内置 Python 模块创建虚拟环境？\n25. 虚拟环境文件夹通常使用什么名称？\n26. 一旦你激活了虚拟环境，你可以运行什么命令来确保运行\
    \ `python3` 或 `python` 时访问的是虚拟环境的 Python 解释器，而不是系统的 Python 解释器？\n27. 哪个命令显示当前安装的所有第三方包？"
