    ## 谷歌表格


    谷歌表格是一款免费的、基于网络的电子表格应用程序，而 EZSheets 包提供了其官方 API 的简化形式，使你的 Python 代码能够与在线电子表格进行交互。使用
    EZSheets，你可以直接从 Python 代码中下载、创建、读取和修改电子表格。


    ### 学习目标


    - 创建 EZSheets 包可以使用的身份验证凭据，以便从你的 Google 帐户访问电子表格。

    - 了解在线谷歌表格电子表格与离线 Excel 电子表格文件之间的区别。

    - 读取和更新谷歌表格电子表格中的数据。

    - 在电子表格中添加、重新排序和移除单个工作表。

    - 通过 Google 表单从公众收集数据，并使用谷歌表格检索数据。

    - 了解谷歌表格 API 的工作原理以及帐户配额的限制。


    # 练习题


    这些问题测试你对 EZSheets 设置、读取和编辑电子表格，以及 Spreadsheet 和 Sheet 对象结构的了解。


    # 安装和设置 EZSheets


    在你的 Python 脚本可以使用 EZSheets 访问和编辑你的谷歌表格电子表格之前，你需要一个凭据 JSON 文件和两个令牌 JSON 文件。Google
    可能会略微更改其 Google Cloud Console 网站上的布局或措辞，但这个一次性设置过程的基本步骤应该保持不变。


    1.  你可以免费使用谷歌表格吗？

    2.  你需要在你的 Python 源代码中输入你的 Google 帐户密码才能使用 EZSheets 吗？

    3.  你可以在哪个网站下载你的 Google 帐户的凭据 JSON 文件？

