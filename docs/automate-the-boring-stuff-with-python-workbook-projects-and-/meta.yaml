    a = ['cat', 'dog', 'moose']\nb = a\nc = a\n```\n\n```\nimport copy\na = ['cat',\
    \ 'dog', 'moose']\nb = copy.copy(a)\nc = copy.copy(a)\n```\n\n## Practice Projects\n\
    \nPractice your knowledge of lists with the following projects.\n\n### Pangram\
    \ Detector\n\nWrite a function named is_pangram(sentence) that accepts a string\
    \ argument, then returns True if it's a pangram and False if not. A pangram is\
