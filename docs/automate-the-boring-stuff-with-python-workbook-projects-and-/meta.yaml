    # A Note for Instructors


    This workbook can be a useful resource for instructors teaching from *Automate
    the Boring Stuff with Python*, or other sources. The questions in Chapters 1 through
    11 in particular cover the Python language and standard library and can supplement
    any general Python curriculum.


    All of the questions are answered in the back of the workbook, and any student
    with a copy of the workbook can read these answers. This may be of concern for
    instructors who want to assign these questions as homework. (Moreover, answers
    to these straightforward questions are readily found online or can be generated
    by large language model AIs such as ChatGPT.) Nevertheless, you can use these
    questions in the classroom or modify them for your own purposes.


    The questions use the free-response format, meaning the student must directly
    provide the answer. They often encourage the student to experiment in the Python
    interactive shell. For example, a student can answer the question “Does round(4.9)
    evaluate to the integer 5 or the float 5.0?” by running the code. If the student
    doesn’t have access to a computer, you can make the questions easier by providing
    a multiple-choice answer format or an answer bank they can match to a set of questions.


    # How to Answer Your Own Questions


    Software development is a large field, and no one can expect to memorize every
    part of it. It should come as no surprise, then, that programmers have created
    software to help them program. Search engines and Python’s interactive shell are
    also great ways to find the information you’re looking for. You should never consider
    it “cheating” to search for something online. Professional software engineers
    do it dozens of times a day!


    Knowing how to find information online is an important skill, and it requires
    you to carefully think about what exactly it is you want to know. It’s often much
    faster to find existing answers online than it is to post your question somewhere
    and wait hours (or days or weeks!) for a reply.


    If you do need to post a question, be specific. When I teach coding online to
    others, I often get comments like, “My program doesn’t work,”'
