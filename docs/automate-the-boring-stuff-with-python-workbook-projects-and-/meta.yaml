    \ 'dog'], 'moose']:\n...     print(i)\n...\n54. >>> for i in 'moose'[0:3]:\n...\
    \     print(i)\n...\n```\n\n## References\n\nIn Python, variables never contain\
    \ values. They contain only references to values. The = assignment operator copies\
    \ only references; it never copies values. For the most part, you don't need to\
    \ know these details, but at times, these simple rules have surprising effects,\
