    \ 函数并将结果放入名为 *homeFilesReport.xlsx* 的 Excel 文件中。在此 Excel 电子表格中，A 列应列出文件名，B 列应列出文件大小。\n\
    \n将此程序保存在名为 *homeFilesReportExcel.py* 的文件中。"
