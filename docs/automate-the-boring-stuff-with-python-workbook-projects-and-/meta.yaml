    # Compiling Python Programs with PyInstaller


    It''s possible to create executable programs from Python code with the PyInstaller
    package, which generates executable programs you can run from the command line.
    PyInstaller doesn''t compile Python programs into machine code, per se; rather,
    it creates an executable program that contains a copy of the Python interpreter
    and your script. The benefit of compiling your Python program is that you can
    share your program with others who don''t have Python installed.


