    ''a1'' represents the lower-left corner square, and ''h8'' represents the upper-right
    corner square.

    The values in the dictionary are two-character strings representing chess pieces.
    The first character is a lowercase w for white or b for black, while the second
    character is an uppercase P, N, B, R, K, or Q for pawn, knight, bishop, rook,
    king, or queen, respectively. For example, ''wQ'' represents a white queen and
    ''bB'' represents a black bishop.

    So, the following dictionary represents a chessboard with a white queen in the
    upper-left square and a black bishop in the square below it: `{''a8'': ''wQ'',
    ''a7'': ''bB''}`. If a square doesn''t have a key in the dictionary, we assume
    the square is unoccupied.

    In chess, a rook can move an unlimited number of squares vertically or horizontally
    across the board. If any of the opponent''s pieces are on the same row (known
    as the *rank* in chess) or column (known as the *file*), the rook can capture
    it.

    Write a function named `white_rook_can_capture(rook, board)` that takes two arguments:
    `rook` is a string representing a square on which a white rook is located, and
    `board` is a chessboard dictionary. The function returns a list of all squares
    with black pieces that the rook can capture—that is, a list of all squares with
    black pieces (including the black king) in the same row or column as the white
    rook. The order of the squares in the list doesn''t matter. If the white rook
    cannot capture any black pieces, the function returns an empty list.

    For simplicity, we''ll ignore situations in which another piece blocks the white
    rook from capturing any pieces. Your function just finds all the black pieces
    with the same rank or file as the white rook. The returned list should not contain
    any squares with white pieces.

    For example, the function call `white_rook_can_capture(''d3'', {''d7'': ''bQ'',
    ''d2'': ''wB'', ''f1'': ''bP'', ''a3'': ''bN''})` should return the list `[''d7'',
    ''a3'']` because squares d7 and a3 contain black pieces that a white rook at d3
    can capture. The square d7 is in the same column as d3 and the square a3 is in
    the same row as d3. However, f1 is not in the same column or row as d3. And while
    d2 is in the same column as d3, it contains a white piece.

    Save this program in a file named `rookCapture.py`.'
