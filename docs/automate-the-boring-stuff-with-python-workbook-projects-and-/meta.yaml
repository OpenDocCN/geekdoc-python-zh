    # # 14


    # ## EXCEL SPREADSHEETS


    Most computer users have interacted with structured data using spreadsheets. Even
    if you’re an experienced Microsoft Excel user, however, you’ll never be as fast
    or as accurate as a computer program. Unless your idea of a good time is sifting
    through large spreadsheets (and no judgment if it is), you should master Python’s
    OpenPyXL package so that you can automate your boring Excel tasks.


    ![](img/11f9f70403175f96d058cd4bde194c77_126_0.png)


    # ### LEARNING OBJECTIVES


    +   - Practice using the OpenPyXL package to read and edit .xlsx spreadsheet files.

    - Add, reorder, and remove sheets to workbooks.

    - Adjust row and column sizes in the spreadsheet and apply freeze panes.

    - Set the font styles of individual spreadsheet cells.

    - Create formulas and read the calculated results of formulas.

    - Generate and insert charts into the spreadsheet.'
  - '[PAGE 127]


    # Practice Questions


    These questions test your understanding of reading and writing data in Excel files
    using the OpenPyXL package.


    # Reading Excel Files


    An Excel spreadsheet document is called a *workbook*, and a single workbook exists
    in a file with the *.xlsx* extension. Each workbook can contain multiple *sheets*
    (also called *worksheets*). Each sheet has columns (addressed using letters starting
    at A) and rows (addressed using numbers starting at 1). A box at a particular
    column and row is called a *cell*. Each cell can contain a number or text value.
    The grid of cells and their data make up a *sheet*. OpenPyXL allows your Python
    programs to access this data by cell address, just as you can access the values
    in a dictionary by their key.


    Answer the following questions about reading the data in Excel spreadsheets. Where
    relevant, imagine that a variable named `sheet` stores a `Worksheet` object.


    +   1. Which object represents a *.xlsx* file: a `Workbook` or a `Worksheet`?

    2. What is the active worksheet?

    3. Do worksheets have titles? Do workbooks?

    4. For a `Workbook` object stored in a variable named `wb`, what code evaluates
    to a list of strings of all `Worksheet` titles?

    5. If you have a `Cell` object in a variable named `c`, what is the data type
    of `c.column`?

    6. Does the code `sheet.cell(row=1, column=2)` refer to the cell B1 or the cell
    C2?

    7. What `Worksheet` object attributes store the highest row and column in the
    worksheet?

    8. Use the `get_column_letter()` function to calculate the column letters for
    column 900.

    9. Use the `column_index_from_string()` function to calculate the column number
    for column ZZ.

    10. How many cells does `sheet[''A1'':''C3'']` evaluate to?

    11. What code evaluates to a list of all the `Cell` objects in column C?


    # Writing Excel Documents


    OpenPyXL also provides ways of writing data, meaning your programs can create
    and edit spreadsheet files. Anytime you modify the `Workbook` object or its sheets
    and cells, you must call the `save()` workbook method to save the spreadsheet
    file. Answer the following questions about creating and editing data in Excel
    spreadsheets. Where relevant, imagine that a variable named `sheet` stores a `Worksheet`
    object. To store a `Workbook` object, use a variable named `wb`.'
