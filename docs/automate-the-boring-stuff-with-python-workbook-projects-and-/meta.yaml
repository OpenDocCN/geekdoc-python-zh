    \ variable names must follow, and a good variable name describes the data the\
    \ variable contains.\n\nThe following programs store values in variables. Determine\
    \ what each program outputs.\n\n```\n43. nephew = 'Jack'\n    print(nephew)\n\n\
    44. nephew = 'Jack'\n    print('nephew')\n\n45. nephew = 'Jack'\n    nephew =\
    \ 'Albert'\n    print(nephew)\n\n46. nephew = 'Jack'\n    Nephew = 'Albert'\n\
    \    print(nephew)\n```\n\nWhy do the following programs cause an error?\n\n```\n\
    47. nephew = Jack\n    print(nephew)\n\n48. nephew = 'Jack'\n    print(Jack)\n\
    \n49. nephew = 'Jack'\n    print(NEPHEW)\n\n50. print(nephew)\n```\n\nWhich of\
    \ the following are valid variable names?\n\n- 51. number_of_cats\n- 52. number-of-cats\n\
    - 53. numberofcats\n- 54. numberOfCats\n- 55. _42\n- 56. _\n- 57. 42\n\n## Your\
    \ First Program\n\nWhile the interactive shell is good for running Python instructions\
