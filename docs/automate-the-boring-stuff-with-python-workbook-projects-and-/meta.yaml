    \ value in the following function?\n\n```\ndef get_greeting():\n    print('What\
    \ is your name?')\n    name = input()\n    return 'Hello, ' + name\n```\n\n##\
    \ The None Value\n\nIn Python, a value called None represents the absence of a\
    \ value. Behind the scenes, Python adds return None to the end of any function\
    \ definition with no return statement.\n\nIt's important to understand how None\
    \ works so that you can know what your functions are returning. Determine whether\
    \ the following expressions involving None evaluate to True or False. (You can\
    \ enter the expression into the interactive shell to find out.)\n\n17. None ==\
    \ True\n18. None == False\n19. None == 'None'\n20. None == None\n21. None == 'hello'\n\
    22. None == 0\n23. None == -1.5\n\n## The Call Stack\n\nThe call stack is how\
    \ Python remembers where to return the execution after each function call. The\
    \ call stack isn't stored in a variable in your program; rather, it's a section\
    \ of your computer's memory that Python handles automatically behind the scenes.\
    \ When your program calls a function, Python creates a frame object on the top\
    \ of the call stack. Frame objects store the line number of the original function\
    \ call so that Python can remember where to return. Answer the following questions\
    \ about the frame objects, the call stack, and function calls.\n\n24. What does\
    \ a stack frame object represent?\n25. When is a stack frame object pushed to\
    \ the top of the call stack?\n26. When is a stack frame object popped off the\
    \ top of the call stack?\n27. What does the stack frame object at the top of the\
    \ call stack represent?\n28. A call to a function named spam() is made. Then,\
    \ a call to an eggs() function is made. Next, eggs() returns. After that, a call\
    \ to a bacon() function is made. What does the call stack look like at this point?\n\
    29. A program has absolutely no function calls in it. What does the call stack\
    \ look like while the program runs?\n\n## Local and Global Scopes\n\nOnly code\
    \ within a called function can access the parameters and variables assigned in\
    \ that function. These variables are said to exist in that function's *local scope*.\
    \ By contrast, code anywhere in a program can access variables that are assigned\
    \ outside all functions. These variables are said to exist in the *global scope*.\
    \ Answer the following questions about global variables, local variables, and\
    \ scopes.\n\n30. Are function parameters global variables or local variables?\n\
    31. A variable in a function is marked with the global statement. Is it a global\
    \ or local variable?\n32. Can a variable be both global and local?\n33. If a global\
    \ spam variable exists, and a function has a spam = 42 assignment statement and\
    \ no global spam statement, is the spam variable in the function local or global?\n\
    34. If a global spam variable exists, and a function has a spam = 42 assignment\
    \ statement as well as a global spam statement, is the spam variable in the function\
    \ local or global?\n35. If a global spam variable exists, and a function never\
    \ assigns spam a value and has no global spam statement, the function uses the\
    \ spam variable (such as in print(spam)). Is the spam variable in the function\
    \ local or global?\n\nMany errors occur because programmers mistakenly identify\
    \ the scope in which a variable exists. To test whether you correctly understand\
    \ Python's scoping rules, determine what each of the following programs outputs.\n\
    \n```\n36. def func(spam):\n        print(spam)\n        spam = 'dog'\n    func('cat')\n\
    \n37. def func(eggs):\n        print(spam)\n        spam = 'dog'\n    func('cat')\n\
    \n38. def func():\n        spam = 'cat'\n    spam = 'dog'\n    func()\n    print(spam)\n\
    \n39. def func():\n        global spam\n        spam = 'cat'\n    spam = 'dog'\n\
    \    func()\n    print(spam)\n```\n\n```\n40. def func():\n    global spam\n \
    \   print(spam)\n    spam = 'cat'\nspam = 'dog'\nfunc()\n\n41. def func():\n \
    \   print(spam)\n    spam = 'cat'\nspam = 'dog'\nfunc()\n```\n\n## Exception Handling\n\
    \nUsually, getting an error, or *exception*, in your Python program means the\
    \ entire program will crash. But programs can also handle errors with try and\
    \ except statements. The code that could potentially have an error is put in a\
    \ try clause. The program execution moves to the start of the following except\
    \ clause if an error happens. For each of the following programs, determine whether\
    \ the program would crash if the user entered a non-number.\n\n```\n42. print('Enter\
    \ a number:')\n    number = int(input())\n    try:\n        print('You entered\
    \ a number.')\n    except:\n        print('You did not enter a number.')\n\n43.\
    \ print('Enter a number:')\n    try:\n        number = int(input())\n        print('You\
    \ entered a number.')\n    except ValueError:\n        print('You did not enter\
    \ a number.')\n\n44. print('Enter a number:')\n    try:\n        number = int(input())\n\
    \        print('You entered a number.')\n    except ZeroDivisionError:\n     \
    \   print('You did not enter a number.')\n```\n\n## Practice Projects\n\nNow you'll\
    \ create some functions to practice what you've learned.\n\n## Transaction Tracker\n\
    \nWrite a function named after_transaction() that returns the amount of money\
    \ in an account after a transaction. The two parameters for this function are\
    \ balance and transaction. They will both have integer arguments. The balance\
    \ is how much money is currently in the account, and the transaction is how much\
    \ to add or remove from the account (based on whether transaction is a positive\
    \ or negative integer)."
