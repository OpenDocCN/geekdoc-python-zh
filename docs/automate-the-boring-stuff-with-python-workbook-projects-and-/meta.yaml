    \ into the file editor. Chapter 1 of *Automate the Boring Stuff with Python* includes\
    \ a “Hello, world” program that uses comments, the print() and input() functions,\
    \ and the value and operator concepts from the previous section. To further explore\
    \ these building blocks of programs, label the following as a variable, function\
    \ call, or string.\n\n- 58. 'hello'\n- 59. hello\n- 60. print()\n- 61. 'print()'\n\
    \nDo the following expressions cause an error or no error? If they cause no error,\
    \ what do they evaluate to?\n\n- 62. int('42')\n- 63. int('forty two')\n- 64.\
    \ int('Hello')\n- 65. int(-42)\n- 66. int(3.1415)\n- 67. float(-42)\n- 68. str(-42)\n\
    - 69. str(3.1415)\n- 70. str('Hello')\n- 71. str(float(int(3.14)))\n- 72. str(3)\n\
    - 73. str(3.0)\n\nAnswer the following questions to further your understanding\
    \ of the techniques used in the “Hello, world” program.\n\n- 74. Why does this\
    \ two-line program cause an error?\n```\npython\nnumber_of_cats = 4\nprint('I\
