    - 字典（`dict`）：键值对的集合，其中每个键都是唯一的，非常适合结构化数据，如按国家索引的经济指标。\n\n- **算术运算：加法（`+`）、减法（`-`）、乘法（`*`）、除法（`/`）和幂运算（`**`），每种运算都用于操作数值数据。**\n\
