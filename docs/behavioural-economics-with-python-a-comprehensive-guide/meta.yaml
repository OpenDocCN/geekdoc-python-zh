    ## 使用 scikit-learn 进行机器学习简介


    在预测建模的旅程中，我们来到了一个关键节点：通过 scikit-learn 库引入机器学习——这是经济学家涉足数据驱动预测领域的一座灯塔。Scikit-learn
    是一个强大且广泛使用的 Python 库，它提供了一个丰富的机器学习工具宝库，旨在简化和加速从数据探索到深刻洞察的路径。


    Scikit-learn 以其用户友好的设计而备受赞誉，它允许在不同模型之间无缝切换。其一致的 API 确保了你一旦学会构建一个模型，适应另一个模型就变得轻而易举。对于机器学习新手来说，这个库既是入门点，也是在追求预测能力过程中的得力伙伴。


    ```python

    from sklearn.tree import DecisionTreeClassifier

