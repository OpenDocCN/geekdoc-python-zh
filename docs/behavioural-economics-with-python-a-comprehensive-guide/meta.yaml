    Herd behavior is the tendency of individuals to mimic the actions of a larger
    group, whether rational or irrational, often leading to a convergence of behavior
    in financial markets, such as stock buying frenzies or sell-offs. Information
    cascades occur when an individual, having observed the actions of those before
    them, decides to follow suit despite their own initial inclinations or private
    information, potentially leading to collective misjudgments.


