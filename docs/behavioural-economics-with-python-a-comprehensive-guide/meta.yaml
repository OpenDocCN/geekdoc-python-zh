    \ pain of losses often outweighs the pleasure of equivalent gains—a concept known\
    \ as loss aversion. This theory also introduces the idea of framing effects, where\
    \ the context in which choices are presented can significantly influence an investor's\
    \ decisions.\n\nIn the realm of investments, Prospect Theory implies that individuals\
    \ are more likely to choose a certain outcome over a gamble with higher expected\
    \ value but also with higher risk. This preference can lead to suboptimal investment\
    \ strategies, such as holding onto losing stocks in the hope of breaking even\
    \ (the disposition effect) or shying away from investments that, while volatile,\
    \ may yield higher returns in the long run.\n\n```\npython\nimport numpy as np\n\
