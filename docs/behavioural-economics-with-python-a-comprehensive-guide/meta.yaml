    non-cooperative games, where players act independently, cooperative games explore
    the possibilities that arise when binding agreements and joint strategies are
    allowed. The central question is how to distribute the collective payoff among
    the members of a coalition so that no subset of agents would prefer to break away
    and form a different alliance—a concept known as the core of the game.


