    要理解锚定如何影响经济行为，必须深入探究这种启发式的机制。初始锚点设定了一个心理基准，然后进行调整以偏离此锚点，从而做出最终决策或估计。然而，这些调整通常是不充分的，导致最终判断比基于客观数据应有的更接近锚点。


