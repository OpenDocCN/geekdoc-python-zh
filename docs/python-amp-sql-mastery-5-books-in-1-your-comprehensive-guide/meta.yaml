    import pandas as pd\nfrom sklearn.cluster import KMeans\nimport matplotlib.pyplot\
    \ as plt\n\ndef create_connection():\n    connection_string = \"Driver={SQL Server};Server=YOUR_SERVER_NAME;Database=YOUR_DATABASE_NAME;UID=YOUR_USERNAME;PWD=YOUR_PASSWORD;\"\
    \n    return pyodbc.connect(connection_string)\n\ndef fetch_customer_data(conn):\n\
    \    query = \"SELECT CustomerID, TotalAmount, PurchaseFrequency FROM Customers;\"\
    \n    return pd.read_sql(query, conn)\n\ndef perform_customer_segmentation(data):\n\
    \    # Using KMeans for clustering customers\n    kmeans = KMeans(n_clusters=4,\
    \ random_state=0).fit(data[['TotalAmount', 'PurchaseFrequency']])\n    data['Cluster']\
    \ = kmeans.labels_\n\n    # Plotting the clusters\n    plt.scatter(data['TotalAmount'],\
    \ data['PurchaseFrequency'], c=data['Cluster'])\n    plt.xlabel('Total Amount')\n\
    \    plt.ylabel('Purchase Frequency')\n    plt.title('Customer Segmentation')\n\
    \    plt.show()\n\n    return data\n\n# Example usage\nconn = create_connection()\n\
    customer_data = fetch_customer_data(conn)\nsegmented_customers = perform_customer_segmentation(customer_data)\n\
    print(segmented_customers)\n```\n\n将连接详细信息替换为您的 SQL Server 信息。\n\n### 步骤 4：运行脚本\n\
