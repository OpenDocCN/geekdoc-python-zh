    \nexcept Exception as e:\n    print(f\"连接 SQL Server 时出错: {e}\")\n```\n\n请将 `YOUR_SERVER_NAME`、`YOUR_DATABASE_NAME`、`YOUR_USERNAME`\
    \ 和 `YOUR_PASSWORD` 替换为您的实际 SQL Server 详细信息。\n\n### 步骤 3：运行脚本\n\n在命令提示符或终端中使用\
    \ `python test_connection.py` 运行该脚本。脚本应连接到 SQL Server 数据库并打印 SQL Server 的版本。\n\
    \n## 结论\n\n为 Python 和 SQL Server 集成搭建开发环境是确保开发过程顺畅高效的关键一步。本章概述了安装和配置 Python 和\
    \ SQL Server 以及用于数据库连接的 pyodbc 库的必要步骤。实际示例演示了如何从 Python 建立与 SQL Server 的连接并执行基本查询，为更复杂的开发任务奠定了坚实基础。随着本书的深入，此设置将作为开发和部署利用\
    \ SQL Server 强大数据管理能力的复杂 Python 应用程序的基础。\n\n## 第四章：Python 中的数据库连接\n\n建立连接：使用 Python\
    \ 与 SQL Server 交互\n\n在本章中，我们将深入探讨在 Python 和 SQL Server 之间建立和管理数据库连接的实际操作。对于任何使用这些技术的开发者来说，这是一项关键技能，因为它能够创建动态的、数据驱动的应用程序。我们将涵盖从\
    \ Python 连接到 SQL Server 的不同方法、管理数据库会话、执行 SQL 查询以及处理结果。一个详细的示例将展示这些概念的实际应用。\n\n\
    ### 理解数据库连接\n\nPython 中的数据库连接通常通过提供与 SQL Server 交互接口的第三方库来实现。最常用的库是 pyodbc，它遵循\
    \ Python 数据库 API 规范 v2.0 (PEP 249)。这种标准化确保了数据库交互的一致性和易用性。\n\n### 安装 pyodbc\n\n\
    如果在上一章中尚未安装，可以使用 Python 的包管理器 pip 安装 pyodbc：\n```shell\npip install pyodbc\n```\n\
    \n### 构建连接字符串\n\n连接字符串包含建立与 SQL Server 数据库连接所需的详细信息。它通常包括驱动程序、服务器名称、数据库名称和身份验证详细信息。\n\
    ```python\nconnection_string = \"Driver={SQL Server};Server=YOUR_SERVER_NAME;Database=YOUR_DATABASE_NAME;UID=YOUR_USERNAME;PWD=YOUR_PASSWORD;\"\
    \n```\n\n### 建立连接\n\n要连接到 SQL Server，请使用 `pyodbc.connect()` 方法并传入连接字符串：\n```python\n\
    import pyodbc\nconn = pyodbc.connect(connection_string)\n```\n\n### 执行 SQL 命令\n\
    \n连接后，您可以使用从连接获取的游标对象执行 SQL 命令。游标允许执行 SQL 查询、获取结果和管理事务。\n\n### 管理事务\n\n事务对于维护数据完整性至关重要。pyodbc\
    \ 支持事务管理，允许您根据执行结果提交或回滚更改。\n\n### 实际示例：CRUD 操作\n\n让我们创建一个 Python 脚本，对 SQL Server\
    \ 数据库执行基本的创建、读取、更新和删除 (CRUD) 操作。\n\n### 步骤 1：创建 Python 脚本\n\n创建一个名为 `crud_operations.py`\
    \ 的新文件。\n\n### 步骤 2：编写 CRUD 函数\n\n在您的脚本中包含以下代码：\n```python\nimport pyodbc\n\n\
    def create_connection():\n    connection_string = \"Driver={SQL Server};Server=YOUR_SERVER_NAME;Database=YOUR_DATABASE_NAME;UID=YOUR_USERNAME;PWD=YOUR_PASSWORD;\"\
    \n    return pyodbc.connect(connection_string)\n\ndef create_employee(conn, employee):\n\
    \    with conn.cursor() as cursor:\n        cursor.execute(\"INSERT INTO Employees\
    \ (Name, Department) VALUES (?, ?);\", (employee['name'], employee['department']))\n\
    \        conn.commit()\n```"
