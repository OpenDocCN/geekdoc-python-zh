    \ sales\n                    (id INTEGER PRIMARY KEY, product_id INTEGER, quantity\
    \ INTEGER, date TEXT)\"\"\")\n\nsales_data = [(1, 1, 2, '2023-01-15'),\n     \
    \         (2, 2, 1, '2023-01-17'),\n              (3, 1, 1, '2023-01-19')]\n\n\
    cursor.executemany('INSERT INTO sales VALUES (?,?,?,?)', sales_data)\n```\n\n\
    Next, we perform a SQL query to get sales information and use Python for further\
