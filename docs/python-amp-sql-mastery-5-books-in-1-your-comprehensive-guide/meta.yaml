    # ## Joins in SQL


    Joins are used to combine rows from two or more tables, based on a related column
    between them. There are several types of joins:


    +   1. **INNER JOIN**: Returns records that have matching values in both tables.

    2. **LEFT (OUTER) JOIN**: Returns all records from the left table, and the matched
    records from the right table.

    3. **RIGHT (OUTER) JOIN**: Returns all records from the right table, and the matched
    records from the left table.

    4. **FULL (OUTER) JOIN**: Returns all records when there is a match in either
    left or right table.


    # ## Subqueries


    A subquery is a query nested inside another query. It can be used in various places,
    including the SELECT, FROM, and WHERE clauses, to define a condition or to specify
    a dataset for the main query to act upon.


    # ## Aggregate Functions


    Aggregate functions perform a calculation on a set of values and return a single
    value. Common aggregate functions include SUM(), AVG(), COUNT(), MAX(), and MIN().


