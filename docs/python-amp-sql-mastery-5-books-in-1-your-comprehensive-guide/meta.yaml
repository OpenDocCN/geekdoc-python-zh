    \ | department_id, department_name |\n\nWe are tasked with creating a report that\
    \ includes all employees, their department names, and the total number of employees\
    \ in each department.\nFirst, we use a subquery to calculate the total number\
    \ of employees in each department:\n\n```sql\nSELECT department_id, COUNT(*) as\
    \ total_employees\nFROM Employees\nGROUP BY department_id;\n```\n\nNext, we use\
