  md: "Window functions perform calculations across a set of table rows that are somehow\
    \ related to the current row. They are useful for running totals, rankings, and\
    \ other cumulative metrics.\n\n```\nsql\nSELECT username, purchase_date,\n   \
    \    SUM(amount) OVER (PARTITION BY username ORDER BY purchase_date) AS running_total\n\
    FROM purchases\n\n```\n\n# 8.5 Working with Common Table Expressions (CTEs)\n\n\
    CTEs provide a way to write more readable and maintainable queries. They allow\
    \ you to define a temporary result set that you can reference within another SELECT,\
    \ INSERT, UPDATE, or DELETE query.\n\n```\nsql\nWITH monthly_sales AS (\n    SELECT\
    \ DATE_TRUNC('month', sale_date) AS month, SUM(amount) AS total_sales\n    FROM\
