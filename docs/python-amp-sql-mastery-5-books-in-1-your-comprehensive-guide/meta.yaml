    \ 50000, 2),\n(104, 'Bob Brown', 55000, 3);\n```\n\n### 1. Using Joins\n\nTo display\
    \ the name of each employee along with their department name:\n\n```sql\nSELECT\
    \ Employees.Name, Departments.DepartmentName\nFROM Employees\nINNER JOIN Departments\
    \ ON Employees.DepartmentID = Departments.DepartmentID;\n```\n\n### 2. Using Subqueries\n\
    \nTo find the employees who earn more than the average salary in their department:\n\
