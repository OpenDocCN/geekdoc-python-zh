    ### 9.8 实际示例：销售数据分析\n\n假设你有一个包含销售数据的数据库，你想要可视化随时间变化的销售趋势，以及销售与另一个变量（如广告支出）之间的关系。\n\
    \n首先，检索数据：\n\n```python\nquery = \"SELECT date, sales, advertising_spend FROM\
