    # 8.1 Understanding Advanced SQL Concepts


    Advanced SQL involves concepts such as subqueries, complex joins, window functions,
    and CTEs (Common Table Expressions). These concepts enable more intricate operations
    on data.


    # 8.2 Using Subqueries


    Subqueries are queries nested within other SQL queries. They can be used in various
    places such as in the SELECT, FROM, and WHERE clauses.


    ```

    sql

    SELECT * FROM users WHERE id IN (SELECT user_id FROM orders WHERE purchase_date
    > ''2023-01-01'')

    ```


    # 8.3 Implementing Complex Joins


    Complex joins involve joining multiple tables in a single query, which is particularly
    useful in databases with normalized schemas.


    ```

    sql

    SELECT orders.id, users.username, products.name

    FROM orders

    JOIN users ON orders.user_id = users.id

    JOIN products ON orders.product_id = products.id

    ```


    # 8.4 Utilizing Window Functions'
- md: "Window functions perform calculations across a set of table rows that are somehow\
    \ related to the current row. They are useful for running totals, rankings, and\
    \ other cumulative metrics.\n\n```sql\nSELECT username, purchase_date,\n     \
    \  SUM(amount) OVER (PARTITION BY username ORDER BY purchase_date) AS running_total\n\
    FROM purchases\n```\n\n## 8.5 Working with Common Table Expressions (CTEs)\n\n\
    CTEs provide a way to write more readable and maintainable queries. They allow\
    \ you to define a temporary result set that you can reference within another SELECT,\
    \ INSERT, UPDATE, or DELETE query.\n\n```sql\nWITH monthly_sales AS (\n    SELECT\
    \ DATE_TRUNC('month', sale_date) AS month, SUM(amount) AS total_sales\n    FROM\
    \ sales\n    GROUP BY month\n)\nSELECT * FROM monthly_sales\n```\n\n## 8.6 Dynamic\
    \ SQL in Python\n\nPython can be used to construct and execute dynamic SQL queries,\
    \ which is useful when the structure of your query depends on user input or other\
