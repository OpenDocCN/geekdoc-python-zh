    \ Python 添加到 PATH 环境变量的选项。\n- 3. **验证安装**：打开命令提示符或终端，输入 `python --version`。这将显示已安装的\
    \ Python 版本，确认安装成功。\n\n### SQL Server 安装\n\n- 1. **下载 SQL Server**：访问 Microsoft\
    \ 网站，下载 SQL Server Developer Edition，该版本免费用于开发目的。\n- 2. **运行安装程序**：按照安装向导操作。选择必要的功能，例如数据库引擎和\
    \ SQL Server Management Studio (SSMS)。\n- 3. **完成设置**：安装完成后，启动 SSMS 并连接到您的 SQL\
    \ Server 实例，以确保其正常运行。\n\n### 配置 Python 以连接 SQL Server\n\n### 安装 pyodbc\n\nPyodbc\
    \ 是一个 Python 库，用于方便地连接 SQL Server。使用 Python 的包管理器 pip 进行安装，在命令提示符中运行 `pip install\
    \ pyodbc`。\n\n### 设置数据库连接\n\n- 1. **收集连接详情**：获取连接到 SQL Server 实例所需的详细信息，包括服务器名称、数据库名称、用户名和密码（如果使用\
    \ SQL Server 身份验证）。\n- 2. **创建连接字符串**：使用这些详细信息构建连接字符串。例如：\n```python\nconnection_string\
    \ = \"Driver={SQL Server};Server=YOUR_SERVER_NAME;Database=YOUR_DATABASE_NAME;UID=YOUR_USERNAME;PWD=YOUR_PASSWORD;\"\
    \n```\n- 3. **建立连接**：使用 pyodbc 建立与 SQL Server 的连接：\n```python\nimport pyodbc\n\
    connection = pyodbc.connect(connection_string)\n```\n\n### 实际示例：设置和测试环境\n\n为了演示设置过程，让我们创建一个简单的\
    \ Python 脚本，该脚本连接到 SQL Server 并执行一个基本查询。\n\n### 步骤 1：创建新的 Python 文件\n\n在您首选的代码编辑器或\
    \ IDE 中，创建一个名为 `test_connection.py` 的新 Python 文件。\n\n### 步骤 2：编写 Python 脚本\n\n\
    在 `test_connection.py` 中，编写以下代码：\n\n```python\nimport pyodbc\n\n# 定义连接字符串\nconnection_string\
    \ = \"Driver={SQL Server};Server=YOUR_SERVER_NAME;Database=YOUR_DATABASE_NAME;UID=YOUR_USERNAME;PWD=YOUR_PASSWORD;\"\
    \n\n# 建立与数据库的连接\ntry:\n    with pyodbc.connect(connection_string, timeout=10)\
    \ as connection:\n        print(\"连接成功。\")\n\n        # 使用连接创建游标对象\n        cursor\
    \ = connection.cursor()\n\n        # 执行一个简单的查询\n        cursor.execute(\"SELECT\
    \ @@VERSION;\")\n\n        # 获取并打印查询结果\n        row = cursor.fetchone()\n    \
