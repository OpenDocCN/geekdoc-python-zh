    \ purpose in data retrieval, especially in scenarios where you need to combine\
    \ data from multiple tables.\n\n## 5.6 LEFT JOIN and RIGHT JOIN\n\nLEFT JOIN returns\
    \ all records from the left table and the matched records from the right table.\
    \ The result is NULL from the right side if there is no match. RIGHT JOIN is the\
    \ opposite of LEFT JOIN.\n\n```sql\nSELECT employee.name, department.name\nFROM\
    \ employees AS employee\nLEFT JOIN departments AS department ON employee.department_id\
    \ = department.department_id;\n```\n\nThis query retrieves all employees and their\
    \ department names, including employees who might not be assigned to any department.\n\
    \n## 5.7 FULL OUTER JOIN\n\nFULL OUTER JOIN returns all records when there is\
    \ a match in either left or right table. This can be particularly useful for finding\
