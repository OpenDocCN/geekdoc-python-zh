    # Normalization


    Normalization is a process used to organize data in a database efficiently. It
    involves structuring a database in a way that reduces redundancy and improves
    data integrity. Normalization is typically done through a series of steps, each
    called a "normal form." The most commonly used normal forms are the First Normal
    Form (1NF), Second Normal Form (2NF), and Third Normal Form (3NF).


    +   - **First Normal Form (1NF):** Ensures that the table has no duplicate rows
    and that each column contains atomic values.

    - **Second Normal Form (2NF):** Achieved when a table is in 1NF and all non-key
    attributes are fully functionally dependent on the primary key.

    - **Third Normal Form (3NF):** A table is in 3NF if it is in 2NF and all the attributes
    are not only dependent on the primary key but are also non-transitively dependent
    on it.


    We will explore these concepts in detail, understanding how each normal form contributes
    to a more efficient and logical database design.


    # Indexing for Performance'
