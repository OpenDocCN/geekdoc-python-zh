- md: "## 12.5 Storing Web Data in SQL Databases\n\nOnce the data is extracted, it\
    \ can be stored in a SQL database for further analysis. Python's database libraries\
    \ can be used to insert scraped or API-retrieved data into a database.\n\n## 12.6\
    \ Practical Example: Scraping and Storing Product Data\n\nLet’s consider an example\
    \ where we scrape product information from an e-commerce website and store it\
    \ in a MySQL database.\n\nFirst, we use Beautiful Soup to scrape product data:\n\
    \n```python\nimport requests\nfrom bs4 import BeautifulSoup\n\nurl = 'http://example-ecommerce.com/products'\n\
    response = requests.get(url)\nsoup = BeautifulSoup(response.content, 'html.parser')\n\
    \nproducts = []\nfor product in soup.find_all('div', class_='product'):\n    name\
    \ = product.find('h2', class_='product-name').text\n    price = product.find('span',\
    \ class_='price').text\n    products.append({'name': name, 'price': price})\n\
    ```\n\nNext, insert this data into a MySQL database:\n\n```python\nimport sqlalchemy\n\
    engine = sqlalchemy.create_engine('mysql+pymysql://user:password@host/database')\n\
    \nwith engine.connect() as connection:\n    for product in products:\n       \
    \ query = sqlalchemy.text(\"INSERT INTO products (name, price) VALUES (:name,\
    \ :price)\")\n        connection.execute(query, **product)\n```\n\n## 12.7 Using\
    \ APIs for Data Retrieval\n\nSuppose we want to integrate data from a third-party\
    \ API, like a social media analytics API. We can use Python's requests library\
    \ to consume the API and store the data:\n\n```python\nimport requests\nimport\
    \ sqlalchemy\n\napi_url = 'http://api.socialmediaanalytics.com/data'\nresponse\
    \ = requests.get(api_url)\ndata = response.json()\n\nengine = sqlalchemy.create_engine('mysql+pymysql://user:password@host/database')\n\
    \nwith engine.connect() as connection:\n    for item in data['items']:\n     \
    \   query = sqlalchemy.text(\"INSERT INTO social_media_data (id, metric) VALUES\
    \ (:id, :metric)\")\n        connection.execute(query, **item)\n```\n\n## 12.8\
    \ Conclusion\n\nIntegrating web data into your data analysis workflow can significantly\
