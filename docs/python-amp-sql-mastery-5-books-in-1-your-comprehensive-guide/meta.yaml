    \ are two main types of subqueries: correlated and non-correlated. A non-correlated\
    \ subquery is independent of the outer query and can be run alone. In contrast,\
    \ a correlated subquery depends on data from the outer query.\n\n## 5.3 Basic\
    \ Subquery Syntax\n\nThe basic syntax for a subquery involves nesting a SELECT\
    \ statement inside another SQL statement. Here's a simple example:\n\n```sql\n\
    SELECT * FROM employees WHERE department_id IN (SELECT department_id FROM departments\
    \ WHERE name = 'Sales');\n```\n\nIn this example, the subquery retrieves department\
