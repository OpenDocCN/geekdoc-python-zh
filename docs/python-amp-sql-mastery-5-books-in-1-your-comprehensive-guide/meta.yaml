    # Keys and Indexes


    Primary keys and foreign keys are essential in SQL tables for ensuring data integrity
    and establishing relationships between tables.


    +   - **Primary Key**: A unique identifier for each record in a table.

    - **Foreign Key**: A field in one table that links to the primary key in another
    table.


    Indexes are used to quickly locate data without having to search every row in
    a database table every time a database table is accessed.


    # Table Relationships


    There are three main types of relationships in SQL:


    +   1. **One-to-One**: Each row in Table A is linked to one and only one row in
    Table B.

    2. **One-to-Many**: A row in Table A can be related to many rows in Table B.

    3. **Many-to-Many**: Rows in Table A can be related to many rows in Table B and
    vice versa.


