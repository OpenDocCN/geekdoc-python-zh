    ### Understanding Relational Databases\n\nAt the heart of SQL is the concept of\
    \ the relational database—a collection of data items organized as a set of formally\
    \ described tables from which data can be accessed or reassembled in various ways\
    \ without having to reorganize the database tables. Each table is a collection\
    \ of related data entries and consists of columns and rows.\n\n### SQL Basics:\
