    \ Normalization is typically done through a series of steps, each known as a \"\
    normal form.\"\n\n## 7.3 First Normal Form (1NF)\n\nThe first normal form (1NF)\
    \ requires that each column in a table be unique and contain atomic, indivisible\
    \ values. This ensures that each piece of data is stored in its own column and\
