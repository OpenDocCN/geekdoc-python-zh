    ## 第14章：SQL连接


    *将多个表的数据汇集在一起*


    ## SQL连接简介


    本章将以SQL连接的简介开始，解释其在组合多个表的数据以检索有意义信息的重要性。这将为更深入的探讨奠定基础。


    ## 理解表关系


    本节将深入探讨在关系数据库中理解表关系的重要性。它将解释主键、外键和参照完整性的概念。


    ## SQL连接的类型


    本章将涵盖不同类型的SQL连接，包括INNER JOIN、LEFT JOIN（或LEFT OUTER JOIN）、RIGHT JOIN（或RIGHT OUTER
    JOIN）和FULL JOIN（或FULL OUTER JOIN）。它将解释何时以及如何有效使用每种类型。


    ## 使用INNER JOIN进行数据匹配


    本部分将重点关注INNER JOIN，它检索两个表中具有匹配值的行。实际示例将阐明诸如将客户数据与订单数据组合等场景。


