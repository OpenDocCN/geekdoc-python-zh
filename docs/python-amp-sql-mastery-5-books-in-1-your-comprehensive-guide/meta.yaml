    +   1. **Data Extraction (Extract):** Python scripts extract daily transaction
    data from individual store databases and online sales platforms using APIs. Data
    is fetched as JSON or CSV files.

    2. **Data Transformation (Transform):** Python scripts clean and transform the
    extracted data. For example, they standardize product names, calculate total sales,
    and format dates.

    3. **Data Loading (Load):** SQL is used to define a data warehouse schema, including
    tables for sales, products, stores, and time dimensions. Transformed data is loaded
    into these tables.'
