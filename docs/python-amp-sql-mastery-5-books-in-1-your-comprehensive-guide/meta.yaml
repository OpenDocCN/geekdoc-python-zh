    column.

    2. **Subqueries:** Queries nested within another SQL query.

    3. **Aggregate Functions:** Used for data summarization, such as SUM(), AVG(),
    MAX(), and COUNT().


    # Stored Procedures in SQL Server


    Stored procedures are SQL scripts saved in the database, which can be executed
    on demand. They are useful for encapsulating complex business logic, improving
    performance, and enhancing security.


    1. **Creating Stored Procedures:** Writing SQL scripts to define a stored procedure.

    2. **Executing Stored Procedures:** Calling a stored procedure from Python.


    # Views in SQL Server


    Views are virtual tables created by a query. They provide a way to present data
    in a specific format or to simplify complex queries.'
