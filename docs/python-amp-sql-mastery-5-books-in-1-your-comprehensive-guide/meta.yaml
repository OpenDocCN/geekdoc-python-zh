    \n### 错误类型\n\n- **语法错误：** 当代码不符合 Python 语法规则时发生。\n- **运行时错误：** 在程序执行期间发生，例如除以零或访问不存在的文件。\n\
    - **逻辑错误：** 由代码中的逻辑缺陷导致，产生不正确的结果。\n\n## SQL Server 错误处理\n\n与 SQL Server 交互时，错误可能发生在查询执行、连接问题或事务处理过程中。有效地处理这些错误对于数据库完整性和应用程序稳定性至关重要。\n\
    \n## 调试技术\n\n- **日志记录：** 保留应用程序活动的日志，以跟踪其行为和错误。\n- **使用调试器：** 像 Python 的 pdb 或基于\
