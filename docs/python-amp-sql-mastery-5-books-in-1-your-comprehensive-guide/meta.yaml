    # Understanding SQL Data Manipulation Language (DML)


    SQL Data Manipulation Language (DML) is a subset of SQL commands used to add,
    update, and delete data in a database. The primary DML commands are INSERT, UPDATE,
    and DELETE.


    +   1. **INSERT**: Used to add new rows to a table.

    2. **UPDATE**: Used to modify existing data in a table.

    3. **DELETE**: Used to remove rows from a table.


    # Inserting Data into Tables


    The INSERT command is used to add new records to a table. The syntax allows for
    inserting data into specific columns or all columns in a table.


    ```

    sql

    INSERT INTO table_name (column1, column2, column3, ...)

    VALUES (value1, value2, value3, ...);

    ```


    # Updating Data in Tables


    The UPDATE command is used to modify existing records in a table. It is crucial
    to use a WHERE clause to specify which records should be updated; otherwise, all
    records will be updated.


    ```

    sql

    ```'
