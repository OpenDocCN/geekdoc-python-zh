    page that looks like [Link to Come].

    Clicking the “Clone or download” button allows you to copy the repository’s URL
    and then paste it after the command `git` in your Terminal session.


    # Discussion


    There is a difference between Git and GitHub. Git is the software and GitHub is
    one of many websites hosting code that you *push* to GitHub using Git. In fact
    you can actually host your own Git repository on a Raspberry Pi if you want to.
    However, there are benefits to using a Git-based website such as GitHub or GitLab:


    +   - Your code is stored in the cloud, so if your disk (or SD card) breaks, you
    won’t lose the code.

    - The code is publicly visible, so other people can look at it and use it, and
    if they find things wrong with it they might even offer up fixes for you.

    - You can include documentation about your project for all to see in the README
    file.'
  - '[PAGE 131]


    ![](img/54ed1f8e884bc184601bf6f652461a95_131_0.png)


    If you are working on a Raspberry Pi project that you think others might be interested
    in, I would recommend using GitHub or GitLab to host your code. There is a little
    bit to learn, but it’s worth the effort.


    Another advantage to using Git (whether locally or with a service like GitHub)
    is that every time you do a chunk of work on a project, you will push that work
    up to the master copy of your code. This does not replace the code that was already
    there but is instead stored as a new edition. You can at any time recover earlier
    versions of the code, should you make a mistake.


    I host all of the code from my books and other projects on GitHub. These are the
    steps I take when I make a new repository:


    +   1. Go to your home page on GitHub (you’ll need to create an account) and click
    the + button and select the New Repository option.

    2. Give the repository a name and short description.'
- md: "## 3.22 Fetching This Book’s Accompanying Code\n\n### Problem\n\nYou want to\
    \ download all the source code and other files relating to this book.\n\n### Solution\n\
    \nYou can either *clone* the files from GitHub as described in [Recipe 3.21](Recipe\
    \ 3.21) or, as we will describe here, get the downloads as a single ZIP archive\
    \ file from GitHub.\n\nA good starting point for getting the book’s downloads\
    \ is to go to [the book’s web page](the book’s web page) using the browser on\
    \ your Raspberry Pi. Here, in addition to a link to the book’s code hosted on\
    \ GitHub, you will find errata and other information about the book.\n\nSo whether\
    \ you begin at the website or directly at [the GitHub page](the GitHub page),\
    \ when you click the “Clone or download” button, you will see an option to Download\
    \ ZIP. You can see this in [Figure 3-13](Figure 3-13) in [Recipe 3.21](Recipe\
    \ 3.21).\n\nClick the Download ZIP option. Chromium saves this to your Downloads\
    \ folder. Click the down arrow next to the downloaded ZIP file and then select\
    \ the option “Show in folder.”\n\nThis opens a File Manager window in the Downloads\
    \ folder. Find the ZIP file that has just been downloaded.\n\nDouble-click the\
    \ ZIP file to open the Xarchiver tool on the ZIP file and then click the “Extract\
    \ files” icon.\n\nIn the dialog that appears, change the path to which the extracted\
    \ folder is to be saved to /home/pi and then click Extract.\n\nAfter the files\
    \ have been extracted, there will be a new folder in your home directory containing\
    \ all the downloads for the book.\n\n### Discussion\n\nIf you now use the File\
    \ Manager to see what’s in your home directory, you will find a folder called\
    \ *raspberry_pi_cookbook_ed3-master*.\n\n### See Also\n\nFor more information\
    \ on using Git and GitHub, see [Recipe 3.21](Recipe 3.21).\n\n## 3.23 Running\
    \ a Program or Script Automatically on Startup\n\n### Problem\n\nYou want a program\
    \ or script to start automatically as your Raspberry Pi boots.\n\n### Solution\n\
    \nModify your *rc.local* file to run the program you want.\nEdit the file */etc/rc.local*\
    \ by using the following command:\n\n```\n$ sudo nano /etc/rc.local\n```\n\nAdd\
    \ the following line after the first block of comment lines that begin with #:\n\
    \n```\n$ /usr/bin/python /home/pi/my_program.py &\n```\n\nIt is important to include\
    \ the & on the end of the command line so that it is run in the background; otherwise\
    \ your Raspberry Pi will not boot.\n\n### Discussion\n\nThis way of auto-running\
    \ a program needs a very careful edit of *rc.local*, or you can stop your Raspberry\
    \ Pi from booting.\n\n### See Also\n\nA safer way of autorunning a program is\
    \ detailed in [Recipe 3.24](Recipe 3.24).\n\n## 3.24 Running a Program or Script\
    \ Automatically as a Service\n\n### Problem\n\nYou want to arrange for a script\
    \ or program to start automatically every time the Raspberry Pi reboots.\n\n###\
    \ Solution\n\nDebian Linux, on which most Raspberry Pi distributions are based,\
    \ uses a dependency-based mechanism for automating the running of commands at\
    \ startup. This is a little tricky to use and involves creating a configuration\
    \ file for the script or program that you want to run, which will reside in a\
    \ folder called *init.d*.\n\n### Discussion\n\nThe following example shows you\
    \ how to run a Python script in your home directory. The script could do anything,\
    \ but in this case, the script runs a simple Python web server, which is described\
    \ further in [Link to Come].\nHere are the steps involved:\n\n- 1. Create an *init*\
    \ script.\n- 2. Make the *init* script executable.\n- 3. Tell the system about\
    \ the new *init* script.\n\nFirst, create the *init* script. You need to create\
    \ this in the folder `/etc/init.d/`. The script can be called anything, but in\
    \ this example, we call it `my_server`.\n\nCreate the new file by using nano with\
    \ the following command:\n\n```\n$ sudo nano /etc/init.d/my_server\n```\n\nPaste\
    \ the following code into the editor window and save the file. This is a lot to\
    \ type, so if you are reading a paper copy of this book, you can copy and paste\
    \ the code from [this web page](this web page); just scroll down until you find\
    \ this chapter and recipe:\n\n```\n### BEGIN INIT INFO\n# Provides: my_server\n\
    # Required-Start: $remote_fs $syslog $network\n# Required-Stop: $remote_fs $syslog\
    \ $network\n# Default-Start: 2 3 4 5\n# Default-Stop: 0 1 6\n# Short-Description:\
    \ Simple Web Server\n# Description: Simple Web Server\n### END INIT INFO\n\n#!\
    \ /bin/sh\n# /etc/init.d/my_server\n\nexport HOME\ncase \"$1\" in\n  start)\n\
    \    echo \"Starting My Server\"\n    sudo /usr/bin/python /home/pi/myserver.py\
    \ 2>&1 &\n    ;;\n  stop)\n    echo \"Stopping My Server\"\n    PID=`ps auxww\
    \ | grep myserver.py | head -1 | awk '{print $2}'`\n    kill -9 $PID\n    ;;\n\
    \  *)\n    echo \"Usage: /etc/init.d/my_server {start|stop}\"\n    exit 1\n  \
    \  ;;\nesac\nexit 0\n```\n\nThis is quite a lot of work to automate the running\
    \ of a script, but most of it is boiler-plate code that is the same for every\
    \ service. To run a different script, just work your way through the script, changing\
    \ the descriptions and the name of the Python file that you want to run.\nThe\
    \ next step is to make this file executable for the owner, which you do by using\
    \ this command:\n\n```\n$ sudo chmod +x /etc/init.d/my_server\n```\n\nNow that\
    \ the program is set up as a service, you can use the following command to test\
    \ that everything is OK before you set it to autostart as part of the boot sequence:\n\
    \n```\n$ /etc/init.d/my_server start\nStarting My Server\nBottle v0.11.4 server\
    \ starting up (using WSGIRefServer())...\nListening on http://192.168.1.16:80/\n\
    Hit Ctrl-C to quit.\n```\n\nFinally, if that runs OK, use the following command\
    \ to make the system aware of the new service that you have defined:\n\n```\n\
    $ sudo update-rc.d my_server defaults\n```\n\n### See Also\n\nFor a simpler approach\
    \ to making a program run automatically, see Recipe 3.23.\nFor more information\
    \ on changing file and folder permissions, see Recipe 3.13.\n\n## 3.25 Running\
    \ a Program or Script Automatically at Regular Intervals\n\n### Problem\n\nYou\
    \ want to run a script once each day or at regular intervals.\n\n### Solution\n\
    \nUse the Linux `crontab` command.\nTo do this, the Raspberry Pi needs to know\
    \ the time and date and therefore needs a network connection or a real-time clock;\
    \ see [Link to Come].\n\n### Discussion\n\nThe command `crontab` allows you to\
    \ schedule events to take place at regular intervals. This can be daily or hourly,\
    \ and you can even define complicated patterns so different things happen on different\
    \ days of the week. This is useful for backup tasks that you might want to run\
    \ in the middle of the night.\nYou can edit the scheduled events by using the\
    \ following command:\n\n```\n$ crontab -e\n```\n\nIf the script or program that\
    \ you want to run needs to be run by a superuser, prefix all the `crontab` commands\
    \ with `sudo` (Recipe 3.12).\nThe comment line (starting with a #) indicates the\
    \ format of a `crontab` line. The digits are, in order, minute, hour, day of month,\
    \ month, and day of week and are followed by the command that you want to run.\n\
    If there is a * in the relevant position, that means *every*; if there is a number\
    \ there instead, the script runs only at that minute/hour/day of the month.\n\
    So, to run the script every day at 1 a.m., you would add the line shown in Figure\
    \ 3-14."
  mdcn: "## 3.22 获取本书配套代码\n\n### 问题\n\n你希望下载与本书相关的所有源代码和其他文件。\n\n### 解决方案\n\n你可以按照[技巧\
    \ 3.21](Recipe 3.21) 中描述的方式从 GitHub *克隆*文件，或者，正如我们将在此描述的，从 GitHub 下载一个包含所有内容的\
    \ ZIP 压缩包。\n\n获取本书下载内容的一个好起点是使用你的树莓派上的浏览器访问[本书的网页](the book’s web page)。在这里，除了指向托管在\
    \ GitHub 上的本书代码的链接外，你还会找到勘误表和关于本书的其他信息。\n\n因此，无论你是从网站开始还是直接访问 [GitHub 页面](the\
    \ GitHub page)，当你点击“Clone or download”按钮时，你会看到一个“Download ZIP”的选项。你可以在[技巧 3.21](Recipe\
    \ 3.21) 的[图 3-13](Figure 3-13) 中看到这一点。\n\n点击“Download ZIP”选项。Chromium 浏览器会将其保存到你的“下载”文件夹。点击已下载的\
    \ ZIP 文件旁边的下箭头，然后选择“在文件夹中显示”选项。\n\n这将打开一个文件管理器窗口，显示“下载”文件夹的内容。找到刚刚下载的 ZIP 文件。\n\
    \n双击 ZIP 文件以使用 Xarchiver 工具打开它，然后点击“解压文件”图标。\n\n在出现的对话框中，将解压文件夹的保存路径更改为 `/home/pi`，然后点击“解压”。\n\
    \n文件解压后，你的主目录中将出现一个新文件夹，其中包含本书的所有下载内容。\n\n### 讨论\n\n如果你现在使用文件管理器查看主目录的内容，你会发现一个名为\
    \ *raspberry_pi_cookbook_ed3-master* 的文件夹。\n\n### 另请参阅\n\n有关使用 Git 和 GitHub 的更多信息，请参阅[技巧\
    \ 3.21](Recipe 3.21)。\n\n## 3.23 在启动时自动运行程序或脚本\n\n### 问题\n\n你希望一个程序或脚本在树莓派启动时自动运行。\n\
    \n### 解决方案\n\n修改你的 *rc.local* 文件以运行你想要的程序。\n使用以下命令编辑文件 `/etc/rc.local`：\n\n```\n\
    $ sudo nano /etc/rc.local\n```\n\n在以 # 开头的第一段注释行之后添加以下行：\n\n```\n$ /usr/bin/python\
    \ /home/pi/my_program.py &\n```\n\n在命令行末尾包含 `&` 非常重要，这样它才能在后台运行；否则你的树莓派将无法启动。\n\
    \n### 讨论\n\n这种自动运行程序的方式需要非常小心地编辑 *rc.local*，否则你可能会导致树莓派无法启动。\n\n### 另请参阅\n\n一种更安全的自动运行程序的方法在[技巧\
    \ 3.24](Recipe 3.24) 中有详细说明。\n\n## 3.24 作为服务自动运行程序或脚本\n\n### 问题\n\n你希望安排一个脚本或程序在每次树莓派重启时自动启动。\n\
    \n### 解决方案\n\n大多数树莓派发行版所基于的 Debian Linux 使用一种基于依赖的机制来自动化在启动时运行命令。这有点棘手，涉及为你想要运行的脚本或程序创建一个配置文件，该文件将位于一个名为\
    \ *init.d* 的文件夹中。\n\n### 讨论\n\n以下示例向你展示如何运行主目录中的一个 Python 脚本。该脚本可以做任何事情，但在本例中，该脚本运行一个简单的\
    \ Python Web 服务器，这在[待补充链接]中有进一步描述。\n以下是涉及的步骤：\n\n- 1. 创建一个 *init* 脚本。\n- 2. 使\
    \ *init* 脚本可执行。\n- 3. 将新的 *init* 脚本告知系统。\n\n首先，创建 *init* 脚本。你需要在文件夹 `/etc/init.d/`\
    \ 中创建它。脚本可以任意命名，但在本例中，我们将其命名为 `my_server`。\n\n使用以下命令通过 nano 创建新文件：\n\n```\n$ sudo\
    \ nano /etc/init.d/my_server\n```\n\n将以下代码粘贴到编辑器窗口中并保存文件。这需要输入很多内容，因此如果你正在阅读本书的纸质版，你可以从[此网页](this\
    \ web page)复制并粘贴代码；只需向下滚动直到找到本章和本技巧：\n\n```\n### BEGIN INIT INFO\n# Provides:\
    \ my_server\n# Required-Start: $remote_fs $syslog $network\n# Required-Stop: $remote_fs\
    \ $syslog $network\n# Default-Start: 2 3 4 5\n# Default-Stop: 0 1 6\n# Short-Description:\
    \ Simple Web Server\n# Description: Simple Web Server\n### END INIT INFO\n\n#!\
    \ /bin/sh\n# /etc/init.d/my_server\n\nexport HOME\ncase \"$1\" in\n  start)\n\
    \    echo \"Starting My Server\"\n    sudo /usr/bin/python /home/pi/myserver.py\
    \ 2>&1 &\n    ;;\n  stop)\n    echo \"Stopping My Server\"\n    PID=`ps auxww\
    \ | grep myserver.py | head -1 | awk '{print $2}'`\n    kill -9 $PID\n    ;;\n\
    \  *)\n    echo \"Usage: /etc/init.d/my_server {start|stop}\"\n    exit 1\n  \
    \  ;;\nesac\nexit 0\n```\n\n要自动化运行一个脚本，这确实需要做很多工作，但其中大部分是每个服务都相同的样板代码。要运行不同的脚本，只需通读脚本，更改描述和你想要运行的\
    \ Python 文件的名称即可。\n下一步是使此文件对所有者可执行，你可以使用以下命令完成：\n\n```\n$ sudo chmod +x /etc/init.d/my_server\n\
    ```\n\n现在程序已设置为服务，你可以使用以下命令在将其设置为启动序列的一部分以自动启动之前，测试一切是否正常：\n\n```\n$ /etc/init.d/my_server\
    \ start\nStarting My Server\nBottle v0.11.4 server starting up (using WSGIRefServer())...\n\
    Listening on http://192.168.1.16:80/\nHit Ctrl-C to quit.\n```\n\n最后，如果运行正常，使用以下命令使系统知道你已定义的新服务：\n\
    \n```\n$ sudo update-rc.d my_server defaults\n```\n\n### 另请参阅\n\n有关使程序自动运行的更简单方法，请参阅技巧\
    \ 3.23。\n有关更改文件和文件夹权限的更多信息，请参阅技巧 3.13。\n\n## 3.25 在固定时间间隔自动运行程序或脚本\n\n### 问题\n\
    \n你希望每天运行一次脚本或按固定间隔运行。\n\n### 解决方案\n\n使用 Linux 的 `crontab` 命令。\n为此，树莓派需要知道时间和日期，因此需要网络连接或实时时钟；参见[待补充链接]。\n\
    \n### 讨论\n\n`crontab` 命令允许你安排事件按固定间隔发生。这可以是每天或每小时，你甚至可以定义复杂的模式，以便在一周的不同日子发生不同的事情。这对于你可能希望在半夜运行的备份任务非常有用。\n\
    你可以使用以下命令编辑计划事件：\n\n```\n$ crontab -e\n```\n\n如果你想要运行的脚本或程序需要由超级用户运行，请在所有 `crontab`\
    \ 命令前加上 `sudo`（技巧 3.12）。\n注释行（以 # 开头）指示了 `crontab` 行的格式。数字依次是分钟、小时、月份中的日期、月份和星期几，后面是你想要运行的命令。\n\
    如果在相关位置有一个 *，那意味着*每个*；如果那里是一个数字，则脚本仅在该分钟/小时/月份中的日期运行。\n因此，要每天凌晨 1 点运行脚本，你需要添加如图\
    \ 3-14 所示的行。"
