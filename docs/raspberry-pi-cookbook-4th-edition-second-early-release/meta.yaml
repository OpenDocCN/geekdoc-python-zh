    # 4.3 Making a Webcam Server


    # Problem


    You want to set up a Raspberry Pi as a webcam server.


    # Solution'
  merge: -1
  pgno: 166
- img_proc: true
  md: 'You can use either a USB webcam or the Raspberry Pi Camera Module as a camera
    that you can access from elsewhere on your network using a browser.


    Download a software package called *motion*. This will allow you to set up a Raspberry
    Pi with a USB webcam connected to it so you can connect to a web page and view
    the webcam.


    To install the software, enter the following command in a Terminal window:


    ```

    $ sudo apt-get update

    $ sudo apt-get install motion

    ```


    You’ll need to make a few configuration changes. First, use the following command
    to edit the file `/etc/motion/motion.conf`:


    ```

    $ sudo nano /etc/motion/motion.conf

    ```


    This is quite a big configuration file. Near the top of the file, you will find
    this line:


    ```

    daemon off

    ```


    Change the line as follows:


    ```

    daemon on

    ```


    The other change is much further down the file. You need to change this line:


    ```

    webcam_localhost = on

    ```


    so that it reads like this:'
  merge: -1
  pgno: 167
- img_proc: true
  md: '```

    webcam_localhost = off

    ```


    There is one other file that you need to change. Enter the command:


    ```

    $ sudo nano /etc/default/motion

    ```


    Change:


    ```

    start_motion_daemon=no

    ```


    to:


    ```

    start_motion_daemon=yes

    ```


    Then change:


    ```

    stream_localhost on

    ```


    to:


    ```

    stream_localhost off

    ```


    To get the web service running, issue the command:


    ```

    $ sudo service motion start

    ```


    If you are using the Raspberry Pi Camera Module, there is an extra step. You need
    to edit the file /etc/modules using the following command:


    ```

    $ sudo nano /etc/modules

    ```'
  merge: -1
  pgno: 168
- img_proc: true
  md: 'Add the following line to the end of this file, then save and exit nano as
    usual:


