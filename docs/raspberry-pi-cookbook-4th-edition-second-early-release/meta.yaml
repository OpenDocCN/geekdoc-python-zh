    card. You can find it under Accessories, Raspberry Pi Diagnostics.


    ![](img/54ed1f8e884bc184601bf6f652461a95_24_0.png)


    Figure 1-11. Using the Raspberry Pi Diagnostics Tool to test you SD card.


    When it comes to capacity, you should look for cards of at least 16 GB, and really,
    given the small difference in price, a 32 GB card is the better choice, as it
    will give you plenty of room for expansion.


    # See Also


    The Raspberry Pi guide to installing Raspberry Pi OS can be found here: [https://www.raspberrypi.com/software/](https://www.raspberrypi.com/software/)'
  - '[PAGE 25]


    # # 1.7 Booting Up Your Raspberry Pi for the First Time


    # ## Problem


    You’ve set up a microSD card, and you want to know how to set up your Raspberry
    Pi.


    # ## Solution


    The first time that you boot up your Raspberry Pi (as shown in Figure 1-12), you
    will be taken through some questions to set up your Raspberry Pi.


    ![](img/54ed1f8e884bc184601bf6f652461a95_25_0.png)


    Clicking Next prompts you to create a new user account (Figure 1-13).'
  - '[PAGE 26]


    ![](img/54ed1f8e884bc184601bf6f652461a95_26_0.png)


    Figure 1-13. Creating a User Account.


    Prior to April 2022 this step was not part of the setup procedure, as the username
    of ‘pi’ was automatically created for you to use. As a result may tutorials and
    books assume that your home directory is /home/pi. Unless you have strong feelings
    about your username, I would still stick to creating a user called ‘pi’ but pick
    a good password (not the default of ‘raspberry’).


    You are then asked to connect to a WiFi network and if you want to check for updates.
    Updating requires an internet connection, so it won’t work unless you have connected
    to your network. If you are connected (either by WiFi or Ethernet), it’s a good
    idea to check for updates now. If not, you can always check later using [Recipe
    3.40](Recipe 3.40).'
  - '[PAGE 27]


    After you are up and running, the first thing you should do is connect your Raspberry
    Pi to the internet (Recipes 2.1 and 2.5).


    # Discussion


    It is a good idea to set the right timezone. If you don’t, then the Raspberry
    Pi, will show the incorrect time, because it gets its time from an internet time
    server.


    # See Also


    The Raspberry Pi guide to installing Raspberry Pi OS can be found here: https://www.raspberrypi.com/software/


    # 1.8 Booting from a Real Hard Disk or USB Flash Drive


    # Problem


    Your microSD card is too small and/or you are concerned about your entire operating
    system running on an SD card.


    # Solution


    Before the Raspberry Pi 4 and 400 came a long, this was possible, but not very
    easy, involving some complex commands and the possibility of ‘bricking’ your Raspberry
    Pi if you got it wrong. If you have a Raspberry Pi 4 or 400, then it is now really
    straight-forward and starts with the Raspberry Pi Imager.


    The process is similar to setting up a microSD card using the Raspberry Pi Imager.
    To follow this recipe, you will need a Windows, Mac or Linux computer; a USB SSD
    (Solid State Disk) and also a microSD card. Even though the whole point of this
    recipe is to replace the microSD card as the boot device, you still need two microSD
    cards (one being your existing'
  - '[PAGE 28]


    microSD boot device for your Raspberry Pi) and a second blank microSD card.


    +   1. Insert the blank microSD card into your card reader

    2. Start the Raspberry Pi Imager and then from the Operating System drop-down,
    select *Misc untility Images* and then *Bootloader* and then *USB Boot* (Figure
    1-14). Note that if these options aren’t present in your Raspberry Pi Imager,
    then you probably need to download [the latest version](https://www.raspberrypi.com/software/).

    3. Select your microSD card from the Storage drop-down and then click Write.

    4. Put the newly written microSD card into your Raspberry Pi and power it up.
    The only purpose of this microSD card image is to reconfigure your Raspberry Pi
    for USB booting. Once it’s done its work, the screen will turn green.

    5. Power down your Raspberry Pi and swap over the microSD cards, so that you now
    have your original microSD system card.

    6. Boot your Raspberry Pi and then from the Menu, select *Accessories* and then
    *SD Card Copier* (Figure 1-15). Select your system microSD card as the source
    and the external USB drive as the destination, then click Start.

    7. When the copy is complete, you can shut down your Raspbperr Pi again and remove
    the microSD card. Next time you switch on your Raspberry Pi, it should boot from
    the USB drive.'
- md: '## 1.9 Connecting a DVI or VGA Monitor


    ### Problem


    Your monitor does not have an HDMI connector, but you want to use it with your
    Raspberry Pi.


    ### Solution


    Many people have been caught out by this problem. Fortunately, it is possible
    to buy adapters for monitors with a DVI or VGA input but no HDMI connectors.


    DVI adapters are the simplest and cheapest. They are available for less than $5
    if you search for “HDMI male to DVI female converter.”


    ### Discussion


    Using VGA adapters is more complex because they require some electronics to convert
    the signal from digital to analog, so beware of leads that do not contain these.
    The official converter is called Pi-View and is available wherever the Raspberry
    Pi is sold. Pi-View has the advantage of having been tested and found to work
    with Raspberry Pi. You can find cheaper alternatives on the internet, but often
    these won’t work.


    However, in reality, given that new monitors all have HDMI connectors, you are
    probably better spending your money on a new monitor rather than an adapter.


    ### See Also


    eLinux has [tips on what to look for in a converter](http://elinux.org/).


    ## 1.10 Using a Composite Video Monitor/TV


    ### Problem


    The text on your low-resolution composite monitor is illegible.


    ### Solution


    You need to adjust the resolution of the Raspberry Pi for a small screen. The
    Raspberry Pi has two types of video output: (1) HDMI, and (2) composite video
    from the audio jack, for which you need a special lead. Of these, the HDMI is
    by far the better-quality option. If you’re intending to use a composite video
    as your main screen, you might want to think again. If you are using a composite
    video screen—say, because you need a really small screen—you need to make a few
    adjustments to fit the video output to the screen. You need to make some changes
    to the file `/boot/config.txt`. You can edit this file on your laptop or PC by
    inserting the SD card back into an SD card reader, or you can edit it (without
    having to remove it from your Raspberry Pi). Editing files on the Raspberry Pi
    itself is normally done using the nano editor. This is a little tricky, and I
    suggest you read [Recipe 3.7](http://elinux.org/) thoroughly before you try editing
    your first file. If you are happy to go ahead and edit the file using nano, enter
    the following command in a Terminal session:


    ```

    $ sudo nano /boot/config.txt

    ```


    Note that to save and exit nano, press Ctrl-X, then press Y (to confirm), and
    then press Enter.


    If the text is too small to read, it’s best to remove the SD card from the Raspberry
    Pi and insert it into your computer. The file will then be in the top-level directory
    on the SD card, and you can use a text editor on your PC (such as Notepad++) to
    modify it.


    You need to know the resolution of your screen. For a lot of small screens, this
    will be 320 x 240 pixels. Find the two lines in the file that read as follows:


    ```

    #framebuffer_width=1280

    #framebuffer_height=720

    ```


    Remove the # from the front of each line and change the two numbers to the width
    and height of your screen. Removing the # enables the line. In the following example,
    the lines have been modified to be 320 by 240:


    ```

    framebuffer_width=320

    framebuffer_height=240

    ```


    Save the file and restart your Raspberry Pi. You should find that everything has
    become a lot easier to read. You will probably also find that there is a big,
    thick border around the screen. To adjust this, see [Recipe 1.11](Recipe 1.11).


    ### Discussion


    There are many low-cost CCTV monitors that can make a great companion for the
    Raspberry Pi when you’re making something like a retro games console ([Recipe
    4.4](Recipe 4.4)). However, these monitors are often very low resolution.


    ### See Also


    For another tutorial on using composite monitors, see [this Adafruit tutorial](this
    Adafruit tutorial).


    Also, see Recipes 1.9 and 1.11 to adjust your picture when you’re using the HDMI
    video output.


    ## 1.11 Adjusting the Picture Size on Your Monitor


    ### Problem


    When you first connect a Raspberry Pi to a monitor, you might find that you cannot
    read some of the text because it extends off the screen, or that the picture isn’t
    using all the space available on the screen.


    ### Solution


    If your problem is that there is a large black border around the picture, you
    can make the screen fill the whole area of the monitor using the Raspberry Pi’s
    desktop Configuration tool (Figure 1-16). To open this, go to the Raspberry Pi
    menu (the one with the Raspberry Pi icon), select Preferences, and then click
    Raspberry Pi Configuration.


    Click the Disabled radio button next to Underscan. Note that the change will not
    take effect until you have clicked OK and then rebooted your Raspberry Pi.


    If you have the opposite problem and your text extends off the edges of the screen,
    click Enabled for Underscan.


    In a second step, you now need to edit the file `/boot/config.txt`. You can do
    this either by removing the SD card and mounting it on your PC or Mac or by editing
    the SD card on the Raspberry Pi. Editing files on the Raspberry Pi itself is normally
    done using the nano editor. This is a little tricky; I suggest you read Recipe
    3.7 thoroughly before you try editing your first file. If you are happy to go
    ahead and edit the file using nano, enter the following command in a Terminal
    session:


    ```

    $ sudo nano /boot/config.txt

    ```


    Look for the section dealing with overscan. The four lines you need to change
    are shown in the middle of Figure 1-17, each beginning with #overscan.


    For the lines to take effect, you need to enable them by removing the # character
    from the start of each line.


    To save and exit nano, press Ctrl-X, then press Y (to confirm), and then press
    Enter.


    Then, using trial and error, change the settings until the screen fills as much
    of the monitor as possible. Note that the four numbers should be negative. Try
    setting them all to –20 to start with. This will decrease the area of the screen
    that is used.


    ### Discussion


    Having to repeatedly restart the Raspberry Pi to see the effects of the changes
    in resolution is a little tedious. Fortunately, you will need to do this procedure
    only once. Most monitors and TVs work just fine without any need for underscanning.


    ### See Also


    You can also configure underscanning using the `raspi-config` tool. For more information
    on this tool, go to [http://elinux.org/RPi_raspi-config](http://elinux.org/RPi_raspi-config).


    ## 1.12 Maximizing Performance


    ### Problem


    Your Raspberry Pi seems to be very slow, so you want to overclock it to make it
    run faster.


    ### Solution


    If you have a Raspberry Pi 2, 3, or especially 4 with its quad-core processor,
    you are unlikely to find it to be too slow. However, the older, single-core Raspberry
    Pis can be pretty sluggish.


    You can increase the clock frequency of a Raspberry Pi to make it run a little
    faster. This will make it consume a bit more power and run a little hotter (see
    the Discussion section that follows).


    The method of overclocking described here is called *dynamic overclocking* because
    it automatically monitors the temperature of the Raspberry Pi and drops the clock
    speed back down if things begin to get too hot. This is called *throttling*.


    The easiest way to make your Pi overclock is to use the Raspberry Pi Configuration
    tool. To open this, go to the Raspberry Pi menu, select'
  mdcn: '## 1.9 连接 DVI 或 VGA 显示器


    ### 问题


    你的显示器没有 HDMI 接口，但你想将它与树莓派一起使用。


    ### 解决方案


    很多人都遇到过这个问题。幸运的是，可以为带有 DVI 或 VGA 输入但没有 HDMI 接口的显示器购买适配器。


    DVI 适配器是最简单且最便宜的。如果你搜索“HDMI 公头转 DVI 母头转换器”，价格可以低于 5 美元。


    ### 讨论


    使用 VGA 适配器更复杂，因为它们需要一些电子元件将信号从数字转换为模拟，因此要小心那些不包含这些元件的线缆。官方转换器名为 Pi-View，在任何销售树莓派的地方都可以买到。Pi-View
    的优势在于经过测试，已证实可与树莓派配合使用。你可以在网上找到更便宜的替代品，但这些通常无法工作。


    然而，实际上，鉴于新显示器都带有 HDMI 接口，你最好将钱花在购买新显示器上，而不是适配器上。


    ### 另请参阅


    eLinux 上有[关于在转换器中寻找什么的提示](http://elinux.org/)。


    ## 1.10 使用复合视频显示器/电视


    ### 问题


    你的低分辨率复合显示器上的文字难以辨认。


    ### 解决方案


    你需要为小屏幕调整树莓派的分辨率。树莓派有两种类型的视频输出：(1) HDMI，和 (2) 来自音频插孔的复合视频，后者需要一根特殊的线缆。其中，HDMI
    是质量好得多的选择。如果你打算将复合视频作为主屏幕，你可能需要重新考虑。如果你使用的是复合视频屏幕——比如，因为你需要一个非常小的屏幕——你需要进行一些调整以使视频输出适应屏幕。你需要对文件
    `/boot/config.txt` 进行一些更改。你可以通过将 SD 卡重新插入 SD 卡读卡器，在笔记本电脑或 PC 上编辑此文件，或者你也可以在树莓派上直接编辑它（无需将其取出）。在树莓派本身上编辑文件通常使用
    nano 编辑器。这有点棘手，我建议你在尝试编辑第一个文件之前彻底阅读[配方 3.7](http://elinux.org/)。如果你愿意继续使用 nano
    编辑文件，请在终端会话中输入以下命令：


    ```

    $ sudo nano /boot/config.txt

    ```


    请注意，要保存并退出 nano，请按 Ctrl-X，然后按 Y（确认），然后按 Enter。


    如果文字太小无法阅读，最好将 SD 卡从树莓派中取出并插入你的计算机。然后该文件将位于 SD 卡的顶层目录中，你可以使用 PC 上的文本编辑器（如 Notepad++）进行修改。


    你需要知道屏幕的分辨率。对于许多小屏幕，这将是 320 x 240 像素。在文件中找到以下两行：


    ```

    #framebuffer_width=1280

    #framebuffer_height=720

    ```


    删除每行开头的 # 并将两个数字更改为屏幕的宽度和高度。删除 # 会启用该行。在以下示例中，这些行已被修改为 320 乘 240：


    ```

    framebuffer_width=320

    framebuffer_height=240

    ```


    保存文件并重新启动树莓派。你应该会发现一切都变得更容易阅读了。你可能还会发现屏幕周围有一个又大又粗的边框。要调整这一点，请参阅[配方 1.11](Recipe
    1.11)。


    ### 讨论


    有许多低成本的闭路电视显示器，当你制作像复古游戏机（[配方 4.4](Recipe 4.4)）之类的东西时，它们可以成为树莓派的好伴侣。然而，这些显示器通常分辨率非常低。


    ### 另请参阅


    有关使用复合显示器的另一个教程，请参阅[这个 Adafruit 教程](this Adafruit tutorial)。


    另外，当你使用 HDMI 视频输出时，请参阅配方 1.9 和 1.11 来调整你的画面。


    ## 1.11 调整显示器上的画面大小


    ### 问题


    当你第一次将树莓派连接到显示器时，你可能会发现无法阅读某些文字，因为它超出了屏幕范围，或者画面没有使用屏幕上所有可用的空间。


    ### 解决方案


    如果你的问题是画面周围有一个大的黑色边框，你可以使用树莓派的桌面配置工具（图 1-16）使屏幕填满显示器的整个区域。要打开此工具，请转到树莓派菜单（带有树莓派图标的那个），选择“首选项”，然后单击“树莓派配置”。


    单击“欠扫描”旁边的“已禁用”单选按钮。请注意，在单击“确定”并重新启动树莓派之前，更改不会生效。


    如果你遇到相反的问题，即文字超出了屏幕边缘，请单击“欠扫描”的“已启用”。


    第二步，你现在需要编辑文件 `/boot/config.txt`。你可以通过取出 SD 卡并将其挂载到 PC 或 Mac 上，或者在树莓派上编辑 SD 卡来完成此操作。在树莓派本身上编辑文件通常使用
    nano 编辑器。这有点棘手；我建议你在尝试编辑第一个文件之前彻底阅读配方 3.7。如果你愿意继续使用 nano 编辑文件，请在终端会话中输入以下命令：


    ```

    $ sudo nano /boot/config.txt

    ```


    查找处理过扫描的部分。你需要更改的四行显示在图 1-17 的中间，每行都以 #overscan 开头。


    要使这些行生效，你需要通过删除每行开头的 # 字符来启用它们。


    要保存并退出 nano，请按 Ctrl-X，然后按 Y（确认），然后按 Enter。


    然后，通过反复试验，更改设置，直到屏幕尽可能多地填满显示器。请注意，这四个数字应该是负数。尝试先将它们全部设置为 –20。这将减少屏幕使用的区域。


    ### 讨论


    不得不反复重启树莓派以查看分辨率更改的效果有点乏味。幸运的是，你只需要执行一次此过程。大多数显示器和电视无需任何欠扫描即可正常工作。


    ### 另请参阅


    你也可以使用 `raspi-config` 工具配置欠扫描。有关此工具的更多信息，请访问 [http://elinux.org/RPi_raspi-config](http://elinux.org/RPi_raspi-config)。


    ## 1.12 最大化性能


    ### 问题


    你的树莓派似乎非常慢，所以你想超频它以使其运行得更快。


    ### 解决方案


    如果你有树莓派 2、3 或特别是带有四核处理器的 4，你不太可能觉得它太慢。然而，较旧的单核树莓派可能相当迟钝。


    你可以增加树莓派的时钟频率，使其运行得稍快一些。这将使其消耗更多功率并运行得更热一些（参见后面的讨论部分）。


    这里描述的超频方法称为*动态超频*，因为它会自动监控树莓派的温度，并在温度开始过高时降低时钟速度。这被称为*节流*。


    让你的树莓派超频的最简单方法是使用树莓派配置工具。要打开此工具，请转到树莓派菜单，选择'
