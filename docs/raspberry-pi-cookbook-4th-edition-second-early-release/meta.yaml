  - '[PAGE 49]


    are available.

    The camera module is capable of high-resolution stills and video recording.

    The Raspberry Pi Camera version 2 has a resolution of 3280 x 2464 pixels

    and supports 1080p30, 720p60, and 640x480p90 video.

    You can also buy a No Infra red (NoIR) version of the camera that has the

    infrared filter removed from the camera module to allow it to work at night

    under infrared illumination.

    An alternative to the camera module is to use a USB webcam (see [Link to

    Come]).


    # See Also


    The [RaspiCam documentation](https://www.raspberrypi.org/documentation/accessories/camera.html)
    includes `raspistill` and `raspivid`.


    # 1.16 Using Bluetooth


    # Problem


    You want to use Bluetooth with your Raspberry Pi.


    # Solution


    If you have a Raspberry Pi 3 or 4 or 400, the good news is that along with

    WiFi, you also get Bluetooth hardware. If you have an older Raspberry Pi,

    you can attach a USB Bluetooth adapter to it. However, in both cases, the

    software that you need for Bluetooth is now included in Raspberry Pi OS.

    If you have an older Raspberry Pi, be aware that not all Bluetooth adapters

    are compatible with the Raspberry Pi. Most are, but to be sure, buy one that

