    # 4.12 Controlling a Laser Cutter


    # Problem


    You want to control your low-cost K40 laser cutter from your Raspberry Pi.


    # Solution


    If you have one of the popular and low-cost Chinese laser cutter of the K40 variety
    (Figure 4-17) then you can use the K40 Whisperer software to control your laser
    cutter. Thus, instead of having to use a relatively expensive Windows computer
    to control your laser cutter, you can use a much lower cost Raspberry Pi.'
  merge: -1
  pgno: 188
- img_proc: true
  md: '![](img/54ed1f8e884bc184601bf6f652461a95_189_0.png)


    Figure 4-17. A K40 Laser Cutter


    This software is written in Python, but also relies on the Inkscape vector drawing
    package. So if you have not already done so, install Inkscape by following Recipe
    4.8.


    Next, download the source code for the K40 Whisperer software from https://www.scorchworks.com/K40whisperer/k40whisperer.html#download.
    Select the latest download from the *K40 Whisperer Source* column. Double click
    the downloaded ZIP file and extract it into your home directory ( /home/pi). Inside
    the unzipped directory, you will find a file called README_Linux.txt. The instructions
    here are based on that file. The README is a general Linux README rather than
    being Raspberry Pi specific.'
  merge: -1
  pgno: 189
- img_proc: true
  md: 'First run the following two commands to create a user group for the software.


    ```

    $ sudo groupadd lasercutter

    $ sudo usermod -a -G lasercutter pi

    ```


    Make sure that your laser cutter is connected to your Raspberry Pi with its USB
    lead and the laser cutter is switched on. You now need to run the following commands
    to find out the USB vendor and product ID for the laster cutter. These will probably
    be 1a86 and 5512 respectively, but it’s worth checking in case the laser cutter’s
    manufacturer changes these. To do this, run the `lsusb` command:


    ```

    $ lsusb

    Bus 001 Device 004: ID 1a86:5512 QinHeng Electronics CH341 in EPP/MEM/I2C mode,
    EPP/I2C adapter

    Bus 001 Device 005: ID 0424:7800 Microchip Technology, Inc. (formerly SMSC)

    Bus 001 Device 003: ID 0424:2514 Microchip Technology, Inc. (formerly SMSC) USB
    2.0 Hub

    Bus 001 Device 002: ID 0424:2514 Microchip Technology, Inc. (formerly SMSC) USB
    2.0 Hub

    Bus 001 Device 001: ID 1d6b:0002 Linux Foundation 2.0 root hub

    ```


    This will list all the USB devices connected to your Raspberry Pi. You are now
    looking for the entry that corresponds to your laser cutter. In this case, it’s
    the only Chinese name there (*QinHeng*). But you can confirm this if you need
    to, by unplugging the laser cutter and running the `lsusb` comand again and seeing
    which entry disappears.


    On the line for this entry you can see the text `1a86:5512`. The part before the
    : is the Vendor ID and 5512 is the product ID. You need to know these, because
    you are going to use them in a configuration file.


    Create and edit a new file in nano using the command:


    ```

    $ sudo nano /etc/udev/rules.d/97-ctc-lasercutter.rules

    ```'
  merge: -1
  pgno: 190
- img_proc: true
  md: 'You can find information on editing files in Recipe 3.7. Paste the following
    test into the file and if your Vendor and Product IDs are different from mine,
    change the appropriate parts of the text to match your IDs.


    ```

    SUBSYSTEM=="usb", ATTRS{idVendor}=="[1a86]", ATTRS{idProduct}=="[5512]", ENV{DEVTYPE}=="usb_device",
    MODE="0664", GROUP="lasercutter"

    ```


    Reboot your Raspberry Pi and then continue the installation by running the command
    below to install some more modules that K40 Whisperer needs.


    ```

    $ sudo apt-get install libxml2-dev libxslt-dev

    $ sudo apt-get install libusb-1.0-0

    $ sudo apt-get install libusb-1.0-0-dev

    ```


    Make sure that you are in the directory where you downloaded the K40 Whisperer
    and run the following command


    ```

    $ pip install -r requirements.txt

