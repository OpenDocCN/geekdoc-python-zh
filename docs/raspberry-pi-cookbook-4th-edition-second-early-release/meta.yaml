    # Solution


    Open a command line by using the Terminal ([Link to Come]) and enter the following
    command to update your system to the latest version:


    ```

    $ sudo apt-get update

    $ sudo apt-get dist-upgrade

    ```


    This will take some time especially if there is a lot to upgrade. Most important,
    if you have any precious files on your system, I recommend copying them onto a
    USB flash drive (Recipe 3.2) before upgrading.


    # Discussion


    The first of these commands does not actually update RaspberryPi OS; it just updates
    the `apt-get` package manager to make it aware of the latest versions of the packages
    that comprise your operating system and related software.


    The command `dist-upgrade` upgrades the operating system itself. During the process,
    you will be warned how much disk space will be required, so you should use Recipe
    3.38 to check that you have enough room before pressing Y to go ahead with the
    upgrade.


    Keeping your distribution up to date is important for a number of reasons. First,
    one of the main reasons that the operating system is changed is to fix bugs. So
    problems during the installation of software often vanish after an update. Second,
    if you expose your Raspberry Pi to the internet, new versions of RaspberryPi OS
    often patch security vulnerabilities.


    # See Also


    To start again with a completely fresh installation of RaspberryPi OS, see [Link
    to Come].'
