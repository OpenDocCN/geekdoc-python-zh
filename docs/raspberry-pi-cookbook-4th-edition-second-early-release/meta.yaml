- img_proc: true
  md: '# Problem


    You want to print to a network printer from your Raspberry Pi.


    # Solution


    Use Common Unix Printing System (CUPS).

    Start by entering the following commands into a Terminal to install CUPS (this
    can take some time):


    ```

    $ sudo apt-get update

    $ sudo apt-get install cups

    ```


    Give yourself admin privileges for CUPS by entering the following command:


    ```

    $ sudo usermod -a -G lpadmin pi

    ```


    This last command adds the `lpadmin` group used by CUPS to the user `pi` so that
    you have permission to print.

    CUPS is configured via a web interface. Start Chromium, and then on the Main menu,
    in the Internet group (or click on the icon on your desktop), navigate to the
    address **http://localhost:631**.

    On the Administration tab, choose the Add Printer option. This displays a list
    of printers that are on the network or are connected directly to the Raspberry
    Pi’s USB port (Figure 2-22).'
