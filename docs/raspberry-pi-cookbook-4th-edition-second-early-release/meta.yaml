    ```'
  - '[PAGE 246]


    You can also use negative indices to count back from the end of the list. The
    following example returns the last two elements in the list:


    ```

    >>> l[-2:]

    [''c'', ''d'']

    ```


    Incidentally, `l[:-2]` returns `[''a'', ''b'']` in the preceding example.


    # See Also


    See Recipe 5.17, in which the same syntax is used for strings.


    # 6.11 Comprehensions


    # Problem


    You want a neater way of building one list from another filtering or transforming
    the original list.


    # Solution


    Use a comprehension.


    Comprehensions don’t do anything that you can’t do with a regular loop, but they
    do simplify activities involving lists, and when well used, make your code more
    readable.


    A comprehension will take an existing list and create a new list from the elements
    of the original list, either filtering the list so that only qualifying elements
    are included in the new list, or it can create a new list containing the same
    number of elements of the original list but with each element manipulated in some
    way.


    As a reminder, without using a comprehension, the following code we will take
    a list and filter it into a new list that just contains the elements that begin
    with the letter ‘a’.'
  - "[PAGE 247]\n\n```\nnew_list = []\npeople = ['agnes', 'andrew','jane','peter']\n\
    for person in people:\n    if person[0] == 'a':\n        new_list.append(person)\n\
    print(new_list)\n```\n\nWhen you run this program (ch_07_filter.py) you will see\
    \ that `new_list` just contains the names starting with ‘a’.\n\n```\n$ python3\
    \ ch_07_filter.py\n['agnes', 'andrew']\n```\n\nWe can shorten this example considerably\
    \ by using a comprehension (ch_07_filter_comp.py).\n\n```\npeople = ['agnes',\
    \ 'andrew','jane','peter']\nnew_list = [person for person in people if person[0]\
    \ == 'a']\nprint(new_list)\n```\n\nThis will produce exactly the same output as\
    \ ch_07_filter.py, but using two lines less code. The comprehension is contained\
    \ in square brackets and the first word in the comprehension is `person`. This\
    \ indicates that `person` (yet to be specified) is what will be added to the list\
    \ copy. We then have `for person in people`, which is the normal way of iterating\
    \ over a list, with the list being called `people` and each element in the list\
    \ being called `person`. The final part of the comprehension is the condition\
    \ `if person[0] == 'a'`. This is the part that rejects all the elements of the\
    \ list that don’t start with an ‘a’.\n\nThe condition of a comprehension is optional\
    \ and you may just want to use the comprehension to modify each element of the\
    \ list. The example of ch_07_change_comp.py capitalizes the names, returning a\
    \ new list, with the initial letter of each name in upper case.\n\n```\npeople\
    \ = ['agnes', 'andrew','jane','peter']\n```"
