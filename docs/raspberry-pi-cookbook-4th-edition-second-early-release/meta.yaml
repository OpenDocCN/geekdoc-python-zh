    ```\n$ python3 ch_07_change_comp.py\n['Agnes', 'Andrew', 'Jane', 'Peter']\n```\n\
    \n## 讨论\n\n列表推导式是操作列表的一种非常强大且有用的技术。起初，语法可能看起来有点奇怪，因为它被封闭在方括号中。但这是保持代码简洁而不增加理解其工作原理难度的好方法。\n\
