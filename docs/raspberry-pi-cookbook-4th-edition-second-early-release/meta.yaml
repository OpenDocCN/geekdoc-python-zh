    The instructions here were adapted from [this tutorial](this tutorial), which
    credits Matt Richardson and Shawn Wallace’s book *Getting Started with Raspberry
    Pi* (O’Reilly) as the original source.


    ## 2.10 Using a Raspberry Pi for Network Attached Storage


    ### Problem


    You want to use your Raspberry Pi as Network Attached Storage (NAS) by accessing
    a large USB drive attached to your Raspberry Pi from computers on your network.


    ### Solution


    The solution to this problem is to install and configure Samba. To do this, issue
    the following commands:


    ```

    $ sudo apt-get update

    $ sudo apt-get install samba

    $ sudo apt-get install samba-common-bin

    ```


    Next, attach the USB hard drive to the Raspberry Pi. It will automatically mount
    in your `/media/pi` folder. To check that it’s there, run this command:


    ```

    $ cd /media/pi

    $ ls

    ```


    The drive should be listed with whatever name you gave it when you formatted it.
    It will automatically mount itself whenever the Raspberry Pi reboots.


    You next need to configure Samba so that the drive can be shared on the network.
    To do this, you first need to add a Samba user (pi). Enter the following command
    and type in a password:


    ```

    $ sudo smbpasswd -a pi

    New SMB password:

    Retype new SMB password:

    Added user pi.

    ```


    You now need to make some changes to the file /etc/samba/smb.conf, so enter this
    command:


    ```

    $ sudo nano /etc/samba/smb.conf

    ```


    The first line you’re looking for is near the top of the file:


    ```

    workgroup = WORKGROUP

    ```


    You only need to change this if you plan to connect from a Windows machine. This
    should be the name of your Windows workgroup. For Windows XP, the default is MSHOME;
    for newer versions of Windows, it is HOME (but check on your Windows network).
    Note that generally connecting to NAS in a mixed network of Macs and Windows PCs
    (and, for that matter, Linux machines) works just fine.


    The next change to be made is further down the file in the Authentication section.
    Find the following line:


    ```

    # security = user

    ```


    Remove the # from the beginning of the line to activate the line and turn security
    on. Finally, scroll to the end of the file and add the following lines:


    ```

    [USB]

    path = /media/pi/NAS

    comment = NAS Drive

    valid users = pi

    writeable = yes

    browseable = yes

    create mask = 0777

    public = yes

    ```


    Save the file and then restart Samba by entering the following:


    ```

    $ sudo /etc/init.d/samba restart

    ```


    If all is well, your USB drive should now be shared on your network.


    ### Discussion


    To connect to the drive on a macOS, select Go, and then, from the Finder menu,
    click Connect to Server. Next, in the Server Address field, enter **smb://raspberrypi/USB**.
    A login dialog box opens, in which you need to change the username to **pi** (Figure
    2-19).


    ![](img/54ed1f8e884bc184601bf6f652461a95_88_0.png)


    If you are connecting to NAS from a Windows machine, the exact procedure will
    vary depending on your version of Windows. However, the basic principle is that
    at some point you will need to enter the network address, which should be `\raspberrypi\USB`
    (Figure 2-20).


    ![](img/54ed1f8e884bc184601bf6f652461a95_89_0.png)


    You are then prompted for the username and password before you can use the NAS
    disk (Figure 2-21). You should only have to do this the first time. After the
    network place is added, you should be able to navigate directly to it in File
    Explorer.


    ![](img/54ed1f8e884bc184601bf6f652461a95_90_0.png)


    If you are a Linux user, the following command should mount the NAS drive for
    you:


    ```

    $ sudo mkdir /pishare

    $ sudo smbmount -o username=pi,password=raspberry //192.168.1.16/USB /pishare

    ```


    ### See Also


    You might want to change your Raspberry Pi’s network name to something inappropriate
    like “piNAS” (see [Recipe 2.4](Recipe 2.4)).


    ## 2.11 Setting Up a Network Printer


    ### Problem


    You want to print to a network printer from your Raspberry Pi.


    ### Solution


    Use Common Unix Printing System (CUPS).

    Start by entering the following commands into a Terminal to install CUPS (this
    can take some time):


    ```

    $ sudo apt-get update

    $ sudo apt-get install cups

    ```


    Give yourself admin privileges for CUPS by entering the following command:


    ```

    $ sudo usermod -a -G lpadmin pi

    ```


    This last command adds the `lpadmin` group used by CUPS to the user `pi` so that
    you have permission to print.

    CUPS is configured via a web interface. Start Chromium, and then on the Main menu,
    in the Internet group (or click on the icon on your desktop), navigate to the
    address **http://localhost:631**.

    On the Administration tab, choose the Add Printer option. This displays a list
    of printers that are on the network or are connected directly to the Raspberry
    Pi’s USB port (Figure 2-22).


    ![](img/54ed1f8e884bc184601bf6f652461a95_92_0.png)


    Follow the series of dialog boxes to set up the printer.


    ### Discussion


    When you’re finished, you can test out the printer by firing up LibreOffice. Type
    some text, and when you go to print it, you should see your newly added printer
    available for printing (Figure 2-23).


    ![](img/54ed1f8e884bc184601bf6f652461a95_93_0.png)


    Figure 2-23. The print dialog box


    ### See Also


    See also the official [CUPS website](http://www.cups.org/).


    # Chapter 3. Operating System


    > ### A NOTE FOR EARLY RELEASE READERS


    With Early Release ebooks, you get books in their earliest form—the author’s raw
    and unedited content as they write—so you can take advantage of these technologies
    long before the official release of these titles.


    This will be the 3rd chapter of the final book. Please note that the GitHub repo
    will be made active later on.


    If you have comments about how we might improve the content and/or examples in
    this book, or if you notice missing material within this chapter, please reach
    out to the author at simonmonkauthor@gmail.com.


    ## 3.0 Introduction


    This chapter explores many aspects of the Linux operating system used by the Raspberry
    Pi. A lot of this involves the use of the command line. If you are used to Windows
    or macOS, this can come as a bit of a shock. However, when you get used to it,
    doing things with the command line can be surprisingly effective.


    You can accomplish many simple file operations like moving files around, renaming,
    copying, and deleting files graphically using a more Windows or macOS approach,
    and this is the subject of our first recipe.


    ## 3.1 Browsing Files Graphically


    ### Problem


    You want to move files around using a graphical interface like you can on a macOS-based
    machine or Windows PC.


    ### Solution


    Use the File Manager.

    You can find this program on your Main menu, in the Accessories group (Figure
    3-1).

    Using the File Manager, you can drag a file or directory from one directory to
    another or use the Edit menu to copy a file from one location and paste it to
    a second. This operates in much the same way as the Windows File Manager or macOS
    Finder.


    ![](img/54ed1f8e884bc184601bf6f652461a95_95_0.png)


    ### Discussion


    The lefthand side of the File Manager shows the folder structure.

    The central area displays the files in the current folder, which you can navigate
    using the buttons in the toolbar or by typing a location in the file path area
    at the top.

    You can right-click a file to open a menu presenting options you can use on that
    file (Figure 3-2).


    ![](img/54ed1f8e884bc184601bf6f652461a95_96_0.png)


    You can also select more than one file at a time for copying or dragging by holding
    down the Ctrl key while you select files, or you can select a range of files by
    selecting one file and then holding down the Shift key while you select the end
    of the list of files that you want to select.


    ### See Also


    See also [Recipe 3.5](Recipe 3.5).


    ## 3.2 Copying Files onto a USB Flash Drive


    ### Problem


    You want to copy a file from your Raspberry Pi onto a USB flash drive.


    ### Solution


    Insert the USB flash drive into a USB port, and the dialog shown in Figure 3-3
    should appear. Select OK to open it in the File Manager.


    ![](img/54ed1f8e884bc184601bf6f652461a95_97_0.png)


    The drive will be mounted in /media/pi followed by the name of the flash drive
    (in my case, UNTITLED). To copy a file from your home folder, drag it onto the
    folder representing your flash drive, as shown in Figure 3-4.'
