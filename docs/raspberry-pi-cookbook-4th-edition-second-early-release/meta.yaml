    \ Name* 设置中尝试几个不同的选项。你不需要更改任何其他设置。\n\n关闭设置窗口后，你可以加载一个 SVG 文件进行切割（图 4-18）。\n\n\
    ![](img/54ed1f8e884bc184601bf6f652461a95_193_0.png)\n\n图 4-19. 准备切割！\n\n## 讨论\n\
    \n激光切割机通常附带其专有的软件来控制切割机，该软件通常在 Microsoft Windows 计算机上运行。它甚至可能有一个硬件 USB 加密狗，旨在将该软件绑定到你的计算机。\n\
    \nK40 Whisperer 软件直接从 SVG 图纸进行切割和雕刻。你只需用不同颜色的轮廓绘制线条，线宽为 0.1mm。红线表示切割，蓝线表示矢量雕刻（轻微烧灼轮廓），黑线表示光栅雕刻（来回扫描以烧灼表面区域）。\n\
    \n## 另请参阅\n\n有关 K40 Whisperer 的完整信息，请参见 https://www.scorchworks.com/K40whisperer\n\
    \n树莓派也是 3D 打印机的良好控制器（参见 [待添加链接]）。\n\n要为你的激光切割和蚀刻创建 SVG 图纸，你可以使用 InkScape（[待添加链接]）。\n\
    \n树莓派也是 3D 打印机的绝佳控制器。有关 Octoprint 的完整文档，请参见 https://octoprint.org/\n\n# 第 5 章.\
    \ Python 基础\n\n> ### 给早期版本读者的说明\n\n通过早期版本电子书，你可以在书籍的最早期形式中获取内容——即作者在写作过程中的原始未编辑内容——因此你可以在这些书籍正式发布之前很久就利用这些技术。\n\
    \n这将是最终书籍的第 5 章。请注意，GitHub 仓库将在稍后激活。\n\n如果你对我们如何改进本书的内容和/或示例有意见，或者你发现本章中有缺失的材料，请通过\
    \ simonmonkauthor@gmail.com 联系作者。\n\n## 5.0 简介\n\n虽然许多语言都可以用来为树莓派编程，但 Python 是最受欢迎的。事实上，*Raspberry\
    \ Pi* 中的 *Pi* 就是受 *python* 一词的启发。\n\n在本章中，你将找到一系列配方，帮助你开始使用树莓派编程。\n\n## 5.1 在\
    \ Python 2 和 Python 3 之间做选择\n\n### 问题\n\n你需要使用 Python，但不确定应该使用哪个版本。\n\n### 解决方案\n\
    \n两个都用。使用 Python 3，直到你遇到一个最好通过回退到版本 2 来解决的问题。\n\n### 讨论\n\n尽管 Python 的最新版本 Python\
    \ 3 已经存在多年，但你会发现很多人仍然在使用 Python 2。事实上，在树莓派操作系统发行版中，两个版本都提供了，版本 2 只被称为 Python，而版本\
    \ 3 被称为 Python 3。Python 3 通过使用命令 `python3` 来运行。除非另有说明，本书中的示例都是为 Python 3 编写的。大多数示例无需修改即可在\
    \ Python 2 和 Python 3 上运行。\n\nPython 社区不愿放弃旧版本，这在很大程度上是因为 Python 3 引入了一些破坏与版本\
    \ 2 兼容性的更改。因此，为 Python 2 开发的大量第三方库中的一些将无法在 Python 3 下工作。\n\n我的策略是尽可能使用 Python\
    \ 3 编写，当由于兼容性问题需要时，再回退到 Python 2。\n\n### 另请参阅\n\n有关 Python 2 与 Python 3 之争的很好总结，请参见\
    \ [Python wiki](https://wiki.python.org/moin/Python2orPython3)。\n\n## 5.2 选择 Python\
    \ 编辑器\n\n### 问题\n\nPython 编辑器有很多选择，你想知道应该从哪一个开始。\n\n### 解决方案\n\n大多数人会从 Thonny（[配方\
    \ 5.3](#)）或 Mu（[配方 5.4](#)）开始。两者都是很好的编辑器，而且都易于使用。\n\nThonny 预装在树莓派操作系统中，而 Mu 则需要安装。你会发现很多关于这两个编辑器的教程，并且在树莓派基金会的大多数材料中，Thonny\
    \ 比 Mu 更受推荐。\n\n### 讨论\n\n你从哪个编辑器开始并不太重要。你可能想尝试一下 Thonny 和 Mu，看看你最喜欢哪个。随着你的编程经验越来越丰富，你应该尝试使用\
    \ VS Code（配方 4.11）作为更专业的工具。\n\n### 另请参阅\n\nThonny 在配方 5.3 中描述，VS Code 在配方 4.11\
    \ 中描述。\n\n## 5.3 使用 Thonny 编辑 Python 程序\n\n### 问题\n\n你想使用 Thonny 编辑你的 Python 程序。\n\
    \n### 解决方案\n\nThonny 应该预装在树莓派操作系统中。但如果由于任何原因，它不在你菜单的“编程”部分，你可以使用“推荐软件”工具（配方 4.2）安装它。\n\
    \n首先从菜单的“编程”部分打开 Thonny，并输入以下几行文本，如图 5-1 所示。\n\n```\nfor i in range(1, 10):\n\
    \    print(i)\n```\n\n当你开始程序的第二行时，带有 print 语句的第二行应该会自动缩进。\n\n![](img/54ed1f8e884bc184601bf6f652461a95_198_0.png)\n\
    \n图 5-1. Thonny 编辑器\n\n你可以通过按“运行”按钮来运行程序，看看它的作用。在运行程序之前，Thonny 会提示你保存文件。给它一个名字，比如\
    \ count.py。然后程序将运行，你将在 Thonny 窗口底部看到程序的输出（图 5-2）。\n\n![](img/54ed1f8e884bc184601bf6f652461a95_199_0.png)\n\
    \n### 讨论\n\n我们还没有开始 Python 编程，但从这个例子中，你可以看到程序就是用 Python 编程语言向计算机发出指令。在这个例子中，指令是打印出一系列数字。\n\
    \n### 另请参阅\n\nThonny 的一个流行替代品是 Mu（[配方 5.4](https://example.com/recipe5.4)）。\n\n\
    Thonny 的官方网页可以在这里找到：[https://thonny.org/](https://thonny.org/)\n\n除了使用 Mu 编辑和运行\
    \ Python 文件外，你还可以采用一种技术含量较低的方法，在 nano（#SEC3.6）中编辑文件，然后从终端会话（#SEC5.4）中运行它们。\n\n\
    ## 5.4 使用 Mu 编辑 Python 程序\n\n### 问题\n\n你想使用 Mu 编辑你的 Python 程序。\n\n### 解决方案\n\n\
    Mu 在最新版本的树莓派操作系统中并未预装。因此，要安装它，请使用“推荐软件”工具（配方 4.2）。安装后，你会在主菜单的“编程”部分找到它（图 5-3）。\n\
    \n![](img/54ed1f8e884bc184601bf6f652461a95_200_0.png)\n\n当你第一次启动 Mu 时，系统会提示你选择一个模式（图\
    \ 5-4）。\n\n![](img/54ed1f8e884bc184601bf6f652461a95_201_0.png)\n\n图 5-4. 为 Mu\
    \ 选择模式\n\n选择 Python 3 模式并单击“确定”。这将打开 Mu 编辑器，因此它已准备好让你开始编写一些 Python 代码。\n\n让我们试一下。在注释“Write\
    \ your code here :-)”下的编辑器区域中，仔细输入以下测试内容：\n\n```\nfor i in range(1, 10):\n   \
    \ print(i)\n```\n\n这个小程序将计数到 9。现在不用担心它是如何工作的；所有内容都将在配方 5.23 中解释。请注意，当你到达第一行的末尾并按\
    \ Enter 键时，带有 print 语句的第二行应该会自动缩进（图 5-5）。"
