    The method using the network is generally preferable, but the second method, in
    which the Raspberry Pi determines its own IP address, is worth doing if you intend
    to move your Raspberry Pi between different networks and want to keep the IP address
    the same.


    All the computers, TVs, phones, and other internet-enabled devices in your home
    are generally connected to the internet via the hub that links your phone line,
    4G, or a fiber-optic cable to your house. All of these devices, whether they connect
    to the hub by WiFi or via a direct cable connection, are said to be part of your
    Local Area Network (LAN).


    By default, when you connect a new device to your LAN (such as a Raspberry Pi),
    either by plugging it in with an Ethernet cable or by using WiFi, the LAN controller
    (your hub) will use a system called DHCP to allocate an IP address for the new
    device. This address will be allocated from a pool of IP addresses that might
    range from 192.168.1.2 to 192.168.1.199 (or maybe 10.0.0.2 to 10.0.0.199). In
    other words, just the last part of the four-part IP address changes for each device
    connected to the LAN.


    When DHCP allocates an IP address to a device, it does so with a lease time, which
    is how long that device will be guaranteed to keep the IP address without risk
    of it being allocated to some other device. Generally speaking, the default for
    this lease time is fairly short; on my hub, it’s a week. This means that the IP
    address of my Raspberry Pi can change without warning after a week, and if the
    Pi is being used in a project without keyboard, mouse, and monitor, it can be
    difficult to find its IP address to allow me to connect to it. This is why I might
    want to set a *static IP address* for your Raspberry Pi.


    # Setting the IP address using the network


    One way to ensure that your Raspberry Pi’s IP address doesn’t change is to simply
    go to your hub control interface and change the DHCP lease time to a much higher
    value. To access this interface, you will need to use a computer (it could be
    your Raspberry Pi, but it doesn’t have to be) and go to a specific address that
    is often written on the hub, described as *router*'
  - '[PAGE 60]


    address or admin console address. For my router this is http://192.168.1.1. There
    will also be a username and password to be entered. These are not the same as
    the WiFi access point name and password. They’re often also written somewhere
    on the hub and often have default values of admin and password, respectively.


    After you are connected, you will need to hunt around your admin console’s various
    pages for any mention of DHCP settings, which should look something like Figure
    2-3.


    ![](img/54ed1f8e884bc184601bf6f652461a95_60_0.png)


    Change the “Lease duration” (or whatever it’s specifically labeled for your hub)
    to the maximum allowed.


    One downside of extending the lease duration like this is that it applies to all
    the devices on your LAN. So if you have a lot of devices, it’s possible that you
    might run out of IP addresses because DHCP is unable to reallocate old IP addresses
    until the lease period has expired.'
  - '[PAGE 61]


    A better approach is to use something called DHCP reservation. This instructs
    DHCP to permanently allocate a particular IP address to a particular device. In
    Figure 2-4, you can see that I have allocated the IP address of 192.168.1.3 to
    the device raspberrypi-Ethernet (a Raspberry Pi connected by Ethernet cable to
    the hub).


    ![](img/54ed1f8e884bc184601bf6f652461a95_61_0.png)


    From now on, whenever that Raspberry Pi is connected to the LAN, it will be assigned
    the IP address 192.168.1.3, and DHCP will not allocate that IP address to any
    other device.


    # Setting the IP address using the Raspberry Pi


    The second approach to setting a static IP address for a Raspberry Pi uses the
    Raspberry Pi itself rather than the LAN. In effect, the Raspberry Pi is requesting,
    from the hub, the IP address it would like to use.


    Allowing your Raspberry Pi to decide its own IP address runs slightly contrary
    to the way things usually work on a network, where the LAN determines the IP address.
    The danger is, of course, that the LAN’s DHCP controller has already allocated
    that IP address to some other computer. Similar problems arise if you have more
    than one Raspberry Pi, both trying'
  - '[PAGE 62]


    to use the same IP address. IP addresses can’t be shared; in this event, one of
    the Raspberry Pis won’t connect to the network.


    If you want to use the approach described in this section, you need to ensure
    that your IP address is unique for a particular Raspberry Pi and that you chose
    a static IP address for your Raspberry Pi that is outside of the DHCP range. For
    example, looking at Figure 2-3, you can see that the DHCP-allocated IP address
    range is from 192.168.1.2 to 192.168.1.199. So, if we picked a static IP address
    of 192.168.1.210, we know it won’t be reallocated. Note that each of the number
    parts of an IP address is between 0 and 255, so, for example, 192.168.1.300 is
    not a valid IP address.


    Your Raspberry Pi will have a different IP address for each network connection.
    In this example, we will make the IP address static and the same for both WiFi
    and Ethernet cable.


    To edit this file, type the following command in the Terminal:


    ```

    $ sudo nano /etc/dhcpcd.conf

    ```


    First, decide on an IP address to use. You need to pick one that is both unused
    by any other machine on the network and outside the range of the IP addresses
    used by DHCP. In this case, I will use 192.168.1.210. Then I’ll modify the contents
    of the file, adding the following lines to the end of the file:


    ```

    interface eth0

    static ip_address=192.168.1.210/24

    static routers=192.168.1.1

    static domain_name_servers=192.168.1.1


    interface wlan0

    static ip_address=192.168.1.210/24

    static routers=192.168.1.1

    static domain_name_servers=192.168.1.1

    ```


    Note that, as I mentioned earlier, I have set the same IP address for both network
    interfaces (Ethernet and WiFi). If both connections are available,'
  - '[PAGE 63]


    the first one to connect will shut the other out from using that IP address. In
    practice, this means that the Ethernet connection will win because it’s much faster
    to connect than WiFi.

    The IP address used for the `routers` and `domain_name_servers` settings is the
    IP address you use to connnect to your hub’s admin console.

    Many hubs use the aforementioned IP addressing range. The address next to the
    entries `routers` and `domain_name_servers` is the same address as you will find
    written on your hub as its admin console address.

    However, if your hub uses the less common addressing format of 10.0.0.1, you will
    need to change all the instances of 192.168.1 in our earlier example to 10.0.0.

    Once the changes are made, save the file by pressing Ctrl-X and then pressing
    Y. For a guide to using the nano editor, see Recipe 3.7.

    You will need to reboot your Raspberry Pi by running `sudo reboot` before the
    changes take effect.


    # Discussion


    Networking has changed a lot with different versions of Raspberry Pi OS. These
    instructions apply to the latest (as of this writing) version of Raspberry Pi
    OS. If you don’t have the latest version of Raspberry Pi OS, you should get it,
    because Raspberry Pi OS is always evolving and improving. You can learn how to
    do this in Recipe 3.40. To find out what version of Raspberry Pi OS you have,
    see Recipe 3.39.


    # See Also


    Wikipedia has everything you want to know about IP addresses.


    # 2.4 Setting the Network Name of a Raspberry Pi'
- md: '## Problem


    You want to change the network name of your Raspberry Pi so that it’s not just
    called “raspberrypi.”


    ## Solution


    There are several ways of doing this. Whichever method you use, make sure that
    the network name you choose does not contain spaces and contains only letters,
    numeric digits, and the hyphen (-) character.


    In all three methods, you also need to restart your Raspberry Pi for the changes
    to take effect.


    ## Setting the network name using the Raspberry Pi Configuration tool


    Unless you are running your Raspberry Pi headless (without monitor and keyboard
    attached), the simplest way to set the network name of your Raspberry Pi is to
    use the Raspberry Pi Configuration tool. To open this, go to the Raspberry Pi
    menu, select Preferences, and then click Raspberry Pi Configuration. Then click
    the System tab (Figure 2-5).


    ![](img/54ed1f8e884bc184601bf6f652461a95_65_0.png)


    Figure 2-5. Changing the Hostname using the Raspberry Pi Configuration tool


    Change the name in the Hostname field to your preferred name and then click OK.
    You are then prompted to reboot so the changes will take effect (Recipe 1.14).


    ## Setting the network name using the command line (the easy way)


    You can also change your Raspberry Pi’s network name from the command line using
    the `raspi-config` tool. Run the following command in a Terminal session:


    ```

    $ sudo raspi-config

    ```


    This opens the `raspi-config` tool. Use the up/down cursor keys to select Network
    Options and then press return. This opens a form in which you can enter the new
    network name (Figure 2-6). Note that this interface uses only the command line,
    so you can use it from an SSH session (Recipe 2.7).


    ![](img/54ed1f8e884bc184601bf6f652461a95_66_0.png)


    ## Setting the network name using the command line (the hard way)


    If you really want to do it the hard way, you can also directly edit the files
    that control the Raspberry Pi’s network name. There are two files that you need
    to change.


    First, edit the file /etc/hostname. You can do this by opening a Terminal window
    and typing the command:


    ```

    $ sudo nano /etc/hostname

    ```


    Replace `raspberrypi` with a name of your choice.


    Second, open the file /etc/hosts in an editor using the command:


    ```

    $ sudo nano /etc/hosts

    ```


    The file will look something like this:


    ```

    127.0.0.1       localhost

    ::1             localhost ip6-localhost ip6-loopback

    fe00::0         ip6-localnet

    ff00::0         ip6-mcastprefix

    ff02::1         ip6-allnodes

    ff02::2         ip6-allrouters


    127.0.1.1       raspberrypi

    ```


    Change the name at the end of the file (`raspberrypi`) to your preferred new name.


    ## Discussion


    Changing the name of your Pi can be very useful, especially if you have more than
    one Pi connected to your network.


    ## See Also


    See [Recipe 2.3](Recipe 2.3) to change the IP address of your Raspberry Pi.

    You can also set the network name of your Raspberry Pi using PiBakery—see [Recipe
    1.8](Recipe 1.8).


    # 2.5 Setting Up a Wireless Connection


    ## Problem


    You want to connect your Raspberry Pi to the internet using WiFi.


    ## Solution


    There are various methods of setting up a WiFi connection with your Raspberry
    Pi.


    ### Setting up WiFi from the Pixel Desktop


    Setting up WiFi in the latest Raspberry Pi OS is really easy. In the upper-right
    corner of your screen, click the network icon (the two computers) (Figure 2-7).
    You are then presented with a list of WiFi networks. Select your network; a prompt
    appears in which you can enter your Pre Shared Key (password). Enter your password.
    After a while, the network icon will switch to the standard WiFi symbol, and you
    will be connected.


    ![](img/54ed1f8e884bc184601bf6f652461a95_68_0.png)


    ### Setting up WiFi using the command line


    This method of setting up WiFi is great if you are setting up your Raspberry Pi
    so that, after you configure it, you can use it without keyboard and monitor attached.
    However, you will need to have network access to the Raspberry Pi temporarily
    connecting it to your hub using an Ethernet cable (Recipe 2.1).


    Run the following command to start the `raspi-config` utility:


    ```

    $ sudo raspi-config

    ```


    Then, from the menu that opens, select Network Options (use the cursor keys and
    press Enter) and then select WiFi (Figure 2-8).


    ![](img/54ed1f8e884bc184601bf6f652461a95_69_0.png)


    A prompt appears, asking for the SSID (WiFi name) and password.


    ## Discussion


    WiFi uses quite a lot of power, so if you find your Pi rebooting unexpectedly
    or not bootting properly, then you might need to use a larger power supply for
    it. Look for a supply that is 1.5A or higher; if you are using a Raspberry Pi
    4 and are hanging high-power USB peripherals on it, use a 3A power supply.


    If you are using your Raspberry Pi as a media center (see Recipe 4.1), then there
    will be a settings page on which you can connect the media center to your network
    using WiFi.


    ## See Also


    For a list of WiFi adapters that are compatible with the Raspberry Pi, go to https://oreil.ly/67Mn1.

    For more information on setting up a wired network, see Recipe 2.1.

    For information on using the nano editor, see Recipe 3.7.

    To set up a WiFi connection using PiBakery, see Recipe 1.8.


    # 2.6 Connecting with a Console Lead


    ## Problem


    No network connection is available, but you still want to be able to remotely
    control your Raspberry Pi from another computer.


    ## Solution


    Use a *console cable* (a special lead that you need to buy separately—see [Link
    to Come]) to connect to a Raspberry Pi.


    To use this method, you will need to enable the Serial interface. This means that,
    at least while you are setting up your Raspberry Pi, you will need to have a keyboard,
    monitor, and mouse attached.


    To enable the Serial interface, go to the Raspberry Pi menu, select Preferences,
    and then click Raspberry Pi Configuration. Select the Interfaces tab and then
    click the Enabled button for Serial Port, as shown in Figure 2-9.


    ![](img/54ed1f8e884bc184601bf6f652461a95_71_0.png)


    Figure 2-9. Enabling the Serial interface using the Raspberry Pi Configuration
    tool


    As with most Raspberry Pi configurations, you can also use the command-line `raspi-config`
    tool by running this command in a Terminal session:


    ```

    $ sudo raspi-config

    ```


    Select Interfacing Options and then Serial, as shown in [Figure 2-10](#figure-2-10).


    ![](img/54ed1f8e884bc184601bf6f652461a95_72_0.png)


    Figure 2-10. Enabling the Serial interface using the `raspi-config` tool


    Console cables are great for a Pi that is going to be used *headless*—that is,
    without keyboard, mouse, or monitor.


    The console cable shown in [Figure 2-11](#) is available from [Adafruit](#).


    ![](img/54ed1f8e884bc184601bf6f652461a95_73_0.png)


    Figure 2-11. A console cable


    Connect the lead as follows and by referring to Figure 2-11.


    1. Connect the red (5V) lead to the 5V pin, one pin to the left of the edge of
    the GPIO header.

    2. Connect the black (GND) lead to GND on the next pin to the left on the Raspberry
    Pi.

    3. Connect the white lead (Rx) to Raspberry Pi GPIO 14 (TXD), to the left of the
    black lead.

    4. Connect the green lead (Tx) to GPIO 15 (RXD), to the left of the white lead
    on the Raspberry Pi.


    If you use a different lead, the wire colors might well be different, so always
    check the documentation for the lead or else you risk damaging your Raspberry
    Pi.


    Note that the USB lead also provides 5V on the red wire, with enough power for
    the Pi on its own but not with a lot of devices attached.


    If you are a Windows or macOS user, you will need to install drivers for the USB
    lead, which are available [here for Windows](https://example.com) and [here for
    macOS](https://example.com). Linux users usually don’t need to install any drivers
    for these leads.


    To connect to the Pi from macOS, you will need to run the Terminal and enter the
    following command:


    ```

    $ sudo cu -l /dev/cu.usbserial -s 115200

    ```


    After connecting, press Enter, and the Raspberry Pi login prompt should appear
    (Figure 2-12). The default username and password are *pi* and *raspberry*, respectively.


    ![](img/54ed1f8e884bc184601bf6f652461a95_74_0.png)


    If you are trying to connect to your Raspberry Pi from a Windows computer, you
    need to download the terminal software called [Putty](https://www.putty.org/).'
  mdcn: '## 问题


    你想更改树莓派的网络名称，使其不再只是“raspberrypi”。


    ## 解决方案


    有几种方法可以实现。无论使用哪种方法，请确保你选择的网络名称不包含空格，并且只包含字母、数字和连字符（-）。


    在所有三种方法中，你还需要重启树莓派才能使更改生效。


    ## 使用树莓派配置工具设置网络名称


    除非你的树莓派是无头运行（未连接显示器和键盘），否则设置树莓派网络名称最简单的方法是使用树莓派配置工具。要打开此工具，请转到树莓派菜单，选择“首选项”，然后单击“树莓派配置”。然后单击“系统”选项卡（图
    2-5）。


    ![](img/54ed1f8e884bc184601bf6f652461a95_65_0.png)


    图 2-5. 使用树莓派配置工具更改主机名


    将“主机名”字段中的名称更改为你偏好的名称，然后单击“确定”。然后系统会提示你重启以使更改生效（配方 1.14）。


    ## 使用命令行设置网络名称（简单方法）


    你也可以使用 `raspi-config` 工具从命令行更改树莓派的网络名称。在终端会话中运行以下命令：


    ```

    $ sudo raspi-config

    ```


    这将打开 `raspi-config` 工具。使用上/下方向键选择“网络选项”，然后按回车键。这将打开一个表单，你可以在其中输入新的网络名称（图 2-6）。请注意，此界面仅使用命令行，因此你可以从
    SSH 会话中使用它（配方 2.7）。


    ![](img/54ed1f8e884bc184601bf6f652461a95_66_0.png)


    ## 使用命令行设置网络名称（困难方法）


    如果你真的想用困难的方法，你也可以直接编辑控制树莓派网络名称的文件。你需要更改两个文件。


    首先，编辑文件 /etc/hostname。你可以通过打开终端窗口并输入以下命令来完成：


    ```

    $ sudo nano /etc/hostname

    ```


    将 `raspberrypi` 替换为你选择的名称。


    其次，使用以下命令在编辑器中打开文件 /etc/hosts：


    ```

    $ sudo nano /etc/hosts

    ```


    该文件将如下所示：


    ```

    127.0.0.1       localhost

    ::1             localhost ip6-localhost ip6-loopback

    fe00::0         ip6-localnet

    ff00::0         ip6-mcastprefix

    ff02::1         ip6-allnodes

    ff02::2         ip6-allrouters


    127.0.1.1       raspberrypi

    ```


    将文件末尾的名称（`raspberrypi`）更改为你偏好的新名称。


    ## 讨论


    更改树莓派的名称可能非常有用，特别是如果你有多个树莓派连接到你的网络。


    ## 另请参阅


    参见 [配方 2.3](Recipe 2.3) 以更改树莓派的 IP 地址。

    你也可以使用 PiBakery 设置树莓派的网络名称——参见 [配方 1.8](Recipe 1.8)。


    # 2.5 设置无线连接


    ## 问题


    你想使用 WiFi 将树莓派连接到互联网。


    ## 解决方案


    有多种方法可以为树莓派设置 WiFi 连接。


    ### 从 Pixel 桌面设置 WiFi


    在最新的树莓派操作系统中设置 WiFi 非常简单。在屏幕右上角，单击网络图标（两台计算机）（图 2-7）。然后你会看到一个 WiFi 网络列表。选择你的网络；会出现一个提示，你可以在其中输入预共享密钥（密码）。输入你的密码。过一会儿，网络图标将切换到标准的
    WiFi 符号，你将连接成功。


    ![](img/54ed1f8e884bc184601bf6f652461a95_68_0.png)


    ### 使用命令行设置 WiFi


    如果你设置树莓派是为了在配置后无需键盘和显示器即可使用，那么这种方法非常适合。但是，你需要临时通过以太网线将树莓派连接到你的集线器以进行网络访问（配方 2.1）。


    运行以下命令以启动 `raspi-config` 实用程序：


    ```

    $ sudo raspi-config

    ```


    然后，从打开的菜单中，选择“网络选项”（使用方向键并按回车键），然后选择“WiFi”（图 2-8）。


    ![](img/54ed1f8e884bc184601bf6f652461a95_69_0.png)


    会出现一个提示，要求输入 SSID（WiFi 名称）和密码。


    ## 讨论


    WiFi 使用相当多的电量，因此如果你发现树莓派意外重启或无法正常启动，那么你可能需要使用更大的电源。寻找 1.5A 或更高的电源；如果你使用的是树莓派 4
    并且连接了高功耗 USB 外设，请使用 3A 电源。


    如果你将树莓派用作媒体中心（参见配方 4.1），那么会有一个设置页面，你可以在其中使用 WiFi 将媒体中心连接到你的网络。


    ## 另请参阅


    有关与树莓派兼容的 WiFi 适配器列表，请访问 https://oreil.ly/67Mn1。

    有关设置有线网络的更多信息，请参见配方 2.1。

    有关使用 nano 编辑器的信息，请参见配方 3.7。

    要使用 PiBakery 设置 WiFi 连接，请参见配方 1.8。


    # 2.6 使用控制台线连接


    ## 问题


    没有可用的网络连接，但你仍然想从另一台计算机远程控制树莓派。


    ## 解决方案


    使用 *控制台线*（一种需要单独购买的特殊线缆——参见 [待添加链接]）连接到树莓派。


    要使用此方法，你需要启用串行接口。这意味着，至少在设置树莓派期间，你需要连接键盘、显示器和鼠标。


    要启用串行接口，请转到树莓派菜单，选择“首选项”，然后单击“树莓派配置”。选择“接口”选项卡，然后单击“串行端口”的“启用”按钮，如图 2-9 所示。


    ![](img/54ed1f8e884bc184601bf6f652461a95_71_0.png)


    图 2-9. 使用树莓派配置工具启用串行接口


    与大多数树莓派配置一样，你也可以通过在终端会话中运行以下命令来使用命令行 `raspi-config` 工具：


    ```

    $ sudo raspi-config

    ```


    选择“接口选项”，然后选择“串行”，如 [图 2-10](#figure-2-10) 所示。


    ![](img/54ed1f8e884bc184601bf6f652461a95_72_0.png)


    图 2-10. 使用 `raspi-config` 工具启用串行接口


    控制台线非常适合将用于 *无头* 模式的树莓派——即不连接键盘、鼠标或显示器。


    [图 2-11](#) 中所示的控制台线可从 [Adafruit](#) 购买。


    ![](img/54ed1f8e884bc184601bf6f652461a95_73_0.png)


    图 2-11. 控制台线


    按照以下说明并参考图 2-11 连接线缆。


    1. 将红色（5V）线连接到 5V 引脚，该引脚位于 GPIO 接口边缘左侧一个引脚处。

    2. 将黑色（GND）线连接到树莓派上左侧下一个引脚的 GND。

    3. 将白色线（Rx）连接到树莓派 GPIO 14（TXD），位于黑色线左侧。

    4. 将绿色线（Tx）连接到 GPIO 15（RXD），位于树莓派上白色线左侧。


    如果你使用不同的线缆，线缆颜色可能不同，因此请务必检查线缆的文档，否则有损坏树莓派的风险。


    请注意，USB 线也在红线上提供 5V，其功率足以单独为树莓派供电，但不足以支持大量设备。


    如果你是 Windows 或 macOS 用户，你需要为 USB 线安装驱动程序，可在此处获取 [Windows 驱动程序](https://example.com)
    和 [macOS 驱动程序](https://example.com)。Linux 用户通常不需要为这些线缆安装任何驱动程序。


    要从 macOS 连接到树莓派，你需要运行终端并输入以下命令：


    ```

    $ sudo cu -l /dev/cu.usbserial -s 115200

    ```


    连接后，按回车键，树莓派登录提示应该会出现（图 2-12）。默认用户名和密码分别是 *pi* 和 *raspberry*。


    ![](img/54ed1f8e884bc184601bf6f652461a95_74_0.png)


    如果你尝试从 Windows 计算机连接到树莓派，你需要下载名为 [Putty](https://www.putty.org/) 的终端软件。'
