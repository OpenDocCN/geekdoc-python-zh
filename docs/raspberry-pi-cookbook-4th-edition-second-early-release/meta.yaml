    # 4.6 Turning your Raspberry Pi into a Radio Transmitter


    > **NOTE**

    Be sure to check out the [accompanying video for this recipe](https://www.youtube.com/watch?v=1vV8pE4l0p0).


    # Problem


    You want to convert your Raspberry Pi into a low-powered FM transmitter that will
    send a radio signal to a normal FM radio receiver ([Figure 4-11](https://www.oreilly.com/library/view/make-great-stuff/9781449399191/graphics/0411.png)).


    # Solution


    Back in the early days of the Raspberry Pi, some clever folks at Imperial College,
    London, created some C code that allows you to do just this. The download even
    plays the *Star Wars* theme as a sample. This project will still work if you have
    an [original Raspberry Pi 1](https://www.raspberrypi.org/products/raspberry-pi-1-model-b/).
    The code has not been updated since for newer versions of Raspberry Pi.

    Fortunately, however, the project lives on in an altogether more advanced project
    called *rpitx*.'
  - '[PAGE 177]


    All you need is a short length of wire attached to general-purpose input/output
    (GPIO) pin 4. A 10 cm female-to-male header lead will work just fine for this.
    In fact, it should work with the radio right next to your Pi without any kind
    of antenna—such is the strength of the transmission.


    ![](img/54ed1f8e884bc184601bf6f652461a95_177_0.png)


    The first step is to install the rpitx software using the following commands.
    Note that this installation will change some things about how your Raspberry Pi
    is configured, including the frequency at which the GPU (graphics process) works.
    So if this is your main Raspberry Pi, make sure you first back up anything precious.
    Here’s the code you need:


    ```

    $ sudo apt-get update

    $ git clone https://github.com/F5OEO/rpitx

    $ cd rpitx

    $ ./install.sh

    ```'
