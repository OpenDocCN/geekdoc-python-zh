    \ IP 地址都可能会改变。\n\n像 No-IP 这样的服务也可以用来提供动态域名服务（DNS），这样你就可以注册一个域名，该域名会自动跟随你的 IP 地址的变化。\n\
    \n## 另请参阅\n\n- Motion 网站上有详尽的文档。\n- 你可以在 https://oreil.ly/_z4GH 找到与树莓派兼容的网络摄像头列表。\n\
    - 要固定你的树莓派网络摄像头的 IP 地址以便始终能找到它，请参阅配方 2.3。\n- 要将网络摄像头用于计算机视觉项目，请参阅 [待添加链接]。\n-\
    \ 有关使用 `apt-get` 的信息，请参阅配方 3.17。\n\n## 4.4 运行复古游戏机模拟器\n\n### 问题\n\n你想把你的树莓派变成一台复古游戏机。\n\
    \n### 解决方案\n\n如果你喜欢重温虚度的青春，在 Atari 2600 模拟器上玩《小行星》（图 4-8），那么 RetroPie 项目会吸引你。\n\
    \n![](img/54ed1f8e884bc184601bf6f652461a95_172_0.png)\n\n图 4-8. 在 Stella Atari\
    \ 2600 模拟器上运行的《小行星》\n\n已经构建了许多精彩的项目，创建了带有复古游戏控制器的定制游戏机和游戏桌。\n虽然你可以在 Raspberry\
    \ Pi OS 之上安装 RetroPie，但最简单的使用方法是使用 Raspberry Pi Imager（配方 1.6）将其写入 microSD 卡。\n\
    \n> ### 警告\n> 值得注意的是，即使这些游戏年代久远，它们仍然归某人所有。你需要用来在模拟器上玩游戏的 ROM 镜像文件，虽然在网上很容易找到，但不一定属于你。所以请遵守法律。\n\
    \n### 讨论\n\n该模拟器使用了惊人数量的树莓派本就不多的资源，因此你可能会发现你需要使用树莓派 4、3 或 2。\n通过互联网搜索，你可以找到许多人在这个基本设置的基础上，添加了复古\
    \ USB 控制器（如广泛可用且价格相当低廉的控制器），并将树莓派和显示器装入一个大型街机风格的外壳中。\n你也可以从 Pimoroni 购买一个名为 Picade\
    \ 的套件来制作一台漂亮的街机（图 4-9）。\n\n![](img/54ed1f8e884bc184601bf6f652461a95_174_0.png)\n\
    \n图 4-9. Pimoroni Picade 套件\n\n### 另请参阅\n\n- 完整的 RetroPie 文档可在 [RetroPie 网站](https://retropie.org.uk/)\
    \ 上找到。\n\n## 4.5 运行 Minecraft：树莓派版\n\n### 问题\n\n你想在你的树莓派上运行流行游戏 Minecraft。\n\n\
    ### 解决方案\n\n安装 Minecraft Pi，你可以在推荐软件工具中找到它（在配方 4.2 中讨论）。\n\n![](img/54ed1f8e884bc184601bf6f652461a95_175_0.png)\n\
    \n图 4-10. 树莓派上的 Minecraft\n\n### 讨论\n\nMinecraft 的开发者已经将游戏移植到了树莓派上，即 Minecraft\
    \ Pi（图 4-10）。\n为了让 Minecraft 适应树莓派，开发者在图形代码中做了一些简化。这意味着你只能直接在连接了键盘、鼠标和显示器的树莓派上玩这个游戏。通过远程虚拟网络计算（VNC）连接无法正常工作。\n\
    \nMinecraft 的树莓派版基于 Minecraft 的移动版，缺少一些功能，最显著的是红石。\n\n### 另请参阅\n\n- 在 [树莓派版 Minecraft](https://www.raspberrypi.org/learning/programming-minecraft-pi/)\
    \ 上了解更多信息。\n- Minecraft Pi 还包含一个 Python 编程接口，在 [待添加链接] 中，我们将介绍如何通过安全外壳（SSH）连接向\
    \ Python 发送命令以进行自动化构建。\n\n## 4.6 将你的树莓派变成无线电发射器\n\n> **注意**\n> 请务必查看 [本配方的配套视频](https://www.youtube.com/watch?v=1vV8pE4l0p0)。\n\
    \n### 问题\n\n你想将你的树莓派转换成一个低功率 FM 发射器，向普通的 FM 收音机接收器发送无线电信号（[图 4-11](https://www.oreilly.com/library/view/make-great-stuff/9781449399191/graphics/0411.png)）。\n\
    \n### 解决方案\n\n在树莓派的早期，伦敦帝国理工学院的一些聪明人编写了一些 C 代码，让你可以做到这一点。下载包甚至播放 *星球大战* 主题曲作为示例。如果你有\
    \ [原版树莓派 1](https://www.raspberrypi.org/products/raspberry-pi-1-model-b/)，这个项目仍然有效。此后代码没有针对更新版本的树莓派进行更新。\n\
    幸运的是，该项目在一个名为 *rpitx* 的更先进的项目中得以延续。\n\n你只需要一根短导线连接到通用输入/输出（GPIO）引脚 4。一根 10 厘米的母对公排线就能很好地完成这项工作。事实上，即使没有天线，它也应该能在收音机紧挨着你的树莓派时工作——这就是传输的强度。\n\
    \n![](img/54ed1f8e884bc184601bf6f652461a95_177_0.png)\n\n第一步是使用以下命令安装 rpitx 软件。请注意，此安装将更改树莓派配置的一些内容，包括\
    \ GPU（图形处理器）的工作频率。因此，如果这是你的主要树莓派，请确保首先备份任何重要数据。你需要的代码如下：\n\n```\n$ sudo apt-get\
    \ update\n$ git clone https://github.com/F5OEO/rpitx\n$ cd rpitx\n$ ./install.sh\n\
    ```\n\n现在你需要做其他事情大约 15 分钟，等待软件安装。你可能会看到看起来像错误消息和警告的内容，但这些都是正常的。在安装结束时，安装脚本会询问：\n\
    \n```\nIn order to run properly, rpitx need to modify /boot/config.txt.\nAre you\n\
    \    sure (y/n)\n```\n\n按 Y，脚本将通过以下消息确认它所做的更改：\n\n```\nSet GPU to 250Mhz in order\
    \ to be stable\n```\n\n如果你需要撤销此更改，请编辑 /boot/config.txt，删除最后一行 `gpu_freq=250`，然后重启。\n\
    \n接下来，找一个 FM 收音机接收器并将其调谐到 103.0 MHz。如果这个频率已被其他传输占用，请选择另一个频率并记下来。\n\n现在运行以下命令（如果你不得不更改频率，请将频率参数从\
    \ 103.0 更改）：\n\n```\nsudo ./pifmrds -freq \"103.0\" -audio src/pifmrds/stereo_44100.wav\n\
    ```\n\n如果一切正常，你应该能听到开发者谈论左右声道的声音。\n\n### 讨论\n\n你需要知道，这个项目在你的国家可能不合法。其功率输出高于用于\
    \ MP3 播放器的 FM 发射器。\n\n如果你把树莓派放在你的车里，这将是通过车辆音频系统输出声音的好方法。"
