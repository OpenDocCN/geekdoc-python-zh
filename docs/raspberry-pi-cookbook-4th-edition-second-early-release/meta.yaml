    ## 4.7 编辑位图图像


    ### 问题


    你想处理照片或其他图像。


    ### 解决方案


    安装并运行 GNU 图像处理程序（GIMP；参见图 4-12）。


    ![](img/54ed1f8e884bc184601bf6f652461a95_179_0.png)


    GIMP 可以从“添加/删除软件”工具（参见配方 4.2）安装。当你搜索 GIMP 时，会返回很多各种 GIMP 实用程序的结果，所以请寻找名为 *GNU
    Image Manipulation Program* 的软件包。


    如果你更喜欢从命令行安装 GIMP，请打开终端会话并输入以下命令：


    ```

    $ sudo apt-get install gimp

    ```


    安装 GIMP 后，你会在主菜单的“图形”标题下找到一个名为 GNU Image Manipulation Program 的新条目。


    ### 讨论


    尽管 GIMP 对内存和处理器性能要求较高，但它甚至可以在 Raspberry Pi 2 B 上使用，但如果你使用 Raspberry Pi 4 或 400，等待时间会少得多。


    ### 另请参阅


    从 [GIMP 网站](https://www.gimp.org/) 了解更多。


    GIMP 功能丰富，是一个非常复杂的图像编辑程序，因此确实需要一点学习时间。你可以在 GIMP 网站上找到该软件的在线手册。


    有关编辑矢量图像，请参阅 [待添加链接]。


    有关使用 `apt-get` 安装的更多信息，请参阅配方 3.17。


    ## 4.8 编辑矢量图像


    ### 问题


    你想创建或编辑高质量的矢量图形，例如可缩放矢量图形（SVG）。


    ### 解决方案


    Inkscape 是“添加/删除软件”工具（参见配方 4.2）中可用的软件包之一。打开该工具并搜索 *Inkscape*。


    如果你更喜欢从命令行安装 Inkscape，可以使用以下命令：


    ```

    $ sudo apt-get update

    $ sudo apt-get install inkscape

    ```


    安装 Inkscape 后，其图标将出现在 Raspberry Pi 开始菜单的“图形”部分。


    ![](img/54ed1f8e884bc184601bf6f652461a95_181_0.png)


    ### 讨论


    Inkscape (#ed3_ch4_fig4_51_new) 是最常用的开源矢量图像编辑器。


    Inkscape 是一款功能非常强大的软件，具有许多功能，需要一些时间才能掌握，所以如果一开始它不能满足你的要求，请不要灰心。你可能需要学习一些教程。


    Inkscape 是另一个最好在 Raspberry Pi 4 或 400 的额外性能下运行的程序。


    ### 另请参阅


    有关 Inkscape 的文档，请访问 https://inkscape.org。


    有关编辑位图图像（如照片），请参阅配方 4.7。


    ## 4.9 使用 Bookshelf


    ### 问题


    你想免费阅读 Raspberry Pi 书籍和杂志。


    ### 解决方案


    使用预装的 Bookshelf 应用程序。你可以在 Raspberry Pi 菜单的“帮助”部分找到此应用程序。打开它，你会看到（图 4-14）Mag Pi、Wireframe
    和 Hackspace Magazine 的往期杂志，以及 Raspberry Pi Press 的书籍。


    ![](img/54ed1f8e884bc184601bf6f652461a95_183_0.png)


    图 4-14. Bookshelf 应用程序。


    ### 讨论


    这是一个非常棒的资源，你会在 MagPi 杂志中找到许多关于 Raspberry Pi 各个方面的入门文章。它也是项目灵感的绝佳来源。


    ### 另请参阅


    你会在这里找到许多有趣的 Raspberry Pi 资源：[https://projects.raspberrypi.org/](https://projects.raspberrypi.org/)


    你也可以在这里下载 MagPi 杂志的 PDF 往期版本或订阅纸质版：[https://magpi.raspberrypi.com/](https://magpi.raspberrypi.com/)


    ## 4.10 播放网络电台


    ### 问题


    你想在 Raspberry Pi 上播放网络电台。


    ### 解决方案


    VLC 媒体播放器应该已随 Raspberry Pi OS 预装。你可以在菜单的“声音和视频”下找到它。


    如果由于任何原因它不在那里，你可以使用“首选软件”工具（配方 4.2）安装它。


    如果你更喜欢从命令行安装 VLC 媒体播放器，可以通过运行以下命令来完成：


    ```

    sudo apt-get install vlc

    ```


    安装后，你可以在主菜单的“声音与视频”部分找到 VLC。


    运行程序，然后在“媒体”菜单上，选择“打开网络串流”选项。这将打开一个对话框（参见图 4-15），你可以在其中输入要播放的网络电台的 URL。


    你需要将耳机或有源扬声器插入 Raspberry Pi 的音频插孔。


    ![](img/54ed1f8e884bc184601bf6f652461a95_185_0.png)


    ### 讨论


    你也可以从命令行运行 VLC，如下所示：


    ```

    $ vlc http://www.a-1radio.com/listen.pls -I dummy

    ```


    VLC 可能会产生一系列错误消息，但随后会正常播放音频。


    ### 另请参阅


    本配方大量借鉴了这个[教程](tutorial)，其中 Jan Holst 将事情更进一步，为项目添加了类似收音机的控件。


    对于英国读者


    ![](img/54ed1f8e884bc184601bf6f652461a95_187_0.png)


    图 4-16. Raspberry Pi 上的 VS Code


    如果你是一位经验丰富的程序员，那么你可能会发现你更喜欢使用 Visual Studio Code 而不是像 Thonny 或 Mu（配方 5.3 和配方 5.4）这样的初学者
    Python IDE 来编辑你的 Raspberry Pi Python 代码。如果你的项目包含多个文件，尤其如此。图 4-16 显示了左侧的文件资源管理器区域，你可以在其中看到项目中的所有文件。单击一个文件会使其在编辑器区域中可用，打开的文件各自有自己的标签页。


    如你所见，编辑器会突出显示语言语法，对其进行颜色编码，使其更易于阅读和发现错误。


    无论你是用 Python（参见第 5 章）还是其他语言编程，Visual Studio Code 都是一个有用的工具。


    ### 另请参阅


    简单的文本编辑器 nano 是编辑代码的一种简便方法 - 参见配方 3.7


    Thonny 是一个面向初学者的 Python 编辑器 - 参见配方 5.3


    ## 4.12 控制激光切割机


    ### 问题


    你想从 Raspberry Pi 控制你的低成本 K40 激光切割机。


    ### 解决方案


    如果你拥有流行的低成本中国 K40 系列激光切割机（图 4-17），那么你可以使用 K40 Whisperer 软件来控制你的激光切割机。因此，你不必使用相对昂贵的
    Windows 计算机来控制激光切割机，而是可以使用成本低得多的 Raspberry Pi。


    ![](img/54ed1f8e884bc184601bf6f652461a95_189_0.png)


    图 4-17. K40 激光切割机


    该软件是用 Python 编写的，但也依赖于 Inkscape 矢量绘图软件包。因此，如果你还没有安装 Inkscape，请按照配方 4.8 进行安装。


    接下来，从 https://www.scorchworks.com/K40whisperer/k40whisperer.html#download 下载 K40
    Whisperer 软件的源代码。从 *K40 Whisperer Source* 列中选择最新的下载。双击下载的 ZIP 文件并将其解压到你的主目录（ //home/pi）。在解压后的目录中，你会找到一个名为
    README_Linux.txt 的文件。这里的说明基于该文件。README 是通用的 Linux README，而不是特定于 Raspberry Pi 的。


    首先运行以下两个命令为软件创建一个用户组。


    ```

    $ sudo groupadd lasercutter

    $ sudo usermod -a -G lasercutter pi

    ```


    确保你的激光切割机已通过 USB 线连接到你的 Raspberry Pi，并且激光切割机已开机。现在你需要运行以下命令来查找激光切割机的 USB 供应商 ID
    和产品 ID。这些可能分别是 1a86 和 5512，但值得检查一下以防激光切割机制造商更改了这些。为此，运行 `lsusb` 命令：


    ```

    $ lsusb

    Bus 001 Device 004: ID 1a86:5512 QinHeng Electronics CH341 in EPP/MEM/I2C mode,
    EPP/I2C adapter

    Bus 001 Device 005: ID 0424:7800 Microchip Technology, Inc. (formerly SMSC)

    Bus 001 Device 003: ID 0424:2514 Microchip Technology, Inc. (formerly SMSC) USB
    2.0 Hub

    Bus 001 Device 002: ID 0424:2514 Microchip Technology, Inc. (formerly SMSC) USB
    2.0 Hub

    Bus 001 Device 001: ID 1d6b:0002 Linux Foundation 2.0 root hub

    ```


    这将列出连接到你的 Raspberry Pi 的所有 USB 设备。你现在需要找到与你的激光切割机对应的条目。在这种情况下，它是唯一的中文名称（*QinHeng*）。但如果你需要确认，可以拔掉激光切割机，再次运行
    `lsusb` 命令，看看哪个条目消失了。


    在该条目的行上，你可以看到文本 `1a86:5512`。冒号前面的部分是供应商 ID，5512 是产品 ID。你需要知道这些，因为你将在配置文件中使用它们。


    使用以下命令在 nano 中创建并编辑一个新文件：


    ```

    $ sudo nano /etc/udev/rules.d/97-ctc-lasercutter.rules

    ```'
