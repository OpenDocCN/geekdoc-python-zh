    # 3.37 Setting the Date and Time


    # Problem


    You want to manually set the date and time on your Raspberry Pi because it does
    not have an internet connection.


    # Solution


    Use the Linux `date` command.

    The date and time format is MMDDhhmmYYYY, where MM is the month number; DD is
    the day of the month; hh and mm are the hours and minutes, respectively; and YYYY
    is the year.

    For example:'
