- md: '## 5.4 Using Mu


    Before we can run the program we need to save it to a file, so at the top of the
    Mu window, click the Save button and then enter the filename `count.py` (Figure
    5-6).


    Now that the file is saved, run the program by clicking the Run button at the
    top of the Mu window. This causes the Mu editor screen to split, with the bottom
    half showing the result of running the program (Figure 5-7).


    If you have already followed [Recipe 3.22](Recipe 3.22) and downloaded the files
    accompanying this book, you can open these directly in Mu using the Open button
    and then navigating to the folder `/home/pi/raspberrypi_cookbook_ed3/python`,
    as shown in [Figure 5-8](Figure 5-8). Note that Mu is Python 3 and there are a
    few Python programs for this book that work only with Python 2, so check the text
    of the recipe that the code belongs to if you have problems running it from Mu.


    ### Discussion


    Python is unusual for a programming language in that indentation is a fundamental
    part of the language. Whereas many C-based languages use { and } to delimit a
    block of code, Python uses the indentation level. So in the preceding example,
    Python knows that `print` is to be invoked repeatedly as part of the `for` loop
    because it is indented four spaces from the left.


    When you’re starting out in Python, it’s not uncommon to see an error such as
    `IndentationError: unexpected indent`, which means that something is not indented
    correctly somewhere. If everything appears to line up, double-check that none
    of the indents contain tab characters, because Python treats tabs differently.


    In selecting Python 3 for our editing mode (Figure 5-4), we ignored the other
    options for mode. The Adafruit CircuitPython mode allows you to use your Raspberry
    Pi to program Adafruit’s range of CircuitPython boards, and the BBC micro:bit
    mode allows you to write MicroPython programs for a BBC micro:bit board. Both
    of these activities are about using other boards that are not covered in this
    book; however, it’s good to know that these are an options for using the Raspberry
    Pi with these microcontrollers.


    ### See Also


    The other popular Python editor for beginners is Thonny (Recipe 5.3).

    As well as using Mu to edit and run Python files, you can also take a lower-tech
    approach by editing files in nano (Recipe 3.7) and then running them from a Terminal
    session (Recipe 5.6).


    ## 5.5 Using the Python Console


    ### Problem


    You want to enter Python commands without writing an entire program. It can be
    useful to do this to experiment with some features of Python.


    ### Solution


    Use the Python console, either within Mu or in a Terminal session. The Python
    console provides a command line a little like that of Raspberry Pi OS ([Link to
    Come]), but instead of entering operating system commands, you can enter Python
    commands. If you are using Mu (Recipe 5.4), you can access the Python console
    by clicking the REPL (Read Eval Print Loop) button at the top of the Mu window
    (Figure 5-9).


    Ignoring everything except the bottom of Figure 5-9, you can see that there is
    a command prompt where you can type Python commands. In this case, I have typed
    the following:


    ```

    2 + 2

    ```


    and reassuringly received the answer:


    ```

    4

    ```


    ### Discussion


    An alternative to using Mu to run individual Python commands is to start a Python
    3 console in a Terminal window by typing the command **python3** —or to start
    a Python 2 console, type the command **python**.


    The >>> prompt indicates that you can type Python commands. If you need to type
    multiline commands, then the console will automatically provide a continuation
    line indicated by three dots. You still need to indent such lines by four spaces,
    as shown in the following session:


    ```

    >>> from time import sleep

    >>> while True:

    ...     print("hello")

    ...     sleep(1)

    ...

    hello

    hello

    ```


    You need to press Enter twice after your last command for the console to recognize
    the end of the indented block and run the code.


    The Python console also provides a command history so that you can move back and
    forth through your previous commands using the up arrow and down arrow keys.


    When you are finished with the Python console and want to return to the command
    line, type **exit()**.


    ### See Also


    If you have more than a couple of lines that you want to type in, chances are
    you would be better off using Mu (Recipe 5.4) to edit and run a file.


    ## 5.6 Running Python Programs from the Terminal


    ### Problem


    Running programs from within Mu (Recipe 5.4) is fine, but sometimes you want to
    run a Python program from a Terminal window.


    ### Solution


    Use the `python` or `python3` command in a Terminal, followed by the filename
    containing the program you want to run.


    ### Discussion


    To run a Python 3 program from the command line, use a command like this:


    ```

    $ python3 myprogram.py

    ```


    If you want to run the program using Python 2, change the command `python3` to
    `python`. In both cases the Python program that you want to run should be in a
    file with the extension `.py`.

    You can run most Python programs as a normal user; however, some you’ll need to
    run as superuser. If this is the case for your program, prefix the command with
    `sudo`:


    ```

    $ sudo python3 myprogram.py

    ```


    In the earlier examples, you need to include `python3` in the command to run the
    program, but you can also add a line to the start of a Python program so that
    Linux knows it is a Python program. This special line is called a *shebang* (a
    contraction of the names of two symbols, “hash” and “interrobang”), and the following
    single-line example program has it as its first line:


    ```

    #!/usr/bin/python3

    print("I''m a program, I can run all by myself")

    ```


    Before you can run this directly from the command line, you must give the file
    write permissions by using the following command (see Recipe 3.14); this assumes
    the file is called *test.py*:


    ```

    $ chmod +x test.py

    ```


    The parameter +x means to add execute permissions to the file.

    Now you can run the Python program *test.py* by using the single command:


    ```

    $ ./test.py

    I''m a program, I can run all by myself

    $

    ```


    The ./ at the start of the line is needed for the command line to find the file.


    ### See Also


    Recipe 3.25 shows you how to run a Python program as a timed event.

    To automatically run a program at startup, see Recipe 3.24.


    ## 5.7 Assigning Names to Values (Variables)


    ### Problem


    You want to give a value a name.


    ### Solution


    You assign a value to a name using =.


    ### Discussion


    In Python, you don''t have to declare the type of a variable; you can just assign
    it a value using the assignment operator (=), as shown in the following examples:


    ```

    a = 123

    b = 12.34

    c = "Hello"

    d = ''Hello''

    e = True

    ```


    You can define character-string constants using either single or double quotes.
    The logical constants in Python are `True` and `False`, and they are case sensitive.


    By convention, variable names begin with a lowercase letter, and if the variable
    name consists of more than one word, the words are joined together with an underscore
    character. It is always a good idea to give your variables descriptive names so
    that when you come back to your program after a break, you can work out how it
    works.


    Some examples of valid variable names are `x`, `total`, and `number_of_chars`.


    ### See Also


    You also can assign a variable a value that is a list (Recipe 6.1) or a dictionary
    (Recipe 6.12).


    For more information on arithmetic with variables, see Recipe 5.10.


    ## 5.8 Displaying Output


    ### Problem


    You want to see the value of a variable.


    ### Solution


    Use the `print` command. You can try the following example in the Python console
    (Recipe 5.5):


    ```

    >>> x = 10

    >>> print(x)

    10

    >>>

    ```


    Note that the `print` command starts a new line to print on.


    ### Discussion


    In Python 2, you can use the `print` command without brackets. However, this is
    not true in Python 3, so for compatibility with both versions of Python, always
    use brackets around the value you are printing.


    ### See Also


    To read user input, see Recipe 5.9.


    ## 5.9 Reading User Input


    ### Problem


    You want to prompt the user to enter a value.


    ### Solution


    Use the `input` (Python 3) or `raw_input` (Python 2) command. You can try the
    following example in the Python 3 console (Recipe 5.5):


    ```

    >>> x = input("Enter Value:")

    Enter Value:23

    >>> print(x)

    23

    >>>

    ```'
  mdcn: '## 5.4 使用 Mu


    在运行程序之前，我们需要将其保存到文件中。因此，在 Mu 窗口顶部，点击“保存”按钮，然后输入文件名 `count.py`（图 5-6）。


    文件保存后，通过点击 Mu 窗口顶部的“运行”按钮来运行程序。这会导致 Mu 编辑器屏幕分割，下半部分显示程序运行的结果（图 5-7）。


    如果你已经按照 [配方 3.22](Recipe 3.22) 的步骤下载了本书附带的文件，你可以直接在 Mu 中使用“打开”按钮打开它们，然后导航到文件夹
    `/home/pi/raspberrypi_cookbook_ed3/python`，如 [图 5-8](Figure 5-8) 所示。请注意，Mu 使用的是
    Python 3，而本书中有一些 Python 程序仅适用于 Python 2，因此如果在 Mu 中运行代码时遇到问题，请检查代码所属配方的文本说明。


    ### 讨论


    Python 作为一种编程语言，其独特之处在于缩进是语言的基本组成部分。许多基于 C 的语言使用 { 和 } 来界定代码块，而 Python 使用缩进级别。因此，在前面的例子中，Python
    知道 `print` 应作为 `for` 循环的一部分被重复调用，因为它从左边缩进了四个空格。


    当你刚开始使用 Python 时，看到类似 `IndentationError: unexpected indent` 的错误并不罕见，这意味着某处缩进不正确。如果一切看起来都对齐了，请仔细检查缩进中是否包含制表符，因为
    Python 对制表符的处理方式不同。


    在选择 Python 3 作为我们的编辑模式（图 5-4）时，我们忽略了其他模式选项。Adafruit CircuitPython 模式允许你使用树莓派为
    Adafruit 的 CircuitPython 系列开发板编程，而 BBC micro:bit 模式允许你为 BBC micro:bit 开发板编写 MicroPython
    程序。这两项活动都涉及使用本书未涵盖的其他开发板；然而，了解这些是使用树莓派与这些微控制器配合使用的选项是很好的。


    ### 另请参阅


    另一个适合初学者的流行 Python 编辑器是 Thonny（配方 5.3）。

    除了使用 Mu 编辑和运行 Python 文件外，你也可以采用更“低科技”的方法：在 nano 中编辑文件（配方 3.7），然后从终端会话中运行它们（配方
    5.6）。


    ## 5.5 使用 Python 控制台


    ### 问题


    你想在不编写完整程序的情况下输入 Python 命令。这样做对于试验 Python 的某些功能可能很有用。


    ### 解决方案


    使用 Python 控制台，可以在 Mu 中或在终端会话中使用。Python 控制台提供了一个类似于树莓派操作系统（[链接待补充]）的命令行，但你可以输入
    Python 命令，而不是操作系统命令。如果你使用的是 Mu（配方 5.4），你可以通过点击 Mu 窗口顶部的 REPL（读取-求值-打印-循环）按钮来访问
    Python 控制台（图 5-9）。


    忽略图 5-9 中除底部以外的所有内容，你可以看到一个命令提示符，你可以在其中输入 Python 命令。在这个例子中，我输入了以下内容：


    ```

    2 + 2

    ```


    并放心地得到了答案：


    ```

    4

    ```


    ### 讨论


    使用 Mu 运行单个 Python 命令的替代方法是在终端窗口中启动一个 Python 3 控制台，方法是输入命令 **python3** ——或者要启动
    Python 2 控制台，则输入命令 **python**。


    >>> 提示符表示你可以输入 Python 命令。如果你需要输入多行命令，控制台将自动提供一个由三个点表示的续行。你仍然需要将这些行缩进四个空格，如以下会话所示：


    ```

    >>> from time import sleep

    >>> while True:

    ...     print("hello")

    ...     sleep(1)

    ...

    hello

    hello

    ```


    在输入最后一行命令后，你需要按两次回车键，控制台才能识别缩进块的结束并运行代码。


    Python 控制台还提供命令历史记录，因此你可以使用向上和向下箭头键在之前的命令之间来回移动。


    当你完成 Python 控制台的使用并想返回命令行时，输入 **exit()**。


    ### 另请参阅


    如果你想输入的代码超过几行，你最好使用 Mu（配方 5.4）来编辑和运行文件。


    ## 5.6 从终端运行 Python 程序


    ### 问题


    从 Mu 内部运行程序（配方 5.4）很好，但有时你想从终端窗口运行 Python 程序。


    ### 解决方案


    在终端中使用 `python` 或 `python3` 命令，后跟包含你要运行的程序的文件名。


    ### 讨论


    要从命令行运行 Python 3 程序，请使用如下命令：


    ```

    $ python3 myprogram.py

    ```


    如果你想使用 Python 2 运行程序，请将命令 `python3` 改为 `python`。在这两种情况下，你要运行的 Python 程序都应该在一个扩展名为
    `.py` 的文件中。

    你可以以普通用户身份运行大多数 Python 程序；但是，有些你需要以超级用户身份运行。如果你的程序属于这种情况，请在命令前加上 `sudo`：


    ```

    $ sudo python3 myprogram.py

    ```


    在前面的例子中，你需要在命令中包含 `python3` 来运行程序，但你也可以在 Python 程序的开头添加一行，以便 Linux 知道它是一个 Python
    程序。这个特殊的行被称为 *shebang*（是“hash”和“interrobang”两个符号名称的缩写），下面的单行示例程序将其作为第一行：


    ```

    #!/usr/bin/python3

    print("I''m a program, I can run all by myself")

    ```


    在你可以直接从命令行运行此程序之前，你必须使用以下命令（参见配方 3.14）赋予文件写权限；这里假设文件名为 *test.py*：


    ```

    $ chmod +x test.py

    ```


    参数 +x 表示向文件添加执行权限。

    现在你可以使用单个命令运行 Python 程序 *test.py*：


    ```

    $ ./test.py

    I''m a program, I can run all by myself

    $

    ```


    行首的 ./ 是命令行找到文件所必需的。


    ### 另请参阅


    配方 3.25 向你展示如何将 Python 程序作为定时事件运行。

    要自动在启动时运行程序，请参阅配方 3.24。


    ## 5.7 为值命名（变量）


    ### 问题


    你想给一个值命名。


    ### 解决方案


    你使用 = 将值赋给一个名称。


    ### 讨论


    在 Python 中，你不必声明变量的类型；你可以直接使用赋值运算符 (=) 为其赋值，如以下示例所示：


    ```

    a = 123

    b = 12.34

    c = "Hello"

    d = ''Hello''

    e = True

    ```


    你可以使用单引号或双引号定义字符串常量。Python 中的逻辑常量是 `True` 和 `False`，它们区分大小写。


    按照惯例，变量名以小写字母开头，如果变量名由多个单词组成，则用下划线字符连接。给你的变量起描述性名称总是一个好主意，这样当你在休息后回到程序时，就能弄清楚它是如何工作的。


    一些有效的变量名示例包括 `x`、`total` 和 `number_of_chars`。


    ### 另请参阅


    你也可以将变量赋值为列表（配方 6.1）或字典（配方 6.12）。


    有关变量算术运算的更多信息，请参阅配方 5.10。


    ## 5.8 显示输出


    ### 问题


    你想查看变量的值。


    ### 解决方案


    使用 `print` 命令。你可以在 Python 控制台（配方 5.5）中尝试以下示例：


    ```

    >>> x = 10

    >>> print(x)

    10

    >>>

    ```


    请注意，`print` 命令会开始一个新行进行打印。


    ### 讨论


    在 Python 2 中，你可以不使用括号直接使用 `print` 命令。然而，在 Python 3 中并非如此，因此为了兼容两个版本的 Python，请始终在要打印的值周围使用括号。


    ### 另请参阅


    要读取用户输入，请参阅配方 5.9。


    ## 5.9 读取用户输入


    ### 问题


    你想提示用户输入一个值。


    ### 解决方案


    使用 `input`（Python 3）或 `raw_input`（Python 2）命令。你可以在 Python 3 控制台（配方 5.5）中尝试以下示例：


    ```

    >>> x = input("Enter Value:")

    Enter Value:23

    >>> print(x)

    23

    >>>

    ```'
