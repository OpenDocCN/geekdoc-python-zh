    \ 2.8).\n\n# Solution\n\nAn IPv4 address (as used for local addresses) is a four-part\
    \ number uniquely identifying a computer’s network interface within a network.\
    \ Each part is separated from the next part by a dot.\n\nTo find the IP address\
    \ of your Raspberry Pi, you need to issue this command in a Terminal window:\n\
    \n```\n$ hostname -I\n192.168.1.16 fd84:be52:5bf4:ca00:618:fd51:1c .....\n```\n\
