    ## 3.32 连接文件


    ### 问题


    你有多个文本文件，想要将它们合并成一个大文件。


    ### 解决方案


    使用 `cat` 命令将多个文件*连接*成一个输出文件。


    例如：


    ```

    $ cat file1.txt file2.txt file3.txt > full_file.txt

    ```


    ### 讨论


    连接文件是 `cat` 命令的真正用途。你可以提供任意数量的文件名，它们都会被写入你指定的文件中。如果你不重定向输出，它只会显示在你的终端窗口中。如果文件很大，这个过程可能需要一些时间！


    ### 另请参阅


    另请参阅 [配方 3.8](Recipe 3.8)，其中 `cat` 用于显示文件内容。


    ## 3.33 使用管道


    ### 问题


    你想将一个 Linux 命令的输出作为另一个命令的输入。


    ### 解决方案


    使用 `pipe` 命令（即键盘上的*竖线*符号 `|`）将一个命令的输出管道传输到另一个命令。


    例如：


    ```

    $ ls -l *.py | grep Jun

    -rw-r--r-- 1 pi pi 226 Jun  7 06:49 speed.py

    ```


    此示例将查找所有扩展名为 `py` 且目录列表中包含 `Jun` 的文件，表明它们最后修改于六月。


    ### 讨论


    乍一看，这很像使用 `>` 进行输出重定向（配方 3.31）。区别在于，如果目标是另一个程序，`>` 将不起作用。它只能用于重定向到文件。

    你可以将任意多个程序链接在一起，如图所示，尽管这不是你经常做的事情：


    ```

    $ command1 | command2 | command3

    ```


    ### 另请参阅


    另请参阅配方 3.28，了解使用 `grep` 查找进程的示例，以及配方 3.27，了解使用 `pipe` 和 `grep` 搜索命令历史记录。


    ## 3.34 隐藏终端输出


    ### 问题


    你想运行一个命令，但不希望输出填满屏幕。


    ### 解决方案


    使用 `>` 将输出重定向到 `/dev/null`。

    例如：


    ```

    $ ls > /dev/null

    ```


    `dev` 目录包含操作系统设备，包括串行端口等。在此目录中，定义了一个特殊设备（空设备），它会简单地丢弃发送给它的所有内容。


    ### 讨论


    此示例说明了语法，但除此之外没什么用。更常见的用途是当你运行一个程序，而开发者在其代码中留下了很多你并不真正想看到的跟踪消息时。以下示例隐藏了 `find`
    命令的多余输出（参见配方 3.36）：


    ```

    $ find / -name gemgem.py 2>/dev/null

    /home/pi/python_games/gemgem.py

    ```


    ### 另请参阅


    有关重定向标准输出的更多信息，请参阅配方 3.31。


    ## 3.35 在后台运行程序


    ### 问题


    你想在运行程序的同时处理其他任务。


    ### 解决方案


    使用 `&` 命令在后台运行程序或命令。

    例如：


    ```

    $ python speed.py &

    [1] 2528

    $ ls

    ```


    命令行不会等待程序运行完成，而是显示进程 ID（第二个数字），并立即允许你继续运行任何其他命令。然后你可以使用此进程 ID 来终止后台进程（配方 3.28）。


    要将后台进程带回前台，请使用 `fg` 命令：


    ```

    $ fg

    python speed.py

    ```


    这会报告正在运行的命令或程序，然后等待其完成。


    ### 讨论


    后台进程的输出仍会出现在终端中。

    将进程置于后台的另一种方法是打开多个终端窗口。


    ### 另请参阅


    有关管理进程的信息，请参阅 [配方 3.28](Recipe 3.28)。


    ## 3.36 创建命令别名


    ### 问题


    你想为你经常使用的命令创建别名（快捷方式）。


    ### 解决方案


    使用 nano 编辑文件 `~/.bashrc`（[配方 3.7](Recipe 3.7)），然后移动到文件末尾并添加任意多行，如下所示：


    ```

    alias L=''ls -a''

    ```


    这会创建一个名为 `L` 的别名，当输入时，它将被解释为命令 `ls -a`。


    使用 Ctrl-X 和 Y 保存并退出文件，然后输入以下命令以使用新别名更新终端：


    ```

    $ source .bashrc

    ```


    ### 讨论


    许多 Linux 用户为 `rm` 设置如下别名，以便它确认删除：


    ```

    $ alias rm=''rm -i''

    ```


    只要你在使用没有设置此别名的其他人的系统时没有忘记这一点，这并不是一个坏主意！


    ### 另请参阅


    有关 `rm` 的更多信息，请参阅 [配方 3.11](Recipe 3.11)。


    ## 3.37 设置日期和时间


    ### 问题


    你想手动设置树莓派上的日期和时间，因为它没有互联网连接。


    ### 解决方案


    使用 Linux `date` 命令。

    日期和时间格式为 MMDDhhmmYYYY，其中 MM 是月份编号；DD 是月份中的日期；hh 和 mm 分别是小时和分钟；YYYY 是年份。

    例如：


    ```

    $ sudo date 010203042019

    Wed  2 Jan 03:04:00 GMT 2019

    ```


    ### 讨论


    如果树莓派连接到互联网，它在启动时会自动使用互联网时间服务器设置自己的时间。

    你也可以通过单独输入 `date` 来使用 `date` 显示协调世界时（UTC）时间：


    ```

    $ date

    Fri 19 Jul 10:59:08 BST 2019

    ```


    ### 另请参阅


    如果你想让树莓派即使在没有网络的情况下也能保持正确时间，你可以使用实时时钟（RTC）模块（[链接待补充]）。


    ## 3.38 查看 SD 卡剩余空间


    ### 问题


    你想知道 SD 卡上还有多少可用空间。


    ### 解决方案


    使用 Linux `df`（磁盘文件系统）命令：


    ```

    $ df -h

    Filesystem      Size  Used Avail Use% Mounted on

    rootfs          3.6G  1.7G  1.9G  48% /

    /dev/root       3.6G  1.7G  1.9G  48% /

    devtmpfs        180M     0  180M   0% /dev

    tmpfs                 38M  236K   38M   1% /run

    tmpfs                5.0M     0  5.0M   0% /run/lock

    tmpfs                  75M     0   75M   0% /run/shm

    /dev/mmcblk0p1        56M   19M   38M  34% /boot

    ```


    `-h` 选项使用 kB、MB 和 GB 符号显示大小，而不是字节数。


    ### 讨论


    查看结果的第一行，你可以看到 SD 卡上有 3.6 GB 的存储空间，其中已使用 1.7 GB。


    当磁盘空间用尽时，你可能会遇到意外的异常行为，例如显示无法写入文件的错误消息。


    ### 另请参阅


    你可以使用命令 `man df` 查找 `df` 的手册页。


    ## 3.39 查看运行的操作系统版本


    ### 问题


    你想确切知道你运行的是哪个版本的树莓派操作系统。


    ### 解决方案


    在终端或安全外壳（SSH）会话中输入以下命令：


    ```

    $ cat /etc/os-release

    PRETTY_NAME="Raspbian GNU/Linux 9 (stretch)"

    NAME="Raspbian GNU/Linux"

    VERSION_ID="9"

    VERSION="9 (stretch)"

    ID=raspbian

    ID_LIKE=debian

    HOME_URL="http://www.raspbian.org/"

    SUPPORT_URL="http://www.raspbian.org/RaspbianForums"

    BUG_REPORT_URL="http://www.raspbian.org/RaspbianBugs"

    pi@raspberrypi:~ $

    ```


    ### 讨论


    从上一个示例的结果中可以看出，第一行告诉了我们所有需要知道的信息。在这种情况下，我的树莓派运行的是 Raspbian 版本 9，其昵称为 *stretch*。


    如果你在使用某个特定软件时遇到问题，了解你运行的树莓派操作系统版本会很有用。通常，技术支持人员问你的第一个问题是*你运行的是哪个版本的树莓派操作系统？*


    你可能需要知道树莓派上 Linux 内核的版本。你可以使用以下命令找到它：


    ```

    $ uname -a

    Linux raspberrypi 4.14.71-v7+ #1145 SMP Fri Sep 21 15:38:35 BST 2018 armv7l GNU/Linux

    ```


    这里你可以看到 Raspbian stretch 使用的是 v4.14 内核。


    ### 另请参阅


    要查看 SD 卡或其他启动盘上剩余的空间，请参阅 [配方 3.38](Recipe 3.38)。


    ## 3.40 更新树莓派操作系统


    ### 问题


    你想将你的树莓派更新到最新版本的树莓派操作系统。'
