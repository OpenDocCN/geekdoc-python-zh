    $ sudo date 010203042019

    Wed  2 Jan 03:04:00 GMT 2019

    ```


    # Discussion


    If the Raspberry Pi is connected to the internet, as it boots up it will automatically
    set its own time using an internet time server.

    You can also use `date` to display Coordinated Universal Time (UTC) time by entering
    `date` on its own:


    ```

    $ date

    Fri 19 Jul 10:59:08 BST 2019

    ```


    # See Also


    If you want your Raspberry Pi to maintain the correct time even when there is
    no network, you can use a real-time clock (RTC) module ([Link to Come]).


