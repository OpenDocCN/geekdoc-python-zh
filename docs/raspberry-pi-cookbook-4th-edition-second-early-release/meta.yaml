    \ and/or examples in this book, or if you notice missing material within this\
    \ chapter, please reach out to the author at simonmonkauthor@gmail.com."
  mdcn: "## 6.0 引言\n\n在第5章中，你学习了Python语言的基础知识。在本章中，你将了解两个关键的Python数据结构：*列表*和*字典*。\n\
    \n## 6.1 创建列表\n\n### 问题\n\n你想使用一个变量来存储一系列值，而不仅仅是一个值。\n\n### 解决方案\n\n使用列表。在Python中，列表是一个按顺序存储的值的集合，因此你可以通过位置来访问它们。\n\
    \n你可以使用`[`和`]`字符来包含其初始内容，从而创建一个列表：\n\n```python\n>>> a = [34, 'Fred', 12, False,\
    \ 72.3]\n>>>\n```\n\n与C等语言中更严格的数组不同，在Python中声明列表时不需要指定其大小。你也可以随时更改列表中的元素数量。\n\n\
    ### 讨论\n\n如本例所示，列表中的项目不需要都是相同的类型，尽管它们通常是。\n要创建一个空列表以便稍后添加项目，你可以这样写：\n\n```python\n\
    >>> a = []\n>>>\n```\n\n## 6.2 访问列表元素\n\n### 问题\n\n你想查找列表中的单个元素或更改它们。\n\n### 解决方案\n\
    \n使用`[ ]`表示法通过元素在列表中的位置来访问列表元素。\n例如，要访问列表中位置1的元素：\n\n```python\n>>> a = [34, 'Fred',\
    \ 12, False, 72.3]\n>>> a[1]\n'Fred'\n```\n\n### 讨论\n\n列表位置（索引）从第一个元素开始为0（而不是1）。\n\
    除了使用`[ ]`表示法从列表中读取值外，你还可以使用它来更改特定位置的值，如下所示：\n\n```python\n>>> a = [34, 'Fred',\
    \ 12, False, 72.3]\n>>> a[1] = 777\n>>> a\n[34, 777, 12, False, 72.3]\n```\n\n\
    如果你尝试使用过大的索引来更改（或读取）列表元素，你将得到一个`Index out of range`错误：\n\n```python\n>>> a[50]\
    \ = 777\nTraceback (most recent call last):\n  File \"<stdin>\", line 1, in <module>\n\
    IndexError: list assignment index out of range\n>>>\n```\n\n## 6.3 查找列表长度\n\n\
    ### 问题\n\n你需要知道列表中有多少个元素。\n\n### 解决方案\n\n使用Python函数`len`。\n例如：\n\n```python\n\
    >>> a = [34, 'Fred', 12, False, 72.3]\n>>> len(a)\n5\n```\n\n函数`len`从Python版本1就存在，这与更面向对象、基于类的Python版本2和3相当不同。对于后者，能够这样写会更有意义：\n\
    \n```python\n>>> a = [34, 'Fred', 12, False, 72.3]\n>>> a.length() # 此示例无效\n```\n\
    \n但你不能——Python就是这样。\n\n### 讨论\n\n`len`命令也适用于字符串（参见第5.15节）。\n\n## 6.4 向列表添加元素\n\
    \n### 问题\n\n你需要向列表添加一个项目。\n\n### 解决方案\n\n使用Python函数`append`、`insert`或`extend`。\n\
    要向列表末尾添加单个项目，请使用`append`，如下所示：\n\n```python\n>>> a = [34, 'Fred', 12, False, 72.3]\n\
    >>> a.append(\"new\")\n>>> a\n[34, 'Fred', 12, False, 72.3, 'new']\n```\n\n###\
    \ 讨论\n\n有时你不想将新元素添加到列表末尾，而是想将它们插入到列表中的某个位置。为此，请使用`insert`命令。第一个参数是应插入项目的索引，第二个参数是要插入的项目：\n\
    \n```python\n>>> a.insert(2, \"new2\")\n>>> a\n[34, 'Fred', 'new2', 12, False,\
    \ 72.3]\n```\n\n请注意，新插入元素之后的所有元素都向上移动了一个位置。\n`append`和`insert`都只向列表添加一个元素。`extend`函数将一个列表的所有元素添加到另一个列表的末尾：\n\
    \n```python\n>>> a = [34, 'Fred', 12, False, 72.3]\n>>> b = [74, 75]\n>>> a.extend(b)\n\
    >>> a\n[34, 'Fred', 12, False, 72.3, 74, 75]\n```\n\n## 6.5 从列表中移除元素\n\n### 问题\n\
    \n你需要从列表中移除一个项目。\n\n### 解决方案\n\n使用Python函数`pop`。\n不带参数的`pop`命令移除列表的最后一个元素：\n\n\
    ```python\n>>> a = [34, 'Fred', 12, False, 72.3]\n>>> a.pop()\n72.3\n>>> a\n[34,\
    \ 'Fred', 12, False]\n```\n\n### 讨论\n\n请注意，`pop`会返回从列表中移除的值。\n要移除最后一个元素以外的位置的项目，请使用带参数的`pop`，参数为要移除项目的位置：\n\
    \n```python\n>>> a = [34, 'Fred', 12, False, 72.3]\n>>> a.pop(0)\n34\n```\n\n\
    如果你使用的索引位置超出了列表的末尾，你将得到一个`Index out of range`错误。\n\n## 6.6 通过解析字符串创建列表\n\n###\
    \ 问题\n\n你需要将一个由某个字符分隔的单词字符串转换为一个字符串数组，其中数组中的每个字符串都是其中一个单词。\n\n### 解决方案\n\n使用Python字符串函数`split`。\n\
    不带参数的`split`命令将字符串的单词分隔成数组的各个元素：\n\n```python\n>>> \"abc def ghi\".split()\n['abc',\
    \ 'def', 'ghi']\n```\n\n如果你为`split`提供一个参数，它将使用该参数作为分隔符来分割字符串。\n例如：\n\n```python\n\
    >>> \"abc--de--ghi\".split('--')\n['abc', 'de', 'ghi']\n```\n\n### 讨论\n\n例如，当你从文件导入数据时，此命令非常有用。`split`命令可以选择性地接受一个参数，该参数是分割字符串时用作分隔符的字符串。因此，如果你使用逗号作为分隔符，你可以这样分割字符串：\n\
    \n```python\n>>> \"abc,def,ghi\".split(',')\n['abc', 'def', 'ghi']\n```\n\n###\
    \ 另请参阅\n\n另一种更强大的字符串处理方法在[待补充链接]中描述。\n\n## 6.7 遍历列表\n\n### 问题\n\n你需要将一些代码行依次应用于列表的每个项目。\n\
    \n### 解决方案\n\n使用Python语言命令`for`：\n\n```python\n>>> a = [34, 'Fred', 12, False,\
    \ 72.3]\n>>> for x in a:\n...     print(x)\n...\n34\nFred\n12\nFalse\n72.3\n>>>\n\
    ```\n\n### 讨论\n\n`for`关键字后面紧跟一个变量名（在本例中为`x`）。这被称为循环变量；它将被设置为`in`之后指定的列表的每个元素。\n\
    \n随后的缩进行将为列表中的每个元素执行一次。每次循环时，`x`将被赋予列表中该位置元素的值。然后你可以使用`x`来打印值，如前面的示例所示。\n\n###\
    \ 另请参阅\n\n列表推导式是处理列表的另一种方式。\n\n## 6.8 枚举列表\n\n### 问题\n\n你需要依次对列表中的每个项目运行一些代码行，但你也需要知道每个项目的索引位置。\n\
    \n### 解决方案\n\n参数`n`包含在括号内，然后在`range`命令中使用，但在1被加到它之前不使用。\n\n使用参数作为要计数到的数字意味着，如果你通常计数到10但有时计数到不同的数字，你将总是必须指定该数字。然而，你可以为参数指定一个默认值，从而两全其美，如本例所示：\n\
    \n```python\ndef count_to_n(n=10):\n    for i in range(1, n + 1):\n        print(i)\n\
    \ncount_to_n()\n```\n\n现在，除非在调用函数时指定了不同的数字，否则它将计数到10。\n\n如果你的函数需要多个参数，也许是在两个数字之间计数，参数用逗号分隔：\n\
    \n```python\ndef count(from_num=1, to_num=10):\n    for i in range(from_num, to_num\
    \ + 1):\n        print(i)\n\ncount()\ncount(5)\ncount(5, 10)\n```\n\n所有这些示例都是不返回任何值的函数；它们只是执行某些操作。如果你需要一个函数返回值，你需要使用`return`命令。\n\
    \n以下函数接受一个字符串作为参数，并在字符串末尾添加单词*please*：\n\n```python\ndef make_polite(sentence):\n\
    \    return sentence + \" please\"\n\nprint(make_polite(\"Pass the cheese\"))\n\
    ```\n\n当函数返回值时，你可以将结果赋给一个变量，或者，如本例所示，你可以打印结果。\n\n### 另请参阅\n\n要从函数返回多个值，请参阅[待补充链接]。\n\
    \n# 第6章 Python列表和字典\n\n> **致早期版本读者的说明**\n>\n> 通过早期版本电子书，你可以在书籍的最早形式中获取内容——作者在写作时的原始且未经编辑的内容——因此你可以在这些标题正式发布之前很久就利用这些技术。\n\
    >\n> 这将是最终书籍的第6章。请注意，GitHub仓库稍后将激活。\n>\n> 如果你对我们如何改进本书的内容和/或示例有意见，或者你注意到本章中缺少材料，请通过simonmonkauthor@gmail.com联系作者。"
