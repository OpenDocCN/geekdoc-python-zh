    As well as using Mu to edit and run Python files, you can also take a lower-tech
    approach by editing files in nano (Recipe 3.7) and then running them from a Terminal
    session (Recipe 5.6).


    # 5.5 Using the Python Console


    # Problem


    You want to enter Python commands without writing an entire program. It can be
    useful to do this to experiment with some features of Python.


    # Solution


    Use the Python console, either within Mu or in a Terminal session. The Python
    console provides a command line a little like that of Raspberry Pi OS ([Link to
    Come]), but instead of entering operating system commands, you can enter Python
    commands. If you are using Mu (Recipe 5.4), you can access the Python console
    by clicking the REPL (Read Eval Print Loop) button at the top of the Mu window
    (Figure 5-9).'
  - '[PAGE 207]


    ![](img/54ed1f8e884bc184601bf6f652461a95_207_0.png)


    Ignoring everything except the bottom of Figure 5-9, you can see that there is
    a command prompt where you can type Python commands. In this case, I have typed
    the following:


    ```

    2 + 2

    ```


    and reassuringly received the answer:


    ```

    4

    ```


    # Discussion'
  - '[PAGE 208]


    An alternative to using Mu to run individual Python commands is to start a Python
    3 console in a Terminal window by typing the command **python3** —or to start
    a Python 2 console, type the command **python**.


    The >>> prompt indicates that you can type Python commands. If you need to type
    multiline commands, then the console will automatically provide a continuation
    line indicated by three dots. You still need to indent such lines by four spaces,
    as shown in the following session:


    ```

    >>> from time import sleep

    >>> while True:

    ...     print("hello")

    ...     sleep(1)

    ...

    hello

    hello

    ```


    You need to press Enter twice after your last command for the console to recognize
    the end of the indented block and run the code.


    The Python console also provides a command history so that you can move back and
    forth through your previous commands using the up arrow and down arrow keys.


    When you are finished with the Python console and want to return to the command
    line, type **exit()**.


    # See Also


    If you have more than a couple of lines that you want to type in, chances are
    you would be better off using Mu (Recipe 5.4) to edit and run a file.


    # 5.6 Running Python Programs from the Terminal


    # Problem'
  - '[PAGE 209]


    Running programs from within Mu (Recipe 5.4) is fine, but sometimes you want to
    run a Python program from a Terminal window.


    # Solution


    Use the `python` or `python3` command in a Terminal, followed by the filename
    containing the program you want to run.


    # Discussion


    To run a Python 3 program from the command line, use a command like this:


    ```

    $ python3 myprogram.py

    ```


    If you want to run the program using Python 2, change the command `python3` to
    `python`. In both cases the Python program that you want to run should be in a
    file with the extension `.py`.

    You can run most Python programs as a normal user; however, some you’ll need to
    run as superuser. If this is the case for your program, prefix the command with
    `sudo`:


    ```

    $ sudo python3 myprogram.py

    ```


    In the earlier examples, you need to include `python3` in the command to run the
    program, but you can also add a line to the start of a Python program so that
    Linux knows it is a Python program. This special line is called a *shebang* (a
    contraction of the names of two symbols, “hash” and “interrobang”), and the following
    single-line example program has it as its first line:


    ```

    #!/usr/bin/python3

    print("I''m a program, I can run all by myself")

    ```'
  - '[PAGE 210]


    Before you can run this directly from the command line, you must give the file
    write permissions by using the following command (see Recipe 3.14); this assumes
    the file is called *test.py*:


    ```

    $ chmod +x test.py

    ```


    The parameter +x means to add execute permissions to the file.

    Now you can run the Python program *test.py* by using the single command:


    ```

    $ ./test.py

    I''m a program, I can run all by myself

    $

    ```


    The ./ at the start of the line is needed for the command line to find the file.


    # See Also


    Recipe 3.25 shows you how to run a Python program as a timed event.

    To automatically run a program at startup, see Recipe 3.24.


    # 5.7 Assigning Names to Values (Variables)


    # Problem


    You want to give a value a name.


    # Solution


    You assign a value to a name using =.


    # Discussion


    In Python, you don''t have to declare the type of a variable; you can just assign
    it a value using the assignment operator (=), as shown in the'
  - '[PAGE 211]


    following examples:


    ```

    a = 123

    b = 12.34

    c = "Hello"

    d = ''Hello''

    e = True

    ```


    You can define character-string constants using either single or double quotes.
    The logical constants in Python are `True` and `False`, and they are case sensitive.


    By convention, variable names begin with a lowercase letter, and if the variable
    name consists of more than one word, the words are joined together with an underscore
    character. It is always a good idea to give your variables descriptive names so
    that when you come back to your program after a break, you can work out how it
    works.


    Some examples of valid variable names are `x`, `total`, and `number_of_chars`.


    # See Also


    You also can assign a variable a value that is a list (Recipe 6.1) or a dictionary
    (Recipe 6.12).


    For more information on arithmetic with variables, see Recipe 5.10.


    # 5.8 Displaying Output


    # Problem


    You want to see the value of a variable.


    # Solution'
  - '[PAGE 212]


    Use the `print` command. You can try the following example in the Python console
    (Recipe 5.5):


    ```

    >>> x = 10

    >>> print(x)

    10

    >>>

    ```


    Note that the `print` command starts a new line to print on.


    # Discussion


    In Python 2, you can use the `print` command without brackets. However, this is
    not true in Python 3, so for compatibility with both versions of Python, always
    use brackets around the value you are printing.


    # See Also


    To read user input, see Recipe 5.9.


    # 5.9 Reading User Input


    # Problem


    You want to prompt the user to enter a value.


    # Solution


    Use the `input` (Python 3) or `raw_input` (Python 2) command. You can try the
    following example in the Python 3 console (Recipe 5.5):


    ```

    >>> x = input("Enter Value:")

    Enter Value:23

    >>> print(x)

    23

    >>>

    ```'
- md: "## Discussion\n\nIn Python 2, `raw_input` must be substituted for `input` in\
    \ the preceding example.\n\nPython 2 also has an `input` function, but that function\
    \ validates the input and attempts to convert it into a Python value of the appropriate\
    \ type, whereas `raw_input` does the same thing as `input` in Python 3 and just\
    \ returns a string, even if what you typed is a number.\n\n## See Also\n\nFind\
    \ more information on Python 2 `input` at [https://oreil.ly/EhqMt](https://oreil.ly/EhqMt).\n\
    \n## 5.10 Using Arithmetic Operators\n\n### Problem\n\nYou want to do arithmetic\
    \ in Python.\n\n### Solution\n\nUse the +, -, *, and / operators.\n\n### Discussion\n\
    \nThe most common operators for arithmetic are +, -, *, and /, which are, respectively,\
    \ add, subtract, multiply, and divide.\n\nYou can also group together parts of\
    \ the expression with parentheses, as shown in the following example, which, given\
    \ a temperature in degrees Celsius, converts it to degrees Fahrenheit:\n\n```\n\
    >>> tempC = input(\"Enter temp in C: \")\nEnter temp in C: 20\n>>> tempF = (int(tempC)\
    \ * 9) / 5 + 32\n>>> print(tempF)\n68.0\n>>>\n```\n\nOther arithmetic operators\
    \ include % (modulo remainder) and ** (raise to the power of). For example, to\
    \ raise 2 to the power of 8, you would write the following:\n\n```\n>>> 2 ** 8\n\
    256\n```\n\n### See Also\n\nSee Recipe 5.9 on using the `input` command, and Recipe\
    \ 5.14 on converting the string value from `input` to a number.\nThe `Math` library\
    \ has many useful math functions that you can use.\n\n## 5.11 Creating Strings\n\
    \n### Problem\n\nYou want to create a string variable—that is, a variable that\
    \ contains text.\n\n### Solution\n\nUse the assignment operator (=) and a string\
    \ constant to create a new string. You can use either double or single quotation\
    \ marks around the string, but they must match. For example:\n\n```\n>>> s = \"\
    abc def\"\n>>> print(s)\nabc def\n>>>\n```\n\n### Discussion\n\nIf including double\
    \ or single quotes inside a string, pick the type of quotes that you don’t need\
    \ to use within the contents of the string itself as the beginning and end markers\
    \ of the string. For example:\n\n```\n>>> s = \"Isn't it warm?\"\n>>> print(s)\n\
    Isn't it warm?\n>>>\n```\n\nSometimes you’ll need to include special characters\
    \ such as tab or newline inside your string. This requires the use of what are\
    \ called *escape characters*. To include a tab, use \\t, and for a newline, use\
    \ \\n. For example:\n\n```\n>>> s = \"name\\tage\\nMatt\\t14\"\n>>> print(s)\n\
    name    age\nMatt    14\n>>>\n```\n\n### See Also\n\nFor a full list of escape\
    \ characters, see the [Python Reference Manual](https://docs.python.org/3/reference/lexical_analysis.html#string-and-bytes-literals).\n\
    \n## 5.12 Concatenating (Joining) Strings\n\n### Problem\n\nYou want to join a\
    \ number of strings together.\n\n### Solution\n\nUse the + (concatenate) operator.\n\
    \nFor example:\n\n```\n>>> s1 = \"abc\"\n>>> s2 = \"def\"\n>>> s = s1 + s2\n>>>\
    \ print(s)\nabcdef\n>>>\n```\n\n### Discussion\n\nIn many languages, you can have\
    \ a chain of values to concatenate, some of which are strings and some of which\
    \ are other types such as numbers, and numbers will automatically be converted\
    \ into strings during the concatenation. This is not the case in Python, and if\
    \ you try the following command, you will get an error:\n\n```\n>>> \"abc\" +\
    \ 23\nTraceback (most recent call last):\n  File \"<stdin>\", line 1, in <module>\n\
    TypeError: Can't convert 'int' object to str implicitly\n```\n\nYou need to convert\
    \ each component that you want to concatenate into a string before concatenating,\
    \ as shown in this example:\n\n```\n>>> \"abc\" + str(23)\n'abc23'\n>>>\n```\n\
    \n### See Also\n\nSee Recipe 5.13 for more information about converting numbers\
    \ into strings using the `str` function.\n\n## 5.13 Converting Numbers into Strings\n\
    \n### Problem\n\nYou want to convert a number into a string.\n\n### Solution\n\
    \nUse the `str` Python function.\nFor example:\n\n```\n>>> str(123)\n'123'\n>>>\n\
    ```\n\n### Discussion\n\nA common reason for wanting to convert a number into\
    \ a string is so you can then concatenate it with another string (Recipe 5.12).\n\
    \n### See Also\n\nFor the reverse operation of turning a string into a number,\
    \ see Recipe 5.14.\n\n## 5.14 Converting Strings into Numbers\n\n### Problem\n\
    \nYou want to convert a string into a number.\n\n### Solution\n\nUse the `int`\
    \ or `float` Python function.\nFor example, to convert the string `-123` into\
    \ a number, you could use the following:\n\n```\n>>> int(\"-123\")\n-123\n>>>\n\
    ```\n\nThis will work on both positive and negative whole numbers.\nTo convert\
    \ a floating-point number, use `float` instead of `int`:\n\n```\n>>> float(\"\
    00123.45\")\n123.45\n>>>\n```\n\n### Discussion\n\nBoth `int` and `float` will\
    \ handle leading zeros correctly and are tolerant of any spaces or other whitespace\
    \ characters around the number.\nYou can also use `int` to convert a string representing\
    \ a number in a number base other than the default of 10 by supplying the number\
    \ base as the second argument. The following example converts the string representation\
    \ of binary 1001 into a number:\n\n```\n>>> int(\"1001\", 2)\n9\n>>>\n```\n\n\
    This second example converts the hexadecimal number AFF0 into an integer:\n\n\
    ```\n>>> int(\"AFF0\", 16)\n45040\n>>>\n```\n\n### See Also\n\nFor the reverse\
    \ operation of turning a number into a string, see Recipe 5.13.\n\n## 5.15 Finding\
    \ the Length of a String\n\n### Problem\n\nYou need to know how many characters\
    \ there are in a string.\n\n### Solution\n\nUse the `len` Python function.\n\n\
    ### Discussion\n\nFor example, to find the length of the string `abcdef`, you\
    \ would use:\n\n```\n>>> len(\"abcdef\")\n6\n>>>\n```\n\n### See Also\n\nThe `len`\
    \ command also works on lists ([Recipe 6.3](Recipe 6.3)).\n\n## 5.16 Finding the\
    \ Position of One String Within Another\n\n### Problem\n\nYou need to find the\
    \ position of one string within another.\n\n### Solution\n\nUse the `find` Python\
    \ function.\nFor example, to find the starting position of the string `def` within\
    \ the string `abcdefghi`, you would use:\n\n```\n>>> s = \"abcdefghi\"\n>>> s.find(\"\
    def\")\n3\n>>>\n```\n\nNote that the character positions start at 0 (not 1), so\
    \ a position of 3 means the fourth character in the string.\n\n### Discussion\n\
    \nIf the string you’re looking for doesn’t exist in the string being searched,\
    \ `find` returns the value -1.\n\n### See Also\n\nThe `replace` function is used\
    \ to find and then replace all occurrences of a string (Recipe 5.18).\n\n## 5.17\
    \ Extracting Part of a String\n\n### Problem\n\nYou want to cut out a section\
    \ of a string between certain character positions.\n\n### Solution\n\nUse the\
    \ Python `[:]` notation.\n\nFor example, to cut out a section from the second\
    \ character to the fifth character of the string `abcdefghi`, you would use the\
    \ following:\n\n```\n>>> s = \"abcdefghi\"\n>>> s[1:5]\n'bcde'\n>>>\n```\n\nNote\
    \ that the character positions start at 0 (not 1), so a position of 1 means the\
    \ second character in the string, and 5 means the sixth; however, the character\
    \ range is exclusive at the high end. Thus in this example, the letter *f* is\
    \ not included.\n\n### Discussion\n\nThe `[:]` notation is actually quite powerful.\
    \ You can omit either argument, in which case the start or end of the string is\
    \ assumed as appropriate. For example:\n\n```\n>>> s = \"abcdefghi\"\n>>> s[:5]\n\
    'abcde'\n>>>\n```\n\nand:\n\n```\n>>> s = \"abcdefghi\"\n>>> s[3:]\n'defghi'\n\
    >>>\n```\n\nYou can also use negative indices to count back from the end of the\
    \ string. This can be useful in situations such as when you want to find the three-letter\
    \ extension of a file, as in the following example:\n\n```\n>>> \"myfile.txt\"\
    [-3:]\n'txt'\n```\n\n### See Also\n\nRecipe 5.12 describes joining strings together\
    \ rather than splitting them.\nRecipe 6.10 uses the same syntax but with lists\
    \ rather than strings.\nAnother and more powerful way to manipulate strings is\
    \ described in [Link to Come].\n\n## 5.18 Replacing One String of Characters with\
    \ Another Within a String\n\n### Problem\n\nYou want to replace all occurrences\
    \ of a string within another string.\n\n### Solution\n\nUse the `replace` function.\n\
    For example, to replace all occurrences of X with `times`, you would use the following:\n\
    \n```\n>>> s = \"It was the best of X. It was the worst of X\"\n>>> s.replace(\"\
    X\", \"times\")\n```"
  mdcn: "## 讨论\n\n在 Python 2 中，必须用 `raw_input` 替代前面示例中的 `input`。\n\nPython 2 也有一个\
    \ `input` 函数，但该函数会验证输入并尝试将其转换为适当类型的 Python 值，而 `raw_input` 的行为与 Python 3 中的 `input`\
    \ 相同，仅返回一个字符串，即使你输入的是数字。\n\n## 另请参阅\n\n在 [https://oreil.ly/EhqMt](https://oreil.ly/EhqMt)\
    \ 查找更多关于 Python 2 `input` 的信息。\n\n## 5.10 使用算术运算符\n\n### 问题\n\n你想在 Python 中进行算术运算。\n\
    \n### 解决方案\n\n使用 +、-、* 和 / 运算符。\n\n### 讨论\n\n最常见的算术运算符是 +、-、* 和 /，它们分别代表加、减、乘和除。\n\
    \n你也可以使用括号将表达式的部分组合在一起，如以下示例所示，该示例将摄氏温度转换为华氏温度：\n\n```\n>>> tempC = input(\"Enter\
    \ temp in C: \")\nEnter temp in C: 20\n>>> tempF = (int(tempC) * 9) / 5 + 32\n\
    >>> print(tempF)\n68.0\n>>>\n```\n\n其他算术运算符包括 %（取模余数）和 **（幂运算）。例如，要计算 2 的 8 次方，你可以这样写：\n\
    \n```\n>>> 2 ** 8\n256\n```\n\n### 另请参阅\n\n参见 Recipe 5.9 了解如何使用 `input` 命令，以及\
    \ Recipe 5.14 了解如何将 `input` 的字符串值转换为数字。\n`Math` 库包含许多有用的数学函数可供使用。\n\n## 5.11 创建字符串\n\
    \n### 问题\n\n你想创建一个字符串变量——即一个包含文本的变量。\n\n### 解决方案\n\n使用赋值运算符（=）和字符串常量来创建一个新字符串。你可以使用双引号或单引号将字符串括起来，但它们必须匹配。例如：\n\
    \n```\n>>> s = \"abc def\"\n>>> print(s)\nabc def\n>>>\n```\n\n### 讨论\n\n如果要在字符串内部包含双引号或单引号，请选择字符串内容中不需要使用的引号类型作为字符串的开始和结束标记。例如：\n\
    \n```\n>>> s = \"Isn't it warm?\"\n>>> print(s)\nIsn't it warm?\n>>>\n```\n\n\
    有时你需要在字符串中包含制表符或换行符等特殊字符。这需要使用所谓的 *转义字符*。要包含制表符，请使用 \\t；要包含换行符，请使用 \\n。例如：\n\n\
    ```\n>>> s = \"name\\tage\\nMatt\\t14\"\n>>> print(s)\nname    age\nMatt    14\n\
    >>>\n```\n\n### 另请参阅\n\n有关转义字符的完整列表，请参阅 [Python 参考手册](https://docs.python.org/3/reference/lexical_analysis.html#string-and-bytes-literals)。\n\
    \n## 5.12 连接（拼接）字符串\n\n### 问题\n\n你想将多个字符串连接在一起。\n\n### 解决方案\n\n使用 +（连接）运算符。\n\n\
    例如：\n\n```\n>>> s1 = \"abc\"\n>>> s2 = \"def\"\n>>> s = s1 + s2\n>>> print(s)\n\
    abcdef\n>>>\n```\n\n### 讨论\n\n在许多语言中，你可以将一系列值连接起来，其中一些是字符串，另一些是其他类型（如数字），数字在连接过程中会自动转换为字符串。但在\
    \ Python 中并非如此，如果你尝试以下命令，将会得到一个错误：\n\n```\n>>> \"abc\" + 23\nTraceback (most recent\
    \ call last):\n  File \"<stdin>\", line 1, in <module>\nTypeError: Can't convert\
    \ 'int' object to str implicitly\n```\n\n你需要在连接之前将每个要连接的组件转换为字符串，如本例所示：\n\n```\n\
    >>> \"abc\" + str(23)\n'abc23'\n>>>\n```\n\n### 另请参阅\n\n参见 Recipe 5.13 了解有关使用\
    \ `str` 函数将数字转换为字符串的更多信息。\n\n## 5.13 将数字转换为字符串\n\n### 问题\n\n你想将一个数字转换为字符串。\n\n\
    ### 解决方案\n\n使用 `str` Python 函数。\n例如：\n\n```\n>>> str(123)\n'123'\n>>>\n```\n\n\
    ### 讨论\n\n想要将数字转换为字符串的一个常见原因是为了之后可以将其与另一个字符串连接（Recipe 5.12）。\n\n### 另请参阅\n\n有关将字符串转换为数字的反向操作，请参见\
    \ Recipe 5.14。\n\n## 5.14 将字符串转换为数字\n\n### 问题\n\n你想将一个字符串转换为数字。\n\n### 解决方案\n\n\
    使用 `int` 或 `float` Python 函数。\n例如，要将字符串 `-123` 转换为数字，你可以使用以下方法：\n\n```\n>>> int(\"\
    -123\")\n-123\n>>>\n```\n\n这适用于正整数和负整数。\n要转换浮点数，请使用 `float` 而不是 `int`：\n\n```\n\
    >>> float(\"00123.45\")\n123.45\n>>>\n```\n\n### 讨论\n\n`int` 和 `float` 都能正确处理前导零，并且对数字周围的任何空格或其他空白字符具有容忍性。\n\
    你也可以使用 `int` 通过提供数字基数作为第二个参数，将表示非默认十进制数的字符串转换为数字。以下示例将二进制数 1001 的字符串表示形式转换为数字：\n\
    \n```\n>>> int(\"1001\", 2)\n9\n>>>\n```\n\n第二个示例将十六进制数 AFF0 转换为整数：\n\n```\n>>>\
    \ int(\"AFF0\", 16)\n45040\n>>>\n```\n\n### 另请参阅\n\n有关将数字转换为字符串的反向操作，请参见 Recipe\
    \ 5.13。\n\n## 5.15 查找字符串的长度\n\n### 问题\n\n你需要知道字符串中有多少个字符。\n\n### 解决方案\n\n使用 `len`\
    \ Python 函数。\n\n### 讨论\n\n例如，要查找字符串 `abcdef` 的长度，你可以使用：\n\n```\n>>> len(\"abcdef\"\
    )\n6\n>>>\n```\n\n### 另请参阅\n\n`len` 命令也适用于列表（[Recipe 6.3](Recipe 6.3)）。\n\n##\
    \ 5.16 查找一个字符串在另一个字符串中的位置\n\n### 问题\n\n你需要查找一个字符串在另一个字符串中的位置。\n\n### 解决方案\n\n\
    使用 `find` Python 函数。\n例如，要查找字符串 `def` 在字符串 `abcdefghi` 中的起始位置，你可以使用：\n\n```\n\
    >>> s = \"abcdefghi\"\n>>> s.find(\"def\")\n3\n>>>\n```\n\n请注意，字符位置从 0 开始（而不是\
    \ 1），因此位置 3 表示字符串中的第四个字符。\n\n### 讨论\n\n如果要查找的字符串在被搜索的字符串中不存在，`find` 将返回值 -1。\n\
    \n### 另请参阅\n\n`replace` 函数用于查找并替换字符串的所有出现（Recipe 5.18）。\n\n## 5.17 提取字符串的一部分\n\
    \n### 问题\n\n你想截取字符串中特定字符位置之间的部分。\n\n### 解决方案\n\n使用 Python 的 `[:]` 表示法。\n\n例如，要截取字符串\
    \ `abcdefghi` 中从第二个字符到第五个字符的部分，你可以使用以下方法：\n\n```\n>>> s = \"abcdefghi\"\n>>> s[1:5]\n\
