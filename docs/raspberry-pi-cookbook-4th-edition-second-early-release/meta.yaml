  md: 'You want to connect to a remote Pi from another computer by using Secure Shell
    (SSH).


    # Solution


    Before you can connect to your Raspberry Pi using SSH, you must turn on SSH. On
    newer versions of Raspberry Pi OS, you can use the Raspberry Pi Configuration
    tool (Figure 2-13), which you can find on the Main menu under Preferences. Just
    select the box for SSH and then click OK. You are then prompted to restart.


    If you prefer to use the command line, use the `raspi-config` application. You
    can start this at any time by entering the following command in Terminal:


    ```

    $ sudo raspi-config

    ```


    Click the Interfaces tab, scroll down to the SSH option, and then click the Enabled
    button.'
