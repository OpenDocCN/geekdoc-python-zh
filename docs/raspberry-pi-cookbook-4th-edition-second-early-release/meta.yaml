    \n几乎所有 Raspberry Pi OS 命令都有手册页，你可以通过输入命令名称后跟命令本身来查看它们。然而，命令的手册页并不总是很容易访问，它是该命令的详尽参考，而非简单的使用指南。因此，通常更好的做法是直接在互联网上搜索该命令。\n\
    \n## 3.17 使用 apt-get 安装软件\n\n### 问题\n\n你想使用命令行安装软件。\n\n### 解决方案\n\n从终端会话安装软件最常用的工具是\
    \ `apt-get`（高级打包工具）。\n该命令的基本格式（必须以超级用户身份运行）如下：\n\n```\n$ sudo apt-get install\
    \ <软件名称>\n```\n\n例如，要安装 AbiWord 文字处理软件，你需要输入以下命令：\n\n```\n$ sudo apt-get install\
    \ abiword\n```\n\n### 讨论\n\n`apt-get` 包管理器使用一个可用软件列表。此列表包含在你使用的 Raspberry Pi 操作系统发行版中，但可能已过时。因此，在使用\
    \ `apt-get` 安装新软件之前，最好始终运行以下命令来更新列表：\n\n```\n$ sudo apt-get update\n```\n\n该列表和用于安装的软件包都在互联网上，因此除非你的\
    \ Raspberry Pi 有互联网连接，否则这些操作都无法进行。\n\n> **提示**\n\n如果你在更新时遇到类似 `E: Problem with\
