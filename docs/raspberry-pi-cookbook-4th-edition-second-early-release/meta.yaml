    # 3.17 Installing Software with apt-get


    # Problem


    You want to install software using the command line.


    # Solution


    The most frequently used tool for installing software from a Terminal session
    is `apt-get` (the Advanced Packaging Tool).

    The basic format of the command, which you must run as a superuser, is as follows:


    ```

    $ sudo apt-get install <name of software>

    ```


    For example, to install the AbiWord word processing software, you would enter
    this command:


    ```

    $ sudo apt-get install abiword

    ```'
  - '[PAGE 125]


    # Discussion


    The `apt-get` package manager uses a list of available software. This list is
    included with the Raspberry Pi operating system distribution that you use but
    is likely to be out of date. So it is a good idea to always run the following
    command to update the list before installing new software using `apt-get`:


    ```

    $ sudo apt-get update

    ```


    The list and the software packages for installation are all on the internet, so
    none of this will work unless your Raspberry Pi has an internet connection.


    > **TIP**


    If you find that when you update you get an error like `E: Problem with MergeList
    /var/lib/dpkg/status`, try running these commands, which will remove the offending
    file and replace it with a new, empty one:



    $ sudo rm /var/lib/dpkg/status

    $ sudo touch /var/lib/dpkg/status


    The installation process can often take a while because the files must be downloaded
    and installed. Some installations will also add shortcuts to your desktop, or
    the program groups on your Start menu.


    You can search for software to install by using the command `apt-get search` followed
    by a search string such as `abiword`. This then displays a list of matching packages
    that you could install.


    # See Also


    See [Recipe 3.18](Recipe 3.18) for removing programs that you no longer need so
    that you can free up space.'
