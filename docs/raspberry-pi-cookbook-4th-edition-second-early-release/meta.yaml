- md: '## 3.5 Copying a File or Folder


    ### Problem


    You need to copy a file or directory.


    ### Solution


    Use the `cp` command to copy files and directories.


    ### Discussion


    The `cp` (copy) command is used to make a duplicate of a file or directory. The
    basic syntax is `cp source destination`.


    For example, to create a copy of a file named `myfile.txt` in the current directory,
    you would use:


    ```

    $ echo "hello" > myfile.txt

    $ ls

    myfile.txt

    $ cp myfile.txt myfile2.txt

    $ ls

    myfile.txt    myfile2.txt

    ```


    Although in this example both file paths are local to the current working directory,
    the file paths can be to anywhere in the filesystem where you have write access.
    The following example copies the original file to an area `/tmp`, which is a location
    for temporary files (do not put anything important in that folder):


    ```

    $ cp myfile.txt /tmp

    ```


    Note that in this case, the name to be given to the new file is not specified,
    just the directory where it is to go. This will create a copy of *myfile.txt*
    in `/tmp` with the same name of *myfile.txt*.


    Sometimes, rather than copying just one file, you might want to copy an entire
    directory full of files and possibly other directories. To copy a directory and
    all its contents, you need to use the `-r` option (for recursive):


    ```

    $ cp -r mydirectory mydirectory2

    ```


    Whenever you are copying files or folders, the result of the command will tell
    you if you do not have permission. If that’s the case, you will need to either
    change the permissions of the folder into which you are copying (Recipe 3.14)
    or copy the files with superuser privileges (Recipe 3.12).


    ### See Also


    See also Recipe 3.6.


    For a useful description of the many optional parameters to the `cp` command,
    see https://www.computerhope.com/unix/ucp.htm.


    ## 3.6 Renaming a File or Folder


    ### Problem


    You need to rename a file by using a Terminal session.


    ### Solution


    Use the `mv` command to rename files and directories.


    ### Discussion


    The `mv` (move) command is used in a similar way to the `cp` command, except that
    the file or folder being moved is simply renamed rather than a duplicate being
    made.


    For example, to rename a file from `my_file.txt` to `my_file.rtf`, you use the
    following command:


    ```

    $ mv my_file.txt my_file.rtf

    ```


    Changing a directory name is just as straightforward, and you don’t need the recursive
    `-r` option you used when copying, because changing a directory’s name implicitly
    means that everything within it is contained in a renamed directory.


    ### See Also


    See also [Recipe 3.5](Recipe 3.5).


    ## 3.7 Editing a File


    ### Problem


    You want to run an editor from the command line to change a configuration file.


    ### Solution


    Use the nano editor included with most Raspberry Pi distributions.


    ### Discussion


    To use nano, simply type the command `nano` followed by the file name or path
    to the file that you want to edit. If the file does not exist, it will be created
    when you save it. However, this will happen only if you have write permissions
    in the directory to which you are trying to write the file.


    From your home directory, type the command `nano my_file.txt` to edit or create
    the file *my_file.txt*. Figure 3-9 shows nano in action.


    ![](img/54ed1f8e884bc184601bf6f652461a95_109_0.png)


    You cannot use the mouse to position the cursor; you must use the arrow keys instead.


    The area at the bottom of the screen lists a number of commands that you can access
    by holding down the Ctrl key and pressing the letter indicated. Most of these
    are not that useful. The ones that you are most likely to use are as follows:


    **Ctrl-X**


    Exit. You will be prompted to save the file before nano exits.


    **Ctrl-V**


    Next page. Think of it as an arrow pointing downward. This allows you to move
    through a large file one screen at a time.


    **Ctrl-Y**


    Previous page.


    **Ctrl-W**


    Where is. This allows you to search for a piece of text.


    **Ctrl-O**


    Output. This will write the file without exiting the editor.


    There are also some fairly crude copy-and-paste options there, but in practice,
    it’s easier to use the normal clipboard from the menu that you access with a right-click,
    as demonstrated in [Figure 3-10](#).


    ![](img/54ed1f8e884bc184601bf6f652461a95_111_0.png)


    Figure 3-10. Using the clipboard in nano


    Using this clipboard also allows you to copy and paste text between other windows,
    such as your browser.


    When you’re ready to save your changes to the file and exit nano, use the command
    Ctrl-X. Type Y to confirm that you want to save the file. nano then displays the
    filename as the default name to save the file under; press Enter to save and exit.


    If you want to abandon the changes you have made, enter N in place of Y.


    ### See Also


    Editors are very much a matter of personal taste. Many other editors that are
    available for Linux will work just fine on Raspberry Pi. The *vim* (vi improved)
    editor has many fans in the Linux world. This is also included in the popular
    Raspberry Pi distributions. It is not, however, an easy editor for the beginner.
    You can run it in the same way as nano, but you use the command `vi` instead of
    `nano`. You can find details on using vim at [https://oreil.ly/y0fym](https://oreil.ly/y0fym).


    ## 3.8 Viewing the Contents of a File


    ### Problem


    You want to view the contents of a small file without editing it.


    ### Solution


    Use the `cat` command or the `more` command to view the file.


    For example:


    ```

    $ more myfile.txt

    This file contains

    some text

    ```


    ### Discussion


    The `cat` command displays the whole contents of the file, even if the contents
    are longer than will fit on the screen.


    The `more` command displays only one screen of text at a time. Press the space
    bar to display the next screen.


    ### See Also


    You can also use `cat` to concatenate (join together) a number of files ([Recipe
    3.32](Recipe 3.32)).


    Another popular command related to `more` is `less`. `less` is like `more` except
    that it allows you to move backward in the file as well as forward.


    ## 3.9 Creating a File Without Using an Editor


    ### Problem


    You want to create a one-line file without having to use an editor.


    ### Solution


    Use the `>` and `echo` commands to redirect what you type on the command line
    to a file.


    For example:


    ```

    $ echo "file contents here" > test.txt

    $ more test.txt

    file contents here

    ```


    > **WARNING**


    The `>` command overwrites any existing file, so use it with caution.


    ### Discussion


    This can be useful for quickly creating a file.


    ### See Also


    To use the `more` command to view files without using an editor, see [Recipe 3.8](Recipe
    3.8).


    To use `>` to capture other kinds of system output, see [Recipe 3.31](Recipe 3.31).


    ## 3.10 Creating a Directory


    ### Problem


    You want to create a new directory by using the Terminal.


    ### Solution


    The `mkdir` command creates a new directory.


    ### Discussion


    To create a directory, use the `mkdir` command. Try out the following example
    (note that only the commands are shown, not the responses):


    ```

    $ cd ~

    $ mkdir my_directory

    $ cd my_directory

    $ ls

    ```


    You need to have write permissions in the directory within which you are trying
    to create the new directory.


    ### See Also


    For general information on using the Terminal to navigate the filesystem, see
    [Recipe 3.4](Recipe 3.4).


    ## 3.11 Deleting a File or Directory


    ### Problem


    You want to delete a file or directory using the Terminal.


    ### Solution


    The `rm` (remove) command will delete a file or directory and its contents. You
    should use this with extreme caution.


    ### Discussion


    Deleting a single file is simple and safe. The following example will delete the
    file `my_file.txt` from the home directory; you can use the `ls` command to make
    sure it’s gone:


    ```

    $ cd ~

    $ rm my_file.txt

    $ ls

    ```


    You need to have write permissions in the directory within which you are trying
    to carry out the deletion.


    You can also use the `*` wildcard when deleting files. This example deletes all
    the files that begin with `my_file.` in the current directory:


    ```

    $ rm my_file.*

    ```


    You could also delete all the files in the directory by typing:


    ```

    $ rm *

    ```


    If you want to recursively delete a directory (that is, not just the directory
    itself, but all the files and directories that it contains), you can use the `-r`
    option:


    ```

    $ rm -r mydir

    ```


    > **WARNING**


    When deleting files from a Terminal window, remember that you do not have the
    safety net of a recycle bin from which deleted files can be retrieved. Also, generally
    speaking, you won’t be given the option to confirm; the files will just immediately
    be deleted. This can be totally devastating if you combine it with the `sudo`
    command ([Recipe 3.12](Recipe 3.12)).'
  mdcn: '## 3.5 复制文件或文件夹


    ### 问题


    你需要复制一个文件或目录。


    ### 解决方案


    使用 `cp` 命令来复制文件和目录。


    ### 讨论


    `cp`（复制）命令用于创建文件或目录的副本。其基本语法是 `cp 源 目标`。


    例如，要在当前目录中创建名为 `myfile.txt` 的文件的副本，你可以使用：


    ```

    $ echo "hello" > myfile.txt

    $ ls

    myfile.txt

    $ cp myfile.txt myfile2.txt

    $ ls

    myfile.txt    myfile2.txt

    ```


    虽然在此示例中两个文件路径都位于当前工作目录内，但文件路径可以指向文件系统中任何你有写入权限的位置。以下示例将原始文件复制到 `/tmp` 目录，这是一个用于存放临时文件的位置（不要在该文件夹中存放任何重要文件）：


    ```

    $ cp myfile.txt /tmp

    ```


    请注意，在这种情况下，没有指定新文件的名称，只指定了它要存放的目录。这将在 `/tmp` 中创建一个名为 *myfile.txt* 的副本，与原始文件同名。


    有时，你可能不想只复制一个文件，而是想复制一个包含许多文件甚至其他子目录的整个目录。要复制一个目录及其所有内容，你需要使用 `-r` 选项（表示递归）：


    ```

    $ cp -r mydirectory mydirectory2

    ```


    无论何时复制文件或文件夹，命令的结果都会告诉你是否没有权限。如果是这种情况，你需要更改目标文件夹的权限（参见配方 3.14），或者使用超级用户权限复制文件（参见配方
    3.12）。


    ### 另请参阅


    另请参阅配方 3.6。


    有关 `cp` 命令众多可选参数的有用描述，请参阅 https://www.computerhope.com/unix/ucp.htm。


    ## 3.6 重命名文件或文件夹


    ### 问题


    你需要通过终端会话重命名一个文件。


    ### 解决方案


    使用 `mv` 命令来重命名文件和目录。


    ### 讨论


    `mv`（移动）命令的使用方式与 `cp` 命令类似，不同之处在于被移动的文件或文件夹只是被重命名，而不是创建副本。


    例如，要将文件从 `my_file.txt` 重命名为 `my_file.rtf`，你可以使用以下命令：


    ```

    $ mv my_file.txt my_file.rtf

    ```


    重命名目录同样简单直接，而且你不需要像复制时那样使用递归 `-r` 选项，因为重命名目录隐含地意味着其中的所有内容都包含在重命名后的目录中。


    ### 另请参阅


    另请参阅 [配方 3.5](Recipe 3.5)。


    ## 3.7 编辑文件


    ### 问题


    你想从命令行运行编辑器来更改配置文件。


    ### 解决方案


    使用大多数树莓派发行版中包含的 nano 编辑器。


    ### 讨论


    要使用 nano，只需输入命令 `nano`，后跟你要编辑的文件名或文件路径。如果文件不存在，它将在你保存时创建。但是，这仅在你对要写入文件的目录具有写入权限时才会发生。


    从你的主目录，输入命令 `nano my_file.txt` 来编辑或创建文件 *my_file.txt*。图 3-9 展示了 nano 的实际操作。


    ![](img/54ed1f8e884bc184601bf6f652461a95_109_0.png)


    你不能使用鼠标来定位光标；你必须使用方向键。


    屏幕底部的区域列出了许多命令，你可以通过按住 Ctrl 键并按下指示的字母来访问。其中大多数并不常用。你最可能使用的命令如下：


    **Ctrl-X**


    退出。在 nano 退出之前，会提示你保存文件。


    **Ctrl-V**


    下一页。可以将其视为一个向下的箭头。这允许你一次移动一屏来浏览大文件。


    **Ctrl-Y**


    上一页。


    **Ctrl-W**


    查找。这允许你搜索一段文本。


    **Ctrl-O**


    输出。这将写入文件而不退出编辑器。


    还有一些相当粗糙的复制粘贴选项，但在实践中，使用右键单击菜单中的常规剪贴板更容易，如 [图 3-10](#) 所示。


    ![](img/54ed1f8e884bc184601bf6f652461a95_111_0.png)


    图 3-10. 在 nano 中使用剪贴板


    使用此剪贴板还允许你在其他窗口（例如你的浏览器）之间复制和粘贴文本。


    当你准备好将更改保存到文件并退出 nano 时，请使用命令 Ctrl-X。输入 Y 确认你要保存文件。然后 nano 会显示文件名作为保存文件的默认名称；按
    Enter 保存并退出。


    如果你想放弃所做的更改，请输入 N 代替 Y。


    ### 另请参阅


    编辑器在很大程度上是个人品味问题。许多其他可用于 Linux 的编辑器在树莓派上也能正常工作。*vim*（vi 改进版）编辑器在 Linux 世界拥有众多粉丝。它也包含在流行的树莓派发行版中。然而，对于初学者来说，它不是一个容易上手的编辑器。你可以像运行
    nano 一样运行它，但使用命令 `vi` 代替 `nano`。你可以在 [https://oreil.ly/y0fym](https://oreil.ly/y0fym)
    找到有关使用 vim 的详细信息。


    ## 3.8 查看文件内容


    ### 问题


    你想查看一个小文件的内容而不进行编辑。


    ### 解决方案


    使用 `cat` 命令或 `more` 命令来查看文件。


    例如：


    ```

    $ more myfile.txt

    This file contains

    some text

    ```


    ### 讨论


    `cat` 命令显示文件的全部内容，即使内容长到无法在屏幕上完全显示。


    `more` 命令一次只显示一屏文本。按空格键显示下一屏。


    ### 另请参阅


    你也可以使用 `cat` 来连接（合并）多个文件（[配方 3.32](Recipe 3.32)）。


    另一个与 `more` 相关的流行命令是 `less`。`less` 类似于 `more`，但它允许你在文件中向前和向后移动。


    ## 3.9 不使用编辑器创建文件


    ### 问题


    你想创建一个单行文件而不必使用编辑器。


    ### 解决方案


    使用 `>` 和 `echo` 命令将你在命令行上输入的内容重定向到文件。


    例如：


    ```

    $ echo "file contents here" > test.txt

    $ more test.txt

    file contents here

    ```


    > **警告**


    `>` 命令会覆盖任何现有文件，因此请谨慎使用。


    ### 讨论


    这对于快速创建文件很有用。


    ### 另请参阅


    要使用 `more` 命令在不使用编辑器的情况下查看文件，请参阅 [配方 3.8](Recipe 3.8)。


    要使用 `>` 捕获其他类型的系统输出，请参阅 [配方 3.31](Recipe 3.31)。


    ## 3.10 创建目录


    ### 问题


    你想使用终端创建一个新目录。


    ### 解决方案


    `mkdir` 命令创建一个新目录。


    ### 讨论


    要创建一个目录，请使用 `mkdir` 命令。尝试以下示例（注意只显示了命令，没有显示响应）：


    ```

    $ cd ~

    $ mkdir my_directory

    $ cd my_directory

    $ ls

    ```


    你需要在尝试创建新目录的目录中具有写入权限。


    ### 另请参阅


    有关使用终端浏览文件系统的一般信息，请参阅 [配方 3.4](Recipe 3.4)。


    ## 3.11 删除文件或目录


    ### 问题


    你想使用终端删除一个文件或目录。


    ### 解决方案


    `rm`（删除）命令将删除一个文件或目录及其内容。你应该极其谨慎地使用它。


    ### 讨论


    删除单个文件既简单又安全。以下示例将从主目录中删除文件 `my_file.txt`；你可以使用 `ls` 命令确保它已消失：


    ```

    $ cd ~

    $ rm my_file.txt

    $ ls

    ```


    你需要在尝试执行删除操作的目录中具有写入权限。


    你也可以在删除文件时使用 `*` 通配符。此示例删除当前目录中所有以 `my_file.` 开头的文件：


    ```

    $ rm my_file.*

    ```


    你也可以通过输入以下命令删除目录中的所有文件：


    ```

    $ rm *

    ```


    如果你想递归删除一个目录（即，不仅是目录本身，还包括它包含的所有文件和目录），你可以使用 `-r` 选项：


    ```

    $ rm -r mydir

    ```


    > **警告**


    从终端窗口删除文件时，请记住你没有回收站的安全网来恢复已删除的文件。此外，一般来说，你不会得到确认选项；文件会立即被删除。如果你结合使用 `sudo` 命令（[配方
    3.12](Recipe 3.12)），这可能是完全灾难性的。'
