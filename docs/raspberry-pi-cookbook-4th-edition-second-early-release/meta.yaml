    ## 4.0 简介


    本章包含许多关于在树莓派上使用现成软件的配方。


    本章中的一些配方涉及将树莓派转换为一次性使用的设备，而其他配方则使用树莓派上的特定软件。


    ## 4.1 制作媒体中心


    ### 问题


    你想将你的树莓派转换为一个超级媒体中心。


    ### 解决方案


    要将你的树莓派用作媒体中心，你应该选择性能更优的树莓派4 B，因为视频播放非常消耗处理器资源。


    你可以在使用[树莓派磁盘映像工具](https://www.raspberrypi.com/software/)将镜像写入microSD卡的同时，将你的树莓派设置为媒体中心。不要选择Raspberry
    Pi OS作为要安装的发行版，而是从操作系统按钮的媒体播放器操作系统部分选择LibreELEC（图4-1）。


    ![](img/54ed1f8e884bc184601bf6f652461a95_160_0.png)


    LibreELEC是一个优化你的树莓派作为媒体中心的发行版。它包括Kodi媒体中心软件，该软件基于XBMC开源项目，该项目最初是为了将Xbox游戏机转换为媒体中心而开发的。此后，该代码已被移植到许多平台，包括树莓派（图4-2）。


    ![](img/54ed1f8e884bc184601bf6f652461a95_161_0.png)


    图4-2. 树莓派作为媒体中心


    树莓派完全能够播放全高清视频以及流媒体音乐、MP3文件和网络电台。


    ### 讨论


    Kodi是一款功能强大的软件，具有许多功能。也许检查其是否工作的最简单方法是将一些音乐和/或视频文件放入USB闪存驱动器或外部USB硬盘，并将其连接到树莓派。你应该能够从Kodi播放它们。


    由于树莓派可能放在你的电视附近，你可能会发现你的电视有一个USB端口，可以提供足够的电流来运行树莓派。如果是这种情况，你将不需要单独的电源。


    无线键盘和鼠标是个好主意，因为如果你成对购买它们，它们将使用单个USB端口的接收器，这避免了电线到处拖拽的需要。你也可以购买带有内置触摸板的迷你键盘，这在这种情况下很有用。


    有线网络连接通常比WiFi连接性能更高、更好，但将树莓派放在以太网插座附近并不总是方便。如果是这种情况，你可以设置XBMC使用WiFi。设置Kodi非常直观，你可以在http://kodi.wiki找到使用该软件的完整说明。


    ### 另请参阅


    你可以为树莓派添加[红外（IR）遥控器](infrared (IR) remote)来控制Kodi。


    ## 4.2 安装推荐软件


    ### 问题


    你想在你的树莓派上安装一些常用软件。


    ### 解决方案


    使用推荐软件工具（[图4-3](Figure 4-3)），你可以在树莓派菜单的首选项部分找到它。


    ![](img/54ed1f8e884bc184601bf6f652461a95_163_0.png)


    图4-3. 推荐软件工具


    此工具包含许多过去预装在Raspberry Pi OS上的软件。因此，它包含了许多最常见和最有用的树莓派软件。使用它浏览到你想要安装的软件，选择你想要安装的程序的复选框，然后单击安装。


    然后软件将被下载并安装。当安装程序完成后，新软件将出现在你的树莓派菜单上。


    ### 讨论


    如果你在推荐软件工具上找不到你想要的软件，那么你可以扩大范围，使用类似的添加/删除软件工具，该工具也在树莓派菜单的首选项部分（图4-4）。


    ![](img/54ed1f8e884bc184601bf6f652461a95_164_0.png)


    此工具包含数千个可供你安装的软件包和程序，有时在搜索区域输入内容比尝试浏览所有软件包更容易。


    ### 另请参阅


    要使用apt-get命令行工具安装软件，请参阅[配方3.17](Recipe 3.17)。


    ## 4.3 使用办公软件


    ### 问题


    你需要在树莓派上打开文字处理、演示文稿和电子表格文档。


    ### 解决方案


    使用推荐软件工具（配方4.2）安装LibreOffice。


    ### 讨论


    LibreOffice程序套件（图4-5）是Microsoft Office的良好（且免费的）替代品。事实上，LibreOffice Writer可以打开和保存Microsoft
    Word文档，电子表格和演示文稿程序与其Microsoft对应程序相当兼容。


    ![](img/54ed1f8e884bc184601bf6f652461a95_165_0.png)


    树莓派4或400运行办公应用程序比旧款树莓派好得多。


    如今，将文档保存在云端并在浏览器中编辑通常更方便。这些服务最常见的例子是Microsoft365和Google文档。两者都需要你注册一个账户，但Chromium浏览器完全能够使用这些服务（图4-6）。


    ![](img/54ed1f8e884bc184601bf6f652461a95_166_0.png)


    图4-6. 在Chromium浏览器中使用Google文档电子表格。


    ### 另请参阅


    访问[https://www.libreoffice.org](https://www.libreoffice.org)获取有关LibreOffice软件套件的更多信息。


    如果你只想编辑一个未格式化的文本文件，你可以使用nano编辑器（[配方3.7](Recipe 3.7)）或VisualStudio Code（[配方4.11](Recipe
    4.11)）。


    ## 4.4 制作网络摄像头服务器


    ### 问题


    你想将树莓派设置为网络摄像头服务器。


    ### 解决方案


    你可以使用USB网络摄像头或树莓派摄像头模块作为摄像头，你可以通过网络上的其他地方使用浏览器访问它。


    下载一个名为*motion*的软件包。这将允许你设置一个连接了USB网络摄像头的树莓派，这样你就可以连接到一个网页并查看网络摄像头。


    要安装软件，请在终端窗口中输入以下命令：


    ```

    $ sudo apt-get update

    $ sudo apt-get install motion

    ```


    你需要进行一些配置更改。首先，使用以下命令编辑文件`/etc/motion/motion.conf`：


    ```

    $ sudo nano /etc/motion/motion.conf

    ```


    这是一个相当大的配置文件。在文件顶部附近，你会找到这一行：


    ```

    daemon off

    ```


    按如下方式更改该行：


    ```

    daemon on

    ```


    另一个更改在文件更下方。你需要更改这一行：


    ```

    webcam_localhost = on

    ```


    使其读取如下：'
