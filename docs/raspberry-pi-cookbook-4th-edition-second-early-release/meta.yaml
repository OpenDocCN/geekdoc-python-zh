  md: '# Chapter 2. Networking


    > **A NOTE FOR EARLY RELEASE READERS**


    With Early Release ebooks, you get books in their earliest form—the author’s raw
    and unedited content as they write—so you can take advantage of these technologies
    long before the official release of these titles.


    This will be the 2nd chapter of the final book. Please note that the GitHub repo
    will be made active later on.


    If you have comments about how we might improve the content and/or examples in
    this book, or if you notice missing material within this chapter, please reach
    out to the author at simonmonkauthor@gmail.com.


    # 2.0 Introduction


    The Raspberry Pi is designed to be connected to the internet. Its ability to communicate
    on the internet is one of its key features and opens up all sorts of possible
    uses, including home automation, web serving, network monitoring, and so on.


    The connection can be wired through an Ethernet cable (at least in the case of
    most models), and newer models have built-in WiFi.


    Having a connected Raspberry Pi also means that you can connect to it remotely
    from another computer. This is very useful for situations in which the Raspberry
    Pi itself is used as a *headless* server and does not have a keyboard, mouse,
    and monitor attached to it.


    This chapter gives you recipes for connecting your Raspberry Pi to the internet
    and controlling it remotely over a network.


    # 2.1 Connecting to a Wired Network'
  merge: -1
  pgno: 54
- img_proc: true
  md: '# Problem


    You want to connect your Raspberry Pi to the internet using a wired network connection.


    # Solution


    First, if you have a model A or A+ version of a Raspberry Pi (1, 2, or 3), or
    a Pi Zero, there is no RJ45 connector for Ethernet. In this case, your best option
    for internet access is to use a wireless USB adapter (see Recipe 2.5).

    If you have a model B or B+ Raspberry Pi (1, 2, 3, 4 or 400) then you are in luck;
    just plug an Ethernet patch cable into its RJ45 socket and then connect the other
    end to a spare socket on the back of your home router (Figure 2-1).


    ![](img/54ed1f8e884bc184601bf6f652461a95_55_0.png)


    The network LEDs on your Raspberry Pi should immediately begin to flicker as the
    Raspberry Pi connects to your network.'
  merge: -1
  pgno: 55
- img_proc: true
  md: '# Discussion


    Raspberry Pi OS is preconfigured to connect to any network using Dynamic Host
    Configuration Protocol (DHCP). It will automatically be assigned an IP address
    as long as DHCP is enabled on your network.


    If the LEDs blink but you cannot connect to the internet on your Raspberry Pi
    using a browser, check that DHCP is enabled on your network management console.
    Look for an option like that shown in Figure 2-2.


    ![](img/54ed1f8e884bc184601bf6f652461a95_56_0.png)


    # See Also


    To connect to a wireless network, see Recipe 2.5.


