- img_proc: true
  md: '![](img/54ed1f8e884bc184601bf6f652461a95_14_0.png)


    Figure 1-6. A Raspberry Pi 2 in a PiBow Coupé


    The case you buy is very much a matter of personal taste. However, here are some
    of the things that you need to consider:


    +   - Do you need to have access to the GPIO connector? This is important if you
    plan to attach external electronics to your Raspberry Pi.

    - Is the case well ventilated? This is important if you plan to overclock your
    Raspberry Pi (Recipe 1.12) or run it hard playing videos or games, because these
    will all generate more heat.

    - Finally, make sure you get one that fits your model of Raspberry Pi.


    If you have access to a 3D printer, you can also print your own case. Search for
    Raspberry Pi on [Thingiverse](https://www.thingiverse.com/) or [MyMiniFactory](https://www.myminifactory.com/),
