    \ and warnings, but these are normal. At the end of the installation, the installer\
    \ script will ask:\n\n```\nIn order to run properly, rpitx need to modify /boot/config.txt.\n\
    Are you\n    sure (y/n)\n```\n\nPress Y, and the script will then confirm the\
    \ changes it has made with the following message:\n\n```\nSet GPU to 250Mhz in\
