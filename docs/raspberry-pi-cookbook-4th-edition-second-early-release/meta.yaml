    # 1.13 Changing Your Password


    # Problem


    By default, the password for a Raspberry Pi will be *raspberry*. You want to change
    this.


    # Solution


    After you install Raspberry Pi OS onto your SD card, you are prompted to change
    your password, but you can skip this step. You can change the password any time
    using the Raspberry Pi Configuration utility. To open this, go to the Raspberry
    Pi menu, select Preferences, and then click Raspberry Pi Configuration. Click
    the System tab. There, you will find the Change Password option (Figure 1-20).'
  - '[PAGE 41]


    ![](img/54ed1f8e884bc184601bf6f652461a95_41_0.png)


    Figure 1-20. Changing your password with the Raspberry Pi Configuration tool


    Changing your password is one setting for which you do not need to restart your
    Raspberry Pi for the change to take effect.


    # Discussion


    You can also change the password from a Terminal session simply by using the `passwd`
    command, as follows:


    ```

    $ passwd

    Changing password for pi.

    (current) UNIX password:

    Enter new UNIX password:

    Retype new UNIX password:

    passwd: password updated successfully

    ```'
  - '[PAGE 42]


    # See Also


    You can also change your password using the `raspi-config` tool (see [http://elinux.org/RPi_raspi-config](http://elinux.org/RPi_raspi-config)).


    # 1.14 Shutting Down Your Raspberry Pi


    # Problem


    You want to shut down your Raspberry Pi.


    # Solution


    In the upper lefthand corner of the desktop, click the Raspberry menu. A dialog
    box opens, offering three shutdown options (Figure 1-21).


    +   **Shutdown**

    Shuts down the Raspberry Pi. You will need to unplug the power and then plug it
    back in to get the Raspberry Pi to boot up again.


    **Reboot**

    Reboots the Raspberry Pi.


    **Logout**

    Logs you out and displays a prompt to enter your login credentials so that you
    can log back in.'
  - '[PAGE 43]


    ![](img/54ed1f8e884bc184601bf6f652461a95_43_0.png)


    You can also reboot using the Terminal by issuing the following command:


    ```


    $ sudo reboot

    ```


    You might need to do this after installing some software. When you do reboot,
    you’ll see the message shown in Figure 1-22, which illustrates the multiuser nature
    of Linux and warns all users connected to the Pi.


    ![](img/54ed1f8e884bc184601bf6f652461a95_43_1.png)'
  - '[PAGE 44]


    # Discussion


    It is better to shut down your Raspberry Pi as described than to simply pull out
    the power plug because your Raspberry Pi might be in the middle of writing to
    the microSD card as you power it down. This could lead to file corruption.


    Shutting down a Raspberry Pi does not actually turn off the power. It goes into
    a low-power mode—and it is a pretty low-power device anyway (but the Raspberry
    Pi hardware has no control over its power supply).


    When a Raspberry Pi 4 (with its built-in keyboard) has been shut down, you can
    turn it on by pressing the F10 key which also has an on/off icon on the key.


    # See Also


    You can buy a module that will turn off the power when the Raspberry Pi shuts
    down at [https://oreil.ly/Jsx_U](https://oreil.ly/Jsx_U).


    For information on adding a Start button to your Raspberry Pi, see [Link to Come].


    # 1.15 Installing the Raspberry Pi Camera Module


    # Problem


    You want to use the Raspberry Pi Camera Module.


    # Solution


    The Raspberry Pi Camera Module (Figure 1-23) is attached to a Raspberry Pi by
    a ribbon cable.'
  - '[PAGE 45]


    ![](img/54ed1f8e884bc184601bf6f652461a95_45_0.png)


    Figure 1-23. The Raspberry Pi Camera Module


    There are actually two basic versions of the Pi Camera: the original version 1
    (as shown in Figure 1-23) and the newer higher-resolution version 2. The ribbon
    cable attaches to a special connector between the audio and HDMI sockets on a
    Raspberry Pi 2, 3, or 4. To fit the cable onto your Pi, gently pull up the levers
    on either side of the connector so that they unlock, and then press the cable
    into the slot with the shiny metal connector pads of the cable facing away from
    the Ethernet socket. Press the two levers of the connector back down to lock the
    cable in place (Figure 1-24).'
  - '[PAGE 46]


    ![](img/54ed1f8e884bc184601bf6f652461a95_46_0.png)


    Figure 1-24. Attaching a Raspberry Pi Camera Module to a Raspberry Pi 4 model
    B


    > ### WARNING

    The Camera Module packaging states that it is sensitive to static. Before handling
    it, ground yourself by touching something grounded, like the metal case of a PC.


    Note that the Raspberry Pi Zero requires a special cable or adapter because its
    Camera connector is smaller than that of a full-sized Raspberry Pi (see [Link
    to Come]).

    The Camera Module requires some software configuration. The easiest way to configure
    it is to use the Raspberry Pi Configuration tool. To open this, go to the Raspberry
    Pi main menu, select Preferences, and then click Raspberry Pi Configuration. Click
    the Interfaces tab, and then set the Camera option to Enabled (Figure 1-25).'
  - '[PAGE 47]


    ![](img/54ed1f8e884bc184601bf6f652461a95_47_0.png)


    Figure 1-25. Enabling the camera using the Raspberry Pi Configuration tool


    If you are using your Raspberry Pi remotely using SSH (see Recipe 2.7), you can
    still enable the camera by using `raspi-config`. To run `raspi-config`, enter
    the following command into a Terminal session:


    ```

    $ sudo raspi-config

    ```


    Select Interfacing Options, and you will see the Camera option (Figure 1-26).'
- md: "## 1.16 Using Bluetooth\n\n### Problem\n\nYou want to use Bluetooth with your\
    \ Raspberry Pi.\n\n### Solution\n\nIf you have a Raspberry Pi 3 or 4 or 400, the\
    \ good news is that along with WiFi, you also get Bluetooth hardware. If you have\
    \ an older Raspberry Pi, you can attach a USB Bluetooth adapter to it. However,\
    \ in both cases, the software that you need for Bluetooth is now included in Raspberry\
    \ Pi OS. If you have an older Raspberry Pi, be aware that not all Bluetooth adapters\
    \ are compatible with the Raspberry Pi. Most are, but to be sure, buy one that\
    \ is advertised as working with the Raspberry Pi. Figure 1-27 shows a Raspberry\
    \ Pi 2 equipped with both a USB Bluetooth adapter (nearest to the camera) and\
    \ a USB WiFi adapter.\n\n![](img/54ed1f8e884bc184601bf6f652461a95_50_0.png)\n\n\
    Figure 1-27. Raspberry Pi 2 with USB Bluetooth and WiFi adapters\n\nBluetooth\
    \ features are integrated into the Raspberry Pi OS desktop in much the same way\
    \ as on a Mac. In the upper-right corner of the screen, you will see the Bluetooth\
    \ icon (circled in Figure 1-28). Click this to open a menu of Bluetooth options.\n\
    \n![](img/54ed1f8e884bc184601bf6f652461a95_51_0.png)\n\nIf you want to connect\
    \ a Bluetooth peripheral such as a keyboard, click Add Device. The Add New Device\
    \ dialog box opens, showing a list of available devices with which you can connect,\
    \ or “pair” (Figure 1-29).\n\n![](img/54ed1f8e884bc184601bf6f652461a95_52_0.png)\n\
    \nFigure 1-29. Pairing a Bluetooth device\n\nYou can then select the device that\
    \ you want to pair with and then follow the instructions that appear on your Raspberry\
    \ Pi and the device you are pairing with.\n\n### Discussion\n\nYou can pair phones,\
    \ Bluetooth speakers, keyboards, and mice to your Raspberry Pi. I find that connecting\
    \ a new Bluetooth device doesn’t always work the first time. So if you initially\
    \ have a problem pairing with a device, try a few more times before you give up.\n\
    \nMost of the time, using the desktop interface to add Bluetooth devices to your\
    \ Raspberry Pi system is convenient; however, you can also pair Bluetooth devices\
    \ using the command-line interface.\n\nTo run Bluetooth commands from the command\
    \ line, use the `bluetoothctl` command:\n\n```\n$ bluetoothctl\n[NEW] Controller\
    \ B8:27:EB:50:37:8E raspberrypi [default]\n[NEW] Device 51:6D:A4:B8:D1:AA 51-6D-A4-B8-D1-AA\n\
    [NEW] Device E8:06:88:58:B2:B5 si's keyboard #1\n[bluetooth]#\n```\n\nThis scans\
    \ for Bluetooth devices and also provides a `pair` command that will allow you\
    \ to pair with the device using its ID—for example:\n\n```\n[bluetooth]# pair\
    \ E8:06:88:58:B2:B5\n```\n\n### See Also\n\nFor a list of Bluetooth adapters that\
    \ are compatible with the Raspberry Pi, see [https://oreil.ly/pULy3](https://oreil.ly/pULy3).\n\
    \nThe *bluedot* software for Android phones allows you to control hardware attached\
    \ to your Raspberry Pi using Bluetooth and your mobile phone. You will find an\
    \ example of this in [Link to Come].\n\nIf you pair your Raspberry Pi with a Bluetooth\
    \ speaker, you also need to set the speaker to be the output for sound ([Link\
    \ to Come]).\n\n## Chapter 2. Networking\n\n> **A NOTE FOR EARLY RELEASE READERS**\n\
    \nWith Early Release ebooks, you get books in their earliest form—the author’s\
    \ raw and unedited content as they write—so you can take advantage of these technologies\
    \ long before the official release of these titles.\n\nThis will be the 2nd chapter\
    \ of the final book. Please note that the GitHub repo will be made active later\
    \ on.\n\nIf you have comments about how we might improve the content and/or examples\
    \ in this book, or if you notice missing material within this chapter, please\
    \ reach out to the author at simonmonkauthor@gmail.com.\n\n## 2.0 Introduction\n\
    \nThe Raspberry Pi is designed to be connected to the internet. Its ability to\
    \ communicate on the internet is one of its key features and opens up all sorts\
    \ of possible uses, including home automation, web serving, network monitoring,\
    \ and so on.\n\nThe connection can be wired through an Ethernet cable (at least\
    \ in the case of most models), and newer models have built-in WiFi.\n\nHaving\
    \ a connected Raspberry Pi also means that you can connect to it remotely from\
    \ another computer. This is very useful for situations in which the Raspberry\
    \ Pi itself is used as a *headless* server and does not have a keyboard, mouse,\
    \ and monitor attached to it.\n\nThis chapter gives you recipes for connecting\
    \ your Raspberry Pi to the internet and controlling it remotely over a network.\n\
    \n## 2.1 Connecting to a Wired Network\n\n### Problem\n\nYou want to connect your\
    \ Raspberry Pi to the internet using a wired network connection.\n\n### Solution\n\
    \nFirst, if you have a model A or A+ version of a Raspberry Pi (1, 2, or 3), or\
    \ a Pi Zero, there is no RJ45 connector for Ethernet. In this case, your best\
    \ option for internet access is to use a wireless USB adapter (see Recipe 2.5).\n\
    \nIf you have a model B or B+ Raspberry Pi (1, 2, 3, 4 or 400) then you are in\
    \ luck; just plug an Ethernet patch cable into its RJ45 socket and then connect\
    \ the other end to a spare socket on the back of your home router (Figure 2-1).\n\
    \n![](img/54ed1f8e884bc184601bf6f652461a95_55_0.png)\n\nThe network LEDs on your\
    \ Raspberry Pi should immediately begin to flicker as the Raspberry Pi connects\
    \ to your network.\n\n### Discussion\n\nRaspberry Pi OS is preconfigured to connect\
    \ to any network using Dynamic Host Configuration Protocol (DHCP). It will automatically\
    \ be assigned an IP address as long as DHCP is enabled on your network.\n\nIf\
    \ the LEDs blink but you cannot connect to the internet on your Raspberry Pi using\
    \ a browser, check that DHCP is enabled on your network management console. Look\
    \ for an option like that shown in Figure 2-2.\n\n![](img/54ed1f8e884bc184601bf6f652461a95_56_0.png)\n\
    \n### See Also\n\nTo connect to a wireless network, see Recipe 2.5.\n\n## 2.2\
    \ Finding Your IP Address\n\n### Problem\n\nYou want to know the IP address of\
    \ your Raspberry Pi so that you can communicate with it, whether connecting to\
    \ it as a web server, exchanging files, or controlling it remotely with SSH (Recipe\
    \ 2.7) or VNC (Recipe 2.8).\n\n### Solution\n\nAn IPv4 address (as used for local\
    \ addresses) is a four-part number uniquely identifying a computer’s network interface\
    \ within a network. Each part is separated from the next part by a dot.\n\nTo\
    \ find the IP address of your Raspberry Pi, you need to issue this command in\
    \ a Terminal window:\n\n```\n$ hostname -I\n192.168.1.16 fd84:be52:5bf4:ca00:618:fd51:1c\
    \ .....\n```\n\nThe first part of the response is the local IP address of your\
    \ Raspberry Pi on your home network.\n\n### Discussion\n\nA Raspberry Pi can have\
    \ more than one IP address (i.e., one for each network connection). So if you\
    \ have both a wired connection and a wireless connection to your Pi, it would\
    \ have two IP addresses. Normally, however, you would connect it by only one method\
    \ or the other, not both. To see all the network connections, use the `ifconfig`\
    \ command:\n\n```\n$ ifconfig\n\neth0      Link encap:Ethernet  HWaddr b8:27:eb:d5:f4:8f\n\
    \          inet addr:192.168.1.16  Bcast:192.168.255.255  Mask:255.255.0.0\n \
    \         UP BROADCAST RUNNING MULTICAST  MTU:1500  Metric:1\n          RX packets:1114\
    \ errors:0 dropped:1 overruns:0 frame:0\n          TX packets:1173 errors:0 dropped:0\
    \ overruns:0 carrier:0\n          collisions:0 txqueuelen:1000\n          RX bytes:76957\
    \ (75.1 KiB)  TX bytes:479753 (468.5 KiB)\n```"
  mdcn: "## 1.16 使用蓝牙\n\n### 问题\n\n你想在树莓派上使用蓝牙。\n\n### 解决方案\n\n如果你拥有树莓派 3、4 或 400，好消息是，除了\
    \ WiFi，你还可以获得蓝牙硬件。如果你使用的是较旧的树莓派，可以为其连接一个 USB 蓝牙适配器。不过，无论哪种情况，蓝牙所需的软件现在都已包含在树莓派操作系统中。如果你使用的是较旧的树莓派，请注意并非所有蓝牙适配器都与树莓派兼容。大多数是兼容的，但为了确保，最好购买明确标有适用于树莓派的适配器。图\
    \ 1-27 展示了一台同时配备了 USB 蓝牙适配器（靠近摄像头）和 USB WiFi 适配器的树莓派 2。\n\n![](img/54ed1f8e884bc184601bf6f652461a95_50_0.png)\n\
    \n图 1-27. 配备 USB 蓝牙和 WiFi 适配器的树莓派 2\n\n蓝牙功能集成在树莓派操作系统桌面中的方式与 Mac 非常相似。在屏幕的右上角，你会看到蓝牙图标（在图\
    \ 1-28 中圈出）。点击此图标可打开蓝牙选项菜单。\n\n![](img/54ed1f8e884bc184601bf6f652461a95_51_0.png)\n\
    \n如果你想连接蓝牙外设（如键盘），请点击“添加设备”。此时会打开“添加新设备”对话框，显示你可以连接或“配对”的可用设备列表（图 1-29）。\n\n![](img/54ed1f8e884bc184601bf6f652461a95_52_0.png)\n\
    \n图 1-29. 配对蓝牙设备\n\n然后，你可以选择要配对的设备，并按照树莓派和配对设备上显示的说明进行操作。\n\n### 讨论\n\n你可以将手机、蓝牙音箱、键盘和鼠标与树莓派配对。我发现连接新的蓝牙设备并不总是第一次就能成功。因此，如果最初配对设备时遇到问题，请在放弃之前多尝试几次。\n\
    \n大多数情况下，使用桌面界面将蓝牙设备添加到树莓派系统很方便；不过，你也可以使用命令行界面配对蓝牙设备。\n\n要从命令行运行蓝牙命令，请使用 `bluetoothctl`\
    \ 命令：\n\n```\n$ bluetoothctl\n[NEW] Controller B8:27:EB:50:37:8E raspberrypi [default]\n\
    [NEW] Device 51:6D:A4:B8:D1:AA 51-6D-A4-B8-D1-AA\n[NEW] Device E8:06:88:58:B2:B5\
    \ si's keyboard #1\n[bluetooth]#\n```\n\n此命令会扫描蓝牙设备，并提供一个 `pair` 命令，允许你使用设备的 ID\
    \ 进行配对——例如：\n\n```\n[bluetooth]# pair E8:06:88:58:B2:B5\n```\n\n### 另请参阅\n\n有关与树莓派兼容的蓝牙适配器列表，请参阅\
    \ [https://oreil.ly/pULy3](https://oreil.ly/pULy3)。\n\n适用于 Android 手机的 *bluedot*\
    \ 软件允许你使用蓝牙和手机控制连接到树莓派的硬件。你将在 [即将发布的链接] 中找到相关示例。\n\n如果你将树莓派与蓝牙音箱配对，还需要将音箱设置为声音输出设备（[即将发布的链接]）。\n\
    \n## 第 2 章. 网络\n\n> **致早期读者的说明**\n\n通过早期发布电子书，你可以在书籍的最早阶段获取内容——即作者撰写时未经编辑的原始内容——从而在这些书籍正式发布之前很久就能利用这些技术。\n\
    \n这将是最终书籍的第 2 章。请注意，GitHub 仓库稍后将开放。\n\n如果你对如何改进本书内容和/或示例有建议，或者发现本章中有缺失内容，请通过 simonmonkauthor@gmail.com\
    \ 联系作者。\n\n## 2.0 简介\n\n树莓派设计用于连接互联网。其在互联网上通信的能力是其关键特性之一，并开启了各种可能的用途，包括家庭自动化、网络服务、网络监控等。\n\
    \n连接可以通过以太网线进行（至少对于大多数型号而言），较新的型号内置了 WiFi。\n\n拥有联网的树莓派还意味着你可以从另一台计算机远程连接到它。这对于树莓派本身用作*无头*服务器且未连接键盘、鼠标和显示器的情况非常有用。\n\
    \n本章为你提供将树莓派连接到互联网并通过网络远程控制它的方法。\n\n## 2.1 连接到有线网络\n\n### 问题\n\n你想通过有线网络连接将树莓派连接到互联网。\n\
    \n### 解决方案\n\n首先，如果你拥有树莓派（1、2 或 3）的 A 型或 A+ 型，或 Pi Zero，则没有用于以太网的 RJ45 接口。在这种情况下，访问互联网的最佳选择是使用无线\
    \ USB 适配器（参见方法 2.5）。\n\n如果你拥有树莓派（1、2、3、4 或 400）的 B 型或 B+ 型，那么你很幸运；只需将以太网跳线插入其\
    \ RJ45 插座，然后将另一端连接到家庭路由器背面的空闲插座（图 2-1）。\n\n![](img/54ed1f8e884bc184601bf6f652461a95_55_0.png)\n\
    \n树莓派上的网络 LED 应立即开始闪烁，表明树莓派已连接到你的网络。\n\n### 讨论\n\n树莓派操作系统预配置为使用动态主机配置协议（DHCP）连接到任何网络。只要你的网络启用了\
    \ DHCP，它就会自动分配一个 IP 地址。\n\n如果 LED 闪烁，但你无法在树莓派上使用浏览器连接到互联网，请检查你的网络管理控制台是否启用了 DHCP。查找类似图\
    \ 2-2 所示的选项。\n\n![](img/54ed1f8e884bc184601bf6f652461a95_56_0.png)\n\n### 另请参阅\n\
    \n要连接到无线网络，请参阅方法 2.5。\n\n## 2.2 查找你的 IP 地址\n\n### 问题\n\n你想知道树莓派的 IP 地址，以便与之通信，无论是将其作为\
    \ Web 服务器连接、交换文件，还是通过 SSH（方法 2.7）或 VNC（方法 2.8）远程控制它。\n\n### 解决方案\n\nIPv4 地址（用于本地地址）是一个四部分数字，唯一标识网络中计算机的网络接口。每个部分之间用点分隔。\n\
    \n要查找树莓派的 IP 地址，你需要在终端窗口中发出此命令：\n\n```\n$ hostname -I\n192.168.1.16 fd84:be52:5bf4:ca00:618:fd51:1c\
    \ .....\n```\n\n响应的第一部分是树莓派在家庭网络上的本地 IP 地址。\n\n### 讨论\n\n树莓派可以拥有多个 IP 地址（即每个网络连接一个）。因此，如果你同时通过有线和无线连接到你的\
    \ Pi，它将有两个 IP 地址。不过，通常你只会通过其中一种方式连接，而不是同时使用两种。要查看所有网络连接，请使用 `ifconfig` 命令：\n\n\
    ```\n$ ifconfig\n\neth0      Link encap:Ethernet  HWaddr b8:27:eb:d5:f4:8f\n \
    \         inet addr:192.168.1.16  Bcast:192.168.255.255  Mask:255.255.0.0\n  \
    \        UP BROADCAST RUNNING MULTICAST  MTU:1500  Metric:1\n          RX packets:1114\
    \ errors:0 dropped:1 overruns:0 frame:0\n          TX packets:1173 errors:0 dropped:0\
    \ overruns:0 carrier:0\n          collisions:0 txqueuelen:1000\n          RX bytes:76957\
    \ (75.1 KiB)  TX bytes:479753 (468.5 KiB)\n```"
