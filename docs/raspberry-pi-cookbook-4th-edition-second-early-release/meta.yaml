    ## 2.10 使用树莓派作为网络附加存储


    ### 问题


    你希望将树莓派用作网络附加存储（NAS），以便从网络上的计算机访问连接到树莓派的大容量USB驱动器。


    ### 解决方案


    解决此问题的方法是安装和配置Samba。为此，请执行以下命令：


    ```

    $ sudo apt-get update

    $ sudo apt-get install samba

    $ sudo apt-get install samba-common-bin

    ```


    接下来，将USB硬盘连接到树莓派。它将自动挂载到你的`/media/pi`文件夹中。要检查它是否在那里，请运行此命令：


    ```

    $ cd /media/pi

    $ ls

    ```


    驱动器应以其格式化时赋予的名称列出。每当树莓派重启时，它都会自动挂载自身。


    接下来，你需要配置Samba，以便在网络上共享驱动器。为此，你首先需要添加一个Samba用户（pi）。输入以下命令并输入密码：


    ```

    $ sudo smbpasswd -a pi

    New SMB password:

    Retype new SMB password:

    Added user pi.

    ```


    现在，你需要对文件`/etc/samba/smb.conf`进行一些更改，因此请输入此命令：


    ```

    $ sudo nano /etc/samba/smb.conf

    ```


    你要找的第一行在文件顶部附近：


    ```

    workgroup = WORKGROUP

    ```


    只有当你计划从Windows机器连接时才需要更改此项。这应该是你的Windows工作组的名称。对于Windows XP，默认值是MSHOME；对于较新版本的Windows，它是HOME（但请检查你的Windows网络）。请注意，通常在Mac和Windows
    PC（以及Linux机器）的混合网络中连接到NAS工作正常。


    下一个更改在文件下方的“身份验证”部分。找到以下行：


    ```

    # security = user

    ```


    删除行首的`#`以激活该行并开启安全性。最后，滚动到文件末尾并添加以下行：


    ```

    [USB]

    path = /media/pi/NAS

    comment = NAS Drive

    valid users = pi

    writeable = yes

    browseable = yes

    create mask = 0777

    public = yes

    ```


    保存文件，然后通过输入以下内容重启Samba：


    ```

    $ sudo /etc/init.d/samba restart

    ```


    如果一切正常，你的USB驱动器现在应该在网络上共享了。


    ### 讨论


    要在macOS上连接到驱动器，请选择“前往”，然后从Finder菜单中单击“连接服务器”。接下来，在“服务器地址”字段中，输入**smb://raspberrypi/USB**。将打开一个登录对话框，你需要在其中将用户名更改为**pi**（图2-19）。


    ![](img/54ed1f8e884bc184601bf6f652461a95_88_0.png)


    如果你从Windows机器连接到NAS，具体过程将因Windows版本而异。但是，基本原理是，在某个时候你需要输入网络地址，该地址应为`\raspberrypi\USB`（图2-20）。


    ![](img/54ed1f8e884bc184601bf6f652461a95_89_0.png)


    然后，系统会提示你输入用户名和密码，然后才能使用NAS磁盘（图2-21）。你可能只需要在第一次执行此操作。添加网络位置后，你应该能够在文件资源管理器中直接导航到它。


    ![](img/54ed1f8e884bc184601bf6f652461a95_90_0.png)


    如果你是Linux用户，以下命令应该可以为你挂载NAS驱动器：


    ```

    $ sudo mkdir /pishare

    $ sudo smbmount -o username=pi,password=raspberry //192.168.1.16/USB /pishare

    ```


    ### 另请参阅


    你可能想将树莓派的网络名称更改为像“piNAS”这样的名称（参见[配方2.4](Recipe 2.4)）。


    ## 2.11 设置网络打印机


    ### 问题


    你希望从树莓派打印到网络打印机。


    ### 解决方案


    使用通用Unix打印系统（CUPS）。

    首先，在终端中输入以下命令以安装CUPS（这可能需要一些时间）：


    ```

    $ sudo apt-get update

    $ sudo apt-get install cups

    ```


    通过输入以下命令为自己授予CUPS的管理员权限：


    ```

    $ sudo usermod -a -G lpadmin pi

    ```


    最后一条命令将CUPS使用的`lpadmin`组添加到用户`pi`，以便你拥有打印权限。

    CUPS通过Web界面进行配置。启动Chromium，然后在主菜单的Internet组中（或单击桌面上的图标），导航到地址**http://localhost:631**。

    在“管理”选项卡上，选择“添加打印机”选项。这将显示网络上或直接连接到树莓派USB端口的打印机列表（图2-22）。


    ![](img/54ed1f8e884bc184601bf6f652461a95_92_0.png)


    按照一系列对话框设置打印机。


    ### 讨论


    完成后，你可以通过启动LibreOffice来测试打印机。输入一些文本，当你去打印时，你应该会看到新添加的打印机可用于打印（图2-23）。


    ![](img/54ed1f8e884bc184601bf6f652461a95_93_0.png)


    图2-23. 打印对话框


    ### 另请参阅


    另请参阅官方[CUPS网站](http://www.cups.org/)。


    # 第3章 操作系统


