    \n你需要创建一个查找表，将值与键关联起来。\n\n## 解决方案\n\n使用 Python 字典。\n当你需要按顺序访问项目列表，或者总是知道要使用的元素的索引时，列表非常有用。字典是存储数据集合的另一种方式，但它们的组织方式非常不同，如[图\
    \ 6-1](Figure 6-1)所示。\n\n![](img/54ed1f8e884bc184601bf6f652461a95_249_0.png)\n\
    \n字典以一种方式存储键/值对，使你可以使用键非常高效地检索该值，而无需搜索整个字典。\n\n要创建字典，你使用 { } 表示法：\n\n```\n>>>\
    \ phone_numbers = {'Simon':'01234 567899', 'Jane':'01234 666666'}\n```\n\n## 讨论\n\
    \n在这个示例中，字典的键是字符串，但它们不需要是；它们可以是数字，实际上可以是任何数据类型，尽管字符串最常用。\n\n值也可以是任何数据类型，包括其他字典或列表。以下示例创建一个字典（a），然后将其用作第二个字典（b）中的值：\n\
    \n```\n>>> a = {'key1':'value1', 'key2':2}\n>>> a\n{'key2': 2, 'key1': 'value1'}\n\
    >>> b = {'b_key1':a}\n>>> b\n{'b_key1': {'key2': 2, 'key1': 'value1'}}\n```\n\n\
    当你显示字典的内容时，请注意字典中项目的顺序可能与创建字典并用一些内容初始化时指定的顺序不匹配：\n\n```\n>>> phone_numbers = {'Simon':'01234\
    \ 567899', 'Jane':'01234 666666'}\n>>> phone_numbers\n{'Jane': '01234 666666',\
    \ 'Simon': '01234 567899'}\n```\n\n与列表不同，字典没有保持项目顺序的概念。由于它们内部的表示方式，字典内容的顺序——出于所有实际目的——将是随机的。\n\
