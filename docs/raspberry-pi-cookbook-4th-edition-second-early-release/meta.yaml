    If you are using macOS or have Linux installed on the computer from which you
    want to connect your Pi, all you need to do to connect is open a Terminal window
    and enter the following command:


    ```

    $ ssh 192.168.1.16 -l pi

    ```


    Here, the IP address (192.168.1.16) is the IP address of your Pi (see Recipe 2.2).
    You are then prompted for your password and logged in to the Pi (Figure 2-14).'
