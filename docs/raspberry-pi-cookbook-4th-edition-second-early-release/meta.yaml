- md: '## See Also


    To learn more about the rpitx project, see [https://github.com/F5EOEO/rpitx](https://github.com/F5EOEO/rpitx).


    ## 4.7 Editing Bitmap Images


    ### Problem


    You want to manipulate a photograph or other image.


    ### Solution


    Install and run the GNU Image Manipulation Program (GIMP; see Figure 4-12).


    ![](img/54ed1f8e884bc184601bf6f652461a95_179_0.png)


    GIMP is available to install from the Add/Remove software tool (see Recipe 4.2).
    When you search for GIMP, a lot of results will come back for various GIMP utilities,
    so look for the package called *GNU Image Manipulation Program*.


    If you prefer to install GIMP from the command line, open a Terminal session and
    type the following command:


    ```

    $ sudo apt-get install gimp

    ```


    Once GIMP is installed, you’ll find a new entry in your Main menu under the Graphics
    heading called GNU Image Manipulation Program.


    ### Discussion


    Despite being hungry for memory and processor power, GIMP is usable even on a
    Raspberry Pi 2 B, but there will be much less waiting around if you use a Raspberry
    Pi 4 or 400.


    ### See Also


    Find out more from the [GIMP website](https://www.gimp.org/).


    GIMP has a lot of features and is a very sophisticated image-editing program,
    so it does take a little learning. You’ll find an online manual for the software
    at the GIMP website.


    For editing vector images, see [Link to Come].


    For more information on installing with `apt-get`, see Recipe 3.17.


    ## 4.8 Editing Vector Images


    ### Problem


    You want to create or edit high-quality vector drawings such as Scalable Vector
    Graphics (SVG).


    ### Solution


    Inkscape is one of the packages available from the Add/Remove Software tool (see
    Recipe 4.2). Open the tool up and search for *Inkscape*.


    If you prefer to install Inkscape from the command line, you can do so with the
    following commands:


    ```

    $ sudo apt-get update

    $ sudo apt-get install inkscape

    ```


    Once Inkscape is installed, its icon will appear in the Graphics section of your
    Raspberry Pi Start menu.


    ![](img/54ed1f8e884bc184601bf6f652461a95_181_0.png)


    ### Discussion


    Inkscape (#ed3_ch4_fig4_51_new) is the most used open source vector image editor.


    Inkscape is a very powerful piece of software with very many features that can
    take some time to master, so don’t be disheartened if it won’t do what you want
    at first. You will probably need to run through a few tutorials.


    Inkscape is another program best run with the extra power of a Raspberry Pi 4
    or 400.


    ### See Also


    For documentation on Inkscape, visit https://inkscape.org.


    For editing bitmap images such as photographs, see Recipe 4.7.


    ## 4.9 Using Bookshelf


    ### Problem


    You want to read Raspberry Pi books and magazines for free.


    ### Solution


    Use the pre-installed Bookshelf application. You will find this application in
    the Help section of the Raspberry Pi menu. Open it and you will see (Figure 4-14)
    past issues of both Mag Pi, Wireframe and Hackspace Magazine, as well as books
    from the Raspberry Pi Press.


    ![](img/54ed1f8e884bc184601bf6f652461a95_183_0.png)


    Figure 4-14. The Bookshelf Application.


    ### Discussion


    This is a really great resource, you will find lots of articles in MagPi Magazine
    to get started with various aspects of the Raspberry Pi. It is also a great source
    of inspiration for projects.


    ### See Also


    You will find lots of interesting Raspberry Pi resources here: [https://projects.raspberrypi.org/](https://projects.raspberrypi.org/)


    You can also download PDF back issues of MagPi Magazine or subscribe to the paper
    edition here: [https://magpi.raspberrypi.com/](https://magpi.raspberrypi.com/)


    ## 4.10 Playing Internet Radio


    ### Problem


    You want to be able to play internet radio on your Raspberry Pi.


    ### Solution


    The VLC media player should be pre-installed with Raspberry Pi OS. You will find
    it under Sound and Video in the menu.


    If for any reason, it’s not there, you can install it using the Preferred Software
    tool (Recipe 4.2).


    If you prefer to install the VLC media player from the command line, you can do
    so by running the following command:


    ```

    sudo apt-get install vlc

    ```


    Once it’s installed, you can find VLC in the Sound & Video section of your Main
    menu.


    Run the program and then, on the Media menu, select the Open Network Stream option.
    This opens a dialog box (see Figure 4-15) in which you can enter the URL of the
    internet radio station that you want to play.


    You will need to plug headphones or amplified speakers into the audio socket on
    the Raspberry Pi.


    ![](img/54ed1f8e884bc184601bf6f652461a95_185_0.png)


    ### Discussion


    You also can run VLC from the command line as follows:


    ```

    $ vlc http://www.a-1radio.com/listen.pls -I dummy

    ```


    VLC will probably produce a series of error messages but then play the audio just
    fine.


    ### See Also


    This recipe borrows heavily from this [tutorial](tutorial), in which Jan Holst
    takes things a step further and adds radio-style controls to the project.


    For UK readers


    ![](img/54ed1f8e884bc184601bf6f652461a95_187_0.png)


    Figure 4-16. VS Code on a Raspberry Pi


    If you are a seasoned programmer, then you may find that you prefer to edit your
    Raspberry Pi Python code using Visual Studio Code rather than a beginners Python
    IDE like Thonny or Mu (Recipe 5.3 and Recipe 5.4). This is particularly true if
    your project consists of multiple files. Figure 4-16 shows the file explorer area
    on the left, where you can see all the files in your project. Clicking on one
    makes it available in the editor area, and open files each have their own tab.


    As you can see, the editor highlights the language syntax, color-coding it to
    make it easier to read and spot mistakes.


    Visual Studio Code is a useful tool to have around, whether programming in Python
    (see Chapter 5) or some other language.


    ### See Also


    The simple text editor nano is an easy way to edit code - see Recipe 3.7


    Thonny is a Python editor aimed at beginners - see Recipe 5.3


    ## 4.12 Controlling a Laser Cutter


    ### Problem


    You want to control your low-cost K40 laser cutter from your Raspberry Pi.


    ### Solution


    If you have one of the popular and low-cost Chinese laser cutter of the K40 variety
    (Figure 4-17) then you can use the K40 Whisperer software to control your laser
    cutter. Thus, instead of having to use a relatively expensive Windows computer
    to control your laser cutter, you can use a much lower cost Raspberry Pi.


    ![](img/54ed1f8e884bc184601bf6f652461a95_189_0.png)


    Figure 4-17. A K40 Laser Cutter


    This software is written in Python, but also relies on the Inkscape vector drawing
    package. So if you have not already done so, install Inkscape by following Recipe
    4.8.


    Next, download the source code for the K40 Whisperer software from https://www.scorchworks.com/K40whisperer/k40whisperer.html#download.
    Select the latest download from the *K40 Whisperer Source* column. Double click
    the downloaded ZIP file and extract it into your home directory ( /home/pi). Inside
    the unzipped directory, you will find a file called README_Linux.txt. The instructions
    here are based on that file. The README is a general Linux README rather than
    being Raspberry Pi specific.


    First run the following two commands to create a user group for the software.


    ```

    $ sudo groupadd lasercutter

    $ sudo usermod -a -G lasercutter pi

    ```


    Make sure that your laser cutter is connected to your Raspberry Pi with its USB
    lead and the laser cutter is switched on. You now need to run the following commands
    to find out the USB vendor and product ID for the laser cutter. These will probably
    be 1a86 and 5512 respectively, but it’s worth checking in case the laser cutter’s
    manufacturer changes these. To do this, run the `lsusb` command:


    ```

    $ lsusb

    Bus 001 Device 004: ID 1a86:5512 QinHeng Electronics CH341 in EPP/MEM/I2C mode,
    EPP/I2C adapter

    Bus 001 Device 005: ID 0424:7800 Microchip Technology, Inc. (formerly SMSC)

    Bus 001 Device 003: ID 0424:2514 Microchip Technology, Inc. (formerly SMSC) USB
    2.0 Hub

    Bus 001 Device 002: ID 0424:2514 Microchip Technology, Inc. (formerly SMSC) USB
    2.0 Hub

    Bus 001 Device 001: ID 1d6b:0002 Linux Foundation 2.0 root hub

    ```


    This will list all the USB devices connected to your Raspberry Pi. You are now
    looking for the entry that corresponds to your laser cutter. In this case, it’s
    the only Chinese name there (*QinHeng*). But you can confirm this if you need
    to, by unplugging the laser cutter and running the `lsusb` command again and seeing
    which entry disappears.


    On the line for this entry you can see the text `1a86:5512`. The part before the
    : is the Vendor ID and 5512 is the product ID. You need to know these, because
    you are going to use them in a configuration file.


    Create and edit a new file in nano using the command:


    ```

    $ sudo nano /etc/udev/rules.d/97-ctc-lasercutter.rules

    ```'
