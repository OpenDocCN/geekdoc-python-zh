    ## 3.0 简介


    本章探讨了树莓派使用的Linux操作系统的许多方面。其中很多涉及命令行的使用。如果你习惯于Windows或macOS，这可能会有点令人震惊。然而，当你习惯它时，使用命令行做事可能会出奇地高效。


    你可以使用更接近Windows或macOS的方式，通过图形界面完成许多简单的文件操作，如移动文件、重命名、复制和删除文件，这是我们第一个配方的主题。


    ## 3.1 图形化浏览文件


    ### 问题


    你希望使用像macOS或Windows PC上的图形界面来移动文件。


    ### 解决方案


    使用文件管理器。

    你可以在主菜单的“附件”组中找到此程序（图3-1）。

    使用文件管理器，你可以将文件或目录从一个目录拖到另一个目录，或者使用“编辑”菜单从一个位置复制文件并将其粘贴到第二个位置。这与Windows文件管理器或macOS
    Finder的操作方式非常相似。


    ![](img/54ed1f8e884bc184601bf6f652461a95_95_0.png)


    ### 讨论


    文件管理器的左侧显示文件夹结构。

    中央区域显示当前文件夹中的文件，你可以使用工具栏中的按钮或在顶部的文件路径区域中输入位置来导航。

    你可以右键单击一个文件以打开一个菜单，其中包含你可以对该文件使用的选项（图3-2）。


    ![](img/54ed1f8e884bc184601bf6f652461a95_96_0.png)


    你还可以通过按住Ctrl键的同时选择文件来一次选择多个文件进行复制或拖动，或者你可以通过选择一个文件，然后按住Shift键的同时选择要选择的文件列表的末尾来选择一系列文件。


    ### 另请参阅


    另请参阅[配方3.5](Recipe 3.5)。


    ## 3.2 将文件复制到USB闪存驱动器


    ### 问题


    你希望将文件从树莓派复制到USB闪存驱动器。


    ### 解决方案


    将USB闪存驱动器插入USB端口，应出现如图3-3所示的对话框。选择“确定”以在文件管理器中打开它。


    ![](img/54ed1f8e884bc184601bf6f652461a95_97_0.png)


    驱动器将挂载在`/media/pi`后跟闪存驱动器的名称（在我的情况下是UNTITLED）。要从主文件夹复制文件，请将其拖到代表闪存驱动器的文件夹上，如图3-4所示。'
