    You can open as many Terminal sessions as you want. It is often useful to have
    a couple of sessions open in different directories so that you don’t need to constantly
    switch directories using `cd` (Recipe 3.4).

    When using the Terminal, everything is case sensitive. That is, if you are using
    a command, you must use the correct case when you’re typing. For example, the
    `ls` command that you will meet in the next recipe must be written as lowercase
    `ls` and not `LS` or `Ls` or `lS`. Similarly, all filenames are case sensitive,
    so files named *picture.jpg* and *Picture.jpg* are two different files.


    # See Also


    In the next section (Recipe 3.4), you will look at navigating the directory structure
    using the Terminal.


    # 3.4 Navigating the Filesystem Using a Terminal


    # Problem


    You need to know how to change directory and move about the filesystem using the
    Terminal.


    # Solution


    The main command used for navigating the filesystem is `cd` (change directory).
    After `cd`, you need to specify the directory that you want to change to. This
    can be either a *relative* path to a directory within your current directory or
    an *absolute* path to somewhere else on the filesystem.

    To see what the current directory is, use the command `pwd` (print working directory).


