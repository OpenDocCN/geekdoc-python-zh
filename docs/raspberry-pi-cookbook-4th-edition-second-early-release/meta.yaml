    it is three to four times faster than any previous Raspberry Pi. This comes at
    the cost of the main chip on the board operating much hotter than in earlier versions—hot
    enough, in fact, to hurt.'
  - '[PAGE 7]


    If, on the other hand, you are embedding a Raspberry Pi in a project for a single
    purpose, using a compact Pi Zero W and saving a few dollars might well be an option.


    # THE RASPBERRY PI 400


    The Raspberry Pi makes a pretty good desktop computer replacement, and no Raspberry
    Pi is better suited to this than the Raspberry Pi 400 (Figure 1-2).


    ![](img/54ed1f8e884bc184601bf6f652461a95_7_0.png)


    Figure 1-2. The Raspberry Pi 400


    The Raspberry Pi 400 is essentially the same hardware as the Raspberry Pi 4, but
    built into a keyboard case, reminiscent of the home computers of the 1990s. The
    HDMI and USB ports are all accessible at the back of the Pi 400. The GPIO pins
    are accessible at the back of the computer, but are not as easy to access as a
    regular Raspberry Pi, so if you are buying a Raspberry Pi to learn about electronics,
    a regular Pi is probably a better choice. However, if you just want a desktop
    replacement, then a Pi 400 is a really good choice.


    # Discussion


    Figure 1-3 shows the Pi Zero W, the Raspberry Pi 3 B, and the Raspberry Pi 4.'
  - '[PAGE 8]


    ![](img/54ed1f8e884bc184601bf6f652461a95_8_0.png)


    As you can see from Figure 1-3, the Pi Zero W is roughly half the size of the
    Pi 3 B or Pi 4 B, and it has a single micro-USB socket for communication, and
    a second one for power. The Pi Zero W also saves space by using a mini-HDMI socket
    and micro-USB on-the-go socket. If you want to connect a keyboard monitor and
    mouse to a Pi Zero, you will need adapters for both the USB and the HDMI port
    before you can connect standard peripherals. The Raspberry Pi A+ is larger than
    the Pi Zero and has full-sized USB and HDMI ports.


    Table 1-2 summarizes the differences between all the Raspberry Pi models to date,
    with the most recently released models toward the top.


    Table 1-2. Raspberry Pi models


    | Model | RAM | Processor (cores * clock) | USB sockets | Ethernet port | Notes
    |

    |---|---|---|---|---|---|

    | 400 | 4 GB | 4 * 1.8 GHz | 4 (2 x USB3) | yes | Built into a keyboard |'
- md: '## 1.2 Connecting the System


    ### Problem


    You have everything that you need for your Raspberry Pi, and you want to connect
    it all.


    ### Solution


    Unless you are embedding your Raspberry Pi in a project or using it as a media
    center, you need to attach a keyboard (unless you are using a Pi 400), a mouse,
    and a monitor.


    Figure 1-4 shows a typical Raspberry Pi system. If you have a Raspberry Pi 4,
    you could (if you really wanted) connect a second monitor. However, if you have
    just one monitor, connect it to the micro-HDMI connector closest to the USB-C
    power connector.


    ![](img/54ed1f8e884bc184601bf6f652461a95_11_0.png)


    ### Discussion


    The Raspberry Pi is perfectly happy with pretty much any USB keyboard and mouse,
    wired or wireless.

    The Raspberry Pi 4 lets you connect two monitors to your system at the same time.
    When you do so, you will be able to move your mouse cursor between screens, but
    Raspberry Pi OS will need to know where the screens are relative to each other.
    To enact this, in the Preferences section on the Main menu, open the Screen Configuration
    tool (Figure 1-5).


    ![](img/54ed1f8e884bc184601bf6f652461a95_12_0.png)


    You can drag the two boxes labeled HDMI-1 and HDMI-2 around to represent the physical
    position of the two monitors. So in this case the monitors are side by side, with
    the monitor connected to HDMI-1 on the left.


    If you have an older Raspberry Pi or a model A or A+ and run out of USB sockets,
    you will also need a USB hub.


    ### See Also


    The official Raspberry Pi Quick Start Guide.


    ## 1.3 Enclosing a Raspberry Pi


    ### Problem


    You need an enclosure for your Raspberry Pi.


    ### Solution


    Apart from the Raspberry Pi 400, Raspberry Pis do not come with an enclosure unless
    you buy one as part of a kit. This makes it a little vulnerable, given that there
    are bare connections on the underside of the circuit board that could easily be
    short-circuited if the Raspberry Pi is placed on something metal.


    It is a good idea to buy some protection for your Raspberry Pi in the form of
    a case. If you intend to use the Raspberry Pi’s general-purpose input/output (GPIO)
    pins (the pins that allow you to connect to external electronics), the PiBow Coupé
    shown in Figure 1-6 is a beautiful and practical design that is available for
    both the Raspberry Pi 4 and earlier versions.


    ### Discussion


    There is a vast array of case styles to choose from, including the following:


    - Simple, two-part, click-together plastic boxes

    - VESA mountable boxes (for attaching to the back of a monitor or TV)

    - Lego-compatible boxes

    - 3D-printed box designs

    - Laser-cut acrylic designs

    - Designs that act as a large heatsink for cooling

    - Designs with a built-in fan

    - DIN-rail designs for labs and workshops


    ![](img/54ed1f8e884bc184601bf6f652461a95_14_0.png)


    Figure 1-6. A Raspberry Pi 2 in a PiBow Coupé


    The case you buy is very much a matter of personal taste. However, here are some
    of the things that you need to consider:


    - Do you need to have access to the GPIO connector? This is important if you plan
    to attach external electronics to your Raspberry Pi.

    - Is the case well ventilated? This is important if you plan to overclock your
    Raspberry Pi (Recipe 1.12) or run it hard playing videos or games, because these
    will all generate more heat.

    - Finally, make sure you get one that fits your model of Raspberry Pi.


    If you have access to a 3D printer, you can also print your own case. Search for
    Raspberry Pi on [Thingiverse](https://www.thingiverse.com/) or [MyMiniFactory](https://www.myminifactory.com/),
    and you will find lots of designs.


    You will also find heatsink kits that have tiny self-adhesive heatsinks to attach
    to the chips on the Raspberry Pi. These can be of some use if you are demanding
    a lot of your Raspberry Pi, say by playing a lot of videos, but generally they
    are the equivalent of “go-faster” stripes on a car.

    If you have a Raspberry Pi 4, you can reduce the temperature by fitting a small
    fan such as the Pimoroni Fan SHIM as shown in Figure 1-7.


    ![](img/54ed1f8e884bc184601bf6f652461a95_16_0.png)


    Figure 1-7. The Pimoroni Fan SHIM


    ### See Also


    You will also find many styles of cases at other Raspberry Pi suppliers and on
    eBay.


    ## 1.4 Selecting a Power Supply


    ### Problem


    You need to select a power supply for your Raspberry Pi.


    ### Solution


    The basic electrical specification for a power supply suitable for a Raspberry
    Pi is that it provides a regulated 5V DC (direct current).

    The amount of current that the power supply must be capable of providing depends
    both on the model of Raspberry Pi and on the peripherals attached to it. It is
    worth getting a power supply that can easily cope with the Raspberry Pi, and you
    should consider 1A to be a minimum for any model of Raspberry Pi.

    If you buy your power supply from the same place that you buy the Raspberry Pi,
    the seller should be able to tell you whether it will work with the Raspberry
    Pi.

    The Raspberry Pi 4 should be used with a 3A power supply. This is in part because
    its greater processing power than earlier models requires more electrical power,
    but also because its two USB3 ports are able to supply up to 1.2A to high-power
    USB peripherals such as external USB drives.

    If you are going to be using WiFi or USB peripherals that require significant
    amounts of power with pre-Raspberry Pi 4 models, you should get a power supply
    capable of 1.5A or even 2A. Also beware of very low-cost power supplies that might
    not provide an accurate or reliable 5V.


    ### Discussion


    The Raspberry Pi 4 is the first Raspberry Pi to switch to using the more modern
    USB-C connector. Unlike the micro-USB connector used on earlier boards, this connector
    is reversable (Figure 1-8).


    ![](img/54ed1f8e884bc184601bf6f652461a95_18_0.png)


    In Figure 1-8, you can see the USB-C power connector of a Raspberry Pi 4 below
    the micro-USB connector of a Raspberry Pi 3. As an aside, you can also see the
    pair of micro-HDMI video ports that replace the single full-sized HDMI connector.


    Whether your Raspberry Pi uses a USB-C connector or a micro-USB connector, the
    power supply and connectors are actually the same as those found in many smartphone
    chargers. If they terminate in a micro-USB plug,

    they are almost certainly 5V (but check). The only question, then, is whether
    they can supply enough current.


    If they can’t, a few bad things can happen:


    - They might become hot and be a potential fire risk.

    - They might simply fail.

    - At times of high load (say, when the Pi is using WiFi or playing video), the
    voltage might dip and the Raspberry Pi might reset itself.


    If you are using a Raspberry Pi 3 or earlier, look for a power supply that says
    it can supply 1A or more. If it specifies a number of watts (W) rather than A,
    divide the number of watts by 5 to get the number of amps. So a 5V 10W power supply
    can supply 2A (2,000mA).


    Using a power supply with, say, a maximum current of 2A will not use any more
    electricity than a 700mA power supply. The Raspberry Pi takes only as much current
    as it needs.


    In Figure 1-9, I measure the current taken by a Raspberry Pi model B and compare
    it with a Raspberry Pi 2 model B and a Raspberry Pi 4.


    | Model | RAM | Processor (cores * clock) | USB sockets | Ethernet port | Notes
    |

    | :--- | :--- | :--- | :--- | :--- | :--- |

    | 4 B | 1/2/4/9 GB | 4 * 1.5 GHz | 4 (2 x USB3) | yes | 2 x micro-HDMI video |

    | 3 A+ | 512 MB | 4 * 1.4 GHz | 1 | no | WiFi and Bluetooth |

    | 3 B+ | 1 GB | 4 * 1.4 GHz | 4 | yes | WiFi and Bluetooth |

    | 3 B | 1 GB | 4 * 1.2 GHz | 4 | yes | WiFi and Bluetooth |

    | Zero W | 512 MB | 1 * 1 GHz | 1 (micro) | no | WiFi and Bluetooth |

    | Zero | 512 MB | 1 * 1 GHz | 1 (micro) | no | Low cost |

    | 2 B | 1 GB | 4 * 900 MHz | 4 | yes | |

    | A+ | 256 MB | 1 * 700 MHz | 1 | no | |

    | B+ | 512 MB | 1 * 700 MHz | 4 | yes | Discontinued |

    | A | 256 MB | 1 * 700 MHz | 1 | no | Discontinued |

    | B rev2 | 512 MB | 1 * 700 MHz | 2 | yes | Discontinued |

    | B rev1 | 256 MB | 1 * 700 MHz | 2 | yes | Discontinued |


    If you have one of the older or discontinued Raspberry Pi models, it is still
    useful. Those models do not have quite the performance of the latest Raspberry
    Pi 4, but for many situations, that does not matter.


    If you are buying a new Raspberry Pi, I consider the best choice for use as a
    general-purpose computer to be the Raspberry Pi 4 or 400. If you don’t need WiFi
    or want a smaller device, also consider the 3 B, 2 B, or Zero W.


    ## See Also


    For more information on the Raspberry Pi models, see [https://oreil.ly/oY-A_](https://oreil.ly/oY-A_).


    The low cost of the Pi Zero and Pi Zero W models makes them ideal for embedding
    in electronics projects without worrying about the expense. See [Link to Come].'
  mdcn: '## 1.2 连接系统


    ### 问题


    你已备齐树莓派所需的一切，现在想将它们全部连接起来。


    ### 解决方案


    除非你将树莓派嵌入项目或用作媒体中心，否则你需要连接键盘（除非使用的是 Pi 400）、鼠标和显示器。


    图 1-4 展示了一个典型的树莓派系统。如果你拥有树莓派 4，你甚至可以（如果真的需要）连接第二个显示器。但如果你只有一个显示器，请将其连接到最靠近 USB-C
    电源接口的 micro-HDMI 接口。


    ![](img/54ed1f8e884bc184601bf6f652461a95_11_0.png)


    ### 讨论


    树莓派几乎兼容任何 USB 键盘和鼠标，无论是有线还是无线。

    树莓派 4 允许你同时连接两个显示器。连接后，你可以在屏幕间移动鼠标光标，但树莓派操作系统需要知道屏幕之间的相对位置。为此，请在主菜单的“首选项”部分打开“屏幕配置”工具（图
    1-5）。


    ![](img/54ed1f8e884bc184601bf6f652461a95_12_0.png)


    你可以拖动标有 HDMI-1 和 HDMI-2 的两个方框来表示两个显示器的物理位置。因此，在此例中，显示器并排放置，连接到 HDMI-1 的显示器在左侧。


    如果你使用的是较旧的树莓派或 A 型/A+ 型，并且 USB 接口用尽，你还需要一个 USB 集线器。


    ### 另请参阅


    官方树莓派快速入门指南。


    ## 1.3 封装树莓派


    ### 问题


    你需要为树莓派准备一个外壳。


    ### 解决方案


    除了树莓派 400，树莓派本身不附带外壳，除非你购买的是套件。这使得它有些脆弱，因为电路板底部有裸露的连接点，如果树莓派放置在金属物体上，很容易造成短路。


    为树莓派购买一个外壳是个好主意。如果你打算使用树莓派的通用输入/输出（GPIO）引脚（用于连接外部电子设备的引脚），图 1-6 所示的 PiBow Coupé
    是一个美观实用的设计，适用于树莓派 4 及更早版本。


    ### 讨论


    有各种各样的外壳样式可供选择，包括：


    - 简单的两件式卡扣塑料盒

    - 可 VESA 安装的盒子（用于安装在显示器或电视背面）

    - 兼容乐高的盒子

    - 3D 打印的盒子设计

    - 激光切割的亚克力设计

    - 充当大型散热器用于冷却的设计

    - 内置风扇的设计

    - 用于实验室和车间的 DIN 导轨设计


    ![](img/54ed1f8e884bc184601bf6f652461a95_14_0.png)


    图 1-6. 装在 PiBow Coupé 中的树莓派 2


    购买哪种外壳很大程度上取决于个人品味。然而，以下是你需要考虑的一些事项：


    - 你是否需要访问 GPIO 连接器？如果你计划将外部电子设备连接到树莓派，这一点很重要。

    - 外壳通风是否良好？如果你计划超频树莓派（配方 1.12）或高强度运行播放视频或游戏，这一点很重要，因为这些都会产生更多热量。

    - 最后，确保你购买的外壳适合你的树莓派型号。


    如果你有 3D 打印机，你也可以打印自己的外壳。在 [Thingiverse](https://www.thingiverse.com/) 或 [MyMiniFactory](https://www.myminifactory.com/)
    上搜索 Raspberry Pi，你会发现很多设计。


    你还会发现一些散热片套件，上面有微小的自粘散热片，可以贴在树莓派的芯片上。如果你对树莓派要求很高，比如播放大量视频，这些散热片可能有些用处，但通常它们就像汽车上的“加速”条纹一样。

    如果你有树莓派 4，可以通过安装一个小风扇（如图 1-7 所示的 Pimoroni Fan SHIM）来降低温度。


    ![](img/54ed1f8e884bc184601bf6f652461a95_16_0.png)


    图 1-7. Pimoroni Fan SHIM


    ### 另请参阅


    你还可以在其他树莓派供应商和 eBay 上找到许多不同风格的外壳。


    ## 1.4 选择电源


    ### 问题


    你需要为树莓派选择一个电源。


    ### 解决方案


    适用于树莓派的电源的基本电气规格是提供稳定的 5V 直流电（DC）。

    电源必须能够提供的电流大小取决于树莓派的型号及其连接的外围设备。值得购买一个能轻松应对树莓派的电源，你应该考虑任何型号的树莓派至少需要 1A。

    如果你从购买树莓派的同一家店购买电源，卖家应该能告诉你它是否适用于树莓派。

    树莓派 4 应该使用 3A 电源。这部分是因为它比早期型号具有更强的处理能力，需要更多电力，但也因为它的两个 USB3 端口能够向高功率 USB 外围设备（如外部
    USB 驱动器）提供高达 1.2A 的电流。

    如果你要在树莓派 4 之前的型号上使用 WiFi 或需要大量电力的 USB 外围设备，你应该购买能够提供 1.5A 甚至 2A 的电源。同时要小心那些可能无法提供准确或可靠
    5V 电压的超低成本电源。


    ### 讨论


    树莓派 4 是第一款改用更现代的 USB-C 连接器的树莓派。与早期主板上使用的 micro-USB 连接器不同，这种连接器是可逆的（图 1-8）。


    ![](img/54ed1f8e884bc184601bf6f652461a95_18_0.png)


    在图 1-8 中，你可以看到树莓派 4 的 USB-C 电源连接器位于树莓派 3 的 micro-USB 连接器下方。顺便说一句，你还可以看到取代单个全尺寸
    HDMI 连接器的两个 micro-HDMI 视频端口。


    无论你的树莓派使用的是 USB-C 连接器还是 micro-USB 连接器，电源和连接器实际上与许多智能手机充电器中使用的相同。如果它们以 micro-USB
    插头结尾，它们几乎肯定是 5V（但请检查）。那么，唯一的问题是它们是否能提供足够的电流。


    如果不能，可能会发生一些不好的事情：


    - 它们可能会变热，存在火灾风险。

    - 它们可能会直接失效。

    - 在高负载时（例如，当树莓派使用 WiFi 或播放视频时），电压可能会下降，树莓派可能会自行重置。


    如果你使用的是树莓派 3 或更早的型号，请寻找标称能提供 1A 或更多电流的电源。如果它指定的是瓦特数（W）而不是安培数（A），将瓦特数除以 5 即可得到安培数。因此，一个
    5V 10W 的电源可以提供 2A（2,000mA）。


    使用最大电流为 2A 的电源并不会比使用 700mA 的电源消耗更多电能。树莓派只取用它所需的电流。


    在图 1-9 中，我测量了树莓派 B 型的耗电量，并将其与树莓派 2 B 型和树莓派 4 进行了比较。


    | 型号 | 内存 | 处理器（核心数 * 主频） | USB 接口 | 以太网端口 | 备注 |

    | :--- | :--- | :--- | :--- | :--- | :--- |

    | 4 B | 1/2/4/9 GB | 4 * 1.5 GHz | 4 (2 x USB3) | 是 | 2 x micro-HDMI 视频 |

    | 3 A+ | 512 MB | 4 * 1.4 GHz | 1 | 否 | WiFi 和蓝牙 |

    | 3 B+ | 1 GB | 4 * 1.4 GHz | 4 | 是 | WiFi 和蓝牙 |

    | 3 B | 1 GB | 4 * 1.2 GHz | 4 | 是 | WiFi 和蓝牙 |

    | Zero W | 512 MB | 1 * 1 GHz | 1 (micro) | 否 | WiFi 和蓝牙 |

    | Zero | 512 MB | 1 * 1 GHz | 1 (micro) | 否 | 低成本 |

    | 2 B | 1 GB | 4 * 900 MHz | 4 | 是 | |

    | A+ | 256 MB | 1 * 700 MHz | 1 | 否 | |

    | B+ | 512 MB | 1 * 700 MHz | 4 | 是 | 已停产 |

    | A | 256 MB | 1 * 700 MHz | 1 | 否 | 已停产 |

    | B rev2 | 512 MB | 1 * 700 MHz | 2 | 是 | 已停产 |

    | B rev1 | 256 MB | 1 * 700 MHz | 2 | 是 | 已停产 |


    如果你拥有较旧或已停产的树莓派型号，它仍然有用。这些型号的性能不如最新的树莓派 4，但在许多情况下，这并不重要。


    如果你要购买新的树莓派，我认为作为通用计算机的最佳选择是树莓派 4 或 400。如果你不需要 WiFi 或想要更小的设备，也可以考虑 3 B、2 B 或 Zero
    W。


    ## 另请参阅


    有关树莓派型号的更多信息，请参阅 [https://oreil.ly/oY-A_](https://oreil.ly/oY-A_)。


    Pi Zero 和 Pi Zero W 型号的低成本使其非常适合嵌入电子项目，而无需担心费用。请参阅 [链接待定]。'
