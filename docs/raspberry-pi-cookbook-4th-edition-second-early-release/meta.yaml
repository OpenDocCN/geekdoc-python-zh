    \   601K/s   in 9.0s    \n\n2018-06-07 07:35:11 (601 KB/s) - ‘Pifm.tar.gz’ saved\
    \ [5521400/5521400]\n```\n\n如果你的 URL 包含任何特殊字符，最好将它们用双引号括起来。此示例 URL 来自配方 4.6。\n\
    \n### 讨论\n\n你会发现一些安装软件的说明依赖于使用 `wget` 来获取文件。通常从命令行执行此操作比使用浏览器、找到文件、下载它，然后将其复制到你需要的地方更方便。\n\
    \n`wget` 命令将要下载的 URL 作为其参数，并将其下载到当前目录。它通常用于下载某种类型的存档文件，但也会下载任何网页。\n\n### 另请参阅\n\
    \n有关使用 `apt-get` 安装的更多信息，请参见 [配方 3.17](Recipe 3.17)。\n\n## 3.21 使用 Git 获取源代码\n\
    \n### 问题\n\n有时 Python 库和其他软件托管在 GitHub 网站或其他在线 Git 仓库中。你需要能够将它们获取到你的 Raspberry\
    \ Pi 上。\n\n### 解决方案\n\n要使用 Git 仓库中的代码，你需要使用 `git clone` 命令来制作你自己的文件副本。\n\n例如，以下命令将把本书的所有源代码示例下载到一个新文件夹中：\n\
    \n```\n$ git clone\nhttps://github.com/simonmonk/raspberrypi_cookbook_ed4.git\n\
    ```\n\n除了要克隆的代码的 URL 外，还有一个你可以用浏览器访问的网页。如果你访问 [GitHub 网页](GitHub web page)，你会看到一个类似于\
    \ [待添加链接] 的网页。\n点击“Clone or download”按钮允许你复制仓库的 URL，然后将其粘贴到终端会话中的 `git` 命令之后。\n\
    \n### 讨论\n\nGit 和 GitHub 之间存在区别。Git 是软件，而 GitHub 是众多托管代码的网站之一，你使用 Git 将代码 *推送*\
    \ 到 GitHub。事实上，如果你愿意，你实际上可以在 Raspberry Pi 上托管自己的 Git 仓库。然而，使用基于 Git 的网站（如 GitHub\
    \ 或 GitLab）有以下好处：\n\n- 你的代码存储在云端，因此如果你的磁盘（或 SD 卡）损坏，你不会丢失代码。\n- 代码是公开可见的，因此其他人可以查看和使用它，如果他们发现错误，甚至可能为你提供修复。\n\
    - 你可以在 README 文件中包含关于你项目的文档，供所有人查看。\n\n![](img/54ed1f8e884bc184601bf6f652461a95_131_0.png)\n\
    \n如果你正在开发一个你认为其他人可能感兴趣的 Raspberry Pi 项目，我建议使用 GitHub 或 GitLab 来托管你的代码。需要学习一点东西，但这是值得的。\n\
    \n使用 Git（无论是本地还是通过 GitHub 等服务）的另一个好处是，每次你对项目进行一部分工作时，你都会将该工作推送到代码的主副本。这不会替换已有的代码，而是作为新版本存储。如果你犯了错误，你可以随时恢复代码的早期版本。\n\
    \n我将我所有书籍和其他项目的代码都托管在 GitHub 上。以下是我创建新仓库时采取的步骤：\n\n1. 转到你在 GitHub 上的主页（你需要创建一个账户），点击\
    \ + 按钮并选择 New Repository 选项。\n2. 为仓库命名并添加简短描述。"
