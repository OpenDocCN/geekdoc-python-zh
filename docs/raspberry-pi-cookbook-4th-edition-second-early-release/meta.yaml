    # # Chapter 4. Using Ready-Made Software


    > ### A NOTE FOR EARLY RELEASE READERS


    With Early Release ebooks, you get books in their earliest form—the author’s raw
    and unedited content as they write—so you can take advantage of these technologies
    long before the official release of these titles.


    This will be the 4th chapter of the final book. Please note that the GitHub repo
    will be made active later on.


    If you have comments about how we might improve the content and/or examples in
    this book, or if you notice missing material within this chapter, please reach
    out to the author at simonmonkauthor@gmail.com.


    # ## 4.0 Introduction


    This chapter contains a number of recipes for using ready-made software on the
    Raspberry Pi.


    Some of the recipes in this chapter are concerned with converting the Raspberry
    Pi into a single-use appliance, while others use specific pieces of software on
    a Raspberry Pi.


    # ## 4.1 Making a Media Center


    # ### Problem


    You want to convert your Raspberry Pi into a super-duper media center.


    # ### Solution'
  - '[PAGE 160]


    To use your Raspberry Pi as a media center, you should go for the superior performance
    of the Raspberry Pi 4 B, as video playing is very processor intensive.


    You can set up your Raspberry Pi as a media center while using the [Raspberry
    Pi Disk Imager](https://www.raspberrypi.com/software/) to write to a microSD card.
    Instead of selecting Raspberry Pi OS as the distribution to install, select LibreELEC
    from the Media Player OS section of the Operating System button (Figure 4-1).


    ![](img/54ed1f8e884bc184601bf6f652461a95_160_0.png)


    LibreELEC is a distribution that optimizes your Raspberry Pi as a media center.
    It incudes the Kodi media center software, which is based on the XBMC open source
    project that was originally developed to convert Xbox game consoles into media
    centers. The code has since been ported to many platforms, including the Raspberry
    Pi (Figure 4-2).'
  - '[PAGE 161]


    ![](img/54ed1f8e884bc184601bf6f652461a95_161_0.png)


    Figure 4-2. Raspberry Pi as a media center


    Raspberry Pi is perfectly capable of playing full HD video as well as streamed
    music, MP3 files, and internet radio.


    # Discussion


    Kodi is a powerful piece of software with many features. Perhaps the simplest
    way to check whether it is working is to put some music and/or video files onto
    a USB flash drive or external USB hard disk and connect it to the Raspberry Pi.
    You should be able to play them from Kodi.


    Since the Raspberry Pi is likely to be sitting near your TV, you might find that
    your TV has a USB port that can provide enough current to run the Raspberry Pi.
    If this is the case, you won’t need a separate power supply.


    A wireless keyboard and mouse are a good idea because, if you buy them as a pair,
    they will use a single USB port for the dongle, which avoids the need for wires
    trailing all over the place. You can also buy mini keyboards with built-in trackpads
    that are useful in this situation.'
  - '[PAGE 162]


    A wired network connection is generally higher performance and better than a WiFi
    connection, but it is not always convenient to have the Pi near an Ethernet socket.
    If this is the case, you can set up XBMC to use WiFi. Setting up Kodi is very
    intuitive, and you can find full instructions on using the software at http://kodi.wiki.


    # See Also


    You can add an [infrared (IR) remote](infrared (IR) remote) to Raspberry Pi to
    control Kodi.


    # 4.2 Installing Recommended Software


    # Problem


    You want to install some commonly used software on your Raspberry Pi.


    # Solution


    Use the Recommended Software tool ([Figure 4-3](Figure 4-3)), that you will find
    on the Preferences Section of the Raspberry Pi menu.'
  - '[PAGE 163]


    ![](img/54ed1f8e884bc184601bf6f652461a95_163_0.png)


    Figure 4-3. The Recommended Software Tool


    This tool includes many pieces of software that in the past were pre-installed
    on Raspberry Pi OS. So, it has many of the most common and useful pieces of Raspberry
    Pi software in it. Use it to browse to the software that you want to install and
    select the check box for the programs you want to install and then click Install.


    The software will then be downloaded and installed. When the installer has finished
    the new software will appear on your Raspberry Pi menu.


    # Discussion


    If you can’t find the software that you want on the Recommended Software tool,
    then you can widen the net and use the similar Add/Remove Software tool, also
    in the Preferences section of the Raspberry Pi Menu (Figure 4-4).'
  - '[PAGE 164]


    ![](img/54ed1f8e884bc184601bf6f652461a95_164_0.png)


    This tool has thousands of software packages and programs for you to install,
    and sometimes it is easier to type something in the search area, rather than try
    and browse through all the packages.


    # See Also


    To install software using the apt-get command line tool, see [Recipe 3.17](Recipe
    3.17).


    # 4.2 Using Office Software


    # Problem


    You need to open word processor, presentation and spreadsheet documents on a Raspberry
    Pi.'
  - '[PAGE 165]


    # Solution


    Install LibreOffice using the Recommended Software tool (Recipe 4.2).


    # Discussion


    The LibreOffice suite of programs (Figure 4-5) make a good (and free) alternative
    to Microsoft Office. In fact, LibreOffice Writer will open and save Microsoft
    Word documents, and the spreadsheet and presentation programs are pretty compatible
    with their Microsoft counterparts.


    ![](img/54ed1f8e884bc184601bf6f652461a95_165_0.png)


    A Raspberry Pi 4, or 400 will run office applications much better than an older
    Raspberry Pi.


    These days its often more convenient to keep your documents in the cloud and edit
    them in a browser. The most common examples of these services being Microsoft365
    and Google docs. Both require you to sign up for an account, but the Chromium
    browser is perfectly capable of using these services (Figure 4-6)'
  - '[PAGE 166]


    ![](img/54ed1f8e884bc184601bf6f652461a95_166_0.png)


    Figure 4-6. Using a Google Docs spreadsheet in the Chromium browser.


    # See Also


    Visit [https://www.libreoffice.org](https://www.libreoffice.org) for more information
    on the LibreOffice suite of software.


    If you just want to edit an unformatted text file, you can use the nano editor
