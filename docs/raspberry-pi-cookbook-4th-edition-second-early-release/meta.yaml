- md: "There is one other file that you need to change. Enter the command:\n\n```\n\
    $ sudo nano /etc/default/motion\n```\n\nChange:\n\n```\nstart_motion_daemon=no\n\
    ```\n\nto:\n\n```\nstart_motion_daemon=yes\n```\n\nThen change:\n\n```\nstream_localhost\
    \ on\n```\n\nto:\n\n```\nstream_localhost off\n```\n\nTo get the web service running,\
    \ issue the command:\n\n```\n$ sudo service motion start\n```\n\nIf you are using\
    \ the Raspberry Pi Camera Module, there is an extra step. You need to edit the\
    \ file /etc/modules using the following command:\n\n```\n$ sudo nano /etc/modules\n\
    ```\n\nAdd the following line to the end of this file, then save and exit nano\
    \ as usual:\n\n```\nbcm2835-v4l2\n```\n\nReboot your Raspberry Pi and you should\
    \ now be able to open your web browser and view the webcam. To do this, you will\
    \ need to know the IP address of your Raspberry Pi ([Recipe 2.2](Recipe 2.2)).\
    \ You can also check that the webcam is working from the browser on your Raspberry\
    \ Pi by going to *http://localhost:8081*.\n\nFrom another computer on the same\
    \ network, open a browser and go to the URL *http://192.168.0.210:8081/*. You\
    \ will need to change the URL to match the IP address of your Raspberry Pi, but\
    \ keep the `:8081` port number on the end of the URL.\n\nIf all goes well, you\
    \ should see something like [Figure 4-7](Figure 4-7).\n\n![](img/54ed1f8e884bc184601bf6f652461a95_170_0.png)\n\
    \nFigure 4-7. A Raspberry Pi webcam\n\n## Discussion\n\nThe motion software is\
    \ really powerful. There are many other settings you can tweak to change how your\
    \ webcam works.\n\nBy default, the webcam will be viewable only from within your\
    \ network. If you want your webcam to be visible to the entire internet, you need\
    \ to set up *port forwarding* on your home hub. This will require you to log in\
    \ to the admin console for the hub, look for the port forwarding option, and enable\
    \ it for port 8081 for the IP address of the Raspberry Pi.\n\nYou will then be\
    \ able to view the webcam by using the external IP address allocated by your ISP.\
    \ This is usually shown on the front page of your admin console. But be aware:\
    \ unless you pay your ISP for a static IP address, this IP address is likely to\
    \ change every time you restart your home hub modem.\n\nServices such as No-IP\
    \ can also be used to provide dynamic domain name service (DNS), so that you can\
    \ register a domain name that automatically follows changes to your IP address.\n\
    \n## See Also\n\n- There is thorough documentation on the Motion website.\n- You\
    \ can find a list of webcams compatible with the Raspberry Pi at https://oreil.ly/_z4GH.\n\
    - To fix the IP address of your Raspberry Pi webcam so you can always find it,\
    \ see Recipe 2.3.\n- To use a webcam for computer vision projects, see [Link to\
    \ Come].\n- See Recipe 3.17 for information on using `apt-get`.\n\n## 4.4 Running\
    \ a Vintage Game Console Emulator\n\n### Problem\n\nYou want to turn your Raspberry\
    \ Pi into a vintage game console.\n\n### Solution\n\nIf you fancy rediscovering\
    \ your misspent youth and playing Asteroids on an emulator for the Atari 2600\
    \ (Figure 4-8), the RetroPie project will appeal to you.\n\n![](img/54ed1f8e884bc184601bf6f652461a95_172_0.png)\n\
    \nFigure 4-8. Asteroids on the Stella Atari 2600 emulator\n\nMany wonderful projects\
    \ have been built that create custom consoles and game tables complete with retro\
    \ games controllers.\nAlthough you can install RetroPie on top of Raspberry Pi\
    \ OS, the easiest way to use it is to write it onto a microSD card using the Raspberry\
    \ Pi Imager (Recipe 1.6).\n\n> ### WARNING\n> It is worth noting that even though\
    \ these games are ancient, they are still owned by someone. The ROM image files\
    \ that you need to play the games on an emulator, although easy to find on the\
    \ internet, are not necessarily yours to take. So please stick to the law.\n\n\
    ### Discussion\n\nThe emulator uses a surprisingly large amount of the Raspberry\
    \ Pi’s meager resources, so you might find that you need to use a Raspberry Pi\
    \ 4, 3, or 2.\nIn an internet search, you can find many people who have taken\
    \ this basic setup and added a retro USB controller, like the widely available\
    \ and quite low-cost controllers, and built the Pi and a monitor into a big arcade-style\
    \ housing.\nYou can also buy a kit called the Picade from Pimoroni to make a lovely\
    \ arcade machine (Figure 4-9).\n\n![](img/54ed1f8e884bc184601bf6f652461a95_174_0.png)\n\
    \nFigure 4-9. The Pimoroni Picade Kit\n\n### See Also\n\n- Full RetroPie documentation\
    \ is available on [the RetroPie site](https://retropie.org.uk/).\n\n## 4.5 Running\
    \ Minecraft: Pi Edition\n\n### Problem\n\nYou want to run the popular game Minecraft\
    \ on your Raspberry Pi.\n\n### Solution\n\nInstall Minecraft Pi, which you’ll\
    \ find in the Recommended Software tool (discussed in Recipe 4.2).\n\n![](img/54ed1f8e884bc184601bf6f652461a95_175_0.png)\n\
    \nFigure 4-10. Minecraft on Raspberry Pi\n\n### Discussion\n\nThe developers of\
    \ Minecraft have ported the game to the Raspberry Pi and Minecraft Pi (Figure\
    \ 4-10).\nTo get Minecraft to fit on the Raspberry Pi, the developers made some\
    \ shortcuts in the graphics code. This means that you can only play the game directly\
    \ on the Raspberry Pi with the keyboard, mouse, and monitor connected directly\
    \ to it. It will not work properly over a remote virtual network computing (VNC)\
    \ connection.\n\nThe Pi edition of Minecraft is based on the mobile version of\
    \ Minecraft and lacks some features, most notably Redstone.\n\n### See Also\n\n\
    - Find out more about the [Raspberry Pi port of Minecraft](https://www.raspberrypi.org/learning/programming-minecraft-pi/).\n\
    - Minecraft Pi also includes a Python programming interface, and in [Link to Come],\
    \ we’ll go over how to send commands to Python over a Secure Shell (SSH) connection\
    \ to do automated building.\n\n## 4.6 Turning your Raspberry Pi into a Radio Transmitter\n\
    \n> **NOTE**\n> Be sure to check out the [accompanying video for this recipe](https://www.youtube.com/watch?v=1vV8pE4l0p0).\n\
    \n### Problem\n\nYou want to convert your Raspberry Pi into a low-powered FM transmitter\
    \ that will send a radio signal to a normal FM radio receiver ([Figure 4-11](https://www.oreilly.com/library/view/make-great-stuff/9781449399191/graphics/0411.png)).\n\
    \n### Solution\n\nBack in the early days of the Raspberry Pi, some clever folks\
    \ at Imperial College, London, created some C code that allows you to do just\
    \ this. The download even plays the *Star Wars* theme as a sample. This project\
    \ will still work if you have an [original Raspberry Pi 1](https://www.raspberrypi.org/products/raspberry-pi-1-model-b/).\
    \ The code has not been updated since for newer versions of Raspberry Pi.\nFortunately,\
    \ however, the project lives on in an altogether more advanced project called\
    \ *rpitx*.\n\nAll you need is a short length of wire attached to general-purpose\
    \ input/output (GPIO) pin 4. A 10 cm female-to-male header lead will work just\
    \ fine for this. In fact, it should work with the radio right next to your Pi\
    \ without any kind of antenna—such is the strength of the transmission.\n\n![](img/54ed1f8e884bc184601bf6f652461a95_177_0.png)\n\
    \nThe first step is to install the rpitx software using the following commands.\
    \ Note that this installation will change some things about how your Raspberry\
    \ Pi is configured, including the frequency at which the GPU (graphics process)\
    \ works. So if this is your main Raspberry Pi, make sure you first back up anything\
    \ precious. Here’s the code you need:\n\n```\n$ sudo apt-get update\n$ git clone\
    \ https://github.com/F5OEO/rpitx\n$ cd rpitx\n$ ./install.sh\n```\n\nYou will\
    \ now need to do something else for a good 15 minutes or so while the software\
    \ installs. You might see what look like error messages and warnings, but these\
    \ are normal. At the end of the installation, the installer script will ask:\n\
    \n```\nIn order to run properly, rpitx need to modify /boot/config.txt.\nAre you\n\
    \    sure (y/n)\n```\n\nPress Y, and the script will then confirm the changes\
    \ it has made with the following message:\n\n```\nSet GPU to 250Mhz in order to\
    \ be stable\n```\n\nIf you need to reverse this change, edit /boot/config.txt\
    \ by removing the last line that says gpu_freq=250, then reboot.\n\nNext, find\
    \ yourself an FM radio receiver and tune it to 103.0 MHz. If this frequency is\
    \ already occupied by some other transmission, pick another frequency and make\
    \ note of it.\n\nNow run the following command (changing the frequency parameter\
    \ from 103.0 if you had to change frequency):\n\n```\nsudo ./pifmrds -freq \"\
    103.0\" -audio src/pifmrds/stereo_44100.wav\n```\n\nIf all is well, you should\
    \ hear the voice of the developer talking about left and right channels.\n\n###\
    \ Discussion\n\nYou need to know that this project may not be legal in your country.\
    \ The power output is higher than that of FM transmitters used with MP3 players.\n\
    \nWere you to put a Raspberry Pi in your vehicle, this would be a great way to\
    \ output sound through the vehicle’s audio system."
