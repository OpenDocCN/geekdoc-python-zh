- md: '## 3.3 Starting a Terminal Session


    ### Problem


    When using a Raspberry Pi, you need to issue text commands in a Terminal.


    ### Solution


    At the top of the Raspberry Pi desktop, select the Terminal icon (it looks like
    a black computer monitor), or, on the Start menu in the Accessories group, select
    the Terminal menu option (Figure 3-5).


    ### Discussion


    When the Terminal starts, it is set to your home directory (/home/pi).


    You can open as many Terminal sessions as you want. It is often useful to have
    a couple of sessions open in different directories so that you don’t need to constantly
    switch directories using `cd` (Recipe 3.4).

    When using the Terminal, everything is case sensitive. That is, if you are using
    a command, you must use the correct case when you’re typing. For example, the
    `ls` command that you will meet in the next recipe must be written as lowercase
    `ls` and not `LS` or `Ls` or `lS`. Similarly, all filenames are case sensitive,
    so files named *picture.jpg* and *Picture.jpg* are two different files.


    ### See Also


    In the next section (Recipe 3.4), you will look at navigating the directory structure
    using the Terminal.


    ## 3.4 Navigating the Filesystem Using a Terminal


    ### Problem


    You need to know how to change directory and move about the filesystem using the
    Terminal.


    ### Solution


    The main command used for navigating the filesystem is `cd` (change directory).
    After `cd`, you need to specify the directory that you want to change to. This
    can be either a *relative* path to a directory within your current directory or
    an *absolute* path to somewhere else on the filesystem.

    To see what the current directory is, use the command `pwd` (print working directory).


    ### Discussion


    Try out a few examples. Open a Terminal session, and you should see a prompt like
    this:


    ```

    pi@raspberrypi: ~ $

    ```


    The prompt that you will see after each command (`pi@raspberrypi: ~ $`) is a reminder
    of your username (`pi`) and your computer name (`raspberrypi`). The `~` character
    is shorthand for your home directory (`/home/pi`). So at any point you can change
    your current directory to your home directory as follows:


    ```

    $ cd ~

    ```


    > **TIP**


    Throughout the book, I use a `$` at the beginning of each line where you are expected
    to type a command. This is called the prompt. The response from the command line
    is not prefixed by anything; it appears just as it does on the Raspberry Pi’s
    screen.


    You can confirm that the command did indeed set the directory to the home directory
    by using the `pwd` command:


    ```

    $ pwd

    /home/pi

    ```


    If you want to move up one level in the directory structure, you can use the special
    value `..` (two dots) after the `cd` command, as shown here:


    ```

    $ cd ..

    $ pwd

    /home

    ```


    As you might have deduced by now, the path to a particular file or directory is
    made up of words separated by a /. So the very root of the entire filesystem is
    /, and to access the home directory within /, you would refer to /home/. Then,
    to find the *pi* directory within that, you would use /home/pi/. You can omit
    the final / from a path.


    Paths can be absolute (starting with a / and specifying the full path from the
    root), or they can be relative to the current working directory, in which case
    they must not start with a /.


    You will have full read and write access to the files in your home directory,
    but when you move into the places where system files and applications are kept,
    your access to some files will be restricted to read-only. You can override this
    (Recipe 3.12), but some care is required.


    Check out the *root* of the directory structure by entering the commands `cd /`
    and `ls`, as shown in Figure 3-6.


    ```

    pi@raspberrypi:~ $ cd /

    pi@raspberrypi:/ $ ls

    bin   dev   home  lost+found  mnt  proc  run  srv  tmp  var

    boot  etc   lib   media       opt  root  sbin sys  usr

    pi@raspberrypi:/ $

    ```


    Figure 3-6. Listing the contents of a directory


    The `ls` command (list) shows us all of the files and directories below (/) the
    root directory. You will see that there is a *home* directory listed, which is
    the directory you have just come from.


    Now change into one of those directories by using the commands shown in Figure
    3-7.


    You will see that the files and folders have some color coding. Files are displayed
    in various colors, whereas directories are dark blue.

    Unless you particularly like typing, the Tab key offers a convenient shortcut.
    If you start typing the name of a file, pressing the Tab key allows the autocomplete
    feature to attempt to complete the filename. For example, if you’re going to change
    directory to *network*, type the command **cd netw** and then press the Tab key.
    Because *netw* is enough to uniquely identify the file or directory, pressing
    the Tab key will autocomplete it.

    If what you have typed is not enough to uniquely identify the file or directory,
    pressing the Tab key another time will display a list of possible options that
    match what you have typed so far. So if you had stopped at *net* and pressed the
    Tab key, you would see something like Figure 3-8.


    You can provide an extra argument after `ls` to narrow down the things that you
    want to list. Change directory to `/etc` and then run the following:


    ```

    $ ls f*

    fake-hwclock.data  fb.modes  fstab  fuse.conf

    fonts:

    conf.avail  conf.d  fonts.conf  fonts.dtd


    foomatic:

    defaultspooler  direct  filter.conf


    fstab.d:

    pi@raspberrypi /etc $

    ```


    The * character is called a wildcard. In specifying `f*` after `ls`, we are saying
    that we want to list everything that begins with an *f*.

    Helpfully, the results first list all the files within `/etc` that begin with
    *f*, and then the contents of all the directories in that folder beginning with
    *f*.

    A common use of wildcards is to list all files with a certain extension (e.g.,
    `ls *.docx`).

    A convention in Linux (and many other operating systems) is to prefix files that
    should be hidden from the user by starting their name with a period. Any so-named
    files or folders will not appear when you type `ls` unless you supply `ls` with
    the option `-a` (all).

    For example:


    ```

    $ cd ~

    $ ls -a

    .                          Desktop                    .pulse

    ..                         .dillo                     .pulse-

    cookie

    Adafruit-Raspberry-Pi-Python-Code  .dmrc

    python_games

    .advance                   .emulationstation

    sales_log

    .AppleDB                  .fltk                      servo.py

    .AppleDesktop             .fontconfig                .stella

    .AppleDouble              .gstreamer-0.10

    stepper.py.save

    Asteroids.zip             .gvfs

    switches.txt.save

    atari_roms                indiecity

    Temporary Items

    .bash_history             .local

    thermometer.py

    .bash_logout

    .thumbnails

    .bashrc

    .cache

    .Xauthority

    .config

    .xsession-errors

    .dbus

    .xsession-errors.old


    motor.py

    .mozilla

    mydocument.doc

    Network Trash Folder

    .profile


    .vnc

    ```


    As you can see, the majority of the files and folders in your home directory are
    hidden.


    ### See Also


    See also [Recipe 3.14](Recipe 3.14).


    ## 3.5 Copying a File or Folder


    ### Problem


    You want to copy a file using a Terminal session.


    ### Solution


    Use the `cp` command to copy files and directories.


    ### Discussion


    You can, of course, copy files by using the File Manager and its copy and paste
    menu options ([Recipe 3.1](Recipe 3.1)) or keyboard shortcuts.

    The simplest example of copying in a Terminal session is to make a copy of a file
    within your working directory. The `cp` command is followed first by the file
    to copy and then by the name to be given to the new file.

    For example, the following example creates a file called *myfile.txt* and then
    makes a copy of it with the name *myfile2.txt*; you can find out more about the
    trick of creating a file using the `>` command in [Recipe 3.9](Recipe 3.9):'
  mdcn: '## 3.3 启动终端会话


    ### 问题


    使用树莓派时，你需要在终端中输入文本命令。


    ### 解决方案


    在树莓派桌面顶部，选择终端图标（它看起来像一个黑色的电脑显示器），或者在开始菜单的“附件”组中，选择终端菜单选项（图3-5）。


    ### 讨论


    终端启动时，默认设置为你的主目录（/home/pi）。


    你可以根据需要打开任意多个终端会话。同时打开几个位于不同目录的会话通常很有用，这样你就无需频繁使用 `cd` 命令切换目录（参见配方3.4）。

    使用终端时，所有内容都区分大小写。也就是说，如果你使用某个命令，输入时必须使用正确的大小写。例如，你将在下一个配方中遇到的 `ls` 命令必须写成小写的 `ls`，而不能是
    `LS`、`Ls` 或 `lS`。同样，所有文件名也区分大小写，因此名为 *picture.jpg* 和 *Picture.jpg* 的文件是两个不同的文件。


    ### 另请参阅


    在下一节（配方3.4）中，你将学习如何使用终端浏览目录结构。


    ## 3.4 使用终端浏览文件系统


    ### 问题


    你需要了解如何使用终端更改目录并在文件系统中移动。


    ### 解决方案


    用于浏览文件系统的主要命令是 `cd`（更改目录）。在 `cd` 之后，你需要指定要切换到的目录。这可以是当前目录内某个目录的*相对*路径，也可以是文件系统中其他位置的*绝对*路径。

    要查看当前目录是什么，请使用命令 `pwd`（打印工作目录）。


    ### 讨论


    尝试几个例子。打开一个终端会话，你应该会看到如下提示符：


    ```

    pi@raspberrypi: ~ $

    ```


    你在每个命令后看到的提示符（`pi@raspberrypi: ~ $`）是你的用户名（`pi`）和计算机名（`raspberrypi`）的提醒。`~` 字符是你的主目录（`/home/pi`）的简写。因此，在任何时候你都可以按如下方式将当前目录切换到主目录：


    ```

    $ cd ~

    ```


    > **提示**


    在本书中，我使用 `$` 作为每行开头需要你输入命令的地方。这被称为提示符。命令行的响应不带任何前缀；它就像在树莓派屏幕上显示的那样出现。


    你可以通过使用 `pwd` 命令来确认命令确实将目录设置为了主目录：


    ```

    $ pwd

    /home/pi

    ```


    如果你想在目录结构中向上移动一级，可以在 `cd` 命令后使用特殊值 `..`（两个点），如下所示：


    ```

    $ cd ..

    $ pwd

    /home

    ```


    正如你现在可能已经推断出的，特定文件或目录的路径是由用 / 分隔的单词组成的。因此，整个文件系统的根目录是 /，要访问 / 内的主目录，你会引用 /home/。然后，要找到其中的
    *pi* 目录，你会使用 /home/pi/。你可以省略路径末尾的 /。


    路径可以是绝对路径（以 / 开头并指定从根目录开始的完整路径），也可以是相对于当前工作目录的路径，这种情况下它们不能以 / 开头。


    你对主目录中的文件拥有完全的读写权限，但当你进入存放系统文件和应用程序的位置时，你对某些文件的访问将被限制为只读。你可以覆盖此限制（配方3.12），但需要谨慎操作。


    通过输入命令 `cd /` 和 `ls` 来查看目录结构的*根*，如图3-6所示。


    ```

    pi@raspberrypi:~ $ cd /

    pi@raspberrypi:/ $ ls

    bin   dev   home  lost+found  mnt  proc  run  srv  tmp  var

    boot  etc   lib   media       opt  root  sbin sys  usr

    pi@raspberrypi:/ $

    ```


    图3-6. 列出目录内容


    `ls` 命令（列出）向我们展示了根目录（/）下的所有文件和目录。你会看到列出了一个 *home* 目录，这正是你刚才来自的目录。


    现在使用图3-7所示的命令切换到其中一个目录。


    你会看到文件和文件夹有一些颜色编码。文件以各种颜色显示，而目录是深蓝色。

    除非你特别喜欢打字，否则 Tab 键提供了一个方便的快捷方式。如果你开始输入文件名，按 Tab 键可以让自动完成功能尝试补全文件名。例如，如果你要切换到 *network*
    目录，输入命令 **cd netw** 然后按 Tab 键。因为 *netw* 足以唯一标识该文件或目录，按 Tab 键将自动补全它。

    如果你输入的内容不足以唯一标识文件或目录，再次按 Tab 键将显示与你当前输入匹配的可能选项列表。因此，如果你输入到 *net* 就停止并按 Tab 键，你会看到类似图3-8的内容。


    你可以在 `ls` 后提供一个额外的参数来缩小要列出的内容范围。切换到 `/etc` 目录，然后运行以下命令：


    ```

    $ ls f*

    fake-hwclock.data  fb.modes  fstab  fuse.conf

    fonts:

    conf.avail  conf.d  fonts.conf  fonts.dtd


    foomatic:

    defaultspooler  direct  filter.conf


    fstab.d:

    pi@raspberrypi /etc $

    ```


    * 字符被称为通配符。在 `ls` 后指定 `f*`，表示我们想要列出所有以 *f* 开头的内容。

    有帮助的是，结果首先列出了 `/etc` 中所有以 *f* 开头的文件，然后是该文件夹中所有以 *f* 开头的目录的内容。

    通配符的一个常见用途是列出具有特定扩展名的所有文件（例如，`ls *.docx`）。

    Linux（以及许多其他操作系统）中的一个约定是，通过以句点开头来隐藏不应向用户显示的文件。任何以此命名的文件或文件夹在你输入 `ls` 时都不会出现，除非你为
    `ls` 提供 `-a`（全部）选项。

    例如：


    ```

    $ cd ~

    $ ls -a

    .                          Desktop                    .pulse

    ..                         .dillo                     .pulse-

    cookie

    Adafruit-Raspberry-Pi-Python-Code  .dmrc

    python_games

    .advance                   .emulationstation

    sales_log

    .AppleDB                  .fltk                      servo.py

    .AppleDesktop             .fontconfig                .stella

    .AppleDouble              .gstreamer-0.10

    stepper.py.save

    Asteroids.zip             .gvfs

    switches.txt.save

    atari_roms                indiecity

    Temporary Items

    .bash_history             .local

    thermometer.py

    .bash_logout

    .thumbnails

    .bashrc

    .cache

    .Xauthority

    .config

    .xsession-errors

    .dbus

    .xsession-errors.old


    motor.py

    .mozilla

    mydocument.doc

    Network Trash Folder

    .profile


    .vnc

    ```


    如你所见，你主目录中的大多数文件和文件夹都是隐藏的。


    ### 另请参阅


    另请参阅 [配方 3.14](Recipe 3.14)。


    ## 3.5 复制文件或文件夹


    ### 问题


    你想使用终端会话复制一个文件。


    ### 解决方案


    使用 `cp` 命令复制文件和目录。


    ### 讨论


    当然，你可以使用文件管理器及其复制和粘贴菜单选项（[配方 3.1](Recipe 3.1)）或键盘快捷键来复制文件。

    在终端会话中复制的最简单示例是在工作目录内复制一个文件。`cp` 命令后首先是要复制的文件，然后是新文件的名称。

    例如，以下示例创建一个名为 *myfile.txt* 的文件，然后制作一个名为 *myfile2.txt* 的副本；你可以在 [配方 3.9](Recipe
    3.9) 中了解更多关于使用 `>` 命令创建文件的技巧：'
