  md: '# # Chapter 3. Operating System


    > ### A NOTE FOR EARLY RELEASE READERS


    With Early Release ebooks, you get books in their earliest form—the author’s raw
    and unedited content as they write—so you can take advantage of these technologies
    long before the official release of these titles.


    This will be the 3rd chapter of the final book. Please note that the GitHub repo
    will be made active later on.


    If you have comments about how we might improve the content and/or examples in
    this book, or if you notice missing material within this chapter, please reach
    out to the author at simonmonkauthor@gmail.com.


    # ## 3.0 Introduction


    This chapter explores many aspects of the Linux operating system used by the Raspberry
    Pi. A lot of this involves the use of the command line. If you are used to Windows
    or macOS, this can come as a bit of a shock. However, when you get used to it,
    doing things with the command line can be surprisingly effective.


    You can accomplish many simple file operations like moving files around, renaming,
    copying, and deleting files graphically using a more Windows or macOS approach,
    and this is the subject of our first recipe.


    # ## 3.1 Browsing Files Graphically


    # ### Problem


    You want to move files around using a graphical interface like you can on a macOS-based
    machine or Windows PC.


    # ### Solution'
  merge: -1
  pgno: 94
- img_proc: true
  md: 'Use the File Manager.

    You can find this program on your Main menu, in the Accessories group (Figure
    3-1).

    Using the File Manager, you can drag a file or directory from one directory to
    another or use the Edit menu to copy a file from one location and paste it to
    a second. This operates in much the same way as the Windows File Manager or macOS
    Finder.


    ![](img/54ed1f8e884bc184601bf6f652461a95_95_0.png)


    # Discussion


    The lefthand side of the File Manager shows the folder structure.

    The central area displays the files in the current folder, which you can navigate
    using the buttons in the toolbar or by typing a location in the file path area
    at the top.

    You can right-click a file to open a menu presenting options you can use on that
    file (Figure 3-2).'
  merge: -1
  pgno: 95
- img_proc: true
  md: '![](img/54ed1f8e884bc184601bf6f652461a95_96_0.png)


    You can also select more than one file at a time for copying or dragging by holding
    down the Ctrl key while you select files, or you can select a range of files by
    selecting one file and then holding down the Shift key while you select the end
    of the list of files that you want to select.


    # See Also


    See also [Recipe 3.5](Recipe 3.5).


    # 3.2 Copying Files onto a USB Flash Drive'
  merge: -1
  pgno: 96
- img_proc: true
  md: '# Problem


    You want to copy a file from your Raspberry Pi onto a USB flash drive.


    # Solution


    Insert the USB flash drive into a USB port, and the dialog shown in Figure 3-3
    should appear. Select OK to open it in the File Manager.


    ![](img/54ed1f8e884bc184601bf6f652461a95_97_0.png)


    The drive will be mounted in /media/pi followed by the name of the flash drive
    (in my case, UNTITLED). To copy a file from your home folder, drag it onto the
    folder representing your flash drive, as shown in Figure 3-4.'
  merge: -1
  pgno: 97
- img_proc: true
  md: '![](img/54ed1f8e884bc184601bf6f652461a95_98_0.png)


    Windows, macOS, and Linux all have their own disk formats. The USB flash drive
    should be formatted as FAT32 or exFAT for maximum compatibility with macOS and
    Windows computers. exFAT supports larger disk sizes than FAT32.


    # Discussion


    After your USB flash drive is mounted on the Raspberry Pi’s filesystem, you can
    also copy files using the command line. The following example copies the file
    *test.txt* to the flash drive:


    ```

    $ cd /home/pi

    $ cp test.txt /media/pi/UNTITLED/

    ```


    In this example, `cd` is the command to change directory, and `cp` is the copy
    command. These commands are explained more fully in [Recipe 3.4](Recipe 3.4) and
    [Recipe 3.5](Recipe 3.5).'
