    $ sudo raspi-config

    ```


    Select the Overclock option. You are then presented with the options shown in
    Figure 1-19.


    ![](img/54ed1f8e884bc184601bf6f652461a95_38_0.png)


    Select an option. If you find that your Raspberry Pi starts to become unstable
    and hangs unexpectedly, you might need to choose a more conservative option or
    turn overclocking off by setting it back to `None`.


