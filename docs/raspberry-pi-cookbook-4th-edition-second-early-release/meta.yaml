    the monitor connected to HDMI-1 on the left.


    If you have an older Raspberry Pi or a model A or A+ and run out of USB sockets,
    you will also need a USB hub.


    # See Also


    The official Raspberry Pi Quick Start Guide.


    # 1.3 Enclosing a Raspberry Pi


    # Problem'
  - '[PAGE 13]


    You need an enclosure for your Raspberry Pi.


    # Solution


    Apart from the Raspberry Pi 400, Raspberry Pis do not come with an enclosure unless
    you buy one as part of a kit. This makes it a little vulnerable, given that there
    are bare connections on the underside of the circuit board that could easily be
    short-circuited if the Raspberry Pi is placed on something metal.


    It is a good idea to buy some protection for your Raspberry Pi in the form of
    a case. If you intend to use the Raspberry Pi’s general-purpose input/output (GPIO)
    pins (the pins that allow you to connect to external electronics), the PiBow Coupé
    shown in Figure 1-6 is a beautiful and practical design that is available for
    both the Raspberry Pi 4 and earlier versions.


    # Discussion


    There is a vast array of case styles to choose from, including the following:


    +   - Simple, two-part, click-together plastic boxes

    - VESA mountable boxes (for attaching to the back of a monitor or TV)

    - Lego-compatible boxes

    - 3D-printed box designs

    - Laser-cut acrylic designs

    - Designs that act as a large heatsink for cooling

    - Designs with a built-in fan

    - DIN-rail designs for labs and workshops'
  - '[PAGE 14]


    ![](img/54ed1f8e884bc184601bf6f652461a95_14_0.png)


    Figure 1-6. A Raspberry Pi 2 in a PiBow Coupé


    The case you buy is very much a matter of personal taste. However, here are some
    of the things that you need to consider:


    +   - Do you need to have access to the GPIO connector? This is important if you
    plan to attach external electronics to your Raspberry Pi.

    - Is the case well ventilated? This is important if you plan to overclock your
    Raspberry Pi (Recipe 1.12) or run it hard playing videos or games, because these
    will all generate more heat.

    - Finally, make sure you get one that fits your model of Raspberry Pi.


    If you have access to a 3D printer, you can also print your own case. Search for
    Raspberry Pi on [Thingiverse](https://www.thingiverse.com/) or [MyMiniFactory](https://www.myminifactory.com/),
    and you will find lots of designs.'
  - '[PAGE 15]


    You will also find heatsink kits that have tiny self-adhesive heatsinks to attach
    to the chips on the Raspberry Pi. These can be of some use if you are demanding
    a lot of your Raspberry Pi, say by playing a lot of videos, but generally they
    are the equivalent of “go-faster” stripes on a car.

    If you have a Raspberry Pi 4, you can reduce the temperature by fitting a small
    fan such as the Pimoroni Fan SHIM as shown in Figure 1-7.'
  - '[PAGE 16]


    ![](img/54ed1f8e884bc184601bf6f652461a95_16_0.png)


    Figure 1-7. The Pimoroni Fan SHIM


    # See Also'
  - '[PAGE 17]


    You will also find many styles of cases at other Raspberry Pi suppliers and on
    eBay.


    # 1.4 Selecting a Power Supply


    # Problem


    You need to select a power supply for your Raspberry Pi.


    # Solution


    The basic electrical specification for a power supply suitable for a Raspberry
    Pi is that it provides a regulated 5V DC (direct current).

    The amount of current that the power supply must be capable of providing depends
    both on the model of Raspberry Pi and on the peripherals attached to it. It is
    worth getting a power supply that can easily cope with the Raspberry Pi, and you
    should consider 1A to be a minimum for any model of Raspberry Pi.

    If you buy your power supply from the same place that you buy the Raspberry Pi,
    the seller should be able to tell you whether it will work with the Raspberry
    Pi.

    The Raspberry Pi 4 should be used with a 3A power supply. This is in part because
    its greater processing power than earlier models requires more electrical power,
    but also because its two USB3 ports are able to supply up to 1.2A to high-power
    USB peripherals such as external USB drives.

    If you are going to be using WiFi or USB peripherals that require significant
    amounts of power with pre-Raspberry Pi 4 models, you should get a power supply
    capable of 1.5A or even 2A. Also beware of very low-cost power supplies that might
    not provide an accurate or reliable 5V.


    # Discussion'
  - '[PAGE 18]


    The Raspberry Pi 4 is the first Raspberry Pi to switch to using the more modern
    USB-C connector. Unlike the micro-USB connector used on earlier boards, this connector
    is reversable (Figure 1-8).


    ![](img/54ed1f8e884bc184601bf6f652461a95_18_0.png)


    In Figure 1-8, you can see the USB-C power connector of a Raspberry Pi 4 below
    the micro-USB connector of a Raspberry Pi 3. As an aside, you can also see the
    pair of micro-HDMI video ports that replace the single full-sized HDMI connector.


    Whether your Raspberry Pi uses a USB-C connector or a micro-USB connector, the
    power supply and connectors are actually the same as those found in many smartphone
    chargers. If they terminate in a micro-USB plug,'
  - '[PAGE 19]


    they are almost certainly 5V (but check). The only question, then, is whether
    they can supply enough current.


    If they can’t, a few bad things can happen:


    +   - They might become hot and be a potential fire risk.

    - They might simply fail.

    - At times of high load (say, when the Pi is using WiFi or playing video), the
    voltage might dip and the Raspberry Pi might reset itself.


    If you are using a Raspberry Pi 3 or earlier, look for a power supply that says
    it can supply 1A or more. If it specifies a number of watts (W) rather than A,
    divide the number of watts by 5 to get the number of amps. So a 5V 10W power supply
    can supply 2A (2,000mA).


    Using a power supply with, say, a maximum current of 2A will not use any more
    electricity than a 700mA power supply. The Raspberry Pi takes only as much current
    as it needs.


    In Figure 1-9, I measure the current taken by a Raspberry Pi model B and compare
    it with a Raspberry Pi 2 model B and a Raspberry Pi 4.'
- md: '## 1.5 Selecting an Operating System


    ### Problem


    There are a number of different Raspberry Pi operating systems, and you are not
    sure which one to use.


    ### Solution


    The answer to this question depends on what you intend to do with your Raspberry
    Pi.


    For general use as a computer or for using in electronic projects, you should
    use Raspberry Pi OS, the standard and official distribution for the Raspberry
    Pi.


    If you plan to use your Raspberry Pi as a media center, there are a number of
    distributions (versions of Linux) specifically for that purpose (see Recipe 4.1).


    In this book, we use Raspberry Pi OS almost exclusively, although most of the
    recipes will work with any Debian-based Linux distribution.


    ### Discussion


    If you are interested in trying out some different distributions, you can purchase
    some microSD cards, which are not expensive, and copy the various distributions
    onto them. If you do this, it is a good idea to keep your files that you don’t
    want to lose on a USB flash drive plugged into your Raspberry Pi.


    Note that if you are using one of the upcoming recipes to write your own SD card,
    you need to have a computer that has an SD card slot (and an SD-to-microSD adapter),
    or you can buy an inexpensive USB SD card reader.


    ### See Also


    The official list of Raspberry Pi distributions.


    ## 1.6 Installing an Operating System Using Pi Imager


    ### Problem


    You want to put the operating system for your Raspberry Pi directly onto a microSD
    card ready for use by your Pi.


    ### Solution


    Before you can use your Raspberry Pi, you must prepare a microSD card with the
    Raspberry Pi OS operating system by writing a disk image onto the microSD card.


    The process of writing the disk image onto the microSD card is as follows:


    1.  Using a Mac, Windows, or Linux computer (not your Raspberry Pi), download
    the [Raspberry Pi Imager](https://www.raspberrypi.com/software/).

    2.  Insert the microSD card into your computer. It’s also a good idea to disconnect
    any other removable media so that you don’t accidentally overwrite the wrong device.

    3.  Start the Raspberry Pi Imager (Figure 1-10).

    4.  Select the Operating System as Raspberry Pi OS (32 bit) and the SD card.

    5.  Click Write and wait while the image file is copied onto the removable media.


    After the SD card or other removable media is prepared, you can connect it to
    your Raspberry Pi, and when the Raspberry Pi is powered up, it will boot into
    whatever operating system distribution you installed.


    ### Discussion


    Vendors of hardware sometimes offer their own disk image that has support for
    their hardware built into it. It’s best to avoid using such images because doing
    so means that you will not get all the benefits of using a standard Raspberry
    Pi OS distribution and all the preinstalled software. It also means that if you
    have a problem with a piece of software, it will be a lot more difficult to find
    support because you are using a nonstandard distribution.


    ### MICROSD CARDS


    Not all microSD cards are created equal, and the performance of your Raspberry
    Pi will be better with a better card. So look for a card specified as being “class
    10.” Raspberry Pi OS includes a utility ([Link to Come]) to test your microSD
    card. You can find it under Accessories, Raspberry Pi Diagnostics.


    When it comes to capacity, you should look for cards of at least 16 GB, and really,
    given the small difference in price, a 32 GB card is the better choice, as it
    will give you plenty of room for expansion.


    ### See Also


    The Raspberry Pi guide to installing Raspberry Pi OS can be found here: [https://www.raspberrypi.com/software/](https://www.raspberrypi.com/software/)


    ## 1.7 Booting Up Your Raspberry Pi for the First Time


    ### Problem


    You’ve set up a microSD card, and you want to know how to set up your Raspberry
    Pi.


    ### Solution


    The first time that you boot up your Raspberry Pi (as shown in Figure 1-12), you
    will be taken through some questions to set up your Raspberry Pi.


    Clicking Next prompts you to create a new user account (Figure 1-13).


    Prior to April 2022 this step was not part of the setup procedure, as the username
    of ‘pi’ was automatically created for you to use. As a result, many tutorials
    and books assume that your home directory is /home/pi. Unless you have strong
    feelings about your username, I would still stick to creating a user called ‘pi’
    but pick a good password (not the default of ‘raspberry’).


    You are then asked to connect to a WiFi network and if you want to check for updates.
    Updating requires an internet connection, so it won’t work unless you have connected
    to your network. If you are connected (either by WiFi or Ethernet), it’s a good
    idea to check for updates now. If not, you can always check later using [Recipe
    3.40](Recipe 3.40).


    After you are up and running, the first thing you should do is connect your Raspberry
    Pi to the internet (Recipes 2.1 and 2.5).


    ### Discussion


    It is a good idea to set the right timezone. If you don’t, then the Raspberry
    Pi will show the incorrect time, because it gets its time from an internet time
    server.


    ### See Also


    The Raspberry Pi guide to installing Raspberry Pi OS can be found here: https://www.raspberrypi.com/software/


    ## 1.8 Booting from a Real Hard Disk or USB Flash Drive


    ### Problem


    Your microSD card is too small and/or you are concerned about your entire operating
    system running on an SD card.


    ### Solution


    Before the Raspberry Pi 4 and 400 came along, this was possible, but not very
    easy, involving some complex commands and the possibility of ‘bricking’ your Raspberry
    Pi if you got it wrong. If you have a Raspberry Pi 4 or 400, then it is now really
    straight-forward and starts with the Raspberry Pi Imager.


    The process is similar to setting up a microSD card using the Raspberry Pi Imager.
    To follow this recipe, you will need a Windows, Mac or Linux computer; a USB SSD
    (Solid State Disk) and also a microSD card. Even though the whole point of this
    recipe is to replace the microSD card as the boot device, you still need two microSD
    cards (one being your existing microSD boot device for your Raspberry Pi) and
    a second blank microSD card.


    1.  Insert the blank microSD card into your card reader.

    2.  Start the Raspberry Pi Imager and then from the Operating System drop-down,
    select *Misc utility Images* and then *Bootloader* and then *USB Boot* (Figure
    1-14). Note that if these options aren’t present in your Raspberry Pi Imager,
    then you probably need to download [the latest version](https://www.raspberrypi.com/software/).

    3.  Select your microSD card from the Storage drop-down and then click Write.

    4.  Put the newly written microSD card into your Raspberry Pi and power it up.
    The only purpose of this microSD card image is to reconfigure your Raspberry Pi
    for USB booting. Once it’s done its work, the screen will turn green.

    5.  Power down your Raspberry Pi and swap over the microSD cards, so that you
    now have your original microSD system card.

    6.  Boot your Raspberry Pi and then from the Menu, select *Accessories* and then
    *SD Card Copier* (Figure 1-15). Select your system microSD card as the source
    and the external USB drive as the destination, then click Start.

    7.  When the copy is complete, you can shut down your Raspberry Pi again and remove
    the microSD card. Next time you switch on your Raspberry Pi, it should boot from
    the USB drive.'
  mdcn: '## 1.5 选择操作系统


    ### 问题


    树莓派有多种不同的操作系统，你不确定该使用哪一个。


    ### 解答


    这个问题的答案取决于你打算用树莓派做什么。


    如果只是作为通用计算机使用，或用于电子项目，你应该使用 **Raspberry Pi OS**，这是树莓派的标准官方发行版。


    如果你计划将树莓派用作媒体中心，有一些专门为该目的设计的发行版（Linux 版本）（参见配方 4.1）。


    在本书中，我们几乎只使用 **Raspberry Pi OS**，尽管大多数配方也适用于任何基于 Debian 的 Linux 发行版。


    ### 讨论


    如果你有兴趣尝试一些不同的发行版，可以购买一些 microSD 卡（它们并不贵），并将各种发行版复制到上面。如果你这样做，最好将不想丢失的文件保存在插入树莓派的
    USB 闪存盘上。


    请注意，如果你使用后续的某个配方来写入自己的 SD 卡，你需要一台带有 SD 卡插槽（以及 SD 到 microSD 适配器）的计算机，或者你可以购买一个便宜的
    USB SD 卡读卡器。


    ### 另请参阅


    树莓派官方发行版列表。


    ## 1.6 使用 Pi Imager 安装操作系统


    ### 问题


    你想将树莓派的操作系统直接写入 microSD 卡，以便你的树莓派可以直接使用。


    ### 解答


    在使用树莓派之前，你必须通过将磁盘映像写入 microSD 卡来准备一张装有 **Raspberry Pi OS** 操作系统的 microSD 卡。


    将磁盘映像写入 microSD 卡的过程如下：


    1.  使用 Mac、Windows 或 Linux 计算机（不是你的树莓派），下载 [Raspberry Pi Imager](https://www.raspberrypi.com/software/)。

    2.  将 microSD 卡插入你的计算机。最好断开任何其他可移动介质的连接，以免意外覆盖错误的设备。

    3.  启动 Raspberry Pi Imager（图 1-10）。

    4.  将操作系统选择为 **Raspberry Pi OS (32 bit)**，并选择 SD 卡。

    5.  点击 **Write**，等待映像文件复制到可移动介质上。


    准备好 SD 卡或其他可移动介质后，你可以将其连接到树莓派。当树莓派通电时，它将启动到你安装的任何操作系统发行版。


    ### 讨论


    硬件供应商有时会提供自己的磁盘映像，其中内置了对其硬件的支持。最好避免使用此类映像，因为这样做意味着你将无法获得使用标准 **Raspberry Pi OS**
    发行版和所有预装软件的所有好处。这也意味着，如果你在某个软件上遇到问题，找到支持会困难得多，因为你使用的是非标准发行版。


    ### MICROSD 卡


    并非所有的 microSD 卡都生而平等，使用更好的卡，你的树莓派性能会更好。因此，请寻找标明为“class 10”的卡。**Raspberry Pi OS**
    包含一个实用程序（[链接待补充]）来测试你的 microSD 卡。你可以在“附件”下的“Raspberry Pi 诊断”中找到它。


    在容量方面，你应该寻找至少 16 GB 的卡，实际上，考虑到价格差异很小，32 GB 的卡是更好的选择，因为它将为你提供充足的扩展空间。


    ### 另请参阅


    树莓派安装 **Raspberry Pi OS** 的指南可在此处找到：[https://www.raspberrypi.com/software/](https://www.raspberrypi.com/software/)


    ## 1.7 首次启动你的树莓派


    ### 问题


    你已经设置好了 microSD 卡，想知道如何设置你的树莓派。


    ### 解答


    首次启动树莓派时（如图 1-12 所示），你将被引导回答一些问题来设置你的树莓派。


    点击“下一步”会提示你创建一个新的用户账户（图 1-13）。


    在 2022 年 4 月之前，此步骤不是设置过程的一部分，因为系统会自动为你创建用户名“pi”。因此，许多教程和书籍都假设你的主目录是 `/home/pi`。除非你对用户名有强烈偏好，否则我仍然建议创建一个名为“pi”的用户，但选择一个好密码（而不是默认的“raspberry”）。


    然后，系统会要求你连接到 WiFi 网络，以及是否要检查更新。更新需要互联网连接，因此除非你已连接到网络，否则无法进行。如果你已连接（通过 WiFi 或以太网），现在检查更新是个好主意。如果没有，你随时可以稍后使用
    [配方 3.40](Recipe 3.40) 进行检查。


    启动并运行后，你应该做的第一件事是将你的树莓派连接到互联网（配方 2.1 和 2.5）。


    ### 讨论


    设置正确的时区是个好主意。如果不设置，树莓派将显示不正确的时间，因为它从互联网时间服务器获取时间。


    ### 另请参阅


    树莓派安装 **Raspberry Pi OS** 的指南可在此处找到：https://www.raspberrypi.com/software/


    ## 1.8 从真正的硬盘或 USB 闪存盘启动


    ### 问题


    你的 microSD 卡太小，和/或你担心整个操作系统都在 SD 卡上运行。


    ### 解答


    在树莓派 4 和 400 出现之前，这是可能的，但并不容易，涉及一些复杂的命令，如果操作不当，有可能“变砖”你的树莓派。如果你有树莓派 4 或 400，那么现在这变得非常简单，可以从
    Raspberry Pi Imager 开始。


    该过程类似于使用 Raspberry Pi Imager 设置 microSD 卡。要遵循此配方，你需要一台 Windows、Mac 或 Linux 计算机；一个
    USB SSD（固态硬盘）以及一张 microSD 卡。尽管此配方的全部意义在于用 USB 驱动器替换 microSD 卡作为启动设备，但你仍然需要两张 microSD
    卡（一张是你现有的用于树莓派的 microSD 启动设备，另一张是空白的 microSD 卡）。


    1.  将空白的 microSD 卡插入读卡器。

    2.  启动 Raspberry Pi Imager，然后从“操作系统”下拉菜单中，选择 *Misc utility Images*，然后选择 *Bootloader*，再选择
    *USB Boot*（图 1-14）。请注意，如果这些选项在你的 Raspberry Pi Imager 中不存在，那么你可能需要下载 [最新版本](https://www.raspberrypi.com/software/)。

    3.  从“存储”下拉菜单中选择你的 microSD 卡，然后点击 **Write**。

    4.  将新写入的 microSD 卡放入你的树莓派并启动它。这张 microSD 卡映像的唯一目的是重新配置你的树莓派以进行 USB 启动。一旦完成其工作，屏幕将变为绿色。

    5.  关闭树莓派电源并更换 microSD 卡，这样你现在使用的是原来的 microSD 系统卡。

    6.  启动你的树莓派，然后从菜单中选择 *Accessories*，再选择 *SD Card Copier*（图 1-15）。选择你的系统 microSD
    卡作为源，外部 USB 驱动器作为目标，然后点击 **Start**。

    7.  复制完成后，你可以再次关闭树莓派并取出 microSD 卡。下次打开树莓派时，它应该会从 USB 驱动器启动。'
