    On the line for this entry you can see the text `1a86:5512`. The part before the
    : is the Vendor ID and 5512 is the product ID. You need to know these, because
    you are going to use them in a configuration file.


    Create and edit a new file in nano using the command:


    ```

    $ sudo nano /etc/udev/rules.d/97-ctc-lasercutter.rules

    ```'
- md: "You can find information on editing files in Recipe 3.7. Paste the following\
    \ test into the file and if your Vendor and Product IDs are different from mine,\
    \ change the appropriate parts of the text to match your IDs.\n\n```\nSUBSYSTEM==\"\
    usb\", ATTRS{idVendor}==\"[1a86]\", ATTRS{idProduct}==\"[5512]\", ENV{DEVTYPE}==\"\
    usb_device\", MODE=\"0664\", GROUP=\"lasercutter\"\n```\n\nReboot your Raspberry\
    \ Pi and then continue the installation by running the command below to install\
    \ some more modules that K40 Whisperer needs.\n\n```\n$ sudo apt-get install libxml2-dev\
    \ libxslt-dev\n$ sudo apt-get install libusb-1.0-0\n$ sudo apt-get install libusb-1.0-0-dev\n\
    ```\n\nMake sure that you are in the directory where you downloaded the K40 Whisperer\
    \ and run the following command\n\n```\n$ pip install -r requirements.txt\n```\n\
    \nYou are now ready to run the program using the following command. This will\
    \ open a window. Go to File and then Options to configure the software (Figure\
    \ 4-6).\n\n```\n$ python k40_whisperer.py\n```\n\n![](img/54ed1f8e884bc184601bf6f652461a95_192_0.png)\n\
    \nFigure 4-18. Configuring K40 Whisperer\n\nConsult the manual that came with\
    \ your laser cutter to find the version of the control board used in it. If you\
    \ can't find this, you might need to try a few different options on the *Board\
    \ Name* setting. You do not need to change any of the other settings.\n\nWith\
    \ the Settings window closed, you can load an SVG file to cut (Figure 4-18).\n\
    \n![](img/54ed1f8e884bc184601bf6f652461a95_193_0.png)\n\nFigure 4-19. Ready to\
    \ Cut!\n\n## Discussion\n\nLaser cutters often come with their own proprietary\
    \ software to control the cutter that is generally run on a Microsoft Windows\
    \ computer. It may even have a hardware USB dongle designed to tie that piece\
    \ of software to your computer.\n\nThe K40 Whisperer software cuts and engraves\
    \ directly from SVG drawings. You just draw outlines in different colors with\
    \ a line width of 0.1mm. Red lines mean cut, blue lines mean vector engrave (lightly\
    \ burn an outline) and black lines mean raster engrave (scan back and forth to\
    \ burn out an area of the surface).\n\n## See Also\n\nFor full information on\
    \ K40 Whisperer see https://www.scorchworks.com/K40whisperer\n\nA Raspberry Pi\
    \ also makes a good controller for a 3D printer (see [Link to Come]).\n\nTo create\
    \ the SVG drawings for your laser cutting and etching, you can use InkScape ([Link\
    \ to Come]).\n\nA Raspberry Pi also makes a great controller for a 3D printer.\
    \ For full documentation on Octoprint, see https://octoprint.org/\n\n# Chapter\
    \ 5. Python Basics\n\n> ### A NOTE FOR EARLY RELEASE READERS\n\nWith Early Release\
    \ ebooks, you get books in their earliest form—the author’s raw and unedited content\
    \ as they write—so you can take advantage of these technologies long before the\
    \ official release of these titles.\n\nThis will be the 5th chapter of the final\
    \ book. Please note that the GitHub repo will be made active later on.\n\nIf you\
    \ have comments about how we might improve the content and/or examples in this\
    \ book, or if you notice missing material within this chapter, please reach out\
    \ to the author at simonmonkauthor@gmail.com.\n\n## 5.0 Introduction\n\nAlthough\
    \ many languages can be used to program the Raspberry Pi, Python is the most popular.\
    \ In fact, the *Pi* in *Raspberry Pi* is inspired by the word *python*.\n\nIn\
    \ this chapter, you’ll find a host of recipes to help you start programming with\
    \ Raspberry Pi.\n\n## 5.1 Deciding Between Python 2 and Python 3\n\n### Problem\n\
    \nYou need to use Python but are unsure which version to use.\n\n### Solution\n\
    \nUse both. Use Python 3 until you face a problem that is best solved by reverting\
    \ to version 2.\n\n### Discussion\n\nAlthough Python’s most recent version, Python\
    \ 3, has been around for years, you’ll find that a lot of people still use Python\
    \ 2. In fact, in the Raspberry Pi OS distribution, both versions are supplied,\
    \ and version 2 is just called Python, whereas version 3 is called Python 3. And\
    \ Python 3 is run by using the command `python3`. The examples in this book are\
    \ written for Python 3 unless otherwise stated. Most will run on both Python 2\
    \ and Python 3 without modification.\n\nThis reluctance on the part of the Python\
    \ community to ditch the older version is largely because Python 3 introduced\
    \ some changes that broke compatibility with version 2. As a result, some of the\
    \ huge body of third-party libraries developed for Python 2 won’t work under Python\
    \ 3.\n\nMy strategy is to write in Python 3 whenever possible, reverting to Python\
    \ 2 when I need to because of compatibility problems.\n\n### See Also\n\nFor a\
    \ good summary of the Python 2 versus Python 3 debate, see the [Python wiki](https://wiki.python.org/moin/Python2orPython3).\n\
    \n## 5.2 Choosing a Python Editor\n\n### Problem\n\nThere are lots of options\
    \ when it comes to Python editors, and you want to know which one you should start\
    \ with.\n\n### Solution\n\nMost people will start with either Thonny ([Recipe\
    \ 5.3](#)) or Mu ([Recipe 5.4](#)). Both are good editors and both are easy to\
    \ use.\n\nThonny is pre-installed with Raspberry Pi OS whereas, Mu has to be installed.\
    \ You will find lots of tutorials for both editors, and Thonny is recommended\
    \ over Mu in most material from the Raspberry Pi Foundation.\n\n### Discussion\n\
    \nIt doesn’t matter too much which editor you start with. You might like to try\
    \ both Thonny and Mu out and see which you like best. As you get more advanced\
    \ in your programming experience, you should try VS Code (Recipe 4.11) as a more\
    \ professional tool.\n\n### See Also\n\nThonny is described in Recipe 5.3 and\
    \ VS Code in Recipe 4.11.\n\n## 5.3 Editing Python Programs with Thonny\n\n###\
    \ Problem\n\nYou want to edit your Python programs using Thonny.\n\n### Solution\n\
    \nThonny should be pre-installed with Raspberry Pi OS. But if for any reason,\
    \ it is not in the Programming section of your menu, you can install it using\
    \ the Recommended Software tool (Recipe 4.2).\n\nStart by opening Thonny from\
    \ the Programming section of your menu and enter the following lines of text,\
    \ as also shown in Figure 5-1.\n\n```\nfor i in range(1, 10):\n    print(i)\n\
    ```\n\nWhen you start the second line of the program, the second line with the\
    \ print statement should indent automatically.\n\n![](img/54ed1f8e884bc184601bf6f652461a95_198_0.png)\n\
    \nFigure 5-1. The Thonny Editor\n\nYou can run the program to see what it does\
    \ by pressing the Run button. Before it will run the program, Thonny will prompt\
    \ you to save the file. Give it a name such as count.py. The program will then\
    \ run and you will see the output from the program at the bottom of the Thonny\
    \ window (Figure 5-2).\n\n![](img/54ed1f8e884bc184601bf6f652461a95_199_0.png)\n\
    \n### Discussion\n\nWe haven’t started on Python programming yet, but from this\
    \ example, you can see how a program is a matter of giving instructions to the\
    \ computer in the Python programming language. In this case, the instructions\
    \ are to print out a series of numbers.\n\n### See Also\n\nA popular alternative\
    \ to Thonny is Mu ([Recipe 5.4](https://example.com/recipe5.4)).\n\nThe official\
    \ Thonny web page can be found here: [https://thonny.org/](https://thonny.org/)\n\
    \nAs well as using Mu to edit and run Python files, you can also take a lower-tech\
    \ approach by editing files in nano (#SEC3.6) and then running them from a Terminal\
    \ session (#SEC5.4).\n\n## 5.4 Editing Python Programs with Mu\n\n### Problem\n\
    \nYou want to edit your Python programs using Mu.\n\n### Solution\n\nMu is not\
    \ preinstalled in the latest versions of Raspberry Pi OS. So, to install it, use\
    \ the Recommended Software tool (Recipe 4.2). Once it’s installed, you will find\
    \ it in the Programming section of the Main menu (Figure 5-3).\n\n![](img/54ed1f8e884bc184601bf6f652461a95_200_0.png)\n\
    \nWhen you first start Mu, you are prompted to select a mode (Figure 5-4).\n\n\
    ![](img/54ed1f8e884bc184601bf6f652461a95_201_0.png)\n\nFigure 5-4. Selecting a\
    \ mode for Mu\n\nSelect the Python 3 mode and click OK. This opens the Mu editor,\
    \ so it’s ready for you to start writing some Python.\n\nLet’s try it out. Carefully\
    \ type the following test into the editor area under the comment “Write your code\
    \ here :-)”:\n\n```\nfor i in range(1, 10):\n    print(i)\n```\n\nThis short program\
    \ will count to 9. Don’t worry how it works for now; all will be explained in\
    \ Recipe 5.23. Note that when you get to the end of the first line and press Enter,\
    \ the second line with the print statement should indent automatically (Figure\
    \ 5-5)."
