    $ sudo rm /var/lib/dpkg/status\n$ sudo touch /var/lib/dpkg/status\n```\n\n安装过程通常需要一些时间，因为文件必须下载并安装。某些安装还会在你的桌面或开始菜单的程序组中添加快捷方式。\n\
    \n你可以使用命令 `apt-get search` 后跟搜索字符串（如 `abiword`）来搜索要安装的软件。这将显示你可以安装的匹配软件包列表。\n\n\
    ### 另请参阅\n\n参见 [配方 3.18](Recipe 3.18) 了解如何删除不再需要的程序以释放空间。\n\n另请参见配方 3.21 了解如何从\
    \ GitHub 下载源代码。\n要使用图形用户界面安装软件，请参见配方 4.2。\n\n## 3.18 删除使用 apt-get 安装的软件\n\n###\
    \ 问题\n\n使用 `apt-get` 安装了大量程序后，你现在发现想要删除其中一些。\n\n### 解决方案\n\n`apt-get` 工具有一个选项（`remove`）可以删除软件包，但它只会删除那些通过\
    \ `apt-get install` 安装的软件包。\n\n例如，如果你想删除 AbiWord，你会使用以下命令：\n\n```\n$ sudo apt-get\
    \ remove abiword\n```\n\n### 讨论\n\n像这样删除软件包并不总是会删除所有内容，因为软件包通常还有作为依赖项安装的先决条件软件包。要删除这些，你可以使用\
    \ `autoremove` 选项，如下所示：\n\n```\n$ sudo apt-get autoremove abiword\n$ sudo apt-get\
    \ clean\n```\n\n`apt-get clean` 选项将对未使用的软件包安装文件进行进一步的清理。\n\n### 另请参阅\n\n参见配方 3.17\
    \ 了解如何使用 `apt-get` 安装软件包。\n\n## 3.19 使用 Pip 安装 Python 软件包\n\n### 问题\n\n你想使用 pip（Pip\
    \ Installs Packages）包管理器来安装 Python 库。\n\n### 解决方案\n\n如果你有最新版本的 Raspberry Pi OS，pip\
    \ 应该已经安装好了，你可以从命令行运行它，如下面的示例所示，该示例取自 [待添加链接]，其中使用它来安装 Python 库 `svgwrite`：\n\n\
    ```\n$ sudo pip install svgwrite\n```\n\n如果 pip 未安装在你的系统上，你可以使用以下命令安装它：\n\n```\n\
    $ sudo apt-get install python-pip\n```\n\n`pip` 命令在 Python 2 下安装软件包。要安装到 Python\
    \ 3，请改用命令 `pip3`。很多时候你会希望软件包同时为 Python 2 和 Python 3 安装，因此你可能会发现自己使用 `pip` 和 `pip3`\
    \ 运行相同的命令。\n\n### 讨论\n\n虽然许多 Python 库可以使用 `apt-get` 安装（参见配方 3.17），但有些不能，你必须改用\
    \ pip。\n\n### 另请参阅\n\n要使用 `apt-get` 安装软件，请参见配方 3.17。\n\n## 3.20 从命令行获取文件\n\n###\
    \ 问题\n\n你想在不使用网络浏览器的情况下从互联网下载文件。\n\n### 解决方案\n\n你可以使用 `wget` 命令从互联网获取文件。\n例如，以下命令从\
