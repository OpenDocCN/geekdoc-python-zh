    # 1.8 Booting from a Real Hard Disk or USB Flash Drive


    # Problem


    Your microSD card is too small and/or you are concerned about your entire operating
    system running on an SD card.


    # Solution


    Before the Raspberry Pi 4 and 400 came a long, this was possible, but not very
    easy, involving some complex commands and the possibility of ‘bricking’ your Raspberry
    Pi if you got it wrong. If you have a Raspberry Pi 4 or 400, then it is now really
    straight-forward and starts with the Raspberry Pi Imager.


    The process is similar to setting up a microSD card using the Raspberry Pi Imager.
    To follow this recipe, you will need a Windows, Mac or Linux computer; a USB SSD
    (Solid State Disk) and also a microSD card. Even though the whole point of this
    recipe is to replace the microSD card as the boot device, you still need two microSD
    cards (one being your existing'
  merge: -1
  pgno: 27
- img_proc: true
  md: 'microSD boot device for your Raspberry Pi) and a second blank microSD card.


    +   1. Insert the blank microSD card into your card reader

    2. Start the Raspberry Pi Imager and then from the Operating System drop-down,
    select *Misc untility Images* and then *Bootloader* and then *USB Boot* (Figure
    1-14). Note that if these options aren’t present in your Raspberry Pi Imager,
    then you probably need to download [the latest version](https://www.raspberrypi.com/software/).

    3. Select your microSD card from the Storage drop-down and then click Write.

    4. Put the newly written microSD card into your Raspberry Pi and power it up.
    The only purpose of this microSD card image is to reconfigure your Raspberry Pi
    for USB booting. Once it’s done its work, the screen will turn green.

    5. Power down your Raspberry Pi and swap over the microSD cards, so that you now
    have your original microSD system card.

    6. Boot your Raspberry Pi and then from the Menu, select *Accessories* and then
    *SD Card Copier* (Figure 1-15). Select your system microSD card as the source
