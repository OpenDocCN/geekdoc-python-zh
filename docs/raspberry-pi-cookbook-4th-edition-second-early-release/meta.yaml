    # 3.36 Creating Command Aliases


    # Problem


    You want to create aliases (shortcuts) to commands that you use frequently.


    # Solution


    Edit the file `~/.bashrc` using nano ([Recipe 3.7](Recipe 3.7)), and then move
    to the end of the file and add as many lines as you want, like this:


    ```

    alias L=''ls -a''

    ```


    This creates an alias called `L` that, when entered, will be interpreted as the
    command `ls -a`.'
