    # 1.5 Selecting an Operating System


    # Problem


    There are a number of different Raspberry Pi operating systems, and you are not
    sure which one to use.


    # Solution


    The answer to this question depends on what you intend to do with your Raspberry
    Pi.

    For general use as a computer or for using in electronic projects, you should
    use Raspberry Pi OS, the standard and official distribution for the Raspberry
    Pi.

    If you plan to use your Raspberry Pi as a media center, there are a number of
    distributions (versions of Linux) specifically for that purpose (see Recipe 4.1).

    In this book, we use Raspberry Pi OS almost exclusively, although most of the
    recipes will work with any Debian-based Linux distribution.


    # Discussion


    If you are interested in trying out some different distributions, you can purchase
    some microSD cards, which are not expensive, and copy the various distributions
    onto them. If you do this, it is a good idea to keep your files that you don’t
    want to lose on a USB flash drive plugged into your Raspberry Pi.

    Note that if you are using one of the upcoming recipes to write your own SD card,
    you need to have a computer that has an SD card slot (and an SD-'
  merge: -1
  pgno: 21
- img_proc: true
  md: 'to-microSD adapter), or you can buy an inexpensive USB SD card reader.


    # See Also


    The official list of Raspberry Pi distributions.


    # 1.6 Installing an Operating System Using Pi Imager


    # Problem


    You want to put the operating system for your Raspberry Pi directly onto a microSD
    card ready for use by your Pi.


    # Solution


    Before you can use your Raspberry Pi, you must prepare a microSD card with the
    Raspberry Pi OS operating system by writing a disk image onto the microSD card.


    The process of writing the disk image onto the microSD card is as follows:


    +   1. Using a Mac, Windows, or Linux computer (not your Raspberry Pi), download
    the [Raspberry Pi Imager](https://www.raspberrypi.com/software/).

    2. Insert the microSD card into your computer. It’s also a good idea to disconnect
    any other removable media so that you don’t accidentally overwrite the wrong device.

    3. Start the Raspberry Pi Imager (Figure 1-10),

    4. Select the Operating System as Raspberry Pi OS (32 bit) and the SD card

    5. Click Write and wait while the image file is copied onto the removable media.'
  merge: -1
  pgno: 22
- img_proc: true
  md: '![](img/54ed1f8e884bc184601bf6f652461a95_23_0.png)


    Figure 1-10. Using Raspberry Pi Imager to write and SD card.


    After the SD card or other removable media is prepared, you can connect it to
    your Raspberry Pi, and when the Raspberry Pi is powered up, it will boot into
    whatever operating system distribution you installed.


    # Discussion


    Vendors of hardware sometimes offer their own disk image that has support for
    their hardware built into it. It’s best to avoid using such images because doing
    so means that you will not get all the benefits of using a standard Raspberry
    Pi OS distribution and all the preinstalled software. It also means that if you
    have a problem with a piece of software, it will be a lot more difficult to find
    support because you are using a nonstandard distribution.'
