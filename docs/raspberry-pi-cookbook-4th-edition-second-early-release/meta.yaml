- md: "## 1.12 Overclocking\n\nPreferences, and then click Raspberry Pi Configuration.\
    \ Next, click on the Performance tab (Figure 1-18).\n\n![](img/54ed1f8e884bc184601bf6f652461a95_37_0.png)\n\
    \nThe overclock options available to you will vary depending on which model of\
    \ Raspberry Pi you have. Select one of the options and then click OK. Changes\
    \ will take effect when you reboot.\n\nIf you are running your Raspberry Pi without\
    \ a monitor ([Link to Come]), you can still change the overclocking, but you will\
    \ need to jump around and learn about SSH in Recipe 2.7. After you are able to\
    \ connect with SSH, run the `raspi-config` utility by issuing the following command\
    \ in an SSH Terminal:\n\n```\n$ sudo raspi-config\n```\n\nSelect the Overclock\
    \ option. You are then presented with the options shown in Figure 1-19.\n\n![](img/54ed1f8e884bc184601bf6f652461a95_38_0.png)\n\
    \nSelect an option. If you find that your Raspberry Pi starts to become unstable\
    \ and hangs unexpectedly, you might need to choose a more conservative option\
    \ or turn overclocking off by setting it back to `None`.\n\n### Discussion\n\n\
    The performance improvements from overclocking can be quite dramatic. To measure\
    \ these, I used a Raspberry Pi B, without a case, at an ambient room temperature\
    \ of 60 degrees (15 degrees C).\nThe test program was the following Python script.\
    \ This just hammers the processor (that is, makes it work really hard) and is\
    \ not really representative of the other things that go on in a computer, such\
    \ as writing to the SD card, graphics, and so on. However, it does give a good\
    \ indication of raw CPU performance if you want to test the effect of overclocking\
    \ on your Raspberry Pi:\n\n```python\nimport time\n\ndef factorial(n):\n    if\
    \ n == 0:\n        return 1\n    else:\n        return n * factorial(n-1)\n\n\
    before_time = time.clock()\nfor i in range(1, 10000):\n    factorial(200)\nafter_time\
    \ = time.clock()\n\nprint(after_time - before_time)\n```\n\nNote that we are jumping\
    \ ahead a lot here, so if you are not familiar with Python, come back to this\
    \ when you have read through Chapter 5.\nCheck out the results of the test in\
    \ Table 1-3. The current and temperature were measured using test equipment.\n\
    \nTable 1-3. Overclocking\n\n| Speed test | Current | Temperature (degrees C)\
    \ |\n| :--- | :--- | :--- |\n| 700 MHz | 15.8 seconds | 360mA | 27 |\n| 1 GHz\
    \ | 10.5 seconds | 420mA | 30 |\n\nAs you can see, the performance has increased\
    \ by 33% but at a cost of drawing more current and a slightly higher temperature.\n\
    A well-ventilated enclosure will help to keep your Raspberry Pi running at full\
    \ speed. There have also been some efforts to add water cooling to the Raspberry\
    \ Pi. Frankly, this is just silly.\n\n### See Also\n\nYou can find much more information\
    \ about the `raspi-config` tool at [http://elinux.org/RPi_raspi-config](http://elinux.org/RPi_raspi-config).\n\
    \n## 1.13 Changing Your Password\n\n### Problem\n\nBy default, the password for\
    \ a Raspberry Pi will be *raspberry*. You want to change this.\n\n### Solution\n\
    \nAfter you install Raspberry Pi OS onto your SD card, you are prompted to change\
    \ your password, but you can skip this step. You can change the password any time\
    \ using the Raspberry Pi Configuration utility. To open this, go to the Raspberry\
    \ Pi menu, select Preferences, and then click Raspberry Pi Configuration. Click\
    \ the System tab. There, you will find the Change Password option (Figure 1-20).\n\
    \n![](img/54ed1f8e884bc184601bf6f652461a95_41_0.png)\n\nFigure 1-20. Changing\
    \ your password with the Raspberry Pi Configuration tool\n\nChanging your password\
    \ is one setting for which you do not need to restart your Raspberry Pi for the\
    \ change to take effect.\n\n### Discussion\n\nYou can also change the password\
    \ from a Terminal session simply by using the `passwd` command, as follows:\n\n\
    ```\n$ passwd\nChanging password for pi.\n(current) UNIX password:\nEnter new\
    \ UNIX password:\nRetype new UNIX password:\npasswd: password updated successfully\n\
    ```\n\n### See Also\n\nYou can also change your password using the `raspi-config`\
    \ tool (see [http://elinux.org/RPi_raspi-config](http://elinux.org/RPi_raspi-config)).\n\
    \n## 1.14 Shutting Down Your Raspberry Pi\n\n### Problem\n\nYou want to shut down\
    \ your Raspberry Pi.\n\n### Solution\n\nIn the upper lefthand corner of the desktop,\
    \ click the Raspberry menu. A dialog box opens, offering three shutdown options\
    \ (Figure 1-21).\n\n- **Shutdown**\n  Shuts down the Raspberry Pi. You will need\
    \ to unplug the power and then plug it back in to get the Raspberry Pi to boot\
    \ up again.\n- **Reboot**\n  Reboots the Raspberry Pi.\n- **Logout**\n  Logs you\
    \ out and displays a prompt to enter your login credentials so that you can log\
    \ back in.\n\n![](img/54ed1f8e884bc184601bf6f652461a95_43_0.png)\n\nYou can also\
    \ reboot using the Terminal by issuing the following command:\n\n```\n$ sudo reboot\n\
    ```\n\nYou might need to do this after installing some software. When you do reboot,\
    \ you’ll see the message shown in Figure 1-22, which illustrates the multiuser\
    \ nature of Linux and warns all users connected to the Pi.\n\n![](img/54ed1f8e884bc184601bf6f652461a95_43_1.png)\n\
    \n### Discussion\n\nIt is better to shut down your Raspberry Pi as described than\
    \ to simply pull out the power plug because your Raspberry Pi might be in the\
    \ middle of writing to the microSD card as you power it down. This could lead\
    \ to file corruption.\n\nShutting down a Raspberry Pi does not actually turn off\
    \ the power. It goes into a low-power mode—and it is a pretty low-power device\
    \ anyway (but the Raspberry Pi hardware has no control over its power supply).\n\
    \nWhen a Raspberry Pi 4 (with its built-in keyboard) has been shut down, you can\
    \ turn it on by pressing the F10 key which also has an on/off icon on the key.\n\
    \n### See Also\n\nYou can buy a module that will turn off the power when the Raspberry\
    \ Pi shuts down at [https://oreil.ly/Jsx_U](https://oreil.ly/Jsx_U).\n\nFor information\
    \ on adding a Start button to your Raspberry Pi, see [Link to Come].\n\n## 1.15\
    \ Installing the Raspberry Pi Camera Module\n\n### Problem\n\nYou want to use\
    \ the Raspberry Pi Camera Module.\n\n### Solution\n\nThe Raspberry Pi Camera Module\
    \ (Figure 1-23) is attached to a Raspberry Pi by a ribbon cable.\n\n![](img/54ed1f8e884bc184601bf6f652461a95_45_0.png)\n\
    \nFigure 1-23. The Raspberry Pi Camera Module\n\nThere are actually two basic\
    \ versions of the Pi Camera: the original version 1 (as shown in Figure 1-23)\
    \ and the newer higher-resolution version 2. The ribbon cable attaches to a special\
    \ connector between the audio and HDMI sockets on a Raspberry Pi 2, 3, or 4. To\
    \ fit the cable onto your Pi, gently pull up the levers on either side of the\
    \ connector so that they unlock, and then press the cable into the slot with the\
    \ shiny metal connector pads of the cable facing away from the Ethernet socket.\
    \ Press the two levers of the connector back down to lock the cable in place (Figure\
    \ 1-24).\n\n![](img/54ed1f8e884bc184601bf6f652461a95_46_0.png)\n\nFigure 1-24.\
    \ Attaching a Raspberry Pi Camera Module to a Raspberry Pi 4 model B\n\n> ###\
    \ WARNING\n> The Camera Module packaging states that it is sensitive to static.\
    \ Before handling it, ground yourself by touching something grounded, like the\
    \ metal case of a PC.\n\nNote that the Raspberry Pi Zero requires a special cable\
    \ or adapter because its Camera connector is smaller than that of a full-sized\
    \ Raspberry Pi (see [Link to Come]).\nThe Camera Module requires some software\
    \ configuration. The easiest way to configure it is to use the Raspberry Pi Configuration\
    \ tool. To open this, go to the Raspberry Pi main menu, select Preferences, and\
    \ then click Raspberry Pi Configuration. Click the Interfaces tab, and then set\
    \ the Camera option to Enabled (Figure 1-25).\n\n![](img/54ed1f8e884bc184601bf6f652461a95_47_0.png)\n\
    \nFigure 1-25. Enabling the camera using the Raspberry Pi Configuration tool\n\
    \nIf you are using your Raspberry Pi remotely using SSH (see Recipe 2.7), you\
    \ can still enable the camera by using `raspi-config`. To run `raspi-config`,\
    \ enter the following command into a Terminal session:\n\n```\n$ sudo raspi-config\n\
    ```\n\nSelect Interfacing Options, and you will see the Camera option (Figure\
    \ 1-26)."
  mdcn: "## 1.12 超频\n\n首先，打开“首选项”，然后点击“树莓派配置”。接着，点击“性能”选项卡（图1-18）。\n\n![](img/54ed1f8e884bc184601bf6f652461a95_37_0.png)\n\
    \n可用的超频选项会因你所使用的树莓派型号而异。选择其中一个选项，然后点击“确定”。更改将在重启后生效。\n\n如果你在没有显示器的情况下运行树莓派（[链接待补充]），你仍然可以更改超频设置，但需要跳转到第2.7节学习SSH。在能够通过SSH连接后，在SSH终端中运行以下命令来启动`raspi-config`工具：\n\
    \n```\n$ sudo raspi-config\n```\n\n选择“超频”选项。随后会显示如图1-19所示的选项。\n\n![](img/54ed1f8e884bc184601bf6f652461a95_38_0.png)\n\
    \n选择一个选项。如果你发现树莓派开始变得不稳定并意外死机，可能需要选择一个更保守的选项，或者通过将其设置回`None`来关闭超频。\n\n### 讨论\n\
    \n超频带来的性能提升可能相当显著。为了测量这些提升，我使用了一台没有外壳的树莓派B型，在室温60华氏度（15摄氏度）的环境下进行测试。\n测试程序是以下Python脚本。它只是让处理器满负荷工作（即让它非常努力地工作），并不能真正代表计算机中发生的其他事情，例如写入SD卡、图形处理等。然而，如果你想测试超频对树莓派的影响，它确实能很好地指示原始CPU性能：\n\
    \n```python\nimport time\n\ndef factorial(n):\n    if n == 0:\n        return\
    \ 1\n    else:\n        return n * factorial(n-1)\n\nbefore_time = time.clock()\n\
    for i in range(1, 10000):\n    factorial(200)\nafter_time = time.clock()\n\nprint(after_time\
    \ - before_time)\n```\n\n请注意，我们在这里超前了很多，所以如果你不熟悉Python，可以在通读第5章后再回来研究这个。\n查看表1-3中的测试结果。电流和温度是使用测试设备测量的。\n\
    \n表1-3. 超频\n\n| 速度测试 | 电流 | 温度（摄氏度） |\n| :--- | :--- | :--- |\n| 700 MHz | 15.8\
    \ 秒 | 360mA | 27 |\n| 1 GHz | 10.5 秒 | 420mA | 30 |\n\n如你所见，性能提升了33%，但代价是消耗更多电流和温度略有升高。\n\
    一个通风良好的外壳将有助于保持你的树莓派以全速运行。也有人尝试为树莓派添加水冷。坦率地说，这有点傻。\n\n### 另请参阅\n\n你可以在 [http://elinux.org/RPi_raspi-config](http://elinux.org/RPi_raspi-config)\
    \ 找到更多关于 `raspi-config` 工具的信息。\n\n## 1.13 更改你的密码\n\n### 问题\n\n默认情况下，树莓派的密码是 *raspberry*。你想更改它。\n\
    \n### 解决方案\n\n在将树莓派操作系统安装到SD卡后，系统会提示你更改密码，但你可以跳过此步骤。你可以随时使用树莓派配置工具更改密码。要打开此工具，请转到树莓派菜单，选择“首选项”，然后点击“树莓派配置”。点击“系统”选项卡。在那里，你会找到“更改密码”选项（图1-20）。\n\
    \n![](img/54ed1f8e884bc184601bf6f652461a95_41_0.png)\n\n图1-20. 使用树莓派配置工具更改密码\n\
    \n更改密码是一项设置，你无需重启树莓派即可使更改生效。\n\n### 讨论\n\n你也可以简单地在终端会话中使用 `passwd` 命令来更改密码，如下所示：\n\
    \n```\n$ passwd\nChanging password for pi.\n(current) UNIX password:\nEnter new\
    \ UNIX password:\nRetype new UNIX password:\npasswd: password updated successfully\n\
    ```\n\n### 另请参阅\n\n你也可以使用 `raspi-config` 工具更改密码（参见 [http://elinux.org/RPi_raspi-config](http://elinux.org/RPi_raspi-config)）。\n\
    \n## 1.14 关闭你的树莓派\n\n### 问题\n\n你想关闭你的树莓派。\n\n### 解决方案\n\n在桌面的左上角，点击树莓派菜单。会打开一个对话框，提供三个关机选项（图1-21）。\n\
    \n- **关机**\n  关闭树莓派。你需要拔掉电源，然后重新插上才能让树莓派再次启动。\n- **重启**\n  重启树莓派。\n- **注销**\n\
    \  注销你，并显示一个提示，要求输入登录凭据以便你可以重新登录。\n\n![](img/54ed1f8e884bc184601bf6f652461a95_43_0.png)\n\
    \n你也可以通过终端发出以下命令来重启：\n\n```\n$ sudo reboot\n```\n\n安装某些软件后，你可能需要这样做。当你重启时，你会看到图1-22所示的消息，它说明了Linux的多用户特性，并警告所有连接到树莓派的用户。\n\
    \n![](img/54ed1f8e884bc184601bf6f652461a95_43_1.png)\n\n### 讨论\n\n最好按照上述方法关闭树莓派，而不是简单地拔掉电源插头，因为在你断电时，树莓派可能正在写入microSD卡。这可能导致文件损坏。\n\
    \n关闭树莓派实际上并不会切断电源。它会进入低功耗模式——而且它本身就是一个功耗相当低的设备（但树莓派硬件无法控制其电源）。\n\n当树莓派4（带内置键盘）关闭后，你可以通过按F10键（该键上也有开/关图标）来开机。\n\
    \n### 参阅\n\n你可以在 [https://oreil.ly/Jsx_U](https://oreil.ly/Jsx_U) 购买一个模块，它可以在树莓派关机时切断电源。\n\
    \n关于在树莓派上添加开始按钮的信息，请参见[链接待补充]。\n\n## 1.15 安装树莓派摄像头模块\n\n### 问题\n\n你想使用树莓派摄像头模块。\n\
    \n### 解决方案\n\n树莓派摄像头模块（图1-23）通过排线连接到树莓派。\n\n![](img/54ed1f8e884bc184601bf6f652461a95_45_0.png)\n\
    \n图1-23. 树莓派摄像头模块\n\n实际上，树莓派摄像头有两个基本版本：原始版本1（如图1-23所示）和更新的更高分辨率版本2。排线连接到树莓派2、3或4上音频和HDMI接口之间的特殊连接器。要将排线安装到你的树莓派上，请轻轻向上拉起连接器两侧的卡扣以解锁，然后将排线插入插槽，确保排线上闪亮的金属触点背向以太网接口。将连接器的两个卡扣按回原位以锁定排线（图1-24）。\n\
    \n![](img/54ed1f8e884bc184601bf6f652461a95_46_0.png)\n\n图1-24. 将树莓派摄像头模块连接到树莓派4型号B\n\
    \n> ### 警告\n> 摄像头模块包装上标明其对静电敏感。在操作之前，请通过触摸接地物体（如PC的金属机箱）来释放静电。\n\n请注意，树莓派Zero需要特殊的排线或适配器，因为它的摄像头连接器比全尺寸树莓派的小（参见[链接待补充]）。\n\
    摄像头模块需要一些软件配置。最简单的配置方法是使用树莓派配置工具。要打开此工具，请转到树莓派主菜单，选择“首选项”，然后点击“树莓派配置”。点击“接口”选项卡，然后将“摄像头”选项设置为“启用”（图1-25）。\n\
    \n![](img/54ed1f8e884bc184601bf6f652461a95_47_0.png)\n\n图1-25. 使用树莓派配置工具启用摄像头\n\
    \n如果你通过SSH远程使用树莓派（参见第2.7节），你仍然可以使用 `raspi-config` 来启用摄像头。要运行 `raspi-config`，请在终端会话中输入以下命令：\n\
    \n```\n$ sudo raspi-config\n```\n\n选择“接口选项”，你将看到“摄像头”选项（图1-26）。"
