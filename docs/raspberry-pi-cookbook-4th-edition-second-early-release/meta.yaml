    \n从同一网络上的另一台计算机，打开浏览器并访问 URL *http://192.168.0.210:8081/*。你需要更改 URL 以匹配你的树莓派的\
    \ IP 地址，但保留 URL 末尾的 `:8081` 端口号。\n\n如果一切顺利，你应该会看到类似 [图 4-7](Figure 4-7) 的内容。\n\
    \n![](img/54ed1f8e884bc184601bf6f652461a95_170_0.png)\n\n图 4-7. 树莓派网络摄像头\n\n##\
    \ 讨论\n\nmotion 软件功能非常强大。还有许多其他设置可以调整，以改变你的网络摄像头的工作方式。\n\n默认情况下，网络摄像头只能从你的网络内部查看。如果你想让网络摄像头对整个互联网可见，你需要在你的家庭集线器上设置\
    \ *端口转发*。这需要你登录到集线器的管理控制台，找到端口转发选项，并为树莓派的 IP 地址启用端口 8081。\n\n然后你就可以使用你的 ISP 分配的外部\
