- md: "When you run Putty, change the “Connection type” to Serial and set the speed\
    \ to 115200. You also need to set the “Serial line” to be the COM port in use\
    \ by the cable. This might be COM7, but if that does not work, check it by using\
    \ the Windows Device Manager.\nWhen you click Open and press Enter, the Terminal\
    \ session should start with a login prompt.\n\n## Discussion\n\nThe console cable\
    \ can be a very convenient way of using your Pi if you are traveling light, because\
    \ it provides both power and a way to control the Pi remotely.\nThe console lead\
    \ has a chip in the USB end that provides a USB-to-Serial interface. This sometimes\
    \ (depending on your operating system) requires the installation of drivers on\
    \ your PC. You should be able to use any USB-to-serial converter as long as it\
    \ has the necessary drivers for your PC.\nPlugging the sockets of the lead into\
    \ the right places is made easier if you carefully glue (or tape) the four sockets\
    \ together in the right order so that they fit over the GPIO header in a block.\n\
    Finding the right position on the GPIO header is made easier if you use a GPIO\
    \ template like the Raspberry Leaf (see [Link to Come]). The Raspberry Pi pinouts\
    \ are shown in [Link to Come].\n\n## See Also\n\nYou can find out more about using\
    \ the serial console at this [Adafruit tutorial](https://www.adafruit.com/). Adafruit\
    \ also sells console cables. The lead used here is one supplied by Adafruit (product\
    \ code 954).\n\n## 2.7 Controlling the Pi Remotely with SSH\n\n### Problem\n\n\
    You want to connect to a remote Pi from another computer by using Secure Shell\
    \ (SSH).\n\n### Solution\n\nBefore you can connect to your Raspberry Pi using\
    \ SSH, you must turn on SSH. On newer versions of Raspberry Pi OS, you can use\
    \ the Raspberry Pi Configuration tool (Figure 2-13), which you can find on the\
    \ Main menu under Preferences. Just select the box for SSH and then click OK.\
    \ You are then prompted to restart.\n\nIf you prefer to use the command line,\
    \ use the `raspi-config` application. You can start this at any time by entering\
    \ the following command in Terminal:\n\n```\n$ sudo raspi-config\n```\n\nClick\
    \ the Interfaces tab, scroll down to the SSH option, and then click the Enabled\
    \ button.\n\n![](img/54ed1f8e884bc184601bf6f652461a95_77_0.png)\n\nFigure 2-13.\
    \ Turning on SSH using the Raspberry Pi Configuration tool\n\nIf you are using\
    \ macOS or have Linux installed on the computer from which you want to connect\
    \ your Pi, all you need to do to connect is open a Terminal window and enter the\
    \ following command:\n\n```\n$ ssh 192.168.1.16 -l pi\n```\n\nHere, the IP address\
    \ (192.168.1.16) is the IP address of your Pi (see Recipe 2.2). You are then prompted\
    \ for your password and logged in to the Pi (Figure 2-14).\n\n![](img/54ed1f8e884bc184601bf6f652461a95_78_0.png)\n\
    \nTo connect from a Windows computer, you will need to use Putty ([Recipe 2.6](Recipe\
    \ 2.6)) to start an SSH session.\n\n### Discussion\n\nSSH is a very common way\
    \ of connecting to remote computers; any commands that you could issue on the\
    \ Pi itself, you can use from SSH. It is also, as its name suggests, secure because\
    \ the communication is encrypted.\n\nPerhaps the only drawback is that it is a\
    \ command-line rather than graphical environment. If you need access to the full\
    \ Raspberry Pi desktop environment remotely, you need to use VNC ([Recipe 2.8](Recipe\
    \ 2.8)) or RDP ([Link to Come]).\n\n### See Also\n\nSee also this [Adafruit tutorial](Adafruit\
    \ tutorial).\n\nYou can also enable SSH using PiBakery.\n\n## 2.8 Controlling\
    \ the Pi Remotely with VNC\n\n### Problem\n\nYou want access to the full Raspberry\
    \ Pi OS graphical desktop of your Pi from a PC (Windows or Linux) or macOS, using\
    \ virtual network computing (VNC).\n\n### Solution\n\nUse the preinstalled VNC\
    \ software on Raspberry Pi OS. However, to do so, you will first need to configure\
    \ your Raspberry Pi to turn it on. You can do this using the Raspberry Pi Configuration\
    \ tool, which you can find in the Preferences section of the Main menu on the\
    \ Raspberry Pi desktop. Click the Interfaces tab, scroll down to the VNC option,\
    \ select the Enabled button, and then click OK (Figure 2-15).\n\n![](img/54ed1f8e884bc184601bf6f652461a95_80_0.png)\n\
    \nFigure 2-15. Turning on the VNC interface\n\nIf you don’t mind your virtual\
    \ screen being very low resolution, you can skip ahead in this recipe to connect\
    \ to your Raspberry Pi remotely, but in all likelihood, you will want to increase\
    \ the resolution. To do this, edit the *config.txt* file by using the following\
    \ command:\n\n```\n$ sudo nano /boot/config.txt\n```\n\nFind the lines that look\
    \ like this:\n\n```\n# framebuffer_width=1900\n# framebuffer_height=1024\n```\n\
    \nRemove the # character at the beginning of each line to enable the new screen\
    \ width and height, as shown here:\n\n```\nframebuffer_width=1900\nframebuffer_height=1024\n\
    ```\n\nYou need to reboot for the changes to take effect.\nTo connect to the Pi\
    \ from a remote computer, you need to install VNC client software. RealVNC VNC\
    \ Viewer is a popular choice and is available for Windows, Linux, and macOS.\n\
    When you run the client program on macOS or a PC, you will be asked to enter the\
    \ IP address of the VNC server to which you want to connect (the IP address of\
    \ your Pi).\nYou are then prompted for your password (Figure 2-16).\n\n![](img/54ed1f8e884bc184601bf6f652461a95_82_0.png)\n\
    \nThe Catchphrase and Signature are security devices designed to alert you if\
    \ someone is hacking your Raspberry Pi. If either changes when you authenticate\
    \ another time, your Raspberry Pi might be compromised.\n\n### Discussion\n\n\
    Although you can do most things with SSH using the command line, sometimes it\
    \ is useful to have access to the graphical environment of your Raspberry Pi.\n\
    The Raspberry Pi’s VNC server automatically starts when you reboot, as long as\
    \ the VNC option is enabled.\n\n### See Also\n\nSee also this [Adafruit tutorial](https://www.adafruit.com/).\n\
    \nYou can also enable VNC while setting up a new Raspberry Pi using PiBakery.\n\
    \n## 2.9 File Sharing on a Mac Network\n\n### Problem\n\nYou want your Raspberry\
    \ Pi to appear on the list of computers in the macOS Finder so that you can connect\
    \ to it and browse the filesystem using Finder.\n\n### Solution\n\nThe macOS operating\
    \ system includes built-in support for file viewing in Finder over the network\
    \ (Figure 2-17). However, you must make some configuration changes on your Raspberry\
    \ Pi for macOS to view network files on your Raspberry Pi.\n\n![](img/54ed1f8e884bc184601bf6f652461a95_83_0.png)\n\
    \nYou will need to know the IP address of your Raspberry Pi (Recipe 2.2).\n\n\
    On the Raspberry Pi, install `netatalk` by using the following commands:\n\n```\n\
    $ sudo apt-get update\n$ sudo apt-get install netatalk\n```\n\nNext, back on your\
    \ Mac, in the Finder menu, select Go, click Connect to Server, and then enter\
    \ `afp://192.168.1.210` as the server address (using the IP address for your Raspberry\
    \ Pi, of course, not the one shown here). Then, click Connect. You are then prompted\
    \ to log in (Figure 2-18).\n\n![](img/54ed1f8e884bc184601bf6f652461a95_84_0.png)\n\
    \nLog in using the name **pi** and your password, which will be **raspberry**,\
    \ unless you have changed it. The Finder should then show you the contents of\
    \ your home directory on the Raspberry Pi.\n\nThere are a few more configuration\
    \ changes to make on the Raspberry Pi, which will automatically mount your Raspberry\
    \ Pi on your Mac’s filesystem:\n\n```\n$ sudo apt-get update\n$ sudo apt-get install\
    \ avahi-daemon\n$ sudo update-rc.d avahi-daemon defaults\n```\n\nNext, type this\
    \ command:\n\n```\n$ sudo nano /etc/avahi/services/afpd.service\n```\n\nPaste\
    \ the following code into the file. This is a lot to type, so if you are reading\
    \ a paper copy of this book, you can copy and paste it from [this web page](this\
    \ web page). Just scroll down until you find this chapter and recipe:\n\n```\n\
    <?xml version=\"1.0\" standalone='no'?><!--*-nxml-*->\n<!DOCTYPE service-group\
    \ SYSTEM \"avahi-service.dtd\">\n<service-group>\n  <name replace-wildcards=\"\
    yes\">%h</name>\n  <service>\n    <type>_afpovertcp._tcp</type>\n    <port>548</port>\n\
    \  </service>\n</service-group>\n```\n\nTo set the daemon running so that this\
    \ happens automatically whenever your Raspberry Pi boots up, type this command:\n\
    \n```\n$ sudo /etc/init.d/avahi-daemon restart\n```\n\nSwitch back to your Mac,\
    \ and you should now see your Raspberry Pi in the Finder.\n\n### Discussion\n\n\
    Being able to move files easily between your Mac and your Raspberry Pi is very\
    \ useful. It means that you can use files on your Pi without having to hook up\
    \ a separate keyboard, mouse, and monitor.\nYou can also open files on the Raspberry\
    \ Pi as if they were on your Mac. This has the advantage that you can edit them\
    \ using TextMate or your favorite macOS text editor.\nIf you’re using Windows\
    \ or Linux, you can also share files by configuring your Raspberry Pi to work\
    \ as Network Attached Storage (NAS); see [Recipe 2.10](Recipe 2.10)."
  mdcn: "当你运行 Putty 时，将“连接类型”更改为串口，并将速度设置为 115200。你还需要将“串行线路”设置为电缆正在使用的 COM 端口。这可能是\
    \ COM7，但如果不行，请使用 Windows 设备管理器进行检查。\n当你点击“打开”并按回车键时，终端会话应启动并显示登录提示。\n\n## 讨论\n\
    \n如果你轻装出行，控制台电缆可以成为使用树莓派的一种非常便捷的方式，因为它同时提供了电源和远程控制树莓派的方法。\n控制台引线在 USB 端有一个芯片，提供\
    \ USB 转串口接口。这有时（取决于你的操作系统）需要在你的 PC 上安装驱动程序。只要拥有适用于你 PC 的必要驱动程序，你应该可以使用任何 USB 转串口转换器。\n\
    如果你小心地将四个插座按正确的顺序粘合（或用胶带固定）在一起，使它们作为一个整体套在 GPIO 排针上，那么将引线的插座插入正确的位置会更容易。\n使用像\
    \ Raspberry Leaf 这样的 GPIO 模板（参见[待添加链接]）可以更容易地找到 GPIO 排针上的正确位置。树莓派的引脚排列显示在[待添加链接]中。\n\
    \n## 另请参阅\n\n你可以在这个 [Adafruit 教程](https://www.adafruit.com/)中找到更多关于使用串口控制台的信息。Adafruit\
    \ 也出售控制台电缆。这里使用的引线是 Adafruit 提供的（产品代码 954）。\n\n## 2.7 使用 SSH 远程控制树莓派\n\n### 问题\n\
    \n你想通过安全外壳（SSH）从另一台计算机连接到远程的树莓派。\n\n### 解决方案\n\n在使用 SSH 连接到你的树莓派之前，你必须先开启 SSH。在较新版本的树莓派操作系统上，你可以使用树莓派配置工具（图\
    \ 2-13），你可以在主菜单的“首选项”下找到它。只需选中 SSH 的复选框，然后点击“确定”。然后系统会提示你重启。\n\n如果你更喜欢使用命令行，请使用\
    \ `raspi-config` 应用程序。你可以随时在终端中输入以下命令来启动它：\n\n```\n$ sudo raspi-config\n```\n\n\
    点击“接口”选项卡，向下滚动到 SSH 选项，然后点击“启用”按钮。\n\n![](img/54ed1f8e884bc184601bf6f652461a95_77_0.png)\n\
    \n图 2-13. 使用树莓派配置工具开启 SSH\n\n如果你使用的是 macOS 或者在你想连接树莓派的计算机上安装了 Linux，你只需打开一个终端窗口并输入以下命令即可连接：\n\
    \n```\n$ ssh 192.168.1.16 -l pi\n```\n\n这里，IP 地址（192.168.1.16）是你树莓派的 IP 地址（参见配方\
    \ 2.2）。然后系统会提示你输入密码，并登录到树莓派（图 2-14）。\n\n![](img/54ed1f8e884bc184601bf6f652461a95_78_0.png)\n\
    \n要从 Windows 计算机连接，你需要使用 Putty（[配方 2.6](Recipe 2.6)）来启动一个 SSH 会话。\n\n### 讨论\n\n\
    SSH 是连接远程计算机的一种非常常见的方式；任何你可以在树莓派本身上执行的命令，都可以通过 SSH 使用。正如其名所示，它也是安全的，因为通信是加密的。\n\
    \n也许唯一的缺点是它是一个命令行环境，而不是图形环境。如果你需要远程访问完整的树莓派桌面环境，你需要使用 VNC（[配方 2.8](Recipe 2.8)）或\
    \ RDP（[待添加链接]）。\n\n### 另请参阅\n\n另请参阅这个 [Adafruit 教程](Adafruit tutorial)。\n\n你也可以使用\
    \ PiBakery 来启用 SSH。\n\n## 2.8 使用 VNC 远程控制树莓派\n\n### 问题\n\n你想通过虚拟网络计算（VNC）从 PC（Windows\
    \ 或 Linux）或 macOS 访问树莓派的完整树莓派操作系统图形桌面。\n\n### 解决方案\n\n使用树莓派操作系统上预装的 VNC 软件。然而，为此，你首先需要配置你的树莓派以开启它。你可以使用树莓派配置工具来完成此操作，该工具可以在树莓派桌面主菜单的“首选项”部分找到。点击“接口”选项卡，向下滚动到\
    \ VNC 选项，选择“启用”按钮，然后点击“确定”（图 2-15）。\n\n![](img/54ed1f8e884bc184601bf6f652461a95_80_0.png)\n\
    \n图 2-15. 开启 VNC 接口\n\n如果你不介意虚拟屏幕分辨率非常低，你可以跳过本配方的这部分内容，直接远程连接到你的树莓派，但很可能你会想要增加分辨率。为此，请使用以下命令编辑\
    \ *config.txt* 文件：\n\n```\n$ sudo nano /boot/config.txt\n```\n\n找到如下所示的行：\n\n\
    ```\n# framebuffer_width=1900\n# framebuffer_height=1024\n```\n\n删除每行开头的 # 字符以启用新的屏幕宽度和高度，如下所示：\n\
    \n```\nframebuffer_width=1900\nframebuffer_height=1024\n```\n\n你需要重启才能使更改生效。\n\
    要从远程计算机连接到树莓派，你需要安装 VNC 客户端软件。RealVNC VNC Viewer 是一个流行的选择，适用于 Windows、Linux 和\
    \ macOS。\n当你在 macOS 或 PC 上运行客户端程序时，系统会要求你输入要连接的 VNC 服务器的 IP 地址（即你树莓派的 IP 地址）。\n\
    然后系统会提示你输入密码（图 2-16）。\n\n![](img/54ed1f8e884bc184601bf6f652461a95_82_0.png)\n\n\
    “口令”和“签名”是安全设备，旨在在有人入侵你的树莓派时向你发出警报。如果在你再次认证时其中任何一个发生变化，你的树莓派可能已被入侵。\n\n### 讨论\n\
    \n虽然你可以使用 SSH 命令行完成大多数操作，但有时能够访问树莓派的图形环境会很有用。\n只要启用了 VNC 选项，树莓派的 VNC 服务器会在你重启时自动启动。\n\
    \n### 另请参阅\n\n另请参阅这个 [Adafruit 教程](https://www.adafruit.com/)。\n\n你也可以在使用 PiBakery\
    \ 设置新的树莓派时启用 VNC。\n\n## 2.9 在 Mac 网络上共享文件\n\n### 问题\n\n你希望你的树莓派出现在 macOS Finder\
    \ 的计算机列表中，以便你可以连接到它并使用 Finder 浏览文件系统。\n\n### 解决方案\n\nmacOS 操作系统内置了通过网络在 Finder\
    \ 中查看文件的支持（图 2-17）。但是，你必须在树莓派上进行一些配置更改，macOS 才能查看树莓派上的网络文件。\n\n![](img/54ed1f8e884bc184601bf6f652461a95_83_0.png)\n\
    \n你需要知道树莓派的 IP 地址（配方 2.2）。\n\n在树莓派上，使用以下命令安装 `netatalk`：\n\n```\n$ sudo apt-get\
    \ update\n$ sudo apt-get install netatalk\n```\n\n接下来，回到你的 Mac 上，在 Finder 菜单中，选择“前往”，点击“连接服务器”，然后输入\
    \ `afp://192.168.1.210` 作为服务器地址（当然，使用你树莓派的 IP 地址，而不是这里显示的地址）。然后，点击“连接”。然后系统会提示你登录（图\
    \ 2-18）。\n\n![](img/54ed1f8e884bc184601bf6f652461a95_84_0.png)\n\n使用名称 **pi**\
    \ 和你的密码登录，密码将是 **raspberry**，除非你已更改过。然后 Finder 应该会显示你树莓派上主目录的内容。\n\n还需要在树莓派上进行一些配置更改，这将自动将你的树莓派挂载到\
    \ Mac 的文件系统上：\n\n```\n$ sudo apt-get update\n$ sudo apt-get install avahi-daemon\n\
    $ sudo update-rc.d avahi-daemon defaults\n```\n\n接下来，输入此命令：\n\n```\n$ sudo nano\
    \ /etc/avahi/services/afpd.service\n```\n\n将以下代码粘贴到文件中。这需要输入很多内容，所以如果你正在阅读本书的纸质版，你可以从[这个网页](this\
    \ web page)复制并粘贴。只需向下滚动直到找到本章和本配方：\n\n```\n<?xml version=\"1.0\" standalone='no'?><!--*-nxml-*->\n\
    <!DOCTYPE service-group SYSTEM \"avahi-service.dtd\">\n<service-group>\n  <name\
    \ replace-wildcards=\"yes\">%h</name>\n  <service>\n    <type>_afpovertcp._tcp</type>\n\
    \    <port>548</port>\n  </service>\n</service-group>\n```\n\n要设置守护进程运行，以便在树莓派每次启动时自动执行此操作，请输入以下命令：\n\
    \n```\n$ sudo /etc/init.d/avahi-daemon restart\n```\n\n切换回你的 Mac，你现在应该能在 Finder\
    \ 中看到你的树莓派了。\n\n### 讨论\n\n能够在 Mac 和树莓派之间轻松移动文件非常有用。这意味着你可以在树莓派上使用文件，而无需连接单独的键盘、鼠标和显示器。\n\
    你也可以像在 Mac 上一样打开树莓派上的文件。这样做的好处是你可以使用 TextMate 或你最喜欢的 macOS 文本编辑器来编辑它们。\n如果你使用的是\
    \ Windows 或 Linux，你也可以通过配置树莓派作为网络附加存储（NAS）来共享文件；参见[配方 2.10](Recipe 2.10)。"
