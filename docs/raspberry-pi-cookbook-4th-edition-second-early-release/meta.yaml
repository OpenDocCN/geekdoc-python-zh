    > **MAN PAGES**


    Man pages are available for almost all Raspberry Pi OS commands, and you can see
    them by entering the command name followed by the command itself. However, a command’s
    man page is not always very accessible, being a thorough reference for the command
    rather than a simple guide for how to use the command. So it’s often better just
