    \ second argument.\n\nSo if the `Sat` key is not in the dictionary, `workouts.get('Sat')`\
    \ returns `None`, but `workouts.get('Sat', 'default_value')` returns `default_value`\
    \ as that is defined as default.\n\n# Resources\n\n[https://docs.python.org/3/library/stdtypes.html#dict.get](https://docs.python.org/3/library/stdtypes.html#dict.get)\n\
    \n# Exercise\n\n[Intro Bite 09. Workout dictionary lookups](Intro Bite 09. Workout\
    \ dictionary lookups)"
