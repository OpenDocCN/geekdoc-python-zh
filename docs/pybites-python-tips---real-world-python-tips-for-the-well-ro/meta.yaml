    # 28. Simulate dice rolls


    Python''s `random`, `range` and `itertools` make it easy to simulate dice rolls:


    ```

    >>> import random

    >>> import itertools

    >>> dice = range(1, 7)

    >>> list(dice)

    [1, 2, 3, 4, 5, 6]


    >>> combinations = list(itertools.product(dice, repeat=2))  # random.choice below
    needs a list

    >>> len(combinations)

    36

    >>> combinations[:5]  # use slicing to get a little sample

    [(1, 1), (1, 2), (1, 3), (1, 4), (1, 5)]


    >>> for _ in range(3):

    ...     random.choice(combinations)

    ...

    (2, 6)

    (1, 4)

    (5, 6)

    >>> random.sample(combinations, 5)

    [(6, 2), (2, 4), (6, 1), (4, 2), (4, 3)]

    ```


    # Explanation


    Here we use `range` to specify a range of 1-6 (7, the outer bound, is exclusive).
    As `range` is lazy loading, you have to wrap it in a `list` to see all the values.


    Then we use `itertools.product` to get all the possible rolls of the pair of dice
    (see the second resource link below).


    Then we use `random.choice` to get 3 random rolls (`_` indicates we are discarding
    the use of this loop variable).


    We can get rid of the for loop by using `random.sample` which seems designed for
    this use case. The less code the better :)


    # Resources


    [https://stackoverflow.com/a/54873996](https://stackoverflow.com/a/54873996)

    [https://statweb.stanford.edu/~susan/courses/s60/split/node65.html](https://statweb.stanford.edu/~susan/courses/s60/split/node65.html)'
