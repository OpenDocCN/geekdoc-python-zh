  - "[PAGE 110]\n\n# 99. What day of the week is it?\n\nIf you want the day of the\
    \ week as an integer, call `weekday` on a `date` object:\n\n```\n>>> from datetime\
    \ import date\n>>> help(date.today().weekday)\n\nHelp on built-in function weekday:\n\
    \nweekday(...) method of datetime.date instance\n    Return the day of the week\
    \ represented by the date.\n    Monday == 0 ... Sunday == 6\n\n# using it for\
    \ a Django command for example\n\nfrom django.core.management.base import BaseCommand\n\
    \nIS_MONDAY = date.today().weekday() == 0\n\nclass Command(BaseCommand):\n\n \
    \   def handle(self, *args, **options):\n        # logic for every day\n\n   \
    \     if IS_MONDAY:\n            # additional logic only to be run on Monday ...\n\
    ```\n\n# Explanation\n\nWe use this often in our Django commands to run them only\
    \ on particular days.\n\nFor example our 4 weekly tip emails we use\nmatch `WEEKDAY\
    \ = date.today().weekday()` against these\nconstants: `MONDAY, TUESDAY, THURSDAY,\
    \ FRIDAY = 0, 1, 3, 4`, very useful.\n\n# Resources\n\nhttps://docs.python.org/3/library/datetime.html#datetime.date.weekday\n\
    \n# Exercise\n\n[Bite 74. What day of the week were you born on?](https://pybit.es/bite74.html)"
  - '[PAGE 111]


    # 100. What week of the year is it?


    If you want the week of the year, call isocalendar on a date object:


    ```

    python

    >>> from datetime import date

    >>> date.today().isocalendar()[1]

    30

    >>> date(2020, 1, 3).isocalendar()[1]

    1

    >>> date(2020, 12, 25).isocalendar()[1]

    52


    # get a range of remaining weeks:

    >>> start_week = date.today().isocalendar()[1]

    >>> start_week

    45

    >>> weeks = range(start_week, 53)

    >>> list(weeks)

    [45, 46, 47, 48, 49, 50, 51, 52]


    ```


    # Explanation


    datetime.date.isocalendar returns a named tuple object with three components:
    year, week and weekday. Here we just want the week so we grab the second item
    ([1]).


    In the second snippet we use this with range to get the remaining weeks of this
    year.


    # Resources


    https://docs.python.org/3/library/datetime.html#datetime.date.isocalendar'
