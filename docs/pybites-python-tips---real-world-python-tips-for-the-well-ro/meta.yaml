    \ `major` 和 `minor` 属性。\n\n### 资源\n\n[https://docs.python.org/3/library/sys.html#sys.version_info](https://docs.python.org/3/library/sys.html#sys.version_info)\n\
    \n## 34. 强大的打印\n\nPython 的 `print` 语句比你想象的更强大：\n\n```\n>>> row = [\"1\", \"bob\"\
    , \"developer\", \"python\"]\n\n>>> print(','.join(str(x) for x in row))\n1,bob,developer,python\n\
    \n>>> print(*row, sep=',')\n1,bob,developer,python\n```\n\n### 解释\n\n你通常会像第一个示例那样一起使用\
