  md: "# 84. Working around invalid JSON\n\nJSONDecodeErrors can be annoying, but\
    \ look at what the ast module offers us:\n\n```\n>>> import ast\n>>> import json\n\
    >>> a = \"{'person': u'Julian', 'token': u'abc123'}\"\n>>> type(a)\n<class 'str'>\n\
    >>> json.loads(a)\n...\njson.decoder.JSONDecodeError: Expecting property name\
    \ enclosed in double quotes: line 1 column 2 (char 1)\n>>> ast.literal_eval(a)\n\
    {'person': 'Julian', 'token': 'abc123'}\n>>> b = ast.literal_eval(a)\n>>> type(b)\n\
    <class 'dict'>\n>>> b['token']\n'abc123'\n```\n\n# also used in\nhttps://github.com/plone/plone.schema/blob/master/plone/schema/jsonfield.py\n\
    \n```\nclass JSONField(Field):\n    ...\n    def fromUnicode(self, value):\n \
    \       ...\n        try:\n            v = json.loads(value)\n        except JSONDecodeError:\n\
