    [(''sara'', 37), (''bob'', 23), (''julian'', 11), (''tim'', 7)]


    # another example


    >>> names = ''bob Julian tim sara''.split()

    >>> sorted(names)

    [''Julian'', ''bob'', ''sara'', ''tim'']

    >>> sorted(names, key=str.lower)

    [''bob'', ''Julian'', ''sara'', ''tim'']

    ```


    # Explanation


    This is a very useful technique to sort items by a different item in the sequence
    in case of tuples, or different attribute if you are sorting objects.


    A `lambda` is an inline function, it''s the only place where we use them. Normally
    we just use a regular function (`def my_function(...`).


    And to reverse the sorting order, set the `reverse` keyword argument to `True`.


    Lastly `sorted` returns a new copy, sort however does the sorting in-place.


    # Resources


    [https://docs.python.org/3/howto/sorting.html#sortinghowto](https://docs.python.org/3/howto/sorting.html#sortinghowto)


