  md: '# 86. When to use a deque over a list


    A collections.deque is a list-like container with fast appends and pops on either
    end:


    ```

    >>> from collections import deque

    >>> import random

    >>> from timeit import timeit


    >>> lst = list(range(10_000_000))

    >>> deq = deque(range(10_000_000))


    >>> def insert_and_delete(ds):

    ...     for _ in range(10):

    ...         index = random.choice(range(100))

    ...         ds.remove(index)

    ...         ds.insert(index, index)


    # wow

    >>> timeit("insert_and_delete(lst)", "from __main__ import insert_and_delete,
    lst", number=10)

    1.6085020060000375

    >>> timeit("insert_and_delete(deq)", "from __main__ import insert_and_delete,
    deq", number=10)

    0.00024063900002602168

    ```


    # Explanation


    In any programming language it''s important that you know the right data structure
    for the job.


    deques can come in handy depending the list operations. As per the docs: "deques
    are a generalization of stacks and queues (the name is pronounced "deck" and is
    short for "double-ended queue"). Deques support thread-safe, memory efficient
    appends and pops from either side of the deque with approximately the same O(1)
    performance in either direction."


    In the example above we see how this can seriously improve the performance of
    your code!


    # Resources


    https://docs.python.org/3/library/collections.html#collections.deque


    # Exercise


    Bite 45. Keep a queue of last n items'
