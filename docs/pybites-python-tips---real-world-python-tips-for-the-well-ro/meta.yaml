  md: '# 92. Itertools.takewhile


    Get all the ninja belts up until a certain score using itertools. takewhile:


    ```

    python

    >>> ninja_belts

    {10: ''white'', 50: ''yellow'', 100: ''orange'', 175: ''green'', 250: ''blue'',
    400: ''brown'',

    600: ''black'', 800: ''paneled'', 1000: ''red''}

    >>> from itertools import takewhile

    >>> def get_belts(user_score):

    ...     return takewhile(lambda x: x[0] <= user_score,

    ...                       ninja_belts.items())

    ...

    >>> for i in (7, 18, 51, 174, 176):

    ...     i, list(get_belts(i))

    ...

    (7, [])

    (18, [(10, ''white'')])

    (51, [(10, ''white''), (50, ''yellow'')])

    (174, [(10, ''white''), (50, ''yellow''), (100, ''orange'')])

    (176, [(10, ''white''), (50, ''yellow''), (100, ''orange''), (175, ''green'')])

    ```


    # Explanation


    itertools. takewhile receives a predicate and an iterable. It returns a generator
    that returns elements from the iterable as long as the predicate is true.


    So here our predicate checks if the subsequent belt scores are less than the user''s
    score, effectively returning all the belts this user has earned so far.


    This code runs on our platform as we speak 😊


    # Resources


    [https://docs.python.org/3/library/itertools.html#itertools.takewhile](https://docs.python.org/3/library/itertools.html#itertools.takewhile)

    [https://pybit.es/itertools-examples.html](https://pybit.es/itertools-examples.html)'
