  md: '# 75. Freeze a portion of a function


    Python''s functools.partial lets you put a basic wrapper around an existing function:


    ```

    >>> from functools import partial

    >>> print_no_newline = partial(print, end='', '')

    >>> for _ in range(3): print(''test'')

    ...

    test

    test

    test

    >>> for _ in range(3): print_no_newline(''test'')

    ...

    test, test, test, >>>

    ```


    # Explanation


    Python''s functools.partial lets you put a basic wrapper around an existing function
    so that you can set a default value where there normally wouldn''t be one.


    Here we make our own print defaulting the end keyword to a comma (overwriting
    print''s default of adding a newline (\n) to the end).


    So this is a nice way to make a "shortcut" if you always call a function with
    the same arguments.


    # Resources


    [https://docs.python.org/3/library/functools.html#functools.partial](https://docs.python.org/3/library/functools.html#functools.partial)


    # Exercise


    [Bite 172. Having fun with Python Partials](Bite 172. Having fun with Python Partials)'
