- md: "## 64. Convert markdown to html\n\nMuch nicer to write our Bites in markdown,\
    \ when done just convert them into HTML with one simple command:\n\n```\n(venv)\
    \ $ pip install markdown\n\n# which creates this console entry script: venv/bin/markdown_py\n\
    \n(venv) $ markdown_py -h\nUsage: markdown_py [options] [INPUTFILE]\n        \
    \ (STDIN is assumed if no INPUTFILE is given)\n\n# let's try an example doc\n\n\
    (venv) $ more doc.md\n## pybites\nthis is some markdown\nhere is a [link](http://example.com).\n\
    \n# bounce html to standard output\n\n(venv) $ markdown_py < doc.md\n<h2>pybites</h2>\n\
    <p>this is some markdown</p>\n<p>here is a <a href=\"http://example.com\">link</a>.</p>\n\
    \n# or save it to a file\n\n(venv) $ markdown_py < doc.md > doc.html\n```\n\n\
    ## Explanation\n\nThe code should be self-explanatory, although if you're still\
    \ new to Unix / command line, standard input / output redirection is a valuable\
    \ bonus: command line tools are a must in your developer arsenal!\n\n## Resources\n\
    \nhttps://python-markdown.github.io/\n\n## 65. Get multiple items from a sequence\n\
    \nAnother standard library gem: `operator.itemgetter` lets you grab multiple items\
    \ from a `list`, `dict`, etc:\n\n```\n>>> from operator import itemgetter\n\n\
    >>> days = ['mon', 'tue', 'wed', 'thurs', 'fri', 'sat', 'sun']\n>>> f = itemgetter(3,\
    \ 6)\n>>> f(days)\n('thurs', 'sun')\n\n# same as:\n>>> days.__getitem__(3), days.__getitem__(6)\n\
    ('thurs', 'sun')\n\n# works with strings too:\n>>> f(\"hello world\")\n('l', 'w')\n\
    \n# using with dict keys and in one go:\n>>> workouts\n{'mon': 'chest+biceps',\
    \ 'tue': 'legs', 'wed': 'cardio', 'thurs': 'back+triceps', 'fri': 'legs', 'sat':\
    \ 'rest', 'sun': 'rest'}\n>>> itemgetter('mon', 'tue')(workouts)\n('chest+biceps',\
    \ 'legs')\n```\n\n## Explanation\n\nSlicing gets you consecutive items, but what\
    \ if you want to get non-consecutive items?\n\nEnter `itemgetter` which lets you\
    \ specify multiple lookup indices as shown above.\n\n`itemgetter` is also a nice\
    \ alternative for `lambda` when sorting. For example, to sort by the second item\
    \ of each tuple in a list (say `inventory = [('apple', 3), ('banana', 2), ...]`),\
    \ you can do: `sorted(inventory, key=itemgetter(1))`.\n\n## Resources\n\nhttps://docs.python.org/3/library/operator.html#operator.itemgetter\n\
    \n## 66. Strip takes multiple characters\n\nPython's `str.strip` can remove multiple\
    \ leading and trailing characters at once:\n\n```\n# real use case on our platform\n\
    >>> pytest_summary = \"=== 20 passed in 0.05 seconds ===\\n\"\n>>> pytest_summary.strip(\"\
    = \\n\")\n'20 passed in 0.05 seconds'\n\n# another example from the docs\n>>>\
    \ 'www.example.com'.strip('cmowz.')\n'example'\n>>> comment_string = '#.......\
    \ Section 3.2.1 Issue #32 .......'\n>>> comment_string.strip('.#! ')\n'Section\
    \ 3.2.1 Issue #32'\n```\n\n## Explanation\n\nNote it only strips mentioned characters\
    \ at the beginning and end, not inside the string.\n\nIt will eagerly strip till\
    \ it hits a character that is not in the sequence of characters specified.\n\n\
    If you want to strip on only one side use the `lstrip` method for leading and\
    \ the `rstrip` method for trailing characters.\n\n## Resources\n\nhttps://docs.python.org/3/library/stdtypes.html#str.strip\n\
    \n## 67. Instant coding answers via the command line\n\nNeed to check StackOverflow,\
    \ but don't want to leave the terminal? Use a neat tool called howdoi:\n\n```\n\
    $ mkdir ~/howdoi && $_\n$ python -m venv venv && source venv/bin/activate\n(venv)\
    \ $ pip install howdoi\n\n# I made a useful alias (you could also use vim-howdoi)\n\
    $ alias howdoi\nalias howdoi='source $HOME/howdoi/venv/bin/activate && howdoi'\n\
    \n# enjoy!\n$ howdoi zip enumerate\nfor index, (value1, value2) in enumerate(zip(data1,\
    \ data2)):\n    ...\n\n$ howdoi argparse\nimport argparse\nparser = argparse.ArgumentParser()\n\
    parser.add_argument(\"a\")\n...\n\n# or just get (and open) the link to the answer\
    \ / code\n$ howdoi decorator -l\nhttps://stackoverflow.com/questions/2435764/how-to-differentiate-between-method-and-function-in-a-decorator\n\
    $ open `howdoi decorator -l`\n```\n\n## Explanation\n\nhowdoi is very useful tool\
    \ to quickly look for code snippets from the command line.\n\nHere we show you\
    \ how to install the package into a virtual environment and make a shell alias.\
    \ Then just enjoy :)\n\nAs nice as howdoi is on the outside, the code on the inside\
    \ is elegant too. It was used as an example in The Hitchhiker's Guide to Python's\
    \ \"Reading Great Code\" chapter.\n\n## Resources\n\nhttps://github.com/gleitz/howdoi\n\
    https://pybit.es/developer-tools.html\n\n## 68. Match files with Path.glob\n\n\
    Use `Path.glob` to list matching files in a directory (structure):\n\n```\n>>>\
    \ from pathlib import Path\n\n# get python files in current directory\n>>> for\
    \ file_path in Path('.').glob('*.py'): print(file_path)\n\n# get python files\
    \ one level deep\n>>> for file_path in Path('.').glob('*/*.py'): print(file_path)\n\
    \n# get python files recursively (might be slow!)\n>>> for file_path in Path('.').glob('**/*.py'):\
    \ print(file_path)\n```\n\n## Explanation\n\nPreviously we used the `glob` module\
    \ for this tip, but using `pathlib` it returns `pathlib.PosixPath` instead of\
    \ `str` objects, which are way easier (Pythonic?) to manipulate as per the Path\
    \ interface.\n\nNote that using the `**` pattern makes it recursive which can\
    \ significantly slow down the operation on large directory trees.\n\n## Resources\n\
    \n[https://docs.python.org/3/library/pathlib.html#pathlib.Path.glob](https://docs.python.org/3/library/pathlib.html#pathlib.Path.glob)\n\
    \n## Exercise\n\n[Bite 116. List and filter files in a directory](Bite 116. List\
    \ and filter files in a directory)\n\n## 69. String module\n\nUsing the `string`\
    \ module to make a random string:\n\n```\n>>> import random\n>>> import string\n\
    \n>>> ''.join(random.choice(string.ascii_lowercase) for i in range(20))\n'jjkjs\
    \ gyksqfmtgpujmud'\n\n# \"sample\" seems more adequate:\n>>> ''.join(random.sample(string.ascii_lowercase\
    \ + string.digits, 20))\n'oytkq3u4l6hnbpz19r85'\n\n# other constants you can use:\n\
    >>> help(string)\n...\nDATA\n    __all__ = ['ascii_letters', 'ascii_lowercase',\
    \ 'ascii_uppercase', 'cap...\n    ascii_letters = 'abcdefghijklmnopqrstuvwxyzABCDEFGHIJKLMNOPQRSTUVWXYZ'\n\
    \    ascii_lowercase = 'abcdefghijklmnopqrstuvwxyz'\n    ascii_uppercase = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ'\n\
    \    digits = '0123456789'\n    hexdigits = '0123456789abcdefABCDEF'\n    octdigits\
    \ = '01234567'\n    printable = '0123456789abcdefghijklmnopqrstuvwxyzABCDEFGHIJKLMNOPQRSTUVWXYZ...'\n\
    \    punctuation = '!\"#$%&\\'()*+,-./:;<=>?@[\\]^_`{|}~'\n    whitespace = '\
    \ \\t\\n\\r\\x0b\\x0c'\n```\n\n## Explanation\n\nThe `string` module has some\
    \ useful constants.\n\nHere we use two to build random strings. We literally used\
    \ this to create license keys.\n\nAgain, get into the habit of calling `help`\
    \ on objects to quickly reference documentation.\n\n## Resources\n\n[https://docs.python.org/3/library/string.html](https://docs.python.org/3/library/string.html)\n\
    \n## Exercise\n\n[Bite 47. Write a new password field validator](Bite 47. Write\
    \ a new password field validator)\n\n## 70. Use casefold for unicode string matching\n\
    \nCasefolding is similar to lowercasing but more aggressive:\n\n```\n>>> a, b\
    \ = \"der Fluß\", \"der Fluss\"\n\n>>> a.lower() == b.lower()\nFalse\n\n# casefold\
    \ converts 'ß' \"ss\" which makes the 2 strings identical\n>>> a.casefold() ==\
    \ b.casefold()\nTrue\n\n>>> 'ß'.casefold()\n'ss'\n```\n\n## Explanation\n\nstr.casefold\
    \ (new since Python 3.3) is similar to str.lower but more aggressive because it\
    \ is intended to remove all case distinctions in a string.\n\nThis is especially\
    \ helpful for Unicode characters, often quoted is the example of matching a German\
    \ 'ß' with 'ss'.\n\n## Resources\n\nhttps://docs.python.org/3/library/stdtypes.html#str.casefold\n\
    https://pythonbytes.fm/episodes/show/168/race-your-donkey-car-with-python\n\n\
    ## 71. Access your virtual environment in a Jupyter Notebook\n\nHow to work with\
    \ a virtual environment (dependencies) in a Jupyter notebook:\n\n```\n# in your\
    \ virtual environment (assuming it's \"venv\" in your current directory)\n$ pip\
    \ install ipykernel\n\n# install a new kernel\n$ ipykernel install --user --name\
    \ venv --display-name \"My Project (venv)\"\n\n$ jupyter notebook\n# in your notebook's\
    \ file browser select \"My Project (venv)\" from the \"New\" dropdown\n```\n\n\
    ## Explanation\n\nIt can be annoying to open a notebook and not being able to\
    \ work with external modules you just pip installed in your virtual environment.\n\
    \nBut there is a fix: get ipykernel and install a dedicated kernel for your virtual\
    \ environment.\n\nThen when you open a notebook, you can select your venv and\
    \ voilà: your virtual env's dependencies are now available for import.\n\n## Resources\n\
    \nhttps://anbasile.github.io/posts/2017-06-25-jupyter-venv/\nhttps://ipython.readthedocs.io/en/stable/install/kernel_install.html"
  mdcn: "## 64. 将 Markdown 转换为 HTML\n\n用 Markdown 编写我们的实战练习（Bites）非常方便，完成后只需一个简单的命令就能将它们转换为\
    \ HTML：\n\n```\n(venv) $ pip install markdown\n\n# 这会创建一个控制台入口脚本：venv/bin/markdown_py\n\
    \n(venv) $ markdown_py -h\nUsage: markdown_py [options] [INPUTFILE]\n        \
    \ (STDIN is assumed if no INPUTFILE is given)\n\n# 让我们尝试一个示例文档\n\n(venv) $ more\
    \ doc.md\n## pybites\nthis is some markdown\nhere is a [link](http://example.com).\n\
    \n# 将 HTML 输出到标准输出\n\n(venv) $ markdown_py < doc.md\n<h2>pybites</h2>\n<p>this\
    \ is some markdown</p>\n<p>here is a <a href=\"http://example.com\">link</a>.</p>\n\
    \n# 或者将其保存到文件\n\n(venv) $ markdown_py < doc.md > doc.html\n```\n\n## 说明\n\n这段代码应该是不言自明的，但如果你对\
    \ Unix / 命令行还不熟悉，那么理解标准输入/输出重定向是一个非常有价值的额外收获：命令行工具是你的开发者工具箱中必备的一部分！\n\n## 资源\n\
    \nhttps://python-markdown.github.io/\n\n## 65. 从序列中获取多个元素\n\n另一个标准库的瑰宝：`operator.itemgetter`\
    \ 让你可以从 `list`、`dict` 等中一次性抓取多个元素：\n\n```\n>>> from operator import itemgetter\n\
    \n>>> days = ['mon', 'tue', 'wed', 'thurs', 'fri', 'sat', 'sun']\n>>> f = itemgetter(3,\
    \ 6)\n>>> f(days)\n('thurs', 'sun')\n\n# 等同于：\n>>> days.__getitem__(3), days.__getitem__(6)\n\
    ('thurs', 'sun')\n\n# 对字符串也有效：\n>>> f(\"hello world\")\n('l', 'w')\n\n# 配合字典键一起使用：\n\
    >>> workouts\n{'mon': 'chest+biceps', 'tue': 'legs', 'wed': 'cardio', 'thurs':\
    \ 'back+triceps', 'fri': 'legs', 'sat': 'rest', 'sun': 'rest'}\n>>> itemgetter('mon',\
    \ 'tue')(workouts)\n('chest+biceps', 'legs')\n```\n\n## 说明\n\n切片（Slicing）可以获取连续的元素，但如果你想获取非连续的元素呢？\n\
    \n`itemgetter` 就派上用场了，它允许你如上所示指定多个查找索引。\n\n`itemgetter` 也是排序时 `lambda` 的一个很好的替代方案。例如，要根据列表中每个元组的第二个元素（假设\
    \ `inventory = [('apple', 3), ('banana', 2), ...]`）进行排序，你可以这样做：`sorted(inventory,\
    \ key=itemgetter(1))`。\n\n## 资源\n\nhttps://docs.python.org/3/library/operator.html#operator.itemgetter\n\
    \n## 66. strip 可以移除多个字符\n\nPython 的 `str.strip` 可以一次性移除开头和结尾的多个字符：\n\n```\n# 我们平台上的一个真实用例\n\
    >>> pytest_summary = \"=== 20 passed in 0.05 seconds ===\\n\"\n>>> pytest_summary.strip(\"\
    = \\n\")\n'20 passed in 0.05 seconds'\n\n# 来自文档的另一个例子\n>>> 'www.example.com'.strip('cmowz.')\n\
    'example'\n>>> comment_string = '#....... Section 3.2.1 Issue #32 .......'\n>>>\
    \ comment_string.strip('.#! ')\n'Section 3.2.1 Issue #32'\n```\n\n## 说明\n\n请注意，它只移除字符串开头和结尾处提到的字符，而不会处理字符串内部的字符。\n\
    \n它会贪婪地移除字符，直到遇到一个不在指定字符序列中的字符为止。\n\n如果你只想在一侧进行移除，请对开头字符使用 `lstrip` 方法，对结尾字符使用\
    \ `rstrip` 方法。\n\n## 资源\n\nhttps://docs.python.org/3/library/stdtypes.html#str.strip\n\
    \n## 67. 通过命令行即时获取编程答案\n\n需要查看 StackOverflow，但又不想离开终端？使用一个名为 howdoi 的实用工具：\n\n\
    ```\n$ mkdir ~/howdoi && $_\n$ python -m venv venv && source venv/bin/activate\n\
    (venv) $ pip install howdoi\n\n# 我设置了一个有用的别名（你也可以使用 vim-howdoi）\n$ alias howdoi\n\
    alias howdoi='source $HOME/howdoi/venv/bin/activate && howdoi'\n\n# 开始享受吧！\n$\
    \ howdoi zip enumerate\nfor index, (value1, value2) in enumerate(zip(data1, data2)):\n\
    \    ...\n\n$ howdoi argparse\nimport argparse\nparser = argparse.ArgumentParser()\n\
    parser.add_argument(\"a\")\n...\n\n# 或者只是获取（并打开）答案/代码的链接\n$ howdoi decorator -l\n\
    https://stackoverflow.com/questions/2435764/how-to-differentiate-between-method-and-function-in-a-decorator\n\
    $ open `howdoi decorator -l`\n```\n\n## 说明\n\nhowdoi 是一个非常有用的工具，可以让你在命令行中快速查找代码片段。\n\
    \n这里我们向你展示如何将包安装到虚拟环境中并创建一个 shell 别名。然后就可以尽情使用了 :)\n\n虽然 howdoi 表面使用起来很棒，但其内部代码也很优雅。它曾作为《Python\
    \ 修炼之道》中“阅读优秀代码”一章的示例。\n\n## 资源\n\nhttps://github.com/gleitz/howdoi\nhttps://pybit.es/developer-tools.html\n\
    \n## 68. 使用 Path.glob 匹配文件\n\n使用 `Path.glob` 来列出目录（结构）中匹配的文件：\n\n```\n>>> from\
    \ pathlib import Path\n\n# 获取当前目录下的 python 文件\n>>> for file_path in Path('.').glob('*.py'):\
    \ print(file_path)\n\n# 获取下一级目录的 python 文件\n>>> for file_path in Path('.').glob('*/*.py'):\
    \ print(file_path)\n\n# 递归地获取所有 python 文件（可能很慢！）\n>>> for file_path in Path('.').glob('**/*.py'):\
    \ print(file_path)\n```\n\n## 说明\n\n之前我们用 `glob` 模块来完成这个技巧，但使用 `pathlib`，它返回的是\
    \ `pathlib.PosixPath` 对象而不是 `str` 对象，按照 Path 接口来操作会容易得多（更 Pythonic 吗？）。\n\n请注意，使用\
    \ `**` 模式会使其递归匹配，这在大型目录树上可能会显著降低操作速度。\n\n## 资源\n\n[https://docs.python.org/3/library/pathlib.html#pathlib.Path.glob](https://docs.python.org/3/library/pathlib.html#pathlib.Path.glob)\n\
    \n## 练习\n\n[Bite 116. 列出并筛选目录中的文件](Bite 116. List and filter files in a directory)\n\
    \n## 69. string 模块\n\n使用 `string` 模块来生成一个随机字符串：\n\n```\n>>> import random\n>>>\
    \ import string\n\n>>> ''.join(random.choice(string.ascii_lowercase) for i in\
    \ range(20))\n'jjkjs gyksqfmtgpujmud'\n\n# “sample” 看起来更合适：\n>>> ''.join(random.sample(string.ascii_lowercase\
    \ + string.digits, 20))\n'oytkq3u4l6hnbpz19r85'\n\n# 你可以使用的其他常量：\n>>> help(string)\n\
    ...\nDATA\n    __all__ = ['ascii_letters', 'ascii_lowercase', 'ascii_uppercase',\
    \ 'cap...\n    ascii_letters = 'abcdefghijklmnopqrstuvwxyzABCDEFGHIJKLMNOPQRSTUVWXYZ'\n\
    \    ascii_lowercase = 'abcdefghijklmnopqrstuvwxyz'\n    ascii_uppercase = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ'\n\
    \    digits = '0123456789'\n    hexdigits = '0123456789abcdefABCDEF'\n    octdigits\
    \ = '01234567'\n    printable = '0123456789abcdefghijklmnopqrstuvwxyzABCDEFGHIJKLMNOPQRSTUVWXYZ...'\n\
    \    punctuation = '!\"#$%&\\'()*+,-./:;<=>?@[\\]^_`{|}~'\n    whitespace = '\
    \ \\t\\n\\r\\x0b\\x0c'\n```\n\n## 说明\n\n`string` 模块提供了一些有用的常量。\n\n这里我们使用其中两个来构建随机字符串。我们确实曾用这种方法来创建许可证密钥。\n\
    \n再次强调，养成对对象调用 `help` 的习惯，以便快速参考文档。\n\n## 资源\n\n[https://docs.python.org/3/library/string.html](https://docs.python.org/3/library/string.html)\n\
    \n## 练习\n\n[Bite 47. 编写一个新的密码字段验证器](Bite 47. Write a new password field validator)\n\
    \n## 70. 使用 casefold 进行 Unicode 字符串匹配\n\n大小写折叠（Casefolding）类似于转换为小写，但更加“激进”：\n\
    \n```\n>>> a, b = \"der Fluß\", \"der Fluss\"\n\n>>> a.lower() == b.lower()\n\
    False\n\n# casefold 将 'ß' 转换为 \"ss\"，使得两个字符串变得相同\n>>> a.casefold() == b.casefold()\n\
    True\n\n>>> 'ß'.casefold()\n'ss'\n```\n\n## 说明\n\n`str.casefold`（Python 3.3 新增）类似于\
    \ `str.lower`，但更激进，因为它旨在消除字符串中所有的大小写区别。\n\n这对 Unicode 字符特别有用，常被引用的例子就是将德语 'ß'\
    \ 与 'ss' 匹配。\n\n## 资源\n\nhttps://docs.python.org/3/library/stdtypes.html#str.casefold\n\
    https://pythonbytes.fm/episodes/show/168/race-your-donkey-car-with-python\n\n\
    ## 71. 在 Jupyter Notebook 中访问你的虚拟环境\n\n如何在 Jupyter notebook 中使用虚拟环境（依赖）：\n\n```\n\
    # 在你的虚拟环境中（假设它在当前目录下名为 \"venv\"）\n$ pip install ipykernel\n\n# 安装一个新的内核\n$ ipykernel\
    \ install --user --name venv --display-name \"My Project (venv)\"\n\n$ jupyter\
    \ notebook\n# 在你的 notebook 的文件浏览器中，从“新建”下拉菜单中选择 \"My Project (venv)\"\n```\n\n\
    ## 说明\n\n打开一个 notebook 却无法使用你刚刚在虚拟环境中通过 pip 安装的外部模块，这可能会很烦人。\n\n但有一个解决办法：安装 `ipykernel`\
    \ 并为你的虚拟环境安装一个专用的内核。\n\n然后当你打开一个 notebook 时，你可以选择你的 venv，瞧：你虚拟环境的依赖现在可以被导入了。\n\
    \n## 资源\n\nhttps://anbasile.github.io/posts/2017-06-25-jupyter-venv/\nhttps://ipython.readthedocs.io/en/stable/install/kernel_install.html"
