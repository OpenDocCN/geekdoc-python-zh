    >>> parser = argparse.ArgumentParser()\n>>> parser.add_argument('-c', '--color')\n\
    >>> args = parser.parse_args()\n\n>>> cli_args = {k: v for k, v in vars(args).items()\
    \ if v}\n>>> combined = ChainMap(cli_args, os.environ, defaults)\n>>> combined['color']\n\
    red  # default\n\n>>> os.environ['color'] = 'blue'\n>>> combined = ChainMap(cli_args,\
    \ os.environ, defaults)\n>>> combined['color']\nblue  # env variable takes precedence\n\
    \n>>> args.color = 'green'  # as if given from the command line\n>>> cli_args\
    \ = {k: v for k, v in vars(args).items() if v}\n>>> combined = ChainMap(cli_args,\
    \ os.environ, defaults)\n>>> combined['color']\ngreen  # command line variable\
    \ takes precedence\n```\n\n### Explanation\n\n`ChainMap` groups multiple `dicts`\
    \ or other mappings together to create a single, updateable view.\n\nIn this example,\
    \ extracted from the docs, `ChainMap` allows us to set up a precedence chain:\
    \ user specified command-line arguments take precedence over environment variables\
    \ which in turn take precedence over default values.\n\n### Resources\n\n- https://docs.python.org/3/library/collections.html#chainmap-examples-and-recipes\n\
    - https://docs.python.org/3/library/collections.html#collections.ChainMap\n\n\
    ## 45. Redirecting standard output\n\nPython's `contextlib` module has a useful\
    \ context manager for redirecting standard output:\n\n```python\nfrom contextlib\
    \ import redirect_stdout\n\n>>> with open('help.txt', 'w') as f:\n...     with\
