    # 74. Strip out vowels counting replacements


    Here is how to replace all vowels from a text while keeping a count of the number
    of replacements made:


    ```

    >>> import re

    >>> vowels = ''aeiou''

    >>> text = """

    ... The Zen of Python, by Tim Peters

    ...

    ... Beautiful is better than ugly.

    ... [truncated]

    ... """

    >>> new_string, number_of_subs_made = re.subn(f''[{vowels}]'', ''*'', text, flags=re.I)

    >>> new_string[:10]

    ''\nTh* Z*n *''

    >>> number_of_subs_made

    262

    ```


    # Explanation


    Python has a robust re module.


    You can use re.subn to do regex replacing. It returns a tuple of the new (replaced)
    string and the number of replacements made.


    This can be a bit cryptic (what if somebody does not know much regex?). So no
    shame in using a classic for to loop through the string and manually count the
    replacements. This might be more readable / intuitive.


    Or what do you think? Solve the exercise below and hop in the forum to tell us
    ...


    # Resources


    https://docs.python.org/3/library/re.html#re.subn


    # Exercise


    Intro Bite 06. Strip out vowels and count the number of replacements'
