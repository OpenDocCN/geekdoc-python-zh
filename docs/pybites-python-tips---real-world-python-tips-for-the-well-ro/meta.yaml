    \        ...\n```\n\n### 解释\n\n模拟的目的是阻止对某个东西的真实访问，在本例中是一个外部API，因为它会产生依赖并拖慢测试速度。\n\
    \n示例代码模仿了`tweepy.API`的`get_status`方法，该方法会调用Twitter API。\n\n我们使用`@patch.object`的`return_value`关键字参数，通过`get_tweet`辅助函数加载替代的响应数据。\n\
