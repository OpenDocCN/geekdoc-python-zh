  md: '# 32. In operator


    Do you want to perform multiple membership checks in Python? Just use `in`:


    ```

    >>> colors = ''blue red green yellow black white orange''.split()


    # is this a primary color?

    >>> color == ''red'' or color == ''blue'' or color == ''yellow''  # don''t do
    this

    True

    >>> primary_colors = set([''red'', ''yellow'', ''blue''])

    >>> color in primary_colors

    True

    ```


    # Explanation


    When you do multiple comparisons, it''s often more concise to just use the `in`
    operator.


    Special note on membership checking and performance. If you use `in` against a
    `list` it scans through all items sequentially, which is slower. A `set` (like
    a `dict`) is a hashable type which makes `in` lookups faster.


    # Resources


    https://docs.python.org/3/reference/expressions.html#in

    https://stackoverflow.com/a/14535739'
