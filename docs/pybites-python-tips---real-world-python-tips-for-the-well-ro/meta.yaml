    ## 11. F-字符串


    从 Python 3.6 开始，你可以使用 f-字符串：


    ```

    >>> for i in range(3):

    ...     ''{i} apple{s}''.format(i=i, s="s" if i != 1 else "")

    ...

    ''0 apples''

    ''1 apple''

    ''2 apples''

    >>> for i in range(3):

    ...     f''{i} apple{"s" if i != 1 else ""}''

    ...

    ''0 apples''

    ''1 apple''

    ''2 apples''

    ```


    ### 解释


    F-字符串允许你嵌入变量甚至表达式。


    `format` 确实不错，但 f-字符串使其更明确、更简洁。


    你甚至可以更容易地调试变量，但这将留待另一个技巧中介绍……


