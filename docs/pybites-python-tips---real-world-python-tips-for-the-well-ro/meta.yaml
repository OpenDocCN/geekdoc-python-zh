    # 72. Callable and getattr built-ins


    You can use the `callable` built-in to see if an object is callable (e.g. a function
    / method):


    ```

    >>> import string

    >>> attrs = [attr for attr in dir(string) if not attr.startswith(''_'')]

    >>> for a in attrs: a, callable(getattr(string, a))

    ...

    (''Formatter'', True)

    (''Template'', True)

    (''ascii_letters'', False)

    (''ascii_lowercase'', False)

    (''ascii_uppercase'', False)

    (''capwords'', True)

    (''digits'', False)

    ...

    # why getattr?

    >>> attrs[0], type(attrs[0])

    (''Formatter'', <class ''str''>)

    # oops

    >>> callable(attrs[0])

    False

    # we need to give callable the actual object:

    >>> callable(getattr(string, attrs[0]))

    True

    ```


    # Explanation


    Here we call `dir` on the `string` module to see all the "public" attributes.


    Then we loop over seeing if they are "callable". Note that we need to use `getattr`
    to get the actual object (as opposed to the `str` that `dir` returns), because
    `callable` receives an object.


    So there you go, now you also know about the handy `getattr` built-in.


    Fun fact: the callable function was removed in Python 3.0 but came back in Python
    3.2.


    # Resources


    https://docs.python.org/3/library/functions.html#callable

    https://docs.python.org/3/library/functions.html#getattr'
