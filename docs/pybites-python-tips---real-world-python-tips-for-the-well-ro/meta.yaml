    >>> for _ in range(3):\n...     next(seq)\n...\n3.75\n4.0\n4.25\n```\n\n### 解释\n\
    \n`itertools` 模块中的函数创建用于高效循环的迭代器。学习并掌握它们，它们可以为你节省大量工作。\n\n这里我们创建了一个从 11 开始的无限计数器。你可以给它一个步长，它也适用于\
