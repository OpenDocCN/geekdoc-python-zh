    # 44. Group dict / mappings


    Use `collections.ChainMap` to group multiple dictionaries / mappings together:


    ```

    >>> import argparse

    >>> import os

    >>> from collections import ChainMap

    >>> defaults = {''color'': ''red''}


    >>> parser = argparse.ArgumentParser()

    >>> parser.add_argument(''-c'', ''--color'')

    >>> args = parser.parse_args()


    >>> cli_args = {k: v for k, v in vars(args).items() if v}

    >>> combined = ChainMap(cli_args, os.environ, defaults)

    >>> combined[''color'']

    red  # default


    >>> os.environ[''color''] = ''blue''

    >>> combined = ChainMap(cli_args, os.environ, defaults)

    >>> combined[''color'']

    blue  # env variable takes precedence


    >>> args.color = ''green''  # as if given from the command line

    >>> cli_args = {k: v for k, v in vars(args).items() if v}

    >>> combined = ChainMap(cli_args, os.environ, defaults)

    >>> combined[''color'']

    green  # command line variable takes precedence

    ```


    # Explanation


    ChainMap groups multiple `dicts` or other mappings together to create a single,
    updateable view.


    In this example, extracted from the docs, ChainMap allows us to set up a precedence
    chain: user specified command-line arguments take precedence over environment
    variables which in turn take precedence over default values.


    # Resources


    https://docs.python.org/3/library/collections.html#chainmap-examples-and-recipes

    https://docs.python.org/3/library/collections.html#collections.ChainMap'
