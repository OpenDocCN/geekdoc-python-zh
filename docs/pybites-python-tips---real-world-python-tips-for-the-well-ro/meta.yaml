    # # 27. Copy.deepcopy


    Use deepcopy to copy compound objects in Python:


    ```

    python

    >>> from copy import copy, deepcopy

    >>> items = [dict(id=1, name=''laptop'')]

    >>> items2 = copy(items)

    >>> items[0][''name''] = ''macbook''

    >>> items

    [{''id'': 1, ''name'': ''macbook''}]

    >>> items2

    [{''id'': 1, ''name'': ''macbook''}]  # oops!

    >>> items = [dict(id=1, name=''laptop'')]

    >>> items2 = deepcopy(items)

    >>> items[0][''name''] = ''macbook''

    >>> items

    [{''id'': 1, ''name'': ''macbook''}]

    >>> items2

    [{''id'': 1, ''name'': ''laptop''}]  # this object stays intact as per intention

    ```


    # ## Explanation


    It''s important to know the difference between shallow and deep copy:


    +   - A shallow copy constructs a new compound object and then (to the extent
    possible) inserts references into it to the objects found in the original.

    - A deep copy constructs a new compound object and then, recursively, inserts
    copies into it of the objects found in the original


    As shown in the example, making a shallow copy of a nested object with `copy`
    (or using slicing: `[:]`) inner objects are references, so updating one updates
    all copies.


    Not so with `deepcopy`. See our article below for another use case.


    # ## Resources


    [https://pybit.es/mutability.html](https://pybit.es/mutability.html)

    [https://docs.python.org/3/library/copy.html](https://docs.python.org/3/library/copy.html)


    # ## Exercise


    [Bite 32. Don''t let mutability fool you](Bite 32. Don''t let mutability fool
    you)'
- md: "## 28. Simulate dice rolls\n\nPython's `random`, `range` and `itertools` make\
    \ it easy to simulate dice rolls:\n\n```\n>>> import random\n>>> import itertools\n\
    >>> dice = range(1, 7)\n>>> list(dice)\n[1, 2, 3, 4, 5, 6]\n\n>>> combinations\
    \ = list(itertools.product(dice, repeat=2))  # random.choice below needs a list\n\
    >>> len(combinations)\n36\n>>> combinations[:5]  # use slicing to get a little\
    \ sample\n[(1, 1), (1, 2), (1, 3), (1, 4), (1, 5)]\n\n>>> for _ in range(3):\n\
    ...     random.choice(combinations)\n...\n(2, 6)\n(1, 4)\n(5, 6)\n>>> random.sample(combinations,\
    \ 5)\n[(6, 2), (2, 4), (6, 1), (4, 2), (4, 3)]\n```\n\n### Explanation\n\nHere\
    \ we use `range` to specify a range of 1-6 (7, the outer bound, is exclusive).\
    \ As `range` is lazy loading, you have to wrap it in a `list` to see all the values.\n\
    \nThen we use `itertools.product` to get all the possible rolls of the pair of\
    \ dice (see the second resource link below).\n\nThen we use `random.choice` to\
    \ get 3 random rolls (`_` indicates we are discarding the use of this loop variable).\n\
    \nWe can get rid of the for loop by using `random.sample` which seems designed\
    \ for this use case. The less code the better :)\n\n### Resources\n\n[https://stackoverflow.com/a/54873996](https://stackoverflow.com/a/54873996)\n\
    [https://statweb.stanford.edu/~susan/courses/s60/split/node65.html](https://statweb.stanford.edu/~susan/courses/s60/split/node65.html)\n\
    \n## 29. Itertools.cycle\n\nUse itertools.cycle to loop through a sequence ad\
    \ infinitum:\n\n```\n>>> import itertools\n>>> lights = itertools.cycle('Red Green\
    \ Amber'.split())\n>>> next(lights)\n'Red'\n>>> next(lights)\n'Green'\n>>> next(lights)\n\
    'Amber'\n>>> next(lights)\n'Red'\n>>> next(lights)\n'Green'\n>>> next(lights)\n\
    'Amber'\n```\n\n### Explanation\n\nitertools.cycle lets you loop through a sequence\
    \ indefinitely.\n\nHere Julian used it to simulate traffic lights (as part of\
    \ our first #100DaysOfCode).\n\n### Resources\n\nhttps://github.com/pybites/100DaysOfCode/blob/master/029/traffic_lights.py\n\
    https://docs.python.org/3.8/library/itertools.html#itertools.cycle\n\n### Exercise\n\
    \nBite 63. Use an infinite iterator to simulate a traffic light\n\n## 30. Pairing\
    \ friends up\n\nGiven a list of friends how many pairs can be formed?\n\n```\n\
    >>> import itertools\n>>> friends = 'bob tim julian fred'.split()\n>>> list(itertools.combinations(friends,\
    \ 2))\n[('bob', 'tim'), ('bob', 'julian'), ('bob', 'fred'), ('tim', 'julian'),\n\
    \ ('tim', 'fred'), ('julian', 'fred')]\n\n>>> list(itertools.permutations(friends,\
    \ 2))\n[('bob', 'tim'), ('bob', 'julian'), ('bob', 'fred'), ('tim', 'bob'), ('tim',\n\
    'julian'), ('tim', 'fred'), ('julian', 'bob'), ('julian', 'tim'), ('julian',\n\
    'fred'), ('fred', 'bob'), ('fred', 'tim'), ('fred', 'julian')]\n```\n\n### Explanation\n\
    \nThis is where Python's itertools.combinations shines!\n\nNote that itertools.permutations\
    \ does not work here, because it treats elements as unique based on their position\
    \ so it causes two entries: ('bob', 'tim') and ('tim', 'bob'). combinations on\
    \ the other hand takes this duplication out which is what we want here.\n\n###\
    \ Resources\n\nhttps://docs.python.org/3/library/itertools.html#itertools.combinations\n\
    \n### Exercise\n\nBite 17. Form teams from a group of friends\n\n## 31. Set operations\n\
    \nYou want to compare 2 sequences in Python? Enter set operations:\n\n```\n>>>\
    \ a = {1, 2, 3, 4, 5}  # or use set() on a list\n>>> b = {1, 2, 3, 6, 7, 8}\n\
    # unique to a\n>>> a - b\n{4, 5}\n# unique to b\n>>> b - a\n{8, 6, 7}\n# in both\
    \ sets\n>>> a & b\n{1, 2, 3}\n# in either one or the other\n>>> a ^ b\n{4, 5,\
    \ 6, 7, 8}\n# no need for more verbose (and probably slower) looping\n>>> line1\
    \ = ['You', 'can', 'do', 'anything', 'but', 'not', 'everything']\n>>> line2 =\
    \ ['We', 'are', 'what', 'we', 'repeatedly', 'do']\n>>> for word in line1:\n...\
    \     if word in line2: print(word)\n...\ndo\n>>> set(line1) & set(line2)\n{'do'}\n\
    ```\n\n### Explanation\n\nset operations are a very powerful feature. As you can\
    \ see in the code example they can save you a lot of code / looping.\n\nYou want\
    \ to have this trick up your sleeve, so practice the linked exercise below!\n\n\
    ### Resources\n\nhttps://docs.python.org/3.8/library/stdtypes.html#set-types-set-frozenset\n\
    \n### Exercise\n\nBite 78. Find programmers with common languages\n\n## 32. In\
    \ operator\n\nDo you want to perform multiple membership checks in Python? Just\
    \ use `in`:\n\n```\n>>> colors = 'blue red green yellow black white orange'.split()\n\
    \n# is this a primary color?\n>>> color == 'red' or color == 'blue' or color ==\
    \ 'yellow'  # don't do this\nTrue\n>>> primary_colors = set(['red', 'yellow',\
    \ 'blue'])\n>>> color in primary_colors\nTrue\n```\n\n### Explanation\n\nWhen\
    \ you do multiple comparisons, it's often more concise to just use the `in` operator.\n\
    \nSpecial note on membership checking and performance. If you use `in` against\
    \ a `list` it scans through all items sequentially, which is slower. A `set` (like\
    \ a `dict`) is a hashable type which makes `in` lookups faster.\n\n### Resources\n\
    \nhttps://docs.python.org/3/reference/expressions.html#in\nhttps://stackoverflow.com/a/14535739\n\
    \n## 33. What Python version do you use?\n\nDetermine the version of Python you\
    \ are using from the command line and at runtime:\n\n```\n$ python -V\nPython\
    \ 3.6.0\n\n$ python3.9 -V\nPython 3.9.0\n\n>>> import sys\n>>> sys.version_info\n\
    sys.version_info(major=3, minor=6, micro=0, releaselevel='final', serial=0)\n\
    >>> sys.version_info.major\n3\n>>> if sys.version_info.major < 3: print(\"Python\
    \ 3 only please!\")\n...\n>>> if (sys.version_info.major, sys.version_info.minor)\
    \ < (3, 9):\n...     print(\"Use Python 3.9\")\n...\nUse Python 3.9\n```\n\n###\
    \ Explanation\n\nsys.version_info returns version information as a named tuple\
    \ which is nice, because that lets you access the major and minor attributes.\n\
    \n### Resources\n\n[https://docs.python.org/3/library/sys.html#sys.version_info](https://docs.python.org/3/library/sys.html#sys.version_info)\n\
    \n## 34. Powerful printing\n\nPython's `print` statement is more powerful than\
    \ you might think:\n\n```\n>>> row = [\"1\", \"bob\", \"developer\", \"python\"\
    ]\n\n>>> print(','.join(str(x) for x in row))\n1,bob,developer,python\n\n>>> print(*row,\
    \ sep=',')\n1,bob,developer,python\n```\n\n### Explanation\n\nYou typically would\
    \ use `print` and `join` together as in the first example.\n\nHowever the same\
    \ can be accomplished unpacking the `row` argument list using `*` (see resources\
    \ below), together with the `sep` keyword argument.\n\n### Resources\n\nhttps://docs.python.org/3/library/functions.html#print\n\
    https://docs.python.org/dev/tutorial/controlflow.html#unpacking-argument-lists\n\
    \n## 35. Prevent overwriting files\n\nPrevent a file from being overwritten in\
    \ Python:\n\n```\npython\n>>> with open('hello', 'w') as f:\n...     f.write('hello')\n\
    ...\n5\n$ more hello\nhello\n>>> with open('hello', 'w') as f:\n...     f.write('spam')\n\
    ...\n4\n# oops\n$ more hello\nspam\n# 'x' prevents this:\n>>> with open('hello',\
    \ 'x') as f:\n...     f.write('spam')\n...\nTraceback (most recent call last):\n\
    \  File \"<stdin>\", line 1, in <module>\nFileExistsError: [Errno 17] File exists:\
    \ 'hello'\n```\n\n### Explanation\n\nThe bash shell has a \"noclobber\" option\
    \ to protect files from being overwritten.\n\nPython's open built-in has the 'x'\
    \ switch which opens the file for \"exclusive creation\", failing if the file\
    \ already exists.\n\n### Resources\n\nhttps://docs.python.org/3/library/functions.html#open\n\
    \n## 36. Caching API calls\n\nYou can cache repeated API calls using the `requests_cache`\
    \ module:\n\n```\n>>> import requests\n>>> import requests_cache\n\n# supported\
    \ backends: sqlite (default), mongodb, redis, memory\n# expiring cache in 10 seconds\
    \ for example sake\n\n>>> requests_cache.install_cache('cache.db', backend='sqlite',\
    \ expire_after=10)\n\n>>> resp = requests.get(\"https://pybit.es/\")\n>>> resp.from_cache\n\
    False\n>>> resp = requests.get(\"https://pybit.es/\")\n>>> resp.from_cache\nTrue\n\
    \n# waiting for 15 seconds\n>>> resp = requests.get(\"https://pybit.es/\")\n>>>\
    \ resp.from_cache\nFalse\n# request straight after last one, using cache again\n\
    >>> resp = requests.get(\"https://pybit.es/\")\n>>> resp.from_cache\nTrue\n```\n\
    \n### Explanation\n\nIf you want to avoid repeated API calls, use `requests_cache`.\n\
    \nIt builds up a local persistent cache. This is specially useful when you are\
    \ developing your app locally or when you are dealing with API rate limits (and\
    \ possible cost of usage!)\n\n### Resources\n\n[https://pybit.es/requests-cache.html](https://pybit.es/requests-cache.html)\n\
    [https://requests-cache.readthedocs.io/en/latest/index.html](https://requests-cache.readthedocs.io/en/latest/index.html)"
