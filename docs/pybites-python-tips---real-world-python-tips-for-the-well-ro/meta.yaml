  md: '# 36. Caching API calls


    You can cache repeated API calls using the `requests_cache` module:


    ```

    >>> import requests

    >>> import requests_cache


    # supported backends: sqlite (default), mongodb, redis, memory

    # expiring cache in 10 seconds for example sake


    >>> requests_cache.install_cache(''cache.db'', backend=''sqlite'', expire_after=10)


    >>> resp = requests.get("https://pybit.es/")

    >>> resp.from_cache

    False

    >>> resp = requests.get("https://pybit.es/")

    >>> resp.from_cache

    True


    # waiting for 15 seconds

    >>> resp = requests.get("https://pybit.es/")

    >>> resp.from_cache

    False

    # request straight after last one, using cache again

    >>> resp = requests.get("https://pybit.es/")

    >>> resp.from_cache

    True

    ```


    # Explanation


    If you want to avoid repeated API calls, use `requests_cache`.


    It builds up a local persistent cache. This is specially useful when you are developing
    your app locally or when you are dealing with API rate limits (and possible cost
    of usage!)


    # Resources


    [https://pybit.es/requests-cache.html](https://pybit.es/requests-cache.html)

    [https://requests-cache.readthedocs.io/en/latest/index.html](https://requests-cache.readthedocs.io/en/latest/index.html)'
