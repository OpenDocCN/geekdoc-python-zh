  md: '# 97. A decorator best practice


    Preserve docstrings of decorated functions using `functools.wraps`:


    ```

    >>> def mydecorator(function):

    ...     def wrapped(*args, **kwargs):

    ...         result = function(*args, **kwargs)

    ...         return result

    ...     return wrapped

    ...

    >>> def func():

    ...     """ajksnd"""

    ...

    >>> @mydecorator

    ... def func():

    ...     """my docstring"""

    ...     print("hello")

    ...

    >>> func.__doc__

    >>>

    >>> from functools import wraps

    >>> def mydecorator(function):

    ...     @wraps(function)  # adding this line

    ...     # ... rest the same ...

    ...

    >>> @mydecorator

    ... def func():

    ...     """should be preserved now"""

    ...     print("hello")

    ...

    >>> func.__doc__

    ''should be preserved now''

    ```


    # Explanation


    When writing decorators it''s best practice to use `functools.wraps` to not lose
    the docstring and other metadata of the function you are decorating.


    # Resources


    https://docs.python.org/3/library/functools.html#functools.wraps

    https://pybit.es/decorators-by-example.html'
