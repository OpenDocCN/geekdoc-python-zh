    from django.db import transaction\nfrom django.db.models import Avg, Case, Count,\
    \ F, Max, Min, Prefetch, Q, Sum, When\n...\nIn [1]: Book  # 已导入\nOut[1]: books.models.Book\n\
    In [2]: Book.objects.count()\nOut[2]: 2\nIn [3]: Book.objects.last()\nOut[3]:\
    \ <Book: 2 1ZxxDwAAQBAJ Think & Grow Rich>\n```\n\n## 解释\n\nDjango Extensions\
    \ (django-extensions) 提供了一些非常强大的工具，例如 `shell_plus`，它可以在一个可以是 IPython 的 shell 中自动加载你所有的\
    \ Django 模型和 ORM 辅助工具。\n\n## 资源\n\n- https://django-extensions.readthedocs.io/en/latest/shell_plus.html\n\
    \n## 99. 今天是星期几？\n\n如果你想要星期几的整数表示，可以在 `date` 对象上调用 `weekday`：\n\n```python\n>>>\
    \ from datetime import date\n>>> help(date.today().weekday)\n\nHelp on built-in\
    \ function weekday:\n\nweekday(...) method of datetime.date instance\n    Return\
    \ the day of the week represented by the date.\n    Monday == 0 ... Sunday ==\
    \ 6\n\n# 例如，用于 Django 命令\n\nfrom django.core.management.base import BaseCommand\n\
    \nIS_MONDAY = date.today().weekday() == 0\n\nclass Command(BaseCommand):\n\n \
    \   def handle(self, *args, **options):\n        # 每天的逻辑\n\n        if IS_MONDAY:\n\
    \            # 仅在周一运行的额外逻辑 ...\n```\n\n## 解释\n\n我们经常在 Django 命令中使用这个功能，以便仅在特定日期运行它们。\n\
    \n例如，我们的每周四封提示邮件，我们使用 `WEEKDAY = date.today().weekday()` 与这些常量进行匹配：`MONDAY, TUESDAY,\
    \ THURSDAY, FRIDAY = 0, 1, 3, 4`，非常有用。\n\n## 资源\n\n- https://docs.python.org/3/library/datetime.html#datetime.date.weekday\n\
    \n## 练习\n\n- [Bite 74. 你出生那天是星期几？](https://pybit.es/bite74.html)\n\n## 100. 今天是本年第几周？\n\
    \n如果你想要本年第几周，可以在日期对象上调用 isocalendar：\n\n```python\n>>> from datetime import date\n\
    >>> date.today().isocalendar()[1]\n30\n>>> date(2020, 1, 3).isocalendar()[1]\n\
    1\n>>> date(2020, 12, 25).isocalendar()[1]\n52\n\n# 获取剩余周数的范围：\n>>> start_week\
    \ = date.today().isocalendar()[1]\n>>> start_week\n45\n>>> weeks = range(start_week,\
    \ 53)\n>>> list(weeks)\n[45, 46, 47, 48, 49, 50, 51, 52]\n```\n\n## 解释\n\ndatetime.date.isocalendar\
    \ 返回一个包含三个组件的命名元组对象：年、周和星期几。这里我们只想要周数，所以我们获取第二个元素（[1]）。\n\n在第二个代码片段中，我们将其与 range\
    \ 结合使用，以获取今年的剩余周数。\n\n## 资源\n\n- https://docs.python.org/3/library/datetime.html#datetime.date.isocalendar\n\
