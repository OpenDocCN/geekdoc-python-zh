    # 70. Use casefold for unicode string matching


    Casefolding is similar to lowercasing but more aggressive:


    ```

    >>> a, b = "der Fluß", "der Fluss"


    >>> a.lower() == b.lower()

    False


    # casefold converts ''ß'' "ss" which makes the 2 strings identical

    >>> a.casefold() == b.casefold()

    True


    >>> ''ß''.casefold()

    ''ss''

    ```


    # Explanation


    str.casefold (new since Python 3.3) is similar to str.lower but more aggressive
    because it is intended to remove all case distinctions in a string.


    This is especially helpful for Unicode characters, often quoted is the example
    of matching a German ''ß'' with ''ss''.


    # Resources


    https://docs.python.org/3/library/stdtypes.html#str.casefold

    https://pythonbytes.fm/episodes/show/168/race-your-donkey-car-with-python'
