    # # 16. Rotate characters in string


    Two ways to rotate a string by n characters in Python:


    ```

    python

    >>> s = ''hello''

    >>> s[2:] + s[:2]

    ''llohe''

    >>> from collections import deque

    >>> d = deque(s)

    >>> d.rotate(-2)

    >>> d

    deque([''l'', ''l'', ''o'', ''h'', ''e''])

    ```


    **Explanation**


    Slicing is probably the most obvious way here, but collections.deque has a dedicated
    method for it.


    **Resources**


