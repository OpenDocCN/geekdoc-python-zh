    # 47. Comparing version numbers


    Python''s standard library keeps amazing us - comparing version numbers made easy:


    ```

    >>> from distutils.version import StrictVersion

    >>> StrictVersion(''0.12.1'') < StrictVersion(''1.0.2'')

    True

    ```


    # Explanation


    Imagine the amount of nested logic to reliably compare versions. We can tell,
    because 10 years ago we had to deal with checking Sun Microsystems ILOM firmware
    releases.


