    # 93. Swap dictionary keys and values


    Swap a `dict`''s keys and values in just one line of code (!) using a dictionary
    comprehension:


    ```

    python

    >>> ninja_belts

    {10: ''white'', 50: ''yellow'', 100: ''orange'', 175: ''green'', 250: ''blue'',
    400: ''brown'',

    600: ''black'', 800: ''paneled'', 1000: ''red''}


    >>> {v:k for k, v in ninja_belts.items()}

