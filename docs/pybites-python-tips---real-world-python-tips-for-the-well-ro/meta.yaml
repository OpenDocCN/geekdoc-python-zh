    ## 9. 链式比较运算符


    在 Python 中，你可以像这样链式使用比较运算符：


    ```

    >>> a = 5

    >>> b = 15

    >>> 1 < a < 10

    True

    >>> 1 < b < 10

    False

    ```


    ### 解释


    与其写 `1 < a and a < 10`，你可以写 `1 < a < 10`，这更简洁一些。


    ### 资源


    https://docs.python.org/3/reference/expressions.html#comparisons


    ## 10. Is 与 ==（对象相等性）


    Python 中比较对象与其值的区别：


    ```

    >>> a = [1, 2, 3]

    >>> b = [1, 2, 3]

    >>> c = a

    >>> a == b

    True

    >>> a is b

    False

    >>> a == c

    True

    >>> a is c

    True

    ```


    ### 解释


    在 Python 中，`is` 检查两个参数是否引用同一个对象，而 `==` 用于检查它们是否具有相同的值。


