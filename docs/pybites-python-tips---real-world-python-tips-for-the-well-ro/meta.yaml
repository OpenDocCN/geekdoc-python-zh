  - '[PAGE 65]


    # # 54. Re.findall


    Use findall from the re module to find all instances that match a regular expression
    pattern:


    ```

    python

    >>> import re

    >>> import requests

    >>> html = requests.get(''https://pybit.es/archives.html'').text


    >>> matches = re.findall(r''https://pybit\.es/guest.*?\.html'', html)

    >>> len(matches)

    29

    >>> for m in matches: print(m)

    ...

    https://pybit.es/guest-create-aws-lambda-layers.html

    https://pybit.es/guest-clean-text-data.html

    ...

    ...

    https://pybit.es/guest-learning-apis.html

    https://pybit.es/guest-making-of-task-manager.html


    ```


    # ## Explanation


    Here we first download our archives page''s into the html variable using requests.


    Then we find all PyBites guest article links which can be defined as:


    +   - have "/guest" after the root URL (pybit.es),

    - after that they have a variable length of any characters (the "?" here means
    "don''t be greedy" = match as little as possible),

    - and they end with a literal dot (.) and the string "html".


    matches will contain a list of all matches, links in this case.


    Lastly notice we prepend our regex with "r" which is known as the "raw string
    notation" which keeps regular expressions sane. Without it, every backslash (''\\'')
    in a regular expression would have to be prefixed with another one to escape it.


    # ## Resources


    [https://docs.python.org/3/library/re.html#re.findall](https://docs.python.org/3/library/re.html#re.findall)


    [https://docs.python.org/3/howto/regex.html](https://docs.python.org/3/howto/regex.html)


    # ## Exercise


    [Bite 2. Regex Fun](Bite 2. Regex Fun)'
- md: "## 55. Construct a dict from an iterable\n\nYou can create a `dict` using an\
    \ iterable:\n\n```\n>>> nodes\n['abcd:22', 'efgh:80', 'ijkl:443']\n>>> dict(node.split(':')\
    \ for node in nodes)\n{'abcd': '22', 'efgh': '80', 'ijkl': '443'}\n\n>>> nodes.append('mno:555:bug')\n\
    >>> nodes\n['abcd:22', 'efgh:80', 'ijkl:443', 'mno:555:bug']\n\n# oops\n>>> dict(node.split(':')\
    \ for node in nodes)\nTraceback (most recent call last):\n  File \"<stdin>\",\
    \ line 1, in <module>\nValueError: dictionary update sequence element #3 has length\
    \ 3; 2 is required\n\n# split has our back though\n>>> dict(node.split(':', 1)\
    \ for node in nodes)\n{'abcd': '22', 'efgh': '80', 'ijkl': '443', 'mno': '555:bug'}\n\
    ```\n\n### Explanation\n\n`dict` has different constructors: `dict(**kwarg)`,\
    \ `dict(mapping, **kwarg)`, and `dict(iterable, **kwarg)`.\n\nAs you can see we\
    \ can give it an iterable which in this example is a sequence of (node, port)\
    \ tuples. Pretty cool!\n\nOf course we rely on a single colon (:) in the node\
    \ strings, so we use `split`'s optional second argument to split only once.\n\n\
    ### Resources\n\nhttps://docs.python.org/3/library/functions.html#func-dict\n\n\
    ## 56. Set comprehensions\n\nUsing a set comprehension to remove duplicates and\
    \ operate on each remaining item:\n\n```\n>>> names = ['dana', 'tim', 'sara',\
    \ 'ana', 'joyce', 'dana', 'tim', 'ana']\n\n>>> set(names)\n{'tim', 'joyce', 'dana',\
    \ 'ana', 'sara'}\n\n>>> {name.title() for name in names if \"a\" in name}\n{'Ana',\
    \ 'Dana', 'Sara'}\n```\n\n### Explanation\n\nsets are great to filter out duplicated\
    \ elements.\n\nNext we use a set comprehension to also filter on names containing\
    \ the letter \"a\", title casing the matching names.\n\n### Resources\n\nhttps://docs.python.org/3/tutorial/datastructures.html#sets\n\
    \n### Exercise\n\nBite 130. Analyze some basic Car Data\n\n## 57. Call help inside\
    \ pdb\n\nNeed help inside pdb (Python’s debugger)? You can:\n\n```\n(Pdb) elem\n\
    <Element {http://www.worldbank.org}country at 0x106610908>\n(Pdb) p help(elem)\n\
    Help on _Element object:\n...\n```\n\n### Explanation\n\nWe already saw the power\
    \ of the `vars` built-in to inspect objects.\n\npdb supports pretty printing using\
    \ pp so we use this often when debugging: `pp(vars(object))`.\n\nBut what if you\
    \ want to get help for an object without leaving the debugger? You can use `p\
    \ help(...)`.\n\n### Resources\n\nhttps://stackoverflow.com/a/29523730\nhttps://docs.python.org/3/library/pdb.html#debugger-commands\n\
    \n## 58. Working with file system paths\n\nSince Python 3.4 there is a more elegant\
    \ way to work with file system paths:\n\n```\n>>> from pathlib import Path\n>>>\
    \ tmp = Path('/tmp')\n>>> countries = tmp / 'countries.xml'  # before: os.path.join\n\
    >>> countries.exists()  # before: os.path.exists\nTrue\n>>> countries.is_dir()\n\
    False\n```\n\n### Explanation\n\npathlib makes working with the file system more\
    \ elegant.\n\nWonder how tmp / 'countries.xml' actually works? According to the\
    \ StackOverflow answer below, the Path class has a __truediv__ (dunder) method\
    \ that returns another Path. The power of OOP and Python's data model!\n\n###\
    \ Resources\n\nhttps://docs.python.org/3/library/pathlib.html\nhttps://stackoverflow.com/a/53085465\n\
    \n## 59. Validate JSON\n\nPretty print / validate JSON from the command line using\
    \ Python's json.tool:\n\n```\nbash\n$ cat MOCK_DATA.json\n[{\"id\":1,\"first_name\"\
    :\"Myrle\",\"email\":\"mleport0@t.co\"},\n{\"id\":2,\"first_name\":\"Lynnette\"\
    ,\"email\":\"lchurchward1@seattletimes.com\"}]\n\n```\n\n```\nbash\n$ python -m\
    \ json.tool MOCK_DATA.json\n[\n    {\n        \"id\": 1,\n        \"first_name\"\
    : \"Myrle\",\n        \"email\": \"mleport0@t.co\"\n    },\n    {\n        \"\
    id\": 2,\n        \"first_name\": \"Lynnette\",\n        \"email\": \"lchurchward1@seattletimes.com\"\
    \n    }\n]\n\n```\n\n```\nbash\n$ echo '[[{id: 1}]' | python -m json.tool\nExpecting\
    \ property name enclosed in double quotes: line 1 column 3 (char 2)\n\n```\n\n\
    ### Explanation\n\n- The tool seems under active development - new command line\
    \ switches:\n- >= 3.5: --sort-keys: sort the output of dictionaries alphabetically\
    \ by key.\n- >= 3.9: --no-ensure-ascii: disable escaping of non-ascii characters.\n\
    - >= 3.8: --json-lines: parse every input line as separate JSON object.\n- >=\
    \ 3.9: --indent, --tab, --no-indent, --compact: mutually exclusive options for\
    \ whitespace control.\n\n### Resources\n\nhttps://docs.python.org/3/library/json.html#module-json.tool\n\
    \n## 60. Create a gif image\n\nHere is how you can create a gif image using the\
    \ `imageio` library:\n\n```\nimport imageio\n\ndef create_gif(file_names, out_file=\"\
    image.gif\", duration=1.5):\n    images = []\n    for filename in file_names:\n\
    \        images.append(imageio.imread(filename))\n    imageio.mimsave(out_file,\
    \ images, duration=duration)\n```\n\n### Explanation\n\n`imageio` makes it easy\
    \ to create simple GIFs.\n\nAfter pip installing the module, just feed a list\
    \ of images to the `mimsave` method.\nYou can define the output file name and\
    \ the duration between the images as well. You get best results if all images\
    \ have the same dimensions.\n\n### Resources\n\nhttps://imageio.github.io/\nhttps://github.com/pybites/100DaysOfCode/blob/master/003/create_gif.py\n\
    \n## 61. Convert str to datetime (pandas)\n\nConvert a DataFrame column from `str`\
    \ to `Timestamp`:\n\n```\n>>> from io import StringIO\n>>> from dateutil.parser\
    \ import parse\n>>> import pandas as pd\n\n>>> data = StringIO(\"\"\"username;date_joined\n\
    ... bbelderbos;2017-11-02 09:48:22\n... pybites;2017-11-04 11:37:10\n... ...\n\
    ... \"\"\"\n)\n\n>>> df = pd.read_csv(data, sep=\";\")\n>>> df.date_joined[0]\n\
    '2017-11-02 09:48:22'  # str\n\n# convert from str to Timestamp (whole column!)\n\
    >>> df.date_joined = df.date_joined.apply(parse)\n>>> df.date_joined[0]\nTimestamp('2017-11-02\
    \ 09:48:22')\n\n# or use:\n>>> df.date_joined = pd.to_datetime(df.date_joined)\n\
    ```\n\n### Explanation\n\nFirst we use `io.StringIO` to create (pandas) DataFrame\
    \ from a string.\n\nBut wait, the `date_joined` column returns `str`, not `Timestamp`\
    \ objects :(\n\nNo worries, we can use the DataFrame's `apply` method which applies\
    \ a function (here: `dateutil.parser.parse`) along an axis of the DataFrame. Pretty\
    \ powerful!\n\nAlternatively use: `df.date_joined = pd.to_datetime(df.date_joined)`\
    \ which somebody timed to be faster.\n\n### Resources\n\n- https://stackoverflow.com/a/22605281\n\
    - https://stackoverflow.com/a/16414011\n\n## 62. Splitting by newline\n\nUsing\
    \ `split(\"\\n\")` to split a text into lines can return odd results if you are\
    \ on Windows or an (older) Apple computer which use `\\r\\n` and `\\r` for newlines\
    \ respectively. In those instances `splitlines` has you covered:\n\n```\n>>> \"\
    first line\\r\\nsecond line\".split(\"\\n\")\n['first line\\r', 'second line']\n\
    \n\n# includes \\r (Carriage Return) in the splitting\n>>> \"first line\\r\\nsecond\
    \ line\".splitlines()\n['first line', 'second line']\n\n>>> \"first line\\rsecond\
    \ line\".splitlines()\n['first line', 'second line']\n\n>>> \"first line\\nsecond\
    \ line\".splitlines()\n['first line', 'second line']\n```\n\n### Explanation\n\
    \nYou probably won't hit this but it's good to know about what Python's glossary\
    \ defines as \"universal newlines\":\n\n- the Unix end-of-line convention = `\\\
    n`,\n- the Windows convention = `\\r\\n`,\n- and the old Macintosh convention\
    \ = `\\r`\n\n`splitlines` accounts for all 3 scenarios and some more.\n\n### Resources\n\
    \nhttps://docs.python.org/3/library/stdtypes.html#str.splitlines\nhttps://docs.python.org/3/glossary.html\n\
    \n## 63. Group by query in Django's ORM\n\nLet's use some Django ORM magic to\
    \ get the most common first names on the platform:\n\n```\npython\n>>> from django.db.models\
    \ import Count\n>>> from django.contrib.auth.models import User\n\n>>> User.objects.exclude(first_name__exact='').values(\n\
    \        'first_name').annotate(\n        name_count=Count('first_name')\n   \
    \ ).order_by('-name_count')[:5].values_list(\n        'first_name', flat=True\n\
    \    )\n\n<QuerySet ['David', 'Daniel', 'Michael', 'Chris', 'John']>\n\n```\n\n\
    ### Explanation\n\nHere we use Django ORM's annotate which will result in a GROUP\
    \ BY SQL query in the database.\n\nThe `order_by('-name_count')` gives us the\
    \ most common names first. We have a lot of Davids and Daniels coding on our platform!\n\
    \n### Resources\n\nhttps://books.agiliq.com/projects/django-orm-cookbook/en/latest/duplicate.html\n\
    https://simpleisbetterthancomplex.com/tutorial/2016/12/06/how-to-create-group-by-queries.html"
  mdcn: "## 55. 从可迭代对象构建字典\n\n你可以使用可迭代对象来创建一个 `dict`：\n\n```\n>>> nodes\n['abcd:22',\
    \ 'efgh:80', 'ijkl:443']\n>>> dict(node.split(':') for node in nodes)\n{'abcd':\
    \ '22', 'efgh': '80', 'ijkl': '443'}\n\n>>> nodes.append('mno:555:bug')\n>>> nodes\n\
    ['abcd:22', 'efgh:80', 'ijkl:443', 'mno:555:bug']\n\n# 糟糕\n>>> dict(node.split(':')\
    \ for node in nodes)\nTraceback (most recent call last):\n  File \"<stdin>\",\
    \ line 1, in <module>\nValueError: dictionary update sequence element #3 has length\
    \ 3; 2 is required\n\n# 不过 split 有办法解决\n>>> dict(node.split(':', 1) for node in\
    \ nodes)\n{'abcd': '22', 'efgh': '80', 'ijkl': '443', 'mno': '555:bug'}\n```\n\
    \n### 解释\n\n`dict` 有不同的构造函数：`dict(**kwarg)`、`dict(mapping, **kwarg)` 和 `dict(iterable,\
    \ **kwarg)`。\n\n如你所见，我们可以给它一个可迭代对象，在这个例子中，它是一个 (节点, 端口) 元组的序列。非常酷！\n\n当然，我们依赖于节点字符串中的单个冒号\
    \ (:)，因此我们使用 `split` 的可选第二个参数来只分割一次。\n\n### 资源\n\nhttps://docs.python.org/3/library/functions.html#func-dict\n\
    \n## 56. 集合推导式\n\n使用集合推导式来去除重复项并对每个剩余项进行操作：\n\n```\n>>> names = ['dana', 'tim',\
    \ 'sara', 'ana', 'joyce', 'dana', 'tim', 'ana']\n\n>>> set(names)\n{'tim', 'joyce',\
    \ 'dana', 'ana', 'sara'}\n\n>>> {name.title() for name in names if \"a\" in name}\n\
    {'Ana', 'Dana', 'Sara'}\n```\n\n### 解释\n\n集合非常适合过滤掉重复的元素。\n\n接下来，我们使用集合推导式来过滤包含字母\
    \ \"a\" 的名字，并将匹配的名字转换为标题大小写。\n\n### 资源\n\nhttps://docs.python.org/3/tutorial/datastructures.html#sets\n\
    \n### 练习\n\nBite 130. 分析一些基本的汽车数据\n\n## 57. 在 pdb 中调用帮助\n\n在 pdb（Python 的调试器）中需要帮助吗？你可以：\n\
    \n```\n(Pdb) elem\n<Element {http://www.worldbank.org}country at 0x106610908>\n\
    (Pdb) p help(elem)\nHelp on _Element object:\n...\n```\n\n### 解释\n\n我们已经见识过 `vars`\
    \ 内置函数检查对象的强大功能。\n\npdb 支持使用 pp 进行漂亮打印，因此我们在调试时经常使用它：`pp(vars(object))`。\n\n但如果你想在不离开调试器的情况下获取对象的帮助信息呢？你可以使用\
    \ `p help(...)`。\n\n### 资源\n\nhttps://stackoverflow.com/a/29523730\nhttps://docs.python.org/3/library/pdb.html#debugger-commands\n\
    \n## 58. 处理文件系统路径\n\n自 Python 3.4 起，有一种更优雅的方式来处理文件系统路径：\n\n```\n>>> from pathlib\
    \ import Path\n>>> tmp = Path('/tmp')\n>>> countries = tmp / 'countries.xml' \
    \ # 以前：os.path.join\n>>> countries.exists()  # 以前：os.path.exists\nTrue\n>>> countries.is_dir()\n\
    False\n```\n\n### 解释\n\npathlib 使文件系统操作更加优雅。\n\n想知道 `tmp / 'countries.xml'` 实际上是如何工作的吗？根据下面的\
    \ StackOverflow 回答，Path 类有一个 `__truediv__`（双下划线）方法，它返回另一个 Path。这就是面向对象编程和 Python\
    \ 数据模型的力量！\n\n### 资源\n\nhttps://docs.python.org/3/library/pathlib.html\nhttps://stackoverflow.com/a/53085465\n\
    \n## 59. 验证 JSON\n\n使用 Python 的 json.tool 从命令行漂亮打印/验证 JSON：\n\n```\nbash\n$ cat\
    \ MOCK_DATA.json\n[{\"id\":1,\"first_name\":\"Myrle\",\"email\":\"mleport0@t.co\"\
    },\n{\"id\":2,\"first_name\":\"Lynnette\",\"email\":\"lchurchward1@seattletimes.com\"\
    }]\n\n```\n\n```\nbash\n$ python -m json.tool MOCK_DATA.json\n[\n    {\n     \
    \   \"id\": 1,\n        \"first_name\": \"Myrle\",\n        \"email\": \"mleport0@t.co\"\
    \n    },\n    {\n        \"id\": 2,\n        \"first_name\": \"Lynnette\",\n \
    \       \"email\": \"lchurchward1@seattletimes.com\"\n    }\n]\n\n```\n\n```\n\
    bash\n$ echo '[[{id: 1}]' | python -m json.tool\nExpecting property name enclosed\
    \ in double quotes: line 1 column 3 (char 2)\n\n```\n\n### 解释\n\n- 该工具似乎正在积极开发中\
    \ - 新的命令行开关：\n- >= 3.5: --sort-keys: 按键字母顺序排序字典输出。\n- >= 3.9: --no-ensure-ascii:\
    \ 禁用非 ASCII 字符的转义。\n- >= 3.8: --json-lines: 将每个输入行解析为单独的 JSON 对象。\n- >= 3.9: --indent,\
    \ --tab, --no-indent, --compact: 用于空白控制的互斥选项。\n\n### 资源\n\nhttps://docs.python.org/3/library/json.html#module-json.tool\n\
    \n## 60. 创建 gif 图像\n\n以下是使用 `imageio` 库创建 gif 图像的方法：\n\n```\nimport imageio\n\n\
    def create_gif(file_names, out_file=\"image.gif\", duration=1.5):\n    images\
    \ = []\n    for filename in file_names:\n        images.append(imageio.imread(filename))\n\
    \    imageio.mimsave(out_file, images, duration=duration)\n```\n\n### 解释\n\n`imageio`\
    \ 使得创建简单的 GIF 变得容易。\n\n通过 pip 安装该模块后，只需将图像列表提供给 `mimsave` 方法。\n你还可以定义输出文件名和图像之间的持续时间。如果所有图像具有相同的尺寸，你将获得最佳效果。\n\
    \n### 资源\n\nhttps://imageio.github.io/\nhttps://github.com/pybites/100DaysOfCode/blob/master/003/create_gif.py\n\
    \n## 61. 将字符串转换为 datetime（pandas）\n\n将 DataFrame 列从 `str` 转换为 `Timestamp`：\n\n\
    ```\n>>> from io import StringIO\n>>> from dateutil.parser import parse\n>>> import\
    \ pandas as pd\n\n>>> data = StringIO(\"\"\"username;date_joined\n... bbelderbos;2017-11-02\
    \ 09:48:22\n... pybites;2017-11-04 11:37:10\n... ...\n... \"\"\"\n)\n\n>>> df\
    \ = pd.read_csv(data, sep=\";\")\n>>> df.date_joined[0]\n'2017-11-02 09:48:22'\
    \  # str\n\n# 从 str 转换为 Timestamp（整个列！）\n>>> df.date_joined = df.date_joined.apply(parse)\n\
    >>> df.date_joined[0]\nTimestamp('2017-11-02 09:48:22')\n\n# 或者使用：\n>>> df.date_joined\
    \ = pd.to_datetime(df.date_joined)\n```\n\n### 解释\n\n首先，我们使用 `io.StringIO` 从字符串创建（pandas）DataFrame。\n\
    \n但是等等，`date_joined` 列返回的是 `str`，而不是 `Timestamp` 对象 :(\n\n别担心，我们可以使用 DataFrame\
    \ 的 `apply` 方法，该方法沿 DataFrame 的一个轴应用一个函数（这里是：`dateutil.parser.parse`）。非常强大！\n\n\
    或者使用：`df.date_joined = pd.to_datetime(df.date_joined)`，有人测试过这更快。\n\n### 资源\n\n\
    - https://stackoverflow.com/a/22605281\n- https://stackoverflow.com/a/16414011\n\
    \n## 62. 按换行符分割\n\n使用 `split(\"\\n\")` 将文本分割成行，如果你在 Windows 或（旧的）Apple 计算机上（它们分别使用\
    \ `\\r\\n` 和 `\\r` 作为换行符），可能会返回奇怪的结果。在这些情况下，`splitlines` 可以帮你解决：\n\n```\n>>> \"\
    first line\\r\\nsecond line\".split(\"\\n\")\n['first line\\r', 'second line']\n\
    \n\n# 分割时包含 \\r（回车符）\n>>> \"first line\\r\\nsecond line\".splitlines()\n['first\
    \ line', 'second line']\n\n>>> \"first line\\rsecond line\".splitlines()\n['first\
    \ line', 'second line']\n\n>>> \"first line\\nsecond line\".splitlines()\n['first\
    \ line', 'second line']\n```\n\n### 解释\n\n你可能不会遇到这个问题，但了解 Python 术语表中定义的“通用换行符”是件好事：\n\
    \n- Unix 行尾约定 = `\\n`，\n- Windows 约定 = `\\r\\n`，\n- 旧的 Macintosh 约定 = `\\r`\n\n\
    `splitlines` 考虑了所有 3 种情况以及更多。\n\n### 资源\n\nhttps://docs.python.org/3/library/stdtypes.html#str.splitlines\n\
    https://docs.python.org/3/glossary.html\n\n## 63. 在 Django 的 ORM 中按查询分组\n\n让我们使用一些\
    \ Django ORM 的魔法来获取平台上最常见的名字：\n\n```\npython\n>>> from django.db.models import\
    \ Count\n>>> from django.contrib.auth.models import User\n\n>>> User.objects.exclude(first_name__exact='').values(\n\
    \        'first_name').annotate(\n        name_count=Count('first_name')\n   \
    \ ).order_by('-name_count')[:5].values_list(\n        'first_name', flat=True\n\
    \    )\n\n<QuerySet ['David', 'Daniel', 'Michael', 'Chris', 'John']>\n\n```\n\n\
    ### 解释\n\n这里我们使用 Django ORM 的 annotate，它将在数据库中生成一个 GROUP BY SQL 查询。\n\n`order_by('-name_count')`\
    \ 让我们首先看到最常见的名字。我们的平台上有很多 David 和 Daniel 在编程！\n\n### 资源\n\nhttps://books.agiliq.com/projects/django-orm-cookbook/en/latest/duplicate.html\n\
    https://simpleisbetterthancomplex.com/tutorial/2016/12/06/how-to-create-group-by-queries.html"
