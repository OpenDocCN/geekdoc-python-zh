  md: '# 37. Strip punctuation


    Two ways to strip punctuation from a string in Python:


    ```

    >>> from string import punctuation

    >>> punctuation

    ''!"#$%&\''()*+,-./:;<=>?@[\]^_`{|}~''


    >>> my_string = "punc;tu.ation!"

    >>> table = str.maketrans({key: None for key in punctuation})

    >>> my_string.translate(table)

    ''punctuation''


    >>> ''''.join([c for c in my_string if c not in punctuation])

    ''punctuation''

    ```


    # Explanation


    The first method uses the maketrans str method which returns a mapping table you
    can feed into the translate method on the string in question.


    The second way to accomplish this is to use a list comprehension that discards
    any characters that are in punctuation.


    For both methods we leverage the string module which has various strings (constants)
    defined, here punctuation, which is defined by the module as "a string containing
    all ASCII punctuation characters".


    # Resources


    https://docs.python.org/3/library/stdtypes.html?highlight=maketrans#str.maketrans


    https://www.w3schools.com/python/ref_string_maketrans.asp


