    'fred'), ('fred', 'bob'), ('fred', 'tim'), ('fred', 'julian')]\n```\n\n### 解释\n\
    \n这正是 Python 的 itertools.combinations 大显身手的地方！\n\n请注意，itertools.permutations 在这里不适用，因为它基于元素的位置将其视为唯一的，因此会产生两对条目：`('bob',\
