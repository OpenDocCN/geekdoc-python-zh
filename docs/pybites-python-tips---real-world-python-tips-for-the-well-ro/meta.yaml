- md: "## 18. List comprehension to filter out values\n\nUse a list comprehension\
    \ in Python to filter a list:\n\n```python\n>>> languages = ['Python', 'Java',\
    \ 'Perl', 'PHP', 'Python', 'JS', 'C++', 'JS', 'Python', 'Ruby']\n>>> [l for l\
    \ in languages if l.lower().startswith('p')]\n['Python', 'Perl', 'PHP', 'Python',\
    \ 'Python']\n\n# alternative but less readable\n\n>>> list(filter(lambda l: l.lower().startswith('p'),\
    \ languages))\n['Python', 'Perl', 'PHP', 'Python', 'Python']\n```\n\n### Explanation\n\
    \nYou can write a list comprehension from the inside out: place two [] brackets,\
    \ then write [l for l in languages].\n\nYou just repeated the list, now at the\
    \ end put your condition: if l.lower().startswith('p') and voilà you are returning\
    \ a list of all the languages starting with 'p'.\n\nBut you don't have to stop\
    \ there, you can write set and dict comprehensions too. They are definitely one\
