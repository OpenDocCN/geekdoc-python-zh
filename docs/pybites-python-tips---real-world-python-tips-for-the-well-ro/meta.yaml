  md: "# 91. Dictionary access without KeyError\n\nReady for something pretty idiomatic\
    \ / elegant? Meet `dict`'s get method:\n\n```\n>>> workouts = {\n...     \"Mon\"\
    : \"upper body 1\",\n...     \"Tue\": \"lower body 1\",\n...     \"Thu\": \"upper\
    \ body 2\",\n...     \"Fri\": \"lower body 2\"\n... }\n>>> workouts['Mon']\n'upper\
    \ body 1'\n>>> workouts['Fri']\n'lower body 2'\n>>> workouts['Sat']\nTraceback\
    \ (most recent call last):\n  File \"<stdin>\", line 1, in <module>\nKeyError:\
    \ 'Sat'\n>>> ret = workouts.get('Sat')\n>>> ret is None\nTrue\n>>> workouts.get('Sat',\
    \ 'not a workout day')\n'not a workout day'\n```\n\n# Explanation\n\nThe `dict.get`\
    \ method checks if the provided key is in the dictionary. If not it returns `None`,\
    \ unless you give it a default value as second argument.\n\nSo if the `Sat` key\
    \ is not in the dictionary, `workouts.get('Sat')` returns `None`, but `workouts.get('Sat',\
    \ 'default_value')` returns `default_value` as that is defined as default.\n\n\
    # Resources\n\n[https://docs.python.org/3/library/stdtypes.html#dict.get](https://docs.python.org/3/library/stdtypes.html#dict.get)\n\
    \n# Exercise\n\n[Intro Bite 09. Workout dictionary lookups](Intro Bite 09. Workout\
