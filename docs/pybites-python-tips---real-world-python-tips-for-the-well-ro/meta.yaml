  md: '# # 54. Re.findall


    Use findall from the re module to find all instances that match a regular expression
    pattern:


    ```

    python

    >>> import re

    >>> import requests

    >>> html = requests.get(''https://pybit.es/archives.html'').text


    >>> matches = re.findall(r''https://pybit\.es/guest.*?\.html'', html)

    >>> len(matches)

    29

    >>> for m in matches: print(m)

    ...

    https://pybit.es/guest-create-aws-lambda-layers.html

    https://pybit.es/guest-clean-text-data.html

    ...

    ...

    https://pybit.es/guest-learning-apis.html

    https://pybit.es/guest-making-of-task-manager.html


    ```


    # ## Explanation


    Here we first download our archives page''s into the html variable using requests.


    Then we find all PyBites guest article links which can be defined as:


    +   - have "/guest" after the root URL (pybit.es),

    - after that they have a variable length of any characters (the "?" here means
    "don''t be greedy" = match as little as possible),

    - and they end with a literal dot (.) and the string "html".


    matches will contain a list of all matches, links in this case.


    Lastly notice we prepend our regex with "r" which is known as the "raw string
    notation" which keeps regular expressions sane. Without it, every backslash (''\\'')
    in a regular expression would have to be prefixed with another one to escape it.


    # ## Resources


    [https://docs.python.org/3/library/re.html#re.findall](https://docs.python.org/3/library/re.html#re.findall)


    [https://docs.python.org/3/howto/regex.html](https://docs.python.org/3/howto/regex.html)


