    # # 45. Redirecting standard output


    Python''s `contextlib` module has a useful context manager for redirecting standard
    output:


    ```

    python

    from contextlib import redirect_stdout


    >>> with open(''help.txt'', ''w'') as f:

    ...     with redirect_stdout(f):

    ...         help(pow)

    ...


    >>> with open(''help.txt'') as f:

    ...     f.read()

    ...


    ''Help on built-in function pow in module builtins: ... ...


    ```


    # # Explanation


    As per the example in the docs, here we capture the output of `help(pow)` in a
    file and read it back in showing it in the REPL.


    To send output to standard error, use `with redirect_stdout(sys.stderr): ...`.


    # # Resources


    [https://docs.python.org/3/library/contextlib.html#contextlib.redirect_stdout](https://docs.python.org/3/library/contextlib.html#contextlib.redirect_stdout)'
- md: "## 46. If __name__ == \"__main__\"\n\nWhat is the meaning of this commonly\
    \ used statement in Python?\n\n```\ndef func():\n    print(\"Hello from function\"\
    )\n\nif __name__ == \"__main__\":\n    func()\n\n# main block gets invoked\n```\n\
    \n$ python script.py\nHello from function\n\n```\n$ python\n>>> import script\
    \  # main block does not get invoked\n>>> script.func()\nHello from function\n\
    ```\n\n### Explanation\n\nif __name__ == \"__main__\" is often confusing to people\
    \ new to Python. It's used at the end of a script to write code that ONLY executes\
    \ if the module (script) is called directly. Code in this if does NOT run when\
    \ the module gets imported into another module or in the REPL.\n\n### Resources\n\
    \nhttps://docs.python.org/3/library/__main__.html\n\n## 47. Comparing version\
    \ numbers\n\nPython's standard library keeps amazing us - comparing version numbers\
    \ made easy:\n\n```\n>>> from distutils.version import StrictVersion\n>>> StrictVersion('0.12.1')\
    \ < StrictVersion('1.0.2')\nTrue\n```\n\n### Explanation\n\nImagine the amount\
    \ of nested logic to reliably compare versions. We can tell, because 10 years\
    \ ago we had to deal with checking Sun Microsystems ILOM firmware releases.\n\n\
    Had we known that the standard library even covers this!\n\nUnfortunately StrictVersion\
    \ seems undocumented, but it's a pretty nifty tool abstracting the complexity\
    \ away for us.\n\nAn alternative is the packaging library.\n\n### Resources\n\n\
    [https://stackoverflow.com/a/6972866](https://stackoverflow.com/a/6972866)\n[https://packaging.pypa.io/en/latest/](https://packaging.pypa.io/en/latest/)\n\
    \n### Exercise\n\n[Bite 163. Which packages were upgraded?](Bite 163. Which packages\
    \ were upgraded?)\n\n## 48. Remove leading whitespace\n\nYou can use `textwrap.dedent`\
    \ to remove any common leading whitespace from every line:\n\n```\nfrom textwrap\
    \ import dedent\n\ndef test():\n    # end first line with \\ to avoid the empty\
    \ line!\n    s = '''\\n    hello\n      world\n    '''\n\n    print(repr(s)) \
    \          # prints '    hello\\n      world\\n    '\n    print(repr(dedent(s)))\
    \   # prints 'hello\\n  world\\n'\n```\n\n### Explanation\n\nThis is a useful\
    \ technique when testing your code.\n\nWhen adding any multiline string variable\
    \ in a test function, the indenting of the function body causes extra leading\
    \ spacing to be included in this variable.\n\n`textwrap.dedent` can be used to\
    \ remove these leading spaces which helps when writing your `assert` statements.\n\
    \nAlternatively you can use `inspect.cleandoc`.\n\n### Resources\n\nhttps://docs.python.org/3/library/textwrap.html#textwrap.dedent\n\
    https://docs.python.org/3/library/inspect.html#inspect.cleandoc\n\n## 49. The\
    \ platform module\n\nPython, what OS / system am I coding on today?\n\n```\npython\n\
    >>> import platform\n>>> platform.machine()\n'x86_64'\n>>> platform.node()\n'Bobs-iMac.local'\n\
    >>> platform.platform()\n'Darwin-19.6.0-x86_64-i386-64bit'\n>>> platform.system()\n\
    'Darwin'\n>>> platform.release()\n'19.6.0'\n>>> platform.uname()\nuname_result(system='Darwin',\
    \ node='Bobs-iMac.local', release='19.6.0',\n             version='Darwin Kernel\
    \ Version 19.6.0: ...',\n             machine='x86_64', processor='i386')\n>>>\
    \ platform.mac_ver()\n('10.15.7', ('', '', ''), 'x86_64')\n```\n\n### Explanation\n\
    \nNice module to get some quick information about your OS and hardware.\n\n###\
    \ Resources\n\nhttps://docs.python.org/3/library/platform.html\n\n## 50. Object\
    \ representations\n\nWhat is the difference between __str__ and __repr__ in Python?\n\
    \n```\n>>> from datetime import date\n>>> today = date.today()\n>>> str(today)\n\
    '2020-10-31'\n>>> repr(today)\n'datetime.date(2020, 10, 31)'\n```\n\n### Explanation\n\
    \nIn short, the goal of __repr__ is to be unambiguous and __str__ is to be readable.\n\
    Or as Ned Batchelder succinctly said: \"__repr__ is for developers, __str__ is\
    \ for customers.\"\nAs we can see above, the datetime module follows this advice\
    \ nicely.\n\n### Resources\n\n[https://stackoverflow.com/a/1438297](https://stackoverflow.com/a/1438297)\n\
    \n### Exercise\n\n[Bite 167. Complete a User class: properties and representation\
    \ dunder methods](https://pybites.com/bites/167/)\n\n## 51. Keep a list ordered\
    \ upon insert\n\nWant to efficiently insert items into a list in sorted order?\
    \ Use Python's bisect module:\n\n```\n>>> from bisect import insort\n\n>>> items\
    \ = [3, 5, 7]\n\n>>> insort(items, 6)\n>>> items\n[3, 5, 6, 7]\n\n>>> insort(items,\
    \ 4)\n>>> items\n[3, 4, 5, 6, 7]\n\n>>> insort(items, 9)\n>>> items\n[3, 4, 5,\
    \ 6, 7, 9]\n\n>>> insort(items, 20)\n>>> items\n[3, 4, 5, 6, 7, 9, 20]\n\n>>>\
    \ insort(items, 15)\n>>> items\n[3, 4, 5, 6, 7, 9, 15, 20]\n```\n\n### Explanation\n\
    \nThe bisect module provides functions to support maintaining order upon insert.\n\
    \nAs per the docs this can improve performance for long lists of items with expensive\
    \ comparison operations (e.g. repeatedly sorting a list).\n\n### Resources\n\n\
    [https://docs.python.org/3/library/bisect.html#bisect.insort](https://docs.python.org/3/library/bisect.html#bisect.insort)\n\
    \n### Exercise\n\n[Bite 181. Keep a list sorted upon insert](Bite 181. Keep a\
    \ list sorted upon insert)\n\n## 52. Inspect objects with the vars built-in\n\n\
    In Python you can use the `vars` built-in to easily access an object's attributes:\n\
    \n```\n# script.py\nimport argparse\n\nparser = argparse.ArgumentParser(description='A\
    \ simple calculator')\nparser.add_argument('-a', '--add', nargs='+', help=\"Sums\
    \ numbers\")\nparser.add_argument('-s', '--sub', nargs='+', help=\"Subtracts numbers\"\
    )\nparser.add_argument('-m', '--mul', nargs='+', help=\"Multiplies numbers\")\n\
    parser.add_argument('-d', '--div', nargs='+', help=\"Divides numbers\")\n\nargs\
    \ = parser.parse_args()\n\n# drop in the debugger\nbreakpoint()\n\n$ python script.py\
    \ -a 1 -s 2 -m 3 -d 4\n\n(Pdb) args\n(Pdb) vars(args)\n{'add': ['1'], 'sub': ['2'],\
    \ 'mul': ['3'], 'div': ['4']}\n```\n\n### Explanation\n\nHere we add some command\
    \ line arguments to a script and set a breakpoint.\n\nThen we run the script and\
    \ by default args does not show anything, hm ...\n\nHowever `args` is an object\
    \ and reading up on `vars` we see that without arguments, it's equivalent to `locals()`\
    \ and with an argument, it's equivalent to `object.__dict__`.\n\nSo using `vars`\
    \ on the object we can inspect the internal attribute dictionary.\n\n### Resources\n\
    \nhttps://docs.python.org/3/library/functions.html#vars\nhttps://www.peterbe.com/plog/vars-argparse-namespace-into-a-function\n\
    \n## 53. Is a string a number?\n\nYou can use the `str.isdigit` method to see\
    \ if a string is numeric:\n\n```\n>>> s = (\"It's almost 3 years we launched our\
    \ PyBites platform\"\n...     \", which now hosts 300+ exercises, up to the next\
    \ 100 Bites\")\n>>>\n>>> [int(word) for word in s.split() if word.isdigit()]\n\
    [3, 100]\n```\n\n### Explanation\n\nHere we use it in a list comprehension to\
    \ extract numbers from a string.\n\nNote that `isdigit` requires all characters\
    \ in the string to be digits, so `300+` is discarded.\n\n### Resources\n\nhttps://docs.python.org/3/library/stdtypes.html#str.isdigit\n\
    https://stackoverflow.com/a/4289557\n\n## 54. Re.findall\n\nUse findall from the\
    \ re module to find all instances that match a regular expression pattern:\n\n\
    ```\npython\n>>> import re\n>>> import requests\n>>> html = requests.get('https://pybit.es/archives.html').text\n\
    \n>>> matches = re.findall(r'https://pybit\\.es/guest.*?\\.html', html)\n>>> len(matches)\n\
    29\n>>> for m in matches: print(m)\n...\nhttps://pybit.es/guest-create-aws-lambda-layers.html\n\
    https://pybit.es/guest-clean-text-data.html\n...\n...\nhttps://pybit.es/guest-learning-apis.html\n\
    https://pybit.es/guest-making-of-task-manager.html\n\n```\n\n### Explanation\n\
    \nHere we first download our archives page's into the html variable using requests.\n\
    \nThen we find all PyBites guest article links which can be defined as:\n\n- have\
    \ \"/guest\" after the root URL (pybit.es),\n- after that they have a variable\
    \ length of any characters (the \"?\" here means \"don't be greedy\" = match as\
    \ little as possible),\n- and they end with a literal dot (.) and the string \"\
    html\".\n\nmatches will contain a list of all matches, links in this case.\n\n\
    Lastly notice we prepend our regex with \"r\" which is known as the \"raw string\
    \ notation\" which keeps regular expressions sane. Without it, every backslash\
    \ ('\\\\') in a regular expression would have to be prefixed with another one\
    \ to escape it.\n\n### Resources\n\n[https://docs.python.org/3/library/re.html#re.findall](https://docs.python.org/3/library/re.html#re.findall)\n\
    \n[https://docs.python.org/3/howto/regex.html](https://docs.python.org/3/howto/regex.html)\n\
    \n### Exercise\n\n[Bite 2. Regex Fun](Bite 2. Regex Fun)"
  mdcn: "## 46. `if __name__ == \"__main__\"`\n\nPython 中这条常用语句的含义是什么？\n\n```\ndef\
    \ func():\n    print(\"Hello from function\")\n\nif __name__ == \"__main__\":\n\
    \    func()\n\n# main block gets invoked\n```\n\n$ python script.py\nHello from\
    \ function\n\n```\n$ python\n>>> import script  # main block does not get invoked\n\
    >>> script.func()\nHello from function\n```\n\n### 解释\n\n`if __name__ == \"__main__\"\
    ` 对于 Python 初学者来说常常令人困惑。它用在脚本末尾，用于编写只有当该模块（脚本）被直接调用时才会执行的代码。当该模块被导入到另一个模块或在交互式解释器（REPL）中运行时，这个\
    \ `if` 块中的代码**不会**执行。\n\n### 资源\n\nhttps://docs.python.org/3/library/__main__.html\n\
    \n## 47. 比较版本号\n\nPython 的标准库总能带给我们惊喜——比较版本号变得非常简单：\n\n```\n>>> from distutils.version\
    \ import StrictVersion\n>>> StrictVersion('0.12.1') < StrictVersion('1.0.2')\n\
    True\n```\n\n### 解释\n\n想象一下，要可靠地比较版本号，需要编写多少嵌套逻辑。我们深有体会，因为10年前我们就不得不处理检查 Sun Microsystems\
    \ ILOM 固件版本的问题。\n\n要是那时就知道标准库已经涵盖了这个功能该多好！\n\n遗憾的是，`StrictVersion` 似乎没有文档记录，但它确实是一个相当精妙的工具，为我们抽象掉了复杂性。\n\
    \n另一个选择是 `packaging` 库。\n\n### 资源\n\n[https://stackoverflow.com/a/6972866](https://stackoverflow.com/a/6972866)\n\
    [https://packaging.pypa.io/en/latest/](https://packaging.pypa.io/en/latest/)\n\
    \n### 练习\n\n[Bite 163. 哪些软件包被升级了？](Bite 163. Which packages were upgraded?)\n\n\
    ## 48. 移除前导空白\n\n你可以使用 `textwrap.dedent` 来移除每一行共有的前导空白：\n\n```\nfrom textwrap\
    \ import dedent\n\ndef test():\n    # end first line with \\ to avoid the empty\
    \ line!\n    s = '''\\n    hello\n      world\n    '''\n\n    print(repr(s)) \
    \          # prints '    hello\\n      world\\n    '\n    print(repr(dedent(s)))\
    \   # prints 'hello\\n  world\\n'\n```\n\n### 解释\n\n在测试代码时，这是一个非常有用的技巧。\n\n当在测试函数中添加任何多行字符串变量时，函数体的缩进会导致额外的空格被包含在这个变量中。\n\
    \n`textwrap.dedent` 可以用来移除这些前导空格，这在编写 `assert` 语句时很有帮助。\n\n你也可以使用 `inspect.cleandoc`。\n\
    \n### 资源\n\nhttps://docs.python.org/3/library/textwrap.html#textwrap.dedent\n\
    https://docs.python.org/3/library/inspect.html#inspect.cleandoc\n\n## 49. platform\
    \ 模块\n\nPython，我今天在哪个操作系统/系统上编程？\n\n```\npython\n>>> import platform\n>>> platform.machine()\n\
    'x86_64'\n>>> platform.node()\n'Bobs-iMac.local'\n>>> platform.platform()\n'Darwin-19.6.0-x86_64-i386-64bit'\n\
    >>> platform.system()\n'Darwin'\n>>> platform.release()\n'19.6.0'\n>>> platform.uname()\n\
    uname_result(system='Darwin', node='Bobs-iMac.local', release='19.6.0',\n    \
    \         version='Darwin Kernel Version 19.6.0: ...',\n             machine='x86_64',\
    \ processor='i386')\n>>> platform.mac_ver()\n('10.15.7', ('', '', ''), 'x86_64')\n\
    ```\n\n### 解释\n\n一个很好的模块，可以快速获取关于你的操作系统和硬件的信息。\n\n### 资源\n\nhttps://docs.python.org/3/library/platform.html\n\
    \n## 50. 对象表示\n\nPython 中 `__str__` 和 `__repr__` 有什么区别？\n\n```\n>>> from datetime\
    \ import date\n>>> today = date.today()\n>>> str(today)\n'2020-10-31'\n>>> repr(today)\n\
    'datetime.date(2020, 10, 31)'\n```\n\n### 解释\n\n简而言之，`__repr__` 的目标是明确无误，而 `__str__`\
    \ 的目标是易于阅读。\n或者正如 Ned Batchelder 精辟地指出的：\"__repr__ 是给开发者看的，__str__ 是给客户看的。\"\n\
    如上所示，`datetime` 模块很好地遵循了这个建议。\n\n### 资源\n\n[https://stackoverflow.com/a/1438297](https://stackoverflow.com/a/1438297)\n\
    \n### 练习\n\n[Bite 167. 完成一个 User 类：属性和表示相关的魔术方法](https://pybites.com/bites/167/)\n\
    \n## 51. 插入时保持列表有序\n\n想要高效地将元素按排序顺序插入到列表中？使用 Python 的 `bisect` 模块：\n\n```\n>>>\
    \ from bisect import insort\n\n>>> items = [3, 5, 7]\n\n>>> insort(items, 6)\n\
    >>> items\n[3, 5, 6, 7]\n\n>>> insort(items, 4)\n>>> items\n[3, 4, 5, 6, 7]\n\n\
    >>> insort(items, 9)\n>>> items\n[3, 4, 5, 6, 7, 9]\n\n>>> insort(items, 20)\n\
    >>> items\n[3, 4, 5, 6, 7, 9, 20]\n\n>>> insort(items, 15)\n>>> items\n[3, 4,\
    \ 5, 6, 7, 9, 15, 20]\n```\n\n### 解释\n\n`bisect` 模块提供了支持插入时维护顺序的函数。\n\n根据文档，对于包含昂贵比较操作的长列表，这可以提高性能（例如，反复对列表进行排序）。\n\
    \n### 资源\n\n[https://docs.python.org/3/library/bisect.html#bisect.insort](https://docs.python.org/3/library/bisect.html#bisect.insort)\n\
    \n### 练习\n\n[Bite 181. 插入时保持列表排序](Bite 181. Keep a list sorted upon insert)\n\n\
    ## 52. 使用 vars 内置函数检查对象\n\n在 Python 中，你可以使用 `vars` 内置函数轻松访问对象的属性：\n\n```\n# script.py\n\
    import argparse\n\nparser = argparse.ArgumentParser(description='A simple calculator')\n\
    parser.add_argument('-a', '--add', nargs='+', help=\"Sums numbers\")\nparser.add_argument('-s',\
    \ '--sub', nargs='+', help=\"Subtracts numbers\")\nparser.add_argument('-m', '--mul',\
    \ nargs='+', help=\"Multiplies numbers\")\nparser.add_argument('-d', '--div',\
    \ nargs='+', help=\"Divides numbers\")\n\nargs = parser.parse_args()\n\n# drop\
    \ in the debugger\nbreakpoint()\n\n$ python script.py -a 1 -s 2 -m 3 -d 4\n\n\
    (Pdb) args\n(Pdb) vars(args)\n{'add': ['1'], 'sub': ['2'], 'mul': ['3'], 'div':\
    \ ['4']}\n```\n\n### 解释\n\n这里我们为脚本添加了一些命令行参数并设置了一个断点。\n\n然后我们运行脚本，默认情况下 `args`\
    \ 没有显示任何内容，嗯...\n\n然而 `args` 是一个对象，查阅 `vars` 的文档我们发现，不带参数时，它等价于 `locals()`；带一个参数时，它等价于\
    \ `object.__dict__`。\n\n因此，通过对对象使用 `vars`，我们可以检查其内部的属性字典。\n\n### 资源\n\nhttps://docs.python.org/3/library/functions.html#vars\n\
    https://www.peterbe.com/plog/vars-argparse-namespace-into-a-function\n\n## 53.\
    \ 字符串是否是数字？\n\n你可以使用 `str.isdigit` 方法来查看一个字符串是否是数字：\n\n```\n>>> s = (\"It's almost\
    \ 3 years we launched our PyBites platform\"\n...     \", which now hosts 300+\
    \ exercises, up to the next 100 Bites\")\n>>>\n>>> [int(word) for word in s.split()\
    \ if word.isdigit()]\n[3, 100]\n```\n\n### 解释\n\n这里我们在列表推导中使用它来从字符串中提取数字。\n\n\
    请注意，`isdigit` 要求字符串中的所有字符都是数字，因此 `300+` 被舍弃了。\n\n### 资源\n\nhttps://docs.python.org/3/library/stdtypes.html#str.isdigit\n\
    https://stackoverflow.com/a/4289557\n\n## 54. re.findall\n\n使用 `re` 模块的 `findall`\
    \ 来查找所有匹配正则表达式模式的实例：\n\n```\npython\n>>> import re\n>>> import requests\n>>> html\
    \ = requests.get('https://pybit.es/archives.html').text\n\n>>> matches = re.findall(r'https://pybit\\\
    .es/guest.*?\\.html', html)\n>>> len(matches)\n29\n>>> for m in matches: print(m)\n\
    ...\nhttps://pybit.es/guest-create-aws-lambda-layers.html\nhttps://pybit.es/guest-clean-text-data.html\n\
    ...\n...\nhttps://pybit.es/guest-learning-apis.html\nhttps://pybit.es/guest-making-of-task-manager.html\n\
    \n```\n\n### 解释\n\n这里我们首先使用 `requests` 下载我们的存档页面到 `html` 变量中。\n\n然后我们找到所有 PyBites\
    \ 访客文章的链接，这些链接可以定义为：\n\n- 在根 URL（pybit.es）之后有 \"/guest\"，\n- 之后是长度可变的任何字符（这里的\
    \ \"?\" 意思是 \"不要贪婪\" = 尽可能少地匹配），\n- 并且以一个字面点 (.) 和字符串 \"html\" 结尾。\n\n`matches`\
    \ 将包含所有匹配项的列表，在这个例子中就是链接。\n\n最后请注意，我们在正则表达式前加上了 \"r\"，这被称为 \"原始字符串表示法\"，它使正则表达式保持清晰。如果不加它，正则表达式中的每个反斜杠\
    \ ('\\\\') 都需要额外加一个反斜杠来转义它。\n\n### 资源\n\n[https://docs.python.org/3/library/re.html#re.findall](https://docs.python.org/3/library/re.html#re.findall)\n\
    \n[https://docs.python.org/3/howto/regex.html](https://docs.python.org/3/howto/regex.html)\n\
    \n### 练习\n\n[Bite 2. 正则表达式之趣](Bite 2. Regex Fun)"
