    \n## 26. Wrapping text\n\nYou can use the `textwrap` module to wrap text to columns:\n\
    \n```python\n>>> from textwrap import wrap\n\n>>> text = (\"Every great developer\
    \ you know got there by solving \"\n...         \"problems they were unqualified\
    \ to solve until they \"\n...         \"actually did it. - Patrick McKenzie\"\
    )\n\n>>> for line in wrap(text, width=80): print(line)\n...\nEvery great developer\
    \ you know got there by solving problems they were\nunqualified to solve until\
    \ they actually did it. - Patrick McKenzie\n\n>>> for line in wrap(text, width=40):\
    \ print(line)\n...\nEvery great developer you know got there\nby solving problems\
    \ they were\nunqualified to solve until they actually\ndid it. - Patrick McKenzie\n\
    ```\n\n### Explanation\n\nHere we use `textwrap.wrap` to break down the given\
    \ text (quote) into a list of lines of width 80 and 40 respectively.\n\nThe `width`\
    \ argument is optional and will default to 70 if not provided.\n\n### Resources\n\
    \nhttps://docs.python.org/3/library/textwrap.html\n\n### Exercise\n\nBite 54.\
    \ Nicer formatting of a poem or text\n\n## 27. Copy.deepcopy\n\nUse deepcopy to\
    \ copy compound objects in Python:\n\n```python\n>>> from copy import copy, deepcopy\n\
    >>> items = [dict(id=1, name='laptop')]\n>>> items2 = copy(items)\n>>> items[0]['name']\
    \ = 'macbook'\n>>> items\n[{'id': 1, 'name': 'macbook'}]\n>>> items2\n[{'id':\
    \ 1, 'name': 'macbook'}]  # oops!\n>>> items = [dict(id=1, name='laptop')]\n>>>\
    \ items2 = deepcopy(items)\n>>> items[0]['name'] = 'macbook'\n>>> items\n[{'id':\
    \ 1, 'name': 'macbook'}]\n>>> items2\n[{'id': 1, 'name': 'laptop'}]  # this object\
    \ stays intact as per intention\n```\n\n### Explanation\n\nIt's important to know\
    \ the difference between shallow and deep copy:\n\n- A shallow copy constructs\
    \ a new compound object and then (to the extent possible) inserts references into\
    \ it to the objects found in the original.\n- A deep copy constructs a new compound\
    \ object and then, recursively, inserts copies into it of the objects found in\
    \ the original.\n\nAs shown in the example, making a shallow copy of a nested\
    \ object with `copy` (or using slicing: `[:]`) inner objects are references, so\
    \ updating one updates all copies.\n\nNot so with `deepcopy`. See our article\
    \ below for another use case.\n\n### Resources\n\n[https://pybit.es/mutability.html](https://pybit.es/mutability.html)\n\
    [https://docs.python.org/3/library/copy.html](https://docs.python.org/3/library/copy.html)\n\
    \n### Exercise\n\n[Bite 32. Don't let mutability fool you](Bite 32. Don't let\
    \ mutability fool you)"
