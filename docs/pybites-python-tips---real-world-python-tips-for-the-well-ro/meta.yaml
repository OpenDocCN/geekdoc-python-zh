    class Book(models.Model):\n    bookid = models.CharField(max_length=20)  # google\
    \ bookid\n    title = models.CharField(max_length=200)\n    ...\n\n    def __str__(self):\n\
    \        return f'{self.id} {self.bookid} {self.title}'\n\n$ python manage.py\
    \ shell\n>>> from books.models import import Book\n>>> Book.objects.last()\n<Book:\
    \ 2 1ZxxDwAAQBAJ Think & Grow Rich>\n>>> Book.objects.first()\n<Book: 1 1KuwDwAAQBAJ\
    \ The Coaching Habit>\n```\n\n# Explanation\n\nAs you can see in the code above\
    \ adding a __str__ (dunder) method makes it easier to inspect objects in the Django\
    \ shell or when debugging your code in general.\n\n# Resources\n\n[https://stackoverflow.com/a/56339054](https://stackoverflow.com/a/56339054)\n\
    [https://dbader.org/blog/python-dunder-methods](https://dbader.org/blog/python-dunder-methods)"
- md: "## 89. Assert_called_with\n\nHere is how to assert a mocked out function was\
    \ called:\n\n```python\n@mock.patch.object(facebook.GraphAPI, 'put_object', autospec=True)\n\
    def test_post_message(self, mock_put_object):\n    sf = simple_facebook.SimpleFacebook(\"\
    fake oauth token\")\n    sf.post_message(\"Hello World!\")\n    mock_put_object.assert_called_with(message=\"\
    Hello World!\")\n```\n\n## Explanation\n\nThe assert_called_with method (unittest.mock/\
    \ mock object library) is a convenient way of asserting that the last call has\
    \ been made with the specified arguments.\n\nHere is an example we found in the\
    \ linked \"An Introduction to Mocking in Python\" article which checks a Facebook\
    \ message was posted without hitting FB’s API.\n\n## Resources\n\n- https://docs.python.org/3/library/unittest.mock.html#unittest.mock.Mock.assert_called_with\n\
    - https://www.toptal.com/python/an-introduction-to-mocking-in-python\n\n## 90.\
    \ Access the exception info in your test\n\nHere is how to access the actual exception\
    \ info in your pytest test:\n\n```python\ndef test_new_score_should_be_higher(yellow_belt):\n\
    \    assert yellow_belt.score == 50\n    with pytest.raises(ValueError) as excinfo:\n\
    \        yellow_belt.score = 40\n    assert str(excinfo.value) == \"Cannot lower\
    \ score\"\n\n(Pdb) excinfo.value\nValueError('Cannot lower score')\n(Pdb) str(excinfo.value)\n\
    'Cannot lower score'\n```\n\n## Explanation\n\nTo obtain the exception value string,\
    \ cast the exception to `str` outside of the `with pytest.raises` block.\n\n##\
    \ Resources\n\nhttps://docs.pytest.org/en/stable/assert.html#assertions-about-expected-exceptions\n\
    \n## 91. Dictionary access without KeyError\n\nReady for something pretty idiomatic\
    \ / elegant? Meet `dict`'s get method:\n\n```python\n>>> workouts = {\n...   \
    \  \"Mon\": \"upper body 1\",\n...     \"Tue\": \"lower body 1\",\n...     \"\
    Thu\": \"upper body 2\",\n...     \"Fri\": \"lower body 2\"\n... }\n>>> workouts['Mon']\n\
    'upper body 1'\n>>> workouts['Fri']\n'lower body 2'\n>>> workouts['Sat']\nTraceback\
    \ (most recent call last):\n  File \"<stdin>\", line 1, in <module>\nKeyError:\
    \ 'Sat'\n>>> ret = workouts.get('Sat')\n>>> ret is None\nTrue\n>>> workouts.get('Sat',\
    \ 'not a workout day')\n'not a workout day'\n```\n\n## Explanation\n\nThe `dict.get`\
    \ method checks if the provided key is in the dictionary. If not it returns `None`,\
    \ unless you give it a default value as second argument.\n\nSo if the `Sat` key\
    \ is not in the dictionary, `workouts.get('Sat')` returns `None`, but `workouts.get('Sat',\
    \ 'default_value')` returns `default_value` as that is defined as default.\n\n\
    ## Resources\n\n[https://docs.python.org/3/library/stdtypes.html#dict.get](https://docs.python.org/3/library/stdtypes.html#dict.get)\n\
    \n## Exercise\n\n[Intro Bite 09. Workout dictionary lookups](Intro Bite 09. Workout\
    \ dictionary lookups)\n\n## 92. Itertools.takewhile\n\nGet all the ninja belts\
    \ up until a certain score using itertools. takewhile:\n\n```python\n>>> ninja_belts\n\
    {10: 'white', 50: 'yellow', 100: 'orange', 175: 'green', 250: 'blue', 400: 'brown',\n\
    600: 'black', 800: 'paneled', 1000: 'red'}\n>>> from itertools import takewhile\n\
    >>> def get_belts(user_score):\n...     return takewhile(lambda x: x[0] <= user_score,\n\
    ...                       ninja_belts.items())\n...\n>>> for i in (7, 18, 51,\
    \ 174, 176):\n...     i, list(get_belts(i))\n...\n(7, [])\n(18, [(10, 'white')])\n\
    (51, [(10, 'white'), (50, 'yellow')])\n(174, [(10, 'white'), (50, 'yellow'), (100,\
    \ 'orange')])\n(176, [(10, 'white'), (50, 'yellow'), (100, 'orange'), (175, 'green')])\n\
    ```\n\n## Explanation\n\nitertools. takewhile receives a predicate and an iterable.\
    \ It returns a generator that returns elements from the iterable as long as the\
    \ predicate is true.\n\nSo here our predicate checks if the subsequent belt scores\
    \ are less than the user's score, effectively returning all the belts this user\
    \ has earned so far.\n\nThis code runs on our platform as we speak \U0001F60A\n\
    \n## Resources\n\n[https://docs.python.org/3/library/itertools.html#itertools.takewhile](https://docs.python.org/3/library/itertools.html#itertools.takewhile)\n\
    [https://pybit.es/itertools-examples.html](https://pybit.es/itertools-examples.html)\n\
    \n## 93. Swap dictionary keys and values\n\nSwap a `dict`'s keys and values in\
    \ just one line of code (!) using a dictionary comprehension:\n\n```python\n>>>\
    \ ninja_belts\n{10: 'white', 50: 'yellow', 100: 'orange', 175: 'green', 250: 'blue',\
    \ 400: 'brown',\n600: 'black', 800: 'paneled', 1000: 'red'}\n\n>>> {v:k for k,\
    \ v in ninja_belts.items()}\n{'white': 10, 'yellow': 50, 'orange': 100, 'green':\
    \ 175, 'blue': 250, 'brown': 400,\n'black': 600, 'paneled': 800, 'red': 1000}\n\
    ```\n\n## Explanation\n\nHere we see the power of comprehensions which allow us\
    \ to loop through the `dict`'s (key, value) pairs using `items()`, swapping them\
    \ in the \"expression\" part of the comprehension.\n\nWe just love Python :)\n\
    \n## Resources\n\nhttps://www.python.org/dev/peps/pep-0274/\nhttps://docs.python.org/3/tutorial/datastructures.html#list-comprehensions\n\
    \n## 94. Itertools.groupby\n\nGroup car data by manufacturer using itertools.groupby:\n\
    \n```python\n>>> from itertools import groupby\n>>> from operator import itemgetter\n\
    >>> cars = [\n...     ('Toyota', 'Avalon'), ('Ford', 'Bronco'),\n...     ('Chevrolet',\
    \ 'Cavalier'), ('Chevrolet', 'Corvette'),\n...     ('Volkswagen', 'GTI'), ('Toyota',\
    \ 'Highlander'),\n...     ('Chevrolet', 'Impala'), ('Nissan', 'Maxima'),\n...\
    \     ('Ford', 'Mustang'), ('Kia', 'Optima'),\n...     ('Volkswagen', 'Passat'),\
    \ ('Nissan', 'Pathfinder'),\n...     ('Ford', 'Taurus'), ('Nissan', 'Titan'),\n\
    ... ]\n>>> cars.sort()  # required\n>>> for manufacturer, models in groupby(cars,\
    \ key=itemgetter(0)):\n...     print(f'* {manufacturer}')\n...     print(\", \"\
    .join(model[1] for model in models))\n...\n* Chevrolet\nCavalier, Corvette, Impala\n\
    * Ford\nBronco, Mustang, Taurus\n...\n* Volkswagen\nGTI, Passat\n```\n\n## Explanation\n\
    \nHere we have a cars list of (manufacturer, model) tuples and we want to group\
    \ the models by manufacturer.\n\nWe can use itertools.groupby which takes an iterable\
    \ (cars) and a key (function) to group the items by. Here we use itemgetter as\
    \ key which is a callable that gets the first item of each tuple (manufacturer)\
    \ as the grouping key.\n\nThe only requirement for this to work is that the data\
    \ is sorted, hence the cars.sort() call which sorts the cars in-place.\n\n## Resources\n\
    \nhttps://docs.python.org/3/library/itertools.html#itertools.groupby\n\nhttps://docs.python.org/3/library/operator.html#operator.itemgetter\n\
    \n## 95. Mocking datetimes\n\nYou can use the `freezegun` library to mock out\
    \ the `datetime` module:\n\n```python\nimport datetime\n\nfrom freezegun import\
    \ freeze_time\n\nfrom tomorrow import tomorrow\n\n\n@freeze_time('2020-07-09')\n\
    def test_no_args():\n    assert tomorrow() == datetime.date(2020, 7, 10)\n```\n\
    \n## Explanation\n\nMocking out datetimes is tough.\n\nSay you'd use `@patch('datetime.date',\
    \ your_datetime_mock_object)` in your test, only to have it break when the import\
    \ changes from:\n`import datetime`\nto:\n`from datetime import date, timedelta`\n\
    \nFreezeGun works around this issue by faking Python datetimes thoroughly, keeping\
    \ your tests simple.\n\n## Resources\n\nhttps://pybit.es/guest-freezegun.html\n\
    https://github.com/spulec/freezegun\n\n## Exercise\n\nBite 283. Like there's no\
    \ tomorrow?\n\n## 96. Read in source code\n\nGet a list of source lines from an\
    \ object using inspect.getsourcelines:\n\n```python\n# challenge.py module\nfrom\
    \ abc import ABC, abstractmethod\n\nclass Challenge(ABC):\n\n    def __init__(self,\
    \ number):\n        self.number = number\n\n    @abstractmethod\n    def pretty_title(self):\n\
    \        return 'Subclass should implement'\n\n# test module\nimport inspect\n\
    \nfrom challenge import Challenge\n\ndef test_baseclass_methods_are_abstract():\n\
    \    lines = [line.strip() for line in\n            inspect.getsourcelines(Challenge)[0]]\n\
    \    ...\n    pretty_title_index = lines.index('def pretty_title(self):')\n  \
    \  assert lines[pretty_title_index - 1] == \"@abstractmethod\"\n```\n\n## Explanation\n\
    \nThe inspect module is very useful to get information about live objects such\
    \ as modules, classes, methods, etc.\n\nIn this real world scenario (taken from\
    \ our platform), we use it in our tests to verify that the submitted code makes\
    \ the pretty_title method abstract by applying the @abstractmethod decorator to\
    \ it.\n\n## Resources\n\nhttps://docs.python.org/3/library/inspect.html#inspect.getsourcelines"
  mdcn: "## 89. 断言函数被调用\n\n以下是如何断言一个被模拟的函数被调用：\n\n```python\n@mock.patch.object(facebook.GraphAPI,\
    \ 'put_object', autospec=True)\ndef test_post_message(self, mock_put_object):\n\
    \    sf = simple_facebook.SimpleFacebook(\"fake oauth token\")\n    sf.post_message(\"\
    Hello World!\")\n    mock_put_object.assert_called_with(message=\"Hello World!\"\
    )\n```\n\n## 解释\n\n`assert_called_with` 方法（来自 `unittest.mock` / mock 对象库）是断言最后一次调用使用了指定参数的便捷方式。\n\
    \n以下是我们从链接文章《Python 中的模拟简介》中找到的一个示例，它检查是否发布了一条 Facebook 消息，而无需实际调用 Facebook 的\
    \ API。\n\n## 资源\n\n- https://docs.python.org/3/library/unittest.mock.html#unittest.mock.Mock.assert_called_with\n\
    - https://www.toptal.com/python/an-introduction-to-mocking-in-python\n\n## 90.\
    \ 在测试中访问异常信息\n\n以下是如何在你的 pytest 测试中访问实际的异常信息：\n\n```python\ndef test_new_score_should_be_higher(yellow_belt):\n\
    \    assert yellow_belt.score == 50\n    with pytest.raises(ValueError) as excinfo:\n\
    \        yellow_belt.score = 40\n    assert str(excinfo.value) == \"Cannot lower\
    \ score\"\n\n(Pdb) excinfo.value\nValueError('Cannot lower score')\n(Pdb) str(excinfo.value)\n\
    'Cannot lower score'\n```\n\n## 解释\n\n要获取异常值的字符串表示，请在 `with pytest.raises` 块之外将异常转换为\
    \ `str`。\n\n## 资源\n\nhttps://docs.pytest.org/en/stable/assert.html#assertions-about-expected-exceptions\n\
    \n## 91. 避免 KeyError 的字典访问\n\n准备好学习一些非常地道/优雅的用法了吗？认识一下 `dict` 的 `get` 方法：\n\n\
    ```python\n>>> workouts = {\n...     \"Mon\": \"upper body 1\",\n...     \"Tue\"\
    : \"lower body 1\",\n...     \"Thu\": \"upper body 2\",\n...     \"Fri\": \"lower\
    \ body 2\"\n... }\n>>> workouts['Mon']\n'upper body 1'\n>>> workouts['Fri']\n\
    'lower body 2'\n>>> workouts['Sat']\nTraceback (most recent call last):\n  File\
    \ \"<stdin>\", line 1, in <module>\nKeyError: 'Sat'\n>>> ret = workouts.get('Sat')\n\
    >>> ret is None\nTrue\n>>> workouts.get('Sat', 'not a workout day')\n'not a workout\
    \ day'\n```\n\n## 解释\n\n`dict.get` 方法检查提供的键是否在字典中。如果不在，它返回 `None`，除非你提供了第二个参数作为默认值。\n\
    \n因此，如果 `Sat` 键不在字典中，`workouts.get('Sat')` 返回 `None`，但 `workouts.get('Sat', 'default_value')`\
    \ 返回 `default_value`，因为这是定义的默认值。\n\n## 资源\n\n[https://docs.python.org/3/library/stdtypes.html#dict.get](https://docs.python.org/3/library/stdtypes.html#dict.get)\n\
    \n## 练习\n\n[Intro Bite 09. 锻炼字典查找](Intro Bite 09. Workout dictionary lookups)\n\
    \n## 92. Itertools.takewhile\n\n使用 `itertools.takewhile` 获取所有分数低于特定分数的忍者腰带：\n\n\
    ```python\n>>> ninja_belts\n{10: 'white', 50: 'yellow', 100: 'orange', 175: 'green',\
    \ 250: 'blue', 400: 'brown',\n600: 'black', 800: 'paneled', 1000: 'red'}\n>>>\
    \ from itertools import takewhile\n>>> def get_belts(user_score):\n...     return\
    \ takewhile(lambda x: x[0] <= user_score,\n...                       ninja_belts.items())\n\
    ...\n>>> for i in (7, 18, 51, 174, 176):\n...     i, list(get_belts(i))\n...\n\
    (7, [])\n(18, [(10, 'white')])\n(51, [(10, 'white'), (50, 'yellow')])\n(174, [(10,\
    \ 'white'), (50, 'yellow'), (100, 'orange')])\n(176, [(10, 'white'), (50, 'yellow'),\
    \ (100, 'orange'), (175, 'green')])\n```\n\n## 解释\n\n`itertools.takewhile` 接收一个谓词和一个可迭代对象。它返回一个生成器，只要谓词为真，就从可迭代对象中返回元素。\n\
    \n因此，这里的谓词检查后续的腰带分数是否小于用户的分数，从而有效地返回该用户迄今为止获得的所有腰带。\n\n这段代码正在我们的平台上运行 \U0001F60A\
    \n\n## 资源\n\n[https://docs.python.org/3/library/itertools.html#itertools.takewhile](https://docs.python.org/3/library/itertools.html#itertools.takewhile)\n\
    [https://pybit.es/itertools-examples.html](https://pybit.es/itertools-examples.html)\n\
    \n## 93. 交换字典的键和值\n\n只需一行代码（！）使用字典推导式交换 `dict` 的键和值：\n\n```python\n>>> ninja_belts\n\
    {10: 'white', 50: 'yellow', 100: 'orange', 175: 'green', 250: 'blue', 400: 'brown',\n\
    600: 'black', 800: 'paneled', 1000: 'red'}\n\n>>> {v:k for k, v in ninja_belts.items()}\n\
    {'white': 10, 'yellow': 50, 'orange': 100, 'green': 175, 'blue': 250, 'brown':\
    \ 400,\n'black': 600, 'paneled': 800, 'red': 1000}\n```\n\n## 解释\n\n这里我们看到了推导式的力量，它允许我们使用\
    \ `items()` 遍历 `dict` 的（键，值）对，并在推导式的“表达式”部分交换它们。\n\n我们就是喜欢 Python :)\n\n## 资源\n\
    \nhttps://www.python.org/dev/peps/pep-0274/\nhttps://docs.python.org/3/tutorial/datastructures.html#list-comprehensions\n\
    \n## 94. Itertools.groupby\n\n使用 `itertools.groupby` 按制造商对汽车数据进行分组：\n\n```python\n\
    >>> from itertools import groupby\n>>> from operator import itemgetter\n>>> cars\
    \ = [\n...     ('Toyota', 'Avalon'), ('Ford', 'Bronco'),\n...     ('Chevrolet',\
    \ 'Cavalier'), ('Chevrolet', 'Corvette'),\n...     ('Volkswagen', 'GTI'), ('Toyota',\
    \ 'Highlander'),\n...     ('Chevrolet', 'Impala'), ('Nissan', 'Maxima'),\n...\
    \     ('Ford', 'Mustang'), ('Kia', 'Optima'),\n...     ('Volkswagen', 'Passat'),\
    \ ('Nissan', 'Pathfinder'),\n...     ('Ford', 'Taurus'), ('Nissan', 'Titan'),\n\
    ... ]\n>>> cars.sort()  # required\n>>> for manufacturer, models in groupby(cars,\
    \ key=itemgetter(0)):\n...     print(f'* {manufacturer}')\n...     print(\", \"\
    .join(model[1] for model in models))\n...\n* Chevrolet\nCavalier, Corvette, Impala\n\
    * Ford\nBronco, Mustang, Taurus\n...\n* Volkswagen\nGTI, Passat\n```\n\n## 解释\n\
    \n这里我们有一个包含（制造商，型号）元组的汽车列表，我们想按制造商对型号进行分组。\n\n我们可以使用 `itertools.groupby`，它接收一个可迭代对象（`cars`）和一个用于分组的键（函数）。这里我们使用\
    \ `itemgetter` 作为键，它是一个可调用对象，获取每个元组的第一个元素（制造商）作为分组键。\n\n此方法能工作的唯一要求是数据已排序，因此需要调用\
    \ `cars.sort()` 来对汽车进行原地排序。\n\n## 资源\n\nhttps://docs.python.org/3/library/itertools.html#itertools.groupby\n\
    \nhttps://docs.python.org/3/library/operator.html#operator.itemgetter\n\n## 95.\
    \ 模拟日期时间\n\n你可以使用 `freezegun` 库来模拟 `datetime` 模块：\n\n```python\nimport datetime\n\
    \nfrom freezegun import freeze_time\n\nfrom tomorrow import tomorrow\n\n\n@freeze_time('2020-07-09')\n\
    def test_no_args():\n    assert tomorrow() == datetime.date(2020, 7, 10)\n```\n\
    \n## 解释\n\n模拟日期时间是很棘手的。\n\n假设你在测试中使用 `@patch('datetime.date', your_datetime_mock_object)`，结果当导入从：\n\
    `import datetime`\n变为：\n`from datetime import date, timedelta`\n时，测试就中断了。\n\n\
    FreezeGun 通过彻底伪造 Python 的日期时间来解决这个问题，让你的测试保持简单。\n\n## 资源\n\nhttps://pybit.es/guest-freezegun.html\n\
    https://github.com/spulec/freezegun\n\n## 练习\n\nBite 283. 就像没有明天一样？\n\n## 96.\
    \ 读取源代码\n\n使用 `inspect.getsourcelines` 从对象获取源代码行列表：\n\n```python\n# challenge.py\
    \ module\nfrom abc import ABC, abstractmethod\n\nclass Challenge(ABC):\n\n   \
    \ def __init__(self, number):\n        self.number = number\n\n    @abstractmethod\n\
    \    def pretty_title(self):\n        return 'Subclass should implement'\n\n#\
    \ test module\nimport inspect\n\nfrom challenge import Challenge\n\ndef test_baseclass_methods_are_abstract():\n\
    \    lines = [line.strip() for line in\n            inspect.getsourcelines(Challenge)[0]]\n\
    \    ...\n    pretty_title_index = lines.index('def pretty_title(self):')\n  \
    \  assert lines[pretty_title_index - 1] == \"@abstractmethod\"\n```\n\n## 解释\n\
    \n`inspect` 模块对于获取有关活动对象（如模块、类、方法等）的信息非常有用。\n\n在这个真实场景中（取自我们的平台），我们在测试中使用它来验证提交的代码是否通过应用\
    \ `@abstractmethod` 装饰器使 `pretty_title` 方法成为抽象方法。\n\n## 资源\n\nhttps://docs.python.org/3/library/inspect.html#inspect.getsourcelines"
