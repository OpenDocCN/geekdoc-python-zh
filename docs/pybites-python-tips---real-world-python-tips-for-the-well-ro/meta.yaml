    \ really helped us when we built our coding streak calendar on our platform.\n\
    \n### Resources\n\n- https://docs.python.org/3/library/calendar.html#calendar.monthcalendar\n\
    \n## 43. Itertools.count\n\nPython's `itertools` makes it easy to make a sequence\
    \ starting a number:\n\n```python\n>>> import itertools\n>>> seq = itertools.count(11)\n\
    >>> next(seq)\n11\n>>> next(seq)\n12\n\n# with step\n>>> seq = itertools.count(6,\
    \ step=3)\n>>> for _ in range(3):\n...     next(seq)\n...\n6\n9\n12\n\n>>> seq\
    \ = itertools.count(3.75, step=0.25)\n>>> for _ in range(3):\n...     next(seq)\n\
    ...\n3.75\n4.0\n4.25\n```\n\n### Explanation\n\nThe functions in the `itertools`\
    \ module create iterators for efficient looping. Learn and embrace them, they\
    \ can save you a lot of work.\n\nHere we make an infinite counter starting at\
    \ 11. You can give it a step and it also works with `floats`.\n\nBy the way, the\
    \ `_` in the `for` loop is a \"throwaway\" variable (we won't need/ use it).\n\
    \n### Resources\n\n- [https://docs.python.org/3.8/library/itertools.html#itertools.count](https://docs.python.org/3.8/library/itertools.html#itertools.count)\n\
    \n## 44. Group dict / mappings\n\nUse `collections.ChainMap` to group multiple\
    \ dictionaries / mappings together:\n\n```python\n>>> import argparse\n>>> import\
