  mdcn: "## 97. 装饰器最佳实践\n\n使用 `functools.wraps` 保留被装饰函数的文档字符串：\n\n```python\n>>> def\
    \ mydecorator(function):\n...     def wrapped(*args, **kwargs):\n...         result\
    \ = function(*args, **kwargs)\n...         return result\n...     return wrapped\n\
    ...\n>>> def func():\n...     \"\"\"ajksnd\"\"\"\n...\n>>> @mydecorator\n... def\
    \ func():\n...     \"\"\"my docstring\"\"\"\n...     print(\"hello\")\n...\n>>>\
    \ func.__doc__\n>>>\n>>> from functools import wraps\n>>> def mydecorator(function):\n\
    ...     @wraps(function)  # 添加这一行\n...     # ... 其余部分相同 ...\n...\n>>> @mydecorator\n\
    ... def func():\n...     \"\"\"现在应该被保留了\"\"\"\n...     print(\"hello\")\n...\n\
    >>> func.__doc__\n'现在应该被保留了'\n```\n\n## 解释\n\n编写装饰器时，最佳实践是使用 `functools.wraps`，以避免丢失被装饰函数的文档字符串和其他元数据。\n\
    \n## 资源\n\n- https://docs.python.org/3/library/functools.html#functools.wraps\n\
    - https://pybit.es/decorators-by-example.html\n\n## 98. Django Extensions\n\n\
    使用 `shell_plus` 预加载所有模型，节省时间：\n\n```bash\n(venv) $ pip install django-extensions\
    \ ipython\n\n# settings/local.py\nINSTALLED_APPS = INSTALLED_APPS + [\n    'django_extensions',\n\
    ]\n\n(venv) $ python manage.py shell_plus --ipython\n# Shell Plus 模型导入\nfrom books.models\
    \ import Badge, Book, BookNote, Search, UserBook\nfrom django.contrib.admin.models\
