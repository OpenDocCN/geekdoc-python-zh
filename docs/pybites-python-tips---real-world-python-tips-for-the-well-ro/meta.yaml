    # 10. Is vs == (object equality)


    The difference in Python between comparing objects and their values:


    ```

    >>> a = [1, 2, 3]

    >>> b = [1, 2, 3]

    >>> c = a

    >>> a == b

    True

    >>> a is b

    False

    >>> a == c

    True

    >>> a is c

    True

    ```


    # Explanation


    In Python `is` checks that 2 arguments refer to the same object, `==` is used
    to check that they have the same value.


