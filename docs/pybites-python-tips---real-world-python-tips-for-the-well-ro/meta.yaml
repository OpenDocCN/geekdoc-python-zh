- md: "## 97. A decorator best practice\n\nPreserve docstrings of decorated functions\
    \ using `functools.wraps`:\n\n```python\n>>> def mydecorator(function):\n... \
    \    def wrapped(*args, **kwargs):\n...         result = function(*args, **kwargs)\n\
    ...         return result\n...     return wrapped\n...\n>>> def func():\n... \
    \    \"\"\"ajksnd\"\"\"\n...\n>>> @mydecorator\n... def func():\n...     \"\"\"\
    my docstring\"\"\"\n...     print(\"hello\")\n...\n>>> func.__doc__\n>>>\n>>>\
    \ from functools import wraps\n>>> def mydecorator(function):\n...     @wraps(function)\
    \  # adding this line\n...     # ... rest the same ...\n...\n>>> @mydecorator\n\
    ... def func():\n...     \"\"\"should be preserved now\"\"\"\n...     print(\"\
    hello\")\n...\n>>> func.__doc__\n'should be preserved now'\n```\n\n## Explanation\n\
    \nWhen writing decorators it's best practice to use `functools.wraps` to not lose\
    \ the docstring and other metadata of the function you are decorating.\n\n## Resources\n\
    \n- https://docs.python.org/3/library/functools.html#functools.wraps\n- https://pybit.es/decorators-by-example.html\n\
    \n## 98. Django Extensions\n\nSave time preloading all your models using `shell_plus`:\n\
    \n```bash\n(venv) $ pip install django-extensions ipython\n\n# settings/local.py\n\
    INSTALLED_APPS = INSTALLED_APPS + [\n    'django_extensions',\n]\n\n(venv) $ python\
    \ manage.py shell_plus --ipython\n# Shell Plus Model Imports\nfrom books.models\
    \ import Badge, Book, BookNote, Search, UserBook\nfrom django.contrib.admin.models\
    \ import LogEntry\n...\nfrom goal.models import Goal\nfrom pomodoro.models import\
    \ Pomodoro\n# Shell Plus Django Imports\nfrom django.core.cache import cache\n\
    from django.conf import settings\nfrom django.contrib.auth import get_user_model\n\
    from django.db import transaction\nfrom django.db.models import Avg, Case, Count,\
    \ F, Max, Min, Prefetch, Q, Sum, When\n...\nIn [1]: Book  # already imported\n\
    Out[1]: books.models.Book\nIn [2]: Book.objects.count()\nOut[2]: 2\nIn [3]: Book.objects.last()\n\
    Out[3]: <Book: 2 1ZxxDwAAQBAJ Think & Grow Rich>\n```\n\n## Explanation\n\nDjango\
    \ Extensions (django-extensions) comes with some really powerful tools, for example\
    \ `shell_plus`, which autoloads all your Django models and ORM helpers in a shell\
    \ which can be IPython.\n\n## Resources\n\n- https://django-extensions.readthedocs.io/en/latest/shell_plus.html\n\
    \n## 99. What day of the week is it?\n\nIf you want the day of the week as an\
    \ integer, call `weekday` on a `date` object:\n\n```python\n>>> from datetime\
    \ import date\n>>> help(date.today().weekday)\n\nHelp on built-in function weekday:\n\
    \nweekday(...) method of datetime.date instance\n    Return the day of the week\
    \ represented by the date.\n    Monday == 0 ... Sunday == 6\n\n# using it for\
    \ a Django command for example\n\nfrom django.core.management.base import BaseCommand\n\
    \nIS_MONDAY = date.today().weekday() == 0\n\nclass Command(BaseCommand):\n\n \
    \   def handle(self, *args, **options):\n        # logic for every day\n\n   \
    \     if IS_MONDAY:\n            # additional logic only to be run on Monday ...\n\
    ```\n\n## Explanation\n\nWe use this often in our Django commands to run them\
    \ only on particular days.\n\nFor example our 4 weekly tip emails we use\nmatch\
    \ `WEEKDAY = date.today().weekday()` against these\nconstants: `MONDAY, TUESDAY,\
    \ THURSDAY, FRIDAY = 0, 1, 3, 4`, very useful.\n\n## Resources\n\n- https://docs.python.org/3/library/datetime.html#datetime.date.weekday\n\
    \n## Exercise\n\n- [Bite 74. What day of the week were you born on?](https://pybit.es/bite74.html)\n\
    \n## 100. What week of the year is it?\n\nIf you want the week of the year, call\
    \ isocalendar on a date object:\n\n```python\n>>> from datetime import date\n\
    >>> date.today().isocalendar()[1]\n30\n>>> date(2020, 1, 3).isocalendar()[1]\n\
    1\n>>> date(2020, 12, 25).isocalendar()[1]\n52\n\n# get a range of remaining weeks:\n\
    >>> start_week = date.today().isocalendar()[1]\n>>> start_week\n45\n>>> weeks\
    \ = range(start_week, 53)\n>>> list(weeks)\n[45, 46, 47, 48, 49, 50, 51, 52]\n\
    ```\n\n## Explanation\n\ndatetime.date.isocalendar returns a named tuple object\
    \ with three components: year, week and weekday. Here we just want the week so\
    \ we grab the second item ([1]).\n\nIn the second snippet we use this with range\
    \ to get the remaining weeks of this year.\n\n## Resources\n\n- https://docs.python.org/3/library/datetime.html#datetime.date.isocalendar\n\
