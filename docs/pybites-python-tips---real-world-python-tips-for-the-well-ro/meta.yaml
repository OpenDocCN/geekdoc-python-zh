    # 18. List comprehension to filter out values


    Use a list comprehension in Python to filter a list:


    ```

    python

    >>> languages = [''Python'', ''Java'', ''Perl'', ''PHP'', ''Python'', ''JS'',
    ''C++'', ''JS'', ''Python'', ''Ruby'']

    >>> [l for l in languages if l.lower().startswith(''p'')]

    [''Python'', ''Perl'', ''PHP'', ''Python'', ''Python'']


    # alternative but less readable


    >>> list(filter(lambda l: l.lower().startswith(''p''), languages))

    [''Python'', ''Perl'', ''PHP'', ''Python'', ''Python'']

    ```


    # Explanation


    You can write a list comprehension from the inside out: place two [] brackets,
    then write [l for l in languages].


    You just repeated the list, now at the end put your condition: if l.lower().startswith(''p'')
    and voilà you are returning a list of all the languages starting with ''p''.


    But you don''t have to stop there, you can write set and dict comprehensions too.
    They are definitely one of our favorite Python features.


    # Resources


    https://docs.python.org/3/tutorial/datastructures.html#list-comprehensions


    # Exercise


    Intro Bite 07. Filter numbers with a list comprehension'
