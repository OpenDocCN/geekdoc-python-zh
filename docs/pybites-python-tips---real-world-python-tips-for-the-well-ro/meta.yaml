    \ for _ in range(3): print_no_newline('test')\n...\ntest, test, test, >>>\n```\n\
    \n## 解释\n\nPython 的 `functools.partial` 让你能够为现有函数创建一个基本的包装器，以便在通常没有默认值的地方设置默认值。\n\
