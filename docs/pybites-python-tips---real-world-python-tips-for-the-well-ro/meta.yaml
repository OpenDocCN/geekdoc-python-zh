    are good, I''ve learned more with the challenges here in 3 days than I have in
    the last 2 months of watching videos and doing very basic exercises. The challenges
    aren''t easy but they do force you to code, fail, Google, read docs, Stack overflow,
    code more, learn and finally solve the problem. PyBites has been immensely helpful.

    > - Robert M


    START YOUR FREE 14 DAY TRIAL'
