    # 71. Access your virtual environment in a Jupyter Notebook


    How to work with a virtual environment (dependencies) in a Jupyter notebook:


    ```

    # in your virtual environment (assuming it''s "venv" in your current directory)

    $ pip install ipykernel


    # install a new kernel

    $ ipykernel install --user --name venv --display-name "My Project (venv)"


    $ jupyter notebook

    # in your notebook''s file browser select "My Project (venv)" from the "New" dropdown

    ```


    # Explanation


    It can be annoying to open a notebook and not being able to work with external
    modules you just pip installed in your virtual environment.


    But there is a fix: get ipykernel and install a dedicated kernel for your virtual
    environment.


    Then when you open a notebook, you can select your venv and voilà: your virtual
    env''s dependencies are now available for import.


    # Resources


    https://anbasile.github.io/posts/2017-06-25-jupyter-venv/

    https://ipython.readthedocs.io/en/stable/install/kernel_install.html'
- md: "## 72. Callable and getattr built-ins\n\nYou can use the `callable` built-in\
    \ to see if an object is callable (e.g. a function / method):\n\n```python\n>>>\
    \ import string\n>>> attrs = [attr for attr in dir(string) if not attr.startswith('_')]\n\
    >>> for a in attrs: a, callable(getattr(string, a))\n...\n('Formatter', True)\n\
    ('Template', True)\n('ascii_letters', False)\n('ascii_lowercase', False)\n('ascii_uppercase',\
    \ False)\n('capwords', True)\n('digits', False)\n...\n# why getattr?\n>>> attrs[0],\
    \ type(attrs[0])\n('Formatter', <class 'str'>)\n# oops\n>>> callable(attrs[0])\n\
    False\n# we need to give callable the actual object:\n>>> callable(getattr(string,\
    \ attrs[0]))\nTrue\n```\n\n## Explanation\n\nHere we call `dir` on the `string`\
    \ module to see all the \"public\" attributes.\n\nThen we loop over seeing if\
    \ they are \"callable\". Note that we need to use `getattr` to get the actual\
    \ object (as opposed to the `str` that `dir` returns), because `callable` receives\
    \ an object.\n\nSo there you go, now you also know about the handy `getattr` built-in.\n\
    \nFun fact: the callable function was removed in Python 3.0 but came back in Python\
    \ 3.2.\n\n## Resources\n\n- https://docs.python.org/3/library/functions.html#callable\n\
    - https://docs.python.org/3/library/functions.html#getattr\n\n## 73. Open 2 files\
    \ in parallel\n\nWho said you could only open one file at a time using the `with`\
    \ statement?\n\n```\n$ more f1.txt\na\nf\ng\ns\ns\n```\n\n```\n$ more f2.txt\n\
    a\nscseww\nsa\n23\nsaf\n```\n\n```python\n>>> with open('f1.txt') as f1, open('f2.txt')\
    \ as f2:\n...     for i, j in zip(f1, f2):\n...         print(f'{i.strip()}={j.strip()}')\n\
    ```\n\n```\na=a\nf=scseww\ng=sa\ns=23\ns=saf\n```\n\n## Explanation\n\nHere we\
    \ open two files using the `with` context manager.\n\nThen we use the `zip` built-in\
    \ to loop over them in parallel, concatenating the lines.\n\n## Resources\n\n\
    - [https://docs.python.org/3/reference/compound_stmts.html#the-with-statement](https://docs.python.org/3/reference/compound_stmts.html#the-with-statement)\n\
    - [https://www.python.org/dev/peps/pep-0343/](https://www.python.org/dev/peps/pep-0343/)\n\
    \n## 74. Strip out vowels counting replacements\n\nHere is how to replace all\
    \ vowels from a text while keeping a count of the number of replacements made:\n\
    \n```python\n>>> import re\n>>> vowels = 'aeiou'\n>>> text = \"\"\"\n... The Zen\
    \ of Python, by Tim Peters\n...\n... Beautiful is better than ugly.\n... [truncated]\n\
    ... \"\"\"\n>>> new_string, number_of_subs_made = re.subn(f'[{vowels}]', '*',\
    \ text, flags=re.I)\n>>> new_string[:10]\n'\\nTh* Z*n *'\n>>> number_of_subs_made\n\
    262\n```\n\n## Explanation\n\nPython has a robust re module.\n\nYou can use re.subn\
    \ to do regex replacing. It returns a tuple of the new (replaced) string and the\
    \ number of replacements made.\n\nThis can be a bit cryptic (what if somebody\
    \ does not know much regex?). So no shame in using a classic for to loop through\
    \ the string and manually count the replacements. This might be more readable\
    \ / intuitive.\n\nOr what do you think? Solve the exercise below and hop in the\
    \ forum to tell us ...\n\n## Resources\n\n- https://docs.python.org/3/library/re.html#re.subn\n\
    \n## Exercise\n\nIntro Bite 06. Strip out vowels and count the number of replacements\n\
    \n## 75. Freeze a portion of a function\n\nPython's functools.partial lets you\
    \ put a basic wrapper around an existing function:\n\n```python\n>>> from functools\
    \ import partial\n>>> print_no_newline = partial(print, end=', ')\n>>> for _ in\
    \ range(3): print('test')\n...\ntest\ntest\ntest\n>>> for _ in range(3): print_no_newline('test')\n\
    ...\ntest, test, test, >>>\n```\n\n## Explanation\n\nPython's functools.partial\
    \ lets you put a basic wrapper around an existing function so that you can set\
    \ a default value where there normally wouldn't be one.\n\nHere we make our own\
    \ print defaulting the end keyword to a comma (overwriting print's default of\
    \ adding a newline (\\n) to the end).\n\nSo this is a nice way to make a \"shortcut\"\
    \ if you always call a function with the same arguments.\n\n## Resources\n\n-\
    \ [https://docs.python.org/3/library/functools.html#functools.partial](https://docs.python.org/3/library/functools.html#functools.partial)\n\
    \n## Exercise\n\n- [Bite 172. Having fun with Python Partials](Bite 172. Having\
    \ fun with Python Partials)\n\n## 76. Logging debug info\n\nLog Python errors\
    \ with debug information:\n\n```python\n>>> import logging\n>>> try:\n...    \
    \ 1/0\n... except ZeroDivisionError:\n...     logging.exception(\"message\")\n\
    ...\nERROR:root:message\nTraceback (most recent call last):\n  File \"<stdin>\"\
    , line 2, in <module>\nZeroDivisionError: division by zero\n```\n\n## Explanation\n\
    \n`logging.exception` will output a stack trace alongside the error message you\
    \ specify.\n\nNote that this method should only be called from an exception handler\
    \ to get relevant output.\n\n## Resources\n\n- https://docs.python.org/3/library/logging.html#logging.Logger.exception\n\
    - https://stackoverflow.com/a/5191885\n\n## 77. Use `__all__` for encapsulation\n\
    \nLimit module imports with `__all__`:\n\n```\n$ more mod.py\n__all__ = ['a',\
    \ 'b']\n\ndef a():\n    pass\n\ndef b():\n    pass\n\ndef c():\n    pass\n\n$\
    \ python\n>>> from mod import *\n>>>\n>>> a()\n>>> b()\n>>> c()\nTraceback (most\
    \ recent call last):\n  File \"<stdin>\", line 1, in <module>\nNameError: name\
    \ 'c' is not defined\n```\n\n## Explanation\n\nIt's considered bad practice to\
    \ use `from module import *` to import everything into the current namespace,\
    \ don't do that.\n\nOf course you cannot prevent somebody else from doing this\
    \ though. So as a package author you can be proactive about this and use `__all__`\
    \ to list just the modules you allow to be imported.\n\n## Resources\n\n- https://docs.python.org/3/tutorial/modules.html#importing-from-a-package\n\
    \n## 78. Integer caching\n\nPython curiosity: integers in the range -5...256 are\
    \ cached:\n\n```python\n>>> a = [5, 200, 256, 257, 300, 500]\n>>> b = [5, 200,\
    \ 256, 257, 300, 500]\n>>> for i, j in zip(a, b):\n...     print(i, j, i is j)\n\
    ...\n5 5 True\n200 200 True\n256 256 True\n257 257 False\n300 300 False\n500 500\
    \ False\n```\n\n## Explanation\n\nis checks whether 2 things are the same object.\
    \ As per the Integer Objects docs:\n\n> \"The current implementation keeps an\
    \ array of integer objects for all integers between -5 and\n256, when you create\
    \ an int in that range you actually just get back a reference to the existing\n\
    object.\"\n\nThat's the reason that 256 `is` 256 but not so for bigger integers.\n\
    \n## Resources\n\n- https://docs.python.org/3/c-api/long.html\n- https://wsvincent.com/python-wat-integer-cache/\n\
    \n## 79. Round to the next 1000\n\nThe `round` built-in can round before the decimal\
    \ point as well:\n\n```python\n>>> round(28, -1)\n30\n>>> round(288, -1)\n290\n\
    >>> round(288, -2)\n300\n>>> round(2888, -3)\n3000\n```\n\n## Explanation\n\n\
    You can use `round` to round to the next 10, 100, 1000, ... using the negative\
    \ `ndigits` argument.\n\n## Resources\n\n- https://docs.python.org/3/library/functions.html#round\n\
    \n## 80. Defaultdict\n\nNo more KeyError exceptions using a collections defaultdict:\n\
    \n```python\n>>> from collections import defaultdict\n>>> from pprint import pprint\
    \ as pp\n>>> data = \"\"\"Tim,ID\n... Sara,BR\n... Thelma,CN\n... Chris,RU\n...\
    \ Fina,ID\n... Juliana,SE\n... Roberto,CN\n... Mario,PL\n... Paul,CN\"\"\"\n>>>\
    \ countries = defaultdict(list)\n>>> for line in data.splitlines():\n...     name,\
    \ country_code = line.split(',')\n...     countries[country_code].append(name)\n\
    ...\n>>> pp(countries)\ndefaultdict(<class 'list'>,\n            {'BR': ['Sara'],\n\
    \             'CN': ['Thelma', 'Roberto', 'Paul'],\n             'ID': ['Tim',\
    \ 'Fina'],\n             'PL': ['Mario'],\n             'RU': ['Chris'],\n   \
    \          'SE': ['Juliana']})\n```\n\n## Explanation\n\nIf you're always checking\
    \ if a key is already in a dictionary before adding a value, use defaultdict which\
    \ makes sure the key is in the dict before adding values.\n\nHow it works: you\
    \ give defaultdict its default_factory argument, in this case a list.\n\nWhen\
    \ a new key gets inserted into the dictionary it creates a default value for the\
    \ given key (in our example a list), then it inserts the actual value.\n\n## Resources\n\
    \n- https://docs.python.org/3/library/collections.html#collections.defaultdict\n\
    \n## 81. Parametrization of tests\n\nThe pytest.mark.parametrize decorator enables\
    \ parametrization of arguments for a test function:\n\n```python\n@pytest.mark.parametrize(\"\
    day, expected\", [\n    ('Monday', 'Go train Chest+biceps'),\n    ('monday', 'Go\
    \ train Chest+biceps'),\n    ('Tuesday', 'Go train Back+triceps'),\n    ('TuEsday',\
    \ 'Go train Back+triceps'),\n    ('Wednesday', 'Go train Core'),\n    ('wednesdaY',\
    \ 'Go train Core'),\n    ('Thursday', 'Go train Legs'),\n    ('Friday', 'Go train\
    \ Shoulders'),\n    ('Saturday', CHILL_OUT),\n    ('Sunday', CHILL_OUT),\n   \
    \ ('sundaY', CHILL_OUT),\n    ('nonsense', INVALID_DAY),\n    ('monday2', INVALID_DAY),\n\
    ])\ndef test_get_workout_valid_case_insensitive_dict_lookups(day, expected):\n\
    \    assert get_workout_motd(day) == expected\n```\n\n## Explanation\n\npytest.mark.parametrize\
    \ prevents you from writing repeated assert statements in your tests, which leads\
    \ to less redundant and DRY (\"don't repeat yourself\") code.\n\nSide benefits:\
    \ it runs the test for each (day, expected) parameter tuple (= more green dots).\n\
    \nDefining the parameters in a list also makes it easier to abstract and re-use\
    \ them in other tests.\n\n## Resources\n\n- https://docs.pytest.org/en/stable/parametrize.html\n\
    - https://pybit.es/pytest-coding-100-tests.html\n\n## Exercise\n\n- [Bite 239.\
    \ Test FizzBuzz](https://pybit.es/pytest-coding-100-tests.html)"
