  md: '# 23. Reverse a list


    Different ways to reverse a list in Python:


    ```

    >>> numbers = [1, 2, 3, 4, 5]

    # in-place

    >>> numbers.reverse()

    >>> numbers

    [5, 4, 3, 2, 1]

    >>> list(reversed(numbers))

