    ''brown'': 400,

    ''black'': 600, ''paneled'': 800, ''red'': 1000}

    ```


    # Explanation


    Here we see the power of comprehensions which allow us to loop through the `dict`''s
    (key, value) pairs using `items()`, swapping them in the "expression" part of
    the comprehension.


    We just love Python :)


