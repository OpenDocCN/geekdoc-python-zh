    # # 68. Match files with Path.glob


    Use `Path.glob` to list matching files in a directory (structure):


    ```

    >>> from pathlib import Path



    # get python files in current directory

    >>> for file_path in Path(''.'').glob(''*.py''): print(file_path)



    # get python files one level deep

    >>> for file_path in Path(''.'').glob(''*/*.py''): print(file_path)



    # get python files recursively (might be slow!)

    >>> for file_path in Path(''.'').glob(''**/*.py''): print(file_path)

    ```


    # ## Explanation


    Previously we used the `glob` module for this tip, but using `pathlib` it returns
    `pathlib.PosixPath` instead of `str` objects, which are way easier (Pythonic?)
    to manipulate as per the Path interface.


    Note that using the `**` pattern makes it recursive which can significantly slow
    down the operation on large directory trees.


    # ## Resources


    [https://docs.python.org/3/library/pathlib.html#pathlib.Path.glob](https://docs.python.org/3/library/pathlib.html#pathlib.Path.glob)


    # ## Exercise


    [Bite 116. List and filter files in a directory](Bite 116. List and filter files
    in a directory)'
