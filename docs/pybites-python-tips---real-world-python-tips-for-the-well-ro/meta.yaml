  md: '# 100. What week of the year is it?


    If you want the week of the year, call isocalendar on a date object:


    ```

    python

    >>> from datetime import date

    >>> date.today().isocalendar()[1]

    30

    >>> date(2020, 1, 3).isocalendar()[1]

    1

    >>> date(2020, 12, 25).isocalendar()[1]

    52


    # get a range of remaining weeks:

    >>> start_week = date.today().isocalendar()[1]

    >>> start_week

    45

    >>> weeks = range(start_week, 53)

    >>> list(weeks)

    [45, 46, 47, 48, 49, 50, 51, 52]


    ```


    # Explanation


    datetime.date.isocalendar returns a named tuple object with three components:
    year, week and weekday. Here we just want the week so we grab the second item
    ([1]).


    In the second snippet we use this with range to get the remaining weeks of this
    year.


    # Resources


    https://docs.python.org/3/library/datetime.html#datetime.date.isocalendar'
