    # # 43. Itertools.count


    Python''s `itertools` makes it easy to make a sequence starting a number:


    ```

    >>> import itertools

    >>> seq = itertools.count(11)

    >>> next(seq)

    11

    >>> next(seq)

    12


    # with step

    >>> seq = itertools.count(6, step=3)

    >>> for _ in range(3):

    ...     next(seq)

    ...

    6

    9

    12


    >>> seq = itertools.count(3.75, step=0.25)

    >>> for _ in range(3):

    ...     next(seq)

    ...

    3.75

    4.0

    4.25

    ```


    # ## Explanation


    The functions in the `itertools` module create iterators for efficient looping.
    Learn and embrace them, they can save you a lot of work.


    Here we make an infinite counter starting at 11. You can give it a step and it
    also works with `floats`.


    By the way, the `_` in the `for` loop is a "throwaway" variable (we won''t need/
    use it).


    # ## Resources


    [https://docs.python.org/3.8/library/itertools.html#itertools.count](https://docs.python.org/3.8/library/itertools.html#itertools.count)'
