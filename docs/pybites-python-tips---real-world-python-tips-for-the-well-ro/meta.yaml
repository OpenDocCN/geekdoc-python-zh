  md: '# 3. Create a dictionary using zip


    Create a `dict` of two sequences using the `zip` builtin:


    ```

    >>> names = ''bob julian tim sara''.split()

    >>> ages = ''11 22 33 44''.split()

    >>> zip(names, ages)

    <zip object at 0x7fae75920d20>

    >>> list(zip(names, ages))

    [(''bob'', ''11''), (''julian'', ''22''), (''tim'', ''33''), (''sara'', ''44'')]

    >>> dict(zip(names, ages))

    {''bob'': ''11'', ''julian'': ''22'', ''tim'': ''33'', ''sara'': ''44''}

    ```


    # Explanation


    The `dict` constructor can receive a list of tuples.


    Here we use `zip` to combine names and ages. This builtin creates an iterator
    intertwining two or more sequences ("iterables").


    By feeding this into `dict` we get a dictionary back where the first elements
    of each tuple pair are the keys and the second elements are the values.


    It only works with 2 element tuples, giving it 3 you''d get a `ValueError: dictionary
    update sequence element #0 has length 3; 2 is required.`


    # Resources


    [https://stackoverflow.com/a/209854](https://stackoverflow.com/a/209854)'
