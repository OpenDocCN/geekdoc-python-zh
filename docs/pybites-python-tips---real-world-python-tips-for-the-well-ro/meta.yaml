  md: '# 62. Splitting by newline


    Using `split("\n")` to split a text into lines can return odd results if you are
    on Windows or an (older) Apple computer which use `\r\n` and `\r` for newlines
    respectively. In those instances `splitlines` has you covered:


    ```

    >>> "first line\r\nsecond line".split("\n")

    [''first line\r'', ''second line'']



    # includes \r (Carriage Return) in the splitting

    >>> "first line\r\nsecond line".splitlines()

    [''first line'', ''second line'']


    >>> "first line\rsecond line".splitlines()

    [''first line'', ''second line'']


    >>> "first line\nsecond line".splitlines()

    [''first line'', ''second line'']

    ```


    # Explanation


    You are probably wont hit this but it''s good to know about what Python''s glossary
    defines as "universal newlines":


    +   - the Unix end-of-line convention = `\n`,

    - the Windows convention = `\r\n`,

    - and the old Macintosh convention = `\r`


    `splitlines` accounts for all 3 scenarios and some more.


    # Resources


    https://docs.python.org/3/library/stdtypes.html#str.splitlines

    https://docs.python.org/3/glossary.html'
