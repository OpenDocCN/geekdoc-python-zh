- md: "## 82. Mocking out web services\n\nHere we mock out tweepy.API’s get_status\
    \ API call, swapping it with our own test data:\n\n```\nfrom unittest.mock import\
    \ patch\n\n...\n\nclass WhoTweetedTestCase(unittest.TestCase):\n\n    @patch.object(tweepy.API,\
    \ 'get_status', return_value=get_tweet('AU'))\n    def test_julian(self, mock_method):\n\
    \        ...\n\n    @patch.object(tweepy.API, 'get_status', return_value=get_tweet('ES'))\n\
    \    def test_bob(self, mock_method):\n        ...\n```\n\n### Explanation\n\n\
    The idea of mocking is to prevent real access to something, in this case an external\
    \ API, because it creates a dependency and slows down the tests.\n\nThe example\
    \ code imitates tweepy.API’s get_status method which would make a call to the\
    \ Twitter API.\n\nWe use @patch.object’s return_value keyword argument to load\
    \ in alternative response data using the get_tweet helper function.\n\n### Resources\n\
    \nhttps://pybit.es/twitter-api-geodata-mocking.html\nhttps://docs.python.org/3/library/unittest.mock.html#unittest.mock.patch\n\
    \n### Exercise\n\nBite 247. Mocking a standard library function\n\n## 83. Amazon\
    \ affiliation url\n\nCreate an affiliation link from an Amazon URL on our clipboard\
    \ pasting it back to the clipboard:\n\n```\n>>> import os\n>>> import re\n>>>\
    \ import pyperclip\n>>> def gen_affiliation_link(url):\n...     if not re.search(r\"\
    amazon.*/dp/\", url):\n...         raise ValueError(f\"{url} is not a valid Amazon\
    \ product link\")\n...     asin = re.sub(r\".*/dp/([^/]+).*\", r\"\\1\", url)\n\
    ...     code = os.environ.get(\"AMAZON_AFFILIATE_CODE\", \"pyb0f-20\")\n...  \
    \   return f\"http://www.amazon.com/dp/{asin}/?tag={code}\"\n...\n>>> def copy_affiliation_link():\n\
    ...     url = pyperclip.paste()\n...     link = gen_affiliation_link(url)\n...\
    \     pyperclip.copy(link)\n...\n# going to Amazon, we copy this link to our clipboard:\n\
    # https://www.amazon.com/Pragmatic-Programmer-journey-mastery-Anniversary\n# /dp/0135957052/ref=sr_1_1?dchild=1&keywords=pragmatic+programmer&sr=8-1\n\
    # then we call\n>>> copy_affiliation_link()\n# which sends this generated affiliation\
    \ URL back to our clipboard:\n# http://www.amazon.com/dp/0135957052/?tag=pyb0f-20\n\
    ```\n\n### Explanation\n\nThe pyperclip module is a cross-platform Python module\
    \ for copy and paste clipboard functions. Here we use it to convert an Amazon\
    \ book URL, sitting on the OS clipboard, to an affiliation link, copying it back\
    \ to the clipboard.\n\nNote that we broke out the `gen_affiliation_link` helper\
    \ to make it easier to test this code.\n\nThe `.*/dp/([^/]+).*` regex means: \"\
    \ match all up until and including `/dp/`, then capture (using `()`) as many characters\
    \ that are not equal `/`. The `\\1` in `re.sub` references this captured match\
    \ which is the asin number (= \"0135957052\" here).\n\n### Resources\n\nhttps://pypi.org/project/pyperclip/\n\
    https://docs.python.org/3/library/re.html#re.sub\n\n## 84. Working around invalid\
    \ JSON\n\nJSONDecodeErrors can be annoying, but look at what the ast module offers\
    \ us:\n\n```\n>>> import ast\n>>> import json\n>>> a = \"{'person': u'Julian',\
    \ 'token': u'abc123'}\"\n>>> type(a)\n<class 'str'>\n>>> json.loads(a)\n...\n\
    json.decoder.JSONDecodeError: Expecting property name enclosed in double quotes:\
    \ line 1 column 2 (char 1)\n>>> ast.literal_eval(a)\n{'person': 'Julian', 'token':\
    \ 'abc123'}\n>>> b = ast.literal_eval(a)\n>>> type(b)\n<class 'dict'>\n>>> b['token']\n\
    'abc123'\n```\n\n### also used in\n\nhttps://github.com/plone/plone.schema/blob/master/plone/schema/jsonfield.py\n\
    \n```\nclass JSONField(Field):\n    ...\n    def fromUnicode(self, value):\n \
    \       ...\n        try:\n            v = json.loads(value)\n        except JSONDecodeError:\n\
    \            v = ast.literal_eval(value)\n```\n\n### Explanation\n\nIf `json.loads`\
    \ complains about invalid JSON, you can try to convert your string to a `dict`\
    \ using `ast.literal_eval` which \"safely evaluates an expression node or a string\
    \ containing a Python literal or container display\".\n\n### Resources\n\nhttps://docs.python.org/3/library/ast.html#ast.literal_eval\n\
    https://github.com/plone/plone.schema/blob/master/plone/schema/jsonfield.py\n\n\
    ## 85. Parsing dates\n\nThe dateutil module has wonderful support for converting\
    \ date strings into datetime objects:\n\n```\n>>> from datetime import datetime\n\
    >>> from dateutil.parser import parse\n>>> logline = \"INFO 2014-07-03T23:31:22\
    \ supybot Killing Driver objects.\"\n>>> date = logline.split()[1]\n>>> date\n\
    '2014-07-03T23:31:22'\n>>> datetime.strptime(date, '%Y-%m-%dT%H:%M:%S')\ndatetime.datetime(2014,\
    \ 7, 3, 23, 31, 22)\n>>> parse(date)\ndatetime.datetime(2014, 7, 3, 23, 31, 22)\n\
    ```\n\n### Explanation\n\nIt can be hard to remember the right \"format code\"\
    \ to feed to datetime.strptime.\n\nLuckily though dateutil (external library)\
    \ makes this much easier.\n\nFun fact: we learned about this technique through\
    \ one of our Bite forums, so make sure you check those out on our platform!\n\n\
    ### Resources\n\nhttps://dateutil.readthedocs.io/en/stable/parser.html\nhttps://docs.python.org/3/library/datetime.html#strftime-strptime-behavior\n\
    \n### Exercise\n\nBite 7. Parsing dates from logs\n\n## 86. When to use a deque\
    \ over a list\n\nA collections.deque is a list-like container with fast appends\
    \ and pops on either end:\n\n```\n>>> from collections import deque\n>>> import\
    \ random\n>>> from timeit import timeit\n\n>>> lst = list(range(10_000_000))\n\
    >>> deq = deque(range(10_000_000))\n\n>>> def insert_and_delete(ds):\n...    \
    \ for _ in range(10):\n...         index = random.choice(range(100))\n...    \
    \     ds.remove(index)\n...         ds.insert(index, index)\n\n# wow\n>>> timeit(\"\
    insert_and_delete(lst)\", \"from __main__ import insert_and_delete, lst\", number=10)\n\
    1.6085020060000375\n>>> timeit(\"insert_and_delete(deq)\", \"from __main__ import\
    \ insert_and_delete, deq\", number=10)\n0.00024063900002602168\n```\n\n### Explanation\n\
    \nIn any programming language it's important that you know the right data structure\
    \ for the job.\n\ndeques can come in handy depending the list operations. As per\
    \ the docs: \"deques are a generalization of stacks and queues (the name is pronounced\
    \ \"deck\" and is short for \"double-ended queue\"). Deques support thread-safe,\
    \ memory efficient appends and pops from either side of the deque with approximately\
    \ the same O(1) performance in either direction.\"\n\nIn the example above we\
    \ see how this can seriously improve the performance of your code!\n\n### Resources\n\
    \nhttps://docs.python.org/3/library/collections.html#collections.deque\n\n###\
    \ Exercise\n\nBite 45. Keep a queue of last n items\n\n## 87. Fetch attributes\
    \ from an object\n\nThe operator.attrgetter class lets you fetch one or more attributes:\n\
    \n```\n>>> from operator import attrgetter\n>>> class Person:\n...     def __init__(self,\
    \ name, age, profession):\n...         self.name = name\n...         self.age\
    \ = age\n...         self.profession = profession\n>>> jane = Person(\"Jane Goodall\"\
    , 86, \"primatologist\")\n>>> attrgetter('name')(jane)\n'Jane Goodall'\n# get\
    \ multiple attributes\n>>> ag = attrgetter('name', 'age', 'profession')\n>>> ag(jane)\n\
    ('Jane Goodall', 86, 'primatologist')\n# only works for valid attributes\n>>>\
    \ attrgetter('name2')(jane)\nTraceback (most recent call last):\n  File \"<stdin>\"\
    , line 1, in <module>\nAttributeError: 'Person' object has no attribute 'name2'\n\
    ```\n\n### Explanation\n\nAs per the docs operator.attrgetter returns a callable\
    \ object that fetches attr from its operand. If more than one attribute is requested,\
    \ it returns a tuple of attributes.\n\nSo here we fetch one attribute from the\
    \ jane instance first, following by all 3 in one go.\n\n### Resources\n\nhttps://docs.python.org/3/library/operator.html#operator.attrgetter\n\
    \n### Exercise\n\nBite 135. Sort a list of book objects\n\n## 88. Adding a __str__\
    \ aids in debugging\n\nAlways add a __str__ method to your Django models (and\
    \ Python classes for that matter):\n\n```\npython\n# no __str__ method\nclass\
    \ Book(models.Model):\n    bookid = models.CharField(max_length=20)  # google\
    \ bookid\n    title = models.CharField(max_length=200)\n    ...\n\n$ python manage.py\
    \ shell\n>>> from books.models import Book\n>>> Book.objects.count()\n2\n>>> Book.objects.last()\n\
    <Book: Book object (2)>\n\n# with __str__ method\nclass Book(models.Model):\n\
    \    bookid = models.CharField(max_length=20)  # google bookid\n    title = models.CharField(max_length=200)\n\
    \    ...\n\n    def __str__(self):\n        return f'{self.id} {self.bookid} {self.title}'\n\
    \n$ python manage.py shell\n>>> from books.models import import Book\n>>> Book.objects.last()\n\
    <Book: 2 1ZxxDwAAQBAJ Think & Grow Rich>\n>>> Book.objects.first()\n<Book: 1 1KuwDwAAQBAJ\
    \ The Coaching Habit>\n```\n\n### Explanation\n\nAs you can see in the code above\
    \ adding a __str__ (dunder) method makes it easier to inspect objects in the Django\
    \ shell or when debugging your code in general.\n\n### Resources\n\nhttps://stackoverflow.com/a/56339054\n\
    https://dbader.org/blog/python-dunder-methods"
  mdcn: "## 82. 模拟Web服务\n\n在这里，我们模拟了`tweepy.API`的`get_status` API调用，用我们自己的测试数据替换它：\n\
