  md: '# # PyBites Workshop


    Are you currently using Python and looking for more fulfillment in your job?


    Are you looking for a higher paying job where you''ll have the flexibility to
    work anywhere?


    Do you feel overwhelmed by the amount of things you have to know as a developer?


    This is more common than you might realize. We''ve been there and have learned
    a thing or two being successful software developers ourselves.


    We can help you get there.


    Check out our free PyBites Developer Workshop and learn:


    +   - The common tech industry pitfalls that can seriously hold you back.

    - What imposter syndrome is and how it can cripple you from getting out there,
    sharing your code and contributing to open source.

    - How Python is only a relatively small part of the whole picture and that the
    other career accelerators are less obvious than you might think...


    You can watch it here: [https://pybit.es/workshop](https://pybit.es/workshop)'
