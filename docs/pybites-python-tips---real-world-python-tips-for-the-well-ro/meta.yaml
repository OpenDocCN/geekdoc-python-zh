  md: '# 2. Split a string into a list


    An easy way to make a list in Python is to use the `str.split` method on a string
    which splits on space by default:


    ```

    >>> names = ''bob julian tim sara''.split()

    >>> names

    [''bob'', ''julian'', ''tim'', ''sara'']

    ```


    # Explanation


    Of course nothing wrong creating a list like `[''bob'', ''julian'', ''tim'', ''sara'']`,
    but it can be convenient using the `split` on a string.


    This only works though if the elements don''t have spaces in them, so if we''d
    include surnames here, you''d have to create the list like this: `[''bob belderbos'',
    ''julian sequelra'', ''tim ferriss'', ''sara blakely'']`.


    # Resources


    https://docs.python.org/3/library/stdtypes.html#str.split'
