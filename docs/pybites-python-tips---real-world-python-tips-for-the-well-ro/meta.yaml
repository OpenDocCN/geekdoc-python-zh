    green  # 命令行变量优先\n```\n\n### 解释\n\n`ChainMap` 将多个 `dicts` 或其他映射组合在一起，创建一个单一的、可更新的视图。\n\
    \n在这个摘自文档的示例中，`ChainMap` 允许我们建立一个优先级链：用户指定的命令行参数优先于环境变量，而环境变量又优先于默认值。\n\n### 资源\n\
