  md: '# 7. Enumerate


    If you need the index inside a loop in Python use `enumerate`:


    ```

    >>> names = ''bob julian tim sara''.split()

    >>> for i, name in enumerate(names, start=1):

    ...     print(i, name)

    ...

    1 bob

    2 julian

    3 tim

    4 sara

    ```


    # Explanation


    Wrapping `enumerate` around an iterator you get a counter for free.


    By default it starts at 0, but you can change that using the optional `start`
    keyword arg.


    # Resources


    [https://docs.python.org/3/library/functions.html#enumerate](https://docs.python.org/3/library/functions.html#enumerate)


