  - '[PAGE 61]


    # 50. Object representations


    What is the difference between __str__ and __repr__ in Python?


    ```

    >>> from datetime import date

    >>> today = date.today()

    >>> str(today)

    ''2020-10-31''

    >>> repr(today)

    ''datetime.date(2020, 10, 31)''

    ```


    # Explanation


    In short, the goal of __repr__ is to be unambiguous and __str__ is to be readable.

    Or as Ned Batchelder succinctly said: "__repr__ is for developers, __str__ is
    for customers."

    As we can see above, the datetime module follows this advice nicely.


    # Resources


    [https://stackoverflow.com/a/1438297](https://stackoverflow.com/a/1438297)


    # Exercise


    [Bite 167. Complete a User class: properties and representation dunder methods](https://pybites.com/bites/167/)'
  - '[PAGE 62]


    # 51. Keep a list ordered upon insert


    Want to efficiently insert items into a list in sorted order? Use Python''s bisect
    module:


    ```

    >>> from bisect import insort


    >>> items = [3, 5, 7]


    >>> insort(items, 6)

    >>> items

    [3, 5, 6, 7]


    >>> insort(items, 4)

    >>> items

    [3, 4, 5, 6, 7]


    >>> insort(items, 9)

    >>> items

    [3, 4, 5, 6, 7, 9]


    >>> insort(items, 20)

    >>> items

    [3, 4, 5, 6, 7, 9, 20]


    >>> insort(items, 15)

    >>> items

    [3, 4, 5, 6, 7, 9, 15, 20]

    ```


    # Explanation


    The bisect module provides functions to support maintaining order upon insert.


    As per the docs this can improve performance for long lists of items with expensive
    comparison operations (e.g. repeatedly sorting a list).


    # Resources


    [https://docs.python.org/3/library/bisect.html#bisect.insort](https://docs.python.org/3/library/bisect.html#bisect.insort)


    # Exercise


    [Bite 181. Keep a list sorted upon insert](Bite 181. Keep a list sorted upon insert)'
  - '[PAGE 63]


    # 52. Inspect objects with the vars built-in


    In Python you can use the `vars` built-in to easily access an object''s attributes:


    ```

    # script.py

    import argparse


    parser = argparse.ArgumentParser(description=''A simple calculator'')

    parser.add_argument(''-a'', ''--add'', nargs=''+'', help="Sums numbers")

    parser.add_argument(''-s'', ''--sub'', nargs=''+'', help="Subtracts numbers")

    parser.add_argument(''-m'', ''--mul'', nargs=''+'', help="Multiplies numbers")

    parser.add_argument(''-d'', ''--div'', nargs=''+'', help="Divides numbers")


    args = parser.parse_args()


    # drop in the debugger

    breakpoint()


    $ python script.py -a 1 -s 2 -m 3 -d 4


    (Pdb) args

    (Pdb) vars(args)

    {''add'': [''1''], ''sub'': [''2''], ''mul'': [''3''], ''div'': [''4'']}

    ```


    # Explanation


    Here we add some command line arguments to a script and set a breakpoint.


    Then we run the script and by default args does not show anything, hm ...


    However `args` is an object and reading up on `vars` we see that without arguments,
    it''s equivalent to `locals()` and with an argument, it''s equivalent to `object.__dict__`.


    So using `vars` on the object we can inspect the internal attribute dictionary.


    # Resources


    https://docs.python.org/3/library/functions.html#vars

    https://www.peterbe.com/plog/vars-argparse-namespace-into-a-function'
