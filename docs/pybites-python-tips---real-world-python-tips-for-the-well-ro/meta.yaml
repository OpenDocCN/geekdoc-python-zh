  md: '# # 94. Itertools.groupby


    Group car data by manufacturer using itertools.groupby:


    ```

    python

    >>> from itertools import groupby

    >>> from operator import itemgetter

    >>> cars = [

    ...     (''Toyota'', ''Avalon''), (''Ford'', ''Bronco''),

    ...     (''Chevrolet'', ''Cavalier''), (''Chevrolet'', ''Corvette''),

    ...     (''Volkswagen'', ''GTI''), (''Toyota'', ''Highlander''),

    ...     (''Chevrolet'', ''Impala''), (''Nissan'', ''Maxima''),

    ...     (''Ford'', ''Mustang''), (''Kia'', ''Optima''),

    ...     (''Volkswagen'', ''Passat''), (''Nissan'', ''Pathfinder''),

    ...     (''Ford'', ''Taurus''), (''Nissan'', ''Titan''),

    ... ]

    >>> cars.sort()  # required

    >>> for manufacturer, models in groupby(cars, key=itemgetter(0)):

    ...     print(f''* {manufacturer}'')

    ...     print(", ".join(model[1] for model in models))

    ...

    * Chevrolet

    Cavalier, Corvette, Impala

    * Ford

    Bronco, Mustang, Taurus

    ...

    * Volkswagen

    GTI, Passat


    ```


    # # Explanation


    Here we have a cars list of (manufacturer, model) tuples and we want to group
    the models by manufacturer.


    We can use itertools.groupby which takes an iterable (cars) and a key (function)
    to group the items by. Here we use itemgetter as key which is a callable that
    gets the first item of each tuple (manufacturer) as the grouping key.


    The only requirement for this to work is that the data is sorted, hence the cars.sort()
    call which sorts the cars in-place.


    # # Resources


    https://docs.python.org/3/library/itertools.html#itertools.groupby


    https://docs.python.org/3/library/operator.html#operator.itemgetter'
