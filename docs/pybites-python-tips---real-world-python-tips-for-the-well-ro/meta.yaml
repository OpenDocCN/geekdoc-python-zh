  md: '# 65. Get multiple items from a sequence


    Another standard library gem: `operator.itemgetter` lets you grab multiple items
    from a `list`, `dict`, etc:


    ```

    >>> from operator import itemgetter


    >>> days = [''mon'', ''tue'', ''wed'', ''thurs'', ''fri'', ''sat'', ''sun'']

    >>> f = itemgetter(3, 6)

    >>> f(days)

    (''thurs'', ''sun'')


    # same as:

    >>> days.__getitem__(3), days.__getitem__(6)

    (''thurs'', ''sun'')


    # works with strings too:

    >>> f("hello world")

    (''l'', ''w'')


    # using with dict keys and in one go:

    >>> workouts

    {''mon'': ''chest+biceps'', ''tue'': ''legs'', ''wed'': ''cardio'', ''thurs'':
    ''back+triceps'', ''fri'': ''legs'', ''sat'': ''rest'', ''sun'': ''rest''}

    >>> itemgetter(''mon'', ''tue'')(workouts)

    (''chest+biceps'', ''legs'')

    ```


    # Explanation


    Slicing gets you consecutive items, but what if you want to get non-consecutive
    items?


    Enter `itemgetter` which lets you specify multiple lookup indices as shown above.


    `itemgetter` is also a nice alternative for `lambda` when sorting. For example,
    to sort by the second item of each tuple in a list (say `inventory = [(''apple'',
    3), (''banana'', 2), ...]`), you can do: `sorted(inventory, key=itemgetter(1))`.


    # Resources


    https://docs.python.org/3/library/operator.html#operator.itemgetter'
