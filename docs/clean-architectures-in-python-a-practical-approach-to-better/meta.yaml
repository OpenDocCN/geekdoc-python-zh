    \ 200,\n    ResponseTypes.RESOURCE_ERROR: 404,\n    ResponseTypes.PARAMETERS_ERROR:\
    \ 400,\n    ResponseTypes.SYSTEM_ERROR: 500,\n}\n\nrooms = [\n    {\n        \"\
    code\": \"f853578c-fc0f-4e65-81b8-566c5dffa35a\",\n        \"size\": 215,\n  \
    \      \"price\": 39,\n        \"longitude\": -0.09998975,\n        \"latitude\"\
    : 51.75436293,\n    },\n    {\n        \"code\": \"fe2c3195-aeff-487a-a08f-e0bdc0ec6e9a\"\
    ,\n        \"size\": 405,\n        \"price\": 66,\n        \"longitude\": 0.18228006,\n\
    \        \"latitude\": 51.74640997,\n    },\n    {\n        \"code\": \"913694c6-435a-4366-ba0d-da5334a611b2\"\
    ,\n        \"size\": 56,\n        \"price\": 60,\n        \"longitude\": 0.27891577,\n\
    \        \"latitude\": 51.45994069,\n    },\n    {\n        \"code\": \"eed76e77-55c1-41ce-985d-ca49bf6c0585\"\
    ,\n        \"size\": 93,\n        \"price\": 48,\n        \"longitude\": 0.33894476,\n\
    \        \"latitude\": 51.39916678,\n    },\n]\n\n\n@blueprint.route(\"/rooms\"\
    , methods=[\"GET\"])\ndef room_list():\n    qrystr_params = {\n        \"filters\"\
    : {},\n    }\n\n    for arg, values in request.args.items():\n        if arg.startswith(\"\
    filter_\"):\n            qrystr_params[\"filters\"][arg.replace(\"filter_\", \"\
    \")] = values\n\n    request_object = build_room_list_request(\n        filters=qrystr_params[\"\
    filters\"]\n    )\n\n    repo = MemRepo(rooms)\n    response = room_list_use_case(repo,\
    \ request_object)\n\n    return Response(\n        json.dumps(response.value,\
    \ cls=RoomJsonEncoder),\n        mimetype=\"application/json\",\n        status=STATUS_CODES[response.type],\n\
    \    )\n```\n\nPlease note that I'm using a variable named request_object here\
    \ to avoid clashing with the fixture request provided by pytest-flask. While request\
    \ contains the HTTP request sent to the web framework by the browser, request_object\
    \ is the request we send to the use case.\n\n**Source code**\nhttps://github.com/pycabook/rentomatic/tree/ed2-c05-s07\n\
    \n### The repository\n\nIf we run the Flask development webserver now and try\
    \ to access the endpoint /rooms, we will get a nice response that says\n\n```json\n\
    {\"type\": \"SystemError\", \"message\": \"TypeError: list() got an unexpected\
    \ keyword argument 'filters'\"}\n```\n\nand if you look at the HTTP response[^footnote_fr-1174836_1]\
    \ you can see an HTTP 500 error, which is exactly the mapping of our SystemError\
    \ use case error, which in turn signals a Python exception, which is in the message\
    \ part of the error.\n\nThis error comes from the repository, which has not been\
    \ migrated to the new API. We need then to change the method list of the class\
