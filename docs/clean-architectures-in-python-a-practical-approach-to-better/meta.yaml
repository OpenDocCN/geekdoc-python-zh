  md: 'system collapsing. The main point of the clean architecture is to make clear
    “what is where and why”, and this should be your first concern while you design
    and implement a software system, whatever architecture or development methodology
    you want to follow.


    The clean architecture is not the perfect architecture and cannot be applied unthinkingly.
    Like any other solution, it addresses a set of problems and tries to solve them,
    but there is no panacea that will solve all issues. As already stated, it’s better
    to understand how the clean architecture solves some problems and decide if the
    solution suits your need.


    # Why “architectures”?


    While I was writing the first edition of the book it became clear to me that the
    goal of this book is to begin a journey and not to define the specific steps through
    which each software designer has to go through. The concepts explained here are
    rooted in some design principles that are much more important than the resulting
    physical structure of the system that you will create.


    This is why I wanted to stress that what I show in this book can (and hopefully
    will) be an inspiration for many different architectures that you will create
    to solve the problems you will have to face.


    Or maybe I just wanted to avoid looking like a clone of Robert Martin.


    # Why Python?


    I have been working with Python for 20 years, along with other languages, but
    I came to love its simplicity and power and so I ended up using it on many projects.
    When I was first introduced to the clean architecture I was working on a Python
    application that was meant to glue together the steps of a processing chain for
    satellite imagery, so my journey with the concepts I will explain started with
    this language.


    I will therefore speak of Python in this book, but the main concepts are valid
    for any other language, especially object-oriented ones. I will not introduce
    Python here, so a minimal knowledge of the language syntax is needed to understand
    the examples and the project I will discuss.


    The clean architecture concepts are independent of the language, but the implementation
    obviously leverages what a specific language allows you to do, so this book is
    about the clean architecture and an implementation of it that I devised using
    Python. I really look forward to seeing more books about the clean architecture
    that explore other implementations in Python and in other languages.


    # Acknowledgments


    +   - Eleanor de Veras, who proofread the introduction.

    - Roberto Ciatti, who introduced me to clean architectures.'
