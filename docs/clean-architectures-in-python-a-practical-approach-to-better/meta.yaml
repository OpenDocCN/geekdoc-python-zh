  md: 'After the two introductory parts that you are reading, chapter 1 goes through
    a **10,000 feet overview** of a system designed with a clean architecture, while
    chapter 2 briefly discusses the **components** and the ideas behind this software
    architecture. Chapter 3 runs through **a concrete example** of clean architecture
    and chapter 4 expands the example adding a **web application** on top of it. Chapter
    5 discusses **error management** and improvements to the Python code developed
    in the previous chapters. Chapters 6 and 7 show how to plug **different database
    systems** to the web service created previously, and chapter 8 wraps up the example
    showing how to run the application with a **production-ready configuration**.


    # Typographic conventions


    This book uses Python, so the majority of the code samples will be in this language,
    either `inline` or in a specific code block like this


    ```

    some/path/file_name.py


    1 def example():

    2     print("This is a code block")

    ```


    Note that the path of the file that contains the code is printed just before the
    source code. Code blocks don’t include line numbers, as the part of code that
    are being discussed are usually repeated in the text. This also makes it possible
    to copy the code from the PDF directly.


    Shell commands are presented with a generic prompt $


    ```

    1 $ command --option1 value1 --option2 value 2

    ```


    which means that you will copy and execute the string starting from command.


    I will also use two different asides to link the code repository and to mark important
    principles.


    This box provides a link to the commit or the tag that contains the code that
    was presented


    > **Source code**

    https://github.com/pycabook/rentomatic/tree/master


    This box highlights a concept explained in detail in the current chapter


    > **Concept**

    This recaps an important concept that is explained in the text.'
