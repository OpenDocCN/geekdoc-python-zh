  md: "# alembic.ini\n\n```\n1 # the output encoding used when revision files\n2 #\
    \ are written from script.py.mako\n3 # output_encoding = utf-8\n4 \n5 sqlalchemy.url\
    \ = postgresql://%(POSTGRES_USER)s:%(POSTGRES_PASSWORD)s@%(POSTGRES_HOS\\n6 TNAME)s/%(APPLICATION_DB)s\n\
    7 \n8 [post_write_hooks]\n9 # post_write_hooks defines scripts or Python functions\
    \ that are run\n10 # on newly generated revision scripts.  See the documentation\
    \ for further\n11 # detail and examples\n```\n\nThe syntax %(VARNAME)s is the\
    \ basic variable interpolation used by ConfigParser (see [the documentation](https://docs.python.org/3.8/library/configparser.html#configparser.BasicInterpolation)).\n\
    \nAt this point we can run Alembic to migrate our database. In many cases, you\
    \ can rely on Alembic’s autogeneration functionality to generate the migrations,\
    \ and this is what we can do to create the initial models. The Alembic command\
    \ is `revision` with the `--autogenerate` flag, but we need to pass the environment\
    \ variables on the command line. This is clearly a job for `migrate.py` but let’s\
    \ first run it to see what happens to the database. Later we will create a better\
    \ setup to avoid passing variables manually\n\n```\n1 $ POSTGRES_USER=postgres\\\
    n2   POSTGRES_PASSWORD=postgres\\n3   POSTGRES_HOSTNAME=localhost\\n4   APPLICATION_DB=application\\\
    n5   alembic revision --autogenerate -m \"Initial\"\n```\n\nThis will generate\
    \ the file `migrations/versions/4d4c19952a36_initial.py`. Pay attention that the\
    \ initial hash will be different for you. If you want you can open that file and\
    \ see how Alembic generates the table and creates the columns.\n\nSo far we created\
    \ the migration but we still need to apply it to the database. Make sure you are\
    \ running the Docker containers (run `./manage.py compose up -d` otherwise) as\
    \ Alembic is going to connect to the database, and run"
  merge: -1
  pgno: 144
- img_proc: true
  md: "```\n$ POSTGRES_USER=postgres\\nPOSTGRES_PASSWORD=postgres\\nPOSTGRES_HOSTNAME=localhost\\\
    nAPPLICATION_DB=application\\nalembic upgrade head\n```\n\nAt this point we can\
    \ connect to the database and check the existing tables\n\n```\n$ ./manage.py\
    \ compose exec db psql -U postgres -d application\npsql (13.4 (Debian 13.4-1.pgdg100+1))\n\
    Type \"help\" for help.\n\napplication=# \\dt\n            List of relations\n\
    \ Schema |       Name       |  Type  |  Owner\n--------+------------------+--------+----------\n\
    \ public | alembic_version  | table  | postgres\n public | room             |\
    \ table  | postgres\n(2 rows)\n\napplication=#\n```\n\nPlease note that I used\
    \ the option -d of psql to connect directly to the database application. As you\
    \ can see, now we have two tables. The first, alembic_version is a simple one\
    \ that Alembic uses to keep track of the state of the db, while room is the one\
    \ that will contain our Room entities.\n\nWe can double-check the Alembic version\n\
    \n```\napplication=# select * from alembic_version;\n version_num\n--------------\n\
    \ 4d4c19952a36\n(1 row)\n```\n\nAs I mentioned before, the hash given to the migration\
    \ will be different in your case, but that value that you see in this table should\
    \ be consistent with the name of the migration script.\n\nWe can also see the\
    \ structure of the table room"
  merge: -1
  pgno: 145
- img_proc: true
  md: "```\napplication=# \\d room\nTable \"public.room\"\n Column   |           Type\
    \           | Collation | Nullable |              Default              \n-----------+--------------------------+-----------+----------+-----------------------------------\n\
    \ id        | integer                  |           | not null | nextval('room_id_seq'::regclass)\n\
    \ code      | character varying(36)    |           | not null | \n size      |\
    \ integer                  |           |          | \n price     | integer   \
    \               |           |          | \n longitude | double precision     \
    \    |           |          | \n latitude  | double precision         |      \
    \     |          | \nIndexes:\n    \"room_pkey\" PRIMARY KEY, btree (id)\n```\n\
    \nClearly, there are still no rows contained in that table\n\n```\napplication=#\
    \ select * from room;\n id | code | size | price | longitude | latitude \n----+------+------+-------+-----------+----------\n\
    (0 rows)\n```\n\nAnd indeed, if you open http://localhost:8080/rooms with your\
    \ browser you will see a successful response, but no data.\nTo see some data we\
    \ need to write something into the database. This is normally done through a form\
    \ in the web application and a specific endpoint, but for the sake of simplicity\
    \ in this case we can just add data manually to the database.\n\n```\napplication=#\
    \ INSERT INTO room(code, size, price, longitude, latitude) VALUES ('f853578c-fc0f-4e65-81b8-566c5dffa35a',\
    \ 215, 39, -0.09998975, 51.75436293);\nINSERT 0 1\n```\n\nYou can verify that\
    \ the table contains the new room with a SELECT"
  merge: -1
  pgno: 146
- img_proc: true
  md: "```\napplication=# SELECT * FROM room;\n id |                code         \
    \       | size | price | longitude  | latitude\n----+------------------------------------+------+-------+------------+-----------\n\
    \  1 | f853578c-fc0f-4e65-81b8-566c5dffa35a |  215 |    39 | -0.09998975 | 51.75436293\n\
    (1 row)\n```\n\nand open or refresh http://localhost:8080/rooms with the browser\
    \ to see the value returned by our use case.\n\n**Source code**\nhttps://github.com/pycabook/rentomatic/tree/ed2-c08-s02\n\
    \nThis chapter concludes the overview of the clean architecture example. Starting\
    \ from scratch, we created domain models, serializers, use cases, an in-memory\
    \ storage system, a command-line interface and an HTTP endpoint. We then improved\
    \ the whole system with a very generic request/response management code, that\
    \ provides robust support for errors. Last, we implemented two new storage systems,\
    \ using both a relational and a NoSQL database.\n\nThis is by no means a little\
    \ achievement. Our architecture covers a very small use case, but is robust and\
    \ fully tested. Whatever error we might find in the way we dealt with data, databases,\
    \ requests, and so on, can be isolated and tamed much faster than in a system\
    \ which doesn't have tests. Moreover, the decoupling philosophy not only allows\
    \ us to provide support for multiple storage systems, but also to quickly implement\
    \ new access protocols, or new serialisations for our objects."
  merge: -1
  pgno: 147
