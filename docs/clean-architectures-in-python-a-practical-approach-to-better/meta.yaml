    # Orchestration management


    When we run the integration tests the Postgres database engine must be already
    running in the background, and it must be already configured, for example, with
    a pristine database ready to be used. Moreover, when all the tests have been executed
    the database should be removed and the database engine stopped.


    This is a perfect job for Docker, which can run complex systems in isolation with
    minimal configuration. We have a choice here: we might want to orchestrate the
    creation and destruction of the database with an external script or try to implement
    everything in the test suite. The first solution is what many frameworks use,
    and what I explored in my series of posts [Flask Project Setup: TDD, Docker, Postgres
    and more](https://www.thedigitalcatonline.com/blog/2020/07/05/flask-project-setup-tdd-docker-postgres-and-more-part-1/),
    so in this chapter I will show an implementation of that solution.


    As I explained in the posts I mentioned the plan is to create a management script
    that spins up and tears down the required containers, runs the tests in between.
    The management script can be used also to run the application itself, or to create
    development setups, but in this case I will simplify it to manage only the tests.
    I highly recommend that you read those posts if you want to get the big picture
    behind the setup I will use.


    The first thing we have to do if we plan to use Docker Compose is to add the requirement
    to `requirements/test.txt`'
