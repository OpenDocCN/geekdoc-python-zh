- img_proc: true
  md: '![](img/15b1ab14aa279f39ae10009865354088_22_0.png)


    The business logic returns processed data to the web framework


    The web framework converts the data received from the use case into an HTTP response.
    In this case, as we are considering an endpoint that is supposed to be reached
