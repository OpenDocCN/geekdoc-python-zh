- md: "## Chapter 08 Run a production ready system\n\n> Vilos Cohaagen said troops\
    \ would be used to ensure full production.\n> Total Recall, 1990\n\nNow that we\
    \ developed a repository that connects with PostgreSQL we can discuss how to properly\
    \ set up the application to run a production-ready system. This part is not strictly\
    \ related to the clean architecture, but I think it’s worth completing the example,\
    \ showing how the system that we designed can end up being the core of a real\
    \ web application.\n\nClearly, the definition “production-ready” refers to many\
    \ different configuration that ultimately depend on the load and the business\
    \ requirements of the system. As the goal is to show a complete example and not\
    \ to cover real production requirements I will show a solution that uses real\
    \ external systems like PostgreSQL and Nginx, without being too concerned about\
    \ performances.\n\n### Build a web stack\n\nNow that we successfully containerised\
    \ the tests we might try to devise a production-ready setup of the whole application,\
    \ running both a web server and a database in Docker containers. Once again, I\
    \ will follow the approach that I show in the series of posts I mentioned in one\
    \ of the previous sections.\n\nTo run a production-ready infrastructure we need\
    \ to put a WSGI server in front of the web framework and a Web server in front\
    \ of it. We will also need to run a database container that we will initialise\
    \ only once.\n\nThe steps towards a production-ready configuration are not complicated\
    \ and the final setup won’t be ultimately too different from what we already did\
    \ for the tests. We need to\n\n- Create a JSON configuration with environment\
    \ variables suitable for production\n- Create a suitable configuration for Docker\
    \ Compose and configure the containers\n- Add commands to manage.py that allow\
    \ us to control the processes\n\nLet’s create the file config/production.json,\
    \ which is very similar to the one we created for the tests\n\n```json\n[\n  {\n\
    \    \"name\": \"FLASK_ENV\",\n    \"value\": \"production\"\n  },\n  {\n    \"\
    name\": \"FLASK_CONFIG\",\n    \"value\": \"production\"\n  },\n  {\n    \"name\"\
    : \"POSTGRES_DB\",\n    \"value\": \"postgres\"\n  },\n  {\n    \"name\": \"POSTGRES_USER\"\
    ,\n    \"value\": \"postgres\"\n  },\n  {\n    \"name\": \"POSTGRES_HOSTNAME\"\
    ,\n    \"value\": \"localhost\"\n  },\n  {\n    \"name\": \"POSTGRES_PORT\",\n\
    \    \"value\": \"5432\"\n  },\n  {\n    \"name\": \"POSTGRES_PASSWORD\",\n  \
    \  \"value\": \"postgres\"\n  },\n  {\n    \"name\": \"APPLICATION_DB\",\n   \
    \ \"value\": \"application\"\n  }\n]\n```\n\nPlease note that now both FLASK_ENV\
    \ and FLASK_CONFIG are set to production. Please remember that the first is an\
    \ internal Flask variable with two possible fixed values (development and production),\
    \ while the second one is an arbitrary name that has the final effect of loading\
    \ a specific configuration object (ProductionConfig in this case). I also changed\
    \ POSTGRES_PORT back to the default 5432 and APPLICATION_DB to application (an\
    \ arbitrary name).\n\nLet’s define which containers we want to run in our production\
    \ environment, and how we want to connect them. We need a production-ready database\
    \ and I will use Postgres, as I already did during the tests. Then we need to\
    \ wrap Flask with a production HTTP server, and for this job I will use gunicorn.\
    \ Last, we need a Web Server to act as load balancer.\n\nThe file docker/production.yml\
    \ will contain the Docker Compose configuration, according to the convention we\
    \ defined in manage.py\n\n```yaml\n# docker/production.yml\nversion: '3.8'\n\n\
    services:\n  db:\n    image: postgres\n    environment:\n      POSTGRES_DB: ${POSTGRES_DB}\n\
    \      POSTGRES_USER: ${POSTGRES_USER}\n      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}\n\
    \    ports:\n      - \"${POSTGRES_PORT}:5432\"\n    volumes:\n      - pgdata:/var/lib/postgresql/data\n\
    \  web:\n    build:\n      context: ${PWD}\n      dockerfile: docker/web/Dockerfile.production\n\
    \    environment:\n      FLASK_ENV: ${FLASK_ENV}\n      FLASK_CONFIG: ${FLASK_CONFIG}\n\
    \      APPLICATION_DB: ${APPLICATION_DB}\n      POSTGRES_USER: ${POSTGRES_USER}\n\
    \      POSTGRES_HOSTNAME: \"db\"\n      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}\n\
    \      POSTGRES_PORT: ${POSTGRES_PORT}\n    command: gunicorn -w 4 -b 0.0.0.0\
    \ wsgi:app\n    volumes:\n      - ${PWD}:/opt/code\n  nginx:\n    image: nginx\n\
    \    volumes:\n      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro\n    ports:\n\
    \      - 8080:8080\n\nvolumes:\n  pgdata:\n```\n\nAs you can see the Postgres\
    \ configuration is not different from the one we used in the file testing.yml,\
    \ but I added the option volumes (both in db and at the end of the file) that\
    \ allows me to create a stable volume. If you don't do it, the database will be\
    \ destroyed once you shut down the container.\n\nThe container web runs the Flask\
    \ application through gunicorn. The environment variables come once again from\
    \ the JSON configuration, and we need to define them because the application needs\
    \ to know how to connect with the database and how to run the web framework. The\
    \ command `gunicorn -w 4 -b 0.0.0.0 wsgi:app` loads the WSGI application we created\
    \ in wsgi.py and runs it in 4 concurrent processes. This container is created\
    \ using docker/web/Dockerfile.production which I still have to define.\n\nThe\
    \ last container is nginx, which we will use as it is directly from the Docker\
    \ Hub. The container runs Nginx with the configuration stored in /etc/nginx/nginx.conf,\
    \ which is the file we overwrite with the local one ./nginx/nginx.conf. Please\
    \ note that I configured it to use port 8080 instead of the standard port 80 for\
    \ HTTP to avoid clashing with other software that you might be running on your\
    \ computer.\n\nThe Dockerfile for the web application is the following\n\n```dockerfile\n\
    # docker/web/Dockerfile.production\nFROM python:3\n\nENV PYTHONUNBUFFERED 1\n\n\
    RUN mkdir /opt/code\nRUN mkdir /opt/requirements\nWORKDIR /opt/code\n\nADD requirements\
    \ /opt/requirements\nRUN pip install -r /opt/requirements/prod.txt\n```\n\nThis\
    \ is a very simple container that uses the standard python:3 image, where I added\
    \ the production requirements contained in requirements/prod.txt. To make the\
    \ Docker container work we need to add gunicorn to this last file\n\n```\n# requirements/prod.txt\n\
    Flask\nSQLAlchemy\npsycopg2\npymongo\ngunicorn\n```\n\nThe configuration for Nginx\
    \ is\n\n```nginx\n# docker/nginx/nginx.conf\nworker_processes 1;\n\nevents { worker_connections\
    \ 1024; }\n\nhttp {\n\n    sendfile on;\n\n    upstream app {\n        server\
    \ web:8000;\n    }\n\n    server {\n        listen 8080;\n\n        location /\
    \ {\n            proxy_pass http://app;\n            proxy_redirect off;\n   \
    \         proxy_set_header Host $host;\n            proxy_set_header X-Real-IP\
    \ $remote_addr;\n            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;\n\
    \            proxy_set_header X-Forwarded-Host $server_name;\n        }\n    }\n\
    }\n```\n\nAs for the rest of the project, this configuration is very basic and\
    \ lacks some important parts that are mandatory in a real production environment,\
    \ such as HTTPS. In its essence, though, it is however not too different from\
    \ the configuration of a production-ready Nginx container.\n\nAs we will use Docker\
    \ Compose, the script manage.py needs a simple change, which is a command that\
    \ wraps docker-compose itself. We need the script to just initialise environment\
    \ variables"
  mdcn: "## 第八章 运行生产就绪系统\n\n> 维洛斯·科哈根说，将动用军队确保全面生产。\n> 《全面回忆》，1990年\n\n既然我们已经开发了一个连接PostgreSQL的仓库，现在可以讨论如何正确设置应用程序以运行生产就绪系统。这部分内容与清洁架构没有严格关联，但我认为值得完成这个示例，展示我们设计的系统如何最终成为真实Web应用的核心。\n\
    \n显然，“生产就绪”的定义涉及许多不同的配置，这些配置最终取决于系统的负载和业务需求。由于目标是展示一个完整示例而非涵盖真实的生产需求，我将展示一个使用真实外部系统（如PostgreSQL和Nginx）的解决方案，而不必过于担心性能问题。\n\
    \n### 构建Web技术栈\n\n既然我们已经成功将测试容器化，现在可以尝试设计整个应用程序的生产就绪设置，在Docker容器中同时运行Web服务器和数据库。我将再次遵循之前在某个章节中提到的系列文章中展示的方法。\n\
    \n要运行生产就绪的基础设施，我们需要在Web框架前放置一个WSGI服务器，并在其前放置一个Web服务器。我们还需要运行一个数据库容器，该容器仅初始化一次。\n\
    \n走向生产就绪配置的步骤并不复杂，最终设置与我们已经为测试所做的不会有太大不同。我们需要：\n\n- 创建适合生产环境的环境变量JSON配置\n- 为Docker\
    \ Compose创建合适的配置并配置容器\n- 向manage.py添加允许我们控制进程的命令\n\n让我们创建文件`config/production.json`，它与我们为测试创建的文件非常相似\n\
    \n```json\n[\n  {\n    \"name\": \"FLASK_ENV\",\n    \"value\": \"production\"\
    \n  },\n  {\n    \"name\": \"FLASK_CONFIG\",\n    \"value\": \"production\"\n\
    \  },\n  {\n    \"name\": \"POSTGRES_DB\",\n    \"value\": \"postgres\"\n  },\n\
    \  {\n    \"name\": \"POSTGRES_USER\",\n    \"value\": \"postgres\"\n  },\n  {\n\
    \    \"name\": \"POSTGRES_HOSTNAME\",\n    \"value\": \"localhost\"\n  },\n  {\n\
    \    \"name\": \"POSTGRES_PORT\",\n    \"value\": \"5432\"\n  },\n  {\n    \"\
    name\": \"POSTGRES_PASSWORD\",\n    \"value\": \"postgres\"\n  },\n  {\n    \"\
    name\": \"APPLICATION_DB\",\n    \"value\": \"application\"\n  }\n]\n```\n\n请注意，现在`FLASK_ENV`和`FLASK_CONFIG`都设置为`production`。请记住，第一个是Flask的内部变量，有两个可能的固定值（`development`和`production`），而第二个是一个任意名称，其最终效果是加载特定的配置对象（本例中为`ProductionConfig`）。我还把`POSTGRES_PORT`改回了默认的`5432`，`APPLICATION_DB`改为`application`（一个任意名称）。\n\
    \n让我们定义要在生产环境中运行哪些容器，以及如何连接它们。我们需要一个生产就绪的数据库，我将使用Postgres，就像在测试期间一样。然后我们需要用一个生产HTTP服务器包装Flask，对于这项工作，我将使用gunicorn。最后，我们需要一个Web服务器作为负载均衡器。\n\
    \n文件`docker/production.yml`将包含Docker Compose配置，根据我们在`manage.py`中定义的约定\n\n```yaml\n\
    # docker/production.yml\nversion: '3.8'\n\nservices:\n  db:\n    image: postgres\n\
    \    environment:\n      POSTGRES_DB: ${POSTGRES_DB}\n      POSTGRES_USER: ${POSTGRES_USER}\n\
    \      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}\n    ports:\n      - \"${POSTGRES_PORT}:5432\"\
    \n    volumes:\n      - pgdata:/var/lib/postgresql/data\n  web:\n    build:\n\
    \      context: ${PWD}\n      dockerfile: docker/web/Dockerfile.production\n \
    \   environment:\n      FLASK_ENV: ${FLASK_ENV}\n      FLASK_CONFIG: ${FLASK_CONFIG}\n\
    \      APPLICATION_DB: ${APPLICATION_DB}\n      POSTGRES_USER: ${POSTGRES_USER}\n\
    \      POSTGRES_HOSTNAME: \"db\"\n      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}\n\
    \      POSTGRES_PORT: ${POSTGRES_PORT}\n    command: gunicorn -w 4 -b 0.0.0.0\
    \ wsgi:app\n    volumes:\n      - ${PWD}:/opt/code\n  nginx:\n    image: nginx\n\
    \    volumes:\n      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro\n    ports:\n\
    \      - 8080:8080\n\nvolumes:\n  pgdata:\n```\n\n如你所见，Postgres配置与我们在`testing.yml`文件中使用的没有不同，但我添加了`volumes`选项（在`db`和文件末尾），这允许我创建一个稳定的卷。如果你不这样做，数据库在关闭容器后就会被销毁。\n\
    \n容器`web`通过gunicorn运行Flask应用程序。环境变量再次来自JSON配置，我们需要定义它们，因为应用程序需要知道如何连接数据库以及如何运行Web框架。命令`gunicorn\
    \ -w 4 -b 0.0.0.0 wsgi:app`加载我们在`wsgi.py`中创建的WSGI应用程序，并在4个并发进程中运行它。这个容器是使用`docker/web/Dockerfile.production`创建的，我仍然需要定义它。\n\
    \n最后一个容器是nginx，我们将直接从Docker Hub使用它。该容器运行Nginx，配置存储在`/etc/nginx/nginx.conf`中，这是我们用本地文件`./nginx/nginx.conf`覆盖的文件。请注意，我将其配置为使用端口8080而不是标准的HTTP端口80，以避免与你计算机上可能运行的其他软件冲突。\n\
    \nWeb应用程序的Dockerfile如下\n\n```dockerfile\n# docker/web/Dockerfile.production\n\
    FROM python:3\n\nENV PYTHONUNBUFFERED 1\n\nRUN mkdir /opt/code\nRUN mkdir /opt/requirements\n\
    WORKDIR /opt/code\n\nADD requirements /opt/requirements\nRUN pip install -r /opt/requirements/prod.txt\n\
    ```\n\n这是一个非常简单的容器，使用标准的`python:3`镜像，我在其中添加了`requirements/prod.txt`中包含的生产依赖项。要使Docker容器工作，我们需要将gunicorn添加到这个最后的文件中\n\
    \n```\n# requirements/prod.txt\nFlask\nSQLAlchemy\npsycopg2\npymongo\ngunicorn\n\
    ```\n\nNginx的配置是\n\n```nginx\n# docker/nginx/nginx.conf\nworker_processes 1;\n\
    \nevents { worker_connections 1024; }\n\nhttp {\n\n    sendfile on;\n\n    upstream\
    \ app {\n        server web:8000;\n    }\n\n    server {\n        listen 8080;\n\
    \n        location / {\n            proxy_pass http://app;\n            proxy_redirect\
    \ off;\n            proxy_set_header Host $host;\n            proxy_set_header\
    \ X-Real-IP $remote_addr;\n            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;\n\
    \            proxy_set_header X-Forwarded-Host $server_name;\n        }\n    }\n\
    }\n```\n\n对于项目的其余部分，这个配置非常基础，缺少一些在真实生产环境中必需的重要部分，例如HTTPS。然而，从本质上讲，它与生产就绪的Nginx容器配置没有太大不同。\n\
    \n由于我们将使用Docker Compose，脚本`manage.py`需要一个简单的更改，即一个包装docker-compose本身的命令。我们需要脚本只是初始化环境变量"
