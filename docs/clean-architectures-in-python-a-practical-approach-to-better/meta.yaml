  md: 'well-designed system shall also cope with practical world issues such as performances,
    for example, or other specific needs. When designing an architecture it is very
    important to know “what is where and why”, and this is even more important when
    you “bend” the rules. Many issues do not have a black-or-white answer, and many
    decisions are “shades of grey”, that is it is up to you to justify why you put
    something in a given place.


    Keep in mind, however, that you should not break the *structure* of the clean
    architecture, and be particularly very strict about the data flow. If you break
    the data flow, you are basically invalidating the whole structure. You should
    try as hard as possible not to introduce solutions that are based on a break in
    the data flow, but realistically speaking, if this saves money, do it.


    If you do it, there should be a giant warning in your code and your documentation
    explaining why you did it. If you access an outer layer breaking the interface
    paradigm usually it is because of some performance issues, as the layered structure
    can add some overhead to the communications between elements. You should clearly
    tell other programmers that this happened, because if someone wants to replace
    the external layer with something different, they should know that there is direct
    access which is implementation-specific.


    For the sake of example, let’s say that a use case is accessing the storage layer
    through an interface, but this turns out to be too slow. You decide then to access
    directly the API of the specific database you are using, but this breaks the data
    flow, as now an internal layer (use cases) is accessing an outer one (external
    interfaces). If someone in the future wants to replace the specific database you
    are using with a different one, they have to be aware of this, as the new database
    probably won’t provide the same API entry point with the same data.


    If you end up breaking the data flow consistently maybe you should consider removing
    one layer of abstraction, merging the two layers that you are linking.'
