    and application is the database created by ./manage.py init-postgres (from APPLICATION_DB).


    We can connect to a database with the command \c


    ```

    1 postgres=# \c application

    2 You are now connected to database "application" as user "postgres".

    3 application=#

    ```


    Please note that the prompt changes with the name of the current database. Finally,
    we can list the available tables with \dt


    ```

    1 application=# \dt

    2 Did not find any relations.

    ```


    As you can see there are no tables yet. This is no surprise as we didn''t do anything
    to make Postres aware of the models that we created. Please remember that everything
    we are doing here is done in an external system and it is not directly connected
    with entities.


    As you remember, we mapped entities to storage objects, and since we are using
    Postgres we leveraged SQLAlchemy classes, so now we need to create the database
    tables that correspond to them.


    # Migrations


    We need a way to create the tables that correspond to the objects that we defined
    in rentomatic/repository/post objects.py. The best strategy, when we use an ORM
    like SQLAlchemy, is to create and run migrations, and for this we can use Alembic<sup>33</sup>.


    If you are still connected with psql please exit with \q, then edit requirements/prod.txt
    and add alembic'
