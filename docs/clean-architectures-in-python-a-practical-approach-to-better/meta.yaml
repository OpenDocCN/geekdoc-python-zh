- img_proc: true
  md: "according to the content of the JSON configuration file and then run Docker\
    \ Compose. As we already have the function docker_compose_cmdline the job is pretty\
    \ simple\n\n```\nmanage.py\n# Ensure an environment variable exists and has a\
    \ value\nimport os\nimport json\nimport signal\nimport subprocess\nimport time\n\
    ...\ndef setenv(variable, default):\n    os.environ[variable] = os.getenv(variable,\
    \ default)\n\nsetenv(\"APPLICATION_CONFIG\", \"production\")\n\nAPPLICATION_CONFIG_PATH\
    \ = \"config\"\nDOCKER_PATH = \"docker\"\n...\n\n@cli.command(context_settings={\"\
    ignore_unknown_options\": True})\n@click.argument(\"subcommand\", nargs=-1, type=click.Path())\n\
    def compose(subcommand):\n    configure_app(os.getenv(\"APPLICATION_CONFIG\"))\n\
    \    cmdline = docker_compose_cmdline() + list(subcommand)\n\n    try:\n     \
    \   p = subprocess.Popen(cmdline)\n        p.wait()\n    except KeyboardInterrupt:\n\
    \        p.send_signal(signal.SIGINT)\n        p.wait()\n```\n\nAs you can see\
    \ I forced the variable APPLICATION_CONFIG to be production if not specified.\
    \ Usually, my default configuration is the development one, but in this simple\
    \ case I haven't defined one, so this will do for now.\nThe new command is compose,\
    \ that leverages Click's argument decorator to collect subcommands and attach\
    \ them to the Docker Compose command line. I also use the signal library, which\
    \ I added to the imports, to control keyboard interruptions."
