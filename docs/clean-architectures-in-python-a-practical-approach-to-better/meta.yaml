  md: "# Serializers\n\nOuter layers can use the model Room, but if you want to return\
    \ the model as a result of an API call you need a serializer.\nThe typical serialization\
    \ format is JSON, as this is a broadly accepted standard for web-based APIs. The\
    \ serializer is not part of the model but is an external specialized class that\
    \ receives the model instance and produces a representation of its structure and\
    \ values.\nThis is the test for the JSON serialization of our class Room\n\n```\n\
    tests/serializers/test_room.py\n\nimport json\nimport uuid\n\nfrom rentomatic.serializers.room\
    \ import RoomJsonEncoder\nfrom rentomatic.domain.room import Room\n\n\ndef test_serialize_domain_room():\n\
    \    code = uuid.uuid4()\n\n    room = Room(\n        code=code,\n        size=200,\n\
    \        price=10,\n        longitude=-0.09998975,\n        latitude=51.75436293,\n\
    \    )\n\n    expected_json = f\"\"\"\n        {{\n            \"code\": \"{code}\"\
    ,\n            \"size\": 200,\n            \"price\": 10,\n            \"longitude\"\
    : -0.09998975,\n            \"latitude\": 51.75436293\n        }}\n    \"\"\"\n\
    \n    json_room = json.dumps(room, cls=RoomJsonEncoder)\n\n    assert json.loads(json_room)\
    \ == json.loads(expected_json)\n```"
