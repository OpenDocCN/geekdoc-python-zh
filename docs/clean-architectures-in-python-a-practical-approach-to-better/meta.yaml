    The use case represents the business logic, a process, which means that the simplest
    implementation you can have in a programming language is a function: some code
    that receives input arguments and returns output data. A class is however another
    option, as in essence it is a collection of variables and functions. So, as in
    many other cases, the question is if you should use a function or a class, and
    my answer is that it depends on the degree of complexity of the algorithm that
    you are implementing.


