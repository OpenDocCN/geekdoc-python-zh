- md: "## Chapter 05 Error management\n\n> You sent them out there and you didn’t\
    \ even warn them! Why didn’t you warn them, Burke?\nAliens, 1986\n\nIn every software\
    \ project, a great part of the code is dedicated to error management, and this\
    \ code has to be rock solid. Error management is a complex topic, and there is\
    \ always a corner case that we left out, or a condition that we supposed could\
    \ never fail, while it does.\n\nIn a clean architecture, the main process is the\
    \ creation of use cases and their execution. This is, therefore, the main source\
    \ of errors, and the use cases layer is where we have to implement the error management.\
    \ Errors can obviously come from the domain models layer, but since those models\
    \ are created by the use cases the errors that are not managed by the models themselves\
    \ automatically become errors of the use cases.\n\n## Request and responses\n\n\
    We can divide the error management code into two different areas. The first one\
    \ represents and manages **requests**, that is, the input data that reaches our\
    \ use case. The second one covers the way we return results from the use case\
    \ through **responses**, the output data. These two concepts shouldn’t be confused\
    \ with HTTP requests and responses, even though there are similarities. We are\
    \ now considering the way data can be passed to and received from use cases, and\
    \ how to manage errors. This has nothing to do with the possible use of this architecture\
    \ to expose an HTTP API.\n\nRequest and response objects are an important part\
    \ of a clean architecture, as they transport call parameters, inputs and results\
    \ from outside the application into the use cases layer.\n\nMore specifically,\
    \ requests are objects created from incoming API calls, thus they shall deal with\
    \ things like incorrect values, missing parameters, wrong formats, and so on.\
    \ Responses, on the other hand, have to contain the actual results of the API\
    \ calls, but shall also be able to represent error cases and deliver rich information\
    \ on what happened.\n\nThe actual implementation of request and response objects\
    \ is completely free, the clean architecture says nothing about them. The decision\
    \ on how to pack and represent data is up to us.\n\nTo start working on possible\
    \ errors and understand how to manage them, I will expand `room_list_use_case`\
    \ to support filters that can be used to select a subset of the Room objects in\
    \ storage.\n\nThe filters could be, for example, represented by a dictionary that\
    \ contains attributes of the model Room and the logic to apply to them. Once we\
    \ accept such a rich structure, we open our use case to all sorts of errors: attributes\
    \ that do not exist in the model, thresholds of the wrong type, filters that make\
    \ the storage layer crash, and so on. All these considerations have to be taken\
    \ into account by the use case.\n\n## Basic structure\n\nWe can implement structured\
    \ requests before we expand the use case to accept filters. We just need a class\
    \ RoomListRequest that can be initialised without parameters, so let us create\
    \ the file tests/requests/test_room_list.py and put there a test for this object.\n\
    \n```\ntests/requests/test_room_list.py\n\n1 from rentomatic.requests.room_list\
    \ import RoomListRequest\n2 \n3 \n4 def test_build_room_list_request_without_parameters():\n\
    5     request = RoomListRequest()\n6 \n7     assert bool(request) is True\n8 \n\
    9 \n10 def test_build_room_list_request_from_empty_dict():\n11     request = RoomListRequest.from_dict({})\n\
    12 \n13     assert bool(request) is True\n```\n\nWhile at the moment this request\
    \ object is basically empty, it will come in handy as soon as we start having\
    \ parameters for the list use case. The code of the class RoomListRequest is the\
    \ following\n\n```\nrentomatic/requests/room_list.py\n\n1 class RoomListRequest:\n\
    2     @classmethod\n3     def from_dict(cls, adict):\n4         return cls()\n\
    5 \n6     def __bool__(self):\n7         return True\n```\n\nThe response object\
    \ is also very simple since for the moment we just need to return a successful\
    \ result. Unlike the request, the response is not linked to any particular use\
    \ case, so the test file can be named tests/test_responses.py\n\n```\ntests/test_responses.py\n\
    \n1 from rentomatic.responses import ResponseSuccess\n2 \n3 \n4 def test_response_success_is_true():\n\
    5     assert bool(ResponseSuccess()) is True\n```\n\nand the actual response object\
    \ is in the file rentomatic/responses.py\n\n```\nrentomatic/responses.py\n\n1\
    \ class ResponseSuccess:\n2     def __init__(self, value=None):\n3         self.value\
    \ = value\n4 \n5     def __bool__(self):\n6         return True\n```\n\nWith these\
    \ two objects, we just laid the foundations for richer management of input and\
    \ outputs of the use case, especially in the case of error conditions.\n\n## Requests\
    \ and responses in a use case\n\nLet’s implement the request and response objects\
    \ that we developed into the use case. To do this, we need to change the use case\
    \ so that it accepts a request and return a response. The new version of tests/use_cases/test_room_list.py\
    \ is the following\n\n```\ntests/use_cases/test_room_list.py\n1 import pytest\n\
    2 import uuid\n3 from unittest import mock\n4 \n5 from rentomatic.domain.room\
    \ import Room\n6 from rentomatic.use_cases.room_list import room_list_use_case\n\
    7 from rentomatic.requests.room_list import RoomListRequest\n8 \n9 \n10 @pytest.fixture\n\
    11 def domain_rooms():\n12     room_1 = Room(\n13         code=uuid.uuid4(),\n\
    14         size=215,\n15         price=39,\n16         longitude=-0.09998975,\n\
    17         latitude=51.75436293,\n18     )\n19 \n20     room_2 = Room(\n21   \
    \      code=uuid.uuid4(),\n22         size=405,\n23         price=66,\n24    \
    \     longitude=0.18228006,\n25         latitude=51.74640997,\n26     )\n27 \n\
    28     room_3 = Room(\n29         code=uuid.uuid4(),\n30         size=56,\n31\
    \         price=60,\n32         longitude=0.27891577,\n33         latitude=51.45994069,\n\
    34     )\n35 \n36     room_4 = Room(\n37         code=uuid.uuid4(),\n38      \
    \   size=93,\n39         price=48,\n40         longitude=0.33894476,\n41     \
    \    latitude=51.39916678,\n42     )\n43 \n44     return [room_1, room_2, room_3,\
    \ room_4]\n45 \n46 \n47 def test_room_list_without_parameters(domain_rooms):\n\
    48     repo = mock.Mock()\n49     repo.list.return_value = domain_rooms\n50 \n\
    51     request = RoomListRequest()\n52 \n53     response = room_list_use_case(repo,\
    \ request)\n54 \n55     assert bool(response) is True\n56     repo.list.assert_called_with()\n\
    57     assert response.value == domain_rooms\n```\n\nAnd the changes in the use\
    \ case are minimal. The new version of the file rentomatic/use_cases/room_list.py\
    \ is the following\n\n```\nrentomatic/use_cases/room_list.py\nfrom rentomatic.responses\
    \ import ResponseSuccess\n\ndef room_list_use_case(repo, request):\n    rooms\
    \ = repo.list()\n    return ResponseSuccess(rooms)\n```\n\nSource code\nhttps://github.com/pycabbook/rentomatic/tree/ed2-c05-s03\n\
    \nNow we have a standard way to pack input and output values, and the above pattern\
    \ is valid for every use case we can create. We are still missing some features,\
    \ however, because so far requests and responses are not used to perform error\
    \ management.\n\n## Request validation\n\nThe parameter filters that we want to\
    \ add to the use case allows the caller to add conditions to narrow the results\
    \ of the model list operation, using a notation like `<attribute>__<operator>`.\
    \ For example, specifying filters={'price__lt': 100} should return all the results\
    \ with a price lower than 100.\n\nSince the model Room has many attributes, the\
    \ number of possible filters is very high. For simplicity's sake, I will consider\
    \ the following cases:\n\n- The attribute code supports only __eq, which finds\
    \ the room with the specific code if it exists\n- The attribute price supports\
    \ __eq, __lt, and __gt\n- All other attributes cannot be used in filters\n\nThe\
    \ core idea here is that requests are customised for use cases, so they can contain\
    \ the logic that validates the arguments used to instantiate them. The request\
    \ is valid or invalid before it reaches the use case, so it is not the responsibility\
    \ of the latter to check that the input values have proper values or a proper\
    \ format.\n\nThis also means that building a request might result in two different\
    \ objects, a valid one or an invalid one. For this reason, I decided to split\
    \ the existing class RoomListRequest into RoomListValidRequest and RoomListInvalidRequest,\
    \ creating a factory function that returns the proper object.\n\nThe first thing\
    \ to do is to change the existing tests to use the factory.\n\n```\ntests/requests/test_room_list.py\n\
    \n1 from rentomatic.requests.room_list import build_room_list_request\n2 \n3 \n\
    4 def test_build_room_list_request_without_parameters():\n5     request = build_room_list_request()\n\
    6 \n7     assert request.filters is None\n8     assert bool(request) is True\n\
    9 \n10 \n11 def test_build_room_list_request_with_empty_filters():\n12     request\
    \ = build_room_list_request({})\n13 \n14     assert request.filters == {}\n15\
    \     assert bool(request) is True\n```\n\nNext, I will test that passing the\
    \ wrong type of object as filters or that using incorrect keys results in an invalid\
    \ request"
  mdcn: "## 第五章 错误管理\n\n> 你把他们派出去，却连警告都没给！你为什么不警告他们，伯克？\n《异形2》，1986年\n\n在每个软件项目中，很大一部分代码都致力于错误管理，而且这些代码必须坚如磐石。错误管理是一个复杂的话题，总有一些我们遗漏的边界情况，或者一些我们认为永远不会失败但实际却失败了的条件。\n\
    \n在整洁架构中，主要流程是创建用例及其执行。因此，这是错误的主要来源，而用例层正是我们必须实现错误管理的地方。错误显然可能来自领域模型层，但由于这些模型是由用例创建的，模型本身未管理的错误会自动成为用例的错误。\n\
    \n## 请求与响应\n\n我们可以将错误管理代码分为两个不同的领域。第一个领域表示和管理**请求**，即到达我们用例的输入数据。第二个领域涵盖了我们通过**响应**（即输出数据）从用例返回结果的方式。这两个概念不应与HTTP请求和响应混淆，尽管它们有相似之处。我们现在考虑的是数据如何传递给用例以及如何从用例接收，以及如何管理错误。这与该架构可能用于暴露HTTP\
    \ API无关。\n\n请求和响应对象是整洁架构的重要组成部分，因为它们将调用参数、输入和结果从应用程序外部传输到用例层。\n\n更具体地说，请求是从传入的API调用创建的对象，因此它们应该处理诸如错误值、缺失参数、错误格式等问题。另一方面，响应必须包含API调用的实际结果，但也应该能够表示错误情况并提供有关发生了什么的丰富信息。\n\
    \n请求和响应对象的实际实现是完全自由的，整洁架构对此没有规定。如何打包和表示数据的决定权在我们手中。\n\n为了开始处理可能的错误并了解如何管理它们，我将扩展`room_list_use_case`以支持可用于选择存储中Room对象子集的过滤器。\n\
    \n过滤器可以，例如，由一个包含Room模型属性和要应用的逻辑的字典来表示。一旦我们接受如此丰富的结构，我们就为用例打开了各种错误的大门：模型中不存在的属性、错误类型的阈值、导致存储层崩溃的过滤器等等。所有这些考虑都必须由用例来处理。\n\
    \n## 基本结构\n\n在扩展用例以接受过滤器之前，我们可以实现结构化的请求。我们只需要一个`RoomListRequest`类，它可以无参数初始化，因此让我们创建文件`tests/requests/test_room_list.py`并在其中放置一个针对此对象的测试。\n\
    \n```\ntests/requests/test_room_list.py\n\n1 from rentomatic.requests.room_list\
    \ import RoomListRequest\n2 \n3 \n4 def test_build_room_list_request_without_parameters():\n\
    5     request = RoomListRequest()\n6 \n7     assert bool(request) is True\n8 \n\
    9 \n10 def test_build_room_list_request_from_empty_dict():\n11     request = RoomListRequest.from_dict({})\n\
    12 \n13     assert bool(request) is True\n```\n\n虽然目前这个请求对象基本上是空的，但一旦我们开始为列表用例添加参数，它就会派上用场。`RoomListRequest`类的代码如下\n\
    \n```\nrentomatic/requests/room_list.py\n\n1 class RoomListRequest:\n2     @classmethod\n\
    3     def from_dict(cls, adict):\n4         return cls()\n5 \n6     def __bool__(self):\n\
    7         return True\n```\n\n响应对象也非常简单，因为目前我们只需要返回一个成功的结果。与请求不同，响应不与任何特定用例相关联，因此测试文件可以命名为`tests/test_responses.py`\n\
    \n```\ntests/test_responses.py\n\n1 from rentomatic.responses import ResponseSuccess\n\
    2 \n3 \n3 def test_response_success_is_true():\n4     assert bool(ResponseSuccess())\
    \ is True\n```\n\n而实际的响应对象位于文件`rentomatic/responses.py`中\n\n```\nrentomatic/responses.py\n\
    \n1 class ResponseSuccess:\n2     def __init__(self, value=None):\n3         self.value\
    \ = value\n4 \n5     def __bool__(self):\n6         return True\n```\n\n有了这两个对象，我们刚刚为更丰富地管理用例的输入和输出奠定了基础，尤其是在错误条件下。\n\
    \n## 用例中的请求与响应\n\n让我们将开发的请求和响应对象实现到用例中。为此，我们需要更改用例，使其接受一个请求并返回一个响应。`tests/use_cases/test_room_list.py`的新版本如下\n\
    \n```\ntests/use_cases/test_room_list.py\n1 import pytest\n2 import uuid\n3 from\
    \ unittest import mock\n4 \n5 from rentomatic.domain.room import Room\n6 from\
    \ rentomatic.use_cases.room_list import room_list_use_case\n7 from rentomatic.requests.room_list\
    \ import RoomListRequest\n8 \n9 \n10 @pytest.fixture\n11 def domain_rooms():\n\
    12     room_1 = Room(\n13         code=uuid.uuid4(),\n14         size=215,\n15\
    \         price=39,\n16         longitude=-0.09998975,\n17         latitude=51.75436293,\n\
    18     )\n19 \n20     room_2 = Room(\n21         code=uuid.uuid4(),\n22      \
    \   size=405,\n23         price=66,\n24         longitude=0.18228006,\n25    \
    \     latitude=51.74640997,\n26     )\n27 \n28     room_3 = Room(\n29        \
    \ code=uuid.uuid4(),\n30         size=56,\n31         price=60,\n32         longitude=0.27891577,\n\
    33         latitude=51.45994069,\n34     )\n35 \n36     room_4 = Room(\n37   \
    \      code=uuid.uuid4(),\n38         size=93,\n39         price=48,\n40     \
    \    longitude=0.33894476,\n41         latitude=51.39916678,\n42     )\n43 \n\
    44     return [room_1, room_2, room_3, room_4]\n45 \n46 \n47 def test_room_list_without_parameters(domain_rooms):\n\
    48     repo = mock.Mock()\n49     repo.list.return_value = domain_rooms\n50 \n\
    51     request = RoomListRequest()\n52 \n53     response = room_list_use_case(repo,\
    \ request)\n54 \n55     assert bool(response) is True\n56     repo.list.assert_called_with()\n\
    57     assert response.value == domain_rooms\n```\n\n用例中的更改很小。文件`rentomatic/use_cases/room_list.py`的新版本如下\n\
    \n```\nrentomatic/use_cases/room_list.py\nfrom rentomatic.responses import ResponseSuccess\n\
    \ndef room_list_use_case(repo, request):\n    rooms = repo.list()\n    return\
    \ ResponseSuccess(rooms)\n```\n\n源代码\nhttps://github.com/pycabbook/rentomatic/tree/ed2-c05-s03\n\
    \n现在我们有了打包输入和输出值的标准方式，上述模式对于我们可以创建的每个用例都是有效的。然而，我们仍然缺少一些功能，因为到目前为止，请求和响应并未用于执行错误管理。\n\
    \n## 请求验证\n\n我们想要添加到用例的参数过滤器允许调用者添加条件以缩小模型列表操作的结果，使用类似`<attribute>__<operator>`的表示法。例如，指定`filters={'price__lt':\
    \ 100}`应该返回所有价格低于100的结果。\n\n由于Room模型有许多属性，可能的过滤器数量非常多。为简单起见，我将考虑以下情况：\n\n- 属性`code`仅支持`__eq`，如果存在则查找具有特定代码的房间\n\
    - 属性`price`支持`__eq`、`__lt`和`__gt`\n- 所有其他属性都不能在过滤器中使用\n\n这里的核心思想是请求是为用例定制的，因此它们可以包含验证用于实例化它们的参数的逻辑。请求在到达用例之前是有效或无效的，因此检查输入值是否具有适当的值或格式不是后者的责任。\n\
    \n这也意味着构建请求可能产生两个不同的对象，一个有效的或一个无效的。因此，我决定将现有的`RoomListRequest`类拆分为`RoomListValidRequest`和`RoomListInvalidRequest`，并创建一个返回适当对象的工厂函数。\n\
    \n首先要做的就是更改现有测试以使用工厂。\n\n```\ntests/requests/test_room_list.py\n\n1 from rentomatic.requests.room_list\
    \ import build_room_list_request\n2 \n3 \n4 def test_build_room_list_request_without_parameters():\n\
    5     request = build_room_list_request()\n6 \n7     assert request.filters is\
    \ None\n8     assert bool(request) is True\n9 \n10 \n11 def test_build_room_list_request_with_empty_filters():\n\
    12     request = build_room_list_request({})\n13 \n14     assert request.filters\
    \ == {}\n15     assert bool(request) is True\n```\n\n接下来，我将测试传递错误类型的对象作为过滤器或使用不正确的键是否会导致无效请求"
