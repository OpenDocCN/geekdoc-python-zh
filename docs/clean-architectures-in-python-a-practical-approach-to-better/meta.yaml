    \n## Colophon\n\n> In conclusion, it should be noted...\n> Young Frankenstein,\
    \ 1974\n\nWriting a book is a giant effort.\nI don’t want this to sound like an\
    \ excuse for the many errors that I forgot to fix or introduced. I merely want\
    \ to state that what you read is the product of many many hours spent thinking\
    \ how to explain a certain concept, debating with myself if a paragraph should\
    \ come before another, and to endlessly trying to reconcile the code I wrote on\
    \ the project and the Git commits with what is in the book. And since you read\
