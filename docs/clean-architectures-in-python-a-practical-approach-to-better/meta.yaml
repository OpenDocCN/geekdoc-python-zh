  md: '# About the book


    > We’ll put the band back together, do a few gigs, we get some bread. Bang! Five
    thousand bucks.


    The Blues Brothers, 1980


    In 2015 I was introduced to the clean architecture by a colleague of mine, Roberto
    Ciatti. I started working with him following a strict Test-Driven Development
    (TDD) approach and learning or better understanding many things I now consider
    pillars of my programming knowledge.


    Unfortunately the project was cancelled, but the clean architecture concepts stuck
    with me, so I revisited them for a simple open source project I started working
    on at the time. Meanwhile I read “Object Oriented Software Engineering: A Use-Case
    Driven Approach” by Ivar Jacobson⁴.


    In 2013 I started writing a personal blog, The Digital Cat⁵, and after having
    published many Python-related posts I began working on a post to show other programmers
    the beauty of the clean architecture concepts: “Clean Architectures in Python:
    a step by step example”, published in 2016, which was well received by the Python
    community. For a couple of years I considered expanding the post, but I couldn’t
    find the time to do it, and in the meanwhile I realised that many things I had
    written needed to be corrected, clarified, or simply updated. So I thought that
    a book could be the best way to present the whole picture effectively, and here
    we are.


    In 2020, after having delayed it for a long time, I decided to review the whole
    book, updating it and clarifying parts that weren’t particularly well written.
    I also decided to remove the part on TDD. While I believe every programmer should
    understand TDD, the topic of the book is different, so I updated the material
    and published it on my blog.


    This book is the product of many hours spent thinking, experimenting, studying,
    and making mistakes. I couldn’t have written it without the help of many people,
    some of whose names I don’t know, who provided free documentation, free software,
    free help. Thanks everybody! I also want to specifically say thanks to many readers
    who came back to me with suggestions, corrections, or simply with appreciation
    messages. Thanks all!


    # Prerequisites and structure of the book


    To fully appreciate the book you need to know Python and be familiar with TDD,
    in particular with unit testing and mocks. Please refer to the series TDD in Python
    with pytest⁶ published on my blog if you need to refresh your knowledge about
    these topics.


    ⁴https://www.amazon.com/Object-Oriented-Software-Engineering-Approach/dp/0201544350

    ⁵https://www.thedigitalcatonline.com/

    ⁶https://www.thedigitalcatonline.com/blog/2020/09/10/tdd-in-python-with-pytest-part-1/'
