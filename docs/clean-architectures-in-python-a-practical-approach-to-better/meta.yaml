  md: "Here we create the object Room and write the expected JSON output (please note\
    \ that the double curly braces are used to avoid clashes with the f-string formatter).\
    \ Then we dump the object Room to a JSON string and compare the two. To compare\
    \ the two we load them again into Python dictionaries, to avoid issues with the\
    \ order of the attributes. Comparing Python dictionaries, indeed, doesn’t consider\
    \ the order of the dictionary fields, while comparing strings obviously does.\n\
    \nPut in the file rentomatic/serializers/room.py the code that makes the test\
    \ pass\n\n```\nrentomatic/serializers/room.py\n\n1 import json\n2 \n3 \n4 class\
    \ RoomJsonEncoder(json.JSONEncoder):\n5     def default(self, o):\n6         try:\n\
    7             to_serialize = {\n8                 \"code\": str(o.code),\n9  \
    \               \"size\": o.size,\n10                \"price\": o.price,\n11 \
    \               \"latitude\": o.latitude,\n12                \"longitude\": o.longitude,\n\
