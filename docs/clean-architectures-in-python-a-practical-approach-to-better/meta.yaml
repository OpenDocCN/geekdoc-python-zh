    \ and a battery of tests that run using a real database instance running in Docker.\n\
    \nThis chapter will show you one of the biggest advantages of a clean architecture,\
    \ namely the simplicity with which you can replace existing components with others,\
    \ possibly based on a completely different technology.\n\n## Decoupling with interfaces\n\
    \nThe clean architecture we devised in the previous chapters defines a use case\
