    \ are polymorphic with respect to the method `list`.\n\nThis is very important\
    \ and it is the core of the clean architecture design. Being connected through\
    \ an API, the use case and the repository can be replaced by different implementations\
    \ at any time, given that the new implementation provides the requested interface.\n\
    \nIt is worth noting, for example, that the initialisation of the object is not\
