- md: "Please note that the two databases template0 and template1 are system databases\
    \ created by Postgres (see the documentation<sup>32</sup>), postgres is the default\
    \ database created by the Docker container (the name is postgres by default, but\
    \ in this case it comes from the environment variable POSTGRES_DB in config/production.json)\
    \ and application is the database created by ./manage.py init-postgres (from APPLICATION_DB).\n\
    \nWe can connect to a database with the command \\c\n\n```\npostgres=# \\c application\n\
    You are now connected to database \"application\" as user \"postgres\".\napplication=#\n\
    ```\n\nPlease note that the prompt changes with the name of the current database.\
    \ Finally, we can list the available tables with \\dt\n\n```\napplication=# \\\
    dt\nDid not find any relations.\n```\n\nAs you can see there are no tables yet.\
    \ This is no surprise as we didn't do anything to make Postgres aware of the models\
    \ that we created. Please remember that everything we are doing here is done in\
    \ an external system and it is not directly connected with entities.\n\nAs you\
    \ remember, we mapped entities to storage objects, and since we are using Postgres\
    \ we leveraged SQLAlchemy classes, so now we need to create the database tables\
    \ that correspond to them.\n\n## Migrations\n\nWe need a way to create the tables\
    \ that correspond to the objects that we defined in rentomatic/repository/postgres_objects.py.\
    \ The best strategy, when we use an ORM like SQLAlchemy, is to create and run\
    \ migrations, and for this we can use Alembic<sup>33</sup>.\n\nIf you are still\
    \ connected with psql please exit with \\q, then edit requirements/prod.txt and\
    \ add alembic\n\nChapter 08 Run a production ready system\n\n137\n\n- Flask\n\
    - SQLAlchemy\n- psycopg2\n- pymongo\n- gunicorn\n- alembic\n\nAs usual, remember\
    \ to run `pip install -r requirements/dev.txt` to update the virtual environment.\n\
    \nAlembic is capable of connecting to the database and run Python scripts (called\
    \ “migrations”) to alter the tables according to the SQLAlchemy models. To do\
    \ this, however, we need to give Alembic access to the database providing username,\
    \ password, hostname, and the database name. We also need to give Alembic access\
    \ to the Python classes that represent the models.\n\nFirst of all let’s initialise\
    \ Alembic. In the project’s main directory (where `manage.py` is stored) run\n\
    \n```\n$ alembic init migrations\n```\n\nwhich creates a directory called `migrations`\
    \ that contains Alembic’s configuration files, together with the migrations that\
    \ will be created in `migrations/versions`. it will also create the file `alembic.ini`\
    \ which contains the configuration values. The name `migrations` is completely\
    \ arbitrary, so feel free to use a different one if you prefer.\n\nThe specific\
    \ file we need to adjust to make Alembic aware of our models and our database\
    \ is `migrations/env.py`. Add the highlighted lines\n\nmigrations/env.py\n\n```\n\
    import os\n\nfrom logging.config import fileConfig\n\nfrom sqlalchemy import engine_from_config\n\
    from sqlalchemy import pool\n\nfrom alembic import context\n\n# this is the Alembic\
    \ Config object, which provides\n# access to the values within the .ini file in\
    \ use.\nconfig = context.config\n\nsection = config.config_ini_section\nconfig.set_section_option(\n\
    \    section, \"POSTGRES_USER\", os.environ.get(\"POSTGRES_USER\"))\nconfig.set_section_option(\n\
    \    section, \"POSTGRES_PASSWORD\", os.environ.get(\"POSTGRES_PASSWORD\")\n)\n\
    config.set_section_option(\n    section, \"POSTGRES_HOSTNAME\", os.environ.get(\"\
    POSTGRES_HOSTNAME\")\n)\nconfig.set_section_option(\n    section, \"APPLICATION_DB\"\
    , os.environ.get(\"APPLICATION_DB\")\n)\n\n# Interpret the config file for Python\
    \ logging.\n# This line sets up loggers basically.\nfileConfig(config.config_file_name)\n\
    \n# add your model's MetaData object here\n# for 'autogenerate' support\n# from\
    \ myapp import mymodel\n# target_metadata = mymodel.Base.metadata\n# target_metadata\
    \ = None\nfrom rentomatic.repository.postgres_objects import Base\n\ntarget_metadata\
    \ = Base.metadata\n\n# other values from the config, defined by the needs of env.py,\n\
    # can be acquired:\n# my_important_option = config.get_main_option(\"my_important_option\"\
    )\n# ... etc.\n```\n\nThrough config.set_section_option we are adding relevant\
    \ configuration values to the main Alembic INI file section (config.config_ini_section),\
    \ extracting them from the environment variables. We are also importing the file\
    \ that contains the SQLAlchemy objects. You can find documentation on this procedure\
    \ at https://alembic.sqlalchemy.org/en/latest/api/config.html.\n\nOnce this is\
    \ done we need to change the INI file to use the new variables\n\nalembic.ini\n\
    \n```\n# the output encoding used when revision files\n# are written from script.py.mako\n\
    # output_encoding = utf-8\n\nsqlalchemy.url = postgresql://%(POSTGRES_USER)s:%(POSTGRES_PASSWORD)s@%(POSTGRES_HOSTNAME)s/%(APPLICATION_DB)s\n\
    \n[post_write_hooks]\n# post_write_hooks defines scripts or Python functions that\
    \ are run\n# on newly generated revision scripts.  See the documentation for further\n\
    # detail and examples\n```\n\nThe syntax %(VARNAME)s is the basic variable interpolation\
    \ used by ConfigParser (see [the documentation](https://docs.python.org/3.8/library/configparser.html#configparser.BasicInterpolation)).\n\
    \nAt this point we can run Alembic to migrate our database. In many cases, you\
    \ can rely on Alembic’s autogeneration functionality to generate the migrations,\
    \ and this is what we can do to create the initial models. The Alembic command\
    \ is `revision` with the `--autogenerate` flag, but we need to pass the environment\
    \ variables on the command line. This is clearly a job for `migrate.py` but let’s\
    \ first run it to see what happens to the database. Later we will create a better\
    \ setup to avoid passing variables manually\n\n```\n$ POSTGRES_USER=postgres POSTGRES_PASSWORD=postgres\
    \ POSTGRES_HOSTNAME=localhost APPLICATION_DB=application alembic revision --autogenerate\
    \ -m \"Initial\"\n```\n\nThis will generate the file `migrations/versions/4d4c19952a36_initial.py`.\
    \ Pay attention that the initial hash will be different for you. If you want you\
    \ can open that file and see how Alembic generates the table and creates the columns.\n\
    \nSo far we created the migration but we still need to apply it to the database.\
    \ Make sure you are running the Docker containers (run `./manage.py compose up\
    \ -d` otherwise) as Alembic is going to connect to the database, and run\n\n```\n\
    $ POSTGRES_USER=postgres POSTGRES_PASSWORD=postgres POSTGRES_HOSTNAME=localhost\
    \ APPLICATION_DB=application alembic upgrade head\n```\n\nAt this point we can\
    \ connect to the database and check the existing tables\n\n```\n$ ./manage.py\
    \ compose exec db psql -U postgres -d application\npsql (13.4 (Debian 13.4-1.pgdg100+1))\n\
    Type \"help\" for help.\n\napplication=# \\dt\n            List of relations\n\
    \ Schema |       Name       |  Type  |  Owner\n--------+------------------+--------+----------\n\
    \ public | alembic_version  | table  | postgres\n public | room             |\
    \ table  | postgres\n(2 rows)\n\napplication=#\n```\n\nPlease note that I used\
    \ the option -d of psql to connect directly to the database application. As you\
    \ can see, now we have two tables. The first, alembic_version is a simple one\
    \ that Alembic uses to keep track of the state of the db, while room is the one\
    \ that will contain our Room entities.\n\nWe can double-check the Alembic version\n\
    \n```\napplication=# select * from alembic_version;\n version_num\n--------------\n\
    \ 4d4c19952a36\n(1 row)\n```\n\nAs I mentioned before, the hash given to the migration\
    \ will be different in your case, but that value that you see in this table should\
    \ be consistent with the name of the migration script.\n\nWe can also see the\
    \ structure of the table room\n\n```\napplication=# \\d room\nTable \"public.room\"\
    \n Column   |           Type           | Collation | Nullable |              Default\n\
    -----------+--------------------------+-----------+----------+-----------------------------------\n\
    \ id        | integer                  |           | not null | nextval('room_id_seq'::regclass)\n\
    \ code      | character varying(36)    |           | not null |\n size      |\
    \ integer                  |           |          |\n price     | integer    \
    \              |           |          |\n longitude | double precision       \
    \  |           |          |\n latitude  | double precision         |         \
    \  |          |\nIndexes:\n    \"room_pkey\" PRIMARY KEY, btree (id)\n```\n\n\
    Clearly, there are still no rows contained in that table\n\n```\napplication=#\
    \ select * from room;\n id | code | size | price | longitude | latitude\n----+------+------+-------+-----------+----------\n\
    (0 rows)\n```\n\nAnd indeed, if you open http://localhost:8080/rooms with your\
    \ browser you will see a successful response, but no data.\nTo see some data we\
    \ need to write something into the database. This is normally done through a form\
    \ in the web application and a specific endpoint, but for the sake of simplicity\
    \ in this case we can just add data manually to the database.\n\n```\napplication=#\
    \ INSERT INTO room(code, size, price, longitude, latitude) VALUES ('f853578c-fc0f-4e65-81b8-566c5dffa35a',\
    \ 215, 39, -0.09998975, 51.75436293);\nINSERT 0 1\n```\n\nYou can verify that\
    \ the table contains the new room with a SELECT"
  mdcn: "请注意，`template0` 和 `template1` 这两个数据库是 Postgres 创建的系统数据库（参见文档<sup>32</sup>），`postgres`\
    \ 是 Docker 容器创建的默认数据库（默认名称为 `postgres`，但在此例中它来自 `config/production.json` 中的环境变量\
    \ `POSTGRES_DB`），而 `application` 是通过 `./manage.py init-postgres`（使用 `APPLICATION_DB`）创建的数据库。\n\
    \n我们可以使用 `\\c` 命令连接到数据库：\n\n```\npostgres=# \\c application\nYou are now connected\
    \ to database \"application\" as user \"postgres\".\napplication=#\n```\n\n请注意，提示符会随当前数据库的名称而变化。最后，我们可以使用\
    \ `\\dt` 列出可用的表：\n\n```\napplication=# \\dt\nDid not find any relations.\n```\n\
    \n如你所见，目前还没有表。这并不奇怪，因为我们还没有做任何事情让 Postgres 知道我们创建的模型。请记住，我们在这里所做的一切都是在一个外部系统中完成的，它与实体没有直接连接。\n\
    \n正如你所记得的，我们将实体映射到了存储对象，并且由于我们使用的是 Postgres，我们利用了 SQLAlchemy 类，所以现在我们需要创建与之对应的数据库表。\n\
    \n## 迁移\n\n我们需要一种方法来创建与我们在 `rentomatic/repository/postgres_objects.py` 中定义的对象相对应的表。当我们使用像\
    \ SQLAlchemy 这样的 ORM 时，最好的策略是创建并运行迁移，为此我们可以使用 Alembic<sup>33</sup>。\n\n如果你仍然通过\
    \ psql 连接，请使用 `\\q` 退出，然后编辑 `requirements/prod.txt` 并添加 `alembic`：\n\n第 08 章 运行生产就绪系统\n\
    \n137\n\n- Flask\n- SQLAlchemy\n- psycopg2\n- pymongo\n- gunicorn\n- alembic\n\
    \n像往常一样，记得运行 `pip install -r requirements/dev.txt` 来更新虚拟环境。\n\nAlembic 能够连接到数据库并运行\
    \ Python 脚本（称为“迁移”）来根据 SQLAlchemy 模型修改表。然而，为此，我们需要向 Alembic 提供数据库的访问权限，包括用户名、密码、主机名和数据库名称。我们还需要让\
    \ Alembic 访问代表模型的 Python 类。\n\n首先，让我们初始化 Alembic。在项目的主目录（存储 `manage.py` 的地方）运行：\n\
    \n```\n$ alembic init migrations\n```\n\n这将创建一个名为 `migrations` 的目录，其中包含 Alembic\
    \ 的配置文件，以及将在 `migrations/versions` 中创建的迁移。它还会创建一个包含配置值的文件 `alembic.ini`。名称 `migrations`\
    \ 完全是任意的，所以如果你愿意，可以使用不同的名称。\n\n我们需要调整的特定文件是 `migrations/env.py`，以让 Alembic 了解我们的模型和数据库。添加以下高亮显示的行：\n\
    \nmigrations/env.py\n\n```\nimport os\n\nfrom logging.config import fileConfig\n\
    \nfrom sqlalchemy import engine_from_config\nfrom sqlalchemy import pool\n\nfrom\
    \ alembic import context\n\n# this is the Alembic Config object, which provides\n\
    # access to the values within the .ini file in use.\nconfig = context.config\n\
    \nsection = config.config_ini_section\nconfig.set_section_option(\n    section,\
    \ \"POSTGRES_USER\", os.environ.get(\"POSTGRES_USER\"))\nconfig.set_section_option(\n\
    \    section, \"POSTGRES_PASSWORD\", os.environ.get(\"POSTGRES_PASSWORD\")\n)\n\
    config.set_section_option(\n    section, \"POSTGRES_HOSTNAME\", os.environ.get(\"\
