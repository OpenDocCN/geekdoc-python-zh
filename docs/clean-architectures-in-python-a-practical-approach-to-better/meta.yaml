  md: "The problem we have testing an endpoint is that we need the webserver to be\
    \ up and running when we hit the test URLs. The webserver itself is an external\
    \ system so we won’t test it, but the code that provides the endpoint is part\
    \ of our application<sup>23</sup>. It is actually a gateway, that is an interface\
    \ that allows an HTTP framework to access the use cases.\n\nThe extension pytest-flask\
    \ allows us to run Flask, simulate HTTP requests, and test the HTTP responses.\
    \ This extension hides a lot of automation, so it might be considered a bit “magic”\
    \ at a first glance. When you install it some fixtures like `client` are available\
    \ automatically, so you don’t need to import them. Moreover, it tries to access\
    \ another fixture named `app` that you have to define. This is thus the first\
    \ thing to do.\n\nFixtures can be defined directly in your test file, but if we\
    \ want a fixture to be globally available the best place to define it is the file\
    \ `conftest.py` which is automatically loaded by pytest. As you can see there\
    \ is a great deal of automation, and if you are not aware of it you might be surprised\
    \ by the results, or frustrated by the errors.\n\n```\ntests/conftest.py\n\npython\n\
    import pytest\n\nfrom application.app import create_app\n\n@pytest.fixture\ndef\
