    \ while setting up a proper integration testing environment is not trivial, the\
    \ changes that our architecture required to work with a real repository are very\
    \ limited. I think this is a good demonstration of the flexibility of a layered\
    \ approach such as the one at the core of the clean architecture.\n\nSince this\
    \ chapter mixed the setup of the integration testing with the introduction of\
