- md: '## Advantages of a layered architecture


    As you can see, the stages of this process are clearly separated, and there is
    a great deal of data transformation between them. Using common data formats is
    one of the way we achieve independence, or loose coupling, between components
    of a computer system.


    To better understand what loose coupling means for a programmer, let’s consider
    the last picture. In the previous paragraphs I gave an example of a system that
    uses a web framework for the user interface and a relational database for the
    data source, but what would change if the front-end part was a command-line interface?
    And what would change if, instead of a relational database, there was another
    type of data source, for example a set of text files?


    ![](img/15b1ab14aa279f39ae10009865354088_23_0.png)


    The web framework replaced by a CLI


    concerned with that specific part of the system, and adding the business logic
    to it mixes two very different fields.


    > **Separation of concerns**

    Different parts a system should manage different parts of the process. Whenever
    two separate parts of a system work on the same data or the same part of a process
    they are *coupled*. While coupling is unavoidable, the higher the coupling between
    two components the harder is to change one without affecting the other.


    As we will see, separating layers allows us to maintain the system with less effort,
    making single parts of it more testable and easily replaceable.

    In the example that we are discussing here, the use case needs to fetch all the
    rooms that are in an available state, extracting them from a source of data. This
    is the business logic, and in this case it is very straightforward, as it will
    probably consist of a simple filtering on the value of an attribute. This might
    however not be the case. An example of a more advanced business logic might be
    an ordering based on a recommendation system, which might require the use case
    to connect with more components than just the data source.

    So, the information that the use case wants to process is stored somewhere. Let’s
    call this component *storage system*. Many of you probably already pictured a
    database in your mind, maybe a relational one, but that is just one of the possible
    data sources. The abstraction represented by the storage system is: anything that
    the use case can access and that can provide data is a source. It might be a file,
    a database (either relational or not), a network endpoint, or a remote sensor.


    > **Abstraction**

    When designing a system, it is paramount to think in terms of abstractions, or
    building blocks. A component has a role in the system, regardless of the specific
    implementation of that component. The higher the level of the abstraction, the
    less detailed are the components. Clearly, high-level abstractions don’t consider
    practical problems, which is why the abstract design has to be then implemented
    using specific solutions or technologies.


    For simplicity’s sake, let’s use a relational database like Postgres in this example,
    as it is likely to be familiar to the majority of readers, but keep in mind the
    more generic case.


    ![](img/15b1ab14aa279f39ae10009865354088_18_0.png)


    How does the use case connect with the storage system? Clearly, if we hard code
    into the use case the calls to a specific system (e.g. using SQL) the two components
    will be *strongly coupled*, which is something we try to avoid in system design.
    Coupled components are not independent, they are tightly connected, and changes
    occurring in one of the two force changes in the second one (and vice versa).
    This also means that testing components is more difficult, as one component cannot
    live without the other, and when the second component is a complex system like
    a database this can severely slow down development.


    For example, let’s assume the use case called directly a specific Python library
    to access PostgreSQL such as psycopg2. This would couple the use case with that
    specific source, and a change of database would result in a change of its code.
    This is far from being ideal, as the use case contains the business logic, which
    has not changed moving from one database system to the other. Parts of the system
    that do not contain the business logic should be treated like implementation details.


    > **Implementation detail**


    A specific solution or technology is called a *detail* when it is not central
    to the design as a whole. The word doesn’t refer to the inherent complexity of
    the subject, which might be greater than that of more central parts.


    A relational database is hundred of times richer and more complex than an HTTP
    endpoint, and this in turn is more complex than ordering a list of objects, but
    the core of the application is the use case, not the way we store data or the
    way we provide access to that. Usually, implementation details are mostly connected
    with performances or usability, while the core parts implement the pure business
    logic.


    How can we avoid strong coupling? A simple solution is called *inversion of control*,
    and I will briefly sketch it here, and show a proper implementation in a later
    section of the book, when we will implement this very example.


    Inversion of control happens in two phases. First, the called object (the database
    in this case) is wrapped with a standard interface. This is a set of functionalities
    shared by every implementation of the target, and each interface translates the
    functionalities to calls to the specific language of the wrapped implementation.


    > **Inversion of control**


    A technique used to avoid strong coupling between components of a system, that
    involves wrapping them so that they expose a certain interface. A component expecting
    that interface can then connect to them without knowing the details of the specific
    implementation, and thus being strongly coupled to the interface instead of the
    specific implementation.


    A real world example of this is that of power plugs: electric appliances are designed
    to be connected not with specific power plugs, but to any power plug that is build
    according to the specification (size, number of poles, etc). When you buy a TV
    in the UK, you expect it to come with a UK plug (BS 1363). If it doesn’t, you
    need an *adapter* that allows you to plug electronic devices into sockets of a
    foreign nation. In this case, we need to connect the use case (TV) to a database
    (power system) that have not been designed to match a common interface.


    In the example we are discussing, the use case needs to extract all rooms with
    a given status, so the database wrapper needs to provide a single entry point
    that we might call `list_rooms_with_status`.


    ![](img/15b1ab14aa279f39ae10009865354088_20_0.png)


    In the second phase of inversion of control the caller (the use case) is modified
    to avoid hard coding the call to the specific implementation, as this would again
    couple the two. The use case accepts an incoming object as a parameter of its
    constructor, and receives a concrete instance of the adapter at creation time.
    The specific technique used to implement this depends greatly on the programming
    language we use. Python doesn’t have an explicit syntax for interfaces, so we
    will just assume the object we pass implements the required methods.


    ![](img/15b1ab14aa279f39ae10009865354088_21_0.png)


    Now the use case is connected with the adapter and knows the interface, and it
    can call the entry point `list_rooms_with_status` passing the status available.
    The adapter knows the details of the storage system, so it converts the method
    call and the parameter in a specific call (or set of calls) that extract the requested
    data, and then converts them in the format expected by the use case. For example,
    it might return a Python list of dictionaries that represent rooms.


    ![](img/15b1ab14aa279f39ae10009865354088_21_1.png)


    At this point, the use case has to apply the rest of the business logic, if needed,
    and return the result to the web framework.


    ![](img/15b1ab14aa279f39ae10009865354088_22_0.png)


    The business logic returns processed data to the web framework


    The web framework converts the data received from the use case into an HTTP response.
    In this case, as we are considering an endpoint that is supposed to be reached
    explicitly by the user of the website, the web framework will return an HTML page
    in the body of the response, but if this was an internal endpoint, for example
    called by some asynchronous JavaScript code in the front-end, the body of the
    response would probably just be a JSON structure.


    ![](img/15b1ab14aa279f39ae10009865354088_22_1.png)


    The web framework returns the data in an HTTP response'
  mdcn: '## 分层架构的优势


    如你所见，此过程的各个阶段被清晰地分隔开来，并且它们之间存在大量的数据转换。使用通用的数据格式是我们实现计算机系统组件之间独立性（或松耦合）的方式之一。


    为了更好地理解松耦合对程序员意味着什么，让我们回顾一下上一幅图。在前面的段落中，我举了一个使用 Web 框架作为用户界面和关系型数据库作为数据源的系统示例，但如果前端部分是一个命令行界面，情况会有什么变化呢？如果数据源不是关系型数据库，而是另一种类型的数据源，例如一组文本文件，又会有什么变化呢？


    ![](img/15b1ab14aa279f39ae10009865354088_23_0.png)


    Web 框架被 CLI 替换


    关注系统的特定部分，并将业务逻辑添加到其中，会混合两个非常不同的领域。


    > **关注点分离**

    系统的不同部分应管理流程的不同部分。每当系统的两个独立部分处理相同的数据或流程的相同部分时，它们就是*耦合*的。虽然耦合不可避免，但两个组件之间的耦合度越高，就越难在不影响另一个组件的情况下更改其中一个。


    正如我们将看到的，分层使我们能够以更少的精力维护系统，使其各个部分更易于测试和替换。

    在我们这里讨论的示例中，用例需要获取所有处于可用状态的房间，从数据源中提取它们。这就是业务逻辑，在这种情况下它非常直接，因为它可能只涉及对属性值的简单过滤。然而，情况可能并非如此。更高级的业务逻辑示例可能是基于推荐系统的排序，这可能要求用例连接的组件不仅仅是数据源。

    因此，用例想要处理的信息存储在某个地方。让我们将这个组件称为*存储系统*。你们中的许多人可能已经在脑海中想象了一个数据库，也许是关系型数据库，但这只是可能的数据源之一。存储系统所代表的抽象是：用例可以访问并能提供数据的任何东西都是一个源。它可能是一个文件、一个数据库（关系型或非关系型）、一个网络端点或一个远程传感器。


    > **抽象**

    在设计系统时，从抽象或构建块的角度思考至关重要。一个组件在系统中扮演一个角色，无论该组件的具体实现如何。抽象的层次越高，组件的细节就越少。显然，高层次的抽象不考虑实际问题，这就是为什么抽象设计必须随后使用特定的解决方案或技术来实现。


    为简单起见，让我们在这个示例中使用像 Postgres 这样的关系型数据库，因为它可能为大多数读者所熟悉，但请记住更通用的情况。


    ![](img/15b1ab14aa279f39ae10009865354088_18_0.png)


    用例如何与存储系统连接？显然，如果我们把对特定系统（例如使用 SQL）的调用硬编码到用例中，这两个组件将是*强耦合*的，这是我们试图在系统设计中避免的。耦合的组件不是独立的，它们紧密连接，其中一个组件中发生的更改会迫使第二个组件也进行更改（反之亦然）。这也意味着测试组件更加困难，因为一个组件不能脱离另一个组件而存在，而当第二个组件是一个像数据库这样的复杂系统时，这可能会严重拖慢开发速度。


    例如，让我们假设用例直接调用了一个特定的 Python 库来访问 PostgreSQL，比如 psycopg2。这将使用例与该特定源耦合，更改数据库将导致其代码更改。这远非理想，因为用例包含业务逻辑，而业务逻辑在从一个数据库系统迁移到另一个数据库系统时并未改变。系统中不包含业务逻辑的部分应被视为实现细节。


    > **实现细节**

    当某个特定的解决方案或技术对于整体设计并非核心时，它被称为*细节*。这个词并不指代主题本身的复杂性，这种复杂性可能比更核心的部分更大。


    关系型数据库比 HTTP 端点丰富和复杂数百倍，而 HTTP 端点又比对对象列表进行排序更复杂，但应用程序的核心是用例，而不是我们存储数据的方式或提供数据访问的方式。通常，实现细节主要与性能或可用性相关，而核心部分则实现纯粹的业务逻辑。


    我们如何避免强耦合？一个简单的解决方案称为*控制反转*，我将在这里简要概述它，并在本书后面的章节中展示一个适当的实现，届时我们将实现这个具体的例子。


    控制反转分两个阶段发生。首先，被调用的对象（在本例中是数据库）被一个标准接口包装。这是一组由目标的每个实现共享的功能，每个接口将这些功能转换为对被包装实现的特定语言的调用。


    > **控制反转**

    一种用于避免系统组件之间强耦合的技术，涉及将它们包装起来，以便它们暴露某个接口。期望该接口的组件随后可以连接到它们，而无需了解特定实现的细节，从而与接口而非特定实现强耦合。


    一个现实世界的例子是电源插头：电器被设计为不是连接到特定的电源插头，而是连接到任何按照规范（尺寸、极数等）制造的电源插头。当您在英国购买电视时，您期望它带有英国插头（BS
    1363）。如果没有，您需要一个*适配器*，使您能够将电子设备插入外国的插座。在这种情况下，我们需要将用例（电视）连接到一个数据库（电源系统），而它们的设计并非为了匹配一个通用接口。


    在我们讨论的示例中，用例需要提取所有具有给定状态的房间，因此数据库包装器需要提供一个单一的入口点，我们可以称之为 `list_rooms_with_status`。


    ![](img/15b1ab14aa279f39ae10009865354088_20_0.png)


    在控制反转的第二阶段，调用者（用例）被修改以避免硬编码对特定实现的调用，因为这会再次将两者耦合。用例在其构造函数中接受一个传入对象作为参数，并在创建时接收适配器的具体实例。用于实现此目的的具体技术在很大程度上取决于我们使用的编程语言。Python
    没有显式的接口语法，因此我们将假设我们传递的对象实现了所需的方法。


    ![](img/15b1ab14aa279f39ae10009865354088_21_0.png)


    现在用例与适配器连接并知道该接口，它可以调用入口点 `list_rooms_with_status` 并传递状态 available。适配器知道存储系统的细节，因此它将方法调用和参数转换为特定的调用（或一组调用）以提取请求的数据，然后将其转换为用例期望的格式。例如，它可能返回一个表示房间的
    Python 字典列表。


    ![](img/15b1ab14aa279f39ae10009865354088_21_1.png)


    此时，用例必须应用其余的业务逻辑（如果需要），并将结果返回给 Web 框架。


    ![](img/15b1ab14aa279f39ae10009865354088_22_0.png)


    业务逻辑将处理后的数据返回给 Web 框架


    Web 框架将从用例接收的数据转换为 HTTP 响应。在这种情况下，由于我们考虑的是一个预期由网站用户显式访问的端点，Web 框架将在响应的正文中返回一个
    HTML 页面，但如果这是一个内部端点，例如由前端的一些异步 JavaScript 代码调用，响应的正文可能只是一个 JSON 结构。


    ![](img/15b1ab14aa279f39ae10009865354088_22_1.png)


    Web 框架在 HTTP 响应中返回数据'
