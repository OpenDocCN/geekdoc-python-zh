    # Chapter 01 A day in the life of a clean system


    > Must be my lucky day.

    > Terminator 2, 1991


    In this chapter I will introduce the reader to a (very simple) system designed
    with a clean architecture. The purpose of this introductory chapter is to familiarise
    with main concepts like separation of concerns and inversion of control, which
    are paramount in system design. While I describe how data flows in the system,
    I will purposefully omit details, so that we can focus on the global idea and
    not worry too much about the implementation. This example will be then explored
    in all its glorious details in the following chapters, so there will be time to
    discuss specific choices. For now, try to get the big picture.


    ## The data flow


    In the rest of the book, we will design together part of a simple web application
    that provides a room renting system. So, let’s consider that our “Rent-o-Matic”
    application[^1] is running at https://www.rentomatic.com, and that a user wants
    to see the available rooms. They open the browser and type the address, then clicking
    on menus and buttons they reach the page with the list of all the rooms that our
    company rents.


    Let’s assume that this URL is /rooms?status=available. When the user’s browser
    accesses that URL, an HTTP request reaches our system, where there is a component
    that is waiting for HTTP connections. Let’s call this component “web framework”[^2].


    The purpose of the web framework is to understand the HTTP request and to retrieve
    the data that we need to provide a response. In this simple case there are two
    important parts of the request, namely the endpoint itself (/rooms), and a single
    query string parameter, status=available. Endpoints are like commands for our
    system, so when a user accesses one of them, they signal to the system that a
    specific service has been requested, which in this case is the list of all the
    rooms that are available for rent.


    [^1]: I was inspired by the Sludge-O-Matic™ from Day of the Tentacle.

    [^2]: There are many more layers that the HTTP request has to go through before
    reaching the actual web framework, for example the web server, but since the purpose
    of those layers is mostly to increase performances, I am not going to consider
    them until the end of the book.

    [^3]: The word language, here, is meant in its broader sense. It might be a programming
    language, but also an API, a data format, or a protocol.


    ![](img/15b1ab14aa279f39ae10009865354088_17_0.png)


    The web framework serving HTTP


    The domain in which the web framework operates is that of the HTTP protocol, so
    when the web framework has decoded the request it should pass the relevant information
    to another component that will process it. This other component is called *use
    case*, and it is the crucial and most important component of the whole clean system
    as it implements the *business logic*.


    ![](img/15b1ab14aa279f39ae10009865354088_17_1.png)


    The business logic


    The business logic is an important concept in system design. You are creating
    a system because you have some knowledge that you think might be useful to the
    world, or at the very least marketable. This knowledge is, at the end of the day,
    a way to process data, a way to extract or present data that maybe others don''t
    have. A search engine can find all the web pages that are related to the terms
    in a query, a social network shows you the posts of people you follow and sorts
    them according to a specific algorithm, a travel company finds the best options
    for your journey between two locations, and so on. All these are good examples
    of business logic.


    > **Business logic**

    > Business logic is the specific algorithm or process that you want to implement,
    the way you transform data to provide a service. It is the most important part
    of the system.


    The use case implements a very specific part of the whole business logic. In this
    case we have a use case to search for rooms with a given value of the parameter
    *status*. This means that the use case has to extract all the rooms that are managed
    by our company and filter them to show only the ones that are available.


    Why can''t the web framework do it? Well, the main purpose of a good system architecture
    is to *separate concerns*, that is to keep different responsibilities and domains
    separated. The web framework is there to process the HTTP protocol, and is maintained
    by programmers that are'
