    parameter\"], err[\"message\"])\n            for err in invalid_request.errors\n\
    \        ]\n    )\n    return ResponseFailure(ResponseTypes.PARAMETERS_ERROR,\
    \ message)\n```\n\n通过 `_format_message()` 方法，我们使该类能够接受字符串消息和 Python 异常，这在处理可能引发我们不知道或不想管理的异常的外部库时非常方便。\n\
    \n`ResponseTypes` 类中包含的错误类型与 HTTP 错误非常相似，这在我们稍后从 Web 框架返回响应时将非常有用。`PARAMETERS_ERROR`\
    \ 表示请求传递的输入参数有问题。`RESOURCE_ERROR` 表示进程正确结束，但请求的资源不可用，例如从数据存储中读取特定值时。最后，`SYSTEM_ERROR`\
    \ 表示进程本身出了问题，主要用于指示 Python 代码中的异常。\n\n**源代码**\nhttps://github.com/pycabook/rentomatic/tree/ed2-c05-s05"
