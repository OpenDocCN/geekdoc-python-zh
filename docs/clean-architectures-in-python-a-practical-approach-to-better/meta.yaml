  md: '# # Changelog


    > > What’s the last thing you do remember? Hmm?

    >

    > Alien, 1979


    I will track here changes between releases of the book, following [Semantic Versioning](https://semver.org/).
    A change in the **major** number means an incompatible change, that is a big rewrite
    of the book, also known as 2nd edition, 3rd edition, and so on. A change in the
    **minor** number means that something important was added to the content, like
    a new section or chapter. A change in the **patch** number signals minor fixes
    like typos in the text or the code, rewording of sentences, and so on.


    **Current version: 2.1.2**


    # ## Version 2.1.2 (2022-01-06)


    +   - A fix in the Mau code prevents footnotes clashes in the Markua visitor when
    merging multiple files


    # ## Version 2.1.1 (2021-10-19)


    +   - A global review of footnotes and links to adapt them to Mau v2.0


    # ## Version 2.1.0 (2021-08-20)


    +   - This version is written in Mau but converted into Markua to publish the
    PDF using Leanpub’s processing chain.

    - Chapter 8 has been improved with migrations that correctly create the tables
    in the production database.

    - [Maxim Ivanov](https://github.com/ivanovmg) corrected many bugs both in the
    book and in the code repository, and fixed several inconsistencies between the
    two. An impressive job, thank you so much for your help!

    - GitHub user [robveijk](https://github.com/robveijk) spotted a mention to a file
    that is not included in the second edition. Thanks!

    - GitHub user [mathisheeren](https://github.com/mathisheeren) corrected a typo.
    Thank you!


    <sup>35</sup>https://semver.org/

    <sup>36</sup>https://github.com/ivanovmg

