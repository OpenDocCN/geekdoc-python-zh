- md: '## Introduction


    > Learn about the Force, Luke.

    >

    > Star Wars, 1977


    This book is about a software design methodology. A methodology is a set of guidelines
    that help you to reach your goal effectively, thus saving time, implementing far-sighted
    solutions, and avoiding the need to reinvent the wheel time and again.


    As other professionals around the world face problems and try to solve them, some
    of them, having discovered a good way to solve a problem, decide to share their
    experience, usually in the form of a “best practices” post on a blog, or talk
    at a conference. We also speak of *patterns*¹, which are formalised best practices,
    and *anti-patterns*, when it comes to advice about what not to do and why it is
    better to avoid a certain solution.


    Often, when best practices encompass a wide scope, they are designated a *methodology*.
    The definition of a methodology is to convey a method, more than a specific solution
    to a problem. The very nature of methodologies means they are not connected to
    any specific case, in favour of a wider and more generic approach to the subject
    matter. This also means that applying methodologies without thinking shows that
    one didn’t grasp the nature of a methodology, which is to help to find a solution
    and not to provide it.


    This is why the main advice I have to give is: be reasonable; try to understand
    why a methodology leads to a solution and adopt it if it fits your need. I’m saying
    this at the very beginning of this book because this is how I’d like you to approach
    this work of mine.


    The clean architecture, for example, pushes abstraction to its limits. One of
    the main concepts is that you should isolate parts of your system as much as possible,
    so you can replace them without affecting the rest. This requires a lot of abstraction
    layers, which might affect the performances of the system, and which definitely
    require a greater initial development effort. You might consider these shortcomings
    unacceptable, or perhaps be forced to sacrifice cleanness in favour of execution
    speed, as you cannot afford to waste resources.


    In these cases, break the rules.


    With methodologies you are always free to keep the parts you consider useful and
    discard the rest, and if you have understood the reason behind the methodology,
    you will also be aware of the reasons that support your decisions. My advice is
    to keep track of such reasons, either in design documents or simply in code comments,
    as a future reference for you or for any other programmer who might be surprised
    by a “wrong” solution and be tempted to fix it.


    ¹From the seminal book *Design Patterns: Elements of Reusable Object-Oriented
    Software* by Gamma, Vlissides, Johnson, and Helm.


    I will try as much as possible to give reasons for the proposed solutions, so
    you can judge whether those reasons are valid in your case. In general let’s say
    this book contains possible contributions to your job, it’s not an attempt to
    dictate THE best way to work.


    Spoiler alert: there is no such a thing.


    ## What is a software architecture?


    Every production system, be it a software package, a mechanical device, or a simple
    procedure, is made of components and connections between them. The purpose of
    the connections is to use the output of some components as inputs of other components,
    in order to perform a certain action or set of actions.


    In a process, the architecture specifies which components are part of an implementation
    and how they are interconnected.


    A simple example is the process of writing a document. The process, in this case,
    is the conversion of a set of ideas and sentences into a written text, and it
    can have multiple implementations. A very simple one is when someone writes with
    a pen on a sheet of paper, but it might become more complex if we add someone
    who is writing what another person dictates, multiple proof readers who can send
    back the text with corrections, and a designer who curates the visual rendering
    of the text. In all these cases the process is the same, and the nature of inputs
    (ideas, sentences) and outputs (a document or a book) doesn’t change. The different
    architecture, however, can greatly affect the quality of the output, or the speed
    with which it is produced.


    An architecture can have multiple granularities, which are the “zoom level” we
    use to look at the components and their connections. The first level is the one
    that describes the whole process as a black box with inputs and outputs. At this
    level we are not even concerned with components, we don’t know what’s inside the
    system and how it works. We only know what it does.


    As you zoom in, you start discovering the details of the architecture, that is
    which components are in the aforementioned black box and how they are connected.
    These components are in turn black boxes, and you don’t want to know specifically
    how they work, but you want to know what their inputs and outputs are, where the
    inputs come from, and how the outputs are used by other components.


    This process is virtually unlimited, so there is never one single architecture
    that describes a complete system, but rather a set of architectures, each one
    covering the granularity we are interested in.


    Let me go over another simple example that has nothing to do with software. Let’s
    consider a shop as a system and let’s discuss its architecture.


    A shop, as a black box, is a place where people enter with money and exit with
    items (if they found what they were looking for). The input of the system are
    people and their money, and the outputs are the same people and items. The shop
    itself needs to buy what it sells first, so another input is represented by the
    stock the shop buys from the wholesaler and another output by the money it pays
    for it. At this level the internal structure of the shop is unknown, we don’t
    even know what it sells. We can however already devise a simple performance analysis,
    for example comparing the amount of money that goes out (to pay the wholesaler)
    and the amount of money that comes in (from the customers). If the former is higher
    than the latter the business is not profitable.


    Even in the case of a shop that has positive results we might want to increase
    its performances, and to do this chances are that we need to understand its internal
    structure and what we can change to increase its productivity. This may reveal,
    for example, that the shop has too many workers, who are underemployed waiting
    for clients because we overestimated the size of the business. Or it might show
    that the time taken to serve clients is too long and many clients walk away without
    buying anything. Or maybe there are not enough shelves to display goods and the
    staff carries stock around all day searching for display space so the shop is
    in chaos and clients cannot find what they need.


    At this level, however, workers are pure entities, and still we don’t know much
    about the shop. To better understand the reasons behind a problem we might need
    to increase the zoom level and look at the workers for what they are, human beings,
    and start understanding what their needs are and how to help them to work better.


    This example can easily be translated into the software realm. Our shop is a processing
    unit in the cloud, for example, input and output being the money we pay and the
    amount of requests the system serves per second, which is probably connected with
    the income of the business. The internal processes are revealed by a deeper analysis
    of the resources we allocate (storage, processors, memory), which breaks the abstraction
    of the “processing unit” and reveals details like the hardware architecture or
    the operating system. We might go deeper, discussing the framework or the library
    we used to implement a certain service, the programming language we used, or the
    specific hardware on which the whole system runs.


    Remember that an architecture tries to detail how a process is implemented at
    a certain granularity, given certain assumptions or requirements. The quality
    of an architecture can then be judged on the basis of parameters such as its cost,
    the quality of the outputs, its simplicity or “elegance”, the amount of effort
    required to change it, and so on.


    ## Why is it called “clean”?


    The architecture explained in this book has many names, but the one that is mainly
    in use nowadays is “clean architecture”. This is the name used by Robert Martin
    in [his seminal post](https://blog.cleancoder.com/uncle-bob/2012/08/13/the-clean-architecture.html)
    where he clearly states this structure is not a novelty, but has been promoted
    by many software designers over the years. I believe the adjective “clean” describes
    one of the fundamental aspects of both the software structure and the development
    approach of this architecture. It is clean, that is, it is easy to understand
    what happens.


    The clean architecture is the opposite of spaghetti code, where everything is
    interlaced and there are no single elements that can be easily detached from the
    rest and replaced without the whole'
  mdcn: '## 引言


    > 学习原力吧，卢克。

    >

    > 《星球大战》，1977年


    本书是关于一种软件设计方法论的。方法论是一套指导原则，能帮助你有效地达成目标，从而节省时间、实施具有前瞻性的解决方案，并避免反复重复造轮子。


    当世界各地的其他专业人士遇到问题并尝试解决时，其中一些人发现了好的解决方法，决定分享他们的经验，通常是以博客上的“最佳实践”文章或会议演讲的形式。我们也会谈到*模式*¹，即形式化的最佳实践，以及*反模式*，即关于不该做什么以及为何应避免某种解决方案的建议。


    通常，当最佳实践涵盖范围广泛时，它们就被指定为一种*方法论*。方法论的定义是传达一种方法，而不仅仅是针对某个问题的具体解决方案。方法论的本质意味着它们不与任何特定案例挂钩，而是倾向于对主题采用更广泛、更通用的方法。这也意味着，不加思考地应用方法论表明一个人没有理解方法论的本质——方法论是帮助寻找解决方案，而不是提供解决方案。


    这就是为什么我要给出的主要建议是：保持理性；尝试理解一种方法论为何能导向一个解决方案，并在它符合你需求时采纳它。我在本书开头就说这些，是因为我希望你以这种方式来阅读我的这部作品。


    例如，整洁架构将抽象推向了极限。其主要概念之一是，你应该尽可能地隔离系统的各个部分，以便在不影响其他部分的情况下替换它们。这需要大量的抽象层，这可能会影响系统的性能，并且肯定需要更大的初始开发投入。你可能认为这些缺点是不可接受的，或者可能被迫为了执行速度而牺牲整洁性，因为你无法承受资源浪费。


    在这些情况下，打破规则。


    对于方法论，你总是可以自由地保留你认为有用的部分，丢弃其余部分。如果你理解了方法论背后的原因，你也会意识到支持你决策的理由。我的建议是记录下这些理由，无论是在设计文档中还是简单地在代码注释中，作为你或任何其他可能对“错误”解决方案感到惊讶并试图修正它的程序员的未来参考。


    ¹源自 Gamma、Vlissides、Johnson 和 Helm 的开创性著作《设计模式：可复用面向对象软件的基础》。


    我将尽可能为提出的解决方案提供理由，以便你判断这些理由在你的情况下是否有效。总的来说，可以说本书包含了对你工作的可能贡献，而不是试图规定唯一最佳的工作方式。


    剧透警告：不存在这样的东西。


    ## 什么是软件架构？


    每个生产系统，无论是软件包、机械设备还是简单流程，都是由组件及其之间的连接组成的。连接的目的是将某些组件的输出用作其他组件的输入，以执行某个动作或一组动作。


    在一个流程中，架构指定了哪些组件是实现的一部分，以及它们如何相互连接。


    一个简单的例子是编写文档的过程。在这种情况下，流程是将一组想法和句子转换为书面文本，它可以有多种实现方式。一个非常简单的实现是有人用笔在纸上书写，但如果我们加入一个记录他人口述内容的人、多个可以退回修改后文本的校对员，以及一个负责文本视觉呈现的设计师，它可能会变得更复杂。在所有这些情况下，流程是相同的，输入（想法、句子）和输出（文档或书籍）的性质没有改变。然而，不同的架构会极大地影响输出的质量或其生成速度。


    架构可以有多种粒度，这是我们观察组件及其连接的“缩放级别”。第一个级别是将整个过程描述为一个具有输入和输出的黑盒子。在这个级别上，我们甚至不关心组件，我们不知道系统内部是什么以及它如何工作。我们只知道它做什么。


    当你放大时，你开始发现架构的细节，即上述黑盒子中有哪些组件以及它们如何连接。这些组件本身又是黑盒子，你不想具体知道它们如何工作，但你想知道它们的输入和输出是什么，输入来自哪里，以及输出如何被其他组件使用。


    这个过程实际上是无限的，因此永远没有一个单一的架构能描述一个完整的系统，而是一组架构，每个架构都覆盖我们感兴趣的粒度。


    让我再举一个与软件无关的简单例子。让我们把一家商店视为一个系统，并讨论它的架构。


    一家商店，作为一个黑盒子，是一个人们带着钱进入、带着商品离开（如果他们找到了想要的东西）的地方。系统的输入是人和他们的钱，输出是相同的人和商品。商店本身需要先购买它所销售的东西，因此另一个输入是商店从批发商那里购买的库存，另一个输出是它为此支付的钱。在这个级别上，商店的内部结构是未知的，我们甚至不知道它卖什么。然而，我们已经可以设计一个简单的性能分析，例如比较流出的钱（支付给批发商）和流入的钱（来自顾客）。如果前者高于后者，那么生意就不盈利。


    即使在一家业绩良好的商店，我们也可能希望提高其业绩，为此我们很可能需要理解其内部结构以及我们可以改变什么来提高其生产力。这可能会揭示，例如，商店有太多员工，他们因为高估了业务规模而等待客户，处于未充分就业状态。或者可能显示服务客户的时间太长，许多客户没有购买任何东西就离开了。或者可能没有足够的货架来展示商品，员工整天带着库存到处寻找展示空间，导致商店一片混乱，客户找不到他们需要的东西。


    然而，在这个级别上，员工仍然是纯粹的实体，我们仍然对商店了解不多。为了更好地理解问题背后的原因，我们可能需要增加缩放级别，将员工视为人类，并开始理解他们的需求以及如何帮助他们更好地工作。


    这个例子可以很容易地转化为软件领域。例如，我们的商店是云中的一个处理单元，输入和输出是我们支付的钱和系统每秒处理的请求数量，这可能与业务收入有关。内部过程通过更深入地分析我们分配的资源（存储、处理器、内存）来揭示，这打破了“处理单元”的抽象，并揭示了硬件架构或操作系统等细节。我们可能会更深入，讨论我们用来实现某个服务的框架或库、我们使用的编程语言，或者整个系统运行的特定硬件。


    请记住，架构试图在给定某些假设或需求的情况下，详细说明一个流程在特定粒度上是如何实现的。架构的质量可以根据其成本、输出质量、其简洁性或“优雅性”、更改所需的工作量等参数来评判。


    ## 为什么它被称为“整洁”？


    本书中解释的架构有许多名称，但目前主要使用的是“整洁架构”。这是罗伯特·马丁在他[开创性的文章](https://blog.cleancoder.com/uncle-bob/2012/08/13/the-clean-architecture.html)中使用的名称，他在文中明确指出这种结构并非新事物，而是多年来被许多软件设计师所倡导。我认为“整洁”这个形容词描述了这种架构的软件结构和开发方法的一个基本方面。它是整洁的，也就是说，它很容易理解发生了什么。


    整洁架构是意大利面条式代码的反面，后者中一切都交织在一起，没有单一元素可以轻松地从其余部分分离出来并在不影响整体的情况下被替换。'
