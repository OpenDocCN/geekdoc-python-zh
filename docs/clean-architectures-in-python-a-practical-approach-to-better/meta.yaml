    \ nullable=False)\n    size = Column(Integer)\n    price = Column(Integer)\n \
    \   longitude = Column(Float)\n    latitude = Column(Float)\n```\n\n这是表示数据库中房间的类。重要的是要理解，这不是我们在业务逻辑中使用的类，而是定义\
