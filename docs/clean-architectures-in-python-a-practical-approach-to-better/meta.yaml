- md: "## Error management in a use case\n\nOur implementation of requests and responses\
    \ is finally complete, so we can now implement the last version of our use case.\
    \ The function `room_list_use_case` is still missing a proper validation of the\
    \ incoming request, and is not returning a suitable response in case something\
    \ went wrong.\n\nThe test `test_room_list_without_parameters` must match the new\
    \ API, so I added `filters=None` to `assert_called_with`\n\n```python\ntests/use_cases/test_room_list.py\n\
    \ndef test_room_list_without_parameters(domain_rooms):\n    repo = mock.Mock()\n\
    \    repo.list.return_value = domain_rooms\n\n    request = build_room_list_request()\n\
    \n    response = room_list_use_case(repo, request)\n\n    assert bool(response)\
    \ is True\n    repo.list.assert_called_with(filters=None)\n    assert response.value\
    \ == domain_rooms\n```\n\nThere are three new tests that we can add to check the\
    \ behaviour of the use case when `filters` is not `None`. The first one checks\
    \ that the value of the key `filters` in the dictionary used to create the request\
    \ is actually used when calling the repository. These last two tests check the\
    \ behaviour of the use case when the repository raises an exception or when the\
    \ request is badly formatted.\n\n```python\ntests/use_cases/test_room_list.py\n\
    \nimport pytest\nimport uuid\nfrom unittest import mock\n\nfrom rentomatic.domain.room\
    \ import Room\nfrom rentomatic.use_cases.room_list import room_list_use_case\n\
    from rentomatic.requests.room_list import build_room_list_request\nfrom rentomatic.responses\
    \ import ResponseTypes\n\n...\n\ndef test_room_list_with_filters(domain_rooms):\n\
    \    repo = mock.Mock()\n    repo.list.return_value = domain_rooms\n\n    qry_filters\
    \ = {\"code__eq\": 5}\n    request = build_room_list_request(filters=qry_filters)\n\
    \n    response = room_list_use_case(repo, request)\n\n    assert bool(response)\
    \ is True\n    repo.list.assert_called_with(filters=qry_filters)\n    assert response.value\
    \ == domain_rooms\n```\n\n```python\ndef test_room_list_handles_generic_error():\n\
    \    repo = mock.Mock()\n    repo.list.side_effect = Exception(\"Just an error\
    \ message\")\n\n    request = build_room_list_request(filters={})\n\n    response\
    \ = room_list_use_case(repo, request)\n\n    assert bool(response) is False\n\
    \    assert response.value == {\n        \"type\": ResponseTypes.SYSTEM_ERROR,\n\
    \        \"message\": \"Exception: Just an error message\",\n    }\n```\n\n```python\n\
    def test_room_list_handles_bad_request():\n    repo = mock.Mock()\n\n    request\
    \ = build_room_list_request(filters=5)\n\n    response = room_list_use_case(repo,\
    \ request)\n\n    assert bool(response) is False\n    assert response.value ==\
    \ {\n        \"type\": ResponseTypes.PARAMETERS_ERROR,\n        \"message\": \"\
    filters: Is not iterable\",\n    }\n```\n\nNow change the use case to contain\
    \ the new use case implementation that makes all the tests pass\n\n```python\n\
    rentomatic/use_cases/room_list.py\n\nfrom rentomatic.responses import (\n    ResponseSuccess,\n\
    \    ResponseFailure,\n    ResponseTypes,\n    build_response_from_invalid_request,\n\
    )\n\n\ndef room_list_use_case(repo, request):\n    if not request:\n        return\
    \ build_response_from_invalid_request(request)\n    try:\n        rooms = repo.list(filters=request.filters)\n\
    \        return ResponseSuccess(rooms)\n    except Exception as exc:\n       \
    \ return ResponseFailure(ResponseTypes.SYSTEM_ERROR, exc)\n```\n\nAs you can see,\
    \ the first thing that the use case does is to check if the request is valid.\
    \ Otherwise, it returns a ResponseFailure built with the same request object.\
    \ Then the actual business logic is implemented, calling the repository and returning\
    \ a successful response. If something goes wrong in this phase the exception is\
    \ caught and returned as an aptly formatted ResponseFailure.\n\nSource code\n\
    https://github.com/pycabook/rentomatic/tree/ed2-c05-s06\n\n## Integrating external\
    \ systems\n\nI want to point out a big problem represented by mocks.\n\nAs we\
    \ are testing objects using mocks for external systems, like the repository, no\
    \ tests fail at the moment, but trying to run the Flask development server will\
    \ certainly return an error. As a matter of fact, neither the repository nor the\
    \ HTTP server are in sync with the new API, but this cannot be shown by unit tests\
    \ if they are properly written. This is the reason why we need integration tests,\
    \ since external systems that rely on a certain version of the API are running\
    \ only at that point, and this can raise issues that were masked by mocks.\n\n\
    For this simple project, my integration test is represented by the Flask development\
    \ server, which at this point crashes. If you run `FLASK_CONFIG=\"development\"\
    \ flask run` and open http://127.0.0.1:5000/rooms with your browser you will get\
    \ an Internal Server Error, and on the command line this exception\n\n```\nTypeError:\
    \ room_list_use_case() missing 1 required positional argument: 'request'\n```\n\
    \nThe same error is returned by the CLI interface. After the introduction of requests\
    \ and responses we didn't change the REST endpoint, which is one of the connections\
    \ between the external world and the use case. Given that the API of the use case\
    \ changed, we need to change the code of the endpoints that call the use case.\n\
    \n## The HTTP server\n\nAs we can see from the exception above the use case is\
    \ called with the wrong parameters in the REST endpoint. The new version of the\
    \ test is\n\n```python\ntests/rest/test_room.py\nimport json\nfrom unittest import\
    \ mock\n\nimport pytest\n\nfrom rentomatic.domain.room import Room\nfrom rentomatic.responses\
    \ import (\n    ResponseFailure,\n    ResponseSuccess,\n    ResponseTypes,\n)\n\
    \nroom_dict = {\n    \"code\": \"3251a5bd-86be-428d-8ae9-6e51a8048c33\",\n   \
    \ \"size\": 200,\n    \"price\": 10,\n    \"longitude\": -0.09998975,\n    \"\
    latitude\": 51.75436293,\n}\n\nrooms = [Room.from_dict(room_dict)]\n\n\n@mock.patch(\"\
    application.rest.room.room_list_use_case\")\ndef test_get(mock_use_case, client):\n\
    \    mock_use_case.return_value = ResponseSuccess(rooms)\n\n    http_response\
    \ = client.get(\"/rooms\")\n\n    assert json.loads(http_response.data.decode(\"\
    UTF-8\")) == [room_dict]\n\n    mock_use_case.assert_called()\n    args, kwargs\
    \ = mock_use_case.call_args\n    assert args[1].filters == {}\n\n    assert http_response.status_code\
    \ == 200\n    assert http_response.mimetype == \"application/json\"\n```\n\n```python\n\
    @mock.patch(\"application.rest.room.room_list_use_case\")\ndef test_get_with_filters(mock_use_case,\
    \ client):\n    mock_use_case.return_value = ResponseSuccess(rooms)\n\n    http_response\
    \ = client.get(\n        \"/rooms?filter_price__gt=2&filter_price__lt=6\"\n  \
    \  )\n\n    assert json.loads(http_response.data.decode(\"UTF-8\")) == [room_dict]\n\
    \n    mock_use_case.assert_called()\n    args, kwargs = mock_use_case.call_args\n\
    \    assert args[1].filters == {\"price__gt\": \"2\", \"price__lt\": \"6\"}\n\n\
    \    assert http_response.status_code == 200\n    assert http_response.mimetype\
    \ == \"application/json\"\n```\n\n```python\n@pytest.mark.parametrize(\n    \"\
    response_type, expected_status_code\",\n    [\n        (ResponseTypes.PARAMETERS_ERROR,\
    \ 400),\n        (ResponseTypes.RESOURCE_ERROR, 404),\n        (ResponseTypes.SYSTEM_ERROR,\
    \ 500),\n    ],\n)\n@mock.patch(\"application.rest.room.room_list_use_case\")\n\
    def test_get_response_failures(\n    mock_use_case,\n    client,\n    response_type,\n\
    \    expected_status_code,\n):\n    mock_use_case.return_value = ResponseFailure(\n\
    \        response_type,\n        message=\"Just an error message\",\n    )\n\n\
    \    http_response = client.get(\"/rooms?dummy_request_string\")\n\n    mock_use_case.assert_called()\n\
    \n    assert http_response.status_code == expected_status_code\n```\n\nThe function\
    \ `test_get` was already present but has been changed to reflect the use of requests\
    \ and responses. The first change is that the use case in the mock has to return\
    \ a proper response\n\n```python\nmock_use_case.return_value = ResponseSuccess(rooms)\n\
    ```\n\nand the second is the assertion on the call of the use case. It should\
    \ be called with a properly formatted request, but since we can’t compare requests,\
    \ we need a way to look into the call arguments. This can be done with\n\n```python\n\
    mock_use_case.assert_called()\nargs, kwargs = mock_use_case.call_args\nassert\
    \ args[1].filters == {}\n```\n\nas the use case should receive a request with\
    \ empty filters as an argument.\n\nThe function `test_get_with_filters` performs\
    \ the same operation but passing a query string to the URL `/rooms`, which requires\
    \ a different assertion\n\n```python\nassert args[1].filters == {'price__gt':\
    \ '2', 'price__lt': '6'}\n```\n\nBoth the tests pass with a new version of the\
    \ endpoint `room_list`."
