    \ 网络进行远程调用的复杂系统。\n\n仓库的一个非常重要的特性是它可以返回领域模型，这与框架 ORM 通常所做的是一致的。第三层的元素可以访问内部层定义的所有元素，这意味着领域模型和用例可以直接从仓库调用和使用。\n\
