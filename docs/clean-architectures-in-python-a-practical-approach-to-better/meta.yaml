    \ database and to create the table. Remember that SQLAlchemy has a declarative\
    \ approach, so we need to instantiate the object Base and then use it as a starting\
    \ point to declare the tables/objects.\n\n```\nclass Room(Base):\n    __tablename__\
    \ = 'room'\n\n    id = Column(Integer, primary_key=True)\n\n    code = Column(String(36),\
    \ nullable=False)\n    size = Column(Integer)\n    price = Column(Integer)\n \
