    The first function is a hook into the pytest CLI parser that adds the option --integration.
    When this option is specified on the command line the pytest setup will contain
    the key integration with value True.


    The second function is a hook into the pytest setup of every single test. The
    variable item contains the test itself (actually a _pytest.python.Function object),
    which in turn contains two useful pieces of information. The first is the attribute
    item.keywords, that contains the test marks, alongside many other interesting
    things like the name of the test, the file, the module, and also information about
