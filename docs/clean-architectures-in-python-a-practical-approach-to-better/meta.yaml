- md: "The next thing you might notice is that I used a simple function. In the first\
    \ edition of this book I used a class for the use case, and thanks to the nudge\
    \ of a couple of readers I started to question my choice, so I want to briefly\
    \ discuss the options you have.\n\nThe use case represents the business logic,\
    \ a process, which means that the simplest implementation you can have in a programming\
    \ language is a function: some code that receives input arguments and returns\
    \ output data. A class is however another option, as in essence it is a collection\
    \ of variables and functions. So, as in many other cases, the question is if you\
    \ should use a function or a class, and my answer is that it depends on the degree\
    \ of complexity of the algorithm that you are implementing.\n\nYour business logic\
    \ might be complicated, and require the connection with several external systems,\
    \ though, each one with a specific initialisation, while in this simple case I\
    \ just pass in the repository. So, in principle, I don’t see anything wrong in\
    \ using classes for use cases, should you need more structure for your algorithms,\
    \ but be careful not to use them when a simpler solution (functions) can perform\
    \ the same job, which is the mistake I made in the previous version of this code.\
    \ Remember that code has to be maintained, so the simpler it is, the better.\n\
    \n**Source code**\nhttps://github.com/pycabook/rentomatic/tree/ed2-c03-s06\n\n\
    ## The storage system\n\nDuring the development of the use case, we assumed it\
    \ would receive an object that contains the data and exposes a `list` function.\
    \ This object is generally nicknamed “repository”, being the source of information\
    \ for the use case. It has nothing to do with the Git repository, though, so be\
    \ careful not to mix the two nomenclatures.\n\nThe storage lives in the fourth\
    \ layer of the clean architecture, the external systems. The elements in this\
    \ layer are accessed by internal elements through an interface, which in Python\
    \ just translates to exposing a given set of methods (in this case only `list`).\
    \ It is worth noting that the level of abstraction provided by a repository in\
    \ a clean architecture is higher than that provided by an ORM in a framework or\
    \ by a tool like SQLAlchemy. The repository provides only the endpoints that the\
    \ application needs, with an interface which is tailored to the specific business\
    \ problems the application implements.\n\nTo clarify the matter in terms of concrete\
    \ technologies, SQLAlchemy is a wonderful tool to abstract the access to an SQL\
    \ database, so the internal implementation of the repository could use it to access\
    \ a PostgreSQL database, for example. But the external API of the layer is not\
    \ that provided by SQLAlchemy. The API is a reduced set of functions that the\
    \ use cases call to get the data, and the internal implementation can use a wide\
    \ range of solutions to achieve the same goal, from raw SQL queries to a complex\
    \ system of remote calls through a RabbitMQ network.\n\nA very important feature\
    \ of the repository is that it can return domain models, and this is in line with\
    \ what framework ORMs usually do. The elements in the third layer have access\
    \ to all the elements defined in the internal layers, which means that domain\
    \ models and use cases can be called and used directly from the repository.\n\n\
    For the sake of this simple example, we will not deploy and use a real database\
    \ system. Given what we said, we are free to implement the repository with the\
    \ system that better suits our needs, and in this case I want to keep everything\
    \ simple. We will thus create a very simple in-memory storage system loaded with\
    \ some predefined data.\n\nThe first thing to do is to write some tests that document\
    \ the public API of the repository. The file containing the tests is `tests/repository/test_memrepo.py`.\n\
    \n```\ntests/repository/test_memrepo.py\n\nimport pytest\n\nfrom rentomatic.domain.room\
    \ import Room\nfrom rentomatic.repository.memrepo import MemRepo\n\n\n@pytest.fixture\n\
    def room_dicts():\n    return [\n        {\n            \"code\": \"f853578c-fc0f-4e65-81b8-566c5dffa35a\"\
    ,\n            \"size\": 215,\n            \"price\": 39,\n            \"longitude\"\
    : -0.09998975,\n            \"latitude\": 51.75436293,\n        },\n        {\n\
    \            \"code\": \"fe2c3195-aeff-487a-a08f-e0bdc0ec6e9a\",\n           \
    \ \"size\": 405,\n            \"price\": 66,\n            \"longitude\": 0.18228006,\n\
    \            \"latitude\": 51.74640997,\n        },\n        {\n            \"\
    code\": \"913694c6-435a-4366-ba0d-da5334a611b2\",\n            \"size\": 56,\n\
    \            \"price\": 60,\n            \"longitude\": 0.27891577,\n        \
    \    \"latitude\": 51.45994069,\n        },\n        {\n            \"code\":\
    \ \"eed76e77-55c1-41ce-985d-ca49bf6c0585\",\n            \"size\": 93,\n     \
    \       \"price\": 48,\n            \"longitude\": 0.33894476,\n            \"\
    latitude\": 51.39916678,\n        },\n    ]\n\n\ndef test_repository_list_without_parameters(room_dicts):\n\
    \    repo = MemRepo(room_dicts)\n\n    rooms = [Room.from_dict(i) for i in room_dicts]\n\
    \n    assert repo.list() == rooms\n```\n\nIn this case, we need a single test\
    \ that checks the behaviour of the method `list`. The implementation that passes\
    \ the test goes in the file `rentomatic/repository/memrepo.py`.\n\n```\nrentomatic/repository/memrepo.py\n\
    \nfrom rentomatic.domain.room import Room\n\n\nclass MemRepo:\n    def __init__(self,\
    \ data):\n        self.data = data\n\n    def list(self):\n        return [Room.from_dict(i)\
    \ for i in self.data]\n```\n\n![](img/15b1ab14aa279f39ae10009865354088_52_0.png)\n\
    \n**Source code**\nhttps://github.com/pycabook/rentomatic/tree/ed2-c03-s07\n\n\
    You can easily imagine this class being the wrapper around a real database or\
    \ any other storage type. While the code might become more complex, its basic\
    \ structure would remain the same, with a single public method `list`. I will\
    \ dig into database repositories in a later chapter.\n\n## A command-line interface\n\
    \nSo far we created the domain models, the serializers, the use cases and the\
    \ repository, but we are still missing a system that glues everything together.\
    \ This system has to get the call parameters from the user, initialise a use case\
    \ with a repository, run the use case that fetches the domain models from the\
    \ repository, and return them to the user.\n\nLet’s see now how the architecture\
    \ that we just created can interact with an external system like a CLI. The power\
    \ of a clean architecture is that the external systems are pluggable, which means\
    \ that we can defer the decision about the detail of the system we want to use.\
    \ In this case, we want to give the user an interface to query the system and\
    \ to get a list of the rooms contained in the storage system, and the simplest\
    \ choice is a command-line tool.\n\nLater we will create a REST endpoint and we\
    \ will expose it through a Web server, and it will be clear why the architecture\
    \ that we created is so powerful.\n\nFor the time being, create a file `cli.py`\
    \ in the same directory that contains `setup.cfg`. This is a simple Python script\
    \ that doesn’t need any specific option to run, as it just queries the storage\
    \ for all the domain models contained there. The content of the file is the following:\n\
    \n```python\n#!/usr/bin/env python\n\nfrom rentomatic.repository.memrepo import\
    \ MemRepo\nfrom rentomatic.use_cases.room_list import room_list_use_case\n\nrepo\
    \ = MemRepo([])\nresult = room_list_use_case(repo)\n\nprint(result)\n```\n\n**Source\
    \ code**\nhttps://github.com/pycabook/rentomatic/tree/ed2-c03-s08\n\nYou can execute\
    \ this file with `python cli.py` or, if you prefer, run `chmod +x cli.py` (which\
    \ makes it executable) and then run it with `./cli.py` directly. The expected\
    \ result is an empty list:\n\n```\n$ ./cli.py\n[]\n```\n\nwhich is correct as\
    \ the class `MemRepo` in the file `cli.py` has been initialised with an empty\
    \ list. The simple in-memory storage that we use has no persistence, so every\
    \ time we create it we have to load some data in it. This has been done to keep\
    \ the storage layer simple, but keep in mind that if the storage was a proper\
    \ database this part of the code would connect to it but there would be no need\
    \ to load data in it.\n\nThe most important part of the script is"
  mdcn: "接下来你可能会注意到，我使用了一个简单的函数。在本书第一版中，我为用例使用了一个类，感谢几位读者的提醒，我开始反思自己的选择，因此我想简要讨论一下你可用的选项。\n\
    \n用例代表业务逻辑，一个过程，这意味着你在编程语言中能拥有的最简单实现就是一个函数：一些接收输入参数并返回输出数据的代码。然而，类是另一种选择，因为它本质上是变量和函数的集合。所以，和许多其他情况一样，问题在于你应该使用函数还是类，我的答案是这取决于你正在实现的算法的复杂程度。\n\
    \n你的业务逻辑可能很复杂，需要连接多个外部系统，每个系统都有特定的初始化方式，而在这种简单的情况下，我只是传入了仓库。因此，原则上，如果你的算法需要更多结构，我认为使用类作为用例并没有错，但要小心不要在更简单的解决方案（函数）能完成同样工作时使用它们，这就是我在代码前一个版本中犯的错误。记住，代码需要维护，所以越简单越好。\n\
    \n**源代码**\nhttps://github.com/pycabook/rentomatic/tree/ed2-c03-s06\n\n## 存储系统\n\
    \n在开发用例时，我们假设它会接收一个包含数据并暴露 `list` 函数的对象。这个对象通常被昵称为“仓库”，是用例的信息来源。它与 Git 仓库无关，所以要小心不要混淆这两个术语。\n\
    \n存储位于清洁架构的第四层，即外部系统。这一层的元素通过接口被内部元素访问，在 Python 中，这仅仅意味着暴露一组给定的方法（在这种情况下只有 `list`）。值得注意的是，仓库在清洁架构中提供的抽象级别高于框架中的\
    \ ORM 或像 SQLAlchemy 这样的工具所提供的。仓库只提供应用程序需要的端点，其接口是为应用程序实现的特定业务问题量身定制的。\n\n为了用具体技术来阐明这个问题，SQLAlchemy\
    \ 是一个抽象 SQL 数据库访问的绝佳工具，因此仓库的内部实现可以使用它来访问 PostgreSQL 数据库。但该层的外部 API 并不是 SQLAlchemy\
