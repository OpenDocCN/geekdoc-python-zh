    def compose(subcommand):\n    configure_app(os.getenv(\"APPLICATION_CONFIG\"))\n\
    \    cmdline = docker_compose_cmdline() + list(subcommand)\n\n    try:\n     \
    \   p = subprocess.Popen(cmdline)\n        p.wait()\n    except KeyboardInterrupt:\n\
    \        p.send_signal(signal.SIGINT)\n        p.wait()\n```\n\nAs you can see\
    \ I forced the variable APPLICATION_CONFIG to be production if not specified.\
    \ Usually, my default configuration is the development one, but in this simple\
    \ case I haven't defined one, so this will do for now.\nThe new command is compose,\
    \ that leverages Click's argument decorator to collect subcommands and attach\
    \ them to the Docker Compose command line. I also use the signal library, which\
