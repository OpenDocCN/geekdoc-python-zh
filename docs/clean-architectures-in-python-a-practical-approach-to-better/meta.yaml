  raw:
  - '[PAGE 30]


    ![](img/15b1ab14aa279f39ae10009865354088_30_0.png)


    The basic layers of the clean architecture


    Remember that in computer science, the words “lower” and “higher” almost always
    refer to the level of abstraction, and not to the importance of a component for
    the system. Each part of a system is important, otherwise it would not be there.


    Let’s have a look at the main layers depicted in the figure, keeping in mind that
    a specific implementation may require to create new layers or to split some of
    these into multiple ones.'
  - '[PAGE 31]


    # Entities


    This layer of the clean architecture contains a representation of the domain models,
    that is everything your system needs to interact with and is sufficiently complex
    to require a specific representation. For example, strings in Python are complex
    and very powerful objects. They provide many methods out of the box, so in general,
    it is useless to create a domain model for them. If your project was a tool to
    analyse medieval manuscripts, however, you might need to isolate sentences and
    their features, and at this point it might be reasonable to define a specific
    entity.


    ![](img/15b1ab14aa279f39ae10009865354088_31_0.png)'
  - '[PAGE 32]


    Since we work in Python, this layer will likely contain classes, with methods
    that simplify the interaction with them. It is very important, however, to understand
    that the models in this layer are different from the usual models of frameworks
    like Django. These models are not connected with a storage system, so they cannot
    be directly saved or queried using their own methods, they don’t contain methods
    to dump themselves to JSON strings, they are not connected with any presentation
    layer. They are so-called lightweight models.


    This is the inmost layer. Entities have mutual knowledge since they live in the
    same layer, so the architecture allows them to interact directly. This means that
    one of the Python classes that represent an entity can use another one directly,
    instantiating it and calling its methods. Entities don’t know anything that lives
    in outer layers, though. They cannot call the database, access methods provided
    by the presentation framework, or instantiate use cases.


    The entities layer provides a solid foundation of types that the outer layers
    can use to exchange data, and they can be considered the vocabulary of your business.


    # Use cases


    As we said before the most important part of a clean system are use cases, as
    they implement the business rules, which are the core reason of existence of the
    system itself. Use cases are the processes that happen in your application, where
    you use your domain models to work on real data. Examples can be a user logging
    in, a search with specific filters being performed, or a bank transaction happening
    when the user wants to buy the content of the cart.'
  - '[PAGE 33]


    ![](img/15b1ab14aa279f39ae10009865354088_33_0.png)


    # Use cases


    Use cases should be as small as possible. It is very important to isolate small
    actions into separate use cases, as this makes the whole system easier to test,
    understand and maintain. Use cases have full access to the entities layer, so
    they can instantiate and use them directly. They can also call each other, and
    it is common to create complex use cases composing simple ones.


    # Gateways


    This layer contains components that define interfaces for external systems, that
    is a common access model to services that do not implement the business rules.
    The classic example is that of a data'
  - '[PAGE 34]


    storage, which internal details can be very different across implementations.
    These implementations share a common interface, otherwise they would not be implementations
    of the same concept, and the gateway’s task is to expose it.


    ![](img/15b1ab14aa279f39ae10009865354088_34_0.png)


    Gateways


    If you recall the simple example I started with, this is where the database interface
    would live. Gateways have access to entities, so the interface can freely receive
    and return objects which type has been defined in that layer, as they can freely
    access use cases. Gateways are used to mask the implementation of external systems,
    however, so it is rare for a gateway to call a use case, as this can be done by
    the external system itself. The gateways layer is intimately connected with the
    external'
  - '[PAGE 35]


    systems one, which is why the two are separated by a dashed line.


    # External systems


    This part of the architecture is populated by components that implement the interfaces
    defined in the previous layer. The same interface might be implemented by one
    or more concrete components, as your system might want to support multiple implementations
    of that interface at the same time. For example, you might want to expose some
    use cases both through an HTTP API and a command line interface, or you want to
    provide support for different types of storage according to some configuration
    value.'
  - '[PAGE 36]


    ![](img/15b1ab14aa279f39ae10009865354088_36_0.png)


    External systems


    Please remember that the “external” adjective doesn’t always mean that the system
    is developed by others, or that it is a complex system like a web framework or
    a database. The word has a topological meaning, which shows that the system we
    are talking about is peripheral to the core of the architecture, that is it doesn’t
    implement business logic. So we might want to use a messaging system developed
    in-house to send notifications to the clients of a certain service, but this is
    again just a presentation layer, unless our business is specifically centred around
    creating notification systems.


    External systems have full access to gateways, use cases, and entities. While
    it is easy to understand'
  - '[PAGE 37]


    the relationship with gateways, which are created to wrap specific systems, it
    might be less clear what external systems should do with use cases and entities.
    As for use cases, external systems are usually the parts of the system that trigger
    them, being the way users run the business logic. A user clicking on a button,
    visiting a URL, or running a command, are typical examples of interactions with
    an external system that runs a use case directly. As for entities, an external
    system can directly process them, for example to return them in a JSON payload,
    or to map input data into a domain model.


    I want to point out a difference between external systems that are used by use
    cases and external systems that want to call use cases. In the first case the
    direction of the communication is outwards, and we know that in the clean architecture
    we can’t go outwards without interfaces. Thus, when we access an external system
    from a use case we always need an interface. When the external system wants to
    call use cases, instead, the direction of the communication is inwards, and this
    is allowed directly, as external layers have full access to the internal ones.


    This, practically speaking, translates into two extreme cases, well represented
    by a database and a web framework. When a use case accesses a storage system there
    should be a loose coupling between the two, which is why we wrap the storage with
    an interface and assume that in the use case. When the web framework calls a use
    case, instead, the code of the endpoint doesn’t need any interface to access it.


    # Communication between layers


    The deeper a layer is in this architecture, the more abstract the content is.
    The inner layers contain representations of business concepts, while the outer
    layers contain specific details about the real-life implementation. The communication
    between elements that live in the same layer is unrestricted, but when you want
    to communicate with elements that have been assigned to other layers you have
    to follow one simple rule. This rule is the most important thing in a clean architecture,
    possibly being the core expression of the clean architecture itself.


    **The Golden Rule: talk inwards with simple structures, talk outwards through
    interfaces.**


    Your elements should talk inwards, that is pass data to more abstract elements,
    using basic structures, that is entities and everything provided by the programming
    language you are using.'
- md: "The golden rule of the clean architecture\n\nYour elements should talk outwards\
    \ using interfaces, that is using only the expected API of a component, without\
    \ referring to a specific implementation. When an outer layer is created, elements\
    \ living there will plug themselves into those interfaces and provide a practical\
    \ implementation.\n\n## APIs and shades of grey\n\nThe word API is of uttermost\
    \ importance in a clean architecture. Every layer may be accessed by elements\
    \ living in inner layers by an API, that is a fixed[^footnote_fr-90636062_1] collection\
    \ of entry points (methods or objects).\n\nThe separation between layers and the\
    \ content of each layer is not always fixed and immutable. A well-designed system\
    \ shall also cope with practical world issues such as performances, for example,\
    \ or other specific needs. When designing an architecture it is very important\
    \ to know “what is where and why”, and this is even more important when you “bend”\
    \ the rules. Many issues do not have a black-or-white answer, and many decisions\
    \ are “shades of grey”, that is it is up to you to justify why you put something\
    \ in a given place.\n\nKeep in mind, however, that you should not break the *structure*\
    \ of the clean architecture, and be particularly very strict about the data flow.\
    \ If you break the data flow, you are basically invalidating the whole structure.\
    \ You should try as hard as possible not to introduce solutions that are based\
    \ on a break in the data flow, but realistically speaking, if this saves money,\
    \ do it.\n\nIf you do it, there should be a giant warning in your code and your\
    \ documentation explaining why you did it. If you access an outer layer breaking\
    \ the interface paradigm usually it is because of some performance issues, as\
    \ the layered structure can add some overhead to the communications between elements.\
    \ You should clearly tell other programmers that this happened, because if someone\
    \ wants to replace the external layer with something different, they should know\
    \ that there is direct access which is implementation-specific.\n\nFor the sake\
    \ of example, let’s say that a use case is accessing the storage layer through\
    \ an interface, but this turns out to be too slow. You decide then to access directly\
    \ the API of the specific database you are using, but this breaks the data flow,\
    \ as now an internal layer (use cases) is accessing an outer one (external interfaces).\
    \ If someone in the future wants to replace the specific database you are using\
    \ with a different one, they have to be aware of this, as the new database probably\
    \ won’t provide the same API entry point with the same data.\n\nIf you end up\
    \ breaking the data flow consistently maybe you should consider removing one layer\
    \ of abstraction, merging the two layers that you are linking.\n\n## Chapter 03\
    \ A basic example\n\n> Joshua/WOPR: Wouldn’t you prefer a good game of chess?\n\
    > David: Later. Let’s play Global Thermonuclear War.\n> Wargames, 1983\n\nThe\
    \ goal of the “Rent-o-Matic” project is to create a simple search engine for a\
    \ room renting company. Objects in the dataset (rooms) are described by some attributes\
    \ and the search engine shall allow the user to set some filters to narrow the\
    \ search.\n\nA room is stored in the system through the following values:\n\n\
    - A unique identifier\n- A size in square meters\n- A renting price in Euro/day\n\
    - Latitude and longitude\n\nThe description is purposely minimal so that we can\
    \ focus on the architectural problems and how to solve them. The concepts that\
    \ I will show are then easily extendable to more complex cases.\n\nAs pushed by\
    \ the clean architecture model, we are interested in separating the different\
    \ layers of the system. Remember that there are multiple ways to implement the\
    \ clean architecture concepts, and the code you can come up with strongly depends\
    \ on what your language of choice allows you to do. The following is an example\
    \ of clean architecture in Python, and the implementation of the models, use cases\
    \ and other components that I will show is just one of the possible solutions.\n\
    \n## Project setup\n\nClone the [project repository](https://github.com/pycabook/rentomatic)\
    \ and move to the branch second-edition. The full solution is contained in the\
    \ branch second-edition-top, and the tags I will mention are there. I strongly\
    \ advise to code along and to resort to my tags only to spot errors.\n\n```\n\
    $ git clone https://github.com/pycabook/rentomatic\n$ cd rentomatic\n$ git checkout\
    \ --track origin/second-edition\n```\n\nCreate a virtual environment following\
    \ your preferred process and install the requirements\n\n```\n$ pip install -r\
    \ requirements/dev.txt\n```\n\nYou should at this point be able to run\n\n```\n\
    $ pytest -svv\n```\n\nand get an output like\n\n```\n=============================\
    \ test session starts ==============================\nplatform linux -- Python\
    \ XXXX, pytest-XXXX, py-XXXX, pluggy-XXXX --\ncabook/venv3/bin/python3\ncachedir:\
    \ .cache\nrootdir: cabook/code/calc, inifile: pytest.ini\nplugins: cov-XXXX\n\
    collected 0 items\n\n============================= no tests ran in 0.02s ==============================\n\
    ```\n\nLater in the project you might want to see the output of the coverage check,\
    \ so you can activate it with\n\n```\n$ pytest -svv --cov=rentomatic --cov-report=term-missing\n\
    ```\n\nIn this chapter, I will not explicitly state when I run the test suite,\
    \ as I consider it part of the standard workflow. Every time we write a test you\
    \ should run the suite and check that you get an error (or more), and the code\
    \ that I give as a solution should make the test suite pass. You are free to try\
    \ to implement your own code before copying my solution, obviously.\n\nYou may\
    \ notice that I configured the project to use black with an unorthodox line length\
    \ of 75. I chose that number trying to find a visually pleasant way to present\
    \ code in the book, avoiding wrapped lines that can make the code difficult to\
    \ read.\n\nSource code\nhttps://github.com/pycabook/rentomatic/tree/second-edition\n\
    \n## Domain models\n\nLet us start with a simple definition of the model Room.\
    \ As said before, the clean architecture models are very lightweight, or at least\
    \ they are lighter than their counterparts in common web frameworks. Following\
    \ the TDD methodology, the first thing that I write are the tests. This test ensures\
    \ that the model can be initialised with the correct values\n\n```\ntests/domain/test_room.py\n\
    \nimport uuid\nfrom rentomatic.domain.room import Room\n\n\ndef test_room_model_init():\n\
    \    code = uuid.uuid4()\n    room = Room(\n        code,\n        size=200,\n\
    \        price=10,\n        longitude=-0.09998975,\n        latitude=51.75436293,\n\
    \    )\n\n    assert room.code == code\n    assert room.size == 200\n    assert\
    \ room.price == 10\n    assert room.longitude == -0.09998975\n    assert room.latitude\
    \ == 51.75436293\n```\n\nRemember to create an empty file __init__.py in every\
    \ subdirectory of tests/ that you create, in this case tests/domain/__init__.py.\n\
    \nNow let’s write the class Room in the file rentomatic/domain/room.py.\n\n```\n\
    rentomatic/domain/room.py\n\nimport uuid\nimport dataclasses\n\n\n@dataclasses.dataclass\n\
    class Room:\n    code: uuid.UUID\n    size: int\n    price: int\n    longitude:\
    \ float\n    latitude: float\n```\n\n**Source code**\nhttps://github.com/pycabook/rentomatic/tree/ed2-c03-s01\n\
    \nThe model is very simple and requires little explanation. I’m using dataclasses\
    \ as they are a compact way to implement simple models like this, but you are\
    \ free to use standard classes and to implement the method `__init__` explicitly.\n\
    Given that we will receive data to initialise this model from other layers, and\
    \ that this data is likely to be a dictionary, it is useful to create a method\
    \ that allows us to initialise the model from this type of structure. The code\
    \ can go into the same file we created before, and is\n\n```\ntests/domain/test_room.py\n\
    \ndef test_room_model_from_dict():\n    code = uuid.uuid4()\n    init_dict = {\n\
    \        \"code\": code,\n        \"size\": 200,\n        \"price\": 10,\n   \
    \     \"longitude\": -0.09998975,\n        \"latitude\": 51.75436293,\n    }\n\
    \n    room = Room.from_dict(init_dict)\n\n    assert room.code == code\n    assert\
    \ room.size == 200\n    assert room.price == 10\n    assert room.longitude ==\
    \ -0.09998975\n    assert room.latitude == 51.75436293\n```\n\nA simple implementation\
    \ of it is then"
  mdcn: "**整洁架构的黄金法则**\n\n你的元素应该通过接口向外通信，即只使用组件的预期 API，而不引用具体实现。当创建一个外层时，其中的元素将接入这些接口并提供实际的实现。\n\
    \n## API 与灰色地带\n\nAPI 这个词在整洁架构中至关重要。每一层都可以通过 API 被内层元素访问，API 是一组固定的[^footnote_fr-90636062_1]入口点（方法或对象）。\n\
    \n层与层之间的分隔以及每层的内容并非总是固定不变的。一个设计良好的系统也应能应对现实世界的问题，例如性能问题或其他特定需求。在设计架构时，了解“什么在哪里以及为什么”非常重要，而当你“弯曲”规则时，这一点就更为重要。许多问题没有非黑即白的答案，许多决策都是“灰色地带”，即需要你来证明为什么将某物放在特定位置。\n\
    \n然而，请记住，你不应破坏整洁架构的*结构*，并且要特别严格地遵守数据流。如果你破坏了数据流，基本上就使整个结构失效了。你应该尽可能不引入基于破坏数据流的解决方案，但现实地说，如果这能节省成本，那就去做吧。\n\
    \n如果你这样做了，你的代码和文档中应该有一个巨大的警告，解释你为什么这样做。如果你通过破坏接口范式来访问外层，通常是因为某些性能问题，因为分层结构可能会给元素之间的通信增加一些开销。你应该清楚地告诉其他程序员发生了这种情况，因为如果有人想用不同的东西替换外部层，他们应该知道存在特定于实现的直接访问。\n\
    \n举个例子，假设一个用例通过接口访问存储层，但结果发现这太慢了。于是你决定直接访问你所使用的特定数据库的 API，但这破坏了数据流，因为现在一个内层（用例）正在访问一个外层（外部接口）。如果将来有人想用不同的数据库替换你正在使用的特定数据库，他们必须意识到这一点，因为新数据库可能不会提供相同数据的相同\
    \ API 入口点。\n\n如果你最终持续破坏数据流，也许你应该考虑移除一层抽象，将你正在链接的两层合并。\n\n## 第三章 一个基本示例\n\n> Joshua/WOPR:\
    \ 你不想玩一局好棋吗？\n> David: 等会儿。我们来玩全球热核战争吧。\n> 《战争游戏》，1983\n\n“Rent-o-Matic”项目的目标是为一家房间租赁公司创建一个简单的搜索引擎。数据集中的对象（房间）由一些属性描述，搜索引擎应允许用户设置一些过滤器来缩小搜索范围。\n\
    \n一个房间在系统中通过以下值存储：\n\n- 一个唯一标识符\n- 以平方米为单位的面积\n- 以欧元/天为单位的租赁价格\n- 纬度和经度\n\n描述故意保持最小化，以便我们可以专注于架构问题及其解决方案。我将展示的概念可以轻松扩展到更复杂的情况。\n\
    \n正如整洁架构模型所推动的，我们感兴趣的是分离系统的不同层。请记住，实现整洁架构概念有多种方式，你能编写的代码在很大程度上取决于你选择的语言允许你做什么。以下是\
    \ Python 中整洁架构的一个示例，我将展示的模型、用例和其他组件的实现只是可能的解决方案之一。\n\n## 项目设置\n\n克隆[项目仓库](https://github.com/pycabook/rentomatic)并切换到\
    \ second-edition 分支。完整的解决方案包含在 second-edition-top 分支中，我将提到的标签也在那里。我强烈建议你跟着编码，并仅使用我的标签来查找错误。\n\
    \n```\n$ git clone https://github.com/pycabook/rentomatic\n$ cd rentomatic\n$\
    \ git checkout --track origin/second-edition\n```\n\n按照你偏好的流程创建一个虚拟环境并安装依赖项\n\n\
    ```\n$ pip install -r requirements/dev.txt\n```\n\n此时你应该能够运行\n\n```\n$ pytest\
    \ -svv\n```\n\n并获得类似以下的输出\n\n```\n============================= test session starts\
    \ ==============================\nplatform linux -- Python XXXX, pytest-XXXX,\
    \ py-XXXX, pluggy-XXXX --\ncabook/venv3/bin/python3\ncachedir: .cache\nrootdir:\
    \ cabook/code/calc, inifile: pytest.ini\nplugins: cov-XXXX\ncollected 0 items\n\
    \n============================= no tests ran in 0.02s ==============================\n\
    ```\n\n在项目的后续部分，你可能想查看覆盖率检查的输出，因此你可以通过以下方式激活它\n\n```\n$ pytest -svv --cov=rentomatic\
    \ --cov-report=term-missing\n```\n\n在本章中，我不会明确说明我何时运行测试套件，因为我将其视为标准工作流的一部分。每次我们编写测试时，你都应该运行套件并检查你是否得到一个（或多个）错误，而我作为解决方案给出的代码应该使测试套件通过。显然，你可以在复制我的解决方案之前自由尝试实现你自己的代码。\n\
    \n你可能注意到我配置项目使用 black，并设置了非正统的 75 行长度。我选择这个数字是为了在书中找到一种视觉上令人愉悦的方式来呈现代码，避免可能使代码难以阅读的换行。\n\
    \n源代码\nhttps://github.com/pycabook/rentomatic/tree/second-edition\n\n## 领域模型\n\
    \n让我们从模型 Room 的一个简单定义开始。如前所述，整洁架构模型非常轻量级，或者至少比它们在常见 Web 框架中的对应物更轻量级。遵循 TDD 方法论，我写的第一件事是测试。这个测试确保模型可以用正确的值初始化\n\
    \n```\ntests/domain/test_room.py\n\nimport uuid\nfrom rentomatic.domain.room import\
    \ Room\n\n\ndef test_room_model_init():\n    code = uuid.uuid4()\n    room = Room(\n\
    \        code,\n        size=200,\n        price=10,\n        longitude=-0.09998975,\n\
    \        latitude=51.75436293,\n    )\n\n    assert room.code == code\n    assert\
    \ room.size == 200\n    assert room.price == 10\n    assert room.longitude ==\
    \ -0.09998975\n    assert room.latitude == 51.75436293\n```\n\n记住在你创建的 tests/\
    \ 的每个子目录中创建一个空文件 __init__.py，在这种情况下是 tests/domain/__init__.py。\n\n现在让我们在文件 rentomatic/domain/room.py\
    \ 中编写 Room 类。\n\n```\nrentomatic/domain/room.py\n\nimport uuid\nimport dataclasses\n\
    \n\n@dataclasses.dataclass\nclass Room:\n    code: uuid.UUID\n    size: int\n\
    \    price: int\n    longitude: float\n    latitude: float\n```\n\n**源代码**\nhttps://github.com/pycabook/rentomatic/tree/ed2-c03-s01\n\
    \n这个模型非常简单，不需要太多解释。我使用 dataclasses，因为它们是实现像这样简单模型的紧凑方式，但你可以自由使用标准类并显式实现 `__init__`\
    \ 方法。\n鉴于我们将从其他层接收数据来初始化此模型，并且这些数据很可能是一个字典，因此创建一个允许我们从这种类型结构初始化模型的方法很有用。代码可以放入我们之前创建的同一个文件中，如下所示\n\
    \n```\ntests/domain/test_room.py\n\ndef test_room_model_from_dict():\n    code\
    \ = uuid.uuid4()\n    init_dict = {\n        \"code\": code,\n        \"size\"\
    : 200,\n        \"price\": 10,\n        \"longitude\": -0.09998975,\n        \"\
