- md: "After this it runs Pytest with a default set of options, adding all the options\
    \ that we will provide on the command line, and eventually tears down the Docker\
    \ Compose containers.\nTo complete the setup we need to define a configuration\
    \ file for Docker Compose\n\n```\ndocker/testing.yml\nversion: '3.8'\n\nservices:\n\
    \  postgres:\n    image: postgres\n    environment:\n      POSTGRES_DB: ${POSTGRES_DB}\n\
    \      POSTGRES_USER: ${POSTGRES_USER}\n      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}\n\
    \    ports:\n      - \"${POSTGRES_PORT}:5432\"\n```\n\nAnd finally a JSON configuration\
    \ file\n\n```\nconfig/testing.json\n[\n  {\n    \"name\": \"FLASK_ENV\",\n   \
    \ \"value\": \"production\"\n  },\n  {\n    \"name\": \"FLASK_CONFIG\",\n    \"\
    value\": \"testing\"\n  },\n  {\n    \"name\": \"POSTGRES_DB\",\n    \"value\"\
    : \"postgres\"\n  },\n  {\n    \"name\": \"POSTGRES_USER\",\n    \"value\": \"\
    postgres\"\n  },\n  {\n    \"name\": \"POSTGRES_HOSTNAME\",\n    \"value\": \"\
    localhost\"\n  },\n  {\n    \"name\": \"POSTGRES_PORT\",\n    \"value\": \"5433\"\
    \n  },\n  {\n    \"name\": \"POSTGRES_PASSWORD\",\n    \"value\": \"postgres\"\
    \n  },\n  {\n    \"name\": \"APPLICATION_DB\",\n    \"value\": \"test\"\n  }\n\
    ]\n```\n\nA couple of notes about this configuration. First of all it defines\
    \ both `FLASK_ENV` and `FLASK_CONFIG`. The first is, as you might remember, an\
    \ internal Flask variable that can only be development or production, and is connected\
    \ with the internal debugger. The second is the variable that we use to configure\
    \ our Flask application with the objects in `application/config.py`. For testing\
    \ purposes we set `FLASK_ENV` to production as we don't need the internal debugger,\
    \ and `FLASK_CONFIG` to testing, which will result in the application being configured\
    \ with the class `TestingConfig`. This class sets the internal Flask parameter\
    \ `TESTING` to `True`.\n\nThe rest of the JSON configuration initialises variables\
    \ whose names start with the prefix `POSTGRES_`. These are variables required\
    \ by the Postgres Docker container. When the container is run, it automatically\
    \ creates a database with the name specified by `POSTGRES_DB`. It also creates\
    \ a user with a password, using the values specified in `POSTGRES_USER` and `POSTGRES_PASSWORD`.\n\
    \nLast, I introduced the variable `APPLICATION_DB` because I want to create a\
    \ specific database which is not the default one. The default port `POSTGRES_PORT`\
    \ has been changed from the standard value 5432 to 5433 to avoid clashing with\
    \ any database already running on the machine (either natively or containerised).\
    \ As you can see in the Docker Compose configuration file this changes only the\
    \ external mapping of the container and not the actual port the database engine\
    \ is using inside the container.\n\nWith all these files in place we are ready\
    \ to start designing our tests.\n\n**Source code**\nhttps://github.com/pycabook/rentomatic/tree/ed2-c06-s03\n\
    \n## Database fixtures\n\nAs we defined the configuration of the database in a\
    \ JSON file we need a fixture that loads that same configuration, so that we can\
    \ connect to the database during the tests. As we already have the function `read_json_configuration`\
    \ in the management script we just need to wrap that. This is a fixture that is\
    \ not specific to the Postgres repository, so I will introduce it in `tests/conftest.py`\n\
    \n```\ntests/conftest.py\n\nfrom manage import read_json_configuration\n\n...\n\
    \n@pytest.fixture(scope=\"session\")\ndef app_configuration():\n    return read_json_configuration(\"\
    testing\")\n```\n\nAs you can see I hardcoded the name of the configuration file\
    \ for simplicity's sake. Another solution might be to create an environment variable\
    \ with the application configuration in the management script and to read it from\
    \ here.\n\nThe rest of the fixtures contains code that is specific to Postgres,\
    \ so it is better to keep the code separated in a more specific file `conftest.py`\n\
    \n```\ntests/repository/postgres/conftest.py\n\nimport sqlalchemy\nimport pytest\n\
    \nfrom rentomatic.repository.postgres_objects import Base, Room\n\n@pytest.fixture(scope=\"\
    session\")\ndef pg_session_empty(app_configuration):\n    conn_str = \"postgresql+psycopg2://{}:{}@{}:{}/{}\"\
    .format(\n        app_configuration[\"POSTGRES_USER\"],\n        app_configuration[\"\
    POSTGRES_PASSWORD\"],\n        app_configuration[\"POSTGRES_HOSTNAME\"],\n   \
    \     app_configuration[\"POSTGRES_PORT\"],\n        app_configuration[\"APPLICATION_DB\"\
    ],\n    )\n    engine = sqlalchemy.create_engine(conn_str)\n    connection = engine.connect()\n\
    \n    Base.metadata.create_all(engine)\n    Base.metadata.bind = engine\n\n  \
    \  DBSession = sqlalchemy.orm.sessionmaker(bind=engine)\n    session = DBSession()\n\
    \n    yield session\n\n    session.close()\n    connection.close()\n```\n\n```\n\
    @pytest.fixture(scope=\"session\")\ndef pg_test_data():\n    return [\n      \
    \  {\n            \"code\": \"f853578c-fc0f-4e65-81b8-566c5dffa35a\",\n      \
    \      \"size\": 215,\n            \"price\": 39,\n            \"longitude\":\
    \ -0.09998975,\n            \"latitude\": 51.75436293,\n        },\n        {\n\
    \            \"code\": \"fe2c3195-aeff-487a-a08f-e0bdc0ec6e9a\",\n           \
    \ \"size\": 405,\n            \"price\": 66,\n            \"longitude\": 0.18228006,\n\
    \            \"latitude\": 51.74640997,\n        },\n        {\n            \"\
    code\": \"913694c6-435a-4366-ba0d-da5334a611b2\",\n            \"size\": 56,\n\
    \            \"price\": 60,\n            \"longitude\": 0.27891577,\n        \
    \    \"latitude\": 51.45994069,\n        },\n        {\n            \"code\":\
    \ \"eed76e77-55c1-41ce-985d-ca49bf6c0585\",\n            \"size\": 93,\n     \
    \       \"price\": 48,\n            \"longitude\": 0.33894476,\n            \"\
    latitude\": 51.39916678,\n        },\n    ]\n```\n\n```\n@pytest.fixture(scope=\"\
    function\")\ndef pg_session(pg_session_empty, pg_test_data):\n    for r in pg_test_data:\n\
    \        new_room = Room(\n            code=r[\"code\"],\n            size=r[\"\
    size\"],\n            price=r[\"price\"],\n            longitude=r[\"longitude\"\
    ],\n            latitude=r[\"latitude\"],\n        )\n        pg_session_empty.add(new_room)\n\
    \        pg_session_empty.commit()\n\n    yield pg_session_empty\n\n    pg_session_empty.query(Room).delete()\n\
    ```\n\nThe first fixture `pg_session_empty` creates a session to the empty initial\
    \ database, while `pg_test_data` defines the values that we will load into the\
    \ database. As we are not mutating this set of values we don't need to create\
    \ a fixture, but this is the easier way to make it available both to the other\
    \ fixtures and to the tests. The last fixture `pg_session` fills the database\
    \ with Postgres objects created with the test data. Pay attention that these are\
    \ not entities, but the Postgres objects we created to map them.\n\nNote that\
    \ this last fixture has a function scope, thus it is run for every test. Therefore,\
    \ we delete all rooms after the yield returns, leaving the database exactly as\
    \ it was before the test. Generally speaking you should always clean up after\
    \ tests. The endpoint we are testing does not write to the database so in this\
    \ specific case there is no real need to clean up, but I prefer to implement a\
    \ complete solution from step zero.\n\nWe can test this whole setup changing the\
    \ function `test_dummy` so that it fetches all the rows of the table `Room` and\
    \ verifying that the query returns 4 values.\nThe new version of `tests/repository/postgres/test_postgresrepo.py`\
    \ is\n\n```\nimport pytest\nfrom rentomatic.repository.postgres_objects import\
    \ Room\n\npytestmark = pytest.mark.integration\n\n\ndef test_dummy(pg_session):\n\
    \    assert len(pg_session.query(Room).all()) == 4\n```\n\nAt this point you can\
    \ run the test suite with integration tests. You should notice a clear delay when\
    \ pytest executes the function `test_dummy` as Docker will take some time to spin\
    \ up the database container and prepare the data\n\n```\n$ ./manage.py test --\
    \ --integration\n============================= test session starts ==============================\n\
    platform linux -- Python XXXX, pytest-XXXX, py-XXXX, pluggy-XXXX --\ncabook/venv3/bin/python3\n\
    cachedir: .cache\nrootdir: cabook/code/calc, inifile: pytest.ini\nplugins: cov-XXXX\n\
    collected 36 items\n\n...\ntests/repository/postgres/test_postgresrepo.py::test_dummy\
    \ PASSED\n...\n\n============================== 36 passed in 0.26s ===============================\n\
    ```\n\nNote that to pass the option `--integration` we need to use `--` otherwise\
    \ Click would consider the option as belonging to the script `./manage.py` instead\
    \ of passing it as a pytest argument.\n\n![](img/15b1ab14aa279f39ae10009865354088_114_0.png)\n\
    \n**Source code**\nhttps://github.com/pycabbook/rentomatic/tree/ed2-c06-s04\n\n\
    ## Integration tests\n\nAt this point we can create the real tests in the file\
    \ `test_postgresrepo.py`, replacing the function `test_dummy`. All test receive\
    \ the fixtures `app_configuration`, `pg_session`, and `pg_test_data`. The first\
    \ fixture allows us to initialise the class `PostgresRepo` using the proper parameters.\
    \ The second creates the database using the test data that is then contained in\
    \ the third fixture.\n\nThe tests for this repository are basically a copy of\
    \ the ones created for `MemRepo`, which is not surprising. Usually, you want to\
    \ test the very same conditions, whatever the storage system. Towards the end\
    \ of the chapter we will see, however, that while these files are initially the\
    \ same, they can evolve differently as we find bugs or corner cases that come\
    \ from the specific implementation (in-memory storage, PostgreSQL, and so on)."
  mdcn: "之后，它会使用一组默认选项运行 Pytest，添加所有我们将在命令行上提供的选项，最终拆除 Docker Compose 容器。\n为了完成设置，我们需要为\
    \ Docker Compose 定义一个配置文件\n\n```\ndocker/testing.yml\nversion: '3.8'\n\nservices:\n\
    \  postgres:\n    image: postgres\n    environment:\n      POSTGRES_DB: ${POSTGRES_DB}\n\
    \      POSTGRES_USER: ${POSTGRES_USER}\n      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}\n\
    \    ports:\n      - \"${POSTGRES_PORT}:5432\"\n```\n\n最后是一个 JSON 配置文件\n\n```\n\
    config/testing.json\n[\n  {\n    \"name\": \"FLASK_ENV\",\n    \"value\": \"production\"\
    \n  },\n  {\n    \"name\": \"FLASK_CONFIG\",\n    \"value\": \"testing\"\n  },\n\
    \  {\n    \"name\": \"POSTGRES_DB\",\n    \"value\": \"postgres\"\n  },\n  {\n\
    \    \"name\": \"POSTGRES_USER\",\n    \"value\": \"postgres\"\n  },\n  {\n  \
    \  \"name\": \"POSTGRES_HOSTNAME\",\n    \"value\": \"localhost\"\n  },\n  {\n\
    \    \"name\": \"POSTGRES_PORT\",\n    \"value\": \"5433\"\n  },\n  {\n    \"\
    name\": \"POSTGRES_PASSWORD\",\n    \"value\": \"postgres\"\n  },\n  {\n    \"\
    name\": \"APPLICATION_DB\",\n    \"value\": \"test\"\n  }\n]\n```\n\n关于此配置有几点说明。首先，它同时定义了\
    \ `FLASK_ENV` 和 `FLASK_CONFIG`。第一个，你可能还记得，是一个 Flask 内部变量，只能是 development 或 production，并且与内部调试器相关联。第二个是我们用来使用\
    \ `application/config.py` 中的对象配置 Flask 应用程序的变量。出于测试目的，我们将 `FLASK_ENV` 设置为 production，因为我们不需要内部调试器，并将\
    \ `FLASK_CONFIG` 设置为 testing，这将导致应用程序使用 `TestingConfig` 类进行配置。此类将 Flask 内部参数 `TESTING`\
    \ 设置为 `True`。\n\nJSON 配置的其余部分初始化了名称以 `POSTGRES_` 为前缀的变量。这些是 Postgres Docker 容器所需的变量。当容器运行时，它会自动创建一个由\
    \ `POSTGRES_DB` 指定名称的数据库。它还会使用 `POSTGRES_USER` 和 `POSTGRES_PASSWORD` 中指定的值创建一个带密码的用户。\n\
    \n最后，我引入了变量 `APPLICATION_DB`，因为我想创建一个特定的数据库，而不是默认的那个。默认端口 `POSTGRES_PORT` 已从标准值\
    \ 5432 更改为 5433，以避免与机器上已运行的任何数据库（无论是原生运行还是容器化运行）冲突。正如你在 Docker Compose 配置文件中看到的，这仅更改了容器的外部映射，而不是数据库引擎在容器内部使用的实际端口。\n\
    \n有了所有这些文件，我们就可以开始设计测试了。\n\n**源代码**\nhttps://github.com/pycabook/rentomatic/tree/ed2-c06-s03\n\
    \n## 数据库夹具\n\n由于我们在 JSON 文件中定义了数据库配置，我们需要一个夹具来加载相同的配置，以便我们可以在测试期间连接到数据库。由于我们已经在管理脚本中有了函数\
    \ `read_json_configuration`，我们只需要包装它即可。这是一个不特定于 Postgres 仓库的夹具，所以我将在 `tests/conftest.py`\
    \ 中引入它\n\n```\ntests/conftest.py\n\nfrom manage import read_json_configuration\n\
    \n...\n\n@pytest.fixture(scope=\"session\")\ndef app_configuration():\n    return\
    \ read_json_configuration(\"testing\")\n```\n\n如你所见，为了简单起见，我硬编码了配置文件的名称。另一种解决方案可能是在管理脚本中创建一个包含应用程序配置的环境变量，并从这里读取它。\n\
    \n其余的夹具包含特定于 Postgres 的代码，因此最好将代码分离到一个更具体的文件 `conftest.py` 中\n\n```\ntests/repository/postgres/conftest.py\n\
    \nimport sqlalchemy\nimport pytest\n\nfrom rentomatic.repository.postgres_objects\
    \ import Base, Room\n\n@pytest.fixture(scope=\"session\")\ndef pg_session_empty(app_configuration):\n\
    \    conn_str = \"postgresql+psycopg2://{}:{}@{}:{}/{}\".format(\n        app_configuration[\"\
    POSTGRES_USER\"],\n        app_configuration[\"POSTGRES_PASSWORD\"],\n       \
    \ app_configuration[\"POSTGRES_HOSTNAME\"],\n        app_configuration[\"POSTGRES_PORT\"\
    ],\n        app_configuration[\"APPLICATION_DB\"],\n    )\n    engine = sqlalchemy.create_engine(conn_str)\n\
