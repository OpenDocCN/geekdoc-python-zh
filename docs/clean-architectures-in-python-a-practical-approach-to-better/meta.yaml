  md: "Chapter 08 Run a production ready system\n\n129\n\n```\nrequirements/prod.txt\n\
    1 Flask\n2 SQLAlchemy\n3 psycopg2\n4 pymongo\n5 gunicorn\n```\n\nThe configuration\
    \ for Nginx is\n\n```\ndocker/nginx/nginx.conf\n1 worker_processes 1;\n2 \n3 events\
    \ { worker_connections 1024; }\n4 \n5 http {\n6 \n7     sendfile on;\n8 \n9  \
    \   upstream app {\n10         server web:8000;\n11     }\n12 \n13     server\
    \ {\n14         listen 8080;\n15 \n16         location / {\n17             proxy_pass\
    \ http://app;\n18             proxy_redirect off;\n19             proxy_set_header\
    \ Host $host;\n20             proxy_set_header X-Real-IP $remote_addr;\n21   \
    \          proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;\n22  \
    \           proxy_set_header X-Forwarded-Host $server_name;\n23         }\n24\
    \     }\n25 }\n```\n\nAs for the rest of the project, this configuration is very\
    \ basic and lacks some important parts that are mandatory in a real production\
    \ environment, such as HTTPS. In its essence, though, it is however not too different\
    \ from the configuration of a production-ready Nginx container.\n\nAs we will\
    \ use Docker Compose, the script manage.py needs a simple change, which is a command\
    \ that wraps docker-compose itself. We need the script to just initialise environment\
    \ variables"
