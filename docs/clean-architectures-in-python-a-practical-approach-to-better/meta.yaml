    A couple of notes about this configuration. First of all it defines both `FLASK_ENV`
    and `FLASK_CONFIG`. The first is, as you might remember, and internal Flask variable
    that can only be development or production, and is connected with the internal
    debugger. The second is the variable that we use to configure our Flask application
    with the objects in `application/config.py`. For testing purposes we set `FLASK_ENV`
    to production as we don''t need the internal debugger, and `FLASK_CONFIG` to testing,
    which will result in the application being configured with the class `TestingConfig`.
    This class sets the internal Flask parameter `TESTING` to `True`.


    The rest of the JSON configuration initialises variables whose names start with
    the prefix `POSTGRES_`. These are variables required by the Postgres Docker container.
    When the container is run, it automatically creates a database with the name specified
    by `POSTGRES_DB`. It also creates a user with a password, using the values specified
    in `POSTGRES_USER` and `POSTGRES_PASSWORD`.


    Last, I introduced the variable `APPLICATION_DB` because I want to create a specific
    database which is not the one the default one. The default port `POSTGRES_PORT`
    has been changed from the standard value 5432 to 5433 to avoid clashing with any
    database already running on the machine (either natively or containerised). As
    you can see in the Docker Compose configuration file this changes only the external
    mapping of the container and not the actual port the database engine is using
    inside the container.


    With all these files in place we are ready to start designing our tests.


