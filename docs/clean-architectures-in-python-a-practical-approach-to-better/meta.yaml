    \ = pytest.mark.integration\n\ndef test_dummy():\n    pass\n```\n\nThe module\
    \ attribute pytestmark labels every test in the module with the tag integration.\
    \ To verify that this works I added a test_dummy test function which always passes.\n\
    The marker should be registered in pytest.ini\n\n```\npytest.ini\n[pytest]\nminversion\
    \ = 2.0\nnorecursedirs = .git .tox requirements*\npython_files = test*.py\nmarkers\
    \ =\n    integration: integration tests\n```\n\nYou can now run pytest -svv -m\
    \ integration to ask pytest to run only the tests marked with that label. The\
    \ option -m supports a rich syntax that you can learn by reading the documentation.\n\
    \n```\n$ pytest -svv -m integration\n========================= test session starts\
    \ ==========================\nplatform linux -- Python XXXX, pytest-XXXX, py-XXXX,\
    \ pluggy-XXXX --\ncabook/venv3/bin/python3\ncachedir: .cache\nrootdir: cabook/code/calc,\
