    \ multiple databases (in this case even relational and non-relational) is not\
    \ an uncommon pattern, as it allows you to use the approach that best suits each\
    \ use case.\n\n## Chapter 07 Integration with a real external system mongodb\n\
    \n> There’s, uh, another example.\nJurassic Park, 1993\n\nThe previous chapter\
    \ showed how to integrate a real external system with the core of the clean architecture.\
    \ Unfortunately I also had to introduce a lot of code to manage the integration\
    \ tests and to globally move forward to a proper setup. In this chapter I will\
    \ leverage the work we just did to show only the part strictly connected with\
    \ the external system. Swapping the database from PostgreSQL to MongoDB is the\
    \ perfect way to show how flexible the clean architecture is, and how easy it\
    \ is to introduce different approaches like a non-relational database instead\
    \ of a relational one.\n\n### Fixtures\n\nThanks to the flexibility of clean architecture,\
    \ providing support for multiple storage systems is a breeze. In this section,\
    \ I will implement the class `MongoRepo` that provides an interface towards MongoDB,\
    \ a well-known NoSQL database. We will follow the same testing strategy we used\
    \ for PostgreSQL, with a Docker container that runs the database and docker-compose\
    \ that orchestrates the whole system.\n\nYou will appreciate the benefits of the\
    \ complex testing structure that I created in the previous chapter. That structure\
    \ allows me to reuse some of the fixtures now that I want to implement tests for\
    \ a new storage system.\n\nLet’s start defining the file `tests/repository/mongodb/conftest.py`,\
    \ which will contains pytest fixtures for MongoDB, mirroring the file we created\
