  md: "Chapter 08 Run a production ready system\n\n137\n\n+   1 Flask\n2 SQLAlchemy\n\
    3 psycopg2\n4 pymongo\n5 gunicorn\n6 alembic\n\nAs usual, remember to run `pip\
    \ install -r requirements/dev.txt` to update the virtual environment.\n\nAlembic\
    \ is capable of connecting to the database and run Python scripts (called “migrations”)\
    \ to alter the tables according to the SQLAlchemy models. To do this, however,\
    \ we need to give Alembic access to the database providing username, password,\
    \ hostname, and the database name. We also need to give Alembic access to the\
    \ Python classes that represent the models.\n\nFirst of all let’s initialise Alembic.\
    \ In the project’s main directory (where `manage.py` is stored) run\n\n```\n$\
    \ alembic init migrations\n```\n\nwhich creates a directory called `migrations`\
    \ that contains Alembic’s configuration files, together with the migrations that\
    \ will be created in `migrations/versions`. it will also create the file `alembic.ini`\
    \ which contains the configuration values. The name `migrations` is completely\
    \ arbitrary, so feel free to use a different one if you prefer.\n\nThe specific\
    \ file we need to adjust to make Alembic aware of our models and our database\
    \ is `migrations/env.py`. Add the highlighted lines\n\nmigrations/env.py\n\n```\n\
    1 import os\n2 \n3 from logging.config import fileConfig\n4 \n5 from sqlalchemy\
    \ import engine_from_config\n6 from sqlalchemy import pool\n7 \n8 from alembic\
    \ import context\n9 \n10 # this is the Alembic Config object, which provides\n\
    11 # access to the values within the .ini file in use.\n12 config = context.config\n\
    13 \n14 section = config.config_ini_section\n15 config.set_section_option(\n16\
    \     section, \"POSTGRES_USER\", os.environ.get(\"POSTGRES_USER\"))\n```"
