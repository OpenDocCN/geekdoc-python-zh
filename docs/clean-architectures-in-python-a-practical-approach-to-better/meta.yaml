    # Responses and failures\n\nThere is a wide range of errors that can happen while\
    \ the use case code is executed. Validation errors, as we just discussed in the\
    \ previous section, but also business logic errors or errors that come from the\
    \ repository layer or other external systems that the use case interfaces with.\
    \ Whatever the error, the use case shall always return an object with a known\
    \ structure (the response), so we need a new object that provides good support\
    \ for different types of failures.\n\nAs happened for the requests there is no\
    \ unique way to provide such an object, and the following code is just one of\
    \ the possible solutions. First of all, after some necessary imports, I test that\
    \ responses have a boolean value\n\ntests/test_responses.py\n\n```python\nfrom\
    \ rentomatic.responses import (\n    ResponseSuccess,\n    ResponseFailure,\n\
    \    ResponseTypes,\n    build_response_from_invalid_request,\n)\nfrom rentomatic.requests.room_list\
    \ import RoomListInvalidRequest\n\nSUCCESS_VALUE = {\"key\": [\"value1\", \"value2\"\
    ]}\nGENERIC_RESPONSE_TYPE = \"Response\"\nGENERIC_RESPONSE_MESSAGE = \"This is\
    \ a response\"\n\ndef test_response_success_is_true():\n    response = ResponseSuccess(SUCCESS_VALUE)\n\
    \n    assert bool(response) is True\n\ndef test_response_failure_is_false():\n\
    \    response = ResponseFailure(\n        GENERIC_RESPONSE_TYPE, GENERIC_RESPONSE_MESSAGE\n\
    \    )\n\n    assert bool(response) is False\n```\n\nThen I test the structure\
    \ of responses, checking type and value. ResponseFailure objects should also have\
    \ an attribute message\n\nChapter 05 Error management\n\n72\n\ntests/test_responses.py\n\
    \n```python\ndef test_response_success_has_type_and_value():\n    response = ResponseSuccess(SUCCESS_VALUE)\n\
    \n    assert response.type == ResponseTypes.SUCCESS\n    assert response.value\
    \ == SUCCESS_VALUE\n\ndef test_response_failure_has_type_and_message():\n    response\
    \ = ResponseFailure(\n        GENERIC_RESPONSE_TYPE, GENERIC_RESPONSE_MESSAGE\n\
    \    )\n\n    assert response.type == GENERIC_RESPONSE_TYPE\n    assert response.message\
    \ == GENERIC_RESPONSE_MESSAGE\n    assert response.value == {\n        \"type\"\
    : GENERIC_RESPONSE_TYPE,\n        \"message\": GENERIC_RESPONSE_MESSAGE,\n   \
    \ }\n```\n\nThe remaining tests are all about ResponseFailure. First, a test to\
    \ check that it can be initialised with an exception\n\ntests/test_responses.py\n\
    \n```python\ndef test_response_failure_initialisation_with_exception():\n    response\
    \ = ResponseFailure(\n        GENERIC_RESPONSE_TYPE, Exception(\"Just an error\
    \ message\")\n    )\n\n    assert bool(response) is False\n    assert response.type\
    \ == GENERIC_RESPONSE_TYPE\n    assert response.message == \"Exception: Just an\
    \ error message\"\n```\n\nSince we want to be able to build a response directly\
    \ from an invalid request, getting all the errors contained in the latter, we\
    \ need to test that case\n\nChapter 05 Error management\n\n73\n\ntests/test_responses.py\n\
    \n```python\ndef test_response_failure_from_empty_invalid_request():\n    response\
    \ = build_response_from_invalid_request(\n        RoomListInvalidRequest()\n \
    \   )\n\n    assert bool(response) is False\n    assert response.type == ResponseTypes.PARAMETERS_ERROR\n\
    \ndef test_response_failure_from_invalid_request_with_errors():\n    request =\
    \ RoomListInvalidRequest()\n    request.add_error(\"path\", \"Is mandatory\")\n\
    \    request.add_error(\"path\", \"can't be blank\")\n\n    response = build_response_from_invalid_request(request)\n\
    \n    assert bool(response) is False\n    assert response.type == ResponseTypes.PARAMETERS_ERROR\n\
    \    assert response.message == \"path: Is mandatory\\npath: can't be blank\"\n\
    ```\n\nLet's write the classes that make the tests pass\n\nrentomatic/responses.py\n\
    \n```python\nclass ResponseTypes:\n    PARAMETERS_ERROR = \"ParametersError\"\n\
    \    RESOURCE_ERROR = \"ResourceError\"\n    SYSTEM_ERROR = \"SystemError\"\n\
    \    SUCCESS = \"Success\"\n\nclass ResponseFailure:\n    def __init__(self, type_,\
    \ message):\n        self.type = type_\n        self.message = self._format_message(message)\n\
    \n    def _format_message(self, msg):\n        if isinstance(msg, Exception):\n\
    \            return \"{}: {}\".format(\n                msg.__class__.__name__,\
    \ \"{}\".format(msg)\n            )\n        return msg\n\n    @property\n   \
    \ def value(self):\n        return {\"type\": self.type, \"message\": self.message}\n\
    \n    def __bool__(self):\n        return False\n\nclass ResponseSuccess:\n  \
    \  def __init__(self, value=None):\n        self.type = ResponseTypes.SUCCESS\n\
    \        self.value = value\n\n    def __bool__(self):\n        return True\n\n\
    def build_response_from_invalid_request(invalid_request):\n    message = \"\\\
    n\".join(\n        [\n            \"{}: {}\".format(err[\"parameter\"], err[\"\
    message\"])\n            for err in invalid_request.errors\n        ]\n    )\n\
    \    return ResponseFailure(ResponseTypes.PARAMETERS_ERROR, message)\n```\n\n\
    Through the method _format_message() we enable the class to accept both string\
    \ messages and Python exceptions, which is very handy when dealing with external\
    \ libraries that can raise exceptions we do not know or do not want to manage.\n\
    \nThe error types contained in the class ResponseTypes are very similar to HTTP\
    \ errors, and this will be useful later when we will return responses from the\
    \ web framework. PARAMETERS_ERROR signals that something was wrong in the input\
    \ parameters passed by the request. RESOURCE_ERROR signals that the process ended\
    \ correctly, but the requested resource is not available, for example when reading\
    \ a specific value from a data storage. Last, SYSTEM_ERROR signals that something\
    \ went wrong with the process itself, and will be used mostly to signal an exception\
    \ in the Python code.\n\n**Source code**\nhttps://github.com/pycabook/rentomatic/tree/ed2-c05-s05"
