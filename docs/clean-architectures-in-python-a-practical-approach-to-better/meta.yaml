    \n========================= 1 passed, 35 deselected in 0.20s ==========================\n\
    ```\n\nWhile this is enough to run integration tests selectively, it is not enough\
    \ to skip them by default. To do this, we can alter the pytest setup to label\
    \ all those tests as skipped, but this will give us no means to run them. The\
