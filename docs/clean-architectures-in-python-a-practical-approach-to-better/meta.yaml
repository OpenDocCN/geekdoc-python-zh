    # What is a software architecture?


    Every production system, be it a software package, a mechanical device, or a simple
    procedure, is made of components and connections between them. The purpose of
    the connections is to use the output of some components as inputs of other components,
    in order to perform a certain action or set of actions.


    In a process, the architecture specifies which components are part of an implementation
    and how they are interconnected.


    A simple example is the process of writing a document. The process, in this case,
    is the conversion of a set of ideas and sentences into a written text, and it
    can have multiple implementations. A very simple one is when someone writes with
    a pen on a sheet of paper, but it might become more complex if we add someone
    who is writing what another person dictates, multiple proof readers who can send
    back the text with corrections, and a designer who curates the visual rendering
    of the text. In all these cases the process is the same, and the nature of inputs
    (ideas, sentences) and outputs (a document or a book) doesn’t change. The different
    architecture, however, can greatly affect the quality of the output, or the speed
    with which it is produced.


    An architecture can have multiple granularities, which are the “zoom level” we
    use to look at the components and their connections. The first level is the one
    that describes the whole process as a black box with inputs and outputs. At this
    level we are not even concerned with components, we don’t know what’s inside the
    system and how it works. We only know what it does.


    As you zoom in, you start discovering the details of the architecture, that is
    which components are in the aforementioned black box and how they are connected.
    These components are in turn black boxes, and you don’t want to know specifically
    how they work, but you want to know what their inputs and outputs are, where the
    inputs come from, and how the outputs are used by other components.


    This process is virtually unlimited, so there is never one single architecture
    that describes a complete system, but rather a set of architectures, each one
    covering the granularity we are interested in.


    Let me go over another simple example that has nothing to do with software. Let’s
    consider a shop as a system and let’s discuss its architecture.


    A shop, as a black box, is a place where people enter with money and exit with
    items (if they found what they were looking for). The input of the system are
    people and their money, and the outputs are the same people and items. The shop
    itself needs to buy what it sells first, so another input is represented by the
    stock the shop buys from the wholesaler and another output by the money it pays'
