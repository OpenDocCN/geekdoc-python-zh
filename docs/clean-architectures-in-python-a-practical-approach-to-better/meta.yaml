  md: 'I studied and used several programming languages, among them my favourite are
    the Motorola 68k Assembly, C, and Python. I love mathematics and cryptography.
    I’m mainly interested in open source software, and I like both the theoretical
    and practical aspects of computer science.


    For 13 years I have been a C/Python programmer and devops for a satellite imagery
    company, and I am currently one of the lead developers at WeGotPOP⁹, a UK company
    based in London and New York that creates innovative software for film productions.


    In 2013 I started publishing some technical thoughts on my blog, The Digital Cat¹⁰,
    and in 2018 I published the first edition of the book you are currently reading.


    # Changes in the second edition


    New edition, new typos! I’m pretty sure this is the major change I introduced
    with this edition.


    Jokes aside, this second edition contains many changes, but the core example is
    the same, and while the code changed a little (I use dataclasses and introduced
    a management script to orchestrate tests) nothing revolutionary happened from
    that point of view.


    So, if you already read the first edition, you might want to have a look at chapters
    6, 7, and 8, where I reworked the way I manage integration tests and the production-ready
    setup of the project. If you haven’t read the first edition I hope you will appreciate
    the effort I made to introduce the clean architecture with a narrated example
    in chapter 1, before I start discussing the architecture in more detail and show
    you some code.


    The biggest change that readers of the first edition might notice in the content
    is that I removed the part on TDD and focused only on the clean architecture.
    What I wrote on TDD has become a series of 5 posts on my blog, that I reference
    in the book, but this time I preferred to stay faithful to the title and discuss
    only the subject matter. This probably means that the book is not suitable for
    complete beginners any more, but since the resources are out there I don’t feel
    too guilty.


    I also experimented with different toolchains. The first edition was created directly
    with Leanpub’s Markua¹¹ language, which gave me all I needed to start. While working
    on the second edition, though, I grew progressively unsatisfied because of the
    lack of features like admonitions and file names for the source snippets, and
    a general lack of configuration options. I think Leanpub is doing a great job,
    but Markua didn’t provide all the features that I needed. So I tried Pandoc¹²,
    and I immediately hit the wall of Latex, which is obscure black magic to say the
    least. I spent a great amount of time hacking templates and Python filters to
    get more or less what I wanted, but I wasn’t happy.


    Eventually I discovered AsciiDoc¹³ and that looked like the perfect solution.
    I actually published the first version of the second edition with this toolchain,
    and I was blown away by AsciiDoc in comparison with Markdown. Unfortunately I
