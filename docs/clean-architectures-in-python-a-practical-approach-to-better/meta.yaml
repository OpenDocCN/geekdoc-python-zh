    import time\n...\ndef setenv(variable, default):\n    os.environ[variable] = os.getenv(variable,\
    \ default)\n\nsetenv(\"APPLICATION_CONFIG\", \"production\")\n\nAPPLICATION_CONFIG_PATH\
    \ = \"config\"\nDOCKER_PATH = \"docker\"\n...\n\n@cli.command(context_settings={\"\
