    中的整洁架构：一个循序渐进的示例”，该文于 2016 年发布，受到了 Python 社区的广泛好评。有几年时间，我考虑扩展这篇文章，但一直抽不出时间。在此期间，我意识到我写过的许多内容需要修正、澄清或更新。因此，我认为一本书可能是呈现全貌的最佳方式，于是便有了本书。


    2020 年，在拖延了很长时间之后，我决定全面修订本书，更新内容并澄清那些写得不够清晰的部分。我还决定移除关于 TDD 的部分。虽然我认为每位程序员都应该理解
    TDD，但本书的主题不同，因此我更新了相关材料并发布在我的博客上。


    本书是许多小时思考、实验、学习和犯错的结晶。没有许多人的帮助，我无法完成本书，其中一些人的名字我并不知道，他们提供了免费的文档、软件和帮助。感谢大家！我还要特别感谢许多读者，他们向我提出了建议、纠正，或者只是发来了感谢信。谢谢你们！


    ## 前提条件与本书结构


    要充分理解本书，你需要了解 Python 并熟悉 TDD，特别是单元测试和 mock。如果需要复习这些知识，请参考我博客上发布的系列文章《使用 pytest
    进行 Python TDD》⁶。


    ⁴https://www.amazon.com/Object-Oriented-Software-Engineering-Approach/dp/0201544350

    ⁵https://www.thedigitalcatonline.com/

    ⁶https://www.thedigitalcatonline.com/blog/2020/09/10/tdd-in-python-with-pytest-part-1/


    在你正在阅读的两个引言部分之后，第 1 章将对使用整洁架构设计的系统进行**鸟瞰式概述**，第 2 章简要讨论了该软件架构背后的**组件**和理念。第 3
    章通过**一个具体示例**讲解整洁架构，第 4 章在此基础上扩展示例，添加了一个 **Web 应用程序**。第 5 章讨论**错误管理**以及对前面章节开发的
    Python 代码的改进。第 6 章和第 7 章展示了如何将**不同的数据库系统**接入之前创建的 Web 服务，第 8 章通过展示如何使用**生产就绪配置**运行应用程序来结束示例。


    ## 排版约定


    本书使用 Python，因此大多数代码示例将使用该语言，可以是`内联`的，也可以是像这样的特定代码块


    ```

