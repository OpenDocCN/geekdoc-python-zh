    At this point, you can point your browser to http://127.0.0.1:5000/rooms and enjoy
    the JSON data returned by the first endpoint of your web application.


    I hope you can now appreciate the power of the layered architecture that we created.
    We definitely wrote a lot of code to “just” print out a list of models, but the
    code we wrote is a skeleton that can easily be extended and modified. It is also
    fully tested, which is a part of the implementation that many software projects
    struggle with.


    The use case I presented is purposely very simple. It doesn’t require any input
    and it cannot return error conditions, so the code we wrote completely ignored
    input validation and error management. These topics are however extremely important,
