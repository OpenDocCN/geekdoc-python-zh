- img_proc: true
  md: "```\nvolumes:\n  pgdata:\n```\n\nAs you can see the Postgres configuration\
    \ is not different from the one we used in the file testing.yml, but I added the\
    \ option volumes (both in db and at the end of the file) that allows me to create\
    \ a stable volume. If you don't do it, the database will be destroyed once you\
    \ shut down the container.\n\nThe container web runs the Flask application through\
    \ gunicorn. The environment variables come once again from the JSON configuration,\
    \ and we need to define them because the application needs to know how to connect\
    \ with the database and how to run the web framework. The command gunicorn -w\
    \ 4 -b 0.0.0.0 wsgi:app loads the WSGI application we created in wsgi.py and runs\
    \ it in 4 concurrent processes. This container is created using docker/web/Dockerfile.production\
    \ which I still have to define.\n\nThe last container is nginx, which we will\
    \ use as it is directly from the Docker Hub. The container runs Nginx with the\
    \ configuration stored in /etc/nginx/nginx.conf, which is the file we overwrite\
    \ with the local one ./nginx/nginx.conf. Please note that I configured it to use\
    \ port 8080 instead of the standard port 80 for HTTP to avoid clashing with other\
    \ software that you might be running on your computer.\n\nThe Dockerfile for the\
    \ web application is the following\n\n```\ndocker/web/Dockerfile.production\n\n\
    FROM python:3\n\nENV PYTHONUNBUFFERED 1\n\nRUN mkdir /opt/code\nRUN mkdir /opt/requirements\n\
    WORKDIR /opt/code\n\nADD requirements /opt/requirements\nRUN pip install -r /opt/requirements/prod.txt\n\
    ```\n\nThis is a very simple container that uses the standard python:3 image,\
    \ where I added the production requirements contained in requirements/prod.txt.\
    \ To make the Docker container work we need to add gunicorn to this last file"
