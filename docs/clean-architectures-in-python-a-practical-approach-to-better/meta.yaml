    for it. At this level the internal structure of the shop is unknown, we don’t
    even know what it sells. We can however already devise a simple performance analysis,
    for example comparing the amount of money that goes out (to pay the wholesaler)
    and the amount of money that comes in (from the customers). If the former is higher
    than the latter the business is not profitable.


    Even in the case of a shop that has positive results we might want to increase
    its performances, and to do this chances are that we need to understand its internal
    structure and what we can change to increase its productivity. This may reveal,
    for example, that the shop has too many workers, who are underemployed waiting
    for clients because we overestimated the size of the business. Or it might show
    that the time taken to serve clients is too long and many clients walk away without
    buying anything. Or maybe there are not enough shelves to display goods and the
    staff carries stock around all day searching for display space so the shop is
    in chaos and clients cannot find what they need.


    At this level, however, workers are pure entities, and still we don’t know much
    about the shop. To better understand the reasons behind a problem we might need
    to increase the zoom level and look at the workers for what they are, human beings,
    and start understanding what their needs are and how to help them to work better.


    This example can easily be translated into the software realm. Our shop is a processing
    unit in the cloud, for example, input and output being the money we pay and the
    amount of requests the system serves per second, which is probably connected with
    the income of the business. The internal processes are revealed by a deeper analysis
    of the resources we allocate (storage, processors, memory), which breaks the abstraction
    of the “processing unit” and reveals details like the hardware architecture or
    the operating system. We might go deeper, discussing the framework or the library
    we used to implement a certain service, the programming language we used, or the
    specific hardware on which the whole system runs.


    Remember that an architecture tries to detail how a process is implemented at
    a certain granularity, given certain assumptions or requirements. The quality
    of an architecture can then be judged on the basis of parameters such as its cost,
    the quality of the outputs, its simplicity or “elegance”, the amount of effort
    required to change it, and so on.


    # Why is it called “clean”?


    The architecture explained in this book has many names, but the one that is mainly
    in use nowadays is “clean architecture”. This is the name used by Robert Martin
    in [his seminal post](https://blog.cleancoder.com/uncle-bob/2012/08/13/the-clean-architecture.html)
    where he clearly states this structure is not a novelty, but has been promoted
    by many software designers over the years. I believe the adjective “clean” describes
    one of the fundamental aspects of both the software structure and the development
    approach of this architecture. It is clean, that is, it is easy to understand
    what happens.


    The clean architecture is the opposite of spaghetti code, where everything is
    interlaced and there are no single elements that can be easily detached from the
    rest and replaced without the whole'
