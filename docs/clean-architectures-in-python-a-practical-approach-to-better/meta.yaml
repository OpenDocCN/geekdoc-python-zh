    \        self.value = value\n\n    def __bool__(self):\n        return True\n\n\
    def build_response_from_invalid_request(invalid_request):\n    message = \"\\\
    n\".join(\n        [\n            \"{}: {}\".format(err[\"parameter\"], err[\"\
    message\"])\n            for err in invalid_request.errors\n        ]\n    )\n\
    \    return ResponseFailure(ResponseTypes.PARAMETERS_ERROR, message)\n```\n\n\
    Through the method _format_message() we enable the class to accept both string\
    \ messages and Python exceptions, which is very handy when dealing with external\
    \ libraries that can raise exceptions we do not know or do not want to manage.\n\
    \nThe error types contained in the class ResponseTypes are very similar to HTTP\
    \ errors, and this will be useful later when we will return responses from the\
    \ web framework. PARAMETERS_ERROR signals that something was wrong in the input\
    \ parameters passed by the request. RESOURCE_ERROR signals that the process ended\
    \ correctly, but the requested resource is not available, for example when reading\
    \ a specific value from a data storage. Last, SYSTEM_ERROR signals that something\
    \ went wrong with the process itself, and will be used mostly to signal an exception\
