- md: "## Docker Compose configuration\n\nWe need to add an ephemeral MongoDB container\
    \ to the testing Docker Compose configuration. The MongoDB image needs only the\
    \ variables `MONGO_INITDB_ROOT_USERNAME` and `MONGO_INITDB_ROOT_PASSWORD` as it\
    \ doesn't create any initial database. As we did for the PostgreSQL container\
    \ we assign a specific port that will be different from the standard one, to allow\
    \ tests to be executed while other containers are running.\n\n```yaml\ndocker/testing.yml\n\
    \nversion: '3.8'\n\nservices:\n  postgres:\n    image: postgres\n    environment:\n\
    \      POSTGRES_DB: ${POSTGRES_DB}\n      POSTGRES_USER: ${POSTGRES_USER}\n  \
    \    POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}\n    ports:\n      - \"${POSTGRES_PORT}:5432\"\
    \n  mongo:\n    image: mongo\n    environment:\n      MONGO_INITDB_ROOT_USERNAME:\
    \ ${MONGODB_USER}\n      MONGO_INITDB_ROOT_PASSWORD: ${MONGODB_PASSWORD}\n   \
    \ ports:\n      - \"${MONGODB_PORT}:27017\"\n```\n\nSource code\nhttps://github.com/pycabook/rentomatic/tree/ed2-c07-s02\n\
    \n## Application configuration\n\nDocker Compose, the testing framework, and the\
    \ application itself are configured through a single JSON file, that we need to\
    \ update with the actual values we want to use for MongoDB.\n\n```json\nconfig/testing.json\n\
    [\n  {\n    \"name\": \"FLASK_ENV\",\n    \"value\": \"production\"\n  },\n  {\n\
    \    \"name\": \"FLASK_CONFIG\",\n    \"value\": \"testing\"\n  },\n  {\n    \"\
    name\": \"POSTGRES_DB\",\n    \"value\": \"postgres\"\n  },\n  {\n    \"name\"\
    : \"POSTGRES_USER\",\n    \"value\": \"postgres\"\n  },\n  {\n    \"name\": \"\
    POSTGRES_HOSTNAME\",\n    \"value\": \"localhost\"\n  },\n  {\n    \"name\": \"\
    POSTGRES_PORT\",\n    \"value\": \"5433\"\n  },\n  {\n    \"name\": \"POSTGRES_PASSWORD\"\
    ,\n    \"value\": \"postgres\"\n  },\n  {\n    \"name\": \"MONGODB_USER\",\n \
    \   \"value\": \"root\"\n  },\n  {\n    \"name\": \"MONGODB_HOSTNAME\",\n    \"\
    value\": \"localhost\"\n  },\n  {\n    \"name\": \"MONGODB_PORT\",\n    \"value\"\
    : \"27018\"\n  },\n  {\n    \"name\": \"MONGODB_PASSWORD\",\n    \"value\": \"\
    mongodb\"\n  },\n  {\n    \"name\": \"APPLICATION_DB\",\n    \"value\": \"test\"\
    \n  }\n]\n```\n\nSince the standard port from MongoDB is 27017 I chose 27018 for\
    \ the tests. Remember that this is just an example, however. In a real scenario\
    \ we might have multiple environments and also multiple setups for our testing,\
    \ and in that case we might want to assign a random port to the container and\
    \ use Python to extract the value and pass it to the application.\n\nPlease also\
    \ note that I chose to use the same variable `APPLICATION_DB` for the name of\
    \ the PostgreSQL and MongoDB databases. Again, this is a simple example, and your\
    \ mileage may vary in more complex scenarios.\n\nSource code\nhttps://github.com/pycabook/rentomatic/tree/ed2-c07-s03\n\
    \n## Integration tests\n\nThe integration tests are a mirror of the ones we wrote\
    \ for Postgres, as we are covering the same use case. If you use multiple databases\
    \ in the same system you probably want to serve different use cases, so in a real\
    \ case this might probably be a more complicated step. It is completely reasonable,\
    \ however, that you might want to simply provide support for multiple databases\
    \ that your client can choose to plug into the system, and in that case you will\
