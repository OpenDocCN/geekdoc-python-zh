    - `!=`（不等于）\n- `<`（小于）\n- `>`（大于）\n- `<=`（小于或等于）\n- `>=`（大于或等于）\n\n让我们通过例子来探索这些运算符：\n\
    \n```python\n# 等于\nage = 25\nprint(age == 25) # True\n```\n\n```python\n# 不等于\n\
    temperature = 30\nprint(temperature != 25) # True\n```\n\n```python\n# 小于\nmarks\
