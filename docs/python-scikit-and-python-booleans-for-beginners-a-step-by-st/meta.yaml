    在本章中，我们涵盖了监督学习的基础知识，从数据准备和模型训练到评估和解释。


    # 第 8 章：使用 Python Scikit 进行无监督学习


    无监督学习是机器学习中一个神秘的分支，算法在没有任何标签指导的情况下，揭示数据中隐藏的模式、结构和关系。在本章中，我们将使用 Python Scikit 开启一段探索无监督学习领域的旅程。从聚类到降维，我们将探索无监督学习的迷人世界及其在数据科学中的应用。


    ## 无监督学习的本质


    无监督学习就像在不知道最终图像应该是什么样子的情况下解决一个拼图。在这个引人入胜的世界里，算法被释放到数据中，以发现其固有的组织和结构。这种基本方法在数据分析、推荐系统和异常检测等多个领域具有深远的影响。


    以下是一些定义无监督学习本质的关键方面：


    - 1. **缺乏标签数据：** 与监督学习不同，无监督学习在没有标签数据的情况下运行。没有预定义的目标值来指导学习过程。

    - 2. **聚类：** 无监督学习的主要任务之一是聚类。算法根据数据点固有的相似性，将相似的数据点分组到簇或段中。

    - 3. **降维：** 像主成分分析 (PCA) 和 t-分布随机邻域嵌入 (t-SNE) 这样的无监督学习技术，在保留数据基本特征的同时降低其维度。

    - 4. **异常检测：** 无监督学习可以识别数据集中的离群点或异常点，这使其在欺诈检测、故障检测和质量控制中非常有价值。


    ## 无监督学习问题的类型


    无监督学习包含几种类型的问题，每种都有其独特的目的：


    - 1. **聚类：** 聚类涉及将数据点分组到簇中，其中同一簇内的数据彼此之间比与其他簇中的数据更相似。K-Means、层次聚类和 DBSCAN 是常见的聚类算法。

    - 2. **降维：** 降维技术旨在减少数据集中特征或维度的数量，同时保留尽可能多的相关信息。主成分分析 (PCA) 和 t-分布随机邻域嵌入 (t-SNE)
    是流行的方法。

    - 3. **异常检测：** 异常检测侧重于识别显著偏离常态的罕见或异常数据点。孤立森林和单类 SVM 通常用于此任务。


    ## Python Scikit 与无监督学习


    Python Scikit 为无监督学习提供了一个强大的工具包，使其对数据科学家和机器学习从业者来说易于上手。让我们探索如何利用 Scikit 进行各种无监督学习任务。


