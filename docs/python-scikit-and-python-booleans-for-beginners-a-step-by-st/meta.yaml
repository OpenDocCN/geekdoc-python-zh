    print(greeting)\n```\n\n在这个例子中，`+` 运算符用于连接（拼接）字符串，创建一个定制的问候语。\n\n### 示例2：计算总价\n\
    \n假设你正在构建一个电子商务系统，需要计算购物车中商品的总价。你可能会使用浮点变量来存储商品价格，然后将它们相加。\n\n```python\n# Item\
    \ prices\nprice_item1 = 19.99\nprice_item2 = 29.95\nprice_item3 = 14.50\n\n# Calculate\
    \ total price\ntotal_price = price_item1 + price_item2 + price_item3\nprint(\"\
    Total Price: $\" + str(total_price))\n```\n\n这里，`+` 运算符既用于加法，也用于将字符串与总价连接起来。\n\
    \n### 示例3：检查资格\n\n基于上一章的投票资格示例，让我们通过引入变量来增强它。\n\n```python\n# Get user's age\n\
    user_age = int(input(\"Enter your age: \"))\n\n# Eligibility check\nvoting_age\
    \ = 18\nis_eligible = user_age >= voting_age\n\n# Display result\nif is_eligible:\n\
    \    print(\"Congratulations! You are eligible to vote.\")\nelse:\n    print(\"\
    Sorry, you need to be at least 18 to vote.\")\n```\n\n在这个例子中，比较的结果（`user_age >=\
    \ voting_age`）存储在 `is_eligible` 变量中，使代码更具可读性，并允许更容易地进行修改。\n\n## 动态类型：Python的灵活性\n\
    \nPython是动态类型的，这意味着你不必显式声明变量的数据类型。解释器根据赋给的值来确定类型。这种灵活性使得代码更加流畅和富有表现力。\n\n### 示例：动态类型实战\n\
    \n```python\n# Dynamic typing\ndynamic_variable = 42\nprint(dynamic_variable)\
    \ # Output: 42\n\ndynamic_variable = \"Python\"\nprint(dynamic_variable) # Output:\
    \ Python\n```\n\n这里，`dynamic_variable` 开始时是一个整数，后来变成了一个字符串，展示了Python的适应性。\n\n\
    ## 类型转换：塑造你的数据\n\n虽然Python是动态类型的，但在某些情况下，你可能需要将数据从一种类型转换为另一种类型。这个过程称为类型转换或强制转换。\n\
    \n### 示例：类型转换\n\n```python\n# Integer to String\nage = 25\nage_string = str(age)\n\
    print(\"Age: \" + age_string) # Output: Age: 25\n\n# String to Float\nprice_string\
