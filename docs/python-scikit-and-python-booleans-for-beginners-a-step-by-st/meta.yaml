    \ and vice versa.\n\n#### Example 1: Checking if a Number is Not Zero\n\n```python\n\
    # Checking if a number is not equal to zero\nnumber = 5\nif not number == 0:\n\
    \    print(\"The number is not zero.\")\nelse:\n    print(\"The number is zero.\"\
    )\n```\n\nIn this example, the `not` operator flips the truth value, printing\
    \ the message when the number is not zero.\n\n#### Example 2: Verifying User Consent\n\
    \n```python\n# Checking if the user has not given consent\nconsent_given = False\n\
