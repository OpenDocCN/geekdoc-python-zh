    \n### 变量命名规则\n\n命名变量时，需要记住一些规则：\n\n- 变量名可以包含字母、数字和下划线。\n- 它们不能以数字开头。\n- Python区分大小写，因此\
    \ `age` 和 `Age` 会被视为不同的变量。\n- 选择能传达变量用途的描述性名称。\n\n## 结合变量和数据类型\n\n现在，让我们看看变量和数据类型在实际场景中如何协同工作。\n\
    \n### 示例1：个性化问候\n\n假设你想使用用户名字创建一个个性化问候。你可以使用一个字符串变量来存储名字，然后将其与另一个字符串组合以创建问候语。\n\
    \n```python\n# Get user's name\nuser_name = input(\"Enter your name: \")\n\n#\
