  mdcn: "## 第四章：逻辑运算符：驾驭Python的布尔世界\n\n欢迎来到Python逻辑运算符的世界！在本章中，我们将探索那些能让你精妙地驾驭广阔布尔世界的工具。逻辑运算符如同你的指南针，引导你的代码穿越复杂的决策场景。当我们深入剖析`and`、`or`和`not`的奥秘时，你将掌握构建复杂条件并控制Python程序流程的技能。\n\
    \n## 逻辑运算符的本质\n\n逻辑运算符是Python中复杂决策的基石。它们允许你组合多个条件、评估表达式的真值，并基于这些评估来控制代码的流程。\n\n\
    ### 'and'运算符：统一条件\n\n`and`运算符仅在其连接的两个条件都为真时才返回`True`。它就像一个严格的守门员，确保所有标准都得到满足。\n\
    \n#### 示例1：检查多个条件\n\n```python\n# 检查一个数字是否在10到20之间\nnumber = 15\nif number > 10\
    \ and number < 20:\n    print(\"The number is between 10 and 20.\")\nelse:\n \
    \   print(\"The number is outside the specified range.\")\n```\n\n在这个例子中，`and`运算符确保两个条件（`number\
    \ > 10`和`number < 20`）都必须为真，消息才会被打印。\n\n#### 示例2：组合布尔变量\n\n```python\n# 检查是否是工作日且没有假期\n\
    is_weekday = True\nno_holiday = True\n\nif is_weekday and no_holiday:\n    print(\"\
    It's a regular workday.\")\nelse:\n    print(\"Enjoy your break!\")\n```\n\n这里，只有当`is_weekday`和`no_holiday`都为`True`时，消息才会被打印。\n\
    \n### 'or'运算符：通往可能性的门户\n\n`or`运算符在其连接的条件中至少有一个为真时返回`True`。它就像一个宽容的保镖，只要满足任何一项标准就允许进入。\n\
    \n#### 示例1：检查多个条件\n\n```python\n# 检查一个数字是否小于5或大于15\nnumber = 10\nif number < 5\
    \ or number > 15:\n    print(\"The number is outside the range 5 to 15.\")\nelse:\n\
    \    print(\"The number is within the specified range.\")\n```\n\n在这种情况下，`or`运算符提供了灵活性，只要任一条件为真，就会打印消息。\n\
