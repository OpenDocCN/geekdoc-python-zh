    \n### 字符串：文本数据与布尔逻辑\n\n字符串代表文本数据，也受益于布尔逻辑。无论你是搜索子字符串还是检查字符串中的特定条件，布尔逻辑都起着至关重要的作用。\n\
    \n#### 示例 1：检查子字符串\n\n```python\n# 使用布尔逻辑检查字符串中的子字符串\nsentence = \"Python is a\
    \ versatile programming language\"\n\nis_python_present = \"Python\" in sentence\n\
    print(\"'Python' 在句子中吗？\", is_python_present)\n```\n\n在这个示例中，布尔逻辑检查子字符串 \"Python\"\
    \ 是否存在于句子中。\n\n#### 示例 2：不区分大小写的检查\n\n```python\n# 不区分大小写地检查字符串中的单词\nword_to_find\
    \ = \"programming\"\n\nis_word_present = word_to_find.lower() in sentence.lower()\n\
    print(\"在不区分大小写的检查中，'programming' 存在吗？\", is_word_present)\n```\n\n这里，布尔逻辑与字符串方法结合使用，执行不区分大小写的单词检查。\n\
    \n## 高级布尔逻辑：多重条件\n\n当你遇到更复杂的场景时，就需要高级布尔逻辑。使用逻辑运算符组合多个条件，可以创建复杂的决策结构。\n\n### 示例：基于多重条件进行过滤\n\
    \n```python\n# 使用布尔逻辑基于多重条件过滤数据\nemployees = [\n    {\"name\": \"Alice\", \"department\"\
