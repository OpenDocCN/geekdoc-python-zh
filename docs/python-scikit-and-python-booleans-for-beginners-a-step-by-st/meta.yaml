    \ bother evaluating the rest. This feature enhances efficiency and is particularly\
    \ useful when dealing with complex conditions.\n\n### Example: Short-Circuit Evaluation\
    \ in 'and' Operator\n\n```python\n# Using short-circuit evaluation with 'and'\
