    \n# 第二章：理解基础：什么是布尔值？\n\n欢迎来到我们Python冒险的第二章！在本章中，我们将通过揭开布尔值的奥秘，深入Python编程的核心。这些微小但强大的实体是逻辑操作的支柱，使你的代码能够做出决策并导航各种场景。那么，让我们踏上这段理解布尔值是什么以及它们如何塑造Python程序逻辑的旅程吧。\n\
    \n## 真与假的二元世界\n\n从本质上讲，布尔值是一种可以保存两个值之一的变量类型：`True`或`False`。这些值代表了布尔逻辑的二元性，其中决策基于陈述的真假。可以把它想象成一个开关——要么开（True），要么关（False）。\n\
    \n### 创建布尔变量\n\n在Python中，创建布尔变量很简单。假设我们想表示是否是白天：\n\n```python\nis_daytime = True\n\
