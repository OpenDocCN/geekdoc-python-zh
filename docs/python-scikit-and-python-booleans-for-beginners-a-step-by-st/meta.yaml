    \    sum_of_numbers += number\n\nprint(\"Sum of numbers:\", sum_of_numbers)\n\
    ```\n\n这里，`for` 循环将 `numbers` 列表中的每个数字加到 `sum_of_numbers` 变量上，从而得到总和。\n\n### `range()`\
    \ 函数：`for` 循环的伴侣\n\n`range()` 函数通常与 `for` 循环一起使用，以生成一个数字序列。它是控制迭代次数的多功能工具。\n\n\
