    \ fine\".\"\n          ^\nSyntaxError: invalid syntax\n```\n\nIt throws an error\
    \ because syntactically it is wrong. We can use escape character \\ for using\
    \ double quotes as follows:\n\n```\nIn [54]: var1 = \"He said, \"I am fine\".\"\
    \nIn [55]: var1\nOut[55]: 'He said, \"I am fine\".'\n```\n\n# 3.2 Functions\n\n\
    Almost all high-level programming languages have the provision of reusable blocks\
    \ of codes. These are known as routines, subroutines, or functions. A function\
    \ is a named block of code that can be called from another block of code. In this\
    \ section, we will learn functions in detail. Also, until now, we have been using\
    \ the IPython console. Now we will start saving the programs in scripts. Consider\
    \ the following simple program demonstrating a simple function:\n\n```\nprog00.py\n\
    def func1():\n    print('Test')\n```"
  - "[PAGE 35]\n\n```\nfunc1()\n```\n\nIn the example above we create a simple function\
    \ (in the first two lines) that prints a string when called. In the last, we call\
    \ the function. When called the function performs the intended action. Run the\
    \ code and see the output.\n\nWe can also call this function multiple times:\n\
    \n```\nprog00.py\ndef func1():\n    print('Test')\n\nfunc1()\nfunc1()\n```\n\n\
    Here, we are calling the function twice. It will print the message twice in the\
    \ console. Now, let's see a more pythonic way of defining and calling functions.\
    \ Take a look at the following code:\n\n```\nprog01.py\ndef func1():\n    print('Test')\n\
    \ndef main():\n    print(\"This is the main() function block...\")\n    func1()\n\
    \nif __name__ == \"__main__\":\n    main()\n```\n\nThis code is written in a pythonic\
    \ way. First, we define two functions. The second function named **main()** is\
    \ intended to serve as analogous to the main function we write in C or C++ programs.\
    \ We can assign any valid name of our choice to this function (as an exercise,\
    \ you may wish to change the name of the function in the declaration and the function\
    \ call). Then the line **if __name__ == \"__main__\":** checks if we are directly\
    \ executing the module or calling it from another Python program. If we execute\
    \ it directly, it will run the code listed under it. We will learn more about\
    \ this feature when we study packages in the next chapter. Run the code and see\
    \ the output. This is a professional and pythonic way of organizing our Python\
    \ code files. We will be using this template for our programs quite often throughout\
    \ the book.\n\nLet's see how we can pass values to functions. In the function\
    \ definition, we have to declare a placeholder variable for the value to be passed.\
    \ It is known as a **parameter**. The actual value to be passed is known as an\
    \ **argument**. Let's see this in action."
  - "[PAGE 36]\n\nKickstart to Python 3\n\n```\nprog02.py\ndef print_msg(msg):\n \
    \   print(msg)\n\ndef main():\n    print_msg(\"Test String...\")\n\nif __name__\
    \ == \"__main__\":\n    main()\n```\n\nWe can also have multiple arguments:\n\n\
    ```\nprog03.py\ndef print_msg(msg, count):\n    for i in range(count):\n     \
    \   print(msg)\n\ndef main():\n    print_msg(\"Test String...\", 5)\n\nif __name__\
    \ == \"__main__\":\n    main()\n```\n\nIn this example, we accept two arguments.\
    \ The first is the message and the second is the number of times the message is\
    \ to be printed. We can also have a default value of the argument as shown below:\n\
    \n```\nprog04.py\ndef print_msg(msg, count=2):\n    for i in range(count):\n \
    \       print(msg)\n\ndef main():\n    print_msg(\"Test String...\")\n\nif __name__\
    \ == \"__main__\":\n    main()\n```\n\nIn the example code above, we are setting\
    \ the default value of the last argument to 2. When we do not pass the argument\
    \ in the function call, it assumes the default value and proceeds accordingly.\n\
    \nWe can also have a function to return a value. Let's define a function that\
    \ accepts two values and returns their sum. It's easy to code:"
  - "[PAGE 37]\n\n```\nprog05.py\ndef add(a, b):\n    return a + b\n\ndef main():\n\
    \    print(add( 3, 5))\n\nif __name__ == \"__main__\":\n    main()\n```\n\nWe\
    \ can also write a function that returns multiple values:\n\n```\nprog06.py\n\
    def compute(a, b):\n    return (a + b, a-b)\n\ndef main():\n    (r1, r2) = compute(\
    \ 3, 5)\n    print(r1)\n    print(r2)\n\nif __name__ == \"__main__\":\n    main()\n\
    ```\n\nAs we can see in the example above, we can pack the return values in a\
    \ single tuple and return the tuple.\n\n# 3.3 Recursion\n\nWe can call tthe instance\
    \ of the function from within the same function. This is known as recursion. Let's\
    \ rewrite an earlier example to accommodate recursion as follows:\n\n```\nprog07.py\n\
    def print_msg(msg, count):\n    if count != 0:\n        print(msg)\n        print_msg(msg,\
    \ count-1)\n\ndef main():\n    print_msg(\"Test String...\", 6)\n\nif __name__\
    \ == \"__main__\":\n    main()\n```"
  - "[PAGE 38]\n\nKickstart to Python 3\n\nIn recursion, there are two main things.\
    \ The first is the condition for the termination. In the absence of this, the\
    \ recursion will run forever. And the second part is the recursive call where\
    \ the function calls itself. In the above program, we are using the **if** condition\
    \ termination. Most of the recursion examples use an **if** condition for termination.\
    \ The **if** statement will have the condition or the criteria for termination.\
    \ Let's write a program for the computation of the factorial of a positive integer:\n\
    \n```\nprog08.py\ndef factorial(n):\n    if n == 1:\n        return n\n    else:\n\
    \        return n*factorial(n-1)\n\ndef main():\n    print(factorial(5))\n\nif\
    \ __name__ == \"__main__\":\n    main()\n```\n\nWe can also write a program for\
    \ computing the n<sup>th</sup> number in the Fibonacci series:\n\n```\nprog09.py\n\
    def fibo(n):\n    if n <= 1:\n        return n\n    else:\n        return(fibo(n-1)\
    \ + fibo(n-2))\n\ndef main():\n    print(fibo(15))\n\nif __name__ == \"__main__\"\
    :\n    main()\n```\n\nThese are a few real-life examples of recursion.\n\n# 3.3.1\
    \ Indirect Recursion\n\nWe have seen a demonstration of recursion. Those were\
    \ the examples of direct recursion in which we are calling the function within\
    \ itself. There is another method for recursion known as indirect recursion. In\
    \ the simplest form of indirect recursion, routine A calls routine B and routine\
    \ B calls routine A. Let's see a program involving indirect recursion:\n\n```\n\
    prog10.py\ndef ping(i):\n    if i>0:\n        print(\"Ping \" + str(i))\n```"
- md: "## Chapter 4 • Object-Oriented Programming\n\nIn the previous chapter, we explored\
    \ some important features of the Python programming language. We looked at functions\
    \ and recursion in detail. We will again explore the concept of recursion in the\
    \ coming chapters when we take a look at graphics libraries in Python. For now,\
    \ we will explore Object-Oriented programming.\n\nObject-Oriented programming\
    \ is a must for any professional programmer. This is a very detailed chapter and\
    \ we will have a lot of hands-on programming demonstrations. The following is\
    \ a list of topics we will cover in this chapter:\n\n- Objects and Classes\n-\
    \ Everything is an Object in Python\n- Getting Started with Classes\n- Modules\
    \ and Packages\n- Packages\n- Inheritance\n- More Inheritance\n- Access Modifiers\
    \ in Python\n- Polymorphism\n- Syntax Errors\n- Exceptions\n- Handling Exceptions\n\
    - Raising an exception\n- User-Defined Exceptions\n\n## 4.1 Objects and Classes\n\
    \nObject-Oriented Programming (shortened as OOP) is a programming paradigm. An\
    \ object in the real world is something we can touch, see, feel, and interact\
    \ with. For example, an apple is an object. A bike is an object. A house is an\
    \ object. Similarly, in the world of software engineering, we have objects too.\
    \ An object is a collection of data and associated behaviors. Object-oriented\
    \ Programming refers to the style of programming in which the software is designed\
    \ and developed with objects and related concepts. Let's take the example of GUI-style\
    \ OS. Here, a window of a program is an object. A taskbar is an object. On-screen\
    \ apps are objects. Objects in the OOP style are analogous to their real-life\
    \ counterparts, the objects in the physical world. Now, consider that there are\
    \ two objects, a bike, and a car. Both are objects. However, their types are different.\
    \ A car belongs to the class of cars and a bike belongs to the class of bikes.\
    \ In OOP, a class describes an object. In the other words, class is a data type.\
    \ Objects are variables with a class data type. Let's see an example of a simple\
    \ program with a class and an object in Python. This is our first Object-Oriented\
    \ Program in Python 3 (we are knowingly writing (although we have used a few Object-Oriented\
    \ features of Python).\n\n```python\n# prog00.py\n\nclass Point:\n    pass\n\n\
    p1 = Point()\nprint(p1)\n```\n\nThe output will be as follows,\n\n```\n<__main__.Point\
    \ object at 0x0000025E29D658E0>\n```\n\nIn the program above, we are creating\
    \ a simple class **Point** and the object **p1**. This is the simplest example\
    \ of a class and object.\n\n### 4.1.1 Everything is an Object in Python\n\nPython\
    \ is truly an object-oriented programming language. Almost everything is an object\
    \ in Python. Everything can have associated documentation with it. Everything\
    \ has methods and attributes. This is the sign of a true object-oriented programming\
    \ language. Let's look at a way we can demonstrate this. Open the Python interpreter\
    \ and run the following code:\n\n```python\n>>> a = 5\n>>> print (a)\n5\n>>> print(type(a))\n\
    <class 'int'>\n```\n\nWhen I say **Almost everything is an object in Python**,\
    \ I mean it. For example, the routine *print()* is a built-in method. We can print\
    \ its type by running the following statement on the interactive prompt:\n\n```python\n\
    >>> print(type(print))\n<class 'builtin_function_or_method'>\n```\n\nWe can also\
    \ see the documentation of the routine print() by running the following statement:\n\
    \n```python\n>>> print(print.__doc__)\nprint(value, ..., sep=' ', end='\\n', file=sys.stdout,\
    \ flush=False)\n```\n\nPrints the values to a stream, or sys.stdout by default.\n\
    \nOptional keyword arguments:\n\n- file: a file-like object (stream); defaults\
    \ to the current sys.stdout.\n- sep: string inserted between values, default a\
    \ space.\n- end: string appended after the last value, default a newline.\n- flush:\
    \ whether to forcibly flush the stream.\n\n## 4.2 Getting Started with Classes\n\
    \nIn the last section, we studied the basics of classes. In this section, we will\
    \ see how to create inline documentation in the Python code file with docstrings.\
    \ We will also study the members of a class in detail. We will use the same Point\
    \ class for the demonstration. We will keep adding more features to the same code\
    \ file.\n\n### 4.2.1 Docstrings\n\nWe can provide inline documentation to Python\
    \ code with **Docstrings**. Python docstrings stand for **Python Documentation\
    \ Strings**. They are the most convenient way to provide documentation for developers.\
    \ The following is a simple docstring example:\n\n```python\n# prog00.py\n'This\
    \ is the DocString example'\nclass Point:\n    'This class represent the data-structure\
    \ Point'\n    pass\n\np1 = Point()\nprint(p1)\nprint(p1.__doc__)\nprint(help(p1))\n\
    ```\n\nRun this code (**prog01.py**) as see the output.\n\nAs we discussed earlier\
    \ and in this example, we can use the built-in routine **__doc__** to print docstrings\
    \ if available. We can also use the built-in routine **help()** to display the\
    \ docstrings.\n\n### 4.2.2 Adding attributes to a class\n\nIf you are familiar\
    \ with Java or C++, we declare a class variable in the definition of the class.\
    \ In Python, there is no such thing as the variable declaration. We can add the\
    \ attributes to the class **Point** by adding a variable for each co-ordinate\
    \ as follows:\n\n```python\n# prog01.py\n'This is the DocString example'\nclass\
    \ Point:\n    'This class represent the data-structure Point'\n    pass\n\np1\
    \ = Point()\np1.x = 1\np1.y = 2\np1.z = 2\nprint(p1.x, p1.y, p1.z)\n```\n\nRun\
    \ the program and see the output.\n\n### 4.2.3 Adding a method to the class\n\n\
    We can add behaviors to the class by adding methods to the class. The following\
    \ is an example of the class Point with custom methods **assign()** and **printPoint()**:\n\
    \n```python\n# prog01.py\n'This is the DocString example'\nclass Point:\n    'This\
    \ class represent the data-structure Point'\n\n    def assign(self, x, y, z):\n\
    \        'This assigns the value to the co-ordinates'\n        self.x = x\n  \
    \      self.y = y\n        self.z = z\n\n    def printPoint(self):\n        'This\
    \ prints the values of co-ordinates'\n        print(self.x, self.y, self.z)\n\n\
    p1 = Point()\np1.assign(0, 0, 0)\np1.printPoint()\n```\n\nRun the code above and\
    \ check the output. As we can see, the method declaration is not much different\
    \ from a function declaration. The main difference is that it is mandatory to\
    \ have a self-reference parameter. In this case, it is named as **self** in both\
    \ the methods. We can name it anything. However, I am yet to see any other name\
    \ for the variable. The other difference between a function and a method is that\
    \ a method is always associated with a class. In the code above, the method **assign()**\
    \ assigns values to the coordinates, and the method **printPoint()** prints the\
    \ values of coordinates of the point.\n\n### 4.2.4 Initializer method\n\nThere\
    \ is a special Python method for initializing objects: `__init__`. We can use\
    \ this to assign values to the attributes of an object at the time of the object\
    \ creation itself. The following is an example of this:\n\n```python\n# prog01.py\n\
    'This is the DocString example'\nclass Point:\n    'This class represent the data-structure\
    \ Point'\n\n    def __init__(self, x, y, z):\n```\n\nAbove is an interesting example\
    \ of indirect recursion. We are simulating the moves of the Ping-Pong game with\
    \ recursion. Run this and all the other programs in this chapter. Most of them\
    \ have simple outputs which is why I have not shown outputs of them. I also encourage\
    \ you to try to write your functions to gain a detailed understanding of this\
    \ concept.\n\n## Summary\n\nIn this chapter, we explored the strings in Python.\
    \ We then moved on to functions recursion and indirect recursion. Also, in this\
    \ chapter, we got started with using IDLE's code editor and Python's script mode.\
    \ This chapter was heavier on concepts and programming. We will continue with\
    \ this trend and each subsequent chapter will introduce topics of increasing difficulty.\
    \ Also, all the subsequent chapters will be heavier on the coding side.\n\nIn\
    \ the next chapter, we will learn the basics of object-oriented programming in\
    \ Python 3. We will cover important concepts like Classes, Inheritance, and Exception\
    \ Handling."
  mdcn: "## 第四章 • 面向对象编程\n\n在上一章中，我们探讨了 Python 编程语言的一些重要特性。我们详细研究了函数和递归。在接下来的章节中，当我们学习\
    \ Python 的图形库时，我们将再次探讨递归的概念。现在，我们将探索面向对象编程。\n\n面向对象编程是任何专业程序员的必备技能。本章内容非常详细，我们将进行大量的实践编程演示。以下是本章将涵盖的主题列表：\n\
    \n- 对象与类\n- Python 中一切皆对象\n- 类入门\n- 模块与包\n- 包\n- 继承\n- 更多继承\n- Python 中的访问修饰符\n\
    - 多态\n- 语法错误\n- 异常\n- 处理异常\n- 抛出异常\n- 用户自定义异常\n\n## 4.1 对象与类\n\n面向对象编程（简称 OOP）是一种编程范式。现实世界中的对象是我们可以触摸、看到、感受并与之交互的东西。例如，一个苹果是一个对象。一辆自行车是一个对象。一栋房子是一个对象。同样，在软件工程的世界里，我们也有对象。对象是数据及其相关行为的集合。面向对象编程指的是以对象及相关概念来设计和开发软件的编程风格。让我们以图形用户界面风格的操作系统为例。在这里，程序的窗口是一个对象。任务栏是一个对象。屏幕上的应用程序也是对象。面向对象编程风格中的对象类似于现实世界中的对应物，即物理世界中的对象。现在，考虑有两个对象，一辆自行车和一辆汽车。两者都是对象。然而，它们的类型不同。汽车属于汽车类，自行车属于自行车类。在面向对象编程中，类描述了一个对象。换句话说，类是一种数据类型。对象是具有类数据类型的变量。让我们看一个在\
    \ Python 中包含类和对象的简单程序示例。这是我们在 Python 3 中的第一个面向对象程序（我们有意地编写，尽管我们已经使用了一些 Python\
    \ 的面向对象特性）。\n\n```python\n# prog00.py\n\nclass Point:\n    pass\n\np1 = Point()\n\
    print(p1)\n```\n\n输出将如下所示：\n\n```\n<__main__.Point object at 0x0000025E29D658E0>\n\
    ```\n\n在上面的程序中，我们创建了一个简单的类 **Point** 和一个对象 **p1**。这是类和对象最简单的例子。\n\n### 4.1.1 Python\
    \ 中一切皆对象\n\nPython 是一门真正的面向对象编程语言。在 Python 中，几乎一切都是对象。一切都可以有相关的文档。一切都有方法和属性。这是真正的面向对象编程语言的标志。让我们看看如何证明这一点。打开\
    \ Python 解释器并运行以下代码：\n\n```python\n>>> a = 5\n>>> print (a)\n5\n>>> print(type(a))\n\
    <class 'int'>\n```\n\n当我说 **Python 中几乎一切都是对象** 时，我是认真的。例如，例程 *print()* 是一个内置方法。我们可以通过在交互式提示符下运行以下语句来打印它的类型：\n\
    \n```python\n>>> print(type(print))\n<class 'builtin_function_or_method'>\n```\n\
    \n我们也可以通过运行以下语句来查看例程 print() 的文档：\n\n```python\n>>> print(print.__doc__)\nprint(value,\
    \ ..., sep=' ', end='\\n', file=sys.stdout, flush=False)\n```\n\n将值打印到流，默认为 sys.stdout。\n\
    \n可选关键字参数：\n\n- file：类文件对象（流）；默认为当前的 sys.stdout。\n- sep：插入值之间的字符串，默认为空格。\n- end：最后一个值之后附加的字符串，默认为换行符。\n\
    - flush：是否强制刷新流。\n\n## 4.2 类入门\n\n在上一节中，我们学习了类的基础知识。在本节中，我们将学习如何在 Python 代码文件中使用文档字符串创建内联文档。我们还将详细研究类的成员。我们将使用同一个\
    \ Point 类进行演示。我们将继续向同一个代码文件添加更多功能。\n\n### 4.2.1 文档字符串\n\n我们可以使用 **文档字符串** 为 Python\
    \ 代码提供内联文档。Python 文档字符串代表 **Python Documentation Strings**。它们是为开发者提供文档最便捷的方式。以下是一个简单的文档字符串示例：\n\
    \n```python\n# prog00.py\n'This is the DocString example'\nclass Point:\n    'This\
    \ class represent the data-structure Point'\n    pass\n\np1 = Point()\nprint(p1)\n\
    print(p1.__doc__)\nprint(help(p1))\n```\n\n运行此代码（**prog01.py**）并查看输出。\n\n正如我们之前讨论的以及在这个例子中，我们可以使用内置例程\
    \ **__doc__** 来打印文档字符串（如果可用）。我们也可以使用内置例程 **help()** 来显示文档字符串。\n\n### 4.2.2 向类添加属性\n\
    \n如果你熟悉 Java 或 C++，我们会在类的定义中声明一个类变量。在 Python 中，没有变量声明这样的事情。我们可以通过为每个坐标添加一个变量来向类\
    \ **Point** 添加属性，如下所示：\n\n```python\n# prog01.py\n'This is the DocString example'\n\
    class Point:\n    'This class represent the data-structure Point'\n    pass\n\n\
    p1 = Point()\np1.x = 1\np1.y = 2\np1.z = 2\nprint(p1.x, p1.y, p1.z)\n```\n\n运行程序并查看输出。\n\
    \n### 4.2.3 向类添加方法\n\n我们可以通过向类添加方法来为类添加行为。以下是带有自定义方法 **assign()** 和 **printPoint()**\
    \ 的 Point 类示例：\n\n```python\n# prog01.py\n'This is the DocString example'\nclass\
    \ Point:\n    'This class represent the data-structure Point'\n\n    def assign(self,\
    \ x, y, z):\n        'This assigns the value to the co-ordinates'\n        self.x\
    \ = x\n        self.y = y\n        self.z = z\n\n    def printPoint(self):\n \
    \       'This prints the values of co-ordinates'\n        print(self.x, self.y,\
    \ self.z)\n\np1 = Point()\np1.assign(0, 0, 0)\np1.printPoint()\n```\n\n运行上面的代码并检查输出。我们可以看到，方法声明与函数声明没有太大不同。主要区别在于必须有一个自引用参数。在这个例子中，它在两个方法中都被命名为\
    \ **self**。我们可以给它起任何名字。然而，我还没有见过这个变量使用其他名字。函数和方法之间的另一个区别是方法总是与一个类相关联。在上面的代码中，方法\
    \ **assign()** 为坐标赋值，方法 **printPoint()** 打印点的坐标值。\n\n### 4.2.4 初始化方法\n\n有一个特殊的\
    \ Python 方法用于初始化对象：`__init__`。我们可以使用它在对象创建时就为对象的属性赋值。以下是此方法的一个示例：\n\n```python\n\
    # prog01.py\n'This is the DocString example'\nclass Point:\n    'This class represent\
    \ the data-structure Point'\n\n    def __init__(self, x, y, z):\n```\n\n上面是一个有趣的间接递归示例。我们使用递归来模拟乒乓球游戏的移动。运行这个以及本章中的所有其他程序。它们大多有简单的输出，这就是为什么我没有展示它们的输出。我也鼓励你尝试编写自己的函数，以详细理解这个概念。\n\
    \n## 总结\n\n在本章中，我们探讨了 Python 中的字符串。然后我们转向了函数递归和间接递归。此外，在本章中，我们开始使用 IDLE 的代码编辑器和\
    \ Python 的脚本模式。本章在概念和编程方面内容较多。我们将继续这种趋势，后续每一章都将引入难度递增的主题。此外，所有后续章节在编码方面的内容也会更多。\n\
