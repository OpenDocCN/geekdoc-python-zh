- md: '## Chapter 9 • Image Processing with Python


    In the previous chapter, we learned how to handle files of various types.


    In this chapter, we will explore another area where Python is commonly used as
    the preferred choice of programming language: Image Processing. For this, we will
    explore an image processing library in Python in great depth. The name of this
    library is **Wand**. We will explore the following topics in detail:


    - Digital Image Processing and Wand Library

    - Getting Started

    - Image Effects

    - Special Effects

    - Transformations

    - Statistical Operations

    - Color Enhancement

    - Image Quantization

    - Threshold

    - Distortions


    This chapter is full of advanced concepts, their in-depth description, and hands-on
    demonstrations. After following this chapter, we will be at ease with Image processing
    using Python.


    ### 9.1 Digital Image Processing and Wand Library


    Image Processing is the use of algorithms to process the images. In the days of
    analog films and motion pictures, there were techniques to improve the quality
    of images and frames (in a motion picture) using manual techniques like the use
    of chemical compounds. This was a precursor to the modern idea of image processing.
    Nowadays, most images are digital. Of course, digital is yet to catch up with
    the vibrant colors and clarity of analog (chemical film-based imaging). However,
    since it is cheaper, a vast majority of people and organizations (film producing
    and processing organizations) use digital imaging in the production of images
    and videos. Modern computers are also fast enough to be used for processing digital
    images. We usually use modern programming languages like C, C++, Java, Python,
    MATLAB, and GNU Octave for processing images and videos. It is very easy to process
    images with Python as there are many third-party libraries for this.


    **ImageMagick** is software for the manipulation of images. It comes with APIs
    for various programming languages. We can use the library **Wand** that provides
    a pythonic interface to ImageMagick. Let''s set up the needed software to get
    started. We first need to install ImageMagick for our OSes.


    We can install the ImageMagick on macOS with the following commands:


    ```bash

    brew install ghostscript

    brew install imagemagick

    ```


    These two commands should install ImageMagick to your macOS. If not then we must
    install it manually. This is easy. Download the zip file located at https://download.imagemagick.org/ImageMagick/download/binaries/ImageMagick-x86_64-apple-darwin20.1.0.tar.gz.
    Copy it to the **home** directory of your user on macOS. Extract it with the following
    command:


    ```bash

    tar xvzf ImageMagick-x86_64-apple-darwin20.1.0.tar.gz

    ```


    Now we need to add a few entries to the file **.bash_profile** located in the
    **home** directory of your user on macOS.


    ```bash

    # Settings for ImageMagick

    export MAGICK_HOME="$HOME/ImageMagick-7.0.10"

    export PATH="$MAGICK_HOME/bin:$PATH"

    export DYLD_LIBRARY_PATH="$MAGICK_HOME/lib/"

    ```


    Exit and relaunch the command prompt and run the following commands one by one:


    ```bash

    magick logo: logo.gif

    identify logo.gif

    display logo.gif

    ```


    It will display the logo of the ImageMagick project.


    Installation on Windows is easy. There are binary executable installable files
    for all flavors of desktop Windows (32/64 bit). Of all the options, we need to
    choose the one with the description **Win64/Win32 dynamic at 16 bits-per-pixel
    component with High-dynamic-range imaging enabled**. For 64-bit systems, use


    https://download.imagemagick.org/ImageMagick/download/binaries/ImageMagick-7.1.0-10-Q16-HDRI-x64-dll.exe


    For 32-bit Windows use,


    https://download.imagemagick.org/ImageMagick/download/binaries/ImageMagick-7.1.0-10-Q16-HDRI-x86-dll.exe


    Use these files to install the ImageMagick on Windows.


    Let''s install it on Linux. Download the source with the following command,


    ```bash

    wget https://www.imagemagick.org/download/ImageMagick.tar.gz

    ```


    Let''s check where it has extracted all the files:


    ```bash

    ls ImageMagick*

    ```


    It shows us the name of the directory.


    ```bash

    ImageMagick-7.1.0-10

    ```


    Go to the directory.


    ```bash

    cd ImageMagick-7.1.0-10

    ```


    Run the following commands one after another (if you are familiar with the Linux,
    you will recognize that this is a standard set of commands to install any new
    program on Linux distros):


    ```bash

    ./configure

    make

    sudo make install

    sudo ldconfig /usr/local/lib

    ```


    After we successfully install the ImageMagick program, we can install the wand
    library on any platform with the following command:


    ```bash

    pip3 install wand

    ```


    This is how we can install ImageMagick and Wand on any operating system.


    ### 9.2 Getting Started


    Please create a new Jupyter notebook for all demonstrations in this chapter. All
    the code from now on should be saved and executed in the notebook. Let''s import
    the required libraries.


    ```python

    from __future__ import print_function

    from wand.image import Image

    ```


    These statements import the required modules. Let''s read an image and print its
    dimensions as follows,


    ```python

    img = Image(filename=''D:/Dataset/4.2.03.tiff'')

    print(''width ='', img.width)

    print(''height ='', img.height)

    ```


    The output is as follows,


    ```

    width = 512

    height = 512

    ```


    We can also see the type of the image:


    ```python

    type(img)

    ```


    This produces the following output:


    ```

    wand.image.Image

    ```


    We can show the image in the notebook as output just by typing in the name of
    the variable that stores the image.


    ```python

    img

    ```


    Thus creates the following output:


    ![](img/0f3f12fc54f1049d26ccfe6d76bc3687_150_0.png)


    Figure 9-1: Image displayed in the Jupyter notebook


    I am using the image dataset provided by


    [http://www.imageprocessingplace.com/root_files_V3/image_databases.htm](http://www.imageprocessingplace.com/root_files_V3/image_databases.htm).


    All images are standard test images frequently used in image processing. I am
    not using the standard test image, Lena, as I believe the origin of the image
    is controversial and it is disrespectful and derogatory towards women in general.


    We can also clone an image, change its file format, and save it to the disk as
    follows:


    ```python

    img1 = img.clone()

    img1.format = ''png''

    img1.save(filename=''D:/Dataset/output.png'')

    ```


    If you have not already noticed, I am using a Windows computer for this demo.
    If you are using any Unix-like OS, you have to modify the location accordingly.
    For example, I use the following code to save in a Raspberry Pi OS (Debian Linux
    variant) computer to save the output file:


    ```python

    img1.save(filename=''/home/pi/Dataset/output.png'')

    ```


    We can also create a custom image with uniform color.


    ```python

    from wand.color import Color

    bg = Color(''black'')

    img = Image(width=256, height=256, background=bg)

    img.save(filename=''D:/Dataset/output.png'')

    ```


    Let''s see how to resize an image. There are two ways:


    ```python

    img = Image(filename=''D:/Dataset/4.2.03.tiff'')

    img1 = img.clone()

    img1.resize(60, 60)

    img1.size

    ```


    The second way is as follows:


    ```python

    img1 = img.clone()

    img1.sample(60, 60)

    img1.size

    ```


    The routines **resize()** and **sample()** resize the image to specified dimensions.
    We can also crop a part of an image.


    ```python

    img1 = img.clone()

    img1.crop(10, 10, 60, 60)

    img1.size

    ```


    ### 9.3 Image Effects


    We can have a variety of image effects. Let''s start by blurring an image.


    ```python

    img1 = img.clone()

    img1.blur(radius=6, sigma=3)

    img1

    ```


    The output is as shown in Figure 9-2.


    ![](img/0f3f12fc54f1049d26ccfe6d76bc3687_152_0.png)


    Figure 9-2: A blurred image


    Let''s apply the adaptive blur:


    ```python

    img1 = img.clone()

    img1.adaptive_blur(radius=12, sigma=6)

    img1

    ```


    We can apply the Gaussian blur:


    ```python

    img1 = img.clone()

    img1.gaussian_blur(sigma=8)

    img1

    ```


    Here is the output:


    ![](img/0f3f12fc54f1049d26ccfe6d76bc3687_152_1.png)


    Figure 9-3: Adaptive Blur


    We can have motion blur:


    ```python

    img1 = img.clone()

    img1.motion_blur(radius=20, sigma=10, angle=-30)

    img1

    ```


    We are mentioning the angle of motion while calling the routine. Here is the output:


    ![](img/0f3f12fc54f1049d26ccfe6d76bc3687_153_0.png)


    Figure 9-4: Motion Blur with 30-degree angle


    We can also have rotational blur:


    ```python

    img1 = img.clone()

    img1.rotational_blur(angle=25)

    img1

    ```


    Here is the output:


    ![](img/0f3f12fc54f1049d26ccfe6d76bc3687_153_1.png)


    Figure 9-5: Rotational Blur'
