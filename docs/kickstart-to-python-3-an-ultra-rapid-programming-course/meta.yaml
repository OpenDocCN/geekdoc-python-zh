    # 2.1 IPython


    IPython means **Interactive Python Shell**. It is a program that provides us with
    more facilities than python''s built-in interactive shell. We have to install
    it separately using the following command:


    ```

    pi@raspberrypi:~ $ pip3 install ipython

    ```


    The command is the same for Windows and macOS. If you are installing it on a Linux
    distribution (like me), you may see the following message in the installation
    log:


    > **The scripts iptest, iptest3, ipython, and ipython3 are installed in ''/home/pi/.local/bin''
    which is not on PATH.**


    **Consider adding this directory to PATH or, if you prefer to suppress this warning,
    use --no-warn-script-location.**


    This means we need to add the mentioned directory location to `~/.bashrc` and
    `~/.bash_profile` files. We have to add the following line to both the files (so
    it works for login and non-login shells):


    ```

    PATH=$PATH:/home/pi/.local/bin

    ```


    It will show a similar message for Windows too. We have to add the path of the
    directory mentioned in the installation log to the **PATH** variables (User and
    System variables, both) in Windows too.'
