    \n运算符作用于操作数并执行各种操作。我们知道 Python 中一切皆对象，因此运算符在 Python 中作用的操作数都是对象。Python 中内置对象的运算操作和结果已经定义良好。我们可以为用户定义类的对象分配额外的责任给运算符。这个概念称为运算符重载。以下是加法运算符的一个简单示例：\n\
