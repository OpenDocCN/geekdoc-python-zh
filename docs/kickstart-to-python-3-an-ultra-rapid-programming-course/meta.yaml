    A list is an ordered data structure, meaning that the members of the lists are
    stored and retrieved in a particular order. We can use this to our advantage to
    retrieve the elements of the lists. The very first element has an index of 0.
    If the size of the list is **n**, the last element is indexed as **n-1**. This
    is similar to the indices of an array in C, C++, and Java. If you have programmed
    before with these programming languages, you will find this scheme of indexing
    familiar.


    We can retrieve the elements of the lists by using the combination of the name
    of the list and the index of the element. The following is an example:


    ```

    In [4]: fruits[0]

    Out[4]: ''banana''

    In [5]: fruits[1]

    Out[5]: ''pineapple''

    In [6]: fruits[2]

    Out[6]: ''orange''

    ```


    We can also use negative indices. -1 refers to the last element and -2 refers
    to the last but one element. The following is the example:


    ```

    In [7]: fruits[-1]

    Out[7]: ''orange''

    In [8]: fruits[-2]

