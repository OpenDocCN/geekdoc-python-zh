    ```\n\nI have downloaded a zip file containing the CSV file from\n\nhttps://archive.ics.uci.edu/ml/machine-learning-databases/00380/YouTube-Spam-Collection-v1.zip\n\
    \nWe can then extract the CSV file from the compressed file and use it in our\
    \ program. We can read the CSV file with a routine from the pandas library.\n\n\
    ```python\ndf = pd.read_csv(r\"Youtube05-Shakira.csv\", encoding = \"latin-1\"\
    )\n```\n\nLet's define two variables: key and stop words:\n\n```python\ncomment_words\
    \ = ' '\nstopwords = set(STOPWORDS)\nstopwords\n```\n\nThe variable for the keywords\
    \ is an empty string. We can add keywords to the list as follows:\n\n```python\n\
    for val in df.CONTENT:\n    val = str(val)\n    tokens = val.split()\n    for\
    \ i in range(len(tokens)):\n        tokens[i] = tokens[i].lower()\n\n    for words\
    \ in tokens:\n        comment_words = comment_words + words + ' '\ncomment_words\n\
    ```\n\nLet's generate the word cloud as follows:\n\n```python\nwordcloud = WordCloud(width=\
    \ 1920, height=1080,\n                     background_color='white',\n       \
    \              stopwords = stopwords,\n                     min_font_size = 10).generate(comment_words)\n\
    ```\n\nLet's visualize it with the Matplotlib library.\n\n```python\nplt.imshow(wordcloud)\n\
    plt.axis('off')\nplt.tight_layout(pad=0)\nplt.show()\n```\n\nThe output is as\
    \ follows:\n\n![](img/0f3f12fc54f1049d26ccfe6d76bc3687_200_0.png)\n\n*Figure 10-1:\
    \ Word cloud with the default settings*\n\nWe can generate a word cloud from a\
    \ text string. Let's create a string:\n\n```python\ntext=(\"Python is an interpreted,\
    \ high-level, general-purpose programming language. Created by Guido van Rossum\
