    ## 1.5 Python IDEs


    Until now, we have used IDLE for Python programming. We can also use other editors
    and IDEs. On the Linux command line, we can use editor programs like **vi**, **vim**,
    and **nano**. The vi editor comes with most Linux distributions. We can install
    the other two on Debian (and derivative distributions) using the following command:


    ```

    pi@raspberrypi:~ $ sudo apt-get install vim nano -y

    ```


    We can also use a plaintext editor like **Notepad** on Windows or **Leafpad**
    on Linux. We can install Leafpad editor on Debian and other distributions using
    the following command:


    ```

    pi@raspberrypi:~ $ sudo apt-get install leafpad -y

    ```


