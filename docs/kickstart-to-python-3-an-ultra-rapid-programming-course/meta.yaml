  md: "Here's the output:\n\n![](img/0f3f12fc54f1049d26ccfe6d76bc3687_180_0.png)\n\
    \n*Figure 9-46: Quantization with 8 colors*\n\n# 9.9 Threshold\n\nIn thresholding,\
    \ based on the value of channels for a pixel, we make some decisions. Let's say,\
    \ we define a function that takes an argument and returns 0 if the value passed\
    \ is less than 127 then the function is a thresholding function and 127 is the\
    \ threshold value. We can manually define such a function in Python. The Wand\
    \ library has plenty of such functions. Let's explore them one by one.\n\nLet's\
    \ look at **Local Adaptive Threshold**. This is also known as **Local Threshold**\
    \ or **Adaptive Threshold**. In this method, every pixel is adjusted as per the\
    \ values of the surrounding pixel. If the pixel has a greater value than the average\
    \ of its surrounding pixels, it is set to white, otherwise to black.\n\n```\n\
