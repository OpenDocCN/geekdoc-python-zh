    ## Python 3 快速入门


    一门超快速编程课程


    本书是初学者学习 Python 编程的第一步。全书分为十章。第一章向读者介绍 Python 的基础知识，详细说明了在 macOS、Windows、FreeBSD
    和 Linux 等各种平台上的安装步骤，还涵盖了 Python 编程的其他方面，如 IDE 和包管理器。第二章让读者有机会深入实践 Python 编程，涵盖了一组通常称为
    Python 集合的内置数据结构。第三章介绍了字符串、函数和递归的重要概念。


    第四章重点介绍 Python 的面向对象编程。第五章讨论了最常用的自定义数据结构，如栈和队列。第六章通过 Python 的 Turtle 图形库激发读者的创造力。第七章探索了使用
    Pygame 库进行动画和游戏开发。第八章涵盖了处理存储在各种文件格式中的数据。第九章介绍了使用 Python 中的 Wand 库进行图像处理的领域。第十章也是最后一章，介绍了
    Python 中一系列实用的杂项主题。


    全书遵循循序渐进的方法。每个主题的解释之后都附有详细的代码示例。代码示例也得到了适当的详细解释，并尽可能以文本或截图的形式附上输出结果。读者通过紧密跟随本书中的概念和代码示例，将能够熟练掌握
    Python 编程语言。本书还提供了外部资源的参考，供读者进一步探索。


    软件代码的下载和教程视频的链接可在 Elektor 网站上找到。


