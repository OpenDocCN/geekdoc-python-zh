    # 8.2 CSV Files


    Let''s understand how to work with CSV files. We can start by understanding what
    CSV files are. CSV means **Comma Separated Value**. This means a delimited text
    file that uses a comma as a separator for values. Each line of the CSV file is
    a data record. Before modern Relational databases, this format was (and is still
    used) to store records in tabular format. Many CSV files have the first row as
    the header row that stores the names of the fields. CSV files are closely related
    to DSV (delimiter separated files) file format where we use delimiters like colon
    and space to delimit fields. CSVs are a subgroup of DSVs.


    Now, let''s create a CSV file manually in the same directory where we are running
    our program. Let''s save it with the name **test.csv**. Add the following or similar
    data to the CSV file:


    ```

    Name,Salary

    Ashwin,100000

    Thor,200000

    Jane,300000

    Cpt America,30000

    Iron Man,4000000

    ```


    As we can see, this is payroll-related data. You can have any data of your choice.
    I prefer to keep it simple for beginners.


    In this section, we will learn how to read the data from this and other CSV files.
    We have to import the built-in library CSV for this. This library comes with python
    as the part of **batteries-included** philosophy and we do not have to install
    it separately. Let''s get started with the programming part:


    ```

    import csv

    ```


    Let''s open the file in text and read mode:


    ```

    file = open(''test.csv'')

    ```


    We must treat this file as a CSV (because while it is a plaintext file, we know
    that there is CSV data in this). Let''s do it,


    ```

    csvreader = csv.reader(file)

    ```


    Now, we have the object that treats the file as a CSV. Let''s read the first row.
    The first row is the header row that has the name of the columns:


    ```

    header = []

    header = next(csvreader)

    header

