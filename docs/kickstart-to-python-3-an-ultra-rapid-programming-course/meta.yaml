    # 9.10 Distortions


    Distortions are geometric transformations we apply to images. Geometric transformations
    are mathematical functions. Let''s apply a simple geometric transformation to
    an image:


    ```

    img1 = img.clone()

    img1.distort(''arc'', (angle, ))

    img1

    ```


    Here is the output:


    ![](img/0f3f12fc54f1049d26ccfe6d76bc3687_185_0.png)


    Figure 9-52: Arc transformation


    Observe the output. We can see the transformation creates extra pixels that are
    filled by extending the edge of the original image. This is the default behavior.
    We can customize it with virtual pixels. So before proceeding further with more
    transformations, we will learn more about various methods for virtual pixels.


    We can fill these extra pixels with a constant color:


    ```

    img1 = img.clone()

    img1.background_color = Color(''rgb(127, 127, 127)'')

    img1.virtual_pixel = ''background''

    angle = 60

    img1.distort(''arc'', (angle, ))

    img1

    ```'
