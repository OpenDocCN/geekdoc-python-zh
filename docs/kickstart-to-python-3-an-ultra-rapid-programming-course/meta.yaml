    # 2.3 Tuples


    Tuples are similar to lists. We have to use brackets while creating them. Their
    difference with lists is that they are immutable, meaning once they are created,
    they cannot be modified. Let''s see a simple example as follows,


    ```

    In [1]: fruits = (''apple'', ''grape'', ''mango'')

    In [2]: fruits

    Out[2]: (''apple'', ''grape'', ''mango'')

    In [3]: print(type(fruits))

    <class ''tuple''>

    ```


    The indexing, looping, and concatenation (the + operator) for tuples are the same
    as lists. As tuples are immutable, we cannot directly change any information stored
    in the tuples. However, we can convert them to lists and then assign the changed
    list to any tuple. See the following example:'
