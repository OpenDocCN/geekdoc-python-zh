    \ object.hex(self) |\n\n此表用于比较运算符：\n\n| 运算符 | 特殊函数 |\n| :--- | :--- |\n| < | object.lt(self,\
    \ other) |\n| <= | object.le(self, other) |\n| == | object.eq(self, other) |\n\
    | != | object.ne(self, other) |\n| >= | object.ge(self, other) |\n| > | object.gt(self,\
    \ other) |\n\n## 4.9 语法错误\n\n当我们用 Python（或任何编程语言）编写程序时，我们通常不会第一次就写对。这就是术语错误和异常进入讨论的地方。在本章中，我们将开始讨论\
    \ Python 中的错误和异常。\n\n```\n>>> print(\"Hello\")\n\nSyntaxError: EOL while scanning\
    \ string literal\n```\n\n在上面的 **print()** 语句中，我们忘记在字符串 **Hello** 后添加 \"。这是一个语法错误。因此，Python\
    \ 解释器通过抛出 **SyntaxError** 来突出显示它。\n\n## 4.10 异常\n\n我们说语法/解析错误由 SyntaxError 处理。即使该语句在语法上是正确的，它在执行期间也可能遇到错误（与语法无关）。在执行期间检测到的错误称为异常。考虑以下语句及其在解释器中的执行：\n\
    \n```\n>>> 1/0\nTraceback (most recent call last):\n  File \"<pyshell#1>\", line\
    \ 1, in <module>\n    1/0\nZeroDivisionError: division by zero\n>>> '1' + 1\n\
    Traceback (most recent call last):\n  File \"<pyshell#2>\", line 1, in <module>\n\
    \    '1' + 1\nTypeError: can only concatenate str (not \"int\") to str\n>>> a\
