  md: "# 7.2 Recursion with Pygame\n\nWe have studied the concept of recursion in\
    \ the third chapter. In the previous chapter, we explored it visually. Let's explore\
    \ it again visually. But this time, we will use the Pygame library. Let's start\
    \ with something simple. We will draw a simple recursive tree. The visualization\
    \ will have a black background and white branches. The last few branches and leaves\
    \ will be green. Let's see the code:\n\n```\nprog03.py\nimport pygame, math, random\n\
    import time, sys\nwidth, height = 1366, 768\nresult = pygame.init()\nif result[1]\
    \ > 0:\n    print('Error initializing Pygame : ' + str(result[1]))\n    sys.exit(1)\n\
    else:\n    print('Pygame initialized successfully!')\nwindow = pygame.display.set_mode((width,\
    \ height))\npygame.display.set_caption('Fractal Tree')\nscreen = pygame.display.get_surface()\n\
    \ndef Fractal_Tree(x1, y1, theta, depth):\n    if depth:\n        rand_length\
    \ = random.randint(1, 10)\n        rand_angle = random.randint(10, 20)\n     \
    \   x2 = x1 + int(math.cos(math.radians(theta))\n                      * depth\
    \ * rand_length)\n        y2 = y1 + int(math.sin(math.radians(theta))\n      \
    \                * depth * rand_length)\n        if depth < 5:\n            clr\
    \ = (0, 255, 0)\n        else:\n            clr = ( 255, 255, 255)\n        pygame.draw.line(screen,\
    \ clr, (x1, y1), (x2, y2), 2)\n        Fractal_Tree(x2, y2, theta - rand_angle,\
    \ depth-1)\n        Fractal_Tree(x2, y2, theta + rand_angle, depth-1)\nFractal_Tree(\
    \ (width/2), (height-10), -90, 14)\npygame.display.flip()\nrunning = True\nwhile\
    \ running:\n    for event in pygame.event.get():\n        if event.type == pygame.QUIT:\n\
    \            running = False\npygame.quit()\nsys.exit(0)\n```"
