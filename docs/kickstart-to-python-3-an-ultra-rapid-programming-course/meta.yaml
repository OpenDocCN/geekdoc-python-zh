    \ * 1.5) // 2 + y])\n    if count <= 0:\n        # 叶子节点\n        return 1\n  \
    \  else:\n        recursive_draw(x, y, width // 2, height // 2, count-1)\n   \
    \     recursive_draw(x + width // 2, y, width // 2, height // 2, count-1)\n  \
    \      recursive_draw(x, y + width // 2, width // 2, height // 2, count-1)\n \
