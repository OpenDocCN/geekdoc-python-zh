    \ we can see difficulty and score. A random 10x10 square is spawned and when the\
    \ snake consumes it, it is absorbed by the snake and the snake grows in size.\
    \ Once the square is consumed, another square is spawned in another random location.\
    \ The snake is in a state of perpetual motion. We can move it by using WSAD keys\
    \ but cannot directly reverse its direction. Let's see the code block by block:\n\
    \n```python\nimport pygame, sys, time, random\n```\n\nThis imports all the needed\
    \ libraries. Let's set the initial difficulty:\n\n```python\ndifficulty = 5\n\
    ```\n\nLet's initialize pygame and create a window:\n\n```python\nwindow_size_x\
    \ = 720\nwindow_size_y = 480\nresult = pygame.init()\nif result[1] > 0:\n    print('Error\
    \ initializing Pygame : ' + str(result[1]))\n    sys.exit(1)\nelse:\n    print('Pygame\
    \ initialized successfully!')\npygame.display.set_caption('Snake')\ngame_window\
    \ = pygame.display.set_mode((window_size_x,\n                                \
    \       window_size_y))\n```\n\nLet's define a few colors,\n\n```python\nblack\
    \ = pygame.Color(0, 0, 0)\nwhite = pygame.Color(255, 255, 255)\ngreen = pygame.Color(0,\
    \ 255, 0)\n```\n\nLet's define initial snake segments and direction:\n\n```python\n\
    snake_pos = [100, 100]\nsnake_body = [[100, 100],\n              [100-10, 100]]\n\
    direction = 'DOWN'\nchange_to = direction\n```\n\nand define a random position\
