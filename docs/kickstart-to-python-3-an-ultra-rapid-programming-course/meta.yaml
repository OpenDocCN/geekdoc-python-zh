    \ in <module>\n    a = 8 + b\nNameError: name 'b' is not defined\n```\n\n每个语句执行输出的最后一行显示了该语句有什么问题。这表明在执行期间发生错误时会隐式引发异常。Python\
    \ 库中定义的异常称为内置异常。\n\nhttps://docs.python.org/3/library/exceptions.html#bltin-exceptions\
    \ 列出了所有内置异常。\n\n### 4.10.1 处理异常\n\n现在我们知道，当在运行时遇到错误时，解释器会自动引发异常。考虑以下代码片段：\n\n\
    ```\nprog01.py\ndef main():\n    a = 1/0\n    print(\"DEBUG:  We are here...\"\
    )\nif __name__ == \"__main__\":\n    main()\n```\n\n当我们执行此代码时，请注意解释器在 a = 1/0\
    \ 这一行遇到了以下异常。\n\n**ZeroDivisionError: division by zero**\n\n一旦遇到此异常，它就不会运行遇到异常的语句之后的语句。这就是\
    \ Python 中默认处理异常的方式。然而，Python 有更好的处理异常的规定。我们可以将可能遇到异常的代码放在 try 块中，并将处理它的逻辑放在 except\
    \ 块中，如下所示：\n\n```\nprog01.py\ndef main():\n    try:\n        a = 1/0\n       \
