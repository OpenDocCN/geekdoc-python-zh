    \ 9-14: Blue Shift\n\nWe can also create the charcoal drawing effect:\n\n```\n\
    img1 = img.clone()\nimg1.charcoal(radius=2, sigma=1)\nimg1\n```\n\nHere is the\
    \ output:\n\n![](img/0f3f12fc54f1049d26ccfe6d76bc3687_160_0.png)\n\nFigure 9-15:\
    \ Charcoal Effect\n\nWe can also apply a color matrix:\n\n```\nimg1 = img.clone()\n\
    matrix = [[0, 0, 1],\n          [0, 1, 0],\n          [1, 0, 0]]\nimg1.color_matrix(matrix)\n\
    img1\n```\n\nA color matrix can have a maximum size of 6x6. In a color matrix,\
    \ each column maps to a color channel to reference, and each row represents a\
    \ color channel to effect. For RGB images, these are red, green, blue, n/a, alpha,\
    \ and a constant (offset). For CMYK images, they are cyan, yellow, magenta, black,\
    \ alpha, and a constant. In this example, we have created a 3x3 matrix. Here is\
    \ the output:\n\n![](img/0f3f12fc54f1049d26ccfe6d76bc3687_161_0.png)\n\nFigure\
    \ 9-16: Color Matrix\n\nWe can blend an image with a constant color:\n\n```\n\
    img1 = img.clone()\nimg1.colorize(color=\"green\", alpha=\"rgb(10%, 0%, 20%)\"\
