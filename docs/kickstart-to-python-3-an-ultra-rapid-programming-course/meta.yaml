    ![](img/0f3f12fc54f1049d26ccfe6d76bc3687_158_1.png)\n\n*Figure 9-13: Gaussian\
    \ Noise*\n\nThe following is a list of all valid character strings that can be\
    \ used as names of noises:\n\n```\n'gaussian'\n'impulse'\n'laplacian'\n'multiplicative_gaussian'\n\
    'poisson'\n'random'\n'uniform'\n```\n\nWe can blue shift an image as follows:\n\
    \n```\nimg1 = img.clone()\nimg1.blue_shift(factor=0.5)\nimg1\n```\n\nThe output\
