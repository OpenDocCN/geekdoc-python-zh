    It has a provision for displaying the score either in the top left in small fonts\
    \ or the middle in big fonts. We display the score in the top left during the\
    \ normal execution of the game and in the middle in the big fonts when the game\
    \ is over.\n\nLet's define a function to be called when the game is over:\n\n\
    ```python\ndef game_over():\n    game_over_font = pygame.font.SysFont('Times New\
