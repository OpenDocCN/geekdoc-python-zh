    We will begin our journey with small and easy steps in this chapter. We will learn
    the following topics in this chapter:


    +   - The history of Python Programming Language

    - Installing Python on various platforms

    - IDLE

    - Script Mode of Python

    - Python IDEs

    - Python Implementations and Distributions

    - Python Package Index


    After this chapter, we will be comfortable with the basics of Python and running
    simple Python programs.


    # ## 1.1 History of Python Programming Language


    Python is an interpreted, high-level, and general-purpose programming language.
    It was created with the intention of easily readable code. Python code can be
    characterised by English Language-like syntax. It is easy to read and comprehend
    for a person who has just started learning to program. It borrows a lot of features
    from other programming languages.


    Python programming language is heavily influenced by ABC which was developed at
    **Centrum Wiskunde & Informatica (CWI)**. ABC itself influenced was heavily by
    SETL and ALGOL 68.


    The principal author of Python is Guido Von Rossum. He used to work with the ABC
    programming language at CWI. He was given the title of **Benevolent Dictator for
    Life (BDFL)** by the Python Community.


    The idea of Python programming language was conceived in the late 1980s as a successor
    to the ABC programming language. Guido also borrowed the system of modules from
    Modula-3. He started implementing the language in 1989. Version 0.9.0 was published
    at alt.sources in February 1991. Version 1.0 was published in 1994. Python 2.0
    was released in October 2000.


    In December 2008, a new (and backward incompatible) version of the Python programming
    language, known as Python 3, was released. On January 1, 2020, Python 2 support
    ended and is no longer developed. Now the only version is Python 3. It is under
    active development and supported by the **Python Software Foundation**. We will
    be using Python 3 for all demonstrations in the book. Whenever I mention Python,
    I mean Python 3.'
