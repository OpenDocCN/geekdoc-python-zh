    \nLet's increase the depth to 10:\n\n```python\ndraw_fractal(A_x, A_y, B_x, B_y,\
    \ C_x, C_y, 10)\n```\n\nThe output is as follows:\n\n![](img/0f3f12fc54f1049d26ccfe6d76bc3687_117_1.png)\n\
    \n## 7.3 Sierpinski Triangle by Chaos Game\n\nWe can create the Sierpinski Triangle\
    \ using Chaos Game. The fractal is created by iteratively creating a sequence\
    \ of points. We choose an initial random point ((400, 400) in this example). Each\
    \ point in the sequence is given a half of the distance between the previous point\
    \ and one of the vertices of the polygon chosen randomly in each iteration. When\
    \ we repeat this iterative process a large number of times while selecting a vertex\
    \ of a triangle at random on each iteration most often (but not always) results\
    \ in the Sierpinski Triangle. For better results, we can decide not to plot a\
    \ few initial points. Here is the code:\n\n```python\n# prog05.py\nimport pygame,\
    \ math, random\nimport time, sys\n\nwidth, height = 800, 800\nresult = pygame.init()\n\
    if result[1] > 0:\n    print('Error initializing Pygame : ' + str(result[1]))\n\
    \    sys.exit(1)\nelse:\n    print('Pygame initialized successfully!')\n\nsurface\
    \ = pygame.display.set_mode((width, height))\npygame.display.set_caption('Fibonacci\
    \ Tree')\nscreen = pygame.display.get_surface()\n\ndef draw_pixel(x, y):\n   \
    \ surface.fill(pygame.Color(0, 255, 0), ((x, y), (1, 1)))\n    pygame.display.flip()\n\
    \nshift = 20\nA_x = 0 + shift\nA_y = 649 + shift\nB_x = 750 + shift\nB_y = 649\
    \ + shift\nC_x = 375 + shift\nC_y = 0 + shift\n\nx, y = 400, 400\nfor i in range(\
    \ 1, 50000):\n    choice = random.randint(1, 3)\n    if choice == 1:\n       \
    \ x = (x+A_x)/2\n        y = (y+A_y)/2\n    elif choice == 2:\n        x = (x+B_x)/2\n\
    \        y = (y+B_y)/2\n    elif choice == 3:\n        x = (x+C_x)/2\n       \
    \ y = (y+C_y)/2\n    if i < 10:\n        pass\n    else:\n        draw_pixel(x,\
    \ y)\n\nrunning = True\nwhile running:\n    for event in pygame.event.get():\n\
    \        if event.type == pygame.QUIT:\n            running = False\n\npygame.quit()\n\
    sys.exit(0)\n```\n\nWe are now familiar with most of the code. The logic for choosing\
    \ a random vertex of the triangle and then choosing a new point halfway between\
    \ the current point and chosen vertex is within the **for** loop. This is the\
    \ output:\n\n![](img/0f3f12fc54f1049d26ccfe6d76bc3687_119_0.png)\n\n*Figure 7-6:\
    \ Sierpinski Triangle with Chaos Game*\n\n## 7.4 Simple animation with Pygame\n\
    \nLet's create a simple animation of a bouncing ball with the Pygame library.\
    \ We will learn a lot of new things in this demonstration. Let's write code step\
    \ by step. Create a new file and save it as **prog06.py**. Let's import the required\
    \ libraries as follows:\n\n```python\nimport pygame\nfrom pygame.locals import\
    \ *\n```\n\nLet's initialize Pygame and create an object for screen:\n\n```python\n\
    size = 720, 480\nwidth, height = size\nresult = pygame.init()\nif result[1] >\
    \ 0:\n    print('Error initializing Pygame : ' + str(result[1]))\n    sys.exit(1)\n\
    else:\n    print('Pygame initialized successfully!')\n\nscreen = pygame.display.set_mode((size))\n\
    ```\n\nWe are already familiar with this entire block of code, so I won't explain\
    \ it to you. Let's see some new code. Add the following code to the file:\n\n\
    ```python\nBLUE = (150, 150, 255)\nRED = (255, 0, 0)\nball = pygame.image.load('ball_transparent.gif')\n\
    rect = ball.get_rect()\nspeed = [2, 2]\n```\n\nWe are defining tuples for Blue\
    \ and Red colors. Then we are using the routine **image.load()** to load an image\
    \ into a variable. We can get a rectangle of the size of the image with the routine\
    \ **get_rect()**. Finally, we are defining a list that stores the values for the\
    \ speed along both axes. Let's write the code for the loop:\n\n```python\nrunning\
    \ = True\nwhile running:\n    for event in pygame.event.get():\n        if event.type\
    \ == QUIT:\n            running = False\n\n    rect = rect.move(speed)\n    if\
    \ rect.left < 0 or rect.right > width:\n        speed[0] = -speed[0]\n    if rect.top\
    \ < 0 or rect.bottom > height:\n        speed[1] = -speed[1]\n\n    screen.fill(BLUE)\n\
    \    screen.blit(ball, rect)\n    pygame.time.Clock().tick(240)\n    pygame.display.flip()\n\
    ```\n\nWe are familiar with the loop for events. So, let's discuss the next part.\
    \ We are using the routine **move()** to move the object. We have to pass it the\
    \ variable that stores values for the speed. In the if statements, we are checking\
    \ if the rectangle encompassing the ball touches the borders. If it does, we reverse\
    \ the speed of the ball.\n\nThen, we are filling the screen with blue. We then\
    \ use the routine **blit()** to show the ball. The routine **time.Clock().tick(240)**\
    \ is used to define the framerate of the animation."
