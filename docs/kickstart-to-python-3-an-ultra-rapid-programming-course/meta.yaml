    \ through use of significant whitespace. Its language constructs and object-oriented\
    \ approach aim to help programmers write clear, logical code for small and large-scale\
    \ projects.\")\n```\n\nLet's generate a word cloud:\n\n```python\n# Create the\
    \ wordcloud object\nwordcloud = WordCloud(width= 1280, height=720,\n         \
    \            margin = 0).generate(text)\n\n# Display the generated image:\nplt.imshow(wordcloud,\
    \ interpolation='bilinear')\nplt.axis(\"off\")\nplt.margins(x=0, y=0)\nplt.show()\n\
    ```\n\nHere is the output:\n\n![](img/0f3f12fc54f1049d26ccfe6d76bc3687_201_0.png)\n\
    \n*Figure 10-2: Word cloud of a text string as the source*\n\nWe can also generate\
    \ the word cloud in such a way that it only shows a set number of words. These\
    \ words are the most frequently occurring ones in the source:\n\n```python\nwordcloud\
    \ = WordCloud(width= 1280, height=720,\n                      max_words = 3).generate(text)\n\
    \nplt.figure()\nplt.imshow(wordcloud, interpolation=\"bilinear\")\nplt.axis(\"\
    off\")\nplt.margins(x=0, y=0)\nplt.show()\n```\n\nHere is the output:\n\n![](img/0f3f12fc54f1049d26ccfe6d76bc3687_201_1.png)\n\
    \n*Figure 10-3: Word cloud with a set number of words*\n\nIf you run all cells\
    \ containing the code samples again, you will see that similar but different images\
    \ are generated. Since the position and color are randomly assigned to the words\
    \ in the cloud, we get slightly different images for the same data.\n\nWe can\
    \ remove some words from the final output as follows:\n\n```python\nwordcloud\
    \ = WordCloud(width= 1280, height=720,\n                     stopwords = ['Python',\
    \ 'code']).generate(text)\nplt.figure()\nplt.imshow(wordcloud, interpolation=\"\
