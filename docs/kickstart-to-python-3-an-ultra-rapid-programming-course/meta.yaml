  mdcn: "## 4.4.1 Python中的基本继承\n\n从技术上讲，所有Python类都是一个特定内置类的子类，这个类被称为**object**。这种机制使得Python能够统一处理对象。因此，如果你在Python中创建任何类，就意味着你正在隐式地使用继承。之所以说是隐式的，是因为你不需要在代码中为此做任何特殊规定。你也可以显式地从内置类**object**派生出自定义类，如下所示：\n\
    \n```python\n# prog01.py\nclass MyClass(object):\n    pass\n```\n\n上面的代码与下面的代码具有相同的含义和功能：\n\
    \n```python\n# prog01.py\nclass MyClass:\n    pass\n```\n\n让我们定义一个自定义类，并从它派生出另一个类：\n\
    \n```python\n# prog02.py\nclass Person:\n    pass\nclass Employee:\n    pass\n\
    def main():\n    print(issubclass(Employee, Person))\nif __name__ == \"__main__\"\
    :\n    main()\n```\n\n运行上面的代码。函数**issubclass()**在第一个参数提到的类是第二个参数提到的类的子类时返回true。上面的程序打印false。哎呀！我们忘记了将类**Employee**从**Person**派生出来。为此，修改代码如下：\n\
    \n```python\n# prog02.py\nclass Person:\n    pass\nclass Employee(Person):\n \
    \   pass\ndef main():\n    print(issubclass(Employee, Person))\n    print(issubclass(Person,\
    \ object))\n    print(issubclass(Employee, object))\nif __name__ == \"__main__\"\
    :\n    main()\n```\n\n你一定注意到我们在**main()**部分添加了两条语句。运行代码。它应该打印三次**True**。\n\n##\
    \ 4.4.2 方法重写\n\n让我们为类**Person**添加更多功能。修改模块**prog01.py**：\n\n```python\n# prog01.py\n\
    class Person:\n    def __init__(self, first, last, age):\n        self.firstname\
    \ = first\n        self.lastname = last\n        self.age = age\n    def __str__(self):\n\
    \        return self.firstname + \" \" + self.lastname + \", \" + str(self.age)\n\
    class Employee(Person):\n    pass\ndef main():\n    x = Person(\"Ashwin\", \"\
    Pajankar\", 31)\n    print(x)\nif __name__ == \"__main__\":\n    main()\n```\n\
    \n我们想要定义类**Employee**的行为。由于我们已经从**Person**派生了它，我们可以重用类**Person**中的方法来定义类**Employee**的行为：\n\
    \n```python\n# prog02.py\nclass Person:\n    def __init__(self, first, last, age):\n\
    \        self.firstname = first\n        self.lastname = last\n        self.age\
    \ = age\n    def __str__(self):\n        return self.firstname + \" \" + self.lastname\
    \ + \", \" + str(self.age)\nclass Employee(Person):\n    pass\ndef main():\n \
    \   x = Person(\"Ashwin\", \"Pajankar\", 31)\n    print(x)\n    y = Employee(\"\
    James\", \"Bond\", 32)\n    print(y)\nif __name__ == \"__main__\":\n    main()\n\
    ```\n\n如你所见，类**Employee**从类**Person**继承了初始化方法和**__str__()**方法。然而，我们希望为类**Employee**添加另一个名为**empno**的属性。我们还必须相应地改变**__str__()**方法的行为。以下代码实现了这一点：\n\
    \n```python\n# prog02.py\nclass Person:\n    def __init__(self, first, last, age):\n\
    \        self.firstname = first\n        self.lastname = last\n        self.age\
    \ = age\n    def __str__(self):\n        return (self.firstname + \" \" +\n  \
    \              self.lastname + \", \" +\n                str(self.age))\nclass\
    \ Employee(Person):\n    def __init__(self, first, last, age, empno):\n      \
    \  self.firstname = first\n        self.lastname = last\n        self.age = age\n\
    \        self.empno = empno\n    def __str__(self):\n        return (self.firstname\
    \ + \" \"\n                + self.lastname + \", \"\n                + str(self.age)\
    \ + \", \"\n                + str(self.empno))\ndef main():\n    x = Person(\"\
    Ashwin\", \"Pajankar\", 31)\n    print(x)\n    y = Employee(\"James\", \"Bond\"\
