    \nFigure 7-9: Snake game in action\n\n## Summary\n\nIn this chapter, we explored\
    \ the Pygame library for graphics, games, and animation in detail. We are comfortable\
    \ creating small graphics, animations, and games with Pygame.\n\nIn the next chapter,\
    \ we will learn how to work with files of various formats. We will learn how to\
    \ read and modify files programmatically.\n\n# Chapter 8 • Working with files\n\
    \nIn the previous chapter, we learned how to work with the Pygame library. We\
    \ produced demonstrations for recursion, games, animations, and simulations.\n\
    \nIn this chapter, we will explore the important topic of **working with files**.\
    \ We store data into various file formats. We will learn how to work with the\
    \ files in various formats. We will explore the following topics in detail:\n\n\
    - Handling plaintext file\n- CSV Files\n- Handling Spreadsheets\n\nThis is a detailed\
    \ chapter using a considerable amount of hands-on and advanced concepts. After\
    \ following this chapter, we will be comfortable with MISSING\n\n## 8.1 Handling\
    \ plaintext file\n\nPython comes with a provision to read data directly from a\
    \ plaintext file. We do not have to import a library for this. Let's see the use\
    \ of the routine **open()** to open a file and assign it to a file object. Create\
    \ a new Jupyter notebook for the demonstrations in this chapter. Write the following\
    \ code:\n\n```python\nfile1 = open('test.txt', mode='rt', encoding='utf-8')\n\
    ```\n\nWhen we execute this code, it returns an error because the file does not\
    \ exist. Let's modify the code to handle this:\n\n```python\ntry:\n    file1 =\
    \ open('test.txt', mode='rt', encoding='utf-8')\nexcept Exception as e:\n    print(e)\n\
    ```\n\nIt prints the following message on execution:\n\n```\n[Errno 2] No such\
    \ file or directory: 'test.txt'\n```\n\nLet's understand the use of the routine\
    \ **open()** in detail. First, let's create an empty file named **test.txt** in\
    \ the directory where we saved the notebook. Run the code again. It will run without\
    \ any problems. Let's add more code.\n\n```python\ntry:\n    file1 = open('test.txt',\
    \ mode='rt', encoding='utf-8')\nexcept Exception as e:\n    print(e)\nfinally:\n\
    \    file1.close()\n```\n\nLet's understand the meaning of the arguments passed\
    \ to the parameter of the routine **open()**. The first argument is, obviously,\
    \ the name of the file we need to work with. The second is the mode in which the\
    \ file is opened. The third is encoding. There are various modes in which we can\
    \ open a file and the following is a list of them:\n\n| Mode | Meaning |\n|---|---|\n\
    | r | Opens a file for reading. (default) |\n| w | Opens a file for writing. Creates\
    \ a new file if it does not exist or truncates the file if it exists. |\n| x |\
    \ Opens a file for exclusive creation. If the file already exists, the operation\
    \ fails. |\n| a | Opens a file for appending at the end of the file without truncating\
    \ it. Creates a new file if it does not exist. |\n| t | Opens in text mode. (default)\
    \ |\n| b | Opens in binary mode. |\n| + | Opens a file for updating (reading and\
    \ writing) |\n\nAs we can see, by default, a file is opened in read and text mode.\
    \ What we wrote earlier is equivalent to the following code:\n\n```python\ntry:\n\
    \    file1 = open('test.txt')\nexcept Exception as e:\n    print(e)\nfinally:\n\
    \    file1.close()\n```\n\nWe can also have combinations of multiple modes. The\
    \ following table lists the meaning of all the combinations I have worked with\
    \ up until now:\n\n| Mode | Meaning |\n|---|---|\n| rb | Opens a file for reading\
    \ only in binary format. The file pointer is placed at the beginning of the file.\
    \ This is the default mode. |\n| r+ | Opens a file for both reading and writing.\
    \ The file pointer placed at the beginning of the file. |\n| rb+ | Opens a file\
    \ for both reading and writing in binary format. The file pointer placed at the\
    \ beginning of the file. |\n| wb | Opens a file for writing only in binary format.\
    \ Overwrites the file if the file exists. If the file does not exist, it creates\
    \ a new file for writing. |\n| w+ | Opens a file for both writing and reading.\
    \ Overwrites the existing file if the file exists. If the file does not exist,\
    \ it creates a new file for reading and writing. |\n| wb+ | Opens a file for both\
    \ writing and reading in binary format. Overwrites the existing file if the file\
    \ exists. If the file does not exist, it creates a new file for reading and writing.\
    \ |\n| ab | Opens a file for appending in binary format. The file pointer is at\
    \ the end of the file if the file exists. That is, the file is in the append mode.\
    \ If the file does not exist, it creates a new file for writing. |\n| a+ | Opens\
    \ a file for both appending and reading. The file pointer is at the end of the\
    \ file if the file exists. The file opens in the append mode. If the file does\
    \ not exist, it creates a new file for reading and writing. |\n| ab+ | Opens a\
    \ file for both appending and reading in binary format. The file pointer is at\
    \ the end of the file if the file exists. The file opens in the append mode. If\
    \ the file does not exist, it creates a new file for reading and writing. |\n\n\
    Let's add some text (manually) to the file we created and then modify the code:\n\
    \n```python\ntry:\n    file1 = open('test.txt', mode='rt', encoding='utf-8')\n\
    \    for each in file1:\n        print (each)\nexcept Exception as e:\n    print(e)\n\
    finally:\n    file1.close()\n```\n\nThis will read the content of a file line\
    \ by line and print it. We can also read the contents of a file in a single line\
    \ of code as shown below:\n\n```python\ntry:\n    file1 = open('test.txt', mode='rt',\
    \ encoding='utf-8')\n    print(file1.read())\nexcept Exception as e:\n    print(e)\n\
    finally:\n    file1.close()\n```\n\nWe can read a certain number of characters\
    \ by passing the number as an argument to the routine **read()**.\n\n```python\n\
    try:\n    file1 = open('test.txt', mode='rt', encoding='utf-8')\n    print(file1.read(20))\n\
    except Exception as e:\n    print(e)\nfinally:\n    file1.close()\n```"
