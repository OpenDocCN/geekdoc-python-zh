    \ same data.\n\nWe can remove some words from the final output as follows:\n\n\
    ```\nwordcloud = WordCloud(width= 1280, height=720,\n                     stopwords\
    \ = ['Python', 'code']).generate(text)\nplt.figure()\nplt.imshow(wordcloud, interpolation=\"\
    bilinear\")\nplt.axis(\"off\")\nplt.margins(x=0, y=0)\nplt.show()\n```\n\nHere\
    \ is the output:\n\n![](img/0f3f12fc54f1049d26ccfe6d76bc3687_202_0.png)\n\nWe\
    \ can also change the background color:\n\n```\nwordcloud = WordCloud(width= 1280,\
    \ height=720,\n                     background_color='skyblue').generate(text)\n\
    plt.figure()\nplt.imshow(wordcloud, interpolation=\"bilinear\")\nplt.axis(\"off\"\
    )\nplt.margins(x=0, y=0)\nplt.show()\n```"
