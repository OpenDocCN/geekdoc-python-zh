- md: "## 6.3 Exploring Turtle methods\n\nLet's explore turtle methods. We know the\
    \ position of the turtle as follows:\n\n```python\n>>> Turtle.position()\n```\n\
    \nIt shows the following output:\n\n```\n(0.00, 0.00)\n```\n\nThis means the Turtle\
    \ is at the origin of the canvas (0, 0). The execution of the statement also opens\
    \ a graphical window with the Turtle represented as an arrowhead pointing the\
    \ right direction from our perspective. The following (Figure 6-1) shows this,\n\
    \n![Figure 6-1: Turtle at the origin (0,0)](img/0f3f12fc54f1049d26ccfe6d76bc3687_90_0.png)\n\
    \nWe can move the turtle forward with either **forward()** or **fd()** method.\n\
    \n```python\n>>> Turtle.forward(25)\n```\n\nOr\n\n```python\n>>> Turtle.fd(25)\n\
    ```\n\nIf we run the **position()** statement again, we can see the current coordinates\
    \ of the Turtle as follows:\n\n```python\n>>> Turtle.position()\n```\n\nThe output\
    \ is as follows,\n\n```\n(25.00, 0.00)\n```\n\nSimilarly, we can traverse backward\
    \ with any one of the following methods:\n\n```python\n>>> Turtle.backward(10)\n\
    >>> Turtle.bk(10)\n>>> Turtle.back(10)\n```\n\nThe methods **left()** or **lt()**\
    \ and **right()** or **rt()** are used to turn the turtle left and right by a\
    \ specified amount of angle. By default, the angle is in degrees but we can also\
    \ set it to radians with **radians()**. We can set it back to degrees with the\
    \ routine **degrees()**. By default, we can see an arrow on the screen. But we\
    \ can change it to other shapes with the routine **shape()**. The allowed arguments\
    \ are \"arrow\", \"turtle\", \"circle\", \"square\", \"triangle\", and \"classic\"\
    . Let's change the shape as follows,\n\n```python\n>>> Turtle.shape(\"turtle\"\
    )\n```\n\nNow, let's further learn by creating some small recipes. We will learn\
    \ the rest of the functions as we need to use them. Until now, we worked with\
    \ interactive mode. Let's now start creating a script file.\n\n## 6.4 Recipes\
    \ with Turtle\n\nLet's draw a square with the Turtle. Open IDLE and create a file.\
    \ Write the following code in it:\n\n```python\n# prog00.py\nimport turtle as\
    \ Turtle\nimport time\n\nTurtle.forward(150)\nTurtle.left(90)\nTurtle.forward(150)\n\
    Turtle.left(90)\nTurtle.forward(150)\nTurtle.left(90)\nTurtle.forward(150)\nTurtle.left(90)\n\
    time.sleep(10)\nTurtle.bye()\n```\n\nThe above program will draw a square and\
    \ wait 10 seconds before closing the window.\n\nWe can write it in a bit more\
    \ of a Pythonic way as follows:\n\n```python\n# prog01.py\nimport turtle as Turtle\n\
    import time\n\nfor i in range(4):\n    Turtle.forward(150)\n    Turtle.left(90)\n\
    \ntime.sleep(10)\nTurtle.bye()\n```\n\nRun the program and see the output. Let's\
    \ add more features to it:\n\n```python\n# prog02.py\nimport turtle as Turtle\n\
    import time\n\ndef square(length):\n    for i in range(4):\n        Turtle.forward(length)\n\
    \        Turtle.left(90)\n\nif __name__ == \"__main__\":\n    square(150)\n  \
    \  time.sleep(10)\n    Turtle.bye()\n```\n\nWe can draw circles:\n\n```python\n\
    # prog03.py\nimport turtle as Turtle\n\nTurtle.circle(50)\nTurtle.circle(-50)\n\
    ```\n\nThe output is shown in Figure 6-2.\n\n![Figure 6-2: Drawing circles](img/0f3f12fc54f1049d26ccfe6d76bc3687_93_0.png)\n\
    \nThe argument passed to the routine **circle()** decides the radius and direction\
    \ of the circle. Let's use this routine in combination with other routines to\
    \ create a beautiful diagram:\n\n```python\n# prog04.py\nimport turtle as Turtle\n\
    \nTurtle.color(\"green\")\nfor angle in range(0, 360, 10):\n    Turtle.seth(angle)\n\
    \    Turtle.circle(100)\n```\n\nIn the program (prog04.py) above, we use the routine\
    \ **color()** to set the color of the drawing. We are also using the routine **seth()**\
    \ to set the direction of the Turtle. The code takes quite a lot of time to execute\
    \ and when it finishes, it creates a beautiful pattern shown in Figure 6-3.\n\n\
    ![Figure 6-3: Drawing a beautiful pattern with circles](img/0f3f12fc54f1049d26ccfe6d76bc3687_94_0.png)\n\
    \nWe can also draw a circle without using the built-in routine circle(). The logic\
    \ is that we move the Turtle forward by one position and then take the turn with\
    \ a one-degree angle. We do it 360 times and get a circle. Here is the code:\n\
    \n```python\n# prog05.py\nimport turtle as Turtle\ncount = 0\nwhile(count < 360):\n\
    \    Turtle.forward(1)\n    Turtle.left(1)\n    count = count + 1\n```\n\nRun\
    \ the program and see the output.\n\nWe can also set the background color. Let's\
    \ write a program for a random walk. The background is set as black in this example.\n\
    \n```python\n# prog06.py\nimport turtle as Turtle\nimport random\n\nTurtle.speed(10)\n\
    Turtle.bgcolor('Black')\nturns = 1000\ndistance = 20\n\nfor x in range(turns):\n\
    \    right=Turtle.right(random.randint(0, 360))\n    left=Turtle.left(random.randint(0,\
    \ 360))\n    Turtle.color(random.choice(['Blue', 'Red', 'Green',\n           \
    \                     'Cyan', 'Magenta', 'Pink', 'Violet']))\n    random.choice([right,left])\n\
    \    Turtle.fd(distance)\n```\n\nIt produces the following (Figure 6-4) output,\n\
    \n![Figure 6-4: Drawing with black background](img/0f3f12fc54f1049d26ccfe6d76bc3687_95_0.png)\n\
    \nSometimes programs take a lot of time to execute. We can manage this by changing\
    \ the speed of the turtle. We can use the routine **speed()** for this. The speed\
    \ can vary from 0 to 10. The following is the mapping of the speed strings against\
    \ the values. The default is \"normal\".\n\n- \"fastest\" corresponds to 0\n-\
    \ \"fast\" corresponds to 10\n- \"normal\" corresponds to 6\n- \"slow\" corresponds\
    \ to 3\n- \"slowest\" corresponds to 1\n\nLet's make some more interesting drawings.\
    \ We have used circles (prog04.py) to draw a beautiful pattern (Figure 6-3). We\
    \ can use circles to draw even more intricate patterns:\n\n```python\n# prog07.py\n\
    import turtle as Turtle\nTurtle.speed(10)\nTurtle.bgcolor('Black')\ncolors=['Red',\
    \ 'Yellow', 'Purple',\n        'Cyan', 'Orange', 'Pink']\nfor x in range(100):\n\
    \    Turtle.circle(x)\n    Turtle.color(colors[x%6])\n    Turtle.left(60)\n```\n\
    \nThe output is shown in Figure 6-5.\n\n![Figure 6-5](img/0f3f12fc54f1049d26ccfe6d76bc3687_96_0.png)\n\
    \nWe can draw lines that form a colorful square pattern:\n\n```python\n# prog08.py\n\
    import turtle as Turtle\nTurtle.speed(0)\nTurtle.bgcolor('Black')\ncolors=['Red','Yellow','Pink','Orange']\n\
    for x in range(300):\n    Turtle.color(colors[x%4])\n    Turtle.forward(x)\n \
    \   Turtle.left(90)\n```\n\nThe output is shown in Figure 6-6.\n\n![Figure 6-6:\
    \ Square pattern](img/0f3f12fc54f1049d26ccfe6d76bc3687_97_0.png)\n\nIf you have\
    \ not noticed, the program runs faster. This is because we have increased the\
    \ speed of the Turtle and made it fastest. We can also add more colors to the\
    \ visualization:\n\n```python\n# prog09.py\nimport turtle as Turtle\nTurtle.speed(0)\n\
    Turtle.bgcolor('Black')\ncolors=['Red', 'Yellow', 'Pink', 'Orange',\n        'Blue',\
    \ 'Green', 'Cyan', 'White']\nfor x in range(300):\n    Turtle.color(colors[x%8])\n\
    \    Turtle.forward(x)\n    Turtle.left(90)\n```\n\nWe can also have the lines\
    \ drawn in random color from the list.\n\n```python\n# prog10.py\nimport turtle\
    \ as Turtle\nimport random\nTurtle.speed(0)\nTurtle.bgcolor('Black')\ncolors=['Red',\
    \ 'Yellow', 'Pink', 'Orange',\n        'Blue', 'Green', 'Cyan', 'White']\nfor\
    \ x in range(300):\n    Turtle.color(colors[random.randint(0, 7)])\n    Turtle.forward(x)\n\
    \    Turtle.left(90)\n```\n\nRun both programs and see the output.\n\nWe can also\
    \ draw a beautiful hexagonal pattern drawing:\n\n```python\n# prog11.py\nimport\
    \ turtle as Turtle\n\nTurtle.bgcolor(\"black\")\ncolors=[\"Red\",\"White\",\"\
    Cyan\",\"Yellow\",\"Green\",\"Orange\"]\n\nfor x in range(300):\n    Turtle.color(colors[x%6])\n\
    \    Turtle.fd(x)\n    Turtle.left(59)\n```\n\nThe output is shown in Figure 6-7.\n\
    \n![Figure 6-7: Hexagonal pattern drawing](img/0f3f12fc54f1049d26ccfe6d76bc3687_98_0.png)\n\
    \nWe can also fill shapes with colors. Let's see a couple of examples before ending\
    \ this section. We will use the routines **fillcolor()**, **begin_fill()**, and\
    \ **end_fill()**. The following is a simple example.\n\n```python\n# prog12.py\n\
    import turtle as Turtle\nTurtle.fillcolor('red')\nTurtle.begin_fill()\nTurtle.forward(100)\n\
    Turtle.left(120)\nTurtle.forward(100)\nTurtle.left(120)\nTurtle.forward(100)\n\
    Turtle.left(120)\nTurtle.end_fill()\n```\n\nIt will draw a triangle and fill it\
    \ with red color. Let's see another simple example:\n\n```python\n# prog13.py\n\
    import turtle as Turtle\nTurtle.fillcolor('Orange')\nTurtle.begin_fill()\nfor\
    \ count in range(4):\n    Turtle.forward(100)\n    Turtle.left(90)\nTurtle.end_fill()\n\
    ```\n\nAnd the above program fills a square with orange color.\n\n## 6.5 Visualizing\
    \ Recursion\n\nWe learned about the recursion in the third chapter. We know that\
    \ calling a function from within itself is known as direct recursion. We know\
    \ that there are two important parts of a recursive function. The first is the\
    \ recursion termination criteria. The second is the recursive call. In our earlier\
    \ recursive functions, we printed the output on the console. Now instead of the\
    \ text-based output, we will have graphical output. We will start with a simple\
    \ program:\n\n```python\n# prog00.py\nimport turtle as Turtle\ndef zigzag(size,\
    \ length):\n    if size > 0:\n        Turtle.left(45)\n        Turtle.forward(length)\n\
    \        Turtle.right(90)\n        Turtle.forward(2*length)\n        Turtle.left(90)\n\
    \        Turtle.forward(length)\n        Turtle.right(45)\n```"
