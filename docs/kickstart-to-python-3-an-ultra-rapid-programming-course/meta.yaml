    and how to write and execute Python scripts in various ways. We had an overview
    of IDLE and also looked at various other IDEs for Python. Finally, we learned
    how to use pip, the package manager of Python.


    The next chapter will be much more hands-on. We will learn how to write programs
    with built-in data structures.'
