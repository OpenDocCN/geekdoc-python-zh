    \ * 10,\n            random.randrange(1, (window_size_y//10)) * 10]\nfood_spawn\
    \ = True\n```\n\nLet's define a few game related variables:\n\n```python\nscore\
    \ = 0\ndifficulty_counter = 0\ndifficulty = 5\n```\n\nLet's define a routine (a\
