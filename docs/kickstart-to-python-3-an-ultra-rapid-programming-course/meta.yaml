  md: "# 4.4.1 Basic Inheritance in Python\n\nTechnically all Python classes are subclasses\
    \ of a specific built-in class known as **object**. This mechanism allows Python\
    \ to treat objects alike. So, if you are creating any class in Python, it means\
    \ that you're using inheritance implicitly. It's implicit because you do not have\
    \ to make any special provision in the code for it. You can also explicitly derive\
    \ your custom class from the built-in class **object** as follows:\n\n```\nprog01.py\n\
    class MyClass(object):\n    pass\n```\n\nThe code above has the same meaning and\
    \ functionality:\n\n```\nprog01.py\nclass MyClass:\n    pass\n```\n\nLet's define\
    \ a custom class and derive another class from it:\n\n```\nprog02.py\nclass Person:\n\
    \    pass\nclass Employee:\n    pass\ndef main():\n    print(issubclass(Employee,\
    \ Person))\nif __name__ == \"__main__\":\n    main()\n```\n\nRun the above code.\
    \ The routine **issubclass()** returns true if the class mentioned in the first\
    \ argument is a subclass of the class mentioned in the second argument. The above\
    \ program prints false. OOPS! We forgot to derive the class **Employee** from\
    \ **Person**. For this modify the code as follows:\n\n```\nprog02.py\nclass Person:\n\
    \    pass\nclass Employee(Person):\n    pass\ndef main():\n    print(issubclass(Employee,\
    \ Person))\n    print(issubclass(Person, object))\n    print(issubclass(Employee,\
    \ object))\nif __name__ == \"__main__\":\n    main()\n```"
