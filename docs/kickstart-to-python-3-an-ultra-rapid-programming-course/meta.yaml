    ```

    In [4]: temp_list = list(fruits)


    In [5]: temp_list.append(''papaya'')


    In [6]: fruits = tuple(temp_list)


    In [7]: fruits

    Out[7]: (''apple'', ''grape'', ''mango'', ''papaya'')

    ```


    In the example above, we demonstrated the usage of the routine **tuple()**. This
    way, we can use all the routines of lists cleverly to work with tuples. Let''s
    see the demonstration of the method **count()** to count how many times a particular
    member element occurs in the tuple:


    ```

    In [8]: test_tuple = (2, 3, 1, 3, 1, 4, 5, 6, 3, 6)

    In [9]: x = test_tuple.count(3)

    In [10]: print(x)

    3

    ```


    # 2.4 Sets


    Lists and tuples are ordered data structures and both allow duplicate values.
    Sets are different than both as they are unordered and hence do not allow duplicate
    values. Sets are defined using curly brackets. The following is an example of
    simple sets:


    ```

    In [12]: set1 = {''apple'', ''banana'', ''orange''}

    In [13]: set1

    Out[13]: {''apple'', ''banana'', ''orange''}

    In [14]: set2 = set((''apple'', ''banana'', ''orange''))

    In [15]: set2

    Out[15]: {''apple'', ''banana'', ''orange''}

    In [16]: print(type(set1))

    <class ''set''>

    ```


    We cannot use indexes to retrieve the elements of any set, as sets are unordered.
    But we can use loop constructs for and while. Try this as an exercise. We can
    add new items with the routine **add()** as follows:


    ```

    In [17]: set1

    Out[17]: {''apple'', ''banana'', ''orange''}

    In [18]: set1.add(''pineapple'')

    In [19]: set1

    Out[19]: {''apple'', ''banana'', ''orange'', ''pineapple''}

    ```'
