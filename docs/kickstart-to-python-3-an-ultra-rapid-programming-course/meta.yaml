    ## Chapter 3 • Strings, Functions, and Recursion\n\nIn the previous chapter, we\
    \ explored python collections which included lists, tuples, sets, and dictionaries.\
    \ We also started writing small snippets of code. We have learned a lot of built-in\
    \ functions for the collections. We also explored the IPython console.\n\nIn this\
    \ chapter, we will dive deeper into Python programming. We will also start using\
    \ IDLE. The following is the list of topics we will be covering in this chapter:\n\
    \n- Strings in Python\n- Functions\n- Recursion\n- Direct and Indirect Recursion\n\
    \nAfter completing this chapter, you should be comfortable with the concepts and\
    \ programming of strings and functions in Python.\n\n### 3.1 Strings in Python\n\
    \nIn earlier chapters, while working with the routine **print()** and collections\
    \ (lists, tuples, sets, and dictionaries), we worked extensively with strings.\
    \ I did not mention this because I wished to cover it in a separate chapter as\
    \ it is important to understand it from the very basics. In this section, we will\
    \ take a detailed tour of strings in Python: We will learn the basics and associated\
    \ routines.\n\nLet's open IPython in the command prompt and start learning. We\
    \ can create a string by using a pair of single or double-quotes. The following\
    \ are examples:\n\n```\nIn [1]: 'Python'\nOut[1]: 'Python'\nIn [2]: \"Python\"\
    \nOut[2]: 'Python'\n```\n\nAs we can see, we can use a pair of single or double\
    \ quotes but not a combination of both. The following is the demonstration:\n\n\
    ```\nIn [3]: 'Python\"\n      File \"<ipython-input-3-580e07628eb0>\", line 1\n\
    \        'Python\"\n        ^\nSyntaxError: EOL while scanning string literal\n\
    ```\n\nThe data on the strings is stored in the same way whether we use a pair\
