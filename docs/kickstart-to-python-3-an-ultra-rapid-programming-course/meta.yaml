    Object-Oriented Programming (shortened as OOP) is a programming paradigm. An object
    in the real world is something we can touch, see, feel, and interact with. For
    example, an apple is an object. A bike is an object. A house is an object. Similarly,
    in the world of software engineering, we have objects too. An object is a collection
    of data and associated behaviors. Object-oriented Programming refers to the style
    of programming in which the software is designed and developed with objects and
    related concepts. Let''s take the example of GUI-style OS. Here, a window of a
    program is an object. A taskbar is an object. On-screen apps are objects. Objects
    in the OOP style are analogous to their real-life counterparts, the objects in
    the physical world. Now, consider that there are two objects, a bike, and a car.
    Both are objects. However, their types are different. A car belongs to the class
    of cars and a bike belongs to the class of bikes. In OOP, a class describes an
    object. In the other words, class is a data type. Objects are variables with a
    class data type. Let''s see an example of a simple program with a class and an
    object in Python. This is our first Object-Oriented Program in Python 3 (we are
    knowingly writing (although we have used a few Object-Oriented features of Python).'
