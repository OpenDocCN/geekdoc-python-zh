    Arguments passed:\nprog00.py\n1\ntest 123\ntest\n```\n\nThis is how we can process\
    \ command line arguments in Python. It is a very useful technique that can be\
    \ used in programming text-based utilities.\n\n### 10.2 Wordcloud\n\nWord clouds\
    \ are also known as tag clouds. They are visual representations of the frequency\
    \ of the keywords in the source document so that the most frequently occurring\
    \ word has the biggest size. This applies to all the other keywords in the document\
    \ and we get a cloud-like visual shape. There are many tools available to generate\
    \ word clouds. We can also generate them programmatically.\n\nLet's get started\
    \ with the programming part. Create a new notebook for this section. Run the following\
    \ command to install the required libraries:\n\n```\n!pip3 install matplotlib\
