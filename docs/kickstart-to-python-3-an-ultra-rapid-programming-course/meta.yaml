    \n## 8.1 处理纯文本文件\n\nPython 自带直接从纯文本文件读取数据的功能。我们无需为此导入库。让我们看看如何使用 **open()** 例程打开文件并将其赋值给一个文件对象。为本章的演示创建一个新的\
