    # ## 9.1 Digital Image Processing and Wand Library


    Image Processing is the use of algorithms to process the images. In the days of
    analog films and motion pictures, there were techniques to improve the quality
    of images and frames (in a motion picture) using manual techniques like the use
    of chemical compounds. This was a precursor to the modern idea of image processing.
    Nowadays, most images are digital. Of course, digital is yet to catch up with
    the vibrant colors and clarity of analog (chemical film-based imaging). However,
    since it is cheaper, a vast majority of people and organizations (film producing
    and processing organizations) use digital imaging in the production of images
    and videos. Modern computers are also fast enough to be used for processing digital
    images. We usually use modern programming languages like C, C++, Java, Python,
    MATLAB, and GNU Octave for processing images and videos. It is very easy to process
    images with Python as there are many third-party libraries for this.


    **ImageMagick** is software for the manipulation of images. It comes with APIs
    for various programming languages. We can use the library **Wand** that provides
    a pythonic interface to ImageMagick. Let''s set up the needed software to get
    started. We first need to install ImageMagick for our OSes.


    We can install the ImageMagick on macOS with the following commands:


    ```

    bash

    brew install ghostscript

    brew install imagemagick

    ```'
