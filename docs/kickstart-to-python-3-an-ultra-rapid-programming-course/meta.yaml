- md: "As we can see, we have used a new routine **set_caption()** to set the title\
    \ of the window. We are also using the routine **draw.line()** to draw a line.\
    \ An important thing to consider is that the origin (0, 0) lies in the top left\
    \ corner in Pygame. We are familiar with most of the code. The recursive function\
    \ accepts the coordinates of a point, angle, and depth as arguments. We also randomly\
    \ generate the length of a branch. Using the passed coordinates, and randomly\
    \ generated angle and length, we compute the endpoint of the branch. If the branches\
    \ are near the leaves, then we color them green else with white. In the end, we\
    \ draw the line segment and pass the endpoint of that segment to the recursive\
    \ function call. We also randomly generate another value for angle and add and\
    \ subtract it to the passed angle and use these new values as arguments to the\
    \ recursive call. Let's see the results:\n\n![](img/0f3f12fc54f1049d26ccfe6d76bc3687_114_0.png)\n\
    \nFigure 7-1: Recursive tree with Pygame\n\nLet's draw the Sierpinski triangle.\
    \ It is a bit more complicated than a recursive tree. We have to call the function\
    \ recursively three times. Here is the code:\n\n```python\n# prog04.py\nimport\
    \ pygame, math, random\nimport time, sys\n\nwidth, height = 800, 800\nresult =\
    \ pygame.init()\nif result[1] > 0:\n    print('Error initializing Pygame : ' +\
    \ str(result[1]))\n    sys.exit(1)\nelse:\n    print('Pygame initialized successfully!')\n\
    \nwindow = pygame.display.set_mode((width, height))\npygame.display.set_caption('Fibonacci\
    \ Tree')\nscreen = pygame.display.get_surface()\n\nshift = 20\nA_x = 0 + shift\n\
    A_y = 649 + shift\nB_x = 750 + shift\nB_y = 649 + shift\nC_x = 375 + shift\nC_y\
    \ = 0 + shift\n\nRGB = [(0, 0, 255), (0, 255, 0), (255, 0, 0)]\n\ndef draw_triangle(A_x,\
    \ A_y, B_x, B_y, C_x, C_y, i):\n    pygame.draw.line(screen, RGB[i%3], (A_x, A_y),\
    \ (B_x, B_y), 1)\n    pygame.draw.line(screen, RGB[i%3], (C_x, C_y), (B_x, B_y),\
    \ 1)\n    pygame.draw.line(screen, RGB[i%3], (A_x, A_y), (C_x, C_y), 1)\n    pygame.display.flip()\n\
    \ndef draw_fractal(A_x, A_y, B_x, B_y, C_x, C_y, depth):\n    if depth > 0:\n\
    \        draw_fractal((A_x), (A_y), (A_x+B_x)/2, (A_y+B_y)/2,\n              \
    \       (A_x+C_x)/2, (A_y+C_y)/2, depth-1)\n        draw_fractal((B_x), (B_y),\
    \ (A_x+B_x)/2, (A_y+B_y)/2,\n                     (B_x+C_x)/2, (B_y+C_y)/2, depth-1)\n\
    \        draw_fractal((C_x), (C_y), (C_x+B_x)/2, (C_y+B_y)/2,\n              \
    \       (A_x+C_x)/2, (A_y+C_y)/2, depth-1)\n\n        draw_triangle((A_x), (A_y),\
    \ (A_x+B_x)/2,\n                      (A_y+B_y)/2, (A_x+C_x)/2, (A_y+C_y)/2, depth)\n\
    \        draw_triangle((B_x), (B_y), (A_x+B_x)/2,\n                      (A_y+B_y)/2,\
    \ (B_x+C_x)/2, (B_y+C_y)/2, depth)\n        draw_triangle((C_x), (C_y), (C_x+B_x)/2,\n\
    \                      (C_y+B_y)/2, (A_x+C_x)/2, (A_y+C_y)/2, depth)\n\ndraw_fractal(A_x,\
    \ A_y, B_x, B_y, C_x, C_y, 1)\npygame.display.flip()\n\nrunning = True\nwhile\
    \ running:\n    for event in pygame.event.get():\n        if event.type == pygame.QUIT:\n\
    \            running = False\n\npygame.quit()\nsys.exit(0)\n```\n\nAs we can see,\
    \ we have a separate custom function that draws the actual shape (**draw_triangle()**).\
    \ We are calling this three times into the recursive function before calling the\
    \ recursive function three times. In the main section, we are calling the function\
    \ with depth as 1. It produces the following output:\n\n![](img/0f3f12fc54f1049d26ccfe6d76bc3687_116_0.png)\n\
    \nFigure 7-2: Sierpinski Triangle of depth 1\n\nLet's modify the call in the main\
    \ section for a better understanding:\n\n```python\ndraw_fractal(A_x, A_y, B_x,\
    \ B_y, C_x, C_y, 2)\n```\n\nThe output is as follows:\n\n![](img/0f3f12fc54f1049d26ccfe6d76bc3687_116_1.png)\n\
    \nFigure 7-3: Sierpinski Triangle of depth 2\n\nLet's go further and increase\
