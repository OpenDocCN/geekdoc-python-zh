- md: "## 9.7 Color Enhancement\n\nLet's study a few routines to enhance the colors\
    \ of an image. We have to use the routine **evaluate()** to apply various operations.\
    \ We can find the list of operations at https://docs.wand-py.org/en/0.6.7/wand/image.html#wand.image.EVALUATE_OPS.\n\
    \nLet's read and display a new image:\n\n```python\nimg = Image(filename='D:/Dataset/4.1.03.tiff')\n\
    img\n```\n\nWe can **rightshift** the values of a channel by a certain bits.\n\
    \n```python\nimg1 = img.clone()\nimg1.evaluate(operator='rightshift', value=2,\
    \ channel='green')\nimg1\n```\n\nThe output is as follows:\n\n![](img/0f3f12fc54f1049d26ccfe6d76bc3687_175_0.png)\n\
    \n*Figure 9-40: Rightshift*\n\nWe can also apply the **leftshift** operation:\n\
    \n```python\nimg1 = img.clone()\nimg1.evaluate(operator='leftshift', value=2,\
    \ channel='blue')\nimg1\n```\n\nHere's the output:\n\n![](img/0f3f12fc54f1049d26ccfe6d76bc3687_176_0.png)\n\
    \nWe have even more operations listed at [https://docs.wand-py.org/en/0.6.7/wand/image.html#wand.image.FUNCTION_TYPES](https://docs.wand-py.org/en/0.6.7/wand/image.html#wand.image.FUNCTION_TYPES).\
    \ We can apply these on an image using the routine **function()**:\n\n```python\n\
    img1 = img.clone()\nfrequency = 3\nphase_shift = -90\namplitude = 0.2\nbias =\
    \ 0.7\nimg1.function('sinusoid', [frequency, phase_shift, amplitude, bias])\n\
    img1\n```\n\nHere is the output:\n\n![](img/0f3f12fc54f1049d26ccfe6d76bc3687_176_1.png)\n\
    \nLet's read a new image for the next two demonstrations:\n\n```python\nimg =\
    \ Image(filename='D:/Dataset/4.1.06.tiff')\nimg\n```\n\nWe can adjust the gamma\
    \ of an image:\n\n```python\nimg1 = img.clone()\nimg1.gamma(1.66)\nimg1\n```\n\
    \nThe output is as follows:\n\n![](img/0f3f12fc54f1049d26ccfe6d76bc3687_177_0.png)\n\
    \nFigure 9-43: Gamma\n\nWe can adjust black and white boundaries:\n\n```python\n\
    img1 = img.clone()\nimg1.level(black=0.2, white=0.9, gamma=1.66)\nimg1\n```\n\n\
    The enhanced output is as follows:\n\n![](img/0f3f12fc54f1049d26ccfe6d76bc3687_178_0.png)\n\
    \nFigure 9-44: Level\n\n## 9.8 Image Quantization\n\nImage Quantization is a lossy\
    \ compression technique. We can achieve it by compressing a range of color values\
    \ to a single-color value. The extent of information loss depends on the total\
    \ number of colors in the final output. More colors generally correspond to the\
    \ retention of more information. This technique makes it possible to reduce the\
    \ number of bytes required to store and transmit images. This is a very useful\
    \ image processing technique. Many algorithms can perform image quantization.\
    \ Let's see a few of them. First, let's choose an image,\n\n```python\nimg = Image(filename='D:/Dataset/4.1.05.tiff')\n\
    img\n```\n\nLet's apply K-Means clustering algorithm:\n\n```python\nimg1 = img.clone()\n\
    img1.kmeans(number_colors=4,\n            max_iterations=100,\n            tolerance=0.01)\n\
    img1\n```\n\nHere is the output:\n\n![](img/0f3f12fc54f1049d26ccfe6d76bc3687_179_0.png)\n\
    \nFigure 9-45: KMeans Clustering\n\nWe can also use the routine **posterize()**\
    \ to quantize an image. We can pass different arguments for the dithering method.\
    \ Let's see them one by one. Let's use the **Floyd Steinberg** method:\n\n```python\n\
    img1 = img.clone()\nimg1.posterize(levels=4,\n               dither='floyd_steinberg')\n\
    img1\n```\n\nHere's another method for dithering:\n\n```python\nimg1 = img.clone()\n\
    img1.posterize(levels=4, dither='riemersma')\nimg1\n```\n\nWe can also avoid using\
    \ dithering:\n\n```python\nimg1 = img.clone()\nimg1.posterize(levels=4, dither='no')\n\
    img1\n```\n\nWe can also use the routine **quantize()** for the same purpose:\n\
    \n```python\nimg1 = img.clone()\nimg1.quantize(number_colors=8,\n            \
    \  colorspace_type='srgb',\n              treedepth=1,\n              dither=True,\n\
    \              measure_error=False)\nimg1\n```\n\nHere's the output:\n\n![](img/0f3f12fc54f1049d26ccfe6d76bc3687_180_0.png)\n\
    \n*Figure 9-46: Quantization with 8 colors*\n\n## 9.9 Threshold\n\nIn thresholding,\
    \ based on the value of channels for a pixel, we make some decisions. Let's say,\
    \ we define a function that takes an argument and returns 0 if the value passed\
    \ is less than 127 then the function is a thresholding function and 127 is the\
    \ threshold value. We can manually define such a function in Python. The Wand\
    \ library has plenty of such functions. Let's explore them one by one.\n\nLet's\
    \ look at **Local Adaptive Threshold**. This is also known as **Local Threshold**\
    \ or **Adaptive Threshold**. In this method, every pixel is adjusted as per the\
    \ values of the surrounding pixel. If the pixel has a greater value than the average\
    \ of its surrounding pixels, it is set to white, otherwise to black.\n\n```python\n\
    img1 = img.clone()\nimg1.transform_colorspace('gray')\nimg1.adaptive_threshold(width=16,\
    \ height=16,\n                        offset=-0.08 * img.quantum_range)\nimg1\n\
    ```\n\nWe are turning the image to greyscale and then thresholding it. This way,\
    \ we can see the results. The output is as follows:\n\n![](img/0f3f12fc54f1049d26ccfe6d76bc3687_181_0.png)\n\
    \nFigure 9-47: Local Adaptive Threshold\n\nAs we can see, the thresholding operation\
    \ on a greyscale image results in a binary (black-and-white) image. This is known\
    \ as binarization which is the simplest form of image segmentation. Let's see\
    \ how we can automatically threshold an image without passing any threshold value.\
    \ There are three methods. The first is the **Kapur** method,\n\n```python\nimg1\
    \ = img.clone()\nimg1.transform_colorspace('gray')\nimg1.auto_threshold(method='kapur')\n\
    img1\n```\n\nThe second is the **Otsu** method:\n\n```python\nimg1 = img.clone()\n\
    img1.transform_colorspace('gray')\nimg1.auto_threshold(method='otsu')\nimg1\n\
    ```\n\nThe final method is the **Triangle**:\n\n```python\nimg1 = img.clone()\n\
    img1.transform_colorspace('gray')\nimg1.auto_threshold(method='triangle')\nimg1\n\
    ```\n\nWe can also omit the step where we convert the image to greyscale and apply\
    \ the thresholding algorithm directly to the color image. In such cases, the algorithm\
    \ is applied to all the channels of the color image. Let's see the black thresholding\
    \ where we set all the pixels below the threshold value to the black color,\n\n\
    ```python\nimg1 = img.clone()\nimg1.black_threshold(threshold='#960')\nimg1\n\
    ```\n\nHere's the output:\n\n![](img/0f3f12fc54f1049d26ccfe6d76bc3687_182_0.png)\n\
    \nWe can even have a color threshold where the values between the start and stop\
    \ are set to white and rest are set to black:\n\n```python\nimg1 = img.clone()\n\
    img1.color_threshold(start='#321', stop='#aaa')\nimg1\n```\n\nThe **Wand** library\
    \ has a method to apply predefined threshold maps to create dithered images. The\
    \ following is a table of the map values and their meanings:\n\n| Map | Description\
    \ |\n|---|---|\n| threshold | Threshold 1x1 (non-dither) |\n| checks | Checkerboard\
    \ 2x1 (dither) |\n| o2x2 | Ordered 2x2 (dispersed) |\n| o3x3 | Ordered 3x3 (dispersed)\
    \ |\n| o4x4 | Ordered 4x4 (dispersed) |\n| o8x8 | Ordered 8x8 (dispersed) |\n\
    | h4x4a | Halftone 4x4 (angled) |\n| h6x6a | Halftone 6x6 (angled) |\n| h8x8a\
    \ | Halftone 8x8 (angled) |\n| h4x4o | Halftone 4x4 (orthogonal) |\n| h6x6o |\
    \ Halftone 6x6 (orthogonal) |\n| h8x8o | Halftone 8x8 (orthogonal) |\n| h16x16o\
    \ | Halftone 16x16 (orthogonal) |\n| c5x5b | Circles 5x5 (black) |\n| c5x5w |\
    \ Circles 5x5 (white) |\n| c6x6b | Circles 6x6 (black) |\n| c6x6w | Circles 6x6\
    \ (white) |\n| c7x7b | Circles 7x7 (black) |\n| c7x7w | Circles 7x7 (white) |\n\
    \nLet's see a simple example of the same with the last entry in the table:\n\n\
    ```python\nimg1 = img.clone()\nimg1.ordered_dither('c7x7w')\nimg1\n```\n\nThis\
    \ produces the following output:\n\n![](img/0f3f12fc54f1049d26ccfe6d76bc3687_183_0.png)\n\
    \nWe can apply a random threshold between two given values:\n\n```python\nimg1\
    \ = img.clone()\nimg1.random_threshold(low=0.3 * img1.quantum_range,\n       \
    \             high=0.6 * img1.quantum_range)\nimg1\n```"
  mdcn: "## 9.7 色彩增强\n\n让我们学习几个增强图像色彩的例程。我们必须使用 **evaluate()** 例程来应用各种操作。我们可以在 https://docs.wand-py.org/en/0.6.7/wand/image.html#wand.image.EVALUATE_OPS\
    \ 找到操作列表。\n\n让我们读取并显示一张新图像：\n\n```python\nimg = Image(filename='D:/Dataset/4.1.03.tiff')\n\
    img\n```\n\n我们可以将某个通道的值**右移**特定位数。\n\n```python\nimg1 = img.clone()\nimg1.evaluate(operator='rightshift',\
    \ value=2, channel='green')\nimg1\n```\n\n输出如下：\n\n![](img/0f3f12fc54f1049d26ccfe6d76bc3687_175_0.png)\n\
    \n*图 9-40：右移*\n\n我们也可以应用**左移**操作：\n\n```python\nimg1 = img.clone()\nimg1.evaluate(operator='leftshift',\
    \ value=2, channel='blue')\nimg1\n```\n\n输出如下：\n\n![](img/0f3f12fc54f1049d26ccfe6d76bc3687_176_0.png)\n\
    \n我们还有更多操作列在 [https://docs.wand-py.org/en/0.6.7/wand/image.html#wand.image.FUNCTION_TYPES](https://docs.wand-py.org/en/0.6.7/wand/image.html#wand.image.FUNCTION_TYPES)。我们可以使用\
    \ **function()** 例程将这些操作应用于图像：\n\n```python\nimg1 = img.clone()\nfrequency = 3\n\
    phase_shift = -90\namplitude = 0.2\nbias = 0.7\nimg1.function('sinusoid', [frequency,\
    \ phase_shift, amplitude, bias])\nimg1\n```\n\n输出如下：\n\n![](img/0f3f12fc54f1049d26ccfe6d76bc3687_176_1.png)\n\
    \n让我们读取一张新图像用于接下来的两个演示：\n\n```python\nimg = Image(filename='D:/Dataset/4.1.06.tiff')\n\
    img\n```\n\n我们可以调整图像的伽马值：\n\n```python\nimg1 = img.clone()\nimg1.gamma(1.66)\n\
    img1\n```\n\n输出如下：\n\n![](img/0f3f12fc54f1049d26ccfe6d76bc3687_177_0.png)\n\n\
    图 9-43：伽马\n\n我们可以调整黑白边界：\n\n```python\nimg1 = img.clone()\nimg1.level(black=0.2,\
    \ white=0.9, gamma=1.66)\nimg1\n```\n\n增强后的输出如下：\n\n![](img/0f3f12fc54f1049d26ccfe6d76bc3687_178_0.png)\n\
    \n图 9-44：色阶\n\n## 9.8 图像量化\n\n图像量化是一种有损压缩技术。我们可以通过将一系列颜色值压缩为单一颜色值来实现。信息损失的程度取决于最终输出中的颜色总数。通常，颜色越多意味着保留的信息越多。这种技术使得减少存储和传输图像所需的字节数成为可能。这是一种非常有用的图像处理技术。许多算法可以执行图像量化。让我们看几个例子。首先，选择一张图像：\n\
    \n```python\nimg = Image(filename='D:/Dataset/4.1.05.tiff')\nimg\n```\n\n让我们应用\
    \ K-Means 聚类算法：\n\n```python\nimg1 = img.clone()\nimg1.kmeans(number_colors=4,\n\
    \            max_iterations=100,\n            tolerance=0.01)\nimg1\n```\n\n输出如下：\n\
    \n![](img/0f3f12fc54f1049d26ccfe6d76bc3687_179_0.png)\n\n图 9-45：KMeans 聚类\n\n\
    我们也可以使用 **posterize()** 例程来量化图像。我们可以为抖动方法传递不同的参数。让我们逐一查看。使用 **Floyd Steinberg**\
    \ 方法：\n\n```python\nimg1 = img.clone()\nimg1.posterize(levels=4,\n           \
    \    dither='floyd_steinberg')\nimg1\n```\n\n另一种抖动方法：\n\n```python\nimg1 = img.clone()\n\
    img1.posterize(levels=4, dither='riemersma')\nimg1\n```\n\n我们也可以避免使用抖动：\n\n```python\n\
    img1 = img.clone()\nimg1.posterize(levels=4, dither='no')\nimg1\n```\n\n我们也可以使用\
    \ **quantize()** 例程达到相同目的：\n\n```python\nimg1 = img.clone()\nimg1.quantize(number_colors=8,\n\
    \              colorspace_type='srgb',\n              treedepth=1,\n         \
    \     dither=True,\n              measure_error=False)\nimg1\n```\n\n输出如下：\n\n\
    ![](img/0f3f12fc54f1049d26ccfe6d76bc3687_180_0.png)\n\n*图 9-46：使用 8 种颜色进行量化*\n\
    \n## 9.9 阈值\n\n在阈值处理中，我们根据像素的通道值做出一些决策。假设我们定义一个函数，它接受一个参数，如果传入的值小于 127 则返回 0，那么该函数就是一个阈值函数，127\
    \ 就是阈值。我们可以在 Python 中手动定义这样的函数。Wand 库提供了许多这样的函数。让我们逐一探索。\n\n让我们看看**局部自适应阈值**。这也称为**局部阈值**或**自适应阈值**。在这种方法中，每个像素都根据其周围像素的值进行调整。如果像素的值大于其周围像素的平均值，则将其设置为白色，否则设置为黑色。\n\
    \n```python\nimg1 = img.clone()\nimg1.transform_colorspace('gray')\nimg1.adaptive_threshold(width=16,\
    \ height=16,\n                        offset=-0.08 * img.quantum_range)\nimg1\n\
    ```\n\n我们将图像转换为灰度图，然后进行阈值处理。这样我们就能看到结果。输出如下：\n\n![](img/0f3f12fc54f1049d26ccfe6d76bc3687_181_0.png)\n\
    \n图 9-47：局部自适应阈值\n\n如我们所见，对灰度图像进行阈值处理会得到一个二值（黑白）图像。这被称为二值化，是图像分割的最简单形式。让我们看看如何在不传递任何阈值的情况下自动对图像进行阈值处理。有三种方法。第一种是\
    \ **Kapur** 方法：\n\n```python\nimg1 = img.clone()\nimg1.transform_colorspace('gray')\n\
    img1.auto_threshold(method='kapur')\nimg1\n```\n\n第二种是 **Otsu** 方法：\n\n```python\n\
    img1 = img.clone()\nimg1.transform_colorspace('gray')\nimg1.auto_threshold(method='otsu')\n\
    img1\n```\n\n最后一种是 **Triangle** 方法：\n\n```python\nimg1 = img.clone()\nimg1.transform_colorspace('gray')\n\
    img1.auto_threshold(method='triangle')\nimg1\n```\n\n我们也可以省略将图像转换为灰度图的步骤，直接将阈值算法应用于彩色图像。在这种情况下，算法会应用于彩色图像的所有通道。让我们看看黑色阈值处理，它将所有低于阈值的像素设置为黑色：\n\
    \n```python\nimg1 = img.clone()\nimg1.black_threshold(threshold='#960')\nimg1\n\
    ```\n\n输出如下：\n\n![](img/0f3f12fc54f1049d26ccfe6d76bc3687_182_0.png)\n\n我们还可以进行颜色阈值处理，其中起始值和结束值之间的值设置为白色，其余设置为黑色：\n\
    \n```python\nimg1 = img.clone()\nimg1.color_threshold(start='#321', stop='#aaa')\n\
    img1\n```\n\n**Wand** 库提供了一种方法来应用预定义的阈值映射以创建抖动图像。下表列出了映射值及其含义：\n\n| 映射 | 描述 |\n\
    |---|---|\n| threshold | 阈值 1x1（无抖动） |\n| checks | 棋盘格 2x1（抖动） |\n| o2x2 | 有序\
    \ 2x2（分散） |\n| o3x3 | 有序 3x3（分散） |\n| o4x4 | 有序 4x4（分散） |\n| o8x8 | 有序 8x8（分散）\
    \ |\n| h4x4a | 半色调 4x4（角度） |\n| h6x6a | 半色调 6x6（角度） |\n| h8x8a | 半色调 8x8（角度） |\n\
    | h4x4o | 半色调 4x4（正交） |\n| h6x6o | 半色调 6x6（正交） |\n| h8x8o | 半色调 8x8（正交） |\n| h16x16o\
    \ | 半色调 16x16（正交） |\n| c5x5b | 圆形 5x5（黑色） |\n| c5x5w | 圆形 5x5（白色） |\n| c6x6b |\
    \ 圆形 6x6（黑色） |\n| c6x6w | 圆形 6x6（白色） |\n| c7x7b | 圆形 7x7（黑色） |\n| c7x7w | 圆形 7x7（白色）\
    \ |\n\n让我们用表中的最后一个条目看一个简单的例子：\n\n```python\nimg1 = img.clone()\nimg1.ordered_dither('c7x7w')\n\
    img1\n```\n\n这将产生以下输出：\n\n![](img/0f3f12fc54f1049d26ccfe6d76bc3687_183_0.png)\n\
    \n我们可以在两个给定值之间应用随机阈值：\n\n```python\nimg1 = img.clone()\nimg1.random_threshold(low=0.3\
    \ * img1.quantum_range,\n                    high=0.6 * img1.quantum_range)\n\
    img1\n```"
