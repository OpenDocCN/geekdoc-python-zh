    retrieving data. There are many data structures. The concept of data structures
    predates Python. Many of the data structures we will explore in this chapter were
    designed after considering the limitations of programming languages such as C,
    C++, and Java. Most programming languages are equipped with basic data structures
    like arrays. Python has built-in support for a better version and more versatile
    arrays, known as collections. Python also supports strings. We have already explored
    all the built-in data structures.


    In this chapter, we will focus on the most popular and most used data structures.
    Many third-party Python libraries already implement these. However, we want to
    learn to implement all of them on our own from scratch. Therefore, we will write
    our own code for all these data structures.


