- md: '## Chapter 1 • Introduction to Python


    I hope that you have glanced through the table of contents of the book. If not,
    then I request you do as it will present a fair idea to the readers about the
    contents of this chapter. If you are not a total beginner to Python, you may find
    this chapter very basic. However, if you are new to Python or computer programming,
    you will find this chapter very useful.


    We will begin our journey with small and easy steps in this chapter. We will learn
    the following topics in this chapter:


    - The history of Python Programming Language

    - Installing Python on various platforms

    - IDLE

    - Script Mode of Python

    - Python IDEs

    - Python Implementations and Distributions

    - Python Package Index


    After this chapter, we will be comfortable with the basics of Python and running
    simple Python programs.


    ### 1.1 History of Python Programming Language


    Python is an interpreted, high-level, and general-purpose programming language.
    It was created with the intention of easily readable code. Python code can be
    characterised by English Language-like syntax. It is easy to read and comprehend
    for a person who has just started learning to program. It borrows a lot of features
    from other programming languages.


    Python programming language is heavily influenced by ABC which was developed at
    **Centrum Wiskunde & Informatica (CWI)**. ABC itself was heavily influenced by
    SETL and ALGOL 68.


    The principal author of Python is Guido Von Rossum. He used to work with the ABC
    programming language at CWI. He was given the title of **Benevolent Dictator for
    Life (BDFL)** by the Python Community.


    The idea of Python programming language was conceived in the late 1980s as a successor
    to the ABC programming language. Guido also borrowed the system of modules from
    Modula-3. He started implementing the language in 1989. Version 0.9.0 was published
    at alt.sources in February 1991. Version 1.0 was published in 1994. Python 2.0
    was released in October 2000.


    In December 2008, a new (and backward incompatible) version of the Python programming
    language, known as Python 3, was released. On January 1, 2020, Python 2 support
    ended and is no longer developed. Now the only version is Python 3. It is under
    active development and supported by the **Python Software Foundation**. We will
    be using Python 3 for all demonstrations in the book. Whenever I mention Python,
    I mean Python 3.


    ### 1.2 Installing Python on various platforms


    In this section, we will learn how to install Python 3 on Windows and Linux. Python
    supports a wide variety of operating systems. However, the most commonly used
    Operating systems for development with Python are Windows and Linux. I will therefore
    explain Python 3 with these two platforms.


    #### 1.2.1 Installation on Linux


    Almost all major distributions of Linux come with Python 2 and 3 installed. Python
    2 interpreter is the binary executable **python** and Python 3 interpreter is
    the binary executable **python3**. I am using a Debian Linux variant **Raspberry
    Pi OS** with a Raspberry Pi 4 as my preferred Linux platform for Python development.
    Open the terminal emulator of your Linux distribution and run the following command:


    ```

    pi@raspberrypi:~ $ python3 -V

    ```


    It will show the following output,


    **Python 3.7.3**


    #### 1.2.2 Installation on Windows


    It is very easy and straightforward to install Python on a Windows computer. We
    have to visit Python''s homepage on the internet located at [www.python.org](http://www.python.org).
    If we hover the mouse pointer over the **Downloads** section, the website automatically
    detects the Operating system and shows the appropriate download file. Click on
    the button saying **Python 3.9.7**. This version number will change in the future
    but the process is the same. Once you click on the button, it will download a
    windows executable setup file to your user''s **Downloads** directory on your
    computer. It detects the architecture of your computer and downloads the relevant
    file. For instance, I have an x86 64-bit Windows computer. It downloaded the file
    **python-3.9.7-amd64.exe**. The screenshot of the [www.python.org](http://www.python.org)
    is shown in Figure 1-1 as follows:


    ![](img/0f3f12fc54f1049d26ccfe6d76bc3687_9_0.png)


    Figure 1-1: Python Setup Download for Windows


    Now, open the setup file and it will launch an installation program.


    NOTE: You can open the file by clicking the downloaded file in your browser. You
    can also find the file''s physical location by going through the downloads option
    in your browser. It will point to a location in the **Downloads** directory of
    your Windows user.


    The setup program window is shown in the screenshot in Figure 1-2 as follows:


    ![](img/0f3f12fc54f1049d26ccfe6d76bc3687_9_1.png)


    Figure 1-2: Python Installation program


    Check all the checkboxes and click on the **Customize installation** option. It
    will open the next screen for the installation as shown in Figure 1-3 as follows:


    ![](img/0f3f12fc54f1049d26ccfe6d76bc3687_10_0.png)


    Figure 1-3: Options for the installation


    Click the **Next** button and it will take you to the screen shown in Figure 1-4:


    ![](img/0f3f12fc54f1049d26ccfe6d76bc3687_10_1.png)


    Figure 1-4: Options for the installation


    Check all the options and click the **Install** button. It will then ask for administrator
    credentials. Enter the credentials and it will start installing Python and other
    relevant programs to your Windows computer. Once the installation completes, it
    shows the following screen (Figure 1-5):


    ![](img/0f3f12fc54f1049d26ccfe6d76bc3687_11_0.png)


    Figure 1-5: Installation Success message


    Before we begin celebrating, we need to verify a few things. Open the command
    prompt of windows (cmd) and run the following command:


    ```

    C:\Users\Ashwin>python -V

    ```


    The output is as follows,


    **Python 3.9.7**


    Congratulations! We have installed Python 3 on your Windows computer.


    ### 1.3 IDLE


    Python Software Foundation has developed an integrated development environment
    (IDE) for Python. It is christened as ''IDLE'' which stands for **Integrated Development
    and Learning Environment**. It comes with the Python setup when we install it
    on Windows. On Linux distributions, we have to install it separately. For Debian
    and derivatives, run the following command on the command prompt (Terminal emulator):


    ```

    pi@raspberrypi:~ $ sudo apt-get install idle -y

    ```


    It will install IDLE on your Linux distribution.


    Let''s work with IDLE. We can find it by typing IDLE in the Windows search bar.
    We can find it in the Linux Menu. In Linux, we can launch it from the command
    prompt by running the following command,


    ```

    pi@raspberrypi:~ $ idle &

    ```


    The IDLE window looks like this (Figure 1-6):


    ![](img/0f3f12fc54f1049d26ccfe6d76bc3687_12_0.png)


    In the menubar, under the menu item Options, we can find the option **Configure
    IDLE** where we can set the font size and other details (Figure 1-7),


    ![](img/0f3f12fc54f1049d26ccfe6d76bc3687_12_1.png)


    Change the font and size as per your choice and click the **Apply** and **OK**
    buttons respectively. Now, let''s try to understand the interactive mode of Python.
    When invoked, the Windows IDLE shows interactive mode. We can use it to run Python
    statements directly without saving them as a file. The Python statements are fed
    directly to the interpreter and the output is immediately displayed in the same
    window. If you have ever worked with the command prompt of the OS then it is almost
    the same. Interactive mode is usually used to run single statements or short blocks
    of code. Let''s try running a simple statement:


    ```

    >>> print("Hello World!")

    ```


    This produces the following result and prints it in the same window:


    **Hello World!**


    The cursor returns to the prompt and is ready to fetch the new command by the
    user. This way we have run our first Python statement. We can exit the interpreter
    by running the command **exit()** in the interpreter. Alternatively, we can press
    CTRL + D to exit. We can also invoke the interactive mode from the command prompt
    by running the commands **python** on Windows and **python3** on the Linux command
    prompt.


    ### 1.4 Script Mode of Python


    Python interactive mode is good for single-line statements and small blocks of
    code. However, it does not save the statements as programs. This can be done in
    scripting mode. In the Python interpreter of IDLE under the menu **File** in the
    menubar, choose **New File**. Type in the following code into this:


    ```

    print("Hello World!")

    ```


    From the menu **File** in the menubar, choose Save. It will open the window **Save
    As**. Save it in the location of your choice. The IDLE automatically adds the
    *.py extension to the end of the filename. Then click menu **Run** from the menubar
    and click **Run Module**. This will execute the program and display the output
    in the IDLE''s interactive mode window as shown below (Figure 1-8).


    ![](img/0f3f12fc54f1049d26ccfe6d76bc3687_13_0.png)


    Figure 1-8: Python Script Output'
  mdcn: '## 第1章 • Python简介


    希望您已经浏览过本书的目录。如果没有，我建议您这样做，因为它能让读者对本章内容有一个大致的了解。如果您对Python并非完全陌生，可能会觉得本章内容非常基础。然而，如果您是Python或计算机编程的新手，您会发现本章非常有用。


    在本章中，我们将从简单易懂的步骤开始我们的学习之旅。我们将学习以下主题：


    - Python编程语言的历史

    - 在各种平台上安装Python

    - IDLE

    - Python的脚本模式

    - Python集成开发环境

    - Python的实现与发行版

    - Python包索引


    学完本章后，我们将熟悉Python的基础知识并能运行简单的Python程序。


    ### 1.1 Python编程语言的历史


    Python是一种解释型、高级、通用的编程语言。其创建初衷是编写易于阅读的代码。Python代码的特点是语法类似于英语。对于刚开始学习编程的人来说，它易于阅读和理解。它借鉴了许多其他编程语言的特性。


    Python编程语言深受ABC语言的影响，后者是在**Centrum Wiskunde & Informatica (CWI)**开发的。ABC本身又深受SETL和ALGOL
    68的影响。


    Python的主要作者是Guido Von Rossum。他曾在CWI从事ABC编程语言的工作。Python社区授予他**终身仁慈独裁者（BDFL）**的称号。


    Python编程语言的构想产生于1980年代末，作为ABC编程语言的后继者。Guido还借鉴了Modula-3的模块系统。他于1989年开始实现该语言。0.9.0版本于1991年2月在alt.sources上发布。1.0版本于1994年发布。Python
    2.0于2000年10月发布。


    2008年12月，一个新版本（且向后不兼容）的Python编程语言，即Python 3，被发布。2020年1月1日，Python 2的支持结束，不再进行开发。现在唯一的版本是Python
    3。它处于积极开发中，并由**Python软件基金会**支持。本书中的所有演示都将使用Python 3。每当我提到Python时，我指的是Python 3。


    ### 1.2 在各种平台上安装Python


    在本节中，我们将学习如何在Windows和Linux上安装Python 3。Python支持多种操作系统。然而，使用Python进行开发最常用的操作系统是Windows和Linux。因此，我将针对这两个平台解释Python
    3的安装。


    #### 1.2.1 在Linux上安装


    几乎所有主要的Linux发行版都预装了Python 2和Python 3。Python 2解释器是二进制可执行文件**python**，Python 3解释器是二进制可执行文件**python3**。我使用Debian
    Linux的变体**Raspberry Pi OS**，搭配Raspberry Pi 4作为我进行Python开发的首选Linux平台。打开您Linux发行版的终端模拟器并运行以下命令：


    ```

    pi@raspberrypi:~ $ python3 -V

    ```


    它将显示以下输出：


    **Python 3.7.3**


    #### 1.2.2 在Windows上安装


    在Windows计算机上安装Python非常简单直接。我们需要访问Python在互联网上的主页，地址是[www.python.org](http://www.python.org)。如果我们将鼠标指针悬停在**Downloads**部分，网站会自动检测操作系统并显示相应的下载文件。点击标有**Python
    3.9.7**的按钮。这个版本号将来会改变，但过程是相同的。一旦您点击该按钮，它会将一个Windows可执行安装文件下载到您计算机上用户**Downloads**目录中。它会检测您计算机的架构并下载相关文件。例如，我有一台x86
    64位的Windows计算机。它下载了文件**python-3.9.7-amd64.exe**。[www.python.org](http://www.python.org)的截图如图1-1所示：


    ![](img/0f3f12fc54f1049d26ccfe6d76bc3687_9_0.png)


    图1-1：Windows的Python安装程序下载


    现在，打开安装文件，它将启动一个安装程序。


    注意：您可以通过点击浏览器中下载的文件来打开它。您也可以通过浏览器中的下载选项找到文件的物理位置。它将指向您Windows用户**Downloads**目录中的一个位置。


    安装程序窗口如图1-2所示：


    ![](img/0f3f12fc54f1049d26ccfe6d76bc3687_9_1.png)


    图1-2：Python安装程序


    勾选所有复选框，然后点击**Customize installation**选项。它将打开下一个安装屏幕，如图1-3所示：


    ![](img/0f3f12fc54f1049d26ccfe6d76bc3687_10_0.png)


    图1-3：安装选项


    点击**Next**按钮，它将带您进入图1-4所示的屏幕：


    ![](img/0f3f12fc54f1049d26ccfe6d76bc3687_10_1.png)


    图1-4：安装选项


    勾选所有选项，然后点击**Install**按钮。它将要求提供管理员凭据。输入凭据后，它将开始在您的Windows计算机上安装Python和其他相关程序。安装完成后，它会显示以下屏幕（图1-5）：


    ![](img/0f3f12fc54f1049d26ccfe6d76bc3687_11_0.png)


    图1-5：安装成功消息


    在我们开始庆祝之前，我们需要验证几件事。打开Windows的命令提示符（cmd）并运行以下命令：


    ```

    C:\Users\Ashwin>python -V

    ```


    输出如下：


    **Python 3.9.7**


    恭喜！我们已经在您的Windows计算机上安装了Python 3。


    ### 1.3 IDLE


    Python软件基金会为Python开发了一个集成开发环境（IDE）。它被命名为''IDLE''，代表**集成开发与学习环境**。当我们在Windows上安装Python时，它会随安装程序一起提供。在Linux发行版上，我们需要单独安装它。对于Debian及其衍生版，在命令提示符（终端模拟器）上运行以下命令：


    ```

    pi@raspberrypi:~ $ sudo apt-get install idle -y

    ```


    它将在您的Linux发行版上安装IDLE。


    让我们使用IDLE。我们可以在Windows搜索栏中输入IDLE来找到它。我们可以在Linux菜单中找到它。在Linux中，我们可以通过运行以下命令从命令提示符启动它：


    ```

    pi@raspberrypi:~ $ idle &

    ```


    IDLE窗口看起来像这样（图1-6）：


    ![](img/0f3f12fc54f1049d26ccfe6d76bc3687_12_0.png)


    在菜单栏中，在菜单项Options下，我们可以找到**Configure IDLE**选项，在那里我们可以设置字体大小和其他细节（图1-7）：


    ![](img/0f3f12fc54f1049d26ccfe6d76bc3687_12_1.png)


    根据您的喜好更改字体和大小，然后分别点击**Apply**和**OK**按钮。现在，让我们尝试理解Python的交互模式。当被调用时，Windows IDLE会显示交互模式。我们可以用它直接运行Python语句，而无需将它们保存为文件。Python语句被直接输入到解释器中，输出会立即显示在同一窗口中。如果您曾经使用过操作系统的命令提示符，那么这几乎是相同的。交互模式通常用于运行单条语句或短小的代码块。让我们尝试运行一个简单的语句：


    ```

    >>> print("Hello World!")

    ```


    这会产生以下结果并打印在同一窗口中：


    **Hello World!**


    光标返回到提示符，准备获取用户的新命令。这样，我们就运行了我们的第一条Python语句。我们可以通过在解释器中运行命令**exit()**来退出解释器。或者，我们可以按CTRL
    + D退出。我们也可以通过在Windows命令提示符上运行命令**python**，或在Linux命令提示符上运行**python3**来调用交互模式。


    ### 1.4 Python的脚本模式


    Python交互模式适用于单行语句和短小的代码块。然而，它不会将语句保存为程序。这可以在脚本模式下完成。在IDLE的Python解释器中，在菜单栏的**File**菜单下，选择**New
    File**。在其中输入以下代码：


    ```

    print("Hello World!")

    ```


    从菜单栏的**File**菜单中，选择Save。它将打开**Save As**窗口。将其保存到您选择的位置。IDLE会自动在文件名末尾添加*.py扩展名。然后点击菜单栏的**Run**菜单，点击**Run
    Module**。这将执行程序，并在IDLE的交互模式窗口中显示输出，如下所示（图1-8）。


    ![](img/0f3f12fc54f1049d26ccfe6d76bc3687_13_0.png)


    图1-8：Python脚本输出'
