    \             width=8,\n                height=8)\nimg1\n```\n\nThe output is\
    \ as follows:\n\n![](img/0f3f12fc54f1049d26ccfe6d76bc3687_170_0.png)\n\n*Figure\
    \ 9-31: Median*\n\nIn this example, we computed the median of every pixel based\
    \ on the 8x8 neighborhood (passed as arguments). We can compute other statistical\
    \ operations too. Let's compute the gradient:\n\n```\nimg1 = img.clone()\nimg1.statistic(\"\
    gradient\", width=8, height=8)\nimg1\n```\n\nThe output is:\n\n![](img/0f3f12fc54f1049d26ccfe6d76bc3687_170_1.png)\n\
    \n*Figure 9-32: Gradient*\n\nWe can compute maximum:\n\n```\nimg1 = img.clone()\n\
    img1.statistic(\"maximum\", width=8, height=8)\nimg1\n```\n\nHere's the output:\n\
    \n![](img/0f3f12fc54f1049d26ccfe6d76bc3687_171_0.png)\n\nFigure 9-33: Maximum\n\
    \nWe can compute mean:\n\n```\nimg1 = img.clone()\nimg1.statistic(\"mean\", width=8,\
    \ height=8)\nimg1\n```\n\nThe output is as follows:\n\n![](img/0f3f12fc54f1049d26ccfe6d76bc3687_171_1.png)\n\
    \nFigure 9-34: Mean"
