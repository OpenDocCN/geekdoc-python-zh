    and **Mu** IDEs. We can install them on other Debian derivatives with the following
    command:


    ```

    pi@raspberrypi:~ $ sudo apt-get install thonny geany mu-editor -y

    ```


    If you are more comfortable with Eclipse, there is a nice plugin known as **Pydev**.
    This can be installed from the **Eclipse Marketplace**.


    ## 1.6 Python Implementations and Distributions


    The program that interprets and runs a Python program is known as a Python interpreter.
    The one that comes with Linux by default and is provided by Python Software Foundation
    is known as CPython. Other organizations have created Python interpreters that
    adhere to Python standards. These interpreters are known as Python implementations.
    Just as C and C++ have many compilers, Python has many implementations of interpreters.
    Throughout the book, we will use the standard CPython interpreter that comes with
    Linux by default. The following is the partial list of the other popular alternative
    implementations of the Python interpreter:


    - 1. IronPython

    - 2. Jython

    - 3. PyPy

    - 4. Stackless Python

    - 5. MicroPython


    Many organizations bundle the Python interpreter of their choice with many modules
    and libraries and distribute it. These packages are known as Python distributions.
    We can get a list of Python implementations and distributions at the following
    URLs:


    https://www.python.org/download/alternatives/

    https://wiki.python.org/moin/PythonDistributions

    https://wiki.python.org/moin/PythonImplementations


    ## 1.7 Python Package Index


    Python comes with a lot of libraries. This is known as the "Batteries included"
    philosophy of Python. Many more libraries are developed by many third-party developers
    and organizations. Based on your work profile, you may find these libraries useful
    in carrying out intended tasks. All such third-party libraries are hosted at the
    **Python Package Index**. This is located at https://pypi.org/. We can search
    for the library on this page.


    Python comes with the utility known as **pip**. Pip is a **reverse acronym**.
    It means that the expansion of the term has the term itself. Pip means **pip installs
    packages** or **pip installs python**. It is a package management tool that installs
    Python packages, coming as a command-line utility. We can check its version by
    running the following command on the command prompt (cmd and terminal emulator)
    of the operating system:


    ```

    pi@raspberrypi:~ $ pip3 -V

    ```


    It will print the currently installed version of pip. If we wish to see the list
    of currently installed packages we need to run the following command:


    ```

    pi@raspberrypi:~ $ pip3 list

    ```


    It will return the list of all the packages already installed.


    > **NOTE:** All pip-related commands are the same on Windows and Linux.


    If we wish to install a new library, we can search for it in PyPI. We can install
    a new package as follows:


    ```

    pi@raspberrypi:~ $ pip3 install numpy

    ```


    This will install the NumPy library on the computer. We will use this utility
    throughout the book to install required third-party packages.


