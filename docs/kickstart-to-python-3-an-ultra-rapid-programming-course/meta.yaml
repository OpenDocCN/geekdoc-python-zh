- md: "## 4.4.1 Basic Inheritance in Python\n\nTechnically all Python classes are\
    \ subclasses of a specific built-in class known as **object**. This mechanism\
    \ allows Python to treat objects alike. So, if you are creating any class in Python,\
    \ it means that you're using inheritance implicitly. It's implicit because you\
    \ do not have to make any special provision in the code for it. You can also explicitly\
    \ derive your custom class from the built-in class **object** as follows:\n\n\
    ```python\n# prog01.py\nclass MyClass(object):\n    pass\n```\n\nThe code above\
    \ has the same meaning and functionality:\n\n```python\n# prog01.py\nclass MyClass:\n\
    \    pass\n```\n\nLet's define a custom class and derive another class from it:\n\
    \n```python\n# prog02.py\nclass Person:\n    pass\nclass Employee:\n    pass\n\
    def main():\n    print(issubclass(Employee, Person))\nif __name__ == \"__main__\"\
    :\n    main()\n```\n\nRun the above code. The routine **issubclass()** returns\
    \ true if the class mentioned in the first argument is a subclass of the class\
    \ mentioned in the second argument. The above program prints false. OOPS! We forgot\
    \ to derive the class **Employee** from **Person**. For this modify the code as\
    \ follows:\n\n```python\n# prog02.py\nclass Person:\n    pass\nclass Employee(Person):\n\
    \    pass\ndef main():\n    print(issubclass(Employee, Person))\n    print(issubclass(Person,\
    \ object))\n    print(issubclass(Employee, object))\nif __name__ == \"__main__\"\
    :\n    main()\n```\n\nYou must have noticed that we added two more statements\
    \ in the section **main()**. Run the code. It must print **True** three times.\n\
    \n## 4.4.2 Method Overriding\n\nLet's add more functionality to the class **Person**.\
    \ Modify the module **prog01.py**:\n\n```python\n# prog01.py\nclass Person:\n\
    \    def __init__(self, first, last, age):\n        self.firstname = first\n \
    \       self.lastname = last\n        self.age = age\n    def __str__(self):\n\
    \        return self.firstname + \" \" + self.lastname + \", \" + str(self.age)\n\
    class Employee(Person):\n    pass\ndef main():\n    x = Person(\"Ashwin\", \"\
    Pajankar\", 31)\n    print(x)\nif __name__ == \"__main__\":\n    main()\n```\n\
    \nWe want to define the behavior of the class **Employee**. As we have derived\
    \ it from **Person**, we can reuse the methods in the class **Person** to define\
    \ the behavior of the class **Employee**:\n\n```python\n# prog02.py\nclass Person:\n\
    \    def __init__(self, first, last, age):\n        self.firstname = first\n \
    \       self.lastname = last\n        self.age = age\n    def __str__(self):\n\
    \        return self.firstname + \" \" + self.lastname + \", \" + str(self.age)\n\
    class Employee(Person):\n    pass\ndef main():\n    x = Person(\"Ashwin\", \"\
    Pajankar\", 31)\n    print(x)\n    y = Employee(\"James\", \"Bond\", 32)\n   \
    \ print(y)\nif __name__ == \"__main__\":\n    main()\n```\n\nAs you can see, the\
    \ class **Employee** inherits the initializer and method **__str__()** from class\
    \ **Person**. However, we wish to add another additional attribute called **empno**\
    \ to the class **Employee**. We also have to change the behavior of the method\
    \ **__str__()** accordingly. The following code does this:\n\n```python\n# prog02.py\n\
    class Person:\n    def __init__(self, first, last, age):\n        self.firstname\
    \ = first\n        self.lastname = last\n        self.age = age\n    def __str__(self):\n\
    \        return (self.firstname + \" \" +\n                self.lastname + \"\
    , \" +\n                str(self.age))\nclass Employee(Person):\n    def __init__(self,\
    \ first, last, age, empno):\n        self.firstname = first\n        self.lastname\
    \ = last\n        self.age = age\n        self.empno = empno\n    def __str__(self):\n\
    \        return (self.firstname + \" \"\n                + self.lastname + \"\
    , \"\n                + str(self.age) + \", \"\n                + str(self.empno))\n\
    def main():\n    x = Person(\"Ashwin\", \"Pajankar\", 31)\n    print(x)\n    y\
    \ = Employee(\"James\", \"Bond\", 32, 0x007)\n    print(y)\nif __name__ == \"\
    __main__\":\n    main()\n```\n\nIn the code above, we are overriding the definitions\
    \ of the methods **__init__()** and **__str__()** from the class Person in Employee\
    \ to suit our needs. Run the code and see the output. This way we can override\
    \ any method of the base class in the subclass.\n\n## 4.4.3 super()\n\nIn the\
    \ last example, we saw how to override the base class's methods in the subclass.\
    \ There is another way of doing this. See the below code example:\n\n```python\n\
    class Person:\n    def __init__(self, first, last, age):\n        self.firstname\
    \ = first\n        self.lastname = last\n        self.age = age\n\n    def __str__(self):\n\
    \        return (self.firstname + \" \" +\n                self.lastname + \"\
    , \" +\n                str(self.age))\n\nclass Employee(Person):\n    def __init__(self,\
    \ first, last, age, empno):\n        super().__init__(first, last, age)\n    \
    \    self.empno = empno\n\n    def __str__(self):\n        return (super().__str__()\
    \ + \", \"\n                + str(self.empno))\n\ndef main():\n    x = Person(\"\
    Ashwin\", \"Pajankar\", 31)\n    print(x)\n    y = Employee(\"James\", \"Bond\"\
    , 32, 0x007)\n    print(y)\n\nif __name__ == \"__main__\":\n    main()\n```\n\n\
    As you can see, we have used the **super()** method. This is a special method\
    \ that returns the object as an instance of the base class. We can use **super()**\
    \ in any method. As super returns the object as an instance of the base class,\
    \ the code **super().<method()>** calls the respective method of the base class.\
    \ The method **super()** can be used inside any method of a subclass to invoke\
    \ an instance of the parent class as an object. It does not have to be called\
    \ in the first line of the subclass method definition. It can be called at any\
    \ place in the body. Thus, we can also re-write the method **__init__()** of Employee\
    \ as follows,\n\n```python\ndef __init__(self, first, last, age, empno):\n   \
    \ self.empno = empno\n    super().__init__(first, last, age)\n```\n\n## 4.5 More\
    \ Inheritance\n\nIn the last section we studied basic inheritance, overriding,\
    \ and the method **super()**. In this section, we will study multiple inheritance,\
    \ the diamond problem, access modifiers, and abstract classes and methods.\n\n\
    ### 4.5.1 Multiple Inheritance\n\nWhen a class is derived from more than one class,\
    \ the mechanism is known as Multiple Inheritance. The following diagram depicts\
    \ this:\n\n![](img/0f3f12fc54f1049d26ccfe6d76bc3687_54_0.png)\n\nLet's try writing\
    \ some simple code for the same:\n\n```python\n# prog01.py\nclass A:\n    pass\n\
    \nclass B:\n    pass\n\nclass C(A, B):\n    pass\n\ndef main():\n    pass\n\n\
    if __name__ == \"__main__\":\n    main()\n```\n\nMultiple inheritance is used\
    \ in cases where we need attributes and behaviors of more than one class to be\
    \ derived in a single class.\n\n### 4.5.2 Method Resolution order\n\nConsider\
    \ the following example:\n\n```python\n# prog02.py\nclass A:\n    def m(self):\n\
    \        print('This is m() from Class A.')\nclass B:\n    def m(self):\n    \
    \    print('This is m() from Class B.')\nclass C(A, B):\n    pass\ndef main():\n\
    \    x = C()\n    x.m()\nif __name__ == \"__main__\":\n    main()\n```\n\nWhen\
    \ we run the code, the output is as follows:\n\n```\nThis is m() from Class A.\n\
    ```\n\nThis is because of the order in which class C is derived from the parent\
    \ classes. If we change the class C code as follows:\n\n```python\nclass C(B,\
    \ A):\n    pass\n```\n\nThe output is:\n\n```\nThis is m() from Class B.\n```\n\
    \nThe mechanism with which the derived methods of a subclass are resolved is known\
    \ as Method Resolution Order.\n\n## 4.6 Abstract class and method\n\nA class with\
    \ an object that is not created is known as an abstract class. Also, a method\
    \ that is declared without implementation is known as an abstract method. An abstract\
    \ class may or may not have an abstract method. In Python, we explicitly declare\
    \ a class and a method as abstract. An explicitly declared abstract class can\
    \ only be subclassed. In many situations, we need to have a class and methods\
    \ only to be derived and overridden respectively. The following is a perfect real-life\
    \ example:\n\n```python\n# prog03.py\nfrom abc import ABC, abstractmethod\nclass\
    \ Animal(ABC):\n    @abstractmethod\n    def move(self):\n        pass\nclass\
    \ Human(Animal):\n    def move(self):\n        print(\"I Walk.\")\nclass Snake(Animal):\n\
    \    def move(self):\n        print(\"I Crawl.\")\ndef main():\n    a = Human()\n\
    \    b = Snake()\n    a.move()\n    b.move()\nif __name__ == \"__main__\":\n \
    \   main()\n```\n\nTo make a class abstract explicit, we need to derive it from\
    \ a built-in class ABC. If we want to make a class methods abstract explicitly,\
    \ we have to use the decorator **@abstractmethod** with the method to be made\
    \ abstract. Run the code above and see the output.\n\n## 4.7 Access Modifiers\
    \ in Python\n\nIn many programming languages like C++ and Java, there is the concept\
    \ called Access Control for the members of classes. In Python, there is no strict\
    \ measure for controlling the access of a member from outside the class.\n\nIf\
    \ you do not want a method or class variable to be accessed from outside, you\
    \ can mention this in the docstrings of the class. The other way to let others\
    \ know not to access a variable or a method made for internal use is to prefix\
    \ the variable with an underscore. The other person who is modifying the code\
    \ or using it by importing it will understand that the variable or method is for\
