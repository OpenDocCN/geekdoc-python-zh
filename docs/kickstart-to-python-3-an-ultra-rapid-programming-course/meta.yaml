    \ [54]: var1 = \"He said, \\\"I am fine\\\".\"\nIn [55]: var1\nOut[55]: 'He said,\
    \ \"I am fine\".'\n```\n\n### 3.2 Functions\n\nAlmost all high-level programming\
    \ languages have the provision of reusable blocks of codes. These are known as\
    \ routines, subroutines, or functions. A function is a named block of code that\
    \ can be called from another block of code. In this section, we will learn functions\
    \ in detail. Also, until now, we have been using the IPython console. Now we will\
    \ start saving the programs in scripts. Consider the following simple program\
    \ demonstrating a simple function:\n\n```python\n# prog00.py\ndef func1():\n \
    \   print('Test')\n\nfunc1()\n```\n\nIn the example above we create a simple function\
    \ (in the first two lines) that prints a string when called. In the last, we call\
    \ the function. When called the function performs the intended action. Run the\
    \ code and see the output.\n\nWe can also call this function multiple times:\n\
    \n```python\n# prog00.py\ndef func1():\n    print('Test')\n\nfunc1()\nfunc1()\n\
    ```\n\nHere, we are calling the function twice. It will print the message twice\
    \ in the console. Now, let's see a more pythonic way of defining and calling functions.\
    \ Take a look at the following code:\n\n```python\n# prog01.py\ndef func1():\n\
    \    print('Test')\n\ndef main():\n    print(\"This is the main() function block...\"\
    )\n    func1()\n\nif __name__ == \"__main__\":\n    main()\n```\n\nThis code is\
    \ written in a pythonic way. First, we define two functions. The second function\
    \ named **main()** is intended to serve as analogous to the main function we write\
    \ in C or C++ programs. We can assign any valid name of our choice to this function\
    \ (as an exercise, you may wish to change the name of the function in the declaration\
    \ and the function call). Then the line **if \\_\\_name\\_\\_ == \"\\_\\_main\\\
    _\\_\":** checks if we are directly executing the module or calling it from another\
    \ Python program. If we execute it directly, it will run the code listed under\
    \ it. We will learn more about this feature when we study packages in the next\
    \ chapter. Run the code and see the output. This is a professional and pythonic\
    \ way of organizing our Python code files. We will be using this template for\
    \ our programs quite often throughout the book.\n\nLet's see how we can pass values\
    \ to functions. In the function definition, we have to declare a placeholder variable\
    \ for the value to be passed. It is known as a **parameter**. The actual value\
    \ to be passed is known as an **argument**. Let's see this in action.\n\nKickstart\
    \ to Python 3\n\n```python\n# prog02.py\ndef print_msg(msg):\n    print(msg)\n\
    \ndef main():\n    print_msg(\"Test String...\")\n\nif __name__ == \"__main__\"\
    :\n    main()\n```\n\nWe can also have multiple arguments:\n\n```python\n# prog03.py\n\
    def print_msg(msg, count):\n    for i in range(count):\n        print(msg)\n\n\
    def main():\n    print_msg(\"Test String...\", 5)\n\nif __name__ == \"__main__\"\
    :\n    main()\n```\n\nIn this example, we accept two arguments. The first is the\
    \ message and the second is the number of times the message is to be printed.\
    \ We can also have a default value of the argument as shown below:\n\n```python\n\
    # prog04.py\ndef print_msg(msg, count=2):\n    for i in range(count):\n      \
    \  print(msg)\n\ndef main():\n    print_msg(\"Test String...\")\n\nif __name__\
    \ == \"__main__\":\n    main()\n```\n\nIn the example code above, we are setting\
    \ the default value of the last argument to 2. When we do not pass the argument\
    \ in the function call, it assumes the default value and proceeds accordingly.\n\
    \nWe can also have a function to return a value. Let's define a function that\
    \ accepts two values and returns their sum. It's easy to code:\n\n```python\n\
    # prog05.py\ndef add(a, b):\n    return a + b\n\ndef main():\n    print(add(3,\
    \ 5))\n\nif __name__ == \"__main__\":\n    main()\n```\n\nWe can also write a\
    \ function that returns multiple values:\n\n```python\n# prog06.py\ndef compute(a,\
    \ b):\n    return (a + b, a - b)\n\ndef main():\n    (r1, r2) = compute(3, 5)\n\
    \    print(r1)\n    print(r2)\n\nif __name__ == \"__main__\":\n    main()\n```\n\
    \nAs we can see in the example above, we can pack the return values in a single\
    \ tuple and return the tuple.\n\n### 3.3 Recursion\n\nWe can call the instance\
    \ of the function from within the same function. This is known as recursion. Let's\
    \ rewrite an earlier example to accommodate recursion as follows:\n\n```python\n\
    # prog07.py\ndef print_msg(msg, count):\n    if count != 0:\n        print(msg)\n\
    \        print_msg(msg, count - 1)\n\ndef main():\n    print_msg(\"Test String...\"\
    , 6)\n\nif __name__ == \"__main__\":\n    main()\n```\n\nKickstart to Python 3\n\
    \nIn recursion, there are two main things. The first is the condition for the\
    \ termination. In the absence of this, the recursion will run forever. And the\
    \ second part is the recursive call where the function calls itself. In the above\
    \ program, we are using the **if** condition termination. Most of the recursion\
    \ examples use an **if** condition for termination. The **if** statement will\
    \ have the condition or the criteria for termination. Let's write a program for\
    \ the computation of the factorial of a positive integer:\n\n```python\n# prog08.py\n\
    def factorial(n):\n    if n == 1:\n        return n\n    else:\n        return\
    \ n * factorial(n - 1)\n\ndef main():\n    print(factorial(5))\n\nif __name__\
    \ == \"__main__\":\n    main()\n```\n\nWe can also write a program for computing\
    \ the n<sup>th</sup> number in the Fibonacci series:\n\n```python\n# prog09.py\n\
    def fibo(n):\n    if n <= 1:\n        return n\n    else:\n        return (fibo(n\
    \ - 1) + fibo(n - 2))\n\ndef main():\n    print(fibo(15))\n\nif __name__ == \"\
    __main__\":\n    main()\n```\n\nThese are a few real-life examples of recursion.\n\
    \n#### 3.3.1 Indirect Recursion\n\nWe have seen a demonstration of recursion.\
    \ Those were the examples of direct recursion in which we are calling the function\
    \ within itself. There is another method for recursion known as indirect recursion.\
    \ In the simplest form of indirect recursion, routine A calls routine B and routine\
    \ B calls routine A. Let's see a program involving indirect recursion:\n\n```python\n\
    # prog10.py\ndef ping(i):\n    if i > 0:\n        print(\"Ping \" + str(i))\n\
    ```"
