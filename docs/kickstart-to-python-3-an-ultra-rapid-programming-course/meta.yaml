    In [54]: var1 = \"He said, \\\"I am fine\\\".\"\nIn [55]: var1\nOut[55]: 'He said,\
    \ \"I am fine\".'\n```\n\n### 3.2 函数\n\n几乎所有高级编程语言都提供了可重用的代码块。这些被称为例程、子例程或函数。函数是一个命名的代码块，可以从另一个代码块中调用。在本节中，我们将详细学习函数。另外，到目前为止，我们一直在使用\
    \ IPython 控制台。现在我们将开始将程序保存在脚本中。考虑以下演示简单函数的简单程序：\n\n```python\n# prog00.py\ndef\
    \ func1():\n    print('Test')\n\nfunc1()\n```\n\n在上面的例子中，我们创建了一个简单的函数（在前两行），当被调用时打印一个字符串。在最后，我们调用该函数。当被调用时，函数执行预期的操作。运行代码并查看输出。\n\
    \n我们也可以多次调用此函数：\n\n```python\n# prog00.py\ndef func1():\n    print('Test')\n\n\
    func1()\nfunc1()\n```\n\n在这里，我们调用了该函数两次。它将在控制台中打印两次消息。现在，让我们看看一种更 Pythonic 的定义和调用函数的方式。看看以下代码：\n\
    \n```python\n# prog01.py\ndef func1():\n    print('Test')\n\ndef main():\n   \
    \ print(\"This is the main() function block...\")\n    func1()\n\nif __name__\
    \ == \"__main__\":\n    main()\n```\n\n这段代码是以 Pythonic 的方式编写的。首先，我们定义了两个函数。第二个名为\
    \ **main()** 的函数旨在作为类似于我们在 C 或 C++ 程序中编写的主函数。我们可以为此函数分配任何我们选择的有效名称（作为练习，您可能希望更改声明和函数调用中的函数名称）。然后，行\
    \ **if \\_\\_name\\_\\_ == \"\\_\\_main\\_\\_\":** 检查我们是直接执行模块还是从另一个 Python 程序调用它。如果我们直接执行它，它将运行其下列出的代码。我们将在下一章学习包时了解更多关于此功能的信息。运行代码并查看输出。这是一种专业且\
    \ Pythonic 的组织 Python 代码文件的方式。我们将在本书中经常使用此模板来编写程序。\n\n让我们看看如何将值传递给函数。在函数定义中，我们必须为要传递的值声明一个占位符变量。它被称为**形参**。要传递的实际值被称为**实参**。让我们看看实际操作。\n\
    \nPython 3 快速入门\n\n```python\n# prog02.py\ndef print_msg(msg):\n    print(msg)\n\
    \ndef main():\n    print_msg(\"Test String...\")\n\nif __name__ == \"__main__\"\
    :\n    main()\n```\n\n我们也可以有多个参数：\n\n```python\n# prog03.py\ndef print_msg(msg,\
    \ count):\n    for i in range(count):\n        print(msg)\n\ndef main():\n   \
    \ print_msg(\"Test String...\", 5)\n\nif __name__ == \"__main__\":\n    main()\n\
    ```\n\n在这个例子中，我们接受两个参数。第一个是消息，第二个是要打印消息的次数。我们也可以为参数设置默认值，如下所示：\n\n```python\n\
    # prog04.py\ndef print_msg(msg, count=2):\n    for i in range(count):\n      \
    \  print(msg)\n\ndef main():\n    print_msg(\"Test String...\")\n\nif __name__\
    \ == \"__main__\":\n    main()\n```\n\n在上面的示例代码中，我们将最后一个参数的默认值设置为 2。当我们在函数调用中不传递该参数时，它将采用默认值并相应地继续执行。\n\
    \n我们也可以有一个返回值的函数。让我们定义一个接受两个值并返回它们之和的函数。编写代码很简单：\n\n```python\n# prog05.py\ndef\
    \ add(a, b):\n    return a + b\n\ndef main():\n    print(add(3, 5))\n\nif __name__\
    \ == \"__main__\":\n    main()\n```\n\n我们也可以编写一个返回多个值的函数：\n\n```python\n# prog06.py\n\
    def compute(a, b):\n    return (a + b, a - b)\n\ndef main():\n    (r1, r2) = compute(3,\
    \ 5)\n    print(r1)\n    print(r2)\n\nif __name__ == \"__main__\":\n    main()\n\
    ```\n\n正如我们在上面的例子中看到的，我们可以将返回值打包在一个元组中并返回该元组。\n\n### 3.3 递归\n\n我们可以在同一个函数内部调用该函数的实例。这被称为递归。让我们重写一个早期的例子以适应递归，如下所示：\n\
    \n```python\n# prog07.py\ndef print_msg(msg, count):\n    if count != 0:\n   \
    \     print(msg)\n        print_msg(msg, count - 1)\n\ndef main():\n    print_msg(\"\
    Test String...\", 6)\n\nif __name__ == \"__main__\":\n    main()\n```\n\nPython\
    \ 3 快速入门\n\n在递归中，有两个主要部分。第一个是终止条件。没有这个条件，递归将永远运行。第二部分是递归调用，即函数调用自身。在上面的程序中，我们使用\
    \ **if** 条件进行终止。大多数递归示例使用 **if** 条件进行终止。**if** 语句将包含终止的条件或标准。让我们编写一个计算正整数阶乘的程序：\n\
    \n```python\n# prog08.py\ndef factorial(n):\n    if n == 1:\n        return n\n\
    \    else:\n        return n * factorial(n - 1)\n\ndef main():\n    print(factorial(5))\n\
    \nif __name__ == \"__main__\":\n    main()\n```\n\n我们也可以编写一个计算斐波那契数列中第 n<sup>th</sup>\
    \ 个数的程序：\n\n```python\n# prog09.py\ndef fibo(n):\n    if n <= 1:\n        return\
    \ n\n    else:\n        return (fibo(n - 1) + fibo(n - 2))\n\ndef main():\n  \
    \  print(fibo(15))\n\nif __name__ == \"__main__\":\n    main()\n```\n\n这些是递归的一些实际例子。\n\
    \n#### 3.3.1 间接递归\n\n我们已经看到了递归的演示。那些是直接递归的例子，我们在函数内部调用自身。还有另一种递归方法，称为间接递归。在最简单的间接递归形式中，例程\
    \ A 调用例程 B，而例程 B 调用例程 A。让我们看一个涉及间接递归的程序：\n\n```python\n# prog10.py\ndef ping(i):\n\
    \    if i > 0:\n        print(\"Ping \" + str(i))\n```"
