- md: "## 5.4.1 Double Ended Queues\n\nDouble Ended Queues (Deques) are a generalization\
    \ of stacks and queues that allow insertion and deletion at both ends. A deque\
    \ supports operations such as `push_front`, `push_back`, `pop_front`, and `pop_back`.\
    \ This data structure is useful in scenarios where elements need to be added or\
    \ removed from either end, such as in scheduling algorithms or implementing sliding\
    \ window mechanisms.\n\nA deque can be implemented using a doubly linked list\
    \ or a circular array. The doubly linked list implementation provides O(1) time\
    \ complexity for all operations but requires extra memory for pointers. The circular\
    \ array implementation is more memory-efficient but may require resizing when\
    \ the deque becomes full.\n\nHere is a simple implementation of a deque using\
    \ a Python list:\n\n```python\nclass Deque:\n    def __init__(self):\n       \
    \ self.items = []\n\n    def is_empty(self):\n        return self.items == []\n\
    \n    def add_front(self, item):\n        self.items.append(item)\n\n    def add_rear(self,\
    \ item):\n        self.items.insert(0, item)\n\n    def remove_front(self):\n\
    \        return self.items.pop()\n\n    def remove_rear(self):\n        return\
    \ self.items.pop(0)\n\n    def size(self):\n        return len(self.items)\n```\n\
    \nThis implementation uses a list to store the elements. The `add_front` method\
    \ appends to the end of the list, while `add_rear` inserts at the beginning. The\
    \ `remove_front` method pops from the end, and `remove_rear` pops from the beginning.\
    \ Note that the time complexity for `add_rear` and `remove_rear` is O(n) due to\
    \ the shifting of elements in the list. For a more efficient implementation, a\
    \ circular buffer or a doubly linked list should be used.\n\nDeques are also available\
    \ in many standard libraries. For example, Python's `collections` module provides\
    \ a `deque` class that is optimized for fast appends and pops from both ends.\n\
    \n```python\nfrom collections import deque\n\nd = deque()\nd.append('a')     #\
    \ add to the right (rear)\nd.appendleft('b') # add to the left (front)\nd.pop()\
    \           # remove from the right\nd.popleft()       # remove from the left\n\
    ```\n\nThis built-in `deque` is implemented as a doubly linked list of blocks,\
    \ providing O(1) time complexity for appends and pops from both ends, making it\
    \ highly efficient for operations that require frequent additions and removals\
    \ from the front of the collection."
  mdcn: "## 5.4.1 双端队列\n\n双端队列（Deque）是栈和队列的泛化形式，允许在两端进行插入和删除操作。双端队列支持诸如 `push_front`、`push_back`、`pop_front`\
    \ 和 `pop_back` 等操作。这种数据结构在需要从任一端添加或移除元素的场景中非常有用，例如在调度算法或实现滑动窗口机制时。\n\n双端队列可以使用双向链表或循环数组来实现。双向链表实现为所有操作提供\
    \ O(1) 的时间复杂度，但需要为指针额外分配内存。循环数组实现更节省内存，但当双端队列满时可能需要调整大小。\n\n以下是一个使用 Python 列表实现的简单双端队列：\n\
    \n```python\nclass Deque:\n    def __init__(self):\n        self.items = []\n\n\
    \    def is_empty(self):\n        return self.items == []\n\n    def add_front(self,\
    \ item):\n        self.items.append(item)\n\n    def add_rear(self, item):\n \
    \       self.items.insert(0, item)\n\n    def remove_front(self):\n        return\
    \ self.items.pop()\n\n    def remove_rear(self):\n        return self.items.pop(0)\n\
    \n    def size(self):\n        return len(self.items)\n```\n\n此实现使用列表来存储元素。`add_front`\
    \ 方法将元素追加到列表末尾，而 `add_rear` 方法则在列表开头插入元素。`remove_front` 方法从末尾弹出元素，`remove_rear`\
    \ 方法从开头弹出元素。请注意，由于列表中元素的移动，`add_rear` 和 `remove_rear` 的时间复杂度为 O(n)。为了获得更高效的实现，应使用循环缓冲区或双向链表。\n\
    \n许多标准库中也提供了双端队列。例如，Python 的 `collections` 模块提供了一个 `deque` 类，它针对从两端快速追加和弹出操作进行了优化。\n\
    \n```python\nfrom collections import deque\n\nd = deque()\nd.append('a')     #\
    \ 添加到右侧（尾部）\nd.appendleft('b') # 添加到左侧（头部）\nd.pop()           # 从右侧移除\nd.popleft()\
    \       # 从左侧移除\n```\n\n这个内置的 `deque` 是以块的双向链表形式实现的，为从两端追加和弹出操作提供 O(1) 的时间复杂度，使其在需要频繁从集合前端进行添加和移除操作时非常高效。"
