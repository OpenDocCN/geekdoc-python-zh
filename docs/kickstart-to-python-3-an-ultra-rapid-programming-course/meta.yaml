    The **Wand** library has a method to apply predefined threshold maps to create
    dithered images. The following is a table of the map values and their meanings:


    | Map | Description |

    |---|---|

    | threshold | Threshold 1x1 (non-dither) |

    | checks | Checkerboard 2x1 (dither) |

    | o2x2 | Ordered 2x2 (dispersed) |

    | o3x3 | Ordered 3x3 (dispersed) |

    | o4x4 | Ordered 4x4 (dispersed) |

    | o8x8 | Ordered 8x8 (dispersed) |

    | h4x4a | Halftone 4x4 (angled) |

    | h6x6a | Halftone 6x6 (angled) |

    | h8x8a | Halftone 8x8 (angled) |'
