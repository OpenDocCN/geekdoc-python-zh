    \n```\n['Sheet1', 'Sheet2', 'Sheet3']\n```\n\n选择一个工作表进行处理，如下所示：\n\n```python\n\
    currSheet = wb['Sheet1']\nprint(currSheet)\nprint(type(currSheet))\n```\n\n输出如下：\n\
