  md: "# 7.3 Sierpinski Triangle by Chaos Game\n\nWe can create the Sierpinski Triangle\
    \ using Chaos Game. The fractal is created by iteratively creating a sequence\
    \ of points. We choose an initial random point ((400, 400) in this example). Each\
    \ point in the sequence is given a half of the distance between the previous point\
    \ and one of the vertices of the polygon chosen randomly in each iteration. When\
    \ we repeat this iterative process a large number of times while selecting a vertex\
    \ of a triangle at random on each iteration most often (but not always) results\
    \ in the Sierpinski Triangle. For better results, we can decide not to plot a\
    \ few initial points. Here is the code:\n\n```\nprog05.py\nimport pygame, math,\
    \ random\nimport time, sys\nwidth, height = 800, 800\nresult = pygame.init()\n\
    if result[1] > 0:\n    print('Error initializing Pygame : ' + str(result[1]))\n\
    \    sys.exit(1)\nelse:\n    print('Pygame initialized successfully!')\nsurface\
    \ = pygame.display.set_mode((width, height))\npygame.display.set_caption('Fibonacci\
    \ Tree')\nscreen = pygame.display.get_surface()\ndef draw_pixel(x, y):\n    surface.fill(pygame.Color(0,\
    \ 255, 0), ((x, y), (1, 1)))\n    pygame.display.flip()\nshift = 20\nA_x = 0 +\
    \ shift\nA_y = 649 + shift\nB_x = 750 + shift\nB_y = 649 + shift\nC_x = 375 +\
    \ shift\nC_y = 0 + shift\nx, y = 400, 400\nfor i in range( 1, 50000):\n    choice\
    \ = random.randint(1, 3)\n    if choice == 1:\n        x = (x+A_x)/2\n       \
    \ y = (y+A_y)/2\n    elif choice == 2:\n        x = (x+B_x)/2\n        y = (y+B_y)/2\n\
    \    elif choice == 3:\n        x = (x+C_x)/2\n        y = (y+C_y)/2\n    if i\
    \ < 10:\n        pass\n```"
