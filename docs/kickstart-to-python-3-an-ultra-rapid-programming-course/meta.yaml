    As we can see, the thresholding operation on a greyscale image results in a binary
    (black-and-white) image. This is known as binarization which is the simplest form
    of image segmentation. Let''s see how we can automatically threshold an image
    without passing any threshold value. There are three methods. The first is the
    **Kapur** method,


    ```

    python

    img1 = img.clone()

    img1.transform_colorspace(''gray'')

    img1.auto_threshold(method=''kapur'')

    img1

    ```


    The second is the **Otsu** method:


    ```

    python

    img1 = img.clone()

    img1.transform_colorspace(''gray'')

    img1.auto_threshold(method=''otsu'')

    img1

    ```


    The final method is the **Triangle**:


    ```

    python

    img1 = img.clone()

    img1.transform_colorspace(''gray'')

    img1.auto_threshold(method=''triangle'')

    img1

    ```


    We can also omit the step where we convert the image to greyscale and apply the
    thresholding algorithm directly to the color image. In such cases, the algorithm
    is applied to all the channels of the color image. Let''s see the black thresholding
    where we set all the pixels below the threshold value to the black color,'
