    \ this chapter:\n\n- Getting Started with Pygame\n- Recursion with Pygame\n- Sierpinski\
    \ Triangle by Chaos Game\n- Simple animation with Pygame\n- Snake Game\n\nJust\
    \ like the previous chapter, this will be heavy with hands-on. After following\
    \ this chapter, we will be comfortable making drawings, creating animations, and\
    \ programming small games.\n\n## 7.1 Getting Started with Pygame\n\nEarlier, we\
    \ used the turtle library. There are a lot of limitations with the library because\
    \ of its very nature. Therefore, we will learn to use a couple of new libraries\
    \ in Python. The first library we will learn about is **Pygame**. Let's install\
    \ it first. Run the following command on the command prompt of your operating\
    \ system to install Pygame:\n\n```\nC:\\Users\\Ashwin>pip3 install pygame\n```\n\
    \nThis will install the library to your computer. The command is the same on all\
    \ platforms. Now, let's get started with the basics:\n\n```\nprog00.py\nimport\
    \ pygame, sys\nresult = pygame.init()\nif result[1] > 0:\n    print('Error initializing\
    \ Pygame : ' + str(result[1]))\n    sys.exit(1)\nelse:\n    print('Pygame initialized\
    \ successfully!')\nscreen = pygame.display.set_mode((640, 480))\npygame.quit()\n\
    sys.exit(0)\n```\n\nLet's decode the program line-by-line. The first line imports\
    \ all the libraries we will use in the program. Then we use the routine **init()**\
    \ to initialize the Pygame library in the current program. We are storing the\
    \ return value into a variable and checking if it returns an error.\n\nThen we\
    \ set the resolution of the output window using the routine **set_mode()**. Finally,\
    \ we use the routine **quit()** to close the pygame session. Run the program.\
    \ The output is not very conspicuous. It creates a pygame window of the given\
    \ dimensions. It has a black background. It flashes the window momentarily before\
    \ closing it. Congrats, we are getting started with the Pygame library! Also,\
    \ do not forget to check the console output. It will be as follows:\n\n**pygame\
    \ 2.0.1 (SDL 2.0.14, Python 3.9.7)**\n\n**Hello from the pygame community. https://www.pygame.org/contribute.html**\n\
    \n**Pygame initialized successfully!**\n\nLet's add an event loop to this. The\
