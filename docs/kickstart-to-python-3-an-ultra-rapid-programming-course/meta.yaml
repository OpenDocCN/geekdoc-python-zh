    \ Python does not allow this as we know that **Everything is an object in Python**.\
    \ To make this possible, we use methods with default arguments. The example is\
    \ as follows:\n\n```\nprog01.py\nclass A:\n\n    def method01(self, i=None):\n\
    \        if i is None:\n            print(\"Sequence 01\")\n        else:\n  \
    \          print(\"Sequence 02\")\n\ndef main():\n    obj1 = A()\n    obj1.method01()\n\
    \    obj1.method01(5)\n\nif __name__ == \"__main__\":\n    main()\n```\n\nRun\
    \ the code above and see the output.\n\n### 4.8.2 Operator Overloading\n\nOperators\
    \ operate on operands and perform various operations. As we know that everything\
    \ is an object in Python, the operands the operators function on in Python are\
    \ all objects. The operations and the outcomes of operations of operators on built-in\
    \ objects in Python are already well defined in Python. We can assign additional\
    \ responsibility to the operators for the objects of user-defined classes. This\
    \ concept is known as Operator Overloading. The following is a simple example\
    \ for the addition operator:\n\n```\nprog02.py\nclass Point:\n\n    def __init__(self,\
    \ x, y, z):\n        self.assign(x, y, z)\n\n    def assign(self, x, y, z):\n\
    \        self.x = x\n        self.y = y\n        self.z = z\n\n    def printPoint(self):\n\
    \        print(self.x, self.y, self.z)\n\n    def __add__(self, other):\n    \
    \    x = self.x + other.x\n        y = self.y + other.y\n        z = self.z +\
    \ other.z\n        return Point(x, y, z)\n\n    def __str__(self):\n        return(\"\
    ({0},{1},{2})\".format(self.x, self.y, self.z))\n\ndef main():\n    p1 = Point(1,\
    \ 2, 3)\n    p2 = Point(4, 5, 6)\n    print(p1 + p2)\n\nif __name__ == \"__main__\"\
    :\n    main()\n```\n\nRun the code and check the output. When we perform the operation\
    \ **p1 + p2** in the code, Python will call **p1.\\_\\_add\\_\\_(p2)** which in\
    \ turn calls **Point.\\_\\_add\\_\\_(p1,p2)**. Similarly, we can overload other\
    \ operators as well. The special functions we need to implement for binary operations\
    \ are tabulated below:\n\n| Operator | Special Function |\n| :--- | :--- |\n|\
    \ + | object.add(self, other) |\n| - | object.sub(self, other) |\n| * | object.mul(self,\
    \ other) |\n| // | object.floordiv(self, other) |\n| / | object.truediv(self,\
    \ other) |\n| % | object.mod(self, other) |\n| ** | object.pow(self, other[, modulo])\
    \ |\n| << | object.lshift(self, other) |\n| >> | object.rshift(self, other) |\n\
    | & | object.and(self, other) |\n| ^ | object.xor(self, other) |\n| \\| | object.or(self,\
    \ other) |\n\nThe following is the table for the extended operations:\n\n| Operator\
    \ | Special Function |\n| :--- | :--- |\n| += | object.add(self, other) |\n| -=\
    \ | object.sub(self, other) |\n| *= | object.mul(self, other) |\n| //= | object.floordiv(self,\
    \ other) |\n| /= | object.truediv(self, other) |\n| %= | object.mod(self, other)\
    \ |\n| **= | object.pow(self, other[, modulo]) |\n| <<= | object.lshift(self,\
    \ other) |\n| >>= | object.rshift(self, other) |\n| &= | object.and(self, other)\
    \ |\n| ^= | object.xor(self, other) |\n| \\|= | object.or(self, other) |\n\nThis\
    \ table is for the unary operators:\n\n| Operator | Special Function |\n| :---\
    \ | :--- |\n| + | object.pos(self) |\n| - | object.neg(self) |\n| abs() | object.abs(self)\
    \ |\n| ~ | object.invert(self) |\n| complex() | object.complex(self) |\n| int()\
    \ | object.int(self) |\n| long() | object.long(self) |\n| float() | object.float(self)\
    \ |\n| oct() | object.oct(self) |\n| hex() | object.hex(self) |\n\nThis table\
    \ is for comparison operators:\n\n| Operator | Special Function |\n| :--- | :---\
    \ |\n| < | object.lt(self, other) |\n| <= | object.le(self, other) |\n| == | object.eq(self,\
    \ other) |\n| != | object.ne(self, other) |\n| >= | object.ge(self, other) |\n\
    | > | object.gt(self, other) |\n\n## 4.9 Syntax Errors\n\nWhen we write programs\
    \ in Python (or any programming language, for that matter), we do not usually\
    \ get them correct the very first time. This is where the terms Errors and Exceptions\
    \ come into discussion. In this chapter, we will get started with Errors and Exceptions\
    \ in Python.\n\n```\n>>> print(\"Hello\")\n\nSyntaxError: EOL while scanning string\
    \ literal\n```\n\nIn the **print()** statement above, we forgot to add \" after\
    \ the string **Hello**. This is a Syntax error. So, the Python interpreter highlighted\
    \ it by throwing **SyntaxError**.\n\n## 4.10 Exceptions\n\nWe say that the syntax/parsing\
    \ errors are handled with SyntaxError. Even though that statement is correct in\
    \ Syntax, it may encounter an error (which is not related to syntax) during execution.\
    \ Errors detected during execution are called exceptions. Consider the following\
    \ statements and their executions in the interpreter:\n\n```\n>>> 1/0\nTraceback\
    \ (most recent call last):\n  File \"<pyshell#1>\", line 1, in <module>\n    1/0\n\
    ZeroDivisionError: division by zero\n>>> '1' + 1\nTraceback (most recent call\
    \ last):\n  File \"<pyshell#2>\", line 1, in <module>\n    '1' + 1\nTypeError:\
    \ can only concatenate str (not \"int\") to str\n>>> a = 8 + b\nTraceback (most\
    \ recent call last):\n  File \"<pyshell#3>\", line 1, in <module>\n    a = 8 +\
    \ b\nNameError: name 'b' is not defined\n```\n\nThe last line of the output of\
    \ the execution of each statement shows what is wrong with the statement. This\
    \ demonstrates that an exception is implicitly raised whenever there is an error\
    \ during execution. The exceptions defined in the Python library are known as\
    \ Built-in exceptions.\n\nhttps://docs.python.org/3/library/exceptions.html#bltin-exceptions\
    \ has all the built-in exceptions listed.\n\n### 4.10.1 Handling Exceptions\n\n\
    Now we know the interpreter automatically raises an exception when an error is\
    \ encountered during the runtime. Consider the following piece of code:\n\n```\n\
    prog01.py\ndef main():\n    a = 1/0\n    print(\"DEBUG:  We are here...\")\nif\
    \ __name__ == \"__main__\":\n    main()\n```\n\nWhen we execute this, notice the\
    \ interpreter encounters the following exception at the line a = 1/0.\n\n**ZeroDivisionError:\
    \ division by zero**\n\nOnce this exception is encountered, it does not run the\
    \ statements which follow the statement where the exception is encountered. This\
    \ is how exceptions are handled by default in Python. However, Python has a better\
    \ provision for handling exceptions. We can enclose the code in a try block where\
    \ we are likely to encounter an exception and the logic to handle it in except\
    \ block as follows:\n\n```\nprog01.py\ndef main():\n    try:\n        a = 1/0\n\
    \        print(\"DEBUG:  We are here...\")\n    except Exception:\n        print(\"\
    Exception Occured\")\n\nif __name__ == \"__main__\":\n    main()\n```\n\nRun the\
    \ code. It will invoke the except block when an exception is encountered rather\
    \ than abruptly terminating. Note the code after the statement where the exception\
    \ occurred is not executed."
