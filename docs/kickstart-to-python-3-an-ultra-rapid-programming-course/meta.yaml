    \ \"__main__\":\n    main()\n```\n\nAs you can see, we have used the **super()**\
    \ method. This is a special method that returns the object as an instance of the\
    \ base class. We can use **super()** in any method. As super returns the object\
    \ as an instance of the base class, the code **super().<method()>** calls the\
    \ respective method of the base class. The method **super()** can be used inside\
    \ any method of a subclass to invoke an instance of the parent class as an object.\
    \ It does not have to be called in the first line of the subclass method definition.\
    \ It can be called at any place in the body. Thus, we can also re-write the method\
    \ **__init__()** of Employee as follows,\n\n```\ndef __init__(self, first, last,\
    \ age, empno):\n    self.empno = empno\n    super().__init__(first, last, age)\n\
    ```\n\n# 4.5 More Inheritance\n\nIn the last section we studied basic inheritance,\
