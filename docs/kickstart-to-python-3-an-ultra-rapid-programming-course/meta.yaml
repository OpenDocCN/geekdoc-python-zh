    \ a **subpackage** in **mypackage**. Import and use it in a module in the parent\
    \ directory.\n\n# 4.4 Inheritance\n\nModern programming languages have different\
    \ mechanisms for code reuse. Procedures give an excellent way to reuse code. Functions\
    \ and class methods in Python are great examples of how code re-usability can\
    \ be achieved by procedure.\n\nObject-oriented programming languages like Python\
    \ also have another approach for code reuse. This is known as **Inheritance**.\
    \ Python has a mechanism for **Class-based Inheritance**. A class in Python can\
    \ inherit the attributes and the behaviors of the other class. The base class\
    \ from which we derive other class(es) is also known as **Parent Class** or **Super\
