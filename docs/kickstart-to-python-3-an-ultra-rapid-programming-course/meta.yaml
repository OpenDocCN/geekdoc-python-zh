    img1.rotate(45, background=Color('rgb(127, 127, 127)'))\nimg1\n```\n\nThe output\
    \ is as follows:\n\n![](img/0f3f12fc54f1049d26ccfe6d76bc3687_169_0.png)\n\n*Figure\
    \ 9-30: Rotated image*\n\n## 9.6 Statistical Operations\n\nWe can perform statistical\
    \ operations on images. These can be performed using the routine **statistic()**.\
