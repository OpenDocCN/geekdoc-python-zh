    count = 0\nwhile(count < 360):\n    t1.forward(1)\n    t1.left(1)\n    t2.forward(1)\n\
    \    t2.right(1)\n    count = count + 1\n```\n\nWe are making both turtles draw\
    \ small segments per iteration. This creates the illusion that both are running\
    \ in parallel. Run the code and see the output.\n\n## Summary\n\nIn this chapter,\
    \ we explored the turtle library. We have drawn many shapes. The most interesting\
