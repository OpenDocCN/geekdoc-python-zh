    # 10.2 Worldcloud


    Word clouds are also known as tag clouds. They are visual representations of the
    frequency of the keywords in the source document so that the most frequently occurring
    word has the biggest size. This applies to all the other keywords in the document
    and we get a cloud-like visual shape. There are many tools available to generate
    word clouds. We can also generate them programmatically.


    Let''s get started with the programming part. Create a new notebook for this section.
    Run the following command to install the required libraries:


    ```

    !pip3 install matplotlib pandas wordcloud pillow

    ```


