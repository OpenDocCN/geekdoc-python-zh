    ## 2.1 IPython


    IPython means **Interactive Python Shell**. It is a program that provides us with
    more facilities than python''s built-in interactive shell. We have to install
    it separately using the following command:


    ```

    pi@raspberrypi:~ $ pip3 install ipython

    ```


    The command is the same for Windows and macOS. If you are installing it on a Linux
    distribution (like me), you may see the following message in the installation
    log:


    > **The scripts iptest, iptest3, ipython, and ipython3 are installed in ''/home/pi/.local/bin''
    which is not on PATH.**

    >

    > **Consider adding this directory to PATH or, if you prefer to suppress this
    warning, use --no-warn-script-location.**


    This means we need to add the mentioned directory location to `~/.bashrc` and
    `~/.bash_profile` files. We have to add the following line to both the files (so
    it works for login and non-login shells):


    ```

    PATH=$PATH:/home/pi/.local/bin

    ```


    It will show a similar message for Windows too. We have to add the path of the
    directory mentioned in the installation log to the **PATH** variables (User and
    System variables, both) in Windows too.


    Once we change the path, we have to close and re-invoke the command line utilities
    of the operating systems. After this, run the following command:


    ```

    pi@raspberrypi:~$ ipython3

    ```


    This will launch the IPython for Python 3 in the command prompt. The command is
    the same for Windows and other platforms. Figure 2-1 is the screenshot of an IPython
    session in progress on a Windows desktop computer:


    ![](img/0f3f12fc54f1049d26ccfe6d76bc3687_18_0.png)


    We can use IPython like this to write small programs. So, let''s roll.


    ## 2.2 Lists


    We can store more than one value in lists. Lists are a built-in feature of Python.
    We do not have to install or import anything when using lists. List elements are
    enclosed in square brackets and separated by commas. But lists are in no way linear
    data structures as we can also have a list of lists. We will see more about the
    list of lists later when we are comfortable with the basics.


    Lists are mutable, meaning we can change them. Let us see a few examples of lists
    and associated built-in routines for the same. Open IPython on the command prompt
    of your operating system and follow the code:


    ```

    In [1]: fruits = [''babana'', ''pineapple'', ''orange'']

    ```


    This will create a list. Now, we can print it on the console in two ways:


    ```

    In [2]: fruits

    ```


    This produces the following output:


    ```

    Out[2]: [''babana'', ''pineapple'', ''orange'']

    ```'
