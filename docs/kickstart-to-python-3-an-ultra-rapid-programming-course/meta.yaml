- md: "In the except block, Exception is the base class for all the built-in exceptions\
    \ in Python. In the later parts of this chapter, we will also study user-defined\
    \ exceptions which will be derived from the Exception class.\n\nLet's modify the\
    \ code and add some more code to function **main()** which is not the part of\
    \ try or except blocks.\n\n```python\nprog01.py\ndef main():\n    try:\n     \
    \   a = 1/0\n        print(\"DEBUG:  We are here...\")\n    except Exception:\n\
    \        print(\"Exception Occurred\")\n    print(\"This line will be executed...\"\
    )\n\nif __name__ == \"__main__\":\n    main()\n```\n\nWhen executed, you will\
    \ notice the line outside the try and except block is executed in spite the exception\
    \ is encountered.\n\n## 4.10.2 Handling Exceptions by types\n\nWhen we run a program,\
    \ we may encounter exceptions of multiple types. We can have the provision of\
    \ handling various types of exceptions. A simple example is as follows:\n\n```python\n\
    prog02.py\ndef main():\n    try:\n        a = 1/1\n    except ZeroDivisionError\
    \ as err:\n        print(\"Error: {0}\".format(err))\n    except TypeError as\
    \ err:\n        print(\"Error: {0}\".format(err))\n    except Exception as err:\n\
    \        print(\"Error: {0}\".format(err))\nif __name__ == \"__main__\":\n   \
    \ main()\n```\n\nIn the code above, we have except blocks for handling **ZeroDivisionError**\
    \ and **TypeError**. If any other unexpected exception is encountered, it is handled\
    \ by the last except block which is a generic exception handler block. Note that,\
    \ the generic block should always be the last except block (as shown in the code\
    \ above). If this is the very first except block, whenever any exception is encountered,\
    \ the generic exception handling block will always be executed. This is because\
    \ class Exception is the base class for all exceptions and it takes precedence.\n\
    \nAs an exercise, rewrite the above program with **except Exception** as the first\
    \ exception handling block.\n\nAs we know, everything is an object in python.\
    \ **SyntaxError** is also a type of exception. This is a special type of exception\
    \ that cannot be handled in the except block.\n\n## 4.10.3 else block\n\nWe can\
    \ add an else block to the code after the except block. If any error is not encountered\
    \ in the **try** block, **else** block is executed. The following program demonstrates\
    \ this:\n\n```python\nprog02.py\ndef main():\n    try:\n        a = 1/1\n    except\
    \ ZeroDivisionError as err:\n        print(\"Error: {0}\".format(err))\n    except\
    \ TypeError as err:\n        print(\"Error: {0}\".format(err))\n    except Exception\
    \ as err:\n        print(\"Error: {0}\".format(err))\n    else:\n        print(\"\
    This line will be executed...\")\n\nif __name__ == \"__main__\":\n    main()\n\
    ```\n\n## 4.10.4 Raising an Exception\n\nWe know that an exception is automatically\
    \ raised when there is a runtime error. We can raise an exception explicitly and\
    \ deliberately using a raise statement. The following code demonstrates this:\n\
    \n```python\nprog03.py\ndef main():\n    try:\n        raise Exception(\"Exception\
    \ has been raised!\")\n    except Exception as err:\n        print(\"Error: {0}\"\
    .format(err))\n    else:\n        print(\"This line will be executed...\")\n\n\
    if __name__ == \"__main__\":\n    main()\n```\n\nThe output is as follows,\n\n\
    **Error: Exception has been raised!**\n\n## 4.10.5 finally clause\n\n**finally**\
    \ is a clause for the **try** statement, which is always executed on the way out.\
    \ This means that it is essentially the **Clean Up Clause**. It is always executed\
    \ at the end of the **try** clause irrespective of whether an exception occurred\
    \ in the try statement. If any exception is not handled in the **except** block,\
    \ it is re-raised in **finally**. The following is an example of the same:\n\n\
    ```python\nprog04.py\ndef divide(x, y):\n    try:\n        result = x / y\n  \
    \  except ZeroDivisionError:\n        print(\"division by zero!\")\n    else:\n\
    \        print(\"result is\", result)\n    finally:\n        print(\"executing\
    \ finally clause\")\n\ndef main():\n    divide(2, 1)\n    divide(\"2\", \"1\"\
    )\n\nif __name__ == \"__main__\":\n    main()\n```\n\nThe following is the output:\n\
    \n```\nresult is 2.0\nexecuting finally clause\nexecuting finally clause\nTraceback\
    \ (most recent call last):\n  File \"C:\\Users\\Ashwin\\Google Drive\\Elektor\\\
    Python Book Project\\Code\\Chapter04\\Exceptions\\prog04.py\", line 17, in <module>\n\
    \    main()\n  File \"C:\\Users\\Ashwin\\Google Drive\\Elektor\\Python Book Project\\\
    Code\\Chapter04\\Exceptions\\prog04.py\", line 13, in main\n    divide(\"2\",\
    \ \"1\")\n  File \"C:\\Users\\Ashwin\\Google Drive\\Elektor\\Python Book Project\\\
    Code\\Chapter04\\Exceptions\\prog04.py\", line 3, in divide\n    result = x /\
    \ y\nTypeError: unsupported operand type(s) for /: 'str' and 'str'\n```\n\nAs\
    \ we can see, in the code above there is no provision for handling **TypeError**\
    \ exceptions. So, the **finally** clause raises it once more.\n\n## 4.10.6 User-Defined\
    \ Exceptions\n\nWe can define our own exceptions derived from the Exception class.\
    \ Usually, in a module, we define a single base class derived from Exception and\
    \ obtain all the other exception classes from that. An example of this is shown\
    \ below:\n\n```python\nprog05.py\nclass Error(Exception):\n    pass\n\nclass ValueTooSmallError(Error):\n\
    \    pass\n\nclass ValueTooLargeError(Error):\n    pass\n\ndef main():\n    number\
    \ = 10\n    try:\n        i_num = int(input(\"Enter a number: \"))\n        if\
    \ i_num < number:\n            raise ValueTooSmallError\n        elif i_num >\
    \ number:\n            raise ValueTooLargeError\n        else:\n            print(\"\
    Perfect!\")\n    except ValueTooSmallError:\n        print(\"This value is too\
    \ small!\")\n    except ValueTooLargeError:\n        print(\"This value is too\
    \ large!\")\n\nif __name__ == \"__main__\":\n    main()\n```\n\nPlease run the\
    \ program above and see the output. In the above program, the class **Error**\
    \ is inherited from the built-in class **Exception**. We inherit more sub-classes\
