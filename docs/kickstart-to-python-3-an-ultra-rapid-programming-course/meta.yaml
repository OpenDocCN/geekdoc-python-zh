    \n# 6.5 Visualizing Recursion\n\nWe learned about the recursion in the third chapter.\
    \ We know that calling a function from within itself is known as direct recursion.\
    \ We know that there are two important parts of a recursive function. The first\
    \ is the recursion termination criteria. The second is the recursive call. In\
    \ our earlier recursive functions, we printed the output on the console. Now instead\
    \ of the text-based output, we will have graphical output. We will start with\
    \ a simple program:\n\n```\nprog00.py\nimport turtle as Turtle\ndef zigzag(size,\
    \ length):\n    if size > 0:\n        Turtle.left(45)\n        Turtle.forward(length)\n\
    \        Turtle.right(90)\n        Turtle.forward(2*length)\n        Turtle.left(90)\n\
    \        Turtle.forward(length)\n        Turtle.right(45)\n```"
