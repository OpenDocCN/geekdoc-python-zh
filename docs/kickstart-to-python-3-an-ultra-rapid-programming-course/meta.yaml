- md: "## 5.2.1 Doubly Linked List\n\nNow we are comfortable with the concept of a\
    \ singly linked list. Let's see an advanced data structure (or rather an improvement\
    \ on the Singly Linked list). We can have a linked list in such a way that it\
    \ has two links (pointers). We can thus traverse the list both ways. Let's define\
    \ the node data structure:\n\n```python\nclass Node:\n    def __init__(self, data):\n\
    \        self.data = data\n        self.next = None\n        self.prev = None\n\
    ```\n\nWe can define a class as a doubly-linked list as follows:\n\n```python\n\
    class DoublyLinkedList:\n\n    def __init__(self):\n        self.head = None\n\
    ```\n\nWe can add a method to push an element to the start of the list:\n\n```python\n\
    def push(self, new_data):\n    new_node = Node(new_data)\n    new_node.next =\
    \ self.head\n    if self.head is not None:\n        self.head.prev = new_node\n\
    \    self.head = new_node\n```\n\nWe can also write a method to append the list:\n\
    \n```python\ndef append(self, new_data):\n    new_node = Node(new_data)\n    if\
    \ self.head is None:\n        self.head = new_node\n        return\n    last =\
    \ self.head\n    while last.next:\n        last = last.next\n    last.next = new_node\n\
    \    new_node.prev = last\n    return\n```\n\nWe can traverse the list:\n\n```python\n\
    def printList(self, node):\n    print(\"Traversal in forward direction\")\n  \
    \  while node:\n        print(node.data)\n        last = node\n        node =\
    \ node.next\n\n    print(\"Traversal in reverse direction\")\n    while last:\n\
    \        print(last.data)\n        last = last.prev\n```\n\nLet's write driver\
    \ code to demonstrate the usage of these functions:\n\n```python\nllist = DoublyLinkedList()\n\
    llist.push(1)\nllist.append(2)\nllist.append(3)\nllist.printList(llist.head)\n\
    ```\n\nThe above code creates a doubly linked list as shown below:\n\n![](img/0f3f12fc54f1049d26ccfe6d76bc3687_75_0.png)\n\
    \n## 5.3 Stack\n\nThe Stack is a linear data structure that is open at one end\
    \ and closed at the other. This means that programmatically access it from one\
    \ end only. We can insert and pop the element from the same end. The operation\
    \ of inserting an element to a stack is called **Push** and the operation that\
    \ removes an element from a stack is known as **Pop**.\n\nThere are many ways\
    \ we can implement a stack in Python and we will explore many of them.\n\n###\
    \ Kickstart to Python 3\n\nLet's see how to create a stack with a list in Python:\n\
    \n```python\nstack = []\nstack.append('a')\n```\n\nThis creates an empty stack\
    \ and pushes an element into it. Let's print the contents of the stack and see\
    \ the output:\n\n```python\nprint(stack)\n```\n\nLet's push a few more elements:\n\
    \n```python\nstack.append('b')\nstack.append('c')\nprint(stack)\n```\n\nWe can\
    \ pop the elements of a stack as follows:\n\n```python\nprint(stack.pop())\nprint(stack.pop())\n\
    print(stack.pop())\n```\n\nLet's print the stack:\n\n```python\nprint(stack)\n\
    ```\n\nIt will show an empty list. If we try to pop an element from the empty\
    \ stack, it will throw an exception:\n\n```python\nprint(stack.pop())\n```\n\n\
    Let's implement a stack with **Deque** module in Python:\n\n```python\nfrom queue\
    \ import LifoQueue\n\nstack = LifoQueue(maxsize=5)\n\nprint(\"Current number of\
    \ element: \", stack.qsize())\n\nfor i in range(0, 5):\n    stack.put(i)\n   \
    \ print(\"Element Inserted : \" + str(i))\n\nprint(\"\\nCurrent number of element:\
    \ \", stack.qsize())\nprint(\"\\nFull: \", stack.full())\nprint(\"Empty: \", stack.empty())\n\
    ```\n\n```python\nprint('\\nElements popped from the stack')\nfor i in range(0,\
    \ 5):\n    print(stack.get())\n\nprint(\"\\nEmpty: \", stack.empty())\nprint(\"\
    Full: \", stack.full())\n```\n\nThe output is as follows,\nCurrent number of element:\
    \  0\nElement  Inserted : 0\nElement  Inserted : 1\nElement  Inserted : 2\nElement\
    \  Inserted : 3\nElement  Inserted : 4\n\nCurrent number of element:  5\n\nFull:\
    \  True\nEmpty:  False\n\nElements popped from the stack\n4\n3\n2\n1\n0\n\nEmpty:\
    \  True\nFull:  False\n\nWe can also define a stack in a more Pythonic way using\
    \ the **Deque** module as follows:\n\n```python\nfrom collections import deque\n\
    class Stack:\n\n    def __init__(self):\n        self.stack = deque()\n\n    def\
    \ isEmpty(self):\n        if len(self.stack) == 0:\n            return True\n\
    \        else:\n            return False\n\n    def length(self):\n        return\
    \ len(self.stack)\n\n    def top(self):\n        return self.stack[-1]\n\n   \
    \ def push(self, x):\n        self.x = x\n        self.stack.append(x)\n\n   \
    \ def pop(self):\n        self.stack.pop()\n```\n\nLet's write some driver code\
    \ and learn to reverse a string with the stack. We read and push the characters\
    \ in a string into a stack and then pop them and create a new string with the\
    \ popped items as follows:\n\n```python\nstr1 = \"Test_string\"\nn = len(str1)\n\
    stack = Stack()\nfor i in range(0, n):\n    stack.push(str1[i])\nreverse = \"\"\
    \nwhile not stack.isEmpty():\n    reverse = reverse + stack.pop()\nprint(reverse)\n\
    ```\n\nWe can also implement a stack using a linked list. Complete this as an\
    \ exercise.\n\n## 5.4 Queue\n\nQueues are the linear data structures that allow\
    \ insertion from one end and removal from the other. This is unlike stacks that\
    \ are **Last In First Out** (LIFO). Queues are **First in First Out** (FIFO).\
    \ Adding an element to a queue is known as **enqueue** and removing an item is\
    \ known as **dequeue**. We can implement queues in various ways. Let's implement\
    \ them with lists in python. Let's see the code:\n\n```python\nqueue = []\nqueue.append('a')\n\
    print(queue)\n```\n\nLet's add more elements to the queue:\n\n```python\nqueue.append('b')\n\
    queue.append('c')\nprint(queue)\n```\n\nWe can remove a few items:\n\n```python\n\
    print(queue.pop(0))\nprint(queue.pop(0))\nprint(queue)\n```\n\nThe queue is now\
    \ empty and trying to remove one more item from it will raise an exception:\n\n\
    ```python\nprint(queue.pop(0))\n```\n\nWe can also implement queues with the **synchronized\
    \ queue** class in python:\n\n```python\nfrom queue import Queue\nq = Queue(maxsize=3)\n\
    q.qsize()\n```\n\nWhen executed, the above code prints the current number of items\
    \ in the queue. We can add a few items as follows:\n\n```python\nq.put('a')\n\
    q.put('b')\nq.put('c')\nprint(q.full())\n```\n\nWe can remove items as follows:\n\
    \n```python\nprint(q.get())\nprint(q.get())\nprint(q.get())\nprint(q.empty())\n\
    ```\n\nWe can also implement it using a **deque**:\n\n```python\nfrom collections\
    \ import deque\nq = deque()\n```\n\nLet's add a few elements to this:\n\n```python\n\
    q.append('a')\nq.append('b')\nq.append('c')\n\nprint(\"Contents of the queue\"\
    )\nprint(q)\n```\n\nThe output is as follows,\n\n**Contents of the queue**\ndeque(['a',\
    \ 'b', 'c'])\n\nWe can remove the elements:\n\n```python\nprint(q.popleft())\n\
    print(q.popleft())\nprint(q.popleft())\n\nprint(\"\\nAn empty Queue: \")\nprint(q)\n\
    ```\n\nThe output is as follows,\n**a**\n**b**\n**c**\n\n**An empty Queue:**\n\
    deque([])\n\nIn the earlier section, I asked you to implement a stack with a linked\
    \ list. We can do the same for queues too. Here, we will learn to implement it.\
    \ If you have written a program for a stack with a linked list, you will see we\
    \ can modify the same program to suit our purpose. Let's write the code:\n\n```python\n\
    class Node:\n\n    def __init__(self, data):\n        self.data = data\n     \
    \   self.next = None\n```\n\nLet's define a queue using this node:\n\n```python\n\
    class Queue:\n\n    def __init__(self):\n        self.front = self.rear = None\n\
    \n    def isEmpty(self):\n        return self.front == None\n\n    # Method to\
    \ add an item to the queue\n    def EnQueue(self, item):\n        temp = Node(item)\n\
    \n        if self.rear == None:\n            self.front = self.rear = temp\n \
    \           return\n        self.rear.next = temp\n        self.rear = temp\n\n\
    \    def DeQueue(self):\n\n        if self.isEmpty():\n            return\n  \
    \      temp = self.front\n        self.front = temp.next\n\n        if(self.front\
    \ == None):\n            self.rear = None\n```\n\nFinally, we can write a driver\
    \ code:\n\n```python\nq = Queue()\nq.EnQueue(1)\nq.EnQueue(2)\nq.DeQueue()\nq.DeQueue()\n\
    q.EnQueue(3)\nq.EnQueue(4)\nq.EnQueue(5)\nq.DeQueue()\n```\n\nLet's print the\
    \ elements in the front and the rear of the queue:\n\n```python\nprint(\"\\nThe\
    \ front of the Queue : \" + str(q.front.data))\nprint(\"\\nThe rear of the Queue\
    \ : \" + str(q.rear.data))\n```\n\nIt produces the following output:\n\n**The\
    \ front of the Queue : 4**\n**The rear of the Queue : 5**\n\n### 5.4.1 Double\
    \ Ended Queues\n\nWe have already used the **deque** class to implement a simple\
    \ one-sided queue. It is a two-sided queue where we can insert and remove from\
    \ both ends. Let's use it the way it was intended to be and write a sample program\
    \ to demonstrate its double-ended capability:"
  mdcn: "## 5.2.1 双向链表\n\n现在我们已经熟悉了单向链表的概念。让我们来看一种更高级的数据结构（或者说是对单向链表的改进）。我们可以让链表拥有两个链接（指针），这样就能双向遍历链表。我们来定义节点数据结构：\n\
    \n```python\nclass Node:\n    def __init__(self, data):\n        self.data = data\n\
    \        self.next = None\n        self.prev = None\n```\n\n我们可以将双向链表定义为如下类：\n\
    \n```python\nclass DoublyLinkedList:\n\n    def __init__(self):\n        self.head\
