  md: '# Chapter 6 • Turtle Graphics


    In the previous chapter, we explored various data structures and demonstrated
    them with Python programming.


    In this chapter, we will use the built-in turtle library in Python to draw attractive
    graphical shapes. The following list is the topics we will be cover in this chapter:


    +   - History of Turtle

    - Getting Started

    - Recipes with Turtle

    - Visualizing Recursion

    - Multiple turtles


    After this chapter, we will be comfortable drawing shapes using turtle.


    # 6.1 History of Turtle


    Turtles are a class of educational robots designed in the late 1940s under the
    guidance of researcher William Grey Walter. They are used in the teaching of Computer
    Science and Mechanical Engineering. These robots are designed to be low to the
    ground. They have a very small turning radius for finer direction control. They
    are also sometimes equipped with sensors.


    Logo is an educational programming language designed by Wally Feurzeig, Seymour
    Papert, and Cynthia Solomon. Turtle graphics is one of the features of the Logo
    programming language. It uses either on-screen or a physical turtle to draw on
    a screen or piece of paper respectively.


    The Python programming language also has a library for Turtle graphics. In this
    chapter, we will explore this library in detail.


    # 6.2 Getting Started


    We can get started by installing the necessary libraries. Install **Tkinter**
    library using the following command:


    ```

    pi@pi-desktop:~$ sudo apt -y install python3-tk

    ```


    Turtle library needs Tkinter. Turtle comes pre-installed with most of the Python
    distributions.


    If your Python setup does not have Turtle, it can be installed with the following
    command:


    ```

    pi@pi-desktop:~$ pip3 install PythonTurtle

    ```'
