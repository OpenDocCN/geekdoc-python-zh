- md: "## 9.10 Distortions\n\nDistortions are geometric transformations we apply to\
    \ images. Geometric transformations are mathematical functions. Let's apply a\
    \ simple geometric transformation to an image:\n\n```python\nimg1 = img.clone()\n\
    img1.distort('arc', (angle, ))\nimg1\n```\n\nHere is the output:\n\n![](img/0f3f12fc54f1049d26ccfe6d76bc3687_185_0.png)\n\
    \nFigure 9-52: Arc transformation\n\nObserve the output. We can see the transformation\
    \ creates extra pixels that are filled by extending the edge of the original image.\
    \ This is the default behavior. We can customize it with virtual pixels. So before\
    \ proceeding further with more transformations, we will learn more about various\
    \ methods for virtual pixels.\n\nWe can fill these extra pixels with a constant\
    \ color:\n\n```python\nimg1 = img.clone()\nimg1.background_color = Color('rgb(127,\
    \ 127, 127)')\nimg1.virtual_pixel = 'background'\nangle = 60\nimg1.distort('arc',\
    \ (angle, ))\nimg1\n```\n\nThis is the output:\n\n![](img/0f3f12fc54f1049d26ccfe6d76bc3687_186_0.png)\n\
    \nFigure 9-53: Grey background\n\nWe can see the list of all methods for virtual\
    \ pixels at https://docs.wand-py.org/en/0.6.7/wand/image.html#wand.image.VIRTUAL_PIXEL_METHOD.\n\
    \nLet's see their demonstrations one by one.\n\nWe can have a white background:\n\
    \n```python\nimg1 = img.clone()\nimg1.virtual_pixel = 'white'\nangle = 60\nimg1.distort('arc',\
    \ (angle, ))\nimg1\n```\n\nWe can also have a black background:\n\n```python\n\
    img1 = img.clone()\nimg1.virtual_pixel = 'black'\nangle = 60\nimg1.distort('arc',\
    \ (angle, ))\nimg1\n```\n\nWe can have a transparent background:\n\n```python\n\
    img1 = img.clone()\nimg1.virtual_pixel = 'transparent'\nangle = 60\nimg1.distort('arc',\
    \ (angle, ))\nimg1\n```\n\nLet's use dithering for virtual pixels:\n\n```python\n\
    img1 = img.clone()\nimg1.virtual_pixel = 'dither'\nangle = 60\nimg1.distort('arc',\
    \ (angle, ))\nimg1\n```\n\nThis is the output:\n\n![](img/0f3f12fc54f1049d26ccfe6d76bc3687_187_0.png)\n\
    \nExtended edges are the default way. We have already seen this. We can also set\
