  md: "# 4.3.2 Packages\n\nUp until now, we have seen how to organize the functions\
    \ and the classes in Python in separate modules. We can organize the modules into\
    \ packages. Let's create a package of the code we have already written. Create\
    \ a subdirectory in the directory where you're saving all the python modules.\
    \ Name the subdirectory **mypackage**. Move the module **prog02** into the directory\
    \ **mypackage**. Create an empty file **__init__.py** and save it inside the **mypackage**\
    \ directory. We just created our very own Python package! That's correct. Creating\
    \ a package is easy. We just need to put the modules in a directory and create\
    \ an empty **__init__.py** file in the same directory. The name of the directory\
    \ containing the modules is the package name. Now, in the original parent directory,\
    \ create a python module **prog05** as follows:\n\n```\nprog05.py\nimport mypackage.prog02\n\
    def main():\n    mypackage.prog02.main()\n\nif __name__ == \"__main__\":\n   \
    \ main()\n```\n\nNow run the **prog05** module and see the output. Notice we are\
    \ using <package>.<module>.<member> notation to access a member of a package.\
    \ We do not have to do this if we use **from <module> import <class>** syntax\
    \ for importing.\nAs an exercise, write the program by importing the **prog02**\
    \ modules with the syntax **from prog02 import Class01, Class02** and run the\
    \ code.\nWe can even have a package within a package. To do this we just have\
    \ to create another directory within the directory **mypackage** and add the desired\
    \ module file and an empty **__init__.py** file to it.\n\nAs an exercise, create\
    \ a **subpackage** in **mypackage**. Import and use it in a module in the parent\
    \ directory.\n\n# 4.4 Inheritance\n\nModern programming languages have different\
    \ mechanisms for code reuse. Procedures give an excellent way to reuse code. Functions\
    \ and class methods in Python are great examples of how code re-usability can\
    \ be achieved by procedure.\n\nObject-oriented programming languages like Python\
    \ also have another approach for code reuse. This is known as **Inheritance**.\
    \ Python has a mechanism for **Class-based Inheritance**. A class in Python can\
    \ inherit the attributes and the behaviors of the other class. The base class\
    \ from which we derive other class(es) is also known as **Parent Class** or **Super\
    \ Class**. The class which inherits (or derives or extends from, keep in mind\
    \ that these terms are used interchangeably in the world of object-oriented programming)\
    \ the attributes and the behaviors is known as **Child class** or **Sub Class**."
