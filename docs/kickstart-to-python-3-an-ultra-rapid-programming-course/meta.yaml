    print(currSheet)\nprint(type(currSheet))\nprint(currSheet.title)\n```\n\n这是输出：\n\
    \n```\n<Worksheet \"Sheet1\">\n<class 'openpyxl.worksheet.worksheet.Worksheet'>\n\
