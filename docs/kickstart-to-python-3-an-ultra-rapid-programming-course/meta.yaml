- md: "## 4.2.5 Multiline Docstrings in Python\n\nLet's see an example of multiline\
    \ docstrings in Python. Multiline docstrings are used to spread the docstrings\
    \ over multiple lines. The following is an example of a multiline docstring:\n\
    \n```python\n# prog01.py\n'This is the DocString example'\nclass Point:\n    \"\
    \"\"This class represent the data-structure Point\n    This is an example of the\
    \ multiline docstring...\n    \"\"\"\n\n    def __init__(self, x, y, z):\n   \
    \     '''The initializer ---\n        This initializes the object with the passed\
    \ arguments\n        '''\n        self.assign(x, y, z)\n\n    def assign(self,\
    \ x, y, z):\n        'This assigns the value to the co-ordinates'\n        self.x\
    \ = x\n        self.y = y\n        self.z = z\n\n    def printPoint(self):\n \
    \       'This prints the values of co-ordinates'\n        print(self.x, self.y,\
    \ self.z)\n\np1 = Point(0, 1, 2)\np1.printPoint()\n```\n\nRun the program and\
    \ see the output.\n\n## 4.3 Modules and Packages\n\nIn this section, we will begin\
    \ with the concept of **Modularity** in Python. We will take a look at modules\
    \ and packages. We will also write programs to demonstrate these concepts.\n\n\
    ### 4.3.1 Modules\n\nIn the earlier section, we demonstrated examples of the concept\
    \ of **Class** in Python. We had a class named **Point** in the python code file\
    \ **prog02.py**. We can also have multiple classes in a single python code file.\
    \ Consider the following program:\n\n```python\n# prog02.py\nclass Class01:\n\n\
    \    def __init__(self):\n        print(\"Just created an object for Class01...\"\
    )\n\nclass Class02:\n\n    def __init__(self):\n        print(\"Just created an\
    \ object for Class02...\")\n\no1 = Class01()\no2 = Class02()\n```\n\nIn the above\
    \ example, we are defining two classes **Class01** and **Class02** in a single\
    \ python code file. Python code files are also known as python modules. Suppose\
    \ you have a directory where you have created a bunch of python code files, we\
    \ can just refer to each code file as a module. Run the example above and see\
    \ the output. Also, classes and functions in a python module can be accessed in\
    \ another module. This is known as modularity. We can group the related classes\
    \ in a module and import them when required in other modules. To see this in action,\
    \ create another python module **prog03** in the same directory. The following\
    \ is the code for it:\n\n```python\n# prog03.py\nimport prog02\n\no1 = prog02.Class01()\n\
    o2 = prog02.Class02()\n```\n\nWhen we execute the module prog03, we get the following\
    \ output:\n\n```\nJust created an object for Class01...\nJust created an object\
    \ for Class02...\nJust created an object for Class01...\nJust created an object\
    \ for Class02...\n```\n\nCan you guess why this is happening?? It is printing\
    \ the statements twice because we're importing the entire module. So, it's importing\
    \ the part from prog02 where we're creating the objects. Hence, the objects are\
    \ created twice. To mitigate this, Python provides an efficient approach. Make\
    \ the following changes to prog02.py:\n\n```python\n# prog02.py\nclass Class01:\n\
    \n    def __init__(self):\n        print(\"Just created an object for Class01...\"\
    )\n\nclass Class02:\n\n    def __init__(self):\n        print(\"Just created an\
    \ object for Class02...\")\n\nif __name__ == \"__main__\":\n    o1 = Class01()\n\
    \    o2 = Class02()\n```\n\nWriting our main code under the block starting with\
    \ **if __name__ == \"__main__\":** ensures it is called only when the module is\
    \ executed directly. When we import the entire module in another module, the code\
    \ with the main logic is not imported to the other module. Only functions and\
    \ classes are imported to the other module. If you run both the modules one by\
    \ one, you'll see that objects are created only once during each run. But what\
    \ if we want to import and run the main logic code of the module on-demand in\
    \ the module where it's imported? There is a more Pythonic way to organize our\
    \ code to make this possible. Rewrite the **prog02** module as follows:\n\n```python\n\
    # prog02.py\nclass Class01:\n\n    def __init__(self):\n        print(\"Just created\
    \ an object for Class01...\")\n\nclass Class02:\n\n    def __init__(self):\n \
    \       print(\"Just created an object for Class02...\")\n\ndef main():\n    o1\
    \ = Class01()\n    o2 = Class02()\n\nif __name__ == \"__main__\":\n    main()\n\
    ```\n\nAlso, make changes to the prog03 module as follows:\n\n```python\n# prog03.py\n\
    import prog02\nprog02.main()\n```\n\nIn the module **prog03**, we're directly\
    \ importing the **main()** function of the **prog02** module. Now, execute the\
    \ module **prog03** to see the output. It will be the same. However, the **prog02**\
    \ module is now more organized than before. Let's make the same changes to the\
    \ **prog03** code as follows:\n\n```python\n# prog03.py\nimport prog02\n\ndef\
    \ main():\n    prog02.main()\n\nif __name__ == \"__main__\":\n    main()\n```\n\
    \nRun the code again to see the output. Finally, to add more clarity, we will\
    \ modify **prog02** as follows:\n\n```python\n# prog02.py\nclass Class01:\n\n\
    \    def __init__(self):\n        print(\"Just created an object for Class01...\"\
    )\n\nclass Class02:\n\n    def __init__(self):\n        print(\"Just created an\
    \ object for Class02...\")\n\ndef main():\n    o1 = Class01()\n    o2 = Class02()\n\
    \nif __name__ == \"__main__\":\n    print(\"Module prog02 is being run directly...\"\
    )\n    main()\nelse:\n    print(\"Module prog02 has been imported in the current\
    \ module...\")\n```\n\nRun both the modules and see the output. What happened\
    \ here?? We notice that the code before the **else** statement is executed if\
    \ we directly run the module and the code after the **else** statement is executed\
    \ when we import an entire module.\n\nLet's move on to understand the other way\
    \ to import the members of a module. In the earliest version of module **prog03**\
    \ we had the following code,\n\n```python\n# prog03.py\nimport prog02\no1 = prog02.Class01()\n\
    o2 = prog02.Class02()\n```\n\nHere, we addressed the members of module **prog02**\
    \ with **prog02.member** notation. This is because the statement **import prog02**\
    \ imports all members to the **prog03** module. There is another way to import\
    \ the members of modules. The following is an example of this:\n\n```python\n\
    # prog04.py\nfrom prog02 import Class01, Class02\n\ndef main():\n    o1 = Class01()\n\
    \    o2 = Class02()\n\nif __name__ == \"__main__\":\n    main()\n```\n\nWith **from\
    \ <module> import <member>** syntax, we do not have to use the **<module>.<member>**\
    \ convention in the calling module. We can directly address the members of an\
    \ imported module as shown in the above example. Run the program and see the output.\
    \ In the program above we're importing both members of **prog02**. Modify the\
    \ program above to import a single member of the **prog02** module. Also, add\
    \ the **else** part after the call to the **main()** function.\n\n### 4.3.2 Packages\n\
    \nUp until now, we have seen how to organize the functions and the classes in\
    \ Python in separate modules. We can organize the modules into packages. Let's\
    \ create a package of the code we have already written. Create a subdirectory\
    \ in the directory where you're saving all the python modules. Name the subdirectory\
    \ **mypackage**. Move the module **prog02** into the directory **mypackage**.\
    \ Create an empty file **__init__.py** and save it inside the **mypackage** directory.\
    \ We just created our very own Python package! That's correct. Creating a package\
    \ is easy. We just need to put the modules in a directory and create an empty\
    \ **__init__.py** file in the same directory. The name of the directory containing\
    \ the modules is the package name. Now, in the original parent directory, create\
    \ a python module **prog05** as follows:\n\n```python\n# prog05.py\nimport mypackage.prog02\n\
    \ndef main():\n    mypackage.prog02.main()\n\nif __name__ == \"__main__\":\n \
    \   main()\n```\n\nNow run the **prog05** module and see the output. Notice we\
    \ are using <package>.<module>.<member> notation to access a member of a package.\
    \ We do not have to do this if we use **from <module> import <class>** syntax\
    \ for importing.\n\nAs an exercise, write the program by importing the **prog02**\
    \ modules with the syntax **from mypackage.prog02 import Class01, Class02** and\
    \ run the code.\n\nWe can even have a package within a package. To do this we\
    \ just have to create another directory within the directory **mypackage** and\
    \ add the desired module file and an empty **__init__.py** file to it.\n\nAs an\
    \ exercise, create a **subpackage** in **mypackage**. Import and use it in a module\
    \ in the parent directory.\n\n## 4.4 Inheritance\n\nModern programming languages\
    \ have different mechanisms for code reuse. Procedures give an excellent way to\
    \ reuse code. Functions and class methods in Python are great examples of how\
    \ code re-usability can be achieved by procedure.\n\nObject-oriented programming\
    \ languages like Python also have another approach for code reuse. This is known\
    \ as **Inheritance**. Python has a mechanism for **Class-based Inheritance**.\
    \ A class in Python can inherit the attributes and the behaviors of the other\
    \ class. The base class from which we derive other class(es) is also known as\
    \ **Parent Class** or **Super Class**. The class which inherits (or derives or\
    \ extends from, keep in mind that these terms are used interchangeably in the\
    \ world of object-oriented programming) the attributes and the behaviors is known\
    \ as **Child class** or **Sub Class**."
