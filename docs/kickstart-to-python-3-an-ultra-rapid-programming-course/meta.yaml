    \ test\n```\n\n输出如下：\n\n```\nArguments passed:\nprog00.py\n1\ntest 123\ntest\n\
    ```\n\n这就是我们如何在Python中处理命令行参数。这是一种非常有用的技术，可用于编程基于文本的实用程序。\n\n### 10.2 词云\n\n词云也称为标签云。它们是源文档中关键词频率的可视化表示，因此出现频率最高的词具有最大的尺寸。这适用于文档中的所有其他关键词，我们得到一个类似云的视觉形状。有许多工具可用于生成词云。我们也可以通过编程方式生成它们。\n\
