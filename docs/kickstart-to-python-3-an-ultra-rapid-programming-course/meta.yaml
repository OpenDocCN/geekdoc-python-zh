    # prog05.py\nimport turtle as Turtle\ndef draw_line(pos1, pos2):\n    Turtle.penup()\n\
    \    Turtle.goto(pos1[0], pos1[1])\n    Turtle.pendown()\n    Turtle.goto(pos2[0],\
    \ pos2[1])\n\ndef recursive_draw(x, y, width, height, count):\n    draw_line([x\
