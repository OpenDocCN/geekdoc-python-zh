    # 5. Commit Your Files


    Committing in Git creates a snapshot of the changes you’ve made. It’s like saving
    a version of your project. To commit the files you’ve added, use:


    ```

    git commit -m "Initial commit"

    ```


    Replace “Initial commit” with a brief description of the changes you’ve made.


    # 6. Create a Remote Repository on GitHub


    To push your local repository to GitHub:


