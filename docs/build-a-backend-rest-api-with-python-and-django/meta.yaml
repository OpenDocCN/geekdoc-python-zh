    一旦定义，这个模型就为 Django 提供了创建相应数据库表所需的所有信息。\n\n### 迁移：在数据库中反映模型更改\n\nDjango 内置了一个迁移框架，用于跟踪模型随时间的变化。当你创建或更新模型时，Django\
