    \ Django 管理后台中创建。\n\n## 简介\n\n一旦你设置了登录 API，就必须确保它按预期运行。测试是任何开发过程中的关键阶段，它确保了系统的正确性和可靠性。在本章中，我们将使用一个强大的\
    \ API 测试工具 Postman 来测试我们的登录 API。\n\n## 设置 Postman\n\n1.  安装：如果你还没有安装，请从提供的链接下载并安装\
    \ Postman。\n2.  启动和初始设置：\n    - 安装后启动 Postman。\n    - 如果你是首次用户，除非你想将集合保存到云端，否则可以跳过初始注册。\n\
    3.  设置新请求：\n    - 点击 ‘+’ 标签页以创建一个新请求。\n    - 从 URL 输入字段旁边的下拉菜单中，选择 ‘POST’，因为我们的登录\
    \ API 通常使用 POST 方法。\n    - 在 URL 字段中输入你的登录 API 端点（例如，`http://127.0.0.1:8000/api/login/`）。\n\
    \n## 测试登录 API\n\n1.  添加请求头：\n    - 在 Postman 中，在 ‘Headers’ 标签下，你需要添加一个键值对：\n \
    \       - 键：`Content-Type`\n        - 值：`application/json`\n    这告诉服务器你正在发送 JSON\
    \ 数据。\n2.  输入请求体数据：\n    - 切换到 Postman 的 ‘Body’ 标签。\n    - 选择 ‘raw’ 选项，并确保从下拉菜单中选择了\
    \ ‘JSON’。\n    - 输入一组有效的凭据。例如：\n        ```json\n        {\n          \"username\"\
    : \"sampleuser\",\n          \"password\": \"samplepassword123\"\n        }\n\
    \        ```\n3.  发送请求：\n    - 点击蓝色的 ‘Send’ 按钮。\n    - 观察响应。如果你的 API 和服务器运行正常，你应该会收到一个令牌作为响应的一部分。此令牌代表一次成功的登录，并可用于后续的经过身份验证的请求。\n\
    4.  负面测试：\n    - 测试不仅仅是关于正面场景（一切正常）。你需要测试当事情出错时会发生什么。\n    - 尝试输入错误的密码或用户名。预期的响应应该是一个错误，表明凭据无效。\n\
    \    - 输入不完整的数据，例如省略密码或用户名。API 应该返回一个错误，指出缺少字段。\n\n## 5. 测试令牌过期（可选）：\n\n- 根据你在\
    \ Django Rest Framework 中的设置，令牌可能有有效期。如果你设置了令牌过期，请等待该时间段，然后尝试使用过期的令牌访问一个需要身份验证的端点。你应该会收到一个\
    \ ‘invalid token’ 或 ‘token expired’ 的响应。\n\n## 结论\n\n测试是一个持续且不断进行的过程。即使在部署 API\
    \ 之后，你也应该定期进行测试，尤其是在进行更改或更新之后。使用像 Postman 这样的工具可以显著简化和精简流程，确保你的登录 API 强健、安全且可靠。\n\
    \n在下一章中，我们将探讨如何在 ModHeader 扩展中设置成功登录后收到的令牌，以便在进一步的测试和开发过程中轻松访问需要身份验证的路由。\n\n>\
    \ 注意：本章重点介绍使用 Postman 进行手动测试。在实际场景中，特别是对于较大的应用程序，你还应该为你的 API 实现自动化测试，以确保稳定性和一致性。\n\
    \n## 使用 ModHeader 扩展设置令牌头\n\n**本章的资产、资源和材料：**\n\n- ModHeader 扩展：这是一个浏览器扩展，允许你操作浏览器请求头。它适用于\
    \ Google Chrome 和 Mozilla Firefox。\n- 你的 API：确保你的 Django REST API 正在运行，特别是我们在前面章节中开发的登录\
    \ API 端点。\n\n## 简介\n\n通过我们的登录 API 端点成功登录后，通常会返回一个令牌以对未来的请求进行身份验证。此令牌向服务器保证请求来自合法的、经过身份验证的用户。为了在每个请求中发送此令牌，我们需要将其包含在请求头中。在开发和测试期间，一种流行且简单的方法是使用\
    \ ModHeader 浏览器扩展。\n\n在本章中，我们将介绍如何使用 ModHeader 扩展来设置令牌头，确保我们的 API 请求经过身份验证。\n\n\
    ## 1. 安装 ModHeader\n\n如果你还没有安装 ModHeader：\n\n1.  打开你的浏览器。\n2.  访问相应的商店：\n    -\
    \ Chrome 用户：访问 [Chrome 网上应用店](https://chrome.google.com/webstore/)\n    - Firefox\
