- md: "## 4. Update Django Settings:\n\nNow that our custom user model is set up,\
    \ we need to inform Django to use it as the default user model. In your project's\
    \ settings.py file, add or update the following line:\n\n```python\nAUTH_USER_MODEL\
    \ = 'your_app_name.CustomUser'\n```\n\nReplace `your_app_name` with the name of\
    \ the app where your CustomUser model resides.\n\n## 5. Migrations:\n\nSince we've\
    \ made changes to our model, we need to create migrations and apply them. This\
    \ can be done with:\n\n```bash\npython manage.py makemigrations\npython manage.py\
    \ migrate\n```\n\n## 6. Testing:\n\nIt's essential to test our custom user model\
    \ to ensure everything works as expected. You can do this by creating a new user\
    \ through the Django admin site or using Django's shell. If everything's set up\
    \ correctly, there shouldn't be any errors, and the user data should get saved\
    \ in the database.\n\n## Conclusion:\n\nCustomizing the user model in Django allows\
    \ developers to tailor the authentication system according to the needs of the\
    \ application. By setting our custom user model, we have more control over user\
    \ data, how it's stored, and the fields it should contain.\n\n## Create migrations\
    \ and sync DB\n\nAssets, Resources, and Materials needed:\n\n- Python (To run\
    \ Django commands) _(Already installed in previous chapters)_\n- Django project\
    \ setup _(Covered in previous chapters)_\n- Terminal or Command Prompt\n- Code\
    \ Editor (like Atom) _(Used in previous chapters)_\n\n## 1. Introduction\n\nDjango’s\
    \ database-abstraction API allows you to create, retrieve, update, and delete\
    \ records without writing a single line of SQL. This is possible due to its Object-Relational\
    \ Mapping (ORM) layer. One of the most powerful parts of Django is its ORM, and\
    \ migrations play a key role in it. Migrations are Django’s way of propagating\
    \ changes you make to your models (adding a field, deleting a model, etc.) into\
    \ your database schema.\n\n## 2. Why Migrations?\n\nWhen we define or modify our\
    \ model classes in Django, the actual database tables aren’t immediately affected.\
    \ Instead, Django tracks the changes and allows us to apply them in a systematic\
    \ way using migrations. Migrations solve the problem of evolving a database schema\
    \ without manual intervention.\n\n## 3. The `makemigrations` Command\n\nBefore\
    \ we can apply migrations, we need to create them. After making changes to a Django\
    \ model:\n\n1. Open your terminal or command prompt.\n2. Navigate to the root\
    \ directory of your Django project.\n3. Enter the following command:\n\n```bash\n\
    python manage.py makemigrations\n```\n\nThis will check your model definitions\
    \ against the current state of your database and generate migration files – scripts\
    \ that, when run, will modify your database schema to reflect the changes you’ve\
    \ made to your models.\n\nYou should see an output similar to:\n\n```\nMigrations\
    \ for 'app_name':\n    app_name/migrations/0002_auto_YYYYMMDD_HHMM.py\n      \
    \  - Create model YourModelName\n```\n\n## 4. Checking SQL Code for Migrations\n\
    \nIf you want to see the SQL code that Django has generated for a particular migration,\
    \ you can use the following command:\n\n```bash\npython manage.py sqlmigrate app_name\
    \ 0002_auto_YYYYMMDD_HHMM\n```\n\nReplace `app_name` with the name of your app\
    \ and `0002_auto_YYYYMMDD_HHMM` with the name of the migration file you want to\
    \ inspect. This will display the SQL statements that will be run when this migration\
    \ is applied.\n\n## 5. Applying Migrations\n\nTo apply the migrations and sync\
    \ your database, use the following command:\n\n```bash\npython manage.py migrate\n\
    ```\n\nThis command looks at the `INSTALLED_APPS` setting, finds migrations that\
    \ haven't been applied yet, and runs them against your database in the correct\
    \ order. You should see output indicating which migrations are being applied and\
    \ if they were successful.\n\n## 6. Rolling Back Migrations\n\nIn case you made\
    \ a mistake or want to revert to a previous database state, Django allows you\
    \ to “unapply” migrations. To roll back a migration:\n\n```bash\npython manage.py\
    \ migrate app_name 0001_initial\n```\n\nThis will unapply all migrations for `app_name`\
    \ after `0001_initial`.\n\n## 7. Common Issues and Tips\n\n- No changes detected:\
    \ If you run `makemigrations` and see “No changes detected”, double-check that\
    \ you’ve saved your models.py file and that the model’s app is included in the\
    \ `INSTALLED_APPS` setting.\n- Dependencies: Migrations can have dependencies\
    \ on other migrations or even other apps. Django is usually smart about figuring\
    \ out the correct order, but sometimes you might need to give it hints.\n- Conflicting\
    \ migrations: If you’re working in a team and multiple developers are making changes\
    \ to the same models, you might encounter “conflicting migrations”. You’ll need\
    \ to coordinate with your team to resolve these manually.\n\n## 8. Summary\n\n\
    In this chapter, we delved into the world of Django’s database migrations. Migrations\
    \ allow us to evolve our database schema in a controlled and systematic manner.\
    \ By using the commands `makemigrations` and `migrate`, we can efficiently handle\
    \ changes to our models and keep our database in sync. Remember to always test\
    \ migrations in a development environment before applying them in production to\
