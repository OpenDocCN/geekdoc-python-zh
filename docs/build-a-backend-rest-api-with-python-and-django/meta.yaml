    \n```python\nfrom django.contrib import admin\nfrom .models import Item\nadmin.site.register(Item)\n\
    ```\n\n现在，当你登录 Django admin 界面时，你将能够查看、添加、编辑和删除动态项。\n\n## 结论\n\n随着 `Item` 模型的添加，我们处理用户动态的后端结构正在成型。随着你的进展，你将把这个模型与序列化器和视图集集成，以创建一个功能齐全的动态项\
