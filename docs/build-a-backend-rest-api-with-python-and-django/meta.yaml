    *.log

    *.cache

    __pycache__/

    ```


    7.3 Adding a License: This step is optional, but if you want others to use your
    code, it’s essential. You can choose a license from [Choose a License](https://choosealicense.com/)
    and add it to your project.


    Once you’ve added these files, remember to stage, commit, and push them to GitHub.


