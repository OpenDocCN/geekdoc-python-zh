  md: "```\nMigrations for 'app_name':\n    app_name/migrations/0002_auto_YYYYMMDD_HHMM.py\n\
    \        - Create model YourModelName\n```\n\n# 4. Checking SQL Code for Migrations\n\
    \nIf you want to see the SQL code that Django has generated for a particular migration,\
    \ you can use the following command:\n\n```\nbash\npython manage.py sqlmigrate\
    \ app_name 0002_auto_YYYYMMDD_HHMM\n```\n\nReplace `app_name` with the name of\
    \ your app and `0002_auto_YYYYMMDD_HHMM` with the name of the migration file you\
    \ want to inspect. This will display the SQL statements that will be run when\
    \ this migration is applied.\n\n# 5. Applying Migrations\n\nTo apply the migrations\
    \ and sync your database, use the following command:\n\n```\nbash\npython manage.py\
    \ migrate\n```\n\nThis command looks at the `INSTALLED_APPS` setting, finds migrations\
    \ that haven't been applied yet, and runs them against your database in the correct\
    \ order.\nYou should see output indicating which migrations are being applied\
    \ and if they were successful."
