    # Create EC2 server instance


    Assets, Resources, and Materials:


    +   1. AWS Account: An account on Amazon Web Services. If you don''t have one,
    you can sign up [here](https://aws.amazon.com/). This will allow you to access
    the EC2 service and create server instances.

    2. Key Pair: This was created and discussed in Chapter 65. It''s used for secure
    SSH access to your EC2 instance.

    3. SSH Client: Software to securely connect to your EC2 server instance. Popular
    choices include `PuTTY` for Windows or the built-in `ssh` command for macOS and
    Linux.


    Introduction:


    In this chapter, we''ll guide you through creating an EC2 (Elastic Compute Cloud)
    server instance on AWS. Amazon EC2 offers scalable compute capacity in the cloud,
    making web-scale computing easier for developers. This will be the remote server
    where we''ll deploy our Django REST API.


    Step-by-Step Guide to Creating an EC2 server instance:


    +   1. Sign in to the AWS Management Console:

    Log in to your AWS account. If you''re new to AWS, you''ll need to sign up and
    provide billing details. Don''t worry; AWS offers a free tier for EC2, which allows
    you to explore the service without incurring costs.

    2. Navigate to EC2:

    From the AWS Management Console, click on `Services` and then select `EC2` under
    the `Compute` category.

    3. Launch a New Instance:

    Click the `Launch Instance` button to start the process.'
