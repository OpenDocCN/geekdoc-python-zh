    # Section 13:


    # Deploying our API to a server on AWS


    # Introduction to deploying our app to AWS


    Assets, Resources, and Materials for this Chapter:


    +   1. AWS Account: You will need an AWS account. If you don’t have one, sign
    up at [Amazon Web Services](https://aws.amazon.com/) (Use: To access and utilize
    AWS services).'
  - '[PAGE 212]


    +   2. AWS EC2 Documentation: [Official Documentation](https://docs.aws.amazon.com/ec2/index.html)
    (Use: As a reference guide and for deep diving into specific functionalities).

    3. AWS CLI: [Installation Guide](https://docs.aws.amazon.com/cli/latest/userguide/install-cliv2.html)
    (Use: To manage AWS services from the command line).

    4. SSH Client: Depending on your OS, you may already have one installed. If not,
    you can use tools like PuTTY for Windows or the built-in Terminal for macOS and
    Linux (Use: To connect to AWS EC2 instances).


    # 1. Introduction


    Deploying an application to the cloud can initially seem like a daunting task,
    especially if you’re unfamiliar with cloud concepts or specific cloud providers
    like AWS. However, AWS has made deploying applications relatively straightforward,
    and this chapter aims to introduce you to the fundamental concepts and steps you’ll
    take to deploy your Django REST API to an AWS server.


    By the end of this chapter, you’ll have a clear understanding of:


    +   1. Why we choose AWS for deployment.

    2. The primary AWS service we’ll be using: Amazon EC2 (Elastic Compute Cloud).

    3. Key concepts related to AWS EC2.


    # 2. Why Choose AWS?


    There are numerous cloud providers available today, including Google Cloud Platform
    (GCP), Microsoft Azure, and others. So, why would one opt for AWS?


    +   1. Maturity and Coverage: AWS, launched in 2006, is one of the earliest and
    most mature cloud platforms. It'
  - '[PAGE 213]


    offers a wide range of services and tools that cater to nearly every need.


    +   2. Scalability: AWS’s services, especially EC2, are built to scale. Whether
    you’re serving ten users or ten million, AWS can handle it.

    3. Security: AWS provides various tools and best practices to ensure that applications
    and data are secure.

    4. Cost-effective: With AWS’s pay-as-you-go pricing model, you only pay for the
    resources you use.


    # 3. Introduction to Amazon EC2 (Elastic Compute Cloud)


    Amazon EC2 is a web service that provides resizable compute capacity in the cloud.
    In simpler terms, it allows you to run virtual servers and scale computing capacity
    based on your requirements.


    Key Concepts Related to AWS EC2:


    +   1. Instances: Virtual servers in the Amazon EC2 environment.

    2. Amazon Machine Images (AMI): Pre-configured packages required to launch an
    instance. This includes the OS, server, application server, and applications.

    3. Instance Types: Define the hardware of the host computer used for the instance.
    It affects aspects like memory, CPU, storage, etc.

    4. Security Groups: Act as virtual firewalls controlling the traffic for one or
    more instances.

    5. Key Pairs: Secure login information for instances. It comprises a public key
    that AWS stores and a private key file you store.


    # 4. Preparing for Deployment


    Before we delve into the deployment process in the subsequent chapters, it’s essential
    to get acquainted'
  - '[PAGE 214]


    with a few prerequisites:


    +   1. Understand your Application: Know the requirements of your application.
    Does it need a specific OS? What are the hardware requirements?

    2. Choose the Right EC2 Instance: AWS offers various instance types tailored for
    different needs. Based on your application’s requirements, select an appropriate
    one.

    3. Security: Make sure to understand AWS’s security best practices. Misconfigurations
    can expose your application to unnecessary risks.


    # 5. Conclusion


    AWS provides a robust platform for deploying web applications like our Django
    REST API. In this chapter, we’ve introduced the reasons to choose AWS and given
    an overview of the EC2 service, which we’ll be using to deploy our app.


    In the upcoming chapters, we’ll delve deeper into the specifics of setting up
    our application on AWS, securing it, and ensuring that it runs smoothly to serve
    our users.


    > *Note to Readers* : AWS and its services evolve over time, with new features
    added regularly. It’s a good practice to refer to AWS’s official documentation
    for the most current and in-depth information.


    # Add key pair to AWS


    Assets, Resources, and Materials for this Chapter:


    +   - AWS Management Console (Acquire by signing up on the AWS official website)

    - Computer with SSH client (Inbuilt in macOS and Linux. For Windows, use software
    like PuTTY)'
  - '[PAGE 215]


    # Introduction:


    Before we can deploy our Django REST API to AWS, one of the essential steps is
    setting up a Key Pair. AWS uses public-key cryptography to encrypt and decrypt
    login information. A Key Pair consists of a public key, which AWS uses to encrypt
    data, and a private key, which you use to decrypt it. In simpler terms, think
    of it as a unique digital key that lets you access your server securely.


    This chapter will guide you through creating and downloading a Key Pair on AWS,
    which you’ll later use to SSH into your server instance.


    # 1. Sign in to the AWS Management Console


    Start by navigating to the AWS Management Console. If you don’t have an account,
    you’ll need to sign up. Once logged in, select the region in the top right corner
    where you want to deploy your services.


    # 2. Navigate to the EC2 Dashboard


    From the AWS Management Console, find the EC2 service either by typing “EC2” into
    the search bar or locating it in the “Recently visited services” section.


    # 3. Accessing the Key Pair Section


    On the EC2 Dashboard, find the “Key Pairs” option under the “Network & Security”
    section in the sidebar.


    # 4. Create a New Key Pair


    +   - Click on the “Create key pair” button.

    - Provide a name for your key pair, e.g., “MyDjangoRESTAPIKey”.

    - From the “File format” dropdown, select the appropriate file format based on
    your OS:'
  - '[PAGE 216]


    +   - `.pem` for Linux and macOS

    - `.ppk` for Windows (if you''re using PuTTY)

    - Click on the “Create key pair” button.


    # 5. Download and Secure the Private Key


    Once you’ve clicked on “Create key pair”, the private key file will automatically
    download to your computer. This private key is essential to access your server,
    so treat it with utmost care.


    +   - Never share your private key.

    - Move it to a secure location on your computer.

    - If you’re on macOS or Linux, you might also need to set the right permissions
    for the key using the command:


    ```

    bash

    chmod 400 path_to_your_key.pem

    ```


    # 6. What if you lose the Private Key?


    It’s important to understand that if you lose access to your private key, AWS
    cannot help you retrieve it. In such cases, you’d need to create a new key pair
    and associate it with your EC2 instance or launch a new instance using the new
    key pair.


    # Conclusion:


    You have now successfully created and downloaded your Key Pair from AWS. This
    Key Pair will play a pivotal role when we move on to creating our EC2 server instance
    and connecting to it securely. In the subsequent chapters, we’ll dive deeper into
    setting up our server on AWS, using the Key Pair we’ve just generated. Remember,
    always keep your private key confidential to ensure the security of your server.'
- md: "## Create EC2 server instance\n\nAssets, Resources, and Materials:\n\n- 1.\
    \ AWS Account: An account on Amazon Web Services. If you don't have one, you can\
    \ sign up [here](https://aws.amazon.com/). This will allow you to access the EC2\
    \ service and create server instances.\n- 2. Key Pair: This was created and discussed\
    \ in Chapter 65. It's used for secure SSH access to your EC2 instance.\n- 3. SSH\
    \ Client: Software to securely connect to your EC2 server instance. Popular choices\
    \ include `PuTTY` for Windows or the built-in `ssh` command for macOS and Linux.\n\
    \nIntroduction:\n\nIn this chapter, we'll guide you through creating an EC2 (Elastic\
    \ Compute Cloud) server instance on AWS. Amazon EC2 offers scalable compute capacity\
    \ in the cloud, making web-scale computing easier for developers. This will be\
    \ the remote server where we'll deploy our Django REST API.\n\nStep-by-Step Guide\
    \ to Creating an EC2 server instance:\n\n- 1. Sign in to the AWS Management Console:\n\
    Log in to your AWS account. If you're new to AWS, you'll need to sign up and provide\
    \ billing details. Don't worry; AWS offers a free tier for EC2, which allows you\
    \ to explore the service without incurring costs.\n- 2. Navigate to EC2:\nFrom\
    \ the AWS Management Console, click on `Services` and then select `EC2` under\
    \ the `Compute` category.\n- 3. Launch a New Instance:\nClick the `Launch Instance`\
    \ button to start the process.\n- 4. Choose an Amazon Machine Image (AMI):\nAMIs\
    \ are pre-configured templates for instances. For our purpose, select the `Ubuntu\
    \ Server` as it’s a popular and well-supported choice. Ensure you pick the latest\
    \ stable version.\n- 5. Choose an Instance Type:\nFor the purpose of this tutorial,\
    \ you can choose the `t2.micro` instance type, which is eligible for the AWS free\
    \ tier. It’s suitable for development and testing purposes. Later, based on your\
    \ production needs, you can choose a more powerful instance.\n- 6. Configure Instance:\n\
    \    - Number of instances: 1 (since we are setting up just one server)\n    -\
    \ Network: Default VPC (Virtual Private Cloud)\n    - Subnet: Choose the default\
    \ for now. A subnet represents a range within your VPC’s IP address block.\n \
    \   - Ensure `Auto-assign Public IP` is set to `Enable`. This gives your instance\
    \ a public IP address, which you can use to access it from the internet.\n- 7.\
    \ Add Storage:\nThe default storage (root volume) is 8GB on General Purpose SSD.\
    \ This should be sufficient for our tutorial. However, make sure to adjust this\
    \ based on the needs of your application in a real-world scenario.\n- 8. Add Tags:\n\
    Tags can be useful for billing and organization. As an example:\n    - Key: `Name`\n\
    \    - Value: `DjangoRESTAPI-Server`\n- 9. Configure Security Group:\nA security\
    \ group acts as a firewall that controls the inbound and outbound traffic to the\
    \ instance. For our purpose:\n    - Create a new security group.\n    - Name it\
    \ something descriptive, e.g., `DjangoRESTAPISG`.\n    - Add rules:\n        -\
    \ `SSH`: Allows secure access to your server.\n        - `HTTP`: Allows HTTP traffic.\n\
    \        - `HTTPS`: Allows HTTPS traffic.\n    - For the source, select `Anywhere`.\
    \ This allows connections from any IP. (In a production scenario, you'd limit\
    \ this to known IPs for security reasons.)\n- 10. Review and Launch:\nReview your\
    \ settings. When satisfied, click on the `Launch` button. A prompt will appear\
    \ asking for a key pair. Use the key pair you created in Chapter 65. This will\
    \ allow you to securely SSH into your server.\n- 11. Wait for Initialization:\n\
    After launching, it takes a few minutes for the EC2 instance to initialize. Once\
    \ the instance state turns “running”, you can connect to it using its Public IP.\n\
    \nConclusion:\nCongratulations! You’ve successfully created an EC2 server instance\
    \ on AWS. In the next chapters, we’ll guide you through deploying our Django REST\
    \ API onto this server, making it accessible from anywhere in the world. Remember\
    \ to keep your key pair secure, as it’s your gateway to accessing your server.\n\
    \n## Add deployment script and configs to our project\n\nAssets, Resources, and\
    \ Materials:\n\n- Amazon EC2 (Elastic Compute Cloud): This is a web service that\
    \ provides scalable compute capacity in the cloud. You can sign up for an AWS\
    \ account [here](https://aws.amazon.com/) if you don’t have one.\n- Deployment\
    \ script: A set of instructions in a file to automatically deploy our project\
    \ to a server.\n- `requirements.txt`: Lists all the Python dependencies required\
    \ for our project.\n- SSH (Secure Shell): A cryptographic network protocol for\
    \ securely starting a session on a remote server. Tools like [PuTTY](https://www.putty.org/)\
    \ for Windows or the built-in SSH client for macOS and Linux can be used.\n- `gunicorn`:\
    \ A Python WSGI HTTP server for UNIX. This will be our application server for\
    \ Django in production.\n- AWS CLI (Command Line Interface): A tool provided by\
    \ AWS to manage AWS services. You can download it [here](https://aws.amazon.com/cli/).\n\
    - Virtualenv: A tool to create isolated Python environments.\n- Configuration\
    \ files: Essential for setting environment-specific configurations, secrets, and\
    \ variables.\n\n### 1. Introduction:\n\nDeployment is the stage where our local\
    \ development work gets presented to the world. As we’re deploying on AWS EC2,\
    \ we need to automate the process to ensure consistent and rapid deployments.\n\
    \n### 2. Setting Up the Environment:\n\nBefore we move on to writing our deployment\
    \ script, let’s ensure our environment is ready:\n*Make sure AWS CLI is installed.*\n\
    You can install it with:\n\n```\npip install awscli\n```\n\nEnsure you've set\
    \ up AWS CLI with the credentials. Run:\n\n```\naws configure\n```\n\nYou'll be\
    \ prompted to input your AWS Access Key, Secret Key, region, and default output\
    \ format.\n\n### 3. Create `requirements.txt`:\nOur EC2 instance needs to know\
    \ which Python packages to install. Inside your project directory, run:\n\n```\n\
    pip freeze > requirements.txt\n```\n\nThis creates a file with all your Python\
    \ dependencies.\n\n### 4. Writing the Deployment Script:\nLet's create a script\
    \ named `deploy.sh`. This script will handle the deployment process for us.\n\n\
    ```bash\n#!/bin/bash\n# Navigate to our project directory\ncd /path/to/your/django/project\n\
    # Activate our virtual environment\nsource venv/bin/activate\n# Install necessary\
    \ Python packages\npip install -r requirements.txt\n# Collect static files\npython\
    \ manage.py collectstatic --noinput\n# Finally, run our application using gunicorn\n\
    gunicorn your_project_name.wsgi:application --bind 0.0.0.0:8000\n```\n\nDon't\
    \ forget to make this script executable:\n\n```\nchmod +x deploy.sh\n```\n\n###\
    \ 5. Configuration Files:\n\nWhile deploying, we need different configurations\
    \ compared to the development environment. This is where configuration files come\
    \ into play.\n\nCreate a `prod_settings.py` in your Django project's settings\
    \ directory. This file will contain production-specific configurations. For instance,\
    \ `DEBUG` should be set to `False`.\n\nEnsure you have secret keys and database\
    \ configurations hidden, possibly using environment variables or secret management\
    \ tools provided by AWS like AWS Secrets Manager.\n\n### 6. Uploading Our Script\
    \ and Configs to AWS:\n\nNow, we will upload our deployment script and configurations\
    \ to our EC2 instance. Make sure you've already set up your EC2 instance and have\
    \ your `.pem` key file ready.\n\nUsing SSH:\n\n```\nscp -i path_to_your_key.pem\
    \ deploy.sh ubuntu@your_ec2_ip:/path/on/server\nscp -i path_to_your_key.pem requirements.txt\
    \ ubuntu@your_ec2_ip:/path/on/server\nscp -i path_to_your_key.pem -r your_django_project\
    \ ubuntu@your_ec2_ip:/path/on/server\n```\n\n### 7. Conclusion:\n\nBy now, you\
    \ should have your deployment script and configurations set up on your EC2 instance.\
    \ In the next chapter, we’ll see how to execute this script and get our Django\
    \ project live!\n\n## Deploy to server\n\nAssets, Resources, and Materials:\n\n\
    - AWS EC2 Instance: This is the virtual server where we’ll deploy our Django project.\
    \ You can create and manage your EC2 instances through the AWS Management Console.\
    \ (Acquisition: Sign up or log in to your AWS account and navigate to the EC2\
    \ dashboard).\n- Git: We’ll use Git for version control. (Acquisition: Install\
    \ from [git-scm.com](https://git-scm.com/)).\n- Virtual Environment: We’ll need\
    \ our Python virtual environment to manage our project’s dependencies. (Acquisition:\
    \ Use `pip install virtualenv`).\n- Requirements.txt: A file containing a list\
    \ of all the dependencies our project needs. This will be created using `pip freeze\
    \ > requirements.txt` in our project directory.\n- SSH Key Pair: Secure keys for\
    \ connecting to your EC2 instance. This is generated from AWS when you create\
    \ an EC2 instance."
  mdcn: "## 创建 EC2 服务器实例\n\n资产、资源和材料：\n\n- 1. AWS 账户：亚马逊网络服务上的一个账户。如果您还没有，可以[在此](https://aws.amazon.com/)注册。这将允许您访问\
    \ EC2 服务并创建服务器实例。\n- 2. 密钥对：这在第 65 章中创建并讨论过。它用于安全地通过 SSH 访问您的 EC2 实例。\n- 3. SSH\
    \ 客户端：用于安全连接到您的 EC2 服务器实例的软件。流行的选择包括 Windows 上的 `PuTTY` 或 macOS 和 Linux 内置的 `ssh`\
    \ 命令。\n\n简介：\n\n在本章中，我们将指导您在 AWS 上创建一个 EC2（弹性计算云）服务器实例。Amazon EC2 在云中提供可扩展的计算能力，使开发者更容易进行网络规模的计算。这将是我们部署\
    \ Django REST API 的远程服务器。\n\n创建 EC2 服务器实例的分步指南：\n\n- 1. 登录 AWS 管理控制台：\n登录您的 AWS\
    \ 账户。如果您是 AWS 新用户，需要注册并提供账单详情。别担心；AWS 为 EC2 提供免费套餐，允许您在不产生费用的情况下探索该服务。\n- 2. 导航到\
    \ EC2：\n从 AWS 管理控制台，点击 `Services`，然后在 `Compute` 类别下选择 `EC2`。\n- 3. 启动新实例：\n点击\
    \ `Launch Instance` 按钮开始流程。\n- 4. 选择 Amazon 机器映像 (AMI)：\nAMI 是实例的预配置模板。出于我们的目的，选择\
    \ `Ubuntu Server`，因为它是一个流行且支持良好的选择。确保选择最新的稳定版本。\n- 5. 选择实例类型：\n出于本教程的目的，您可以选择\
    \ `t2.micro` 实例类型，它符合 AWS 免费套餐的条件。它适合开发和测试目的。稍后，根据您的生产需求，您可以选择更强大的实例。\n- 6. 配置实例：\n\
    \    - 实例数量：1（因为我们只设置一个服务器）\n    - 网络：默认 VPC（虚拟私有云）\n    - 子网：目前选择默认值。子网代表您 VPC\
    \ 的 IP 地址块内的一个范围。\n    - 确保 `Auto-assign Public IP` 设置为 `Enable`。这会给您的实例一个公共 IP\
    \ 地址，您可以使用它从互联网访问实例。\n- 7. 添加存储：\n默认存储（根卷）是通用 SSD 上的 8GB。对于我们的教程来说应该足够了。但是，在实际场景中，请确保根据应用程序的需求进行调整。\n\
    - 8. 添加标签：\n标签对于计费和组织很有用。例如：\n    - 键：`Name`\n    - 值：`DjangoRESTAPI-Server`\n\
    - 9. 配置安全组：\n安全组充当防火墙，控制进出实例的流量。出于我们的目的：\n    - 创建一个新的安全组。\n    - 给它起一个描述性的名称，例如\
    \ `DjangoRESTAPISG`。\n    - 添加规则：\n        - `SSH`：允许安全访问您的服务器。\n        - `HTTP`：允许\
    \ HTTP 流量。\n        - `HTTPS`：允许 HTTPS 流量。\n    - 对于源，选择 `Anywhere`。这允许来自任何 IP\
    \ 的连接。（在生产场景中，出于安全原因，您会将其限制为已知 IP。）\n- 10. 审查并启动：\n审查您的设置。满意后，点击 `Launch` 按钮。将出现一个提示，要求提供密钥对。使用您在第\
    \ 65 章创建的密钥对。这将允许您安全地通过 SSH 连接到您的服务器。\n- 11. 等待初始化：\n启动后，EC2 实例需要几分钟来初始化。一旦实例状态变为“running”，您就可以使用其公共\
    \ IP 连接到它。\n\n结论：\n恭喜！您已成功在 AWS 上创建了一个 EC2 服务器实例。在接下来的章节中，我们将指导您将 Django REST\
    \ API 部署到此服务器上，使其可以从世界任何地方访问。请记住保管好您的密钥对，因为它是您访问服务器的门户。\n\n## 向我们的项目添加部署脚本和配置\n\
    \n资产、资源和材料：\n\n- Amazon EC2（弹性计算云）：这是一项在云中提供可扩展计算能力的网络服务。如果您还没有，可以[在此](https://aws.amazon.com/)注册\
    \ AWS 账户。\n- 部署脚本：文件中的一组指令，用于自动将我们的项目部署到服务器。\n- `requirements.txt`：列出我们项目所需的所有\
    \ Python 依赖项。\n- SSH（安全外壳）：一种加密网络协议，用于在远程服务器上安全地启动会话。可以使用 Windows 上的 [PuTTY](https://www.putty.org/)\
    \ 等工具或 macOS 和 Linux 内置的 SSH 客户端。\n- `gunicorn`：用于 UNIX 的 Python WSGI HTTP 服务器。这将是我们生产环境中\
    \ Django 的应用服务器。\n- AWS CLI（命令行界面）：AWS 提供的用于管理 AWS 服务的工具。您可以[在此](https://aws.amazon.com/cli/)下载。\n\
    - Virtualenv：用于创建隔离 Python 环境的工具。\n- 配置文件：对于设置特定于环境的配置、密钥和变量至关重要。\n\n### 1. 简介：\n\
    \n部署是将我们本地开发工作呈现给世界的阶段。由于我们将在 AWS EC2 上部署，我们需要自动化该过程以确保一致且快速的部署。\n\n### 2. 设置环境：\n\
    \n在开始编写部署脚本之前，让我们确保环境已准备就绪：\n*确保已安装 AWS CLI。*\n您可以通过以下方式安装：\n\n```\npip install\
    \ awscli\n```\n\n确保您已使用凭据设置 AWS CLI。运行：\n\n```\naws configure\n```\n\n系统将提示您输入\
    \ AWS 访问密钥、秘密密钥、区域和默认输出格式。\n\n### 3. 创建 `requirements.txt`：\n我们的 EC2 实例需要知道要安装哪些\
    \ Python 包。在您的项目目录内，运行：\n\n```\npip freeze > requirements.txt\n```\n\n这将创建一个包含所有\
    \ Python 依赖项的文件。\n\n### 4. 编写部署脚本：\n让我们创建一个名为 `deploy.sh` 的脚本。此脚本将为我们处理部署过程。\n\
    \n```bash\n#!/bin/bash\n# 导航到我们的项目目录\ncd /path/to/your/django/project\n# 激活我们的虚拟环境\n\
    source venv/bin/activate\n# 安装必要的 Python 包\npip install -r requirements.txt\n\
    # 收集静态文件\npython manage.py collectstatic --noinput\n# 最后，使用 gunicorn 运行我们的应用程序\n\
    gunicorn your_project_name.wsgi:application --bind 0.0.0.0:8000\n```\n\n别忘了使此脚本可执行：\n\
    \n```\nchmod +x deploy.sh\n```\n\n### 5. 配置文件：\n\n部署时，我们需要与开发环境不同的配置。这就是配置文件发挥作用的地方。\n\
    \n在您的 Django 项目的设置目录中创建一个 `prod_settings.py`。此文件将包含特定于生产的配置。例如，`DEBUG` 应设置为 `False`。\n\
    \n确保您已隐藏密钥和数据库配置，可以使用环境变量或 AWS 提供的密钥管理工具（如 AWS Secrets Manager）。\n\n### 6. 将脚本和配置上传到\
    \ AWS：\n\n现在，我们将部署脚本和配置上传到 EC2 实例。确保您已设置好 EC2 实例并准备好 `.pem` 密钥文件。\n\n使用 SSH：\n\
    \n```\nscp -i path_to_your_key.pem deploy.sh ubuntu@your_ec2_ip:/path/on/server\n\
    scp -i path_to_your_key.pem requirements.txt ubuntu@your_ec2_ip:/path/on/server\n\
    scp -i path_to_your_key.pem -r your_django_project ubuntu@your_ec2_ip:/path/on/server\n\
    ```\n\n### 7. 结论：\n\n至此，您应该已在 EC2 实例上设置好部署脚本和配置。在下一章中，我们将看到如何执行此脚本并让我们的 Django\
    \ 项目上线！\n\n## 部署到服务器\n\n资产、资源和材料：\n\n- AWS EC2 实例：这是我们部署 Django 项目的虚拟服务器。您可以通过\
    \ AWS 管理控制台创建和管理 EC2 实例。（获取方式：注册或登录您的 AWS 账户并导航到 EC2 仪表板）。\n- Git：我们将使用 Git 进行版本控制。（获取方式：从\
    \ [git-scm.com](https://git-scm.com/) 安装）。\n- 虚拟环境：我们需要 Python 虚拟环境来管理项目的依赖项。（获取方式：使用\
    \ `pip install virtualenv`）。\n- Requirements.txt：包含项目所需所有依赖项列表的文件。这将在我们的项目目录中使用\
    \ `pip freeze > requirements.txt` 创建。\n- SSH 密钥对：用于连接 EC2 实例的安全密钥。这是在创建 EC2 实例时从\
    \ AWS 生成的。"
