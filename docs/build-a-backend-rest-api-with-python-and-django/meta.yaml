    \n在本章结束时，你将清楚地了解：\n\n1. 为什么我们选择 AWS 进行部署。\n2. 我们将使用的主要 AWS 服务：Amazon EC2（弹性计算云）。\n\
    3. 与 AWS EC2 相关的关键概念。\n\n## 2. 为什么选择 AWS？\n\n当今有许多云提供商可用，包括 Google Cloud Platform\
    \ (GCP)、Microsoft Azure 等。那么，为什么有人会选择 AWS 呢？\n\n1. 成熟度和覆盖范围：AWS 于 2006 年推出，是最早且最成熟的云平台之一。它提供广泛的服务和工具，几乎满足所有需求。\n\
    2. 可扩展性：AWS 的服务，尤其是 EC2，是为扩展而构建的。无论你是服务十个用户还是一千万用户，AWS 都能处理。\n3. 安全性：AWS 提供各种工具和最佳实践，以确保应用程序和数据的安全。\n\
    4. 成本效益：通过 AWS 的按需付费定价模型，你只需为使用的资源付费。\n\n## 3. Amazon EC2（弹性计算云）简介\n\nAmazon EC2\
    \ 是一项在云中提供可调整计算容量的 Web 服务。简单来说，它允许你运行虚拟服务器，并根据需求扩展计算能力。\n\n与 AWS EC2 相关的关键概念：\n\
    \n1. 实例：Amazon EC2 环境中的虚拟服务器。\n2. Amazon 系统映像 (AMI)：启动实例所需的预配置包。这包括操作系统、服务器、应用服务器和应用程序。\n\
    3. 实例类型：定义用于实例的主机计算机的硬件。它影响内存、CPU、存储等方面。\n4. 安全组：充当虚拟防火墙，控制一个或多个实例的流量。\n5. 密钥对：实例的安全登录信息。它包含\
    \ AWS 存储的公钥和你存储的私钥文件。\n\n## 4. 部署准备\n\n在我们深入后续章节的部署过程之前，有必要熟悉一些先决条件：\n\n1. 了解你的应用程序：了解你的应用程序的需求。它需要特定的操作系统吗？硬件要求是什么？\n\
    2. 选择合适的 EC2 实例：AWS 提供针对不同需求量身定制的各种实例类型。根据你的应用程序需求，选择一个合适的实例。\n3. 安全性：确保了解 AWS\
    \ 的安全最佳实践。配置错误可能会使你的应用程序面临不必要的风险。\n\n## 5. 结论\n\nAWS 为部署像我们的 Django REST API 这样的\
    \ Web 应用程序提供了一个强大的平台。在本章中，我们介绍了选择 AWS 的原因，并概述了我们将用于部署应用程序的 EC2 服务。\n\n在接下来的章节中，我们将更深入地探讨在\
    \ AWS 上设置应用程序、保护其安全以及确保其平稳运行以服务用户的细节。\n\n> *给读者的说明*：AWS 及其服务随时间推移而发展，会定期添加新功能。参考\
    \ AWS 的官方文档以获取最新和最深入的信息是一个好习惯。\n\n# 将密钥对添加到 AWS\n\n本章的资产、资源和材料：\n\n- AWS 管理控制台（通过在\
    \ AWS 官方网站注册获取）\n- 带有 SSH 客户端的计算机（macOS 和 Linux 内置。对于 Windows，请使用 PuTTY 等软件）\n\
    \n## 简介：\n\n在我们将 Django REST API 部署到 AWS 之前，一个关键步骤是设置密钥对。AWS 使用公钥密码学来加密和解密登录信息。密钥对由一个公钥（AWS\
    \ 用于加密数据）和一个私钥（你用于解密数据）组成。简单来说，可以将其视为一把独特的数字钥匙，让你安全地访问服务器。\n\n本章将指导你在 AWS 上创建和下载密钥对，你稍后将使用它通过\
    \ SSH 连接到你的服务器实例。\n\n## 1. 登录 AWS 管理控制台\n\n首先导航到 AWS 管理控制台。如果你没有账户，需要注册。登录后，在右上角选择你要部署服务的区域。\n\
    \n## 2. 导航到 EC2 仪表板\n\n从 AWS 管理控制台，通过在搜索栏中输入“EC2”或在“最近访问的服务”部分找到 EC2 服务。\n\n##\
    \ 3. 访问密钥对部分\n\n在 EC2 仪表板上，在侧边栏的“网络和安全”部分下找到“密钥对”选项。\n\n## 4. 创建新的密钥对\n\n- 点击“创建密钥对”按钮。\n\
    - 为你的密钥对提供一个名称，例如“MyDjangoRESTAPIKey”。\n- 从“文件格式”下拉菜单中，根据你的操作系统选择合适的文件格式：\n  -\
    \ `.pem` 用于 Linux 和 macOS\n  - `.ppk` 用于 Windows（如果你使用 PuTTY）\n- 点击“创建密钥对”按钮。\n\
    \n## 5. 下载并保护私钥\n\n点击“创建密钥对”后，私钥文件将自动下载到你的计算机。此私钥对于访问你的服务器至关重要，因此请务必妥善保管。\n\n\
    - 切勿分享你的私钥。\n- 将其移动到计算机上的安全位置。\n- 如果你使用的是 macOS 或 Linux，你可能还需要使用以下命令为密钥设置正确的权限：\n\
    \n```bash\nchmod 400 path_to_your_key.pem\n```\n\n## 6. 如果丢失私钥怎么办？\n\n重要的是要明白，如果你丢失了对私钥的访问权限，AWS\
    \ 无法帮助你找回它。在这种情况下，你需要创建一个新的密钥对并将其与你的 EC2 实例关联，或者使用新的密钥对启动一个新实例。\n\n## 结论：\n\n\
    你现在已经成功从 AWS 创建并下载了你的密钥对。当我们继续创建 EC2 服务器实例并安全地连接到它时，这个密钥对将发挥关键作用。在接下来的章节中，我们将更深入地探讨使用我们刚刚生成的密钥对在\
    \ AWS 上设置服务器。请记住，始终将你的私钥保密，以确保服务器的安全。"
