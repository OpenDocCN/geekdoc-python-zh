    \  调整你的 PATH 环境。我建议选择“Use Git from the Windows Command Prompt”以便于访问。\n7.  选择 HTTPS\
    \ 传输后端。\n8.  勾选“Check out Windows-style, commit Unix-style line endings”选项。\n\
