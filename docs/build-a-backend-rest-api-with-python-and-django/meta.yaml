- md: "## Create a new Django project & app\n\nAssets, Resources, and Materials:\n\
    \n- Python: Ensure you have Python installed. (Download from [Python's official\
    \ website](https://www.python.org/downloads/))\n- Django: We will install this\
    \ in this chapter using pip.\n- Command Line Interface (CLI): Access via Terminal\
    \ (on macOS/Linux) or Command Prompt/PowerShell (on Windows).\n- Text Editor:\
    \ Atom (or any preferred text editor)\n\nIntroduction:\n\nIn this chapter, we\
    \ will walk you through the process of creating a new Django project, followed\
    \ by creating an app within that project. A Django project is essentially a collection\
    \ of settings, configurations, and apps. An app, on the other hand, is a self-contained\
    \ module that can represent anything – from a blog to a user authentication system.\
    \ Each app typically has its models, views, and controllers.\n\nStep 1: Install\
    \ Django\n\nBefore we begin creating our project, we need to ensure Django is\
    \ installed. If not, let's install it using `pip`, Python's package manager.\n\
    \n```bash\npip install django==2.2\n```\n\nStep 2: Start a New Django Project\n\
    \nOnce Django is installed, we can now create a new project. Navigate to the directory\
    \ where you want your project to live, and then run the following command:\n\n\
    ```bash\ndjango-admin startproject myproject\n```\n\nReplace `myproject` with\
    \ your desired project name. This command will create a new directory with the\
    \ name `myproject` containing all the necessary files for a Django project.\n\n\
    ## Step 3: Start a New Django App\n\nNow that our project is created, let’s navigate\
    \ into the project directory:\n\n```bash\ncd myproject\n```\n\nFrom within the\
    \ project directory, we can create our app. Let’s say we’re building a blog; we\
    \ might call our app ‘blog’. To create this app, use the command:\n\n```bash\n\
    python manage.py startapp blog\n```\n\nThis command will generate a new directory\
    \ called `blog` inside your project directory, with the structure for a new app.\n\
    \n## Step 4: Explore the Project & App Structure\n\nNow, if you navigate to your\
    \ project directory using a file explorer or your text editor (Atom), you’ll see\
    \ the following structure:\n\n```\nmyproject/\n|\n├── manage.py\n|\n├── myproject/\n\
    │   ├── __init__.py\n│   ├── settings.py\n│   ├── urls.py\n│   └── wsgi.py\n|\n\
    └── blog/\n    ├── migrations/\n    │   └── __init__.py\n    ├── admin.py\n  \
    \  ├── apps.py\n    ├── models.py\n    ├── tests.py\n    └── views.py\n```\n\n\
    - manage.py: This is a command-line utility to interact with your project.\n-\
    \ myproject/settings.py: This file contains settings for your project.\n- myproject/urls.py:\
    \ This file will contain all the URL patterns for your project.\n- blog/models.py:\
    \ This is where you'll define the data models for your app.\n- blog/views.py:\
    \ Here, you'll define the logic and control flow for handling requests and responses.\n\
    \n## Step 5: Register the App with the Project\n\nFor Django to recognize our\
    \ new ‘blog’ app, we need to register it. Open `myproject/settings.py` in Atom\
    \ (or your preferred text editor) and locate the `INSTALLED_APPS` setting. Add\
    \ the name of your app to this list:\n\n```python\nINSTALLED_APPS = [\n    # ...\
    \ other default apps here ...\n    'blog',\n]\n```\n\n## Conclusion:\n\nCongratulations!\
    \ You’ve now set up a new Django project and created your first app within it.\n\
    Remember, Django follows the DRY (Don’t Repeat Yourself) principle. With just\
    \ a few commands, we have set up a robust structure that will save us time and\
    \ effort as we progress with our project.\n\n## Enable our app in the Django settings\
    \ file\n\nIn this chapter, we’ll walk through the process of enabling our newly\
    \ created Django app in the Django settings file, ensuring that it is acknowledged\
    \ and managed by the Django framework. This step is vital for integrating any\
    \ new app into a Django project.\n\nAssets, Resources, and Materials for this\
    \ chapter:\n\n- Django: Our web framework of choice. (Already installed in the\
    \ previous chapters. If not, revisit Chapter 14.)\n- Django Project: The overarching\
    \ project folder containing all of your Django apps and configurations.\n- Django\
    \ App: The app you've just created. (If not yet created, please refer to Chapter\
    \ 14.)\n- Text Editor (Atom): To edit the Django settings file. (If not installed,\
    \ refer to Chapter 3 or 4 for installation steps based on your operating system.)\n\
    \nStep-by-step guide to enable your Django app:\n\n1. Locate Your Django Settings\
    \ File\n   - Open the Django project in your text editor (Atom).\n   - Navigate\
    \ to the main project folder (this is the folder named after your project, not\
    \ the one named after your app).\n   - Inside this folder, you will find a file\
    \ named `settings.py`. This file contains configurations for your entire Django\
    \ project.\n2. Open the `settings.py` File\n   - Double-click on the `settings.py`\
    \ file to open it in your text editor.\n3. Locate the `INSTALLED_APPS` Setting\n\
    \   - Scroll down or search for `INSTALLED_APPS`. This is a list in Django that\
    \ contains all the apps that are currently enabled and recognized by your Django\
    \ project.\n4. Add Your App to the List\n   - At the end of the `INSTALLED_APPS`\
    \ list, add a new line with the name of your Django app enclosed in single or\
    \ double quotes.\n\n```python\nINSTALLED_APPS = [\n    ... # other pre-existing\
    \ apps here\n    'your_app_name',\n]\n```\n\nReplace `your_app_name` with the\
    \ name of your app.\n\n## 5. Save the File\n\n- Once you've added your app name\
    \ to the list, save the `settings.py` file.\n\n## 6. Verify Your Changes\n\n-\
    \ To ensure that Django acknowledges your app, run the following command in your\
    \ terminal or command prompt:\n\n```python\npython manage.py check\n```\n\nThis\
    \ command will perform a system check. If there are no issues, it should return\
    \ no errors.\n\n## 7. Understanding the Purpose\n\n- Why did we do this? `INSTALLED_APPS`\
    \ tells Django which applications are active for this project and should be taken\
    \ into account for various operations like database migrations, admin interface\
    \ generation, etc. Any time you create a new Django app, you need to make sure\
    \ it's listed in the `INSTALLED_APPS` setting so Django knows about it.\n\n##\
    \ Summary:\n\nBy following these steps, you've integrated your app into the Django\
    \ project. It's crucial to ensure that every app you create is added to the `INSTALLED_APPS`\
    \ list, so Django can manage it correctly. With your app now officially recognized\
    \ by Django, you can begin defining models, views, and other functionalities specific\
    \ to your app in the coming chapters.\n\nIn the next chapter, we will start writing\
    \ tests to ensure our app functions as expected and commit our changes using Git.\n\
    \n## Test and commit our changes\n\nAssets, Resources, and Materials required\
    \ for this chapter:\n\n- Terminal or Command Prompt (pre-installed in most operating\
    \ systems)\n- Python (already installed, see Chapter 12)\n- Django Framework (installed\
    \ in Chapter 14)\n- Git (installed in Chapter 3 or 4 based on OS)\n- Atom Editor\
    \ (installed in Chapter 3 or 4 based on OS)\n- GitHub Account (created in Chapter\
    \ 7 for pushing the project)\n\nIntroduction:\nAfter creating your Django project\
    \ and app, it's vital to ensure that everything is working as expected. This chapter\
    \ walks you through how to test your app and subsequently commit your changes\
    \ using Git.\n\n1. Testing Your Django App\nBefore we commit any code, let's ensure\
    \ that everything is working fine. Django comes with a built-in server for local\
    \ development, which is perfect for our needs.\nStep 1: Start the Django development\
    \ server. Open your terminal or command prompt, navigate to your project directory,\
    \ and type:"
  mdcn: "## 创建新的 Django 项目与应用\n\n所需资源、材料与工具：\n\n- Python：确保已安装 Python。（从 [Python 官方网站](https://www.python.org/downloads/)\
    \ 下载）\n- Django：我们将在本章中使用 pip 进行安装。\n- 命令行界面 (CLI)：通过终端 (macOS/Linux) 或命令提示符/PowerShell\
    \ (Windows) 访问。\n- 文本编辑器：Atom（或任何您偏好的文本编辑器）\n\n简介：\n\n在本章中，我们将引导您完成创建新 Django\
    \ 项目的过程，然后在该项目中创建一个应用。Django 项目本质上是一系列设置、配置和应用的集合。而应用则是一个独立的模块，可以代表任何事物——从博客到用户认证系统。每个应用通常都有自己的模型、视图和控制器。\n\
    \n步骤 1：安装 Django\n\n在开始创建项目之前，我们需要确保 Django 已安装。如果尚未安装，请使用 Python 的包管理器 `pip`\
    \ 进行安装。\n\n```bash\npip install django==2.2\n```\n\n步骤 2：启动新的 Django 项目\n\nDjango\
    \ 安装完成后，我们现在可以创建一个新项目。导航到您希望项目所在的目录，然后运行以下命令：\n\n```bash\ndjango-admin startproject\
    \ myproject\n```\n\n将 `myproject` 替换为您期望的项目名称。此命令将创建一个名为 `myproject` 的新目录，其中包含\
    \ Django 项目所需的所有必要文件。\n\n## 步骤 3：启动新的 Django 应用\n\n现在项目已创建，让我们进入项目目录：\n\n```bash\n\
