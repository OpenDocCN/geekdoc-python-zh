    # 7. Handling README, .gitignore, and License (Optional)


    It’s a good practice to include a `README.md` for project description, `.gitignore`
    to exclude unnecessary files/folders, and a license file.


    7.1 Creating a README.md: In your project root, create a `README.md` file. Edit
    this file to provide a brief description of your project, how to set it up, etc.


    7.2 Setting up .gitignore: Create a `.gitignore` file in your project root. Here,
    you can specify files or folders you don’t want to track, like:


