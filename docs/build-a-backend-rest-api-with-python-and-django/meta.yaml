    Introduction:

    When deploying a Django project, especially to a public-facing server, it is vital
    to ensure that your application''s settings are properly configured for security.
    One of these settings is `ALLOWED_HOSTS`. In Django, the `ALLOWED_HOSTS` setting
    is a security measure to prevent HTTP Host header attacks. Before we move to the
    actual deployment, let''s address this setting.'
  merge: -1
  pgno: 228
- img_proc: true
  md: 'Understanding `ALLOWED_HOSTS`:

    Django uses this to match the `Host` header against a list of strings representing
    the `host/domain names` that this Django site can serve. It is a safety mechanism
    to prevent a particular type of security vulnerability.

    In a development environment, you might have come across an error when you didn’t
    set `ALLOWED_HOSTS` and tried to access your application from a different machine
    or domain. For production, we need to be very specific about which hosts are allowed
    to host our application.


    Step 1: Identify your AWS EC2 Public IP and Domain (if available)

    When you create an AWS EC2 instance, AWS provides you with a Public IPv4 address
    and a Public IPv4 DNS. You’ll need these to update the `ALLOWED_HOSTS` setting.


    +   1. Navigate to the AWS Management Console.

    2. Under the ‘Services’ dropdown, select ‘EC2’.

    3. In the EC2 Dashboard, under ‘Instances’, click on ‘Instances’ to view a list
    of your instances.

    4. Select the instance you are using for your Django deployment. In the ‘Description’
    tab below, note down the ‘IPv4 Public IP’ and ‘Public IPv4 DNS’.


    Step 2: Update the `ALLOWED_HOSTS` in settings.py

    Open your Django project in Atom or your preferred code editor. Navigate to the
    `settings.py` file which is typically in the main application directory.

    Locate the `ALLOWED_HOSTS` setting. By default, it’s an empty list:


    ```

    python

    ALLOWED_HOSTS = []

    ```'
  merge: -1
  pgno: 229
- img_proc: true
  md: 'Update it to include the IP and DNS from your AWS EC2 instance:


    ```

    python

    ALLOWED_HOSTS = [''your-ec2-ipv4-public-ip'', ''your-ec2-public-ipv4-dns'']

    ```


