    # Creating a Git project


    Assets, Resources, and Materials:


    +   - Git: A distributed version control system (VCS).

    (Get/Acquire: Download and install from [Git’s official website]( https://git-scm.com/
    ))

    - GitHub: A platform for hosting and versioning code.

    (Get/Acquire: Sign up for a free account at [GitHub]( https://github.com/ ))


    Introduction

    Creating a Git project means initializing a new repository where your project’s
    files and their history will be stored. This repository acts as a container for
    your project, tracking the changes you make. Using a VCS like Git is crucial in
    software development, allowing you to manage versions of your project, collaborate
    with others, and rollback to previous versions if needed.


    Steps to Create a Git Project'
  - '[PAGE 20]


    # 1. Install Git


    Before initializing a Git project, ensure you’ve installed Git. If you haven’t,
    refer to Chapter 3 or Chapter 4 (depending on your OS) to install Git.


    # 2. Navigate to Your Workspace


    Using your terminal or command prompt, navigate to the directory (folder) where
    you want your project to reside using the `cd` (change directory) command. For
    example:


    ```

    cd path/to/your/workspace

    ```


    # 3. Initialize a New Git Repository


    Inside your workspace, run the following command:


    ```

    git init

    ```


    This will initialize a new Git repository and begin tracking an existing directory.
    You’ll see a message like: “Initialized empty Git repository in /path/to/your/workspace/.git/”


    # 4. Add Your Files


    Before Git can track your files, you need to add them to the repository. Start
    by creating a new file or adding existing files.


    To add all files in the directory:


    ```

    git add .

    ```


    To add specific files:'
  - '[PAGE 21]


    ```

    git add filename.ext

    ```


    # 5. Commit Your Files


    Committing in Git creates a snapshot of the changes you’ve made. It’s like saving
    a version of your project. To commit the files you’ve added, use:


    ```

    git commit -m "Initial commit"

    ```


    Replace “Initial commit” with a brief description of the changes you’ve made.


    # 6. Create a Remote Repository on GitHub


    To push your local repository to GitHub:


    +   - Log into your GitHub account.

    - Click the ‘+’ icon in the top right corner and select ‘New repository’.

    - Fill in a repository name, description, and other settings.

    - Click ‘Create repository’.


    # 7. Link Local Repository to Remote Repository


    In your terminal, add the remote repository:


    ```

    git remote add origin https://github.com/YourUsername/YourRepoName.git

    ```


    Replace ‘YourUsername’ with your GitHub username and ‘YourRepoName’ with the name
    of the repository you just created.


    # 8. Push to GitHub


    To upload your local repository to GitHub, use:'
