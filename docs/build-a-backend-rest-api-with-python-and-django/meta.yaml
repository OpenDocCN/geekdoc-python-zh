    # Purpose of Permissions:


    Permissions in Django REST Framework (DRF) are used to grant or deny access for
    different classes of users to different parts of the API. For our profile feed
    API, we want to ensure that only authenticated users can create, view, or modify
    feed items.


    # Step 1: Understanding Default Permissions


    By default, DRF comes with a set of permissions that can be applied to our views.
    Some of the most commonly used permissions include:


    +   - AllowAny: Gives unrestricted access to any user.

    - IsAuthenticated: Grants access only to authenticated users.

    - IsAdminUser: Grants access only to admin users.

    - IsAuthenticatedOrReadOnly: Grants read-only access to unauthenticated users
    but full access to authenticated users.


    For our feed API, we’ll be using the `IsAuthenticated` permission to ensure only
    logged-in users can interact with the feeds.


    # Step 2: Setting Global Permissions


    First, you can set the global permissions in the project settings to apply the
    `IsAuthenticated` permission to all views by default:


    ```

    python

    # settings.py

    ```'
