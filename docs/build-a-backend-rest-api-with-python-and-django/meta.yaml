    # 3. Linking Local Repository to GitHub


    3.1 Add Remote Repository: To link your local repository to your GitHub repository,
    use the following command:


    ```

    bash

    git remote add origin https://github.com/your_username/django_rest_api_beginner.git

    ```


    Replace `your_username` with your GitHub username.


    # 4. Staging and Committing Changes


    Before pushing to GitHub, you need to stage (track) your project files and commit
    them to your local repository.


    4.1 Stage Files: Stage all project files with:


    ```

    bash

    git add .

    ```


    4.2 Commit Files: Commit the staged files with a commit message:


    ```

    bash

    git commit -m "Initial commit"

    ```


    # 5. Pushing to GitHub


    5.1 Push: Push the committed changes to your GitHub repository using:


    ```

    bash

    git push -u origin master

    ```


    # 6. Verifying on GitHub'
