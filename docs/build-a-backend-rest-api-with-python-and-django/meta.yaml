    \n### 1. 视图集函数的基础知识：\n\n在深入实现之前，理解每个函数的目的至关重要：\n\n- create：处理HTTP POST请求，用于创建一个新对象。\n\
    - retrieve：处理针对单个对象的HTTP GET请求。通过ID返回一个特定对象。\n- update：处理HTTP PUT请求。完全更新一个对象。\n\
