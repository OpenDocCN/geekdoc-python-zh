    \ staging area:\n\n```bash\ngit add .\n```\n\nThe `.` after `add` means you're\
    \ adding all changes in the current directory (and its subdirectories) to the\
    \ staging area.\n\nStep 4: Commit the changes:\n\n```bash\ngit commit -m \"Created\
