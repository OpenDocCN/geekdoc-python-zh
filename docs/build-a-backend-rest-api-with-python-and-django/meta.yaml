    \  在搜索结果中找到 ModHeader 扩展，然后点击 “添加到 Chrome” 或 “添加到 Firefox”。\n5.  按照浏览器的提示完成安装。\n\
    \n## 2. 获取你的令牌\n\n在我们在 ModHeader 中设置令牌之前，我们首先需要获取它：\n\n1.  通过你的登录 API 登录。\n2.\
    \  成功登录后，响应将包含一个身份验证令牌。复制此令牌；我们将在下一步中使用它。\n\n## 3. 在 ModHeader 中设置令牌头\n\n1.  点击浏览器工具栏中的\
    \ ModHeader 图标。这将打开 ModHeader 界面。\n2.  在 ModHeader 界面中，你会看到两个主要的输入字段：“Request\
    \ Headers” 和 “Filter”。\n3.  在 “Request Headers” 下，点击 `+` 按钮以添加一个新的请求头。\n4.  对于请求头名称，输入\
    \ `Authorization`。\n5.  对于请求头值，输入 `Token <Your-Token>`。将 `<Your-Token>` 替换为你从登录\
    \ API 响应中复制的令牌。它应该看起来像 `Token 1234abcd5678efgh`。\n\n注意：“Token” 和你的实际令牌之间的空格是必不可少的。\n\
    \n## 4. 发送经过身份验证的请求\n\n在 ModHeader 中设置好令牌头后：\n\n1.  向你的 API 发送任何需要身份验证的请求，例如获取用户资料或发布"
