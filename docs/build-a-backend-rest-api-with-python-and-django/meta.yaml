    \n## 3. 设置 Postman 进行测试\n\n1.  打开 Postman：安装后，启动 Postman。\n2.  创建新请求：点击“+”标签页。这将打开一个新标签页用于创建请求。\n\
    3.  将请求类型设置为 POST：由于我们正在测试个人资料创建，我们将发送一个 POST 请求。从 URL 栏左侧的下拉菜单中，选择“POST”。\n4.\
