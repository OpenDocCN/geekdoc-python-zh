    \ into the actual coding and server configurations, it’s paramount to set up a\
    \ clean and organized workspace on your computer. A dedicated workspace will make\
    \ it easier to manage files, track changes, and collaborate with others if needed.\
    \ In this chapter, we will guide you through the process of creating an organized\
    \ workspace for your Django REST API project.\n\nSteps to Create a Workspace:\n\
    \n1. Choose a Suitable Location on Your Computer:\n   Begin by deciding where\
    \ you want to store your project. It could be in your user directory, a dedicated\
    \ `projects` directory, or any other location you find convenient. Just ensure\
    \ you have enough space and easy access to it.\n2. Create a New Directory for\
    \ Your Project:\n   Navigate to the chosen location using your File Explorer.\
    \ Create a new directory (or folder) and name it descriptively, like `django_rest_api_project`.\
    \ This name will help you identify the project at a glance in the future.\n3.\
    \ Open Atom Text Editor:\n   Launch the Atom text editor. If you haven’t already\
    \ downloaded Atom, you can get it from [atom.io](https://atom.io/).\n4. Add Your\
    \ Project Directory to Atom:\n   - In Atom, go to `File` > `Add Project Folder`.\n\
    \   - Navigate to the `django_rest_api_project` directory you just created and\
    \ select it.\n   - You should now see the directory in Atom's sidebar, confirming\
    \ that it’s been added as a project folder.\n5. Creating Essential Sub-Directories:\n\
    \   For the sake of organization, create a few sub-directories within your main\
    \ project folder:\n   - `source`: This will hold all the source code for your\
    \ project.\n   - `docs`: For any documentation, notes, or reference materials.\n\
    \   - `assets`: To store any images, stylesheets, or other static files you might\
    \ need.\n   - `scripts`: For any auxiliary scripts or utilities you might write\
    \ or acquire.\n   Use Atom’s sidebar to right-click on `django_rest_api_project`,\
    \ choose `New Folder`, and name it accordingly. Repeat this for each sub-directory.\n\
    6. Initialize a README File:\n   It’s a good practice to have a `README.md` file\
    \ at the root of your project. This markdown file will contain information about\
    \ the project, its purpose, setup instructions, and any other relevant details.\n\
    \   - Right-click on `django_rest_api_project` in Atom.\n   - Select `New File`\
    \ and name it `README.md`.\n   - Open the file and type in a brief introduction\
    \ to your project. You can expand on this as your project grows.\n\nConclusion:\n\
    Congratulations! You’ve now set up a structured and organized workspace for your\
    \ Django REST API project. This organized setup will ensure you can easily manage,\
    \ update, and collaborate on your project without any hassles. As we move forward,\
    \ always remember to maintain this structure, as an organized workspace is key\
    \ to a successful development process.\n\n## Creating a Git project\n\nAssets,\
    \ Resources, and Materials:\n\n- Git: A distributed version control system (VCS).\n\
    \  (Get/Acquire: Download and install from [Git’s official website](https://git-scm.com/))\n\
    - GitHub: A platform for hosting and versioning code.\n  (Get/Acquire: Sign up\
    \ for a free account at [GitHub](https://github.com/))\n\nIntroduction:\nCreating\
    \ a Git project means initializing a new repository where your project’s files\
    \ and their history will be stored. This repository acts as a container for your\
    \ project, tracking the changes you make. Using a VCS like Git is crucial in software\
    \ development, allowing you to manage versions of your project, collaborate with\
    \ others, and rollback to previous versions if needed.\n\nSteps to Create a Git\
    \ Project:\n\n1. Install Git:\n   Before initializing a Git project, ensure you’ve\
    \ installed Git. If you haven’t, refer to Chapter 3 or Chapter 4 (depending on\
    \ your OS) to install Git.\n2. Navigate to Your Workspace:\n   Using your terminal\
    \ or command prompt, navigate to the directory (folder) where you want your project\
    \ to reside using the `cd` (change directory) command. For example:\n   ```\n\
    \   cd path/to/your/workspace\n   ```\n3. Initialize a New Git Repository:\n \
    \  Inside your workspace, run the following command:\n   ```\n   git init\n  \
    \ ```\n   This will initialize a new Git repository and begin tracking an existing\
    \ directory. You’ll see a message like: “Initialized empty Git repository in /path/to/your/workspace/.git/”\n\
    4. Add Your Files:\n   Before Git can track your files, you need to add them to\
    \ the repository. Start by creating a new file or adding existing files.\n   To\
    \ add all files in the directory:\n   ```\n   git add .\n   ```\n   To add specific\
    \ files:\n   ```\n   git add filename.ext\n   ```\n5. Commit Your Files:\n   Committing\
    \ in Git creates a snapshot of the changes you’ve made. It’s like saving a version\
    \ of your project. To commit the files you’ve added, use:\n   ```\n   git commit\
    \ -m \"Initial commit\"\n   ```\n   Replace “Initial commit” with a brief description\
    \ of the changes you’ve made.\n6. Create a Remote Repository on GitHub:\n   To\
    \ push your local repository to GitHub:\n   - Log into your GitHub account.\n\
    \   - Click the ‘+’ icon in the top right corner and select ‘New repository’.\n\
    \   - Fill in a repository name, description, and other settings.\n   - Click\
    \ ‘Create repository’.\n7. Link Local Repository to Remote Repository:\n   In\
    \ your terminal, add the remote repository:\n   ```\n   git remote add origin\
    \ https://github.com/YourUsername/YourRepoName.git\n   ```\n   Replace ‘YourUsername’\
    \ with your GitHub username and ‘YourRepoName’ with the name of the repository\
    \ you just created.\n8. Push to GitHub:\n   To upload your local repository to\
    \ GitHub, use:"
  mdcn: "## 3. 安装 Vagrant：\n\n目的：Vagrant 与 VirtualBox 配合使用，可自动化设置虚拟环境，从而简化开发流程。\n\n\
    步骤：\n\n1.  前往 [Vagrant 官方网站](https://www.vagrantup.com/downloads.html) 并下载 macOS\
    \ 版本。\n2.  打开 `.dmg` 文件，并将 Vagrant 图标拖拽到你的“应用程序”文件夹中。\n3.  要验证安装是否成功，请打开终端并输入：\n\
    \n```\nvagrant --version\n```\n\n你应该会看到已安装的 Vagrant 版本信息。\n\n## 4. 安装 Atom：\n\n\
    目的：Atom 是一款功能强大的文本编辑器，专为编码优化，提供语法高亮、自动补全以及与 Git 的集成。\n\n步骤：\n\n1.  访问 [Atom 官方网站](https://atom.io/)\
    \ 下载 macOS 版本。\n2.  打开下载的 `.zip` 文件，它将解压出 Atom 应用程序。\n3.  将 Atom 应用程序移动到你的“应用程序”文件夹。\n\
    4.  启动 Atom 以确认安装成功。\n\n## 5. 为 Chrome 添加 ModHeader 扩展：\n\n目的：ModHeader 允许你修改和添加\
    \ HTTP 头信息，这对于测试和调试 API 至关重要。\n\n步骤：\n\n1.  打开 Chrome 浏览器并导航至 [Chrome 网上应用店中的\
    \ ModHeader 扩展](https://chrome.google.com/webstore/detail/modheader/idgpnmonknjnojddfkpgkljpfnnfcklj?hl=en)。\n\
    2.  点击“添加到 Chrome”并确认添加。\n3.  添加成功后，你将在 Chrome 浏览器的右上角看到 ModHeader 图标。\n\n结论：\n\
    恭喜！你已成功在 macOS 上为你的开发环境设置了必备工具。在后续章节中，当你深入后端开发时，这些工具将起到关键作用。请确保你熟悉每个软件，因为它们将在你的\
    \ REST API 开发和测试中不可或缺。\n\n# 第 3 节：设置你的项目\n\n## 创建工作区\n\n资产、资源和材料：\n\n1.  计算机：任何现代计算机（Mac、Windows\
    \ 或 Linux）均可。\n2.  操作系统：确保你拥有最新版本的 Windows、macOS 或 Linux。\n3.  文件资源管理器：操作系统内置的资源管理器（例如\
    \ Windows 的资源管理器，macOS 的 Finder）。\n4.  文本编辑器：Atom（你可以从 [atom.io](https://atom.io/)\
    \ 下载）。我们将使用 Atom 来编写和管理代码。\n5.  专用文件夹：一个干净的目录/文件夹，用于存放你所有的项目文件。\n\n引言：\n\n在深入实际编码和服务器配置之前，在你的计算机上设置一个干净、有序的工作区至关重要。一个专用的工作区将使文件管理、跟踪更改以及在需要时与他人协作变得更加容易。在本章中，我们将指导你完成为\
    \ Django REST API 项目创建有序工作区的过程。\n\n创建工作区的步骤：\n\n1.  在你的计算机上选择一个合适的位置：\n    首先决定你想将项目存储在哪里。它可以位于你的用户目录、一个专用的\
    \ `projects` 目录，或任何你认为方便的位置。只需确保有足够的空间并且易于访问。\n2.  为你的项目创建一个新目录：\n    使用你的文件资源管理器导航到所选位置。创建一个新目录（或文件夹），并为其命名一个描述性的名称，例如\
    \ `django_rest_api_project`。这个名称将帮助你在未来一眼识别出该项目。\n3.  打开 Atom 文本编辑器：\n    启动 Atom\
    \ 文本编辑器。如果你尚未下载 Atom，可以从 [atom.io](https://atom.io/) 获取。\n4.  将你的项目目录添加到 Atom：\n\
    \    - 在 Atom 中，转到 `File` > `Add Project Folder`。\n    - 导航到你刚刚创建的 `django_rest_api_project`\
    \ 目录并选择它。\n    - 你现在应该能在 Atom 的侧边栏中看到该目录，确认它已被添加为项目文件夹。\n5.  创建必要的子目录：\n    为了组织性，请在你的主项目文件夹内创建几个子目录：\n\
    \    - `source`：用于存放你项目的所有源代码。\n    - `docs`：用于存放任何文档、笔记或参考资料。\n    - `assets`：用于存储你可能需要的任何图像、样式表或其他静态文件。\n\
    \    - `scripts`：用于存放你可能编写或获取的任何辅助脚本或实用程序。\n    使用 Atom 的侧边栏，右键单击 `django_rest_api_project`，选择\
    \ `New Folder`，并相应地命名。对每个子目录重复此操作。\n6.  初始化一个 README 文件：\n    在项目根目录下拥有一个 `README.md`\
    \ 文件是一个好习惯。这个 Markdown 文件将包含有关项目的信息、其目的、设置说明以及任何其他相关细节。\n    - 在 Atom 中右键单击 `django_rest_api_project`。\n\
    \    - 选择 `New File` 并将其命名为 `README.md`。\n    - 打开文件并输入你项目的简要介绍。随着项目的进展，你可以对此进行扩展。\n\
    \n结论：\n恭喜！你现在已经为你的 Django REST API 项目设置了一个结构化且有序的工作区。这种有序的设置将确保你能够轻松地管理、更新和协作你的项目，而不会有任何麻烦。随着我们继续前进，请始终记住保持这种结构，因为一个有序的工作区是成功开发过程的关键。\n\
    \n## 创建一个 Git 项目\n\n资产、资源和材料：\n\n- Git：一个分布式版本控制系统（VCS）。\n  （获取/获取：从 [Git 官方网站](https://git-scm.com/)\
    \ 下载并安装）\n- GitHub：一个用于托管和版本控制代码的平台。\n  （获取/获取：在 [GitHub](https://github.com/)\
    \ 注册一个免费账户）\n\n引言：\n创建一个 Git 项目意味着初始化一个新的仓库，你的项目文件及其历史记录将存储在此仓库中。这个仓库充当你项目的容器，跟踪你所做的更改。在软件开发中使用像\
    \ Git 这样的 VCS 至关重要，它允许你管理项目的版本、与他人协作，并在需要时回滚到以前的版本。\n\n创建 Git 项目的步骤：\n\n1.  安装\
    \ Git：\n    在初始化 Git 项目之前，请确保你已安装 Git。如果尚未安装，请参考第 3 章或第 4 章（取决于你的操作系统）来安装 Git。\n\
    2.  导航到你的工作区：\n    使用你的终端或命令提示符，使用 `cd`（更改目录）命令导航到你希望项目所在的目录（文件夹）。例如：\n    ```\n\
    \    cd path/to/your/workspace\n    ```\n3.  初始化一个新的 Git 仓库：\n    在你的工作区内，运行以下命令：\n\
    \    ```\n    git init\n    ```\n    这将初始化一个新的 Git 仓库并开始跟踪现有目录。你会看到一条类似这样的消息：“Initialized\
    \ empty Git repository in /path/to/your/workspace/.git/”\n4.  添加你的文件：\n    在 Git\
    \ 能够跟踪你的文件之前，你需要将它们添加到仓库中。首先创建一个新文件或添加现有文件。\n    要添加目录中的所有文件：\n    ```\n    git\
    \ add .\n    ```\n    要添加特定文件：\n    ```\n    git add filename.ext\n    ```\n5.\
    \  提交你的文件：\n    在 Git 中提交会创建你所做更改的快照。这就像保存项目的一个版本。要提交你已添加的文件，请使用：\n    ```\n \
    \   git commit -m \"Initial commit\"\n    ```\n    将“Initial commit”替换为你所做更改的简要描述。\n\
    6.  在 GitHub 上创建一个远程仓库：\n    要将你的本地仓库推送到 GitHub：\n    - 登录你的 GitHub 账户。\n    -\
    \ 点击右上角的‘+’图标并选择‘New repository’。\n    - 填写仓库名称、描述和其他设置。\n    - 点击‘Create repository’。\n\
    7.  将本地仓库链接到远程仓库：\n    在你的终端中，添加远程仓库：\n    ```\n    git remote add origin https://github.com/YourUsername/YourRepoName.git\n\
    \    ```\n    将‘YourUsername’替换为你的 GitHub 用户名，将‘YourRepoName’替换为你刚刚创建的仓库名称。\n\
    8.  推送到 GitHub：\n    要将你的本地仓库上传到 GitHub，请使用："
