    \ classes in `settings.py`:\n\n```python\nREST_FRAMEWORK = {\n    ...\n    'DEFAULT_PERMISSION_CLASSES':\
    \ (\n        'rest_framework.permissions.IsAuthenticated',\n    ),\n    ...\n\
    }\n```\n\nThe above setting will ensure that only authenticated users can access\
    \ the viewset. But, what if we want more granular permissions, like allowing anyone\
    \ to view profiles but only authenticated users to edit them?\n\nb. Create a custom\
    \ permission:\n\nIn your app, create a file named `permissions.py` and add the\
    \ following code:\n\n```python\nfrom rest_framework import permissions\n\nclass\
    \ UpdateOwnProfile(permissions.BasePermission):\n    \"\"\"Allow users to edit\
    \ their own profile\"\"\"\n    def has_object_permission(self, request, view,\
    \ obj):\n        \"\"\"Check if user is trying to edit their own profile\"\"\"\
