    \    ),\n    ...\n}\n```\n\n上述设置将确保只有经过身份验证的用户才能访问视图集。但是，如果我们想要更细粒度的权限，比如允许任何人查看\
    \ profiles，但只有经过身份验证的用户才能编辑它们呢？\n\nb. 创建自定义权限：\n\n在你的应用中，创建一个名为 `permissions.py`\
    \ 的文件，并添加以下代码：\n\n```python\nfrom rest_framework import permissions\n\nclass UpdateOwnProfile(permissions.BasePermission):\n\
    \    \"\"\"允许用户编辑自己的 profile\"\"\"\n    def has_object_permission(self, request,\
    \ view, obj):\n        \"\"\"检查用户是否试图编辑自己的 profile\"\"\"\n        if request.method\
    \ in permissions.SAFE_METHODS:\n            return True\n        return obj.id\
    \ == request.user.id\n```\n\n这里，我们允许任何被认为是“安全”的请求方法（即 GET 请求）。但对于其他方法，如 PUT 或\
