    \n它将删除由其主键标识的特定项目。\n\n### 4. 使用Postman测试函数：\n\n一旦你实现了这些函数，你就可以使用Postman向你的API发送各种HTTP请求。确保你已正确设置URL以测试上述每个功能。\n\
