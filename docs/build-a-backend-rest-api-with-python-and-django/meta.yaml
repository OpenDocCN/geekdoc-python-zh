    # Introduction


    Deploying our API to a server, especially on AWS, is an essential step to make
    our application accessible to users. In this chapter, we’ll walk through the process
    of deploying our Django REST API on an AWS EC2 instance.


    # 1. Prepare Your Django Project for Deployment


    Before deploying, ensure the following:


    +   - Your Django project runs without errors locally.

    - `DEBUG` is set to `False` in settings.py.

    - You have added your server’s IP address to `ALLOWED_HOSTS` in settings.py.

    - You have generated the `requirements.txt` using the command:


    ```

    bash

    pip freeze > requirements.txt

    ```


    # 2. Launch an EC2 Instance


    +   1. Log into the AWS Management Console and navigate to the EC2 dashboard.

    2. Click on “Launch Instance” and select your preferred OS (For this guide, we’ll
    use Ubuntu 18.04).

    3. Choose an instance type (t2.micro is free for new AWS users within the free
    tier).

    4. Click “Next” until you reach “Configure Security Group”. Here, add a rule to
    allow HTTP (Port 80) and HTTPS (Port 443).

    5. Launch the instance and create a new key pair if you haven’t. Download the
    key pair (This will be a .pem file) and keep it safe.'
