    When the virtual environment is activated, you’ll see the name of your virtual
    environment (in this case, `myenv`) at the beginning of your command line prompt.
    This indicates that the environment is active, and any Python packages you install
    while it’s active will only be installed in this environment.


    # 4. Deactivating the Virtual Environment:


    When you’re done working in your virtual environment and want to return to the
    global Python environment, simply run:


    ```

    deactivate

    ```


    # 5. Installing Packages in the Virtual Environment:


    With the virtual environment active, you can use pip to install packages as you
    normally would. For example, to install Django:


    ```

    pip install django

    ```


    This will install Django only in the active virtual environment and won’t affect
    the system-wide Python installation.


