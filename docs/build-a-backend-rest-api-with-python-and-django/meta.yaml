    -   virtualenv：这是我们用来创建隔离 Python 环境的主要工具。如果你还没有安装，别担心，我们会介绍的。\n\n虚拟环境的目的：\n虚拟环境是你计算机上的一个隔离空间，你可以在其中独立于系统级的\
    \ Python 安装来安装软件和 Python 包。这种隔离防止了版本之间的冲突，并确保了一个干净、受控的开发环境，使得管理特定项目的依赖项变得更加容易。\n\
    \n让我们开始吧：\n1.  安装 virtualenv：\n    如果你还没有安装 virtualenv，可以使用 pip 进行安装：\n\n    ```bash\n\
    \    pip install virtualenv\n    ```\n\n2.  创建虚拟环境：\n    安装好 virtualenv 后，导航到你希望虚拟环境所在的目录（通常在你的项目目录内），然后运行：\n\
    \n    ```bash\n    virtualenv myenv\n    ```\n\n    这里，`myenv` 是你的虚拟环境的名称。你可以随意命名，但保持描述性会很有帮助。\n\
    \n3.  激活虚拟环境：\n    -   在 Windows 上：\n\n        ```bash\n        myenv\\Scripts\\\
    activate\n        ```\n\n    -   在 macOS 和 Linux 上：\n\n        ```bash\n     \
    \   source myenv/bin/activate\n        ```\n\n    当虚拟环境被激活时，你会在命令行提示符的开头看到你的虚拟环境名称（本例中是\
    \ `myenv`）。这表明环境处于活动状态，你在其活动期间安装的任何 Python 包都将仅安装在此环境中。\n\n4.  停用虚拟环境：\n    当你在虚拟环境中完成工作并希望返回全局\
    \ Python 环境时，只需运行：\n\n    ```bash\n    deactivate\n    ```\n\n5.  在虚拟环境中安装包：\n\
    \    在虚拟环境处于活动状态时，你可以像往常一样使用 pip 安装包。例如，要安装 Django：\n\n    ```bash\n    pip install\
    \ django\n    ```\n\n    这将仅在活动的虚拟环境中安装 Django，而不会影响系统级的 Python 安装。\n\n为什么使用虚拟环境？\n\
    在同一个系统上开发多个项目时，虚拟环境至关重要，尤其是当这些项目具有不同的依赖项时。它们允许：\n\n-   隔离：确保每个项目都有自己的一组依赖项，互不干扰。\n\
    -   版本控制：允许不同的项目使用不同版本的包，而不会产生任何冲突。\n-   干净的环境：当你开始一个新项目时，你可以确保你是在一个干净的基础上工作，没有任何不需要的包。\n\
    -   部署：在将应用程序部署到生产环境时，更容易管理依赖项。\n\n回顾：\n在本章中，我们学习了如何使用 virtualenv 设置 Python 虚拟环境。我们现在有了一个专门用于\
    \ Django 项目的空间，可以在其中隔离地管理我们的依赖项。在下一章中，我们将开始安装必要的 Python 包来启动我们的 Django 项目。\n\n\
    ### 安装所需的 Python 包\n\n资产、资源和材料：\n\n1.  Python：确保你的开发服务器上安装了 Python（最好是 3.7 或更高版本）。要检查，请在终端中运行\
    \ `python --version` 或 `python3 --version`。（你可以从 [python.org](https://www.python.org/downloads/)\
    \ 下载并安装 Python）。\n2.  pip：Python 的包安装器。它通常随 Python 一起安装。要检查其安装情况，请在终端中运行 `pip\
    \ --version` 或 `pip3 --version`。（如果未安装，[请按照这些说明操作](https://pip.pypa.io/en/stable/installing/)）。\n\
    3.  虚拟环境：虽然不是严格要求，但为你的项目使用虚拟环境可以确保依赖项在项目之间不会冲突。（安装说明如下）。\n\n介绍：\n要开始构建我们的 Django\
    \ 应用程序，我们首先需要确保已安装所有必要的 Python 包。这些包将促进我们 Django 应用的创建、管理和增强。在本章中，我们将逐步介绍安装必要\
    \ Python 包的过程。\n\n步骤 1：设置虚拟环境\n虚拟环境是一个隔离的环境，你可以在其中安装包，而不会影响全局 Python 环境或其他项目。为每个\
    \ Python 项目使用虚拟环境是最佳实践。\n\na. 要安装虚拟环境包，请运行：\n```bash\npip install virtualenv\n\
    ```\n\nb. 导航到你的项目目录（或你希望创建虚拟环境的位置）并运行：\n```bash\nvirtualenv venv\n```\n\nc. 激活虚拟环境。激活命令因操作系统而异：\n\
    -   Windows：\n```bash\nvenv\\Scripts\\activate\n```\n\n-   macOS 和 Linux：\n```bash\n\
    source venv/bin/activate\n```\n\n激活后，你应该会在终端提示符的开头看到 `(venv)`，这表明你现在正在虚拟环境中工作。\n\
    \n步骤 2：安装 Django 和 Django REST Framework\n在我们的虚拟环境处于活动状态后，我们可以继续安装 Django 和 Django\
    \ REST Framework。\n\na. 通过运行以下命令安装 Django：\n```bash\npip install django==2.2\n\
    ```\n\n通过指定 `==2.2`，我们确保安装的是我们课程所基于的 Django 2.2 版本。\n\nb. 接下来，安装 Django REST Framework：\n\
    ```bash\npip install djangorestframework==3.9\n```\n\n步骤 3：验证安装\n安装后，最好验证一切是否正确安装。\n\
    \na. 使用以下命令检查已安装的 Django 版本：\n```bash\ndjango-admin --version\n```"
