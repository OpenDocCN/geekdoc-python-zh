    \ REST API 的个人资料创建功能。Postman 提供了一个用户友好的界面来向我们的 API 发送请求，使测试各种场景变得更加容易。\n\n## 2.\
    \ 准备 API 进行测试\n\n首先，确保你的 Django 开发服务器正在运行。如果没有，请在终端中导航到你的项目目录并运行：\n\n```bash\n\
