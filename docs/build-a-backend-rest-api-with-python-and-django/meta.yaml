    \n让我们深入探讨如何创建这个模型。\n\n## 步骤 1：打开你的 Models.py 文件\n\n导航到你的 Django 应用目录中的 `models.py`\
    \ 文件。我们将在这里定义我们的新模型。\n\n```python\nfrom django.db import models\nfrom django.conf\
    \ import settings\n```\n\n## 步骤 2：定义 Item 模型\n\n对于我们的动态项，我们需要以下字段：\n\n1.  `user_profile`：一个外键，链接到我们的用户模型。这将让我们知道是哪个用户发布了动态项。\n\
    2.  `status_text`：一个字符字段，用于存储用户的状态。\n3.  `created_on`：一个日期字段，将在创建动态项时自动设置当前日期和时间。\n\
    \n代码如下所示：\n\n```python\nclass Item(models.Model):\n    user_profile = models.ForeignKey(settings.AUTH_USER_MODEL,\
    \ on_delete=models.CASCADE)\n    status_text = models.CharField(max_length=255)\n\
    \    created_on = models.DateTimeField(auto_now_add=True)\n    def __str__(self):\n\
    \        return self.status_text\n```\n\n## 步骤 3：模型字段说明\n\n1.  ForeignKey：此字段用于创建一对多关系。在这里，它用于将每个动态项链接到一个用户。`on_delete=models.CASCADE`\
    \ 参数意味着如果删除了用户配置文件，其所有动态项也将被删除。\n2.  CharField：这是一个用于存储字符数据的字段。我们将状态文本限制为 255\
    \ 个字符。\n3.  DateTimeField：此字段用于存储日期和时间数据。`auto_now_add=True` 参数意味着在创建新的动态项时，该字段将被设置为当前日期和时间。\n\
    \n## 步骤 4：迁移\n\n定义模型后，下一步是为其创建迁移。迁移是 Django 将对模型所做的更改（添加、删除或更改字段）传播到数据库模式的方式。\n\
