    ```\n\n```python\nclass ProfileFeedItemViewSet(viewsets.ModelViewSet):\n    ...\n\
    \    permission_classes = (IsAuthenticated,)\n```\n\nWhat we’ve done here is specify\
    \ that the `IsAuthenticated` permission is required for all operations in the\
    \ `ProfileFeedItemViewSet`.\n\n### Step 2: Test the Restriction\n\nBefore moving\
    \ forward, let’s ensure that our restriction is working:\n\n1. Open up Postman\
    \ or your browser.\n2. Attempt to access the Profile Feed API without being logged\
    \ in. You should receive a `403 Forbidden` error.\n3. Now, log in with a user\
