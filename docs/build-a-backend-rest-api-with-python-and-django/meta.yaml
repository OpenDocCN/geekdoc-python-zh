    \    \"name\": \"John Doe\",\n    \"email\": \"johndoe@example.com\",\n    \"\
    password\": \"strongpassword\"\n}\n```\n\n## 4. 发送请求并分析响应\n\n在 Postman 中设置好请求后：\n\
    \n1.  发送请求：点击“Send”按钮。\n2.  分析响应：发送请求后，Postman 将在下方显示 API 的响应。你应该检查以下内容：\n   \
    \ - 状态码：确保你收到 `201 Created` 状态，表示个人资料创建成功。\n    - 响应体：检查 API 是否返回了预期的数据。例如，新个人资料的\
    \ ID、姓名和电子邮件（出于安全原因，不包含密码）。\n    - 错误消息：如果出现问题，API 应返回一条错误消息，详细说明出了什么问题。这可能是验证错误或服务器端错误。\n\
    \n## 5. 测试边界情况\n\n仅测试成功场景是不够的；你还必须确保你的 API 能够优雅地处理失败情况：\n\n1.  缺失数据：尝试发送一个缺少必填字段的请求，例如没有电子邮件。API\
    \ 应返回 `400 Bad Request` 状态和清晰的错误消息。\n2.  无效数据：输入无效数据，例如格式不正确的电子邮件。同样，API 应返回 `400\
    \ Bad Request` 状态和适当的错误消息。\n3.  重复数据：尝试使用数据库中已存在的电子邮件创建个人资料。API 应防止重复条目并发送错误消息。\n\
    \n## 结论\n\n测试是软件开发中的关键阶段。通过确保个人资料创建功能按预期工作并能优雅地处理失败，我们离拥有一个健壮可靠的 API 又近了一步。在接下来的章节中，我们将把测试扩展到其他功能，并确保我们的\
    \ API 已准备好部署。\n记住，“这不是一个 bug——这是一个未记录的功能！”你测试得越多，最终产品中的“未记录的功能”就越少。\n\n## 创建权限类\n\
    \n资产、资源和材料：\n\n- Django：（通过 pip 安装。Django 是我们用于构建后端的核心框架。）\n- Django REST Framework\
    \ (DRF)：（通过 pip 安装。DRF 扩展了 Django 处理 API 的能力。）\n- 文本编辑器（例如 Atom）：（可从 Atom 网站免费下载。我们将使用它来编写和查看代码。）\n\
    - 终端或命令行界面：（内置于你的操作系统中。用于运行命令。）\n- Django 的权限和认证模块：（随 DRF 安装提供。用于创建和管理权限。）\n\n\
    引言：\n\n在使用 REST API 时，实施必要的权限以保护敏感数据并确保前端和后端之间的正确数据流至关重要。在本章中，我们将重点使用 Django REST\
    \ Framework 为我们的 Profiles API 创建一个自定义权限类。\n\n## 什么是权限类？\n\nDjango REST Framework\
    \ 中的权限类决定是否应授予或拒绝请求的访问权限。DRF 提供了一组内置的权限类，如 `IsAuthenticated`、`IsAdminUser` 和 `IsAuthenticatedOrReadOnly`。虽然这些内置类很有用，但有时你需要更自定义的行为，这就是创建自己的权限类发挥作用的地方。\n\
    \n## 创建自定义权限类的步骤：\n\n1.  创建新的权限文件：\n    在你的 `profiles_api` 应用目录中，创建一个名为 `permissions.py`\
    \ 的新文件。\n\n    ```bash\n    touch profiles_api/permissions.py\n    ```\n\n2. \
    \ 设置权限类：\n    在 `permissions.py` 中，首先导入必要的模块，然后定义你的自定义权限类。\n\n    ```python\n\
    \    from rest_framework import permissions\n\n    class UpdateOwnProfile(permissions.BasePermission):\n\
    \        \"\"\"允许用户编辑自己的个人资料\"\"\"\n        def has_object_permission(self, request,\
    \ view, obj):\n            \"\"\"检查用户是否试图编辑自己的个人资料\"\"\"\n            if request.method\
    \ in permissions.SAFE_METHODS:\n                return True\n            return\
    \ obj.id == request.user.id\n    ```\n\n    这里，我们创建了一个名为 `UpdateOwnProfile` 的权限，它检查请求是否是安全方法（GET、HEAD\
    \ 或 OPTIONS）。如果是安全方法，则授予请求权限；否则，它通过比较对象的 id 与用户的 id 来检查用户试图修改的对象是否属于他们。\n\n3.\
    \  实现权限：\n    转到 `profiles_api` 应用目录中的 `views.py`。在这里，你需要将自定义权限类添加到你的 `ProfileViewSet`\
    \ 中。\n    首先，在顶部导入自定义权限：\n\n    ```python\n    from .permissions import UpdateOwnProfile\n\
    \    ```\n\n    然后，在你的 `ProfileViewSet` 中，将权限添加到 `permission_classes` 属性：\n\n\
    \    ```python\n    permission_classes = [UpdateOwnProfile, ]\n    ```\n\n   \
    \ 现在，每当向 `ProfileViewSet` 发出请求时，`UpdateOwnProfile` 权限类将用于检查是否应授予或拒绝该请求的访问权限。\n\
    \n测试权限：\n权限类就位后，对其进行测试非常重要。可以使用 Postman 或你的浏览器等工具来完成。尝试更新你自己的个人资料以外的个人资料，并观察结果。如果权限类工作正常，对于此类请求，你应该会收到一个禁止响应。\n\
    \n结论：\n权限类是在 Django REST Framework 中处理权限和访问控制的强大方式。通过理解并有效使用它们，你可以为你的数据和 API 用户创建一个安全的环境。我们刚刚创建的自定义权限类确保用户只能修改自己的数据，使我们的\
    \ Profiles API 保持安全和功能正常。\n\n## 向 Viewset 添加认证和权限\n\n资产和资源：\n\n- Django REST Framework\
    \ (DRF) 文档：[官方 DRF 文档](https://www.django-rest-framework.org/)\n  - 深入了解认证、权限和视图集。\n\
    - Django 认证：[官方 Django 文档](https://docs.djangoproject.com/en/3.0/topics/auth/default/)\n\
    \  - 了解内置的 Django 用户认证系统。\n- Postman 或类似的 API 测试工具：[下载 Postman](https://www.postman.com/downloads/)\n\
    \  - 用于发送请求和观察 API 行为。\n\n引言：\n\nDjango REST Framework (DRF) 提供了开箱即用的工具，用于将认证和权限集成到你的\
    \ API 中。确保只有经过认证的用户才能发出某些请求，这对于我们的 Profiles API 的安全性和功能性至关重要。在本章中，我们将为我们的个人资料视图集设置认证和权限。\n\
    \n## 1. 设置认证：\n\n为确保只有经过认证的用户才能访问某些视图或执行特定操作，我们首先需要设置认证。DRF 提供了多种认证类，包括基本认证、令牌认证和会话认证。\n\
    \n对于我们的 Profiles API，我们将使用令牌认证。以下是设置方法：\n\na. 安装必要的包：\n\n```bash\npip install\
    \ djangorestframework[authtoken]\n```\n\nb. 在 `settings.py` 的 `INSTALLED_APPS`\
    \ 中添加 `rest_framework.authtoken`：\n\n```python\nINSTALLED_APPS = [\n    ...\n\
    \    'rest_framework.authtoken',\n    ...\n]\n```\n\nc. 运行迁移以将令牌模型添加到你的数据库：\n\n\
    ```bash\npython manage.py migrate\n```"
