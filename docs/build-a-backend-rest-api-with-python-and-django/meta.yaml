    \ update, partial_update and destroy functions\n- Chapter 39: Test Viewset\n\n\
    **Section 10: Create Profiles API**\n- Chapter 40: Plan our Profiles API\n- Chapter\
    \ 41: Create user profile serializer\n- Chapter 42: Create profiles ViewSet\n\
    - Chapter 43: Register profile Viewset with the URL router\n- Chapter 44: Test\
