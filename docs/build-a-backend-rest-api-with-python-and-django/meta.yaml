  - '[PAGE 220]


    Assets, Resources, and Materials:


    +   - Amazon EC2 (Elastic Compute Cloud): This is a web service that provides
    scalable compute capacity in the cloud. You can sign up for an AWS account [here](https://aws.amazon.com/)
    if you don’t have one.

    - Deployment script: A set of instructions in a file to automatically deploy our
    project to a server.

    - `requirements.txt`: Lists all the Python dependencies required for our project.

    - SSH (Secure Shell): A cryptographic network protocol for securely starting a
    session on a remote server. Tools like [PuTTY](https://www.putty.org/) for Windows
    or the built-in SSH client for macOS and Linux can be used.

    - `gunicorn`: A Python WSGI HTTP server for UNIX. This will be our application
    server for Django in production.

    - AWS CLI (Command Line Interface): A tool provided by AWS to manage AWS services.
    You can download it [here](https://aws.amazon.com/cli/).

    - Virtualenv: A tool to create isolated Python environments.

    - Configuration files: Essential for setting environment-specific configurations,
    secrets, and variables.


    # 1. Introduction:


    Deployment is the stage where our local development work gets presented to the
    world. As we’re deploying on AWS EC2, we need to automate the process to ensure
    consistent and rapid deployments.


    # 2. Setting Up the Environment:


    Before we move on to writing our deployment script, let’s ensure our environment
    is ready:

    *Make sure AWS CLI is installed.*

    You can install it with:'
  - '[PAGE 221]


    ```

    pip install awscli

    ```


    Ensure you''ve set up AWS CLI with the credentials. Run:


    ```

    aws configure

    ```


    You''ll be prompted to input your AWS Access Key, Secret Key, region, and default
    output format.


    3. Create `requirements.txt`: Our EC2 instance needs to know which Python packages
    to install. Inside your project directory, run:


    ```

    pip freeze > requirements.txt

    ```


    This creates a file with all your Python dependencies.


    4. Writing the Deployment Script: Let''s create a script named `deploy.sh`. This
    script will handle the deployment process for us.


    ```

    bash

    #!/bin/bash

    # Navigate to our project directory

    cd /path/to/your/django/project

    # Activate our virtual environment

    source venv/bin/activate

    # Install necessary Python packages

    pip install -r requirements.txt

    ```'
  - '[PAGE 222]


    ```

    # Collect static files

    python manage.py collectstatic —noinput

    # Finally, run our application using gunicorn

    gunicorn your_project_name.wsgi:application —bind 0.0.0.0:8000

    ```


    Don''t forget to make this script executable:


    ```

    chmod +x deploy.sh

    ```


    # 5. Configuration Files:


    While deploying, we need different configurations compared to the development
    environment. This is where configuration files come into play.


    Create a `prod_settings.py` in your Django project''s settings directory. This
    file will contain production-specific configurations. For instance, `DEBUG` should
    be set to `False`.


    Ensure you have secret keys and database configurations hidden, possibly using
    environment variables or secret management tools provided by AWS like AWS Secrets
    Manager.


    # 6. Uploading Our Script and Configs to AWS:


    Now, we will upload our deployment script and configurations to our EC2 instance.
    Make sure you''ve already set up your EC2 instance and have your `.pem` key file
    ready.


    Using SSH:'
  - '[PAGE 223]


    ```

    scp -i path_to_your_key.pem deploy.sh

    ubuntu@your_ec2_ip:/path/on/server


    scp -i path_to_your_key.pem requirements.txt

    ubuntu@your_ec2_ip:/path/on/server


    scp -i path_to_your_key.pem -r your_django_project

    ubuntu@your_ec2_ip:/path/on/server

    ```


    # 7. Conclusion:


    By now, you should have your deployment script and configurations set up on your
    EC2 instance. In the next chapter, we’ll see how to execute this script and get
    our Django project live!


    # Deploy to server


    Assets, Resources, and Materials:


    +   - AWS EC2 Instance: This is the virtual server where we’ll deploy our Django
    project. You can create and manage your EC2 instances through the AWS Management
    Console. (Acquisition: Sign up or log in to your AWS account and navigate to the
    EC2 dashboard).

    - Git: We’ll use Git for version control. (Acquisition: Install from [git-scm.com](
    https://git-scm.com/ )).

    - Virtual Environment: We’ll need our Python virtual environment to manage our
    project’s dependencies. (Acquisition: Use `pip install virtualenv`).

    - Requirements.txt: A file containing a list of all the dependencies our project
    needs. This will be created using `pip freeze > requirements.txt` in our project
    directory.

    - SSH Key Pair: Secure keys for connecting to your EC2 instance. This is generated
    from AWS when you create an EC2 instance.'
- md: "## Introduction\n\nDeploying our API to a server, especially on AWS, is an\
    \ essential step to make our application accessible to users. In this chapter,\
    \ we’ll walk through the process of deploying our Django REST API on an AWS EC2\
    \ instance.\n\n## 1. Prepare Your Django Project for Deployment\n\nBefore deploying,\
    \ ensure the following:\n\n- Your Django project runs without errors locally.\n\
    - `DEBUG` is set to `False` in settings.py.\n- You have added your server’s IP\
    \ address to `ALLOWED_HOSTS` in settings.py.\n- You have generated the `requirements.txt`\
    \ using the command:\n\n```bash\npip freeze > requirements.txt\n```\n\n## 2. Launch\
    \ an EC2 Instance\n\n1. Log into the AWS Management Console and navigate to the\
    \ EC2 dashboard.\n2. Click on “Launch Instance” and select your preferred OS (For\
    \ this guide, we’ll use Ubuntu 18.04).\n3. Choose an instance type (t2.micro is\
    \ free for new AWS users within the free tier).\n4. Click “Next” until you reach\
    \ “Configure Security Group”. Here, add a rule to allow HTTP (Port 80) and HTTPS\
    \ (Port 443).\n5. Launch the instance and create a new key pair if you haven’t.\
    \ Download the key pair (This will be a .pem file) and keep it safe.\n\n## 3.\
    \ Connect to Your EC2 Instance\n\n1. Navigate to your EC2 dashboard and find the\
    \ “Public IP” of your instance.\n2. Open your terminal and navigate to where your\
    \ .pem file is located.\n3. Connect to your instance using SSH:\n\n```bash\nssh\
    \ -i “your-key.pem” ubuntu@your-ec2-public-ip\n```\n\n## 4. Set Up the Environment\
    \ on EC2\n\n1. Update the package list and install essential packages:\n\n```bash\n\
    sudo apt update && sudo apt upgrade -y\nsudo apt install python3-pip python3-venv\
    \ git -y\n```\n\n2. Clone your project from GitHub or transfer your project files\
    \ to the server.\n3. Navigate to your project directory and create a virtual environment:\n\
    \n```bash\npython3 -m venv venv\n```\n\n4. Activate the virtual environment:\n\
    \n```bash\nsource venv/bin/activate\n```\n\n5. Install project dependencies:\n\
    \n```bash\npip install -r requirements.txt\n```\n\n## 5. Set Up a Web Server\n\
    \nWe’ll use Gunicorn as our application server and Nginx as a reverse proxy:\n\
    \n1. Install Gunicorn in your virtual environment:\n\n```bash\npip install gunicorn\n\
    ```\n\n2. Test if Gunicorn can serve your project:\n\n```bash\ngunicorn your_project_name.wsgi:application\
    \ —bind 0.0.0.0:8000\n```\n\n3. Install Nginx:\n\n```bash\nsudo apt install nginx\
    \ -y\n```\n\n4. Configure Nginx to forward requests to Gunicorn. Create a new\
    \ configuration in `/etc/nginx/sites-available/your_project_name` and add the\
    \ following:\n\n```\nserver {\n    listen 80;\n    server_name your-ec2-public-ip;\n\
    \    location / {\n        proxy_pass http://127.0.0.1:8000;\n        proxy_set_header\
    \ Host $host;\n        proxy_set_header X-Real-IP $remote_addr;\n        proxy_set_header\
    \ X-Forwarded-For $proxy_add_x_forwarded_for;\n    }\n}\n```\n\n5. Create a symlink\
    \ for this configuration in `sites-enabled` and restart Nginx:\n\n```bash\nsudo\
    \ ln -s /etc/nginx/sites-available/your_project_name /etc/nginx/sites-enabled\n\
    sudo nginx -t && sudo systemctl restart nginx\n```\n\n## 6. Secure Your Application\
    \ with SSL\n\n1. Add HTTPS to the allowed protocols in your Django settings.\n\
    2. Install Certbot for a free SSL certificate from Let's Encrypt:\n\n```bash\n\
    sudo apt install certbot python3-certbot-nginx -y\n```\n\n3. Request a certificate:\n\
    \n```bash\nsudo certbot —nginx\n```\n\nFollow the prompts and Certbot will automatically\
    \ configure Nginx to use SSL.\n\n## 7. Finalize Deployment\n\n1. Use `systemd`\
    \ to ensure Gunicorn runs as a service. This means it'll start automatically even\
    \ after server reboots.\n2. Keep your application updated by regularly pulling\
    \ changes from your repository and restarting Gunicorn and Nginx as needed.\n\n\
    Congratulations! Your Django REST API is now live on AWS! Ensure to monitor your\
    \ application and regularly backup your server and database.\n\n## Update allowed\
    \ hosts and deploy changes\n\nAssets, Resources, and Materials required for this\
    \ chapter:\n\n- AWS Management Console Access (How to Acquire: Sign up or log\
    \ in at [https://aws.amazon.com/](https://aws.amazon.com/))\n- Python (How to\
    \ Acquire: [Download and install Python](https://www.python.org/downloads/))\n\
    - Django project with your REST API (As built in previous chapters)\n- A code\
    \ editor (For the purpose of this book, we've been using Atom)\n\nIntroduction:\n\
    When deploying a Django project, especially to a public-facing server, it is vital\
    \ to ensure that your application's settings are properly configured for security.\
    \ One of these settings is `ALLOWED_HOSTS`. In Django, the `ALLOWED_HOSTS` setting\
    \ is a security measure to prevent HTTP Host header attacks. Before we move to\
    \ the actual deployment, let's address this setting.\n\nUnderstanding `ALLOWED_HOSTS`:\n\
    Django uses this to match the `Host` header against a list of strings representing\
    \ the `host/domain names` that this Django site can serve. It is a safety mechanism\
    \ to prevent a particular type of security vulnerability.\nIn a development environment,\
    \ you might have come across an error when you didn’t set `ALLOWED_HOSTS` and\
    \ tried to access your application from a different machine or domain. For production,\
    \ we need to be very specific about which hosts are allowed to host our application.\n\
    \nStep 1: Identify your AWS EC2 Public IP and Domain (if available)\nWhen you\
    \ create an AWS EC2 instance, AWS provides you with a Public IPv4 address and\
    \ a Public IPv4 DNS. You’ll need these to update the `ALLOWED_HOSTS` setting.\n\
    \n1. Navigate to the AWS Management Console.\n2. Under the ‘Services’ dropdown,\
    \ select ‘EC2’.\n3. In the EC2 Dashboard, under ‘Instances’, click on ‘Instances’\
    \ to view a list of your instances.\n4. Select the instance you are using for\
    \ your Django deployment. In the ‘Description’ tab below, note down the ‘IPv4\
    \ Public IP’ and ‘Public IPv4 DNS’.\n\nStep 2: Update the `ALLOWED_HOSTS` in settings.py\n\
    Open your Django project in Atom or your preferred code editor. Navigate to the\
    \ `settings.py` file which is typically in the main application directory.\nLocate\
    \ the `ALLOWED_HOSTS` setting. By default, it’s an empty list:\n\n```python\n\
    ALLOWED_HOSTS = []\n```\n\nUpdate it to include the IP and DNS from your AWS EC2\
    \ instance:\n\n```python\nALLOWED_HOSTS = ['your-ec2-ipv4-public-ip', 'your-ec2-public-ipv4-dns']\n\
    ```\n\nReplace `your-ec2-ipv4-public-ip` and `your-ec2-public-ipv4-dns` with the\
    \ values you noted down in the previous step.\n\nNote: If you have a domain name\
    \ pointing to this server, you should add that domain to the list as well.\n\n\
    ## Step 3: Commit Changes\n\n1. Using your terminal or command prompt, navigate\
    \ to your project directory.\n2. Use the following commands to commit your changes:\n\
    \n```bash\ngit add .\ngit commit -m \"Updated ALLOWED_HOSTS for AWS deployment.\"\
    \n```\n\n## Step 4: Deploy Changes to AWS\n\n1. Push your code changes to your\
    \ repository.\n\n```bash\ngit push origin master\n```\n\n2. SSH into your AWS\
    \ EC2 instance:\n\n```bash\nssh -i path-to-your-aws-key-pair.pem ec2-user@your-ec2-ipv4-public-ip\n\
    ```\n\nReplace `path-to-your-aws-key-pair.pem` with the path to your AWS key pair\
    \ and `your-ec2-ipv4-public-ip` with your EC2 instance’s public IP.\n\n3. Navigate\
    \ to the directory where your Django project is located and pull the latest changes:\n\
    \n```bash\ncd path-to-your-django-project\ngit pull origin master\n```\n\n4. Restart\
    \ your server (this could be Gunicorn, uWSGI, etc.) to apply the changes.\n\n\
    Conclusion:\nWith `ALLOWED_HOSTS` properly set, you’ve taken a crucial step in\
    \ ensuring your Django application’s security. It’s essential to update this list\
    \ whenever you’re adding a new domain or IP that should be allowed to host your\
    \ application. Always be cautious and only allow trusted domains or IPs to ensure\
    \ the security of your application.\n\n## ~ Conclusion\n\nAs we close the final\
    \ chapter of our journey into building a REST API with Python & Django, it’s important\
    \ to take a moment to reflect on the skills and knowledge you’ve acquired, and\
    \ the powerful capabilities you now possess as a backend developer.\n\nLooking\
    \ Back: From Basics to Mastery\nStarting with the fundamentals, you learned about\
    \ the importance of backend REST APIs in today’s technology"
  mdcn: "## 引言\n\n将我们的 API 部署到服务器上，尤其是在 AWS 上，是使我们的应用程序可供用户访问的关键一步。在本章中，我们将逐步介绍如何在\
    \ AWS EC2 实例上部署我们的 Django REST API。\n\n## 1. 为部署准备你的 Django 项目\n\n在部署之前，请确保以下几点：\n\
    \n- 你的 Django 项目能在本地无错误地运行。\n- 在 `settings.py` 中，`DEBUG` 已设置为 `False`。\n- 你已将服务器的\
    \ IP 地址添加到 `settings.py` 的 `ALLOWED_HOSTS` 中。\n- 你已使用以下命令生成了 `requirements.txt`：\n\
    \n```bash\npip freeze > requirements.txt\n```\n\n## 2. 启动一个 EC2 实例\n\n1.  登录 AWS\
    \ 管理控制台并导航到 EC2 仪表板。\n2.  点击“启动实例”并选择你偏好的操作系统（在本指南中，我们将使用 Ubuntu 18.04）。\n3. \
    \ 选择一个实例类型（对于新 AWS 用户，在免费套餐内 t2.micro 是免费的）。\n4.  点击“下一步”，直到你到达“配置安全组”。在这里，添加一条规则以允许\
    \ HTTP（端口 80）和 HTTPS（端口 443）。\n5.  启动实例，如果还没有，请创建一个新的密钥对。下载密钥对（这将是一个 .pem 文件）并妥善保管。\n\
    \n## 3. 连接到你的 EC2 实例\n\n1.  导航到你的 EC2 仪表板并找到你实例的“公有 IP”。\n2.  打开你的终端并导航到你的 .pem\
    \ 文件所在的位置。\n3.  使用 SSH 连接到你的实例：\n\n```bash\nssh -i “your-key.pem” ubuntu@your-ec2-public-ip\n\
    ```\n\n## 4. 在 EC2 上设置环境\n\n1.  更新软件包列表并安装必要的软件包：\n\n```bash\nsudo apt update\
    \ && sudo apt upgrade -y\nsudo apt install python3-pip python3-venv git -y\n```\n\
    \n2.  从 GitHub 克隆你的项目或将你的项目文件传输到服务器。\n3.  导航到你的项目目录并创建一个虚拟环境：\n\n```bash\npython3\
    \ -m venv venv\n```\n\n4.  激活虚拟环境：\n\n```bash\nsource venv/bin/activate\n```\n\
    \n5.  安装项目依赖项：\n\n```bash\npip install -r requirements.txt\n```\n\n## 5. 设置 Web\
    \ 服务器\n\n我们将使用 Gunicorn 作为我们的应用服务器，Nginx 作为反向代理：\n\n1.  在你的虚拟环境中安装 Gunicorn：\n\
    \n```bash\npip install gunicorn\n```\n\n2.  测试 Gunicorn 是否可以服务你的项目：\n\n```bash\n\
    gunicorn your_project_name.wsgi:application —bind 0.0.0.0:8000\n```\n\n3.  安装\
    \ Nginx：\n\n```bash\nsudo apt install nginx -y\n```\n\n4.  配置 Nginx 将请求转发给 Gunicorn。在\
    \ `/etc/nginx/sites-available/your_project_name` 创建一个新配置文件并添加以下内容：\n\n```\nserver\
    \ {\n    listen 80;\n    server_name your-ec2-public-ip;\n    location / {\n \
    \       proxy_pass http://127.0.0.1:8000;\n        proxy_set_header Host $host;\n\
    \        proxy_set_header X-Real-IP $remote_addr;\n        proxy_set_header X-Forwarded-For\
    \ $proxy_add_x_forwarded_for;\n    }\n}\n```\n\n5.  在 `sites-enabled` 中为此配置创建一个符号链接并重启\
    \ Nginx：\n\n```bash\nsudo ln -s /etc/nginx/sites-available/your_project_name /etc/nginx/sites-enabled\n\
    sudo nginx -t && sudo systemctl restart nginx\n```\n\n## 6. 使用 SSL 保护你的应用程序\n\n\
    1.  在你的 Django 设置中，将 HTTPS 添加到允许的协议中。\n2.  安装 Certbot 以获取来自 Let's Encrypt 的免费\
    \ SSL 证书：\n\n```bash\nsudo apt install certbot python3-certbot-nginx -y\n```\n\
    \n3.  请求一个证书：\n\n```bash\nsudo certbot —nginx\n```\n\n按照提示操作，Certbot 将自动配置 Nginx\
    \ 以使用 SSL。\n\n## 7. 完成部署\n\n1.  使用 `systemd` 确保 Gunicorn 作为服务运行。这意味着即使服务器重启，它也会自动启动。\n\
    2.  通过定期从你的代码仓库拉取更改并根据需要重启 Gunicorn 和 Nginx 来保持你的应用程序更新。\n\n恭喜！你的 Django REST\
    \ API 现在已在 AWS 上线！请确保监控你的应用程序并定期备份你的服务器和数据库。\n\n## 更新允许的主机并部署更改\n\n本章所需的资产、资源和材料：\n\
    \n- AWS 管理控制台访问权限（获取方式：在 [https://aws.amazon.com/](https://aws.amazon.com/) 注册或登录）\n\
    - Python（获取方式：[下载并安装 Python](https://www.python.org/downloads/)）\n- 包含你的 REST\
    \ API 的 Django 项目（如前面章节所构建）\n- 代码编辑器（本书中，我们一直使用 Atom）\n\n引言：\n当部署 Django 项目时，尤其是部署到面向公众的服务器时，确保你的应用程序设置针对安全性进行正确配置至关重要。其中一个设置就是\
    \ `ALLOWED_HOSTS`。在 Django 中，`ALLOWED_HOSTS` 设置是一项安全措施，用于防止 HTTP 主机头攻击。在我们进行实际部署之前，让我们先处理这个设置。\n\
    \n理解 `ALLOWED_HOSTS`：\nDjango 使用此设置将 `Host` 头与一个字符串列表进行匹配，该列表代表此 Django 站点可以服务的\
    \ `主机/域名`。这是一种安全机制，用于防止特定类型的安全漏洞。\n在开发环境中，你可能遇到过未设置 `ALLOWED_HOSTS` 并尝试从不同机器或域访问应用程序时出现的错误。对于生产环境，我们需要非常明确地指定哪些主机被允许托管我们的应用程序。\n\
    \n步骤 1：确定你的 AWS EC2 公有 IP 和域名（如果可用）\n当你创建一个 AWS EC2 实例时，AWS 会为你提供一个公有 IPv4 地址和一个公有\
    \ IPv4 DNS。你需要这些来更新 `ALLOWED_HOSTS` 设置。\n\n1.  导航到 AWS 管理控制台。\n2.  在“服务”下拉菜单下，选择“EC2”。\n\
    3.  在 EC2 仪表板中，在“实例”下，点击“实例”以查看你的实例列表。\n4.  选择你用于 Django 部署的实例。在下方的“描述”选项卡中，记下“IPv4\
    \ 公有 IP”和“公有 IPv4 DNS”。\n\n步骤 2：在 settings.py 中更新 `ALLOWED_HOSTS`\n在 Atom 或你偏好的代码编辑器中打开你的\
    \ Django 项目。导航到 `settings.py` 文件，该文件通常位于主应用程序目录中。\n找到 `ALLOWED_HOSTS` 设置。默认情况下，它是一个空列表：\n\
    \n```python\nALLOWED_HOSTS = []\n```\n\n将其更新为包含你的 AWS EC2 实例的 IP 和 DNS：\n\n```python\n\
    ALLOWED_HOSTS = ['your-ec2-ipv4-public-ip', 'your-ec2-public-ipv4-dns']\n```\n\
    \n将 `your-ec2-ipv4-public-ip` 和 `your-ec2-public-ipv4-dns` 替换为你在上一步中记下的值。\n\n\
    注意：如果你有一个域名指向此服务器，你也应该将该域名添加到列表中。\n\n## 步骤 3：提交更改\n\n1.  使用你的终端或命令提示符，导航到你的项目目录。\n\
    2.  使用以下命令提交你的更改：\n\n```bash\ngit add .\ngit commit -m \"Updated ALLOWED_HOSTS\
    \ for AWS deployment.\"\n```\n\n## 步骤 4：将更改部署到 AWS\n\n1.  将你的代码更改推送到你的代码仓库。\n\n\
    ```bash\ngit push origin master\n```\n\n2.  SSH 连接到你的 AWS EC2 实例：\n\n```bash\n\
    ssh -i path-to-your-aws-key-pair.pem ec2-user@your-ec2-ipv4-public-ip\n```\n\n\
    将 `path-to-your-aws-key-pair.pem` 替换为你的 AWS 密钥对的路径，将 `your-ec2-ipv4-public-ip`\
    \ 替换为你的 EC2 实例的公有 IP。\n\n3.  导航到你的 Django 项目所在的目录并拉取最新的更改：\n\n```bash\ncd path-to-your-django-project\n\
    git pull origin master\n```\n\n4.  重启你的服务器（这可能是 Gunicorn、uWSGI 等）以应用更改。\n\n结论：\n\
    通过正确设置 `ALLOWED_HOSTS`，你已采取了确保 Django 应用程序安全性的关键一步。每当你要添加一个新的域名或 IP 来托管你的应用程序时，更新此列表至关重要。请始终保持谨慎，只允许受信任的域名或\
    \ IP，以确保你的应用程序的安全。\n\n## ~ 结语\n\n随着我们关于使用 Python 和 Django 构建 REST API 的旅程的最后一章结束，花点时间反思一下你所获得的技能和知识，以及你现在作为后端开发者所拥有的强大能力，这很重要。\n\
    \n回顾：从基础到精通\n从基础开始，你了解了后端 REST API 在当今技术中的重要性"
