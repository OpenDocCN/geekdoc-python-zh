    # Introduction


    Pushing your project to GitHub not only serves as a backup but also allows other
    developers to collaborate, view, or even use your project. With the development
    environment set up in the previous chapters, we are now ready to push our project
    to GitHub. Let’s dive in!


    # 1. Setting Up Your GitHub Repository


    1.1 Log into GitHub: Open your browser and log into your GitHub account.


    1.2 Create a New Repository: On the top right corner, click on the ‘+’ symbol
    and choose ‘New repository’. Name your repository, e.g., “django_rest_api_beginner”.
    Provide a description if desired. For this tutorial, let’s keep the repository
    public. Do not initialize with a README, .gitignore, or license - we’ll add those
    manually later.


    # 2. Initializing a Local Git Repository


    With the GitHub repository set up, it’s time to prepare our local project.


    2.1 Open the Terminal or Command Prompt: Navigate to your project directory using
    the `cd` command. For example:


    ```

    bash

    cd path_to_your_project_directory/django_rest_api_project/

    ```


    2.2 Initialize Git: Run the following command to initialize a new git repository:


    ```

    bash

    git init

    ```'
