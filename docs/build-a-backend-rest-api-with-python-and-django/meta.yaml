    \ modules: (Comes with DRF installation. For creating and managing permissions.)\n\
    \nIntroduction:\n\nWhen working with REST APIs, it’s crucial to implement the\
    \ necessary permissions to safeguard sensitive data and ensure proper data flow\
    \ between the frontend and backend. In this chapter, we’ll focus on creating a\
    \ custom permission class for our Profiles API using Django REST Framework.\n\n\
    ## What is a Permission Class?\n\nPermission classes in Django REST Framework\
    \ determine whether a request should be granted or denied access. DRF provides\
    \ a set of built-in permission classes like `IsAuthenticated`, `IsAdminUser`,\
    \ and `IsAuthenticatedOrReadOnly`. While these built-in classes are helpful, sometimes\
    \ you’ll need more customized behavior, and that’s where creating your own permission\
    \ classes comes into play.\n\n## Steps to Create a Custom Permission Class:\n\n\
    1.  Create a New Permissions File:\n    In your `profiles_api` app directory,\
    \ create a new file named `permissions.py`.\n\n    ```bash\n    touch profiles_api/permissions.py\n\
    \    ```\n\n2.  Setting up the Permission Class:\n    In `permissions.py`, begin\
    \ by importing necessary modules and then define your custom permission class.\n\
    \n    ```python\n    from rest_framework import permissions\n\n    class UpdateOwnProfile(permissions.BasePermission):\n\
    \        \"\"\"Allow users to edit their own profile\"\"\"\n        def has_object_permission(self,\
    \ request, view, obj):\n            \"\"\"Check user is trying to edit their own\
    \ profile\"\"\"\n            if request.method in permissions.SAFE_METHODS:\n\
    \                return True\n            return obj.id == request.user.id\n \
    \   ```\n\n    Here, we've created a permission called `UpdateOwnProfile` which\
    \ checks if the request is a safe method (GET, HEAD, or OPTIONS). If it's a safe\
    \ method, the request is granted permission, otherwise, it checks if the object\
    \ the user is trying to modify belongs to them by comparing the object's id with\
    \ the user's id.\n\n3.  Implementing the Permission:\n    Go to `views.py` in\
    \ the `profiles_api` app directory. Here, you'll have to add the custom permission\
    \ class to your `ProfileViewSet`.\n    First, import the custom permission at\
    \ the top:\n\n    ```python\n    from .permissions import UpdateOwnProfile\n \
    \   ```\n\n    Then, within your `ProfileViewSet`, add the permission to the `permission_classes`\
    \ attribute:\n\n    ```python\n    permission_classes = [UpdateOwnProfile, ]\n\
    \    ```\n\n    Now, any time a request is made to `ProfileViewSet`, the `UpdateOwnProfile`\
    \ permission class will be used to check if the request should be granted or denied\
    \ access.\n\nTesting the Permission:\nWith the permission class now in place,\
    \ it's important to test it. This can be done using tools like Postman or your\
    \ browser. Try to update a profile other than your own and observe the result.\
    \ If the permission class is functioning correctly, you should get a forbidden\
    \ response for such requests.\n\nConclusion:\nPermission classes are a powerful\
    \ way to handle permissions and access control in Django REST Framework. By understanding\
    \ and using them effectively, you can create a secure environment for your data\
    \ and API users. The custom permission class we just created ensures that users\
    \ can only modify their own data, keeping our Profiles API secure and functional.\n\
    \n## Add authentication and permissions to Viewset\n\nAssets and Resources:\n\n\
    - Django REST Framework (DRF) Documentation: [Official DRF Documentation](https://www.django-rest-framework.org/)\n\
