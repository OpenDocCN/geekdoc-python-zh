- md: "## 3. Registering the Login API Viewset with URLs:\n\nIn your `urls.py`:\n\n\
    ```python\nfrom django.urls import path, include\nfrom rest_framework.routers\
    \ import DefaultRouter\nfrom . import views\n\nrouter = DefaultRouter()\nrouter.register('login',\
    \ views.LoginViewSet, basename='login')\n\nurlpatterns = [\n    path('', include(router.urls)),\n\
    ]\n```\n\nNow, the endpoint `/login/` is ready to receive POST requests for user\
    \ logins.\n\n## 4. Testing the Login API:\n\nWe'll use Postman for this:\n\n1.\
    \  Open Postman.\n2.  Set the request type to `POST`.\n3.  Enter the URL: `http://localhost:8000/login/`.\n\
    4.  Under ‘Body’, choose ‘raw’ and ‘JSON (application/json)’.\n5.  Enter the following:\n\
    \    ```json\n    {\n        \"username\": \"yourUsername\",\n        \"password\"\
    : \"yourPassword\"\n    }\n    ```\n    Replace `yourUsername` and `yourPassword`\
    \ with the credentials of a user in your database.\n6.  Click ‘Send’. If successful,\
    \ you’ll receive a token in the response. Otherwise, you’ll get an error message.\n\
    \n**Conclusion:**\n\nBy the end of this chapter, you’ve successfully set up a\
    \ Login API Viewset that authenticates users and returns a token for authenticated\
    \ requests. This token will be vital for making secure API calls in subsequent\
    \ parts of your application.\n\nRemember, security is paramount. Always keep your\
    \ tokens secure, never expose them in client-side code, and make sure your API\
    \ uses HTTPS in production to ensure encrypted communication.\n\nIn the next chapter,\
    \ we’ll discuss how to test our Login API, ensuring it functions as expected and\
    \ remains secure against potential threats.\n\n## Test login API\n\n**Assets,\
    \ Resources, and Materials for this Chapter:**\n\n1.  Postman - A popular tool\
    \ for testing APIs. (You can download it from the [official Postman website](https://www.postman.com/downloads/))\n\
    2.  Login API Endpoint - The URL you’ve set up for your login functionality.\n\
    3.  Django Dev Server - Make sure your development server is running.\n4.  Credentials\
    \ - A set of username and password to test the login functionality. If you haven’t\
    \ created any users, you’d need to do so in the Django Admin.\n\n## Introduction\n\
    \nOnce you’ve set up your login API, it’s imperative to ensure it’s functioning\
    \ as expected. Testing is a critical phase in any development process, ensuring\
    \ the correctness and reliability of the system. In this chapter, we will use\
    \ Postman, a powerful API testing tool, to test our login API.\n\n## Setting Up\
    \ Postman\n\n1.  Installation: If you haven’t already, download and install Postman\
    \ from the provided link.\n2.  Launching and Initial Setup:\n    - Launch Postman\
    \ after installation.\n    - If you’re a first-time user, you can skip the initial\
    \ signup unless you want to save your collections to the cloud.\n3.  Setting Up\
    \ A New Request:\n    - Click on the ‘+’ tab to create a new request.\n    - From\
    \ the dropdown menu next to the URL input field, select ‘POST’ since our login\
    \ API would typically use the POST method.\n    - Input your Login API Endpoint\
    \ in the URL field (e.g., `http://127.0.0.1:8000/api/login/`).\n\n## Testing the\
    \ Login API\n\n1.  Adding Headers:\n    - In Postman, under the ‘Headers’ tab,\
    \ you need to add a key-value pair:\n        - Key: `Content-Type`\n        -\
    \ Value: `application/json`\n    This tells the server that you’re sending JSON\
    \ data.\n2.  Inputting Body Data:\n    - Switch to the ‘Body’ tab in Postman.\n\
    \    - Select the ‘raw’ option and ensure ‘JSON’ is selected from the dropdown.\n\
    \    - Input a set of valid credentials. For instance:\n        ```json\n    \
    \    {\n          \"username\": \"sampleuser\",\n          \"password\": \"samplepassword123\"\
    \n        }\n        ```\n3.  Sending the Request:\n    - Click the blue ‘Send’\
    \ button.\n    - Observe the response. If your API and server are functioning\
    \ properly, you should receive a token as part of the response. This token represents\
    \ a successful login and can be used for subsequent authenticated requests.\n\
    4.  Negative Testing:\n    - It’s not just about positive scenarios (where everything\
    \ works). You need to test what happens when things go wrong.\n    - Try inputting\
    \ an incorrect password or username. The expected response should be an error,\
    \ indicating invalid credentials.\n    - Input incomplete data, like omitting\
    \ the password or username. The API should respond with an error indicating the\
    \ missing fields.\n\n## 5. Testing Token Expiry (Optional):\n\n- Depending on\
    \ your settings in Django Rest Framework, tokens might have an expiry time. If\
    \ you’ve set up token expiration, wait for that duration and then try accessing\
    \ an authenticated endpoint using the expired token. You should receive an ‘invalid\
    \ token’ or ‘token expired’ response.\n\n## Conclusion\n\nTesting is a continuous\
    \ and ongoing process. Even after deploying your API, you should routinely perform\
    \ tests, especially after making changes or updates. Using tools like Postman\
    \ can significantly simplify and streamline the process, ensuring that your Login\
    \ API is robust, secure, and reliable.\n\nIn the next chapter, we’ll explore how\
    \ to set the token received upon successful login in the ModHeader extension,\
    \ allowing for easy access to authenticated routes during further testing and\
    \ development.\n\n> Note: This chapter focuses on manual testing using Postman.\
    \ In a real-world scenario, especially for larger applications, you’d also want\
    \ to implement automated tests for your APIs to ensure stability and consistency.\n\
    \n## Set token header using ModHeader extension\n\n**Assets, Resources, and Materials\
    \ for this Chapter:**\n\n- ModHeader Extension: This is a browser extension that\
    \ allows you to manipulate browser request headers. It’s available for both Google\
    \ Chrome and Mozilla Firefox.\n- Your API: Ensure you have your Django REST API\
    \ up and running, especially the login API endpoint we developed in the previous\
    \ chapters.\n\n## Introduction\n\nAfter successfully logging in via our login\
    \ API endpoint, a token will typically be returned to authenticate future requests.\
    \ This token assures the server that the request comes from a legitimate, authenticated\
    \ user. To send this token with each request, we need to include it in the request\
    \ headers. One popular and straightforward way to do this during development and\
