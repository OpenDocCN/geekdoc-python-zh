    ```

    ssh -i path-to-your-aws-key-pair.pem ec2-user@your-ec2-ipv4-public-ip

    ```


    Replace `path-to-your-aws-key-pair.pem` with the path to your AWS key pair and
    `your-ec2-ipv4-public-ip` with your EC2 instance’s public IP.


    3. Navigate to the directory where your Django project is located and pull the
    latest changes:


    ```

    bash

    cd path-to-your-django-project

    git pull origin master

    ```


    4. Restart your server (this could be Gunicorn, uWSGI, etc.) to apply the changes.


    Conclusion:

    With `ALLOWED_HOSTS` properly set, you’ve taken a crucial step in ensuring your
    Django application’s security. It’s essential to update this list whenever you’re
    adding a new domain or IP that should be allowed to host your application. Always
    be cautious and only allow trusted domains or IPs to ensure the security of your
    application.


    # ~ Conclusion


    As we close the final chapter of our journey into building a REST API with Python
    & Django, it’s important to take a moment to reflect on the skills and knowledge
    you’ve acquired, and the powerful capabilities you now possess as a backend developer.


    Looking Back: From Basics to Mastery

    Starting with the fundamentals, you learned about the importance of backend REST
    APIs in today’s technology'
