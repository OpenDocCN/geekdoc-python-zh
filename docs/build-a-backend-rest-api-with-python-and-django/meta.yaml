- md: "## 5. Running the Tests\n\nNavigate to the root directory of your Django project\
    \ in the terminal. Run the tests with:\n\n```bash\npython manage.py test\n```\n\
    \nDjango will search for all the files that start with the word `test` and execute\
    \ them. Ensure that all your tests pass. If any fail, the console will provide\
    \ a descriptive error message to help you identify and fix the problem.\n\nTesting\
    \ your Viewset ensures that your API behaves as expected. It's a crucial step\
    \ in building a robust and reliable application. Always make it a practice to\
    \ write tests whenever you introduce new features or modify existing ones. This\
    \ habit will save you countless hours debugging in the future and will give you\
    \ the confidence that your application works under all scenarios.\n\n## Section\
    \ 10: Create Profiles API\n\n### Plan our Profiles API\n\nAssets, Resources, and\
    \ Materials:\n\n- User Stories or Use Cases: (These are hypothetical scenarios\
    \ that detail how a user interacts with a feature or system. They can be created\
    \ using tools like JIRA, Trello, or even just paper and pen. Purpose: To help\
    \ understand user requirements.)\n- UML Diagram Tool: (Unified Modeling Language\
    \ tools like Lucidchart, Draw.io, or even paper and pencil. Purpose: For creating\
    \ entity relationship diagrams to map out our data structures.)\n- API Design\
    \ Tool: (Tools like Swagger or Postman. Purpose: To visualize the API endpoints\
    \ and methods.)\n\n### Introduction:\n\nPlanning an API is a critical step in\
    \ its development lifecycle. Properly planning ensures that the development process\
    \ is streamlined and reduces the chance of missing critical features or introducing\
    \ bugs. For our Profiles API, our main objective is to provide functionality to\
    \ handle user profiles – including creating, reading, updating, and deleting them.\n\
    \n### 1. User Stories:\n\nBefore we begin coding, it’s essential to understand\
    \ what the end user expects from our API. User stories are an effective way to\
    \ capture these requirements. Here are a few user stories relevant to our Profiles\
    \ API:\n\n- As a user, I want to create a profile with my name, email, and profile\
    \ picture.\n- As a user, I want to view my profile.\n- As a user, I want to update\
    \ my profile information.\n- As a user, I want to delete my profile.\n- As a user,\
    \ I want to search for other users by their names or email addresses.\n\n### 2.\
    \ Define the Data Model:\n\nWith our user stories in place, we need to design\
    \ the data model for our Profiles API. Based on the requirements, our Profile\
    \ model might look like this:\n\n- `User_ID`: Unique identifier for the user.\n\
    - `Name`: Full name of the user.\n- `Email`: Email address of the user.\n- `Profile_Picture`:\
    \ URL of the profile picture.\n- `Created_At`: Date and time when the profile\
    \ was created.\n- `Updated_At`: Date and time when the profile was last updated.\n\
    \n### 3. Designing the API Endpoints:\n\nUsing our user stories and data model,\
    \ we can now plan the endpoints of our Profiles API:\n\n- Create a Profile:\n\
    \  - Endpoint: `POST /profiles/`\n  - Payload: `{ \"name\": \"John Doe\", \"email\"\
    : \"john@example.com\", \"profile_picture\": \"url_to_picture\" }`\n- Get a Profile:\n\
    \  - Endpoint: `GET /profiles/<User_ID>/`\n- Update a Profile:\n  - Endpoint:\
    \ `PUT /profiles/<User_ID>/`\n  - Payload: `{ \"name\": \"John A. Doe\", \"email\"\
    : \"john.a@example.com\", \"profile_picture\": \"new_url_to_picture\" }`\n- Delete\
    \ a Profile:\n  - Endpoint: `DELETE /profiles/<User_ID>/`\n- Search Profiles:\n\
    \  - Endpoint: `GET /profiles/?search=<query>`\n  - This will search for profiles\
    \ by name or email.\n\n### 4. API Response and Status Codes:\n\nTo ensure our\
    \ API communicates effectively with the frontend or other services, we need to\
    \ use appropriate status codes and response messages. For example:\n\n- `200 OK`:\
    \ Successful GET request.\n- `201 Created`: Profile successfully created.\n- `204\
    \ No Content`: Successful DELETE request.\n- `400 Bad Request`: If the request\
    \ payload is incorrect.\n- `404 Not Found`: If a profile with a given ID is not\
    \ found.\n\n### 5. Security Considerations:\n\nWhen planning our API, it’s crucial\
    \ to keep security in mind:\n\n- Authentication: Ensure that only authenticated\
    \ users can create, update, or delete profiles.\n- Authorization: A user should\
    \ only be able to update or delete their own profile, not someone else’s.\n- Data\
    \ Validation: Validate all incoming data to prevent malicious input.\n- Rate Limiting:\
    \ Implement rate limiting to prevent abuse.\n\n### Conclusion:\n\nBy planning\
    \ our Profiles API in advance, we’ve laid a clear roadmap for its development.\
    \ The next steps will involve actual development, where we’ll implement our data\
    \ models, API endpoints, and security measures based on this plan. Remember, a\
    \ well-planned API often translates to a well-implemented one!\n\n### Create user\
    \ profile serializer\n\nAssets and Resources:\n\n- Django REST Framework (DRF):\
    \ A powerful and flexible toolkit for building Web APIs. You can install it using\
    \ pip: `pip install djangorestframework`.\n- Django: Ensure you have Django installed.\
    \ If not, use pip: `pip install Django`.\n- Python: The core language in which\
    \ Django and DRF are written.\n- User Model: We would have created this in Chapter\
    \ 18. The user model serves as the structure for storing user information in the\
    \ database.\n\n### Introduction\n\nSerializers in Django REST Framework (DRF)\
    \ allow complex data types like Django models to be converted to Python data types.\
    \ In the context of APIs, these Python data types can then be easily rendered\
    \ into JSON or XML for client consumption. For our project, the primary use of\
    \ serializers will be to convert our User Profile instances into JSON format.\n\
    \nIn this chapter, we’ll focus on creating a serializer for our user profile,\
    \ which will play a crucial role in the data exchange between the client and the\
    \ server.\n\n### Step 1: Creating the Serializer File\n\n1. Within your Django\
    \ app folder (where models.py, views.py, etc. are located), create a new file\
    \ called `serializers.py`.\n\n### Step 2: Set up the Serializer\n\nIn `serializers.py`:\n\
    \n```python\nfrom rest_framework import serializers\nfrom .models import UserProfile\n\
    \nclass UserProfileSerializer(serializers.ModelSerializer):\n    class Meta:\n\
    \        model = UserProfile\n        fields = ('id', 'email', 'name', 'password')\n\
    \        extra_kwargs = {\n            'password': {\n                'write_only':\
    \ True,\n                'style': {'input_type': 'password'}\n            }\n\
    \        }\n```\n\nLet's breakdown what we did:\n\n- Import Necessary Modules:\
    \ We imported the `serializers` from DRF and our `UserProfile` model.\n- UserProfileSerializer:\
    \ This is our new serializer class which inherits from `serializers.ModelSerializer`.\n\
    \    - Within the nested `Meta` class:\n        - `model = UserProfile`: This\
    \ ties our serializer to the `UserProfile` model.\n        - `fields`: Specifies\
    \ which fields from the model we want to be included in the serialized representation.\n\
    \        - `extra_kwargs`: Provides additional options for our serializer. In\
    \ this case, we're specifying that the password field should be write-only (for\
    \ security) and its input type should be of type password (so it will be hidden\
    \ in forms).\n\n### Step 3: Serializer Methods (optional but recommended)\n\n\
    To enhance the functionality and security of our API, we can add custom methods\
    \ to our serializer. For instance, let's ensure that when a user profile is created\
    \ using the serializer, the password is saved in a hashed format:\n\n```python\n\
    def create(self, validated_data):\n    \"\"\"Create and return a new user, with\
    \ encrypted password\"\"\"\n    user = UserProfile.objects.create_user(\n    \
    \    email=validated_data['email'],\n        name=validated_data['name'],\n  \
    \      password=validated_data['password']\n    )\n    return user\n```\n\nWith\
    \ this method, when a new user is created using this serializer, the password\
    \ is stored securely.\n\n### Conclusion\n\nSerializers are an essential part of\
    \ Django REST Framework applications, allowing us to easily validate and transform\
    \ data between Python objects and JSON representations. With our `UserProfileSerializer`\
    \ in place, we’re now ready to handle user profile data in our API views and viewsets\
    \ in subsequent chapters. Remember, serializers not only ensure our data is correctly\
    \ formatted but also play a pivotal role in the security of our data exchange.\n\
    \n### Create profiles ViewSet\n\nAssets, Resources, and Materials:\n\n- Django\
    \ REST Framework (DRF): To install, use the pip package manager by running `pip\
    \ install djangorestframework`. We’ll use DRF to create our ViewSets.\n- Django\
    \ Project & App: Should already be set up from previous chapters."
  mdcn: "## 5. 运行测试\n\n在终端中导航到你的 Django 项目根目录。运行以下命令执行测试：\n\n```bash\npython manage.py\
    \ test\n```\n\nDjango 会搜索所有以 `test` 开头的文件并执行它们。确保所有测试都通过。如果有任何测试失败，控制台会提供详细的错误信息，帮助你识别并修复问题。\n\
    \n测试你的视图集可以确保你的 API 行为符合预期。这是构建健壮可靠应用程序的关键步骤。请养成在引入新功能或修改现有功能时编写测试的习惯。这个习惯将为你未来节省无数调试时间，并让你对应用程序在所有场景下都能正常工作充满信心。\n\
    \n## 第10节：创建用户资料 API\n\n### 规划我们的用户资料 API\n\n资产、资源和材料：\n\n- 用户故事或用例：（这些是详细描述用户如何与功能或系统交互的假设场景。可以使用\
    \ JIRA、Trello 甚至纸笔等工具创建。目的：帮助理解用户需求。）\n- UML 图工具：（统一建模语言工具，如 Lucidchart、Draw.io，甚至纸笔。目的：创建实体关系图以规划我们的数据结构。）\n\
    - API 设计工具：（如 Swagger 或 Postman 等工具。目的：可视化 API 端点和方法。）\n\n### 介绍：\n\n规划 API 是其开发生命周期中的关键步骤。适当的规划可以确保开发流程顺畅，并降低遗漏关键功能或引入错误的可能性。对于我们的用户资料\
    \ API，我们的主要目标是提供处理用户资料的功能——包括创建、读取、更新和删除它们。\n\n### 1. 用户故事：\n\n在开始编码之前，了解最终用户对我们\
    \ API 的期望至关重要。用户故事是捕获这些需求的有效方式。以下是与我们的用户资料 API 相关的一些用户故事：\n\n- 作为用户，我希望能用我的姓名、电子邮件和个人资料图片创建一个资料。\n\
    - 作为用户，我希望能查看我的资料。\n- 作为用户，我希望能更新我的资料信息。\n- 作为用户，我希望能删除我的资料。\n- 作为用户，我希望能通过姓名或电子邮件地址搜索其他用户。\n\
    \n### 2. 定义数据模型：\n\n有了用户故事，我们需要为我们的用户资料 API 设计数据模型。根据需求，我们的 Profile 模型可能如下所示：\n\
    \n- `User_ID`：用户的唯一标识符。\n- `Name`：用户的全名。\n- `Email`：用户的电子邮件地址。\n- `Profile_Picture`：个人资料图片的\
    \ URL。\n- `Created_At`：资料创建的日期和时间。\n- `Updated_At`：资料最后更新的日期和时间。\n\n### 3. 设计\
    \ API 端点：\n\n利用我们的用户故事和数据模型，我们现在可以规划用户资料 API 的端点：\n\n- 创建资料：\n  - 端点：`POST /profiles/`\n\
    \  - 载荷：`{ \"name\": \"John Doe\", \"email\": \"john@example.com\", \"profile_picture\"\
    : \"url_to_picture\" }`\n- 获取资料：\n  - 端点：`GET /profiles/<User_ID>/`\n- 更新资料：\n\
    \  - 端点：`PUT /profiles/<User_ID>/`\n  - 载荷：`{ \"name\": \"John A. Doe\", \"email\"\
    : \"john.a@example.com\", \"profile_picture\": \"new_url_to_picture\" }`\n- 删除资料：\n\
    \  - 端点：`DELETE /profiles/<User_ID>/`\n- 搜索资料：\n  - 端点：`GET /profiles/?search=<query>`\n\
    \  - 这将按姓名或电子邮件搜索资料。\n\n### 4. API 响应和状态码：\n\n为了确保我们的 API 与前端或其他服务有效通信，我们需要使用适当的状态码和响应消息。例如：\n\
    \n- `200 OK`：成功的 GET 请求。\n- `201 Created`：资料创建成功。\n- `204 No Content`：成功的 DELETE\
    \ 请求。\n- `400 Bad Request`：如果请求载荷不正确。\n- `404 Not Found`：如果找不到具有给定 ID 的资料。\n\n\
    ### 5. 安全考虑：\n\n在规划我们的 API 时，牢记安全至关重要：\n\n- 认证：确保只有经过认证的用户才能创建、更新或删除资料。\n- 授权：用户应该只能更新或删除自己的资料，而不是别人的。\n\
    - 数据验证：验证所有传入的数据以防止恶意输入。\n- 速率限制：实施速率限制以防止滥用。\n\n### 结论：\n\n通过提前规划我们的用户资料 API，我们为其开发奠定了清晰的路线图。下一步将涉及实际开发，我们将根据此计划实现数据模型、API\
    \ 端点和安全措施。请记住，规划良好的 API 通常意味着实现良好的 API！\n\n### 创建用户资料序列化器\n\n资产和资源：\n\n- Django\
    \ REST Framework (DRF)：一个强大且灵活的 Web API 构建工具包。你可以使用 pip 安装它：`pip install djangorestframework`。\n\
    - Django：确保你已安装 Django。如果没有，请使用 pip：`pip install Django`。\n- Python：Django 和 DRF\
    \ 编写所用的核心语言。\n- 用户模型：我们将在第18章中创建它。用户模型是数据库中存储用户信息的结构。\n\n### 介绍\n\nDjango REST\
    \ Framework (DRF) 中的序列化器允许将复杂数据类型（如 Django 模型）转换为 Python 数据类型。在 API 的上下文中，这些 Python\
    \ 数据类型随后可以轻松渲染为 JSON 或 XML 供客户端使用。对于我们的项目，序列化器的主要用途是将我们的用户资料实例转换为 JSON 格式。\n\n\
    在本章中，我们将专注于为我们的用户资料创建一个序列化器，它将在客户端和服务器之间的数据交换中扮演关键角色。\n\n### 步骤 1：创建序列化器文件\n\n\
    1. 在你的 Django 应用文件夹内（models.py、views.py 等所在的位置），创建一个名为 `serializers.py` 的新文件。\n\
    \n### 步骤 2：设置序列化器\n\n在 `serializers.py` 中：\n\n```python\nfrom rest_framework import\
    \ serializers\nfrom .models import UserProfile\n\nclass UserProfileSerializer(serializers.ModelSerializer):\n\
    \    class Meta:\n        model = UserProfile\n        fields = ('id', 'email',\
    \ 'name', 'password')\n        extra_kwargs = {\n            'password': {\n \
    \               'write_only': True,\n                'style': {'input_type': 'password'}\n\
    \            }\n        }\n```\n\n让我们分解一下我们做了什么：\n\n- 导入必要模块：我们从 DRF 导入了 `serializers`，并导入了我们的\
    \ `UserProfile` 模型。\n- UserProfileSerializer：这是我们新的序列化器类，它继承自 `serializers.ModelSerializer`。\n\
    \    - 在嵌套的 `Meta` 类中：\n        - `model = UserProfile`：这将我们的序列化器与 `UserProfile`\
    \ 模型关联起来。\n        - `fields`：指定我们希望在序列化表示中包含模型的哪些字段。\n        - `extra_kwargs`：为我们的序列化器提供额外选项。在这种情况下，我们指定密码字段应该是只写的（出于安全考虑），并且其输入类型应该是密码类型（因此在表单中会被隐藏）。\n\
    \n### 步骤 3：序列化器方法（可选但推荐）\n\n为了增强我们 API 的功能和安全性，我们可以向序列化器添加自定义方法。例如，让我们确保当使用序列化器创建用户资料时，密码以哈希格式保存：\n\
    \n```python\ndef create(self, validated_data):\n    \"\"\"创建并返回一个新用户，密码已加密\"\"\
    \"\n    user = UserProfile.objects.create_user(\n        email=validated_data['email'],\n\
    \        name=validated_data['name'],\n        password=validated_data['password']\n\
    \    )\n    return user\n```\n\n通过这个方法，当使用此序列化器创建新用户时，密码会被安全地存储。\n\n### 结论\n\n\
    序列化器是 Django REST Framework 应用程序的重要组成部分，使我们能够轻松地在 Python 对象和 JSON 表示之间验证和转换数据。有了我们的\
    \ `UserProfileSerializer`，我们现在准备好在后续章节的 API 视图和视图集中处理用户资料数据。请记住，序列化器不仅确保我们的数据格式正确，还在数据交换的安全性方面发挥着关键作用。\n\
    \n### 创建用户资料视图集\n\n资产、资源和材料：\n\n- Django REST Framework (DRF)：要安装，请使用 pip 包管理器运行\
