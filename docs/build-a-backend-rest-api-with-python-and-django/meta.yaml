  md: '# 1. Introduction


    Django’s database-abstraction API allows you to create, retrieve, update, and
    delete records without writing a single line of SQL. This is possible due to its
    Object-Relational Mapping (ORM) layer. One of the most powerful parts of Django
    is its ORM, and migrations play a key role in it. Migrations are Django’s way
    of propagating changes you make to your models (adding a field, deleting a model,
    etc.) into your database schema.


    # 2. Why Migrations?


    When we define or modify our model classes in Django, the actual database tables
    aren’t immediately affected. Instead, Django tracks the changes and allows us
    to apply them in a systematic way using migrations. Migrations solve the problem
    of evolving a database schema without manual intervention.


    # 3. The `makemigrations` Command


    Before we can apply migrations, we need to create them. After making changes to
    a Django model:


    +   1. Open your terminal or command prompt.

    2. Navigate to the root directory of your Django project.

    3. Enter the following command:


    ```

    bash

    python manage.py makemigrations

    ```


    This will check your model definitions against the current state of your database
    and generate migration files – scripts that, when run, will modify your database
    schema to reflect the changes you’ve made to your models.


    You should see an output similar to:


    ```

    bash

    ```'
  merge: -1
