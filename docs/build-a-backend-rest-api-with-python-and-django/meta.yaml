    \ API 视图集，该视图集可以对用户进行身份验证，并为经过身份验证的请求返回一个令牌。此令牌对于在应用程序的后续部分中进行安全的 API 调用至关重要。\n\
    \n请记住，安全至关重要。始终确保你的令牌安全，切勿在客户端代码中暴露它们，并确保你的 API 在生产环境中使用 HTTPS 以确保加密通信。\n\n在下一章中，我们将讨论如何测试我们的登录\
    \ API，确保其按预期运行并能抵御潜在威胁。\n\n## 测试登录 API\n\n**本章的资产、资源和材料：**\n\n1.  Postman - 一个流行的\
