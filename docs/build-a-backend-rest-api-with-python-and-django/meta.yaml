  - '[PAGE 71]


    # 6. Rolling Back Migrations


    In case you made a mistake or want to revert to a previous database state, Django
    allows you to “unapply” migrations. To roll back a migration:


    ```

    bash

    python manage.py migrate app_name 0001_initial

    ```


    This will unapply all migrations for `app_name` after `0001_initial`.


    # 7. Common Issues and Tips


    +   - No changes detected: If you run `makemigrations` and see “No changes detected”,
    double-check that you’ve saved your models.py file and that the model’s app is
    included in the `INSTALLED_APPS` setting.

    - Dependencies: Migrations can have dependencies on other migrations or even other
    apps. Django is usually smart about figuring out the correct order, but sometimes
    you might need to give it hints.

    - Conflicting migrations: If you’re working in a team and multiple developers
    are making changes to the same models, you might encounter “conflicting migrations”.
    You’ll need to coordinate with your team to resolve these manually.


    # 8. Summary


    In this chapter, we delved into the world of Django’s database migrations. Migrations
    allow us to evolve our database schema in a controlled and systematic manner.
    By using the commands `makemigrations` and `migrate`, we can efficiently handle
    changes to our models and keep our database in sync. Remember to always test migrations
    in a development environment before applying them in production to avoid unexpected
    issues.'
