    \ Deploy to server\n- Chapter 69: Update allowed hosts and deploy changes\n- Conclusion\n\
    \n## Section 1: Introduction\n\n### Course Overview\n\nWelcome to the introductory\
    \ chapter of “Build a Backend REST API with Python & Django - Beginner”. This\
    \ chapter is designed to provide you with an overview of what to expect as you\
    \ journey through this course. By the end, you should have a clear idea of what\
    \ topics will be covered, and you’ll be prepared to dive into the more hands-on\
    \ sections that follow.\n\n### 1.1 Purpose of the Course\n\nThe primary purpose\
    \ of this course is to guide you in building a robust, secure, and scalable backend\
    \ REST API using the Django and Django REST Framework (DRF). The knowledge and\
    \ skills you acquire here are essential in today’s world of app and web development.\
    \ Whether you’re a startup wanting to launch the next big thing or a developer\
    \ looking to expand your skill set, mastering the art of creating a backend can\
    \ exponentially increase the potential and power of your applications.\n\n###\
    \ 1.2 Why Django and Django REST Framework?\n\nDjango is a high-level, open-source\
    \ web framework written in Python. It follows the “Don’t repeat yourself” (DRY)\
    \ principle and emphasizes the reusability of code. This makes it one of the most\
    \ efficient frameworks to develop web applications.\n\nThe Django REST Framework,\
    \ or DRF, is a powerful toolkit built on top of Django, specifically designed\
    \ to build Web APIs. It provides you with the tools to make data serialization,\
    \ authentication, view sets, routers, and more a breeze. The combination of Django\
    \ and DRF is a proven stack for developing modern web APIs.\n\n### 1.3 Course\
    \ Highlights\n\nThroughout the course, we’ll be covering the following:\n\n- Setting\
    \ Up Development Environment: Before we dive into coding, we’ll ensure that your\
    \ development environment, regardless of whether you’re on Windows or macOS, is\
    \ ready and equipped with all the necessary tools.\n- Understanding and Implementing\
    \ Django: From setting up your very first Django project to creating complex data\
    \ models and integrating with Django’s admin site, you’ll learn the ins and outs\
    \ of this amazing framework.\n- Diving Deep into Django REST Framework: Building\
    \ on your Django knowledge, you’ll be introduced to DRF’s advanced capabilities,\
    \ from creating APIViews to implementing full-fledged Viewsets.\n- Building an\
    \ End-to-End REST API: This isn’t just a theoretical course. By the end, you’ll\
    \ have built a complete REST API capable of handling user profiles, authentication,\
    \ status updates, and more.\n- Deploying to AWS: Once your API is ready, we’ll\
    \ walk you through the process of deploying it on AWS, one of the world’s leading\
    \ cloud service providers.\n\n### 1.4 Who Should Take This Course\n\nThis course\
    \ is tailored for:\n\n- Developers aiming to build a backend for their apps or\
    \ MVPs.\n- Frontend developers eager to learn backend to become full-stack.\n\
    - Beginners in the tech field looking to enhance their portfolio and career prospects.\n\
    \n### 1.5 Prerequisites\n\nWhile the course is designed with beginners in mind,\
    \ having a basic understanding of Python can be advantageous. However, don’t worry\
    \ if you’re completely new. The course is structured to take you from the basics\
    \ upwards, ensuring everyone can keep pace.\n\n### 1.6 Conclusion\n\nThis overview\
    \ provides a sneak peek into the exciting journey you’re about to embark on. With\
    \ dedication and focus, by the end of this course, you will not only have a functioning\
    \ REST API but also a profound understanding of backend development, giving you\
    \ a competitive edge in the tech industry.\n\nNow, let’s roll up our sleeves and\
    \ delve into the world of backend development! In the next chapter, we’ll discuss\
    \ two popular development tools: Vagrant and Docker, helping you make an informed\
    \ decision on which to use.\n\n### Vagrant vs Docker\n\nObjective: By the end\
    \ of this chapter, readers will have a clear understanding of the differences\
    \ between Vagrant and Docker, their use cases, and which might be more suitable\
    \ for specific scenarios in web development.\n\nAssets, Resources, and Materials:\n\
    \n1. Vagrant:\n    - Acquisition: Download from [Vagrant’s official website](https://www.vagrantup.com/)\n\
    \    - Use: Virtualization tool to create and manage virtualized development environments.\n\
    2. Docker:\n    - Acquisition: Download from [Docker’s official website](https://www.docker.com/)\n\
    \    - Use: Platform to develop, ship, and run applications inside containers.\n\
    \n### Introduction\n\nIn the modern development world, ensuring that the software\
    \ you build runs consistently across all environments is crucial. Both Vagrant\
    \ and Docker aim to solve this issue but in slightly different manners. To understand\
    \ which is better suited for your needs, it’s essential to know the basics of\
    \ each and how they differ.\n\n### What is Vagrant?\n\nVagrant is a tool that\
    \ allows developers to create, configure, and manage a complete virtualized environment.\
    \ At its core, Vagrant uses virtualization technologies like VirtualBox, VMware,\
    \ and others to provide an environment that matches production as closely as possible.\n\
    \nKey Features of Vagrant:\n\n- Reproducible Environments: By utilizing Vagrantfiles,\
    \ a scripted definition of the virtual machine, Vagrant"
  mdcn: "## 使用Python和Django构建后端REST API - 入门篇\n\n通过本速成课程，你将创建一个应用程序并构建一个功能完整的用户数据库，用于构建REST\
    \ API。\n\n## 内容指南\n\n**第1部分：简介**\n- 第1章：课程概览\n- 第2章：Vagrant与Docker\n\n**第2部分：设置你的开发环境**\n\
    - 第3章：Windows：安装Git、VirtualBox、Vagrant、Atom和ModHeader\n- 第4章：macOS：安装Git、VirtualBox、Vagrant、Atom和ModHeader\n\
    \n**第3部分：设置你的项目**\n- 第5章：创建工作区\n- 第6章：创建Git项目\n- 第7章：推送到GitHub\n\n**第4部分：创建开发服务器**\n\
    - 第8章：创建Vagrant文件\n- 第9章：配置我们的Vagrant box\n- 第10章：运行并连接到我们的开发服务器\n- 第11章：运行一个Hello\
    \ World脚本\n\n**第5部分：创建Django应用**\n- 第12章：创建Python虚拟环境\n- 第13章：安装所需的Python包\n-\
    \ 第14章：创建新的Django项目和应用\n- 第15章：在Django设置文件中启用我们的应用\n- 第16章：测试并提交我们的更改\n\n**第6部分：设置数据库**\n\
    - 第17章：什么是Django模型？\n- 第18章：创建我们的用户数据库模型\n- 第19章：添加用户模型管理器\n- 第20章：设置我们的自定义用户模型\n\
    - 第21章：创建迁移并同步数据库\n\n**第7部分：设置Django管理后台**\n- 第22章：创建超级用户\n- 第23章：启用Django管理后台\n\
    - 第24章：测试Django管理后台\n\n**第8部分：API视图简介**\n- 第25章：什么是APIView？\n- 第26章：创建第一个APIView\n\
    - 第27章：配置视图URL\n- 第28章：测试我们的API视图\n- 第29章：创建序列化器\n- 第30章：为APIView添加POST方法\n- 第31章：测试POST功能\n\
    - 第32章：添加PUT、PATCH和DELETE方法\n- 第33章：测试PUT、PATCH和DELETE方法\n\n**第9部分：视图集简介**\n-\
    \ 第34章：什么是视图集？\n- 第35章：创建一个简单的视图集\n- 第36章：添加URL路由器\n- 第37章：测试我们的视图集\n- 第38章：添加创建、检索、更新、部分更新和销毁功能\n\
    - 第39章：测试视图集\n\n**第10部分：创建个人资料API**\n- 第40章：规划我们的个人资料API\n- 第41章：创建用户资料序列化器\n\
    - 第42章：创建个人资料视图集\n- 第43章：将个人资料视图集注册到URL路由器\n- 第44章：测试创建个人资料\n- 第45章：创建权限类\n- 第46章：为视图集添加身份验证和权限\n\
    - 第47章：测试新权限\n- 第48章：添加搜索个人资料功能\n- 第49章：测试搜索个人资料\n\n**第11部分：创建登录API**\n- 第50章：创建登录API视图集\n\
    - 第51章：测试登录API\n- 第52章：使用ModHeader扩展设置令牌头\n\n**第12部分：创建个人资料动态API**\n- 第53章：规划个人资料动态API\n\
    - 第54章：添加新模型Item\n- 第55章：创建并运行模型迁移\n- 第56章：将个人资料动态模型添加到管理后台\n- 第57章：创建个人资料动态项序列化器\n\
    - 第58章：为我们的个人资料动态项创建视图集\n- 第59章：测试动态API\n- 第60章：为动态API添加权限\n- 第61章：测试动态API权限\n\
    - 第62章：将状态更新的查看权限限制为仅登录用户\n- 第63章：测试新的私有动态\n\n**第13部分：将我们的API部署到AWS服务器**\n- 第64章：将我们的应用部署到AWS简介\n\
    - 第65章：向AWS添加密钥对\n- 第66章：创建EC2服务器实例\n- 第67章：向我们的项目添加部署脚本和配置\n- 第68章：部署到服务器\n-\
    \ 第69章：更新允许的主机并部署更改\n- 结论\n\n## 第1部分：简介\n\n### 课程概览\n\n欢迎来到“使用Python和Django构建后端REST\
    \ API - 入门篇”的导论章节。本章旨在让你概览在学习本课程时可以期待的内容。学完本章后，你应该对涵盖的主题有清晰的了解，并为接下来的实践部分做好准备。\n\
    \n### 1.1 课程目的\n\n本课程的主要目的是指导你使用Django和Django REST Framework构建一个健壮、安全且可扩展的后端REST\
    \ API。你在这里获得的知识和技能在当今的应用和Web开发世界中至关重要。无论你是想推出下一个大产品的初创公司，还是想扩展技能集的开发者，掌握构建后端的艺术都能成倍增加你应用的潜力和能力。\n\
    \n### 1.2 为什么选择Django和Django REST Framework？\n\nDjango是一个用Python编写的高级开源Web框架。它遵循“不要重复自己”（DRY）原则，并强调代码的可重用性。这使其成为开发Web应用程序最高效的框架之一。\n\
    \nDjango REST Framework，或称DRF，是一个建立在Django之上的强大工具包，专门用于构建Web API。它为你提供了使数据序列化、身份验证、视图集、路由器等变得轻而易举的工具。Django和DRF的组合是开发现代Web\
    \ API的成熟技术栈。\n\n### 1.3 课程亮点\n\n在整个课程中，我们将涵盖以下内容：\n\n- 设置开发环境：在深入编码之前，我们将确保你的开发环境（无论是在Windows还是macOS上）已准备就绪，并配备了所有必要的工具。\n\
    - 理解和实现Django：从设置你的第一个Django项目到创建复杂的数据模型并与Django的管理站点集成，你将学习这个优秀框架的方方面面。\n- 深入Django\
    \ REST Framework：在你的Django知识基础上，你将被介绍到DRF的高级功能，从创建APIView到实现功能齐全的视图集。\n- 构建端到端的REST\
    \ API：这不仅仅是一门理论课程。学完后，你将构建一个完整的REST API，能够处理用户资料、身份验证、状态更新等。\n- 部署到AWS：一旦你的API准备就绪，我们将引导你完成将其部署到AWS（世界领先的云服务提供商之一）的过程。\n\
    \n### 1.4 谁应该学习本课程\n\n本课程专为以下人群量身定制：\n\n- 旨在为其应用或MVP构建后端的开发者。\n- 渴望学习后端以成为全栈开发者的前端开发者。\n\
    - 希望增强其作品集和职业前景的科技领域初学者。\n\n### 1.5 先决条件\n\n虽然本课程是为初学者设计的，但具备Python的基础知识会有所帮助。不过，如果你完全是新手也不用担心。课程的结构是从基础开始，确保每个人都能跟上进度。\n\
    \n### 1.6 结论\n\n本概述让你得以一窥即将开始的激动人心的旅程。通过专注和努力，学完本课程后，你不仅将拥有一个功能正常的REST API，还将对后端开发有深刻的理解，这将使你在科技行业中具有竞争优势。\n\
    \n现在，让我们卷起袖子，深入后端开发的世界！在下一章中，我们将讨论两种流行的开发工具：Vagrant和Docker，帮助你做出明智的选择。\n\n###\
    \ Vagrant与Docker\n\n目标：学完本章后，读者将清楚地了解Vagrant和Docker之间的区别、它们的用例，以及在Web开发的特定场景中哪个可能更合适。\n\
    \n资产、资源和材料：\n\n1. Vagrant：\n    - 获取：从[Vagrant官方网站](https://www.vagrantup.com/)下载\n\
    \    - 用途：用于创建和管理虚拟化开发环境的虚拟化工具。\n2. Docker：\n    - 获取：从[Docker官方网站](https://www.docker.com/)下载\n\
    \    - 用于在容器内开发、交付和运行应用程序的平台。\n\n### 简介\n\n在现代开发世界中，确保你构建的软件在所有环境中一致运行至关重要。Vagrant和Docker都旨在解决这个问题，但方式略有不同。要了解哪个更适合你的需求，了解每个工具的基础知识及其差异至关重要。\n\
    \n### 什么是Vagrant？\n\nVagrant是一个允许开发者创建、配置和管理完整虚拟化环境的工具。其核心是，Vagrant使用VirtualBox、VMware等虚拟化技术来提供尽可能接近生产环境的环境。\n\
    \nVagrant的主要特点：\n\n- 可重现的环境：通过利用Vagrantfile（虚拟机的脚本化定义），Vagrant"
