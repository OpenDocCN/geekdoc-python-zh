- md: '## Steps to Running a Hello World Script on Your Development Server:


    1. Access Your Development Server:

    If you haven’t already, start your Vagrant development server:


    ```bash

    vagrant up

    ```


    Once the server is up, SSH into it:


    ```bash

    vagrant ssh

    ```


    2. Navigate to Your Workspace:

    Now, navigate to your workspace directory, the one you created in Chapter 5. This
    will be our working directory for our script.


    ```bash

    cd /path_to_your_workspace/

    ```


    3. Creating the Script:

    Using Atom, create a new file named `hello_world.py` inside your workspace. Remember,
    you can do this on your main operating system, not inside the Vagrant SSH session.


    Open `hello_world.py` in Atom and write the following Python code:


    ```python

    print("Hello, World!")

    ```


    Save and close the file.


    4. Running the Script:

    Back in your Vagrant SSH session, ensure you’re still in your workspace directory.
    Run the script using Python:


    ```bash

    python hello_world.py

    ```


    You should see the output:


    ```

    Hello, World!

    ```


    Congratulations! You’ve successfully run a Python script inside your development
    server.


    ## Understanding the Hello World Script:


    At its core, the Hello World script provides an introduction to:


    - File Creation & Management: You learned how to create, save, and manage a file
    within your workspace.

    - Python’s Print Function: The `print()` function in Python outputs text to the
    console. It’s a crucial function you’ll use frequently when debugging and building
    applications.

    - Running Python Scripts: By executing `python hello_world.py`, you invoked the
    Python interpreter to execute the script, showcasing how Python scripts are executed
    in general.


    ## Conclusion:


    While this chapter provided a basic introduction to running scripts in our development
    environment, it sets the foundation for more complex tasks ahead. As we progress,
    we’ll be delving deeper into creating more elaborate applications and functionalities
    using Python and Django.

    Remember, every great journey begins with a simple step, or in the world of programming,
    a “Hello, World!”


    Exercise:

    1. Modify the `hello_world.py` script to display your name, e.g., “Hello, [Your
    Name]!”.

    2. Try running other simple Python commands within the script, such as basic arithmetic,
    to get a feel for executing Python scripts.


    ## Section 5: Creating a Django App


    ### Create Python Virtual Environment


    Assets, Resources, and Materials:


    - Python: Before we can create a virtual environment, you’ll need Python installed.
    You can download the latest version from [Python’s official website](https://www.python.org/downloads/).
    Python, as we know, is the foundational language we’re using for this course.

    - pip (Python Package Installer): Most Python installations come with pip by default.
    However, if it’s missing, you can [follow these instructions](https://pip.pypa.io/en/stable/installing/).
    Pip allows us to install Python packages easily.

    - virtualenv: This is the primary tool we’ll use to create isolated Python environments.
    If you don’t have it installed, don’t worry, we’ll cover that.


    Purpose of a Virtual Environment:

    A virtual environment is an isolated space on your computer where you can install
    software and Python packages independently of the system-wide Python installation.
    This isolation prevents conflicts between versions and ensures a clean, controlled
    development environment, making it easier to manage project-specific dependencies.


    Let’s Get Started:

    1. Installing virtualenv:

    If you haven’t installed virtualenv yet, you can do so using pip:


    ```bash

    pip install virtualenv

    ```


    2. Creating a Virtual Environment:

    Once you’ve got virtualenv installed, navigate to the directory where you want
    your virtual environment to live (typically inside your project directory) and
    run:


    ```bash

    virtualenv myenv

    ```


    Here, `myenv` is the name of your virtual environment. You can name it anything
    you like, but keeping it descriptive can be helpful.


    3. Activating the Virtual Environment:

    - On Windows:


    ```bash

    myenv\Scripts\activate

    ```


    - On macOS and Linux:


    ```bash

    source myenv/bin/activate

    ```


    When the virtual environment is activated, you’ll see the name of your virtual
    environment (in this case, `myenv`) at the beginning of your command line prompt.
    This indicates that the environment is active, and any Python packages you install
    while it’s active will only be installed in this environment.


    4. Deactivating the Virtual Environment:

    When you’re done working in your virtual environment and want to return to the
    global Python environment, simply run:


    ```bash

    deactivate

    ```


    5. Installing Packages in the Virtual Environment:

    With the virtual environment active, you can use pip to install packages as you
    normally would. For example, to install Django:


    ```bash

    pip install django

    ```


    This will install Django only in the active virtual environment and won’t affect
    the system-wide Python installation.


    Why Use Virtual Environments?

    Virtual environments are critical when developing multiple projects on the same
    system, especially when these projects have different dependencies. They allow
    for:


    - Isolation: Ensuring that each project has its own set of dependencies that don’t
    interfere with one another.

    - Version Control: Allows for different projects to use different versions of
    packages, without any conflicts.

    - Clean Environment: When you start a new project, you can ensure you’re working
    with a clean slate without any unwanted packages.

    - Deployment: Makes it easier to manage dependencies when deploying your application
    to production.


    Recap:

    In this chapter, we’ve learned how to set up a Python virtual environment using
    virtualenv. We now have a dedicated space for our Django project, where we can
    manage our dependencies in isolation. In the next chapter, we’ll begin installing
    the necessary Python packages to start our Django project.


    ### Install required Python packages


    Assets, Resources, and Materials:


    1. Python: Ensure you have Python (preferably version 3.7 or higher) installed
    on your development server. To check, run `python --version` or `python3 --version`
    in the terminal. (You can download and install Python from [python.org](https://www.python.org/downloads/)).

    2. pip: Python’s package installer. It’s typically installed with Python. To check
    its installation, run `pip --version` or `pip3 --version` in the terminal. (If
    not installed, [follow these instructions](https://pip.pypa.io/en/stable/installing/)).

    3. Virtual Environment: Though not a strict requirement, using a virtual environment
    for your project ensures that dependencies do not clash between projects. (Installation
    instructions provided below).


    Introduction:

    To begin building our Django application, we first need to ensure that we have
    all the necessary Python packages installed. These packages will facilitate the
    creation, management, and enhancement of our Django app. In this chapter, we’ll
    walk through the process of installing the necessary Python packages.


    Step 1: Setting Up a Virtual Environment

    A virtual environment is an isolated environment where you can install packages
    without affecting the global Python environment or other projects. It’s a best
    practice to use virtual environments for each of your Python projects.


    a. To install the virtual environment package, run:

    ```bash

    pip install virtualenv

    ```


    b. Navigate to your project directory (or where you want to create the virtual
    environment) and run:

    ```bash

    virtualenv venv

    ```


    c. Activate the virtual environment. The activation command varies depending on
    your operating system:

    - Windows:

    ```bash

    venv\Scripts\activate

    ```


    - macOS and Linux:

    ```bash

    source venv/bin/activate

    ```


    Once activated, you should see `(venv)` at the beginning of your terminal prompt,
    indicating that you are now working within the virtual environment.


    Step 2: Installing Django and Django REST Framework

    With our virtual environment active, we can proceed to install Django and the
    Django REST Framework.


    a. Install Django by running:

    ```bash

    pip install django==2.2

    ```


    By specifying `==2.2`, we''re ensuring that we install version 2.2 of Django,
    which our course is based on.


    b. Next, install the Django REST Framework:

    ```bash

    pip install djangorestframework==3.9

    ```


    Step 3: Verifying the Installations

    After installing, it''s a good practice to verify that everything was installed
    correctly.


    a. Check the installed Django version with:

    ```bash

    django-admin --version

    ```'
