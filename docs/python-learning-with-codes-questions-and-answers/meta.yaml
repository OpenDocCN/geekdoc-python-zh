- md: "## TECH PROFESSIONAL\n\n1st edition\n2023\n\n## Python learning with codes\
    \ Questions and Answers\n\n## Python learning with codes\n\nQuestions and Answers\n\
    \nFirst edition 2023\n\nBy Tech Professional\n\nWhat will be the value of the\
    \ i variable when the while loop finishes its execution?\n\n```\ni=0\nwhile i\
    \ != 0:\n    i=i-1\nelse:\n    i=i+1\n```\n\n- A. 1\n- B. 0\n- C. 2\n- D. the\
    \ variable becomes unavailable\n\nSelect the true statement about composition.\n\
    \n- A. Composition extends a class's capabilities by adding new components and\
    \ modifying the existing ones\n- B. Composition allows a class to be projected\
    \ as a container of different classes\n- C. Composition is a concept that promotes\
    \ code reusability, while Inheritance promotes encapsulation\n- D. Composition\
    \ is based on the has a relation, so it cannot be used together with inheritance\n\
    \n**Correct Answer:** *B*\n\nAnalyze the following snippet and select the statement\
    \ that best describes it.\n\n```\nclass OwnMath:\n    pass\n\ndef calculate_value(numerator,\
    \ denominator):\n    try:\n        value = numerator / denominator\n    except\
    \ ZeroDivisionError as e:\n        raise OwnMath from e\n    return value\n\n\
    calculate_value(4, 0)\n```\n\n- A. The code is an example of implicitly chained\
    \ exceptions.\n- B. The code is erroneous as the OwnMath class does not inherit\
    \ from any Exception type class\n- C. The code is fine and the script execution\
    \ is not interrupted by any exception.\n- D. The code is an example of explicitly\
    \ chained exceptions\n\n**Correct Answer:** A\n\nAnalyze the following snippet\
    \ and select the statement that best describes it.\n\n```\nclass Sword:\n    var1\
    \ = 'weapon'\n\n    def __init__(self):\n        self.name = 'Excalibur'\n```\n\
    \n- A. self.name is the name of a class variable\n- B. var1 is the name of a global\
    \ variable\n- C. Excalibur is the value passed to an instance variable\n- D. weapon\
    \ is the value passed to an instance variable\n\n**Correct Answer:** C\n\nThe\
    \ following snippet represents one of the OOP pillars. Which one is that?\n\n\
    ```\nclass A:\n    def run(self):\n        print(\"A is running\")\n\nclass B:\n\
    \    def fly(self):\n        print(\"B is flying\")\n\nclass C:\n    def run(self):\n\
    \        print(\"C is running\")\n\nfor element in A(), B(), C():\n    element.run()\n\
    ```\n\n- A. Serialization\n- B. Inheritance\n- C. Encapsulation\n- D. Polymorphism\n\
    \n**Correct Answer:** D\n\nAnalyze the following function and choose the statement\
    \ that best describes it.\n\n```\ndef my_decorator(coating):\n    def level1_wrapper(my_function):\n\
    \        def level2_wrapper(*args):\n            our_function(*args)\n       \
    \ return level2_wrapper\n    return level1_wrapper\n```\n\n- A. It is an example\
    \ of a decorator that accepts its own arguments.\n- B. It is an example of decorator\
    \ stacking.\n- C. It is an example of a decorator that can trigger an infinite\
    \ recursion\n- D. The function is erroneous.\n\n**Correct Answer:** A\n\nAnalyze\
    \ the following snippet and select the statement that best describes it.\n\n```\n\
    def fl(*arg, **args):\n    pass\n```\n\n- A. The code is syntactically correct\
    \ despite the fact that the names of the function parameters do not follow the\
    \ naming convention\n- B. The *arg parameter holds a list of unnamed parameters.\n\
    - C. The code is missing a placeholder for unnamed parameters.\n- D. The code\
    \ is syntactically incorrect - the function should be defined as def f1 (*args,\
    \ **kwargs):\n\n**Correct Answer:** D\n\nAnalyze the following snippet and decide\
    \ whether the code is correct and/or which method should be distinguished as a\
    \ class method.\n\n```python\nclass Crossword:\n    number_of_Crosswords = 0\n\
    \n    def __init__(self, height, width):\n        self.height = height\n     \
    \   self.width = width\n        self.progress = 0\n\n    @staticmethod\n    def\
    \ isElementCorrect(word):\n        if self.isSolved():\n            print('The\
    \ crossword is already solved')\n            return True\n        result = True\n\
    \        for char in word:\n            if char.isdigit():\n                result\
    \ = False\n                break\n        return result\n\n    def isSolved(self):\n\
    \        if self.progress == 100:\n            return True\n\n    def getNumberOfCrosswords(cls):\n\
    \        return cls.number_of_Crosswords\n```\n\n- A. There is only one initializer,\
    \ so there is no need for a class method\n- B. The getNumberOfCrosswords() method\
    \ Should be decorated with @classmethod\n- C. The code is erroneous\n- D. The\
    \ getNumberOfCrosswords() and isSolved methods should be decorated with @classmethod\n\
    \n**Correct Answer:** *B*\n\nAnalyze the code and choose the best statement that\
    \ describes it.\n\n```\nclass Item:\n    def __init__(self, initial_value):\n\
    \        self.value = initial_value\n\n    def __ne__(self, other):\n        ...\n\
    ```\n\n- A. __ne__() is not a built-in special method.\n- B. The code is erroneous\n\
    - C. The code is responsible for the support of the negation operator, e.g. a\
    \ = - a\n- D. The code is responsible for the support of the inequality operator,\
    \ i.e. !=\n\n**Correct Answer:** *D*\n\nAnd operator able to perform bitwise shifts\
    \ is coded as (Choose two.)\n\n- A. --\n- B. ++\n- C. <<\n- D. >>\n\n**Correct\
    \ Answer:** *CD*\n\nWhat will the value of the i variable be when the following\
    \ loop finishes its execution?\n\n```\nfor i in range(10):\n    pass\n```\n\n\
    - A. 10\n- B. the variable becomes unavailable\n- C. 11\n- D. 9\n\n**Correct Answer:**\
    \ *B*\n\nThe following expression -\n\n```\n1+-2\n```\n\n- A. equal to 1\n- B.\
    \ invalid\n- C. equal to 2\n- D. equal to -1\n\n**Correct Answer:** *D*\n\nA compiler\
    \ is a program designed to (Choose two.)\n\n- A. rearrange the source code to\
    \ make it clearer\n- B. check the source code in order to see of it's correct\n\
    - C. execute the source code\n- D. translate the source code into machine code\n\
    \n**Correct Answer:** *BD*\n\nWhat is the output of the following piece of code?\n\
    \n```\na= 'ant'\nb= \"bat\"\nc= 'camel'\nprint(a, b, c, sep=\"\")\n```\n\n- A.\
    \ ant' bat' camel\n- B. antλ€batλ€ camel\n- C. antbatcamel\n- D. print (a, b,\
    \ c, sep= ' λ€ ')\n\n**Correct Answer:** B\n\nWhat is the expected output of the\
    \ following snippet?\n\n```\ni=5\nwhile i>0:\n    i=i //2\n    if i % 2==0:\n\
    \        break\nelse:\n    i+=1\nprint(i)\n```\n\n- A. the code is erroneous\n\
    - B. 3\n- C. 7\n- D. 15\n\n**Correct Answer:** *A*\n\nHow many lines does the\
    \ following snippet output?\n\n```\nfor i in range(1, 3):\n    print(\"*\", end=\"\
    \")\nelse:\n    print(\"*\")\n```\n\n- A. three\n- B. one\n- C. two\n- D. four\n\
    \n**Correct Answer:** B\n\nWhich of the following literals reflect the value given\
    \ as 34.23? (Choose two.)\n\n- A. .3423e2\n- B. 3423e-2\n- C. .3423e-2\n- D. 3423e2\n\
    \n**Correct Answer:** *AB*\n\nWhat is the expected output of the following snippet?\n\
    \n```\na=2\nif a>0:\n    a+=1\nelse:\n    a-=1\nprint(a)\n```\n\n- A. 3\n- B.\
    \ 1\n- C. 2\n- D. the code is erroneous\n\n**Correct Answer:** A\n\nAssuming that\
    \ the following snippet has been successfully executed, which of the equations\
    \ are True? (Choose two.)\n\n```\na= [1]\nb=a\na[0] = 0\n```\n\n- A. len(a) ==\
    \ len(b)\n- B. b[0] +1 ==a[0]\n- C. a[0] == b[0]\n- D. a[0] + 1 ==b[0]\n\n**Correct\
    \ Answer:** *AC*\n\nAssuming that the following snippet has been successfully\
    \ executed, which of the equations are False? (Choose two.)\n\n- A. len(a)== len(b)\n\
    - B. a[0]-1 ==b[0]\n- C. a[0]== b[0]\n- D. b[0] - 1 ==a[0]\n\n**Correct Answer:**\
    \ *AB*\n\nWhich of the following statements are true? (Choose two.)\n\n- A. Python\
    \ strings are actually lists\n- B. Python strings can be concatenated\n- C. Python\
    \ strings can be sliced like lists\n- D. Python strings are mutable\n\n**Correct\
    \ Answer:** *BC*\n\nWhich of the following sentences are true? (Choose two.)\n\
    \n- A. Lists may not be stored inside tuples\n- B. Tuples may be stored inside\
    \ lists\n- C. Tuples may not be stored inside tuples\n- D. Lists may be stored\
    \ inside lists\n\n**Correct Answer:** *BD*\n\nAssuming that String is six or more\
    \ letters long, the following slice\n\n```\nstring[1:-2]\n```\n\nis shorter than\
    \ the original string by:\n\n- A. four chars\n- B. three chars\n- C. one char\n\
    - D. two chars\n\n**Correct Answer:** *B*"
  mdcn: "## 技术专业人士\n\n第一版\n2023\n\n## 带代码的Python学习：问题与解答\n\n## 带代码的Python学习\n\n问题与解答\n\
    \n第一版 2023\n\n作者：技术专业人士\n\n当while循环执行完毕后，变量i的值将是多少？\n\n```\ni=0\nwhile i != 0:\n\
    \    i=i-1\nelse:\n    i=i+1\n```\n\n- A. 1\n- B. 0\n- C. 2\n- D. 变量变得不可用\n\n\
    选择关于组合的正确陈述。\n\n- A. 组合通过添加新组件和修改现有组件来扩展类的功能\n- B. 组合允许一个类被设计为不同类的容器\n- C. 组合是促进代码重用的概念，而继承促进封装\n\
    - D. 组合基于“has a”关系，因此不能与继承一起使用\n\n**正确答案：** *B*\n\n分析以下代码片段并选择最能描述它的陈述。\n\n```\n\
    class OwnMath:\n    pass\n\ndef calculate_value(numerator, denominator):\n   \
    \ try:\n        value = numerator / denominator\n    except ZeroDivisionError\
    \ as e:\n        raise OwnMath from e\n    return value\n\ncalculate_value(4,\
    \ 0)\n```\n\n- A. 该代码是隐式链接异常的示例。\n- B. 该代码有错误，因为OwnMath类没有继承任何异常类型类\n- C. 该代码没有问题，脚本执行不会被任何异常中断。\n\
    - D. 该代码是显式链接异常的示例\n\n**正确答案：** A\n\n分析以下代码片段并选择最能描述它的陈述。\n\n```\nclass Sword:\n\
    \    var1 = 'weapon'\n\n    def __init__(self):\n        self.name = 'Excalibur'\n\
    ```\n\n- A. self.name是类变量的名称\n- B. var1是全局变量的名称\n- C. Excalibur是传递给实例变量的值\n- D.\
    \ weapon是传递给实例变量的值\n\n**正确答案：** C\n\n以下代码片段代表了面向对象编程的支柱之一。是哪一个？\n\n```\nclass\
    \ A:\n    def run(self):\n        print(\"A is running\")\n\nclass B:\n    def\
    \ fly(self):\n        print(\"B is flying\")\n\nclass C:\n    def run(self):\n\
    \        print(\"C is running\")\n\nfor element in A(), B(), C():\n    element.run()\n\
    ```\n\n- A. 序列化\n- B. 继承\n- C. 封装\n- D. 多态\n\n**正确答案：** D\n\n分析以下函数并选择最能描述它的陈述。\n\
    \n```\ndef my_decorator(coating):\n    def level1_wrapper(my_function):\n    \
    \    def level2_wrapper(*args):\n            our_function(*args)\n        return\
    \ level2_wrapper\n    return level1_wrapper\n```\n\n- A. 这是一个接受自身参数的装饰器示例。\n-\
    \ B. 这是一个装饰器堆叠的示例。\n- C. 这是一个可能触发无限递归的装饰器示例\n- D. 该函数有错误。\n\n**正确答案：** A\n\n分析以下代码片段并选择最能描述它的陈述。\n\
    \n```\ndef fl(*arg, **args):\n    pass\n```\n\n- A. 尽管函数参数的名称不符合命名约定，但该代码在语法上是正确的\n\
    - B. *arg参数保存一个未命名参数的列表。\n- C. 该代码缺少未命名参数的占位符。\n- D. 该代码在语法上不正确 - 函数应定义为 def f1\
    \ (*args, **kwargs):\n\n**正确答案：** D\n\n分析以下代码片段并判断代码是否正确和/或哪个方法应被标识为类方法。\n\n```python\n\
    class Crossword:\n    number_of_Crosswords = 0\n\n    def __init__(self, height,\
    \ width):\n        self.height = height\n        self.width = width\n        self.progress\
    \ = 0\n\n    @staticmethod\n    def isElementCorrect(word):\n        if self.isSolved():\n\
    \            print('The crossword is already solved')\n            return True\n\
    \        result = True\n        for char in word:\n            if char.isdigit():\n\
    \                result = False\n                break\n        return result\n\
    \n    def isSolved(self):\n        if self.progress == 100:\n            return\
    \ True\n\n    def getNumberOfCrosswords(cls):\n        return cls.number_of_Crosswords\n\
    ```\n\n- A. 只有一个初始化器，所以不需要类方法\n- B. getNumberOfCrosswords()方法应该用@classmethod装饰\n\
    - C. 代码有错误\n- D. getNumberOfCrosswords()和isSolved方法应该用@classmethod装饰\n\n**正确答案：**\
    \ *B*\n\n分析代码并选择最能描述它的陈述。\n\n```\nclass Item:\n    def __init__(self, initial_value):\n\
    \        self.value = initial_value\n\n    def __ne__(self, other):\n        ...\n\
    ```\n\n- A. __ne__()不是内置的特殊方法。\n- B. 代码有错误\n- C. 该代码负责支持否定运算符，例如 a = - a\n- D.\
    \ 该代码负责支持不等运算符，即 !=\n\n**正确答案：** *D*\n\n能够执行位移的运算符编码为（选择两个。）\n\n- A. --\n- B.\
    \ ++\n- C. <<\n- D. >>\n\n**正确答案：** *CD*\n\n当以下循环执行完毕后，变量i的值将是多少？\n\n```\nfor\
    \ i in range(10):\n    pass\n```\n\n- A. 10\n- B. 变量变得不可用\n- C. 11\n- D. 9\n\n\
    **正确答案：** *B*\n\n以下表达式 -\n\n```\n1+-2\n```\n\n- A. 等于1\n- B. 无效\n- C. 等于2\n- D.\
    \ 等于-1\n\n**正确答案：** *D*\n\n编译器是设计用来（选择两个。）的程序。\n\n- A. 重新排列源代码使其更清晰\n- B. 检查源代码以查看其是否正确\n\
    - C. 执行源代码\n- D. 将源代码翻译成机器码\n\n**正确答案：** *BD*\n\n以下代码片段的输出是什么？\n\n```\na= 'ant'\n\
    b= \"bat\"\nc= 'camel'\nprint(a, b, c, sep=\"\")\n```\n\n- A. ant' bat' camel\n\
    - B. antλ€batλ€ camel\n- C. antbatcamel\n- D. print (a, b, c, sep= ' λ€ ')\n\n\
    **正确答案：** B\n\n以下代码片段的预期输出是什么？\n\n```\ni=5\nwhile i>0:\n    i=i //2\n    if i\
    \ % 2==0:\n        break\nelse:\n    i+=1\nprint(i)\n```\n\n- A. 代码有错误\n- B. 3\n\
    - C. 7\n- D. 15\n\n**正确答案：** *A*\n\n以下代码片段输出多少行？\n\n```\nfor i in range(1, 3):\n\
    \    print(\"*\", end=\"\")\nelse:\n    print(\"*\")\n```\n\n- A. 三行\n- B. 一行\n\
    - C. 两行\n- D. 四行\n\n**正确答案：** B\n\n以下哪些字面量反映了给定的值34.23？（选择两个。）\n\n- A. .3423e2\n\
    - B. 3423e-2\n- C. .3423e-2\n- D. 3423e2\n\n**正确答案：** *AB*\n\n以下代码片段的预期输出是什么？\n\
    \n```\na=2\nif a>0:\n    a+=1\nelse:\n    a-=1\nprint(a)\n```\n\n- A. 3\n- B.\
    \ 1\n- C. 2\n- D. 代码有错误\n\n**正确答案：** A\n\n假设以下代码片段已成功执行，以下哪些等式为真？（选择两个。）\n\n```\n\
    a= [1]\nb=a\na[0] = 0\n```\n\n- A. len(a) == len(b)\n- B. b[0] +1 ==a[0]\n- C.\
    \ a[0] == b[0]\n- D. a[0] + 1 ==b[0]\n\n**正确答案：** *AC*\n\n假设以下代码片段已成功执行，以下哪些等式为假？（选择两个。）\n\
    \n- A. len(a)== len(b)\n- B. a[0]-1 ==b[0]\n- C. a[0]== b[0]\n- D. b[0] - 1 ==a[0]\n\
    \n**正确答案：** *AB*\n\n以下哪些陈述是正确的？（选择两个。）\n\n- A. Python字符串实际上是列表\n- B. Python字符串可以连接\n\
    - C. Python字符串可以像列表一样切片\n- D. Python字符串是可变的\n\n**正确答案：** *BC*\n\n以下哪些句子是正确的？（选择两个。）\n\
    \n- A. 列表不能存储在元组内\n- B. 元组可以存储在列表内\n- C. 元组不能存储在元组内\n- D. 列表可以存储在列表内\n\n**正确答案：**\
    \ *BD*\n\n假设字符串长度为六个或更多字母，以下切片\n\n```\nstring[1:-2]\n```\n\n比原始字符串短：\n\n- A. 四个字符\n\
    - B. 三个字符\n- C. 一个字符\n- D. 两个字符\n\n**正确答案：** *B*"
