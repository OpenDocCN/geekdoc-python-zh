- md: "Kinjalk Gupta\n\n## Learn Python From 100+ Examples\n\nCopyright © 2021 by\
    \ Kinjalk Gupta\n\nAll rights reserved. No part of this book may be reproduced\
    \ or used in any manner without written permission of the copyright owner except\
    \ for the use of quotations in a book review. For more information, address: kinjalkg01@gmail.com\n\
    \nFIRST EDITION\n\n## Chapter 1 Getting Started\n\n### 1. What is Python?\n\n\
    Python is an interpreted, high-level and general-purpose programming language.\
    \ It can be used for a number of tasks such as AI/ML, building desktop, mobile\
    \ and web apps, writing automated scripts and many more things.\n\nThere are two\
    \ versions -\n\n- Python 2 - Will be outdated after 2020\n- Python 3 - Will be\
    \ used for future\n\n### 2. Installing Python\n\nHead over to python.org and install\
    \ Python\n\nMake sure you tick the checkbox that says \"Add Python 3.x.x to Path\"\
    \n\n### 3. Python Interpreter\n\nOpen CMD and type Python(Windows) or Python3(Linux)\
    \ and hit enter\n\nAn expression is a piece of code which produces a value.\n\n\
    ### 4. Code Editor\n\nWe can use Editor or IDE\n\nIDE has additional features:\n\
    \n- 1. Auto completion\n- 2. Debugging\n- 3. Testing\n\nEditor - VSCode, Atom,\
    \ Sublime\n\nIDE - Pycharm\n\n### 5. Hello World\n\nCreate a file with an extension\
    \ \".py\".\nWhenever we call a function we write ()\nWrite print(\"Hello World\"\
    )\nPress ctrl + `\nThis will open command line/terminal, now type python name_of_the_file.py\
    \ and hit enter\n\n### 6. Python extension\n\nThis will convert VSCode to a powerful\
    \ IDE and will add the following features\n\n- 1. Linting\n- 2. Autocompletion\n\
    - 3. Unit Testing\n- 4. Debugging\n- 5. Code Formatting\n- 6. Code Snippets\n\n\
    ### 7. Linting\n\nFinding potential errors\n\n### 8. Formatting Code\n\nPEP -\
    \ Python Enhancement Proposals\n\nMost popular one is pep8\nPress cmd+shift+p\
    \ and search Format and install autopep 8\n\n### 9. Running python code\n\nOpen\
    \ the extension panel and search \"code runner\"\n\n### 10. Python Implementation\n\
    \nDefault python Implementation - Cpython\nOther Implementations\n- Jython - written\
    \ in Java\n- IronPython - written in C\n- PyPy - Subset of python\n\n### 11. How\
    \ Python Code is executed\n\nC compiler is a program that knows how to compile\
    \ c code to machine code (0s and 1s)\nMachine code is specific to type of C program\
    \ compiled on windows won't work on mac\nJava converts it to java byte code which\
    \ is not machine dependent\nJVM converts this byte code to machine code\n\nC#\
    \ and python have taken the same route\n\n## Chapter 2 Primitive Types\n\n###\
    \ 1. Variables\n\n```\nstudents_count = 1000  # int\n\nrating = 4.99  # float\n\
    \nis_published = False  # boolean (can be true or false)\n\ncourse_name = \"Python\
    \ Programming\"  # string\n\nprint(students_count)\n```\n\n### 2. Variable Names\n\
    \nVariable name should be descriptive\n\nLower case letters to name a variable\n\
    \nUse underscore to separate multiple words\n\nPut a space around equal signs\n\
    \n### 3. Strings\n\nWe can either use single quotes or double quotes according\
    \ to our preference.\n\nFor writing multi line strings use triple quotes\n\n```\n\
    course = \"Python Programming\"\n\nmessage =\"\"\"\n\nHi John,\n\nBlah blah blah\n\
    \n\"\"\"\n\ncourse = \"Python Programming\"\n\nprint(len(course))  # 18\n\nprint(course[0])\
    \  # P\n\nprint(course[-1])  # g\n```\n\n```\n# Character at the end index is\
    \ not included (Pyt) slice a string\nprint(course[0:3])\nprint(course[:])\n```\n\
    \n### 4. Escape sequences\n\n\\ is an Escape Character\n\" is an Escape Sequence\n\
    \n```\ncourse = \"Python \\nProgramming\"\nprint(course)\n```\n\n### 5. Formatted\
    \ Strings\n\n```\nfirst = 'Kinjalk'\nlast = 'Gupta'\n\nfull = f\"{len(first)}\
    \ {last}\"\nprint(full)\n```\n\n### 6. String Methods\n\n```\ncourse = \"Python\
    \ Programming\"\n\nprint(course.upper())  # PYTHON PROGRAMMING\n\nprint(course.lower())\
    \  # python programming\n\nprint(course.title())  # Python Programming\n\nprint(course.strip())\n\
    \n# if string is not found it will return -1 , returns  an index\n\nprint(course.find(\"\
    P\"))\n\nprint(course.replace(\"P\", \"j\"))\n\n# ALL these written new strings\n\
    \nprint(course)\n\nprint(\"Pro\" in course)  # returns boolean\n```\n\n### 7.\
    \ Numbers\n\n```\n# augmented operators\n\nx = 10\n\nx = x+10\n\nx += 10\n```\n\
    \n### 8. Working With Numbers\n\n```\nprint(round(2.9))\n\nprint(abs(-2))\n\n\
    print(math.ceil(2.3))\n\nprint(math.floor(2.3))\n```\n\n### 9. Type Conversion\n\
    \n```\nx = int(input(\"x: \"))\n\nprint(type(x))\n\ny = x+1\n```\n\nFalsy Values\n\
    \n- \"\"\n- 0\n- none\n\nTruthy Values\n\nAnything else will be true\n\n## Chapter\
    \ 3 Control Flow\n\n### 1. Comparison operators\n\n- >\n- <\n- >=\n- <=\n\n###\
    \ 2. Conditional Statements\n\n```\ntemp = 15\n\nif temp >= 30:\n    print(\"\
    it's warm\")\n\nelif temp >= 20:\n    print(\"it's nice\")\n\nelse:\n    print(\"\
    it's cold\")\n\nprint(\"Done\")\n```\n\n### 3. Ternary Operator\n\n```\nage =\
    \ 17\n\nif age >= 18:\n    message = \"Eligible\"\n\nelse:\n    message = \"Not\
    \ Eligible\"\n\nprint(message)\n```\n\n```\nmessage = \"Eligible\" if age >= 18\
    \ else \"Not eligible\"\nprint(message)\n```\n\n### 4. Logical Operators\n\n```\n\
    high_income = True\ngood_credit = False\nstudent = True\n\nif (high_income or\
    \ good_credit) and not student:\n    print(\"eligible\")\nelse:\n    print(\"\
    Not eligible\")\n```\n\n### 5. Short Circuit Evaluation\n\n### 6. Chaining Comparison\
    \ Operators\n\n```\nage = 22\n\nif age >= 18 and age <= 65:\n    print(\"Eligible\"\
    )\n\nif 18 <= age <= 65:\n    print(\"Eligible\")\n```\n\n### 7. For Loops\n\n\
    ```\nfor number in range(3):\n    print(\"Attempt\", number+1, (number+1)*\".\"\
    )\n\nfor number in range(1, 4):\n    print(\"Attempt\", number, (number)*\".\"\
    )\n```\n\n### 8. For Else Loops\n\n```\nsuccessful = False\n\nfor number in range(3):\n\
    \    print(\"Attempt\")\n\n    if successful:\n        print(\"Successful\")\n\
    \        break\nelse:\n    print(\"Attempted 3 times and failed\")\n```\n\n###\
    \ 9. Nested Loops\n\n```\nfor x in range(5):\n    for y in range(3):\n       \
    \ print(f\"{x}, {y}\")\n```\n\n### 10. Iterables\n\n```\nprint(type(range(5)))\n\
    # range objects are iterable\nfor x in \"Python\":\n    print(x)\n\nfor x in [2,\
    \ 4, 5, 6]:\n    print(x)\n```\n\n### 11. While Loops\n\n```\nnumber = 100\n\n\
    while number > 0:\n    print(number)\n    number //= 2\n\ncommand = ''\n\nwhile\
    \ command.lower() != \"quit\":\n    command = input(\">\")\n    print(\"ECHO\"\
    , command)\n```\n\n### 12. Infinite Loops\n\n```\nwhile True:\n    command = input(\"\
    >\")\n    if command.lower() == \"quit\":\n        break\n    print(\"ECHO\",\
    \ command)\n```\n\n## Chapter 4 Functions\n\n### 1. Functions\n\nA function is\
    \ a reusable chunk of code which we can call as many times as we want.\n\n```\n\
    def greet():\n    print(\"Hi there\")\n    print(\"Welcome aboard\")\n\ngreet()\n\
    ```\n\n### 2. Arguments\n\nParameter is the input we define in the program.\n\
    Argument is the actual value which we pass.\n\n```\ndef greet(first_name, last_name):\n\
    \    print(f\"Hi there {first_name} {last_name}\")\n    print(\"Welcome aboard\"\
    )\n\ngreet(\"Kinjalk\", \"G\")\n```\n\n### 3. Types of Functions\n\n- A. That\
    \ performs a task\n- B. That returns a value\n\n```\ndef get_greeting(first_name,\
    \ last_name):\n    return f\"Hi there {first_name} {last_name}\"\n\nmsg = get_greeting(\"\
    k\", \"g\")\nprint(msg)\n\ndef greet(first_name, last_name):\n    print(f\"Hi\
    \ there {first_name} {last_name}\")\n\nprint(greet(\"Kinjalk\", \"G\"))\n```\n\
    \n### 4. Keyword arguments\n\n```\ndef increment(number, by):\n    return number\
    \ + by\n\nprint(increment(2, by=5))\n```\n\n### 5. Default Arguments\n\n```\n\
    def increment(number, by=1):\n    return number + by\n\nprint(increment(2, 3))\n\
    ```\n\n### 6. Xargs\n\n```\ndef multiply(*numbers):\n    # here numbers is a tuple\n\
    \    product = 1\n    for n in numbers:\n        product *= n\n    return product\n\
    \nprint(multiply(3, 5, 6, 5))\n```\n\n### 7. Xxargs\n\n```\ndef save_user(**user):\n\
    \    # returns a dictionary\n    print(user[\"name\"])\n\nsave_user(id=1, name=\"\
    john\", age=22)\n```\n\n### 8. Scope\n\n```\ndef greet(name):\n    global message\
    \  # global variables are evil\n    message = \"b\"\n    print(message)\n\ngreet(\"\
    kinjalk\")\nprint(message)\n```\n\n## Chapter 5 Data Structure\n\n### 1. Lists\n\
    \n```\nletters = [\"a\", \"b\"]\n\nmatrix = [\n    [0, 1],\n    [2, 3],\n    [3,\
    \ 5] ]\n\nzeros = [0] * 5\n\ncombined = letters + zeros\n\nnumbers = list(range(20))\n\
    \nchars = list(\"Hello World\")\n\nprint(letters)\nprint(matrix)\nprint(zeros)\n\
    print(combined)\nprint(numbers)\nprint(chars)\nprint(len(chars))\n```\n\n### 2.\
    \ Accessing Items\n\n```\nletters = [\"a\", \"b\", \"c\"]\nprint(letters[0])\n\
    print(letters[-1])\nletters[0] = \"g\"\nprint(letters)\n\nletters = [\"a\", \"\
    b\", \"c\", 'd', 'e']\nprint(letters[0:3])\nprint(letters[::2])\n\nnumbers = list(range(20))\n\
    print(numbers[::2])\n\nnumbers = list(range(20))\nprint(numbers[::-1])\n```\n\n\
    ### 3. Unpacking List\n\n```\nnumbers = [5, 2, 3, 5, 6, 6, 7, 8, 9]\nfirst, second,\
    \ *others = numbers\nprint(first)\nprint(others)\n```"
  mdcn: "Kinjalk Gupta\n\n## 通过100多个示例学习Python\n\n版权所有 © 2021 Kinjalk Gupta\n\n保留所有权利。未经版权所有者书面许可，不得以任何方式复制或使用本书的任何部分，但书评中引用的使用除外。更多信息，请联系：kinjalkg01@gmail.com\n\
    \n第一版\n\n## 第1章 入门\n\n### 1. 什么是Python？\n\nPython是一种解释型、高级、通用的编程语言。它可用于多种任务，例如人工智能/机器学习、构建桌面、移动和Web应用程序、编写自动化脚本等等。\n\
    \n有两个版本 -\n\n- Python 2 - 2020年后将过时\n- Python 3 - 将用于未来\n\n### 2. 安装Python\n\n\
    前往python.org并安装Python\n\n确保勾选“Add Python 3.x.x to Path”复选框\n\n### 3. Python解释器\n\
    \n打开CMD并输入Python(Windows)或Python3(Linux)，然后按回车键\n\n表达式是产生值的一段代码。\n\n### 4. 代码编辑器\n\
    \n我们可以使用编辑器或IDE\n\nIDE具有额外的功能：\n\n- 1. 自动补全\n- 2. 调试\n- 3. 测试\n\n编辑器 - VSCode,\
    \ Atom, Sublime\n\nIDE - Pycharm\n\n### 5. Hello World\n\n创建一个扩展名为“.py”的文件。\n\
    每当我们调用一个函数时，我们写()\n写print(\"Hello World\")\n按ctrl + `\n这将打开命令行/终端，现在输入python name_of_the_file.py并按回车键\n\
    \n### 6. Python扩展\n\n这将把VSCode转换为一个强大的IDE，并添加以下功能\n\n- 1. 代码检查\n- 2. 自动补全\n- 3.\
    \ 单元测试\n- 4. 调试\n- 5. 代码格式化\n- 6. 代码片段\n\n### 7. 代码检查\n\n查找潜在错误\n\n### 8. 格式化代码\n\
    \nPEP - Python增强提案\n\n最流行的是pep8\n按cmd+shift+p并搜索Format，然后安装autopep 8\n\n### 9.\
    \ 运行python代码\n\n打开扩展面板并搜索“code runner”\n\n### 10. Python实现\n\n默认的python实现 - Cpython\n\
    其他实现\n- Jython - 用Java编写\n- IronPython - 用C编写\n- PyPy - Python的子集\n\n### 11. Python代码如何执行\n\
    \nC编译器是一个知道如何将c代码编译成机器码（0和1）的程序\n机器码特定于编译它的C程序类型，在windows上编译的程序在mac上无法运行\nJava将其转换为不依赖于机器的java字节码\n\
    JVM将此字节码转换为机器码\n\nC#和python采用了相同的路线\n\n## 第2章 基本类型\n\n### 1. 变量\n\n```\nstudents_count\
    \ = 1000  # int\n\nrating = 4.99  # float\n\nis_published = False  # boolean (can\
    \ be true or false)\n\ncourse_name = \"Python Programming\"  # string\n\nprint(students_count)\n\
    ```\n\n### 2. 变量名\n\n变量名应具有描述性\n\n使用小写字母命名变量\n\n使用下划线分隔多个单词\n\n在等号周围留空格\n\n###\
    \ 3. 字符串\n\n我们可以根据自己的喜好使用单引号或双引号。\n\n要编写多行字符串，请使用三引号\n\n```\ncourse = \"Python\
    \ Programming\"\n\nmessage =\"\"\"\n\nHi John,\n\nBlah blah blah\n\n\"\"\"\n\n\
    course = \"Python Programming\"\n\nprint(len(course))  # 18\n\nprint(course[0])\
    \  # P\n\nprint(course[-1])  # g\n```\n\n```\n# 末尾索引处的字符不包含在内 (Pyt) 切片字符串\nprint(course[0:3])\n\
    print(course[:])\n```\n\n### 4. 转义序列\n\n\\ 是转义字符\n\" 是转义序列\n\n```\ncourse = \"\
    Python \\nProgramming\"\nprint(course)\n```\n\n### 5. 格式化字符串\n\n```\nfirst = 'Kinjalk'\n\
    last = 'Gupta'\n\nfull = f\"{len(first)} {last}\"\nprint(full)\n```\n\n### 6.\
    \ 字符串方法\n\n```\ncourse = \"Python Programming\"\n\nprint(course.upper())  # PYTHON\
    \ PROGRAMMING\n\nprint(course.lower())  # python programming\n\nprint(course.title())\
    \  # Python Programming\n\nprint(course.strip())\n\n# 如果未找到字符串，它将返回 -1，返回一个索引\n\
    \nprint(course.find(\"P\"))\n\nprint(course.replace(\"P\", \"j\"))\n\n# 所有这些都创建了新的字符串\n\
    \nprint(course)\n\nprint(\"Pro\" in course)  # 返回布尔值\n```\n\n### 7. 数字\n\n```\n\
    # 增强运算符\n\nx = 10\n\nx = x+10\n\nx += 10\n```\n\n### 8. 处理数字\n\n```\nprint(round(2.9))\n\
    \nprint(abs(-2))\n\nprint(math.ceil(2.3))\n\nprint(math.floor(2.3))\n```\n\n###\
    \ 9. 类型转换\n\n```\nx = int(input(\"x: \"))\n\nprint(type(x))\n\ny = x+1\n```\n\n\
    假值\n\n- \"\"\n- 0\n- none\n\n真值\n\n其他任何值都将为真\n\n## 第3章 控制流\n\n### 1. 比较运算符\n\n\
    - >\n- <\n- >=\n- <=\n\n### 2. 条件语句\n\n```\ntemp = 15\n\nif temp >= 30:\n    print(\"\
    it's warm\")\n\nelif temp >= 20:\n    print(\"it's nice\")\n\nelse:\n    print(\"\
    it's cold\")\n\nprint(\"Done\")\n```\n\n### 3. 三元运算符\n\n```\nage = 17\n\nif age\
    \ >= 18:\n    message = \"Eligible\"\n\nelse:\n    message = \"Not Eligible\"\n\
    \nprint(message)\n```\n\n```\nmessage = \"Eligible\" if age >= 18 else \"Not eligible\"\
    \nprint(message)\n```\n\n### 4. 逻辑运算符\n\n```\nhigh_income = True\ngood_credit\
    \ = False\nstudent = True\n\nif (high_income or good_credit) and not student:\n\
    \    print(\"eligible\")\nelse:\n    print(\"Not eligible\")\n```\n\n### 5. 短路求值\n\
    \n### 6. 链式比较运算符\n\n```\nage = 22\n\nif age >= 18 and age <= 65:\n    print(\"\
    Eligible\")\n\nif 18 <= age <= 65:\n    print(\"Eligible\")\n```\n\n### 7. For循环\n\
    \n```\nfor number in range(3):\n    print(\"Attempt\", number+1, (number+1)*\"\
    .\")\n\nfor number in range(1, 4):\n    print(\"Attempt\", number, (number)*\"\
    .\")\n```\n\n### 8. For Else循环\n\n```\nsuccessful = False\n\nfor number in range(3):\n\
    \    print(\"Attempt\")\n\n    if successful:\n        print(\"Successful\")\n\
    \        break\nelse:\n    print(\"Attempted 3 times and failed\")\n```\n\n###\
    \ 9. 嵌套循环\n\n```\nfor x in range(5):\n    for y in range(3):\n        print(f\"\
    {x}, {y}\")\n```\n\n### 10. 可迭代对象\n\n```\nprint(type(range(5)))\n# range对象是可迭代的\n\
    for x in \"Python\":\n    print(x)\n\nfor x in [2, 4, 5, 6]:\n    print(x)\n```\n\
    \n### 11. While循环\n\n```\nnumber = 100\n\nwhile number > 0:\n    print(number)\n\
    \    number //= 2\n\ncommand = ''\n\nwhile command.lower() != \"quit\":\n    command\
    \ = input(\">\")\n    print(\"ECHO\", command)\n```\n\n### 12. 无限循环\n\n```\nwhile\
    \ True:\n    command = input(\">\")\n    if command.lower() == \"quit\":\n   \
    \     break\n    print(\"ECHO\", command)\n```\n\n## 第4章 函数\n\n### 1. 函数\n\n函数是一个可重用的代码块，我们可以根据需要多次调用它。\n\
    \n```\ndef greet():\n    print(\"Hi there\")\n    print(\"Welcome aboard\")\n\n\
    greet()\n```\n\n### 2. 参数\n\n参数是我们在程序中定义的输入。\n实参是我们传递的实际值。\n\n```\ndef greet(first_name,\
    \ last_name):\n    print(f\"Hi there {first_name} {last_name}\")\n    print(\"\
    Welcome aboard\")\n\ngreet(\"Kinjalk\", \"G\")\n```\n\n### 3. 函数类型\n\n- A. 执行任务的函数\n\
    - B. 返回值的函数\n\n```\ndef get_greeting(first_name, last_name):\n    return f\"Hi\
    \ there {first_name} {last_name}\"\n\nmsg = get_greeting(\"k\", \"g\")\nprint(msg)\n\
    \ndef greet(first_name, last_name):\n    print(f\"Hi there {first_name} {last_name}\"\
    )\n\nprint(greet(\"Kinjalk\", \"G\"))\n```\n\n### 4. 关键字参数\n\n```\ndef increment(number,\
    \ by):\n    return number + by\n\nprint(increment(2, by=5))\n```\n\n### 5. 默认参数\n\
    \n```\ndef increment(number, by=1):\n    return number + by\n\nprint(increment(2,\
    \ 3))\n```\n\n### 6. Xargs\n\n```\ndef multiply(*numbers):\n    # 这里numbers是一个元组\n\
    \    product = 1\n    for n in numbers:\n        product *= n\n    return product\n\
    \nprint(multiply(3, 5, 6, 5))\n```\n\n### 7. Xxargs\n\n```\ndef save_user(**user):\n\
    \    # 返回一个字典\n    print(user[\"name\"])\n\nsave_user(id=1, name=\"john\", age=22)\n\
    ```\n\n### 8. 作用域\n\n```\ndef greet(name):\n    global message  # 全局变量是邪恶的\n \
    \   message = \"b\"\n    print(message)\n\ngreet(\"kinjalk\")\nprint(message)\n\
    ```\n\n## 第5章 数据结构\n\n### 1. 列表\n\n```\nletters = [\"a\", \"b\"]\n\nmatrix = [\n\
    \    [0, 1],\n    [2, 3],\n    [3, 5] ]\n\nzeros = [0] * 5\n\ncombined = letters\
    \ + zeros\n\nnumbers = list(range(20))\n\nchars = list(\"Hello World\")\n\nprint(letters)\n\
    print(matrix)\nprint(zeros)\nprint(combined)\nprint(numbers)\nprint(chars)\nprint(len(chars))\n\
    ```\n\n### 2. 访问元素\n\n```\nletters = [\"a\", \"b\", \"c\"]\nprint(letters[0])\n\
    print(letters[-1])\nletters[0] = \"g\"\nprint(letters)\n\nletters = [\"a\", \"\
    b\", \"c\", 'd', 'e']\nprint(letters[0:3])\nprint(letters[::2])\n\nnumbers = list(range(20))\n\
    print(numbers[::2])\n\nnumbers = list(range(20))\nprint(numbers[::-1])\n```\n\n\
    ### 3. 解包列表\n\n```\nnumbers = [5, 2, 3, 5, 6, 6, 7, 8, 9]\nfirst, second, *others\
    \ = numbers\nprint(first)\nprint(others)\n```"
