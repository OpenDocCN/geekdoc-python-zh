  md: "a function, usually it can be seen (in other words, it's visible) inside the\
    \ function. On the other hand, if the variable is defined inside a function, usually\
    \ it can't be seen outside that function. The global keyword is one exception\
    \ to this rule. A variable that is defined as global can be seen everywhere. Here's\
    \ an example:\n\n```\n>>> def test():\n    global a\n    a = 1\n    b = 2\n```\n\
    \nWhat do you think happens when you call print(a) and then print(b), after running\
    \ the function test? The first will work, but the second will display an error\
