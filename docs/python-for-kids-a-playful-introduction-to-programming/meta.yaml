    The hash mark (#) before the value ffd800 tells Python we’re providing a *hexadecimal*
    number. Hexadecimal is a way of representing numbers that is commonly used in
    computer programming. It uses a base of 16 (0 through 9 then A through F) rather
    than decimal, which has a base of 10 (0 through 9). If you haven’t learned about
    bases in mathematics, just know that you can convert a normal decimal number to
    hexadecimal using a *format placeholder* in a string: %x (see “Embedding Values
    in Strings” on page 30). For example, to convert the decimal number 15 to hexadecimal,
    you could do this:


    ```

