  md: 'The turtle has moved forward 50 pixels. A *pixel* is a single point on the
    screen—the smallest element that can be represented. Everything you see on your
    computer monitor is made up of pixels, which are tiny, square dots. If you could
    zoom in on the canvas and the line drawn by the turtle, you would be able to see
    that the arrow representing the turtle’s path is just a bunch of pixels. That’s
    simple computer graphics.


    ![](img/a7a5a123e26ba8cb8ef5b41ca45700be_72_0.png)


    Now we’ll tell the turtle to turn left 90 degrees with the following command:


    ```

    >>> t.left(90)

    ```


    If you haven’t learned about degrees yet, here’s how to think about them. Imagine
    that you’re standing in the center of a circle.


    +   - The direction you’re facing is 0 degrees.

    - If you hold out your left arm, that’s 90 degrees left.

    - If you hold out your right arm, that’s 90 degrees right.


    You can see this 90-degree turn to the left or right here:


