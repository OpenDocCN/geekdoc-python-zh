  md: "Now we need the functions for changing the direction between left (turn_left)\
    \ and right (turn_right). We'll add these just after the draw function:\n\n```\n\
    def turn_left(self, evt):\n    self.x = -2\n\ndef turn_right(self, evt):\n   \
    \ self.x = 2\n```\n\nWe can bind these functions to the correct key in the __init__\
    \ function of the class with these two lines. We used binding in \"Making an Object\
    \ React to Something\" on page 187 to make Python call a function when a key is\
    \ pressed. In this case, we bind the turn_left function of our Paddle class to\
    \ the left arrow key using the event name '<KeyPress-Left>'. We then bind the\
    \ turn_right function to the right arrow key using the event name '<KeyPress-Right>'.\
    \ Our __init__ function now looks like this:\n\n```\ndef __init__(self, canvas,\
    \ color):\n    self.canvas = canvas\n    self.id = canvas.create_rectangle(0,\
    \ 0, 100, 10, fill=color)\n    self.canvas.move(self.id, 200, 300)\n    self.x\
    \ = 0\n    self.canvas_width = self.canvas.winfo_width()\n    self.canvas.bind_all('<KeyPress-Left>',\
    \ self.turn_left)\n    self.canvas.bind_all('<KeyPress-Right>', self.turn_right)\n\
    ```\n\nThe draw function for the Paddle class is similar to that for the Ball\
    \ class:\n\n```\ndef draw(self):\n    self.canvas.move(self.id, self.x, 0)\n \
    \   pos = self.canvas.coords(self.id)\n    if pos[0] <= 0:\n        self.x = 0\n\
    \    elif pos[2] >= self.canvas_width:\n        self.x = 0\n```\n\nWe use the\
    \ canvas's move function to move the paddle in the direction of the x variable\
    \ with self.canvas.move(self.id, self.x, 0). Then we get the paddle's coordinates\
    \ to see if it has hit the left or right side of the screen using the value in\
    \ pos."
