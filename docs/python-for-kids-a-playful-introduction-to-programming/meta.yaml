    \ WE’RE TALKING ABOUT LOOPING . . .\n\nA for loop isn’t the only kind of loop\
    \ you can make in Python. There’s also the while loop. A for loop is a loop of\
    \ a specific length, whereas a while loop is a loop that is used when you don’t\
    \ know ahead of time when it needs to stop looping.\n\nImagine a staircase with\
    \ 20 steps. The staircase is indoors, and you know you can easily climb 20 steps.\
    \ A for loop is like that.\n\n```python\n>>> for step in range(0, 20):\n     \
    \   print(step)\n```\n\nNow imagine a staircase going up a mountainside. The mountain\
    \ is really tall, and you might run out of energy before you reach the top, or\
    \ the weather might turn bad, forcing you to stop. This is what a while loop is\
    \ like.\n\n```python\nstep = 0\nwhile step < 10000:\n    print(step)\n    if tired\
    \ == True:\n        break\n    elif badweather == True:\n        break\n    else:\n\
    \        step = step + 1\n```\n\nIf you try to enter and run this code, you’ll\
    \ get an error. Why? The error happens because we haven’t created the variables\
    \ tired and badweather. Although there isn’t enough code here to actually make\
    \ a working program, it does demonstrate a basic example of a while loop.\n\n\
    ![](img/a7a5a123e26ba8cb8ef5b41ca45700be_101_0.png)\n\nWe start by creating a\
    \ variable called step with step = 0. Next, we create a while loop that checks\
    \ whether the value of the variable step is less than 10,000 (step < 10000), which\
    \ is the total number of steps from the bottom of the mountain to the top. As\
    \ long as step is less than 10,000, Python will execute the rest of the code.\n\
    \nWith print(step), we print the value of the variable and then check whether\
    \ the value of the variable tired is True with if tired == True:. (True is called\
    \ a Boolean value, which we’ll learn about in Chapter 8.) If it is, we use the\
    \ break keyword to exit the loop. The break keyword is a way of jumping out of\
    \ a loop (in other words, stopping it) immediately, and it works with both while\
    \ and for loops. Here it has the effect of jumping out of the block and into the\
    \ line step = step + 1.\n\nThe line elif badweather == True: checks to see if\
    \ the variable badweather is set to True. If so, the break keyword exits the loop.\
    \ If neither tired nor badweather is True (else), we add 1 to the step variable\
    \ with step = step + 1, and the loop continues.\n\nSo the steps of a while loop\
    \ are as follows:\n\n1. Check the condition.\n2. Execute the code in the block.\n\
    3. Repeat.\n\nMore commonly, a while loop might be created with a couple of conditions,\
    \ rather than just one, like this:\n\n```python\n>>> x = 45\n>>> y = 80\n>>> while\
    \ x < 50 and y < 100:\n        x = x + 1\n        y = y + 1\n        print(x,\
    \ y)\n```\n\nHere, we create a variable x with the value 45 at ❶, and a variable\
    \ y with the value 80 at ❷. The loop checks for two conditions at ❸: whether x\
    \ is less than 50 and whether y is less than 100. While both conditions are true,\
    \ the lines that follow are executed, adding 1 to both variables and then printing\
    \ them. Here’s the output of this code:\n\n```\n46 81\n47 82\n48 83\n49 84\n50\
    \ 85\n```\n\nCan you figure out how this works?\n\nWe start counting at 45 for\
    \ the variable x and at 80 for the variable y, and then increment (add 1 to each\
    \ variable) every time the code in the loop is run. The loop will run as long\
    \ as x is less than 50 and y is less than 100. After looping five times (1 is\
    \ added to each variable each time), the value in x reaches 50. Now the first\
    \ condition (x < 50) is no longer true, so Python knows to stop looping.\n\nAnother\
    \ common use of a while loop is to create semi-eternal loops. This is a type of\
    \ loop that could go on forever, but actually continues until something happens\
    \ in the code to break out of it. Here’s an example:\n\n```python\nwhile True:\n\
    \    lots of code here\n    lots of code here\n    lots of code here\n    if some_value\
    \ == True:\n        break\n```\n\nThe condition for the while loop is just True,\
    \ which is always true, so the code in the block will always run (thus, the loop\
    \ is eternal). Only if the variable some_value is true will Python break out of\
    \ the loop. You can see a better example of this in “Using randint to Pick a Random\
    \ Number” on page 134, but you might want to wait until you’ve read Chapter 7\
    \ before taking a look at it.\n\n## WHAT YOU LEARNED\n\nIn this chapter, we used\
    \ loops to perform repetitive tasks without all the repetition. We told Python\
    \ what we wanted repeated by writing the tasks inside blocks of code, which we\
    \ put inside loops. We used two types of loops: for loops and while loops, which\
    \ are similar but can be used in different ways. We also used the break keyword\
    \ to stop looping—that is, to break out of a loop.\n\n## PROGRAMMING PUZZLES\n\
