  md: "# AND\n\nThe keyword and is used to join two expressions together in a statement\
    \ (like an if statement) to say that both expressions must be true. Here’s an\
    \ example:\n\n```\nif age > 10 and age < 20:\n    print('Beware the teenager!!!!')\n\
    ```\n\nThis code means that the value of the variable age must be greater than\
    \ 10 *and* less than 20 before the message will be printed.\n\n# AS\n\nThe keyword\
    \ as can be used to give another name to an imported module. For example, suppose\
    \ you had a module with a very long name:\n\n```\ni_am_a_python_module_that_is_not_very_useful\n\
    ```\n\nIt would be enormously annoying to need to type this module name every\
    \ time you wanted to use it:\n\n```\nimport i_am_a_python_module_that_is_not_very_useful\n\
    i_am_a_python_module_that_is_not_very_useful.do_something()\nI have done something\
    \ that is not useful.\ni_am_a_python_module_that_is_not_very_useful.do_something_else()\n\
    I have done something else that is not useful!!\n```\n\nInstead, you can give\
    \ the module a new, shorter name when you import it, and then simply use that\
    \ new name (a bit like a nickname), as follows:\n\n```\nimport i_am_a_python_module_that_is_not_very_useful\
    \ as notuseful\nnotuseful.do_something()\nI have done something that is not useful.\n\
    notuseful.do_something_else()\nI have done something else that is not useful!!\n\
    ```\n\n# ASSERT\n\nassert is a keyword used to say that some code must be true.\
    \ It’s another way of catching errors and problems in code, usually in"
