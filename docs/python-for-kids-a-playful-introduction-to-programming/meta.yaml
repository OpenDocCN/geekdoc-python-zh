  - "[PAGE 174]\n\nUsing similar code, we can create a variety of shapes, from a basic\
    \ square to a spiral star. As you can see, by using for loops, we've made it much\
    \ simpler to draw these shapes. Without for loops, our code would have required\
    \ a lot of tedious typing.\n\nNow let's use an if statement to control how the\
    \ turtle will turn and draw another star variation. In this example, we want the\
    \ turtle to turn one angle the first time, and then another angle the next time.\n\
    \n![](img/a7a5a123e26ba8cb8ef5b41ca45700be_174_0.png)\n\n```\n>>> t.reset()\n\
    >>> for x in range(1, 19):\n        t.forward(100)\n        if x % 2 == 0:\n \
    \           t.left(175)\n        else:\n            t.left(225)\n```\n\nHere,\
    \ we create a loop that will run 18 times (range(1, 19)) and tell the turtle to\
    \ move forward 100 pixels (t.forward(100)). New here is the if statement (if x\
    \ % 2 == 0:). This statement checks to see if the variable x contains an even\
    \ number by using a modulo operator, the % in the expression x % 2 == 0, which\
    \ is a way of saying, \"x mod 2\" is equal to 0.\n\nThe expression x % 2 essentially\
    \ says, \"What is the amount left over when you divide the number in variable\
    \ x into two equal parts?\" For example, if we were to divide 5 balls into two\
    \ parts, we would get two groups of 2 balls (making a total of 4 balls), and the\
    \ remainder (the amount left over) would be 1 ball, as shown here.\n\n![](img/a7a5a123e26ba8cb8ef5b41ca45700be_174_1.png)"
