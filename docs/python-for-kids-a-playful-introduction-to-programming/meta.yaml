- md: "## MAKING THE PADDLE MOVE\n\nTo make the paddle move left and right, we'll\
    \ use event bindings to bind the left and right arrow keys to new functions in\
    \ the Paddle class. When the player presses the left arrow key, the x variable\
    \ will be set to -2 (to move left). Pressing the right arrow key sets the x variable\
    \ to 2 (to move right).\n\nThe first step is to add the x object variable to the\
    \ `__init__` function of our Paddle class, and also a variable for the canvas\
    \ width, as we did with the Ball class:\n\n```python\ndef __init__(self, canvas,\
    \ color):\n    self.canvas = canvas\n    self.id = canvas.create_rectangle(0,\
    \ 0, 100, 10, fill=color)\n    self.canvas.move(self.id, 200, 300)\n    self.x\
    \ = 0\n    self.canvas_width = self.canvas.winfo_width()\n```\n\nNow we need the\
    \ functions for changing the direction between left (`turn_left`) and right (`turn_right`).\
    \ We'll add these just after the `draw` function:\n\n```python\ndef turn_left(self,\
    \ evt):\n    self.x = -2\n\ndef turn_right(self, evt):\n    self.x = 2\n```\n\n\
    We can bind these functions to the correct key in the `__init__` function of the\
    \ class with these two lines. We used binding in \"Making an Object React to Something\"\
    \ on page 187 to make Python call a function when a key is pressed. In this case,\
    \ we bind the `turn_left` function of our Paddle class to the left arrow key using\
    \ the event name `'<KeyPress-Left>'`. We then bind the `turn_right` function to\
    \ the right arrow key using the event name `'<KeyPress-Right>'`. Our `__init__`\
    \ function now looks like this:\n\n```python\ndef __init__(self, canvas, color):\n\
    \    self.canvas = canvas\n    self.id = canvas.create_rectangle(0, 0, 100, 10,\
    \ fill=color)\n    self.canvas.move(self.id, 200, 300)\n    self.x = 0\n    self.canvas_width\
    \ = self.canvas.winfo_width()\n    self.canvas.bind_all('<KeyPress-Left>', self.turn_left)\n\
    \    self.canvas.bind_all('<KeyPress-Right>', self.turn_right)\n```\n\nThe `draw`\
    \ function for the Paddle class is similar to that for the Ball class:\n\n```python\n\
    def draw(self):\n    self.canvas.move(self.id, self.x, 0)\n    pos = self.canvas.coords(self.id)\n\
    \    if pos[0] <= 0:\n        self.x = 0\n    elif pos[2] >= self.canvas_width:\n\
    \        self.x = 0\n```\n\nWe use the canvas's `move` function to move the paddle\
    \ in the direction of the x variable with `self.canvas.move(self.id, self.x, 0)`.\
    \ Then we get the paddle's coordinates to see if it has hit the left or right\
    \ side of the screen using the value in `pos`.\n\nRather than bouncing like the\
    \ ball, the paddle should stop moving. So, when the left x coordinate (`pos[0]`)\
    \ is less than or equal to 0 (`<= 0`), we set the x variable to 0 with `self.x\
    \ = 0`. In the same way, when the right x coordinate (`pos[2]`) is greater than\
    \ or equal to the canvas width (`>= self.canvas_width`), we also set the x variable\
    \ to 0 with `self.x = 0`.\n\n> **NOTE:** If you run the program now, you'll need\
    \ to click the canvas before the game will recognize the left and right arrow\
    \ key actions. Clicking the canvas gives the canvas focus, which means it knows\
    \ to take charge when someone presses a key on the keyboard.\n\n## FINDING OUT\
    \ WHEN THE BALL HITS THE PADDLE\n\nAt this point in our code, the ball won't hit\
    \ the paddle; in fact, the ball will fly straight through the paddle. The ball\
    \ needs to know when it has hit the paddle, just as the ball needs to know when\
    \ it has hit a wall.\n\nWe could solve this problem by adding code to the `draw`\
    \ function (where we have code that checks for walls), but it's a better idea\
    \ to move this sort of code into new functions to break things into smaller chunks.\
    \ If we put too much code in one place (inside one function, for example), we\
    \ can make the code much more difficult to understand. Let's make the necessary\
    \ changes.\n\nFirst, we change the ball's `__init__` function so that we can pass\
    \ in the paddle object as a parameter:\n\n```python\nclass Ball:\n    def __init__(self,\
    \ canvas, paddle, color):\n        self.canvas = canvas\n        self.paddle =\
    \ paddle\n        self.id = canvas.create_oval(10, 10, 25, 25, fill=color)\n \
    \       self.canvas.move(self.id, 245, 100)\n        starts = [-3, -2, -1, 1,\
    \ 2, 3]\n        random.shuffle(starts)\n        self.x = starts[0]\n        self.y\
    \ = -3\n        self.canvas_height = self.canvas.winfo_height()\n        self.canvas_width\
    \ = self.canvas.winfo_width()\n```\n\nNotice at ❶ that we change the parameters\
    \ of `__init__` to include the paddle. Then at ❷, we assign the paddle parameter\
    \ to the object variable `paddle`.\n\nHaving saved the paddle object, we need\
    \ to change the code where we create the ball object. This change is at the bottom\
    \ of the program, just before the main loop:\n\n```python\npaddle = Paddle(canvas,\
    \ 'blue')\nball = Ball(canvas, paddle, 'red')\n\nwhile 1:\n    ball.draw()\n \
    \   paddle.draw()\n    tk.update_idletasks()\n    tk.update()\n    time.sleep(0.01)\n\
    ```\n\nThe code we need to see if the ball has struck the paddle is a little more\
    \ complicated than the code to check for walls. We'll call this function `hit_paddle`\
    \ and add it to the `draw` function of the Ball class, where we see if the ball\
    \ has hit the bottom of the screen:\n\n```python\ndef draw(self):\n    self.canvas.move(self.id,\
    \ self.x, self.y)\n    pos = self.canvas.coords(self.id)\n    if pos[1] <= 0:\n\
    \        self.y = 3\n    if pos[3] >= self.canvas_height:\n        self.y = -3\n\
    \    if self.hit_paddle(pos) == True:\n        self.y = -3\n    if pos[0] <= 0:\n\
    \        self.x = 3\n    if pos[2] >= self.canvas_width:\n        self.x = -3\n\
    ```\n\nAs you can see in the new code we added, if `hit_paddle` returns `True`,\
    \ we change the direction of the ball by setting the y object variable to -3 with\
    \ `self.y = -3`. But don't try to run the game now—we haven't created the `hit_paddle`\
    \ function yet. Let's do that now.\n\nAdd the `hit_paddle` function just before\
    \ the `draw` function.\n\n```python\ndef hit_paddle(self, pos):\n    paddle_pos\
    \ = self.canvas.coords(self.paddle.id)\n    if pos[2] >= paddle_pos[0] and pos[0]\
    \ <= paddle_pos[2]:\n        if pos[3] >= paddle_pos[1] and pos[3] <= paddle_pos[3]:\n\
    \            return True\n    return False\n```\n\nFirst, we define the function\
    \ with the parameter `pos` at ❶. This line contains the ball's current coordinates.\
    \ Then, at ❷, we get the paddle's coordinates and store them in the variable `paddle_pos`.\n\
    \nAt ❸, we have the first part of our if-then statement, and we say, \"If the\
    \ right side of the ball is greater than the left side of the paddle, and the\
    \ left side of the ball is less than the right side of the paddle . . .\" Here,\
    \ `pos[2]` contains the x coordinate for the ball's right side, and `pos[0]` contains\
    \ the x coordinate for its left side. The variable `paddle_pos[0]` contains the\
    \ x coordinate for the paddle's left side, and `paddle_pos[2]` contains its x\
    \ coordinate for the right side. The following diagram shows how these coordinates\
    \ look when the ball is about to hit the paddle.\n\nThe ball is falling toward\
    \ the paddle, but in this case, you see that the right side of the ball (`pos[2]`)\
    \ hasn't yet crossed over the left side of the paddle (that's `paddle_pos[0]`).\n\
    \nAt ❹, we see if the bottom of the ball (`pos[3]`) is between the paddle's top\
    \ (`paddle_pos[1]`) and bottom (`paddle_pos[3]`). In the next diagram, you can\
    \ see that the bottom of the ball (`pos[3]`) has yet to hit the top of the paddle\
    \ (`paddle_pos[1]`).\n\nSo, based on the current position of the ball, the `hit_paddle`\
    \ function would return `false`.\n\n> **NOTE:** Why do we need to see if the bottom\
    \ of the ball is between the top and bottom of the paddle? Why not just see if\
    \ the bottom of the ball has hit the top of the paddle? Because each time we move\
    \ the ball across the canvas, we move in 3-pixel jumps. If we just checked to\
    \ see if the ball had reached the top of the paddle (`pos[1]`), we might have\
    \ jumped past that position. In that case, the ball would continue traveling,\
    \ and it would pass through the paddle without stopping.\n\n## ADDING AN ELEMENT\
    \ OF CHANCE\n\nNow it’s time to turn our program into a game rather than just\
    \ a bouncing ball and a paddle. Games need an element of chance—some way for the\
    \ player to lose. In our current game, the ball will bounce forever, so there’s\
    \ nothing to lose.\n\nWe’ll finish our game by adding code that says that the\
    \ game ends if the ball hits the bottom of the canvas (in other words, once it\
    \ hits the ground)."
