  md: '![](img/a7a5a123e26ba8cb8ef5b41ca45700be_332_0.png)


    Sometimes, when you’re programming for the first time, you’ll encounter a new
    term that just doesn’t make much sense. That lack of understanding can get in
    the way of making any real progress. But there’s a simple solution to that problem!


    I’ve created this glossary to help you through those times when a new word or
    term holds you up. You’ll find definitions of many of the programming terms used
    in this book, so look here if you encounter a word that you don’t understand.'
  merge: -1
