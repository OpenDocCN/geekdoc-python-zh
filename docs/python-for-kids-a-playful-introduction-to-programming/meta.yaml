  md: 'Suppose we want a herd of pink hippogriffs with six legs? We could repeat the
    previous code over and over again, or use copy, which can be found in the copy
    module:


    ```

    >>> import copy

    >>> harry = Animal(''hippogriff'', 6, ''pink'')

    >>> harriet = copy.copy(harry)

    >>> print(harry.species)

    hippogriff

    >>> print(harriet.species)

    hippogriff

    ```


    In this example, we create an object and label it with the variable harry, and
    then we create a copy of that object and label it harriet. These are two completely
    different objects, even though they have the same species. This saves only a bit
    of typing, but when the objects are a lot more complicated, being able to copy
    them can be useful.


    We can also create and copy a list of Animal objects.


    ```

    >>> harry = Animal(''hippogriff'', 6, ''pink'')

    >>> carrie = Animal(''chimera'', 4, ''green polka dots'')

    >>> billy = Animal(''bogill'', 0, ''paisley'')

    >>> my_animals = [harry, carrie, billy]

    >>> more_animals = copy.copy(my_animals)

    >>> print(more_animals[0].species)

    hippogriff

    >>> print(more_animals[1].species)

    chimera

    ```


    In the first three lines, we create three Animal objects and store them in harry,
    carrie, and billy. On the fourth line, we add these objects to the list my_animals.
    Next, we use copy to create a new list, more_animals. Finally, we print the species
    of the first two objects ([0] and [1]) in the more_animals list and see that they''re
    the same as in the original list: hippogriff and chimera. We''ve made a copy of
    the list without needing to create the objects all over again.


    ![](img/a7a5a123e26ba8cb8ef5b41ca45700be_156_0.png)'
  merge: -1
  pgno: 156
- img_proc: true
  md: 'But look what happens if we change the species of one of our Animal objects
    in the original my_animals list (hippogriff to ghoul). Python changes the species
    in more_animals, too.


    ```

    >>> my_animals[0].species = ''ghoul''

    >>> print(my_animals[0].species)

    ghoul

    >>> print(more_animals[0].species)

    ghoul

    ```


    That''s odd. Didn''t we change the species in my_animals only? Why did the species
    change in both lists?

    The species changed because copy actually makes a shallow copy, which means it
    doesn''t copy objects inside the objects we copied. Here, it has copied the main
    list object but not the individual objects inside the list. So we end up with
    a new list that does not have its own new objects—the list more_animals has the
    same three objects inside it.

    By the same token, if we add a new animal to the first list (my_animals), it doesn''t
    appear in the copy (more_animals). As proof, print the length of each list after
    adding another animal, like this:


    ```

    >>> sally = Animal(''sphinx'', 4, ''sand'')

    >>> my_animals.append(sally)

    >>> print(len(my_animals))

    4

    >>> print(len(more_animals))

    3

    ```


    As you can see, when we append a new animal to the first list, my_animals, it
    isn''t added to the copy of that list, more_animals. When we use len and print
    the results, the first list has four elements and the second has three.

    Another function in the copy module, deepcopy, actually creates copies of all
    objects inside the object being copied. When we use deepcopy to copy my_animals,
    we get a new list complete with copies of all of its objects. As a result, changes
    to one of our original Animal objects won''t affect the objects in the new list.
    Here''s an example:


    ```

    >>> more_animals = copy.deepcopy(my_animals)

    >>> my_animals[0].species = ''wyrm''

    >>> print(my_animals[0].species)

    wyrm

    ```'
