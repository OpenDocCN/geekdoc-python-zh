    \ representing the turtle’s canvas:\n\n```\n>>> import turtle\n>>> t = turtle.Pen()\n\
    ```\n\nPython has a lot of modules for doing all sorts of different tasks. In\
    \ this chapter, we’ll look at some of the most useful ones and try some of their\
    \ functions.\n\n## MAKING COPIES WITH THE COPY MODULE\n\nThe copy module contains\
    \ functions for creating copies of objects. Usually, when writing a program, you’ll\
    \ create new objects, but sometimes it’s useful to create a copy of an object,\
    \ and then use that copy to create a new object, particularly when the process\
    \ of creating an object takes several steps.\n\nFor example, suppose we have an\
    \ Animal class, with an __init__ function that takes the parameters name, number_of_legs,\
    \ and color.\n\n![](img/a7a5a123e26ba8cb8ef5b41ca45700be_155_0.png)\n\n```\n>>>\
