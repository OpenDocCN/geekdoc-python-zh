    Next, you need to add a script to the desktop for launching Python''s IDLE application,
    as follows:


    1. Click the **Spotlight** icon, the small magnifying glass at the top-right corner
    of the screen.

    2. In the box that appears, enter *Automator*.

    3. Click the application that looks like a robot when it appears in the menu.
    It will either be in the section labeled Top Hit or in Applications.

    4. Once Automator starts, select the **Application** template:


    ![](img/a7a5a123e26ba8cb8ef5b41ca45700be_33_1.png)


    5. Click **Choose** to continue.

    6. In the list of actions, find **Run Shell Script**, and drag it to the empty
    panel on the right. You’ll see something like this:


    ![](img/a7a5a123e26ba8cb8ef5b41ca45700be_34_0.png)


    7. In the text box, you’ll see the word *cat*. Select the word and replace it
    with the following text (everything from open to -n):


    ```

    open -a "/Applications/Python 3.2/IDLE.app" --args -n

    ```


    You may need to change the directory depending on the version of Python you installed.

    8. Select **File ▸ Save**, and enter *IDLE* as the name.

    9. Select **Desktop** from the Where dialog, and then click **Save**.


    Now you can skip to “Once You’ve Installed Python” on page 10 to get started with
    Python.


    ## INSTALLING PYTHON ON UBUNTU


    Python comes preinstalled on the Ubuntu Linux distribution, but it may be an older
    version. Follow these steps to install Python 3 on Ubuntu 12.x:


    1. Click the button for the Ubuntu Software Center in the Sidebar (it’s the icon
    that looks like an orange bag—if you don’t see it, you can always click the Dash
    Home icon and enter *Software* in the dialog).

    2. Enter *Python* in the search box in the top-right corner of the Software Center.

    3. In the list of software presented, select the latest version of IDLE, which
    is *IDLE (using Python 3.2)* in this example:


    ![](img/a7a5a123e26ba8cb8ef5b41ca45700be_35_0.png)


    4. Click **Install**.

    5. Enter your administrator password to install the software, and then click **Authenticate**.
    (Don''t have the administrator password? Your parent may need to enter it.)


    > **NOTE**

    > *On some versions of Ubuntu you might only see Python (v3.2) in the main menu
    (rather than IDLE)—you can install this instead.*


    Now that you''ve got the latest version of Python installed, let''s give it a
    try.


    ## ONCE YOU''VE INSTALLED PYTHON


    You should now have an icon on your Windows or Mac OS X desktop labeled **IDLE**.
    If you''re using Ubuntu, in the **Applications** menu, you should see a new group
    named **Programming** with the application **IDLE (using Python 3.2)** (or a later
    version).


    ![](img/a7a5a123e26ba8cb8ef5b41ca45700be_35_1.png)


    Double-click the icon or choose the menu option, and you should see this window:


    ![](img/a7a5a123e26ba8cb8ef5b41ca45700be_36_0.png)


    This is the *Python shell*, which is part of Python''s integrated development
    environment. The three greater-than signs (>>>) are called the *prompt*.


    Let''s enter some commands at the prompt, beginning with the following:


    ```

    >>> print("Hello World")

    ```


    Make sure to include the double quotes (" "). Press ENTER on your keyboard when
    you''re finished typing the line. If you''ve entered the command correctly, you
    should see something like this:


    ```

    >>> print("Hello World")

    Hello World

    >>>

    ```


    The prompt should reappear to let you know that the Python shell is ready to accept
    more commands.


    Congratulations! You''ve just created your first Python program. The word print
    is a type of Python command called a *function*, and it prints out whatever is
    inside the parentheses to the screen. In essence, you have given the computer
    an instruction to display the words “Hello World”—an instruction that both you
    and the computer can understand.


    ![](img/a7a5a123e26ba8cb8ef5b41ca45700be_36_1.png)


    ## SAVING YOUR PYTHON PROGRAMS


    Python programs wouldn''t be very useful if you needed to rewrite them every time
    you wanted to use them, never mind print them out so you could reference them.
    Sure, it might be fine to just rewrite short programs, but a large program, like
    a word processor, could contain millions of lines of code. Print that all out,
    and you could have well over 100,000 pages. Just imagine trying to carry that
    huge stack of paper home. Better hope that you won''t meet up with a big gust
    of wind.


    Luckily, we can save our programs for future use. To save a new program, open
    IDLE and choose **File ▸ New Window**. An empty window will appear, with **\*Untitled\***
    in the menu bar. Enter the following code into the new shell window:


    ```

    print("Hello World")

    ```


    Now, choose **File ▸ Save**. When prompted for a filename, enter *hello.py*, and
    save the file to your desktop. Then choose **Run ▸ Run Module**. With any luck,
    your saved program should run, like this:


    ![](img/a7a5a123e26ba8cb8ef5b41ca45700be_37_0.png)


    Now, if you close the shell window but leave the *hello.py* window open and then
    choose **Run ▸ Run Module**, the Python shell should reappear, and your program
    should run again. (To reopen the Python shell without running the program, choose
    **Run ▸ Python Shell**.)


    ![](img/a7a5a123e26ba8cb8ef5b41ca45700be_37_1.png)


    After running the code, you''ll find a new icon on your desktop labeled *hello.py*.
    If you double-click the icon, a black window will appear briefly and then vanish.
    What happened?


    You''re seeing the Python command-line console (similar to the shell) starting
    up, printing “Hello World,” and then exiting. Here''s what would appear if you
    had superhero-like speed vision and could see the window before it closed:


    ![](img/a7a5a123e26ba8cb8ef5b41ca45700be_38_0.png)


    In addition to the menus, you can also use keyboard shortcuts to create a new
    shell window, save a file, and run a program:


    - On Windows and Ubuntu, use CTRL-N to create a new shell window, use CTRL-S to
    save your file after you''ve finished editing, and press F5 to run your program.

    - On Mac OS X, use ⌘-N to create a new shell window, use ⌘-S to save your file,
    and hold down the function (FN) key and press F5 to run your program.


    ## WHAT YOU LEARNED


    We began simply in this chapter with a Hello World application—the program nearly
    everyone starts with when they learn computer programming. In the next chapter,
    we''ll do some more useful things with the Python shell.


    ![](img/a7a5a123e26ba8cb8ef5b41ca45700be_40_0.png)


    # 2 CALCULATIONS AND VARIABLES


    Now that you have Python installed and know how to start the Python shell, you’re
    ready to do something with it. We’ll begin with some simple calculations and then
    move on to variables. *Variables* are a way of storing things in a computer program,
    and they can help you write useful programs.'
