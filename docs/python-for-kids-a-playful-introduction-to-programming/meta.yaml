    \ Python 中，空值被称为 `None`，它表示值的缺失。重要的是要注意，值 `None` 与值 `0` 不同，因为它是值的缺失，而不是一个值为 0\
    \ 的数字。当我们给变量赋予空值 `None` 时，该变量拥有的唯一值就是“无”。以下是一个例子：\n\n```python\n>>> myval = None\n\
