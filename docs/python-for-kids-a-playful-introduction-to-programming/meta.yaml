    **第 2 章**介绍基本计算和变量，**第 3 章**描述一些基本的 Python 类型，如字符串、列表和元组。

    **第 4 章**是 turtle 模块的初次体验。我们将从基础编程跳转到在屏幕上移动一个（箭头形状的）海龟。

