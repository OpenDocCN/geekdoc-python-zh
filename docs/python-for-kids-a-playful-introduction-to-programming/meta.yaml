    ![](img/a7a5a123e26ba8cb8ef5b41ca45700be_332_0.png)


    Sometimes, when you’re programming for the first time, you’ll encounter a new
    term that just doesn’t make much sense. That lack of understanding can get in
    the way of making any real progress. But there’s a simple solution to that problem!


    I’ve created this glossary to help you through those times when a new word or
    term holds you up. You’ll find definitions of many of the programming terms used
    in this book, so look here if you encounter a word that you don’t understand.'
  - '[PAGE 333]


    **animation** The process of displaying a sequence of images fast enough that
    it looks like something is moving.


    **block** A group of computer statements in a program.


    **Boolean** A type of value that can be either true or false. (In Python, it’s
    True or False, with capital T and F.)


    **call** Run the code in a function. When we use a function, we say we are “calling”
    it.


    **canvas** An area of the screen for drawing on. canvas is a class provided by
    the tkinter module.


    **child** When we’re talking about classes, we describe the relationships between
    classes as that of parents and children. A child class inherits the characteristics
    of its parent class.


    **class** A description or definition of a type of thing. In programming terms,
    a class is a collection of functions and variables.


    **click** Press one of the mouse buttons to push an on-screen button, select a
    menu option, and so on.


    **collision** In computer games, when one character in the game crashes into another
    character or object on the screen.


    **condition** An expression in a program that is a bit like a question. Conditions
    evaluate to true or false.


    **coordinates** The position of a pixel on the screen. This is usually described
    as a number of pixels across the screen (x) and a number of pixels down (y).


    **degrees** A unit of measurement for angles.


    **data** Usually refers to information stored and manipulated by a computer.


    **dialog** A dialog is typically a small window in an application that presents
    some contextual information, such as an alert or an error message, or asks you
    to respond to a question. For example, when you choose to open a file, the window
    that appears is usually the File dialog.


    **dimensions** In the context of graphics programming, *two-dimensional* or *three-dimensional*
    refers to how images are displayed on a computer monitor. Two-dimensional (2D)
    graphics are flat images on a screen that have width and height—like'
  - '[PAGE 334]


    the old cartoons you might see on TV. Three-dimensional (3D) graphics are images
    on the screen that have width, height, and the appearance of depth—the sort of
    graphics you might see in a more realistic computer game.


    **directory** The location of a group of files on the hard disk of your computer.


    **embed** Replace values inside a string. The replaced values are sometimes called
    *placeholders*.


    **error** When something goes wrong with a program on your computer, this is an
    error. When programming with Python, you might see all sorts of messages displayed
    in response to an error. If you enter your code incorrectly you might see an IndentationError,
    for example.


    **event** Something that occurs when a program is running. For example, an event
    might be someone moving the mouse, clicking the mouse button, or typing on a keyboard.


    **exception** A type of error that can occur when running a program.


    **execute** Run some code, like a program, a small snippet of code, or a function.


    **frame** One of a series of images that makes up an animation.


    **function** A command in a programming language that is usually a collection
    of statements that perform some action.


    **hexadecimal** A way of representing numbers, particularly in computer programming.
    Hexadecimal numbers are base 16, which means the numbers go from 0 through 9 and
    then A, B, C, D, E, and F.


    **horizontal** The left and right directions on the screen (represented by x).


    **identifier** A number that uniquely names something in a program. For example,
    in Python''s tkinter module, the identifier is used to refer to shapes drawn on
    the canvas.


    **image** A picture on the computer screen.


    **import** In Python terms, importing makes a module available for your program
    to use.'
  - '[PAGE 335]


    **initialize** Refers to setting up the initial state of an object (that is, setting
    variables in the object when it is first created).


    **installation** The process of copying a software application''s files onto your
    computer so that the application is available for use.


    **instance** The instance of a class—in other words, an object.


    **keyword** A special word used by a programming language. Keywords are also referred
    to as *reserved words*, which basically means you can''t use them for anything
    else (for example, you can''t use a keyword as the name of a variable).


    **loop** A repeated command or set of commands.


    **memory** A device or component in your computer that is used to temporarily
    store information.


    **module** A group of functions and variables.


    **null** The absence of value (in Python, also referred to as *None*).


    **object** The specific instance of a class. When you create an object of a class,
    Python sets aside some of your computer''s memory to store information about a
    member of that class.


    **operator** An element in a computer program used for mathematics or for comparing
    values.


    **parameter** A value used with a function when calling it or when creating an
    object (when calling the Python `__init__` function, for example). Parameters
    are sometimes referred to as *arguments*.


    **parent** When referring to classes and objects, the parent of a class is another
    class that functions and variables are inherited from. In other words, a child
    class inherits the characteristics of its parent class. When we''re not talking
    Python, a parent is the person who tells you to brush your teeth before going
    to bed at night.


    **pixel** A single point on your computer screen—the smallest dot that the computer
    is capable of drawing.


    **program** A set of commands that tells a computer what to do.


    **scope** The part, or section, of a program where a variable can be "seen" (or
    used). (A variable inside a function may not be visible to code outside the function.)'
