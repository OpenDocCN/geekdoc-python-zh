- md: "## ADDING OBJECTS TO CLASSES\n\nWe now have a bunch of classes, but what about\
    \ putting some things into those classes? Say we have a giraffe named Reginald.\
    \ We know that he belongs in the class Giraffes, but what do we use, in programming\
    \ terms, to describe single giraffe called Reginald? We call Reginald an *object*\
    \ of the class Giraffes (you may also see the term *instance* of the class). To\
    \ “introduce” Reginald to Python, we use this little snippet of code:\n\n```\n\
    >>> reginald = Giraffes()\n```\n\nThis code tells Python to create an object in\
    \ the Giraffes class and assign it to the variable reginald. Like a function,\
    \ the class name is followed by parentheses. Later in this chapter we'll see how\
    \ to create objects and use parameters in the parentheses.\n\nBut what does the\
    \ reginald object do? Well, nothing at the moment. To make our objects useful,\
    \ when we create our classes, we also need to define functions that can be used\
    \ with the objects in that class. Rather than just using the pass keyword immediately\
    \ after the class definition, we can add function definitions.\n\n## DEFINING\
    \ FUNCTIONS OF CLASSES\n\nChapter 7 introduced functions as a way to reuse code.\
    \ When we define a function that is associated with a class, we do so in the same\
    \ way that we define any other function, except that we indent it beneath the\
    \ class definition. For example, here’s a normal function that isn’t associated\
    \ with a class:\n\n```\n>>> def this_is_a_normal_function():\n        print('I\
    \ am a normal function')\n```\n\nAnd here are a couple of functions that belong\
    \ to a class:\n\n```\n>>> class ThisIsMySillyClass:\n        def this_is_a_class_function():\n\
    \            print('I am a class function')\n        def this_is_also_a_class_function():\n\
    \            print('I am also a class function. See?')\n```\n\n## ADDING CLASS\
    \ CHARACTERISTICS AS FUNCTIONS\n\nConsider the child classes of the Animate class\
    \ we defined on page 95. We can add *characteristics* to each class to describe\
    \ what it is and what it can do. A characteristic is a trait that all of the members\
    \ of the class (and its children) share.\n\nFor example, what do all animals have\
    \ in common? Well, to start with, they all breathe. They also move and eat. What\
    \ about mammals? Mammals all feed their young with milk. And they breathe, move,\
    \ and eat. We know that giraffes eat leaves from high up in trees, and like all\
    \ mammals, they feed their young with milk, breathe, move, and eat food. When\
    \ we add these characteristics to our tree diagram, we get something like this:\n\
    \n![](img/a7a5a123e26ba8cb8ef5b41ca45700be_122_0.png)\n\nThese characteristics\
    \ can be thought of as actions, or *functions*—things that an object of that class\
    \ can do.\nTo add a function to a class, we use the def keyword. So the Animals\
    \ class will look like this:\n\n```\n>>> class Animals(Animate):\n        def\
    \ breathe(self):\n            pass\n        def move(self):\n            pass\n\
    \        def eat_food(self):\n            pass\n```\n\nIn the first line of this\
    \ listing, we define the class as we did before, but instead of using the pass\
    \ keyword on the next line, we define a function called breathe, and give it one\
    \ parameter: self. The self parameter is a way for one function in the class to\
    \ call another function in the class (and in the parent class). We will see this\
    \ parameter in use later.\nOn the next line, the pass keyword tells Python we're\
    \ not going to provide any more information about the breathe function because\
    \ it's going to do nothing for now. Then we add the functions move and eat_food,\
    \ which also do nothing for now. We'll re-create our classes shortly and put some\
    \ proper code in the functions. This is a common way to develop programs. Often,\
    \ programmers will create classes with functions that do nothing as a way to figure\
    \ out what the class should do, before getting into the details of the individual\
    \ functions.\nWe can also add functions to the other two classes, Mammals and\
    \ Giraffes. Each class will be able to use the characteristics (the functions)\
    \ of its parent. This means that you don't need to make one really complicated\
    \ class; you can put your functions in the highest parent where the characteristic\
    \ applies. (This is a good way to make your classes simpler and easier to understand.)\n\
    \n![](img/a7a5a123e26ba8cb8ef5b41ca45700be_123_0.png)\n\n```\n>>> class Mammals(Animals):\n\
    \        def feed_young_with_milk(self):\n            pass\n\n>>> class Giraffes(Mammals):\n\
    \        def eat_leaves_from_trees(self):\n            pass\n```\n\n## WHY USE\
    \ CLASSES AND OBJECTS?\n\nWe've now added functions to our classes, but why use\
    \ classes and objects at all, when you could just write normal functions called\
    \ breathe, move, eat_food, and so on?\n\nTo answer that question, we'll use our\
    \ giraffe called Reginald, which we created earlier as an object of the Giraffes\
    \ class, like this:\n\n```\n>>> reginald = Giraffes()\n```\n\nBecause reginald\
    \ is an object, we can call (or run) functions provided by his class (the Giraffes\
    \ class) and its parent classes. We call functions on an object by using the dot\
    \ operator and the name of the function. To tell Reginald the giraffe to move\
    \ or eat, we can call the functions like this:\n\n```\n>>> reginald = Giraffes()\n\
    >>> reginald.move()\n>>> reginald.eat_leaves_from_trees()\n```\n\nSuppose Reginald\
    \ has a giraffe friend named Harold. Let's create another Giraffes object called\
    \ harold:\n\n```\n>>> harold = Giraffes()\n```\n\nBecause we're using objects\
    \ and classes, we can tell Python exactly which giraffe we're talking about when\
    \ we want to run the move function. For example, if we wanted to make Harold move\
    \ but leave Reginald in place, we could call the move function using our harold\
    \ object, like this:\n\n```\n>>> harold.move()\n```\n\nIn this case, only Harold\
    \ would be moving.\nLet's change our classes a little to make this a bit more\
    \ obvious. We'll add a print statement to each function, instead of using pass:\n\
    \n```\n>>> class Animals(Animate):\n        def breathe(self):\n            print('breathing')\n\
    \        def move(self):\n            print('moving')\n        def eat_food(self):\n\
    \            print('eating food')\n```\n\n```\n>>> class Mammals(Animals):\n \
    \       def feed_young_with_milk(self):\n            print('feeding young')\n\n\
    >>> class Giraffes(Mammals):\n        def eat_leaves_from_trees(self):\n     \
    \       print('eating leaves')\n```\n\nNow when we create our reginald and harold\
    \ objects and call functions on them, we can see something actually happen:\n\n\
    ```\n>>> reginald = Giraffes()\n>>> harold = Giraffes()\n>>> reginald.move()\n\
    moving\n>>> harold.eat_leaves_from_trees()\neating leaves\n```\n\nOn the first\
    \ two lines, we create the variables reginald and harold, which are objects of\
