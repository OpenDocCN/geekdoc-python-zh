    \ the __init__ function of the parent class, Sprite, using self and game as the\
    \ parameter values, because other than the self keyword, the Sprite class's __init__\
    \ function takes only one parameter: game.\n\nAt this point, if we were to create\
    \ a PlatformSprite object, it would have all the object variables from its parent\
    \ class (game, endgame, and coordinates), simply because we've called the __init__\
    \ function in Sprite.\n\nAt ❹, we save the photo_image parameter as an object\
    \ variable, and at ❺ we use the canvas variable of the game object to draw the\
    \ image on screen with create_image.\n\nFinally, we create a Coords object with\
    \ the x and y parameters as the first two arguments. We then add the width and\
