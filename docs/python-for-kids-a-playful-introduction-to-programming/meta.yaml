    # # 5 ASKING QUESTIONS WITH IF AND ELSE


    In programming, we often ask yes or no questions, and decide to do something based
    on the answer. For example, we might ask, “Are you older than 20?” and if the
    answer is yes, respond with “You are too old!”


    These sorts of questions are called *conditions*, and we combine these conditions
    and the responses into *if statements*. Conditions can be more complicated than
    a single question, and if statements can also be combined with multiple questions
    and different responses based on the answer to each question.'
