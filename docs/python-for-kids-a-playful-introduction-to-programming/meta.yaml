  md: "# JAVASCRIPT\n\nJavaScript (https://developer.mozilla.org/en/javascript/) is\
    \ a programming language that is usually used inside web pages but is increasingly\
    \ being used for game programming. The syntax is basically similar to Java, but\
    \ perhaps it's a little easier to get started with JavaScript. (You can create\
    \ a simple HTML page that contains a JavaScript program and run it inside a browser\
    \ without needing a shell, command line, or anything else.) A good place to start\
    \ learning JavaScript might be Codecademy at http://www.codecademy.com/.\n\nA\
    \ “Hello World” example in JavaScript will be different depending on whether you\
    \ run it in a browser or in a shell. In a shell, the example looks like this:\n\
    \n```\nprint('Hello World');\n```\n\nIn a browser, it might look like this:\n\n\
    ```\n<html>\n    <body>\n        <script type=\"text/javascript\">\n         \
    \   alert(\"Hello World\");\n        </script>\n    </body>\n</html>\n```\n\n\
    # FINAL WORDS\n\nWhether you stick with Python or decide to try out another programming\
    \ language (and there are many more than those listed here), you should still\
    \ find the concepts that you've discovered in this book useful. Even if you don't\
    \ continue with computer programming, understanding some of the fundamental ideas\
    \ can help with all sorts of activities, whether in school or later on, at work.\n\
    \nGood luck and have fun with your programming!"
