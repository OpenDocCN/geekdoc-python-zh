  - '[PAGE 126]


    Now here''s where objects start to become powerful. Having created our turtle
    objects, we can call functions on each, and they will draw independently. Try
    this:


    ```

    >>> avery.forward(50)

    >>> avery.right(90)

    >>> avery.forward(20)

    ```


    With this series of instructions, we tell Avery to move forward 50 pixels, turn
    right 90 degrees, and move forward 20 pixels so that she finishes facing downward.
    Remember that turtles always start off facing to the right.

    Now it''s time to move Kate.


    ```

    >>> kate.left(90)

    >>> kate.forward(100)

    ```


    We tell Kate to turn left 90 degrees, and then move forward 100 pixels so that
    she ends facing up.

    So far, we have a line with arrowheads moving in two different directions, with
    the head of each arrow representing a different turtle object: Avery pointing
    down, and Kate facing up.


    ![](img/a7a5a123e26ba8cb8ef5b41ca45700be_126_0.png)


    Now let''s add another turtle, Jacob, and move him, too, without bugging Kate
    or Avery.


    ```

    >>> jacob = turtle.Pen()

    >>> jacob.left(180)

    >>> jacob.forward(80)

    ```'
