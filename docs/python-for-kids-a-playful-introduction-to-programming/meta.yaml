  md: "# ELSE\n\nThe keyword else is used as part of an if statement. See the description\
    \ of the if keyword for an example.\n\n# EXCEPT\n\nThe keyword except is used\
    \ for catching problems in code. It's typically used in fairly complicated programs,\
    \ so we don't use it in this book.\n\n# FINALLY\n\nThe keyword finally is used\
    \ to make sure that if an error occurs, certain code runs (usually to tidy up\
    \ any mess that a piece of code has left behind). This keyword isn't used in this\
    \ book because it's for more advanced programming.\n\n# FOR\n\nThe for keyword\
    \ is used to create a loop of code that runs a certain number of times. Here's\
    \ an example:\n\n```\nfor x in range(0, 5):\n    print('x is %s' % x)\n```\n\n\
    This for loop executes the block of code (the print statement) five times, resulting\
    \ in the following output:\n\n```\nx is 0\nx is 1\nx is 2\nx is 3\nx is 4\n```\n\
    \n# FROM\n\nWhen importing a module, you can import just the part you need using\
