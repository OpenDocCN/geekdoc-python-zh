    \ at ❹, is set to nothing (None).\n\nThe move function defined at ❺ does nothing\
    \ in this parent class, so we use the pass keyword in the body of this function\
    \ at ❻. The coords function at ❼ simply returns the object variable coordinates\
    \ at ❽.\n\nSo our Sprite class has a move function that does nothing and a coords\
    \ function that returns no coordinates. It doesn't sound very useful, does it?\
