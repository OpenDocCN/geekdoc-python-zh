  md: "# PUTTING IT ALL TOGETHER:\nOUR FINAL COLLISION-DETECTION CODE\n\nOnce we've\
    \ determined whether one set of x coordinates has crossed over another, and done\
    \ the same for y coordinates, we can write functions to see whether a sprite has\
    \ hit another sprite and on which side. We'll do this with the functions collided_left,\
    \ collided_right, collided_top, and collided_bottom.\n\n# THE COLLIDED_LEFT FUNCTION\n\
    \nHere's the code for the collided_left function, which you can add below the\
    \ two within functions we just created:\n\n```\ndef collided_left(co1, co2):\n\
    \    if within_y(co1, co2):\n        if co1.x1 <= co2.x2 and co1.x1 >= co2.x1:\n\
    \            return True\n    return False\n```\n\nThis function tells us whether\
    \ the left-hand side (the x1 value) of a first coordinate object has hit another\
    \ coordinate object.\nThe function takes two parameters: co1 (the first coordinate\
    \ object) and co2 (the second coordinate object). As you can see at ❶, we check\
    \ whether the two coordinate objects have crossed over vertically, using the within_y\
    \ function at ❷. After all, there's no point in checking whether Mr. Stick Man\
    \ has hit a platform if he is floating way above it, like this:\n\n![](img/a7a5a123e26ba8cb8ef5b41ca45700be_267_0.png)"
