    \ recent call last):\n  File \"<pyshell#50>\", line 1, in <module>\n    print(first_variable)\n\
    NameError: name 'first_variable' is not defined\n```\n\nIf a variable is defined\
    \ outside the function, it has a different scope. For example, let’s define a\
    \ variable before we create our function, and then try using it inside the function:\n\
    \n```\n>>> another_variable = 100\n>>> def variable_test2():\n        first_variable\
