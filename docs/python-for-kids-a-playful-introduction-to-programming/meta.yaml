  md: 'To really understand how objects work in Python, we need to think about types
    of objects. Let''s start with giraffes and sidewalks.

    A giraffe is a type of mammal, which is a type of animal. A giraffe is also an
    animate object—it''s alive.

    Now consider a sidewalk. There''s not much to say about a sidewalk other than
    it''s not a living thing. Let''s call it an inanimate object (in other words,
    it''s not alive).

    The terms *mammal*, *animal*, *animate*, and *inanimate* are all ways of classifying
    things.


    ![](img/a7a5a123e26ba8cb8ef5b41ca45700be_119_0.png)


    # BREAKING THINGS INTO CLASSES


    In Python, objects are defined by *classes*, which we can think of as a way to
    classify objects into groups. Here is a tree diagram of the classes that giraffes
    and sidewalks would fit into based on our preceding definitions:


    ![](img/a7a5a123e26ba8cb8ef5b41ca45700be_119_1.png)


    The main class is Things. Below the Things class, we have Inanimate and Animate.
    These are further broken down into just Sidewalks for Inanimate, and Animals,
    Mammals, and Giraffes for Animate.'
