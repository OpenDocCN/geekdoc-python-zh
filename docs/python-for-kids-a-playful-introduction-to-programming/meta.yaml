    \n## # 9 Python 的内置函数\n\nPython 拥有一个装备精良的编程工具箱，包括大量现成的函数和模块供你使用。就像一把可靠的锤子或自行车扳手一样，这些内置工具——实际上是代码块——可以让编写程序变得容易得多。\n\
    \n正如你在第 7 章学到的，模块在使用前需要被导入。Python 的*内置函数*不需要先导入；它们在 Python shell 启动时就可用了。在本章中，我们将看一些更有用的内置函数，然后重点介绍其中一个：open\
    \ 函数，它允许你打开文件以便从中读取和写入。\n\n## 使用内置函数\n\n我们将介绍 Python 程序员常用的 12 个内置函数。我会描述它们的功能和使用方法，然后展示它们如何在你的程序中提供帮助的示例。\n\
    \n## ABS 函数\n\nabs 函数返回一个数字的*绝对值*，即不考虑符号的数值。例如，10 的绝对值是 10，-10 的绝对值也是 10。\n要使用\
    \ abs 函数，只需用一个数字或变量作为其参数调用它，如下所示：\n\n```\n>>> print(abs(10))\n10\n>>> print(abs(-10))\n\
    10\n```\n\n你可能会使用 abs 函数来执行诸如计算游戏角色绝对移动量的操作，无论该角色朝哪个方向移动。例如，假设角色向右走了三步（正 3），然后向左走了十步（负\
    \ 10，或 -10）。如果我们不关心方向（正或负），这些数字的绝对值将是 3 和 10。你可能会在棋盘游戏中使用这个，你掷两个骰子，然后根据骰子的总和，让你的角色在任何方向上移动最多步数。现在，如果我们把步数存储在一个变量中，我们可以通过下面的代码来确定角色是否在移动\n\
    \n![](img/a7a5a123e26ba8cb8ef5b41ca45700be_135_0.png)\n\n。当玩家决定移动时，我们可能想显示一些信息（在这种情况下，我们只显示“角色正在移动”）：\n\
    \n```\n>>> steps = -3\n>>> if abs(steps) > 0:\n        print('Character is moving')\n\
    ```\n\n如果我们没有使用 abs，if 语句可能看起来像这样：\n\n```\n>>> steps = -3\n>>> if steps < 0 or\
    \ steps > 0:\n        print('Character is moving')\n```\n\n如你所见，使用 abs 使 if 语句稍微短一点，也更容易理解。\n\
    \n## BOOL 函数\n\nbool 是 *Boolean*（布尔）的缩写，程序员用这个词来描述一种可以有两个可能值之一的数据类型，通常是 true 或\
    \ false。\n\nbool 函数接受一个参数，并根据其值返回 True 或 False。当对数字使用 bool 时，0 返回 False，而任何其他数字返回\
    \ True。以下是你可能如何对各种数字使用 bool 的示例：\n\n```\n>>> print(bool(0))\nFalse\n>>> print(bool(1))\n\
    True\n>>> print(bool(1123.23))\nTrue\n>>> print(bool(-500))\nTrue\n```\n\n当你对其他值（如字符串）使用\
    \ bool 时，如果字符串没有值（换句话说，是关键字 None 或空字符串），它返回 False。否则，它将返回 True，如下所示：\n\n```\n\
    >>> print(bool(None))\nFalse\n>>> print(bool('a'))\nTrue\n>>> print(bool(' '))\n\
    True\n>>> print(bool('What do you call a pig doing karate? Pork Chop!'))\nTrue\n\
    ```\n\nbool 函数对于不包含任何值的列表、元组和映射也会返回 False，当它们包含值时则返回 True：\n\n```\n>>> my_silly_list\
    \ = []\n>>> print(bool(my_silly_list))\nFalse\n>>> my_silly_list = ['s', 'i',\
    \ 'l', 'l', 'y']\n>>> print(bool(my_silly_list))\nTrue\n```\n\n当你需要决定一个值是否已被设置时，你可能会使用\
    \ bool。例如，如果我们要求使用我们程序的人输入他们的出生年份，我们的 if 语句可以使用 bool 来测试他们输入的值：\n\n```\n>>> year\
    \ = input('Year of birth: ')\nYear of birth:\n>>> if not bool(year.rstrip()):\n\
    \        print('You need to enter a value for your year of birth')\nYou need to\
    \ enter a value for your year of birth\n```\n\n这个例子的第一行使用 input 将某人在键盘上输入的内容存储为变量\
    \ year。在下一行按 ENTER 键（不输入任何其他内容）会将 ENTER 键的值存储在变量中。（我们在第 7 章使用了 sys.stdin.readline()，这是另一种实现相同功能的方法。）\n\
