    \ make it easier to understand. You’ve learned how to draw graphics on the screen\
    \ with both the turtle and tkinter modules. Now it’s time to use that knowledge\
    \ to create your first game.\n\n## WHACK THE BOUNCING BALL\n\nWe're going to develop\
    \ a game with a bouncing ball and a paddle. The ball will fly around the screen,\
    \ and the player will bounce it off the paddle. If the ball hits the bottom of\
    \ the screen, the game comes to an end. Here's a preview of the finished game:\n\
    \n![](img/a7a5a123e26ba8cb8ef5b41ca45700be_219_0.png)\n\nOur game may look quite\
    \ simple, but the code will be a bit trickier than what we've written so far because\
    \ there are a lot of things that it needs to handle. For example, it needs to\
    \ animate the paddle and the ball, and detect when the ball hits the paddle or\
    \ the walls.\n\nIn this chapter, we'll begin creating the game by adding a game\
    \ canvas and a bouncing ball. In the next chapter, we'll complete the game by\
    \ adding the paddle.\n\n## CREATING THE GAME CANVAS\n\nTo create your game, first\
    \ open a new file in the Python shell (select **File ▸ New Window**). Then import\
    \ tkinter and create a canvas to draw on:\n\n```\nfrom tkinter import *\nimport\
    \ random\nimport time\n\ntk = Tk()\ntk.title(\"Game\")\ntk.resizable(0, 0)\ntk.wm_attributes(\"\
    -topmost\", 1)\ncanvas = Canvas(tk, width=500, height=400, bd=0, highlightthickness=0)\n\
    canvas.pack()\ntk.update()\n```\n\nThis is a little different from previous examples.\
    \ First, we import the time and random modules with `import random` and `import\
    \ time`, for use a bit later in the code.\n\nWith `tk.title(\"Game\")`, we use\
    \ the title function of the tk object we created with `tk = Tk()` to give the\
    \ window a title. Then we use resizable to make the window a fixed size. The parameters\
    \ 0, 0 say “the size of the window cannot be changed either horizontally or vertically.”\
    \ Next, we call wm_attributes to tell tkinter to place the window containing our\
    \ canvas in front of all other windows (\"-topmost\").\n\nNotice that when we\
    \ create a canvas object with `canvas =`, we pass in a few more named parameters\
    \ than with previous examples. For example, both `bd=0` and `highlightthickness=0`\
    \ make sure that there’s no border around the outside of the canvas, which makes\
    \ it look better on our game screen.\n\nThe line `canvas.pack()` tells the canvas\
    \ to size itself according to the width and height parameters given in the preceding\
    \ line. Finally, `tk.update()` tells tkinter to initialize itself for the animation\
    \ in our game. Without this last line, nothing would work quite as expected.\n\
    \n![](img/a7a5a123e26ba8cb8ef5b41ca45700be_220_0.png)\n\nMake sure you save your\
    \ code as you go. Give it a meaningful filename the first time you save it, such\
    \ as `paddleball.py`.\n\n## CREATING THE BALL CLASS\n\nNow we'll create the class\
    \ for the ball. We'll begin with the code we need for the ball to draw itself\
    \ on the canvas. Here's what we need to do:\n\n- Create a class called Ball that\
    \ takes parameters for the canvas and the color of the ball we're going to draw.\n\
    - Save the canvas as an object variable because we'll draw our ball on it.\n-\
    \ Draw a filled circle on the canvas using the value of the color parameter as\
    \ the fill color.\n- Save the identifier that tkinter returns when it draws the\
    \ circle (oval) because we're going use this to move the ball around the screen.\n\
    - Move the oval to the middle of the canvas.\n\nThis code should be added just\
    \ after the first two lines in the file (after `import time`):\n\n```\nfrom tkinter\
    \ import *\nimport random\nimport time\n\nclass Ball:\n    def __init__(self,\
    \ canvas, color):\n        self.canvas = canvas\n        self.id = canvas.create_oval(10,\
    \ 10, 25, 25, fill=color)\n        self.canvas.move(self.id, 245, 100)\n\n   \
    \ def draw(self):\n        pass\n```\n\nFirst, we name our class Ball at ❶. Then\
    \ we create an initialization function (as described in Chapter 8) that takes\
