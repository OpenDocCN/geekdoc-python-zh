    \ (most recent call last):\n  File \"<stdin>\", line 1, in <module>\nTypeError:\
    \ unsupported operand type(s) for +: 'dict' and 'dict'\n```\n\nJoining maps doesn't\
    \ make sense to Python, so it just throws up its hands.\n\n## WHAT YOU LEARNED\n\
    \nIn this chapter, you learned how Python uses strings to store text, and how\
    \ it uses lists and tuples to handle multiple items. You saw that the items in\
    \ lists can be changed, and that you can join one list to another list, but that\
    \ the values in a tuple cannot change. You also learned how to use maps to store\
    \ values with keys that identify them.\n\n## PROGRAMMING PUZZLES\n\nThe following\
