  md: "Let's create a function to show how many cans we've flattened each week up\
    \ to a year. Our function will take the number of cans as a parameter:\n\n```\n\
    >>> def spaceship_building(cans):\n    total_cans = 0\n    for week in range(1,\
    \ 53):\n        total_cans = total_cans + cans\n        print('Week %s = %s cans'\
    \ % (week, total_cans))\n```\n\nOn the first line of the function, we create a\
    \ variable called total_cans and set its value to 0. We then create a loop for\
    \ the weeks in the year and add the number of cans flattened each week. This block\
    \ of code makes up the content of our function. But there's also another block\
    \ of code in this function: its last two lines, which make up the block of the\
    \ for loop.\nLet's try entering that function in the shell and calling it with\
    \ different values for the number of cans:\n\n```\n>>> spaceship_building(2)\n\
    Week 1 = 2 cans\nWeek 2 = 4 cans\nWeek 3 = 6 cans\nWeek 4 = 8 cans\nWeek 5 = 10\
    \ cans\nWeek 6 = 12 cans\nWeek 7 = 14 cans\nWeek 8 = 16 cans\nWeek 9 = 18 cans\n\
    Week 10 = 20 cans\n(continues on...)\n\n>>> spaceship_building(13)\nWeek 1 = 13\
    \ cans\nWeek 2 = 26 cans\nWeek 3 = 39 cans\nWeek 4 = 52 cans\nWeek 5 = 65 cans\n\
    (continues on...)\n```\n\nThis function can be reused with different values for\
    \ the number of cans per week, which is a bit more efficient than retyping the\
    \ for loop every time you want to try it with different numbers."
