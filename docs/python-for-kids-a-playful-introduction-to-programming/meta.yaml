    \ use our giraffe called Reginald, which we created earlier as an object of the\
    \ Giraffes class, like this:\n\n```\n>>> reginald = Giraffes()\n```\n\nBecause\
    \ reginald is an object, we can call (or run) functions provided by his class\
    \ (the Giraffes class) and its parent classes. We call functions on an object\
    \ by using the dot operator and the name of the function. To tell Reginald the\
    \ giraffe to move or eat, we can call the functions like this:\n\n```\n>>> reginald\
    \ = Giraffes()\n>>> reginald.move()\n>>> reginald.eat_leaves_from_trees()\n```\n\
    \nSuppose Reginald has a giraffe friend named Harold. Let's create another Giraffes\
    \ object called harold:\n\n```\n>>> harold = Giraffes()\n```\n\nBecause we're\
    \ using objects and classes, we can tell Python exactly which giraffe we're talking\
    \ about when we want to run the move function. For example, if we wanted to make\
    \ Harold move but leave Reginald in place, we could call the move function using\
    \ our harold object, like this:\n\n```\n>>> harold.move()\n```\n\nIn this case,\
    \ only Harold would be moving.\nLet's change our classes a little to make this\
    \ a bit more obvious. We'll add a print statement to each function, instead of\
    \ using pass:\n\n```\n>>> class Animals(Animate):\n        def breathe(self):\n\
    \            print('breathing')\n        def move(self):\n            print('moving')\n\
    \        def eat_food(self):\n            print('eating food')\n```"
