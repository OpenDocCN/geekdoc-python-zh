  md: '```

    tk = Tk()

    tk.title("Game")

    tk.resizable(0, 0)

    tk.wm_attributes("-topmost", 1)

    canvas = Canvas(tk, width=500, height=400, bd=0, highlightthickness=0)

    canvas.pack()

    tk.update()

    ```


    This is a little different from previous examples. First, we import the time and
    random modules with import random and import time, for use a bit later in the
    code.


    With tk.title("Game"), we use the title function of the tk object we created with
    tk = Tk() to give the window a title. Then we use resizable to make the window
    a fixed size. The parameters 0, 0 say “the size of the window cannot be changed
    either horizontally or vertically.” Next, we call wm_attributes to tell tkinter
    to place the window containing our canvas in front of all other windows ("-topmost").


    Notice that when we create a canvas object with canvas =, we pass in a few more
    named parameters than with previous examples. For example, both bd=0 and highlightthickness=0
    make sure that there’s no border around the outside of the canvas, which makes
    it look better on our game screen.


    The line canvas.pack() tells the canvas to size itself according to the width
    and height parameters given in the preceding line. Finally, tk.update() tells
    tkinter to initialize itself for the animation in our game. Without this last
    line, nothing would work quite as expected.


    ![](img/a7a5a123e26ba8cb8ef5b41ca45700be_220_0.png)


    Make sure you save your code as you go. Give it a meaningful filename the first
    time you save it, such as paddleball.py.'
