    *Keywords* in Python (and in most programming languages) are words that have special
    meaning. They are used as part of the programming language itself, and therefore
    must not be used for anything else. For example, if you try to use keywords as
    variables, or use them in the wrong way, you will get strange (sometimes funny,
    sometimes confusing) error messages from the Python console.


    This appendix describes each of the Python keywords. You should find this to be
    a handy reference as you continue to program.'
