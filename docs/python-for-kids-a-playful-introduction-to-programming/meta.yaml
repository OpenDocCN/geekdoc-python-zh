    # ADDING ITEMS TO A LIST


    To add items to a list, we use the append function. A *function* is a chunk of
    code that tells Python to do something. In this case, append adds an item to the
    end of a list.


    For example, to add a bear burp (I''m sure there is such a thing) to the wizard''s
    shopping list, do this:


    ```

    >>> wizard_list.append(''bear burp'')

    >>> print(wizard_list)

    [''spider legs'', ''toe of frog'', ''snail tongue'', ''bat wing'', ''slug butter'',
    ''snake dandruff'', ''bear burp'']

    ```


    You can keep adding more magical items to the wizard''s list in the same way,
    like so:


    ```

    >>> wizard_list.append(''mandrake'')

    >>> wizard_list.append(''hemlock'')

    >>> wizard_list.append(''swamp gas'')

    ```


    Now the wizard''s list looks like this:


    ```

    >>> print(wizard_list)

    [''spider legs'', ''toe of frog'', ''snail tongue'', ''bat wing'', ''slug butter'',
    ''snake dandruff'', ''bear burp'', ''mandrake'', ''hemlock'', ''swamp gas'']

    ```


    The wizard is clearly ready to work some serious magic!


    # REMOVING ITEMS FROM A LIST


    To remove items from a list, use the del command (short for *delete*). For example,
    to remove the sixth item in the wizard''s list, snake dandruff, do this:


    ```

    >>> del wizard_list[5]

    >>> print(wizard_list)

    [''spider legs'', ''toe of frog'', ''snail tongue'', ''bat wing'', ''slug butter'',
    ''bear burp'', ''mandrake'', ''hemlock'', ''swamp gas'']

    ```


    > Remember that positions start at zero, so wizard_list[5] actually refers to
    the sixth item in the list.'
