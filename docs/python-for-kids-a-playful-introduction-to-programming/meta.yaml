  - '[PAGE 336]


    **shell** In computing, a shell is a command-line interface of some kind. In this
    book, “the Python shell” refers to the IDLE application.


    **software** A collection of computer programs.


    **sprite** A character or an object in a computer game.


    **string** A collection of alphanumeric characters (letters, numbers, punctuation,
    and whitespace).


    **syntax** The arrangement and order of words in a program.


    **transparency** In graphics programming, part of an image that isn’t displayed,
    meaning it doesn’t overwrite whatever is displayed behind it.


    **variable** Something used to store values. A variable is like a label for information
    held in the computer’s memory. Variables aren’t permanently tied to a specific
    value, hence the name “variable,” meaning it can change.


    **vertical** The up and down directions on the screen (represented by y).'
