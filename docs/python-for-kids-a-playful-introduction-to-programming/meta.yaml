    \ what does the reginald object do? Well, nothing at the moment. To make our objects\
    \ useful, when we create our classes, we also need to define functions that can\
    \ be used with the objects in that class. Rather than just using the pass keyword\
    \ immediately after the class definition, we can add function definitions."
