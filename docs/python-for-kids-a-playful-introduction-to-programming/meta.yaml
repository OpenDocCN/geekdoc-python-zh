- md: 'FOR KIDS AGED 10+ (AND THEIR PARENTS)


    ## REAL PROGRAMMING. REAL EASY.


    ILLUSTRATIONS BY MIRAN LIPOVAČA


    ![](img/a7a5a123e26ba8cb8ef5b41ca45700be_347_0.png)


    Python is a powerful, expressive programming language that’s easy to learn and
    fun to use! But books about learning to program in Python can be kind of dull,
    gray, and boring, and that’s no fun for anyone.


    *Python for Kids* brings Python to life and brings you (and your parents) into
    the world of programming. The ever-patient Jason R. Briggs will guide you through
    the basics as you experiment with unique (and often hilarious) example programs
    that feature ravenous monsters, secret agents, thieving ravens, and more. New
    terms are defined; code is colored, dissected, and explained; and quirky, full-color
    illustrations keep things on the lighter side.


    Chapters end with programming puzzles designed to stretch your brain and strengthen
    your understanding. By the end of the book you’ll have programmed two complete
    games: a clone of the famous Pong and “Mr. Stick Man Races for the Exit”—a platform
    game with jumps, animation, and much more.


    As you strike out on your programming adventure, you’ll learn how to:


    - Use fundamental data structures like lists, tuples, and maps

    - Organize and reuse your code with functions and modules

    - Use control structures like loops and conditional statements

    - Draw shapes and patterns with Python’s turtle module

    - Create games, animations, and other graphical wonders with tkinter


    Why should serious adults have all the fun? *Python for Kids* is your ticket into
    the amazing world of computer programming.


    ## ABOUT THE AUTHOR


    Jason R. Briggs has been a programmer since the age of eight, when he first learned
    BASIC on a Radio Shack TRS-80. He has written software professionally as a developer
    and systems architect and served as Contributing Editor for *Java Developer’s
    Journal*. His articles have appeared in *JavaWorld*, *ONJava*, and *ONLamp*. *Python
    for Kids* is his first book.


    ![](img/a7a5a123e26ba8cb8ef5b41ca45700be_347_1.png)


    www.nostarch.com

    THE FINEST IN GEEK ENTERTAINMENT™


    ISBN: 978-1-59327-407-8


    $34.95 ($36.95 CDN)


