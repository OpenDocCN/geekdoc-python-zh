    \ the following code works just fine:\n\n```\n>>> age = 15\n>>> if age > 10:\n\
    \        print('older than 10')\n```\n\nolder than 10\n\nBut if you don’t fill\
    \ in the block of code (the body) for the if statement, you’ll get an error message:\n\
    \n```\n>>> age = 15\n>>> if age > 10:\n```\n\n```\nFile \"<stdin>\", line 2\n\
    \    ^\nIndentationError: expected an indented block\n```\n\nThis is the error\
    \ message Python displays when you should have a block of code after a statement\
    \ of some kind (it won’t even let you type this kind of code if you’re using IDLE).\
    \ In cases like these, you can use the pass keyword to write a statement but not\
    \ provide the block of code that goes with it.\n\nFor example, say you want to\
    \ create a for loop with an if statement inside it. Perhaps you haven’t decided\
    \ what to put in the if statement yet—maybe you’ll use the print function, put\
    \ in a break, or something else. You can use pass, and the code will still work\
    \ (even if it doesn’t do exactly what you want yet).\n\nHere’s our if statement\
    \ again, this time using the pass keyword:\n\n```\n>>> age = 15\n>>> if age >\
