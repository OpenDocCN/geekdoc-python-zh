  md: "Let's try the same thing with the Sidewalks class. We create the Sidewalks\
    \ class with the parent class Inanimate like so:\n\n```\n>>> class Sidewalks(Inanimate):\n\
    \        pass\n```\n\nAnd we can organize the Animals, Mammals, and Giraffes classes\
