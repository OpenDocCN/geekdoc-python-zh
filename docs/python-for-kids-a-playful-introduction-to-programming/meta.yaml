  - "[PAGE 264]\n\n# CHECKING FOR COLLISIONS\n\nOnce we know how to store the position\
    \ of our game sprites, we need a way to tell if one sprite has collided with another,\
    \ like when Mr. Stick Man jumps around the screen and bangs into one of the platforms.\
    \ To make this problem easier to solve, we can break it down into two smaller\
    \ problems: checking if sprites are colliding vertically and checking if sprites\
    \ are colliding horizontally. Then we can combine our two smaller solutions to\
    \ easily see if two sprites are colliding in any direction!\n\n# SPRITES COLLIDING\
    \ HORIZONTALLY\n\nFirst, we'll create the `within_x` function to determine if\
    \ one set of x coordinates (x1 and x2) has crossed over another set of x coordinates\
    \ (again, x1 and x2). There's more than one way to do this, but here's a simple\
    \ approach which you can add just below the Coords class:\n\n```\nclass Coords:\n\
    \    def __init__(self, x1=0, y1=0, x2=0, y2=0):\n        self.x1 = x1\n     \
    \   self.y1 = y1\n        self.x2 = x2\n        self.y2 = y2\n\ndef within_x(co1,\
    \ co2):\n    if co1.x1 > co2.x1 and co1.x1 < co2.x2:\n        return True\n  \
    \  elif co1.x2 > co2.x1 and co1.x2 < co2.x2:\n        return True\n    elif co2.x1\
    \ > co1.x1 and co2.x1 < co1.x2:\n        return True\n    elif co2.x2 > co1.x1\
    \ and co2.x2 < co1.x1:\n        return True\n    else:\n        return False\n\
    ```\n\nThe `within_x` function takes the parameters co1 and co2, both Coords objects.\
    \ At ❶, we check to see if the leftmost position of the first coordinate object\
    \ (co1.x1) is between the leftmost position (co2.x1) and the rightmost position\
    \ (co2.x2) of the second coordinate object. We return True at ❷ if it is."
