    \ sprite_co. Then the code at ❺ checks for the following:\n\n- The stick figure\
    \ has not hit the top of the canvas (the top variable is still true).\n- The stick\
    \ figure is jumping (the value of y is less than 0).\n- The top of the stick figure\
    \ has collided with the sprite from the list (using the collided_top function\
    \ we created in Chapter 16).\n\nIf all of these conditions are true, we want the\
    \ sprite to start falling back down again, so at ❻, we reverse the value of the\
    \ y using minus (-). The top variable is set to False at ❼, because once the stick\
    \ figure has hit the top, we don't need to keep checking for a collision.\n\n\
    ## COLLIDING AT THE BOTTOM\n\nThe next part of the loop checks to see if the bottom\
    \ of our character has hit something:\n\n```\nif top and self.y < 0 and collided_top(co,\
    \ sprite_co):\n    self.y = -self.y\n    top = False\n❶ if bottom and self.y >\
    \ 0 and collided_bottom(self.y, \\n        co, sprite_co):\n❷     self.y = sprite_co.y1\
    \ - co.y2\n❸     if self.y < 0:\n❹         self.y = 0\n❺     bottom = False\n\
    ❻     top = False\n```\n\nThere are three similar checks at ❶: whether the bottom\
    \ variable is still set, whether the character is falling (y is greater than 0),\
    \ and whether the bottom of our character has hit the sprite. If all three checks\
    \ are true, we subtract the bottom y value (y2) of the stick figure from the top\
    \ y value of the sprite (y1) at ❷. This might seem strange, so let's see why we\
    \ do this.\n\nImagine that our game character has fallen off a platform. He moves\
    \ down the screen 4 pixels each time the mainloop function runs, and the foot\
    \ of the stick figure is 3 pixels above another platform. Let's say the stick\
    \ figure's bottom (y2) is at position 57 and the top of the platform (y1) is at\
    \ position 60. In this case, the collided_bottom function would return true, because\
    \ its code will add the value of y (which is 4) to the stick figure's y2 variable,\
    \ resulting in 61.\n\nHowever, we don't want Mr. Stick Man to stop falling as\
    \ soon as it looks like he will hit a platform or the bottom of the screen, because\
    \ that would be like taking a huge jump off a step and stopping in midair, an\
