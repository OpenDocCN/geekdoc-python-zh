    \ of the list?\nIn computer programming, commands should work in exactly the same\
    \ way every time you enter them. That dumb computer sees things only in black\
    \ and white. Ask it to make a complicated decision, and it throws up its hands\
    \ with errors.\n\n# TUPLES\n\nA *tuple* is like a list that uses parentheses,\
