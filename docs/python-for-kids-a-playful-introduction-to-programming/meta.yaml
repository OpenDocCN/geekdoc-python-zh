    \ the tkinter module and basic animation. Visit http://python-for-kids.com/ for\
    \ solutions.\n\n### #1: FILL THE SCREEN WITH TRIANGLES\n\nCreate a program using\
    \ tkinter to fill the screen with triangles. Then change the code to fill the\
