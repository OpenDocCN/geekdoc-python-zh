    \ line of this listing, we define the class as we did before, but instead of using\
    \ the pass keyword on the next line, we define a function called breathe, and\
    \ give it one parameter: self. The self parameter is a way for one function in\
    \ the class to call another function in the class (and in the parent class). We\
    \ will see this parameter in use later.\nOn the next line, the pass keyword tells\
    \ Python we're not going to provide any more information about the breathe function\
