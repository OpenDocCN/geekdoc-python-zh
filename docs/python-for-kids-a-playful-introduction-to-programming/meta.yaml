    \n## MAKING THE BALL MOVE\n\nTo move the ball, change the `draw` function as follows:\n\
    \n```\nclass Ball:\n    def __init__(self, canvas, color):\n        self.canvas\
    \ = canvas\n        self.id = canvas.create_oval(10, 10, 25, 25, fill=color)\n\
    \        self.canvas.move(self.id, 245, 100)\n\n    def draw(self):\n        self.canvas.move(self.id,\
    \ 0, -1)\n```\n\nSince `__init__` saved the canvas parameter as the object variable\
    \ canvas, we use that variable with `self.canvas`, and call the function move\
    \ on the canvas.\n\nWe pass three parameters to move: the id of the oval, and\
    \ the numbers 0 and -1. The 0 says don't move horizontally, and the -1 says move\
