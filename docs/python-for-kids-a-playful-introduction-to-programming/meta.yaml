  md: "At ❸, we see if the value of the leftmost position of the first coordinate\
    \ object (co1.x1) has hit the x2 position of the second coordinate object (co2.x2)—that\
    \ it is less than or equal to the x2 position. We also check to make sure that\
    \ it hasn’t gone past the x1 position. If it has hit the side, we return True\
    \ at ❹. If none of the if statements are true, we return False at ❺.\n\n![](img/a7a5a123e26ba8cb8ef5b41ca45700be_268_0.png)\n\
    \n# THE COLLIDED_RIGHT FUNCTION\n\nThe collided_right function looks a lot like\
    \ collided_left:\n\n```\ndef collided_right(co1, co2):\n    if within_y(co1, co2):\n\
    \        if co1.x2 >= co2.x1 and co1.x2 <= co2.x2:\n            return True\n\
    \    return False\n```\n\nAs with collided_left, we check to see if the y coordinates\
    \ have crossed over each other using the within_y function at ❶. We then check\
    \ to see if the x2 value is between the x1 and x2 positions of the second coordinate\
    \ object at ❷, and return True at ❸ if it is. Otherwise, we return False at ❹.\n\
    \n# THE COLLIDED_TOP FUNCTION\n\nThe collided_top function is very similar to\
    \ the two functions we just added.\n\n```\ndef collided_top(co1, co2):\n    if\
    \ within_x(co1, co2):\n        if co1.y1 <= co2.y2 and co1.y1 >= co2.y1:\n   \
    \         return True\n    return False\n```\n\nThe difference is that this time,\
    \ we check to see if the coordinates have crossed over horizontally, using the\
    \ within_x function at ❶. Next, at ❷, we see if the topmost position of the first\
    \ coordinate (co1.y1) has crossed over the y2 position of the second coordinate,\
    \ but not its y1 position. If so, we return True (meaning that yes, the top of\
    \ the first coordinate has hit the second coordinate)."
