    # OPENING A FILE IN PYTHON


    Python''s built-in open function opens a file in the Python shell and displays
    its contents. How you tell the function which file to open depends on your operating
    system. Look over the example for a Windows file, and then read the Mac- or Ubuntu-specific
    section if you''re using one of those systems.


    # OPENING A WINDOWS FILE


    If you''re using Windows, enter the following code to open *test.txt*:


    ```

    >>> test_file = open(''c:\test.txt'')

    >>> text = test_file.read()

    >>> print(text)

    There once was a boy named Marcelo

    Who dreamed he ate a marshmallow

    He awoke with a start

    As his bed fell apart

    And he found he was a much rounder fellow

    ```


    On the first line, we use open, which returns a file object with functions for
    working with files. The parameter we use with the open function is a string telling
    Python where to find the file. If you''re using Windows, you saved *test.txt*
    to the local disk on the C: drive, so you specify the location of your file as
    c:\test.txt.'
