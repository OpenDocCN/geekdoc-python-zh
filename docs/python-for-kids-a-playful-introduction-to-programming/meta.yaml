    \ 代码将如下所示：\n\n![](img/a7a5a123e26ba8cb8ef5b41ca45700be_64_0.png)\n\n```\n>>> favorite_sports\
    \ = {'Ralph Williams' : 'Football',\n                      'Michael Tippett' :\
    \ 'Basketball',\n                      'Edward Elgar' : 'Baseball',\n        \
    \              'Rebecca Clarke' : 'Netball',\n                      'Ethel Smyth'\
    \ : 'Badminton',\n                      'Frank Bridge' : 'Rugby'}\n```\n\n我们使用冒号将每个键与其值分开，并且每个键和值都用单引号括起来。还要注意，地图中的项目包含在花括号（{}）中，而不是圆括号或方括号。\n\
    \n结果是一个地图（每个键映射到一个特定的值），如表 3-1 所示。\n\n**表 3-1：** 最喜爱运动地图中指向值的键\n\n| 键 | 值 |\n\
    | :--- | :--- |\n| Ralph Williams | Football |\n| Michael Tippett | Basketball\
    \ |\n| Edward Elgar | Baseball |\n| Rebecca Clarke | Netball |\n| Ethel Smyth\
    \ | Badminton |\n| Frank Bridge | Rugby |\n\n现在，要获取 Rebecca Clarke 最喜欢的运动，我们使用她的名字作为键来访问我们的地图\
    \ favorite_sports，如下所示：\n\n```\n>>> print(favorite_sports['Rebecca Clarke'])\n\
    Netball\n```\n\n答案是无挡板篮球。\n要删除地图中的一个值，请使用其键。例如，以下是删除 Ethel Smyth 的方法：\n\n```\n\
    >>> del favorite_sports['Ethel Smyth']\n>>> print(favorite_sports)\n{'Rebecca\
    \ Clarke': 'Netball', 'Michael Tippett': 'Basketball', 'Ralph Williams': 'Football',\
    \ 'Edward Elgar': 'Baseball', 'Frank Bridge': 'Rugby'}\n```\n\n要替换地图中的一个值，我们也使用其键：\n\
    \n```\n>>> favorite_sports['Ralph Williams'] = 'Ice Hockey'\n>>> print(favorite_sports)\n\
    {'Rebecca Clarke': 'Netball', 'Michael Tippett': 'Basketball', 'Ralph Williams':\
    \ 'Ice Hockey', 'Edward Elgar': 'Baseball', 'Frank Bridge': 'Rugby'}\n```\n\n\
    我们使用键 Ralph Williams 将最喜爱的运动 Football 替换为 Ice Hockey。\n\n如你所见，使用地图有点像使用列表和元组，只是你不能用加号运算符（+）连接地图。如果你尝试这样做，你会得到一条错误消息：\n\
    \n```\n>>> favorite_sports = {'Rebecca Clarke': 'Netball',\n    'Michael Tippett':\
    \ 'Basketball',\n    'Ralph Williams': 'Ice Hockey',\n    'Edward Elgar': 'Baseball',\n\
    \    'Frank Bridge': 'Rugby'}\n>>> favorite_colors = {'Malcolm Warner' : 'Pink\
    \ polka dots',\n    'James Baxter' : 'Orange stripes',\n    'Sue Lee' : 'Purple\
    \ paisley'}\n>>> favorite_sports + favorite_colors\nTraceback (most recent call\
    \ last):\n  File \"<stdin>\", line 1, in <module>\nTypeError: unsupported operand\
    \ type(s) for +: 'dict' and 'dict'\n```\n\n连接地图对 Python 来说没有意义，所以它只是举手投降。\n\n\
    ## 你学到了什么\n\n在本章中，你学习了 Python 如何使用字符串存储文本，以及如何使用列表和元组处理多个项目。你看到列表中的项目可以更改，并且你可以将一个列表连接到另一个列表，但元组中的值不能更改。你还学习了如何使用地图来存储带有标识它们的键的值。\n\
    \n## 编程谜题\n\n以下是一些你可以自己尝试的实验。答案可以在 http://python-for-kids.com/ 找到。\n\n### #1：最爱\n\
