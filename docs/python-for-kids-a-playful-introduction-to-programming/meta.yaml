    \n## MAKING AN OBJECT REACT TO SOMETHING\n\nWe can make the triangle react when\
    \ someone presses a key by using *event bindings*. *Events* are things that occur\
    \ while a program is running, such as someone moving the mouse, pressing a key,\
    \ or closing a window. You can tell tkinter to watch for these events and then\
    \ do something in response.\n\nTo begin handling events (making Python do something\
    \ when an event occurs), we first create a function. The binding part comes when\
    \ we tell tkinter that a particular function is bound (or associated) to a specific\
    \ event; in other words, it will be automatically called by tkinter to handle\
    \ that event.\n\nFor example, to make the triangle move when the ENTER key is\
    \ pressed, we can define this function:\n\n```\ndef movetriangle(event):\n   \
    \ canvas.move(1, 5, 0)\n```\n\nThe function takes a single parameter (event),\
    \ which tkinter uses to send information to the function about the event. We now\
    \ tell tkinter that this function should be used for a particular event, using\
    \ the bind_all function on the canvas. The full code now looks like this:\n\n\
    ```\nfrom tkinter import *\ntk = Tk()\ncanvas = Canvas(tk, width=400, height=400)\n\
    canvas.pack()\ncanvas.create_polygon(10, 10, 10, 60, 50, 35)\ndef movetriangle(event):\n\
    \    canvas.move(1, 5, 0)\ncanvas.bind_all('<KeyPress-Return>', movetriangle)\n\
    ```\n\nThe first parameter in this function describes the event that we want tkinter\
    \ to watch for. In this case, it's called <KeyPress-Return>, which is a press\
    \ of the ENTER or RETURN key. We tell tkinter that the movetriangle function should\
    \ be called whenever this KeyPress event occurs. Run this code, click the canvas\
    \ with your mouse, and then try pressing ENTER on your keyboard.\n\n![](img/a7a5a123e26ba8cb8ef5b41ca45700be_212_0.png)\n\
    \nHow about changing the direction of the triangle depending on different key\
    \ presses, such as the arrow keys? That’s no problem. We just need to change the\
    \ movetriangle function to the following:\n\n```\ndef movetriangle(event):\n \
    \   if event.keysym == 'Up':\n        canvas.move(1, 0, -3)\n    elif event.keysym\
    \ == 'Down':\n        canvas.move(1, 0, 3)\n    elif event.keysym == 'Left':\n\
    \        canvas.move(1, -3, 0)\n    else:\n        canvas.move(1, 3, 0)\n```\n\
    \nThe event object passed to movetriangle contains several variables. One of these\
    \ variables is called keysym (for key symbol), which is a string that holds the\
    \ value of the actual key pressed. The line if event.keysym == 'Up': says that\
    \ if the keysym variable contains the string 'Up', we should call canvas.move\
    \ with the parameters (1, 0, -3), as we do in the following line. If keysym contains\
    \ 'Down', as in elif event.keysym == 'Down':, we call it with the parameters (1,\
    \ 0, 3), and so on.\n\nRemember that the first parameter is the identifying number\
    \ for the shape drawn on the canvas, the second is the value to add to the x (horizontal)\
    \ coordinate, and the third is the value to add to the y (vertical) coordinate.\n\
    \nWe then tell tkinter that the movetriangle function should be used to handle\
    \ events from four different keys (up, down, left, and right). The following shows\
    \ how the code looks at this point. When you enter this code, it will again be\
    \ a lot easier if you create a new shell window by selecting **File ▸ New Window**.\
    \ Before running the code, save it with a meaningful filename, such as *movingtriangle.py*.\n\
    \n```\nfrom tkinter import *\ntk = Tk()\ncanvas = Canvas(tk, width=400, height=400)\n\
    canvas.pack()\ncanvas.create_polygon(10, 10, 10, 60, 50, 35)\ndef movetriangle(event):\n\
    \    if event.keysym == 'Up':\n        canvas.move(1, 0, -3)\n    elif event.keysym\
    \ == 'Down':\n        canvas.move(1, 0, 3)\n    elif event.keysym == 'Left':\n\
    \        canvas.move(1, -3, 0)\n    else:\n        canvas.move(1, 3, 0)\ncanvas.bind_all('<KeyPress-Up>',\
    \ movetriangle)\ncanvas.bind_all('<KeyPress-Down>', movetriangle)\ncanvas.bind_all('<KeyPress-Left>',\
    \ movetriangle)\ncanvas.bind_all('<KeyPress-Right>', movetriangle)\n```\n\nOn\
    \ the first line of the movetriangle function, we check whether the keysym variable\
    \ contains 'Up' at ❶. If it does, we move the triangle upward using the move function\
    \ with the parameters 1, 0, -3 at ❷. The first parameter is the identifier of\
    \ the triangle, the second is the amount to move to the right (we don't want to\
    \ move horizontally, so the value is 0), and the third is the amount to move downward\
    \ (-3 pixels).\n\nWe then check whether keysym contains 'Down' at ❸, and if so,\
    \ we move the triangle down (3 pixels) at ❹. The final check is whether the value\
    \ is 'Left' at ❺, and if so, we move the triangle left (-3 pixels) at ❻. If none\
    \ of the values are matched, the final else at ❼ moves the triangle right at ❽.\n\
    \nNow the triangle should move in the direction of the pressed arrow key.\n\n\
    ## MORE WAYS TO USE THE IDENTIFIER\n\nWhenever we use a create_ function from\
    \ the canvas, such as create_polygon or create_rectangle, an identifier is returned.\
    \ This identifying number can be used with other canvas functions, as we did earlier\
    \ with the move function:\n\n```\n>>> from tkinter import *\n>>> tk = Tk()\n>>>\
    \ canvas = Canvas(tk, width=400, height=400)\n>>> canvas.pack()\n>>> canvas.create_polygon(10,\
    \ 10, 10, 60, 50, 35)\n1\n>>> canvas.move(1, 5, 0)\n```\n\nThe problem with this\
    \ example is that create_polygon won’t always return 1. For example, if you’ve\
    \ created other shapes, it might return 2, 3, or even 100 for that matter (depending\
    \ on the number of shapes that have been created). If we change the code to store\
    \ the value returned as a variable, and then use the variable (rather than just\
    \ referring to the number 1), the code will work no matter what number is returned:\n\
    \n```\n>>> mytriangle = canvas.create_polygon(10, 10, 10, 60, 50, 35)\n>>> canvas.move(mytriangle,\
    \ 5, 0)\n```\n\nThe move function allows us to move objects around the screen\
    \ using their identifier. But there are other canvas functions that can also change\
    \ something we’ve drawn. For example, the itemconfig function of the canvas can\
    \ be used to change some of the parameters of a shape, such as its fill and outline\
    \ colors.\n\nSay we create a red triangle:\n\n```\n>>> from tkinter import *\n\
    >>> tk = Tk()\n>>> canvas = Canvas(tk, width=400, height=400)\n>>> canvas.pack()\n\
    >>> mytriangle = canvas.create_polygon(10, 10, 10, 60, 50, 35,\nfill='red')\n\
    ```\n\nWe can change the triangle to another color using itemconfig and use the\
    \ identifier as the first parameter. The following code says, “Change the fill\
    \ color of the object identified by the number in variable mytriangle to blue.”\n\
    \n```\n>>> canvas.itemconfig(mytriangle, fill='blue')\n```\n\nWe could also give\
    \ the triangle a different-colored outline, again using the identifier as the\
    \ first parameter:\n\n```\n>>> canvas.itemconfig(mytriangle, outline='red')\n\
    ```\n\nLater, we'll learn how to make other changes to a drawing, such as hide\
    \ it and make it visible again. You'll find it useful to be able to change a drawing\
    \ once it's displayed on the screen when we start writing games in the next chapter.\n\
    \n![](img/a7a5a123e26ba8cb8ef5b41ca45700be_215_0.png)\n\n## WHAT YOU LEARNED\n\
    \nIn this chapter, you used the tkinter module to draw simple geometric shapes\
    \ on a canvas, display images, and perform basic animation. You learned how to\
    \ use event bindings to make drawings react to someone pressing a key, which will\
