  md: '```

    >>> canvas = Canvas(tk, width=400, height=400)

    >>> canvas.pack()

    >>> canvas.create_polygon(10, 10, 10, 60, 50, 35)

    1

    >>> canvas.move(1, 5, 0)

    ```


    The problem with this example is that create_polygon won’t always return 1. For
    example, if you’ve created other shapes, it might return 2, 3, or even 100 for
    that matter (depending on the number of shapes that have been created). If we
    change the code to store the value returned as a variable, and then use the variable
    (rather than just referring to the number 1), the code will work no matter what
    number is returned:


    ```

    >>> mytriangle = canvas.create_polygon(10, 10, 10, 60, 50, 35)

    >>> canvas.move(mytriangle, 5, 0)

    ```


    The move function allows us to move objects around the screen using their identifier.
    But there are other canvas functions that can also change something we’ve drawn.
    For example, the itemconfig function of the canvas can be used to change some
    of the parameters of a shape, such as its fill and outline colors.

    Say we create a red triangle:


    ```

    >>> from tkinter import *

    >>> tk = Tk()

    >>> canvas = Canvas(tk, width=400, height=400)

    >>> canvas.pack()

    >>> mytriangle = canvas.create_polygon(10, 10, 10, 60, 50, 35,

    fill=''red'')

    ```


    We can change the triangle to another color using itemconfig and use the identifier
    as the first parameter. The following code says, “Change the fill color of the
    object identified by the number in variable mytriangle to blue.”


    ```

    >>> canvas.itemconfig(mytriangle, fill=''blue'')

    ```


    We could also give the triangle a different-colored outline, again using the identifier
    as the first parameter:


    ```

    >>> canvas.itemconfig(mytriangle, outline=''red'')

    ```'
