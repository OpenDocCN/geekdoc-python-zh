    \ to the list of sprites in our game object at ③.\n\nIf you run the game now,\
    \ you should see a platform drawn at the bottom-left side of the screen, like\
    \ this:\n\n![](img/a7a5a123e26ba8cb8ef5b41ca45700be_272_0.png)\n\n## ADDING A\
    \ BUNCH OF PLATFORMS\n\nLet's add a whole bunch of platforms. Each platform will\
    \ have different x and y positions, so that they will be drawn scattered around\
    \ the screen. Here's the code to use:\n\n```python\ng = Game()\nplatform1 = PlatformSprite(g,\
    \ PhotoImage(file=\"platform1.gif\"),\n    0, 480, 100, 10)\nplatform2 = PlatformSprite(g,\
    \ PhotoImage(file=\"platform1.gif\"),\n    150, 440, 100, 10)\nplatform3 = PlatformSprite(g,\
    \ PhotoImage(file=\"platform1.gif\"),\n    300, 400, 100, 10)\nplatform4 = PlatformSprite(g,\
    \ PhotoImage(file=\"platform1.gif\"),\n    300, 160, 100, 10)\nplatform5 = PlatformSprite(g,\
    \ PhotoImage(file=\"platform2.gif\"),\n    175, 350, 66, 10)\nplatform6 = PlatformSprite(g,\
    \ PhotoImage(file=\"platform2.gif\"),\n    50, 300, 66, 10)\nplatform7 = PlatformSprite(g,\
    \ PhotoImage(file=\"platform2.gif\"),\n    170, 120, 66, 10)\nplatform8 = PlatformSprite(g,\
    \ PhotoImage(file=\"platform2.gif\"),\n    45, 60, 66, 10)\nplatform9 = PlatformSprite(g,\
    \ PhotoImage(file=\"platform3.gif\"),\n    170, 250, 32, 10)\nplatform10 = PlatformSprite(g,\
    \ PhotoImage(file=\"platform3.gif\"),\n    230, 200, 32, 10)\ng.sprites.append(platform1)\n\
    g.sprites.append(platform2)\ng.sprites.append(platform3)\ng.sprites.append(platform4)\n\
    g.sprites.append(platform5)\ng.sprites.append(platform6)\ng.sprites.append(platform7)\n\
    g.sprites.append(platform8)\ng.sprites.append(platform9)\ng.sprites.append(platform10)\n\
    g.mainloop()\n```\n\nWe create a lot of PlatformSprite objects, saving them as\
