  md: 'challenging (and occasionally frustrating) activity, and the skills learned
    from it can be useful both in school and at work . . . even if your career has
    nothing to do with computers.

    And, if nothing else, programming is a great way to spend an afternoon when the
    weather outside is dreary.


    # WHY PYTHON?


    Python is an easy-to-learn programming language that has some really useful features
    for a beginning programmer. The code is quite easy to read when compared to other
    programming languages, and it has an interactive shell into which you can enter
    your programs and see them run. In addition to its simple language structure and
    an interactive shell with which to experiment, Python has some features that greatly
    augment the learning process and allow you to put together simple animations for
    creating your own games. One is the turtle module, inspired by Turtle graphics
    (used by the Logo programming language back in the 1960s) and designed for educational
    use. Another is the tkinter module, an interface for the Tk GUI toolkit, which
    provides a simple way to create programs with slightly more advanced graphics
    and animation.


    # HOW TO LEARN TO CODE


    Like anything you try for the first time, it’s always best to start with the basics,
    so begin with the first chapters and resist the urge to skip ahead to the later
    chapters. No one can play an orchestral symphony the first time they pick up an
    instrument. Student pilots don’t start flying a plane before they understand the
    basic controls. Gymnasts aren’t (usually) able to do back flips on their first
    try. If you jump ahead too quickly, not only will the basic ideas not stick in
    your head, but you’ll also find the content of the later chapters more complicated
    than it actually is.

    As you go through this book, try each of the examples, so you can see how they
    work. There are also programming puzzles at the end of most chapters for you to
    try, which will help improve your programming skills. Remember that the better
    you understand the basics, the easier it will be to understand more complicated
    ideas later on.'
