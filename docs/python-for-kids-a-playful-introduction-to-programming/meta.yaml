    t.right(90)

    t.forward(20)

    t.left(90)

    t.forward(20)

    t.end_fill()

    ```


    Next, we draw the first wheel.


    ```

    t.color(0,0,0)

    t.up()

    t.forward(10)

    t.down()

    t.begin_fill()

    t.circle(10)

    t.end_fill()

    ```


    Finally, we draw the second wheel.


    ```

    t.setheading(0)

    t.up()

    t.forward(90)

    t.right(90)

    t.forward(10)

    t.setheading(0)

    ```'
