    # EMBEDDING VALUES IN STRINGS


    If you want to display a message using the contents of a variable, you can embed
    values in a string using %s, which is like a marker for a value that you want
    to add later. (*Embedding values* is programmer-speak for “inserting values.”)
    For example, to have Python calculate or store the number of points you scored
    in a game, and then add it to a sentence like “I scored ___ points,” use %s in
    the sentence in place of the value, and then tell Python that value, like this:


    ```

    >>> myscore = 1000

    >>> message = ''I scored %s points''

    >>> print(message % myscore)

    I scored 1000 points

    ```


    Here, we create the variable myscore with the value 1000 and the variable message
    with a string that contains the words “I scored %s points,” where %s is a placeholder
    for the number of points. On the next line, we call print(message) with the %
    symbol to tell Python to replace %s with the value stored in the variable myscore.
    The result of printing this message is I scored 1000 points. We don’t need to
    use a variable for the value. We could do the same example and just use print(message
    % 1000).


    We can also pass in different values for the %s placeholder, using different variables,
    as in this example:


    ```

    >>> joke_text = ''%s: a device for finding furniture in the dark''

    >>> bodypart1 = ''Knee''

    >>> bodypart2 = ''Shin''

    >>> print(joke_text % bodypart1)

    Knee: a device for finding furniture in the dark

    >>> print(joke_text % bodypart2)

    Shin: a device for finding furniture in the dark

    ```


    Here, we create three variables. The first, joke_text, includes the string with
    the %s marker. The other variables are bodypart1 and bodypart2. We can print the
    variable joke_text, and once again use the % operator to replace it with the contents
    of the variables bodypart1 and bodypart2 to produce different messages.


    ![](img/a7a5a123e26ba8cb8ef5b41ca45700be_55_0.png)'
  - '[PAGE 56]


    You can also use more than one placeholder in a string, like this:


    ```

    >>> nums = ''What did the number %s say to the number %s? Nice belt!!''

    >>> print(nums % (0, 8))

    What did the number 0 say to the number 8? Nice belt!!

    ```


    When using more than one placeholder, be sure to wrap the replacement values in
    parentheses, as shown in the example. The order of the values is the order in
    which they''ll be used in the string.


    # MULTIPLYING STRINGS


    What is 10 multiplied by 5? The answer is 50, of course. But what''s 10 multiplied
    by *a*? Here''s Python''s answer:


    ```

    >>> print(10 * ''a'')

    aaaaaaaaaa

    ```


    Python programmers might use this approach to line up strings with a specific
    number of spaces when displaying messages in the shell, for example. How about
    printing a letter in the shell (select **File ▸ New Window**, and enter the following
    code):


    ```

    spaces = '' '' * 25

    print(''%s 12 Butts Wynd'' % spaces)

    print(''%s Twinklebottom Heath'' % spaces)

    print(''%s West Snoring'' % spaces)

    print()

    print()

    print(''Dear Sir'')

    print()

    print(''I wish to report that tiles are missing from the'')

    print(''outside toilet roof.'')

    print(''I think it was bad wind the other night that blew them away.'')

    print()

    print(''Regards'')

    print(''Malcolm Dithering'')

    ```


    Once you''ve typed the code into the shell window, select **File ▸ Save As**.
    Name your file *myletter.py*.'
