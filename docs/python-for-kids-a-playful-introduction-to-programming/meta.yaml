    \ If that function isn’t called, nothing will display properly.\n\n![](img/a7a5a123e26ba8cb8ef5b41ca45700be_193_0.png)\n\
    \n## DRAWING LINES\n\nTo draw a line on the canvas, we use pixel coordinates.\
    \ *Coordinates* determine the positions of pixels on a surface. On a tkinter canvas,\
    \ coordinates describe how far across the canvas (from left to right) and how\
