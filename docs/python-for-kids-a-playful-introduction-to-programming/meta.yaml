    # CONVERTING A DATE WITH ASCTIME


    The function asctime takes a date as a tuple and converts it into something more
    readable. (Remember that a tuple is like a list with items that you can''t change.)
    As you saw in Chapter 7, calling asctime without any parameters will display the
    current date and time in a readable form.


    ```

    >>> import time

    >>> print(time.asctime())

    Mon Mar 11 22:03:41 2013

    ```


    To call asctime with a parameter, we first create a tuple with values for the
    date and time. For example, here we assign the tuple to the variable t:


    ```

    >>> t = (2007, 5, 27, 10, 30, 48, 6, 0, 0)

    ```


    The values in the sequence are year, month, day, hours, minutes, seconds, day
    of the week (0 is Monday, 1 is Tuesday, and so on), day of the year (we put 0
    as a placeholder), and whether or not it is daylight saving time (0 if it isn''t;
    1 if it is). Calling asctime with a similar tuple, we get this:


    ```

    >>> import time

    >>> t = (2020, 2, 23, 10, 30, 48, 6, 0, 0)

    >>> print(time.asctime(t))

    Sun Feb 23 10:30:48 2020

    ```


