- md: "Functions can also be grouped together into modules, which is where Python\
    \ becomes really useful, as opposed to just mildly useful.\n\n## USING MODULES\n\
    \nModules are used to group functions, variables, and other things together into\
    \ larger, more powerful programs. Some modules are built in to Python, and you\
    \ can download other modules separately. You'll find modules to help you write\
    \ games (such as tkinter, which is built in, and PyGame, which is not), modules\
    \ for manipulating images (such as PIL, the Python Imaging Library), and modules\
    \ for drawing three-dimensional graphics (such as Panda3D).\n\nModules can be\
    \ used to do all sorts of useful things. For example, if you were designing a\
    \ simulation game, and you wanted the world of the game to change realistically,\
    \ you could calculate the current date and time using a built-in module called\
    \ time:\n\n```\n>>> import time\n```\n\nHere, the import command is used to tell\
    \ Python that we want to use the module time.\nWe can then call functions that\
    \ are available in this module, using the dot symbol. (Remember that we used functions\
    \ like this to work with the turtle module in Chapter 4, such as t.forward(50).)\
    \ For example, here's how we might call the asctime function with the time module:\n\
    \n```\n>>> print(time.asctime())\n'Mon Nov 5 12:40:27 2012'\n```\n\nThe function\
    \ asctime is a part of the time module that returns the current date and time,\
    \ as a string.\n\nNow suppose that you want to ask someone using your program\
    \ to enter a value, perhaps their date of birth or their age. You can do this\
    \ using a print statement, to display a message, and the sys (short for *system*)\
    \ module, which contains utilities for interacting with the Python system itself.\
    \ First, we import the sys module:\n\n```\n>>> import sys\n```\n\nInside the sys\
    \ module is a special *object* called stdin (for *standard input*), which provides\
    \ a rather useful function called readline. The readline function is used to read\
    \ a line of text typed on the keyboard until you press ENTER. (We'll look at how\
    \ objects work in Chapter 8.) To test readline, enter the following code in the\
    \ shell:\n\n```\n>>> import sys\n>>> print(sys.stdin.readline())\n```\n\nIf you\
    \ then type some words and press ENTER, those words will be printed out in the\
    \ shell.\nThink back to the code we wrote in Chapter 5, using an if statement:\n\
    \n```\n>>> if age >= 10 and age <= 13:\n        print('What is 13 + 49 + 84 +\
    \ 155 + 97? A headache!')\nelse:\n        print('Huh?')\n```\n\nRather than creating\
    \ the variable age and giving it a specific value before the if statement, we\
    \ can now ask someone to enter the value instead. But first, let's turn the code\
    \ into a function:\n\n```\n>>> def silly_age_joke(age):\n        if age >= 10\
    \ and age <= 13:\n                print('What is 13 + 49 + 84 + 155 + 97? A headache!')\n\
    \        else:\n                print('Huh?')\n```\n\nNow you can call the function\
    \ by entering its name, and then tell it what number to use by entering the number\
    \ in parentheses. Does it work?\n\n```\n>>> silly_age_joke(9)\nHuh?\n>>> silly_age_joke(10)\n\
    What is 13 + 49 + 84 + 155 + 97? A headache!\n```\n\nIt works! Now let’s make\
    \ the function ask for a person’s age. (You can add to or change a function as\
    \ many times as you want.)\n\n```\n>>> def silly_age_joke():\n    print('How old\
    \ are you?')\n    age = int(sys.stdin.readline())\n    if age >= 10 and age <=\
    \ 13:\n        print('What is 13 + 49 + 84 + 155 + 97? A headache!')\n    else:\n\
    \        print('Huh?')\n```\n\nDid you recognize the function int at ❶, which\
    \ converts a string to a number? We included that function because readline()\
    \ returns whatever someone enters as a string, but we want a number so that we\
    \ can compare it with the numbers 10 and 13 at ❷. To try this yourself, call the\
    \ function without any parameters, and then type a number when How old are you?\
    \ appears:\n\n```\n>>> silly_age_joke()\nHow old are you?\n10\nWhat is 13 + 49\
    \ + 84 + 155 + 97? A headache!\n>>> silly_age_joke()\nHow old are you?\n15\nHuh?\n\
    ```\n\n## WHAT YOU LEARNED\n\nIn this chapter, you’ve seen how to make reusable\
    \ chunks of code in Python with functions and how to use functions provided by\
    \ modules. You learned how the scope of variables controls whether they can be\
    \ seen inside or outside of functions, and how to create functions using the def\
    \ keyword. You also found out how to import modules so you can use their contents.\n\
    \n## PROGRAMMING PUZZLES\n\nGive the following examples a try, to experiment with\
    \ creating your own functions. The answers can be found at http://python-for-kids.com/.\n\
    \n### #1: BASIC MOON WEIGHT FUNCTION\n\nIn Chapter 6, one programming puzzle was\
    \ to create a for loop to determine your weight on the moon over a period of 15\
    \ years. That for loop could easily be turned into a function. Try creating a\
    \ function that takes a starting weight and increases the weight amount each year.\
    \ You might call the new function using code like this:\n\n```\n>>> moon_weight(30,\
    \ 0.25)\n```\n\n### #2: MOON WEIGHT FUNCTION AND YEARS\n\nTake the function you've\
    \ just created, and change it to work out the weight over different periods, such\
    \ as 5 years or 20 years. Be sure to change the function so that it takes three\
    \ arguments: initial weight, weight gained each year, and number of years:\n\n\
    ```\n>>> moon_weight(90, 0.25, 5)\n```\n\n### #3: MOON WEIGHT PROGRAM\n\nInstead\
    \ of a simple function, where you pass in the values as parameters, you can make\
    \ a mini-program that prompts for the values using sys.stdin.readline(). In this\
    \ case, you call the function without any parameters at all:\n\n```\n>>> moon_weight()\n\
    ```\n\nThe function will display a message asking for the starting weight, then\
    \ a second message asking for the amount the weight will increase each year, and\
    \ finally a message asking for the number of years. You would see something like\
    \ the following:\n\n```\nPlease enter your current Earth weight\n45\nPlease enter\
    \ the amount your weight might increase each year\n0.4\nPlease enter the number\
    \ of years\n12\n```\n\nRemember to import the sys module first before creating\
    \ your function:\n\n```\n>>> import sys\n```\n\n## # 8 HOW TO USE CLASSES AND\
    \ OBJECTS\n\nWhy is a giraffe like a sidewalk? Because both a giraffe and a sidewalk\
    \ are *things*, known in the English language as *nouns* and in Python as *objects*.\n\
    \nThe idea of *objects* is an important one in the world of computers. Objects\
    \ are a way of organizing code in a program and breaking things down to make it\
    \ easier to think about complex ideas. (We used an object in Chapter 4 when we\
    \ worked with the turtle—Pen.)\n\nTo really understand how objects work in Python,\
    \ we need to think about types of objects. Let's start with giraffes and sidewalks.\n\
    A giraffe is a type of mammal, which is a type of animal. A giraffe is also an\
    \ animate object—it's alive.\nNow consider a sidewalk. There's not much to say\
    \ about a sidewalk other than it's not a living thing. Let's call it an inanimate\
    \ object (in other words, it's not alive).\nThe terms *mammal*, *animal*, *animate*,\
    \ and *inanimate* are all ways of classifying things.\n\n## BREAKING THINGS INTO\
    \ CLASSES\n\nIn Python, objects are defined by *classes*, which we can think of\
    \ as a way to classify objects into groups. Here is a tree diagram of the classes\
    \ that giraffes and sidewalks would fit into based on our preceding definitions:\n\
    \nThe main class is Things. Below the Things class, we have Inanimate and Animate.\
    \ These are further broken down into just Sidewalks for Inanimate, and Animals,\
    \ Mammals, and Giraffes for Animate.\n\nWe can use classes to organize bits of\
    \ Python code. For example, consider the turtle module. All the things that Python’s\
    \ turtle module can do—such as moving forward, moving backward, turning left,\
    \ and turning right—are functions in the Pen class. An object can be thought of\
    \ as a member of a class, and we can create any number of objects for a class—which\
    \ we will get to shortly.\n\nNow let’s create the same set of classes as shown\
    \ in our tree diagram, starting from the top. We define classes using the class\
    \ keyword followed by a name. Since Things is the broadest class, we’ll create\
    \ it first:\n\n```\n>>> class Things:\n    pass\n```\n\nWe name the class Things\
    \ and use the pass statement to let Python know that we’re not going to give any\
    \ more information. pass is used when we want to provide a class or function but\
    \ don’t want to fill in the details at the moment.\n\nNext, we’ll add the other\
    \ classes and build some relationships between them.\n\n## CHILDREN AND PARENTS\n\
    \nIf a class is a part of another class, then it’s a *child* of that class, and\
    \ the other class is its *parent*. Classes can be both children of and parents\
    \ to other classes. In our tree diagram, the class above another class is its\
    \ parent, and the class below it is its child. For example, Inanimate and Animate\
    \ are both children of the class Things, meaning that Things is their parent.\n\
    \nTo tell Python that a class is a child of another class, we add the name of\
    \ the parent class in parentheses after the name of our new class, like this:\n\
    \n```\n>>> class Inanimate(Things):\n    pass\n\n>>> class Animate(Things):\n\
    \    pass\n```\n\nHere, we create a class called Inanimate and tell Python that\
    \ its parent class is Things with the code class Inanimate(Things). Next, we create\
    \ a class called Animate and tell Python that its parent class is also Things,\
    \ using class Animate(Things)."
  mdcn: "函数也可以被组合成模块，这正是Python变得真正有用的地方，而不仅仅是稍微有点用。\n\n## 使用模块\n\n模块用于将函数、变量和其他内容组合成更大、更强大的程序。有些模块是Python内置的，而其他模块可以单独下载。你会发现有帮助你编写游戏的模块（例如内置的tkinter和非内置的PyGame），有用于处理图像的模块（例如PIL，Python\
    \ Imaging Library），以及有用于绘制三维图形的模块（例如Panda3D）。\n\n模块可以用来做各种有用的事情。例如，如果你正在设计一个模拟游戏，并且希望游戏世界能真实地变化，你可以使用一个名为`time`的内置模块来计算当前日期和时间：\n\
    \n```\n>>> import time\n```\n\n这里，`import`命令用于告诉Python我们想要使用`time`模块。\n然后，我们可以使用点号符号调用该模块中可用的函数。（记住我们在第4章中使用过类似这样的函数来操作turtle模块，例如`t.forward(50)`。）例如，以下是我们如何使用`time`模块调用`asctime`函数的方式：\n\
    \n```\n>>> print(time.asctime())\n'Mon Nov 5 12:40:27 2012'\n```\n\n`asctime`函数是`time`模块的一部分，它以字符串形式返回当前日期和时间。\n\
    \n现在假设你想让使用你程序的人输入一个值，也许是他们的出生日期或年龄。你可以使用`print`语句来显示消息，并使用`sys`（*system*的缩写）模块，该模块包含与Python系统本身交互的实用工具。首先，我们导入`sys`模块：\n\
    \n```\n>>> import sys\n```\n\n在`sys`模块内部，有一个特殊的*对象*叫做`stdin`（*standard input*的缩写），它提供了一个非常有用的函数叫做`readline`。`readline`函数用于读取在键盘上输入的一行文本，直到你按下ENTER键。（我们将在第8章中了解对象是如何工作的。）要测试`readline`，请在shell中输入以下代码：\n\
    \n```\n>>> import sys\n>>> print(sys.stdin.readline())\n```\n\n如果你然后输入一些单词并按ENTER键，这些单词将被打印在shell中。\n\
    回想一下我们在第5章中编写的代码，使用了`if`语句：\n\n```\n>>> if age >= 10 and age <= 13:\n        print('What\
    \ is 13 + 49 + 84 + 155 + 97? A headache!')\nelse:\n        print('Huh?')\n```\n\
    \n我们现在可以要求某人输入值，而不是在`if`语句之前创建变量`age`并赋予它一个特定的值。但首先，让我们将代码转换成一个函数：\n\n```\n>>>\
    \ def silly_age_joke(age):\n        if age >= 10 and age <= 13:\n            \
    \    print('What is 13 + 49 + 84 + 155 + 97? A headache!')\n        else:\n  \
    \              print('Huh?')\n```\n\n现在你可以通过输入函数名来调用该函数，然后通过在括号中输入数字来告诉它使用哪个数字。它有效吗？\n\
    \n```\n>>> silly_age_joke(9)\nHuh?\n>>> silly_age_joke(10)\nWhat is 13 + 49 +\
    \ 84 + 155 + 97? A headache!\n```\n\n它有效！现在让我们让函数询问一个人的年龄。（你可以根据需要多次添加或更改函数。）\n\
    \n```\n>>> def silly_age_joke():\n    print('How old are you?')\n    age = int(sys.stdin.readline())\n\
    \    if age >= 10 and age <= 13:\n        print('What is 13 + 49 + 84 + 155 +\
    \ 97? A headache!')\n    else:\n        print('Huh?')\n```\n\n你认出❶处的函数`int`了吗，它将字符串转换为数字？我们包含该函数是因为`readline()`返回的是字符串形式的输入，但我们想要一个数字，以便在❷处与数字10和13进行比较。要自己尝试这个，请在不带任何参数的情况下调用该函数，然后在出现`How\
    \ old are you?`时输入一个数字：\n\n```\n>>> silly_age_joke()\nHow old are you?\n10\nWhat\
    \ is 13 + 49 + 84 + 155 + 97? A headache!\n>>> silly_age_joke()\nHow old are you?\n\
    15\nHuh?\n```\n\n## 你学到了什么\n\n在本章中，你已经了解了如何在Python中使用函数创建可重用的代码块，以及如何使用模块提供的函数。你学习了变量的作用域如何控制它们在函数内部或外部是否可见，以及如何使用`def`关键字创建函数。你还了解了如何导入模块以便使用它们的内容。\n\
    \n## 编程谜题\n\n尝试以下示例，以实验创建自己的函数。答案可以在 http://python-for-kids.com/ 找到。\n\n### #1：基本月球重量函数\n\
    \n在第6章中，一个编程谜题是创建一个`for`循环来确定你在15年期间在月球上的体重。那个`for`循环可以很容易地转换成一个函数。尝试创建一个函数，它接受一个起始重量，并每年增加重量。你可以使用如下代码调用新函数：\n\
    \n```\n>>> moon_weight(30, 0.25)\n```\n\n### #2：月球重量函数和年数\n\n获取你刚刚创建的函数，并将其更改为计算不同时间段的重量，例如5年或20年。确保更改函数，使其接受三个参数：初始重量、每年增加的重量和年数：\n\
    \n```\n>>> moon_weight(90, 0.25, 5)\n```\n\n### #3：月球重量程序\n\n与其创建一个简单的函数，你传递值作为参数，不如创建一个使用`sys.stdin.readline()`提示输入值的小程序。在这种情况下，你完全不带任何参数调用函数：\n\
    \n```\n>>> moon_weight()\n```\n\n该函数将显示一条消息询问起始重量，然后显示第二条消息询问每年增加的重量，最后显示一条消息询问年数。你会看到类似以下的内容：\n\
    \n```\nPlease enter your current Earth weight\n45\nPlease enter the amount your\
    \ weight might increase each year\n0.4\nPlease enter the number of years\n12\n\
    ```\n\n记住在创建函数之前先导入`sys`模块：\n\n```\n>>> import sys\n```\n\n## # 8 如何使用类和对象\n\n\
    为什么长颈鹿像人行道？因为长颈鹿和人行道都是*事物*，在英语中称为*名词*，在Python中称为*对象*。\n\n*对象*的概念在计算机世界中很重要。对象是在程序中组织代码并分解事物以更容易思考复杂想法的一种方式。（我们在第4章中使用turtle——Pen时使用了一个对象。）\n\
    \n要真正理解对象在Python中是如何工作的，我们需要考虑对象的类型。让我们从长颈鹿和人行道开始。\n长颈鹿是一种哺乳动物，哺乳动物是一种动物。长颈鹿也是一种有生命的物体——它是活的。\n\
    现在考虑一下人行道。除了它不是生物之外，关于人行道没有太多可说的。我们称它为无生命的物体（换句话说，它不是活的）。\n术语*哺乳动物*、*动物*、*有生命的*和*无生命的*都是对事物进行分类的方式。\n\
    \n## 将事物分解为类\n\n在Python中，对象由*类*定义，我们可以将其视为将对象分类为组的一种方式。以下是根据我们前面的定义，长颈鹿和人行道将适合的类的树状图：\n\
    \n主要的类是Things。在Things类下面，我们有Inanimate和Animate。这些进一步分解为Inanimate下的Sidewalks，以及Animate下的Animals、Mammals和Giraffes。\n\
    \n我们可以使用类来组织Python代码片段。例如，考虑turtle模块。Python的turtle模块能做的所有事情——比如向前移动、向后移动、向左转和向右转——都是Pen类中的函数。对象可以被视为类的成员，我们可以为一个类创建任意数量的对象——我们很快就会讲到。\n\
    \n现在让我们创建与树状图中显示的相同的类集，从顶部开始。我们使用`class`关键字后跟一个名称来定义类。由于Things是最广泛的类，我们将首先创建它：\n\
    \n```\n>>> class Things:\n    pass\n```\n\n我们将类命名为Things，并使用`pass`语句让Python知道我们不会提供更多信息。`pass`在我们想要提供一个类或函数但不想立即填写细节时使用。\n\
    \n接下来，我们将添加其他类并在它们之间建立一些关系。\n\n## 子类和父类\n\n如果一个类是另一个类的一部分，那么它是该类的*子类*，而另一个类是它的*父类*。类既可以是其他类的子类，也可以是其他类的父类。在我们的树状图中，另一个类上面的类是其父类，下面的类是其子类。例如，Inanimate和Animate都是Things类的子类，这意味着Things是它们的父类。\n\
    \n要告诉Python一个类是另一个类的子类，我们在新类的名称后在括号中添加父类的名称，像这样：\n\n```\n>>> class Inanimate(Things):\n\
    \    pass\n\n>>> class Animate(Things):\n    pass\n```\n\n这里，我们创建了一个名为Inanimate的类，并通过代码`class\
    \ Inanimate(Things)`告诉Python其父类是Things。接下来，我们创建了一个名为Animate的类，并通过`class Animate(Things)`告诉Python其父类也是Things。"
