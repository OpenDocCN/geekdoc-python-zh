    \ 'tuple' object does not support item assignment\n```\n\nWhy would you use a\
    \ tuple instead of a list? Basically because sometimes it is useful to use something\
    \ that you know can never change. If you create a tuple with two elements inside,\
    \ it will always have those two elements inside.\n\n## PYTHON MAPS WON'T HELP\
    \ YOU FIND YOUR WAY\n\nIn Python, a *map* (also referred to as a *dict*, short\
    \ for *dictionary*) is a collection of things, like lists and tuples. The difference\
