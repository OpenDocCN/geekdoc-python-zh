    \n## 获取GIMP\n\n有几种图形程序可用，但对于这个游戏，我们需要一个支持*透明度*（有时称为*alpha通道*）的程序，它允许图像有部分区域不绘制颜色在屏幕上。我们需要带有透明部分的图像"
