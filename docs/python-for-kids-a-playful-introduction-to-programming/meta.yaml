- md: "Here's the result of running this code:\n\n![](img/a7a5a123e26ba8cb8ef5b41ca45700be_173_0.png)\n\
    \nWhile we're playing with stars, here's the code to produce a spiraling star:\n\
    \n```\n>>> t.reset()\n>>> for x in range(1, 20):\n        t.forward(100)\n   \
    \     t.left(95)\n```\n\nBy changing the degree of the turn and reducing the number\
    \ of loops, the turtle ends up drawing quite a different style of star:\n\n![](img/a7a5a123e26ba8cb8ef5b41ca45700be_173_1.png)\n\
    \nUsing similar code, we can create a variety of shapes, from a basic square to\
    \ a spiral star. As you can see, by using for loops, we've made it much simpler\
    \ to draw these shapes. Without for loops, our code would have required a lot\
    \ of tedious typing.\n\nNow let's use an if statement to control how the turtle\
    \ will turn and draw another star variation. In this example, we want the turtle\
    \ to turn one angle the first time, and then another angle the next time.\n\n\
    ![](img/a7a5a123e26ba8cb8ef5b41ca45700be_174_0.png)\n\n```\n>>> t.reset()\n>>>\
    \ for x in range(1, 19):\n        t.forward(100)\n        if x % 2 == 0:\n   \
    \         t.left(175)\n        else:\n            t.left(225)\n```\n\nHere, we\
    \ create a loop that will run 18 times (range(1, 19)) and tell the turtle to move\
    \ forward 100 pixels (t.forward(100)). New here is the if statement (if x % 2\
    \ == 0:). This statement checks to see if the variable x contains an even number\
    \ by using a modulo operator, the % in the expression x % 2 == 0, which is a way\
    \ of saying, \"x mod 2\" is equal to 0.\n\nThe expression x % 2 essentially says,\
    \ \"What is the amount left over when you divide the number in variable x into\
    \ two equal parts?\" For example, if we were to divide 5 balls into two parts,\
    \ we would get two groups of 2 balls (making a total of 4 balls), and the remainder\
    \ (the amount left over) would be 1 ball, as shown here.\n\n![](img/a7a5a123e26ba8cb8ef5b41ca45700be_174_1.png)\n\
    \nIf we divided 13 balls into two parts, we would get two groups of 6 balls with\
    \ 1 ball remaining:\n\n![](img/a7a5a123e26ba8cb8ef5b41ca45700be_175_0.png)\n\n\
    When we check to see if the remainder equals zero after dividing x by 2, we are\
    \ actually asking whether it can be broken into two parts with no remainder. This\
    \ method is a nice way to see if a number in a variable is even, because even\
    \ numbers can always be divided into two equal parts.\n\nOn the fifth line of\
    \ our code, we tell the turtle to turn left 175 degrees (t.left(175)) if the number\
    \ in x is even (if x % 2 == 0:); otherwise (else), on the final line, we tell\
    \ it to turn 225 degrees (t.left(225)).\n\nHere's the result of running this code:\n\
    \n![](img/a7a5a123e26ba8cb8ef5b41ca45700be_175_1.png)\n\n## DRAWING A CAR\n\n\
    The turtle can do more than just draw stars and simple geometric shapes. For our\
    \ next example, we'll draw a rather primitive-looking car. First, we draw the\
    \ body of the car. In IDLE, select **File ▸ New Window**, and then enter the following\
    \ code in the window.\n\n```\nt.reset()\nt.color(1,0,0)\nt.begin_fill()\nt.forward(100)\n\
    t.left(90)\nt.forward(20)\nt.left(90)\nt.forward(20)\nt.right(90)\nt.forward(20)\n\
    t.left(90)\nt.forward(60)\nt.left(90)\nt.forward(20)\nt.right(90)\nt.forward(20)\n\
    t.left(90)\nt.forward(20)\nt.end_fill()\n```\n\nNext, we draw the first wheel.\n\
    \n```\nt.color(0,0,0)\nt.up()\nt.forward(10)\nt.down()\nt.begin_fill()\nt.circle(10)\n\
    t.end_fill()\n```\n\nFinally, we draw the second wheel.\n\n```\nt.setheading(0)\n\
    t.up()\nt.forward(90)\nt.right(90)\nt.forward(10)\nt.setheading(0)\nt.begin_fill()\n\
    t.down()\nt.circle(10)\nt.end_fill()\n```\n\nSelect **File** ▸ **Save As**. Give\
    \ the file a name, such as *car.py*. Select **Run** ▸ **Run Module** to try out\
    \ the code. And here’s our car:\n\n![](img/a7a5a123e26ba8cb8ef5b41ca45700be_177_0.png)\n\
    \nYou may have noticed that a few new turtle functions have snuck into this code:\n\
    \n- color is used to change the color of the pen.\n- begin_fill and end_fill are\
    \ used to fill in an area of the canvas with a color.\n- circle draws a circle\
    \ of a particular size.\n- setheading turns the turtle to face a particular direction.\n\
    \nLet’s take a look at how we can use these functions to add color to our drawings.\n\
    \n## COLORING THINGS IN\n\nThe color function takes three parameters. The first\
    \ specifies the amount of red, the second the amount of green, and the third the\
    \ amount of blue. For example, to get the bright red of the car, we used color(1,0,0),\
    \ which tells the turtle to use a 100 percent red pen.\n\nThis red, green, and\
    \ blue color recipe is called *RGB*. It's the way that colors are represented\
    \ on your computer monitor, and the relative mix of these primary colors produces\
    \ other colors, just like when you mix blue and red paint to make purple or yellow\
    \ and red to make orange. The colors red, green, and blue are called *primary*\
    \ colors because you cannot mix other shades to produce them.\n\n![](img/a7a5a123e26ba8cb8ef5b41ca45700be_178_0.png)\n\
    \nAlthough we're not using paint when we create colors on a computer monitor (we're\
    \ using light), it may help to understand this RGB recipe by thinking about three\
    \ pots of paint: one red, one green, and one blue. Each pot is full, and we give\
    \ each full pot a value of 1 (or 100 percent). We then mix all of the red paint\
    \ and all of the green paint in a vat to produce yellow (that's 1 and 1 of each,\
    \ or 100 percent of each color).\n\nNow let's return to the world of code. To\
    \ draw a yellow circle with the turtle, we would use 100 percent of both the red\
    \ and green paint, but no blue, like this:\n\n```\n>>> t.color(1,1,0)\n>>> t.begin_fill()\n\
    >>> t.circle(50)\n>>> t.end_fill()\n```\n\nThe 1,1,0 in the first line represents\
    \ 100 percent red, 100 percent green, and 0 percent blue. On the next line, we\
    \ tell the turtle to fill the shapes it draws with this RGB color (t.begin_fill),\
    \ and then we tell it to draw a circle with (t.circle). On the final line, end_fill\
    \ tells the turtle to fill the circle with the RGB color.\n\n## A FUNCTION TO\
    \ DRAW A FILLED CIRCLE\n\nTo make it easier to experiment with different colors,\
    \ let's create a function from the code we used to draw a filled circle.\n\n```\n\
    >>> def mycircle(red, green, blue):\n        t.color(red, green, blue)\n     \
    \   t.begin_fill()\n        t.circle(50)\n        t.end_fill()\n```\n\nWe can\
    \ draw a bright green circle by using only the green paint, with this code:\n\n\
    ```\n>>> mycircle(0, 1, 0)\n```\n\nOr we can draw a darker green circle by using\
    \ only half the green paint (0.5):\n\n```\n>>> mycircle(0, 0.5, 0)\n```\n\nTo\
    \ play with the RGB colors on your screen, try drawing a circle first with full\
    \ red then half red (1 and 0.5), and then with full blue and finally half blue,\
    \ like this:\n\n```\n>>> mycircle(1, 0, 0)\n>>> mycircle(0.5, 0, 0)\n>>> mycircle(0,\
    \ 0, 1)\n>>> mycircle(0, 0, 0.5)\n```\n\n> NOTE: If your canvas starts to get\
    \ cluttered, use t.reset() to delete your old drawings. Also remember that you\
    \ can move the turtle without drawing lines by using t.up() to lift the pen (use\
    \ t.down() to set it back down again).\n\nVarious combinations of red, green,\
    \ and blue will produce a huge variety of colors, like gold:\n\n```\n>>> mycircle(0.9,\
    \ 0.75, 0)\n```\n\nHere's light pink:\n\n```\n>>> mycircle(1, 0.7, 0.75)\n```\n\
    \nAnd here are two versions for different shades of orange:\n\n```\n>>> mycircle(1,\
