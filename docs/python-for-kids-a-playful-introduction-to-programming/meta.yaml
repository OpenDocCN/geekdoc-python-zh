    \n![](img/a7a5a123e26ba8cb8ef5b41ca45700be_100_0.png)\n\n## 既然我们谈到了循环……\n\n`for`循环并不是你在Python中能创建的唯一循环。还有`while`循环。`for`循环是特定长度的循环，而`while`循环用于你事先不知道何时需要停止循环的情况。\n\
