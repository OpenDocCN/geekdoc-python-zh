    \ because you did not follow the rules for ending a string with a single or double\
    \ quote.\n\n*Syntax* means the arrangement and order of words in a sentence or,\
    \ in this case, the arrangement and order of words and symbols in a program. So\
    \ *SyntaxError* means that you did something in an order Python was not expecting,\
    \ or Python was expecting something that you missed. *EOL* means *end-of-line*,\
    \ so the rest of the error message is telling you that Python hit the end of the\
    \ line and did not find a double quote to close the string.\n\nTo use more than\
    \ one line of text in your string (called a *multiline string*), use three single\
    \ quotes ('''), and then hit ENTER between lines, like this:\n\n```\n>>> fred\
    \ = '''How do dinosaurs pay their bills?\nWith tyrannosaurus checks!'''\n```\n\
    \nNow let's print out the contents of fred to see if this worked:\n\n```\n>>>\
    \ print(fred)\nHow do dinosaurs pay their bills?\nWith tyrannosaurus checks!\n\
    ```\n\n### HANDLING PROBLEMS WITH STRINGS\n\nNow consider this crazy example of\
    \ a string, which causes Python to display an error message:\n\n```\n>>> silly_string\
    \ = 'He said, \"Aren't can't shouldn't wouldn't.\"'\nSyntaxError: invalid syntax\n\
    ```\n\nIn the first line, we try to create a string (defined as the variable silly_string)\
    \ enclosed by single quotes, but also containing a mixture of single quotes in\
    \ the words can't, shouldn't, and wouldn't, as well as double quotes. What a mess!\n\
    \nRemember that Python itself is not as smart as a human being, so all it sees\
    \ is a string containing He said, \"Aren, followed by a bunch of other characters\
    \ that it doesn't expect. When Python sees a quotation mark (either a single or\
    \ double quote), it expects a string to start following the first mark and the\
    \ string to end after the next matching quotation mark (either single or double)\
    \ on that line. In this case, the start of the string is the single quotation\
    \ mark before He, and the end of the string, as far as Python is concerned, is\
    \ the single quote after the n in Aren. IDLE highlights the point where things\
    \ have gone wrong:\n\n![](img/a7a5a123e26ba8cb8ef5b41ca45700be_53_0.png)\n\nThe\
    \ last line of IDLE tells us what sort of error occurred—in this case, a syntax\
    \ error.\nUsing double instead of single quotes still produces an error:\n\n```\n\
    >>> silly_string = \"He said, \"Aren't can't shouldn't wouldn't.\"\"\nSyntaxError:\
    \ invalid syntax\n```\n\nHere, Python sees a string bounded by double quotes,\
    \ containing the letters He said, (and a space). Everything following that string\
    \ (from Aren't on) causes the error:\n\n![](img/a7a5a123e26ba8cb8ef5b41ca45700be_53_1.png)\n\
    \nThis is because, from Python's perspective, all that extra stuff just isn't\
    \ supposed to be there. Python looks for the next matching quote and doesn't know\
    \ what you want it to do with anything that follows that quote on the same line.\n\
    \nThe solution to this problem is a multiline string, which we learned about earlier,\
    \ using *three* single quotes ('''), which allows us to combine double and single\
    \ quotes in our string without causing errors. In fact, if we use three single\
