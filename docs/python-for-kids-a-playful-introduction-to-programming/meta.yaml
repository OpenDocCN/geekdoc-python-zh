  md: "It might be useful to see how your pile of gold coins will increase each week.\
    \ We can do this with another for loop, but first, we need to change the value\
    \ of our magic_coins variable so it represents the total number of magic coins\
    \ per week. That's 10 magic coins per day times 7 days in a week, so magic_coins\
    \ should be 70:\n\n```\n>>> found_coins = 20\n>>> magic_coins = 70\n>>> stolen_coins\
    \ = 3\n```\n\nWe can see our treasure increase each week by creating another variable,\
    \ called coins, and using a loop:\n\n```\n>>> found_coins = 20\n>>> magic_coins\
    \ = 70\n>>> stolen_coins = 3\n>>> coins = found_coins\n>>> for week in range(1,\
    \ 53):\n        coins = coins + magic_coins - stolen_coins\n        print('Week\
    \ %s = %s' % (week, coins))\n```\n\nAt ❶, the variable coins is loaded with the\
    \ value of the variable found_coins; this is our starting number. The next line\
    \ at ❷ sets up the for loop, which will run the commands in the block (the block\
    \ is made up of the lines at ❸ and ❹). Each time it loops, the variable week is\
    \ loaded with the next number in the range of 1 through 52.\nThe line at ❸ is\
    \ a bit more complicated. Basically, each week we want to add the number of coins\
    \ we've magically created and subtract the number of coins that were stolen by\
    \ the raven. Think of the variable coins as something like a treasure chest. Every\
    \ week, the new coins are piled into the chest. So this line really means, “Replace\
    \ the contents of the variable coins with the number of my current coins, plus\
    \ what I've created this week.” Basically, the equal sign (=) is a bossy piece\
    \ of code that says, “Work out some stuff on the right first, and then save it\
    \ for later, using the name on the left.”\nThe line at ❹ is a print statement\
    \ using placeholders, which prints the week number and the total number of coins\
    \ (so far) to the screen. (If that doesn't make sense to you, reread “Embedding"
