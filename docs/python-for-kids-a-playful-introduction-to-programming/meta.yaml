- md: "## WHAT YOU LEARNED\n\nIn this chapter, you learned how to use Python's turtle\
    \ module. We drew some simple lines, using left and right turns and forward and\
    \ backward commands. You found out how to stop the turtle from drawing using up,\
    \ and start drawing again with down. You also discovered that the turtle turns\
    \ by degrees.\n\n## PROGRAMMING PUZZLES\n\nTry drawing some of the following shapes\
    \ with the turtle. The answers can be found at http://python-for-kids.com/.\n\n\
    ### #1: A RECTANGLE\n\nCreate a new canvas using the turtle module's Pen function\
    \ and then draw a rectangle.\n\n### #2: A TRIANGLE\n\nCreate another canvas, and\
    \ this time, draw a triangle. Look back at the diagram of the circle with the\
    \ degrees (\"Moving the Turtle\" on page 46) to remind yourself which direction\
    \ to turn the turtle using degrees.\n\n### #3: A BOX WITHOUT CORNERS\n\nWrite\
    \ a program to draw the four lines shown here (the size isn't important, just\
    \ the shape):\n\n![](img/a7a5a123e26ba8cb8ef5b41ca45700be_76_0.png)\n\n![](img/a7a5a123e26ba8cb8ef5b41ca45700be_78_0.png)\n\
    \n### #5 ASKING QUESTIONS WITH IF AND ELSE\n\nIn programming, we often ask yes\
    \ or no questions, and decide to do something based on the answer. For example,\
    \ we might ask, “Are you older than 20?” and if the answer is yes, respond with\
    \ “You are too old!”\n\nThese sorts of questions are called *conditions*, and\
    \ we combine these conditions and the responses into *if statements*. Conditions\
    \ can be more complicated than a single question, and if statements can also be\
    \ combined with multiple questions and different responses based on the answer\
    \ to each question.\n\nIn this chapter, you'll learn how to use if statements\
    \ to build programs.\n\n## IF STATEMENTS\n\nAn if statement might be written in\
    \ Python like this:\n\n```\n>>> age = 13\n>>> if age > 20:\n        print('You\
    \ are too old!')\n```\n\nAn if statement is made up of the if keyword, followed\
    \ by a condition and a colon (:), as in if age > 20:. The lines following the\
    \ colon must be in a block, and if the answer to the question is yes (or true,\
    \ as we say in Python programming), the commands in the block will be run. Now,\
    \ let's explore how to write blocks and conditions.\n\n![](img/a7a5a123e26ba8cb8ef5b41ca45700be_79_0.png)\n\
    \n## A BLOCK IS A GROUP OF PROGRAMMING STATEMENTS\n\nA block of code is a grouped\
    \ set of programming statements. For example, when if age > 20: is true, you might\
    \ want to do more than just print “You are too old!” Perhaps you want to print\
    \ out a few other choice sentences, like this:\n\n```\n>>> age = 25\n>>> if age\
    \ > 20:\n        print('You are too old!')\n        print('Why are you here?')\n\
    \        print('Why aren\\'t you mowing a lawn or sorting papers?')\n```\n\nThis\
    \ block of code is made up of three print statements that are run only if the\
    \ condition age > 20 is found to be true. Each line in the block has four spaces\
    \ at the beginning, when you compare it with the if statement above it. Let’s\
    \ look at that code again, with visible spaces:\n\n```\n>>> age = 25\n>>> if age\
    \ > 20:\n    print('You are too old!')\n    print('Why are you here?')\n    print('Why\
    \ aren\\'t you mowing a lawn or sorting papers?')\n```\n\nIn Python, *whitespace*,\
    \ such as a tab (inserted when you press the TAB key) or a space (inserted when\
    \ you press the spacebar), is meaningful. Code that is at the same position (indented\
    \ the same number of spaces from the left margin) is grouped into a block, and\
    \ whenever you start a new line with more spaces than the previous one, you are\
    \ starting a new block that is part of the previous one, like this:\n\n![](img/a7a5a123e26ba8cb8ef5b41ca45700be_80_0.png)\n\
    \nWe group statements together into blocks because they are related. The statements\
    \ need to be run together.\nWhen you change the indentation, you’re generally\
    \ creating new blocks. The following example shows three separate blocks that\
    \ are created just by changing the indentation.\n\n![](img/a7a5a123e26ba8cb8ef5b41ca45700be_81_0.png)\n\
    \nHere, even though blocks 2 and 3 have the same indentation, they are considered\
    \ different blocks because there is a block with less indentation (fewer spaces)\
    \ between them.\n\nFor that matter, a block with four spaces on one line and six\
    \ spaces on the next will produce an *indentation error* when you run it, because\
    \ Python expects you to use the same number of spaces for all the lines in a block.\
    \ So if you start a block with four spaces, you should consistently use four spaces\
    \ for that block. Here’s an example:\n\n```\n>>> if age > 20:\n    print('You\
    \ are too old!')\n      print('Why are you here?')\n```\n\nI’ve made the spaces\
    \ visible so that you can see the differences. Notice that the third line has\
    \ six spaces instead of four.\n\nWhen we try to run this code, IDLE highlights\
    \ the line where it sees a problem with a red block and displays an explanatory\
    \ SyntaxError message:\n\n```\n>>> age = 25\n>>> if age > 20:\n    print('You\
    \ are too old!')\n      print('Why are you here?')\nSyntaxError: unexpected indent\n\
    ```\n\nPython didn’t expect to see two extra spaces at the beginning of the second\
    \ print line.\n\n> Use consistent spacing to make your code easier to read. If\
    \ you start writing a program and put four spaces at the beginning of a block,\
    \ keep using four spaces at the beginning of the other blocks in your program.\
    \ Also, be sure to indent each line in the same block with the same number of\
    \ spaces.\n\n## CONDITIONS HELP US COMPARE THINGS\n\nA *condition* is a programming\
    \ statement that compares things and tells us whether the criteria set by the\
    \ comparison are either True (yes) or False (no). For example, `age > 10` is a\
    \ condition, and is another way of saying, “Is the value of the age variable greater\
    \ than 10?” This is also a condition: `hair_color == 'mauve'`, which is another\
    \ way of saying, “Is the value of the hair_color variable mauve?”\n\nWe use symbols\
    \ in Python (called *operators*) to create our conditions, such as equal to, greater\
    \ than, and less than. Table 5-1 lists some symbols for conditions.\n\nTable 5-1:\
    \ Symbols for Conditions\n\n| Symbol | Definition |\n| :--- | :--- |\n| == | Equal\
    \ to |\n| != | Not equal to |\n| > | Greater than |\n| < | Less than |\n| >= |\
    \ Greater than or equal to |\n| <= | Less than or equal to |\n\nFor example, if\
    \ you are 10 years old, the condition `your_age == 10` would return True; otherwise,\
    \ it would return False. If you are 12 years old, the condition `your_age > 10`\
    \ would return True.\n\n> Be sure to use a double equal sign (==) when defining\
    \ an equal-to condition.\n\nLet’s try a few more examples. Here, we set our age\
    \ as equal to 10 and then write a conditional statement that will print “You are\
    \ too old for my jokes!” if age is greater than 10:\n\n```\n>>> age = 10\n>>>\
    \ if age > 10:\n        print('You are too old for my jokes!')\n```\n\nWhat happens\
    \ when we type this into IDLE and press ENTER?\nNothing.\nBecause the value returned\
    \ by age is not greater than 10, Python does not execute (run) the print block.\
    \ However, if we had set the variable age to 20, the message would be printed.\n\
    Now let’s change the previous example to use a greater-than-or-equal-to (>=) condition:\n\
    \n![](img/a7a5a123e26ba8cb8ef5b41ca45700be_83_0.png)\n\n```\n>>> age = 10\n>>>\
    \ if age >= 10:\n        print('You are too old for my jokes!')\n```\n\nYou should\
    \ see “You are too old for my jokes!” printed to the screen because the value\
    \ of age is equal to 10.\nNext, let’s try using an equal-to (==) condition:\n\n\
    ```\n>>> age = 10\n>>> if age == 10:\n        print('What\\'s brown and sticky?\
    \ A stick!!')\n```\n\nYou should see the message “What’s brown and sticky? A stick!!”\
    \ printed to the screen.\n\n## IF-THEN-ELSE STATEMENTS\n\nIn addition to using\
    \ if statements to do something when a condition is met (True), we can also use\
    \ if statements to do something when a condition is not true. For example, we\
    \ might print one message to the screen if your age is 12 and another if it’s\
    \ not 12 (False).\nThe trick here is to use an if-then-else statement, which essentially\
    \ says “*If* something is true, then do this; or *else*, do that.”\nLet’s create\
    \ an if-then-else statement. Enter the following into the shell:\n\n```\n>>> print(\"\
    Want to hear a dirty joke?\")\nWant to hear a dirty joke?\n```"
  mdcn: "## 你学到了什么\n\n在本章中，你学习了如何使用 Python 的 turtle 模块。我们绘制了一些简单的线条，使用了左转、右转、前进和后退命令。你发现了如何使用\
    \ up 命令让海龟停止绘图，以及如何使用 down 命令重新开始绘图。你还了解到海龟是按度数旋转的。\n\n## 编程谜题\n\n尝试用海龟绘制以下一些图形。答案可以在\
    \ http://python-for-kids.com/ 找到。\n\n### #1：一个矩形\n\n使用 turtle 模块的 Pen 函数创建一个新的画布，然后绘制一个矩形。\n\
    \n### #2：一个三角形\n\n创建另一个画布，这次绘制一个三角形。回顾一下带有度数的圆形图示（第 46 页的“移动海龟”），提醒自己应该使用度数向哪个方向旋转海龟。\n\
    \n### #3：一个没有角的盒子\n\n编写一个程序来绘制这里显示的四条线（尺寸不重要，只要形状对就行）：\n\n![](img/a7a5a123e26ba8cb8ef5b41ca45700be_76_0.png)\n\
    \n![](img/a7a5a123e26ba8cb8ef5b41ca45700be_78_0.png)\n\n### #5 使用 IF 和 ELSE 提问\n\
    \n在编程中，我们经常问是或否的问题，并根据答案决定做什么。例如，我们可能会问：“你超过 20 岁了吗？”如果答案是肯定的，就回应：“你太老了！”\n\n\
    这类问题被称为*条件*，我们将这些条件和响应组合成 *if 语句*。条件可以比单个问题更复杂，if 语句也可以与多个问题组合，并根据每个问题的答案给出不同的响应。\n\
    \n在本章中，你将学习如何使用 if 语句来构建程序。\n\n## IF 语句\n\n一个 if 语句在 Python 中可能这样写：\n\n```\n>>>\
    \ age = 13\n>>> if age > 20:\n        print('You are too old!')\n```\n\nif 语句由\
    \ if 关键字、一个条件和一个冒号 (:) 组成，例如 `if age > 20:`。冒号后面的行必须在一个代码块中，如果问题的答案是肯定的（或者用 Python\
    \ 编程的术语说是“真”），代码块中的命令就会运行。现在，让我们探索如何编写代码块和条件。\n\n![](img/a7a5a123e26ba8cb8ef5b41ca45700be_79_0.png)\n\
    \n## 代码块是一组编程语句\n\n代码块是一组分组的编程语句。例如，当 `if age > 20:` 为真时，你可能想做的不仅仅是打印“You are\
    \ too old!”。也许你想打印出其他几句精选的话，像这样：\n\n```\n>>> age = 25\n>>> if age > 20:\n    \
    \    print('You are too old!')\n        print('Why are you here?')\n        print('Why\
    \ aren\\'t you mowing a lawn or sorting papers?')\n```\n\n这个代码块由三个 print 语句组成，只有当条件\
    \ `age > 20` 被判定为真时才会运行。与上面的 if 语句相比，代码块中的每一行开头都有四个空格。让我们再看一下那段代码，这次显示空格：\n\n\
    ```\n>>> age = 25\n>>> if age > 20:\n    print('You are too old!')\n    print('Why\
    \ are you here?')\n    print('Why aren\\'t you mowing a lawn or sorting papers?')\n\
    ```\n\n在 Python 中，*空白字符*，例如制表符（按 TAB 键插入）或空格（按空格键插入），是有意义的。处于相同位置（从左边距缩进相同空格数）的代码被分组到一个代码块中，每当你以比前一行更多的空格开始一个新行时，你就开始了一个新的代码块，它是前一个代码块的一部分，像这样：\n\
    \n![](img/a7a5a123e26ba8cb8ef5b41ca45700be_80_0.png)\n\n我们将语句分组到代码块中，因为它们是相关的。这些语句需要一起运行。\n\
    当你改变缩进时，你通常是在创建新的代码块。下面的例子展示了仅通过改变缩进就创建的三个独立的代码块。\n\n![](img/a7a5a123e26ba8cb8ef5b41ca45700be_81_0.png)\n\
    \n在这里，即使代码块 2 和 3 具有相同的缩进，它们也被认为是不同的代码块，因为它们之间有一个缩进较少（空格较少）的代码块。\n\n就此而言，如果一个代码块中一行有四个空格，下一行有六个空格，运行时会产生*缩进错误*，因为\
    \ Python 期望你对代码块中的所有行使用相同数量的空格。所以，如果你以四个空格开始一个代码块，你应该始终对该代码块使用四个空格。这里有一个例子：\n\n\
    ```\n>>> if age > 20:\n    print('You are too old!')\n      print('Why are you\
    \ here?')\n```\n\n我让空格可见，这样你就能看到差异。注意第三行有六个空格而不是四个。\n\n当我们尝试运行这段代码时，IDLE 会用红色块高亮显示它发现问题的行，并显示解释性的\
    \ SyntaxError 消息：\n\n```\n>>> age = 25\n>>> if age > 20:\n    print('You are too\
    \ old!')\n      print('Why are you here?')\nSyntaxError: unexpected indent\n```\n\
    \nPython 没有预料到在第二个 print 行的开头会看到两个额外的空格。\n\n> 使用一致的间距使你的代码更易于阅读。如果你开始编写程序并在代码块开头放了四个空格，请在程序中其他代码块的开头也继续使用四个空格。另外，确保同一代码块中的每一行都使用相同数量的空格进行缩进。\n\
    \n## 条件帮助我们比较事物\n\n*条件*是一个编程语句，它比较事物并告诉我们比较设定的标准是真（True，是）还是假（False，否）。例如，`age\
    \ > 10` 是一个条件，是“age 变量的值是否大于 10？”的另一种说法。这也是一个条件：`hair_color == 'mauve'`，是“hair_color\
    \ 变量的值是否是淡紫色？”的另一种说法。\n\n我们在 Python 中使用符号（称为*运算符*）来创建条件，例如等于、大于和小于。表 5-1 列出了一些条件符号。\n\
    \n表 5-1：条件符号\n\n| 符号 | 定义 |\n| :--- | :--- |\n| == | 等于 |\n| != | 不等于 |\n| > |\
    \ 大于 |\n| < | 小于 |\n| >= | 大于或等于 |\n| <= | 小于或等于 |\n\n例如，如果你 10 岁，条件 `your_age\
    \ == 10` 将返回 True；否则，它将返回 False。如果你 12 岁，条件 `your_age > 10` 将返回 True。\n\n> 定义等于条件时，请务必使用双等号\
    \ (==)。\n\n让我们再试几个例子。在这里，我们将年龄设置为等于 10，然后编写一个条件语句，如果年龄大于 10，则打印“You are too old\
    \ for my jokes!”：\n\n```\n>>> age = 10\n>>> if age > 10:\n        print('You are\
    \ too old for my jokes!')\n```\n\n当我们将其输入 IDLE 并按 ENTER 键时会发生什么？\n什么也不会发生。\n因为\
    \ age 返回的值不大于 10，Python 不会执行（运行）print 代码块。但是，如果我们把变量 age 设置为 20，消息就会被打印出来。\n现在让我们将前面的例子改为使用大于或等于\
    \ (>=) 条件：\n\n![](img/a7a5a123e26ba8cb8ef5b41ca45700be_83_0.png)\n\n```\n>>> age\
    \ = 10\n>>> if age >= 10:\n        print('You are too old for my jokes!')\n```\n\
    \n你应该会看到“You are too old for my jokes!”打印到屏幕上，因为 age 的值等于 10。\n接下来，让我们尝试使用等于 (==)\
    \ 条件：\n\n```\n>>> age = 10\n>>> if age == 10:\n        print('What\\'s brown and\
    \ sticky? A stick!!')\n```\n\n你应该会看到消息“What's brown and sticky? A stick!!”打印到屏幕上。\n\
    \n## IF-THEN-ELSE 语句\n\n除了使用 if 语句在条件满足（True）时执行某些操作外，我们还可以使用 if 语句在条件不为真时执行某些操作。例如，如果你的年龄是\
    \ 12，我们可能在屏幕上打印一条消息，如果不是 12（False），则打印另一条消息。\n这里的诀窍是使用 if-then-else 语句，它本质上表示“*如果*某事为真，那么做这个；*否则*，做那个。”\n\
    让我们创建一个 if-then-else 语句。在 shell 中输入以下内容：\n\n```\n>>> print(\"Want to hear a dirty\
    \ joke?\")\nWant to hear a dirty joke?\n```"
