- md: "We've created the basics of our game! Now we're ready to add our main character,\
    \ Mr. Stick Man.\n\n## WHAT YOU LEARNED\n\nIn this chapter, you created the Game\
    \ class and drew the background image onto the screen like a kind of wallpaper.\
    \ You learned how to determine whether a horizontal or vertical position is within\
    \ the bounds of two other horizontal or vertical positions by creating the functions\
    \ within_x and within_y. You then used these functions to create new functions\
    \ to determine whether one coordinate object had collided with another. We'll\
    \ use these functions in the next chapters when we animate Mr. Stick Man and need\
    \ to detect whether he has collided with a platform as he moves around the canvas.\n\
    \nWe also created a parent class Sprite and its first child class, PlatformSprite,\
    \ which we used to draw the platforms onto the canvas.\n\n## PROGRAMMING PUZZLES\n\
    \nThe following coding puzzles are some ways that you can experiment with the\
    \ game's background image. Check your answers at http://python-for-kids.com/.\n\
    \n### #1: CHECKERBOARD\n\nTry changing the Game class so that the background image\
    \ is drawn like a checkerboard:\n\n![](img/a7a5a123e26ba8cb8ef5b41ca45700be_274_0.png)\n\
    \n### #2: TWO-IMAGE CHECKERBOARD\n\nOnce you've figured out how to create a checkerboard\
    \ effect, try using two alternating images. Come up with another wallpaper image\
    \ (using your graphics program), and then change the Game class so it displays\
    \ a checkerboard with two alternating images instead of one image and the blank\
    \ background.\n\n### #3: BOOKSHELF AND LAMP\n\nYou can create different wallpaper\
    \ images to make the background of the game look more interesting. Create a copy\
    \ of the background image, and then draw a simple bookshelf on it. Or you could\
    \ draw a table with a lamp or a window. Then dot these images around the screen\
    \ by changing the Game class so that it loads (and displays) three or four different\
    \ wallpaper images.\n\n![](img/a7a5a123e26ba8cb8ef5b41ca45700be_276_0.png)\n\n\
    ## #17 CREATING MR. STICK MAN\n\nIn this chapter, we'll create the main character\
    \ of our Mr. Stick Man Races for the Exit game. This will require the most complicated\
    \ coding we've done so far, because Mr. Stick Man needs to run left and right,\
    \ jump, stop when he runs into a platform, and fall when he runs off the edge\
    \ of a platform. We'll use event bindings for the left and right arrow keys to\
    \ make the stick figure run left and right, and we'll have him jump when the player\
    \ presses the spacebar.\n\n### INITIALIZING THE STICK FIGURE\n\nThe `__init__`\
    \ function for our new stick figure class will look a lot like it does in the\
    \ other classes in our game so far. We start by giving our new class a name: `StickFigureSprite`.\
    \ As with previous classes, this class has a parent class: `Sprite`.\n\n```\n\
    class StickFigureSprite(Sprite):\n    def __init__(self, game):\n        Sprite.__init__(self,\
    \ game)\n```\n\nThis code looks like what we wrote for the `PlatformSprite` class\
    \ in Chapter 16, except that we're not using any additional parameters (other\
    \ than `self` and `game`). The reason is that, unlike with the `PlatformSprite`\
    \ class, there will be only one `StickFigureSprite` object used in the game.\n\
    \n### LOADING THE STICK FIGURE IMAGES\n\nBecause we have a lot of platform objects\
    \ on the screen, which each can use a different-sized image, we pass the platform\
    \ image as a parameter of the `PlatformSprite`'s `__init__` function (kind of\
    \ like saying, \"Here, Platform Sprite, use this image when you draw yourself\
    \ on the screen.\"). But since there's only one stick figure on the screen, it\
    \ doesn't make sense to load the image outside the sprite and then pass it in\
    \ as a parameter. The `StickFigureSprite` class will know how to load its own\
    \ images.\n\n![](img/a7a5a123e26ba8cb8ef5b41ca45700be_277_0.png)\n\nThe next few\
    \ lines of the `__init__` function do this very job: They load each of the three\
    \ left images (which we'll use to animate the stick figure running left) and the\
    \ three right images (used to animate the stick figure running right). We need\
    \ to load these images now, because we don't want to have to load them every time\
    \ we display the stick figure on the screen (doing so would take too long and\
    \ make our game run slowly).\n\n```\nclass StickFigureSprite(Sprite):\n    def\
    \ __init__(self, game):\n        Sprite.__init__(self, game)\n        self.images_left\
    \ = [\n            PhotoImage(file=\"figure-L1.gif\"),\n            PhotoImage(file=\"\
    figure-L2.gif\"),\n            PhotoImage(file=\"figure-L3.gif\")\n        ]\n\
    \        self.images_right = [\n            PhotoImage(file=\"figure-R1.gif\"\
    ),\n            PhotoImage(file=\"figure-R2.gif\"),\n            PhotoImage(file=\"\
    figure-R3.gif\")\n        ]\n        self.image = game.canvas.create_image(200,\
    \ 470, \\\n            image=self.images_left[0], anchor='nw')\n```\n\nThis code\
    \ loads each of the three left images, which we'll use to animate the stick figure\
    \ running left, and the three right images, which we'll use to animate the stick\
    \ figure running right.\n\nAt ❶ and ❷, we create the object variables `images_left`\
    \ and `images_right`. Each contains a list of PhotoImage objects that we created\
    \ in Chapter 15, showing the stick figure facing left and right.\n\nWe draw the\
    \ first image at ❸ with `images_left[0]` using the canvas's `create_image` function\
    \ at position (200, 470), which puts the stick figure in the middle of the game\
    \ screen, at the bottom of the canvas. The `create_image` function returns a number\
    \ that identifies the image on the canvas. We store this identifier in the object\
    \ variable `image` for later use.\n\n### SETTING UP VARIABLES\n\nThe next part\
    \ of the `__init__` function sets up some more variables that we'll be using later\
    \ in this code.\n\n```\nself.images_right = [\n    PhotoImage(file=\"figure-R1.gif\"\
    ),\n    PhotoImage(file=\"figure-R2.gif\"),\n    PhotoImage(file=\"figure-R3.gif\"\
    )\n]\nself.image = game.canvas.create_image(200, 470, \\\n    image=self.images_left[0],\
    \ anchor='nw')\nself.x = -2\nself.y = 0\nself.current_image = 0\nself.current_image_add\
    \ = 1\nself.jump_count = 0\nself.last_time = time.time()\nself.coordinates = Coords()\n\
    ```\n\nAt ① and ②, the object variables x and y will store the amount we'll be\
    \ adding to the stick figure's horizontal (x1 and x2) or vertical (y1 and y2)\
    \ coordinates when he is moving around the screen.\n\nAs you learned in Chapter\
    \ 13, in order to animate something with the tkinter module, we add values to\
    \ the object's x or y position to move it around the canvas. By setting x to −2,\
    \ and y to 0, we subtract 2 from the x position later in the code and add nothing\
    \ to the vertical position, to make the stick figure run to the left.\n\n> Remember\
    \ that a negative x number means move left on the canvas, and a positive x number\
    \ means move right. A negative y number means move up, and a positive y number\
    \ means move down.\n\nAt ③, we create the object variable current_image to store\
    \ the image's index position as currently displayed on the screen. Our list of\
    \ left-facing images, images_left, contains figure-L1.gif, figure-L2.gif, and\
    \ figure-L3.gif. Those are index positions 0, 1, and 2.\n\nAt ④, the variable\
    \ current_image_add will contain the number we'll add to that index position stored\
    \ in current_image to get the next index position. For example, if the image at\
    \ index position 0 is displayed, we add 1 to get the next image at index position\
    \ 1, and then add 1 again to get the final image in the list at index position\
    \ 2. (You'll see how we use this variable for animation in the next chapter.)\n\
    \nThe variable jump_count at ⑤ is a counter we'll use while the stick figure is\
    \ jumping. The variable last_time will record the last time we changed the image\
    \ when animating our stick figure. We store the current time using the time function\
    \ of the time module at ⑥.\n\nAt ⑦, we set the coordinates object variable to\
    \ an object of the Coords class, with no initialization parameters set (x1, y1,\
    \ x2, and y2 are all 0). Unlike with the platforms, the stick figure's coordinates\
