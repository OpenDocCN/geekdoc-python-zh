    \ `t`：\n\n```python\n>>> t = (2007, 5, 27, 10, 30, 48, 6, 0, 0)\n```\n\n序列中的值依次是年、月、日、小时、分钟、秒、星期几（0\
    \ 是星期一，1 是星期二，依此类推）、一年中的第几天（我们放 0 作为占位符）以及是否是夏令时（如果不是则为 0；如果是则为 1）。使用类似的元组调用 `asctime`，我们得到：\n\
