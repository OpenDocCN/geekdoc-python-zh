  md: "# LAMBDA\n\nThe lambda keyword is used to create anonymous, or inline, functions.\
    \ This keyword is used in more advanced programs, and we don't discuss it in this\
    \ book.\n\n# NOT\n\nIf something is true, the not keyword makes it false. For\
    \ example, if we create a variable x and set it to the value True, and then print\
    \ the value of this variable using not, we get the following result:\n\n```\n\
    >>> x = True\n>>> print(not x)\nFalse\n```\n\nThis doesn't seem very useful, until\
    \ you start using the keyword in if statements. For example, to find out whether\
    \ an item is not in a list, we could write something like this:\n\n```\n>>> clothing_list\
    \ = ['shorts', 'undies', 'boxers', 'long johns',\n                    'knickers']\n\
    >>> if 'pants' not in clothing_list:\n        print('You really need to buy some\
    \ pants')\nYou really need to buy some pants\n```\n\n# OR\n\nThe or keyword is\
    \ used to join two conditions together in a statement (such as an if statement)\
    \ to say that at least one of the conditions should be true. Here's an example:\n\
    \n```\nif dino == 'Tyrannosaurus' or dino == 'Allosaurus':\n    print('Carnivores')\n\
    elif dino == 'Ankylosaurus' or dino == 'Apatosaurus':\n    print('Herbivores')\n\
    ```\n\nIn this case, if the variable dino contains Tyrannosaurus or Allosaurus,\
    \ the program prints “Carnivores.” If it contains Ankylosaurus or Apatosaurus,\
    \ the program prints “Herbivores.”"
