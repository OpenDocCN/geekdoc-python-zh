- img_proc: true
  md: '# USING PYTHON''S TURTLE MODULE


    A *module* in Python is a way of providing useful code to be used by another program
    (among other things, the module can contain functions we can use). We''ll learn
    more about modules in Chapter 7. Python has a special module called turtle that
    we can use to learn how computers draw pictures on a screen. The turtle module
    is a way of programming vector graphics, which is basically just drawing with
    simple lines, dots, and curves.


    ![](img/a7a5a123e26ba8cb8ef5b41ca45700be_69_0.png)


    Let''s see how the turtle works. First, start the Python shell by clicking the
    desktop icon (or if you''re using Ubuntu, select **Applications ▸ Programming
    ▸ IDLE**). Next, tell Python to use the turtle by importing the turtle module,
    as follows:


    ```

    >>> import turtle

    ```


    Importing a module tells Python that you want to use it.


    > **NOTE**


    *If you''re using Ubuntu and you get an error at this point, you might need to
    install tkinter. To do so, open the Ubuntu Software Center and enter python-tk
    in the search box. "Tkinter – Writing Tk Applications with Python" should appear
    in the window. Click **Install** to install this package.*


    # CREATING A CANVAS


    Now that we have imported the turtle module, we need to create a canvas—a blank
    space to draw on, like an artist''s canvas. To do so, we call the function Pen
    from the turtle module, which automatically creates a canvas. Enter this into
    the Python shell:


    ```

    >>> t = turtle.Pen()

    ```'
