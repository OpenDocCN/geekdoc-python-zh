  md: "# DEFINING FUNCTIONS OF CLASSES\n\nChapter 7 introduced functions as a way\
    \ to reuse code. When we define a function that is associated with a class, we\
    \ do so in the same way that we define any other function, except that we indent\
    \ it beneath the class definition. For example, here’s a normal function that\
    \ isn’t associated with a class:\n\n```\n>>> def this_is_a_normal_function():\n\
    \        print('I am a normal function')\n```\n\nAnd here are a couple of functions\
