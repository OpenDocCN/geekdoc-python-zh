- md: "## THE COLLIDED_BOTTOM FUNCTION\n\nOf course, you knew that one of these four\
    \ functions had to be just a bit different, and it is. Here's the collided_bottom\
    \ function:\n\n```python\ndef collided_bottom(y, co1, co2):\n    if within_x(co1,\
    \ co2):\n        y_calc = co1.y2 + y\n        if y_calc >= co2.y1 and y_calc <=\
    \ co2.y2:\n            return True\n    return False\n```\n\nThis function takes\
    \ an additional parameter, y, a value that we add to the y position of the first\
    \ coordinate. At ❶, we see if the coordinates have crossed over horizontally (as\
    \ we did with collided_top). Next, we add the value of the y parameter to the\
    \ first coordinate's y2 position, and store the result in the variable y_calc\
    \ at ❷. If at ❸ the newly calculated value is between the y1 and y2 values of\
    \ the second coordinate, we return True at ❹ because the bottom of coordinate\
    \ co1 has hit the top of coordinate co2. However, if none of the if statements\
    \ are true, we return False at ❺.\n\nWe need the additional y parameter because\
    \ Mr. Stick Man could fall off a platform. Unlike with the other collided functions,\
    \ we need to be able to test to see if he *would* collide at the bottom, rather\
    \ than whether he already has. If he walks off a platform and keeps floating in\
    \ midair, our game won't be very realistic; so as he walks, we check to see if\
    \ he has collided with something on the left or right. However, when we check\
    \ below him, we see if he would collide with the platform; if not, he needs to\
    \ go crashing down!\n\n## CREATING THE SPRITE CLASS\n\nWe'll call the parent class\
    \ for our game items Sprite. This class will provide two functions: move to move\
