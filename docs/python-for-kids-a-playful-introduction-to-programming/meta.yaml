    # # 12 USING TKINTER FOR BETTER GRAPHICS


    The problem with using a turtle to draw is . . . that . . . turtles . . . are
    . . . really . . . slow. Even when a turtle is going at top speed, it’s still
    not going very fast. That’s not really a problem for turtles, but it is a problem
    for computer graphics.


    Computer graphics, especially in games, usually need to move fast. If you have
    a game console or you play games on your computer, think for a moment about the
    graphics you see on the screen. Two-dimensional (2D) graphics are flat—the characters
    generally move'
  merge: -1
  pgno: 188
- img_proc: true
  md: 'only up and down or left and right—as in many Nintendo DS, PlayStation Portable
    (PSP), and mobile phone games. In pseudo-three-dimensional (3D) games—ones that
    are almost 3D—images look a little more real, but the characters generally move
    only in relation to a flat plane (this is also known as *isometric graphics*).
    And, finally, we have 3D games, where the pictures drawn on the screen attempt
    to mimic reality. Whether the games use 2D, pseudo-3D, or 3D graphics, all have
    one thing in common: the need to draw on the computer screen very quickly.


    ![](img/a7a5a123e26ba8cb8ef5b41ca45700be_189_0.png)


    If you''ve never tried to create your own animation, try this simple project:


    +   1. Get a blank pad of paper, and in the bottom corner of the first page, draw
    something (perhaps a stick figure).

    2. On the corner of the next page, draw the same stick figure, but move its leg
    slightly.

    3. On the next page, draw the stick figure again, with the leg moved a little
    more.

    4. Gradually go through each page, drawing a modified stick figure on the bottom
    corner.


    When you''re finished, flip quickly through the pages, and you should see your
    stick figure moving. This is the basic method used with all animation, whether
    it''s cartoons on TV or games on your console or computer. An image is drawn,
    and then drawn again with a slight change to create the illusion of movement.
    To make an image look like it is moving, you need to display each *frame*, or
    piece of the animation, very quickly.


    Python offers different ways to create graphics. In addition to the turtle module,
    you can use external modules (which need to be installed separately), as well
    as the tkinter module, which you should already have in your standard Python installation.
    tkinter can be used to create full applications, like a simple word processor,
    as well as for simple drawing. In this chapter, we''ll explore how to use tkinter
    to create graphics.'
