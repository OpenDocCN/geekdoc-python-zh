    \ 'the', 'floor']\n>>> print(list1 + list2)\n[1, 2, 3, 4, 'I', 'tripped', 'over',\
    \ 'and', 'hit', 'the', 'floor']\n```\n\nWe can also add the two lists and set\
    \ the result equal to another variable.\n\n```\n>>> list1 = [1, 2, 3, 4]\n>>>\
    \ list2 = ['I', 'ate', 'chocolate', 'and', 'I', 'want', 'more']\n>>> list3 = list1\
    \ + list2\n>>> print(list3)\n[1, 2, 3, 4, 'I', 'ate', 'chocolate', 'and', 'I',\
    \ 'want', 'more']\n```\n\nAnd we can multiply a list by a number. For example,\
    \ to multiply list1 by 5, we write list1 * 5:\n\n```\n>>> list1 = [1, 2]\n>>>\
    \ print(list1 * 5)\n[1, 2, 1, 2, 1, 2, 1, 2, 1, 2]\n```\n\nThis is actually telling\
    \ Python to repeat list1 five times, resulting in 1, 2, 1, 2, 1, 2, 1, 2, 1, 2.\n\
    \nOn the other hand, division (/) and subtraction (-) give only errors, as in\
