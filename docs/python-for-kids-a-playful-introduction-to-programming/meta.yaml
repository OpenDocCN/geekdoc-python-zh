- img_proc: true
  md: 'The solution to this problem is a multiline string, which we learned about
    earlier, using *three* single quotes (''''''), which allows us to combine double
    and single quotes in our string without causing errors. In fact, if we use three
    single quotes, we can put any combination of single and double quotes inside the
    string (as long as we don''t try to put three single quotes there). This is what
    the error-free version of our string looks like:


    ![](img/a7a5a123e26ba8cb8ef5b41ca45700be_54_0.png)


    ```

    silly_string = ''''''He said, "Aren''t can''t shouldn''t wouldn''t."''''''

    ```


    But wait, there''s more. If you really want to use single or double quotes to
    surround a string in Python, instead of three single quotes, you can add a backslash
    (\) before each quotation mark within the string. This is called *escaping*. It''s
    a way of saying to Python, "Yes, I know I have quotes inside my string, and I
    want you to ignore them until you see the end quote."


    Escaping strings can make them harder to read, so it''s probably better to use
    multiline strings. Still, you might come across snippets of code that use escaping,
    so it''s good to know why the backslashes are there.


    Here are a few examples of how escaping works:


    ```

    >>> single_quote_str = ''He said, "Aren\''t can\''t shouldn\''t wouldn\''t."''

    >>> double_quote_str = "He said, "Aren''t can''t shouldn''t wouldn''t.""

    >>> print(single_quote_str)

    He said, "Aren''t can''t shouldn''t wouldn''t."

    >>> print(double_quote_str)

    He said, "Aren''t can''t shouldn''t wouldn''t."

    ```


    First, at ❶, we create a string with single quotes, using the backslash in front
    of the single quotes inside that string. At ❷, we create a string with double
    quotes, and use the backslash in front of those quotes in the string. In the lines
    that follow, we print the variables we''ve just created. Notice that the backslash
    character doesn''t appear in the strings when we print them.'
