  md: "price is over $100 as at ❸, then display a message that it's expensive at ❹.\
    \ If neither of those conditions is true as at ❺, it should display the message\
    \ “I can afford that toy” at ❻.\n\n# IMPORT\n\nThe import keyword is used to tell\
    \ Python to load a module so it can be used. For example, the following code tells\
