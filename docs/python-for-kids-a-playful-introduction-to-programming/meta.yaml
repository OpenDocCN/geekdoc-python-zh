    ## #3: GREETINGS!


    Create two variables: one that points to your first name and one that points to
    your last name. Now create a string and use placeholders to print your name with
    a message using those two variables, such as “Hi there, Brando Ickett!”


    ## #4 DRAWING WITH TURTLES


    A *turtle* in Python is sort of like a turtle in the real world. We know a turtle
    as a reptile that moves around very slowly and carries its house on its back.
    In the world of Python, a turtle is a small, black arrow that moves slowly around
    the screen. Actually, considering that a Python turtle leaves a trail as it moves
    around the screen, it’s actually less like a turtle and more like a snail or a
    slug.


    The turtle is a nice way to learn some of the basics of computer graphics, so
    in this chapter, we’ll use a Python turtle to draw some simple shapes and lines.


    ## USING PYTHON''S TURTLE MODULE


    A *module* in Python is a way of providing useful code to be used by another program
    (among other things, the module can contain functions we can use). We''ll learn
    more about modules in Chapter 7. Python has a special module called turtle that
    we can use to learn how computers draw pictures on a screen. The turtle module
    is a way of programming vector graphics, which is basically just drawing with
    simple lines, dots, and curves.


    Let''s see how the turtle works. First, start the Python shell by clicking the
    desktop icon (or if you''re using Ubuntu, select **Applications ▸ Programming
    ▸ IDLE**). Next, tell Python to use the turtle by importing the turtle module,
    as follows:


    ```

    >>> import turtle

    ```


    Importing a module tells Python that you want to use it.


    > **NOTE**

    >

    > *If you''re using Ubuntu and you get an error at this point, you might need
    to install tkinter. To do so, open the Ubuntu Software Center and enter python-tk
    in the search box. "Tkinter – Writing Tk Applications with Python" should appear
    in the window. Click **Install** to install this package.*


    ## CREATING A CANVAS


    Now that we have imported the turtle module, we need to create a canvas—a blank
    space to draw on, like an artist''s canvas. To do so, we call the function Pen
    from the turtle module, which automatically creates a canvas. Enter this into
    the Python shell:


    ```

    >>> t = turtle.Pen()

    ```


    You should see a blank box (the canvas), with an arrow in the center, something
    like this:


    The arrow in the middle of the screen is the turtle, and you''re right—it isn''t
    very turtle-like.

    If the Turtle window appears behind the Python Shell window, you may find that
    it doesn''t seem to be working properly. When you move your mouse over the Turtle
    window, the cursor turns into an hourglass, like this:


    This could happen for several reasons: you haven''t started the shell from the
    icon on your desktop (if you''re using Windows or a Mac), you clicked IDLE (Python
    GUI) in the Windows Start menu, or IDLE isn''t installed correctly. Try exiting
    and restarting the shell from the desktop icon. If that fails, try using the Python
    console instead of the shell, as follows:


    - In Windows, select **Start ▸ All Programs**, and then in the **Python 3.2**
    group, click **Python (command line)**.

    - In Mac OS X, click the Spotlight icon at the top-right corner of the screen
    and enter *Terminal* in the input box. Then enter *python* when the terminal opens.

    - In Ubuntu, open the terminal from your **Applications** menu and enter *python*.


    ## MOVING THE TURTLE


    You send instructions to the turtle by using functions available on the variable
    t we just created, similar to using the Pen function in the turtle module. For
    example, the forward instruction tells the turtle to move forward. To tell the
    turtle to advance 50 pixels, enter the following command:


    ```

    >>> t.forward(50)

    ```


    You should see something like this:


    The turtle has moved forward 50 pixels. A *pixel* is a single point on the screen—the
    smallest element that can be represented. Everything you see on your computer
    monitor is made up of pixels, which are tiny, square dots. If you could zoom in
    on the canvas and the line drawn by the turtle, you would be able to see that
    the arrow representing the turtle’s path is just a bunch of pixels. That’s simple
    computer graphics.


    Now we’ll tell the turtle to turn left 90 degrees with the following command:


    ```

    >>> t.left(90)

    ```


    If you haven’t learned about degrees yet, here’s how to think about them. Imagine
    that you’re standing in the center of a circle.


    - The direction you’re facing is 0 degrees.

    - If you hold out your left arm, that’s 90 degrees left.

    - If you hold out your right arm, that’s 90 degrees right.


    You can see this 90-degree turn to the left or right here:


    If you continue around the circle to the right from where your right arm is pointing,
    180 degrees is directly behind you, 270 degrees is the direction your left arm
    is pointing, and 360 degrees is back where you started; degrees go from 0 to 360.
    The degrees in a full circle, when turning to the right, can be seen here in 45-degree
    increments:


    When Python''s turtle turns left, it swivels around to face the new direction
    (just as if you turned your body to face where your arm is pointing 90 degrees
    left).

    The t.left(90) command points the arrow up (since it started by pointing to the
    right):


    > When you call t.left(90), it''s the same as calling t.right(270). This is also
    true of calling t.right(90), which is the same as t.left(270). Just imagine that
    circle and follow along with the degrees.


    Now we''ll draw a square. Add the following code to the lines you''ve already
    entered:


    ```

    >>> t.forward(50)

    >>> t.left(90)

    >>> t.forward(50)

    >>> t.left(90)

    >>> t.forward(50)

    >>> t.left(90)

    ```


    Your turtle should have drawn a square and should now be facing in the same direction
    it started:


    To erase the canvas, enter reset. This clears the canvas and puts the turtle back
    at its starting position.


    ```

    >>> t.reset()

    ```


    You can also use clear, which just clears the screen and leaves the turtle where
    it is.


    ```

    >>> t.clear()

    ```


    We can also turn our turtle right or move it backward. We can use up to lift the
    pen off the page (in other words, tell the turtle to stop drawing), and down to
    start drawing. These functions are written in the same way as the others we''ve
    used.

    Let''s try another drawing using some of these commands. This time, we''ll have
    the turtle draw two lines. Enter the following code:


    ```

    >>> t.reset()

    >>> t.backward(100)

    >>> t.up()

    >>> t.right(90)

    >>> t.forward(20)

    >>> t.left(90)

    >>> t.down()

    >>> t.forward(100)

    ```


    First, we reset the canvas and move the turtle back to its starting position with
    t.reset(). Next, we move the turtle backward 100 pixels with t.backward(100),
    and then use t.up() to pick up the pen and stop drawing.


    Then, with the command t.right(90), we turn the turtle right 90 degrees to point
    down, toward the bottom of the screen, and with t.forward(20), we move forward
    20 pixels. Nothing is drawn because of the use of up command on the third line.
    We turn the turtle left 90 degrees to face right with t.left(90), and then with
    the down command, we tell the turtle to put the pen back down and start drawing
    again. Finally, we draw a line forward, parallel to the first line we drew, with
    t.forward(100). The two parallel lines we''ve drawn end up looking like this:'
  mdcn: '## #2：计算战斗人员


    假设有3栋建筑，每栋屋顶上隐藏着25名忍者，还有2条隧道，每条隧道内潜伏着40名武士，那么即将投入战斗的忍者和武士共有多少人？（你可以用Python shell中的一个等式来解决这个问题。）


    ## #3：问候语！


    创建两个变量：一个指向你的名字，另一个指向你的姓氏。现在创建一个字符串，并使用占位符，利用这两个变量打印出带有问候语的你的全名，例如“你好，布兰多·伊克特！”


    ## #4 用海龟绘图


    Python中的*海龟*有点像现实世界中的乌龟。我们知道乌龟是一种爬行动物，行动非常缓慢，并且背着自己的房子。在Python的世界里，海龟是一个在屏幕上缓慢移动的小黑箭头。实际上，考虑到Python海龟在屏幕上移动时会留下轨迹，它其实更像一只蜗牛或蛞蝓。


    海龟是学习计算机图形学基础知识的好方法，所以在本章中，我们将使用Python海龟来绘制一些简单的形状和线条。


    ## 使用Python的turtle模块


    Python中的*模块*是一种提供有用代码供其他程序使用的方式（除此之外，模块还可以包含我们可以使用的函数）。我们将在第7章中更详细地学习模块。Python有一个名为turtle的特殊模块，我们可以用它来学习计算机如何在屏幕上绘制图像。turtle模块是一种编程矢量图形的方式，本质上就是用简单的线条、点和曲线进行绘制。


    让我们看看海龟是如何工作的。首先，通过点击桌面图标启动Python shell（如果你使用Ubuntu，请选择**应用程序 ▸ 编程 ▸ IDLE**）。接下来，通过导入turtle模块来告诉Python使用海龟，如下所示：


    ```

    >>> import turtle

    ```


    导入模块告诉Python你想要使用它。


    > **注意**

    >

    > *如果你使用Ubuntu并且在此时遇到错误，你可能需要安装tkinter。为此，请打开Ubuntu软件中心，并在搜索框中输入python-tk。窗口中应出现“Tkinter
    – 使用Python编写Tk应用程序”。点击**安装**以安装此软件包。*


    ## 创建画布


    现在我们已经导入了turtle模块，我们需要创建一个画布——一个用于绘制的空白区域，就像艺术家的画布一样。为此，我们调用turtle模块中的Pen函数，它会自动创建一个画布。在Python
    shell中输入以下内容：


    ```

    >>> t = turtle.Pen()

    ```


    你应该会看到一个空白框（画布），中心有一个箭头，大致如下：


    屏幕中央的箭头就是海龟，你说得对——它看起来不太像海龟。

    如果海龟窗口出现在Python Shell窗口后面，你可能会发现它似乎无法正常工作。当你将鼠标移到海龟窗口上时，光标会变成沙漏形状，如下所示：


    这可能是由几个原因造成的：你没有从桌面图标启动shell（如果你使用Windows或Mac），你在Windows开始菜单中点击了IDLE（Python GUI），或者IDLE没有正确安装。尝试退出并从桌面图标重新启动shell。如果失败，请尝试使用Python控制台而不是shell，方法如下：


    - 在Windows中，选择**开始 ▸ 所有程序**，然后在**Python 3.2**组中，点击**Python（命令行）**。

    - 在Mac OS X中，点击屏幕右上角的Spotlight图标，并在输入框中输入*Terminal*。然后在终端打开时输入*python*。

    - 在Ubuntu中，从**应用程序**菜单打开终端，并输入*python*。


    ## 移动海龟


    你通过使用我们刚刚创建的变量`t`上可用的函数来向海龟发送指令，类似于使用turtle模块中的Pen函数。例如，forward指令告诉海龟向前移动。要告诉海龟前进50像素，请输入以下命令：


    ```

    >>> t.forward(50)

    ```


    你应该会看到类似这样的内容：


    海龟向前移动了50像素。*像素*是屏幕上的一个点——可以表示的最小元素。你在计算机显示器上看到的一切都是由像素组成的，它们是微小的方形点。如果你能放大画布和海龟绘制的线条，你将能够看到代表海龟路径的箭头只是一堆像素。这就是简单的计算机图形学。


    现在我们将告诉海龟向左转90度，使用以下命令：


    ```

    >>> t.left(90)

    ```


    如果你还没有学过角度，这里有一个思考方法。想象你站在一个圆的中心。


    - 你面对的方向是0度。

    - 如果你伸出左臂，那是向左90度。

    - 如果你伸出右臂，那是向右90度。


    你可以在这里看到向左或向右的90度转弯：


    如果你从右臂指向的方向继续向右绕圆，180度在你正后方，270度是你左臂指向的方向，360度回到你开始的地方；角度从0到360。向右转时，一个完整圆的角度可以在这里以45度为增量看到：


    当Python的海龟向左转时，它会旋转以面向新方向（就像你转身面向左臂指向90度的方向一样）。

    `t.left(90)`命令将箭头指向上方（因为它开始时指向右方）：


    > 当你调用`t.left(90)`时，这与调用`t.right(270)`相同。调用`t.right(90)`也是如此，它与`t.left(270)`相同。只需想象那个圆并跟随角度即可。


    现在我们将绘制一个正方形。将以下代码添加到你已经输入的行中：


    ```

    >>> t.forward(50)

    >>> t.left(90)

    >>> t.forward(50)

    >>> t.left(90)

    >>> t.forward(50)

    >>> t.left(90)

    ```


    你的海龟应该已经绘制了一个正方形，并且现在应该面向与开始时相同的方向：


    要擦除画布，请输入reset。这会清除画布并将海龟放回其起始位置。


    ```

    >>> t.reset()

    ```


    你也可以使用clear，它只清除屏幕并让海龟留在原地。


    ```

    >>> t.clear()

    ```


    我们也可以让海龟向右转或向后移动。我们可以使用up将笔从页面上抬起（换句话说，告诉海龟停止绘制），使用down开始绘制。这些函数的编写方式与我们使用过的其他函数相同。

    让我们尝试使用其中一些命令进行另一个绘图。这次，我们将让海龟绘制两条线。输入以下代码：


    ```

    >>> t.reset()

    >>> t.backward(100)

    >>> t.up()

    >>> t.right(90)

    >>> t.forward(20)

    >>> t.left(90)

    >>> t.down()

    >>> t.forward(100)

    ```


    首先，我们使用`t.reset()`重置画布并将海龟移回其起始位置。接下来，我们使用`t.backward(100)`将海龟向后移动100像素，然后使用`t.up()`抬起笔并停止绘制。


    然后，使用命令`t.right(90)`，我们将海龟向右转90度，使其指向下方，朝向屏幕底部，并使用`t.forward(20)`向前移动20像素。由于第三行使用了up命令，所以没有绘制任何东西。我们使用`t.left(90)`将海龟向左转90度以面向右方，然后使用down命令，我们告诉海龟将笔放回并重新开始绘制。最后，我们使用`t.forward(100)`向前绘制一条线，与我们绘制的第一条线平行。我们绘制的两条平行线最终看起来像这样：'
