    \n2.  按住 CTRL 键（如果你使用的是 Mac，则按 ⌘ 键）并按 C 键复制选中的文本。（从现在起，我们将此操作表示为 CTRL-C。）\n\n\
    3.  点击最后一行提示符（在 `stolen_coins = 2` 之后）。\n\n4.  按住 CTRL 键并按 V 键粘贴选中的文本。（从现在起，我们将此操作表示为\
    \ CTRL-V。）\n\n5.  按 ENTER 键查看新结果：\n\n    ![](img/a7a5a123e26ba8cb8ef5b41ca45700be_47_1.png)\n\
    \n这难道不比重新输入整个方程式容易得多吗？确实如此。\n\n你可以尝试更改其他变量，然后复制（CTRL-C）并粘贴（CTRL-V）计算过程，以查看更改的效果。例如，如果你在正确的时机敲击你祖父发明的装置的两侧，它每次会额外吐出\
    \ 3 枚硬币，你会发现一年结束时你最终会拥有 4661 枚硬币：\n\n```\n>>> magic_coins = 13\n>>> found_coins\
