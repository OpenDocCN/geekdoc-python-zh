    # WHAT YOU LEARNED


    In this chapter, we completed our game, Mr. Stick Man Races for the Exit. We created
    a class for our animated stick figure and wrote functions to move him around the
    screen and animate him as he moves (changing from one image to the next to give
    the illusion of running). We''ve used basic collision detection to tell when he
    has hit the left or right sides of the canvas, and when he has hit'
- md: "another sprite, such as a platform or a door. We've also added collision code\
    \ to tell when he hits the top of the screen or the bottom, and to make sure that\
    \ when he runs off the edge of a platform, he tumbles down accordingly. We added\
    \ code to tell when Mr. Stick Man has reached the door, so the game comes to an\
    \ end.\n\n![](img/a7a5a123e26ba8cb8ef5b41ca45700be_308_0.png)\n\n## PROGRAMMING\
    \ PUZZLES\n\nThere's a lot more we can do to improve the game. At the moment,\
    \ it's very simple, so we can add code to make it more professional looking and\
    \ more interesting to play. Try adding the following features and then check your\
    \ code at http://python-for-kids.com/.\n\n### #1: \"YOU WIN!\"\n\nLike the \"\
    Game Over\" text in the Bounce! game we completed in Chapter 14, add the \"You\
    \ Win!\" text when the stick figure reaches the door, so players can see that\
    \ they have won.\n\n### #2: ANIMATING THE DOOR\n\nIn Chapter 15, we created two\
    \ images for the door: one open and one closed. When Mr. Stick Man reaches the\
    \ door, the door image should change to the open door, Mr. Stick Man should vanish,\
    \ and the door image should revert to the closed door. This will give the illusion\
    \ that Mr. Stick Man is exiting and closing the door as he leaves. You can do\
    \ this by changing the DoorSprite class and the StickFigureSprite class.\n\n![](img/a7a5a123e26ba8cb8ef5b41ca45700be_308_1.png)\n\
    \n### #3: MOVING PLATFORMS\n\nTry adding a new class called `MovingPlatformSprite`.\
    \ This platform should move from side to side, making it more difficult for Mr.\
    \ Stick Man to reach the door at the top.\n\n![](img/a7a5a123e26ba8cb8ef5b41ca45700be_310_0.png)\n\
    \nYou’ve learned some basic programming concepts in your tour of Python, and now\
    \ you’ll find it much easier to work with other programming languages. While Python\
    \ is incredibly useful, one language is not always the best tool for every task,\
    \ so don’t be afraid to try other ways to program your computer. Here, we’ll look\
    \ at some alternatives for games and graphics programming, and then take a peek\
    \ at some of the most commonly used programming languages.\n\n## GAMES AND GRAPHICS\
    \ PROGRAMMING\n\nIf you want to do more with games or graphics programming, you’ll\
    \ find many options available. Here are just a few:\n\n- BlitzBasic (http://www.blitzbasic.com/),\
    \ which uses a special version of the BASIC programming language designed specifically\
    \ for games\n- Adobe Flash, a type of animation software designed to run in the\
    \ browser, which has its own programming language called ActionScript (http://www.adobe.com/devnet/actionscript.html)\n\
    - Alice (http://www.alice.org/), a 3D programming environment (for Microsoft Windows\
    \ and Mac OS X only)\n- Scratch (http://scratch.mit.edu/), a tool for developing\
    \ games\n- Unity3D (http://unity3d.com/), another tool for creating games\n\n\
    An online search will uncover a wealth of resources to help you get started with\
    \ any of these options.\n\nOn the other hand, if you would like to continue playing\
    \ with Python, you could use PyGame, the Python module designed for game development.\
    \ Let’s explore that option.\n\n## PYGAME\n\nPyGame Reloaded (pgreloaded or pygame2)\
    \ is the version of PyGame that works with Python 3 (earlier versions work only\
    \ with Python 2). A good place to start reading is the pgreloaded tutorial at\
    \ http://code.google.com/p/pgreloaded/.\n\n> NOTE: As of this writing, there is\
    \ no installer for pgreloaded on Mac OS X or Linux, so there is no straightforward\
    \ way to use it on either of these operating systems.\n\nWriting a game with PyGame\
    \ is a little more complicated than using tkinter. For example, in Chapter 12,\
    \ we displayed an image using tkinter with this code:\n\n```\nfrom tkinter import\
    \ *\ntk = Tk()\ncanvas = Canvas(tk, width=400, height=400)\ncanvas.pack()\nmyimage\
    \ = PhotoImage(file='c:\\test.gif')\ncanvas.create_image(0, 0, anchor=NW, image=myimage)\n\
    ```\n\nThe same code using PyGame (loading a .bmp file rather than a .gif file)\
    \ would look like this:\n\n```\nimport sys\nimport time\nimport pygame2\nimport\
    \ pygame2.sdl.constants as constants\nimport pygame2.sdl.image as image\nimport\
    \ pygame2.sdl.video as video\nvideo.init()\nimg = image.load_bmp(\"c:\\test.bmp\"\
    )\nscreen = video.set_mode(img.width, img.height)\nscreen.fill(pygame2.Color(255,\
    \ 255, 255))\nscreen.blit(img, (0, 0))\nscreen.flip()\ntime.sleep(10)\nvideo.quit()\n\
    ```\n\nAfter importing the pygame2 modules, we call the init function on the PyGame\
    \ video module at ❶, which is a bit like the call to create the canvas and then\
    \ pack it in the tkinter example. We load a BMP image using the load_bmp function\
    \ at ❷, and then create a screen object using the set_mode function, passing in\
    \ the width and height of the loaded image as parameters at ❸. With the next (optional)\
    \ line, we wipe the screen by filling it with white at ❹, and then use the blit\
    \ function of the screen object to display the image at ❺. The parameters for\
    \ this function are the img object and a tuple containing the position where we\
    \ want to display the image (0 pixels across, 0 pixels down).\n\nPyGame uses an\
    \ off-screen buffer (also known as a double-buffer). An off-screen buffer is a\
    \ technique used to draw graphics in an area of the computer’s memory where it\
    \ isn’t visible, and then to copy that entire area into the visible display (onto\
    \ your screen) all at once. Off-screen buffering reduces the flickering effect\
    \ if you happen to be drawing a lot of different objects on a display. Copying\
    \ from the off-screen buffer to the visible display is performed using the flip\
    \ function at ❻.\n\nFinally, we sleep for 10 seconds at ❼ because, unlike tkinter’s\
    \ canvas, the screen will immediately close if we don’t stop it from doing so.\
    \ At ❽, we clean up using video.init so that PyGame will shut down properly. There’s\
    \ a lot more to PyGame, but this short example gives you an idea of what it’s\
    \ like.\n\n## PROGRAMMING LANGUAGES\n\nIf you're interested in other programming\
    \ languages, some that are currently popular are Java, C/C++, C#, PHP, Objective-C,\
    \ Perl, Ruby, and JavaScript. We'll take a brief tour of these languages and see\
    \ how a Hello World program (like the Python version we started with in Chapter\
    \ 1) would look in each one. Note that none of these languages are specifically\
    \ intended for beginning programmers, and most are significantly different from\
    \ Python.\n\n## JAVA\n\nJava (http://www.oracle.com/technetwork/java/index.html)\
    \ is a moderately complicated programming language with a large built-in library\
    \ of modules (called packages). A lot of free documentation is available online.\
    \ You can use Java on most operating systems. Java is also the language used on\
    \ Android mobile phones.\n\nHere's an example of Hello World in Java:\n\n```\n\
    public class HelloWorld {\n    public static final void main(String[] args) {\n\
    \        System.out.println(\"Hello World\");\n    }\n}\n```\n\n## C/C++\n\nC\
    \ (http://www.cprogramming.com/) and C++ (http://www.stroustrup/C++.html) are\
    \ complicated programming languages that are used on all operating systems. You'll\
    \ find both free and commercial versions available. Both languages (though perhaps\
    \ C++ more than C) have a steep learning curve. For example, you'll find that\
    \ you need to manually code some features that Python provides (like telling the\
    \ computer that you need to use a chunk of memory to store an object). Many commercial\
    \ games and game consoles are programmed in some form of C or C++.\n\nHere's an\
    \ example of Hello World in C:\n\n```\n#include <stdio.h>\nint main ()\n{\n  \
    \  printf (\"Hello World\\n\");\n}\n```\n\nAn example in C++ might look like this:\n\
    \n```\n#include <iostream>\nint main()\n{\n    std::cout << \"Hello World\\n\"\
    ;\n    return 0;\n}\n```\n\n## C#\n\nC# (http://msdn.microsoft.com/en-us/vstudio/hh388566/),\
    \ pronounced “C sharp,” is a moderately complicated programming language for Windows\
    \ that is very similar to Java. It’s a bit easier than C and C++.\n\nHere’s an\
    \ example of Hello World in C#:\n\n```\npublic class Hello\n{\n    public static\
    \ void Main()\n    {\n        System.Console.WriteLine(\"Hello World\");\n   \
    \ }\n}\n```\n\n## PHP\n\nPHP (http://www.php.net/) is a programming language for\
    \ building websites. You will need a web server (software used to deliver web\
    \ pages to a web browser) with PHP installed, but all the software required is\
    \ freely available for all the major operating systems. In order to work with\
    \ PHP, you will need to learn HTML (a simple language for building web pages).\
    \ You can find a free PHP tutorial at http://php.net/manual/en/tutorial.php, and\
    \ an HTML tutorial at http://www.w3schools.com/html.\n\nAn HTML page that displays\
    \ “Hello World” in a browser might look like this:\n\n```\n<html>\n    <body>\n\
    \        <p>Hello World</p>\n    </body>\n</html>\n```"
