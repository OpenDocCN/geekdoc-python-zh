    \ fill color for the oval.\n\nThe create_oval function returns an identifier for\
    \ the shape that is drawn, which we store in the object variable id. At ❻, we\
    \ move the oval to the middle of the canvas (position 245, 100), and the canvas\
    \ knows what to move, because we use the stored shape identifier (the object variable\
    \ id) to identify it.\n\n![](img/a7a5a123e26ba8cb8ef5b41ca45700be_222_0.png)\n\
    \nOn the last two lines of the Ball class, we create the draw function with `def\
    \ draw(self)`, and the body of the function is simply the pass keyword. At the\
    \ moment it does nothing. We'll add more to this function shortly.\n\nNow that\
    \ we've created our Ball class, we need to create an object of this class (remember\
    \ that a class describes what it can do, but the object is the thing that actually\
    \ does it). Add the following code to the bottom of the program to create a red\
    \ ball object:\n\n```\nball = Ball(canvas, 'red')\n```\n\nIf you run this program\
    \ now using **Run ▶ Run Module**, the canvas will appear for a split second and\
    \ then vanish. To stop the window from closing immediately, we need to add an\
    \ animation loop, which is called the *main loop* of our game.\n\nA main loop\
    \ is the central part of a program that generally controls most of what it does.\
    \ Our main loop, for the moment, just tells tkinter to redraw the screen. The\
    \ loop keeps running forever (or at least until we close the window), constantly\
    \ telling tkinter to redraw the screen, and then sleeping for one hundredth of\
    \ a second. We'll add this code to the end of our program:\n\n```\nball = Ball(canvas,\
    \ 'red')\n\nwhile 1:\n    tk.update_idletasks()\n    tk.update()\n    time.sleep(0.01)\n\
    ```\n\nNow if you run the code, the ball should appear almost in the center of\
