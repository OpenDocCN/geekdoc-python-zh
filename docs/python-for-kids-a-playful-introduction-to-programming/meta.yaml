- img_proc: true
  md: 'When you find something frustrating or too challenging, here are some things
    that I find helpful:


    +   1. Break a problem down into smaller pieces. Try to understand what a small
    piece of code is doing, or think about only a small part of a difficult idea (focus
    on a small piece of code rather than trying to understand the whole thing at once).

    2. If that still doesn''t help, sometimes it''s best to just leave it alone for
    a while. Sleep on it, and come back to it another day. This is a good way to solve
    many problems, and it can be particularly helpful for computer programmers.


    # WHO SHOULD READ THIS BOOK


    This book is for anyone interested in computer programming, whether that''s a
    child or an adult coming to programming for the first time. If you want to learn
    how to write your own software rather than just use the programs developed by
    others, *Python for Kids* is a great place to start.

    In the following chapters, you''ll find information to help you install Python,
    start the Python shell and perform basic calculations, print text on the screen
    and create lists, and perform simple control flow operations using if statements
    and for loops (and learn what if statements and for loops are!). You''ll learn
    how to reuse code with functions, the basics of classes and objects, and descriptions
    of some of the many built-in Python functions and modules.

    You''ll find chapters on both simple and advanced turtle graphics, as well as
    on using the tkinter module to draw on the computer screen. There are programming
    puzzles of varying complexity at the ends of many chapters, which will help readers
    cement their newfound knowledge by giving them a chance to write small programs
    by themselves.

    Once you''ve built up your fundamental programming knowledge, you''ll learn how
    to write your own games. You''ll develop two graphical games and learn about collision
    detection, events, and different animation techniques.

    Most of the examples in this book use Python''s IDLE (Integrated Development Environment)
    shell. IDLE provides syntax highlighting, copy-and-paste functionality (similar
    to what you'
  merge: -1
  pgno: 22
- img_proc: true
  md: 'would use in other applications), and an editor window where you can save your
    code for later use, which means IDLE works as both an interactive environment
    for experimentation and something a bit like a text editor. The examples will
    work just as well with the standard console and a regular text editor, but IDLE’s
    syntax highlighting and slightly more user-friendly environment can aid understanding,
    so the very first chapter shows you how to set it up.


    # WHAT''S IN THIS BOOK


    Here’s a brief rundown of what you’ll find in each chapter.

    **Chapter 1** is an introduction to programming with instructions for installing
    Python for the first time.

    **Chapter 2** introduces basic calculations and variables, and **Chapter 3** describes
    some of the basic Python types, such as strings, lists, and tuples.

    **Chapter 4** is the first taste of the turtle module. We’ll jump from basic programming
    to moving a turtle (in the shape of an arrow) around the screen.

    **Chapter 5** covers the variations of conditions and if statements, and **Chapter
    6** moves on to for loops and while loops.

    **Chapter 7** is where we start to use and create functions, and then in **Chapter
    8** we cover classes and objects. We cover enough of the basic ideas to support
    some of the programming techniques we’ll need in the games development chapters
    later on in the book. At this point, the material starts get a little more complicated.

    **Chapter 9** goes through most of the built-in functions in Python, and **Chapter
    10** continues with a few modules (basically buckets of useful functionality)
    that are installed by default with Python.

    **Chapter 11** returns to the turtle module as the reader experiments with more
    complicated shapes. **Chapter 12** moves on to using the tkinter module for more
    advanced graphics creation.

    In **Chapters 13** and **14**, we create our first game, “Bounce!,” which builds
    on the knowledge gained from the preceding chapters, and in **Chapters 15–18**,
    we create another game, “Mr. Stick Man Races for the Exit.” The game development
    chapters are where things could start to go seriously wrong. If all else fails,
    download the code from the companion website (*http://python-for-kids.com/*),
    and compare your code with these working examples.'
  merge: -1
