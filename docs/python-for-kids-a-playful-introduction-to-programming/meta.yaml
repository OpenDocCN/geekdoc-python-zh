    \ variable that exists only while a function is being used.\nYou can run the function\
    \ by calling its name, using parentheses around the parameter value:\n\n```\n\
    >>> testfunc('Mary')\nhello Mary\n```\n\nThe function could take two, three, or\
    \ any number of parameters, instead of just one:\n\n```\n>>> def testfunc(fname,\
    \ lname):\n        print('Hello %s %s' % (fname, lname))\n```\n\nThe two values\
    \ for these parameters are separated by a comma:\n\n```\n>>> testfunc('Mary',\
    \ 'Smith')\nHello Mary Smith\n```\n\nWe could also create some variables first\
    \ and then call the function with them:\n\n```\n>>> firstname = 'Joe'\n>>> lastname\
    \ = 'Robertson'\n>>> testfunc(firstname, lastname)\nHello Joe Robertson\n```"
