    # MR. STICK MAN GAME PLAN


    Here’s the description of our new game:


    +   - Secret agent Mr. Stick Man is trapped in the lair of Dr. Innocuous, and
    you want to help him escape through the exit on the top floor.

    - The game has a stick figure that can run from left to right and jump up. There
    are platforms on each floor that he must jump to.

    - The goal of the game is to reach the door to the exit, before it’s too late
    and the game ends.


    ![](img/a7a5a123e26ba8cb8ef5b41ca45700be_247_0.png)


    Based on this description, we know we’ll need several images, including ones for
    Mr. Stick Man, the platforms, and the door. We’ll obviously need code to pull
    all this together, but before we get there, we’ll create the graphics for our
    game in this chapter. That way, we’ll have something to work with in the next
    chapter.


    How will we draw the elements in our game? We could use graphics like the ones
    that we created for the bouncing ball and paddle in the previous chapters, but
    those are far too simple for this game. Instead, we’re going to create sprites.


    *Sprites* are the things in a game—typically a character of some kind. Sprites
    are usually *prerendered*, meaning they are drawn in advance (before the program
    runs) rather than being created by the program itself using polygons, as in our
    Bounce! game. Mr. Stick Man will be a sprite, and the platforms will be sprites,
    too. In order to create these images, you’ll need to install a graphics program.


    # GETTING GIMP


    Several graphics programs are available, but for this game, we need one that supports
    *transparency* (sometimes called the *alpha channel*), which lets images have
    sections where no colors are drawn on the screen. We need images with transparent
    parts'
- md: 'because when one image passes over or near another as it moves across the screen,
    we don''t want the background of one image to wipe out part of another. For example,
    in this image, the checkerboard pattern in the background represents the transparent
    area:


    ![](img/a7a5a123e26ba8cb8ef5b41ca45700be_248_0.png)


    So if we copy the entire image and paste it over the top of another image, the
    background won''t wipe anything out:


    ![](img/a7a5a123e26ba8cb8ef5b41ca45700be_248_1.png)


    GIMP (http://www.gimp.org/), short for GNU Image Manipulation Program, is a free
    graphics program for Linux, Mac OS X, and Windows that supports transparent images.
    Download and install it as follows:


    - If you''re using Windows, you''ll be able to find Windows installers on the
    GIMP-WIN project page at http://gimp-win.sourceforge.net/stable.html.

    - If you''re using Ubuntu, install GIMP by opening the Ubuntu Software Center
    and entering *gimp* in the search box. Click the Install button for the GIMP Image
    Editor when it appears in the results.

    - If you''re using Mac OS X, download an application bundle from http://gimp.lisanet.de/Website/Download.html.


    You should also create a directory for your game. To do so, right-click your desktop
    anywhere there is empty space and select **New ▸ Folder** (on Ubuntu, the option
    is **Create New Folder**; on Mac OS X, it''s **New Folder**). In the dialog, enter
    *stickman* for the folder name.


    ## CREATING THE GAME ELEMENTS


    Once you have your graphics program installed, you''re ready to draw. We''ll create
    these images for our game elements:


    - Images for a stick figure that can run left and right and jump

    - Images for the platform, in three different sizes

    - Images for the door: one open and one closed

    - An image for the game''s background (because a plain white or gray background
    makes for a boring game)


    Before we start drawing, we need to prepare our images with transparent backgrounds.


    ## PREPARING A TRANSPARENT IMAGE


    To set up an image with transparency—an alpha channel—start up GIMP, and then
    follow these steps:


    1. Select **File ▸ New**.

    2. In the dialog, enter 27 pixels for the image width and 30 pixels for its height.

    3. Select **Layer ▸ Transparency ▸ Add Alpha Channel**.

    4. Select **Select ▸ All**.

    5. Select **Edit ▸ Cut**.


    The end result should be an image filled with a checkerboard of dark gray and
    light gray, as shown here (zoomed in):


    ![](img/a7a5a123e26ba8cb8ef5b41ca45700be_250_0.png)


    Now we can begin creating our secret agent: Mr. Stick Man.


    ## DRAWING MR. STICK MAN


    To draw our first stick figure image, click the Paintbrush tool in the GIMP Toolbox,
    and then select the brush that looks like a small dot in the Brushes toolbar (usually
    at the bottom right of the screen), as shown on the right.


    ![](img/a7a5a123e26ba8cb8ef5b41ca45700be_250_1.png)


    We''ll draw three different images (or *frames*) for our stick figure to show
    him running and jumping to the right. We''ll use these frames to animate Mr. Stick
    Man, as we did for the animation in Chapter 12.


    If you zoom in to look at these images, they might look like this:


    ![](img/a7a5a123e26ba8cb8ef5b41ca45700be_251_0.png)


    Your images don''t need to look exactly the same, but they should have the stick
    figure with three different positions of movement. Remember that each one is 27
    pixels wide by 30 pixels tall.


    ### MR. STICK MAN RUNNING TO THE RIGHT


    First, we''ll draw a sequence of frames for Mr. Stick Man running to the right.
    Create the first image as follows:


    1. Draw the first image (the leftmost image in the preceding illustration).

    2. Select **File ▸ Save As**.

    3. In the dialog, enter *figure-R1.gif* for the name. Then click the small plus
    (+) button labeled **Select File Type**.

    4. Select **GIF image** in the list that appears.

    5. Save the file to the *stickman* directory you created earlier (click **Browse
    for Other Folders** to find the correct directory).


    Follow the same steps to create a new 27 pixel by 30 pixel image, and then draw
    the next Mr. Stick Man image. Save this image as *figure-R2.gif*. Repeat the process
    for the final image, and save it as *figure-R3.gif*.


    ![](img/a7a5a123e26ba8cb8ef5b41ca45700be_251_1.png)


    ### MR. STICK MAN RUNNING TO THE LEFT


    Rather than re-creating our drawings for the stick figure moving to the left,
    we can use GIMP to flip our frames of Mr. Stick Man moving to the right.


    In GIMP, open each image in sequence, and then select **Tools ▸ Transform Tools
    ▸ Flip**. When you click the image, you should see it flip from side to side.
    Save the images as *figure-L1.gif*, *figure-L2.gif*, and *figure-L3.gif*.


    ![](img/a7a5a123e26ba8cb8ef5b41ca45700be_252_0.png)


    Now we''ve created six images for Mr. Stick Man, but we still need images for
    the platforms and the door for the exit.


    ## DRAWING THE PLATFORMS


    We''ll create three platforms in different sizes: 100 pixels wide by 10 pixels
    tall, 60 pixels wide by 10 pixels tall, and 30 pixels wide by 10 pixels tall.
    You can draw the platforms any way that you like, but make sure that their backgrounds
    are transparent, as with the stick figure images.


    ![](img/a7a5a123e26ba8cb8ef5b41ca45700be_252_1.png)


    Here''s what the three platform images might look like zoomed in:


    ![](img/a7a5a123e26ba8cb8ef5b41ca45700be_253_0.png)


    As with the stick figure images, save these in the *stickman* directory. Call
    the smallest platform *platform1.gif*, the middle-sized one *platform2.gif*, and
    the largest one *platform3.gif*.


    ## DRAWING THE DOOR


    The size of the door should be proportional to the size of Mr. Stick Man (27 pixels
    wide by 30 pixels tall), and we need two images: one for the closed door and another
    for the open door. The doors might look like this (again zoomed in):


    ![](img/a7a5a123e26ba8cb8ef5b41ca45700be_253_1.png)


    To create these images, follow these steps:


    1. Click the foreground color box (at the bottom of the GIMP Toolbox) to display
    the color chooser. Select the color you want for your door. On the right is an
    example with yellow selected.

    2. Choose the Bucket tool (shown selected in the Toolbox), and fill the screen
    with the color you chose.

    3. Change the foreground color to black.


    ![](img/a7a5a123e26ba8cb8ef5b41ca45700be_253_2.png)


    4. Choose either the Pencil or Paintbrush tool (to the right of the Bucket tool),
    and draw the black outline of the door and the doorknob.

    5. Save these in the *stickman* directory, and call them *door1.gif* and *door2.gif*.


    ## DRAWING THE BACKGROUND


    The final image we need to create is the background. We''ll make this image 100
    pixels wide by 100 pixels tall. It does not need a transparent background because
    we''ll fill it with a single color that will be the background "wallpaper" behind
    all the other elements of the game.


    To create the background, select **File ▸ New** and give the image''s size as
    100 pixels wide and 100 pixels tall. Choose a suitably evil color for the wallpaper
    of a villain''s lair. I chose a darker shade of pink.


    You can dress up your wallpaper with flowers, stripes, stars, and such—whatever
    you think looks suitable for the game. For example, if you want to add stars to
    the wallpaper, choose another color, select the Pencil tool, and draw your first
    star. Then use the Selection tool to select a box around the star, and copy and
    paste it around the image (select **Edit ▸ Copy**, and then **Edit ▸ Paste**).
    You should be able to drag the pasted image around the screen by clicking it.
    Here''s an example with some stars, and the Selection tool selected in the Toolbox:


    ![](img/a7a5a123e26ba8cb8ef5b41ca45700be_254_0.png)


    Once you''re happy with your drawing, save the image as *background.gif* in the
    *stickman* directory.


    ## TRANSPARENCY


    With our graphics created, you can get a better idea of why our images (other
    than the background) need transparency. What would happen if we placed Mr. Stick
    Man in front of our background wallpaper and he didn''t have a transparent background?
    Here''s the answer:


    ![](img/a7a5a123e26ba8cb8ef5b41ca45700be_255_0.png)


    The white background of Mr. Stick Man wipes out part of the wallpaper. But if
    we use our transparent image, we get this:


    ![](img/a7a5a123e26ba8cb8ef5b41ca45700be_255_1.png)


    Nothing in the background is obscured by the stick figure image, except for whatever
    he covers himself. That''s much more professional!'
  mdcn: '因为当一个图像在屏幕上移动时，经过或靠近另一个图像时，我们不希望一个图像的背景擦除掉另一个图像的一部分。例如，在这张图片中，背景中的棋盘格图案代表透明区域：


    ![](img/a7a5a123e26ba8cb8ef5b41ca45700be_248_0.png)


    因此，如果我们复制整个图像并将其粘贴到另一个图像的顶部，背景就不会擦除任何内容：


    ![](img/a7a5a123e26ba8cb8ef5b41ca45700be_248_1.png)


    GIMP (http://www.gimp.org/)，全称GNU图像处理程序，是一款适用于Linux、Mac OS X和Windows的免费图形程序，支持透明图像。请按以下步骤下载并安装：


    - 如果你使用的是Windows，可以在GIMP-WIN项目页面 http://gimp-win.sourceforge.net/stable.html 找到Windows安装程序。

    - 如果你使用的是Ubuntu，可以通过打开Ubuntu软件中心并在搜索框中输入 *gimp* 来安装GIMP。当GIMP图像编辑器出现在结果中时，点击安装按钮。

    - 如果你使用的是Mac OS X，可以从 http://gimp.lisanet.de/Website/Download.html 下载应用程序包。


    你还应该为你的游戏创建一个目录。为此，请在桌面上任意空白处右键单击，然后选择 **新建 ▸ 文件夹**（在Ubuntu上，该选项是 **创建新文件夹**；在Mac
    OS X上，是 **新建文件夹**）。在对话框中，输入 *stickman* 作为文件夹名称。


    ## 创建游戏元素


    安装好图形程序后，你就可以开始绘制了。我们将为游戏元素创建这些图像：


    - 一个可以左右奔跑和跳跃的火柴人图像

    - 平台图像，三种不同尺寸

    - 门的图像：一扇开着的和一扇关着的

    - 游戏背景图像（因为纯白色或灰色的背景会让游戏变得无聊）


    在开始绘制之前，我们需要为图像准备透明背景。


    ## 准备透明图像


    要设置带有透明度（alpha通道）的图像，请启动GIMP，然后按照以下步骤操作：


    1. 选择 **文件 ▸ 新建**。

    2. 在对话框中，输入图像宽度为27像素，高度为30像素。

    3. 选择 **图层 ▸ 透明度 ▸ 添加Alpha通道**。

    4. 选择 **选择 ▸ 全选**。

    5. 选择 **编辑 ▸ 剪切**。


    最终结果应该是一个填充了深灰色和浅灰色棋盘格的图像，如下所示（放大后）：


    ![](img/a7a5a123e26ba8cb8ef5b41ca45700be_250_0.png)


    现在我们可以开始创建我们的特工：火柴人先生。


    ## 绘制火柴人先生


    要绘制我们的第一个火柴人图像，请点击GIMP工具箱中的画笔工具，然后在画笔工具栏（通常在屏幕右下角）中选择看起来像小点的画笔，如右侧所示。


    ![](img/a7a5a123e26ba8cb8ef5b41ca45700be_250_1.png)


    我们将为火柴人绘制三张不同的图像（或*帧*），以展示他向右奔跑和跳跃的动作。我们将使用这些帧来为火柴人先生制作动画，就像我们在第12章中为动画所做的那样。


    如果你放大查看这些图像，它们可能看起来像这样：


    ![](img/a7a5a123e26ba8cb8ef5b41ca45700be_251_0.png)


    你的图像不需要完全相同，但它们应该包含处于三个不同运动位置的火柴人。请记住，每个图像的尺寸是27像素宽，30像素高。


    ### 火柴人先生向右奔跑


    首先，我们将绘制一系列火柴人先生向右奔跑的帧。按如下方式创建第一张图像：


    1. 绘制第一张图像（上图中最左边的图像）。

    2. 选择 **文件 ▸ 另存为**。

    3. 在对话框中，输入 *figure-R1.gif* 作为文件名。然后点击标有 **选择文件类型** 的小加号（+）按钮。

    4. 在出现的列表中选择 **GIF图像**。

    5. 将文件保存到你之前创建的 *stickman* 目录（点击 **浏览其他文件夹** 以找到正确的目录）。


    按照相同的步骤创建一个新的27像素乘30像素的图像，然后绘制下一张火柴人先生的图像。将此图像保存为 *figure-R2.gif*。对最后一张图像重复此过程，并将其保存为
    *figure-R3.gif*。


    ![](img/a7a5a123e26ba8cb8ef5b41ca45700be_251_1.png)


    ### 火柴人先生向左奔跑


    我们不必重新绘制火柴人向左移动的图像，而是可以使用GIMP来翻转我们绘制的火柴人先生向右移动的帧。


    在GIMP中，依次打开每张图像，然后选择 **工具 ▸ 变换工具 ▸ 翻转**。当你点击图像时，你应该会看到它左右翻转。将这些图像保存为 *figure-L1.gif*、*figure-L2.gif*
    和 *figure-L3.gif*。


    ![](img/a7a5a123e26ba8cb8ef5b41ca45700be_252_0.png)


    现在我们已经为火柴人先生创建了六张图像，但我们仍然需要平台和出口门的图像。


    ## 绘制平台


    我们将创建三种不同尺寸的平台：100像素宽乘10像素高，60像素宽乘10像素高，以及30像素宽乘10像素高。你可以用任何你喜欢的方式绘制平台，但要确保它们的背景是透明的，就像火柴人图像一样。


    ![](img/a7a5a123e26ba8cb8ef5b41ca45700be_252_1.png)


    以下是三张平台图像放大后的样子：


    ![](img/a7a5a123e26ba8cb8ef5b41ca45700be_253_0.png)


    与火柴人图像一样，将这些保存在 *stickman* 目录中。将最小的平台命名为 *platform1.gif*，中等大小的命名为 *platform2.gif*，最大的命名为
    *platform3.gif*。


    ## 绘制门


    门的尺寸应与火柴人先生（27像素宽，30像素高）的尺寸成比例，我们需要两张图像：一张是关着的门，另一张是开着的门。门可能看起来像这样（再次放大后）：


    ![](img/a7a5a123e26ba8cb8ef5b41ca45700be_253_1.png)


    要创建这些图像，请按照以下步骤操作：


    1. 点击前景色框（在GIMP工具箱底部）以显示颜色选择器。选择你想要的门的颜色。右侧是一个选择黄色的示例。

    2. 选择油漆桶工具（在工具箱中显示为选中状态），并用你选择的颜色填充屏幕。

    3. 将前景色更改为黑色。


    ![](img/a7a5a123e26ba8cb8ef5b41ca45700be_253_2.png)


    4. 选择铅笔或画笔工具（在油漆桶工具的右侧），绘制门的黑色轮廓和门把手。

    5. 将这些保存在 *stickman* 目录中，并命名为 *door1.gif* 和 *door2.gif*。


    ## 绘制背景


    我们需要创建的最后一张图像是背景。我们将制作一张100像素宽、100像素高的图像。它不需要透明背景，因为我们将用单一颜色填充它，作为游戏所有其他元素背后的背景“壁纸”。


    要创建背景，请选择 **文件 ▸ 新建**，并将图像尺寸设置为100像素宽、100像素高。为反派巢穴的壁纸选择一个合适的邪恶颜色。我选择了一种较深的粉红色。


    你可以用花朵、条纹、星星等装饰你的壁纸——任何你认为适合游戏的东西。例如，如果你想在壁纸上添加星星，请选择另一种颜色，选择铅笔工具，绘制你的第一颗星星。然后使用选择工具在星星周围选择一个框，并将其复制粘贴到图像周围（选择
    **编辑 ▸ 复制**，然后 **编辑 ▸ 粘贴**）。你应该能够通过点击来拖动粘贴的图像在屏幕上移动。这是一个带有星星的示例，工具箱中选择了选择工具：


    ![](img/a7a5a123e26ba8cb8ef5b41ca45700be_254_0.png)


    一旦你对绘图感到满意，请将图像保存为 *stickman* 目录中的 *background.gif*。


    ## 透明度


    创建好图形后，你可以更好地理解为什么我们的图像（除了背景）需要透明度。如果我们将火柴人先生放在我们的背景壁纸前面，而他没有透明背景，会发生什么？答案如下：


    ![](img/a7a5a123e26ba8cb8ef5b41ca45700be_255_0.png)


    火柴人先生的白色背景擦除了壁纸的一部分。但如果我们使用透明图像，我们会得到这个：


    ![](img/a7a5a123e26ba8cb8ef5b41ca45700be_255_1.png)


    除了他自己覆盖的部分，背景中的任何东西都没有被火柴人图像遮挡。这专业多了！'
