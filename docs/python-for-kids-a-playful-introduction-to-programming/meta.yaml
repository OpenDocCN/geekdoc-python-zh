    \ 动画门\n\n在第15章，我们为门创建了两张图片：一张是打开的，一张是关闭的。当火柴人先生到达门口时，门的图片应切换为打开的门，火柴人先生应消失，然后门的图片应恢复为关闭的门。这将营造出火柴人先生离开并关门的错觉。你可以通过修改\
