    \ using their parent classes as well:\n\n```\n>>> class Animals(Animate):\n  \
    \      pass\n\n>>> class Mammals(Animals):\n        pass\n\n>>> class Giraffes(Mammals):\n\
    \        pass\n```\n\n# ADDING OBJECTS TO CLASSES\n\nWe now have a bunch of classes,\
    \ but what about putting some things into those classes? Say we have a giraffe\
    \ named Reginald. We know that he belongs in the class Giraffes, but what do we\
    \ use, in programming terms, to describe single giraffe called Reginald? We call\
    \ Reginald an *object* of the class Giraffes (you may also see the term *instance*\
    \ of the class). To “introduce” Reginald to Python, we use this little snippet\
    \ of code:\n\n```\n>>> reginald = Giraffes()\n```\n\nThis code tells Python to\
