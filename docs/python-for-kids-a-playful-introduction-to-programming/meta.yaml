    ![](img/a7a5a123e26ba8cb8ef5b41ca45700be_253_0.png)


    As with the stick figure images, save these in the *stickman* directory. Call
    the smallest platform *platform1.gif*, the middle-sized one *platform2.gif*, and
    the largest one *platform3.gif*.


    # DRAWING THE DOOR


    The size of the door should be proportional to the size of Mr. Stick Man (27 pixels
    wide by 30 pixels tall), and we need two images: one for the closed door and another
    for the open door. The doors might look like this (again zoomed in):


    ![](img/a7a5a123e26ba8cb8ef5b41ca45700be_253_1.png)


    To create these images, follow these steps:


    +   1. Click the foreground color box (at the bottom of the GIMP Toolbox) to display
    the color chooser. Select the color you want for your door. On the right is an
    example with yellow selected.

    2. Choose the Bucket tool (shown selected in the Toolbox), and fill the screen
    with the color you chose.

    3. Change the foreground color to black.


    ![](img/a7a5a123e26ba8cb8ef5b41ca45700be_253_2.png)'
  - '[PAGE 254]


    +   4. Choose either the Pencil or Paintbrush tool (to the right of the Bucket
    tool), and draw the black outline of the door and the doorknob.

    5. Save these in the *stickman* directory, and call them *door1.gif* and *door2.gif*.


    # DRAWING THE BACKGROUND


    The final image we need to create is the background. We''ll make this image 100
    pixels wide by 100 pixels tall. It does not need a transparent background because
    we''ll fill it with a single color that will be the background "wallpaper" behind
    all the other elements of the game.


    To create the background, select **File ▶ New** and give the image''s size as
    100 pixels wide and 100 pixels tall. Choose a suitably evil color for the wallpaper
    of a villain''s lair. I chose a darker shade of pink.


    You can dress up your wallpaper with flowers, stripes, stars, and such—whatever
    you think looks suitable for the game. For example, if you want to add stars to
    the wallpaper, choose another color, select the Pencil tool, and draw your first
    star. Then use the Selection tool to select a box around the star, and copy and
    paste it around the image (select **Edit ▶ Copy**, and then **Edit ▶ Paste**).
    You should be able to drag the pasted image around the screen by clicking it.
    Here''s an example with some stars, and the Selection tool selected in the Toolbox:


    ![](img/a7a5a123e26ba8cb8ef5b41ca45700be_254_0.png)'
  - '[PAGE 255]


    Once you''re happy with your drawing, save the image as *background.gif* in the
    *stickman* directory.


    # TRANSPARENCY


    With our graphics created, you can get a better of idea of why our images (other
    than the background) need transparency. What would happen if we placed Mr. Stick
    Man in front of our background wallpaper and he didn''t have a transparent background?
    Here''s the answer:


    ![](img/a7a5a123e26ba8cb8ef5b41ca45700be_255_0.png)


    The white background of Mr. Stick Man wipes out part of the wallpaper. But if
    we use our transparent image, we get this:


    ![](img/a7a5a123e26ba8cb8ef5b41ca45700be_255_1.png)


    Nothing in the background is obscured by the stick figure image, except for whatever
    he covers himself. That''s much more professional!'
- md: "## WHAT YOU LEARNED\n\nIn this chapter, you learned how to write a basic plan\
    \ for a game (Mr. Stick Man Races for the Exit in this case) and figured out where\
    \ to begin. Because we need graphical elements before we can make a game, we used\
    \ a graphics program to create the basic graphics for our game. In the process,\
    \ you learned how to make the backgrounds of these images transparent so they\
    \ don't cover up other images on the screen.\n\nIn the next chapter, we'll create\
    \ some of the classes for our game.\n\n![](img/a7a5a123e26ba8cb8ef5b41ca45700be_256_0.png)\n\
    \n# 16 DEVELOPING THE MR. STICK MAN GAME\n\nNow that we've created the images\
    \ for our Mr. Stick Man Races for the Exit game, we can begin to develop the code.\
    \ The description of the game in the previous chapter gives us a basic idea of\
    \ what we need: a stick figure that can run and jump, and platforms that he must\
    \ jump to.\n\nWe'll need code to display the stick figure and move it across the\
    \ screen, as well as to draw platforms. But before we write that code, we need\
    \ to create the canvas to display our background image.\n\n## CREATING THE GAME\
    \ CLASS\n\nFirst, we'll create a class called Game, which will be our program's\
    \ main controller. The Game class will have an __init__ function for initializing\
    \ the game and a mainloop function for doing the animation.\n\n## SETTING THE\
    \ WINDOW TITLE AND CREATING THE CANVAS\n\nIn the first part of the __init__ function,\
    \ we'll set the window title and create the canvas. As you'll see, this part of\
    \ the code is similar to the code that we wrote for the Bounce! game in Chapter\
    \ 13. Open your editor and enter the following code, and then save your file as\
    \ stickmangame.py. Make sure you save it in the directory we created in Chapter\
    \ 15 (called stickman).\n\n```\nfrom tkinter import *\nimport random\nimport time\n\
    \nclass Game:\n    def __init__(self):\n        self.tk = Tk()\n        self.tk.title(\"\
    Mr. Stick Man Races for the Exit\")\n        self.tk.resizable(0, 0)\n       \
    \ self.tk.wm_attributes(\"-topmost\", 1)\n        self.canvas = Canvas(self.tk,\
    \ width=500, height=500, \\n                            highlightthickness=0)\n\
    \        self.canvas.pack()\n        self.tk.update()\n        self.canvas_height\
    \ = 500\n        self.canvas_width = 500\n```\n\nIn the first half of this program\
    \ (from `from tkinter import *` to `self.tk.wm_attributes`), we create the tk\
    \ object and then set the window title with `self.tk.title` to (\"Mr. Stick Man\
    \ Races for the Exit\"). We make the window fixed (so it can't be resized) by\
    \ calling the resizable function, and then we move the window in front of all\
    \ other windows with the wm_attributes function.\n\nNext, we create the canvas\
    \ with the `self.canvas = Canvas` line, and call the pack and update functions\
    \ of the tk object. Finally, we create two variables for our Game class, height\
    \ and width, to store the height and width of the canvas.\n\nThe backslash (\\\
    ) in the `self.canvas = Canvas` line is used only to separate the long line of\
    \ code. It's not required, but I've included it here for readability since the\
    \ entire line won't fit on the page.\n\n## FINISHING THE __INIT__ FUNCTION\n\n\
    Now enter the rest of the __init__ function into the stickfiguregame.py file that\
    \ you just created. This code will load the background image and then display\
    \ it on the canvas:\n\n```\nself.tk.update()\nself.canvas_height = 500\nself.canvas_width\
    \ = 500\nself.bg = PhotoImage(file=\"background.gif\")\nw = self.bg.width()\n\
    h = self.bg.height()\nfor x in range(0, 5):\n    for y in range(0, 5):\n     \
    \   self.canvas.create_image(x * w, y * h, \\n                               \
    \ image=self.bg, anchor='nw')\nself.sprites = []\nself.running = True\n```\n\n\
    At ❶, we create the variable bg, which contains a PhotoImage object—the background\
    \ image file called background.gif that we created in Chapter 15. Next, beginning\
    \ at ❷, we store the width and height of the image in the variables w and h. The\
    \ PhotoImage class functions width and height return the size of the image once\
    \ it has been loaded.\n\nNext come two loops inside this function. To understand\
    \ what they do, imagine that you have a small square rubber stamp, an ink pad,\
    \ and a large piece of paper. How are you going to fill the paper with colored\
    \ squares using the stamp? Well, you could just randomly cover the page with stamps\
    \ until it's filled. The result would be a mess, and it would take a while to\
    \ complete, but it would fill the page. Or you could start stamping down the page\
    \ in a column and then move back to the top and start stamping down the page in\
    \ the next column, as shown on the right.\n\n![](img/a7a5a123e26ba8cb8ef5b41ca45700be_260_0.png)\n\
    \nThe background image we created in the previous chapter is our stamp. We know\
    \ that the canvas is 500 pixels across and 500 pixels down, and that we created\
    \ a background image of 100 pixels square. This tells us that we need five columns\
    \ across and five rows down to fill the screen with images. We use the loop at\
    \ ③ to calculate the columns across, and the loop at ④ to calculate rows going\
    \ down.\n\nAt ⑤, we multiply the first loop variable x by the width of the image\
    \ (x * w) to determine how far across we're drawing, and then multiply the second\
    \ loop variable y by the height of the image (y * h) to calculate how far down\
    \ to draw. We use the create_image function of the canvas object (`self.canvas.create_image`)\
    \ to draw the image on the screen using those coordinates.\n\nFinally, beginning\
    \ with ⑥, we create the variables sprites, which holds an empty list, and running,\
    \ which contains the Boolean value True. We'll use these variables later in our\
    \ game code.\n\n## CREATING THE MAINLOOP FUNCTION\n\nWe'll use the mainloop function\
    \ in the Game class to animate our game. This function looks a lot like the main\
    \ loop (or animation loop) we created for the Bounce! game in Chapter 13. Here\
    \ it is:\n\n```\ndef mainloop(self):\n    while 1:\n        if self.running ==\
    \ True:\n            for sprite in self.sprites:\n                sprite.move()\n\
    \        self.tk.update_idletasks()\n        self.tk.update()\n        time.sleep(0.01)\n\
    ```\n\nAt ①, we create a while loop that will run until the game window is closed.\
    \ Next, at ②, we check to see if the variable running is equal to True. If it\
    \ is, we loop through any sprites in the list of sprites (`self.sprites`) at ③,\
    \ calling the function move for each one at ④. (Of course, we have yet to create\
    \ any sprites, so this code wouldn't do anything if you ran the program now, but\
    \ it will be useful later.)\n\nThe last three lines of the function, beginning\
    \ at 5, force the tk object to redraw the screen and sleep for a fraction of a\
    \ second, as we did with the Bounce! game in Chapter 13.\n\nSo that you can run\
    \ this code, add the following two lines (note that there's no indentation required\
    \ for these two lines) and save the file.\n\n![](img/a7a5a123e26ba8cb8ef5b41ca45700be_262_0.png)\n\
    \n```\ng = Game()\ng.mainloop()\n```\n\n> Be sure to add this code to the bottom\
    \ of your game file. Also, make sure that your images are in the same directory\
    \ as the Python file. If you created the stickman directory in Chapter 15 and\
    \ saved all your images there, the Python file for this game should be there as\
    \ well.\n\nThis code creates an object of the Game class and saves it as the variable\
    \ g. We then call the mainloop function on the new object to draw the screen.\n\
    \nOnce you've saved the program, run it in IDLE by choosing **Run ▸ Run Module**.\
    \ You will see a window appear with the background image filling the canvas.\n\
    \n![](img/a7a5a123e26ba8cb8ef5b41ca45700be_262_1.png)\n\nWe've added a nice background\
    \ for our game, and created an animation loop that will draw sprites for us (once\
    \ we've created them).\n\n## CREATING THE COORDS CLASS\n\nNow we'll create the\
    \ class that we'll use to specify the position of something on our game screen.\
    \ This class will store the top-left (x1 and y1) and bottom-right (x2 and y2)\
    \ coordinates of any component of our game.\n\nHere's how you might record the\
    \ position of the stick figure image using these coordinates:\n\n![](img/a7a5a123e26ba8cb8ef5b41ca45700be_263_0.png)\n\
    \nWe'll call our new class Coords, and it will contain only an __init__ function,\
    \ where we pass the four parameters (x1, y1, x2, and y2). Here's the code to add\
    \ (put it at the beginning of the stickmangame.py file):\n\n```\nclass Coords:\n\
    \    def __init__(self, x1=0, y1=0, x2=0, y2=0):\n        self.x1 = x1\n     \
    \   self.y1 = y1\n        self.x2 = x2\n        self.y2 = y2\n```\n\nNotice that\
    \ each parameter is saved as an object variable of the same name (x1, y1, x2,\
    \ and y2). We'll be using objects of this class shortly."
  mdcn: "## 你学到了什么\n\n在本章中，你学习了如何为游戏（本例中是“火柴人冲出出口”）编写一个基本计划，并确定了从何处着手。由于在制作游戏之前我们需要图形元素，因此我们使用图形程序为游戏创建了基本图形。在此过程中，你学会了如何使这些图像的背景透明，这样它们就不会遮挡屏幕上的其他图像。\n\
    \n在下一章中，我们将为游戏创建一些类。\n\n![](img/a7a5a123e26ba8cb8ef5b41ca45700be_256_0.png)\n\n\
    # 16 开发火柴人游戏\n\n既然我们已经为“火柴人冲出出口”游戏创建了图像，我们就可以开始开发代码了。上一章对游戏的描述让我们对所需内容有了基本概念：一个可以奔跑和跳跃的火柴人，以及他必须跳上去的平台。\n\
    \n我们需要代码来显示火柴人并使其在屏幕上移动，以及绘制平台。但在编写这些代码之前，我们需要创建画布来显示背景图像。\n\n## 创建游戏类\n\n首先，我们将创建一个名为\
    \ `Game` 的类，它将作为我们程序的主控制器。`Game` 类将有一个用于初始化游戏的 `__init__` 函数和一个用于执行动画的 `mainloop`\
    \ 函数。\n\n## 设置窗口标题并创建画布\n\n在 `__init__ 函数的第一部分，我们将设置窗口标题并创建画布。你会看到，这部分代码与我们在第13章为“弹球”游戏编写的代码类似。打开你的编辑器，输入以下代码，然后将文件保存为\
    \ `stickmangame.py`。确保将其保存在我们在第15章创建的目录（名为 `stickman`）中。\n\n```\nfrom tkinter\
    \ import *\nimport random\nimport time\n\nclass Game:\n    def __init__(self):\n\
    \        self.tk = Tk()\n        self.tk.title(\"Mr. Stick Man Races for the Exit\"\
    )\n        self.tk.resizable(0, 0)\n        self.tk.wm_attributes(\"-topmost\"\
    , 1)\n        self.canvas = Canvas(self.tk, width=500, height=500, \\n       \
    \                     highlightthickness=0)\n        self.canvas.pack()\n    \
    \    self.tk.update()\n        self.canvas_height = 500\n        self.canvas_width\
    \ = 500\n```\n\n在这个程序的前半部分（从 `from tkinter import *` 到 `self.tk.wm_attributes`），我们创建了\
    \ `tk` 对象，然后使用 `self.tk.title` 将窗口标题设置为（“Mr. Stick Man Races for the Exit”）。我们通过调用\
    \ `resizable` 函数使窗口固定（这样就不能调整大小），然后使用 `wm_attributes` 函数将窗口移动到所有其他窗口的前面。\n\n接下来，我们使用\
    \ `self.canvas = Canvas` 这一行创建画布，并调用 `tk` 对象的 `pack` 和 `update` 函数。最后，我们为 `Game`\
    \ 类创建了两个变量 `height` 和 `width`，用于存储画布的高度和宽度。\n\n`self.canvas = Canvas` 这一行中的反斜杠（\\\
    ）仅用于分隔长行代码。它不是必需的，但为了可读性我将其包含在此，因为整行代码无法在页面上完全显示。\n\n## 完成 __init__ 函数\n\n现在，将\
    \ `__init__` 函数的其余部分输入到你刚刚创建的 `stickfiguregame.py` 文件中。这段代码将加载背景图像并将其显示在画布上：\n\
    \n```\nself.tk.update()\nself.canvas_height = 500\nself.canvas_width = 500\nself.bg\
    \ = PhotoImage(file=\"background.gif\")\nw = self.bg.width()\nh = self.bg.height()\n\
    for x in range(0, 5):\n    for y in range(0, 5):\n        self.canvas.create_image(x\
    \ * w, y * h, \\n                                image=self.bg, anchor='nw')\n\
    self.sprites = []\nself.running = True\n```\n\n在❶处，我们创建了变量 `bg`，它包含一个 `PhotoImage`\
    \ 对象——即我们在第15章创建的名为 `background.gif` 的背景图像文件。接下来，从❷开始，我们将图像的宽度和高度存储在变量 `w` 和 `h`\
    \ 中。`PhotoImage` 类的 `width` 和 `height` 函数在图像加载后返回其尺寸。\n\n接下来是这个函数内的两个循环。要理解它们的作用，想象一下你有一个小方形橡皮图章、一个印泥和一大张纸。你将如何用图章在纸上填满彩色方块？嗯，你可以随机地在纸上盖章直到填满。结果会是一团糟，而且需要一段时间才能完成，但它会填满纸张。或者，你可以开始沿着纸张的一列向下盖章，然后回到顶部，在下一列开始向下盖章，如右图所示。\n\
    \n![](img/a7a5a123e26ba8cb8ef5b41ca45700be_260_0.png)\n\n我们在上一章创建的背景图像就是我们的图章。我们知道画布宽500像素，高500像素，并且我们创建了一个100像素见方的背景图像。这告诉我们，我们需要五列和五行来用图像填满屏幕。我们使用③处的循环来计算列数，使用④处的循环来计算行数。\n\
    \n在⑤处，我们将第一个循环变量 `x` 乘以图像的宽度（`x * w`）来确定我们绘制的水平位置，然后将第二个循环变量 `y` 乘以图像的高度（`y *\
    \ h`）来计算绘制的垂直位置。我们使用画布对象的 `create_image` 函数（`self.canvas.create_image`）使用这些坐标在屏幕上绘制图像。\n\
    \n最后，从⑥开始，我们创建了变量 `sprites`，它持有一个空列表，以及 `running`，它包含布尔值 `True`。我们将在游戏代码中稍后使用这些变量。\n\
    \n## 创建 mainloop 函数\n\n我们将使用 `Game` 类中的 `mainloop` 函数来为游戏制作动画。这个函数看起来很像我们在第13章为“弹球”游戏创建的主循环（或动画循环）。代码如下：\n\
    \n```\ndef mainloop(self):\n    while 1:\n        if self.running == True:\n \
    \           for sprite in self.sprites:\n                sprite.move()\n     \
    \   self.tk.update_idletasks()\n        self.tk.update()\n        time.sleep(0.01)\n\
    ```\n\n在①处，我们创建了一个 `while` 循环，它将一直运行直到游戏窗口关闭。接下来，在②处，我们检查变量 `running` 是否等于 `True`。如果是，我们在③处遍历精灵列表（`self.sprites`）中的任何精灵，并在④处为每个精灵调用\
    \ `move` 函数。（当然，我们还没有创建任何精灵，所以如果你现在运行程序，这段代码不会做任何事情，但它以后会很有用。）\n\n函数的最后三行，从⑤开始，强制\
    \ `tk` 对象重绘屏幕并休眠一小段时间，就像我们在第13章的“弹球”游戏中所做的那样。\n\n为了让你能够运行这段代码，请添加以下两行（注意这两行不需要缩进）并保存文件。\n\
    \n![](img/a7a5a123e26ba8cb8ef5b41ca45700be_262_0.png)\n\n```\ng = Game()\ng.mainloop()\n\
    ```\n\n> 请务必将此代码添加到游戏文件的底部。同时，确保你的图像与 Python 文件位于同一目录中。如果你在第15章创建了 `stickman`\
    \ 目录并将所有图像保存在那里，那么这个游戏的 Python 文件也应该在那里。\n\n这段代码创建了一个 `Game` 类的对象，并将其保存为变量 `g`。然后我们调用新对象的\
    \ `mainloop` 函数来绘制屏幕。\n\n保存程序后，在 IDLE 中通过选择 **Run ▸ Run Module** 来运行它。你将看到一个窗口出现，背景图像填满了画布。\n\
    \n![](img/a7a5a123e26ba8cb8ef5b41ca45700be_262_1.png)\n\n我们为游戏添加了一个漂亮的背景，并创建了一个动画循环，它将为我们绘制精灵（一旦我们创建了它们）。\n\
    \n## 创建 Coords 类\n\n现在我们将创建一个类，用于指定游戏屏幕上某个物体的位置。这个类将存储我们游戏中任何组件的左上角（x1 和 y1）和右下角（x2\
    \ 和 y2）坐标。\n\n以下是你如何使用这些坐标记录火柴人图像位置的方法：\n\n![](img/a7a5a123e26ba8cb8ef5b41ca45700be_263_0.png)\n\
    \n我们将新类命名为 `Coords`，它只包含一个 `__init__` 函数，我们在其中传递四个参数（x1、y1、x2 和 y2）。以下是需要添加的代码（将其放在\
    \ `stickmangame.py` 文件的开头）：\n\n```\nclass Coords:\n    def __init__(self, x1=0,\
    \ y1=0, x2=0, y2=0):\n        self.x1 = x1\n        self.y1 = y1\n        self.x2\
    \ = x2\n        self.y2 = y2\n```\n\n请注意，每个参数都保存为同名的对象变量（x1、y1、x2 和 y2）。我们很快就会使用这个类的对象。"
