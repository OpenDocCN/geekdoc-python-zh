  - "[PAGE 192]\n\nThis is the first time we've used named parameters in any of our\
    \ code examples, so let's talk about them a bit before continuing with our drawing.\n\
    \n# USING NAMED PARAMETERS\n\nNamed parameters are just like normal parameters,\
    \ except that, rather than using the specific order of the values provided to\
    \ a function to determine which value belongs to which parameter (the first value\
    \ is the first parameter, the second value is the second parameter, the third\
    \ value is the third parameter, and so on), we explicitly name the values, so\
    \ they can appear in any order.\nSometimes functions have a lot of parameters,\
    \ and we may not always need to provide a value for every parameter. Named parameters\
    \ are a way we can provide values for only the parameters that we need to give\
    \ values.\nFor example, suppose we have a function called person that takes two\
    \ parameters: width and height.\n\n```\n>>> def person(width, height):\n    print('I\
    \ am %s feet wide, %s feet high' % (width, height))\n```\n\nNormally, we might\
    \ call this function like this:\n\n```\n>>> person(4, 3)\nI am 4 feet wide, 3\
    \ feet high\n```\n\nUsing named parameters, we could call this function and specify\
    \ the parameter name with each value:\n\n```\n>>> person(height=3, width=4)\n\
    I am 4 feet wide, 3 feet high\n```\n\nNamed parameters will become particularly\
    \ useful as we do more with the tkinter module.\n\n# CREATING A CANVAS FOR DRAWING\n\
    \nButtons are nice tools, but they're not particularly useful when we want to\
    \ draw things on the screen. When it's time to really draw something, we need\
    \ a different component: a canvas object, which is an object of the class Canvas\
    \ (provided by the tkinter module)."
  - '[PAGE 193]


    When creating a canvas, we pass the width and height (in pixels) of the canvas
    to Python. Otherwise, the code is similar to the button code. Here’s an example:


    ```

    >>> from tkinter import *

    >>> tk = Tk()

    >>> canvas = Canvas(tk, width=500, height=500)

    >>> canvas.pack()

    ```


    As with the button example, a window will appear when you enter `tk = Tk()`. On
    the last line, we pack the canvas with `canvas.pack()`, which changes the size
    of the canvas to a width of 500 pixels and a height of 500 pixels, as specified
    in the third line of code.


    Also as with the button example, the pack function tells the canvas to display
    itself in the correct position within the window. If that function isn’t called,
    nothing will display properly.


    ![](img/a7a5a123e26ba8cb8ef5b41ca45700be_193_0.png)


    # DRAWING LINES


    To draw a line on the canvas, we use pixel coordinates. *Coordinates* determine
    the positions of pixels on a surface. On a tkinter canvas, coordinates describe
    how far across the canvas (from left to right) and how far down the canvas (top
    to bottom) to place the pixel.


    For example, since our canvas is 500 pixels wide by 500 pixels high, the coordinates
    of the bottom-right corner of the screen are (500, 500). To draw the line shown
    in the following image, we would use the starting coordinates (0, 0) and ending
    coordinates (500, 500).'
  - '[PAGE 194]


    ![](img/a7a5a123e26ba8cb8ef5b41ca45700be_194_0.png)


    We specify the coordinates using the create_line function, as shown here:


    ```

    >>> from tkinter import *

    >>> tk = Tk()

    >>> canvas = Canvas(tk, width=500, height=500)

    >>> canvas.pack()

    >>> canvas.create_line(0, 0, 500, 500)

    1

    ```


    The create_line function returns 1, which is an identifier—we’ll learn more about
    that later. If we had done the same thing with the turtle module, we would have
    needed the following code:


    ```

    >>> import turtle

    >>> turtle.setup(width=500, height=500)

    >>> t = turtle.Pen()

    >>> t.up()

    >>> t.goto(-250, 250)

    >>> t.down()

    >>> t.goto(500, -500)

    ```'
  - '[PAGE 195]


    So the tkinter code is already an improvement. It''s slightly shorter and a bit
    simpler.

    Now let''s look at some of the functions available on the canvas object that we
    can use for some more interesting drawings.


    # DRAWING BOXES


    With the turtle module, we drew a box by moving forward, turning, moving forward,
    turning again, and so on. Eventually, we were able to draw a rectangular or square
    box by changing how far we moved forward.

    The tkinter module makes it a lot easier to draw a square or rectangle. All you
    need to know are the coordinates for the corners. Here''s an example (you can
    close the other windows now):


    ![](img/a7a5a123e26ba8cb8ef5b41ca45700be_195_0.png)


    ```

    >>> from tkinter import *

    >>> tk = Tk()

    >>> canvas = Canvas(tk, width=400, height=400)

    >>> canvas.pack()

    >>> canvas.create_rectangle(10, 10, 50, 50)

    ```


    In this code, we use tkinter to create a canvas that is 400 pixels wide by 400
    pixels high, and we then draw a square in the top-left corner of the window, like
    this:


    ![](img/a7a5a123e26ba8cb8ef5b41ca45700be_195_1.png)


    The parameters we pass to canvas.create_rectangle in the last line of the code
    are the coordinates for the top-left and bottom-right corners of the square. We
    provide these coordinates as the distance from the left-hand side of the canvas
    and the distance from the top of the canvas. In this case, the first two coordinates
    (the top-left'
  - '[PAGE 196]


    corner) are 10 pixels across from the left and 10 pixels down from the top (those
    are the first numbers: 10, 10). The bottom-right corner of the square is 50 pixels
    across from the left and 50 pixels down (the second numbers: 50, 50).


    We''ll refer to these two sets of coordinates as *x1*, *y1* and *x2*, *y2*. To
    draw a rectangle, we can increase the distance of the second corner from the side
    of the canvas (increasing the value of the *x2* parameter), like this:


    ```

    >>> from tkinter import *

    >>> tk = Tk()

    >>> canvas = Canvas(tk, width=400, height=400)

    >>> canvas.pack()

    >>> canvas.create_rectangle(10, 10, 300, 50)

    ```


    In this example, the top-left coordinates of the rectangle (its position on the
    screen) are (10, 10), and the bottom-right coordinates are (300, 50). The result
    is a rectangle that is the same height as our original square (50 pixels), but
    a lot wider.


    ![](img/a7a5a123e26ba8cb8ef5b41ca45700be_196_0.png)


    We can also draw a rectangle by increasing the distance of the second corner from
    the top of the canvas (increasing the value of the *y2* parameter), like this:


    ```

    >>> from tkinter import *

    >>> tk = Tk()

    >>> canvas = Canvas(tk, width=400, height=400)

    >>> canvas.pack()

    >>> canvas.create_rectangle(10, 10, 50, 300)

    ```


    In this call to the create_rectangle function, we are basically saying, in order:


    +   - Go 10 pixels across the canvas (from the top left).

    - Go 10 pixels down the canvas. This is the starting corner of the rectangle.'
  - '[PAGE 197]


    +   - Draw the rectangle across to 50 pixels.

    - Draw down to 300 pixels.


    The end result should look something like this:


    ![](img/a7a5a123e26ba8cb8ef5b41ca45700be_197_0.png)


    # DRAWING A LOT OF RECTANGLES


    How about filling the canvas with different-sized rectangles? We can do this by
    importing the module `random` and then creating a function that uses a random
    number for the coordinates at the top-left and bottom-right corners of the rectangle.


    We''ll use the function provided by the `random` module called `randrange`. When
    we give this function a number, it returns a random integer between 0 and the
    number we give it. For example, calling `randrange(10)` would return a number
    between 0 and 9, `randrange(100)` would return a number between 0 and 99, and
    so on.


    Here''s how we use `randrange` in a function. Create a new window by selecting
    **File ▶ New Window**, and enter the following code:


    ```

    from tkinter import *

    import random

    tk = Tk()

    canvas = Canvas(tk, width=400, height=400)

    canvas.pack()

    ```'
