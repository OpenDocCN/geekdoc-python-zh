    >>> print('%x' % 15)\nf\n```\n\n为了确保我们的数字至少有两位数，我们可以稍微修改格式占位符，改为这样：\n\n```\n>>>\
    \ print('%02x' % 15)\n0f\n```\n\n`tkinter` 模块提供了一种获取十六进制颜色值的简便方法。尝试将以下代码添加到 *colorrect.py*（你可以删除其他对\
