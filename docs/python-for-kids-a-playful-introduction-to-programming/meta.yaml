  md: '# CREATING A CLICKABLE BUTTON


    For our first example, we''ll use tkinter to create a basic application with a
    button. Enter this code:


    ```

    >>> from tkinter import *

    >>> tk = Tk()

    >>> btn = Button(tk, text="click me")

    >>> btn.pack()

    ```


    On the first line, we import the contents of the tkinter module. Using `from module-name
    import *` allows us to use the contents of a module without using its name. In
    contrast, when using `import turtle` in previous examples, we needed to include
    the module name to access its contents:


    ![](img/a7a5a123e26ba8cb8ef5b41ca45700be_190_0.png)


    ```

    import turtle

    t = turtle.Pen()

    ```


    When we use `import *`, we don''t need to call `turtle.Pen`, as we did in Chapters
    4 and 11. This isn''t so useful with the turtle module, but it is when you are
    using modules with a lot of classes and functions, because it reduces the amount
    you need to type.


    ```

    from turtle import *

    t = Pen()

    ```


    On the next line in our button example, we create a variable containing an object
    of the class Tk with `tk = Tk()`, just like we create a Pen object for the turtle.
    The tk object creates a basic window to which we can then add other things, such
    as buttons, input boxes, or a canvas to draw on. This is the main class provided
    by the tkinter module—without creating an object of the Tk class, you won''t be
    able to do any graphics or animations.


    On the third line, we create a button, with `btn = Button` and pass the tk variable
    as the first parameter, and "click me" as the text that the button will display,
    with `(tk, text="click me")`. Although we''ve added this button to the window,
    it won''t be displayed until you enter the line `btn.pack()`, which tells the
    button to'
  merge: -1
  pgno: 190
- img_proc: true
  md: "appear. It also lines everything up correctly on the screen, if there are other\
