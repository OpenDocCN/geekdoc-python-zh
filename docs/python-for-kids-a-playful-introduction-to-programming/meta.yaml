- md: "We use 359 degrees in the final circle, rather than 360, because tkinter considers\
    \ 360 to be the same as 0 degrees, and would draw nothing if we used 360.\n\n\
    ## DRAWING POLYGONS\n\nA polygon is any shape with three or more sides. There\
    \ are regularly shaped polygons like triangles, squares, rectangles, pentagons,\
    \ hexagons, and so on, as well as irregular ones with uneven edges, many more\
    \ sides, and odd shapes.\n\nWhen drawing polygons with tkinter, you need to provide\
    \ coordinates for each point of the polygon. Here's how we can draw a triangle:\n\
    \n```\nfrom tkinter import *\ntk = Tk()\ncanvas = Canvas(tk, width=400, height=400)\n\
    canvas.pack()\ncanvas.create_polygon(10, 10, 100, 10, 100, 110, fill=\"\", outline=\"\
    black\")\n```\n\nThis example draws a triangle by starting with the x and y coordinates\
    \ (10, 10), then moving across to (100, 10), and finishing at (100, 110). Here's\
    \ the result:\n\n![](img/a7a5a123e26ba8cb8ef5b41ca45700be_204_1.png)\n\nWe can\
    \ add another irregular polygon (a shape with uneven angles or sides) using this\
    \ code:\n\n```\ncanvas.create_polygon(200, 10, 240, 30, 120, 100, 140, 120, fill=\"\
    \", outline=\"black\")\n```\n\nThis code begins with the coordinates (200, 10),\
    \ moves to (240, 30), then to (120, 100), and finally to (100, 140). tkinter automatically\
    \ joins the line back to the first coordinate. And here’s the result of running\
    \ the code:\n\n![](img/a7a5a123e26ba8cb8ef5b41ca45700be_205_0.png)\n\n## DISPLAYING\
    \ TEXT\n\nIn addition to drawing shapes, you can also write on the canvas using\
    \ create_text. This function takes only two coordinates (the x and y positions\
    \ of the text), along with a named parameter for the text to display. In the following\
    \ code, we create our canvas as before and then display a sentence positioned\
    \ at the coordinates (150, 100). Save this code as *text.py*.\n\n```\nfrom tkinter\
    \ import *\ntk = Tk()\ncanvas = Canvas(tk, width=400, height=400)\ncanvas.pack()\n\
    canvas.create_text(150, 100, text='There once was a man from Toulouse,')\n```\n\
    \nThe create_text function takes some other useful parameters, such as a text\
    \ fill color. In the following code, we call the create_text function with coordinates\
    \ (130, 120), the text we want to display, and a red fill color.\n\n```\ncanvas.create_text(130,\
    \ 120, text='Who rode around on a moose.', fill='red')\n```\n\nYou can also specify\
    \ the font (the typeface used for the displayed text) as a tuple with the font\
    \ name and the size of the text. For example, the tuple for the Times font of\
    \ size 20 is ('Times', 20). In the following code, we display text using the Times\
    \ font set at size 15, the Helvetica font at size 20, and the Courier font at\
    \ sizes 22 and then 30.\n\n![](img/a7a5a123e26ba8cb8ef5b41ca45700be_206_0.png)\n\
    \n```\npython\ncanvas.create_text(150, 150, text='He said, \"It\\'s my curse,',\n\
    \    font=('Times', 15))\ncanvas.create_text(200, 200, text='But it could be worse,',\n\
    \    font=('Helvetica', 20))\ncanvas.create_text(220, 250, text='My cousin rides\
    \ round',\n    font=('Courier', 22))\ncanvas.create_text(220, 300, text='on a\
    \ goose.\"', font=('Courier', 30))\n```\n\nAnd here's the result of these functions\
    \ using the three specified fonts at five different sizes:\n\n![](img/a7a5a123e26ba8cb8ef5b41ca45700be_206_1.png)\n\
    \n## DISPLAYING IMAGES\n\nTo display an image on a canvas using tkinter, first\
    \ load the image and then use the create_image function on the canvas object.\n\
    Any image that you load must be in a directory that's accessible to Python. For\
    \ this example, we put our image *test.gif* in the C:\\ directory, which is the\
    \ root directory (the base directory) of the C: drive, but you could put it anywhere.\n\
    \n![](img/a7a5a123e26ba8cb8ef5b41ca45700be_207_0.png)\n\nIf you're using a Mac\
    \ or Linux system, you can put the image in your Home directory. If you aren't\
    \ able to put files on your C: drive, you can put the image on your desktop.\n\
    \n> **NOTE** With tkinter, you can load only GIF images, that is, image files\
    \ with the extension .gif. You can display other types of images, such as PNG\
    \ (.png) and JPG (.jpg), but you'll need to use a different module, such as the\
    \ Python Imaging Library (http://www.pythonware.com/products/pil/).\n\nWe can\
    \ display the *test.gif* image like this:\n\n```\npython\nfrom tkinter import\
    \ *\ntk = Tk()\ncanvas = Canvas(tk, width=400, height=400)\ncanvas.pack()\nmy_image\
    \ = PhotoImage(file='c:\\test.gif')\ncanvas.create_image(0, 0, anchor=NW, image=myimage)\n\
    ```\n\nIn the first four lines, we set up the canvas as with the previous examples.\
    \ In the fifth line, the image is loaded into the variable my_image. We create\
    \ PhotoImage with the directory 'c:\\test.gif'. If you saved your image to the\
    \ desktop, you should create the PhotoImage with that directory, something like\
    \ this:\n\n```\npython\nmy_image = PhotoImage(file='C:\\Users\\Joe Smith\\Desktop\\\
    test.gif')\n```\n\nOnce the image has been loaded into the variable, `canvas.create_image(0,\
    \ 0, anchor=NW, image=myimage)` displays it using the `create_image` function.\
    \ The coordinates (0, 0) are where the image will be displayed, and `anchor=NW`\
    \ tells the function to use the top-left (NW, for northwest) edge of the image\
    \ as the starting point when drawing (otherwise, it will use the center of the\
    \ image as the starting point by default). The final named parameter, `image`,\
    \ points at the variable for the loaded image. Here's the result:\n\n![](img/a7a5a123e26ba8cb8ef5b41ca45700be_208_0.png)\n\
    \n## CREATING BASIC ANIMATION\n\nWe've covered how to create static drawings—pictures\
    \ that don't move. What about creating animation?\n\nAnimation is not necessarily\
    \ a specialty of the tkinter module, but it can handle the basics. For example,\
    \ we can create a filled triangle and then make it move across the screen using\
    \ this code (don't forget, select **File ▸ New Window**, save your work, and then\
    \ run the code with **Run ▸ Run Module**):\n\n```\npython\nimport time\nfrom tkinter\
    \ import *\ntk = Tk()\ncanvas = Canvas(tk, width=400, height=200)\ncanvas.pack()\n\
    canvas.create_polygon(10, 10, 10, 60, 50, 35)\n```\n\n```\nfor x in range(0, 60):\n\
    \    canvas.move(1, 5, 0)\n    tk.update()\n    time.sleep(0.05)\n```\n\nWhen\
    \ you run this code, the triangle will start moving across the screen to the end\
    \ of its path:\n\n![](img/a7a5a123e26ba8cb8ef5b41ca45700be_209_0.png)\n\nHow does\
    \ this work? As before, we've used the first three lines after importing tkinter\
    \ to do the basic setup to display a canvas. In the fourth line, we create the\
    \ triangle with this function:\n\n```\ncanvas.create_polygon(10, 10, 10, 60, 50,\
    \ 35)\n```\n\n> **NOTE**\n\n*When you enter this line, a number will be printed\
    \ to the screen. This is an identifier for the polygon. We can use it to refer\
    \ to the shape later, as described in the following example.*\n\nNext, we create\
    \ a simple for loop to count from 0 to 59, beginning with `for x in range(0, 60):`.\
    \ The block of code inside the loop moves the triangle across the screen. The\
    \ `canvas.move` function will move any drawn object by adding values to its x\
    \ and y coordinates. For example, with `canvas.move(1, 5, 0)`, we move the object\
    \ with ID 1 (the identifier for the triangle) 5 pixels across and 0 pixels down.\
    \ To move it back again, we could use the function call `canvas.move(1, -5, 0)`.\n\
    \nThe function `tk.update()` forces tkinter to update the screen (redraw it).\
    \ If we didn't use update, tkinter would wait until the loop finished before moving\
    \ the triangle, which means you would see\n\n![](img/a7a5a123e26ba8cb8ef5b41ca45700be_209_1.png)\n\
    \nit jump to the last position, rather than move smoothly across the canvas. The\
    \ final line of the loop, time.sleep(0.05), tells Python to sleep for one-twentieth\
    \ of a second (0.05 seconds), before continuing.\n\nTo make the triangle move\
    \ diagonally down the screen, we can modify this code by calling move(1, 5, 5).\
    \ To try this, close the canvas, and create a new file (**File ▸ New Window**)\
    \ for the following code:\n\n```\nimport time\nfrom tkinter import *\ntk = Tk()\n\
    canvas = Canvas(tk, width=400, height=400)\ncanvas.pack()\ncanvas.create_polygon(10,\
    \ 10, 10, 60, 50, 35)\nfor x in range(0, 60):\n    canvas.move(1, 5, 5)\n    tk.update()\n\
    \    time.sleep(0.05)\n```\n\nThis code differs from the original in two ways:\n\
    \n- We make the height of the canvas 400, rather than 200, with canvas = Canvas(tk,\
    \ width=400, height=400).\n- We add 5 to the triangle's x and y coordinates with\
    \ canvas.move(1, 5, 5).\n\nOnce you save your code and run it, here's the triangle's\
    \ position at the end of the loop:\n\n![](img/a7a5a123e26ba8cb8ef5b41ca45700be_210_0.png)"
  mdcn: "我们在最终圆圈中使用359度，而不是360度，因为tkinter将360度视为与0度相同，如果使用360度将不会绘制任何内容。\n\n## 绘制多边形\n\
    \n多边形是指具有三条或更多边的任何形状。有规则形状的多边形，如三角形、正方形、矩形、五边形、六边形等，也有不规则的多边形，其边角不均匀、边数更多且形状奇特。\n\
    \n使用tkinter绘制多边形时，你需要提供多边形每个点的坐标。以下是我们如何绘制一个三角形的方法：\n\n```\nfrom tkinter import\
    \ *\ntk = Tk()\ncanvas = Canvas(tk, width=400, height=400)\ncanvas.pack()\ncanvas.create_polygon(10,\
    \ 10, 100, 10, 100, 110, fill=\"\", outline=\"black\")\n```\n\n这个示例通过从x和y坐标(10,\
    \ 10)开始，然后移动到(100, 10)，最后结束于(100, 110)来绘制一个三角形。结果如下：\n\n![](img/a7a5a123e26ba8cb8ef5b41ca45700be_204_1.png)\n\
    \n我们可以使用以下代码添加另一个不规则多边形（一个角度或边不均匀的形状）：\n\n```\ncanvas.create_polygon(200, 10,\
    \ 240, 30, 120, 100, 140, 120, fill=\"\", outline=\"black\")\n```\n\n这段代码从坐标(200,\
    \ 10)开始，移动到(240, 30)，然后到(120, 100)，最后到(100, 140)。tkinter会自动将线条连接回第一个坐标。运行代码的结果如下：\n\
    \n![](img/a7a5a123e26ba8cb8ef5b41ca45700be_205_0.png)\n\n## 显示文本\n\n除了绘制形状，你还可以使用create_text在画布上书写。此函数仅接受两个坐标（文本的x和y位置），以及一个用于显示文本的命名参数。在以下代码中，我们像之前一样创建画布，然后在坐标(150,\
    \ 100)处显示一个句子。将此代码保存为*text.py*。\n\n```\nfrom tkinter import *\ntk = Tk()\ncanvas\
    \ = Canvas(tk, width=400, height=400)\ncanvas.pack()\ncanvas.create_text(150,\
    \ 100, text='There once was a man from Toulouse,')\n```\n\ncreate_text函数还接受其他一些有用的参数，例如文本填充颜色。在以下代码中，我们使用坐标(130,\
    \ 120)、要显示的文本和红色填充颜色来调用create_text函数。\n\n```\ncanvas.create_text(130, 120, text='Who\
    \ rode around on a moose.', fill='red')\n```\n\n你还可以将字体（用于显示文本的字体）指定为一个包含字体名称和文本大小的元组。例如，大小为20的Times字体的元组是('Times',\
    \ 20)。在以下代码中，我们使用大小为15的Times字体、大小为20的Helvetica字体以及大小为22和30的Courier字体来显示文本。\n\n\
    ![](img/a7a5a123e26ba8cb8ef5b41ca45700be_206_0.png)\n\n```\npython\ncanvas.create_text(150,\
    \ 150, text='He said, \"It\\'s my curse,',\n    font=('Times', 15))\ncanvas.create_text(200,\
    \ 200, text='But it could be worse,',\n    font=('Helvetica', 20))\ncanvas.create_text(220,\
    \ 250, text='My cousin rides round',\n    font=('Courier', 22))\ncanvas.create_text(220,\
    \ 300, text='on a goose.\"', font=('Courier', 30))\n```\n\n以下是使用三种指定字体和五种不同大小的这些函数的结果：\n\
    \n![](img/a7a5a123e26ba8cb8ef5b41ca45700be_206_1.png)\n\n## 显示图像\n\n要使用tkinter在画布上显示图像，首先加载图像，然后在画布对象上使用create_image函数。\n\
    你加载的任何图像都必须位于Python可访问的目录中。在此示例中，我们将图像*test.gif*放在C:\\目录中，这是C:驱动器的根目录（基础目录），但你也可以将其放在任何位置。\n\
    \n![](img/a7a5a123e26ba8cb8ef5b41ca45700be_207_0.png)\n\n如果你使用的是Mac或Linux系统，可以将图像放在你的主目录中。如果你无法将文件放在C:驱动器上，可以将图像放在桌面上。\n\
    \n> **注意** 使用tkinter，你只能加载GIF图像，即扩展名为.gif的图像文件。你可以显示其他类型的图像，如PNG (.png) 和 JPG\
    \ (.jpg)，但你需要使用不同的模块，例如Python Imaging Library (http://www.pythonware.com/products/pil/)。\n\
    \n我们可以这样显示*test.gif*图像：\n\n```\npython\nfrom tkinter import *\ntk = Tk()\ncanvas\
    \ = Canvas(tk, width=400, height=400)\ncanvas.pack()\nmy_image = PhotoImage(file='c:\\\
    test.gif')\ncanvas.create_image(0, 0, anchor=NW, image=myimage)\n```\n\n在前四行中，我们像之前的示例一样设置画布。在第五行，图像被加载到变量my_image中。我们使用目录'c:\\\
    test.gif'创建PhotoImage。如果你将图像保存到桌面，你应该使用该目录创建PhotoImage，如下所示：\n\n```\npython\n\
    my_image = PhotoImage(file='C:\\Users\\Joe Smith\\Desktop\\test.gif')\n```\n\n\
    一旦图像被加载到变量中，`canvas.create_image(0, 0, anchor=NW, image=myimage)`就会使用`create_image`函数显示它。坐标(0,\
    \ 0)是图像将被显示的位置，`anchor=NW`告诉函数在绘制时使用图像的左上角（NW，西北）作为起点（否则，默认使用图像的中心作为起点）。最后一个命名参数`image`指向已加载图像的变量。结果如下：\n\
    \n![](img/a7a5a123e26ba8cb8ef5b41ca45700be_208_0.png)\n\n## 创建基本动画\n\n我们已经介绍了如何创建静态绘图——不会移动的图片。那么创建动画呢？\n\
    \n动画不一定是tkinter模块的专长，但它可以处理基础动画。例如，我们可以创建一个填充的三角形，然后使用以下代码使其在屏幕上移动（别忘了，选择**文件\
    \ ▸ 新建窗口**，保存你的工作，然后使用**运行 ▸ 运行模块**运行代码）：\n\n```\npython\nimport time\nfrom tkinter\
    \ import *\ntk = Tk()\ncanvas = Canvas(tk, width=400, height=200)\ncanvas.pack()\n\
    canvas.create_polygon(10, 10, 10, 60, 50, 35)\n```\n\n```\nfor x in range(0, 60):\n\
    \    canvas.move(1, 5, 0)\n    tk.update()\n    time.sleep(0.05)\n```\n\n当你运行此代码时，三角形将开始在屏幕上移动，直到路径结束：\n\
    \n![](img/a7a5a123e26ba8cb8ef5b41ca45700be_209_0.png)\n\n这是如何工作的？和之前一样，我们在导入tkinter后使用前三行进行基本设置以显示画布。在第四行，我们使用此函数创建三角形：\n\
    \n```\ncanvas.create_polygon(10, 10, 10, 60, 50, 35)\n```\n\n> **注意**\n\n*当你输入这一行时，屏幕上会打印一个数字。这是多边形的标识符。我们可以在后面的示例中使用它来引用该形状。*\n\
    \n接下来，我们创建一个简单的for循环，从0计数到59，以`for x in range(0, 60):`开始。循环内的代码块将三角形在屏幕上移动。`canvas.move`函数通过向其x和y坐标添加值来移动任何绘制的对象。例如，使用`canvas.move(1,\
    \ 5, 0)`，我们将ID为1（三角形的标识符）的对象向右移动5像素，向下移动0像素。要将其移回，我们可以使用函数调用`canvas.move(1, -5,\
    \ 0)`。\n\n函数`tk.update()`强制tkinter更新屏幕（重绘它）。如果我们不使用update，tkinter会等到循环结束才移动三角形，这意味着你会看到\n\
    \n![](img/a7a5a123e26ba8cb8ef5b41ca45700be_209_1.png)\n\n它跳到最后的位置，而不是在画布上平滑移动。循环的最后一行`time.sleep(0.05)`告诉Python在继续之前休眠二十分之一秒（0.05秒）。\n\
    \n要使三角形沿屏幕对角线向下移动，我们可以通过调用`move(1, 5, 5)`来修改此代码。要尝试此操作，请关闭画布，并为以下代码创建一个新文件（**文件\
    \ ▸ 新建窗口**）：\n\n```\nimport time\nfrom tkinter import *\ntk = Tk()\ncanvas = Canvas(tk,\
    \ width=400, height=400)\ncanvas.pack()\ncanvas.create_polygon(10, 10, 10, 60,\
    \ 50, 35)\nfor x in range(0, 60):\n    canvas.move(1, 5, 5)\n    tk.update()\n\
    \    time.sleep(0.05)\n```\n\n此代码与原始代码在两个方面有所不同：\n\n- 我们使用`canvas = Canvas(tk,\
    \ width=400, height=400)`将画布的高度设置为400，而不是200。\n- 我们使用`canvas.move(1, 5, 5)`将三角形的x和y坐标各增加5。\n\
    \n一旦你保存代码并运行它，以下是循环结束时三角形的位置：\n\n![](img/a7a5a123e26ba8cb8ef5b41ca45700be_210_0.png)"
