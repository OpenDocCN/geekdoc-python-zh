- img_proc: true
  md: '# MR. STICK MAN RUNNING TO THE LEFT


    Rather than re-creating our drawings for the stick figure moving to the left,
    we can use GIMP to flip our frames of Mr. Stick Man moving to the right.


    In GIMP, open each image in sequence, and then select **Tools ▸ Transform Tools
    ▸ Flip**. When you click the image, you should see it flip from side to side.
    Save the images as *figure-L1.gif*, *figure-L2.gif*, and *figure-L3.gif*.


    ![](img/a7a5a123e26ba8cb8ef5b41ca45700be_252_0.png)


    Now we''ve created six images for Mr. Stick Man, but we still need images for
    the platforms and the door for the exit.


    # DRAWING THE PLATFORMS


    We''ll create three platforms in different sizes: 100 pixels wide by 10 pixels
    tall, 60 pixels wide by 10 pixels tall, and 30 pixels wide by 10 pixels tall.
    You can draw the platforms any way that you like, but make sure that their backgrounds
    are transparent, as with the stick figure images.


    ![](img/a7a5a123e26ba8cb8ef5b41ca45700be_252_1.png)'
  merge: -1
  pgno: 252
- img_proc: true
  md: 'Here''s what the three platform images might look like zoomed in:


    ![](img/a7a5a123e26ba8cb8ef5b41ca45700be_253_0.png)


    As with the stick figure images, save these in the *stickman* directory. Call
    the smallest platform *platform1.gif*, the middle-sized one *platform2.gif*, and
    the largest one *platform3.gif*.


    # DRAWING THE DOOR


    The size of the door should be proportional to the size of Mr. Stick Man (27 pixels
    wide by 30 pixels tall), and we need two images: one for the closed door and another
    for the open door. The doors might look like this (again zoomed in):


    ![](img/a7a5a123e26ba8cb8ef5b41ca45700be_253_1.png)


    To create these images, follow these steps:


    +   1. Click the foreground color box (at the bottom of the GIMP Toolbox) to display
    the color chooser. Select the color you want for your door. On the right is an
    example with yellow selected.

    2. Choose the Bucket tool (shown selected in the Toolbox), and fill the screen
    with the color you chose.

    3. Change the foreground color to black.


    ![](img/a7a5a123e26ba8cb8ef5b41ca45700be_253_2.png)'
  merge: -1
  pgno: 253
- img_proc: true
  md: '+   4. Choose either the Pencil or Paintbrush tool (to the right of the Bucket
    tool), and draw the black outline of the door and the doorknob.

    5. Save these in the *stickman* directory, and call them *door1.gif* and *door2.gif*.


    # DRAWING THE BACKGROUND


    The final image we need to create is the background. We''ll make this image 100
    pixels wide by 100 pixels tall. It does not need a transparent background because
    we''ll fill it with a single color that will be the background "wallpaper" behind
    all the other elements of the game.


    To create the background, select **File ▶ New** and give the image''s size as
    100 pixels wide and 100 pixels tall. Choose a suitably evil color for the wallpaper
    of a villain''s lair. I chose a darker shade of pink.


    You can dress up your wallpaper with flowers, stripes, stars, and such—whatever
    you think looks suitable for the game. For example, if you want to add stars to
    the wallpaper, choose another color, select the Pencil tool, and draw your first
    star. Then use the Selection tool to select a box around the star, and copy and
    paste it around the image (select **Edit ▶ Copy**, and then **Edit ▶ Paste**).
    You should be able to drag the pasted image around the screen by clicking it.
    Here''s an example with some stars, and the Selection tool selected in the Toolbox:


    ![](img/a7a5a123e26ba8cb8ef5b41ca45700be_254_0.png)'
  merge: -1
  pgno: 254
- img_proc: true
  md: 'Once you''re happy with your drawing, save the image as *background.gif* in
    the *stickman* directory.


    # TRANSPARENCY


    With our graphics created, you can get a better of idea of why our images (other
    than the background) need transparency. What would happen if we placed Mr. Stick
    Man in front of our background wallpaper and he didn''t have a transparent background?
    Here''s the answer:


    ![](img/a7a5a123e26ba8cb8ef5b41ca45700be_255_0.png)


    The white background of Mr. Stick Man wipes out part of the wallpaper. But if
    we use our transparent image, we get this:


    ![](img/a7a5a123e26ba8cb8ef5b41ca45700be_255_1.png)


    Nothing in the background is obscured by the stick figure image, except for whatever
    he covers himself. That''s much more professional!'
