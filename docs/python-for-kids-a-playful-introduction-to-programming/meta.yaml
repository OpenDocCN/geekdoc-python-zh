  md: "We can use classes to organize bits of Python code. For example, consider the\
    \ turtle module. All the things that Python’s turtle module can do—such as moving\
    \ forward, moving backward, turning left, and turning right—are functions in the\
    \ Pen class. An object can be thought of as a member of a class, and we can create\
    \ any number of objects for a class—which we will get to shortly.\n\nNow let’s\
    \ create the same set of classes as shown in our tree diagram, starting from the\
    \ top. We define classes using the class keyword followed by a name. Since Things\
    \ is the broadest class, we’ll create it first:\n\n```\n>>> class Things:\n  \
    \  pass\n```\n\nWe name the class Things and use the pass statement to let Python\
    \ know that we’re not going to give any more information. pass is used when we\
    \ want to provide a class or function but don’t want to fill in the details at\
    \ the moment.\n\nNext, we’ll add the other classes and build some relationships\
    \ between them.\n\n# CHILDREN AND PARENTS\n\nIf a class is a part of another class,\
    \ then it’s a *child* of that class, and the other class is its *parent*. Classes\
    \ can be both children of and parents to other classes. In our tree diagram, the\
    \ class above another class is its parent, and the class below it is its child.\
    \ For example, Inanimate and Animate are both children of the class Things, meaning\
    \ that Things is their parent.\n\nTo tell Python that a class is a child of another\
    \ class, we add the name of the parent class in parentheses after the name of\
    \ our new class, like this:\n\n```\n>>> class Inanimate(Things):\n    pass\n\n\
    >>> class Animate(Things):\n    pass\n```\n\nHere, we create a class called Inanimate\
    \ and tell Python that its parent class is Things with the code class Inanimate(Things).\
    \ Next, we create a class called Animate and tell Python that its parent class\
    \ is also Things, using class Animate(Things)."
