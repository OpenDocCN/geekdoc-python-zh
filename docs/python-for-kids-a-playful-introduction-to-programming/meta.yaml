    \ a string, like this:\n\n```\n>>> fred = 'What is pink and fluffy? Pink fluff!!'\n\
    >>> print(fred)\nWhat is pink and fluffy? Pink fluff!!\n```\n\nHowever, if you\
    \ try to enter more than one line of text for your string using only a single\
    \ quote (') or double quote (\") or if you start with one type of quote and try\
    \ to finish with another, you’ll get an error message in the Python shell. For\
    \ example, enter the following line:\n\n```\n>>> fred = \"How do dinosaurs pay\
    \ their bills?\n```\n\nYou’ll see this result:\n\n```\nSyntaxError: EOL while\
