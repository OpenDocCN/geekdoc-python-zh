  md: '# USING VARIABLES


    Remember our equation for figuring out how many coins you would have at the end
    of the year if you could magically create new coins with your grandfather''s crazy
    invention in the basement? We have this equation:


    ```

    >>> 20 + 10 * 365

    3670

    >>> 3 * 52

    156

    >>> 3670 - 156

    3514

    ```


    We can turn this into a single line of code:


    ```

    >>> 20 + 10 * 365 - 3 * 52

    3514

    ```


    Now, what if we turn the numbers into variables? Try entering the following:


    ```

    >>> found_coins = 20

    >>> magic_coins = 10

    >>> stolen_coins = 3

    ```


    These entries create the variables found_coins, magic_coins, and stolen_coins.

    Now, we can reenter the equation like this:


    ```

    >>> found_coins + magic_coins * 365 - stolen_coins * 52

    3514

    ```


    You can see that this gives us the same answer. So who cares, right? Ah, but here''s
    the magic of variables. What if you stick a scarecrow in your window, and the
    raven steals only two coins


