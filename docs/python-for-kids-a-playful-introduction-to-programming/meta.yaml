    # INHERITED FUNCTIONS


    Those of you who have been paying attention may realize that whoever ends up working
    on the Giraffes class is lucky, because any functions created by the people working
    on the Animals and Mammals classes can also be used by the Giraffes class. The
    Giraffes class *inherits* functions from the Mammals class, which, in turn, inherits
    from the Animals class. In other words, when we create a giraffe object, we can
    use functions defined in the Giraffes class, as well as functions defined in the
    Mammals and Animals classes. And, by the same token, if we create a mammal object,
    we can use functions defined in the Mammals class as well as its parent class
    Animals.


    Take a look at the relationship between the Animals, Mammals, and Giraffes classes
    again. The Animals class is the parent of the Mammals class, and Mammals is the
    parent of Giraffes.


    ![](img/a7a5a123e26ba8cb8ef5b41ca45700be_128_1.png)'
