    \ our game. Instead, if we subtract the character's y2 value (of 57) from the\
    \ platform's y1 value (of 60) we get 3, the amount the stick figure should drop\
    \ in order to land properly on the top of the platform.\n\nAt ③, we make sure\
    \ that the calculation doesn't result in a negative number; if it does, we set\
