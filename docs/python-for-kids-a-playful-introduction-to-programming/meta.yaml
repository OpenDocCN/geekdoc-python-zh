- md: "## ELSE\n\nThe keyword else is used as part of an if statement. See the description\
    \ of the if keyword for an example.\n\n## EXCEPT\n\nThe keyword except is used\
    \ for catching problems in code. It's typically used in fairly complicated programs,\
    \ so we don't use it in this book.\n\n## FINALLY\n\nThe keyword finally is used\
    \ to make sure that if an error occurs, certain code runs (usually to tidy up\
    \ any mess that a piece of code has left behind). This keyword isn't used in this\
    \ book because it's for more advanced programming.\n\n## FOR\n\nThe for keyword\
    \ is used to create a loop of code that runs a certain number of times. Here's\
    \ an example:\n\n```\nfor x in range(0, 5):\n    print('x is %s' % x)\n```\n\n\
    This for loop executes the block of code (the print statement) five times, resulting\
    \ in the following output:\n\n```\nx is 0\nx is 1\nx is 2\nx is 3\nx is 4\n```\n\
    \n## FROM\n\nWhen importing a module, you can import just the part you need using\
    \ the from keyword. For example, the turtle module introduced in Chapter 4 has\
    \ a class called Pen, which we use to create a Pen object (the canvas on which\
    \ the turtle moves). Here's how we import the entire turtle module and then use\
    \ the Pen class:\n\n```\nimport turtle\nt = turtle.Pen()\n```\n\nYou could also\
    \ just import the Pen class on its own, and then use it directly (without referring\
    \ to the turtle module at all):\n\n```\nfrom turtle import Pen\nt = Pen()\n```\n\
    \nYou might do this so that the next time you look at the top of that program,\
    \ you can see all the functions and classes that you're using (which is particularly\
    \ useful in larger programs that import a lot of modules). However, if you choose\
    \ to do this, you won't be able to use the parts of the module you haven't imported.\
    \ For example, the time module has functions called localtime and gmtime, but\
    \ if you import only localtime and then try to use gmtime, you'll get an error:\n\
    \n```\n>>> from time import localtime\n>>> print(localtime())\n(2007, 1, 30, 20,\
    \ 53, 42, 1, 30, 0)\n>>> print(gmtime())\nTraceback (most recent call last):\n\
    \  File \"<stdin>\", line 1, in <module>\nNameError: name 'gmtime' is not defined\n\
    ```\n\nThe error message name 'gmtime' is not defined means that Python doesn't\
    \ know anything about the function gmtime, which is because you haven't imported\
    \ it.\n\nIf there are a number of functions in a particular module that you want\
    \ to use, and you don't want to refer to them by using the module name (for example,\
    \ time.localtime, or time.gmtime), you can import everything in the module using\
    \ an asterisk (*), like this:\n\n```\n>>> from time import *\n>>> print(localtime())\n\
    (2007, 1, 30, 20, 57, 7, 1, 30, 0)\n>>> print(gmtime())\n(2007, 1, 30, 13, 57,\
    \ 9, 1, 30, 0)\n```\n\nThis form imports everything from the time module, and\
    \ you can now refer to the individual functions by name.\n\n## GLOBAL\n\nThe idea\
    \ of scope in programs is introduced in Chapter 7. Scope refers to the *visibility*\
    \ of a variable. If a variable is defined outside a function, usually it can be\
    \ seen (in other words, it's visible) inside the function. On the other hand,\
    \ if the variable is defined inside a function, usually it can't be seen outside\
    \ that function. The global keyword is one exception to this rule. A variable\
    \ that is defined as global can be seen everywhere. Here's an example:\n\n```\n\
    >>> def test():\n    global a\n    a = 1\n    b = 2\n```\n\nWhat do you think\
    \ happens when you call print(a) and then print(b), after running the function\
    \ test? The first will work, but the second will display an error message:\n\n\
    ```\n>>> test()\n>>> print(a)\n1\n>>> print(b)\nTraceback (most recent call last):\n\
    \  File \"<stdin>\", line 1, in <module>\nNameError: name 'b' is not defined\n\
    ```\n\nThe variable a has been changed to global inside the function, so it's\
    \ visible, even once the function has completed, but b is still visible only inside\
    \ the function. (You must use the global keyword before setting the value of your\
    \ variable.)\n\n## IF\n\nThe if keyword is used to make a decision about something.\
    \ It can also be used with the keywords else and elif (else if). An if statement\
    \ is a way of saying, “If something is true, then perform an action of some kind.”\
    \ Here's an example:\n\n```\n1 if toy_price > 1000:\n2     print('That toy is\
    \ overpriced')\n3 elif toy_price > 100:\n4     print('That toy is expensive')\n\
    5 else:\n6     print('I can afford that toy')\n```\n\nThis if statement says that\
    \ if a toy price is over $1,000 at 1, display a message that it is overpriced\
    \ at 2; otherwise, if the toy price is over $100 as at ❸, then display a message\
    \ that it's expensive at ❹. If neither of those conditions is true as at ❺, it\
    \ should display the message “I can afford that toy” at ❻.\n\n## IMPORT\n\nThe\
    \ import keyword is used to tell Python to load a module so it can be used. For\
    \ example, the following code tells Python to use the module sys:\n\n```\nimport\
    \ sys\n```\n\n## IN\n\nThe in keyword is used in expressions to see if an item\
    \ is within a collection of items. For example, can the number 1 be found in a\
    \ list (a collection) of numbers?\n\n```\n>>> if 1 in [1,2,3,4]:\n>>>     print('number\
    \ is in list')\nnumber is in list\n```\n\nHere's how to find out if the string\
    \ 'pants' is in a list of clothing items:\n\n```\n>>> clothing_list = ['shorts',\
    \ 'undies', 'boxers', 'long johns',\n                    'knickers']\n>>> if 'pants'\
    \ in clothing_list:\n        print('pants is in the list')\nelse:\n        print('pants\
    \ is not in the list')\npants is not in the list\n```\n\n## IS\n\nThe is keyword\
    \ is a bit like the equal to operator (==), which is used to tell if two things\
    \ are equal (for example 10 == 10 is true, and 10 == 11 is false). However, there\
    \ is a fundamental difference between is and ==. If you are comparing two things,\
    \ == may return true, while is may not (even if you think the things are the same).\
    \ This is an advanced programming concept, and we stick with using == in this\
    \ book.\n\n## LAMBDA\n\nThe lambda keyword is used to create anonymous, or inline,\
    \ functions. This keyword is used in more advanced programs, and we don't discuss\
    \ it in this book.\n\n## NOT\n\nIf something is true, the not keyword makes it\
    \ false. For example, if we create a variable x and set it to the value True,\
    \ and then print the value of this variable using not, we get the following result:\n\
    \n```\n>>> x = True\n>>> print(not x)\nFalse\n```\n\nThis doesn't seem very useful,\
    \ until you start using the keyword in if statements. For example, to find out\
    \ whether an item is not in a list, we could write something like this:\n\n```\n\
    >>> clothing_list = ['shorts', 'undies', 'boxers', 'long johns',\n           \
    \         'knickers']\n>>> if 'pants' not in clothing_list:\n        print('You\
    \ really need to buy some pants')\nYou really need to buy some pants\n```\n\n\
    ## OR\n\nThe or keyword is used to join two conditions together in a statement\
    \ (such as an if statement) to say that at least one of the conditions should\
    \ be true. Here's an example:\n\n```\nif dino == 'Tyrannosaurus' or dino == 'Allosaurus':\n\
    \    print('Carnivores')\nelif dino == 'Ankylosaurus' or dino == 'Apatosaurus':\n\
    \    print('Herbivores')\n```\n\nIn this case, if the variable dino contains Tyrannosaurus\
    \ or Allosaurus, the program prints “Carnivores.” If it contains Ankylosaurus\
    \ or Apatosaurus, the program prints “Herbivores.”\n\n## PASS\n\nSometimes when\
    \ you’re developing a program, you want to write only small pieces of it, to try\
    \ things out. The problem with doing this is that you can’t have an if statement\
    \ without the block of code that should be run if the expression in the if statement\
    \ is true. You also cannot have a for loop without the block of code that should\
    \ be run in the loop. For example, the following code works just fine:\n\n```\n\
    >>> age = 15\n>>> if age > 10:\n        print('older than 10')\n```\n\nolder than\
    \ 10\n\nBut if you don’t fill in the block of code (the body) for the if statement,\
    \ you’ll get an error message:\n\n```\n>>> age = 15\n>>> if age > 10:\n```\n\n\
    ```\nFile \"<stdin>\", line 2\n    ^\nIndentationError: expected an indented block\n\
    ```\n\nThis is the error message Python displays when you should have a block\
    \ of code after a statement of some kind (it won’t even let you type this kind\
    \ of code if you’re using IDLE). In cases like these, you can use the pass keyword\
    \ to write a statement but not provide the block of code that goes with it.\n\n\
    For example, say you want to create a for loop with an if statement inside it.\
    \ Perhaps you haven’t decided what to put in the if statement yet—maybe you’ll\
    \ use the print function, put in a break, or something else. You can use pass,\
    \ and the code will still work (even if it doesn’t do exactly what you want yet).\n\
    \nHere’s our if statement again, this time using the pass keyword:\n\n```\n>>>\
    \ age = 15\n>>> if age > 10:\n        pass\n```"
  mdcn: "## ELSE\n\n关键字 `else` 用作 `if` 语句的一部分。有关示例，请参阅 `if` 关键字的描述。\n\n## EXCEPT\n\
    \n关键字 `except` 用于捕获代码中的问题。它通常用于相当复杂的程序中，因此本书不使用它。\n\n## FINALLY\n\n关键字 `finally`\
    \ 用于确保在发生错误时，某些代码会运行（通常是为了清理代码留下的任何混乱）。本书不使用此关键字，因为它属于更高级的编程范畴。\n\n## FOR\n\n\
    关键字 `for` 用于创建一个运行特定次数的代码循环。以下是一个示例：\n\n```\nfor x in range(0, 5):\n    print('x\
    \ is %s' % x)\n```\n\n这个 `for` 循环执行代码块（`print` 语句）五次，产生以下输出：\n\n```\nx is 0\n\
    x is 1\nx is 2\nx is 3\nx is 4\n```\n\n## FROM\n\n导入模块时，你可以使用 `from` 关键字仅导入你需要的部分。例如，第\
    \ 4 章介绍的 `turtle` 模块有一个名为 `Pen` 的类，我们用它来创建一个 `Pen` 对象（海龟移动的画布）。以下是如何导入整个 `turtle`\
    \ 模块然后使用 `Pen` 类：\n\n```\nimport turtle\nt = turtle.Pen()\n```\n\n你也可以只导入 `Pen`\
    \ 类本身，然后直接使用它（完全不需要引用 `turtle` 模块）：\n\n```\nfrom turtle import Pen\nt = Pen()\n\
    ```\n\n你可能这样做是为了下次查看程序顶部时，可以看到你使用的所有函数和类（这在导入大量模块的较大程序中特别有用）。但是，如果你选择这样做，你将无法使用模块中未导入的部分。例如，`time`\
    \ 模块有名为 `localtime` 和 `gmtime` 的函数，但如果你只导入 `localtime` 然后尝试使用 `gmtime`，你会得到一个错误：\n\
    \n```\n>>> from time import localtime\n>>> print(localtime())\n(2007, 1, 30, 20,\
    \ 53, 42, 1, 30, 0)\n>>> print(gmtime())\nTraceback (most recent call last):\n\
    \  File \"<stdin>\", line 1, in <module>\nNameError: name 'gmtime' is not defined\n\
    ```\n\n错误消息 `name 'gmtime' is not defined` 意味着 Python 不知道 `gmtime` 函数，因为你没有导入它。\n\
    \n如果某个特定模块中有多个函数你想使用，并且你不想通过使用模块名（例如 `time.localtime` 或 `time.gmtime`）来引用它们，你可以使用星号\
    \ (`*`) 导入模块中的所有内容，如下所示：\n\n```\n>>> from time import *\n>>> print(localtime())\n\
    (2007, 1, 30, 20, 57, 7, 1, 30, 0)\n>>> print(gmtime())\n(2007, 1, 30, 13, 57,\
    \ 9, 1, 30, 0)\n```\n\n这种形式从 `time` 模块导入所有内容，你现在可以通过名称引用各个函数。\n\n## GLOBAL\n\n\
    程序中作用域的概念在第 7 章介绍。作用域指的是变量的*可见性*。如果一个变量在函数外部定义，通常可以在函数内部看到（换句话说，它是可见的）。另一方面，如果变量在函数内部定义，通常在该函数外部是不可见的。`global`\
    \ 关键字是此规则的一个例外。定义为 `global` 的变量可以在任何地方看到。以下是一个示例：\n\n```\n>>> def test():\n  \
    \  global a\n    a = 1\n    b = 2\n```\n\n你认为在运行 `test` 函数后，调用 `print(a)` 然后 `print(b)`\
    \ 会发生什么？第一个会正常工作，但第二个会显示错误消息：\n\n```\n>>> test()\n>>> print(a)\n1\n>>> print(b)\n\
    Traceback (most recent call last):\n  File \"<stdin>\", line 1, in <module>\n\
    NameError: name 'b' is not defined\n```\n\n变量 `a` 在函数内部被更改为 `global`，因此即使在函数完成后它也是可见的，但\
    \ `b` 仍然只在函数内部可见。（在设置变量值之前，你必须使用 `global` 关键字。）\n\n## IF\n\n关键字 `if` 用于对某事做出决定。它也可以与关键字\
    \ `else` 和 `elif`（else if）一起使用。`if` 语句是一种表达方式：“如果某事为真，那么执行某种操作。”以下是一个示例：\n\n```\n\
    1 if toy_price > 1000:\n2     print('That toy is overpriced')\n3 elif toy_price\
    \ > 100:\n4     print('That toy is expensive')\n5 else:\n6     print('I can afford\
    \ that toy')\n```\n\n这个 `if` 语句表示，如果玩具价格超过 1000 美元（如 1 所示），则在 2 处显示消息表明其定价过高；否则，如果玩具价格超过\
    \ 100 美元（如 ❸ 所示），则在 ❹ 处显示消息表明其价格昂贵。如果这两个条件都不成立（如 ❺ 所示），则应在 ❻ 处显示消息“I can afford\
    \ that toy”。\n\n## IMPORT\n\n关键字 `import` 用于告诉 Python 加载一个模块以便使用。例如，以下代码告诉 Python\
    \ 使用 `sys` 模块：\n\n```\nimport sys\n```\n\n## IN\n\n关键字 `in` 用于表达式中，以查看某个项目是否在一组项目中。例如，数字\
    \ 1 是否可以在数字列表（一个集合）中找到？\n\n```\n>>> if 1 in [1,2,3,4]:\n>>>     print('number\
    \ is in list')\nnumber is in list\n```\n\n以下是如何找出字符串 `'pants'` 是否在服装项目列表中：\n\n\
    ```\n>>> clothing_list = ['shorts', 'undies', 'boxers', 'long johns',\n      \
    \              'knickers']\n>>> if 'pants' in clothing_list:\n        print('pants\
    \ is in the list')\nelse:\n        print('pants is not in the list')\npants is\
    \ not in the list\n```\n\n## IS\n\n关键字 `is` 有点像等于运算符 (`==`)，用于判断两个事物是否相等（例如 `10\
    \ == 10` 为真，`10 == 11` 为假）。然而，`is` 和 `==` 之间存在根本区别。如果你比较两个事物，`==` 可能返回真，而 `is`\
    \ 可能不会（即使你认为这两个事物是相同的）。这是一个高级编程概念，本书中我们坚持使用 `==`。\n\n## LAMBDA\n\n关键字 `lambda`\
    \ 用于创建匿名或内联函数。此关键字用于更高级的程序中，本书不讨论它。\n\n## NOT\n\n如果某事为真，关键字 `not` 会使其为假。例如，如果我们创建一个变量\
    \ `x` 并将其设置为值 `True`，然后使用 `not` 打印此变量的值，我们得到以下结果：\n\n```\n>>> x = True\n>>> print(not\
    \ x)\nFalse\n```\n\n这看起来似乎没什么用，直到你开始在 `if` 语句中使用此关键字。例如，要找出某个项目是否不在列表中，我们可以这样写：\n\
    \n```\n>>> clothing_list = ['shorts', 'undies', 'boxers', 'long johns',\n    \
    \                'knickers']\n>>> if 'pants' not in clothing_list:\n        print('You\
    \ really need to buy some pants')\nYou really need to buy some pants\n```\n\n\
    ## OR\n\n关键字 `or` 用于在语句（如 `if` 语句）中连接两个条件，表示至少其中一个条件应为真。以下是一个示例：\n\n```\nif dino\
    \ == 'Tyrannosaurus' or dino == 'Allosaurus':\n    print('Carnivores')\nelif dino\
    \ == 'Ankylosaurus' or dino == 'Apatosaurus':\n    print('Herbivores')\n```\n\n\
    在这种情况下，如果变量 `dino` 包含 `Tyrannosaurus` 或 `Allosaurus`，程序将打印“Carnivores”。如果它包含 `Ankylosaurus`\
    \ 或 `Apatosaurus`，程序将打印“Herbivores”。\n\n## PASS\n\n有时在开发程序时，你只想编写一小部分来尝试某些东西。这样做的问题是，你不能有一个\
    \ `if` 语句而没有在 `if` 语句表达式为真时应运行的代码块。你也不能有一个 `for` 循环而没有在循环中应运行的代码块。例如，以下代码可以正常工作：\n\
    \n```\n>>> age = 15\n>>> if age > 10:\n        print('older than 10')\n```\n\n\
    older than 10\n\n但如果你不为 `if` 语句填写代码块（主体），你会得到一个错误消息：\n\n```\n>>> age = 15\n>>>\
    \ if age > 10:\n```\n\n```\nFile \"<stdin>\", line 2\n    ^\nIndentationError:\
    \ expected an indented block\n```\n\n这是当你应该在某种语句后有一个代码块时 Python 显示的错误消息（如果你使用\
    \ IDLE，它甚至不会让你输入这种代码）。在这种情况下，你可以使用 `pass` 关键字来编写语句，但不提供与之配套的代码块。\n\n例如，假设你想创建一个包含\
    \ `if` 语句的 `for` 循环。也许你还没有决定在 `if` 语句中放什么——也许你会使用 `print` 函数，放入一个 `break`，或其他东西。你可以使用\
    \ `pass`，代码仍然可以工作（即使它还没有完全做你想做的事）。\n\n以下是我们再次使用 `pass` 关键字的 `if` 语句：\n\n```\n\
    >>> age = 15\n>>> if age > 10:\n        pass\n```"
