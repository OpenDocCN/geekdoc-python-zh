  md: 'So the tkinter code is already an improvement. It''s slightly shorter and a
    bit simpler.

    Now let''s look at some of the functions available on the canvas object that we
    can use for some more interesting drawings.


    # DRAWING BOXES


    With the turtle module, we drew a box by moving forward, turning, moving forward,
    turning again, and so on. Eventually, we were able to draw a rectangular or square
    box by changing how far we moved forward.

    The tkinter module makes it a lot easier to draw a square or rectangle. All you
    need to know are the coordinates for the corners. Here''s an example (you can
    close the other windows now):


    ![](img/a7a5a123e26ba8cb8ef5b41ca45700be_195_0.png)


    ```

    >>> from tkinter import *

    >>> tk = Tk()

    >>> canvas = Canvas(tk, width=400, height=400)

    >>> canvas.pack()

    >>> canvas.create_rectangle(10, 10, 50, 50)

    ```


    In this code, we use tkinter to create a canvas that is 400 pixels wide by 400
    pixels high, and we then draw a square in the top-left corner of the window, like
    this:


    ![](img/a7a5a123e26ba8cb8ef5b41ca45700be_195_1.png)


    The parameters we pass to canvas.create_rectangle in the last line of the code
    are the coordinates for the top-left and bottom-right corners of the square. We
    provide these coordinates as the distance from the left-hand side of the canvas
    and the distance from the top of the canvas. In this case, the first two coordinates
    (the top-left'
  merge: -1
  pgno: 195
- img_proc: true
  md: 'corner) are 10 pixels across from the left and 10 pixels down from the top
    (those are the first numbers: 10, 10). The bottom-right corner of the square is
    50 pixels across from the left and 50 pixels down (the second numbers: 50, 50).


    We''ll refer to these two sets of coordinates as *x1*, *y1* and *x2*, *y2*. To
    draw a rectangle, we can increase the distance of the second corner from the side
    of the canvas (increasing the value of the *x2* parameter), like this:


    ```

    >>> from tkinter import *

    >>> tk = Tk()

    >>> canvas = Canvas(tk, width=400, height=400)

    >>> canvas.pack()

    >>> canvas.create_rectangle(10, 10, 300, 50)

    ```


    In this example, the top-left coordinates of the rectangle (its position on the
    screen) are (10, 10), and the bottom-right coordinates are (300, 50). The result
    is a rectangle that is the same height as our original square (50 pixels), but
    a lot wider.


    ![](img/a7a5a123e26ba8cb8ef5b41ca45700be_196_0.png)


    We can also draw a rectangle by increasing the distance of the second corner from
    the top of the canvas (increasing the value of the *y2* parameter), like this:


    ```

    >>> from tkinter import *

    >>> tk = Tk()

    >>> canvas = Canvas(tk, width=400, height=400)

    >>> canvas.pack()

    >>> canvas.create_rectangle(10, 10, 50, 300)

    ```


    In this call to the create_rectangle function, we are basically saying, in order:


    +   - Go 10 pixels across the canvas (from the top left).

    - Go 10 pixels down the canvas. This is the starting corner of the rectangle.'
