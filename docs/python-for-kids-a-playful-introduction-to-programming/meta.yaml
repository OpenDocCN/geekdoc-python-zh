    ## WHAT''S IN THIS BOOK


    Here’s a brief rundown of what you’ll find in each chapter.

    **Chapter 1** is an introduction to programming with instructions for installing
    Python for the first time.

    **Chapter 2** introduces basic calculations and variables, and **Chapter 3** describes
    some of the basic Python types, such as strings, lists, and tuples.

    **Chapter 4** is the first taste of the turtle module. We’ll jump from basic programming
