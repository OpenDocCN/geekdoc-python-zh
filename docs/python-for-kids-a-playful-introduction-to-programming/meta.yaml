  md: "Why would you use a tuple instead of a list? Basically because sometimes it\
    \ is useful to use something that you know can never change. If you create a tuple\
    \ with two elements inside, it will always have those two elements inside.\n\n\
    # PYTHON MAPS WON'T HELP YOU FIND YOUR WAY\n\nIn Python, a *map* (also referred\
    \ to as a *dict*, short for *dictionary*) is a collection of things, like lists\
    \ and tuples. The difference between maps and lists or tuples is that each item\
    \ in a map has a *key* and a corresponding *value*.\n\nFor example, say we have\
    \ a list of people and their favorite sports. We could put this information into\
    \ a Python list, with the person's name followed by their sport, like so:\n\n\
    ```\n>>> favorite_sports = ['Ralph Williams, Football',\n                    \
    \  'Michael Tippett, Basketball',\n                      'Edward Elgar, Baseball',\n\
    \                      'Rebecca Clarke, Netball',\n                      'Ethel\
    \ Smyth, Badminton',\n                      'Frank Bridge, Rugby']\n```\n\nIf\
    \ I asked you what Rebecca Clarke's favorite sport is, you could skim through\
    \ that list and find the answer is netball. But what if the list included 100\
    \ (or many more) people?\n\nNow, if we store this same information in a map, with\
    \ the person's name as the key and their favorite sport as the value, the Python\
    \ code would look like this:\n\n![](img/a7a5a123e26ba8cb8ef5b41ca45700be_64_0.png)\n\
    \n```\n>>> favorite_sports = {'Ralph Williams' : 'Football',\n               \
    \       'Michael Tippett' : 'Basketball',\n                      'Edward Elgar'\
    \ : 'Baseball',\n                      'Rebecca Clarke' : 'Netball',\n       \
    \               'Ethel Smyth' : 'Badminton',\n                      'Frank Bridge'\
    \ : 'Rugby'}\n```\n\nWe use colons to separate each key from its value, and each\
    \ key and value is surrounded by single quotes. Notice, too, that the items in\
    \ a map are enclosed in braces ({}), not parentheses or square brackets."
