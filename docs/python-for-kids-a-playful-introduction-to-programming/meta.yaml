    # DRAWING POLYGONS


    A polygon is any shape with three or more sides. There are regularly shaped polygons
    like triangles, squares, rectangles, pentagons, hexagons, and so on, as well as
    irregular ones with uneven edges, many more sides, and odd shapes.


    When drawing polygons with tkinter, you need to provide coordinates for each point
    of the polygon. Here''s how we can draw a triangle:


    ```

    from tkinter import *

    tk = Tk()

    canvas = Canvas(tk, width=400, height=400)

    canvas.pack()

    canvas.create_polygon(10, 10, 100, 10, 100, 110, fill="", outline="black")

    ```


    This example draws a triangle by starting with the x and y coordinates (10, 10),
    then moving across to (100, 10), and finishing at (100, 110). Here''s the result:


    ![](img/a7a5a123e26ba8cb8ef5b41ca45700be_204_1.png)'
  - '[PAGE 205]


    We can add another irregular polygon (a shape with uneven angles or sides) using
    this code:


    ```

    canvas.create_polygon(200, 10, 240, 30, 120, 100, 140, 120, fill="", outline="black")

    ```


    This code begins with the coordinates (200, 10), moves to (240, 30), then to (120,
    100), and finally to (100, 140). tkinter automatically joins the line back to
    the first coordinate. And here’s the result of running the code:


    ![](img/a7a5a123e26ba8cb8ef5b41ca45700be_205_0.png)


    # DISPLAYING TEXT


    In addition to drawing shapes, you can also write on the canvas using create_text.
    This function takes only two coordinates (the x and y positions of the text),
    along with a named parameter for the text to display. In the following code, we
    create our canvas as before and then display a sentence positioned at the coordinates
    (150, 100). Save this code as *text.py*.


    ```

    from tkinter import *

    tk = Tk()

    canvas = Canvas(tk, width=400, height=400)

    canvas.pack()

    canvas.create_text(150, 100, text=''There once was a man from Toulouse,'')

    ```


    The create_text function takes some other useful parameters, such as a text fill
    color. In the following code, we call the create_text function with coordinates
    (130, 120), the text we want to display, and a red fill color.


    ```

    canvas.create_text(130, 120, text=''Who rode around on a moose.'', fill=''red'')

    ```'
