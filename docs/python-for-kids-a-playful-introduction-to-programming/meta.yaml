  - "[PAGE 178]\n\nThis red, green, and blue color recipe is called *RGB*. It's the\
    \ way that colors are represented on your computer monitor, and the relative mix\
    \ of these primary colors produces other colors, just like when you mix blue and\
    \ red paint to make purple or yellow and red to make orange. The colors red, green,\
    \ and blue are called *primary* colors because you cannot mix other shades to\
    \ produce them.\n\n![](img/a7a5a123e26ba8cb8ef5b41ca45700be_178_0.png)\n\nAlthough\
    \ we're not using paint when we create colors on a computer monitor (we're using\
    \ light), it may help to understand this RGB recipe by thinking about three pots\
    \ of paint: one red, one green, and one blue. Each pot is full, and we give each\
    \ full pot a value of 1 (or 100 percent). We then mix all of the red paint and\
    \ all of the green paint in a vat to produce yellow (that's 1 and 1 of each, or\
    \ 100 percent of each color).\n\nNow let's return to the world of code. To draw\
    \ a yellow circle with the turtle, we would use 100 percent of both the red and\
    \ green paint, but no blue, like this:\n\n```\n>>> t.color(1,1,0)\n>>> t.begin_fill()\n\
    >>> t.circle(50)\n>>> t.end_fill()\n```\n\nThe 1,1,0 in the first line represents\
    \ 100 percent red, 100 percent green, and 0 percent blue. On the next line, we\
    \ tell the turtle to fill the shapes it draws with this RGB color (t.begin_fill),\
    \ and then we tell it to draw a circle with (t.circle). On the final line, end_fill\
    \ tells the turtle to fill the circle with the RGB color.\n\n# A FUNCTION TO DRAW\
    \ A FILLED CIRCLE\n\nTo make it easier to experiment with different colors, let's\
    \ create a function from the code we used to draw a filled circle.\n\n```\n>>>\
    \ def mycircle(red, green, blue):\n        t.color(red, green, blue)\n       \
    \ t.begin_fill()\n        t.circle(50)\n        t.end_fill()\n```"
