    ValueError: invalid literal for int() with base 10: '123.456'\n```\n\nAs you can\
    \ see, the result is a ValueError message.\n\n## THE LEN FUNCTION\n\nThe len function\
    \ returns the length of an object or, in the case of a string, the number of characters\
    \ in the string. For example, to get the length of this is a test string, you\
    \ would do this:\n\n```\n>>> len('this is a test string')\n21\n```\n\nWhen used\
    \ with a list or a tuple, len returns the number of items in that list or tuple:\n\
