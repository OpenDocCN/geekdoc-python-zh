  md: "This is the first time we've used named parameters in any of our code examples,\
    \ so let's talk about them a bit before continuing with our drawing.\n\n# USING\
    \ NAMED PARAMETERS\n\nNamed parameters are just like normal parameters, except\
    \ that, rather than using the specific order of the values provided to a function\
    \ to determine which value belongs to which parameter (the first value is the\
    \ first parameter, the second value is the second parameter, the third value is\
    \ the third parameter, and so on), we explicitly name the values, so they can\
    \ appear in any order.\nSometimes functions have a lot of parameters, and we may\
    \ not always need to provide a value for every parameter. Named parameters are\
    \ a way we can provide values for only the parameters that we need to give values.\n\
    For example, suppose we have a function called person that takes two parameters:\
    \ width and height.\n\n```\n>>> def person(width, height):\n    print('I am %s\
    \ feet wide, %s feet high' % (width, height))\n```\n\nNormally, we might call\
    \ this function like this:\n\n```\n>>> person(4, 3)\nI am 4 feet wide, 3 feet\
    \ high\n```\n\nUsing named parameters, we could call this function and specify\
    \ the parameter name with each value:\n\n```\n>>> person(height=3, width=4)\n\
    I am 4 feet wide, 3 feet high\n```\n\nNamed parameters will become particularly\
    \ useful as we do more with the tkinter module.\n\n# CREATING A CANVAS FOR DRAWING\n\
    \nButtons are nice tools, but they're not particularly useful when we want to\
    \ draw things on the screen. When it's time to really draw something, we need\
    \ a different component: a canvas object, which is an object of the class Canvas\
    \ (provided by the tkinter module)."
  merge: -1
