  md: '![](img/a7a5a123e26ba8cb8ef5b41ca45700be_258_0.png)


    # # 16 DEVELOPING THE MR. STICK MAN GAME


    Now that we''ve created the images for our Mr. Stick Man Races for the Exit game,
    we can begin to develop the code. The description of the game in the previous
    chapter gives us a basic idea of what we need: a stick figure that can run and
    jump, and platforms that he must jump to.


    We''ll need code to display the stick figure and move it across the screen, as
    well as to draw platforms. But before we write that code, we need to create the
    canvas to display our background image.'
  merge: -1
  pgno: 258
- img_proc: true
  md: "# CREATING THE GAME CLASS\n\nFirst, we'll create a class called Game, which\
    \ will be our program's main controller. The Game class will have an __init__\
    \ function for initializing the game and a mainloop function for doing the animation.\n\
    \n# SETTING THE WINDOW TITLE AND CREATING THE CANVAS\n\nIn the first part of the\
    \ __init__ function, we'll set the window title and create the canvas. As you'll\
    \ see, this part of the code is similar to the code that we wrote for the Bounce!\
    \ game in Chapter 13. Open your editor and enter the following code, and then\
    \ save your file as stickmangame.py. Make sure you save it in the directory we\
    \ created in Chapter 15 (called stickman).\n\n```\nfrom tkinter import *\nimport\
    \ random\nimport time\n\nclass Game:\n    def __init__(self):\n        self.tk\
    \ = Tk()\n        self.tk.title(\"Mr. Stick Man Races for the Exit\")\n      \
    \  self.tk.resizable(0, 0)\n        self.tk.wm_attributes(\"-topmost\", 1)\n \
    \       self.canvas = Canvas(self.tk, width=500, height=500, \\n             \
    \               highlightthickness=0)\n        self.canvas.pack()\n        self.tk.update()\n\
    \        self.canvas_height = 500\n        self.canvas_width = 500\n```\n\nIn\
    \ the first half of this program (from from tkinter import * to self.tk.wm_attributes),\
    \ we create the tk object and then set the window title with self.tk.title to\
    \ (\"Mr. Stick Man Races for the Exit\"). We make the window fixed (so it can't\
    \ be resized) by calling the resizable function, and then we move the window in\
    \ front of all other windows with the wm_attributes function.\n\nNext, we create\
    \ the canvas with the self.canvas = Canvas line, and call the pack and update\
    \ functions of the tk object. Finally, we create two variables for our Game class,\
    \ height and width, to store the height and width of the canvas."
  merge: -1
  pgno: 259
- img_proc: true
  md: "The backslash (\\) in the self.canvas = Canvas line is used only to separate\
    \ the long line of code. It's not required, but I've included it here for readability\
    \ since the entire line won't fit on the page.\n\n# FINISHING THE __INIT__ FUNCTION\n\
    \nNow enter the rest of the __init__ function into the stickfiguregame.py file\
    \ that you just created. This code will load the background image and then display\
    \ it on the canvas:\n\n```\nself.tk.update()\nself.canvas_height = 500\nself.canvas_width\
    \ = 500\nself.bg = PhotoImage(file=\"background.gif\")\nw = self.bg.width()\n\
    h = self.bg.height()\nfor x in range(0, 5):\n    for y in range(0, 5):\n     \
    \   self.canvas.create_image(x * w, y * h, \\n                               \
    \ image=self.bg, anchor='nw')\nself.sprites = []\nself.running = True\n```\n\n\
    At ❶, we create the variable bg, which contains a PhotoImage object—the background\
    \ image file called background.gif that we created in Chapter 15. Next, beginning\
    \ at ❷, we store the width and height of the image in the variables w and h. The\
    \ PhotoImage class functions width and height return the size of the image once\
    \ it has been loaded.\n\nNext come two loops inside this function. To understand\
    \ what they do, imagine that you have a small square rubber stamp, an ink pad,\
    \ and a large piece of paper. How are you going to fill the paper with colored\
    \ squares using the stamp? Well, you could just randomly cover the page with stamps\
    \ until it's filled. The result would be a mess, and it would take a while to\
    \ complete, but it would fill the page. Or you could start stamping down the page\
    \ in a column and then move back to the top and start stamping down the page in\
    \ the next column, as shown on the right.\n\n![](img/a7a5a123e26ba8cb8ef5b41ca45700be_260_0.png)"
  merge: -1
  pgno: 260
- img_proc: true
  md: "The background image we created in the previous chapter is our stamp. We know\
    \ that the canvas is 500 pixels across and 500 pixels down, and that we created\
    \ a background image of 100 pixels square. This tells us that we need five columns\
    \ across and five rows down to fill the screen with images. We use the loop at\
    \ ③ to calculate the columns across, and the loop at ④ to calculate rows going\
    \ down.\n\nAt ⑤, we multiply the first loop variable x by the width of the image\
    \ (x * w) to determine how far across we're drawing, and then multiply the second\
    \ loop variable y by the height of the image (y * h) to calculate how far down\
    \ to draw. We use the create_image function of the canvas object (self.canvas.create_image)\
    \ to draw the image on the screen using those coordinates.\n\nFinally, beginning\
    \ with ⑥, we create the variables sprites, which holds an empty list, and running,\
    \ which contains the Boolean value True. We'll use these variables later in our\
    \ game code.\n\n# CREATING THE MAINLOOP FUNCTION\n\nWe'll use the mainloop function\
    \ in the Game class to animate our game. This function looks a lot like the main\
    \ loop (or animation loop) we created for the Bounce! game in Chapter 13. Here\
    \ it is:\n\n```\nfor x in range(0, 5):\n    for y in range(0, 5):\n        self.canvas.create_image(x\
    \ * w, y * h, \\n                                image=self.bg, anchor='nw')\n\
    self.sprites = []\nself.running = True\n```\n\n```\ndef mainloop(self):\n    while\
    \ 1:\n        if self.running == True:\n            for sprite in self.sprites:\n\
    \                sprite.move()\n        self.tk.update_idletasks()\n        self.tk.update()\n\
    \        time.sleep(0.01)\n```\n\nAt ①, we create a while loop that will run until\
    \ the game window is closed. Next, at ②, we check to see if the variable running\
    \ is equal to True. If it is, we loop through any sprites in the list of sprites\
    \ (self.sprites) at ③, calling the function move for each one at ④. (Of course,\
    \ we have yet to create any sprites, so this code"
  merge: -1
  pgno: 261
- img_proc: true
  md: 'wouldn''t do anything if you ran the program now, but it will be useful later.)


    The last three lines of the function, beginning at 5, force the tk object to redraw
    the screen and sleep for a fraction of a second, as we did with the Bounce! game
    in Chapter 13.


    So that you can run this code, add the following two lines (note that there''s
    no indentation required for these two lines) and save the file.


    ![](img/a7a5a123e26ba8cb8ef5b41ca45700be_262_0.png)


    ```

    g = Game()

    g.mainloop()

    ```


    > Be sure to add this code to the bottom of your game file. Also, make sure that
    your images are in the same directory as the Python file. If you created the stickman
    directory in Chapter 15 and saved all your images there, the Python file for this
    game should be there as well.


    This code creates an object of the Game class and saves it as the variable g.
    We then call the mainloop function on the new object to draw the screen.


    Once you''ve saved the program, run it in IDLE by choosing **Run ▸ Run Module**.
    You will see a window appear with the background image filling the canvas.


    ![](img/a7a5a123e26ba8cb8ef5b41ca45700be_262_1.png)'
  merge: -1
  pgno: 262
- img_proc: true
  md: "We've added a nice background for our game, and created an animation loop that\
    \ will draw sprites for us (once we've created them).\n\n# CREATING THE COORDS\
    \ CLASS\n\nNow we'll create the class that we'll use to specify the position of\
    \ something on our game screen. This class will store the top-left (x1 and y1)\
    \ and bottom-right (x2 and y2) coordinates of any component of our game.\n\nHere's\
    \ how you might record the position of the stick figure image using these coordinates:\n\
    \n![](img/a7a5a123e26ba8cb8ef5b41ca45700be_263_0.png)\n\nWe'll call our new class\
    \ Coords, and it will contain only an __init__ function, where we pass the four\
    \ parameters (x1, y1, x2, and y2). Here's the code to add (put it at the beginning\
    \ of the stickmangame.py file):\n\n```\nclass Coords:\n    def __init__(self,\
    \ x1=0, y1=0, x2=0, y2=0):\n        self.x1 = x1\n        self.y1 = y1\n     \
    \   self.x2 = x2\n        self.y2 = y2\n```\n\nNotice that each parameter is saved\
    \ as an object variable of the same name (x1, y1, x2, and y2). We'll be using\
    \ objects of this class shortly."
  merge: -1
  pgno: 263
- img_proc: true
  md: "# CHECKING FOR COLLISIONS\n\nOnce we know how to store the position of our\
    \ game sprites, we need a way to tell if one sprite has collided with another,\
    \ like when Mr. Stick Man jumps around the screen and bangs into one of the platforms.\
    \ To make this problem easier to solve, we can break it down into two smaller\
    \ problems: checking if sprites are colliding vertically and checking if sprites\
    \ are colliding horizontally. Then we can combine our two smaller solutions to\
    \ easily see if two sprites are colliding in any direction!\n\n# SPRITES COLLIDING\
    \ HORIZONTALLY\n\nFirst, we'll create the `within_x` function to determine if\
    \ one set of x coordinates (x1 and x2) has crossed over another set of x coordinates\
    \ (again, x1 and x2). There's more than one way to do this, but here's a simple\
    \ approach which you can add just below the Coords class:\n\n```\nclass Coords:\n\
    \    def __init__(self, x1=0, y1=0, x2=0, y2=0):\n        self.x1 = x1\n     \
    \   self.y1 = y1\n        self.x2 = x2\n        self.y2 = y2\n\ndef within_x(co1,\
    \ co2):\n    if co1.x1 > co2.x1 and co1.x1 < co2.x2:\n        return True\n  \
    \  elif co1.x2 > co2.x1 and co1.x2 < co2.x2:\n        return True\n    elif co2.x1\
    \ > co1.x1 and co2.x1 < co1.x2:\n        return True\n    elif co2.x2 > co1.x1\
    \ and co2.x2 < co1.x1:\n        return True\n    else:\n        return False\n\
    ```\n\nThe `within_x` function takes the parameters co1 and co2, both Coords objects.\
    \ At ❶, we check to see if the leftmost position of the first coordinate object\
    \ (co1.x1) is between the leftmost position (co2.x1) and the rightmost position\
    \ (co2.x2) of the second coordinate object. We return True at ❷ if it is."
  merge: -1
  pgno: 264
- img_proc: true
  md: '![](img/a7a5a123e26ba8cb8ef5b41ca45700be_265_0.png)


    Let''s take a look at two lines with overlapping x coordinates to understand how
    this works. Each line starts at x1 and finishes at x2.


    ![](img/a7a5a123e26ba8cb8ef5b41ca45700be_265_1.png)


    The first line in this diagram (co1) starts at pixel position 50 (x1) and finishes
    at 100 (x2). The second line (co2) starts at position 40 and finishes at 150.
    In this case, because the x1 position of the first line is between the x1 and
    x2 positions of the second line, the first if statement in the function would
    be true for these two sets of coordinates.


    With the elif at ③, we see whether the rightmost position of the first line (co1.x2)
    is between the leftmost position (co2.x1) and rightmost position (co2.x2) of the
    second. If it is, we return True at ④. The two elif statements at ⑤ and ⑥ do almost
    the same thing: They check the leftmost and rightmost positions of the second
    line (co2) against the first (co1).


    If none of the if statements match, we reach else at ⑦, and return False at ⑧.
    This is effectively saying, “No, the two coordinate objects do not cross over
    each other horizontally.”


    To see an example of the function working, look back at the diagram showing the
