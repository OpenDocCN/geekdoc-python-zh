    \n# PARTS OF A FUNCTION\n\nA function has three parts: a *name*, *parameters*,\
    \ and a *body*. Here's an example of a simple function:\n\n```\n>>> def testfunc(myname):\n\
    \        print('hello %s' % myname)\n```\n\nThe name of this function is testfunc.\
    \ It has a single parameter, myname, and its body is the block of code immediately\
