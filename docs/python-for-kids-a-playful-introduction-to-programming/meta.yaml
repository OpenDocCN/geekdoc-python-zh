    \ fly back up again, and we don't want that to happen in this game.)\nFinally,\
    \ we set the top ⑥ and bottom ⑤ flags to False, so we no longer need to check\
    \ whether the stick figure has collided at the top or bottom with another sprite.\n\
    We'll do one more bottom check to see whether the stick figure has run off the\
    \ edge of a platform. Here's the code for this if statement:\n\n```\nif self.y\
    \ < 0:\n    self.y = 0\n    bottom = False\n    top = False\nif bottom and falling\
    \ and self.y == 0 \\n        and co.y2 < self.game.canvas_height \\n        and\
    \ collided_bottom(1, co, sprite_co):\n    falling = False\n```\n\nFive checks\
    \ here must all be true in order for the falling variable to be set to False:\n\
    \n- We still need to check that the bottom flag is set to True.\n- We need to\
    \ check whether the stick figure should be falling (the falling flag is still\
    \ set to True).\n- The stick figure isn't already falling (y is 0).\n- The bottom\
    \ of the sprite hasn't hit the bottom of the screen (it's less than the canvas\
    \ height).\n- The stick figure has hit the top of a platform (collided_bottom\
    \ returns True).\n\nThen we set the falling variable to False.\n\n## CHECKING\
    \ LEFT AND RIGHT\n\nWe've checked whether the stick figure has hit a sprite at\
    \ the bottom or the top. Now we need to check whether he has hit the left or right\
    \ side, with this code:\n\n```\nif bottom and falling and self.y == 0 \\n    \
    \    and co.y2 < self.game.canvas_height \\n        and collided_bottom(1, co,\
    \ sprite_co):\n    falling = False\n```"
  mdcn: "然后从20开始倒数，同时将其向下移动，你就能体会到计算火柴人上下跳跃的原理了。）\n\n在`move`函数的接下来几行中，我们调用了`coords`函数，它告诉我们角色在屏幕上的位置，并将其结果存储在变量`co`中。然后我们创建了变量`left`、`right`、`top`、`bottom`和`falling`。我们将在本函数的剩余部分使用它们。\n\
    \n```\nif self.y > 0:\n    self.jump_count -= 1\nco = self.coords()\nleft = True\n\
    right = True\ntop = True\nbottom = True\nfalling = True\n```\n\n请注意，每个变量都被设置为布尔值`True`。我们将用它们作为指示器，来检查角色是否撞到了屏幕上的某物或正在下落。\n\
    \n## 火柴人是否撞到了画布的底部或顶部？\n\n`move`函数的下一部分检查我们的角色是否撞到了画布的底部或顶部。代码如下：\n\n```\nbottom\
