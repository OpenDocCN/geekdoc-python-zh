    \ call last):\n  File \"<pyshell>\", line 1, in <module>\n    list1 - 20\nTypeError:\
    \ unsupported operand type(s) for -: 'list' and 'int'\n```\n\nBut why? Well, joining\
    \ lists with + and repeating lists with * are straightforward enough operations.\
    \ These concepts also make sense in the real world. For example, if I were to\
    \ hand you two paper shopping lists and say, “Add these two lists,” you might\
