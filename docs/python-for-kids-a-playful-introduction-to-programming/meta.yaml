  md: "# PROGRAMMING LANGUAGES\n\nIf you're interested in other programming languages,\
    \ some that are currently popular are Java, C/C++, C#, PHP, Objective-C, Perl,\
    \ Ruby, and JavaScript. We'll take a brief tour of these languages and see how\
    \ a Hello World program (like the Python version we started with in Chapter 1)\
    \ would look in each one. Note that none of these languages are specifically intended\
    \ for beginning programmers, and most are significantly different from Python.\n\
    \n# JAVA\n\nJava (http://www.oracle.com/technetwork/java/index.html) is a moderately\
    \ complicated programming language with a large built-in library of modules (called\
    \ packages). A lot of free documentation is available online. You can use Java\
    \ on most operating systems. Java is also the language used on Android mobile\
    \ phones.\nHere's an example of Hello World in Java:\n\n```\npublic class HelloWorld\
    \ {\n    public static final void main(String[] args) {\n        System.out.println(\"\
    Hello World\");\n    }\n}\n```\n\n# C/C++\n\nC (http://www.cprogramming.com/)\
    \ and C++ (http://www.stroustrup/C++.html) are complicated programming languages\
    \ that are used on all operating systems. You'll find both free and commercial\
    \ versions available. Both languages (though perhaps C++ more than C) have a steep\
    \ learning curve. For example, you'll find that you need to manually code some\
    \ features that Python provides (like telling the computer that you need to use\
    \ a chunk of memory to store an object). Many commercial games and game consoles\
    \ are programmed in some form of C or C++.\nHere's an example of Hello World in\
    \ C:\n\n```\n#include <stdio.h>\nint main ()\n{\n    printf (\"Hello World\\n\"\
    );\n}\n```"
  merge: -1
