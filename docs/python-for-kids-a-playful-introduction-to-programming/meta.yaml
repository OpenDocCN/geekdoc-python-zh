    \ before checking again to see whether filled is True with `if filled == True`.\
    \ If it is, we turn filling off again with `t.end_fill`, and the turtle fills\
    \ the square with color.\n\nNow we can draw a filled square with this line:\n\n\
    ```\n>>> mysquare(50, True)\n```\n\nOr we can create an unfilled square with this\
    \ line:\n\n```\n>>> mysquare(150, False)\n```\n\nAfter these two calls to the\
    \ mysquare function, we get the following image, which looks a bit like a square\
    \ eye.\n\n![](img/a7a5a123e26ba8cb8ef5b41ca45700be_183_0.png)\n\nBut there's no\
    \ sense in stopping here. You can draw all sorts of shapes and fill them with\
    \ color.\n\n## DRAWING FILLED STARS\n\nFor our final example, we'll add some color\
    \ to the star we drew earlier. The original code looked like this:\n\n```\nfor\
    \ x in range(1, 19):\n    t.forward(100)\n    if x % 2 == 0:\n        t.left(175)\n\
    \    else:\n        t.left(225)\n```\n\nNow we'll make a mystar function. We'll\
    \ use the if statements from the mysquare function and add the size parameter.\n\
    \n```\n>>> def mystar(size, filled):\n        if filled == True:\n           \
    \ t.begin_fill()\n        for x in range(1, 19):\n            t.forward(size)\n\
    \            if x % 2 == 0:\n                t.left(175)\n            else:\n\
    \                t.left(225)\n        if filled == True:\n            t.end_fill()\n\
    ```\n\nIn the first two lines of this function, we check to see if filled is True,\
    \ and if it is we begin filling. We check again in the last two lines, and if\
    \ filled is True, we stop filling. Also, as with the mysquare function, we pass\
    \ the size of the star in the parameter size, and use that value when we call\
    \ `t.forward`.\n\nNow let’s set the color to gold (90 percent red, 75 percent\
    \ green, and 0 percent blue), and then call the function again.\n\n```\n>>> t.color(0.9,\
    \ 0.75, 0)\n>>> mystar(120, True)\n```\n\nThe turtle will draw this filled star:\n\
    \n![](img/a7a5a123e26ba8cb8ef5b41ca45700be_184_0.png)\n\nTo add an outline to\
    \ the star, change the color to black and redraw the star without filling:\n\n\
    ```\n>>> t.color(0,0,0)\n>>> mystar(120, False)\n```\n\nAnd the star is now gold\
    \ with a black outline, like this:\n\n![](img/a7a5a123e26ba8cb8ef5b41ca45700be_185_0.png)\n\
    \n## WHAT YOU LEARNED\n\nIn this chapter, you learned how to use the turtle module\
    \ to draw a few basic geometric shapes, using for loops and if statements to control\
    \ what the turtle does on the screen. We changed the color of the turtle's pen\
    \ and filled the shapes that it drew. We also reused the drawing code in some\
    \ functions to make it easier to draw shapes with different colors with a single\
    \ call to a function.\n\n![](img/a7a5a123e26ba8cb8ef5b41ca45700be_185_1.png)\n\
    \n## PROGRAMMING PUZZLES\n\nIn the following experiments, you will draw your own\
    \ shapes with the turtle. As always, the solutions can be found at http://python-for-kids.com/.\n\
    \n### #1: DRAWING AN OCTAGON\n\nWe've drawn stars, squares, and rectangles in\
    \ this chapter. How about creating a function to draw an eight-sided shape like\
    \ an octagon? (Hint: Try turning the turtle 45 degrees.)\n\n![](img/a7a5a123e26ba8cb8ef5b41ca45700be_186_0.png)\n\
    \n### #2: DRAWING A FILLED OCTAGON\n\nNow that you have a function to draw an\
    \ octagon, modify it so that it draws a filled octagon. Try drawing an octagon\
    \ with an outline, as we did with the star.\n\n![](img/a7a5a123e26ba8cb8ef5b41ca45700be_186_1.png)\n\
    \n### #3: ANOTHER STAR-DRAWING FUNCTION\n\nCreate a function to draw a star that\
    \ will take two parameters: the size and number of points. The beginning of the\
    \ function will look something like this:\n\n```\ndef draw_star(size, points):\n\
    ```\n\n![](img/a7a5a123e26ba8cb8ef5b41ca45700be_188_0.png)\n\n## #12 USING TKINTER\
    \ FOR BETTER GRAPHICS\n\nThe problem with using a turtle to draw is . . . that\
    \ . . . turtles . . . are . . . really . . . slow. Even when a turtle is going\
    \ at top speed, it’s still not going very fast. That’s not really a problem for\
    \ turtles, but it is a problem for computer graphics.\n\nComputer graphics, especially\
    \ in games, usually need to move fast. If you have a game console or you play\
    \ games on your computer, think for a moment about the graphics you see on the\
    \ screen. Two-dimensional (2D) graphics are flat—the characters generally move\
    \ only up and down or left and right—as in many Nintendo DS, PlayStation Portable\
    \ (PSP), and mobile phone games. In pseudo-three-dimensional (3D) games—ones that\
    \ are almost 3D—images look a little more real, but the characters generally move\
    \ only in relation to a flat plane (this is also known as *isometric graphics*).\
    \ And, finally, we have 3D games, where the pictures drawn on the screen attempt\
    \ to mimic reality. Whether the games use 2D, pseudo-3D, or 3D graphics, all have\
    \ one thing in common: the need to draw on the computer screen very quickly.\n\
    \n![](img/a7a5a123e26ba8cb8ef5b41ca45700be_189_0.png)\n\nIf you've never tried\
    \ to create your own animation, try this simple project:\n\n1.  Get a blank pad\
    \ of paper, and in the bottom corner of the first page, draw something (perhaps\
    \ a stick figure).\n2.  On the corner of the next page, draw the same stick figure,\
    \ but move its leg slightly.\n3.  On the next page, draw the stick figure again,\
    \ with the leg moved a little more.\n4.  Gradually go through each page, drawing\
    \ a modified stick figure on the bottom corner.\n\nWhen you're finished, flip\
    \ quickly through the pages, and you should see your stick figure moving. This\
    \ is the basic method used with all animation, whether it's cartoons on TV or\
    \ games on your console or computer. An image is drawn, and then drawn again with\
    \ a slight change to create the illusion of movement. To make an image look like\
    \ it is moving, you need to display each *frame*, or piece of the animation, very\
    \ quickly.\n\nPython offers different ways to create graphics. In addition to\
    \ the turtle module, you can use external modules (which need to be installed\
    \ separately), as well as the tkinter module, which you should already have in\
    \ your standard Python installation. tkinter can be used to create full applications,\
    \ like a simple word processor, as well as for simple drawing. In this chapter,\
    \ we'll explore how to use tkinter to create graphics.\n\n## CREATING A CLICKABLE\
    \ BUTTON\n\nFor our first example, we'll use tkinter to create a basic application\
    \ with a button. Enter this code:\n\n```\n>>> from tkinter import *\n>>> tk =\
    \ Tk()\n>>> btn = Button(tk, text=\"click me\")\n>>> btn.pack()\n```\n\nOn the\
    \ first line, we import the contents of the tkinter module. Using `from module-name\
    \ import *` allows us to use the contents of a module without using its name.\
    \ In contrast, when using `import turtle` in previous examples, we needed to include\
    \ the module name to access its contents:\n\n![](img/a7a5a123e26ba8cb8ef5b41ca45700be_190_0.png)\n\
    \n```\nimport turtle\nt = turtle.Pen()\n```\n\nWhen we use `import *`, we don't\
    \ need to call `turtle.Pen`, as we did in Chapters 4 and 11. This isn't so useful\
    \ with the turtle module, but it is when you are using modules with a lot of classes\
    \ and functions, because it reduces the amount you need to type.\n\n```\nfrom\
    \ turtle import *\nt = Pen()\n```\n\nOn the next line in our button example, we\
    \ create a variable containing an object of the class Tk with `tk = Tk()`, just\
    \ like we create a Pen object for the turtle. The tk object creates a basic window\
    \ to which we can then add other things, such as buttons, input boxes, or a canvas\
    \ to draw on. This is the main class provided by the tkinter module—without creating\
    \ an object of the Tk class, you won't be able to do any graphics or animations.\n\
    \nOn the third line, we create a button, with `btn = Button` and pass the tk variable\
    \ as the first parameter, and \"click me\" as the text that the button will display,\
    \ with `(tk, text=\"click me\")`. Although we've added this button to the window,\
    \ it won't be displayed until you enter the line `btn.pack()`, which tells the\
    \ button to"
  mdcn: "## 绘制填充正方形\n\n要绘制一个填充正方形，首先我们需要重置画布、开始填充，然后再次调用正方形函数，使用以下代码：\n\n```\n>>>\
    \ t.reset()\n>>> t.begin_fill()\n>>> mysquare(50)\n```\n\n在结束填充之前，你应该会看到一个空心正方形：\n\
    \n```\n>>> t.end_fill()\n```\n\n你的正方形应该看起来像这样：\n\n![](img/a7a5a123e26ba8cb8ef5b41ca45700be_182_0.png)\n\
    \n让我们修改这个函数，以便我们可以绘制填充或未填充的正方形。为此，我们需要另一个参数和稍微复杂一点的代码。\n\n```\n>>> def mysquare(size,\
    \ filled):\n        if filled == True:\n            t.begin_fill()\n        for\
    \ x in range(1, 5):\n            t.forward(size)\n            t.left(90)\n   \
    \     if filled == True:\n            t.end_fill()\n```\n\n在第一行，我们修改了函数的定义，使其接受两个参数：`size`\
    \ 和 `filled`。接下来，我们使用 `if filled == True` 检查 `filled` 的值是否设置为 `True`。如果是，我们调用\
    \ `begin_fill`，告诉海龟填充我们绘制的形状。然后我们循环四次（`for x in range(0, 4)`）来绘制矩形的四条边（向前移动并向左转），之后再次使用\
    \ `if filled == True` 检查 `filled` 是否为 `True`。如果是，我们再次使用 `t.end_fill` 关闭填充，海龟就会用颜色填充正方形。\n\
    \n现在我们可以用这行代码绘制一个填充正方形：\n\n```\n>>> mysquare(50, True)\n```\n\n或者我们可以用这行代码创建一个未填充的正方形：\n\
    \n```\n>>> mysquare(150, False)\n```\n\n在两次调用 `mysquare` 函数后，我们得到下面的图像，看起来有点像一只方形的眼睛。\n\
    \n![](img/a7a5a123e26ba8cb8ef5b41ca45700be_183_0.png)\n\n但停在这里没有意义。你可以绘制各种形状并用颜色填充它们。\n\
    \n## 绘制填充星星\n\n在我们的最后一个例子中，我们将为之前绘制的星星添加一些颜色。原始代码如下所示：\n\n```\nfor x in range(1,\
    \ 19):\n    t.forward(100)\n    if x % 2 == 0:\n        t.left(175)\n    else:\n\
    \        t.left(225)\n```\n\n现在我们将创建一个 `mystar` 函数。我们将使用 `mysquare` 函数中的 `if`\
    \ 语句，并添加 `size` 参数。\n\n```\n>>> def mystar(size, filled):\n        if filled ==\
    \ True:\n            t.begin_fill()\n        for x in range(1, 19):\n        \
    \    t.forward(size)\n            if x % 2 == 0:\n                t.left(175)\n\
    \            else:\n                t.left(225)\n        if filled == True:\n\
    \            t.end_fill()\n```\n\n在这个函数的前两行，我们检查 `filled` 是否为 `True`，如果是，我们开始填充。在最后两行我们再次检查，如果\
    \ `filled` 为 `True`，我们停止填充。此外，与 `mysquare` 函数一样，我们通过参数 `size` 传递星星的大小，并在调用 `t.forward`\
    \ 时使用该值。\n\n现在让我们将颜色设置为金色（90% 红色，75% 绿色，0% 蓝色），然后再次调用该函数。\n\n```\n>>> t.color(0.9,\
    \ 0.75, 0)\n>>> mystar(120, True)\n```\n\n海龟将绘制这个填充的星星：\n\n![](img/a7a5a123e26ba8cb8ef5b41ca45700be_184_0.png)\n\
    \n要为星星添加轮廓，将颜色更改为黑色并重新绘制未填充的星星：\n\n```\n>>> t.color(0,0,0)\n>>> mystar(120, False)\n\
    ```\n\n现在星星是金色的，带有黑色轮廓，像这样：\n\n![](img/a7a5a123e26ba8cb8ef5b41ca45700be_185_0.png)\n\
    \n## 你学到了什么\n\n在本章中，你学习了如何使用 `turtle` 模块绘制一些基本的几何形状，使用 `for` 循环和 `if` 语句来控制海龟在屏幕上的行为。我们更改了海龟画笔的颜色，并填充了它绘制的形状。我们还在一些函数中重用了绘图代码，以便通过一次函数调用就能轻松绘制不同颜色的形状。\n\
    \n![](img/a7a5a123e26ba8cb8ef5b41ca45700be_185_1.png)\n\n## 编程谜题\n\n在接下来的实验中，你将用海龟绘制自己的形状。一如既往，解决方案可以在\
    \ http://python-for-kids.com/ 找到。\n\n### #1：绘制八边形\n\n我们在本章中绘制了星星、正方形和矩形。创建一个函数来绘制像八边形这样的八边形状怎么样？（提示：尝试将海龟旋转\
    \ 45 度。）\n\n![](img/a7a5a123e26ba8cb8ef5b41ca45700be_186_0.png)\n\n### #2：绘制填充八边形\n\
    \n既然你有了一个绘制八边形的函数，修改它以绘制一个填充的八边形。尝试绘制一个带轮廓的八边形，就像我们绘制星星那样。\n\n![](img/a7a5a123e26ba8cb8ef5b41ca45700be_186_1.png)\n\
    \n### #3：另一个绘制星星的函数\n\n创建一个绘制星星的函数，它将接受两个参数：大小和点数。函数的开头应该像这样：\n\n```\ndef draw_star(size,\
    \ points):\n```\n\n![](img/a7a5a123e26ba8cb8ef5b41ca45700be_188_0.png)\n\n## #12\
    \ 使用 Tkinter 实现更好的图形\n\n使用海龟绘图的问题是……海龟……真的……很……慢。即使海龟以最高速度移动，它仍然不是很快。这对海龟来说不是真正的问题，但对计算机图形学来说是个问题。\n\
    \n计算机图形学，尤其是在游戏中，通常需要快速移动。如果你有游戏机或在电脑上玩游戏，想一想你在屏幕上看到的图形。二维（2D）图形是平面的——角色通常只上下或左右移动——就像许多任天堂\
    \ DS、PlayStation Portable（PSP）和手机游戏一样。在伪三维（3D）游戏——几乎是 3D 的游戏——中，图像看起来更真实一些，但角色通常只相对于一个平面移动（这也称为*等距图形*）。最后，我们有\
    \ 3D 游戏，其中屏幕上绘制的图像试图模仿现实。无论游戏使用 2D、伪 3D 还是 3D 图形，它们都有一个共同点：需要在计算机屏幕上非常快速地绘制。\n\
    \n![](img/a7a5a123e26ba8cb8ef5b41ca45700be_189_0.png)\n\n如果你从未尝试过创建自己的动画，试试这个简单的项目：\n\
    \n1.  拿一本空白的便签本，在第一页的底角画点东西（也许是一个火柴人）。\n2.  在下一页的底角，画同样的火柴人，但稍微移动它的腿。\n3.  在下一页，再次画火柴人，腿再移动一点。\n\
    4.  逐渐翻阅每一页，在底角画一个修改过的火柴人。\n\n完成后，快速翻动书页，你应该会看到你的火柴人在移动。这是所有动画使用的基本方法，无论是电视上的卡通还是游戏机或电脑上的游戏。绘制一个图像，然后再次绘制并稍作改变以创造运动的错觉。要使图像看起来在移动，你需要非常快速地显示每个*帧*，或动画的每一部分。\n\
    \nPython 提供了创建图形的不同方式。除了 `turtle` 模块，你还可以使用外部模块（需要单独安装），以及 `tkinter` 模块，它应该已经包含在你的标准\
    \ Python 安装中。`tkinter` 可用于创建完整的应用程序，如简单的文字处理器，也可用于简单的绘图。在本章中，我们将探索如何使用 `tkinter`\
    \ 创建图形。\n\n## 创建可点击按钮\n\n在我们的第一个例子中，我们将使用 `tkinter` 创建一个带有按钮的基本应用程序。输入以下代码：\n\n\
    ```\n>>> from tkinter import *\n>>> tk = Tk()\n>>> btn = Button(tk, text=\"click\
    \ me\")\n>>> btn.pack()\n```\n\n在第一行，我们导入 `tkinter` 模块的内容。使用 `from module-name\
    \ import *` 允许我们使用模块的内容而无需使用其名称。相比之下，在前面的例子中使用 `import turtle` 时，我们需要包含模块名称来访问其内容：\n\
    \n![](img/a7a5a123e26ba8cb8ef5b41ca45700be_190_0.png)\n\n```\nimport turtle\n\
    t = turtle.Pen()\n```\n\n当我们使用 `import *` 时，我们不需要像在第 4 章和第 11 章中那样调用 `turtle.Pen`。这对\
    \ `turtle` 模块来说不太有用，但当你使用包含大量类和函数的模块时，它很有用，因为它减少了你需要输入的内容。\n\n```\nfrom turtle\
    \ import *\nt = Pen()\n```\n\n在我们的按钮示例的下一行，我们使用 `tk = Tk()` 创建一个包含 `Tk` 类对象的变量，就像我们为海龟创建\
    \ `Pen` 对象一样。`tk` 对象创建一个基本窗口，然后我们可以向其中添加其他东西，如按钮、输入框或用于绘图的画布。这是 `tkinter` 模块提供的主要类——如果不创建\
    \ `Tk` 类的对象，你将无法进行任何图形或动画。\n\n在第三行，我们创建一个按钮，使用 `btn = Button` 并将 `tk` 变量作为第一个参数传递，将\
    \ \"click me\" 作为按钮将显示的文本，使用 `(tk, text=\"click me\")`。虽然我们已经将此按钮添加到窗口中，但直到你输入\
    \ `btn.pack()` 这一行，它才会显示，该行告诉按钮"
