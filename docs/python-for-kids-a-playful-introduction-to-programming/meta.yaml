  md: "When you're writing simple programs, functions are handy. Once you start writing\
    \ long, more complicated programs, like games, functions are *essential* (assuming\
    \ you want to finish writing your program this century).\n\n# PARTS OF A FUNCTION\n\
    \nA function has three parts: a *name*, *parameters*, and a *body*. Here's an\
    \ example of a simple function:\n\n```\n>>> def testfunc(myname):\n        print('hello\
    \ %s' % myname)\n```\n\nThe name of this function is testfunc. It has a single\
    \ parameter, myname, and its body is the block of code immediately following the\
    \ line beginning with def (short for define). A *parameter* is a variable that\
    \ exists only while a function is being used.\nYou can run the function by calling\
    \ its name, using parentheses around the parameter value:\n\n```\n>>> testfunc('Mary')\n\
    hello Mary\n```\n\nThe function could take two, three, or any number of parameters,\
    \ instead of just one:\n\n```\n>>> def testfunc(fname, lname):\n        print('Hello\
    \ %s %s' % (fname, lname))\n```\n\nThe two values for these parameters are separated\
    \ by a comma:\n\n```\n>>> testfunc('Mary', 'Smith')\nHello Mary Smith\n```\n\n\
    We could also create some variables first and then call the function with them:\n\
    \n```\n>>> firstname = 'Joe'\n>>> lastname = 'Robertson'\n>>> testfunc(firstname,\
    \ lastname)\nHello Joe Robertson\n```"
