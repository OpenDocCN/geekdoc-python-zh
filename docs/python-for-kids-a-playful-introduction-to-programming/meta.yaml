    10** continues with a few modules (basically buckets of useful functionality)
    that are installed by default with Python.

    **Chapter 11** returns to the turtle module as the reader experiments with more
    complicated shapes. **Chapter 12** moves on to using the tkinter module for more
    advanced graphics creation.

    In **Chapters 13** and **14**, we create our first game, “Bounce!,” which builds
    on the knowledge gained from the preceding chapters, and in **Chapters 15–18**,
    we create another game, “Mr. Stick Man Races for the Exit.” The game development
    chapters are where things could start to go seriously wrong. If all else fails,
