  md: "```\n>>> x = 3\n>>> print('hello %s' % x)\nhello 3\n>>> x = 4\n>>> print('hello\
    \ %s' % x)\nhello 4\n```\n\nSo using the loop has actually saved us from writing\
    \ eight extra lines of code. Good programmers hate doing things more than once,\
    \ so the for loop is one of the more popular statements in a programming language.\n\
    You don't need to stick to using the range and list functions when making for\
    \ loops. You could also use a list you've already created, such as the shopping\
    \ list from Chapter 3, as follows:\n\n```\n>>> wizard_list = ['spider legs', 'toe\
    \ of frog', 'snail tongue',\n                   'bat wing', 'slug butter', 'bear\
    \ burp']\n>>> for i in wizard_list:\n        print(i)\nspider legs\ntoe of frog\n\
    snail tongue\nbat wing\nslug butter\nbear burp\n```\n\nThis code is a way of saying,\
    \ “For each item in wizard_list, store the value in the variable i, and then print\
