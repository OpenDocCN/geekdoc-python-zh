    \n## FINAL WORDS\n\nWhether you stick with Python or decide to try out another\
    \ programming language (and there are many more than those listed here), you should\
    \ still find the concepts that you've discovered in this book useful. Even if\
    \ you don't continue with computer programming, understanding some of the fundamental\
    \ ideas can help with all sorts of activities, whether in school or later on,\
    \ at work.\n\nGood luck and have fun with your programming!\n\n*Keywords* in Python\
    \ (and in most programming languages) are words that have special meaning. They\
    \ are used as part of the programming language itself, and therefore must not\
    \ be used for anything else. For example, if you try to use keywords as variables,\
    \ or use them in the wrong way, you will get strange (sometimes funny, sometimes\
    \ confusing) error messages from the Python console.\n\nThis appendix describes\
    \ each of the Python keywords. You should find this to be a handy reference as\
    \ you continue to program.\n\n## AND\n\nThe keyword and is used to join two expressions\
    \ together in a statement (like an if statement) to say that both expressions\
    \ must be true. Here’s an example:\n\n```python\nif age > 10 and age < 20:\n \
    \   print('Beware the teenager!!!!')\n```\n\nThis code means that the value of\
    \ the variable age must be greater than 10 *and* less than 20 before the message\
    \ will be printed.\n\n## AS\n\nThe keyword as can be used to give another name\
    \ to an imported module. For example, suppose you had a module with a very long\
    \ name:\n\n```\ni_am_a_python_module_that_is_not_very_useful\n```\n\nIt would\
    \ be enormously annoying to need to type this module name every time you wanted\
    \ to use it:\n\n```python\nimport i_am_a_python_module_that_is_not_very_useful\n\
    i_am_a_python_module_that_is_not_very_useful.do_something()\nI have done something\
    \ that is not useful.\ni_am_a_python_module_that_is_not_very_useful.do_something_else()\n\
    I have done something else that is not useful!!\n```\n\nInstead, you can give\
    \ the module a new, shorter name when you import it, and then simply use that\
    \ new name (a bit like a nickname), as follows:\n\n```python\nimport i_am_a_python_module_that_is_not_very_useful\
    \ as notuseful\nnotuseful.do_something()\nI have done something that is not useful.\n\
    notuseful.do_something_else()\nI have done something else that is not useful!!\n\
    ```\n\n## ASSERT\n\nassert is a keyword used to say that some code must be true.\
    \ It’s another way of catching errors and problems in code, usually in more advanced\
    \ programs (which is why we don't use assert in this book). Here's a simple assert\
    \ statement:\n\n```python\n>>> mynumber = 10\n>>> assert mynumber < 5\nTraceback\
    \ (most recent call last):\n  File \"<pyshell#1>\", line 1, in <module>\n    assert\
    \ a < 5\nAssertionError\n```\n\nIn this example, we assert that the value of the\
    \ variable mynumber is less than 5. It isn't, and so Python displays an error\
    \ (called an AssertionError).\n\n## BREAK\n\nThe break keyword is used to stop\
    \ some code from running. You might use a break inside a for loop, like this:\n\
    \n```python\nage = 10\nfor x in range(1, 100):\n    print('counting %s' % x)\n\
    \    if x == age:\n        print('end counting')\n        break\n```\n\nSince\
    \ the variable age is set to 10 here, this code will print out the following:\n\
    \n```\ncounting 1\ncounting 2\ncounting 3\ncounting 4\ncounting 5\ncounting 6\n\
    counting 7\ncounting 8\ncounting 9\ncounting 10\nend counting\n```\n\nOnce the\
    \ value of the variable x reaches 10, the code prints the text “end counting”\
    \ and then breaks out of the loop.\n\n## CLASS\n\nThe keyword class is used to\
    \ define a type of object, like a vehicle, animal, or person. Classes can have\
    \ a function called __init__, which is used to perform all the tasks an object\
    \ of the class needs when it is created. For example, an object of the class Car\
    \ might need a variable color when it’s created:\n\n```python\nclass Car:\n  \
    \  def __init__(self, color):\n        self.color = color\n\ncar1 = Car('red')\n\
    car2 = Car('blue')\nprint(car1.color)\nred\nprint(car2.color)\nblue\n```\n\n##\
    \ CONTINUE\n\nThe continue keyword is a way to “jump” to the next item in a loop—so\
    \ that the remaining code in the loop block is not executed. Unlike break we don’t\
    \ jump out of the loop, we just carry on with the next item. For example, if we\
    \ had a list of items and wanted to skip items starting with b, we could use the\
    \ following code:\n\n```python\n>>> my_items = ['apple', 'aardvark', 'banana',\
    \ 'badger', 'clementine',\n                'camel']\n>>> for item in my_items:\n\
    \        if item.startswith('b'):\n            continue\n        print(item)\n\
    \napple\naardvark\nclementine\ncamel\n```\n\nWe create our list of items at ❶,\
    \ and then use a for loop to loop over the items and run a block of code for each\
    \ at ❷. If the item starts with the letter b at ❸, we continue to the next item\
    \ at ❹. Otherwise, at ❺ we print out the item.\n\n## DEF\n\nThe def keyword is\
