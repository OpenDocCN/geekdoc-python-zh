    \ 'I', 'want', 'more']\n>>> list3 = list1 + list2\n>>> print(list3)\n[1, 2, 3,\
    \ 4, 'I', 'ate', 'chocolate', 'and', 'I', 'want', 'more']\n```\n\n我们还可以将一个列表乘以一个数字。例如，要将\
    \ list1 乘以 5，我们写 list1 * 5：\n\n```\n>>> list1 = [1, 2]\n>>> print(list1 * 5)\n\
    [1, 2, 1, 2, 1, 2, 1, 2, 1, 2]\n```\n\n这实际上是告诉 Python 将 list1 重复五次，结果是 1, 2, 1,\
    \ 2, 1, 2, 1, 2, 1, 2。\n\n另一方面，除法（/）和减法（-）只会产生错误，如以下示例所示：\n\n```\n>>> list1 /\
    \ 20\nTraceback (most recent call last):\n  File \"<pyshell>\", line 1, in <module>\n\
    \    list1 / 20\nTypeError: unsupported operand type(s) for /: 'list' and 'int'\n\
    \n>>> list1 - 20\nTraceback (most recent call last):\n  File \"<pyshell>\", line\
    \ 1, in <module>\n    list1 - 20\nTypeError: unsupported operand type(s) for -:\
    \ 'list' and 'int'\n```\n\n但是为什么呢？嗯，用 + 连接列表和用 * 重复列表是足够直接的操作。这些概念在现实世界中也有意义。例如，如果我递给你两张纸质购物清单并说：“把这两个列表加起来”，你可能会在另一张纸上按顺序、首尾相接地写下所有项目。如果我说：“把这个列表乘以\
    \ 3”，情况可能也类似。你可以想象在另一张纸上写下这个列表的所有项目三次。\n\n但是，你如何除以一个列表呢？例如，考虑如何将一个包含六个数字（1 到 6）的列表除以二。这里只是三种不同的方式：\n\
    \n```\n[1, 2, 3]          [4, 5, 6]\n[1]                [2, 3, 4, 5, 6]\n[1, 2,\
    \ 3, 4]       [5, 6]\n```\n\n我们是应该从中间分割列表，在第一个项目后分割，还是随便找个地方分割？没有简单的答案，当你要求 Python\
    \ 除以一个列表时，它也不知道该怎么做。这就是它返回错误的原因。\n\n![](img/a7a5a123e26ba8cb8ef5b41ca45700be_62_0.png)\n\
    \n将列表与列表以外的任何东西相加也是如此。你也做不到。例如，当我们尝试将数字 50 加到 list1 时，会发生以下情况：\n\n```\n>>> list1\
    \ + 50\nTraceback (most recent call last):\n  File \"<pyshell>\", line 1, in <module>\n\
    \    list1 + 50\nTypeError: can only concatenate list (not \"int\") to list\n\
    ```\n\n为什么我们在这里会得到错误？嗯，将 50 加到一个列表意味着什么？它意味着将 50 加到每个项目上吗？但如果项目不是数字呢？它意味着将数字 50\
    \ 添加到列表的末尾或开头吗？\n在计算机编程中，命令每次输入时都应该以完全相同的方式工作。那台笨拙的计算机只看到非黑即白的东西。要求它做出复杂的决定，它就会举手投降并报错。\n\
    \n## 元组\n\n*元组*就像一个使用圆括号的列表，如本例所示：\n\n```\n>>> fibs = (0, 1, 1, 2, 3)\n>>> print(fibs[3])\n\
    2\n```\n\n这里我们将变量 fibs 定义为数字 0, 1, 1, 2 和 3。然后，与列表一样，我们使用 print(fibs[3]) 打印元组中索引位置\
    \ 3 的项目。\n元组和列表的主要区别在于，元组一旦创建就不能更改。例如，如果我们尝试将元组 fibs 中的第一个值替换为数字 4（就像我们替换 wizard_list\
    \ 中的值一样），我们会得到一条错误消息：\n\n```\n>>> fibs[0] = 4\nTraceback (most recent call last):\n\
    \  File \"<pyshell>\", line 1, in <module>\n    fibs[0] = 4\nTypeError: 'tuple'\
    \ object does not support item assignment\n```\n\n为什么你会使用元组而不是列表？基本上是因为有时使用你知道永远不会改变的东西是有用的。如果你创建一个包含两个元素的元组，它将始终包含那两个元素。\n\
    \n## PYTHON 地图不会帮你找到路\n\n在 Python 中，*map*（也称为 *dict*，*dictionary* 的缩写）是一个项目的集合，类似于列表和元组。地图与列表或元组的区别在于，地图中的每个项目都有一个*键*和一个对应的*值*。\n\
    \n例如，假设我们有一个包含人员及其最喜爱运动的列表。我们可以将这些信息放入一个 Python 列表中，先是人名，然后是他们的运动，如下所示：\n\n```\n\
    >>> favorite_sports = ['Ralph Williams, Football',\n                      'Michael\
    \ Tippett, Basketball',\n                      'Edward Elgar, Baseball',\n   \
