    \n**Table 3-1:** Keys Pointing to Values in a Map of Favorite Sports\n\n| Key\
    \ | Value |\n| :--- | :--- |\n| Ralph Williams | Football |\n| Michael Tippett\
    \ | Basketball |\n| Edward Elgar | Baseball |\n| Rebecca Clarke | Netball |\n\
    | Ethel Smyth | Badminton |\n| Frank Bridge | Rugby |\n\nNow, to get Rebecca Clarke's\
    \ favorite sport, we access our map favorite_sports using her name as the key,\
    \ like so:\n\n```\n>>> print(favorite_sports['Rebecca Clarke'])\nNetball\n```\n\
    \nAnd the answer is netball.\nTo delete a value in a map, use its key. For example,\
