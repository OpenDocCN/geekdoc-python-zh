    \ `10` 是一个整数（也称为整数），但 `10.0`、`10.1` 和 `10.253` 都是浮点数（也称为浮点数）。\n\n你可以通过简单地调用 `float`\
    \ 将字符串转换为浮点数，如下所示：\n\n```\n>>> float('12')\n12.0\n```\n\n你也可以在字符串中使用小数点：\n\n```\n\
    >>> float('123.456789')\n123.456789\n```\n\n你可能会使用 `float` 将输入到程序中的值转换为适当的数字，这在你需要将一个人输入的值与其他值进行比较时特别有用。例如，要检查一个人的年龄是否大于某个数字，我们可以这样做：\n\
    \n```\n>>> your_age = input('Enter your age: ')\nEnter your age: 20\n>>> age =\
    \ float(your_age)\n>>> if age > 13:\n        print('You are %s years too old'\
    \ % (age - 13))\nYou are 7.0 years too old\n```\n\n## INT 函数\n\n`int` 函数将字符串或数字转换为整数（或整数），这基本上意味着小数点后的所有内容都被丢弃。例如，以下是如何将浮点数转换为普通整数：\n\
    \n```\n>>> int(123.456)\n123\n```\n\n此示例将字符串转换为整数：\n\n```\n>>> int('123')\n123\n\
    ```\n\n但是尝试将包含浮点数的字符串转换为整数，你会得到一条错误消息。例如，这里我们尝试使用 `int` 函数转换包含浮点数的字符串：\n\n```\n\
    >>> int('123.456')\nTraceback (most recent call last):\n  File \"<pyshell>\",\
