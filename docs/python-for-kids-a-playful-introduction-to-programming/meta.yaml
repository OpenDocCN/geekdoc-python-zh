  md: "A function is often used to return a value, using a return statement. For example,\
    \ you could write a function to calculate how much money you were saving:\n\n\
    ```\n>>> def savings(pocket_money, paper_route, spending):\n        return pocket_money\
    \ + paper_route - spending\n```\n\nThis function takes three parameters. It adds\
    \ the first two (pocket_money and paper_route) and subtracts the last (spending).\
    \ The result is returned and can be assigned to a variable (the same way we set\
    \ other values to variables) or printed:\n\n```\n>>> print(savings(10, 10, 5))\n\
    15\n```\n\n# VARIABLES AND SCOPE\n\nA variable that’s inside the body of a function\
    \ can’t be used again when the function has finished running because it exists\
    \ only inside the function. In the world of programming, this is called scope.\n\
    Let’s look at a simple function that uses a couple of variables but doesn’t have\
    \ any parameters:\n\n```\n❶ >>> def variable_test():\n        first_variable =\
    \ 10\n        second_variable = 20\n❷     return first_variable * second_variable\n\
    ```\n\nIn this example, we create the function called variable_test at ❶, which\
    \ multiplies two variables (first_variable and second_variable) and returns the\
    \ result at ❷.\n\n```\n>>> print(variable_test())\n200\n```\n\nIf we call this\
    \ function using print, we get the result: 200. However, if we try to print the\
    \ contents of first_variable (or"
