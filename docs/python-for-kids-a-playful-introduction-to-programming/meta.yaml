    # KEEPING TRACK OF KEYWORDS WITH THE KEYWORD MODULE


    A Python *keyword* is any word in Python that is part of the language itself,
    such as if, else, and for. The keyword module contains a function named iskeyword
    and a variable called kwlist. The function iskeyword returns true if any string
    is a Python keyword. The variable kwlist returns a list of all Python keywords.


    Notice in the following code that the function iskeyword returns true for the
    string if and false for the string ozwald. You can see the full list of keywords
    when we print the contents of the variable, which is useful because keywords don’t
    always stay the same. New versions (or older versions) of Python may have different
    keywords.


    ```

    >>> import keyword

    >>> print(keyword.iskeyword(''if''))

    True

    >>> print(keyword.iskeyword(''ozwald''))

    False

    >>> print(keyword.kwlist)

    [''False'', ''None'', ''True'', ''and'', ''as'', ''assert'', ''break'', ''class'',
    ''continue'', ''def'', ''del'', ''elif'', ''else'', ''except'', ''finally'', ''for'',
    ''from'', ''global'', ''if'', ''import'', ''in'', ''is'', ''lambda'', ''nonlocal'',
    ''not'', ''or'', ''pass'', ''raise'', ''return'', ''try'', ''while'', ''with'',
    ''yield'']

    ```


    You can find a description of each keyword in the Appendix.


    # GETTING RANDOM NUMBERS WITH THE RANDOM MODULE


    The random module contains a number of functions that are useful for generating
    random numbers—kind of like asking the computer to “pick a number.” The most useful
    functions in the random module are randint, choice, and shuffle.'
- md: "## USING RANDINT TO PICK A RANDOM NUMBER\n\nThe `randint` function picks a\
    \ random number between a range of numbers, say between 1 and 100, between 100\
    \ and 1000, or between 1000 and 5000. Here’s an example:\n\n```python\n>>> import\
    \ random\n>>> print(random.randint(1, 100))\n58\n>>> print(random.randint(100,\
    \ 1000))\n861\n>>> print(random.randint(1000, 5000))\n3795\n```\n\nYou might use\
    \ `randint` to do something like create a simple (and annoying) guessing game,\
    \ using a `while` loop, like this:\n\n```python\n>>> import random\n>>> num =\
    \ random.randint(1, 100)\n>>> while True:\n        print('Guess a number between\
    \ 1 and 100')\n        guess = input()\n        i = int(guess)\n        if i ==\
    \ num:\n            print('You guessed right')\n            break\n        elif\
    \ i < num:\n            print('Try higher')\n        elif i > num:\n         \
    \   print('Try lower')\n```\n\nFirst, we import the `random` module, and then\
    \ we set the variable `num` to a random number using `randint` with a range of\
    \ 1 to 100. We then create a `while` loop at ❶ that will loop forever (or at least\
    \ until the player guesses the number).\nNext, we print a message at ❷, and then\
    \ use `input` to get input from the user, which we store in the variable `guess`\
    \ at ❸. We convert the input to a number using `int`, and save it in the variable\
    \ `i` at ❹. Then we compare it with the randomly selected number at ❺.\nIf the\
    \ input and the randomly generated number are equal, we print “You guessed right,”\
    \ and then exit the loop at ❻. If the numbers aren’t equal, we check to see if\
    \ the number the player guessed is higher than the random number at ⑦, or lower\
    \ at ⑧, and print a hint message accordingly.\nThis code is a bit long, so you\
    \ may want to type it into a new shell window or create a text document, save\
    \ it, and then run it in IDLE. Here’s a reminder of how to open and run a saved\
    \ program:\n\n1.  Start IDLE and choose **File ▸ Open**.\n2.  Browse to the directory\
    \ where you saved the file, and click the filename to select it.\n3.  Click **Open**.\n\
    4.  After the new window opens, choose **Run ▸ Run Module**.\n\nHere’s what happens\
    \ when we run the program:\n\n## USING CHOICE TO PICK A RANDOM ITEM FROM A LIST\n\
    \nIf you want to pick a random item from a list instead of a random number from\
    \ a given range, you can use `choice`. For example, you might want Python to choose\
    \ your dessert for you.\n\n```python\n>>> import random\n>>> desserts = ['ice\
    \ cream', 'pancakes', 'brownies', 'cookies', 'candy']\n>>> print(random.choice(desserts))\n\
    brownies\n```\n\nLooks like you’ll be having brownies—not a bad choice at all.\n\
    \n## USING SHUFFLE TO SHUFFLE A LIST\n\nThe `shuffle` function shuffles a list,\
    \ mixing up the items. If you’re working along in IDLE and you just imported `random`\
    \ and created the `desserts` list in the previous example, you could skip right\
    \ to the `random.shuffle` command in the following code.\n\n```python\n>>> import\
    \ random\n>>> desserts = ['ice cream', 'pancakes', 'brownies', 'cookies',\n  \
    \            'candy']\n>>> random.shuffle(desserts)\n>>> print(desserts)\n['pancakes',\
    \ 'ice cream', 'candy', 'brownies', 'cookies']\n```\n\nYou can see the results\
    \ of the shuffle when we print the list—the order is completely different. If\
    \ you were writing a card game, you might use this to shuffle a list representing\
    \ a deck of cards.\n\n## CONTROLLING THE SHELL WITH THE SYS MODULE\n\nThe `sys`\
    \ module contains system functions that you can use to control the Python shell\
    \ itself. Here, we’ll look at how to use `exit` function, `stdin` and `stdout`\
    \ objects, and `version` variable.\n\n## EXITING THE SHELL WITH THE EXIT FUNCTION\n\
    \nThe `exit` function is a way of stopping the Python shell or console. Enter\
    \ the following code, and you’ll be prompted with a dialog asking if you want\
    \ to exit. Click **Yes**, and the shell will shut down.\n\n```python\n>>> import\
    \ sys\n>>> sys.exit()\n```\n\nThis won't work if you're not using the modified\
    \ version of IDLE that we set up in Chapter 1. Instead, you'll get an error, like\
    \ this:\n\n```python\n>>> import sys\n>>> sys.exit()\nTraceback (most recent call\
    \ last):\n  File \"<pyshell#1>\", line 1, in <module>\n    sys.exit()\nSystemExit\n\
    ```\n\n## READING WITH THE STDIN OBJECT\n\nThe `stdin` object (short for *standard\
    \ input*) in the `sys` module prompts a user to enter information to be read into\
    \ the shell and used by the program. As you learned in Chapter 7, this object\
    \ has a `readline` function, which is used to read a line of text typed on the\
    \ keyboard until the user presses ENTER. It works like the `input` function that\
    \ we used in the random number guessing game earlier in this chapter. For example,\
    \ enter the following:\n\n```python\n>>> import sys\n>>> v = sys.stdin.readline()\n\
    He who laughs last thinks slowest\n```\n\nPython will store the string `He who\
    \ laughs last thinks slowest` in the variable `v`. To confirm this, print the\
    \ contents of `v`:\n\n```python\n>>> print(v)\nHe who laughs last thinks slowest\n\
    ```\n\nOne of the differences between `input` and the `readline` function is that\
    \ with `readline`, you can specify the number of characters to read as a parameter.\
    \ For example:\n\n```python\n>>> v = sys.stdin.readline(13)\nHe who laughs last\
    \ thinks slowest\n>>> print(v)\nHe who laughs\n```\n\n## WRITING WITH THE STDOUT\
    \ OBJECT\n\nUnlike `stdin`, the `stdout` object (short for *standard output*)\
    \ can be used to write messages to the shell (or console), rather than reading\
    \ them in. In some ways, it’s the same as `print`, but `stdout` is a file object,\
    \ so it has the same functions we used in Chapter 9, such as `write`. Here’s an\
    \ example:\n\n```python\n>>> import sys\n>>> sys.stdout.write(\"What does a fish\
    \ say when it swims into a wall? Dam.\")\nWhat does a fish say when it swims into\
    \ a wall? Dam.52\n```\n\nNotice that when `write` finishes, it returns a count\
    \ of the number of characters it has written. You can see 52 printed into the\
    \ shell at the end of the message. We could save this value to a variable in order\
    \ to record, over time, how many characters we have written to the screen.\n\n\
    ## WHICH VERSION OF PYTHON AM I USING?\n\nThe variable `version` displays your\
    \ version of Python, which can be useful if you want to make sure you’re up-to-date.\
    \ Some programmers like to print information when their programs start up. For\
    \ example, you might put the version of Python into an About window of your program,\
    \ like this:\n\n```python\n>>> import sys\n>>> print(sys.version)\n3.1.2 (r312:79149,\
    \ Mar 21 2013, 00:41:52) [MSC v.1500 32 bit (Intel)]\n```\n\n## DOING TIME WITH\
    \ THE TIME MODULE\n\nPython’s `time` module contains functions for displaying\
    \ the time, though not necessarily as you might expect. Try this:\n\n```python\n\
    >>> import time\n>>> print(time.time())\n1300139149.34\n```\n\nThe number returned\
    \ by the call to `time()` is actually the number of seconds since January 1, 1970,\
    \ at 00:00:00 AM to be exact. On its own, this unusual reference point may not\
    \ seem immediately useful, but it can serve a purpose. For example, to find out\
    \ how long parts of your program take to run, you can record the time at the beginning\
    \ and end, and compare the values. Let's try this to find out how long it will\
    \ take to print all numbers from 0 to 999.\n\nFirst, create a function like this:\n\
    \n```python\n>>> def lots_of_numbers(max):\n        for x in range(0, max):\n\
    \            print(x)\n```\n\nNext, call the function with `max` set to 1000:\n\
    \n```python\n>>> lots_of_numbers(1000)\n```\n\nThen work out how long the function\
    \ takes by modifying our program with the `time` module.\n\n```python\n>>> def\
    \ lots_of_numbers(max):\n    t1 = time.time()\n    for x in range(0, max):\n \
    \       print(x)\n    t2 = time.time()\n    print('it took %s seconds' % (t2-t1))\n\
    ```\n\nCalling the program again, we get the following result (which will vary\
    \ depending on the speed of your system):\n\n```python\n>>> lots_of_numbers(1000)\n\
    0\n1\n2\n3\n.\n.\n.\n997\n998\n999\nit took 50.159196853637695 seconds\n```\n\n\
    Here's how this works: The first time we call the `time()` function, we assign\
    \ the value returned to the variable `t1` at ❶. We then loop and print all the\
    \ numbers in the third and fourth lines at ❷. After the loop, we again call `time()`,\
    \ and assign the value returned to the variable `t2` at ❸. Since it took several\
    \ seconds for the loop to complete, the value in `t2` will be higher than `t1`\
    \ because more seconds will have passed since January 1, 1970. Subtracting `t1`\
    \ from `t2` as we do at ❹, we get the number of seconds it took to print all those\
    \ numbers.\n\n## CONVERTING A DATE WITH ASCTIME\n\nThe function `asctime` takes\
    \ a date as a tuple and converts it into something more readable. (Remember that\
    \ a tuple is like a list with items that you can't change.) As you saw in Chapter\
    \ 7, calling `asctime` without any parameters will display the current date and\
    \ time in a readable form.\n\n```python\n>>> import time\n>>> print(time.asctime())\n\
    Mon Mar 11 22:03:41 2013\n```\n\nTo call `asctime` with a parameter, we first\
    \ create a tuple with values for the date and time. For example, here we assign\
    \ the tuple to the variable `t`:\n\n```python\n>>> t = (2007, 5, 27, 10, 30, 48,\
    \ 6, 0, 0)\n```\n\nThe values in the sequence are year, month, day, hours, minutes,\
    \ seconds, day of the week (0 is Monday, 1 is Tuesday, and so on), day of the\
    \ year (we put 0 as a placeholder), and whether or not it is daylight saving time\
    \ (0 if it isn't; 1 if it is). Calling `asctime` with a similar tuple, we get\
    \ this:\n\n```python\n>>> import time\n>>> t = (2020, 2, 23, 10, 30, 48, 6, 0,\
    \ 0)\n>>> print(time.asctime(t))\nSun Feb 23 10:30:48 2020\n```\n\n## GETTING\
    \ THE DATE AND TIME WITH LOCALTIME\n\nUnlike `asctime`, the function `localtime`\
    \ returns the current date and time as an object, with the values in roughly the\
    \ same order"
