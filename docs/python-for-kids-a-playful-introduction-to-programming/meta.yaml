    # USING BUILT-IN FUNCTIONS


    We''ll look at 12 built-in functions that are commonly used by Python programmers.
    I''ll describe what they do and how to use them, and then show examples of how
    they can help in your programs.


    # THE ABS FUNCTION


    The abs function returns the *absolute value* of a number, which is the value
    of a number without its sign. For example, the absolute value of 10 is 10, and
    the absolute value of –10 is 10.

    To use the abs function, simply call it with a number or variable as its parameter,
    like this:


    ```

    >>> print(abs(10))

    10

    >>> print(abs(-10))

    10

    ```


    You might use the abs function to do something like calculate an absolute amount
    of movement of a character in a game, no matter in which the direction that character
    is traveling. For example, say the character takes three steps to his right (positive
    3) and then ten steps to his left (negative 10, or –10). If we didn''t care about
    the direction (positive or negative), the absolute value of these numbers would
    be 3 and 10. You might use this in a board game where you roll two dice and then
    move your character a maximum number of steps in any direction, based on the total
    of the dice. Now, if we store the number of steps in a variable, we can determine
    if the character is moving with the code


    ![](img/a7a5a123e26ba8cb8ef5b41ca45700be_135_0.png)'
