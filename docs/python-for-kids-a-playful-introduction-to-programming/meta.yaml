    # OPENING AN UBUNTU FILE


    If you are using Ubuntu, you''ll need to enter a different location on the first
    line of the Windows example to open *test.txt*. Use the username you clicked when
    saving the text file. For example, if the username is *jacob*, the open parameter
    should look like this:


    ```

    >>> test_file = open(''/home/jacob/test.txt'')

    ```


    # WRITING TO FILES


    The file object returned by open has other functions besides read. We can create
    a new, empty file by using a second parameter, the string ''w'', when we call
    the function:


    ```

    >>> test_file = open(''c:\myfile.txt'', ''w'')

    ```


    The parameter ''w'' tells Python that we want to write to the file object, rather
    than read from it.'
