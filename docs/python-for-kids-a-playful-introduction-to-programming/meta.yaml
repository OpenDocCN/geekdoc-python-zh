    # # 8 HOW TO USE CLASSES AND OBJECTS


    Why is a giraffe like a sidewalk? Because both a giraffe and a sidewalk are *things*,
    known in the English language as *nouns* and in Python as *objects*.


    The idea of *objects* is an important one in the world of computers. Objects are
    a way of organizing code in a program and breaking things down to make it easier
    to think about complex ideas. (We used an object in Chapter 4 when we worked with
    the turtle—Pen.)'
