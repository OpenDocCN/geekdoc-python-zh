  md: '# STRINGS


    In programming terms, we usually call text a *string*. When you think of a string
    as a collection of letters, the term makes sense. All the letters, numbers, and
    symbols in this book could be a string. For that matter, your name could be a
    string, and so could your address. In fact, the first Python program we created
    in Chapter 1 used a string: “Hello World.”


    ![](img/a7a5a123e26ba8cb8ef5b41ca45700be_51_0.png)


    # CREATING STRINGS


    In Python, we create a string by putting quotes around text. For example, we could
    take our otherwise useless fred variable from Chapter 2 and use it to label a
    string, like this:


    ```

    fred = "Why do gorillas have big nostrils? Big fingers!!"

    ```


    Then, to see what’s inside fred, we could enter print(fred), like this:


    ```

    >>> print(fred)

    Why do gorillas have big nostrils? Big fingers!!

    ```


    You can also use single quotes to create a string, like this:


    ```

    >>> fred = ''What is pink and fluffy? Pink fluff!!''

    >>> print(fred)

    What is pink and fluffy? Pink fluff!!

    ```


    However, if you try to enter more than one line of text for your string using
    only a single quote ('') or double quote (") or if you start with one type of
    quote and try to finish with another, you’ll get an error message in the Python
    shell. For example, enter the following line:


    ```

    >>> fred = "How do dinosaurs pay their bills?

    ```


    You’ll see this result:


    ```

    SyntaxError: EOL while scanning string literal

    ```'
  merge: -1
  pgno: 51
- img_proc: true
  md: 'This is an error message complaining about syntax because you did not follow
    the rules for ending a string with a single or double quote.


    *Syntax* means the arrangement and order of words in a sentence or, in this case,
    the arrangement and order of words and symbols in a program. So *SyntaxError*
    means that you did something in an order Python was not expecting, or Python was
    expecting something that you missed. *EOL* means *end-of-line*, so the rest of
    the error message is telling you that Python hit the end of the line and did not
    find a double quote to close the string.


    To use more than one line of text in your string (called a *multiline string*),
    use three single quotes (''''''), and then hit ENTER between lines, like this:


    ```

    >>> fred = ''''''How do dinosaurs pay their bills?

    With tyrannosaurus checks!''''''

    ```


    Now let''s print out the contents of fred to see if this worked:


    ```

    >>> print(fred)

    How do dinosaurs pay their bills?

    With tyrannosaurus checks!

    ```


    # HANDLING PROBLEMS WITH STRINGS


    Now consider this crazy example of a string, which causes Python to display an
    error message:


    ```

    >>> silly_string = ''He said, "Aren''t can''t shouldn''t wouldn''t."''

    SyntaxError: invalid syntax

    ```


    In the first line, we try to create a string (defined as the variable silly_string)
    enclosed by single quotes, but also containing a mixture of single quotes in the
    words can''t, shouldn''t, and wouldn''t, as well as double quotes. What a mess!


    Remember that Python itself is not as smart as a human being, so all it sees is
    a string containing He said, "Aren, followed by a bunch of other characters that
    it doesn''t expect. When Python sees a quotation mark (either a single or double
    quote), it expects a string to start following the first mark and the string to
    end after the next matching quotation mark (either single or double) on that line.
    In this case, the start of the string is the single quotation mark'
  merge: -1
  pgno: 52
- img_proc: true
  md: 'before He, and the end of the string, as far as Python is concerned, is the
    single quote after the n in Aren. IDLE highlights the point where things have
    gone wrong:


    ![](img/a7a5a123e26ba8cb8ef5b41ca45700be_53_0.png)


    The last line of IDLE tells us what sort of error occurred—in this case, a syntax
    error.

    Using double instead of single quotes still produces an error:


    ```

    >>> silly_string = "He said, "Aren''t can''t shouldn''t wouldn''t.""

    SyntaxError: invalid syntax

    ```


    Here, Python sees a string bounded by double quotes, containing the letters He
    said, (and a space). Everything following that string (from Aren''t on) causes
    the error:


    ![](img/a7a5a123e26ba8cb8ef5b41ca45700be_53_1.png)


    This is because, from Python''s perspective, all that extra stuff just isn''t
    supposed to be there. Python looks for the next matching quote and doesn''t know
    what you want it to do with anything that follows that quote on the same line.'
  merge: -1
