    \ call last):\n  File \"<stdin>\", line 1, in <module>\nNameError: name 'gmtime'\
    \ is not defined\n```\n\nThe error message name 'gmtime' is not defined means\
    \ that Python doesn't know anything about the function gmtime, which is because\
    \ you haven't imported it.\nIf there are a number of functions in a particular\
    \ module that you want to use, and you don't want to refer to them by using the\
    \ module name (for example, time.localtime, or time.gmtime), you can import everything\
    \ in the module using an asterisk (*), like this:\n\n```\n>>> from time import\
    \ *\n>>> print(localtime())\n(2007, 1, 30, 20, 57, 7, 1, 30, 0)\n>>> print(gmtime())\n\
    (2007, 1, 30, 13, 57, 9, 1, 30, 0)\n```\n\nThis form imports everything from the\
    \ time module, and you can now refer to the individual functions by name.\n\n\
    # GLOBAL\n\nThe idea of scope in programs is introduced in Chapter 7. Scope refers\
    \ to the *visibility* of a variable. If a variable is defined outside"
