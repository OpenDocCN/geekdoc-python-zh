    the paddle (pos[1]), we might have jumped past that position. In that case, the
    ball would continue traveling, and it would pass through the paddle without stopping.


    # ADDING AN ELEMENT OF CHANCE


    Now it’s time to turn our program into a game rather than just a bouncing ball
    and a paddle. Games need an element of chance—some way for the player to lose.
    In our current game, the ball will bounce forever, so there’s nothing to lose.


    We’ll finish our game by adding code that says that the game ends if the ball
    hits the bottom of the canvas (in other words, once it hits the ground).


    ![](img/a7a5a123e26ba8cb8ef5b41ca45700be_237_1.png)'
