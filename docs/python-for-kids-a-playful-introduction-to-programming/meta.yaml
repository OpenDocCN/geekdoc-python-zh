    \ to figure out what the class should do, before getting into the details of the\
    \ individual functions.\nWe can also add functions to the other two classes, Mammals\
    \ and Giraffes. Each class will be able to use the characteristics (the functions)\
    \ of its parent. This means that you don't need to make one really complicated\
