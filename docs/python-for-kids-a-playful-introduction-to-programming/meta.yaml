- img_proc: true
  md: "In this chapter, you'll learn how to use if statements to build programs.\n\
    \n# IF STATEMENTS\n\nAn if statement might be written in Python like this:\n\n\
    ```\n>>> age = 13\n>>> if age > 20:\n        print('You are too old!')\n```\n\n\
    An if statement is made up of the if keyword, followed by a condition and a colon\
    \ (:), as in if age > 20:. The lines following the colon must be in a block, and\
    \ if the answer to the question is yes (or true, as we say in Python programming),\
    \ the commands in the block will be run. Now, let's explore how to write blocks\
    \ and conditions.\n\n![](img/a7a5a123e26ba8cb8ef5b41ca45700be_79_0.png)\n\n# A\
    \ BLOCK IS A GROUP OF PROGRAMMING STATEMENTS\n\nA block of code is a grouped set\
    \ of programming statements. For example, when if age > 20: is true, you might\
    \ want to do more than just print “You are too old!” Perhaps you want to print\
    \ out a few other choice sentences, like this:\n\n```\n>>> age = 25\n>>> if age\
    \ > 20:\n        print('You are too old!')\n        print('Why are you here?')\n\
    \        print('Why aren\\'t you mowing a lawn or sorting papers?')\n```"
