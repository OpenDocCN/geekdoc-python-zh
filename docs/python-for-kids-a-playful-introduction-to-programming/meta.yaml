    # THE EXEC FUNCTION


    The exec function is like eval, except that you can use it to run more complicated
    programs. The difference between the two is that eval returns a value (something
    that you can save in a variable), whereas exec does not. Here''s an example:


    ```

    >>> my_small_program = ''''''print(''ham'')

    print(''sandwich'')''''''

    >>> exec(my_small_program)

    ham

    sandwich

    ```


    In the first two lines, we create a variable with a multiline string containing
    two print statements, and then use exec to run the string.

    You could use exec to run mini programs that your Python program reads in from
    files—really, programs inside programs! This can be quite useful when writing
    long, complicated applications. For example, you could create a Dueling Robots
    game, where two robots move around a screen and try to attack each other. Players
    of the game would provide the instructions for their robot as mini Python programs.
    The Dueling Robots game would read in these scripts and use exec to run.


    # THE FLOAT FUNCTION


    The float function converts a string or a number into a floating-point number,
    which is a number with a decimal place (also called a real number). For example,
    the number 10 is an integer (also called a whole number), but 10.0, 10.1, and
    10.253 are all floating-point numbers (also called floats).


    ![](img/a7a5a123e26ba8cb8ef5b41ca45700be_141_0.png)'
