- md: "Now here's where objects start to become powerful. Having created our turtle\
    \ objects, we can call functions on each, and they will draw independently. Try\
    \ this:\n\n```\n>>> avery.forward(50)\n>>> avery.right(90)\n>>> avery.forward(20)\n\
    ```\n\nWith this series of instructions, we tell Avery to move forward 50 pixels,\
    \ turn right 90 degrees, and move forward 20 pixels so that she finishes facing\
    \ downward. Remember that turtles always start off facing to the right.\nNow it's\
    \ time to move Kate.\n\n```\n>>> kate.left(90)\n>>> kate.forward(100)\n```\n\n\
    We tell Kate to turn left 90 degrees, and then move forward 100 pixels so that\
    \ she ends facing up.\nSo far, we have a line with arrowheads moving in two different\
    \ directions, with the head of each arrow representing a different turtle object:\
    \ Avery pointing down, and Kate facing up.\n\n![](img/a7a5a123e26ba8cb8ef5b41ca45700be_126_0.png)\n\
    \nNow let's add another turtle, Jacob, and move him, too, without bugging Kate\
    \ or Avery.\n\n```\n>>> jacob = turtle.Pen()\n>>> jacob.left(180)\n>>> jacob.forward(80)\n\
    ```\n\n![](img/a7a5a123e26ba8cb8ef5b41ca45700be_127_0.png)\n\nFirst, we create\
    \ a new Pen object called jacob, then we turn him left 180 degrees, and then move\
    \ him forward 80 pixels. Our drawing now looks like this, with three turtles:\n\
    \n![](img/a7a5a123e26ba8cb8ef5b41ca45700be_127_1.png)\n\nRemember that every time\
    \ we call turtle.Pen() to create a turtle, we add a new, independent object. Each\
    \ object is still an instance of the class Pen, and we can use the same functions\
    \ on each object, but because we're using objects, we can move each turtle independently.\
    \ Like our independent giraffe objects (Reginald and Harold), Avery, Kate, and\
    \ Jacob are independent turtle objects. If we create a new object with the same\
    \ variable name as an object we've already created, the old object won't necessarily\
    \ vanish. Try it for yourself: Create another Kate turtle and try moving it around.\n\
