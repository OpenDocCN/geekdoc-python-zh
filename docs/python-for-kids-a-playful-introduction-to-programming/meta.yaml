  md: '![](img/a7a5a123e26ba8cb8ef5b41ca45700be_246_0.png)


    # # 15 CREATING GRAPHICS FOR THE MR. STICK MAN GAME


    It’s a good idea to develop a plan when creating a game (or any program). Your
    plan should include a description of what the game is about, as well as a description
    of the game’s major elements and characters. When it’s time to start programming,
    your description will help keep you focused on what you are trying to develop.
    Your game might not turn out exactly like the original description—and that’s
    okay as well.


    In this chapter, we’ll begin developing a fun game called Mr. Stick Man Races
    for the Exit.'
  merge: -1
  pgno: 246
- img_proc: true
  md: '# MR. STICK MAN GAME PLAN


    Here’s the description of our new game:


    +   - Secret agent Mr. Stick Man is trapped in the lair of Dr. Innocuous, and
    you want to help him escape through the exit on the top floor.

    - The game has a stick figure that can run from left to right and jump up. There
    are platforms on each floor that he must jump to.

    - The goal of the game is to reach the door to the exit, before it’s too late
    and the game ends.


    ![](img/a7a5a123e26ba8cb8ef5b41ca45700be_247_0.png)


    Based on this description, we know we’ll need several images, including ones for
    Mr. Stick Man, the platforms, and the door. We’ll obviously need code to pull
    all this together, but before we get there, we’ll create the graphics for our
    game in this chapter. That way, we’ll have something to work with in the next
    chapter.


    How will we draw the elements in our game? We could use graphics like the ones
    that we created for the bouncing ball and paddle in the previous chapters, but
    those are far too simple for this game. Instead, we’re going to create sprites.


    *Sprites* are the things in a game—typically a character of some kind. Sprites
    are usually *prerendered*, meaning they are drawn in advance (before the program
    runs) rather than being created by the program itself using polygons, as in our
    Bounce! game. Mr. Stick Man will be a sprite, and the platforms will be sprites,
    too. In order to create these images, you’ll need to install a graphics program.


    # GETTING GIMP


    Several graphics programs are available, but for this game, we need one that supports
    *transparency* (sometimes called the *alpha channel*), which lets images have
    sections where no colors are drawn on the screen. We need images with transparent
    parts'
  merge: -1
  pgno: 247
- img_proc: true
  md: 'because when one image passes over or near another as it moves across the screen,
    we don''t want the background of one image to wipe out part of another. For example,
    in this image, the checkerboard pattern in the background represents the transparent
    area:


    ![](img/a7a5a123e26ba8cb8ef5b41ca45700be_248_0.png)


    So if we copy the entire image and paste it over the top of another image, the
    background won''t wipe anything out:


    ![](img/a7a5a123e26ba8cb8ef5b41ca45700be_248_1.png)'
  merge: -1
  pgno: 248
- img_proc: true
  md: 'GIMP (http://www.gimp.org/), short for GNU Image Manipulation Program, is a
    free graphics program for Linux, Mac OS X, and Windows that supports transparent
    images. Download and install it as follows:


    +   - If you''re using Windows, you''ll be able to find Windows installers on
    the GIMP-WIN project page at http://gimp-win.sourceforge.net/stable.html.

    - If you''re using Ubuntu, install GIMP by opening the Ubuntu Software Center
    and entering *gimp* in the search box. Click the Install button for the GIMP Image
    Editor when it appears in the results.

    - If you''re using Mac OS X, download an application bundle from http://gimp.lisanet.de/Website/Download.html.


    You should also create a directory for your game. To do so, right-click your desktop
    anywhere there is empty space and select **New ▸ Folder** (on Ubuntu, the option
    is **Create New Folder**; on Mac OS X, it''s **New Folder**). In the dialog, enter
    *stickman* for the folder name.


    # CREATING THE GAME ELEMENTS


    Once you have your graphics program installed, you''re ready to draw. We''ll create
    these images for our game elements:


    +   - Images for a stick figure that can run left and right and jump

    - Images for the platform, in three different sizes

    - Images for the door: one open and one closed

    - An image for the game''s background (because a plain white or gray background
    makes for a boring game)


    Before we start drawing, we need to prepare our images with transparent backgrounds.


    # PREPARING A TRANSPARENT IMAGE


    To set up an image with transparency—an alpha channel—start up GIMP, and then
    follow these steps:


    +   1. Select **File ▸ New**.'
  merge: -1
  pgno: 249
- img_proc: true
  md: '+   2. In the dialog, enter 27 pixels for the image width and 30 pixels for
    its height.

    3. Select **Layer ▸ Transparency ▸ Add Alpha Channel**.

    4. Select **Select ▸ All**.

    5. Select **Edit ▸ Cut**.


    The end result should be an image filled with a checkerboard of dark gray and
    light gray, as shown here (zoomed in):


    ![](img/a7a5a123e26ba8cb8ef5b41ca45700be_250_0.png)


    Now we can begin creating our secret agent: Mr. Stick Man.


    # DRAWING MR. STICK MAN


    To draw our first stick figure image, click the Paintbrush tool in the GIMP Toolbox,
    and then select the brush that looks like a small dot in the Brushes toolbar (usually
    at the bottom right of the screen), as shown on the right.


    ![](img/a7a5a123e26ba8cb8ef5b41ca45700be_250_1.png)


    We''ll draw three different images (or *frames*) for our stick figure to show
    him running and jumping to the right. We''ll use these frames to animate Mr. Stick
    Man, as we did for the animation in Chapter 12.'
  merge: -1
  pgno: 250
- img_proc: true
  md: 'If you zoom in to look at these images, they might look like this:


    ![](img/a7a5a123e26ba8cb8ef5b41ca45700be_251_0.png)


    Your images don''t need to look exactly the same, but they should have the stick
    figure with three different positions of movement. Remember that each one is 27
    pixels wide by 30 pixels tall.


    # MR. STICK MAN RUNNING TO THE RIGHT


    First, we''ll draw a sequence of frames for Mr. Stick Man running to the right.
    Create the first image as follows:


    +   1. Draw the first image (the leftmost image in the preceding illustration).

    2. Select **File ▸ Save As**.

    3. In the dialog, enter *figure-R1.gif* for the name. Then click the small plus
    (+) button labeled **Select File Type**.

    4. Select **GIF image** in the list that appears.

    5. Save the file to the *stickman* directory you created earlier (click **Browse
    for Other Folders** to find the correct directory).


    Follow the same steps to create a new 27 pixel by 30 pixel image, and then draw
    the next Mr. Stick Man image. Save this image as *figure-R2.gif*. Repeat the process
    for the final image, and save it as *figure-R3.gif*.


    ![](img/a7a5a123e26ba8cb8ef5b41ca45700be_251_1.png)'
