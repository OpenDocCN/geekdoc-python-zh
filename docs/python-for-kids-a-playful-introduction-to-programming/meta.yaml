  md: '# WHAT YOU LEARNED


    In this chapter, you learned how to write a basic plan for a game (Mr. Stick Man
    Races for the Exit in this case) and figured out where to begin. Because we need
    graphical elements before we can make a game, we used a graphics program to create
    the basic graphics for our game. In the process, you learned how to make the backgrounds
    of these images transparent so they don''t cover up other images on the screen.


    In the next chapter, we''ll create some of the classes for our game.


