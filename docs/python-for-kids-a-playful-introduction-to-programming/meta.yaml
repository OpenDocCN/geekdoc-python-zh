  md: '# GAMES AND GRAPHICS PROGRAMMING


    If you want to do more with games or graphics programming, you’ll find many options
    available. Here are just a few:


    +   - BlitzBasic (http://www.blitzbasic.com/), which uses a special version of
    the BASIC programming language designed specifically for games

    - Adobe Flash, a type of animation software designed to run in the browser, which
    has its own programming language called ActionScript (http://www.adobe.com/devnet/actionscript.html)

    - Alice (http://www.alice.org/), a 3D programming environment (for Microsoft Windows
    and Mac OS X only)

    - Scratch (http://scratch.mit.edu/), a tool for developing games

    - Unity3D (http://unity3d.com/), another tool for creating games


    An online search will uncover a wealth of resources to help you get started with
    any of these options.

    On the other hand, if you would like to continue playing with Python, you could
    use PyGame, the Python module designed for game development. Let’s explore that
    option.


    # PYGAME


    PyGame Reloaded (pgreloaded or pygame2) is the version of PyGame that works with
    Python 3 (earlier versions work only with Python 2). A good place to start reading
    is the pgreloaded tutorial at http://code.google.com/p/pgreloaded/.


    > NOTE: As of this writing, there is no installer for pgreloaded on Mac OS X or
    Linux, so there is no straightforward way to use it on either of these operating
    systems.


    Writing a game with PyGame is a little more complicated than using tkinter. For
    example, in Chapter 12, we displayed an image using tkinter with this code:


    ```

    from tkinter import *

    tk = Tk()

    canvas = Canvas(tk, width=400, height=400)

    canvas.pack()

    myimage = PhotoImage(file=''c:\test.gif'')

    canvas.create_image(0, 0, anchor=NW, image=myimage)

    ```'
