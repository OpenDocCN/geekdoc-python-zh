    \ the following:\n\n```\npython\ndef movetriangle(event):\n    if event.keysym\
    \ == 'Up':\n        canvas.move(1, 0, -3)\n    elif event.keysym == 'Down':\n\
    \        canvas.move(1, 0, 3)\n    elif event.keysym == 'Left':\n        canvas.move(1,\
    \ -3, 0)\n    else:\n        canvas.move(1, 3, 0)\n```\n\nThe event object passed\
    \ to movetriangle contains several variables. One of these variables is called\
    \ keysym (for key symbol), which is a string that holds the value of the actual\
    \ key pressed. The line if event.keysym == 'Up': says that if the keysym variable\
    \ contains the string 'Up', we should call canvas.move with the parameters (1,\
    \ 0, -3), as we do in the following line. If keysym contains 'Down', as in elif\
    \ event.keysym == 'Down':, we call it with the parameters (1, 0, 3), and so on.\n\
    \nRemember that the first parameter is the identifying number for the shape drawn\
    \ on the canvas, the second is the value to add to the x (horizontal) coordinate,\
    \ and the third is the value to add to the y (vertical) coordinate.\n\nWe then\
    \ tell tkinter that the movetriangle function should be used to handle events\
    \ from four different keys (up, down, left, and right). The following shows how\
    \ the code looks at this point. When you enter this code, it will again be a lot\
