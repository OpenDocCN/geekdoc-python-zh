  md: "![](img/a7a5a123e26ba8cb8ef5b41ca45700be_81_0.png)\n\nHere, even though blocks\
    \ 2 and 3 have the same indentation, they are considered different blocks because\
    \ there is a block with less indentation (fewer spaces) between them.\n\nFor that\
    \ matter, a block with four spaces on one line and six spaces on the next will\
    \ produce an *indentation error* when you run it, because Python expects you to\
    \ use the same number of spaces for all the lines in a block. So if you start\
    \ a block with four spaces, you should consistently use four spaces for that block.\
    \ Here’s an example:\n\n```\n>>> if age > 20:\n    print('You are too old!')\n\
    \      print('Why are you here?')\n```\n\nI’ve made the spaces visible so that\
    \ you can see the differences. Notice that the third line has six spaces instead\
    \ of four.\n\nWhen we try to run this code, IDLE highlights the line where it\
    \ sees a problem with a red block and displays an explanatory SyntaxError message:\n\
    \n```\n>>> age = 25\n>>> if age > 20:\n    print('You are too old!')\n      print('Why\
    \ are you here?')\nSyntaxError: unexpected indent\n```\n\nPython didn’t expect\
