- img_proc: true
  md: "This block of code is made up of three print statements that are run only if\
    \ the condition age > 20 is found to be true. Each line in the block has four\
    \ spaces at the beginning, when you compare it with the if statement above it.\
    \ Let’s look at that code again, with visible spaces:\n\n```\n>>> age = 25\n>>>\
    \ if age > 20:\n    print('You are too old!')\n    print('Why are you here?')\n\
    \    print('Why aren\\'t you mowing a lawn or sorting papers?')\n```\n\nIn Python,\
    \ *whitespace*, such as a tab (inserted when you press the TAB key) or a space\
    \ (inserted when you press the spacebar), is meaningful. Code that is at the same\
    \ position (indented the same number of spaces from the left margin) is grouped\
    \ into a block, and whenever you start a new line with more spaces than the previous\
    \ one, you are starting a new block that is part of the previous one, like this:\n\
    \n![](img/a7a5a123e26ba8cb8ef5b41ca45700be_80_0.png)\n\nWe group statements together\
    \ into blocks because they are related. The statements need to be run together.\n\
    When you change the indentation, you’re generally creating new blocks. The following\
    \ example shows three separate blocks that are created just by changing the indentation."
