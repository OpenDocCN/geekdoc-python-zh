  md: "For example, suppose that we compare the value of the variable age to a number\
    \ in an if statement, like this:\n\n```\n>>> if age == 10:\n    print(\"What's\
    \ the best way to speak to a monster?\")\n    print(\"From as far away as possible!\"\
    )\n```\n\nThen we set the variable age to the number 10:\n\n```\n>>> age = 10\n\
    >>> if age == 10:\n    print(\"What's the best way to speak to a monster?\")\n\
    \    print(\"From as far away as possible!\")\nWhat's the best way to speak to\
    \ a monster?\nFrom as far away as possible!\n```\n\nAs you can see, the print\
    \ statement executes.\nNext, we set age to the string '10' (with quotes), like\
    \ this:\n\n```\n>>> age = '10'\n>>> if age == 10:\n    print(\"What's the best\
    \ way to speak to a monster?\")\n    print(\"From as far away as possible!\")\n\
    ```\n\nHere, the code in the print statement doesn't run because Python doesn't\
    \ see the number in quotes (a string) as a number.\nFortunately, Python has magic\
    \ functions that can turn strings into numbers and numbers into strings. For example,\
    \ you can convert the string '10' into a number with int:\n\n![](img/a7a5a123e26ba8cb8ef5b41ca45700be_88_0.png)\n\
    \n```\n>>> age = '10'\n>>> converted_age = int(age)\n```\n\nThe variable converted_age\
    \ would now hold the number 10."
