    \ recent call last):\n  File \"<stdin>\", line 1, in <module>\nNameError: name\
    \ 'b' is not defined\n```\n\nThe variable a has been changed to global inside\
    \ the function, so it's visible, even once the function has completed, but b is\
    \ still visible only inside the function. (You must use the global keyword before\
    \ setting the value of your variable.)\n\n# IF\n\nThe if keyword is used to make\
    \ a decision about something. It can also be used with the keywords else and elif\
    \ (else if). An if statement is a way of saying, “If something is true, then perform\
    \ an action of some kind.” Here's an example:\n\n```\n1 if toy_price > 1000:\n\
    2     print('That toy is overpriced')\n3 elif toy_price > 100:\n4     print('That\
    \ toy is expensive')\n5 else:\n6     print('I can afford that toy')\n```\n\nThis\
    \ if statement says that if a toy price is over $1,000 at 1, display a message\
    \ that it is overpriced at 2; otherwise, if the toy"
