    more about modules in Chapter 7. Python has a special module called turtle that
    we can use to learn how computers draw pictures on a screen. The turtle module
    is a way of programming vector graphics, which is basically just drawing with
    simple lines, dots, and curves.


    ![](img/a7a5a123e26ba8cb8ef5b41ca45700be_69_0.png)


    Let''s see how the turtle works. First, start the Python shell by clicking the
