    # USING MODULES


    Modules are used to group functions, variables, and other things together into
    larger, more powerful programs. Some modules are built in to Python, and you can
    download other modules separately. You''ll find modules to help you write games
    (such as tkinter, which is built in, and PyGame, which is not), modules for manipulating
    images (such as PIL, the Python Imaging Library), and modules for drawing three-dimensional
    graphics (such as Panda3D).


    ![](img/a7a5a123e26ba8cb8ef5b41ca45700be_112_0.png)


    Modules can be used to do all sorts of useful things. For example, if you were
    designing a simulation game, and you wanted the world of the game to change realistically,
    you could calculate the current date and time using a built-in module called time:


    ```

    >>> import time

    ```


    Here, the import command is used to tell Python that we want to use the module
    time.

    We can then call functions that are available in this module, using the dot symbol.
    (Remember that we used functions like this to work with the turtle module in Chapter
    4, such as t.forward(50).) For example, here''s how we might call the asctime
    function with the time module:


    ```

    >>> print(time.asctime())

    ''Mon Nov 5 12:40:27 2012''

    ```


    The function asctime is a part of the time module that returns the current date
    and time, as a string.'
