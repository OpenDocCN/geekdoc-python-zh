    \ following code to the bottom of the program to create a red ball object:\n\n\
    ```\nball = Ball(canvas, 'red')\n```\n\nIf you run this program now using **Run\
    \ ▶ Run Module**, the canvas will appear for a split second and then vanish. To\
    \ stop the window from closing immediately, we need to add an animation loop,\
    \ which is called the *main loop* of our game.\n\nA main loop is the central part\
    \ of a program that generally controls most of what it does. Our main loop, for\
    \ the moment, just tells tkinter to redraw the screen. The loop keeps running\
