    \n```\npython\nclass Ball:\n    def __init__(self, canvas, paddle, color):\n \
    \       self.canvas = canvas\n        self.paddle = paddle\n        self.id =\
    \ canvas.create_oval(10, 10, 25, 25, fill=color)\n        self.canvas.move(self.id,\
