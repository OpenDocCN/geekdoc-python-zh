- img_proc: true
  md: 'When creating a canvas, we pass the width and height (in pixels) of the canvas
    to Python. Otherwise, the code is similar to the button code. Here’s an example:


    ```

    >>> from tkinter import *

    >>> tk = Tk()

    >>> canvas = Canvas(tk, width=500, height=500)

    >>> canvas.pack()

    ```


    As with the button example, a window will appear when you enter `tk = Tk()`. On
    the last line, we pack the canvas with `canvas.pack()`, which changes the size
    of the canvas to a width of 500 pixels and a height of 500 pixels, as specified
    in the third line of code.


    Also as with the button example, the pack function tells the canvas to display
    itself in the correct position within the window. If that function isn’t called,
    nothing will display properly.


    ![](img/a7a5a123e26ba8cb8ef5b41ca45700be_193_0.png)


    # DRAWING LINES


    To draw a line on the canvas, we use pixel coordinates. *Coordinates* determine
    the positions of pixels on a surface. On a tkinter canvas, coordinates describe
    how far across the canvas (from left to right) and how far down the canvas (top
    to bottom) to place the pixel.


    For example, since our canvas is 500 pixels wide by 500 pixels high, the coordinates
    of the bottom-right corner of the screen are (500, 500). To draw the line shown
    in the following image, we would use the starting coordinates (0, 0) and ending
    coordinates (500, 500).'
  merge: -1
