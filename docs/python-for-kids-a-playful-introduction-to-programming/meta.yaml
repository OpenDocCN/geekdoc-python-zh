  md: 'For example, consider a really large software application, like a word processor
    or a 3D computer game. It’s nearly impossible for most people to understand large
    programs like these as a whole because there’s just so much code. But break these
    monster programs into smaller pieces, and each piece starts to make sense—as long
    as you know the language, of course!


    When writing a large program, breaking it up also allows you to divide the work
    among other programmers. The most complicated programs that you use (like your
    web browser) were written by many people, or teams of people, working on different
    parts at the same time around the world.


    Now imagine that we want to expand some of the classes we’ve created in this chapter
