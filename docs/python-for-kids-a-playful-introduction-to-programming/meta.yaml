    \ `Sprite` 类有一个什么也不做的 `move` 函数和一个不返回任何坐标的 `coords` 函数。听起来不太有用，是吗？然而，我们知道任何以 `Sprite`\
    \ 为父类的类都将始终拥有 `move` 和 `coords` 函数。因此，在游戏的主循环中，当我们遍历精灵列表时，我们可以调用 `move` 函数，而不会导致任何错误。为什么不会？因为每个精灵都有那个函数。\n\
    \n![](img/a7a5a123e26ba8cb8ef5b41ca45700be_270_0.png)\n\n> **注意**\n\n*在编程中，拥有功能不多的函数的类实际上相当常见。在某种程度上，它们是一种协议或契约，确保一个类的所有子类都提供相同类型的功能，即使在某些情况下子类中的函数什么也不做。*\n\
    \n## 添加平台\n\n现在我们将添加平台。我们将平台对象的类称为 `PlatformSprite`，它将是 `Sprite` 的子类。这个类的 `__init__`\
    \ 函数将接受一个 `game` 参数（就像 `Sprite` 父类一样），以及一个图像、x 和 y 位置，以及图像的宽度和高度。以下是 `PlatformSprite`\
    \ 类的代码：\n\n```python\nclass PlatformSprite(Sprite):\n    def __init__(self, game,\
    \ photo_image, x, y, width, height):\n        Sprite.__init__(self, game)\n  \
    \      self.photo_image = photo_image\n        self.image = game.canvas.create_image(x,\
    \ y,\n            image=self.photo_image, anchor='nw')\n        self.coordinates\
    \ = Coords(x, y, x + width, y + height)\n```\n\n当我们在 ❶ 处定义 `PlatformSprite` 类时，我们给它一个参数：父类的名称（`Sprite`）。在\
    \ ❷ 处的 `__init__` 函数有七个参数：`self`、`game`、`photo_image`、`x`、`y`、`width` 和 `height`。\n\
    \n在 ❸ 处，我们使用 `self` 和 `game` 作为参数值调用父类 `Sprite` 的 `__init__` 函数，因为除了 `self` 关键字外，`Sprite`\
    \ 类的 `__init__` 函数只接受一个参数：`game`。\n\n此时，如果我们创建一个 `PlatformSprite` 对象，它将拥有其父类的所有对象变量（`game`、`endgame`\
    \ 和 `coordinates`），仅仅因为我们调用了 `Sprite` 中的 `__init__` 函数。\n\n在 ❹ 处，我们将 `photo_image`\
    \ 参数保存为一个对象变量，在 ❺ 处，我们使用游戏对象的 `canvas` 变量通过 `create_image` 在屏幕上绘制图像。\n\n最后，我们创建一个\
    \ `Coords` 对象，将 `x` 和 `y` 参数作为前两个参数。然后我们在 ❻ 处将 `width` 和 `height` 参数加到这些参数上作为后两个参数。\n\
    \n即使 `coordinates` 变量在 `Sprite` 父类中被设置为 `None`，我们已经在我们的 `PlatformSprite` 子类中将其更改为一个真实的\
    \ `Coords` 对象，其中包含平台图像在屏幕上的真实位置。\n\n![](img/a7a5a123e26ba8cb8ef5b41ca45700be_271_0.png)\n\
    \n## 添加一个平台对象\n\n让我们在游戏中添加一个平台，看看它是什么样子。将游戏文件（`stickmangame.py`）的最后两行更改为如下：\n\n\
    ```python\ng = Game()\nplatform1 = PlatformSprite(g, PhotoImage(file=\"platform1.gif\"\
    ),\n    0, 480, 100, 10)\ng.sprites.append(platform1)\ng.mainloop()\n```\n\n如你所见，第\
    \ ① 行和第 ④ 行没有变化，但在第 ② 行，我们创建了一个 `PlatformSprite` 类的对象，传递了我们的游戏变量（`g`），以及一个 `PhotoImage`\
    \ 对象（它使用我们的第一个平台图像 `platform1.gif`）。我们还传递了我们想要绘制平台的位置（水平 0 像素，垂直 480 像素，靠近画布底部），以及我们图像的宽度和高度（水平\
    \ 100 像素，高度 10 像素）。我们在第 ③ 行将这个精灵添加到我们游戏对象的精灵列表中。\n\n如果你现在运行游戏，你应该会在屏幕左下角看到一个绘制的平台，像这样：\n\
    \n![](img/a7a5a123e26ba8cb8ef5b41ca45700be_272_0.png)\n\n## 添加一堆平台\n\n让我们添加一大堆平台。每个平台将有不同的\
    \ x 和 y 位置，这样它们就会分散绘制在屏幕上。以下是使用的代码：\n\n```python\ng = Game()\nplatform1 = PlatformSprite(g,\
    \ PhotoImage(file=\"platform1.gif\"),\n    0, 480, 100, 10)\nplatform2 = PlatformSprite(g,\
    \ PhotoImage(file=\"platform1.gif\"),\n    150, 440, 100, 10)\nplatform3 = PlatformSprite(g,\
    \ PhotoImage(file=\"platform1.gif\"),\n    300, 400, 100, 10)\nplatform4 = PlatformSprite(g,\
    \ PhotoImage(file=\"platform1.gif\"),\n    300, 160, 100, 10)\nplatform5 = PlatformSprite(g,\
    \ PhotoImage(file=\"platform2.gif\"),\n    175, 350, 66, 10)\nplatform6 = PlatformSprite(g,\
    \ PhotoImage(file=\"platform2.gif\"),\n    50, 300, 66, 10)\nplatform7 = PlatformSprite(g,\
    \ PhotoImage(file=\"platform2.gif\"),\n    170, 120, 66, 10)\nplatform8 = PlatformSprite(g,\
    \ PhotoImage(file=\"platform2.gif\"),\n    45, 60, 66, 10)\nplatform9 = PlatformSprite(g,\
    \ PhotoImage(file=\"platform3.gif\"),\n    170, 250, 32, 10)\nplatform10 = PlatformSprite(g,\
    \ PhotoImage(file=\"platform3.gif\"),\n    230, 200, 32, 10)\ng.sprites.append(platform1)\n\
    g.sprites.append(platform2)\ng.sprites.append(platform3)\ng.sprites.append(platform4)\n\
    g.sprites.append(platform5)\ng.sprites.append(platform6)\ng.sprites.append(platform7)\n\
    g.sprites.append(platform8)\ng.sprites.append(platform9)\ng.sprites.append(platform10)\n\
    g.mainloop()\n```\n\n我们创建了许多 `PlatformSprite` 对象，将它们保存为变量 `platform1`、`platform2`、`platform3`，依此类推，直到\
    \ `platform10`。然后我们将每个平台添加到我们在 `Game` 类中创建的变量 `sprites` 中。如果你现在运行游戏，它应该看起来像这样：\n\
    \n![](img/a7a5a123e26ba8cb8ef5b41ca45700be_273_0.png)"
