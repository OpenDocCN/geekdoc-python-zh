  md: "# COMBINING CONDITIONS\n\nYou can combine conditions by using the keywords\
    \ and and or, which produces shorter and simpler code. Here’s an example of using\
    \ or:\n\n```\n>>> if age == 10 or age == 11 or age == 12 or age == 13:\n     \
    \   print('What is 13 + 49 + 84 + 155 + 97? A headache!')\nelse:\n        print('Huh?')\n\
    ```\n\nIn this code, if any of the conditions on the first line are true (in other\
    \ words, if age is 10, 11, 12, or 13), the block of code on the next line beginning\
    \ with print will run.\nIf the conditions in the first line are not true (else),\
    \ Python moves to the block in the last line, displaying Huh? on the screen.\n\
    To shrink this example even further, we could use the and keyword, along with\
    \ the greater than or equal-to operator (>=) and less-than-or-equal-to operator\
    \ (<=), as follows:\n\n```\n>>> if age >= 10 and age <= 13:\n        print('What\
    \ is 13 + 49 + 84 + 155 + 97? A headache!')\nelse:\n        print('Huh?')\n```\n\
    \nHere, if age is greater than or equal to 10 and less than or equal to 13, as\
    \ defined on the first line with if age >= 10 and age <= 13:, the block of code\
    \ beginning with print on the following line will run. For example, if the value\
    \ of age is 12, then What is 13 + 49 + 84 + 155 + 97? A headache! will be printed\
    \ to the screen, because 12 is more than 10 and less than 13.\n\n![](img/a7a5a123e26ba8cb8ef5b41ca45700be_86_0.png)\n\
    \n# VARIABLES WITH NO VALUE—NONE\n\nJust as we can assign numbers, strings, and\
    \ lists to a variable, we can also assign nothing, or an empty value, to a variable.\
    \ In Python, an empty value is referred to as None, and it is the absence of value.\
    \ And it’s important to note that the value None is different"
  merge: -1
  pgno: 86
- img_proc: true
  md: "from the value 0 because it is the absence of a value, rather than a number\
    \ with a value of 0. The only value that a variable has when we give it the empty\
    \ value None is nothing. Here’s an example:\n\n```\n>>> myval = None\n>>> print(myval)\n\
    None\n```\n\nAssigning a value of None to a variable is one way to reset it to\
    \ its original, empty state. Setting a variable to None is also a way to define\
    \ a variable without setting its value. You might do this when you know you’re\
    \ going to need a variable later in your program, but you want to define all your\
    \ variables at the beginning. Programmers often define their variables at the\
    \ beginning of a program because placing them there makes it easy to see the names\
    \ of all the variables used by a chunk of code.\nYou can check for None in an\
    \ if statement as well, as in the following example:\n\n```\n>>> myval = None\n\
    >>> if myval == None:\n        print(\"The variable myval doesn't have a value\"\
    )\n\nThe variable myval doesn't have a value\n```\n\nThis is useful when you only\
    \ want to calculate a value for a variable if it hasn’t already been calculated.\n\
    \n# THE DIFFERENCE BETWEEN STRINGS AND NUMBERS\n\nUser input is what a person\
    \ enters on the keyboard—whether that’s a character, a pressed arrow or ENTER\
    \ key, or anything else. User input comes into Python as a string, which means\
    \ that when you type the number 10 on your keyboard, Python saves the number 10\
    \ into a variable as a string, not a number.\nWhat’s the difference between the\
    \ number 10 and the string '10'? Both look the same to us, with the only difference\
    \ being that one is surrounded by quotes. But to a computer, the two are very\
    \ different."
  merge: -1
