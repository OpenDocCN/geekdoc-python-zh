    \n## # 9 PYTHON'S BUILT-IN FUNCTIONS\n\nPython has a well-stocked box of programming\
    \ tools, including a large number of functions and modules that are ready-made\
    \ for you to use. Like a trusty hammer or a bicycle wrench, these built-in tools—chunks\
    \ of code, really—can make writing programs a lot easier.\n\nAs you learned in\
    \ Chapter 7, modules need to be imported before they can be used. Python’s *built-in\
    \ functions* don’t need to be imported first; they’re available as soon as the\
    \ Python shell starts. In this chapter, we'll look at some of the more useful\
    \ built-in functions, and then focus on one: the open function, which lets you\
    \ open files in order to read and write from them.\n\n## USING BUILT-IN FUNCTIONS\n\
    \nWe'll look at 12 built-in functions that are commonly used by Python programmers.\
    \ I'll describe what they do and how to use them, and then show examples of how\
    \ they can help in your programs.\n\n## THE ABS FUNCTION\n\nThe abs function returns\
    \ the *absolute value* of a number, which is the value of a number without its\
    \ sign. For example, the absolute value of 10 is 10, and the absolute value of\
    \ –10 is 10.\nTo use the abs function, simply call it with a number or variable\
    \ as its parameter, like this:\n\n```\n>>> print(abs(10))\n10\n>>> print(abs(-10))\n\
    10\n```\n\nYou might use the abs function to do something like calculate an absolute\
    \ amount of movement of a character in a game, no matter in which the direction\
    \ that character is traveling. For example, say the character takes three steps\
    \ to his right (positive 3) and then ten steps to his left (negative 10, or –10).\
    \ If we didn't care about the direction (positive or negative), the absolute value\
    \ of these numbers would be 3 and 10. You might use this in a board game where\
    \ you roll two dice and then move your character a maximum number of steps in\
    \ any direction, based on the total of the dice. Now, if we store the number of\
    \ steps in a variable, we can determine if the character is moving with the code\n\
    \n![](img/a7a5a123e26ba8cb8ef5b41ca45700be_135_0.png)\n\nbelow. We might want\
    \ to display some information when the player has decided to move (in this case,\
    \ we’ll just display “Character is moving”):\n\n```\n>>> steps = -3\n>>> if abs(steps)\
    \ > 0:\n        print('Character is moving')\n```\n\nIf we hadn’t used abs, the\
    \ if statement might look like this:\n\n```\n>>> steps = -3\n>>> if steps < 0\
    \ or steps > 0:\n        print('Character is moving')\n```\n\nAs you can see,\
    \ using abs makes the if statement just a little shorter and easier to understand.\n\
    \n## THE BOOL FUNCTION\n\nThe name bool is short for *Boolean*, the word programmers\
    \ use to describe a type of data that can have one of two possible values, usually\
    \ either true or false.\n\nThe bool function takes a single parameter and returns\
    \ either True or False based on its value. When using bool for numbers, 0 returns\
    \ False, while any other number returns True. Here’s how you might use bool with\
    \ various numbers:\n\n```\n>>> print(bool(0))\nFalse\n>>> print(bool(1))\nTrue\n\
    >>> print(bool(1123.23))\nTrue\n>>> print(bool(-500))\nTrue\n```\n\nWhen you use\
    \ bool for other values, like strings, it returns False if there’s no value for\
    \ the string (in other words, the keyword None or an empty string). Otherwise,\
    \ it will return True, as shown here:\n\n```\n>>> print(bool(None))\nFalse\n>>>\
    \ print(bool('a'))\nTrue\n>>> print(bool(' '))\nTrue\n>>> print(bool('What do\
    \ you call a pig doing karate? Pork Chop!'))\nTrue\n```\n\nThe bool function will\
    \ also return False for lists, tuples, and maps that do not contain any values,\
    \ or True when they do:\n\n```\n>>> my_silly_list = []\n>>> print(bool(my_silly_list))\n\
    False\n>>> my_silly_list = ['s', 'i', 'l', 'l', 'y']\n>>> print(bool(my_silly_list))\n\
    True\n```\n\nYou might use bool when you need to decide whether a value has been\
    \ set or not. For example, if we ask people using our program to enter the year\
    \ they were born, our if statement could use bool to test the value they enter:\n\
    \n```\n>>> year = input('Year of birth: ')\nYear of birth:\n>>> if not bool(year.rstrip()):\n\
    \        print('You need to enter a value for your year of birth')\nYou need to\
    \ enter a value for your year of birth\n```\n\nThe first line of this example\
    \ uses input to store what someone enters on the keyboard as the variable year.\
    \ Pressing ENTER on the next line (without typing anything else) stores the value\
    \ of the ENTER key in the variable. (We used sys.stdin.readline() back in Chapter\
    \ 7, which is another way to do the same thing.)\n\nOn the following line, the\
    \ if statement checks the Boolean value of the variable after using the rstrip\
    \ function (which removes any spaces and ENTER characters from the end of the\
    \ string). Because the user didn't enter anything in this example, the bool function\
    \ returns false. Because this if statement uses the not keyword, it is a way of\
    \ saying, \"do this if the function does not return true,\" and so the code prints\
    \ You need to enter a value for your year of birth on the next line.\n\n![](img/a7a5a123e26ba8cb8ef5b41ca45700be_137_0.png)\n\
