    string, and so could your address. In fact, the first Python program we created
    in Chapter 1 used a string: “Hello World.”


    ![](img/a7a5a123e26ba8cb8ef5b41ca45700be_51_0.png)


    # CREATING STRINGS


    In Python, we create a string by putting quotes around text. For example, we could
    take our otherwise useless fred variable from Chapter 2 and use it to label a
    string, like this:


    ```

    fred = "Why do gorillas have big nostrils? Big fingers!!"

    ```


    Then, to see what’s inside fred, we could enter print(fred), like this:


    ```

    >>> print(fred)

    Why do gorillas have big nostrils? Big fingers!!

    ```


    You can also use single quotes to create a string, like this:


    ```

    >>> fred = ''What is pink and fluffy? Pink fluff!!''

    >>> print(fred)

    What is pink and fluffy? Pink fluff!!

    ```


    However, if you try to enter more than one line of text for your string using
    only a single quote ('') or double quote (") or if you start with one type of
    quote and try to finish with another, you’ll get an error message in the Python
    shell. For example, enter the following line:


    ```

    >>> fred = "How do dinosaurs pay their bills?

    ```


    You’ll see this result:


    ```

    SyntaxError: EOL while scanning string literal

    ```'
  - '[PAGE 52]


    This is an error message complaining about syntax because you did not follow the
    rules for ending a string with a single or double quote.


    *Syntax* means the arrangement and order of words in a sentence or, in this case,
    the arrangement and order of words and symbols in a program. So *SyntaxError*
    means that you did something in an order Python was not expecting, or Python was
    expecting something that you missed. *EOL* means *end-of-line*, so the rest of
    the error message is telling you that Python hit the end of the line and did not
    find a double quote to close the string.


    To use more than one line of text in your string (called a *multiline string*),
    use three single quotes (''''''), and then hit ENTER between lines, like this:


    ```

    >>> fred = ''''''How do dinosaurs pay their bills?

    With tyrannosaurus checks!''''''

    ```


    Now let''s print out the contents of fred to see if this worked:


    ```

    >>> print(fred)

    How do dinosaurs pay their bills?

    With tyrannosaurus checks!

    ```


    # HANDLING PROBLEMS WITH STRINGS


    Now consider this crazy example of a string, which causes Python to display an
    error message:


    ```

    >>> silly_string = ''He said, "Aren''t can''t shouldn''t wouldn''t."''

    SyntaxError: invalid syntax

    ```


    In the first line, we try to create a string (defined as the variable silly_string)
    enclosed by single quotes, but also containing a mixture of single quotes in the
    words can''t, shouldn''t, and wouldn''t, as well as double quotes. What a mess!


    Remember that Python itself is not as smart as a human being, so all it sees is
    a string containing He said, "Aren, followed by a bunch of other characters that
    it doesn''t expect. When Python sees a quotation mark (either a single or double
    quote), it expects a string to start following the first mark and the string to
    end after the next matching quotation mark (either single or double) on that line.
    In this case, the start of the string is the single quotation mark'
  - '[PAGE 53]


    before He, and the end of the string, as far as Python is concerned, is the single
    quote after the n in Aren. IDLE highlights the point where things have gone wrong:


    ![](img/a7a5a123e26ba8cb8ef5b41ca45700be_53_0.png)


    The last line of IDLE tells us what sort of error occurred—in this case, a syntax
    error.

    Using double instead of single quotes still produces an error:


    ```

    >>> silly_string = "He said, "Aren''t can''t shouldn''t wouldn''t.""

    SyntaxError: invalid syntax

    ```


    Here, Python sees a string bounded by double quotes, containing the letters He
    said, (and a space). Everything following that string (from Aren''t on) causes
    the error:


    ![](img/a7a5a123e26ba8cb8ef5b41ca45700be_53_1.png)


    This is because, from Python''s perspective, all that extra stuff just isn''t
    supposed to be there. Python looks for the next matching quote and doesn''t know
    what you want it to do with anything that follows that quote on the same line.'
  - '[PAGE 54]


    The solution to this problem is a multiline string, which we learned about earlier,
    using *three* single quotes (''''''), which allows us to combine double and single
    quotes in our string without causing errors. In fact, if we use three single quotes,
    we can put any combination of single and double quotes inside the string (as long
    as we don''t try to put three single quotes there). This is what the error-free
    version of our string looks like:


    ![](img/a7a5a123e26ba8cb8ef5b41ca45700be_54_0.png)


    ```

    silly_string = ''''''He said, "Aren''t can''t shouldn''t wouldn''t."''''''

    ```


    But wait, there''s more. If you really want to use single or double quotes to
    surround a string in Python, instead of three single quotes, you can add a backslash
    (\) before each quotation mark within the string. This is called *escaping*. It''s
    a way of saying to Python, "Yes, I know I have quotes inside my string, and I
    want you to ignore them until you see the end quote."


    Escaping strings can make them harder to read, so it''s probably better to use
    multiline strings. Still, you might come across snippets of code that use escaping,
    so it''s good to know why the backslashes are there.


    Here are a few examples of how escaping works:


    ```

    >>> single_quote_str = ''He said, "Aren\''t can\''t shouldn\''t wouldn\''t."''

    >>> double_quote_str = "He said, "Aren''t can''t shouldn''t wouldn''t.""

    >>> print(single_quote_str)

    He said, "Aren''t can''t shouldn''t wouldn''t."

    >>> print(double_quote_str)

    He said, "Aren''t can''t shouldn''t wouldn''t."

    ```


    First, at ❶, we create a string with single quotes, using the backslash in front
    of the single quotes inside that string. At ❷, we create a string with double
    quotes, and use the backslash in front of those quotes in the string. In the lines
    that follow, we print the variables we''ve just created. Notice that the backslash
    character doesn''t appear in the strings when we print them.'
- md: "## EMBEDDING VALUES IN STRINGS\n\nIf you want to display a message using the\
    \ contents of a variable, you can embed values in a string using %s, which is\
    \ like a marker for a value that you want to add later. (*Embedding values* is\
    \ programmer-speak for “inserting values.”) For example, to have Python calculate\
    \ or store the number of points you scored in a game, and then add it to a sentence\
    \ like “I scored ___ points,” use %s in the sentence in place of the value, and\
    \ then tell Python that value, like this:\n\n```\n>>> myscore = 1000\n>>> message\
    \ = 'I scored %s points'\n>>> print(message % myscore)\nI scored 1000 points\n\
    ```\n\nHere, we create the variable myscore with the value 1000 and the variable\
    \ message with a string that contains the words “I scored %s points,” where %s\
    \ is a placeholder for the number of points. On the next line, we call print(message)\
    \ with the % symbol to tell Python to replace %s with the value stored in the\
    \ variable myscore. The result of printing this message is I scored 1000 points.\
    \ We don’t need to use a variable for the value. We could do the same example\
    \ and just use print(message % 1000).\n\nWe can also pass in different values\
    \ for the %s placeholder, using different variables, as in this example:\n\n```\n\
    >>> joke_text = '%s: a device for finding furniture in the dark'\n>>> bodypart1\
    \ = 'Knee'\n>>> bodypart2 = 'Shin'\n>>> print(joke_text % bodypart1)\nKnee: a\
    \ device for finding furniture in the dark\n>>> print(joke_text % bodypart2)\n\
    Shin: a device for finding furniture in the dark\n```\n\nHere, we create three\
    \ variables. The first, joke_text, includes the string with the %s marker. The\
    \ other variables are bodypart1 and bodypart2. We can print the variable joke_text,\
    \ and once again use the % operator to replace it with the contents of the variables\
    \ bodypart1 and bodypart2 to produce different messages.\n\n![](img/a7a5a123e26ba8cb8ef5b41ca45700be_55_0.png)\n\
    \nYou can also use more than one placeholder in a string, like this:\n\n```\n\
    >>> nums = 'What did the number %s say to the number %s? Nice belt!!'\n>>> print(nums\
    \ % (0, 8))\nWhat did the number 0 say to the number 8? Nice belt!!\n```\n\nWhen\
    \ using more than one placeholder, be sure to wrap the replacement values in parentheses,\
    \ as shown in the example. The order of the values is the order in which they'll\
    \ be used in the string.\n\n## MULTIPLYING STRINGS\n\nWhat is 10 multiplied by\
    \ 5? The answer is 50, of course. But what's 10 multiplied by *a*? Here's Python's\
    \ answer:\n\n```\n>>> print(10 * 'a')\naaaaaaaaaa\n```\n\nPython programmers might\
    \ use this approach to line up strings with a specific number of spaces when displaying\
    \ messages in the shell, for example. How about printing a letter in the shell\
    \ (select **File ▸ New Window**, and enter the following code):\n\n```\nspaces\
    \ = ' ' * 25\nprint('%s 12 Butts Wynd' % spaces)\nprint('%s Twinklebottom Heath'\
    \ % spaces)\nprint('%s West Snoring' % spaces)\nprint()\nprint()\nprint('Dear\
    \ Sir')\nprint()\nprint('I wish to report that tiles are missing from the')\n\
    print('outside toilet roof.')\nprint('I think it was bad wind the other night\
    \ that blew them away.')\nprint()\nprint('Regards')\nprint('Malcolm Dithering')\n\
    ```\n\nOnce you've typed the code into the shell window, select **File ▸ Save\
    \ As**. Name your file *myletter.py*.\n\nFrom now on, when you see Save As: somefilename.py\
    \ above a chunk of code, you'll know you need to select **File ▸ New Window**,\
    \ enter the code into the window that appears, and then save it as we did in this\
    \ example.\n\nIn the first line of this example, we create the variable spaces\
    \ by multiplying a space character by 25. We then use that variable in the next\
    \ three lines to align the text to the right of the shell. You can see the result\
    \ of these print statements below:\n\n![](img/a7a5a123e26ba8cb8ef5b41ca45700be_57_0.png)\n\
    \nIn addition to using multiplication for alignment, we can also use it to fill\
    \ the screen with annoying messages. Try this example for yourself:\n\n```\n>>>\
    \ print(1000 * 'snirt')\n```\n\n## LISTS ARE MORE POWERFUL THAN STRINGS\n\n“Spider\
    \ legs, toe of frog, eye of newt, bat wing, slug butter, and snake dandruff” is\
    \ not quite a normal shopping list (unless you happen to be a wizard), but we'll\
    \ use it as our first example of the differences between strings and lists.\n\n\
    ![](img/a7a5a123e26ba8cb8ef5b41ca45700be_57_1.png)\n\nWe could store this list\
    \ of items in the wizard_list variable using a string like this:\n\n```\n>>> wizard_list\
    \ = 'spider legs, toe of frog, eye of newt, bat wing, slug butter, snake dandruff'\n\
    >>> print(wizard_list)\nspider legs, toe of frog, eye of newt, bat wing, slug\
    \ butter, snake dandruff\n```\n\nBut we could also create a list, a somewhat magical\
    \ kind of Python object that we can manipulate. Here's what these items would\
    \ look like written as a list:\n\n```\n>>> wizard_list = ['spider legs', 'toe\
    \ of frog', 'eye of newt',\n                   'bat wing', 'slug butter', 'snake\
    \ dandruff']\n>>> print(wizard_list)\n['spider legs', 'toe of frog', 'eye of newt',\
    \ 'bat wing', 'slug butter', 'snake dandruff']\n```\n\nCreating a list takes a\
    \ bit more typing than creating a string, but a list is more useful than a string\
    \ because it can be manipulated. For example, we could print the third item in\
    \ the wizard_list (eye of newt) by entering its position in the list (called the\
    \ index position) inside square brackets ([]), like this:\n\n```\n>>> print(wizard_list[2])\n\
    eye of newt\n```\n\nHuh? Isn't it the third item on the list? Yes, but lists start\
    \ at index position 0, so the first item in a list is 0, the second is 1, and\
    \ the third is 2. That may not make a lot of sense to humans, but it does to computers.\n\
    \nWe can also change an item in a list much more easily than we could in a string.\
    \ Perhaps instead of eye of newt we needed a snail tongue. Here's how we would\
    \ do that with our list:\n\n```\n>>> wizard_list[2] = 'snail tongue'\n>>> print(wizard_list)\n\
    ['spider legs', 'toe of frog', 'snail tongue', 'bat wing', 'slug butter', 'snake\
    \ dandruff']\n```\n\nThis sets the item in index position 2, previously eye of\
    \ newt, to snail tongue.\n\nAnother option is to show a subset of the items in\
    \ the list. We do this by using a colon (:) inside square brackets. For example,\
    \ enter the following to see the third to fifth items in a list (a brilliant set\
    \ of ingredients for a lovely sandwich):\n\n![](img/a7a5a123e26ba8cb8ef5b41ca45700be_59_0.png)\n\
    \n```\n>>> print(wizard_list[2:5])\n['snail tongue', 'bat wing', 'slug butter']\n\
    ```\n\nWriting [2:5] is the same as saying, “show the items from index position\
    \ 2 up to (but not including) index position 5”—or in other words, items 2, 3,\
    \ and 4.\n\nLists can be used to store all sorts of items, like numbers:\n\n```\n\
    >>> some_numbers = [1, 2, 5, 10, 20]\n```\n\nThey can also hold strings:\n\n```\n\
    >>> some_strings = ['Which', 'Witch', 'Is', 'Which']\n```\n\nThey might have mixtures\
    \ of numbers and strings:\n\n```\n>>> numbers_and_strings = ['Why', 'was', 6,\
    \ 'afraid', 'of', 7,\n                            'because', 7, 8, 9]\n>>> print(numbers_and_strings)\n\
    ['Why', 'was', 6, 'afraid', 'of', 7, 'because', 7, 8, 9]\n```\n\nAnd lists might\
    \ even store other lists:\n\n```\n>>> numbers = [1, 2, 3, 4]\n>>> strings = ['I',\
    \ 'kicked', 'my', 'toe', 'and', 'it', 'is', 'sore']\n>>> mylist = [numbers, strings]\n\
    >>> print(mylist)\n[[1, 2, 3, 4], ['I', 'kicked', 'my', 'toe', 'and', 'it', 'is',\
    \ 'sore']]\n```\n\nThis list-within-list example creates three variables: numbers\
    \ with four numbers, strings with eight strings, and mylist using numbers and\
    \ strings. The third list (mylist) has only two elements because it’s a list of\
    \ variable names, not the contents of the variables.\n\n## ADDING ITEMS TO A LIST\n\
    \nTo add items to a list, we use the append function. A *function* is a chunk\
    \ of code that tells Python to do something. In this case, append adds an item\
    \ to the end of a list.\n\nFor example, to add a bear burp (I'm sure there is\
    \ such a thing) to the wizard's shopping list, do this:\n\n```\n>>> wizard_list.append('bear\
    \ burp')\n>>> print(wizard_list)\n['spider legs', 'toe of frog', 'snail tongue',\
    \ 'bat wing', 'slug butter', 'snake dandruff', 'bear burp']\n```\n\nYou can keep\
    \ adding more magical items to the wizard's list in the same way, like so:\n\n\
    ```\n>>> wizard_list.append('mandrake')\n>>> wizard_list.append('hemlock')\n>>>\
    \ wizard_list.append('swamp gas')\n```\n\nNow the wizard's list looks like this:\n\
    \n```\n>>> print(wizard_list)\n['spider legs', 'toe of frog', 'snail tongue',\
    \ 'bat wing', 'slug butter', 'snake dandruff', 'bear burp', 'mandrake', 'hemlock',\
    \ 'swamp gas']\n```\n\nThe wizard is clearly ready to work some serious magic!\n\
    \n## REMOVING ITEMS FROM A LIST\n\nTo remove items from a list, use the del command\
    \ (short for *delete*). For example, to remove the sixth item in the wizard's\
    \ list, snake dandruff, do this:\n\n```\n>>> del wizard_list[5]\n>>> print(wizard_list)\n\
    ['spider legs', 'toe of frog', 'snail tongue', 'bat wing', 'slug butter', 'bear\
    \ burp', 'mandrake', 'hemlock', 'swamp gas']\n```\n\n> Remember that positions\
    \ start at zero, so wizard_list[5] actually refers to the sixth item in the list."
  mdcn: "## 在字符串中嵌入值\n\n如果你想使用变量的内容来显示消息，可以使用 `%s` 将值嵌入字符串中，这就像一个占位符，用于你稍后要添加的值。（*嵌入值*是程序员的说法，意思是“插入值”。）例如，要让\
    \ Python 计算或存储你在游戏中获得的分数，然后将其添加到像“我得了 ___ 分”这样的句子中，可以在句子中使用 `%s` 代替该值，然后告诉 Python\
    \ 这个值，如下所示：\n\n```\n>>> myscore = 1000\n>>> message = 'I scored %s points'\n>>>\
    \ print(message % myscore)\nI scored 1000 points\n```\n\n这里，我们创建了变量 `myscore`，其值为\
    \ 1000，以及变量 `message`，其字符串包含“I scored %s points”，其中 `%s` 是分数的占位符。在下一行，我们使用 `%`\
    \ 符号调用 `print(message)`，告诉 Python 用存储在变量 `myscore` 中的值替换 `%s`。打印此消息的结果是 `I scored\
    \ 1000 points`。我们不需要为该值使用变量。我们也可以做同样的例子，直接使用 `print(message % 1000)`。\n\n我们还可以为\
    \ `%s` 占位符传递不同的值，使用不同的变量，如本例所示：\n\n```\n>>> joke_text = '%s: a device for finding\
    \ furniture in the dark'\n>>> bodypart1 = 'Knee'\n>>> bodypart2 = 'Shin'\n>>>\
    \ print(joke_text % bodypart1)\nKnee: a device for finding furniture in the dark\n\
    >>> print(joke_text % bodypart2)\nShin: a device for finding furniture in the\
    \ dark\n```\n\n这里，我们创建了三个变量。第一个 `joke_text` 包含带有 `%s` 标记的字符串。其他变量是 `bodypart1`\
    \ 和 `bodypart2`。我们可以打印变量 `joke_text`，并再次使用 `%` 运算符将其替换为变量 `bodypart1` 和 `bodypart2`\
    \ 的内容，以产生不同的消息。\n\n![](img/a7a5a123e26ba8cb8ef5b41ca45700be_55_0.png)\n\n你也可以在字符串中使用多个占位符，如下所示：\n\
    \n```\n>>> nums = 'What did the number %s say to the number %s? Nice belt!!'\n\
    >>> print(nums % (0, 8))\nWhat did the number 0 say to the number 8? Nice belt!!\n\
    ```\n\n使用多个占位符时，请务必将替换值用括号括起来，如示例所示。值的顺序就是它们在字符串中使用的顺序。\n\n## 字符串乘法\n\n10 乘以 5\
    \ 是多少？答案当然是 50。但 10 乘以 *a* 是多少？这是 Python 的答案：\n\n```\n>>> print(10 * 'a')\naaaaaaaaaa\n\
    ```\n\nPython 程序员可能会使用这种方法在 shell 中显示消息时，将字符串与特定数量的空格对齐。例如，在 shell 中打印一封信（选择 **File\
    \ ▸ New Window**，并输入以下代码）：\n\n```\nspaces = ' ' * 25\nprint('%s 12 Butts Wynd'\
    \ % spaces)\nprint('%s Twinklebottom Heath' % spaces)\nprint('%s West Snoring'\
    \ % spaces)\nprint()\nprint()\nprint('Dear Sir')\nprint()\nprint('I wish to report\
    \ that tiles are missing from the')\nprint('outside toilet roof.')\nprint('I think\
    \ it was bad wind the other night that blew them away.')\nprint()\nprint('Regards')\n\
    print('Malcolm Dithering')\n```\n\n在 shell 窗口中输入代码后，选择 **File ▸ Save As**。将文件命名为\
    \ *myletter.py*。\n\n从现在起，当你看到代码块上方有“Save As: somefilename.py”时，你就知道需要选择 **File\
    \ ▸ New Window**，在出现的窗口中输入代码，然后像本例中那样保存它。\n\n在本例的第一行，我们通过将一个空格字符乘以 25 来创建变量 `spaces`。然后我们在接下来的三行中使用该变量将文本与\
    \ shell 的右侧对齐。你可以看到这些 print 语句的结果如下：\n\n![](img/a7a5a123e26ba8cb8ef5b41ca45700be_57_0.png)\n\
    \n除了使用乘法进行对齐，我们还可以用它来用烦人的消息填满屏幕。自己试试这个例子：\n\n```\n>>> print(1000 * 'snirt')\n\
    ```\n\n## 列表比字符串更强大\n\n“蜘蛛腿、青蛙脚趾、蝾螈眼睛、蝙蝠翅膀、蛞蝓黄油和蛇头皮屑”这不太像一个正常的购物清单（除非你碰巧是个巫师），但我们将用它作为字符串和列表之间区别的第一个例子。\n\
    \n![](img/a7a5a123e26ba8cb8ef5b41ca45700be_57_1.png)\n\n我们可以使用字符串将这个物品列表存储在变量\
    \ `wizard_list` 中，如下所示：\n\n```\n>>> wizard_list = 'spider legs, toe of frog, eye\
    \ of newt, bat wing, slug butter, snake dandruff'\n>>> print(wizard_list)\nspider\
    \ legs, toe of frog, eye of newt, bat wing, slug butter, snake dandruff\n```\n\
    \n但我们也可以创建一个列表，这是一种有点神奇的 Python 对象，我们可以对其进行操作。这些物品写成列表的样子如下：\n\n```\n>>> wizard_list\
    \ = ['spider legs', 'toe of frog', 'eye of newt',\n                   'bat wing',\
    \ 'slug butter', 'snake dandruff']\n>>> print(wizard_list)\n['spider legs', 'toe\
    \ of frog', 'eye of newt', 'bat wing', 'slug butter', 'snake dandruff']\n```\n\
    \n创建列表比创建字符串需要多打一些字，但列表比字符串更有用，因为它可以被操作。例如，我们可以通过在方括号（`[]`）内输入其在列表中的位置（称为索引位置）来打印\
    \ `wizard_list` 中的第三项（蝾螈眼睛），如下所示：\n\n```\n>>> print(wizard_list[2])\neye of newt\n\
    ```\n\n嗯？它不是列表中的第三项吗？是的，但列表从索引位置 0 开始，所以列表中的第一项是 0，第二项是 1，第三项是 2。这对人类来说可能不太合理，但对计算机来说确实如此。\n\
    \n我们也可以比在字符串中更容易地更改列表中的项目。也许我们需要蜗牛舌头而不是蝾螈眼睛。以下是我们如何用列表做到这一点：\n\n```\n>>> wizard_list[2]\
    \ = 'snail tongue'\n>>> print(wizard_list)\n['spider legs', 'toe of frog', 'snail\
    \ tongue', 'bat wing', 'slug butter', 'snake dandruff']\n```\n\n这将索引位置 2（之前是蝾螈眼睛）的项目设置为蜗牛舌头。\n\
    \n另一个选项是显示列表中项目的一个子集。我们通过在方括号内使用冒号（`:`）来实现这一点。例如，输入以下内容以查看列表中的第三到第五项（一组制作美味三明治的绝佳配料）：\n\
    \n![](img/a7a5a123e26ba8cb8ef5b41ca45700be_59_0.png)\n\n```\n>>> print(wizard_list[2:5])\n\
    ['snail tongue', 'bat wing', 'slug butter']\n```\n\n写 `[2:5]` 等同于说，“显示从索引位置 2\
    \ 到（但不包括）索引位置 5 的项目”——或者换句话说，项目 2、3 和 4。\n\n列表可用于存储各种项目，例如数字：\n\n```\n>>> some_numbers\
    \ = [1, 2, 5, 10, 20]\n```\n\n它们也可以包含字符串：\n\n```\n>>> some_strings = ['Which',\
    \ 'Witch', 'Is', 'Which']\n```\n\n它们可能包含数字和字符串的混合：\n\n```\n>>> numbers_and_strings\
