    \ = xy[0] + 27\n    self.coordinates.y2 = xy[1] + 30\n    return self.coordinates\n\
    ```\n\n```\ndef move(self):\n    self.animate()\n    if self.y < 0:\n        self.jump_count\
    \ += 1\n        if self.jump_count > 20:\n            self.y = 4\n    if self.y\
    \ > 0:\n        self.jump_count -= 1\n```\n\nAt ❶, this part of the function calls\
    \ the animate function we created earlier in this chapter, which changes the currently\
    \ displayed image if necessary. At ❷, we see whether the value of y is less than\
    \ 0. If it is, we know that the stick figure is jumping because a negative value\
    \ will move him up the screen. (Remember that 0 is at the top of the canvas, and\
    \ the bottom of the canvas is pixel position 500.)\n\nAt ❸, we add 1 to jump_count,\
    \ and at ❹, we say that if the value of jump_count reaches 20, we should change\
    \ y to 4 to start the stick figure falling again (❺).\n\nAt ❻, we see if the value\
    \ of y is greater than 0 (meaning the character must be falling), and if it is,\
    \ we subtract 1 from jump_count because once we’ve counted up to 20, we need to\
    \ count back down again. (Move your hand slowly up in the air while counting to\
    \ 20,"
- md: "then move it back down again while counting down from 20, and you’ll get a\
    \ sense of how calculating the stick figure jumping up and down is supposed to\
    \ work.)\n\nIn the next few lines of the move function, we call the coords function,\
    \ which tells us where our character is on the screen and stores its result in\
    \ the variable co. We then create the variables left, right, top, bottom, and\
    \ falling. We’ll use each in the remainder of this function.\n\n```\nif self.y\
    \ > 0:\n    self.jump_count -= 1\nco = self.coords()\nleft = True\nright = True\n\
    top = True\nbottom = True\nfalling = True\n```\n\nNotice that each variable has\
    \ been set to the Boolean value True. We’ll use these as indicators to check whether\
    \ the character has hit something on the screen or is falling.\n\n## HAS THE STICK\
    \ FIGURE HIT THE BOTTOM OR TOP OF THE CANVAS?\n\nThe next section of the move\
    \ function checks whether our character has hit the bottom or top of the canvas.\
    \ Here’s the code:\n\n```\nbottom = True\nfalling = True\nif self.y > 0 and co.y2\
    \ >= self.game.canvas_height:\n    self.y = 0\n    bottom = False\nelif self.y\
    \ < 0 and co.y1 <= 0:\n    self.y = 0\n    top = False\n```\n\nIf the character\
    \ is falling down the screen, y will be greater than 0, so we need to make sure\
    \ it hasn't yet hit the bottom of the canvas (or it will vanish off the bottom\
    \ of the screen). To do so, at ❶, we see if its y2 position (the bottom of the\
    \ stick figure) is greater than or equal to the canvas_height variable of the\
    \ game object. If it is, we set the value of y to 0 at ❷ to stop the stick figure\
    \ from falling, and then set the bottom variable to False at ❸, which tells the\
    \ remaining code that we no longer need to see if the stick figure has hit the\
    \ bottom.\n\nThe process of determining whether the stick figure has hit the top\
    \ of the screen is very similar to the way we determine whether he has hit the\
    \ bottom. To do so, at ❹, we first see if the stick figure is jumping (y is less\
    \ than 0), then we see if his y1 position is less than or equal to 0, meaning\
    \ he has hit the top of the canvas. If both conditions are true, we set y equal\
    \ to 0 at ❺ to stop the movement. We also set the top variable to True at ❻ to\
    \ tell the remaining code that we no longer need to see if the stick figure has\
    \ hit the top.\n\n## HAS THE STICK FIGURE HIT THE SIDE OF THE CANVAS?\n\nWe follow\
    \ almost exactly the same process as in the preceding code to determine whether\
    \ the stick figure has hit the left and right sides of the canvas, as follows:\n\
    \n```\nelif self.y < 0 and co.y1 <= 0:\n    self.y = 0\n    top = False\nif self.x\
    \ > 0 and co.x2 >= self.game.canvas_width:\n    self.x = 0\n    right = False\n\
    elif self.x < 0 and co.x1 <= 0:\n    self.x = 0\n    left = False\n```\n\nThe\
    \ code at ❶ is based on the fact that we know the stick figure is running to the\
    \ right if x is greater than 0. We also know whether he has hit the right-hand\
    \ side of the screen by seeing if the x2 position (co.x2) is greater than or equal\
    \ to the width of the canvas stored in game_width. If both statements are true,\
    \ we set x equal to 0 (to stop the stick figure from running), and we set the\
    \ right variable to False at ❸.\n\n## COLLIDING WITH OTHER SPRITES\n\nOnce we've\
    \ determined whether the figure has hit the sides of the screen, we need to see\
    \ if he has hit anything else on the screen. We use the following code to loop\
    \ through the list of sprite objects stored in the game object to see if the stick\
    \ figure has hit any of them.\n\n```\nelif self.x < 0 and co.x1 <= 0:\n    self.x\
    \ = 0\n    left = False\nfor sprite in self.game.sprites:\n    if sprite == self:\n\
    \        continue\n    sprite_co = sprite.coords()\n    if top and self.y < 0\
    \ and collided_top(co, sprite_co):\n        self.y = -self.y\n        top = False\n\
    ```\n\nAt ❶, we loop through the list of sprites, assigning each one in turn to\
    \ the variable sprite. At ❷, we say that if the sprite is equal to self (that's\
    \ another way of saying, “if this sprite is the same as me”), we don't need to\
    \ determine whether the stick figure has collided because he would have only hit\
