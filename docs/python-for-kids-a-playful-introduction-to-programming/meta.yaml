  md: "# DEF\n\nThe def keyword is used to define a function. For example, to create\
    \ a function to convert a number of years into the equivalent number of minutes:\n\
    \n```\n>>> def minutes(years):\n        return years * 365 * 24 * 60\n>>> minutes(10)\n\
    5256000\n```\n\n# DEL\n\nThe del function is used to remove something. For example,\
    \ if you had a list of things you wanted for your birthday in your diary, but\
    \ then changed your mind about one of them, you might cross it off the list and\
    \ add something new:\n\nremote controlled car\nnew bike\n~~computer game~~\nroboreptile\n\
    \nIn Python, the original list would look like this:\n\n```\nwhat_i_want = ['remote\
    \ controlled car', 'new bike', 'computer game']\n```\n\nYou could remove the computer\
    \ game by using del and the index of the item you want to delete. You could then\
    \ add the new item with the function append:\n\n```\ndel what_i_want[2]\nwhat_i_want.append('roboreptile')\n\
    ```\n\nAnd then print the new list:\n\n```\nprint(what_i_want)\n['remote controlled\
    \ car', 'new bike', 'roboreptile']\n```\n\n# ELIF\n\nThe keyword elif is used\
    \ as part of an if statement. See the description of the if keyword for an example."
