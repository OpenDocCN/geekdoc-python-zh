    > **NOTE** Plain text files contain only characters that humans can read. Images,
    music files, movies, and pickled Python objects have information that isn''t always
    readable by humans, so they''re known as binary files. If you were to open the
    *save.dat* file, you would see that it doesn''t look like a text file; it looks
    like a jumbled mixture of normal text and special characters.


    ![](img/a7a5a123e26ba8cb8ef5b41ca45700be_168_0.png)


    We can unpickle objects we''ve written to the file using pickle''s load function.
    When we unpickle something, we reverse the pickle process: We take the information
