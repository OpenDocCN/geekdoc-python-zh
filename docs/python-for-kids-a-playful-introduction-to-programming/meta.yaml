- img_proc: true
  md: "> Use consistent spacing to make your code easier to read. If you start writing\
    \ a program and put four spaces at the beginning of a block, keep using four spaces\
    \ at the beginning of the other blocks in your program. Also, be sure to indent\
    \ each line in the same block with the same number of spaces.\n\n# CONDITIONS\
    \ HELP US COMPARE THINGS\n\nA *condition* is a programming statement that compares\
    \ things and tells us whether the criteria set by the comparison are either True\
    \ (yes) or False (no). For example, `age > 10` is a condition, and is another\
    \ way of saying, “Is the value of the age variable greater than 10?” This is also\
    \ a condition: `hair_color == 'mauve'`, which is another way of saying, “Is the\
    \ value of the hair_color variable mauve?”\n\nWe use symbols in Python (called\
    \ *operators*) to create our conditions, such as equal to, greater than, and less\
    \ than. Table 5-1 lists some symbols for conditions.\n\nTable 5-1: Symbols for\
    \ Conditions\n\n| Symbol | Definition |\n| :--- | :--- |\n| == | Equal to |\n\
    | != | Not equal to |\n| > | Greater than |\n| < | Less than |\n| >= | Greater\
    \ than or equal to |\n| <= | Less than or equal to |\n\nFor example, if you are\
    \ 10 years old, the condition `your_age == 10` would return True; otherwise, it\
    \ would return False. If you are 12 years old, the condition `your_age > 10` would\
    \ return True.\n\n> Be sure to use a double equal sign (==) when defining an equal-to\
    \ condition.\n\nLet’s try a few more examples. Here, we set our age as equal to\
    \ 10 and then write a conditional statement that will print “You are too old for\
    \ my jokes!” if age is greater than 10:\n\n```\n>>> age = 10\n>>> if age > 10:\n\
    \        print('You are too old for my jokes!')\n```"
  merge: -1
  pgno: 82
- img_proc: true
  md: "What happens when we type this into IDLE and press ENTER?\nNothing.\nBecause\
    \ the value returned by age is not greater than 10, Python does not execute (run)\
    \ the print block. However, if we had set the variable age to 20, the message\
    \ would be printed.\nNow let’s change the previous example to use a greater-than-or-equal-to\
    \ (>=) condition:\n\n![](img/a7a5a123e26ba8cb8ef5b41ca45700be_83_0.png)\n\n```\n\
    >>> age = 10\n>>> if age >= 10:\n        print('You are too old for my jokes!')\n\
    ```\n\nYou should see “You are too old for my jokes!” printed to the screen because\
    \ the value of age is equal to 10.\nNext, let’s try using an equal-to (==) condition:\n\
    \n```\n>>> age = 10\n>>> if age == 10:\n        print('What\\'s brown and sticky?\
    \ A stick!!')\n```\n\nYou should see the message “What’s brown and sticky? A stick!!”\
    \ printed to the screen.\n\n# IF-THEN-ELSE STATEMENTS\n\nIn addition to using\
    \ if statements to do something when a condition is met (True), we can also use\
    \ if statements to do something when a condition is not true. For example, we\
