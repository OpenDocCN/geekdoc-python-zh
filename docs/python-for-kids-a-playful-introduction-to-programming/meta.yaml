  md: "```\n>>> x = 1\n>>> while x < 10:\n        print('hello')\n        x = x +\
    \ 1\n```\n\n# WITH\n\nThe with keyword is used with an object to create a block\
    \ of code in a similar way to the try and finally keywords. This keyword is not\
    \ used in this book.\n\n# YIELD\n\nThe yield keyword is a little bit like return,\
    \ except that it is used with a specific class of object called a generator. Generators\
    \ create values on the fly (which is another way of saying that they create values\
    \ on request), so in that respect, the range function behaves like a generator.\
    \ This keyword is not used in this book."
