    \n你可以复制粘贴字符串值来使用，或者将元组存储为一个变量，然后使用十六进制值的索引位置。\n\n让我们使用 `random_rectangle` 函数来看看这是如何工作的。\n\
    \n```\n>>> c = colorchooser.askcolor()\n>>> random_rectangle(400, 400, c[1])\n\
    ```\n\n结果如下：\n\n![](img/a7a5a123e26ba8cb8ef5b41ca45700be_202_0.png)\n\n## 绘制弧线\n\
    \n弧线是圆或其他曲线周长的一部分，但为了在 tkinter 中绘制它，你需要使用 `create_arc` 函数将其绘制在一个矩形内，代码如下：\n\n\
    ![](img/a7a5a123e26ba8cb8ef5b41ca45700be_202_1.png)\n\n```\ncanvas.create_arc(10,\
    \ 10, 200, 100, extent=180, style=ARC)\n```\n\n![](img/a7a5a123e26ba8cb8ef5b41ca45700be_202_2.png)\n\
    \n如果你已经关闭了所有 tkinter 窗口，或者重启了 IDLE，请确保重新导入 tkinter，然后使用此代码重新创建画布：\n\n```\n>>>\
    \ from tkinter import *\n>>> tk = Tk()\n>>> canvas = Canvas(tk, width=400, height=400)\n\
    >>> canvas.pack()\n>>> canvas.create_arc(10, 10, 200, 100, extent=180, style=ARC)\n\
    ```\n\n此代码将包含弧线的矩形的左上角放置在坐标 (10, 10)，即向右 10 像素，向下 10 像素，其右下角位于坐标 (200, 100)，即向右\
    \ 200 像素，向下 100 像素。下一个参数 `extent` 用于指定弧线的角度度数。回想一下第 4 章，度数是测量绕圆行进距离的一种方式。以下是两个弧线的示例，我们分别绕圆行进了\
    \ 45 度和 270 度：\n\n![](img/a7a5a123e26ba8cb8ef5b41ca45700be_203_0.png)\n\n以下代码在页面上绘制了几个不同的弧线，以便你可以看到在\
    \ `create_arc` 函数中使用不同度数时会发生什么。\n\n```\n>>> from tkinter import *\n>>> tk = Tk()\n\
    >>> canvas = Canvas(tk, width=400, height=400)\n>>> canvas.pack()\n>>> canvas.create_arc(10,\
    \ 10, 200, 80, extent=45, style=ARC)\n>>> canvas.create_arc(10, 80, 200, 160,\
