    \n### #3: 移动平台\n\n尝试添加一个名为 `MovingPlatformSprite` 的新类。这个平台应该左右移动，使火柴人先生更难到达顶部的门口。\n\
    \n![](img/a7a5a123e26ba8cb8ef5b41ca45700be_310_0.png)\n\n在你的 Python 学习之旅中，你已经学到了一些基本的编程概念，现在你会发现使用其他编程语言要容易得多。虽然\
    \ Python 非常有用，但一种语言并不总是完成所有任务的最佳工具，所以不要害怕尝试其他方式来为你的计算机编程。在这里，我们将看看一些用于游戏和图形编程的替代方案，然后了解一下一些最常用的编程语言。\n\
    \n## 游戏和图形编程\n\n如果你想在游戏或图形编程方面做更多事情，你会发现有很多选择。以下只是其中一些：\n\n- BlitzBasic (http://www.blitzbasic.com/)，它使用一种专门为游戏设计的特殊版本的\
    \ BASIC 编程语言\n- Adobe Flash，一种设计用于在浏览器中运行的动画软件，它有自己的编程语言叫做 ActionScript (http://www.adobe.com/devnet/actionscript.html)\n\
    - Alice (http://www.alice.org/)，一个 3D 编程环境（仅适用于 Microsoft Windows 和 Mac OS X）\n\
    - Scratch (http://scratch.mit.edu/)，一个用于开发游戏的工具\n- Unity3D (http://unity3d.com/)，另一个用于创建游戏的工具\n\
    \n在线搜索将发现大量资源，帮助你开始使用这些选项中的任何一个。\n\n另一方面，如果你想继续使用 Python，你可以使用 PyGame，这是为游戏开发设计的\
    \ Python 模块。让我们探索一下这个选项。\n\n## PYGAME\n\nPyGame Reloaded (pgreloaded 或 pygame2)\
    \ 是适用于 Python 3 的 PyGame 版本（早期版本仅适用于 Python 2）。一个好的起点是阅读 pgreloaded 教程，地址为 http://code.google.com/p/pgreloaded/。\n\
    \n> 注意：在撰写本文时，Mac OS X 或 Linux 上没有 pgreloaded 的安装程序，因此没有直接的方法在这些操作系统上使用它。\n\n\
    使用 PyGame 编写游戏比使用 tkinter 稍微复杂一些。例如，在第12章，我们使用 tkinter 显示图像的代码如下：\n\n```\nfrom\
    \ tkinter import *\ntk = Tk()\ncanvas = Canvas(tk, width=400, height=400)\ncanvas.pack()\n\
    myimage = PhotoImage(file='c:\\test.gif')\ncanvas.create_image(0, 0, anchor=NW,\
    \ image=myimage)\n```\n\n使用 PyGame 的相同代码（加载 .bmp 文件而不是 .gif 文件）将如下所示：\n\n```\n\
    import sys\nimport time\nimport pygame2\nimport pygame2.sdl.constants as constants\n\
    import pygame2.sdl.image as image\nimport pygame2.sdl.video as video\nvideo.init()\n\
    img = image.load_bmp(\"c:\\test.bmp\")\nscreen = video.set_mode(img.width, img.height)\n\
    screen.fill(pygame2.Color(255, 255, 255))\nscreen.blit(img, (0, 0))\nscreen.flip()\n\
    time.sleep(10)\nvideo.quit()\n```\n\n导入 pygame2 模块后，我们在 ❶ 处调用 PyGame 视频模块的 init\
    \ 函数，这有点像在 tkinter 示例中创建画布然后 pack 的调用。我们在 ❷ 处使用 load_bmp 函数加载 BMP 图像，然后在 ❸ 处使用\
    \ set_mode 函数创建一个屏幕对象，将加载图像的宽度和高度作为参数传入。接下来的（可选）行在 ❹ 处通过用白色填充屏幕来擦除屏幕，然后在 ❺ 处使用屏幕对象的\
    \ blit 函数来显示图像。此函数的参数是 img 对象和一个包含我们想要显示图像位置（水平 0 像素，垂直 0 像素）的元组。\n\nPyGame 使用一个离屏缓冲区（也称为双缓冲）。离屏缓冲区是一种技术，用于在计算机内存中一个不可见的区域绘制图形，然后将该整个区域一次性复制到可见显示区域（你的屏幕上）。如果你碰巧在显示上绘制大量不同的对象，离屏缓冲可以减少闪烁效果。从离屏缓冲区复制到可见显示区域是使用\
    \ ❻ 处的 flip 函数执行的。\n\n最后，我们在 ❼ 处休眠 10 秒，因为与 tkinter 的画布不同，如果我们不阻止屏幕关闭，它会立即关闭。在\
    \ ❽ 处，我们使用 video.init 进行清理，以便 PyGame 能够正确关闭。PyGame 还有很多内容，但这个简短的例子让你了解了它的样子。\n\
    \n## 编程语言\n\n如果你对其他编程语言感兴趣，目前流行的一些语言有 Java、C/C++、C#、PHP、Objective-C、Perl、Ruby\
    \ 和 JavaScript。我们将简要介绍这些语言，并看看一个 Hello World 程序（就像我们在第1章开始的 Python 版本）在每种语言中会是什么样子。请注意，这些语言都不是专门为初学者设计的，而且大多数与\
    \ Python 有很大不同。\n\n## JAVA\n\nJava (http://www.oracle.com/technetwork/java/index.html)\
    \ 是一种中等复杂度的编程语言，拥有一个大型的内置模块库（称为包）。网上有很多免费的文档。你可以在大多数操作系统上使用 Java。Java 也是 Android\
    \ 手机上使用的语言。\n\n以下是 Java 中 Hello World 的示例：\n\n```\npublic class HelloWorld {\n\
    \    public static final void main(String[] args) {\n        System.out.println(\"\
    Hello World\");\n    }\n}\n```\n\n## C/C++\n\nC (http://www.cprogramming.com/)\
    \ 和 C++ (http://www.stroustrup/C++.html) 是复杂的编程语言，用于所有操作系统。你会发现有免费和商业版本可用。这两种语言（尽管\
    \ C++ 可能比 C 更甚）都有陡峭的学习曲线。例如，你会发现你需要手动编写一些 Python 提供的功能（比如告诉计算机你需要使用一块内存来存储对象）。许多商业游戏和游戏机都是用某种形式的\
    \ C 或 C++ 编程的。\n\n以下是 C 中 Hello World 的示例：\n\n```\n#include <stdio.h>\nint main\
    \ ()\n{\n    printf (\"Hello World\\n\");\n}\n```\n\nC++ 中的示例可能如下所示：\n\n```\n\
    #include <iostream>\nint main()\n{\n    std::cout << \"Hello World\\n\";\n   \
    \ return 0;\n}\n```\n\n## C#\n\nC# (http://msdn.microsoft.com/en-us/vstudio/hh388566/)，读作\
    \ \"C sharp\"，是一种用于 Windows 的中等复杂度的编程语言，与 Java 非常相似。它比 C 和 C++ 稍微容易一些。\n\n以下是\
    \ C# 中 Hello World 的示例：\n\n```\npublic class Hello\n{\n    public static void\
    \ Main()\n    {\n        System.Console.WriteLine(\"Hello World\");\n    }\n}\n\
    ```\n\n## PHP\n\nPHP (http://www.php.net/) 是一种用于构建网站的编程语言。你需要一个安装了 PHP 的 Web 服务器（用于将网页传递给\
    \ Web 浏览器的软件），但所有主要操作系统都可以免费获得所需的软件。为了使用 PHP，你需要学习 HTML（一种用于构建网页的简单语言）。你可以在 http://php.net/manual/en/tutorial.php\
    \ 找到免费的 PHP 教程，在 http://www.w3schools.com/html 找到 HTML 教程。\n\n一个在浏览器中显示 \"Hello\
    \ World\" 的 HTML 页面可能如下所示：\n\n```\n<html>\n    <body>\n        <p>Hello World</p>\n\
    \    </body>\n</html>\n```"
