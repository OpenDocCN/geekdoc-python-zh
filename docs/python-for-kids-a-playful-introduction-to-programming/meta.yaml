- md: "## CHECKING FOR COLLISIONS\n\nOnce we know how to store the position of our\
    \ game sprites, we need a way to tell if one sprite has collided with another,\
    \ like when Mr. Stick Man jumps around the screen and bangs into one of the platforms.\
    \ To make this problem easier to solve, we can break it down into two smaller\
    \ problems: checking if sprites are colliding vertically and checking if sprites\
    \ are colliding horizontally. Then we can combine our two smaller solutions to\
    \ easily see if two sprites are colliding in any direction!\n\n## SPRITES COLLIDING\
    \ HORIZONTALLY\n\nFirst, we'll create the `within_x` function to determine if\
    \ one set of x coordinates (x1 and x2) has crossed over another set of x coordinates\
    \ (again, x1 and x2). There's more than one way to do this, but here's a simple\
    \ approach which you can add just below the Coords class:\n\n```python\nclass\
    \ Coords:\n    def __init__(self, x1=0, y1=0, x2=0, y2=0):\n        self.x1 =\
    \ x1\n        self.y1 = y1\n        self.x2 = x2\n        self.y2 = y2\n\ndef\
    \ within_x(co1, co2):\n    if co1.x1 > co2.x1 and co1.x1 < co2.x2:\n        return\
    \ True\n    elif co1.x2 > co2.x1 and co1.x2 < co2.x2:\n        return True\n \
    \   elif co2.x1 > co1.x1 and co2.x1 < co1.x2:\n        return True\n    elif co2.x2\
    \ > co1.x1 and co2.x2 < co1.x1:\n        return True\n    else:\n        return\
    \ False\n```\n\nThe `within_x` function takes the parameters co1 and co2, both\
    \ Coords objects. At ❶, we check to see if the leftmost position of the first\
    \ coordinate object (co1.x1) is between the leftmost position (co2.x1) and the\
    \ rightmost position (co2.x2) of the second coordinate object. We return True\
    \ at ❷ if it is.\n\nLet's take a look at two lines with overlapping x coordinates\
    \ to understand how this works. Each line starts at x1 and finishes at x2.\n\n\
    The first line in this diagram (co1) starts at pixel position 50 (x1) and finishes\
    \ at 100 (x2). The second line (co2) starts at position 40 and finishes at 150.\
    \ In this case, because the x1 position of the first line is between the x1 and\
    \ x2 positions of the second line, the first if statement in the function would\
    \ be true for these two sets of coordinates.\n\nWith the elif at ③, we see whether\
    \ the rightmost position of the first line (co1.x2) is between the leftmost position\
    \ (co2.x1) and rightmost position (co2.x2) of the second. If it is, we return\
    \ True at ④. The two elif statements at ⑤ and ⑥ do almost the same thing: They\
    \ check the leftmost and rightmost positions of the second line (co2) against\
    \ the first (co1).\n\nIf none of the if statements match, we reach else at ⑦,\
    \ and return False at ⑧. This is effectively saying, “No, the two coordinate objects\
    \ do not cross over each other horizontally.”\n\nTo see an example of the function\
    \ working, look back at the diagram showing the first and second lines. The x1\
    \ and x2 positions of the first coordinate object are 40 and 100, and the x1 and\
    \ x2 positions of the second coordinate object are 50 and 150. Here's what happens\
    \ when we call the within_x function that we wrote:\n\n```python\n>>> c1 = Coords(40,\
    \ 40, 100, 100)\n>>> c2 = Coords(50, 50, 150, 150)\n>>> print(within_x(c1, c2))\n\
    True\n```\n\nThe function returns True. This is the first step to being able to\
    \ determine whether one sprite has bumped into another. For example, when we create\
    \ a class for Mr. Stick Man and for the platforms, we will be able to tell if\
    \ their x coordinates have crossed one another.\n\nIt's not really good programming\
    \ practice to have lots of if or elif statements that return the same value. To\
    \ solve this problem, we can shorten the within_x function by surrounding each\
    \ of its conditions with parentheses, separated by the or keyword. If you want\
    \ a slightly neater function, with a few less lines of code, you can change the\
    \ function so it looks like this:\n\n```python\ndef within_x(co1, co2):\n    if\
    \ (co1.x1 > co2.x1 and co1.x1 < co2.x2) \\\n            or (co1.x2 > co2.x1 and\
    \ co1.x2 < co2.x2) \\\n            or (co2.x1 > co1.x1 and co2.x1 < co1.x2) \\\
    \n            or (co2.x2 > co1.x1 and co2.x2 < co1.x1):\n        return True\n\
    \    else:\n        return False\n```\n\nTo extend the if statement across multiple\
    \ lines so that we don't end up with one really long line containing all the conditions,\
    \ we use a backslash (\\), as shown above.\n\n## SPRITES COLLIDING VERTICALLY\n\
    \nWe also need to know if sprites collide vertically. The within_y function is\
    \ very similar to the within_x function. To create it, we check whether the y1\
    \ position of the first coordinate has crossed over the y1 and y2 positions of\
    \ the second, and then vice versa. Here's the function to add (put it below the\
    \ within_x function)—this time we'll write it using the shorter version of the\
    \ code (rather than lots of if statements):\n\n```python\ndef within_y(co1, co2):\n\
    \    if (co1.y1 > co2.y1 and co1.y1 < co2.y2) \\\n            or (co1.y2 > co2.y1\
    \ and co1.y2 < co2.y2) \\\n            or (co2.y1 > co1.y1 and co2.y1 < co1.y2)\
    \ \\\n            or (co2.y2 > co1.y1 and co2.y2 < co1.y1):\n        return True\n\
    \    else:\n        return False\n```\n\n## PUTTING IT ALL TOGETHER: OUR FINAL\
    \ COLLISION-DETECTION CODE\n\nOnce we've determined whether one set of x coordinates\
    \ has crossed over another, and done the same for y coordinates, we can write\
    \ functions to see whether a sprite has hit another sprite and on which side.\
    \ We'll do this with the functions collided_left, collided_right, collided_top,\
    \ and collided_bottom.\n\n## THE COLLIDED_LEFT FUNCTION\n\nHere's the code for\
    \ the collided_left function, which you can add below the two within functions\
    \ we just created:\n\n```python\ndef collided_left(co1, co2):\n    if within_y(co1,\
    \ co2):\n        if co1.x1 <= co2.x2 and co1.x1 >= co2.x1:\n            return\
    \ True\n    return False\n```\n\nThis function tells us whether the left-hand\
    \ side (the x1 value) of a first coordinate object has hit another coordinate\
    \ object.\nThe function takes two parameters: co1 (the first coordinate object)\
    \ and co2 (the second coordinate object). As you can see at ❶, we check whether\
    \ the two coordinate objects have crossed over vertically, using the within_y\
    \ function at ❷. After all, there's no point in checking whether Mr. Stick Man\
    \ has hit a platform if he is floating way above it, like this:\n\nAt ❸, we see\
    \ if the value of the leftmost position of the first coordinate object (co1.x1)\
    \ has hit the x2 position of the second coordinate object (co2.x2)—that it is\
    \ less than or equal to the x2 position. We also check to make sure that it hasn’t\
    \ gone past the x1 position. If it has hit the side, we return True at ❹. If none\
    \ of the if statements are true, we return False at ❺.\n\n## THE COLLIDED_RIGHT\
    \ FUNCTION\n\nThe collided_right function looks a lot like collided_left:\n\n\
    ```python\ndef collided_right(co1, co2):\n    if within_y(co1, co2):\n       \
    \ if co1.x2 >= co2.x1 and co1.x2 <= co2.x2:\n            return True\n    return\
    \ False\n```\n\nAs with collided_left, we check to see if the y coordinates have\
    \ crossed over each other using the within_y function at ❶. We then check to see\
    \ if the x2 value is between the x1 and x2 positions of the second coordinate\
    \ object at ❷, and return True at ❸ if it is. Otherwise, we return False at ❹.\n\
    \n## THE COLLIDED_TOP FUNCTION\n\nThe collided_top function is very similar to\
    \ the two functions we just added.\n\n```python\ndef collided_top(co1, co2):\n\
    \    if within_x(co1, co2):\n        if co1.y1 <= co2.y2 and co1.y1 >= co2.y1:\n\
    \            return True\n    return False\n```\n\nThe difference is that this\
    \ time, we check to see if the coordinates have crossed over horizontally, using\
    \ the within_x function at ❶. Next, at ❷, we see if the topmost position of the\
    \ first coordinate (co1.y1) has crossed over the y2 position of the second coordinate,\
    \ but not its y1 position. If so, we return True (meaning that yes, the top of\
    \ the first coordinate has hit the second coordinate)."
  mdcn: "## 碰撞检测\n\n一旦我们知道了如何存储游戏精灵的位置，就需要一种方法来判断一个精灵是否与另一个精灵发生了碰撞，比如当火柴人先生在屏幕上跳跃并撞到某个平台时。为了简化这个问题，我们可以将其分解为两个更小的问题：检查精灵是否在垂直方向上碰撞，以及检查精灵是否在水平方向上碰撞。然后，我们可以将这两个较小的解决方案结合起来，轻松地判断两个精灵是否在任意方向上发生了碰撞！\n\
    \n## 精灵的水平碰撞\n\n首先，我们将创建 `within_x` 函数，用于判断一组 x 坐标（x1 和 x2）是否与另一组 x 坐标（同样是 x1\
    \ 和 x2）发生了交叉。实现方法不止一种，但这里提供一个简单的方法，你可以将其添加到 `Coords` 类的下方：\n\n```python\nclass\
    \ Coords:\n    def __init__(self, x1=0, y1=0, x2=0, y2=0):\n        self.x1 =\
    \ x1\n        self.y1 = y1\n        self.x2 = x2\n        self.y2 = y2\n\ndef\
    \ within_x(co1, co2):\n    if co1.x1 > co2.x1 and co1.x1 < co2.x2:\n        return\
    \ True\n    elif co1.x2 > co2.x1 and co1.x2 < co2.x2:\n        return True\n \
    \   elif co2.x1 > co1.x1 and co2.x1 < co1.x2:\n        return True\n    elif co2.x2\
    \ > co1.x1 and co2.x2 < co1.x1:\n        return True\n    else:\n        return\
    \ False\n```\n\n`within_x` 函数接受两个参数 `co1` 和 `co2`，它们都是 `Coords` 对象。在 ❶ 处，我们检查第一个坐标对象的最左位置（`co1.x1`）是否位于第二个坐标对象的最左位置（`co2.x1`）和最右位置（`co2.x2`）之间。如果条件成立，我们在\
    \ ❷ 处返回 `True`。\n\n让我们通过两条 x 坐标重叠的线来理解其工作原理。每条线都从 x1 开始，到 x2 结束。\n\n在此图中，第一条线（`co1`）从像素位置\
    \ 50（x1）开始，到 100（x2）结束。第二条线（`co2`）从位置 40 开始，到 150 结束。在这种情况下，由于第一条线的 x1 位置位于第二条线的\
    \ x1 和 x2 位置之间，因此对于这两组坐标，函数中的第一个 `if` 语句将为真。\n\n在 ③ 处的 `elif` 中，我们检查第一条线的最右位置（`co1.x2`）是否位于第二条线的最左位置（`co2.x1`）和最右位置（`co2.x2`）之间。如果成立，我们在\
    \ ④ 处返回 `True`。在 ⑤ 和 ⑥ 处的两个 `elif` 语句执行几乎相同的操作：它们检查第二条线（`co2`）的最左和最右位置是否与第一条线（`co1`）交叉。\n\
    \n如果没有任何 `if` 语句匹配，我们将执行到 ⑦ 处的 `else`，并在 ⑧ 处返回 `False`。这实际上意味着：“不，这两个坐标对象在水平方向上没有相互交叉。”\n\
    \n要查看函数运行的示例，请回顾显示第一条和第二条线的图表。第一个坐标对象的 x1 和 x2 位置分别是 40 和 100，第二个坐标对象的 x1 和 x2\
    \ 位置分别是 50 和 150。当我们调用编写的 `within_x` 函数时，会发生以下情况：\n\n```python\n>>> c1 = Coords(40,\
    \ 40, 100, 100)\n>>> c2 = Coords(50, 50, 150, 150)\n>>> print(within_x(c1, c2))\n\
    True\n```\n\n函数返回 `True`。这是判断一个精灵是否撞到另一个精灵的第一步。例如，当我们为火柴人先生和平台创建类时，我们将能够判断它们的\
    \ x 坐标是否发生了交叉。\n\n拥有大量返回相同值的 `if` 或 `elif` 语句并不是良好的编程实践。为了解决这个问题，我们可以通过用括号将每个条件括起来，并用\
    \ `or` 关键字分隔，来缩短 `within_x` 函数。如果你想要一个稍微整洁一些、代码行数更少的函数，可以将函数修改为如下形式：\n\n```python\n\
    def within_x(co1, co2):\n    if (co1.x1 > co2.x1 and co1.x1 < co2.x2) \\\n   \
    \         or (co1.x2 > co2.x1 and co1.x2 < co2.x2) \\\n            or (co2.x1\
    \ > co1.x1 and co2.x1 < co1.x2) \\\n            or (co2.x2 > co1.x1 and co2.x2\
    \ < co1.x1):\n        return True\n    else:\n        return False\n```\n\n为了将\
    \ `if` 语句扩展到多行，以避免产生一行包含所有条件的超长代码，我们使用反斜杠（`\\`），如上所示。\n\n## 精灵的垂直碰撞\n\n我们还需要知道精灵是否在垂直方向上碰撞。`within_y`\
    \ 函数与 `within_x` 函数非常相似。要创建它，我们检查第一个坐标的 y1 位置是否与第二个坐标的 y1 和 y2 位置交叉，反之亦然。以下是需要添加的函数（将其放在\
    \ `within_x` 函数下方）——这次我们将使用更简洁的代码版本（而不是大量的 `if` 语句）来编写：\n\n```python\ndef within_y(co1,\
    \ co2):\n    if (co1.y1 > co2.y1 and co1.y1 < co2.y2) \\\n            or (co1.y2\
    \ > co2.y1 and co1.y2 < co2.y2) \\\n            or (co2.y1 > co1.y1 and co2.y1\
    \ < co1.y2) \\\n            or (co2.y2 > co1.y1 and co2.y2 < co1.y1):\n      \
    \  return True\n    else:\n        return False\n```\n\n## 整合：最终的碰撞检测代码\n\n一旦我们确定了一组\
    \ x 坐标是否与另一组交叉，并对 y 坐标进行了同样的操作，我们就可以编写函数来判断一个精灵是否撞到了另一个精灵，以及撞到了哪一侧。我们将通过 `collided_left`、`collided_right`、`collided_top`\
    \ 和 `collided_bottom` 函数来实现这一点。\n\n## COLLIDED_LEFT 函数\n\n以下是 `collided_left`\
    \ 函数的代码，你可以将其添加到我们刚刚创建的两个 `within` 函数下方：\n\n```python\ndef collided_left(co1,\
    \ co2):\n    if within_y(co1, co2):\n        if co1.x1 <= co2.x2 and co1.x1 >=\
    \ co2.x1:\n            return True\n    return False\n```\n\n此函数告诉我们第一个坐标对象的左侧（x1\
