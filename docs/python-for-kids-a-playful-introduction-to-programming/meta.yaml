    # 2 CALCULATIONS AND VARIABLES


    Now that you have Python installed and know how to start the Python shell, you’re
    ready to do something with it. We’ll begin with some simple calculations and then
    move on to variables. *Variables* are a way of storing things in a computer program,
    and they can help you write useful programs.'
  merge: -1
  pgno: 40
- img_proc: true
  md: '# CALCULATING WITH PYTHON


    Normally, when asked to find the product of two numbers like 8 × 3.57, you would
    use a calculator or a pencil and paper. Well, how about using the Python shell
    to perform your calculation? Let’s try it.


    Start the Python shell by double-clicking the IDLE icon on your desktop or, if
    you’re using Ubuntu, by clicking the IDLE icon in the Applications menu. At the
    prompt, enter this equation:


    ```

    >>> 8 * 3.57

    28.56

    ```


    Notice that when entering a multiplication calculation in Python, you use the
    asterisk symbol (*) instead of a multiplication sign (×).


    How about if we try an equation that’s a bit more useful?


    Suppose you are digging in your backyard and uncover a bag of 20 gold coins. The
    next day, you sneak down to the basement and stick the coins inside your grandfather’s
    steam-powered replicating invention (luckily, you can just fit the 20 coins inside).
    You hear a whiz and a pop and, a few hours later, out shoot another 10 gleaming
    coins.


    How many coins would you have in your treasure chest if you did this every day
    for a year? On paper, the equations might look like this:


    10 × 365 = 3650

    20 + 3650 = 3670


    Sure, it’s easy enough to do these calculations on a calculator or on paper, but
    we can do all of these calculations with the Python shell as well. First, we multiply
    10 coins by 365 days in a year to get 3650. Next, we add the original 20 coins
    to get 3670.


    ```

    >>> 10 * 365

    3650

    >>> 20 + 3650

    3670

    ```


    Now, what if a raven spots the shiny gold sitting in your bedroom, and every week
    flies in and manages to steal three coins?'
  merge: -1
  pgno: 41
- img_proc: true
  md: 'How many coins would you have left at the end of the year? Here’s how this
    calculation looks in the shell:


    ```

    >>> 3 * 52

    156

    >>> 3670 - 156

    3514

    ```


    First, we multiply 3 coins by 52 weeks in the year. The result is 156. We subtract
    that number from our total coins (3670), which tells us that we would have 3514
    coins remaining at the end of the year.

    This is a very simple program. In this book, you’ll learn how to expand on these
    ideas to write programs that are even more useful.


    # PYTHON OPERATORS


    You can do multiplication, addition, subtraction, and division in the Python shell,
    among other mathematical operations that we won’t go into right now. The basic
    symbols used by Python to perform mathematical operations are called *operators*,
    as listed in Table 2-1.


    **Table 2-1: Basic Python Operators**


    | Symbol | Operation |

    | :--- | :--- |

    | + | Addition |

    | - | Subtraction |

    | * | Multiplication |

    | / | Division |


    The *forward slash* (/) is used for division because it’s similar to the division
    line that you would use when writing a fraction. For example, if you had 100 pirates
    and 20 large barrels and you wanted to calculate how many pirates you could hide
    in each barrel, you could divide 100 pirates by 20 barrels (100 ÷ 20) by entering
    100 / 20 in the Python shell. Just remember that the forward slash is the one
    whose top falls to the right.


    ![](img/a7a5a123e26ba8cb8ef5b41ca45700be_42_0.png)'
  merge: -1
  pgno: 42
- img_proc: true
  md: '# THE ORDER OF OPERATIONS


    We use parentheses in a programming language to control the order of operations.
    An *operation* is anything that uses an operator. Multiplication and division
    have a higher order than addition and subtraction, which means that they''re performed
    first. In other words, if you enter an equation in Python, multiplication or division
    is performed before addition or subtraction.


    For example, in the following equation, the numbers 30 and 20 are multiplied first,
    and the number 5 is added to their product.


    ```

    >>> 5 + 30 * 20

    605

    ```


    This equation is another way of saying, “multiply 30 by 20, and then add 5 to
    the result.” The result is 605. We can change the order of operations by adding
    parentheses around the first two numbers, like so:


    ```

    >>> (5 + 30) * 20

    700

    ```


    The result of this equation is 700 (not 605) because the parentheses tell Python
    to do the operation in the parentheses first, and then do the operation outside
    the parentheses. This example is saying “add 5 to 30, and then multiply the result
    by 20.”


    ![](img/a7a5a123e26ba8cb8ef5b41ca45700be_43_0.png)


    Parentheses can be *nested*, which means that there can be parentheses inside
    parentheses, like this:


    ```

    >>> ((5 + 30) * 20) / 10

    70.0

    ```


    In this case, Python evaluates the innermost parentheses first, then the outer
    ones, and then the final division operator.'
  merge: -1
  pgno: 43
- img_proc: true
  md: 'In other words, this equation is saying, “add 5 to 30, then multiply the result
    by 20, and divide that result by 10.” Here’s what happens:


    +   - Adding 5 to 30 gives 35.

    - Multiplying 35 by 20 gives 700.

    - Dividing 700 by 10 gives the final answer of 70.


    If we had not used parentheses, the result would be slightly different:


    ```

    >>> 5 + 30 * 20 / 10

    65.0

    ```


    In this case, 30 is first multiplied by 20 (giving 600), and then 600 is divided
    by 10 (giving 60). Finally, 5 is added to get the result of 65.


    > **WARNING** Remember that multiplication and division always go before addition
    and subtraction, unless parentheses are used to control the order of operations.


    # VARIABLES ARE LIKE LABELS


    The word *variable* in programming describes a place to store information such
    as numbers, text, lists of numbers and text, and so on. Another way of looking
    at a variable is that it’s like a label for something.


    For example, to create a variable named fred, we use an equal sign (=) and then
    tell Python what information the variable should be the label for. Here, we create
    the variable fred and tell Python that it labels the number 100 (note that this
    doesn’t mean that another variable can’t have the same value):


    ```

    >>> fred = 100

    ```


    To find out what value a variable labels, enter print in the shell, followed by
    the variable name in parentheses, like this:


    ```

    >>> print(fred)

    100

    ```'
  merge: -1
  pgno: 44
- img_proc: true
  md: 'We can also tell Python to change the variable fred so that it labels something
    else. For example, here''s how to change fred to the number 200:


    ```

    >>> fred = 200

    >>> print(fred)

    200

    ```


    On the first line, we say that fred labels the number 200. In the second line,
    we ask what fred is labeling, just to confirm the change. Python prints the result
    on the last line.

    We can also use more than one label (more than one variable) for the same item:


    ```

    >>> fred = 200

    >>> john = fred

    >>> print(john)

    200

    ```


    In this example, we''re telling Python that we want the name (or variable) john
    to label the same thing as fred by using the equal sign between john and fred.

    Of course, fred probably isn''t a very useful name for a variable because it most
    likely doesn''t tell us anything about what the variable is used for. Let''s call
    our variable number_of_coins instead of fred, like this:


    ```

    >>> number_of_coins = 200

    >>> print(number_of_coins)

    200

    ```


    This makes it clear that we''re talking about 200 coins.

    Variable names can be made up of letters, numbers, and the underscore character
    (_), but they can''t start with a number. You can use anything from single letters
    (such as a) to long sentences for variable names. (A variable can''t contain a
    space, so use an underscore to separate words.) Sometimes, if you''re doing something
    quick, a short variable name is best. The name you choose should depend on how
    meaningful you need the variable name to be.

    Now that you know how to create variables, let''s look at how to use them.'
