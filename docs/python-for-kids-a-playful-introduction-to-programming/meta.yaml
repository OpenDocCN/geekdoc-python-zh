  md: "So the steps of a while loop are as follows:\n\n+   1. Check the condition.\n\
    2. Execute the code in the block.\n3. Repeat.\n\nMore commonly, a while loop might\
    \ be created with a couple of conditions, rather than just one, like this:\n\n\
    ```\n>>> x = 45\n>>> y = 80\n>>> while x < 50 and y < 100:\n        x = x + 1\n\
    \        y = y + 1\n        print(x, y)\n```\n\nHere, we create a variable x with\
    \ the value 45 at ❶, and a variable y with the value 80 at ❷. The loop checks\
    \ for two conditions at ❸: whether x is less than 50 and whether y is less than\
    \ 100. While both conditions are true, the lines that follow are executed, adding\
    \ 1 to both variables and then printing them. Here’s the output of this code:\n\
    \n```\n46 81\n47 82\n48 83\n49 84\n50 85\n```\n\nCan you figure out how this works?\n\
    We start counting at 45 for the variable x and at 80 for the variable y, and then\
    \ increment (add 1 to each variable) every time the code in the loop is run. The\
    \ loop will run as long as x is less than 50 and y is less than 100. After looping\
    \ five times (1 is added to each variable each time), the value in x reaches 50.\
    \ Now the first condition (x < 50) is no longer true, so Python knows to stop\
    \ looping.\nAnother common use of a while loop is to create semi-eternal loops.\
    \ This is a type of loop that could go on forever, but actually"
