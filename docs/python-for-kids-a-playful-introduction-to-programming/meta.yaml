    # GAMES AND GRAPHICS PROGRAMMING


    If you want to do more with games or graphics programming, you’ll find many options
    available. Here are just a few:


    +   - BlitzBasic (http://www.blitzbasic.com/), which uses a special version of
    the BASIC programming language designed specifically for games

    - Adobe Flash, a type of animation software designed to run in the browser, which
    has its own programming language called ActionScript (http://www.adobe.com/devnet/actionscript.html)

    - Alice (http://www.alice.org/), a 3D programming environment (for Microsoft Windows
    and Mac OS X only)

    - Scratch (http://scratch.mit.edu/), a tool for developing games

    - Unity3D (http://unity3d.com/), another tool for creating games


    An online search will uncover a wealth of resources to help you get started with
    any of these options.

    On the other hand, if you would like to continue playing with Python, you could
    use PyGame, the Python module designed for game development. Let’s explore that
    option.


    # PYGAME


    PyGame Reloaded (pgreloaded or pygame2) is the version of PyGame that works with
    Python 3 (earlier versions work only with Python 2). A good place to start reading
    is the pgreloaded tutorial at http://code.google.com/p/pgreloaded/.


    > NOTE: As of this writing, there is no installer for pgreloaded on Mac OS X or
    Linux, so there is no straightforward way to use it on either of these operating
    systems.


    Writing a game with PyGame is a little more complicated than using tkinter. For
    example, in Chapter 12, we displayed an image using tkinter with this code:


    ```

    from tkinter import *

    tk = Tk()

    canvas = Canvas(tk, width=400, height=400)

    canvas.pack()

    myimage = PhotoImage(file=''c:\test.gif'')

    canvas.create_image(0, 0, anchor=NW, image=myimage)

    ```'
  - '[PAGE 312]


    The same code using PyGame (loading a .bmp file rather than a .gif file) would
    look like this:


    ```

    import sys

    import time

    import pygame2

    import pygame2.sdl.constants as constants

    import pygame2.sdl.image as image

    import pygame2.sdl.video as video

    video.init()

    img = image.load_bmp("c:\test.bmp")

    screen = video.set_mode(img.width, img.height)

    screen.fill(pygame2.Color(255, 255, 255))

    screen.blit(img, (0, 0))

    screen.flip()

    time.sleep(10)

    video.quit()

    ```


    After importing the pygame2 modules, we call the init function on the PyGame video
    module at ❶, which is a bit like the call to create the canvas and then pack it
    in the tkinter example. We load a BMP image using the load_bmp function at ❷,
    and then create a screen object using the set_mode function, passing in the width
    and height of the loaded image as parameters at ❸. With the next (optional) line,
    we wipe the screen by filling it with white at ❹, and then use the blit function
    of the screen object to display the image at ❺. The parameters for this function
    are the img object and a tuple containing the position where we want to display
    the image (0 pixels across, 0 pixels down).


    PyGame uses an off-screen buffer (also known as a double-buffer). An off-screen
    buffer is a technique used to draw graphics in an area of the computer’s memory
    where it isn’t visible, and then to copy that entire area into the visible display
    (onto your screen) all at once. Off-screen buffering reduces the flickering effect
    if you happen to be drawing a lot of different objects on a display. Copying from
    the off-screen buffer to the visible display is performed using the flip function
    at ❻.


    Finally, we sleep for 10 seconds at ❼ because, unlike tkinter’s canvas, the screen
    will immediately close if we don’t stop it from doing so. At ❽, we clean up using
    video.init so that PyGame will shut down properly. There’s a lot more to PyGame,
    but this short example gives you an idea of what it’s like.'
