    \ PlatformSprite(Sprite):\n    def __init__(self, game, photo_image, x, y, width,\
    \ height):\n        Sprite.__init__(self, game)\n        self.photo_image = photo_image\n\
    \        self.image = game.canvas.create_image(x, y,\n            image=self.photo_image,\
    \ anchor='nw')\n        self.coordinates = Coords(x, y, x + width, y + height)\n\
    ```\n\nWhen we define the PlatformSprite class at ❶, we give it a single parameter:\
    \ the name of the parent class (Sprite). The __init__ function, at ❷, has seven\
