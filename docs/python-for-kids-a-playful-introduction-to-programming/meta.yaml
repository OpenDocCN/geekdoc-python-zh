    \ through a list of sprites, we can call the function move, and it won't cause\
    \ any errors. Why not? Because each sprite has that function.\n\n![](img/a7a5a123e26ba8cb8ef5b41ca45700be_270_0.png)\n\
    \n> **NOTE**\n\n*Classes with functions that don't do very much are actually quite\
    \ common in programming. In a way, they're a kind of agreement or contract that\
    \ makes sure all the children of a class provide the same sort of functionality,\
    \ even if in some cases the functions in the child classes do nothing.*\n\n##\
    \ ADDING THE PLATFORMS\n\nNow we'll add the platforms. We'll call our class for\
    \ platform objects PlatformSprite, and it will be a child class of Sprite. The\
    \ `__init__` function for this class will take a game parameter (as the Sprite\
    \ parent class does), as well as an image, x and y positions, and the image width\
