    )\n        print(\"Because rather than eating 9, 7 8 pi.\")\n    else:\n     \
    \   print(\"Huh?\")\n```\n\nWhat did 0 say to 8? Hi guys!\n\nIn this example,\
    \ the if statement on the second line checks to see if the value of the age variable\
    \ is equal to 10 at ①. The print statement that follows at ② is run if age is\
    \ equal to 10. However, since we've set age equal to 12, the computer jumps to\
    \ the next if statement at ③ and checks if the value of age is equal to 11. It\
    \ isn't, so the computer jumps to the next if statement at ④ to see if age is\
    \ equal to 12. It is, so this time, the computer executes the print command at\
    \ ⑤.\n\nWhen you enter this code in the IDLE, it will automatically indent, so\
    \ be sure to press the BACKSPACE or DELETE key once you've typed each print statement,\
    \ so that your if, elif, and else statements will start at the far-left margin.\
    \ This is the same position the if statement would be in if the prompt (>>>) were\
    \ absent.\n\n## COMBINING CONDITIONS\n\nYou can combine conditions by using the\
    \ keywords and and or, which produces shorter and simpler code. Here’s an example\
    \ of using or:\n\n```python\n>>> if age == 10 or age == 11 or age == 12 or age\
    \ == 13:\n        print('What is 13 + 49 + 84 + 155 + 97? A headache!')\n    else:\n\
    \        print('Huh?')\n```\n\nIn this code, if any of the conditions on the first\
    \ line are true (in other words, if age is 10, 11, 12, or 13), the block of code\
    \ on the next line beginning with print will run.\nIf the conditions in the first\
    \ line are not true (else), Python moves to the block in the last line, displaying\
    \ Huh? on the screen.\nTo shrink this example even further, we could use the and\
    \ keyword, along with the greater than or equal-to operator (>=) and less-than-or-equal-to\
    \ operator (<=), as follows:\n\n```python\n>>> if age >= 10 and age <= 13:\n \
    \       print('What is 13 + 49 + 84 + 155 + 97? A headache!')\n    else:\n   \
    \     print('Huh?')\n```\n\nHere, if age is greater than or equal to 10 and less\
    \ than or equal to 13, as defined on the first line with if age >= 10 and age\
    \ <= 13:, the block of code beginning with print on the following line will run.\
    \ For example, if the value of age is 12, then What is 13 + 49 + 84 + 155 + 97?\
    \ A headache! will be printed to the screen, because 12 is more than 10 and less\
    \ than 13.\n\n## VARIABLES WITH NO VALUE—NONE\n\nJust as we can assign numbers,\
    \ strings, and lists to a variable, we can also assign nothing, or an empty value,\
    \ to a variable. In Python, an empty value is referred to as None, and it is the\
    \ absence of value. And it’s important to note that the value None is different\
    \ from the value 0 because it is the absence of a value, rather than a number\
    \ with a value of 0. The only value that a variable has when we give it the empty\
    \ value None is nothing. Here’s an example:\n\n```python\n>>> myval = None\n>>>\
    \ print(myval)\nNone\n```\n\nAssigning a value of None to a variable is one way\
    \ to reset it to its original, empty state. Setting a variable to None is also\
    \ a way to define a variable without setting its value. You might do this when\
    \ you know you’re going to need a variable later in your program, but you want\
    \ to define all your variables at the beginning. Programmers often define their\
    \ variables at the beginning of a program because placing them there makes it\
    \ easy to see the names of all the variables used by a chunk of code.\nYou can\
    \ check for None in an if statement as well, as in the following example:\n\n\
    ```python\n>>> myval = None\n>>> if myval == None:\n        print(\"The variable\
    \ myval doesn't have a value\")\n```\n\nThe variable myval doesn't have a value\n\
    \nThis is useful when you only want to calculate a value for a variable if it\
    \ hasn’t already been calculated.\n\n## THE DIFFERENCE BETWEEN STRINGS AND NUMBERS\n\
    \nUser input is what a person enters on the keyboard—whether that’s a character,\
    \ a pressed arrow or ENTER key, or anything else. User input comes into Python\
    \ as a string, which means that when you type the number 10 on your keyboard,\
    \ Python saves the number 10 into a variable as a string, not a number.\nWhat’s\
    \ the difference between the number 10 and the string '10'? Both look the same\
    \ to us, with the only difference being that one is surrounded by quotes. But\
    \ to a computer, the two are very different.\n\nFor example, suppose that we compare\
    \ the value of the variable age to a number in an if statement, like this:\n\n\
    ```python\n>>> if age == 10:\n        print(\"What's the best way to speak to\
    \ a monster?\")\n        print(\"From as far away as possible!\")\n```\n\nThen\
    \ we set the variable age to the number 10:\n\n```python\n>>> age = 10\n>>> if\
    \ age == 10:\n        print(\"What's the best way to speak to a monster?\")\n\
    \        print(\"From as far away as possible!\")\n```\n\nWhat's the best way\
    \ to speak to a monster?\nFrom as far away as possible!\n\nAs you can see, the\
    \ print statement executes.\nNext, we set age to the string '10' (with quotes),\
    \ like this:\n\n```python\n>>> age = '10'\n>>> if age == 10:\n        print(\"\
    What's the best way to speak to a monster?\")\n        print(\"From as far away\
    \ as possible!\")\n```\n\nHere, the code in the print statement doesn't run because\
    \ Python doesn't see the number in quotes (a string) as a number.\nFortunately,\
    \ Python has magic functions that can turn strings into numbers and numbers into\
    \ strings. For example, you can convert the string '10' into a number with int:\n\
    \n```python\n>>> age = '10'\n>>> converted_age = int(age)\n```\n\nThe variable\
    \ converted_age would now hold the number 10.\n\nTo convert a number into a string,\
    \ use str:\n\n```python\n>>> age = 10\n>>> converted_age = str(age)\n```\n\nIn\
    \ this case, converted_age would hold the string 10 instead of the number 10.\n\
    Remember that if age == 10 statement that didn't print anything when the variable\
    \ was set to a string (age = '10')? If we convert the variable first, we get an\
    \ entirely different result:\n\n```python\n>>> age = '10'\n>>> converted_age =\
    \ int(age)\n>>> if converted_age == 10:\n        print(\"What's the best way to\
    \ speak to a monster?\")\n        print(\"From as far away as possible!\")\n```\n\
    \nWhat's the best way to speak to a monster?\nFrom as far away as possible!\n\n\
    But hear this: If you try to convert a number with a decimal point, you'll get\
    \ an error because the int function expects an integer.\n\n```python\n>>> age\
    \ = '10.5'\n>>> converted_age = int(age)\nTraceback (most recent call last):\n\
    \  File \"<pyshell#35>\", line 1, in <module>\n    converted_age = int(age)\n\
    ValueError: invalid literal for int() with base 10: '10.5'\n```\n\nA ValueError\
    \ is what Python uses to tell you that the value you have tried to use isn't appropriate.\
    \ To fix this, use the function float instead of int. The float function can handle\
    \ numbers that aren't integers.\n\n```python\n>>> age = '10.5'\n>>> converted_age\
    \ = float(age)\n>>> print(converted_age)\n10.5\n```\n\nYou will also get a ValueError\
    \ if you try to convert a string that doesn't contain a number in digits:\n\n\
    ```python\n>>> age = 'ten'\n>>> converted_age = int(age)\nTraceback (most recent\
    \ call last):\n  File \"<pyshell#1>\", line 1, in <module>\n```"
