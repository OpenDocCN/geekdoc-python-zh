    ```\n\nAs with the button example, a window will appear when you enter `tk = Tk()`.\
    \ On the last line, we pack the canvas with `canvas.pack()`, which changes the\
    \ size of the canvas to a width of 500 pixels and a height of 500 pixels, as specified\
