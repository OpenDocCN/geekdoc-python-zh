    \n# MAKING AN OBJECT REACT TO SOMETHING\n\nWe can make the triangle react when\
    \ someone presses a key by using *event bindings*. *Events* are things that occur\
    \ while a program is running, such as someone moving the mouse, pressing a key,\
    \ or closing a window. You can tell tkinter to watch for these events and then\
    \ do something in response.\n\nTo begin handling events (making Python do something\
    \ when an event occurs), we first create a function. The binding part comes when\
    \ we tell tkinter that a particular function is bound (or associated) to a specific\
    \ event; in other words, it will be automatically called by tkinter to handle\
    \ that event.\n\nFor example, to make the triangle move when the ENTER key is\
    \ pressed, we can define this function:\n\n```\ndef movetriangle(event):\n   \
    \ canvas.move(1, 5, 0)\n```\n\nThe function takes a single parameter (event),\
    \ which tkinter uses to send information to the function about the event. We now\
    \ tell tkinter that this function should be used for a particular event, using\
    \ the bind_all function on the canvas. The full code now looks like this:\n\n\
    ```\nfrom tkinter import *\ntk = Tk()\ncanvas = Canvas(tk, width=400, height=400)\n\
    canvas.pack()\ncanvas.create_polygon(10, 10, 10, 60, 50, 35)\ndef movetriangle(event):\n\
    \    canvas.move(1, 5, 0)\ncanvas.bind_all('<KeyPress-Return>', movetriangle)\n\
    ```\n\nThe first parameter in this function describes the event that we want tkinter\
    \ to watch for. In this case, it's called <KeyPress-Return>,"
