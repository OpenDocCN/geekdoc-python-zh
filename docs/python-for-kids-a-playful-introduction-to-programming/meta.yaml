- img_proc: true
  md: 'In the **Afterword**, we wrap up with a look at PyGame and some other popular
    programming languages.

    Finally, in the **Appendix**, you''ll learn about Python''s keywords in detail,
    and in the **Glossary**, you''ll find definitions of the programming terms used
