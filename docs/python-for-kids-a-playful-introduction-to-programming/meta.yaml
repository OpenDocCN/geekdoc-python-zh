- img_proc: true
  md: '# SAVING YOUR PYTHON PROGRAMS


    Python programs wouldn''t be very useful if you needed to rewrite them every time
    you wanted to use them, never mind print them out so you could reference them.
    Sure, it might be fine to just rewrite short programs, but a large program, like
    a word processor, could contain millions of lines of code. Print that all out,
    and you could have well over 100,000 pages. Just imagine trying to carry that
    huge stack of paper home. Better hope that you won''t meet up with a big gust
    of wind.


    Luckily, we can save our programs for future use. To save a new program, open
    IDLE and choose **File ▸ New Window**. An empty window will appear, with **\*Untitled\***
    in the menu bar. Enter the following code into the new shell window:


    ```

    print("Hello World")

    ```


    Now, choose **File ▸ Save**. When prompted for a filename, enter *hello.py*, and
    save the file to your desktop. Then choose **Run ▸ Run Module**. With any luck,
    your saved program should run, like this:


    ![](img/a7a5a123e26ba8cb8ef5b41ca45700be_37_0.png)


    Now, if you close the shell window but leave the *hello.py* window open and then
    choose **Run ▸ Run Module**, the Python shell should reappear, and your program
    should run again. (To reopen the Python shell without running the program, choose
    **Run ▸ Python Shell**.)


    ![](img/a7a5a123e26ba8cb8ef5b41ca45700be_37_1.png)'
