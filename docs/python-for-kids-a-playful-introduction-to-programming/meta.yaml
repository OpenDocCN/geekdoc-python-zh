    \ '__trunc__',\n'__xor__', 'bit_length', 'conjugate', 'denominator', 'imag',\n\
    'numerator', 'real']\n```\n\nThe dir function can be useful when you have a variable\
    \ and quickly want to find out what you can do with it. For example, run"
