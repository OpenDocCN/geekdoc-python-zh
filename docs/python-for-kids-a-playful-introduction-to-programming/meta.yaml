    \ them.\n\n```\nelif self.x < 0 and co.x1 <= 0:\n    self.x = 0\n    left = False\n\
    for sprite in self.game.sprites:\n    if sprite == self:\n        continue\n \
    \   sprite_co = sprite.coords()\n    if top and self.y < 0 and collided_top(co,\
    \ sprite_co):\n        self.y = -self.y\n        top = False\n```\n\nAt ❶, we\
    \ loop through the list of sprites, assigning each one in turn to the variable\
    \ sprite. At ❷, we say that if the sprite is equal to self (that's another way\
    \ of saying, “if this sprite is the same as me”), we don't need to determine whether\
    \ the stick figure has collided because he would have only hit himself. If the\
    \ sprite variable is equal to self, we use continue to jump to the next sprite\
    \ in the list. Next, we get the coordinates of the new sprite by calling its coords\
    \ function at ❹ and storing the results in the variable sprite_co. Then the code\
    \ at ❺ checks for the following:\n\n+   - The stick figure has not hit the top\
    \ of the canvas (the top variable is still true).\n- The stick figure is jumping\
    \ (the value of y is less than 0).\n- The top of the stick figure has collided\
    \ with the sprite from the list (using the collided_top function we created in\
    \ Chapter 16).\n\n![](img/a7a5a123e26ba8cb8ef5b41ca45700be_293_0.png)"
  - "[PAGE 294]\n\nIf all of these conditions are true, we want the sprite to start\
    \ falling back down again, so at ❻, we reverse the value of the y using minus\
    \ (-). The top variable is set to False at ❼, because once the stick figure has\
    \ hit the top, we don't need to keep checking for a collision.\n\n# COLLIDING\
    \ AT THE BOTTOM\n\nThe next part of the loop checks to see if the bottom of our\
    \ character has hit something:\n\n```\nif top and self.y < 0 and collided_top(co,\
    \ sprite_co):\n    self.y = -self.y\n    top = False\n❶ if bottom and self.y >\
    \ 0 and collided_bottom(self.y, \\n        co, sprite_co):\n❷     self.y = sprite_co.y1\
    \ - co.y2\n❸     if self.y < 0:\n❹         self.y = 0\n❺     bottom = False\n\
    ❻     top = False\n```\n\nThere are three similar checks at ❶: whether the bottom\
    \ variable is still set, whether the character is falling (y is greater than 0),\
    \ and whether the bottom of our character has hit the sprite. If all three checks\
    \ are true, we subtract the bottom y value (y2) of the stick figure from the top\
    \ y value of the sprite (y1) at ❷. This might seem strange, so let's see why we\
    \ do this.\n\nImagine that our game character has fallen off a platform. He moves\
    \ down the screen 4 pixels each time the mainloop function runs, and the foot\
    \ of the stick figure is 3 pixels above another platform. Let's say the stick\
    \ figure's bottom (y2) is at position 57 and the top of the platform (y1) is at\
    \ position 60. In this case, the collided_bottom function would return true, because\
    \ its code will add the value of y (which is 4) to the stick figure's y2 variable,\
    \ resulting in 61.\n\nHowever, we don't want Mr. Stick Man to stop falling as\
    \ soon as it looks like he will hit a platform or the bottom of the screen, because\
    \ that would be like taking a huge jump off a step and stopping in midair, an\
    \ inch above the ground. That may be a neat trick, but it won't look right in\
    \ our game. Instead, if we subtract the character's y2 value (of 57) from the\
    \ platform's y1 value (of 60) we get 3, the amount the stick figure should drop\
    \ in order to land properly on the top of the platform."
  - "[PAGE 295]\n\nAt ③, we make sure that the calculation doesn't result in a negative\
    \ number; if it does, we set y equal to 0 at ④. (If we let the number be negative,\
    \ the stick figure would fly back up again, and we don't want that to happen in\
    \ this game.)\nFinally, we set the top ⑥ and bottom ⑤ flags to False, so we no\
    \ longer need to check whether the stick figure has collided at the top or bottom\
    \ with another sprite.\nWe'll do one more bottom check to see whether the stick\
    \ figure has run off the edge of a platform. Here's the code for this if statement:\n\
    \n```\nif self.y < 0:\n    self.y = 0\n    bottom = False\n    top = False\nif\
    \ bottom and falling and self.y == 0 \\n        and co.y2 < self.game.canvas_height\
    \ \\n        and collided_bottom(1, co, sprite_co):\n    falling = False\n```\n\
    \nFive checks here must all be true in order for the falling variable to be set\
    \ to False:\n\n+   - We still need to check that the bottom flag is set to True.\n\
    - We need to check whether the stick figure should be falling (the falling flag\
    \ is still set to True).\n- The stick figure isn't already falling (y is 0).\n\
    - The bottom of the sprite hasn't hit the bottom of the screen (it's less than\
    \ the canvas height).\n- The stick figure has hit the top of a platform (collided_bottom\
    \ returns True).\n\nThen we set the falling variable to False.\n\n# CHECKING LEFT\
    \ AND RIGHT\n\nWe've checked whether the stick figure has hit a sprite at the\
    \ bottom or the top. Now we need to check whether he has hit the left or right\
    \ side, with this code:\n\n```\nif bottom and falling and self.y == 0 \\n    \
    \    and co.y2 < self.game.canvas_height \\n        and collided_bottom(1, co,\
    \ sprite_co):\n    falling = False\n```"
- md: "## TESTING OUR STICK FIGURE SPRITE\n\nHaving created the StickFigureSprite\
    \ class, let’s try it out by adding the following two lines just before the call\
    \ to the mainloop function.\n\n```\nsf = StickFigureSprite(g)\ng.sprites.append(sf)\n\
    g.mainloop()\n```\n\nAt 1, we create a StickFigureSprite object and set it equal\
    \ to the variable sf. As we did with the platforms, we add this new variable to\
    \ the list of sprites stored in the game object at 2.\nNow run the program. You\
    \ will find that Mr. Stick Man can run, jump from platform to platform, and fall!\n\
    \n![](img/a7a5a123e26ba8cb8ef5b41ca45700be_298_0.png)\n\n## THE DOOR!\n\nThe only\
    \ thing missing from our game is the door to the exit. We’ll finish up by creating\
    \ a sprite for the door, adding code to detect the door, and giving our program\
    \ a door object.\n\n## CREATING THE DOORSPRITE CLASS\n\nYou guessed it—we need\
    \ to create one more class: DoorSprite. Here’s the start of the code:\n\n```\n\
    class DoorSprite(Sprite):\n    def __init__(self, game, photo_image, x, y, width,\
    \ height):\n        Sprite.__init__(self, game)\n        self.photo_image = photo_image\n\
    \        self.image = game.canvas.create_image(x, y,\n            image=self.photo_image,\
    \ anchor='nw')\n        self.coordinates = Coords(x, y, x + (width / 2), y + height)\n\
    \        self.endgame = True\n```\n\nAs shown at ❶, the __init__ function of the\
    \ DoorSprite class has parameters for self, a game object, a photo_image object,\
    \ the x and y coordinates, and the width and height of the image. At ❷, we call\
    \ __init__ as with our other sprite classes.\n\n![](img/a7a5a123e26ba8cb8ef5b41ca45700be_299_0.png)\n\
    \nAt ❸, we save the parameter photo_image using an object variable with the same\
    \ name, as we did with PlatformSprite. We create a display image using the canvas\
    \ create_image function and save the identifying number returned by that function\
    \ using the object variable image at ❹.\n\nAt ❺, we set the coordinates of DoorSprite\
    \ to the x and y parameters (which become the x1 and y1 positions of the door),\
    \ and then calculate the x2 and y2 positions. We calculate the x2 position by\
    \ adding half of the width (the width variable, divided by 2) to the x parameter.\
    \ For example, if x is 10 (the x1 coordinate is also 10), and the width is 40,\
    \ the x2 coordinate would be 30 (10 plus half of 40).\n\nWhy use this confusing\
    \ little calculation? Because, unlike with the platforms, where we want Mr. Stick\
    \ Man to stop running as soon as he collides with the side of the platform, we\
    \ want him to stop in front of the door. (It won’t look good if Mr. Stick Man\
    \ stops running next to the door!) You’ll see this in action when you play the\
    \ game and make it to the door.\n\nUnlike the x1 position, the y1 position is\
    \ simple to calculate. We just add the value of the height variable to the y parameter,\
    \ and that’s it.\n\nFinally, at ❻, we set the endgame object variable to True.\
    \ This says that when the stick figure reaches the door, the game should end.\n\
    \n## DETECTING THE DOOR\n\nNow we need to change the code in the StickFigureSprite\
    \ class of the move function that determines when the stick figure has collided\
    \ with a sprite on the left or the right. Here’s the first change:\n\n```\nif\
    \ left and self.x < 0 and collided_left(co, sprite_co):\n    self.x = 0\n    left\
    \ = False\n    if sprite.endgame:\n        self.game.running = False\n```\n\n\
    We check to see if the sprite that the stick figure has collided with has an endgame\
    \ variable that is set to True. If it does, we set the running variable to False,\
    \ and everything stops—we’ve reached the end of the game.\nWe’ll add these same\
    \ lines to the code that checks for a collision on the right. Here’s the code:\n\
    \n```\nif right and self.x > 0 and collided_right(co, sprite_co):\n    self.x\
    \ = 0\n    right = False\n    if sprite.endgame:\n        self.game.running =\
    \ False\n```\n\n## ADDING THE DOOR OBJECT\n\nOur final addition to the game code\
    \ is an object for the door. We’ll add this before the main loop. Just before\
    \ creating the stick figure object, we’ll create a door object, and then add it\
    \ to the list of sprites. Here’s the code:\n\n```\ng.sprites.append(platform7)\n\
    g.sprites.append(platform8)\ng.sprites.append(platform9)\ng.sprites.append(platform10)\n\
    door = DoorSprite(g, PhotoImage(file=\"door1.gif\"), 45, 30, 40, 35)\ng.sprites.append(door)\n\
    sf = StickFigureSprite(g)\ng.sprites.append(sf)\ng.mainloop()\n```\n\nWe create\
    \ a door object using the variable for our game object, g, followed by a PhotoImage\
    \ (the door image we created in Chapter 15). We set the x and y parameters to\
    \ 45 and 30 to put the door on a platform near the top of the screen, and set\
    \ the width and height to 40 and 35. We add the door object to the list of sprites,\
    \ as with all the other sprites in the game.\n\nYou can see the result when Mr.\
    \ Stick Man reaches the door. He stops running in front of the door, rather than\
    \ next to it, as shown here:\n\n![](img/a7a5a123e26ba8cb8ef5b41ca45700be_301_0.png)\n\
    \n## THE FINAL GAME\n\nThe full listing of our game is now a bit more than 200\
    \ lines of code. The following is the complete code for the game. If you have\
    \ trouble getting your game to work, compare each function (and each class) to\
    \ this listing and see where you've gone wrong.\n\n```\nfrom tkinter import *\n\
    import random\nimport time\n\nclass Game:\n    def __init__(self):\n        self.tk\
    \ = Tk()\n        self.tk.title(\"Mr. Stick Man Races for the Exit\")\n      \
    \  self.tk.resizable(0, 0)\n```"
  mdcn: "## 测试我们的火柴人精灵\n\n创建了 `StickFigureSprite` 类后，让我们在调用 `mainloop` 函数之前添加以下两行代码来测试它。\n\
    \n```\nsf = StickFigureSprite(g)\ng.sprites.append(sf)\ng.mainloop()\n```\n\n\
    在❶处，我们创建了一个 `StickFigureSprite` 对象并将其赋值给变量 `sf`。就像处理平台一样，我们在❷处将这个新变量添加到游戏对象存储的精灵列表中。\n\
    现在运行程序。你会发现火柴人先生可以奔跑、在平台间跳跃，还能掉落！\n\n![](img/a7a5a123e26ba8cb8ef5b41ca45700be_298_0.png)\n\
    \n## 门！\n\n我们的游戏唯一缺少的就是出口的门。我们将通过创建门的精灵、添加检测门的代码，并为程序添加一个门对象来完成它。\n\n## 创建 DoorSprite\
    \ 类\n\n你猜对了——我们需要再创建一个类：`DoorSprite`。以下是代码的开头：\n\n```\nclass DoorSprite(Sprite):\n\
    \    def __init__(self, game, photo_image, x, y, width, height):\n        Sprite.__init__(self,\
    \ game)\n        self.photo_image = photo_image\n        self.image = game.canvas.create_image(x,\
    \ y,\n            image=self.photo_image, anchor='nw')\n        self.coordinates\
    \ = Coords(x, y, x + (width / 2), y + height)\n        self.endgame = True\n```\n\
    \n如❶所示，`DoorSprite` 类的 `__init__` 函数包含 `self`、一个 `game` 对象、一个 `photo_image` 对象、x\
    \ 和 y 坐标以及图像的宽度和高度等参数。在❷处，我们像调用其他精灵类一样调用 `__init__`。\n\n![](img/a7a5a123e26ba8cb8ef5b41ca45700be_299_0.png)\n\
    \n在❸处，我们使用同名的对象变量保存参数 `photo_image`，就像处理 `PlatformSprite` 一样。我们使用画布的 `create_image`\
    \ 函数创建一个显示图像，并在❹处使用对象变量 `image` 保存该函数返回的标识号。\n\n在❺处，我们将 `DoorSprite` 的坐标设置为 x\
    \ 和 y 参数（它们成为门的 x1 和 y1 位置），然后计算 x2 和 y2 位置。我们通过将宽度的一半（`width` 变量除以 2）加到 x 参数上来计算\
    \ x2 位置。例如，如果 x 是 10（x1 坐标也是 10），宽度是 40，那么 x2 坐标将是 30（10 加上 40 的一半）。\n\n为什么要使用这个令人困惑的小计算？因为，与平台不同——我们希望火柴人先生一碰到平台侧面就停止奔跑——我们希望他停在门前。（如果火柴人先生停在门旁边，看起来会很奇怪！）当你玩游戏并到达门时，你会看到实际效果。\n\
    \n与 x1 位置不同，y1 位置很容易计算。我们只需将 `height` 变量的值加到 y 参数上，就这样。\n\n最后，在❻处，我们将 `endgame`\
    \ 对象变量设置为 `True`。这表示当火柴人到达门时，游戏应该结束。\n\n## 检测门\n\n现在我们需要修改 `StickFigureSprite`\
    \ 类中 `move` 函数的代码，该函数用于确定火柴人何时与左侧或右侧的精灵发生碰撞。以下是第一处更改：\n\n```\nif left and self.x\
    \ < 0 and collided_left(co, sprite_co):\n    self.x = 0\n    left = False\n  \
    \  if sprite.endgame:\n        self.game.running = False\n```\n\n我们检查火柴人碰撞的精灵是否有一个设置为\
    \ `True` 的 `endgame` 变量。如果有，我们将 `running` 变量设置为 `False`，一切停止——我们已经到达游戏的终点。\n我们将把这些相同的行添加到检查右侧碰撞的代码中。代码如下：\n\
    \n```\nif right and self.x > 0 and collided_right(co, sprite_co):\n    self.x\
    \ = 0\n    right = False\n    if sprite.endgame:\n        self.game.running =\
    \ False\n```\n\n## 添加门对象\n\n我们对游戏代码的最后添加是一个门对象。我们将在主循环之前添加它。就在创建火柴人对象之前，我们将创建一个门对象，然后将其添加到精灵列表中。代码如下：\n\
    \n```\ng.sprites.append(platform7)\ng.sprites.append(platform8)\ng.sprites.append(platform9)\n\
    g.sprites.append(platform10)\ndoor = DoorSprite(g, PhotoImage(file=\"door1.gif\"\
    ), 45, 30, 40, 35)\ng.sprites.append(door)\nsf = StickFigureSprite(g)\ng.sprites.append(sf)\n\
    g.mainloop()\n```\n\n我们使用游戏对象变量 `g` 创建一个门对象，后跟一个 `PhotoImage`（我们在第 15 章创建的门图像）。我们将\
    \ x 和 y 参数设置为 45 和 30，将门放在屏幕顶部附近的一个平台上，并将宽度和高度设置为 40 和 35。我们将门对象添加到精灵列表中，就像游戏中的所有其他精灵一样。\n\
    \n当火柴人先生到达门时，你可以看到结果。他停在门前，而不是旁边，如下所示：\n\n![](img/a7a5a123e26ba8cb8ef5b41ca45700be_301_0.png)\n\
    \n## 最终游戏\n\n我们游戏的完整代码现在有 200 多行。以下是游戏的完整代码。如果你的游戏运行有问题，请将每个函数（和每个类）与此列表进行比较，看看哪里出错了。\n\
    \n```\nfrom tkinter import *\nimport random\nimport time\n\nclass Game:\n    def\
    \ __init__(self):\n        self.tk = Tk()\n        self.tk.title(\"Mr. Stick Man\
    \ Races for the Exit\")\n        self.tk.resizable(0, 0)\n```"
