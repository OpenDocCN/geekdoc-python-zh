    \n```python\ng = Game()\nplatform1 = PlatformSprite(g, PhotoImage(file=\"platform1.gif\"\
    ),\n    0, 480, 100, 10)\ng.sprites.append(platform1)\ng.mainloop()\n```\n\nAs\
    \ you can see, lines ① and ④ have not changed, but at ②, we create an object of\
    \ the PlatformSprite class, passing it the variable for our game (g), along with\
    \ a PhotoImage object (which uses the first of our platform images, platform1.gif).\
    \ We also pass it the position where we want to draw the platform (0 pixels across\
