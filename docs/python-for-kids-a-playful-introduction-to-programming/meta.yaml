  md: "To convert a number into a string, use str:\n\n```\n>>> age = 10\n>>> converted_age\
    \ = str(age)\n```\n\nIn this case, converted_age would hold the string 10 instead\
    \ of the number 10.\nRemember that if age == 10 statement that didn't print anything\
    \ when the variable was set to a string (age = '10')? If we convert the variable\
    \ first, we get an entirely different result:\n\n```\n>>> age = '10'\n>>> converted_age\
    \ = int(age)\n>>> if converted_age == 10:\n        print(\"What's the best way\
    \ to speak to a monster?\")\n        print(\"From as far away as possible!\")\n\
    What's the best way to speak to a monster?\nFrom as far away as possible!\n```\n\
    \nBut hear this: If you try to convert a number with a decimal point, you'll get\
    \ an error because the int function expects an integer.\n\n```\n>>> age = '10.5'\n\
    >>> converted_age = int(age)\nTraceback (most recent call last):\n  File \"<pyshell#35>\"\
    , line 1, in <module>\n    converted_age = int(age)\nValueError: invalid literal\
    \ for int() with base 10: '10.5'\n```\n\nA ValueError is what Python uses to tell\
    \ you that the value you have tried to use isn't appropriate. To fix this, use\
    \ the function float instead of int. The float function can handle numbers that\
    \ aren't integers.\n\n```\n>>> age = '10.5'\n>>> converted_age = float(age)\n\
    >>> print(converted_age)\n10.5\n```\n\nYou will also get a ValueError if you try\
    \ to convert a string that doesn't contain a number in digits:\n\n```\n>>> age\
    \ = 'ten'\n>>> converted_age = int(age)\nTraceback (most recent call last):\n\
    \  File \"<pyshell#1>\", line 1, in <module>\n```"
