  md: "The len function is particularly useful when you're working with loops. For\
    \ example, we could use it to display the index positions of the elements in a\
    \ list like this:\n\n```\n>>> fruit = ['apple', 'banana', 'clementine', 'dragon\
    \ fruit']\n>>> length = len(fruit)\n>>> for x in range(0, length):\n        print('the\
    \ fruit at index %s is %s' % (x, fruit[x]))\n```\n\n```\nthe fruit at index 0\
    \ is apple\nthe fruit at index 1 is banana\nthe fruit at index 2 is clementine\n\
    the fruit at index 3 is dragon fruit\n```\n\nHere, we store the length of the\
    \ list in the variable length at ❶, and then use that variable in the range function\
    \ to create our loop at ❷. At ❸, as we loop through each item in the list, we\
    \ print a message showing the item's index position and value. You could also\
    \ use the len function, if you had a list of strings and wanted to print every\
    \ second or third item in the list.\n\n![](img/a7a5a123e26ba8cb8ef5b41ca45700be_144_0.png)\n\
    \n# THE MAX AND MIN FUNCTIONS\n\nThe max function returns the largest item in\
    \ a list, tuple, or string. For example, here's how to use it with a list of numbers:\n\
    \n```\n>>> numbers = [5, 4, 10, 30, 22]\n>>> print(max(numbers))\n30\n```\n\n\
    A string with the characters separated by commas or spaces will also work:\n\n\
    ```\n>>> strings = 's,t,r,i,n,g,S,T,R,I,N,G'\n>>> print(max(strings))\nt\n```"
