    \ to know why the backslashes are there.\n\nHere are a few examples of how escaping\
    \ works:\n\n```\n>>> single_quote_str = 'He said, \"Aren\\'t can\\'t shouldn\\\
    't wouldn\\'t.\"'\n>>> double_quote_str = \"He said, \\\"Aren't can't shouldn't\
    \ wouldn't.\\\"\"\n>>> print(single_quote_str)\nHe said, \"Aren't can't shouldn't\
    \ wouldn't.\"\n>>> print(double_quote_str)\nHe said, \"Aren't can't shouldn't\
    \ wouldn't.\"\n```\n\nFirst, at ❶, we create a string with single quotes, using\
    \ the backslash in front of the single quotes inside that string. At ❷, we create\
    \ a string with double quotes, and use the backslash in front of those quotes\
    \ in the string. In the lines that follow, we print the variables we've just created.\
    \ Notice that the backslash character doesn't appear in the strings when we print\
    \ them."
