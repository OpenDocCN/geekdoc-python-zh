    \n```\n>>> wizard_list = ['spider legs', 'toe of frog', 'snail tongue',\n    \
    \               'bat wing', 'slug butter', 'bear burp']\n>>> print(wizard_list[0])\n\
    spider legs\n>>> print(wizard_list[1])\ntoe of frog\n>>> print(wizard_list[2])\n\
    snail tongue\n```"
