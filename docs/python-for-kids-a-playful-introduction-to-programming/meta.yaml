  md: "# CREATING THE BALL CLASS\n\nNow we'll create the class for the ball. We'll\
    \ begin with the code we need for the ball to draw itself on the canvas. Here's\
    \ what we need to do:\n\n+   - Create a class called Ball that takes parameters\
    \ for the canvas and the color of the ball we're going to draw.\n- Save the canvas\
    \ as an object variable because we'll draw our ball on it.\n- Draw a filled circle\
    \ on the canvas using the value of the color parameter as the fill color.\n- Save\
    \ the identifier that tkinter returns when it draws the circle (oval) because\
    \ we're going use this to move the ball around the screen.\n- Move the oval to\
    \ the middle of the canvas.\n\nThis code should be added just after the first\
    \ two lines in the file (after import time):\n\n```\nfrom tkinter import *\nimport\
    \ random\nimport time\n\nclass Ball:\n    def __init__(self, canvas, color):\n\
    \        self.canvas = canvas\n        self.id = canvas.create_oval(10, 10, 25,\
    \ 25, fill=color)\n        self.canvas.move(self.id, 245, 100)\n\n    def draw(self):\n\
    \        pass\n```\n\nFirst, we name our class Ball at ❶. Then we create an initialization\
    \ function (as described in Chapter 8) that takes the parameters canvas and color\
    \ at ❷. At ❸, we set the object variable canvas to the value of the parameter\
    \ canvas.\nAt ❹, we call the create_oval function with five parameters: x and\
    \ y coordinates for the top-left corner (10 and 10), x and y coordinates for the\
    \ bottom-right corner (25 and 25), and finally, the fill color for the oval."
