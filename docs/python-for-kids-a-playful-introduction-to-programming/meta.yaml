    \    canvas.move(1, -5, -5)\n    tk.update()\n    time.sleep(0.05)\n```\n\n##\
    \ 让对象对某事做出反应\n\n我们可以通过使用*事件绑定*来让三角形在有人按键时做出反应。*事件*是程序运行时发生的事情，例如有人移动鼠标、按下按键或关闭窗口。你可以告诉\
    \ tkinter 监视这些事件，然后做出响应。\n\n要开始处理事件（让 Python 在事件发生时执行某些操作），我们首先创建一个函数。绑定部分发生在我们告诉\
    \ tkinter 某个特定函数被绑定（或关联）到特定事件时；换句话说，它将被 tkinter 自动调用来处理该事件。\n\n例如，要让三角形在按下 ENTER\
    \ 键时移动，我们可以定义这个函数：\n\n```\ndef movetriangle(event):\n    canvas.move(1, 5, 0)\n\
    ```\n\n该函数接受一个参数（event），tkinter 使用它向函数发送有关事件的信息。我们现在告诉 tkinter，这个函数应该用于特定事件，使用画布上的\
    \ bind_all 函数。完整的代码现在如下所示：\n\n```\nfrom tkinter import *\ntk = Tk()\ncanvas =\
    \ Canvas(tk, width=400, height=400)\ncanvas.pack()\ncanvas.create_polygon(10,\
    \ 10, 10, 60, 50, 35)\ndef movetriangle(event):\n    canvas.move(1, 5, 0)\ncanvas.bind_all('<KeyPress-Return>',\
    \ movetriangle)\n```\n\n此函数中的第一个参数描述了我们希望 tkinter 监视的事件。在本例中，它被称为 <KeyPress-Return>，即按下\
    \ ENTER 或 RETURN 键。我们告诉 tkinter，每当发生此 KeyPress 事件时，就应调用 movetriangle 函数。运行此代码，用鼠标点击画布，然后尝试按下键盘上的\
    \ ENTER 键。\n\n![](img/a7a5a123e26ba8cb8ef5b41ca45700be_212_0.png)\n\n如何根据不同的按键（例如方向键）改变三角形的方向呢？这没问题。我们只需要将\
    \ movetriangle 函数更改为以下内容：\n\n```\ndef movetriangle(event):\n    if event.keysym\
    \ == 'Up':\n        canvas.move(1, 0, -3)\n    elif event.keysym == 'Down':\n\
    \        canvas.move(1, 0, 3)\n    elif event.keysym == 'Left':\n        canvas.move(1,\
    \ -3, 0)\n    else:\n        canvas.move(1, 3, 0)\n```\n\n传递给 movetriangle 的事件对象包含几个变量。其中一个变量称为\
    \ keysym（键符号），它是一个字符串，包含实际按键的值。行 `if event.keysym == 'Up':` 表示如果 keysym 变量包含字符串\
    \ 'Up'，我们应该使用参数 (1, 0, -3) 调用 canvas.move，就像我们在下一行所做的那样。如果 keysym 包含 'Down'，如\
    \ `elif event.keysym == 'Down':` 所示，我们使用参数 (1, 0, 3) 调用它，依此类推。\n\n请记住，第一个参数是画布上绘制形状的标识号，第二个是添加到\
    \ x（水平）坐标的值，第三个是添加到 y（垂直）坐标的值。\n\n然后我们告诉 tkinter，movetriangle 函数应该用于处理来自四个不同按键（上、下、左、右）的事件。以下显示了此时代码的样子。当你输入此代码时，通过选择\
    \ **File ▸ New Window** 创建一个新的 shell 窗口会再次容易得多。在运行代码之前，用有意义的文件名保存它，例如 *movingtriangle.py*。\n\
    \n```\nfrom tkinter import *\ntk = Tk()\ncanvas = Canvas(tk, width=400, height=400)\n\
    canvas.pack()\ncanvas.create_polygon(10, 10, 10, 60, 50, 35)\ndef movetriangle(event):\n\
    \    if event.keysym == 'Up':\n        canvas.move(1, 0, -3)\n    elif event.keysym\
    \ == 'Down':\n        canvas.move(1, 0, 3)\n    elif event.keysym == 'Left':\n\
    \        canvas.move(1, -3, 0)\n    else:\n        canvas.move(1, 3, 0)\ncanvas.bind_all('<KeyPress-Up>',\
    \ movetriangle)\ncanvas.bind_all('<KeyPress-Down>', movetriangle)\ncanvas.bind_all('<KeyPress-Left>',\
    \ movetriangle)\ncanvas.bind_all('<KeyPress-Right>', movetriangle)\n```\n\n在 movetriangle\
    \ 函数的第一行，我们在 ❶ 处检查 keysym 变量是否包含 'Up'。如果是，我们使用参数 1, 0, -3 在 ❷ 处调用 move 函数将三角形向上移动。第一个参数是三角形的标识符，第二个是向右移动的量（我们不想水平移动，所以值为\
    \ 0），第三个是向下移动的量（-3 像素）。\n\n然后我们在 ❸ 处检查 keysym 是否包含 'Down'，如果是，我们在 ❹ 处将三角形向下移动（3\
    \ 像素）。最后的检查是在 ❺ 处值是否为 'Left'，如果是，我们在 ❻ 处将三角形向左移动（-3 像素）。如果没有任何值匹配，最后的 else 在 ❼\
    \ 处在 ❽ 处将三角形向右移动。\n\n现在三角形应该向按下方向键的方向移动。\n\n## 使用标识符的更多方法\n\n每当我们使用画布的 create_\
    \ 函数（如 create_polygon 或 create_rectangle）时，都会返回一个标识符。这个标识号可以与其他画布函数一起使用，就像我们之前使用\
    \ move 函数一样：\n\n```\n>>> from tkinter import *\n>>> tk = Tk()\n>>> canvas = Canvas(tk,\
    \ width=400, height=400)\n>>> canvas.pack()\n>>> canvas.create_polygon(10, 10,\
    \ 10, 60, 50, 35)\n1\n>>> canvas.move(1, 5, 0)\n```\n\n这个例子的问题在于 create_polygon\
    \ 并不总是返回 1。例如，如果你已经创建了其他形状，它可能返回 2、3，甚至 100（取决于已创建形状的数量）。如果我们更改代码以将返回的值存储为一个变量，然后使用该变量（而不是仅仅引用数字\
    \ 1），那么无论返回什么数字，代码都能工作：\n\n```\n>>> mytriangle = canvas.create_polygon(10, 10,\
    \ 10, 60, 50, 35)\n>>> canvas.move(mytriangle, 5, 0)\n```\n\nmove 函数允许我们使用对象的标识符在屏幕上移动对象。但还有其他画布函数也可以改变我们绘制的内容。例如，画布的\
    \ itemconfig 函数可用于更改形状的一些参数，例如其填充和轮廓颜色。\n\n假设我们创建一个红色三角形：\n\n```\n>>> from tkinter\
    \ import *\n>>> tk = Tk()\n>>> canvas = Canvas(tk, width=400, height=400)\n>>>\
    \ canvas.pack()\n>>> mytriangle = canvas.create_polygon(10, 10, 10, 60, 50, 35,\n\
    fill='red')\n```\n\n我们可以使用 itemconfig 将三角形更改为另一种颜色，并使用标识符作为第一个参数。以下代码表示：“将变量 mytriangle\
    \ 中数字标识的对象的填充颜色更改为蓝色。”\n\n```\n>>> canvas.itemconfig(mytriangle, fill='blue')\n\
    ```\n\n我们也可以给三角形一个不同颜色的轮廓，同样使用标识符作为第一个参数：\n\n```\n>>> canvas.itemconfig(mytriangle,\
    \ outline='red')\n```\n\n稍后，我们将学习如何对绘图进行其他更改，例如隐藏它并使其再次可见。当你在下一章开始编写游戏时，你会发现能够在绘图显示在屏幕上后更改它非常有用。\n\
    \n![](img/a7a5a123e26ba8cb8ef5b41ca45700be_215_0.png)\n\n## 你学到了什么\n\n在本章中，你使用了\
    \ tkinter 模块在画布上绘制简单的几何形状、显示图像并执行基本动画。你学习了如何使用事件绑定使绘图对某人按键做出反应，这在我们开始编程游戏时将非常有用。你了解了\
    \ tkinter 中的 create 函数如何返回一个标识号，该标识号可用于在绘制形状后修改它们，例如在屏幕上移动它们或更改它们的颜色。\n\n## 编程谜题\n\
    \n尝试以下操作以玩转 tkinter 模块和基本动画。访问 http://python-for-kids.com/ 获取解决方案。\n\n### #1：用三角形填满屏幕\n\
    \n使用 tkinter 创建一个程序，用三角形填满屏幕。然后更改代码，改为用不同颜色（填充）的三角形填满屏幕。\n\n### #2：移动的三角形\n\n\
    修改移动三角形的代码（第 183 页的“创建基本动画”），使其在屏幕上向右移动，然后向下，再向左，最后回到起始位置。\n\n### #3：移动的照片\n\n\
    尝试使用 tkinter 在画布上显示你自己的照片。确保它是 GIF 图像！你能让它在屏幕上移动吗？"
