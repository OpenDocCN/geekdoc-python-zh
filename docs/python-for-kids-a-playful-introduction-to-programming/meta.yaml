    \n## 你学到了什么\n\n在本章中，你学习了如何使用 Python 运算符进行简单的方程式计算，以及如何使用括号来控制运算顺序（Python 计算方程式各部分的顺序）。然后，我们创建了变量来标记值，并在计算中使用了这些变量。\n\
    \n![](img/a7a5a123e26ba8cb8ef5b41ca45700be_50_0.png)\n\n## 3 字符串、列表、元组和映射\n\n\
    在第 2 章中，我们使用 Python 进行了一些基本计算，你了解了变量。在本章中，我们将使用 Python 程序中的其他一些项目：字符串、列表、元组和映射。你将使用字符串在程序中显示消息（例如游戏中的“准备开始”和“游戏结束”消息）。你还将了解列表、元组和映射如何用于存储事物的集合。\n\
    \n## 字符串\n\n在编程术语中，我们通常将文本称为*字符串*。当你将字符串视为字母的集合时，这个术语就说得通了。本书中的所有字母、数字和符号都可以是一个字符串。就此而言，你的名字可以是一个字符串，你的地址也可以是一个字符串。事实上，我们在第\
    \ 1 章中创建的第一个 Python 程序就使用了一个字符串：“Hello World。”\n\n![](img/a7a5a123e26ba8cb8ef5b41ca45700be_51_0.png)\n\
    \n### 创建字符串\n\n在 Python 中，我们通过在文本周围加上引号来创建字符串。例如，我们可以使用第 2 章中那个原本无用的 `fred` 变量来标记一个字符串，如下所示：\n\
    \n```\nfred = \"Why do gorillas have big nostrils? Big fingers!!\"\n```\n\n然后，要查看\
    \ `fred` 中的内容，我们可以输入 `print(fred)`，如下所示：\n\n```\n>>> print(fred)\nWhy do gorillas\
    \ have big nostrils? Big fingers!!\n```\n\n你也可以使用单引号来创建字符串，如下所示：\n\n```\n>>> fred\
    \ = 'What is pink and fluffy? Pink fluff!!'\n>>> print(fred)\nWhat is pink and\
    \ fluffy? Pink fluff!!\n```\n\n但是，如果你尝试仅使用单引号（'）或双引号（\"）为字符串输入多行文本，或者你以一种引号开始并尝试用另一种引号结束，你将在\
    \ Python shell 中收到错误消息。例如，输入以下行：\n\n```\n>>> fred = \"How do dinosaurs pay their\
    \ bills?\n```\n\n你将看到以下结果：\n\n```\nSyntaxError: EOL while scanning string literal\n\
    ```\n\n这是一个抱怨语法的错误消息，因为你没有遵循使用单引号或双引号结束字符串的规则。\n\n*语法*是指句子中单词的排列和顺序，或者在这种情况下，是指程序中单词和符号的排列和顺序。因此，*SyntaxError*\
    \ 意味着你以 Python 未预期的顺序执行了某些操作，或者 Python 预期某些内容而你遗漏了。*EOL* 意味着*行尾*，因此错误消息的其余部分告诉你\
    \ Python 到达了行尾，但没有找到双引号来关闭字符串。\n\n要在字符串中使用多行文本（称为*多行字符串*），请使用三个单引号（'''），然后在行之间按\
    \ ENTER，如下所示：\n\n```\n>>> fred = '''How do dinosaurs pay their bills?\nWith tyrannosaurus\
    \ checks!'''\n```\n\n现在让我们打印出 `fred` 的内容，看看这是否有效：\n\n```\n>>> print(fred)\nHow\
    \ do dinosaurs pay their bills?\nWith tyrannosaurus checks!\n```\n\n### 处理字符串问题\n\
    \n现在考虑这个疯狂的字符串示例，它导致 Python 显示错误消息：\n\n```\n>>> silly_string = 'He said, \"Aren't\
    \ can't shouldn't wouldn't.\"'\nSyntaxError: invalid syntax\n```\n\n在第一行中，我们尝试创建一个由单引号括起来的字符串（定义为变量\
    \ `silly_string`），但其中也包含单词 `can't`、`shouldn't` 和 `wouldn't` 中的单引号，以及双引号。真是一团糟！\n\
    \n请记住，Python 本身并不像人类那样聪明，因此它看到的只是一个包含 `He said, \"Aren` 的字符串，后面跟着一堆它不期望的其他字符。当\
    \ Python 看到引号（单引号或双引号）时，它期望字符串在第一个引号之后开始，并在该行上下一个匹配的引号（单引号或双引号）之后结束。在这种情况下，字符串的开始是\
    \ `He` 之前的单引号，而就 Python 而言，字符串的结束是 `Aren` 中 `n` 之后的单引号。IDLE 高亮显示了出错的位置：\n\n![](img/a7a5a123e26ba8cb8ef5b41ca45700be_53_0.png)\n\
    \nIDLE 的最后一行告诉我们发生了哪种错误——在这种情况下，是语法错误。\n使用双引号而不是单引号仍然会产生错误：\n\n```\n>>> silly_string\
    \ = \"He said, \"Aren't can't shouldn't wouldn't.\"\"\nSyntaxError: invalid syntax\n\
    ```\n\n在这里，Python 看到一个由双引号界定的字符串，包含字母 `He said,`（和一个空格）。该字符串之后的所有内容（从 `Aren't`\
    \ 开始）都会导致错误：\n\n![](img/a7a5a123e26ba8cb8ef5b41ca45700be_53_1.png)\n\n这是因为，从 Python\
    \ 的角度来看，所有这些额外的东西根本就不应该在那里。Python 查找下一个匹配的引号，并且不知道你希望它如何处理该行上该引号之后的任何内容。\n\n这个问题的解决方案是多行字符串，我们之前学过，使用*三个*单引号（'''），这允许我们在字符串中组合双引号和单引号而不会导致错误。事实上，如果我们使用三个单引号，我们可以在字符串中放入任何单引号和双引号的组合（只要我们不尝试在那里放入三个单引号）。这就是我们无错误版本的字符串的样子：\n\
    \n![](img/a7a5a123e26ba8cb8ef5b41ca45700be_54_0.png)\n\n```\nsilly_string = '''He\
    \ said, \"Aren't can't shouldn't wouldn't.\"'''\n```\n\n但是等等，还有更多。如果你真的想在 Python\
    \ 中使用单引号或双引号来包围字符串，而不是使用三个单引号，你可以在字符串中的每个引号前添加一个反斜杠（\\）。这称为*转义*。这是一种告诉 Python\
    \ 的方式：“是的，我知道我的字符串里面有引号，我希望你忽略它们，直到你看到结束引号。”\n\n转义字符串可能使它们更难阅读，因此最好使用多行字符串。不过，你可能会遇到使用转义的代码片段，因此了解反斜杠为何存在是很有好处的。\n\
    \n以下是转义如何工作的几个示例：\n\n```\n>>> single_quote_str = 'He said, \"Aren\\'t can\\'t\
    \ shouldn\\'t wouldn\\'t.\"'\n>>> double_quote_str = \"He said, \\\"Aren't can't\
    \ shouldn't wouldn't.\\\"\"\n>>> print(single_quote_str)\nHe said, \"Aren't can't\
    \ shouldn't wouldn't.\"\n>>> print(double_quote_str)\nHe said, \"Aren't can't\
    \ shouldn't wouldn't.\"\n```\n\n首先，在 ❶ 处，我们使用单引号创建一个字符串，并在该字符串内的单引号前使用反斜杠。在 ❷\
    \ 处，我们使用双引号创建一个字符串，并在字符串中的这些引号前使用反斜杠。在接下来的几行中，我们打印刚刚创建的变量。请注意，当我们打印字符串时，反斜杠字符不会出现在字符串中。"
