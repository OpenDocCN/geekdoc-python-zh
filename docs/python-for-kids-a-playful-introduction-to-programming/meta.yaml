  md: 'Double-click the icon or choose the menu option, and you should see this window:


    ![](img/a7a5a123e26ba8cb8ef5b41ca45700be_36_0.png)


    This is the *Python shell*, which is part of Python''s integrated development
    environment. The three greater-than signs (>>>) are called the *prompt*.

    Let''s enter some commands at the prompt, beginning with the following:


    ```

    >>> print("Hello World")

    ```


    Make sure to include the double quotes (" "). Press ENTER on your keyboard when
    you''re finished typing the line. If you''ve entered the command correctly, you
    should see something like this:


    ```

    >>> print("Hello World")

    Hello World

    >>>

    ```


    The prompt should reappear to let you know that the Python shell is ready to accept
    more commands.

    Congratulations! You''ve just created your first Python program. The word print
    is a type of Python command called a *function*, and it prints out whatever is
    inside the parentheses to the screen. In essence, you have given the computer
    an instruction to display the words “Hello World”—an instruction that both you
    and the computer can understand.


    ![](img/a7a5a123e26ba8cb8ef5b41ca45700be_36_1.png)'
