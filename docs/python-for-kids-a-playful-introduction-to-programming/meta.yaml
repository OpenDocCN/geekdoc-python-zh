  md: "# CLASS\n\nThe keyword class is used to define a type of object, like a vehicle,\
    \ animal, or person. Classes can have a function called __init__, which is used\
    \ to perform all the tasks an object of the class needs when it is created. For\
    \ example, an object of the class Car might need a variable color when it’s created:\n\
    \n```\nclass Car:\n    def __init__(self, color):\n        self.color = color\n\
    \ncar1 = Car('red')\ncar2 = Car('blue')\nprint(car1.color)\nred\nprint(car2.color)\n\
    blue\n```\n\n# CONTINUE\n\nThe continue keyword is a way to “jump” to the next\
    \ item in a loop—so that the remaining code in the loop block is not executed.\
    \ Unlike break we don’t jump out of the loop, we just carry on with the next item.\
    \ For example, if we had a list of items and wanted to skip items starting with\
    \ b, we could use the following code:\n\n```\n>>> my_items = ['apple', 'aardvark',\
    \ 'banana', 'badger', 'clementine',\n                'camel']\n>>> for item in\
    \ my_items:\n        if item.startswith('b'):\n            continue\n        print(item)\n\
    \napple\naardvark\nclementine\ncamel\n```\n\nWe create our list of items at ❶,\
    \ and then use a for loop to loop over the items and run a block of code for each\
    \ at ❷. If the item starts with the letter b at ❸, we continue to the next item\
    \ at ❹. Otherwise, at ❺ we print out the item."
