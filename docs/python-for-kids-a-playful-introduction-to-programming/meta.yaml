- img_proc: true
  md: '# WHACK THE BOUNCING BALL


    We''re going to develop a game with a bouncing ball and a paddle. The ball will
    fly around the screen, and the player will bounce it off the paddle. If the ball
    hits the bottom of the screen, the game comes to an end. Here''s a preview of
    the finished game:


    ![](img/a7a5a123e26ba8cb8ef5b41ca45700be_219_0.png)


    Our game may look quite simple, but the code will be a bit trickier than what
    we''ve written so far because there are a lot of things that it needs to handle.
    For example, it needs to animate the paddle and the ball, and detect when the
    ball hits the paddle or the walls.


    In this chapter, we''ll begin creating the game by adding a game canvas and a
    bouncing ball. In the next chapter, we''ll complete the game by adding the paddle.


    # CREATING THE GAME CANVAS


    To create your game, first open a new file in the Python shell (select **File
    ▸ New Window**). Then import tkinter and create a canvas to draw on:


    ```

    from tkinter import *

    import random

    import time

    ```'
