- img_proc: true
  md: '![](img/a7a5a123e26ba8cb8ef5b41ca45700be_194_0.png)


    We specify the coordinates using the create_line function, as shown here:


    ```

    >>> from tkinter import *

    >>> tk = Tk()

    >>> canvas = Canvas(tk, width=500, height=500)

    >>> canvas.pack()

    >>> canvas.create_line(0, 0, 500, 500)

    1

    ```


    The create_line function returns 1, which is an identifier—we’ll learn more about
    that later. If we had done the same thing with the turtle module, we would have
    needed the following code:


    ```

    >>> import turtle

    >>> turtle.setup(width=500, height=500)

    >>> t = turtle.Pen()

    >>> t.up()

    >>> t.goto(-250, 250)

    >>> t.down()

    >>> t.goto(500, -500)

    ```'
