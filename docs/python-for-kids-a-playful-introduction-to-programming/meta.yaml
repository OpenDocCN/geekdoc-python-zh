  md: "# THE RANGE FUNCTION\n\nThe range function, as we've seen before, is mainly\
    \ used in for loops, to loop through a section of code a specific number of times.\
    \ The first two parameters given to range are called the *start* and the *stop*.\
    \ You saw range with these two parameters in the earlier example of using the\
    \ len function to work with a loop.\n\n![](img/a7a5a123e26ba8cb8ef5b41ca45700be_146_0.png)\n\
    \nThe numbers that range generates begin with the number given as the first parameter\
    \ and end with the number that's one less than the second parameter. For example,\
    \ the following shows what happens when we print the numbers that range creates\
    \ between 0 and 5:\n\n```\n>>> for x in range(0, 5):\n        print(x)\n\n0\n\
    1\n2\n3\n4\n```\n\nThe range function actually returns a special object called\
    \ an *iterator* that repeats an action a number of times. In this case, it returns\
    \ the next highest number each time it is called.\nYou can convert the iterator\
    \ into a list (using the function list). If you then print the returned value\
    \ when calling range, you'll see the numbers it contains as well:\n\n```\n>>>\
    \ print(list(range(0, 5)))\n[0, 1, 2, 3, 4]\n```"
  merge: -1
