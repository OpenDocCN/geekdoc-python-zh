- md: '## ABOUT THE AUTHOR


    Jason R. Briggs has been a programmer since the age of eight, when he first learned
    BASIC on a Radio Shack TRS-80. He has written software professionally as a developer
    and systems architect and served as Contributing Editor for *Java Developer''s
    Journal*. His articles have appeared in *JavaWorld*, *ONJava*, and *ONLamp*. *Python
    for Kids* is his first book.


    Jason can be reached at http://jasonrbriggs.com/ or by email at mail@jasonrbriggs.com.


    ## ABOUT THE ILLUSTRATOR


    Miran Lipovača is the author of *Learn You a Haskell for Great Good!*. He enjoys
    boxing, playing bass guitar, and, of course, drawing. He has a fascination with
    dancing skeletons and the number 71, and when he walks through automatic doors
    he pretends that he''s actually opening them with his mind.


    ## ABOUT THE TECHNICAL REVIEWERS


    A recent graduate of The Nueva School, 15-year-old Josh Pollock is a freshman
    at Lick-Wilmerding High School in San Francisco. He first started programming
    in Scratch when he was 9 years old, began using TI-BASIC when he was in 6th grade,
    and moved on to Java and Python in 7th and UnityScript in 8th. In addition to
    programming, he loves playing the trumpet, developing computer games, and teaching
    people about interesting STEM topics.


    Maria Fernandez has a master''s degree in applied linguistics and has been interested
    in computers and technology for more than 20 years. She taught English to young
    refugee women with the Global Village Project in Georgia and currently resides
    in northern California working with ETS (Educational Testing Service).


    ## ACKNOWLEDGMENTS


    This must be what it’s like when you get up on stage to accept an award, only
    to realize you’ve left the list of people you have to thank in your other trousers:
    You’re guaranteed to forget someone, and that music will soon start rolling to
    quickly usher you off the stage.


    So that being said, here’s the (no doubt) incomplete list of people to whom I
    owe a huge debt of gratitude for helping make this book as good as I think it
    now is.


    Thanks to the No Starch team, particularly Bill Pollock, for applying a liberal
    dose of “what-would-a-kid-think” while editing it. When you’ve been programming
    for a long time, it’s all too easy to forget how difficult some of this stuff
    is for learners, and Bill was invaluable at pointing out those oft-overlooked,
    over-complicated parts. And thanks to Serena Yang, production manager extraordinaire;
    here’s hoping you haven’t torn out too much hair getting 300+ pages of code correctly
    colorized.


    A big thank you must go to Miran Lipovača for utterly brilliant illustrations.
    Beyond brilliant. No really! If I had done the artwork, we’d be lucky to have
    the occasional smudged figure that doesn’t resemble anything in particular. Is
    it a bear . . . ? Is it a dog . . . ? No, wait . . . is that supposed to be a
    tree?


    Thanks to the reviewers. I apologize if some of your suggestions weren’t implemented
    in the end. You were probably right, and I can only blame a personal character
    flaw for any probable goofs. Particular thanks to Josh for some great suggestions
    and some really good catches. And apologies to Maria for having to deal with occasionally
    dodgily formatted code.


    Thanks to my wife and daughter, for putting up with a husband and father who had
    his nose buried in a computer screen even more than usual.


    To Mum, for endless amounts of encouragement over the years.


    Finally, thanks to my father, for buying a computer back in the 1970s and putting
    up with someone who wanted to use it as much as he did. None of this would have
    been possible without him.


    ## INTRODUCTION


    Why learn computer programming?

    Programming fosters creativity, reasoning, and problem solving. The programmer
    gets the opportunity to create something from nothing, use logic to turn programming
    constructs into a form that a computer can run, and, when things don’t work quite
    as well as expected, use problem solving to figure out what has gone wrong. Programming
    is a fun, sometimes challenging (and occasionally frustrating) activity, and the
    skills learned from it can be useful both in school and at work . . . even if
    your career has nothing to do with computers.

    And, if nothing else, programming is a great way to spend an afternoon when the
    weather outside is dreary.


    ## WHY PYTHON?


    Python is an easy-to-learn programming language that has some really useful features
    for a beginning programmer. The code is quite easy to read when compared to other
    programming languages, and it has an interactive shell into which you can enter
    your programs and see them run. In addition to its simple language structure and
    an interactive shell with which to experiment, Python has some features that greatly
    augment the learning process and allow you to put together simple animations for
    creating your own games. One is the turtle module, inspired by Turtle graphics
    (used by the Logo programming language back in the 1960s) and designed for educational
    use. Another is the tkinter module, an interface for the Tk GUI toolkit, which
    provides a simple way to create programs with slightly more advanced graphics
    and animation.


    ## HOW TO LEARN TO CODE


    Like anything you try for the first time, it’s always best to start with the basics,
    so begin with the first chapters and resist the urge to skip ahead to the later
    chapters. No one can play an orchestral symphony the first time they pick up an
    instrument. Student pilots don’t start flying a plane before they understand the
    basic controls. Gymnasts aren’t (usually) able to do back flips on their first
    try. If you jump ahead too quickly, not only will the basic ideas not stick in
    your head, but you’ll also find the content of the later chapters more complicated
    than it actually is.

    As you go through this book, try each of the examples, so you can see how they
    work. There are also programming puzzles at the end of most chapters for you to
    try, which will help improve your programming skills. Remember that the better
    you understand the basics, the easier it will be to understand more complicated
    ideas later on.


    When you find something frustrating or too challenging, here are some things that
    I find helpful:


    1. Break a problem down into smaller pieces. Try to understand what a small piece
    of code is doing, or think about only a small part of a difficult idea (focus
    on a small piece of code rather than trying to understand the whole thing at once).

    2. If that still doesn''t help, sometimes it''s best to just leave it alone for
    a while. Sleep on it, and come back to it another day. This is a good way to solve
    many problems, and it can be particularly helpful for computer programmers.


    ## WHO SHOULD READ THIS BOOK


    This book is for anyone interested in computer programming, whether that''s a
    child or an adult coming to programming for the first time. If you want to learn
    how to write your own software rather than just use the programs developed by
    others, *Python for Kids* is a great place to start.

    In the following chapters, you''ll find information to help you install Python,
    start the Python shell and perform basic calculations, print text on the screen
    and create lists, and perform simple control flow operations using if statements
    and for loops (and learn what if statements and for loops are!). You''ll learn
    how to reuse code with functions, the basics of classes and objects, and descriptions
    of some of the many built-in Python functions and modules.

    You''ll find chapters on both simple and advanced turtle graphics, as well as
    on using the tkinter module to draw on the computer screen. There are programming
    puzzles of varying complexity at the ends of many chapters, which will help readers
    cement their newfound knowledge by giving them a chance to write small programs
    by themselves.

    Once you''ve built up your fundamental programming knowledge, you''ll learn how
    to write your own games. You''ll develop two graphical games and learn about collision
    detection, events, and different animation techniques.

    Most of the examples in this book use Python''s IDLE (Integrated Development Environment)
    shell. IDLE provides syntax highlighting, copy-and-paste functionality (similar
