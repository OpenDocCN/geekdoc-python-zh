    on their own have a special meaning in Python, particularly in strings.) We save
    the file object to the variable test_file.


    On the second line, we use the read function, provided by the file object, to
    read the contents of the file and store it in the variable text. We print the
    variable on the final line to display the contents of the file.


    # OPENING A MAC OS X FILE


    If you are using Mac OS X, you''ll need to enter a different location on the first
    line of the Windows example to open *test.txt*. Use the username you clicked when
    saving the text file in the string. For example, if the username is *sarahwinters*,
    the open parameter should look like this:


    ```

    >>> test_file = open(''/Users/sarahwinters/test.txt'')

