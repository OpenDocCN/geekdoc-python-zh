    \ ❶ 处的变量 `t1`。然后我们在第三行和第四行循环并打印所有数字（在 ❷ 处）。循环结束后，我们再次调用 `time()`，并将返回的值赋给 ❸ 处的变量\
    \ `t2`。由于循环完成需要几秒钟，`t2` 中的值将高于 `t1`，因为自 1970 年 1 月 1 日以来经过了更多秒数。如 ❹ 处所示，用 `t2`\
    \ 减去 `t1`，我们就得到了打印所有这些数字所花费的秒数。\n\n## 使用 ASCTIME 转换日期\n\n`asctime` 函数接受一个日期元组并将其转换为更易读的形式。（记住，元组就像一个列表，但其中的项目不能更改。）正如你在第\
