- img_proc: true
  md: "# PASS\n\nSometimes when you’re developing a program, you want to write only\
    \ small pieces of it, to try things out. The problem with doing this is that you\
    \ can’t have an if statement without the block of code that should be run if the\
    \ expression in the if statement is true. You also cannot have a for loop without\
    \ the block of code that should be run in the loop. For example, the following\
    \ code works just fine:\n\n```\n>>> age = 15\n>>> if age > 10:\n        print('older\
    \ than 10')\n```\n\nolder than 10\n\nBut if you don’t fill in the block of code\
    \ (the body) for the if statement, you’ll get an error message:\n\n```\n>>> age\
    \ = 15\n>>> if age > 10:\n```\n\n```\nFile \"<stdin>\", line 2\n    ^\nIndentationError:\
    \ expected an indented block\n```\n\nThis is the error message Python displays\
    \ when you should have a block of code after a statement of some kind (it won’t\
    \ even let you type this kind of code if you’re using IDLE). In cases like these,\
    \ you can use the pass keyword to write a statement but not provide the block\
    \ of code that goes with it.\n\nFor example, say you want to create a for loop\
    \ with an if statement inside it. Perhaps you haven’t decided what to put in the\
    \ if statement yet—maybe you’ll use the print function, put in a break, or something\
    \ else. You can use pass, and the code will still work (even if it doesn’t do\
    \ exactly what you want yet).\n\nHere’s our if statement again, this time using\
    \ the pass keyword:\n\n```\n>>> age = 15\n>>> if age > 10:\n        pass\n```"
  merge: -1
  pgno: 328
- img_proc: true
  md: 'The following code shows another use of the pass keyword:


    ```

    >>> for x in range(0, 7):

    ...     print(''x is %s'' % x)

    ...     if x == 4:

    ...         pass

    ```


    ```

    x is 0

    x is 1

    x is 2

    x is 3

    x is 4

    x is 5

    x is 6

    ```


    Python still checks whether the variable x contains the value 4 every time it
    executes the block of code in the loop, but it will do nothing as a consequence,
    so it will print every number in the range 0 to 7.


    Later, you could add the code in the block for the if statement, replacing the
    pass keyword with something else, such as break:


    ```

    >>> for x in range(1, 7):

    ...     print(''x is %s'' % x)

    ...     if x == 5:

    ...         break

    ```


    ```

    x is 1

    x is 2

    x is 3

    x is 4

    x is 5

    ```


    The pass keyword is most commonly used when you''re creating a function but don''t
    want to write the code for the function yet.


    # RAISE


    The raise keyword can be used to cause an error to happen. That might sound like
    a strange thing to do, but in advanced programming, it can actually be quite useful.
    (We don''t use this keyword in this book.)'
  merge: -1
  pgno: 329
- img_proc: true
  md: "# RETURN\n\nThe return keyword is used to return a value from a function. For\
    \ example, you might create a function to calculate the number of seconds you've\
    \ been alive up till your last birthday:\n\n```\ndef age_in_seconds(age_in_years):\n\
    \    return age_in_years * 365 * 24 * 60 * 60\n```\n\nWhen you call this function,\
    \ the returned value can be assigned to another variable or printed:\n\n```\n\
    >>> seconds = age_in_seconds(9)\n>>> print(seconds)\n283824000\n>>> print(age_in_seconds())\n\
    378432000\n```\n\n# TRY\n\nThe try keyword begins a block of code that ends with\
    \ the except and finally keywords. Together, these try/except/finally blocks of\
    \ code are used to handle errors in a program, such as to make sure that the program\
    \ displays a useful message to the user, rather than an unfriendly Python error.\
    \ These keywords aren't used in this book.\n\n# WHILE\n\nThe while keyword is\
    \ a bit like for, except that a for loop counts through a range (of numbers),\
    \ but a while loop keeps on running while an expression is true. Be careful with\
    \ while loops because if the expression is always true, the loop will never end\
    \ (this is called an infinite loop). Here's an example:\n\n```\n>>> x = 1\n>>>\
    \ while x == 1:\n        print('hello')\n```\n\nIf you run this code, it will\
    \ loop forever, or at least until you close the Python shell or press CTRL-C to\
    \ interrupt it. However, the following code will print \"hello\" nine times (each\
    \ time adding 1 to the variable x, until x is no longer less than 10)."
  merge: -1
  pgno: 330
