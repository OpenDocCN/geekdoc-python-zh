- md: "## 53. Youtube Video Downloader\n\n## YouTube Video Downloader\n\nThe objective\
    \ of this project is to download any type of video in a fast and easy way from\
    \ youtube in your device.\n\nIn this, user has to copy the youtube video URL that\
    \ they want to download and simply paste that URL in the ‘paste link here’ section\
    \ and click on the download button, it will start downloading the video. When\
    \ video downloading finishes, it shows a message ‘downloaded’ popup on the window\
    \ below the download button.\n\n## Prerequisites\n\nTo implement this, we use\
    \ basic concept of python, tkinter and pytube library.\n\n- **Tkinter** is a standard\
    \ GUI library and it is one of the easiest ways to build a GUI application.\n\
    - **pytube** used for downloading videos from youtube\n\nTo install the required\
    \ modules run pip installer command on the command line:\n\n```\npip install tkinter\n\
    pip install pytube\n```\n\nThese are the following steps to build:\n\n### Step\
    \ 1: Import libraries\n\nStart the project by importing the required modules.\n\
    \nIn this script implementation, we import Tkinter and pytube modules.\n\n###\
    \ Step 2: Create display window\n\n- **Tk()** used to initialize tkinter to create\
    \ display window\n- **geometry()** used to set the window’s width and height\n\
    - **resizable(0,0)** set the fix size of window\n- **title()** used to give the\
    \ title of window\n- **Label()** widget use to display text that users can’t able\
    \ to modify.\n- **root** is the name of the window\n- **text** which we display\
    \ the title of the label\n- **font** in which our text is written\n- **pack**\
    \ organized widget in block\n\n### Step 3: Create field to enter link\n\n- **link**\
    \ is a string type variable that stores the youtube video link that the user enters.\n\
    - **Entry()** widget is used when we want to create an input text field.\n- **width**\
    \ sets the width of entry widget\n- **textvariable** used to retrieve the value\
    \ of current text variable to the entry widget\n- **place()** use to place the\
    \ widget at a specific position\n\n### Step 4: Create function to start downloading\n\
    \n`url` variable gets the youtube link from the link variable by **get()** function\
    \ and then **str()** will convert the link in string datatype.\n\nThe video is\
    \ downloaded in the first present stream of that video by **stream.first()** method.\n\
    \n**Button()** widget used to display button on the window.\n\n- **text** which\
    \ we display on the label\n- **font** in which the text is written\n- **bg** sets\
    \ the background color\n- **command** is used to call the function\n\n**root.mainloop()**\
    \ is a method that executes when we want to run the program.\n\n### Output\n\n\
    After running this script, you will be able to see this:\n\n**Source Code:**\n\
    \n```\nfrom tkinter import *\nfrom pytube import YouTube\n\nroot = Tk()\nroot.geometry('700x300')\n\
    root.resizable(0, 0)\nroot.title(\"YouTube Video Downloader\")\n\nLabel(root,\
    \ text='Copy the link of the video you want to download from YouTube',\n     \
    \ font='arial 15 bold').pack()\n\n# enter link\nlink = StringVar()\n\nLabel(root,\
    \ text='Paste Link Here:', font='arial 15 bold').place(x=270, y=60)\nEntry(root,\
    \ width=80, textvariable=link).place(x=32, y=90)\n\n# function to download video\n\
    def Downloader():\n    url = YouTube(str(link.get()))\n    video = url.streams.first()\n\
    \    video.download()\n    Label(root, text='DOWNLOADED', font='arial 15').place(x=270,\
    \ y=210)\n\nButton(root, text='DOWNLOAD', font='arial 15 bold', bg='white',\n\
    \       padx=2, command=Downloader).place(x=280, y=150)\n\nroot.mainloop()\n```\n\
    \n## How to download this project:\n\nAs you are our special readers you deserve\
    \ special privileges. Please download all this projects for further practise using\
    \ following steps.\n\n1. Goto - https://www.edcredibly.com/s/store/courses/description/53-Python-Projects\
    \ which is our own website.\n2. Apply coupon code – **SPECIAL** to make this course\
    \ free available for you.\n3. Checkout without paying anything and enrol.\n4.\
    \ Download the file and enjoy.\n\nCheers, Happy learning!!\n\n## ABOUT THE AUTHOR\n\
    \n**“Edcorner Learning”** and have a significant number of students on **Udemy**\
    \ with more than **90000+ Student and Rating of 4.1 or above.**\n\n**Edcorner\
    \ Learning is Part of Edcredibly.**\n\nEdcredibly is an online eLearning platform\
    \ provides Courses on all trending technologies that maximizes learning outcomes\
    \ and career opportunity for professionals and as well as students. Edcredibly\
    \ have a significant number of 100000+ students on their own platform and have\
    \ a **Rating of 4.9 on Google Play Store – Edcredibly App.**\n\nFeel Free to check\
    \ or join our courses on:\n\n**Edcredibly Website -** [https://www.edcredibly.com/](https://www.edcredibly.com/)\n\
    \n**Edcredibly App –** [https://play.google.com/store/apps/details?id=com.edcredibly.courses](https://play.google.com/store/apps/details?id=com.edcredibly.courses)\n\
