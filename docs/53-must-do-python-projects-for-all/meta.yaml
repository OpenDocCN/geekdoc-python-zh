    beautifulsoup4\nlxml\n\n**源代码：**\n\n```python\n#!/usr/bin/env python\n\nimport\
    \ csv\nimport email\nfrom email import policy\nimport imaplib\nimport logging\n\
    import os\nimport ssl\n\nfrom bs4 import BeautifulSoup\n\ncredential_path = \"\
    credentials.txt\"\ncsv_path = \"mails.csv\"\n\nlogger = logging.getLogger('imap_poller')\n\
    \nhost = \"imap.gmail.com\"\nport = 993\nssl_context = ssl.create_default_context()\n\
    \ndef connect_to_mailbox():\n    # get mail connection\n    mail = imaplib.IMAP4_SSL(host,\
    \ port, ssl_context=ssl_context)\n\n    with open(credential_path, \"rt\") as\
    \ fr:\n        user = fr.readline().strip()\n        pw = fr.readline().strip()\n\
