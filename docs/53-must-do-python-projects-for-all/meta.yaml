- md: "## 23. Todo App using flask\n\n### Perform Operation like\n\n- 1. Add Task\n\
    - 2. Delete Task\n- 3. Update Task\n\n### To run app\n\n- Create virtual Environment\n\
    - Install requirements\n  `pip install requirements.txt`\n- run app\n  `py app.py`\n\
    \n**Requirements**\n\nFlask==1.1.2\n\nFlask-SQLAlchemy==2.4.4\n\n**Source code:**\n\
    \n```python\nfrom flask import Flask, render_template, url_for, request, redirect\n\
    from flask_sqlalchemy import SQLAlchemy\nfrom datetime import datetime\n\napp\
    \ = Flask(__name__)\napp.config[\"SQLALCHEMY_DATABASE_URI\"] = \"sqlite:///test.db\"\
    \napp.config[\"SQLALCHEMY_TRACK_MODIFICATIONS\"] = False\ndb = SQLAlchemy(app)\n\
    \nclass Todo(db.Model):\n    id = db.Column(db.Integer, primary_key=True)\n  \
    \  content = db.Column(db.String(200), nullable=False)\n    completed = db.Column(db.Integer,\
    \ default=0)\n    pub_date = db.Column(db.DateTime, nullable=False,\n        \
    \                 default=datetime.utcnow)\n\n    def __repr__(self):\n      \
    \  return \"<Task %r>\" % self.id\n\n@app.route(\"/\", methods=[\"POST\", \"GET\"\
    ])\ndef index():\n    if request.method == \"POST\":\n        task_content = request.form[\"\
    task\"]\n        new_task = Todo(content=task_content)\n        try:\n       \
    \     db.session.add(new_task)\n            db.session.commit()\n            return\
    \ redirect(\"/\")\n        except:\n            return \"There is an issue\"\n\
    \    else:\n        tasks = Todo.query.order_by(Todo.pub_date).all()\n       \
    \ return render_template(\"index.html\", tasks=tasks)\n\n@app.route(\"/delete/<int:id>\"\
    )\ndef delete(id):\n    task = Todo.query.get_or_404(id)\n    try:\n        db.session.delete(task)\n\
    \        db.session.commit()\n        return redirect(\"/\")\n    except:\n  \
    \      return \"This is an Problem while deleting\"\n\n@app.route(\"/update/<int:id>\"\
    , methods=[\"POST\", \"GET\"])\ndef update(id):\n    task = Todo.query.get_or_404(id)\n\
    \    if request.method == \"POST\":\n        task.content = request.form[\"task\"\
    ]\n\n        try:\n            db.session.commit()\n            return redirect(\"\
    /\")\n        except:\n            return \"There is an issue\"\n    else:\n \
    \       tasks = Todo.query.order_by(Todo.pub_date).all()\n\n        return render_template(\"\
    index.html\", update_task=task, tasks=tasks)\n\nif __name__ == \"__main__\":\n\
    \    app.run(debug=True)\n```\n\n## I. Twitter Scrapper Without API\n\n### Tweet\
    \ hashtag based scraper without Twitter API\n\n- Here, we make use of snscrape\
    \ to scrape tweets associated with a particular hashtag. Snscrape is a python\
    \ library that scrapes twitter without the use of API keys.\n- We have 2 scripts\
    \ associated with this project one to fetch tweets with snscrape and store it\
    \ in the database (we use SQLite3), and the other script displays the tweets from\
    \ the database.\n- Using snscrape, we are storing the hashtag, the tweet content,\
    \ user id, as well as the URL of the tweets in the database.\n\n### Requirements\n\
    \nPackages associated can be installed as:\n\n```sh\n$ pip install -r requirements.txt\n\
    ```\n\n### Running the script\n\nFor running the script which fetches tweets and\
    \ other info associated with the hashtag and storing in the database:\n\n```sh\n\
    $ python fetch_hashtags.py\n```\n\nFor running the script to display the tweet\
    \ info stored in the database:\n\n```sh\n$ python display_hashtags.py\n```\n\n\
    **Requirements:**\n\n- beautifulsoup4==4.9.3\n- certifi==2020.12.5\n- chardet==4.0.0\n\
