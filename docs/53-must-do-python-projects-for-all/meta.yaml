    \                if event.key == pygame.K_LEFT:\n                    x1_change\
    \ = -snake_block\n                    y1_change = 0\n                elif event.key\
    \ == pygame.K_RIGHT:\n                    x1_change = snake_block\n          \
    \          y1_change = 0\n                elif event.key == pygame.K_UP:\n   \
