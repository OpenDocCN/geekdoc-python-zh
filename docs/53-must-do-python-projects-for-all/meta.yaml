- img_proc: true
  md: "```\nimport time\n\ndef get_load_time(url):\n    \"\"\"This function takes\
    \ a user defined url as input\n    and returns the time taken to load that url\
    \ in seconds.\n\n    Args:\n        url (string): The user defined url.\n\n  \
    \  Returns:\n        time_to_load (float): The time taken to load the website\
    \ in seconds.\n    \"\"\"\n\n    if (\"https\" or \"http\") in url:  # Checking\
    \ for presence of protocols\n        open_this_url = urlopen(url)  # Open the\
    \ url as entered by the user\n    else:\n        open_this_url = urlopen(\"https://\"\
    \ + url)  # Adding https to the url\n    start_time = time.time()  # Time stamp\
    \ before the reading of url starts\n    open_this_url.read()  # Reading the user\
    \ defined url\n    end_time = time.time()  # Time stamp after the reading of the\
    \ url\n    open_this_url.close()  # Closing the instance of the urlopen object\n\
    \    time_to_load = end_time - start_time\n\n    return time_to_load\n```"
