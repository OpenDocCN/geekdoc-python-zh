- md: "# 53 Must Do Python Projects For All\n\nBy Edcorner Learning\n\n# Table of\
    \ Contents\n\n**Introduction**\n\n**Module 1 Project 1 -10**\n\n- 1. Snake Game\n\
    - 2. Snapshot of given website\n- 3. Spaceship Game\n- 4. Speech-to-Text Converter\n\
    - 5. Speech-To-Text\n- 6. Speed Test\n- 7. Spelling Checker\n- 8. Split a video\
    \ file by given time period\n- 9. Split Files\n- 10. Split folder into subfolders\n\
    \n**Module 2 Project 11-20**\n\n- 11. Spreadsheet Automation\n- 12. Store emails\
    \ in CSV\n- 13. String search from multiple files\n- 14. Take A Break\n- 15. Terminal-based\
    \ hangman game\n- 16. Terminal Progress bar with image Resizing\n- 17. Text to\
    \ Speech\n- 18. Text Editor\n- 19. Textfile Analysis\n- 20. Tic Tac Toe\n\n**Module\
    \ 3 Projects 21-30**\n\n- 21. Tic-Tac-Toe-AI\n- 22. Time to load website\n- 23.\
    \ Todo App using flask\n- 24. Twitter Scrapper Without API\n- 25. Typing Speed\
    \ Test\n- 26. Instagram Unfollower Bot\n- 27. Unique words in text file\n- 28.\
    \ Unstructured Supplementary Service Data\n- 29. Unzip File\n- 30. URL Shortner\n\
    \n**Module 4 Projects 31-40**\n\n- 31. Video To Audio Converter in python\n- 32.\
    \ Voice Translators\n- 33. Hashing Passwords\n- 34. Weather App\n- 35. Website\
    \ Summarization API\n- 36. Web Scrapping Comment\n- 37. Website Blocker\n- 38.\
    \ Whatsapp Bot\n- 39. Whatsapp Automation\n- 40. Instagram Follow- NotFollow\n\
    \n**Module 5 Projects 41-50**\n\n- 41. Wikipedia infobox scraper\n- 42. Wikipedia\
    \ Scrapper in Python\n- 43. Instagram Image download\n- 44. Wikipedia summary\
    \ script with GUI\n- 45. Word Games\n- 46. Worksetup Automation\n- 47. Set a Random\
    \ desktop background\n- 48. Compress folder and files\n- 49. Organize files in\
    \ a directory\n- 50. Youtube Trending Feed Scrapper\n- 51. LinkedIn My Connections\
    \ Scrapper\n- 52. Download Audio – Youtube\n- 53. Youtube Video Downloader\n\n\
    How to download this project:\n\n# Introduction\n\nPython is a general-purpose\
    \ interpreted, interactive, object-oriented, and a powerful programming language\
    \ with dynamic semantics. It is an easy language to learn and become expert. Python\
    \ is one among those rare languages that would claim to be both easy and powerful.\
    \ Python's elegant syntax and dynamic typing alongside its interpreted nature\
    \ makes it an ideal language for scripting and robust application development\
    \ in many areas on giant platforms.\n\nPython helps with the modules and packages,\
    \ which inspires program modularity and code reuse. The Python interpreter and\
    \ thus the extensive standard library are all available in source or binary form\
    \ for free of charge for all critical platforms and can be freely distributed.\
    \ Learning Python doesn't require any pre-requisites. However, one should have\
    \ the elemental understanding of programming languages.\n\n**This Book consist\
    \ of 53 Must Do Python Projects for All Developers/Students to practice different\
    \ projects and scenarios. Use these learnings in professional tasks or daily learning\
    \ projects.**\n\n**At the end of this book, you can download all this projects\
    \ by using our link.**\n\nAll 53 projects are divided into different modules,\
    \ every project is special in its own way of performing daily task by a developer.\
    \ Every project has its source codes which learners can copy and practice/use\
    \ on their own systems. If there is special requirement for any projects, its\
    \ already mentioned in the book.\n\nHappy learning!!\n\n# Module 1 Project 1 -10\n\
    \n# 1. Snake Game\n\nSnake game is an Arcade Maze Game which has been developed\
    \ by Gremlin Industries. The player’s objective in the game is to achieve maximum\
    \ points as possible by collecting food or fruits. The player loses once the snake\
    \ hits the wall or hits itself.\n\n## Setup instructions\n\nIn order to run this\
    \ script, You just need the following 3 modules -\n\n- **Pygame:** It is a set\
    \ of Python modules designed for writing video games.\n- **Time:** This function\
    \ is used to count the number of seconds elapsed since the epoch.\n- **Random:**\
    \ This function is used to generate random numbers in Python by using random module.\n\
    \nSource Code:\n\n```python\nimport pygame\nimport time\nimport random\n\npygame.init()\n\
    \nwhite = (255, 255, 255)\nyellow = (255, 255, 102)\nblack = (0, 0, 0)\nred =\
    \ (213, 50, 80)\ngreen = (0, 255, 0)\nblue = (50, 153, 213)\n\ndis_width = 600\n\
    dis_height = 400\n\ndis = pygame.display.set_mode((dis_width, dis_height))\npygame.display.set_caption('Snake\
    \ Game In Python')\n\nclock = pygame.time.Clock()\n\nsnake_block = 10\nsnake_speed\
    \ = 15\n\nfont_style = pygame.font.SysFont(\"bahnschrift\", 25)\nscore_font =\
    \ pygame.font.SysFont(\"comicsansms\", 35)\n\ndef Your_score(score):\n    value\
    \ = score_font.render(\"Your Score: \" + str(score), True, yellow)\n    dis.blit(value,\
    \ [0, 0])\n\ndef our_snake(snake_block, snake_list):\n    for x in snake_list:\n\
    \        pygame.draw.rect(dis, black, [x[0], x[1], snake_block,\n        snake_block])\n\
    \ndef message(msg, color):\n    mesg = font_style.render(msg, True, color)\n \
    \   dis.blit(mesg, [dis_width / 6, dis_height / 3])\n\ndef gameLoop():\n    game_over\
    \ = False\n    game_close = False\n\n    x1 = dis_width / 2\n    y1 = dis_height\
    \ / 2\n    x1_change = 0\n    y1_change = 0\n\n    snake_List = []\n    Length_of_snake\
    \ = 1\n\n    foodx = round(random.randrange(0, dis_width - snake_block) / 10.0)\
    \ * 10.0\n    foody = round(random.randrange(0, dis_height - snake_block) / 10.0)\
    \ * 10.0\n\n    while not game_over:\n\n        while game_close == True:\n  \
    \          dis.fill(blue)\n            message(\n                \"You Lost! Press\
    \ 'C' to Play Again or 'Q' To Quit The Game\",\n                red)\n       \
    \     Your_score(Length_of_snake - 1)\n            pygame.display.update()\n\n\
    \            for event in pygame.event.get():\n                if event.type ==\
    \ pygame.KEYDOWN:\n                    if event.key == pygame.K_q:\n         \
    \               game_over = True\n                        game_close = False\n\
    \                    if event.key == pygame.K_c:\n                        gameLoop()\n\
    \n        for event in pygame.event.get():\n            if event.type == pygame.QUIT:\n\
    \                game_over = True\n            if event.type == pygame.KEYDOWN:\n\
    \                if event.key == pygame.K_LEFT:\n                    x1_change\
    \ = -snake_block\n                    y1_change = 0\n                elif event.key\
    \ == pygame.K_RIGHT:\n                    x1_change = snake_block\n          \
    \          y1_change = 0\n                elif event.key == pygame.K_UP:\n   \
    \                 y1_change = -snake_block\n                    x1_change = 0\n\
    \                elif event.key == pygame.K_DOWN:\n                    y1_change\
    \ = snake_block\n                    x1_change = 0\n\n        if x1 >= dis_width\
    \ or x1 < 0 or y1 >= dis_height or y1 < 0:\n            game_close = True\n  \
    \      x1 += x1_change\n        y1 += y1_change\n        dis.fill(blue)\n    \
    \    pygame.draw.rect(dis, green, [foodx, foody, snake_block,\n        snake_block])\n\
    \        snake_Head = []\n        snake_Head.append(x1)\n        snake_Head.append(y1)\n\
    \        snake_List.append(snake_Head)\n        if len(snake_List) > Length_of_snake:\n\
    \            del snake_List[0]\n\n        for x in snake_List[:-1]:\n        \
    \    if x == snake_Head:\n                game_close = True\n\n        our_snake(snake_block,\
    \ snake_List)\n        Your_score(Length_of_snake - 1)\n\n        pygame.display.update()\n\
    \n        if x1 == foodx and y1 == foody:\n            foodx = round(\n      \
    \          random.randrange(0, dis_width - snake_block) / 10.0) * 10.0\n     \
    \       foody = round(\n                random.randrange(0, dis_height - snake_block)\
    \ / 10.0) * 10.0\n            Length_of_snake += 1\n\n        clock.tick(snake_speed)\n\
    \n    pygame.quit()\n    quit()\n\ngameLoop()\n```\n\n# 3. Spaceship Game\n\n\
    - The python script makes use of Pygame, a popular GUI module, to develop an interactive\
    \ multiplayer Spaceship Game.\n- The 2 players compete to aim bullets at each\
    \ other and the first player to lose their health, loses.\n\n## Requirements:\n\
    \nAll the packages essential for running the script can be installed as follows:\n\
    \n```sh\n$ pip install -r requirements.txt\n```\n\n### Requirements\n\npygame==2.0.1\n\
    \nSource Code files:\n\nmain.py\n\nutility.py\n\n# 2. Snapshot of given website\n\
    \n## Set up\n\n```bash\npip install selenium\npip install chromedriver-binary==XX.X.XXXX.XX.X\n\
    ```\n\n- 'XX.X.XXXX.XX.X' is chrome driver version.\n- The version of 'chrome\
    \ driver' need to match the version of your google chrome.\n\n*How to find your\
    \ google chrome version*\n\n1. Click on the Menu icon in the upper right corner\
    \ of the screen.\n2. Click on Help, and then About Google Chrome.\n3. Your Chrome\
    \ browser version number can be found here.\n\n## Execute\n\n```bash\npython snapshot_of_given_website.py\
    \ <url>\n```\n\nSnapshot is in current directory after this script runs.\n\n**Requirement:**\n\
    \n**selenium==3.141.0**"
