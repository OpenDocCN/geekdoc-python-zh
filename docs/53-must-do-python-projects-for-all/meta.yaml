  md: '# ### Step 3: Create field to enter link


    +   - **link** is a string type variable that stores the youtube video link that
    the user enters.

    - **Entry()** widget is used when we want to create an input text field.

    - **width** sets the width of entry widget

    - **textvariable** used to retrieve the value of current text variable to the
    entry widget

    - **place()** use to place the widget at a specific position


    # ### Step 4: Create function to start downloading


    `url` variable gets the youtube link from the link variable by **get()** function
    and then **str()** will convert the link in string datatype.


    The video is downloaded in the first present stream of that video by **stream.first()**
    method.


    **Button()** widget used to display button on the window.


    +   - **text** which we display on the label

    - **font** in which the text is written

    - **bg** sets the background color

    - **command** is used to call the function'
