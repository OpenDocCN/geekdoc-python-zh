    \ No message extracted', \"INBOX\", i)\n\ndef main():\n    mail, messages = connect_to_mailbox()\n\
    \n    logging.basicConfig(level=logging.WARNING)\n\n    total_no_of_mails = int(messages[0])\n\
    \n    # no. of latest mails to fetch\n    # set it equal to total_no_of_emails\
    \ to fetch all mail in the inbox\n    N = 2\n\n    with open(csv_path, \"wt\"\
