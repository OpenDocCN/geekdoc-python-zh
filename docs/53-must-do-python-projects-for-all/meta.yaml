  md: '# 53. Youtube Video Downloader


    # # YouTube Video Downloader


    The objective of this project is to download any type of video in a fast and easy
    way from youtube in your device.


    In this, user has to copy the youtube video URL that they want to download and
    simply paste that URL in the ‘paste link here’ section and click on the download
    button, it will start downloading the video. When video downloading finishes,
    it shows a message ‘downloaded’ popup on the window below the download button.


    # ## Prerequisites


    To implement this, we use basic concept of python, tkinter and pytube library.


    +   - **Tkinter** is a standard GUI library and it is one of the easiest ways
    to build a GUI application.

    - **pytube** used for downloading videos from youtube


    To install the required modules run pip installer command on the command line:'
