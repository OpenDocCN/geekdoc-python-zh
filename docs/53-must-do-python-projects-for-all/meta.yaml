    ## 47. Set a Random desktop background\n\nThis script will download a random image\
    \ from [unsplash](https://source.unsplash.com/random) and set it as the desktop\
    \ background.\n\n**The image will be saved as \"random.jpg\" makesure that there\
    \ are no files saved as \"random.jpg\" in the current directory**\n\n### Requirements\n\
    \n#### Linux\n\nInstall [Nitrogen](https://wiki.archlinux.org/index.php/Nitrogen)\n\
    \n```\npip install requests\n```\n\n### Usage\n\n```\npython background_linux.py\n\
    ```\n\nOR\n\n```\npython background_windows.py\n```\n\n### Source Code:\n\n```\n\
    from requests import get\nimport os\nimport ctypes\nimport sys\n\nurl = \"https://source.unsplash.com/random\"\
    \nfile_name = \"random.jpg\"\n\ndef is_64bit():\n    return sys.maxsize > 2 **\
    \ 32\n\ndef download(url, file_name):\n    \"\"\"\n    downloading the file and\
    \ saving it\n    \"\"\"\n    with open(file_name, \"wb\") as file:\n        response\
    \ = get(url)\n        file.write(response.content)\n\ndef setup(pathtofile, version):\n\
    \    name_of_file = pathtofile\n    path_to_file = os.path.join(os.getcwd(), name_of_file)\n\
    \    SPI_SETDESKWALLPAPER = 20\n    if is_64bit():\n        ctypes.windll.user32.SystemParametersInfoW(SPI_SETDESKWALLPAPER,\
