    orcl instance.

    2. Python 3.11 with the cx_Oracle 6 extension.


    **Note:** Prefer to install the cx_Oracle version as of client version of installed
    database.E.g. if you have 10g Client then install 10g version of Oracle, otherwise
    you may get an error as cx_Oracle.DatabaseError: ORA-24315: illegal attribute
    type'
