  md: 'Tkinter defines many common color names, like ''yellow'' and ''red''. It also
    provides a way to get access to millions of more colors. We first try to understand
    how colors are displayed on the screen.

    Each color is broken into three components;

    a red,

    a green,

    and a blue component.

    Each component can have a value from 0 to 255, with 255 being the full amount
    of that color. Equal parts of red and green create shades of yellow, equal parts
    of red and blue create shades of purple, and equal parts of blue and green create
    shades of turquoise. Equal parts of all three create shades of gray. Black is
    when all three components have values of 0 and white is when all three components
    have values of 255. Varying the values of the components can produce up to 256^3
    = 16 million colors. There are a number of resources on the web that allow you
    to vary the amounts of the components and see what color is produced.


    To use colors in Tkinter is easy, but with one catchcomponent values are given
    in hexadecimal. Hexadecimal is a base 16 number system, where the letters A-F
    are used to represent the digits 10 through 15. It was widely used in the early
    days of computing, and it is still used here and there. Here is a table comparing
    the two number bases:


    | 0 | 0 | 8 | 8 | 16 | 10 | 80 | 50 |

    |---|---|---|---|---|---|---|---|

    | 1 | 1 | 9 | 9 | 17 | 11 | 100 | 64 |

    | 2 | 2 | 10 | A | 18 | 12 | 128 | 80 |'
