    列表的另一个用途，同样在 [Python 文档](https://docs.python.org/3/tutorial/datastructures.html)中介绍，是将列表用作队列，即先进先出（**FIFO**）。


    ```

    >>> queue = [''a'', ''b'', ''c'', ''d'']

    >>> queue.append(''e'')

    >>> queue.append(''f'')

