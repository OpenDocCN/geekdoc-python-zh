    \ (here 02, which is 2 in decimal), and the last two digits specify the blue component\
    \ (here FF, which is 255 in decimal).\nlabel = Label(text='Hi', bg='#A202FF')\n\
    \nIf you would rather not bother with hexadecimal, you can use the following function\
