    \n```\ndef cnvrt(t):\n    return t*9/5+32\nprint(cnvrt(20))\n68\n```\n\nThe return\
    \ statement is used to send the result of a function's calculations back to the\
    \ caller. Notice that the function itself does not do any printing. The printing\
    \ is done outside of the function. That way, we can do math with the result, like\
    \ below.\nprint(cnvrt(20)+5)\nIf we had just printed the result in the function\
    \ instead of returning it, the result would have been printed to the screen and\
    \ forgotten about, and we would never be able to do anything with it.\n\n## The\
