    \ | gets rid of the number that displays above the scale |\n| tickinterval=1 |\
    \ displays tickmarks at every unit (1 can be changed) |\n\nThere are several ways\
    \ for our program to interact with the scale. One way is to link it with an IntVar\
    \ just like with check buttons and radio buttons, using the variable option. Another\
    \ option is to use the scales get and set methods. A third way is to use the command\
    \ option, which works just like with buttons.\n\n## GUI Events\n\nOften we want\
    \ our programs to do something if the user presses a certain key, drags something\
    \ on a canvas, uses the mouse wheel, etc. These things are called events.\n\n\
    ## A simple example\n\nThe first GUI program we looked at back in was a simple\
    \ temperature converter. Anytime we wanted to convert a temperature we would type\
    \ in the temperature in the entry box and click the Calculate button. It would\
    \ be nice if the user could just press the enter key after they type the temperature\
    \ instead of having to click to Calculate button. We can accomplish this by adding\
    \ one line to the program:\n\n```\nentry.bind('<Return>', lambda dummy=0:calculate())\n\
    ```\n\nThis line should go right after you declare the entry box. It takes the\
    \ event that the enter (return) key is pressed and binds it to the calculate function.\n\
    \nThe function you bind the event to is supposed to be able to receive a copy\
    \ of an Event object, but the calculate function that we had previously written\
    \ takes no arguments. Rather than rewrite the function, the line above uses **lambda**\
    \ trick to essentially throw away the Event object.\n\n## Common events\n\nHere\
    \ is a list of some common events:\n\n| Event | Description |\n| :--- | :--- |\n\
    | <Button-1> | The left mouse button is clicked. |\n| <Double-Button-1> | The\
    \ left mouse button is double-clicked. |\n| <Button-Release-1> | The left mouse\
    \ button is released. |\n| <B1-Motion> | A click-and-drag with the left mouse\
    \ button. |\n| <MouseWheel> | The mouse wheel is moved. |\n| <Motion> | The mouse\
    \ is moved. |\n| <Enter> | The mouse is now over the component. |\n| <Leave> |\
    \ The mouse has now left the component. |\n| <Key> | A key is pressed. |\n| <key\
    \ name> | The key name key is pressed. |\n\nFor all of the mouse button examples,\
    \ the number 1 can be replaced with other numbers. Button 2 is the middle button\
    \ and button 3 is the right button.\nThe most useful attributes in the Event object\
    \ are:\n\n| Attribute | Description |\n| :--- | :--- |\n| Keysym | The name of\
    \ the key that was pressed |\n| x, y | The coordinates of the mouse pointer |\n\
    | Delta | The value of the mouse wheel |\n\n## Key events\n\nFor key events, we\
    \ can either have specific callbacks for different keys or catch all keypresses\
    \ and deal with them in the same callback. Here is an example of the latter:\n\
    \n```\nfrom tkinter import *\ndef callback(event): print(event.keysym)\nroot =\
    \ Tk()\nroot.bind('<Key>', callback)\nmainloop()\n```\n\nThe above program prints\
    \ out the names of the keys that were pressed. You can use those names in if statements\
    \ to handle several different keypresses in the callback function, like below:\n\
    \n```\nif event.keysym = 'percent':\n    percent (shift+5) was pressed, do something\
    \ about it...\nelif event.keysym = 'a':\n    lowercase a was pressed, do something\
    \ about it...\n```\n\nUse the single callback method if you are catching a lot\
    \ of keypresses and are doing something similar with all of them. On the other\
    \ hand, if you just want to catch a couple of specific keypresses or if certain\
    \ keys have very long and specific callbacks, you can catch keypresses separately\
    \ like below:\n\n```\nfrom tkinter import *\ndef callback1(event):\n    print('You\
    \ pressed the enter key.')\ndef callback1(event):\n    print('You pressed the\
    \ up arrow.')\nroot = Tk()\nroot.bind('<Return>', callback1)\nroot.bind('<Up>',\
    \ callback2)\nmainloop()\n```\n\nThe key names are the same as the names stored\
    \ in the keysym attribute. You can use the program from earlier in this section\
    \ to find the names of all the keys.\nHere are the names for a few common keys:\n\
    \n| Tkinter name | Common name |\n|---|---|\n| <Return> | Enter key |\n| <Tab>\
    \ | Tab key |\n| <Space> | Spacebar |\n| <F1>,..., <F12> | F1,...,F12 |\n| <Next>,\
    \ <Prior> | Page up, Page down |\n| <Up>, <Down>, <Left>, <Right> | Arrow keys\
    \ |\n| <Home>, <End> | Home, End |\n| <Insert>, <Delete> | Insert, Delete |\n\
    | <Caps_Lock>, <Num_Lock> | Caps lock, Number lock |\n| <Control_L>, <Control_R>\
    \ | Left and right Control keys |\n| <Alt_L>, <Alt_R> | Left and right Alt keys\
    \ |\n| <Shift_L>, <Shift_R> | Left and right Shift keys |\n\nMost printable keys\
    \ can be captured with their names, like below:\nroot.bind('a', callback)\nroot.bind('A',\
    \ callback)\nroot.bind('-', callback)\n\nThe exceptions are the spacebar (<Space>)\
    \ and the less than sign (<Less>). You can also catch key combinations, such as\
    \ <Shift-F5>, <Control-Next>, <Alt-2>, or <Control-Shift-F1>.\n\n**Note**\nThese\
    \ examples all bind keypresses to root, which is our name for the main window.\
    \ You can also bind keypresses to specific components. For example, if you only\
    \ want the left arrow key to work on a Canvas called canvas, you could use the\
    \ following:\n\n```\ncanvas.bind(<Left>, callback)\n```\n\nOne trick here, is\
    \ that the canvas wont recognize the keypress unless it has the GUIs focus. This\
    \ can be done as below:\n\n```\ncanvas.focus_set()\n```\n\n## Event examples\n\
    \n**Example 1** An example where we can move a rectangle with the up or down arrow\
    \ keys.\n\n```\nfrom tkinter import *\ndef callback(event):\n    global move\n\
    \    if event.keysym=='Up':\n        move += 1\n    elif event.keysym=='Down':\n\
    \        move -=1\n    canvas.coords(rect,50+move,50,100+move,100)\nroot = Tk()\n\
    root.bind('<Key>', callback)\ncanvas = Canvas(width=200,height=200)\ncanvas.grid(row=0,column=0)\n\
    rect = canvas.create_rectangle(50,50,100,100,fill='blue')\nmove = 0\nmainloop()\n\
    ```\n\n## Title bar\n\nThe GUI window that Tkinter creates says Tk by default.\
    \ Here is how to change it:\nroot.title('Your title')\n\n## Disabling things\n\
    \nSometimes you want to disable a button so it cant be clicked. Buttons have an\
