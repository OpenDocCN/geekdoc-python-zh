  md: "Names are resolved using the nested collection of namespaces that define an\
    \ execution environment. Python always checks the most-local dictionary first,\
    \ ending with the global dictionary.\n\nConsider the following script.\n\n```\n\
    def deep( a, b ): print \"a=\", a print \"b=\", b\ndef shallow( hows, things ):\n\
    \    deep( hows, 1 )\n    deep( things, coffee )\nhows= 1 coffee= 2\nshallow(\
    \ \"word\", 3.1415926 ) shallow( hows, coffee )\n```\n\nThe deep() function has\
    \ a local namespace, where two variables are defined: a and b. When deep() is\
    \ called from shallow(), there are three nested scopes that define the environment:\
    \ the local namespace for deep(): the local namespace for shallow(), and the global\
    \ namespace for the main script.\n\nThe shallow() function has a local namespace,\
    \ where two variables are defined: hows and things.\n\nWhen shallow() is called\
    \ from the main script, the local hows is resolved in the local namespace. It\
    \ hides the global variable with the same name.\n\nThe reference to coffee is\
    \ not resolved in the local namespace, but is resolved in the global namespace.\
    \ This is called a *free* variable, and is sometimes a symptom of poor software\
    \ design."
