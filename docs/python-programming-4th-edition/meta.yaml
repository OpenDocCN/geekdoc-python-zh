    \ Unicode\n- 'V' – 原始数据（void）\n\n## NumPy - 数组创建方式\n\n可以通过以下任何一种数组创建例程或使用底层 `ndarray`\
    \ 构造函数来构造新的 **ndarray** 对象。\n\n## numpy.empty\n\n它创建一个指定形状和 `dtype` 的未初始化数组。它使用以下构造函数：\n\
