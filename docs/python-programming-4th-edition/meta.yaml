    # Button component


    The following example creates a simple button:

    ok_button = Button(text=''Ok'')

    To get the button to do something when clicked, use the command argument. It is
    set to the name of a function, called a callback function. When the button is
    clicked, the callback function is called. Here is an example:


    ```

    from tkinter import *

    def callback(): label.configure(text=''Button clicked'')

    root = Tk()

    label = Label(text=''Not clicked'')

    button = Button(text=''Click me'', command=callback)

    label.grid(row=0, column=0) button.grid(row=1, column=0)

    mainloop()

    ```


    When the program starts, the label says Click me. When the button is clicked,
    the callback function callback is called, which changes the label to say Button
    clicked.'
