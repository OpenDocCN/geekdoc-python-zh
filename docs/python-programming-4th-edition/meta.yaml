    \    x = x + 1\n\ndef func2(L):\n    L = L + [1]\n\na = 2\nM = [1, 2, 3]\nfunc1(a)\n\
    func2(M)\n```\n\nWhen we call `func1` with `a` and `func2` with `M`, a question\
    \ arises: do the functions change the values of `a` and `M`? The answer may surprise\
    \ you. The value of `a` is unchanged, but the value of `M` is changed. The reason\
    \ has to do with a difference in the way that Python handles numbers and lists.\
    \ Lists are said to be mutable objects, meaning they can be changed, whereas numbers\
    \ and strings are immutable, meaning they cannot be changed.\n\nIf we want to\
