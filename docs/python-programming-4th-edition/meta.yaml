    # GUI Programming using Tkinter


    Until now, the only way our programs interact with the user is through keyboard
    input via the **input** statement. But most real applications use windows, buttons,
    checkboxes, scrollbars, and other components. These components are part of a Graphical
    User Interface (GUI).


    Tkinter is the standard GUI library for Python. Python when combined with Tkinter
    provides a fast and easy way to create GUI applications. Tkinter


    ![](img/e3dac7e08bdd357a94774b55d90b82a8_318_0.png)'
- md: "ter provides a powerful object-oriented interface to the Tk GUI toolkit (**tkinter\
    \ module comes by default with python 3.x versions**).\n\nAlmost every GUI program\
    \ we will write will contain the following three lines:\n\n```\nfrom tkinter import\
    \ *\nroot = Tk()\nmainloop()\n```\n\nLine-1 imports all of the GUI stuff from\
    \ the tkinter module.\nLine-2 creates a window on the screen, which we call root.\n\
    Line-3 puts the program into what is essentially a long-running while loop called\
    \ the event loop. This loop runs, waiting for keypresses, button clicks, etc.,\
    \ and it exits when the user closes the window.\n\nHere is a working GUI program\
    \ that converts temperatures from Fahrenheit to Celsius\n\n```\nfrom tkinter import\
    \ *\ndef calculate():\n    tmp = int(entry.get())\n    tmp = 9/5*tmp+32\n    output_label.configure(text\
    \ = 'Converted: {:.1f}'.format(temp))\n    entry.delete(0,END)\nroot = Tk()\n\
    message_label = Label(text='Enter a temperature', font=('Arial', 14))\noutput_label\
    \ = Label(font=('Arial', 14))\nentry = Entry(font=('Arial', 14), width=4)\ncalc_button\
    \ = Button(text='Ok', font=('Arial', 14),command=calculate)\nmessage_label.grid(row=0,\
    \ column=0)\nentry.grid(row=0, column=1)\ncalc_button.grid(row=0, column=2)\n\
    output_label.grid(row=1, column=0, columnspan=3)\nmainloop()\n```\n\nHere is the\
    \ output of program:\n\n![](img/e3dac7e08bdd357a94774b55d90b82a8_320_0.png)\n\n\
    Components of the program in details.\n\n## Label component\n\nA label is a container\
    \ for your program to place some text on the screen. The following code creates\
    \ a label and places it on the screen.\n\n```\nhllo_label=Label(text='hello')\n\
    hllo_label.grid(row=0, column=0)\n```\n\nWe call Label to create a new label where\
    \ labels name is hllo_label. Once created, use the grid method to place the label\
    \ on the screen.\n\n## Options of Label\n\nThere are a number of options we can\
    \ change including font size and color. Here are some examples:\n\n```\nhello_label\
    \ = Label(text='hello', font=('Arial', 14, 'bold'), bg='blue', fg='white')\n```\n\
    \nNote the use of keyword arguments.\n\nHere are a few common options:\n\n- **font**\
    \ The basic structure is font= (font name, font size, style).\n  You can leave\
    \ out the font size or the style. The choices for style are 'bold', 'italic',\
    \ 'underline', 'overstrike', 'roman', and 'normal' (which is the default). We\
    \ can combine multiple styles like this: 'bold underline italic'.\n- **fg and\
    \ bg** These stand for foreground and background. Many common color names can\
    \ be used, like 'red', 'yellow', etc.\n- **width** This is how many characters\
    \ long the label should be.\n- **height** This is how many rows high the label\
    \ should be.\n  You can use this for multiline labels.\n  Use newline characters\
    \ in the text to get it to span multiple lines.\n  For example, text='hello \\\
    n ajit'.\n\n## Changing label properties\n\nLater in your program, after you've\
    \ created a label, you may want to change something about it. To do that, use\
    \ its configure method. Here are two examples that change the properties of a\
    \ label called label:\n\n```\nlabel.configure(text='Bye Bye')\nlabel.configure(bg='white',\
    \ fg='red')\n```\n\nSetting text to something using the configure method is kind\
    \ of like the GUI equivalent of a **print** statement. However, in calls to configure\
    \ we cannot use commas to separate multiple things to print. We instead need to\
    \ use string formatting. Here is a **print** statement and its equivalent using\
    \ the configure method.\n\n```\nprint('a =', a, 'and b =', b)\nlabel.configure(text='a\
    \ = {}, and b = {}'.format(a,b))\n```\n\nNote: The configure method works with\
    \ most of the other components we will see.\n\n## grid\n\nThe grid method is used\
    \ to place things on the screen. It lays out the screen as a rectangular grid\
    \ of rows and columns. The first few rows and columns are show below.\n\n## Spanning\
    \ multiple rows or columns\n\nThere are optional arguments, rowspan and colspan,\
    \ that allow a component to take up more than one row or column. Here is an example\
    \ of several grid statements followed by what the layout will look like:\n\n```\n\
    label1.grid(row=0, column=0)\nlabel2.grid(row=0, column=1)\nlabel3.grid(row=1,\
    \ column=0, colspan=2)\nlabel4.grid(row=1, column=2)\nlabel5.grid(row=2, column=2)\n\
    ```\n\n## Spacing\n\nTo add extra space between components, there are optional\
    \ arguments padx and pady.\n\n*Important note:* Any time you create a component,\
    \ to place it on the screen you need to use grid (or one of its cousins, like\
    \ pack, which we will talk about later). Otherwise it will not be visible.\n\n\
    ## Entry component\n\nEntry boxes are used to get text input. The following example\
    \ creates a simple entry box and places it on the screen.\n\n```\nentry = Entry()\n\
    entry.grid(row=0, column=0)\n```\n\nMost of the same options that work with labels\
    \ are work with entry boxes. The width option is particularly helpful because\
    \ the entry box will often be wider than you need.\n\n## Getting text\n\nTo get\
    \ the text from an entry box, use its get method. This will return a string. If\
    \ you need numerical data, use **eval** (or **int** or **float**) on the string.\
    \ Here is a simple example that gets text from an entry box named entry.\n\n```\n\
    string_value = entry.get()\nnum_value = eval(entry.get())\n```\n\n## Deleting\
    \ text\n\nTo clear an entry box, use the following:\n\n```\nentry.delete(0,END)\n\
    ```\n\n## Inserting text\n\nTo insert text into an entry box, use the following:\n\
    \n```\nentry.insert(0, 'hello')\n```\n\n## Button component\n\nThe following example\
    \ creates a simple button:\n\n```\nok_button = Button(text='Ok')\n```\n\nTo get\
    \ the button to do something when clicked, use the command argument. It is set\
    \ to the name of a function, called a callback function. When the button is clicked,\
    \ the callback function is called. Here is an example:\n\n```\nfrom tkinter import\
    \ *\ndef callback():\n    label.configure(text='Button clicked')\nroot = Tk()\n\
    label = Label(text='Not clicked')\nbutton = Button(text='Click me', command=callback)\n\
    label.grid(row=0, column=0)\nbutton.grid(row=1, column=0)\nmainloop()\n```\n\n\
    When the program starts, the label says Click me. When the button is clicked,\
    \ the callback function callback is called, which changes the label to say Button\
    \ clicked.\n\n![](img/e3dac7e08bdd357a94774b55d90b82a8_325_0.png)\n\n## lambda\
    \ trick\n\nSometimes we will want to pass information to the callback function,\
    \ like if we have several buttons that use the same callback function and we want\
    \ to give the function information about which button is being clicked. Here is\
    \ an example where we create 26 buttons, one for each letter of the alphabet.\
    \ Rather than use 26 separate Button() statements and 26 different functions,\
    \ we use a list and one function.\n\n```\nfrom tkinter import *\nalphabet = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ'\n\
    def callback(x):\n    label.configure(text='Button {} clicked'.format(alphabet[x]))\n\
    root = Tk()\nlabel = Label()\nlabel.grid(row=1, column=0, columnspan=26)\nbuttons\
    \ = [0]*26 # create a list to hold 26 buttons\nfor i in range(26):\n    buttons[i]\
    \ = Button(text=alphabet[i],\n        command = lambda x=i: callback(x))\n   \
    \ buttons[i].grid(row=0, column=i)\nmainloop()\n```\n\nWe set buttons=[0]*26.\
    \ This creates a list with 26 things in it. An alternate way to create the list\
    \ would be to set buttons=[] and use the append method.\n\n![](img/e3dac7e08bdd357a94774b55d90b82a8_326_0.png)\n\
    \nWe use one callback function and it has one argument, which indicates which\
    \ button was clicked. As far as the **lambda** trick goes, without getting into\
    \ the details, command=callback(i) does not work, and that is why we resort to\
    \ the **lambda** trick.\n\n## Frame component\n\nLet's say we want 26 small buttons\
    \ across the top of the screen, and a big Ok button below them, like below:\n\n\
    ![](img/e3dac7e08bdd357a94774b55d90b82a8_326_1.png)\n\nThe frame's job is to contain\
    \ other components and essentially combine them into one large component. In this\
    \ case, we will create a frame to group all of the letter buttons into one large\
    \ component. The code is shown below:\n\n```\nfrom tkinter import *\nalphabet\
    \ = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ'\nroot = Tk()\nbutton_frame = Frame()\nbuttons\
    \ = [0]*26\nfor i in range(26):\n    buttons[i] = Button(button_frame, text=alphabet[i])\n\
    \    buttons[i].grid(row=0, column=i)\nok_button = Button(text='Ok', font=('Verdana',\
    \ 24))\nbutton_frame.grid(row=0, column=0)\nok_button.grid(row=1, column=0)\n\
    mainloop()\n```\n\nTo create a frame, we use Frame() and give it a name. Then,\
    \ for any components we want include in the frame, we include the name of the\
    \ frame as the first argument in the components declaration. We still have to\
    \ grid the components, but now the rows and columns will be relative to the frame.\
    \ Finally, we have to grid the frame itself.\n\n## Colors"
  mdcn: "Tkinter 为 Tk GUI 工具包提供了一个强大的面向对象接口（**tkinter 模块在 Python 3.x 版本中默认包含**）。\n\
