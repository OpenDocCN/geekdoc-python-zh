    list for a specific value. It also contains the insort() function to insert an
    item into a list maintaining the sorted order. This module performs faster than
    simply appending values to a list and calling the sort() method of a list. This
    modules source is instructive as a lesson in well-crafted algorithms.


    **array** The array module gives you a high-performance, highly compact collection
    of values. It isnt as flexible as a list or a tuple, but it is fast and takes
    up relatively little memory. This is helpful for processing media like image or
    sound files.


    **sched** The sched module contains the definition for the scheduler class that
    builds a simple task scheduler. When a scheduler is constructed, it is given two
