    \ 上的 `;`）分隔的文件名组成。\n\n脚本目录。如果你运行一个 Python 脚本，该脚本的目录将被首先放置在搜索路径上，以便使用本地定义的模块，而不是同名的内置模块。\n\
    \n站点模块的位置也会被添加。（可以通过使用 `-S` 选项启动 Python 来禁用此功能。）站点模块将使用 **PYTHONHOME** 位置创建最多四个额外的目录。通常，最有趣的是\
    \ `site-packages` 目录。这个目录是放置你下载的额外模块的便捷位置。此外，此目录可以包含 `.pth` 文件。站点模块读取 `.pth` 文件并将命名的目录放入搜索路径。\n\
    \n搜索路径由 `sys` 模块中的 `path` 变量定义。如果我们导入 `sys`，就可以显示 `sys.path`。这对于调试非常方便。调试 shell\
    \ 脚本时，运行 `python -c 'import sys; print(sys.path)'` 可以帮助查看 Python 环境设置的部分内容。\n\n\
    因此，安装模块就是确保该模块出现在搜索路径上。有四种主要方法可以实现这一点。\n\n一些包会建议你创建一个目录并将包放入该目录。这可以通过下载并解压文件来完成。也可以使用\
    \ Subversion 并将你的 Subversion 副本与服务器上的副本同步。无论哪种方式，你可能只需要创建一个指向该目录的操作系统链接，并将该链接放入\
    \ `site-packages` 目录。\n\n一些包会建议你下载（或使用 Subversion）创建一个临时副本。它们会为你提供一个通常基于 `setup.py`\
    \ 的脚本，该脚本将文件移动到正确的位置。这称为 distutils 分发。这通常会将模块文件复制到 `site-packages` 目录。\n\n一些包会依赖\
    \ setuptools。这是来自 [Python Enterprise Application Kit](http://peak.telecommunity.com/DevCenter/setuptools)\
    \ 的一个包，它扩展了 distutils 以进一步自动化下载和安装。此工具同样通过将工作库模块移动到 `site-packages` 目录来工作。\n\n\
    扩展搜索路径。要么设置 **PYTHONPATH** 环境变量，要么在 `site-packages` 目录中放置 `.pth` 文件。\n\n## import\
    \ 主题的变体\n\n**import** 语句有几种变体。我们在 *math 模块* 中简要介绍过这些。在本节中，我们将介绍 **import** 语句可用的变体。\n\
    \n- 基本导入。这在 *模块使用：import 语句* 中有介绍。\n- 导入为。这允许我们导入一个模块并为其分配一个新名称。\n- 从模块导入名称。这允许我们导入一个模块，使某些名称成为全局命名空间的一部分。\n\
    - 组合 from 和 as 导入。\n\n### 导入为\n\n**import** 语句的一个有用变体是使用 **as** 子句重命名模块。\n\n```python\n\
    import module as name\n```\n\n这种模块重命名用于两种情况。\n\n- 我们有两个或更多可互换的模块版本。\n- 模块名称相当长且输入起来很麻烦。\n\
    \n在许多情况下，我们拥有可互换的模块版本。一个例子是内置的 `os` 模块。该模块为我们提供了许多在大多数主要操作系统上行为相同的函数。实现这一点的方法是创建这些函数的多个变体实现，然后使用适当的\
    \ **as** 子句为它们赋予一个平台中立的名称。"
