  md: '**Python Simply In Depth** provides all essential programming concepts and
    information one shall need in order to start developing their own Python program.
    The book provides a comprehensive walk-through of Python programming in a clear,
    straightforward manner that beginners will appreciate. Important concepts are
    introduced through a step-by-step discussion and reinforced by relevant examples
    and illustrations. This book can be used as a guide to help explore, harness,
    and gain appreciation of the capabilities and features of Python.


    This book encapsulates rich practical hands-on experience in developing python
    based applications, combined with teaching the subject for graduate/post-graduate
    students. The book is therefore a culmination of putting together what has been
    both practiced as well as preached, which is the one of the most compelling differentiators
    for this book. It can also be used for independent study by anyone interested
    in getting a broad introduction to a core useful set of the python language.


