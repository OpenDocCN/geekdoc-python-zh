    \ 时，可能会弹出一个菜单询问是否将 Anaconda 添加到我的 PATH 环境变量，以及是否将 Anaconda 注册为我的默认 Python 3.11。为了本课程的目的，我们建议接受这两个选项。\n\
    \n## NumPy - 简介\n\nNumPy 是一个 Python 包。它代表“数值 Python”（Numerical Python）。它是一个由多维数组对象和用于处理数组的例程集合组成的库。\n\
    \nNumPy 的前身 **Numeric** 由吉姆·休金（Jim Hugunin）开发。另一个包 Numarray 也被开发出来，具有一些额外的功能。2005\
    \ 年，特拉维斯·奥利芬特（Travis Oliphant）通过将 Numarray 的功能整合到 Numeric 包中，创建了 NumPy 包。这个开源项目有许多贡献者。\n\
    \n### 使用 NumPy 进行操作\n\n使用 NumPy，开发者可以执行以下操作：\n\n- 对数组进行数学和逻辑运算。\n- 傅里叶变换和形状操作例程。\n\
    - 与线性代数相关的操作。NumPy 内置了用于线性代数和随机数生成的函数。\n\n### 自定义 NumPy\n\n标准 Python 发行版不包含 NumPy\
    \ 模块。如果你为 Windows 安装 Anaconda Python 包，Pandas 将默认随以下内容一起安装：\n\n下载并安装 **Anaconda**（从\
    \ https://www.anaconda.com/download/ 获取，这是一个免费的 Python 发行版）用于 SciPy 栈。它也适用于 Linux\
    \ 和 Mac。如果你使用的是 Anaconda Python，你的系统应该已经安装了 numpy 和 matplotlib。\n\n### NumPy -\
    \ Ndarray 对象\n\nNumPy 中定义的最重要的对象是一个称为 **ndarray** 的 N 维数组类型。它描述了相同类型项目的集合。集合中的项目可以使用从零开始的索引进行访问。ndarray\
    \ 中的每个项目在内存中占据相同大小的块。ndarray 中的每个元素都是数据类型对象（称为 **dtype**）的一个对象。\n\n从 ndarray 对象中提取的任何项目（通过切片）都由数组标量类型之一的\
    \ Python 对象表示。下图显示了 ndarray、数据类型对象（dtype）和数组标量类型之间的关系：\n\nndarray 类的实例可以通过教程后面描述的各种数组创建例程来构造。基本的\
    \ ndarray 使用 NumPy 中的 array 函数创建，如下所示：\n\n```\nnumpy.array\n```\n\n它从任何暴露数组接口的对象或任何返回数组的方法创建一个\
    \ ndarray。\n\n```\nnumpy.array(object, dtype = None, copy = True, order = None,\
    \ subok = False, ndmin = 0)\n```\n\n上述构造函数接受以下参数：\n\n| 序号 | 参数与描述 |\n| :--- |\
    \ :--- |\n| 1 | **Object** 任何暴露数组接口方法的对象，返回一个数组，或任何（嵌套）序列。 |\n| 2 | **Dtype**\
    \ 数组的期望数据类型，可选 |\n| 3 | **Copy** 可选。默认情况下（true），对象会被复制 |\n| 4 | **Order** C（行优先）或\
    \ F（列优先）或 A（任意）（默认） |\n| 5 | **Subok** 默认情况下，返回的数组被强制为基础类数组。如果为 true，则传递子类 |\n\
    | 6 | **Ndmin** 指定结果数组的最小维度 |\n\n请查看以下示例以更好地理解。\n\n示例 1\n\n```\nimport numpy as\
    \ np\na = np.array([1,2,3])\nprint a\n```\n\n输出如下：\n\n```\n[1, 2, 3]\n```\n\n\
    示例 2\n\n```\n# 多个维度\nimport numpy as np\na = np.array([[1, 2], [3, 4]])\nprint\
    \ a\n```\n\n输出如下：\n\n```\n[[1, 2]\n [3, 4]]\n```\n\n示例 3\n\n```\n# 最小维度\nimport\
    \ numpy as np\na = np.array([1, 2, 3,4,5], ndmin = 2)\nprint a\n```\n\n输出如下：\n\
    \n```\n[[1, 2, 3, 4, 5]]\n```\n\n**ndarray** 对象由计算机内存中连续的一维段组成，并结合了一个索引方案，该方案将每个项目映射到内存块中的一个位置。内存块以行优先顺序（C\
    \ 风格）或列优先顺序（FORTRAN 或 MatLab 风格）存储元素。\n\n### Python 列表与 Numpy 数组 - 有什么区别？\n\n\
    **Numpy** 是 Python 中科学计算的核心库。它提供了一个高性能的多维数组对象，以及用于处理这些数组的工具。numpy 数组是一个值的网格，所有值都是相同的类型，并由一个非负整数元组索引。维度的数量是数组的*秩*；数组的*形状*是一个整数元组，给出数组沿每个维度的大小。\n\
    \nPython 核心库提供了**列表**。列表是 Python 中数组的等价物，但它是可调整大小的，并且可以包含不同类型的元素。\n\n一个常见的初学者问题是这里真正的区别是什么。答案是性能。Numpy\
    \ 数据结构在以下方面表现更好：\n\n- **大小** - Numpy 数据结构占用更少的空间\n- **性能** - 它们需要速度，并且比列表更快\n\
    - **功能** - SciPy 和 NumPy 内置了优化的函数，如线性代数操作。"
