    \n## exception NameError\n\nName not found globally.\n\n## exception NotImplementedError\n\
    \nMethod or function hasn't been implemented yet.\n\n## exception SyntaxError\n\
    \nInvalid syntax.\n\n## exception TabError\n\nImproper mixture of spaces and tabs.\n\
    \n## exception UnboundLocalError\n\nLocal name referenced but not bound to a value.\n\
    \nThe following exceptions are part of the implementation of exception objects.\
    \ Normally, these never occur directly. These are generic categories of exceptions.\
    \ When you use one of these names in a **catch** clause, a number of more specialized\
    \ exceptions will match these.\n\n## exception Exception\n\nCommon base class\
