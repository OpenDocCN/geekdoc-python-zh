  - '[PAGE 142]


    The system function can be used to run commands that you can run at a command
    prompt. Another way to run your programs is to use the execv function.


    # Quitting your program


    The sys module has a function called exit that can be used to quit your program.
    Here is a simple example:


    ```

    import sys

    ans = input(''Quit the program?'') if ans.lower() == ''yes''

    sys.exit()

    ```


    # Zip files


    A zip file is a compressed file or directory of files. The following code extracts
    all the files from a zip file, filename.zip, to my desktop:


    ```

    import zipfile

    z = zipfile.ZipFile(''filename.zip'')

    z.extractall(''c:/users/ajit/desktop/'')

    ```


    # For getting files from the internet


    There is the **urllib** module. Here is a simple example:


    ```

    from urllib.request import urlopen

    page = urlopen(''http://www.google.com'')

    s = page.read().decode()

    ```'
