    # GUI Events


    Often we want our programs to do something if the user presses a certain key,
    drags something on a canvas, uses the mouse wheel, etc. These things are called
    events.


    # A simple example


    The first GUI program we looked at back in was a simple temperature converter.
    Anytime we wanted to convert a temperature we would type in the temperature in
    the entry box and click the Calculate button. It would be nice if the user could
    just press the enter key after they type the temperature instead of having to
    click to Calculate button. We can accomplish this by adding one line to the program:


    ```

    entry.bind(''<Return>'', lambda dummy=0:calculate())

    ```


    This line should go right after you declare the entry box. It takes the event
    that the enter (return) key is pressed and binds it to the calculate function.'
  - '[PAGE 338]


    The function you bind the event to is supposed to be able to receive a copy of
    an Event object, but the calculate function that we had previously written takes
    no arguments. Rather than rewrite the function, the line above uses **lambda**
    trick to essentially throw away the Event object.


    # Common events


    Here is a list of some common events:


    | Event | Description |

    | :--- | :--- |

    | <Button-1> | The left mouse button is clicked. |

    | <Double-Button-1> | The left mouse button is double-clicked. |

    | <Button-Release-1> | The left mouse button is released. |

    | <B1-Motion> | A click-and-drag with the left mouse button. |

    | <MouseWheel> | The mouse wheel is moved. |

    | <Motion> | The mouse is moved. |

    | <Enter> | The mouse is now over the component. |

    | <Leave> | The mouse has now left the component. |

    | <Key> | A key is pressed. |

    | <key name> | The key name key is pressed. |


    For all of the mouse button examples, the number 1 can be replaced with other
    numbers. Button 2 is the middle button and button 3 is the right button.

    The most useful attributes in the Event object are:'
  - "[PAGE 339]\n\n| Attribute | Description |\n| :--- | :--- |\n| Keysym | The name\
    \ of the key that was pressed |\n| x, y | The coordinates of the mouse pointer\
    \ |\n| Delta | The value of the mouse wheel |\n\n# Key events\n\nFor key events,\
    \ we can either have specific callbacks for different keys or catch all keypresses\
    \ and deal with them in the same callback. Here is an example of the latter:\n\
    \n```\nfrom tkinter import *\ndef callback(event): print(event.keysym)\nroot =\
    \ Tk()\nroot.bind('<Key>', callback)\nmainloop()\n```\n\nThe above program prints\
    \ out the names of the keys that were pressed. You can use those names in if statements\
    \ to handle several different keypresses in the callback function, like below:\n\
    \n```\nif event.keysym = 'percent':\n    percent (shift+5) was pressed, do something\
    \ about it...\nelif event.keysym = 'a':\n    lowercase a was pressed, do something\
    \ about it...\n```"
  - "[PAGE 340]\n\nUse the single callback method if you are catching a lot of keypresses\
    \ and are doing something similar with all of them. On the other hand, if you\
    \ just want to catch a couple of specific keypresses or if certain keys have very\
    \ long and specific callbacks, you can catch keypresses separately like below:\n\
    \n```\nfrom tkinter import *\ndef callback1(event):\n    print('You pressed the\
    \ enter key.')\ndef callback1(event):\n    print('You pressed the up arrow.')\n\
    root = Tk()\nroot.bind('<Return>', callback1)\nroot.bind('<Up>', callback2)\n\
    mainloop()\n```\n\nThe key names are the same as the names stored in the keysym\
    \ attribute. You can use the program from earlier in this section to find the\
    \ names of all the keys.\nHere are the names for a few common keys:\n\n| Tkinter\
    \ name | Common name |\n|---|---|\n| <Return> | Enter key |\n| <Tab> | Tab key\
    \ |\n| <Space> | Spacebar |\n| <F1>,..., <F12> | F1,...,F12 |"
  - '[PAGE 341]


    | <Next>, <Prior> | Page up, Page down |

    | <Up>, <Down>, <Left>, <Right> | Arrow keys |

    | <Home>, <End> | Home, End |

    | <Insert>, <Delete> | Insert, Delete |

    | <Caps_Lock>, <Num_Lock> | Caps lock, Number lock |

    | <Control_L>, <Control_R> | Left and right Control keys |

    | <Alt_L>, <Alt_R> | Left and right Alt keys |

    | <Shift_L>, <Shift_R> | Left and right Shift keys |


    Most printable keys can be captured with their names, like below:

    root.bind(''a'', callback)

    root.bind(''A'', callback)

    root.bind(''-'', callback)


    The exceptions are the spacebar (<Space>) and the less than sign (<Less>). You
    can also catch key combinations, such as <Shift-F5>, <Control-Next>, <Alt-2>,
    or <Control-Shift-F1>.


    **Note**

    These examples all bind keypresses to root, which is our name for the main window.
    You can also bind keypresses to specific components. For example, if you only
    want the left arrow key to work on a Canvas called canvas, you could use the following:'
