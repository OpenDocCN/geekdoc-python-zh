    ## 第 6 章


    ## Python 基本运算符


    Python 运算符允许程序员操作数据或操作数。以下是 Python 支持的运算符类型：


    - 算术运算符

    - 赋值运算符

    - 关系或比较运算符

    - 逻辑运算符

    - 身份运算符

    - 位运算符

    - 成员运算符


    ## 算术运算符


    Python 使用其基本算术运算符很好地处理数学表达式。你可以轻松地编写程序来自动化计算税、小费、折扣或租金等任务。


    | 符号 | 名称 | 描述 |

    | :--- | :--- | :--- |

    | + | 加法 | 将左操作数和右操作数的值相加 |

    | - | 减法 | 从左操作数的值中减去右操作数的值 |

    | * | 乘法 | 将左操作数和右操作数的值相乘 |

    | / | 除法 | 将左操作数的值除以右操作数 |

    | ** | 指数 | 执行指数计算 |

    | % | 取模 | 返回左操作数除以右操作数后的余数 |


    加法、减法、乘法和除法是最基本的运算符，通过输入以下表达式来调用：


    加法：


    ```

    >>> 1 + 3

    4

    ```


    减法：


    ```

    >>> 10 - 4

    6

    ```


    乘法：


    ```

    >>> 4 * 2

    8

    ```


    除法：


    ```

    >>> 10 / 2

    5.0

    ```


    ### 指数


    指数计算通过将第一个数字提升到由 ** 运算符后的数字定义的幂来调用：


    ```

    >>> 2**3  # 2 raised to the power of 3

    8

    ```


    ### 取模


    取模运算符在执行除法后给出余数：


    ```

    >>> 17 % 5

    2

    ```


    ### 整除


    另一方面，整除在移除小数部分后返回商：


    ```

    >>> 17 // 5

    3

    ```


