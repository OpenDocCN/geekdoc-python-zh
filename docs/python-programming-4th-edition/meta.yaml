  - '[PAGE 369]


    # COMMIT Operation


    Commit is the operation, which gives a green signal to database to finalize the
    changes, and after this operation, no change can be reverted back.


    Here is a simple example to call **commit** method.


    ```

    db.commit()

    ```


    # ROLLBACK Operation


    If you are not satisfied with one or more of the changes and you want to revert
    back those changes completely, then use **rollback()** method.


    Here is a simple example to call **rollback()** method.


    ```

    db.rollback()

    ```


    # Disconnecting Database


    To disconnect Database connection, use close() method.


    ```

    db.close()

    ```


    If the connection to a database is closed by the user with the close() method,
    any outstanding transactions are rolled back by the DB. However, instead of depending
    on any of DB lower level implementation details, your application would be better
    off calling commit or rollback explicitly.


