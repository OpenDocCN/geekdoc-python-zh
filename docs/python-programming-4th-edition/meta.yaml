    can type or edit your code. Initially, this file window is named untitled but
    its name will soon change as you save your code.


    The windows menu bar varies only slightly with the Shell Window. It doesn''t have
    the Shell and Debug menu found in the Shell Window but it introduces two new menus:
    the Run and the Format menu. When you choose to Run your code on the file window,
    you can see the output on the Shell Window.


    ### The Script Mode


