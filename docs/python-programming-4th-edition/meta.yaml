    可以使用 `append()` 方法将项目添加到列表中。可以使用 `pop()` 方法从列表中移除最后一个项目，无需向其传递任何索引。


    ```

    >>> stack = [''a'',''b'',''c'',''d'']

    >>> stack.append(''e'')

    >>> stack.append(''f'')

    >>> stack

    [''a'', ''b'', ''c'', ''d'', ''e'', ''f'']

    >>> stack.pop()

    ''f''

    >>> stack

    [''a'', ''b'', ''c'', ''d'', ''e'']

    ```


