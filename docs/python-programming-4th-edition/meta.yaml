    # Semantics


    Object-oriented programming focuses software design and implementation around
    the definitions of and interactions between individual objects. An object is said
    to *encapsulate* a state of being and a set of behaviors; it is both data and
    processing. Each instance of a class has individual copies of attributes which
    are tightly coupled with the class-wide operations. We can understand objects
    by looking at four features, adapted from [Rumbaugh91].


    **Identity.** Each object is unique and is distinguishable from all other objects.
    In the real world, two otherwise identical coffee cups can be distinguished as
    distinct objects. For example, they occupy different locations on our desk. In
    the world of a computers memory, objects could be identified by their address,
    which would make them unique.


    **Classification.** This is sometimes called *Encapsulation*. Objects with the
    same attributes and behavior belong to a common *class*. Each individual object
    has unique attribute values. We saw this when we looked at the various collection
    classes. Two different list objects have the same general structure, and the same
    behavior. Both lists respond to append(), pop(), and all of the other methods
    of a list. However, each list object has a unique sequence of values.


    **Inheritance.** A class can inherit methods from a parent class, reusing common
    features. A superclass is more general, a subclass overrides superclass features,
    and is more specific. With the built-in Python classes, we''ve looked at the ways
    in which all immutable sequences are alike.'
