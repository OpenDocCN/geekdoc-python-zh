  - '[PAGE 370]


    Connecting to Oracle databases from Python provides the ability to run essential
    SQL queries that can be utilized in geoprocessing tasks.

    Oracle database schemas can be accessed from Python programs using the cx_Oracle
    Python extension.

    **cx_Oracle** is a Python extension module that enables access to Oracle Database.
    It conforms to the Python database API 2.0 [specification](https://www.python.org/dev/peps/pep-0249/)
    with a considerable number of additions and a couple of exclusions.


    cx_Oracle 6 has been tested with Python version 2.7, and with versions 3.4 and
    higher. You can use cx_Oracle with Oracle 11.2, 12.1 and 12.2 client libraries.
    Oracle''s standard client-server version interoperability allows connection to
    both older and newer databases. For example Oracle 12.2 client libraries can connect
    to Oracle Database 11.2.


    Instructions provided describe how to connect to an Oracle database and run SQL
    queries from a Python script.


    # **Prerequisites**


