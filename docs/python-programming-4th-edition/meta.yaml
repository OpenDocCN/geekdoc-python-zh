    # Chapter 15


    # Text Files in Python


    Programs often deal with external data; data outside of volatile primary memory.
    This external data could be persistent data on a file system or transient data
    on an input-output device. Most operating systems provide a simple, uniform interface
    to external data via objects of the file class.


    In *File Semantics*, we provide an overview of the semantics of files. We cover
    the most important of Pythons built-in functions for working with files in *Built-in
    Functions*. Well review statements for dealing with files in *File Statements*.
    In *File Methods*, we describe some method functions of file objects.'
