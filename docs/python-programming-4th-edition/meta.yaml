    # Title bar


    The GUI window that Tkinter creates says Tk by default. Here is how to change
    it:

    root.title(''Your title'')


    # Disabling things


    Sometimes you want to disable a button so it cant be clicked. Buttons have an
    attribute state that allows you to disable the component. Use state=DISABLED to
    disable the button and state=NORMAL to enable it. Here is an example that creates
    a button that starts out disabled and then enables it:

    button=Button(text=''Hi'',state=DISABLED,command=function) button.configure(state=NORMAL)

    You can use the state attribute to disable many other types of components, too.


    # Getting the state of a component


    Sometimes, you need to know things about a component, like exactly what text is
    in it or what its background color is. The cget method is used for this. For example,
    the following gets the text of a label called label:

    label.cget(''text'')

    This can be used with buttons, canvases, etc., and it can be used with any of
    their properties, like bg, fg, state, etc. As a shortcut, Tkinter overrides the
    [] operators, so that label[''text''] accomplishes the same thing as the example
    above.


    # Message boxes'
