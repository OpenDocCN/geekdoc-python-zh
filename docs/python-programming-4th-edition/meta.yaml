    \n+   - **Atomicity** – Either a transaction completes or nothing happens at all.\n\
    - **Consistency** – A transaction must start in a consistent state and leave the\
    \ system in a consistent state.\n- **Isolation** – Intermediate results of a transaction\
    \ are not visible outside the current transaction.\n- **Durability** – Once a\
    \ transaction was committed, the effects are persistent, even after a system failure.\n\
