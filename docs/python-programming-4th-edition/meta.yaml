    # Functions and Namespaces


    This is an overview of how Python determines the meaning of a name. Well omit
    some details to hit the more important points. For more information, see section
    4.1 of the *Python Language Reference*.


    The important issue is that we want variables created in the body of a function
    to be private to that function. If all variables are global, then each function
    runs a risk of accidentally disturbing the value of a global variable. In the
    COBOL programming language (without using separate compilation or any of the modern
    extensions) all variables are globally declared in the data division, and great
    care is required to prevent accidental or unintended use of a variable.


    To achieve privacy and separation, Python maintains several dictionaries of variables.
    These dictionaries define the context in which a variable name is understood.
    Because these dictionaries are used for resolution of variables, which name objects,
    they are called *namespaces*. A global namespace is available to all modules that
    are part of the currently executing Python script. Each module, class, function,
    lambda, or anonymous block of code given to the **exec** command has its own private
    namespace.'
