- md: "## Customizing Objects\n\nPython allows you to customize your objects by defining\
    \ some methods with special names:\n\n## __init__ Method\n\n```python\ndef __init__(self,\
    \ parameters):\n    suite\n```\n\nThe parameters are as for ordinary functions,\
    \ and support all the variants: positional, default, keyword, etc. When a class\
    \ has an __init__ method, you pass parameters to the class when instantiating\
    \ it, and the __init__ method will be called with these parameters. Usually the\
    \ method will set various instance variables via self.\n\n```python\nclass cartesian:\n\
    \    def __init__(self, x=0, y=0):\n        self.x, self.y = x, y\n```\n\n## __del__\
    \ Method\n\n```python\ndef __del__(self):\n    suite\n```\n\nA __del__ method\
    \ is called when an object is deleted, which is when the garbage collector decides\
    \ that there are no more references to an object. Note that this is not necessarily\
    \ when the object is explicitly deleted with the del statement. The __del__ method\
    \ takes exactly one parameter, self. Due to a weirdness in the current C implementation\
    \ of Python, exceptions are ignored in __del__ methods: instead, an error will\
    \ be printed to standard error.\n\n## __repr__ Method\n\n```python\ndef __repr__(self):\n\
    \    suite\n```\n\nA __repr__ method takes exactly one parameter, self, and must\
    \ return a string. This string is intended to be a representation of the object,\
    \ suitable for display to the programmer, for instance when working in the interactive\
    \ interpreter. __repr__ will be called anytime the builtin repr function is applied\
    \ to an object; this function is also called when the backquote operator is used.\n\
    \n## __str__ Method\n\n```python\ndef __str__(self):\n    suite\n```\n\nThe __str__\
    \ method is exactly like __repr__ except that it is called when the builtin str\
    \ function is applied to an object; this function is also called for the %s escape\
    \ of the % operator. In general, the string returned by __str__ is meant for the\
    \ user of an application to see, while the string returned by __repr__ is meant\
    \ for the programmer to see, as in debugging and development: but there are no\
    \ hard and fast rules about this. You're best off just thinking, __str__ for %s,\
    \ __repr__ for backquotes.\n\n## Further topics\n\nSpecial methods We have seen\
    \ two special methods already, the constructor __init__ and the method __str__\
    \ which determines what your objects look like when printed. There are many others.\
    \ For instance, there is __add__ that allows your object to use the + operator.\
    \ There are special methods for all the Python operators. There is also a method\
    \ called __len__ which allows your object to work with the built in len function.\
    \ There is even a special method, __getitem__ that lets your program work with\
    \ list and string brackets [].\n\n**Copying objects** If you want to make a copy\
    \ of an object x, it is not enough to do the following:\n`x_copy = x`\nInstead,\
    \ do the following:\n`from copy import copy`\n`x_copy = copy(x)`\n\nKeeping your\
    \ code in multiple files If you want to reuse a class in several programs, you\
    \ do not have to copy and paste the code into each. You can save it in a file\
    \ and use an import statement to import it into your programs. The file will need\
    \ to be somewhere your program can find it, like in the same directory.\n`from\
    \ analyzer import Analyzer`\n\n## Polymorphism\n\nPolymorphism exists when we\
    \ define a number of subclasses which have commonly named methods. A function\
    \ can use objects of any of the polymorphic classes without being aware that the\
    \ classes are distinct.\n\nIn some languages, it is essential that the polymorphic\
    \ classes have the same interface (or be subinterfaces of a common parent interface),\
    \ or be subclasses of a common superclass. This is sometimes called strong, hierarchical\
    \ typing, since the type rules are very rigid and follow the subclass/subinterface\
    \ hierarchy.\n\n## Built-in Functions\n\nThere are two built in functions of some\
    \ importance to object oriented programming. These are used to determine the class\
    \ of an object, as well as the inheritance hierarchy among classes.\n\n**isinstance**(*object*,\
    \ *type*)\n    True if *object* is an instance of the given type or any of the\
    \ subclasses of type.\n\n**issubclass**(*parameter*, *base*)\n    True if class\
    \ class is a subclass of class base.\n    This question is usually moot, because\
    \ most programs are designed to provide the expected classes of objects. There\
    \ are some occasions for deep paranoia; when working with untrusted software,\
    \ your classes may need to be sure that other programmers are following the rules.\
    \ In Java and C++, the compiler can check these situations. In Python, the compiler\
    \ doesn't check this, so we may want to include run-time checks.\n\n**super**(*type*)\n\
    \    This will return the superclass of the given type.\n\nAll of the basic factory\
    \ functions (str, int, float, long, complex, unicode, tuple, list, dict, set)\
    \ are effectively class names. You can, therefore, use a test like isinstance(\
    \ myParam ,int) to confirm that the argument value provided to this parameter\
    \ is an integer.\n\nAn additional class, basestring is the parent class of both\
    \ str and unicode.\n\n## Exercises\n\n1. Write a class called Investment with\
    \ fields called principal and interest. The constructor should set the values\
    \ of those fields. There should be a method called value_after that returns the\
    \ value of the investment after $n$ years. The formula for this is $p(1 + i)^n$,\
    \ where $p$ is the principal, and $i$ is the interest rate. It should also use\
    \ the special method `__str__` so that printing the object will result in something\
    \ like below:\nPrincipal - $1000.00, Interest rate - 5.12%\n\n2. Write a class\
    \ called Product. The class should have fields called name, amount, and price,\
    \ holding the products name, the number of items of that product in stock, and\
    \ the regular price of the product. There should be a method get_price that receives\
    \ the number of items to be bought and returns a the cost of buying that many\
    \ items, where the regular price is charged for orders of less than 10 items,\
    \ a 10% discount is applied for orders of between 10 and 99 items, and a 20% discount\
    \ is applied for orders of 100 or more items. There should also be a method called\
    \ make_purchase that receives the number of items to be bought and decreases amount\
    \ by that much.\n\n3. Write a class called Password_manager. The class should\
    \ have a list called old_passwords that holds all of the users past passwords.\
    \ The last item of the list is the users current password. There should be a method\
    \ called get_password that returns the current password and a method called set_password\
    \ that sets the users password. The set_password method should only change the\
    \ password if the attempted password is different from all the users past passwords.\
    \ Finally, create a method called is_correct that receives a string and returns\
    \ a boolean **True** or **False** depending on whether the string is equal to\
    \ the current password or not.\n\n4. Write a class called Time whose only field\
    \ is a time in seconds. It should have a method called convert_to_minutes that\
    \ returns a string of minutes and seconds formatted as in the following example:\
    \ if seconds is 230, the method should return '5:50'. It should also have a method\
    \ called convert_to_hours that returns a string of hours, minutes, and seconds\
    \ formatted analogously to the previous method.\n\n# Chapter 13\n\n## Exceptions\n\
    \nA Python program terminates as soon as it encounters an error. In Python, an\
    \ error can be a syntax error or an exception. In this chapter, you will see what\
    \ an exception is and how it differs from a syntax error. After that, you will\
    \ learn about raising exceptions. Then, you'll finish with a demonstration of\
    \ the try and except block."
