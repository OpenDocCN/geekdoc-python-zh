    This time however, IDLE''s editing menu allows you to scroll back to your previous
    commands, cut, copy, and paste previous statements and make modifications. IDLE
    is quite a leap from the command line interaction.


    The Python Shell window has the following menu items: File, Edit, Shell, Debug,
    Options, Windows, and Help.


    ![](img/e3dac7e08bdd357a94774b55d90b82a8_42_0.png)


    The Shell and Debug menus provide capabilities you would find useful when creating
    larger programs.


    The **Shell** menu allows you to restart the shell or search the shell''s log
    to find the most recent reset.

    The **Debug** Menu has useful menu items for tracing the source file of an exception
    and highlighting the erring line. The Debugger option will usher in an interactive
    debugger window that will allow you to step through the running program. The Stack
    Viewer option displays the current Python stack through a new window.


    The **Options** menu allows you to configure IDLE to suit your Python working
    preferences.


    The **Help** menu opens Python Help and documentation.


    ### The **File** Menu


    The items on the File menu allows you to create a new file, open an old file,
