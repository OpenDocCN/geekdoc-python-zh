    \n## exception EnvironmentError\n\nBase class for errors that are input-output\
    \ or operating system related. This is the generic exception class that includes\
    \ IOError and OSError.\n\n## exception LookupError\n\nBase class for lookup errors\
    \ in sequences or mappings, it includes IndexError and KeyError.\n\n## A Digression\n\
    \nReaders with experience in other programming languages may equate an exception\
    \ with a kind of **goto** statement. It changes the normal course of execution\
    \ to a (possibly hard to find) exception-handling suite. This is a correct description\
    \ of the construct, which leads to some difficult decision-making.\n\nSome exception-causing\
