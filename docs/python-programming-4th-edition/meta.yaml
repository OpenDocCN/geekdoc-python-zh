  md: '**Ordinary Functions** - Functions which follow the classic mathematical definitions
    will map input argument values to a resulting value. These are, perhaps, a common
    kind of function. They include a **return** statement to express the resulting
    value.


    **Procedure Functions** - One common kind of function is one that doesnt return
    a result, but instead carries out some procedure. This function would omit any
    **return** statement. Or, if a **return** statement is used to exit from the function,
    the statement would have no value to return.

    Carrying out an action is sometimes termed a side-e ect of the function. The primary
    e ect is always the value returned.


    **Factory Functions** Another common form is a function that doesnt take a parameter.
    This function is a factory which generates a value.


    **Generators**. A generator function contains the **yield** statement. These functions
    look like conventional functions, but they have a di erent purpose in Python.
    We will examine this in detail in *Iterators and Generators*.


    These functions have a persistent internal processing state; ordinary functions
    cant keep data around from any previous calls without resorting to global variables.
    Further, these functions interact with the **for** statement. Finally, these functions
    dont make a lot of sense until weve worked with sequences in *Sequences: Strings,
