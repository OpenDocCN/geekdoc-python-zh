    \ through how to use sqlite3 to read data into dataframe from sqlite table with\
    \ the pandas package. We'll be using Python 3.5, but this same approach should\
    \ work with Python 2. All of the data is in a SQLite database called flights.db,\
    \ which contains table-- airlines. Here are two rows from the airlines table:\n\
    \n| Id | Name | Country | Active |\n|---|---|---|---|\n| 11 | 4D Air | Thailand\
    \ | Y |\n| 12 | 611897 Alberta Limited | Canada | N |\n\n## Reading results into\
