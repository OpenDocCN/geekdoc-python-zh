    # Chapter 13


    # Exceptions


    A Python program terminates as soon as it encounters an error. In Python, an error
    can be a syntax error or an exception. In this chapter, you will see what an exception
    is and how it differs from a syntax error. After that, you will learn about raising
    exceptions. Then, youll finish with a demonstration of the try and except block.'
- md: "## Exceptions versus Syntax Errors\n\nSyntax errors occur when the parser detects\
    \ an incorrect statement. Observe the following example:\n\n```\n>>> print( 0\
    \ / 0 ))\nFile \"<stdin>\", line 1\n    print( 0 / 0 ))\n          ^\nSyntaxError:\
    \ invalid syntax\n```\n\nThe arrow indicates where the parser ran into the **syntax\
    \ error**. In this example, there was one bracket too many. Remove it and run\
    \ your code again:\n\n```\n>>> print( 0 / 0)\nTraceback (most recent call last):\n\
    \  File \"<stdin>\", line 1, in <module>\nZeroDivisionError: integer division\
    \ or modulo by zero\n```\n\nThis time, you ran into an **exception error**. This\
    \ type of error occurs whenever syntactically correct Python code results in an\
    \ error. The last line of the message indicated what type of exception error you\
    \ ran into. Instead of showing the message exception error, Python details what\
    \ type of exception error was encountered. In this case, it was a ZeroDivisionError.\
    \ Python comes with [various built-in exceptions](https://www.w3schools.com/python/python_ref_exceptions.asp)\
    \ as well as the possibility to create self-defined exceptions.\n\n## Raising\
    \ an Exception\n\nWe can use raise to throw an exception if a condition occurs.\
    \ The statement can be complemented with a custom exception.\n\nIf you want to\
    \ throw an error when a certain condition occurs using raise, you could go about\
    \ it like this:\n\n```python\nx = 100\nif x > 50:\n    raise Exception('x should\
    \ not exceed 50. The value of x was: {}'.format(x))\n```\n\nWhen you run this\
    \ code, the output will be the following:\n\n```\nTraceback (most recent call\
    \ last):\n  File \"<input>\", line 4, in <module>\nException: x should not exceed\
    \ 50. The value of x was: 100\n```\n\nThe program comes to a halt and displays\
    \ our exception to screen, offering clues about what went wrong.\n\n## Exception\
    \ Handling: The try and except Block\n\nThe try and except block in Python is\
    \ used to catch and handle exceptions. Python executes code following the try\
    \ statement as a normal part of the program. The code that follows the except\
    \ statement is the program's response to any exceptions in the preceding try clause.\n\
    \nAs you saw earlier, when syntactically correct code runs into an error, Python\
    \ will throw an exception error. This exception error will crash the program if\
    \ it is unhandled. The except clause determines how your program responds to exceptions.\n\
    \nThe following function can help you understand the try and except block:\n\n\
    ```python\ndef discount():\n    a = 70 / 0\n    print(a)\n```\n\nThe `discount`\
    \ function will throw an exception. You can give the function a try using the\
    \ following code:\n\n```python\ntry:\n    discount()\nexcept:\n    pass\n```\n\
    \nThe way you handled the error here is by handing out a pass. If you were to\
    \ run this code, you would get nothing. The good thing here is that the program\
    \ did not crash. But it would be nice to see if some type of exception occurred\
    \ whenever you ran your code. To this end, you can change the pass into something\
    \ that would generate an informative message, like so:\n\n```python\ntry:\n  \
    \  discount()\nexcept:\n    print('Divide by zero exception')\n```\n\nWhen an\
    \ exception occurs in a program running this function, the program will continue\
    \ as well as inform you about the fact that the function call was not successful.\n\
    \nWhat you did not get to see was the type of error that was thrown as a result\
    \ of the function call. In order to see exactly what went wrong, you would need\
    \ to catch the error that the function threw.\n\nHere's another example where\
    \ you open a file and use a built-in exception:\n\n```python\ntry:\n    with open('myfile.log')\
    \ as file:\n        read_data = file.read()\nexcept:\n    print('Could not open\
    \ file.log')\n```\n\nIf *myfile.log* does not exist, this block of code will output\
    \ the following:\n\n```\nCould not open myfile.log\n```\n\nThis is an informative\
    \ message, and our program will still continue to run. In the [Python docs](https://docs.python.org/3/library/exceptions.html),\
    \ you can see that there are a lot of built-in exceptions that you can use here.\
    \ One exception described on that page is the following:\n\n**Exception FileNotFoundError**\n\
    Raised when a file or directory is requested but doesn't exist. Corresponds to\
    \ errno ENOENT.\n\nTo catch this type of exception and print it to screen, you\
    \ could use the following code:\n\n```python\ntry:\n    with open('myfile.log')\
    \ as file:\n        read_data = file.read()\nexcept FileNotFoundError as fnf_error:\n\
    \    print(fnf_error)\n```\n\nIn this case, if *myfile.log* does not exist, the\
    \ output will be the following:\n\n```\n[Errno 2] No such file or directory: 'myfile.log'\n\
    ```\n\nYou can have more than one function call in your try clause and anticipate\
    \ catching various exceptions. A thing to note here is that the code in the try\
    \ clause will stop as soon as an exception is encountered.\n\n> **Warning:** Catching\
    \ Exception hides all errors—even those which are completely unexpected. This\
    \ is why you should avoid bare except clauses in your Python programs. Instead,\
    \ you'll want to refer to *specific exception classes* you want to catch and handle.\
    \ You can learn more about why this is a good idea [in this tutorial](https://realpython.com/python-exceptions/).\n\
    \nLook at the following code. Here, you first call the `linux_interaction()` function\
    \ and then try to open a file:\n\n```python\ntry:\n    discount()\n    with open('file.log')\
    \ as file:\n        read_data = file.read()\nexcept FileNotFoundError as fnf_error:\n\
    \    print(fnf_error)\nexcept Exception as error:\n    print(error)\n```\n\nHere\
    \ are the key takeaways:\n\n- A try clause is executed up until the point where\
    \ the first exception is encountered.\n- Inside the except clause, or the exception\
    \ handler, you determine how the program responds to the exception.\n- You can\
    \ anticipate multiple exceptions and differentiate how the program should respond\
    \ to them.\n- [Avoid using bare except clauses.](https://realpython.com)\n\n##\
    \ The else Clause\n\nIn Python, using the else statement, you can instruct a program\
    \ to execute a certain block of code only in the absence of exceptions.\n\nLook\
    \ at the following example:\n\n```python\ntry:\n    linux_interaction()\nexcept\
    \ AssertionError as error:\n    print(error)\nelse:\n    print('Executing the\
    \ else clause.')\n```\n\nIf you were to run this code on a Linux system, the output\
    \ would be the following:\n\n```\nDoing something.\nExecuting the else clause.\n\
    ```\n\nBecause the program did not run into any exceptions, the else clause was\
    \ executed.\n\nYou can also try to run code inside the else clause and catch possible\
    \ exceptions there as well:\n\n```python\ntry:\n    linux_interaction()\nexcept\
    \ AssertionError as error:\n    print(error)\nelse:\n    try:\n        with open('file.log')\
    \ as file:\n            read_data = file.read()\n    except FileNotFoundError\
    \ as fnf_error:\n        print(fnf_error)\n```\n\nIf you were to execute this\
    \ code on a Linux machine, you would get the following result:\n\n```\nDoing something.\n\
    [Errno 2] No such file or directory: 'file.log'\n```\n\nFrom the output, you can\
    \ see that the `linux_interaction()` function ran. Because no exceptions were\
    \ encountered, an attempt to open `file.log` was made. That file did not exist,\
    \ and instead of opening the file, you caught the FileNotFoundError exception.\n\
    \n## Cleaning Up After Using finally\n\nImagine that you always had to implement\
    \ some sort of action to clean up after executing your code. Python enables you\
    \ to do so using the finally clause.\n\nHave a look at the following example:\n\
    \n```python\ntry:\n    linux_interaction()\nexcept AssertionError as error:\n\
    \    print(error)\nelse:\n    try:\n        with open('file.log') as file:\n \
    \           read_data = file.read()\n    except FileNotFoundError as fnf_error:\n\
    \        print(fnf_error)\nfinally:\n    print('Cleaning up, irrespective of any\
    \ exceptions.')\n```\n\nIn the previous code, everything in the finally clause\
    \ will be executed. It does not matter if you encounter an exception somewhere\
    \ in the try or else clauses. Running the previous code on a Windows machine would\
    \ output the following:\n\n```\nFunction can only run on Linux systems.\nCleaning\
    \ up, irrespective of any exceptions.\n```\n\n## Built-in Exceptions\n\nThe following\
    \ exceptions are part of the Python environment. There are three broad categories\
    \ of exceptions.\n\n- Non-error Exceptions. These are exceptions that define events\
    \ and change the sequence of execution.\n- Run-time Errors. These exceptions can\
    \ occur in the normal course of events, and indicate typical program problems."
