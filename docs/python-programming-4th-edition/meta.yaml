    \n## Python Pandas - Panel\n\n**Panel** 是一个三维的数据容器。术语 **Panel data** 源自计量经济学，并且部分归功于pandas这个名字\
    \ – **pan(el)-da(ta)-s**。\n三个轴的名称旨在为描述涉及panel数据的操作提供一些语义含义。它们是 –\n\n- **items**\
