- md: "## Ordinary Functions\nFunctions which follow the classic mathematical definitions\
    \ will map input argument values to a resulting value. These are, perhaps, a common\
    \ kind of function. They include a **return** statement to express the resulting\
    \ value.\n\n**Procedure Functions** - One common kind of function is one that\
    \ doesn't return a result, but instead carries out some procedure. This function\
    \ would omit any **return** statement. Or, if a **return** statement is used to\
    \ exit from the function, the statement would have no value to return.\nCarrying\
    \ out an action is sometimes termed a side effect of the function. The primary\
    \ effect is always the value returned.\n\n**Factory Functions** Another common\
    \ form is a function that doesn't take a parameter. This function is a factory\
    \ which generates a value.\n\n**Generators**. A generator function contains the\
    \ **yield** statement. These functions look like conventional functions, but they\
    \ have a different purpose in Python. We will examine this in detail in *Iterators\
    \ and Generators*.\n\nThese functions have a persistent internal processing state;\
    \ ordinary functions can't keep data around from any previous calls without resorting\
    \ to global variables. Further, these functions interact with the **for** statement.\
    \ Finally, these functions don't make a lot of sense until we've worked with sequences\
    \ in *Sequences: Strings, Tuples and Lists*.\n\n## Function Definition\nFunctions\
    \ are defined with the def statement. The statement ends with a colon, and the\
    \ code that is part of the function is indented below the def statement. Here\
    \ we create a simple function that just prints something.\n\n```\ndef print_hello():\n\
    \    print('Hello!!')\n\nprint_hello()\nprint('14567')\nprint_hello()\n```\n\n\
    Hello!!\n14567\nHello!!\n\nThe first two lines define the function. In the last\
    \ three lines we call the function twice.\n\nOne use for functions is if you are\
    \ using the same code over and over again in various parts of your program, you\
    \ can make your program shorter and easier to understand by putting the code in\
    \ a function. For example, suppose for some reason you need to print a box of\
    \ stars like the one below at several points in your program.\n\n*************\n\
