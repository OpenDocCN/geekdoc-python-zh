    \ all of the letter buttons into one large component. The code is shown below:\n\
    \n```\nfrom tkinter import *\nalphabet = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ'\nroot =\
    \ Tk()\nbutton_frame = Frame()\nbuttons = [0]*26\nfor i in range(26):\n    buttons[i]\
    \ = Button(button_frame, text=alphabet[i])\n    buttons[i].grid(row=0, column=i)\n\
    ok_button = Button(text='Ok', font=('Verdana', 24))\nbutton_frame.grid(row=0,\
    \ column=0)\nok_button.grid(row=1, column=0)\nmainloop()\n```\n\nTo create a frame,\
    \ we use Frame() and give it a name. Then, for any components we want include\
    \ in the frame, we include the name of the frame as the first argument in the\
    \ components declaration. We still have to grid the components, but now the rows\
    \ and columns will be relative to the frame. Finally, we have to grid the frame\
    \ itself.\n\n# Colors"
- md: "Tkinter defines many common color names, like 'yellow' and 'red'. It also provides\
    \ a way to get access to millions of more colors. We first try to understand how\
    \ colors are displayed on the screen.\nEach color is broken into three components:\n\
    a red,\na green,\nand a blue component.\nEach component can have a value from\
    \ 0 to 255, with 255 being the full amount of that color. Equal parts of red and\
    \ green create shades of yellow, equal parts of red and blue create shades of\
    \ purple, and equal parts of blue and green create shades of turquoise. Equal\
    \ parts of all three create shades of gray. Black is when all three components\
    \ have values of 0 and white is when all three components have values of 255.\
    \ Varying the values of the components can produce up to 256^3 = 16 million colors.\
    \ There are a number of resources on the web that allow you to vary the amounts\
    \ of the components and see what color is produced.\n\nTo use colors in Tkinter\
    \ is easy, but with one catch: component values are given in hexadecimal. Hexadecimal\
    \ is a base 16 number system, where the letters A-F are used to represent the\
    \ digits 10 through 15. It was widely used in the early days of computing, and\
    \ it is still used here and there. Here is a table comparing the two number bases:\n\
    \n| Decimal | Hex | Decimal | Hex | Decimal | Hex | Decimal | Hex |\n|---|---|---|---|---|---|---|---|\n\
    | 0 | 0 | 8 | 8 | 16 | 10 | 80 | 50 |\n| 1 | 1 | 9 | 9 | 17 | 11 | 100 | 64 |\n\
    | 2 | 2 | 10 | A | 18 | 12 | 128 | 80 |\n| 3 | 3 | 11 | B | 31 | 1F | 160 | A0\
    \ |\n| 4 | 4 | 12 | C | 32 | 20 | 200 | C8 |\n| 5 | 5 | 13 | D | 33 | 21 | 254\
    \ | FE |\n| 6 | 6 | 14 | E | 48 | 30 | 255 | FF |\n| 7 | 7 | 15 | F | 64 | 40\
    \ | 256 | 100 |\n\nBecause the color component values run from 0 to 255, they\
    \ will run from 0 to FF in hexadecimal, and thus are described by two hex digits.\
    \ A typical color in Tkinter is specified like this: '#A202FF'. The color name\
    \ is prefaced with a pound sign. Then the first two digits are the red component\
    \ (in this case A2, which is 162 in decimal). The next two digits specify the\
    \ green component (here 02, which is 2 in decimal), and the last two digits specify\
    \ the blue component (here FF, which is 255 in decimal).\nlabel = Label(text='Hi',\
    \ bg='#A202FF')\n\nIf you would rather not bother with hexadecimal, you can use\
    \ the following function which will convert percentages into the hex string that\
    \ Tkinter uses.\n\n```\ndef color_convert(r, g, b):\n    return '#{:02x}{:02x}{:02x}'.format(int(r*2.55),\
    \ int(g*2.55), int(b*2.55))\n```\n\nExample of it to create a background color\
    \ that has 10% of the red component, 85% of green and 60% of blue.\nlabel = Label(text='Hi',\
    \ bg=color_convert(10, 85, 60))\n\n## Images\n\nLabels and buttons can display\
    \ images instead of text. To use an image requires a little set-up work. We first\
    \ have to create a PhotoImage object and give it a name.\nExample:\ncat_image\
    \ = PhotoImage(file='cat.gif')\nHere are some examples of putting the image into\
    \ components:\n\nlabel = Label(image=cat_image)\nbutton = Button(image=cat_image,\
    \ command=cat_callback())\nYou can use the configure method to set or change an\
    \ image:\nlabel.configure(image=cat_image)\n\n**File types** One limitation of\
    \ Tkinter is the only common image file type it can use is GIF. If you would like\
    \ to use other types of files, one solution is to use the Python Imaging Library,\
    \ which will be discussed further.\n\n## Canvas component\n\nA canvas is a component\
    \ on which we can draw things like lines, circles, rectangles. We can also draw\
    \ text, images, and other components on it. It is a very versatile component,\
    \ though we will only describe the basics here.\n\n**Creating canvases** The following\
    \ line creates a canvas with a white background that is 200 x 300 pixels in size:\n\
    \n```\ncanvas = Canvas(width=200, height=300, bg='white')\n```\n\n**Rectangles**\
    \ The following code draws a red rectangle to the canvas:\n\n```\ncanvas.create_rectangle(20,100,30,180,\
    \ fill='blue')\n```\n\nSee the image below on the left. The first four arguments\
    \ specify the coordinates of where to place the rectangle on the canvas. The upper\
    \ left corner of the canvas is the origin, (0, 0). The upper left of the rectangle\
    \ is at (20, 100), and the lower right is at (30, 150). If were to leave off fill='red',\
    \ the result would be a rectangle with a black outline.\n\n![](img/e3dac7e08bdd357a94774b55d90b82a8_331_0.png)\n\
    \n![](img/e3dac7e08bdd357a94774b55d90b82a8_331_1.png)\n\n**Ovals and lines** Drawing\
    \ ovals and lines is similar. The image above on the right is created with the\
    \ following code:\n\n```\ncanvas.create_rectangle(20,100,70,180)\ncanvas.create_oval(20,100,70,180,\
    \ fill='red')\ncanvas.create_line(20,100,70,180, fill='green')\n```\n\nThe rectangle\
    \ is here to show that lines and ovals work similarly to rectangles. The first\
    \ two coordinates are the upper left and the second two are the lower right.\n\
    \nTo get a circle with radius r and center (x,y), we can create the following\
    \ function:\n**Def create_circle(x,y,r):** canvas.create_oval(x-r,y-r,x+r,y+r)\n\
    \n**Images** We can add images to a canvas. Here is an example:\ncat_image=PhotoImage(file='cat.gif')\n\
    canvas.create_image(50,50, image=cat_image)\nThe two coordinates are where the\
    \ center of the image should be.\n\n## Naming things, changing them, moving them,\
    \ and deleting them\n\nWe can give names to the things we draw on the canvas.\
    \ We can then use the name to refer to the object in case we want to move it or\
    \ remove it from the canvas. Here is an example where we create a rectangle, change\
    \ its color, move it, and then delete it:\nrect=canvas.create_rectangle(0,0,20,20)\n\
    canvas.itemconfigure(rect, fill='red')\ncanvas.coords(rect,40,40,60,60)\ncanvas.delete(rect)\n\
    \nThe coords method is used to move/resize an object and the delete method is\
    \ used to delete it. If you want to delete everything from the canvas, use the\
    \ following:\ncanvas.delete(ALL)\n\n## Check buttons and Radio buttons\n\n![](img/e3dac7e08bdd357a94774b55d90b82a8_333_0.png)\n\
    \nIn the image below, the top line shows a check button and the bottom line shows\
    \ a radio button.\n\n**Check buttons** The code for the above check button is:\n\
    show_totals = IntVar()\ncheck = Checkbutton(text='Show totals', var=show_total)\n\
    The one thing to note here is that we have to tie the check button to a variable,\
    \ and it cant be just any variable, it has to be a special kind of Tkinter variable,\
    \ called an IntVar. This variable, show_total, will be 0 when the check button\
    \ is unchecked and 1 when it is checked. To access the value of the variable,\
    \ you need to use its get method, like this:\nshow_total.get()\n\nWe can also\
    \ set the value of the variable using its set method. This will automatically\
    \ check or uncheck the check button on the screen. For instance, if you want the\
    \ above check button checked at the start of the program, do the following:\n\n\
    ```\nshow_total=IntVar()\nshow_total.set(1)\ncheck = Checkbutton(text='Show totals',\
    \ var=show_total)\n```\n\n**Radio buttons** Radio buttons work similarly. The\
    \ code for the radio buttons shown at the start of the section is:\n\n```\ncolor\
    \ = IntVar()\nredbutton = Radiobutton(text='Red', var=color, value=1)\ngreenbutton\
    \ = Radiobutton(text='Green', var=color, value=2)\nbluebutton = Radiobutton(text='Blue',\
    \ var=color, value=3)\n```\n\nThe value of the IntVar object color will be 1,\
    \ 2, or 3, depending on whether the left, middle, or right button is selected.\
    \ These values are controlled by the value option, specified when we create the\
    \ radio buttons.\n\n**Commands:** Both check buttons and radio buttons have a\
    \ command option, where you can set a callback function to run whenever the button\
    \ is selected or unselected.\n\n## Text component\n\nThe Text component is a bigger,\
    \ extended version of the Entry component. Here is an example of creating one:\n\
    \n```\ntextbox = Text(font=('Arial', 16), height=6, width=50)\n```\n\nThe component\
    \ will be 50 characters wide and 6 rows tall. You can still type past the sixth\
    \ row; the component will just display only six rows at a time, and you can use\
    \ the arrow keys to scroll.\nIf you want a scrollbar associated with the text\
    \ box you can use the ScrolledText component. Other than the scrollbar, ScrolledText\
    \ works more or less the same as Text. An example is of what it looks like is\
    \ shown below. To use the ScrolledText component, we will need the following import:\n\
    \n```\nfrom tkinter.scrolledtext import ScrolledText\n```\n\n![](img/e3dac7e08bdd357a94774b55d90b82a8_335_0.png)\n\
    \nHere are a few common commands:\n\n| Statement | Description |\n| :--- | :---\
    \ |\n| textbox.get(1.0,END) | returns the contents of the text box |"
  mdcn: "Tkinter 定义了许多常见的颜色名称，例如 'yellow' 和 'red'。它还提供了一种访问数百万种更多颜色的方法。我们首先尝试理解颜色在屏幕上是如何显示的。\n\
    每种颜色被分解为三个分量：\n一个红色分量，\n一个绿色分量，\n和一个蓝色分量。\n每个分量的值可以从 0 到 255，其中 255 表示该颜色的全量。等量的红色和绿色混合产生黄色色调，等量的红色和蓝色混合产生紫色色调，等量的蓝色和绿色混合产生青绿色调。三者等量混合产生灰色色调。当所有三个分量的值都为\
    \ 0 时是黑色，当所有三个分量的值都为 255 时是白色。改变分量的值可以产生多达 256^3 = 1600 万种颜色。网上有许多资源允许你调整分量的量并查看产生的颜色。\n\
    \n在 Tkinter 中使用颜色很容易，但有一个注意事项：分量值以十六进制给出。十六进制是一种以 16 为基数的数字系统，其中字母 A-F 用于表示数字\
    \ 10 到 15。它在计算机早期被广泛使用，现在仍偶尔使用。以下是两种数字基数的比较表：\n\n| 十进制 | 十六进制 | 十进制 | 十六进制 | 十进制\
    \ | 十六进制 | 十进制 | 十六进制 |\n|---|---|---|---|---|---|---|---|\n| 0 | 0 | 8 | 8 |\
    \ 16 | 10 | 80 | 50 |\n| 1 | 1 | 9 | 9 | 17 | 11 | 100 | 64 |\n| 2 | 2 | 10 |\
    \ A | 18 | 12 | 128 | 80 |\n| 3 | 3 | 11 | B | 31 | 1F | 160 | A0 |\n| 4 | 4 |\
    \ 12 | C | 32 | 20 | 200 | C8 |\n| 5 | 5 | 13 | D | 33 | 21 | 254 | FE |\n| 6\
    \ | 6 | 14 | E | 48 | 30 | 255 | FF |\n| 7 | 7 | 15 | F | 64 | 40 | 256 | 100\
    \ |\n\n因为颜色分量值范围是 0 到 255，所以在十六进制中它们的范围是 0 到 FF，因此由两个十六进制数字描述。Tkinter 中的典型颜色指定如下：'#A202FF'。颜色名称前有一个井号。然后前两位数字是红色分量（本例中为\
    \ A2，十进制为 162）。接下来的两位数字指定绿色分量（此处为 02，十进制为 2），最后两位数字指定蓝色分量（此处为 FF，十进制为 255）。\n\
    label = Label(text='Hi', bg='#A202FF')\n\n如果你不想处理十六进制，可以使用以下函数，它将百分比转换为 Tkinter\
    \ 使用的十六进制字符串。\n\n```\ndef color_convert(r, g, b):\n    return '#{:02x}{:02x}{:02x}'.format(int(r*2.55),\
    \ int(g*2.55), int(b*2.55))\n```\n\n创建一个背景色的示例，其中红色分量占 10%，绿色占 85%，蓝色占 60%。\n\
    label = Label(text='Hi', bg=color_convert(10, 85, 60))\n\n## 图像\n\n标签和按钮可以显示图像而不是文本。使用图像需要一些设置工作。我们首先必须创建一个\
    \ PhotoImage 对象并给它一个名称。\n示例：\ncat_image = PhotoImage(file='cat.gif')\n以下是将图像放入组件的一些示例：\n\
    \nlabel = Label(image=cat_image)\nbutton = Button(image=cat_image, command=cat_callback())\n\
    你可以使用 configure 方法来设置或更改图像：\nlabel.configure(image=cat_image)\n\n**文件类型** Tkinter\
    \ 的一个限制是它唯一能使用的常见图像文件类型是 GIF。如果你想使用其他类型的文件，一个解决方案是使用 Python Imaging Library，这将在后面进一步讨论。\n\
    \n## Canvas 组件\n\nCanvas 是一个我们可以在上面绘制线条、圆形、矩形等图形的组件。我们也可以在上面绘制文本、图像和其他组件。它是一个非常通用的组件，尽管我们这里只介绍基础知识。\n\
    \n**创建画布** 以下代码创建一个白色背景、尺寸为 200 x 300 像素的画布：\n\n```\ncanvas = Canvas(width=200,\
    \ height=300, bg='white')\n```\n\n**矩形** 以下代码在画布上绘制一个红色矩形：\n\n```\ncanvas.create_rectangle(20,100,30,180,\
    \ fill='blue')\n```\n\n参见下面左侧的图像。前四个参数指定矩形在画布上的放置坐标。画布的左上角是原点 (0, 0)。矩形的左上角在 (20,\
    \ 100)，右下角在 (30, 150)。如果省略 fill='red'，结果将是一个带有黑色轮廓的矩形。\n\n![](img/e3dac7e08bdd357a94774b55d90b82a8_331_0.png)\n\
    \n![](img/e3dac7e08bdd357a94774b55d90b82a8_331_1.png)\n\n**椭圆和线条** 绘制椭圆和线条类似。上面右侧的图像是用以下代码创建的：\n\
    \n```\ncanvas.create_rectangle(20,100,70,180)\ncanvas.create_oval(20,100,70,180,\
    \ fill='red')\ncanvas.create_line(20,100,70,180, fill='green')\n```\n\n这里的矩形是为了展示线条和椭圆的工作方式与矩形类似。前两个坐标是左上角，后两个是右下角。\n\
    \n要获得一个半径为 r、中心在 (x,y) 的圆，我们可以创建以下函数：\n**Def create_circle(x,y,r):** canvas.create_oval(x-r,y-r,x+r,y+r)\n\
    \n**图像** 我们可以向画布添加图像。这是一个示例：\ncat_image=PhotoImage(file='cat.gif')\ncanvas.create_image(50,50,\
    \ image=cat_image)\n这两个坐标是图像中心应该放置的位置。\n\n## 命名事物、更改它们、移动它们和删除它们\n\n我们可以给画布上绘制的事物命名。然后我们可以使用该名称来引用该对象，以便在需要移动它或将其从画布上移除时使用。以下是一个示例，我们创建一个矩形，更改其颜色，移动它，然后删除它：\n\
    rect=canvas.create_rectangle(0,0,20,20)\ncanvas.itemconfigure(rect, fill='red')\n\
    canvas.coords(rect,40,40,60,60)\ncanvas.delete(rect)\n\ncoords 方法用于移动/调整对象大小，delete\
    \ 方法用于删除它。如果你想从画布上删除所有内容，请使用以下命令：\ncanvas.delete(ALL)\n\n## 复选按钮和单选按钮\n\n![](img/e3dac7e08bdd357a94774b55d90b82a8_333_0.png)\n\
    \n在下面的图像中，顶行显示一个复选按钮，底行显示一个单选按钮。\n\n**复选按钮** 上面复选按钮的代码是：\nshow_totals = IntVar()\n\
    check = Checkbutton(text='Show totals', var=show_total)\n这里需要注意的一点是，我们必须将复选按钮与一个变量绑定，而且不能是任意变量，它必须是一种特殊类型的\
    \ Tkinter 变量，称为 IntVar。这个变量 show_total 在复选按钮未选中时为 0，选中时为 1。要访问变量的值，你需要使用其 get\
    \ 方法，如下所示：\nshow_total.get()\n\n我们也可以使用其 set 方法设置变量的值。这将自动在屏幕上选中或取消选中复选按钮。例如，如果你希望上述复选按钮在程序开始时被选中，请执行以下操作：\n\
    \n```\nshow_total=IntVar()\nshow_total.set(1)\ncheck = Checkbutton(text='Show\
    \ totals', var=show_total)\n```\n\n**单选按钮** 单选按钮的工作方式类似。本节开头显示的单选按钮的代码是：\n\n```\n\
    color = IntVar()\nredbutton = Radiobutton(text='Red', var=color, value=1)\ngreenbutton\
    \ = Radiobutton(text='Green', var=color, value=2)\nbluebutton = Radiobutton(text='Blue',\
    \ var=color, value=3)\n```\n\nIntVar 对象 color 的值将是 1、2 或 3，具体取决于选择的是左、中还是右按钮。这些值由\
    \ value 选项控制，在创建单选按钮时指定。\n\n**命令：** 复选按钮和单选按钮都有一个 command 选项，你可以在其中设置一个回调函数，每当按钮被选中或取消选中时运行。\n\
    \n## Text 组件\n\nText 组件是 Entry 组件的更大、扩展版本。以下是创建一个的示例：\n\n```\ntextbox = Text(font=('Arial',\
    \ 16), height=6, width=50)\n```\n\n该组件将宽 50 个字符，高 6 行。你仍然可以输入超过第六行；该组件一次只显示六行，你可以使用箭头键滚动。\n\
    如果你想让文本框关联一个滚动条，可以使用 ScrolledText 组件。除了滚动条之外，ScrolledText 的工作方式与 Text 大致相同。下面显示了它外观的一个示例。要使用\
    \ ScrolledText 组件，我们需要以下导入：\n\n```\nfrom tkinter.scrolledtext import ScrolledText\n\
    ```\n\n![](img/e3dac7e08bdd357a94774b55d90b82a8_335_0.png)\n\n以下是一些常用命令：\n\n|\
    \ 语句 | 描述 |\n| :--- | :--- |\n| textbox.get(1.0,END) | 返回文本框的内容 |"
