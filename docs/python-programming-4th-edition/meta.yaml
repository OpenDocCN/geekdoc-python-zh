    # Chapter 11


    # Useful Modules


    A module is a file containing Python definitions and statements. The file name
    is the module name with the suffix .py appended. Within a module, the modules
    name (as a string) is available as the value of the global variable __name__.


    Python contains hundreds of modules that do all sorts of tasks. There are also
    so many third-party modules available for download from the internet. We disscuse
    a few modules that we have found useful.


    # Importing modules


    There are different ways to import modules in Python which are as follows;


    ```

    from random import randint, choice from random

    import *

    import random

    ```'
  - '[PAGE 133]


    The first way imports just two functions from the module.


    The second way imports every function from the module. You should usually avoid
    doing this, as the module may contain some names that will interfere with your
    own variable names. For instance if your program uses a variable called sum and
    you import a module that contains a function called sum, there can be problems.
    Some modules, however, like tkinter, are fairly safe to import this way.


    The third way imports an entire module in a way that will not interfere with your
    variable names. To use a function from the module, preface it with random followed
    by a dot.

    For example: random.randint(1,10).


    # Changing module names


    The as keyword can be used to change the name that your program uses to refer
    to a module or things from a module. Here are three examples:


    ```

    import random as rnd

    from math import log as ln

    ```


    # Location


    Usually, import statements go at the beginning of the program, but there is no
    restriction. They can go anywhere as long as they come before the code that uses
    the module.


    # Getting help'
  - '[PAGE 134]


    To get help on a module (say the math module) at the Python shell, import it using
    the third way above. Then dir(math) gives a list of the functions and variables
    in the module, and help(math) will give you a rather long description of what
    everything does. To get help on a specific function, like log, type help(math.log).


    # math module


    The math module contains some common math functions that are as follows;


    | Function | Description |

    |---|---|

    | sin, cos, tan | trig functions |

    | asin, acos, atan | inverse trig functions |

    | tan2(y,x) | gives arctan( y=x) with proper sign behavior |

    | sinh, cosh, tanh | hyperbolic functions |

    | asinh, acosh, atanh | inverse hyperbolic functions |

    | log, log10 | natural log, log base 10 |

    | log1p | log(1+x), more accurate near 1 than log |

    | exp | exponential function $e^x$ |

    | degrees, radians | convert from radians to degrees or vice-versa |

    | floor | floor(x) is the greatest integer $\le$ x |'
  - '[PAGE 135]


    | ceil | ceil(x) is the least integer x |

    |---|---|

    | e, pi | the constants e and pi |

    | factorial | Factorial |

    | modf | returns a pair (fractional part, integer part) |

    | erf | the Error function |


    Note that the floor and int functions behave the same for positive numbers, but
    differently for negative numbers. For instance, floor(4.57) and int(4.57) both
    return the integer 4. However, floor(-4.57) returns -5, the greatest integer less
    than or equal to -4.57, while int(-4.57) returns -4, which is obtained by throwing
    away the decimal part of the number.


    # Time module


    The time module has some useful functions for dealing with time.


    # sleep


    The sleep function pauses your program for a specified amount of time (in seconds).
    For instance, to pause your program for 5 seconds or for 20 milliseconds, use
    the following:


    ```

    from time import sleep

    sleep(5)

    sleep(.02)

    ```'
  - '[PAGE 136]


    # Timing things


    The time function can be used to time things. Here is an example:


    ```

    from time import time

    start = time()

    # do some stuff

    print(''It took'', round(time()-start, 3), ''seconds.'')

    ```


    The resolution of the time() function is milliseconds on Windows and microseconds
    on Linux.

    The above example uses whole seconds. If you want millisecond resolution, use
    the following print statement:


    ```

    print(''{:.3f} seconds''.format(time()-start))

    ```


    You can use a little math on this to get minutes and hours. Here is an example:


    ```

    t = time()-start

    secs = t%60

    mins = t//60

    hours = mins//60

    ```


    When you call time(), you get a rather strange value like 1306372108.045. It is
    the number of seconds elapsed since January 1, 1970.


