    Till now, we looked at several methods of regular expression using a constant
    pattern (fixed characters). But, what if we do not have a constant search pattern
    and we want to return specific set of characters (defined by a rule) from a string?
    This can easily be solved by defining an expression with the help of pattern operators
    (meta and literal characters).


    ## What are the most commonly used operators?


    Regular expressions can specify patterns, not just fixed characters. Here are
    the most commonly used operators that helps to generate an expression to represent
    required characters in a string or file. It is commonly used in web scrapping
    and text mining to extract required information.


    | Operators | Description |

    |---|---|

    | Pattern | Description |

    | . | Matches with any single character except newline \n. |

    | ? | Match 0 or 1 occurrence of the pattern to its left |

    | + | 1 or more occurrences of the pattern to its left |

    | * | 0 or more occurrences of the pattern to its left |

    | \w | Matches with a alphanumeric character whereas \W (upper case W) matches
    non alphanumeric character. |

    | \d | Matches with digits [0-9] and \D (upper case D) matches with non-digits.
    |

    | \s | Matches with a single white space character (space, newline, return, tab,
    form) and \S (upper case S) matches any non-white space character. |

    | \b | boundary between word and non-word and \B is opposite of \b |

    | [..] | Matches any single character in a square bracket and [^..] matches any
    single character not in square bracket |

    | \ | It is used for special meaning characters like \. to match a period or \+
    for plus sign. |

    | ^ and $ | ^ and $ match the start or end of the string respectively |

    | {n,m} | Matches at least n and at most m occurrences of preceding expression
    if we write it as {,m} then it will return at least any minimum occurrence to
    max m preceding expression. |

    | a| b | Matches either a or b |

    | ( ) | Groups regular expressions and returns matched text |

    | \t, \n, \r | Matches tab, newline, return |


    Now, lets understand the pattern operators by looking at the below examples.


    ## Practical Examples of Regular Expressions


    ### Problem 1: Return the first word of a given string


    **Solution-1** Extract each character (using \w")


    ```

    import re

    result=re.findall(r''.'',''AM is largest Analytics community of India'')

    print result

    **Output:**

