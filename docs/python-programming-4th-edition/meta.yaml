    \ 风格的行优先数组，'F' 表示 FORTRAN 风格的列优先数组 |\n\n## 示例 1\n\n```\n# 包含五个零的数组。默认 dtype 为\
    \ float\nimport numpy as np\nx = np.zeros(5)\nprint x\n```\n\n输出如下：\n\n```\n[\
    \ 0. 0. 0. 0. 0.]\n```\n\n## 示例 2\n\n```\nimport numpy as np\nx = np.zeros((5,),\
    \ dtype = np.int)\nprint x\n```\n\n现在，输出将是：\n\n```\n[0 0 0 0 0]\n```\n\n## numpy.ones\n\
    \n返回一个指定大小和类型、用 1 填充的新数组。\n\n```\nnumpy.ones(shape, dtype = None, order = 'C')\n\
    ```\n\n构造函数接受以下参数。\n\n| 序号 | 参数与描述 |\n| :--- | :--- |\n| 1 | **Shape**<br>空数组的形状，为整数或整数元组\
    \ |\n| 2 | **Dtype**<br>期望的输出数据类型。可选 |\n| 3 | **Order**<br>'C' 表示 C 风格的行优先数组，'F'\
    \ 表示 FORTRAN 风格的列优先数组 |\n\n示例 1\n\n```\n# 包含五个 1 的数组。默认 dtype 为 float\nimport\
    \ numpy as np\nx = np.ones(5)\nprint x\n```\n\n输出如下：\n\n```\n[ 1. 1. 1. 1. 1.]\n\
    ```\n\n## 示例 2\n\n```\nimport numpy as np\nx = np.ones([2,2], dtype = int)\nprint\
    \ x\n```\n\n现在，输出将是：\n\n```\n[[1 1]\n [1 1]]\n```\n\n## 数据结构简介\n\nPandas 处理以下三种数据结构：\n\
    \n- Series\n- DataFrame\n- Panel\n\n这些数据结构构建在 NumPy 数组之上，这意味着它们速度很快。\n\n## 维度与描述\n\
    \n理解这些数据结构的最佳方式是，更高维度的数据结构是其低维度数据结构的容器。例如，DataFrame 是 Series 的容器，Panel 是 DataFrame\
    \ 的容器。\n\n| 数据结构 | 维度 | 描述 |\n| :--- | :--- | :--- |\n| Series | 1 | 一维带标签的同质数组，大小不可变。\
    \ |\n| Data Frames | 2 | 通用的二维带标签、大小可变的表格结构，列可能具有异构类型。 |\n| Panel | 3 | 通用的三维带标签、大小可变的数组。\
    \ |\n\n## Python Pandas - Series\n\nSeries 是一个一维带标签的数组，能够保存任何类型的数据（整数、字符串、浮点数、Python\
    \ 对象等）。轴标签统称为索引。\n\npandas.Series\n\n可以使用以下构造函数创建 pandas Series：\n\n```\npandas.Series(\
