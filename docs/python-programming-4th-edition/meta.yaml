    # # NumPy - Introduction


    NumPy is a Python package. It stands for ''Numerical Python''. It is a library
    consisting of multidimensional array objects and a collection of routines for
    processing of array.


    **Numeric**, the ancestor of NumPy, was developed by Jim Hugunin. Another package
    Numarray was also developed, having some additional functionalities. In 2005,
    Travis Oliphant created NumPy package by incorporating the features of Numarray
    into Numeric package. There are many contributors to this open source project.'
  - '[PAGE 263]


    # Operations using NumPy


    Using NumPy, a developer can perform the following operations –


    +   - Mathematical and logical operations on arrays.

    - Fourier transforms and routines for shape manipulation.

    - Operations related to linear algebra. NumPy has in-built functions for linear
    algebra and random number generation.


    # Customizing NumPy


    > Standard Python distribution doesn''t come bundled with NumPy module. If you
    install Anaconda Python package for Windows, Pandas will be installed by default
    with the following –


    Download and install **Anaconda** (from https://www.anaconda.com/download/ is
    a free Python distribution) for SciPy stack. it is also available for Linux and
    Mac. If you’re using Anaconda Python, your system should already have numpy and
    matplotlib installed.


    # NumPy - Ndarray Object


    The most important object defined in NumPy is an N-dimensional array type called
    **ndarray**. It describes the collection of items of the same type. Items in the
    collection can be accessed using a zero-based index. Every item in an ndarray
    takes the same size of block in the memory. Each element in ndarray is an object
    of data-type object (called **dtype**).'
