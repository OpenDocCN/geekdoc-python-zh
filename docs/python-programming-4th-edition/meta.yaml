    \ how to implement transactions. Here is again similar example –\n\n```python\n\
    # Prepare SQL query to DELETE required records\nsql = \"DELETE FROM EMPLOYEE WHERE\
    \ AGE > '%d'\" % (20)\ntry:\n    # Execute the SQL command\n    cursor.execute(sql)\n\
    \    # Commit your changes in the database\n    db.commit()\nexcept:\n    # Rollback\
    \ in case there is any error\n    db.rollback()\n```\n\n## COMMIT Operation\n\n\
    Commit is the operation, which gives a green signal to database to finalize the\
    \ changes, and after this operation, no change can be reverted back.\n\nHere is\
    \ a simple example to call **commit** method.\n\n```python\ndb.commit()\n```\n\
    \n## ROLLBACK Operation\n\nIf you are not satisfied with one or more of the changes\
