    \n```\nfrom tkinter import *\ndef callback():\n    label.configure(text='Button\
    \ clicked')\nroot = Tk()\nlabel = Label(text='Not clicked')\nbutton = Button(text='Click\
    \ me', command=callback)\nlabel.grid(row=0, column=0)\nbutton.grid(row=1, column=0)\n\
    mainloop()\n```\n\n程序启动时，标签显示 Click me。当按钮被点击时，回调函数 callback 被调用，将标签更改为显示 Button\
    \ clicked。\n\n![](img/e3dac7e08bdd357a94774b55d90b82a8_325_0.png)\n\n## lambda\
    \ 技巧\n\n有时我们希望向回调函数传递信息，例如，如果我们有几个按钮使用相同的回调函数，并且我们想告诉函数是哪个按钮被点击了。以下是一个示例，我们创建\
    \ 26 个按钮，每个字母一个。我们不使用 26 个单独的 Button() 语句和 26 个不同的函数，而是使用一个列表和一个函数。\n\n```\nfrom\
    \ tkinter import *\nalphabet = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ'\ndef callback(x):\n\
    \    label.configure(text='Button {} clicked'.format(alphabet[x]))\nroot = Tk()\n\
    label = Label()\nlabel.grid(row=1, column=0, columnspan=26)\nbuttons = [0]*26\
    \ # 创建一个列表来容纳 26 个按钮\nfor i in range(26):\n    buttons[i] = Button(text=alphabet[i],\n\
    \        command = lambda x=i: callback(x))\n    buttons[i].grid(row=0, column=i)\n\
    mainloop()\n```\n\n我们设置 buttons=[0]*26。这创建了一个包含 26 个元素的列表。创建列表的另一种方法是设置 buttons=[]\
    \ 并使用 append 方法。\n\n![](img/e3dac7e08bdd357a94774b55d90b82a8_326_0.png)\n\n我们使用一个回调函数，它有一个参数，指示哪个按钮被点击了。关于\
