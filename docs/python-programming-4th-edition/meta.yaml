    \ 64 位浮点数（实部和虚部）表示 |\n\nNumPy 数值类型是 `dtype`（数据类型）对象的实例，每个实例都有其独特的特性。这些数据类型可以作为\
    \ `np.bool_`、`np.float32` 等来使用。\n\n## 数据类型对象 (dtype)\n\n数据类型对象描述了与数组相对应的固定内存块的解释方式，取决于以下几个方面：\n\
    \n- 数据类型（整数、浮点数或 Python 对象）\n- 数据大小\n- 字节序（小端序或大端序）\n- 对于结构化类型，还包括字段名称、每个字段的数据类型以及每个字段占用的内存块部分。\n\
    - 如果数据类型是子数组，则还包括其形状和数据类型。\n\n字节序通过在数据类型前添加 `<` 或 `>` 来决定。`<` 表示编码为小端序（最低有效位存储在最小地址）。`>`\
    \ 表示编码为大端序（最高有效字节存储在最小地址）。\n\n`dtype` 对象使用以下语法构造：\n\n```\nnumpy.dtype(object,\
    \ align, copy)\n```\n\n参数如下：\n\n- **Object** – 要转换为数据类型对象的对象\n- **Align** – 如果为\
    \ true，则向字段添加填充，使其类似于 C 结构体\n- **Copy** – 创建 `dtype` 对象的新副本。如果为 false，则结果是对内置数据类型对象的引用\n\
    \n## 示例 1\n\n```\n# 使用数组标量类型\nimport numpy as np\ndt = np.dtype(np.int32)\nprint\
    \ dt\n```\n\n输出如下：\n\n```\nint32\n```\n\n## 示例 2\n\n```\n# int8, int16, int32,\
