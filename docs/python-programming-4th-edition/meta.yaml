- md: "## Create a Series from ndarray\n\nIf data is an ndarray, then index passed\
    \ must be of the same length. If no index is passed, then by default index will\
    \ be **range(n)** where **n** is array length, i.e., [0,1,2,3.... **range(len(array))-1**].\n\
    \n### Example 1\n\n```python\n#import the pandas library and aliasing as pd\n\
    import pandas as pd\nimport numpy as np\ndata = np.array(['a','j','i','t'])\n\
    s = pd.Series(data)\nprint s\n```\n\nIts **output** is as follows –\n\n```\n0\
    \  a\n1  j\n2  i\n3  t\ndtype: object\n```\n\nWe did not pass any index, so by\
    \ default, it assigned the indexes ranging from 0 to **len(data)-1**, i.e., 0\
    \ to 3.\n\n### Example 2\n\n```python\n#import the pandas library and aliasing\
    \ as pd\nimport pandas as pd\nimport numpy as np\ndata = np.array(['a','b','c','d'])\n\
    s = pd.Series(data,index=[10,11,12,13])\nprint s\n```\n\nIts **output** is as\
    \ follows –\n\n```\n10 a\n11 b\n12 c\n13 d\ndtype: object\n```\n\nWe passed the\
    \ index values here. Now we can see the customized indexed values in the output.\n\
    \n## Create a Series from dict\n\nA **dict** can be passed as input and if no\
    \ index is specified, then the dictionary keys are taken in a sorted order to\
    \ construct index. If **index** is passed, the values in data corresponding to\
    \ the labels in the index will be pulled out.\n\n### Example 1\n\n```python\n\
    #import the pandas library and aliasing as pd\nimport pandas as pd\nimport numpy\
    \ as np\ndata = {'a' : 0., 'b' : 1., 'c' : 2.}\ns = pd.Series(data)\nprint s\n\
    ```\n\nIts **output** is as follows –\n\n```\na 0.0\nb 1.0\nc 2.0\ndtype: float64\n\
    ```\n\n**Observe** – Dictionary keys are used to construct index.\n\n## Create\
    \ a Series from Scalar\n\nIf data is a scalar value, an index must be provided.\
    \ The value will be repeated to match the length of **index**.\n\n```python\n\
    #import the pandas library and aliasing as pd\nimport pandas as pd\nimport numpy\
    \ as np\ns = pd.Series(5, index=[0, 1, 2, 3])\nprint s\n```\n\nIts **output**\
    \ is as follows –\n\n```\n0  5\n1  5\n2  5\n3  5\ndtype: int64\n```\n\n## Accessing\
    \ Data from Series with Position\n\nData in the series can be accessed similar\
    \ to that in an **ndarray**.\n\n### Example 1\n\nRetrieve the first element. As\
    \ we already know, the counting starts from zero for the array, which means the\
    \ first element is stored at zeroth position and so on.\n\n```python\nimport pandas\
    \ as pd\ns = pd.Series([1,2,3,4,5],index = ['a','b','c','d','e'])\n#retrieve the\
    \ first element\nprint s[0]\n```\n\nIts **output** is as follows –\n\n```\n1\n\
    ```\n\n### Example 2\n\nRetrieve the first three elements in the Series. If a\
    \ : is inserted in front of it, all items from that index onwards will be extracted.\
    \ If two parameters (with : between them) is used, items between the two indexes\
    \ (not including the stop index).\n\n```python\nimport pandas as pd\ns = pd.Series([1,2,3,4,5],index\
