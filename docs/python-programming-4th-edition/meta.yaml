    \ will execute the same query that we just did, but it will return a DataFrame.\
    \ It has several advantages over the query we did above:\n\n- It automatically\
    \ reads in the names of the headers from the table.\n- It creates a DataFrame,\
    \ so we can quickly explore the data.\n\n```python\nimport pandas as pd\nimport\
    \ sqlite3\nconn = sqlite3.connect(\"flights.db\")\ndf = pd.read_sql_query(\"select\
