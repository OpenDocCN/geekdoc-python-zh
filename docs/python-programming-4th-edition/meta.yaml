- md: "## Chapter 11\n\n## Useful Modules\n\nA module is a file containing Python\
    \ definitions and statements. The file name is the module name with the suffix\
    \ .py appended. Within a module, the module's name (as a string) is available\
    \ as the value of the global variable `__name__`.\n\nPython contains hundreds\
    \ of modules that do all sorts of tasks. There are also so many third-party modules\
    \ available for download from the internet. We discuss a few modules that we have\
    \ found useful.\n\n## Importing modules\n\nThere are different ways to import\
    \ modules in Python which are as follows:\n\n```python\nfrom random import randint,\
    \ choice\nfrom random import *\nimport random\n```\n\nThe first way imports just\
    \ two functions from the module.\n\nThe second way imports every function from\
    \ the module. You should usually avoid doing this, as the module may contain some\
    \ names that will interfere with your own variable names. For instance if your\
    \ program uses a variable called `sum` and you import a module that contains a\
    \ function called `sum`, there can be problems. Some modules, however, like `tkinter`,\
    \ are fairly safe to import this way.\n\nThe third way imports an entire module\
    \ in a way that will not interfere with your variable names. To use a function\
    \ from the module, preface it with `random` followed by a dot. For example: `random.randint(1,10)`.\n\
    \n## Changing module names\n\nThe `as` keyword can be used to change the name\
    \ that your program uses to refer to a module or things from a module. Here are\
    \ three examples:\n\n```python\nimport random as rnd\nfrom math import log as\
    \ ln\n```\n\n## Location\n\nUsually, import statements go at the beginning of\
    \ the program, but there is no restriction. They can go anywhere as long as they\
    \ come before the code that uses the module.\n\n## Getting help\n\nTo get help\
    \ on a module (say the `math` module) at the Python shell, import it using the\
    \ third way above. Then `dir(math)` gives a list of the functions and variables\
    \ in the module, and `help(math)` will give you a rather long description of what\
    \ everything does. To get help on a specific function, like `log`, type `help(math.log)`.\n\
    \n## math module\n\nThe `math` module contains some common math functions that\
    \ are as follows:\n\n| Function | Description |\n|---|---|\n| sin, cos, tan |\
    \ trig functions |\n| asin, acos, atan | inverse trig functions |\n| atan2(y,x)\
    \ | gives arctan(y/x) with proper sign behavior |\n| sinh, cosh, tanh | hyperbolic\
    \ functions |\n| asinh, acosh, atanh | inverse hyperbolic functions |\n| log,\
    \ log10 | natural log, log base 10 |\n| log1p | log(1+x), more accurate near 1\
    \ than log |\n| exp | exponential function $e^x$ |\n| degrees, radians | convert\
    \ from radians to degrees or vice-versa |\n| floor | floor(x) is the greatest\
    \ integer $\\le$ x |\n| ceil | ceil(x) is the least integer $\\ge$ x |\n| e, pi\
    \ | the constants e and pi |\n| factorial | Factorial |\n| modf | returns a pair\
    \ (fractional part, integer part) |\n| erf | the Error function |\n\nNote that\
    \ the `floor` and `int` functions behave the same for positive numbers, but differently\
    \ for negative numbers. For instance, `floor(4.57)` and `int(4.57)` both return\
    \ the integer 4. However, `floor(-4.57)` returns -5, the greatest integer less\
    \ than or equal to -4.57, while `int(-4.57)` returns -4, which is obtained by\
    \ throwing away the decimal part of the number.\n\n## Time module\n\nThe `time`\
    \ module has some useful functions for dealing with time.\n\n## sleep\n\nThe `sleep`\
    \ function pauses your program for a specified amount of time (in seconds). For\
    \ instance, to pause your program for 5 seconds or for 20 milliseconds, use the\
    \ following:\n\n```python\nfrom time import sleep\nsleep(5)\nsleep(.02)\n```\n\
    \n## Timing things\n\nThe `time` function can be used to time things. Here is\
    \ an example:\n\n```python\nfrom time import time\nstart = time()\n# do some stuff\n\
    print('It took', round(time()-start, 3), 'seconds.')\n```\n\nThe resolution of\
    \ the `time()` function is milliseconds on Windows and microseconds on Linux.\
    \ The above example uses whole seconds. If you want millisecond resolution, use\
    \ the following print statement:\n\n```python\nprint('{:.3f} seconds'.format(time()-start))\n\
    ```\n\nYou can use a little math on this to get minutes and hours. Here is an\
    \ example:\n\n```python\nt = time()-start\nsecs = t%60\nmins = t//60\nhours =\
    \ mins//60\n```\n\nWhen you call `time()`, you get a rather strange value like\
    \ 1306372108.045. It is the number of seconds elapsed since January 1, 1970.\n\
    \n## datetime modules\n\nThe module `datetime` allows us to work with dates and\
    \ times together. The following line creates a date-time object that contains\
    \ the current date and time:\n\n```python\nfrom datetime import datetime\nd =\
    \ datetime.now()\n```\n\nThe `datetime` object has attributes `year`, `month`,\
    \ `day`, `hour`, `minute`, `second`, and `microsecond`. Here is a short example:\n\
    \n```python\nd = datetime.now()\nprint('{:02d} {}/{}/{}'.format(d.hour, d.minute,\
    \ d.month, d.day, d.year))\n```\n\n9:38 22/6/2018\n\nThe hour is in 24-hour format.\
    \ To get 12-hour format, you can do the following:\n\n```python\nam_pm = 'am'\
    \ if d.hour<12 else 'pm'\nprint('{}:{}{}'.format(d.hour%12, d.minute, am_pm))\n\
    ```\n\nAn alternative way to display the date and time is to use the `strftime`\
    \ method. It uses a variety of formatting codes that allow you to display the\
    \ date and time, including information about the day of the week, am/pm, etc.\
    \ Here are some of the formatting codes:\n\n| Code | Description |\n| :--- | :---\
    \ |\n| %c | date and time formatted according to local conventions |\n| %x, %X\
    \ | %x is the date, and %X is the time, both formatted as with %c |\n| %d | day\
    \ of the month |\n| %j | day of the year |\n| %a, %A | weekday name (%a is the\
    \ abbreviated weekday name) |\n| %m | month (01-12) |\n| %b, %B | month name (%b\
    \ is the abbreviated month name) |\n| %y, %Y | year (%y is 2-digit, %Y is 4-digit)\
    \ |\n| %H, %I | hour (%H is 24-hour, %I is 12-hour) |\n| %p | am or pm |\n| %M\
    \ | minute |\n| %S | second |\n\nHere is an example:\n\n```python\nprint(d.strftime('%A\
    \ %x'))\n```\n\nTuesday 18/06/18\n\n## os module - Working with files and directories\n\
    \nThe `os` module and the submodule `os.path` contain functions for working with\
    \ files and directories.\n\n## Changing the directory\n\nWhen your program opens\
    \ a file, the file is assumed to be in the same directory as your program itself.\
    \ If not, you have to specify the directory, like below:\n\n```python\ns = open('c:/users/ajit/myfile.txt').read()\n\
    ```\n\nIf you have a lot of files that you need to read, all in the same directory,\
    \ you can use `os.chdir` to change the directory. Here is an example:\n\n```python\n\
    os.chdir('c:/users/tanweer/')\ns = open('myfile.txt').read()\n```\n\n## Getting\
    \ the current directory\n\nThe function `getcwd` returns the path of current directory.\
    \ It will be the directory your program is in or the directory you changed it\
    \ to with `chdir`.\n\n## Getting the files in a directory\n\nThe function `listdir`\
    \ returns a list of the entries in a directory, including all files and subdirectories.\
    \ If you just want the files and not the subdirectories or vice-versa, the `os.path`\
    \ module contains the functions `isfile` and `isdir` to tell if an entry is a\
    \ file or a directory. Here is an example that searches through all the files\
    \ in a directory and prints the names of those files that contain the word 'employee'.\n\
    \n```python\nimport os\ndirectory = 'c:/users/ajit/'\nfiles = os.listdir(directory)\n\
    for f in files:\n    if os.path.isfile(directory+f):\n        s = open(directory+f).read()\n\
    \        if 'employee' in s: print(f)\n```\n\n## Changing and deleting files\n\
    \nHere are a few useful functions.\n\n| Function | Description |\n| --- | ---\
    \ |\n| mkdir | create a directory |\n| rmdir | remove a directory |\n| remove\
    \ | delete a file |\n| rename | rename a file |\n\nThe first two functions take\
    \ a directory path as their only argument. The `remove` function takes a single\
    \ file name. The first argument of `rename` is the old name and the second argument\
    \ is the new name.\n\n## Copying files\n\nThere is no function in the `os` module\
    \ to copy files. Instead, use the `copy` function in the `shutil` module. Here\
    \ is an example that takes all the files in a directory and makes a copy of each,\
    \ with each copied file's name starting with \"Copy of\":\n\n```python\nimport\
    \ os\nimport shutil\ndirectory = 'c:/users/ajit/'\nfiles = os.listdir(directory)\n\
    \nfor f in files:\n    if os.path.isfile(directory+f):\n        shutil.copy(directory+f,\
    \ directory+'Copy of '+f)\n```\n\n## More with os.path\n\nThe `os.path` module\
    \ contains several more functions that are helpful for working with files and\
    \ directories. Different operating systems have different conventions for how\
    \ they handle paths, and the functions in"
  mdcn: "## 第11章\n\n## 常用模块\n\n模块是包含Python定义和语句的文件。文件名就是模块名加上后缀`.py`。在模块内部，模块的名称（作为字符串）可以通过全局变量`__name__`获取。\n\
    \nPython包含数百个模块，可以执行各种各样的任务。互联网上也有许多第三方模块可供下载。我们在这里讨论一些我们认为有用的模块。\n\n## 导入模块\n\
    \n在Python中导入模块有以下几种方式：\n\n```python\nfrom random import randint, choice\nfrom\
    \ random import *\nimport random\n```\n\n第一种方式仅从模块中导入两个函数。\n\n第二种方式导入模块中的所有函数。通常应该避免这样做，因为模块中可能包含一些会与你自己的变量名冲突的名称。例如，如果你的程序使用了一个名为`sum`的变量，而你导入了一个包含名为`sum`的函数的模块，就可能会出现问题。然而，有些模块，比如`tkinter`，以这种方式导入是相当安全的。\n\
    \n第三种方式导入整个模块，且不会干扰你的变量名。要使用模块中的函数，需要在函数名前加上`random`和一个点号。例如：`random.randint(1,10)`。\n\
    \n## 更改模块名称\n\n`as`关键字可用于更改程序中引用模块或模块内容的名称。以下是三个例子：\n\n```python\nimport random\
    \ as rnd\nfrom math import log as ln\n```\n\n## 位置\n\n通常，导入语句放在程序的开头，但没有限制。只要它们位于使用模块的代码之前，可以放在任何位置。\n\
    \n## 获取帮助\n\n要在Python shell中获取某个模块（比如`math`模块）的帮助，请使用上述第三种方式导入它。然后`dir(math)`会列出模块中的函数和变量，`help(math)`会给你一个相当长的描述，说明每个函数的作用。要获取特定函数（如`log`）的帮助，请输入`help(math.log)`。\n\
    \n## math模块\n\n`math`模块包含一些常用的数学函数，如下所示：\n\n| 函数 | 描述 |\n|---|---|\n| sin, cos,\
    \ tan | 三角函数 |\n| asin, acos, atan | 反三角函数 |\n| atan2(y,x) | 计算arctan(y/x)，并具有正确的符号行为\
    \ |\n| sinh, cosh, tanh | 双曲函数 |\n| asinh, acosh, atanh | 反双曲函数 |\n| log, log10\
    \ | 自然对数，以10为底的对数 |\n| log1p | log(1+x)，在x接近1时比log更精确 |\n| exp | 指数函数 $e^x$ |\n\
    | degrees, radians | 将弧度转换为度，或将度转换为弧度 |\n| floor | floor(x) 是小于等于 x 的最大整数 $\\\
    le$ x |\n| ceil | ceil(x) 是大于等于 x 的最小整数 $\\ge$ x |\n| e, pi | 常数 e 和 pi |\n| factorial\
    \ | 阶乘 |\n| modf | 返回一个元组（小数部分，整数部分） |\n| erf | 误差函数 |\n\n请注意，`floor`和`int`函数对正数的行为相同，但对负数的行为不同。例如，`floor(4.57)`和`int(4.57)`都返回整数4。然而，`floor(-4.57)`返回-5，即小于等于-4.57的最大整数，而`int(-4.57)`返回-4，这是通过舍弃数字的小数部分得到的。\n\
    \n## time模块\n\n`time`模块包含一些用于处理时间的有用函数。\n\n## sleep\n\n`sleep`函数会将你的程序暂停指定的时间（以秒为单位）。例如，要将程序暂停5秒或20毫秒，请使用以下代码：\n\
    \n```python\nfrom time import sleep\nsleep(5)\nsleep(.02)\n```\n\n## 计时\n\n`time`函数可用于对操作进行计时。以下是一个例子：\n\
    \n```python\nfrom time import time\nstart = time()\n# do some stuff\nprint('It\
    \ took', round(time()-start, 3), 'seconds.')\n```\n\n`time()`函数的分辨率在Windows上是毫秒，在Linux上是微秒。上面的例子使用的是整秒。如果你想要毫秒级的分辨率，请使用以下打印语句：\n\
    \n```python\nprint('{:.3f} seconds'.format(time()-start))\n```\n\n你可以使用一些数学运算来得到分钟和小时。以下是一个例子：\n\
    \n```python\nt = time()-start\nsecs = t%60\nmins = t//60\nhours = mins//60\n```\n\
    \n当你调用`time()`时，你会得到一个相当奇怪的值，比如1306372108.045。这是自1970年1月1日以来经过的秒数。\n\n## datetime模块\n\
    \n`datetime`模块允许我们同时处理日期和时间。以下代码创建一个包含当前日期和时间的日期时间对象：\n\n```python\nfrom datetime\
    \ import datetime\nd = datetime.now()\n```\n\n`datetime`对象具有属性`year`、`month`、`day`、`hour`、`minute`、`second`和`microsecond`。以下是一个简短的例子：\n\
    \n```python\nd = datetime.now()\nprint('{:02d} {}/{}/{}'.format(d.hour, d.minute,\
    \ d.month, d.day, d.year))\n```\n\n9:38 22/6/2018\n\n小时是24小时制。要获取12小时制，你可以这样做：\n\
    \n```python\nam_pm = 'am' if d.hour<12 else 'pm'\nprint('{}:{}{}'.format(d.hour%12,\
    \ d.minute, am_pm))\n```\n\n另一种显示日期和时间的方法是使用`strftime`方法。它使用各种格式化代码，允许你显示日期和时间，包括星期几、上午/下午等信息。以下是一些格式化代码：\n\
    \n| 代码 | 描述 |\n| :--- | :--- |\n| %c | 根据本地惯例格式化的日期和时间 |\n| %x, %X | %x是日期，%X是时间，两者都按照与%c相同的格式格式化\
    \ |\n| %d | 月份中的日期 |\n| %j | 年份中的日期 |\n| %a, %A | 星期名称（%a是缩写的星期名称） |\n| %m | 月份（01-12）\
    \ |\n| %b, %B | 月份名称（%b是缩写的月份名称） |\n| %y, %Y | 年份（%y是2位数，%Y是4位数） |\n| %H, %I |\
    \ 小时（%H是24小时制，%I是12小时制） |\n| %p | am或pm |\n| %M | 分钟 |\n| %S | 秒 |\n\n以下是一个例子：\n\
    \n```python\nprint(d.strftime('%A %x'))\n```\n\nTuesday 18/06/18\n\n## os模块 -\
    \ 处理文件和目录\n\n`os`模块和子模块`os.path`包含用于处理文件和目录的函数。\n\n## 更改目录\n\n当你的程序打开一个文件时，该文件被假定与程序本身在同一目录中。如果不是，你必须指定目录，如下所示：\n\
    \n```python\ns = open('c:/users/ajit/myfile.txt').read()\n```\n\n如果你有很多需要读取的文件，且它们都在同一个目录中，你可以使用`os.chdir`来更改目录。以下是一个例子：\n\
    \n```python\nos.chdir('c:/users/tanweer/')\ns = open('myfile.txt').read()\n```\n\
    \n## 获取当前目录\n\n函数`getcwd`返回当前目录的路径。它将是你的程序所在的目录，或者你通过`chdir`更改到的目录。\n\n## 获取目录中的文件\n\
    \n函数`listdir`返回目录中条目的列表，包括所有文件和子目录。如果你只想要文件而不要子目录，或者反之，`os.path`模块包含函数`isfile`和`isdir`来判断一个条目是文件还是目录。以下是一个例子，它搜索目录中的所有文件，并打印出包含单词'employee'的文件名。\n\
    \n```python\nimport os\ndirectory = 'c:/users/ajit/'\nfiles = os.listdir(directory)\n\
