    ## 列表推导式


    传统上，一段遍历序列的代码可以写成如下形式：


    ```

    >>> evens = []

    >>> for i in range(10):

    ...     if i % 2 == 0:

    ...         evens.append(i)

    >>> evens

    [0, 2, 4, 6, 8]

    ```


    这可能有效，但实际上它会使 Python 变慢，因为解释器在每个循环中都要确定序列的哪一部分需要更改。

    **列表推导式**是正确的解决方案：


    ```

    >>> [i **for** i **in** range(10) **if** i % 2 == 0]

    [0, 2, 4, 6, 8]

    ```


    除了更高效之外，它也更短，并且涉及的元素更少。


