    \ the same kind of example, combining sequences of bits. This takes a bit of conversion\
    \ to base 2 to understand what's going on.\n\n```\n>>> print 3 & 5\n1\n```\n\n\
    The number 3, in base 2, is 0011. The number 5 is 0101. Let's match up the bits\
