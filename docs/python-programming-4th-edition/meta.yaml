- md: "In Python 3.0, using object as a parent class will no longer be necessary.\n\
    In Python 2.6, however, it is highly recommended.\n\n## Class Responsibilities\n\
    \nAssigning responsibility to class can be challenging. A number of reasons can\
    \ be used to justify the functions and instance variables that are combined in\
    \ a single class.\n\n- **Convenience.** A class is defined to do things because\
    \ well its convenient to write the program that way.\n- **Similar Operations.**\
    \ A class is defined because it does all input, all output, or all calculations.\n\
    - **Similar Time.** A class is defined to handle all initialization, all processing\
    \ or all final cleanup.\n- **Sequence.** We identify some operations which are\
    \ performed in a simple sequence and bundle these into a single class.\n- **Common\
    \ Data.** A class is defined because it has the operations which isolate a data\
    \ structure or algorithm.\n\n## Creating and Using Objects\n\nOnce we have a class\
    \ definition, we can make objects which are instances of that class. We do this\
    \ by evaluating the class as if it were a function: for example, Die(). When we\
    \ make one of these class calls, two things will happen.\n\nA new object is created.\
    \ This object has a reference to its class definition.\n\nThe objects initializer\
    \ method, `__init__()`, is called. Well look at how you define this method function\
    \ in th next section.\n\nLets create two instances of our Die class.\n\n```\n\
    d1 = Die()\nd2 = Die()\nd1.roll(), d2.roll() (6,5)\n```\n\n**An Objects Lifecycle.**\
    \ Each instance of every class has a lifecycle. The following is typical of most\
    \ objects.\n\n**Definition.** The class definition is read by the Python interpreter\
    \ (or it is a builtin class). Class definitions are created by the **class** statement.\
    \ Examples of built-in classes include file, str, int, etc.\n\n**Construction.**\
    \ An instance of the class is constructed: Python allocates the namespace for\
    \ the objects instance variables and associating the object with the class definition.\
    \ The `__init__()` method is executed to initialize any attributes of the newly\
    \ created instance.\n\n**Access and Manipulation.** The instances methods are\
    \ called (similar to function calls we covered in *Functions*), by client objects\
    \ or the main script. There is a considerable amount of collaboration among objects\
    \ in most programs. Methods that report on the state of the object are sometimes\
    \ called *accessors*; methods that change the state of the object are sometimes\
    \ called *mutators* or *manipulators*.\n\n**Garbage Collection.** Eventually,\
    \ there are no more references to this instance. Typically, the variable with\
    \ an object reference was part of the body of a function that finished, the namespace\
    \ is dropped, and the variables no longer exist. Python detects this, and removes\
    \ the referenced object from memory, freeing up the storage for subsequent reuse.\
    \ This freeing of memory is termed *garbage collection*, and happens automatically.\
    \ See *Garbage Collection* for more information.\n\n## Garbage Collection\n\n\
    It is important to note that Python counts references to objects. When object\
    \ is no longer in use, the reference count is zero, the object can be removed\
    \ from memory. This is true for all objects, especially objects of built-in classes\
    \ like str. This frees us from the details of memory management as practiced by\
    \ C++ programmers. When we do something like the following:\n\n```\ns= \"123\"\
    \ s= s+\"456\"\n```\n\nThe following happens.\nPython creates the string \"123\"\
    \ and puts a reference to this string into the variable s.\nPython creates the\
    \ string \"456\".\nPython performs the string concatenation method between the\
    \ string referenced by s and the string \"456\", creating a new string \"123456\"\
    .\nPython assigns the reference to this new \"123456\" string into the variable\
    \ s.\n\nAt this point, strings \"123\" and \"456\" are no longer referenced by\
    \ any variables. These objects will be destroyed as part of garbage collection.\n\
    \n**Important:** The self variable\nIn Python, the self qualifier is simply required\
    \ all the time.\n\nProgrammers experienced in Java or C++ may object to seeing\
    \ the explicit self. in front of all variable names and method function names.\
    \ In Java and C++, there is a this. qualifier which is assumed by the compiler.\
    \ Sometimes this qualifier is required to disambiguate names, other times the\
    \ compiler can work out what you meant.\n\nAn object is a namespace; it contains\
    \ the attributes. We can call the attributes *instance variables* to distinguish\
    \ them from global variables and free variables.\n\n**Instance Variables** These\
    \ are part of an objects namespace. Within the method functions of a class, these\
    \ variables are qualified by self.\nOutside the method functions of the class,\
    \ these variables are qualified by the objects name.\nIn *die.py*, the main()\
    \ function would refer to d1.value to get the value attribute of object d1.\n\n\
    **Global Variables** Global variables are pare of a special global namespace.\
    \ The **global** state-ment creates the variable name in the global namespace\
    \ instead of the local namespace. See *The global Statement* for more information.\n\
    While its easy to refer to global variables, its not as easy to create them.\n\
    \n**Free Variables** Within a method function, a variable that is not qualified\
    \ by self., nor marked by **global** is a free variable. Python checks the local\
    \ namespace, then the global namespace for this variable. This ambiguity is, generally,\
    \ not a good idea.\n\n## Inheritance\n\nInheritance is a feature of object-oriented\
    \ programming; it refers to defining a new class with less or no modification\
    \ to an existing class. The new class is called **derived class** and from one\
    \ which it inherits is called the **base class**. Python supports inheritance;\
    \ it also supports **multiple inheritances**. A class can inherit attributes and\
    \ behavior methods from another class called subclass or heir class.\n\n![](img/e3dac7e08bdd357a94774b55d90b82a8_159_0.png)\n\
    \n## Python Inheritance Syntax\n\n```\nclass DerivedClass(BaseClass):\n    body_of_derived_class\n\
    ```\n\n**Step 1)** Run the following code\n\n```\n# Example file for working with\
    \ classes\nclass myClass():\n    def method1(self):\n        print(\"Hello\")\n\
    \    def method2(self,someString):\n        print(\"Software Testing:\" + someString)\n\
    \nclass childClass(myClass):\n    #def method1(self):\n        #myClass.method1(self);\n\
    \        #print \"Child Class Method1\"\n    def method2(self):\n        print(\"\
    childClass method2\")\n\ndef main():\n    # exercise the class methods\n    c2\
    \ = childClass()\n    c2.method1()\n    c2.method2()\nif __name__ == \"__main__\"\
    :\n    main()\n```\n\nNotice that the in childClass, method1 is not defined but\
    \ it is derived from the parent myClass. The output is \"Hello\"\n\n**Step 2)**\
    \ Uncomment Line # 8 & 9. Run the code\nNow, the method 1 is defined in the childClass\
    \ and output \"childClass Method1\" is correctly shown.\n\n**Step 3)** Uncomment\
    \ Line #10. Run the code\nYou can a method of the parent class using the syntax\n\
    ParentClass.Method.\nWe call, myClass.method1(self) and Hello is printed as expected\n\
    \n**Step 4)** Uncomment Line #14. Run the code.\nMethod 2 of the child class is\
    \ called and \"childClass method\" is printed as expected.\n\n## Python Constructors\n\
    \nA constructor is a class function that instantiates an object to predefined\
    \ values.\nIt begins with a double underscore (_). It __init__() method\nIn below\
    \ example we are taking name of the user using constructor.\n\n```\nclass User:\n\
    \    name = \"\"\n    def __init__(self, name):\n        self.name = name\n  \
    \  def say(self):\n        print(\"Welcome to Python, \" + self.name)\n\nUser1\
    \ = User(\"Ajit\")\nUser1.say()\nOutput will be:\nWelcome to Python, Ajit\n```\n\
    \n## Working With Python 2\n\n## Example\n\nAbove codes are Python 3 examples,\
    \ If you want to run in Python 2 please consider following code.\n\n```\n# How\
    \ to define Python classes\n# Example file for working with classes\nclass myClass():\n\
    \    def method1(self):\n        print \"hello\"\n    def method2(self,someString):\n\
    \        print \"Software Testing:\" + someString\n\ndef main():\n    # exercise\
    \ the class methods\n    c = myClass ()\n    c.method1()\n    c.method2(\" Testing\
    \ is fun\")\nif __name__ == \"__main__\":\n    main()\n#How Inheritance works\n\
    # Example file for working with classes\n```"
  mdcn: "在 Python 3.0 中，使用 `object` 作为父类将不再是必需的。\n然而，在 Python 2.6 中，强烈建议这样做。\n\n##\
    \ 类的职责\n\n为类分配职责可能具有挑战性。有许多理由可以用来证明将函数和实例变量组合在单个类中的合理性。\n\n- **便利性。** 定义一个类来执行某些操作，是因为这样编写程序很方便。\n\
    - **相似操作。** 定义一个类是因为它执行所有输入、所有输出或所有计算。\n- **相似时间。** 定义一个类来处理所有初始化、所有处理或所有最终清理。\n\
    - **顺序。** 我们识别出一些按简单顺序执行的操作，并将它们捆绑到一个类中。\n- **公共数据。** 定义一个类是因为它具有隔离数据结构或算法的操作。\n\
    \n## 创建和使用对象\n\n一旦我们有了类定义，就可以创建该类的实例对象。我们通过像调用函数一样对类进行求值来实现这一点：例如，`Die()`。当我们进行这样的类调用时，会发生两件事。\n\
    \n创建一个新对象。该对象有一个指向其类定义的引用。\n\n对象的初始化方法 `__init__()` 被调用。我们将在下一节中查看如何定义这个方法函数。\n\
    \n让我们创建 `Die` 类的两个实例。\n\n```\nd1 = Die()\nd2 = Die()\nd1.roll(), d2.roll() (6,5)\n\
    ```\n\n**对象的生命周期。** 每个类的每个实例都有一个生命周期。以下是大多数对象的典型过程。\n\n**定义。** Python 解释器读取类定义（或者它是一个内置类）。类定义由\
    \ **class** 语句创建。内置类的例子包括 `file`、`str`、`int` 等。\n\n**构造。** 构造类的一个实例：Python 为对象的实例变量分配命名空间，并将对象与类定义关联起来。执行\
    \ `__init__()` 方法来初始化新创建实例的任何属性。\n\n**访问和操作。** 实例的方法被调用（类似于我们在 *函数* 中介绍的函数调用），由客户端对象或主脚本调用。在大多数程序中，对象之间存在大量的协作。报告对象状态的方法有时称为\
    \ *访问器*；改变对象状态的方法有时称为 *修改器* 或 *操作器*。\n\n**垃圾回收。** 最终，不再有对该实例的引用。通常，持有对象引用的变量是已完成函数体的一部分，命名空间被丢弃，变量不再存在。Python\
    \ 检测到这一点，并从内存中移除被引用的对象，释放存储空间以供后续重用。这种内存释放称为 *垃圾回收*，并且是自动发生的。更多信息请参阅 *垃圾回收*。\n\
    \n## 垃圾回收\n\n需要注意的是，Python 会计算对象的引用计数。当对象不再被使用时，引用计数为零，该对象就可以从内存中移除。这对所有对象都适用，尤其是像\
    \ `str` 这样的内置类对象。这使我们免于像 C++ 程序员那样处理内存管理的细节。当我们执行类似以下操作时：\n\n```\ns= \"123\" s=\
    \ s+\"456\"\n```\n\n会发生以下情况。\nPython 创建字符串 \"123\" 并将对该字符串的引用放入变量 `s`。\nPython\
    \ 创建字符串 \"456\"。\nPython 在 `s` 引用的字符串和字符串 \"456\" 之间执行字符串连接方法，创建一个新字符串 \"123456\"\
    。\nPython 将对这个新 \"123456\" 字符串的引用赋给变量 `s`。\n\n此时，字符串 \"123\" 和 \"456\" 不再被任何变量引用。这些对象将作为垃圾回收的一部分被销毁。\n\
    \n**重要：** `self` 变量\n在 Python 中，`self` 限定符始终是必需的。\n\n有 Java 或 C++ 经验的程序员可能会反对在所有变量名和方法函数名前看到显式的\
    \ `self.`。在 Java 和 C++ 中，有一个 `this.` 限定符，编译器会假定它。有时需要这个限定符来消除名称歧义，有时编译器可以推断出你的意思。\n\
    \n对象是一个命名空间；它包含属性。我们可以将属性称为 *实例变量*，以区别于全局变量和自由变量。\n\n**实例变量** 这些是对象命名空间的一部分。在类的方法函数中，这些变量由\
    \ `self` 限定。\n在类的方法函数之外，这些变量由对象名称限定。\n在 *die.py* 中，`main()` 函数会引用 `d1.value` 来获取对象\
    \ `d1` 的 `value` 属性。\n\n**全局变量** 全局变量是特殊全局命名空间的一部分。**global** 语句在全局命名空间而不是局部命名空间中创建变量名。更多信息请参阅\
    \ *global 语句*。\n虽然引用全局变量很容易，但创建它们就不那么容易了。\n\n**自由变量** 在方法函数中，一个既没有被 `self.` 限定，也没有被\
    \ **global** 标记的变量是自由变量。Python 会先检查局部命名空间，然后检查全局命名空间来查找这个变量。这种歧义通常不是一个好主意。\n\n\
    ## 继承\n\n继承是面向对象编程的一个特性；它指的是在现有类的基础上进行少量或不修改地定义一个新类。新类称为 **派生类**，它继承自的类称为 **基类**。Python\
    \ 支持继承；它也支持 **多重继承**。一个类可以从另一个称为子类或派生类的类继承属性和行为方法。\n\n![](img/e3dac7e08bdd357a94774b55d90b82a8_159_0.png)\n\
    \n## Python 继承语法\n\n```\nclass DerivedClass(BaseClass):\n    body_of_derived_class\n\
    ```\n\n**步骤 1)** 运行以下代码\n\n```\n# Example file for working with classes\nclass\
    \ myClass():\n    def method1(self):\n        print(\"Hello\")\n    def method2(self,someString):\n\
    \        print(\"Software Testing:\" + someString)\n\nclass childClass(myClass):\n\
    \    #def method1(self):\n        #myClass.method1(self);\n        #print \"Child\
    \ Class Method1\"\n    def method2(self):\n        print(\"childClass method2\"\
    )\n\ndef main():\n    # exercise the class methods\n    c2 = childClass()\n  \
    \  c2.method1()\n    c2.method2()\nif __name__ == \"__main__\":\n    main()\n\
    ```\n\n注意，在 `childClass` 中，`method1` 没有定义，但它从父类 `myClass` 派生而来。输出是 \"Hello\"。\n\
    \n**步骤 2)** 取消注释第 8 行和第 9 行。运行代码\n现在，`method1` 在 `childClass` 中定义了，输出 \"childClass\
    \ Method1\" 正确显示。\n\n**步骤 3)** 取消注释第 10 行。运行代码\n你可以使用语法 `ParentClass.Method` 调用父类的方法。\n\
    我们调用 `myClass.method1(self)`，如预期打印出 \"Hello\"。\n\n**步骤 4)** 取消注释第 14 行。运行代码。\n\
    调用子类的 `method2`，如预期打印出 \"childClass method\"。\n\n## Python 构造函数\n\n构造函数是一个类函数，它将一个对象实例化为预定义的值。\n\
    它以双下划线 (`__`) 开头。它是 `__init__()` 方法。\n在下面的例子中，我们使用构造函数获取用户的名称。\n\n```\nclass User:\n\
    \    name = \"\"\n    def __init__(self, name):\n        self.name = name\n  \
    \  def say(self):\n        print(\"Welcome to Python, \" + self.name)\n\nUser1\
    \ = User(\"Ajit\")\nUser1.say()\nOutput will be:\nWelcome to Python, Ajit\n```\n\
    \n## 与 Python 2 兼容\n\n## 示例\n\n上面的代码是 Python 3 的例子，如果你想在 Python 2 中运行，请参考以下代码。\n\
    \n```\n# How to define Python classes\n# Example file for working with classes\n\
    class myClass():\n    def method1(self):\n        print \"hello\"\n    def method2(self,someString):\n\
    \        print \"Software Testing:\" + someString\n\ndef main():\n    # exercise\
    \ the class methods\n    c = myClass ()\n    c.method1()\n    c.method2(\" Testing\
    \ is fun\")\nif __name__ == \"__main__\":\n    main()\n#How Inheritance works\n\
    # Example file for working with classes\n```"
