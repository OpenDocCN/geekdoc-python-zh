    ## 6. Miscellaneous deprecation


    Finally, this version brings a background cleanup and removes support for many
    legacy modules: aifc, chunk, msilib, pipes, telnetlib, audioop, crypt, nis, sndhdr,
    uu, cgi, imghdr, nntplib, spwd, xdrlib, cgitb, mailcap, ossaudiodev, sunau...


    Some of these modules will not be removed from the standard library until Python
    3.13. Others will simply be replaced by alternative solutions, more modern and
    better maintained, already present in the standard library.


    In conclusion, if this update does not bring anything revolutionary, it continues
    the Python projects already launched with regard to the improvement of the performances
    of CPython, the improvement of the error management and the addition of solutions
    for typing requested by part of the community.


    # Chapter 3


    # Interacting with Python


    Python is a flexible and dynamic language that you can use in different ways.
    You can use it interactively when you simply want to test a code or a statement
    on a line-by-line basis or when you''re exploring its features. You can use it
    in script mode when you want to interpret an entire file of statements or application
    program.


    To use Python interactively, you can use either the Command Line window or the
    IDLE Development Environment.


    ## Command Line Interaction


    The command line is the most straightforward way to work with Python. You can
    easily visualize how Python works as it responds to every completed command entered
    on the `>>>` prompt. It may not be the most preferred interaction with Python,
    but it is the simplest way to explore how Python works.


    ## Running Python


    There are three different ways to start Python –


    1.  Interactive Interpreter


    From Windows


    **Start -> All Programs -> Python 3.11 -> Python 3.11**


    ![](img/e3dac7e08bdd357a94774b55d90b82a8_37_0.png)


    2.  Script from the Command-line


    A Python script can be executed at command line by invoking the interpreter on
    your application, as in the following -


    ```

    C: >python script.py

    ```


    3.  Integrated Development Environment


    You can run Python from a Graphical User Interface (GUI) environment as well,
    if you have a GUI application on your system that supports Python.


    **Windows** – PythonWin is the first Windows interface for Python and is an IDE
    with a GUI.


    From Windows


    **Start -> All Programs -> Python 3.11 -> IDLE**


    > Note: If you''re using GNU/Linux, UNIX, and Mac OS systems, you have to run
