    We use commands to tell the computer what to do. When you want Python to do something
    for you, you have to instruct it by entering commands that it is familiar with.
    Python will then translate these commands to instructions that your computer or
    device can understand and execute.


    To see how Python works, you can use the print command to print the universal
    program Hello, World! Open Python''s command line.


    At the `>>>` prompt, type the following: `print("Hello, World!")`


    Press enter to tell Python that you''re done with your command. Very quickly,
    the command line window will display Hello, World! on the following line:


