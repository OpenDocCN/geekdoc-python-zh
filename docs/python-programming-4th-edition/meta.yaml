    ```

    button2=Button(text=''Hi'')    button2.pack(side=BOTTOM)

    ```


    The fill option causes the component to fill up the available space given to it.
    It can be either X, Y or BOTH. The expand option is used to allow the component
    to expand when its window is resized. To enable it, use expand=YES.


