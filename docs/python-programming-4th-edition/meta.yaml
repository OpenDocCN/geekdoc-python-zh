    \n```\nscale = Scale(from_=1, to_=150, length=300, orient='horizontal')\n```\n\
    \nHere are some of the useful options of the Scale component:\n\n| Option | Description\
    \ |\n|---|---|\n| from_ | minimum value possible by dragging the scale |\n| to_\
    \ | maximum value possible by dragging the scale |\n| Length | how many pixels\
