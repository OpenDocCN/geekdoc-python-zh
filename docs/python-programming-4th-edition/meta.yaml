    \ Frame 组件\n\n假设我们希望在屏幕顶部有 26 个小按钮，下面有一个大的 Ok 按钮，如下所示：\n\n![](img/e3dac7e08bdd357a94774b55d90b82a8_326_1.png)\n\
    \nFrame 的作用是包含其他组件，并将它们组合成一个大的组件。在这种情况下，我们将创建一个 Frame 来将所有字母按钮分组为一个大的组件。代码如下所示：\n\
    \n```\nfrom tkinter import *\nalphabet = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ'\nroot =\
