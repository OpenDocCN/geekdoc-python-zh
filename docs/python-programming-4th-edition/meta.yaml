    Since the first **print** statement ends with a , it does not produce a complete
    line of output. The second **print** statement finishes the line of output.


    ```

    from __future__ import print_function

    print( "335/113=", end="" ) print( 335.0/113.0 )

    print( "Hi, Guys", "Isn''t it lovely?", end="" ) print( ''I said, "Hi".'', 42,
    91056 )

    ```


    # **Input Functions**


    Python provides two simplistic built-in functions to accept input and set the
    value of variables. These are not really suitable for a complete application,
    but will do for our initial explorations.'
- md: '## The raw_input() Function


    The first way to get interactive input is the raw_input() function. This function
    accepts a string parameter, which is the user''s prompt, written to standard output.
    The next line available on standard input is returned as the value of the function.


    **raw_input**(*prompt*)

    If a prompt is present, it is written to sys.stdout.

    Input is read from sys.stdin and returned as a string.


    The raw_input() function reads from a file often called sys.stdin. When running
    from the command-line, this will be the keyboard, and what you type will be echoed
    in the command window or **Terminal** window.

    Here''s an example script that uses raw_input().


    ```

    a = raw_input("yes?")

    print("you said", a)

    shares = int(raw_input("shares: "))

    price = float(raw_input("dollars: "))

    price += float(raw_input("eights: ")) / 8.0

    print("value", shares * price)

    ```


    The raw_input() mechanism is very limited. If the string returned by raw_input()
    is not suitable for use by int(), an exception is raised and the program stops
    running. We''ll cover exception handling in detail in *Exceptions*.


    ## The input() Function


    In addition to the raw_input() function, which returns the exact string of characters,
    there is the input() function. This applies the eval() function to the input,
    which will typically convert numeric input to the appropriate objects.


    **Important:** Python 3

    This function will be removed. It''s best not to make use of it.

    The value of the input() function is eval( raw_input( prompt ) ).


    ## Chapter 5


    ## Variables and Data Types


    ### Variables


    A variable is like a container that stores values that you can access or change.
    It is a way of pointing to a memory location used by a program. You can use variables
    to instruct the computer to save or retrieve data to and from this memory location.


    Python differs significantly from languages such as Java, C, or C++ when it comes
    to dealing with variables. Other languages declare and bind a variable to a specific
    data type. This means that it can only store a unique data type. Hence, if a variable
    is of integer type, you can only save integers in that variable when running your
    program.


    Python is a lot more flexible when it comes to handling variables. If you need
    a variable, you''ll just think of a name and declare it by assigning a value.
    If you need to, you can change the value and data type that the variable stores
    during program execution.


    To illustrate these features:

    In Python, you declare a variable by giving it a value:


    ```

    my_variable = 10

    ```


    Take note that when you are declaring a variable, you are not stating that the
    variable my_variable is equal to 10. What the statement actually means is my_variable
    is set to 10.

    To increase the value of the variable, you can enter this statement on the command
    line:


    ```

    >>> my_variable = my_variable + 3

    ```


    To see how Python responded to your statement, invoke the print command with this
    statement:


    ```

    >>> print(my_variable)

    ```


    You''ll see this result on the next line:

    ```

    13

    ```


    To use my_variable to store a literal string "yellow", you''ll simply set the
    variable to "yellow":


    ```

    >>> my_variable = "yellow"

    ```


    To see what''s currently stored in my_variable, use the print command:


    ```

    >>> print(my_variable)

    ```


    On the next line, you''ll see:

    ```

    yellow

    ```


    ### Data Types


    Python handles several data types to facilitate the needs of programmers and application
    developers for workable data. These include strings, numbers, Booleans, lists,
    date and time, dictionary, tuple.


    ### Strings


    A string is a sequence of Unicode characters that may be a combination of letters,
    numbers, and special symbols. To define a string in Python, you can enclose the
    string in matching single or double quotes:


    ```

    >>> string1 = ''I am enclosed in single quotes.''

    >>> string2 = "I am enclosed in double quotes."

    ```


    If a literal string enclosed in single quotes contains a single quote, you''ll
    have to place a backslash (\) before the single quote within the string to escape
    the character. For example:


    ```

    string3 = ''It doesn\''t look good at all.''

    ```


    To print string3:


    ```

    print(string3)

    ```


    ```

    It doesn''t look good at all.

    ```


    Of course, you wouldn''t have to do this if you used double quotes to enclose
    the string:


    ```

    >>> string3 = "It doesn''t seem nice"

    ```


    Similarly, you''ll have to place a backslash before a double quote if your string
    is enclosed in double quotes:


    ```

    >>> txt = "He said: \"You should get the same results no matter how you choose
    to enclose a string.\""

    >>> print(txt)

    ```


    ```

    He said: "You should get the same results no matter how you choose to enclose
    a string."

    ```


    ### Numbers


    #### Numeric Data Types


    One of the many conveniences of using Python is that you don''t really have to
    declare a numeric value to distinguish its type. Python can readily tell one data
    type from another when you write and run your statement. It has four built-in
    numeric data types. Python 3 supports three types: integer, floating-point numbers,
    and complex numbers. Long integers (long) no longer form a separate group of integers
    but are included in the int or integer category.


    #### 1. Integer (int)


    Integers are whole numbers without decimal point. They can be positive or negative
    as long as they don''t contain a decimal point that would make a number a floating
    number, a distinct numeric type. Integers have unlimited size in Python 3.

    The following numbers and literals are recognized by Python:

    Regular integers

    Examples: 793, -254, 4


    #### Octal literals (base 8)


    To indicate an octal number, you will use the prefix 0o or 0O (zero followed by
    either a lowercase or upper-case letter o).

    Example:


    ```

    >>> a = 0O7

    >>> print(a)

    7

    ```


    #### Hexadecimal literals (base 16)


    To indicate hexadecimal literals, you will use the prefix 0X or 0x (zero and uppercase
    or lowercase letter x).


    Example:


    ```

    >>> hex_lit = 0xA0C

    >>> print(hex_lit)

    2572

    ```


    #### Binary literals (base 2)


    To signify binary literals, you''ll use the prefix 0B or 0b (zero and uppercase
    or lowercase b).


    Example:


    ```

    c = 0b1100

    print(c)

    12

    ```


    #### Converting Integers to their String Representation


    Earlier, you have seen how the print command converted literals to their equivalent
    in integers. Python makes it possible for you to work the other way around by
    converting integers to their literal representation. To convert an integer into
    its string representation, you can use the functions *hex()*, *bin()*, and *oct()*.


    Examples:


    To convert the integer 7 to its octal literal, type and enter oct(7) on the command
    prompt. You''ll get the output 0o7:


    ```

    >>> oct(7)

    0o7

    ```


    Here is what happens when you convert the integer 2572 to a hexadecimal literal:


    ```

    >>> hex(2572)

    0xa0c

    ```


    Finally, see what happens when you use the bin() function to convert the integer
    12 to its binary string:


    ```

    >>> bin(12)

    0b1100

    ```


    You can store the result to a variable by defining a variable with the hex(),
    bin(), and oct() functions:


    For example:


    ```

    >>> x = hex(2572)

    >>> x

    0xa0c

    ```


    To see the object type created and stored in the variable x, you can use and enter
    the command type():


    ```

    >>> type(x)

    ```


    You should get this result:


    ```

    <class ''str''>

    ```


    #### 2. Floating-point numbers


    Also known as floats, floating-point numbers signify real numbers. Floats are
    written with a decimal point that segregates the integer from the fractional numbers.
    They may also be written in scientific notation where the uppercase or lowercase
    letter e signifies the 10th power:


    ```

    >>> 6.2e3

    6200.0

    >>> 6.2e2

    620.0

    ```


    #### 3. Complex numbers


    Complex numbers are pairs of real and imaginary numbers. They take the form a
    + bJ where a is a float and the real part of the complex number. On the other
    side is bJ where b is a float and J or its lowercase indicates the square root
    of an imaginary number, -1. This makes b the imaginary part of the complex number.
    Here are examples of complex numbers at work:


    ```

    >>> a = 2 + 5j

    >>> b = 4 - 2j

    >>> c = a + b

    ```'
  mdcn: '## `raw_input()` 函数


    获取交互式输入的第一种方式是使用 `raw_input()` 函数。该函数接受一个字符串参数，即用户的提示信息，该信息会被写入标准输出。标准输入中下一行可用的内容将作为函数的返回值。


    **raw_input**(*prompt*)

    如果存在提示信息，它将被写入 `sys.stdout`。

    输入从 `sys.stdin` 读取并作为字符串返回。


    `raw_input()` 函数从一个通常称为 `sys.stdin` 的文件中读取。当从命令行运行时，这将是键盘，你输入的内容将在命令窗口或 **终端**
    窗口中回显。

    以下是一个使用 `raw_input()` 的示例脚本。


    ```

    a = raw_input("yes?")

    print("you said", a)

    shares = int(raw_input("shares: "))

    price = float(raw_input("dollars: "))

    price += float(raw_input("eights: ")) / 8.0

    print("value", shares * price)

    ```


    `raw_input()` 机制非常有限。如果 `raw_input()` 返回的字符串不适合 `int()` 使用，将引发异常并停止程序运行。我们将在 *异常*
    中详细介绍异常处理。


    ## `input()` 函数


    除了返回精确字符字符串的 `raw_input()` 函数外，还有 `input()` 函数。它对输入应用 `eval()` 函数，这通常会将数字输入转换为相应的对象。


    **重要提示：** Python 3

    此函数将被移除。最好不要使用它。

    `input()` 函数的值是 `eval( raw_input( prompt ) )`。


    ## 第 5 章


    ## 变量与数据类型


    ### 变量


    变量就像一个容器，存储着你可以访问或更改的值。它是指向程序使用的内存位置的一种方式。你可以使用变量来指示计算机将数据保存到此内存位置或从此内存位置检索数据。


    在处理变量方面，Python 与 Java、C 或 C++ 等语言有显著不同。其他语言会声明变量并将其绑定到特定的数据类型。这意味着它只能存储一种数据类型。因此，如果一个变量是整数类型，在运行程序时，你只能在该变量中保存整数。


    Python 在处理变量方面要灵活得多。如果你需要一个变量，只需想一个名字并通过赋值来声明它。如果需要，你可以在程序执行期间更改变量存储的值和数据类型。


    为了说明这些特性：

    在 Python 中，你通过给变量赋值来声明它：


    ```

    my_variable = 10

    ```


    请注意，当你声明一个变量时，你并不是在声明变量 `my_variable` 等于 10。该语句的实际含义是将 `my_variable` 设置为 10。

    要增加变量的值，你可以在命令行中输入以下语句：


    ```

    >>> my_variable = my_variable + 3

    ```


    要查看 Python 如何响应你的语句，请使用以下语句调用 `print` 命令：


    ```

    >>> print(my_variable)

    ```


    你将在下一行看到结果：

    ```

    13

    ```


    要使用 `my_variable` 存储字面字符串 "yellow"，只需将变量设置为 "yellow"：


    ```

    >>> my_variable = "yellow"

    ```


    要查看 `my_variable` 中当前存储的内容，请使用 `print` 命令：


    ```

    >>> print(my_variable)

    ```


    在下一行，你会看到：

    ```

    yellow

    ```


    ### 数据类型


    Python 处理多种数据类型，以满足程序员和应用程序开发人员对可用数据的需求。这些类型包括字符串、数字、布尔值、列表、日期和时间、字典、元组。


    ### 字符串


    字符串是 Unicode 字符的序列，可以是字母、数字和特殊符号的组合。要在 Python 中定义字符串，你可以将字符串括在匹配的单引号或双引号中：


    ```

    >>> string1 = ''I am enclosed in single quotes.''

    >>> string2 = "I am enclosed in double quotes."

    ```


    如果用单引号括起来的字面字符串包含单引号，你必须在字符串内的单引号前放置一个反斜杠 (\) 来转义该字符。例如：


    ```

    string3 = ''It doesn\''t look good at all.''

    ```


    要打印 `string3`：


    ```

    print(string3)

    ```


    ```

    It doesn''t look good at all.

    ```


    当然，如果你使用双引号来括起字符串，就不必这样做：


    ```

    >>> string3 = "It doesn''t seem nice"

    ```


    类似地，如果你的字符串用双引号括起来，你必须在双引号前放置一个反斜杠：


    ```

    >>> txt = "He said: \"You should get the same results no matter how you choose
    to enclose a string.\""

    >>> print(txt)

    ```


    ```

    He said: "You should get the same results no matter how you choose to enclose
    a string."

    ```


    ### 数字


    #### 数字数据类型


    使用 Python 的众多便利之一是，你实际上不需要声明一个数值来区分其类型。当你编写和运行语句时，Python 可以轻松区分不同的数据类型。它有四种内置的数字数据类型。Python
    3 支持三种类型：整数、浮点数和复数。长整数（long）不再构成单独的整数类别，而是包含在 int 或整数类别中。


    #### 1. 整数 (int)


    整数是没有小数点的整数。只要不包含会使数字成为浮点数（一种不同的数字类型）的小数点，它们可以是正数或负数。在 Python 3 中，整数的大小是无限的。

    Python 识别以下数字和字面量：

    常规整数

    示例：793、-254、4


    #### 八进制字面量（基数为 8）


    要表示八进制数，你将使用前缀 `0o` 或 `0O`（零后跟小写或大写字母 o）。

    示例：


    ```

    >>> a = 0O7

    >>> print(a)

    7

    ```


    #### 十六进制字面量（基数为 16）


    要表示十六进制字面量，你将使用前缀 `0X` 或 `0x`（零和大写或小写字母 x）。


    示例：


    ```

    >>> hex_lit = 0xA0C

    >>> print(hex_lit)

    2572

    ```


    #### 二进制字面量（基数为 2）


    要表示二进制字面量，你将使用前缀 `0B` 或 `0b`（零和大写或小写字母 b）。


    示例：


    ```

    c = 0b1100

    print(c)

    12

    ```


    #### 将整数转换为其字符串表示形式


    之前，你已经看到 `print` 命令如何将字面量转换为它们的整数等效形式。Python 使你能够反向操作，将整数转换为其字面表示形式。要将整数转换为其字符串表示形式，你可以使用函数
    *hex()*、*bin()* 和 *oct()*。


    示例：


    要将整数 7 转换为其八进制字面量，请在命令提示符下键入并输入 `oct(7)`。你将得到输出 `0o7`：


    ```

    >>> oct(7)

    0o7

    ```


    以下是将整数 2572 转换为十六进制字面量时发生的情况：


    ```

    >>> hex(2572)

    0xa0c

    ```


    最后，看看使用 `bin()` 函数将整数 12 转换为其二进制字符串时会发生什么：


    ```

    >>> bin(12)

    0b1100

    ```


    你可以通过使用 `hex()`、`bin()` 和 `oct()` 函数定义一个变量来将结果存储到变量中：


    例如：


    ```

    >>> x = hex(2572)

    >>> x

    0xa0c

    ```


    要查看在变量 `x` 中创建和存储的对象类型，你可以使用并输入命令 `type()`：


    ```

    >>> type(x)

    ```


    你应该得到这个结果：


    ```

    <class ''str''>

    ```


    #### 2. 浮点数


    也称为浮点数，浮点数表示实数。浮点数用小数点书写，小数点将整数部分与小数部分分开。它们也可以用科学计数法书写，其中大写或小写字母 e 表示 10 的幂：


    ```

    >>> 6.2e3

    6200.0

    >>> 6.2e2

    620.0

    ```


    #### 3. 复数


    复数是实数和虚数的对。它们采用 `a + bJ` 的形式，其中 `a` 是一个浮点数，是复数的实部。另一边是 `bJ`，其中 `b` 是一个浮点数，`J`
    或其小写形式表示虚数单位 -1 的平方根。这使得 `b` 成为复数的虚部。以下是复数实际使用的示例：


    ```

    >>> a = 2 + 5j

    >>> b = 4 - 2j

    >>> c = a + b

    ```'
