    \ 2]]\n>>> [x for x in t.iterkeys()]\n['first', 'csecond']\n>>> [x for x in t.iteritems()]\n\
    [('a', 'string value'), ('b', [1, 2])]\n```\n\n## Chapter 18\n\n## Python Pandas\n\
    \n### What is Pandas?\n\nPandas is an open-source Python Library providing high-performance\
    \ data manipulation and analysis tool using its powerful data structures. The\
    \ name Pandas is derived from the word Panel Data an Econometrics from Multi-dimensional\
    \ data.\n\nIn 2008, developer Wes McKinney started developing pandas when in need\
    \ of high performance, flexible tool for analysis of data.\n\nPrior to Pandas,\
    \ Python was majorly used for data munging and preparation. It had very little\
    \ contribution towards data analysis. Pandas solved this problem. Using Pandas,\
    \ we can accomplish five typical steps in the processing and analysis of data,\
    \ regardless of the origin of data load, prepare, manipulate, model, and analyze.\n\
    \nPython with Pandas is used in a wide range of fields including academic and\
    \ commercial domains including finance, economics, Statistics, analytics, etc.\n\
    \n### Key Features of Pandas\n\n- Fast and efficient DataFrame object with default\
    \ and customized indexing.\n- Tools for loading data into in-memory data objects\
    \ from different file formats.\n- Data alignment and integrated handling of missing\
    \ data.\n- Reshaping and pivoting of date sets.\n- Label-based slicing, indexing\
    \ and subsetting of large data sets.\n- Columns from a data structure can be deleted\
    \ or inserted.\n- Group by data for aggregation and transformations.\n- High performance\
    \ merging and joining of data.\n- Time Series functionality.\n\n### Python Pandas\
    \ – Customizing Environment\n\nStandard Python distribution doesn't come bundled\
    \ with Pandas module. If you install Anaconda Python package for Windows, Pandas\
    \ will be installed by default with the following –\n\n1. Download **Anaconda**\
    \ (from **https://www.anaconda.com/download/** is a free Python distribution)\
    \ for SciPy stack. It is also available for Linux and Mac.\n\nChoose either the\
    \ Python 2 or Python 3 Version depending on your needs. It doesn't effect the\
    \ installation process.\n\n2. Open and run the installer\n\nOnce the download\
    \ completes, open and run the .exe installer.\n\n3. When installing Anaconda,\
    \ a pop-up menu may ask whether or not to Add Anaconda to my PATH environment\
    \ variable, and Register Anaconda as my default Python 3.11. We suggest accepting\
    \ both options for the purposes of this class.\n\n## NumPy - Introduction\n\n\
    NumPy is a Python package. It stands for 'Numerical Python'. It is a library consisting\
    \ of multidimensional array objects and a collection of routines for processing\
    \ of array.\n\n**Numeric**, the ancestor of NumPy, was developed by Jim Hugunin.\
    \ Another package Numarray was also developed, having some additional functionalities.\
    \ In 2005, Travis Oliphant created NumPy package by incorporating the features\
    \ of Numarray into Numeric package. There are many contributors to this open source\
    \ project.\n\n### Operations using NumPy\n\nUsing NumPy, a developer can perform\
    \ the following operations –\n\n- Mathematical and logical operations on arrays.\n\
    - Fourier transforms and routines for shape manipulation.\n- Operations related\
    \ to linear algebra. NumPy has in-built functions for linear algebra and random\
    \ number generation.\n\n### Customizing NumPy\n\nStandard Python distribution\
    \ doesn't come bundled with NumPy module. If you install Anaconda Python package\
    \ for Windows, Pandas will be installed by default with the following –\n\nDownload\
    \ and install **Anaconda** (from https://www.anaconda.com/download/ is a free\
    \ Python distribution) for SciPy stack. it is also available for Linux and Mac.\
    \ If you’re using Anaconda Python, your system should already have numpy and matplotlib\
    \ installed.\n\n### NumPy - Ndarray Object\n\nThe most important object defined\
    \ in NumPy is an N-dimensional array type called **ndarray**. It describes the\
    \ collection of items of the same type. Items in the collection can be accessed\
    \ using a zero-based index. Every item in an ndarray takes the same size of block\
    \ in the memory. Each element in ndarray is an object of data-type object (called\
    \ **dtype**).\n\nAny item extracted from ndarray object (by slicing) is represented\
    \ by a Python object of one of array scalar types. The following diagram shows\
    \ a relationship between ndarray, data type object (dtype) and array scalar type\
    \ –\n\nAn instance of ndarray class can be constructed by different array creation\
    \ routines described later in the tutorial. The basic ndarray is created using\
    \ an array function in NumPy as follows –\n\n```\nnumpy.array\n```\n\nIt creates\
    \ an ndarray from any object exposing array interface, or from any method that\
    \ returns an array.\n\n```\nnumpy.array(object, dtype = None, copy = True, order\
    \ = None, subok = False, ndmin = 0)\n```\n\nThe above constructor takes the following\
    \ parameters –\n\n| Sr.No. | Parameter & Description |\n| :--- | :--- |\n| 1 |\
    \ **Object** Any object exposing the array interface method returns an array,\
    \ or any (nested) sequence. |\n| 2 | **Dtype** Desired data type of array, optional\
    \ |\n| 3 | **Copy** Optional. By default (true), the object is copied |\n| 4 |\
    \ **Order** C (row major) or F (column major) or A (any) (default) |\n| 5 | **Subok**\
    \ By default, returned array forced to be a base class array. If true, sub-classes\
    \ passed through |\n| 6 | **Ndmin** Specifies minimum dimensions of resultant\
    \ array |\n\nTake a look at the following examples to understand better.\n\nExample\
    \ 1\n\n```\nimport numpy as np\na = np.array([1,2,3])\nprint a\n```\n\nThe output\
    \ is as follows –\n\n```\n[1, 2, 3]\n```\n\nExample 2\n\n```\n# more than one\
    \ dimensions\nimport numpy as np\na = np.array([[1, 2], [3, 4]])\nprint a\n```\n\
    \nThe output is as follows -\n\n```\n[[1, 2]\n [3, 4]]\n```\n\nExample 3\n\n```\n\
    # minimum dimensions\nimport numpy as np\na = np.array([1, 2, 3,4,5], ndmin =\
    \ 2)\nprint a\n```\n\nThe output is as follows -\n\n```\n[[1, 2, 3, 4, 5]]\n```\n\
    \nThe **ndarray** object consists of contiguous one-dimensional segment of computer\
    \ memory, combined with an indexing scheme that maps each item to a location in\
    \ the memory block. The memory block holds the elements in a row-major order (C\
    \ style) or a column-major order (FORTRAN or MatLab style).\n\n### Python Lists\
    \ vs. Numpy Arrays - What is the difference?\n\n**Numpy** is the core library\
    \ for scientific computing in Python. It provides a high-performance multidimensional\
    \ array object, and tools for working with these arrays. A numpy array is a grid\
    \ of values, all of the same type, and is indexed by a tuple of nonnegative integers.\
    \ The number of dimensions is the *rank* of the array; the *shape* of an array\
    \ is a tuple of integers giving the size of the array along each dimension.\n\n\
    The Python core library provided **Lists**. A list is the Python equivalent of\
    \ an array, but is resizable and can contain elements of different types.\n\n\
    A common beginner question is what is the real difference here. The answer is\
    \ performance. Numpy data structures perform better in:\n\n- **Size** - Numpy\
    \ data structures take up less space\n- **Performance** - they have a need for\
    \ speed and are faster than lists\n- **Functionality** - SciPy and NumPy have\
    \ optimized functions such as linear algebra operations built in."
