    message_label.grid(row=0, column=0)\nentry.grid(row=0, column=1)\ncalc_button.grid(row=0,\
    \ column=2)\noutput_label.grid(row=1, column=0, columnspan=3)\nmainloop()\n```\n\
    \n程序的输出如下：\n\n![](img/e3dac7e08bdd357a94774b55d90b82a8_320_0.png)\n\n程序组件的详细说明。\n\
    \n## Label 组件\n\nLabel 是一个容器，用于在屏幕上放置一些文本。以下代码创建一个 Label 并将其放置在屏幕上。\n\n```\nhllo_label=Label(text='hello')\n\
    hllo_label.grid(row=0, column=0)\n```\n\n我们调用 Label 来创建一个新的标签，标签名为 hllo_label。创建后，使用\
    \ grid 方法将标签放置在屏幕上。\n\n## Label 的选项\n\n有许多选项可以更改，包括字体大小和颜色。以下是一些示例：\n\n```\nhello_label\
    \ = Label(text='hello', font=('Arial', 14, 'bold'), bg='blue', fg='white')\n```\n\
    \n注意关键字参数的使用。\n\n以下是一些常见选项：\n\n- **font** 基本结构是 font= (字体名称, 字体大小, 样式)。\n  你可以省略字体大小或样式。样式的选择有\
    \ 'bold'、'italic'、'underline'、'overstrike'、'roman' 和 'normal'（默认值）。我们可以组合多种样式，例如：'bold\
    \ underline italic'。\n- **fg 和 bg** 这些代表前景色和背景色。可以使用许多常见的颜色名称，如 'red'、'yellow'\
    \ 等。\n- **width** 这是标签应具有的字符长度。\n- **height** 这是标签应具有的行高。\n  你可以将其用于多行标签。\n  在文本中使用换行符使其跨越多行。\n\
    \  例如，text='hello \\n ajit'。\n\n## 更改标签属性\n\n在程序的后续部分，创建标签后，你可能想要更改其某些属性。为此，请使用其\
    \ configure 方法。以下是两个更改名为 label 的标签属性的示例：\n\n```\nlabel.configure(text='Bye Bye')\n\
    label.configure(bg='white', fg='red')\n```\n\n使用 configure 方法设置文本有点像 GUI 等效的 **print**\
