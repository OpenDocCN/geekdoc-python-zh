    \ the canvas wont recognize the keypress unless it has the GUIs focus. This can\
    \ be done as below:\n\n```\ncanvas.focus_set()\n```\n\n# Event examples\n\n**Example\
    \ 1** An example where we can move a rectangle with the up or down arrow keys.\n\
    \n```\nfrom tkinter import *\ndef callback(event):\n    global move\n    if event.keysym=='Up':\n\
    \        move += 1\n    elif event.keysym=='Down':\n        move -=1\n    canvas.coords(rect,50+move,50,100+move,100)\n\
    root = Tk()\nroot.bind('<Key>', callback)\ncanvas = Canvas(width=200,height=200)\n\
    canvas.grid(row=0,column=0)\nrect = canvas.create_rectangle(50,50,100,100,fill='blue')\n\
    move = 0\n```"
