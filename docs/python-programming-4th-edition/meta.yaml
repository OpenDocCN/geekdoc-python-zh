  md: 'In addition to **keys** and **values** methods, there is also the **items**
    method that returns a list of items of the form (key, value). The items are not
    returned in any particular order:


    ```

    >>> d = {''first'':''string value'', ''second'':[1,2]}

    >>> d.items()

    [(''a'', ''string value''), (''b'', [1, 2])]

    ```


    The **iteritems** method works in much the same way, but returns an iterator instead
    of a list.

    You can check for the existence of a specific key with **has_key**:


    ```

    >>> d.has_key(''first'')

    True

    ```


    The expression **d.has_key(k)** is equivalent to **k in d**. The choice of which
    to use is largely a matter of taste.

    In order to get the value corresponding to a specific key, use **get** or **pop**:


    ```

    >>> d.get(''first'') # this method can set an optional value, if the key is not
    found

