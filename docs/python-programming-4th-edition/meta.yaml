    | 4 | 4 | 12 | C | 32 | 20 | 200 | C8 |\n| 5 | 5 | 13 | D | 33 | 21 | 254 | FE\
    \ |\n| 6 | 6 | 14 | E | 48 | 30 | 255 | FF |\n| 7 | 7 | 15 | F | 64 | 40 | 256\
    \ | 100 |\n\nBecause the color component values run from 0 to 255, they will run\
    \ from 0 to FF in hexadecimal, and thus are described by two hex digits. A typical\
    \ color in Tkinter is specified like this: '#A202FF'. The color name is prefaced\
    \ with a pound sign. Then the first two digits are the red component (in this\
