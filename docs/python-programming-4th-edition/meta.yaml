    \ 20 的记录的步骤 –\n\n```python\nimport MySQLdb\n# Open database connection\ndb = MySQLdb.connect(\"\
    localhost\",\"ajituser\",\"pass123\",\"WORKDB\" )\n\n# prepare a cursor object\
    \ using cursor() method\ncursor = db.cursor()\n\n# Prepare SQL query to DELETE\
    \ required records\nsql = \"DELETE FROM EMPLOYEE WHERE AGE > '%d'\" % (20)\ntry:\n\
    \    # Execute the SQL command\n    cursor.execute(sql)\n    # Commit your changes\
    \ in the database\n    db.commit()\nexcept:\n    # Rollback in case there is any\
    \ error\n    db.rollback()\n\n# disconnect from server\ndb.close()\n```\n\n##\
    \ 执行事务\n\n事务是一种确保数据一致性的机制。事务具有以下四个特性 –\n\n- **原子性** – 一个事务要么完全完成，要么根本不发生。\n- **一致性**\
    \ – 事务必须从一个一致的状态开始，并在结束时使系统保持一致的状态。\n- **隔离性** – 事务的中间结果在当前事务之外是不可见的。\n- **持久性**\
    \ – 一旦事务被提交，其效果就是持久的，即使在系统故障之后也是如此。\n\nPython DB API 2.0 提供了两种方法来*提交*或*回滚*事务。\n\
    \n### 示例\n\n你已经知道如何实现事务了。这里再给出一个类似的例子 –\n\n```python\n# Prepare SQL query to DELETE\
    \ required records\nsql = \"DELETE FROM EMPLOYEE WHERE AGE > '%d'\" % (20)\ntry:\n\
    \    # Execute the SQL command\n    cursor.execute(sql)\n    # Commit your changes\
    \ in the database\n    db.commit()\nexcept:\n    # Rollback in case there is any\
    \ error\n    db.rollback()\n```\n\n## COMMIT 操作\n\n提交是向数据库发出最终确认更改信号的操作，在此操作之后，任何更改都无法回退。\n\
    \n这是一个调用 **commit** 方法的简单示例。\n\n```python\ndb.commit()\n```\n\n## ROLLBACK 操作\n\
    \n如果你对一个或多个更改不满意，并且希望完全撤销这些更改，请使用 **rollback()** 方法。\n\n这是一个调用 **rollback()**\
    \ 方法的简单示例。\n\n```python\ndb.rollback()\n```\n\n## 断开数据库连接\n\n要断开数据库连接，请使用 close()\
    \ 方法。\n\n```python\ndb.close()\n```\n\n如果用户使用 close() 方法关闭了数据库连接，数据库会回滚任何未完成的事务。然而，与其依赖数据库底层的任何实现细节，你的应用程序最好显式地调用\
    \ commit 或 rollback。\n\n## 从 Python 连接并运行 Oracle 数据库的 SQL 查询\n\n从 Python 连接到 Oracle\
    \ 数据库，可以运行基本的 SQL 查询，这些查询可用于地理处理任务。\n可以使用 cx_Oracle Python 扩展从 Python 程序访问 Oracle\
    \ 数据库模式。\n**cx_Oracle** 是一个 Python 扩展模块，它支持访问 Oracle 数据库。它符合 Python 数据库 API 2.0\
    \ [规范](https://www.python.org/dev/peps/pep-0249/)，并包含大量新增内容和少量排除项。\n\ncx_Oracle\
    \ 6 已在 Python 2.7 版本以及 3.4 及更高版本上进行了测试。你可以将 cx_Oracle 与 Oracle 11.2、12.1 和 12.2\
    \ 客户端库一起使用。Oracle 的标准客户端-服务器版本互操作性允许连接到较旧和较新的数据库。例如，Oracle 12.2 客户端库可以连接到 Oracle\
    \ Database 11.2。\n\n以下说明描述了如何从 Python 脚本连接到 Oracle 数据库并运行 SQL 查询。\n\n### 先决条件\n\
    \n对于本次实践环节，以下内容已为你安装：\n\n1.  Oracle Database 11gR2，用户为 \"ajituser\"，密码（区分大小写）为\
    \ \"ajitpassword\"。此模式中的示例表 student_marks 来自 Oracle 的 orcl 实例。\n2.  Python 3.11\
    \ 及 cx_Oracle 6 扩展。\n\n**注意：** 建议安装与已安装数据库客户端版本相对应的 cx_Oracle 版本。例如，如果你有 10g 客户端，则安装\
    \ 10g 版本的 Oracle，否则你可能会遇到错误，如 cx_Oracle.DatabaseError: ORA-24315: illegal attribute\
    \ type\n\n### 步骤\n\n1.  下载并安装适用于已安装 Python 版本（例如 Python 2.6、2.7、3.11 等）的相应 cx_Oracle\
    \ 模块：\n    http://cx-oracle.sourceforge.net/\n    cx_Oracle 是一个允许访问 Oracle 数据库的\
    \ Python 扩展模块。\n\n2.  在 Python 脚本中导入该模块：\n    ```python\n    import cx_Oracle\n\
    \    ```\n\n3.  通过向以下连接字符串传递适当的用户名/密码来建立与 Oracle 数据库的连接：\n    ```python\n    connection\
    \ = cx_Oracle.connect('ajituser/ajitpassword@orcl')\n    ```\n    注意：orcl 是 Oracle\
    \ 数据库实例名称，可在 tnsnames.ora 文件中找到。\n\n    查看以下代码，该代码包含在 c:\\python\\bin 目录中的 connect.py\
    \ 文件中。\n\n    ```python\n    import cx_Oracle\n    con = cx_Oracle.connect('ajituser/ajitpassword@127.0.0.1/orcl')\n\
    \    print con.version\n    con.close()\n    ```\n\n    导入 cx_Oracle 模块以提供访问 Oracle\
    \ 数据库的 API。许多内置和第三方模块都可以通过这种方式包含在 Python 脚本中。\n\n    connect() 方法接收用户名 \"ajituser\"\
    、密码 \"ajitpassword\" 和连接字符串。在这种情况下，使用了 Oracle 的 Easy Connect 连接字符串语法。它由你的机器 IP\
    \ 和数据库服务名 \"orcl\" 组成。\n\n    close() 方法关闭连接。任何未显式关闭的连接将在脚本结束时自动释放。\n\n    在命令行终端中运行：\n\
    \    ```\n    C:\\python\\bin>python connect.py\n    11.2.0.1.0\n    ```\n\n4.\
    \  定义一个参数以访问游标方法：\n    ```python\n    cursor = connection.cursor()\n    ```\n\n\
    5.  创建查询字符串：\n    ```python\n    querystring = \"select * from Students\"\n  \
    \  ```\n\n6.  将查询字符串传递给游标方法：\n    ```python\n    cursor.execute(querystring)\n\
    \    ```\n\n### 示例\n\n以下示例程序展示了如何发出 SQL SELECT 命令从数据库检索数据，以及如何收集和打印检索到的数据。\n\n\
    ```python\nimport cx_Oracle\nconnstr='ajituser/passabc@127.0.0.1/orcl'\nconn =\
    \ cx_Oracle.connect(connstr)\ncurs = conn.cursor()\ncurs.arraysize=50\ncurs.execute('SELECT\
    \ STUDENT_NO, MODULE_CODE, MARK from Student_marks where MARK >= 70 order by MARK\
    \ desc')\nprint \"Student No\\tModule\\tMarks\\n\"\nfor column_1, column_2, column_3\
    \ in curs.fetchall():\n    print column_1, \"\\t\", column_2, \"\\t\", column_3\n\
    curs.close()\nconn.close()\n```\n\n运行此程序时，会产生以下输出：\n\n```\nStudent No  Module\
    \  Marks\n20060101    CM0001  80\n20060103    CM0002  75\n20060102    CM0001 \
    \ 75\n20060102    CM0004  70\n```\n\n## 错误处理\n\n错误来源有很多。例如，执行的 SQL 语句中的语法错误、连接失败，或者对已取消或已完成的语句句柄调用\
    \ fetch 方法。\n\nDB API 定义了许多必须存在于每个数据库模块中的错误。下表列出了这些异常。\n\n| 序号 | 异常与描述 |\n| :---\
    \ | :--- |\n| 1 | **Warning**<br>用于非致命问题。必须是 StandardError 的子类。 |\n| 2 | **Error**<br>错误的基类。必须是\
    \ StandardError 的子类。 |\n| 3 | **InterfaceError**<br>用于数据库模块本身的错误，而非数据库本身的错误。必须是\
    \ Error 的子类。 |\n| 4 | **DatabaseError**<br>用于数据库中的错误。必须是 Error 的子类。 |"
