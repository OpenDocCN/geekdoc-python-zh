    \ a problem to interpret. Exception clauses are relatively expensive, measured\
    \ by the time spent to understand their intent.\n\n## Chapter 14\n\n## Multithreaded\
    \ Programming\n\nMultithreading is a core concept of software programming that\
    \ almost all the high-level programming languages support. And Python multithreading\
    \ is one of the best examples.\n\nRunning several threads is similar to running\
    \ several different processes concurrently, but with the following benefits –\n\
    \nMultiple threads within a process share the same data space with the main thread\
    \ and can therefore share information or communicate with each other more easily\
    \ than if they were separate processes.\n\nThreads sometimes called light-weight\
    \ processes and they do not require much memory overhead; they are cheaper than\
    \ processes.\n\nA thread has a beginning, an execution sequence, and a conclusion.\
    \ It has an instruction pointer that keeps track of where within its context it\
    \ is currently running.\n\nIt can be pre-empted (interrupted).\n\nIt can temporarily\
    \ be put on hold (also known as sleeping) while other threads are running - this\
    \ is called yielding.\n\n## Starting a New Thread\n\nTo spawn another thread,\
    \ you need to call following method available in thread module:\n`thread.start_new_thread(function,\
    \ args[, kwargs])`\n\nThis method call enables a fast and efficient way to create\
    \ new threads in both Linux and Windows.\n\nThe method call returns immediately\
    \ and the child thread starts and calls function with the passed list of args.\
    \ When function returns, the thread terminates.\n\nHere, args is a tuple of arguments;\
    \ use an empty tuple to call function without passing any arguments. kwargs is\
    \ an optional dictionary of keyword arguments.\n\n## Example\n\n```python\n#!/usr/bin/python\n\
    import thread\nimport time\n\n# Define a function for the thread\ndef print_time(threadName,\
    \ delay):\n    count = 0\n    while count < 5:\n        time.sleep(delay)\n  \
    \      count += 1\n        print \"%s: %s\" % (threadName, time.ctime(time.time()))\n\
    \n# Create two threads as follows\ntry:\n    thread.start_new_thread(print_time,\
