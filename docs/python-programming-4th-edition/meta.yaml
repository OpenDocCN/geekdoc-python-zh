    # int(x)


    Generates an integer from the object x. If x is a floating point number, digits
    to the right of the decimal point are truncated as part of creating an integer.
    If the floating point number is more than about 10 digits, a long integer object
    is created to retain the precision. If x is a long integer that is too large to
    be represented as an integer, theres no conversion. Complex values cant be turned
    into integers directly. If x is a string, the string is parsed to create an integer
    value. It must be a string of digits with an optional sign (+ or -).


