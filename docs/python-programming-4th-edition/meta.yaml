    我们在 *创建或扩展数据类型* 中使用了此库。


    ## 二分查找模块

    `bisect` 模块包含 `bisect()` 函数，用于在已排序的列表中搜索特定值。它还包含 `insort()` 函数，用于在保持排序顺序的前提下将项目插入列表。此模块比简单地将值追加到列表并调用列表的
    `sort()` 方法执行得更快。此模块的源代码作为精心设计算法的范例，具有指导意义。


    ## 数组模块

    `array` 模块为你提供了一个高性能、高度紧凑的值集合。它不像列表或元组那样灵活，但它速度快且占用内存相对较少。这对于处理图像或声音文件等媒体非常有帮助。


    ## 调度模块

    `sched` 模块包含调度器类的定义，用于构建一个简单的任务调度器。构造调度器时，会提供两个用户提供的函数：一个返回时间，另一个执行延迟等待时间到达。对于实时调度，可以使用
    `time` 模块的 `time()` 和 `sleep()` 函数。调度器有一个主循环，它调用提供的时间函数，并将当前时间与计划任务的时间进行比较；然后，它调用提供的延迟函数来处理时间差。它运行计划任务，并调用持续时间为零的延迟函数以释放任何资源。


    ## 复制模块

    `copy` 模块包含用于复制复杂对象的函数。此模块包含一个函数用于创建对象的 *浅拷贝*，其中父对象内包含的任何对象不会被复制，而是在父对象中插入引用。它还包含一个函数用于创建对象的
    *深拷贝*，其中父对象内包含的所有对象都会被复制。

    请注意，Python 的简单赋值只是创建一个指向对象的变量（即标签或引用），而不是创建副本。此模块是创建独立副本的最简单方法。


    ## 美化打印模块

    `pprint` 模块包含一些有用的函数，例如 `pprint.pprint()`，用于打印嵌套列表和字典的易读表示。它还有一个 `PrettyPrinter`
    类，你可以从中创建子类来自定义列表、字典或其他对象的打印方式。


    ## 数值和数学模块

    这些模块包含更专业的数学函数和一些额外的数值数据类型。


    ### 十进制模块

    `decimal` 模块提供基于十进制的算术运算，可正确处理有效数字、舍入以及货币金额中常见的其他特性。


    ### 数学模块

    `math` 模块在 *math 模块* 中已介绍。它包含正弦、余弦和平方根等数学函数。


    ### 随机模块

    `random` 模块在 *math 模块* 中已介绍。


    ## 文件和目录访问

    我们将在 *文件处理模块* 中介绍其中的许多模块。这些是处理数据文件所必需的模块。


    -   **os.path** `os.path` 模块对于创建可移植的 Python 程序至关重要。流行的操作系统（Linux、Windows 和 MacOS）对文件名的处理方式各不相同。依赖
    `os.path` 的 Python 程序在所有环境中行为将更加一致。

    -   **fileinput** `fileinput` 模块帮助你的程序平稳、简单地处理大量文件。

    -   **glob**

    -   **fnmatch** `glob` 和 `fnmatch` 模块帮助 Windows 程序以标准方式处理通配符文件名。

    -   **shutil** `shutil` 模块提供类似 shell 的实用程序，用于文件复制、文件重命名、目录移动等。此模块让你能够编写简短、高效的
    Python 程序来完成通常由 shell 脚本完成的任务。


    为什么使用 Python 而不是 shell？Python 更易于阅读，效率更高，并且更有能力编写中等复杂度的程序。使用 Python 可以让你免于编写冗长、痛苦的
    shell 脚本。


    ## 数据压缩和归档

    这些模块处理各种可用的文件压缩算法。我们将在 *文件处理模块* 中介绍这些模块。


    -   **tarfile**

    -   **zipfile** 这两个模块创建归档文件，其中包含捆绑在一起的多个文件。TAR 格式未压缩，而 ZIP 格式是压缩的。通常，TAR 归档文件使用
    GZIP 压缩以创建 `.tar.gz` 归档文件。

    -   **zlib**

    -   **gzip**

    -   **bz2** 这些模块采用不同的压缩算法。它们都具有类似的功能来压缩或解压缩文件。


    ## 文件格式

    这些是用于读写几种常见文件格式的模块。除了这些常见格式外，第 20 章 *结构化标记处理工具* 中的模块也很重要。


    ### csv 模块

    `csv` 模块帮助你解析和创建逗号分隔值（CSV）数据文件。这有助于你与许多生成或使用 CSV 文件的桌面工具交换数据。我们将在 *逗号分隔值：csv 模块*
    中介绍此内容。


    ### ConfigParser 模块

    配置文件可以采用多种形式。最简单的方法是使用 Python 模块作为大型复杂程序的配置。有时配置被编码在 XML 中。

    许多 Windows 遗留程序使用 `.INI` 文件。`ConfigParser` 可以优雅地解析这些文件。


    ## 加密服务

    这些模块并非专门的加密模块。许多流行的加密算法受专利保护。通常，出于性能原因，加密需要编译模块。这些模块使用各种算法计算消息的安全摘要。


    ### hashlib 模块

    计算消息的安全哈希或摘要，以确保其未被篡改。

    `hashlib.md5` 类创建 MD5 哈希，通常用于验证下载的文件是否正确且完整地接收。


    ## 通用操作系统服务

    以下模块包含所有操作系统共有的基本功能。这种通用性大部分是通过使用 C 标准库实现的。使用此模块，你可以确保你的 Python 应用程序可移植到几乎任何操作系统。


    ### os 模块

    `os`（和 `os.path`）模块提供对许多操作系统功能的访问。`os` 模块提供对进程、文件和目录的控制。我们将在 *os 模块* 和 *os.path
    模块* 中介绍 `os` 和 `os.path`。


    ### time 模块

    `time` 模块提供用于时间和日期处理的基本函数。此外，`datetime` 比 `time` 更优雅地处理日历的细节。我们将在 *日期和时间：time
    和 datetime 模块* 中详细介绍这两个模块。

    拥有像 `datetime` 和 `time` 这样的模块意味着你永远不需要尝试自己进行日历计算。90 年代后期学到的重要教训之一是，许多程序员喜欢处理日历计算，但由于无数的小问题，他们的努力不得不经过测试和返工。


    ### getopt 模块

    ### optparse 模块

    一个编写良好的程序会利用命令行接口。它通过选项和参数以及属性文件进行配置。我们将在 *程序：独立运行* 中介绍 `optparse`。

    Windows 的命令行程序还需要使用 `glob` 模块来执行标准的文件名通配。


    ### logging 模块

    通常，你需要一个简单、标准化的日志来记录错误以及调试信息。我们将在 *日志文件：logging 模块* 中详细介绍 `logging`。


    ## 进程间通信和网络

    本节包括用于创建进程和使用标准套接字抽象进行简单 *进程间通信*（IPC）的模块。


    ### subprocess 模块

    `subprocess` 模块提供了创建独立进程所需的类。标准方法称为 *分叉*（forking）子进程。在 Windows 下，提供了类似的功能。

    使用此模块，你可以编写一个 Python 程序，该程序可以运行计算机上的任何其他程序。这对于自动化复杂任务非常方便，它允许你用 Python 脚本替换笨重、困难的
    shell 脚本。


    ### socket 模块

    这是标准套接字库的 Python 实现，支持 TCP/IP 协议。


    ## 互联网数据处理

    互联网数据处理模块包含许多便捷的算法。大量数据由互联网请求注释（RFC）定义。由于这些有效地标准化了'
