    - 简介

    - 内置对象。本章提供了内置函数、异常和常量的完整文档。

    - 内置类型。我们研究过的所有数据类型都在库参考的这一章中有完整记录。当然，Python 参考中还有一些我们尚未研究过的额外类型。

    - 字符串服务。本章包含近十几个用于各种字符串和文本处理的模块。这包括正则表达式模式匹配、Unicode 编解码器和其他字符串处理模块。

