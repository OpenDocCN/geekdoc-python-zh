  - '[PAGE 267]


    The **ndarray** object consists of contiguous one-dimensional segment of computer
    memory, combined with an indexing scheme that maps each item to a location in
    the memory block. The memory block holds the elements in a row-major order (C
    style) or a column-major order (FORTRAN or MatLab style).


    # **Python Lists vs. Numpy Arrays - What is the difference?**


    **Numpy** is the core library for scientific computing in Python. It provides
    a high-performance multidimensional array object, and tools for working with these
    arrays. A numpy array is a grid of values, all of the same type, and is indexed
    by a tuple of nonnegative integers. The number of dimensions is the *rank* of
    the array; the *shape* of an array is a tuple of integers giving the size of the
    array along each dimension.


    The Python core library provided **Lists**. A list is the Python equivalent of
    an array, but is resizable and can contain elements of different types.


    A common beginner question is what is the real difference here. The answer is
    performance. Numpy data structures perform better in:


    +   - **Size** - Numpy data structures take up less space

    - **Performance** - they have a need for speed and are faster than lists

    - **Functionality** - SciPy and NumPy have optimized functions such as linear
    algebra operations built in.'
- md: "## NumPy - Data Types\n\nNumPy supports a much greater variety of numerical\
    \ types than Python does. The following table shows different scalar data types\
    \ defined in NumPy.\n\n| Sr.No. | Data Types & Description |\n| :--- | :--- |\n\
    | 1 | **bool_** Boolean (True or False) stored as a byte |\n| 2 | **int_** Default\
    \ integer type (same as C long; normally either int64 or int32) |\n| 3 | **Intc**\
    \ Identical to C int (normally int32 or int64) |\n| 4 | **Intp** Integer used\
    \ for indexing (same as C ssize_t; normally either int32 or int64) |\n| 5 | **int8**\
    \ Byte (-128 to 127) |\n| 6 | **int16** Integer (-32768 to 32767) |\n| 7 | **int32**\
    \ Integer (-2147483648 to 2147483647) |\n| 8 | **int64** Integer (-9223372036854775808\
    \ to 9223372036854775807) |\n| 9 | **uint8** Unsigned integer (0 to 255) |\n|\
    \ 10 | **uint16** Unsigned integer (0 to 65535) |\n| 11 | **uint32** Unsigned\
    \ integer (0 to 4294967295) |\n| 12 | **uint64** Unsigned integer (0 to 18446744073709551615)\
    \ |\n| 13 | **float_** Shorthand for float64 |\n| 14 | **float16** Half precision\
    \ float: sign bit, 5 bits exponent, 10 bits mantissa |\n| 15 | **float32** Single\
    \ precision float: sign bit, 8 bits exponent, 23 bits mantissa |\n| 16 | **float64**\
    \ Double precision float: sign bit, 11 bits exponent, 52 bits mantissa |\n| 17\
    \ | **complex_** Shorthand for complex128 |\n| 18 | **complex64** Complex number,\
    \ represented by two 32-bit floats (real and imaginary components) |\n| 19 | **complex128**\
    \ Complex number, represented by two 64-bit floats (real and imaginary components)\
    \ |\n\nNumPy numerical types are instances of dtype (data-type) objects, each\
    \ having unique characteristics. The dtypes are available as np.bool_, np.float32,\
    \ etc.\n\n## Data Type Objects (dtype)\n\nA data type object describes interpretation\
    \ of fixed block of memory corresponding to an array, depending on the following\
    \ aspects –\n\n- Type of data (integer, float or Python object)\n- Size of data\n\
    - Byte order (little-endian or big-endian)\n- In case of structured type, the\
    \ names of fields, data type of each field and part of the memory block taken\
    \ by each field.\n- If data type is a subarray, its shape and data type\n\nThe\
    \ byte order is decided by prefixing '<' or '>' to data type. '<' means that encoding\
    \ is little-endian (least significant is stored in smallest address). '>' means\
    \ that encoding is big-endian (most significant byte is stored in smallest address).\n\
    \nA dtype object is constructed using the following syntax –\n\n```\nnumpy.dtype(object,\
    \ align, copy)\n```\n\nThe parameters are –\n\n- **Object** – To be converted\
    \ to data type object\n- **Align** – If true, adds padding to the field to make\
    \ it similar to C-struct\n- **Copy** – Makes a new copy of dtype object. If false,\
    \ the result is reference to builtin data type object\n\n## Example 1\n\n```\n\
    # using array-scalar type\nimport numpy as np\ndt = np.dtype(np.int32)\nprint\
    \ dt\n```\n\nThe output is as follows –\n\n```\nint32\n```\n\n## Example 2\n\n\
    ```\n#int8, int16, int32, int64 can be replaced by equivalent string 'i1', 'i2','i4',\
    \ etc.\nimport numpy as np\n\ndt = np.dtype('i4')\nprint dt\n```\n\nThe output\
    \ is as follows –\n\n```\nint32\n```\n\nThe following examples show the use of\
    \ structured data type. Here, the field name and the corresponding scalar data\
    \ type is to be declared.\n\n## Example 3\n\n```\n# first create structured data\
    \ type\nimport numpy as np\ndt = np.dtype([('empage',np.int8)])\nprint dt\n```\n\
    \nThe output is as follows –\n\n```\n[('empage', 'i1')]\n```\n\nEach built-in\
    \ data type has a character code that uniquely identifies it.\n\n- 'b' – boolean\n\
    - 'i' – (signed) integer\n- 'u' – unsigned integer\n- 'f' – floating-point\n-\
    \ 'c' – complex-floating point\n- 'm' – timedelta\n- 'M' – datetime\n- 'O' – (Python)\
    \ objects\n- 'S', 'a' – (byte-)string\n- 'U' – Unicode\n- 'V' – raw data (void)\n\
    \n## NumPy – Ways of Array Creation\n\nA new **ndarray** object can be constructed\
    \ by any of the following array creation routines or using a low-level ndarray\
    \ constructor.\n\n## numpy.empty\n\nIt creates an uninitialized array of specified\
    \ shape and dtype. It uses the following constructor –\n\n```\nnumpy.empty(shape,\
    \ dtype = float, order = 'C')\n```\n\nThe constructor takes the following parameters.\n\
    \n| Sr.No. | Parameter & Description |\n| :--- | :--- |\n| 1 | **Shape** Shape\
    \ of an empty array in int or tuple of int |\n| 2 | **Dtype** Desired output data\
    \ type. Optional |\n| 3 | **Order** 'C' for C-style row-major array, 'F' for FORTRAN\
    \ style column-major array |\n\nExample\n\nThe following code shows an example\
    \ of an empty array.\n\n```\nimport numpy as np\nx = np.empty([3,2], dtype = int)\n\
    print x\n```\n\nThe output is as follows –\n\n```\n[[22649312  1701344351]\n [1818321759\
    \ 1885959276]\n [16779776  156368896]]\n```\n\n**Note** – The elements in an array\
    \ show random values as they are not initialized.\n\n## numpy.zeros\n\nReturns\
    \ a new array of specified size, filled with zeros.\n\n```\nnumpy.zeros(shape,\
    \ dtype = float, order = 'C')\n```\n\nThe constructor takes the following parameters.\n\
    \n| Sr.No. | Parameter & Description |\n| :--- | :--- |\n| 1 | **Shape** Shape\
    \ of an empty array in int or sequence of int |\n| 2 | **Dtype** Desired output\
    \ data type. Optional |\n| 3 | **Order** 'C' for C-style row-major array, 'F'\
    \ for FORTRAN style column-major array |\n\n## Example 1\n\n```\n# array of five\
    \ zeros. Default dtype is float\nimport numpy as np\nx = np.zeros(5)\nprint x\n\
    ```\n\nThe output is as follows -\n\n```\n[ 0. 0. 0. 0. 0.]\n```\n\n## Example\
    \ 2\n\n```\nimport numpy as np\nx = np.zeros((5,), dtype = np.int)\nprint x\n\
    ```\n\nNow, the output would be as follows -\n\n```\n[0 0 0 0 0]\n```\n\n## numpy.ones\n\
    \nReturns a new array of specified size and type, filled with ones.\n\n```\nnumpy.ones(shape,\
    \ dtype = None, order = 'C')\n```\n\nThe constructor takes the following parameters.\n\
    \n| Sr.No. | Parameter & Description |\n| :--- | :--- |\n| 1 | **Shape**<br>Shape\
    \ of an empty array in int or tuple of int |\n| 2 | **Dtype**<br>Desired output\
    \ data type. Optional |\n| 3 | **Order**<br>'C' for C-style row-major array, 'F'\
    \ for FORTRAN style column-major array |\n\nExample 1\n\n```\n# array of five\
    \ ones. Default dtype is float\nimport numpy as np\nx = np.ones(5)\nprint x\n\
    ```\n\nThe output is as follows -\n\n```\n[ 1. 1. 1. 1. 1.]\n```\n\n## Example\
    \ 2\n\n```\nimport numpy as np\nx = np.ones([2,2], dtype = int)\nprint x\n```\n\
    \nNow, the output would be as follows –\n\n```\n[[1 1]\n [1 1]]\n```\n\n## Introduction\
    \ to Data Structures\n\nPandas deals with the following three data structures\
    \ –\n\n- Series\n- DataFrame\n- Panel\n\nThese data structures are built on top\
    \ of Numpy array, which means they are fast.\n\n## Dimension & Description\n\n\
    The best way to think of these data structures is that the higher dimensional\
    \ data structure is a container of its lower dimensional data structure. For example,\
    \ DataFrame is a container of Series, Panel is a container of DataFrame.\n\n|\
    \ Data Structure | Dimensions | Description |\n| :--- | :--- | :--- |\n| Series\
    \ | 1 | 1D labeled homogeneous array, sizeimmutable. |\n| Data Frames | 2 | General\
    \ 2D labeled, size-mutable tabular structure with potentially heterogeneously\
    \ typed columns. |\n| Panel | 3 | General 3D labeled, size-mutable array. |\n\n\
    ## Python Pandas - Series\n\nSeries is a one-dimensional labeled array capable\
    \ of holding data of any type (integer, string, float, python objects, etc.).\
    \ The axis labels are collectively called index.\n\npandas.Series\n\nA pandas\
    \ Series can be created using the following constructor –\n\n```\npandas.Series(\
    \ data, index, dtype, copy)\n```\n\nThe parameters of the constructor are as follows\
    \ –\n\n| S.No | Parameter & Description |\n| :--- | :--- |\n| 1 | **Data** data\
    \ takes various forms like ndarray, list, constants |\n| 2 | **Index** Index values\
    \ must be unique and hashable, same length as data. Default **np.arange(n)** if\
    \ no index is passed. |\n| 3 | **Dtype** dtype is for data type. If None, data\
    \ type will be inferred |\n| 4 | **copy** Copy data. Default False |\n\nA series\
    \ can be created using various inputs like –\n\n- Array\n- Dict\n- Scalar value\
    \ or constant\n\n## **Create an Empty Series**\n\nA basic series, which can be\
