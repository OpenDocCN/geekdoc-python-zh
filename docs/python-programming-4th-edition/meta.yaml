  - '[PAGE 391]


    **Internationalization.** A well-written application avoids including messages
    as literal strings within the program text. Instead, all messages, prompts, labels,
    etc., are kept as a separate resource. These separate string resources can then
    be translated.


    **locale** The locale module fetches the current locales date, time, number and
    currency format-ting rules. This provides functions which will format and parse
    dates, times, numbers and cur-rency amounts.


    A user can change their locale with simple operating system settings, and your
    application can work consistently with all other programs.


    **Program Frameworks.** Well talk about a number of program-related issues in
    *Programs: Standing Alone* and *Architecture: Clients, Servers, the Internet and
    the World Wide Web*. Much of this goes beyond the standard Python library. Within
    the library are two modules that can help you create large, sophisticated command-line
    application programs.


    **cmd** The cmd module contains a superclass useful for building the main command-reading
    loop of an interactive program. The standard features include printing a prompt,
    reading com-mands, providing help and providing a command history bu er. A subclass
    is expected to provide functions with names of the form do_command(). When the
    user enters a line be-ginning with command, the appropriate do_command() function
    is called.


    **shlex** The shlex module can be used to tokenize input in a simple language
    similar to the Linux shell languages. This module defines a basic shlex class
    with parsing methods that can sep-arate words, quotes strings and comments, and
    return them to the requesting program.'
  - "[PAGE 392]\n\n**Development Tools.** The testing tools are central to creating\
    \ reliable, complete and correct software.\n\n**doctest** When a function or a\
    \ class docstring includes a snippet of interactive Python, the doctest module\
    \ can use this snippet to confirm that the function or class works as advertised.\n\
    \nFor example:\n\n```\ndef myFunction( a, b ):\n    \"\"\">>> myFunction( 2, 3\
    \ ) 6\n    >>> myFunction( 5.0, 7.0 ) 35.0\n    \"\"\"\n    return a * b\n```\n\
    \nThe >>> myFunction( 2, 3 ) lines are parsed by doctest. They are evaluated,\
    \ and the actual result compared with the docstring comment.\n\n**unittest** This\
    \ is more sophisticated testing framework in which you create TestCases which\
    \ define a fixture, an operation and expected results.\n\n**2to3** This module\
    \ is used to convert Python 2 files to Python 3.\n\nPrior to using this, you should\
    \ run your Python programs with the -3 option to identify any potential incompatibilities.\
    \ Once youve fixed all of the incompatibilities, you can confidently convert your\
    \ program to Python 3.\n\nDo not tweak the output from this conversion. If your\
    \ converted program doesnt work under Python 3, its almost always a problem with\
    \ your original program playing fast and loose with Python rules."
