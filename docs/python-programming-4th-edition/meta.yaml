    The hour is in 24-hour format. To get 12-hour format, you can do the following:


    ```

    am_pm = ''am'' if d.hour<12 else ''pm'' print(''{}:{}{}''.format(d.hour%12, d.minute,
    am_pm))

    ```


    An alternative way to display the date and time is to use the strftime method.
    It uses a variety of formatting codes that allow you to display the date and time,
    including information about the day of the week, am/pm, etc.

    Here are some of the formatting codes:


    | Code | Description |

    | :--- | :--- |

    | %c | date and time formatted according to local conventions |

    | %x, %X | %x is the date, and %X is the time, both formatted as with %c |

    | %d | day of the month |

    | %j | day of the year |'
