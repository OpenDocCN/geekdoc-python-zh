    \nThere are situations where an expression involves a simple condition and a full-sized\
    \ **if** statement is distracting syntactic overkill. Python has a handy logic\
    \ operator that evaluates a condition, then returns either of two values depending\
    \ on that condition.\n\n### Ternary Operator\n\nMost arithmetic and logic operators\
    \ have either one or two values. An operation that applies to a single value is\
    \ called unary. For example -a and abs(b) are examples of unary operations: unary\
    \ negation and unary absolute value. An operation that applies to two values is\
    \ called binary. For example, a*b shows the binary multiplication operator.\n\n\
    The if-else operator is ternary (or ternary). It involves a conditional expression\
    \ and two alternative expressions. Consequently, it doesn't use a single special\
    \ character, but uses two keywords: if and else.\n\nSome folks will mistakenly\
    \ call it the ternary operator as if this is the only possible ternary operator.\n\
    \nThe basic form of the operator is\nexpression **if** condition **else** expression\n\
    \nPython evaluates the condition in the middle first. If the condition is True,\
    \ then the left-hand expression is evaluated, and that's the value of the operation.\
    \ If the condition is False, then the right-hand expression is evaluated, and\
