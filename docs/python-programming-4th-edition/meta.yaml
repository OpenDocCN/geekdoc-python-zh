    \ last))\n    t.test(lambda first, last: '%s, %s' % (last, first))\n\ntest()\n\
    ```\n\n## The global Statement\n\nIn *Functions and Namespaces* we'll describe\
    \ some of the internal mechanisms Python uses for storing variables. We'll introduce\
    \ the **global** statement in *The global Statement*.\n\nWe'll include a digression\
    \ on the two common argument binding mechanisms: call by value and call by reference\
    \ in *Call By Value and Call By Reference*. Note that this is a distinction that\
    \ doesn't apply to Python, but if you have experience in languages like C or C++,\
    \ you may wonder where and how this is implemented.\n\nFinally, we'll cover some\
    \ aspects of functions as first-class objects in *Function Objects*.\n\n## Functions\
    \ and Namespaces\n\nThis is an overview of how Python determines the meaning of\
    \ a name. We'll omit some details to hit the more important points. For more information,\
    \ see section 4.1 of the *Python Language Reference*.\n\nThe important issue is\
    \ that we want variables created in the body of a function to be private to that\
    \ function. If all variables are global, then each function runs a risk of accidentally\
    \ disturbing the value of a global variable. In the COBOL programming language\
    \ (without using separate compilation or any of the modern extensions) all variables\
    \ are globally declared in the data division, and great care is required to prevent\
    \ accidental or unintended use of a variable.\n\nTo achieve privacy and separation,\
    \ Python maintains several dictionaries of variables. These dictionaries define\
    \ the context in which a variable name is understood. Because these dictionaries\
    \ are used for resolution of variables, which name objects, they are called *namespaces*.\
    \ A global namespace is available to all modules that are part of the currently\
    \ executing Python script. Each module, class, function, lambda, or anonymous\
    \ block of code given to the **exec** command has its own private namespace.\n\
    \nNames are resolved using the nested collection of namespaces that define an\
    \ execution environment. Python always checks the most-local dictionary first,\
    \ ending with the global dictionary.\n\nConsider the following script.\n\n```python\n\
    def deep(a, b):\n    print(\"a=\", a)\n    print(\"b=\", b)\n\ndef shallow(hows,\
    \ things):\n    deep(hows, 1)\n    deep(things, coffee)\n\nhows = 1\ncoffee =\
    \ 2\nshallow(\"word\", 3.1415926)\nshallow(hows, coffee)\n```\n\nThe `deep()`\
    \ function has a local namespace, where two variables are defined: `a` and `b`.\
    \ When `deep()` is called from `shallow()`, there are three nested scopes that\
    \ define the environment: the local namespace for `deep()`, the local namespace\
    \ for `shallow()`, and the global namespace for the main script.\n\nThe `shallow()`\
    \ function has a local namespace, where two variables are defined: `hows` and\
    \ `things`.\n\nWhen `shallow()` is called from the main script, the local `hows`\
    \ is resolved in the local namespace. It hides the global variable with the same\
    \ name.\n\nThe reference to `coffee` is not resolved in the local namespace, but\
    \ is resolved in the global namespace. This is called a *free* variable, and is\
    \ sometimes a symptom of poor software design.\n\nThe main script by definition\
    \ executes in the global namespace, where two variables (`hows` and `coffee`)\
    \ are defined, along with two functions, `deep()` and `shallow()`.\n\n**Some Consequences.**\
    \ Since each imported module exists in its own namespace, all functions and classes\
    \ within that module must have their names qualified by the module name. We saw\
    \ this when we imported `math` and `random`. To use the `sqrt()` function, we\
    \ must say `math.sqrt`, providing the module name that is used to resolve the\
    \ name `sqrt()`.\n\nThis module namespace assures that everything in a module\
    \ is kept separate from other modules. It makes our programs clear by qualifying\
    \ the name with the module that defined the name.\n\nThe module namespace also\
    \ allows a module to have relatively global variables. A module, for example,\
    \ can have variables that are created when the module is imported. In a sense\
    \ these are global to all the functions and classes in the module. However, because\
    \ they are only known within the module's namespace, they won't conflict with\
    \ variables in our program or other modules.\n\nHaving to qualify names within\
    \ a module can become annoying when we are making heavy use of a module. Python\
    \ has ways to put elements of a module into the global namespace. We'll look at\
    \ these in *Components, Modules and Packages*.\n\n**Warning:** Global Warning\n\
    \nThe **global** statement has a consequence of tightly coupling pieces of software.\
    \ This can lead to difficulty in maintenance and enhancement of the program. Classes\
    \ and modules provide better ways to assemble complex programs. As a general policy,\
    \ we discourage use of the **global** statement.\n\n## Exercises\n\n1. Write a\
    \ function called `rectangle` that takes two integers `m` and `n` as arguments\
    \ and prints out an `m` by `n` box consisting of asterisks. Shown below is the\
    \ output of `rectangle(2,4)`:\n   ```\n   ****\n   ****\n   ```\n\n2. Write a\
    \ function called `add_excitement` that takes a list of strings and adds an exclamation\
    \ point (`!`) to the end of each string in the list. The program should modify\
    \ the original list and not return anything.\n\n3. Write a function called `sum_digits`\
    \ that is given an integer `num` and returns the sum of the digits of `num`.\n\
    \n4. The digital root of a number `n` is obtained as follows: Add up the digits\
    \ of `n` to get a new number. Add up the digits of that to get another new number.\
    \ Keep doing this until you get a number that has only one digit. That number\
    \ is the digital root. For example, if `n = 45893`, we add up the digits to get\
    \ `4 + 5 + 8 + 9 + 3 = 29`. We then add up the digits of 29 to get `2 + 9 = 11`.\
    \ We then add up the digits of 11 to get `1 + 1 = 2`. Since 2 has only one digit,\
    \ 2 is our digital root.\n\n5. Write a function that returns the digital root\
    \ of an integer `n`. [Note: there is a shortcut, where the digital root is equal\
    \ to `n mod 9`, but do not use that here.]\n\n6. Write a function called `first_diff`\
    \ that is given two strings and returns the first location in which the strings\
    \ differ. If the strings are identical, it should return -1.\n\n7. Write a function\
    \ that takes an integer `n` and returns a random integer with exactly `n` digits.\
    \ For instance, if `n` is 3, then 125 and 593 would be valid return values, but\
    \ 093 would not because that is really 93, which is a two-digit number.\n\n8.\
    \ Write a function called `number_of_factors` that takes an integer and returns\
    \ how many factors the number has.\n\n9. Write a function called `factors` that\
    \ takes an integer and returns a list of its factors."
  mdcn: "在这个程序中，我们有一个变量 `time_left`，我们希望多个函数都能访问它。如果一个函数想要改变该变量的值，我们需要告诉函数 `time_left`\
    \ 是一个全局变量。我们在函数中使用 `global` 语句来实现这一点。另一方面，如果我们只是想使用全局变量的值，则不需要 `global` 语句。\n\n\
    ## 参数\n\n我们以一点技术细节来结束本章。如果你现在不想纠结细节，可以暂时跳过本节。这里有两个简单的函数：\n\n```python\ndef func1(x):\n\
    \    x = x + 1\n\ndef func2(L):\n    L = L + [1]\n\na = 2\nM = [1, 2, 3]\nfunc1(a)\n\
    func2(M)\n```\n\n当我们用 `a` 调用 `func1`，用 `M` 调用 `func2` 时，一个问题出现了：函数是否改变了 `a` 和\
    \ `M` 的值？答案可能会让你惊讶。`a` 的值没有改变，但 `M` 的值改变了。原因与 Python 处理数字和列表的方式不同有关。列表被称为可变对象，意味着它们可以被改变，而数字和字符串是不可变的，意味着它们不能被改变。\n\
    \n如果我们想反转上面示例的行为，使得 `a` 被修改而 `M` 不被修改，请执行以下操作：\n\n```python\ndef func1(x):\n \
    \   x = x + 1\n    return x\n\ndef func2(L):\n    cpy = L[:]\n    cpy = cpy +\
    \ [1]\n\na = 3\nM = [1, 2, 3]\na = func1(a)  # 注意这一行的变化\nfunc2(M)\n```\n\n## lambda\n\
    \n当你需要一个函数同时满足以下条件时，可以使用 `lambda` 作为便捷方式：\n\n- 是匿名的（不需要名字）并且\n- 只包含一个表达式，没有语句。\n\
    \n示例：\n\n```python\nfn = lambda x, y, z: (x ** 2) + (y * 2) + z\nfn(4, 5, 6)\n\
    \nformat = lambda obj, category: 'The \"%s\" is a \"%s\".' % (obj, category)\n\
    format('pine tree', 'conifer')\n# 输出：'The \"pine tree\" is a \"conifer\".'\n```\n\
    \n`lambda` 可以接受多个参数，并且可以（像函数一样）返回多个值。示例：\n\n```python\na = lambda x, y: (x * 3,\
    \ y * 4, (x, y))\na(3, 4)\n```\n\n建议：在某些情况下，`lambda` 可能作为事件处理器很有用。示例：\n\n```python\n\
    class Test:\n    def __init__(self, first=\"\", last=\"\"):\n        self.first\
    \ = first\n        self.last = last\n\n    def test(self, formatter):\n      \
    \  \"\"\"\n        测试 lambda。\n        formatter 是一个接受两个参数（名和姓）的函数。它应该返回格式化后的名字。\n\
    \        \"\"\"\n        msg = 'My name is %s' % (formatter(self.first, self.last),)\n\
    \        print(msg)\n\ndef test():\n    t = Test('Dave', 'Kuhlman')\n    t.test(lambda\
    \ first, last: '%s %s' % (first, last))\n    t.test(lambda first, last: '%s, %s'\
    \ % (last, first))\n\ntest()\n```\n\n## global 语句\n\n在 *函数与命名空间* 中，我们将描述 Python\
    \ 用于存储变量的一些内部机制。我们将在 *global 语句* 中介绍 **global** 语句。\n\n我们将在 *按值调用与按引用调用* 中插入一段关于两种常见参数绑定机制的讨论：按值调用和按引用调用。请注意，这个区别并不适用于\
    \ Python，但如果你有 C 或 C++ 等语言的经验，你可能会想知道这是在哪里以及如何实现的。\n\n最后，我们将在 *函数对象* 中介绍函数作为一等对象的一些方面。\n\
    \n## 函数与命名空间\n\n这是关于 Python 如何确定名称含义的概述。我们将省略一些细节以突出更重要的要点。更多信息，请参阅 *Python 语言参考*\
    \ 的第 4.1 节。\n\n重要的问题是，我们希望在函数体内创建的变量对该函数是私有的。如果所有变量都是全局的，那么每个函数都有意外干扰全局变量值的风险。在\
    \ COBOL 编程语言中（不使用单独编译或任何现代扩展），所有变量都在数据部分全局声明，需要非常小心以防止意外或无意中使用变量。\n\n为了实现隐私和分离，Python\
    \ 维护了几个变量字典。这些字典定义了变量名被理解的上下文。因为这些字典用于解析变量（即命名对象），所以它们被称为 *命名空间*。全局命名空间对当前执行的\
    \ Python 脚本的所有模块都可用。每个模块、类、函数、lambda 或传递给 **exec** 命令的匿名代码块都有自己的私有命名空间。\n\n名称使用定义执行环境的嵌套命名空间集合来解析。Python\
    \ 总是首先检查最局部的字典，最后检查全局字典。\n\n考虑以下脚本。\n\n```python\ndef deep(a, b):\n    print(\"\
    a=\", a)\n    print(\"b=\", b)\n\ndef shallow(hows, things):\n    deep(hows, 1)\n\
    \    deep(things, coffee)\n\nhows = 1\ncoffee = 2\nshallow(\"word\", 3.1415926)\n\
    shallow(hows, coffee)\n```\n\n`deep()` 函数有一个局部命名空间，其中定义了两个变量：`a` 和 `b`。当从 `shallow()`\
    \ 调用 `deep()` 时，有三个嵌套作用域定义了环境：`deep()` 的局部命名空间、`shallow()` 的局部命名空间以及主脚本的全局命名空间。\n\
    \n`shallow()` 函数有一个局部命名空间，其中定义了两个变量：`hows` 和 `things`。\n\n当从主脚本调用 `shallow()`\
    \ 时，局部的 `hows` 在局部命名空间中被解析。它隐藏了同名的全局变量。\n\n对 `coffee` 的引用没有在局部命名空间中解析，而是在全局命名空间中解析。这被称为\
    \ *自由* 变量，有时是软件设计不良的症状。\n\n主脚本根据定义在全局命名空间中执行，其中定义了两个变量（`hows` 和 `coffee`）以及两个函数\
    \ `deep()` 和 `shallow()`。\n\n**一些后果。** 由于每个导入的模块都存在于自己的命名空间中，该模块内的所有函数和类都必须用模块名来限定它们的名称。我们在导入\
    \ `math` 和 `random` 时看到了这一点。要使用 `sqrt()` 函数，我们必须说 `math.sqrt`，提供用于解析名称 `sqrt()`\
    \ 的模块名。\n\n这个模块命名空间确保模块中的所有内容都与其他模块保持分离。它通过用定义名称的模块来限定名称，使我们的程序清晰明了。\n\n模块命名空间还允许模块拥有相对全局的变量。例如，一个模块可以拥有在导入模块时创建的变量。从某种意义上说，这些变量对模块中的所有函数和类都是全局的。然而，因为它们只在模块的命名空间内已知，所以它们不会与我们程序或其他模块中的变量冲突。\n\
    \n当我们大量使用模块时，必须限定模块内的名称可能会变得烦人。Python 有方法将模块的元素放入全局命名空间。我们将在 *组件、模块和包* 中介绍这些方法。\n\
    \n**警告：** 全局警告\n\n**global** 语句会导致软件组件紧密耦合。这可能导致程序维护和增强的困难。类和模块提供了组装复杂程序的更好方法。作为一般策略，我们不鼓励使用\
    \ **global** 语句。\n\n## 练习\n\n1.  编写一个名为 `rectangle` 的函数，它接受两个整数 `m` 和 `n` 作为参数，并打印出一个由星号组成的\
    \ `m` 行 `n` 列的方框。下面是 `rectangle(2,4)` 的输出：\n    ```\n    ****\n    ****\n    ```\n\
    \n2.  编写一个名为 `add_excitement` 的函数，它接受一个字符串列表，并在列表中每个字符串的末尾添加一个感叹号 (`!`)。程序应该修改原始列表，不返回任何内容。\n\
    \n3.  编写一个名为 `sum_digits` 的函数，它接受一个整数 `num` 并返回 `num` 的各位数字之和。\n\n4.  数字 `n` 的数根按如下方式获得：将\
    \ `n` 的各位数字相加得到一个新数字。将该数字的各位数字相加得到另一个新数字。持续此过程，直到得到一个只有一位数字的数字。该数字就是数根。例如，如果 `n\
    \ = 45893`，我们将各位数字相加得到 `4 + 5 + 8 + 9 + 3 = 29`。然后我们将 29 的各位数字相加得到 `2 + 9 = 11`。然后我们将\
    \ 11 的各位数字相加得到 `1 + 1 = 2`。由于 2 只有一位数字，2 就是我们的数根。\n\n5.  编写一个函数，返回整数 `n` 的数根。[注意：有一个捷径，数根等于\
    \ `n mod 9`，但这里不要使用它。]\n\n6.  编写一个名为 `first_diff` 的函数，它接受两个字符串并返回字符串首次不同的位置。如果字符串完全相同，则应返回\
    \ -1。\n\n7.  编写一个函数，它接受一个整数 `n` 并返回一个恰好有 `n` 位的随机整数。例如，如果 `n` 是 3，那么 125 和 593\
    \ 是有效的返回值，但 093 不是，因为它实际上是 93，这是一个两位数。\n\n8.  编写一个名为 `number_of_factors` 的函数，它接受一个整数并返回该数字有多少个因子。\n\
    \n9.  编写一个名为 `factors` 的函数，它接受一个整数并返回其因子的列表。"
