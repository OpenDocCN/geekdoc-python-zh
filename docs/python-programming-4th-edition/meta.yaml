    \ 返回的字符串是给程序员看的，比如在调试和开发时：但关于这一点没有硬性规定。你最好这样想：`__str__` 用于 `%s`，`__repr__` 用于反引号。\n\
    \n## 进一步的主题\n\n**特殊方法** 我们已经见过两个特殊方法了，构造函数 `__init__` 和决定你的对象打印时样子的 `__str__`\
    \ 方法。还有许多其他的。例如，有一个 `__add__` 方法允许你的对象使用 `+` 运算符。所有 Python 运算符都有对应的方法。还有一个名为 `__len__`\
    \ 的方法，允许你的对象与内置的 `len` 函数配合工作。甚至还有一个特殊方法 `__getitem__`，让你的程序可以使用列表和字符串的方括号 `[]`。\n\
    \n**复制对象** 如果你想复制一个对象 `x`，只做以下操作是不够的：\n`x_copy = x`\n而应该这样做：\n`from copy import\
    \ copy`\n`x_copy = copy(x)`\n\n**将代码保存在多个文件中** 如果你想在多个程序中重用一个类，你不必将代码复制粘贴到每个程序中。你可以将其保存在一个文件中，并使用\
    \ `import` 语句将其导入到你的程序中。该文件需要放在你的程序能找到的地方，比如在同一目录下。\n`from analyzer import Analyzer`\n\
    \n## 多态\n\n当我们定义多个具有同名方法的子类时，就存在多态。一个函数可以使用任何多态类的对象，而无需意识到这些类是不同的。\n\n在某些语言中，多态类必须具有相同的接口（或是一个公共父接口的子接口），或者是公共超类的子类，这一点至关重要。这有时被称为强类型、层次化类型，因为类型规则非常严格，并遵循子类/子接口的层次结构。\n\
    \n## 内置函数\n\n有两个内置函数对面向对象编程有些重要。它们用于确定对象的类，以及类之间的继承层次结构。\n\n**isinstance**(*object*,\
    \ *type*)\n    如果 *object* 是给定类型或该类型任何子类的实例，则返回 True。\n\n**issubclass**(*parameter*,\
    \ *base*)\n    如果类 *class* 是类 *base* 的子类，则返回 True。\n    这个问题通常没有实际意义，因为大多数程序都设计为提供预期的对象类。在某些需要极度谨慎的情况下；当使用不受信任的软件时，你的类可能需要确保其他程序员遵循规则。在\
    \ Java 和 C++ 中，编译器可以检查这些情况。在 Python 中，编译器不检查这些，所以我们可能需要包含运行时检查。\n\n**super**(*type*)\n\
    \    这将返回给定类型的超类。\n\n所有基本的工厂函数（`str`, `int`, `float`, `long`, `complex`, `unicode`,\
    \ `tuple`, `list`, `dict`, `set`）实际上都是类名。因此，你可以使用像 `isinstance( myParam ,int)`\
    \ 这样的测试来确认提供给此参数的参数值是否为整数。\n\n另一个类 `basestring` 是 `str` 和 `unicode` 的父类。\n\n##\
    \ 练习\n\n1.  编写一个名为 `Investment` 的类，包含字段 `principal` 和 `interest`。构造函数应设置这些字段的值。应该有一个名为\
    \ `value_after` 的方法，返回投资 $n$ 年后的价值。公式为 $p(1 + i)^n$，其中 $p$ 是本金，$i$ 是利率。它还应该使用特殊方法\
    \ `__str__`，以便打印对象时产生类似下面的结果：\n    本金 - $1000.00, 利率 - 5.12%\n\n2.  编写一个名为 `Product`\
    \ 的类。该类应包含字段 `name`、`amount` 和 `price`，分别存储产品名称、该产品的库存数量以及产品的常规价格。应该有一个方法 `get_price`，接收要购买的数量，并返回购买该数量的成本，其中订单少于\
    \ 10 件时收取常规价格，订单在 10 到 99 件之间时享受 10% 的折扣，订单在 100 件或以上时享受 20% 的折扣。还应该有一个名为 `make_purchase`\
    \ 的方法，接收要购买的数量，并将 `amount` 减少相应的数量。\n\n3.  编写一个名为 `Password_manager` 的类。该类应有一个名为\
    \ `old_passwords` 的列表，保存用户所有过去的密码。列表的最后一项是用户的当前密码。应该有一个名为 `get_password` 的方法返回当前密码，以及一个名为\
    \ `set_password` 的方法设置用户的密码。`set_password` 方法应仅在尝试设置的密码与用户所有过去的密码都不同时才更改密码。最后，创建一个名为\
    \ `is_correct` 的方法，接收一个字符串，并根据该字符串是否等于当前密码返回布尔值 **True** 或 **False**。\n\n4.  编写一个名为\
    \ `Time` 的类，其唯一字段是以秒为单位的时间。它应该有一个名为 `convert_to_minutes` 的方法，返回一个格式如以下示例的分钟和秒的字符串：如果秒数是\
    \ 230，该方法应返回 '5:50'。它还应该有一个名为 `convert_to_hours` 的方法，返回一个格式类似于前一个方法的小时、分钟和秒的字符串。\n\
    \n# 第 13 章\n\n## 异常\n\nPython 程序一旦遇到错误就会终止。在 Python 中，错误可以是语法错误或异常。在本章中，你将了解什么是异常以及它与语法错误有何不同。之后，你将学习如何引发异常。最后，你将通过\
    \ `try` 和 `except` 块的演示来结束。"
