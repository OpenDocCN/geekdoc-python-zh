  md: 'Many algorithms need to map a key to a data value. This kind of mapping is
    supported by the Python dictionary, dict. Well look at dictionaries from a number
    of viewpoints: semantics, literal values, operations, comparison operators, statements,
    built-in functions and methods.


    # Quick example


    A dictionary is a sequence of items. Each item is a pair made of a key and a value.
    Dictionaries are not sorted. You can access to the list of keys or values independently.


    ```

    >>> d = {''first'':''string value'', ''second'':[1,2]}

    >>> d.keys()

    [''first'', ''second'']

    >>> d.values()

    [''string value'', [1, 2]]

    ```


    You can access to the value of a given key as follows:


    ```

    >>> d[''first'']

    ''string value''

    ```


    Warning

    You can not have duplicate keys in a dictionary

    Warning

    dictionary have no concept of order among elements


    # Methods to query information'
