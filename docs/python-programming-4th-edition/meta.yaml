    - **minor_axis** – 轴2，它是每个DataFrame的列。\n\n### pandas.Panel()\n\n可以使用以下构造函数创建Panel\
    \ –\n\n```python\npandas.Panel(data, items, major_axis, minor_axis, dtype, copy)\n\
    ```\n\n构造函数的参数如下 –\n\n| 参数 | 描述 |\n| :--- | :--- |\n| data | 数据采用多种形式，如ndarray、series、map、列表、字典、常量以及另一个DataFrame\
    \ |\n| items | axis=0 |\n| major_axis | axis=1 |\n| minor_axis | axis=2 |\n| dtype\
    \ | 每列的数据类型 |\n| copy | 复制数据。默认值，**false** |\n\n## 创建Panel\n\n可以使用多种方式创建Panel，例如\
    \ –\n\n- 从ndarrays\n- 从DataFrame的字典\n\n## 从3D ndarray\n\n```python\n# 创建一个空的panel\n\
    import pandas as pd\nimport numpy as np\n\ndata = np.random.rand(2,4,5)\np = pd.Panel(data)\n\
    print p\n```\n\n其**输出**如下 –\n\n```\n<class 'pandas.core.panel.Panel'>\nDimensions:\
    \ 2 (items) x 4 (major_axis) x 5 (minor_axis)\nItems axis: 0 to 1\nMajor_axis\
    \ axis: 0 to 3\nMinor_axis axis: 0 to 4\n```\n\n**注意** – 观察空panel和上述panel的维度，所有对象都是不同的。\n\
