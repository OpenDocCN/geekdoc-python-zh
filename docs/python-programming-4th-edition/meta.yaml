    ```


    Warning

    Dont do l2 = l, which is a reference, not a copy.

    The preceding techniques for copying a list create *shallow copies*. IT means
    that nested objects will not be copied. Consider this example:


    ```

    >>> a = [1, 2, [3, 4]]

    >>> b = a[:]

    >>> a[2][0] = 10

    >>> a

    [1, 2, [10, 4]]

    >>> b

    [1, 2, [10, 4]]

    ```


    To get around this problem, you must perform a deep copy:


    ```

    >>> import copy

    >>> a = [1, 2, [3, 4]]

    >>> b = copy.deepcopy(a)

    >>> a[2][0] = 10

    >>> a

    [1, 2, [10, 4]]

    >>> b

    ```'
