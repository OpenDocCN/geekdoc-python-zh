    \ 3]\na = func1(a)  # note change on this line\nfunc2(M)\n```\n\n## lambda\n\n\
    Use a `lambda`, as a convenience, when you need a function that both:\n\n- is\
    \ anonymous (does not need a name) and\n- contains only an expression and no statements.\n\
    \nExample:\n\n```python\nfn = lambda x, y, z: (x ** 2) + (y * 2) + z\nfn(4, 5,\
