    \ 半精度浮点数：符号位，5 位指数，10 位尾数 |\n| 15 | **float32** 单精度浮点数：符号位，8 位指数，23 位尾数 |\n| 16\
    \ | **float64** 双精度浮点数：符号位，11 位指数，52 位尾数 |\n| 17 | **complex_** complex128 的简写\
