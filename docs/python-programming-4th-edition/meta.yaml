    为了充分利用你对变量、数据类型和运算符的知识，你可以设计一个简单的程序来计算餐厅餐费的销售税和小费。


    | 项目 | 值 |

    |---|---|

    | 餐费 | $65.50 |

    | 销售税率 | 6.6% |

    | 小费 | 餐费 + 税的 20% |


