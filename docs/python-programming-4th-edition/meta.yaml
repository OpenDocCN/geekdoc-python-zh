    label4.grid(row=1, column=2)\nlabel5.grid(row=2, column=2)\n```\n\n## 间距\n\n要在组件之间添加额外空间，可以使用可选参数\
    \ padx 和 pady。\n\n*重要提示：* 每次创建组件时，要将其放置在屏幕上，你需要使用 grid（或其类似方法，如 pack，我们稍后会讨论）。否则它将不可见。\n\
    \n## Entry 组件\n\nEntry 框用于获取文本输入。以下示例创建一个简单的 Entry 框并将其放置在屏幕上。\n\n```\nentry =\
    \ Entry()\nentry.grid(row=0, column=0)\n```\n\n大多数适用于 Label 的选项也适用于 Entry 框。width\
    \ 选项特别有用，因为 Entry 框通常会比你需要的更宽。\n\n## 获取文本\n\n要从 Entry 框获取文本，请使用其 get 方法。这将返回一个字符串。如果你需要数值数据，请对字符串使用\
    \ **eval**（或 **int** 或 **float**）。这是一个从名为 entry 的 Entry 框获取文本的简单示例。\n\n```\nstring_value\
