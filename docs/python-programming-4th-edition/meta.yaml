    A distribution of Python is a bundle that contains an implementation of Python
    along with a bunch of libraries or tools or packages. In theory, a distribution
    of Python could use any implementation, although all the ones I know of use CPython.
    The download from python.org could also be considered a distribution (a minimal
    distribution that doesn''t contain any "extras").


    In practice, most people using Python for practical purposes are using CPython
    (the de facto standard implementation), so the real choice is among different
    distributions of that. Among those, you mainly choose based on what extras you
    want to come with it. You can choose to use the "bare" distribution from python.org
    and then install packages yourself, or if you plan on doing scientific/analytics
    computing, you could choose one of the distributions geared towards that (e.g.,
    Anaconda or Canopy).'
  - '[PAGE 19]


    # Features/Advantages of Using Python Language


    The features/advantages of Python language are as follows ;


    +   1. **Interpreted Language** - as well as also **compiled** to bytecode. Modules
    are automatically compiled (to .pyc) when imported as well as also be explicitly
    compiled as per the requirement. It facilitates an interactive command line and
    interpreter shell.


    2. **Object Oriented Language** - Almost everything is an object in this language.
    It supports Data hiding, Multiple inheritance, Interfaces and polymorphism.


    3. **Runs across different platforms** - Python works on Windows, Linux/UNIX,
    Mac OS X, other operating systems and small-form devices as well as it also runs
    on microcontrollers used in appliances, toys, remote controls, embedded devices,
    and other similar devices.'
  - '[PAGE 20]


    **4. Highly Structured Language** - Statements, functions, classes, modules, and
    packages enable us to write large, well structured applications so that to have
    the feature of readability, locate ability, modifiability.


    **5. Higher Productive Language** - Pythons codes are considerably shorter, simpler,
    and less verbose than other high-level programming languages such as Java and
    C++. In addition, it has well-designed built-in features and standard library
    as well as access to third party modules and source libraries. These features
    enable programming in Python more efficient.


    **6. Dynamic Language** - It is dynamic language as types are bound to values,
    not to variables, function and method lookup is done at runtime, values are inspectable
    and we can list the methods supported by any given object.


    **7. Strongly Typed Language** - at runtime rather than compile time. Objects
    (values) have a type, but variables do not have in this language.


    **8. Embedding and Extending Language** - Python provides a well documented and
    supported way

    (1) to embed the Python interpreter in C/C++ applications and

    (2) to extend Python with modules and objects implemented in C/C++.

    Cython enables us to generate C code from Python and to "easily" create wrappers
    for C/C++ functions.'
  - '[PAGE 21]


    To embed and extend Python with Java, there is Jython.


    +   9. **Reasonably High level** - It contains high level builtin data types as
    well as high level control structures.


    +   10. **Less Learning Time** - Python is relatively easy to learn as compare
    to other languages. Python is a a good to first language for learning programming
    because it uses simple syntax and shorter codes.


    # Limitations/Disadvantages of Python Language


    Python has varied advantageous features, and programmers prefer this language
    to other programming languages because it is easy to learn and code too. But,
    this language has still not made its place in some computing arenas that includes
    Enterprise Development houses. Therefore, this language may not solve some of
    the enterprise solutions, and limitations include-


    +   1. **Difficulty in Using Other Languages**

    The Python lovers become so accustomed to its features and its extensive libraries,
    so they face problem in learning or working on other programming languages. Python
    experts may see the declaring of cast values or variable types, syntactic requirements
    of adding curly braces or semi colons as an onerous task.


    +   2. **Weak Language in Mobile Computing**

    Python has made its presence on many desktop and server platforms, but it is seen
    as a weak language for mobile computing. That is why very few mobile applications
    are built in it like Carbonnelle.'
