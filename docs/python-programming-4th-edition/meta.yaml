- img_proc: true
  md: 'Files which are a sequence of bytes dont properly have line boundaries. Byte-oriented
    files could include characters (in ASCII or a Unicode encoding) or other data
    objects encoded as bytes. Well address some byte-oriented files with library modules
    like pickle and csv.


    **Block Mode Files.** File devices can be organized into two di erent kinds of
    structures: *block mode* and *character mode*. Block mode devices are exemplified
    by magnetic disks: the data is structured into blocks of bytes that can be accessed
    in any order. Both the media (disk) and read-write head can move; the device can
    be repositioned to any block as often as necessary. A disk provides direct (sometimes
    also called random) access to each block of data.


    Character mode devices are exemplified by network connections: the bytes come
    pouring into the processor bu ers. The stream cannot be repositioned. If the bu
    er fills up and bytes are missed, the lost data are gone forever.


    Operating system support for block mode devices includes file directories and
    file management utilities for deleting, renaming and copying files. Modern operating
    systems include file navigators (Finders or Explorers), iconic representations
    of files, and standard GUI dialogs for opening files from within application programs.
    The operating system also handles moving data blocks from memory bu ers to disk
    and from disk to memory bu ers. All of the device-specific vagaries are handled
    by having a variety of *device drivers* so that a range of physical devices can
    be supported in a uniform manner by a single operating system software interface.'
  merge: -1
  pgno: 207
- img_proc: true
  md: 'Files on block mode devices are sometimes called *seekable*. They support the
    operating system seek() function that can begin reading from any byte of the file.
    If the file is structured in fixed-size blocks or records, this seek function
    can be very simple and effective. Typically, database applications are designed
    to work with fixed-size blocks so that seeking is always done to a block, from
    which database rows are manipulated.


    **Character Mode Devices and Keyboards.** Operating systems also provide rich
    support for character mode devices like networks and keyboards. Typically, a network
    connection requires a *protocol stack* that interprets the bytes into packets,
    and handles the error correction, sequencing and retransmission of the packets.
    One of the most famous protocol stacks is the TCP/IP stack. TCP/IP can make a
    streaming device appear like a sequential file of bytes. Most operating systems
    come with numerous client programs that make heavy use of the network, examples
    include sendmail, ftp, and a web browser.


    A special kind of character mode file is the *console*; it usually provides input
    from the keyboard. The POSIX standard allows a program to be run so that input
    comes from files, pipes or the actual user. If the input file is a *TTY* (teletype),
    this is the actual human users keyboard. If the file is a pipe, this is a connection
    to another process running concurrently. The keyboard console or TTY is di erent
    from ordinary character mode devices, pipes or files for two reasons. First, the
    keyboard often needs to explicitly echo characters back so that a person can see
    what they are typing. Second, pre-processing must often be done to make backspaces
    work as expected by people.


    The echo feature is enabled for entering ordinary data or disabled for entering
    passwords. The echo feature is accomplished by having keyboard events be queued
    up for the program to read as if from a file. These same keyboard events are automatically
    sent to update the GUI if echo is turned on.'
  merge: -1
  pgno: 208
- img_proc: true
  md: 'The pre-processing feature is used to allow some standard edits of the input
    before the application program receives the bu er of input. A common example is
    handling the backspace character. Most experienced com- puter users expect that
    the backspace key will remove the last character typed. This is handled by the
    OS: it bu ers ordinary characters, removes characters from the bu er when backspace
    is


    received, and provides the ﬁnal bu er of characters to the application when the
    user hits the Return key. This handling of backspaces can also be disabled; the
    application would then see the keyboard events as *raw* characters. The usual
    mode is for the OS to provide *cooked* characters, with backspace characters handled
    before the application sees any data.


    Typically, this is all handled in a GUI in modern applications. However, Python
    provides some functions to interact with Unix TTY console software to enable and
    disable echo and process raw keyboard input.


    **File Formats and Access Methods.** In Z/OS (and Open VMS, and a few other operating
    systems) ﬁles have very speciﬁc formats, and data access is mediated by the operating
    system. In Z/OS, they call these *access methods*, and they have names like BDAM
    or VSAM. This view is handy in some respects, but it tends to limit you to the
    access methods supplied by the OS vendor.


    The GNU/Linux view is that ﬁles should be managed minimally by the operating system.
    At the OS level, ﬁles are just bytes. If you would like to impose some organization
    on the bytes of the ﬁle, your application should provide the access method. You
    can, for example, use a database management system (DBMS) to structure your bytes
    into tables, rows and columns.'
