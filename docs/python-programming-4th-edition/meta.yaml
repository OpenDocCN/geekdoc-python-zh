    # 第 1 章


    # Python 入门


    Python 是一种开源的高级编程语言，由 Guido van Rossum 在 1980 年代末期开发，目前由 *Python 软件基金会* 管理。它源自他早期参与创建的
    ABC 语言。


    > *Python 是一种解释型语言。这意味着每次运行程序时，其解释器都会遍历代码并将代码翻译成机器可读的字节码。*


    Python 是一种面向对象的语言，允许用户管理和控制数据结构或对象以创建和运行程序。实际上，Python 中的一切都是一等公民。所有对象、数据类型、函数、方法和类在
    Python 中都具有同等地位。


    Python 的官方介绍是：


    > Python 是一种易于学习、功能强大的编程语言。它具有高效的高级数据结构和一种简单但有效的面向对象编程方法。Python 优雅的语法和动态类型，结合其解释型特性，使其成为在大多数平台上进行脚本编写和快速应用开发的理想语言。


    它是一种高级语言。在 Python 中读写代码非常类似于读写简单的常规英语语句。Python 是一种强大的语言，你可以用它来创建游戏、编写图形用户界面以及开发
    Web 应用程序。


    # Python 的历史


    Python 语言由 **Guido van Rossum** 在八十年代末和九十年代初于荷兰国家数学与计算机科学研究所开发。


    Python 源自许多其他语言，包括 Modula-3、ABC、C、C++、Algol-68、SmallTalk 以及 UNIX shell 和其他脚本语言。


    Python 受版权保护。与 Perl 类似，Python 源代码现在根据 GNU 通用公共许可证 (GPL) 提供。


    Python 目前由该研究所的一个核心开发团队维护，尽管 Guido van Rossum 仍在指导其开发方面担任主要角色。


    Python 用 C 实现，并依赖于广泛、易于理解、可移植的 C 库。它与 Unix、Linux 和 POSIX 环境无缝契合。由于这些标准 C 库广泛适用于各种
    MS-Windows 变体和其他非 POSIX 操作系统，Python 在所有环境中的运行方式相似。


    # Python 的演变


    Python 的发展发生在许多其他动态（且开源的）编程语言（如 Tcl、Perl 以及（晚得多的）Ruby）也正在积极开发并日益普及的时期。


    **Python 版本 1：** Python 1.0 于 1994 年 1 月发布。该主要版本包含许多新特性和函数式编程工具，包括 lambda、filter、map
    和 reduce。


    **Python 版本 2：** 2000 年 10 月，Python 2.0 发布，带来了新的列表推导特性和垃圾回收系统。[Python 软件基金会](https://www.python.org)
    已宣布将不会有 Python 2.8。然而，该基金会将为 [编程语言](https://www.python.org) 的 2.7 版本提供支持直至 2020
    年。


    **Python 版本 3：** Python 3.0 于 2008 年 12 月发布。它带来了若干新特性和增强功能，同时也包含一些已弃用的特性。这些已弃用的特性和向后不兼容性使得
    Python 3 版本与早期版本完全不同。因此，许多 [Python 开发者](https://www.python.org) 仍然使用 Python 2.6
    或 2.7，以利用上一个主要版本中已弃用的特性。


    由于 Python 3 向后不兼容，程序员无法访问诸如字符串异常、旧式类和隐式相对导入等特性。此外，开发者必须熟悉语法和 API 的更改。他们可以使用名为
    2to3 的工具，将应用程序从 Python 2 平滑迁移到 Python 3。该工具通过注释和警告突出显示不兼容性和需要关注的领域。这些注释帮助程序员修改代码，并将其现有应用程序升级到最新版本的编程语言。


    Python 的版本 2 和版本 3 彼此完全不同。因此，每个程序员都必须理解这些不同版本的特性，并根据项目的具体需求比较其功能。此外，他需要检查每个框架支持的
    Python 版本。然而，每个开发者都必须利用最新版本的 Python，以获取新特性和长期支持。


    # “Python 实现”与“Python 发行版”与 Python 的区别


    Python 本身是一种编程语言，其行为由 python.org 上提供的文档定义。任何按照该文档所述执行操作的东西都“算作”是 Python……


    Python 的实现是一个实际的程序，它提供了 python.org 上文档定义的行为。它有多种实现，允许你运行用它编写的程序。为了让你更好地理解，msvc、clang、gcc
    是 C 的实现。以下是一些 Python 实现：'
