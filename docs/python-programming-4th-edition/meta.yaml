- md: '# Chapter 15


    # Text Files in Python


    Programs often deal with external data; data outside of volatile primary memory.
    This external data could be persistent data on a file system or transient data
    on an input-output device. Most operating systems provide a simple, uniform interface
    to external data via objects of the file class.


    In *File Semantics*, we provide an overview of the semantics of files. We cover
    the most important of Python''s built-in functions for working with files in *Built-in
    Functions*. We''ll review statements for dealing with files in *File Statements*.
    In *File Methods*, we describe some method functions of file objects.


    Files are a deep, deep subject. We''ll touch on several modules that are related
    to managing files in *Components, Modules and Packages*. These include *File Handling
    Modules* and *File Formats: CSV, Tab, XML, Logs and Others*.


    # File Semantics


    In one sense a file is a container for a sequence of bytes. A more useful view,
    however, is that a file is a container of data objects, encoded as a sequence
    of bytes. Files can be kept on persistent but slow devices like disks. Files can
    also be presented as a stream of bytes flowing through a network interface. Even
    the user''s keyboard can be processed as if it was a file; in this case the file
    forces our software to wait until the person types something.


    Our operating systems use the abstraction of *file* as a way to unify access to
    a large number of devices and operating system services. In the Linux world, all
    external devices, plus a large number of in-memory data structures are accessible
    through the file interface. The wide variety of things with file-like interfaces
    is a consequence of how Unix was originally designed. Since the number and types
    of devices that will be connected to a computer is essentially infinite, device
    drivers were designed as a simple, flexible plug-in to the operating system.


    Files include more than disk drives and network interfaces. Kernel memory, random
    data generators, semaphores, shared memory blocks, and other things have file
    interfaces, even though they aren''t strictly speaking devices. Our OS applies
    the file abstraction to many things. Python, similarly, extends the file interface
    to include certain kinds of in-memory buffers.


    **Standard Files.** Consistent with POSIX standards, all Python programs have
    three files available: sys.stdin, sys.stdout, sys.stderr. These files are used
    by certain built-in statements and functions. The **print** statement (and print()
    function), for example, writes to sys.stdout by default. The raw_input() function
    writes the prompt to sys.stdout and reads the input from sys.stdin.


    These standard files are always available, and Python assures that they are handled
    consistently by all operating systems. The sys module makes these files available
    for explicit use. Newbies may want to check *File Redirection for Newbies* for
    some additional notes on these standard files.


    # File Organization and Structure


    Some operating systems provide support for a large variety of file organizations.
    Different file organizations will include different record termination rules,
    possibly with record keys, and possibly fixed length records. The POSIX standard,
    however, considers a file to be nothing more than a sequence of bytes. It becomes
    entirely the job of the application program, or libraries outside the operating
    system to impose any organization on those bytes.


    The basic file objects in Python consider a file to be a sequence of text characters
    (ASCII or Unicode) or bytes. The characters can be processed as a sequence of
    variable length lines; each line terminated with a newline character. Files moved
    from a Windows environment may contain lines which appear to have an extraneous
    ASCII carriage return character (r), which is easily removed with the string strip()
    method.


    Ordinary text files can be managed directly with the built-in file objects and
    their methods for reading and writing lines of data. We will cover this basic
    text file processing in the rest of this chapter.


    Files which are a sequence of bytes don''t properly have line boundaries. Byte-oriented
    files could include characters (in ASCII or a Unicode encoding) or other data
    objects encoded as bytes. We''ll address some byte-oriented files with library
    modules like pickle and csv.


    **Block Mode Files.** File devices can be organized into two different kinds of
    structures: *block mode* and *character mode*. Block mode devices are exemplified
    by magnetic disks: the data is structured into blocks of bytes that can be accessed
    in any order. Both the media (disk) and read-write head can move; the device can
    be repositioned to any block as often as necessary. A disk provides direct (sometimes
    also called random) access to each block of data.


    Character mode devices are exemplified by network connections: the bytes come
    pouring into the processor buffers. The stream cannot be repositioned. If the
    buffer fills up and bytes are missed, the lost data are gone forever.


    Operating system support for block mode devices includes file directories and
    file management utilities for deleting, renaming and copying files. Modern operating
    systems include file navigators (Finders or Explorers), iconic representations
    of files, and standard GUI dialogs for opening files from within application programs.
    The operating system also handles moving data blocks from memory buffers to disk
    and from disk to memory buffers. All of the device-specific vagaries are handled
    by having a variety of *device drivers* so that a range of physical devices can
    be supported in a uniform manner by a single operating system software interface.


    Files on block mode devices are sometimes called *seekable*. They support the
    operating system seek() function that can begin reading from any byte of the file.
    If the file is structured in fixed-size blocks or records, this seek function
    can be very simple and effective. Typically, database applications are designed
    to work with fixed-size blocks so that seeking is always done to a block, from
    which database rows are manipulated.


