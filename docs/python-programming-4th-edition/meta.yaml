    # **Naming things, changing them, moving them, and deleting them**


    We can give names to the things we draw on the canvas. We can then use the name
    to refer to the object in case we want to move it or remove it from the canvas.
    Here is an example where we create a rectangle, change its color, move it, and
    then delete it:

    rect=canvas.create_rectangle(0,0,20,20)    canvas.itemconfigure(rect,-

    fill=''red'') canvas.coords(rect,40,40,60,60) canvas.delete(rect)'
  - '[PAGE 333]


    The coords method is used to move/resize an object and the delete method is used
    to delete it. If you want to delete everything from the canvas, use the following:

