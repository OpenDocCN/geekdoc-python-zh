- md: "## Structured Markup Processing Tools\n\nThe following modules contain algorithms\
    \ for working with structured markup: Standard General Markup Language (SGML),\
    \ Hypertext Markup Language (HTML) and Extensible Markup Language (XML).\n\n**htmllib**\
    \ Ordinary HTML documents can be examined with the htmllib module. This module\
    \ based on the sgmlib module. The basic HTMLParser class definition is a superclass;\
    \ you will typically override the various functions to do the appropriate processing\
    \ for your application.\n\nOne problem with parsing HTML is that browsers in order\
    \ to conform with the applicable standards must accept incorrect HTML. This means\
    \ that many web sites publish HTML which is tolerated by browsers, but can't easily\
    \ be parsed by htmllib. When confronted with serious horrors, consider downloading\
    \ the Beautiful Soup module ([http://www.crummy.com/software/BeautifulSoup/](http://www.crummy.com/software/BeautifulSoup/)).\
    \ This handles erroneous HTML more gracefully than htmllib.\n\n**xml.sax**\n\n\
    **xml.dom**\n\n**xml.dom.minidom** The xml.sax and xml.dom modules provide the\
    \ classes necessary to conveniently read and process XML documents. A SAX parser\
    \ separates the various types of content and passes a series of events the handler\
    \ objects attached to the parser. A DOM parser decomposes the document into the\
    \ Document Object Model (DOM). The xml.dom module contains the classes which define\
    \ an XML documents structure. The xml.dom.minidom module contains a parser which\
    \ creates a DOM object.\n\nAdditionally, the formatter module, in chapter 24 (Miscellaneous\
    \ Modules) goes along with these.\n\n## Internet Protocols and Support\n\nThe\
    \ following modules contain algorithms for responding the several of the most\
    \ common Internet protocols. These modules greatly simplify developing applications\
    \ based on these protocols.\n\n**cgi** The cgi module can be used for web server\
    \ applications invoked as Common Gateway Interface (CGI) scripts. This allows\
    \ you to put Python programming in the cgi-bin directory. When the web server\
    \ invokes the CGI script, the Python interpreter is started and the Python script\
    \ is executed.\n\n**wsgiref** The Web Services Gateway Interface (WSGI) standard\
    \ provides a much simpler framework for web applications and web services. See\
    \ [PEP 333](http://www.python.org/dev/peps/pep-0333/) for more information. Essentially,\
    \ this subsumes all of CGI, plus adds several features and a systematic way to\
    \ compose larger applications from smaller components.\n\n**urllib**\n\n**urllib2**\n\
    \n**urlparse** These modules allow you to write relatively simple application\
    \ programs which open a URL as if it were a standard Python file. The content\
    \ can be read and perhaps parsed with the HTML or XML parser modules, described\
    \ below. The urllib module depends on the httplib, ftplib and gopherlib modules.\
    \ It will also open local files when the scheme of the URL is file:. The urlparse\
    \ module includes the functions necessary to parse or assemble URLs. The urllib2\
    \ module handles more complex situations where there is authentication or cookies\
    \ involved.\n\n**httplib**\n\n**ftplib**\n\n**gopherlib** The httplib, ftplib\
    \ and gopherlib modules include relatively complete support for building client\
    \ applications that use these protocols. Between the html module and httplib module,\
    \ a simple character-oriented web browser or web content crawler can be built.\n\
    \n**poplib**\n\n**imaplib** The poplib and imaplib modules allow you to build\
    \ mail reader client applications. The poplib module is for mail clients using\
    \ the Post-Office Protocol, POP3 (RFC 1725), to extract mail from a mail server.\
    \ The imaplib module is for mail servers using the Internet Message Access Protocol,\
    \ IMAP4 (RFC 2060) to manage mail on an IMAP server.\n\n**nntplib** The nntplib\
    \ module allows you to build a network news reader. The newsgroups, like comp.lang.python,\
    \ are processed by NNTP servers. You can build special-purpose news readers with\
    \ this module.\n\n**SocketServer** The SocketServer module provides the relatively\
    \ advanced programming required to create TCP/IP or UDP/IP server applications.\
    \ This is typically the core of a stand-alone application server.\n\n**SimpleHTTPServer**\n\
    \n**CGIHTTPServer**\n\n**BaseHTTPServer** The SimpleHTTPServer and CGIHTTPServer\
    \ modules rely on the basic BaseHTTPServer and SocketServer modules to create\
    \ a web server. The SimpleHTTPServer module provides the programming to handle\
    \ basic URL requests. The CGIHTTPServer module adds the capability for running\
    \ CGI scripts; it does this with the fork() and exec() functions of the os module,\
    \ which are not necessarily supported on all platforms.\n\n**asyncore**\n\n**asynchat**\
    \ The asyncore (and asynchat) modules help to build a time-sharing application\
    \ server. When client requests can be handled quickly by the server, complex multi-threading\
    \ and multi-processing aren't really necessary. Instead, this module simply dispatches\
    \ each client communication to an appropriate handler function.\n\n## Internationalization\n\
    \nA well-written application avoids including messages as literal strings within\
    \ the program text. Instead, all messages, prompts, labels, etc., are kept as\
    \ a separate resource. These separate string resources can then be translated.\n\
    \n**locale** The locale module fetches the current locales date, time, number\
    \ and currency formatting rules. This provides functions which will format and\
    \ parse dates, times, numbers and currency amounts.\n\nA user can change their\
    \ locale with simple operating system settings, and your application can work\
    \ consistently with all other programs.\n\n## Program Frameworks\n\nWe'll talk\
    \ about a number of program-related issues in *Programs: Standing Alone* and *Architecture:\
    \ Clients, Servers, the Internet and the World Wide Web*. Much of this goes beyond\
    \ the standard Python library. Within the library are two modules that can help\
    \ you create large, sophisticated command-line application programs.\n\n**cmd**\
    \ The cmd module contains a superclass useful for building the main command-reading\
    \ loop of an interactive program. The standard features include printing a prompt,\
    \ reading commands, providing help and providing a command history buffer. A subclass\
    \ is expected to provide functions with names of the form do_command(). When the\
    \ user enters a line beginning with command, the appropriate do_command() function\
    \ is called.\n\n**shlex** The shlex module can be used to tokenize input in a\
    \ simple language similar to the Linux shell languages. This module defines a\
    \ basic shlex class with parsing methods that can separate words, quotes strings\
    \ and comments, and return them to the requesting program.\n\n## Development Tools\n\
    \nThe testing tools are central to creating reliable, complete and correct software.\n\
    \n**doctest** When a function or a class docstring includes a snippet of interactive\
    \ Python, the doctest module can use this snippet to confirm that the function\
    \ or class works as advertised.\n\nFor example:\n\n```\ndef myFunction( a, b ):\n\
    \    \"\"\">>> myFunction( 2, 3 ) 6\n    >>> myFunction( 5.0, 7.0 ) 35.0\n   \
    \ \"\"\"\n    return a * b\n```\n\nThe >>> myFunction( 2, 3 ) lines are parsed\
    \ by doctest. They are evaluated, and the actual result compared with the docstring\
    \ comment.\n\n**unittest** This is more sophisticated testing framework in which\
    \ you create TestCases which define a fixture, an operation and expected results.\n\
    \n**2to3** This module is used to convert Python 2 files to Python 3.\n\nPrior\
    \ to using this, you should run your Python programs with the -3 option to identify\
    \ any potential incompatibilities. Once you've fixed all of the incompatibilities,\
    \ you can confidently convert your program to Python 3.\n\nDo not tweak the output\
    \ from this conversion. If your converted program doesn't work under Python 3,\
    \ it's almost always a problem with your original program playing fast and loose\
    \ with Python rules."
  mdcn: "## 结构化标记处理工具\n\n以下模块包含用于处理结构化标记的算法：标准通用标记语言（SGML）、超文本标记语言（HTML）和可扩展标记语言（XML）。\n\
    \n**htmllib** 普通HTML文档可以使用htmllib模块进行检查。该模块基于sgmlib模块。基本的HTMLParser类定义是一个超类；你通常需要重写各种函数，以针对你的应用程序进行适当的处理。\n\
    \n解析HTML的一个问题是，浏览器为了符合适用标准，必须接受不正确的HTML。这意味着许多网站发布的HTML虽然被浏览器容忍，但htmllib无法轻松解析。当遇到严重问题时，可以考虑下载Beautiful\
    \ Soup模块（[http://www.crummy.com/software/BeautifulSoup/](http://www.crummy.com/software/BeautifulSoup/)）。它比htmllib更优雅地处理错误的HTML。\n\
    \n**xml.sax**\n\n**xml.dom**\n\n**xml.dom.minidom** xml.sax和xml.dom模块提供了方便读取和处理XML文档所需的类。SAX解析器将不同类型的内容分开，并将一系列事件传递给附加到解析器的处理程序对象。DOM解析器将文档分解为文档对象模型（DOM）。xml.dom模块包含定义XML文档结构的类。xml.dom.minidom模块包含一个创建DOM对象的解析器。\n\
    \n此外，第24章（杂项模块）中的格式化模块也与这些相关。\n\n## 互联网协议与支持\n\n以下模块包含响应几种最常见互联网协议的算法。这些模块极大地简化了基于这些协议的应用程序开发。\n\
    \n**cgi** cgi模块可用于作为通用网关接口（CGI）脚本调用的Web服务器应用程序。这允许你将Python程序放在cgi-bin目录中。当Web服务器调用CGI脚本时，Python解释器启动并执行Python脚本。\n\
    \n**wsgiref** Web服务网关接口（WSGI）标准为Web应用程序和Web服务提供了一个简单得多的框架。更多信息请参见[PEP 333](http://www.python.org/dev/peps/pep-0333/)。本质上，它涵盖了所有CGI功能，并增加了几个特性以及一种从较小组件组合较大应用程序的系统方法。\n\
    \n**urllib**\n\n**urllib2**\n\n**urlparse** 这些模块允许你编写相对简单的应用程序，这些程序可以像打开标准Python文件一样打开URL。内容可以被读取，并可能使用下面描述的HTML或XML解析器模块进行解析。urllib模块依赖于httplib、ftplib和gopherlib模块。当URL的方案为file:时，它也会打开本地文件。urlparse模块包含解析或组装URL所需的函数。urllib2模块处理涉及身份验证或Cookie的更复杂情况。\n\
    \n**httplib**\n\n**ftplib**\n\n**gopherlib** httplib、ftplib和gopherlib模块为构建使用这些协议的客户端应用程序提供了相对完整的支持。结合html模块和httplib模块，可以构建一个简单的面向字符的Web浏览器或Web内容爬虫。\n\
    \n**poplib**\n\n**imaplib** poplib和imaplib模块允许你构建邮件阅读器客户端应用程序。poplib模块用于使用邮局协议POP3（RFC\
    \ 1725）从邮件服务器提取邮件的邮件客户端。imaplib模块用于使用互联网消息访问协议IMAP4（RFC 2060）在IMAP服务器上管理邮件的邮件服务器。\n\
    \n**nntplib** nntplib模块允许你构建网络新闻阅读器。像comp.lang.python这样的新闻组由NNTP服务器处理。你可以使用此模块构建专用的新闻阅读器。\n\
    \n**SocketServer** SocketServer模块提供了创建TCP/IP或UDP/IP服务器应用程序所需的相对高级的编程。这通常是独立应用程序服务器的核心。\n\
    \n**SimpleHTTPServer**\n\n**CGIHTTPServer**\n\n**BaseHTTPServer** SimpleHTTPServer和CGIHTTPServer模块依赖于基本的BaseHTTPServer和SocketServer模块来创建Web服务器。SimpleHTTPServer模块提供了处理基本URL请求的编程。CGIHTTPServer模块增加了运行CGI脚本的功能；它通过使用os模块的fork()和exec()函数来实现这一点，这些函数不一定在所有平台上都受支持。\n\
    \n**asyncore**\n\n**asynchat** asyncore（和asynchat）模块有助于构建分时应用程序服务器。当客户端请求可以由服务器快速处理时，复杂的多线程和多处理并非真正必要。相反，此模块只是将每个客户端通信分派给适当的处理函数。\n\
    \n## 国际化\n\n编写良好的应用程序避免在程序文本中包含消息作为字面字符串。相反，所有消息、提示、标签等都作为单独的资源保存。这些单独的字符串资源随后可以被翻译。\n\
    \n**locale** locale模块获取当前区域设置的日期、时间、数字和货币格式规则。这提供了格式化和解析日期、时间、数字和货币金额的函数。\n\n\
    用户可以通过简单的操作系统设置更改其区域设置，你的应用程序可以与所有其他程序一致地工作。\n\n## 程序框架\n\n我们将在*程序：独立运行*和*架构：客户端、服务器、互联网和万维网*中讨论许多与程序相关的问题。其中大部分超出了标准Python库的范围。在库中有两个模块可以帮助你创建大型、复杂的命令行应用程序。\n\
    \n**cmd** cmd模块包含一个超类，用于构建交互式程序的主命令读取循环。标准功能包括打印提示、读取命令、提供帮助和提供命令历史缓冲区。子类需要提供名为do_command()的函数。当用户输入以command开头的行时，将调用相应的do_command()函数。\n\
    \n**shlex** shlex模块可用于在类似于Linux shell语言的简单语言中对输入进行分词。此模块定义了一个基本的shlex类，其解析方法可以分离单词、引用字符串和注释，并将它们返回给请求的程序。\n\
    \n## 开发工具\n\n测试工具是创建可靠、完整和正确软件的核心。\n\n**doctest** 当函数或类的文档字符串包含交互式Python代码片段时，doctest模块可以使用此片段来确认函数或类按预期工作。\n\
    \n例如：\n\n```\ndef myFunction( a, b ):\n    \"\"\">>> myFunction( 2, 3 ) 6\n  \
    \  >>> myFunction( 5.0, 7.0 ) 35.0\n    \"\"\"\n    return a * b\n```\n\n>>> myFunction(\
    \ 2, 3 ) 这些行由doctest解析。它们被求值，并将实际结果与文档字符串注释进行比较。\n\n**unittest** 这是一个更复杂的测试框架，你可以在其中创建TestCase，定义一个测试夹具、一个操作和预期结果。\n\
    \n**2to3** 此模块用于将Python 2文件转换为Python 3。\n\n在使用此模块之前，你应该使用-3选项运行你的Python程序，以识别任何潜在的不兼容性。一旦你修复了所有不兼容性，你就可以自信地将你的程序转换为Python\
    \ 3。\n\n不要调整此转换的输出。如果你转换后的程序在Python 3下无法运行，几乎总是你的原始程序在Python规则上过于随意的问题。"
