    See the image below on the left. The first four arguments specify the coordinates
    of where to place the rectangle on the canvas. The upper left corner of the canvas
    is the origin, (0, 0). The upper left of the rectangle is at (20, 100), and the
    lower right is at (30, 150). If were to leave off fill=''red'', the result would
