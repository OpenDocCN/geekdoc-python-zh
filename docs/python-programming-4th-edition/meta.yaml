    ```\n\n第1行从 tkinter 模块导入所有 GUI 相关内容。\n第2行在屏幕上创建一个窗口，我们称之为 root。\n第3行将程序置于一个本质上是长时间运行的\
    \ while 循环中，称为事件循环。此循环运行，等待按键、按钮点击等操作，并在用户关闭窗口时退出。\n\n这是一个将温度从华氏度转换为摄氏度的可运行 GUI\
    \ 程序：\n\n```\nfrom tkinter import *\ndef calculate():\n    tmp = int(entry.get())\n\
