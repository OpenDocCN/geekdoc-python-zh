  md: 'NumPy numerical types are instances of dtype (data-type) objects, each having
    unique characteristics. The dtypes are available as np.bool_, np.float32, etc.


    # Data Type Objects (dtype)


    A data type object describes interpretation of fixed block of memory corresponding
    to an array, depending on the following aspects –


    +   - Type of data (integer, float or Python object)

    - Size of data

    - Byte order (little-endian or big-endian)

    - In case of structured type, the names of fields, data type of each field and
    part of the memory block taken by each field.

    - If data type is a subarray, its shape and data type


    The byte order is decided by prefixing ''<'' or ''>'' to data type. ''<'' means
    that encoding is little-endian (least significant is stored in smallest address).
    ''>'' means that encoding is big-endian (most significant byte is stored in smallest
    address).


    A dtype object is constructed using the following syntax –


    ```

    numpy.dtype(object, align, copy)

    ```


    The parameters are –


    +   - **Object** – To be converted to data type object

    - **Align** – If true, adds padding to the field to make it similar to C-struct'
