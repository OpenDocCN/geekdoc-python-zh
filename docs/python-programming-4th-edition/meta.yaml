    ```

    >>> help

    ```


    输入 `help()` 获取交互式帮助，或输入 `help(object)` 获取关于对象的帮助。

    >>> `help()`


    ### 特定主题的帮助


    如果你输入 `help(object)` 来获取某个对象的帮助，你将获得关于该特定对象的帮助。此帮助使用帮助查看器显示。

    你将输入类似这样的内容：

    >>> `help("EXPRESSIONS")`


    ## 退出 Python


    要退出 Python，你可以输入以下任一命令：


    ```

    quit()

    exit()

    Control-Z 然后按回车

    ```


