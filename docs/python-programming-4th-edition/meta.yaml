    ## ACKNOWLEDGEMENT


    This piece of study of **Python** is an outcome of the encouragement, guidance,
    help and assistance provided to us by our colleagues, faculties, Tech-friends
    and my family members.


    As an acknowledgement, I would like to take the opportunity to express my deep
    sense of gratitude to all those who played a crucial role in the successful completion
    of this book, especially to my senior scholars; this book certainly has been benefited
    from discussions held with many IT professionals (Ex-students) over the years
    it took to write it.


    Python reflects on a number of growing trends in software development, putting
    it at or near the leading edge of good programming languages. It is a very simple
    language surrounded by a vast library of add-on modules. It is an open source
    project, supported by many individuals. It is an object-oriented language, binding
    data and processing into class definitions. It is a platform-independent, scripted
    language, with complete access to operating systems APIs. It supports integration
    of complex solutions from pre-built components. It is a dynamic language, which
    avoids many of the complexities and overheads of compiled languages.


    **Three Faces of a Language.** There are three facets to a programming language:
    how you write it, what it means, and the additional practical considerations that
    make a program useful. While many books cover the syntax and semantics of Python,
    in this book, the pragmatic considerations are also covered. My core objective
    is to build enough language skills with a good object-oriented design so that
    the students can have an efficient knowledge about Python on Windows platform.


    Special thanks goes to our respected professor **Prof. Dr. Bal Gangadhar Prasad**,
    who is not only my role model in learning and teaching but, also a source of encouragement
    who has always pushed me forward to utilize my skills in a timely manner and have
    ever obliged for bearing with me from time to time, insisting me on sticking to
    my determination all throughout.


    I would also like to thank those who provided the odd suggestions via email to
    me. All feedbacks were listened to, as you will no doubt see some content influenced
    by your suggestions.


    I hope that the reader likes this book and finds it useful in learning the concepts
    of Python.


    **Thank You !!**


    ***Ajit Singh !!***


    ## PREFACE


    > *Share the knowledge .......*

    > *Strengthen the surroundings.......*


    **Python Simply In Depth** provides all essential programming concepts and information
    one shall need in order to start developing their own Python program. The book
    provides a comprehensive walk-through of Python programming in a clear, straightforward
    manner that beginners will appreciate. Important concepts are introduced through
    a step-by-step discussion and reinforced by relevant examples and illustrations.
    This book can be used as a guide to help explore, harness, and gain appreciation
    of the capabilities and features of Python.


    This book encapsulates rich practical hands-on experience in developing Python
    based applications, combined with teaching the subject for graduate/post-graduate
    students. The book is therefore a culmination of putting together what has been
    both practiced as well as preached, which is the one of the most compelling differentiators
    for this book. It can also be used for independent study by anyone interested
    in getting a broad introduction to a core useful set of the Python language.


    > *This book is featured with advanced topics, such as Python Pandas, Database
    Connectivity, Python GUI Programming and Python Libraries apart from the core
    concepts like Multithreading, Exception Handling and Useful Modules. We explained
    these because they can solve some problems better than standard solutions.*


    My approach in this book is to regard Python as a language that readers will want
    to use as a primary tool in many different areas of their programming work - not
    just for creating programs with graphical content. Nevertheless, I recognized
    that visual examples are much more fun to create and work with.


    This book is a close-to-complete presentation of the Python language. Whether
    you are new to programming or a professional developer, this book’s goal is to
    bring you quickly up to speed on the fundamentals of the core Python language.
    After reading this book, you will know enough about Python to apply it in whatever
    application domains you choose to explore in your career.


    *Compatible with CBSE and AICTE Syllabus.......*


    ## About This Fourth Edition


    In the four years since the first edition of this book was published in late 2019,
    there have been substantial changes in Python itself. Although I have attempted
    to retain as much of the prior version of this text as possible, this new edition
    reflects many recent changes in the Python language, as well as a handful of structural
    changes.


    ## This Book’s Prerequisites


    There are no absolute prerequisites to speak of, really. Both true beginners and
    crusty programming veterans have used this book successfully. If you are motivated
    to learn Python, this text will probably work for you. In general, though, we
    have found that any exposure to programming or scripting before this book can
    be helpful, even if not required for every reader.


    ## Feedback


    I have tried to wash out every error in our third edition of this book after being
    reviewed by lots of bachelor of Computer Science, but as happens with any programming
    language - A few difficult to understand bugs shall remain and of course, typos
    – and therefore, suggestions from students that may lead to improvement in next
    edition in shortcoming future are highly appreciated.


    Constructive suggestions and criticism always go a long way in enhancing any endeavour.
    I request all readers to email me their valuable comments / views / feedback for
    the betterment of the book at ajit_singh24@yahoo.com, mentioning the title and
    author name in the subject line. Please report any piracy spotted by you as well.
    I would be glad to hear suggestions from you.


