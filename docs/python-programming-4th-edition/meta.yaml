    # Inserting items into a sorted list


    The bisect module provides tools to manipulate sorted lists.


    ```

    >>> x = [4, 1]

    >>> x.sort()

    >>> import bisect

    >>> bisect.insort(x, 2)

    >>> x

    [1, 2, 4]

    ```


    To know where the index where the value would have been inserted, you could have
    use:


    ```

    >>> x = [4, 1]

    >>> x.sort()

    >>> import bisect

    >>> bisect.bisect(x, 2)

    2

    ```


