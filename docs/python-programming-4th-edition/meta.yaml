- md: "## Features/Advantages of Using Python Language\n\nThe features/advantages\
    \ of Python language are as follows:\n\n1.  **Interpreted Language** - as well\
    \ as also **compiled** to bytecode. Modules are automatically compiled (to .pyc)\
    \ when imported as well as also be explicitly compiled as per the requirement.\
    \ It facilitates an interactive command line and interpreter shell.\n\n2.  **Object\
    \ Oriented Language** - Almost everything is an object in this language. It supports\
    \ Data hiding, Multiple inheritance, Interfaces and polymorphism.\n\n3.  **Runs\
    \ across different platforms** - Python works on Windows, Linux/UNIX, Mac OS X,\
    \ other operating systems and small-form devices as well as it also runs on microcontrollers\
    \ used in appliances, toys, remote controls, embedded devices, and other similar\
    \ devices.\n\n4.  **Highly Structured Language** - Statements, functions, classes,\
    \ modules, and packages enable us to write large, well structured applications\
    \ so that to have the feature of readability, locate ability, modifiability.\n\
    \n5.  **Higher Productive Language** - Python's codes are considerably shorter,\
    \ simpler, and less verbose than other high-level programming languages such as\
    \ Java and C++. In addition, it has well-designed built-in features and standard\
    \ library as well as access to third party modules and source libraries. These\
    \ features enable programming in Python more efficient.\n\n6.  **Dynamic Language**\
    \ - It is dynamic language as types are bound to values, not to variables, function\
    \ and method lookup is done at runtime, values are inspectable and we can list\
    \ the methods supported by any given object.\n\n7.  **Strongly Typed Language**\
    \ - at runtime rather than compile time. Objects (values) have a type, but variables\
    \ do not have in this language.\n\n8.  **Embedding and Extending Language** -\
    \ Python provides a well documented and supported way\n    (1) to embed the Python\
    \ interpreter in C/C++ applications and\n    (2) to extend Python with modules\
    \ and objects implemented in C/C++.\n    Cython enables us to generate C code\
    \ from Python and to \"easily\" create wrappers for C/C++ functions.\n    To embed\
    \ and extend Python with Java, there is Jython.\n\n9.  **Reasonably High level**\
    \ - It contains high level builtin data types as well as high level control structures.\n\
    \n10. **Less Learning Time** - Python is relatively easy to learn as compare to\
    \ other languages. Python is a good first language for learning programming because\
    \ it uses simple syntax and shorter codes.\n\n## Limitations/Disadvantages of\
    \ Python Language\n\nPython has varied advantageous features, and programmers\
    \ prefer this language to other programming languages because it is easy to learn\
    \ and code too. But, this language has still not made its place in some computing\
    \ arenas that includes Enterprise Development houses. Therefore, this language\
    \ may not solve some of the enterprise solutions, and limitations include:\n\n\
    1.  **Difficulty in Using Other Languages**\n    The Python lovers become so accustomed\
    \ to its features and its extensive libraries, so they face problem in learning\
    \ or working on other programming languages. Python experts may see the declaring\
    \ of cast values or variable types, syntactic requirements of adding curly braces\
    \ or semi colons as an onerous task.\n\n2.  **Weak Language in Mobile Computing**\n\
    \    Python has made its presence on many desktop and server platforms, but it\
    \ is seen as a weak language for mobile computing. That is why very few mobile\
    \ applications are built in it like Carbonnelle.\n\n3.  **Gets Slow in Speed**\n\
    \    Python executes with the help of an interpreter instead of the compiler,\
    \ which causes it to slow down because compilation and execution help it to work\
    \ normally. On the other hand, it can be seen that it is fast for many web applications\
    \ too.\n\n4.  **Run-time Errors**\n    The Python language is dynamically typed\
    \ so it has many design restrictions that are reported by some Python developers.\
    \ It is even seen that it requires more testing time, and the errors show up when\
    \ the applications are finally run.\n\n5.  **Underdeveloped Database Access Layers**\n\
    \    As compared to the popular technologies like JDBC and ODBC, the Python's\
    \ database access layer is found to be bit underdeveloped and primitive. It cannot\
    \ be applied in the enterprises that need smooth interaction of complex legacy\
    \ data.\n\n## Varieties of Python Language\n\n-   Jython: Python for the Java\
    \ environment http://www.jython.org/\n-   PyPy: Python with a JIT compiler and\
    \ stackless mode http://pypy.org/\n-   CPython: Standard Python 2.xx implemented\
    \ in C.\n-   Stackless: Python with enhanced thread support and microthreads etc.\
    \ http://www.stackless.com/\n-   IronPython: Python for .NET and the CLR http://ironpython.net/\n\
    -   Python 3: The new, new Python. This is intended as a replacement for Python\
    \ 2.x. http://www.python.org/doc/\n\n## Some Jargon\n\nFor folks new to developing\
    \ software, it might help to understand a few distinctions made above.\n\n-  \
    \ Interpreted\n-   Not Interpreted (i.e., Compiled)\n\nPython is a *byte-code\
    \ interpreter*. A Python code object is a sequence of bytes that represent various\
    \ operations and values. The Python interpreter steps through the bytes, performing\
    \ the operations.\n\nA compiled language (e.g., C, C++, etc.) is translated from\
    \ source form to executable binary specific to operating system and hardware platform.\n\
    Java is similar to Python: its compiled and the Java Virtual Machine is a byte-code\
    \ interpreter.\n\n-   Dynamic\n-   Not Dynamic (i.e., Static)\n\nPython is a dynamic\
    \ language. Variables and functions do not have defined data types. Instead, a\
    \ variable is simply a label attached to an object. A function is a callable object\
    \ with parameters, but no declared result type. Each object has a strongly-defined\
    \ permanent class.\n\nThere is no sophisticated compile-time type checking. Instead,\
    \ any type mismatches will be detected at run-time. Since many types are nearly\
    \ interchangeable, there isn't a need for a lot of type checking. For examples\
    \ of interchangeable (polymorphic) types, see *Simple Numeric Expressions and\
    \ Output*. Languages like C, C++ and Java have statically-declared variables and\
    \ functions.\n\n-   Scripting\n-   Non-Scripting\n\nThe scripting distinction\
    \ is an operational feature of POSIX-compliant operating systems. Files which\
    \ begin with the #!/path/to/interpreter will be used as scripts by the OS. They\
    \ can be executed from the command-line because the interpreter is named in the\
    \ first line of the file.\n\nLanguages like Java, C and C++ do not have this feature;\
    \ these files must be compiled before they can be executed.\n\n## Chapter 2\n\n\
    ## Installing Python\n\n## Installing Python in Windows\n\nTo install Python,\
    \ you must first download the installation package of your preferred version from\
    \ this link:\n\n[https://www.python.org/downloads/](https://www.python.org/downloads/)\n\
    \nOn this page, you will be asked to choose the recent versions for Python 3.11.x/3.12.x\
    \ which was released on 8th Feb 2023. Alternatively, if you are looking for a\
    \ specific release, either Python 2 or 3, you can scroll down the page to find\
    \ download links for earlier versions.\n\n![](img/e3dac7e08bdd357a94774b55d90b82a8_25_0.png)"
  mdcn: "## 使用Python语言的特性/优势\n\nPython语言的特性/优势如下：\n\n1.  **解释型语言** - 同时也会被**编译**成字节码。模块在导入时会自动编译（生成.pyc文件），也可以根据需要显式编译。它支持交互式命令行和解释器外壳。\n\
    \n2.  **面向对象语言** - 在这种语言中，几乎一切都是对象。它支持数据隐藏、多重继承、接口和多态。\n\n3.  **跨平台运行** - Python可在Windows、Linux/UNIX、Mac\
    \ OS X、其他操作系统以及小型设备上运行，同时也能在用于电器、玩具、遥控器、嵌入式设备及其他类似设备的微控制器上运行。\n\n4.  **高度结构化的语言**\
    \ - 语句、函数、类、模块和包使我们能够编写大型、结构良好的应用程序，从而具备可读性、可定位性和可修改性的特点。\n\n5.  **高生产力语言** -\
    \ Python的代码比其他高级编程语言（如Java和C++）更短、更简洁、更不冗长。此外，它拥有精心设计的内置功能和标准库，以及对第三方模块和源代码库的访问。这些特性使得Python编程更加高效。\n\
    \n6.  **动态语言** - 它是一种动态语言，因为类型绑定到值，而不是变量；函数和方法查找在运行时进行；值是可检查的；我们可以列出任何给定对象支持的方法。\n\
    \n7.  **强类型语言** - 在运行时而非编译时。对象（值）有类型，但变量在这种语言中没有类型。\n\n8.  **嵌入式和可扩展语言** - Python提供了一种文档完善且受支持的方式\n\
    \    (1) 将Python解释器嵌入到C/C++应用程序中，以及\n    (2) 用C/C++实现的模块和对象来扩展Python。\n    Cython使我们能够从Python生成C代码，并“轻松”地为C/C++函数创建包装器。\n\
    \    要用Java嵌入和扩展Python，可以使用Jython。\n\n9.  **相当高级** - 它包含高级内置数据类型以及高级控制结构。\n\n\
    10. **学习时间短** - 与其他语言相比，Python相对容易学习。Python是学习编程的良好入门语言，因为它使用简单的语法和更短的代码。\n\n\
    ## Python语言的局限性/缺点\n\nPython具有多种优势特性，程序员之所以偏爱这种语言而非其他编程语言，是因为它易于学习和编码。但是，这种语言在某些计算领域（包括企业开发公司）尚未站稳脚跟。因此，这种语言可能无法解决某些企业解决方案，其局限性包括：\n\
    \n1.  **使用其他语言的困难**\n    Python爱好者如此习惯于它的特性和广泛的库，以至于他们在学习或使用其他编程语言时会遇到问题。Python专家可能会觉得声明类型转换值或变量类型、添加花括号或分号的语法要求是一项繁重的任务。\n\
    \n2.  **移动计算领域的弱势语言**\n    Python已在许多桌面和服务器平台上出现，但它被视为移动计算领域的弱势语言。这就是为什么用它构建的移动应用程序非常少，比如Carbonnelle。\n\
    \n3.  **运行速度变慢**\n    Python在解释器的帮助下执行，而不是编译器，这导致其速度变慢，因为编译和执行有助于其正常工作。另一方面，也可以看到它对许多Web应用程序来说速度很快。\n\
    \n4.  **运行时错误**\n    Python语言是动态类型的，因此它有许多设计限制，这些限制被一些Python开发者报告。甚至可以看到它需要更多的测试时间，并且错误在应用程序最终运行时才会显现。\n\
    \n5.  **不成熟的数据库访问层**\n    与JDBC和ODBC等流行技术相比，Python的数据库访问层显得有些不成熟和原始。它不能应用于需要与复杂遗留数据进行顺畅交互的企业。\n\
    \n## Python语言的变体\n\n-   Jython：用于Java环境的Python http://www.jython.org/\n-   PyPy：带有JIT编译器和无栈模式的Python\
    \ http://pypy.org/\n-   CPython：用C实现的标准Python 2.xx。\n-   Stackless：具有增强线程支持和微线程等的Python。http://www.stackless.com/\n\
    -   IronPython：用于.NET和CLR的Python http://ironpython.net/\n-   Python 3：全新的Python。这旨在替代Python\
    \ 2.x。http://www.python.org/doc/\n\n## 一些术语\n\n对于刚接触软件开发的人来说，理解上面提到的一些区别可能会有所帮助。\n\
    \n-   解释型\n-   非解释型（即编译型）\n\nPython是一个*字节码解释器*。Python代码对象是一系列表示各种操作和值的字节。Python解释器逐步执行这些字节，执行相应的操作。\n\
    \n编译型语言（例如C、C++等）从源代码形式翻译成特定于操作系统和硬件平台的可执行二进制文件。\nJava与Python类似：它是编译型的，Java虚拟机是一个字节码解释器。\n\
    \n-   动态\n-   非动态（即静态）\n\nPython是一种动态语言。变量和函数没有定义的数据类型。相反，变量只是附加到对象上的标签。函数是带有参数的可调用对象，但没有声明的结果类型。每个对象都有一个强定义的永久类。\n\
    \n没有复杂的编译时类型检查。相反，任何类型不匹配都将在运行时检测到。由于许多类型几乎可以互换，因此不需要大量的类型检查。有关可互换（多态）类型的示例，请参见*简单数值表达式和输出*。像C、C++和Java这样的语言具有静态声明的变量和函数。\n\
    \n-   脚本\n-   非脚本\n\n脚本区别是符合POSIX标准的操作系统的一个操作特性。以#!/path/to/interpreter开头的文件将被操作系统用作脚本。它们可以从命令行执行，因为解释器在文件的第一行中指定。\n\
    \n像Java、C和C++这样的语言没有这个特性；这些文件在执行之前必须先编译。\n\n## 第2章\n\n## 安装Python\n\n## 在Windows中安装Python\n\
    \n要安装Python，您必须首先从此链接下载您首选版本的安装包：\n\n[https://www.python.org/downloads/](https://www.python.org/downloads/)\n\
    \n在此页面上，您将被要求选择Python 3.11.x/3.12.x的最新版本，该版本于2023年2月8日发布。或者，如果您正在寻找特定版本（Python\
    \ 2或3），您可以向下滚动页面以找到早期版本的下载链接。\n\n![](img/e3dac7e08bdd357a94774b55d90b82a8_25_0.png)"
