    \    if answer > 5:\n        print(\"You are overaged.\")\n    elif answer <=\
    \ 5 and answer > 2:\n        print(\"Welcome to the Toddlers Club!\")\n    elif\
    \ answer == 2:\n        print(\"Welcome! You are a star member of the Toddlers\
    \ Club!\")\n    else:\n        print(\"You are too young for Toddlers Club.\"\
    )\n```\n\n```python\nprint(your_choice(6))\nprint(your_choice(3))\nprint(your_choice(1))\n\
    print(your_choice(0))\nprint(your_choice(2))\n```\n\n```\nYou are overaged. None\n\
    Welcome to the Toddlers Club! None\nYou are too young for Toddlers Club. None\n\
    You are too young for Toddlers Club. None\nWelcome! You are a star member of the\
    \ Toddlers Club! None\n```\n\n## pass 语句\n\n**pass** 语句不执行任何操作。有时我们需要一个占位符来满足复合语句的语法要求。我们使用\
    \ **pass** 语句来填充所需的语句套件。其语法很简单。\n\n```python\npass\n```\n\n这是一个使用 `pass` 语句的例子。\n\
    \n```python\nif n%2 == 0:\n    pass # Ignore even values\nelse:\n    count +=\
    \ 1 # Count the odd values\n```\n\n是的，从技术上讲，我们可以反转 `if` 子句中的逻辑。然而，有时提供明确的“不执行任何操作”比确定\
    \ **if** 语句中条件的逆更清晰。随着程序的增长和演变，拥有一个 **pass** 语句可以方便地提醒程序可以扩展的地方。此外，当我们学习 *数据 +\
    \ 处理 = 对象* 中的类声明时，我们将看到 **pass** 语句的另一个用途。\n\n## assert 语句\n\n断言是我们声称在程序的这一点上应该为真的条件。通常，它总结了程序变量的状态。断言可以帮助解释变量之间的关系，回顾程序到目前为止发生了什么，并显示\
    \ **if** 语句和 **for** 或 **while** 循环是否具有预期的效果。\n\n当程序正确时，无论提供什么输入，所有断言都为真。当程序有错误时，对于某些输入组合，至少有一个断言最终为假。\n\
    \nPython 通过 **assert** 语句直接支持断言。有两种形式：\n**assert** 条件\n**assert** 条件，表达式\n\n如果\
    \ *条件* 为 False，则程序出错；此语句会引发 AssertionError 异常。\n如果 *条件* 为 True，则程序正确，此语句不再执行任何操作。\n\
    如果使用语句的第二种形式，并且给出了 *表达式*，则会使用表达式的值引发异常。我们将在 *异常* 中详细介绍异常。如果表达式是字符串，它将成为与 AssertionError\
    \ 异常关联的值。\n\n**注意：** 附加功能\n**assert** 语句还有一个更高级的功能。如果表达式求值为一个类，则该类将代替 AssertionError\
    \ 使用。这并不广泛使用，并且依赖于我们尚未涵盖的语言元素。\n\n这是一个典型的例子：\n\n```python\nmax = 0\nif a < b:\n\
    \    max = b\nif b < a:\n    max = a\n```\n\n```python\nassert (max == a or max\
    \ == b) and max >= a and max >= b\n```\n\n如果断言条件为真，程序继续执行。如果断言条件为假，程序会引发 AssertionError\
    \ 异常并停止，显示发现问题的行。\n\n当 `a` 等于 `b` 且不等于零时运行此程序；它将引发 AssertionError 异常。显然，当 `a =\
    \ b` 时，**if** 语句没有将 `max` 设置为 `a` 和 `b` 中的最大值。**if** 语句中存在问题，而断言的存在揭示了该问题。\n\n\
    ## if-else\n\n在某些情况下，表达式涉及一个简单的条件，而一个完整的 **if** 语句在语法上显得多余且分散注意力。Python 有一个方便的逻辑运算符，它评估一个条件，然后根据该条件返回两个值中的一个。\n\
    \n### 三元运算符\n\n大多数算术和逻辑运算符都涉及一个或两个值。应用于单个值的操作称为一元操作。例如 `-a` 和 `abs(b)` 是一元操作的例子：一元取负和一元绝对值。应用于两个值的操作称为二元操作。例如，`a*b`\
    \ 表示二元乘法运算符。\n\nif-else 运算符是三元（或三元）运算符。它涉及一个条件表达式和两个替代表达式。因此，它不使用单个特殊字符，而是使用两个关键字：`if`\
    \ 和 `else`。\n\n有些人会错误地称它为三元运算符，好像这是唯一可能的三元运算符。\n\n该运算符的基本形式是\n表达式 **if** 条件 **else**\
    \ 表达式\n\nPython 首先评估中间的条件。如果条件为 True，则评估左侧表达式，这就是操作的值。如果条件为 False，则评估右侧表达式，这就是操作的值。\n\
    \n请注意，条件总是被评估。其他两个表达式中只有一个被评估，这使得它成为一种类似于 **and** 和 **or** 的短路运算符。\n\n这里有几个例子。\n\
    average = sum/count **if** count != 0 **else** None\noddSum = oddSum + (n **if**\
    \ n % 2 == 1 **else** 0)\n\n其意图是让语句具有类似英语的阅读方式。平均值是总和除以计数（如果计数非零）；否则平均值为 None。\n\
    \n第一个例子的冗长替代方案如下。\n**if** count != 0:\n    average = sum/count\n**else**:\n  \
    \  average = None\n\n这似乎是为了防止在极少数情况下没有值可求平均值时出错而额外增加了三行代码。\n同样，第二个例子的冗长版本如下：\n\
    \n```python\nif n % 2 == 0:\n    pass\nelse:\n    oddSum = oddSum + n\n```\n\n\
    对于第二个例子，原始语句非常清晰地表达了我们的意图：我们正在对奇数值求和。冗长的 if 语句倾向于通过将其作为 if 语句的一个分支来模糊我们的目标。\n\n\
    ## 练习\n\n1.  编写一个程序，要求用户输入以厘米为单位的长度。如果用户输入负长度，程序应告诉用户输入无效。否则，程序应将长度转换为英寸并打印结果。一英寸等于\
    \ 2.54 厘米。\n2.  编写一个程序，询问用户已修读了多少学分。如果他们修读了 23 学分或更少，打印该学生是大一新生。如果他们修读了 24 到 53\
    \ 学分之间，打印他们是大二学生。大三学生的范围是 54 到 83，大四学生是 84 及以上。\n3.  生成一个 1 到 10 之间的随机数。要求用户猜测该数字，并根据他们是否猜对打印一条消息。\n\
    4.  编写一个程序，要求用户输入两个数字，如果这两个数字相差在 0.001 以内，则打印 \"Close\"，否则打印 \"Not close\"。\n\
    5.  如果一个年份能被 4 整除，则是闰年，但能被 100 整除的年份不是闰年，除非它们也能被 400 整除。编写一个程序，要求用户输入一个年份，并打印出它是否是闰年。\n\
    6.  编写一个程序，要求用户输入一个数字，并打印出该数字的所有除数。\n7.  编写一个程序，让用户与计算机玩石头-剪刀-布游戏。应该有五轮，五轮结束后，你的程序应打印出谁赢谁输，或者是否平局。"
