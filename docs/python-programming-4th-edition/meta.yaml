  - '[PAGE 155]


    In Python 3.0, using object as a parent class will no longer be necessary.

    In Python 2.6, however, it is highly recommended.


    # Class Responsibilities


    Assigning responsibility to class can be challenging. A number of reasons can
    be used to justify the functions and instance variables that are combined in a
    single class.


    +   - **Convenience.** A class is defined to do things because well its convenient
    to write the program that way.

    - **Similar Operations.** A class is defined because it does all input, all output,
    or all calculations.

    - **Similar Time.** A class is defined to handle all initialization, all processing
    or all final cleanup.

    - **Sequence.** We identify some operations which are performed in a simple sequence
    and bundle these into a single class.

    - **Common Data.** A class is defined because it has the operations which isolate
    a data structure or algorithm.


    # Creating and Using Objects


    Once we have a class definition, we can make objects which are instances of that
    class. We do this by evaluating the class as if it were a function: for example,
    Die(). When we make one of these class calls, two things will happen.'
  - '[PAGE 156]


    A new object is created. This object has a reference to its class definition.


    The objects initializer method, `__init__()`, is called. Well look at how you
    define this method function in th next section.


    Lets create two instances of our Die class.


    ```

    d1 = Die()

    d2 = Die()

    d1.roll(), d2.roll() (6,5)

    ```


    **An Objects Lifecycle.** Each instance of every class has a lifecycle. The following
    is typical of most objects.


    **Definition.** The class definition is read by the Python interpreter (or it
    is a builtin class). Class definitions are created by the **class** statement.
    Examples of built-in classes include file, str, int, etc.


    **Construction.** An instance of the class is constructed: Python allocates the
    namespace for the objects instance variables and associating the object with the
    class definition. The `__init__()` method is executed to initialize any attributes
    of the newly created instance.


    **Access and Manipulation.** The instances methods are called (similar to function
    calls we covered in *Functions*), by client objects or the main script. There
    is a considerable amount of collaboration among objects in most programs. Methods
    that report on the state of the object are sometimes called *accessors*; methods
    that change the state of the object are sometimes called *mutators* or *manipulators*.


    **Garbage Collection.** Eventually, there are no more references to this instance.
    Typically, the variable with an object reference was part of the body of a function
    that finished, the namespace is dropped, and the variables no longer exist. Python'
  - '[PAGE 157]


    detects this, and removes the referenced object from memory, freeing up the storage
    for subsequent reuse. This freeing of memory is termed *garbage collection*, and
    happens automatically. See *Garbage Collection* for more information.


    # Garbage Collection


    It is important to note that Python counts references to objects. When object
    is no longer in use, the reference count is zero, the object can be removed from
    memory. This is true for all objects, especially objects of built-in classes like
    str. This frees us from the details of memory management as practiced by C++ programmers.
    When we do something like the following:


    ```

    s= "123" s= s+"456"

    ```


    The following happens.

    Python creates the string "123" and puts a reference to this string into the variable
    s.

    Python creates the string "456".

    Python performs the string concatenation method between the string referenced
    by s and the string "456", creating a new string "123456".

    Python assigns the reference to this new "123456" string into the variable s.


    At this point, strings "123" and "456" are no longer referenced by any variables.
    These objects will be destroyed as part of garbage collection.


    **Important:** The self variable

    In Python, the self qualifier is simply required all the time.'
  - '[PAGE 158]


    Programmers experienced in Java or C++ may object to seeing the explicit self.
    in front of all variable names and method function names. In Java and C++, there
    is a this. qualifier which is assumed by the compiler. Sometimes this qualifier
    is required to disambiguate names, other times the compiler can work out what
    you meant.


    An object is a namespace; it contains the attributes. We can call the attributes
    *instance variables* to distinguish them from global variables and free variables.


    **Instance Variables** These are part of an objects namespace. Within the method
    functions of a class, these variables are qualified by self.

    Outside the method functions of the class, these variables are qualified by the
    objects name.

    In *die.py*, the main() function would refer to d1.value to get the value attribute
    of object d1.


    **Global Variables** Global variables are pare of a special global namespace.
    The **global** state-ment creates the variable name in the global namespace instead
    of the local namespace. See *The global Statement* for more information.

    While its easy to refer to global variables, its not as easy to create them.


    **Free Variables** Within a method function, a variable that is not qualified
    by self., nor marked by **global** is a free variable. Python checks the local
    namespace, then the global namespace for this variable. This ambiguity is, generally,
    not a good idea.


