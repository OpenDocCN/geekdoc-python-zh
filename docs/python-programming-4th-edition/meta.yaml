  - '[PAGE 102]


    The if-else operator trinary (or ternary) It involves a conditional expression
    and two alternative expressions. Consequently, it doesnt use a single special
    character, but uses two keywords: if and else.


    Some folks will mistakenly call it the ternary operator as if this is the only
    possible ternary operator.


    The basic form of the operator is

    expression **if** condition **else** expression


    Python evaluates the condition in the middle first. If the condition is True,
    then the left-hand expression is evaluated, and thats the value of the operation.
    If the condition is False, then the right-hand expression is evaluated, and thats
    the value of the operation.


    Note that the condition is always evaluated. Only one of the other two expressions
    is evaluated, making this a kind of short-cut operator like **and** and **or**.


    Here are a couple of examples.

    average = sum/count **if** count != 0 **else** None

    oddSum = oddSum + ( n **if** n % 2 == 1 **else** 0 )

