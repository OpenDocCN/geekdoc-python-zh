    False\n```\n\n```\nnot (8 > 2)\nFalse\n```\n\n```\n>>> not (2 > 10)\nTrue\n```\n\
    \n## Bit Manipulation Operators\n\nWe've already seen the usual math operators:\
    \ +, -, *, /, %, **; as well as the abs() and pow() functions. There are several\
    \ other operators available to us. Principally, these are for manipulating the\
    \ individual bits of an integer value.\nWe'll look at ~, &, ^, |, << and >>.\n\
    \nThe unary ~ operator flops all the bits in a plain or long integer. 1s become\
    \ 0s and 0s become 1s. Since most hardware uses a technique called 2's complement,\
    \ this is mathematically equivalent to adding 1 and switching the number's sign.\n\
    \n```\n>>> print ~0x12345678\n-305419897\n```\n\nThere are binary bit manipulation\
    \ operators, also. These perform simple Boolean operations on all bits of the\
    \ integer at once.\n\nThe binary & operator returns a 1-bit if the two input bits\
