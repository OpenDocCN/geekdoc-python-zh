    \ `.py` 文件时运行 `python.exe` 程序。这可以通过 **文件夹选项** 控制面板完成。**文件类型** 选项卡允许你将文件类型与处理该文件的程序配对。\n\
    \n请按照以下步骤将 Python 路径添加到环境变量。\n\n- 步骤 1：点击开始按钮并打开运行程序。\n- 步骤 2：现在输入 `sysdm.cpl`\
