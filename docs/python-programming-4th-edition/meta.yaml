    \ We use a `global` statement in the function to do this. On the other hand, if\
    \ we just want to use the value of the global variable, we do not need a `global`\
    \ statement.\n\n## Arguments\n\nWe finish the chapter with a bit of a technical\
    \ detail. You can skip this section for the time being if you don't want to worry\
