    # Python Pandas - Panel


    A **panel** is a 3D container of data. The term **Panel data** is derived from
    econometrics and is partially responsible for the name pandas – **pan(el)-da(ta)-s**.

    The names for the 3 axes are intended to give some semantic meaning to describing
    operations involving panel data. They are –


    +   - **items** – axis 0, each item corresponds to a DataFrame contained inside.

    - **major_axis** – axis 1, it is the index (rows) of each of the DataFrames.

    - **minor_axis** – axis 2, it is the columns of each of the DataFrames.


    **pandas.Panel()**

    A Panel can be created using the following constructor –


    ```

    pandas.Panel(data, items, major_axis, minor_axis, dtype, copy)

    ```'
