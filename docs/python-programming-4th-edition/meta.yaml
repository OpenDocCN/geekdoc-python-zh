    You''ll get syntax error messages whenever you enter invalid or incomplete statements.
    In this case, you typed print with a capital letter which is a big no to a case-sensitive
    language like Python.


    If you''re just using Python interactively, you can do away with the print command
    entirely by just typing your statement within quotes such as `Hello, World!`


    ## Getting Help


    Python has two closely-related help modes. One is the general help utility, the
    other is a help function that provides the documentation on a specific object,
    module, function or class.


    ### The help() Utility


    Help is available through the `help()` function.

    If you enter just `help()` you will enter the online help utility. This help utility
    allows you to explore the Python documentation.

    The interaction looks like this:


    ```

    >>> help

    ```


    Type `help()` for interactive help, or `help(object)` for help about object.

    >>> `help()`


    ### Help on a specific topic


    If you enter `help(object)` for some object, you will be given help on that specific
    object. This help is displayed using a help viewer.

    You''ll enter something like this:

    >>> `help("EXPRESSIONS")`


    ## Exiting Python


    To exit from Python, you can type any of these commands:


    ```

    quit()

    exit()

    Control-Z then press enter

    ```


