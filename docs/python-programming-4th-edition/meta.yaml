- md: '## calendar

    This module contains routines for displaying and working with the calendar. This
    can help you determine the day of the week on which a month starts and ends; it
    can count leap days in an interval of years, etc.


    ## collections

    This package contains some handy data types, plus the Abstract Base Classes that
    we use for defining our own collections. Data types include the collections.deque
    a double-ended queue that can be used as stack (LIFO) or queue (FIFO). The collections.defaultdict
    class, which can return a default value instead of raising an exception for missing
    keys. The collections.namedtuple function helps us to create a small, specialized
    class that is a tuple with named positions.

    We made use of this library in *Creating or Extending Data Types*.


    ## bisect

    The bisect module contains the bisect() function to search a sorted list for a
    specific value. It also contains the insort() function to insert an item into
    a list maintaining the sorted order. This module performs faster than simply appending
    values to a list and calling the sort() method of a list. This module''s source
    is instructive as a lesson in well-crafted algorithms.


    ## array

    The array module gives you a high-performance, highly compact collection of values.
    It isn''t as flexible as a list or a tuple, but it is fast and takes up relatively
    little memory. This is helpful for processing media like image or sound files.


    ## sched

    The sched module contains the definition for the scheduler class that builds a
    simple task scheduler. When a scheduler is constructed, it is given two user-supplied
    functions: one returns the time and the other executes a delay waiting for the
    time to arrive. For real-time scheduling, the time module time() and sleep() functions
    can be used. The scheduler has a main loop that calls the supplied time function
    and compares the current time with the time for scheduled tasks; it then calls
    the supplied delay function for the difference in time. It runs the scheduled
    task, and calls the delay function with a duration of zero to release any resources.


    ## copy

    The copy module contains functions for making copies of complex objects. This
    module contains a function to make a *shallow copy* of an object, where any objects
    contained within the parent are not copied, but references are inserted in the
    parent. It also contains a function to make a *deep copy* of an object, where
    all objects contained within the parent object are duplicated.

    Note that Python''s simple assignment only creates a variable which is a label
    (or reference) to an object, not a duplicate copy. This module is the easiest
    way to create an independent copy.


    ## pprint

    The pprint module contains some useful functions like pprint.pprint() for printing
    easy-to-read representations of nested lists and dictionaries. It also has a PrettyPrinter
    class from which you can make subclasses to customize the way in which lists or
    dictionaries or other objects are printed.


    ## Numeric and Mathematical Modules

    These modules include more specialized mathematical functions and some additional
    numeric data types.


    ### decimal

    The decimal module provides decimal-based arithmetic which correctly handles significant
    digits, rounding and other features common to currency amounts.


    ### math

    The math module was covered in *The math Module*. It contains the math functions
    like sine, cosine and square root.


    ### random

    The random module was covered in *The math Module*.


    ## File and Directory Access

    We''ll look at many of these modules in *File Handling Modules*. These are the
    modules which are essential for handling data files.


    - **os.path** The os.path module is critical for creating portable Python programs.
    The popular operating systems (Linux, Windows and MacOS) each have different approaches
    to file names. A Python program that depends on os.path will behave more consistently
    in all environments.

    - **fileinput** The fileinput module helps your program process a large number
    of files smoothly and simply.

    - **glob**

    - **fnmatch** The glob and fnmatch modules help a Windows program handle wild-card
    file names in a standard manner.

    - **shutil** The shutil module provides shell-like utilities for file copy, file
    rename, directory moves, etc. This module lets you write short, effective Python
    programs that do things that are typically done by shell scripts.


    Why use Python instead of the shell? Python is far easier to read, far more efficient,
    and far more capable of writing moderately sophisticated programs. Using Python
    saves you from having to write long, painful shell scripts.


    ## Data Compression and Archiving

    These modules handle the various file compression algorithms that are available.
    We''ll look at these modules in *File Handling Modules*.


    - **tarfile**

    - **zipfile** These two modules create archive files, which contain a number of
    files that are bound together. The TAR format is not compressed, where the ZIP
    format is compressed. Often a TAR archive is compressed using GZIP to create a
    .tar.gz archive.

    - **zlib**

    - **gzip**

    - **bz2** These modules employ different compression algorithms. They all have
    similar features to compress or uncompress files.


    ## File Formats

    These are modules for reading and writing files in a few of the amazing variety
    of file formats that are in common use. In addition to these common formats, modules
    in chapter 20, Structured Markup Processing Tools are also important.


    ### csv

    The csv module helps you parse and create Comma-Separated Value (CSV) data files.
    This helps you exchange data with many desktop tools that produce or consume CSV
    files. We''ll look at this in *Comma-Separated Values: The csv Module*.


    ### ConfigParser

    Configuration files can take a number of forms. The simplest approach is to use
    a Python module as the configuration for a large, complex program. Sometimes configurations
    are encoded in XML.

    Many Windows legacy programs use .INI files. The ConfigParser can gracefully parse
    these files.


    ## Cryptographic Services

    These modules aren''t specifically encryption modules. Many popular encryption
    algorithms are protected by patents. Often, encryption requires compiled modules
    for performance reasons. These modules compute secure digests of messages using
    a variety of algorithms.


    ### hashlib

    Compute a secure hash or digest of a message to ensure that it was not tampered
    with.

    The hashlib.md5 class creates an MD5 hash, which is often used for validating
    that a downloaded file was received correctly and completely.


    ## Generic Operating System Services

    The following modules contain basic features that are common to all operating
    systems. Most of this commonality is achieved by using the C standard libraries.
    By using this module, you can be assured that your Python application will be
    portable to almost any operating system.


    ### os

    The os (and os.path) modules provide access to a number of operating system features.
    The os module provides control over Processes, Files and Directories. We''ll look
    at os and os.path in *The os Module* and *The os.path Module*.


    ### time

    The time module provides basic functions for time and date processing. Additionally
    datetime handles details of the calendar more gracefully than time does. We''ll
    cover both modules in detail in *Dates and Times: the time and datetime Modules*.

    Having modules like datetime and time mean that you never need to attempt your
    own calendrical calculations. One of the important lessons learned in the late
    90s was that many programmers love to tackle calendrical calculations, but their
    efforts had to be tested and reworked because of innumerable small problems.


    ### getopt

    ### optparse

    A well-written program makes use of the command-line interface. It is configured
    through options and arguments, as well as properties files. We''ll cover optparse
    in *Programs: Standing Alone*.

    Command-line programs for Windows will also need to use the glob module to perform
    standard file-name globbing.


    ### logging

    Often, you want a simple, standardized log for errors as well as debugging information.
    We''ll look at logging in detail in *Log Files: The logging Module*.


    ## Interprocess Communication and Networking

    This section includes modules for creating processes and doing simple *interprocess
    communication* (IPC) using the standard socket abstraction.


    ### subprocess

    The subprocess module provides the class required to create a separate process.
    The standard approach is called *forking* a subprocess. Under Windows, similar
    functionality is provided.

    Using this, you can write a Python program which can run any other program on
    your computer. This is very handy for automating complex tasks, and it allows
    you to replace clunky, difficult shell scripts with Python scripts.


    ### socket

    This is a Python implementation of the standard socket library that supports the
    TCP/IP protocol.


    ## Internet Data Handling

    The Internet Data Handling modules contain a number of handy algorithms. A great
    deal of data is defined by the Internet Request for Comments (RFC). Since these
    effectively standardize'
