    # 2. Floating-point numbers


    Also known as floats, floating-point numbers signify real numbers. Floats are
    written with a decimal point that segregates the integer from the fractional numbers.
    They may also be written in scientific notation where the uppercase or lowercase
    letter e signifies the 10th power:


    ```

    >>>6.2e3

    6200.0

    >>>6.2e2

    620

    ```


    # 3. Complex numbers


    Complex numbers are pairs of real and imaginary numbers. They take the form a
    + bJ where a is a float and the real part of the complex number. On the other
    side is bJ where b is a float and J or its lowercase indicates the square root
    of an imaginary number, -1. This makes b the imaginary part of the complex number.
    Here are examples of complex numbers at work:


    ```

    >>>a = 2 + 5j

    >>>b = 4 2j

    >>>c = a + b

    ```'
- md: '## Conversion of Number Type


    You can expect Python to convert expressions with mixed types of numbers to a
    common type to facilitate evaluation. In some situations, however, you may have
    to convert one number type to another explicitly, like when the conversion is
    required by a function parameter. You can type the following expressions to convert
    a number to another type:


    To convert x to a float: `float(x)`


    Example:


    ```

    >>>float(12)

    12.0

    ```


    To convert x to a plain integer: `int(x)`


    ```

    >>>int(12)

    12

    ```


    To convert x to a complex number: `complex(x)`


    ```

    >>>complex(12)

    (12+0j)

    ```


    ## Numeric Conversion Functions


    We can convert a number from one type to another. A conversion may involve a loss
    of precision because we''ve reduced the number of bits available. A conversion
    may also add a false sense of precision by adding bits which don''t have any real
    meaning.


    We''ll call these *factory functions* because they are a factory for creating
    new objects from other objects. The idea of factory function is a very general
    one, and these are just the first of many examples of this pattern.


    ## Numeric Function Definitions


    There are a number of conversions from one numeric type to another.


    ### int(x)


    Generates an integer from the object x. If x is a floating point number, digits
    to the right of the decimal point are truncated as part of creating an integer.
    If the floating point number is more than about 10 digits, a long integer object
    is created to retain the precision. If x is a long integer that is too large to
    be represented as an integer, there''s no conversion. Complex values can''t be
    turned into integers directly. If x is a string, the string is parsed to create
    an integer value. It must be a string of digits with an optional sign (+ or -).


    ```

    int("1243")

    1243

    int(3.14159)

    3

    ```


    ### float(x)


    Generates a float from object *x*. If *x* is an integer or long integer, a floating
    point number is created. Note that long integers can have a large number of digits,
    but floating point numbers only have approximately 16 digits; there can be some
    loss of precision. Complex values can''t be turned into floating point numbers
    directly.


    If *x* is a string, the string is parsed to create a float value. It must be a
    string of digits with an optional sign (+ or -). The digits can have a single
    decimal point (.).


    Also, a string can be in scientific notation and include e or E followed by the
    exponent as a simple signed integer value.


    ```

    float(23)

    23.0

    float("6.02E24")

    6.020000000000004e+24

    float(22)/7

    3.14285714286

    ```


    ### long(x)


    Generates a long integer from *x*. If *x* is a floating point number, digits to
    the right of the decimal point are truncated as part of creating a long integer.


    ```

    long(2)

    2L

    long(6.02E23)

    60199999999999995805696L

    long(2)**64

    18446744073709551616L

    ```


    ### complex(real, [imag])


    Generates a complex number from *real* and *imag*. If the imaginary part is omitted,
    it is 0.0. Complex is not as simple as the others. A complex number has two parts,
    real and imaginary. Conversion to complex typically involves two parameters.


    ```

    complex(3,2)

    (3+2j)

    complex(4)

    (4+0j)

    complex("3+4j")

    (3+4j)

    ```


    Note that the second parameter, with the imaginary part of the number, is optional.
    This leads to a number of different ways to call this function. In the example
    above, we used three variations: two numeric parameters, one numeric parameter
    and one string parameter.


    ## Built-In Math Functions


    The bulk of the math functions are in a separate module, called math, which we
    will cover in *The math Module*. The formal definitions of mathematical built-in
    functions are provided below.


    **abs(number)**

    Return the absolute value of the argument, |x|.


    **pow(x, y, [z])**

    Raise x to the y power, x^y. If z is present, this is done modulo z, x^y mod z.


    **round(number, [digits])**

    Round *number* to *ndigits* beyond the decimal point.

    If the *ndigits* parameter is given, this is the number of decimal places to round
    to. If *ndigits* is positive, this is decimal places to the right of the decimal
    point. If *ndigits* is negative, this is the number of places to the left of the
    decimal point.

    Examples:

    `print(round(678.456,2))`

    678.46

    `print(round(678.456,-1))`

    680.0


    ## Collection Functions


    These are several built-in functions which operate on simple collections of data
    elements.


    **max(value, ...)**

    Return the largest *value*.


    ```

    >>> max(1,2,3)

    3

    ```


    **min(value, ...)**

    Return the smallest *value*.


    ```

    >>> min(1,2,3)

    1

    ```


    ## Date and Time


    Most applications require date and time information to make it work efficiently
    and effectively. In Python, you can use the function `datetime.now()` to retrieve
    the current date and time. The command `datetime.now()` calls on a built-in Python
    code which gives the current date and time.

    To get the date and time from Python, encode the following on the command prompt:


    ```

    from datetime import datetime

    datetime.now()

    datetime.datetime(2016, 3, 10, 2, 16, 19, 962429)

    ```


    The date and time in this format is almost unintelligible and you might want to
    get a result that is more readable. One way to do this is by using `strftime`
    from Python''s standard library.

    Try entering these commands and see if you''ll get the format you like.


    ```

    >>>from time import strftime

    >>> strftime(''%Y-%m-%d %H:%M:%S'')

    ''2016-03-10 02:20:03''

    ```


    ## Boolean Data Type


    Comparisons in Python can only generate one of two possible responses: True or
    False. These data types are called booleans.


    To illustrate, you can create several variables to store Boolean values and print
    the result:


    ```

    bool_1 = 4 == 2*3

    bool_2 = 10 < 2 * 2**3

    bool_3 = 8 > 2 * 4 + 1

    print(bool_1)

    print(bool_2)

    print(bool_3)

    ```


    The Python Shell will display these results:


    ```

    False

    True

    False

    ```


