- md: "## Destroying things\n\nTo get rid of a component, use its destroy method.\
    \ For instance, to get rid of a button called button, do the following:\n\n```\n\
    button.destroy()\n```\n\nTo get rid of the entire GUI window, use the following:\n\
    ```\nroot.destroy()\n```\n\n## Stopping a window from being closed\n\nWhen your\
    \ user tries to close the main window, you may want to do something, like ask\
    \ them if they really want to quit. Here is a way to do that:\n\n```\nfrom tkinter\
    \ import *\nfrom tkinter.messagebox import askquestion\ndef quitter_function():\n\
    \    answer = askquestion(title='Quit?', message='Really quit?')\n    if answer=='yes':\
    \ root.destroy()\nroot = Tk()\nroot.protocol('WM_DELETE_WINDOW', quitter_function)\n\
    mainloop()\n```\n\nThe key is the following line, which causes quitter_function\
    \ to be called whenever the user tries to close the window.\n```\nroot.protocol('WM_DELETE_WINDOW',\
    \ quitter_function)\n```\n\n## Updating\n\nTkinter updates the screen every so\
    \ often, but sometimes that is not often enough. For instance, in a function triggered\
    \ by a button press, Tkinter will not update the screen until the function is\
    \ done.\n\nIf, in that function, you want to change something on the screen, pause\
    \ for a short while, and then change something else, you will need to tell Tkinter\
    \ to update the screen before the pause. To do that, just use this:\n```\nroot.update()\n\
    ```\nIf you only want to update a certain component, and nothing else, you can\
    \ use the update method of that component. For example,\n```\ncanvas.update()\n\
    ```\nA related thing that is occasionally useful is to have something happen after\
    \ a scheduled time interval. For instance, you might have a timer in your program.\
    \ For this, you can use the after method. Its first argument is the time in milliseconds\
    \ to wait before updating and the second argument is the function to call when\
    \ the time is right. Here is an example that implements a timer:\n\n```\nfrom\
    \ time import time\nfrom tkinter import *\ndef update_timer():\n    time_left\
    \ = int(90 - (time()-start))\n    minutes = time_left // 60\n    seconds = time_left\
    \ % 60\n    time_label.configure(text='{}:{:02d}'.format(minutes, seconds))\n\
    \    root.after(100, update_timer)\nroot = Tk()\ntime_label = Label()\ntime_label.grid(row=0,\
    \ column=0)\nstart = time()\nupdate_timer()\nmainloop()\n```\n\n## Dialogs\n\n\
    Many programs have dialog boxes that allow the user to pick a file to open or\
    \ to save a file. To use them in Tkinter, we need the following import statement:\n\
    \n```\nfrom tkinter.filedialog import *\n```\n\nTkinter dialogs usually look like\
    \ the ones that are native to the operating system.\n\n![](img/e3dac7e08bdd357a94774b55d90b82a8_348_0.png)\n\
    \nHere are the most useful dialogs:\n\n| Dialog | Description |\n|---|---|\n|\
    \ Askopenfilename | Opens a typical file chooser dialog |\n| Askopenfilenames\
    \ | Like previous, but user can pick more than one file |\n| Asksaveasfilename\
    \ | Opens a typical file save dialog |\n| Askdirectory | Opens a directory chooser\
    \ dialog |\n\nThe return value of askopenfilename and asksaveasfilename is the\
    \ name of the file selected. There is no return value if the user does not pick\
    \ a value. The return value of askopenfilenames is a list of files, which is empty\
    \ if no files are selected. The askdirectory function returns the name of the\
    \ directory chosen.\n\nThere are some options you can pass to these functions.\
    \ You can set initialdir to the directory you want the dialog to start in. You\
    \ can also specify the file types. Here is an example:\n\n```\nfilename=askopenfilename(initialdir='c:\\\
    python31\\', filetypes=[('Image files', '.jpg .png .gif'),('All files', '*')])\n\
    ```\n\nHere is an example that opens a file dialog that allows you to select a\
    \ text file. The program then displays the contents of the file in a textbox.\n\
    \n```\nfrom tkinter import *\nfrom tkinter.filedialog import *\nfrom tkinter.scrolledtext\
    \ import ScrolledText\nroot = Tk()\ntextbox = ScrolledText()\ntextbox.grid()\n\
    filename=askopenfilename(initialdir='c:\\python31\\', filetypes=[('Text files',\
    \ '.txt'),('All files', '*')])\ns = open(filename).read()\ntextbox.insert(1.0,\
    \ s)\nmainloop()\n```\n\n## Menu bars\n\nWe can create a menu bar, like the one\
    \ below, across the top of a window.\n\n![](img/e3dac7e08bdd357a94774b55d90b82a8_350_0.png)\n\
    \nHere is an example that uses some of the dialogs from the previous section:\n\
    \n```\nfrom tkinter import *\nfrom tkinter.filedialog import *\ndef open_callback():\n\
    \    filename = askopenfilename()\n    # add code here to do something with filename\n\
    def saveas_callback():\n    filename = asksaveasfilename()\n    # add code here\
    \ to do something with filename\nroot = Tk()\nmenu = Menu()\nroot.config(menu=menu)\n\
    file_menu = Menu(menu, tearoff=0)\nfile_menu.add_command(label='Open',command=open_callback)\n\
    file_menu.add_command(label='Save as', command=saveas_callback)\nfile_menu.add_separator()\n\
    file_menu.add_command(label='Exit', command=root.destroy)\nmenu.add_cascade(label='File',\
    \ menu=file_menu)\nmainloop()\n```\n\n## New windows\n\nCreating a new window\
    \ is easy. Use the Toplevel function:\n\n```\nwindow = Toplevel()\n```\n\nYou\
    \ can add components to the new window. The first argument when you create the\
    \ component needs to be the name of the window, like below\n\n```\nnew_window\
    \ = Toplevel()\nlabel = Label(new_window, text='Hi')\nlabel.grid(row=0, column=0)\n\
    ```\n\n## pack\n\nThere is an alternative to grid called pack. It is not as versatile\
    \ as grid, but there are some places where it is useful. It uses an argument called\
    \ side, which allows you to specify four locations for your components: TOP, BOTTOM,\
    \ LEFT, and RIGHT. There are two useful optional arguments, fill and expand. Here\
    \ is an example.\n\n```\nbutton1=Button(text='Hi')\nbutton1.pack(side=TOP, fill=X)\n\
    ```\n\n![](img/e3dac7e08bdd357a94774b55d90b82a8_352_0.png)\n\n```\nbutton2=Button(text='Hi')\n\
    button2.pack(side=BOTTOM)\n```\n\nThe fill option causes the component to fill\
    \ up the available space given to it. It can be either X, Y or BOTH. The expand\
    \ option is used to allow the component to expand when its window is resized.\
    \ To enable it, use expand=YES.\n\n**Note** You can use pack for some frames,\
    \ and grid for others; just don't mix pack and grid within the same frame, or\
    \ Tkinter won't know quite what to do.\n\n## StringVar\n\nTkinter has another\
    \ type of variable called a StringVar that holds strings. This type of variable\
    \ can be used to change the text in a label or a button or in some other components.\
    \ We already know how to change text using the configure method, and a StringVar\
    \ provides another way to do it.\n\nTo tie a component to a StringVar, use the\
    \ textvariable option of the component. A StringVar has get and set methods, just\
    \ like an IntVar, and whenever you set the variable, any components that are tied\
    \ to it are automatically updated.\n\nHere is a simple example that ties two labels\
    \ to the same StringVar. There is also a button that when clicked will alternate\
    \ the value of the StringVar (and hence the text in the labels)\n\n```\nfrom tkinter\
    \ import *\ndef callback():\n    global count\n    s.set('Goodbye' if count%2==0\
    \ else 'Hello')\n    count += 1\nroot = Tk()\ncount = 0\ns = StringVar()\ns.set('Hello')\n\
    label1 = Label(textvariable = s, width=10)\nlabel2 = Label(textvariable = s, width=10)\n\
    button = Button(text = 'Click me', command = callback)\nlabel1.grid(row=0, column=0)\n\
    label2.grid(row=0, column=1)\nbutton.grid(row=1, column=0)\nmainloop()\n```\n\n\
    ## The Python Imaging Library\n\nThe Python Imaging Library (PIL) contains useful\
    \ tools for working with images. As of this writing, the PIL is only available\
    \ for Python 2.7 or earlier. The PIL is not part of the standard Python distribution,\
    \ so you'll have to download and install it separately. It's easy to install,\
    \ though.\n\nPIL hasn't been maintained since 2009, but there is a project called\
    \ Pillow that is nearly compatible with PIL and works in Python 3.0 and later.\n\
    \n## Using images other than GIFs with Tkinter\n\nTkinter, as we've seen, can't\
    \ use JPEGs and PNGs. But it can if we use it in conjunction with the PIL. Here\
    \ is a simple example:\n\n```\nfrom Tkinter import *\nfrom PIL import Image, ImageTk\n\
    root = Tk()\ncat_image = ImageTk.PhotoImage(Image.open('sun.jpg'))\nbutton=Button(image=cat_image)\n\
    ```"
  mdcn: "## 销毁组件\n\n要移除一个组件，请使用其 `destroy` 方法。例如，要移除一个名为 `button` 的按钮，请执行以下操作：\n\n\
    ```\nbutton.destroy()\n```\n\n要移除整个 GUI 窗口，请使用以下代码：\n```\nroot.destroy()\n```\n\
    \n## 阻止窗口关闭\n\n当用户尝试关闭主窗口时，你可能希望执行某些操作，例如询问他们是否确实要退出。以下是实现此目的的一种方法：\n\n```\nfrom\
    \ tkinter import *\nfrom tkinter.messagebox import askquestion\ndef quitter_function():\n\
    \    answer = askquestion(title='Quit?', message='Really quit?')\n    if answer=='yes':\
    \ root.destroy()\nroot = Tk()\nroot.protocol('WM_DELETE_WINDOW', quitter_function)\n\
    mainloop()\n```\n\n关键在于以下这行代码，它使得每当用户尝试关闭窗口时，都会调用 `quitter_function`。\n```\nroot.protocol('WM_DELETE_WINDOW',\
    \ quitter_function)\n```\n\n## 更新\n\nTkinter 会定期更新屏幕，但有时这还不够频繁。例如，在由按钮点击触发的函数中，Tkinter\
    \ 在函数完成之前不会更新屏幕。\n\n如果在该函数中，你想更改屏幕上的某些内容，暂停一小会儿，然后再更改其他内容，你就需要告诉 Tkinter 在暂停之前更新屏幕。为此，只需使用以下代码：\n\
    ```\nroot.update()\n```\n如果你只想更新某个特定组件，而不更新其他任何内容，可以使用该组件的 `update` 方法。例如，\n```\n\
    canvas.update()\n```\n一个偶尔有用的、相关的方法是在预定的时间间隔后执行某些操作。例如，你的程序中可能有一个计时器。为此，你可以使用\
    \ `after` 方法。它的第一个参数是更新前等待的时间（以毫秒为单位），第二个参数是时间到了要调用的函数。以下是一个实现计时器的示例：\n\n```\n\
    from time import time\nfrom tkinter import *\ndef update_timer():\n    time_left\
    \ = int(90 - (time()-start))\n    minutes = time_left // 60\n    seconds = time_left\
    \ % 60\n    time_label.configure(text='{}:{:02d}'.format(minutes, seconds))\n\
    \    root.after(100, update_timer)\nroot = Tk()\ntime_label = Label()\ntime_label.grid(row=0,\
    \ column=0)\nstart = time()\nupdate_timer()\nmainloop()\n```\n\n## 对话框\n\n许多程序都有对话框，允许用户选择要打开的文件或保存文件。要在\
    \ Tkinter 中使用它们，我们需要以下导入语句：\n\n```\nfrom tkinter.filedialog import *\n```\n\n\
    Tkinter 对话框通常看起来像操作系统原生的对话框。\n\n![](img/e3dac7e08bdd357a94774b55d90b82a8_348_0.png)\n\
    \n以下是最有用的对话框：\n\n| 对话框 | 描述 |\n|---|---|\n| Askopenfilename | 打开一个典型的文件选择对话框 |\n\
    | Askopenfilenames | 与前一个类似，但用户可以选择多个文件 |\n| Asksaveasfilename | 打开一个典型的文件保存对话框\
    \ |\n| Askdirectory | 打开一个目录选择对话框 |\n\n`askopenfilename` 和 `asksaveasfilename`\
    \ 的返回值是所选文件的名称。如果用户没有选择任何值，则没有返回值。`askopenfilenames` 的返回值是一个文件列表，如果没有选择文件，则该列表为空。`askdirectory`\
    \ 函数返回所选目录的名称。\n\n你可以向这些函数传递一些选项。你可以将 `initialdir` 设置为对话框开始时所在的目录。你还可以指定文件类型。以下是一个示例：\n\
    \n```\nfilename=askopenfilename(initialdir='c:\\python31\\', filetypes=[('Image\
    \ files', '.jpg .png .gif'),('All files', '*')])\n```\n\n以下是一个示例，它打开一个文件对话框，允许你选择一个文本文件。然后程序在文本框中显示文件的内容。\n\
    \n```\nfrom tkinter import *\nfrom tkinter.filedialog import *\nfrom tkinter.scrolledtext\
    \ import ScrolledText\nroot = Tk()\ntextbox = ScrolledText()\ntextbox.grid()\n\
    filename=askopenfilename(initialdir='c:\\python31\\', filetypes=[('Text files',\
    \ '.txt'),('All files', '*')])\ns = open(filename).read()\ntextbox.insert(1.0,\
    \ s)\nmainloop()\n```\n\n## 菜单栏\n\n我们可以创建一个菜单栏，如下所示，位于窗口的顶部。\n\n![](img/e3dac7e08bdd357a94774b55d90b82a8_350_0.png)\n\
    \n以下是一个使用上一节中部分对话框的示例：\n\n```\nfrom tkinter import *\nfrom tkinter.filedialog\
    \ import *\ndef open_callback():\n    filename = askopenfilename()\n    # 在此处添加代码以对\
    \ filename 执行某些操作\ndef saveas_callback():\n    filename = asksaveasfilename()\n\
    \    # 在此处添加代码以对 filename 执行某些操作\nroot = Tk()\nmenu = Menu()\nroot.config(menu=menu)\n\
    file_menu = Menu(menu, tearoff=0)\nfile_menu.add_command(label='Open',command=open_callback)\n\
    file_menu.add_command(label='Save as', command=saveas_callback)\nfile_menu.add_separator()\n\
    file_menu.add_command(label='Exit', command=root.destroy)\nmenu.add_cascade(label='File',\
    \ menu=file_menu)\nmainloop()\n```\n\n## 新窗口\n\n创建一个新窗口很容易。使用 `Toplevel` 函数：\n\
    \n```\nwindow = Toplevel()\n```\n\n你可以向新窗口添加组件。创建组件时的第一个参数需要是窗口的名称，如下所示：\n\n```\n\
    new_window = Toplevel()\nlabel = Label(new_window, text='Hi')\nlabel.grid(row=0,\
    \ column=0)\n```\n\n## pack\n\n`grid` 的一个替代方案是 `pack`。它不如 `grid` 通用，但在某些地方很有用。它使用一个名为\
    \ `side` 的参数，允许你为组件指定四个位置：`TOP`、`BOTTOM`、`LEFT` 和 `RIGHT`。有两个有用的可选参数：`fill` 和\
    \ `expand`。以下是一个示例。\n\n```\nbutton1=Button(text='Hi')\nbutton1.pack(side=TOP,\
    \ fill=X)\n```\n\n![](img/e3dac7e08bdd357a94774b55d90b82a8_352_0.png)\n\n```\n\
    button2=Button(text='Hi')\nbutton2.pack(side=BOTTOM)\n```\n\n`fill` 选项使组件填充分配给它的可用空间。它可以是\
    \ `X`、`Y` 或 `BOTH`。`expand` 选项用于允许组件在窗口调整大小时扩展。要启用它，请使用 `expand=YES`。\n\n**注意**\
    \ 你可以在某些框架中使用 `pack`，在其他框架中使用 `grid`；只是不要在同一个框架中混合使用 `pack` 和 `grid`，否则 Tkinter\
    \ 将不知道该如何处理。\n\n## StringVar\n\nTkinter 有另一种类型的变量，称为 `StringVar`，用于保存字符串。这种类型的变量可用于更改标签、按钮或其他一些组件中的文本。我们已经知道如何使用\
    \ `configure` 方法更改文本，而 `StringVar` 提供了另一种方法。\n\n要将组件与 `StringVar` 绑定，请使用组件的 `textvariable`\
    \ 选项。`StringVar` 具有 `get` 和 `set` 方法，就像 `IntVar` 一样，每当你设置该变量时，任何绑定到它的组件都会自动更新。\n\
    \n以下是一个简单的示例，将两个标签绑定到同一个 `StringVar`。还有一个按钮，点击时会交替更改 `StringVar` 的值（从而更改标签中的文本）。\n\
    \n```\nfrom tkinter import *\ndef callback():\n    global count\n    s.set('Goodbye'\
    \ if count%2==0 else 'Hello')\n    count += 1\nroot = Tk()\ncount = 0\ns = StringVar()\n\
    s.set('Hello')\nlabel1 = Label(textvariable = s, width=10)\nlabel2 = Label(textvariable\
    \ = s, width=10)\nbutton = Button(text = 'Click me', command = callback)\nlabel1.grid(row=0,\
    \ column=0)\nlabel2.grid(row=0, column=1)\nbutton.grid(row=1, column=0)\nmainloop()\n\
    ```\n\n## Python Imaging Library\n\nPython Imaging Library (PIL) 包含用于处理图像的有用工具。在撰写本文时，PIL\
    \ 仅适用于 Python 2.7 或更早版本。PIL 不是标准 Python 发行版的一部分，因此你必须单独下载并安装它。不过，安装起来很容易。\n\n\
    PIL 自 2009 年以来一直没有维护，但有一个名为 Pillow 的项目与 PIL 几乎兼容，并且可以在 Python 3.0 及更高版本中工作。\n\n\
    ## 在 Tkinter 中使用 GIF 以外的图像\n\n正如我们所看到的，Tkinter 不能使用 JPEG 和 PNG。但如果我们结合 PIL 使用它，就可以。以下是一个简单的示例：\n\
    \n```\nfrom Tkinter import *\nfrom PIL import Image, ImageTk\nroot = Tk()\ncat_image\
    \ = ImageTk.PhotoImage(Image.open('sun.jpg'))\nbutton=Button(image=cat_image)\n\
    ```"
