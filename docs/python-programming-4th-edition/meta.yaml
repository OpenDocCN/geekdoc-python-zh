    \ | 按下的键的名称 |\n| x, y | 鼠标指针的坐标 |\n| Delta | 鼠标滚轮的值 |\n\n## 按键事件\n\n对于按键事件，我们可以为不同的键设置特定的回调，也可以捕获所有按键并在同一个回调中处理它们。以下是后者的示例：\n\
