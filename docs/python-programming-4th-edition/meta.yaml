    - 数据持久化。对象可以写入文件、套接字或数据库，以便它们可以在一个特定程序的处理之外持续存在。本章涵盖了多个用于序列化对象以便保存的包。SQLite 3
    关系数据库也在此模块中描述。

    - 通用操作系统服务。操作系统为我们的应用程序提供许多服务，包括访问设备和文件、一致的时间概念、处理命令行选项的方法、日志记录以及处理操作系统错误。我们将在
    *程序：独立运行* 中研究其中一些模块。

    - 可选操作系统服务。本节包括大多数 Linux 变体中常见但 Windows 中并非总是可用的操作系统服务。

