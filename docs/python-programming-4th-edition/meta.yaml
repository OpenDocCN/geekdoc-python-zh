  md: '# Python Pandas DataFrame


    The [Pandas library documentation](https://pandas.pydata.org/docs/) defines a
    DataFrame as a two-dimensional, size-mutable, potentially heterogeneous tabular
    data structure with labeled axes (rows and columns).


    ![](img/e3dac7e08bdd357a94774b55d90b82a8_286_0.png)


    In plain terms, think of a DataFrame as a table of data, i.e. a single set of
    formatted two-dimensional data, with the following characteristics:


    +   - There can be multiple rows and columns in the data.

    - Each row represents a sample of data,

    - Each column contains a different variable that describes the samples (rows).

    - The data in every column is usually the same type of data e.g. numbers, strings,
    dates.

    - Usually, unlike an excel data set, DataFrames avoid having missing values, and
    there are no gaps and empty values between rows or columns.


    # Structure


    Let us assume that we are creating a data frame with students data.'
