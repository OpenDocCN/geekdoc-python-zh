    Well include a digression on the two common argument binding mechanisms: call
    by value and call by reference in *Call By Value and Call By Reference*. Note
    that this is a distinction that doesnt apply to Python, but if you have experience
    in languages like C or C++, you may wander where and how this is implemented.


    Finally, well cover some aspects of functions as first-class objects in *Function
    Objects*.


    # Functions and Namespaces


    This is an overview of how Python determines the meaning of a name. Well omit
    some details to hit the more important points. For more information, see section
    4.1 of the *Python Language Reference*.


    The important issue is that we want variables created in the body of a function
    to be private to that function. If all variables are global, then each function
    runs a risk of accidentally disturbing the value of a global variable. In the
    COBOL programming language (without using separate compilation or any of the modern
    extensions) all variables are globally declared in the data division, and great
    care is required to prevent accidental or unintended use of a variable.


    To achieve privacy and separation, Python maintains several dictionaries of variables.
    These dictionaries define the context in which a variable name is understood.
    Because these dictionaries are used for resolution of variables, which name objects,
    they are called *namespaces*. A global namespace is available to all modules that
    are part of the currently executing Python script. Each module, class, function,
    lambda, or anonymous block of code given to the **exec** command has its own private
    namespace.'
  - "[PAGE 128]\n\nNames are resolved using the nested collection of namespaces that\
    \ define an execution environment. Python always checks the most-local dictionary\
    \ first, ending with the global dictionary.\n\nConsider the following script.\n\
    \n```\ndef deep( a, b ): print \"a=\", a print \"b=\", b\ndef shallow( hows, things\
    \ ):\n    deep( hows, 1 )\n    deep( things, coffee )\nhows= 1 coffee= 2\nshallow(\
    \ \"word\", 3.1415926 ) shallow( hows, coffee )\n```\n\nThe deep() function has\
    \ a local namespace, where two variables are defined: a and b. When deep() is\
    \ called from shallow(), there are three nested scopes that define the environment:\
    \ the local namespace for deep(): the local namespace for shallow(), and the global\
    \ namespace for the main script.\n\nThe shallow() function has a local namespace,\
    \ where two variables are defined: hows and things.\n\nWhen shallow() is called\
    \ from the main script, the local hows is resolved in the local namespace. It\
    \ hides the global variable with the same name.\n\nThe reference to coffee is\
    \ not resolved in the local namespace, but is resolved in the global namespace.\
    \ This is called a *free* variable, and is sometimes a symptom of poor software\
    \ design."
  - '[PAGE 129]


    The main script by definition executes in the global namespace, where two variables
    (hows and coffee) are defined, along with two functions, deep() and shallow().


    **Some Consequences.** Since each imported module exists in its own namespace,
    all functions and classes within that module must have their names qualified by
    the module name. We saw this when we imported math and random. To use the sqrt()
    function, we must say math.sqrt, providing the module name that is used to resolve
    the name sqrt().


    This module namespace assures that everything in a module is kept separate from
    other modules. It makes our programs clear by qualifying the name with the module
    that defined the name.


    The module namespace also allow a module to have relatively global variables.
    A module, for example, can have variables that are created when the module is
    imported. In a sense these are global to all the functions and classes in the
    module. However, because they are only known within the modules namespace, they
    wont conflict with variables in our program or other modules.


    Having to qualify names within a module can become annoying when we are making
    heavy use of a module. Python has ways to put elements of a module into the global
    namespace. Well look at these in *Components, Modules and Packages*.


    **Warning:** Global Warning'
