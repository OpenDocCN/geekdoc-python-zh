    # Variations on An import Theme


    There are several variations on the **import** statement. We looked at these briefly
    in *The math Module*. In this section, well cover the variations available on
    the **import** statement.


    +   - Basic Import. This is covered in *Module Use: The import Statement*.

    - Import As. This allows us to import a module, and assign it a new name.

    - From Module Import Names. This allows us to import a module, making some names
    part of the global namespace.

    - Combined From and As import.


    # Import As


    A useful variation in the **import** statement is to rename a module using the
    **as** clause.


    ```

    import module as name

    ```


    This module renaming is used in two situations.


    +   - We have two or more interchangeable versions of a module.

    - The module name is rather long and painful to type.


    There are number of situations where we have interchangable versions of a module.
    One example is the built-in os module. This module gives us a number of functions
    that behave identically on most major operating systems. The way this is done
    is to create a number of variant implementations of these functions, and then
    use as appropriate **as** clause to give them a platform-neutral name.'
- md: "## From Module Import Names\n\nTwo other variations on the **import** statement\
    \ introduce selected names from the module into the local namespace. One form\
    \ picks specific names to make global.\n\n```python\nfrom module import name,\
    \ ...\n```\n\nThis version of **import** adds a step after the module is imported.\
    \ It adds the given list of names into the local namespace, making them available\
    \ without using the module name as a qualifier.\n\nFor example:\n\n```python\n\
    from math import sin, cos, tan\n```\n\n## Import and Rename\n\nFinally, we can\
    \ combine the **from** and **as** options to both import selected items and provide\
    \ more understandable names for them.\n\nWe can say things like:\n\n```python\n\
    from module import name as name\n```\n\nIn this case, we're both concealing the\
    \ source of the item and its original name. We'd best have a very good reason\
    \ for this. Think of the confusion that can be caused by\n\n```python\nfrom math\
    \ import sqrt as sin\n```\n\nThis must be used cautiously to prevent creating\
    \ more problems than it appears to solve.\n\n## The exec Statement\n\nThe import\
    \ statement, in effect, executes the module file. Typically, the files we import\
    \ are defined as sequences of definitions. Since our main program often begins\
    \ with a series of import statements, these modules are imported into the global\
    \ namespace. Python also optimizes the modules brought in by the import statement\
    \ so that they are only imported once.\n\nThe exec statement can execute a file,\
    \ a string of Python code, as well as a code created by the compile() function.\
    \ Unlike the import statement, it doesn't optimize module definitions or create\
    \ and save a new namespace.\n\n```python\nexec expression\n```\n\nThe functions\
    \ eval() and execfile() do essentially the same thing.\n\nThe exec statement,\
    \ eval() function and execfile() functions are dangerous tools. These break one\
    \ of the Fundamental Assumptions: the source you are reading is the source that\
    \ is being executed. A program that uses the exec statement or eval() function\
    \ is incorporating other source statements into the program dynamically. This\
    \ can be hard to follow, maintain or enhance.\n\nGenerally, the exec statement\
    \ is something that must be used with some care. The most common use is to bring\
    \ in a set of configuration parameters written as simple Python assignment statements.\
    \ For example, we might use a file like the following as the configuration parameters\
    \ for a program.\n\n```\ndb_server= \"dbs_prod_01\"\ndb_port= \"3306\"\ndb_name=\
    \ \"PROD\"\n```\n\n## Chapter 12\n\n## Classes and Object-Oriented Programming\n\
    \nPython is an object-oriented programming language, which means that it manipulates\
    \ and works with data structures called objects. Objects can be anything that\
    \ could be named in Python: integers, functions, floats, strings, classes, methods,\
    \ etc. All have equal status in Python and are used anywhere an object is required.\n\
    \nObject-oriented programming permits us to organize our programs around the interactions\
    \ of *objects*. A *class* provides the definition of the structure and behavior\
    \ of the objects; each object is an instance of a class. Consequently, a typical\
    \ program is a number of class definitions and a final main function. The main\
    \ function creates the objects that will perform the job of the program.\n\nThis\
    \ chapter presents the basic techniques of defining classes. In *Semantics* we\
    \ define the semantics of objects and the classes which define their attributes\
    \ (instance variables) and behaviors. In *Class Definition: the class Statement*\
    \ we show the syntax for creating class definitions; we cover the use of objects\
    \ in *Creating and Using Objects*.\n\nPython has some system-defined names that\
    \ classes can exploit to make them behave like built-in Python classes, a few\
    \ of these are introduced in *Special Method Names*. We provide some examples\
    \ in *Some Examples*. Perhaps the most important part of working with objects\
    \ is how they collaborate to do useful work; we introduce this in *Object Collaboration*.\n\
    \n## Semantics\n\nObject-oriented programming focuses software design and implementation\
    \ around the definitions of and interactions between individual objects. An object\
    \ is said to *encapsulate* a state of being and a set of behaviors; it is both\
    \ data and processing. Each instance of a class has individual copies of attributes\
    \ which are tightly coupled with the class-wide operations. We can understand\
    \ objects by looking at four features, adapted from [Rumbaugh91].\n\n**Identity.**\
    \ Each object is unique and is distinguishable from all other objects. In the\
    \ real world, two otherwise identical coffee cups can be distinguished as distinct\
    \ objects. For example, they occupy different locations on our desk. In the world\
    \ of a computer's memory, objects could be identified by their address, which\
    \ would make them unique.\n\n**Classification.** This is sometimes called *Encapsulation*.\
    \ Objects with the same attributes and behavior belong to a common *class*. Each\
    \ individual object has unique attribute values. We saw this when we looked at\
    \ the various collection classes. Two different list objects have the same general\
    \ structure, and the same behavior. Both lists respond to append(), pop(), and\
    \ all of the other methods of a list. However, each list object has a unique sequence\
    \ of values.\n\n**Inheritance.** A class can inherit methods from a parent class,\
    \ reusing common features. A superclass is more general, a subclass overrides\
    \ superclass features, and is more specific. With the built-in Python classes,\
    \ we've looked at the ways in which all immutable sequences are alike.\n\n**Polymorphism.**\
    \ A general operation can have variant implementation methods, depending on the\
    \ class of the object. We saw this when we noted that almost every class in Python\
    \ has a + operation. Between two floating-point numbers the + operation adds the\
    \ numbers, between two lists, however, the + operation concatenates the lists.\n\
    \n## Class in Python\n\nA Class is a logical grouping of data and functions. It\
    \ gives the freedom to create data structures that contain arbitrary content and\
    \ hence are easily accessible.\n\nFor example, for any bank employee who wants\
    \ to fetch the customer details online would go to the **customer class**, where\
    \ all its attributes like balanceAmt, transaction details, withdrawal and deposit\
    \ details, outstanding debt, etc. would be listed out.\n\n## How to define Python\
    \ classes\n\nTo define a class you need to consider the following points:\n\n\
    **Step 1)** In Python, classes are defined by the \"**class**\" keyword.\n\n```python\n\
    class myClass():\n```\n\n**Step 2)** Inside classes, you can define functions\
    \ or methods that are part of this class.\n\n```python\ndef method1(self):\n \
    \   print(\"Hello\")\n```\n\n```python\ndef method2(self, someString):\n    print(\"\
    Software Testing:\" + someString)\n```\n\n- Here we have defined method1 that\
    \ prints \"Hello\".\n- Another method we have defined is method2 that prints \"\
    Software Testing\" + someString. someString is the variable supplied by the calling\
    \ method.\n\n**Step 3)** Everything in a class is indented, just like the code\
    \ in the function, loop, if statement, etc. Anything not indented is not in the\
    \ class.\n\n**NOTE:** About using \"self\" in Python\n\n- The self-argument refers\
    \ to the object itself. Hence the use of the word self. So inside this method,\
    \ self will refer to the specific instance of this object that's being operated\
    \ on.\n- Self is the name preferred by convention by Python to indicate the first\
    \ parameter of instance methods in Python. It is part of the Python syntax to\
    \ access members of objects.\n\n**Step 4)** To make an object of the class.\n\n\
    ```python\nc = myClass()\n```\n\n**Step 5)** To call a method in a class.\n\n\
    ```python\nc.method1()\nc.method2(\" Testing is fun\")\n```\n\n- Notice that when\
    \ we call the method1 or method2, we don't have to supply the self-keyword. That's\
    \ automatically handled for us by the Python runtime.\n- Python runtime will pass\
    \ the \"self\" value when you call an instance method on an instance, whether\
    \ you provide it deliberately or not.\n- You just have to care about the non-self\
    \ arguments.\n\n**Step 6)** Here is the complete code.\n\n```python\n# Example\
    \ file for working with classes\nclass myClass():\n    def method1(self):\n  \
    \      print(\"Hello\")\n\n    def method2(self, someString):\n        print(\"\
    Software Testing:\" + someString)\n\ndef main():\n    # exercise the class methods\n\
    \    c = myClass()\n    c.method1()\n    c.method2(\" Testing is fun\")\n\nif\
    \ __name__ == \"__main__\":\n    main()\n```\n\n**Important:** Python 3.0"
  mdcn: "## 从模块导入名称\n\n**import** 语句的另外两种变体，用于将模块中的选定名称引入本地命名空间。其中一种形式是选取特定名称使其成为全局变量。\n\
    \n```python\nfrom module import name, ...\n```\n\n这种形式的 **import** 在模块导入后增加了一个步骤：它将给定的名称列表添加到本地命名空间中，使得这些名称无需使用模块名作为限定符即可使用。\n\
    \n例如：\n\n```python\nfrom math import sin, cos, tan\n```\n\n## 导入与重命名\n\n最后，我们可以结合使用\
    \ **from** 和 **as** 选项，既导入选定的项目，又为它们提供更易理解的名称。\n\n我们可以这样写：\n\n```python\nfrom\
    \ module import name as name\n```\n\n在这种情况下，我们既隐藏了项目的来源，也隐藏了它的原始名称。我们最好有非常充分的理由这样做。想想看，这样做可能会引起多大的困惑：\n\
    \n```python\nfrom math import sqrt as sin\n```\n\n使用时必须谨慎，以免制造出比它试图解决的问题更多的问题。\n\
    \n## exec 语句\n\nimport 语句实际上执行的是模块文件。通常，我们导入的文件被定义为一系列定义的序列。由于我们的主程序通常以一系列 import\
    \ 语句开头，这些模块会被导入到全局命名空间中。Python 还会优化由 import 语句引入的模块，确保它们只被导入一次。\n\nexec 语句可以执行一个文件、一段\
    \ Python 代码字符串，以及由 compile() 函数创建的代码。与 import 语句不同，它不会优化模块定义，也不会创建和保存新的命名空间。\n\
    \n```python\nexec expression\n```\n\neval() 和 execfile() 函数本质上做的是同样的事情。\n\nexec\
    \ 语句、eval() 函数和 execfile() 函数是危险的工具。它们违背了基本假设之一：你正在阅读的源代码就是正在执行的源代码。使用 exec 语句或\
    \ eval() 函数的程序会将其他源代码语句动态地整合到程序中。这可能会使程序难以理解、维护或增强。\n\n通常，exec 语句的使用必须非常小心。最常见的用途是引入一组以简单\
    \ Python 赋值语句编写的配置参数。例如，我们可能会使用如下文件作为程序的配置参数。\n\n```\ndb_server= \"dbs_prod_01\"\
    \ndb_port= \"3306\"\ndb_name= \"PROD\"\n```\n\n## 第 12 章\n\n## 类与面向对象编程\n\nPython\
    \ 是一种面向对象的编程语言，这意味着它操作和处理的数据结构被称为对象。对象可以是 Python 中任何可以命名的东西：整数、函数、浮点数、字符串、类、方法等。它们在\
    \ Python 中地位平等，可以在任何需要对象的地方使用。\n\n面向对象编程允许我们围绕*对象*的交互来组织程序。一个*类*提供了对象结构和行为的定义；每个对象都是一个类的实例。因此，一个典型的程序包含若干个类定义和一个最终的主函数。主函数创建将执行程序任务的对象。\n\
    \n本章介绍定义类的基本技术。在*语义*部分，我们定义了对象的语义以及定义其属性（实例变量）和行为的类。在*类定义：class 语句*部分，我们展示了创建类定义的语法；在*创建和使用对象*部分，我们介绍了对象的使用。\n\
    \nPython 有一些系统定义的名称，类可以利用它们使自己的行为类似于内置的 Python 类，其中一些在*特殊方法名称*部分进行了介绍。我们在*一些示例*部分提供了一些例子。使用对象最重要的部分可能是它们如何协作以完成有用的工作；我们在*对象协作*部分介绍了这一点。\n\
    \n## 语义\n\n面向对象编程将软件设计和实现聚焦于单个对象的定义及其之间的交互。一个对象被认为*封装*了一种状态和一组行为；它既是数据也是处理。类的每个实例都有属性的独立副本，这些副本与类范围的操作紧密耦合。我们可以通过四个特征来理解对象，这些特征改编自\
    \ [Rumbaugh91]。\n\n**标识性。** 每个对象都是唯一的，可以与所有其他对象区分开来。在现实世界中，两个原本相同的咖啡杯可以被区分为不同的对象。例如，它们在我们桌子上的位置不同。在计算机内存的世界里，对象可以通过其地址来标识，这将使它们具有唯一性。\n\
    \n**分类性。** 这有时被称为*封装*。具有相同属性和行为的对象属于一个共同的*类*。每个单独的对象都有唯一的属性值。我们在查看各种集合类时看到了这一点。两个不同的列表对象具有相同的一般结构和相同的行为。两个列表都响应\
    \ append()、pop() 以及列表的所有其他方法。然而，每个列表对象都有一个唯一的值序列。\n\n**继承性。** 一个类可以从父类继承方法，重用共同的特性。超类更通用，子类覆盖超类的特性，因此更具体。通过内置的\
    \ Python 类，我们已经了解了所有不可变序列的相似之处。\n\n**多态性。** 一个通用操作可以根据对象的类具有不同的实现方法。当我们注意到 Python\
    \ 中几乎每个类都有一个 + 操作时，我们就看到了这一点。在两个浮点数之间，+ 操作是加法；然而，在两个列表之间，+ 操作是连接列表。\n\n## Python\
    \ 中的类\n\n类是数据和函数的逻辑分组。它提供了创建包含任意内容的数据结构的自由，因此易于访问。\n\n例如，任何想要在线获取客户详情的银行员工都会访问**客户类**，其中会列出其所有属性，如余额、交易详情、取款和存款详情、未偿债务等。\n\
    \n## 如何定义 Python 类\n\n要定义一个类，你需要考虑以下几点：\n\n**步骤 1)** 在 Python 中，类是通过 \"**class**\"\
    \ 关键字定义的。\n\n```python\nclass myClass():\n```\n\n**步骤 2)** 在类内部，你可以定义属于该类的函数或方法。\n\
    \n```python\ndef method1(self):\n    print(\"Hello\")\n```\n\n```python\ndef method2(self,\
    \ someString):\n    print(\"Software Testing:\" + someString)\n```\n\n- 这里我们定义了\
    \ method1，它打印 \"Hello\"。\n- 我们定义的另一个方法是 method2，它打印 \"Software Testing\" + someString。someString\
    \ 是由调用方法提供的变量。\n\n**步骤 3)** 类中的所有内容都需要缩进，就像函数、循环、if 语句等中的代码一样。任何未缩进的内容都不属于该类。\n\
    \n**注意：** 关于在 Python 中使用 \"self\"\n\n- self 参数指的是对象本身。因此使用了 self 这个词。所以在这个方法内部，self\
    \ 将指向正在被操作的该对象的特定实例。\n- Self 是 Python 约定俗成的名称，用于表示 Python 中实例方法的第一个参数。它是 Python\
    \ 语法中访问对象成员的一部分。\n\n**步骤 4)** 创建该类的一个对象。\n\n```python\nc = myClass()\n```\n\n\
    **步骤 5)** 调用类中的一个方法。\n\n```python\nc.method1()\nc.method2(\" Testing is fun\"\
    )\n```\n\n- 注意，当我们调用 method1 或 method2 时，我们不需要提供 self 关键字。Python 运行时会自动为我们处理。\n\
    - 当你在实例上调用实例方法时，Python 运行时会传递 \"self\" 值，无论你是否刻意提供。\n- 你只需要关心非 self 参数。\n\n**步骤\
    \ 6)** 这是完整的代码。\n\n```python\n# Example file for working with classes\nclass myClass():\n\
    \    def method1(self):\n        print(\"Hello\")\n\n    def method2(self, someString):\n\
    \        print(\"Software Testing:\" + someString)\n\ndef main():\n    # exercise\
    \ the class methods\n    c = myClass()\n    c.method1()\n    c.method2(\" Testing\
    \ is fun\")\n\nif __name__ == \"__main__\":\n    main()\n```\n\n**重要：** Python\
    \ 3.0"
