    \ exist outside that function. This way each function can define its own variables\
    \ and not have to worry about if those variable names are used in other functions.\n\
    \n# Global variables\n\nOn the other hand, sometimes you actually do want the\
    \ same variable to be available to multiple functions. Such a variable is called\
    \ a global variable. You have to be careful using global variables, especially\
    \ in larger programs, but a few global variables used judiciously are fine in\
    \ smaller programs. Here is a short example:\n\n```\ndef reset():\n    global\
    \ time_left\n    time_left = 0\ndef print_time():\n    print(time_left)\n    time_left=30\n\
    ```"
