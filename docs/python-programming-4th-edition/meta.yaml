  - '[PAGE 374]


    # Handling Errors


    There are many sources of errors. A few examples are a syntax error in an executed
    SQL statement, a connection failure, or calling the fetch method for an already
    canceled or finished statement handle.


    The DB API defines a number of errors that must exist in each database module.
    The following table lists these exceptions.


    | Sr.No. | Exception & Description |

    | :--- | :--- |

    | 1 | **Warning**<br>Used for non-fatal issues. Must subclass StandardError. |

    | 2 | **Error**<br>Base class for errors. Must subclass StandardError. |

    | 3 | **InterfaceError**<br>Used for errors in the database module, not the database
    itself. Must subclass Error. |

    | 4 | **DatabaseError**<br>Used for errors in the database. Must subclass Error.
    |'
- md: '## 5. **DataError**

    Subclass of DatabaseError that refers to errors in the data.


    ## 6. **OperationalError**

    Subclass of DatabaseError that refers to errors such as the loss of a connection
    to the database. These errors are generally outside of the control of the Python
    scripter.


    ## 7. **IntegrityError**

    Subclass of DatabaseError for situations that would damage the relational integrity,
    such as uniqueness constraints or foreign keys.


    ## 8. **InternalError**

    Subclass of DatabaseError that refers to errors internal to the database module,
    such as a cursor no longer being active.


    ## 9. **ProgrammingError**

    Subclass of DatabaseError that refers to errors such as a bad table name and other
    things that can safely be blamed on you.


    ## 10. **NotSupportedError**

    Subclass of DatabaseError that refers to trying to call unsupported functionality.


    Your Python scripts should handle these errors, but before using any of the above
    exceptions, make sure your MySQLdb has support for that exception. You can get
    more information about them by reading the DB API 2.0 specification.


    # Chapter 21


    # The Python Library


    Consistent with the Pythonic Batteries Included philosophy of Python, there are
    hundreds of extension modules. It can be difficult to match a programming need
    with a specific module. The *Python Library Reference* document can be hard to
    pick through to locate an appropriate module. We''ll start at the top of the library
    organization and work our way down to a useful subset of the tremendous wealth
    that is Python.


    # Overview of the Python Library


    - Introduction

    - Built-in Objects. This chapter provides complete documentation of the built-in
    functions, exceptions and constants.

    - Built-in Types. All of the data types we''ve looked at are documented completely
    in this chapter of the library reference. Of course, there are additional types
    in the Python reference that we haven''t looked at.

    - String Services. This chapter includes almost a dozen modules for various kinds
    of string and text handling. This includes regular expression pattern matching,
    Unicode codecs and other string-processing modules.

    - Data Types. This chapter has almost 20 modules providing additional data types,
    including datetime.

    - Numeric and Mathematical Modules. This chapter describes math, decimal and random
    modules.

    - Internet Data Handling. One secret behind the internet is the use of standardized
    sophisticated data objects, like email messages with attachments. This chapter
    covers over a dozen modules for handling data passed through the internet.

    - Structured Markup Processing Tools. XML, HTML and SGML are all markup languages.
    This chapter covers tools for parsing these languages to separate the content
    from the markup.

    - File Formats. This chapter covers modules for parsing files in format like Comma
    Separated Values (CSV).

    - Cryptographic Services. This chapter has modules which can be used to develop
    and compare secure message hashes.

    - File and Directory Access. This chapter of the Library Reference covers many
    of the modules we''ll look at in *File Handling Modules*.

    - Data Compression and Archiving. This chapter describes modules for reading and
    writing zip files, tar files and BZ2 files. We''ll cover these modules in *File
    Handling Modules*, also.

    - Data Persistence. Objects can be written to files, sockets or databases so that
    they can persist beyond the processing of one specific program. This chapter covers
    a number of packages for pickling objects so they are preserved. The SQLite 3
    relational database is also described in this module.

    - Generic Operating System Services. An Operating System provides a number of
    services to our application programs, including access to devices and files, consistent
    notions of time, ways to handle command-line options, logging, and handling operating
    system errors. We''ll look some of these modules in *Programs: Standing Alone*.

    - Optional Operating System Services. This section includes operating system services
    that are common to most Linux variants, but not always available in Windows.

    - Unix Specific Services. There are a number of Unix and Linux-specific features
    provided by these modules.

    - Interprocess Communication and Networking. Larger and more complex application
    programs often consist of multiple, cooperating components. The World Wide Web,
    specifically, is based on the interaction between client and server programs.
    This chapter describes modules that provide a basis for communicating among the
    OS processes that execute our programs.

    - Internet Protocols and Support. This chapter describes over two dozen modules
    that process a wide variety of internet-related data structures. This varies from
    the relatively simple processing of URLs to the relatively complex processing
    of XML-based Remote Procedure Calls (XML-RPC).

    - Multimedia Services. Multimedia includes sounds and images; these modules can
    be used to manipulate sound or image files.

    - Graphical User Interfaces with Tk. The Tkinter module is one way to build a
    graphical desktop application. The GTK libraries are also widely used to build
    richly interactive desktop applications; to make use of them, you''ll need to
    download the pyGTK package.

    - Internationalization. These packages help you separating your message strings
    from the rest of your application program. You can then translate your messages
    and provide language-specific variants of your software.

    - Program Frameworks. These are modules to help build command-line applications.

    - Development Tools. These modules are essential to creating polished, high-quality
    software: they support the creation of usable documents and reliable tests for
    Python programs.


    # Most Useful Library Sections


    Python includes a large number of pre-built modules. The more you know about these,
    the less programming you have to do. Python provides many modules for dealing
    with times, dates and the calendar.


    **String Services.** The String Services modules contains string-related functions
    or classes. See *Strings* for more information on strings.


    - **re** The re module is the core of text pattern recognition and processing.
    A *regular expression* is a formula that specifies how to recognize and parse
    strings. The re module is described in detail in *Complex Strings: the re Module*.

    - **struct** The avowed purpose of the struct module is to allow a Python program
    to access C-language APIs; it packs and unpacks C-language struct object. It turns
    out that this module can also help you deal with files in packed binary formats.

    - **difflib** The difflib module contains the essential algorithms for comparing
    two sequences, usually sequences of lines of text. This has algorithms similar
    to those used by the Unix **diff** command (the Windows **COMP** command).

    - **StringIO**

    - **cStringIO** There are two variations on StringIO which provide file-like objects
    that read from or write to a string buffer. The StringIO module defines the class
    StringIO, from which subclasses can be derived. The cStringIO module provides
    a high-speed C-language implementation that can''t be subclassed.


    Note that these modules have atypical mixed-case names.


    **textwrap** This is a module to format plain text. While the word-wrapping task
    is sometimes handled by word processors, you may need this in other kinds of programs.
    Plain text files are still the most portable, standard way to provide a document.


    **codecs** This module has hundreds of text encodings. This includes the vast
    array of Windows code pages and the Macintosh code pages. The most commonly used
    are the various Unicode schemes (utf-16 and utf-8). However, there are also a
    number of codecs for translating between strings of text and arrays of bytes.
    These schemes include base-64, zip compression, bz2 compression, various quoting
    rules, and even the simple rot_13 substitution cipher.


    **Data Types.** The Data Types modules implement a number of widely-used data
    structures. These aren''t as useful as sequences, dictionaries or strings which
    are built-in to the language. These data types include dates, general collections,
    arrays, and schedule events. This module includes modules for searching lists,
    copying structures or producing a nicely formatted output for a complex structure.


    **datetime** The datetime handles details of the calendar, including dates and
    times. Additionally, the time module provides some more basic functions for time
    and date processing. We''ll cover both modules in detail in *Dates and Times:
    the time and datetime Modules*. These modules mean that you never need to attempt
    your own calendrical calculations. One of the important lessons learned in the
    late 90s was that many programmers love to tackle calendrical calculations, but
    their efforts had to be tested and reworked prior to January 1, 2000, because
    of innumerable small problems.'
  mdcn: '## 5. **DataError**

    `DatabaseError` 的子类，指代数据相关的错误。


    ## 6. **OperationalError**

    `DatabaseError` 的子类，指代诸如数据库连接丢失等错误。这些错误通常超出了 Python 脚本编写者的控制范围。


    ## 7. **IntegrityError**

    `DatabaseError` 的子类，用于会损害关系完整性的情况，例如唯一性约束或外键冲突。


    ## 8. **InternalError**

    `DatabaseError` 的子类，指代数据库模块内部的错误，例如游标不再处于活动状态。


    ## 9. **ProgrammingError**

    `DatabaseError` 的子类，指代诸如表名错误等可以安全地归咎于你的错误。


    ## 10. **NotSupportedError**

    `DatabaseError` 的子类，指代尝试调用不支持的功能。


    你的 Python 脚本应该处理这些错误，但在使用上述任何异常之前，请确保你的 `MySQLdb` 支持该异常。你可以通过阅读 DB API 2.0 规范获取更多相关信息。


    # 第 21 章


    # Python 库


    秉承 Python 的“开箱即用”哲学，Python 拥有数百个扩展模块。要将编程需求与特定模块匹配可能很困难。*Python 库参考*文档可能很难通读以找到合适的模块。我们将从库组织的顶层开始，逐步深入到
    Python 庞大财富中有用的子集。


