  md: '# pack


    There is an alternative to grid called pack. It is not as versatile as grid, but
    there are some places where it is useful. It uses an argument called side, which
    allows you to specify four locations for your components: TOP, BOTTOM, LEFT, and
    RIGHT. There are two useful optional arguments, fill and expand. Here is an example.


    ```

    button1=Button(text=''Hi'')    button1.pack(side=TOP, fill=X)

