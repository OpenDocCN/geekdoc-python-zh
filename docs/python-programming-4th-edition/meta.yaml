    # Chapter 15


    # Text Files in Python


    Programs often deal with external data; data outside of volatile primary memory.
    This external data could be persistent data on a file system or transient data
    on an input-output device. Most operating systems provide a simple, uniform interface
    to external data via objects of the file class.


    In *File Semantics*, we provide an overview of the semantics of files. We cover
    the most important of Pythons built-in functions for working with files in *Built-in
    Functions*. Well review statements for dealing with files in *File Statements*.
    In *File Methods*, we describe some method functions of file objects.'
  - '[PAGE 205]


    Files are a deep, deep subject. Well touch on several modules that are related
    to managing files in *Components, Modules and Packages*. These include *File Handling
    Modules* and *File Formats: CSV, Tab, XML, Logs and Others*.


    # File Semantics


    In one sense a file is a container for a sequence of bytes. A more useful view,
    however, is that a file is a container of data objects, encoded as a sequence
    of bytes. Files can be kept on persistent but slow devices like disks. Files can
    also be presented as a stream of bytes flowing through a network interface. Even
    the users keyboard can be processed as if it was a file; in this case the file
    forces our software to wait until the person types something.


    Our operating systems use the abstraction of *file* as a way to unify access to
    a large number of devices and operating system services. In the Linux world, all
    external devices, plus a large number of in-memory data structures are accessible
    through the file interface. The wide variety of things with file-like interfaces
    is a consequence of how Unix was originally designed. Since the number and types
    of devices that will be connected to a computer is essentially infinite, device
    drivers were designed as a simple, flexible plug-in to the operating system.


    Files include more than disk drives and network interfaces. Kernel memory, random
    data generators, semaphores, shared memory blocks, and other things have file
    interfaces, even though they arent strictly speaking devices. Our OS applies the
    file abstraction to many things. Python, similarly, extends the file interface
    to include certain kinds of in-memory bu ers.'
  - '[PAGE 206]


    **Standard Files.** Consistent with POSIX standards, all Python programs have
    three files available: sys.stdin, sys.stdout, sys.stderr. These files are used
    by certain built-in statements and functions. The **print** statement (and print()
    function), for example, writes to sys.stdout by default. The raw_input() function
    writes the prompt to sys.stdout and reads the input from sys.stdin.


    These standard files are always available, and Python assures that they are handled
    consistently by all operating systems. The sys module makes these files available
    for explicit use. Newbies may want to check *File Redirection for Newbies* for
    some additional notes on these standard files.


    # File Organization and Structure


    Some operating systems provide support for a large variety of file organizations.
    Di erent file organiza-tions will include di erent record termination rules, possibly
    with record keys, and possibly fixed length records. The POSIX standard, however,
    considers a file to be nothing more than a sequence of bytes. It becomes entirely
    the job of the application program, or libraries outside the operating system
    to impose any organi-zation on those bytes.


    The basic file objects in Python consider a file to be a sequence of text characters
    (ASCII or Unicode) or bytes. The characters can be processed as a sequence of
    variable length lines; each line terminated with a newline character. Files moved
    from a Windows environment may contain lines which appear to have an extraneous
    ASCII carriage return character (r), which is easily removed with the string strip()
    method.


    Ordinary text files can be managed directly with the built-in file objects and
    their methods for reading and writing lines of data. We will cover this basic
    text file processing in the rest of this chapter.'
  - '[PAGE 207]


    Files which are a sequence of bytes dont properly have line boundaries. Byte-oriented
    files could include characters (in ASCII or a Unicode encoding) or other data
    objects encoded as bytes. Well address some byte-oriented files with library modules
    like pickle and csv.


    **Block Mode Files.** File devices can be organized into two di erent kinds of
    structures: *block mode* and *character mode*. Block mode devices are exemplified
    by magnetic disks: the data is structured into blocks of bytes that can be accessed
    in any order. Both the media (disk) and read-write head can move; the device can
    be repositioned to any block as often as necessary. A disk provides direct (sometimes
    also called random) access to each block of data.


    Character mode devices are exemplified by network connections: the bytes come
    pouring into the processor bu ers. The stream cannot be repositioned. If the bu
    er fills up and bytes are missed, the lost data are gone forever.


    Operating system support for block mode devices includes file directories and
    file management utilities for deleting, renaming and copying files. Modern operating
    systems include file navigators (Finders or Explorers), iconic representations
    of files, and standard GUI dialogs for opening files from within application programs.
    The operating system also handles moving data blocks from memory bu ers to disk
    and from disk to memory bu ers. All of the device-specific vagaries are handled
    by having a variety of *device drivers* so that a range of physical devices can
    be supported in a uniform manner by a single operating system software interface.'
  - '[PAGE 208]


    Files on block mode devices are sometimes called *seekable*. They support the
    operating system seek() function that can begin reading from any byte of the file.
    If the file is structured in fixed-size blocks or records, this seek function
    can be very simple and effective. Typically, database applications are designed
    to work with fixed-size blocks so that seeking is always done to a block, from
    which database rows are manipulated.


    **Character Mode Devices and Keyboards.** Operating systems also provide rich
    support for character mode devices like networks and keyboards. Typically, a network
    connection requires a *protocol stack* that interprets the bytes into packets,
    and handles the error correction, sequencing and retransmission of the packets.
    One of the most famous protocol stacks is the TCP/IP stack. TCP/IP can make a
    streaming device appear like a sequential file of bytes. Most operating systems
    come with numerous client programs that make heavy use of the network, examples
    include sendmail, ftp, and a web browser.


    A special kind of character mode file is the *console*; it usually provides input
    from the keyboard. The POSIX standard allows a program to be run so that input
    comes from files, pipes or the actual user. If the input file is a *TTY* (teletype),
    this is the actual human users keyboard. If the file is a pipe, this is a connection
    to another process running concurrently. The keyboard console or TTY is di erent
    from ordinary character mode devices, pipes or files for two reasons. First, the
    keyboard often needs to explicitly echo characters back so that a person can see
    what they are typing. Second, pre-processing must often be done to make backspaces
    work as expected by people.


    The echo feature is enabled for entering ordinary data or disabled for entering
    passwords. The echo feature is accomplished by having keyboard events be queued
    up for the program to read as if from a file. These same keyboard events are automatically
    sent to update the GUI if echo is turned on.'
- md: 'The pre-processing feature is used to allow some standard edits of the input
    before the application program receives the buffer of input. A common example
    is handling the backspace character. Most experienced computer users expect that
    the backspace key will remove the last character typed. This is handled by the
    OS: it buffers ordinary characters, removes characters from the buffer when backspace
    is received, and provides the final buffer of characters to the application when
    the user hits the Return key. This handling of backspaces can also be disabled;
    the application would then see the keyboard events as *raw* characters. The usual
    mode is for the OS to provide *cooked* characters, with backspace characters handled
    before the application sees any data.


    Typically, this is all handled in a GUI in modern applications. However, Python
    provides some functions to interact with Unix TTY console software to enable and
    disable echo and process raw keyboard input.


    ## File Formats and Access Methods


    In Z/OS (and Open VMS, and a few other operating systems) files have very specific
    formats, and data access is mediated by the operating system. In Z/OS, they call
    these *access methods*, and they have names like BDAM or VSAM. This view is handy
    in some respects, but it tends to limit you to the access methods supplied by
    the OS vendor.


    The GNU/Linux view is that files should be managed minimally by the operating
    system. At the OS level, files are just bytes. If you would like to impose some
    organization on the bytes of the file, your application should provide the access
    method. You can, for example, use a database management system (DBMS) to structure
    your bytes into tables, rows and columns.


    The C-language standard I/O library (stdio) can access files as a sequence of
    individual lines; each line is terminated by the newline character, `\n`. Since
    Python is built in the C libraries, Python can also read files as a sequence of
    lines.


    Python provides basic functions and methods necessary to manipulate files by using
    a file object.


    ## The open Function


    Before you can read or write a file, you have to open it using Python''s built-in
    `open()` function. This function creates a file object, which would be utilized
    to call other support methods associated with it.


    ### Syntax


    ```

    file object = open(file_name [, access_mode][, buffering])

    ```


    Here are parameter details –


    - **file_name** – The file_name argument is a string value that contains the name
    of the file that you want to access.

    - **access_mode** – The access_mode determines the mode in which the file has
    to be opened, i.e., read, write, append, etc. A complete list of possible values
    is given below in the table. This is optional parameter and the default file access
    mode is read (`r`).

    - **buffering** – If the buffering value is set to 0, no buffering takes place.
    If the buffering value is 1, line buffering is performed while accessing a file.
    If you specify the buffering value as an integer greater than 1, then buffering
    action is performed with the indicated buffer size. If negative, the buffer size
    is the system default (default behavior).


    Here is a list of the different modes of opening a file –


    | Mode | Description |

    | :--- | :--- |

    | **r** | Opens a file for reading only. |

    | **r+** | Opens a file for both reading and writing. |

    | **rb** | Opens a file for reading only in binary format. |

    | **rb+** | Opens a file for both reading and writing in binary format. |

    | **w** | Opens a file for writing only. Overwrites the file if the file exists.
    If the file does not exist, creates a new file for writing. |

    | **w+** | Opens a file for both writing and reading. Overwrites the existing
    file if the file exists. If the file does not exist, creates a new file for reading
    and writing. |

    | **wb** | Opens a file for writing only in binary format. Overwrites the file
    if the file exists. If the file does not exist, creates a new file for writing.
    |

    | **wb+** | Opens a file for both writing and reading in binary format. Overwrites
    the existing file if the file exists. If the file does not exist, creates a new
    file for reading and writing. |

    | **a** | Opens a file for appending. |

    | **a+** | Opens a file for both appending and reading. |

    | **ab** | Opens a file for appending in binary format. |


    ## The file Object Attributes


    Once a file is opened and you have one file object, you can get various information
    related to that file. Here is a list of all attributes related to file object
    –


    - **file.closed** – Returns true if file is closed, false otherwise.

    - **file.mode** – Returns access mode with which file was opened.

    - **file.name** – Returns name of the file.

    - **file.softspace** – Returns false if space explicitly required with print,
    true otherwise.


    ### Example


    ```python

    # Open a file

    fo = open("my.txt", "wb")

    print "Name of the file: ", fo.name

    print "Closed or not : ", fo.closed

    print "Opening mode : ", fo.mode

    print "Softspace flag : ", fo.softspace

    ```


    This produces the following result –


    ```

    Name of the file: my.txt

    Closed or not : False

    Opening mode : wb

    Softspace flag : 0

    ```


    ## The close() Method


    The `close()` method of a file object flushes any unwritten information and closes
    the file object, after which no more writing can be done. Python automatically
    closes a file when the reference object of a file is reassigned to another file.
    It is a good practice to use the `close()` method to close a file.


    ### Syntax


    ```

    fileObject.close();

    ```


    ### Example


    ```python

    # Open a file

    fo = open("my.txt", "wb")

    print "Name of the file: ", fo.name

    # Close opened file

    fo.close()

    ```


    This produces the following result –


    ```

    Name of the file: my.txt

    ```


    ## Reading and Writing Files


    The file object provides a set of access methods to make our lives easier. We
    would see how to use `read()` and `write()` methods to read and write files.


    ## The write() Method


    The `write()` method writes any string to an open file. It is important to note
    that Python strings can have binary data and not just text. The `write()` method
    does not add a newline character (`''\n''`) to the end of the string –


    ### Syntax


    ```

    fileObject.write(string);

    ```


    Here, passed parameter is the content to be written into the opened file.


    ### Example


    ```python

    # Open a file

    fo = open("my.txt", "wb")

    fo.write( "Python is a great language.\n Ajit & Tanweer\n");

    # Close opened file

    fo.close()

    ```


    The above method would create `foo.txt` file and would write given content in
    that file and finally it would close that file. If you would open this file, it
    would have following content.


    ```

    Python is a great language.

    Ajit & Tanweer

    ```


    ## The read() Method


    The `read()` method reads a string from an open file. It is important to note
    that Python strings can have binary data, apart from text data.


    ### Syntax


    ```

    fileObject.read([count]);

    ```


    Here, passed parameter is the number of bytes to be read from the opened file.
    This method starts reading from the beginning of the file and if count is missing,
    then it tries to read as much as possible, maybe until the end of file.


    ### Example


    Let''s take a file `my.txt`, which we created above.


    ```python

    # Open a file

    fo = open("my.txt", "r+")

    str = fo.read(10);

    print "Read String is : ", str

    # Close opened file

    fo.close()

    ```


    This produces the following result –


    ```

    Read String is : Python is

    ```


    ## File Positions


    The **tell()** method tells you the current position within the file; in other
    words, the next read or write will occur at that many bytes from the beginning
    of the file.


    The **seek(offset[, from])** method changes the current file position. The offset
    argument indicates the number of bytes to be moved. The from argument specifies
    the reference position from where the bytes are to be moved.


    If from is set to 0, it means use the beginning of the file as the reference position
    and 1 means use the current position as the reference position and if it is set
    to 2 then the end of the file would be taken as the reference position.


    ### Example


    Let us take a file `foo.txt`, which we created above.


    ```python

    # Open a file

    fo = open("my.txt", "r+")

    str = fo.read(10);

    print "Read String is : ", str

    # Check current position

    position = fo.tell();

    print "Current file position : ", position

    # Reposition pointer at the beginning once again

    position = fo.seek(0, 0);

    ```'
  mdcn: '预处理功能用于在应用程序接收输入缓冲区之前，对输入进行一些标准编辑。一个常见的例子是处理退格字符。大多数有经验的计算机用户都期望退格键能删除最后输入的字符。这由操作系统处理：它缓冲普通字符，当收到退格符时从缓冲区中删除字符，并在用户按下回车键时向应用程序提供最终的字符缓冲区。这种退格处理也可以被禁用；这样应用程序就会看到键盘事件作为*原始*字符。通常的模式是操作系统提供*已处理*的字符，退格字符在应用程序看到任何数据之前就被处理了。


    在现代应用程序中，这通常都在图形用户界面中处理。然而，Python提供了一些函数来与Unix TTY控制台软件交互，以启用和禁用回显以及处理原始键盘输入。


    ## 文件格式与访问方法


    在Z/OS（以及Open VMS，还有一些其他操作系统）中，文件具有非常特定的格式，数据访问由操作系统中介。在Z/OS中，他们称这些为*访问方法*，并有诸如BDAM或VSAM之类的名称。这种观点在某些方面很方便，但它往往将你限制在操作系统供应商提供的访问方法内。


    GNU/Linux的观点是，文件应由操作系统进行最小化管理。在操作系统层面，文件只是字节。如果你想对文件的字节施加一些组织结构，你的应用程序应该提供访问方法。例如，你可以使用数据库管理系统将你的字节组织成表、行和列。


    C语言标准I/O库可以将文件作为一系列单独的行来访问；每行以换行符`\n`终止。由于Python是基于C库构建的，Python也可以将文件作为一系列行来读取。


    Python提供了使用文件对象操作文件所需的基本函数和方法。


    ## open函数


    在读取或写入文件之前，你必须使用Python内置的`open()`函数打开它。此函数创建一个文件对象，该对象将用于调用与其关联的其他支持方法。


    ### 语法


    ```

    file object = open(file_name [, access_mode][, buffering])

    ```


    以下是参数详情 –


    - **file_name** – file_name参数是一个字符串值，包含你要访问的文件的名称。

    - **access_mode** – access_mode决定了文件必须以何种模式打开，即读取、写入、追加等。下表中给出了可能值的完整列表。这是一个可选参数，默认的文件访问模式是读取（`r`）。

    - **buffering** – 如果buffering值设置为0，则不进行缓冲。如果buffering值为1，则在访问文件时执行行缓冲。如果你将buffering值指定为大于1的整数，则使用指定的缓冲区大小执行缓冲操作。如果为负数，则缓冲区大小为系统默认值（默认行为）。


    以下是打开文件的不同模式列表 –


    | 模式 | 描述 |

    | :--- | :--- |

    | **r** | 以只读方式打开文件。 |

    | **r+** | 以读写方式打开文件。 |

    | **rb** | 以二进制格式只读方式打开文件。 |

    | **rb+** | 以二进制格式读写方式打开文件。 |

    | **w** | 以只写方式打开文件。如果文件存在，则覆盖该文件。如果文件不存在，则创建一个新文件用于写入。 |

    | **w+** | 以读写方式打开文件。如果文件存在，则覆盖现有文件。如果文件不存在，则创建一个新文件用于读写。 |

    | **wb** | 以二进制格式只写方式打开文件。如果文件存在，则覆盖该文件。如果文件不存在，则创建一个新文件用于写入。 |

    | **wb+** | 以二进制格式读写方式打开文件。如果文件存在，则覆盖现有文件。如果文件不存在，则创建一个新文件用于读写。 |

    | **a** | 以追加方式打开文件。 |

    | **a+** | 以追加和读取方式打开文件。 |

    | **ab** | 以二进制格式追加方式打开文件。 |


    ## 文件对象属性


    一旦文件被打开并且你有了一个文件对象，你就可以获取与该文件相关的各种信息。以下是与文件对象相关的所有属性列表 –


    - **file.closed** – 如果文件已关闭则返回true，否则返回false。

    - **file.mode** – 返回文件被打开时的访问模式。

    - **file.name** – 返回文件的名称。

    - **file.softspace** – 如果print需要显式空格则返回false，否则返回true。


    ### 示例


    ```python

    # Open a file

    fo = open("my.txt", "wb")

    print "Name of the file: ", fo.name

    print "Closed or not : ", fo.closed

    print "Opening mode : ", fo.mode

    print "Softspace flag : ", fo.softspace

    ```


    这将产生以下结果 –


    ```

    Name of the file: my.txt

    Closed or not : False

    Opening mode : wb

    Softspace flag : 0

    ```


    ## close()方法


    文件对象的`close()`方法会刷新任何未写入的信息并关闭文件对象，之后就不能再进行写入。当文件的引用对象被重新分配给另一个文件时，Python会自动关闭文件。使用`close()`方法关闭文件是一个好习惯。


    ### 语法


    ```

    fileObject.close();

    ```


    ### 示例


    ```python

    # Open a file

    fo = open("my.txt", "wb")

    print "Name of the file: ", fo.name

    # Close opened file

    fo.close()

    ```


    这将产生以下结果 –


    ```

    Name of the file: my.txt

    ```


    ## 读写文件


    文件对象提供了一组访问方法，使我们的生活更轻松。我们将看到如何使用`read()`和`write()`方法来读写文件。


    ## write()方法


    `write()`方法将任何字符串写入打开的文件。需要注意的是，Python字符串可以包含二进制数据，而不仅仅是文本。`write()`方法不会在字符串末尾添加换行符（`''\n''`）
    –


    ### 语法


    ```

    fileObject.write(string);

    ```


    这里，传递的参数是要写入打开文件的内容。


    ### 示例


    ```python

    # Open a file

    fo = open("my.txt", "wb")

    fo.write( "Python is a great language.\n Ajit & Tanweer\n");

    # Close opened file

    fo.close()

    ```


    上述方法将创建`foo.txt`文件，并将给定内容写入该文件，最后关闭该文件。如果你打开此文件，它将包含以下内容。


    ```

    Python is a great language.

    Ajit & Tanweer

    ```


    ## read()方法


    `read()`方法从打开的文件中读取一个字符串。需要注意的是，Python字符串除了文本数据外，还可以包含二进制数据。


    ### 语法


    ```

    fileObject.read([count]);

    ```


    这里，传递的参数是从打开文件中读取的字节数。此方法从文件开头开始读取，如果缺少count，则它会尝试尽可能多地读取，可能直到文件末尾。


    ### 示例


    让我们以上面创建的文件`my.txt`为例。


    ```python

    # Open a file

    fo = open("my.txt", "r+")

    str = fo.read(10);

    print "Read String is : ", str

    # Close opened file

    fo.close()

    ```


    这将产生以下结果 –


    ```

    Read String is : Python is

    ```


    ## 文件位置


    **tell()**方法告诉你文件中的当前位置；换句话说，下一次读取或写入将发生在距离文件开头那么多字节的位置。


    **seek(offset[, from])**方法更改当前文件位置。offset参数表示要移动的字节数。from参数指定要移动字节的参考位置。


    如果from设置为0，表示使用文件开头作为参考位置；1表示使用当前位置作为参考位置；如果设置为2，则文件末尾将作为参考位置。


    ### 示例


    让我们以上面创建的文件`foo.txt`为例。


    ```python

    # Open a file

    fo = open("my.txt", "r+")

    str = fo.read(10);

    print "Read String is : ", str

    # Check current position

    position = fo.tell();

    print "Current file position : ", position

    # Reposition pointer at the beginning once again

    position = fo.seek(0, 0);

    ```'
