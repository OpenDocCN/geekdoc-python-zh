    \ operation on the left operand and assigns the result to the left operand |\n\
    | //= | Performs floor division on the left operand and assigns the result to\
    \ the left operand |\n\n## = Operator\n\nYou have seen this operator at work in\
    \ previous chapters when you have assigned different values to variables. Examples:\n\
    \n```\na = c\na = b + c\na = 8\na = 8 + 6\ns = \"I love Python.\"\n```\n\n## +=\
    \ add and\n\nThe add and (+=) operator is simply another way to express x = x\
