    0xA is hexadecimal; the bits are 1-0-1-0. This is 10 in decimal. When we shift
    this two bits to the left, its like multiplying by 4. We get bits of 1-0-1-0-0-0.
    This is 40 in decimal.


    The >> is the right-shift operator. The left argument is the bit pattern to be
    shifted, the right argument is the number of bits. Python always behaves as though
    it is running on a 2s complement computer. The left-most bit is always the sign
    bit, so sign bits are shifted in.


    ```

    >>> print 80 >> 3

    10

    ```


    The number 80, with bits of 1-0-1-0-0-0-0, shifted right 3 bits, yields bits of
    1-0-1-0, which is 10 in decimal.


