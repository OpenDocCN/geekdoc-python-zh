    operators. You can easily make programs to automate tasks such as computing tax,
    tips, discounts, or rent.


    | Symbol | Name | Description |

    | :--- | :--- | :--- |

    | + | Addition | adds the value of the left and right operands |

    | - | Subtraction | subtracts the value of the right operand from the value of
    the left operand |

    | * | Multiplication | multiplies the value of the left and right operand |

    | / | Division | divides the value of the left operand by the right operand |

    | ** | Exponent | performs exponential calculation |

    | % | Modulus | returns the remainder after dividing the left operand with the
    right operand |'
