    # Create a Series from ndarray


    If data is an ndarray, then index passed must be of the same length. If no index
    is passed, then by default index will be **range(n)** where **n** is array length,
    i.e., [0,1,2,3.... **range(len(array))-1**].


    Example 1


    ```

    #import the pandas library and aliasing as pd

    import pandas as pd

    import numpy as np

    data = np.array([''a'',''j'',''i'',''t''])

    s = pd.Series(data)

    print s

    ```


    Its **output** is as follows –


    ```

    0  a

    1  j

    2  i

    3  t

    dtype: object

    ```


    We did not pass any index, so by default, it assigned the indexes ranging from
    0 to **len(data)-1**, i.e., 0 to 3.'
