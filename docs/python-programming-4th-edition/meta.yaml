  md: "# Performing Transactions\n\nTransactions are a mechanism that ensures data\
    \ consistency. Transactions have the following four properties –\n\n+   - **Atomicity**\
    \ – Either a transaction completes or nothing happens at all.\n- **Consistency**\
    \ – A transaction must start in a consistent state and leave the system in a consistent\
    \ state.\n- **Isolation** – Intermediate results of a transaction are not visible\
    \ outside the current transaction.\n- **Durability** – Once a transaction was\
    \ committed, the effects are persistent, even after a system failure.\n\nThe Python\
    \ DB API 2.0 provides two methods to either *commit* or *rollback* a transaction.\n\
    \n# Example\n\nYou already know how to implement transactions. Here is again similar\
    \ example –\n\n```\n# Prepare SQL query to DELETE required records\nsql = \"DELETE\
    \ FROM EMPLOYEE WHERE AGE > '%d'\" % (20)\ntry:\n    # Execute the SQL command\n\
    \    cursor.execute(sql)\n    # Commit your changes in the database\n    db.commit()\n\
    except:\n    # Rollback in case there is any error\n    db.rollback()\n```"
