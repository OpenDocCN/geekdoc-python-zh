  md: '# function body/statements

    return [expression]


    The indented statements make up the body of the function and are executed when
    the function is called. Once the function is called, parameters inside round brackets
    become arguments.


    Function bodies can have more than one return statement which may be placed anywhere
    within the function block. Return statements end the function call and return
    the value of the expression after the return keyword. A return statement with
    no expression returns the special value None. In the absence of a return statement
    within the function body, the end of the function is indicated by the return of
    the value None.


    Functions are useful for breaking up a large program into smaller pieces to make
    it easier to read and maintain. They are also useful for repeatedly use the same
    code at several different points in your program. You can put that code in a function
    and call the function whenever you want to use & execute that code. You can also
    use functions to create your own utilities, math functions, etc.


