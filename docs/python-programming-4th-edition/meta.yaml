    \ 0&0, 1&0, 1&1, 0&1 0 0 1 0\n```\n\nHeres the same kind of example, combining\
    \ sequences of bits. This takes a bit of conversion to base 2 to understand whats\
    \ going on.\n\n```\n>>> print 3&5 1\n```\n\nThe number 3, in base 2, is 0011.\
    \ The number 5 is 0101. Lets match up the bits from left to right:\n\n```\n0 0\
    \ 1 1\n  0 1 0 1\n  --------\n  0 0 0 1\n```\n\nThe binary ^ operator returns\
    \ a 1-bit if one of the two inputs are 1 but not both. This is sometimes called\
    \ the exclusive or.\n\n```\n>>> print 3^5 6\n```\n\nLets look at the individual\
    \ bits\n\n```\n0 0 1 1\n  0 1 0 1\n  --------\n```"
