    \n## numpy.zeros\n\n返回一个指定大小、用零填充的新数组。\n\n```\nnumpy.zeros(shape, dtype = float,\
    \ order = 'C')\n```\n\n构造函数接受以下参数。\n\n| 序号 | 参数与描述 |\n| :--- | :--- |\n| 1 | **Shape**\
