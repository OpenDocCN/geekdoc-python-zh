    \ the name pandas – **pan(el)-da(ta)-s**.\nThe names for the 3 axes are intended\
    \ to give some semantic meaning to describing operations involving panel data.\
    \ They are –\n\n- **items** – axis 0, each item corresponds to a DataFrame contained\
    \ inside.\n- **major_axis** – axis 1, it is the index (rows) of each of the DataFrames.\n\
    - **minor_axis** – axis 2, it is the columns of each of the DataFrames.\n\n###\
    \ pandas.Panel()\n\nA Panel can be created using the following constructor –\n\
    \n```python\npandas.Panel(data, items, major_axis, minor_axis, dtype, copy)\n\
    ```\n\nThe parameters of the constructor are as follows –\n\n| Parameter | Description\
    \ |\n| :--- | :--- |\n| data | Data takes various forms like ndarray, series,\
    \ map, lists, dict, constants and also another DataFrame |\n| items | axis=0 |\n\
    | major_axis | axis=1 |\n| minor_axis | axis=2 |\n| dtype | Data type of each\
    \ column |\n| copy | Copy data. Default, **false** |\n\n## Create Panel\n\nA Panel\
    \ can be created using multiple ways like –\n\n- From ndarrays\n- From dict of\
    \ DataFrames\n\n## From 3D ndarray\n\n```python\n# creating an empty panel\nimport\
    \ pandas as pd\nimport numpy as np\n\ndata = np.random.rand(2,4,5)\np = pd.Panel(data)\n\
    print p\n```\n\nIts **output** is as follows –\n\n```\n<class 'pandas.core.panel.Panel'>\n\
    Dimensions: 2 (items) x 4 (major_axis) x 5 (minor_axis)\nItems axis: 0 to 1\n\
    Major_axis axis: 0 to 3\nMinor_axis axis: 0 to 4\n```\n\n**Note** – Observe the\
