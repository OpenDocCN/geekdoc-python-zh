    `pyGTK` 包。

    - 国际化。这些包帮助你将消息字符串与应用程序的其余部分分离。然后你可以翻译你的消息并提供软件的语言特定变体。

    - 程序框架。这些是帮助构建命令行应用程序的模块。

    - 开发工具。这些模块对于创建精致、高质量的软件至关重要：它们支持为 Python 程序创建可用的文档和可靠的测试。


    # 最有用的库部分


    Python 包含大量预构建模块。你对这些模块了解得越多，你需要编写的代码就越少。Python 提供了许多用于处理时间、日期和日历的模块。


    **字符串服务。** 字符串服务模块包含与字符串相关的函数或类。有关字符串的更多信息，请参见 *字符串*。


    - **re** `re` 模块是文本模式识别和处理的核心。*正则表达式* 是指定如何识别和解析字符串的公式。`re` 模块在 *复杂字符串：re 模块*
    中有详细描述。

    - **struct** `struct` 模块的公开目的是允许 Python 程序访问 C 语言 API；它打包和解包 C 语言的结构体对象。事实证明，这个模块也可以帮助你处理打包二进制格式的文件。

    - **difflib** `difflib` 模块包含用于比较两个序列（通常是文本行序列）的基本算法。这些算法类似于 Unix **diff** 命令（Windows
    **COMP** 命令）使用的算法。

    - **StringIO**

    - **cStringIO** `StringIO` 有两个变体，它们提供从字符串缓冲区读取或写入的类文件对象。`StringIO` 模块定义了 `StringIO`
    类，可以从中派生子类。`cStringIO` 模块提供了一个高速的 C 语言实现，不能被子类化。


    请注意，这些模块具有非典型的混合大小写名称。


    **textwrap** 这是一个用于格式化纯文本的模块。虽然自动换行任务有时由文字处理器处理，但你可能在其他类型的程序中需要它。纯文本文件仍然是提供文档最可移植、最标准的方式。


    **codecs** 这个模块有数百种文本编码。这包括大量的 Windows 代码页和 Macintosh 代码页。最常用的是各种 Unicode 方案（utf-16
    和 utf-8）。然而，也有许多编解码器用于在文本字符串和字节数组之间进行转换。这些方案包括 base-64、zip 压缩、bz2 压缩、各种引用规则，甚至简单的
    rot_13 替换密码。


    **数据类型。** 数据类型模块实现了许多广泛使用的数据结构。它们不如语言内置的序列、字典或字符串有用。这些数据类型包括日期、通用集合、数组和计划事件。此模块包括用于搜索列表、复制结构或为复杂结构生成格式化输出的模块。


    **datetime** `datetime` 处理日历的细节，包括日期和时间。此外，`time` 模块提供了一些更基本的时间和日期处理函数。我们将在 *日期和时间：time
    和 datetime 模块* 中详细介绍这两个模块。这些模块意味着你永远不需要尝试自己的日历计算。90 年代末学到的重要教训之一是，许多程序员喜欢处理日历计算，但由于无数的小问题，他们的工作在
    2000 年 1 月 1 日之前必须经过测试和返工。'
