    # Chapter 12


    # Classes and Object-Oriented Programming


    Python is an object-oriented programming language, which means that it manipulates
    and works with data structures called objects. Objects can be anything that could
    be named in Python integers, functions, floats, strings, classes, methods, etc.
    Which has equal status in Python and used anywhere an object is required.


    Object-oriented programming permits us to organize our programs around the interactions
    of *objects*. A *class* provides the definition of the structure and behavior
    of the objects; each object is an instance of a class. Consequently, a typical
    program is a number of class definitions and a final main function. The main function
    creates the objects that will perform the job of the program.'
