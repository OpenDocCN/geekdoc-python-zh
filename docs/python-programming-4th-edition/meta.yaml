    \n## 异常处理：try 和 except 块\n\nPython 中的 `try` 和 `except` 块用于捕获和处理异常。Python 会像执行程序的正常部分一样执行\
    \ `try` 语句之后的代码。`except` 语句之后的代码是程序对前面 `try` 子句中任何异常的响应。\n\n正如你之前所见，当语法正确的代码遇到错误时，Python\
    \ 会抛出一个异常错误。如果这个异常错误未被处理，它将导致程序崩溃。`except` 子句决定了你的程序如何响应异常。\n\n以下函数可以帮助你理解 `try`\
    \ 和 `except` 块：\n\n```python\ndef discount():\n    a = 70 / 0\n    print(a)\n\
    ```\n\n`discount` 函数将抛出一个异常。你可以使用以下代码尝试运行该函数：\n\n```python\ntry:\n    discount()\n\
    except:\n    pass\n```\n\n你在这里处理错误的方式是使用了 `pass`。如果你运行这段代码，你将不会得到任何输出。这样做的好处是程序没有崩溃。但是，如果你能在运行代码时看到是否发生了某种类型的异常，那就更好了。为此，你可以将\
    \ `pass` 替换为能生成信息性消息的内容，如下所示：\n\n```python\ntry:\n    discount()\nexcept:\n  \
    \  print('Divide by zero exception')\n```\n\n当运行此函数的程序发生异常时，程序将继续运行，并通知你函数调用未成功这一事实。\n\
    \n你没有看到的是函数调用导致的错误类型。为了确切地了解哪里出了问题，你需要捕获函数抛出的错误。\n\n这里是另一个例子，你打开一个文件并使用内置异常：\n\
    \n```python\ntry:\n    with open('myfile.log') as file:\n        read_data = file.read()\n\
    except:\n    print('Could not open file.log')\n```\n\n如果 *myfile.log* 不存在，这段代码将输出以下内容：\n\
    \n```\nCould not open myfile.log\n```\n\n这是一个信息性消息，我们的程序将继续运行。在 [Python 文档](https://docs.python.org/3/library/exceptions.html)中，你可以看到有很多内置异常可以在这里使用。该页面上描述的一个异常如下：\n\
    \n**异常 FileNotFoundError**\n当请求的文件或目录不存在时引发。对应于 errno ENOENT。\n\n要捕获这种类型的异常并将其打印到屏幕，你可以使用以下代码：\n\
    \n```python\ntry:\n    with open('myfile.log') as file:\n        read_data = file.read()\n\
    except FileNotFoundError as fnf_error:\n    print(fnf_error)\n```\n\n在这种情况下，如果\
    \ *myfile.log* 不存在，输出将是：\n\n```\n[Errno 2] No such file or directory: 'myfile.log'\n\
    ```\n\n你可以在 `try` 子句中有多个函数调用，并预期捕获各种异常。这里需要注意的一点是，`try` 子句中的代码一旦遇到异常就会停止执行。\n\n\
    > **警告：** 捕获 `Exception` 会隐藏所有错误——甚至是那些完全意想不到的错误。这就是为什么你应该避免在 Python 程序中使用裸 `except`\
    \ 子句。相反，你应该引用你想要捕获和处理的*特定异常类*。你可以[在这个教程](https://realpython.com/python-exceptions/)中了解更多关于为什么这是一个好主意。\n\
    \n查看以下代码。在这里，你首先调用 `linux_interaction()` 函数，然后尝试打开一个文件：\n\n```python\ntry:\n \
    \   discount()\n    with open('file.log') as file:\n        read_data = file.read()\n\
    except FileNotFoundError as fnf_error:\n    print(fnf_error)\nexcept Exception\
    \ as error:\n    print(error)\n```\n\n以下是关键要点：\n\n- `try` 子句会一直执行，直到遇到第一个异常。\n\
    - 在 `except` 子句（或异常处理程序）内部，你决定了程序如何响应异常。\n- 你可以预期多个异常，并区分程序应如何响应它们。\n- [避免使用裸\
    \ `except` 子句。](https://realpython.com)\n\n## else 子句\n\n在 Python 中，使用 `else`\
    \ 语句，你可以指示程序仅在没有异常的情况下执行某个代码块。\n\n查看以下示例：\n\n```python\ntry:\n    linux_interaction()\n\
    except AssertionError as error:\n    print(error)\nelse:\n    print('Executing\
    \ the else clause.')\n```\n\n如果你在 Linux 系统上运行此代码，输出将是：\n\n```\nDoing something.\n\
    Executing the else clause.\n```\n\n因为程序没有遇到任何异常，所以执行了 `else` 子句。\n\n你也可以尝试在 `else`\
    \ 子句中运行代码，并在那里捕获可能的异常：\n\n```python\ntry:\n    linux_interaction()\nexcept AssertionError\
    \ as error:\n    print(error)\nelse:\n    try:\n        with open('file.log')\
    \ as file:\n            read_data = file.read()\n    except FileNotFoundError\
    \ as fnf_error:\n        print(fnf_error)\n```\n\n如果你在 Linux 机器上执行此代码，你将得到以下结果：\n\
    \n```\nDoing something.\n[Errno 2] No such file or directory: 'file.log'\n```\n\
    \n从输出中，你可以看到 `linux_interaction()` 函数运行了。因为没有遇到异常，所以尝试打开 `file.log`。该文件不存在，因此你没有打开文件，而是捕获了\
    \ `FileNotFoundError` 异常。\n\n## 使用 finally 进行清理\n\n想象一下，你总是需要在执行代码后实施某种清理操作。Python\
    \ 允许你使用 `finally` 子句来做到这一点。\n\n看看以下示例：\n\n```python\ntry:\n    linux_interaction()\n\
    except AssertionError as error:\n    print(error)\nelse:\n    try:\n        with\
    \ open('file.log') as file:\n            read_data = file.read()\n    except FileNotFoundError\
    \ as fnf_error:\n        print(fnf_error)\nfinally:\n    print('Cleaning up, irrespective\
    \ of any exceptions.')\n```\n\n在前面的代码中，`finally` 子句中的所有内容都将被执行。无论你在 `try` 或 `else`\
    \ 子句中的某处遇到异常，这都不重要。在 Windows 机器上运行前面的代码将输出以下内容：\n\n```\nFunction can only run\
    \ on Linux systems.\nCleaning up, irrespective of any exceptions.\n```\n\n## 内置异常\n\
    \n以下异常是 Python 环境的一部分。异常大致分为三类。\n\n- 非错误异常。这些是定义事件并改变执行顺序的异常。\n- 运行时错误。这些异常可能在正常事件过程中发生，并表示典型的程序问题。"
