  - '[PAGE 137]


    The module datetime allows us to work with dates and times together. The following
    line creates a date-time object that contains the current date and time:


    ```

    from datetime import datetime

    d = datetime(1,1,1).now()

    ```


    The datetime object has attributes year, month, day, hour, minute, second, and
    microsecond.

    Here is a short example:


    ```

    d = datetime(1,1,1).now()

    print(''{:02d} {}/{}/{}''.format(d.hour,d.minute,d.month,d.day,d.year))

    ```


