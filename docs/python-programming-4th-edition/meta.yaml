    \ never occur in a program that is reasonably well written and tested.\n\nRelying\
    \ on exceptions for garden-variety errors those that are easily spotted with careful\
    \ design or testing is often a sign of shoddy programming. The usual story is\
    \ that the programmer received the exception during testing and simply added the\
    \ exception processing **try** statement to work around the problem; the programmer\
