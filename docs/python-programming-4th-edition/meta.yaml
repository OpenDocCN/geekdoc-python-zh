- md: "You would normally opt to download the latest version, which is Python 3.12.x.\
    \ However, you may opt for the latest version of Python 2, 2.7.18. Your preferences\
    \ will usually depend on which version will be most usable for your curriculum\
    \ / project. While Python 3 is the present and future of the language, issues\
    \ such as third party utility or compatibility may require you to download Python\
    \ 2.\n\nRun the downloaded file. This brings up the Python install wizard, which\
    \ is really easy to use. Just accept the default settings, wait until the install\
    \ is finished, and you are done.\n\n![](img/e3dac7e08bdd357a94774b55d90b82a8_26_0.png)\n\
    \nNote that depending on your needs, you may also check the box to add Python\
    \ to the Path. It will inform the python file installer that the executable python\
    \ path folder will be added to the environment variable with the name of ‘Path’.\n\
    \nFinally, if the installation process is a success, the following window will\
    \ appear :\n\n![](img/e3dac7e08bdd357a94774b55d90b82a8_27_0.png)\n\n## Windows\
    \ Configuration (Optional)\n\nWindows users will need to be sure that python.exe\
    \ is on their **PATH**. This is done with the System control panel. Click on the\
    \ **Advanced** tab. Click on the **Environment Variables...** button. Click on\
    \ the System variables **Path** line, and click the **Edit...** button. This will\
    \ often have a long list of items, sometimes starting with %SystemRoot%. At the\
    \ end of this list, add \";\" and the direction location of Python.exe. On my\
    \ machine, I put it in D:\\Softwares\\Python\\.\n\nFor Windows programmers, the\
    \ windows command interpreter uses the last letters of the file name to associate\
    \ a file with an interpreter. You can have Windows run the python.exe program\
    \ whenever you double-click a .py file. This is done with the **Folder Options**\
    \ control panel. The **File Types** tab allows you to pair a file type with a\
    \ program that processes the file.\n\nFollow the below steps to add Python Path\
    \ to Environment Variables.\n\n- Step 1: Click on Start Button and Open the Run\
    \ Program.\n- Step 2: Now type sysdm.cpl and click OK. This opens the System Properties\
    \ Dialog Box.\n- Step 3: Go to Advanced Tab and Click on Environment Variables.\n\
    - Step 4: In the System Variable section, Select the path variable.\n- Step 5:\
    \ Click on Edit button and add python path to variable value.\n- Step 6: Click\
    \ OK.\n\nYou can get your python path in the folder where you have installed python.\
    \ Example – for us it D:\\Softwares\\Python.\n\n## How to Test the Python in Microsoft\
    \ Windows\n\nThe last part, it will display on how to test the result of the python\
    \ installation in the previous part. It is actually very simple as it exist in\
    \ the following steps :\n\nAs usual, just execute the Command Prompt.\n\nFollowing\
    \ after, type the command below to test whether ‘python’ is available and it is\
    \ exist in the environment variable of ‘Path’ :\n\n```\nC:\\Users\\Personal>python\n\
    Python 3.11.2 (tags/v3.11.2:f377153, Jun 6 2022, 16:14:13) [MSC v.1929 64 bit\
    \ (AMD64)] on win32\nType \"help\", \"copyright\", \"credits\" or \"license\"\
    \ for more information.\n>>>\n```\n\nLast but not least, just perform another\
    \ test to make sure. The following test is executing a certain command to check\
    \ the version of the installed python as follows :\n\n```\nC:\\Users\\Personal>python\
    \ -V\nPython 3.11.2\nC:\\Users\\Personal>\n```\n\nAs it appear in the output of\
    \ the above command execution, the version is matched. It is python with the version\
    \ of ‘3.11.2’.\n\n## Python Editors\n\n- Vim http://www.vim.org/\n- Emacs See\
    \ http://www.gnu.org/software/emacs/\n- SciTE http://www.scintilla.org/SciTE.html.\n\
    - MS Windows only\n    - TextPad http://www.textpad.com;\n    - UltraEdit http://www.ultraedit.com/.\n\
    - Jed See http://www.jedsoft.org/jed/.\n- jEdit Requires a bit of customization\
    \ for Python See http://jedit.org.\n- Geany http://www.geany.org/\n\n## Interactive\
    \ Interpreters:\n\n- python\n- ipython\n- Idle IDEs\n\n## Integrated Development\
    \ Environments for Python:\n\n- PyWin MS Windows only. Available at: http://sourceforge.net/projects/pywin32/\n\
    - Kdevelop Linux/KDE See http://www.kdevelop.org/\n- Eric Linux KDE? See http://ericide.pythonprojects.org/index.html\n\
    - WingIDE See http://wingware.com/wingide/\n- Eclipse http://eclipse.org/ There\
    \ is a plug in that supports Python.\n- Emacs and SciTE will evaluate a Python\
    \ buffer within the editor.\n\n## Whats new in Python 3.11.x\n\nThis new version\
    \ of Python mainly focuses on improving the performance of the language. A few\
    \ nice features around exception handling and error display should also improve\
    \ the development experience.\n\n### 1. Improved performance\n\nOn average, a\
    \ 25% performance gain compared to Python 3.11 is announced. Some operations are\
    \ even up to 60% faster than the latest version. The start-up time is reduced\
    \ by 10% on average.\nThe measurements were performed with performance using CPython\
    \ compiled with GCC under Ubuntu.\n\nThe performance gain comes mainly from the\
    \ specialization of some instructions when the calls to a code are repetitive.\
    \ The fact that the code repeats itself without necessarily changing allows the\
    \ interpreter to analyze the running code and replace the generic code with type-specific\
    \ pieces.\nAnother improvement comes from reducing the number of calls to the\
    \ system memory in favor of allocating more space. If these performance gains\
    \ are always good to take, they do not turn Python into an efficient programming\
    \ language.\n\nAn increase in memory consumption of around 20% is anticipated\
    \ following the implementation of these changes on CPython.\nFurther performance\
    \ gains are already planned in versions 3.12 and later.\n\n### 2. Better exception\
    \ handling\n\nSpecial work has been done on error management. It is now possible\
    \ to add annotations on exceptions.\n\n```\ntry:\n    raise ExceptionGroup(\"\
    Exception Group\", (\n        TypeError(\"Type error\"),\n        KeyError(\"\
    Key error\"),\n        ValueError(\"Value error\"),\n    ))\n\nexcept* (ValueError,\
    \ TypeError) as exc:\n    exc.add_note(\"Add more information about the error\"\
    )\n    raise exc\n\nexcept* KeyError as exc:\n    raise exc\n```\n\nSimilarly,\
    \ a new syntax is emerging. It is now possible to create groups of exceptions\
    \ and break down the use of except to catch certain exceptions contained in a\
    \ group.\n\n### 3. A more accurate traceback\n\nThe error messages returned by\
    \ Python are now more precise and include the position of the error on the faulty\
    \ line of code. This function is very similar to what other modern languages can\
    \ offer.\n\n```\n+-------------------+\n| Traceback (most recent call last):\n\
    | File \"test.py\", line 5, in test\n| assert x < 0\n| ^^^^^^^^^^^^^\n| AssertionError:\
    \ assert 0 < 0\n+-------------------+\n```\n\n### 4. Improved typing\n\nAs we\
    \ know, Python is a dynamically typed language, which is not always appreciated\
    \ by developers. The latest Python updates have already started the integration\
    \ of an optional type system. This release continues that trend by adding more\
    \ types like Self, LiteralString, Required, and NotRequired.\n\n```\nfrom typing\
    \ import Self\n```\n\n```\nclass Foo:\n    def __init__(self, x: str):\n     \
    \   self.x = x\n\n    def bar(self, y: str) -> Self:\n        return Foo(y)\n\
    ```\n\n### 5. An update to the standard library\n\nThe standard Python library\
    \ is not left out and is experiencing some changes.\n\n#### TOML\n\nFirst of all,\
    \ the tomllib module is added to the standard library to parse TOML. This addition\
    \ follows support for the pyproject.toml file, added in a previous version of\
    \ Python.\nThis library remains limited in terms of functionalities and has only\
    \ one purpose: file parsing.\n\n```\nimport tomllib\nwith open(\"pyproject.toml\"\
    , \"rb\") as f:\n    data = tomllib.load(f)\nprint(data[\"project\"][\"name\"\
    ])\n```\n\n#### AsyncIO\n\nThe asyncio library is also entitled to an update with\
    \ the addition of Task Group to replace the use of the .gather() method on asynchronous\
    \ operations.\n\n```\nimport asyncio\nasync def task1():\n    print(\"Foo\")\n\
    \    await asyncio.sleep(5)\n\nasync def task2():\n    print(\"Bar\")\n    await\
    \ asyncio.sleep(2)\n\nasync def main():\n    try:\n        async with asyncio.TaskGroup()\
    \ as task_group:\n            task_group.create_task(task1())\n            task_group.create_task(task2())\n\
    \    except* ValueError as exc:\n        print(exc.exceptions)\n\nif __name__\
    \ == \"__main__\":\n    asyncio.run(main())\n```\n\nThis update makes the syntax\
    \ more pleasant, but does not bring any other major changes to the library.\n\n\
    #### StrEnum\n\nThe StrEnum makes an appearance. It allows to automatically convert\
    \ a character string into an Enum.\n\n```\nfrom enum import StrEnum, auto\nclass\
    \ Foo(StrEnum):\n    BAR = auto()\nprint(Foo.BAR.value) # \"bar\"\n```\n\n####\
    \ Path"
