    >>> print("%s" % "some text")

    "some text"

    ```


    The syntax is simply:


    ```

    string % values

    ```


    If you have more than one value, they should be placed within brackets:


    ```

    >>> print("%s %s" % ("a", "b"))

    ```


    The string contains characters and *conversion specifiers* (here %s)

    To escape the sign %, just double it:


    ```

    >>> print "This is a percent sign: %%"

    This is a percent sign: %

    ```


    There are different ways of formatting a string with arguments. The one based
    on a string method called [format()](https://docs.python.org/3/library/stdtypes.html#str.format)
    is more and more common:


    ```

    >>> "{a}!={b}".format(a=2, b=1)

    2!=1

    ```


    ## Operators


    The mathematical operators + and * can be used to create new strings:


    ```

    t = ''This is a test''

    t2 = t+t

    t3 = t*3

    ```


    and comparison operators >, >=, ==, <=, < and != can be used to compare strings.


    ## Methods


    The string methods are numerous, however, many of them are similar (as you will
    see in this page).


    ## Methods for string manipulation


    There are a few methods to check the type of alpha numeric characters present
    in a string: `isdigit()`, `isalpha()`, `islower()`, `isupper()`, `istitle()`,
    `isspace()`, `str.isalnum()`:


    ```

    >>> "44".isdigit() # is the string made of digits only ?

    True

    >>> "44".isalpha() # is the string made of alphabetic characters only ?

    False

    >>> "44".isalnum() # is the string made of alphabetic characters or digits only
    ?

    True

    >>> "Aa".isupper() # is it made of upper cases only ?

    False

    >>> "aa".islower() # or lower cases only ?

    True

    >>> "Aa".istitle() # does the string start with a capital letter ?

    True

    >>> text = "There are spaces but not only"

    >>> text.isspace() # is the string made of spaces only ?

    False

    ```


    You can count the occurrence of a character with `count()` or get the length of
    a string with `len()`:


    ```

    >>> mystr = "This is a string"

    >>> mystr.count(''i'')

    3

    >>> len(mystr)

    16

    ```


    ## Methods that return a modified version of the string


    The following methods return modified copy of the original string, which is immutable.

    First, you can modify the cases using title(), capitalize(), lower(), upper()
    and swapcase():


    ```

    >>> mystr = "this is a dummy string"

    >>> mystr.title()    # return a titlecase version of the string

    ''This Is A Dummy String''

    >>> mystr.capitalize() # return a string with first letter capitalised only.

    ''This is a dummy string''

    >>> mystr.upper()    # return a capitalised version of the string

    ''THIS IS A DUMMY STRING''

    >>> mystr.lower()    # return a copy of the string converted to lower case

    ''this is a dummy string''

    >>> mystr.swapcase() # replace lower case by upper case and vice versa

    ''THIS IS A DUMMY STRING''

    ```


    Second, you can add trailing characters with center() and just() methods:


    ```

    >>> mystr = "this is a dummy string"

    >>> mystr.center(40)           # center the string in a string of length 40

    ''       this is a dummy string       ''

    >>> mystr.ljust(30)            # justify the string to the left (width of 20)

    ''this is a dummy string       ''

    >>> mystr.rjust(30, ''-'')       # justify the string to the right (width of 20)

    ''-------this is a dummy string''

    ```


    There is also a <u>zfill()</u> methods that adds zero to the left, which is equivalent
    to .rjust(width, ''0''):


    ```

    >>> mystr.zfill(30)

    ''00000000this is a dummy string''

    ```


    or remove trailing spaces with the <u>strip()</u> methods:


    ```

    >>> mystr = " string with left and right spaces "

    >>> mystr.strip()

    ''string with left and right spaces''

    >>> mystr.rstrip()

    '' string with left and right spaces''

    >>> mystr.lstrip()

    ''string with left and right spaces ''

    ```


    or expand tabs with <u>expandtabs()</u>:


    ```

    >>> ''this is a \t tab''.expandtabs()

    ''this is a tab''

    ```


    You can remove some specific characters with `translate()` or replace words with
    `replace()`:


    ```

    >>> mystr = "this is a dummy string"

    >>> mystr.replace(''dummy'', ''great'', 1) # the 1 means replace only once

    ''this is a great string''

    >>> mystr.translate(None, ''aeiou'')

    ths s dmmy strng

    ```


    Finally, you can separate a string with respect to a single separator with `partition()`:


    ```

    >>> mystr = "this is a dummy string"

    >>> t.partition(''is'')

    (''th'', ''is'', '' is a line'')

    >>> t.rpartition(''is'')

    (''this '', ''is'', '' a line'')

    ```


    ## Methods to find position of substrings


    The are methods such as `endswith()`, `startswith()`, `find()` and `index()` that
    allow to search for substrings in a string.


    ```

    >>> mystr = "This is a dummy string"

    >>> mystr.endswith(''ing'')    # may provide optional start and end indices

    True

    >>> mystr.startswith(''This'')  # may provide start and end indices

    True

    >>> mystr.find(''is'')    # returns start index of ''is'' first occurrence

    2

    >>> mystr.find(''is'', 4)  # starting at index 4, returns start index of ''is''
    first occurrence

    5

    >>> mystr.rfind(''is'')    # returns start index of ''is'' last occurrence

    5

    >>> mystr.index(''is'')    # like find but raises error when substring is not
    found

    2

    >>> mystr.rindex(''is'')   # like rfind but raises error when substring is not
    found

    5

    ```


    ## Methods to build or decompose a string


    A useful function is the `split()` methods that splits a string according to a
    character. The inverse function exist and is called `join()`.


    ```

    >>> message = '' ''.join([''this'' ,''is'', ''a'', ''useful'', ''method''])

    >>> message

    ''this is a useful method''

    >>> message.split('' '')

    [''this'', ''is'', ''a'', ''useful'', ''method'']

    ```


    The `split()` function can be applied to a limited number of times if needed.
    However, it starts from the left. If you want to start from the right, use `rsplit()`
    instead:


    ```

    >>> message = '' ''.join([''this'' ,''is'', ''a'', ''useful'', ''method''])

    >>> message.rsplit('' '', 2)

    [''this is a'', ''useful'', ''method'']

    ```


    If a string is multi-lines, you can split it with `splitlines()`:


    ```

    >>> ''this is an example\n of\ndummy sentences''.splitlines()

    [''this is an example'', '' of'', ''dummy sentences'']

    ```


    you can keep the endline character by giving True as an optional argument. Finally,
    note that `split()` removes the splitter:


    ```

    >>> "this is an example".split(" is ")

    [''this'', ''an example'']

    ```


    If you want to keep the splitter as well, use `partition()`


    ```

    >>> "this is an exemple".partition(" is ")

    (''this'', '' is '', ''an exemple'')

    ```


    ## LISTS


    A list is a container for variable length sequence of Python objects. A list is
    mutable, which means that items within the list can be changed. Also, items can
    be added to the list or removed from the list. In python, **lists** are part of
    the standard language. You will find them everywhere. Like almost everything in
    Python, lists are objects. There are many methods associated to them. Some of
    which are presented here below.


    ## Quick example


    ```

    >>> l = [1, 2, 3]

    >>> l[0]

    1

    >>> l.append(1)

    >>> l

    [1, 2, 3, 1]

    ```


    ## Difference between append() and extend()


    Lists have several methods amongst which the append() and extend() methods. The
    former appends an object to the end of the list (e.g., another list) while the
    later appends each element of the iterable object (e.g., another list) to the
    end of the list.

    For example, we can append an object (here the character c) to the end of a simple
    list as follows:


    ```

    >>> stack = [''a'',''b'']

    >>> stack.append(''c'')

    >>> stack

    [''a'', ''b'', ''c'']

    ```


    However, if we want to append several objects contained in a list, the result
    as expected (or not...) is:


    ```

    >>> stack.append([''d'', ''e'', ''f''])

    >>> stack

    [''a'', ''b'', ''c'', [''d'', ''e'', ''f'']]

    ```


    The object [''d'', ''e'', ''f''] has been appended to the existing list. However,
    it happens that sometimes what we want is to append the elements one by one of
    a given list rather the list itself.'
