    ## Chapter 6


    ## Python Basic Operators


    Python operators allow programmers to manipulate data or operands. Here are the
    types of operators supported by Python:


    - Arithmetic Operators

    - Assignment Operators

    - Relational or Comparison Operators

    - Logical Operators

    - Identity Operators

    - Bitwise Operators

    - Membership Operators


    ## Arithmetic Operators


    Python does a good job of processing mathematical expressions with its basic arithmetic
    operators. You can easily make programs to automate tasks such as computing tax,
    tips, discounts, or rent.


    | Symbol | Name | Description |

    | :--- | :--- | :--- |

    | + | Addition | adds the value of the left and right operands |

    | - | Subtraction | subtracts the value of the right operand from the value of
    the left operand |

    | * | Multiplication | multiplies the value of the left and right operand |

    | / | Division | divides the value of the left operand by the right operand |

    | ** | Exponent | performs exponential calculation |

    | % | Modulus | returns the remainder after dividing the left operand with the
    right operand |


    Addition, subtraction, multiplication, and division are the most basic operators
    and are invoked by entering the following expressions:


    Addition:


    ```

    >>> 1 + 3

    4

    ```


    Subtraction:


    ```

    >>> 10 - 4

    6

    ```


    Multiplication:


    ```

    >>> 4 * 2

    8

    ```


    Division:


    ```

    >>> 10 / 2

    5.0

    ```


    ### Exponent


    Exponential calculation is invoked by raising the first number to the power defined
    by the number after the ** operator:


    ```

    >>> 2**3  # 2 raised to the power of 3

    8

    ```


    ### Modulus


    The modulus operator gives the remainder after performing division:


    ```

    >>> 17 % 5

    2

    ```


    ### Floor Division


    Floor division, on the other hand, returns the quotient after removing fractional
    numbers:


    ```

    >>> 17 // 5

    3

    ```


    ### Using Basic Operators to Compute Sales Tax, Tip, and Total Bill


    To put your knowledge of variables, data types, and operators to good use, you
    can design a simple program that will compute the sales tax and tip on a restaurant
    meal.


    | Item | Value |

    |---|---|

    | Meal cost | $65.50 |

    | Sales tax rate | 6.6% |

    | Tip | 20% of meal + tax |


    First, set up a variable `meal` to store the food cost:


    ```

    meal = 65.50

    ```


    Next, set up the tax and tip variable. Assign both variables the decimal value
    of the percentages given. You can do this by using 100 as divisor:


    ```

    tax = 6.6 / 100

    tip = 20 / 100

    ```'
  mdcn: '## 数字类型转换


    你可以期望 Python 将混合类型的数字表达式转换为一种通用类型以便于求值。然而，在某些情况下，你可能需要显式地将一种数字类型转换为另一种，例如当函数参数要求转换时。你可以输入以下表达式将数字转换为另一种类型：


    要将 x 转换为浮点数：`float(x)`


    示例：


    ```

    >>>float(12)

    12.0

    ```


    要将 x 转换为普通整数：`int(x)`


    ```

    >>>int(12)

    12

    ```


    要将 x 转换为复数：`complex(x)`


    ```

    >>>complex(12)

    (12+0j)

    ```


    ## 数字转换函数


    我们可以将数字从一种类型转换为另一种类型。转换可能会涉及精度损失，因为我们减少了可用的位数。转换也可能通过添加没有任何实际意义的位数来产生一种虚假的精度感。


    我们将这些称为*工厂函数*，因为它们是用于从其他对象创建新对象的工厂。工厂函数的概念非常通用，这些只是这种模式的众多示例中的第一批。


    ## 数字函数定义


    存在许多从一种数字类型到另一种类型的转换。


    ### int(x)


    从对象 x 生成一个整数。如果 x 是浮点数，则在创建整数时会截断小数点右侧的数字。如果浮点数超过大约 10 位数字，则会创建一个长整数对象以保留精度。如果
    x 是一个太大而无法表示为整数的长整数，则没有转换。复数值不能直接转换为整数。如果 x 是一个字符串，则会解析该字符串以创建一个整数值。它必须是一个可选符号（+
    或 -）的数字字符串。


    ```

    int("1243")

    1243

    int(3.14159)

    3

    ```


    ### float(x)


    从对象 *x* 生成一个浮点数。如果 *x* 是整数或长整数，则会创建一个浮点数。请注意，长整数可以有大量数字，但浮点数只有大约 16 位数字；可能会有一些精度损失。复数值不能直接转换为浮点数。


    如果 *x* 是一个字符串，则会解析该字符串以创建一个浮点数值。它必须是一个可选符号（+ 或 -）的数字字符串。数字可以有一个小数点（.）。


    此外，字符串可以采用科学计数法，并包含 e 或 E，后跟作为简单有符号整数值的指数。


    ```

    float(23)

    23.0

    float("6.02E24")

    6.020000000000004e+24

    float(22)/7

    3.14285714286

    ```


    ### long(x)


    从 *x* 生成一个长整数。如果 *x* 是浮点数，则在创建长整数时会截断小数点右侧的数字。


    ```

    long(2)

    2L

    long(6.02E23)

    60199999999999995805696L

    long(2)**64

    18446744073709551616L

    ```


    ### complex(real, [imag])


    从 *real* 和 *imag* 生成一个复数。如果省略虚部，则为 0.0。复数不像其他类型那么简单。一个复数有两部分，实部和虚部。转换为复数通常涉及两个参数。


    ```

    complex(3,2)

    (3+2j)

    complex(4)

    (4+0j)

    complex("3+4j")

    (3+4j)

    ```


    请注意，第二个参数（数字的虚部）是可选的。这导致了多种不同的方式来调用此函数。在上面的示例中，我们使用了三种变体：两个数字参数、一个数字参数和一个字符串参数。


    ## 内置数学函数


    大部分数学函数位于一个单独的模块中，称为 math，我们将在 *math 模块* 中介绍。数学内置函数的正式定义如下。


    **abs(number)**

    返回参数的绝对值，|x|。


    **pow(x, y, [z])**

    将 x 提升到 y 次幂，x^y。如果存在 z，则执行模运算，x^y mod z。


    **round(number, [digits])**

    将 *number* 四舍五入到小数点后 *ndigits* 位。

    如果给出了 *ndigits* 参数，这是要四舍五入到的小数位数。如果 *ndigits* 为正数，则是小数点右侧的小数位数。如果 *ndigits* 为负数，则是小数点左侧的位数。

    示例：

    `print(round(678.456,2))`

    678.46

    `print(round(678.456,-1))`

    680.0


    ## 集合函数


    这些是几个内置函数，用于操作简单的数据元素集合。


    **max(value, ...)**

    返回最大的 *value*。


    ```

    >>> max(1,2,3)

    3

    ```


    **min(value, ...)**

    返回最小的 *value*。


    ```

    >>> min(1,2,3)

    1

    ```


    ## 日期和时间


    大多数应用程序需要日期和时间信息才能高效有效地工作。在 Python 中，你可以使用函数 `datetime.now()` 来获取当前日期和时间。命令 `datetime.now()`
    调用内置的 Python 代码，该代码提供当前日期和时间。

    要从 Python 获取日期和时间，请在命令提示符下输入以下内容：


    ```

    from datetime import datetime

    datetime.now()

    datetime.datetime(2016, 3, 10, 2, 16, 19, 962429)

    ```


    这种格式的日期和时间几乎难以理解，你可能想要一个更易读的结果。一种方法是使用 Python 标准库中的 `strftime`。

    尝试输入这些命令，看看是否会得到你喜欢的格式。


    ```

    >>>from time import strftime

    >>> strftime(''%Y-%m-%d %H:%M:%S'')

    ''2016-03-10 02:20:03''

    ```


    ## 布尔数据类型


    Python 中的比较只能产生两种可能的响应之一：True 或 False。这些数据类型称为布尔值。


    为了说明，你可以创建几个变量来存储布尔值并打印结果：


