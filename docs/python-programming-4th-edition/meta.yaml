    The IDLE (Integrated Development and Learning Environment) tool is included in
    Python''s installation package but you can choose to download more sophisticated
    third party IDEs.


    The IDLE tool offers a more efficient platform to write your code and work interactively
    with Python. You can access IDLE on the same folder where you found the command
    line icon or on the start menu. As soon as you click on the IDLE icon, it will
    take you to the Python Shell window.

