    # Bit Manipulation Operators


    Weve already seen the usual math operators: +, -, *, /, %, **; as well as the
    abs() and pow() functions. There are several other operators available to us.
    Principally, these are for manipulating the individual bits of an integer value.

    Well look at ~, &, ^, |, << and >>.


    The unary ~ operator flops all the bits in a plain or long integer. 1s become
    0s and 0s become 1s. Since most hardware uses a technique called 2s complement,
    this is mathematically equivalent to adding 1 and switching the numbers sign.


    ```

    >>> print ~0x12345678 -305419897

    ```'
