    # Some Jargon


    For folks new to developing software, it might help to understand a few distinctions
    made above.


    +   - Interpreted

    - Not Interpreted (i.e., Compiled)


    Python is a *byte-code interpreter*. A Python code object is a sequence of bytes
    that represent various operations and values. The Python interpreter steps through
    the bytes, performing the operations.


    A compiled language (e.g., C, C++, etc.) is translated from source form to executable
    binary specific to operating system and hardware platform.

    Java is similar to Python: its compiled and the Java Virtual Machine is a byte-code
    interpreter.


    +   - Dynamic

    - Not Dynamic (i.e., Static)


    Python is a dynamic language. Variables and functions do not have defined data
    types. Instead, a variable is simply a label attached to an object. A function
    is a callable object with parameters, but no declared result type. Each object
    has a strongly-defined permanent class.'
