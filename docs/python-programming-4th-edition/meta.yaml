    [''a'', ''b'', ''c'', ''d'', ''e'', ''f'']

    >>> queue.pop(0)

    ''a''

    ```


    ## 如何复制列表


    有三种方法可以复制列表：


    ```

    >>> l2 = list(l)

    >>> l2 = l[:]

    >>> import copy

    >>> l2 = copy.copy(l)

    ```


    警告：不要执行 `l2 = l`，这是一个引用，而不是一个副本。

    前面的复制列表的技术创建的是*浅拷贝*。这意味着嵌套对象不会被复制。考虑这个例子：


    ```

    >>> a = [1, 2, [3, 4]]

    >>> b = a[:]

    >>> a[2][0] = 10

    >>> a

    [1, 2, [10, 4]]

    >>> b

    [1, 2, [10, 4]]

    ```


    要解决这个问题，你必须执行深拷贝：


    ```

    >>> import copy

    >>> a = [1, 2, [3, 4]]

    >>> b = copy.deepcopy(a)

    >>> a[2][0] = 10

    >>> a

    [1, 2, [10, 4]]

    >>> b

    [1, 2, [3, 4]]

    ```


