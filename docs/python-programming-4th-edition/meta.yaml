  md: '# From Module Import Names


    Two other variations on the **import** statement introduce selected names from
    the module into the local namespace. One form picks specific names to make global.

    from module import name , ...


    This version of **import** adds a step after the module is imported. It adds the
    given list of names into the local namespace, making them available without using
    the module name as a qualifier.


    For example:

    from math import sin, cos, tan


    # Import and Rename


    Finally, we can combine the **from** and **as** options to both import selected
    items and provide more understandable names for them.


    We can say things like:

    from module import name as name


    In this case, were both concealing the source of the item and its original name.
    Wed best have a very good reason for this. Think of the confusion that can be
    caused by

    **from math import** sqrt **as** sin

    This must be used cautiously to prevent creating more problems than it appears
    to solve.'
