    ## 101 Python Programs


    # Chapter 1


    # Getting Started with Python


    Python is an open source, high-level programming language developed by Guido van
    Rossum in the late 1980s and presently administered by *Python Software Foundation*.
    It came from the ABC language that he helped create early on in his career.


    > *Python is an interpreted language. This means that every time a program is
    run, its interpreter runs through the code and translates the codes into machine-readable
    byte code.*


    Python is an object-oriented language that allows users to manage and control
    data structures or objects to create and run programs. Everything in Python is,
    in fact, first class. All objects, data types, functions, methods, and classes
    take equal position in Python.


    The official introduction to Python is


    > Python is an easy to learn, powerful programming language. It has efficient
    high-level data structures and a simple but effective approach to object-oriented
    programming. Pythons elegant syntax and dynamic typing, together with its interpreted
    nature, make it an ideal language for scripting and rapid application development
    in many areas on most platforms.


    It is a high-level language. Reading and writing codes in Python is much like
    reading and writing simple regular English statements. Python is a powerful language
    that you can use to create games, write GUIs, and develop web applications.


    # History of Python


    Python language was developed by **Guido van Rossum** in the late eighties and
    early nineties at the National Research Institute for Mathematics and Computer
    Science in the Netherlands.


    Python is derived from many other languages, including Modula-3, ABC, C, C++,
    Algol-68, SmallTalk, and UNIX shell and other scripting languages.


    Python is copyrighted. Like Perl, Python source code is now available under the
    GNU General Public License (GPL).


    Python is now maintained by a core development team at the institute, although
    Guido van Rossum still holds a major role in directing its development.


    Python is implemented in C, and relies on the extensive, well understood, portable
    C libraries. It fits seamlessly with Unix, Linux and POSIX environments. Since
    these standard C libraries are widely available for the various MS-Windows variants,
    and other non-POSIX operating systems, Python runs similarly in all environments.


    # Evolution of Python


    The development of Python occurred at a time when many other dynamic (and open-source)
    programming languages such as Tcl, Perl, and (much later) Ruby were also being
    actively developed and gaining popularity.


    **Version 1 of Python :** Python 1.0 was released in January 1994. The major release
    included a number of new features and functional programming tools including lambda,
    filter, map and reduce.


    **Version 2 of Python :** In October 2000, Python 2.0 was released with the new
    list comprehension feature and a garbage collection system. The [Python Software
    Foundation](https://www.python.org) has already announced that there would be
    no Python 2.8. However, the Foundation will provide support to version 2.7 of
    the [programming language](https://www.python.org) till 2020.


    **Version 3 of Python :** Python 3.0 was released in December 2008. It came with
    a several new features and enhancements, along with a number of deprecated features.
    The deprecated features and backward incompatibility make version 3 of Python
    completely different from earlier versions. So many [Python developers](https://www.python.org)
    still use Python 2.6 or 2.7 to avail the features deprecated from last major release.


    As Python 3 is backward incompatible, the programmers cannot access features like
    string exceptions, old-style classes, and implicit relative imports. Also, the
    developers must be familiar with changes made to syntax and APIs. They can use
    a tool called 2to3 to migrate their application from Python 2 to 3 smoothly. The
    tool highlights incompatibility and areas of concern through comments and warnings.
    The comments help programmers to make changes to the code, and upgrade their existing
    applications to the latest version of programming language.


    The version 2 and version 3 of Python are completely different from each other.
    So each programmer must understand the features of these distinct versions, and
    compare their functionality based on specific needs of the project. Also, he needs
    to check the version of Python that each framework supports. However, each developer
    must take advantage of the latest version of Python to avail new features and
    long-term support.


    # The difference between "Python Implementation" vs. "Python distribution" vs.
    Python


    Python itself is a programming language as per the behavior defined by the documentation
    available on python.org. Anything that does what that documentation says it''s
    supposed to do would "count" as being Python.....


    An implementation of Python is an actual program that provides the behavior defined
    by the documentation available on python.org. It has various implementations which
    allow you to run programs written in it. To give you a better idea, msvc, clang,
    gcc are implementations of C. Here are some python implementations:'
