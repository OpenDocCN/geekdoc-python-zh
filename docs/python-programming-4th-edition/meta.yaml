    \ 'DataFrame')\nwriter.save()\n```\n\n## Data Transferring - SQLite Databases\
    \ and DataFrame\n\nSQLite is a database engine that makes it simple to store and\
    \ work with relational data. Much like the csv format, SQLite stores data in a\
    \ single file that can be easily shared with others. Most programming languages\
    \ and environments have good support for working with SQLite databases.\n\nPython\
    \ is no exception, and a library to access SQLite databases, called `sqlite3`,\
