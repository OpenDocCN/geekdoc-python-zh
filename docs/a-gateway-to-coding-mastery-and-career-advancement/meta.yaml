    str.strip() for trimming whitespace, and many more.


    +   - **String Formatting:** Python provides several ways to format strings. The
    most powerful and versatile is the format method and the newer f-strings (formatted
    string literals).


    ```

    python

    name = "Alice"

    greeting = f"Hello, {name}!"

    ```


    +   - **String Slicing and Indexing:** Strings in Python are arrays of bytes representing
    Unicode characters. This means they can be indexed and sliced.'
