  md: "+   12. say_hello()\n13.\n14. **Using Decorators:** Decorators are often used\
    \ for logging, enforcing access control, instrumentation, and more.\n\n# *Practical\
    \ Example: Implementing a Memoization Decorator*\n\nAs a practical application,\
    \ let's implement a memoization decorator. Memoization is an optimization technique\
    \ used primarily to speed up computer programs by storing the results of expensive\
    \ function calls.\n\n+   1. **Defining the Memoization Decorator:**\n\n```\npython\n\
    • def memoize(func):\n    cache = {}\n    def memoized_func(*args):\n        if\
    \ args in cache:\n            return cache[args]\n        result = func(*args)\n\
    \        cache[args] = result\n        return result\n    return memoized_func\n\
    ```\n\n+   • **Applying the Decorator:**\n\n```\npython\n2. @memoize\n3. def fibonacci(n):\n\
    ```"
