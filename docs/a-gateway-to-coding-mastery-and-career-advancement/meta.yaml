    \ __init__(self):\n        self.items = []\n\n    def push(self, item):\n    \
    \    self.items.append(item)\n```\n\n```python\ndef pop(self):\n    return self.items.pop()\n\
    \ndef peek(self):\n    return self.items[-1] if self.items else None\n\ndef is_empty(self):\n\
    \    return not self.items\n\nstack = Stack()\nstack.push(\"apple\")\nstack.push(\"\
