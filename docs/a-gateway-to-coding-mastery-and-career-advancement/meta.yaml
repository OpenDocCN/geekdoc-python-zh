    \ import setup, find_packages\n\nsetup(\n    name='mypackage',\n    version='0.1',\n\
    \    packages=find_packages(),\n    description='A simple example package',\n\
    \    long_description=open('README.txt').read(),\n    install_requires=[\n   \
