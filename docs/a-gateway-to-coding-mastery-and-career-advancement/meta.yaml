    ## 4. 继承\n\n- **实现继承：** 如何在 Python 中从基类继承。\n- **方法重写：** 在子类中重写父类的方法。\n- **使用 super()\
    \ 函数：** 使用 `super()` 访问父类方法。\n\n## 5. 封装\n\n- **私有与公共成员：** 理解私有和公共属性及方法。\n- **属性装饰器：**\
    \ 使用属性装饰器控制对属性的访问。\n\n## 6. 多态\n\n- **理解多态：** OOP 中多态的概念。\n- **方法重载与重写：** 多态在\
    \ Python 中是如何实现的。\n\n## 7. 实践示例：一个图书馆管理系统\n\n- **设计系统：** 使用 OOP 原则创建一个基本的图书馆管理系统。\n\
    - **类与继承：** 实现诸如 `Book`、`Library` 和 `Member` 等类。\n\n```python\nclass Book:\n \
    \   def __init__(self, title, author):\n        self.title = title\n        self.author\
    \ = author\n\nclass Library:\n    def __init__(self):\n        self.books = []\n\
    \n    def add_book(self, book):\n        self.books.append(book)\n\n    def show_books(self):\n\
    \        for book in self.books:\n            print(book.title, \"by\", book.author)\n\
    \n# Usage\nlibrary = Library()\nbook1 = Book(\"1984\", \"George Orwell\")\nbook2\
