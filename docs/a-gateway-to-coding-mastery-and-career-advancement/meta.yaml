    \ 队列\n\n- **理解队列：** 队列的概念和特点。\n- **实现队列：** 如何在 Python 中实现一个队列。\n- **队列操作：** 入队、出队和检查第一个元素。\n\
    \n```python\nclass Queue:\n    def __init__(self):\n        self.items = []\n\n\
    \    def enqueue(self, item):\n        self.items.insert(0, item)\n\n    def dequeue(self):\n\
    \        return self.items.pop() if self.items else None\n\n    def peek(self):\n\
    \        return self.items[-1] if self.items else None\n\n    def is_empty(self):\n\
    \        return not self.items\n\nqueue = Queue()\nqueue.enqueue(\"apple\")\n\
    queue.enqueue(\"banana\")\n```"
