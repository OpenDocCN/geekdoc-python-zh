    plan for a query on a ''SalesDB'' database:


    ```sql

    SELECT * FROM Sales WHERE CustomerID = 123;

    ```


    Reviewing the execution plan for this query to identify inefficiencies and potential
    areas for optimization.


    ### Section 3: Indexing Strategies


