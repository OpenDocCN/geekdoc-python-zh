    \n- **水平扩展与垂直扩展**：理解何时使用水平扩展（例如增加更多服务器）与垂直扩展（升级现有服务器能力）至关重要。\n\n*实践案例：优化一个网络爬虫应用*\n\
    \n让我们通过并发请求来优化一个简单的网络爬虫应用。\n\n- **初始同步实现：**\n\n```python\nimport requests\n\n\
    def fetch(url):\n    return requests.get(url).text\n\nurls = [\"http://example.com\"\
    \ for _ in range(10)]\n\nfor url in urls:\n    fetch(url)\n```\n\n- **优化后的异步实现：**\n\
    \n使用 aiohttp 和 asyncio 进行异步请求。\n\n```python\nimport aiohttp\nimport asyncio\n\n\
    async def fetch(session, url):\n    async with session.get(url) as response:\n\
    \        return await response.text()\n\nasync def main(urls):\n    async with\
    \ aiohttp.ClientSession() as session:\n        tasks = [fetch(session, url) for\
