    \n## 第 1 节：SQL 简介\n\nSQL 是一种用于编程的领域特定语言，旨在管理存储在关系数据库管理系统（RDBMS）中的数据。它在处理结构化数据方面特别有用，因为数据的不同实体/变量之间存在关系。\n\
