    \n```\npython\ndef binary_search(arr, low, high, x):\n    if high >= low:\n  \
    \      mid = (high + low) // 2\n        if arr[mid] == x:\n            return\
    \ mid\n        elif arr[mid] > x:\n            return binary_search(arr, low,\
