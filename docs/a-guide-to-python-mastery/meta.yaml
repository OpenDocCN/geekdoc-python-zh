    Single-line comments in Python are ideal for providing concise explanations for
    parameters, function definitions, and expressions. A Python single-line comment
    starts with a hash symbol (#) and continues until the end of the line. If a comment
    spans multiple lines, each line should begin with a hash symbol. Here''s an example
    of a single-line comment: # This code is to show an example of a single-line comment
    print(''This statement does not have a hashtag before it'') In this code snippet,
    the comment is the line preceded by #. The Python compiler disregards this line,
    and only the print statement is executed.


    # 2. Multi-Line Comments


    Python does not offer explicit multi-line comment syntax. However, there are various
    methods to create multi-line comments. One way is to use multiple hash symbols
    (#) to construct comments that span multiple lines. Each line with a preceding
    hash symbol is treated as a separate single-line comment:


    ```

    # This is a # comment # extending to multiple lines

    ```


    In this case, each line beginning with # is considered a comment and is ignored
    by the Python interpreter. While not a dedicated multi-line comment, this approach
    achieves a similar effect.'
