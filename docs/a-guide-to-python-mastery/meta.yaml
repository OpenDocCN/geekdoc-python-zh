  md: '# Python Operator


    In this article, we will explore Python operators, which are symbols that perform
    specific operations between operands. Operators form the foundation of logical
    operations in a programming language. Like other programming languages, Python
    features a set of operators, including:


    +   - Arithmetic operators

    - Comparison operators

    - Assignment operators

    - Logical operators

    - Bitwise operators

    - Membership operators

    - Identity operators


    # Arithmetic Operators


    Arithmetic operators are used to perform mathematical operations between two operands.
    Python provides a variety of arithmetic operators, including:


    +   - **Addition (+)**: Used to add two operands. For example, if **a = 10** and
    **b = 10**, then **a + b** equals 20.

    - **Subtraction (-)**: Subtracts the second operand from the first. If the first
    operand is smaller, the result is negative. For example, with **a = 20** and **b
    = 5**, **a - b** equals 15.

    - **Division (/)**: Returns the quotient of dividing the first operand by the
    second. For instance, if **a = 20** and **b = 10**, **a / b** equals 2.0.

    - **Multiplication (*)**: Multiplies one operand by the other. If **a = 20** and
    **b = 4**, then **a * b** equals 80.

    - **Modulus (%)**: Returns the remainder after dividing the first operand by the
    second. If **a = 20** and **b = 10**, **a % b** equals 0.

    - **Exponent (**)**: Calculates the power of the first operand to the second operand.

    - **Floor Division (//)**: Provides the floor value of the quotient obtained by
    dividing the two operands.


    Let''s look at some code examples demonstrating these arithmetic operators in
    Python:


    ```

    a = 32

    b = 6

    print(''Addition of two numbers:'', a + b)

    print(''Subtraction of two numbers:'', a - b)

    print(''Multiplication of two numbers:'', a * b)

    print(''Division of two numbers:'', a / b)

    print(''Reminder of two numbers:'', a % b)

    print(''Exponent of two numbers:'', a ** b)

    print(''Floor division of two numbers:'', a // b)

    ```


    Output:

    Addition of two numbers: 38

    Subtraction of two numbers: 26

    Multiplication of two numbers: 192

    Division of two numbers: 5.333333333333333

    Reminder of two numbers: 2

    Exponent of two numbers: 1073741824

    Floor division of two numbers: 5'
  merge: -1
  pgno: 13
