    = 1 while i <= 10: print("%d X %d = %dn" % (n, i, n * i)) i += 1 choice = int(input("Do
    you want to continue printing the table? Press 0 for no: ")) if choice == 0: print("Exiting
    the program...") break n += 1 print("Program finished successfully.")

    ```


    Output:


    2 X 1 = 2 2 X 2 = 4 2 X 3 = 6 2 X 4 = 8 2 X 5 = 10 2 X 6 = 12 2 X 7 = 14 2 X 8
    = 16 2 X 9 = 18 2 X 10 = 20 Do you want to continue printing the table? Press
    0 for no: 1 3 X 1 = 3 3 X 2 = 6 3 X 3 = 9 3 X 4 = 12 3 X 5 = 15 3 X 6 = 18 3 X
    7 = 21 3 X 8 = 24 3 X 9 = 27 3 X 10 = 30 Do you want to continue printing the
    table? Press 0 for no: 0 Exiting the program... Program finished successfully.


    In this example, we have a nested loop structure with an outer "while" loop and
    an inner "while" loop. The "break" statement is used to exit the program when
    the user chooses to do so. When the user enters ''0'' as the choice, the program
    exits both loops and finishes successfully.'
  merge: -1
  pgno: 18
