  md: '# Comparison Operators


    Comparison operators are used to compare values and return a Boolean result. In
    Python, common comparison operators include:


    +   - **Equal (==)**: Returns **True** if the values of two operands are equal.

    - **Not Equal (!=)**: Returns **True** if the values of two operands are not equal.

    - **Less than or Equal (<=)**: Returns **True** if the first operand is less than
    or equal to the second operand.

    - **Greater than or Equal (>=)**: Returns **True** if the first operand is greater
    than or equal to the second operand.

    - **Greater than (>)**: Returns **True** if the first operand is greater than
    the second operand.

    - **Less than (<)**: Returns **True** if the first operand is less than the second
    operand.


    Here are some code examples demonstrating comparison operators in Python:


    ```

    a = 32

    b = 6

    print(''Two numbers are equal or not:'', a == b)

    print(''Two numbers are not equal or not:'', a != b)

    print(''a is less than or equal to b:'', a <= b)

    print(''a is greater than or equal to b:'', a >= b)

    print(''a is greater b:'', a > b)

    print(''a is less than b:'', a < b)

    ```


    Output:

    Two numbers are equal or not: False

    Two numbers are not equal or not: True

    a is less than or equal to b: False

    a is greater than or equal to b: True

    a is greater b: True

    a is less than b: False'
