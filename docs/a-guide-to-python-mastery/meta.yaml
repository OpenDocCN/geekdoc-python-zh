  md: '# Python String


    A Python string is essentially a collection of characters enclosed within single
    quotes, double quotes, or triple quotes. While the computer doesn''t comprehend
    these characters directly, it stores them internally as a combination of 0s and
    1s. Each character is encoded in ASCII or Unicode characters, which means that
    Python strings can be viewed as a collection of Unicode characters.


    In Python, you can create strings by enclosing characters or sequences of characters
    in quotes. Python allows you to use single quotes, double quotes, or triple quotes
    to define strings. Here''s an example:

    str = "Hi Python!"

    If you check the type of the variable **str** using a Python script, like this:

    print(type(str))

    It will display the type as a string (**str**).

    Python treats strings as sequences of characters, which means there''s no separate
    character data type. Instead, a single character, such as ''p'', is considered
    a string of length 1.


    **Creating Strings in Python** Strings in Python can be created using single quotes,
    double quotes, or triple quotes. While triple quotes are often used for multiline
    strings or docstrings.


    ```

    # Using single quotes str1 = ''Hello Python'' print(str1) # Using double quotes
    str2 = "Hello Python" print(str2) # Using triple quotes str3 = """Triple quotes
    are generally used for representing multiline or docstrings"""

    print(str3)

    ```


    Output:

    Hello Python Hello Python Triple quotes are generally used for representing multiline
    or docstrings


    **String Indexing and Slicing** String indexing in Python, as in most other languages,
    starts from 0. For example, the string "HELLO" is indexed as follows:

    H E L L O 0 1 2 3 4

    You can access individual characters of the string using the square brackets [
    ]. However, you can also use the colon : operator to access a substring from the
    given string.


    ```

    str = "HELLO" print(str[0]) print(str[1]) print(str[2]) print(str[3]) print(str[4])
    # Raises an IndexError because the 5th index doesn''t exist

    ```


    Output:

    H E L L O IndexError: string index out of range

    In the code above, we used the slice operator [ ] to access individual characters.
    Additionally, we used slicing to access substrings of the given string. The slice
    operator''s upper range is always exclusive. For example, **str[1:3]** includes
    **str[1] = ''E''** and **str[2] = ''L''** but nothing else.


    ```

    str = "JAVATPOINT" print(str[0:]) # Starts from the 0th index to the end print(str[1:5])
    # Starts from the 1st index to the 4th index print(str[2:4]) # Starts from the
    2nd index to the 3rd index print(str[:3]) # Starts from the 0th to the 2nd index
    print(str[4:7]) # Starts from the 4th to the 6th index

    ```'
  merge: -1
  pgno: 19
- img_proc: true
  md: 'Output:

    JAVATPOINT AVAT VA JAV TPO


    You can also perform negative slicing, starting from the rightmost character with
    -1, the second rightmost with -2, and so on.


    ```

    str = ''JAVATPOINT'' print(str[-1]) # Last character print(str[-3]) # Third character
    from the right print(str[-2:]) # Slice from the second character from the right
    to the end print(str[-4:-1]) # Slice from the fourth character from the right
    to the first character from the right print(str[-7:-2]) # Slice from the seventh
    character from the right to the third character from the right print(str[::-1])
    # Reversing the string

    ```


    Output:

    T I NT OIN ATPOI TNIOPTAVAJ


    **Reassigning Strings** Updating the content of strings is straightforward; you
    can replace the content by assigning it to a new string. However, it''s important
    to note that strings in Python are immutable, meaning you can''t replace a part
    of the string – you can only replace it with a new string.'
