    we used the `fit( )` method to train our algorithm on the training set, then we
    tested the model on the test data. Finally, we printed out the accuracy score.


    Now that we have implemented all the algorithms in our list, we can simply compare
    the scores of all the models to select the model with the highest score. But wouldn’t
    it be nice if we had a way to visually compare the performance of the different
    models? We can use the `yellowbrick` library in scikit-learn, which provides methods
    for visually representing different scoring methods.


    ## Performance Comparison


    In the previous sections we have used the `accuracy_score( )` method to measure
    the accuracy of the different algorithms. Now we will use the ClassificationReport
    class provided by the Yellowbrick library to give us a visual report of how our
