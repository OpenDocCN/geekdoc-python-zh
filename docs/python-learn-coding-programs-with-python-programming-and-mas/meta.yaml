    makes its predictions. But the way it works, generally speaking, is that the machine
    learning system is able to detect patterns in the data that human minds cannot
    detect.

    This example serves to illustrate that adaptive learning can be used in nearly
    every situation. Even in ballistics, there may be many different factors that
    human engineers have not properly accounted for. Who knows what they are, it could
    be the humidity, wind, or other factors. The bet is that although line-by-line
    coded software works very well in deterministic situations, adaptive software
    that is not programmed and only trained with data will do better.


    # Complex and Adaptive


    When there is any situation where experience–that is exposure to more data–can
    improve performance, machine learning is definitely called for. If the data is
    complex, this is another situation where machine learning can shine. Think about
    how the human mind can handle mathematical problems. Even two-dimensional problems
    in calculus and differential equations are difficult for most people, and even
    the smartest people struggle while learning it for the first time. It gets even
    more difficult when you move to three dimensions, and the more complexity that
    is added, the harder it is for people to digest.

    If you are looking at a data set, you are going to be facing the same situation.
    If we have a small data set of 20 items, each with 3 fields and an output, a human
    operator might be able to extract a relationship between the inputs and outputs.
    They could even do linear regression by hand or plug it into a simple program
    like Microsoft Excel. Even simply eyeballing the data can reveal the relationships.

    But the more data you add to the problem, the less able a human operator is able
    to determine what the relationships are. The same problem with output but 20 inputs
    might make it very difficult. If there are no outputs, and you ask human operators
    to see if there are any patterns in the data, it might become virtually impossible.

    One way that we get around complexity in the real world is to program computers
    in the standard way. This helps humans get around many large data problems and
    solving problems that would involve tedious work. Consider weather prediction,
    early efforts at predicting the weather or'
