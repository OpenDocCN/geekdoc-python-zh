    First - delete all duplicates except the first

    Last - delete all duplicates except the last

    False - delete all duplicates


    If we want to rename the column, we will use the dictionary rename () method.


    To check how many null values we have in a dataset, we use the isnull () and sum
    () method aggregation.

    data.isnull (). sum ()


    To remove null values, we use the dropna () method, which will delete every row
    that has at least one null value and save a new dataset to a copy. In addition
    to rows, we can also delete columns with null values, adding the axis = 1 parameter.
    In order not to delete columns containing valuable data, just because they have
    one / two null values, we will use a technique called Imputation (''padding'').
    It is often used by technical engineers to replace each null value with the arithmetic
    mean or median of that column. We fill in the blank values with the fill (new
    value) method. In the Scikit-Learn - Basics section, we saw that the describe
    () method sees the distribution of continuous variables. In addition to the entire
    dataset, it can also be used on a categorical feature (column), where we then
    get a detailed view of unique values, categories, and the like. The correlation
    coefficient shows us the relationship between the two variables. If it is positive,
    it means that if one variable rises and the other rises (one falls and the other
    falls), and if negative, it means that their relationship is such that if one
    falls, the other'
  - '[PAGE 372]


    rises. The number 1.0 indicates the best correlation between the variables. We
    use the corr () method to print the correlation coefficients.


    # Indexing and a Conditional Selection


    To access the row, we use two arguments: loc and iloc. loc is used to search by
    name, and iloc to search by index. We can select multiple lines by writing from-to,
    the same as in Python lists. The only difference is that when indexing with names
    (loc), the last specified edge is included, which Python lists and iloc do not
    do.

    If we want rows with a specific value, we apply a Boolean condition. It returns
    TRUE or FALSE, depending on whether or not it satisfies the condition. If we want
    to filter the data frame to have no FALSE value, then we set the condition to
    the data frame itself.

    For more complicated conditions, we use both (&) and or (|) operators or simplify
    them with the isin () method.


    # Applying Functions to Datasets


    When we want to change something or add a new column, the values of which are
    obtained using the original dataset, it is optimal to write a function that we
    will later apply to the data frame method apply ().


    Graphs

    In combination with Matplotlib, Pandas can visualize data frames with a variety
    of graphs. The boxplot is based on a set of different numbers describing the data
    set (minimum, first quartile Q1, median, third quartile Q3, and maximum). It tells
    us how symmetrical the data set is, what the distribution density is, and the
    like. There are two ways to show a rectangular diagram. The first is to put kind
    = ”box” in the plot method or call the boxplot method (column = ”column_name”
    by = ”sort_by_column”).


    Interesting Facts

    When we do not have a data file already saved and when we do not want to waste
    time-saving the file, Pandas offers the ability to read data from the clipboard.
    So we can copy the table from an Excel file and call the read_clipboard () method
    and Pandas will load it like any other file. After working with the data, we can
    immediately save the file in gzip, zip, or bz2 format by adding the compression
    = "gzip / zip / bz2" parameter to the'
  - '[PAGE 373]


    to_filetype (filename) method. We can use CSS properties to style the tables.


    # Chapter Summary


    Libraries are a set of features and modules, designed to make it easier to write
    code so that we use existing functionality and do not have to write it ourselves.
    The most commonly used Python libraries for data science/analysis are NumPy, Pandas,
    SciPy, Scikit Learn, Matplotlib, Seaborn, and many others. We can include the
    library by assigning it a nickname, or including all or some of the functionality
    in the library without aliases after we can only call them a function name.'
