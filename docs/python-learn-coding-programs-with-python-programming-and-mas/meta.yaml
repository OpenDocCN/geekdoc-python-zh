  md: '# Chapter 1: Data Science Basics


    # What is Data Science?


    Many definitions have been given for Data Science. We can think of Data Science
    as a combination of different algorithms, tools, and machine learning principles
    that aims to discover hidden patterns from the raw data. Data Science involves
    many disciples and skills such as statistics, coding, business etc. We hear though,
    many buzzwords all around Data Science. Let’s try to clarify them.


    ![](img/eca0e55982f15b47b8758e8428ee4d3b_247_0.png)


    # Data Analysis


    Data Analysis, includes the most common way of using data. Typically runing analysis
    to understand past events and the present.


    # Predictive Analytics


    Predictive analytics encompass the use of techniques from machine learning, data,
    and statistical algorithms to help identify the likelihood of future outcomes
    based on data that is more historical. The goal is to go beyond what we know happened
    in the past to provide the best predictions and guess what will happen in the
    future.


    # Artificial Intelligence'
  merge: -1
  pgno: 247
- img_proc: true
  md: 'Artificial intelligence is a technique that is used to make machines mimic
    any human behavior. The aim is to ensure that a machine can accurately and efficiently
    mimic any human behavior. Some examples of artificial intelligence machines include
    deep blue chess and IBM''s Watson.


    # Machine Learning


    Machine Learning can be defined as part of artificial intelligence technology
    driven by the hypothesis that machines are capable of learning from data by identifying
    patterns and making decisions with little to no human assistance


    # Deep Learning


    Deep learning refers to a sub-branch of machine learning that involves algorithms
    that are motivated by the function and structure of the brain known as the artificial
    neural networks. This makes machines to do what is natural to humans, and that
    is, learn from the past. This is the system behind the idea of driverless cars.


    ![](img/eca0e55982f15b47b8758e8428ee4d3b_248_0.png)'
