    the word print is in purple and "Hello World" is in green. This is the software’s
    way of making our code easier to read. The words print and "Hello World" serve
    different purposes in our program, hence they are displayed using different colors.
    We’ll go into more details in later chapters. The line #Prints the Words "Hello
    World" (in red) is actually not part of the program. It is a comment written to
    make our code more readable for other programmers. This line is ignored by the
    Python interpreter. To add'
