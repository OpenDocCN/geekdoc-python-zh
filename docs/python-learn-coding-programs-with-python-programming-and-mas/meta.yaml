    # How to Slice, And Index Arrays


    Sometimes you need only a subset of your data or need value of some individual
    elements. Then you can do this by indexing and slicing. This is the way to address
    individual elements. One important thing to remember is that indexing always starts
    with ‘0’. For a single dimensional matrix indexing is pretty easy.

    Syntax for indexing in 1 dimensional matrix is given as arr[n], this gives you
    nth number starting with zero index.

    For a 2-dimensional matrix you can pass a comma-separated list of indices to select
    individual elements. It is given as arr[m,n] or arr[m][n], this gives you the
    element on mth row and nth column starting with zero index.


    ![](img/eca0e55982f15b47b8758e8428ee4d3b_207_1.png)


    Now when we talk about indexing in multidimensional matrix, it becomes a little
    more difficult. Multidimensional matrix is basically list of list with multiple
    layers.

    Here I am going to talk about a 3-dimensional matrix. Indexing in a 3d array works
    like this: syntax: arr[L,M,N] or arr [L][M][N] where L is the first index, M is
    the row no. and N is the column no.'
