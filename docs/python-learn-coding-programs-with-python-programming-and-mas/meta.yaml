- md: "## Python is Dynamically Typed\n\nAnother characteristic of Python is to be\
    \ dynamically typed which means that data types are checked on the fly, during\
    \ execution vs statically typed when data type are checked before run-time.\n\n\
    ## Python is Strongly Typed\n\nThe primary feature of a strongly typed language\
    \ is that it lacks the capacity to convert one form (type) of data to another\
    \ automatically. On the other hand, languages such as PHP and JavaScript, which\
    \ are loosely typed, have the capacity to convert data from one type to another\
    \ freely and automatically. Consider the following case:\n\n```\n1 | price = 12\n\
    2 | str = \"The total price = \" + 12\n3 | console.log(str)\n```\n\nOutput:\n\n\
    ```\nThe total price = 12\n```\n\nIn this regard, before adding 12 to the string,\
    \ the JavaScript language seeks to convert the number 12 to a string “12”, which\
    \ is subsequently appended to the end of the string. However, in a Python statement\
    \ such as below:\n\n```\nstr = \"The total price = \" + 12\n```\n\nThe language\
    \ (Python) would occasion an error because it does not have the capacity to convert\
    \ the number 12 into a string.\n\nIn synthesis Python is a strongly typed language\
    \ i.e. the type of variables must be known. This implies that the type of a value\
    \ doesn't change in unexpected ways. For example a string containing only number\
    \ doesn't automatically change into a number, as may happen in Perl. In Python,\
    \ every data type change needs an explicit conversion.\n\n## Huge set of libraries\n\
    \nPython provides users with a broad range of libraries, which make it easy to\
    \ add new capacities and capabilities without necessarily reinventing new approaches.\
    \ The following are common questions mostly posed from beginners in Python programming:\n\
    \n## What type of application I can create using Python?\n\nSome of the main applications\
    \ for which Python is used include:\n- Games\n- Machine Learning and Artificial\
    \ Intelligence\n- Data Science and Data Visualization\n- Web Development\n- Game\
    \ Development\n- Desktop GUI\n- Web Scraping Applications\n- Business Applications\n\
    - Audio and Video Applications\n- CAD Applications\n- Embedded Applications\n\
    - System administration applications\n- GUI applications.\n- Console applications\n\
    - Scientific applications\n- Android applications\n\nAnd several others not mentioned\
    \ here.\n\n## Who uses Python?\n\nSome of the main companies that utilize Python\
    \ include:\n- i. YouTube\n- ii. Mozilla\n- iii. Dropbox\n- iv. Quora\n- v. Disqus\n\
    - vi. Reddit\n- vii. Google\n- viii. Disney\n- ix. Mozilla\n- x. Bit Torrent\n\
    - xi. Intel\n- xii. Cisco\n- xiii. Banks such as JPMorgan Chase, UBS, Getco, and\
    \ Citadel apply Python for financial market forecasting.\n- xiv. NASA for scientific\
    \ programming tasks\n- xv. iRobot for commercial robotic vacuum cleaner\n- xvi.\
    \ And many others.\n\n## Chapter 2: Installing Python\n\nTo code in Python, you\
    \ must have the Python Interpreter installed in your computer. You must also have\
    \ a text editor in which you will be writing and saving your Python codes. The\
    \ good thing with Python is that it can run on various platforms like Windows,\
    \ Linux, and Mac OS. Most of the current versions of these operating systems come\
    \ installed with Python. You can check whether Python has been installed on your\
    \ operating system by running this command on the terminal or operating system\
    \ console: Python\n\nType the above command on the terminal of your operating\
    \ system then hit the Enter/Return key.\n\nThe command should return the version\
    \ of Python installed on your system. If Python is not installed, you will be\
    \ informed that the command is not recognized; hence you have to install Python.\n\
    \n## Choosing a Python Version\n\nThe main two versions of Python are 2.x and\
    \ 3.x. Python 3.x is obviously the latest one but Python 2.x as of today is most\
    \ likely still the most used one. Python 3.x is however growing much faster in\
    \ terms of adoption. Python 2.x is still in use in many software companies. More\
    \ and more enterprises however are moving to Python 3.x. There are several technical\
    \ differences between the 2 versions. We can summarize in very a simple way as\
    \ Python 2.x is legacy and Python 3.x is the future. The advice for you is to\
    \ go for the latest version Python 3.x. From 2020 Python 2.x is not be supported\
    \ anymore.\n\n## General installations instruction\n\nInstalling Python is very\
    \ easy. All you need to do is follow the steps described below:\n\n1. Go to Python\
    \ downloads page\n   https://www.python.org/downloads/\n2. Click the link related\
    \ to your operating system\n\n![](img/eca0e55982f15b47b8758e8428ee4d3b_30_0.png)\n\
    \n3. Click on the latest release and download according to your operating system\n\
    4. Launch the package and follow the installation instructions (we recommend to\
