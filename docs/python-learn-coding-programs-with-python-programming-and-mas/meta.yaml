    # Chapter 1: Overview of Machine Learning


    Machine learning is actually an old technology, as far as computer technology
    is concerned. The first machine learning system was constructed in the mid-to-late
    1950s. It was developed at IBM and described in a paper published in the peer
    reviewed literature. This system was able to learn how to play checkers. The system
    has some key components that make us recognize it as machine learning.


    The first item to note is that the system was not designed to play checkers. Instead,
    the system was designed to learn, and to self-adapt. It learned to play checkers
    by being exposed to playing checkers.


    The second item to consider is that the more the system played checkers, the better
    it got. This is an illustration of the ability of these types of computer systems
    to benefit from the experience. Just like a human being, the more experience they
    have at doing something, the better they get.


    There is one key aspect that you should be aware of when considering a program
    like this. A human being can learn to play checkers, and they can also learn to
    play monopoly and guitar. Although years ago, researchers in the field hoped to
    build computers that were like this too, the machine learning systems in use today
    are not like that. In short, they are one trick ponies. So, our system that we
    are describing here was really good at playing checkers. It could not do anything
    else. Once you have a system that does something, that is what it does, period.


    With the first system built some 60 odd years ago, you might be wondering why
    it is only recently that this type of computer system has become relevant to the
    real world. There are two reasons. One is the messy way that research develops
    in any human enterprise. A few years after this development, computer scientists
    got extremely hot on the idea of general artificial intelligence. Huge promises
    were made, and lots of hype developed around the field. This was when the idea
    of fully functioning “android” robots caught fire. These would be human-like computer
    systems packaged in a human-like form, often indistinguishable from humans. The
    movie Alien captured this idea quite well with the ship scientist named Ash; the
    other crew members didn’t even know he was an android.


    The idea of artificial intelligence was also portrayed in the famous science fiction
    movie 2001: A Space Odyssey.'
  - '[PAGE 326]


    This was a more realistic portrayal, the computer was not human-like in form,
    but it clearly had a mind. One of the key themes in the film is the fact that
    the system has faults, and can make bad decisions as a result. This is probably
    a warning we should take to heart, but we probably won’t. The system in the movie
    brags that it never makes mistakes, but it clearly does. Unfortunately, people
    today place too much faith in computers. Machine learning is great, but don’t
    worship it.


    Another aspect of the HAL 9000 computer portrayed in the film was actually realistic
    in the sense of what artificially intelligent computer systems can actually do
    in the real world, and what they might actually be used for. The system in the
    movie detects a coming fault in a communications device. In the movie it turns
    out to be in error, but the point is many machine learning systems are being developed
    that will hopefully detect faults in electronics and machines before humans become
    aware of them.


    We don’t want to get too carried away with science fiction stories, but the analogies
    and interpretations of what is possible are interesting to consider. It turns
    out that hype won the day, and after a few decades of pursuing the holy grail
    of artificial intelligence, in effect creating a computer system that worked like
    a human brain, computer scientists began to change direction. They turned more
    attention to machine learning, which is something that can be thought of as using
    humanlike intelligence but applied to a very narrowly tailored task. Something
    that was missing, however, was data.


    # How Machine Learning Works


    Machine learning begins with a human guide in the form of a data scientist. A
    problem has to be identified that a machine learning algorithm can be used to
    solve. In order for the process to work, there must be a significant amount of
    data that can be used to train the system before it is deployed in the real world.
    There are two basic ways that machine learning can proceed. They are called supervised
    and unsupervised learning.


    In the training phase, the data scientist will select appropriate training data,
    and expose the system to the data. As the system is exposed to data, it will modify
    itself in order to become more accurate. This phase is a crucial part of a development
    with the system, and the data scientist must choose the right data set for the
    problem at hand. In other words, the impression that human beings are not involved
    at all is completely false. Human beings are'
- md: 'involved in choosing and framing the problem, and in choosing the right training
    data. The human being is also involved in the process of evaluating the performance
    of the system. As we will see, there are tradeoffs that must be made that have
    large implications for the viability of the system. If the data scientists that
    are working on the problem are not careful and correct, to the best of their abilities,
    in interpreting the results produced by the system, a dysfunctional system can
    be deployed that will err when attempting to do its job.


    The training phase may have several iterations, depending on how the results turn
    out.


    Once the system is deployed, it will more or less operate in an autonomous fashion,
    but data scientists that are involved in this work should be continually evaluating
    the performance of the system. At some point, the system may need to be replaced
    or it may need to be subjected to more training, if it is not producing the kinds
    of results that are accepted.


    ## Why Use Python for AI and Machine Learning?


    There are a lot of different coding languages that you can learn about and use.
    So, if there are a lot of choices out there, why would you want to go with the
    Python coding language in the first place? Many people, both experts, and beginners
    all choose to go with Python because it is easy to learn, easy to read, and it
    is capable of creating large, challenging codes that you might want to write.
    There are a lot of different reasons that you would want to work with this coding
    language, and these include:


    ### Simple and consistent


    You will find that Python is a programming language that is simple and quite easy
    to read, even if you are a beginner. When it is compared to some of the other
    coding languages, it is one of the most readable languages. Since this is a natural
    coding language to go with, many beginners like that they can catch on so quickly
    and that they will understand what they are doing in no time.


    ### Extensive selection of libraries and frameworks


    Once you start to get familiar with Python, you will notice that it comes with
    an extensive library. This is good news for beginners because the library is what
    contains all the functions, codes and other things that you need to make the language
    work for you. This library will help make sure that you can do some useful stuff
    when trying to make your code.


    ### Platform independence


    You can work with the Python language no matter which platform you would like
    to use it on. Linux is the operating system that a lot of people will choose to
    go with, but you can still work with Python even if you are on a Windows or Mac
    computer. This is excellent news because it means that you can use Python without
    having to make any significant changes to your current setup.


    ### Great community and popularity


    Whether you have worked with coding language in the past or not, it is nice to
    know that there is a large community of Python users that will help you out if
    you ever get stuck. Any time that you need some ideas like a new project or if
    you have a question, or if you want to learn something new, there is a big group
    to provide you with the information that you need to help you get started.


    ## Chapter 2: The 7 Steps of Machine Learning Process


    The models that are based on labeled training data sets are termed as supervised
    Machine Learning models. When children go to school, their teachers and professors
    give them some feedback about their progress. In the same way, a supervised Machine
    Learning model allows the engineer to provide some feedback to the machine.


    Let us take an example of an input [red, round]. Here, both the child and machine
    will understand that any object which is round and red is an apple. Let us now
    place a cricket ball in front of either the machine or the child. You can feed
    the machine with the response negative 1 or 0 depending on whether the prediction
    is wrong or right. You can always add more attributes if necessary. This is the
    only way that a machine will learn. It is also for this reason that if you use
    a large-high-quality data set and spend more time training the machine, the machine
    will give you better and more accurate results.


    Before we proceed further, you must understand the difference between the concepts
    of Machine Learning, artificial intelligence, and deep learning. Most people use
    these concepts interchangeably, but it is important to know that they are not
    the same.


    ### Machine Learning, Artificial Intelligence and Deep Learning


    The diagram below will give you an idea of how these terms relate.


    ![](img/eca0e55982f15b47b8758e8428ee4d3b_329_0.png)


    An illustration to understand the relationship between Machine Learning, Artificial
    Intelligence, and Deep Learning


    Artificial intelligence is a technique that is used to make machines mimic any
    human behavior. The aim is to ensure that a machine can accurately and efficiently
    mimic any human behavior. Some examples of artificial intelligence machines include
    deep blue chess and IBM''s Watson.


    Machine Learning, as defined above, is the use of statistical and mathematical
    models to help machines learn to mimic human behavior. This is done using past
    data.


    Deep learning is a subset of Machine Learning, and it refers to some of the functions
    and algorithms that an engineer uses to help a machine to train itself. The machine
    can learn to take the correct option to derive an output. Neural networks and
    natural language processing are a part of the deep learning ecosystem.


    ### Typical Objectives of Machine Learning System


    The systems of Machine Learning usually are set up with one of the following objectives:


    - Predict a category

    - Predict a quantity

    - Anomaly Detector Systems

    - Clustering Systems


    ### Predict a category


    The model of Machine Learning helps analyze the input data and then predicts a
    category under which the output will fall. The prediction in such cases is usually
    a binary answer that’s based on “yes” or “no”. For instance, it helps with answers
    like, “will it rain today or not?” “is this a fruit?” “is this mail spam or not?”
    and so on. This is attained by referencing a group of data that will indicate
    whether a certain email falls under the category of spam or not based on specific
    keywords. This process is known as classification.


    ### Predict a quantity


    This system is usually used to predict a value like predicting the rainfall according
    to different attributes of the weather like the temperature, percentage of humidity,
    air pressure and so on. This sort of prediction is referred to as regression.
    The regression algorithm has various subdivisions like linear regression, multiple
    regression, etc.


    ### Anomaly Detector Systems


    The purpose of a model in anomaly detection is to detect any outliers in the given
    set of data. These applications are used in banking and e-commerce systems wherein
    the system is built to flag any unusual transactions. All this helps detect fraudulent
    transactions.


    ### Clustering Systems


    These forms of systems are still in the initial stages but their applications
    are numerous and can drastically change the way business is conducted. In this
    system, the user is classified into different clusters according to various behavioral
    factors like their age group, the region they live in or even the kind of programs
    they like to view. According to this clustering, the business can now suggest
    different programs or shows a user might be interested in watching according to
    the cluster that the said user belongs to during classification.


    ### Main Categories of Machine Learning Systems


    In the case of traditional machines, the programmer will give the machine a set
    of instructions and the input parameters, which the machine will use to compute
    make some calculations and derive an output using specific commands. In the case
    of Machine Learning systems, however, the system is never restricted by any command
    that the engineer provides, the machine will choose the algorithm that it can
    be used to process the data set and decide the output with high accuracy. It does
    this, by using the training data set which consists of historical data and output.
    Therefore, in the classical world, we will tell the machine to process data based
    on a set of instructions, while in the Machine Learning word we will never instruct
    a system. The computer will have to interact with the data set, develop an algorithm
    using the historical data set, make decisions like a human being would, analyze
    the information and then provide an output.'
