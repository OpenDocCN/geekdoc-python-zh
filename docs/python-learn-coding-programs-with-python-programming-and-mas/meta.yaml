    # Latent Variables


    # What Are Latent Variables?


    Latent variables are the variables that are inferred from other variables and
    are not directly observed. Variables that are observed are also known as directly
    measured variables and are implemented mathematically to design latent variable
    models in economics, machine learning, artificial intelligence, psychology and
    natural language processing. A latent variable can be observed neither in training
    nor in the testing phase. These variables can also not be measured on a quantitative
    scale.


    Taking the example of a probabilistic language model of new articles, we can notice
    that each article x focuses on a specific topic y. For example, sports, economics,
    politics or finance articles each focus on their respective topics. By using this
    knowledge, we can build a more accurate model that can also be expressed as

    p (x | t)p(t)

    for which additionally added variable t is unobserved. However, we cannot use
    learning methods because it is unobserved, and the unobserved variables often
    make learning a difficult task.


    # Gaussian Mixture Models


    Gaussian Mixture Models are also considered as latent variable models. These models
    are widely being used in machine learning because they postulate that our observed
    data is comprised of k clusters. It is assumed that each cluster is specified
    by π1,...,πK; whereas the distribution within each cluster is known as Gaussian.'
