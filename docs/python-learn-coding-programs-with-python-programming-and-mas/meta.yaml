    "moments" or clips that should appear in a standard horror movie trailer, Watson
    was trained to classify and analyze input "moments" from audio-visual and other
    composition elements from over a hundred horror movies. This training resulted
    in the creation of a six-minute movie trailer by Watson in a mere 24 hours, which
    would have taken human professional weeks to produce.


    With the use of Machine learning, computer vision technology, natural language
