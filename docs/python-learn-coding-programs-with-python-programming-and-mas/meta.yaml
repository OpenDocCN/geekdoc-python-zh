    # What Is An Association Rule?


    An association rule is comprised of a consequent and an antecedent as both of
    them are list items. The item set is the list for all items in the consequent
    and antecedent. A typical example of an association rule is market-based analysis,
    explained as follows:


    | TID | ITEMS |

    |---|---|

    | 1 | Bread, Milk |

    | 2 | Bread, Biscuits, Drink, Eggs |

    | 3 | Milk, Biscuits, Drink, Coke |

    | 4 | Bread, Milk, Biscuits, Drink |

    | 5 | Bread, Milk, Drink, Coke |


    Basic definitions:

    Support count for frequency of occurrence of an item set:

    Here ({Milk, Bread, Biscuit}) =2.

    Association rule for implication expression of the form X->Y, where X and Y are
    any of the two item sets; for example:

    {Milk, Biscuits}->{Drinks}

    A frequent item set is an item set having support greater than or equal to the
    minimum threshold of the data. To better understand the strength of'
  merge: -1
