  md: '# Chapter 4: How Machine Learning is applied in the Real World


    # When Does Machine Learning Work?


    When faced with a problem that is suitable for the deployment of a computer system,
    the first thing that you should ask about the problem is whether or not it is
    rigid and unchanging, or is this something that requires an adaptive system?

    At first glance this seems like a simple question. For example, suppose that you
    were considering a ballistics program for the military. Ballistics follow the
    laws of physics. These are precisely known, and so it should be a simple matter
    to do calculations to get the accurate results that are desired. Hard coded computer
    programs can be used to predict how things will work in real situations. Indeed,
    as soon as Newton’s laws were known in the 17th and 18th centuries, armies were
    using people to do the calculations by hand, and this helped to revolutionize
    warfare and military efficiency. Today it’s done even better and faster using
    powerful computer technology.

    But a recent example shows that there is often more to any situation than meets
    the eye. Consider an EKG, which can give a doctor a picture of the performance
    of the heart. An EKG is used to diagnose a heart attack, arrythmias, and many
    other problems. It’s very narrowly focused, and patterns on the EKG are associated
    with specific conditions. Health professionals are trained to recognize those
    patterns, and they can study an EKG chart and determine which patients need medical
    intervention and which don’t. This is as straightforward as the ballistics problem.

    However, when artificially intelligent systems were developed using machine learning
    to study EKGs, it was found that they outperformed doctors by a significant margin.
    The machine learning systems that have been developed are able to predict which
    patients will die within a year with 85% accuracy. For comparison, doctors are
    able to make the same prediction with 65% to at most 80% accuracy.

    The key here is the difference. When there are EKGs that look completely normal
    to the human eye–the machine learning system is able to determine that in fact,
    they are not normal. The engineers that designed the system can’t explain it.
    They don’t know why or how the machine learning system'
  merge: -1
  pgno: 344
- img_proc: true
  md: 'makes its predictions. But the way it works, generally speaking, is that the
    machine learning system is able to detect patterns in the data that human minds
    cannot detect.

    This example serves to illustrate that adaptive learning can be used in nearly
    every situation. Even in ballistics, there may be many different factors that
    human engineers have not properly accounted for. Who knows what they are, it could
    be the humidity, wind, or other factors. The bet is that although line-by-line
    coded software works very well in deterministic situations, adaptive software
    that is not programmed and only trained with data will do better.


    # Complex and Adaptive


    When there is any situation where experience–that is exposure to more data–can
    improve performance, machine learning is definitely called for. If the data is
    complex, this is another situation where machine learning can shine. Think about
    how the human mind can handle mathematical problems. Even two-dimensional problems
    in calculus and differential equations are difficult for most people, and even
    the smartest people struggle while learning it for the first time. It gets even
    more difficult when you move to three dimensions, and the more complexity that
    is added, the harder it is for people to digest.

    If you are looking at a data set, you are going to be facing the same situation.
    If we have a small data set of 20 items, each with 3 fields and an output, a human
    operator might be able to extract a relationship between the inputs and outputs.
    They could even do linear regression by hand or plug it into a simple program
    like Microsoft Excel. Even simply eyeballing the data can reveal the relationships.

    But the more data you add to the problem, the less able a human operator is able
    to determine what the relationships are. The same problem with output but 20 inputs
    might make it very difficult. If there are no outputs, and you ask human operators
    to see if there are any patterns in the data, it might become virtually impossible.

    One way that we get around complexity in the real world is to program computers
    in the standard way. This helps humans get around many large data problems and
    solving problems that would involve tedious work. Consider weather prediction,
    early efforts at predicting the weather or'
