    ## 错误类型


    在 Python 编程中，可能会遇到 3 种主要类型的错误：


    - 语法错误。

    - 运行时错误。

    - 逻辑错误。


    ## 语法错误


    语法是为在计算机语言中正确编写而需要遵循的一组准则。语法错误是缺少标点字符、拼写错误的关键字或缺少闭合括号等错误。语法错误由编译器或解释器检测。如果你尝试执行包含语法错误的
    Python 程序，你将在屏幕上收到错误消息，并且程序将不会执行。你必须更正任何错误，然后再次尝试执行程序。通常这些类型的错误是由于拼写错误造成的。如果发生错误，Python
    解释器将停止运行。一些常见的语法错误原因包括：


    - 关键字书写错误

    - 运算符使用不当

    - 在函数调用中忘记括号

    - 未将字符串放在单引号或双引号中


    ## 运行时错误


    当代码的执行因无法执行的操作而停止时，就会发生这些错误。运行时错误可能导致程序突然结束，甚至导致系统关闭。此类错误可能是最难检测的错误。内存耗尽或除以零是运行时错误的例子。


    ## 逻辑错误


    当代码产生错误结果时，就会发生逻辑错误。例如，将温度从华氏度转换为摄氏度：


    ```

    print("20 degree Fahrenheit in degree Celsius is: ")

    print(5 / 9 * 20 - 32)

    ```


    结果：


    ```

    20 degree Fahrenheit in degree Celsius is:

    -20.88888888888889

    ```


    上面的代码输出 -20.88888888888889，这是错误的。正确的结果是 -6.666。这些类型的错误被称为逻辑错误。要获得正确的答案，需要正确使用括号
    5 / 9 * (20 - 32) 而不是 5 / 9 * 20 - 32。


    逻辑错误是阻止你的程序执行你期望它执行的操作的错误。对于逻辑错误，你根本不会收到任何警告。你的代码编译并运行，但结果不是预期的。你必须彻底检查你的程序以找出错误所在。Python
    程序正常执行。是程序员必须找到并更正错误编写的 Python 语句，而不是计算机或解释器。计算机毕竟没那么聪明。


