    聚类、压缩、密度估计和数据缩减<br>- K均值聚类（聚类）<br>- 关联规则（模式检测）<br>- 奇异值分解<br>- 模糊均值<br>- 偏最小二乘法<br>-
    层次聚类<br>- 主成分分析 |


    表格：监督学习与无监督学习


    现在让我们看看机器学习应用的一些示例。通过示例来确定必须使用哪种类型的机器学习模型总是一个好主意。以下几点将在下一节中解释：


