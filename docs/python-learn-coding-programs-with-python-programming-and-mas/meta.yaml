  md: '# Chapter 6: Data Science and Cloud


    Data science is a mixture of many concepts. To become a data scientist, it is
    important to have some programming skills. Even though you might not know all
    the programming concepts related to infrastructure but having basic skills in
    computer science concepts is a must. With the ever-expanding advanced analytics,
    Data Science continues to spread its wings in different directions. This requires
    collaborative solutions like predictive analysis and recommendation systems. Collaboration
    solutions include research and notebook tools integrated with code source control.
    Data science is also related to the cloud. The information is also stored in the
    cloud. So, this lesson will enlighten you with some facts about the "data in the
    Cloud." So let us understand what cloud means and how the data is stored and how
    it works.


    # What is the Cloud?


    Cloud can be described as a global server network, each having different unique
    functions. Understanding networks is required to study the cloud. Networks can
    be simple or complex clusters of information or data.


    # Network


    Networks can have a simple or small group of computers connected or large groups
    of computers connected. The largest network is the Internet. The small groups
    can be home local networks like Wi-Fi, and Local Area Network that is limited
    to certain computers or locality. There are shared networks such as media, web
    pages, app servers, data storage, and printers, and scanners. Networks have nodes,
    where a computer is referred to as a node. The communication between these computers
    is established by using protocols. Protocols are the intermediary rules set for
    a computer. Protocols like HTTP, TCP, and IP are used on a large scale. All the
    information is stored in the computer, but it becomes difficult to search for
    information on the computer every time. Such information is usually stored in
    a data Centre. Data Centre is designed in such a way that it is equipped with
    support security and protection for the data. Since the cost of computers and
    storage has decreased substantially, multiple organizations opt to make use of
    multiple computers that work together that one wants to scale. This differs from
    other scaling solutions like buying other computing devices.'
  merge: -1
  pgno: 307
- img_proc: true
  md: 'The intent behind this is to keep the work going continuously even if a computer
    fails; the other will continue the operation. There is a need to scale some cloud
