    # Features of Python


    # Python is Easy


    Python is an easy language to get started with. The ease of use is underscored
    by the fact that most of the programs written in python look similar to the English
    language. Therefore, this simplicity makes python an ideal learning language for
    entry-level programming courses, and thus introducing programming concepts to
    students.


    # Python is Portable/Platform Independent


    Python is massively portable, which means that Python programs can be run in various
    different operating systems without needed specific or extensive changes.


    # Python is an Interpreted Language


    Mainly, Python is an interpreted language as opposed to being a compiled language
    on the other hand, C, C++ are examples of complied languages. In many cases, the
    programs composed in a high-level language are typically referred to as source
    code or source programs. As a result, the commands in the source codes are referred
    to as statements. A computer lacks the capacity to execute a program written in
    high-level language. Typically, computers understand machine language, which comprises
    of 1s and 0s only. As a result, there are two types of program available to users
    when translating high-level languages to machine languages: compiler and interpreter.'
