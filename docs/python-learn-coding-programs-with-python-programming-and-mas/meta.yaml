- md: "## Unpacking\n\nSince we just discussed tuples, it is essential to know about\
    \ a feature that has further simplified the use of tuples for us. Unpacking is\
    \ of great help and is quite useful, too. Suppose you have a few values stored\
    \ in a tuple and you wish to assign each one of them to another variable individually.\
    \ There are two ways you can do that. Let us look at the first way of doing so\
    \ and then we will look at the use of unpacking for comparison.\n\nFirst method:\n\
    \n```\nages = (25, 30, 35, 40)\nDrake = ages[0]\nEmma = ages[1]\nSully = ages[2]\n\
    ```\n\nIf you print these values now, you will see the ages accordingly. This\
    \ means that the values stored within these individual variables were successfully\
    \ taken from the tuple as we wanted. However, this was a little longer. What if\
