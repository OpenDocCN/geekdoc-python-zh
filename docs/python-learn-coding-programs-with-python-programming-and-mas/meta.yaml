    ## Types of Errors


    In programming in Python 3 main types of errors can be encountered:


    - Syntax Errors.

    - Runtime Errors.

    - Logical Errors.


    ## Syntax Errors


    The syntax is a set of guidelines that needs to be followed in order to write
    correctly in a computer language. A syntax error is a missing punctuation character,
    a mistake such as a misspelled keyword, or a missing closing bracket. The syntax
    errors are detected by the compiler or the interpreter. If you try to execute
    a Python program that contains a syntax error, you will get an error message on
    your screen and the program won''t execute. You must correct any errors and then
    try to execute the program again. Usually these types of errors are due to typos.
    In case an error occurs the Python interpreter stops running. Some common causes
    of syntax errors are due to:


    - Wrongly written keywords

    - Wrong use of an operator

    - Forgetting parentheses in a function call

    - Not putting strings in single quotes or double quotes


    ## Runtime Errors


    These errors occur when the execution of the code is stopped because of an operation
    being impossible to be carried out. A runtime error can cause a program to end
    abruptly or even cause system shut-down. Such errors can be the most difficult
    errors to detect. Running out of memory or a division by zero are examples of
    runtime errors.


    ## Logical Errors


    Logical errors happen when the code produces wrong results. For instance a temperature
    conversion from Fahrenheit to Celsius:


    ```

    print("20 degree Fahrenheit in degree Celsius is: ")

    print(5 / 9 * 20 - 32)

    ```


    Result:


    ```

    20 degree Fahrenheit in degree Celsius is:

    -20.88888888888889

    ```


    The above code outputs -20.88888888888889, that is erroneous. The right result
    is -6.666. These types of errors are referred as logical errors. To get the correct
    answer parentheses needs to be used correctly 5 / 9 * (20 - 32) instead of 5 /
    9 * 20 - 32.


    A logic error is an error that prevents your program from doing what you expected
    it to do. With logic errors you get no warning at all. Your code compiles and
    runs but the result is not the expected one. You must review your program thoroughly
    to find out where your error is. Python program executes as normal. It is the
    programmer who has to find and correct the erroneously written Python statement,
    not the computer or the interpreter. Computers are not that smart after all.


