    # # Chapter 3: Machine Learning Types


    # ## Unsupervised Learning


    Unsupervised learning models are further classified into association and clustering
    problems. Traditional data sets in machine learning worked through labels and
    followed the logic of “x leads to y.” In the case of unsupervised learning models,
    there are no outcomes and the model just analyzes through the inputs. No training
    is given to the machines and therefore they are programmed to find the unknown
    structure in unlabeled data on their own. Unsupervised learning is also known
    as the training of an artificial intelligence algorithm which is neither classified
    nor labeled. This allows the algorithm to act on the information without guidance.


    Artificial intelligence systems are capable of handling unsupervised learning
    models for which they generally use a retrieval-based approach. They also have
    the capability to perform more complex processing tasks when compared to the supervised
    learning systems. Major applications of unsupervised learning models are self-driving
    cars, chatbots, expert systems and facial recognition programs.


    # ## Clustering and Association


    # ### Clustering


    Clustering problems occur when we must discover the inherent groupings in data.
    In the association rule learning problem, we are required to discover rules that
    describe large proportions of data. Clustering is one of the major types of unsupervised
    machine learning algorithms as it runs through the given data and finds any natural
    clusters if they exist. For example, there could be different groups of users
    that are differentiated across a few criteria. For example, the criteria can be
    age, gender or height.


    Major types of clustering are defined as follows:


    +   - Probabilistic clustering: This involves clustering data points into clusters
    on a specific probabilistic scale.

    - K-means clustering: K-means clustering involves the clustering of data points
    into a number (k) of mutually exclusive clusters whereas the method is more focused
    on selecting the right number for K.'
  - '[PAGE 337]


    +   > Hierarchical clustering: Hierarchical clustering classifies data points
    into parent and child clusters.

    > Gaussian mixture models: These are the models featuring a mixture of multivariate
    normal density components.

    > Hidden Markov models: Used to observe data and recover the sequence of states
    in the model.

    > Self-organizing maps: Self-organizing maps use neural networks that learn the
    distribution and topology of the data.


    # Generative Models


    Generative models are a major part of unsupervised learning models. They create
    new samples from the same distribution of the given training data. Generally,
    these models are designed to learn and discover the essence of the given data
    for generating similar data. Image data set is an example of generative models
    and has the capability to create a set of images like the given set. Generative
    models are purely based on the characteristics of unsupervised machine learning
    models.


    # Data Compression


    Data compression is the process for keeping data sets as small and efficient as
    possible. Unsupervised learning methods support data compression and perform the
    task through the dimensionality reduction process. The dimensionality reduction
    approach assumes that the given data is redundant and utilizes the same concepts
    as the information theory. Also known as the number of columns in a data set,
    dimensionality reduction can be used to represent information in a data set with
    only a specific size of the actual content.

    Singular value decomposition (SVD) and principal component analysis (PCA) are
    the main approaches for data compression. PCA is used to find linear combinations
    that communicate variance in data whereas the SVD model factorizes data into the
    product of three other, smaller matrices.

    For generating new samples from the same distribution, generative models are used,
    and they are a major part of the unsupervised machine learning approach as well.
    The model also has the power to automatically learn the features of given data
    and implement them into the produced data.'
  - '[PAGE 338]


    # Association


    Association is a rule-based machine learning method that is used to discover relations
    between databases. In large sets of data items, we can find interesting associations
    such as dependencies and relationships through association rules. In data sets,
    items are generally stored in the form of transactions which can be generated
    or extracted through external processes and relational databases. Unsupervised
    machine learning delivers full scalability to association rules algorithms which
    in return help in accumulating the ever-growing size of data. Furthermore, the
    evaluation and discovery of interesting associations make is easier for companies
    and industries to handle big data.


    # What Is An Association Rule?


    An association rule is comprised of a consequent and an antecedent as both of
    them are list items. The item set is the list for all items in the consequent
    and antecedent. A typical example of an association rule is market-based analysis,
    explained as follows:


    | TID | ITEMS |

    |---|---|

    | 1 | Bread, Milk |

    | 2 | Bread, Biscuits, Drink, Eggs |

    | 3 | Milk, Biscuits, Drink, Coke |

    | 4 | Bread, Milk, Biscuits, Drink |

    | 5 | Bread, Milk, Drink, Coke |


    Basic definitions:

    Support count for frequency of occurrence of an item set:

    Here ({Milk, Bread, Biscuit}) =2.

    Association rule for implication expression of the form X->Y, where X and Y are
    any of the two item sets; for example:

    {Milk, Biscuits}->{Drinks}

    A frequent item set is an item set having support greater than or equal to the
    minimum threshold of the data. To better understand the strength of'
  - '[PAGE 339]


    association between the item set s, we can make use of the following metrics:


    +   - Support: The support measure gives an idea of how frequently an item set
    occurs in all transactions. Taking the example of itemset1 = {Milk} and itemset2
    = {Drinks}, there will be more transactions containing milk as compared to those
    containing drinks. This means that itemset1 has a higher support than itemset2.


    In order to calculate the total number of transactions in which the item set occurs,
    we can make our calculation through the following mathematical equation:


    $$Support(\{X\} \rightarrow \{Y\}) = \frac{Transactions\ containing\ both\ X\
    and\ Y}{Total\ number\ of\ transactions}$$


    +   - Confidence: In unsupervised machine learning, a confidence measure is used
    to define the likeliness of occurrence of consequent. Given that the cart has
    antecedents already, a confidence measure could be implemented on all transactions
    of an item set. For example, of all the transactions containing {James}, how many
    had {Drink} on them? We can determine by common knowledge that {James} -> {Drink}
    should be a high confidence rule. Equation to calculate confidence mathematically
    is defined as follows:


    $$Confidence(\{X\} \rightarrow \{Y\}) = \frac{Transactions\ containing\ both\
    X\ and\ Y}{Transactions\ containing\ X}$$


    It does not matter what type of item set is present in the antecedent in the case
    of a frequent consequent because the confidence for an association rule that has
    a very frequent consequent will be high.


    +   - Lift: In cases where {X} leads to {Y} in the cart, remember that the value
    of lift will always be greater than 1. The mathematical equation to represent
    Lift approach is defined as follows:'
  - '[PAGE 340]


    $Lift(\{X\} \rightarrow \{Y\}) = \frac{(Transactions\ containing\ both\ X\ and\
    Y)/(Transactions\ containing\ X)}{Fraction\ of\ transactions\ containing\ Y}$


    # How Does An Association Rule Work?


    In machine learning and data mining, association rules are used to represent the
    probability of relationships for data items in large data sets. Actually, they
    are if-then statements that are implemented in various models to discover sales
    correlations in transactional data.

    At the basic level, association rule mining involves the use of data patterns
    and co-occurrence. Machine learning models are used to identify frequent if-then
    associations which are also known as association rules.

    Popular machine learning algorithms that are associated with association rules
    are SETM, AIS and A Priori. With the help of the AIS algorithm, the model can
    generate and count item set s as it scans data. This also helps the algorithm
    in determining which large item set s contained a transaction and how new candidate
    items are created by entering large item set s along with other items in the transaction
    data. Moreover, SETM algorithm is yet another way to generate candidate item set
    s while the model scans a database.

    SETM algorithm is accountable to item set s at the end of scan because new candidate
    item set s is generated in the same way as the AIS algorithm. Along with this
    operation, transaction ID of the generated transaction is saved along with the
    candidate item set for a sequential structure. An a priori algorithm allows candidate
    item set s to generate only with the support of large item set s from the previous
    pass. Large item set s of the previous pass can be joined to generate specific
    item set s of a larger size.

    Association rules are a powerful source in data mining because they are used for
    predicting customer behaviors and analyzing customer analytics, product clustering,
    store layout and market-based analysis. Generally, programmers make use of association
    rules to build programs that are capable of handling machine learning. Association
    rule mining actually searches for frequent items in the data set and is used to
    generate interesting associations and correlations between item set s on both
    relational and transactional databases.


