  md: '# Chapter 2: The 7 Steps of Machine Learning Process


    The models that are based on labeled training data sets are termed as supervised
    Machine Learning models. When children go to school, their teachers and professors
    give them some feedback about their progress. In the same way, a supervised Machine
    Learning model allows the engineer to provide some feedback to the machine.

    Let us take an example of an input [red, round]. Here, both the child and machine
    will understand that any object which is round and red is an apple. Let us now
    place a cricket ball in front of either the machine or the child. You can feed
    the machine with the response negative 1 or 0 depending on whether the prediction
    is wrong or right. You can always add more attributes if necessary. This is the
    only way that a machine will learn. It is also for this reason that if you use
    a large-high-quality data set and spend more time training the machine, the machine
    will give you better and more accurate results.

    Before we proceed further, you must understand the difference between the concepts
    of Machine Learning, artificial intelligence, and deep learning. Most people use
    these concepts interchangeably, but it is important to know that they are not
    the same.


    # Machine Learning, Artificial Intelligence and Deep Learning


    The diagram below will give you an idea of how these terms relate.


    ![](img/eca0e55982f15b47b8758e8428ee4d3b_329_0.png)


    An illustration to understand the relationship between Machine Learning, Artificial
    Intelligence, and Deep Learning


    Artificial intelligence is a technique that is used to make machines mimic any
    human behavior. The aim is to ensure that a machine can accurately and efficiently
    mimic any human behavior. Some examples of artificial intelligence machines include
    deep blue chess and IBM''s Watson.


    Machine Learning, as defined above, is the use of statistical and mathematical
    models to help machines learned mimic human behavior. This is done using past
    data.


    Deep learning is a subset of Machine Learning, and it refers to some of the functions
    and algorithms that an engineer uses to help a machine to train itself. The machine
    can learn to take'
  merge: -1
  pgno: 329
- img_proc: true
  md: 'the correct option to derive an output. Neural networks and natural language
    processing are a part of the deep learning ecosystem.


    # Typical Objectives of Machine Learning System


    The systems of Machine Learning usually are set up with one of the following objectives:


    +   - Predict a category

    - Predict a quantity

    - Anomaly Detector Systems

    - Clustering Systems


    # Predict a category


    The model of Machine Learning helps analyze the input data and then predicts a
    category under which the output will fall. The prediction in such cases is usually
    a binary answer that’s based on “yes” or “no”. For instance, it helps with answers
    like, “will it rain today or not?” “is this a fruit?” “is this mail spam or not?”
    and so on. This is attained by referencing a group of data that will indicate
    whether a certain email falls under the category of spam or not based on specific
    keywords. This process is known as classification.


    # Predict a quantity


    This system is usually used to predict a value like predicting the rainfall according
    to different attributes of the weather like the temperature, percentage of humidity,
    air pressure and so on. This sort of prediction is referred to as regression.
    The regression algorithm has various subdivisions like linear regression, multiple
    regression, etc.


    # Anomaly Detector Systems


    The purpose of a model in anomaly detection is to detect any outliers in the given
    set of data. These applications are used in banking and e-commerce systems wherein
    the system is built to flag any unusual transactions. All this helps detect fraudulent
    transactions.


    # Clustering Systems


    These forms of systems are still in the initial stages but their applications
    are numerous and can drastically change the way business is conducted. In this
    system, the user is classified into different clusters according to various behavioral
    factors like their age group, the region they live in or even the kind of programs
    they like to view. According to this clustering, the business can now suggest
    different programs or shows a user might be interested in watching according to
    the cluster that the said user belongs to during classification.


    # Main Categories of Machine Learning Systems


    In the case of traditional machines, the programmer will give the machine a set
    of instructions and the input parameters, which the machine will use to compute
    make some calculations and derive an output using specific commands. In the case
    of Machine Learning systems, however, the system is never restricted by any command
    that the engineer provides, the machine will choose the algorithm that it can
    be used to process the data set and decide the output with high accuracy. It does
    this, by using the training data set which consists of historical data and output.
    Therefore, in the classical world, we will tell the machine to process data based
    on a set of instructions, while in the Machine Learning word we will never instruct
    a system. The computer will have to interact with the data set, develop an algorithm
    using the historical data set, make decisions like a human being would, analyze
    the information and then provide an output. The'
  merge: -1
  pgno: 330
- img_proc: true
  md: 'machine, unlike a human being, can process large data sets in short periods
    and provide results with high accuracy.

    There are different types of Machine Learning algorithms, and they are classified
    based on the purpose of that algorithm. There are three categories in Machine
    Learning systems:


    +   - Supervised Learning

    - Unsupervised Learning

    - Reinforcment Learning


    # Supervised Learning


    In this model, the engineers feed the machine with labeled data. In other words,
    the engineer will determine what the output of the system or specific data sets
    should be. This type of algorithm is also called a predictive algorithm.

    For example, consider the following table:


    | Currency (label) | Weight (Feature) |

    | :--- | :--- |

    | 1 USD | 10 gm |

    | 1 EUR | 5 gm |

    | 1 INR | 3 gm |

    | 1 RU | 7 gm |


    In the above table, each currency is given an attribute of weight. Here, the currency
    is the label, and the weight is the attribute or feature.

    The supervised Machine Learning system with first we fed with this training data
    set, and when it comes across any input of 3 grams, it will predict that the coin
    is a 1 INR coin. The same can be said for a 10-gram coin.

    Classification and regression algorithms are a type of supervised Machine Learning
    algorithms. Regression algorithms are used to predict match scores or house prices,
    while classification algorithms identify which category the data should belong
    to.

    We will discuss some of these algorithms in detail in the later parts of the book,
    where you will also learn how to build or implement these algorithms using Python.


    # Unsupervised Learning


    In this type of model, the system is more sophisticated in the sense that it will
    learn to identify patterns in unlabeled data and produce an output. This is a
    kind of algorithm that is used to draw any meaningful inference from large data
    sets. This model is also called the descriptive model since it uses data and summarizes
    that data to generate a description of the data sets. This model is often used
