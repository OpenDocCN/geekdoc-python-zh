    \ method we had used earlier in strings.\n\n```\nprint(family[0])\nSmith\n```\n\
    \nInstead of showing ‘S’, the complete name was shown. Similarly, if you use the\
    \ other functions such as the len() function, it would provide you with the length\
    \ of the list. In this case, it would should you that there are four items in\
    \ this list. Let us try that out for ourselves.\n\n```\nprint(len(family))\n4\n\
    ```\n\nYou can use the [x:y] where x and y are ranges you can set. This can be\
    \ helpful if the list you are working on contains hundreds of entries. You can\
    \ only filter out the ones you would like to view. You can jump straight to the\
