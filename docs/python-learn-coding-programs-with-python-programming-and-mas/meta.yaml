    laws of physics and inputs believed to be important by the operator.

    However, when there is a large amount of complexity in a problem, such as predicting
    the weather, this is a signal that machine learning is probably going to outperform
    any method by a wide margin. Think about climate modeling. Using conventional
    techniques, the scientists and programmers are going to make estimates of what
    factors (such as carbon dioxide level) are important.

    But using machine learning, simply training the system on raw data, the system
    would probably detect patterns in the data that human observers don’t even know
    are there, and it would probably build an even more accurate system that would
    be better at making future predictions.

    To summarize, when you have a problem that is adaptive and complex then it is
    well suited for machine learning. But there is a third component, and this is
    big data.


    ## The Role of Big Data


    Over the past two or three decades, there has been a quiet revolution in computing
    power that went unnoticed at first. Developments in technology made it possible
    to develop more storage capacity, and the costs of this storage capacity have
    continually dropped. This phenomenon combined with the internet to make it easy
    for organizations that are large and small to collect enormous amounts of information
    and store it. The concept of big data was born.

    Big data is of course large amounts of data. However, experts characterize big
    data in four ways.

    Simply having a static set of large amounts of data is not useful unless you can
    quickly access it. Big data is characterized by the “four V’s”.


    - Volume: Huge amounts of data are being created and stored by computer systems
    throughout the world.

    - Velocity: The speed of data movement continues to increase. Speed of data means
    that computer systems can gather and analyze larger amounts of data more quickly.

    - Variety: Big data is also characterized by collection methods from different
    sources. For example, a consumer profile can include data from a person’s behavior
    while online, but it will also include mobile data from their smart phone, and
    data from wearable technology like smart watches.

    - Veracity: The truthfulness of the data is important. Do business leaders trust
    the data they are using? If the data is erroneous, it’s not going to be useful.


    The key to focus on here is that big data plays a central role in machine learning.
    In fact, without adequate amounts of accurate (truthful) data that can be accessed
    quickly, machine learning wouldn’t work. The basic fundamentals of machine learning
    were developed decades ago, but it really wasn’t until we moved into the 21st
    century that the ability to collect and move data around caught up to what was
    known about machine learning. The arrival of big data is what turned machine learning
    from an academic curiosity into something real that could be deployed in the real
    world to get real results.


    ## Where Does Machine Learning Fit In?


    Now that we understand the relationship of machine learning to big data, let’s
    see where machine learning fits in with other concepts in computer science. We
    begin with artificial intelligence. Artificial intelligence is the overarching
    concept that entails computer systems that can learn and get better with experience.
    Artificial intelligence can be characterized by the following general characteristics:


    - The ability to learn from data.

    - The ability to get better from experience.

    - The ability to reason.

    - It is completely general, as the human brain. So, it can learn anything and
    can learn multiple tasks.


    Machine learning is a subset of artificial intelligence. Rather than being completely
    general and engaging in humanlike reasoning, machine learning is focused on a
    specific task. There are four major areas of machine learning, and within each
    of these there are specialties:


    - Supervised learning–good for predictions of future outputs.

    - Unsupervised learning–good for classifying objects.

    - Reinforcement learning–a type of learning that encourages ideal behavior by
    giving rewards.

    - Deep learning–A computer system that attempts to mimic the human brain using
    a neural network. It can be trained to perform a specific task.


    ## Some Applications of Machine Learning


    We have touched on a few ways that machine learning is used in the real world.
    To get a better feel for machine learning and how it’s applied, let’s go through
    some of the most impactful ways that it is being used.


    ### Crimes and Criminal Activity


    When you think about machine learning, think patterns. One very practical use
    of machine learning is exposing a system to past data from criminal activity.

    This data can contain many different fields or features. They could include:


    - Type of crime committed.

    - Location of the crime.

    - Time of day.

    - Information about the perpetrator or perpetrators.

    - Information about the victim.

    - Weapons used.

    - Day of the week and day of the month.

    - Year when the crime occurred.


    By studying the data and looking for hidden patterns, a machine learning system
    can be built to predict the incidents of future crimes. This doesn’t mean that
    it is going to be able to predict a specific crime “there will be a robbery at
    615 main street at 6 PM”, but rather it will predict overall patterns of criminal
    activity. This activity might vary in ways that even experienced law enforcement
    officers are unable to predict–reflect back on the EKG example.

    How can this help in the real world? It can help law enforcement agencies deploy
    resources in a more efficient manner. Even if they don’t understand why a given
    system is making the predictions it’s making, they can benefit by moving more
    law enforcement resources into areas that the system is telling them are going
    to experience more criminal activity, on the days and at the times when those
    resources are needed the most. This can help police and emergency personnel respond
    to crimes more rapidly, and it can also help deter crime with a greater police
    presence.


    ### Hospital Staffing


    Hospital staffing suffers from a similar problem. Human managers attempt to guess
    when most doctors and nurses are needed and where they should be deployed. While
    these estimates are reasonably accurate, improvements can be made by deploying
    a system that uses machine learning. Again, think back to the EKG example–a doctor
    is pretty good, giving results with 65-80% accuracy. But the machine learning
    system is even better with 85%, picking out situations the doctors miss. That
    kind of difference can be a large matter of life or death when it comes to efficiently
    allocate staff in a large hospital.

    To put together systems of this type, large medical organizations tracked the
    locations and movements of nurses. This allowed them to provide input data to
    the system, which was able to identify areas of waste. As a simple example, it
    might have discovered that a large number of nurses were idle on the 7th floor,
    while there were not enough nurses in a different ward of the hospital, and so
    patients there were not getting needed attention, and some may have died as a
    result.


