    You will not be able to combine a string of characters with numbers and will trigger
    an error instead, as shown in the example below:


    ```

    A = yellow

    B = 30

    print(A + B)

    ```

    OUTPUT – N/A – ERROR


    # Chapter 4: Python Data Structures Essentials


    ## Python Data Structures – Lists, Tuples, Sets, Dictionaries


    Data structure is a way to organize and store data where we can access and modify
    it efficiently.

    Let’s begin with our first Python Data Structures and lists.


    ## Python List


    In Python, lists are collections of data types that can be changed, organized,
    and include duplicate values. Lists are written within square brackets, as shown
    in the syntax below.


    ```

    X = ["string001", "string002", "string003"]

    print(X)

    ```


    The same concept of position applies to Lists as the string data type, which dictates
    that the first string is considered to be at position 0. Subsequently, the strings
    that will follow are given positions 1, 2, and so on. You can selectively display
    desired string from a List by referencing the position of that string inside square
    bracket in the print command, as shown below.


    ```

    X = ["string001", "string002", "string003"]

    print(X[2])

    ```

    OUTPUT – [string003]


    Similarly, the concept of negative indexing is also applied to Python List. Let’s
    look at the example below:


    ```

    X = ["string001", "string002", "string003"]

    print(X[-2])

    ```

    OUTPUT – [string002]


    You will also be able to specify a range of indexes by indicating the start and
    end of a range. The result in values of such command on a Python List would be
    a new List containing only the indicated items. Here is an example for your reference.


    ```

    X = ["string001", "string002", "string003", "string004", "string005", "string006"]

    print(X[2 : 4])

    ```

    OUTPUT – ["string003", "string004"]


    * Remember the first item is at position 0, and the final position of the range
    (4) is not included.


    Now, if you do not indicate the start of this range, it will default to the position
    0 as shown in the example below:


    ```

    X = ["string001", "string002", "string003", "string004", "string005", "string006"]

    print(X[: 3])

    ```

    OUTPUT – ["string001", "string002", "string003"]


    Similarly, if you do not indicate the end of this range it will display all the
    items of the List from the indicated start range to the end of the List, as shown
    in the example below:


    ```

    X = ["string001", "string002", "string003", "string004", "string005", "string006"]

    print(X[3 : ])

    ```

    OUTPUT – ["string004", "string005", "string006"]


    You can also specify a range of negative indexes to Python Lists, as shown in
    the example below:


    ```

    X = ["string001", "string002", "string003", "string004", "string005", "string006"]

    print(X[-3 : -1])

    ```

    OUTPUT – ["string004", "string005"]


    * Remember the last item is at position -1, and the final position of this range
    (-1) is not included in the Output.


    ### How to Declare Python List?


    Just input:


    ```

    >>> languages=[''C++'',''Python'',''Scratch'']

    ```

    You can put any kind of value in a list.


    ```

    >>> list1=[1,[2,3],(4,5),False,''No'']

    ```


    ### How to Access Python List?


    Here’s what you need to do to access an entire list, just type its name in the
    shell.


    ```

    >>> list1

    [1, [2, 3], (4, 5), False, ''No'']

    ```


    ### Slicing


    If you would like to view a range of characters, you can do so by specifying the
    start and the end index of the desired positions and separating the indexes by
    a colon. For example, to view characters of a string from position 2 to position
    5, your code will be "print(variable[2:5])."

    You can even view the characters starting from the end of the string by using
    "negative indexes" and start slicing the string from the end of the string. For
    example, to view characters of a string from position 3 to position 1, your code
    will be "print(variable[-3: -2])."

    In order to view the length of the string, you can use the "len()" function. For
    example, to view the length of a string, your code will be "print(len(variable))"'
