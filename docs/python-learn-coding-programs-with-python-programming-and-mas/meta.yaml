    YouTube, Netflix, and Facebook that requires some scaling. We rarely experience
    such applications failing, as they have set up their systems on the cloud. There
    is a network cluster in the cloud, where many computers are connected to the same
    networks and accomplish similar tasks. You can call it as a single source of information
    or a single computer that manages everything to improve performance, scalability,
    and availability.


