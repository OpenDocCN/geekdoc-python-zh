    ```

    str = "The total price = " + 12

    ```


    The language (Python) would occasion an error because it does not have the capacity
    to convert the umber 12 into a string.


    In synthesis Python is a strongly typed language i.e. the type of variables must
    be known. This implies that the type of a value doesn''t change in unexpected
    ways. For example a string containing only number doesn''t automatically change
    into a number, as may happen in Perl. In Python, every data type change needs
    an explicit conversion.


