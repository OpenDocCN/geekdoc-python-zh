    ## Chapter 5: Numbers in Python


    We have briefly looked at numbers in the Data Types chapter. In this chapter we
    will go into greater detail on how to use and manipulate numbers in Python. Before
    we go any further, let’s have a brief refresher on the different types of numbers
    available in Python.


    - Integer - These are whole numbers without fractions or decimals.

    - Floating Point - These are numbers that have fractional parts expressed with
    a decimal point.

    - Complex - These are complex numbers expressed by using a ‘J’ or ‘j’ suffix.


    Let’s look at a quick example of how these number data types can be used. This
    program shows how to use number data types in Python.


    ```

    # This program looks at number data types

    # An int data type

    a=123

    # A float data type

    b=2.23

    # A complex data type

    c=3.14J

    print(a)

    print(b)

    print(c)

    ```


    This program’s output will be as follows:


    ```

    123

    2.23

    3.14j

    ```


    There are a variety of functions available in Python to work with numbers. Let’s
    look at a summary of them, after which we will look at each in more detail along
    with a simple example.


    ## Number Functions


    | Function | Description |

    | --- | --- |

    | abs() | This returns the absolute value of a number |

    | ceil() | This returns the ceiling value of a number |

    | max() | This returns the largest value in a set of numbers |

    | min() | This returns the smallest value in a set of numbers |

    | pow(x,y) | This returns the power of x to y |

    | sqrt() | This returns the square root of a number |

    | random() | This returns a random value |

    | randrange(start,stop,step) | This returns a random value from a particular range
    |

    | sin(x) | This returns the sin value of a number |

    | cos(x) | This returns the cosine value of a number |

    | tan(x) | This returns the tangent value of a number |


    ## Abs Function


    This function is used to return the absolute value of a number. Let’s look at
    an example of this function.


    The following program showcases the abs function.


    ```

    # This program looks at number functions

    a=-1.23

    print(abs(a))

    ```


    This program’s output will be as follows:

    1.23


    ## Ceil Function


    This function is used to return the ceiling value of a number. Let’s look at an
    example of this function. Note that for this program we need to import the ‘math’
    module in order to use the ‘ceil’ function.

    Example 44: The following program showcases the ceil function.


    ```

    import math

    # This program looks at number functions

    a=1.23

    print(math.ceil(a))

    ```


    This program’s output will be as follows:

    2


    ## Max Function


    This function is used to return the largest value in a set of numbers. Let’s look
    at an example of this function.

    The program below is used to showcase the max function.


    ```

    # This program looks at number functions

    print(max(3,4,5))

    ```


    This program’s output will be as follows:

    5'
