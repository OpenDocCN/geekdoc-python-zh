    # How Does An Association Rule Work?


    In machine learning and data mining, association rules are used to represent the
    probability of relationships for data items in large data sets. Actually, they
    are if-then statements that are implemented in various models to discover sales
    correlations in transactional data.

    At the basic level, association rule mining involves the use of data patterns
    and co-occurrence. Machine learning models are used to identify frequent if-then
    associations which are also known as association rules.

    Popular machine learning algorithms that are associated with association rules
    are SETM, AIS and A Priori. With the help of the AIS algorithm, the model can
    generate and count item set s as it scans data. This also helps the algorithm
    in determining which large item set s contained a transaction and how new candidate
    items are created by entering large item set s along with other items in the transaction
    data. Moreover, SETM algorithm is yet another way to generate candidate item set
    s while the model scans a database.

    SETM algorithm is accountable to item set s at the end of scan because new candidate
    item set s is generated in the same way as the AIS algorithm. Along with this
    operation, transaction ID of the generated transaction is saved along with the
    candidate item set for a sequential structure. An a priori algorithm allows candidate
    item set s to generate only with the support of large item set s from the previous
    pass. Large item set s of the previous pass can be joined to generate specific
    item set s of a larger size.

    Association rules are a powerful source in data mining because they are used for
    predicting customer behaviors and analyzing customer analytics, product clustering,
    store layout and market-based analysis. Generally, programmers make use of association
    rules to build programs that are capable of handling machine learning. Association
    rule mining actually searches for frequent items in the data set and is used to
    generate interesting associations and correlations between item set s on both
    relational and transactional databases.


