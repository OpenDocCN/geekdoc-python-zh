    +   - Naive Bayes

    - Linear SVC

    - K-Neighbours Classifier


    The real beauty of the scikit-learn library is that it exposes high level APIs
    for different algorithms, making it easier for us to try out different algorithms
    and compare the accuracy of the models to see what works best for our data set.

    Let’s begin trying out the different algorithms one by one.


    # Naive-Bayes'
  merge: -1
