  md: '# Chapter 1: Lists in Python


    We have learned quite a lot ever since we started with this book. We have gone
    through operators, we learned about various data types, and we also looked at
    loops and statements. During all of this, we did mention the word ‘list’ and represented
    these with a square bracket instead of curly or round brackets. This chapter will
