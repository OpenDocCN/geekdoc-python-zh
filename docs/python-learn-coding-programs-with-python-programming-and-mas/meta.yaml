  md: '# Chapter 4: Introduction to Machine Learning Algorithms


    We will take a tour of the most popular machine learning. There are so many algorithms
    that it can feel overwhelming when algorithm names are thrown around and you are
    expected to just know what they are and where they fit.

    We want to give you two ways to think about and categorize the algorithms you
    may come across in the field.


    +   - The first is a grouping of algorithms by their **learning style**.

    - The second is a grouping of algorithms by their **similarity** in form or function
    (like grouping similar animals together).


    Both approaches are useful, but we will focus in on the grouping of algorithms
    by similarity and go on a tour of a variety of different algorithm types.


    # Algorithms Grouped by Learning Style


    There are different ways an algorithm can model a problem based on its interaction
    with the experience or environment or whatever we want to call the input data.


    It is popular in machine learning and artificial intelligence textbooks to first
    consider the learning styles that an algorithm can adopt.


    There are only a few main learning styles or learning models that an algorithm
    can have and we’ll go through them here with a few examples of algorithms and
    problem types that they suit.


    This taxonomy or way of organizing machine learning algorithms is useful because
    it forces you to think about the roles of the input data and the model preparation
    process and select one that is the most appropriate for your problem in order
    to get the best result.


    **Let’s take a look at three different learning styles in machine learning algorithms:**'
  merge: -1
  pgno: 275
- img_proc: true
  md: '# Supervised Learning


    Input data is called training data and has a known label or result such as spam/not-spam
    or a stock price at a time.


    A model is prepared through a training process in which it is required to make
    predictions and is corrected when those predictions are wrong. The training process
    continues until the model achieves a desired level of accuracy on the training
    data. Example problems are classification and regression. Example algorithms include:
    Logistic Regression and the Back Propagation Neural Network.


    # Usupervised Learning


    Input data is not labeled and does not have a known result. A model is prepared
    by deducing structures present in the input data. This may be to extract general
    rules. It may be through a mathematical process to systematically reduce redundancy,
    or it may be to organize data by similarity. Example problems are clustering,
    dimensionality reduction and association rule learning. Example algorithms include:
    the Apriori algorithm and K-Means.


    # Semi-Supervised Learning


    Input data is a mixture of labeled and unlabelled examples. There is a desired
    prediction problem but the model must learn the structures to organize the data
    as well as make predictions. Example problems are classification and regression.


    Example algorithms are extensions to other flexible methods that make assumptions
    about how to model the unlabeled data.


    # Overview of Machine Learning Algorithms


    When crunching data to model business decisions, you are most typically using
    supervised and unsupervised learning methods. A hot topic at the moment is semi-supervised
    learning methods in areas such as image classification where there are large datasets
    with very few labeled examples.


    # Algorithms Grouped By Similarity'
  merge: -1
  pgno: 276
- img_proc: true
  md: 'Algorithms are often grouped by similarity in terms of their function (how
    they work). For example, tree-based methods, and neural network inspired methods.

    I think this is the most useful way to group algorithms and it is the approach
    we will use here.

    This is a useful grouping method, but it is not perfect. There are still algorithms
    that could just as easily fit into multiple categories like Learning Vector Quantization
    that is both a neural network inspired method and an instance-based method. There
    are also categories that have the same name that describe the problem and the
    class of algorithm such as Regression and Clustering.

    We could handle these cases by listing algorithms twice or by selecting the group
    that subjectively is the “best” fit. In this section, we list many of the popular
    machine learning algorithms grouped the way we think is the most intuitive. The
    list is not exhaustive in either the groups or the algorithms, but I think it
    is representative and will be useful to you to get an idea of the lay of the land.


    # Regression Algorithms


    Regression is concerned with modeling the relationship between variables that
    is iteratively refined using a measure of error in the predictions made by the
    model.

    Regression methods are a workhorse of statistics and have been co-opted into statistical
    machine learning. This may be confusing because we can use regression to refer
    to the class of problem and the class of algorithm. Really, regression is a process.

    The most popular regression algorithms are:


    +   - Ordinary Least Squares Regression (OLSR)

    - Linear Regression

    - Logistic Regression

    - Stepwise Regression

    - Multivariate Adaptive Regression Splines (MARS)

    - Locally Estimated Scatterplot Smoothing (LOESS)


    # Instance-based Algorithms'
  merge: -1
  pgno: 277
- img_proc: true
  md: 'Instance-based learning model is a decision problem with instances or examples
    of training data that are deemed important or required to the model.

    Such methods typically build up a database of example data and compare new data
    to the database using a similarity measure in order to find the best match and
    make a prediction. For this reason, instance-based methods are also called winner-take-all
    methods and memory-based learning. Focus is put on the representation of the stored
    instances and similarity measures used between instances.

    The most popular instance-based algorithms are:


    +   - k-Nearest Neighbor (kNN)

    - Learning Vector Quantization (LVQ)

    - Self-Organizing Map (SOM)

    - Locally Weighted Learning (LWL)

    - Support Vector Machines (SVM)


    # Regularization Algorithms


    An extension made to another method (typically regression methods) that penalizes
    models based on their complexity, favoring simpler models that are also better
    at generalizing. They are popular, powerful and generally simple modifications
    made to other methods.

    The most popular regularization algorithms are:


    +   - Ridge Regression

    - Least Absolute Shrinkage and Selection Operator (LASSO)

    - Elastic Net

    - Least-Angle Regression (LARS)


    # Decision Tree Algorithms


    Decision tree methods construct a model of decisions made based on actual values
    of attributes in the data. Decisions fork in tree structures until a prediction
    decision is made for a given record. Decision trees are trained on data for classification
    and regression problems. Decision trees are often fast and accurate and a big
    favorite in machine learning.

    The most popular decision tree algorithms are:'
  merge: -1
  pgno: 278
- img_proc: true
  md: '+   - Classification and Regression Tree (CART)

    - Iterative Dichotomiser 3 (ID3)

    - C4.5 and C5.0 (different versions of a powerful approach)

    - Chi-squared Automatic Interaction Detection (CHAID)

    - Decision Stump

    - M5

    - Conditional Decision Trees


    # Bayesian Algorithms


    Bayesian methods are those that explicitly apply Bayes’ Theorem for problems such
    as classification and regression. The most popular Bayesian algorithms are:


    +   - Naive Bayes

    - Gaussian Naive Bayes

    - Multinomial Naive Bayes

    - Averaged One-Dependence Estimators (AODE)

    - Bayesian Belief Network (BBN)

    - Bayesian Network (BN)


    # Clustering Algorithms


    Clustering, like regression, describes the class of problem and the class of methods.

    Clustering methods are typically organized by the modeling approaches such as
    centroid-based and hierarchal. All methods are concerned with using the inherent
    structures in the data to best organize the data into groups of maximum commonality.

    The most popular clustering algorithms are:


    +   - k-Means

    - k-Medians

    - Expectation Maximisation (EM)

    - Hierarchical Clustering


    # Association Rule Learning Algorithms


    Association rule learning methods extract rules that best explain observed relationships
    between variables in data. These rules can discover important'
  merge: -1
  pgno: 279
- img_proc: true
  md: 'and commercially useful associations in large multidimensional datasets that
    can be exploited by an organization. The most popular association rule learning
    algorithms are:


    +   - Apriori algorithm

    - Eclat algorithm


    # Artificial Neural Network Algorithms


    Artificial Neural Networks are models that are inspired by the structure and/or
    function of biological neural networks. They are a class of pattern matching that
    are commonly used for regression and classification problems but are really an
    enormous subfield comprised of hundreds of algorithms and variations for all manner
    of problem types. We have separated out Deep Learning from neural networks because
    of the massive growth and popularity in the field. Here we are concerned with
    the more classical methods.

    The most popular artificial neural network algorithms are:


    +   - Perceptron

    - Multilayer Perceptrons (MLP)

    - Back-Propagation

    - Stochastic Gradient Descent

    - Hopfield Network

    - Radial Basis Function Network (RBFN)


    # Deep Learning Algorithms


    Deep Learning methods are a modern update to Artificial Neural Networks that exploit
    abundant cheap computation. They are concerned with building much larger and more
    complex neural networks and, as commented on above, many methods are concerned
    with very large datasets of labelled analog data, such as image, text. audio,
    and video. The most popular deep learning algorithms are:


    +   - Convolutional Neural Network (CNN)

    - Recurrent Neural Networks (RNNs)

    - Long Short-Term Memory Networks (LSTMs)

    - Stacked Auto-Encoders'
  merge: -1
  pgno: 280
- img_proc: true
  md: '+   - Deep Boltzmann Machine (DBM)

    - Deep Belief Networks (DBN)


    # Dimensionality Reduction Algorithms


    Like clustering methods, dimensionality reduction seek and exploit the inherent
    structure in the data, but in this case in an unsupervised manner or order to
    summarize or describe data using less information. This can be useful to visualize
    dimensional data or to simplify data which can then be used in a supervised learning
    method. Many of these methods can be adapted for use in classification and regression.


    +   - Principal Component Analysis (PCA)

    - Principal Component Regression (PCR)

    - Partial Least Squares Regression (PLSR)

    - Sammon Mapping

    - Multidimensional Scaling (MDS)

    - Projection Pursuit

    - Linear Discriminant Analysis (LDA)

    - Mixture Discriminant Analysis (MDA)

    - Quadratic Discriminant Analysis (QDA)

    - Flexible Discriminant Analysis (FDA)


    # Ensemble Algorithms


    Ensemble methods are models composed of multiple weaker models that are independently
