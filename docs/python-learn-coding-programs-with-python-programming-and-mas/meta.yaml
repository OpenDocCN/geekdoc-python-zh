  md: 'Up to now, we have examined the built-in types for dictionaries, lists, sets,
    and strings. These are often termed as ADTs or abstract data types and may be
    considered to be mathematical specifications for the operations that may be performed
    on the data. Their behavior is what defines them, not their implementation. Besides
    the ADTs we already looked at, there are a few Python libraries that include extensions
    for the built-in datatypes and we’ll be looking at these next.


    # Collections


    The module called collections contains alternatives for these data types, high-performance
    specialized alternatives, in addition to a utility function for the creation of
    named tuples. Below are the datatypes, the operations, and what they do:


    namedtuple()

    will create a tuple subclass with the given fields


    deque

    provides lists that have fast appends and that pop at either end


    ChainMap

    a class much like a dictionary that creates a single view showing multiple mappings


    Counter

    a dictionary subclass used for counting the hashable objects


    OrderedDict

    a dictionary subclass that will remember the order of entries


    defaultdict

    a dictionary subclass that will call a function that can supply the missing values


    +   - UserDict

    - UserList

    - UserString


