- md: '## Numeric Data type


    Python is able to recognize numbers rather well. The numbers are divided into
    two pairs:


    - Integer – A positive and/or negative whole numbers that are represented without
    any decimal points.

    - Float – A real number that has a decimal point representation.


    This means, if you were to use 100 and 100.00, one would be identified as an integer
    while the other will be deemed as a float. So why do we need to use two various
    number representations?


    If you are designing a program, suppose a small game that has a character’s life
    of 10, you might wish to keep the program in a way that whenever a said character
    takes a hit, his life reduces by one or two points. However, to make things a
    little more precise, you may need to use float numbers. Now, each hit might vary
    and may take 1.5, 2.1, or 1.8 points away from the life total. Using floats allows
    us to use greater precision, especially when calculations are on the cards. If
    you aren’t too troubled about the accuracy, or your programming involves whole
    numbers only, stick to integers.


    ## Booleans in Python


    Ah! The one with the funny name. Boolean (or bool) is a data type that can only
    operate on and return two values: True or False. Booleans are a vital part of
    any program, except the ones where you may never need them, such as our first
    program. These are what allow programs to take various paths if the result is
    true or false.


    Here’s a little example. Suppose you are traveling to a country you have never
    been to. There are two choices you are most likely to face. If it is cold, you
    will be packing your winter clothes. If it is warm, you will be packing clothes
    which are appropriate for warm weather. Simple, right? That is exactly how the
    Booleans work. We will look into the coding aspect of it as well. For now, just
    remember, when it comes to true and false, you are dealing with a bool value.


    ## List Python


    While this is slightly more advanced for someone at this stage of learning, the
    list is a data type that does what it sounds like. It lists objects, values, or
    stores data within square brackets ([]). Here’s what a list would look like:


    ```

    month = [''Jan'', ''Feb'', ''March'', ''And so on!'']

    month

    [''Jan'', ''Feb'', ''March'', ''And so on!'']

    ```


    We will be looking into this separately, where we will discuss lists, tuples,
    and dictionaries. We will look at this data type more in details ahead.


    ## Variables


    You have the passengers, but you do not have a mode of commuting; they will have
    nowhere to go. These passengers would just be folks standing around, waiting for
    some kind of transportation to pick them up. Similarly, data types cannot function
    alone. They need to be ‘stored’ in these vehicles. These special vehicles, or
    as we programmers refer to as containers, are called ‘variables,’ and they are
    the elements that perform the magic for us. Variables are specialized containers
    that store a specific value in them and can then be accessed, called, modified,
    or even removed when the need arises. Every variable that you may create will
    hold a specific type of data in them. You cannot add more than one type of data
    within a variable. In other programming languages, you will find that in order
    to create a variable, you need to use the keyword ‘var’ followed by an equals
    mark ‘=’ and then the value.


    In Python, it is a lot easier, as shown below:


    ```

    name = "John"

    age = 33

    weight = 131.50

    is_married = True

    ```


    In the above, we have created a variable named ‘name’ and given it a value of
    characters. If you recall strings, we have used double quotation marks to let
    the program know that this is a string. We then created a variable called age.
    Here, we simply wrote 33, which is an integer as there are no decimal figures
    following that. You do not need to use quotation marks here at all. Next, we created
    a variable ‘weight’ and assigned it a float value. Finally, we created a variable
    called ‘is_married’ and assigned it a ‘True’ bool value. If you were to change
    the ‘T’ to ‘t’, the system will not recognize it as a bool and will end up giving
    an error. Focus on how we used the naming convention for the last variable. We
    will be ensuring that our variables follow the same naming convention.


    You can even create blank variables if you feel like you may need these at a later
    point in time, or wish to initiate them at no value at the start of the application.
    For variables with numeric values, you can create a variable with a name of your
    choosing and assign it a value of zero. Alternatively, you can create an empty
    string as well by using opening and closing quotation marks only.


    ```

    empty_variable1 = 0

    empty_variable2 = ""

    ```


    You do not have to necessarily name them like this; you can come up with more
    meaningful names so that you and any other programmer who may read your code would
    understand. I have given them these names to ensure anyone can immediately understand
    their purpose. Now we have learned how to create variables, let’s learn how to
    call them. What’s the point of having these variables if we are never going to
    use them, right? Let’s create a new set of variables.


    Have a look here:


    ```

    name = "James"

    age = 43

    height_in_cm = 163

    occupation = "Programmer"

    ```


    I do encourage you to use your own values and play around with variables if you
    like.


    In order for us to call the name variable, we simply need to type the name of
    the variable. In order to print that to the console, we will do this:


    ```

    print(name)

    James

    ```


    The same goes for the age, the height variable, and occupation. But what if we
    wanted to print them together and not separately? Try running the code below and
    see what happens:


    ```

    print(name age height_in_cm occupation)

    SyntaxError: invalid syntax

    ```


    Surprised? Did you end up with this? Here is the reason why that happened. When
    you were using a single variable, the program knew what variable that was. The
    minute you added a second, a third, and a fourth variable, it tried to look for
    something that was written in that manner. Since there wasn’t any, it returned
    with an error that otherwise says: “Umm… Are you sure, Sir? I tried looking everywhere,
    but I couldn’t find this ‘name age height_in_cm occupation’ element anywhere.”
    All you need to do is add a comma to act as a separator like so:


    ```

    print(name, age, height_in_cm, occupation)

    James 43 163 Programmer

    ```


    And now, it knew what we were talking about. The system recalled these variables
    and was successfully able to show us what their values were. But what happens
    if you try to add two strings together? What if you wish to merge two separate
    strings and create a third-string as a result?


    ```

    first_name = "John"

    last_name = "Wick"

    ```


    To join these two strings into one, we can use the ‘+’ sign. The resulting string
    will now be called a String Object, and since this is Python we are dealing with,
    everything within this language is considered as an object, thus the Object-Oriented
    Programming nature.


    ```

    first_name = "John"

    last_name = "Wick"

    first_name + last_name

    ```


    Here, we did not ask the program to print the two strings. If you wish to print
    these two instead, simply add the print function and type in the string variables
    with a + sign in the middle within parentheses. Sounds good, but the result will
    not be quite what you expect:


    ```

    first_name = "John"

    last_name = "Wick"

    print(first_name + last_name)

    JohnWick

    ```


    Hmm. Why do you think that happened? Certainly, we did use a space between the
    two variables. The problem is that the two strings have combined together, quite
    literally here, and we did not provide a white space (blank space) after John
    or before Wick; it will not include that. Even the white space can be a part of
    a string.


    To test it out, add one character of space within the first line of code by tapping
    on the friendly spacebar after John. Now try running the same command again, and
    you should see “John Wick” as your result. The process of merging two strings
    is called concatenation. While you can concatenate as many strings as you like,
    you cannot concatenate a string and an integer together.


    If you really need to do that, you will need to use another technique to convert
    the integer into a string first and then concatenate the same. To convert an integer,
    we use the str() function.


    ```

    text1 = "Zero is equal to"

    text2 = 0

    print(text1 + str(text2))

    Zero is equal to 0

    ```


    Python reads the codes in a line-by-line method. First, it will read the first
    line, then the second, then third, and so on. This means we can do a few things
    beforehand as well, to save some time for ourselves.


    ```

    text1 = "Zero is still equal to "

    text2 = str(0)

    ```'
  mdcn: '## 数值数据类型


    Python 能够很好地识别数字。数字分为两类：


    - 整数 – 不带任何小数点的正数和/或负数。

    - 浮点数 – 带有小数点表示的实数。


    这意味着，如果你使用 100 和 100.00，一个会被识别为整数，而另一个则被视为浮点数。那么，为什么我们需要使用两种不同的数字表示方式呢？


    如果你正在设计一个程序，假设一个小游戏，其中角色的生命值为 10，你可能希望程序在角色每次受到攻击时，生命值减少一两点。然而，为了使事情更精确一些，你可能需要使用浮点数。现在，每次攻击可能不同，可能会从生命值中扣除
    1.5、2.1 或 1.8 点。使用浮点数使我们能够使用更高的精度，尤其是在需要进行计算时。如果你不太在意精度，或者你的编程只涉及整数，那就坚持使用整数。


    ## Python 中的布尔值


    啊！这个有着有趣名字的家伙。布尔值（或 bool）是一种只能操作并返回两个值的数据类型：True 或 False。布尔值是任何程序的重要组成部分，除了那些你可能永远不需要它们的程序，比如我们的第一个程序。正是它们允许程序在结果为真或假时采取不同的路径。


    这里有一个小例子。假设你要去一个从未去过的国家旅行。你很可能会面临两种选择。如果天气冷，你会打包冬装。如果天气暖和，你会打包适合温暖天气的衣服。很简单，对吧？布尔值的工作原理正是如此。我们稍后也会探讨它的编码方面。现在，只需记住，当涉及到真和假时，你处理的是一个布尔值。


    ## Python 列表


    虽然对于处于这个学习阶段的人来说这稍微高级一些，但列表是一种顾名思义的数据类型。它在方括号（[]）中列出对象、值或存储数据。列表看起来像这样：


    ```

    month = [''Jan'', ''Feb'', ''March'', ''And so on!'']

    month

    [''Jan'', ''Feb'', ''March'', ''And so on!'']

    ```


    我们将单独讨论这个，届时我们会讨论列表、元组和字典。我们将在后面更详细地了解这种数据类型。


    ## 变量


    你有乘客，但没有交通工具；他们将无处可去。这些乘客只会是站在那里等待某种交通工具来接他们的人。同样，数据类型不能单独工作。它们需要被‘存储’在这些交通工具中。这些特殊的交通工具，或者我们程序员称之为容器的东西，被称为‘变量’，它们是为我们施展魔法的元素。变量是专门的容器，它们存储特定的值，然后可以在需要时被访问、调用、修改甚至删除。你创建的每个变量都将保存特定类型的数据。你不能在一个变量中添加多种类型的数据。在其他编程语言中，你会发现为了创建一个变量，你需要使用关键字‘var’，后跟一个等号‘=’，然后是值。


    在 Python 中，这要容易得多，如下所示：


    ```

    name = "John"

    age = 33

    weight = 131.50

    is_married = True

    ```


    在上面，我们创建了一个名为‘name’的变量，并赋予它一个字符值。如果你还记得字符串，我们使用了双引号来让程序知道这是一个字符串。然后我们创建了一个名为 age
    的变量。这里，我们只写了 33，这是一个整数，因为后面没有小数。你完全不需要在这里使用引号。接下来，我们创建了一个变量‘weight’并赋予它一个浮点值。最后，我们创建了一个名为‘is_married’的变量，并赋予它一个‘True’布尔值。如果你将‘T’改为‘t’，系统将不会将其识别为布尔值，最终会给出一个错误。请注意我们如何为最后一个变量使用命名约定。我们将确保我们的变量遵循相同的命名约定。


    如果你觉得以后可能需要这些变量，或者希望在应用程序开始时将它们初始化为无值，你甚至可以创建空变量。对于具有数值的变量，你可以创建一个你选择的名称的变量，并赋予它一个零值。或者，你也可以只使用开引号和闭引号来创建一个空字符串。


    ```

    empty_variable1 = 0

    empty_variable2 = ""

    ```


    你不必非要这样命名它们；你可以想出更有意义的名字，这样你和任何其他阅读你代码的程序员都能理解。我给它们这些名字是为了确保任何人都能立即理解它们的用途。现在我们已经学会了如何创建变量，让我们学习如何调用它们。如果我们永远不使用这些变量，拥有它们有什么意义，对吧？让我们创建一组新的变量。


    看看这里：


    ```

    name = "James"

    age = 43

    height_in_cm = 163

    occupation = "Programmer"

    ```


    我鼓励你使用自己的值，如果你喜欢的话，可以玩玩变量。


    为了调用 name 变量，我们只需要输入变量的名称。为了将其打印到控制台，我们将这样做：


    ```

    print(name)

    James

    ```


    age、height 变量和 occupation 也是如此。但如果我们想把它们一起打印出来，而不是分开打印呢？尝试运行下面的代码，看看会发生什么：


    ```

    print(name age height_in_cm occupation)

    SyntaxError: invalid syntax

    ```


    惊讶吗？你最终得到了这个吗？这就是发生这种情况的原因。当你使用单个变量时，程序知道那是哪个变量。当你添加第二个、第三个和第四个变量时，它试图寻找以那种方式写的东西。由于没有，它返回了一个错误，否则会说：“嗯……先生，你确定吗？我到处都找过了，但我找不到这个‘name
    age height_in_cm occupation’元素。”你所要做的就是添加一个逗号作为分隔符，像这样：


    ```

    print(name, age, height_in_cm, occupation)

    James 43 163 Programmer

    ```


    现在，它知道我们在说什么了。系统调用了这些变量，并成功地向我们展示了它们的值。但是，如果你尝试将两个字符串相加会怎样？如果你希望合并两个单独的字符串并创建第三个字符串作为结果呢？


    ```

    first_name = "John"

    last_name = "Wick"

    ```


    要将这两个字符串连接成一个，我们可以使用‘+’号。结果字符串现在将被称为字符串对象，由于我们处理的是 Python，这种语言中的所有内容都被视为对象，因此具有面向对象编程的特性。


    ```

    first_name = "John"

    last_name = "Wick"

    first_name + last_name

    ```


    这里，我们没有要求程序打印这两个字符串。如果你希望打印这两个字符串，只需添加 print 函数，并在括号内输入字符串变量，中间用 + 号连接。听起来不错，但结果可能不是你所期望的：


    ```

    first_name = "John"

    last_name = "Wick"

    print(first_name + last_name)

    JohnWick

    ```


    嗯。你认为为什么会这样？当然，我们确实在两个变量之间使用了空格。问题是这两个字符串已经结合在一起了，这里非常字面地结合了，我们没有在 John 之后或 Wick
    之前提供空格（空白）；它不会包含那个。即使是空格也可以是字符串的一部分。


    要测试一下，在第一行代码中，在 John 之后按一下友好的空格键，添加一个空格字符。现在尝试再次运行相同的命令，你应该会看到“John Wick”作为你的结果。合并两个字符串的过程称为连接。虽然你可以连接任意多的字符串，但你不能将字符串和整数连接在一起。


    如果你真的需要这样做，你需要使用另一种技术，先将整数转换为字符串，然后再连接。要转换整数，我们使用 str() 函数。


    ```

    text1 = "Zero is equal to"

    text2 = 0

    print(text1 + str(text2))

    Zero is equal to 0

    ```


    Python 以逐行方式读取代码。首先，它会读取第一行，然后是第二行，然后是第三行，依此类推。这意味着我们也可以事先做一些事情，为自己节省一些时间。


    ```

    text1 = "Zero is still equal to "

    text2 = str(0)

    ```'
