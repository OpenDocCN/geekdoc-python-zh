  mdcn: "密度是观测值与其概率之间的关系。随机变量的某些结果具有低概率密度，而其他结果则具有较高的概率密度。对于样本数据，概率密度被视为概率分布，这是机器学习模型的主要组成部分。\n\
    为了确定样本数据的概率密度函数，我们必须判断给定的观测值是否不太可能出现。选择需要输入数据的适当学习方法最适合获得特定的概率分布。\n随机样本数据的概率密度函数之所以被计算，是因为概率密度被假定通过概率密度估计过程来近似。密度估计使用统计模型来寻找潜在的概率分布，这反过来又产生了观测到的变量。\n\
    \n## 核密度估计\n\n核密度估计是一种估计连续变量概率密度函数的方法。作为一种非参数方法，核密度估计不假设变量有任何潜在分布，而是完全基于数据创建。\n\
    然后通过将所有给定的核函数相加并除以总数来估计概率密度函数，以确保概率密度函数的每个可能值都是非负的，并且概率密度函数在其支撑集上的定积分等于1。\n\n\
    ![](img/eca0e55982f15b47b8758e8428ee4d3b_342_0.png)\n\n例如：\n上图基于内置“空气质量”数据集中的“臭氧”数据以及之前为奥佐诺波利斯市模拟的臭氧数据。它还显示了地毯图以及它们如何影响核密度图。可以确定，与纽约市相比，奥佐诺波利斯有更多的臭氧污染，这是密度图在特定位置出现更高凸起的主要原因。\n\
    带宽和光滑参数等参数能够控制来自数据样本的范围，这些样本有助于估计给定样本的概率。此外，核密度也被称为帕森-罗森布拉特窗口。\n核估计的伪代码：\n\n-\
    \ 输入：核函数 K(x)，核宽度 w，训练数据实例 x1, xn。\n- 输出：训练数据潜在概率密度函数的估计。\n- 过程：在所有点 x 处初始化 dens(x)\
    \ = 0\n\n```\nfor i = 1 to n:\n    for all x:\n        dens(x) += (1/n)*(1/w)*K((x-xi)/w)\n\
    ```\n\n## 潜变量\n\n### 什么是潜变量？\n\n潜变量是从其他变量推断出来且未被直接观测到的变量。被观测到的变量也称为直接测量变量，并在经济学、机器学习、人工智能、心理学和自然语言处理中被数学化地用于设计潜变量模型。潜变量在训练和测试阶段都无法被观测到。这些变量也无法在定量尺度上进行测量。\n\
    以新闻文章的概率语言模型为例，我们可以注意到每篇文章 x 都聚焦于一个特定的主题 y。例如，体育、经济、政治或金融文章各自聚焦于其相应的主题。利用这一知识，我们可以构建一个更精确的模型，该模型也可以表示为\n\
    p (x | t)p(t)\n其中额外添加的变量 t 是未被观测到的。然而，我们不能使用学习方法，因为它是未被观测到的，而未被观测到的变量通常使学习成为一项困难的任务。\n\
    \n### 高斯混合模型\n\n高斯混合模型也被视为潜变量模型。这些模型在机器学习中被广泛使用，因为它们假设我们观测到的数据由 k 个簇组成。假设每个簇由\
    \ π1,...,πK 指定；而每个簇内的分布被称为高斯分布。\n\n## 第四章：机器学习在现实世界中的应用\n\n### 机器学习何时有效？\n\n当面临一个适合部署计算机系统的问题时，你应该首先问这个问题：它是刚性且不变的，还是需要一个自适应系统？\n\
