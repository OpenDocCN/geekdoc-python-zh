  md: '# Chapter 7: Strings Methods in Python


    There will almost certainly be times where you need to manipulate this string
    or that. Maybe you’ll need to get its length, or you’ll need to split it or make
    another string from it. Maybe you’ll need to read what character is at x position.
    Whatever the reason is, the point is that there’s a reason.

    The reason that we’re getting into this is that it opens us up to a broader discussion
    on the nature of objects that we’re going to go more in-depth later on, but in
    the meantime, we’re also going to be covering extremely useful methods that the
    Python language provides to be used with strings.

    Go ahead and create a new file. You can call it whatever you want. My file is
    going to be named strings.py. Uncreative name, sure, but we’re going to be getting
    creative with strings in this chapter, believe me.

    So what is a string, really? Well, we obviously know that a string is a line of
    text, which goes without saying. But what goes into that?

    We’ve spoken quite a bit in this list about lists. Lists are actually a form of
    another variable that’s largely eschewed in Python programming called an array.
    An array is a pre-allocated set of data that goes together, in the most basic
    terms of speaking.

    Python comes from and is built upon a language called C. In C, there are actually
    data types. There are data types in Python, too, but Python saves the user time
    by setting the data type for the programmer instead of having the programmer declare
    it.

    One of the data types in C was called a char, which was a single character. In
    terms of computer speak; there isn’t a native support for strings. Strings were
    simply arrays of characters. For example, if one wanted to make a string called
    “hello”, they would have done the following:


    ```

    char hello[6] = { ‘h’, ‘e’, ‘l’, ‘l’, ‘o’, ‘\0’ };

    ```


    Python, in its beautiful habit of maximum abstraction, keeps us from these complexities
    and lets us just declare:


    ```

    hello = “hello”

    ```


    The point is that strings, ultimately, are just sets of data. And like any set
    of data, they can be manipulated. There will be times, too, where we need to manipulate
    them.'
