- img_proc: true
  md: 'Scikit-learn provides a set of classification algorithms which “naively” assumes
    that in a data set every pair of features are independent. This assumption is
    the underlying principle of Bayes theorem . The algorithms based on this principle
    are known as Naive-Bayes algorithms.

    On a very high level a Naive-Bayes algorithm calculates the probability of the
    connection of a feature with a target variable and then it selects the feature
    with the highest probability. Let’s try to understand this with a very simple
    problem statement: Will it rain today? Suppose we have a set of weather data with
    us that will be our feature set, and the probability of ‘Rain’ will be our target.
    Based on this feature set we can create a table to show us the number of times
    a particular feature/target pair occur. It would look something like this:


    | Weather | Rain |

    |---|---|

    | Partially Cloudy | No |

    | Cloudy | Yes |

    | Partially Cloudy | No |

    | Partially Cloudy | Yes |

    | Partially Cloudy | Yes |

    | Cloudy | Yes |

    | Total | 6 |


    In the table above the feature (column) ‘Weather’ contains the labels (‘Partially
    Cloudy’ and ‘Cloudy’) and the column ‘Rain’ contains the occurrence of rain coinciding
    with the feature ‘Weather’ (Yes/No). Whenever a feature lcoincides with rain,
    it’s recorded as a ‘Yes’ and when the feature didn’t lead to rain it is recorded
    as a ‘No’. We can now use the data from the occurrence table to create another
    table known as the ‘Frequency table’ where we can record the number of ‘Yes’ and
    the number of ‘No’ answers that each feature relates to:


    | | Frequency | |

    |---|---|---|

    | Weater | No | Yes |

    | Partially Cloudy | 2 | 2 |

    | Cloudy | 0 | 2 |

    | Total | 2 | 4 |


    Finally, we combine the data from the ‘occurrence table’ and the ‘frequency table’
    and create a ‘likelihood table’. This table lists the amount of'
  merge: -1
  pgno: 296
- img_proc: true
  md: '‘Yes’ and ‘No’ for each feature and then uses this data to calculate the probability
    of contibution of each feature towards the occurrence of rain:


    | Weather | No | Yes | Individual Probability |

    | :--- | :--- | :--- | :--- |

    | Partially Clody | 2 | 2 | 4/6 | 0.6666666667 |

    | Cloudy | 0 | 2 | 2/6 | 0.3333333333 |

    | Total | 2 | 4 | | |

    | Total Probability | 2/6 | 4/6 | | |

    | | 0.3333333333 | 0.6666666667 | | |


    Notice the ‘Individual Probability’ column in the table above. We had 6 occurrences
    of the features ‘Partially Cloudy’ and ‘Cloudy’ from the ‘Occurrence table’ and
    from the ‘Likelihood table’ it was clear that the feature ‘Partially Cloudy’ had
    4 occurrences (2 for ‘No’ and 2 for ‘yes’). When we divide the number of occurrences
    of ‘No’ and ‘Yes’ of a particular feature with the ‘total’ of the ‘occurrence
    table’, we get the probability of that particular feature. In our case if we need
    to find out that which feature has the strongest probability of contributing to
    the occurrence of Rain then we take the total number of ‘No’ of each feature and
    add it to their respective number of ‘Yes’ from the ‘frequency table’ and then
    divide the sum with the ‘Total’ from the ‘ócurances table’. This gives us the
    probability of each of these features coinciding with rain.


    The algorithm that we are going to use for our sales data is the Gaussian Naive
    Bayes and it is based on a concept similar to the weather example we just explored
    above, although significantly more mathematically complicated. A more detailed
    explanation of ‘Naive-Bayes’ algorithms can be found here for those who wish to
    delve deeper.


    Now let’s implement the Gaussian Naive Bayes or GaussianNB algorithm from scikit-learn
    to create our prediction model:'
  merge: -1
  pgno: 297
