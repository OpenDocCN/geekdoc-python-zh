    +   - Veracity: The truthfulness of the data is important. Do business leaders
    trust the data they are using? If the data is erroneous, it’s not going to be
    useful.


    The key to focus on here is that big data plays a central role in machine learning.
    In fact, without adequate amounts of accurate (truthful) data that can be accessed
