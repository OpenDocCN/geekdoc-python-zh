    important for these tools, they will make some better decisions about who to loan
    out money to, reducing their risks overall. This helps them to offer better rates
    to their customers.


    In addition to helping these financial institutions make sure that they can hand
    out loans to customers who are more likely to pay them back, you will find that
    this can be used in order to help cut down on the risks of fraud as well. This
    can cost the bank billions of dollars a year and can be expensive to work with.
