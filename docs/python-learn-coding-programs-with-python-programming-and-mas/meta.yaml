    Networks can have a simple or small group of computers connected or large groups
    of computers connected. The largest network is the Internet. The small groups
    can be home local networks like Wi-Fi, and Local Area Network that is limited
    to certain computers or locality. There are shared networks such as media, web
    pages, app servers, data storage, and printers, and scanners. Networks have nodes,
    where a computer is referred to as a node. The communication between these computers
    is established by using protocols. Protocols are the intermediary rules set for
    a computer. Protocols like HTTP, TCP, and IP are used on a large scale. All the
    information is stored in the computer, but it becomes difficult to search for
    information on the computer every time. Such information is usually stored in
    a data Centre. Data Centre is designed in such a way that it is equipped with
    support security and protection for the data. Since the cost of computers and
