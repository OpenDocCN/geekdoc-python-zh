  md: '# Conclusion


    Python is a widely used programming language for different applications and in
    particular for machine learning. We cover the basic Python programming as well
    as a guide to use Python libraries for machine learning.


    We present machine learning applications using real datasets to help you enhance
    your Python programming skills as well as machine learning basics acquired through
    the book. These applications provide examples of developing a machine learning
    model for predictions using linear regression, a classifier using logistic regression
    and artificial neural network. Through these applications, examples of data exploration
    and visualization using Python are presented.


    Machine learning is an active research subject, in particular, artificial neural
    networks. Nowadays, machine learning is used in every domain, such as marketing,
    health care systems, banking systems, stock market, gaming applications, among
    others. Our objective is to provide a basic understanding of the major branches
    of machine learning as well as the philosophy behind artificial neural networks.
    The book also aims at providing Python programming skills for machine learning
    to beginners with no previous programming skills in Python or any other programming
    language.


