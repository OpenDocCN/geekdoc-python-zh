    # Generative Models


    Generative models are a major part of unsupervised learning models. They create
    new samples from the same distribution of the given training data. Generally,
    these models are designed to learn and discover the essence of the given data
    for generating similar data. Image data set is an example of generative models
    and has the capability to create a set of images like the given set. Generative
    models are purely based on the characteristics of unsupervised machine learning
    models.


    # Data Compression


    Data compression is the process for keeping data sets as small and efficient as
    possible. Unsupervised learning methods support data compression and perform the
    task through the dimensionality reduction process. The dimensionality reduction
    approach assumes that the given data is redundant and utilizes the same concepts
    as the information theory. Also known as the number of columns in a data set,
    dimensionality reduction can be used to represent information in a data set with
    only a specific size of the actual content.

    Singular value decomposition (SVD) and principal component analysis (PCA) are
    the main approaches for data compression. PCA is used to find linear combinations
    that communicate variance in data whereas the SVD model factorizes data into the
    product of three other, smaller matrices.

    For generating new samples from the same distribution, generative models are used,
    and they are a major part of the unsupervised machine learning approach as well.
    The model also has the power to automatically learn the features of given data
    and implement them into the produced data.'
