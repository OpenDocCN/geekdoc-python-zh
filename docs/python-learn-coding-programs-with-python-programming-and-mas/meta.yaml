    \ ‘numbers’ 的变量，看看会发生什么。\n\n你应该能看到一个数字被添加到了列表的末尾。很好，但如果你不想在末尾添加数字呢？如果你想把它放在靠近开头的位置呢？\n\
    \n为此，我们需要一个名为 insert 的方法。\n\n**numbers.insert()**\n\n为了正确执行此操作，我们需要首先向此方法提供我们希望添加新数字的索引位置。如果你希望将其添加到开头，请使用零；如果你希望将其添加到任何其他索引，请使用该数字。在此数字后跟一个逗号和数字本身。\n\
