    ## Marketing and Advertising


    A machine learning algorithm developed as a result of big data analysis can be
    easily trained with texts, stills, and video segments as data sources. It can
    then extract objects and concepts from these sources and recommend efficient marketing
    and advertising solutions. For example, a tool called "Luban" was developed by
