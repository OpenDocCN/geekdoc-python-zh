    \n现在当我们谈论多维矩阵中的索引时，它变得有点困难。多维矩阵基本上是具有多层的列表的列表。\n这里我将讨论一个三维矩阵。三维数组中的索引工作方式如下：语法：`arr[L,M,N]`\
    \ 或 `arr[L][M][N]`，其中 L 是第一个索引，M 是行号，N 是列号。"
