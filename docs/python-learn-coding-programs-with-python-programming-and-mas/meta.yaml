- md: '## Chapter 1: Intro to Python


    This book is about Python for beginners. It introduces the core aspects of the
    Python programming language. Python is a high-level, integrated, general-purpose
    programming language developed in 1991 by Guido van Rossum. The design philosophy
    underpinning Python emphasizes on code readability characterized by its use of
    considerable whitespace. Python’s object-oriented approach and language constructs
    focus on helping programmers write logical, clear code for large and small-scale
    projects. This book aims to provide a cogent introduction to python for beginners.
    It seeks to provide a platform to learn python programming well and in one week
    including step by step practical examples, exercises and tricks. Before we go
    into the ''why programming'' discussion first let us knows what programming is.
    Programming is the process of taking an equation and converting it into a code,
    a programming language, so that it is implemented on a machine. Or in simple words,
    "Programming is a language to teach a machine what to do through a set of instructions."
    Various types of programming languages are used, for example:


    - Python

    - PHP

    - C language

    - JAVA and more.


    So why is it important? What''s so Great about this? Why does it matter? The first
    thing, everything is done on computers in today''s world; from sending an email
    / report to a distant colleague / friend / relative or even as simple as a picture
    to having an important meeting on Skype! It has become a necessity for every single
    individual to have a computer / laptop as it is fast, very reliable and easy to
    use. So when computers are part of your life, it''s said that learning to program
    will boost your life! One of the main reason people are learning programming is
    because they want to make a career by creating websites for companies or mobile
    apps. That is not the only reason you need to learn programming; programming can
    also help to improve a person''s efficiency and productivity!


    ## What is Python?


    Python is a multi-purpose language created by Guido van Rossum. Differently from
    HTML, CSS, and JavaScript, Python can be used for multiple types of programming
    and software development. Python can be used for things like:


    - Back end software development

    - Desktop apps

    - Big data and mathematical computations

    - System scripts

    - Data Analysis

    - Data Science

    - Artificial Intelligence

    - And many others


    The reasons why Python is the go to language for many can be summarized in the
    following points:


    - Beginner Friendliness as it reads like almost English

