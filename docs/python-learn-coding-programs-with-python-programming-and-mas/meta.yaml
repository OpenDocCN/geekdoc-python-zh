    ## LinearSVC


    LinearSVC or Linear Support Vector Classification is a subclass of the SVM (Support
    Vector Machine) class. We won’t go into the intricacies of the mathematics involved
    in this class of algorithms, but on a very basic level LinearSVC tries to divide
    the data into different planes so that it can find a best possible grouping of
    different classes. To get a clear understanding of this concept let’s imagine
    a data set of ‘dots’ and ‘squares’ divided into a two dimensional space along
    two axis, as shown in the image below:


    ![](img/eca0e55982f15b47b8758e8428ee4d3b_299_0.png)


    In the image above a LinearSVC implementation tries to divide the two-dimensional
    space in such a way that the two classes of data i.e the dots and squares are
    clearly divided. Here the two lines visually represent the various division that
    the LinearSVC tries to implement to separate out the two available classes.


    A very good writeup explaining a Support Vector Machine(SVM) can be found here
    for those who''d like more detail, but for now, let''s just dive in and get our
    hands dirty:


    ```python

    # import the necessary modules

    from sklearn.svm import LinearSVC

    from sklearn.metrics import accuracy_score


    # create an object of type LinearSVC

    svc_model = LinearSVC(random_state=0)


    # train the algorithm on training data and predict using the testing data

    pred = svc_model.fit(data_train, target_train).predict(data_test)


    # print the accuracy score of the model

    print("LinearSVC accuracy : ", accuracy_score(target_test, pred, normalize=True))

    ```


    LinearSVC accuracy : 0.777811004785


    Similar to what we did during the implementation of GaussianNB, we imported the
    required modules in the first two lines. Then we created an object `svc_model`
    of type LinearSVC with `random_state` as ‘0’. Hold on! What is a “`random_state`”
    ? Simply put the `random_state` is an instruction to the built-in random number
    generator to shuffle the data in a specific order. Next, we trained the LinearSVC
    on the training data and then predicted the target using the test data. Finally,
    we checked the accuracy score using the `accuracy_score()` method.


    Now that we have tried out the `GaussianNB` and `LinearSVC` algorithms we will
    try out the last algorithm in our list and that’s the K-nearest neighbours classifier.


    ## K-Neighbors Classifier


    Compared to the previous two algorithms we’ve worked with, this classifier is
    a bit more complex. For the purposes of this tutorial we are better off using
    the `KNeighborsClassifier` class provided by scikit-learn without worrying much
    about how the algorithm works.


    Now, let’s implement the K-Neighbors Classifier and see how it scores:


    ```python

    # import necessary modules

    from sklearn.neighbors import KNeighborsClassifier

    from sklearn.metrics import accuracy_score


    # create object of the classifier

    neigh = KNeighborsClassifier(n_neighbors=3)


    # Train the algorithm

    neigh.fit(data_train, target_train)


    # predict the response

    pred = neigh.predict(data_test)


    # evaluate accuracy

    print("KNeighbors accuracy score : ", accuracy_score(target_test, pred))

    ```


