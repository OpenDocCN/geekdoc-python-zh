    years ago, when plans were being made at the London Olympics, there was a need
    during this event to handle more than 18 million journeys that were made by fans
    into the city of London. Moreover, it was something that we were able to sort
    out well. How was this feat achieved for all of these people? The train operators
    and the TFL operators worked with data analytics to make sure that all those journeys
    went as smoothly as possible. These groups were able to go through and input data
    from the events that happened around that time and then used this as a way to
    forecast how many people would travel to it. This plan went so well that all of
    the spectators and the athletes could be moved to and from the right places in
    a timely manner the whole event.


