    is two programs that can be used to build decision trees. It is designed for two
    operating systems, UNIX and Windows. Quinlan, because of its great work, is considered
    to be the first to use a decision tree.


    Decision trees are a very popular method, both for classification and for predicting
    events. They are symbolic methods of machine learning and allow for quick understanding
    and learning. Their structure is tree-shaped. It is used to subdivide a large
    number of records into smaller sets (classes) that are sequenced in a certain
    order.


    Decision trees can be thought of as a series of successive questions that aim
    to classify a record. Each question is followed by a new question, which depends
    on the previous answer. This process lasts until we determine which group the
    particular record belongs to. A series of these questions and answers can be graphically
    depicted as an inverted decision tree. It is composed of:


    - Root node - does not have any input signal and does not have any output signal
    or has multiple output signals;

    - Internal node - has one input signal and two or more output signals;

    - Terminal node - has exactly one input signal and no output.


    The record enters the decision tree at the source node. A test is made here to
    determine which inner node the record will enter. Different algorithms are used
    for this test, but the principle is always the same: choose the test that best
    discriminates between the target classes. This process is repeated until the record
    reaches the final node. Each path from the source to the final node is unique
    and represents a rule that is then used for classification. All records ending
    in the same end node belong to the same class.


