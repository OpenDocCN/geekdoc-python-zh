    \n自从我们开始阅读本书以来，我们已经学到了很多东西。我们学习了运算符，了解了各种数据类型，还研究了循环和语句。在所有这些内容中，我们确实提到了“列表”这个词，并用方括号而不是花括号或圆括号来表示它们。本章现在将探索并解释列表到底是什么。在本章结束时，我们应该熟悉这些核心概念以及它们对任何类型的编程为何至关重要。\n\
    \n### 深入了解列表是什么\n\n让我们来创建一个假想的家庭，成员包括史密斯、玛丽、他们的女儿艾丽西亚和他们的儿子以利亚。我们该怎么做呢？首先创建一个名为\
    \ `family` 的变量，如下所示：\n\n```\nfamily = ['Smith', 'Mary', 'Alicia', 'Elijah']\n\
    ```\n\n使用 `[]` 括号，我们向这个变量提供了数据。现在，这个特定的变量包含多个名称。这就是列表发挥作用的地方。通过列表，我们可以在一个变量中存储任意多的值。在这个例子中，我们只保留四个。如果你现在使用\
    \ `print` 命令打印 `family`，你应该会看到以下内容：\n\n```\n['Smith', 'Mary', 'Alicia', 'Elijah']\n\
    ```\n\n括号内存储的值或名称称为项目。要调用项目或检查特定索引号上存储的项目，你可以使用我们之前在字符串中使用过的方法。\n\n```\nprint(family[0])\n\
    Smith\n```\n\n它显示的不是 'S'，而是完整的名称。同样，如果你使用其他函数，例如 `len()` 函数，它会提供列表的长度。在这种情况下，它会告诉你这个列表中有四个项目。让我们自己试一试。\n\
    \n```\nprint(len(family))\n4\n```\n\n你可以使用 `[x:y]`，其中 `x` 和 `y` 是你可以设置的范围。如果你正在处理的列表包含数百个条目，这会很有帮助。你可以只筛选出你想查看的那些。你可以使用\
    \ `[-1]` 直接跳到列表末尾查看最后一个条目。组合方式是无穷无尽的。\n\n这里有一个小脑筋急转弯。假设我们有一个包含大量数字的列表，大约 100 个。它们没有按时间顺序排列，我们也没有时间逐一滚动查看。我们需要找出这些数字中哪个是最大的。我们该怎么做呢？\n\
    \n这就是列表、循环和 `if` 语句结合使用的地方。如何结合？让我们立即看看：\n\n```\nnumbers = [312, 1434, 68764,\
    \ 4627, 84, 470, 9047, 98463, 389, 2]\nhigh = numbers[0]\nfor number in numbers:\n\
    \    if number > high:\n        high = number\nprint(f\"The highest number is\
    \ {high}\")\n```\n\n```\nThe highest number is 98463\n```\n\n是时候开动脑筋，看看刚才发生了什么。\n\
    \n我们首先提供了一些随机数字。其中肯定有一个是最大的。我们创建了一个变量，并将数字列表中的第一个项目赋值给它。我们不知道这个项目是否持有最大值。\n\n\
    接下来，我们启动了一个 `for` 循环，在其中创建了一个名为 `number` 的循环变量。这个 `number` 将遍历 `numbers` 中的每个值。我们使用了一个\
    \ `if` 语句来告诉解释器，如果循环变量 `number` 大于我们当前设定的最高数字 `high`，它应该立即用它持有的值替换 `high`。"
