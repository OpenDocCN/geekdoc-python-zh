    In 2016, for the Chinese online shopping extravaganza called “Singles Day,” Luban
    generated a hundred and 17 million banner designs at a speed of 8000 banner designs
    per second.


    The “20th Century Fox” collaborated with IBM to use their AI system "Watson" for
