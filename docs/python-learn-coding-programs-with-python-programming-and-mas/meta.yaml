  md: '# Chapter 3: Seaborn Data Visualization Module in Python


    Seaborn is a Matplotlib wrapper that simplifies the creation of common statistical
    graphs. The list of supported charts includes univariate and bivariate distribution
    charts, regression charts and a number of methods for tracking categorical variables.
    The complete list of graphs provided by Seaborn can be found in the API reference.


    Creating charts in Seaborn is as simple as calling the appropriate graphics function.
    Here is an example of creating a histogram, estimating kernel density and carpet
    texture for randomly generated data.


    ```

    import numpy as np  # numpy used to create data from plotting

    import seaborn as sns  # common form of importing seaborn


    # Generate normally distributed data

    data = np.random.randn(1000)


    # Plot a histogram with both a rugplot and kde graph superimposed

    sns.distplot(data, kde=True, rug=True)

    ```'
