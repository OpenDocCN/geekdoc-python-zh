- img_proc: true
  md: 'association between the item set s, we can make use of the following metrics:


    +   - Support: The support measure gives an idea of how frequently an item set
    occurs in all transactions. Taking the example of itemset1 = {Milk} and itemset2
    = {Drinks}, there will be more transactions containing milk as compared to those
    containing drinks. This means that itemset1 has a higher support than itemset2.


    In order to calculate the total number of transactions in which the item set occurs,
    we can make our calculation through the following mathematical equation:


    $$Support(\{X\} \rightarrow \{Y\}) = \frac{Transactions\ containing\ both\ X\
    and\ Y}{Total\ number\ of\ transactions}$$


    +   - Confidence: In unsupervised machine learning, a confidence measure is used
    to define the likeliness of occurrence of consequent. Given that the cart has
    antecedents already, a confidence measure could be implemented on all transactions
    of an item set. For example, of all the transactions containing {James}, how many
    had {Drink} on them? We can determine by common knowledge that {James} -> {Drink}
    should be a high confidence rule. Equation to calculate confidence mathematically
    is defined as follows:


    $$Confidence(\{X\} \rightarrow \{Y\}) = \frac{Transactions\ containing\ both\
    X\ and\ Y}{Transactions\ containing\ X}$$


    It does not matter what type of item set is present in the antecedent in the case
    of a frequent consequent because the confidence for an association rule that has
    a very frequent consequent will be high.


