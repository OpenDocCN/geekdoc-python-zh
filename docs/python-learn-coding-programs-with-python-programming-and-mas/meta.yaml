  mdcn: '## 第一章：Python 简介


    本书面向 Python 初学者，介绍 Python 编程语言的核心方面。Python 是一种高级、集成、通用的编程语言，由 Guido van Rossum
    于 1991 年开发。Python 的设计哲学强调代码的可读性，其特点是使用大量的空白。Python 的面向对象方法和语言构造侧重于帮助程序员为大型和小型项目编写逻辑清晰的代码。本书旨在为初学者提供一个关于
    Python 的简明介绍。它寻求提供一个平台，让你在一周内学好 Python 编程，包括逐步的实践示例、练习和技巧。在我们进入“为什么要编程”的讨论之前，让我们先了解什么是编程。编程是将一个方程转换成代码（一种编程语言）的过程，以便在机器上实现。或者简单地说，“编程是一种通过一组指令来教机器做什么的语言。”使用了各种类型的编程语言，例如：


    - Python

    - PHP

    - C 语言

    - JAVA 等。


    那么，为什么它很重要？它有什么了不起的？为什么它很重要？首先，在当今世界，一切都通过计算机完成；从向远方的同事/朋友/亲戚发送电子邮件/报告，甚至简单到发送一张图片，到在
    Skype 上举行重要会议！每个人都需要一台计算机/笔记本电脑已成为必需品，因为它速度快、非常可靠且易于使用。因此，当计算机成为你生活的一部分时，据说学习编程将提升你的生活！人们学习编程的主要原因之一是因为他们想通过为公司创建网站或移动应用程序来开创事业。但这并不是你需要学习编程的唯一原因；编程还可以帮助提高个人的效率和生产力！


    ## 什么是 Python？


    Python 是由 Guido van Rossum 创建的一种多用途语言。与 HTML、CSS 和 JavaScript 不同，Python 可用于多种类型的编程和软件开发。Python
    可用于以下方面：


    - 后端软件开发

    - 桌面应用程序

    - 大数据和数学计算

    - 系统脚本

    - 数据分析

    - 数据科学

    - 人工智能

    - 以及许多其他领域


    Python 成为许多人的首选语言的原因可以总结为以下几点：


    - 对初学者友好，因为它读起来几乎像英语

    - 在构建功能方面没有硬性规定

    - 更容易管理错误

    - 拥有庞大且活跃的支持社区

    - 职业机会

    - 未来，特别是与数据科学和机器学习应用的契合度很高。


    Python 是最强大的编程/编码语言之一。它是解释型语言之一，而不是编译型语言。这意味着 Python 解释器在 Python 程序上工作或操作，以向用户提供结果。Python
    解释器以逐行方式工作。使用 Python，你可以做很多事情。Python 已被用于开发涵盖广泛领域的应用程序，从最基本的应用程序到最复杂的应用程序。Python
    可用于开发基本的桌面计算机应用程序。它也是 Web 开发的良好编码语言。使用 Python 开发的网站以其提供的安全性和保护水平而闻名，使其免受黑客和其他恶意用户的攻击。Python
    在游戏开发领域非常适用。它已被用于开发基本和复杂的计算机游戏。Python 目前是数据科学和机器学习中使用的最佳编程语言。它拥有最适合数据分析的库，使其适用于该领域。一个很好的例子是
    scikit-learn (sklearn)，它已被证明是数据科学和机器学习的最佳选择。Python 以其易于使用的语法而闻名。它的编写目标是使编码变得容易。这使得它即使对于初学者来说也是最好的语言。它的语义也很简单，使得人们很容易理解
    Python 代码。该语言经历了许多更改和改进，特别是在引入 Python 3 之后。以前，我们有 Python 2.7，它已经获得了很高的稳定性。Python
    3 引入了新的库、函数和其他功能，并且一些语言构造发生了显著变化。


    ## Python 的特点


    ### Python 简单易用


    Python 是一种易于上手的语言。其易用性体现在大多数用 Python 编写的程序看起来都与英语相似。因此，这种简单性使得 Python 成为入门级编程课程的理想学习语言，从而向学生介绍编程概念。


    ### Python 是可移植的/平台无关的


    Python 具有高度的可移植性，这意味着 Python 程序可以在各种不同的操作系统上运行，而无需进行特定或广泛的更改。


    ### Python 是一种解释型语言


    主要来说，Python 是一种解释型语言，而不是编译型语言；另一方面，C、C++ 是编译型语言的例子。在许多情况下，用高级语言编写的程序通常被称为源代码或源程序。因此，源代码中的命令被称为语句。计算机缺乏执行用高级语言编写的程序的能力。通常，计算机理解机器语言，它只包含
    1 和 0。因此，当将高级语言转换为机器语言时，有两种类型的程序可供用户使用：编译器和解释器。


    ### 编译器


    在其操作功能中，编译器将整个源代码一次性转换为可读的机器语言。然后执行机器语言。该过程如下图所示：


    ![](img/eca0e55982f15b47b8758e8428ee4d3b_26_0.png)


    ### 解释器


    另一方面，解释器采用逐行方法将高级语言转换为机器语言，然后执行。Python 解释器从文件顶部开始，将第一行转换为机器语言，然后执行。该过程在整个文件中重复进行，如下图所示：


    ![](img/eca0e55982f15b47b8758e8428ee4d3b_26_1.png)


    区分高级语言和编译型语言至关重要。例如，编译型语言如 C 和 C++ 使用编译器来翻译和解释（从高级语言到机器语言）。另一方面，像 Python 这样的解释型语言使用解释器来进行这种翻译和后续执行的方法。重要的是


