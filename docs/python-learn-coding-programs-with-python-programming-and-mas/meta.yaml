    - 1. When you reach this part, you should be able to open up the Command Prompt.
    This is easy to do if you go to the start menu. Then click on Windows System and
    then on Command Prompt. Type in the word python. This will help us to get the
    interpreter of Python up and running and ready to go for us.


    When we have the steps above done, which will really only take a few minutes overall
    and won’t be as bad as it may seem when you first get started, you will be able
    to use the Python program on your Windows system. You can then choose to open
    up the interpreter of Python and anything else that you need, and writing out
    all of the codes that you need in no time.


    ## Installing Python on a Linux Operating System


    And finally, we need to take a moment to see some of the steps that are needed
    to make sure that we can properly install the Python language on our Linux operating
    system. Linux is not quite as big of a household name as we will find with the
    other two operating systems that we spent some time within this guidebook. But
    there are so many uses for it, and it is able to provide us with a bunch of neat
    features and more. There are many programmers who already use this language, and
    many more who are likely to do it in the future, so it is a good thing to know
    a little bit more about when it is time to install our Python coding language
    on it.


    If you are relying on an older version of Ubuntu or another version, then you
    may want to work with the dead snakes PPA, or another tool, to help you download
    the Python 3.6 version.


    The good news here is that if you are working with other distributions of Linux,
    it is likely that you already have Python 3 installed on the system.


    If not, you can use the distribution’s package manager. And if the package of
    Python 3 is not recent enough, or not the right one for you, you can go through
    and use these same steps to help install a more recent version of Python on your
    computer as needed.


    And there we have it! We have now gone through and downloaded Python onto the
    three major operating systems that are out there. This is going to make things
    so much easier when you are ready to handle some of the codings that you want.
    And if you used the codes that we described, and went through the other steps
    that we talked about, you will find that working with the Python language is going
    to be easy. You can now just open up the right files and all of the parts that
    you need, and it will work well for you!


    ## Chapter 3: Seaborn Data Visualization Module in Python


    Seaborn is a Matplotlib wrapper that simplifies the creation of common statistical
    graphs. The list of supported charts includes univariate and bivariate distribution
    charts, regression charts and a number of methods for tracking categorical variables.
    The complete list of graphs provided by Seaborn can be found in the API reference.


    Creating charts in Seaborn is as simple as calling the appropriate graphics function.
    Here is an example of creating a histogram, estimating kernel density and carpet
    texture for randomly generated data.


    ```python

    import numpy as np  # numpy used to create data from plotting

    import seaborn as sns  # common form of importing seaborn


    # Generate normally distributed data

    data = np.random.randn(1000)


    # Plot a histogram with both a rugplot and kde graph superimposed

    sns.distplot(data, kde=True, rug=True)

    ```


    ![](img/eca0e55982f15b47b8758e8428ee4d3b_259_0.png)


    ## Installing Seaborn


    To install the Seaborn library, you simply have to execute the following command
    at your command terminal:


    ```

    $ pip install seaborn

    ```


    Before you go and start plotting different types of plot, you need to import a
    few libraries. The following script does that:


    ```python

    import matplotlib.pyplot as plt

    import seaborn as sns

    plt.rcParams[''figure.figsize''] = [10,8]

    tips_data = sns.load_dataset(''tips'')

    tips_data.head()

    ```


    The above script imports the Matplotlib and Seaborn libraries. Next, the default
    plot size is increased to 10 x 8. After that, the load_dataset() method of the
    Seaborn module is used to load the tips dataset. Finally, the first five records
    of the tips dataset have been displayed on the console. Here is the output.


    Output: The tips data set contains records of the bill paid by a customer at a
    restaurant. The dataset contains six columns: total_bill, tip, sex, smoker, day,
    time, and size. You do not have to download this dataset as it comes built-in
    with the Seaborn library. We will be using the tips dataset to plot some of the
    Seaborn plots. So, without any ado, let’s start plotting with Seaborn.


    ## Seaborn’s Plotting Functions


    ### The Dist Plots


    The dist plot, also known as the distributional plot, is used to plot the histogram
    of data for a specific column in the dataset. To plot a dist plot, you can use
    the distplot() function of the Seaborn library. The name of the column for which
    you want to plot a histogram is passed as a parameter to the distplot() function.
    The following script plots the dist plot for the total_bill column of the tips
    dataset.


    Script 1:


    ```python

    plt.rcParams[''figure.figsize''] = [10,8]

    sns.distplot(tips_data[''total_bill''])

    ```


    Similarly, the following script plots a dist plot for the tip column of the tips
    dataset.


    Script 2:


    ```python

    sns.distplot(tips_data[''tip''])

    ```


    The line on top of the histogram shows the kernel density estimate for the histogram.
    The line can be removed by passing False as the value for the kde attribute of
    the distplot() function, as shown in the following example.


    Script 3:


    ```python

    sns.distplot(tips_data[''tip''], kde = False)

    ```


    ![](img/eca0e55982f15b47b8758e8428ee4d3b_261_0.png)


    ### Joint Plot


    The joint plot is used to plot the histogram distribution of two columns, one
    on the x-axis and the other on the y-axis. A scatter plot is by default drawn
    for the points in the two columns. To plot a joint plot, you need to call the
    jointplot() function. The following script plots a joint plot for the total_bill
    and tip columns of the tips dataset.


    Script 4:


    ```python

    sns.jointplot(x=''total_bill'', y=''tip'', data=tips_data)

    ```


    The scatter plot can be replaced by a regression line in a joint plot. To do so,
    you need to pass reg as the value for the kind parameter of the jointplot() function.


    Script 5:


    ```python

    sns.jointplot(x=''size'', y=''total_bill'', data=tips_data, kind = ''reg'')

    ```'
