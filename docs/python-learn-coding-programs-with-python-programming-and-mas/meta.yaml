    # Chapter 5: Modules in Python


    # What are the Modules?


    In Python, a module is a portion of a program (an extension file) that can be
    invoked through other programs without having to write them in every program used.
    Besides, they can define classes and variables. These modules contain related
    sentences between them and can be used at any time. The use of the modules is
    based on using a code (program body, functions, variables) already stored on it
    called import. With the use of the modules, it can be observed that Python allows
    simplifying the programs a lot because it allows us to simplify the problems into
    a smaller one to make the code shorter so that programmers do not get lost when
    looking for something in hundreds of coding lines when making codes.


    # How to Create a Module?


    To create a module in Python, we don''t need a lot; it''s very simple.


    For example: if you want to create a module that prints a city, we write our code
    in the editor and save it as "mycity.py".


    Once this is done, we will know that this will be the name of our module (omitting
    the .py sentence), which will be assigned to the global variable __city__.


    But, beyond that, we can see that the file "mycity.py" is pretty simple and not
    complicated at all, since the only thing inside is a function called "print_city"
    which will have a string as a parameter, and what it will do is to print "Hello,
    welcome to", and this will concatenate with the string that was entered as a parameter.


    # Locate a Module


    When importing a module, the interpreter automatically searches the same module
    for its current address, if this is not available, Python (or its interpreter)
    will perform a search on the PYTHONPATH environment variable that is nothing more
    than a list containing directory names with the same syntax as the environment
    variable.'
