    in the future, you will find that when we use data analysis in this kind of manner
    in the big cities has helped to make these cities and these areas a lot safer,
    and the risks would not have to put their lives at risk as much as before.


    ## Transportation


    The world of transportation is able to work with data analysis, as well. A few
    years ago, when plans were being made at the London Olympics, there was a need
    during this event to handle more than 18 million journeys that were made by fans
    into the city of London. Moreover, it was something that we were able to sort
    out well.


    How was this feat achieved for all of these people? The train operators and the
    TFL operators worked with data analytics to make sure that all those journeys
    went as smoothly as possible. These groups were able to go through and input data
    from the events that happened around that time and then used this as a way to
    forecast how many people would travel to it. This plan went so well that all of
    the spectators and the athletes could be moved to and from the right places in
    a timely manner the whole event.


    ## Risk and Fraud Detection


    This was one of the original uses of data analysis and was often used in the field
