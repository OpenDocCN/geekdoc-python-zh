    \ 循环用于用户不知道需要多少次循环周期的场景；`while` 循环体通过缩进来确定。\n\n示例\n\n启动 IDLE。\n导航到“文件”菜单并点击“新建窗口”。\n\
    输入以下内容：\n\n```\ni=0\nwhile i<6:\n    if i==5:\n        break\n    print(i)\n \
    \   i=i+1\nelse:\n    print(\"inside else\")\n```\n\n注意：如果未包含计数器的值，将导致无限循环。\n\n\
    练习\n\n- a. 编写一个 Python 程序，利用 `while` 流程控制语句显示 1 到 10 之间所有奇数的和。\n- b. 编写一个 Python\
    \ 程序，利用 `while` 流程控制语句显示 11 到 21 之间所有数字的和。\n- c. 编写一个 Python 程序，利用 `while` 流程控制语句显示\
    \ 1 到 10 之间所有偶数的和。\n\n## 在 While 循环中使用 else\n\n如果条件为假且没有发生 `break`，则 `while` 循环的\
    \ `else` 部分会运行。\n\n示例\n\n启动 IDLE。\n导航到“文件”菜单并点击“新建窗口”。\n输入以下内容：\n\n```\ntrack\
    \ = 0\nwhile track< 4:\n    print(\"Within the loop\")\n    track = track + 1\n\
    else:\n    print(\"Now within the else segment\")\n```\n\n## Python 的 break 和\
    \ continue\n\n让我们用一个现实生活中的类比来说明：我们需要在迭代完全完成之前强制停止它。想象一下，当使用简单的字典攻击来破解/破解密码时，该攻击会循环遍历所有可能的字符组合，你会希望程序在找到所搜索的密码时立即停止，而无需完成整个循环。再想象一下，当使用恢复软件恢复意外删除的照片时，你会希望恢复程序在找到指定范围内的项目后立即停止迭代文件。Python\
    \ 中的 `break` 和 `continue` 语句的工作方式类似。\n\n示例\n\n启动 IDLE。\n导航到“文件”菜单并点击“新建窗口”。\n\
    输入以下内容：\n\n```\nfor tracker in \"bring\":\n    if tracker == \"i\":\n        break\n\
    \    print(tracker)\nprint(\"The End\")\n```\n\n## Python 中的 Continue 语句\n\n当使用\
    \ `continue` 语句时，解释器仅跳过当前迭代中循环内的其余代码，而循环不会终止。循环将继续进行下一次迭代。\nPython continue 的语法\n\
