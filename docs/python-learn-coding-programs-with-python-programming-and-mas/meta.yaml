    Let us go ahead and create an imaginary family that comprises of Smith, Mary,
    their daughter Alicia, and their son Elijah. How would we do that? Begin by creating
    a variable named family as shown below:


    ```

    family = [''Smith'', ''Mary'', ''Alicia'', ''Elijah'']

    ```


    Using the [] brackets, we provided the data to this variable. Now, this specific
    variable holds more than one name within it. This is where lists come to the rescue.
    Through listing, we can store as many values within a variable as we like. In
    this case, we can stick to four only. If you now use the print command to print
    ‘family’, you should see the following:


    ```

    [''Smith'', ''Mary'', ''Alicia'', ''Elijah'']

    ```


    The values or names stored within the brackets are called as items. To call on
