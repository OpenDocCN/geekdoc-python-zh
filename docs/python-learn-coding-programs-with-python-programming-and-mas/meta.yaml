    \ 和其他与数据科学相关的包吧！\n\n### 如何创建 NumPy 数组\n\n从这里开始，我们需要花一些时间学习如何创建这些数组。我们将假设你已经在计算机上安装了\
    \ NumPy 库并准备就绪。然后有两种主要方法可以创建这些数组，包括：\n- 你可以通过嵌套列表或 Python 列表来创建其中一个数组。\n- 我们也可以使用\
    \ NumPy 内置的一些方法来创建这些数组。\n我们将首先研究从嵌套列表和 Python 列表创建数组所需的步骤。为此，我们只需要将 Python 列表作为参数传递给\
    \ `np.array()` 方法，然后就完成了。当你这样做时，你将得到一个向量或一维数组，这可以帮助你完成许多必要的工作。\n有时我们也想更进一步。我们想要摆脱刚刚创建的一维数组，并希望将其转换为二维数组或矩阵。为此，我们只需要将\
    \ Python 的列表的列表传递给 `np.array()` 方法，然后它就为我们完成了。\n\n### NumPy 广播的工作原理\n\n广播是指 NumPy\
    \ 对不同形状的数组执行算术运算的能力。如果两个数组具有相同的形状，那么算术运算很容易执行，因为它们是在对应元素之间进行的。在不同大小的数组的情况下，这变得不可能，但\
    \ NumPy 有一个解决方案。在 NumPy 中，较小的数组被“广播”到较大的数组上，以便它们具有相同的形状。通过这个例子会很清楚：\n假设我有一个形状为\
    \ 4X5 的数组 'A' 和一个大小为 1X5 的数组 'B'，那么较小的数组 B 被拉伸，使其也具有与 'A' 相同的 4X5 大小。B 中的新元素只是原始元素的副本。\n\
