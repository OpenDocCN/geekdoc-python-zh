  mdcn: "## 示例\n\n创建一个名为 `dummymodule.py` 的 Python 模块，并在其中编写以下内容：\n\n```\ndef testF():\n\
    \    print(\"this is a module, goodbuy\")\n```\n\n将该模块保存在 Python 的安装目录中。\n\n在命令行中：\n\
    \n```\nImport dummymodule\n```\n\n现在调用该函数：\n\n```\ndummymodule.testF()\n```\n\n\
    你已经使用了你的第一个模块。\n\n## 模块示例一\n\n首先要做的是创建模块，但乍一看，我们有个惊喜，那就是导入了 `math` 模块。\n\n这对我们意味着什么？\n\
    这意味着我们正在获取 Python 默认附带的 `math` 模块的属性。\n\n我们看到创建了一个具有多个选项的计算器函数。\n如果 `op` 的值等于\
    \ 1，则执行加法运算。\n如果等于 2，则执行减法运算，依此类推。\n\n但 `op` 等于 5 的情况是全新的，因为如果条件成立，它将通过使用 `math.sqrt(num1)`\
    \ 返回 `num1` 和 `num2` 的平方根值，该函数返回平方根的结果。\n\n然后，如果 `op` 等于 6，使用函数 `math.radians()`，这意味着\
    \ `num1` 或 `num2` 将被转换为弧度，因为这是函数 `math.sin()` 接受的值类型，这意味着它将返回 `num1` 和 `num2`\
    \ 的正弦值，这些值将是用户任意输入的数字，它们将被转换为弧度，然后返回相应的正弦值。\n\n最后一步是创建主程序，如下所示：\n这里，我们可以看到一个简单的程序，因为它只导入了模块\
    \ `calculator.py`，然后通过使用 `input` 为变量 `num1` 和 `num2` 赋值。\n最后，选择要执行的操作，并调用 `calculator`\
    \ 模块的 `calculator` 函数，我们将向其传递三个参数。\n\n## 模块示例二\n\n我们将创建一个模块，其中包含一个充当计时器的函数，以便在时间结束时返回\
    \ `true`。\n在这个模块中，如你所见，导入了另一个名为 `time` 的模块，顾名思义，它包含用于处理时间的函数，并且拥有广泛的函数，从返回日期和时间到帮助创建计时器等。\n\
    我们首先要做的是创建 `cron()` 函数，它开始声明 `startAlarm` 变量将等于 `time.time`，这意味着我们正在为这个函数提供一个初始值，以了解函数初始化的确切时刻，然后进入一个无限循环。\n\
    由于限制条件始终为 `True`，因此这个循环永远不会结束，除非其中有 `break` 命令。\n然后，在 `while` 循环中，有几条指令。\n第一条是\
    \ `final` 变量等于 `time.time()`，以考虑我们所处的具体时刻，从而监控时间。\n之后，创建另一个名为 `times` 的变量，它获取\
    \ `final` 减去 `startAlarm` 的值。\n但你可能会想知道 `round` 函数的作用。它对值进行四舍五入；我们这样做是为了更容易处理。但这还不够，因此，我们使用一个\
    \ `if` 语句，因为如果 `final` 和 `start` 之间的差值大于或等于 60，则表示一分钟已经过去，这会发生什么？\n为什么是 60？\n\n\
    这是因为 `time` 模块以秒为单位工作，要经过一分钟，必须经过 60 秒，因此，`final` 和 `start` 之间的差值必须大于或等于 60，在肯定的情况下，将返回\
    \ `True`，最后，我们将退出无限循环。\n一旦 `alarm` 模块完成，我们继续编写程序，如下所示：\n我们可以看到程序导入了两个模块，我们创建的\
    \ `alarm` 模块和 `time` 模块。\n我们要做的第一件事是创建变量 `s` 作为输入，询问用户是否要开始。\n如果回答是肯定的，那么代表时间的变量\
    \ `h` 将等于 `\"time.strftime (\"%H:%M:%S\")\"`，这意味着我们正在使用 `time` 模块的一个函数，该函数以指定格式返回小时，以便之后可以使用\
    \ `print` 函数打印。\n下一个操作是使用 `alarm` 模块，使用命令 `alarm.cron()`，这意味着正在调用 `cron()` 函数。\n\
    当这个函数完成时，时间将再次赋值给变量 `h`，最后打印出来，以便观察其正确运行。\n作为本章的结论，我们可以说模块对于程序员的正常工作至关重要，因为它们允许使代码更具可读性，此外，它允许细分问题，以便逐一解决，从而轻松完成任务。\n\
    \n## 第六章：Python 中的文件处理\n\n在使用 Python 时，我们需要关注的下一件事是确保我们知道如何处理和操作文件。你可能正在处理一些数据，并希望存储它们，同时确保它们可访问，以便在需要时提取和使用。在保存数据的方式、它们以后如何被找到以及它们在代码中如何反应方面，你确实有一些选择。\n\
    \n在处理文件时，你会发现，在处理文件时，你可以选择一些操作或方法。其中一些选项包括：\n\n-   关闭你正在处理的文件。\n-   创建一个全新的文件来处理。\n\
    -   查找或将你拥有的文件移动到新位置，以便更容易找到。\n\n## 创建新文件\n\n我们要在这里看的第一个任务是创建文件。如果我们没有首先有一个文件来帮助我们，就很难完成其他许多任务。如果你想创建一个新文件并在其中添加一些代码，你首先需要确保文件在你的\
    \ IDLE 中打开。然后你可以选择编写代码时要使用的模式。\n\n在 Python 中创建文件时，你会发现有三种模式可供使用。我们将在这里关注的三种主要模式包括追加（`a`）、模式（`x`）和写入（`w`）。\n\
    \n任何时候你想打开一个文件并在其中进行一些更改，那么你会想使用写入模式。这是三种模式中最容易使用的。写入方法将使你更容易设置代码的正确部分并最终为你工作。\n\
    \n写入函数将易于使用，并确保你可以对文件进行任何添加和更改。你可以向文件添加新信息，更改现有内容等等。如果你想看看使用写入方法可以对这部分代码做什么，那么你需要打开你的编译器并执行以下代码：\n\
    \n```\n#file handling operations\n#writing to a new file hello.txt\nf = open('hello.txt',\
    \ 'w', encoding = 'utf-8')\nf.write(\"Hello Python Developers!\")\nf.write(\"\
    Welcome to Python World\")\nf.flush()\nf.close()\n```\n\n从这里开始，我们需要评估你可以对正在处理的目录做什么。默认目录始终是当前目录。你可以浏览并切换存储代码信息的目录，但你必须在开始时花时间更改该信息，否则它最终不会出现在你想要的目录中。\n\
    无论你在处理代码时花费时间的目录是哪个，当你以后想找到文件时，你都需要回到那个目录。如果你想让它出现在不同的目录中，请确保在保存文件和代码之前切换到该目录。使用我们上面编写的选项，当你转到当前目录（或你为此选择的目录）时，你将能够打开文件并看到你在那里写的消息。\n\
    对于这个，我们编写了简单的代码部分。当然，随着我们的进行，你将编写更复杂的代码。对于这些代码，有时你会想编辑或覆盖文件中的一些内容。这在 Python 中是可以做到的，只需要对你编写的语法进行小的更改。一个很好的例子包括：\n\
    \n```\n#file handling operations\n#writing to a new file hello.txt\n```"
