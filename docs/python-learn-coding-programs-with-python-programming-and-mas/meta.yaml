    sentences between them and can be used at any time. The use of the modules is
    based on using a code (program body, functions, variables) already stored on it
    called import. With the use of the modules, it can be observed that Python allows
    simplifying the programs a lot because it allows us to simplify the problems into
    a smaller one to make the code shorter so that programmers do not get lost when
    looking for something in hundreds of coding lines when making codes.


