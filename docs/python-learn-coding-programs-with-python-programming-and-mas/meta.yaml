    # Chapter 4: How Machine Learning is applied in the Real World


    # When Does Machine Learning Work?


    When faced with a problem that is suitable for the deployment of a computer system,
    the first thing that you should ask about the problem is whether or not it is
    rigid and unchanging, or is this something that requires an adaptive system?

    At first glance this seems like a simple question. For example, suppose that you
    were considering a ballistics program for the military. Ballistics follow the
    laws of physics. These are precisely known, and so it should be a simple matter
    to do calculations to get the accurate results that are desired. Hard coded computer
    programs can be used to predict how things will work in real situations. Indeed,
    as soon as Newton’s laws were known in the 17th and 18th centuries, armies were
    using people to do the calculations by hand, and this helped to revolutionize
    warfare and military efficiency. Today it’s done even better and faster using
    powerful computer technology.

    But a recent example shows that there is often more to any situation than meets
    the eye. Consider an EKG, which can give a doctor a picture of the performance
    of the heart. An EKG is used to diagnose a heart attack, arrythmias, and many
    other problems. It’s very narrowly focused, and patterns on the EKG are associated
    with specific conditions. Health professionals are trained to recognize those
    patterns, and they can study an EKG chart and determine which patients need medical
    intervention and which don’t. This is as straightforward as the ballistics problem.

    However, when artificially intelligent systems were developed using machine learning
    to study EKGs, it was found that they outperformed doctors by a significant margin.
    The machine learning systems that have been developed are able to predict which
    patients will die within a year with 85% accuracy. For comparison, doctors are
    able to make the same prediction with 65% to at most 80% accuracy.

    The key here is the difference. When there are EKGs that look completely normal
    to the human eye–the machine learning system is able to determine that in fact,
    they are not normal. The engineers that designed the system can’t explain it.
    They don’t know why or how the machine learning system'
