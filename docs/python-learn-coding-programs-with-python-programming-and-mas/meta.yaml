  md: '# Compiler


    In its operative function, a complier translates the entire source code into the
    readable machine language in one swoop. The machine language is subsequently executed.
    The process is illustrated below:


    ![](img/eca0e55982f15b47b8758e8428ee4d3b_26_0.png)


    # Interpreter


    On the other hand, an interpreter employs a line by line approach to translate
    a high-level language into machine language, which is subsequently executed. The
    Python interpreter bags are the top of the file, translates the beginning line
    into machine language, and subsequently executes it. The process repeatedly continues
    throughout the entire file as illustrated below:


    ![](img/eca0e55982f15b47b8758e8428ee4d3b_26_1.png)


    It is crucial to distinguish between high-level and complied languages. For example,
    the compiled languages such as C, and C++ use a compiler to translate and interpret
    (high-level to machine language.) On the other hand, an interpreted language such
    as Python employs an interpreter to conduct this approach of translation and subsequent
    execution. The important'
  merge: -1
  pgno: 26
- img_proc: true
  md: 'distinction here between interpreted and compiled language is that the generally
    complied language operates and performs better compared to written programs that
    employ interpreted languages. However Python does not suffer from this disadvantage.


    In synthesis, Python is an interpreted language as the program executes directly
    from the source code. Every time Python programs are run the source code is required.
    What Python does is to convert the source code written by the developer into an
    intermediate code which is then further converted into the machine language ready
    to be executed. Python is therefore an Interpreted language as it is processed
    in real time by the interpreter. The source code does not need to be compiled
    before its execution. Compiled means that the code needs to be converted to machine
    language before runtime.


    # Python is Dynamically Typed


    Another characteristic of Python is to be dynamically typed which means that data
    types are checked on the fly, during execution vs statically typed when data type
    are checked before run-time.


    # Python is Strongly Typed


    The primary feature of a strongly typed language is that it lacks the capacity
    to convert one form (type) of data to another automatically. On the other hand,
    languages such as PHP and JavaScript, which are loosely typed, have the capacity
    to convert data from one type to another freely and automatically. Consider the
    following case:


    ```

    1 | price = 12

    2 | str = "The total price = " + 12

    3 | console.log(str)

    ```


    Output:


    ```

    The total price = 12

    ```


    In this regard, before adding 12 to the string, the JavaScript language seeks
    to convert the number 12 to a string “12”, which is subsequently appended to the
    end of the string. However, in a Python statement such as below:'
