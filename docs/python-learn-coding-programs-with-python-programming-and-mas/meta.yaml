    version 3.6.1 in this book. Click on “Download Python 3.6.1” and the software
    will start downloading.


    ![](img/eca0e55982f15b47b8758e8428ee4d3b_36_0.png)


    Alternatively if you want to install a different version, scroll down the page
    and you’ll see a listing of other versions. Click on the release version that
    you want. You’ll be redirected to the download page for that version.


    Scroll down towards the end of the page and you’ll see a table listing various
    installers for that version. Choose the correct installer for your computer. The
    installer to use depends on two factors:

    1. The operating system (Windows, Mac OS, or Linux) and

    2. The processor (32-bit vs 64-bit) that you are using.


    For instance, if you are using a 64-bit Windows computer, you will likely be using
    the "Windows x86-64 executable installer". Just click on the link to download
    it. If you download and run the wrong installer, no worries. You will get an error
    message and the interpreter will not install. Simply download the correct installer
    and you are good to go. Once you have successfully installed the interpreter,
    you are ready to start coding in Python.


    ## Python IDLE


    We advise to use at least the default Python IDLE. However there are many other
    options you can use the table below to compare them. IDLE is the integrated development
    environment for Python and it is installed automatically with Python. As well
    as a neat graphical user interface, IDLE is packed with features that make using
    Python for developing easy, including a very powerful feature, syntax highlighting.

    With syntax highlighting, reserved keywords, literal text, comments, etc. are
    all highlighted in different colors, making it much easier to see errors in your
    code. As well as editing your Python program with IDLE, you can also execute your
    programs in IDLE.


    | Features | IDLE | Thonny | Eric Python | Atom | Wing | Sublime | Rodeo | PyDev
    | Spyder | PyCharm |

    | :--- | :---: | :---: | :---: | :---: | :---: | :---: | :---: | :---: | :---:
    | :---: |

    | Code Completion | X | ✓ | ✓ | ✓ | ✓ | ✓ | ✓ | ✓ | ✓ | ✓ |

    | Debugging | ✓ | ✓ | ✓ | Package Available | ✓ | Package Available | X | Remote
    Debugger | ✓ | ✓ |

    | Built-in Unit Testing | X | X | ✓ | Package Available | ✓ | Package Available
    | X | ✓ | Plugin | ✓ |

