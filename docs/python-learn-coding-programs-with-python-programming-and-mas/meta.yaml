    # # Chapter 9: Introduction to Big Data


    # ## Brief History of Big Data


    The origin of large volumes of data can be traced back to the 1960s and 1970s
    when the Third Industrial Revolution had just started to kick in, and the development
    of relational databases had begun along with the construction of data centers.
    But the concept of big data has recently taken center stage primarily since the
    availability of free search engines like Google and Yahoo, free online entertainment
    services like YouTube and social media platforms like Facebook. In 2005, businesses
    started to recognize the incredible amount of user data being generated through
    these platforms and services, and in the same year and open-source framework called
    “Hadoop,” was developed to gather and analyze these large data dumps available
    to the companies. During the same period, non-relational or distributed database
    called “NoSQL” started to gain popularity due to its ability to store and extract
    unstructured data. “Hadoop” made it possible for the companies to work with big
    data with high ease and at a relatively low cost.


    Today with the rise of cutting edge technology, not only humans but machines also
    generating data, the smart device technologies like “Internet of things” (IoT)
    and “Internet of systems” (IoS) have skyrocketed the volume of big data. Our everyday
    household objects and smart devices are connected to the Internet and able to
    track and record our usage patterns as well as our interactions with these products
    and feeds all this data directly into the big data. The advent of machine learning
    technology has further increased the volume of data generated on a daily basis.


    # ## Big Data


    You can think of it as large amounts of what appears to be random data collected
    on people or activities in a wide variety of circumstances. Regarding people,
    this will include data on where you are shopping, what websites you are visiting,
    where you are traveling, what products you are purchasing, and so forth. This
    data could also be collected on any activity related to a business or organization.
    It could be data collected by UPS on'
  - '[PAGE 226]


    the habits and fuel use of their drivers, or data collected by government agencies
    related to criminal activity or an epidemic.

    The data by itself is useless. It must be analyzed, and computers, directed by
    experts called data scientists, are used to find hidden patterns, associations,
    and trends that may exist in the data. Corporations, governments, and other large
    organizations are using big data to seek out information on human behavior relevant
    to their operations, whether that involves improving their own efficiency, delivering
    better services, or developing new products that their customer base will want.


    # Data Strategy


    A big data strategy is going to involve the collection, storage, retrieval, analysis,
    and actionable insights. The goal of a big data strategy is to build a big data
    foundation that can power business intelligence.

    The collection is not an issue for most businesses, but many businesses err by
    pre-judging the value of data that they could collect, thus not collecting as
    much data as they should. By now, you should recognize that data may have insights
    that are not readily apparent. This is the benefit of machine learning and the
    role that it plays in data analysis: finding hidden patterns that humans didn’t
    know existed and - frankly – couldn’t have known existed. Therefore, you need
    to collect data with an open mind. Any bit of information that a business can
    collect is potentially useful. At first glance, it might appear of no consequence,
    but it might be used later to draw unexpected connections that can lead to data-driven
    decisions later.

    The second issue that needing addressed as part of a big data strategy is the
    storage and retrieval of the data. A large amount of infrastructure is needed
    to handle the volume and velocity of big data. This includes large storage capacity
    as well as powerful computers. It is difficult for organizations - especially
    smaller to mid-sized businesses - to build the kind of data-driven infrastructure
    that will enable them to handle big data effectively. Doing so could literally
    require hundreds of computer servers with huge banks of data storage and highly
    efficient data retrieval tools. In addition, a high level of cybersecurity is
    necessary to protect the integrity of the data.

    For many businesses, these requirements mean that they are going outside the organization
    to have these needs met. Cloud computing has made this possible, and many of the
    world’s largest companies are offering accessible cloud computing resources that
    are cost-effective, fast, and easily used to'
- md: 'store and retrieve data on a 24/7 basis. Providers of such services include
    Amazon, Microsoft, and Google. These companies offer several levels of cloud services
    that can be tailored to fit the needs of any business size, from a one-person
    operation running as a home business up to a large corporation - or even government
    entity. For example, Amazon’s Simple Storage Service, known as Amazon S3, can
    be used by businesses of any size for low-cost cloud computing services.


    Companies that can deploy their own big data systems can utilize open source tools
    to get the job done. This includes using Apache tools such as Hadoop and Spark,
    along with MapReduce. Careful considerations must be made. Handling the job internally
    will keep the data under the direct control of the company. However, this will
    entail having to build out or rent massive computer storage capacity that must
    be maintained on a 24/7 basis. That will also require a robust set of information
    security measures to ensure the integrity of the data and protect it from hacking,
    corruption, and other problems. This will also require hiring a large amount of
    staffing. Even though many larger businesses might have the capacity to implement
    their own completely internal big data strategy, it’s not clear that doing so
    is always the best way forward. This decision will have to be made by each organization.
    However, the fact that established companies like Microsoft and IBM are available
    for providing infrastructure and services that are already thoroughly tested and
    robust makes outsourcing these tasks a viable and more cost-effective option.


    By utilizing third-party services, you can massively reduce the cost of implementing
    a big data strategy. Big data capabilities will be provided for you by established
    companies that have already developed massive computer infrastructure for storing,
    maintaining, and securing data. Third-party sources like IBM, Google, and Microsoft
    may also be able to assist with analysis.


    Once the collection, storage, and retrieval problems are solved, systems must
    be put in place to make sense of the data. By itself, the data is useless. To
    be used for the kind of data-driven decision making that business intelligence
    entails, the patterns, relationships, and trends in the data must be discovered
    and put in a presentable form for human analysis. These steps will involve the
    use of data science and machine learning. This is another step where a company
    will have to decide whether it wants to do this internally or outsource the task.


    There are several arguments that can be made for outsourcing the task for small
    and mid-sized businesses. Many companies like IBM have a long history of developing
    artificial intelligence and machine learning tools, and they are making their
    capabilities available as business services they are providing for clients at
    an effective cost. IBM has been a leader in this area since artificial intelligence
    first became a field, so you know you are getting high levels of reliability.
    This is not a recommendation for or against IBM, but rather to let you know that
    these types of services are available. They are also available from other large
    companies like Microsoft, Facebook, and Google, as well as from many newer and
    startup companies.


    Many large corporations are doing this internally. Southwest Airlines is one example.


    Either way, a part of your big data strategy is going to include developing a
    data science team. If you outsource your big data analysis, you may still need
    an internal data scientist to collaborate with third-party teams to get the most
    out of the data. Data scientists can be hired internally, or you can work with
    contract providers.


    Machine learning tools for doing data analysis is also available for internal
    use, and you can hire data scientists to develop their own tools. Depending on
    your specific needs, there may be off-the-shelf software tools that you can use,
    and they are already proven to be reliable and effective. For this reason, you
    may not necessarily want to hire a team of data scientists to develop your own
    internal tools. Of course, if the expense can be managed and there are special
    needs in a company that cannot be addressed by off-the-shelf components, this
    can be an option to pursue as a part of your big data strategy. Another alternative
    is to utilize existing services from companies like IBM, Google, and Microsoft
    to turn your big data into insights that can be incorporated into business intelligence.


    The final part of a big data strategy is engaging in data-driven decision making
    based on the actionable insights that have been derived from this process. This
    is going to become a central part of the business process, operation, and organization.
    This is because it is a continuous process. Machine learning is not a one-time
    event; it is going on constantly as large volumes of data continue to be collected.
    It operates in this way to be able to provide new insights often on a real-time
    basis after the infrastructure has been established.


    In each case, the actionable insights provided by this process are going to provide
    a basis for business intelligence as well as provide inputs for business intelligence.
    Human insight and ingenuity will be brought to bear in many cases. Not every insight
    is going to have an equal value to the enterprise. Therefore, all the existing
    components of business intelligence will have to be applied in order to determine
    which actions can and should be taken by the organization. Issues such as cost-effectiveness
    are going to be central, as well as the ability of the company to carry out each
    action from a practical standpoint. The allocation of limited resources to different
    possible actions is another factor. The leaders of the business at all levels
    of management will have to weigh each possible action against others. This is
    nothing new, and businesses may have to forgo some actionable insights even if
    they are valuable in favor of others that are going to be impactful and be more
    cost-effective. The situation will have to be evaluated and re-evaluated on a
    consistent basis as more data continues to come in. Not all possible actions that
    come out of the application of machine learning and AI to big data are going to
    require the input of humans. In many cases, these systems will be operating autonomously
    and without human input, other than a periodic review. Examples of these types
    of applications include cybersecurity and fraud detection in financial matters.


    ## Harvesting Data


    Raw data can be collected from disparate sources such as social media platforms,
    computers, cameras, other software applications, company websites, and even third-party
    data providers. The big data analysis inherently requires large volumes of data,
    the majority of which is unstructured with a limited amount of structured and
    semi-structured data.


    ## Chapter 10: Neural Networks


