    customers of different ages, genders, or living in different locations, or working
    at different types of jobs, will respond in different ways to inducements offered
    to retain the customer.


    This type of analysis will allow the company to tailor it’s responses to each
    additional customer, improving the odds that they can keep the customer. The customers
    themselves will be happier, feeling that the company is responsible for their
    personal needs. The data will also help the company anticipate future market changes
    and help them adapt using predictive analytics.


    # Robotics


    Using machine learning to develop better and more capable robotics is a huge area
    of inquiry. Robotics started out simple, performing rote tasks that don’t require
    a huge amount of thought. For example, in the 1980s robotics were introduced on
    assembly lines to put in a screw or do some other task. The problem then was simple,
    the robot would perform a small number of exact, rote tasks that could be pre-programmed.


    Now robotics are becoming more sophisticated, using cognitive systems to perform
    many tasks that are tedious but were once thought to be something that only human
    beings could do. For example, recently robots have been developed that can work
    as fast food cooks. This is going to have major implications for unskilled labor,
    because there are two factors at play in the'
  - '[PAGE 351]


    current environment. Activism is pushing up wages for hourly employees doing unskilled
    labor, while the costs of robotics that can perform the same tasks are dropping.
    Moreover, the abilities of the robots to perform these tasks continually improve.


    A breakeven point is going to be reached. That is the cost of buying and operating
    a robot will be less than the costs of hiring a human employee. The robot will
    never waver in efficiency, it won’t require the payment of employment taxes, and
    it’s never going to file a lawsuit or allege discrimination. From the employer’s
    perspective, automation is going to be preferable and this trend probably can’t
    be stopped.


    Over the past year, many sophisticated robots have been revealed to the public.
    Boston Dynamics, for example, has built robots that can work in warehouses. They
    are able to identify packages that need to be moved, pick them up, and then place
    them where they need to be. At the present time, the only thing preventing widespread
    adaptation of this type of technology is cost.


    A working robot like this has to be able to interact with the environment that
    it is in, in addition to performing the required task. This means that a sophisticated
    computer system has to be in place in the robot that includes many machine learning
    systems. The machine learning systems will include movements required to perform
    the task, and the ability to avoid running into someone or another robot. Another
    form of artificial intelligence, computer vision, plays a significant role in
    the development of robotics, helping it to identify objects (and people) that
    are in the robot’s environment.


    Since modern robotics is using machine learning, the ability of the robots to
    do their jobs and navigate the environments they are in will improve with time.'
  - '[PAGE 352]


    # Chapter 5: Data Mining Techniques


    Data mining can be defined as a process for discovering patterns, associations,
    changes and events in the data. The patterns discovered must make sense and lead
    to some advantages, usually leading to those advantages in economics. Useful patterns
    should allow us to predict new data easily. Data mining is very widespread in
    the information industry, mainly because of the large amount of data and the immediate
    need to provide this data. Obtained samples can be used for applications that
    allow us to analyze, detect fraud, control production, and conduct research ourselves.


    Data mining and machine learning are two distinct but related fields. Machine
    learning provides the technical basis for data mining; it presents methods by
    which we extract patterns from data in specific collections. So, with machine
    learning, we teach computers how to handle data and predict what will happen to
    data. With data mining, however, we gain new knowledge, not just forecasting.


    We know many different techniques of data mining. Below, we briefly describe the
    techniques used in data mining tasks.


    # Decision Trees


    The very beginnings of decision trees date back to the 1960s. The real flourishing
    of the application, however, reached the decision trees a little later in 1986
    when Quinlan introduced the ID3 algorithm, which of course he further upgraded,
    refined, and renamed to C4.5. The latest version is called C5.0 / See5, which
    is two programs that can be used to build decision trees. It is designed for two
    operating systems, UNIX and Windows. Quinlan, because of its great work, is considered
    to be the first to use a decision tree.


    Decision trees are a very popular method, both for classification and for predicting
    events. They are symbolic methods of machine learning and allow for quick understanding
    and learning. Their structure is tree-shaped. It is used to subdivide a large
    number of records into smaller sets (classes) that are sequenced in a certain
    order.


    Decision trees can be thought of as a series of successive questions that aim
    to classify a record. Each question is followed by a new question, which'
  - '[PAGE 353]


    depends on the previous answer. This process lasts until we determine which group
    the particular record belongs to. A series of these questions and answers can
    be graphically depicted as an inverted decision tree. It is composed of:


    +   - Root node - does not have any input signal and does not have any output
    signal or has multiple output signals;

    - Internal node - has one input signal and two or more output signals;

    - Terminal node - has exactly one input signal and no output.


    The record enters the decision tree at the source node. A test is made here to
    determine which inner node the record will enter. Different algorithms are used
    for this test, but the principle is always the same: choose the test that best
    discriminates between the target classes. This process is repeated until the record
    reaches the final node. Each path from the source to the final node is unique
    and represents a rule that is then used for classification. All records ending
    in the same end node belong to the same class.


    The decision tree consists of the root or node at the top of the tree and the
    individual, internal nodes, branches, and leaves. The inner nodes are labeled
    with attribute names and contain some condition that divides the learning set
    into smaller sets. The branches or links that are marked with possible values
    for the attribute are a subset of the attribute values. The leaves are outer nodes
    that correspond to the classes. The path from the root to a leaf corresponds to
    one decisive rule. The choice of attributes depends on the multitude of learning
    patterns, the circumstances, the ability to perform measurements. A decision is
    an event that will happen in the near future if we decide on it. With decision
    trees, we can try to predict an event that will occur when a decision is made,
    or with it, we can find the other most optimal options to reach our goals. With
    them, we are creating ever easier rules that work in as many patterns as possible,
    and we must remember that we do not become too general.


    The decision tree can be built with the help of a learning crowd consisting of
    some patterns. The properties of the samples are described by a multitude of attributes
    or with the attributes and classes they belong to (outcome). In this case, one
    teaching sample is considered to belong to one class. When constructing, we must
    also keep in mind that multiple patterns that are'
- md: '## Decision Trees


    A decision tree is a model that uses a set of rules to classify data. The process
    of building a decision tree is called induction. The tree is built by recursively
    splitting the data based on attribute values. The goal is to create a model that
    can predict the class of a new instance.


    There are several different types of decision trees, among which we will mention
    the most famous binary decision tree and the regression decision tree. We recognize
    a binary decision tree, where each internal node has exactly two successors. Any
    "ordinary" decision tree can be converted to a binary. They provide us with better
    classification accuracy.


    Regression trees use both continuous and discrete attributes, the number of which
    must be known in advance. The algorithm for constructing regression trees is very
    similar to the algorithm for constructing ranking decision trees. Such trees can
    be used to determine the value of the dependent instance variable of new cases.
    Alternatively, we can build a binary regression tree that allows us to evaluate
    the attributes for the variance difference. This produces smaller trees, which
    in turn give us better accuracy.


    The decision tree could be briefly said to be like a flowchart with flow blocks.
    One disadvantage is that decision trees are very difficult to edit when the data
    volume increases, and the number of branches is too large. We know of a large
    number of different tools that are specialized in the construction of decision
    trees, such as Weka, See5, Gattree, which we will describe later. There are, of
    course, many other tools.


    ## Bayes Classifier


    The Bayes classifier is one of the statistical classifiers. These work by predicting
    the likelihood that an individual record belongs to a particular class. The Bayes
    classifier uses the Bayes theorem as its basis.


    The Bayesian theorem is named after its inventor, Thomas Bayes. Bayes was a British
    mathematician and Presbyterian monk who lived in London in the 18th century. He
    wrote his findings on probability in the paper "Essay towards Solving a Problem
    in the Doctrine of Chances," published two years after his death (International
    Society for Bayesian Analysis, 2009).


    Two methods are used in practice:


    - The naive Bayesian classification assumes that the influence of attributes on
    a record class is independent of other attribute values of the same record. This
    assumption is made to simplify the amount of conversion required. Because of this
    assumption, we also say that this classifier is naive.

    - Bayesian belief networks are graphical models that, in contrast to the previous
    method, also take into account the dependencies between the variables.


    ## Classification Rules


    Rule-based classification is a technique based on the rules of type IF-THEN. IF
    the part expresses the conditions that must be met (e.g., age = 29, number of
    children = 4), then the part represents the "consequences" of this rule (e.g.,
    married = yes). An example of this rule if - then, would be:

    IF age = 29 AND number of children = 4 THEN married = yes


    Commonly, there are two ways of obtaining classification rules:


    - A rule derived from decision trees works by first summarizing rules from decision
    trees and then removing rules that do not improve the accuracy of the rule. This
    is done using the C4.5 algorithm.

    - Rules obtained by sequential covering algorithm. The algorithm works by creating
    a rule (in the direction general -> specific) for the records that match it. Then
    these rows are removed from the data set, and the process is repeated until the
    records run out. The most popular algorithms are CN2, AQ, and RIPPER.


    ## Random Forests


    Random forest is a versatile machine learning method that can perform prediction
    and classification tasks. It also addresses missing values, extreme values, the
    importance of variables, and other essential data mining steps. The forest chooses
    the classification that has the most votes (more than the other trees in the forest)
    and, in the case of regression, uses the average of the results of the different
    trees. The Random Forest method can work with thousands of input variables, identifying
    the most important ones. Because of this, it falls under dimension reduction methods
    (dimension reduction means eliminating irrelevant input variables). Cases of use:


    - Customer switching to competing mobile operators (people with certain characteristics
    and usage patterns).

    - Prediction of stock movements (forecasting by market, past growth, value of
    other shares, etc.).


    Positive features of use are the effective performance on large amounts of data
    and the good estimation of missing values. Negative features: Unlike the decision
    trees, the results are difficult to interpret. Also, the frequency of cases of
    overlap.


    ## Support Vector Method


    The first SVM research was published in 1992, and its design dates back to 1960.
    SVM is a new method that has received a lot of attention lately. The expert public
    is enthusiastic about this method mainly because of its ability to form complex
    nonlinear and multidimensional planes that delineate groups of objects perfectly.
    Another advantage is that they give a concise description of the model obtained.
    A major disadvantage of the SVM method is that it takes a very long time to train
    them and require a lot of processing power.


    SVM is a controlled learning algorithm that is used for both classification and
    prediction. SVM works by creating a hyperplane or multiple hyperplanes in a multidimensional
    space, delimiting individual groups. The plane delimiting the two groups delimits
    them so that there is a maximum distance (W) between them. In this way, overfitting
    is minimized. The concept is shown in the figure below in two-dimensional space.


    The SVM model presents the data as points in space, arranged so that the cases
    of the separated categories are divided by a clear distance as wide as possible.
    The method performs well in prediction, redundancy removal, and classification.
    Examples of use:


    - Face recognition (on which part of the image is the face).

    - Classification of images.

    - Bioinformatics (protein classification).

    - Handwriting recognition.


    Positive features of use: are the efficiency in multiple spaces and memory efficiency.
    Negative ones are the Poor performance on large amounts of data and overlapping
    target classes.


    ## Neural Networks


    Neural networks were conceptually designed in 1943 by neuropsychologist Warren
    McCulloch and logician Walter Pitts to try to explain how a neuron works in the
    human body. Although their purpose was to explain the functioning of the human
    brain, this model has been shown to offer a new approach to problem-solving outside
    of neurobiology. In the 1950s, perceptrons were developed, the design of which
    was based on the work of McCulloch and Pitts. They had some success in the lab
    with them but generally did not live up to their expectations. The reasons for
    this were the very low capacity of the computers of the time, as well as the theoretical
    shortcomings of these simple neural networks. These deficiencies were eliminated
    in 1982 by John Hopfield with a new way of learning neural networks. He called
    it "backpropagation," which could be explained as reverse or backward learning.
    "Backward learning" is a way of updating weights at higher levels before updating
    weights at lower levels. This procedure allows us to use a higher-level neuron
    error to evaluate a lower-level neuron error.


    The discovery of "learning backward" triggered a renaissance in neural network
    exploration. In the 1980s, their use moved from laboratories to commercial areas,
    which were used almost everywhere. Some examples of use include real-time detection
    of credit card fraud, identifying numbers written on checks, evaluating real estate
    values, detecting patients'' illnesses, and the like.


    The advantages of neural networks are:


    - We can handle a wide range of problems. They are very flexible.

    - They also perform well in complex areas.

    - Can use continuous and discrete variables.

    - They are very widespread and easily accessible. They are found in almost all
    commercial data mining applications.


    Neural networks are very flexible. They can be used to predict continuous variables
    - in this case, they perform prediction, but we can use them to predict discrete
    variables - in this case, they perform classification. If we rearrange the neurons
    in the network a little, neural networks can be used to detect groups in the data.


    Neural networks do well with continuous and discrete variables as input or output.
    A lot of work, however, has to be invested in data preparation. Because neural
    networks only work with numbers from 0 to 1, all variables must be reduced to
    this form.'
  mdcn: '## 决策树


    决策树是一种使用一组规则对数据进行分类的模型。构建决策树的过程称为归纳。该树通过基于属性值递归地分割数据来构建。目标是创建一个能够预测新实例类别的模型。


    有几种不同类型的决策树，其中我们将提到最著名的二元决策树和回归决策树。我们识别二元决策树，其中每个内部节点恰好有两个后继节点。任何“普通”决策树都可以转换为二元决策树。它们为我们提供了更好的分类准确性。


    回归树同时使用连续和离散属性，其数量必须预先已知。构建回归树的算法与构建排序决策树的算法非常相似。此类树可用于确定新案例的因变量实例的值。或者，我们可以构建一个二元回归树，允许我们评估属性的方差差异。这会产生更小的树，进而为我们提供更好的准确性。


    决策树可以简要地说是像带有流程块的流程图。一个缺点是，当数据量增加且分支数量过多时，决策树非常难以编辑。我们知道有许多不同的工具专门用于构建决策树，例如 Weka、See5、Gattree，我们将在后面描述。当然，还有许多其他工具。


    ## 贝叶斯分类器


    贝叶斯分类器是统计分类器之一。这些分类器通过预测单个记录属于特定类别的可能性来工作。贝叶斯分类器使用贝叶斯定理作为其基础。


    贝叶斯定理以其发明者托马斯·贝叶斯命名。贝叶斯是一位生活在18世纪伦敦的英国数学家和长老会修士。他在去世两年后发表的论文《机会学说中一个问题的求解》中写下了他的概率研究发现（国际贝叶斯分析学会，2009）。


    实践中使用两种方法：


    - 朴素贝叶斯分类假设属性对记录类别的影响独立于同一记录的其他属性值。做出此假设是为了简化所需的转换量。由于这个假设，我们也说这个分类器是朴素的。

    - 贝叶斯信念网络是图形模型，与前一种方法相反，它们还考虑了变量之间的依赖关系。


    ## 分类规则


    基于规则的分类是一种基于 IF-THEN 类型规则的技术。IF 部分表示必须满足的条件（例如，年龄 = 29，子女数量 = 4），THEN 部分表示此规则的“后果”（例如，已婚
    = 是）。此规则 if - then 的一个示例将是：

    IF 年龄 = 29 AND 子女数量 = 4 THEN 已婚 = 是


    通常，有两种获取分类规则的方法：


    - 从决策树派生的规则通过首先从决策树中总结规则，然后删除那些不会提高规则准确性的规则来工作。这是使用 C4.5 算法完成的。

    - 通过顺序覆盖算法获得的规则。该算法通过为匹配它的记录创建一个规则（从一般到具体的方向）来工作。然后从数据集中删除这些行，并重复该过程，直到记录用完。最流行的算法是
    CN2、AQ 和 RIPPER。


    ## 随机森林


    随机森林是一种通用的机器学习方法，可以执行预测和分类任务。它还处理缺失值、极端值、变量重要性以及其他基本的数据挖掘步骤。森林选择获得最多票数（多于森林中的其他树）的分类，在回归的情况下，使用不同树结果的平均值。随机森林方法可以处理数千个输入变量，识别最重要的变量。因此，它属于降维方法（降维意味着消除不相关的输入变量）。使用案例：


    - 客户转向竞争移动运营商（具有特定特征和使用模式的人）。

    - 股票走势预测（根据市场、过去增长、其他股票价值等进行预测）。


    使用的积极特征是在大数据量上的有效性能和对缺失值的良好估计。负面特征：与决策树不同，结果难以解释。此外，重叠案例的频率较高。


    ## 支持向量方法


    第一项 SVM 研究发表于 1992 年，其设计可追溯到 1960 年。SVM 是一种最近备受关注的新方法。专家界对这种方法充满热情，主要是因为它能够形成复杂的非线性和多维平面，完美地划分对象组。另一个优点是它们提供了所获模型的简洁描述。SVM
    方法的一个主要缺点是训练它们需要很长时间，并且需要大量的处理能力。


    SVM 是一种监督学习算法，用于分类和预测。SVM 通过在多维空间中创建一个或多个超平面来工作，以分隔各个组。分隔两个组的平面将它们分隔开，使得它们之间存在最大距离（W）。通过这种方式，过拟合被最小化。该概念在下图中以二维空间展示。


    SVM 模型将数据表示为空间中的点，排列方式使得分离类别的案例被尽可能宽的清晰距离分开。该方法在预测、冗余消除和分类方面表现良好。使用示例：


    - 人脸识别（图像的哪个部分是人脸）。

    - 图像分类。

    - 生物信息学（蛋白质分类）。

    - 手写识别。


    使用的积极特征：在多空间中的效率和内存效率。负面特征是在大数据量和重叠目标类别上的性能不佳。


    ## 神经网络


    神经网络在概念上由神经心理学家沃伦·麦卡洛克和逻辑学家沃尔特·皮茨于 1943 年设计，试图解释人体中神经元的工作方式。尽管他们的目的是解释人脑的功能，但该模型已被证明为神经生物学之外的问题解决提供了一种新方法。在
    1950 年代，感知器被开发出来，其设计基于麦卡洛克和皮茨的工作。他们在实验室中取得了一些成功，但总体上没有达到预期。原因在于当时计算机的极低容量以及这些简单神经网络的理论缺陷。这些缺陷在
    1982 年被约翰·霍普菲尔德通过一种新的神经网络学习方法消除。他称之为“反向传播”，可以解释为反向或向后学习。“向后学习”是一种在更新较低级别权重之前更新较高级别权重的方法。此过程允许我们使用较高级别神经元的错误来评估较低级别神经元的错误。


    “向后学习”的发现引发了神经网络探索的复兴。在 1980 年代，它们的使用从实验室转移到商业领域，几乎无处不在。一些使用示例包括实时检测信用卡欺诈、识别支票上书写的数字、评估房地产价值、检测患者的疾病等。


    神经网络的优点是：


    - 我们可以处理广泛的问题。它们非常灵活。

    - 它们在复杂领域也表现出色。

    - 可以使用连续和离散变量。

    - 它们非常普遍且易于获取。它们几乎存在于所有商业数据挖掘应用中。


    神经网络非常灵活。它们可用于预测连续变量——在这种情况下，它们执行预测，但我们可以用它们来预测离散变量——在这种情况下，它们执行分类。如果我们稍微重新排列网络中的神经元，神经网络可用于检测数据中的组。


    神经网络在处理连续和离散变量作为输入或输出方面表现良好。然而，需要投入大量工作进行数据准备。因为神经网络只处理 0 到 1 之间的数字，所以所有变量都必须简化为此形式。'
