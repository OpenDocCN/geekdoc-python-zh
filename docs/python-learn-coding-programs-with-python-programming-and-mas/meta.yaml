    - keys(): Return a new view of the dictionary’s keys.

    - pop(key[,d]): Remove the item with a key and return its value or return ‘d’
    if the key is not found. If d is not provided and the key is not found, raises
    KeyError.

    - popitem(): Remove and return an arbitrary item (key, value). Raises KeyError
    if the dictionary is empty.

    - setdefault(key[,d]): If the key is in the dictionary, return its value. If not,
    insert key with a value of d and return d (defaults to None).

    - update([other]): Update the dictionary with the key/value pairs from other,
    overwriting existing keys.

    - values(): Return a new view of the dictionary’s value.


    There are also some embedded functions that can be used with a dictionary.


    - all(): Return True if all keys of the dictionary are true (or if the dictionary
    is empty).

    - any(): Return True if any key of the dictionary is true. If the dictionary is
    empty, return False.

    - len(): Return the length (the number of items) in the dictionary.

    - cmp(): Compares items of two dictionaries.

    - sorted(): Return a new sorted list of keys in the dictionary.


    ## Chapter 2: Deep Dive on Python Tuples


    ## Tuple in Python


    A tuple is like a list, but we cannot change elements in a tuple. This is one
    of the main differences that we will see with the tuple versus the list when we
    work in the Python language, and other coding languages as well.


    For example, when we work with a list, we have different items that are available
    in the code, and we are able to change them, even when we execute the code. This
    is a benefit of the list; if you want to be able to change up some of the items
    and not have them set there for a long time, then you would want to work with
    the list.


    On the other hand, the tuple is going to look similar in syntax to what we see
    with a list. But the elements are not changeable at all. If you want to work with
    an option that will keep the elements the same all of the time, once you are done
    putting them in place, then the tuple is going to be the best option for you.


    Example:

    Start IDLE.

    Navigate to the File menu and click New Window.

    Type the following:


    ```

    tuple_mine = (21, 12, 31)

    print(tuple_mine)

    tuple_mine = (31, "Green", 4.7)

    print(tuple_mine)

    ```


    ## Accessing Python Tuple Elements


    ```

    tuple_mine=[''t'',''r'',''o'',''g'',''r'',''a'',''m'']

    print(tuple_mine[1])#output:''r''

    print(tuple_mine[3])#output:''g''

    ```


    ## Negative Indexing


    Just like lists, tuples can also be indexed negatively.

    Like lists, -1 refers to the last element on the list and -2 refer to the second
    last element.

    Example:


    Start IDLE.

    Navigate to the File menu and click New Window.

    Type the following:


    ```

    tuple_mine=[''t'',''r'',''o'',''g'',''r'',''a'',''m'']

    print(tuple_mine[-2])#the output will be ''a''

    ```


    ## Slicing


    The slicing operator, the full colon is used to access a range of items in a tuple.

    Example:


    Start IDLE.

    Navigate to the File menu and click New Window.

    Type the following:


    ```

    tuple_mine=[''t'',''r'',''o'',''g'',''r'',''a'',''m'']

    print(tuple_mine[2:5])#Output: ''o'',''g'',''r'',''a''

    print(tuple_mine[:-4])#''g'',''r'',''a'',''m''

    ```


    Important

    Tuple elements are immutable meaning they cannot be changed. However, we can combine
    elements in a tuple using +(concatenation operator). We can also repeat elements
    in a tuple using the * operator, just like lists.

    Example:

    Start IDLE.

    Navigate to the File menu and click New Window.

    Type the following:


    ```

    print((7,45,13)+(17,25,76))

    print(("Several",)*4)

    ```


    Since we cannot change elements in a tuple, we cannot delete the elements too.
    However, removing the full tuple can be attained using the keyword del.


    Example:

    Start IDLE.

    Navigate to the File menu and click New Window.

    Type the following:


    ```

    t_mine=[''t'',''k'',''q'',''v'',''y'',''c'',''d'']

    del t_mine

    ```


    ## Inbuilt Python Functions with Tuple


    | Method | Description | Method | Description |

    |---|---|---|---|

    | enumerate() | Return an enumerate object. It contains the index and value of
    all the items of a tuple as pairs. | tuple() | Convert an iterable to a tuple.
    |

    | sorted() | Take elements in the tuple and return a new sorted list(does not
    sort the tuple itself) | max() | Return the largest element in the tuple. |

    | all() | Return True if all elements of the tuple are true(or if the tuple is
    empty). | sum() | Return the sum of all elements in the tuple. |

    | len() | Return the length(the number of items) in the tuple. | min() | Return
    the smallest item in the tuple. |

    | | | any() | Return True if any element of the tuple is true. If the tuple is
    empty, return False. |


    ## Escape Sequences in Python


    The escape sequences enable us to format our output to enhance clarity to the
    human user. A program will still run successfully without using escape sequences,
    but the output will be highly confusing to the human user. Writing and displaying
    output in expected output is part of good programming practices. The following
