  md: '# Chapter 3: Sets in Python


    # Sets


    A Python set is an unordered collection containing unique items. While sets are
    mutable, meaning that we can add items to them and remove items, each item must
    itself be immutable. One important thing about sets is that you cannot have any
    duplicate items in them. We usually use sets to do mathematical operations, like
    union, intersection, complement, and difference.

    Unlike a sequence type, a set type doesn’t provide any slicing or indexing operations.
    The values do not have any keys associated with them as the dictionaries do. Python
    contains two types of sets – mutable set and immutable frozenset. Each type of
    set is created the same way with a set of curly braces containing values each
    separated by a comma. An empty set using the curly braces cannot be created though
    as a={} will create a dictionary! Empty sets are created by using a=set() or a=frozenset().

    Below are the methods and the operations for sets:


    len(s)

    will return how many elements are in (s)


    s.copy()

    will return a shallow copy of (s)


    s.difference(t)

    will return a set containing the items in ( s) but not (t)


    s.intersection(t)

    will return a set containing the items in both (s) and (t)


    s.isdisjoint(t)

    will return True if there are no common items between (s) and (t)


    s.issubset(t)

    will return True if the contents of (s) are in (t)'
