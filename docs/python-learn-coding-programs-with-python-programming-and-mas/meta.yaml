    ## Chapter 6: Operators in Python


    ### 1. Arithmetic Operators


    These are operators that have the ability to perform mathematical or arithmetic
    operations that are going to be fundamental or widely used in this programming
    language, and these operators are in turn subdivided into:


    1.1. Sum Operator: its symbol is (+), and its function is to add the values of
    numerical data. Its syntax is written as follows:


    ```

    6 + 4

    10

    ```


    1.2 Subtract Operator: its symbol is the (-), and its function is to subtract
    the values of numerical data types. Its syntax can be written like this:


    ```

    4 - 3

    1

    ```


    1.3 Multiplication Operator: Its symbol is (*), and its function are to multiply
    the values of numerical data types. Its syntax can be written like this:


    ```

    3 * 2

    6

    ```


    1.4 Division Operator: Its symbol is (/); the result offered by this operator
    is a real number. Its syntax is written like this:


    ```

    3.5 / 2

    1.75

    ```


    1.5 Module Operator: its symbol is (%); its function is to return the rest of
    the division between the two operators. In the following example, we have that
    division 8 is made between 5 that is equal to 1 with 3 of rest, the reason why
    its module will be 3.

    Its syntax is written like this:


    ```

    8 % 5

    3

    ```


    1.6 Exponent Operator: its symbol is (**), and its function is to calculate the
    exponent between numerical data type values. Its syntax is written like this:


    ```

    3 ** 2

    9

    ```


    1.7 Whole Division Operator: its symbol is (//); in this case, the result it returns
    is only the whole part.

    Its syntax is written like this:


    ```

    3.5 // 2

    1.0

    ```


    However, if integer operators are used, the Python language will determine that
    it wants the result variable to be an integer as well, this way you would have
    the following:


    ```

    3 / 2

    3 // 2

    ```


    If we want to obtain decimals in this particular case, one option is to make one
    of our numbers real. For example:


    ```

    3.0 / 2

    ```


    ### 2. Comparison Operators


    The comparison operators are those that will be used to compare values and return;
    as a result, the True or False response as the case may be, as a result of the
    condition applied.


    2.1 Operator Equal to: its symbol is ( == ), its function is to determine if two
    values are exactly the same.

    For example:


    - 3 == 3

    - True

    - 5 == 1

    - False


    2.2 Operator Different than: its symbol is ( != ); its function is to determine
    if two values are different and if so, the result will be True. For example:


    - 3 != 4

    - True

    - 3 != 3

    - False


    2.3 Operator Greater than: its symbol is ( > ); its function is to determine if
    the value on the left is greater than the value on the right and if so, the result
    it yields is True. For example:


    - 5 > 3

    - True

    - 3 > 8

    - False


    2.4 Operator Less than: its symbol is ( < ); its function is to determine if the
    left value is less than the right one, and if so, it gives True result. For example:


    - 3 < 5

    - True

    - 8 < 3

    - False


    2.5 Operator ( >= ), its function is to determine that the value on the left is
    greater than the value on the right, if so the result returned is True. For example:


    - 8 >= 1

    - True

    - 8 >= 8

    - True

    - 3 >= 8

    - False


    2.6 Operator ( <= ), its function is to evaluate that the value on its left is
    less than the one on the right, if so the result returned is True. For example:


    - 8 <= 10

    - True

    - 8 <= 8

    - True

    - 10 <= 8

    - False


    ### 3. Logical Operators


    Logical operators are the *and, or, not* . Their main function is to check if
    two or more operators are true or false, and as a result, returns a True or False.
    It is very common that this type of operator is used in conditionals to return
    a Boolean by comparing several elements.


    Making a parenthesis in operators, we have that the storage of true and false
    values in Python are of the bool type, and was named thus by the British mathematician
    George Boole, who created the Boolean algebra. There are only two True and False
    Boolean values, and it is important to capitalize them because, in lower cases,
    they are not Boolean but simple phrases. The semantics or meaning of these operators
    is similar to their English meaning, for example, if we have the following expression:


    X > 0 and x < 8, this will be true if indeed x is greater than zero and less than
    8.


    In the case of or, we have the following example:


    - N=12

    - N % 6 == 0 or n % 8 == 0

    - True


    It will be true if any of the conditions is indeed true, that is, if n is a number
    divisible by 6 or by 8.


    In the case of the logical operator not, what happens is that it denies a Boolean
    expression, so, if we have, for example:

    not ( x < y ) will be true if x < y is false, that is, if x is greater than y.


    ## Chapter 7: Strings Methods in Python


    There will almost certainly be times where you need to manipulate this string
    or that. Maybe you’ll need to get its length, or you’ll need to split it or make
    another string from it. Maybe you’ll need to read what character is at x position.
    Whatever the reason is, the point is that there’s a reason.

    The reason that we’re getting into this is that it opens us up to a broader discussion
    on the nature of objects that we’re going to go more in-depth later on, but in
    the meantime, we’re also going to be covering extremely useful methods that the
    Python language provides to be used with strings.

    Go ahead and create a new file. You can call it whatever you want. My file is
    going to be named strings.py. Uncreative name, sure, but we’re going to be getting
    creative with strings in this chapter, believe me.

    So what is a string, really? Well, we obviously know that a string is a line of
    text, which goes without saying. But what goes into that?

    We’ve spoken quite a bit in this list about lists. Lists are actually a form of
    another variable that’s largely eschewed in Python programming called an array.
    An array is a pre-allocated set of data that goes together, in the most basic
    terms of speaking.

    Python comes from and is built upon a language called C. In C, there are actually
    data types. There are data types in Python, too, but Python saves the user time
    by setting the data type for the programmer instead of having the programmer declare
    it.

    One of the data types in C was called a char, which was a single character. In
    terms of computer speak; there isn’t a native support for strings. Strings were
    simply arrays of characters. For example, if one wanted to make a string called
    “hello”, they would have done the following:


    ```c

    char hello[6] = { ‘h’, ‘e’, ‘l’, ‘l’, ‘o’, ‘\0’ };

    ```


    Python, in its beautiful habit of maximum abstraction, keeps us from these complexities
    and lets us just declare:


    ```python

    hello = “hello”

    ```


    The point is that strings, ultimately, are just sets of data. And like any set
    of data, they can be manipulated. There will be times, too, where we need to manipulate
    them.'
