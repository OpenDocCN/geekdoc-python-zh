    more. These are all questions that we are able to answer in this part of the guidebook
    to make things a bit easier.


    First, we need to see what data science is all about. Data science is going to
    be a blend of algorithms, tools, and principles that come with machine learning.
    And all of these different things come together with the intention of discovering
    covert patterns from the raw data. How is this going to be so much different than
    what we have seen statisticians doing for years now? The answer that we are going
    to get for this one is going to lie in the difference between predicting and explaining
    something.


    A data analyst is usually going to be that person who will explain what is taking
    place by preparing the history that comes with the data. But then a data scientist
    is a bit different because they are not only working through some of that exploratory
    analysis from above, but they are going to use a lot of different algorithms that
    are advanced in machine learning to help them figure out how likely a certain
    event in the future is. A data scientist is able to take that data and look at
    it from a variety of angles, and hopefully, see it from a few angles that were
    not even explored in the past.


    These are going to include the following:


    - The predictive causal analytics - This is the one we would want to use anytime
    that we have a model that can predict how likely an event will happen in the future.
    So, if you would like to provide someone with a loan on credit, you would want
    to use this kind of analytics to figure out how likely it is that the customer
    would make their payments in the future. We are able to build up a model that
    can perform these analytics based on how well that customer has made their payments
    in the past.


    - Then we can move on to a method that is known as prescriptive analytics. This
    is the one that we use if we want to work with a model that has the intelligence
    and the information that is needed to make its own verdict, and you still get
    the capacity to revise the model with your own dynamic criterions. This is a newer
    field and there are still some kinks that are being worked out with it, but it
    can often help us with getting advice and knowing what course of action to take
    out of several options that are available.


    - The third option that we are going to spend some time focusing on here is how
    we can work with machine learning to help us make some good predictions. If you
    are working with something like transactional data in the financial world, and
    you would like to build up a new model to determine the future trend that maybe
    there, then you will find that a few of the algorithms that work with machine
    learning will be the best.


    This is going to be a version of supervised learning because we have to provide
