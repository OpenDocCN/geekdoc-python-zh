  md: '# Understanding the Process of Collecting, Cleaning, Analyzing, Modeling and
    Visualizing Data


    To follow the correct process when embarking in a Data Science project is paramount.
    It requires multiple iterations. Arriving at the final result requires the data
    scientist to refine each of the steps based on the information uncovered. Let’s
    see what is the general process.


    **1. Definition of the problem or requirement**

    Often it is not clear what the need of the business is or we point the finger
    at something that is not the real problem and we seek (or try) solutions with
    very high efforts both in terms of costs and times.


    So in this phase the data scientist must confront those who are experiencing the
    problem in the business context and define it clearly and unequivocally.


    **2. Data collection**

    The data necessary to solve the problem may come from different sources such as
    all web channels, site and social networks, but also company archives, CRM, marketing
    campaigns in progress, presence on marketplaces or offline places, results at
    fairs and events , up to market and competitors analysis.


    **3. Data processing**

    In this phase, errors in the data are corrected, or they are simply segmented
    or filtered to obtain a significant basis on which to transform them to obtain
    useful information.


    **4. Creation and selection of the model**

    Before thinking about automatisms and applying machine learning, or rather an
    automatic learning system, it is necessary to make a human and manual transition.


    First of all, to have a greater knowledge of data and often also to perform a
    transition from big data to small data, you need to do a data mining activity.
    Activity that begins with identifying the relationships between the data, in order
    to then proceed with the real extraction of useful information also'
