- md: '## How to Delete a Python List?


    To remove a list element, you can use either the `del` statement if you know exactly
    which element(s) you are deleting or the `remove()` method if you do not know.


    Delete all the list:


    ```python

    >>> a=[2,3,4]

    >>> del a

    ```


    Delete one element of the list:


    ```python

    >>> a=[2,3,4]

    >>> del a[0]

    ```


    ## Python Tuple


    In Python, Tuples are collections of data types that cannot be changed but can
    be arranged in specific order. Tuples allow for duplicate items and are written
    within round brackets, as shown in the syntax below.


    ```python

    Tuple = ("string001", "string002", "string003")

    print (Tuple)

    ```


    Similar to the Python List, you can selectively display the desired string from
    a Tuple by referencing the position of that string inside square bracket in the
    print command as shown below.


    ```python

    Tuple = ("string001", "string002", "string003")

    print (Tuple[1])

    ```


    OUTPUT – ("string002")


    ## Accessing, Reassigning, and Deleting Items


    Unlike Python lists, you cannot directly change the data value of Python Tuples
    after they have been created. However, conversion of a Tuple into a List and then
    modifying the data value of that List will allow you to subsequently create a
    Tuple from that updated List. Let’s look at the example below:


    ```python

    Tuple1 = ("string001", "string002", "string003", "string004", "string005", "string006")

    List1 = list(Tuple1)

    List1[2] = "update this list to create new tuple"

    Tuple1 = tuple(List1)

    print(Tuple1)

    ```


    OUTPUT – ("string001", "string002", "update this list to create new tuple", "string004",
    "string005", "string006")


    You can also determine the length of a Python Tuple using the `len()` function,
    as shown in the example below:


    ```python

    Tuple = ("string001", "string002", "string003", "string004", "string005", "string006")

    print(len(Tuple))

    ```


    You cannot selectively delete items from a Tuple, but you can use the `del` keyword
    to delete the Tuple in its entirety, as shown in the example below:


    ```python

    Tuple = ("string001", "string002", "string003", "string004")

    del Tuple

    print(Tuple)

    ```


    OUTPUT – name ''Tuple'' is not defined


    You can join multiple Tuples with the use of the `+` logical operator.


    ```python

    Tuple1 = ("string001", "string002", "string003", "string004")

    Tuple2 = (100, 200, 300)

    Tuple3 = Tuple1 + Tuple2

    print(Tuple3)

    ```


    OUTPUT – ("string001", "string002", "string003", "string004", 100, 200, 300)


    You can also use the `tuple()` constructor to create a Tuple, as shown in the
    example below:


    ```python

    Tuple1 = tuple(("string001", "string002", "string003", "string004"))

    print(Tuple1)

    ```


    ## Python Set


    In Python, sets are collections of data types that cannot be organized and indexed.
    Sets do not allow for duplicate items and must be written within curly brackets,
    as shown in the syntax below:


    ```python

    set = {"string1", "string2", "string3"}

    print(set)

    ```


    Unlike the Python List and Tuple, you cannot selectively display desired items
    from a Set by referencing the position of that item because the Python Set are
    not arranged in any order. Therefore, items do not have any indexing. However,
    the `for` loop can be used on Sets (more on this topic later in this chapter).


    Unlike Python Lists, you cannot directly change the data values of Python Sets
    after they have been created. However, you can use the `add()` method to add a
