    These are going to include the following:

    The predictive causal analytics - This is the one we would want to use anytime
    that we have a model that can predict how likely an event will happen in the future.
    So, if you would like to provide someone with a loan on credit, you would want
    to use this kind of analytics to figure out how likely it is that the customer
    would make their payments in the future. We are able to build up a model that
