    ## Chapter 4: Introduction to Machine Learning Algorithms


    We will take a tour of the most popular machine learning. There are so many algorithms
    that it can feel overwhelming when algorithm names are thrown around and you are
    expected to just know what they are and where they fit.

    We want to give you two ways to think about and categorize the algorithms you
    may come across in the field.


    - The first is a grouping of algorithms by their **learning style**.

    - The second is a grouping of algorithms by their **similarity** in form or function
    (like grouping similar animals together).


    Both approaches are useful, but we will focus in on the grouping of algorithms
    by similarity and go on a tour of a variety of different algorithm types.


    ### Algorithms Grouped by Learning Style


    There are different ways an algorithm can model a problem based on its interaction
    with the experience or environment or whatever we want to call the input data.


    It is popular in machine learning and artificial intelligence textbooks to first
    consider the learning styles that an algorithm can adopt.


    There are only a few main learning styles or learning models that an algorithm
    can have and we’ll go through them here with a few examples of algorithms and
    problem types that they suit.


    This taxonomy or way of organizing machine learning algorithms is useful because
    it forces you to think about the roles of the input data and the model preparation
    process and select one that is the most appropriate for your problem in order
    to get the best result.


    **Let’s take a look at three different learning styles in machine learning algorithms:**


    ### Supervised Learning


    Input data is called training data and has a known label or result such as spam/not-spam
    or a stock price at a time.


    A model is prepared through a training process in which it is required to make
    predictions and is corrected when those predictions are wrong. The training process
    continues until the model achieves a desired level of accuracy on the training
    data. Example problems are classification and regression. Example algorithms include:
    Logistic Regression and the Back Propagation Neural Network.


    ### Unsupervised Learning


    Input data is not labeled and does not have a known result. A model is prepared
    by deducing structures present in the input data. This may be to extract general
    rules. It may be through a mathematical process to systematically reduce redundancy,
    or it may be to organize data by similarity. Example problems are clustering,
    dimensionality reduction and association rule learning. Example algorithms include:
    the Apriori algorithm and K-Means.


    ### Semi-Supervised Learning


    Input data is a mixture of labeled and unlabelled examples. There is a desired
    prediction problem but the model must learn the structures to organize the data
    as well as make predictions. Example problems are classification and regression.


    Example algorithms are extensions to other flexible methods that make assumptions
    about how to model the unlabeled data.


    ### Overview of Machine Learning Algorithms


    When crunching data to model business decisions, you are most typically using
    supervised and unsupervised learning methods. A hot topic at the moment is semi-supervised
    learning methods in areas such as image classification where there are large datasets
    with very few labeled examples.


