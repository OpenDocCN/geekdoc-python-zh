    will be happier, feeling that the company is responsible for their personal needs.
    The data will also help the company anticipate future market changes and help
    them adapt using predictive analytics.


    ## Robotics


    Using machine learning to develop better and more capable robotics is a huge area
    of inquiry. Robotics started out simple, performing rote tasks that don’t require
    a huge amount of thought. For example, in the 1980s robotics were introduced on
    assembly lines to put in a screw or do some other task. The problem then was simple,
    the robot would perform a small number of exact, rote tasks that could be pre-programmed.


    Now robotics are becoming more sophisticated, using cognitive systems to perform
    many tasks that are tedious but were once thought to be something that only human
    beings could do. For example, recently robots have been developed that can work
    as fast food cooks. This is going to have major implications for unskilled labor,
    because there are two factors at play in the current environment. Activism is
    pushing up wages for hourly employees doing unskilled labor, while the costs of
    robotics that can perform the same tasks are dropping. Moreover, the abilities
    of the robots to perform these tasks continually improve.


    A breakeven point is going to be reached. That is the cost of buying and operating
    a robot will be less than the costs of hiring a human employee. The robot will
    never waver in efficiency, it won’t require the payment of employment taxes, and
    it’s never going to file a lawsuit or allege discrimination. From the employer’s
    perspective, automation is going to be preferable and this trend probably can’t
    be stopped.


    Over the past year, many sophisticated robots have been revealed to the public.
    Boston Dynamics, for example, has built robots that can work in warehouses. They
    are able to identify packages that need to be moved, pick them up, and then place
    them where they need to be. At the present time, the only thing preventing widespread
    adaptation of this type of technology is cost.


    A working robot like this has to be able to interact with the environment that
    it is in, in addition to performing the required task. This means that a sophisticated
    computer system has to be in place in the robot that includes many machine learning
    systems. The machine learning systems will include movements required to perform
    the task, and the ability to avoid running into someone or another robot. Another
    form of artificial intelligence, computer vision, plays a significant role in
    the development of robotics, helping it to identify objects (and people) that
    are in the robot’s environment.


    Since modern robotics is using machine learning, the ability of the robots to
    do their jobs and navigate the environments they are in will improve with time.


    ## Chapter 5: Data Mining Techniques


    Data mining can be defined as a process for discovering patterns, associations,
    changes and events in the data. The patterns discovered must make sense and lead
    to some advantages, usually leading to those advantages in economics. Useful patterns
    should allow us to predict new data easily. Data mining is very widespread in
    the information industry, mainly because of the large amount of data and the immediate
    need to provide this data. Obtained samples can be used for applications that
    allow us to analyze, detect fraud, control production, and conduct research ourselves.


    Data mining and machine learning are two distinct but related fields. Machine
    learning provides the technical basis for data mining; it presents methods by
    which we extract patterns from data in specific collections. So, with machine
    learning, we teach computers how to handle data and predict what will happen to
    data. With data mining, however, we gain new knowledge, not just forecasting.


    We know many different techniques of data mining. Below, we briefly describe the
    techniques used in data mining tasks.


    ### Decision Trees


