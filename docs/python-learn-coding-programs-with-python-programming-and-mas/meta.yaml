    \ by creating a variable named family as shown below:\n\n```\nfamily = ['Smith',\
    \ 'Mary', 'Alicia', 'Elijah']\n```\n\nUsing the [] brackets, we provided the data\
    \ to this variable. Now, this specific variable holds more than one name within\
