    ## Chapter 1: Data Science Basics


    ### What is Data Science?


    Many definitions have been given for Data Science. We can think of Data Science
    as a combination of different algorithms, tools, and machine learning principles
    that aims to discover hidden patterns from the raw data. Data Science involves
    many disciplines and skills such as statistics, coding, business etc. We hear
    though, many buzzwords all around Data Science. Let’s try to clarify them.


    ![](img/eca0e55982f15b47b8758e8428ee4d3b_247_0.png)


    ### Data Analysis


    Data Analysis includes the most common way of using data. Typically running analysis
    to understand past events and the present.


    ### Predictive Analytics


    Predictive analytics encompass the use of techniques from machine learning, data,
    and statistical algorithms to help identify the likelihood of future outcomes
    based on data that is more historical. The goal is to go beyond what we know happened
    in the past to provide the best predictions and guess what will happen in the
    future.


    ### Artificial Intelligence


    Artificial intelligence is a technique that is used to make machines mimic any
    human behavior. The aim is to ensure that a machine can accurately and efficiently
    mimic any human behavior. Some examples of artificial intelligence machines include
    deep blue chess and IBM''s Watson.


    ### Machine Learning


    Machine Learning can be defined as part of artificial intelligence technology
    driven by the hypothesis that machines are capable of learning from data by identifying
    patterns and making decisions with little to no human assistance.


    ### Deep Learning


    Deep learning refers to a sub-branch of machine learning that involves algorithms
    that are motivated by the function and structure of the brain known as the artificial
    neural networks. This makes machines to do what is natural to humans, and that
    is, learn from the past. This is the system behind the idea of driverless cars.


    ![](img/eca0e55982f15b47b8758e8428ee4d3b_248_0.png)


    ### Understanding the Process of Collecting, Cleaning, Analyzing, Modeling and
    Visualizing Data


    To follow the correct process when embarking in a Data Science project is paramount.
    It requires multiple iterations. Arriving at the final result requires the data
    scientist to refine each of the steps based on the information uncovered. Let’s
    see what is the general process.


    **1. Definition of the problem or requirement**

    Often it is not clear what the need of the business is or we point the finger
    at something that is not the real problem and we seek (or try) solutions with
    very high efforts both in terms of costs and times.


    So in this phase the data scientist must confront those who are experiencing the
    problem in the business context and define it clearly and unequivocally.


    **2. Data collection**

    The data necessary to solve the problem may come from different sources such as
    all web channels, site and social networks, but also company archives, CRM, marketing
    campaigns in progress, presence on marketplaces or offline places, results at
    fairs and events, up to market and competitors analysis.


    **3. Data processing**

    In this phase, errors in the data are corrected, or they are simply segmented
    or filtered to obtain a significant basis on which to transform them to obtain
    useful information.


    **4. Creation and selection of the model**

    Before thinking about automatisms and applying machine learning, or rather an
    automatic learning system, it is necessary to make a human and manual transition.


    First of all, to have a greater knowledge of data and often also to perform a
    transition from big data to small data, you need to do a data mining activity.
    Activity that begins with identifying the relationships between the data, in order
    to then proceed with the real extraction of useful information also from individual
    actions carried out by people. Here a quote textual words from Martin Lindstrom
    whose book I recommend:


    > "While big data provides an infinite amount of impersonal information used to
    predict future orientations, only individual data can reveal the truth and lead
    to a true understanding of reality."


    **5. Presentation of the results**


    In this stage in addition to showing the results of your work, you can indulge
    yourself with creativity. This is a phase in which we take great responsibility,
    draw conclusions on the initial problem and suggest solutions or show opportunities.


    ### Why should you Learn Python for Data Science?


    The Python language is one of the best options to work with when it is time to
    handle the data science project that you would like to do. There are a ton of
    projects that you are able to handle with data science, and Python is able to
    take on even the more complex problems that you are trying to handle. There are
    many reasons why Python is going to be the best option to help you get all of
    this done, including:


    **Easy to learn.** This language, even though there are a lot of complexities
    that come with it, is easy for a lot of beginners to learn. If you are just beginning
    with coding to help out with data science and you are worried about getting started,
    you will find that Python is the perfect one to choose from. It is designed to
    be as easy to work with as possible, and even those who have never done anything
    with coding ever will find that working with Python is not as bad as it may seem
    in the beginning.


    **Choice of data science libraries.** There are a lot of special extensions and
    libraries available with Python that is perfect for data science and machine learning.
    Even though there is a lot that we are able to do when it comes to using the Python
    language to help out just with the standard library, there are also a number of
    libraries that work not only with Python, but also help us to get more done with
    data science at the same time.


    **Python community.** The community that comes with Python is going to help to
    make this a lot easier to work with. You will be able to find a bunch'
