    ### Installation Instructions for Python


    #### WINDOWS


    - 1. From the official Python website, click on the “Downloads” icon and select
    Windows.

    - 2. Click on the “Download Python 3.8.0” button to view all the downloadable
    files.

    - 3. On subsequent screen, select the Python version you would like to download.
    We will be using the Python 3 version under “Stable Releases.” So scroll down
    the page and click on the “Download Windows x86-64 executable installer” link,
    as shown in the picture below.


    - 1. A pop up window titled “python-3.8.0-amd64.exe” will be shown.

    - 2. Click on the “Save File” button to start downloading the file.

    - 3. Once the download has completed, double click the saved file icon, and a
    “Python 3.8.0 (64-bit) Setup” pop window will be shown.

    - 4. Make sure that you select the “Install Launcher for all users (recommended)”
    and the “Add Python 3.8 to PATH” checkboxes. Note – If you already have an older
    version of Python installed on your system, the “Upgrade Now” button will appear
    instead of the “Install Now” button, and neither of the checkboxes will be shown.

    - 5. Click on “Install Now” and a “User Account Control” pop up window will be
    shown.

    - 6. A notification stating, “Do you want to allow this app to make changes to
    your device” will be shown, click on Yes.

    - 7. A new pop up window titled “Python 3.8.0 (64-bit) Setup” will be shown containing
    a setup progress bar.

    - 8. Once the installation has been completed, a “Set was successful” message
    will be shown. Click on Close.

    - 9. To verify the installation, navigate to the directory where you installed
    Python and double click on the python.exe file.


    #### MACINTOSH


    - 1. From the official Python website, click on the “Downloads” icon and select
    Mac.

    - 2. Click on the “Download Python 3.8.0” button to view all the downloadable
    files.

    - 3. On the subsequent screen, select the Python version you would like to download.
    We will be using the Python 3 version under “Stable Releases.” So scroll down
    the page and click on the “Download macOS 64-bit installer” link under Python
    3.8.0, as shown in the picture below.

    - 4. A pop up window titled “python-3.8.0-macosx10.9.pkg” will be shown.

    - 5. Click “Save File” to start downloading the file.

    - 6. Once the download has completed, double click the saved file icon, and an
    “Install Python” pop window will be shown.

    - 7. Click “Continue” to proceed, and the terms and conditions pop up window will
    appear.

    - 8. Click Agree and then click “Install.”

    - 9. A notification requesting administrator permission and password will be shown.
    Enter your system password to start installation.

    - 10. Once the installation has finished, an “Installation was successful” message
    will appear. Click on the Close button, and you are all set.

    - 11. To verify the installation, navigate to the directory where you installed
    Python and double click on the python launcher icon that will take you to the
    Python Terminal.


    ### Getting Started


    With the Python terminal installed on your computer, you can now start writing
    and executing the Python code. All Python codes are written in a text editor as
    (.py) files and executed on the Python interpreter command line as shown in the
    code below, where “nineplanets.py” is the name of the Python file:

    “C: \Users\Your Name\python nineplanets.py”

    You will be able to test a small code without writing it in a file and simply
    executing it as a command line itself by typing the code below on the Mac, Windows
    or Linux command line, as shown below:

    “C:\Users\Your Name\python”

    In case the command above does not work, use the code below instead:

    “C:\Users\Your Name\py”


    Indentation – The importance of indentation, which is the number of spaces preceding
    the code, is fundamental to the Python coding structure. In most programming languages,
    indentation is added to enhance the readability of the code. However, in Python,
    the indentation is used to indicate execution of a subset of the code, as shown
    in the code below


    ```

    If 7 > 2:

    print (‘Seven is greater than two’)

    ```


    Indentation precedes the second line of code with the print command. If the indentation
    is skipped and the code was written as below, an error will be triggered:


    ```

    If 7 > 2:

    print (‘Seven is greater than two’)

    ```


    The number of spaces can be modified but is required to have at least one space.
    For example, you can execute the code below with higher indentation, but for a
    specific set of code same number of spaces must be used, or you will receive an
    error.


    ```

    If 7 > 2:

    print (‘Seven is greater than two’)

    ```


    Adding Comments – In Python, comments can be added to the code by starting the
    code comment lines with a “#, ” as shown in the example below:


    ```

    #Any relevant comments will be added here

    print (‘Nine planets’)

    ```


    Comments serve as a description of the code and will not be executed by the Python
    terminal. Make sure to remember that any comments at the end of the code line
    will lead to the entire code line being skipped by the Python terminal, as shown
    in the code below. Comments can be very useful in case you need to stop the execution
    when you are testing the code.


    ```

    print (‘Nine Planets’)#Comments added here

    ```


    Multiple lines of comments can be added by starting each code line with “#, ”
    as shown below:


    ```

    #Comments added here

    #Supplementing the comments here

    #Further adding the comments here

    print (‘Nine Planets’)

