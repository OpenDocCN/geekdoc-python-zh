    ## Security


    There are several cities throughout the world that are working on predictive analysis
    so that they can predict the areas of the town where there is more likely to be
    a big surge for crime that is there. This is done with the help of some data from
    the past and even data on the geography of the area.


    This is actually something that a few cities in America have been able to use,
    including Chicago. Although we can imagine that it is impossible to use this to
    catch every crime that is out there, the data that is available from using this
    is going to make it easier for police officers to be present in the right areas
