    关联规则是形式为 X -> Y 的蕴含表达式，其中 X 和 Y 是任意两个项集；例如：

    {牛奶, 饼干} -> {饮料}

    频繁项集是支持度大于或等于数据最小阈值的项集。为了更好地理解项集之间关联的强度，我们可以利用以下指标：


    -   支持度：支持度度量给出了项集在所有事务中出现的频率。以 itemset1 = {牛奶} 和 itemset2 = {饮料} 为例，包含牛奶的事务会比包含饮料的事务多。这意味着
    itemset1 的支持度高于 itemset2。


    为了计算项集出现的事务总数，我们可以通过以下数学方程进行计算：


    $$Support(\{X\} \rightarrow \{Y\}) = \frac{同时包含\ X\ 和\ Y\ 的事务数}{事务总数}$$


    -   置信度：在无监督机器学习中，置信度度量用于定义后件出现的可能性。假设购物车中已有前件，可以对项集的所有事务实施置信度度量。例如，在所有包含 {James}
    的事务中，有多少包含 {饮料}？我们可以根据常识确定 {James} -> {饮料} 应该是一个高置信度规则。计算置信度的数学方程定义如下：


    $$Confidence(\{X\} \rightarrow \{Y\}) = \frac{同时包含\ X\ 和\ Y\ 的事务数}{包含\ X\ 的事务数}$$


    在频繁后件的情况下，前件中存在何种类型的项集并不重要，因为具有非常频繁后件的关联规则的置信度会很高。


    -   提升度：在购物车中 {X} 导致 {Y} 的情况下，请记住提升度的值始终大于 1。表示提升度方法的数学方程定义如下：


    $$Lift(\{X\} \rightarrow \{Y\}) = \frac{(同时包含\ X\ 和\ Y\ 的事务数)/(包含\ X\ 的事务数)}{包含\
    Y\ 的事务比例}$$


    #### 关联规则如何工作？


    在机器学习和数据挖掘中，关联规则用于表示大型数据集中数据项之间关系的概率。实际上，它们是 if-then 语句，在各种模型中实现，以发现事务数据中的销售相关性。


    在基本层面上，关联规则挖掘涉及使用数据模式和共现。机器学习模型用于识别频繁的 if-then 关联，这些关联也称为关联规则。


    与关联规则相关的流行机器学习算法包括 SETM、AIS 和 A Priori。借助 AIS 算法，模型可以在扫描数据时生成和计数项集。这也有助于算法确定哪些大型项集包含一个事务，以及如何通过将大型项集与事务数据中的其他项一起输入来创建新的候选项集。此外，SETM
    算法是模型扫描数据库时生成候选项集的另一种方式。


    SETM 算法在扫描结束时负责项集，因为新的候选项集是以与 AIS 算法相同的方式生成的。除了此操作外，生成事务的事务 ID 会与候选项集一起保存，以形成顺序结构。A
    priori 算法仅允许候选项集在上一轮扫描的大型项集支持下生成。上一轮的大型项集可以连接以生成更大尺寸的特定项集。


    关联规则是数据挖掘中的强大来源，因为它们用于预测客户行为、分析客户分析、产品聚类、商店布局和基于市场的分析。通常，程序员利用关联规则来构建能够处理机器学习的程序。关联规则挖掘实际上是在数据集中搜索频繁项，并用于在关系和事务数据库上的项集之间生成有趣的关联和相关性。


