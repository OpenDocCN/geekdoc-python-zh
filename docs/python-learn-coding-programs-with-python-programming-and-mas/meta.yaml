    Marsland 的《算法视角》（Chapman and Hall/CRC）。


    机器学习包：目前市场上有许多机器学习包，旨在增强你对各种算法的理解。一些最常见的包包括 scikit-learn（最具交互性且显然是首选）、statsmodels
    包、vowpal wabbit (vw) 以及最后的 mllib（一个基于 Spark 构建的 Scala 库）。


    对推荐系统和其他类型的机器学习系统进行性能排序，以识别出最优中的最优。


    同时，进行概率建模、概率编程和接口开发，以增加你对机器学习算法的知识。


    其他更推荐但非常复杂的主题包括神经网络、大数据集扩展和深度学习。


    我希望你现在对机器学习——这个构建新应用和对象（项目操作）的新领域——深信不疑。


    继续深入这个新领域，永不放弃，更多精彩即将到来。'
