    \ ‘count’ 方法的地方。在我们上面的列表中，数字 77 出现了两次。让我们看看如何使用此方法找出这两个实例。\n\n```\nprint(numbers.count(77))\n\
    ```\n\n结果现在将显示 ‘2’ 作为我们的结果。继续向列表中添加随机数字，其中包含一些重复的数字。使用 count 方法找出出现次数，看看该命令对你如何工作。你练习得越多，记得就越牢。\n\
    \n现在我们已经看到了如何定位、更改、添加、清除和计算列表中的项目。如果我们希望将整个列表按升序或降序排序呢？我们能做到吗？\n\n借助 sort 方法，你实际上可以实现这一点。sort()\
