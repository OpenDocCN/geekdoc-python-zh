    # Encapsulation


    The last major concept in object-oriented programming is that of encapsulation.
    This one’s the easiest to explain. This is the notion that common data should
    be put together, and that code should be modular. I’m not going to spend long
    explaining this because it’s a super simple concept. The entire notion of classes
    is as concise of an example as you can get for encapsulation: common traits and
    methods are bonded together under one cohesive structure, making it super easy
    to create things of the sort without having to create a ton of super-specific
    variables for every instance. Well, there we go.'
