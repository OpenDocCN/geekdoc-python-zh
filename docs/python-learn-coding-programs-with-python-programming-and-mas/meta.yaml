    \ 命令之前或之后使用 sort 方法。要反转顺序，请使用 reverse() 方法。此方法与 sort() 方法一样，不需要你在括号内传递任何对象。\n\n\
    ## 元组\n\n在 Python 中，我们使用列表来存储各种值，这些值可以随时被访问、更改、修改或删除。如果你打算使用本质上很重要的数据，这可能不是最好的事情。为了克服这一点，有一种列表会为你存储数据，但之后不会进行任何额外的修改，即使你意外或故意尝试这样做。这些被称为元组。\n\
    \n元组是列表的一种形式，在 Python 中非常重要。与列表的方括号表示不同，它们用圆括号 () 表示。\n\n```\nnumbers = (19, 21,\
    \ 28, 10, 11)\n```\n\n元组被称为不可变项。这是因为你无法改变或修改它们。让我们故意尝试修改值，看看会发生什么。\n\n一旦你输入点运算符来访问\
