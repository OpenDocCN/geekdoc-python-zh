    continually dropped. This phenomenon combined with the internet to make it easy
    for organizations that are large and small to collect enormous amounts of information
    and store it. The concept of big data was born.

    Big data is of course large amounts of data. However, experts characterize big
    data in four ways.

    Simply having a static set of large amounts of data is not useful unless you can
    quickly access it. Big data is characterized by the “four V’s”.


    +   - Volume: Huge amounts of data are being created and stored by computer systems
    throughout the world.

    - Velocity: The speed of data movement continues to increase. Speed of data means
    that computer systems can gather and analyze larger amounts of data more quickly.

    - Variety: Big data is also characterized by collection methods from different
    sources. For example, a consumer profile can'
