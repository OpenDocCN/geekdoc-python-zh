    \ Python、编程或终端非常陌生，Anaconda 已经包含了 100 个最受欢迎的用于数据科学的 Python、R 和 Scala 包，这确实是一种解脱。但对于更有经验的数据科学家来说，如果你想快速开始解决数据科学问题，Anaconda\
