    \ which will check to see if the string is a space or not.\nThese are all extremely\
    \ useful for parsing a given string and making determinations on what to do if\
    \ the string is or isn't a certain way.\n\n## Chapter 8: Program Flow control\
    \ and If-else, elif Statements in Python\n\nComparison operators are special operators\
