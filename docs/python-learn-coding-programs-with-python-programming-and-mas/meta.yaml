    sns.rugplot(tips_data[''total_bill''])

    ```


    Output:


    You can see a high concentration of rectangles between 10 and 20, which shows
    that the total bill amount for most of the bills is between 10 and 20.


    ## Bar Plot


    The bar plot is used to capture the relationship between a categorical and numerical
    column. For each unique value in a categorical column, a bar is plotted, which
    by default, displays the mean value for the data in a numeric column specified
    by the bar plot.


    In the following script, we first import the built-in Titanic dataset from the
    Seaborn library via the `load_dataset()` function. You can also read the CSV file
    named `titanic_data.csv` from the resources folder.


    Script 9:


    ```python

    import matplotlib.pyplot as plt

    import seaborn as sns

    plt.rcParams[''figure.figsize''] = [8, 6]

    sns.set_style(''darkgrid'')

    titanic_data = sns.load_dataset(''titanic'')

    titanic_data.head()

    ```


