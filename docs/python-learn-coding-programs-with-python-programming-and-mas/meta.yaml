    # Chapter 9: Introduction to Big Data


    ## Brief History of Big Data


    The origin of large volumes of data can be traced back to the 1960s and 1970s
    when the Third Industrial Revolution had just started to kick in, and the development
    of relational databases had begun along with the construction of data centers.
    But the concept of big data has recently taken center stage primarily since the
    availability of free search engines like Google and Yahoo, free online entertainment
    services like YouTube and social media platforms like Facebook. In 2005, businesses
    started to recognize the incredible amount of user data being generated through
    these platforms and services, and in the same year and open-source framework called
    “Hadoop,” was developed to gather and analyze these large data dumps available
    to the companies. During the same period, non-relational or distributed database
    called “NoSQL” started to gain popularity due to its ability to store and extract
    unstructured data. “Hadoop” made it possible for the companies to work with big
    data with high ease and at a relatively low cost.


    Today with the rise of cutting edge technology, not only humans but machines also
    generating data, the smart device technologies like “Internet of things” (IoT)
    and “Internet of systems” (IoS) have skyrocketed the volume of big data. Our everyday
    household objects and smart devices are connected to the Internet and able to
    track and record our usage patterns as well as our interactions with these products
    and feeds all this data directly into the big data. The advent of machine learning
    technology has further increased the volume of data generated on a daily basis.


    ## Big Data


    You can think of it as large amounts of what appears to be random data collected
    on people or activities in a wide variety of circumstances. Regarding people,
    this will include data on where you are shopping, what websites you are visiting,
    where you are traveling, what products you are purchasing, and so forth. This
    data could also be collected on any activity related to a business or organization.
    It could be data collected by UPS on the habits and fuel use of their drivers,
    or data collected by government agencies related to criminal activity or an epidemic.

    The data by itself is useless. It must be analyzed, and computers, directed by
    experts called data scientists, are used to find hidden patterns, associations,
    and trends that may exist in the data. Corporations, governments, and other large
    organizations are using big data to seek out information on human behavior relevant
    to their operations, whether that involves improving their own efficiency, delivering
    better services, or developing new products that their customer base will want.


    ## Data Strategy


    A big data strategy is going to involve the collection, storage, retrieval, analysis,
    and actionable insights. The goal of a big data strategy is to build a big data
    foundation that can power business intelligence.

    The collection is not an issue for most businesses, but many businesses err by
    pre-judging the value of data that they could collect, thus not collecting as
    much data as they should. By now, you should recognize that data may have insights
    that are not readily apparent. This is the benefit of machine learning and the
    role that it plays in data analysis: finding hidden patterns that humans didn’t
    know existed and - frankly – couldn’t have known existed. Therefore, you need
    to collect data with an open mind. Any bit of information that a business can
    collect is potentially useful. At first glance, it might appear of no consequence,
    but it might be used later to draw unexpected connections that can lead to data-driven
    decisions later.

    The second issue that needing addressed as part of a big data strategy is the
    storage and retrieval of the data. A large amount of infrastructure is needed
    to handle the volume and velocity of big data. This includes large storage capacity
    as well as powerful computers. It is difficult for organizations - especially
    smaller to mid-sized businesses - to build the kind of data-driven infrastructure
    that will enable them to handle big data effectively. Doing so could literally
    require hundreds of computer servers with huge banks of data storage and highly
    efficient data retrieval tools. In addition, a high level of cybersecurity is
    necessary to protect the integrity of the data.

    For many businesses, these requirements mean that they are going outside the organization
    to have these needs met. Cloud computing has made this possible, and many of the
    world’s largest companies are offering accessible cloud computing resources that
    are cost-effective, fast, and easily used to'
  mdcn: '## pygal


    与 Bokeh 和 Plotly 类似，pygal 能够生成可直接嵌入网页的直观图表。其最大的优势在于能够将图表输出为 SVG 格式。当处理较小规模的数据集时，SVG
    格式能为你提供极佳的体验。然而，如果图表包含大量数据点，SVG 可能会出现渲染问题并变得迟缓。

    由于每种图表类型都封装在一个方法中，且内置样式美观，只需几行代码就能创建出外观精美的图表。


    ## Plotly


    你可能也了解 Plotly 是一个在线数据可视化平台，但你知道也可以通过 Python 笔记本来使用它的功能吗？与 Bokeh 类似，Plotly 的专长在于创建交互式图表，但它还提供了一些在其他库中不常见的图表类型，例如形状图、树状图和
    3D 图。


    ## geoplotlib


    geoplotlib 是一个用于创建地图和绘制地理数据的工具包。你可以用它来创建多种数据类型，如分级统计图、热力图和点密度图。要使用 geoplotlib，你需要安装
    Pyglet（一个面向对象的编程接口）。尽管大多数 Python 数据可视化库不提供地图功能，但拥有一个专门用于地图绘制的库是非常棒的。


    ## Glimmer


    Glimmer 的灵感来源于 R 语言的 Shiny 包。它允许你仅使用 Python 脚本就能将分析快速转换为交互式网络应用，因此你无需了解 HTML、CSS
    或 JavaScript 等其他语言。Glimmer 可与任何 Python 数据可视化库配合使用。创建图表后，你可以在其上构建控件，以便用户筛选和排序数据。


    ## missingno


    处理缺失数据是一件令人头疼的事。missingno 允许你通过可视化图表快速评估数据集的完整性，而无需逐行查看表格。你可以根据数据的连续性或位置关系进行筛选和排序，并使用热力图或树状图进行分析。


    ## Calfskin


    Calfskin 的创建者 Christopher Groskopf 对其描述得恰到好处：“Calfskin 是为那些需要快速生成图表且不追求完美的人设计的
    Python 绘图库。”它旨在处理所有数据类型，并将图表输出为 SVG 格式，因此你可以缩放图表而不会损失图像质量。由于这个库相对较新，部分文档仍在完善中。你可以创建的图表非常基础——但这正是其目标。


    # 第 9 章：大数据简介


    ## 大数据简史


    海量数据的起源可以追溯到 20 世纪 60 年代和 70 年代，当时第三次工业革命刚刚开始兴起，关系型数据库的发展也随之启动，数据中心也开始建设。但大数据的概念直到最近才成为焦点，主要是因为
    Google 和 Yahoo 等免费搜索引擎、YouTube 等免费在线娱乐平台以及 Facebook 等社交媒体平台的普及。2005 年，企业开始意识到这些平台和服务产生的海量用户数据，同年，一个名为“Hadoop”的开源框架被开发出来，用于收集和分析这些企业可用的大型数据集。在同一时期，一种名为“NoSQL”的非关系型或分布式数据库因其存储和提取非结构化数据的能力而开始流行。“Hadoop”使企业能够以相对较低的成本轻松处理大数据。


    如今，随着前沿技术的兴起，不仅人类在产生数据，机器也在产生数据。“物联网”（IoT）和“系统互联网”（IoS）等智能设备技术极大地增加了大数据的规模。我们日常的家居用品和智能设备都连接到互联网，能够跟踪和记录我们的使用模式以及与这些产品的互动，并将所有这些数据直接输入大数据。机器学习技术的出现进一步增加了每日生成的数据量。


    ## 大数据


    你可以将其理解为在各种情况下收集的关于人员或活动的大量看似随机的数据。就人员而言，这包括你在哪里购物、访问哪些网站、旅行目的地、购买的产品等数据。这些数据也可以收集与任何企业或组织相关的活动。例如，UPS
    收集的关于其司机习惯和燃油使用情况的数据，或政府机构收集的与犯罪活动或流行病相关的数据。

