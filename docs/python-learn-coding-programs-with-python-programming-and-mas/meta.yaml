    are referring to a specific component of images. An image derived from a standards
    camera commonly has three channels including blue, red and green. You can imagine
    these images as three-2D matrices that are stacked over each other. Each of these
    matrices also comes with certain pixel values in the specific range of 0 to 255.

    On the other hand, if you have a grayscale image, you only get one channel as
    there are no colors present, just black and white. In our case here, we are going
    to consider grayscale images, so the example we are studying is just a single-2D
    matrix that represents a grayscale image. The value of each pixel contained in
    the matrix must range from 0 to 255. In this case, 0 indicates a color of black
    while 255 indicates a color of white.


    # How Convolutional Neural Networks Work?


    A Convolutional Neural Network structure is normally used for various deep learning
    problems. As already mentioned, Convolutional Neural Networks are used for object
    recognition, object segmentation, detection and computer vision due to their structure.
    CNNs learn directly from image data, so there is no need to perform manual feature
    extraction which is commonly required in regular deep neural networks.

    The use of CNNs has become popular due to three main factors. The first of them
    is the structure of CNNs, which eliminates the need for performing manual data
    extraction as all data features are learned directly by the Convolutional Neural
    Networks. The second reason for the increasing popularity of CNNs is that they
    produce amazing, state-of-art object recognition results. The third reason is
    that CNNs can be easily retained for many new object recognition tasks to help
    build other deep neural networks.

    A CNN can contain hundreds of layers, which each learns automatically to detect
    many different features of an image data. In addition, filters are commonly applied
    to every training image at different resolutions, so the output of every convolved
    image is used as the input to the following convolutional layer.

    The filters can also start with very simple image features like edges and brightness,
    so they commonly can increase the complexity of those image features which define
    the object as the convolutional layers progress.

    Therefore, filters are commonly applied to every training image at different resolutions
    as the output of every convolved image acts as the input to the'
  - '[PAGE 232]


    following convolutional layer.

    Convolutional Neural Networks can be trained on hundreds, thousands and millions
    of images.

    When you are working with large amounts of image data and with some very complex
    network structures, you should use GPUs that can significantly boost the processing
    time required for training a neural network model.

    Once you train your Convolutional Neural Network model, you can use it in real-time
    applications like object recognition, pedestrian detection in ADAS or Advanced
    Driver Assistance Systems and many others.

    The last fully-connected layer in regular deep neural networks is called the output
    layer and in every classification setting, this output layer represents the overall
    class score.

    Due to these properties, regular deep neural nets are not capable of scaling to
    full images. For instance, in CIFAR-10, all images are sized as 32x32x3. This
    means that all CIFAR-10 images gave 3 color channels and that they are 32 wide
    and 32 inches high. This means that a single fully-connected neural network in
    a first regular neural net would have 32x32x3 or 3071 weights. This is an amount
    that is not as manageable as those fully-connected structures are not capable
    of scaling to larger images.

    Besides, you would want to have more similar neurons to quickly add-up more parameters.
    However, in this case of computer vision and other similar problems, using fully-connected
    neurons is wasteful as your parameters would lead to over-fitting of your model
    very quickly. Therefore, Convolutional Neural Networks take advantage of the fact
    that their inputs consist of images for solving these kinds of deep learning problems.

    Due to their structure, Convolutional Neural Networks constrain the architecture
    of images in a much more sensible way. Unlike a regular deep neural network, the
    layers contained in the Convolutional Neural Network are comprised of neurons
    that are arranged in three dimensions including depth, height, and width. For
    instance, the CIFAR-10 input images are part of the input volume of all layers
    contained in a deep neural network and the volume comes with the dimensions of
    32x32x3.

    The neurons in these kinds of layers can be connected to only a small area of
    the layer before it, instead of all the layers being fully-connected like in regular
    deep neural networks. Also, the output of the final layers for'
  - '[PAGE 233]


    CIFAR-10 would come with dimensions of 1x1x10 as the end of Convolutional Neural
    Networks architecture would have reduced the full image into a vector of class
    score arranging it just along the depth dimension.

    To summarize, unlike the regular-three-layer deep neural networks, a ConvNet composes
    all its neurons in just three dimensions. Also, each layer contained in Convolutional
    Neural Network transforms the 3D input volume into a 3D output volume containing
    various neuron activations.

    A Convolutional Neural Network contains layers that all have a simple API resulting
    in 3D output volume that comes with a differentiable function that may or may
    not contain neural network parameters.

    A Convolutional Neural Network is composed of several subsamples and convolutional
    layers that are times followed by fully-connected or dense layers. As you already
    know, the input of a Convolutional Neural Network is an n x n x r image where
    n represents the height and width of an input image while the r is a total number
    of channels present. The Convolutional Neural Networks may also contain k filters
    known as kernels. When kernels are present, they are determined as q, which can
    be the same as the number of channels.

    Each Convolutional Neural Network map is subsampled with max or mean pooling over
    p x p of a contiguous area in which p commonly ranges between 2 for small images
    and more than 5 for larger images. Either after or before the subsampling layer,
    a sigmoidal non-linearity and additive bias is applied to every feature map. After
    these convolutional neural layers, there may be several fully-connected layers
    and the structure of these fully-connected layers is the same as the structure
    of standard multilayer neural networks.


    # Stride and Padding


    Secondly, after specifying the depth, you also must specify the stride that you
    slide over the filter. When you have a stride that is one, you must move one pixel
    at a time. When you have a stride that is two, you can move two pixels at a time,
    but this produces smaller volumes of output spatially. By default, stride value
    is one. However, you can have bigger strides in the case when you want to come
    across less overlap between your receptive fields, but, as already mentioned,
    this will result in having smaller feature maps as you are skipping over image
    locations.'
  - '[PAGE 234]


    In the case when you use bigger strides, but you want to maintain the same dimensionality,
    you must use padding that surrounds your input with zeros. You can either pad
    with the values on the edge or with zeros. Once you get the dimensionality of
    your feature map that matches your input, you can move onto adding pooling layers
    that padding is commonly used in Convolutional Neural Networks when you want to
    preserve the size of your feature maps.

    If you do not use padding, your feature maps will shrink at every layer. Adding
    zero-padding is times very convenient when you want to pad your input volume just
    with zeros all around the border.

    This is called as zero-padding which is a hyperparameter. By using zero-padding,
    you can control the size of your output volumes.

    You can easily compute the spatial size of your output volume as a simple function
    of your input volume size, the convolution layers receptive field size, the stride
    you applied and the amount of zero-padding you used in your Convolutional Neural
    Network border.

    For instance, if you have a 7x7 input and, if you use a 3x3 filter with stride
    1 and pad 0, you will get a 5x5 output following the formula. If you have stride
    two, you will get a 3x3 output volume and so on using the formula as following
    in which W represents the size of your input volume, F represents the receptive
    field size of your convolutional neural layers, S represents the stride applied
    and P represents the amount of zero-padding you used.


    ```

    (W-F +2P)/S+1

    ```


    Using this formula, you can easily calculate how many neurons can fit in your
    Convolutional Neural Network. Consider using zero-padding whenever you can. For
    instance, if you have an equal input and output dimensions which are five, you
    can use zero-padding of one to get three receptive fields.

    If you do not use zero-padding in cases like this, you will get your output volume
    with a spatial dimension of 3, as 3 are several neurons that can fit into your
    original input.

    Spatial arrangement hypermeters commonly have mutual constraints. For instance,
    if you have an input size of 10 with no zero-padding used and with a filter size
    of three, it is impossible to apply stride. Therefore, you will get the set of
    your hyperparameter to be invalid and your Convolutional Neural Networks library
    will throw an exception or zero pad completely to the rest to make it fit.'
