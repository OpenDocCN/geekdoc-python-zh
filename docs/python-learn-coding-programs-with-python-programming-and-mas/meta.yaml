    \ = tonguetwister.replace(\"peppers\", \"potatoes\")\n```\n\ntonguetwister would\
    \ now have the value of \"Peter Piper picked a peck of pickled potatoes\".\n\n\
    There's the strip, lstrip, and rstrip methods which take either a given character\
