    \ 30, 35, 40)\nDrake, Emma, Sully, Sam = ages\n```\n\nNow this looks much more\
    \ interesting. Instead of using a number of lines, we got the same job done within\
    \ the same line. Each individual variable still received the same age as the first\
    \ method and each can be called upon to do exactly the same thing. This is how\
    \ unpacking can work miracles for us. It saves you time and effort and allows\
    \ for us to maintain a clean, clear, and readable code for reference.\n\nWith\
    \ that said, it is now time for us to be introduced to one of the most important\
    \ elements within Python that is used both by beginners and experts almost every\
    \ single time.\n\n## Python Dictionaries\n\nDictionaries are a data structure\
    \ that enables to memorize the data in key-value couple.\n\n```\nAlumniAge = {'Andrea':\
    \ 23, 'John': 28}\n```\n\nThere are two keys- ‘Andrea’ and ‘John’. The value associated\
    \ with key ‘Andrea’ is ’23’ which is his age. The value associated with key John\
    \ is ’28’ which is his age.\n\nThese are the simple things you should always remember\
    \ while using a Python dictionary.\n\nKey in the dictionary are unique. Keys are\
    \ immutable. You can always eliminate and addition a new key. But, you can not\
    \ update the key.\n\nThere are times you will come across certain information\
    \ that is unique and holds a key value. Let us assume that you have to design\
    \ software that can store information about customers or clients. This information\
    \ may include and is not limited to names, numbers, emails, physical addresses,\
    \ and so on. This is where dictionaries will come into play.\n\nIf you had thought\
    \ that dictionary in Python would be like your everyday dictionary for languages\
    \ we speak, you might not have been completely wrong here. There is a similarity\
    \ that we can see in these dictionaries. Every single entry that is made is unique.\
    \ If an entry tries to replicate itself or if you try to store the same value\
    \ again, you will be presented with an error.\n\nSo how exactly do we use dictionaries?\
    \ For that, let us switch back to our new best friend, the PyCharm, and start\
    \ typing a little.\n\nCome up with an imaginary person’s name, email address,\
    \ age, and phone number. Don’t start assigning these yet, as we would like to\
    \ use the dictionary here to do the same. Ready? Okay, let us begin.\n\n```\n\
    user_one = {  #Dictionaries are represented by {}\n    'name': 'Sam',\n    'age':\
    \ 40,\n    'phone': 123456789,\n    'married': False\n}\n```\n\nWe have entered\
    \ some information about a virtual character named Sam. You can use the print\
    \ command and run the dictionary named ‘user_one’ and the system will print out\
    \ these values for you.\n\nFor dictionaries, we use the colon : sign between values.\
    \ The object name is placed in a string followed by the colon sign. After that,\
    \ we use either a string, a number (integer or float), or a boolean value. You\
    \ can use these to assign every object with its unique key pair. In case you are\
    \ confused, key pair is just another way of saying the value that is assigned\
    \ to the object. For example, the key pair for ‘name’ is ‘Sam’.\n\nNow, let us\
    \ try and see what happens if we add another ‘married’ value. As soon as you are\
    \ done typing, the system will highlight it straight away. Note that you can still\
    \ type in the new value and the system will continue to function. However, the\
    \ value it will use will be the latest value it can find. This means that if you\
