  md: '# Chapter 5: Data Science and Machine Learning with Scikit-Learn


    The Scikit-Learn library has evolved as the gold standard for the development
    of machine learning models with the use of Python, offering a wide variety of
    supervised and unsupervised ML algorithms. It is touted as one of the most user
    friendly and cleanest ML libraries to date. For example, decision trees, clustering,
    linear and logistics regressions and K-means. Scikit-learn uses a couple of basic
    Python libraries: NumPy and SciPy and adds a set of algorithms for data mining
    tasks including classification, regression and clustering. It is also capable
    of implementing tasks like feature selection, transforming data and ensemble methods
    in only a few lines.


    In 2007, David Cournapeau developed the foundational code of Scikit-Learn during
    his participation in the “summer of code” project for Google. Scikit-learn has
    become one of Python''s most famous open source machine learning libraries since
    its launch in 2007. But it wasn’t until 2010 that Scikit-Learn were released for
    public use. Scikit-Learn is an open sourced and BSD licensed, data mining and
    data analysis tool used to develop supervise and unsupervised machine learning
    algorithms build on Python. Scikit-learn offer various ML algorithms such as “classification”,
    “regression”, “dimensionality reduction”, and “clustering”. It also offers modules
    for feature extraction, data processing, and model evaluation.


    It is designed as an extension to the “SciPy” library, Scikit-Learn is based on
    “NumPy” and “Matplotlib”, the most popular Python libraries. NumPy expands Python
    to support efficient operations on big arrays and multidimensional matrices. Matplotlib
    offers visualization tools and science computing modules are provided by SciPy.


    For scholarly studies, Scikit-Learn is popular because it has a well-documented,
    easy-to-use and flexible API. Developers are able to utilize Scikit-Learn for
    their experiments with various algorithms by only altering a few lines of the
    code. Scikit-Learn also provide a variety of training datasets, enabling developers
    to focus on algorithms instead of data collection and cleaning.


    Many of the algorithms of Scikit-Learn are quick and scalable to all and have
    huge datasets. Scikit-learn is known for its reliability and automated tests are
    available for much of the library. Scikit-learn is extremely popular'
