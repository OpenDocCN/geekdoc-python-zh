- md: '# Python Variables


    In Python, variables are primarily utilized to save data values without executing
    a command for it. A variable can be created by simply assigning desired value
    to it, as shown in the example below:


    ```

    A = 999

    B = ''Patricia''

    print(A)

    print(B)

    ```


    A variable could be declared without a specific data type. The data type of a
    variable can also be modified after its initial declaration, as shown in the example
    below:


    ```

    A = 999 # A has data type set as int

    A = ''Patricia'' # A now has data type str

    print(A)

    ```


    Some of the rules applied to the Python variable names are as follows:


    - 1. Variable names could be as short as single alphabets or more descriptive
    words like height, weight and more.

    - 2. Variable names could only be started with an underscore character or a letter.

    - 3. Variable names must not start with numbers.

    - 4. Variable names can contain underscores or alphanumeric characters. No other
    special characters are allowed.

    - 5. Variable names are case sensitive. For example, ‘weight,’ ‘Weight’ and ‘WEIGHT’
    will be accounted as three separate variables.


    We recommend to read our first book of the series to learn the basics of Python.


    # Chapter Summary


    This provides the core instructions to be followed in downloading and installing
    Python on your operating system. The latest version of Python released in the
    middle of the 2019 is Python 3.8.0. Make sure to download and install the most
    recent and stable version of Python at the time.


    # Chapter 7: Top libraries and modules for Python Machine Learning Applications


    # NumPy


    One of the most fundamental open source libraries for Python when it comes to
    computation is NumPy (Numerical Python).

    It offers primarily mathematical functions that perform operations on data.

    It has the characteristic of very fast and efficient execution of functions.


    # Pandas


    Pandas is a free open source library created by Wes McKinney that works with tagged
    and relational data.

    It is designed for fast and easy data manipulation, aggregation, filtering, etc.

    It has two data structures, Series and DataFrame.


    # Matplotlib


    The Matplotlib Library has been designed for easy and powerful data visualization
    and has been around for over 16 years. The latest stable version is 3.1.1, which
    was released in July 2019. This library, along with NumPy and Pandas, is a very
    serious competitor to scientific, well-known tools (but quite expensive) such
    as MatLab and Mathematica.

    What is a disadvantage of Matplotlib is that it is quite low level which means
    that it takes more lines of code to come up with some more advanced visualizations
    which means that it takes a lot more effort and time than when using high level
    paid tools, but certainly the effort is worth the try.


    # Seaborn


    The Seaborn library is primarily focused on creating attractive visualizations
    of statistical graphs such as heat map views, data distributions, etc. This library
    is based and dependent on the Matplotlib library.


    # Bokeh


    Another library focused on visualizations. Unlike Seaborn, Bokeh is independent
    of Matplotlib.

    The main focus of this library is the interactivity and presentation of visualizations
    through modern web browsers like D3.js.


    # Altair


    Altair is a newer library for statistical visualization. With minimal code, highly
    effective and beautiful visualizations can be produced, and the API of this library
    is simple and built on the powerful Vega-Lite.

    New chart types and visualizations can be expected in the future as it is under
    constant and active development.


    # SciKit-learn


    SciKit-Learn is an open-source library that is currently one of the industry standards
    when it comes to machine learning in Python. It can also serve as a very effective
    tool for data mining and data analysis. It was built based on NumPy, SciPy, and
    Matplotlib.

    The library combines quality code and good documentation, ease of use, and excellent
    performance. Has classification, regression, clustering, preprocessing, etc. It
    is designed to work with Numpy and SciPy libraries.

    It has machine learning algorithms and can integrate machine learning with production
    systems very easily.


    # MLPy


    MLPy is a Python machine learning library built on Numpy-SciPy libraries.

    It offers a wide range of machine learning methods, both supervised and unsupervised.
    This is a multi-platform, which means it works on both Python v2 and Python v3.


    # Scrapy


    Scrapy is a library for making crawling programs known as spider bots for delivering
    structured data such as contact information or URLs from the internet.

    It is open-source, written in Python, and originally designed strictly for scraping.
    Over time, Scrapy has evolved into a mature framework with the ability to collect
    data from the API and also act as a general crawler.


    # Statsmodels


    Statsmodels is a Python library that allows users to research data, evaluate statistical
    models, and perform statistical tests. It has a comprehensive list of descriptive
    statistics, statistical tests, and is available for different types of data.

    It provides extensive visualization features and is designed primarily for statistical
    analysis and is characterized by high performance, especially when used with large
    data sets.


    # NLTK


    The abbreviation for this library means The Natural Language Toolkit and is used
    for the frequent tasks of natural language statistical processing in Python. It
    is designed primarily to facilitate the learning and exploration of NLP and its
    related fields (linguistics, cognitive science, and artificial intelligence).


    # Gensim


    Gensim is an open-source library for Python that implements tools that work with
    vector modeling. It achieves efficiency by using the NumPy data structure and
    SciPy operations, and it works great when it comes to big texts.

    Gensim is used for raw and unstructured digital texts and implements various unsupervised
    (unsupervised) algorithms.


    # NumPy (Numerical Python)


    Numpy is a library made up of multidimensional vectors and the functionality needed
    to work with them. It is most commonly used for mathematical and logical operations
    on vectors, Fourier transforms, form manipulations, operations required for linear
    algebra, and also contains a random number generator. We will install the package
    with the following command:


    ```

    $ pip install numpy

    ```


    The most important component is ndarray (multidimensional vector), which is a
    ''container'' containing elements of the same size and type. Each element is a
    data type, dtype object. Calling the shape parameter checks the dimensions of
    the vector while calling the dtype parameter reveals what type of data is inside
    the vector.

    A data type object is a fixed block of memory intended for a vector. The size
    of the block it occupies depends on the data type, data size, byte order and the
    like. NumPy contains numerous mathematical operations, such as trigonometric (sin,
    cos, arcsin, arccos, degrees) arithmetic (add, subtract, multiply, divide, mod),
    operations with complex numbers (real, imag, conj, angle) and many others. It
    also contains statistical operations such as minimum, maximum, percentiles, arithmetic
    mean, standard deviation and variance of given elements in a vector. It also makes
    it easier for us to deal with linear structures, such as matrices. It contains
    operations for matrix multiplication, determinant computation, inverse search,
    and the like.

    The combination of NumPy and Matplotlib gives us the ability to visualize functions
    and graphs. Using numpy, we define the x and y axes while drawing a graph with
    the pyplot () function, which we imported from matplotlib. We can further ''decorate''
    the graph by adding a third parameter where the first part is the look of the
    function, and the second is the color of the function, all in quotes.

    The Pyplot function has the ability to draw bar graphs (bar). The most common
    visualization of frequency and data distribution is a histogram, which we can
    also display using numPy, defining values and intervals.


    # Matplotlib


    The Matplotlib library is used to visualize data and draw 2D graphs. Displaying
    multiple datasets will be obtained by adding another pair of parameters to the
    plot () method for another dataset, while achieving multiple sub-graphs on the
    same ''figure'' is achieved by the subplot method (number of rows, number of columns,
    ordinal number) ).

    For drawing multiple graphs, this method is not optimal, and therefore the subplots
    (nrows, ncolumns, figsize) method is used. We approach each graph as in a matrix
    system (a [row: column])).

    The bar chart contains two other important methods: legend () - shows what color
    is displayed and xticks () - adjusts the column labels on the x-axis. We use the
    pie () method for a pie chart. We can shade the diagram and highlight some elements
    with the explode parameter.

    To visualize the scatter graph (regression problems), we use the scatter (height,
    weight), xlim (int), and ylim (int) methods. We can also visualize the scatter
    graph over a 3D model, including the mplot3d module, and assign the projection
    = ''3d'' axes parameter to the method.


    # Scikit-Learn


    Scikit-Learn, the library most used with NumPy and Pandas, is intended for data
    modeling. Used for classification, regression, and grouping. Scikit comes with
    several standard datasets, such as iris and digits.'
  mdcn: '# Python 变量


    在 Python 中，变量主要用于保存数据值，而无需为其执行命令。只需将所需值赋给变量即可创建变量，如下例所示：


    ```

    A = 999

    B = ''Patricia''

    print(A)

    print(B)

    ```


    变量可以在没有特定数据类型的情况下声明。变量的数据类型也可以在初始声明后修改，如下例所示：


    ```

    A = 999 # A 的数据类型设置为 int

    A = ''Patricia'' # A 现在的数据类型为 str

    print(A)

    ```


    应用于 Python 变量名的一些规则如下：


    - 1. 变量名可以短至单个字母，也可以是更具描述性的词语，如 height、weight 等。

    - 2. 变量名只能以下划线字符或字母开头。

    - 3. 变量名不能以数字开头。

    - 4. 变量名可以包含下划线或字母数字字符。不允许使用其他特殊字符。

    - 5. 变量名区分大小写。例如，‘weight’、‘Weight’ 和 ‘WEIGHT’ 将被视为三个独立的变量。


    我们建议阅读本系列的第一本书来学习 Python 基础知识。


    # 章节摘要


    本章提供了在您的操作系统上下载和安装 Python 时需要遵循的核心说明。2019 年中期发布的最新 Python 版本是 Python 3.8.0。请确保下载并安装当时最新且稳定的
    Python 版本。


    # 第 7 章：Python 机器学习应用的顶级库和模块


    # NumPy


    在计算方面，Python 最基础的开源库之一是 NumPy（Numerical Python）。

    它主要提供对数据执行操作的数学函数。

    它具有函数执行非常快速和高效的特点。


    # Pandas


    Pandas 是由 Wes McKinney 创建的免费开源库，用于处理带标签和关系型数据。

    它旨在实现快速、便捷的数据操作、聚合、过滤等。

    它有两种数据结构：Series 和 DataFrame。


    # Matplotlib


    Matplotlib 库旨在实现轻松而强大的数据可视化，已有超过 16 年的历史。最新的稳定版本是 3.1.1，于 2019 年 7 月发布。该库与 NumPy
    和 Pandas 一起，是科学界知名工具（但相当昂贵）如 MatLab 和 Mathematica 的有力竞争者。

    Matplotlib 的一个缺点是它相当底层，这意味着需要更多代码行来实现一些更高级的可视化，这比使用高级付费工具需要更多的努力和时间，但当然，这种努力是值得尝试的。


    # Seaborn


    Seaborn 库主要专注于创建统计图形的吸引人可视化，如热图视图、数据分布等。该库基于并依赖于 Matplotlib 库。


    # Bokeh


    另一个专注于可视化的库。与 Seaborn 不同，Bokeh 独立于 Matplotlib。

    该库的主要重点是通过现代 Web 浏览器（如 D3.js）实现可视化交互性和呈现。


    # Altair


    Altair 是一个较新的统计可视化库。只需最少的代码，就可以生成高效且美观的可视化，并且该库的 API 简单，建立在强大的 Vega-Lite 之上。

    由于其持续活跃的开发，未来可以期待新的图表类型和可视化。


    # SciKit-learn


    SciKit-Learn 是一个开源库，目前是 Python 机器学习领域的行业标准之一。它也可以作为数据挖掘和数据分析的非常有效的工具。它基于 NumPy、SciPy
    和 Matplotlib 构建。

    该库结合了高质量的代码和良好的文档、易用性以及卓越的性能。具有分类、回归、聚类、预处理等功能。它旨在与 Numpy 和 SciPy 库配合使用。

    它包含机器学习算法，并且可以非常轻松地将机器学习与生产系统集成。


    # MLPy


    MLPy 是一个基于 Numpy-SciPy 库构建的 Python 机器学习库。

    它提供了广泛的机器学习方法，包括监督和无监督学习。这是一个多平台库，这意味着它可以在 Python v2 和 Python v3 上运行。


    # Scrapy


    Scrapy 是一个用于制作称为蜘蛛机器人的爬虫程序的库，用于从互联网交付结构化数据，如联系信息或 URL。

    它是开源的，用 Python 编写，最初严格为网络抓取而设计。随着时间的推移，Scrapy 已发展成为一个成熟的框架，能够从 API 收集数据，也可以作为通用爬虫。


    # Statsmodels


    Statsmodels 是一个 Python 库，允许用户研究数据、评估统计模型并执行统计测试。它具有全面的描述性统计、统计测试列表，并且适用于不同类型的数据。

    它提供了广泛的可视化功能，主要为统计分析而设计，其特点是高性能，尤其是在处理大型数据集时。


    # NLTK


    该库的缩写代表自然语言工具包（The Natural Language Toolkit），用于 Python 中自然语言统计处理的常见任务。它主要旨在促进
    NLP 及其相关领域（语言学、认知科学和人工智能）的学习和探索。


    # Gensim


    Gensim 是一个 Python 开源库，实现了处理向量建模的工具。它通过使用 NumPy 数据结构和 SciPy 操作来实现效率，并且在处理大型文本时表现出色。

    Gensim 用于原始和非结构化的数字文本，并实现了各种无监督算法。


    # NumPy（Numerical Python）


    Numpy 是一个由多维向量和处理它们所需的功能组成的库。它最常用于向量的数学和逻辑运算、傅里叶变换、形状操作、线性代数所需的操作，还包含一个随机数生成器。我们将使用以下命令安装该包：


    ```

    $ pip install numpy

    ```


    最重要的组件是 ndarray（多维向量），它是一个包含相同大小和类型元素的“容器”。每个元素都是一个数据类型，dtype 对象。调用 shape 参数检查向量的维度，而调用
    dtype 参数则揭示向量内部的数据类型。

    数据类型对象是为向量设计的固定内存块。它占用的块大小取决于数据类型、数据大小、字节顺序等。NumPy 包含众多数学运算，例如三角函数（sin、cos、arcsin、arccos、degrees）、算术运算（加、减、乘、除、取模）、复数运算（real、imag、conj、angle）以及许多其他运算。它还包含统计运算，如向量中给定元素的最小值、最大值、百分位数、算术平均值、标准差和方差。它还使我们更容易处理线性结构，如矩阵。它包含矩阵乘法、行列式计算、求逆等操作。

    NumPy 和 Matplotlib 的结合使我们能够可视化函数和图形。使用 numpy，我们定义 x 轴和 y 轴，同时使用从 matplotlib 导入的
    pyplot() 函数绘制图形。我们可以通过添加第三个参数来进一步“装饰”图形，其中第一部分是函数的外观，第二部分是函数的颜色，所有内容都在引号内。

    Pyplot 函数具有绘制条形图（bar）的能力。频率和数据分布最常见的可视化是直方图，我们也可以使用 numPy 来显示它，定义值和区间。


    # Matplotlib


    Matplotlib 库用于可视化数据和绘制二维图形。通过向 plot() 方法添加另一对参数来显示多个数据集，而通过 subplot 方法（行数、列数、序号）在同一“图形”上实现多个子图。

    对于绘制多个图形，此方法不是最优的，因此使用 subplots（nrows, ncolumns, figsize）方法。我们像在矩阵系统中一样处理每个图形（a
    [行: 列]））。

    条形图包含另外两个重要方法：legend() - 显示显示的颜色，xticks() - 调整 x 轴上的列标签。我们使用 pie() 方法绘制饼图。我们可以使用
    explode 参数为图表添加阴影并突出显示某些元素。

    为了可视化散点图（回归问题），我们使用 scatter（height, weight）、xlim（int）和 ylim（int）方法。我们还可以通过包含 mplot3d
    模块并在方法中分配 projection = ''3d'' 轴参数来可视化三维模型上的散点图。


    # Scikit-Learn


    Scikit-Learn 是与 NumPy 和 Pandas 一起使用最多的库，用于数据建模。用于分类、回归和分组。Scikit 附带几个标准数据集，如 iris
    和 digits。'
