  md: '# Chapter 2: Installing Python


    To code in Python, you must have the Python Interpreter installed in your computer.
    You must also have a text editor in which you will be writing and saving your
    Python codes. The good thing with Python is that it can run on various platforms
    like Windows, Linux, and Mac OS. Most of the current versions of these operating
    systems come installed with Python. You can check whether Python has been installed
    on your operating system by running this command on the terminal or operating
    system console: Python


    Type the above command on the terminal of your operating system then hit the Enter/Return
    key.


    The command should return the version of Python installed on your system. If Python
    is not installed, you will be informed that the command is not recognized; hence
    you have to install Python.


    # Choosing a Python Version


    The main two versions of Python are 2.x and 3.x. Python 3.x is obviously the latest
    one but Python 2.x as of today is most likely still the most used one. Python
    3.x is however growing much faster in terms of adoption. Python 2.x is still in
    use in many software companies. More and more enterprises however are moving to
    Python 3.x. There are several technical differences between the 2 versions. We
    can summarize in very a simple way as Python 2.x is legacy and Python 3.x is the
    future. The advice for you is to go for the latest version Python 3.x. From 2020
    Python 2.x is not be supported anymore.


