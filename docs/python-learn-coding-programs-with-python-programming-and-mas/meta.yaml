    ## Introduction


    Data analysis plays an important role in many aspects of life today. From the
    moment you wake up, you interact with data at different levels. A lot of important
    decisions are made based on data analytics. Companies need data to help them meet
    many of their goals. As the population of the world keeps growing, its customer
    base keeps expanding. In light of this, they must find ways of keeping their customers
    happy while at the same time meeting their business goals.


    Given the nature of competition in the business world, it is not easy to keep
    customers happy. Competitors keep preying on each other’s customers, and those
    who win have another challenge ahead - how to maintain the customers lest they
    slide back to their former business partners. This is one area where data analysis
    comes in handy.


    To understand their customers better, companies rely on data. They collect all
    manner of data at each point of interaction with their customers. Data are useful
    in several ways. The companies learn more about their customers, thereafter clustering
    them according to their specific needs. Through such segmentation, the company
    can attend to the customers’ needs better and hope to keep them satisfied for
    longer.


    But, data analytics is not just about customers and the profit motive. It is also
    about governance. Governments are the biggest data consumers all over the world.
    They collect data about citizens, businesses, and every other entity that they
    interact with at any given point. This is important information because it helps
    in a lot of instances.


    For planning purposes, governments need accurate data on their population so that
    funds can be allocated accordingly. Equitable distribution of resources is something
    that cannot be achieved without proper data analysis. Other than planning, there
    is also the security angle. To protect the country, the government must maintain
    different databases for different reasons. There are high profile individuals
    who must be accorded special security detail, top threats who must be monitored
    at all times, and so forth. To meet the security objective, the government has
    to obtain and maintain updated data on persons of interest at all times.


    There is so much more to data analysis than the corporate and government decisions.
    As a programmer, you are venturing into an industry that is challenging and exciting
    at the same time. Data doesn’t lie unless it is manipulated, in which case you
    need insane data analysis and handling skills. As a data analyst, you will come
    across many challenges and problems that need solutions that can only be handled
    through data analysis. The way you interact with data can make a big difference,
    bigger than you can imagine.


    There are several tools you can use for data analysis. Many people use Microsoft
    Excel for data analysis and it works well for them. However, there are limitations
    of using Excel which you can overcome through Python. Learning Python is a good
    initiative, given that it is one of the easiest programming languages. It is a
    high-level programming language because its syntax is so close to the normal language
    we use. This makes it easier for you to master Python concepts.


    For expert programmers, you have gone beyond learning about the basics of Python
    and graduated into using Python to solve real-world problems. Many problems can
    be solved through data analysis. The first challenge is usually understanding
    the issue at hand, then working on a data solution for it.


    This book follows a series of elaborate books that introduced you to data analysis
    using Python. Some important concepts have been reiterated since the beginning
    of the series to help you remember the fundamentals. Knowledge of Python libraries
    is indeed important. It is by understanding these libraries that you can go on
    to become an expert data analyst with Python.


    As you interact with data, you do understand the importance of cleaning data to
    ensure the outcome of your analysis is not flawed. You will learn how to go about
    this and build on that to make sure your work is perfect. Another challenge that
    many organizations have is protecting the integrity of data. You should try and
    protect your organization from using contaminated data. There are procedures you
    can put in place to make sure that you use clean data all the time.


    We live in a world where data are at the center of many things we do. Data are
    produced and stored in large amounts daily from automated systems. Learning data
    analysis through Python should help you process and extract information from data
    and make meaningful conclusions from them. One area where these skills will come
    in handy is forecasting. Through data analysis, you can create predictive models
    that should help your organization meet its objectives.


    A good predictive model is only as good as the quality of data introduced into
    it, the data modeling methods, and more importantly, the dataset used for the
    analysis. Beyond data handling and processing, one other important aspect of data
    analysis is visualization. Visualization is about presentation. Your data model
    should be good enough for an audience to read and understand it at the first point
    of contact. Apart from the audience, you should also learn how to plot data on
    different visualizations to help you get a rough idea of the nature of the data
    you are working with.


    When you are done with data analysis, you should have a data model complete with
    visual concepts that will help in predicting outcomes and responses before you
    can proceed to the testing phase. Data analysis is a study that is currently in
    high demand in different fields. Knowing what to do, as well as when and how to
    handle data, is an important skill that you should not take for granted. Through
    this, you can build and test a hypothesis and go on to understand systems better.'
