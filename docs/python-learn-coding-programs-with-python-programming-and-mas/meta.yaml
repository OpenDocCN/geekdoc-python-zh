    ## Steps in building a Machine Learning System


    Regardless of the model of Machine Learning, here are the common steps that are
    involved in the process of designing a Machine Learning system.


    ### Define Objective


    As with any other task, the first step is to define the purpose you wish to accomplish
    with your system. The kind of data you use, the algorithm and other factors will
    primarily depend on the objective or the kind of prediction you want the system
    to produce.


    ### Collect Data


    This is perhaps the most time-consuming steps of building a system of Machine
    Learning. You must collect all the relevant data that you will use to train the
    algorithm.


    ### Prepare Data


    This is an important step that is usually overlooked. Overlooking this step can
    prove to be a costly mistake. The cleaner and the more relevant the data you are
    using is, the more accurate the prediction or the output will be.


    ### Select Algorithm


    There are different algorithms that you can choose, like Structured Vector Machine
    (SVM), k-nearest, Naive-Bayes, Apriori, etc. The algorithm that you use will primarily
    depend on the objective you wish to attain with the model.


    ### Train Model


    Once you have all the data ready, you must feed it into the machine and the algorithm
    must be trained to predict.


    ### Test Model


    Once your model is trained, it is now ready to start reading the input to generate
    appropriate outputs.


    ### Predict


    Multiple iterations will be performed and you can also feed the feedback into
    the system to improve its predictions over time.


    ### Deploy


    Once you test the model and are satisfied with the way it is working, the said
    model will be standardized and can be integrated into any application you want.
    This means that it is ready to be deployed.


    All these steps can vary according to the application and the type of algorithm
    (supervised or unsupervised) you are using. However, these steps are generally
    involved in all processes of designing a system of Machine Learning. There are
    various languages and tools that you can use in each of these stages. Here, you
    will learn about how you can design a system of Machine Learning using Python.


    ## Machine Learning Scenarios


    Scenario One

    In a picture from a tagged album, Facebook recognizes the photo of the friend.

    Explanation: This is an instance of supervised learning. In this case, Facebook
    is using tagged photographs to recognize the person. The tagged photos will become
    the labels of the pictures. Whenever a machine is learning from any form of labeled
    data, it is referred to as supervised learning.


    Scenario Two

    Suggesting new songs based on someone’s past music preferences.

    Explanation: This is an instance of supervised learning. The model is trained
    on classified or pre-existing labels- in this case, the genre of songs. This is
    precisely what Netflix, Pandora, and Spotify do – they collect the songs/movies
    that you like, evaluate the features based on your preferences and then come up
    with suggestions of songs or movies based on similar features.


    Scenario Three

    It focuses on analyzing the bank data to flag any suspicious or fraudulent transactions.

    Explanation: This is an instance of unsupervised learning. The suspicious transaction
    cannot be fully defined in this case and therefore, there are no specific labels
    like fraud or not a fraud. The model will try to identify any outliers by checking
    for anomalous transactions.


    Scenario Four

    This comprises of a combination of various models.

