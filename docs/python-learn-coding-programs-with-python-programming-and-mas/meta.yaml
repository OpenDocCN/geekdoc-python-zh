- md: '## 3- Data Cleaning


    The next step that we need to focus on here is data cleaning. While it may not
    be as much fun as we see with the algorithms and more that come with data analysis,
    they are still important. This is the part of the process where we match up records,
    check for multiples and duplicates in the data, and get rid of anything that is
    false or does not match up with what we are looking for at this time.


    ## 4- Data Analysis


    Once the whole process of making sure you clean the data, and we have done the
    quality analysis and the measurement, it is time to dive into the analysis that
    we want to use. There are a ton of different analysis that we can do on the information,
    and it often will depend on what your goals are in this whole process. We can
    go through and do some graphical techniques that include scattering plots. We
    can work with some frequency counts to see what percentages and numbers are present.
    We can do some continuous variables or even the computation of new variables.


    ## 5- Data Interpretation


    Look over the insights and hidden patterns that were found in the data. The whole
    point of working with data analysis is to make sure that we can take a large amount
    of data and see what important insights are found in that information. The more
    that we study the data, and the better the algorithm we choose to work with, the
    easier it is to find the insights and the hidden values that are inside of it.
    We can then use this to help us make better and more informed decisions.


    ## 6- Data Visualization


    This is not a step that you should miss out on at all. These visuals are going
