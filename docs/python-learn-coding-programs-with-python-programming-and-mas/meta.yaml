- md: 'In Python, variables are primarily utilized to save data values without executing
    a command for it. A variable can be created by simply assigning the desired value
    to it, as shown in the example below:


    ```

    A = 999

    B = ''Patricia''

    print(A)

    print(B)

    ```


    A variable could be declared without a specific data type. The data type of a
    variable can also be modified after its initial declaration, as shown in the example
    below:


    ```

    A = 999 # A has data type set as int

    A = ''Patricia'' # A now has data type str

    print(A)

    ```


    Some of the rules applied to the Python variable names are as follows:


    1. Variable names could be as short as single alphabets or more descriptive words
    like height, weight, and more.

    2. Variable names could only be started with an underscore character or a letter.

    3. Variable names must not start with numbers.

    4. Variable names can contain underscores or alphanumeric characters. No other
    special characters are allowed.

    5. Variable names are case sensitive. For example, ''weight,'' ''Weight,'' and
    ''WEIGHT'' will be accounted as 3 separate variables.


    ## Assigning Value to Variables


    In Python, multiple variables can be assigned DISTINCT values in a single code
    line, as shown in the example below:


    ```

    A, B, C = ''violet'', maroon, ''teal''

    print(A)

    print(B)

    print(C)

    ```


    OR multiple variables can be assigned SAME value in a single code line, as shown
    in the example below:


    ```

    A, B, C = ''violet''

    print(A)

    print(B)

    print(C)

    ```


    To view the data type of any object, you can use the "type()" function as shown
    in the example below:


    ```

    A = ''Violet''

    print(type(A))

    ```


    ## Assigning the Data Type to Variables


    A new variable can be created by simply declaring a value for it. This set data
    value will in turn assign the data type to the variable.

    To assign a specific data type to a variable, the constructor functions listed
    below are used:


    | Constructor Functions | Data Type |

    | --- | --- |

    | A = str(''Nine Planets'') | str |

    | A = int(55) | int (Must be a whole number, positive or negative with no decimals,
    no length restrictions) |

    | A = float(14e6) | float (Floating point number must be positive or negative
    number with one or more decimals; maybe scientific number an ''e'' to specify
    an exponential power of 10) |

    | A = complex(92j) | complex (Must be written with a ''j'' as an imaginary character)
    |

    | A = list((''teal'', maroon, ''jade'')) | list |

    | A = range(3, 110) | range |

    | A = tuple((''teal'', maroon, ''jade'')) | tuple |

    | A = set((''teal'', maroon, ''jade'')) | set |

    | A = frozenset((''teal'', ''jade'', maroon)) | frozenset |

    | A = dict(''color'': maroon, ''year'': 1988) | dict |

    | A = bool(False) | bool |

    | A = bytes(542) | bytes |

    | A = bytearray(9) | bytearray |

    | A = memoryview(bytes(525)) | memoryview |


