    Python Shell is a very convenient tool for testing Python commands, especially
    when we are first getting started with the language. However, if you exit from
    the Python Shell and enter it again, all the commands you type will be gone. In
    addition, you cannot use the Python Shell to create an actual program. To code
    an actual program, you need to write your code in a text file and save it with
    a .py extension. This file is known as a Python script.


