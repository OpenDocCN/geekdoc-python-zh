  md: '# Deques


    A deque (pronounced deck) is a double-ended queue. These objects are similar to
    lists with support for appends that are thread-safe and memory-efficient. A deque
    is mutable and has support for some of the list operations, like indexing. You
    can assign a deque by index, but you cannot slice one directly. For example, if
    you tried dq[1:2], you would get a Type Error; there is a way to do it though
    and we’ll look at that later.

    The biggest advantage of using a deque and not a list is that it is much faster
    to insert an item at the start of a deque than it is as the start of a list. That
    said, it isn’t always faster to insert items at the end of a deque. All deques
    are thread-safe and we can serialize them using a module called pickle.

    Perhaps one of the most useful ways to use a deque is for the population and consummation
    of items. Population and consummation of deque items happen sequentially from
    each end.


    ```

    from collections import deque

    dq = deque(''abc'') #the deque is created

    dq.append(''d'') #value ‘d’ is added on the right

    dq.appendleft(''z'') # value ‘z’ is added on the left

    dq.extend(''efg'') # multiple items are added on the right

    dq.extendleft(''yxw'') # multiple items are added on the left

    print(dq)

    ```


    Running this code will return:

    deque([‘w’, ‘x’, ‘y’, ‘z’, ‘a’, ‘b’, ‘c’, ‘d’, ‘e’, ‘f’, ‘g’])

    To consume items in our deque, we can use the pop() and popleft() methods:


    ```

    print(dq.pop()) #item on the right is returned and removed

    ```


    Running this code will return:

    ‘g’'
