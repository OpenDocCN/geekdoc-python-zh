    The rug plot is the simplest of all the Seaborn plots. The rug plot basically
    plots small rectangles for all the data points in a specific column. The `rugplot()`
    function is used to plot a rug plot in Seaborn. The following script plots a `rugplot()`
    for the `total_bill` column of the tips dataset.


