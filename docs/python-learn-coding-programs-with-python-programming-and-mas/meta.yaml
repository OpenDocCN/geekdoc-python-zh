- md: '## Chapter 1: Data Analysis the Basics


    ## What is Data Analysis?


    Data analysis is defined as a process of cleaning, transforming, and modeling
    data to discover useful information for business decision-making. The purpose
    of Data Analysis is to extract useful information from data and taking the decision
    based upon the data analysis. Whenever we take any decision in our day-to-day
    life is by thinking about what happened last time or what will happen by choosing
    that particular decision. This is nothing but analyzing our past or future and
    making decisions based on it. For that, we gather memories of our past or dreams
    of our future. So that is nothing but data analysis. Now same thing analyst does
    for business purposes, is called Data Analysis.


    Data analysis is can also be though as a practice where a company can take their
    raw data and then order and organize it. When the data is organized and run through
    a predictive model, it is going to help the company extract useful information
    out of it. The process of organizing and thinking about our data is going to be
    very important as it is the key to helping us understand what the data does and
    does not contain at any given time. Many companies have been collecting data for
    a long time. They may gather this data from their customers, from surveys, from
    social media, and many other locations. And while collecting the data is an important
    step that we need to focus on as well, another thing to consider is what we can
    do with the data. You can collect all of the data that you would like, but if
    it just sits in your cloud or a data warehouse and is never mined or used, then
    it is going to become worthless to you, and you wasted a lot of time and money
    trying to figure it all out. This is where data analysis will come in. it is able
    to take all of that raw data and actually, put it to some good use. It will use
    various models and algorithms, usually with the help of machine learning and Python,
    in order to help us to understand what important insights and information are
    found in our data, and how we are able to utilize these for our own benefit.


    ## Why Data Analysis?


    The reason that data analysis and analytics is so important is because it can
    help a business to optimize their performances overall.

    When a company is able to implement good data analysis into their business model,
    it means that they are able to reduce the costs that they experience on a day
    to day basis. This happens because the analysis will help them to identify the
    best, and the most efficient, ways of doing business, and because they are able
    to store up large amounts of data to help them get all of this process done in
    a timely manner.

    Another benefit of using this data analysis, and why it really does matter for
    a lot of companies, is that the company can use this process in order to make
    the best business decisions. These business decisions no longer need to rely on
    what other companies are doing or on the intuition of key decision-makers. Instead,
    they rely on the facts and insights provided in the collected data.

    Many companies also like to work with the process of data analytics because it
    will help them learn more about and serve their customers better. Data analytics
    can help us to analyze customer trends and the satisfaction levels of our customers,
    which can help the company come up with new, and better, services and products
    to offer.


    ## Data Analysis Tools


    Here are the best tools you can use for data analysis:


    - Python

    - Xplenty

    - IDEA

    - Microsoft HDInsight

    - Skytree

    - Talend

    - Splice Machine

    - Spark

    - Plotly

    - Apache SAMOA

    - Lumify


    ## Types of Data Analysis: Techniques and Methods


    There are different type of Data Analysis, below is a list of the most common
    ones


    - Text Analysis

    - Statistical Analysis

    - Descriptive Analysis

    - Diagnostic Analysis

    - Predictive Analysis


    Let’s look at the them more deeply.


    ## Text Analysis


    This is going to be a form of predictive analytics that can help us extract what
    the sentiments behind the text, based on the intensity of the presses on the keys,
    and the typing speeds.


    ## Statistical Analysis


    Statistical analysis involves many aspects of statistics. This analysis uses the
    concepts in statistics to make certain assumptions and predictions of data that
    has been collected by a company over a decade. For instance, let us assume that
    you are a clinical research company, and you have been trying to gather information
    on certain products being sold by your company. You will conduct thorough research
    on the type of product, the market you are targeting, and your competitors. Let
    us assume that you are looking to introduce a painkiller in the market. At such
    a time, you will try to understand the market better and see what it is that you
    can offer as compared to the other companies in the market. For you to do this,
    you will need to conduct a thorough statistical analysis


    ## Descriptive Analysis


    This is a process that is used in data mining and business intelligence. In descriptive
    analysis, you will be able to look at data and also analyze the past events. You
    will be able to obtain insight into approaching the events that may occur in the
    future. You will use this process to analyze and mine through the data to determine
    the reasons behind why the business has either succeeded or failed in the past.
    Every department in the company would always use this type of analysis to understand
    their successes and failures.


    ## Diagnostic Analysis


    As the name suggests, this type of analysis is done to "diagnose" or understand
    why a certain event unfolded and how that event can be prevented from occurring
    in the future or replicated if needed. For example, web marketing strategies and
    campaigns often employ social media platforms to get publicity and increase their
    goodwill. Not all campaigns are as successful as expected; therefore, learning
    from failed campaigns is just as important, if not more. Companies can run diagnostic
    analysis on their campaign by collecting data pertaining to the "social media
    mentions" of the campaign, number of campaign page views, the average amount of
    time spent on the campaign page by an individual, number of social media fans
    and followers of the campaign, online reviews and other related metrics to understand
    why the campaign failed and how future campaigns can be made more effective.


    ## Predictive Analysis


    The predictive analysis gets driven by predictive modeling. It isn’t exactly a
    process but more of an approach. In the case of data science, machine learning
    and predictive analysis go hand in hand. The predictive models normally include
    machine learning algorithms. These models are trained over a period of time for
    responding to newer values or data and deliver necessary information for business
    requirements. Predictive modeling basically overlaps with machine learning.

    You can find two kinds of predictive models and they are classification models
    and regression models which predict class membership and numbers respectively.
    These models are made up by using algorithms. These algorithms perform statistical
    analysis and data mining to decide the patterns and trends emerging out of the
    available data. There are software solutions available for predictive analysis
    which comes with built-in algorithms that are utilized for making predictive models.
    These algorithms are called classifiers and they identify what set of categories
    this data belongs to.


    ## Prescriptive Analysis


    Prescriptive analysis works towards optimizing and simulating the data and creating
    a model for the future. This type of analysis helps in synthesizing big data and
    will also help you understand the rules of business to help you make predictions
    about the future.


    ## Data Analysis Process


    When it comes to working with data analysis it is a good practice to follow a
    well define process. This will ensure that you can handle the data in the proper
    manner and that it will work the way that we want it to. These are going to include
    some of the initial phases of cleaning our data, working with whether the data
    is high enough quality, quality measurement analysis, and then we enter into the
    main data analysis. Below are shown the main macro phases of a data analysis process:


    - Data Requirement Gathering

    - Data Collection

    - Data Cleaning

    - Data Analysis

    - Data Interpretation

    - Data Visualization


    ## 1- Data Requirement Gathering


    It is important to understand what information or data needs to be gathered to
    meet the business objective and goals. Data organization is also very critical
    for efficient and accurate data analysis. Some of the categories in which the
    data can be organized are gender, age, demographics, location, ethnicity, and
    income. A decision must also be made on the required data types (qualitative and
    quantitative) and data values (can be numerical or alphanumerical) to be used
    for the analysis.


    ## 2- Data Collection


    Searching for the data that we want to work with. Once we have a good idea of
    the information that we need, and the business problem that we would like to solve,
    it is time for us to go through and look for the data. There are a number of places
    where we are able to find this data, such as in surveys, social media, and more,
    so going out and searching for it here is'
  mdcn: '## 第一章：数据分析基础


    ## 什么是数据分析？


    数据分析被定义为一个清洗、转换和建模数据的过程，旨在发现对商业决策有用的信息。数据分析的目的是从数据中提取有用信息，并基于数据分析结果做出决策。在我们的日常生活中，每当我们做出任何决定时，都是基于对上次发生情况的思考，或是对选择特定决定后可能发生情况的预判。这无非就是分析我们的过去或未来，并据此做出决策。为此，我们收集关于过去的记忆或对未来的憧憬。这其实就是数据分析。现在，分析师出于商业目的所做的同样的事情，就被称为数据分析。


    数据分析也可以被视为一种实践，公司可以利用其原始数据，然后对其进行排序和组织。当数据被组织起来并通过预测模型运行时，它将帮助公司从中提取有用信息。组织和思考数据的过程将非常重要，因为这是帮助我们理解数据在任何给定时间包含和不包含什么的关键。许多公司已经收集数据很长时间了。他们可能从客户、调查、社交媒体以及许多其他来源收集这些数据。虽然收集数据是我们需要关注的重要一步，但另一个需要考虑的问题是我们能用这些数据做什么。你可以收集所有你想要的数据，但如果它只是存放在你的云存储或数据仓库中，从未被挖掘或使用，那么它对你来说将变得毫无价值，你浪费了大量的时间和金钱试图弄清楚这一切。这就是数据分析将发挥作用的地方。它能够获取所有这些原始数据，并真正将其用于某种有益的用途。它将使用各种模型和算法，通常借助机器学习和Python的帮助，来帮助我们理解数据中包含哪些重要的见解和信息，以及我们如何能够利用这些信息为我们自己谋利。


    ## 为什么需要数据分析？


    数据分析和分析如此重要的原因在于它可以帮助企业整体优化其绩效。

    当公司能够将良好的数据分析融入其商业模式时，这意味着他们能够降低日常运营成本。这是因为分析将帮助他们识别最佳、最高效的业务开展方式，并且因为他们能够存储大量数据，以帮助他们及时完成所有这些流程。

    使用数据分析的另一个好处，也是它对许多公司真正重要的原因，在于公司可以利用这个过程做出最佳的商业决策。这些商业决策不再需要依赖其他公司的做法或关键决策者的直觉。相反，它们依赖于收集数据中提供的事实和见解。

    许多公司也喜欢使用数据分析过程，因为它将帮助他们更好地了解和服务客户。数据分析可以帮助我们分析客户趋势和客户满意度水平，这可以帮助公司推出新的、更好的服务和产品。


    ## 数据分析工具


    以下是你可用于数据分析的最佳工具：


    - Python

    - Xplenty

    - IDEA

    - Microsoft HDInsight

    - Skytree

    - Talend

    - Splice Machine

    - Spark

    - Plotly

    - Apache SAMOA

    - Lumify


    ## 数据分析的类型：技术与方法


    数据分析有不同的类型，以下是最常见的几种：


    - 文本分析

    - 统计分析

    - 描述性分析

    - 诊断性分析

    - 预测性分析


    让我们更深入地了解它们。


    ## 文本分析


    这将是一种预测分析的形式，它可以帮助我们根据按键的力度和打字速度，提取文本背后的情感。


    ## 统计分析


    统计分析涉及统计学的许多方面。该分析使用统计学中的概念，对公司十年来收集的数据进行某些假设和预测。例如，假设你是一家临床研究公司，一直在尝试收集有关公司销售的某些产品的信息。你将对产品类型、目标市场和竞争对手进行彻底研究。假设你打算向市场推出一种止痛药。在这种时候，你将试图更好地了解市场，并看看与市场上的其他公司相比，你能提供什么。为此，你需要进行彻底的统计分析。


    ## 描述性分析


    这是数据挖掘和商业智能中使用的一个过程。在描述性分析中，你将能够查看数据并分析过去的事件。你将能够获得洞察力，以应对未来可能发生的事件。你将使用这个过程来分析和挖掘数据，以确定过去业务成功或失败背后的原因。公司的每个部门都会始终使用这种类型的分析来理解他们的成功和失败。


    ## 诊断性分析


    顾名思义，这种类型的分析是为了“诊断”或理解为什么某个事件会发生，以及如何防止该事件在未来发生，或者在需要时复制该事件。例如，网络营销策略和活动经常利用社交媒体平台来获得宣传并提高其声誉。并非所有活动都像预期的那样成功；因此，从失败的活动中学习同样重要，甚至更重要。公司可以通过收集与活动相关的“社交媒体提及”、活动页面浏览量、个人在活动页面上花费的平均时间、活动的社交媒体粉丝和关注者数量、在线评论和其他相关指标的数据，对其活动进行诊断性分析，以了解活动失败的原因以及如何使未来的活动更有效。


    ## 预测性分析


    预测性分析由预测模型驱动。它不完全是一个过程，而更像是一种方法。在数据科学领域，机器学习和预测性分析是相辅相成的。预测模型通常包含机器学习算法。这些模型经过一段时间的训练，以响应新的值或数据，并为业务需求提供必要的信息。预测建模基本上与机器学习重叠。

    你可以找到两种预测模型，它们是分类模型和回归模型，分别预测类别成员资格和数字。这些模型是通过使用算法构建的。这些算法执行统计分析和数据挖掘，以确定从可用数据中出现的模式和趋势。有可用于预测分析的软件解决方案，它们带有内置算法，用于构建预测模型。这些算法被称为分类器，它们识别这组数据属于哪个类别。


    ## 规范性分析


    规范性分析致力于优化和模拟数据，并为未来创建模型。这种类型的分析有助于综合大数据，并将帮助你理解业务规则，以帮助你对未来做出预测。


    ## 数据分析过程


    在处理数据分析时，遵循一个定义良好的过程是一个好习惯。这将确保你能够以适当的方式处理数据，并且它将按照我们希望的方式工作。这将包括一些初始阶段，如清洗我们的数据、处理数据质量是否足够高、质量测量分析，然后我们进入主要的数据分析。以下是数据分析过程的主要宏观阶段：


    - 数据需求收集

    - 数据收集

    - 数据清洗

    - 数据分析

    - 数据解释

    - 数据可视化


    ## 1- 数据需求收集


    了解需要收集哪些信息或数据以实现业务目标和目的是非常重要的。数据组织对于高效和准确的数据分析也至关重要。数据可以组织的一些类别包括性别、年龄、人口统计、位置、种族和收入。还必须决定用于分析所需的数据类型（定性和定量）和数据值（可以是数字或字母数字）。


    ## 2- 数据收集


    搜索我们想要处理的数据。一旦我们对需要的信息和想要解决的业务问题有了清晰的认识，就该我们去寻找数据了。我们可以在许多地方找到这些数据，例如调查、社交媒体等，所以去这些地方搜索'
