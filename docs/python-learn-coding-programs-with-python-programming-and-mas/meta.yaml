    ## Parameter Sharing


    You can use a parameter sharing scheme in your convolutional layers to entirely
    control the number of used parameters. If you denoted a single two-dimensional
    slice of depth as your depth slice, you can constrain the neurons contained in
    every depth slice to use the same bias and weights. Using parameter sharing techniques,
    you will get a unique collection of weights, one of every depth slice, and you
    will get a unique collection of weights. Therefore, you can significantly reduce
    the number of parameters contained in the first layer of your ConvNet. Doing this
    step, all neurons in every depth slice of your ConvNet will use the same parameters.
    In other words, during backpropagation, every neuron contained in the volume will
    automatically compute the gradient for all its weights. However, these computed
    gradients will add up over every depth slice, so you get to update just a single
    collection of weights per depth slice. In this way, all neurons contained in one
    depth slice will use the same weight vector. Therefore, when you forward the pass
    of the convolutional layers in every depth slice, it is computed as a convolution
    of all neurons’ weights alongside the input volume. This is the reason why we
    refer to the collection of weights we get as a kernel or a filter, which is convolved
    with your input. However, there are a few cases in which this parameter sharing
    assumption does not make any sense. This is commonly the case with many input
    images to a convolutional layer that comes with a certain centered structure,
    where you must learn different features depending on your image location. For
    instance, when you have an input of several faces which have been centered in
    your image, you probably expect to get different hair-specific or eye-specific
    features that could be easily learned at many spatial locations. When this is
    the case, it is very common to just relax this parameter sharing scheme and simply
    use a locally-connected layer.


    ## Matrix Multiplication


    The convolution operation commonly performs those dot products between the local
    regions of the input and between the filters. In these cases, a common implementation
    technique of the convolutional layers is to take full advantage of this fact and
    to formulate the specific forward pass of the main convolutional layer representing
    it as one large matrix multiply. Implementation of matrix multiplication is when
    the local areas of an input image are completely stretched out into different
    columns during an operation known as im2col. For instance, if you have an input
    of size 227x227x3 and you convolve it with a filter of size 11x11x3 at a stride
    of 4, you must take blocks of pixels in size 11x11x3 in the input and stretch
    every block into a column vector of size 363. However, when you iterate this process
    in your input stride of 4, you get 55 locations along with both weight and height
    that lead to an output matrix of x column in which every column is a maximally
    stretched out receptive fields and where you have 3025 fields in total. Each number
    in your input volume can be duplicated in multiple distinct columns. Also, remember
    that the weights of the convolutional layers are very similarly stretched out
    into certain rows as well. For instance, if you have 95 filters in size of 11x11x3,
    you will get a matrix of w row of size 96x363.


