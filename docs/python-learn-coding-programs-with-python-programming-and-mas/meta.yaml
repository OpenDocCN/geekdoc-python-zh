    Now the `titanic_pclass1` series, which contains `True` or `False`, can be passed
    inside the opening and closing square brackets that follow the `titanic_data`
    dataframe. The result will be the Titanic dataset, containing only those records
    where the `Pclass` column contains 1.


    Script 3:


    ```python

    titanic_pclass1 = (titanic_data.Pclass == 1)

