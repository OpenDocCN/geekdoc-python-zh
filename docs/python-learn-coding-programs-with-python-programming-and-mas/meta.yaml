    \n### 作业\n\n编写一个程序，接受用户输入的年龄，显式地将年龄转换为整数数据类型，然后使用if…else流程控制来测试该人是否未成年，法定年龄为21岁。包括注释和缩进以提高程序的可读性。\n\
    \n其他后续工作：仅使用if语句编写Python程序以执行以下操作：\n\n- 1. 给定number=7，编写一个程序来测试并仅显示偶数。\n- 2. 给定number1=8,\
