  md: "# Abstraction\n\nAbstraction is generally a net positive for a large number\
    \ of applications that are being written today, and there’s a reason Python and\
    \ other object-oriented programming languages are incredibly popular. Abstraction\
    \ is the process of simplifying complex realities by modeling classes to handle\
    \ specific problems. An abstract class cannot be instantiated and you can neither\
    \ create class instances nor objects for them. Abstract classes are designed to\
    \ inherit all or only specific features from a base class. Abstraction innately\
    \ makes the language easier to understand, read, and learn. Though it makes the\
    \ language a tad bit less powerful by taking away some of the power that the user\
    \ has over the entire computer architecture, this is traded instead for the ability\
    \ to program quickly and efficiently in the language, not wasting time dealing\
    \ with trivialities like memory addresses or things of the like. These apply in\
    \ Python because, well, it’s incredibly simple. You can’t get down into the nitty-gritty\
    \ of the computer, or do much with memory allocation or even specifically allocate\
    \ an array size too easily, but this is a tradeoff for amazing readability, a\
    \ highly secure language in a highly secure environment, and ease of use with\
    \ programming. Compare the following:\n\nsnippet of code from C:\n\n```\n#include\
    \ <stdio.h>\nint main(void) {\n    printf(\"hello world\");\n    return 0;\n}.\n\
