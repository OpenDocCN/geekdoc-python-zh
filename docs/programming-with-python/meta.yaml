  md: "# with client process\n\n+   - Client connection creates new socket\n  - Returned\
    \ with address by accept()\n\n+   - Server handles one client at a time\n  - Connection-oriented\
    \ servers are a little more complex because the connection allows clients and\
    \ servers to interact across multiple send() and recv() calls.\n  - The server\
    \ blocks in accept() until a server connects. The return value from accept() is\
    \ a tuple consisting of a socket and the client address (which is the usual (address,\
    \ port) tuple).\n  - The server can, if it chooses, use multitasking techniques\
    \ such as creating a new thread or forking a new process to allow it to handle\
    \ several concurrent connections. Either solution allows the connection to be\
    \ processed while the main control loop returns to execute another accept() and\
    \ deal with the next client connection.\n  - Since each connection generates a\
    \ new server-side socket there is no conflict between the different conversations,\
    \ and the server can continue to use the listen()ing socket to listen for incoming\
    \ connections while it serves already-connected clients.\n\n```\nConnection-Oriented\
    \ Client\ns = socket(AF_INET, SOCK_STREAM)\ns.connect((HOST, PORT))\ns.send('Hello,\
    \ world')\ndata = s.recv(1024)\ns.close()\nprint 'Received', data\n```\n\n+  \
    \ - This is a simple example\n  - Sends message, receives response\n  - Server\
    \ receives 0 bytes after close()\n\nThis very simple client just sends a single\
    \ message and receives a single response.\nMore typical code will send a request\
    \ and use its understanding of the application protocol to determine when the\
    \ response to that request has been completed.\nProtocols like HTTP 1.0 use a\
    \ separate connection for each request. Protocols like telnet can exchange thousands\
    \ of messages before the connection is closed, and the code tends to be more complex\
    \ in that case.\nUnder normal circumstances a recv() call guarantees that at least\
    \ one byte of data will be returned. When a program seems the empty string (zero\
    \ bytes) returned from the recv() it knows that the other end has terminated the\
    \ connection by calling close() on its socket."
