    | s.close() | This method closes socket |\n| socket.gethostname() | Returns the\
    \ hostname. |\n\n## Creating a Socket\n\nNow we create an INET, STREAMing socket\
    \ in Python\n\n**s = socket.socket(socket.AF_INET, socket.SOCK_STREAM)**\n\nNow\
    \ connect to the web server on port 80 (Which is the normal http port)\n\n**s.connect((\"\
