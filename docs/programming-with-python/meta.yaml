    ## 3.2 Regular Expression Patterns


    Regular Expression are categorized into many types, which are as follows:


    1. *Simple Patterns*

    Regular expressions are used to operate on strings, hence we will see matching
    characters.


    2. *Matching Characters*

    Letters and characters will simply match themselves. For example, the regular
    expression python will match the string python exactly.


    List of the metacharacters: `.` `^` `$` `*` `+` `?` `{` `}` `[` `]` `|` `\` `(`
    `)`


    `[` and `]` used for specifying a **character class**, which is a set of characters
    that you wish to match. Characters can be listed individually, or a range of characters
    can be indicated by giving two characters and separating them by a ''-''.


    **[abc]** or **[a-c]** will match any of the characters **a**, **b**, or **c**;


    `[a-z]` to match only lowercase letters **from a to z**.


    Most important metacharacter is the **backslash**, `\`. As in Python string literals,
    the backslash can be followed by various characters to signal various special
    sequences. It''s also used to escape all the metacharacters so you can still match
    them in patterns; for example, if you need to match a `[` or `\`, you can precede
    them with a backslash to remove their special meaning: `\[` or `\\`.


    ## 3. Repeating Things


    The first **metacharacter for repeating things** that we will see is `*`. `*`
    doesn''t match the literal character `*`; instead, it specifies that the previous
    character can be matched zero or more times, instead of exactly once.


    For example, `ca*t` will match `ct` (0 a characters), `cat` (1 a), `caaat` (3
    a characters), and followed by t character.


    **Another repeating metacharacter is `+`**, which matches one or more times. Difference
    between `*` and `+`; `*` matches zero or more times, so whatever''s being repeated
    may not be present at all, while `+` requires at least one occurrence. To use
    a similar example, `ca+t` will match `cat` (1 a), `caaat` (3 a''s), but won''t
    match `ct`.


    There are two more repeating qualifiers. **The question mark character, `?`, matches
    either once or zero times.**


    ## Regular-expression Patterns


    Except for control characters, `+` `?` `.` `*` `^` `$` `(` `)` `[` `]` `{` `}`
    `|` `\`, all characters match themselves. You can escape a control character by
    preceding it with a backslash.


    Following table lists the regular expression syntax that is available in Python:


    ## Regular Expression Patterns


    | Pattern | Description |

    | :--- | :--- |

    | `^` | Matches beginning of line. |

    | `$` | Matches end of line. |

    | `.` | Matches any single character except newline. Using m option allows it
    to match newline as well. |

    | `[...]` | Matches any single character in brackets. |

    | `[^...]` | Matches any single character not in brackets |

    | `re*` | Matches 0 or more occurrences of preceding expression. |

    | `re+` | Matches 1 or more occurrence of preceding expression. |

    | `re?` | Matches 0 or 1 occurrence of preceding expression. |

    | `re{ n}` | Matches exactly n number of occurrences of preceding expression.
    |

    | `re{ n,}` | Matches n or more occurrences of preceding expression. |

    | `re{ n, m}` | Matches at least n and at most m occurrences of preceding expression.
    |

    | `a| b` | Matches either a or b. |

    | `(re)` | Groups regular expressions and remembers matched text. |

    | `(?imx)` | Temporarily toggles on i, m, or x options within a regular expression.
    If in parentheses, only that area is affected. |

    | `(?-imx)` | Temporarily toggles off i, m, or x options within a regular expression.
    If in parentheses, only that area is affected. |

    | `(: re)` | Groups regular expressions without remembering matched text. |

    | `(?imx: re)` | Temporarily toggles on i, m, or x options within parentheses.
    |

    | `(?-imx: re)` | Temporarily toggles off i, m, or x options within parentheses.
    |

    | `(?#...)` | Comment. |

    | `(?= re)` | Specifies position using a pattern. Doesn''t have a range. |

    | `(?! re)` | Specifies position using pattern negation. Doesn''t have a range.
    |

    | `(?> re)` | Matches independent pattern without backtracking. |

    | `\w` | Matches independent pattern without backtracking. |

    | `\W` | Matches nonword characters. |

    | `\s` | Matches whitespace. Equivalent to `[\t\n\r\f]`. |

    | `\S` | Matches nonwhitespace. |

    | `\d` | Matches digits. Equivalent to `[0-9]`. |

    | `\D` | Matches nondigits. |

    | `\A` | Matches beginning of string. |

    | `\Z` | Matches end of string. If a newline exists, it matches just before newline.
    |

    | `\z` | Matches end of string. |

    | `\G` | Matches point where last match finished. |

    | `\b` | Matches word boundaries when outside brackets. Matches backspace (0x08)
    when inside brackets. |

    | `\B` | Matches nonword boundaries. |

    | `\n`, `\t`, etc. | Matches newlines, carriage returns, tabs, etc. |

    | `\1...\9` | Matches nth grouped subexpression. |

    | `\10` | Matches nth grouped subexpression if it matched already. Otherwise refers
    to the octal representation of a character code. |


    ## Regular-expression Examples


    Literal characters:


    | Example | Description |

    | :--- | :--- |

    | `python` | Match "python". |


    Character classes:


    | Example | Description |

    | :--- | :--- |

    | `[Pp]ython` | Match "Python" or "python" |

    | `rub[ye]` | Match "ruby" or "rube" |

    | `[aeiou]` | Match any one lowercase vowel |

    | `[0-9]` | Match any digit; same as `[0123456789]` |

    | `[a-z]` | Match any lowercase ASCII letter |

    | `[A-Z]` | Match any uppercase ASCII letter |

    | `[a-zA-Z0-9]` | Match any of the above |

    | `[^aeiou]` | Match anything other than a lowercase vowel |

    | `[^0-9]` | Match anything other than a digit |


    ## Special Character Classes:


    | Example | Description |

    | :--- | :--- |

    | `.` | Match any character except newline |

    | `\d` | Match a digit: `[0-9]` |

    | `\D` | Match a nondigit: `[^0-9]` |

    | `\s` | Match a whitespace character: `[ \t\r\n\f]` |

    | `\S` | Match nonwhitespace: `[^ \t\r\n\f]` |

    | `\w` | Match a single word character: `[A-Za-z0-9_]` |

    | `\W` | Match a nonword character: `[^A-Za-z0-9_]` |


    ## Repetition Cases:


    | Example | Description |

    | :--- | :--- |

    | `ruby?` | Match "rub" or "ruby": the y is optional |

    | `ruby*` | Match "rub" plus 0 or more ys |

    | `ruby+` | Match "rub" plus 1 or more ys |

    | `\d{3}` | Match exactly 3 digits |

    | `\d{3,}` | Match 3 or more digits |

    | `\d{3,5}` | Match 3,4,or 5 digits |


    ## Nongreedy repetition:


    This matches the smallest number of repetitions:


    | Example | Description |

    | :--- | :--- |

    | `<.*>` | Greedy repetition: matches "<python>perl>" |

    | `<.*?>` | Nongreedy: matches "<python>" in "<python>perl>" |


    ## Grouping with parentheses:


    | Example | Description |

    | :--- | :--- |

    | `\D\d+` | No group: + repeats `\d` |

    | `(\D\d)+` | Grouped: + repeats `\D\d` pair |

    | `([Pp]ython(, )?)+` | Match "Python", "Python, python, python", etc. |


    ## Backreferences:


    This matches a previously matched group again:


    | Example | Description |

    | :--- | :--- |

    | `([Pp])ython&\1ails` | Match python&pails or Python&Pails |

    | `(["''])\1*1` | Single or double-quoted string. `\1` matches whatever the 1st
    group matched. `\2` matches whatever the 2nd group matched, etc. |


    ## Alternatives:


    | Example | Description |

    | :--- | :--- |

    | `python\|perl` | Match "python" or "perl" |

    | `rub(y\|le)` | Match "ruby" or "ruble" |

    | `Python(!+\|\?)` | "Python" followed by one or more ! or one ? |


    ## Anchors:


    This needs to specify match position.


    | Example | Description |

    | :--- | :--- |

    | `^Python` | Match "Python" at the start of a string or internal line |

    | `Python$` | Match "Python" at the end of a string or line |

    | `\APython` | Match "Python" at the start of a string |

    | `Python\Z` | Match "Python" at the end of a string |

    | `\bPython\b` | Match "Python" at a word boundary |

    | `\brub\ B` | `\B` is nonword boundary: match "rub" in "rube" and "ruby" but
    not alone |

    | `Python(?=!)` | Match "Python", if followed by an exclamation point |

    | `Python(?! !)` | Match "Python", if not followed by an exclamation point |


    ## Special syntax with parentheses:


    | Example | Description |

    | :--- | :--- |

    | `R(?#comment)` | Matches "R". All the rest is a comment |

    | `R(?i)uby` | Case-insensitive while matching "uby" |

    | `R(?i:uby)` | Same as above |

    | `rub(?:y\|le)` | Group only without creating `\1` backreference |


    ## 3.2.1 Compilation Flags


    Compilation flags let you modify some aspects of how regular expressions work.
    Flags are available in the re module under two names, a long name such as IGNORECASE
    and a short, one-letter form such as I. (If you’re familiar with Perl’s pattern
    modifiers, the one-letter forms use the same letters; the short form of re.VERBOSE
    is re.X, for example.) Multiple flags can be specified by bitwise OR-ing them;
    re.I | re.M sets both the I and M flags, for example.


    Here’s a table of the available flags, followed by a more detailed explanation
    of each one.


    | Flag | Meaning |

    | :--- | :--- |

    | ASCII, A | Makes several escapes like \w, \b, \s and \d match only on ASCII
    characters with the respective property. |

    | DOTALL, S | Make . match any character, including newlines |

    | IGNORECASE, I | Do case-insensitive matches |

    | LOCALE, L | Do a locale-aware match |

    | MULTILINE, M | Multi-line matching, affecting ^ and $ |

    | VERBOSE, X (for `extended`) | Enable verbose REs, which can be organized more
    cleanly and understandably. |'
