  md: "![](img/19353aba2f109d1f7c4c239afb8fa982_48_0.png)\n\n**Raising an exception**\
    \ is a way for a function to inform its client a problem has occurred that *the\
    \ function itself cannot handle*.\n\nFor example, suppose a **function** called\
    \ **getYN** prompts a user to enter ‘y’ or ‘n’. If the user enters something other\
