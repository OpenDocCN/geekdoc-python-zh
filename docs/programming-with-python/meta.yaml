- md: "# Example\n\n![](img/19353aba2f109d1f7c4c239afb8fa982_114_0.png)\n\n# Explanation\n\
    \nThe Tkinter module, containing the Tk toolkit, has always to be imported. In\
    \ our example, we import everything from Tkinter by using the asterisk symbol\
    \ (\"*\") into our module's namespace:\n\n```python\nfrom Tkinter import *\n```\n\
    \nTo initialize Tkinter, we have to create a Tk root widget, which is a window\
    \ with a title bar and other decoration provided by the window manager. The root\
    \ widget has to be created before any other widgets and there can only be one\
    \ root widget.\n\n```python\nroot = Tk()\n```\n\nThe next line of code contains\
    \ the Label widget. The first parameter of the Label call is the name of the parent\
    \ window, in our case \"root\". So our Label widget is a child of the root widget.\
    \ The keyword parameter \"text\" specifies the text to be shown:\n\n```python\n\
    w = Label(root, text=\"Hello Tkinter!\")\n```\n\nThe pack method tells Tk to fit\
    \ the size of the window to the given text.\n\n```python\nw.pack()\n```\n\nThe\
    \ window won't appear until we enter the Tkinter event loop:\n\n```python\nroot.mainloop()\n\
    ```\n\nOur script will remain in the event loop until we close the window.\n\n\
    # 4.6.8 Spinbox widget\n\nThe Spinbox widget allows the user to select values\
    \ from a given set. The values may be a range of numbers, or a fixed set of strings.\n\
    \n# Syntax\n\n```python\nw = Spinbox( master, option, ... )\n```\n\n# Parameters\n\
    \n- master: This represents the parent window.\n- options: Here is the list of\
    \ most commonly used options for this widget. These options can be used as key-value\
    \ pairs separated by commas.\n\n| Option | Description |\n|---|---|\n| activebackground\
    \ | The color of the slider and arrowheads when the mouse is over them. |\n| bg\
    \ | The color of the slider and arrowheads when the mouse is not over them. |\n\
    | bd | The width of the 3-d borders around the entire perimeter of the trough,\
    \ and also the width of the 3-d effects on the arrowheads and slider. Default\
    \ is no border around the trough, and a 2-pixel border around the arrowheads and\
    \ slider. |\n| command | A procedure to be called whenever the scrollbar is moved.\
    \ |\n| cursor | The cursor that appears when the mouse is over the scrollbar.\
    \ |\n| Disabledbackground | The background color to use when the widget is disabled.\
    \ |\n| disabledforeground | The text color to use when the widget is disabled.\
    \ |\n| fg | Text color. |\n| font | The font to use in this widget. |\n| format\
    \ | Format string. No default value. |\n| from_ | The minimum value. Used together\
    \ with to to limit the spinbox range. |\n| justify | Default is LEFT |\n| relief\
    \ | Default is SUNKEN. |\n| repeatdelay | Together with repeatinterval, this option\
    \ controls button auto-repeat. Both values are given in milliseconds. |\n| repeatinterval\
    \ | See repeatdelay. |\n| state | One of NORMAL, DISABLED, or \"readonly\". Default\
    \ is NORMAL. |\n| textvariable | No default value. |\n| to | See from. |\n| validate\
    \ | Validation mode. Default is NONE. |\n| validatecommand | Validation callback.\
    \ No default value. |\n| values | A tuple containing valid values for this widget.\
    \ Overrides from/to/increment. |\n| vcmd | Same as validatecommand. |\n| Width\
    \ | Widget width, in character units. Default is 20. |\n| wrap | If true, the\
    \ up and down buttons will wrap around. |\n| xscrollcommand | Used to connect\
    \ a spinbox field to a horizontal scrollbar. This option should be set to the\
    \ set method of the corresponding scrollbar. |\n\n# Methods\n\nSpinbox objects\
    \ have following these methods:\n\n1. **delete(startindex [,endindex])**\n   This\
    \ method deletes a specific character or a range of text.\n2. **get(startindex\
    \ [,endindex])**\n   This method returns a specific character or a range of text.\n\
    3. **identify(x, y)**\n   Identifies the widget element at the given location.\n\
    4. **index(index)**\n   Returns the absolute value of an index based on the given\
    \ index.\n5. **insert(index [,string]...)**\n   This method inserts strings at\
    \ the specified index location.\n\n![](img/19353aba2f109d1f7c4c239afb8fa982_116_0.png)\n\
    \n# 4.6.9 Textbox widgets\n\nA text widget is used for multi-line text area. The\
    \ Tkinter text widget is very powerful and flexible and can be used for a wide\
    \ range of tasks. Though one of the main purposes is to provide simple multi-line\
    \ areas, as they are often used in forms, text widgets can also be used as simple\
    \ text editors or even web browsers.\n\nWe create a text widget by using the Text()\
    \ method. We set the height to 5, i.e. five lines and the width to 38, i.e. 38\
    \ characters. We can apply the method insert() on the object T, which the Text()\
    \ method had returned, to include text. We add five lines of text.(here three\
    \ lines are blank).\n\n![](img/19353aba2f109d1f7c4c239afb8fa982_116_1.png)\n\n\
    To force cursor into next line we use ‘\\n’ (like C-programming).\nWe can add\
    \ scroll bar in text widgets using Scrollbar() method. We call it with the root\
    \ object as the only parameter.\n\n![](img/19353aba2f109d1f7c4c239afb8fa982_117_0.png)\n\
    \nIn the above program we set the height as 4 means it display 4 lines at a time\
    \ and width as 50 means shows 50 characters including spaces and full stops. S.pack(side=RIGHT)\
    \ shows scroll bar in right hand side if change to LEFT than it display scroll\
    \ bar at left hand side.\n\n# 4.6.10 Text widget with Image\n\nWe add an image\
    \ to the text and bind a command to a text line.\n\nProgram name : textimage.py\n\
    \n```python\nfrom tkinter import *\nroot = Tk()\ntext1 = Text(root, height=20,\
    \ width=30)\nphoto=PhotoImage(file='./plant.gif')\ntext1.insert(END,'\\n')\ntext1.image_create(END,\
    \ image=photo)\ntext1.pack(side=LEFT)\ntext2 = Text(root, height=17, width=55)\n\
