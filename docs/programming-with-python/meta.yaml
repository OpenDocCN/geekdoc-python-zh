    \ item')\n```\n\nNext, the script prints out all of the keys and values in the\
    \ dictionary:\n\n```python\nfor key in db.keys():\n    print(\"Key =\",key,\"\
    \ value =\",db[key])\n```\n\nNote that there should be only these two entries.\
    \ After printing out all of the entries, the script removes one using del:\n\n\
    ```python\ndel db['www.wrox.com']\n```\n\nThe script then prints all of the keys\
    \ and values again, which should result in just one entry, as shown in the output.\
    \ Finally, the close method closes the dictionary, which involves saving all the\
    \ changes to disk, so the next time the file is opened it will be in the state\
    \ you left it.\n\n## 5.2 Introduction to RDBMS\n\n**RDBMS** stands for **Relational\
    \ Database Management System**. RDBMS data is structured in database tables, fields\
    \ and records. Each RDBMS table consists of database table rows. Each database\
    \ table row consists of one or more database table fields. Relational databases\
    \ are the technology of choice for complex data storage.\n\nIn a relational database,\
    \ data is stored in tables that can be viewed as two-dimensional data structures.\
    \ The columns, or **vertical part** of the two-dimensional matrix, are all of\
    \ the same type of data; like strings, numbers, dates, and so on. Each horizontal\
    \ component of the table is made up of rows, also called records. Each row in\
    \ turn is made up of columns. Typically, each record holds the information pertaining\
    \ to one item, such as an audio CD, a person, a purchase order, an automobile,\
    \ and so on.\n\nRDBMS store the data into collection of tables, which might be\
    \ related by common fields (database table columns). RDBMS also provide relational\
    \ operators to manipulate the data stored into the database tables. Most RDBMS\
    \ use SQL as database query language. The most popular RDBMS are MS SQL Server,\
    \ DB2, Oracle and MySQL.\n\nTo overcome the drawback of database the new concept\
    \ of relational database was introduced in 1970, by E.F.Codd. His idea was to\
    \ break down this repetitive data into separate files that could be related using\
    \ a common key field.\n\nA relation in a relational database is based on a relational\
    \ schema, which consists of number of attributes. A relational database is made\
    \ up of a number of relations and corresponding relational database schema. The\
    \ goal of a relational database design is to generate a set of relation schema\
    \ that allows us to store information without unnecessary redundancy and also\
    \ to retrieve information easily.\n\n## Different RDBMS available in the Market:\n\
    \n- 1. Oracle\n- 2. Sybase\n- 3. Ingress\n- 4. Db2\n- 5. Informix\n\nHence according\
    \ to the usage we have to decide whether to use DBM module or Relational Database.\
    \ The dbm modules work when your data needs can be stored as key/value pairs.\
    \ If you want to work with more complicated data within key/value pairs then it\
    \ can be very difficult to maintain with dbm.\n\n- 1. If your data needs are simple,\
    \ use a dbm persistent dictionary.\n- 2. If you plan to store only a small amount\
    \ of data, use a dbm persistent dictionary.\n- 3. If you require support for *transactions*,\
    \ use a **relational database**.\n- 4. If you require complex data structures\
    \ or multiple tables of linked data, use a relational database.\n- 5. Relational\
    \ databases provide a far richer and more complex API.\n\n## 5.3 Introduction\
    \ to SQL Statement\n\nSQL Commands Are Divided Into 4 Categories:\n\n- 1. **Data\
    \ Definition Language (DDL):** Used for Creating and Altering the Structure.\n\
    \   (CREATE, ALTER, DROP, RENAME, TRUNCATE)\n- 2. **Data Manipulation Language\
    \ (DML):** Used for Adding and Modifying Data.\n   (INSERT, UPDATE, DELETE)\n\
    - 3. **Data Control Language (DCL):** Used for Controlling Access of the Database\
    \ & transactions.\n   (GRANT, REVOKE, ROLLBACK, COMMIT, BEGIN TRANSACTION)\n-\
    \ 4. **Data Query Language (DQL):** Used for Querying a Database.\n   (SELECT\
    \ Statement)\n\n## Syntax and Example of Statement\n\nTo Create a Table:\n\nSyntax:\n\
    \n```sql\nCREATE TABLE <Name>\n(<Field1> <Datatype>, <Field 2> <Datatype>);\n\
    ```\n\n## Example:\n\n```sql\nCREATE TABLE Students\n(Roll_no Number(3), Name\
    \ Varchar2(10),\nAddress Varchar2(15), Dos Number(3), Win Number(3));\n```\n\n\
    (Note: The Table name and Column name should be maximum of 30 characters. They\
    \ can include special characters like $, #, _. Maximum 254 columns are allowed\
    \ per table.)\n\n## To insert values into the Table:\n\nSyntax:\n\n```sql\nINSERT\
    \ INTO <Table Name> VALUES\n(Value1, Value2, Value3);\n```\n\n## Example:\n\n\
    - 1. INSERT INTO Students VALUES\n   (1, ‘kiran‘, ‘UNR‘, 45,50);\n   [Enclose\
    \ character type of data in ‘ ‘.]\n- 2. INSERT INTO Students VALUES\n   (1, null,\
    \ ‘UNR‘, null,50);\n   [Use null when you do not want to enter any value.]\n-\
    \ 3. INSERT INTO Students VALUES\n   (&Roll_no, ‘&NAME‘, ‘&ADDRESS‘, &DOS,&WIN);\n\
    \   [Substituting values at the time of execution.]\n- 4. INSERT INTO Students\
    \ VALUES (Roll_no, Name)\n   (1, ‘kiran‘);\n   [Inserting only specified fields.]\n\
    \n## To Display the rows of a Table:\n\nSyntax:\n\n```sql\nSELECT * FROM <Table\
    \ Name>;\n[WHERE <condition>]\n[GROUP BY <exp> [HAVING <condition>]]\n[ORDER BY\
    \ <exp> [ASC | DESC]\n```\n\n## Example:\n\n- 1. SELECT * FROM Students;\n   [To\
    \ display all the rows of the Table]\n- 2. SELECT Roll_no, Name FROM Students;\n\
    \   [To display rows of only the specified columns]\n\n## To Delete rows from\
    \ the Table:\n\nSyntax:\n\n```sql\nDELETE FROM <Table Name>\n```\n\nExample:\n\
    \n- 1. DELETE FROM Students;\n\n## To Update the rows:\n\nExample:\n\n- 1. UPDATE\
    \ TABLE Students SET Address=’Kalyan‘;\n   [To Set new value of all the address\
    \ as ‘Kalyan‘]\n- 2. UPDATE TABLE Students SET Dos =80\n   WHERE Name=’Tina‘;\n\
    \   [To set the marks of ‘Tina‘ in Dos as 80]\n\n## Rollback:\n\nSyntax:\n\n```sql\n\
    ROLLBACK;\n```\n\nThis command will reverse all the DML statements, which are\
    \ not committed.\n\n## Different ways of Committing DML Statements:\n\nAll the\
    \ DML statements executed during the session do not make the permanent changes\
    \ in the database till they are committed. These are the different ways of committing\
    \ the DML statements.\n\n- 1. COMMIT: When COMMIT statement is given at the SQL\
    \ prompt.\n- 2. EXIT: When we EXIT from the SQL session.\n- 3. All DDL Statements\
    \ (CREATE, ALTER, DROP, RENAME, TRUNCATE)\n\n## To Drop a Table:\n\nSyntax:\n\n\
    ```sql\nDROP TABLE <Table Name>;\n```\n\nExample:\n\n```sql\nDROP TABLE Students;\n\
    ```\n\n## 5.4 What is MySQLdb\n\nMySQLdb is an interface for connecting to a MySQL\
    \ database server from Python. Python is a front end application through which\
    \ python scripts and programs along with SQL statements to access and retrieve\
    \ data from database will be inputed to the back end database application either\
    \ MySQL or sqlite3. Before proceeding for database Connections, MySQLdb should\
    \ be installed on your machine.\n\nTo Install MySQLdb connector for Python, Use\
    \ Following Link to install MySQLdb Connector for Python 2.7. It will not work\
    \ for Python 3.4.\n\n## 5.5 Introduction and Installation of MYSQL Connector\n\
    \nMySQL Connector is a python object used to connect python with MySQL backend.\
    \ The connect() constructor creates a connection to the MySQL server and returns\
    \ MySQLConnection object. The following example shows how to connect to the MySQL\
    \ server:\n\n```python\nimport mysql.connector\ncnx = mysql.connector.connect(user=’scott‘,\
    \ password=’tiger‘, host=’127.0.0.1‘, database=’employees‘)\ncnx.close()\n```\n\
    \nFor MySQLdb installation please Refer section 5.9.2 (step no. 2).\n\n## 5.6\
    \ Introduction and Installation of Connector Module\n\nPython module MySQLdb consist\
    \ of connect method so that we can connect MySQL Backend with python by specifying\
    \ Name of hostname, username and password information of mysql as a user Authentication\
    \ and database of MySQL which you have already created.\n\nPython module MySQLdb\
    \ is installed properly on your machine for that Download MySQL-python-1.2.2.tar\
    \ from google. After downloading.rar file. Extract that folder in python installation\
    \ directory & install all setup files in that, one setup file for windows and\
    \ one for common.\n\nFor Installation steps of Python Connector Module Refer section\
    \ 5.9.3 (step no. 4).\n\n## 5.7 Establishing Connection\n\nA Connection object\
    \ provides the means to communicate from your python script to a database program.\
    \ The Python database modules connect to the database. They do not include the\
    \ database application itself. Each database module needs to provide a connect\
    \ function that returns a connection object.\n\nThe parameters that are passed\
    \ to connect vary by the module and what is required to communicate with the database.\
    \ The following table lists the most common parameters.\n\n| Parameter | Usage\
