    # ## 2.4 Types of Exceptions


    ![](img/19353aba2f109d1f7c4c239afb8fa982_49_0.png)


    Fig. 2.2


    # ### 2.4.1 Standard Inbuilt Exceptions


    *Built-in Exceptions*


    Exceptions should be class objects. The exceptions are defined in the module **exceptions**.
    This module never needs to be imported explicitly: the exceptions are provided
    in the built-in namespace as well as the **exceptions** module.


    For class exceptions, in a **try** statement with an **except** clause that mentions
    a particular class, that clause also handles any exception classes derived from
    that class (but not exception classes from which it is derived).


    The built-in exceptions can be generated by the interpreter or built-in functions.
    Except where mentioned, they have an “associated value” indicating the detailed
    cause of the error. This may be a string or a tuple containing several items of
    information (e.g., an error code and description which is a string explaining
    the code). The associated value is the second argument to the **raise** statement.
    If the exception class is derived from the standard root class **BaseException**
    the associated value is present as the exception instance’s **args** attribute.


    The built-in exception classes can be subclassed to define new exceptions; programmers
    are encouraged to derive new exceptions from the **Exception** class or one of
    its subclasses, and not from **BaseException**.


    List of Built in Standard Exceptions –


    | EXCEPTION NAME | DESCRIPTION |

    |---|---|

    | Exception | Base class for all exceptions |

    | StopIteration | Raised when the next() method of an iterator does not point
    to any object. |

    | SystemExit | Raised by the sys.exit() function. |

    | StandardError | Base class for all built-in exceptions except StopIteration
    and SystemExit. |

    | ArithmeticError | Base class for all errors that occur for numeric calculation.
    |

    | OverflowError | Raised when a calculation exceeds maximum limit for a numeric
    type. |

    | FloatingPointError | Raised when a floating point calculation fails. |

    | ZeroDivisionError | Raised when division or modulo by zero takes place for all
    numeric types. |

    | AssertionError | Raised in case of failure of the Assert statement. |

    | AttributeError | Raised in case of failure of attribute reference or assignment.
    |

    | EOFError | Raised when there is no input from either the raw_input() or input()
    function and the end of file is reached. |'
- md: "## Exception Handling\n\n| Exception | Description |\n|---|---|\n| ImportError\
    \ | Raised when an import statement fails. |\n| KeyboardInterrupt | Raised when\
    \ the user interrupts program execution, usually by pressing Ctrl+c. |\n| LookupError\
    \ | Base class for all lookup errors. |\n| IndexError | Raised when an index is\
    \ not found in a sequence. |\n| KeyError | Raised when the specified key is not\
    \ found in the dictionary. |\n| NameError | Raised when an identifier is not found\
    \ in the local or global namespace. |\n| UnboundLocalError | Raised when trying\
    \ to access a local variable in a function or method but no value has been assigned\
    \ to it. |\n| EnvironmentError | Base class for all exceptions that occur outside\
    \ the Python environment. |\n| IOError | Raised when an input/ output operation\
    \ fails, such as the print statement or the open() function when trying to open\
    \ a file that does not exist. |\n| IOError | Raised for operating system-related\
    \ errors. |\n| SyntaxError | Raised when there is an error in Python syntax. |\n\
    | IndentationError | Raised when indentation is not specified properly. |\n| SystemError\
    \ | Raised when the interpreter finds an internal problem, but when this error\
    \ is encountered the Python interpreter does not exit. |\n| SystemExit | Raised\
    \ when Python interpreter is quit by using the sys.exit() function. If not handled\
    \ in the code, causes the interpreter to exit. |\n| ValueError | Raised when the\
    \ built-in function for a data type has the valid type of arguments, but the arguments\
    \ have invalid values specified. |\n| RuntimeError | Raised when a generated error\
    \ does not fall into any category. |\n| NotImplementedError | Raised when an abstract\
    \ method that needs to be implemented in an inherited class is not actually implemented.\
    \ |\n| BufferError | Raised when a buffer related operation cannot be performed.\
    \ |\n| KeyError | Raised when a mapping (dictionary) key is not found in the set\
    \ of existing keys. |\n| MemoryError | Raised when an operation runs out of memory\
    \ but the situation may still be rescued (by deleting some objects). |\n| OverflowError\
    \ | Raised when the result of an arithmetic operation is too large to be represented.\
    \ |\n| ReferenceError | This exception is raised when a weak reference proxy,\
    \ created by the weakref.proxy() function, is used to access an attribute of the\
    \ referent after it has been garbage collected. |\n| IndentationError | Base class\
    \ for syntax errors related to incorrect indentation. |\n| TabError | Raised when\
    \ indentation contains an inconsistent use of tabs and spaces |\n| TypeError |\
    \ Raised when an operation or function is applied to an object of inappropriate\
    \ type. The associated value is a string giving details about the type mismatch.\
    \ |\n| WindowsError | Raised when a Windows-specific error occurs. |\n| ZeroDivisionError\
    \ | Raised when the second argument of a division or modulo operation is zero\
    \ |\n\n## Exception Hierarchy\n\nThe class hierarchy for built-in exceptions is:\n\
    \n```\nBaseException\n+-- SystemExit\n+-- KeyboardInterrupt\n+-- GeneratorExit\n\
    +-- Exception\n    +-- StopIteration\n    +-- StandardError\n    | +-- BufferError\n\
    \    | +-- ArithmeticError\n    | |   +-- FloatingPointError\n    | |   +-- OverflowError\n\
    \    | |   +-- ZeroDivisionError\n    | +-- AssertionError\n    | +-- AttributeError\n\
    \    | +-- EnvironmentError\n    | |   +-- IOError\n    | |   +-- OSError\n  \
    \  | |       +-- WindowsError (Windows)\n    | |       +-- VMSError (VMS)\n  \
    \  | +-- EOFError\n    | +-- ImportError\n    | +-- LookupError\n    | |   +--\
    \ IndexError\n    | |   +-- KeyError\n    | +-- MemoryError\n    | +-- NameError\n\
    \    | |   +-- UnboundLocalError\n    | +-- ReferenceError\n    | +-- RuntimeError\n\
    \    | |   +-- NotImplementedError\n    | +-- SyntaxError\n    | |   +-- IndentationError\n\
    \    | |       +-- TabError\n    | +-- SystemError\n    | +-- TypeError\n    |\
    \ +-- ValueError\n    |   +-- UnicodeError\n    |     +-- UnicodeDecodeError\n\
    \    |     +-- UnicodeEncodeError\n    |     +-- UnicodeTranslateError\n+-- Warning\n\
    \  +-- DeprecationWarning\n  +-- PendingDeprecationWarning\n  +-- RuntimeWarning\n\
    \  +-- SyntaxWarning\n  +-- UserWarning\n  +-- FutureWarning\n  +-- ImportWarning\n\
    \  +-- UnicodeWarning\n  +-- BytesWarning\n```\n\n### 2.4.2 User Defined Exception\n\
    \nPython also allows us to create your own exceptions by deriving classes from\
    \ the standard built-in exceptions.\n\nIn the try block, the user-defined exception\
    \ is raised and caught in the except block. The variable e is used to create an\
    \ instance of the class *Networkerror*.\n\n```\nclass Networkerror(RuntimeError):\n\
    \    def __init__(self, arg):\n        self.args = arg\n```\n\nSo once you defined\
    \ above class, you can raise the exception as follows –\n\n```\ntry:\n    raise\
    \ Networkerror(“Bad hostname”)\nexcept Networkerror,e:\n    print (e.args)\n```\n\
    \n### 2.5 Propagation of Exception\n\nWhen an exception is raised and not handled\
    \ by the use side or client code side, it is automatically propagated back to\
    \ the *client’s* calling code until handled. If an exception is thrown all the\
    \ way back to the top level (main module) and not handled, then the program terminates\
    \ and displays the details of the exception.\n\nFor example, a program might not\
    \ be able to determine whether a password is valid at the source of the input.\
    \ Rather, the password must be verified in a password file that is accessed only\
    \ after a **chain of function calls** have been made. If the password is found\
    \ invalid, an exception is propagated from the function identifying the error\
    \ all the way back to the function responsible for user input, which can then\
    \ prompt the user to re-enter their password\n\n![](img/19353aba2f109d1f7c4c239afb8fa982_53_0.png)\n\
    \nAn exception is either handled by the user side or client code side, or automatically\
    \ propagated back to the user or client's calling code, and so on, until handled.\
    \ If an exception is thrown all the way back to the main module (and not handled),\
    \ the program terminates displaying the details of the exception.\n\n## 2.6 Assertion\
    \ in Python\n\nAn assertion is a sanity-check that you can turn on or turn off\
    \ when you are done with your testing of the program. An assertion is to liken\
    \ it to a **raise-if** statement. An expression is tested, and if the result comes\
    \ up false, an exception is raised.\n\nAssertions are carried out by the **assert**\
    \ statement. Programmers often place assertions at the start of a function to\
    \ check for valid input, and after a function call to check for valid output.\n\
    \n**The assert Statement**\nWhen it encounters an assert statement, Python evaluates\
    \ the accompanying expression, which may be true. If the expression is false,\
    \ Python raises an *AssertionError* exception.\n\n**The Syntax for Assert is –**\n\
    \n```\nassert Expression[, Arguments]\n```\n\nIf the assertion fails, Python uses\
    \ ArgumentExpression as the argument for the AssertionError. AssertionError exceptions\
    \ can be caught and handled like any other exception using the try-except statement,\
    \ but if not handled, they will terminate the program and produce a traceback.\n\
    \n**Example**\nHere is a function that converts a temperature from degrees Kelvin\
    \ to degrees Fahrenheit. Since zero degrees Kelvin is as cold as it gets, the\
    \ function bails out if it sees a negative temperature –\n\nFirst Observe the\
    \ output of this program\n\n```\npython\ndef KelvinToFahrenheit(Temperature):\n\
    \    assert (Temperature >= 0),\"Colder than absolute zero!\"\n    return ((Temperature-273)*1.8)+32\n\
    print (KelvinToFahrenheit(273))\nprint (int(KelvinToFahrenheit(505.78)))\n\n```\n\
    \nOutput\n\n```\nplaintext\nPython 3.4.3 (v3.4.3:9b73f1c3e601, Feb 24 2015, 22:43:06)\
    \ [MSC v.1600 32 bit (Intel)] on win32\nType \"copyright\", \"credits\" or \"\
