    # 4.6.4 输入框小部件


    **输入框** 小部件是 tkinter 的一个标准小部件，用于输入或显示单行文本。如果你想输入多行文本，必须使用文本小部件。输入框小部件也仅限于单一字体。


    ## 语法


    ```

    w = Entry(master, option, ... )

    ```


    “master” 代表父窗口，输入框小部件应放置在此处。选项的逗号分隔列表可以为空。


    输入框小部件示例 程序名：**entry.py**


    ```

    from tkinter import *


