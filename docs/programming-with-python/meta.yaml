    \ i.e.: inputs the data elements, which are needed for transmission.\n\n   E.g.:\
    \ Telephones and Personal Computers.\n\n2. **Transmitter:** The data generated\
    \ by a source system are not transmitted directly in the form in which they are\
    \ generated, instead the source information is encoded first and output is signal,\
    \ which is to be transmitted through the transmission system. And, a **Transmitter**\
    \ is a device, which transforms the signal or data and encodes the information\
    \ in such a way so as to produce electromagnetic signals that can be transmitted\
    \ across some sort of transmission system.\n\n   E.g.: A modem takes a digital\
