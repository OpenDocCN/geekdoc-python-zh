    \n```\nSocket created\nSocket bind complete\nSocket now listening\nConnected with\
    \ 127.0.0.1:47758\n```\n\nSo now our socket client (telnet) is connected to the\
    \ socket server program.\n\nThere are some of key functions from socket - Low-level\
    \ networking interface:\n\n1.  **socket.socket()**: Create a new socket using\
    \ the given address family, socket type and protocol number.\n2.  **socket.bind(address)**:\
    \ Bind the socket to address.\n3.  **socket.listen(backlog)**: Listen for connections\
    \ made to the socket. The backlog argument specifies the maximum number of queued\
    \ connections and should be at least 0; the maximum value is system-dependent\
    \ (usually 5), the minimum value is forced to 0.\n4.  **socket.accept()**: The\
    \ return value is a pair (conn, address) where conn is a new socket object usable\
    \ to send and receive data on the connection, and address is the address bound\
    \ to the socket on the other end of the connection. At accept(), a new socket\
    \ is created that is distinct from the named socket. This new socket is used solely\
    \ for communication with this particular client. For TCP servers, the socket object\
    \ used to receive connections is not the same socket used to perform subsequent\
    \ communication with the client. In particular, the accept() system call returns\
    \ a new socket object that’s actually used for the connection. This allows a server\
    \ to manage connections from a large number of clients simultaneously.\n5.  **socket.send(bytes[,\
    \ flags])**: Send data to the socket. The socket must be connected to a remote\
    \ socket. Returns the number of bytes sent. Applications are responsible for checking\
    \ that all data has been sent; if only some of the data was transmitted, the application\
    \ needs to attempt delivery of the remaining data.\n6.  **socket.close()**: Mark\
    \ the socket closed, all future operations on the socket object will fail. The\
    \ remote end will receive no more data (after queued data is flushed). Sockets\
    \ are automatically closed when they are garbage-collected, but it is recommended\
    \ to close() them explicitly.\n\nNote that the **server** socket doesn’t receive\
    \ any data. It just produces **client** sockets. Each **client socket** is created\
    \ in response to some other client socket doing a **connect()** to the host and\
    \ port we’re bound to. As soon as we’ve created that **client socket**, we go\
    \ back to listening for more connections.\n\n## 6.12 Sending Mail through SMTP\n\
    \n### 6.12.1 Introduction to SMTP\n\nSimple Mail Transfer Protocol (SMTP) is a\
