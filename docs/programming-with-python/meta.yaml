    \n1.  我们可以在Python中创建迭代器。要创建一个迭代器，必须实现 `__iter__()` 和 `__next__()` 方法。\n2.  `__iter__()`\
    \ 方法返回迭代器对象本身。如果需要，可以进行一些初始化操作。\n3.  `__next__()` 方法必须返回序列中的下一个项。当到达末尾以及在后续的调用中，它必须引发\
    \ `StopIteration` 异常。\n\n这个例子将在每次迭代中给我们下一个2的幂。幂指数从零开始，直到用户设定的数字。这里我们创建一个类来实现2的幂的迭代器。\n\
    \n```python\nclass PowerofTwo:\n    def __init__(self, max = 0):\n        self.max\
    \ = max\n\n    def __iter__(self):\n        self.n = 0\n        return self\n\n\
    \    def __next__(self):\n        if self.n <= self.max:\n            result =\
    \ 2 ** self.n\n            self.n += 1\n            return result\n        else:\n\
    \            raise StopIteration\n```\n\n## 输出\n\n![](img/19353aba2f109d1f7c4c239afb8fa982_39_0.png)\n\
    \n我们也可以使用 **for** 循环来遍历我们的迭代器类。\n\n## 1.11.4 Python无限迭代器\n\n迭代器对象中的项不一定必须耗尽。可以有无限迭代器（永不结束）。我们必须小心处理此类迭代器。\n\
    \n### *演示无限迭代器的例子。*\n\n内置函数 `iter()` 可以用两个参数调用，其中第一个参数必须是可调用对象（函数），第二个是哨兵值。迭代器会调用此函数，直到返回的值等于哨兵值。\n\
    \n```python\n>>> int()\n0\n>>> inf = iter(int,1)\n>>> next(inf)\n0\n>>> next(inf)\n\
    0\n```\n\n我们可以看到 `int()` 函数总是返回0。所以将其作为 `iter(int,1)` 传递，将返回一个迭代器，该迭代器调用 `int()`\
    \ 直到返回值等于1。这永远不会发生，于是我们得到了一个无限迭代器。\n\n我们也可以构建自己的无限迭代器。下面的迭代器将返回所有奇数。\n\n![](img/19353aba2f109d1f7c4c239afb8fa982_40_0.png)\n\
    \n一次示例运行如下所示。\n\n```python\na = iter(InfIter())\n>>> next(a)\n1\n>>> next(a)\n\
    3\n>>> next(a)\n5\n>>> next(a)\n7\nAnd so on...\n```\n\n在迭代这些类型的无限迭代器时，请注意包含终止条件。\n\
    \n使用迭代器的优点是它们节省资源。如上面的例子所示，我们可以在不将整个数字系统存储在内存中的情况下获得所有奇数。我们可以在有限的内存中拥有（理论上）无限的项。\n\
    \n## 1.11.5 生成器\n\n生成器简化了迭代器的创建。生成器是一个函数，它产生一系列结果而不是单个值。\n\n```python\ndef yrange(n):\n\
    \    i = 0\n    while i < n:\n        yield i\n        i += 1\n```\n\n每次执行 `yield`\
    \ 语句时，函数会生成一个新值。\n\n```python\n>>> y = yrange(3)\n>>> y\n<generator object yrange\
    \ at 0x401f30>\n>>> y.next()\n0\n>>> y.next()\n1\n>>> y.next()\n2\n>>> y.next()\n\
    Traceback (most recent call last):\n  File \"<stdin>\", line 1, in <module>\n\
    StopIteration\n```\n\n所以生成器也是一个迭代器。你不必担心迭代器协议。\n\n“生成器”这个词既指生成值的函数，也指它生成的东西。当生成器函数被调用时，它返回一个生成器对象，甚至不会开始执行该函数。当第一次调用\
    \ `next` 方法时，函数开始执行，直到达到 `yield` 语句。生成的值由 `next` 调用返回。\n\n以下示例演示了 `yield` 与生成器对象\
    \ `next` 方法调用之间的交互。\n\n```python\n>>> def foo():\n...     print \"begin\"\n...\
    \     for i in range(3):\n...         print \"before yield\", i\n...         yield\
    \ i\n...         print \"after yield\", i\n...     print \"end\"\n...\n```\n\n\
    ```python\n>>> f = foo()\n>>> f.next()\nbegin\nbefore yield 0\n0\n>>> f.next()\n\
    after yield 0\nbefore yield 1\n1\n>>> f.next()\nafter yield 1\nbefore yield 2\n\
    2\n>>> f.next()\nafter yield 2\nend\nTraceback (most recent call last):\n  File\
    \ \"<stdin>\", line 1, in <module>\nStopIteration\n>>>\n```\n\n## 1.12 迭代及其问题解决应用\n\
    \n在这种情况下，我们使用迭代器。代码更清晰。\n在下面的例子中，我们创建自己的对象来实现迭代器协议。\n\n```python\n#!/usr/bin/python\n\
    \n# iterator.py\n\nclass seq:\n    def __init__(self):\n        self.x = 0\n\n\
    \    def next(self):\n        self.x += 1\n        return self.x**self.x\n\n \
    \   def __iter__(self):\n        return self\n\ns = seq()\nn = 0\nfor i in s:\n\
    \    print i\n    n += 1\n    if n > 10:\n        break\n```\n\n在这个代码示例中，我们创建了一个数字序列1,\
    \ 4, 27, 256, ...。这表明使用迭代器，我们可以处理无限序列。`for` 语句在容器对象上调用 `iter()` 函数。该函数返回一个定义了\
    \ `next()` 方法的迭代器对象，该方法一次访问容器中的一个元素。\n\n```python\ndef next(self):\n    self.x\
    \ += 1\n    return self.x**self.x\n```\n\n`next()` 方法返回序列的下一个元素。\n\n```python\n\
    def __iter__(self):\n    return self\n```\n\n`__iter__` 方法返回迭代器对象。\n\n```python\n\
    if n > 10:\n    break\n```\n\n因为我们正在处理一个无限序列，我们必须中断 `for` 循环。\n\n```text\n$ ./iterator.py\n\
    1\n4\n27\n256\n3125\n46656\n823543\n16777216\n387420489\n10000000000\n285311670611\n\
    ```\n\n## 1.13 问题\n\n1.  什么是文本文件？写出 `open()` 函数的语法及其参数。\n2.  用例子解释写入、读取和追加功能。\n\
