    \ formatted in a way that only a computer program can read. |\n| File Access modes\
    \ for Text file are:<br>r → opens a file for reading only<br>r+ → opens file for\
    \ both reading and writing<br>w → opens file for writing only<br>w+ → opens file\
    \ for writing and reading<br>a → opens file for appending<br>a+ → opens file for\
    \ appending and reading | File Access modes for Binary file are:<br>rb → opens\
    \ a file for reading only<br>rb+ → opens file for both reading and writing<br>wb\
    \ → opens file for writing only<br>wb+ → opens file for writing and reading<br>ab\
    \ → opens file for appending<br>ab+ → opens file for appending and reading |\n\
    \n## 1.1.4 File Operations\n\n**Different File operations can be performed as\
