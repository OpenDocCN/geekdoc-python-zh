  md: '# # 6.6 Introduction to protocol and different types of protocols.


    Protocol may be defined as a set of rules governing the exchange of data between
    two entities.


    **Key Elements Of Protocol:**


    +   1. Syntax.

    2. Semantics.

    3. Timing.


    **1. Syntax:** It includes such things as data format and signal levels (i.e.:
    Encoding and Decoding).

    **2. Semantics:** It includes control information for co-ordination and error
    handling.

    **3. Timing:** It includes speed matching and sequencing.


    Depending upon these three key elements protocols are divided into two types.


    **Two Types Of Protocols Based On Key Elements:**


    +   1. Hardware Protocol.

    2. Software Protocol.


    **1. Hardware Protocol:** It is a protocol used to check set of rules for all
    hardware devices that means during transmission of data it checks each and every
    cable connections and all intermediate hardware devices such as routers and gateways.
    If any damage of hardware device occurs, the hardware protocol will identify that
    and provides message to the server like “A Network Cable Is Plugged Out”.


    **2. Software Protocol:** It is a set of rules used for checking the data or application
    through which the data is transferred. It also checks the data for each packet
    along with control information of each packet. During transmission checkpoints
    are created using software protocol, which gives information during packet lost
    or damaged or data gram lost or damaged or any sort of data problem.


    These software protocols are bifurcated into different types like SMTP, FTP, HTTP
    and MIME etc.


    # # 6.7 Introduction to Networking Connectivity


    **Network connectivity**


    Network connectivity means we are connecting different types of network with one
    another. Connectivity is possible with the help of different topologies implemented
    within the network. With the help of topologies we can communicate with other
    computer and there resources like printer, DVD writer etc. using Hub, Repeater
    Switches and Router.


    Python provides two levels of access to network services. At a low level, you
    can access the basic socket support in the underlying operating system, which
    allows you to implement clients and servers for both connection-oriented and connectionless
    protocols.


    Python also has libraries that provide higher-level access to specific application-level
    network protocols, such as FTP, HTTP, and so on.


    Network programming is a major use of Python'
