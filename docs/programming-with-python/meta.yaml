    \ dst. |\n| 10 | *os.listdir(path)* Return a list containing the names of the\
    \ entries in the directory given by path. |\n| 11 | *os.lseek(fd, pos, how)* Set\
    \ the current position of file descriptor fd to position pos, modified by how.\
