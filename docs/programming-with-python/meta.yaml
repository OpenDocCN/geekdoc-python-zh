  mdcn: "## 各种类型的套接字\n\n![](img/19353aba2f109d1f7c4c239afb8fa982_185_0.png)\n\n- \
    \  连接的端点\n-   通过IP地址和端口号标识\n-   实现高级网络接口的基础\n-   例如，远程过程调用（RPC）\n\n## 网络套接字\n\n\
    -   用于标识特定机器上的特定进程（程序）。\n-   套接字由两个数字组成：\n    -   IP地址：机器标识符\n    -   端口号：进程标识符\n\
    -   Berkeley套接字是最常见的套接字实现方式。\n-   两台计算机之间的连接可以表示为两个套接字：一个用于客户端机器和程序，一个用于服务器机器和程序。\n\
    \n## 端口号\n\n-   知名端口 – 0-1023\n\n示例：\n\n-   25：SMTP（电子邮件），80：HTTP（网页），110：POP3（电子邮件），443：HTTPS（安全网页）\n\
    -   注册端口 – 1024-49151\n-   私有/动态端口 – 49151-65535\n\n## 套接字编程API\n\n应用程序编程接口\n\n\
    套接字API是你用于发送和接收消息所需的编程接口。它几乎就像一扇门，一扇通往传输层的门（注意我们处于应用层）。\n\n-   套接字类似于门\n-   发送进程将消息推出门外\n\
    -   发送进程假设门另一侧的传输基础设施会将消息带到接收进程的套接字\n-   主机本地、应用程序创建/拥有、操作系统控制\n-   套接字之间的连接由操作系统设置/管理\n\
    \n![](img/19353aba2f109d1f7c4c239afb8fa982_186_0.png)\n\n## 套接字：概念视图\n\n![](img/19353aba2f109d1f7c4c239afb8fa982_186_1.png)\n\
    \n## 两种基本类型的套接字\n\n-   Sock_Stream\n    -   又称TCP\n    -   可靠传输\n    -   保证顺序\n\
    \    -   面向连接\n    -   双向\n\n-   Sock_Dgram\n    -   又称UDP\n    -   不可靠传输\n  \
    \  -   不保证顺序\n    -   没有“连接”的概念 - 应用程序为每个数据包指定目的地\n    -   可发送或接收\n\n![](img/19353aba2f109d1f7c4c239afb8fa982_187_0.png)\n\
    \n## 6.9 Socket模块\n\nSocket模块实现了与套接字通信层的接口。我们可以使用此模块创建客户端和服务器套接字。\n\n## socket模块\n\
    \n要创建套接字，我们必须使用socket模块中可用的socket.socket()函数，其通用语法为：\n\n```\ns = socket.socket(socket_family,\
    \ socket_type, protocol=0)\n```\n\n其中\n\n-   socket_family：这是AF_UNIX或AF_INET\n\
    -   socket_type：这是SOCK_STREAM或SOCK_DGRAM。\n-   protocol：通常省略，默认值为0。\n\nAF_UNIX或AF_LOCAL套接字族用于在同一台机器上的进程之间高效通信。\n\
    \nAF_INET的基本目的是允许其他可能的网络协议或地址族（AF代表地址族；PF_INET代表（IPv4）互联网协议族）。\n\nSOCK_STREAM意味着一个套接字流，数据传递就像文件流一样。\n\
    \n协议 - 一组特定的通信规则称为协议。\n\n当套接字对象准备好使用时，我们现在创建服务器套接字方法和客户端套接字方法。\n\n## 服务器套接字方法\n\
    \n| 方法 | 描述 |\n| --- | --- |\n| s.bind() | 此方法将地址（主机名，端口号对）绑定到套接字。 |\n| s.listen()\
    \ | 此方法设置并启动TCP监听器。 |\n| s.accept() | 此方法被动接受TCP客户端连接，等待连接到达（阻塞）。 |\n\n## 客户端套接字方法\n\
    \n| 方法 | 描述 |\n| --- | --- |\n| s.connect() | 此方法主动发起TCP服务器连接。 |\n\n## 通用套接字方法\n\
    \n| 方法 | 描述 |\n| --- | --- |\n| s.recv() | 此方法接收TCP消息 |\n| s.send() | 此方法发送TCP消息\
    \ |\n| s.recvfrom() | 此方法接收UDP消息 |\n| s.sendto() | 此方法发送UDP消息 |\n| s.close() |\
    \ 此方法关闭套接字 |\n| socket.gethostname() | 返回主机名。 |\n\n## 创建套接字\n\n现在我们在Python中创建一个INET，STREAMing套接字\n\
    \n**s = socket.socket(socket.AF_INET, socket.SOCK_STREAM)**\n\n现在连接到端口80上的Web服务器（这是正常的http端口）\n\
    \n**s.connect((\"www.google.com\", 80))**\n\n当**connect**完成时，套接字s可用于发送请求以获取页面文本。同一个套接字将读取回复，然后被销毁。销毁的客户端套接字通常只用于一次交换（或一小部分顺序交换）。\n\
    \nWeb服务器中发生的事情稍微复杂一些。首先，Web服务器创建一个\"**服务器套接字**\"：\n\n```\n# create an INET, STREAMing\
    \ socket\nserversocket = socket.socket(socket.AF_INET, socket.SOCK_STREAM)\n#\
    \ bind the socket to a public host, and a well-known port\nserversocket.bind((socket.gethostname(),\
    \ 80))\n# become a server socket\nserversocket.listen(5)\n```\n\n请注意，我们使用了**socket.gethostname()**，以便套接字对所有人可见。如果我们使用**s.bind(('localhost',\
    \ 80))**或**s.bind(('127.0.0.1', 80))**，我们仍然会有一个\"服务器\"套接字，但它只在同一台机器内可见。**s.bind(('',\
    \ 80))**指定套接字可通过机器拥有的任何地址访问。\n\n我们再次注意到，低编号端口通常保留给\"知名\"服务（HTTP、SNMP等）。如果我们只是测试，使用一个较高的数字（即4位数）。\n\
    \n现在，最后，*listen*的参数告诉套接字库，我们希望它在拒绝外部/其他连接之前，将多达5个连接请求（通常的最大值）排队。如果其余代码编写正确，这应该足够了。\n\
    \n现在我们有了一个\"服务器\"套接字，监听端口80，我们可以进入Web服务器的*主循环*：\n\n```\nwhile True:\n    # accept\
    \ connections from other/outside\n    (clientsocket, address) = serversocket.accept()\n\
    \    # now do something with the clientsocket\n    # in this case, we'll make\
    \ up this is a threaded server\n    ct = client_thread(clientsocket)\n    ct.run()\n\
    ```\n\n这个循环有三种通用的工作方式\n\n1.  分派一个线程来处理clientsocket，创建一个新进程来处理clientsocket，或者重构此应用程序以使用非阻塞套接字，并使用select在我们的\"\
    服务器\"套接字和任何活动的clientsocket之间进行多路复用。\n2.  现在需要理解的重要事情是：这就是\"服务器\"套接字所做的全部。它不发送任何数据。它不接收任何数据。它只是产生\"\
    客户端\"套接字。\n3.  每个clientsocket都是响应某个其他\"客户端\"套接字对我们绑定的主机和端口执行connect()而创建的。一旦我们创建了该clientsocket，我们就返回监听更多连接。两个\"\
    客户端\"可以自由聊天 - 它们使用一些动态分配的端口，这些端口将在对话结束时被回收。\n\n## 6.10 客户端-服务器架构\n\n*什么是客户端/服务器？*\n\
    \n**客户端**\n客户端是一个单用户工作站，提供表示服务、数据库服务和连接性，以及用于用户交互以获取业务需求的接口。\n\n**服务器**\n服务器是一个或多个具有更高共享内存容量的多用户处理器，提供连接性和数据库服务，以及与业务流程相关的接口。\n\
    \n![](img/19353aba2f109d1f7c4c239afb8fa982_189_0.png)\n\n*客户端/服务器架构简介*\n\n**客户端-服务器架构**，一种计算机网络架构，其中许多客户端（远程处理器）请求并接收来自集中式服务器（主机计算机）的服务。客户端计算机提供一个接口，允许计算机用户请求服务器的服务并显示服务器返回的结果。服务器等待来自客户端的请求到达，然后响应它们。\n\
    \n![](img/19353aba2f109d1f7c4c239afb8fa982_190_0.png)\n\n该协议依赖于请求服务的基础；客户端请求服务；服务器响应处理后的结果。两个方面之间的通信通过进程间通信（IPC）实现，这促进了客户端和服务器过程的分布式放置。\n\
    \n客户端/服务器模型基本上是平台无关的，并与\"协作处理\"或\"对等\"模型融合。该平台为用户提供了访问业务功能的机会，从而暴露于风险情况，因为它对底层技术以及用户都是透明的。\n\
    \n## 6.11 创建服务器-客户端程序\n\n*客户端和服务器编程基础*\n\n（请注意，对于客户端服务器连接，你需要在Linux中安装Python 3.4或最新版本，然后执行下面给出的步骤。我首先在VMware\
    \ Workstation 12 Player中安装Linux，然后安装Python 3.5）\n\n服务器是向你提供或交付特定服务的东西，客户端是请求该服务的人。\n\
    \n对于客户端和服务器连接，我们需要以下四个基本要素：\n\n1.  套接字（TCP或用户定义协议）\n2.  绑定\n3.  监听\n4.  接受\n\n\
    套接字通常是两个实体之间连接的端点，套接字充当客户端和服务器之间的桥梁。首先客户端将连接到套接字，那将是实际的服务器套接字，然后它将连接到服务器。现在我们需要基本的协议，即TCP。我们需要Python终端来导入套接字，套接字已经在Python库中，使用以下命令\n\
    \n```\n>>>import socket\n>>>s=socket.socket(socket.AF_INET,socket.SOCK_STREAM)\n\
    ```"
