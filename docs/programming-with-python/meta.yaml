  - "[PAGE 170]\n\n![](img/19353aba2f109d1f7c4c239afb8fa982_170_0.png)\n\n+   1. **Server\
    \ (Source):** Server is the device that generates the data to be transmitted,\
    \ i.e.: inputs the data elements, which are needed for transmission.\n    E.g.:\
    \ Telephones and Personal Computers.\n2. **Transmitter:** The data generated by\
    \ a source system are not transmitted directly in the form in which they are generated,\
    \ instead the source information is encoded first and output is signal, which\
    \ is to be transmitted through the transmission system. And, a **Transmitter**\
    \ is a device, which transforms the signal or data and encodes the information\
    \ in such a way so as to produce electromagnetic signals that can be transmitted\
    \ across some sort of transmission system.\n    E.g.: A modem takes a digital\
    \ bit stream (combination of bits) from an attached device such as a personal\
    \ computer (since output of computer is a digital signal through modem) and transforms\
    \ that bit stream into analog signal (analog signal is the one which is varying\
    \ signal in sine wave) which can be handled by the telephone network.\n    So,\
    \ combinely Source and Transmitter is known as Source System.\n3. **Transmission\
    \ System:** A **Transmission System** can be a single transmission line or a complex\
    \ network connecting source and the destination. It is the media, which is used\
    \ to connect the source and the destination.\n4. **Receiver:** The **Receiver**\
    \ accepts the signals from the transmission system and converts it into a form\
    \ that can be handled by the destination device.\n    E.g.: A **Modem** that,\
    \ is Modulator-Demodulator accepts one form of signal from transmitter or source\
    \ and converts it into another form to give it to the transmission system and\
    \ again output of transmission system is in the form of signal which is to be\
    \ converted into another form for reaching to the destination. Hence, output modem\
    \ will accept analog signal coming from a network or transmission line and convert\
    \ it into a digital bit stream.\n5. **Destination:** **Destination** takes the\
