    +   - A transaction in a database system must maintain Atomicity, Consistency,
    Isolation, and Durability

    - Transactions are completed by COMMIT or ROLLBACK SQL statements, which indicate
    a transaction’s beginning or end.

    - When a transaction completes successfully, database changes are said to be committed.
    when a transaction does not complete, changes are rolled back.


    For example, a transfer of money from one bank account to another requires two
    changes to the database both must succeed or fail together.


    ![](img/19353aba2f109d1f7c4c239afb8fa982_160_0.png)


    # ## Process of Transaction


    The transaction is executed as a series of reads and writes of database objects,
    which are explained below:


    # ### Read Operation


    To read a database object, it is first brought into main memory from disk, and
    then its value is copied into a program variable as shown in figure.


    ![](img/19353aba2f109d1f7c4c239afb8fa982_160_1.png)


    # ### Write Operation


    To write a database object, an in-memory copy of the object is first modified
    and then written to disk.'
