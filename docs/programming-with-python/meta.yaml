  md: '# 5.1.2 Introduction to DBM Module


    DBM, short for *database manager*, acts as a generic name for a number of C language
    libraries originally created on UNIX systems. These libraries sport names such
    as **dbm**, **gdbm**, **ndbm**, **sdbm**, and so on.


    Python supports a number of dbm modules. Each dbm module supports a similar interface
    and uses a particular C library to store the data to disk.


    The following table lists the dbm modules


    | Module | Description |

    |---|---|

    | dbm | Chooses the best dbm module |

    | dbm.dumb | Uses of simple, but portable, implementation of the dbm library |

    | dbm.gnu | Uses the GNU dbm library |


    The dbm module will choose the best implementation available when creating a **new
    persistent dictionary**. When **reading a file**.


    # 5.1.3 Creating Persistent Directory


    All of the dbm modules support an **open function** to **create a new dbm object**.
    Once opened, you can **store data in the dictionary**, **read data**, **close
    the dbm**, **remove items**, and **test for the existence** of a key in the dictionary.


    To open a dbm persistent dictionary, use the open function on the module you choose.


    For example, you can create a persistent dictionary with the dbm module.


    # Program to Create a Persistent Dictionary


    Code:


    ```

    import dbm


    db = dbm.open(''websites'', ''c'')


    # Add an item.

    db[''www.python.org''] = ''Python home page''


    print(db[''www.python.org''])


    # Close and save to disk.

    db.close()

    ```


    Output


    ![](img/19353aba2f109d1f7c4c239afb8fa982_123_0.png)'
