    \ | The text color to use when the widget is disabled. |\n| fg | Text color. |\n\
    | font | The font to use in this widget. |\n| format | Format string. No default\
    \ value. |\n| from_ | The minimum value. Used together with to to limit the spinbox\
    \ range. |\n| justify | Default is LEFT |\n| relief | Default is SUNKEN. |\n|\
    \ repeatdelay | Together with repeatinterval, this option controls button auto-repeat.\
    \ Both values are given in milliseconds. |\n| repeatinterval | See repeatdelay.\
    \ |\n| state | One of NORMAL, DISABLED, or \"readonly\". Default is NORMAL. |\n\
    | textvariable | No default value. |\n| to | See from. |\n| validate | Validation\
    \ mode. Default is NONE. |\n| validatecommand | Validation callback. No default\
    \ value. |\n| values | A tuple containing valid values for this widget. Overrides\
    \ from/to/increment. |\n| vcmd | Same as validatecommand. |\n| Width | Widget\
    \ width, in character units. Default is 20. |\n| wrap | If true, the up and down\
    \ buttons will wrap around. |\n| xscrollcommand | Used to connect a spinbox field\
    \ to a horizontal scrollbar. This option should be set to the set method of the\
    \ corresponding scrollbar. |\n\n## Methods\n\nSpinbox objects have following these\
    \ methods:\n\nI. **delete(startindex [,endindex])**\nThis method deletes a specific\
    \ character or a range of text.\n\nII. **get(startindex [,endindex])**\nThis method\
    \ returns a specific character or a range of text.\n\nIII. **identify(x, y)**\n\
