    take s advantage of computer graphics capabilities to make the program / script
    easy to use.te bast example of GUI is our Microsoft Window.


    The first graphical user interface was designed by Xerox Corporation''s Palo Alto
    Research Center in the 1970s, but it was not until the 1980s and the emergence
    of the Apple Macintosh that graphical user interfaces became popular. One reason
    for their slow acceptance was the fact that they require considerable CPU power
    and a high-quality monitor, which were prohibitively expensive.


    We can say that GUI is a software which is used as interface between computer
    and its user, which employs graphics element such as dialog box, icons, menus,
    scroll bar etc.


