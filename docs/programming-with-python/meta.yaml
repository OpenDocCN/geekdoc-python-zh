    The following example uses the POST method instead.


    ```

    import urllib.request

    import urllib.parse

    data = urllib.parse.urlencode({''spam'': 1, ''eggs'': 2, ''bacon'': 0})

    data = data.encode(''utf-8'')

    request = urllib.request.Request("http://requestb.in/xrbl82xr")

    request.add_header("Content-Type","application/x-www-form-urlencoded;charset=utf-8")

    f = urllib.request.urlopen(request, data)

    print(f.read().decode(''utf-8''))

    ```


    **In the case of HTTP, there are two extra things that Request objects allow you
    to do:**


    +   1. First, you can pass data to be sent to the server.

    2. Second, you can pass extra information (i.e. “metadata”) this information is
    sent as HTTP “headers”.


    # Data


    When we want to send data to a URL with HTTP, this is often done using **POST**
    request. This is often what your browser does when you submit a HTML form that
    we filled in on the web.


    In the common case of HTML forms, the data needs to be encoded in a standard way,
    and then passed to the Request object as the data argument.


