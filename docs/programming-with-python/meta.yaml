    \ socket library provides the common transports as well as a generic interface\
    \ for handling the entire or specific classes for handling.\n\n| Term | Description\
    \ |\n| :--- | :--- |\n| domain | The family of protocols that is used as the transport\
    \ mechanism. These values are constants such as AF_INET, PF_INET, PF_UNIX, PF_X25,\
    \ and so on. |\n| type | The type of communications between the two endpoints,\
    \ typically SOCK_STREAM for connection-oriented protocols and SOCK_DGRAM for connectionless\
    \ protocols. |\n| protocol | Typically zero, this may be used to identify a variant\
    \ of a protocol within a domain and type. |\n| hostname | The identifier of a\
    \ network interface:<br>A string, which can be a host name, a dotted-quad address,\
    \ or an IPV6 address in colon (and possibly dot) notation<br>A string \"<broadcast>\"\
    , which specifies an INADDR_BROADCAST address.<br>A zero-length string, which\
    \ specifies INADDR_ANY, or<br>An Integer, interpreted as a binary address in host\
    \ byte order. |\n| port | Each server listens for clients calling on one or more\
    \ ports. A port may be a Fixnum port number, a string containing a port number,\
    \ or the name of a service |\n\nA socket is a software abstraction, provides a\
    \ communication link between a single server process and a single client process.\n\
    \n## Various types of sockets\n\n![](img/19353aba2f109d1f7c4c239afb8fa982_185_0.png)\n\
    \n- Endpoint of a connection\n- Identified by IP address and Port number\n- Primitive\
    \ to implement high-level networking interfaces\n- e.g., Remote procedure call\
    \ (RPC)\n\n## Network Sockets\n\n- Used to identify particular processes (programs)\
    \ on particular machines.\n- Socket is composed of two numbers: – IP address:\
    \ machine identifier – Port number: process identifier\n- Berkeley Sockets most\
    \ common approach to sockets.\n- A connection between two computers can be represented\
    \ as two sockets: one for the client machine and program, one for the server machine\
    \ and program.\n\n## Port Numbers\n\n- Well-known ports – 0-1023\n- Examples:\n\
    \  - 25: SMTP (email), 80: HTTP (web), 110: POP3 (email), 443: HTTPS (secure web)\n\
    - Registered ports – 1024-49151\n- Private/Dynamic ports – 49151-65535\n\n## Socket\
    \ Programming API\n\nApplication Programming Interface\n\nSocket API is the programming\
    \ interface you need to use for transmitting and receiving messages. It is almost\
    \ like a kind of door, a door to transport layer (note that we are in application\
    \ layer).\n\n- Socket analogous to door\n- sending process shoves message out\
    \ door\n- sending process assumes transport infrastructure on other side of door\
    \ which brings message to socket at receiving process\n- host-local, application\
    \ created/owned, OS-controlled\n- connection between sockets set-up/managed by\
    \ OS\n\n![](img/19353aba2f109d1f7c4c239afb8fa982_186_0.png)\n\n## Socket: Conceptual\
    \ View\n\n![](img/19353aba2f109d1f7c4c239afb8fa982_186_1.png)\n\n## Two essential\
    \ types of sockets\n\n- a.k.a. TCP\n- reliable delivery\n- in-order guaranteed\n\
    - connection-oriented\n- bidirectional\n\n- a.k.a. UDP\n- unreliable delivery\n\
    - no order guarantees\n- no notion of \"connection\" – app indicates dest. for\
    \ each packet\n- can send or receive\n\n![](img/19353aba2f109d1f7c4c239afb8fa982_187_0.png)\n\
    \n## 6.9 Socket module\n\nSocket module implements an interface to the socket\
    \ communication layer. We can create both client and server sockets using this\
    \ module.\n\n**The socket Module**\n\nTo create a socket, we must use the **socket.socket()**\
    \ function available in socket module, which has the general\n\n```\nsyntax:\n\
    \    s = socket.socket (socket_family, socket_type, protocol=0)\n    where\n \
    \       socket_family: This is either AF_UNIX or AF_INET\n        socket_type:\
    \ This is either SOCK_STREAM or SOCK_DGRAM.\n        protocol: This is usually\
    \ left out, default VALUE IS 0.\n```\n\nAF_UNIX or AF_LOCAL socket family is used\
    \ to communicate between processes on the same machine efficiently.\n\nThe basic\
    \ purpose of AF_INET was to allow for other possible network protocols or address\
    \ families (AF is for address family; PF_INET is for the (IPv4) internet protocol\
    \ family).\n\nSOCK_STREAM means a socket stream where data is passed just like\
    \ a file stream.\n\nProtocol – a specific set of communication rules is called\
    \ a protocol.\n\nWhen socket object is ready for use now we create server socket\
    \ method and client socket methods.\n\n**Server Socket Methods**\n\n| Method |\
    \ Description |\n|---|---|\n| s.bind() | This method binds address (hostname,\
    \ port number pair) to socket. |\n| s.listen() | This method sets up and start\
    \ TCP listener. |\n| s.accept() | This passively accept TCP client connection,\
    \ waiting until connection arrives (blocking). |\n\n**Client Socket Methods**\n\
    \n| Method | Description |\n|---|---|\n| s.connect() | This method actively initiates\
    \ TCP server connection. |\n\n## General Socket Methods\n\n| Method | Description\
    \ |\n|---|---|\n| s.recv() | This method receives TCP message |\n| s.send() |\
    \ This method transmits TCP message |\n| s.recvfrom() | This method receives UDP\
    \ message |\n| s.sendto() | This method transmits UDP message |\n| s.close() |\
    \ This method closes socket |\n| socket.gethostname() | Returns the hostname.\
    \ |\n\n## Creating a Socket\n\nNow we create an INET, STREAMing socket in Python\n\
    \n```\ns = socket.socket(socket.AF_INET, socket.SOCK_STREAM)\n```\n\nNow connect\
    \ to the web server on port 80 (Which is the normal http port)\n\n```\ns.connect((\"\
    www.google.com\", 80))\n```\n\nWhen the connect completes, the socket s can be\
    \ used to send in a request for the text of the page. The same socket will read\
    \ the reply, and then be destroyed. Destroyed Client sockets are normally only\
    \ used for one exchange (or a small set of sequential exchanges).\n\nWhat happens\
    \ in the web server is a bit more complex. First, the web server creates a \"\
    server socket\":\n\n```\n# create an INET, STREAMing socket\nserversocket = socket.socket(socket.AF_INET,\
    \ socket.SOCK_STREAM)\n# bind the socket to a public host, and a well-known port\n\
    serversocket.bind((socket.gethostname(), 80))\n# become a server socket\nserversocket.listen(5)\n\
    ```\n\nPlease note that we used socket.gethostname() so that the socket would\
    \ be visible to the all. If we had used s.bind(('localhost', 80)) or s.bind(('127.0.0.1',\
    \ 80)) we would still have a \"server\" socket, but that was only visible within\
    \ the same machine. s.bind((\"\", 80)) specifies that the socket is reachable\
    \ by any address the machine happens to have.\n\nAgain we note that low number\
    \ ports are usually reserved for \"well known\" services (HTTP, SNMP etc). If\
    \ we are playing around, use a nice high number (i.e. 4 digits).\n\nNow finally,\
    \ the argument to listen tells the socket library that we want it to queue up\
    \ as many as 5 connect requests (the normal max) before refusing outside/other\
    \ connections. If the rest of the code is written properly, that should be sufficient.\n\
    \nNow that we have a \"server\" socket, listening on port 80, we can enter the\
    \ mainloop of the web server:\n\n```\nwhile True:\n    # accept connections from\
    \ other/outside\n    (clientsocket, address) = serversocket.accept()\n```\n\n\
    ```\n# now do something with the clientsocket\n# in this case, we'll make up this\
    \ is a threaded server\nct = client_thread(clientsocket)\nct.run()\n```\n\nThere\
    \ is three general ways in which this loop could work\n\n1. Dispatching a thread\
    \ to handle clientsocket, create a new process to handle clientsocket, or restructure\
    \ this app to use non-blocking sockets, and multiplex between our “server” socket\
    \ and any active clientsocket using select.\n2. The important thing to understand\
    \ now is this: this is all a “server” socket does. It doesn’t send any data. It\
    \ doesn’t receive any data. It just produces “client” sockets.\n3. Each clientsocket\
    \ is created in response to some other “client” socket doing a connect() to the\
    \ host and port we’re bound to. As soon as we’ve created that clientsocket, we\
    \ go back to listening for more connections. The two “clients” are free to chat\
    \ it up - they are using some dynamically allocated port which will be recycled\
    \ when the conversation ends.\n\n## 6.10 Client Server Architecture\n\n*What Is\
    \ A Client/Server?*\n\n**Client**\nA client is a single-user workstation that\
    \ provides presentation services, database services and connectivity along with\
    \ an interface for user interaction to acquire business needs.\n\n**Server**\n\
    A server is one or more multi-user processors with a higher capacity of shared\
    \ memory which provides connectivity and the database services along with interfaces\
    \ relevant to the business procedures.\n\n![](img/19353aba2f109d1f7c4c239afb8fa982_189_0.png)\n\
    \n*Introduction to Client/Server Architecture*\n\n**Client-server architecture**,\
    \ architecture of a computer network in which many clients (remote processors)\
    \ request and receive service from a centralized server (host computer). Client\
    \ computers provide an interface to allow a computer user to request services\
    \ of the server and to display the results the server returns. Servers wait for\
    \ requests to arrive from clients and then respond to them."
  mdcn: "## 层间关系\n\n- 每一层都使用其下一层\n- 下层为上层数据添加头部\n- 上层的数据也可以作为其上一层数据的头部……\n\n![](img/19353aba2f109d1f7c4c239afb8fa982_184_0.png)\n\
    \n## 6.8 什么是套接字\n\n套接字是双向通信通道的端点。套接字可以被配置为服务器，监听传入的消息，或者作为*客户端*连接到其他应用程序。当 TCP/IP\
    \ 套接字的两端都连接起来时，通信是双向的，即我们从另一端得到回复。\n\n套接字可以使用 Unix/Linux 域套接字、TCP、用户自定义协议（UDP）等来实现。套接字库提供了常见的传输协议，以及用于处理全部或特定类别的通用接口。\n\
    \n| 术语 | 描述 |\n| :--- | :--- |\n| domain | 用作传输机制的协议族。这些值是常量，如 AF_INET、PF_INET、PF_UNIX、PF_X25\
    \ 等。 |\n| type | 两个端点之间的通信类型，通常是 SOCK_STREAM 用于面向连接的协议，SOCK_DGRAM 用于无连接协议。 |\n\
    | protocol | 通常为零，可用于在特定的域和类型内标识协议的一个变体。 |\n| hostname | 网络接口的标识符：<br>一个字符串，可以是主机名、点分十进制地址，或\
    \ IPv6 地址（冒号分隔，可能包含点号）<br>字符串 \"<broadcast>\"，指定一个 INADDR_BROADCAST 地址。<br>一个零长度字符串，指定\
    \ INADDR_ANY，或<br>一个整数，被解释为主机字节序的二进制地址。 |\n| port | 每个服务器在一个或多个端口上监听客户端调用。端口可以是一个\
    \ Fixnum 端口号、一个包含端口号的字符串，或者一个服务名称 |\n\n套接字是一个软件抽象，它提供了单个服务器进程与单个客户端进程之间的通信链路。\n\
    \n## 各种类型的套接字\n\n![](img/19353aba2f109d1f7c4c239afb8fa982_185_0.png)\n\n- 连接的端点\n\
    - 通过 IP 地址和端口号标识\n- 实现高级网络接口的基本原语\n- 例如，远程过程调用 (RPC)\n\n## 网络套接字\n\n- 用于标识特定机器上的特定进程（程序）。\n\
    - 套接字由两个数字组成：- IP 地址：机器标识符 - 端口号：进程标识符\n- Berkeley 套接字是最常见的套接字实现方式。\n- 两台计算机之间的连接可以表示为两个套接字：一个用于客户端机器和程序，一个用于服务器机器和程序。\n\
    \n## 端口号\n\n- 知名端口 – 0-1023\n- 示例：\n  - 25：SMTP（电子邮件），80：HTTP（Web），110：POP3（电子邮件），443：HTTPS（安全\
    \ Web）\n- 注册端口 – 1024-49151\n- 私有/动态端口 – 49151-65535\n\n## 套接字编程 API\n\n应用程序编程接口\n\
    \n套接字 API 是你进行消息收发所需的编程接口。它就像一种门，一扇通往传输层的门（注意我们是在应用层）。\n\n- 套接字类似于门\n- 发送进程将消息推出门外\n\
    - 发送进程假定门外有传输基础设施，将消息带到接收进程的套接字\n- 主机本地、应用程序创建/拥有、操作系统控制\n- 套接字间的连接由操作系统建立/管理\n\
    \n![](img/19353aba2f109d1f7c4c239afb8fa982_186_0.png)\n\n## 套接字：概念视图\n\n![](img/19353aba2f109d1f7c4c239afb8fa982_186_1.png)\n\
    \n## 两种基本套接字类型\n\n- 又称 TCP\n- 可靠传输\n- 保证顺序\n- 面向连接\n- 双向\n\n- 又称 UDP\n- 不可靠传输\n\
    - 不保证顺序\n- 无“连接”概念 - 应用程序为每个数据包指明目的地\n- 可发送或接收\n\n![](img/19353aba2f109d1f7c4c239afb8fa982_187_0.png)\n\
    \n## 6.9 Socket 模块\n\nSocket 模块实现了与套接字通信层的接口。我们可以使用此模块创建客户端和服务器套接字。\n\n**socket\
    \ 模块**\n\n要创建套接字，我们必须使用 socket 模块中可用的 **socket.socket()** 函数，其通用形式为\n\n```\n语法：\n\
    \    s = socket.socket (socket_family, socket_type, protocol=0)\n    其中\n    \
    \    socket_family： 要么是 AF_UNIX，要么是 AF_INET\n        socket_type： 要么是 SOCK_STREAM，要么是\
    \ SOCK_DGRAM。\n        protocol： 通常省略，默认值为 0。\n```\n\nAF_UNIX 或 AF_LOCAL 套接字族用于在同一台机器上的进程之间进行高效通信。\n\
    \nAF_INET 的基本目的是允许其他可能的网络协议或地址族（AF 代表地址族；PF_INET 代表（IPv4）互联网协议族）。\n\nSOCK_STREAM\
    \ 表示套接字流，数据传递就像文件流一样。\n\n协议 - 一套特定的通信规则称为协议。\n\n当套接字对象准备好使用后，我们创建服务器套接字方法和客户端套接字方法。\n\
    \n**服务器套接字方法**\n\n| 方法 | 描述 |\n|---|---|\n| s.bind() | 此方法将地址（主机名，端口号对）绑定到套接字。\
    \ |\n| s.listen() | 此方法设置并启动 TCP 监听器。 |\n| s.accept() | 此方法被动接受 TCP 客户端连接，等待连接到达（阻塞）。\
    \ |\n\n**客户端套接字方法**\n\n| 方法 | 描述 |\n|---|---|\n| s.connect() | 此方法主动发起与 TCP 服务器的连接。\
    \ |\n\n## 通用套接字方法\n\n| 方法 | 描述 |\n|---|---|\n| s.recv() | 此方法接收 TCP 消息 |\n| s.send()\
    \ | 此方法发送 TCP 消息 |\n| s.recvfrom() | 此方法接收 UDP 消息 |\n| s.sendto() | 此方法发送 UDP\
    \ 消息 |\n| s.close() | 此方法关闭套接字 |\n| socket.gethostname() | 返回主机名。 |\n\n## 创建套接字\n\
    \n现在我们在 Python 中创建一个 INET、STREAMing 类型的套接字\n\n```\ns = socket.socket(socket.AF_INET,\
    \ socket.SOCK_STREAM)\n```\n\n现在连接到端口 80 上的 Web 服务器（这是正常的 HTTP 端口）\n\n```\ns.connect((\"\
    www.google.com\", 80))\n```\n\n连接完成后，套接字 `s` 可用于发送请求以获取页面的文本。同一个套接字将读取回复，然后被销毁。销毁后的客户端套接字通常只用于一次交换（或一小批连续的交换）。\n\
    \nWeb 服务器中发生的事情稍微复杂一些。首先，Web 服务器创建一个“服务器套接字”：\n\n```\n# 创建一个 INET, STREAMing 套接字\n\
    serversocket = socket.socket(socket.AF_INET, socket.SOCK_STREAM)\n# 将套接字绑定到一个公共主机和一个知名端口\n\
    serversocket.bind((socket.gethostname(), 80))\n# 成为一个服务器套接字\nserversocket.listen(5)\n\
    ```\n\n请注意，我们使用了 `socket.gethostname()`，以便套接字对所有人可见。如果我们使用 `s.bind(('localhost',\
    \ 80))` 或 `s.bind(('127.0.0.1', 80))`，我们仍然会有一个“服务器”套接字，但它只在同一台机器内可见。`s.bind((\"\
    \", 80))` 指定套接字可以通过机器具有的任何地址访问。\n\n我们再次注意到，低端口号通常保留给“知名”服务（HTTP、SNMP 等）。如果我们只是试验，请使用一个较高的好记数字（即\
    \ 4 位数）。\n\n最后，`listen` 的参数告诉套接字库，我们希望它在拒绝外部/其他连接之前，将多达 5 个连接请求排队（通常是最大值）。如果其余代码编写正确，这应该是足够的。\n\
    \n现在我们有了一个监听端口 80 的“服务器”套接字，我们可以进入 Web 服务器的主循环：\n\n```\nwhile True:\n    # 接受来自其他/外部的连接\n\
    \    (clientsocket, address) = serversocket.accept()\n```\n\n```\n# 现在对 clientsocket\
    \ 做些什么\n# 在本例中，我们假设这是一个多线程服务器\nct = client_thread(clientsocket)\nct.run()\n```\n\
    \n此循环可以三种通用方式工作\n\n1.  派发一个线程来处理 clientsocket，创建一个新进程来处理 clientsocket，或者重构此应用程序以使用非阻塞套接字，并使用\
    \ select 在我们的“服务器”套接字和任何活动的 clientsocket 之间进行多路复用。\n2.  现在需要理解的重要事情是：这就是“服务器”套接字所做的全部。它不发送任何数据。它不接收任何数据。它只是产生“客户端”套接字。\n\
    3.  每个 clientsocket 都是在响应某个其他“客户端”套接字对主机和端口的 `connect()` 调用而创建的。一旦我们创建了该 clientsocket，我们就回到监听更多连接的状态。两个“客户端”可以自由聊天——它们使用一些动态分配的端口，这些端口将在对话结束时回收。\n\
    \n## 6.10 客户端-服务器架构\n\n*什么是客户端/服务器？*\n\n**客户端**\n客户端是一个单用户工作站，提供表示服务、数据库服务、连接性，以及用于用户交互以获取业务需求的接口。\n\
    \n**服务器**\n服务器是一个或多个多用户处理器，具有更高的共享内存容量，提供连接性和数据库服务，以及与业务流程相关的接口。\n\n![](img/19353aba2f109d1f7c4c239afb8fa982_189_0.png)\n\
    \n*客户端/服务器架构简介*\n\n**客户端-服务器架构**，是一种计算机网络架构，其中许多客户端（远程处理器）向一个集中的服务器（主机计算机）请求并接收服务。客户端计算机提供接口，允许计算机用户请求服务器的服务，并显示服务器返回的结果。服务器等待来自客户端的请求，然后进行响应。"
