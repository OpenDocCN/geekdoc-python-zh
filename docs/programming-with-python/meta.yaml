  mdcn: "## 2.7 捕获和处理异常\n\n### 2.7.1 try... except\n\n如果你有一些*可疑的*代码可能会引发异常，你可以通过将可疑代码放在一个**try:**\
    \ 代码块中来保护你的程序。在 `try:` 代码块之后，包含一个 **except:** 语句，后面跟上一个尽可能快地处理问题的代码块。\n\n####\
    \ 语法\n\n这是 *try....except...else* 代码块的简单语法 –\n\n```\ntry:\n    You do your operations\
    \ here;\n    ......................\nexcept Exception I:\n    If there is ExceptionI,\
    \ then execute this block.\nexcept Exception II:\n    If there is ExceptionII,\
    \ then execute this block.\n    ......................\nelse:\n    If there is\
    \ no exception then execute this block.\n```\n\n**一些需要考虑的重要点：**\n\n-   单个 `try`\
    \ 语句可以有多个 `except` 子句。当 `try` 代码块包含可能抛出不同类型的异常的语句时，这很有用。\n-   你也可以提供一个通用的 `except`\
    \ 子句，它可以处理任何异常。\n-   在 `except` 子句之后，你可以包含一个 `else` 子句。如果 `try:` 代码块中的代码没有引发异常，则执行\
    \ `else` 代码块中的代码。\n-   `else` 代码块是放置不需要 `try:` 代码块保护的代码的好地方。\n\n**异常处理可以通过用户输入完成：**\n\
    \n```\n>>> while True:\n...     try:\n...         x = int(raw_input(“Please enter\
    \ a number:”))\n...         break\n...     except ValueError:\n...         print\
    \ (\"Oops! That was no valid number. Try again...\")\n...\n```\n\n`try` 语句的工作原理如下。\n\
    \n1.  首先，执行 `try` 子句（`try` 和 `except` 关键字之间的语句）。\n2.  如果没有异常发生，则跳过 `except` 子句，`try`\
    \ 语句的执行完成。\n3.  如果在执行 `try` 子句时发生异常，则跳过该子句的其余部分。然后，如果其类型与 `except` 关键字后命名的异常匹配，则执行\
    \ `except` 子句，然后在 `try` 语句之后继续执行。\n4.  如果发生与 `except` 子句中命名的异常不匹配的异常，则将其传递给外层的\
    \ `try` 语句；如果找不到处理程序，则它是一个未处理的异常，执行停止并显示如上所示的消息。\n\n#### 示例 1:\n\n此示例打开一个文件，并在该文件中写入内容。\n\
    \n![](img/19353aba2f109d1f7c4c239afb8fa982_56_0.png)\n\n这将产生以下结果 –\n\n![](img/19353aba2f109d1f7c4c239afb8fa982_56_1.png)\n\
