    For example, a program might not be able to determine whether a password is valid
    at the source of the input. Rather, the password must be verified in a password
    file that is accessed only after a **chain of function calls** have been made.
    If the password is found invalid, an exception is propagated from the function
    identifying the error all the way back to the function responsible for user input,
    which can then prompt the user to re-enter their password


    ![](img/19353aba2f109d1f7c4c239afb8fa982_53_0.png)


    An exception is either handled by the user side or client code side, or automatically
    propagated back to the user or client''s calling code, and so on, until handled.
    If an exception is thrown all the way back to the main module (and not handled),
    the program terminates displaying the details of the exception.


    # 2.6 Assertion in Python


    An assertion is a sanity-check that you can turn on or turn off when you are done
    with your testing of the program. An assertion is to liken it to a **raise-if**
    statement. An expression is tested, and if the result comes up false, an exception
    is raised.


    Assertions are carried out by the **assert** statement. Programmers often place
    assertions at the start of a function to check for valid input, and after a function
    call to check for valid output.


    **The assert Statement**

    When it encounters an assert statement, Python evaluates the accompanying expression,
    which may be true. If the expression is false, Python raises an *AssertionError*
    exception.


    **The Syntax for Assert is –**


    ```

    assert Expression[, Arguments]

    ```


    If the assertion fails, Python uses ArgumentExpression as the argument for the
    AssertionError. AssertionError exceptions can be caught and handled like any other
    exception using the try-except statement, but if not handled, they will terminate
    the program and produce a traceback.


