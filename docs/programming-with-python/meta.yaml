    MySQL Connector is a python object used to connect python with MySQL backend.


    The connect() constructor creates a connection to the MySQL server and returns
    MySQLConnection object.


    The following example shows how to connect to the MySQL server:


    ```

    import mysql.connector

    cnx = mysql.connector.connect(user=''scott'', password=''tiger'', host=''127.0.0.1'',
    database=''employees'')

    cnx.close()

    ```


    For MySQLdb installation please Refer section 5. 9.2 (step no. 2)


    # 5.6 Introduction and Installation of Connector Module


    Python module MySQLdb consist of connect method so that we can connect MySQL Backend
    with python by specifying Name of hostname, username and password information
    of mysql as a user Authentication and database of MySQL which you have already
    created.


    Python module MySQLdb is installed properly on your machine for that Download
    MySQL-python-1.2.2.tar from google. After downloading.rar file. Extract that folder
    in python installation directory & install all setup files in that, one setup
    file for windows and one for common.


    For Installation steps of Python Connector Module Refer section 5.9.3 (step no.
    4)


    # 5.7 Establishing Connection


    A Connection object provides the means to communicate from your python script
    to a database program.


    The Python database modules connect to the database. They do not include the database
    application itself. Each database module needs to provide a connect function that
    returns a connection object.


    The parameters that are passed to connect vary by the module and what is required
    to communicate with the database. The following table lists the most common parameters.


    | Parameter | Usage |

    | --- | --- |

    | Dsn | Data source name, from ODBC terminology. This usually includes the name
    of your database and the server where it''s running. |

    | Host | Host, or network system name, on which the database runs. |

    | Database | Name of the database. |

    | User | User name for connecting to the database. |

    | Password | Password for the given user name. |'
