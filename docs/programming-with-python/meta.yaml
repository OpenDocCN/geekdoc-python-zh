    Tkinter 模块包含了 Tk 工具包，必须始终导入。在我们的示例中，我们使用星号 `*` 将 Tkinter 中的所有内容导入到我们的模块命名空间中：\n\
    \n```\nfrom Tkinter import *\n```\n\n要初始化 Tkinter，我们必须创建一个 Tk 根窗口小部件，它是一个由窗口管理器提供标题栏和其他装饰的窗口。根窗口小部件必须在任何其他小部件之前创建，并且只能有一个根窗口小部件。\n\
    \n```\nroot = Tk()\n```\n\n下一行代码包含标签小部件。`Label` 调用的第一个参数是父窗口的名称，在我们的例子中是 `root`。因此，我们的标签小部件是根窗口小部件的子部件。关键字参数\
    \ `text` 指定要显示的文本：\n\n```\nw = Label(root, text=\"Hello Tkinter!\")\n```\n\n`pack`\
    \ 方法告诉 Tk 调整窗口大小以适应给定的文本。\n\n```\nw.pack()\n```\n\n在我们进入 Tkinter 事件循环之前，窗口不会显示：\n\
    \n```\nroot.mainloop()\n```\n\n我们的脚本将留在事件循环中，直到我们关闭窗口。\n\n## 4.6.8 Spinbox 小部件\n\
    \nSpinbox 小部件允许用户从给定的集合中选择值。这些值可以是一系列数字，也可以是固定的字符串集。\n\n语法\n\n```\nw = Spinbox(\
    \ master, option, ... )\n```\n\n参数\n\n- **master:** 表示父窗口。\n- **options:** 这是该小部件最常用选项的列表。这些选项可用逗号分隔的键值对形式使用。\n\
    \n| 选项 | 描述 |\n|---|---|\n| activebackground | 当鼠标悬停在滑块和箭头上时，它们的活动背景色。 |\n| bg\
    \ | 当鼠标未悬停在滑块和箭头上时，它们的背景色。 |\n| bd | 滑槽整个周围的 3D 边框宽度，以及箭头和滑块上的 3D 效果宽度。默认滑槽无边框，箭头和滑块有\
    \ 2 像素的边框。 |\n| command | 当滚动条移动时要调用的过程。 |\n| cursor | 当鼠标悬停在滚动条上时出现的光标。 |\n|\
    \ Disabledbackground | 当小部件被禁用时使用的背景色。 |\n| disabledforeground | 当小部件被禁用时使用的文本颜色。\
    \ |\n| fg | 文本颜色。 |\n| font | 此小部件使用的字体。 |\n| format | 格式化字符串。无默认值。 |\n| from_\
    \ | 最小值。与 `to` 一起用于限制 Spinbox 范围。 |\n| justify | 默认为 LEFT。 |\n| relief | 默认为 SUNKEN。\
    \ |\n| repeatdelay | 与 `repeatinterval` 一起控制按钮的自动重复。两个值均以毫秒为单位。 |\n| repeatinterval\
    \ | 参见 `repeatdelay`。 |\n| state | NORMAL、DISABLED 或 \"readonly\" 之一。默认为 NORMAL。\
    \ |\n| textvariable | 无默认值。 |\n| to | 参见 `from`。 |\n| validate | 验证模式。默认为 NONE。\
    \ |\n| validatecommand | 验证回调。无默认值。 |\n| values | 包含此小部件有效值的元组。会覆盖 `from/to/increment`。\
    \ |\n| vcmd | 与 `validatecommand` 相同。 |\n| Width | 小部件宽度，以字符为单位。默认为 20。 |\n| wrap\
    \ | 如果为真，上下按钮将循环。 |\n| xscrollcommand | 用于将 Spinbox 字段连接到水平滚动条。此选项应设置为相应滚动条的 `set`\
    \ 方法。 |\n\n## 方法\n\nSpinbox 对象具有以下方法：\n\nI. **delete(startindex [,endindex])**\n\
    此方法删除特定字符或文本范围。\n\nII. **get(startindex [,endindex])**\n此方法返回特定字符或文本范围。\n\nIII.\
    \ **identify(x, y)**\n标识给定位置的界面元素。\n\nIV. **index(index)**\n根据给定的索引返回其绝对值。\n\n\
    V. **insert(index [,string]...)**\n此方法在指定索引位置插入字符串。\n\n![](img/19353aba2f109d1f7c4c239afb8fa982_116_0.png)\n\
    \n## 4.6.9 文本框小部件\n\n文本小部件用于多行文本区域。Tkinter 的文本小部件非常强大且灵活，可用于各种任务。虽然其主要目的之一是提供简单的多行区域（如表单中常用），但文本小部件也可以用作简单的文本编辑器，甚至网页浏览器。\n\
    \n我们使用 `Text()` 方法创建文本小部件。我们将高度设置为 5（即五行），宽度设置为 38（即 38 个字符）。我们可以对 `Text()` 方法返回的对象\
    \ `T` 应用 `insert()` 方法来包含文本。我们添加了五行文本（其中三行是空行）。\n\n![](img/19353aba2f109d1f7c4c239afb8fa982_116_1.png)\n\
    \n为了强制光标进入下一行，我们使用 `\\n`（类似于 C 编程）。\n\n我们可以使用 `Scrollbar()` 方法在文本小部件中添加滚动条。我们使用根对象作为唯一参数来调用它。\n\
    \n![](img/19353aba2f109d1f7c4c239afb8fa982_117_0.png)\n\n在上面的程序中，我们将高度设置为 4，意味着一次显示\
    \ 4 行，宽度设置为 50，意味着显示 50 个字符（包括空格和句点）。`S.pack(side=RIGHT)` 将滚动条显示在右侧，如果改为 `LEFT`，则滚动条显示在左侧。\n\
    \n## 4.6.10 带图像的文本小部件\n\n我们向文本添加图像，并将命令绑定到文本行。\n\n程序名称：**textimage.py**\n\n```python\n\
    from tkinter import *\nroot = Tk()\ntext1 = Text(root, height=20, width=30)\n\
    photo=PhotoImage(file='./plant.gif')\ntext1.insert(END,'\\n')\ntext1.image_create(END,\
    \ image=photo)\ntext1.pack(side=LEFT)\ntext2 = Text(root, height=17, width=55)\n\
    scroll = Scrollbar(root, command=text2.yview)\ntext2.configure(yscrollcommand=scroll.set)\n\
    text2.tag_configure('bold_italics', font=('Arial', 12, 'bold', 'italic'))\ntext2.tag_configure('big',\
    \ font=('Verdana', 20, 'bold'))\ntext2.tag_configure('color', foreground='#474042',font=('Tempus\
    \ Sans ITC', 12, 'bold'))\ntext2.tag_bind('Click', '<1>', lambda e, t=text2: t.insert(END,\
    \ \"Thanks , BYE!\"))\ntext2.insert(END,'\\nPlant\\n', 'big')\nquote = \"\"\"\n\
    Plants, also called green plants, are multicellular eukaryotes\nof the kingdom\
    \ Plantae. They form an unranked clade\nViridiplantae (Latin for green plants)\
    \ that includes the flowering\nplants, conifers and other gymnosperms, ferns,\
    \ clubmosses, hornworts,\nliverworts, mosses and the green algae. Green plants\
    \ exclude\nthe red and brown algae, the fungi, archaea, bacteria and animals.\n\
    \"\"\"\ntext2.insert(END, quote, 'color')\ntext2.insert(END, 'Click here\\n',\
    \ 'Click')\ntext2.pack(side=LEFT)\nscroll.pack(side=RIGHT, fill=Y)\nroot.mainloop()\n\
    ```\n\n输出在下一页\n\n![](img/19353aba2f109d1f7c4c239afb8fa982_118_0.png)\n\n## 4.7\
    \ 问题\n\n1.  什么是 GUI？解释 GUI 的优点和缺点。\n2.  解释不同的图形库。\n3.  什么是 Peewee？写下它的用途。\n4.\
    \  解释布局管理器。\n5.  解释事件和绑定。\n6.  通过一个简单的程序解释 motion 和 bind 事件。\n7.  什么是 Canvas？解释\
    \ Canvas 小部件选项。\n8.  描述不同的 Canvas 图形对象？\n9.  如何使用 Canvas 绘制线条？通过示例解释。\n10. 描述\
