    msg.bind('<Motion>',motion)\nmsg.pack()\nmainloop()\n```\n\n### Output\n\nIn the\
    \ motion event program first we create one motion widget and afterward we bind\
    \ the same to function name as motion(event) here we show the exact mouse coordinates\
