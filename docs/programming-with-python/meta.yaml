    \ Bind Event\n\nEvents are given as strings, using a special event syntax:\n`<modifier-type-detail>`\n\
    The type field is the most important part of an event specifier. It specifies\
    \ the kind of event that we wish to bind, and can be user actions like *Button*,\
    \ and *Key*, or window manager events like *Enter*, *Configure*, and others.\n\
    \n### Bind\n\nThe binding applies to a single widget only; if you create new frames,\
    \ they will not inherit the bindings. But tkinter also allows you to create bindings\
    \ on the class and application level; in fact, you can create bindings on four\
    \ different levels:\n\n-   the widget instance, using `bind`.\n-   the widget's\
    \ toplevel window (Toplevel or root), also using `bind`.\n-   the widget class,\
    \ using `bind_class` (this is used by Tkinter to provide standard bindings).\n\
    -   the whole application, using `bind_all`.\n\nFor example, you can use bind_all\
    \ to create a binding for the F1 key, so you can provide help everywhere in the\
    \ application. But what happens if you create multiple bindings for the same key,\
    \ or provide overlapping bindings? First, on each of these four levels, tkinter\
    \ chooses the \"closest match\" of the available bindings. For example, if you\
    \ create instance bindings for the <Key> and <Return> events, only the second\
    \ binding will be called if you press the **Enter** key.\n\nA tkinter application\
    \ spends most of its time inside an event loop (entered via the mainloop method).\
    \ Events can come from various sources, including key presses and mouse operations\
    \ by the user. For each widget, you can bind Python functions and methods to events.\n\
    \n```python\nwidget.bind(event, handler)\n```\n\nIf an event matching the *event*\
    \ description occurs in the widget, the given *handler* is called with an object\
    \ describing the event.\n\n### 4.4.1 Bind event\n\n### 4.4.2 Motion event\n\n\
    ### Example\n\n### Bind event\n\nProgram name eventnbind.py\n\n![](img/19353aba2f109d1f7c4c239afb8fa982_91_0.png)\n\
    \n### Output\n\n![](img/19353aba2f109d1f7c4c239afb8fa982_92_0.png)\n\nIn above\
