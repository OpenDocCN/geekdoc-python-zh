    \ line we use '\\n' (like C-programming).\n\nWe can add scroll bar in text widgets\
    \ using Scrollbar() method. We call it with the root object as the only parameter.\n\
    \n![](img/19353aba2f109d1f7c4c239afb8fa982_117_0.png)\n\nIn the above program\
    \ we set the height as 4 means it display 4 lines at a time and width as 50 means\
