    # Widget


    # Creating GUI Widgets with Tkinter


    A widget is a component of a GUI — buttons, labels, and text boxes are all widgets.
    Most widgets have graphical representations on screen, but some widgets, such
    as tables and boxes, exist only to contain other widgets and arrange them on the
    screen


    ![](img/19353aba2f109d1f7c4c239afb8fa982_99_0.png)


    # How It Works


    The first line import the Tkinter module. In next, you could either import Label
    from Tkinter, or simply import all (*) from Tkinter, as you did in the example.
    After that, you create an object for each widget (in this case, Label). The Label
    is then arranged in the parent window. Finally, the widget is displayed.


    The Widget Construction Kit (WCK) is a simple programming interface that you can
    use to create new widgets in Python. The WCK is currently available for the tkinter
    library, but implementations for other environments are perfectly possible. To
    create a more expressive widget, you have to create a subclass of the Widget base
    class, and implement necessary drawing and event handling methods.


    The major unit of a tkinter GUI is a Widget. You can use the "built-in" widgets
    that are provided by Tk, create your own, or install extension packages that define
    additional widgets.


    # Resizing the Widget


    By default the widget had a built -in minimize and maximize button, along with
    an “ X ” button to close the window. In addition, we could stretch out the window.


    When you run this program, try resizing the window; you ’ ll see the “ My first
