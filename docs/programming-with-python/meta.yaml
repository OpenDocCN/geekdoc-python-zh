    | Pattern | Description |

    | --- | --- |

    | [^aeiou] | Match anything other than a lowercase vowel |

    | [^0-9] | Match anything other than a digit |


    # **Special Character Classes:**


    | Example | Description |

    | --- | --- |

    | . | Match any character except newline |

    | \d | Match a digit: [0-9] |

    | \D | Match a nondigit: [^0-9] |

    | \s | Match a whitespace character: [ \t\r\n\f] |

    | \S | Match nonwhitespace: [^ \t\r\n\f] |

    | \w | Match a single word character: [A-Za-z0-9_] |

    | \W | Match a nonword character: [^A-Za-z0-9_] |


    # **Repetition Cases:**


    | Example | Description |

    | --- | --- |

    | ruby? | Match "rub" or "ruby": the y is optional |

    | ruby* | Match "rub" plus 0 or more ys |

    | ruby+ | Match "rub" plus 1 or more ys |

    | \d{3} | Match exactly 3 digits |

    | \d{3,} | Match 3 or more digits |

    | /d{3,5} | Match 3,4,or 5 digits |


    # **Nongreedy repetition:**


    This matches the smallest number of repetitions:


    | Example | Description |

    | --- | --- |

    | <.*> | Greedy repetition: matches "<python>perl>" |

    | <.*?> | Nongreedy: matches "<python>" in "<python>perl>" |


    # **Grouping with parentheses:**


    | Example | Description |

    | --- | --- |

    | \D\d+ | No group: + repeats\d |

    | (\D\d)+ | Grouped: + repeats \D\d pair |

    | ([Pp]ython(, )?)+ | Match "Python", "Python, python, python", etc. |


    # **Backreferences:**


    This matches a previously matched group again:


    | Example | Description |

    | --- | --- |

    | ([Pp])ython&\1ails | Match python&pails or Python&Pails |

    | (["''])\1*1 | Single or double-quoted string. \1 matches whatever the 1st group
    matched . \2 matches whatever the 2nd group matched, etc. |'
  - '[PAGE 74]


    # **Alternatives:**


    | Example | Description |

    |---|---|

    | `python\|perl` | Match "python" or "perl" |

    | `rub(y\|le)` | Match "ruby" or "ruble" |

    | `Python(!+\|\?)` | "Python" followed by one or more ! or one ? |


    # **Anchors:**


    This needs to specify match position.


    | Example | Description |

    |---|---|

    | `^Python` | Match "Python" at the start of a string or internal line |

    | `Python$` | Match "Python" at the end of a string or line |

    | `\APython` | Match "Python" at the start of a string |

    | `Python\Z` | Match "Python" at the end of a string |

    | `\bPython\b` | Match "Python" at a word boundary |

    | `\brub\ B` | \B is nonword boundary: match "rub" in "rube" and "ruby" but not
    alone |

    | `Python(?=!)` | Match "Python", if followed by an exclamation point |

    | `Python(?! !)` | Match "Python", if not followed by an exclamation point |


    # **Special syntax with parentheses:**


    | Example | Description |

    |---|---|

    | `R(?#comment)` | Matches "R". All the rest is a comment |

    | `R(?i)uby` | Case-insensitive while matching "uby" |

    | `R(?i:uby)` | Same as above |

    | `rub(?:y\|le)` | Group only without creating \1 backreference |


    # ## 3.2.1 Compilation Flags


    Compilation flags let you modify some aspects of how regular expressions work.
    Flags are available in the re module under two names, a long name such as IGNORECASE
    and a short, one-letter form such as I. (If you’re familiar with Perl’s pattern
    modifiers, the one-letter forms use the same letters; the short form of re.VERBOSE
    is re.X, for example.) Multiple flags can be specified by bitwise OR-ing them;
    re.I | re.M sets both the I and M flags, for example.


    Here’s a table of the available flags, followed by a more detailed explanation
    of each one.


    | Flag | Meaning |

    |---|---|

    | ASCII, A | Makes several escapes like \w, \b, \s and \d match only on ASCII
    characters with the respective property. |

    | DOTALL, S | Make . match any character, including newlines |

    | IGNORECASE, I | Do case-insensitive matches |

    | LOCALE, L | Do a locale-aware match |

    | MULTILINE, M | Multi-line matching, affecting ^ and $ |

    | VERBOSE, X (for `extended`) | Enable verbose REs, which can be organized more
    cleanly and understandably. |'
- md: "## I\n\n### IGNORECASE\n\nI option Perform case-insensitive matching; character\
    \ class and literal strings will match letters by ignoring case. For example,\
    \ [A-Z] will match lowercase letters, too, and Kiran will match Kiran, kiran,\
    \ or kirAN.\n\n## L\n\n### LOCALE\n\nMake \\w, \\W, \\b, and \\B, dependent on\
    \ the current locale instead of the Unicode database.\n\nFor example, if you’re\
    \ processing French text, you’d want to be able to write \\w+ to match words,\
    \ but \\w only matches the character class [A-Za-z]; it won’t match ‘é’ or ‘ç’.\
    \ If your system is configured properly and a French locale is selected, certain\
    \ C functions will tell the program that ‘é’ should also be considered a letter.\n\
    \n## M\n\n### MULTILINE\n\nUsually ^ matches only at the beginning of the string,\
    \ and $ matches only at the end of the string and immediately before the newline\
    \ (if any) at the end of the string.\n\n## S\n\n### DOTALL\n\nMakes the '.' special\
    \ character match any character at all, including a newline; without this flag,\
    \ '.' will match anything except a newline.\n\n## A\n\n### ASCII\n\nMake \\w,\
    \ \\W, \\b, \\B, \\s and \\S perform ASCII-only matching instead of full Unicode\
    \ matching. This is only meaningful for Unicode patterns, and is ignored for byte\
    \ patterns.\n\n## X\n\n### VERBOSE\n\nThis flag allows you to write regular expressions\
    \ that are more readable by granting you more flexibility in how you can format\
    \ them. When this flag has been specified, whitespace within the RE string is\
    \ ignored, except when the whitespace is in a character class or preceded by an\
    \ unescaped backslash; this lets you organize and indent the RE more clearly.\
    \ This flag also lets you put comments within a RE that will be ignored by the\
    \ engine; comments are marked by a '#' that’s neither in a character class or\
    \ preceded by an unescaped backslash.\n\n## 3.3 Regular Expression [re] module\n\
    \n- re module is used for Regular expression operations in python.\n- with re\
    \ regular expression both patterns and strings to be searched can be Unicode strings\
    \ as well as 8-bit strings.\n- most regular expression operations are available\
    \ as module-level functions and methods on compiled Regular Expressions.\n- A\
    \ regular expression (or RE) specifies a set of strings that matches it; the functions\
    \ in this module let you check if a particular string matches a given regular\
    \ expression.\n- re has two important functions\n  - match()\n  - search()\n-\
    \ We can use all regular expression patterns with re module.\n\n## 3.4 Various\
    \ types of Regular Expressions\n\nThere are different types of Regular Expressions\
    \ based on POSIX ( \"Portable Operating System Interface for UNIX\").\n\n1. POSIX\
    \ Basic Regular Expressions\n2. POSIX Extended Regular Expressions\n\n### POSIX\
    \ Basic Regular Expressions\n\nPOSIX is portable operating system interface which\
    \ has a collection of standards that define some of the functionality that a (UNIX)\
    \ operating system should support. These standards defines two flavors of regular\
    \ expressions. Commands involving regular expressions, such as grep and egrep,\n\
    \ngrep is a global regular Expression in Unix and Linux which support different\
    \ regular expression patterns. Like string matching pattern, ?, ., ^, /, *, +,\
    \ S, [] every character has special meaning.\n\negrep is a extended global regular\
    \ Expression in Unix and Linux which support different regular expression patterns\
    \ along with | (pipe) sign to compare two or more patterns.\n\n### POSIX Extended\
    \ Regular Expressions\n\nThe Extended Regular Expressions or ERE standardizes\
    \ a similar to the one used by the UNIX egrep command. \"Extended\" is relative\
    \ to the original UNIX grep, which only had bracket expressions, dot, caret, dollar\
    \ and star. An ERE support all regular expressions of grep with some extensions.\n\
    \nThus egrep, and POSIX ERE, add additional metacharacters without backslashes.\
    \ You can use backslashes to suppress the meaning of all metacharacters.\n\nGrep,\
    \ egrep, sed, awk these all are used with extended regular expressions.\n\nThe\
    \ quantifiers ?, +, {n}, {n,m} and {n,} repeat the preceding token zero or once,\
    \ once or more, n times, between n and m times, and n or more times, respectively.\n\
    \nExtended regular expression for multiple patterns in egrep is supported by vertical\
    \ bar |. parentheses create a group, e.g. `(abc){2}` matches `abcabc`.\n\nFollowing\
    \ table shows different utility and type of Regular Expression available in Unix\
    \ and Linux.\n\n| Utility | Regular Expression Type |\n|---|---|\n| Vi ( Visual\
    \ Editor) | Basic Regular expression |\n| grep | Basic Regular expression |\n\
    | sed | Basic Regular expression |\n| ed | Basic Regular expression |\n| more\
    \ | Basic Regular expression |\n| expr | Basic Regular expression |\n| pg | Basic\
    \ Regular expression |\n| nl | Basic Regular expression |\n| awk | Extended Regular\
    \ expression |\n| egrep | Extended Regular expression |\n| EMAC | EMAC Regular\
    \ expression |\n\n## 3.5 Different Methods of Regular Expressions\n\n### 3.5.1\
    \ match() method\n\nThis function attempts to match RE pattern to string with\
    \ optional flags.\nHere is the syntax for this function:\n**re.match(pattern,\
    \ string, flags=0)**\nHere is the description of the parameters:\n\n| Parameter\
    \ | Description |\n|---|---|\n| pattern | This is the regular expression to be\
    \ matched. |\n| string | This is the string, which would be searched to match\
    \ the pattern at the beginning of string. |\n| flags | You can specify different\
    \ flags using bitwise OR (|). These are modifiers, which are listed in the table\
    \ below |\n\nThe **re.match** function returns a match object on success, None\
    \ on failure. We would use **group(num)** or **groups()** function of match object\
    \ to get matched expression.\n\n| Match Object Methods | Description |\n|---|---|\n\
    | group(num=0) | This method returns entire match (or specific subgroup num) |\n\
    | groups() | This method returns all matching subgroups in a tuple (empty if there\
    \ weren't any) |\n\n### Example of match Function\n\n```python\n#!/usr/bin/python\n\
    import re\n\nline = \"Cats are smarter than dogs\"\nmatchObj = re.match( r'(.*)\
    \ are (.*?) .*', line, re.M|re.I)\n\nif matchObj:\n    print ('matchObj.group()\
    \ :', (matchObj.group()))\n    print ('matchObj.group(1) :', (matchObj.group(1)))\n\
    \    print ('matchObj.group(2) :', (matchObj.group(2)))\nelse:\n    print ('No\
    \ match!!')\n```\n\n### Output\n\n```\nmatchObj.group() : Cats are smarter than\
    \ dogs\nmatchObj.group(1) : Cats\nmatchObj.group(2) : smarter\n```\n\n### 3.5.2\
    \ search() method\n\nThis function searches for first occurrence of RE pattern\
    \ within string with optional flags.\nHere is the syntax for this function:\n\
    `re.search(pattern, string, flags=0)`\nHere is the description of the parameters:\n\
    \n| Parameter | Description |\n|---|---|\n| **pattern** | This is the regular\
    \ expression to be matched. |\n| **string** | This is the string, which would\
    \ be searched to match the pattern anywhere in the string. |\n| **flags** | You\
    \ can specify different flags using bitwise OR (|). These are modifiers, which\
    \ are listed in the table below. |\n\nThe re.search function returns a match object\
    \ on success. We would use group(num) or groups() function of match object to\
    \ get matched expression.\n\n| Match Object Methods | Description |\n|---|---|\n\
    | **group(num=0)** | This method returns entire match (or specific subgroup num)\
    \ |\n| **groups()** | This method returns all matching subgroups in a tuple (empty\
    \ if there weren't any) |\n\n### Example of search Function\n\n```python\n#!/usr/bin/python\n\
    import re\n\nline = \"Cats are smarter than dogs\";\nsearchObj = re.search( r'(.*)\
    \ are (.*?) .*', line, re.M|re.I)\n\nif searchObj:\n    print ('searchObj.group()\
    \ : ', (searchObj.group()))\n    print ('searchObj.group(1) : ', (searchObj.group(1)))\n\
    \    print ('searchObj.group(2) : ', (searchObj.group(2)))\nelse:\n    print ('Nothing\
    \ found!!')\n```\n\n### Output\n\n```\nPython 3.4.3 Shell\n>>> matchObj.group()\
    \ : Cats are smarter than dogs\nmatchObj.group(1) : Cats\nmatchObj.group(2) :\
    \ smarter\n>>> =================== RESTART ===================\n>>> searchObj.group()\
    \ : Cats are smarter than dogs\nsearchObj.group(1) : Cats\nsearchObj.group(2)\
    \ : smarter\n>>> |\n```\n\n```\nPython 2.7.13 Shell\nPython 2.7.13 (v2.7.13:a06454b1afa1,\
    \ Dec 17 2016, 20:42:59) [MSC v.1500 Intel)] on win32\nType \"copyright\", \"\
    credits\" or \"license()\" for more information.\n>>> =================== RESTART:\
    \ C:/Python27/search.py ===================\n('searchObj.group() : ', 'Cats are\
    \ smarter than dogs')\n('searchObj.group(1) : ', 'Cats')\n('searchObj.group(2)\
    \ : ', 'smarter')\n>>> |\n```"
  mdcn: "## I\n\n### IGNORECASE\n\nI 选项 执行不区分大小写的匹配；字符类和字面量字符串在匹配字母时将忽略大小写。例如，`[A-Z]`\
    \ 也将匹配小写字母，并且 `Kiran` 将匹配 `Kiran`、`kiran` 或 `kirAN`。\n\n## L\n\n### LOCALE\n\n\
    使 `\\w`、`\\W`、`\\b` 和 `\\B` 依赖于当前区域设置，而不是 Unicode 数据库。\n\n例如，如果你正在处理法语文本，你会希望能够编写\
    \ `\\w+` 来匹配单词，但 `\\w` 仅匹配字符类 `[A-Za-z]`；它不会匹配 ‘é’ 或 ‘ç’。如果你的系统配置正确并选择了法语区域，某些\
    \ C 函数将告诉程序 ‘é’ 也应被视为一个字母。\n\n## M\n\n### MULTILINE\n\n通常，`^` 仅匹配字符串的开头，`$` 仅匹配字符串的结尾以及字符串末尾换行符（如果有）之前的位置。\n\
    \n## S\n\n### DOTALL\n\n使 `.` 特殊字符匹配任何字符，包括换行符；没有此标志，`.` 将匹配除换行符外的任何内容。\n\n##\
    \ A\n\n### ASCII\n\n使 `\\w`、`\\W`、`\\b`、`\\B`、`\\s` 和 `\\S` 仅执行 ASCII 匹配，而不是完整的\
    \ Unicode 匹配。这仅对 Unicode 模式有意义，对于字节模式会被忽略。\n\n## X\n\n### VERBOSE\n\n此标志允许你编写更易读的正则表达式，因为它提供了更多格式化灵活性。当指定此标志时，正则表达式字符串中的空白字符将被忽略，除非空白字符位于字符类中或前面有未转义的反斜杠；这允许你更清晰地组织和缩进正则表达式。此标志还允许你在正则表达式中放置会被引擎忽略的注释；注释由\
    \ `#` 标记，该 `#` 既不在字符类中，前面也没有未转义的反斜杠。\n\n## 3.3 正则表达式 [re] 模块\n\n- re 模块用于 Python\
    \ 中的正则表达式操作。\n- 使用 re 正则表达式时，模式（pattern）和待搜索字符串都可以是 Unicode 字符串或 8 位字符串。\n- 大多数正则表达式操作既可作为模块级函数使用，也可作为已编译正则表达式的方法使用。\n\
    - 正则表达式（或 RE）指定一组匹配它的字符串；此模块中的函数让你检查一个特定字符串是否匹配给定的正则表达式。\n- re 有两个重要函数：\n  - `match()`\n\
    \  - `search()`\n- 我们可以使用 re 模块与所有正则表达式模式。\n\n## 3.4 正则表达式的不同类型\n\n根据 POSIX（“可移植操作系统接口（UNIX）”），正则表达式有不同的类型。\n\
    \n1.  POSIX 基本正则表达式\n2.  POSIX 扩展正则表达式\n\n### POSIX 基本正则表达式\n\nPOSIX 是可移植操作系统接口，它有一系列标准定义了（UNIX）操作系统应支持的一些功能。这些标准定义了两种风格的正则表达式。涉及正则表达式的命令，如\
    \ grep 和 egrep，\n\ngrep 是 Unix 和 Linux 中的全局正则表达式，支持不同的正则表达式模式。像字符串匹配模式、?、.、^、/、*、+、$、[]\
    \ 每个字符都有特殊含义。\n\negrep 是 Unix 和 Linux 中的扩展全局正则表达式，支持不同的正则表达式模式以及 `|`（管道）符号以比较两个或多个模式。\n\
    \n### POSIX 扩展正则表达式\n\n扩展正则表达式（ERE）标准化了与 UNIX `egrep` 命令使用的类似语法。相对于原始的 UNIX `grep`（仅包含方括号表达式、点、脱字符、美元符和星号），“扩展”是相对的。ERE\
    \ 支持 `grep` 的所有正则表达式，并带有一些扩展。\n\n因此，`egrep` 和 POSIX ERE 添加了不需要反斜杠的其他元字符。你可以使用反斜杠来抑制所有元字符的含义。\n\
    \n`grep`、`egrep`、`sed`、`awk` 这些都使用扩展正则表达式。\n\n量词 `?`、`+`、`{n}`、`{n,m}` 和 `{n,}`\
    \ 分别将前面的标记重复零次或一次、一次或多次、n 次、n 到 m 次，以及 n 次或更多次。\n\n在 `egrep` 中，通过竖线 `|` 支持多个模式的扩展正则表达式。括号创建一个分组，例如\
    \ `(abc){2}` 匹配 `abcabc`。\n\n下表显示了 Unix 和 Linux 中可用的不同实用工具和正则表达式类型。\n\n| 实用工具\
    \ | 正则表达式类型 |\n|---|---|\n| Vi（可视化编辑器） | 基本正则表达式 |\n| grep | 基本正则表达式 |\n| sed\
    \ | 基本正则表达式 |\n| ed | 基本正则表达式 |\n| more | 基本正则表达式 |\n| expr | 基本正则表达式 |\n| pg\
    \ | 基本正则表达式 |\n| nl | 基本正则表达式 |\n| awk | 扩展正则表达式 |\n| egrep | 扩展正则表达式 |\n| EMAC\
    \ | EMAC 正则表达式 |\n\n## 3.5 正则表达式的不同方法\n\n### 3.5.1 `match()` 方法\n\n此函数尝试使用可选标志将正则表达式模式与字符串匹配。\n\
    此函数的语法如下：\n**`re.match(pattern, string, flags=0)`**\n参数说明如下：\n\n| 参数 | 描述 |\n\
    |---|---|\n| `pattern` | 这是要匹配的正则表达式。 |\n| `string` | 这是将在字符串开头进行搜索以匹配模式的字符串。\
    \ |\n| `flags` | 你可以使用按位或（`|`）指定不同的标志。这些是修饰符，列于下表中 |\n\n**`re.match`** 函数在成功时返回一个匹配对象，失败时返回\
    \ `None`。我们将使用匹配对象的 **`group(num)`** 或 **`groups()`** 函数来获取匹配的表达式。\n\n| 匹配对象方法\
    \ | 描述 |\n|---|---|\n| `group(num=0)` | 此方法返回整个匹配（或特定子组 `num`） |\n| `groups()`\
    \ | 此方法以元组形式返回所有匹配的子组（如果没有，则为空） |\n\n### match 函数示例\n\n```python\n#!/usr/bin/python\n\
    import re\n\nline = \"Cats are smarter than dogs\"\nmatchObj = re.match( r'(.*)\
    \ are (.*?) .*', line, re.M|re.I)\n\nif matchObj:\n    print ('matchObj.group()\
    \ :', (matchObj.group()))\n    print ('matchObj.group(1) :', (matchObj.group(1)))\n\
    \    print ('matchObj.group(2) :', (matchObj.group(2)))\nelse:\n    print ('No\
    \ match!!')\n```\n\n### 输出\n\n```\nmatchObj.group() : Cats are smarter than dogs\n\
    matchObj.group(1) : Cats\nmatchObj.group(2) : smarter\n```\n\n### 3.5.2 `search()`\
    \ 方法\n\n此函数使用可选标志在字符串中搜索正则表达式模式的第一次出现。\n此函数的语法如下：\n**`re.search(pattern, string,\
    \ flags=0)`**\n参数说明如下：\n\n| 参数 | 描述 |\n|---|---|\n| **`pattern`** | 这是要匹配的正则表达式。\
    \ |\n| **`string`** | 这是将在字符串中任何位置进行搜索以匹配模式的字符串。 |\n| **`flags`** | 你可以使用按位或（`|`）指定不同的标志。这些是修饰符，列于下表中。\
    \ |\n\n**`re.search`** 函数在成功时返回一个匹配对象。我们将使用匹配对象的 `group(num)` 或 `groups()` 函数来获取匹配的表达式。\n\
    \n| 匹配对象方法 | 描述 |\n|---|---|\n| **`group(num=0)`** | 此方法返回整个匹配（或特定子组 `num`） |\n\
    | **`groups()`** | 此方法以元组形式返回所有匹配的子组（如果没有，则为空） |\n\n### search 函数示例\n\n```python\n\
    #!/usr/bin/python\nimport re\n\nline = \"Cats are smarter than dogs\";\nsearchObj\
    \ = re.search( r'(.*) are (.*?) .*', line, re.M|re.I)\n\nif searchObj:\n    print\
    \ ('searchObj.group() : ', (searchObj.group()))\n    print ('searchObj.group(1)\
    \ : ', (searchObj.group(1)))\n    print ('searchObj.group(2) : ', (searchObj.group(2)))\n\
    else:\n    print ('Nothing found!!')\n```\n\n### 输出\n\n```\nPython 3.4.3 Shell\n\
    >>> matchObj.group() : Cats are smarter than dogs\nmatchObj.group(1) : Cats\n\
    matchObj.group(2) : smarter\n>>> =================== RESTART ===================\n\
    >>> searchObj.group() : Cats are smarter than dogs\nsearchObj.group(1) : Cats\n\
    searchObj.group(2) : smarter\n>>> |\n```\n\n```\nPython 2.7.13 Shell\nPython 2.7.13\
    \ (v2.7.13:a06454b1afa1, Dec 17 2016, 20:42:59) [MSC v.1500 Intel)] on win32\n\
    Type \"copyright\", \"credits\" or \"license()\" for more information.\n>>> ===================\
    \ RESTART: C:/Python27/search.py ===================\n('searchObj.group() : ',\
    \ 'Cats are smarter than dogs')\n('searchObj.group(1) : ', 'Cats')\n('searchObj.group(2)\
    \ : ', 'smarter')\n>>> |\n```"
