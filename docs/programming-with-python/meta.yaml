    \nAny attempt to directly view a binary file will result in “garbled” characters\
    \ on the screen. A **binary file** is a file that is formatted in a way that only\
    \ a computer program can read.\n\n# 1.1.3 Differentiate between Text File and\
    \ Binary File\n\n| Text File | Binary File |\n|---|---|\n| A text file is often\
