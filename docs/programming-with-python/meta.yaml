    apply — it can only open URLs for reading, and no seek operations are available.


    The urllib.request module defines functions and classes which help in opening
    URLs (mostly HTTP) in a complex world — basic and digest authentication, redirections,
    cookies and more.


    The urllib.request module defines the following functions:


    ```

    urllib.urlopen(url[, data[, proxies[, context]]])

    ```


    Now we the simple example, this example gets the python.org main page and displays
    the first 300 bytes of it.


    ```

    >>> import urllib.request

    >>> f = urllib.request.urlopen(''http://www.python.org/'')

    >>> print(f.read(300))

    ```


    ![](img/19353aba2f109d1f7c4c239afb8fa982_202_0.png)'
  - '[PAGE 203]


    Note that urlopen returns a bytes object. This is because there is no way for
    urlopen to automatically determine the encoding of the byte stream it receives
    from the http server. In general, a program will decode the returned bytes object
    to string once it determines or guesses the appropriate encoding.


    # Request Objects


    **Request.full_url**

    The original URL passed to the constructor.


    **Request.type**

    The URI scheme.


    **Request.host**

    The URI authority, typically a host, but may also contain a port separated by
    a colon.


    **Request.origin_req_host**

    The original host for the request, without port.


    **Request.selector**

    The URI path. If the Request uses a proxy, then selector will be the full url
    that is passed to the proxy.


    **Request.data**

    The entity body for the request, or None if not specified.


    **Request.method**

    The HTTP request method to use. By default its value is None, which means that
    get_method() will do its normal computation of the method to be used. Its value
    can be set (thus overriding the default computation in get_method()) either by
    providing a default value by setting it at the class level in a Request subclass,
    or by passing a value in to the Request constructor via the method argument.


    **Request.get_method()**

    Return a string indicating the HTTP request method. If Request.method is not None,
    return its value, otherwise return ‘GET’ if Request.data is None, or ‘POST’ if
    it’s not. This is only meaningful for HTTP requests.


    **Request.remove_header(header)**

    Remove named header from the request instance (both from regular and unredirected
    headers).


    Here is an example session that uses the GET method to retrieve a URL containing
    parameters:


    ```

    import urllib.request

    import urllib.parse

    params = urllib.parse.urlencode({‘spam’: 1, ‘eggs’: 2, ‘bacon’: 0})

    f = urllib.request.urlopen(“http://www.musi-cal.com/cgi-bin/query?%s” % params)

    print(f.read().decode(‘utf-8’))

    ```'
