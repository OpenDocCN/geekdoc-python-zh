    \n![](img/19353aba2f109d1f7c4c239afb8fa982_83_2.png)\n\n## 3.7 正则表达式搜索与替换简介\n\n\
    ### 搜索与替换\n\n使用正则表达式的一些最重要的 `re` 方法是 `sub`。\n\n### 语法\n\n```\nre.sub(pattern,\
    \ repl, string, max=0)\n```\n\n此方法将字符串中所有匹配的正则表达式模式替换为 `repl`，除非提供了 `max` 参数。此方法将返回修改后的字符串。\n\
    \n### 搜索与替换示例\n\n### 代码\n\n```\n#!/usr/bin/python\nimport re\nphone = \"2004-959-559\
