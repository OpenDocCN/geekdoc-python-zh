    \ raise\n```\n\n#### 输出\n\n```\nPython 3.4.3 Shell\nFile Edit Shell Debug Options\
    \ Window Help\nPython 3.4.3 (v3.4.3:9b73f1c3e601, Feb 24 2015, 22:43:06) [MSC\
    \ v.1600 32 bit (Intel)] on win32\nType \"copyright\", \"credits\" or \"license()\"\
    \ for more information.\n>>> ============================= RESTART =============================\n\
    >>> \nNo valid integer in line.\n>>> \n```\n\n### 2.7.5 try-finally 子句\n\n1. \
    \ 我们可以将 `finally:` 代码块与 `try:` 代码块一起使用。\n2.  通常 `try:` 代码块可以与 `except` 子句配对，但\
    \ `try` 代码块也可以与 `finally` 代码块一起使用。\n3.  `finally` 代码块是放置任何必须执行的代码的地方，无论 `try`\
