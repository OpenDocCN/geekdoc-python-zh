    \ 调用保证至少返回一个字节的数据。当程序看到从 recv() 返回的空字符串（零字节）时，它知道对方已通过在其套接字上调用 close() 终止了连接。\n\
    \n## 6.6 协议及不同类型协议简介。\n\n协议可以定义为管理两个实体之间数据交换的一组规则。\n\n**协议的关键要素：**\n\n1.  语法。\n\
    2.  语义。\n3.  时序。\n\n1.  **语法：** 它包括数据格式和信号电平（即：编码和解码）等事项。\n2.  **语义：** 它包括用于协调和错误处理的控制信息。\n\
    3.  **时序：** 它包括速度匹配和排序。\n\n根据这三个关键要素，协议分为两种类型。\n\n**基于关键要素的两种协议类型：**\n\n1.  硬件协议。\n\
    2.  软件协议。\n\n1.  **硬件协议：** 它是一种用于检查所有硬件设备规则集的协议，这意味着在数据传输期间，它会检查每一个电缆连接和所有中间硬件设备，如路由器和网关。如果发生任何硬件设备损坏，硬件协议将识别它并向服务器提供消息，如“网络电缆已拔出”。\n\
    2.  **软件协议：** 它是一组用于检查数据或传输数据的应用程序的规则。它还检查每个数据包的数据以及每个数据包的控制信息。在传输过程中，使用软件协议创建检查点，这些检查点在数据包丢失或损坏、数据报丢失或损坏或任何类型的数据问题时提供信息。\n\
    \n这些软件协议细分为不同类型，如 SMTP、FTP、HTTP 和 MIME 等。\n\n## 6.7 网络连接性简介\n\n**网络连接性**\n\n网络连接性意味着我们将不同类型的网络相互连接。借助于网络内实现的不同拓扑结构，连接性成为可能。借助于拓扑结构，我们可以使用集线器、中继器、交换机和路由器与其他计算机及其资源（如打印机、DVD\
    \ 刻录机等）进行通信。\n\nPython 提供了对网络服务的两级访问。在底层，你可以访问底层操作系统中的基本套接字支持，这允许你为面向连接和无连接的协议实现客户端和服务器。\n\
    \nPython 还有提供对特定应用程序级网络协议（如 FTP、HTTP 等）更高级别访问的库。\n\n网络编程是 Python 的一个主要用途。\n\n\
    - Python 标准库对网络协议、数据编码/解码以及使其工作所需的其他内容提供了广泛的支持。\n- 用 Python 编写网络程序往往比用 C/C++ 容易得多。\n\
    \n## 层间关系\n\n- 每一层都使用其下一层\n- 下层为来自上层的数据添加报头\n- 来自上层的数据也可以是来自更上层数据的报头...\n\n![](img/19353aba2f109d1f7c4c239afb8fa982_184_0.png)\n\
    \n## 6.8 什么是套接字\n\n套接字是双向通信通道的端点。套接字可以配置为充当服务器并监听传入消息，或者作为 *客户端* 连接到其他应用程序。当 TCP/IP\
    \ 套接字的两端都连接时，通信是双向的，即双向通信，我们从另一端得到回复。\n\n套接字可以使用 Unix/Linux 域套接字、TCP、用户定义协议（UDP）等实现。套接字库提供了通用传输以及用于处理整个或特定类的通用接口。\n\
    \n| 术语 | 描述 |\n| :--- | :--- |\n| domain | 用作传输机制的协议族。这些值是常量，如 AF_INET、PF_INET、PF_UNIX、PF_X25\
    \ 等。 |\n| type | 两个端点之间的通信类型，对于面向连接的协议通常是 SOCK_STREAM，对于无连接的协议是 SOCK_DGRAM。 |\n\
    | protocol | 通常为零，可用于标识域和类型内的协议变体。 |\n| hostname | 网络接口的标识符：<br>一个字符串，可以是主机名、点分四元组地址或冒号（可能带点）表示法的\
    \ IPV6 地址<br>一个字符串 \"<broadcast>\"，指定 INADDR_BROADCAST 地址。<br>一个零长度字符串，指定 INADDR_ANY，或<br>一个整数，解释为主机字节序的二进制地址。\
    \ |\n| port | 每个服务器在一个或多个端口上监听客户端调用。端口可以是 Fixnum 端口号、包含端口号的字符串或服务名称。 |\n\n套接字是一个软件抽象，提供单个服务器进程和单个客户端进程之间的通信链路。"
