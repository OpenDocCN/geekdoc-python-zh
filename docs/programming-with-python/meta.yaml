    \ process files as well as directories\n\n| Sr. No. | Methods with Description\
    \ |\n|---|---|\n| 1 | *os.access(path, mode)* Use the real uid/gid to test for\
    \ access to path. |\n| 2 | *os.chdir(path)* Change the current working directory\
    \ to path |\n| 3 | *os.chmod(path, mode)* Change the mode of path to the numeric\
