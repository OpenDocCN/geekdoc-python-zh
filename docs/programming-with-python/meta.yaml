    # ## Invoke


    Invoke allows you to perform admin tasks using a Python library.


    # ### Use of Invoke in Python


    Invoke provides common-sense solutions to take command-line tasks and manage them
    as if they were Python functions, allowing bigger items to be elegantly built
    around them.


    # ## Splinter


    Splinter is a Python library for testing Web applications by automating interactions
    with them.


    # ### Use of Splinter in Python


    Splinter automates everything end to end, invoking the browser, passing URLs,
    filling out forms, clicking buttons, and so on.


    It requires drivers to work with a specific browser, but Chrome and Firefox are
    already covered, and it can use Selenium Remote to control a browser running elsewhere.


    Splinter is useful if you want to find out how specific browsers behave when confronted
    with a given website.


