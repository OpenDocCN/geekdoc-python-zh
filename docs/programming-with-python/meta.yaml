    For example, you can use bind_all to create a binding for the F1 key, so you can
    provide help everywhere in the application. But what happens if you create multiple
    bindings for the same key, or provide overlapping bindings? First, on each of
    these four levels, tkinter chooses the “closest match” of the available bindings.
    For example, if you create instance bindings for the <Key> and <Return> events,
    only the second binding will be called if you press the **Enter** key.


    A tkinter application spends most of its time inside an event loop (entered via
    the mainloop method). Events can come from various sources, including key presses
    and mouse operations by the user. For each widget, you can bind Python functions
    and methods to events.


    ```

    widget.bind(event, handler)

    ```


    If an event matching the *event* description occurs in the widget, the given *handler*
    is called with an object describing the event.


