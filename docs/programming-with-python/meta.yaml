    \ error that may occur is if the file system (such as the hard disk) is full.\n\
    \n- w mode can be used for text file\n- wb mode can be used for binary file\n\n\
    #### Example for open for Writing in Binary Mode\n\n```\nfo=open(\"foo.txt\",\"\
    wb\")\nfo.write(\"python in great lang\\n\")\nfo.close\n```\n\n#### Output\n\n\
    ```\n>>> ============================= RESTART =============================\n\
    ======================================\n>>>\n```"
  mdcn: "## 1.1.2 二进制文件\n\n**二进制文件**可以包含多种类型的数据，例如数值，因此其结构并非以文本行组织。这类文件只能通过计算机程序来读取和写入。\n\
    \n任何直接查看二进制文件的尝试都会导致屏幕上出现“乱码”字符。**二进制文件**是一种只有计算机程序才能读取其格式的文件。\n\n## 1.1.3 文本文件与二进制文件的区别\n\
    \n| 文本文件 | 二进制文件 |\n|---|---|\n| 文本文件通常被组织为一系列行，每行是一个字符序列。行由行结束符 (EOL) 终止。 | **二进制文件**可以包含多种类型的数据，例如数值，因此其结构并非以文本行组织。\
    \ |\n| 文本文件包含数字、字母和符号的 ASCII 码。 | 二进制文件包含字节（0 和 1）的集合。二进制文件是文本文件的编译版本。 |\n| **文本文件**是包含字符的文件，结构上表现为独立的文本行。\
    \ | **二进制文件**是一种只有计算机程序才能读取其格式的文件。 |\n| 文本文件的文件访问模式如下：<br>r → 以只读模式打开文件<br>r+\
    \ → 以读写模式打开文件<br>w → 以只写模式打开文件<br>w+ → 以写读模式打开文件<br>a → 以追加模式打开文件<br>a+ → 以追加读取模式打开文件\
    \ | 二进制文件的文件访问模式如下：<br>rb → 以只读模式打开文件<br>rb+ → 以读写模式打开文件<br>wb → 以只写模式打开文件<br>wb+\
    \ → 以写读模式打开文件<br>ab → 以追加模式打开文件<br>ab+ → 以追加读取模式打开文件 |\n\n## 1.1.4 文件操作\n\n**不同的文件操作可以按如下方式执行：**\n\
    \n1.  创建新文件\n    使用带“w”属性的 `open()` 函数。\n2.  打开已有文件\n    使用带“w”或“r”或“a”属性的 `open()`\
    \ 函数。\n3.  从文件中读取数据\n    `read()` 或 `readline()` 和 `readlines()` 函数。\n4.  向文件中写入数据\n\
    \    `write()` 函数。\n5.  向文件中追加数据\n    使用带“a”属性的 `open()` 函数。\n\n## 1.2 打开和关闭文本文件\n\
    \n到目前为止，我们一直在对标准输入输出进行读写操作，但接下来我们将看看如何处理实际的数据文件。Python 默认提供了操作文件所必需的基本函数和方法。你可以使用文件对象完成大部分文件操作。`open()`\
    \ 和 `close()` 方法分别用于打开和关闭文件。\n\n### 1.2.1 使用 open() 打开文件\n\n#### open 函数\n\n在读取或写入文件之前，必须使用\
    \ Python 内置的 `open()` 函数将其打开。该函数创建一个文件对象，该对象将用于调用其关联的其他支持方法。\n\n#### 语法\n\n```\n\
    file object = open(file_name [, access_mode][, buffering])\n```\n\n#### 参数详解\n\
    \n- **file_name**：`file_name` 参数是一个字符串值，包含要访问的文件名称。\n- **access_mode**：`access_mode`\
    \ 决定文件的打开模式，即读、写、追加等。所有可能值的完整列表在 1.3 节的表格中给出。这是一个可选参数，默认的文件访问模式是读取 (`r`)。\n- **buffering**：如果\
    \ `buffering` 值设置为 0，则不会执行缓冲。如果 `buffering` 值为 1，则在访问文件时将执行行缓冲。如果将 `buffering`\
    \ 值指定为大于 1 的整数，则将使用指定的缓冲区大小执行缓冲操作。如果为负数，则缓冲区大小为系统默认值（默认行为）。\n\n#### 示例\n\n```\n\
    # 以写模式打开一个文件\n>>> fobj=open(\"kiran.txt\",\"w\")\n其中 fobj 是文件对象，open 是指定文件名和打开模式的\
    \ Python 函数。Open 函数返回一个文件对象。\n\n# 使用 with 关键字以写模式打开文件的另一种方式\n>>> with open(\"\
    kiran.txt\",\"w\") as fobj:\n其中 fobj 是文件对象，open 是指定文件名和打开模式的 Python 函数。Open 函数返回一个文件对象。\n\
    ```\n\n以下是打开文件的三种基本不同模式的列表：\n\n| 模式 | 描述 |\n| :--- | :--- |\n| **r** | 以只读模式打开文件。文件指针置于文件开头。这是默认模式。\
    \ |\n| **w** | 以只写模式打开文件。如果文件存在，则覆盖该文件。如果文件不存在，则创建一个新文件用于写入。 |\n| **a** | 以追加模式打开文件。如果文件存在，文件指针位于文件末尾。即，文件处于追加模式。如果文件不存在，则创建一个新文件用于写入。\
    \ |\n\n所有文件必须先打开，然后才能对其进行读写操作。\n\n#### open 方法示例\n\n```\n#!/usr/bin/python\n#\
    \ 打开一个文件\n\nfobj = open(\"kiran.txt\", \"w\")\nprint (\"Name of the file: \",\
