    There are some of key functions from socket - Low-level networking interface:


    +   1. **socket.socket()**: Create a new socket using the given address family,
    socket type and protocol number.

    2. **socket.bind(address)**: Bind the socket to address.

    3. **socket.listen(backlog)**: Listen for connections made to the socket. The
    backlog argument specifies the maximum number of queued connections and should
    be at least 0; the maximum value is system-dependent (usually 5), the minimum
    value is forced to 0.

    4. **socket.accept()**: The return value is a pair (conn, address) where conn
    is a new socket object usable to send and receive data on the connection, andaddress
    is the address bound to the socket on the other end of the connection. At accept(),
    a new socket is created that is distinct from the named socket. This new socket
    is used solely for communication with this particular client. For TCP servers,
    the socket object used to receive connections is not the same socket used to perform
    subsequent communication with the client. In particular, the accept() system call
    returns a new socket object that’s actually used for the connection. This allows
    a server to manage connections from a large number of clients simultaneously.

    5. **socket.send(bytes[, flags])**: Send data to the socket. The socket must be
    connected to a remote socket. Returns the number of bytes sent. Applications are
    responsible for checking'
