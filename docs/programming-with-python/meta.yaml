  - '[PAGE 173]


    This means that users must remember which computers in the workgroup have the
    shared resource or information that they want to access. It also means that users
    must log on to each computer to access the shared resources on that computer.


    In most peer-to-peer networks, it is difficult for users to track where information
    is located because data is generally stored on multiple computers. This makes
    it difficult to back up critical business information, and it often results in
    small businesses not completing backups. Often, there are multiple versions of
    the same file on different computers in the workgroup.


    # Server-based Network


    In a server-based network, the server is the central location where users share
    and access network resources. This dedicated computer controls the level of access
    that users have to share resources. Shared data is in one location, making it
    easy to back up critical business information.


    Each computer that connects to the network is called a client computer. In a server-based
    network, users have one user account and password to log on to the server and
    to access shared resources. Server operating systems are designed to handle the
    load when multiple client computers access server-based resources.


    ![](img/19353aba2f109d1f7c4c239afb8fa982_173_0.png)


    # 6.3 Network Topology


    The physical topology of a network refers to the configuration of cables, computers,
    and other peripherals.


    In networking, the term “topology” refers to the layout of connected devices on
    a network. Topology as a network’s virtual shape or structure. This shape does
    not necessarily correspond to the actual physical layout of the devices on the
    network. For example, the computers on a home LAN may be arranged in a circle
    in a family room, but it would be highly unlikely to find an actual ring topology
    there.


    Network topologies are categorized into the following basic types:


    +   1. Bus Topology

    2. Ring Topology

    3. Star Topology

    4. Mesh Topology

    5. Tree Topology

    6. Hybrid Topology'
- md: '## 1. BUS Topology


    Bus topology is a network type in which every computer and network device is connected
    to a single cable. When it has exactly two endpoints, then it is called **Linear
    Bus topology**.


    ![](img/19353aba2f109d1f7c4c239afb8fa982_174_0.png)


    ## Features of Bus Topology


    - 1. It transmits data only in one direction.

    - 2. Every device is connected to a single cable.


    ## 2. RING Topology


    It is called ring topology because it forms a ring as each computer is connected
    to another computer, with the last one connected to the first. Exactly two neighbors
    for each device.


    ![](img/19353aba2f109d1f7c4c239afb8fa982_174_1.png)


    ## Features of Ring Topology


    - 1. A number of repeaters are used for Ring topology with a large number of nodes,
    because if someone wants to send some data to the last node in the ring topology
    with 100 nodes, then the data will have to pass through 99 nodes to reach the
    100th node. Hence to prevent data loss repeaters are used in the network.

    - 2. The transmission is unidirectional, but it can be made bidirectional by having
    2 connections between each Network Node, it is called **Dual Ring Topology**.

    - 3. In Dual Ring Topology, two ring networks are formed, and data flow is in
    opposite direction in them. Also, if one ring fails, the second ring can act as
    a backup, to keep the network up.

    - 4. Data is transferred in a sequential manner that is bit by bit. Data transmitted
    has to pass through each node of the network, till the destination node.


    ## 3. STAR Topology


    In this type of topology all the computers are connected to a single hub through
    a cable. This hub is the central node and all other nodes are connected to the
    central node.


    ![](img/19353aba2f109d1f7c4c239afb8fa982_175_0.png)


    ## Features of Star Topology


    - 1. Every node has its own dedicated connection to the hub.

    - 2. Hub acts as a repeater for data flow.

    - 3. Can be used with twisted pair, Optical Fibre or coaxial cable.


    ## 4. MESH Topology


    It is a point-to-point connection to other nodes or devices. All the network nodes
    are connected to each other. Mesh has n(n – 2)/2 physical channels to link n devices.

    There are two techniques to transmit data over the Mesh topology, they are:


    - 1. Routing

    - 2. Flooding


    **Routing:** In routing, the nodes have a routing logic, as per the network requirements.
    Like routing logic to direct the data to reach the destination using the shortest
    distance. Or, routing logic which has information about the broken links, and
    it avoids those nodes etc. We can even have routing logic, to re-configure the
    failed nodes.


    **Flooding:** In flooding, the same data is transmitted to all the network nodes,
    hence no routing logic is required. The network is robust, and it is very unlikely
    to lose the data. But it leads to unwanted load over the network.


    ![](img/19353aba2f109d1f7c4c239afb8fa982_176_0.png)


    ### Types of Mesh Topology


    - 1. Partial Mesh Topology: In this topology some of the systems are connected
    in the same fashion as mesh topology but some devices are only connected to two
    or three devices.

    - 2. Full Mesh Topology: Each and every node or device is connected to each other.


    ### Features of Mesh Topology


    - 1. Fully connected.

    - 2. Robust.

    - 3. Not flexible.


    ## 5. TREE Topology


    It has a root node and all other nodes are connected to it forming a hierarchy.
    It is also called hierarchical topology. It should at least have three levels
    to the hierarchy.


    ![](img/19353aba2f109d1f7c4c239afb8fa982_176_1.png)


    ### Features of Tree Topology


    - 1. Ideal if workstations are located in groups.

    - 2. Used in Wide Area Network.


    ## 6. HYBRID Topology


    It is two different types of topologies which is a mixture of two or more topologies.
    For example if in an office in one department ring topology is used and in another
    star topology is used, connecting these topologies will result in Hybrid Topology
    (ring topology and star topology).


    ![](img/19353aba2f109d1f7c4c239afb8fa982_177_0.png)


    ## Features of Hybrid Topology


    - 1. It is a combination of two or more topologies.

    - 2. Inherits the advantages and disadvantages of the topologies included.


    ## 6.4 What is Domain and Different Types of Domain


    (Domain Name System) A system for converting hostnames and domain names into IP
    addresses on the Internet or on local networks that use the TCP/IP protocol.


    For example, when a Web site address is given to the DNS either by typing a URL
    in a browser or behind the scenes from one application to another, DNS servers
    return the IP address of the server associated with that name.


    ## Structure of DNS


    - IP addresses are usually paired with more human-friendly names: Domain Name
    System (DNS).


    ![](img/19353aba2f109d1f7c4c239afb8fa982_177_1.png)


    Other top-level domains include .com, .gov, .org, etc. There are also country-specific
    domains like .uk, .ca, .jp, etc.


    Need to register a primary and secondary domain name servers for your domain and
    arrange to have zone files created on DNS servers.


    ## serverA.example.org.in


    ![](img/19353aba2f109d1f7c4c239afb8fa982_178_0.png)


    ## Types of domains


    The Root Domain: At the top of the inverted domain tree is the highest level of
    the DNS structure, called the root domain and represented by the simple dot (.).


    The Top-Level Domain Names: The TLDs can be broken down further into the generic
    top-level domain (e.g., .org, .com, .net, .mil, .gov, .edu, .int, .biz), country-code
    top-level domains (e.g., .us, .uk, .ng, and .ca, corresponding to the country
    codes for the United States, the United Kingdom, Nigeria, and Canada, respectively).


    The Second-Level Domain Names: The names at this level of the DNS make up the
    actual organizational boundary of the namespace. Companies, Internet service providers
    (ISPs), educational communities, nonprofit groups, and individuals typically acquire
    unique names within this level. Here are a few examples: redhat.com, caldera.com,
    kernel.org.


    The second-level domain in our URL (serverA.example.org.) is “example.”


    The Third-Level Domain Names: Third-level names to reflect hostnames or other
    functional uses. An example of functional assignment of a third-level domain name
    will be the “www” in the example www.yahoo.com. The “www” here can be the actual
    hostname of a machine under the yahoo.com domain, or it can be an alias to a real
    hostname.


    The third-level domain name in (serverA.example.org.) is “serverA.” Here, it simply
    reflects the actual hostname of our system.


    ## TOP Level Domains


    | Category | Description | Country | Description |

    |----------|-------------|---------|-------------|

    | .com | Commercial | .us | United States |

    | .edu | Educational | .ca | Canada |

    | .org | Nonprofit organization | .uk | United Kingdom |

    | .net | Networking | .de | Germany |

    | .biz | Business | .au | Australia |

    | .name | Personal use | .tw | Taiwan |

    | .pro | Professionals | .ru | Russia |


    - Top Level Domains (TLDs) are split into two types:

    - 1. Generic Top Level Domains (gTLD) .com, .edu, .net, .org, .mil etc.

    - 2. Country Code Top Level Domain (ccTLD) e.g. .us, .ca, .tv, .uk etc.


    ![](img/19353aba2f109d1f7c4c239afb8fa982_179_0.png)


    ## Functions of the Domain Name System


    - DNS is used to resolve host names to IP addresses and find services.

    - DNS is an essential service for a network that uses Active Directory.

    - DNS is also required if you want resources such as Web servers available on
    the Internet.

    - The most common operating system DNS is implemented on is UNIX/Linux, and this
    can be integrated with the Windows version of DNS.


    ## 6.5 Connection Oriented and Connection Less


    ### 6.5.1 Connection Less Services


    Since UDP is a connection Less Protocol hence UDP is used for connection less
    services. When UDP is used, the server creates a socket and binds address(es)
    and a port number to it. The server then waits for incoming data (remember: UDP
    is connectionless).


    ![](img/19353aba2f109d1f7c4c239afb8fa982_179_1.png)'
  mdcn: '## 1. 总线型拓扑


    总线型拓扑是一种网络类型，其中所有计算机和网络设备都连接到单根电缆上。当它只有两个端点时，则称为**线性总线拓扑**。


    ![](img/19353aba2f109d1f7c4c239afb8fa982_174_0.png)


    ## 总线型拓扑的特点


    - 1. 数据仅以单方向传输。

    - 2. 每个设备都连接到单根电缆。


    ## 2. 环形拓扑


    它被称为环形拓扑，因为每台计算机连接到另一台计算机，最后一台连接到第一台，形成一个环。每个设备恰好有两个邻居。


    ![](img/19353aba2f109d1f7c4c239afb8fa982_174_1.png)


    ## 环形拓扑的特点


    - 1. 对于拥有大量节点的环形拓扑，会使用许多中继器，因为如果有人想将数据发送到具有100个节点的环形拓扑中的最后一个节点，数据将不得不经过99个节点才能到达第100个节点。因此，为了防止数据丢失，网络中使用了中继器。

    - 2. 传输是单向的，但可以通过在每个网络节点之间建立2个连接使其双向工作，这称为**双环拓扑**。

    - 3. 在双环拓扑中，形成两个环形网络，数据在其中以相反方向流动。此外，如果一个环发生故障，第二个环可以充当备用，以保持网络运行。

    - 4. 数据以逐位的方式顺序传输。传输的数据必须经过网络的每个节点，直到到达目标节点。


    ## 3. 星型拓扑


    在这种拓扑类型中，所有计算机都通过一根电缆连接到单个集线器。此集线器是中心节点，所有其他节点都连接到中心节点。


    ![](img/19353aba2f109d1f7c4c239afb8fa982_175_0.png)


    ## 星型拓扑的特点


    - 1. 每个节点都有自己专用的到集线器的连接。

    - 2. 集线器充当数据流的中继器。

    - 3. 可以与双绞线、光纤或同轴电缆一起使用。


    ## 4. 网状拓扑


    它是与其他节点或设备的点对点连接。所有网络节点彼此连接。网状拓扑有 `n(n – 2)/2` 条物理通道来连接 `n` 个设备。

    有两种技术用于在网状拓扑上传输数据：


    - 1. 路由

    - 2. 洪泛


    **路由：** 在路由中，节点根据网络需求具有路由逻辑。例如，将数据定向到使用最短距离到达目的地的路由逻辑。或者，具有有关断开链路信息的路由逻辑，并避开这些节点等。我们甚至可以拥有重新配置故障节点的路由逻辑。


    **洪泛：** 在洪泛中，相同的数据被传输到所有网络节点，因此不需要路由逻辑。网络是健壮的，丢失数据的可能性非常小。但它会导致网络上不必要的负载。


    ![](img/19353aba2f109d1f7c4c239afb8fa982_176_0.png)


    ### 网状拓扑的类型


    - 1. 部分网状拓扑：在此拓扑中，一些系统以与网状拓扑相同的方式连接，但一些设备只连接到两三个设备。

    - 2. 全网状拓扑：每个节点或设备都彼此连接。


    ### 网状拓扑的特点


    - 1. 完全连接。

    - 2. 健壮。

    - 3. 不灵活。


    ## 5. 树型拓扑


    它有一个根节点，所有其他节点连接到它形成层次结构。它也称为分层拓扑。它应至少具有三个层次。


    ![](img/19353aba2f109d1f7c4c239afb8fa982_176_1.png)


    ### 树型拓扑的特点


    - 1. 如果工作站分组放置，则是理想的选择。

    - 2. 用于广域网。


    ## 6. 混合型拓扑


    它是两种不同类型的拓扑的混合，是两种或多种拓扑的混合。例如，如果一个办公室的一个部门使用环形拓扑，另一个部门使用星型拓扑，连接这些拓扑将导致混合拓扑（环形拓扑和星型拓扑）。


    ![](img/19353aba2f109d1f7c4c239afb8fa982_177_0.png)


    ## 混合型拓扑的特点


    - 1. 它是两种或多种拓扑的组合。

    - 2. 继承了所包含拓扑的优缺点。


    ## 6.4 什么是域以及不同类型的域


    （域名系统）一种在互联网或使用 TCP/IP 协议的本地网络上将主机名和域名转换为 IP 地址的系统。


    例如，当通过在浏览器中输入 URL 或在后台从一个应用程序到另一个应用程序将网站地址提供给 DNS 时，DNS 服务器会返回与该名称关联的服务器的 IP 地址。


    ## DNS 结构


    - IP 地址通常与更人性化的名称配对：域名系统 (DNS)。


    ![](img/19353aba2f109d1f7c4c239afb8fa982_177_1.png)


    其他顶级域名包括 .com、.gov、.org 等。还有一些特定国家的域名，如 .uk、.ca、.jp 等。


    需要为你的域名注册主域名服务器和辅助域名服务器，并安排在 DNS 服务器上创建区域文件。


    ## serverA.example.org.in


    ![](img/19353aba2f109d1f7c4c239afb8fa982_178_0.png)


    ## 域的类型


    根域：在倒置域名树的顶部是 DNS 结构的最高级别，称为根域，用单个点 (.) 表示。


    顶级域名：TLD 可以进一步细分为通用顶级域名（例如，.org、.com、.net、.mil、.gov、.edu、.int、.biz）、国家代码顶级域名（例如，.us、.uk、.ng
    和 .ca，分别对应美国、英国、尼日利亚和加拿大的国家代码）。


    二级域名：此级别的 DNS 名称构成了命名空间的实际组织边界。公司、互联网服务提供商 (ISP)、教育社区、非营利组织和个人通常在此级别获取唯一名称。以下是一些示例：redhat.com、caldera.com、kernel.org。


    我们 URL (serverA.example.org.) 中的二级域名是 "example"。


    三级域名：三级名称反映主机名或其他功能用途。三级域名的功能分配示例将是 www.yahoo.com 中的 "www"。这里的 "www" 可以是 yahoo.com
    域下某台机器的实际主机名，也可以是真实主机名的别名。


    (serverA.example.org.) 中的三级域名是 "serverA"。这里，它简单地反映了我们系统的实际主机名。


    ## 顶级域名


    | 类别      | 描述             | 国家    | 描述       |

    |-----------|------------------|---------|------------|

    | .com      | 商业             | .us     | 美国       |

    | .edu      | 教育             | .ca     | 加拿大     |

    | .org      | 非营利组织       | .uk     | 英国       |

    | .net      | 网络             | .de     | 德国       |

    | .biz      | 商业             | .au     | 澳大利亚   |

    | .name     | 个人使用         | .tw     | 台湾       |

