  mdcn: "## 第3章\n\n# 正则表达式\n\n### 结构\n\n- 3.1 正则表达式简介\n- 3.2 正则表达式模式\n    - 3.2.1\
    \ 编译标志\n- 3.3 正则表达式 `re` 模块\n- 3.4 各种类型的正则表达式\n- 3.5 正则表达式的不同方法\n    - 3.5.1 Match()\
    \ 方法\n    - 3.5.2 Search() 方法\n    - 3.5.3 Replace() 方法\n- 3.6 匹配 vs 搜索\n- 3.7\
    \ 搜索与替换\n- 3.8 正则表达式修饰符——选项标志\n- 3.9 问题\n\n### 3.1 正则表达式简介\n\n- 正则表达式（称为 RE、或正则、或正则模式）本质上是嵌入在\
    \ Python 中的一种小型、高度专业化的编程语言，并通过 `re` 模块提供。\n- 正则表达式内置了解析器，可以匹配字符串、替换字符串以及搜索字符串。\n\
    - 它使用不同的正则表达式符号和通配符字符，例如 `*` 和 `?`，以及 `.`、`#`、`^`、`$`、`[ ]` 等许多其他字符。\n- 正则表达式是一个特殊的字符序列，帮助你匹配或查找其他字符串或字符串集合。\n\
    - \"正则表达式\"一词有时也称为 regex 或 regexp，起源于理论计算机科学。\n- 模块 `re` 为 Python 中的类 Perl 正则表达式提供了完整支持。如果在编译或使用正则表达式时发生错误，`re`\
    \ 模块会引发 `re.error` 异常。\n- 正则表达式模式被编译为一系列字节码，然后由用 C 编写的匹配引擎执行。\n- 反斜杠是正则表达式中使用的特殊字符，但也用作字符串中的转义字符。这意味着\
    \ Python 会首先处理字符串中的每个反斜杠，之后——在没有必要的反斜杠的情况下——它才会被用作正则表达式。防止这种情况的一种方法是将每个反斜杠写为 `\\\
    \\`，从而将其保留用于正则表达式的求值。解决这个问题的最佳方法是将正则表达式标记为原始字符串。\n- 你还可以使用正则表达式以各种方式修改字符串或将其拆分。\n\
    - 如果你想在 Python 中使用正则表达式，必须导入 `re` 模块，它提供了处理正则表达式的方法和函数。\n\n### 一个演示正则表达式的简单示例\n\
    \n我们通过以下图示逐步展示此匹配是如何进行的：\n我们检查字符串 `sub = \"abc\"`\n\n![](img/19353aba2f109d1f7c4c239afb8fa982_69_0.png)\n\
    \n是否包含在字符串 `s = \"xaababcbcd\"` 中。\n\n![](img/19353aba2f109d1f7c4c239afb8fa982_69_1.png)\n\
    \n顺便说一下，字符串 `sub = \"abc\"` 可以看作一个正则表达式，只是非常简单。\n首先，我们检查两个字符串的第一个位置是否匹配，即 `s[0]\
    \ == sub[0]`。\n在我们的示例中，这不成立。我们用红色标记这个事实：\n\n![](img/19353aba2f109d1f7c4c239afb8fa982_69_2.png)\n\
    \n然后我们检查 `s[1:4] == sub`。这意味着我们首先需要检查 `sub[0]` 是否等于 `s[1]`。这是成立的，我们用绿色标记它。然后我们需要比较后续位置。`s[2]`\
    \ 不等于 `sub[1]`，因此我们不需要继续检查 sub 和 s 的下一个位置：\n\npython\ntry:\n    print (\"Business\
    \ Logic here...\")\nexcept \"Invalid level!\":\n    print( \"Exception handling\
    \ here...\")\nelse:\n    print(\"Rest of the code here...\")\n\n因此：\n\n![](img/19353aba2f109d1f7c4c239afb8fa982_64_0.png)\n\
    \n通过运行此 python 文件观察输出。\n\n![](img/19353aba2f109d1f7c4c239afb8fa982_64_1.png)\n\
    \n这里我写了简单的 print 语句。你可以编写在捕获异常后执行的逻辑或语句，并且在 else 中，你可以编写如果异常不存在则执行的其余代码。\n\n##\
    \ 添加业务逻辑和其他代码后执行的示例\n\n1.  如果我们传递的参数值是负值，则会引发异常。据此，可以捕获异常。\n\n    python\n   \
    \ def functionString( explevel ):\n        if explevel < 1:\n            raise\
    \ Exception(explevel)\n        return explevel\n    try:\n        r=functionString(-5)\n\
    \        print(\"level=\",r)\n    except Exception as e:\n        print(\"error\
    \ in argument level\",e.args[0])\n    else:\n        print(\"Program works smoothly\
    \ without exception\")\n\n    运行后观察到的输出：\n\n    text\n    Python 3.4.3 Shell\n\
    \    Python 3.4.3 (v3.4.3:9b73f1c3e601, Feb 24 2015, 22:43:06) [MSC v.1600 32\
    \ bit (Intel)] on win32\n    Type \"copyright\", \"credits\" or \"license()\"\
    \ for more information.\n    >>> ============================= RESTART ============================\n\
    \    >>> \n    error in argument level -5\n    >>> | \n\n2.  如果我们传递的参数值是正值，则不会引发异常，程序无异常地顺利运行。\n\
    \n    python\n    def functionString( explevel ):\n        if explevel < 1:\n\
    \            raise Exception(explevel)\n        return explevel\n    try:\n  \
    \      r=functionString(8)\n        print(\"level=\",r)\n    except Exception\
    \ as e:\n        print(\"error in argument level\",e.args[0])\n    else:\n   \
    \     print(\"Program works smoothly without exception\")\n\n    运行程序后观察到的输出：\n\
    \n    ![](img/19353aba2f109d1f7c4c239afb8fa982_66_0.png)\n\n## 2.8 文件异常处理\n\n\
    很多时候，当我们打开一个文件进行读写时，如果找不到文件，可能会引发异常。这里，会引发标准的 `IOError` 异常，程序会以 \"No such file\
    \ or directory\" 错误消息终止。我们可以捕获这个异常并处理错误，如所示。\n\n文件打开错误的异常处理示例：\n\n![](img/19353aba2f109d1f7c4c239afb8fa982_66_1.png)\n\
    \n![](img/19353aba2f109d1f7c4c239afb8fa982_66_2.png)\n\n- 1. 变量 `fname` 存储用户输入的文件名。\n\
    - 2. 变量 `inp_file_opened` 是一个标志变量，初始化为 False。\n- 3. while 循环在 `inp_file_opened`\
    \ 为 False 时持续迭代。由于循环内有 try 块，每次 `open(file_name, ‘r’)` 引发异常时，try 块中剩余的行将被跳过，并且执行\
    \ except 头之后的异常处理程序。\n- 4. 只有当对 `open` 的调用没有抛出异常时，try 块中的所有指令才会被执行，程序在 while 循环之后继续。\n\
    - 5. 从文本文件读取时，`readline` 方法不会引发任何异常。\n- 6. 当到达文件末尾时，`readline` 返回一个空字符串，而不是抛出异常。\n\
    - 7. 由文件打开错误引起的 IOError 异常可以被捕获和处理。\n\n## 2.9 异常处理的优点\n\n- 1. 借助异常，我们可以检测逻辑错误和语法错误。\n\
    - 2. 借助运行时的异常，我们可以捕获错误并向用户抛出错误消息。\n- 3. 异常处理提供了类型安全的集成方法。\n- 4. 同步异常可以由用户创建，因此用户可以控制程序。\n\
    - 5. 异常处理机制的主要优点是检测异常并报告异常情况，以便用户可以采取适当的操作。\n- 6. 一个程序段可以有多个条件，所有这些多个条件都可以由多个\
    \ catch 或 except 块处理，这意味着一个 try 块可以有多个 catch 或 except 块。\n- 7. Python 异常中提供了断言。\n\
    \n## 2.10 问题\n\n- 1. 定义什么是错误和缺陷，以及有哪些类型的错误。\n- 2. 解释你所说的异常是什么意思。\n- 3. 解释什么是异常以及如何处理它。\n\
    - 4. 解释不同类型的异常，并列出一些标准异常。\n- 5. 解释内置异常和用户定义异常之间的区别。\n- 6. 用清晰的图示解释异常的传播。\n- 7.\
    \ 解释 Python 中的断言。\n- 8. 解释可以使用 try 和 except 块处理捕获异常的不同方式。\n- 9. 用合适的示例解释参数和异常。\n\
    - 10. 举例说明如何引发异常。\n- 11. 解释异常处理如何在文件处理中使用。\n- 12. 解释异常处理的优点。"
