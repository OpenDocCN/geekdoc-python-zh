    # ## Regular-expression Examples


    # ### Literal characters:


    | Example | Description |

    |---------|-------------|

    | python | Match "python". |


    # ### Character classes:


    | Example | Description |

    |---------|-------------|

    | [Pp]ython | Match "Python" or "python" |

    | rub[ye] | Match "ruby" or "rube" |

    | [aeiou] | Match any one lowercase vowel |

    | [0-9] | Match any digit; same as [0123456789] |

    | [a-z] | Match any lowercase ASCII letter |

    | [A-Z] | Match any uppercase ASCII letter |

    | [a-zA-Z0-9] | Match any of the above |'
  - '[PAGE 73]


    | [^aeiou] | Match anything other than a lowercase vowel |

    | [^0-9] | Match anything other than a digit |


    # Special Character Classes:


    | Example | Description |

    | --- | --- |

    | . | Match any character except newline |

    | \d | Match a digit: [0-9] |

    | \D | Match a nondigit: [^0-9] |

    | \s | Match a whitespace character: [ \t\r\n\f] |

    | \S | Match nonwhitespace: [^ \t\r\n\f] |

    | \w | Match a single word character: [A-Za-z0-9_] |

    | \W | Match a nonword character: [^A-Za-z0-9_] |


    # Repetition Cases:


    | Example | Description |

    | --- | --- |

    | ruby? | Match "rub" or "ruby": the y is optional |

    | ruby* | Match "rub" plus 0 or more ys |

    | ruby+ | Match "rub" plus 1 or more ys |

    | \d{3} | Match exactly 3 digits |

    | \d{3,} | Match 3 or more digits |

    | /d{3,5} | Match 3,4,or 5 digits |


    # Nongreedy repetition:


    This matches the smallest number of repetitions:


    | Example | Description |

    | --- | --- |

    | <.*> | Greedy repetition: matches "<python>perl>" |

    | <.*?> | Nongreedy: matches "<python>" in "<python>perl>" |


    # Grouping with parentheses:


    | Example | Description |

    | --- | --- |

    | \D\d+ | No group: + repeats\d |

    | (\D\d)+ | Grouped: + repeats \D\d pair |

    | ([Pp]ython(, )?)+ | Match "Python", "Python, python, python", etc. |


    # Backreferences:


    This matches a previously matched group again:


    | Example | Description |

    | --- | --- |

    | ([Pp])ython&\1ails | Match python&pails or Python&Pails |

    | (["''])[^\1]*\1 | Single or double-quoted string. \1 matches whatever the 1st
    group matched . \2 matches whatever the 2nd group matched, etc. |'
  - '[PAGE 74]


    # Alternatives:


    | Example | Description |

    |---------|-------------|

    | python\|perl | Match "python" or "perl" |

    | rub(y\|le) | Match "ruby" or "ruble" |

    | Python(!+\|\?) | "Python" followed by one or more ! or one ? |


    # Anchors:


    This needs to specify match position.


    | Example | Description |

    |---------|-------------|

    | ^Python | Match "Python" at the start of a string or internal line |

    | Python$ | Match "Python" at the end of a string or line |

    | \APython | Match "Python" at the start of a string |

    | Python\Z | Match "Python" at the end of a string |

    | \bPython\b | Match "Python" at a word boundary |

    | \brub\ B | \B is nonword boundary: match "rub" in "rube" and "ruby" but not
    alone |

    | Python(?=!) | Match "Python", if followed by an exclamation point |

    | Python(?!!) | Match "Python", if not followed by an exclamation point |


    # Special syntax with parentheses:


    | Example | Description |

    |---------|-------------|

    | R(?#comment) | Matches "R". All the rest is a comment |

    | R(?i)uby | Case-insensitive while matching "uby" |

    | R(?i:uby) | Same as above |

    | rub(?:y\|le)) | Group only without creating \1 backreference |


    # 3.2.1 Compilation Flags


    Compilation flags let you modify some aspects of how regular expressions work.
    Flags are available in the re module under two names, a long name such as IGNORECASE
    and a short, one-letter form such as I. (If you''re familiar with Perl''s pattern
    modifiers, the one-letter forms use the same letters; the short form of re.VERBOSE
    is re.X, for example.) Multiple flags can be specified by bitwise OR-ing them;
    re.I | re.M sets both the I and M flags, for example.


    | Flag | Meaning |

    |------|---------|

    | ASCII, A | Makes several escapes like \w, \b, \s and \d match only on ASCII
    characters with the respective property. |

    | DOTALL, S | Make. match any character, including newlines |

    | IGNORECASE, I | Do case-insensitive matches |

    | LOCALE, L | Do a locale-aware match |

    | MULTILINE, M | Multi-line matching, affecting ^ and $ |

    | VERBOSE, X (for ''extended'') | Enable verbose REs, which can be organized more
    cleanly and understandably. |'
- md: "## I\n## IGNORECASE\n`I` 选项：执行不区分大小写的匹配；字符类和字面字符串将忽略大小写进行匹配。例如，`[A-Z]` 也会匹配小写字母，`Kiran`\
    \ 会匹配 `Kiran`、`kiran` 或 `kirAN`。\n\n## L\n## LOCALE\n使 `\\w`、`\\W`、`\\b` 和 `\\\
    B` 依赖于当前区域设置，而不是 Unicode 数据库。\n\n例如，如果你正在处理法语文本，你可能希望能够编写 `\\w+` 来匹配单词，但 `\\w`\
    \ 只匹配字符类 `[A-Za-z]`；它不会匹配 `é` 或 `ç`。如果你的系统配置正确并选择了法语区域设置，某些 C 函数会告诉程序 `é` 也应该被视为一个字母。\n\
    \n## M\n## MULTILINE\n通常 `^` 仅匹配字符串的开头，`$` 仅匹配字符串的结尾以及字符串结尾换行符（如果有）之前的位置。\n\n\
    ## S\n## DOTALL\n使 `.` 特殊字符匹配任何字符，包括换行符；没有此标志时，`.` 将匹配除换行符之外的任何字符。\n\n## A\n##\
    \ ASCII\n使 `\\w`、`\\W`、`\\b`、`\\B`、`\\s` 和 `\\S` 仅执行 ASCII 匹配，而不是完整的 Unicode 匹配。这只对\
    \ Unicode 模式有意义，对字节模式会被忽略。\n\n## X\n## VERBOSE\n此标志允许你通过提供更大的格式灵活性来编写更具可读性的正则表达式。指定此标志后，正则表达式字符串中的空格将被忽略，除非空格位于字符类中或前面没有未转义的反斜杠；这使你可以更清晰地组织和缩进正则表达式。此标志还允许你在正则表达式中放置将被引擎忽略的注释；注释由既不在字符类中也没有未转义反斜杠前置的\
    \ `#` 标记。\n\n## 3.3 Regular Expression [re] module\n- **re module** 用于在 Python\
    \ 中进行正则表达式操作。\n- 使用 re 正则表达式，模式和要搜索的字符串都可以是 Unicode 字符串或 8 位字符串。\n- 大多数正则表达式操作既可作为模块级函数，也可作为编译后的正则表达式对象的方法使用。\n\
    - 一个正则表达式（或 RE）指定了匹配它的字符串集合；此模块中的函数让你检查特定字符串是否匹配给定的正则表达式。\n- re 有两个重要函数：\n   \
    \ - **match()**\n    - **search()**\n- 我们可以在 re 模块中使用所有正则表达式模式。\n\n## 3.4 Various\
    \ types of Regular Expressions\n基于 POSIX（“UNIX 的可移植操作系统接口”），有不同类型的正则表达式。\n\n1.\
    \ **POSIX Basic Regular Expressions**\n2. **POSIX Extended Regular Expressions**\n\
    \n### POSIX Basic Regular Expressions\nPOSIX 是可移植操作系统接口，它定义了一系列标准，规定了一个（UNIX）操作系统应支持的功能。这些标准定义了两种风格的正则表达式。涉及正则表达式的命令，如\
    \ `grep` 和 `egrep`，都使用基本正则表达式。\n\n`grep` 是 Unix 和 Linux 中的全局正则表达式工具，支持不同的正则表达式模式。像\
    \ **字符串匹配模式** `?`、`.`、`^`、`*`、`+`、`$`、`[]` 等每个字符都有特殊含义。\n\n`egrep` 是 Unix 和 Linux\
    \ 中的扩展全局正则表达式工具，除了上述模式外，还支持使用 `|`（管道）符号来比较两个或多个模式。\n\n### POSIX Extended Regular\
    \ Expressions\n扩展正则表达式（ERE）标准化了与 UNIX `egrep` 命令使用的类似语法。“扩展”是相对于原始的 UNIX `grep`（它只有方括号表达式、点、脱字符、美元符号和星号）而言的。ERE\
    \ 支持 `grep` 的所有正则表达式，并带有一些扩展。\n\n因此，`egrep` 和 POSIX ERE 在不使用反斜杠的情况下添加了额外的元字符。你可以使用反斜杠来抑制所有元字符的含义。\n\
    \n`Grep`、`egrep`、`sed`、`awk` 都使用扩展正则表达式。\n\n**量词** `?`、`+`、`{n}`、`{n,m}` 和 `{n,}`\
    \ 分别将前面的标记重复零次或一次、一次或更多次、n 次、介于 n 和 m 次之间以及 n 次或更多次。\n\n在 `egrep` 中通过竖线 `|` 支持用于多模式匹配的扩展正则表达式。括号创建一个分组，例如\
    \ `(abc){2}` 匹配 `abcabc`。\n\n## 3.5 Different Methods of Regular Expressions\n\
    ### 3.5.1 match() method\n此函数尝试使用可选标志将 RE 模式与字符串匹配。\n\n该函数的语法如下：\n\n```python\n\
    re.match(pattern, string, flags=0)\n```\n\n参数说明如下：\n\n| Parameter | Description\
    \ |\n| --- | --- |\n| pattern | 这是要匹配的正则表达式。 |\n| string | 这是要搜索的字符串，将在字符串开头匹配模式。\
    \ |\n| flags | 你可以使用按位或 (|) 指定不同的标志。这些是修饰符，列于下表。 |\n\n`re.match` 函数成功时返回一个匹配对象，失败时返回\
    \ `None`。我们将使用匹配对象的 `group(num)` 或 `groups()` 函数来获取匹配的表达式。\n\n| Match Object Methods\
    \ | Description |\n| --- | --- |\n| group(num=0) | 此方法返回整个匹配（或特定的子组 num）。 |\n\
    | groups() | 此方法以元组形式返回所有匹配的子组（如果没有则为空）。 |\n\n#### Example of match Function\n\
    \n**Code**\n\n```python\n#!/usr/bin/python\nimport re\n\nline = \"Cats are smarter\
    \ than dogs\"\n\nmatchObj = re.match( r'(.*) are (.*?) .*', line, re.M|re.I)\n\
    \nif matchObj:\n    print ('matchObj.group() :', (matchObj.group()))\n    print\
    \ ('matchObj.group(1) :', (matchObj.group(1)))\n    print ('matchObj.group(2)\
    \ :', (matchObj.group(2)))\nelse:\n    print ('No match!!')\n```\n\n![img](img/19353aba2f109d1f7c4c239afb8fa982_78_0.png)\n\
    \n**Output**\n\n![img](img/19353aba2f109d1f7c4c239afb8fa982_78_1.png)\n\n![img](img/19353aba2f109d1f7c4c239afb8fa982_79_0.png)\n\
    \n### 3.5.2 search() method\n此函数在字符串中搜索 RE 模式的第一次出现，可以使用可选标志。\n\n该函数的语法如下：\n\n\
    `re.search(pattern, string, flags=0)`\n\n参数说明如下：\n\n| Parameter | Description\
    \ |\n| --- | --- |\n| **pattern** | 这是要匹配的正则表达式。 |\n| **string** | 这是要搜索的字符串，将在字符串中的任何位置匹配模式。\
    \ |\n| **flags** | 你可以使用按位或 (|) 指定不同的标志。这些是修饰符，列于下表。 |\n\n`re.search` 函数成功时返回一个匹配对象。我们将使用匹配对象的\
    \ `group(num)` 或 `groups()` 函数来获取匹配的表达式。\n\n| Match Object Methods | Description\
    \ |\n| --- | --- |\n| **group(num=0)** | 此方法返回整个匹配（或特定的子组 num）。 |\n| **groups()**\
    \ | 此方法以元组形式返回所有匹配的子组（如果没有则为空）。 |\n\n#### Example of search Function\n\n**Code**\n\
    \n```python\n#!/usr/bin/python\nimport re\n\nline = \"Cats are smarter than dogs\"\
    ;\nsearchObj = re.search( r'(.*) are (.*?) .*', line, re.M|re.I)\n\nif searchObj:\n\
    \    print ('searchObj.group() : ', (searchObj.group()))\n    print ('searchObj.group(1)\
    \ : ', (searchObj.group(1)))\n    print ('searchObj.group(2) : ', (searchObj.group(2)))\n\
    else:\n    print ('Nothing found!!')\n```\n\n**Output**\n\n```\n==================\n\
    >>>\nmatchObj.group() : Cats are smarter than dogs\nmatchObj.group(1) : Cats\n\
    matchObj.group(2) : smarter\n>>> ================== RESTART ==================\n\
    ==================\n>>>\nsearchObj.group() : Cats are smarter than dogs\nsearchObj.group(1)\
    \ : Cats\nsearchObj.group(2) : smarter\n>>> |\n```\n\n```\nPython 2.7.13 (v2.7.13:a06454b1afa1,\
    \ Dec 17 2016, 20:42:59) [MSC v.1500 32 bit (Intel)] on win32\nType \"copyright\"\
    , \"credits\" or \"license()\" for more information.\n>>>\n==================\
    \ RESTART: C:/Python27/search.py ==================\n('searchObj.group() : ',\
    \ 'Cats are smarter than dogs')\n('searchObj.group(1) : ', 'Cats')\n('searchObj.group(2)\
    \ : ', 'smarter')\n>>> |\n```"
