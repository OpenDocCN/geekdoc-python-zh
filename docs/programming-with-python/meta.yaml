    \ |\n| UnboundLocalError | 当尝试在函数或方法中访问局部变量但尚未为其赋值时引发。 |\n| EnvironmentError |\
    \ 所有发生在 Python 环境之外的异常的基类。 |\n| IOError | 当输入/输出操作失败时引发，例如 print 语句或 open() 函数尝试打开一个不存在的文件时。\
    \ |\n| OSError | 用于操作系统相关错误。 |\n| SyntaxError | 当 Python 语法中存在错误时引发。 |\n| IndentationError\
    \ | 当缩进未正确指定时引发。 |\n| SystemError | 当解释器发现内部问题时引发，但遇到此错误时 Python 解释器不会退出。 |\n\
    | SystemExit | 当使用 sys.exit() 函数退出 Python 解释器时引发。如果在代码中未处理，将导致解释器退出。 |\n| ValueError\
    \ | 当内置函数的数据类型参数有效，但参数指定了无效值时引发。 |\n| RuntimeError | 当生成的错误不属于任何类别时引发。 |\n| NotImplementedError\
    \ | 当需要在继承类中实现的抽象方法未实际实现时引发。 |\n| BufferError | 当无法执行与缓冲区相关的操作时引发。 |\n| KeyError\
    \ | 当映射（字典）键在现有键集中未找到时引发。 |\n| MemoryError | 当操作耗尽内存但情况可能仍可挽救（通过删除某些对象）时引发。 |\n\
    | OverflowError | 当算术运算的结果太大而无法表示时引发。 |\n| ReferenceError | 当使用 weakref.proxy()\
    \ 函数创建的弱引用代理在引用对象已被垃圾回收后尝试访问其属性时，引发此异常。 |\n| IndentationError | 与错误缩进相关的语法错误的基类。\
    \ |\n| TabError | 当缩进包含不一致的制表符和空格使用时引发。 |\n| TypeError | 当操作或函数应用于不适当类型的对象时引发。关联值是一个字符串，详细说明了类型不匹配。\
    \ |\n| WindowsError | 当发生 Windows 特定错误时引发。 |\n| ZeroDivisionError | 当除法或取模运算的第二个参数为零时引发。\
    \ |\n\n## 异常层次结构\n\n内置异常的类层次结构如下：\n\n```\nBaseException\n +-- SystemExit\n +--\
    \ KeyboardInterrupt\n +-- GeneratorExit\n +-- Exception\n     +-- StopIteration\n\
    \     +-- StandardError\n     |    +-- BufferError\n     +-- ArithmeticError\n\
    \     |    +-- FloatingPointError\n     |    +-- OverflowError\n     |    +--\
    \ ZeroDivisionError\n     +-- AssertionError\n     +-- AttributeError\n     +--\
    \ EnvironmentError\n     |    +-- IOError\n     |    +-- OSError\n     |     \
    \    +-- WindowsError (Windows)\n     |         +-- VMSError (VMS)\n     +-- EOFError\n\
    \     +-- ImportError\n     +-- LookupError\n     |    +-- IndexError\n     |\
    \    +-- KeyError\n     +-- MemoryError\n     +-- NameError\n     |    +-- UnboundLocalError\n\
    \     +-- ReferenceError\n     +-- RuntimeError\n     |    +-- NotImplementedError\n\
    \     +-- SyntaxError\n     |    +-- IndentationError\n     |         +-- TabError\n\
    \     +-- SystemError\n     +-- TypeError\n     +-- ValueError\n         +-- UnicodeError\n\
    \             +-- UnicodeDecodeError\n             +-- UnicodeEncodeError\n  \
    \           +-- UnicodeTranslateError\n +-- Warning\n     +-- DeprecationWarning\n\
    \     +-- PendingDeprecationWarning\n     +-- RuntimeWarning\n     +-- SyntaxWarning\n\
    \     +-- UserWarning\n     +-- FutureWarning\n     +-- ImportWarning\n     +--\
    \ UnicodeWarning\n     +-- BytesWarning\n```\n\n## 2.4.2 用户自定义异常\n\nPython 还允许我们通过从标准内置异常派生类来创建自己的异常。\n\
    \n在 try 块中，引发用户自定义异常，并在 except 块中捕获。变量 e 用于创建 *Networkerror* 类的实例。\n\n```\nclass\
    \ Networkerror(RuntimeError):\n    def __init__(self, arg):\n        self.args\
    \ = arg\n```\n\n因此，一旦你定义了上述类，就可以如下引发异常 –\n\n```\ntry:\n    raise Networkerror(“Bad\
    \ hostname”)\nexcept Networkerror,e:\n    print (e.args)\n```\n\n## 2.5 异常的传播\n\
    \n当一个异常被引发且未被用户端或客户端代码处理时，它会自动传播回调用它的代码，直到被处理。如果异常一直传播到顶层（主模块）且未被处理，那么程序将终止并显示异常的详细信息。\n\
    \n例如，一个程序可能无法在输入源确定密码是否有效。相反，密码必须在访问密码文件后进行验证，而访问密码文件需要在进行**一系列函数调用**之后。如果密码被发现无效，异常将从识别错误的函数一直传播回负责用户输入的函数，然后该函数可以提示用户重新输入密码。\n\
    \n异常要么由用户端或客户端代码处理，要么自动传播回用户或客户端的调用代码，依此类推，直到被处理。如果异常一直传播回主模块（且未被处理），程序将终止并显示异常的详细信息。\n\
    \n## 2.6 Python 中的断言\n\n断言是一种健全性检查，你可以在完成程序测试后打开或关闭它。断言可以比作一个 **raise-if** 语句。测试一个表达式，如果结果为假，则引发一个异常。\n\
    \n断言由 **assert** 语句执行。程序员通常在函数开始时放置断言以检查有效输入，并在函数调用后检查有效输出。\n\n**assert 语句**\n\
    \n当遇到 assert 语句时，Python 会计算伴随的表达式，该表达式可能为真。如果表达式为假，Python 会引发一个 *AssertionError*\
    \ 异常。\n\n**Assert 的语法是 –**\n\n```\nassert Expression[, Arguments]\n```\n\n如果断言失败，Python\
    \ 使用 ArgumentExpression 作为 AssertionError 的参数。AssertionError 异常可以像任何其他异常一样使用 try-except\
    \ 语句捕获和处理，但如果未处理，它们将终止程序并产生回溯信息。\n\n**示例**\n\n这是一个将温度从开尔文转换为华氏度的函数。由于零开尔文是能达到的最低温度，如果函数看到负温度就会退出\
    \ –\n\n首先观察此程序的输出\n\n```\ndef KelvinToFahrenheit(Temperature):\n    assert (Temperature\
    \ >= 0),\"Colder than absolute zero!\"\n    return ((Temperature-273)*1.8)+32\n\
    print (KelvinToFahrenheit(273))\nprint (int(KelvinToFahrenheit(505.78)))\n```\n\
    \n**输出**\n\n```\nPython 3.4.3 Shell\nPython 3.4.3 (v3.4.3:9b73f1c3e601, Feb 24\
    \ 2015, 22:43:tel]) on win32\nType \"copyright\", \"credits\" or \"license()\"\
    \ for more information.\n>>> ======================== RESTART ========================\n\
    >>> \n32.0\n451\n>>> \n```\n\n现在我传递一个小于零的温度，即负温度，观察负温度时的 AssertionError。\n\n```\n\
    def KelvinToFahrenheit(Temperature):\n    assert (Temperature >= 0),\"Colder than\
    \ absolute zero!\"\n    return ((Temperature-273)*1.8)+32\nprint (KelvinToFahrenheit(273))\n\
    print (int(KelvinToFahrenheit(505.78)))\nprint (KelvinToFahrenheit(-5))\n```\n\
    \n**输出**\n\n```\nPython 3.4.3 Shell\nPython 3.4.3 (v3.4.3:9b73f1c3e601, Feb 24\
    \ 2015, 22:43:06) [MSC v.1600 32 bit (Intel)] on win32\nType \"copyright\", \"\
    credits\" or \"license()\" for more information.\n>>> ========================\
    \ RESTART ========================\n>>> \n32.0\n451\nTraceback (most recent call\
    \ last):\n  File \"C:/Python34/KelvinToFahrenheit.py\", line 6, in <module>\n\
    \    print (KelvinToFahrenheit(-5))\n  File \"C:/Python34/KelvinToFahrenheit.py\"\
    , line 2, in KelvinToFahrenheit\n    assert (Temperature >= 0),\"Colder than absolute\
    \ zero!\"\nAssertionError: Colder than absolute zero!\n>>> \n```"
