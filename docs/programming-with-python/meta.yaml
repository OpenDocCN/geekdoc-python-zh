    # 1.11.4 Python Infinite Iterators


    It is not necessary that the item in an iterator object has to exhaust. There
    can be infinite iterators (which never ends). We must be careful when handling
    such iterator.


    > *Example to demonstrate infinite iterators.*


    The built in function iter() can be called with two arguments where the first
    argument must be a callable object (function) and second is the sentinel. The
    iterator calls this function until the returned value is equal to the sentinel.


    ```

    >>> int()

    0


    >>> inf = iter(int,1)

    >>> next(inf)

    0

    >>> next(inf)

    0

    ```'
