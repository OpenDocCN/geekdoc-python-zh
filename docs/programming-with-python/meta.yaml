- md: "## Transaction Properties\n\nA transaction in a database system must maintain\
    \ Atomicity, Consistency, Isolation, and Durability. Transactions are completed\
    \ by COMMIT or ROLLBACK SQL statements, which indicate a transaction’s beginning\
    \ or end. When a transaction completes successfully, database changes are said\
    \ to be committed. When a transaction does not complete, changes are rolled back.\n\
    \nFor example, a transfer of money from one bank account to another requires two\
    \ changes to the database both must succeed or fail together.\n\n## Process of\
    \ Transaction\n\nThe transaction is executed as a series of reads and writes of\
    \ database objects, which are explained below:\n\n### Read Operation\n\nTo read\
    \ a database object, it is first brought into main memory from disk, and then\
    \ its value is copied into a program variable as shown in figure.\n\n### Write\
    \ Operation\n\nTo write a database object, an in-memory copy of the object is\
    \ first modified and then written to disk.\n\n## Transactions Properties\n\nTransactions\
    \ are a mechanism that ensures data consistency. Transactions have the following\
    \ four properties:\n\n1. **Atomicity: (all or nothing)** A transaction is said\
    \ to be atomic if a transaction always executes all its actions in one step or\
    \ not executes any actions at all It means either all or none of the transactions\
    \ operations are performed. Either a transaction completes or nothing happens\
    \ at all.\n\n2. **Consistency: (No violation of integrity constraints)** A transaction\
    \ must preserve the consistency of a database after the execution. The DBMS assumes\
    \ that this property holds for each transaction. Ensuring this property of a transaction\
    \ is the responsibility of the user. A transaction must start in a consistent\
    \ state and leave the system in a consistent state.\n\n3. **Isolation: (concurrent\
    \ changes invisibles)** The transactions must behave as if they are executed in\
    \ isolation. It means that if several transactions are executed concurrently the\
    \ results must be same as if they were executed serially in some order. The data\
    \ used during the execution of a transaction cannot be used by a second transaction\
    \ until the first one is completed. Intermediate results of a transaction are\
    \ not visible outside the current transaction.\n\n4. **Durability: (committed\
    \ update persist)** The effect of completed or committed transactions should persist\
    \ even after a crash. It means once a transaction commits, the system must guarantee\
    \ that the result of its operations will never be lost, in spite of subsequent\
    \ failures. Once a transaction was committed, the effects are persistent, even\
    \ after a system failure.\n\nThe Python DB API 2.0 provides two methods to either\
    \ *commit* or *rollback* a transaction.\n\n## 5.12.1 Executing Transactions\n\n\
    Example\n\nYou already know how to implement transactions. Here is again similar\
    \ example:\n\nExample\n\nIn this Example Exception Handling used in database Transaction,\
    \ if transaction is not perform It will be rollbacked.\n\n## Output\n\n## COMMIT\
    \ Operation\n\nCommit is the operation, which gives a confirmation for finalize\
    \ changes saved permanently in a database. Once commit statement is executed,\
    \ no change can be reverted back.\n\nHere is a simple example to call **commit**\
    \ method.\n\n```\ndb.commit()\n```\n\n## ROLLBACK Operation\n\nIf any DML statement\
    \ Like insert, update and delete If you want to revert back those changes completely,\
    \ then use **rollback()** method is used. Here is a simple example to call **rollback()**\
    \ method.\n\n```\ndb.rollback()\n```\n\n## Disconnecting Database\n\nTo disconnect\
    \ Database connection, use **close()** method.\n\n```\ndb.close()\n```\n\nIf the\
    \ connection to a database is closed by the user with the close() method, any\
    \ outstanding transactions are rolled back by the DB.\n\n## 5.13 Understanding\
    \ Exceptions in Database Connectivity\n\nException is an event which occurs during\
    \ execution of the program, that disturbs the normal flow of the program hence\
    \ to handle that errors we can put messages according to our own requirements.\n\
    \n## Example of Exception Handling in Files\n\n```\ntry:\n    fob = open(\"kiran.txt\"\
    , \"r\")\n    fob.write(\"This is my test file for exception handling!!\")\nexcept\
    \ IOError:\n    print \"Error: can\\'t find the file or read data\"\nelse:\n \
    \   print \"Write operation is performed successfully on the file\"\n    fob.close()\n\
