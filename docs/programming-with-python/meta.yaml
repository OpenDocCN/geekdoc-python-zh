  md: '# 4.6.1 Button Widget


    The **Button** widget is a standard tkinter widget used to implement various kinds
    of buttons.

    Buttons can contain text or images, and you can associate a Python function or
    method with each button.

    When the button is pressed, tkinter automatically calls that function or method.

    The button can only display text in a single font, but the text may span more
    than one line.

    By default, the **Tab** key can be used to move to a button widget.

    Buttons are mainly used in application program, toolbars and many a time for accept
    or not accept particular information within the dialog box.

    Now we see a how to create a simple button and click event with the help of simple
    program.


    ![](img/19353aba2f109d1f7c4c239afb8fa982_101_0.png)


    In the above program we define button widget using variable b and define the text
    as OK and use one command in which we call function name as display using command=display.
    This will call the function and when you press OK button it display **OK button
    click!**

    Now we see the various options used with button widget which are as follows :


    +   1. activeforeground= What foreground color to use when the button is active.

    2. activebackground= What background color to use when the button is active.

    3. font= The font to use in the button.

    4. height= The height of the button.

    5. width= The width of the button.

    6. relief=Border decoration. Usually, the button is SUNKEN when pressed, and RAISED
    otherwise. Other possible values are GROOVE, RIDGE, and FLAT. Default is RAISED

    7. bd= Same as borderwidth.

    8. fg= Same as foreground.'
