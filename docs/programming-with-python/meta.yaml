  md: '# I


    # IGNORECASE


    I option Perform case-insensitive matching; character class and literal strings
    will match letters by ignoring case. For example, [A-Z] will match lowercase letters,
    too, and Kiran will match Kiran, kiran, or kirAN.


    # L


    # LOCALE


    Make \w, \W, \b, and \B, dependent on the current locale instead of the Unicode
    database.


    For example, if you’re processing French text, you’d want to be able to write
    \w+ to match words, but \w only matches the character class [A-Za-z]; it won’t
    match ‘é’ or ‘ç’. If your system is configured properly and a French locale is
    selected, certain C functions will tell the program that ‘é’ should also be considered
    a letter..


    # M


    # MULTILINE


    Usually ^ matches only at the beginning of the string, and $ matches only at the
    end of the string and immediately before the newline (if any) at the end of the
    string.


    # S


    # DOTALL


    Makes the ''.'' special character match any character at all, including a newline;
    without this flag, ''.'' will match anything except a newline.


    # A


    # ASCII


    Make \w, \W, \b, \B, \s and \S perform ASCII-only matching instead of full Unicode
    matching. This is only meaningful for Unicode patterns, and is ignored for byte
    patterns.


    # X


    # VERBOSE


    This flag allows you to write regular expressions that are more readable by granting
    you more flexibility in how you can format them. When this flag has been specified,
    whitespace within the RE string is ignored, except when the whitespace is in a
    character class or preceded by an un escaped backslash; this lets you organize
    and indent the RE more clearly. This flag also lets you put comments within a
    RE that will be ignored by the engine; comments are marked by a ''#''that’s neither
    in a character class or preceded by an un escaped backslash.'
