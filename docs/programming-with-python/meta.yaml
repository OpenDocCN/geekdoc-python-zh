  md: '# 1. BUS Topology


    Bus topology is a network type in which every computer and network device is connected
    to single cable. When it has exactly two endpoints, then it is called **Linear
    Bus topology**.


    ![](img/19353aba2f109d1f7c4c239afb8fa982_174_0.png)


    # Features of Bus Topology


    +   1. It transmits data only in one direction.

    2. Every device is connected to a single cable


    # 2. RING Topology


    It is called ring topology because it forms a ring as each computer is connected
    to another computer, with the last one connected to the first. Exactly two neighbors
    for each device.


    ![](img/19353aba2f109d1f7c4c239afb8fa982_174_1.png)


    # Features of Ring Topology


    +   1. A number of repeaters are used for Ring topology with large number of nodes,
    because if someone wants to send some data to the last node in the ring topology
    with 100 nodes, then the data will have to pass through 99 nodes to reach the
    100th node. Hence to prevent data loss repeaters are used in the network.

    2. The transmission is unidirectional, but it can be made bidirectional by having
    2 connections between each Network Node, it is called **Dual Ring Topology**.

    3. In Dual Ring Topology, two ring networks are formed, and data flow is in opposite
    direction in them. Also, if one ring fails, the second ring can act as a backup,
    to keep the network up.'
  merge: -1
  pgno: 174
- img_proc: true
  md: '4. Data is transferred in a sequential manner that is bit by bit. Data transmitted,
    has to pass through each node of the network, till the destination node.


    # 3. STAR Topology


    In this type of topology all the computers are connected to a single hub through
    a cable. This hub is the central node and all others nodes are connected to the
    central node.


    ![](img/19353aba2f109d1f7c4c239afb8fa982_175_0.png)


    Features of Star Topology


    +   1. Every node has its own dedicated connection to the hub.

    2. Hub acts as a repeater for data flow.

    3. Can be used with twisted pair, Optical Fibre or coaxial cable.


    # 4. MESH Topology


    It is a point-to-point connection to other nodes or devices. All the network nodes
    are connected to each other. Mesh has n(n – 2)/2 physical channels to link n devices.

    There are two techniques to transmit data over the Mesh topology, they are :


    +   1. Routing

    2. Flooding


    **Routing:** In routing, the nodes have a routing logic, as per the network requirements.
    Like routing logic to direct the data to reach the destination using the shortest
    distance. Or, routing logic which has information about the broken links, and
    it avoids those node etc. We can even have routing logic, to re-configure the
    failed nodes.


    **Flooding:** In flooding, the same data is transmitted to all the network nodes,
    hence no routing logic is required. The network is robust, and the its very unlikely
    to lose the data. But it leads to unwanted load over the network.'
