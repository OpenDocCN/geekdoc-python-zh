- md: "## 5.11.3 Update Operation\n\nUPDATE Operation on any database means to update\
    \ one or more records, which are already available in the database.\n\nThe following\
    \ procedure updates all the records having SEX as ‘M’. Here, we increase AGE of\
    \ all the males by one year.\n\n```python\n#!/usr/bin/python\nimport MySQLdb\n\
    # Open database connection\ndb = MySQLdb.connect(\"localhost\",\"root\",\"password\"\
    ,\"kirandb\")\n# prepare a cursor object using cursor() method\ncursor = db.cursor()\n\
    # Prepare SQL query to INSERT a record into the database.\nsql = \"INSERT INTO\
    \ EMPLOYEE(FIRST_NAME, \\\nLAST_NAME, AGE, SEX, INCOME) \\\nVALUES ('%s', '%s',\
    \ '%d', '%c', '%d' )\" % \\\n('kiran', 'Gurbani', 40, 'F', 40000)\ntry:\n    #\
    \ Execute the SQL command\n    cursor.execute(sql)\n    print(\"1 Record inserted\"\
    )\n    # Commit your changes in the database\n    db.commit()\n    print(\"1 record\
    \ saved\")\nexcept:\n    # Rollback in case there is any error\n    db.rollback()\n\
    # disconnect from server\ndb.close()\n```\n\n```\nPython 2.7.13 (v2.7.13:a06454b1afa1,\
    \ Dec 17 2016, 20:42:53) [MSC v.1500 32 bit (Intel)] on win32\nType \"copyright\"\
