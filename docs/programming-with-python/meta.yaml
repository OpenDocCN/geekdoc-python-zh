  md: '# 5.8 Creating Cursor Object


    +   - A Cursor is a Python object that enables you to work with the database.

    - After connection is established, to use the connection we need to create a cursor
    object.

    - The cursor object is an abstraction specified in the Python DB-API 2.0.

    - The cursor is positioned at a particular location within a table in a database,
    It just like a cursor on your screen when you are editing document.

    - It gives us the ability to have multiple separate working environments through
    the same connection to the database.

    - You can create a cursor by executing the ‘cursor’ function of your database
    object. `cur = db.cursor()`

    - Once you have cursor, you can perform database operations on that Like inserting,
    updating and delting recodrs.

    - By default the cursor is created using the default cursor class.

    - If you like you can specify a different cursor class by setting the ‘cursorclass’
    parameter to the cursor class you would like to use.


    There are several different cursor classes that give you different functionality
    when executing queries.


    # Module MySQLdb.cursors


    MySQLdb Cursors

    This module implements Cursors of various types for MySQLdb. By default, MySQLdb
    uses the Cursor class.


    | Classes | |

    | :--- | :--- |

    | **BaseCursor** | **A base for Cursor classes.** |

    | Cursor | This is the standard Cursor class that returns rows as tuples and stores
    the result set in the client. |

    | CursorDictRowsMixIn | This is a MixIn class that causes all rows to be returned
    as dictionaries. |

    | CursorOldDictRowsMixIn | This is a MixIn class that returns rows as dictionaries
    with the same key convention as the old Mysqldb (MySQLmodule). |

    | CursorStoreResultMixIn | This is a MixIn class which causes the entire result
    set to be stored on the client side, i.e. |

    | CursorTupleRowsMixIn | This is a MixIn class that causes all rows to be returned
    as tuples, which is the standard form required by DB API. |

    | CursorUseResultMixIn | This is a MixIn class which causes the result set to
    be stored in the server and sent row-by-row to client side, i.e. |

    | DictCursor | This is a Cursor class that returns rows as dictionaries and stores
    the result set in the client. |

    | SSCursor | This is a Cursor class that returns rows as tuples and stores the
    result set in the server. |

    | SSDictCursor | This is a Cursor class that returns rows as dictionaries and
    stores the result set in the server. |'
