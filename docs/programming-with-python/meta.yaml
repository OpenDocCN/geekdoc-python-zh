  md: "# 2.7 Catching and Handling Exceptions\n\n# 2.7.1 try... except\n\nIf you have\
    \ some *suspicious* code that may raise an exception, you can defend your program\
    \ by placing the suspicious code in a **try:** block. After the try: block, include\
    \ an **except:** statement, followed by a block of code which handles the problem\
    \ as soon as possible.\n\n*Syntax*\n\nHere is simple syntax of *try....except...else*\
    \ blocks –\n\n```\ntry:\n    You do your operations here;\n    ......................\n\
    except Exception I:\n    If there is ExceptionI, then execute this block.\nexcept\
    \ Exception II:\n    If there is ExceptionII, then execute this block.\n    ......................\n\
    else:\n    If there is no exception then execute this block.\n```\n\n**Some of\
    \ few important points to be considered:**\n\n+   - A single try statement can\
    \ have multiple except statements. This is useful when the try block contains\
    \ statements that may throw different types of exceptions.\n- You can also provide\
    \ a generic except clause, which handles any exception.\n- After the except clause(s),\
    \ you can include an else-clause. The code in the else-block executes if the code\
    \ in the try: block does not raise an exception.\n- The else-block is a good place\
    \ for code that does not need the try: block’s protection.\n\n*Exception Handling\
    \ can be done with user input:*\n\n```\n>>> while True:\n...     try:\n...   \
    \      x = int(raw_input(“Please enter a number:”))\n...         break\n...  \
    \   except ValueError:\n...         print (\"Oops! That was no valid number. Try\
    \ again...\")\n...\n```"
