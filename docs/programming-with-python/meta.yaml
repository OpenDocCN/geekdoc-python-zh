    \ DB API defines a number of errors that must exist in each database module. The\
    \ following table lists these exceptions.\n\n| Exception | Description |\n|-----------|-------------|\n\
    | Warning | Used for non-fatal issues. Must subclass StandardError. |\n| Error\
    \ | Base class for errors. Must subclass StandardError. |\n| InterfaceError |\
    \ Used for errors in the database module, not the database itself. Must subclass\
    \ Error. |\n| DatabaseError | Used for errors in the database. Must subclass Error.\
    \ |\n| DataError | Subclass of DatabaseError that refers to errors in the data.\
    \ |\n| OperationalError | Subclass of DatabaseError that refers to errors such\
    \ as the loss of a connection to the database. These errors are generally outside\
    \ of the control of the Python scripter. |\n| IntegrityError | Subclass of DatabaseError\
    \ for situations that would damage the relational integrity, such as uniqueness\
    \ constraints or foreign keys. |\n| InternalError | Subclass of DatabaseError\
    \ that refers to errors internal to the database module, such as a cursor no longer\
    \ being active. |\n| ProgrammingError | Subclass of DatabaseError that refers\
    \ to errors such as a bad table name and other things that can safely be blamed\
