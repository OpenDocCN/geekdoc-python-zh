    # 1.3 Various Types of File Modes


    Here is a list of the different modes of opening a file:


    | Modes | Description |

    | :--- | :--- |

    | **r** | Opens a file for reading only. The file pointer is placed at the beginning
    of the file. This is the default mode. |

    | **rb** | Opens a file for reading only in binary format. The file pointer is
    placed at the beginning of the file. This is the default mode. |

    | **r+** | Opens a file for both reading and writing. The file pointer placed
    at the beginning of the file. |

    | **rb+** | Opens a file for both reading and writing in binary format. The file
    pointer placed at the beginning of the file. |

    | **w** | Opens a file for writing only. Overwrites the file if the file exists.
    If the file does not exist, creates a new file for writing. |

    | **wb** | Opens a file for writing only in binary format. Overwrites the file
    if the file exists. If the file does not exist, creates a new file for writing.
    |

    | **w+** | Opens a file for both writing and reading. Overwrites the existing
    file if the file exists. If the file does not exist, creates a new file for reading
    and writing. |

    | **wb+** | Opens a file for both writing and reading in binary format. Overwrites
    the existing file if the file exists. If the file does not exist, creates a new
    file for reading and writing. |

    | **a** | Opens a file for appending. The file pointer is at the end of the file
    if the file exists. That is, the file is in the append mode. If the file does
    not exist, it creates a new file for writing. |

    | **ab** | Opens a file for appending in binary format. The file pointer is at
    the end of the file if the file exists. That is, the file is in the append mode.
    If the file does not exist, it creates a new file for writing. |'
