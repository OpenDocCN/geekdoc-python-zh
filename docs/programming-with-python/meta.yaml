  - "[PAGE 46]\n\nLogical error is due to wrong solution or wrong logic and syntactic\
    \ error occurs due to poor understanding of language that means syntax mistake.\
    \ We can detect these errors and then can debug them and accordingly can provide\
    \ error description for those errors and these are called as exceptions.\n\nExceptions\
    \ are run-time condition or error that a program may encounter while executing.\
    \ Errors like division by 0 or access to an array outside of its bounds or running\
    \ out of memory or running out of disk space.\n\nThere are two types of exception\
    \ handling:\n\n+   1. Synchronous\n2. Asynchronous\n\nA synchronous exceptions\
    \ out of range index and overflow error can occur. In Asynchronous the events\
    \ which are beyond the control like keyboard interrupts or bad sectors in the\
    \ disc or hardware failure are called as asynchronous exceptions.\n\nThe following\
    \ task can be performed for exception.\n\n+   1. Find the problem (hit the exception)\n\
    2. Inform that an error has occurred (throw the exception)\n3. Receive the error\
    \ information (catch the exception)\n4. Take corrective action (handle the exception)\n\
    \n# Syntax Errors\n\nSyntax errors, also known as parsing errors, are perhaps\
    \ the most common kind of complaint you get while you are still learning Python:\n\
    \n```\n>>> while True print 'Hello world'\n  File \"<stdin>\", line 1\n    while\
    \ True print 'Hello world'\n          ^\nSyntaxError: invalid syntax\n```\n\n\
    The parser repeats the offending line and displays a little ‘arrow’ pointing at\
    \ the earliest point in the line where the error was detected. The error is caused\
    \ by (or at least detected at) the token preceding the arrow: in the example,\
    \ the error is detected at the keyword **print**, since a colon (‘:’) is missing\
    \ before it. File name and line number are printed so you know where to look in\
    \ case the input came from a script.\n\n# 2.2 Introduction to Exception Handling\n\
    \nVarious error messages can occur when executing Python programs. Such errors\
    \ are called **exceptions**. Python handle these errors by reporting them on the\
    \ screen. Exceptions can be “caught” and “handled” by a program, however, to either\
    \ correct the error and continue execution, or terminate the program."
  - '[PAGE 47]


    ![](img/19353aba2f109d1f7c4c239afb8fa982_47_0.png)


    Python has many built-in exceptions which forces your program to output an error
    when something in it goes wrong.


    When these exceptions occur, it causes the current process to stop and passes
    it to the calling process until it is handled. If not handled, our program will
    crash.


    For example, if function **A** calls function **B** which in turn calls function
    **C** and an exception occurs in function **C**. If it is not handled in **C**,
    the exception passes to **B** and then to **A**.


    If never handled, an error message is spit out and our program come to a sudden,
    unexpected halt.


    # 2.3 What is Exception


    An exception is an event, which occurs during the execution of a program that
    disrupts the normal flow of the program’s instructions. when a Python script encounters
    a situation that it cannot cope up with, it raises an exception. An **exception**
    is a value (object) that is *raised* (“thrown”) signaling that an unexpected,
    or “exceptional,” situation has occurred.


    When a Python script raises an exception, it must either handle the exception
    immediately otherwise it terminates and quits.


    Python contains a predefined set of exceptions referred to as **standard exceptions**.
    Some of the standard exceptions are listed as below:


    ### Table 2.1: Some Standard Exceptions in Python


    | Exception | Description |

    |-----------|-------------|

    | ImportError | raised when an import (or from...import) statement fails |

    | IndexError | raised when a sequence index is out of range |

    | NameError | raised when a local or global name is not found |

    | TypeError | raised when an operation or function is applied to an object of
    inappropriate type |

    | ValueError | raised when a built-in operation or function is applied to an appropriate
    type, but of inappropriate value |

    | IOError | raised when an input/output operation fails (e.g., “file not found”)
    |


    The standard exceptions are defined within the exceptions module of the Python
    Standard Library, which is automatically imported into Python programs.'
  - "[PAGE 48]\n\n![](img/19353aba2f109d1f7c4c239afb8fa982_48_0.png)\n\n**Raising\
    \ an exception** is a way for a function to inform its client a problem has occurred\
    \ that *the function itself cannot handle*.\n\nFor example, suppose a **function**\
    \ called **getYN** prompts a user to enter ‘y’ or ‘n’. If the user enters something\
    \ other than these two values, the function can simply prompt the user to re-enter.\
    \ On the other hand, if a **function** called **isEven** is to be passed a numeric\
    \ value, but is passed a string instead, it cannot correct the problem. It can\
    \ only notify the problem to the user.\n\nAn **exception** is a value (object)\
    \ that is “raised” by a function signaling that an unexpected, or “exceptional,”\
    \ situation has occurred that the function itself cannot handle.\n\n# Handling\
    \ an Exception\n\nIf you have some suspicious code that may raise an exception,\
    \ you can defend your program by placing the suspicious code in a try: block.\
    \ After the try: block, include an except: statement, followed by a block of code\
    \ which handles the problem as elegantly as possible.\n\n*Syntax:*\n\n**Here is\
    \ simple syntax of try....except...else blocks:**\n\n```\ntry:\n    You do your\
    \ operations here;\n    ......................\n\nexcept Exception I:\n    If\
    \ there is ExceptionI, then execute this block.\n\nexcept Exception II:\n    If\
    \ there is ExceptionII, then execute this block.\n    ......................\n\
    \nelse:\n    If there is no exception then execute this block\n```"
  - '[PAGE 49]


    # 2.4 Types of Exceptions


    ![](img/19353aba2f109d1f7c4c239afb8fa982_49_0.png)


    # 2.4.1 Standard Inbuilt Exceptions


    **Built-in Exceptions**


    Exceptions should be class objects. The exceptions are defined in the module **exceptions**.
    This module never needs to be imported explicitly: the exceptions are provided
    in the built-in namespace as well as the **exceptions** module.


    For class exceptions, in a **try** statement with an **except** clause that mentions
    a particular class, that clause also handles any exception classes derived from
    that class (but not exception classes from which it is derived).


    The built-in exceptions can be generated by the interpreter or built-in functions.
    Except where mentioned, they have an “associated value” indicating the detailed
    cause of the error. This may be a string or a tuple containing several items of
    information (e.g., an error code and description which is a string explaining
    the code). The associated value is the second argument to the **raise** statement.
    If the exception class is derived from the standard root class **BaseException**
    the associated value is present as the exception instance’s args attribute.


    The built-in exception classes can be subclassed to define new exceptions; programmers
    are encouraged to derive new exceptions from the **Exception** class or one of
    its subclasses, and not from **BaseException**.


    List of Built in Standard Exceptions –


    | EXCEPTION NAME | DESCRIPTION |

    | :--- | :--- |

    | Exception | Base class for all exceptions |

    | StopIteration | Raised when the next() method of an iterator does not point
    to any object. |

    | SystemExit | Raised by the sys.exit() function. |

    | StandardError | Base class for all built-in exceptions except StopIteration
    and SystemExit. |

    | ArithmeticError | Base class for all errors that occur for numeric calculation.
    |

    | OverflowError | Raised when a calculation exceeds maximum limit for a numeric
    type. |

    | FloatingPointError | Raised when a floating point calculation fails. |

    | ZeroDivisonError | Raised when division or modulo by zero takes place for all
    numeric types. |

    | AssertionError | Raised in case of failure of the Assert statement. |

    | AttributeError | Raised in case of failure of attribute reference or assignment.
    |

    | EOFError | Raised when there is no input from either the raw_input() or input()
    function and the end of file is reached. |'
- md: "## Exception Handling\n\n| Exception | Description |\n| --- | --- |\n| ImportError\
    \ | Raised when an import statement fails. |\n| KeyboardInterrupt | Raised when\
    \ the user interrupts program execution, usually by pressing Ctrl+c. |\n| LookupError\
    \ | Base class for all lookup errors. |\n| IndexError | Raised when an index is\
    \ not found in a sequence. |\n| KeyError | Raised when the specified key is not\
    \ found in the dictionary. |\n| NameError | Raised when an identifier is not found\
    \ in the local or global namespace. |\n| UnboundLocalError | Raised when trying\
    \ to access a local variable in a function or method but no value has been assigned\
    \ to it. |\n| EnvironmentError | Base class for all exceptions that occur outside\
    \ the Python environment. |\n| IOError | Raised when an input/ output operation\
    \ fails, such as the print statement or the open() function when trying to open\
    \ a file that does not exist. |\n| OSError | Raised for operating system-related\
    \ errors. |\n| SyntaxError | Raised when there is an error in Python syntax. |\n\
    | IndentationError | Raised when indentation is not specified properly. |\n| SystemError\
    \ | Raised when the interpreter finds an internal problem, but when this error\
    \ is encountered the Python interpreter does not exit. |\n| SystemExit | Raised\
    \ when Python interpreter is quit by using the sys.exit() function. If not handled\
    \ in the code, causes the interpreter to exit. |\n| ValueError | Raised when the\
    \ built-in function for a data type has the valid type of arguments, but the arguments\
    \ have invalid values specified. |\n| RuntimeError | Raised when a generated error\
    \ does not fall into any category. |\n| NotImplementedError | Raised when an abstract\
    \ method that needs to be implemented in an inherited class is not actually implemented.\
    \ |\n| BufferError | Raised when a buffer related operation cannot be performed.\
    \ |\n| KeyError | Raised when a mapping (dictionary) key is not found in the set\
    \ of existing keys. |\n| MemoryError | Raised when an operation runs out of memory\
    \ but the situation may still be rescued (by deleting some objects). |\n| OverflowError\
    \ | Raised when the result of an arithmetic operation is too large to be represented.\
    \ |\n| ReferenceError | This exception is raised when a weak reference proxy,\
    \ created by the weakref.proxy() function, is used to access an attribute of the\
    \ referent after it has been garbage collected. |\n| IndentationError | Base class\
    \ for syntax errors related to incorrect indentation. |\n| TabError | Raised when\
    \ indentation contains an inconsistent use of tabs and spaces. |\n| TypeError\
    \ | Raised when an operation or function is applied to an object of inappropriate\
    \ type. The associated value is a string giving details about the type mismatch.\
    \ |\n| WindowsError | Raised when a Windows-specific error occurs. |\n| ZeroDivisionError\
    \ | Raised when the second argument of a division or modulo operation is zero.\
    \ |\n\n## Exception Hierarchy\n\nThe class hierarchy for built-in exceptions is:\n\
    \n```\nBaseException\n +-- SystemExit\n +-- KeyboardInterrupt\n +-- GeneratorExit\n\
    \ +-- Exception\n     +-- StopIteration\n     +-- StandardError\n     |    +--\
    \ BufferError\n     +-- ArithmeticError\n     |    +-- FloatingPointError\n  \
    \   |    +-- OverflowError\n     |    +-- ZeroDivisionError\n     +-- AssertionError\n\
    \     +-- AttributeError\n     +-- EnvironmentError\n     |    +-- IOError\n \
    \    |    +-- OSError\n     |         +-- WindowsError (Windows)\n     |     \
    \    +-- VMSError (VMS)\n     +-- EOFError\n     +-- ImportError\n     +-- LookupError\n\
    \     |    +-- IndexError\n     |    +-- KeyError\n     +-- MemoryError\n    \
    \ +-- NameError\n     |    +-- UnboundLocalError\n     +-- ReferenceError\n  \
    \   +-- RuntimeError\n     |    +-- NotImplementedError\n     +-- SyntaxError\n\
    \     |    +-- IndentationError\n     |         +-- TabError\n     +-- SystemError\n\
    \     +-- TypeError\n     +-- ValueError\n         +-- UnicodeError\n        \
    \     +-- UnicodeDecodeError\n             +-- UnicodeEncodeError\n          \
    \   +-- UnicodeTranslateError\n +-- Warning\n     +-- DeprecationWarning\n   \
    \  +-- PendingDeprecationWarning\n     +-- RuntimeWarning\n     +-- SyntaxWarning\n\
    \     +-- UserWarning\n     +-- FutureWarning\n     +-- ImportWarning\n     +--\
    \ UnicodeWarning\n     +-- BytesWarning\n```\n\n## 2.4.2 User Defined Exception\n\
    \nPython also allows us to create your own exceptions by deriving classes from\
    \ the standard built-in exceptions.\n\nIn the try block, the user-defined exception\
    \ is raised and caught in the except block. The variable e is used to create an\
    \ instance of the class *Networkerror*.\n\n```\nclass Networkerror(RuntimeError):\n\
    \    def __init__(self, arg):\n        self.args = arg\n```\n\nSo once you defined\
    \ above class, you can raise the exception as follows –\n\n```\ntry:\n    raise\
    \ Networkerror(“Bad hostname”)\nexcept Networkerror,e:\n    print (e.args)\n```\n\
    \n## 2.5 Propagation of Exception\n\nWhen an exception is raised and not handled\
    \ by the use side or client code side, it is automatically propagated back to\
    \ the *client’s* calling code until handled. If an exception is thrown all the\
    \ way back to the top level (main module) and not handled, then the program terminates\
    \ and displays the details of the exception.\n\nFor example, a program might not\
    \ be able to determine whether a password is valid at the source of the input.\
    \ Rather, the password must be verified in a password file that is accessed only\
    \ after a **chain of function calls** have been made. If the password is found\
    \ invalid, an exception is propagated from the function identifying the error\
    \ all the way back to the function responsible for user input, which can then\
    \ prompt the user to re-enter their password.\n\nAn exception is either handled\
    \ by the user side or client code side, or automatically propagated back to the\
    \ user or client's calling code, and so on, until handled. If an exception is\
    \ thrown all the way back to the main module (and not handled), the program terminates\
    \ displaying the details of the exception.\n\n## 2.6 Assertion in Python\n\nAn\
    \ assertion is a sanity-check that you can turn on or turn off when you are done\
    \ with your testing of the program. An assertion is to liken it to a **raise-if**\
    \ statement. An expression is tested, and if the result comes up false, an exception\
    \ is raised.\n\nAssertions are carried out by the **assert** statement. Programmers\
    \ often place assertions at the start of a function to check for valid input,\
    \ and after a function call to check for valid output.\n\n**The assert Statement**\n\
    \nWhen it encounters an assert statement, Python evaluates the accompanying expression,\
    \ which may be true. If the expression is false, Python raises an *AssertionError*\
    \ exception.\n\n**The Syntax for Assert is –**\n\n```\nassert Expression[, Arguments]\n\
    ```\n\nIf the assertion fails, Python uses ArgumentExpression as the argument\
    \ for the AssertionError. AssertionError exceptions can be caught and handled\
    \ like any other exception using the try-except statement, but if not handled,\
    \ they will terminate the program and produce a traceback.\n\n**Example**\n\n\
    Here is a function that converts a temperature from degrees Kelvin to degrees\
    \ Fahrenheit. Since zero degrees Kelvin is as cold as it gets, the function bails\
    \ out if it sees a negative temperature –\n\nFirst Observe the output of this\
    \ program\n\n```\ndef KelvinToFahrenheit(Temperature):\n    assert (Temperature\
    \ >= 0),\"Colder than absolute zero!\"\n    return ((Temperature-273)*1.8)+32\n\
    print (KelvinToFahrenheit(273))\nprint (int(KelvinToFahrenheit(505.78)))\n```\n\
    \n**Output**\n\n```\nPython 3.4.3 Shell\nPython 3.4.3 (v3.4.3:9b73f1c3e601, Feb\
    \ 24 2015, 22:43:tel]) on win32\nType \"copyright\", \"credits\" or \"license()\"\
    \ for more information.\n>>> ======================== RESTART ========================\n\
    >>> \n32.0\n451\n>>> \n```\n\nNow I am Passing temperature Less than zero that\
    \ means negative temperature, Observe the AssertionError on negative temperature.\n\
    \n```\ndef KelvinToFahrenheit(Temperature):\n    assert (Temperature >= 0),\"\
    Colder than absolute zero!\"\n    return ((Temperature-273)*1.8)+32\nprint (KelvinToFahrenheit(273))\n\
    print (int(KelvinToFahrenheit(505.78)))\nprint (KelvinToFahrenheit(-5))\n```\n\
    \n**Output**\n\n```\nPython 3.4.3 Shell\nPython 3.4.3 (v3.4.3:9b73f1c3e601, Feb\
