    \n最后，`s[4:7] == sub` 完全匹配：\n\n正则表达式分为多种类型，如下所示：\n\n1.  *简单模式*\n    正则表达式用于操作字符串，因此我们将看到字符匹配。\n\
    \n2.  *字符匹配*\n    字母和字符将直接匹配自身。例如，正则表达式 `python` 将精确匹配字符串 `python`。\n\n    元字符列表\n\
    \    `.` `^` `$` `*` `+` `?` `{` `}` `[` `]` `(` `)` `|` `\\`\n\n    `[` 和 `]`\
    \ 用于指定一个**字符类**，即你希望匹配的一组字符。字符可以逐个列出，也可以通过给出两个字符并用 `-` 分隔来表示一个范围。\n    **`[abc]`**\
    \ 或 **`[a-c]`** 将匹配字符 **`a`**、**`b`** 或 **`c`** 中的任何一个；\n    `[a-z]` 仅匹配**从 a\
    \ 到 z** 的小写字母。\n\n    最重要的元字符是**反斜杠** `\\`。与 Python 字符串字面量一样，反斜杠后可以跟各种字符来表示各种特殊序列。它也用于转义所有元字符，这样你仍然可以在模式中匹配它们；例如，如果你需要匹配\
    \ `[` 或 `\\`，可以在它们前面加上反斜杠以消除其特殊含义：`\\[` 或 `\\\\`。\n\n### 3. 重复事项\n\n我们将看到的第一个用于**重复事项的元字符**是\
    \ `*`。`*` 不匹配字面字符 `*`；相反，它指定前面的字符可以匹配零次或多次，而不是恰好一次。\n\n例如，`ca*t` 将匹配 `ct`（0 个\
    \ a 字符）、`cat`（1 个 a）、`caaat`（3 个 a 字符），以及后面的 t 字符。\n\n**另一个重复元字符是 `+`**，它匹配一次或多次。`*`\
    \ 和 `+` 的区别在于；`*` 匹配零次或多次，因此被重复的内容可能根本不存在，而 `+` 则要求至少出现一次。使用一个类似的例子，`ca+t` 将匹配\
    \ `cat`（1 个 a）、`caaat`（3 个 a），但不会匹配 `ct`。\n\n还有两个重复限定符。**问号字符 `?` 匹配一次或零次。**\n\
    \n## 正则表达式模式\n\n除了控制字符 `(+ ? . * ^ $ ( ) [ ] { } | \\)` 外，所有字符都匹配自身。你可以在控制字符前面加上反斜杠来转义它。\n\
    \n下表列出了 Python 中可用的正则表达式语法：\n\n## 正则表达式模式\n\n| 模式 | 描述 |\n| :--- | :--- |\n| `^`\
    \ | 匹配行首。 |\n| `$` | 匹配行尾。 |\n| `.` | 匹配除换行符外的任意单个字符。使用 `m` 选项时，它也可以匹配换行符。 |\n\
    | `[...]` | 匹配方括号内的任意单个字符。 |\n| `[^...]` | 匹配方括号外的任意单个字符。 |\n| `re*` | 匹配前面的表达式零次或多次。\
    \ |\n| `re+` | 匹配前面的表达式一次或多次。 |\n| `re?` | 匹配前面的表达式零次或一次。 |\n| `re{n}` | 精确匹配前面的表达式\
    \ `n` 次。 |\n| `re{n,}` | 匹配前面的表达式 `n` 次或更多次。 |\n| `re{n, m}` | 匹配前面的表达式至少 `n`\
    \ 次，至多 `m` 次。 |\n| `a\\|b` | 匹配 `a` 或 `b`。 |\n| `(re)` | 对正则表达式进行分组并记住匹配的文本。 |\n\
    | `(?imx)` | 在正则表达式内临时启用 `i`、`m` 或 `x` 选项。如果在括号内，则仅影响该区域。 |\n| `(?-imx)` | 在正则表达式内临时关闭\
    \ `i`、`m` 或 `x` 选项。如果在括号内，则仅影响该区域。 |\n| `(?:re)` | 对正则表达式进行分组但不记住匹配的文本。 |\n| `(?imx:re)`\
    \ | 在括号内临时启用 `i`、`m` 或 `x` 选项。 |\n| `(?-imx:re)` | 在括号内临时关闭 `i`、`m` 或 `x` 选项。\
    \ |\n| `(?#...)` | 注释。 |\n| `(?=re)` | 使用模式指定位置。没有范围。 |\n| `(?!re)` | 使用模式否定指定位置。没有范围。\
