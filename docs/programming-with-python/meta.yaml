    \n因此，我想将此书献给我的母亲和父亲**卡维塔·S·巴贾吉**和**萨希杰拉姆·巴贾吉**。我要感谢我的儿子**奇拉格·古尔巴尼**，他是我的解压剂，也是激励我每次取得更好表现的动力。\n\
    \n我衷心地、终生感谢喜马拉雅出版社的**S.K. 斯里瓦斯塔瓦先生**，感谢他为我提供了最好的写作建议和激励。他令人印象深刻的职业生涯进步激励我攀登人生中越来越多的成功阶梯。\n\
    \n**基兰·古尔巴尼**\n\n我想将此书献给我的父亲**已故的拉克什曼·B·瓦斯塔瓦先生**和我的母亲**卡斯图里·L·瓦斯塔瓦夫人**。\n\n**维杰·瓦斯塔瓦**\n\
    \n## 前言\n\nPython 是一种广泛使用的高级编程语言，用于通用编程，由吉多·范罗苏姆创建并于 1991 年首次发布。Python 的设计哲学强调代码可读性（特别是使用空格缩进来分隔代码块，而不是花括号或关键字），其语法允许程序员用比\
    \ C++ 或 Java 等语言更少的行数来表达概念。\n\nPython 是一种解释型、面向对象、具有动态语义的高级编程语言。其高级的内置数据结构，结合动态类型和动态绑定，使其非常适合快速应用开发，也可用作脚本语言或胶水语言来连接现有组件。\n\
    \nPython 支持模块和包，这鼓励了程序的模块化和代码重用。Python 解释器和广泛的标准库在所有主要平台上均以源代码或二进制形式免费提供，并且可以自由分发。\n\
    \nPython 2.0 于 2000 年 10 月 16 日发布，具有许多重要的新功能。Python 3.0（在其早期开发中通常被称为 Python 3000\
    \ 或 py3k）。\n\n我从程序员的角度推荐这本书。本书教授高级 Python，从文件处理、异常处理与正则表达式、GUI 编程以及数据库连接（MySQL\
    \ 和 Sqlite3）和网络编程开始。\n\n本书为您提供了全面的 Python 学习工具。它涵盖了您需要了解的关于 Python 编程的几乎所有内容：类型与操作、语句与语法、函数与迭代器、生成器、模块与包、数据库等等。\n\
    \n在此书中，每个主题的概念之后都附有理论解释，并提供了 Python 编程的所有实践问题以及程序执行的各个步骤。我们已努力使文本易于阅读和理解。\n\n\
    用户的建设性建议和意见将得到真诚的赞赏。如果您发现任何文本错误或遗漏，我们将非常乐意听取您的意见。如果您想提出改进建议或以任何方式做出贡献，我们也非常乐意听取。请将信件发送至\
    \ kiranrktcollege@gmail.com 和 vvastava@gmail.com。\n\n最后但同样重要的是，我们要衷心感谢喜马拉雅出版社的\
    \ S.K. 斯里瓦斯塔瓦先生，感谢他提供了一个激发新思想和创新的环境，以及他为撰写本书提供的支持、激励、指导、合作和鼓励。我们对他的支持深表感激，并感谢他真诚的祝福。\n\
    \n**基兰·古尔巴尼**\nkiranrktcollege@gmail.com\n9637128628/7769979964\n\n**维杰·瓦斯塔瓦**\n\
    vvastava@gmail.com\n9594950917\n\n## 目录\n\n### 单元 I\n\n- 1. PYTHON 文件输入-输出 1 –\
    \ 39\n- 2. 异常处理 40 – 62\n- 3. 正则表达式 63 – 80\n\n### 单元 II\n\n- 4. PYTHON 中的 GUI\
    \ 编程 81 – 114\n\n### 单元 III\n\n- 5. PYTHON 中的数据库连接 115 – 162\n- 6. 网络连接 163 –\
    \ 202\n- 最终的 PYTHON 实践 203 – 244\n- PYTHON 编程 MCQ 245 – 250\n\n## 单元 I\n\n###\
    \ 第 1 章\n\n# Python 文件输入-输出\n\n**结构**\n\n- 1.1 文件处理简介\n    - 1.1.1 文本文件\n    -\
    \ 1.1.2 二进制文件\n    - 1.1.3 文本文件与二进制文件的区别\n    - 1.1.4 文件操作\n- 1.2 打开和关闭文件\n  \
    \  - 1.2.1 使用 Open() 打开文件\n        - 1.2.1.1 以读取模式打开\n        - 1.2.1.2 以写入模式打开\n\
    - 1.3 使用 Close() 关闭文件\n    - 1.3.1 各种文件模式\n    - 1.3.2 文件对象的属性\n- 1.4 读取和写入文件\n\
    \    - 1.4.1 通过 Read()、Readline() 和 readlines() 读取文件\n    - 1.4.2 从键盘读取输入\n  \
    \  - 1.4.3 通过 Write() 写入文件\n- 1.5 向文件追加文本\n- 1.6 重命名文件\n- 1.7 删除文件\n- 1.8 Python\
    \ 不同的文件输入输出函数\n- 1.9 文件位置\n- 1.10 操作目录\n    - 1.10.1 Python 中的目录\n    - 1.10.2\
    \ mkdir() 方法\n    - 1.10.3 chdir() 方法\n    - 1.10.4 getcwd() 方法\n    - 1.10.5\
    \ rmdir() 方法\n- 1.11 Python 迭代器与可迭代对象\n    - 1.11.1 Python 迭代器\n    - 1.11.2 Python\
    \ 可迭代对象\n    - 1.11.3 在 Python 中创建你自己的迭代器\n    - 1.11.4 Python 无限迭代器\n    - 1.11.5\
    \ 生成器\n- 1.12 迭代及其问题解决应用\n- 1.13 问题\n\n## 1.1 文件处理简介\n\n在 Python 编程中，文件是磁盘上存储相关信息的命名位置。它用于在非易失性存储器（例如硬盘）中永久存储数据。\n\
    \n由于随机存取存储器（RAM）是易失性的，在计算机关闭时会丢失数据，因此我们使用文件以便将来使用数据。\n\n文件可以是文本文件、音乐文件、二进制文件或视频文件。所有这些文件分为两种类型：\n\
    \n1. 文本文件\n2. 二进制文件\n\n当我们想从文件读取或向文件写入时，需要先打开它。完成后，需要将其关闭，以便释放与该文件绑定的资源。\n\n###\
    \ 为什么需要文件？\n\n- 当程序终止时，整个数据会丢失。存储在文件中将保存你的数据，即使程序终止。\n- 如果你需要输入大量数据，将所有数据都输入会花费很多时间。但是，如果你有一个包含所有数据的文件，你可以使用\
    \ C 语言中的几个命令轻松访问文件内容。\n- 你可以轻松地将数据从一台计算机移动到另一台，而无需任何更改。\n\nPython 语言中的文件处理概念用于将数据永久存储在计算机内存中。使用这个概念，我们可以将数据存储在辅助存储器（硬盘）中。文件代表磁盘上存储一组相关数据的字节序列。文件是为数据的永久存储而创建的。它使用文件对象来处理文件。\n\
    \n### 1.1.1 文本文件\n\n文本文件通常被构造为行的序列，而行是字符的序列。该行由 EOL（行尾）字符终止。"
