    # ## Types of Mesh Topology


    +   1. Partial Mesh Topology : In this topology some of the systems are connected
    in the same fashion as mesh topology but some devices are only connected to two
    or three devices.

    2. Full Mesh Topology : Each and every nodes or devices are connected to each
    other.


    # ## Features of Mesh Topology


    +   1. Fully connected.

    2. Robust.

    3. Not flexible.


    # ## 5. TREE Topology


    It has a root node and all other nodes are connected to it forming a hierarchy.
    It is also called hierarchical topology. It should at least have three levels
    to the hierarchy.


    ![](img/19353aba2f109d1f7c4c239afb8fa982_176_1.png)


    # ## Features of Tree Topology


    +   1. Ideal if workstations are located in groups.

    2. Used in Wide Area Network.'
