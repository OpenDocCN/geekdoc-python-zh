    \ Flags\n3.9 Questions\n\n# ## 3.1 Introduction to Regular Expression\n\n+   Regular\
    \ expressions (called REs, or regexes, or regex patterns) are essentially a tiny,\
    \ highly specialized programming language embedded inside Python and made available\
    \ through the re module.\nRegular expression has a parser inbuilt available which\
    \ matches strings, replaces strings as well as search strings.\nIt uses different\
