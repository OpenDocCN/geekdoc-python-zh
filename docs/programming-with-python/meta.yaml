  mdcn: "## 2.8 文件操作中的异常处理\n\n很多时候，当我们打开文件进行读写时，如果找不到该文件，可能会引发异常。这里会引发标准的 `IOError`\
    \ 异常，程序会以一条“`No such file or directory`”错误信息终止。我们可以捕获并处理这个异常，如下所示。\n\n打开文件错误的异常处理示例：\n\
    \n```python\nfname=input(\"Enter Filename: \")\nemptystr=\" \"\ninp_file_opened=False\n\
    while not inp_file_opened:\n    try:\n        inp_file = open(fname,'r')\n   \
    \     inp_file_opened=True\n        rline = inp_file.readline()\n        while\
    \ rline != emptystr:\n            rline=inp_file.readline()\n    except IOError:\n\
    \        print(\"File open Error\\n\")\n        fname=input(\"Enter Filename:\
    \ \")\n```\n\n![](img/19353aba2f109d1f7c4c239afb8fa982_66_1.png)\n\n1.  变量 `fname`\
    \ 存储用户输入的文件名。\n2.  变量 `inp_file_opened` 是一个标志变量，初始化为 `False`。\n3.  只要 `inp_file_opened`\
    \ 为 `False`，`while` 循环就会持续迭代。由于循环内有 `try` 块，每次 `open(file_name, ‘r')` 引发异常时，`try`\
    \ 块中剩余的行会被跳过，而 `except` 标头后的异常处理程序会被执行。\n4.  只有当 `open` 调用没有抛出异常时，`try` 块中的所有指令才会被执行，程序会在\
    \ `while` 循环之后继续执行。\n5.  从文本文件读取时，`readline` 方法不会引发任何异常。\n6.  当到达文件末尾时，`readline`\
    \ 返回一个空字符串，而不是抛出异常。\n7.  由文件打开错误引发的 `IOError` 异常可以被捕获并处理。\n\n## 2.9 异常处理的优势\n\n\
    1.  借助异常，我们可以检测逻辑错误和语法错误。\n2.  借助运行时异常，我们可以捕获错误并将错误信息抛出给用户。\n3.  异常处理提供了一种类型安全的集成方法。\n\
    4.  同步异常可以由用户创建，因此用户可以控制程序。\n5.  异常处理机制的主要优势在于检测异常并报告异常情况，以便用户可以采取适当措施。\n6.  一个程序段可以有多个条件，所有这些多个条件可以通过多个\
    \ `catch` 或 `except` 块来处理，这意味着一个 `try` 块可以有多个 `catch` 或 `except` 块。\n7.  Python\
    \ 异常中提供了断言。\n\n## 2.10 问题\n\n1.  定义什么是错误和缺陷，以及有哪些类型的错误。\n2.  解释“异常”的含义。\n3.  解释什么是异常以及如何处理它。\n\
    4.  解释不同类型的异常，并列出一些标准异常。\n5.  解释内置异常和用户自定义异常之间的区别。\n6.  用清晰的图表解释异常的传播。\n7.  解释\
    \ Python 中的断言。\n8.  解释可以使用 `try` 和 `except` 块处理捕获到的异常的不同方式。\n9.  用合适的例子解释异常参数。\n\
    10. 用例子解释异常的引发。\n11. 解释如何在文件处理中使用异常处理。\n12. 解释异常处理的优势。\n\n# 第三章\n\n## 正则表达式\n\n\
    ### 结构\n\n- 3.1 正则表达式简介\n- 3.2 正则表达式模式\n    - 3.2.1 编译标志\n- 3.3 正则表达式 [re] 模块\n\
    - 3.4 各种类型的正则表达式\n- 3.5 正则表达式的不同方法\n    - 3.5.1 Match() 方法\n    - 3.5.2 Search()\
    \ 方法\n    - 3.5.3 Replace() 方法\n- 3.6 匹配 vs. 搜索\n- 3.7 搜索与替换\n- 3.8 正则表达式修饰符 –\
    \ 选项标志\n- 3.9 问题\n\n### 3.1 正则表达式简介\n\n正则表达式（称为 REs、regexes 或 regex 模式）本质上是一种小型、高度专业化的编程语言，内嵌在\
    \ Python 中，并通过 `re` 模块提供。\n正则表达式内置了解析器，可以匹配、替换和搜索字符串。\n它使用不同的正则表达式符号和通配符，如 `*`\
    \ 和 `?`，以及 `.`、`#`、`^`、`$`、`[ ]` 等许多其他符号。\n正则表达式是一种特殊的字符序列，可帮助你匹配或查找其他字符串或字符串集。\n\
    - “正则表达式”一词有时也称为 regex 或 regexp，起源于理论计算机科学。\n- `re` 模块在 Python 中提供了对类似 Perl 正则表达式的完全支持。如果在编译或使用正则表达式时发生错误，`re`\
    \ 模块会引发 `re.error` 异常。\n- 正则表达式模式被编译为一系列字节码，然后由用 C 编写的匹配引擎执行。\n- 反斜杠是正则表达式中使用的特殊字符，但也用作字符串中的转义字符。这意味着\
    \ Python 会首先求值字符串中的每个反斜杠，然后在没有必要反斜杠的情况下将其用作正则表达式。防止这种情况的一种方法是将每个反斜杠写为 “`\\\\`”，以此方式将其保留用于正则表达式的求值。克服这个问题的最佳方法是将正则表达式标记为原始字符串。\n\
    - 你也可以使用正则表达式以各种方式修改或拆分字符串。\n- 如果想在 Python 中使用正则表达式，必须导入 `re` 模块，该模块提供了处理正则表达式的方法和函数。\n\
    \n### 演示正则表达式的简单示例\n\n我们通过以下图示逐步展示这种匹配是如何进行的：\n\n我们检查字符串 sub = \"abc\"\n\n![](img/19353aba2f109d1f7c4c239afb8fa982_69_0.png)\n\
    \n是否包含在字符串 s = \"xaababcbcd\" 中\n\n![](img/19353aba2f109d1f7c4c239afb8fa982_69_1.png)\n\
    \n顺便说一句，字符串 sub = \"abc\" 可以看作一个正则表达式，只是一个非常简单的正则表达式。\n\n首先，我们检查两个字符串的第一个位置是否匹配，即\
    \ `s[0] == sub[0]`。\n\n在我们的例子中，这并不满足。我们用红色标记这个事实：\n\n![](img/19353aba2f109d1f7c4c239afb8fa982_69_2.png)\n\
    \n然后我们检查 `s[1:4] == sub`。这意味着我们首先需要检查 `sub[0]` 是否等于 `s[1]`。这是真的，我们用绿色标记它。然后我们需要比较下一个位置。`s[2]`\
    \ 不等于 `sub[1]`，因此我们无需进一步比较 `sub` 和 `s` 的下一个位置：\n\n![](img/19353aba2f109d1f7c4c239afb8fa982_69_3.png)"
