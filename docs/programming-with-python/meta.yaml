  mdcn: "## Python 文件输入输出\n\n文本文件是包含字符的文件，其结构为独立的文本行。除了可打印字符外，文本文件还包含非打印的换行符 `\\n`，用于表示每个文本行的结束。换行符会使屏幕光标移动到下一行的开头。因此，文本文件可以直接使用文本编辑器查看和创建。\n\
    \n## 1.1.2 二进制文件\n\n二进制文件可以包含各种类型的数据，例如数值，因此其结构不是文本行。这类文件只能通过计算机程序进行读写。\n\n任何直接查看二进制文件的尝试都会导致屏幕上出现“乱码”字符。二进制文件是一种只有计算机程序才能读取的格式化文件。\n\
    \n## 1.1.3 区分文本文件和二进制文件\n\n| 文本文件 | 二进制文件 |\n| --- | --- |\n| 文本文件通常被构造为一系列行，而行是一系列字符。行由行结束符（EOL）终止。\
    \ | 二进制文件可以包含各种类型的数据，例如数值，因此其结构不是文本行。 |\n| 文本文件包含数字、字母和符号的 ASCII 码。 | 二进制文件包含字节集合（0\
    \ 和 1）。二进制文件是文本文件的编译版本。 |\n| 文本文件是包含字符的文件，其结构为独立的文本行。 | 二进制文件是一种只有计算机程序才能读取的格式化文件。\
    \ |\n| 文本文件的文件访问模式为<br>r → 以只读方式打开文件<br>r+ → 以读写方式打开文件<br>w → 以只写方式打开文件<br>w+\
    \ → 以读写方式打开文件<br>a → 以追加方式打开文件<br>a+ → 以追加和读取方式打开文件 | 二进制文件的文件访问模式为<br>rb → 以只读方式打开文件<br>rb+\
    \ → 以读写方式打开文件<br>wb → 以只写方式打开文件<br>wb+ → 以读写方式打开文件<br>ab → 以追加方式打开文件<br>ab+ →\
    \ 以追加和读取方式打开文件 |\n\n## 1.1.4 文件操作\n\n可以执行不同的文件操作，如下所示：\n\n1.  创建新文件<br>使用 \"w\"\
    \ 属性的 `open( )`\n2.  打开现有文件<br>使用 \"w\" 或 \"r\" 或 \"a\" 属性的 `open( )`\n3.  从文件读取数据<br>`read(\
    \ )` 或 `readline( )` 和 `readlines( )`\n4.  将数据写入文件<br>`write( )`\n5.  将数据追加到文件<br>使用\
    \ \"a\" 属性的 `open( )`\n6.  关闭文件<br>`close( )`\n\n所有文件在使用前都必须先打开。在 Python 中，当文件被打开时，会创建一个文件对象，该对象提供了访问文件的方法。\n\
    \n## 1.2 打开和关闭文本文件\n\n到目前为止，我们一直在读写标准输入和输出，但接下来我们将了解如何处理实际的数据文件。\nPython 默认提供了操作文件所需的基本函数和方法。你可以使用\
    \ **file** 对象完成大部分文件操作。\n分别使用 **open( )** 和 **close( )** 方法来打开和关闭文件。\n\n### 1.2.1\
    \ 使用 Open( ) 打开文件\n\n**open 函数**\n在读写文件之前，你必须使用 Python 内置的 *open()* 函数打开它。此函数创建一个\
    \ **file** 对象，该对象将用于调用与其关联的其他支持方法。\n\n**语法**\n`file object = open(file_name [,\
    \ access_mode][, buffering])`\n\n**以下是参数的详细说明**\n\n- **file_name**：file_name 参数是一个字符串值，包含你要访问的文件的名称。\n\
    - **access_mode**：access_mode 决定文件的打开模式，即读取、写入、追加等。可能的值的完整列表在 1.3 节的表格中给出。这是一个可选参数，默认的文件访问模式是读取（r）。\n\
    - **buffering**：如果 buffering 值设置为 0，则不会进行缓冲。如果 buffering 值为 1，则在访问文件时将执行行缓冲。如果你将\
    \ buffering 值指定为大于 1 的整数，则将使用指定的缓冲区大小执行缓冲操作。如果为负数，则缓冲区大小为系统默认值（默认行为）。\n\n**示例**\n\
    \n```\n# 以写模式打开文件\n>>> fobj=open( “kiran.txt”,”w”)\n其中 fobj 是一个文件对象，open 是一个 Python\
    \ 函数，指定了文件名和打开文件的模式。Open 函数返回文件对象。\n\n# 使用 with 关键字以写模式打开文件的另一种方式\n>>> with open(\
    \ “kiran.txt”,”w”) as fobj:\n其中 fobj 是一个文件对象，open 是一个 Python 函数，指定了文件名和打开文件的模式。Open\
