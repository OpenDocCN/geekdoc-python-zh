    **Prof. Kiran Gurbani**


    Kiran Gurbani is currently Head of Computer Science Department of R.K. Talreja
    College of Arts, Science & Commerce. She started journey of teaching from the
    year 1994 from Jondhale Engineering College, CDAC Center of Pune and Mumbai and
    later joined R.K.T. College. Subsequently, working for Post Graduate MSC Computer
    Science and Information Technology Professor in number of premium colleges. Overall
    18+ years of experience as a Trainer/Academic In-charge/SME on varied technology
    platform.


    She is a professor from last 18 years. for various technologies - Object Oriented
    C++, Java, Visual Basic, DoT Net (VB.NET & ASP.NET), Unix Shell Scripting, Linux
    Administration, Oracle, SQL, Cloud Computing, Virtualization and Cloud Management,
    Web Technologies, Software Engineering, Software Testing, JBOSS and Web Logic,
    Parallel and Distributed Computing, ADBMS, C#.CCNA and Internet Technologies.


    She is freelancer corporate trainer for the companies Capgemini, Oracle, c-Edge,
    Seed, CDAC for Unix Shell Scripting with Ant Technology, Linux Administration,
    Unix Shell Scripting, Cloud and Software Engineering (SSAD,OOAD), RDBMS, Networking
    CCNA and Middleware.


    She is a Guest Faculty for ICWA, MMS Systems and Technologies and MSC Computer
    Science and Information Technology. She has conducted several workshops and seminars
    for students and faculties of all over Mumbai.


    **She is Freelancer trainer in various premium colleges** of Mumbai and Thane
    for **troubleshooting of Linux** for under graduate and post graduate students
    and performed **mini projects** on **Domain creation and uploading website** of
    a company through **Apache web server**. Mini project on Samba server for sharing
