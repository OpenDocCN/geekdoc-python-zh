    \n这将产生以下结果 –\n\n![](img/19353aba2f109d1f7c4c239afb8fa982_57_0.png)\n\n### 2.7.2\
    \ 异常处理与自定义函数处理用户输入\n\n异常可以由内置函数以及程序员定义的函数引发。\n考虑以下示例：\n\n1.  我们通过 `input` 函数提示用户输入一个\
    \ 1-12 之间的数字作为当前月份。\n2.  `input` 函数将返回输入的内容作为字符串。我们可以对这个值进行整数类型转换，将其转换为整数类型：\n\
