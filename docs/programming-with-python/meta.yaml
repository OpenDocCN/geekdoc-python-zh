    \n- 数据库指一组相关的数据，并且是经过组织的。对这些数据的访问通常由“数据库管理系统”提供，该系统由一套集成的计算机软件组成，允许用户与一个或多个数据库交互，并提供对数据库中所有包含数据的访问。\n\
