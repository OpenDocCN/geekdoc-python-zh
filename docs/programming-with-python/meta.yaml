    \ With the help of topologies we can communicate with other computer and their\
    \ resources like printer, DVD writer etc. using Hub, Repeater Switches and Router.\n\
    \nPython provides two levels of access to network services. At a low level, you\
    \ can access the basic socket support in the underlying operating system, which\
    \ allows you to implement clients and servers for both connection-oriented and\
    \ connectionless protocols.\n\nPython also has libraries that provide higher-level\
    \ access to specific application-level network protocols, such as FTP, HTTP, and\
    \ so on.\n\nNetwork programming is a major use of Python."
