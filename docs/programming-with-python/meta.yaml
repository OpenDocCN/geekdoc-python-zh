    No match!!\n('search --> searchObj.group() : ', 'dogs')\n>>> \n```\n\n## 3.7 Introduction\
    \ to Regular Expression Search and Replace\n\n### Search and Replace\n\nSome of\
    \ the most important re methods that use regular expressions is sub.\n\n### Syntax\n\
    \n```\nre.sub(pattern, repl, string, max=0)\n```\n\nThis method replaces all occurrences\
    \ of the RE pattern in string with repl, substituting all occurrences unless max\
    \ provided. This method would return modified string.\n\n### Example of Search\
    \ & Replace\n\n### Code\n\n```\n#!/usr/bin/python\nimport re\nphone = \"2004-959-559\
    \ # This is Phone Number\"\n# Delete Python-style comments\nnum = re.sub(r'#.*$',\
