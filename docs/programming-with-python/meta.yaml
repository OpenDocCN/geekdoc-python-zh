  md: '# with client process


    +   ▶ Client connection creates new socket

    - Returned with address by accept()


    +   ▶ Server handles one client at a time

    - Connection-oriented servers are a little more complex because the connection
    allows clients and servers to interact across multiple send() and recv() calls.

    - The server blocks in accept() until a server connects. The return value from
    accept() is a tuple consisting of a socket and the client address (which is the
    usual (address, port) tuple).

    - The server can, if it chooses, use multitasking techniques such as creating
    a new thread or forking a new process to allow it to handle several concurrent
    connections. Either solution allows the connection to be processed while the main
    control loop returns to execute another accept() and deal with the next client
    connection.

    - Since each connection generates a new server-side socket there is no conflict
    between the different conversations, and the server can continue to use the listen()ing
    socket to listen for incoming connections while it serves already-connected clients.


    ```


    Connection-Oriented Client

    s = socket(AF_INET, SOCK_STREAM)

    s.connect((HOST, PORT))

    s.send(''Hello, world'')

    data = s.recv(1024)

    s.close()

    print ''Received'', data


    ```


    +   ▶ This is a simple example

    - Sends message, receives response

    - Server receives 0 bytes after close()


    This very simple client just sends a single message and receives a single response.


    More typical code will send a request and use its understanding of the application
    protocol to determine when the response to that request has been completed.


    Protocols like HTTP 1.0 use a separate connection for each request. Protocols
    like telnet can exchange thousands of messages before the connection is closed,
    and the code tends to be more complex in that case.


    Under normal circumstances a recv() call guarantees that at least one byte of
    data will be returned. When a program seems the empty string (zero bytes) returned
    from the recv() it knows that the other end has terminated the connection by calling
    close() on its socket.'
