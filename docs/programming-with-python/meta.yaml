    \ `width=5` 导致的。\n\n## 4.5.8 画布中的坐标系\n\nCanvas 控件使用两种坐标系：窗口坐标系（左上角为(0, 0)）和画布坐标系，后者用于指定绘制项目的位置。通过滚动画布，你可以指定窗口中显示画布坐标系的哪一部分。\n\
