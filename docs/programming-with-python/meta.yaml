    \ with commit & Rollback in python.\n12. Explain Exception in database connectivity\
    \ in python.\n13. Explain connectivity with sqlite3 in python.\n\n## Unit III\n\
    \n## Chapter 6\n\n## Network Connectivity\n\n### Structure\n\n- 6.1 What is Network\n\
    - 6.2 Networks Types\n- 6.3 Network topology\n- 6.4 What is Domain and different\
    \ types of domain\n- 6.5 Connection oriented and connection Less\n    - 6.5.1\
    \ Connection Less Services\n    - 6.5.2 Connection Oriented Services\n- 6.6 Introduction\
    \ to protocol and different types of protocols.\n- 6.7 Introduction to Networking\
    \ Connectivity\n- 6.8 What is Socket\n- 6.9 Socket module\n- 6.10 Client Server\
    \ Architecture\n- 6.11 creating server-client programs\n- 6.12 Sending Mail through\
    \ SMTP\n    - 6.12.1 Introduction to SMTP\n    - 6.12.2 Sending email\n- 6.13\
    \ What is URL?\n- 6.14 Reading from URL\n- 6.15 Questions\n\n## 6.1 What is Network\n\
    \nThe fundamental purpose of a communication system is the exchange of data between\
    \ two parties or exchange of data between two communication networks.\n\nA computer\
    \ network is the infrastructure that allows two or more computers (called hosts)\
    \ to communicate with each other. The network achieves this by providing a set\
    \ of rules for communication, called protocols, which should be observed by all\
    \ participating hosts. The need for a protocol should be obvious: it allows different\
    \ computers from different vendors and with different operating characteristics\
    \ to 'speak the same language'.\n\nFor Networking we should know different network\
    \ components. Then we should know about different network topologies. We should\
    \ be aware of different types of networks: Point to point, multipoint, LANs, WANs,\
    \ and internetworks (internets).\n\nA communication can be between a workstation\
    \ (i.e., node or client) and a server over a public telephone network. Another\
    \ example is the exchange of voice channels, i.e.: voice signals between two telephones\
    \ over the same network.\n\n### Key Components of Network Communication\n\n1.\
    \  Server (Source)\n2.  Transmitter\n3.  Transmission System\n4.  Receiver\n5.\
    \  Destination\n\n1.  **Server (Source):** Server is the device that generates\
    \ the data to be transmitted, i.e.: inputs the data elements, which are needed\
    \ for transmission.\n    E.g.: Telephones and Personal Computers.\n2.  **Transmitter:**\
    \ The data generated by a source system are not transmitted directly in the form\
    \ in which they are generated, instead the source information is encoded first\
    \ and output is signal, which is to be transmitted through the transmission system.\
    \ And, a **Transmitter** is a device, which transforms the signal or data and\
    \ encodes the information in such a way so as to produce electromagnetic signals\
    \ that can be transmitted across some sort of transmission system.\n    E.g.:\
    \ A modem takes a digital bit stream (combination of bits) from an attached device\
    \ such as a personal computer (since output of computer is a digital signal through\
    \ modem) and transforms that bit stream into analog signal (analog signal is the\
    \ one which is varying signal in sine wave) which can be handled by the telephone\
    \ network.\n    So, combinely Source and Transmitter is known as Source System.\n\
    3.  **Transmission System:** A **Transmission System** can be a single transmission\
    \ line or a complex network connecting source and the destination. It is the media,\
    \ which is used to connect the source and the destination.\n4.  **Receiver:**\
    \ The **Receiver** accepts the signals from the transmission system and converts\
    \ it into a form that can be handled by the destination device.\n    E.g.: A **Modem**\
    \ that, is Modulator-Demodulator accepts one form of signal from transmitter or\
    \ source and converts it into another form to give it to the transmission system\
    \ and again output of transmission system is in the form of signal which is to\
    \ be converted into another form for reaching to the destination. Hence, output\
    \ modem will accept analog signal coming from a network or transmission line and\
    \ convert it into a digital bit stream.\n5.  **Destination:** **Destination**\
    \ takes the incoming data from the receiver, which is the output taken from the\
    \ receiver where the source data from workstation or node is converted through\
    \ transmitter modem into transmission system (i.e.: public telephone network)\
    \ and output of public telephone network is accepted by the receiver i.e.: modem\
    \ which will convert this signal to the destination form of signal and transfers\
    \ the converted signal from receiver to destination.\n\n## Network Addressing\n\
    \nMachines have a hostname and IP address.\n\nPrograms/ services have port numbers.\n\
    \n## Standard Ports\n\n- Each host has 65,536 ports.\n- Some ports are reserved\
    \ for specific apps.\n    - 20,21: FTP\n    - 23: Telnet\n    - 80: HTTP\n   \
    \ - see RFC 1700\n- about 2000 ports are reserved.\n\nA socket provides an interface\
    \ to send data to/from the network through a port.\n\n- Ports for common services\
    \ are preassigned.\n    - 21 FTP\n    - 22 SSH\n    - 23 Telnet\n    - 25 SMTP\
    \ (Mail)\n    - 80 HTTP (Web)\n    - 110 POP3 (Mail)\n    - 119 NNTP (News)\n\
    \    - 443 HTTPS (web)\n\nOther port numbers may just be randomly assigned to\
    \ programs by the operating system.\n\n## Using Netstat to check for active network\
    \ connections\n\nUse ‘netstat’ to view active network connections.\n\n```\nshell\
    \ % netstat -a\nActive Internet connections (servers and established)\nProto Recv-Q\
    \ Send-Q Local Address           Foreign Address\n tcp        0      0 *:imaps\
    \                 *:*\n tcp        0      0 *:pop3s                 *:*\n tcp\
    \        0      0 localhost:mysql         *:*\n tcp        0      0 *:pop3   \
    \               *:*\n tcp        0      0 *:imap2                 *:*\n tcp  \
    \      0      0 *:8880                  *:*\n tcp        0      0 *:www      \
    \             *:*\n tcp        0      0 192.168.119.139:domain  *:*\n tcp    \
    \    0      0 localhost:domain        *:*\n tcp        0      0 *:ssh        \
    \           *:*\n ...\n```\n\nNote: Must execute from the command shell, both\
    \ Unix and Windows.\n\n## 6.2 Networks Types\n\nA network is either a peer-to-peer\
    \ network (also called a workgroup) or a server-based network (also called a client/server\
    \ network).\n\n### Peer-to-peer Network\n\nIn a peer-to-peer network a group of\
    \ computers is connected together so that users can share resources and information.\
    \ There is no central location for authenticating users, storing files, or accessing\
    \ resources.\n\nThis means that users must remember which computers in the workgroup\
    \ have the shared resource or information that they want to access. It also means\
    \ that users must log on to each computer to access the shared resources on that\
    \ computer.\n\nIn most peer-to-peer networks, it is difficult for users to track\
    \ where information is located because data is generally stored on multiple computers.\
    \ This makes it difficult to back up critical business information, and it often\
    \ results in small businesses not completing backups. Often, there are multiple\
    \ versions of the same file on different computers in the workgroup.\n\n### Server-based\
    \ Network\n\nIn a server-based network, the server is the central location where\
    \ users share and access network resources. This dedicated computer controls the\
    \ level of access that users have to share resources. Shared data is in one location,\
    \ making it easy to back up critical business information.\n\nEach computer that\
    \ connects to the network is called a client computer. In a server-based network,\
    \ users have one user account and password to log on to the server and to access\
    \ shared resources. Server operating systems are designed to handle the load when\
    \ multiple client computers access server-based resources.\n\n## 6.3 Network Topology\n\
    \nThe physical topology of a network refers to the configuration of cables, computers,\
    \ and other peripherals.\n\nIn networking, the term “topology” refers to the layout\
    \ of connected devices on a network. Topology as a network’s virtual shape or\
    \ structure. This shape does not necessarily correspond to the actual physical\
    \ layout of the devices on the network. For example, the computers on a home LAN\
    \ may be arranged in a circle in a family room, but it would be highly unlikely\
    \ to find an actual ring topology there.\n\nNetwork topologies are categorized\
    \ into the following basic types:\n\n1.  Bus Topology\n2.  Ring Topology\n3. \
    \ Star Topology\n4.  Mesh Topology\n5.  Tree Topology\n6.  Hybrid Topology"
