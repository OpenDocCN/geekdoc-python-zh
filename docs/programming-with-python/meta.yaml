  - '[PAGE 69]


    +   - The term "regular expression", sometimes also called regex or regexp, is
    originated in theoretical computer science

    - The module **re** provides full support for Perl-like regular expressions in
    Python. The re module raises the exception **re.error** if an error occurs while
    compiling or using a regular expression.

    - Regular expression patterns are compiled into a series of bytecodes which are
    then executed by a matching engine written in C.

    - The backslash is a special character used in regular expressions, but is also
    used as an escape character in strings. This implies that Python would first evaluate
    every backslash of a string and after this - without the necessary backslashes
    - it would be used as a regular expression. One way to prevent this consists in
    writing every backslash as "" and this way keep it for the evaluation of the regular
    expression. The best way to overcome this problem consists in marking regular
    expressions as raw strings.

    - You can also use REs to modify a string or to split it apart in various ways.

    - If you want to use regular expressions in Python, you have to import the re
    module, which provides methods and functions to deal with regular expressions.


    # A Simple Example to demonstrate Regular Expression


    We show step by step with the following diagrams how this matching is performed:

    We check if the string sub = "abc"


    ![](img/19353aba2f109d1f7c4c239afb8fa982_69_0.png)


    is contained in the string s = "xaababcbcd"


    ![](img/19353aba2f109d1f7c4c239afb8fa982_69_1.png)


    By the way, the string sub = "abc" can be seen as a regular expression, just a
    very simple one.

    In the first place, we check, if the first positions of the two string match,
    i.e. s[0] == sub[0].

    This is not satisfied in our example. We mark this fact by the colour red:


    ![](img/19353aba2f109d1f7c4c239afb8fa982_69_2.png)


    Then we check, if s[1:4] == sub. This means that we have to check at first, if
    sub[0] is equal to s[1]. This is true and we mark it with the colour green. Then
    we have to compare the next positions. s[2] is not equal to sub[1], so we don''t
    have to proceed further with the next position of sub and s:'
- md: "## 3.2 Regular Expression Patterns\n\nNow we have to check if s[2:5] and sub\
    \ are equal. The first two positions are equal but not the third:\n\nThe following\
    \ steps should be clear without any explanations:\n\nFinally, we have a complete\
    \ match with s[4:7] == sub :\n\nRegular Expression are categorized into many types,\
    \ which are as follows:\n\n1. *Simple Patterns*\n   Regular expressions are used\
    \ to operate on strings, hence we will see matching characters.\n\n2. *Matching\
    \ Characters*\n   Letters and characters will simply match themselves. For example,\
    \ the regular expression python will match the string python exactly.\n   List\
    \ of the metacharacters\n   .^$*+?{}[]()|\\\n   [ and ] used for specifying a\
    \ **character class**, which is a set of characters that you wish to match. Characters\
    \ can be listed individually, or a range of characters can be indicated by giving\
    \ two characters and separating them by a '-'.\n   **[abc]** or **[a-c]** will\
    \ match any of the characters **a**, **b**, or **c**;\n   [a-z] to match only\
    \ lowercase letters **from a to z**.\n\n   Most important metacharacter is the\
    \ **backslash**, \\. As in Python string literals, the backslash can be followed\
    \ by various characters to signal various special sequences. It's also used to\
    \ escape all the metacharacters so you can still match them in patterns; for example,\
    \ if you need to match a [ or \\, you can precede them with a backslash to remove\
    \ their special meaning: \\[ or \\\\.\n\n### 3. Repeating Things\n\nThe first\
    \ **metacharacter for repeating things** that we will see is *. * doesn't match\
    \ the literal character *; instead, it specifies that the previous character can\
    \ be matched zero or more times, instead of exactly once.\n\nFor example, ca*t\
    \ will match ct (0 a characters), cat (1 a), caaat (3 a characters), and followed\
    \ by t character.\n\n**Another repeating metacharacter is +**, which matches one\
    \ or more times. Difference between * and +; * matches zero or more times, so\
    \ whatever's being repeated may not be present at all, while + requires at least\
    \ one occurrence. To use a similar example, ca+t will match cat (1 a), caaat (3\
    \ a's), but won't match ct.\n\nThere are two more repeating qualifiers. **The\
    \ question mark character, ?, matches either once or zero times.**\n\n## Regular-expression\
    \ Patterns\n\nExcept for control characters, (+ ? . * ^ $ ( ) [ ] { } | \\), all\
    \ characters match themselves. You can escape a control character by preceding\
    \ it with a backslash.\n\nFollowing table lists the regular expression syntax\
    \ that is available in Python:\n\n## Regular Expression Patterns\n\n| Pattern\
    \ | Description |\n| :--- | :--- |\n| ^ | Matches beginning of line. |\n| $ |\
    \ Matches end of line. |\n| . | Matches any single character except newline. Using\
    \ m option allows it to match newline as well. |\n| [...] | Matches any single\
    \ character in brackets. |\n| [^...] | Matches any single character not in brackets\
    \ |\n| re* | Matches 0 or more occurrences of preceding expression. |\n| re+ |\
    \ Matches 1 or more occurrence of preceding expression. |\n| re? | Matches 0 or\
    \ 1 occurrence of preceding expression. |\n| re{n} | Matches exactly n number\
    \ of occurrences of preceding expression. |\n| re{n,} | Matches n or more occurrences\
    \ of preceding expression. |\n| re{n, m} | Matches at least n and at most m occurrences\
    \ of preceding expression. |\n| a\\|b | Matches either a or b. |\n| (re) | Groups\
    \ regular expressions and remembers matched text. |\n| (?imx) | Temporarily toggles\
    \ on i, m, or x options within a regular expression. If in parentheses, only that\
    \ area is affected. |\n| (?-imx) | Temporarily toggles off i, m, or x options\
    \ within a regular expression. If in parentheses, only that area is affected.\
    \ |\n| (?:re) | Groups regular expressions without remembering matched text. |\n\
    | (?imx:re) | Temporarily toggles on i, m, or x options within parentheses. |\n\
    | (?-imx:re) | Temporarily toggles off i, m, or x options within parentheses.\
    \ |\n| (?#...) | Comment. |\n| (?=re) | Specifies position using a pattern. Doesn't\
    \ have a range. |\n| (?!re) | Specifies position using pattern negation. Doesn't\
    \ have a range. |\n| (?>re) | Matches independent pattern without backtracking.\
    \ |\n| \\w | Matches independent pattern without backtracking. |\n| \\W | Matches\
    \ nonword characters. |\n| \\s | Matches whitespace. Equivalent to [\\t\\n\\r\\\
    f]. |\n| \\S | Matches nonwhitespace. |\n| \\d | Matches digits. Equivalent to\
    \ [0-9]. |\n| \\D | Matches nondigits. |\n| \\A | Matches beginning of string.\
    \ |\n| \\Z | Matches end of string. If a newline exists, it matches just before\
    \ newline. |\n| \\z | Matches end of string. |\n| \\G | Matches point where last\
    \ match finished. |\n| \\b | Matches word boundaries when outside brackets. Matches\
    \ backspace (0x08) when inside brackets. |\n| \\B | Matches nonword boundaries.\
    \ |\n| \\n, \\t, etc. | Matches newlines, carriage returns, tabs, etc. |\n| \\\
    1...\\9 | Matches nth grouped subexpression. |\n| \\10 | Matches nth grouped subexpression\
    \ if it matched already. Otherwise refers to the octal representation of a character\
    \ code. |\n\n## Regular-expression Examples\n\n### Literal characters:\n\n| Example\
    \ | Description |\n|---------|-------------|\n| python | Match \"python\". |\n\
    \n### Character classes:\n\n| Example | Description |\n|---------|-------------|\n\
    | [Pp]ython | Match \"Python\" or \"python\" |\n| rub[ye] | Match \"ruby\" or\
    \ \"rube\" |\n| [aeiou] | Match any one lowercase vowel |\n| [0-9] | Match any\
    \ digit; same as [0123456789] |\n| [a-z] | Match any lowercase ASCII letter |\n\
    | [A-Z] | Match any uppercase ASCII letter |\n| [a-zA-Z0-9] | Match any of the\
    \ above |\n| [^aeiou] | Match anything other than a lowercase vowel |\n| [^0-9]\
    \ | Match anything other than a digit |\n\n### Special Character Classes:\n\n\
    | Example | Description |\n| --- | --- |\n| . | Match any character except newline\
    \ |\n| \\d | Match a digit: [0-9] |\n| \\D | Match a nondigit: [^0-9] |\n| \\\
    s | Match a whitespace character: [ \\t\\r\\n\\f] |\n| \\S | Match nonwhitespace:\
    \ [^ \\t\\r\\n\\f] |\n| \\w | Match a single word character: [A-Za-z0-9_] |\n\
    | \\W | Match a nonword character: [^A-Za-z0-9_] |\n\n### Repetition Cases:\n\n\
    | Example | Description |\n| --- | --- |\n| ruby? | Match \"rub\" or \"ruby\"\
    : the y is optional |\n| ruby* | Match \"rub\" plus 0 or more ys |\n| ruby+ |\
    \ Match \"rub\" plus 1 or more ys |\n| \\d{3} | Match exactly 3 digits |\n| \\\
    d{3,} | Match 3 or more digits |\n| \\d{3,5} | Match 3,4,or 5 digits |\n\n###\
    \ Nongreedy repetition:\n\nThis matches the smallest number of repetitions:\n\n\
    | Example | Description |\n| --- | --- |\n| <.*> | Greedy repetition: matches\
    \ \"<python>perl>\" |\n| <.*?> | Nongreedy: matches \"<python>\" in \"<python>perl>\"\
    \ |\n\n### Grouping with parentheses:\n\n| Example | Description |\n| --- | ---\
    \ |\n| \\D\\d+ | No group: + repeats \\d |\n| (\\D\\d)+ | Grouped: + repeats \\\
    D\\d pair |\n| ([Pp]ython(, )?)+ | Match \"Python\", \"Python, python, python\"\
    , etc. |\n\n### Backreferences:\n\nThis matches a previously matched group again:\n\
    \n| Example | Description |\n| --- | --- |\n| ([Pp])ython&\\1ails | Match python&pails\
    \ or Python&Pails |\n| ([\"'])[^\\1]*\\1 | Single or double-quoted string. \\\
    1 matches whatever the 1st group matched . \\2 matches whatever the 2nd group\
    \ matched, etc. |\n\n### Alternatives:\n\n| Example | Description |\n|---------|-------------|\n\
    | python\\|perl | Match \"python\" or \"perl\" |\n| rub(y\\|le) | Match \"ruby\"\
    \ or \"ruble\" |\n| Python(!+\\|\\?) | \"Python\" followed by one or more ! or\
    \ one ? |\n\n### Anchors:\n\nThis needs to specify match position.\n\n| Example\
    \ | Description |\n|---------|-------------|\n| ^Python | Match \"Python\" at\
    \ the start of a string or internal line |\n| Python$ | Match \"Python\" at the\
    \ end of a string or line |\n| \\APython | Match \"Python\" at the start of a\
    \ string |\n| Python\\Z | Match \"Python\" at the end of a string |\n| \\bPython\\\
    b | Match \"Python\" at a word boundary |\n| \\brub\\B | \\B is nonword boundary:\
    \ match \"rub\" in \"rube\" and \"ruby\" but not alone |\n| Python(?=!) | Match\
    \ \"Python\", if followed by an exclamation point |\n| Python(?!!) | Match \"\
    Python\", if not followed by an exclamation point |\n\n### Special syntax with\
    \ parentheses:\n\n| Example | Description |\n|---------|-------------|\n| R(?#comment)\
    \ | Matches \"R\". All the rest is a comment |\n| R(?i)uby | Case-insensitive\
    \ while matching \"uby\" |\n| R(?i:uby) | Same as above |\n| rub(?:y\\|le) | Group\
    \ only without creating \\1 backreference |\n\n### 3.2.1 Compilation Flags\n\n\
    Compilation flags let you modify some aspects of how regular expressions work.\
    \ Flags are available in the re module under two names, a long name such as IGNORECASE\
    \ and a short, one-letter form such as I. (If you're familiar with Perl's pattern\
    \ modifiers, the one-letter forms use the same letters; the short form of re.VERBOSE\
    \ is re.X, for example.) Multiple flags can be specified by bitwise OR-ing them;\
    \ re.I | re.M sets both the I and M flags, for example.\n\n| Flag | Meaning |\n\
    |------|---------|\n| ASCII, A | Makes several escapes like \\w, \\b, \\s and\
    \ \\d match only on ASCII characters with the respective property. |\n| DOTALL,\
    \ S | Make. match any character, including newlines |\n| IGNORECASE, I | Do case-insensitive\
    \ matches |\n| LOCALE, L | Do a locale-aware match |\n| MULTILINE, M | Multi-line\
    \ matching, affecting ^ and $ |\n| VERBOSE, X (for 'extended') | Enable verbose\
    \ REs, which can be organized more cleanly and understandably. |"
