    \ - step 4: data transfer\n\n![](img/19353aba2f109d1f7c4c239afb8fa982_181_0.png)\n\
    \n## Connection-Oriented Services\n\n![](img/19353aba2f109d1f7c4c239afb8fa982_181_1.png)\n\
    \n## Connection-Oriented Server\n\n```python\nfrom socket import \\\n    socket,\
