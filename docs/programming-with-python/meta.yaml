  - "[PAGE 46]\n\nLogical error is due to wrong solution or wrong logic and syntactic\
    \ error occurs due to poor understanding of language that means syntax mistake.\
    \ We can detect these errors and then can debug them and accordingly can provide\
    \ error description for those errors and these are called as exceptions.\n\nExceptions\
    \ are run-time condition or error that a program may encounter while executing.\
    \ Errors like division by 0 or access to an array outside of its bounds or running\
    \ out of memory or running out of disk space.\n\nThere are two types of exception\
    \ handling:\n\n+   1. Synchronous\n2. Asynchronous\n\nA synchronous exceptions\
    \ out of range index and overflow error can occur. In Asynchronous the events\
    \ which are beyond the control like keyboard interrupts or bad sectors in the\
    \ disc or hardware failure are called as asynchronous exceptions.\n\nThe following\
    \ task can be performed for exception.\n\n+   1. Find the problem (hit the exception)\n\
    2. Inform that an error has occurred (throw the exception)\n3. Receive the error\
    \ information (catch the exception)\n4. Take corrective action (handle the exception)\n\
    \n# Syntax Errors\n\nSyntax errors, also known as parsing errors, are perhaps\
    \ the most common kind of complaint you get while you are still learning Python:\n\
    \n```\n>>> while True print 'Hello world'\n  File \"<stdin>\", line 1\n    while\
    \ True print 'Hello world'\n          ^\nSyntaxError: invalid syntax\n```\n\n\
    The parser repeats the offending line and displays a little ‘arrow’ pointing at\
    \ the earliest point in the line where the error was detected. The error is caused\
    \ by (or at least detected at) the token preceding the arrow: in the example,\
    \ the error is detected at the keyword **print**, since a colon (‘:’) is missing\
    \ before it. File name and line number are printed so you know where to look in\
    \ case the input came from a script.\n\n# 2.2 Introduction to Exception Handling\n\
    \nVarious error messages can occur when executing Python programs. Such errors\
    \ are called **exceptions**. Python handle these errors by reporting them on the\
    \ screen. Exceptions can be “caught” and “handled” by a program, however, to either\
    \ correct the error and continue execution, or terminate the program."
  - '[PAGE 47]


    ![](img/19353aba2f109d1f7c4c239afb8fa982_47_0.png)


    Python has many built-in exceptions which forces your program to output an error
    when something in it goes wrong.


    When these exceptions occur, it causes the current process to stop and passes
    it to the calling process until it is handled. If not handled, our program will
    crash.


    For example, if function **A** calls function **B** which in turn calls function
    **C** and an exception occurs in function **C**. If it is not handled in **C**,
    the exception passes to **B** and then to **A**.


    If never handled, an error message is spit out and our program come to a sudden,
    unexpected halt.


    # 2.3 What is Exception


    An exception is an event, which occurs during the execution of a program that
    disrupts the normal flow of the program’s instructions. when a Python script encounters
    a situation that it cannot cope up with, it raises an exception. An **exception**
    is a value (object) that is *raised* (“thrown”) signaling that an unexpected,
    or “exceptional,” situation has occurred.


    When a Python script raises an exception, it must either handle the exception
    immediately otherwise it terminates and quits.


    Python contains a predefined set of exceptions referred to as **standard exceptions**.


    Some of the standard exceptions are listed as below:


    Table 2.1: Some Standard Exceptions in Python


    | ImportError | raised when an import (or from...import) statement fails |

    | IndexError | raised when a sequence index is out of range |

    | NameError | raised when a local or global name is not found |

    | TypeError | raised when an operation or function is applied to an object of
    inappropriate type |

    | ValueError | raised when a built-in operation or function is applied to an appropriate
    type, but of inappropriate value |

    | IOError | raised when an input/output operation fails (e.g., “file not found”)
    |


    The standard exceptions are defined within the exceptions module of the Python
    Standard Library, which is automatically imported into Python programs.'
