  md: '![](img/19353aba2f109d1f7c4c239afb8fa982_47_0.png)


    Python has many built-in exceptions which forces your program to output an error
    when something in it goes wrong.


    When these exceptions occur, it causes the current process to stop and passes
    it to the calling process until it is handled. If not handled, our program will
    crash.


    For example, if function **A** calls function **B** which in turn calls function
    **C** and an exception occurs in function **C**. If it is not handled in **C**,
    the exception passes to **B** and then to **A**.


    If never handled, an error message is spit out and our program come to a sudden,
    unexpected halt.


    # 2.3 What is Exception


    An exception is an event, which occurs during the execution of a program that
    disrupts the normal flow of the program’s instructions. when a Python script encounters
    a situation that it cannot cope up with, it raises an exception. An **exception**
    is a value (object) that is *raised* (“thrown”) signaling that an unexpected,
    or “exceptional,” situation has occurred.


    When a Python script raises an exception, it must either handle the exception
    immediately otherwise it terminates and quits.


    Python contains a predefined set of exceptions referred to as **standard exceptions**.
    Some of the standard exceptions are listed as below:


    ### Table 2.1: Some Standard Exceptions in Python


    | Exception | Description |

    |-----------|-------------|

    | ImportError | raised when an import (or from...import) statement fails |

    | IndexError | raised when a sequence index is out of range |

    | NameError | raised when a local or global name is not found |

    | TypeError | raised when an operation or function is applied to an object of
    inappropriate type |

    | ValueError | raised when a built-in operation or function is applied to an appropriate
    type, but of inappropriate value |

    | IOError | raised when an input/output operation fails (e.g., “file not found”)
    |


    The standard exceptions are defined within the exceptions module of the Python
    Standard Library, which is automatically imported into Python programs.'
