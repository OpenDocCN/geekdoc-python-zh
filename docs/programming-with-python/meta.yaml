    ```\n要将窗口坐标转换为画布坐标，请使用 `canvasx` 和 `canvasy` 方法。\n\n`bbox(item=None)`\n\n返回所有匹配项目的边界框。如果省略标签，则返回所有项目的边界框。注意，边界框是近似的，可能与实际值相差几个像素。\n\
    \n`item`\n\n项目指定符。如果省略，则返回画布上所有元素的边界框。\n\nCanvas 控件还提供了两个预定义的标签：\n\n-   `ALL`（或字符串\
    \ \"all\"）匹配画布上的所有项目。\n-   `CURRENT`（或 \"current\"）匹配鼠标指针下的项目（如果有的话）。这可以在鼠标事件绑定内部使用，用于引用触发回调的项目。\n\
    \n```\ncanvasx(x, gridspacing=None) [#]\n```\n将窗口坐标转换为画布坐标。即 `x`\n\n屏幕坐标。\n\n\
    `gridspacing`：可选的网格间距。坐标将四舍五入到最近的网格坐标。\n\n返回：\n画布坐标。\n\n```\ncanvasy(y, gridspacing=None)\
    \ [#]\n```\n将窗口坐标转换为画布坐标。即 `y`\n\n屏幕坐标。\n\n`gridspacing`：可选的网格间距。坐标将四舍五入到最近的网格坐标。\n\
    \n返回：\n画布坐标。\n\n## 4.6 Python 控件\n\n### 使用 Tkinter 创建 GUI 控件\n\n控件是 GUI 的组成部分——按钮、标签和文本框都是控件。大多数控件在屏幕上有图形表示，但有些控件（如表格和框）仅用于容纳其他控件并在屏幕上排列它们。\n\
    \n### 工作原理\n\n第一行导入 `Tkinter` 模块。接下来，你可以从 `Tkinter` 导入 `Label`，或者简单地导入所有内容（`*`），就像在示例中所做的那样。之后，你为每个控件（在本例中是\
    \ `Label`）创建一个对象。然后，`Label` 被安排在父窗口中。最后，控件被显示出来。\n\nWidget 构建工具包（WCK）是一个简单的编程接口，你可以用它在\
    \ Python 中创建新的控件。WCK 目前可用于 `tkinter` 库，但完全可以为其他环境实现。要创建一个更具表现力的控件，你必须创建一个 `Widget`\
    \ 基类的子类，并实现必要的绘制和事件处理方法。\n\n`tkinter` GUI 的主要单元是控件。你可以使用 Tk 提供的“内置”控件，创建自己的控件，或者安装定义了额外控件的扩展包。\n\
    \n### 调整控件大小\n\n默认情况下，控件具有内置的最小化和最大化按钮，以及一个“X”按钮来关闭窗口。此外，我们可以拉伸窗口。\n\n当你运行这个程序时，尝试调整窗口大小；你会看到“My\
    \ first GUI!”标签始终保持居中，无论窗口变成什么样子，如下图所示。\n\n### 对上述程序的解释：\n\n在上面的程序中，我们将 `expand`\
    \ 的值分配为 `Yes`，`fill` 分配为 `Both`。这告诉 Python 在父窗口扩大时扩展控件。默认情况下，此选项是关闭的。\n\n### 配置控件选项\n\
    \n在这个例子中，你创建了相同的父窗口和标签。然而，不是在创建控件的同时设置选项，而是等待并在我已经创建它们之后进行设置：\n\n```\nimport tkinter\n\
    from tkinter import *\nroot = Tk( )\n\nwidget = Label(root)\nwidget.config(text='My\
    \ first GUI!')\nwidget.pack(side=TOP, expand=YES, fill=BOTH)\nroot.mainloop()\n\
    ```\n在这个例子中，你调用了 `configure` 方法来达到与前一个例子相同的结果。如果你愿意，你可以稍后在程序中更改控件的外观。例如，也许用户希望改变窗口的外观。你可以插入一个按钮来触发\
    \ `configure` 方法，这反过来会更改控件的选项。现在我们来详细看看不同的控件。"
