    \ Expressions\n\nPOSIX is portable operating system interface which has a collection\
    \ of standards that define some of the functionality that a (UNIX) operating system\
    \ should support. These standards defines two flavors of regular expressions.\
    \ Commands involving regular expressions, such as grep and egrep,\n\ngrep is a\
