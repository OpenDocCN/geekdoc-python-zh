    # 1.10.2 The mkdir( ) Method


    +   - mkdir() stands for make directory

    - This method is used to create a new directory in current directory path.

    - This method available in OS Module

    - mkdir(argument): In mkdir( ) we have to pass one argument which contains the
    name of the directory to be created, since mkdir( ) is available in OS Module,
    hence before creating a directory, you have to import OS Module.


    # Syntax


    ```

    os.mkdir("newdir")

    ```


    # Example


    Following is the example to create a directory **kiran** in the current directory
    –


    ```

    #!/usr/bin/python

    import os

    # Create a directory "test"

    os.mkdir("kiran")

    ```


