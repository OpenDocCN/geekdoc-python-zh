    \ different types of Regular Expressions based on POSIX ( \"Portable Operating\
    \ System Interface for UNIX\").\n\n+   1. POSIX Basic Regular Expressions\n2.\
    \ POSIX Extended Regular Expressions\n\n# ### POSIX Basic Regular Expressions\n\
    \nPOSIX is portable operating system interface which has a collection of standards\
    \ that define some of the functionality that a (UNIX) operating system should\
    \ support. These standards defines two flavors of regular expressions. Commands\
    \ involving regular expressions, such as grep and egrep,\n\ngrep is a global regular\
    \ Expression in Unix and Linux which support different regular expression patterns.\
    \ Like string matching pattern, ?, ., ^, /, *, +, S, [] every character has special\
    \ meaning.\n\negrep is a extended global regular Expression in Unix and Linux\
    \ which support different regular expression patterns along with | (pipe) sign\
    \ to compare two or more patterns.\n\n# ### POSIX Extended Regular Expressions\n\
    \nThe Extended Regular Expressions or ERE standardizes a similar to the one used\
    \ by the UNIX egrep command. \"Extended\" is relative to the original UNIX grep,\
    \ which only had bracket expressions, dot, caret, dollar and star. An ERE support\
    \ all regular expressions of grep with some extensions.\n\nThus egrep, and POSIX\
    \ ERE, add additional metacharacters without backslashes. You can use backslashes\
    \ to suppress the meaning of all metacharacters,.\n\nGrep, egrep, sed, awk these\
    \ all are used with extended regular expressions.\n\nThe quantifiers ?, +, {n},\
    \ {n,m} and {n,} repeat the preceding token zero or once, once or more, n times,\
    \ between n and m times, and n or more times, respectively.\n\nExtended regular\
    \ expression for multiple patterns in egrep is supported by vertical bar |. parentheses\
    \ create a group, e.g.`(abc){2}`matches `abcabc`."
