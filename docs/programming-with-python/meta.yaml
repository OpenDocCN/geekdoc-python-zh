    \nFinally, the close method closes the dictionary, which involves saving all the\
    \ changes to disk, so the next time the file is opened it will be in the state\
    \ you left it.\n\n# 5.2 Introduction to RDBMS\n\n**RDBMS** stands for **Relational\
    \ Database Management System**. RDBMS data is structured in database tables, fields\
    \ and records.\n\nEach RDBMS table consists of database table rows. Each database\
    \ table row consists of one or more database table fields.\n\nRelational databases\
    \ are the technology of choice for complex data storage.\n\nIn a relational database,\
    \ data is stored in tables that can be viewed as two - dimensional data structures.\n\
    \nThe columns, or **vertical part** of the two-dimensional matrix, are all of\
    \ the same type of data; like strings, numbers, dates, and so on.\n\nEach horizontal\
    \ component of the table is made up of rows, also called records. Each row in\
    \ turn is made up of columns. Typically, each record holds the information pertaining\
    \ to one item, such as an audio CD, a person, a purchase order, an automobile,\
    \ and so on.\n\nRDBMS store the data into collection of tables, which might be\
    \ related by common fields (database table columns).\n\nRDBMS also provide relational\
    \ operators to manipulate the data stored into the database tables. Most RDBMS\
    \ use SQL as database query language.\n\nThe most popular RDBMS are MS SQL Server,\
    \ DB2, Oracle and MySQL\n\nTo Over Come the Drawback of Database the New Concept\
    \ of Relational Database was Introduced in 1970, by E.F.Codd. His Idea Was to\
    \ Break Down This Repetitive Data Into Separate Files That Could Be Related Using\
    \ a Common Key Field.\n\nA relation in a relational database is based on a relational\
    \ schema, which consists of number of attributes. A relational database is made\
    \ up of a number of relations and corresponding relational database schema. The\
    \ goal of a relational database design is to generate a set of relation schema\
    \ that allows us to store information without unnecessary redundancy and also\
    \ to retrieve information easily"
