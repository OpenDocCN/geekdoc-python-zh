    3.  If an exception occurs during execution of the try clause, the rest of the
    clause is skipped. Then if its type matches the exception named after the except
    keyword, the except clause is executed, and then execution continues after the
    try statement.

    4.  If an exception occurs which does not match the exception named in the except
    clause, it is passed on to outer try statements; if no handler is found, it is
    an unhandled exception and execution stops with a message as shown above.


