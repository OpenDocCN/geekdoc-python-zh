    \n## 4.1.2 GUI的优点\n\n1.  使用GUI，我们可以在没有先验知识的情况下节省大量配置任何驱动程序或软件的时间。\n2.  借助GUI应用程序，每个人都可以使用计算机，而无需记住命令。\n\
    3.  大多数普通用户使用GUI的学习曲线会更小。\n4.  GUI允许计算机用户使用视觉元素，如桌面图标，来导航和操作软件。\n\n## 4.1.3 GUI的缺点\n\
    \n1.  当它构建不正确时，可能会非常难以使用。\n2.  GUI比非图形界面需要更多的内存资源。\n3.  它可能需要安装额外的软件，例如Java的“运行时环境”。\n\
