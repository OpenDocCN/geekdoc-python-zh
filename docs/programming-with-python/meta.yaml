  mdcn: "## 1.10.4 `getcwd()` 方法\n\n- `getcwd()` 代表获取当前工作目录。\n- 此方法用于显示当前工作目录。\n-\
    \ 该方法在 OS 模块中可用。\n- 由于 `getcwd()` 在 OS 模块中可用，因此在使用此函数显示当前工作目录之前，必须导入 OS 模块。\n\n\
    语法\n\n```\nos.getcwd()\n```\n\n示例\n\n以下是获取当前目录的示例 –\n\n```\n#!/usr/bin/python\n\
    import os\n# This would give location of the current directory\nos.getcwd()\n\
    ```\n\n## 1.10.5 `rmdir()` 方法\n\n- `rmdir()` 代表移除目录。\n- 此方法用于删除或移除一个目录。\n- 该方法在\
    \ OS 模块中可用。\n- `rmdir(参数)`：在 `rmdir()` 中，我们需要传递一个参数，该参数包含要删除或移除的目录名称。由于 `rmdir()`\
    \ 在 OS 模块中可用，因此在删除目录之前，必须导入 OS 模块。\n- 在移除目录之前，应先删除其中的所有内容，即目录应为空。\n- 在移除目录之前，你应该退出该目录。\n\
    \n语法\n\n```\nos.rmdir('dirname')\n```\n\n示例\n\n以下是移除 \"/home/ks\" 目录的示例。需要提供目录的完整路径名，否则它将在当前目录中搜索该目录，唯一的条件是\
    \ ks 目录必须为空且你当前不能在 ks 目录中。\n\n```\n#!/usr/bin/python\nimport os\n\n# This would\
    \ remove \"/tmp/test\" directory.\nos.rmdir(\"/home/ks\" )\n```\n\n## 1.11 迭代器，可迭代对象\n\
    \n### 1.11.1 Python 迭代器\n\n1. **迭代器**是一个对象，允许程序员遍历集合的所有元素，无论其具体实现如何。\n2. 迭代器是那些可以被迭代的对象。\n\
    3. Python 中的迭代器就是一个可以被迭代的对象。它将一次返回一个数据元素。\n4. Python **迭代器对象**基于**迭代器协议**，在创建迭代器对象时，Python\
    \ 必须实现两个特殊方法：\n    (a) **`__iter__()`**\n    (b) **`__next__()`**，统称为**迭代器协议**，这意味着你可以使用\
    \ `__iter__` 和 `__next__` 方法构建自己的迭代器。\n        — `__iter__` 返回迭代器对象本身。如果需要，可以执行一些初始化操作。这在\
    \ `for` 和 `in` 语句中使用。\n        — `__next__` 方法返回迭代器中的下一个值，即返回序列中的下一个项。到达末尾时，它必须引发\
    \ `StopIteration`。\n5. 它们在 **`for` 循环**、推导式、生成器等中实现。\n6. 如果我们可以从中获取一个迭代器，则该对象被称为**可迭代的**。Python\
    \ 中的大多数内置容器，如：列表、元组、字符串等，都是可迭代对象。\n7. 迭代器将数据与算法解耦。\n\n### 1.11.2 Python 可迭代对象\n\
    \n可迭代对象是一个在其内部定义了 `iter` 方法的容器。例如 `my_list = [4,7,0,3]`，其中 `my_list` 是一个可迭代对象，并且它拥有\
    \ `iter` 方法。Python 中的内置容器，如列表、元组和字符串等，都是可迭代对象。\n\n*示例 1:*\n\n在此示例中\n\n1. 首先定义一个名为\
    \ **`my_list`** 的列表**容器**。\n2. **`iter()`** 返回迭代器对象，因为我们得到的 **`my_iter`** 是**迭代器**。\n\
    3. **`next()`** 方法遍历迭代器并打印下一个值。\n4. 通过使用 **`object.__next__()`** 方法，我们打印**下一个值**。\n\
    5. 当**列表遍历完毕**且没有剩余值可打印时，列表引发 **`StopIteration`** 错误。\n\n![](img/19353aba2f109d1f7c4c239afb8fa982_32_0.png)\n\
    \n**`iter()`** 函数（进而调用 **`__iter__()`** 方法）从这些对象返回一个迭代器。\n\n## 在 Python 中遍历迭代器\n\
    \n我们使用 **`next()`** 函数来手动遍历迭代器的所有项。当我们到达末尾且没有更多数据可返回时，它将引发 **`StopIteration`**。\n\
    \n## 示例 2\n\n我们使用 **`for` 语句**来循环遍历**一个数字列表**。\n\n![](img/19353aba2f109d1f7c4c239afb8fa982_33_0.png)\n\
    \n在此示例中\n\n1. 使用 `for` 循环，对传递到循环中的编号列表进行自动迭代。\n2. 通过 `print` 语句，打印列表中每个被迭代的值。\n\
    \n## 示例 3\n\n使用 **`for` 语句**，如果将其与字符串一起使用，它会循环遍历其字符。\n\n![](img/19353aba2f109d1f7c4c239afb8fa982_33_1.png)\n\
    \n在此示例中\n\n1. 使用 `for` 循环，对传递到循环中的字符串列表进行自动迭代。\n2. 通过 `print` 语句，打印列表中每个被迭代的值。\n\
    \n## 示例 4\n\n使用 **`for` 语句**，如果将其与字典一起使用，它会循环遍历其键。\n\n![](img/19353aba2f109d1f7c4c239afb8fa982_34_0.png)\n\
    \n在此示例中\n\n1. 使用 `for` 循环，对传递到循环中的字典进行自动迭代。\n2. 通过 `print` 语句，打印列表中每个被迭代的值。\n\n\
    ## 示例 5\n\n使用 **`for` 语句**，如果我们定义一个列表，然后使用迭代器的初始值启动计数器变量，那么循环将用于遍历可迭代对象。`for`\
    \ 循环执行自动迭代。\n\n![](img/19353aba2f109d1f7c4c239afb8fa982_34_1.png)\n\n## 示例 6\n\
    \n使用 **`while` 语句**，如果我们定义一个列表，然后使用迭代器的初始值启动计数器变量，那么 `while` 循环将用于遍历可迭代对象。`while`\
    \ 循环执行自动迭代。\n\n![](img/19353aba2f109d1f7c4c239afb8fa982_35_0.png)\n\n## 示例 7\n\
    \n使用 **`for` 语句**，如果我们定义一个字典，那么 `for` 循环用于遍历可迭代对象。`for` 循环执行自动迭代。\n\n![](img/19353aba2f109d1f7c4c239afb8fa982_35_1.png)\n\
    \n你可以通过使用 `values()` 方法来显示字典项的值，注意使用 `values` 方法时遵循特定格式，**`dt.values()`：**\n\n\
    ```\nC:\\Python34\\python.exe\nPython 3.4.3 (v3.4.3:9b73f1c3e601, Feb 24 2015,\
    \ 22:43:06) [MSC v.1600 32 bit (Intel)] on win32\nType \"help\", \"copyright\"\
    , \"credits\" or \"license\" for more information.\n>>> dt={\"kiran\":\"11\",\"\
    sri\":12}\n>>> for c in dt . values ():\n...     print(c)\n...\n11\n12\n>>> _\n\
    ```\n\n## 示例 8\n\n使用 `for` 语句，如果将其与文件一起使用，它会循环遍历文件的行。\n\n在此示例中，首先我需要一个文本文件，因此通过文件处理，我创建了\
    \ `kiranfile.txt` 并包含一些内容。\n\n```\n>>> f=open(\"kiranfile.txt\",\"w\")\n>>> f.write(\"\
    Hello Everyone, This is Message from Kiran maam to all students: Please refer\
    \ this Book, It is very helpful exam point of view as well as knowledge point\
    \ of view, All the Best for Exams\")\n186\n>>> f=open(\"kiranfile.txt\",\"r\"\
    )\n>>> f.read()\n'Hello Everyone, This is Message from Kiran maam to all students:\
    \ Please refer this Book, It is very helpful exam point of view as well as knowledge\
    \ point of view, All the Best for Exams'\n>>> _\n```\n\n现在使用 `for` 语句，利用可迭代对象，打印文件内容。\n\
    \n```\nC:\\Python34\\python.exe\nPython 3.4.3 (v3.4.3:9b73f1c3e601, Feb 24 2015,\
    \ 22:43:06) [MSC v.1600 32 bit (Intel)] on win32\nType \"help\", \"copyright\"\
    , \"credits\" or \"license\" for more information.\n>>> for line in open(\"kiranfile.txt\"\
    ):\n...     print(line)\n...\nHello Everyone, This is Message from Kiran maam\
    \ to all students: Please refer this Book, It is very helpful exam point of view\
    \ as well as knowledge point of view, All the Best for Exams\n>>>\n```\n\n## 示例\
    \ 9\n\n有**许多类型的对象**可以**与 `for` 循环一起使用**。这些被称为**可迭代对象**。有许多函数可以消耗这些可迭代对象。\n\n1.\
    \ 与列表连接 (`join`)\n2. 与字典连接 (`join`)\n3. 将字符串转为列表 (`list`)\n4. 将字典转为列表 (`list`)\n\
    \n### 1. 与列表连接的示例\n\n![](img/19353aba2f109d1f7c4c239afb8fa982_37_0.png)\n\n###\
    \ 2. 与字典连接的示例\n\n![](img/19353aba2f109d1f7c4c239afb8fa982_37_1.png)\n\n### 3.\
    \ 将字符串转为列表的示例\n\n![](img/19353aba2f109d1f7c4c239afb8fa982_37_2.png)"
