    # Methods


    Spinbox objects have following these methods :


    +   I. **delete(startindex [,endindex])**

    This method deletes a specific character or a range of text.


    II. **get(startindex [,endindex])**

    This method returns a specific character or a range of text.


    III. **identify(x, y)**

    Identifies the widget element at the given location.


    IV. **index(index)**

    Returns the absolute value of an index based on the given index.


    V. **insert(index [,string]...)**

    This method inserts strings at the specified index location.


    ![](img/19353aba2f109d1f7c4c239afb8fa982_116_0.png)


    # 4.6.9 Textbox widgets


    A text widget is used for multi-line text area. The Tkinter text widget is very
    powerful and flexible and can be used for a wide range of tasks. Though one of
    the main purposes is to provide simple multi-line areas, as they are often used
    in forms, text widgets can also be used as simple text editors or even web browsers.


    We create a text widget by using the Text() method. We set the height to 5, i.e.
    five lines and the width to 38, i.e. 38 characters. We can apply the method insert()
    on the object T, which the Text() method had returned, to include text. We add
    five lines of text.(here three lines are blank).


    ![](img/19353aba2f109d1f7c4c239afb8fa982_116_1.png)'
