  - '[PAGE 160]


    Database Connectivity in Python


    155


    +   - A transaction in a database system must maintain Atomicity, Consistency,
    Isolation, and Durability

    - Transactions are completed by COMMIT or ROLLBACK SQL statements, which indicate
    a transaction''s beginning or end.

    - When a transaction completes successfully, database changes are said to be *committed*.
    when a transaction does not complete, changes are *rolled back*.


    For example, a transfer of money from one bank account to another requires two
    changes to the database both must succeed or fail together.


    ![](img/19353aba2f109d1f7c4c239afb8fa982_160_0.png)


    # Process of Transaction


    The transaction is executed as a series of reads and writes of database objects,
    which are explained below:


    # Read Operation


    To read a database object, it is first brought into main **memory** from disk,
    and then its value is copied into a program variable as shown in figure.


    ![](img/19353aba2f109d1f7c4c239afb8fa982_160_1.png)


    # Write Operation


    To write a database object, an in-memory copy of the object is first modified
    and then written to disk.'
  - '[PAGE 161]


    ![](img/19353aba2f109d1f7c4c239afb8fa982_161_0.png)


    # ## Transactions Properties


    Transactions are a mechanism that ensures data consistency. Transactions have
    the following four properties:


    +   1. **Atomicity: (all or nothing)** A transaction is said to be atomic if a
    transaction always executes all its actions in one step or not executes any actions
    at all It means either all or none of the transactions operations are performed.
    Either a transaction completes or nothing happens at all.


    2. **Consistency: (No violation of integrity constraints)** A transaction must
    preserve the consistency of a database after the execution. The DBMS assumes that
    this property holds for each transaction. Ensuring this property of a transaction
    is the responsibility of the user. A transaction must start in a consistent state
    and leave the system in a consistent state.


    3. **Isolation: (concurrent changes invisibles)** The transactions must behave
    as if they are executed in isolation. It means that if several transactions are
    executed concurrently the results must be same as if they were executed serially
    in some order. The data used during the execution of a transaction cannot be used
    by a second transaction until the first one is completed. Intermediate results
    of a transaction are not visible outside the current transaction.


    4. **Durability: (committed update persist)** The effect of completed or committed
    transactions should persist even after a crash. It means once a transaction commits,
    the system must guarantee that the result of its operations will never be lost,
    in spite of subsequent failures. Once a transaction was committed, the effects
    are persistent, even after a system failure.


    The Python DB API 2.0 provides two methods to either *commit* or *rollback* a
    transaction.'
