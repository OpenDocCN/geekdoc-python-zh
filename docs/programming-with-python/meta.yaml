  md: '# Python File Input-Output


    A text file is a file containing characters, structured as individual lines of
    text. In addition to printable characters, text files also contain the nonprinting
    newline character, \n, to denote the end of each text line. The newline character
    causes the screen cursor to move to the beginning of the next screen line. Thus,
    text files can be directly viewed and created using a text editor.


    # 1.1.2 Binary File


    Binary files can contain various types of data, such as numerical values, and
    are therefore not structured as lines of text. Such files can only be read and
    written via a computer program.


    Any attempt to directly view a binary file will result in “garbled” characters
    on the screen. A binary file is a file that is formatted in a way that only a
    computer program can read.


    # 1.1.3 Differentiate between Text File and Binary File


    | Text File | Binary File |

    | --- | --- |

    | A text file is often structures as a sequence of lines and a line is a sequence
    of characters. The line is terminated by EOL (End of Line) character. | Binary
    files can contain various types of data, such as numerical values, and are therefore
    not structured as lines of text |

    | Text files contain ASCII codes of digits, alphabetic and symbols | Binary file
    contains collection of bytes (0’s and 1’s). Binary files are compiled version
    of text files. |

    | A text file is a file containing characters, structured as individual lines
    of text. | A binary file is a file that is formatted in a way that only a computer
    program can read. |

    | File Access modes for Text file are<br>r → opens a file for reading only<br>r+
    → opens file for both reading and writing<br>w → opens file for writing only<br>w+
    → opens file for writing and reading<br>a → opens file for appending<br>a+ → opens
    file for appending and reading | File Access modes for Binary file are<br>rb →
    opens a file for reading only<br>rb+ → opens file for both reading and writing<br>wb
    → opens file for writing only<br>wb+ → opens file for writing and reading<br>ab
    → opens file for appending<br>ab+ → opens file for appending and reading |


    # 1.1.4 File Operations


    Different File operations can be performed as follows :-


    +   1. Creation of new file<br>open( ) with “w” attribute<br><br>2. Opening an
    Existing File<br>open( ) with “w” or “r” or “a” attribute<br><br>3. Reading Data
    from file<br>read( ) or readline( ) and readlines( )<br><br>4. Writing data into
    file<br>write( )<br><br>5. Appending Data into file<br>open( ) with “a” attribute'
