  mdcn: "该协议基于请求服务、客户端服务请求以及服务器处理结果响应的基础之上。两个方面之间的通信通过进程间通信（IPC）实现，这促进了客户端和服务器程序的分布式部署。\n\
    \n客户端/服务器模型基本上是与平台无关的，并与\"协作处理\"或\"对等\"模型相融合。该平台为用户提供了访问业务功能的机会，但这也使其暴露于风险之中，因为它对底层技术和用户来说都是透明的。\n\
    \n## 6.11 创建服务器-客户端程序\n\n*客户端和服务器编程基础*\n\n（请注意，对于客户端/服务器连接，你需要在 Linux 中安装 Python\
    \ 3.4 或更高版本，然后执行以下步骤。我先在 VMware Workstation 12 Player 中安装了 Linux，然后安装了 Python\
    \ 3.5）\n\n服务器是向你提供或交付特定服务的东西，而客户端是请求该服务的一方。\n\n为了实现客户端和服务器连接，我们需要以下四个基本要素：\n\n\
    - 1. 套接字（TCP 或用户自定义协议）\n- 2. 绑定\n- 3. 监听\n- 4. 接受\n\n套接字通常是两个实体之间连接的端点，它充当客户端和服务器之间的桥梁。首先客户端将连接到套接字，那将是实际的服务器套接字，然后它才会连接到服务器。现在我们需要基本的协议，即\
    \ TCP。我们需要使用以下命令在 Python 终端中导入已经存在于 Python 库中的 socket 模块\n\n```\n>>>import socket\n\
    >>>s=socket.socket(socket.AF_INET,socket.SOCK_STREAM)\n```\n\n我们创建了套接字的完整实现，它访问两个参数：第一个是地址族，即\
    \ AF_INET，另一个是实际的协议，即 TCP。现在下一步是绑定，什么是绑定？绑定告诉服务器它应该在哪里连接，以便它可以提供服务，这可以使用以下命令轻松完成\n\
    \n```\n>>>s.bind((\"127.0.0.1\",8000))\n```\n\n它需要两个参数：一个是 IP 地址，另一个是它将要连接的端口。现在下一步是监听，什么是监听？监听意味着我们告诉服务器开始监听来自客户端的连接或请求，使用以下命令\n\
    \n```\n>>>s.listen(2)\n```\n\n2 意味着它将能够同时处理两个客户端，通过这种方式，我们实际上可以在运行时连接两个客户端。最后一步是接受，这里服务器实际接受来自客户端的连接。\n\
    \n```\n>>>(client,(ip,port))=s.accept()\n```\n\n我们创建了一个客户端套接字，这意味着每当建立连接或即将建立与服务器的连接时，会生成一个单独的客户端套接字，它告诉服务器是哪个客户端实际连接了，这仅仅表示服务器将能够区分两个客户端之间的连接。另一个重要的是\
    \ IP 端口，它作为一个阻塞语句接受，并且将一直等待直到我收到任何类型的连接。我们可以使用 net cat 工具（即 nc）来建立连接，为此你在 Linux\
    \ 中打开另一个新的终端窗口并输入以下命令：\n\n```\n$ nc 127.0.0.1 8000\n```\n\n现在，一旦你在之前的窗口中按下回车键，它会显示\
    \ Python 提示符，即\n\n```\n>>>\n```\n\n在这里你输入 client 并按下回车键，它显示\n\n```\n>>>client\n\
