    # 3.2 Regular Expression Patterns


    Regular Expression are categorized into many types, which are as follows :-


    1. *Simple Patterns*

    Regular expressions are used to operate on strings, hence we will see matching
    characters.


    2. *Matching Characters*

    Letters and characters will simply match themselves. For example, the regular
    expression python will match the string python exactly.

    List of the metacharacters

    .`^$*+?{}[]|()

    [ and ] used for specifying a **character class**, which is a set of characters
    that you wish to match. Characters can be listed individually, or a range of characters
    can be indicated by giving two characters and separating them by a ''-''.

    **[abc]** or **[a-c]** will match any of the characters **a**, **b**, or **c**;'
  - '[PAGE 71]


    [a-z] to match only lowercase letters **from a to z**.


    Most important metacharacter is the **backslash**, \. As in Python string literals,
    the backslash can be followed by various characters to signal various special
    sequences. It''s also used to escape all the metacharacters so you can still match
    them in patterns; for example, if you need to match a [ or \, you can precede
    them with a backslash to remove their special meaning: \[ or \.


    # 3. Repeating Things


    The first **metacharacter for repeating things** that we will see *. * doesn''t
    match the literal character *; instead, it specifies that the previous character
    can be matched zero or more times, instead of exactly once.


    For example, ca*t will match ct (0 a characters), cat (1 a), caaat (3 a characters),
    and followed by t character.


    **Another repeating metacharacter is +**, which matches one or more times. Difference
    between * and +; * matches zero or more times, so whatever''s being repeated may
    not be present at all, while + requires at least one occurrence. To use a similar
    example, ca+t will match cat (1 a), caaat (3 a''s), but won''t match ct.


    There are two more repeating qualifiers. **The question mark character, ?, matches
    either once or zero times.**


    # Regular-expression Patterns


    Except for control characters, (+ ? . * ^ $ ( ) [ ] { } | \), all characters match
    themselves. You can escape a control character by preceding it with a backslash.


    Following table lists the regular expression syntax that is available in Python:


    # Regular Expression Patterns


    | Pattern | Description |

    | :--- | :--- |

    | ^ | Matches beginning of line. |

    | $ | Matches end of line. |

    | . | Matches any single character except newline. Using m option allows it to
    match newline as well. |

    | [...] | Matches any single character in brackets. |

    | [^...] | Matches any single character not in brackets |

    | re* | Matches 0 or more occurrences of preceding expression. |

    | re+ | Matches 1 or more occurrence of preceding expression. |

    | re? | Matches 0 or 1 occurrence of preceding expression. |

    | re{ n} | Matches exactly n number of occurrences of preceding expression. |

    | re{ n,} | Matches n or more occurrences of preceding expression. |

    | re{ n, m} | Matches at least n and at most m occurrences of preceding expression.
    |

    | a| b | Matches either a or b. |

    | (re) | Groups regular expressions and remembers matched text. |

    | (?imx) | Temporarily toggles on i, m, or x options within a regular expression.
    If in parentheses, only that area is affected. |'
