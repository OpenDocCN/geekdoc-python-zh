    \n- 数据库管理系统是一个基于从不同来源收集的相关信息的系统。它允许高效处理数据，例如：过滤记录、生成报告、标签、重新排列、查询等。\n\n- 数据库是相关数据的组织化集合，通常存储在磁盘上，并可供许多并发用户访问。\n\
