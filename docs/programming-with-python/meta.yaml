- md: "# Bottle\n\nBottle is a tiny, lightweight Web framework\n\n## Use of Bottle\
    \ in Python\n\nBottle is used for routing, templates, access to request and response\
    \ data, support for multiple server types from plain old CGI on up, and support\
    \ for more advanced features like WebSockets.\n\n# Invoke\n\nInvoke allows you\
    \ to perform admin tasks using a Python library.\n\n## Use of Invoke in Python\n\
    \nInvoke provides common-sense solutions to take command-line tasks and manage\
    \ them as if they were Python functions, allowing bigger items to be elegantly\
    \ built around them.\n\n# Splinter\n\nSplinter is a Python library for testing\
    \ Web applications by automating interactions with them.\n\n## Use of Splinter\
    \ in Python\n\nSplinter automates everything end to end, invoking the browser,\
    \ passing URLs, filling out forms, clicking buttons, and so on.\n\nIt requires\
    \ drivers to work with a specific browser, but Chrome and Firefox are already\
    \ covered, and it can use Selenium Remote to control a browser running elsewhere.\n\
    \nSplinter is useful if you want to find out how specific browsers behave when\
    \ confronted with a given website.\n\n# Arrow\n\nThe Arrow library sorts out the\
    \ mess that is Python's date/time handling.\n\n## Use of Arrow in Python\n\nDealing\
    \ with time zones, date conversions, date formats, and all the rest are a headache\
    \ and a half. With Python's standard library for date/time work, you get two headaches.\n\
    \n# Peewee\n\nPeewee is a small but powerful library for accessing databases,\
    \ with native support for MySQL etc.\n\n## Use of Peewee in Python\n\nPeewee provides\
    \ a safe, programmatic path to access database resources, using a set of Python\
    \ classes. With Peewee, a quick-and-dirty way to access a database can be later\
    \ expanded to a more robust option without having to rip it out and start over.\n\
    \n# 4.3. Layout Manager\n\nPython Tkinter GUI provides us flexibility and total\
    \ control over the layout of our components. For this purpose it provides three\
    \ types of Layout managers i.e. the simplest one is Pack layout manager, more\
    \ logical layout manager is grid, and there is also place layout manager. These\
    \ layout managers help in arranging, managing, controlling and registering different\
    \ python tkinter widgets on the screen. The outlook is dependent on the operating\
    \ system used but the basic structure remains same. One important point to note\
    \ is Pack, grid and Place are never mixed in one window.\n\n## 4.3.1 Pack Layout\n\
    \n```\nfrom tkinter import *\nmaster = Tk()\nLabel(master, text=\"Python\", bg=\"\
    blue\", fg=\"white\").pack()\nLabel(master, text=\"Linux \", bg=\"black\", fg=\"\
    white\").pack()\nLabel(master, text=\"Java \", bg=\"pink\", fg=\"black\").pack()\n\
    mainloop()\n```\n\n![](img/19353aba2f109d1f7c4c239afb8fa982_90_0.png)\n\n## 4.3.2\
    \ Grid Layout\n\n```\nfrom tkinter import *\nbg = ['pink','brown','indigo','teal','red','yellow']\n\
    counter = 0\nfor color in bg:\n    Label(text=color, relief=RIDGE,width=23).grid(row=counter,column=0)\n\
    \    Entry(bg=color, relief=SUNKEN,width=18).grid(row=counter,column=1)\n    counter+=1\n\
    ```\n\n![](img/19353aba2f109d1f7c4c239afb8fa982_90_1.png)\n\n# 4.4. Event and\
    \ Bindings\n\n## Events\n\nIn computing an event is an action that is usually\
    \ initiated outside the scope of a program and that is handled by a piece of code\
    \ inside the program. Events include for example mouse clicks, mouse movements\
    \ or a keystroke of a user, i.e. he or she presses a key on the keyboard. Another\
    \ source can be a hardware device such as a timer.\n\n## 4.4.1 Bind Event\n\n\
    Events are given as strings, using a special event syntax:\n<modifier-type-detail>\n\
    The type field is the most important part of an event specifier. It specifies\
    \ the kind of event that we wish to bind, and can be user actions like *Button*,\
    \ and *Key*, or window manager events like *Enter*, *Configure*, and others.\n\
    \n## Bind\n\nThe binding applies to a single widget only; if you create new frames,\
    \ they will not inherit the bindings.\nBut tkinter also allows you to create bindings\
    \ on the class and application level; in fact, you can create bindings on four\
    \ different levels:\n- the widget instance, using **bind**.\n- the widget's toplevel\
    \ window (Toplevel or root), also using **bind**.\n- the widget class, using **bind_class**\
    \ (this is used by Tkinter to provide standard bindings).\n- the whole application,\
    \ using **bind_all**.\n\nFor example, you can use bind_all to create a binding\
    \ for the F1 key, so you can provide help everywhere in the application. But what\
    \ happens if you create multiple bindings for the same key, or provide overlapping\
    \ bindings? First, on each of these four levels, tkinter chooses the “closest\
    \ match” of the available bindings. For example, if you create instance bindings\
    \ for the <Key> and <Return> events, only the second binding will be called if\
    \ you press the **Enter** key.\n\nA tkinter application spends most of its time\
    \ inside an event loop (entered via the mainloop method). Events can come from\
    \ various sources, including key presses and mouse operations by the user. For\
    \ each widget, you can bind Python functions and methods to events.\n\n```\nwidget.bind(event,\
    \ handler)\n```\n\nIf an event matching the *event* description occurs in the\
    \ widget, the given *handler* is called with an object describing the event.\n\
    \n### 4.4.1 Bind event\n\n### 4.4.2 Motion event\n\n## Example\n\n## Bind event\n\
    \nProgram name eventnbind.py\n\n![](img/19353aba2f109d1f7c4c239afb8fa982_91_0.png)\n\
    \n## Output\n\n![](img/19353aba2f109d1f7c4c239afb8fa982_92_0.png)\n\nIn above\
    \ program we create one button widget which is bind to function name as hello\
    \ and other function name is quit which is activated when we double click the\
    \ mouse, at that time program terminates and we got python prompt i.e. >>>\n\n\
    ## 4.4.2 motion event\n\n![](img/19353aba2f109d1f7c4c239afb8fa982_92_1.png)\n\n\
    ## Output\n\nIn the motion event program first we create one motion widget and\
    \ afterward we bind the same to function name as motion(event) here we show the\
    \ exact mouse coordinates i.e. x,y with the help of message Mouse position : event.x,event.y.\
    \ Also we define background as green (bg='lightgreen') and font size, name as\
    \ times, 24 respectively.\n\n![](img/19353aba2f109d1f7c4c239afb8fa982_93_0.png)\n\
    \n# 4.5. Drawing on Canvas\n\nThe Canvas widget provides structured graphics facilities\
    \ for Tkinter. This is a highly versatile widget which can be used to draw graphs\
    \ and plots, create graphics editors, and implement various kinds of custom widgets.\
    \ like a rectangular area projected for drawing pictures or other complicated\
    \ layouts.\n\n## Syntax\n\n```\nc = Canvas(master, option=value,...)\n```\n\n\
    ## Parameters\n\n- master = means parent window\n- option= there are many options\
    \ available which are given in the below table\n\n## 4.5.1 Canvas Widget Option\n\
    \n| Option | Description |\n| :--- | :--- |\n| bd or borderwidth | Width of the\
    \ border around the outside of the canvas; The default is two pixels. |\n| bg\
    \ or background | Background color of the canvas. Default is a light gray, about\
    \ '#E4E4E4'. |\n| closeenough | A float that specifies how close the mouse must\
    \ be to an item to be considered inside it. Default is 1.0. |\n| confine | If\
    \ true (the default), the canvas cannot be scrolled outside of the scrollregion\
    \ (see below). |\n| cursor | Cursor used in the canvas. |\n| height | Size of\
    \ the canvas in the Y dimension.. |\n| highlightbackground | Color of the focus\
    \ highlight when the widget does not have focus. |\n| highlightcolor | Color shown\
    \ in the focus highlight. |\n| highlightthickness | Thickness of the focus highlight.\
    \ The default value is 1. |\n| relief | The relief style of the canvas. Default\
    \ is tk.FLAT. |\n| scrollregion | A tuple (w, n, e, s) that defines over how large\
    \ an area the canvas can be scrolled, where w is the left side, n the top, e the\
    \ right side, and s the bottom. |\n| selectbackground | The background color to\
    \ use displaying selected items. |\n| selectborderwidth | The width of the border\
    \ to use around selected items. |\n| selectforeground | The foreground color to\
    \ use displaying selected items. |\n| takefocus | Normally, focus (see Section\
    \ 53, \"Focus: routing keyboard input\") will cycle through this widget with the\
    \ tab key only if there are keyboard bindings set for it. If you set this option\
    \ to 1, focus will always visit this widget. Set it to \"\" to get the default\
    \ behavior. |\n| width | Size of the canvas in the X dimension. |\n| xscrollincrement\
    \ | Normally, canvases can be scrolled horizontally to any position. You can get\
    \ this behavior by setting xscrollincrement to zero. If you set this option to\
    \ some positive dimension, the canvas can be positioned only on multiples of that\
    \ distance, and the value will be used for scrolling by scrolling units, such\
    \ as when the user clicks on the arrows at the ends of a scrollbar. For more information\
    \ on scrolling units, see Section 22, \"The Scrollbar widget\". |\n| xscrollcommand\
    \ | If the canvas is scrollable, set this option to the .set() method of the horizontal\
    \ scrollbar. |\n| yscrollincrement | Works like xscrollincrement, but governs\
    \ vertical movement. |\n| yscrollcommand | If the canvas is scrollable, this option\
    \ should be the .set() method of the vertical scrollbar. |\n\n## 4.5.2 Canvas\
    \ Items\n\nThe Canvas widget supports the following standard items:\n- line\n\
    - oval (a circle or an ellipse)\n- rectangle\n- polygon\n- text"
  mdcn: "# Bottle\n\nBottle 是一个微小、轻量级的 Web 框架。\n\n## Bottle 在 Python 中的使用\n\nBottle\
    \ 用于路由、模板、访问请求和响应数据、支持从普通旧式 CGI 到更高级的服务器类型，并支持 WebSockets 等更高级的功能。\n\n# Invoke\n\
    \nInvoke 允许你使用 Python 库执行管理任务。\n\n## Invoke 在 Python 中的使用\n\nInvoke 为将命令行任务作为\
    \ Python 函数进行管理提供了合乎常理的解决方案，允许围绕它们优雅地构建更大的项目。\n\n# Splinter\n\nSplinter 是一个 Python\
    \ 库，用于通过自动化交互来测试 Web 应用程序。\n\n## Splinter 在 Python 中的使用\n\nSplinter 自动化端到端的一切，包括调用浏览器、传递\
    \ URL、填写表单、点击按钮等。\n\n它需要驱动程序来与特定的浏览器配合工作，但 Chrome 和 Firefox 已经包含在内，并且它可以使用 Selenium\
    \ Remote 来控制在其他地方运行的浏览器。\n\n如果你想知道特定浏览器在面对给定网站时的行为，Splinter 非常有用。\n\n# Arrow\n\
    \nArrow 库理清了 Python 日期/时间处理的混乱局面。\n\n## Arrow 在 Python 中的使用\n\n处理时区、日期转换、日期格式以及其他所有事情都令人头疼。使用\
    \ Python 的标准库进行日期/时间处理，则是双重头疼。\n\n# Peewee\n\nPeewee 是一个虽小但功能强大的数据库访问库，原生支持 MySQL\
    \ 等数据库。\n\n## Peewee 在 Python 中的使用\n\nPeewee 使用一组 Python 类提供了一条安全、编程化的路径来访问数据库资源。通过\
    \ Peewee，一种快速粗糙的数据库访问方式日后可以扩展到更健壮的选项，而无需将其拆除并重新开始。\n\n# 4.3. 布局管理器\n\nPython Tkinter\
    \ GUI 为我们提供了对组件布局的灵活性和完全控制。为此，它提供了三种类型的布局管理器：即最简单的是 Pack 布局管理器，更符合逻辑的布局管理器是 Grid，还有\
    \ Place 布局管理器。这些布局管理器有助于在屏幕上排列、管理、控制和注册不同的 Python Tkinter 小部件。外观取决于所使用的操作系统，但基本结构保持不变。需要注意的一点是，Pack、Grid\
    \ 和 Place 永远不会在一个窗口中混合使用。\n\n## 4.3.1 Pack 布局\n\n```\nfrom tkinter import *\n\
    master = Tk()\nLabel(master, text=\"Python\", bg=\"blue\", fg=\"white\").pack()\n\
    Label(master, text=\"Linux \", bg=\"black\", fg=\"white\").pack()\nLabel(master,\
    \ text=\"Java \", bg=\"pink\", fg=\"black\").pack()\nmainloop()\n```\n\n![](img/19353aba2f109d1f7c4c239afb8fa982_90_0.png)\n\
    \n## 4.3.2 Grid 布局\n\n```\nfrom tkinter import *\nbg = ['pink','brown','indigo','teal','red','yellow']\n\
    counter = 0\nfor color in bg:\n    Label(text=color, relief=RIDGE,width=23).grid(row=counter,column=0)\n\
    \    Entry(bg=color, relief=SUNKEN,width=18).grid(row=counter,column=1)\n    counter+=1\n\
    ```\n\n![](img/19353aba2f109d1f7c4c239afb8fa982_90_1.png)\n\n# 4.4. 事件与绑定\n\n\
    ## 事件\n\n在计算中，事件是一个通常由程序范围外发起并由程序内的代码处理的操作。事件包括例如鼠标点击、鼠标移动或用户的按键动作，即他或她在键盘上按下某个键。另一个来源可能是硬件设备，如计时器。\n\
    \n## 4.4.1 绑定事件\n\n事件以字符串形式给出，使用特殊的事件语法：\n`<修饰符-类型-详情>`\n类型字段是事件指定符中最重要的部分。它指定我们希望绑定的事件类型，可以是用户操作，如\
    \ *Button* 和 *Key*，也可以是窗口管理器事件，如 *Enter*、*Configure* 等。\n\n## 绑定\n\n绑定仅适用于单个小部件；如果你创建新的框架，它们不会继承这些绑定。\n\
    但 tkinter 也允许你在类和应用程序级别创建绑定；事实上，你可以在四个不同的级别创建绑定：\n- 使用 **bind** 在小部件实例级别。\n- 使用\
    \ **bind** 在小部件的顶层窗口（Toplevel 或 root）级别。\n- 使用 **bind_class** 在小部件类级别（Tkinter\
    \ 使用此方式提供标准绑定）。\n- 使用 **bind_all** 在整个应用程序级别。\n\n例如，你可以使用 `bind_all` 为 F1 键创建绑定，从而可以在应用程序的任何地方提供帮助。但是，如果你为同一个键创建多个绑定，或者提供重叠的绑定，会发生什么？首先，在这四个级别中的每一个，tkinter\
    \ 都会选择可用绑定的“最接近匹配”。例如，如果你为 `<Key>` 和 `<Return>` 事件创建了实例绑定，那么当你按下 **Enter** 键时，只会调用第二个绑定。\n\
    \n一个 tkinter 应用程序大部分时间都在事件循环内运行（通过 `mainloop` 方法进入）。事件可能来自各种来源，包括用户的按键和鼠标操作。对于每个小部件，你可以将\
    \ Python 函数和方法绑定到事件上。\n\n```\nwidget.bind(event, handler)\n```\n\n如果小部件中发生与 *event*\
    \ 描述匹配的事件，给定的 *handler* 将会接收到一个描述该事件的对象并被调用。\n\n### 4.4.1 绑定事件\n\n### 4.4.2 移动事件\n\
    \n## 示例\n\n## 绑定事件\n\n程序名 eventnbind.py\n\n![](img/19353aba2f109d1f7c4c239afb8fa982_91_0.png)\n\
    \n## 输出\n\n![](img/19353aba2f109d1f7c4c239afb8fa982_92_0.png)\n\n在上面的程序中，我们创建了一个按钮小部件，它被绑定到名为\
    \ `hello` 的函数，另一个名为 `quit` 的函数在双击鼠标时被激活，此时程序终止，我们得到 Python 提示符，即 `>>>`。\n\n##\
    \ 4.4.2 移动事件\n\n![](img/19353aba2f109d1f7c4c239afb8fa982_92_1.png)\n\n## 输出\n\n\
    在移动事件程序中，我们首先创建一个移动小部件，然后将其绑定到名为 `motion(event)` 的函数。在这里，我们借助消息 `Mouse position\
    \ : event.x,event.y` 显示了确切的鼠标坐标，即 x, y。同时，我们将背景定义为绿色（`bg='lightgreen'`），字体大小和名称分别设置为\
    \ 24 和 Times。\n\n![](img/19353aba2f109d1f7c4c239afb8fa982_93_0.png)\n\n# 4.5.\
    \ 在画布上绘制\n\nCanvas 小部件为 Tkinter 提供了结构化的图形功能。这是一个用途非常广泛的小部件，可用于绘制图形和图表、创建图形编辑器，以及实现各种自定义小部件。就像一个用于绘制图片或其他复杂布局的矩形区域。\n\
    \n## 语法\n\n```\nc = Canvas(master, option=value,...)\n```\n\n## 参数\n\n- master\
    \ = 父窗口\n- option= 有许多可用选项，见下表\n\n## 4.5.1 Canvas 小部件选项\n\n| 选项 | 描述 |\n| :---\
    \ | :--- |\n| bd 或 borderwidth | 画布外部边框的宽度；默认为两个像素。 |\n| bg 或 background | 画布的背景颜色。默认为浅灰色，约为\
    \ '#E4E4E4'。 |\n| closeenough | 一个浮点数，指定鼠标必须离项目多近才被视为在其内部。默认为 1.0。 |\n| confine\
    \ | 如果为 true（默认值），画布不能滚动出 scrollregion（见下文）。 |\n| cursor | 画布中使用的光标。 |\n| height\
    \ | 画布在 Y 维度的大小。 |\n| highlightbackground | 小部件没有焦点时，焦点高亮显示的颜色。 |\n| highlightcolor\
    \ | 焦点高亮显示中显示的颜色。 |\n| highlightthickness | 焦点高亮显示的厚度。默认值为 1。 |\n| relief | 画布的浮雕样式。默认为\
    \ tk.FLAT。 |\n| scrollregion | 一个元组 (w, n, e, s)，定义画布可以滚动的区域大小，其中 w 是左侧，n 是顶部，e\
    \ 是右侧，s 是底部。 |\n| selectbackground | 显示选中项目时使用的背景颜色。 |\n| selectborderwidth |\
    \ 选中项目周围使用的边框宽度。 |\n| selectforeground | 显示选中项目时使用的前景颜色。 |\n| takefocus | 通常，焦点（参见第\
    \ 53 节，“焦点：路由键盘输入”）仅在为小部件设置了键盘绑定时，才会通过 Tab 键循环到此小部件。如果将此选项设置为 1，焦点将始终访问此小部件。设置为\
    \ \"\" 以获得默认行为。 |\n| width | 画布在 X 维度的大小。 |\n| xscrollincrement | 通常，画布可以水平滚动到任何位置。通过将\
