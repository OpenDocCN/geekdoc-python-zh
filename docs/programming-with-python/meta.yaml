    # 1.2 Opening and Closing Text Files


    We are reading and writing to the standard input and output till now but next
    we will see how to play with actual data files.

    Python provides basic functions and methods necessary to manipulate files by default.
    You can do your most of the file manipulation using a **file** object.

    For opening and closing a file respectively **open( )** and **close( )** method
    is used.


    # 1.2.1 Opening of File Using Open( )


    **The open Function**

    Before you can read or write a file, you have to open it using Python''s built-in
    *open()* function. This function creates a **file** object, which would be utilized
    to call other support methods associated with it.


    **Syntax**

    `file object = open(file_name [, access_mode][, buffering])`


    **Here is paramters'' detail**


    +   - **file_name**: The file_name argument is a string value that contains the
    name of the file that you want to access.

    - **access_mode**: The access_mode determines the mode in which the file has to
    be opened, i.e., read, write, append, etc. A complete list of possible values
    is given below in the table of section 1.3. This is optional parameter and the
    default file access mode is read (r).

    - **buffering**: If the buffering value is set to 0, no buffering will take place.
    If the buffering value is 1, line buffering will be performed while accessing
    a file. If you specify the buffering value as an integer greater than 1, then
    buffering action will be performed with the indicated buffer size. If negative,
    the buffer size is the system default(default behavior).


    **Example**


    ```

    # Open a file in write mode

    >>> fobj=open( “kiran.txt”,”w”)

    Where fobj is a File object, open is a python function with specified file name
    and mode of penning a file. Open function returns file object.


    # Other way to Open a file in write mode by using with Keyword

    >>> with open( “kiran.txt”,”w”) as fobj:

    Where fobj is a File object, open is a python function with specified file name
    and mode of penning a file. Open function returns file object.

    ```'
