    \nWhen we run above program, it produces following result –\n\n![](img/19353aba2f109d1f7c4c239afb8fa982_81_1.png)\n\
    \n## 3.6 Matching vs Searching\n\n**match() versus search()**\n\nThe **match(\
    \ )** function only checks if the RE matches at the beginning of the string while\
    \ **search()** will scan forward through the string for a match. match() will\
    \ only report a successful match which will start at 0; if the match wouldn't\
    \ start at zero, match() will not report it.\n\n```\n>>> print(re.match('super',\
    \ 'superstition').span())\n(0, 5)\n```\n\n```\n>>> print(re.match('super', 'insuperable'))\n\
    None\n```\n\n**On the other hand, search() will scan forward through the string,\
    \ reporting the first match it finds.**\n\n```\n>>> print(re.search('super', 'superstition').span())\n\
    (0, 5)\n```\n\n```\n>>> print(re.search('super', 'insuperable').span())\n(2, 7)\n\
    ```\n\n### Example of Matching vs Searching\n\n### Code\n\n```\n#!/usr/bin/python\n\
    import re\nline = \"Cats are smarter than dogs\";\nmatchObj = re.match( r'dogs',\
    \ line, re.M|re.I)\nif matchObj:\n    print ('match --> matchObj.group() : ',\
    \ matchObj.group( ))\nelse:\n    print ('No match!!')\nsearchObj = re.search(\
    \ r'dogs', line, re.M|re.I)\nif searchObj:\n    print ('search --> searchObj.group()\
    \ : ', searchObj.group( ))\nelse:\n    print ('Nothing found!!')\n```\n\n```\n\
    python\n#!/usr/bin/python\nimport re\nline = \"Cats are smarter than dogs\";\n\
    matchObj = re.match( r'dogs', line, re.M|re.I)\nif matchObj:\n    print ('match\
