    >>> list({\"kiran\": 1, \"sri\": 2})\n['sri', 'kiran']\n>>>\n```\n\n## 1.11.3\
    \ Creating Your Own Iterator in Python\n\n1.  we can create an iterator in Python.\
    \ To create an iterator we have to implement the methods `__iter__()` and `__next__()`.\n\
    2.  The `__iter__()` method returns the iterator object itself. If required, some\
    \ initialization can be performed.\n3.  The `__next__()` method must return the\
    \ next item in the sequence. On reaching the end, and in subsequent calls, it\
    \ must raise `StopIteration`.\n\nIn this example that will give us next power\
    \ of 2 in each iteration. Power exponent starts from zero up to a user set number.\
    \ Here we are creating a class to implement an iterator of powers of two.\n\n\
    ```python\nclass PowerofTwo:\n    def __init__(self, max = 0):\n        self.max\
    \ = max\n\n    def __iter__(self):\n        self.n = 0\n        return self\n\n\
    \    def __next__(self):\n        if self.n <= self.max:\n            result =\
    \ 2 ** self.n\n            self.n += 1\n            return result\n        else:\n\
    \            raise StopIteration\n```\n\n## Output\n\n![](img/19353aba2f109d1f7c4c239afb8fa982_39_0.png)\n\
    \nWe can also use a **for** loop to iterate over our iterator class.\n\n## 1.11.4\
    \ Python Infinite Iterators\n\nIt is not necessary that the item in an iterator\
    \ object has to exhaust. There can be infinite iterators (which never ends). We\
    \ must be careful when handling such iterator.\n\n### *Example to demonstrate\
    \ infinite iterators.*\n\nThe built in function `iter()` can be called with two\
    \ arguments where the first argument must be a callable object (function) and\
    \ second is the sentinel. The iterator calls this function until the returned\
    \ value is equal to the sentinel.\n\n```python\n>>> int()\n0\n>>> inf = iter(int,1)\n\
    >>> next(inf)\n0\n>>> next(inf)\n0\n```\n\nWe can see that the `int()` function\
    \ always returns 0. So passing it as `iter(int,1)` will return an iterator that\
    \ calls `int()` until the returned value equals 1. This never happens and we get\
    \ an infinite iterator.\n\nWe can also built our own infinite iterators. The following\
    \ iterator will, return all the odd numbers.\n\n![](img/19353aba2f109d1f7c4c239afb8fa982_40_0.png)\n\
    \nA sample run would be as follows.\n\n```python\na = iter(InfIter())\n>>> next(a)\n\
    1\n>>> next(a)\n3\n>>> next(a)\n5\n>>> next(a)\n7\nAnd so on...\n```\n\nBe careful\
    \ to include a terminating condition, when iterating over these type of infinite\
    \ iterators.\n\nThe advantage of using iterators is that they save resources.\
    \ As shown above in example, we could get all the odd numbers without storing\
    \ the entire number system in memory. We can have infinite items (theoretically)\
    \ in finite memory.\n\n## 1.11.5 Generators\n\nGenerators simplifies creation\
    \ of iterators. A generator is a function that produces a sequence of results\
    \ instead of a single value.\n\n```python\ndef yrange(n):\n    i = 0\n    while\
    \ i < n:\n        yield i\n        i += 1\n```\n\nEach time the yield statement\
    \ is executed the function generates a new value.\n\n```python\n>>> y = yrange(3)\n\
    >>> y\n<generator object yrange at 0x401f30>\n>>> y.next()\n0\n>>> y.next()\n\
    1\n>>> y.next()\n2\n>>> y.next()\nTraceback (most recent call last):\n  File \"\
    <stdin>\", line 1, in <module>\nStopIteration\n```\n\nSo a generator is also an\
    \ iterator. You don’t have to worry about the iterator protocol.\n\nThe word “generator”\
    \ mean both the function that generates and what it generates. When a generator\
    \ function is called, it returns a generator object without even beginning execution\
    \ of the function. When next method is called for the first time, the function\
    \ starts executing until it reaches yield statement. The yielded value is returned\
    \ by the next call.\n\nThe following example demonstrates the interplay between\
    \ yield and call to next method on generator object.\n\n```python\n>>> def foo():\n\
    ...     print \"begin\"\n...     for i in range(3):\n...         print \"before\
    \ yield\", i\n...         yield i\n...         print \"after yield\", i\n... \
    \    print \"end\"\n...\n```\n\n```python\n>>> f = foo()\n>>> f.next()\nbegin\n\
    before yield 0\n0\n>>> f.next()\nafter yield 0\nbefore yield 1\n1\n>>> f.next()\n\
    after yield 1\nbefore yield 2\n2\n>>> f.next()\nafter yield 2\nend\nTraceback\
    \ (most recent call last):\n  File \"<stdin>\", line 1, in <module>\nStopIteration\n\
    >>>\n```\n\n## 1.12 Iterations and their Problem Solving Applications\n\nIn this\
    \ case, we use iterators. The code is cleaner.\nIn the following example, we create\
    \ our own object that will implement the iterator protocol.\n\n```python\n#!/usr/bin/python\n\
    \n# iterator.py\n\nclass seq:\n    def __init__(self):\n        self.x = 0\n\n\
    \    def next(self):\n        self.x += 1\n        return self.x**self.x\n\n \
    \   def __iter__(self):\n        return self\n\ns = seq()\nn = 0\nfor i in s:\n\
    \    print i\n    n += 1\n    if n > 10:\n        break\n```\n\nIn the code example,\
    \ we create a sequence of numbers 1, 4, 27, 256, ... . This demonstrates that\
    \ with iterators, we can work with infinite sequences. The for statement calls\
    \ the `iter()` function on the container object. The function returns an iterator\
    \ object that defines the method `next()` which accesses elements in the container\
    \ one at a time.\n\n```python\ndef next(self):\n    self.x += 1\n    return self.x**self.x\n\
    ```\n\nThe `next()` method returns the next element of a sequence.\n\n```python\n\
    def __iter__(self):\n    return self\n```\n\nThe `__iter__` method returns the\
    \ iterator object.\n\n```python\nif n > 10:\n    break\n```\n\nBecause we are\
    \ working with an infinite sequence, we must interrupt the for loop.\n\n```text\n\
    $ ./iterator.py\n1\n4\n27\n256\n3125\n46656\n823543\n16777216\n387420489\n10000000000\n\
    285311670611\n```\n\n## 1.13 Questions\n\n1.  What is Text file, Write syntax\
