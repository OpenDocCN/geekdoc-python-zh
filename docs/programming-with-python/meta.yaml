- md: '# 4.6.3 Checkbox Widget


    The Checkbutton widget is used to display a more number of options to a user,
    the user can then select one or more than one options. We can also use images
    to display in place of text.


    ## Syntax


    ```

    w=Checkbutton(master,option,...)

    ```


    ## Parameters


    - master: This represents the parent window.

    - options: Here is the list of most commonly used options for this widget, which
    are given below:


    | Option | Description |

    |---|---|

    | activebackground | Background color when the checkbutton is under the cursor.
    |

    | activeforeground | Foreground color when the checkbutton is under the cursor.
    |

    | bg | The normal background color displayed behind the label and indicator. |

    | bitmap | To display a monochrome image on a button. |

    | bd | The size of the border around the indicator. Default is 2 pixels. |

    | command | A procedure to be called every time the user changes the state of
    this checkbutton. |

    | cursor | If you set this option to a cursor name (arrow, dot etc.), the mouse
    cursor will change to that pattern when it is over the checkbutton. |

    | font | The font used for the text. |

    | fg | The color used to render the text. |

    | height | The number of lines of text on the checkbutton. Default is 1. |

    | highlightcolor | The color of the focus highlight when the checkbutton has the
    focus. |

    | image | To display a graphic image on the button. |

    | justify | If the text contains multiple lines, this option controls how the
    text is justified: CENTER, LEFT, or RIGHT. |

    | offvalue | Normally, a checkbutton''s associated control variable will be set
    to 0 when it is cleared (off). You can supply an alternate value for the off state
    by setting offvalue to that value. |

    | onvalue | Normally, a checkbutton''s associated control variable will be set
    to 1 when it is set (on). You can supply an alternate value for the on state by
    setting onvalue to that value. |

    | padx | How much space to leave to the left and right of the checkbutton and
    text. Default is 1 pixel. |

    | pady | How much space to leave above and below the checkbutton and text. Default
    is 1 pixel. |

    | relief | With the default value, relief=FLAT, the checkbutton does not stand
    out from its background. You may set this option to any of the other styles. |

    | state | The default is state=NORMAL, but you can use state=DISABLED to gray
    out the control and make it unresponsive. If the cursor is currently over the
    checkbutton, the state is ACTIVE. |

    | text | The label displayed next to the checkbutton. Use newlines ("\n") to display
    multiple lines of text. |

    | underline | With the default value of -1, none of the characters of the text
    label are underlined. Set this option to the index of a character in the text
    (counting from zero) to underline that character. |

    | variable | The control variable that tracks the current state of the checkbutton.
    Normally this variable is an IntVar, and 0 means cleared and 1 means set, but
    see the offvalue and onvalue options above. |

    | width | The default width of a checkbutton is determined by the size of the
    displayed image or text. You can set this option to a number of characters and
    the checkbutton will always have room for that many characters. |

    | wraplength | Normally, lines are not wrapped. You can set this option to a number
    of characters and all lines will be broken into pieces no longer than that number.
    |


    Most commonly used methods for checkbox widget


    | Method | Description |

    |---|---|

    | deselect() | Clears (turns off) the checkbutton. |

    | flash() | Flashes the checkbutton a few times between its active and normal
    colors, but leaves it the way it started. |

    | invoke() | You can call this method to get the same actions that would occur
    if the user clicked on the checkbutton to change its state. |

    | select() | Sets (turns on) the checkbutton. |

    | toggle() | Clears the checkbutton if set, sets it if cleared. |


    ![](img/19353aba2f109d1f7c4c239afb8fa982_107_0.png)


    Lets see the program line by line.


    ```

    from tkinter import *

    cb=Tk()

    ```


    Importing tkinter and invoking the cb widget to take control of overall gui framework
    in our program.


    ```

    var1 = IntVar()

    ```


    var1 is a variable, we may name it differently, like check_1 etc. But it is always
    better to name a variable which explains the purpose.


    ```

    var2 = IntVar()

    ```


    Declaration of second variable in python gui.


    ```

    Checkbutton(cb, text="Male",variable=var1).grid(row=0,sticky=W)

    ```


    This is the part of code where actual work of creating and placing a checkbox
    is taking place. Checkbutton is the function / method which takes master widget
    as an argument, and a text string to be shown against the checkbox and a variable
    to store the value of checkbox. grid is the placement of checkbutton on the main
    gui. If we change the row position then it change the checkbox accordingly. Row=0
    indicate first checkbox and so on.


    ```

    Checkbutton(cb, text="Female",variable=var2).grid(row=1,sticky=W)

    ```


    Creation of second checkbox just like the first one.


    # 4.6.4 Entry widget


    The **Entry** widget is a standard tkinter widget used to enter or display a single
    line of text. If you want to enter multiple lines of text, you have to use the
    text widget. An entry widget is also limited to single font.


    ## Syntax


    ```

    w = Entry(master, option, ... )

    ```


    "master" represents the parent window, where the entry widget should be placed.
    The comma separated list of options can be empty.


    Example of entry widget Program name : **entry.py**


    ```

    from tkinter import *


    master = Tk()

    Label(master, text="Enter your First Name").grid(row=0)

    Label(master, text="Enter your Last Name").grid(row=1)


    e1 = Entry(master)

    e2 = Entry(master)


    e1.grid(row=0, column=1)

    e2.grid(row=1, column=1)


    mainloop( )

    ```


    ![](img/19353aba2f109d1f7c4c239afb8fa982_109_0.png)


    # 4.6.5 List box widget


    The purpose of a listbox widget is to display a set of lines of text. Generally
    they are intended to allow the user to select one or more items from a list. All
    the lines of text use the same font.


    ## Syntax


    ```

    w = tk.Listbox(parent,option,...)

    ```


    ## Listbox Widget Options


    | Option | Description |

    |---|---|

    | activestyle | ''underline'': The active line is underlined. This is the default
    option. ''dotbox'': The active line is enclosed in a dotted line on all four sides.
    "none": The active line is given no special appearance. |

    | bg or background | Set the background color in the listbox. |

    | bd or borderwidth | Set the width of the border around the listbox. Default
    is two pixels. |

    | cursor | Set the cursor that appears when the mouse is over the listbox. |

    | disabledforeground | The color of the text in the listbox when its state is
    tk.DISABLED. |

    | exportselection | By default, the user may select text with the mouse, and the
    selected text will be exported to the clipboard. To disable this behavior, use
    exportselection=0. |

    | font | The font used for the text in the listbox. |

    | fg or foreground | The color used for the text in the listbox. |

    | height | Number of lines (not pixels!) shown in the listbox. Default is 10.
    |

    | highlightbackground | Color of the focus highlight when the widget does not
    have focus. |

    | highlightcolor | Color shown in the focus highlight when the widget has the
    focus. |

    | highlightthickness | Thickness of the focus highlight. |

    | relief | Selects three-dimensional border shading effects. The default is tk.SUNKEN.
