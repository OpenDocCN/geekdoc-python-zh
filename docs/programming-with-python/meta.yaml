  md: "# Simple Connectionless Server\n\n```\nfrom socket import socket, AF_INET,\
    \ SOCK_DGRAM\ns = socket(AF_INET, SOCK_DGRAM)\ns.bind(('127.0.0.1', 11111))\n\
    while True:\n    data, addr = s.recvfrom(1024)\n    print \"Connection from\"\
    , addr\n    s.sendto(data.upper(), addr)\n```\n\nNote that the `bind()` argument\
    \ is a two-element tuple of address and port number\n\nIt's more usual to import\
    \ the whole socket library and use qualified names, but the **from** statement\
    \ is a convenient way to access only specific names from a module\n\n```\nimport\
    \ socket\ns = socket.socket(socket.AF_INET, socket.SOCK_DGRAM)\n```\n\nNote carefully\
    \ that the `bind()` call takes a single argument, a tuple containing an IP address\
    \ string and a port number. If the IP address is the empty string then the code\
    \ will bind to all interfaces, which is how most servers actually start up. The\
    \ example above is a little more secure, since only local processes can connect\
    \ via the local loopback interface.\n\n# Simple Connectionless Client\n\n```\n\
    from socket import socket, AF_INET, SOCK_DGRAM\ns = socket(AF_INET, SOCK_DGRAM)\n\
    s.bind(('127.0.0.1', 0)) # OS chooses port\nprint \"using\", s.getsocketname()\n\
    server = ('127.0.0.1', 11111)\ns.sendto(\"MixedCaseString\", server)\ndata, addr\
    \ = s.recvfrom(1024)\nprint \"received\", data, \"from\", addr\ns.close()\n```\n\
    \nThe client specifies port number zero to indicate that it simply wants an ephemeral\
    \ port – this is more efficient than attempting to use a specific port number\
    \ because the port requested might already be in use and then the `bind()` call\
    \ would fail.\n\nThe `getsocketname()` call tells the user the address and port\
    \ number being used for the client end of the communication. While this isn't\
    \ an essential part of the program it's useful debugging data.\n\nThe client simply\
    \ sends the data and (usually) receives a reply from the server. This particular\
    \ program is somewhat inadequate in terms of error checking: if the server's response\
    \ is somehow lost then the client will hang forever."
