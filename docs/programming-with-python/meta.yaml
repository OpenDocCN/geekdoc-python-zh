    # 5.11.2 Read Operation


    READ Operation on any database means to fetch some useful information from the
    database.

    Once connection is established, we can query into database. You can use either
    **fetchone()** method to fetch single record or **fetchall()** method to fetch
    multiple values from a database table.


    +   - **fetchone()**: It fetches the next row of a query result set. A result
    set is an object that is returned when a cursor object is used to query a table.

    - **fetchall()**: It fetches all the rows in a result set. If some rows have already
    been extracted from the result set, then it retrieves the remaining rows from
    the result set.'
