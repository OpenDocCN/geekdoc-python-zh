    ## 4.6.7 Label widget


    A Label is a Tkinter Widget class, which is used to display text or an image.
    The label is a widget that the user just views but not interact with.


    ### Syntax


    ```python

    w = Label ( master, option, ... )

    ```


    ### Parameters


    - **master**: This represents the parent window.

    - **options**: Here is the list of most commonly used options for this widget.
    These options can be used as key-value pairs separated by commas.


    | Option | Description |

    |---|---|

    | Anchor | This options controls where the text is positioned if the widget has
    more space than the text needs. The default is anchor=CENTER, which centers the
    text in the available space. |

    | Bg | The normal background color displayed behind the label and indicator. |

    | Bitmap | Set this option equal to a bitmap or image object and the label will
    display that graphic. |

    | bd | The size of the border around the indicator. Default is 2 pixels. |

    | Cursor | If you set this option to a cursor name (arrow, dot etc.), the mouse
    cursor will change to that pattern when it is over the checkbutton. |

    | Font | If you are displaying text in this label (with the text or textvariable
    option, the font option specifies in what font that text will be displayed. |

    | fg | If you are displaying text or a bitmap in this label, this option specifies
    the color of the text. If you are displaying a bitmap, this is the color that
    will appear at the position of the 1-bits in the bitmap. |

    | Height | The vertical dimension of the new frame. |

    | Image | To display a static image in the label widget, set this option to an
    image object. |

    | Justify | Specifies how multiple lines of text will be aligned with respect
    to each other: LEFT for flush left, CENTER for centered (the default), or RIGHT
    for right-justified. |

    | Padx | Extra space added to the left and right of the text within the widget.
    Default is 1. |

    | Pady | Extra space added above and below the text within the widget. Default
    is 1. |

    | Relief | Specifies the appearance of a decorative border around the label. The
    default is FLAT; for other values. |

    | Text | To display one or more lines of text in a label widget, set this option
    to a string containing the text. Internal newlines ("\n") will force a line break.
    |

    | Textvariable | To slave the text displayed in a label widget to a control variable
    of class StringVar, set this option to that variable. |

    | Underline | You can display an underline ( _ ) below the nth letter of the text,
    counting from 0, by setting this option to n. The default is underline=-1, which
    means no underlining. |

    | Width | Width of the label in characters (not pixels!). If this option is not
    set, the label will be sized to fit its contents. |

    | Wraplength | You can limit the number of characters in each line by setting
    this option to the desired number. The default value, 0, means that lines will
    be broken only at newlines. |'
  mdcn: '## 4.6.5 列表框控件


    | 属性 | 描述 |

    |------|------|

    | selectborderwidth | 选中文本周围边框的宽度。默认情况下，选中项以纯色块 `selectbackground` 显示；如果增加 `selectborderwidth`，条目之间的间距会变大，并且选中条目会显示
    `tk.RAISED` 浮雕效果。 |

    | selectforeground | 用于显示选中文本的前景色。 |

    | selectmode | 确定可以选择多少个项目，以及鼠标拖动如何影响选择：<br>▶ `tk.BROWSE`：通常，你只能从列表框中选择一行。如果你点击一个项目然后拖动到另一行，选择将跟随鼠标。这是默认模式。<br>▶
    `tk.SINGLE`：你只能选择一行，并且不能拖动鼠标——无论你点击按钮1的哪个位置，那一行都会被选中。<br>▶ `tk.MULTIPLE`：你可以一次选择任意数量的行。点击任何一行会切换其选中状态。<br>▶
    `tk.EXTENDED`：你可以通过点击第一行并拖动到最后一行来一次选择任意相邻的一组行。 |

    | state | 默认情况下，列表框处于 `tk.NORMAL` 状态。要使列表框不响应鼠标事件，请将此选项设置为 `tk.DISABLED`。 |

    | takefocus | 通常，焦点会通过 Tab 键在列表框控件之间切换。将此选项设置为 0 可将该控件从序列中移除。 |

    | width | 控件的宽度，以字符为单位（不是像素！）。宽度基于平均字符，因此在比例字体中，某些此长度的字符串可能无法容纳。默认值为 20。 |

    | xscrollcommand | 如果你想允许用户水平滚动列表框，可以将你的列表框控件链接到水平滚动条。将此选项设置为滚动条的 `.set` 方法。 |

    | yscrollcommand | 如果你想允许用户垂直滚动列表框，可以将你的列表框控件链接到垂直滚动条。将此选项设置为滚动条的 `.set` 方法。 |


    ### 列表框对象的方法


    | 选项 | 描述 |

    |--------|-------------|

    | delete ( first, last=None ) | 删除索引在 [first, last] 范围内的行。如果省略第二个参数，则删除索引为 first
    的单行。 |

    | get ( first, last=None ) | 返回一个元组，包含从 first 到 last（包含）索引的行的文本。如果省略第二个参数，则返回最接近
    first 的行的文本。 |

    | index ( i ) | 如果可能，调整列表框的可见部分，使包含索引 i 的行位于控件的顶部。 |

    | insert ( index, *elements ) | 在列表框中指定索引的行之前插入一行或多行新行。如果你想将新行添加到列表框的末尾，请使用 `END`
    作为第一个参数。 |

    | nearest ( y ) | 返回相对于列表框控件，y 坐标 y 最近的可见行的索引。 |

    | see ( index ) | 调整列表框的位置，使索引引用的行可见。 |

    | size() | 返回列表框中的行数。 |

    | xview() | 要使列表框可水平滚动，请将关联水平滚动条的 `command` 选项设置为此方法。 |

    | xview_moveto ( fraction ) | 滚动列表框，使其最长行的宽度的最左侧 fraction 部分位于列表框左侧之外。Fraction
    的范围是 [0,1]。 |

    | xview_scroll ( number, what ) | 水平滚动列表框。对于 `what` 参数，使用 `UNITS` 按字符滚动，或使用 `PAGES`
    按页滚动（即按列表框的宽度）。`number` 参数指定滚动的数量。 |


    ### Listb.py


    ```python

    from tkinter import *

    import tkMessageBox

    import tkinter

    top = Tk()

    Lb1 = Listbox(top)

    Lb1.insert(1, "List Item-1")

    Lb1.insert(2, "List Item-2")

    Lb1.insert(3, "List Item-3")

    Lb1.pack()

    top.mainloop()

    ```


    ![](img/19353aba2f109d1f7c4c239afb8fa982_111_0.png)


    ## 4.6.6 框架控件


    框架基本上只是一个用于容纳其他控件的容器，负责安排其他控件的位置。你的应用程序的根窗口基本上就是一个框架。框架控件对于分组和组织其他控件的过程非常重要。


    ### 语法


    ```python

    w = Frame ( master, option, ... )

    ```


    ### 参数


    - **master**：这表示父窗口。

    - **options**：这是此控件最常用选项的列表。这些选项可以用逗号分隔的键值对形式使用。


    | 选项 | 描述 |

    |--------|-------------|

    | bg | 标签和指示器后面显示的正常背景色。 |

    | bd | 指示器周围边框的大小。默认为 2 像素。 |

    | Cursor | 如果你将此选项设置为光标名称（箭头、点等），当鼠标悬停在复选按钮上时，鼠标光标将更改为该图案。 |

    | Height | 新框架的垂直尺寸。 |

    | highlightbackground | 框架没有焦点时，焦点高亮的颜色。 |

    | Highlightcolor | 框架获得焦点时，焦点高亮中显示的颜色。 |

    | Highlightthickness | 焦点高亮的粗细。 |

    | Relief | 使用默认值 `relief=FLAT` 时，复选按钮不会从其背景中突出显示。你可以将此选项设置为任何其他样式。 |

    | Width | 复选按钮的默认宽度由显示的图像或文本的大小决定。你可以将此选项设置为字符数，复选按钮将始终为该数量的字符留出空间。 |


    ### 示例：frame.py


    ![](img/19353aba2f109d1f7c4c239afb8fa982_112_0.png)


    ## 4.6.7 标签控件


    标签是一个 Tkinter 控件类，用于显示文本或图像。标签是用户只能查看而不能交互的控件。


    ### 语法


    ```python

    w = Label ( master, option, ... )

    ```


    ### 参数


    - **master**：这表示父窗口。

    - **options**：这是此控件最常用选项的列表。这些选项可以用逗号分隔的键值对形式使用。


    | 选项 | 描述 |

    |---|---|

    | Anchor | 此选项控制当控件的空间大于文本所需空间时，文本的位置。默认值为 `anchor=CENTER`，将文本居中放置在可用空间中。 |

    | Bg | 标签和指示器后面显示的正常背景色。 |

    | Bitmap | 将此选项设置为位图或图像对象，标签将显示该图形。 |

    | bd | 指示器周围边框的大小。默认为 2 像素。 |

    | Cursor | 如果你将此选项设置为光标名称（箭头、点等），当鼠标悬停在复选按钮上时，鼠标光标将更改为该图案。 |

    | Font | 如果你在此标签中显示文本（使用 `text` 或 `textvariable` 选项），`font` 选项指定该文本将以何种字体显示。 |

    | fg | 如果你在此标签中显示文本或位图，此选项指定文本的颜色。如果你显示的是位图，这将是位图中 1 位位置出现的颜色。 |

    | Height | 新框架的垂直尺寸。 |

    | Image | 要在标签控件中显示静态图像，请将此选项设置为图像对象。 |

    | Justify | 指定多行文本如何相互对齐：`LEFT` 左对齐，`CENTER` 居中（默认），或 `RIGHT` 右对齐。 |

    | Padx | 在控件内文本左右添加的额外空间。默认值为 1。 |

    | Pady | 在控件内文本上下添加的额外空间。默认值为 1。 |

    | Relief | 指定标签周围装饰性边框的外观。默认值为 `FLAT`；其他值请参见相关文档。 |

    | Text | 要在标签控件中显示一行或多行文本，请将此选项设置为包含文本的字符串。内部换行符（`"\n"`）将强制换行。 |

    | Textvariable | 要将标签控件中显示的文本链接到 `StringVar` 类的控制变量，请将此选项设置为该变量。 |

    | Underline | 你可以通过将此选项设置为 n（从 0 开始计数）来在文本的第 n 个字母下方显示下划线（ _ ）。默认值为 `underline=-1`，表示不显示下划线。
    |

    | Width | 标签的宽度，以字符为单位（不是像素！）。如果未设置此选项，标签将调整大小以适应其内容。 |

    | Wraplength | 你可以通过将此选项设置为所需的数字来限制每行的字符数。默认值 0 表示仅在换行符处换行。 |'
