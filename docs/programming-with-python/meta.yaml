    \ | 使用GNU dbm库 |\n\ndbm模块在创建**新的持久化字典**时将选择可用的最佳实现。在**读取文件**时。\n\n### 5.1.3 创建持久化目录\n\
    \n所有dbm模块都支持一个**open函数**来**创建新的dbm对象**。一旦打开，您可以**在字典中存储数据**、**读取数据**、**关闭dbm**、**删除项**以及**测试字典中是否存在键**。\n\
    \n要打开dbm持久化字典，请在您选择的模块上使用open函数。\n\n例如，您可以使用dbm模块创建一个持久化字典。\n\n#### 创建持久化字典的程序\n\
    \n```python\nimport dbm\ndb = dbm.open('websites', 'c')\n# 添加一个项目。\ndb['www.python.org']\
