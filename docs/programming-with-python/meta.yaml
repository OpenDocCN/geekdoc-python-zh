  md: '# 3.7 Introduction to Regular Expression Search and Replace


    # Search and Replace


    Some of the most important re methods that use regular expressions is sub.


    # Syntax


    ```

    re.sub(pattern, repl, string, max=0)

    ```


    This method replaces all occurrences of the RE pattern in string with repl, substituting
    all occurrences unless max provided. This method would return modified string.


    # Example of Search & Replace


    # Code


    ```

    #!/usr/bin/python

    import re

    phone = "2004-959-559 # This is Phone Number"

    # Delete Python-style comments

    num = re.sub(r''#.*$'', '''', phone)

    print (''Phone Num : '', (num))

    # Remove anything other than digits

    num = re.sub(r''\D'', '''', phone)

