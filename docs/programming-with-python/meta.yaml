    \n# 6.8 What is Socket\n\nSockets are the endpoints of a two-way communications\
    \ channel. Sockets can be configured to act as a server and listen for incoming\
    \ messages, or connect to other applications as a *client*. When both ends of\
    \ a TCP/IP socket are connected then communication is bi-directional i.e. two-way\
    \ communication and we get the reply from other end.\n\nSockets may be implemented\
    \ using Unix/Linux domain sockets, TCP, User define protocol(UDP) and so on. The\
    \ socket library provides the common transports as well as a generic interface\
    \ for handling the entire or specific classes for handling.\n\n| Term | Description\
    \ |\n| :--- | :--- |\n| domain | The family of protocols that is used as the transport\
    \ mechanism. These values are constants such as AF_INET, PF_INET, PF_UNIX, PF_X25,\
    \ and so on. |\n| type | The type of communications between the two endpoints,\
    \ typically SOCK_STREAM for connection-oriented protocols and SOCK_DGRAM for connectionless\
    \ protocols. |\n| protocol | Typically zero, this may be used to identify a variant\
    \ of a protocol within a domain and type. |\n| hostname | The identifier of a\
    \ network interface:<br>A string, which can be a host name, a dotted-quad address,\
    \ or an IPV6 address in colon (and possibly dot) notation<br>A string \"<broadcast>\"\
    , which specifies an INADDR_BROADCAST address.<br>A zero-length string, which\
    \ specifies INADDR_ANY, or<br>An Integer, interpreted as a binary address in host\
    \ byte order. |\n| port | Each server listens for clients calling on one or more\
    \ ports. A port may be a Fixnum port number, a string containing a port number,\
    \ or the name of a service |\n\nA socket is a software abstraction, provides a\
    \ communication link between a single server process and a single client process."
