  md: '# # PREFACE


    Python is a widely used high-level programming language used for general-purpose
    programming, created by Guido van Rossum and first released in 1991. Python has
    a design philosophy which emphasizes code readability (notably using whitespace
    indentation to delimit code blocks rather than curly braces or keywords), and
    a syntax which allows programmers to express concepts in fewer lines of code than
    possible in languages such as C++ or Java.


    Python is an interpreted, object-oriented, high-level programming language with
    dynamic semantics. Its high-level built-in data structures, combined with dynamic
    typing and dynamic binding, make it very attractive for Rapid Application Development,
    as well as for use as a scripting or glue language to connect existing components
    together.


    Python supports modules and packages, which encourages program modularity and
    code reuse. The Python interpreter and the extensive standard library are available
    in source or binary form without charge for all major platforms, and can be freely
    distributed.


    Python 2.0 was released on 16 October 2000 and had many major new features. Python
    3.0 (which early in its development was commonly referred to as Python 3000 or
    py3k).


