    # COMMIT Operation


    Commit is the operation, which gives a confirmation for finalize changes saved
    permanently in a database. Once commit statement is executed, no change can be
    reverted back.


    Here is a simple example to call commit method.


    ```

    `db.commit()`

    ```


    # ROLLBACK Operation


    If any DML statement Like insert, update and delete If you want to revert back
    those changes completely, then use rollback() method is used. Here is a simple
    example to call rollback() method.


    ```

    `db.rollback()`

    ```


    # Disconnecting Database


    To disconnect Database connection, use close() method.


    ```

    `db.close()`

    ```


    If the connection to a database is closed by the user with the close() method,
    any outstanding transactions are rolled back by the DB.


