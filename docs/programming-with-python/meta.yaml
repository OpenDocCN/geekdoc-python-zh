    After that, you create an object for each widget (in this case, Label). The Label
    is then arranged in the parent window. Finally, the widget is displayed.


    The Widget Construction Kit (WCK) is a simple programming interface that you can
    use to create new widgets in Python. The WCK is currently available for the tkinter
    library, but implementations for other environments are perfectly possible. To
    create a more expressive widget, you have to create a subclass of the Widget base
    class, and implement necessary drawing and event handling methods.


    The major unit of a tkinter GUI is a Widget. You can use the "built-in" widgets
