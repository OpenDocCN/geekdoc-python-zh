    S` | 匹配非空白字符。 |\n| `\\d` | 匹配数字。等同于 `[0-9]`。 |\n| `\\D` | 匹配非数字字符。 |\n| `\\A`\
    \ | 匹配字符串开头。 |\n| `\\Z` | 匹配字符串结尾。如果存在换行符，则匹配换行符之前的位置。 |\n| `\\z` | 匹配字符串结尾。 |\n\
    | `\\G` | 匹配上一次匹配结束的位置。 |\n| `\\b` | 在方括号外时，匹配单词边界。在方括号内时，匹配退格符 (0x08)。 |\n| `\\\
    B` | 匹配非单词边界。 |\n| `\\n`, `\\t`, 等。 | 匹配换行符、回车符、制表符等。 |\n| `\\1...\\9` | 匹配第 `n`\
    \ 个分组的子表达式。 |\n| `\\10` | 如果第 `n` 个分组的子表达式已匹配，则匹配它。否则，它表示字符代码的八进制表示。 |\n\n## 正则表达式示例\n\
    \n### 字面字符：\n\n| 示例 | 描述 |\n|---------|-------------|\n| `python` | 匹配 \"python\"\
    。 |\n\n### 字符类：\n\n| 示例 | 描述 |\n|---------|-------------|\n| `[Pp]ython` | 匹配\
    \ \"Python\" 或 \"python\" |\n| `rub[ye]` | 匹配 \"ruby\" 或 \"rube\" |\n| `[aeiou]`\
    \ | 匹配任意一个小写元音字母 |\n| `[0-9]` | 匹配任意一个数字；等同于 `[0123456789]` |\n| `[a-z]` | 匹配任意一个小写\
    \ ASCII 字母 |\n| `[A-Z]` | 匹配任意一个大写 ASCII 字母 |\n| `[a-zA-Z0-9]` | 匹配上述任意一个 |\n\
    | `[^aeiou]` | 匹配除小写元音字母外的任意字符 |\n| `[^0-9]` | 匹配除数字外的任意字符 |\n\n### 特殊字符类：\n\n\
    | 示例 | 描述 |\n| --- | --- |\n| `.` | 匹配除换行符外的任意字符 |\n| `\\d` | 匹配一个数字：`[0-9]` |\n\
    | `\\D` | 匹配一个非数字：`[^0-9]` |\n| `\\s` | 匹配一个空白字符：`[ \\t\\r\\n\\f]` |\n| `\\S`\
    \ | 匹配非空白字符：`[^ \\t\\r\\n\\f]` |\n| `\\w` | 匹配一个单词字符：`[A-Za-z0-9_]` |\n| `\\W`\
    \ | 匹配一个非单词字符：`[^A-Za-z0-9_]` |\n\n### 重复案例：\n\n| 示例 | 描述 |\n| --- | --- |\n|\
    \ `ruby?` | 匹配 \"rub\" 或 \"ruby\"：`y` 是可选的 |\n| `ruby*` | 匹配 \"rub\" 加上 0 个或多个\
    \ `y` |\n| `ruby+` | 匹配 \"rub\" 加上 1 个或多个 `y` |\n| `\\d{3}` | 精确匹配 3 个数字 |\n|\
    \ `\\d{3,}` | 匹配 3 个或更多数字 |\n| `\\d{3,5}` | 匹配 3、4 或 5 个数字 |\n\n### 非贪婪重复：\n\n\
    此模式匹配最小数量的重复：\n\n| 示例 | 描述 |\n| --- | --- |\n| `<.*>` | 贪婪重复：匹配 \"<python>perl>\"\
