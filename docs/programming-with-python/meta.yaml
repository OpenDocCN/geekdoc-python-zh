    \ 会匹配 `Kiran`、`kiran` 或 `kirAN`。\n\n## L\n## LOCALE\n使 `\\w`、`\\W`、`\\b` 和 `\\\
    B` 依赖于当前区域设置，而不是 Unicode 数据库。\n\n例如，如果你正在处理法语文本，你可能希望能够编写 `\\w+` 来匹配单词，但 `\\w`\
    \ 只匹配字符类 `[A-Za-z]`；它不会匹配 `é` 或 `ç`。如果你的系统配置正确并选择了法语区域设置，某些 C 函数会告诉程序 `é` 也应该被视为一个字母。\n\
    \n## M\n## MULTILINE\n通常 `^` 仅匹配字符串的开头，`$` 仅匹配字符串的结尾以及字符串结尾换行符（如果有）之前的位置。\n\n\
    ## S\n## DOTALL\n使 `.` 特殊字符匹配任何字符，包括换行符；没有此标志时，`.` 将匹配除换行符之外的任何字符。\n\n## A\n##\
    \ ASCII\n使 `\\w`、`\\W`、`\\b`、`\\B`、`\\s` 和 `\\S` 仅执行 ASCII 匹配，而不是完整的 Unicode 匹配。这只对\
    \ Unicode 模式有意义，对字节模式会被忽略。\n\n## X\n## VERBOSE\n此标志允许你通过提供更大的格式灵活性来编写更具可读性的正则表达式。指定此标志后，正则表达式字符串中的空格将被忽略，除非空格位于字符类中或前面没有未转义的反斜杠；这使你可以更清晰地组织和缩进正则表达式。此标志还允许你在正则表达式中放置将被引擎忽略的注释；注释由既不在字符类中也没有未转义反斜杠前置的\
    \ `#` 标记。\n\n## 3.3 正则表达式 [re] 模块\n- **re 模块** 用于在 Python 中进行正则表达式操作。\n- 使用 re\
    \ 正则表达式，模式和要搜索的字符串都可以是 Unicode 字符串或 8 位字符串。\n- 大多数正则表达式操作既可作为模块级函数，也可作为编译后的正则表达式对象的方法使用。\n\
    - 一个正则表达式（或 RE）指定了匹配它的字符串集合；此模块中的函数让你检查特定字符串是否匹配给定的正则表达式。\n- re 有两个重要函数：\n   \
    \ - **match()**\n    - **search()**\n- 我们可以在 re 模块中使用所有正则表达式模式。\n\n## 3.4 各种类型的正则表达式\n\
    基于 POSIX（“UNIX 的可移植操作系统接口”），有不同类型的正则表达式。\n\n1. **POSIX 基本正则表达式**\n2. **POSIX 扩展正则表达式**\n\
    \n### POSIX 基本正则表达式\nPOSIX 是可移植操作系统接口，它定义了一系列标准，规定了一个（UNIX）操作系统应支持的功能。这些标准定义了两种风格的正则表达式。涉及正则表达式的命令，如\
    \ `grep` 和 `egrep`，都使用基本正则表达式。\n\n`grep` 是 Unix 和 Linux 中的全局正则表达式工具，支持不同的正则表达式模式。像\
    \ **字符串匹配模式** `?`、`.`、`^`、`*`、`+`、`$`、`[]` 等每个字符都有特殊含义。\n\n`egrep` 是 Unix 和 Linux\
    \ 中的扩展全局正则表达式工具，除了上述模式外，还支持使用 `|`（管道）符号来比较两个或多个模式。\n\n### POSIX 扩展正则表达式\n扩展正则表达式（ERE）标准化了与\
    \ UNIX `egrep` 命令使用的类似语法。“扩展”是相对于原始的 UNIX `grep`（它只有方括号表达式、点、脱字符、美元符号和星号）而言的。ERE\
    \ 支持 `grep` 的所有正则表达式，并带有一些扩展。\n\n因此，`egrep` 和 POSIX ERE 在不使用反斜杠的情况下添加了额外的元字符。你可以使用反斜杠来抑制所有元字符的含义。\n\
    \n`Grep`、`egrep`、`sed`、`awk` 都使用扩展正则表达式。\n\n**量词** `?`、`+`、`{n}`、`{n,m}` 和 `{n,}`\
    \ 分别将前面的标记重复零次或一次、一次或更多次、n 次、介于 n 和 m 次之间以及 n 次或更多次。\n\n在 `egrep` 中通过竖线 `|` 支持用于多模式匹配的扩展正则表达式。括号创建一个分组，例如\
    \ `(abc){2}` 匹配 `abcabc`。\n\n## 3.5 正则表达式的不同方法\n### 3.5.1 match() 方法\n此函数尝试使用可选标志将\
    \ RE 模式与字符串匹配。\n\n该函数的语法如下：\n\n```python\nre.match(pattern, string, flags=0)\n\
    ```\n\n参数说明如下：\n\n| 参数 | 描述 |\n| --- | --- |\n| pattern | 这是要匹配的正则表达式。 |\n| string\
    \ | 这是要搜索的字符串，将在字符串开头匹配模式。 |\n| flags | 你可以使用按位或 (|) 指定不同的标志。这些是修饰符，列于下表。 |\n\n\
    `re.match` 函数成功时返回一个匹配对象，失败时返回 `None`。我们将使用匹配对象的 `group(num)` 或 `groups()` 函数来获取匹配的表达式。\n\
    \n| 匹配对象方法 | 描述 |\n| --- | --- |\n| group(num=0) | 此方法返回整个匹配（或特定的子组 num）。 |\n\
    | groups() | 此方法以元组形式返回所有匹配的子组（如果没有则为空）。 |\n\n#### match 函数示例\n\n**代码**\n\n```python\n\
    #!/usr/bin/python\nimport re\n\nline = \"Cats are smarter than dogs\"\n\nmatchObj\
    \ = re.match( r'(.*) are (.*?) .*', line, re.M|re.I)\n\nif matchObj:\n    print\
    \ ('matchObj.group() :', (matchObj.group()))\n    print ('matchObj.group(1) :',\
    \ (matchObj.group(1)))\n    print ('matchObj.group(2) :', (matchObj.group(2)))\n\
    else:\n    print ('No match!!')\n```\n\n![img](img/19353aba2f109d1f7c4c239afb8fa982_78_0.png)\n\
    \n**输出**\n\n![img](img/19353aba2f109d1f7c4c239afb8fa982_78_1.png)\n\n![img](img/19353aba2f109d1f7c4c239afb8fa982_79_0.png)\n\
    \n### 3.5.2 search() 方法\n此函数在字符串中搜索 RE 模式的第一次出现，可以使用可选标志。\n\n该函数的语法如下：\n\n`re.search(pattern,\
    \ string, flags=0)`\n\n参数说明如下：\n\n| 参数 | 描述 |\n| --- | --- |\n| **pattern** |\
    \ 这是要匹配的正则表达式。 |\n| **string** | 这是要搜索的字符串，将在字符串中的任何位置匹配模式。 |\n| **flags** | 你可以使用按位或\
    \ (|) 指定不同的标志。这些是修饰符，列于下表。 |\n\n`re.search` 函数成功时返回一个匹配对象。我们将使用匹配对象的 `group(num)`\
    \ 或 `groups()` 函数来获取匹配的表达式。\n\n| 匹配对象方法 | 描述 |\n| --- | --- |\n| **group(num=0)**\
    \ | 此方法返回整个匹配（或特定的子组 num）。 |\n| **groups()** | 此方法以元组形式返回所有匹配的子组（如果没有则为空）。 |\n\
    \n#### search 函数示例\n\n**代码**\n\n```python\n#!/usr/bin/python\nimport re\n\nline\
    \ = \"Cats are smarter than dogs\";\nsearchObj = re.search( r'(.*) are (.*?) .*',\
    \ line, re.M|re.I)\n\nif searchObj:\n    print ('searchObj.group() : ', (searchObj.group()))\n\
    \    print ('searchObj.group(1) : ', (searchObj.group(1)))\n    print ('searchObj.group(2)\
    \ : ', (searchObj.group(2)))\nelse:\n    print ('Nothing found!!')\n```\n\n**输出**\n\
    \n```\n==================\n>>>\nmatchObj.group() : Cats are smarter than dogs\n\
    matchObj.group(1) : Cats\nmatchObj.group(2) : smarter\n>>> ==================\
    \ RESTART ==================\n==================\n>>>\nsearchObj.group() : Cats\
    \ are smarter than dogs\nsearchObj.group(1) : Cats\nsearchObj.group(2) : smarter\n\
    >>> |\n```\n\n```\nPython 2.7.13 (v2.7.13:a06454b1afa1, Dec 17 2016, 20:42:59)\
