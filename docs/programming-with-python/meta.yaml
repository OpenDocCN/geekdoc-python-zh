    \ also called regex or regexp, is originated in theoretical computer science.\n\
    - The module `re` provides full support for Perl-like regular expressions in Python.\
    \ The `re` module raises the exception `re.error` if an error occurs while compiling\
    \ or using a regular expression.\n- Regular expression patterns are compiled into\
