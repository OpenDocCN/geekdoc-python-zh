  mdcn: "## 事务属性\n\n数据库系统中的事务必须维护原子性、一致性、隔离性和持久性。事务通过 `COMMIT` 或 `ROLLBACK` SQL 语句完成，这些语句表示事务的开始或结束。当事务成功完成时，数据库更改被称为已提交。当事务未完成时，更改将被回滚。\n\
    \n例如，从一个银行账户向另一个账户转账需要对数据库进行两次更改，这两次更改必须同时成功或同时失败。\n\n## 事务处理过程\n\n事务作为一系列对数据库对象的读写操作来执行，具体说明如下：\n\
    \n### 读操作\n\n要读取一个数据库对象，首先将其从磁盘加载到主内存中，然后将其值复制到程序变量中，如图所示。\n\n### 写操作\n\n要写入一个数据库对象，首先修改该对象的内存副本，然后将其写入磁盘。\n\
    \n## 事务属性\n\n事务是确保数据一致性的一种机制。事务具有以下四个属性：\n\n1.  **原子性：（全有或全无）** 如果一个事务总是要么执行其所有操作，要么根本不执行任何操作，则称该事务是原子的。这意味着事务的所有操作要么全部执行，要么全部不执行。要么事务完成，要么什么也不发生。\n\
    \n2.  **一致性：（不违反完整性约束）** 事务在执行后必须保持数据库的一致性。DBMS 假定此属性对每个事务都成立。确保事务的此属性是用户的责任。事务必须从一个一致的状态开始，并使系统处于一致的状态结束。\n\
    \n3.  **隔离性：（并发更改不可见）** 事务的行为必须如同它们是隔离执行的。这意味着如果多个事务并发执行，其结果必须与它们按某种顺序串行执行的结果相同。在第一个事务完成之前，第二个事务不能使用第一个事务执行期间使用的数据。事务的中间结果在当前事务外部不可见。\n\
    \n4.  **持久性：（已提交的更新持久化）** 已完成或已提交事务的效果即使在崩溃后也应持续存在。这意味着一旦事务提交，系统必须保证其操作结果永远不会丢失，无论后续发生什么故障。一旦事务被提交，其效果就是持久的，即使在系统故障之后也是如此。\n\
    \nPython DB API 2.0 提供了两种方法来 *提交* 或 *回滚* 事务。\n\n## 5.12.1 执行事务\n\n示例\n\n你已经知道如何实现事务了。这里再举一个类似的例子：\n\
    \n示例\n\n在此示例中，数据库事务中使用了异常处理，如果事务未执行，它将被回滚。\n\n## 输出\n\n## COMMIT 操作\n\n提交是确认将更改永久保存到数据库中的操作。一旦执行了\
    \ `COMMIT` 语句，任何更改都无法恢复。\n\n这是一个调用 **commit** 方法的简单示例。\n\n```\ndb.commit()\n```\n\
    \n## ROLLBACK 操作\n\n如果任何 DML 语句（如 `INSERT`、`UPDATE` 和 `DELETE`）你想完全恢复这些更改，那么使用\
    \ **rollback()** 方法。这是一个调用 **rollback()** 方法的简单示例。\n\n```\ndb.rollback()\n```\n\
    \n## 断开数据库连接\n\n要断开数据库连接，请使用 **close()** 方法。\n\n```\ndb.close()\n```\n\n如果用户使用\
    \ `close()` 方法关闭了与数据库的连接，DB 将回滚任何未完成的事务。\n\n## 5.13 理解数据库连接中的异常\n\n异常是在程序执行期间发生的事件，它会干扰程序的正常流程，因此为了处理这些错误，我们可以根据自己的需求放置消息。\n\
    \n## 文件中的异常处理示例\n\n```\ntry:\n    fob = open(\"kiran.txt\", \"r\")\n    fob.write(\"\
    This is my test file for exception handling!!\")\nexcept IOError:\n    print \"\
    Error: can\\'t find the file or read data\"\nelse:\n    print \"Write operation\
    \ is performed successfully on the file\"\n    fob.close()\n```\n\n## 处理错误\n\n\
    错误有很多来源。一些例子包括执行的 SQL 语句中的语法错误、连接失败，或者对已取消或已完成的语句句柄调用 `fetch` 方法。\n\nDB API 定义了许多必须存在于每个数据库模块中的错误。下表列出了这些异常。\n\
    \n| 异常                | 描述                                                   \
    \              |\n|--------------------|-----------------------------------------------------------------------------|\n\
    | Warning            | 用于非致命问题。必须是 StandardError 的子类。                     |\n\
    | Error              | 错误的基类。必须是 StandardError 的子类。                         |\n\
    | InterfaceError     | 用于数据库模块中的错误，而非数据库本身的错误。必须是 Error 的子类。 |\n| DatabaseError\
    \      | 用于数据库中的错误。必须是 Error 的子类。                        |\n| DataError      \
    \    | DatabaseError 的子类，指数据中的错误。                |\n| OperationalError   | DatabaseError\
    \ 的子类，指诸如与数据库连接丢失之类的错误。这些错误通常超出 Python 脚本编写者的控制范围。 |\n| IntegrityError     | DatabaseError\
    \ 的子类，用于会损害关系完整性的情况，例如唯一性约束或外键。 |\n| InternalError      | DatabaseError 的子类，指数据库模块内部的错误，例如游标不再处于活动状态。\
    \ |\n| ProgrammingError   | DatabaseError 的子类，指诸如错误的表名以及其他可以安全地归咎于你的错误。 |\n| NotSupportedError\
    \  | DatabaseError 的子类，指尝试调用不支持的功能。 |\n\n## 5.14 使用 Sqlite3 进行连接\n\n1.  在 sqlite3\
    \ 中创建数据库\n    $ sqlite3 testDB.db\n\n2.  检查数据库是否已创建\n    sqlite>. databases\n\n\
    ## 3. 创建表\n\n```\nsqlite> CREATE TABLE COMPANY(\nID INT PRIMARY KEY NOT NULL,\n\
    NAME TEXT NOT NULL,\nAGE INT NOT NULL,\nADDRESS CHAR(50),\nSALARY REAL\n);\nsqlite>\
    \ CREATE TABLE DEPARTMENT(\nID INT PRIMARY KEY NOT NULL,\nDEPT CHAR(50) NOT NULL,\n\
    EMP_ID INT NOT NULL\n);\n```\n\n## 4. 查看所有表\n\n```\nsqlite>.tables\n```\n\n##\
    \ 5. 插入记录\n\n```\nINSERT INTO COMPANY (ID,NAME,AGE,ADDRESS,SALARY)\nVALUES (1,\
    \ ‘Paul’, 32, ‘California ‘, 20000.00);\nINSERT INTO DEPARTMENT (ID, DEPT, EMP_ID)\n\
    VALUES (1, ‘IT Billing’, 1);\n```\n\n## 6. 显示所有记录\n\n```\nSelect * from company;\n\
    ```\n\n## 7. 使用 limit 命令\n\n```\nsqlite> SELECT * FROM COMPANY LIMIT 6;\n```\n\
    \n## 8. 使用 offset\n\n```\nsqlite> SELECT * FROM COMPANY LIMIT 3 OFFSET 2;\n```\n\
    \n将跳过前 2 条记录，从第 3 条开始显示 3 条记录。\n\n## 9. 连接\n\n```\nsqlite> SELECT EMP_ID, NAME,\
    \ DEPT FROM COMPANY CROSS JOIN\nDEPARTMENT;\n```\n\n结构化查询语言（SQL）定义了一种用于查询和修改数据库的标准语言。你可以将\
    \ SQL 发音为“sequel”或“s-q-l”。SQL 支持下表列出的基本操作。\n\n## 操作用法\n\n| 操作 | 用法 |\n|-----------|-------|\n\
    | Select | 执行查询以在数据库中搜索特定数据。 |\n| Update | 修改一行或多行，通常基于某个条件。 |\n| Insert | 在数据库中创建新行。\
    \ |\n| Delete | 从数据库中删除一行或多行。 |\n\n通常，这些基本操作被称为 QUID（Query、Update、Insert 和 Delete\
    \ 的缩写）或 CRUD（Create、Read、Update 和 Delete 的缩写）。SQL 提供的功能不止这些基本操作，但大部分情况下，这些是你编写应用程序时将使用的主要操作。\n\
    \n```\nPython 3.4 (command line - 32 bit)\nPython 3.4.3 (v3.4.3:9b73f1c3e601,\
    \ Feb 24 2015, 22:43:06) [MSC v.1600 32 bit (Intel)] on win32\nType \"help\",\
