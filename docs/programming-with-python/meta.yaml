    - 15. 6.15 Questions\n\n### 6.1 What is Network\n\nThe fundamental purpose of\
    \ a communication system is the exchange of data between two parties or exchange\
    \ of data between two communication networks.\n\nA computer network is the infrastructure\
    \ that allows two or more computers (called hosts) to communicate with each other.\
    \ The network achieves this by providing a set of rules for communication, called\
    \ protocols, which should be observed by all participating hosts. The need for\
    \ a protocol should be obvious: it allows different computers from different vendors\
    \ and with different operating characteristics to 'speak the same language'.\n\
    \nFor Networking we should know different network components. Then we should know\
    \ about different network topologies. We should be aware of different types of\
    \ networks: Point to point, multipoint, LANs, WANs, and internetworks (internets).\n\
    \nA communication can be between a workstation (i.e., node or client) and a server\
    \ over a public telephone network. Another example is the exchange of voice channels,\
    \ i.e.: voice signals between two telephones over the same network.\n\n### Key\
    \ Components of Network Communication\n\n- 1. Server (Source)\n- 2. Transmitter\n\
    - 3. Transmission System\n- 4. Receiver\n- 5. Destination\n\n![Network Communication\
