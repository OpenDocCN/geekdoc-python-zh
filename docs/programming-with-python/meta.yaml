  - '[PAGE 127]


    +   Different RDBMS available in the Market:

    1. Oracle

    2. Sybase

    3. Ingress

    4. Db2

    5. Informix


    Hence according to the usage we have to decide whether to use DBM module or Relational
    Database


    The dbm modules work when your data needs can be stored as key/value pairs. If
    You want to work with more complicated data within key/value pairs then it can
    be very difficult to maintain with dbm.


    +   1. If your data needs are simple, use a dbm persistent dictionary.

    2. If you plan to store only a small amount of data, use a dbm persistent dictionary.

    3. If you require support for *transactions*, use a **relational database**.

    4. If you require complex data structures or multiple tables of linked data, use
    a relational database.

    5. Relational databases provide a far richer and more complex API.


    # 5.3 Introduction to SQL Statement


    SQL Commands Are Divided Into 4 Categories:


    +   1. **Data Definition Language (DDL):** Used for Creating and Altering the
    Structure.

    (CREATE, ALTER, DROP, RENAME, TRUNCATE)

    2. **Data Manipulation Language (DML):** Used for Adding and Modifying Data.

    (INSERT, UPDATE, DELETE)

    3. **Data Control Language (DCL):** Used for Controlling Access of the Database
    & transactions.

    (GRANT, REVOKE, ROLLBACK, COMMIT, BEGIN TRANSACTION)

    4. **Data Query Language (DQL):** Used for Querying a Database.

    (SELECT Statement)


    # Syntax and Example of Statement


    *To Create a Table:*


    *Syntax:*


    ```

    CREATE TABLE <Name>

    (<Field1> <Datatype>, <Field 2> <Datatype>);

    ```'
