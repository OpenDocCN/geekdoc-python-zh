    # ## 4.5.8 Coordinate Systems in canvas


    The Canvas widget uses two coordinate systems; the window coordinate system (with
    (0, 0) in the upper left corner), and a canvas coordinate system which specify
    where the items are drawn. By scrolling the canvas, you can specify which part
    of the canvas coordinate system to show in the window.


    The scrollregion option is used to limit scrolling operations for the canvas.
    To set this, we can usually use:


    ```

    canvas.config(scrollregion=canvas.bbox(ALL))

    ```


    to convert from window coordinates to canvas coordinates use the canvasx and canvasy
    methods.


    bbox(item=None)


    Returns the bounding box for all matching items. If the tag is omitted, the bounding
    box for all items is returned. Note that the bounding box is approximate and may
    differ a few pixels from the real value.


    item


    Item specifier. If omitted, the bounding box for all elements on the canvas.


    The Canvas widget also provides two predefined tags:


    +   - ALL (or the string "all") matches all items on the canvas.

    - CURRENT (or "current") matches the item under the mouse pointer, if any. This
    can be used inside mouse event bindings to refer to the item that triggered the
    callback.


    ```

    canvasx(x, gridspacing=None) [#]

    ```


    Converts a window coordinate to a canvas coordinate. i.e. x


    Screen coordinate.


    Gridspacing: Optional grid spacing. The coordinate is rounded to the nearest grid
    coordinate.


    Returns:


    Canvas coordinate.


    ```

    canvassy(y, gridspacing=None) [#]

    ```


    Converts a window coordinate to a canvas coordinate. i.e. y


    Screen coordinate.


    gridspacing : Optional grid spacing. The coordinate is rounded to the nearest
    grid coordinate.'
