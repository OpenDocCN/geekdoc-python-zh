- md: "Logical error is due to wrong solution or wrong logic and syntactic error occurs\
    \ due to poor understanding of language that means syntax mistake. We can detect\
    \ these errors and then can debug them and accordingly can provide error description\
    \ for those errors and these are called as exceptions.\n\nExceptions are run-time\
    \ condition or error that a program may encounter while executing. Errors like\
    \ division by 0 or access to an array outside of its bounds or running out of\
    \ memory or running out of disk space.\n\nThere are two types of exception handling:\n\
    \n- 1. Synchronous\n- 2. Asynchronous\n\nA synchronous exceptions out of range\
    \ index and overflow error can occur. In Asynchronous the events which are beyond\
    \ the control like keyboard interrupts or bad sectors in the disc or hardware\
    \ failure are called as asynchronous exceptions.\n\nThe following task can be\
    \ performed for exception.\n\n- 1. Find the problem (hit the exception)\n- 2.\
    \ Inform that an error has occurred (throw the exception)\n- 3. Receive the error\
    \ information (catch the exception)\n- 4. Take corrective action (handle the exception)\n\
    \n## Syntax Errors\n\nSyntax errors, also known as parsing errors, are perhaps\
    \ the most common kind of complaint you get while you are still learning Python:\n\
    \n```\n>>> while True print 'Hello world'\n  File \"<stdin>\", line 1\n    while\
    \ True print 'Hello world'\n          ^\nSyntaxError: invalid syntax\n```\n\n\
    The parser repeats the offending line and displays a little ‘arrow’ pointing at\
    \ the earliest point in the line where the error was detected. The error is caused\
    \ by (or at least detected at) the token preceding the arrow: in the example,\
    \ the error is detected at the keyword **print**, since a colon (‘:’) is missing\
    \ before it. File name and line number are printed so you know where to look in\
    \ case the input came from a script.\n\n## 2.2 Introduction to Exception Handling\n\
    \nVarious error messages can occur when executing Python programs. Such errors\
    \ are called **exceptions**. Python handle these errors by reporting them on the\
    \ screen. Exceptions can be “caught” and “handled” by a program, however, to either\
    \ correct the error and continue execution, or terminate the program.\n\n![](img/19353aba2f109d1f7c4c239afb8fa982_47_0.png)\n\
    \nPython has many built-in exceptions which forces your program to output an error\
    \ when something in it goes wrong.\n\nWhen these exceptions occur, it causes the\
    \ current process to stop and passes it to the calling process until it is handled.\
    \ If not handled, our program will crash.\n\nFor example, if function **A** calls\
    \ function **B** which in turn calls function **C** and an exception occurs in\
    \ function **C**. If it is not handled in **C**, the exception passes to **B**\
    \ and then to **A**.\n\nIf never handled, an error message is spit out and our\
    \ program come to a sudden, unexpected halt.\n\n## 2.3 What is Exception\n\nAn\
    \ exception is an event, which occurs during the execution of a program that disrupts\
    \ the normal flow of the program’s instructions. when a Python script encounters\
    \ a situation that it cannot cope up with, it raises an exception. An **exception**\
    \ is a value (object) that is *raised* (“thrown”) signaling that an unexpected,\
    \ or “exceptional,” situation has occurred.\n\nWhen a Python script raises an\
    \ exception, it must either handle the exception immediately otherwise it terminates\
    \ and quits.\n\nPython contains a predefined set of exceptions referred to as\
    \ **standard exceptions**.\n\nSome of the standard exceptions are listed as below:\n\
    \nTable 2.1: Some Standard Exceptions in Python\n\n| ImportError | raised when\
    \ an import (or from...import) statement fails |\n|---|---|\n| IndexError | raised\
    \ when a sequence index is out of range |\n| NameError | raised when a local or\
    \ global name is not found |\n| TypeError | raised when an operation or function\
    \ is applied to an object of inappropriate type |\n| ValueError | raised when\
    \ a built-in operation or function is applied to an appropriate type, but of inappropriate\
    \ value |\n| IOError | raised when an input/output operation fails (e.g., “file\
    \ not found”) |\n\nThe standard exceptions are defined within the exceptions module\
    \ of the Python Standard Library, which is automatically imported into Python\
    \ programs.\n\n| **Example 1** | **Example 2** |\n|---|---|\n| `>>> lst = [1,\
    \ 2, 3]`<br>`>>> lst[3]`<br>Traceback (most recent call last):<br>File \"<pyshell#4>\"\
    , line 1, in <module><br>IndexError: list index out of range | `>>> lsst[0]`<br>Traceback\
    \ (most recent call last):<br>File \"<pyshell#5>\", line 1, in <module><br>NameError:\
    \ name 'lsst' is not defined |\n| `>>> 2 + '3'`<br>Traceback (most recent call\
    \ last):<br>File \"<pyshell#7>\", line 1, in <module><br>TypeError: unsupported\
    \ operand type(s) for +: 'int' and 'str' | `>>> int('12.04')`<br>Traceback (most\
    \ recent call last):<br>File \"<pyshell#9>\", line 1, in <module><br>ValueError:\
    \ invalid literal for int() with base 10: '12.04' |\n\nFig. 2.1: List of Some\
    \ of Inbuilt Errors or Exceptions\n\nRaising an exception is a way for a function\
    \ to inform its client a problem has occurred that the function itself cannot\
    \ handle.\n\nFor example, suppose a function called getYN prompts a user to enter\
    \ ‘y’ or ‘n’. If the user enters something other than these two values, the function\
    \ can simply prompt the user to re-enter. On the other hand, if a function called\
    \ isEven is to be passed a numeric value, but is passed a string instead, it cannot\
    \ correct the problem. It can only notify the problem to the user.\n\nAn exception\
    \ is a value (object) that is “raised” by a function signaling that an unexpected,\
    \ or “exceptional,” situation has occurred that the function itself cannot handle.\n\
    \n## Handling an Exception\n\nIf you have some suspicious code that may raise\
    \ an exception, you can defend your program by placing the suspicious code in\
    \ a try: block. After the try: block, include an except: statement, followed by\
    \ a block of code which handles the problem as elegantly as possible.\n\n*Syntax:*\n\
    \nHere is simple syntax of try....except...else blocks:\n\n```\ntry:\n    You\
    \ do your operations here;\n    ....................\nexcept Exception I:\n  \
    \  If there is ExceptionI, then execute this block.\nexcept Exception II:\n  \
    \  If there is ExceptionII, then execute this block.\n    ....................\n\
    else:\n    If there is no exception then execute this block\n```\n\n## 2.4 Types\
    \ of Exceptions\n\n![](img/19353aba2f109d1f7c4c239afb8fa982_49_0.png)\n\nFig.\
    \ 2.2\n\n### 2.4.1 Standard Inbuilt Exceptions\n\n*Built-in Exceptions*\n\nExceptions\
    \ should be class objects. The exceptions are defined in the module **exceptions**.\
    \ This module never needs to be imported explicitly: the exceptions are provided\
    \ in the built-in namespace as well as the **exceptions** module.\n\nFor class\
    \ exceptions, in a **try** statement with an **except** clause that mentions a\
    \ particular class, that clause also handles any exception classes derived from\
    \ that class (but not exception classes from which it is derived).\n\nThe built-in\
    \ exceptions can be generated by the interpreter or built-in functions. Except\
    \ where mentioned, they have an “associated value” indicating the detailed cause\
    \ of the error. This may be a string or a tuple containing several items of information\
    \ (e.g., an error code and description which is a string explaining the code).\
    \ The associated value is the second argument to the **raise** statement. If the\
    \ exception class is derived from the standard root class **BaseException** the\
    \ associated value is present as the exception instance’s **args** attribute.\n\
    \nThe built-in exception classes can be subclassed to define new exceptions; programmers\
    \ are encouraged to derive new exceptions from the **Exception** class or one\
    \ of its subclasses, and not from **BaseException**.\n\nList of Built in Standard\
    \ Exceptions –\n\n| EXCEPTION NAME | DESCRIPTION |\n|---|---|\n| Exception | Base\
    \ class for all exceptions |\n| StopIteration | Raised when the next() method\
    \ of an iterator does not point to any object. |\n| SystemExit | Raised by the\
    \ sys.exit() function. |\n| StandardError | Base class for all built-in exceptions\
    \ except StopIteration and SystemExit. |\n| ArithmeticError | Base class for all\
    \ errors that occur for numeric calculation. |\n| OverflowError | Raised when\
    \ a calculation exceeds maximum limit for a numeric type. |\n| FloatingPointError\
    \ | Raised when a floating point calculation fails. |\n| ZeroDivisionError | Raised\
    \ when division or modulo by zero takes place for all numeric types. |\n| AssertionError\
    \ | Raised in case of failure of the Assert statement. |\n| AttributeError | Raised\
    \ in case of failure of attribute reference or assignment. |\n| EOFError | Raised\
    \ when there is no input from either the raw_input() or input() function and the\
    \ end of file is reached. |"
  mdcn: "逻辑错误源于错误的解决方案或逻辑，而语法错误则源于对语言理解不足，即语法错误。我们可以检测这些错误，然后进行调试，并提供相应的错误描述，这些错误被称为**异常**。\n\
    \n异常是程序在执行过程中可能遇到的运行时条件或错误。例如，除以零、访问数组越界、内存耗尽或磁盘空间不足等错误。\n\n异常处理有两种类型：\n\n- 1.\
    \ 同步\n- 2. 异步\n\n同步异常可能出现索引超范围和溢出错误。异步异常则是指超出控制范围的事件，如键盘中断、磁盘坏扇区或硬件故障等。\n\n可以执行以下任务来处理异常：\n\
    \n- 1. 发现问题（触发异常）\n- 2. 通知已发生错误（抛出异常）\n- 3. 接收错误信息（捕获异常）\n- 4. 采取纠正措施（处理异常）\n\n\
    ## 语法错误\n\n语法错误，也称为解析错误，可能是你在学习Python时最常见的报错类型：\n\n```\n>>> while True print 'Hello\
    \ world'\n  File \"<stdin>\", line 1\n    while True print 'Hello world'\n   \
    \       ^\nSyntaxError: invalid syntax\n```\n\n解析器会重复显示错误行，并用一个小箭头指向行中最早检测到错误的位置。错误是由箭头前的标记引起的（或至少在此处检测到）：在本例中，错误在关键字`print`处被检测到，因为其前面缺少一个冒号（':'）。文件名和行号也会被打印出来，这样当输入来自脚本时，你就知道在哪里查找。\n\
    \n## 2.2 异常处理简介\n\n执行Python程序时，可能会出现各种错误信息。此类错误称为**异常**。Python通过将错误报告到屏幕上来处理这些错误。然而，异常可以被程序\"\
    捕获\"和\"处理\"，以纠正错误并继续执行，或者终止程序。\n\n![](img/19353aba2f109d1f7c4c239afb8fa982_47_0.png)\n\
    \nPython拥有许多内置异常，当程序内部出现错误时，会强制输出错误信息。\n\n当这些异常发生时，它会导致当前进程停止，并将异常传递给调用进程，直到被处理。如果未被处理，我们的程序将会崩溃。\n\
    \n例如，如果函数**A**调用函数**B**，而函数**B**又调用函数**C**，并且在函数**C**中发生异常。如果异常在**C**中未被处理，它会传递给**B**，然后传递给**A**。\n\
    \n如果一直没有处理，程序会输出错误信息，并突然意外地终止。\n\n## 2.3 什么是异常\n\n异常是一种事件，在程序执行过程中发生，会扰乱程序指令的正常流程。当Python脚本遇到无法处理的情况时，它会引发一个异常。**异常**是一个值（对象），它被*引发*（\"\
    抛出\"），表示发生了意外的或\"异常的\"情况。\n\n当Python脚本引发异常时，它必须立即处理该异常，否则程序将终止并退出。\n\nPython包含一组预定义的异常，称为**标准异常**。\n\
    \n一些标准异常如下所列：\n\n表 2.1：Python中的部分标准异常\n\n| ImportError | 当`import`（或`from...import`）语句失败时引发\
    \ |\n|---|---|\n| IndexError | 当序列索引超出范围时引发 |\n| NameError | 当找不到本地或全局名称时引发 |\n\
    | TypeError | 当操作或函数应用于不适当类型的对象时引发 |\n| ValueError | 当内置操作或函数应用于适当类型但值不当时引发 |\n\
    | IOError | 当输入/输出操作失败时（例如，\"文件未找到\"）引发 |\n\n标准异常定义在Python标准库的`exceptions`模块中，该模块会自动导入到Python程序中。\n\
    \n| **示例 1** | **示例 2** |\n|---|---|\n| `>>> lst = [1, 2, 3]`<br>`>>> lst[3]`<br>Traceback\
    \ (most recent call last):<br>File \"<pyshell#4>\", line 1, in <module><br>IndexError:\
    \ list index out of range | `>>> lsst[0]`<br>Traceback (most recent call last):<br>File\
    \ \"<pyshell#5>\", line 1, in <module><br>NameError: name 'lsst' is not defined\
    \ |\n| `>>> 2 + '3'`<br>Traceback (most recent call last):<br>File \"<pyshell#7>\"\
    , line 1, in <module><br>TypeError: unsupported operand type(s) for +: 'int' and\
    \ 'str' | `>>> int('12.04')`<br>Traceback (most recent call last):<br>File \"\
    <pyshell#9>\", line 1, in <module><br>ValueError: invalid literal for int() with\
    \ base 10: '12.04' |\n\n图 2.1：部分内置错误或异常列表\n\n引发异常是函数告知其调用者已发生函数本身无法处理的问题的一种方式。\n\
    \n例如，假设一个名为`getYN`的函数提示用户输入'y'或'n'。如果用户输入的不是这两个值之一，函数可以简单地提示用户重新输入。另一方面，如果一个名为`isEven`的函数应接收一个数值，但却接收了一个字符串，它无法纠正问题。它只能将问题通知给用户。\n\
    \n异常是一个值（对象），它被函数\"引发\"，表示发生了意外的或\"异常的\"情况，且函数本身无法处理该情况。\n\n## 处理异常\n\n如果有一些可疑的代码可能引发异常，你可以通过将这些可疑代码放在`try:`块中来保护你的程序。在`try:`块之后，包含一个`except:`语句，后跟一段代码，以尽可能优雅地处理问题。\n\
    \n*语法：*\n\n以下是`try....except...else`块的简单语法：\n\n```\ntry:\n    You do your operations\
    \ here;\n    ....................\nexcept Exception I:\n    If there is ExceptionI,\
    \ then execute this block.\nexcept Exception II:\n    If there is ExceptionII,\
    \ then execute this block.\n    ....................\nelse:\n    If there is no\
    \ exception then execute this block\n```\n\n## 2.4 异常类型\n\n![](img/19353aba2f109d1f7c4c239afb8fa982_49_0.png)\n\
    \n图 2.2\n\n### 2.4.1 标准内置异常\n\n*内置异常*\n\n异常应该是类对象。异常在`exceptions`模块中定义。这个模块从不需要显式导入：异常在内置命名空间和`exceptions`模块中都可用。\n\
    \n对于类异常，在一个包含提到特定类的`except`子句的`try`语句中，该子句也处理任何从该类派生的异常类（但不处理它从中派生的异常类）。\n\n内置异常可以由解释器或内置函数生成。除特殊情况外，它们都有一个\"\
    关联值\"，指示错误的详细原因。这可以是一个字符串或一个包含多个信息项的元组（例如，一个错误代码和一个解释该代码的描述性字符串）。关联值是`raise`语句的第二个参数。如果异常类派生自标准根类`BaseException`，则关联值作为异常实例的`args`属性存在。\n\
    \n内置异常类可以被子类化以定义新的异常；鼓励程序员从`Exception`类或其子类派生新异常，而不是从`BaseException`派生。\n\n内置标准异常列表\
    \ –\n\n| EXCEPTION NAME | DESCRIPTION |\n|---|---|\n| Exception | 所有异常的基类 |\n\
    | StopIteration | 当迭代器的`next()`方法不指向任何对象时引发。 |\n| SystemExit | 由`sys.exit()`函数引发。\
    \ |\n| StandardError | 除StopIteration和SystemExit外，所有内置异常的基类。 |\n| ArithmeticError\
    \ | 所有数值计算错误的基类。 |\n| OverflowError | 当计算超过数值类型的最大限制时引发。 |\n| FloatingPointError\
    \ | 当浮点计算失败时引发。 |\n| ZeroDivisionError | 当所有数值类型进行除法或模零运算时引发。 |\n| AssertionError\
    \ | 在Assert语句失败的情况下引发。 |\n| AttributeError | 在属性引用或赋值失败的情况下引发。 |\n| EOFError |\
    \ 当从`raw_input()`或`input()`函数没有收到输入并到达文件末尾时引发。 |"
