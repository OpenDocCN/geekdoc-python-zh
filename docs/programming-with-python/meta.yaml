    \ 游标\n  - 5.9.9 执行与关闭函数\n- 5.10 读取单条和多条查询执行结果\n- 5.11 执行不同类型的语句\n  - 5.11.1 插入操作\n\
    \  - 5.11.2 读取操作\n  - 5.11.3 更新操作\n  - 5.11.4 删除操作\n- 5.12 事务简介\n  - 5.12.1 执行事务\n\
    - 5.13 理解数据库连接中的异常\n- 5.14 使用 Sqlite3 进行连接\n- 5.15 问题\n\n## 5.1 数据库连接简介\n\n- 数据库是经过组织和审查的数据集合。\n\
    \n- 数据库文件的各个组成部分：\n  - 记录：记录包含有关不同实体或人员的信息。\n  - 字段：每条记录包含在称为字段的列中的信息。\n  - 文件：每个数据库被称为数据库文件或表。\n\
    \n- 数据库管理系统是一个基于从不同来源收集的相关信息的系统。它允许高效地处理数据，例如 - 过滤记录、生成报告、标签、重新排列、查询等\n\n- 数据库是相关数据的有组织集合，通常存储在磁盘上，并可供许多并发用户访问。\n\
    \n- 数据库可能包含人力资源数据（员工数据、员工薪资和工资详情）；另一个可能包含销售数据；另一个可能包含会计数据；等等。所有这些数据库都由数据库管理系统管理。\n\
    \n- 数据库指的是一组相关数据，并且它是有组织的。对这些数据的访问通常由“数据库管理系统”提供，该系统由一套集成的计算机软件组成，允许用户与一个或多个数据库交互，并提供对数据库中包含的所有数据的访问。\n\
    \n- 数据库管理系统提供了各种功能，允许大量信息的输入、存储和检索，并提供管理这些信息组织方式的方法。\n\n- **数据库管理系统**控制您对数据库的访问，并使您能够定义、创建和维护该数据库。\n\
    \n- 数据库是一个后端应用程序，可以在其中存储和维护数据，而 Python 是一个前端应用程序，可以通过 SQL 语句输入数据。为了与 Python 进行后端连接，我们可以使用\
    \ sqlite3 或 MySQL 作为后端数据库应用程序。\n\n- 借助数据库连接\n  - 我们可以与数据库 MySQL 或 sqlite 建立连接\n\
    \  - 借助游标访问数据\n  - 查询和修改数据\n  - 处理所有类型的数据库事务\n  - 处理错误\n\n![img/19353aba2f109d1f7c4c239afb8fa982_122_0.png](img/19353aba2f109d1f7c4c239afb8fa982_122_0.png)\n\
    \n## 5.1.1 Python 数据库 API 简介\n\nPython 支持关系数据库 Oracle 和 SQL。每个数据库模块都创建了自己的 API，该\
    \ API 高度特定于该数据库，因为每个数据库供应商根据其自身需求开发了自己的 API。Python 支持一个通用的数据库 DB API，称为 **DB API**。特定模块使您的\
    \ Python 脚本能够与不同的数据库通信，例如 **DB/2**、**PostgreSQL** 等。DB API 提供了使用数据库的最低标准，尽可能使用\
    \ Python 结构和语法。该 API 包括以下内容：\n\n1.  连接，涵盖如何连接到数据库的指南\n2.  使用游标执行语句和存储过程，以查询、更新、插入和删除数据\n\
    3.  事务，支持提交或回滚事务\n4.  检查数据库模块以及数据库和表结构的元数据\n5.  定义错误类型\n\nPython 数据库 API 支持广泛的数据库服务器：**GadFly,\
    \ MySQL, PostgreSQL, Microsoft SQL Server 2000, Informix, Interbasse, Oracle,\
    \ Sybase**\n\n**DB API 提供了使用 Python 结构处理数据库的标准。该 API 包括以下内容：**\n\n- 导入 API 模块。\n\
    - 获取与数据库的连接。\n- 发出 SQL 语句和存储过程。\n- 关闭连接\n\n## 5.1.2 DBM 模块简介\n\nDBM，全称为*数据库管理器*，是许多最初在\
    \ UNIX 系统上创建的 C 语言库的通用名称。这些库的名称包括 **dbm**、**gdbm**、**ndbm**、**sdbm** 等。\n\nPython\
    \ 支持多个 dbm 模块。每个 dbm 模块支持类似的接口，并使用特定的 C 库将数据存储到磁盘。\n\n下表列出了 dbm 模块：\n\n| 模块 |\
    \ 描述 |\n|---|---|\n| dbm | 选择最佳的 dbm 模块 |\n| dbm.dumb | 使用简单但可移植的 dbm 库实现 |\n\
    | dbm.gnu | 使用 GNU dbm 库 |\n\ndbm 模块在创建**新的持久字典**时将选择可用的最佳实现。当**读取文件**时也是如此。\n\
    \n## 5.1.3 创建持久目录\n\n所有 dbm 模块都支持一个 **open 函数**来**创建新的 dbm 对象**。打开后，您可以**在字典中存储数据**、**读取数据**、**关闭\
    \ dbm**、**删除项目**，以及**测试字典中是否存在键**。\n\n要打开一个 dbm 持久字典，请在您选择的模块上使用 open 函数。\n\n\
    例如，您可以使用 dbm 模块创建一个持久字典。\n\n### 创建持久字典的程序\n\n代码：\n\n```python\nimport dbm\n\n\
    db = dbm.open('websites', 'c')\n\n# Add an item.\ndb['www.python.org'] = 'Python\
    \ home page'\n\nprint(db['www.python.org'])\n\n# Close and save to disk.\ndb.close()\n\
    ```\n\n输出\n\n![img/19353aba2f109d1f7c4c239afb8fa982_123_0.png](img/19353aba2f109d1f7c4c239afb8fa982_123_0.png)\n\
    \n**注意：** 程序中导入了 DBM 模块，open 函数需要创建的字典的名称。此名称会被翻译成磁盘上可能已经存在的数据文件的名称。下表列出了可用的标志。\n\
    \n| 标志 | 用途 |\n| :--- | :--- |\n| C | 打开数据文件进行读写，如果需要则创建文件。 |\n| N | 打开文件进行读写，但总是创建一个全新的空文件。如果文件已存在，它将被覆盖，其内容将丢失。\
    \ |\n| W | 打开文件进行读写，但如果文件不存在则不会创建它。 |\n\n您还可以传递另一个可选参数，即模式。模式包含一组 UNIX 文件权限。有关打开文件的更多信息，请参阅第\
    \ 8 章。\n\n> dbm 模块的 open 方法返回一个新的 dbm 对象，然后您可以使用该对象来存储和检索数据。\n\n打开持久字典后，您可以像使用普通\
    \ Python 字典一样写入值，如以下示例所示：\n\n```python\ndb['www.python.org'] = 'Python home page'\n\
    ```\n\n键和值都必须是字符串，不能是其他对象，例如数字或 Python 对象。但是请记住，如果您想保存对象，可以使用 pickle 模块对其进行序列化，正如您在第\
    \ 8 章所看到的。\n\nclose 方法关闭文件并将数据保存到磁盘。\n\n## 5.1.4 访问持久目录\n\n使用 dbm 模块，您可以将从 open\
    \ 函数返回的对象用作字典对象。使用如下代码获取和设置值：\n\n```python\ndb['key'] = 'value'\nvalue = db['key']\n\
    ```\n\n请记住，键和值都必须是文本字符串。\n\n您可以使用 del 删除字典中的值：\n\n```python\ndel db['key']\n```\n\
    \nkeys 方法返回所有键的列表，其方式与普通字典相同：\n\n```python\nfor key in db.keys():\n    # do something...\n\
    ```\n\n如果文件中有大量的键，keys 方法可能需要很长时间才能执行。\n\n### 访问持久字典的程序\n\n代码：\n\n```python\n\
    import dbm\n# Open existing file.\n```"
