    \ in which the occurrences of old have been replaced with new, optionally restricting\
    \ the number of replacements to max.\n\n### Syntax\n\n```\nstr.replace(old, new[,\
    \ max])\n```\n\n### Parameters\n\n- **old**: This is old substring to be replaced.\n\
    - **new**: This is new substring, which would replace old substring.\n- **max**:\
    \ If this optional argument max is given, only the first count occurrences are\
    \ replaced.\n\n### Example\n\nThe following example shows the usage of replace()\
