  - '[PAGE 169]


    ![](img/19353aba2f109d1f7c4c239afb8fa982_169_0.png)


    A computer network is the infrastructure that allows two or more computers (called
    hosts) to communicate with each other. The network achieves this by providing
    a set of rules for communication, called protocols, which should be observed by
    all participating hosts. The need for a protocol should be obvious: it allows
    different computers from different vendors and with different operating characteristics
    to ‘speak the same language’.


    For Networking we should know different network components. Then we should know
    about different network topologies. We should be aware of different types of networks:
    Point to point, multipoint, LANs, WANs, and internetworks (internets).


    A communication can be between a workstation (i.e., node or client) and a server
    over a public telephone network. Another example is the exchange of voice channels,
    i.e.: voice signals between two telephones over the same network.


    # Key Components of Network Communication


    +   1. Server (Source)

    2. Transmitter

    3. Transmission System

    4. Receiver

    5. Destination


    ![](img/19353aba2f109d1f7c4c239afb8fa982_169_1.png)


    Fig. 6.1.1'
  - '[PAGE 170]


    ![](img/19353aba2f109d1f7c4c239afb8fa982_170_0.png)


    1. **Server (Source):** Server is the device that generates the data to be transmitted,
    i.e.: inputs the data elements, which are needed for transmission.


    E.g.: Telephones and Personal Computers.


    2. **Transmitter:** The data generated by a source system are not transmitted
    directly in the form in which they are generated, instead the source information
    is encoded first and output is signal, which is to be transmitted through the
    transmission system. And, a **Transmitter** is a device, which transforms the
    signal or data and encodes the information in such a way so as to produce electromagnetic
    signals that can be transmitted across some sort of transmission system.


    E.g.: A modem takes a digital bit stream (combination of bits) from an attached
    device such as a personal computer (since output of computer is a digital signal
    through modem) and transforms that bit stream into analog signal (analog signal
    is the one which is varying signal in sine wave) which can be handled by the telephone
    network.


    So, combination Source and Transmitter is known as Source System.


    3. **Transmission System:** A **Transmission System** can be a single transmission
    line or a complex network connecting source and the destination. It is the media,
    which is used to connect the source and the destination.


    4. **Receiver:** The **Receiver** accepts the signals from the transmission system
    and converts it into a form that can be handled by the destination device.


    E.g.: A **Modem** that, is Modulator-Demodulator accepts one form of signal from
    transmitter or source and converts it into another form to give it to the transmission
    system and again output of transmission system is in the form of signal which
    is to be converted into another form for reaching to the destination. Hence, output
    modem will accept analog signal coming from a network or transmission line and
    convert it into a digital bit stream.


    5. **Destination:** **Destination** takes the incoming data from the receiver,
    which is the output taken from the receiver where the source data from workstation
    or node is converted through transmitter modem into transmission system (i.e.:
    public telephone network) and output of public telephone network is accepted by
    the receiver i.e.: modem which will convert this signal to the destination form
    of signal and transfers the converted signal from receiver to destination.'
- md: "# Network Addressing\n\nMachines have a hostname and IP address. Programs/services\
    \ have port numbers.\n\n# Standard Ports\n\n- Each host has 65,536 ports.\n- Some\
    \ ports are reserved for specific apps.\n  - 20, 21: FTP\n  - 23: Telnet\n  -\
    \ 80: HTTP\n  - see RFC 1700\n- About 2000 ports are reserved.\n\nA socket provides\
    \ an interface to send data to/from the network through a port.\n\n- Ports for\
    \ common services are preassigned.\n  - 21: FTP\n  - 22: SSH\n  - 23: Telnet\n\
    \  - 25: SMTP (Mail)\n  - 80: HTTP (Web)\n  - 110: POP3 (Mail)\n  - 119: NNTP\
    \ (News)\n  - 443: HTTPS (web)\n\nOther port numbers may be randomly assigned\
    \ to programs by the operating system.\n\n# Using Netstat to Check for Active\
    \ Network Connections\n\n- Use ‘netstat’ to view active network connections.\n\
    \n```\nshell % netstat -a\nActive Internet connections (servers and established)\n\
    Proto Recv-Q Send-Q Local Address           Foreign Address\ntcp        0    \
    \  0 *:imaps                 *:*\ntcp        0      0 *:pop3s                \
    \ *:*\ntcp        0      0 localhost:mysql         *:*\ntcp        0      0 *:pop3\
    \                  *:*\ntcp        0      0 *:imap2                 *:*\ntcp \
    \       0      0 *:8880                  *:*\ntcp        0      0 *:www      \
    \             *:*\ntcp        0      0 192.168.119.139:domain  *:*\ntcp      \
    \  0      0 localhost:domain        *:*\ntcp        0      0 *:ssh           \
    \        *:*\n...\n```\n\n- Note: Must execute from the command shell in both\
    \ Unix and Windows.\n\n# 6.2 Network Types\n\nA network is either a peer-to-peer\
    \ network (also called a workgroup) or a server-based network (also called a client/server\
    \ network).\n\n# Peer-to-peer Network\n\nIn a peer-to-peer network, a group of\
    \ computers is connected together so that users can share resources and information.\
    \ There is no central location for authenticating users, storing files, or accessing\
    \ resources. This means that users must remember which computers in the workgroup\
    \ have the shared resource or information that they want to access. It also means\
    \ that users must log on to each computer to access the shared resources on that\
    \ computer.\n\nIn most peer-to-peer networks, it is difficult for users to track\
    \ where information is located because data is generally stored on multiple computers.\
    \ This makes it difficult to back up critical business information, and it often\
    \ results in small businesses not completing backups. Often, there are multiple\
    \ versions of the same file on different computers in the workgroup.\n\n# Server-based\
    \ Network\n\nIn a server-based network, the server is the central location where\
    \ users share and access network resources. This dedicated computer controls the\
    \ level of access that users have to shared resources. Shared data is in one location,\
    \ making it easy to back up critical business information.\n\nEach computer that\
    \ connects to the network is called a client computer. In a server-based network,\
    \ users have one user account and password to log on to the server and to access\
    \ shared resources. Server operating systems are designed to handle the load when\
    \ multiple client computers access server-based resources.\n\n# 6.3 Network Topology\n\
    \nThe physical topology of a network refers to the configuration of cables, computers,\
    \ and other peripherals.\n\nIn networking, the term “**topology**” refers to the\
    \ layout of connected devices on a network. Topology is a network’s virtual shape\
    \ or structure. This shape does not necessarily correspond to the actual physical\
    \ layout of the devices on the network. For example, the computers on a home LAN\
    \ may be arranged in a circle in a family room, but it would be highly unlikely\
    \ to find an actual ring topology there.\n\nNetwork topologies are categorized\
    \ into the following basic types:\n\n1. Bus Topology\n2. Ring Topology\n3. Star\
    \ Topology\n4. Mesh Topology\n5. Tree Topology\n6. Hybrid Topology\n\n# 1. BUS\
    \ Topology\n\nBus topology is a network type in which every computer and network\
    \ device is connected to a single cable. When it has exactly two endpoints, then\
    \ it is called **Linear Bus topology**.\n\n### Features of Bus Topology\n\n1.\
    \ It transmits data only in one direction.\n2. Every device is connected to a\
    \ single cable.\n\n# 2. RING Topology\n\nIt is called ring topology because it\
    \ forms a ring as each computer is connected to another computer, with the last\
    \ one connected to the first. Exactly two neighbors for each device.\n\n### Features\
    \ of Ring Topology\n\n1. A number of repeaters are used for Ring topology with\
    \ a large number of nodes, because if someone wants to send some data to the last\
    \ node in the ring topology with 100 nodes, then the data will have to pass through\
    \ 99 nodes to reach the 100th node. Hence, to prevent data loss, repeaters are\
    \ used in the network.\n2. The transmission is unidirectional, but it can be made\
    \ bidirectional by having 2 connections between each Network Node; it is called\
    \ **Dual Ring Topology**.\n3. In Dual Ring Topology, two ring networks are formed,\
    \ and data flow is in opposite direction in them. Also, if one ring fails, the\
    \ second ring can act as a backup, to keep the network up.\n4. Data is transferred\
    \ in a sequential manner that is bit by bit. Data transmitted has to pass through\
    \ each node of the network, till the destination node.\n\n# 3. STAR Topology\n\
    \nIn this type of topology all the computers are connected to a single hub through\
    \ a cable. This hub is the central node and all other nodes are connected to the\
    \ central node.\n\n### Features of Star Topology\n\n1. Every node has its own\
    \ dedicated connection to the hub.\n2. Hub acts as a repeater for data flow.\n\
    3. Can be used with twisted pair, Optical Fibre or coaxial cable.\n\n# 4. MESH\
    \ Topology\n\nIt is a point-to-point connection to other nodes or devices. All\
    \ the network nodes are connected to each other. Mesh has n(n – 2)/2 physical\
    \ channels to link n devices.\n\nThere are two techniques to transmit data over\
    \ the Mesh topology, they are:\n\n1. Routing\n2. Flooding\n\n**Routing:** In routing,\
    \ the nodes have a routing logic, as per the network requirements. Like routing\
    \ logic to direct the data to reach the destination using the shortest distance.\
    \ Or, routing logic which has information about the broken links, and it avoids\
    \ those nodes etc. We can even have routing logic to re-configure the failed nodes.\n\
    \n**Flooding:** In flooding, the same data is transmitted to all the network nodes,\
    \ hence no routing logic is required. The network is robust, and it's very unlikely\
    \ to lose the data. But it leads to unwanted load over the network.\n\n### Types\
    \ of Mesh Topology\n\n1. Partial Mesh Topology: In this topology some of the systems\
    \ are connected in the same fashion as mesh topology but some devices are only\
    \ connected to two or three devices.\n2. Full Mesh Topology: Each and every node\
    \ or device is connected to each other.\n\n### Features of Mesh Topology\n\n1.\
    \ Fully connected.\n2. Robust.\n3. Not flexible.\n\n# 5. TREE Topology\n\nIt has\
    \ a root node and all other nodes are connected to it forming a hierarchy. It\
    \ is also called hierarchical topology. It should at least have three levels to\
    \ the hierarchy.\n\n### Features of Tree Topology\n\n1. Ideal if workstations\
    \ are located in groups.\n2. Used in Wide Area Network.\n\n# 6. HYBRID Topology\n\
    \nIt is two different types of topologies which is a mixture of two or more topologies.\
    \ For example, if in an office one department uses ring topology and another uses\
    \ star topology, connecting these topologies will result in Hybrid Topology (ring\
    \ topology and star topology).\n\n### Features of Hybrid Topology\n\n1. It is\
    \ a combination of two or more topologies.\n2. Inherits the advantages and disadvantages\
    \ of the topologies included.\n\n# 6.4 What is Domain and Different Types of Domain\n\
    \n(Domain Name System) A system for converting hostnames and domain names into\
    \ IP addresses on the Internet or on local networks that use the TCP/IP protocol.\n\
    \nFor example, when a Web site address is given to the DNS either by typing a\
    \ URL in a browser or behind the scenes from one application to another, DNS servers\
    \ return the IP address of the server associated with that name.\n\n### Structure\
    \ of DNS\n\n- IP addresses are usually paired with more human-friendly names:\
    \ Domain Name System (DNS).\n\nOther top-level domains include **.com**, **.gov**,\
    \ **.org**, **etc**. There are also country-specific domains like **.uk**, **.ca**,\
    \ **.jp**, **etc**.\n\nNeed to register a primary and secondary domain name servers\
    \ for your domain and arrange to have zone files created on DNS servers."
  mdcn: "# 网络寻址\n\n机器拥有主机名和IP地址。程序/服务拥有端口号。\n\n# 标准端口\n\n- 每个主机有65,536个端口。\n- 一些端口为特定应用保留。\n\
    \  - 20, 21：FTP\n  - 23：Telnet\n  - 80：HTTP\n  - 参见RFC 1700\n- 大约2000个端口被保留。\n\
    \n套接字提供了一个通过端口向/从网络发送数据的接口。\n\n- 常见服务的端口是预分配的。\n  - 21：FTP\n  - 22：SSH\n  - 23：Telnet\n\
    \  - 25：SMTP（邮件）\n  - 80：HTTP（网页）\n  - 110：POP3（邮件）\n  - 119：NNTP（新闻）\n  - 443：HTTPS（网页）\n\
    \n其他端口号可由操作系统随机分配给程序。\n\n# 使用Netstat检查活动网络连接\n\n- 使用 ‘netstat’ 查看活动的网络连接。\n\n\
    ```\nshell % netstat -a\nActive Internet connections (servers and established)\n\
    Proto Recv-Q Send-Q Local Address           Foreign Address\ntcp        0    \
    \  0 *:imaps                 *:*\ntcp        0      0 *:pop3s                \
    \ *:*\ntcp        0      0 localhost:mysql         *:*\ntcp        0      0 *:pop3\
    \                  *:*\ntcp        0      0 *:imap2                 *:*\ntcp \
    \       0      0 *:8880                  *:*\ntcp        0      0 *:www      \
    \             *:*\ntcp        0      0 192.168.119.139:domain  *:*\ntcp      \
    \  0      0 localhost:domain        *:*\ntcp        0      0 *:ssh           \
    \        *:*\n...\n```\n\n- 注意：在Unix和Windows中都必须从命令shell执行。\n\n# 6.2 网络类型\n\n\
    网络要么是点对点网络（也称为工作组），要么是基于服务器的网络（也称为客户端/服务器网络）。\n\n# 点对点网络\n\n在点对点网络中，一组计算机连接在一起，以便用户可以共享资源和信息。没有用于验证用户身份、存储文件或访问资源的中央位置。这意味着用户必须记住工作组中哪些计算机拥有他们想要访问的共享资源或信息。这也意味着用户必须登录到每台计算机才能访问该计算机上的共享资源。\n\
    \n在大多数点对点网络中，用户很难跟踪信息的位置，因为数据通常存储在多个计算机上。这使得备份关键业务信息变得困难，并且常常导致小企业无法完成备份。通常，同一文件在工作组的不同计算机上存在多个版本。\n\
    \n# 基于服务器的网络\n\n在基于服务器的网络中，服务器是用户共享和访问网络资源的中央位置。这台专用计算机控制用户访问共享资源的级别。共享数据集中存储在一个位置，使备份关键业务信息变得容易。\n\
    \n连接到网络的每台计算机称为客户端计算机。在基于服务器的网络中，用户拥有一个用户账户和密码来登录服务器并访问共享资源。服务器操作系统被设计用来处理多个客户端计算机访问基于服务器资源时的负载。\n\
    \n# 6.3 网络拓扑\n\n网络的物理拓扑是指电缆、计算机和其他外围设备的配置。\n\n在网络中，术语“**拓扑**”指的是网络中连接设备的布局。拓扑是网络的虚拟形状或结构。这种形状不一定对应于网络上设备的实际物理布局。例如，家庭局域网中的计算机可能在家庭室中排列成一个圆圈，但在那里找到实际的环形拓扑的可能性极低。\n\
    \n网络拓扑分为以下基本类型：\n\n1. 总线拓扑\n2. 环形拓扑\n3. 星形拓扑\n4. 网状拓扑\n5. 树形拓扑\n6. 混合拓扑\n\n# 1.\
    \ 总线拓扑\n\n总线拓扑是一种网络类型，其中每台计算机和网络设备都连接到一条电缆上。当它恰好有两个端点时，则称为**线性总线拓扑**。\n\n### 总线拓扑的特点\n\
    \n1. 它仅在一个方向上传输数据。\n2. 每个设备都连接到单条电缆。\n\n# 2. 环形拓扑\n\n它被称为环形拓扑，因为每台计算机连接到另一台计算机，最后一台连接到第一台，形成一个环。每个设备恰好有两个邻居。\n\
    \n### 环形拓扑的特点\n\n1. 在具有大量节点的环形拓扑中使用了许多中继器，因为如果有人想向一个有100个节点的环形拓扑中的最后一个节点发送一些数据，则数据将不得不经过99个节点才能到达第100个节点。因此，为了防止数据丢失，网络中使用了中继器。\n\
    2. 传输是单向的，但可以通过在每两个网络节点之间建立2个连接使其成为双向；这称为**双环拓扑**。\n3. 在双环拓扑中，形成了两个环形网络，数据在其中以相反方向流动。此外，如果一个环发生故障，第二个环可以作为备份，以保持网络正常运行。\n\
    4. 数据以逐位的方式顺序传输。传输的数据必须经过网络的每个节点，直到目的节点。\n\n# 3. 星形拓扑\n\n在这种类型的拓扑中，所有计算机通过电缆连接到一个单一的集线器。这个集线器是中央节点，所有其他节点都连接到中央节点。\n\
    \n### 星形拓扑的特点\n\n1. 每个节点都有其到集线器的专用连接。\n2. 集线器充当数据流的中继器。\n3. 可用于双绞线、光纤或同轴电缆。\n\n\
    # 4. 网状拓扑\n\n它是与其他节点或设备的点对点连接。所有网络节点彼此连接。网状拓扑有 n(n – 2)/2 条物理通道来链接 n 个设备。\n\n\
    在网状拓扑上传输数据有两种技术：\n\n1. 路由\n2. 泛洪\n\n**路由：** 在路由中，节点根据网络需求具有路由逻辑。例如，用于引导数据通过最短距离到达目的地的路由逻辑。或者，具有有关断开链路信息并避开这些节点的路由逻辑等。我们甚至可以拥有重新配置故障节点的路由逻辑。\n\
    \n**泛洪：** 在泛洪中，相同的数据被传输到所有网络节点，因此不需要路由逻辑。网络是稳健的，并且不太可能丢失数据。但它会导致网络上不必要的负载。\n\n\
    ### 网状拓扑的类型\n\n1. 部分网状拓扑：在这种拓扑中，一些系统以与网状拓扑相同的方式连接，但某些设备只连接到两台或三台设备。\n2. 完全网状拓扑：每个节点或设备都彼此连接。\n\
    \n### 网状拓扑的特点\n\n1. 完全连接。\n2. 稳健。\n3. 不灵活。\n\n# 5. 树形拓扑\n\n它有一个根节点，所有其他节点连接到它，形成层次结构。它也称为层次型拓扑。它应该至少具有三层的层次结构。\n\
    \n### 树形拓扑的特点\n\n1. 如果工作站成组分布，则是理想的选择。\n2. 用于广域网。\n\n# 6. 混合拓扑\n\n它是两种不同类型的拓扑，是两种或多种拓扑的混合。例如，如果在一个办公室中，一个部门使用环形拓扑，另一个使用星形拓扑，连接这些拓扑将产生混合拓扑（环形拓扑和星形拓扑）。\n\
    \n### 混合拓扑的特点\n\n1. 它是两种或多种拓扑的组合。\n2. 继承了所包含拓扑的优缺点。\n\n# 6.4 什么是域及不同类型的域\n\n（域名系统）一种将主机名和域名转换为Internet上或使用TCP/IP协议的本地网络上的IP地址的系统。\n\
    \n例如，当通过在浏览器中输入URL或将URL从一个应用程序传到另一个应用程序后台，将网站地址提供给DNS时，DNS服务器会返回与该名称关联的服务器的IP地址。\n\
    \n### DNS的结构\n\n- IP地址通常与更人性化的名称配对：域名系统 (DNS)。\n\n其他顶级域名包括 **.com**、**.gov**、**.org**、**等等**。也有特定国家的域名，如\
    \ **.uk**、**.ca**、**.jp**、**等等**。\n\n需要为您的域名注册主要和辅助域名服务器，并安排在DNS服务器上创建区域文件。"
