    \ Reading Data from file\n    read( ) or readline( ) and readlines( )\n4.  Writing\
    \ data into file\n    write( )\n5.  Appending Data into file\n    open( ) with\
    \ “a” attribute\n\n## 1.2 Opening and Closing Text Files\n\nWe are reading and\
    \ writing to the standard input and output till now but next we will see how to\
    \ play with actual data files. Python provides basic functions and methods necessary\
    \ to manipulate files by default. You can do your most of the file manipulation\
    \ using a file object. For opening and closing a file respectively open( ) and\
    \ close( ) method is used.\n\n### 1.2.1 Opening of File Using Open()\n\n#### The\
    \ open Function\n\nBefore you can read or write a file, you have to open it using\
    \ Python’s built-in open( ) function. This function creates a file object, which\
    \ would be utilized to call other support methods associated with it.\n\n####\
    \ Syntax\n\n```\nfile object = open(file_name [, access_mode][, buffering])\n\
    ```\n\n#### Here is parameters’ detail\n\n- **file_name**: The file_name argument\
    \ is a string value that contains the name of the file that you want to access.\n\
    - **access_mode**: The access_mode determines the mode in which the file has to\
    \ be opened, i.e., read, write, append, etc. A complete list of possible values\
    \ is given below in the table of section 1.3. This is optional parameter and the\
    \ default file access mode is read (r).\n- **buffering**: If the buffering value\
    \ is set to 0, no buffering will take place. If the buffering value is 1, line\
    \ buffering will be performed while accessing a file. If you specify the buffering\
    \ value as an integer greater than 1, then buffering action will be performed\
    \ with the indicated buffer size. If negative, the buffer size is the system default(default\
    \ behavior).\n\n#### Example\n\n```\n# Open a file in write mode\n>>> fobj=open(\"\
    kiran.txt\",\"w\")\nWhere fobj is a File object, open is a python function with\
    \ specified file name and mode of opening a file. Open function returns file object.\n\
    \n# Other way to Open a file in write mode by using with Keyword\n>>> with open(\"\
    kiran.txt\",\"w\") as fobj:\nWhere fobj is a File object, open is a python function\
    \ with specified file name and mode of opening a file. Open function returns file\
    \ object.\n```\n\nHere is the list of the Basic three different modes of opening\
    \ a file:\n\n| Modes | Description |\n| :--- | :--- |\n| **r** | Opens a file\
    \ for reading only. The file pointer is placed at the beginning of the file. This\
    \ is the default mode. |\n| **w** | Opens a file for writing only. Overwrites\
    \ the file if the file exists. If the file does not exist, creates a new file\
    \ for writing. |\n| **a** | Opens a file for appending. The file pointer is at\
    \ the end of the file if the file exists. That is, the file is in the append mode.\
    \ If the file does not exist, it creates a new file for writing. |\n\nAll files\
    \ must first be opened before they can be read from or written to.\n\n#### Example\
    \ of open method\n\n```\n#!/usr/bin/python\n# Open a file\n\nfobj = open(\"kiran.txt\"\
    , \"w\")\nprint (\"Name of the file: \", fobj.name)\n\n\n# Close opened file\n\
    fobj.close()\n```\n\n#### Output\n\nName of the file: kiran.txt\n\nIn this Example\
    \ with the help of open( ) method, kiran.txt file is opened for writing indicated\
    \ by w, With the help of name attribute of file object we can get confirmation\
    \ name of the file which is opened. With the help of close( ) method we are closing\
    \ file object in turn file is closed and inaccessible.\n\n### 1.2.1.1 Opening\
    \ for Reading\n\nTo open a file for reading, the built-in open function is used\
    \ as shown,\n\n```\ninput_fileobj = open('kiranfile.txt','r')\n```\n\n**input_fileobj**\
    \ is a object, The first argument is the file name to be opened, **'kiranfile.txt'**.\
    \ The second argument, 'r', indicates that the file is to be opened for reading.\
    \ (The second argument is optional when opening a file)\n\nIn Python, when a file\
    \ is (successfully) opened, a file object is created that provides methods for\
    \ accessing the file. If the file is successfully opened, a file object is created\
    \ and assigned to the provided identifier, in this case identifier **input_fileobj**.\n\
    \nWhen opening a file for reading, if the file name does not exist, then the program\
    \ will terminate with a “**no such file or directory**” error.\n\nWhen a file\
    \ is opened, it is first searched for in the same folder/directory that the program\
    \ resides in. There are two methods to specify path:\n\n1.  Relative path: Alternate\
    \ location can be specified in the call to open by providing a path to the file,\n\
    \    ```\n    input_fileobj = open('kiran/kiranfile.txt','r')\n    ```\n    Here\
    \ the file is searched for in a subdirectory called kiran of the directory in\
    \ which the program is contained. Thus, its location is relative to the program\
    \ location. Directory paths in Python are always written with forward slashes.\n\
    \n2.  Absolute path: Absolute paths can also be provided giving the location of\
    \ a file anywhere in the file system,\n    ```\n    input_fileobj = open('C:/mypythonfiles/kiran/kiranfile.txt','r')\n\
    \    ```\n\nWhen the program has finished reading the file, it should be closed\
    \ by calling the close method on the file object.\n```\ninput_fileobj.close()\n\
    ```\n\nOnce closed, the file may be reopened (with reading starting at the beginning\
    \ of the file) by the same, or another program.\n\n#### Example for open for Reading\n\
    \n```\nfo=open(\"foo.txt\",\"r+\")\nstr=fo.read(10)\nprint (\"read string is\"\
    ,str)\nfo.close()\n```\n\n#### Output\n\nread string is python in\n\n![](img/19353aba2f109d1f7c4c239afb8fa982_12_0.png)\n\
    \n### 1.2.1.2 Opening for Writing\n\nTo open a file for writing, the open function\
    \ is used as shown below\n\n```\noutput_fileobj = open('kiranfile.txt','w')\n\
    ```\n\nIn this case, 'w' is used to indicate that the file is to be opened for\
    \ writing. If the file already exists, it will be overwritten (starting with the\
    \ first line of the file). When using a second argument of 'a', the output will\
    \ be appended to an existing file instead.\n\nIt is important to close a file\
    \ that is written to, otherwise the tail end of the file may not be written to\
    \ the file.\n\n```\noutput_file.close()\n```\n\nWhen opening files for writing,\
