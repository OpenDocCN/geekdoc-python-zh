  md: "# Different RDBMS available in the Market:\n\n+   1. Oracle\n2. Sybase\n3.\
    \ Ingress\n4. Db2\n5. Informix\n\nHence according to the usage we have to decide\
    \ whether to use DBM module or Relational Database\n\nThe dbm modules work when\
    \ your data needs can be stored as key/value pairs. If You want to work with more\
    \ complicated data within key/value pairs then it can be very difficult to maintain\
    \ with dbm.\n\n+   1. If your data needs are simple, use a dbm persistent dictionary.\n\
    2. If you plan to store only a small amount of data, use a dbm persistent dictionary.\n\
    3. If you require support for *transactions*, use a **relational database**.\n\
    4. If you require complex data structures or multiple tables of linked data, use\
    \ a relational database.\n5. Relational databases provide a far richer and more\
    \ complex API.\n\n# 5.3 Introduction to SQL Statement\n\nSQL Commands Are Divided\
    \ Into 4 Categories:\n\n+   1. **Data Definition Language (DDL):** Used for Creating\
    \ and Altering the Structure.\n   (CREATE, ALTER, DROP, RENAME, TRUNCATE)\n2.\
    \ **Data Manipulation Language (DML):** Used for Adding and Modifying Data.\n\
    \   (INSERT, UPDATE, DELETE)\n3. **Data Control Language (DCL):** Used for Controlling\
    \ Access of the Database & transactions.\n   (GRANT, REVOKE, ROLLBACK, COMMIT,\
    \ BEGIN TRANSACTION)\n4. **Data Query Language (DQL):** Used for Querying a Database.\n\
    \   (SELECT Statement)\n\n# Syntax and Example of Statement\n\nTo Create a Table:\n\
    \nSyntax:\n\n```\nCREATE TABLE <Name>\n(<Field1> <Datatype>, <Field 2> <Datatype>);\n\
