- md: "## 2.7 Catching and Handling Exceptions\n\n### 2.7.1 try... except\n\nIf you\
    \ have some *suspicious* code that may raise an exception, you can defend your\
    \ program by placing the suspicious code in a **try:** block. After the try: block,\
    \ include an **except:** statement, followed by a block of code which handles\
    \ the problem as soon as possible.\n\n#### Syntax\n\nHere is simple syntax of\
    \ *try....except...else* blocks –\n\n```\ntry:\n    You do your operations here;\n\
    \    ......................\nexcept Exception I:\n    If there is ExceptionI,\
    \ then execute this block.\nexcept Exception II:\n    If there is ExceptionII,\
    \ then execute this block.\n    ......................\nelse:\n    If there is\
    \ no exception then execute this block.\n```\n\n**Some of few important points\
    \ to be considered:**\n\n- A single try statement can have multiple except statements.\
    \ This is useful when the try block contains statements that may throw different\
    \ types of exceptions.\n- You can also provide a generic except clause, which\
    \ handles any exception.\n- After the except clause(s), you can include an else-clause.\
    \ The code in the else-block executes if the code in the try: block does not raise\
    \ an exception.\n- The else-block is a good place for code that does not need\
    \ the try: block’s protection.\n\n**Exception Handling can be done with user input:**\n\
    \n```\n>>> while True:\n...     try:\n...         x = int(raw_input(“Please enter\
    \ a number:”))\n...         break\n...     except ValueError:\n...         print\
    \ (\"Oops! That was no valid number. Try again...\")\n...\n```\n\nThe try statement\
    \ works as follows.\n\n1. First, the try clause (the statement(s) between the\
    \ try and except keywords) is executed.\n2. If no exception occurs, the except\
    \ clause is skipped and execution of the try statement is finished.\n3. If an\
    \ exception occurs during execution of the try clause, the rest of the clause\
    \ is skipped. Then if its type matches the exception named after the except keyword,\
    \ the except clause is executed, and then execution continues after the try statement.\n\
    4. If an exception occurs which does not match the exception named in the except\
    \ clause, it is passed on to outer try statements; if no handler is found, it\
    \ is an unhandled exception and execution stops with a message as shown above.\n\
    \n#### Example 1:\n\nThis example opens a file, writes content in the file.\n\n\
    ![](img/19353aba2f109d1f7c4c239afb8fa982_56_0.png)\n\nThis produces the following\
    \ result –\n\n![](img/19353aba2f109d1f7c4c239afb8fa982_56_1.png)\n\n#### Example\
    \ 2:\n\nThis example tries to open a file where you do not have write permission,\
    \ so it raises an exception –\n\n![](img/19353aba2f109d1f7c4c239afb8fa982_56_2.png)\n\
    \nThis produces the following result –\n\n![](img/19353aba2f109d1f7c4c239afb8fa982_57_0.png)\n\
    \n### 2.7.2 Exception Handling and User Input with Defined Function\n\nExceptions\
    \ can be raised by built-in functions as well as by programmer-defined functions.\n\
    Considering example\n\n1. we prompted the user to enter the current month as a\
    \ number between 1-12 through input function.\n2. The input function will return\
    \ whatever is entered as a string. We can do integer type conversion on this value\
    \ to make it an integer type,\n   `month = int(input(‘Enter current month (1–12):’))`\n\
    3. If the input string contained non-digit characters (except for 1 and 2), the\
    \ int function would raise a ValueError exception, there also needs to be a check\
    \ for values outside the range 1–12.\n\n#### 1. Defining a getMonth( ) Function\n\
    \n![](img/19353aba2f109d1f7c4c239afb8fa982_57_1.png)\n\n#### 2. Writing User Input\
    \ Program with Exception\n\n![](img/19353aba2f109d1f7c4c239afb8fa982_57_2.png)\n\
    \nOutput observed after running the program by entering invalid numbered value\n\
    \n![](img/19353aba2f109d1f7c4c239afb8fa982_58_0.png)\n\nOutput observed after\
    \ running the program by entering non-digit value\n\n![](img/19353aba2f109d1f7c4c239afb8fa982_58_1.png)\n\
    \n### 2.7.3 The except Clause with No Exceptions\n\n1. You can also use the except\
    \ statement with no exceptions defined as follows –\n\n```\ntry:\n    You do your\
    \ operations here;\n    ....................\nexcept:\n    If there is any exception,\
    \ then execute this block.\n    ....................\nelse:\n    If there is no\
    \ exception then execute this block.\n```\n\n2. The **try-except** statement catches\
    \ all the exceptions that occur. Using this kind of try-except statement is not\
    \ considered a good programming practice though, because it catches all exceptions\
    \ but does not make the programmer identify the root cause of the problem that\
    \ may occur.\n\nExample:\n\n![](img/19353aba2f109d1f7c4c239afb8fa982_59_0.png)\n\
    \nOutput Observed after Running:\n\n![](img/19353aba2f109d1f7c4c239afb8fa982_59_1.png)\n\
    \n### 2.7.4 The *except* Clause with Multiple Exceptions\n\nYou can also use the\
    \ same *except* statement to handle multiple exceptions as follows –\n\n```\n\
    try:\n    You do your operations here;\n    ....................\n\nexcept(Exception1[,\
    \ Exception2[,....ExceptionN]]):\n    If there is any exception from the given\
    \ exception list,\n    then execute this block.\n    ....................\n\n\
    else:\n    If there is no exception then execute this block.\n```\n\n#### Example\
    \ 1:\n\n![](img/19353aba2f109d1f7c4c239afb8fa982_60_0.png)\n\n***Output Observed\
    \ after running***\n\n![](img/19353aba2f109d1f7c4c239afb8fa982_60_1.png)\n\n####\
    \ Example 2:\n\nNow check for kiranfile, This file exist in the current path.\n\
    \nThe Contents of kiranfile are as follows :\n\n![](img/19353aba2f109d1f7c4c239afb8fa982_60_2.png)\n\
    \nNow if I write same program with kiranfile, then it will check contents of the\
    \ file, if they are not numeric then It raises an Exception.\n\n```\npython\n\
    import sys\ntry:\n    f = open('kiranfile.txt')\n    s = f.readline()\n    i =\
    \ int(s.strip())\nexcept IOError as e:\n    errno, strerror = e.args\n    print(\"\
    I/O error({0}): {1}\".format(errno,strerror))\n    # e can be printed directly\
    \ without using .args:\n    # print(e)\nexcept ValueError:\n    print(\"No valid\
