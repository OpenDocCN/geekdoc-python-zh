    # 6.10 Client Server Architecture


    *What Is A Client/Server?*


    **Client**

    A client is a single-user workstation that provides presentation services, database
    services and connectivity along with an interface for user interaction to acquire
    business needs.


    **Server**

    A server is one or more multi-user processors with a higher capacity of shared
    memory which provides connectivity and the database services along with interfaces
    relevant to the business procedures.


    ![](img/19353aba2f109d1f7c4c239afb8fa982_189_0.png)


    *Introduction to Client/Server Architecture*


    **Client-server architecture**, architecture of a computer network in which many
    clients (remote processors) request and receive service from a centralized server
    (host computer). Client computers provide an interface to allow a computer user
    to request services of the server and to display the results the server returns.
    Servers wait for requests to arrive from clients and then respond to them.'
