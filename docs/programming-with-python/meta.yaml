  mdcn: "## 示例 9\n\n可以**与 for 循环一起使用**的**对象类型**有很多。这些对象被称为**可迭代对象**。有许多函数会消耗这些可迭代对象。\n\
    \n-   列表的连接（join with List）\n-   字典的连接（join with Dictionary）\n-   字符串的列表（list\
    \ with String）\n-   字典的列表（list with Dictionary）\n\n## 1. 列表连接示例\n\n![](img/19353aba2f109d1f7c4c239afb8fa982_37_0.png)\n\
    \n## 2. 字典连接示例\n\n![](img/19353aba2f109d1f7c4c239afb8fa982_37_1.png)\n\n## 3.\
    \ 字符串列表示例\n\n![](img/19353aba2f109d1f7c4c239afb8fa982_37_2.png)\n\n## 4. 字典列表示例\n\
    \n![](img/19353aba2f109d1f7c4c239afb8fa982_38_0.png)\n\n## 1.11.3 在 Python 中创建你自己的迭代器\n\
    \n- 我们可以在 Python 中创建一个迭代器。要创建迭代器，我们必须实现 `__iter__()` 和 `__next__()` 方法。\n- `__iter__()`\
    \ 方法返回迭代器对象本身。如果需要，可以进行一些初始化。\n- `__next__()` 方法必须返回序列中的下一个项。在到达末尾以及后续调用时，它必须引发\
    \ `StopIteration`。\n\n在这个示例中，每次迭代都会给出下一个 2 的幂。幂指数从零开始，直到用户设定的数字。这里我们创建一个类来实现一个\
    \ 2 的幂次的迭代器。\n\n![](img/19353aba2f109d1f7c4c239afb8fa982_38_1.png)\n\n## 输出\n\n\
    ![](img/19353aba2f109d1f7c4c239afb8fa982_39_0.png)\n\n我们也可以使用 **for** 循环来遍历我们的迭代器类。\n\
    \n## 1.11.4 Python 无限迭代器\n\n迭代器对象中的项不一定会耗尽。可以存在无限迭代器（永不停止）。我们在处理这类迭代器时必须小心。\n\n\
    > *演示无限迭代器的示例。*\n\n内置函数 `iter()` 可以接受两个参数调用，其中第一个参数必须是一个可调用对象（函数），第二个是哨兵值。迭代器会调用这个函数，直到返回值等于哨兵值。\n\
    \n```python\n>>> int()\n0\n\n>>> inf = iter(int,1)\n>>> next(inf)\n0\n>>> next(inf)\n\
    0\n```\n\n我们可以看到 **int()** 函数总是返回 0。因此，将其作为 **iter(int,1)** 传递将返回一个迭代器，该迭代器调用\
    \ **int()** 直到返回值等于 1。这永远不会发生，所以我们得到了一个无限迭代器。\n\n我们也可以构建自己的无限迭代器。下面的迭代器将返回所有奇数。\n\
    \n![](img/19353aba2f109d1f7c4c239afb8fa982_40_0.png)\n\n一个示例运行如下所示。\n\n```python\n\
    a = iter(InfIter())\n>>> next(a)\n1\n>>> next(a)\n3\n>>> next(a)\n5\n>>> next(a)\n\
    7\n以此类推...\n```\n\n在遍历这类无限迭代器时，请注意包含一个终止条件。\n\n使用迭代器的优点是它们节省资源。如上例所示，我们可以在不将整个数字系统存储在内存中的情况下获取所有奇数。理论上，我们可以在有限的内存中拥有无限个项目。\n\
    \n## 1.11.5 生成器\n\n生成器简化了迭代器的创建。生成器是一个产生一系列结果而非单个值的函数。\n\n```python\ndef yrange(n):\n\
    \    i = 0\n    while i < n:\n        yield i\n        i += 1\n```\n\n每次执行 `yield`\
    \ 语句时，函数都会生成一个新值。\n\n```python\n>>> y = yrange(3)\n>>> y\n<generator object yrange\
    \ at 0x401f30>\n>>> y.next()\n0\n>>> y.next()\n1\n>>> y.next()\n2\n>>> y.next()\n\
    Traceback (most recent call last):\n  File \"<stdin>\", line 1, in <module>\n\
    StopIteration\n```\n\n因此，生成器也是一个迭代器。你不必担心迭代器协议。\n\n“生成器”这个词既指生成值的函数，也指它生成的内容。当生成器函数被调用时，它返回一个生成器对象，甚至不会开始执行函数。当第一次调用\
    \ `next` 方法时，函数开始执行，直到它遇到 `yield` 语句。产生的值由下一次调用返回。\n\n以下示例演示了 `yield` 和对生成器对象调用\
    \ `next` 方法之间的交互。\n\n```python\n>>> def foo():\n...     print \"begin\"\n... \
    \    for i in range(3):\n...         print \"before yield\", i\n...         yield\
    \ i\n...         print \"after yield\", i\n...     print \"end\"\n...\n>>> f =\
    \ foo()\n>>> f.next()\nbegin\nbefore yield 0\n0\n>>> f.next()\nafter yield 0\n\
    before yield 1\n1\n>>> f.next()\nafter yield 1\nbefore yield 2\n2\n>>> f.next()\n\
