  md: "# 4.6.1 Button Widget\n\nThe Button widget is a standard tkinter widget used\
    \ to implement various kinds of buttons. Buttons can contain text or images, and\
    \ you can associate a Python function or method with each button. When the button\
    \ is pressed, tkinter automatically calls that function or method. The button\
    \ can only display text in a single font, but the text may span more than one\
    \ line. By default, the Tab key can be used to move to a button widget. Buttons\
    \ are mainly used in application program, toolbars and many a time for accept\
    \ or not accept particular information within the dialog box. Now we see a how\
    \ to create a simple button and click event with the help of simple program.\n\
    \n```\npython\nfrom tkinter import *\nbt = Tk()\n\ndef display():\n    print(\"\
    OK button click!\")\n\nb = Button(bt, text=\"OK\",command=display)\nb.pack()\n\
    \nmainloop()\n\n（运行界面显示OK按钮窗口）\n```\n\nIn the above program we define button widget\
    \ using variable b and define the text as OK and use one command in which we call\
    \ function name as display using command=display. This will call the function\
    \ and when you press OK button it display **OK button click!**\n\nNow we see the\
    \ various options used with button widget which are as follows :\n\n+   1. activeforeground=\
    \ What foreground color to use when the button is active.\n2. activebackground=\
    \ What background color to use when the button is active.\n3. font= The font to\
    \ use in the button.\n4. height= The height of the button.\n5. width= The width\
