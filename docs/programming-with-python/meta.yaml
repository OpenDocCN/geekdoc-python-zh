    # 1.1 Introduction to File Handling


    In Python programming, File is a named location on disk to store related information.
    It is used to permanently store data in a non-volatile memory (e.g. hard disk).


    Since, random access memory (RAM) is volatile which loses its data when computer
    is turned off, we use files for future use of the data.


    File is of text file, music File or binary file or video file. All these files
    are categorized into two types


    +   1. Text File

    2. Binay File


    When we want to read from or write to a file we need to open it first. When we
    are done, it needs to be closed, so that resources that are tied with the file
    are freed


    # Why files are needed?


    +   ▶ When a program is terminated, the entire data is lost. Storing in a file
    will preserve your data even if the program terminates.

    ▶ If you have to enter a large number of data, it will take a lot of time to enter
    them all. However, if you have a file containing all the data, you can easily
    access the contents of the file using few commands in C.

    ▶ You can easily move your data from one computer to another without any changes.


    File Handling concept in python language is used for store a data permanently
    in computer memory. Using this concept we can store our data in Secondary memory
    (Hard disk). A file represents a sequence of bytes on the disk where a group of
    related data is stored. File is created for permanent storage of data. It uses
    file object to process file.


    # 1.1.1 Text File


    A text file is often structures as a sequence of lines and a line is a sequence
    of characters. The line is terminated by EOL (End of Line) character.'
