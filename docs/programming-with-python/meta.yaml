    \    (a) 拓扑\n    (b) 连接性\n    (c) 网络连接\n    (d) 接口\n\n    **答案：(c) 网络连接**\n\n\
    2.  当 TCP/IP 套接字的两端都连接时，通信是 __________。\n    (a) 双向通信\n    (b) 广播\n    (c) 单向通信\n\
    \    (d) 双向的\n\n    **答案：(d) 双向的**\n\n3.  要创建套接字，我们必须使用 socket 模块中可用的 __________\
    \ 函数。\n    (a) socket_family\n    (b) socket.socket()\n    (c) socket_type\n \
    \   (d) socket.AF_INET\n\n    **答案：(b) socket.socket()**\n\n4.  当我们使用 __________\
    \ 时，套接字将对所有人可见。\n    (a) socket.gethostname()\n    (b) socket.get:hostname()\n\
    \    (c) socket.gethost()\n    (d) socket.get-hostname()\n\n    **答案：(a) socket.gethostname()**\n\
    \n5.  对于客户端和服务器连接，我们需要以下四个基本要素\n    (a) 套接字和绑定\n    (b) 监听和接受\n    (c) 选项 a 正确\n\
    \    (d) 选项 a 和 b 都正确\n\n    **答案：(d) 选项 a 和 b 都正确**\n\n6.  套接字通常是两个实体之间连接的端点，套接字充当客户端和服务器之间的\
    \ __________。\n    (a) 接口\n    (b) 桥梁\n    (c) 终端\n    (d) 实现\n\n    **答案：(b)\
    \ 桥梁**\n\n7.  IP 地址 127.0.0.1 被称为\n    (a) 服务器 IP 地址\n    (b) 客户端 IP 地址\n    (c)\
    \ 回环 IP 地址\n    (d) 面向连接的 IP 地址\n\n    **答案：(c) 回环 IP 地址**\n\n8.  __________ 是一种协议，用于处理发送电子邮件和在邮件服务器之间路由电子邮件。\n\
    \    (a) smtplib\n    (b) 简单邮件传输协议 (SMTP)\n    (c) ESMTP\n    (d) MTA\n\n    **答案：(b)\
    \ 简单邮件传输协议 (SMTP)**\n\n9.  大多数电子邮件至少包含 __________ 和正文字段。\n    (a) \"发件人\"、\"收件人\"\
    、\"主题\"\n    (b) \"发件人\"、\"收件人\"、\"抄送\"\n    (c) \"发件人\"、\"收件人\"、\"主题\" \"密送\"\
    \n    (d) \"发件人\"、\"收件人\"\n\n    **答案：(a) \"发件人\"、\"收件人\"、\"主题\"**\n\n10. __________\
    \ 模块定义了有助于在复杂世界中打开 URL 的函数和类——基本和摘要身份验证、重定向、Cookie 等。\n    (a) Urllib.urlopen\n\
    \    (b) urllib.request\n    (c) Urllib.parse\n    (d) urllib.robotparser\n\n\
    \    **答案：(b) urllib.request**\n\n11. 当我们想通过 HTTP 将数据发送到 URL 时，这通常使用 __________\
    \ 请求完成。\n    (a) SEND\n    (b) Receive\n    (c) POST\n    (d) a 和 C 都是\n\n   \
    \ **答案：(c) POST**\n\n## 关于作者\n\n![Kiran Gurbani 教授](img/19353aba2f109d1f7c4c239afb8fa982_256_0.png)\n\
    \n**Kiran Gurbani 教授**\n\nKiran Gurbani 目前是 R.K. Talreja 艺术、科学与商业学院计算机科学系主任。她于\
    \ 1994 年在 Jondhale 工程学院、浦那和孟买的 CDAC 中心开始了教学生涯，后来加入了 R.K.T. 学院。随后，在多所顶尖学院担任研究生\
    \ MSc 计算机科学与信息技术教授。拥有超过 18 年的培训师/学术主管/SME 经验，涉及多种技术平台。\n\n她担任教授已有 18 年，教授多种技术——面向对象\
    \ C++、Java、Visual Basic、.NET (VB.NET & ASP.NET)、Unix Shell 脚本、Linux 管理、Oracle、SQL、云计算、虚拟化和云管理、Web\
    \ 技术、软件工程、软件测试、JBOSS 和 Web Logic、并行与分布式计算、ADBMS、C#、CCNA 和互联网技术。\n\n她是 Capgemini、Oracle、c-Edge、Seed、CDAC\
    \ 等公司的自由企业培训师，教授 Unix Shell 脚本与 Ant 技术、Linux 管理、Unix Shell 脚本、云计算和软件工程 (SSAD,\
    \ OOAD)、RDBMS、网络 CCNA 和中间件。\n\n她是 ICWA、MMS 系统与技术以及 MSc 计算机科学与信息技术的客座教师。她为孟买各地的学生和教师举办了许多研讨会和讲座。\n\
    \n**她是孟买和塔那多所顶尖学院的自由培训师**，为本科生和研究生讲授 **Linux 故障排除**，并进行了 **迷你项目**，涉及 **域创建和通过\
    \ Apache Web 服务器上传公司网站**。Samba 服务器迷你项目，用于在认证用户之间共享 Windows 和 Linux 机器；**通过 Linux\
    \ Shell 脚本处理数据、创建组、用户并进行身份验证**的迷你项目。\n\n她是组织和顶尖学院以及大学级别培训项目的资源人员。\n\n**她担任本科生和研究生毕业班学生的项目指导**，指导\
