  mdcn: "## 4.6.1 按钮控件\n\n**按钮** 控件是 tkinter 的一个标准控件，用于实现各种按钮。按钮可以包含文本或图像，并且你可以将一个\
    \ Python 函数或方法与每个按钮关联起来。当按钮被按下时，tkinter 会自动调用该函数或方法。按钮只能显示单一字体的文本，但文本可以跨越多行。默认情况下，可以使用\
    \ **Tab** 键在按钮控件之间移动。\n\n按钮主要用于应用程序、工具栏，以及很多时候用于在对话框中接受或拒绝特定信息。现在，我们来看一个如何使用简单程序创建一个简单按钮和点击事件的例子。\n\
    \n![](img/19353aba2f109d1f7c4c239afb8fa982_101_0.png)\n\n在上面的程序中，我们使用变量 `b` 定义按钮控件，将文本设置为\
    \ “OK”，并使用一个命令，其中我们通过 `command=display` 调用名为 `display` 的函数。这将调用该函数，当你按下 OK 按钮时，它会显示\
    \ **OK 按钮被点击！**。\n\n现在，我们来看一下与按钮控件一起使用的各种选项，如下所示：\n\n-   1. activeforeground：当按钮处于活动状态时使用什么前景色。\n\
    -   2. activebackground：当按钮处于活动状态时使用什么背景色。\n-   3. font：按钮中使用的字体。\n-   4. height：按钮的高度。\n\
    -   5. width：按钮的宽度。\n-   6. relief：边框装饰。通常，按钮被按下时是 SUNKEN（凹陷），否则是 RAISED（凸起）。其他可能的值有\
    \ GROOVE（凹槽）、RIDGE（凸脊）和 FLAT（平坦）。默认是 RAISED。\n-   7. bd：同 borderwidth。\n-   8.\
    \ fg：同 foreground。\n\n所有上述选项都在以下程序中使用。\n\n程序名称：**button.py**\n\n```\nfrom tkinter\
    \ import *\nbt = Tk()\n\ndef display():\n    print(\"OK button click!\")\n\nb=Button(bt,relief=RAISED,font='Arial',underline=1,bd=3,text=\"\
    OK\",activeforeground=\"red\",fg=\"blue\",height=1,width=5)\n\nb.pack()\nmainloop()\n\
    ```\n\n## 4.6.2 单选按钮控件\n\n单选按钮是 tkinter 的一个标准控件，用于实现“多选一”的选择。单选按钮可以包含文本或图像，并且你可以将一个\
    \ Python 函数或方法与每个按钮关联起来。当按钮被按下时，Tkinter 会自动调用该函数或方法。\n\n单选按钮，有时也称为选项按钮，是 tkinter\
    \ 的一个图形用户界面元素，允许用户（精确地）从一组预定义的选项中选择一个。它可以包含文本或图像。\n\n在上面的程序中，我们定义了两个单选按钮 “Python”\
    \ 和 “Linux”，其初始 `padx` 值为 20，标签对齐方式为 LEFT，最后使用 `mainloop()` 调用主窗口。\n\n**语法**\n\
    \n```\nw= tk.Radiobutton (master,option, . . .)\n```\n\n| Radiobutton widget 选项\
    \ | 描述 |\n| :--- | :--- |\n| activebackground | 鼠标悬停在单选按钮上时的背景色。 |\n| activeforeground\
    \ | 鼠标悬停在单选按钮上时的前景色。 |\n| anchor | 如果控件占据的空间大于其所需空间，此选项指定单选按钮在该空间中的位置。默认为 anchor=tk.CENTER。对于其他定位选项，例如，如果你设置\
    \ anchor=tk.NE，单选按钮将放置在可用空间的右上角。 |\n| bg or background | 指示器和标签后面的一般背景色。 |\n|\
    \ bitmap | 要在单选按钮上显示单色图像，请将此选项设置为位图。 |\n| bd or borderwidth | 指示器本身周围边框的大小。默认是两个像素。有关可能的值，请参见第\
    \ 5.1 节 “尺寸”。 |\n| command | 每次用户更改此单选按钮状态时调用的过程。 |\n| cursor | 如果你将此选项设置为光标名称，当鼠标悬停在单选按钮上时，鼠标光标将更改为该图案。\
    \ |\n| font | 文本使用的字体。 |\n| fg or foreground | 用于渲染文本的颜色。 |\n| height | 单选按钮上文本的行数（不是像素）。默认为\
    \ 1。 |\n| highlightbackground | 单选按钮没有焦点时，焦点高亮显示的颜色。 |\n| highlightcolor | 单选按钮具有焦点时，焦点高亮显示的颜色。\
    \ |\n| highlightthickness | 焦点高亮显示的粗细。默认为 1。设置 highlightthickness=0 可以抑制焦点高亮显示的显示。\
    \ |\n| image | 要在此单选按钮上显示图形图像而不是文本，请将此选项设置为图像对象。请参见第 5.9 节 “图像”。当单选按钮未被选中时图像出现；请比较下面的\
    \ selectimage。 |\n| indicatoron | 通常，单选按钮显示其指示器。如果你将此选项设置为零，指示器消失，整个控件变成一个“推-推”按钮，当它被清除时看起来凸起，当被设置时看起来凹陷。你可能想增加\
    \ borderwidth 值，以便更容易看到这种控件的状态。 |\n| justify | 如果文本包含多行，此选项控制文本如何对齐：tk.CENTER（默认），tk.LEFT\
    \ 或 tk.RIGHT。 |\n| offrelief | 如果你通过声明 indicatoron=False 来抑制指示器，offrelief 选项指定单选按钮未被选中时要显示的\
    \ relief 样式。默认值是 tk.RAISED。 |\n| overrelief | 指定鼠标悬停在单选按钮上时要显示的 relief 样式。 |\n\
    | padx | 在单选按钮和文本的左右两侧留出多少空间。默认为 1。 |\n| pady | 在单选按钮和文本的上方和下方留出多少空间。默认为 1。 |\n\
    | relief | 默认情况下，单选按钮将具有 tk.FLAT relief，因此它不会比其背景更突出以获得更多 3d 效果选项。你也可以使用 relief=tk.SOLID，它在单选按钮周围显示一个实心黑色框架。\
    \ |\n| selectimage | 如果你正在使用 image 选项在单选按钮被清除时显示图形而不是文本，你可以将 selectimage 选项设置为不同的图像，当单选按钮被设置时将显示该图像。请参见\
    \ |\n| state | 默认为 state=tk.NORMAL，但你可以设置 state=tk.DISABLED 来将控件灰显并使其无响应。如果光标当前悬停在单选按钮上，则状态为\
    \ tk.ACTIVE。 |\n| takefocus | 默认情况下，输入将传递到单选按钮。如果你设置 takefocus=0，焦点将不会访问此单选按钮。\
    \ |\n| text | 显示在单选按钮旁边的标签。使用换行符（'\\n'）显示多行文本。 |\n| textvariable | 如果你需要在执行期间更改单选按钮上的标签，请创建一个\
    \ StringVar 来管理当前值，并将此选项设置为该控制变量。只要控制变量的值发生变化，单选按钮的注释也会自动更改为该文本。 |\n| underline\
    \ | 默认值为 -1，表示文本标签的字符都不带下划线。将此选项设置为文本中某个字符的索引（从零开始计数），即可为该字符添加下划线。 |\n| value\
    \ | 当用户打开单选按钮时，其控制变量被设置为当前 value 选项的值。如果控制变量是 IntVar，请为组中的每个单选按钮分配一个不同的整数 value\
    \ 选项。如果控制变量是 StringVar，请为每个单选按钮分配一个不同的字符串 value 选项。 |\n| variable | 此单选按钮与组中其他单选按钮共享的控制变量。\
    \ |\n| width | 单选按钮的默认宽度由显示的图像或文本的大小决定。你可以将此选项设置为字符数（不是像素），单选按钮将始终为这么多字符留出空间。\
    \ |\n| wraplength | 通常，行不会换行。你可以将此选项设置为字符数，所有行将被分成不超过该数字的片段。 |\n\n第一个演示单选按钮控件的基础程序：\n\
    \n![](img/19353aba2f109d1f7c4c239afb8fa982_104_0.png)\n\n在上面的例子中，我们使用了多个 “languages”\
    \ 单选按钮，其中包含按钮文本和对应的值。借助 for 循环来创建所有单选按钮。"
