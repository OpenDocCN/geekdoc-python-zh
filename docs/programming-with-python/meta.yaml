    \ Alternate location can be specified in the call to open by providing a path\
    \ to the file,\n    ```python\n    input_fileobj = open('kiran/kiranfile.txt','r')\n\
    \    ```\n    Here the file is searched for in a subdirectory called kiran of\
    \ the directory in which the program is contained. Thus, its location is relative\
    \ to the program location. Directory paths in Python are always written with forward\
