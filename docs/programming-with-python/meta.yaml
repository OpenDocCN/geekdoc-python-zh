    4.7 Questions


    # 4.1 What is GUI ?


    The full form of GUI is **Graphical user interface** is a program interface that
    take s advantage of computer graphics capabilities to make the program / script
    easy to use.te bast example of GUI is our Microsoft Window.


    The first graphical user interface was designed by Xerox Corporation''s Palo Alto
    Research Center in the 1970s, but it was not until the 1980s and the emergence
    of the Apple Macintosh that graphical user interfaces became popular. One reason
    for their slow acceptance was the fact that they require considerable CPU power
    and a high-quality monitor, which were prohibitively expensive.


    We can say that GUI is a software which is used as interface between computer
    and its user, which employs graphics element such as dialog box, icons, menus,
    scroll bar etc.


    Python provides various options for developing graphical user interfaces (GUIs).
    Most important are listed below.


    +   tkinter: tkinter is the Python interface to the Tk GUI toolkit shipped with
    Python. tkinter is the standard GUI library for Python. Python when combined with
    tkinter provides a fast and easy way to create GUI applications. tkinter provides
    a powerful object-oriented interface to the Tk GUI toolkit

    wxPython: This is an open-source Python interface for wxWindows http://wxpython.org.

    JPython: JPython is a Python port for Java which gives Python scripts seamless
    access to Java class libraries on the local machine http://www.jython.org.


    # 4.1.2 Advantages of GUI


    +   1. Using GUI we can save lots of time to configure any drivers or software
    without prior knowledge.

    2. With the help of GUI application everyone use a computer instead of having
    to remember commands.

    3. Most lay users will have a smaller learning curve using a GUI.

    4. A GUI allows computer users to employ visual elements, such as desktop icons,
    to navigate and operate software.'
  - '[PAGE 88]


    # 4.1.3 Disadvantages of GUI


    +   1. When it is not properly built, it can be very difficult to work with.

    2. GUI requires more memory resources than a non-graphical one.

    3. It might require the installation of additional software, e.g., the "runtime
    environment" in the case of java.

    4. In GUI there is no search option.

    5. The major disadvantages of GUI is that you can do only those things which is
    pre-defined in the application / program, you cannot insert any single command
    from your end.


