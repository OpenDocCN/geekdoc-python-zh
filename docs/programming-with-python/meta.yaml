- md: "## 3.5.3 replace() 方法\n\n`replace()` 方法返回一个字符串的副本，其中所有出现的子字符串 `old` 被替换为 `new`，可选地限制替换次数为\
    \ `max`。\n\n## 语法\n\n```\nstr.replace(old, new[, max])\n```\n\n## 参数\n\n- **old**:\
    \ 要被替换的旧子字符串。\n- **new**: 替换旧子字符串的新子字符串。\n- **max**: 如果提供了可选参数 `max`，则只替换前 `max`\
    \ 次出现的子字符串。\n\n## 示例\n\n以下示例展示了 `replace()` 方法的用法。此代码在 Python 2.7 版本中有效。\n\n![](img/19353aba2f109d1f7c4c239afb8fa982_81_0.png)\n\
    \n当我们运行上面的程序时，它产生以下结果 –\n\n![](img/19353aba2f109d1f7c4c239afb8fa982_81_1.png)\n\
    \n## 3.6 匹配与搜索\n\n**match() 与 search()**\n\n**`match()`** 函数仅检查正则表达式是否在字符串的开头匹配，而\
    \ **`search()`** 会向前扫描整个字符串以查找匹配项。`match()` 只会报告在位置 0 开始的成功匹配；如果匹配不从位置 0 开始，`match()`\
    \ 将不会报告它。\n\n```\n>>> print(re.match('super', 'superstition').span())\n(0, 5)\n\
    \n>>> print(re.match('super', 'insuperable'))\nNone\n```\n\n**另一方面，`search()`\
    \ 会向前扫描字符串，并报告它找到的第一个匹配项。**\n\n```\n>>> print(re.search('super', 'superstition').span())\n\
    (0, 5)\n\n>>> print(re.search('super', 'insuperable').span())\n(2, 7)\n```\n\n\
    ## 匹配与搜索示例\n\n### 代码\n\n```\n#!/usr/bin/python\nimport re\n\nline = \"Cats are\
    \ smarter than dogs\";\nmatchObj = re.match( r'dogs', line, re.M|re.I)\nif matchObj:\n\
    \    print ('match --> matchObj.group() : ', matchObj.group( ))\nelse:\n    print\
    \ ('No match!!')\n\nsearchObj = re.search( r'dogs', line, re.M|re.I)\nif searchObj:\n\
    \    print ('search --> searchObj.group() : ', searchObj.group( ))\nelse:\n  \
    \  print ('Nothing found!!')\n```\n\n### 输出\n\n![](img/19353aba2f109d1f7c4c239afb8fa982_83_0.png)\n\
    \n![](img/19353aba2f109d1f7c4c239afb8fa982_83_1.png)\n\n![](img/19353aba2f109d1f7c4c239afb8fa982_83_2.png)\n\
    \n## 3.7 正则表达式搜索与替换简介\n\n### 搜索与替换\n\n使用正则表达式的一些最重要的 `re` 方法是 `sub`。\n\n### 语法\n\
    \n```\nre.sub(pattern, repl, string, max=0)\n```\n\n此方法将字符串中所有匹配的正则表达式模式替换为 `repl`，除非提供了\
    \ `max` 参数。此方法将返回修改后的字符串。\n\n### 搜索与替换示例\n\n### 代码\n\n```\n#!/usr/bin/python\n\
    import re\nphone = \"2004-959-559 # This is Phone Number\"\n# 删除 Python 风格的注释\n\
    num = re.sub(r'#.*$', \"\", phone)\nprint ('Phone Num : ', (num))\n# 移除除数字以外的所有字符\n\
    num = re.sub(r'\\D', \"\", phone)\nprint ('Phone Num : ', (num))\n```\n\n### 输出\n\
    \n![](img/19353aba2f109d1f7c4c239afb8fa982_84_0.png)\n\n## 3.8 正则表达式修饰符 – 选项标志\n\
    \n正则表达式字面量可以包含可选的修饰符来控制匹配的各个方面。修饰符被指定为一个可选标志。你可以使用按位异或（`|`）来提供多个修饰符，如前所示，并且可以由以下之一表示：\n\
    \n| 修饰符 | 描述 |\n|----------|-------------|\n| re.I | 执行不区分大小写的匹配。 |\n| re.L |\
    \ 根据当前语言环境解释单词。此解释影响字母组（`\\w` 和 `\\W`）以及单词边界行为（`\\b` 和 `\\B`）。 |\n| re.M | 使 `$`\
    \ 匹配行的结尾（而不仅仅是字符串的结尾），并使 `^` 匹配任何行的开头（而不仅仅是字符串的开头）。 |\n| re.S | 使点（`.`）匹配任何字符，包括换行符。\
    \ |\n| re.U | 根据 Unicode 字符集解释字母。此标志影响 `\\w`、`\\W`、`\\b`、`\\B` 的行为。 |\n| re.X\
    \ | 允许更“简洁”的正则表达式语法。它忽略空白（除非在集合 `[]` 内或被反斜杠转义），并将未转义的 `#` 视为注释标记。 |\n\n## 3.9\
