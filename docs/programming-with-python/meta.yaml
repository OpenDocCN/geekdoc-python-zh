    \ 9999))\ns.listen(5) # max queued connections\n\nwhile True:\n    sock, addr\
    \ = s.accept()\n    # use socket sock to communicate\n    # with client process\n\
    ```\n\n- **Client connection creates new socket**: Returned with address by `accept()`.\n\
    - **Server handles one client at a time**: Connection-oriented servers are a little\
    \ more complex because the connection allows clients and servers to interact across\
    \ multiple `send()` and `recv()` calls.\n- The server blocks in `accept()` until\
    \ a client connects. The return value from `accept()` is a tuple consisting of\
    \ a socket and the client address (which is the usual (address, port) tuple).\n\
    - The server can, if it chooses, use multitasking techniques such as creating\
    \ a new thread or forking a new process to allow it to handle several concurrent\
    \ connections. Either solution allows the connection to be processed while the\
    \ main control loop returns to execute another `accept()` and deal with the next\
    \ client connection.\n- Since each connection generates a new server-side socket\
    \ there is no conflict between the different conversations, and the server can\
    \ continue to use the `listen()`ing socket to listen for incoming connections\
    \ while it serves already-connected clients.\n\n```python\n# Connection-Oriented\
    \ Client\ns = socket(AF_INET, SOCK_STREAM)\ns.connect((HOST, PORT))\ns.send('Hello,\
    \ world')\ndata = s.recv(1024)\ns.close()\nprint 'Received', data\n```\n\n- **This\
    \ is a simple example**: Sends message, receives response. Server receives 0 bytes\
    \ after `close()`.\n\nThis very simple client just sends a single message and\
    \ receives a single response.\n\nMore typical code will send a request and use\
    \ its understanding of the application protocol to determine when the response\
    \ to that request has been completed.\n\nProtocols like HTTP 1.0 use a separate\
