    \n## 第三单元\n\n## 第6章\n\n## 网络连接\n\n### 结构\n\n- 6.1 什么是网络\n- 6.2 网络类型\n- 6.3 网络拓扑\n\
    - 6.4 什么是域以及域的不同类型\n- 6.5 面向连接和无连接\n    - 6.5.1 无连接服务\n    - 6.5.2 面向连接服务\n- 6.5\
    \ 协议简介及不同类型的协议。\n- 6.7 网络连接简介\n- 6.8 什么是套接字\n- 6.9 套接字模块\n- 6.10 客户端-服务器架构\n-\
    \ 6.11 创建服务器-客户端程序\n- 6.12 通过SMTP发送邮件\n    - 6.12.1 SMTP简介\n    - 6.12.2 发送电子邮件\n\
    - 6.13 什么是URL？\n- 6.14 从URL读取数据\n- 6.15 问题\n\n## 6.1 什么是网络\n\n通信系统的基本目的是在两方之间交换数据，或在两个通信网络之间交换数据。\n\
    \n计算机网络是允许多台计算机（称为主机）相互通信的基础设施。网络通过提供一套称为**协议**的通信规则来实现这一点，所有参与的主机都应遵守这些规则。协议的必要性显而易见：它使来自不同厂商、具有不同操作特性的计算机能够“使用同一种语言交流”。\n\
    \n对于网络，我们应该了解不同的网络组件。然后我们需要了解不同的网络拓扑。我们应该清楚不同类型的网络：点对点、多点、局域网、广域网以及互联网络（互联网）。\n\
    \n通信可以发生在工作站（即节点或客户端）和服务器之间，通过公共电话网络。另一个例子是在同一网络上两个电话之间交换语音通道，即语音信号。\n\n### 网络通信的关键组件\n\
    \n1.  服务器（源）\n2.  发送器\n3.  传输系统\n4.  接收器\n5.  目的地\n\n1.  **服务器（源）：** 服务器是生成待传输数据的设备，即输入传输所需的数据元素。\n\
    \    例如：电话和个人计算机。\n2.  **发送器：** 源系统生成的数据不会以其生成的形式直接传输，而是先对源信息进行编码，输出信号，然后通过传输系统进行传输。而**发送器**是一种设备，它转换信号或数据，并对信息进行编码，从而产生可以通过某种传输系统传输的电磁信号。\n\
    \    例如：调制解调器从连接的设备（如个人计算机，因为计算机的输出是通过调制解调器的数字信号）获取数字比特流（比特的组合），并将该比特流转换为模拟信号（模拟信号是在正弦波中变化的信号），以便电话网络能够处理。\n\
    \    因此，源和发送器合称为源系统。\n3.  **传输系统：** **传输系统**可以是单根传输线，也可以是连接源和目的地的复杂网络。它是用于连接源和目的地的媒介。\n\
    4.  **接收器：** **接收器**从传输系统接收信号，并将其转换为目的地设备可以处理的形式。\n    例如：**调制解调器**（调制解调器）从发送器或源接收一种形式的信号，将其转换为另一种形式传递给传输系统，而传输系统的输出又是信号形式，需要转换成另一种形式才能到达目的地。因此，输出调制解调器将接受来自网络或传输线的模拟信号，并将其转换为数字比特流。\n\
    5.  **目的地：** **目的地**从接收器接收传入的数据，这是接收器的输出，其中工作站或节点的源数据通过发送器调制解调器转换到传输系统（即公共电话网络），公共电话网络的输出由接收器（即调制解调器）接收，该调制解调器将此信号转换为目的地所需的信号形式，并将转换后的信号从接收器传输到目的地。\n\
    \n## 网络寻址\n\n机器有一个主机名和IP地址。\n\n程序/服务有一个端口号。\n\n## 标准端口\n\n- 每个主机有65,536个端口。\n\
    - 某些端口为特定应用程序保留。\n    - 20, 21: FTP\n    - 23: Telnet\n    - 80: HTTP\n    - 参见RFC\
    \ 1700\n- 大约有2000个端口被保留。\n\n套接字提供了一个通过端口向网络发送数据和从网络接收数据的接口。\n\n- 常用服务的端口是预先分配的。\n\
    \    - 21 FTP\n    - 22 SSH\n    - 23 Telnet\n    - 25 SMTP（邮件）\n    - 80 HTTP（Web）\n\
    \    - 110 POP3（邮件）\n    - 119 NNTP（新闻）\n    - 443 HTTPS（Web）\n\n其他端口号可能只是由操作系统随机分配给程序。\n\
    \n## 使用netstat检查活动的网络连接\n\n使用“netstat”查看活动的网络连接。\n\n```\nshell % netstat -a\n\
    Active Internet connections (servers and established)\nProto Recv-Q Send-Q Local\
    \ Address           Foreign Address\n tcp        0      0 *:imaps            \
    \     *:*\n tcp        0      0 *:pop3s                 *:*\n tcp        0   \
    \   0 localhost:mysql         *:*\n tcp        0      0 *:pop3               \
    \   *:*\n tcp        0      0 *:imap2                 *:*\n tcp        0     \
    \ 0 *:8880                  *:*\n tcp        0      0 *:www                  \
    \ *:*\n tcp        0      0 192.168.119.139:domain  *:*\n tcp        0      0\
    \ localhost:domain        *:*\n tcp        0      0 *:ssh                   *:*\n\
    \ ...\n```\n\n注意：必须在命令行shell中执行，适用于Unix和Windows。\n\n## 6.2 网络类型\n\n网络可以是对等网络（也称为工作组）或基于服务器的网络（也称为客户端/服务器网络）。\n\
    \n### 对等网络\n\n在对等网络中，一组计算机连接在一起，以便用户可以共享资源和信息。没有用于认证用户、存储文件或访问资源的中心位置。\n\n这意味着用户必须记住工作组中哪些计算机拥有他们想要访问的共享资源或信息。这也意味着用户必须登录到每台计算机才能访问该计算机上的共享资源。\n\
    \n在大多数对等网络中，用户难以跟踪信息的位置，因为数据通常存储在多个计算机上。这使得备份关键业务信息变得困难，并且常常导致小企业无法完成备份。通常，工作组中的不同计算机上存在同一文件的多个版本。\n\
    \n### 基于服务器的网络\n\n在基于服务器的网络中，服务器是用户共享和访问网络资源的中心位置。这台专用计算机控制用户对共享资源的访问级别。共享数据集中存储在一个位置，使得备份关键业务信息变得容易。\n\
    \n连接到网络的每台计算机都称为客户端计算机。在基于服务器的网络中，用户拥有一个用户帐户和密码来登录服务器并访问共享资源。服务器操作系统旨在处理多台客户端计算机访问基于服务器的资源时的负载。\n\
    \n## 6.3 网络拓扑\n\n网络的物理拓扑是指电缆、计算机和其他外围设备的配置。\n\n在联网中，“拓扑”一词指的是网络上连接设备的布局。拓扑作为网络的虚拟形状或结构。这种形状不一定与网络上设备的实际物理布局相对应。例如，家庭局域网上的计算机可能在家庭房间里排成一圈，但在那里找到实际的环形拓扑的可能性极低。\n\
    \n网络拓扑分为以下基本类型：\n\n1.  总线拓扑\n2.  环形拓扑\n3.  星形拓扑\n4.  网状拓扑\n5.  树形拓扑\n6.  混合拓扑"
