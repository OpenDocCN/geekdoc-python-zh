  md: "# ## 3.3 Regular Expression [re] module\n\n+   - re module is used for Regular\
    \ expression operations in python.\n- with re regular expression both patterns\
    \ and strings to be searched can be Unicode strings as well as 8-bit strings.\n\
    - most regular expression operations are available as module-level functions and\
    \ methods on compiled Regular Expressions.\n- A regular expression (or RE) specifies\
    \ a set of strings that matches it; the functions in this module let you check\
    \ if a particular string matches a given regular expression.\n- re has two important\
