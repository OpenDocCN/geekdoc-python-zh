    - urllib.error：包含 urllib.request 抛出的异常\n- urllib.parse：用于解析 URL\n- urllib.robotparser：用于解析\
    \ robots.txt 文件\n\n特别地，urlopen() 函数类似于内置的 open() 函数，但接受统一资源定位符（URL）而不是文件名。存在一些限制——它只能打开用于读取的\
    \ URL，并且不支持 seek 操作。\n\nurllib.request 模块定义了有助于在复杂的网络环境中打开 URL（主要是 HTTP）的函数和类——包括基本和摘要认证、重定向、Cookie\
    \ 等更多功能。\n\nurllib.request 模块定义了以下函数：\n\n```\nurllib.urlopen(url[, data[, proxies[,\
