    +   tkinter: tkinter is the Python interface to the Tk GUI toolkit shipped with
    Python. tkinter is the standard GUI library for Python. Python when combined with
    tkinter provides a fast and easy way to create GUI applications. tkinter provides
    a powerful object-oriented interface to the Tk GUI toolkit

    wxPython: This is an open-source Python interface for wxWindows http://wxpython.org.

    JPython: JPython is a Python port for Java which gives Python scripts seamless
    access to Java class libraries on the local machine http://www.jython.org.


    # 4.1.2 Advantages of GUI


    +   1. Using GUI we can save lots of time to configure any drivers or software
    without prior knowledge.

    2. With the help of GUI application everyone use a computer instead of having
    to remember commands.

    3. Most lay users will have a smaller learning curve using a GUI.

    4. A GUI allows computer users to employ visual elements, such as desktop icons,
    to navigate and operate software.'
