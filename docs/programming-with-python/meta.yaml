    - it would be used as a regular expression. One way to prevent this consists in
    writing every backslash as "\\" and this way keep it for the evaluation of the
    regular expression. The best way to overcome this problem consists in marking
    regular expressions as raw strings.

    - You can also use REs to modify a string or to split it apart in various ways.

    - If you want to use regular expressions in Python, you have to import the re
    module, which provides methods and functions to deal with regular expressions.


