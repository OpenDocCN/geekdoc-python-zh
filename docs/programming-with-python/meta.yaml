    >>> import urllib.request\n>>> f = urllib.request.urlopen('http://www.python.org/')\n\
    >>> print(f.read(300))\n```\n\n![](img/19353aba2f109d1f7c4c239afb8fa982_202_0.png)\n\
    \n注意 urlopen 返回的是一个 bytes 对象。这是因为 urlopen 无法自动确定它从 HTTP 服务器接收到的字节流的编码方式。通常，程序在确定或猜测出合适的编码后，会将返回的\
    \ bytes 对象解码为字符串。\n\n### Request 对象\n\n**Request.full_url**\n传递给构造函数的原始 URL。\n\
    \n**Request.type**\nURI 方案。\n\n**Request.host**\nURI 权威部分，通常是主机名，但也可能包含用冒号分隔的端口。\n\
    \n**Request.origin_req_host**\n请求的原始主机，不包括端口。\n\n**Request.selector**\nURI 路径。如果\
    \ Request 使用代理，那么 selector 将是传递给代理的完整 URL。\n\n**Request.data**\n请求的实体体，如果未指定则为\
    \ None。\n\n**Request.method**\n要使用的 HTTP 请求方法。默认值为 None，这意味着 get_method() 将执行其对要使用的方法的常规计算。其值可以通过以下方式设置（从而覆盖\
