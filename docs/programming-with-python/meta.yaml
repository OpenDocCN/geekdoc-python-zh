    num = re.sub(r'\\D', '', phone)\nprint ('Phone Num : ', (num))\n```\n\n### Output\n\
    \n![](img/19353aba2f109d1f7c4c239afb8fa982_84_0.png)\n\n## 3.8 Regular-expression\
    \ Modifiers – Option Flags\n\nRegular expression literals may include an optional\
    \ modifier to control various aspects of matching. The modifiers are specified\
