    \nThe Tkinter module, containing the Tk toolkit, has always to be imported. In\
    \ our example, we import everything from Tkinter by using the asterisk symbol\
    \ (\"*\") into our module's namespace:\n\n```\nfrom Tkinter import *\n```\n\n\
    To initialize Tkinter, we have to create a Tk root widget, which is a window with\
    \ a title bar and other decoration provided by the window manager. The root widget\
    \ has to be created before any other widgets and there can only be one root widget.\n\
    \n```\nroot = Tk()\n```\n\nThe next line of code contains the Label widget. The\
    \ first parameter of the Label call is the name of the parent window, in our case\
    \ \"root\". So our Label widget is a child of the root widget. The keyword parameter\
    \ \"text\" specifies the text to be shown:\n\n```\nw = Label(root, text=\"Hello\
    \ Tkinter!\")\n```\n\nThe pack method tells Tk to fit the size of the window to\
    \ the given text.\n\n```\nw.pack()\n```\n\nThe window won't appear until we enter\
    \ the Tkinter event loop:\n\n```\nroot.mainloop()\n```\n\nOur script will remain\
    \ in the event loop until we close the window.\n\n## 4.6.8 Spinbox widget\n\n\
    The Spinbox widget allows the user to select values from a given set. The values\
    \ may be a range of numbers, or a fixed set of strings.\n\nSyntax\n\n```\nw =\
    \ Spinbox( master, option, ... )\n```\n\nParameters\n\n- **master:** This represents\
    \ the parent window.\n- **options:** Here is the list of most commonly used options\
    \ for this widget. These options can be used as key-value pairs separated by commas.\n\
    \n| Option | Description |\n|---|---|\n| activebackground | The color of the slider\
    \ and arrowheads when the mouse is over them. |\n| bg | The color of the slider\
    \ and arrowheads when the mouse is not over them. |\n| bd | The width of the 3-d\
    \ borders around the entire perimeter of the trough, and also the width of the\
    \ 3-d effects on the arrowheads and slider. Default is no border around the trough,\
    \ and a 2-pixel border around the arrowheads and slider. |\n| command | A procedure\
    \ to be called whenever the scrollbar is moved. |\n| cursor | The cursor that\
    \ appears when the mouse is over the scrollbar. |\n| Disabledbackground | The\
