    | ImportError | Raised when an import statement fails. |

    | KeyboardInterrupt | Raised when the user interrupts program execution, usually
    by pressing Ctrl+c. |

    | LookupError | Base class for all lookup errors. |

    | IndexError | Raised when an index is not found in a sequence. |

    | KeyError | Raised when the specified key is not found in the dictionary. |

    | NameError | Raised when an identifier is not found in the local or global namespace.
    |

    | UnboundLocalError | Raised when trying to access a local variable in a function
    or method but no value has been assigned to it. |

    | EnvironmentError | Base class for all exceptions that occur outside the Python
    environment. |

    | IOError | Raised when an input/ output operation fails, such as the print statement
    or the open() function when trying to open a file that does not exist. |

    | OSError | Raised for operating system-related errors. |

    | SyntaxError | Raised when there is an error in Python syntax. |

    | IndentationError | Raised when indentation is not specified properly. |

    | SystemError | Raised when the interpreter finds an internal problem, but when
    this error is encountered the Python interpreter does not exit. |

    | SystemExit | Raised when Python interpreter is quit by using the sys.exit()
    function. If not handled in the code, causes the interpreter to exit. |

    | ValueError | Raised when the built-in function for a data type has the valid
    type of arguments, but the arguments have invalid values specified. |

    | RuntimeError | Raised when a generated error does not fall into any category.
    |

    | NotImplementedError | Raised when an abstract method that needs to be implemented
    in an inherited class is not actually implemented. |

    | BufferError | Raised when a buffer related operation cannot be performed. |

    | KeyError | Raised when a mapping (dictionary) key is not found in the set of
    existing keys. |

    | MemoryError | Raised when an operation runs out of memory but the situation
    may still be rescued (by deleting some objects). |

    | OverflowError | Raised when the result of an arithmetic operation is too large
    to be represented. |

    | ReferenceError | This exception is raised when a weak reference proxy, created
    by the weakref.proxy() function, is used to access an attribute of the referent
    after it has been garbage collected. |

    | IndentationError | Base class for syntax errors related to incorrect indentation.
    |

    | TabError | Raised when indentation contains an inconsistent use of tabs and
    spaces |

    | TypeError | Raised when an operation or function is applied to an object of
    inappropriate type. The associated value is a string giving details about the
    type mismatch. |

    | WindowsError | Raised when a Windows-specific error occurs. |

    | ZeroDivisionError | Raised when the second argument of a division or modulo
    operation is zero |'
