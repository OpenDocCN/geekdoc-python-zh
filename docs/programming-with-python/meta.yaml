    \ –\n\n![](img/19353aba2f109d1f7c4c239afb8fa982_81_1.png)\n\n## 3.6 匹配与搜索\n\n\
    **match() 与 search()**\n\n**`match()`** 函数仅检查正则表达式是否在字符串的开头匹配，而 **`search()`**\
    \ 会向前扫描整个字符串以查找匹配项。`match()` 只会报告在位置 0 开始的成功匹配；如果匹配不从位置 0 开始，`match()` 将不会报告它。\n\
    \n```\n>>> print(re.match('super', 'superstition').span())\n(0, 5)\n\n>>> print(re.match('super',\
    \ 'insuperable'))\nNone\n```\n\n**另一方面，`search()` 会向前扫描字符串，并报告它找到的第一个匹配项。**\n\n\
    ```\n>>> print(re.search('super', 'superstition').span())\n(0, 5)\n\n>>> print(re.search('super',\
    \ 'insuperable').span())\n(2, 7)\n```\n\n## 匹配与搜索示例\n\n### 代码\n\n```\n#!/usr/bin/python\n\
    import re\n\nline = \"Cats are smarter than dogs\";\nmatchObj = re.match( r'dogs',\
