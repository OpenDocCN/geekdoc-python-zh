  - "[PAGE 182]\n\n# with client process\n\n+   - Client connection creates new socket\n\
    \  - Returned with address by accept()\n\n+   - Server handles one client at a\
    \ time\n  - Connection-oriented servers are a little more complex because the\
    \ connection allows clients and servers to interact across multiple send() and\
    \ recv() calls.\n  - The server blocks in accept() until a server connects. The\
    \ return value from accept() is a tuple consisting of a socket and the client\
    \ address (which is the usual (address, port) tuple).\n  - The server can, if\
    \ it chooses, use multitasking techniques such as creating a new thread or forking\
    \ a new process to allow it to handle several concurrent connections. Either solution\
    \ allows the connection to be processed while the main control loop returns to\
    \ execute another accept() and deal with the next client connection.\n  - Since\
    \ each connection generates a new server-side socket there is no conflict between\
    \ the different conversations, and the server can continue to use the listen()ing\
    \ socket to listen for incoming connections while it serves already-connected\
    \ clients.\n\n```\nConnection-Oriented Client\ns = socket(AF_INET, SOCK_STREAM)\n\
    s.connect((HOST, PORT))\ns.send('Hello, world')\ndata = s.recv(1024)\ns.close()\n\
    print 'Received', data\n```\n\n+   - This is a simple example\n  - Sends message,\
    \ receives response\n  - Server receives 0 bytes after close()\n\nThis very simple\
    \ client just sends a single message and receives a single response.\nMore typical\
    \ code will send a request and use its understanding of the application protocol\
    \ to determine when the response to that request has been completed.\nProtocols\
    \ like HTTP 1.0 use a separate connection for each request. Protocols like telnet\
    \ can exchange thousands of messages before the connection is closed, and the\
    \ code tends to be more complex in that case.\nUnder normal circumstances a recv()\
    \ call guarantees that at least one byte of data will be returned. When a program\
    \ seems the empty string (zero bytes) returned from the recv() it knows that the\
    \ other end has terminated the connection by calling close() on its socket."
  - '[PAGE 183]


    # 6.6 Introduction to protocol and different types of protocols.


    Protocol may be defined as a set of rules governing the exchange of data between
    two entities.


    **Key Elements Of Protocol:**


    +   1. Syntax.

    2. Semantics.

    3. Timing.


    +   1. **Syntax:** It includes such things as data format and signal levels (i.e.:
    Encoding and Decoding).

    2. **Semantics:** It includes control information for co-ordination and error
    handling.

    3. **Timing:** It includes speed matching and sequencing.


    Depending upon these three key elements protocols are divided into two types.


    **Two Types Of Protocols Based On Key Elements:**


    +   1. Hardware Protocol.

    2. Software Protocol.


    +   1. **Hardware Protocol:** It is a protocol used to check set of rules for
    all hardware devices that means during transmission of data it checks each and
    every cable connections and all intermediate hardware devices such as routers
    and gateways. If any damage of hardware device occurs, the hardware protocol will
    identify that and provides message to the server like “A Network Cable Is Plugged
    Out”.

    2. **Software Protocol:** It is a set of rules used for checking the data or application
    through which the data is transferred. It also checks the data for each packet
    along with control information of each packet. During transmission checkpoints
    are created using software protocol, which gives information during packet lost
    or damaged or data gram lost or damaged or any sort of data problem.


    These software protocols are bifurcated into different types like SMTP, FTP, HTTP
    and MIME etc.


    # 6.7 Introduction to Networking Connectivity


    **Network connectivity**


    Network connectivity means we are connecting different types of network with one
    another. Connectivity is possible with the help of different topologies implemented
    within the network. With the help of topologies we can communicate with other
    computer and there resources like printer, DVD writer etc. using Hub, Repeater
    Switches and Router.


    Python provides two levels of access to network services. At a low level, you
    can access the basic socket support in the underlying operating system, which
    allows you to implement clients and servers for both connection-oriented and connectionless
    protocols.


    Python also has libraries that provide higher-level access to specific application-level
    network protocols, such as FTP, HTTP, and so on.


    Network programming is a major use of Python'
