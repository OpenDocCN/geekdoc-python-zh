    \ you can serialize it using the pickle module, as you saw in Chapter 8.\n\nThe\
    \ close method closes the file or files and saves the data to disk.\n\n# 5.1.4\
    \ Accessing Persistence Directory\n\nBy using dbm modules, you can use the object\
    \ you get back from the open function as a dictionary object. Get and set values\
