    # 6.2 Networks Types


    A network is either a peer-to-peer network (also called a workgroup) or a server-based
    network (also called a client/server network).


    # Peer-to-peer Network


    ![](img/19353aba2f109d1f7c4c239afb8fa982_172_0.png)


    In a peer-to-peer network a group of computers is connected together so that users
    can share resources and information. There is no central location for authenticating
    users, storing files, or accessing resources.'
  merge: -1
  pgno: 172
- img_proc: true
  md: 'This means that users must remember which computers in the workgroup have the
    shared resource or information that they want to access. It also means that users
    must log on to each computer to access the shared resources on that computer.


    In most peer-to-peer networks, it is difficult for users to track where information
    is located because data is generally stored on multiple computers. This makes
    it difficult to back up critical business information, and it often results in
    small businesses not completing backups. Often, there are multiple versions of
    the same file on different computers in the workgroup.


    # ## Server-based Network


    In a server-based network, the server is the central location where users share
    and access network resources. This dedicated computer controls the level of access
    that users have to share resources. Shared data is in one location, making it
    easy to back up critical business information.


    Each computer that connects to the network is called a client computer. In a server-based
    network, users have one user account and password to log on to the server and
    to access shared resources. Server operating systems are designed to handle the
    load when multiple client computers access server-based resources.


    ![](img/19353aba2f109d1f7c4c239afb8fa982_173_0.png)


    # # 6.3 Network Topology


    The physical topology of a network refers to the configuration of cables, computers,
    and other peripherals.


    In networking, the term “**topology**” refers to the layout of connected devices
    on a network. Topology as a network’s virtual shape or structure. This shape does
    not necessarily correspond to the actual physical layout of the devices on the
    network. For example, the computers on a home LAN may be arranged in a circle
    in a family room, but it would be highly unlikely to find an actual ring topology
    there.


    +   Network topologies are categorized into the following basic types:

    1. Bus Topology

    2. Ring Topology

    3. Star Topology

    4. Mesh Topology

    5. Tree Topology

    6. Hybrid Topology'
