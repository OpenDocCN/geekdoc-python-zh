    # To insert values into the Table:-


    ```

    Syntax:

    INSERT INTO <Table Name> VALUES

    (Value1, Value2, Value3);

    ```


    # Example:


    +   1. INSERT INTO Students VALUES

    (1, ''kiran'', ''UNR'', 45,50);

    [Enclose character type of data in '' '']

    2. INSERT INTO Students VALUES

    (1, null, ''UNR'', null,50);

    [Use null when you do not want to enter any value.]

    3. INSERT INTO Students VALUES

    (&Roll_no, ''&NAME'', ''&ADDRESS'', &DOS,&WIN);

    [Substituting values at the time of execution.]

    4. INSERT INTO Students VALUES (Roll_no, Name)

    (1, ''kiran'');

    [Inserting only specified fields.]


    # To Display the rows of a Table:


    ```

    Syntax:

    SELECT * FROM < Table Name> ;

    [WHERE <condition>]

    [GROUP BY <exp> [HAVING <condition>]]

    [ORDER BY <exp> [ASC | DESC]]

    ```


    # Example:


    +   1. SELECT * FROM Students;

    [To display all the rows of the Table]

    2. SELECT Roll_no, Name FROM Students;

    [To display rows of only the specified columns]'
