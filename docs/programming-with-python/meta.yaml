    \ from standard input, which by default comes from the keyboard?\n   (a) Raw_input\
    \ & Input\n   (b) Scan\n   (c) Scanner\n   (d) keyboard\n\n   **Ans: (a) Raw_input\
    \ & Input**\n\n4. Which of the following is not a valid mode to open a file?\n\
