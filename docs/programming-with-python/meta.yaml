    Here is a list of the Basic three different modes of opening a file:


    | Modes | Description |

    | :--- | :--- |

    | r | Opens a file for reading only. The file pointer is placed at the beginning
    of the file. This is the default mode. |

    | w | Opens a file for writing only. Overwrites the file if the file exists. If
    the file does not exist, creates a new file for writing. |

    | a | Opens a file for appending. The file pointer is at the end of the file if
    the file exists. That is, the file is in the append mode. If the file does not
    exist, it creates a new file for writing. |


    All files must first be opened before they can be read from or written to.


    # Example of open method


    ```

    #!/usr/bin/python

    # Open a file


    fobj = open("kiran.txt", "w")

    print ("Name of the file: ", fobj.name)


    # Close opened file

    fobj.close()

    ```


