    When opening a file for reading, if the file name does not exist, then the program
    will terminate with a “**no such fi le or directory**” error.


    When a file is opened, it is first searched for in the same folder/directory that
    the program resides in. There are two methods to specify path


    +   1. Relative path

    2. Absolute path


    1. Relative path: Alternate location can be specified in the call to open by providing
    a path to the file,

    python

    input_fileobj = open(''kiran/kiranfile.txt'',''r'')


    Here the file is searched for in a subdirectory called kiran of the directory
    in which the program is contained. Thus, its location is relative to the program
    location. Directory paths in Python are always written with forward slashes.


    2. Absolute path: Absolute paths can also be provided giving the location of a
    file anywhere in the file system,

    python

    input_fi leobj = open(''C:/mypythonfiles/kiran/kiranfile.txt'',''r'').


    When the program has finished reading the file, it should be closed by calling
    the close method on the file object.

    python

    input_fi leobj.close()


    Once closed, the file may be reopened (with reading starting at the beginning
    of the file) by the same, or another program.


    # Example for open for Reading


    ```

    fo=open("foo.txt","r+")

    str=fo.read(10)

    print ("read string is",str)

    fo.close()

    ```


    # Output


    read string is python in'
