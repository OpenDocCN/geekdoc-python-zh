  mdcn: "## 4.1.3 GUI 的缺点\n\n1.  如果构建不当，使用起来可能会非常困难。\n2.  与非图形界面相比，GUI 需要更多的内存资源。\n\
    3.  它可能需要安装额外的软件，例如，在 Java 的情况下需要 \"运行环境\"。\n4.  在 GUI 中没有搜索选项。\n5.  GUI 的主要缺点是你只能执行应用程序/程序中预定义的操作，无法从你的端输入任何单条命令。\n\
    \n## 4.2. Python 中的 GUI 库简介\n\n### 4.2.1 图形库\n\n*图形库*\n\n-   Pyglet\n-   Bottle\n\
    -   Invoke\n-   Splinter\n-   Arrow\n-   Peewee\n\n*GUI 库*\n\nTkinter Python 的标准构建包含一个面向对象的接口，用于\
    \ Tcl/Tk 控件集，称为 **tkinter**。\n\nTkinter 框架传统上随 Python 捆绑，它使用 Tk。可用的框架完整列表可在此处查看：[Python\
    \ GUI 编程](https://docs.python.org/3/library/tkinter.html)。Tkinter 是用于 Tk GUI 工具包的标准\
    \ Python 接口（Tk 接口）。Tk 接口模块也包含许多其他模块。\n\n当你使用 Python 2.7.x 版本时，必须将 **Tkinter**\
    \ 的首字母大写，如果你使用更高版本如 3.4.x，则使用 **tkinter**。\n\n在本书中，我们同时使用 2.7.x 和 3.4.x 版本，因此我们会在书中适时地指示哪个特定版本用于哪个程序。\n\
    \n现在，我们将通过示例逐步介绍 Python 库，以便你熟悉每一个相关的库。\n\n## Pyglet\n\nPyglet 是一个跨平台的多媒体和窗口图形框架，使用纯\
    \ Python 实现。\n\n## 在 Python 中使用 Pyglet\n\n我们可以将其用于窗口函数、OpenGL 图形、音频和视频播放、键盘和鼠标处理以及图像文件操作。\n\
    \n## Bottle\n\nBottle 是一个微小、轻量级的 Web 框架。\n\n## 在 Python 中使用 Bottle\n\nBottle 用于路由、模板、访问请求和响应数据、支持从普通\
    \ CGI 到更高级的多种服务器类型，并支持 WebSockets 等更高级的功能。\n\n## Invoke\n\nInvoke 允许你使用 Python\
    \ 库执行管理任务。\n\n## 在 Python 中使用 Invoke\n\nInvoke 为管理命令行任务提供了常识性的解决方案，并将它们视为 Python\
    \ 函数进行管理，允许围绕它们优雅地构建更大的项目。\n\n## Splinter\n\nSplinter 是一个用于通过自动化交互来测试 Web 应用程序的\
    \ Python 库。\n\n## 在 Python 中使用 Splinter\n\nSplinter 自动化端到端的一切，包括调用浏览器、传递 URL、填写表单、点击按钮等。\n\
    \n它需要特定浏览器的驱动程序，但 Chrome 和 Firefox 已经内置支持，并且可以使用 Selenium Remote 控制在其他地方运行的浏览器。\n\
    \n如果你想了解特定浏览器在面对给定网站时的行为，Splinter 很有用。\n\n## Arrow\n\nArrow 库理清了 Python 日期/时间处理中的混乱。\n\
    \n## 在 Python 中使用 Arrow\n\n处理时区、日期转换、日期格式等所有问题都是令人头疼的双重难题。使用 Python 的标准库进行日期/时间工作，你会面临双重头疼。\n\
    \n## Peewee\n\nPeewee 是一个小型但功能强大的数据库访问库，原生支持 MySQL 等。\n\n## 在 Python 中使用 Peewee\n\
    \nPeewee 提供了一条安全、程序化的路径来访问数据库资源，使用一组 Python 类。借助 Peewee，一种快速简陋的数据库访问方式可以在之后扩展为更强大的选项，而无需推倒重来。\n\
    \n## 4.3. 布局管理器\n\nPython Tkinter GUI 为我们提供了灵活性和对组件布局的完全控制。为此，它提供了三种类型的布局管理器：最简单的是\
    \ Pack 布局管理器，更符合逻辑的是 grid 布局管理器，还有 place 布局管理器。这些布局管理器有助于在屏幕上排列、管理、控制和注册不同的 Python\
    \ tkinter 组件。外观取决于所使用的操作系统，但基本结构保持不变。需要注意的一点是，Pack、grid 和 Place 永远不会在一个窗口中混合使用。\n\
    \n### 4.3.1 Pack 布局\n\n```python\nfrom tkinter import *\nmaster = Tk()\nLabel(master,\
    \ text=\"Python\", bg=\"blue\", fg=\"white\").pack()\nLabel(master, text=\"Linux\
    \  \", bg=\"black\", fg=\"white\").pack()\nLabel(master, text=\"Java  \", bg=\"\
    pink\", fg=\"black\").pack()\nmainloop()\n```\n\n![](img/19353aba2f109d1f7c4c239afb8fa982_90_0.png)\n\
    \n### 4.3.2 Grid 布局\n\n```python\nfrom tkinter import *\nbg = ['pink','brown','indigo','teal','red','yellow']\n\
    counter = 0\nfor color in bg:\n    Label(text=color, relief=RIDGE, width=23).grid(row=counter,\
    \ column=0)\n    Entry(bg=color, relief=SUNKEN, width=18).grid(row=counter, column=1)\n\
    \    counter += 1\n```\n\n![](img/19353aba2f109d1f7c4c239afb8fa982_90_1.png)\n\
    \n## 4.4. 事件与绑定\n\n### 事件\n\n在计算中，事件是一个通常由程序外部发起的动作，由程序内部的一段代码处理。例如，事件包括鼠标点击、鼠标移动或用户的按键操作，即他或她在键盘上按下一个键。另一个来源可以是硬件设备，如计时器。\n\
    \n### 4.4.1 绑定事件\n\n事件以字符串形式给出，使用特殊的事件语法：\n`<修饰符-类型-详情>`\n类型字段是事件说明符最重要的部分。它指定了我们希望绑定的事件类型，可以是像\
    \ *Button* 和 *Key* 这样的用户操作，也可以是像 *Enter*、*Configure* 等窗口管理器事件。\n\n### 绑定\n\n绑定仅适用于单个组件；如果你创建新的框架，它们不会继承这些绑定。但\
    \ tkinter 也允许你在类和应用程序级别创建绑定；实际上，你可以在四个不同级别创建绑定：\n\n-   组件实例，使用 `bind`。\n-   组件的顶层窗口（Toplevel\
    \ 或根窗口），也使用 `bind`。\n-   组件类，使用 `bind_class`（Tkinter 用此提供标准绑定）。\n-   整个应用程序，使用\
    \ `bind_all`。\n\n例如，你可以使用 bind_all 为 F1 键创建绑定，这样你就可以在应用程序的任何地方提供帮助。但如果你为同一个键创建多个绑定，或者提供重叠的绑定会发生什么呢？首先，在这四个级别中的每一个，tkinter\
    \ 都会选择可用绑定中“最接近匹配”的那个。例如，如果你为 `<Key>` 和 `<Return>` 事件创建了实例绑定，那么当你按下 **Enter**\
    \ 键时，只有第二个绑定会被调用。\n\n一个 tkinter 应用程序大部分时间都在事件循环内部度过（通过 mainloop 方法进入）。事件可以来自各种来源，包括用户的按键和鼠标操作。对于每个组件，你可以将\
    \ Python 函数和方法绑定到事件。\n\n```python\nwidget.bind(event, handler)\n```\n\n如果在组件中发生了匹配\
    \ *event* 描述的事件，则会调用给定的 *handler*，并传递一个描述该事件的对象。\n\n### 4.4.1 绑定事件\n\n### 4.4.2\
    \ 移动事件\n\n### 示例\n\n### 绑定事件\n\n程序名：eventnbind.py\n\n![](img/19353aba2f109d1f7c4c239afb8fa982_91_0.png)\n\
    \n### 输出\n\n![](img/19353aba2f109d1f7c4c239afb8fa982_92_0.png)\n\n在上面的程序中，我们创建了一个按钮组件，它绑定到一个名为\
    \ hello 的函数，另一个名为 quit 的函数在我们双击鼠标时被激活，此时程序终止，我们得到 Python 提示符，即 >>>\n\n### 4.4.2\
    \ 移动事件\n\n```python\nfrom tkinter import *\n\ndef motion(event):\n    print(\"\
    Mouse position: (%s %s)\" % (event.x, event.y))\n    return\n\nmaster = Tk()\n\
    motion_event = \"If you want knowledge you work hard\"\n\nmsg = Message(master,\
    \ text = motion_event)\nmsg.config(bg='lightgreen', font=('times', 24, 'italic'))\n\
    msg.bind('<Motion>',motion)\nmsg.pack()\nmainloop()\n```\n\n### 输出\n\n在移动事件程序中，我们首先创建一个\
    \ motion 组件，然后将其绑定到名为 motion(event) 的函数，这里我们借助该函数显示精确的鼠标坐标，即 x，y"
