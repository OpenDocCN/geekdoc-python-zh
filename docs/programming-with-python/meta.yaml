    # 6.14 Reading from URL


    The urllib module has been split into parts and renamed in Python 3 to urllib.request,
    urllib.parse, and urllib.error.


    # urllib — URL handling modules


    urllib is a package that collects several modules for working with URLs:


    +   - urllib.error: containing the exceptions raised by urllib.request

    - urllib.parse: for parsing URLs

    - urllib.robotparser: for parsing robots.txt files


    In particular, the urlopen() function is similar to the built-in function open(),
    but accepts Universal Resource Locators (URLs) instead of filenames. Some restrictions
    apply — it can only open URLs for reading, and no seek operations are available.


    The urllib.request module defines functions and classes which help in opening
    URLs (mostly HTTP) in a complex world — basic and digest authentication, redirections,
    cookies and more.


    The urllib.request module defines the following functions:


    ```

    urllib.urlopen(url[, data[, proxies[, context]]])

    ```


    Now we the simple example, this example gets the python.org main page and displays
    the first 300 bytes of it.


    ```

    >>> import urllib.request

    >>> f = urllib.request.urlopen(''http://www.python.org/'')

    >>> print(f.read(300))

    ```


