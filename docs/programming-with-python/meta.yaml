  md: "# # 1.10 Manipulating Directories\n\n# ## 1.10.1 Directories in Python\n\n\
    +   - Directory in a python consist of all python files\n- Python provides different\
    \ utility methods to manipulate files & directories\n    - **File Object Methods**\
    \ has different functions to manipulate files. File Object has several methods\
    \ to create, open, read, write, flush, make file position and closing of the file.\n\
    \    - **OS Object Methods** has different functions to process files as well\
    \ as directories. OS several methods that help you create, remove, and change\
    \ directories.\n\nA file object is created using *open* function and here is a\
    \ list of functions which can be called on this object:\n\n| Sr. No. | Methods\
    \ with Description |\n|---|---|\n| 1 | *file.close()* Close the file. A closed\
    \ file cannot be read or written any more. |\n| 2 | *file.flush()* Flush the internal\
    \ buffer, like stdio's fflush. This may be a no-op on some file-like objects.\
    \ |\n| 3 | *file.fileno()* Returns the integer file descriptor that is used by\
    \ the underlying implementation to request I/O operations from the operating system.\
    \ |\n| 4 | *file.isatty()* Returns True if the file is connected to a tty(-like)\
    \ device, else False. |\n| 5 | *file.next()* Returns the next line from the file\
    \ each time it is being called. |\n| 6 | *file.read([size])* Reads at most size\
    \ bytes from the file (less if the read hits EOF before obtaining size bytes).\
    \ |\n| 7 | *file.readline([size])* Reads one entire line from the file. A trailing\
    \ newline character is kept in the string. |\n| 8 | *file.readlines([sizehint])*\
    \ Reads until EOF using readline() and return a list containing the lines. If\
    \ the optional sizehint argument is present, instead of reading up to EOF, whole\
    \ lines totalling approximately sizehint bytes (possibly after rounding up to\
    \ an internal buffer size) are read. |\n| 9 | *file.seek(offset[, whence])* Sets\
    \ the file's current position. |\n| 10 | *file.tell()* Returns the file's current\
    \ position |\n| 11 | *file.truncate([size])* Truncates the file's size. If the\
    \ optional size argument is present, the file is truncated to (at most) that size.\
    \ |\n| 12 | *file.write(str)* Writes a string to the file. There is no return\
    \ value. |\n| 13 | *file.writelines(sequence)* Writes a sequence of strings to\
    \ the file. The sequence can be any iterable object producing strings, typically\
    \ a list of strings. |\n\n# ### OS Object Methods\n\nThis provides methods to\
    \ process files as well as directories\n\n| Sr. No. | Methods with Description\
    \ |\n|---|---|\n| 1 | *os.access(path, mode)* Use the real uid/gid to test for\
    \ access to path. |\n| 2 | *os.chdir(path)* Change the current working directory\
    \ to path |\n| 3 | *os.chmod(path, mode)* Change the mode of path to the numeric\
    \ mode. |\n| 4 | *os.chown(path, uid, gid)* Change the owner and group id of path\
    \ to the numeric uid and gid. |\n| 5 | *os.chroot(path)* Change the root directory\
    \ of the current process to path. |"
