    \n```\n>>>client.recv(2000)\n```\n\n'This message is send from client for the\
    \ server'\n\n因此，通过这种方式我们可以建立简单的客户端和服务器连接。\n\n## 服务器步骤\n\n- 创建套接字对象\n- 将套接字对象绑定到特定套接字\n\
