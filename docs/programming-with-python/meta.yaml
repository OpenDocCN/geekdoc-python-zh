    \ Transactions\n- 5.13 Understanding Exceptions in Database Connectivity\n- 5.14\
    \ Connectivity using Sqlite3\n- 5.15 Questions\n\n## 5.1 Introduction to Database\
    \ Connectivity\n\n- Database is a collection of organized and scrutinized data.\n\
    \n- Various Components of A Database File:\n  - Records: Records contain information\
    \ about different entity or person.\n  - Field: Each record contains information\
    \ in columns called as field.\n  - File: Each database is referred to as database\
    \ file or table.\n\n- Database Management System is a system based on related\
    \ information collected from different sources. It allows efficient handling of\
    \ data such as - filtering records, generating reports, labels, rearranging, querying\
    \ etc\n\n- A database is an organized collection of related data, typically stored\
    \ on disk, and accessible by many concurrent users.\n\n- Database may contain\
    \ Human Resource (employee data, Employee payroll and salary details); another\
    \ may contain sales data; another may contain accounting data; and so on. All\
    \ these Databases are managed by a DBMS.\n\n- A database refers to a set of related\
    \ data and it is organized. Access to this data is usually provided by a \"database\
    \ management system\" (DBMS) consisting of an integrated set of computer software\
    \ that allows users to interact with one or more databases and provides access\
    \ to all of the data contained in the database\n\n- The DBMS provides various\
    \ functions that allow entry, storage and retrieval of large quantities of information\
    \ and provides ways to manage how that information is organized.\n\n- A **database\
    \ management system** controls your access to the database and enables you to\
    \ define, create and maintain that database.\n\n- Database is a Backend Application\
    \ where data can be stored and maintained and python is a front end application\
    \ through which the data can be inputted through SQL statements. For Back end\
    \ connectivity with python we can use sqlite3 or MySQL as a backend database Application.\n\
    \n- With the help of database connectivity\n  - We can create connections with\
    \ database MySQL or sqlite\n  - Accessing of data with the help of cursors\n \
    \ - Querying and modifying of data\n  - Working with all types of database transactions\n\
    \  - Handling Errors\n\n![img/19353aba2f109d1f7c4c239afb8fa982_122_0.png](img/19353aba2f109d1f7c4c239afb8fa982_122_0.png)\n\
    \n## 5.1.1 Introduction to Python Database API\n\nPython’s support for relational\
    \ databases oracle and SQL. Each database module created its own API, which was\
    \ highly specific to that database because each database vendor evolved its own\
    \ API based on its own needs. Python has a support a common database DB, API,\
    \ that’s called the **DB API**. Specific modules enable your Python scripts to\
    \ communicate with different databases, such as **DB/2**, **PostgreSQL**, and\
    \ so on. The DB API provides a minimal standard for working with databases, using\
    \ Python structures and syntax wherever possible. This API includes the following:\n\
    \n1. Connections, which cover guidelines for how to connect to databases\n2. Executing\
    \ statements and stored procedures to query, update, insert, and delete data with\
    \ cursors\n3. Transactions, with support for committing or rolling back a transaction\n\
    4. Examining metadata on the database module as well as on database and table\
    \ structure\n5. Defining the types of errors\n\nPython Database API Supports a\
    \ wide range of Database Servers: **GadFly, MySQL, PostgreSQL, Microsoft SQL Server\
    \ 2000, Informix, Interbasse, Oracle, Sybase**\n\n**The DB API provides standard\
    \ for working with databases using Python structures. This API includes the following:**\n\
    \n- Importing the API module.\n- Acquiring a connection with the database.\n-\
    \ Issuing SQL statements and stored procedures.\n- Closing the connection\n\n\
    ## 5.1.2 Introduction to DBM Module\n\nDBM, short for *database manager*, acts\
    \ as a generic name for a number of C language libraries originally created on\
    \ UNIX systems. These libraries sport names such as **dbm**, **gdbm**, **ndbm**,\
    \ **sdbm**, and so on.\n\nPython supports a number of dbm modules. Each dbm module\
    \ supports a similar interface and uses a particular C library to store the data\
    \ to disk.\n\nThe following table lists the dbm modules:\n\n| Module | Description\
    \ |\n|---|---|\n| dbm | Chooses the best dbm module |\n| dbm.dumb | Uses of simple,\
    \ but portable, implementation of the dbm library |\n| dbm.gnu | Uses the GNU\
    \ dbm library |\n\nThe dbm module will choose the best implementation available\
    \ when creating a **new persistent dictionary**. When **reading a file**.\n\n\
    ## 5.1.3 Creating Persistent Directory\n\nAll of the dbm modules support an **open\
    \ function** to **create a new dbm object**. Once opened, you can **store data\
    \ in the dictionary**, **read data**, **close the dbm**, **remove items**, and\
    \ **test for the existence** of a key in the dictionary.\n\nTo open a dbm persistent\
    \ dictionary, use the open function on the module you choose.\n\nFor example,\
    \ you can create a persistent dictionary with the dbm module.\n\n### Program to\
    \ Create a Persistent Dictionary\n\nCode:\n\n```python\nimport dbm\n\ndb = dbm.open('websites',\
    \ 'c')\n\n# Add an item.\ndb['www.python.org'] = 'Python home page'\n\nprint(db['www.python.org'])\n\
    \n# Close and save to disk.\ndb.close()\n```\n\nOutput\n\n![img/19353aba2f109d1f7c4c239afb8fa982_123_0.png](img/19353aba2f109d1f7c4c239afb8fa982_123_0.png)\n\
    \n**Note:** DBM module is imported in the program, The open function requires\
    \ the name of the dictionary to create. This name gets translated into the name\
    \ of the data file or files that may already be on the disk. The following table\
    \ lists the available flags.\n\n| Flag | Usage |\n| :--- | :--- |\n| C | Opens\
    \ the data file for reading and writing, creating the file if needed. |\n| N |\
    \ Opens the file for reading and writing but always creates a new empty file.\
    \ If one already exists, it will be overwritten and its contents lost. |\n| W\
    \ | Opens the file for reading and writing, but if the file doesn't exist it will\
    \ not be created. |\n\nYou can also pass another optional parameter, the mode.\
    \ The mode holds a set of UNIX file permission. See Chapter 8 for more on opening\
    \ files.\n\n> The open method of the dbm modules returns a new dbm object, which\
    \ you can then use to store and retrieve data.\n\nAfter you open a persistent\
    \ dictionary, you can write values as you normally would with Python dictionaries,\
    \ as shown in the following example:\n\n```python\ndb['www.python.org'] = 'Python\
