  md: "# Output\n\n![](img/19353aba2f109d1f7c4c239afb8fa982_164_0.png)\n\n# Handling\
    \ Errors\n\nThere are many sources of errors. A few examples are a syntax error\
    \ in an executed SQL statement, a connection failure, or calling the fetch method\
    \ for an already canceled or finished statement handle.\n\nThe DB API defines\
    \ a number of errors that must exist in each database module. The following table\
    \ lists these exceptions.\n\n| Exception | Description |\n|-----------|-------------|\n\
    | Warning | Used for non-fatal issues. Must subclass StandardError. |\n| Error\
    \ | Base class for errors. Must subclass StandardError. |\n| InterfaceError |\
    \ Used for errors in the database module, not the database itself. Must subclass\
    \ Error. |\n| DatabaseError | Used for errors in the database. Must subclass Error.\
