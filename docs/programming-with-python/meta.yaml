    \ |\n| `bitmap` | 要在单选按钮上显示单色图像，请将此选项设置为一个位图。 |\n| `bd` 或 `borderwidth` | 指示器部分周围的边框大小。默认值是两个像素。可能的值，请参见第\
    \ 5.1 节“尺寸”。 |\n| `command` | 每次用户更改此单选按钮状态时要调用的过程。 |\n| `cursor` | 如果你将此选项设置为光标名称，当鼠标光标悬停在单选按钮上时，鼠标光标将变为该图案。\
    \ |\n| `font` | 用于文本的字体。 |\n| `fg` 或 `foreground` | 用于渲染文本的颜色。 |\n| `height` |\
    \ 单选按钮上文本的行数（不是像素）。默认值是 1。 |\n| `highlightbackground` | 当单选按钮没有焦点时，焦点高亮的颜色。 |\n\
    | `highlightcolor` | 当单选按钮拥有焦点时，焦点高亮的颜色。 |\n| `highlightthickness` | 焦点高亮的厚度。默认值是\
    \ 1。设置 `highlightthickness=0` 可以隐藏焦点高亮的显示。 |\n| `image` | 要为此单选按钮显示图形图像而非文本，请将此选项设置为一个图像对象。请参见第\
    \ 5.9 节“图像”。图像在单选按钮未被选中时显示；与下面的 `selectimage` 比较。 |\n| `indicatoron` | 通常，单选按钮会显示其指示器。如果你将此选项设置为\
    \ 0，指示器将消失，整个部件变成一个“按-按”按钮，当清除时看起来凸起，当设置时看起来凹陷。你可能需要增加 `borderwidth` 的值以便更容易看清该控件的状态。\
    \ |\n| `justify` | 如果文本包含多行，此选项控制文本的对齐方式：`tk.CENTER`（默认）、`tk.LEFT` 或 `tk.RIGHT`。\
    \ |\n| `offrelief` | 如果你通过声明 `indicatoron=False` 隐藏了指示器，`offrelief` 选项指定单选按钮未被选中时显示的浮雕样式。默认值是\
    \ `tk.RAISED`。 |\n| `overrelief` | 指定鼠标悬停在单选按钮上时显示的浮雕样式。 |\n| `padx` | 单选按钮和文本左右两侧的间距。默认值是\
    \ 1。 |\n| `pady` | 单选按钮和文本上下的间距。默认值是 1。 |\n| `relief` | 默认情况下，单选按钮的浮雕为 `tk.FLAT`，因此不会从其背景中突出。要获得更多\
    \ 3D 效果的选项，你也可以使用 `relief=tk.SOLID`，这会在单选按钮周围显示一个实心的黑色边框。 |\n| `selectimage` |\
    \ 如果你使用 `image` 选项在单选按钮清除时显示图形而非文本，你可以将 `selectimage` 选项设置为不同的图像，该图像将在单选按钮被选中时显示。\
    \ |\n| `state` | 默认值是 `state=tk.NORMAL`，但你可以设置 `state=tk.DISABLED` 使控件灰显且无响应。如果光标当前悬停在单选按钮上，状态为\
    \ `tk.ACTIVE`。 |\n| `takefocus` | 默认情况下，输入会通过单选按钮。如果你设置 `takefocus=0`，焦点将不会访问此单选按钮。\
    \ |\n| `text` | 单选按钮旁边显示的标签。使用换行符 (`'\\n'`) 来显示多行文本。 |\n| `textvariable` | 如果你需要在执行期间更改单选按钮上的标签，请创建一个\
    \ `StringVar` 来管理当前值，并将此选项设置为该控制变量。每当控制变量的值改变时，单选按钮的注释也会自动更改为该文本。 |\n| `underline`\
    \ | 默认值为 -1，文本标签中没有字符被加下划线。将此选项设置为文本中字符的索引（从零开始）以给该字符加下划线。 |\n| `value` | 当用户选中单选按钮时，其控制变量将被设置为其当前的\
    \ `value` 选项值。如果控制变量是 `IntVar`，则为组中的每个单选按钮分配不同的整数 `value` 选项。如果控制变量是 `StringVar`，则为每个单选按钮分配不同的字符串\
    \ `value` 选项。 |\n| `variable` | 此单选按钮与组中其他单选按钮共享的控制变量。 |\n| `width` | 单选按钮的默认宽度由显示的图像或文本的大小决定。你可以将此选项设置为字符数（不是像素），单选按钮将始终为这么多字符保留空间。\
    \ |\n| `wraplength` | 通常，行不会换行。你可以将此选项设置为字符数，所有行都将被分割成不超过该数字长度的片段。 |\n\n第一个演示单选按钮部件的基础程序：\n\
    \n```\npython\nfrom tkinter import *\n\nrb = Tk()\n\nr = IntVar()\n\nLabel(rb,\n\
    \        text=\"Choose a programming language:\",\n        justify = LEFT,\n \
    \       padx = 20).pack()\nRadiobutton(rb, text=\"Python\",\n            padx\
    \ = 20,\n            variable=r,\n            value=1).pack(anchor=W)\nRadiobutton(rb,\
    \ text=\"Linux\",\n            padx = 20,\n            variable=r,\n         \
    \   value=2).pack(anchor=W)\nmainloop()\n```\n\n![](img/19353aba2f109d1f7c4c239afb8fa982_104_0.png)\n\
    \n在上面的示例中，我们使用了多个“语言”单选按钮，它们包含按钮文本和相应的值。借助 `for` 循环创建了所有单选按钮。"
