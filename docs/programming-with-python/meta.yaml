    ### Creating GUI Widgets with Tkinter\n\nA widget is a component of a GUI — buttons,\
    \ labels, and text boxes are all widgets. Most widgets have graphical representations\
    \ on screen, but some widgets, such as tables and boxes, exist only to contain\
    \ other widgets and arrange them on the screen.\n\n### How It Works\n\nThe first\
    \ line import the Tkinter module. In next, you could either import Label from\
    \ Tkinter, or simply import all (*) from Tkinter, as you did in the example. After\
    \ that, you create an object for each widget (in this case, Label). The Label\
    \ is then arranged in the parent window. Finally, the widget is displayed.\n\n\
    The Widget Construction Kit (WCK) is a simple programming interface that you can\
    \ use to create new widgets in Python. The WCK is currently available for the\
    \ tkinter library, but implementations for other environments are perfectly possible.\
    \ To create a more expressive widget, you have to create a subclass of the Widget\
    \ base class, and implement necessary drawing and event handling methods.\n\n\
    The major unit of a tkinter GUI is a Widget. You can use the \"built-in\" widgets\
    \ that are provided by Tk, create your own, or install extension packages that\
    \ define additional widgets.\n\n### Resizing the Widget\n\nBy default the widget\
    \ had a built-in minimize and maximize button, along with an “ X ” button to close\
    \ the window. In addition, we could stretch out the window.\n\nWhen you run this\
    \ program, try resizing the window; you’ll see the “ My first GUI! ” label stay\
    \ centred no matter what the window looks like, as shown in Figure below.\n\n\
    ### Explanation of the above program:\n\nIn the above program we assign the values\
    \ Yes to expand, and Both to fill. This tells Python to expand the widget when\
    \ the parent window is expanded. By default, this option is turned off.\n\n###\
    \ Configuring Widget Options\n\nIn this example you create the same parent window\
    \ and the same label. However, instead of setting your options at the same time\
    \ you create them, you are going to wait and do them after they have already been\
    \ created:\n\n```\nimport tkinter\nfrom tkinter import *\nroot = Tk( )\n\nwidget\
    \ = Label(root)\nwidget.config(text='My first GUI!')\nwidget.pack(side=TOP, expand=YES,\
    \ fill=BOTH)\nroot.mainloop()\n```\n\nIn this example, you called upon the configure\
    \ method to achieve the same result as the previous example. If you wanted to,\
    \ you could change the appearance of the widget later in the program. For instance,\
    \ maybe the user wishes to change the way the window looks. You could insert a\
    \ button that would trigger the configure method, which in turn would change your\
    \ widget's options. Now we see the different widgets in detail."
