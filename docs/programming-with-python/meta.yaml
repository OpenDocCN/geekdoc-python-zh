    \ RESTART: C:/Python27/db7.py ==============================\nRecord updated\n\
    >>>\n```\n\n## 5.11.4 Delete Operation\n\nDELETE operation is required when you\
    \ want to delete some records from your database. Following is the procedure to\
    \ delete all the records from EMPLOYEE where AGE is more than 20:\n\n```python\n\
    #!/usr/bin/python\nimport MySQLdb\n# Open database connection\ndb = MySQLdb.connect(\"\
    localhost\",\"root\",\"password\",\"kirandb\")\n# prepare a cursor object using\
    \ cursor() method\ncursor = db.cursor()\n# Prepare SQL query to DELETE required\
    \ records\nsql = \"DELETE FROM EMPLOYEE WHERE AGE > '%d'\" % (20)\ntry:\n    #\
    \ Execute the SQL command\n    cursor.execute(sql)\n    print(\"Record deleted\"\
    )\n    # Commit your changes in the database\n    db.commit()\nexcept:\n    #\
    \ Rollback in case there is any error\n    db.rollback()\n# disconnect from server\n\
    db.close()\n```\n\nOutput\n\n```\nPython 2.7.13 (v2.7.13:a06454b1afa1, Dec 17\
    \ 2016, 20:42:53) [MSC v.1500 32 bit (Intel)] on win32\nType \"copyright\", \"\
    credits\" or \"license()\" for more information.\n>>> \n==============================\
    \ RESTART: C:/Python27/db8.py ==============================\nRecord deleted\n\
    >>> \n```\n\n## 5.12 Introduction to Transaction\n\n* Transaction is a program\
    \ unit whose execution may or may not change the contents of a database.\n* Transaction\
    \ is executed as a single unit. If the database was in consistent state before\
    \ a transaction, then after execution of the transaction also, the database must\
    \ be in a consistent state.\n* A Transaction is a logical unit of work. It is\
    \ the set of operations(basically read and write) to perform unit of work.(include\
    \ small units of work).\n* It can be viewed as a program whose execution preserves\
    \ the consistency of the database. The primary goal of concurrency control and\
    \ recovery scheme is to ensure that the execution of a transaction be atomic.\n\
    * A transaction is a very small unit of a program and it may contain several lowlevel\
    \ tasks. They are grouped into tasks.\n* A transaction in a database system must\
    \ maintain Atomicity, Consistency, Isolation, and Durability.\n* Transactions\
    \ are completed by COMMIT or ROLLBACK SQL statements, which indicate a transaction's\
    \ beginning or end.\n* When a transaction completes successfully, database changes\
    \ are said to be *committed*. when a transaction does not complete, changes are\
    \ *rolled back*.\n\nFor example, a transfer of money from one bank account to\
    \ another requires two changes to the database both must succeed or fail together.\n\
    \n![](img/19353aba2f109d1f7c4c239afb8fa982_160_0.png)\n\n## Process of Transaction\n\
    \nThe transaction is executed as a series of reads and writes of database objects,\
    \ which are explained below:\n\n## Read Operation\n\nTo read a database object,\
    \ it is first brought into main **memory** from disk, and then its value is copied\
    \ into a program variable as shown in figure.\n\n![](img/19353aba2f109d1f7c4c239afb8fa982_160_1.png)\n\
    \n## Write Operation\n\nTo write a database object, an in-memory copy of the object\
    \ is first modified and then written to disk.\n\n![](img/19353aba2f109d1f7c4c239afb8fa982_161_0.png)\n\
    \n### Transactions Properties\n\nTransactions are a mechanism that ensures data\
    \ consistency. Transactions have the following four properties:\n\n1.  **Atomicity:\
    \ (all or nothing)** A transaction is said to be atomic if a transaction always\
    \ executes all its actions in one step or not executes any actions at all It means\
    \ either all or none of the transactions operations are performed. Either a transaction\
    \ completes or nothing happens at all.\n\n2.  **Consistency: (No violation of\
    \ integrity constraints)** A transaction must preserve the consistency of a database\
    \ after the execution. The DBMS assumes that this property holds for each transaction.\
    \ Ensuring this property of a transaction is the responsibility of the user. A\
    \ transaction must start in a consistent state and leave the system in a consistent\
    \ state.\n\n3.  **Isolation: (concurrent changes invisibles)** The transactions\
    \ must behave as if they are executed in isolation. It means that if several transactions\
    \ are executed concurrently the results must be same as if they were executed\
    \ serially in some order. The data used during the execution of a transaction\
    \ cannot be used by a second transaction until the first one is completed. Intermediate\
    \ results of a transaction are not visible outside the current transaction.\n\n\
    4.  **Durability: (committed update persist)** The effect of completed or committed\
    \ transactions should persist even after a crash. It means once a transaction\
    \ commits, the system must guarantee that the result of its operations will never\
    \ be lost, in spite of subsequent failures. Once a transaction was committed,\
    \ the effects are persistent, even after a system failure.\n\nThe Python DB API\
    \ 2.0 provides two methods to either *commit* or *rollback* a transaction.\n\n\
    ## 5.12.1 Executing Transactions\n\nExample\n\nYou already know how to implement\
    \ transactions. Here is again similar example:\n\n![](img/19353aba2f109d1f7c4c239afb8fa982_162_0.png)\n\
    \n![](img/19353aba2f109d1f7c4c239afb8fa982_162_1.png)\n\nExample\n\nIn this Example\
    \ Exception Handling used in database Transaction, if transaction is not perform\
    \ It will be rollbacked.\n\n![](img/19353aba2f109d1f7c4c239afb8fa982_162_2.png)\n\
    \n## Output\n\n![](img/19353aba2f109d1f7c4c239afb8fa982_163_0.png)\n\n## COMMIT\
    \ Operation\n\nCommit is the operation, which gives a confirmation for finalize\
    \ changes saved permanently in a database. Once commit statement is executed,\
    \ no change can be reverted back.\n\nHere is a simple example to call commit method.\n\
    \n```python\ndb.commit()\n```\n\n## ROLLBACK Operation\n\nIf any DML statement\
    \ Like insert, update and delete If you want to revert back those changes completely,\
    \ then use rollback() method is used. Here is a simple example to call rollback()\
    \ method.\n\n```python\ndb.rollback()\n```\n\n## Disconnecting Database\n\nTo\
    \ disconnect Database connection, use close() method.\n\n```python\ndb.close()\n\
    ```\n\nIf the connection to a database is closed by the user with the close()\
    \ method, any outstanding transactions are rolled back by the DB.\n\n## 5.13 Understanding\
    \ Exceptions in Database Connectivity\n\nException is an event which occurs during\
    \ execution of the program, that disturbs the normal flow of the program hence\
    \ to handle that errors we can put messages according to our own requirements.\n\
    \n## Example of Exception Handling in Files\n\n![](img/19353aba2f109d1f7c4c239afb8fa982_163_1.png)\n\
    \n## Output\n\n![](img/19353aba2f109d1f7c4c239afb8fa982_164_0.png)\n\n## Handling\
    \ Errors\n\nThere are many sources of errors. A few examples are a syntax error\
    \ in an executed SQL statement, a connection failure, or calling the fetch method\
    \ for an already canceled or finished statement handle.\n\nThe DB API defines\
    \ a number of errors that must exist in each database module. The following table\
    \ lists these exceptions.\n\n| Exception          | Description |\n|-------------------|-------------|\n\
    | Warning           | Used for non-fatal issues. Must subclass StandardError.\
    \ |\n| Error             | Base class for errors. Must subclass StandardError.\
    \ |\n| InterfaceError    | Used for errors in the database module, not the database\
    \ itself. Must subclass Error. |\n| DatabaseError     | Used for errors in the\
    \ database. Must subclass Error. |\n| DataError         | Subclass of DatabaseError\
    \ that refers to errors in the data. |\n| OperationalError  | Subclass of DatabaseError\
    \ that refers to errors such as the loss of a connection to the database. These\
    \ errors are generally outside of the control of the Python scripter. |\n| IntegrityError\
    \    | Subclass of DatabaseError for situations that would damage the relational\
    \ integrity, such as uniqueness constraints or foreign keys. |\n| InternalError\
    \     | Subclass of DatabaseError that refers to errors internal to the database\
    \ module, such as a cursor no longer being active. |\n| ProgrammingError  | Subclass\
    \ of DatabaseError that refers to errors such as a bad table name and other things\
    \ that can safely be blamed on you. |\n| NotSupportedError | Subclass of DatabaseError\
    \ that refers to trying to call unsupported functionality. |\n\n## 5.14 Connectivity\
    \ using Sqlite3\n\n1.  **To create database in sqlite3**\n    ```\n    $ sqlite3\
    \ testDB.db\n    ```\n2.  **To Check the database created or not**\n    ```\n\
    \    sqlite> .databases\n    ```"
  mdcn: "## 5.11.3 更新操作\n\n对任何数据库的更新操作都意味着要更新数据库中已存在的一条或多条记录。\n\n以下过程将更新所有性别为‘M’的记录。在此，我们将所有男性的年龄增加一岁。\n\
    \n```python\n#!/usr/bin/python\nimport MySQLdb\n# Open database connection\ndb\
    \ = MySQLdb.connect(\"localhost\",\"root\",\"password\",\"kirandb\")\n# prepare\
    \ a cursor object using cursor() method\ncursor = db.cursor()\n# Prepare SQL query\
    \ to INSERT a record into the database.\nsql = \"INSERT INTO EMPLOYEE(FIRST_NAME,\
    \ \\\nLAST_NAME, AGE, SEX, INCOME) \\\nVALUES ('%s', '%s', '%d', '%c', '%d' )\"\
