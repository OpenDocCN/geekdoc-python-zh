    # 6.9 Socket module


    Socket module implements an interface to the socket communication layer. We can
    create both client and server sockets using this module.


    # The socket Module


    To create a socket, we must use the socket.socket() function available in socket
    module, which has the general


    # syntax:


    ```

    s = socket.socket (socket_family, socket_type, protocol=0)

    ```


    where


    +   - socket_family:  This is either AF_UNIX or AF_INET

    - socket_type:  This is either SOCK_STREAM or SOCK_DGRAM.

    - protocol:  This is usually left out, default VALUE IS 0.


    AF_UNIX or AF_LOCAL socket family is used to communicate between processes on
    the same machine efficiently.


    The basic purpose of AF_INET was to allow for other possible network protocols
    or address families (AF is for address family; PF_INET is for the (IPv4) internet
    protocol family).


    SOCK_STREAM means a socket stream where data is passed just like a file stream.


    Protocol – a specific set of communication rules is called a protocol.


    When socket object is ready for use now we create server socket method and client
    socket methods.


    # Server Socket Methods


    | Method | Description |

    | --- | --- |

    | s.bind() | This method binds address (hostname, port number pair) to socket.
    |

    | s.listen() | This method sets up and start TCP listener. |

    | s.accept() | This passively accept TCP client connection, waiting until connection
    arrives (blocking). |


    # Client Socket Methods


    | Method | Description |

    | --- | --- |

    | s.connect() | This method actively initiates TCP server connection. |'
