    \ father **Late Shri Laxman B. Vastava** and My Mother **Smt Kasturi L. Vastava**.\n\
    \n**Vijay Vastava**\n\n## PREFACE\n\nPython is a widely used high-level programming\
    \ language used for general-purpose programming, created by Guido van Rossum and\
    \ first released in 1991. Python has a design philosophy which emphasizes code\
    \ readability (notably using whitespace indentation to delimit code blocks rather\
    \ than curly braces or keywords), and a syntax which allows programmers to express\
    \ concepts in fewer lines of code than possible in languages such as C++ or Java.\n\
    \nPython is an interpreted, object-oriented, high-level programming language with\
    \ dynamic semantics. Its high-level built-in data structures, combined with dynamic\
    \ typing and dynamic binding, make it very attractive for Rapid Application Development,\
    \ as well as for use as a scripting or glue language to connect existing components\
    \ together.\n\nPython supports modules and packages, which encourages program\
    \ modularity and code reuse. The Python interpreter and the extensive standard\
    \ library are available in source or binary form without charge for all major\
    \ platforms, and can be freely distributed.\n\nPython 2.0 was released on 16 October\
    \ 2000 and had many major new features. Python 3.0 (which early in its development\
    \ was commonly referred to as Python 3000 or py3k).\n\nI recommend this book as\
    \ a Programmer's point of view. This book teaches Advance Python starting with\
    \ the file handling, Exception handling with Regular Expression and GUI Programming\
    \ along with Database Connectivity with MySQL and Sqlite3 and Networking.\n\n\
    This book offers you a comprehensive learning tool for Python. It covers almost\
    \ everything you need to know about programming in Python: Types and Operations,\
    \ Statements and Syntax, Functions and Iterators, Generators, Modules and Packages,\
    \ Databases and much more.\n\nHere, in this book, the concept of each topic is\
    \ followed by the theoretical explanation, all practical questions of Python programming\
    \ along with those steps of program execution is provided. Efforts have been made\
    \ to make the text easy to read and understand.\n\nConstructive suggestion and\
    \ comments from the users will be sincerely appreciated. We would appreciate hearing\
    \ from you about any textual errors or omissions which you identify. If you would\
    \ like to suggest improvements or to contribute in any way, we would be glad to\
    \ hear from you. Please send correspondence to kiranrktcollege@gmail.com and vvastava@gmail.com.\n\
    \nLast but not the least, we would like to give big lifetime thanks to Mr. S.K.\
    \ Srivastava (Himalaya Publishing House) for providing an environment which stimulates\
    \ new thinking and innovations and his support, motivation, guidance, cooperation\
    \ and encouragement to write this book. We are grateful for his support and thank\
    \ him for his true blessings.\n\n**Kiran Gurbani**\nkiranrktcollege@gmail.com\n\
    9637128628/7769979964\n\n**Vijay Vastava**\nvvastava@gmail.com\n9594950917\n\n\
    ## CONTENTS\n\n### UNIT I\n\n- 1. PYTHON FILE INPUT-OUTPUT 1 – 39\n- 2. EXCEPTION\
    \ HANDLING 40 – 62\n- 3. REGULAR EXPRESSION 63 – 80\n\n### UNIT II\n\n- 4. GUI\
    \ PROGRAMMING IN PYTHON 81 – 114\n\n### UNIT III\n\n- 5. DATABASE CONNECTIVITY\
    \ IN PYTHON 115 – 162\n- 6. NETWORK CONNECTIVITY 163 – 202\n- FINAL PYTHON PRACTICALS\
    \ 203 – 244\n- PYTHON PROGRAMMING MCQ 245 – 250\n\n## Unit I\n\n### Chapter 1\n\
    \n# Python File Input-Output\n\n**Structure**\n\n- 1.1 Introduction to File Handling\n\
    \    - 1.1.1 Text File\n    - 1.1.2 Binary File\n    - 1.1.3 Differentiate between\
    \ Text File and Binary File\n    - 1.1.4 File operations\n- 1.2 Opening and Closing\
    \ Files\n    - 1.2.1 Opening File by using Open()\n        - 1.2.1.1 Open For\
    \ Reading\n        - 1.2.1.2 Opening for Writing\n- 1.3 Closing File by Using\
    \ Close()\n    - 1.3.1 Various Types of File Modes\n    - 1.3.2 Attributes of\
    \ File Object\n- 1.4 Reading and Writing to Files\n    - 1.4.1 Reading File through\
    \ Read() and Readline() and readlines()\n    - 1.4.2 Reading Input from Keyboard\n\
    \    - 1.4.3 Writing File through Write()\n- 1.5 Appending Text to a File\n- 1.6\
    \ Renaming a File\n- 1.7 Deleting a File\n- 1.8 Python Different file Input Output\
    \ Functions\n- 1.9 File Positions\n- 1.10 Manipulating Directories\n    - 1.10.1\
    \ Directories in Python\n    - 1.10.2 mkdir() Method\n    - 1.10.3 chdir() Method\n\
    \    - 1.10.4 getcwd() Method\n    - 1.10.5 rmdir() Method\n- 1.11 Python Iterators\
    \ and Iterables\n    - 1.11.1 Python Iterators\n    - 1.11.2 Python Iterables\n\
    \    - 1.11.3 Creating Your Own Iterator in Python\n    - 1.11.4 Python Infinite\
    \ Iterators\n    - 1.11.5 Generators\n- 1.12 Iterations and their Problem Solving\
    \ Applications\n- 1.13 Questions\n\n## 1.1 Introduction to File Handling\n\nIn\
    \ Python programming, File is a named location on disk to store related information.\
    \ It is used to permanently store data in a non-volatile memory (e.g. hard disk).\n\
    \nSince, random access memory (RAM) is volatile which loses its data when computer\
    \ is turned off, we use files for future use of the data.\n\nFile is of text file,\
    \ music File or binary file or video file. All these files are categorized into\
    \ two types\n\n1. Text File\n2. Binary File\n\nWhen we want to read from or write\
    \ to a file we need to open it first. When we are done, it needs to be closed,\
    \ so that resources that are tied with the file are freed\n\n### Why files are\
    \ needed?\n\n- When a program is terminated, the entire data is lost. Storing\
    \ in a file will preserve your data even if the program terminates.\n- If you\
    \ have to enter a large number of data, it will take a lot of time to enter them\
    \ all. However, if you have a file containing all the data, you can easily access\
    \ the contents of the file using few commands in C.\n- You can easily move your\
    \ data from one computer to another without any changes.\n\nFile Handling concept\
    \ in python language is used for store a data permanently in computer memory.\
    \ Using this concept we can store our data in Secondary memory (Hard disk). A\
    \ file represents a sequence of bytes on the disk where a group of related data\
    \ is stored. File is created for permanent storage of data. It uses file object\
    \ to process file.\n\n### 1.1.1 Text File\n\nA text file is often structured as\
    \ a sequence of lines and a line is a sequence of characters. The line is terminated\
    \ by EOL (End of Line) character."
