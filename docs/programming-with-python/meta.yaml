  md: "# General Socket Methods\n\n| Method | Description |\n|---|---|\n| s.recv()\
    \ | This method receives TCP message |\n| s.send() | This method transmits TCP\
    \ message |\n| s.recvfrom() | This method receives UDP message |\n| s.sendto()\
    \ | This method transmits UDP message |\n| s.close() | This method closes socket\
    \ |\n| socket.gethostname() | Returns the hostname. |\n\n# Creating a Socket\n\
    \nNow we create an INET, STREAMing socket in Python\n\n```\ns = socket.socket(socket.AF_INET,\
    \ socket.SOCK_STREAM)\n```\n\nNow connect to the web server on port 80 (Which\
    \ is the normal http port)\n\n```\ns.connect((\"www.google.com\", 80))\n```\n\n\
    When the connect completes, the socket s can be used to send in a request for\
    \ the text of the page. The same socket will read the reply, and then be destroyed.\
    \ Destroyed Client sockets are normally only used for one exchange (or a small\
    \ set of sequential exchanges).\n\nWhat happens in the web server is a bit more\
    \ complex. First, the web server creates a \"server socket\":\n\n```\n# create\
    \ an INET, STREAMing socket\nserversocket = socket.socket(socket.AF_INET, socket.SOCK_STREAM)\n\
    # bind the socket to a public host, and a well-known port\nserversocket.bind((socket.gethostname(),\
    \ 80))\n# become a server socket\nserversocket.listen(5)\n```\n\nPlease note that\
    \ we used socket.gethostname() so that the socket would be visible to the all.\
    \ If we had used s.bind(('localhost', 80)) or s.bind(('127.0.0.1', 80)) we would\
    \ still have a \"server\" socket, but that was only visible within the same machine.\
    \ s.bind((\"\", 80)) specifies that the socket is reachable by any address the\
    \ machine happens to have.\n\nAgain we note that low number ports are usually\
    \ reserved for \"well known\" services (HTTP, SNMP etc). If we are playing around,\
    \ use a nice high number (i.e. 4 digits).\n\nNow finally, the argument to listen\
    \ tells the socket library that we want it to queue up as many as 5 connect requests\
    \ (the normal max) before refusing outside/other connections. If the rest of the\
    \ code is written properly, that should be sufficient.\n\nNow that we have a \"\
    server\" socket, listening on port 80, we can enter the mainloop of the web server:\n\
    \n```\nwhile True:\n    # accept connections from other/outside\n    (clientsocket,\
    \ address) = serversocket.accept()\n```"
