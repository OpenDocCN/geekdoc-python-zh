    \ are free to chat it up - they are using some dynamically allocated port which\
    \ will be recycled when the conversation ends.\n\n## 6.10 Client Server Architecture\n\
    \n*What Is A Client/Server?*\n\n**Client**\nA client is a single-user workstation\
    \ that provides presentation services, database services and connectivity along\
    \ with an interface for user interaction to acquire business needs.\n\n**Server**\n\
    A server is one or more multi-user processors with a higher capacity of shared\
