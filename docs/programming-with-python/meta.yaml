    | `([Pp])ython&\\1ails` | 匹配 python&pails 或 Python&Pails |\n| `([\"'])[^\\1]*\\\
    1` | 单引号或双引号字符串。`\\1` 匹配第 1 组匹配的任何内容。`\\2` 匹配第 2 组匹配的任何内容，以此类推。 |\n\n### 替代项：\n\
    \n| 示例 | 描述 |\n|---------|-------------|\n| `python\\|perl` | 匹配 \"python\" 或\
    \ \"perl\" |\n| `rub(y\\|le)` | 匹配 \"ruby\" 或 \"ruble\" |\n| `Python(!+\\|\\?)`\
    \ | \"Python\" 后跟一个或多个 `!` 或一个 `?` |\n\n### 锚点：\n\n这需要指定匹配位置。\n\n| 示例 | 描述 |\n\
    |---------|-------------|\n| `^Python` | 匹配字符串或内部行开头的 \"Python\" |\n| `Python$`\
