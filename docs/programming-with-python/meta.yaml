    # 1.2.1.2 Opening for Writing


    To open a file for writing, the open function is used as shown below


    ```

    output_fileobj = open(''kiranfile.txt'',''w'')

    ```


    In this case, ''w'' is used to indicate that the file is to be opened for writing.
    If the file already exists, it will be overwritten (starting with the first line
    of the file). When using a second argument of ''a'', the output will be appended
    to an existing file instead.


    It is important to close a file that is written to, otherwise the tail end of
    the file may not be written to the file.


    ```

    output_file.close()

    ```


    When opening files for writing, there is not much chance of an I/O error occurring.
    The provided file name does not need to exist since it is being created (or overwritten).
    Thus, the only error that may occur is if the file system (such as the hard disk)
    is full.


    +   - w mode can be used for text file

    - wb mode can be used for binary file


    # Example for open for Writing in Binary Mode


    ```

    fo=open("foo.txt","wb")

    fo.write("python in great lang\n")

    fo.close

    ```


