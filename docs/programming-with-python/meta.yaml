    \ in that case.\n\nUnder normal circumstances a `recv()` call guarantees that\
    \ at least one byte of data will be returned. When a program sees the empty string\
    \ (zero bytes) returned from the `recv()` it knows that the other end has terminated\
    \ the connection by calling `close()` on its socket.\n\n## 6.6 Introduction to\
    \ protocol and different types of protocols.\n\nProtocol may be defined as a set\
    \ of rules governing the exchange of data between two entities.\n\n**Key Elements\
    \ Of Protocol:**\n\n1.  Syntax.\n2.  Semantics.\n3.  Timing.\n\n**1. Syntax:**\
    \ It includes such things as data format and signal levels (i.e.: Encoding and\
    \ Decoding).\n\n**2. Semantics:** It includes control information for co-ordination\
    \ and error handling.\n\n**3. Timing:** It includes speed matching and sequencing.\n\
    \nDepending upon these three key elements protocols are divided into two types.\n\
    \n**Two Types Of Protocols Based On Key Elements:**\n\n1.  Hardware Protocol.\n\
    2.  Software Protocol.\n\n**1. Hardware Protocol:** It is a protocol used to check\
    \ set of rules for all hardware devices that means during transmission of data\
    \ it checks each and every cable connections and all intermediate hardware devices\
    \ such as routers and gateways. If any damage of hardware device occurs, the hardware\
    \ protocol will identify that and provides message to the server like “A Network\
    \ Cable Is Plugged Out”.\n\n**2. Software Protocol:** It is a set of rules used\
    \ for checking the data or application through which the data is transferred.\
    \ It also checks the data for each packet along with control information of each\
    \ packet. During transmission checkpoints are created using software protocol,\
    \ which gives information during packet lost or damaged or data gram lost or damaged\
    \ or any sort of data problem.\n\nThese software protocols are bifurcated into\
    \ different types like SMTP, FTP, HTTP and MIME etc.\n\n## 6.7 Introduction to\
    \ Networking Connectivity\n\n**Network connectivity**\n\nNetwork connectivity\
    \ means we are connecting different types of network with one another. Connectivity\
