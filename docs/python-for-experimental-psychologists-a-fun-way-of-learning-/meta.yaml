  - '[PAGE 9]


    # ABOUT THIS BOOK


    This work is for researchers in Experimental Psychology and Cognitive Neuroscience,
    who have no previous experience with Python or programming. It is suitable for
    students and staff and aims to provide a basic working proficiency in Python.
    After working your way through this book, you will have the knowledge and skills
    required to code experiments and analyses.


    A major problem in Psychology education is that students have very little exposure
    to programming, even though most academic and industry jobs involve scripting
    experiments and data analyses. As a consequence, people spend a lot of time on
    manual data processing: selecting, sorting, and moving data from one spreadsheet
    to another. This is an unfortunate waste of time! If you want to work in psychological
    science and adjacent fields, but don''t know how to code (yet), this book might
    just save a few years of your life.


    This book will teach you about installing Python, variables and functions, displaying
    stimuli, making sounds, response collection, eye tracking, trial structure, randomisation,
    loading files, combining data, doing statistics, computational modelling, visualising
    data, creating publication-ready figures, and more!'
- md: '# Taylor & Francis


    Taylor & Francis Group


    http://taylorandfrancis.com


    # ABOUT PYTHON


    Python is an amazing programming language, originally developed by Guido van Rossum,
    and improved and maintained by a large global community. It sports an easily readable
    syntax, a huge user base, and extensive functionality. It can be used for almost
    anything, including basic calculations, detecting, and visualising black holes,
    live streaming your hamster to the internet, and much, *much* more. Python is
    at the optimum of usability and functionality, which means that you can learn
    how to do actually useful stuff relatively quickly.


    # Taylor & Francis


    Taylor & Francis Group


    http://taylorandfrancis.com


    # ABOUT THE AUTHORS


    **Edwin S. Dalmaijer** holds an undergraduate degree in *Psychology* from Utrecht
    University in the Netherlands, where he also started (but never officially finished)
    an MSc degree in *Neuroscience and Cognition*. He read for a DPhil in *Experimental
    Psychology* at the University of Oxford, then spent four years as post-doctoral
    Research Associate at the University of Cambridge, and currently works as a Lecturer
    (Assistant Professor) at the University of Bristol. Edwin writes software, teaches
    Python workshops, and is on a desperate quest to teach his cat to code.


    **Rebecca J. Hirst** completed her undergraduate degree in *Psychology and Cognitive
    Neuroscience* and MSc in *Psychology Research Methods* at the University of Nottingham,
    where she then obtained a PhD in *Psychology*. She currently works as Science
    Officer at Open Science Tools and as Postdoctoral Researcher at Trinity College,
    Dublin.


    **Jonathan W. Peirce** is a neuroscientist, programmer, and dad. He holds an undergraduate
    degree in *Psychology* from St Andrews University and a PhD in *Neuroscience*
    from the University of Cambridge. After a postdoctoral appointment at New York
    University, Jon was an Assistant, Associate, and now Full Professor at the University
    of Nottingham. He is well known for writing PsychoPy, free and easy software for
    psychology experiments that is used in labs and classrooms all over the world.
    He is also the founder and CEO of Open Science Tools.


    # Taylor & Francis


    Taylor & Francis Group


    http://taylorandfrancis.com


    # 1 PYTHON


    Python is a programming language. Not just any programming language, it’s currently
    one of the most popular in the world. It’s used all over science and industry
    because it’s easy to use, versatile, and has a cool name. You might be leafing
    through this book thinking “Why should I invest in learning Python?” (Or you might
    have pirated this book online and are now thinking “Why should I keep reading
    this?”). Here are some answers to that question:


    Python could be beneficial to your career. In Psychology, there are many tools,
    like E-Prime and Presentation, that come with their own obscure programming languages.
    These will be perfectly able to do most of what you want in your research. However,
    you might find it hard to find employers who are interested in your obscure skill.
    If you care about your CV, it could be better to learn a language that more labs
    and companies are familiar with. Python is widely adopted in academia, and even
    more so outside of it, for example in data science. Being well versed in Python
    is thus likely to improve your employability!


    One of the reasons Python is so popular is that it is very versatile. You can
    use it to make computer games, do machine learning, and run websites. As a researcher,
    this versatility means that you will be able to use Python to code your experiments
    and automated analyses of your data. In addition, you could use it to spy on co-workers
    through a webcam (*Stop stealing my lunch, Karen!*) or to do exciting computer
    vision projects.


    Another reason for Python’s popularity is its easy-of-use. Python scripts are
    readable. Very readable. So readable, in fact, that some people say that reading
    them is like reading English. While that is definitely an exaggeration, script
    readability is one of Python’s strong points. It helps new users to pick up the
    language relatively quickly.


    Python’s popularity is a benefit in itself, because its large user base makes
    it more likely to continue to be supported and that you can find help online.
    If you run into an issue, there is a big chance someone else had the same problem,
    and they might have already solved it for you. One great thing about the internet
    is that it’s full of programming resources. Simply search for your problem (usually
    by copying an error message into a search engine), and you are very likely to
    find the solution on websites like Stack Overflow or programming forums.


    # 2 Python


    Obviously, there are also downsides to using Python. Experienced programmers will
    point out that it is a relatively slow language, and they have a point: compared
    to “proper” programming languages like C and C++, Python is sluggish. Fortunately,
    this isn’t typically a problem, because Python is still faster than you need in
    most cases. Even when speed is an issue, for example when processing lots of data,
    some clever soul will have found a way to solve them. The NumPy library, which
    you will learn about later, is an example of this: it was written in C, but it
    makes calculations in Python super fast.


    Despite its appeal, some people will move on to other languages after learning
    Python. Yet, even for them, Python was a good first language to learn the core
    concepts of programming.


    **In sum, Python is great for beginners and for those who like a versatile and
    user-friendly programming language.**


    Oh, did we mention? Python is free. It is open-source, which means that its source
    code is public. Everyone can read it, improve on it, and download the software
    without having to pay anything.


    ## 1.1 Installation


    Python can be installed on a lot of different operating systems. These include
    Windows, macOS, and almost every version of Linux. You can find installers on
    python.org, and most Linux systems will likely have it pre-installed. Before you
    start downloading stuff, read on to know what to install.


    ### 1.1.1 Versions


    There are a few different versions of Python. Although they are similar, it does
    matter which one you install. At the time of writing, Python 3 is the current
    major version. There are several minor versions in use, like Python 3.10, 3.9,
    and 3.8, each with some additional functionality. Finally, there are different
    patches under the minor versions (like 3.10.5 or 3.8.10), each fixing bugs or
    improving security. In the grand scheme of things, the differences between these
    versions are relatively subtle and should not break any code. You should be able
    to run the scripts in this book on any version from Python 3.7 and up, but they
    might break under Python 4 (but it might be a long while before that is released).


    Out in the wild, you might encounter software written in or for Python 2, for
    which support officially ended on 1 January 2020. This is increasingly rare, but
    a consequence of how the Python ecosystem works: it extends beyond just the basic
    programming language, in the form of external packages or *libraries*. These are
    collections of code that can do specific things, like help create cognitive experiments.
    Libraries that were developed for Python 2 do not always play nice with Python
    3. Some of them have not been updated, because they were written by enthusiasts
    who have stopped maintaining them or who are too busy to perform a time-consuming
    upgrade. Remember that these people are volunteers who have work, partners, children,
    friends, and lives. These are widely regarded as more important than upgrading
    a Python library.


    In sum, you should aim to download a Python 3 version. The specific minor version
    (e.g. 3.9 or 3.12) is less important, so just go with the newest version available
    on your platform. If you already know that you might be working with external
    packages that'
