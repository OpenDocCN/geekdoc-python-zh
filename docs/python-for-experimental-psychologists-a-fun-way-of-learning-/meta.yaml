- md: "## 5.2 Presenting Several Trials\n\nWe now have the basics of one trial complete,\
    \ and so now we can think about presenting several trials. This is a classic use\
    \ case of loops, in which we are now well versed! Imagine we want five trials.\
    \ By far the easiest way to do this in python would be to use `for trial in range(5):`\
    \ and then indent our existing code by one level, so that it is within the new\
    \ for loop. This will easily present five trials, but it doesn’t allow us a way\
    \ to change our stimuli trial-by-trial. What might be convenient is if we had\
    \ a list of all the different kinds of trials we need. In our task, we will have\
    \ three parameters that change trial-by-trial: the orientation of the cue, the\
    \ location of the target, and the correct answer for our key press. We could format\
    \ the information needed for a single trial as a python dictionary:\n\n```python\n\
    trial_info = {'cue_ori':90, 'target_x': -300,\n    'corr_ans':'left'}\n```\n\n\
    Of course though, we have several trials, so we’d really need a list of these\
    \ dictionaries.\n\n```python\n# a list of 2 trials - we probably want more!\n\
    trials = [\n    {'cue_ori':  0, 'target_x':-300,\n        'corr_ans':'left'},\n\
    \    {'cue_ori':180, 'target_x': 300,\n        'corr_ans':'right'},\n    ]\n```\n\
    \nRecall that, in Python, we can loop through anything that is “iterable” i.e.\
    \ anything that contains more than one thing. Conveniently, we have made a list\
    \ object that also contains several things (with each thing being a dictionary)\
    \ and so we could now loop through this. Moreover, we can then use the current\
    \ trial to set the stimuli on every trial.\n\n```python\n# loop through our list\
    \ of trials\nfor trial in trials:\n    # update stimuli for this trial\n    cue.setOri(trial['cue_ori'])\n\
    \    target.setPos([trial['target_x'], 0])\n```\n\n```python\n# present our stimuli\n\
    for frameN in range(totalframes):\n\n    if frameN < fixTime:\n        fixation.setAutoDraw(True)\n\
    \n    elif frameN == fixTime:\n        # reset the clock and clear past\n    \
    \    # keyboard events\n        win.callOnFlip(kb.clock.reset)\n        win.callOnFlip(kb.clearEvents)\n\
    \n    elif fixTime <= frameN < totalframes:\n        # undraw the fixation\n \
    \       fixation.setAutoDraw(False)\n        # draw the cue\n        cue.setAutoDraw(True)\n\
    \n    win.flip()\n\n# undraw the cue, draw the target\ncue.setAutoDraw(False)\n\
    target.setAutoDraw(True)\nwin.flip()\n\n# wait for a response\nkeys = kb.waitKeys(keyList=['left',\
    \ 'right',\n                       'escape'], clear=False)\n\n# undraw the target\n\
    target.setAutoDraw(False)\n\n# end if escape key pressed\nif keys and keys[0].name\
    \ == 'escape':\n    core.quit()\n```\n\n### 5.2.1 Using Variable Timing Trial-By-Trial\n\
    \nRecall that our original hypotheses concern an interaction between SOA (the\
    \ time between the cue and the target) and cue validity (whether the cue points\
    \ in the direction of the target or not). For this, we need to implement the variable\
    \ “soa” which will also change trial by trial. In our list of trials, we would\
    \ therefore also have something like:\n\n```python\n# a list of 2 trials - we\
    \ probably want more!\ntrials = [\n    {'cue_ori': 0, 'target_x':-300,\n     'corr_ans':'left',\
    \ 'soa':0.5},\n    {'cue_ori':180, 'target_x': 300,\n     'corr_ans':'right',\
    \ 'soa':1},\n]\n```\n\nIn our trials loop, we then also want to use the SOA of\
    \ this trial to calculate how long to present an interval for between the cue\
    \ and the target:\n\n```python\n# set the soa\nsoa = secs2frames(trial['soa'])\n\
    totalframes = fixTime + cueTime + soa\n```\n\nWe first convert the desired SOA\
    \ in seconds to frames, and then, we use this to update the value of totalframes.\
    \ Finally, we update our stimulus presentation code to present a fixation cross\
    \ between the cue and the target:\n\n```python\n# present our stimuli\nfor frameN\
    \ in range(totalframes):\n    if frameN < fixTime:\n        fixation.setAutoDraw(True)\n\
    \    elif frameN == fixTime:\n        # reset the clock and clear past\n     \
    \   # keyboard events\n        win.callOnFlip(kb.clock.reset)\n        win.callOnFlip(kb.clearEvents)\n\
    \    elif fixTime <= frameN < fixTime + cueTime:\n        # undraw the fixation\n\
    \        fixation.setAutoDraw(False)\n        # draw the cue\n        cue.setAutoDraw(True)\n\
    \    elif fixTime + cueTime <= frameN < totalframes:\n        # draw the fixation\n\
    \        fixation.setAutoDraw(True)\n        # undraw the cue\n        cue.setAutoDraw(False)\n\
    \    win.flip()\n# undraw the cue, draw the target\ntarget.setAutoDraw(True)\n\
    win.flip()\n# wait for a response\nkeys = kb.waitKeys(keyList=['left', 'right',\n\
    \    'escape'], clear=False)\ntarget.setAutoDraw(False)\nfixation.setAutoDraw(False)\n\
    ```\n\nNow, we have our experiment set up to also manipulate SOA; however, if\
    \ we want to present a range of SOAs, it is going to become quite manual to specify\
    \ a list of dictionaries, and so it could be useful to know how to import information\
    \ from other sources, such as spreadsheets.\n\n## 5.3 Importing Spreadsheets and\
    \ Saving Data\n\nBeing able to present stimuli and gather responses is an important\
    \ first step in creating experiments. However, in reality we want to do much more\
    \ than this. At the very least we want to save the data! In this section, we will\
    \ cover the data module of PsychoPy, which provides a useful method for importing\
    \ lists of trials, controlling their randomisation, and saving our data.\n\n###\
    \ 5.3.1 Importing a Spreadsheet of Trials\n\nAlthough making a list of dictionaries\
    \ is useful in understanding how these variables can be used in the context of\
    \ experiments, it would be very time consuming to put together a list of dictionaries\
    \ that comprised a large number of trials (and even harder to avoid typos!). Furthermore,\
    \ we might want to have different options for randomising the trial sequence.\
    \ For this we are going to make use of some handy functions available inside PsychoPy’s\
    \ data module. Start by adding this module to your list of imports\n\n```python\n\
    from psychopy import visual, core, event, data\n```\n\nYou are going to need to\
    \ set up your spreadsheet of trials such that each column corresponds to the name\
    \ of our dictionary fields (also known as “keys” in python), and each row corresponds\
    \ to the value of that key on that trial. Recall that our main hypothesis also\
    \ concerns the factor of SOA between the cue and the target. Let’s consider five\
    \ SOA levels, ranging from 200 ms to one second. This will look something like\
    \ the below:\n\n| cue_ori | target_x | validity | corr_ans | soa |\n|---|---|---|---|---|\n\
    | 0 | 300 | valid | right | 0.2 |\n| 180 | -300 | valid | left | 0.2 |\n| 180\
    \ | 300 | invalid | right | 0.2 |\n| 0 | -300 | invalid | left | 0.2 |\n| 0 |\
    \ 300 | valid | right | 0.3 |\n| 180 | -300 | valid | left | 0.3 |\n| 180 | 300\
    \ | invalid | right | 0.3 |\n| 0 | -300 | invalid | left | 0.3 |\n| 0 | 300 |\
    \ valid | right | 0.5 |\n| 180 | -300 | valid | left | 0.5 |\n| 180 | 300 | invalid\
    \ | right | 0.5 |\n| 0 | -300 | invalid | left | 0.5 |\n| 0 | 300 | valid | right\
    \ | 0.7 |\n| 180 | -300 | valid | left | 0.7 |\n| 180 | 300 | invalid | right\
    \ | 0.7 |\n| 0 | -300 | invalid | left | 0.7 |\n| 0 | 300 | valid | right | 1\
    \ |\n| 180 | -300 | valid | left | 1 |\n| 180 | 300 | invalid | right | 1 |\n\
    | 0 | -300 | invalid | left | 1 |\n\nA table to illustrate the set of trials.\
    \ Each column header corresponds to a variable name and each row value corresponds\
    \ to the value of that variable in that trial.\n\nImportant note for people with\
    \ non-English language settings: in some languages (such as French, Italian, German,\
    \ and Dutch), mathematical symbols are different from English conventions. In\
    \ English, decimal numbers are indicated with a full stop: 4.5. However, in some\
    \ other languages, decimal numbers are indicated with a comma: 4,5. This particular\
    \ symbol is called the decimal separator. Python abides by English conventions,\
    \ so the decimal separator will be a full stop (or dot, or point, or period, or\
    \ however you want to call it). Make sure that your spreadsheet editor is using\
    \ a full stop (\".\") as the decimal separator!\n\nUsing a spreadsheet can be\
    \ convenient, because it makes your experiment more reusable for others who feel\
    \ comfortable editing it but might not feel confident editing a Python script.\
    \ OK let's import that spreadsheet:\n\n```python\nconditions = data.importConditions('conditions.xlsx')\n\
    print(conditions)\n```\n\nRun your script and take a look in the Output window.\
    \ What you will see here is a list of dictionaries. This is what the `importConditions`\
    \ function is doing – it is importing your spreadsheet and converting it to a\
    \ list of dictionaries, which can then be used, in this case, as a list of trials.\n\
    \n### 5.3.2 The TrialHandler\n\nImporting a spreadsheet overcomes the limitation\
    \ of a cumbersome manually created list of dictionaries, but it doesn't solve\
    \ our other wish which was to have better control over the trial randomisation.\
    \ This is where the `TrialHandler` comes in, which is a class that lives in the\
    \ data module. To make a `TrialHandler`, we use:\n\n```python\n# import spreadsheet\
    \ of trials\nconditions = data.importConditions('conditions.xlsx')\n\n# make a\
    \ trial handler\ntrials = data.TrialHandler(trialList = conditions,\n    nReps\
    \ = 5, method = 'random')\n```\n\nThis allows us not only to have our spreadsheet\
    \ but also to repeat it several times and make use of several randomisation methods\
    \ e.g. \"sequential\", \"random\" (randomise trials within block repetitions),\
    \ or \"fullRandom\" (randomise trials across block repetitions). Now that we are\
    \ using the variable `trials` to refer to our `TrialHandler` object, we can delete\
    \ our old list of dictionaries we were using for an earlier example.\n\n### 5.3.3\
    \ The Experiment Handler\n\nTrial handlers are great for considering single blocks\
    \ of trials, but we are missing an important piece of the puzzle here – saving\
    \ the data! This is where the \"Experiment Handler\" comes in.\n\nNot only does\
    \ the Experiment Handler handle saving of data, but it can have several trial\
    \ handlers belonging to it (e.g. one for practice trials and one for main trials).\
    \ The Experiment Handler will probably also have additional information about\
    \ the task in"
  mdcn: "## 5.2 呈现多个试次\n\n我们现在已完成单个试次的基础设置，接下来可以考虑如何呈现多个试次。这是循环的经典应用场景，而我们对此已相当熟悉！假设我们需要五个试次。在Python中，最简单的方法是使用\
    \ `for trial in range(5):`，然后将现有代码缩进一级，使其位于新的for循环内。这样可以轻松呈现五个试次，但无法让我们逐试次地改变刺激参数。更便捷的方式可能是准备一个包含所有不同试次类型的列表。在我们的任务中，有三个参数会逐试次变化：线索的方向、目标的位置以及按键的正确答案。我们可以将单个试次所需的信息格式化为一个Python字典：\n\
    \n```python\ntrial_info = {'cue_ori':90, 'target_x': -300,\n    'corr_ans':'left'}\n\
    ```\n\n当然，由于我们有多个试次，实际上需要一个包含这些字典的列表。\n\n```python\n# 一个包含2个试次的列表——我们可能需要更多！\n\
    trials = [\n    {'cue_ori':  0, 'target_x':-300,\n        'corr_ans':'left'},\n\
    \    {'cue_ori':180, 'target_x': 300,\n        'corr_ans':'right'},\n    ]\n```\n\
    \n回想一下，在Python中，我们可以遍历任何“可迭代”的对象，即任何包含多个元素的对象。方便的是，我们创建了一个列表对象，其中包含多个元素（每个元素都是一个字典），因此我们现在可以遍历这个列表。此外，我们可以使用当前试次来设置每次试验的刺激。\n\
    \n```python\n# 遍历我们的试次列表\nfor trial in trials:\n    # 更新本次试验的刺激\n    cue.setOri(trial['cue_ori'])\n\
    \    target.setPos([trial['target_x'], 0])\n```\n\n```python\n# 呈现我们的刺激\nfor frameN\
    \ in range(totalframes):\n\n    if frameN < fixTime:\n        fixation.setAutoDraw(True)\n\
    \n    elif frameN == fixTime:\n        # 重置时钟并清除过去的\n        # 键盘事件\n        win.callOnFlip(kb.clock.reset)\n\
    \        win.callOnFlip(kb.clearEvents)\n\n    elif fixTime <= frameN < totalframes:\n\
    \        # 取消绘制注视点\n        fixation.setAutoDraw(False)\n        # 绘制线索\n    \
    \    cue.setAutoDraw(True)\n\n    win.flip()\n\n# 取消绘制线索，绘制目标\ncue.setAutoDraw(False)\n\
    target.setAutoDraw(True)\nwin.flip()\n\n# 等待响应\nkeys = kb.waitKeys(keyList=['left',\
    \ 'right',\n                       'escape'], clear=False)\n\n# 取消绘制目标\ntarget.setAutoDraw(False)\n\
    \n# 如果按下退出键则结束\nif keys and keys[0].name == 'escape':\n    core.quit()\n```\n\n\
    ### 5.2.1 逐试次使用可变时间\n\n回想一下，我们最初的假设涉及SOA（线索和目标之间的时间间隔）和线索有效性（线索是否指向目标方向）之间的交互。为此，我们需要实现变量“soa”，它也会逐试次变化。因此，在我们的试次列表中，还应包含类似的内容：\n\
    \n```python\n# 一个包含2个试次的列表——我们可能需要更多！\ntrials = [\n    {'cue_ori': 0, 'target_x':-300,\n\
    \     'corr_ans':'left', 'soa':0.5},\n    {'cue_ori':180, 'target_x': 300,\n \
    \    'corr_ans':'right', 'soa':1},\n]\n```\n\n在我们的试次循环中，我们还需要使用本次试验的SOA来计算线索和目标之间间隔的呈现时长：\n\
    \n```python\n# 设置soa\nsoa = secs2frames(trial['soa'])\ntotalframes = fixTime +\
    \ cueTime + soa\n```\n\n我们首先将所需的SOA（以秒为单位）转换为帧数，然后使用此值更新totalframes的值。最后，我们更新刺激呈现代码，以便在线索和目标之间呈现一个注视点：\n\
    \n```python\n# 呈现我们的刺激\nfor frameN in range(totalframes):\n    if frameN < fixTime:\n\
    \        fixation.setAutoDraw(True)\n    elif frameN == fixTime:\n        # 重置时钟并清除过去的\n\
    \        # 键盘事件\n        win.callOnFlip(kb.clock.reset)\n        win.callOnFlip(kb.clearEvents)\n\
    \    elif fixTime <= frameN < fixTime + cueTime:\n        # 取消绘制注视点\n        fixation.setAutoDraw(False)\n\
    \        # 绘制线索\n        cue.setAutoDraw(True)\n    elif fixTime + cueTime <=\
    \ frameN < totalframes:\n        # 绘制注视点\n        fixation.setAutoDraw(True)\n\
    \        # 取消绘制线索\n        cue.setAutoDraw(False)\n    win.flip()\n# 取消绘制线索，绘制目标\n\
    target.setAutoDraw(True)\nwin.flip()\n# 等待响应\nkeys = kb.waitKeys(keyList=['left',\
    \ 'right',\n    'escape'], clear=False)\ntarget.setAutoDraw(False)\nfixation.setAutoDraw(False)\n\
    ```\n\n现在，我们的实验设置也包含了SOA的操控；然而，如果我们想呈现一系列SOA值，手动指定字典列表将变得相当繁琐，因此了解如何从其他来源（如电子表格）导入信息可能会很有用。\n\
    \n## 5.3 导入电子表格和保存数据\n\n能够呈现刺激和收集响应是创建实验的重要第一步。然而，实际上我们想做的远不止于此。至少我们想保存数据！在本节中，我们将介绍PsychoPy的数据模块，它提供了一种有用的方法来导入试次列表、控制其随机化以及保存我们的数据。\n\
    \n### 5.3.1 导入试次电子表格\n\n虽然制作字典列表有助于理解这些变量如何在实验背景下使用，但要整理一个包含大量试次的字典列表将非常耗时（而且更难避免拼写错误！）。此外，我们可能希望有不同的选项来随机化试次序列。为此，我们将利用PsychoPy数据模块中提供的一些便捷函数。首先，将此模块添加到你的导入列表中\n\
    \n```python\nfrom psychopy import visual, core, event, data\n```\n\n你需要设置你的试次电子表格，使每一列对应我们字典字段的名称（在Python中也称为“键”），每一行对应该试次中该键的值。回想一下，我们的主要假设还涉及线索和目标之间的SOA因素。让我们考虑五个SOA水平，范围从200毫秒到一秒。这看起来会像下面这样：\n\
    \n| cue_ori | target_x | validity | corr_ans | soa |\n|---|---|---|---|---|\n\
    | 0 | 300 | valid | right | 0.2 |\n| 180 | -300 | valid | left | 0.2 |\n| 180\
    \ | 300 | invalid | right | 0.2 |\n| 0 | -300 | invalid | left | 0.2 |\n| 0 |\
    \ 300 | valid | right | 0.3 |\n| 180 | -300 | valid | left | 0.3 |\n| 180 | 300\
    \ | invalid | right | 0.3 |\n| 0 | -300 | invalid | left | 0.3 |\n| 0 | 300 |\
    \ valid | right | 0.5 |\n| 180 | -300 | valid | left | 0.5 |\n| 180 | 300 | invalid\
    \ | right | 0.5 |\n| 0 | -300 | invalid | left | 0.5 |\n| 0 | 300 | valid | right\
    \ | 0.7 |\n| 180 | -300 | valid | left | 0.7 |\n| 180 | 300 | invalid | right\
    \ | 0.7 |\n| 0 | -300 | invalid | left | 0.7 |\n| 0 | 300 | valid | right | 1\
    \ |\n| 180 | -300 | valid | left | 1 |\n| 180 | 300 | invalid | right | 1 |\n\
    | 0 | -300 | invalid | left | 1 |\n\n一个用于说明试次集合的表格。每个列标题对应一个变量名，每个行值对应于该试次中该变量的值。\n\
    \n对于使用非英语语言设置的人员的重要提示：在某些语言（如法语、意大利语、德语和荷兰语）中，数学符号与英语惯例不同。在英语中，小数用句点表示：4.5。然而，在其他一些语言中，小数用逗号表示：4,5。这个特定的符号被称为小数分隔符。Python遵循英语惯例，因此小数分隔符将是句点（或点、或点、或句点，或你愿意怎么称呼它）。确保你的电子表格编辑器使用句点（\"\
    .\"）作为小数分隔符！\n\n使用电子表格可能很方便，因为它使你的实验对于那些习惯于编辑它但可能对编辑Python脚本没有信心的人来说更具可重用性。好的，让我们导入那个电子表格：\n\
    \n```python\nconditions = data.importConditions('conditions.xlsx')\nprint(conditions)\n\
    ```\n\n运行你的脚本并查看输出窗口。你在这里看到的是一个字典列表。这就是 `importConditions` 函数的作用——它导入你的电子表格并将其转换为字典列表，然后可以在此用例中用作试次列表。\n\
    \n### 5.3.2 试次处理器\n\n导入电子表格克服了手动创建繁琐字典列表的局限性，但它并没有解决我们另一个愿望，即更好地控制试次随机化。这就是 `TrialHandler`\
