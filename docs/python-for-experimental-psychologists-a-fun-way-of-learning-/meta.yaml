  md: 'The last Screen is the one you can use to draw images on. Earlier, you learned
    that drawing during timing-critical phases of the experiment is a bad idea. One
    solution is to draw all possible Screens before the experiment begins. Another
    option is to draw the Screens at the start of each trial, during a preparation
    phase. In this case, you could draw the image on a Screen at the start of each
    trial. Timing isn''t critical there yet, as participants will still be looking
    at the fixation mark (a few milliseconds more or less of that isn''t going to
    have an impact on their behaviour).


    For now, simply create an empty Screen. You can draw the images later:


    ```

    # Create a Screen to draw images on later

    imgscr = Screen()

