  md: 'yet enabled a way of escaping your experiment, it becomes very easy to get
    trapped in your study (an infinite hell no researcher wishes to endure).


    +   - **units**: The units to use for the window. Here we are using pixels; however,
    it is worth noting that we could have used any number of units, and the unit we
    choose will be inherited by all visual stimuli we draw to this window (unless
    we otherwise state it in the “unit” parameter of that stimulus).

    - **color** and **colorSpace**: What colour to use for the window and what colour
    space. (A note on colour spaces will follow in a minute.)

    - **screen**: Which screen to present the window in, with numbering starting from
    0 (and counting up to the number of screens you have). This means you could easily
    have a multiscreen experiment: you would just need to make several windows with
    different screen numbers and then present visual stimuli in those different screens!


    It is also worth noting that we can have the line of code where we create our
    window span over several lines. This works fine long as there is a level of **indentation**
    for lines that follow the first. (As before, one level of indentation equates
    to four spaces. More on indentation follows later in this chapter!) Press run
    on your stimuli.py file. You should see, very briefly, a grey window appear and
    then disappear – magical.


    We’ve thrown in some lingo here: “Package”, “Module”, and “Class”. You can consider
    Python packages as having a hierarchical structure. For instance, “psychopy” is
    the package; it sits at the top of the hierarchy. PsychoPy contains modules for
    doing different things, e.g. the “visual” module for drawing visual things, the
    “sound” module for anything to do with sound. These modules can be accessed using
    the dot operator, e.g. psychopy.visual or psychopy.sound. Alternatively, you can
    directly import those modules, using `from psychopy import visual, sound`. Each
    module has a number of “classes”. For instance, `visual` contains things like
    Window, ShapeStim, and Image. Each class has its own attributes and methods. For
    instance, an Image object has the attributes `pos`, `size`, and `image` (for the
    position, size, image file to use in that object). It will also have the methods
    `.setPos()`, `.setSize()` and `.setImage()`. Each allows you to reset the attributes
    of the object. Several of these methods will come in handy later, when we want
    to update the attributes of an object dynamically in time.


    # 3.3.1 Units and Colours in PsychoPy Windows


    As you might have noticed, the Window class requires you to specify units. In
    this case, we set it to ''pix'', which stands for ‘pixels’. This is a straightforward
    mapping, as pixels are a unit that your computer and monitor are familiar with.
    However, using pixels comes with the caveat that it can result in stimuli of a
    different physical size between monitors (the size of a pixel varies monitor to
    monitor, depending on the screen’s resolution).


    When selecting what unit to use for your stimuli, ask yourself this question:
    do I need my stimuli to have the same *physical size* across monitors, or the
    same *relative size*? More often than not, the same relative size is fine (i.e.
    same picture could be presented on a widescreen gaming monitor or a small tablet,
    and it would be scaled according to the screen size). However in some psychophysical
    studies, we need the same physical size. This is usually because we need to know
    the size of something as it falls on the retina.'
