- img_proc: true
  md: '# 5.3 Importing Spreadsheets and Saving Data


    Being able to present stimuli and gather responses is an important first step
    in creating experiments. However, in reality we want to do much more than this.
    At the very least we want to save the data! In this section, we will cover the
    data module of PsychoPy, which provides a useful method for importing lists of
    trials, controlling their randomisation, and saving our data.


    # 5.3.1 Importing a Spreadsheet of Trials


    Although making a list of dictionaries is useful in understanding how these variables
    can be used in the context of experiments, it would be very time consuming to
    put together a list of dictionaries that comprised a large number of trials (and
    even harder to avoid typos!). Furthermore, we might want to have different options
    for randomising the trial sequence. For this we are going to make use of some
    handy functions available inside PsychoPy’s data module. Start by adding this
    module to your list of imports


    ```

    from psychopy import visual, core, event, data

    ```


    You are going to need to set up your spreadsheet of trials such that each column
    corresponds to the name of our dictionary fields (also known as “keys” in python),
    and each row corresponds to the value of that key on that trial. Recall that our
    main hypothesis also concerns the factor of SOA between the cue and the target.
    Let’s consider five SOA levels, ranging from 200 ms to one second. This will look
    something like the below:


    | cue_ori | target_x | validity | corr_ans | soa |

    |---|---|---|---|---|

    | 0 | 300 | valid | right | 0.2 |

    | 180 | -300 | valid | left | 0.2 |

    | 180 | 300 | invalid | right | 0.2 |

    | 0 | -300 | invalid | left | 0.2 |

    | 0 | 300 | valid | right | 0.3 |

    | 180 | -300 | valid | left | 0.3 |

    | 180 | 300 | invalid | right | 0.3 |

    | 0 | -300 | invalid | left | 0.3 |

    | 0 | 300 | valid | right | 0.5 |

    | 180 | -300 | valid | left | 0.5 |

    | 180 | 300 | invalid | right | 0.5 |

    | 0 | -300 | invalid | left | 0.5 |

    | 0 | 300 | valid | right | 0.7 |

    | 180 | -300 | valid | left | 0.7 |

    | 180 | 300 | invalid | right | 0.7 |

    | 0 | -300 | invalid | left | 0.7 |

    | 0 | 300 | valid | right | 1 |

    | 180 | -300 | valid | left | 1 |

    | 180 | 300 | invalid | right | 1 |

    | 0 | -300 | invalid | left | 1 |


    A table to illustrate the set of trials. Each column header corresponds to a variable
    name and each row value corresponds to the value of that variable in that trial.'
