  md: 'This reads the file and stores its contents in a new variable (`data`). This
    variable is quite large and quite complex, so an explanation is in order. `data`
    is a list that contains values of single trials (one trial per index). In this
    case, there were 50 trials, so `len(data)==50`. You can refer to a single trial
    by using `data[i]`, where `i` is the trial number.


    Each single trial is represented by a dict. These dicts always have the same six
    keys. The first are `trackertime` and `time`. Both of these are NumPy arrays that
    contain the timestamps of all data samples. The timestamps in `trackertime` are
    in the time that the eye tracker reported. The timestamps in `time` start at 0
    in every trial.


    The next three keys are `x`, `y`, and `size`. These are all NumPy arrays. `x`
    contains samples of the horizontal gaze position and `y` of the vertical gaze
    position (these are measured in the monitor''s pixels). `size` contains samples
    of the pupil size. These can represent either the pupil surface area or the pupil
    diamater (which depends on the EyeLink''s settings during testing). Pupil size
    was measured in arbitrary units, which are relative to the specific setup and
    participant. Note that these units are relative; they don''t directly map onto
    anything in the real world, and you typically can''t compare them between participants.


    Finally, there is the `events` key. This refers to another dict, which contains
    the following keys: `Sfix` (indicates fixation start), `Efix` (indicates fixation
    end), `Sblk` (indicates the start of a blink), `Eblk` (indicates the end of a
    blink), `Ssac` (indicates the start of a saccade), and `Esac` (indicates the end
    of a saccade). All these events are lists that contain a timestamp and data that
    is specific to the event (saccade starting and ending location, and duration,
    for example). The last key in the `events` dict is the `msg` key. This contains
    a list of logged messages and their timestamps.


    Let''s look at the `msg` key a bit closer. Run the current analysis.py (with only
    the imports and the `read_edf` call) in an Editor, with the output to an Interpreter.
    Now type the following into the Interpreter:


