    \ to make sure to add feedbackTime to your expInfo dictionary and apply your secs2frames()\
    \ function to set feedbackFrames.\n\n# 5.6 Block Designs and Counterbalancing\n\
    \nIn many experiments, we might want to present several blocks of trials. For\
    \ instance, imagine in our task we want to measure participants’ baseline responses\
    \ when a cue is not presented. Let’s call this our neutral block. We will make\
    \ a separate spreadsheet for our neutral block; it will look identical to our\
    \ “conditions” spreadsheet, with the exception that the “validity” column will\
    \ read as “neutral” for all trials. Make this new spreadsheet and save it as “neutral.xlsx”.\n\
    \nNow we will create one more spreadsheet – the purpose of this sheet is to control\
    \ the blocks in our experiment. Make a spreadsheet with cells like the below and\
    \ call it “blocks.xlsx”.\n\n| blockname | blockfile | cueopacity |\n| --- | ---\
    \ | --- |\n| experimental | conditions.xlsx | 1 |\n| neutral | neutral.xlsx |\
    \ 0 |\n\n# 5.6.1 Randomised Block Designs\n\nWhen considering blocked designs\
    \ in experiments, we could consider either a randomised block design (where we\
    \ present all participants with a neutral block and an experimental block – in\
    \ a totally random order) or a counterbalanced design (where we present half our\
    \ participants with the experimental block followed by the neutral block, and\
    \ half the"
  merge: -1
