    设置为 False，所有点的大小将相同。一个类似的关键字参数是 `durationcolour`，它也需要一个布尔值。如果你将其设置为 True，较长的注视将具有“更热”的颜色。如果
    `durationcolour` 设置为 False，所有点都将是绿色的。示例请参见图表。


    对于此图表，你还应该为预期的保存文件创建一个名称和路径。完成后，你可以使用前面提到的 `draw_fixations` 函数创建图表。与之前一样，在创建并保存后关闭图形：


    ```

    # 绘制注视点

    savename = ''fixations_{}''.format(imgname)

    savepath = os.path.join(OUTPUTDIR, savename)

    fig = gazeplotter.draw_fixations(fixations, DISPSIZE, \n                                durationsize=True,
    durationcolour=False, \n                                imagefile=imgpath, savefilename=savepath)

    close(fig)

    ```


    最后的图表是最花哨的：热图。这种可视化在眼动追踪研究中相当流行，主要是因为它看起来真的很漂亮。其思想是用更热的颜色表示注视点更密集的区域。你还可以考虑注视持续时间，使长注视比短注视权重更高。结果是一种可视化，可以立即告诉你注视点最常出现在哪里（参见示例图）。


    ![](img/07ad901823abb0ad885d2b362f9446b0_173_0.png)


    **图 8.4** 这是叠加在采集图像上的注视点热图


    要绘制热图，你可以使用 `gazeplotter` 模块中的 `draw_heatmap` 函数。它需要与 `draw_fixations` 函数相同的两个参数：一个
    ''Efix'' 事件列表和显示尺寸。


    `draw_heatmap` 函数可以接受四个关键字，其中两个与 `draw_raw` 和 `draw_fixation` 函数相同：`imagefile`
    用于指定原始图像，`savefilename` 用于存储生成的热图。另一个关键字是 `alpha`，它允许你设置将叠加在图像上的热图的透明度。如果设置为 0，热图将完全透明；如果设置为
    1，热图将完全不透明。默认值为 0.5。最后一个关键字是 `durationweight`，它需要一个布尔值。如果你将其设置为 `True`，注视持续时间将被加权到热图构建中，较长的注视被赋予更高的权重。如果设置为
