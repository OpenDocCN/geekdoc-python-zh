    \ NumPy 数组。你可以使用 NumPy 的 array 函数来完成此操作。在 `analysis.py` 的末尾添加以下代码，**不要有任何缩进**：\n\
    \n```\n# 将列表转换为 NumPy 数组\ntraces['black'] = numpy.array(traces['black'])\ntraces['white']\
    \ = numpy.array(traces['white'])\n```\n\n现在，将轨迹列表转换为数组后，你可以做几件很酷的事情。首先是计算平均轨迹。为此，理解轨迹的存储方式非常重要。它们存储在一个多维\
    \ NumPy 数组中，第一个轴是所有试验编号，第二个轴是所有采样点编号。要计算平均轨迹，你应该对所有试验求平均，而不是对所有时间点求平均。也就是说，你需要对每个试验的时间点\
    \ 1、每个试验的时间点 2，一直到每个试验的时间点 2,000 分别求平均。包含所有这 2,000 个平均值的数组就是**平均轨迹**。\n\n使用 NumPy，你不必单独计算\
    \ 2,000 个平均值。相反，你可以简单地使用 mean 函数的 axis 关键字来指示你想要计算轨迹数组第一个维度中所有点的平均值。例如：\n\n```\n\
    numpy.mean(traces['black'], axis=0)\n```\n\n这会产生一个与上面讨论的平均轨迹相同的轨迹。该轨迹有 2,000 个值，每个值是某个索引处所有样本的平均值。例如，索引\
    \ 5 处的值（那是第六个值！）是所有黑试验第六个样本的平均值。这个平均轨迹表征了瞳孔对计算机显示器从亮到暗变化的平均光反应。\n\n你可以以同样的方式使用\
    \ NumPy 的 std 函数：\n\n```\nnumpy.std(traces['black'], axis=0)\n```\n\n这不会给出平均值，而是给出所有轨迹的标准差。如果你将这个轨迹除以试验次数的平方根，你就会得到每个时间点的平均值标准误差。这大致告诉你你的平均值估计在时间上的可靠性。这应该是相对恒定的，因此在某些点看到大的偏差可能需要仔细检查你的数据！\n\
    \nlen 函数可以告诉你每个数组中有多少试验。如前所述，通过将标准差除以试验次数的平方根，你可以计算平均值标准误差。将以下代码添加到你的 `analysis.py`\
    \ 中，以计算黑和白条件的平均轨迹及其标准误差。通常，你可以将这些存储在一个字典中以便于访问：\n\n```\n# 创建一个空字典来包含均值和标准误差\n\
    avgs = {'black':{}, 'white':{}}\n# 循环遍历两个条件\nfor con in ['black', 'white']:\n\
    \    # 计算此条件下的试验次数\n    n_trials = len(traces[con])\n    # 计算此条件下的平均轨迹\n    avgs[con]['M']\
    \ = numpy.mean(traces[con], axis=0)\n    # 计算此条件下的标准差\n    sd = numpy.std(traces[con],\
    \ axis=0)\n    # 计算此条件下的标准误差\n    avgs[con]['SEM'] = sd / numpy.sqrt(n_trials)\n\
    ```\n\n与 mean 和 std 函数一样，你也可以在 ttest_rel 函数中使用 axis 关键字来一次执行多个检验。使用此方法检查在哪些时间点瞳孔对亮到暗变化的反应与瞳孔对暗到亮变化的反应有显著差异：\n\
    \n```\n# 在每个时间点进行 t 检验\nt, p = ttest_rel(traces['black'], traces['white'], axis=0)\n\
    ```\n\n因为你刚刚进行了 2,000 次 t 检验，所以不能简单地使用 0.05 的 p 值显著性阈值（alpha）。alpha 为 0.05 的背后思想是，你接受在零效应的情况下，仍有\
    \ 5% 的概率你的 p 值会“统计显著”。进行 2,000 次检验，每次 alpha 为 5%，即使在零效应下，你也会预期至少出现 100 个显著差异。\n\
    相反，你可以使用 Bonferroni 校正。这要求你将 alpha 除以你执行的检验次数，这样偶然错误的总体机会仍然只有 5%。\n\n```\n# Bonferroni\
    \ 校正后的 alpha\nalpha = 0.05 / len(t)\n```\n\n只有当 t 检验的 p 值低于新的 alpha 水平时，你才认为差异是显著的。也就是说，在\
    \ p<alpha 的地方，'black' 和 'white' 轨迹实际上彼此不同。\n下一步是创建一个漂亮的图表。首先，定义每个条件的颜色，并创建一个带有单个轴的新图形（在\
    \ Matplotlib 中这就是子图的名称）：\n\n```\n# 定义绘图颜色\ncols = {'black':'#204a87', 'white':'#c4a000'}\n\
    # 创建一个带有单个轴的新图形\nfig, ax = pyplot.subplots(figsize=(9.6,5.4), dpi=200.0)\n```\n\
    \n接下来，用 for 循环遍历条件：\n\n```\n# 循环遍历条件\nfor con in ['black', 'white']:\n```\n\n\
    对于每个条件，绘制平均轨迹。你也可以通过使用轴的 fill_between 方法来绘制阴影区域。此方法要求你输入 x 值（在这种情况下是数字 0–1999：自显示器变化以来经过的时间，以毫秒为单位）以及两个\
    \ y 值。第一个 y 值数组将是平均轨迹加上平均轨迹的标准误差。第二个将是平均轨迹减去平均轨迹的标准误差。通过指定 alpha 关键字，你可以设置透明度：值为\
    \ 1 表示完全不透明，而值为 0 表示不可见。（注意，这个 alpha 与前面讨论的显著性阈值完全不同！）在 for 循环中添加以下代码：\n\n```\n\
    # 创建 x 值\nx = numpy.arange(len(avgs[con]['M']))\n# 绘制平均轨迹\nax.plot(x, avgs[con]['M'],\
    \ '-', color=cols[con], label=con)\n# 绘制平均值标准误差的阴影\ny1 = avgs[con]['M'] + avgs[con]['SEM']\n\
    y2 = avgs[con]['M'] - avgs[con]['SEM']\nax.fill_between(x, y1, y2, color=cols[con],\
    \ alpha=0.3)\n```\n\n![](img/07ad901823abb0ad885d2b362f9446b0_153_0.png)\n\n**图\
    \ 7.3** 这就是平均轨迹应有的样子。蓝线表示对亮到暗亮度变化的平均瞳孔反应，黄线表示对暗到亮亮度变化的平均瞳孔反应。线条周围的阴影表示平均值的标准误差，灰色阴影表示线条之间存在显著差异的地方（逐点相关样本\
    \ t 检验，Bonferroni 校正）\n\n![](img/07ad901823abb0ad885d2b362f9446b0_154_0.png)\n\
    \n**图 7.4** 当你尝试绘制轨迹时出错，或者测试过程中参与者的眼睛爆炸时会发生这种情况。无论哪种方式：哎呀！\n\n最后要绘制的是一个阴影区域，表示两条轨迹之间存在显著差异的地方。你可以使用与指示平均值标准误差相同的\
    \ `fill_between` 方法来完成此操作。该函数有一个 `where` 关键字，它将确保仅在条件语句为 True 的位置绘制阴影，例如当 p <\
    \ 0.05 时。\n\n为此，你需要知道 y 轴的限制。让我们将它们设置为 0 和 2（瞳孔大小的比例变化可能介于这些数字之间）。你可以使用这些来创建顶部和底部的\
    \ y 轨迹。底部轨迹将只是一个全零数组。顶部轨迹将是一个全 2 的数组。\n\n```\n# 创建 y 数组\ny1 = numpy.zeros(len(x))\n\
    y2 = numpy.ones(len(x)) * 2\n# 阴影表示轨迹之间的显著差异\nax.fill_between(x, y1, y2, where=p<alpha,\
    \ color='#babdb6', alpha=0.2)\n```\n\n现在通过设置轴的标签和限制并添加图例来完成图表：\n\n```\n# 设置轴限制\n\
    ax.set_xlim([0, 2000])\nax.set_ylim([0, 2])\n# 设置轴标签\nax.set_xlabel('time (ms)')\n\
    ax.set_ylabel('proportional pupil size change')\n# 添加图例\nax.legend(loc='upper\
    \ left')\n```\n\n最后保存图形：\n\n```\nfig.savefig('pupil_traces.png')\n```"
