    \ `for` 循环知识。只是这一次，我们不是遍历试验，而是遍历帧。想象一下，你有一种不成熟的幽默感，想呈现一组字母T，持续420毫秒。在60赫兹的显示器上，这相当于60帧/秒\
    \ * 0.42秒 = 25.2帧。正如我们讨论过的，呈现部分帧是不可能的，所以我们需要将呈现时间四舍五入到最接近的整数。（你也可以根据自己的偏好一致地向上或向下取整。）\n\
    \n要计算呈现刺激所需的帧数，并计算我们会偏差多少，我们可以使用：\n\n```python\n# the intended stimulus duration\
    \ in seconds\ndesired_time = 0.420\n\n# monitor frame rate\nframerate = 60\n#\
    \ compute the time per frame in seconds\nframetime = 1.0 / framerate\n\n# total\
