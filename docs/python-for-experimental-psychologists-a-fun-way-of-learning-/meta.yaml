    # 3

    CREATING AND PRESENTING STIMULI


    In this chapter, you will learn how to create some basic stimuli (text, shapes,
    images) and how to present these on a computer display. You’ll also learn how
    to manipulate images using some external libraries and how to make stimuli “dynamic”
    (i.e. moving and interactive). To do this, you will write scripts in which you
    will use classes from a package known as PsychoPy (Peirce, 2007, 2009).


    PsychoPy can do pretty much anything you could need in a psychological experiment.
    This includes presenting stimuli on a monitor; producing sound; collecting responses
    from keyboards, computer mice, joysticks, and controllers; communicating with
    eye trackers; logging data; and accurately timing events. It is notable that other
    packages do exist for similar purposes, such as PyGaze (Dalmaijer et al., 2014).
    Which package you choose is entirely up to you (or your teacher, if you’re using
    this book in a course module). In this chapter, we’re going to focus on PsychoPy,
    but the skills you learn here will help in extending your knowledge enough to
    also try other packages!


    Without delving too deep into software architecture, it is worth noting that PsychoPy
    is built on top of a few other external packages (dependencies). This means that
    it requires other packages to do what it does. For this reason, we recommend installing
    standalone PsychoPy to create your first experiment. This can be downloaded from
    https://www.psychopy.org/download.html (see Chapter 1 for installation instructions).


    This isn’t to say that you can’t use PsychoPy in the other environments introduced
    earlier in this book. For lots of reasons, many programmers prefer those environments
    rather than PsychoPy’s inbuilt “Coder view” (introduced shortly). Alternative
    environments offer lot more features and functionality compared to PsychoPy Coder,
    but they also typically require that you install a number of dependencies and
    configure your environment. Standalone PsychoPy comes pre-equipped with most packages
    that you will need for a psychology experiment (including PyGaze!). This is why
    we like using PsychoPy Coder for teaching: it saves *a lot* of time in setting
    up in the classroom.'
- md: "## 3.1 Scripts\n\nUnlike in previous chapters, where you punched some lines\
    \ into an interpreter, in this chapter you are going to create scripts to do your\
    \ bidding. A script is nothing more than a collection of lines, which will be\
    \ executed one by one.\n\nProgramming languages that run scripts per line are\
    \ called **interpreted languages**. These differ from **compiled languages**,\
    \ which pre-translate the entire script before actually running it. Generally\
    \ speaking, compiled languages are quicker to run, but interpreted languages have\
    \ other benefits. For example, scripts written in an interpreted language could\
    \ rewrite themselves while running. Think about that while you read Stephen Hawking’s\
    \ warning on artificial intelligence (TL; DR: scary self-redesigning AIs will\
    \ make humans obsolete).\n\nNowadays, most programming languages can be implemented\
    \ both as interpreted or compiled, so it’s not really a language-specific feature\
    \ any longer. Also, you could probably think of a way in which compiled languages\
    \ could rewrite themselves to also kill the human race. The real lesson here is\
    \ that you shouldn’t worry about the distinction between interpreted and compiled\
    \ languages too much!\n\n## 3.2 The PsychoPy Coder View\n\nWhen you first open\
    \ PsychoPy, you will see three open windows: Builder view, Runner view, and Coder\
    \ View. In this book, we are going to focus on Coder View. (For making experiments\
    \ in Builder, see Peirce et al., 2022). The Coder view is shown in Figure 3.1,\
    \ it is made up of three sections, the Shelf, Source Assistance, and Editor.\n\
    \nThe Editor window is the most important of these sections; it is where we will\
    \ write our python scripts. To start a new script, you can select the new document\
    \ icon (if you hover over this, it will read “create new experiment file”). This\
    \ will create a new script in the Editor window named “untitled.py”. The “.py”\
    \ extension indicates that this is a python file. In general, it is a good idea\
    \ to save this with a new, unique, name before starting. Let’s save it as “stimuli.py”.\n\
    \nBelow the Editor window is the Shelf. This Shelf consists of two tabs, the Shell\
    \ and the Output tab. The Shell is a place where you can type Python code to test\
    \ it out. However, variables created in the shell are not saved to a “global”\
    \ workspace. That is, unlike other development environments, you cannot access\
    \ variables created in your script in Editor from Shell, nor vice versa. The Output\
    \ tab is where any output (including important error messages!) will be generated\
    \ when you run your scripts.\n\nFinally, the Source Assistant window also consists\
    \ of two tabs. The Structure tab is intended to help us navigate large scripts,\
    \ by showing us the functions and classes that we have created in one condensed\
    \ location. The File Browser tab is intended to help us navigate where our current\
    \ directory is. In this chapter, we will focus less on the Source Assistant window\
    \ – but it is good to know it is there.\n\n## 3.3 The Window\n\nMost experiments\
    \ will involve presenting something on the screen. In order to present visual\
    \ stimuli on screen, we need a place for them to be drawn, this is known as the\
    \ “Window”. Note that the Window need not have the same properties as the screen.\
    \ A window can be smaller than your screen, for instance. To set up your window\
    \ in PsychoPy, you’ll need to start by importing the relevant “module” from the\
    \ PsychoPy library:\n\n```\nfrom psychopy import visual\n```\n\npsychopy.visual\
    \ is a module that contains a wide breadth of visual stimuli, from shapes to random\
    \ dot kinematograms. Most importantly, the visual module contains what we need\
    \ to make a Window for drawing things in, the rather aptly named “Window” class.\
    \ Right, let’s make a window:\n\n```\nwin = visual.Window(size=[1024, 768], fullscr=False,\n\
    \    units='pix', color=(0,0,0),\n    colorSpace='rgb', screen=0)\n```\n\nHere\
    \ we have added several arguments to the window (in this book, we may refer to\
    \ arguments and parameters interchangeably, they essentially mean an option/setting\
    \ of the object we are creating):\n\n- **size**: size of our Window, in width\
    \ and height.\n- **fullscr**: if the Window is fullscreen or not. It is highly\
    \ recommended that you set this to False whilst developing your experiment. If\
    \ you set this to True, and you have not yet enabled a way of escaping your experiment,\
    \ it becomes very easy to get trapped in your study (an infinite hell no researcher\
    \ wishes to endure).\n- **units**: The units to use for the window. Here we are\
    \ using pixels; however, it is worth noting that we could have used any number\
    \ of units, and the unit we choose will be inherited by all visual stimuli we\
    \ draw to this window (unless we otherwise state it in the “unit” parameter of\
    \ that stimulus).\n- **color** and **colorSpace**: What colour to use for the\
    \ window and what colour space. (A note on colour spaces will follow in a minute.)\n\
    - **screen**: Which screen to present the window in, with numbering starting from\
    \ 0 (and counting up to the number of screens you have). This means you could\
    \ easily have a multiscreen experiment: you would just need to make several windows\
    \ with different screen numbers and then present visual stimuli in those different\
    \ screens!\n\nIt is also worth noting that we can have the line of code where\
    \ we create our window span over several lines. This works fine long as there\
    \ is a level of **indentation** for lines that follow the first. (As before, one\
    \ level of indentation equates to four spaces. More on indentation follows later\
    \ in this chapter!) Press run on your stimuli.py file. You should see, very briefly,\
    \ a grey window appear and then disappear – magical.\n\nWe’ve thrown in some lingo\
    \ here: “Package”, “Module”, and “Class”. You can consider Python packages as\
    \ having a hierarchical structure. For instance, “psychopy” is the package; it\
    \ sits at the top of the hierarchy. PsychoPy contains modules for doing different\
    \ things, e.g. the “visual” module for drawing visual things, the “sound” module\
    \ for anything to do with sound. These modules can be accessed using the dot operator,\
    \ e.g. psychopy.visual or psychopy.sound. Alternatively, you can directly import\
    \ those modules, using `from psychopy import visual, sound`. Each module has a\
    \ number of “classes”. For instance, `visual` contains things like Window, ShapeStim,\
    \ and Image. Each class has its own attributes and methods. For instance, an Image\
    \ object has the attributes `pos`, `size`, and `image` (for the position, size,\
    \ image file to use in that object). It will also have the methods `.setPos()`,\
    \ `.setSize()` and `.setImage()`. Each allows you to reset the attributes of the\
    \ object. Several of these methods will come in handy later, when we want to update\
    \ the attributes of an object dynamically in time.\n\n### 3.3.1 Units and Colours\
    \ in PsychoPy Windows\n\nAs you might have noticed, the Window class requires\
    \ you to specify units. In this case, we set it to 'pix', which stands for ‘pixels’.\
    \ This is a straightforward mapping, as pixels are a unit that your computer and\
    \ monitor are familiar with. However, using pixels comes with the caveat that\
    \ it can result in stimuli of a different physical size between monitors (the\
    \ size of a pixel varies monitor to monitor, depending on the screen’s resolution).\n\
    \nWhen selecting what unit to use for your stimuli, ask yourself this question:\
    \ do I need my stimuli to have the same *physical size* across monitors, or the\
    \ same *relative size*? More often than not, the same relative size is fine (i.e.\
    \ same picture could be presented on a widescreen gaming monitor or a small tablet,\
    \ and it would be scaled according to the screen size). However in some psychophysical\
    \ studies, we need the same physical size. This is usually because we need to\
    \ know the size of something as it falls on the retina.\n\nUnits to use if you\
    \ require the same physical size of stimulus across monitors include centimetres\
    \ and degrees of visual angle. However, these units require PsychoPy to know exactly\
    \ how many pixels can fit into a centimetre on your monitor and how far a participant\
    \ is sitting from the monitor. If you are using PsychoPy Coder view, you can provide\
    \ this information using Monitor Centre. If you are using another development\
    \ environment (e.g. Spyder), you can set up your own monitor by importing PsychoPy’s\
    \ monitors module and then specify that monitor in the window so that it can use\
    \ units like centimetres and degrees of visual angle:\n\n```\nfrom psychopy import\
    \ visual, monitors\n\n# set up the monitor\nmon = monitors.Monitor('labMonitor',\
    \ width=1280,\n    distance=57, gamma=None)\n\n# make a window to draw things\
    \ in\nwin = visual.Window(size=[1024, 768], fullscr=False,\n    units='pix', color=(0,0,0),\
    \ colorSpace='rgb',\n    screen=0, monitor=mon)\n```\n\nIf your experiment will\
    \ be satisfied with the same relative size of stimulus across monitors, PsychoPy\
    \ offers height or normalised units:\n\n- **Height units** correspond to the height\
    \ of your window: 1 unit of height is the total distance from the bottom to the\
    \ top of the window, -0.5 is the bottom edge of the window, and 0.5 is the top\
    \ edge of the window. If you imagine a perfect square that is as wide as it is\
    \ tall, -0.5 would be the left edge of that square, and 0.5 the right edge of\
    \ that square.\n- **Normalised units** range between -1 and 1 and represent relative\
    \ distances. On a monitor with a resolution of 1920 × 1080 pixels, a horizontal\
    \ distance of -1 (left edge of the monitor) to 0 (monitor centre) will correspond\
    \ to 960 pixels. On a monitor with a resolution of 1024 × 768, the same horizontal\
    \ distance will correspond to 512 pixels.\n\nIn this book, you will always use\
    \ pixels. The upside is that this is the most conventional and straightforward\
    \ unit of distance on a computer monitor. The downside is that pixels are specific\
    \ to your monitor: a stimulus with a size of 200 pixels will have a different\
    \ size in centimetres on two different monitors, because pixel sizes differ between\
    \ monitors. Fortunately, you can measure how wide your monitor is and calculate\
    \ the amount of pixels per centimetre. From that, you can calculate a stimulus’\
    \ size in centimetres and ultimately its size in visual angle (using the distance\
    \ between participant and monitor).\n\nAnother important aspect of PsychoPy is\
    \ that it uses a different colour space, which determines how colours are defined.\
    \ Typically, monitors produce colour with values for red, green, and blue that\
    \ range from 0 to 255.\n\nIn PsychoPy, colours can also be defined as values for\
    \ red, green, and blue. However, these values range between -1 and 1. The logic\
    \ behind this is that colours can be represented as deviations from grey, which\
    \ is defined as (0,0,0). Some additional examples: (-1, -1, -1) is black, (1,\
    \ 1, 1) is white, and (1, -1, -1) is red."
  mdcn: "## 3.1 脚本\n\n与前几章你在解释器中输入几行代码不同，本章你将创建脚本来执行你的指令。脚本不过是一系列代码行，它们将被逐行执行。\n\n\
    逐行运行脚本的编程语言被称为**解释型语言**。它们与**编译型语言**不同，后者在实际运行前会预先翻译整个脚本。一般来说，编译型语言运行更快，但解释型语言有其他优势。例如，用解释型语言编写的脚本可以在运行时重写自身。在阅读斯蒂芬·霍金关于人工智能的警告时，请思考这一点（太长不看版：可怕的、能自我重新设计的人工智能将使人类过时）。\n\
    \n如今，大多数编程语言既可以作为解释型语言实现，也可以作为编译型语言实现，因此这不再是一个特定于语言的特性。此外，你可能也能想到编译型语言重写自身以消灭人类的方法。这里真正的教训是，你不应该过于担心解释型语言和编译型语言之间的区别！\n\
    \n## 3.2 PsychoPy 代码视图\n\n当你第一次打开 PsychoPy 时，你会看到三个打开的窗口：构建器视图、运行器视图和代码视图。在本书中，我们将重点关注代码视图。（关于在构建器中制作实验，请参阅\
    \ Peirce 等人，2022）。代码视图如图 3.1 所示，它由三个部分组成：工具架、源代码辅助和编辑器。\n\n编辑器窗口是这些部分中最重要的；我们将在这里编写\
    \ Python 脚本。要开始一个新脚本，你可以选择新建文档图标（如果将鼠标悬停在上面，它会显示“创建新实验文件”）。这将在编辑器窗口中创建一个名为“untitled.py”的新脚本。“.py”扩展名表明这是一个\
    \ Python 文件。通常，在开始之前，最好用一个新的、唯一的名称保存它。让我们将其保存为“stimuli.py”。\n\n编辑器窗口下方是工具架。该工具架由两个选项卡组成：Shell\
    \ 和输出选项卡。Shell 是一个你可以输入 Python 代码进行测试的地方。但是，在 Shell 中创建的变量不会保存到“全局”工作区。也就是说，与其他开发环境不同，你无法从\
    \ Shell 访问在编辑器脚本中创建的变量，反之亦然。输出选项卡是运行脚本时生成任何输出（包括重要的错误消息！）的地方。\n\n最后，源代码辅助窗口也由两个选项卡组成。结构选项卡旨在帮助我们浏览大型脚本，通过在一个简洁的位置显示我们创建的函数和类。文件浏览器选项卡旨在帮助我们了解当前目录的位置。在本章中，我们将较少关注源代码辅助窗口——但知道它的存在是好的。\n\
    \n## 3.3 窗口\n\n大多数实验都涉及在屏幕上呈现某些内容。为了在屏幕上呈现视觉刺激，我们需要一个绘制它们的地方，这被称为“窗口”。请注意，窗口不必具有与屏幕相同的属性。例如，窗口可以比你的屏幕小。要在\
    \ PsychoPy 中设置你的窗口，你需要首先从 PsychoPy 库中导入相关的“模块”：\n\n```\nfrom psychopy import visual\n\
    ```\n\npsychopy.visual 是一个包含广泛视觉刺激的模块，从形状到随机点运动图。最重要的是，visual 模块包含了我们创建用于绘图的窗口所需的内容，即命名相当贴切的“Window”类。好了，让我们创建一个窗口：\n\
    \n```\nwin = visual.Window(size=[1024, 768], fullscr=False,\n    units='pix',\
    \ color=(0,0,0),\n    colorSpace='rgb', screen=0)\n```\n\n这里我们为窗口添加了几个参数（在本书中，我们可能会互换使用“参数”和“参数”，它们本质上指的是我们正在创建的对象的选项/设置）：\n\
    \n- **size**：我们窗口的宽度和高度。\n- **fullscr**：窗口是否为全屏。强烈建议你在开发实验时将其设置为 False。如果你将其设置为\
    \ True，并且你还没有启用退出实验的方法，那么很容易被困在你的研究中（一个任何研究者都不愿忍受的无限地狱）。\n- **units**：窗口使用的单位。这里我们使用像素；然而，值得注意的是，我们可以使用任何数量的单位，我们选择的单位将被继承到我们绘制到此窗口的所有视觉刺激（除非我们在该刺激的“unit”参数中另行说明）。\n\
    - **color** 和 **colorSpace**：窗口使用的颜色和颜色空间。（关于颜色空间的说明稍后会跟进。）\n- **screen**：在哪个屏幕上呈现窗口，编号从\
    \ 0 开始（并递增到你拥有的屏幕数量）。这意味着你可以轻松地进行多屏幕实验：你只需要创建几个具有不同屏幕编号的窗口，然后在那些不同的屏幕上呈现视觉刺激！\n\
    \n同样值得注意的是，我们可以让创建窗口的代码行跨越多行。只要后续行有一定程度的**缩进**，这就可以正常工作。（与之前一样，一级缩进等于四个空格。本章后面会有关于缩进的更多内容！）按下你的\
    \ stimuli.py 文件上的运行按钮。你应该会非常短暂地看到一个灰色窗口出现然后消失——很神奇。\n\n我们在这里引入了一些术语：“包”、“模块”和“类”。你可以认为\
    \ Python 包具有层次结构。例如，“psychopy”是包；它位于层次结构的顶部。PsychoPy 包含用于执行不同任务的模块，例如用于绘制视觉内容的“visual”模块，用于任何与声音相关的内容的“sound”模块。可以使用点运算符访问这些模块，例如\
    \ psychopy.visual 或 psychopy.sound。或者，你可以直接导入这些模块，使用 `from psychopy import visual,\
    \ sound`。每个模块都有许多“类”。例如，`visual` 包含 Window、ShapeStim 和 Image 等内容。每个类都有自己的属性和方法。例如，一个\
    \ Image 对象具有属性 `pos`、`size` 和 `image`（用于该对象的位置、大小、图像文件）。它还将具有方法 `.setPos()`、`.setSize()`\
    \ 和 `.setImage()`。每个方法都允许你重置对象的属性。其中一些方法在我们想要动态更新对象属性时会派上用场。\n\n### 3.3.1 PsychoPy\
    \ 窗口中的单位和颜色\n\n你可能已经注意到，Window 类要求你指定单位。在本例中，我们将其设置为 'pix'，代表“像素”。这是一个直接的映射，因为像素是你的计算机和显示器熟悉的单位。然而，使用像素有一个警告，它可能导致不同显示器上的刺激具有不同的物理大小（像素的大小因显示器而异，取决于屏幕的分辨率）。\n\
    \n在选择刺激使用的单位时，问问自己这个问题：我需要我的刺激在不同显示器上具有相同的*物理大小*，还是相同的*相对大小*？通常，相同的相对大小就可以了（即，相同的图片可以呈现在宽屏游戏显示器或小型平板电脑上，并且会根据屏幕大小进行缩放）。然而，在一些心理物理学研究中，我们需要相同的物理大小。这通常是因为我们需要知道某个东西落在视网膜上的大小。\n\
    \n如果你需要在不同显示器上具有相同物理大小的刺激，可以使用的单位包括厘米和视角度数。然而，这些单位要求 PsychoPy 精确知道你的显示器上一厘米可以容纳多少像素，以及参与者距离显示器有多远。如果你使用的是\
    \ PsychoPy 代码视图，你可以使用监视器中心提供此信息。如果你使用的是其他开发环境（例如 Spyder），你可以通过导入 PsychoPy 的 monitors\
    \ 模块来设置自己的监视器，然后在窗口中指定该监视器，以便它可以使用厘米和视角度数等单位：\n\n```\nfrom psychopy import visual,\
    \ monitors\n\n# set up the monitor\nmon = monitors.Monitor('labMonitor', width=1280,\n\
    \    distance=57, gamma=None)\n\n# make a window to draw things in\nwin = visual.Window(size=[1024,\
    \ 768], fullscr=False,\n    units='pix', color=(0,0,0), colorSpace='rgb',\n  \
    \  screen=0, monitor=mon)\n```\n\n如果你的实验满足于在不同显示器上具有相同的刺激相对大小，PsychoPy 提供了高度或归一化单位：\n\
    \n- **高度单位**对应于你窗口的高度：1 个高度单位是从窗口底部到顶部的总距离，-0.5 是窗口的底边，0.5 是窗口的顶边。如果你想象一个与高度等宽的完美正方形，-0.5\
    \ 将是该正方形的左边缘，0.5 是该正方形的右边缘。\n- **归一化单位**范围在 -1 和 1 之间，表示相对距离。在分辨率为 1920 × 1080\
    \ 像素的显示器上，从 -1（显示器左边缘）到 0（显示器中心）的水平距离将对应 960 像素。在分辨率为 1024 × 768 的显示器上，相同的水平距离将对应\
    \ 512 像素。\n\n在本书中，你将始终使用像素。优点是这是计算机显示器上最传统和直接的距离单位。缺点是像素特定于你的显示器：一个大小为 200 像素的刺激在两个不同的显示器上将具有不同的厘米大小，因为像素大小在不同显示器之间不同。幸运的是，你可以测量显示器的宽度并计算每厘米的像素数。由此，你可以计算刺激的厘米大小，并最终计算其视角大小（使用参与者与显示器之间的距离）。\n\
    \nPsychoPy 的另一个重要方面是它使用不同的颜色空间，这决定了颜色的定义方式。通常，显示器使用红、绿、蓝的值来产生颜色，范围从 0 到 255。\n\
    \n在 PsychoPy 中，颜色也可以定义为红、绿、蓝的值。然而，这些值范围在 -1 和 1 之间。其背后的逻辑是，颜色可以表示为与灰色的偏差，灰色定义为\
    \ (0,0,0)。一些额外的例子：(-1, -1, -1) 是黑色，(1, 1, 1) 是白色，(1, -1, -1) 是红色。"
