    to exponentiating with a circumflex, ^, for example in spreadsheet editors (LibreOffice
    Calc or Microsoft Excel) or Matlab. In Python, the circumflex is used as a different
    operator (you will learn about it later on), so don’t use it for exponentiation!


    All right, now let’s check out division:


    ```

    5 / 3

    ```


    From version 3, Python automatically switches to floats if the answer to a division
    is a fraction. That’s why you’re getting 1.6666666666666667. In many circumstances,
    this is exactly what you want.


    In some circumstances, you might like to be more exact. Specifically, five divided
    by three is one, with a remainder of two. To get this result, you can use Python’s
    *integer division*:


    ```

    5 // 3

    ```


    When you use the double division operator, Python throws away the remainder. In
    this case, that leaves you with 1. To report the remainder, use the % operator:


    ```

    5 % 3

    ```


    So 5 // 3 = 1, and 5 % 3 = 2. But also 5 / 3 = 1.6666666666666667, which is a
    float. Let’s look at those next!


    # 2.1.2 Floats


    We want to calculate how much 5 / 3 is, but we would like the answer to be an
    approximation rather than an exact answer. For this, we can use floats:


    ```

    5.0 / 3.0

    ```'
