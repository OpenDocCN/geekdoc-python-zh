  md: '# # 5

    ## SCRIPTING AN EXPERIMENT


    In this chapter, you will be creating your very own experiment. Unlike the earlier
    examples, this will be a complete experiment that includes everything from displaying
    stimuli to logging data. We have already learned the building blocks required
    to create an experiment. We know how to generate and present stimuli, we’ve discussed
    the caveats of monitors and how to control stimulus presentation timing, we know
    how to gather keyboard and mouse responses and how to use stimuli and responses
    together to create dynamic effects (e.g. hover effects). These skills are all
    useful in making experiments. However, by design, experiments are more complex:
    we do not only need to know how to present stimuli and gather responses, but we
    must understand how to make stimulus parameters change trial-by-trial, how to
    control randomisation, how to store experimental data, and how to run through
    blocks and counterbalance blocks. These are skills that we will learn in this
    chapter.


    The vehicle for your learning trip will be a Posner-type, exogenous cueing task.
    This is a very influential paradigm that was originally conceived in 1980 by a
    Big Cheese in attention research, Michael I. Posner (Posner, 1980). Despite its
    age, variations of Posner’s cueing paradigm are still used in contemporary research
    (for an example, see Mathôt et al., 2014).


    The concept of exogenous cueing is relatively straightforward: a non-informative
    spatial cue attracts your covert attention. When a target appears on the location
    where your attention is attracted to (the cued side), you will be quicker and
    more precise with your response (relative to when a target appears on the non-cued
    side). This phenomenon is referred to as attentional facilitation. Curiously,
    this benefit is very short lived: the time between the onset of the cue and the
    onset of the target should be under about 500 milliseconds. If the interval between
    cue and target is longer, some people will show an increased reaction time and
    decreased precision when responding to a target on the cued side. This is referred
    to as inhibition of return.


    Other terminology associated with the Posner paradigm concerns the time between
    cue and target onsets. The difference between the two is called the stimulus onset
    asynchrony (SOA). Another important term concerns the correspondence between the


    DOI: 10.4324/9781003174332-7'
  merge: -1
  pgno: 94
- img_proc: true
  md: '![](img/07ad901823abb0ad885d2b362f9446b0_95_0.png)


    locations of the cue and the target. If both appear on the same location, the
    cue was valid: it correctly predicted the target. If the target appears on a different
    location than the cue, the cue was invalid. The rate at which the cue is valid
    is referred to as the validity. A 50% validity means that half of the cues accurately
    predict the target location and the other half do not.


    In experimental psychology, one would predict the results as follows: if the SOA
    is short (100 ms), there will be lower reaction times and higher precision for
    responses to a validly cued target (compared to an invalidly cued target). However,
    if the SOA is high (900 ms), there will be higher reaction times and lower precision
    for validly cued targets (compared to invalidly cued targets). In other words,
    we expect an interaction between SOA and trial validity: a valid cue results in
    a brief period of facilitated attention for the cued location, followed by a period
    of inhibition of return of attention to the cued location.


    # 5.1 Make a Single Trial


    To start with, let''s create a new .py file and call it experiment.py. It is a
    good idea when starting to create an experiment to start with a new folder, which
    will contain only the files required to run this experiment. Now, let''s think
    about the timing of this experiment. Each trial will consist of five different
    screens:


    | Screen | Timing | Description |

    |---|---|---|

    | Fixation | 1,500 ms | Gives participants time to prepare for the next trial
    |

    | cue | 50 ms | Attracts attention to either the left or the right |

    | Fixation | Depends on SOA | A neutral screen between cue and target |

    | Target | Until response | Displays a target for participants to respond to |

    | Feedback | 1,000 ms | Feedback to motivate the participant |'
