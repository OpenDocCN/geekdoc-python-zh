    \ None）。你可能会想，为什么需要为此创建一个自定义函数，而 Keyboard 类的 `get_key` 方法几乎做着完全相同的事情。这并没有编程上的理由，但这是一个很好的练习！\n\
    \n正如你可能从函数章节中记得的那样，函数定义总是以 `def` 开头，后跟函数名，然后是圆括号中的输入参数，最后以冒号结束。像这样：\n\n```python\n\
    # 定义一个获取用户输入的函数\ndef get_input(device):\n```\n\n构成函数的代码应该缩进，最好每行四个空格。它应该检查是否有按钮被按下，但使用一个较短的超时时间：\n\
    \n```python\n    # 等待按钮按下约 10 毫秒\n    key, presstime = device.get_key(timeout=10)\n\
    ```\n\n结果将是一个键名，或者 None。键名将是一个字符串，并且是数字键之一。在这个函数中，你希望输出是一个整数值。因此，你应该将键名（一个字符串）转换为数字。你可以通过使用\
