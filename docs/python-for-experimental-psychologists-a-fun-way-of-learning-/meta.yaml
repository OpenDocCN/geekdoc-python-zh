- md: "# PYTHON FOR EXPERIMENTAL PSYCHOLOGISTS\n\nA Fun Way of Learning How to Code\
    \ Your Experiments and Analyses\n\nSECOND EDITION\n\n![](img/07ad901823abb0ad885d2b362f9446b0_0_0.png)\n\
    \nEDWIN S. DALMAIJER\n\n> “Programming in Python is an invaluable skill for psychology\
    \ researchers, for both making experiments and analysing the resulting data”.\n\
    \n**Christopher R Madan**, *author of Memories That Matter: How We Remember Important\
    \ Things, Academia and the World Beyond book series on post-PhD careers, and An\
    \ Introduction to MATLAB for Behavioral Researchers*\n\n*Praise for previous edition*\n\
    \n> “An easy-to-read introduction. In a humorous style it introduces the reader\
    \ to programming in Python, picking them up where they are as experimental psychologists.\
    \ Very useful indeed!”\n\n**Ulrich von Hecker**, *Reader, Cardiff University,\
    \ UK*\n\n> “Edwin Dalmaijer provides an intuitive introduction into psychological\
    \ experimentation using Python libraries co-developed by the author himself. Well-structured\
    \ and easy to read, this book will quickly have you programming, running, and\
    \ analysing your own experiments using open, modern tools”.\n\n**Tomas Knapen**,\
    \ *Assistant Professor Cognitive Neuroscience, Vrije Universiteit Amsterdam, The\
    \ Netherlands*\n\n> “Python is fast becoming the *lingua franca* of scientific\
    \ research, and this excellent and highly accessible book fills a much-needed\
    \ gap for experimental psychologists. The strong focus on developing genuinely\
    \ useful experimental code, and the comprehensive examples included, make it an\
    \ outstandingly useful resource not just for students, but for seasoned researchers\
    \ as well. Certainly the best (and funniest!) introduction to Python I’ve come\
    \ across”.\n\n**Matt Wall**, *Imaging Scientist, Imperial College London, UK*\n\
    \n![](img/07ad901823abb0ad885d2b362f9446b0_2_0.png)\n\n# Taylor & Francis\n\n\
    Taylor & Francis Group\n\nhttp://taylorandfrancis.com\n\n# PYTHON FOR EXPERIMENTAL\
    \ PSYCHOLOGISTS\n\n*Python for Experimental Psychologists* equips researchers\
    \ who have no prior programming experience with the essential knowledge to independently\
    \ script experiments and analyses in the programming language Python. This book\
    \ offers an excellent introduction, whether you are an undergraduate, a PhD candidate,\
    \ or an established researcher.\n\nThis updated edition is on Python 3 (the most\
    \ current version). It starts by teaching the fundamentals of programming in Python\
    \ and then offers several chapters on scripting experiments (displaying stimuli,\
    \ obtaining and logging user input, precision timing, etc.) using the popular\
    \ PsychoPy package. The remainder of the book is dedicated to data analysis and\
    \ includes chapters on reading/writing to text files, time series, eye tracking,\
    \ data visualisation, and statistics.\n\nAccess to a companion website enriches\
    \ the learning experience with colour figures, example stimuli, datasets, scripts,\
    \ and a portable Windows installation of Python. This book assumes no prior knowledge,\
    \ and its informal and accessible tone helps readers with backgrounds in experimental\
    \ psychology and cognitive neuroscience to quickly understand Python. It serves\
    \ as a useful resource not only for researchers in these fields but also for lecturers\
    \ instructing on methodology and data analysis.\n\n*Python for Experimental Psychologists*\
    \ demystifies programming complexities and empowers researchers to proficiently\
    \ conduct experiments and analyse their results.\n\n**Dr Edwin S. Dalmaijer**\
    \ is a Lecturer (Assistant Professor) at the University of Bristol. He holds a\
    \ DPhil from the University of Oxford, was a postdoc at the University of Cambridge,\
    \ and has authored Python libraries, standalone software packages, teaching materials,\
    \ and research articles.\n\n![](img/07ad901823abb0ad885d2b362f9446b0_4_0.png)\n\
    \n# Taylor & Francis\n\nTaylor & Francis Group\n\nhttp://taylorandfrancis.com\n\
    \n# PYTHON FOR EXPERIMENTAL PSYCHOLOGISTS\n\nA Fun Way of Learning How to Code\
    \ Your Experiments and Analyses\n\nSecond Edition\n\nEdwin S. Dalmaijer\n\nWith\
    \ contributions from Rebecca J. Hirst and Jonathan W. Peirce\n\n![](img/07ad901823abb0ad885d2b362f9446b0_5_0.png)\n\
    \nRoutledge\nTaylor & Francis Group\nLONDON AND NEW YORK\n\nCover image: Getty\
    \ Images © Prateek Chaurasia\n\nSecond edition published 2025\nby Routledge\n\
    4 Park Square, Milton Park, Abingdon, Oxon OX14 4RN\nand by Routledge\n605 Third\
    \ Avenue, New York, NY 10158\n\n*Routledge is an imprint of the Taylor & Francis\
    \ Group, an informa business*\n\n© 2025 Edwin S. Dalmaijer\n\nWith contributions\
    \ from Rebecca J. Hirst and Jonathan W. Peirce\n\nThe right of Edwin S. Dalmaijer\
    \ to be identified as author of this work has been asserted in accordance with\
    \ sections 77 and 78 of the Copyright, Designs and Patents Act 1988.\n\nAll rights\
    \ reserved. No part of this book may be reprinted or reproduced or utilised in\
    \ any form or by any electronic, mechanical, or other means, now known or hereafter\
    \ invented, including photocopying and recording, or in any information storage\
    \ or retrieval system, without permission in writing from the publishers.\n\n\
    *Trademark notice*: Product or corporate names may be trademarks or registered\
    \ trademarks, and are used only for identification and explanation without intent\
    \ to infringe.\n\nFirst edition published 2017 by Routledge\n\n*British Library\
    \ Cataloguing-in-Publication Data*\nA catalogue record for this book is available\
    \ from the British Library\n\n*Library of Congress Cataloging-in-Publication Data*\n\
    Names: Dalmaijer, Edwin S., 1990- author.\nTitle: Python for experimental psychologists\
    \ : a fun way of learning how to code your experiments and analyses / Edwin S.\
    \ Dalmaijer.\nDescription: 2. | Abingdon, Oxon ; New York, NY : Routledge, 2025.\
    \ |\nIncludes bibliographical references and index.\nIdentifiers: LCCN 2024027209\
    \ | ISBN 9781032004808 (hardback) | ISBN 9781032000459 (paperback) | ISBN 9781003174332\
    \ (ebook)\nSubjects: LCSH: Psychology, Experimental—Data processing. | Psychology,\
    \ Experimental—Research—Computer programs. | Python (Computer program language)\n\
    Classification: LCC BF39.5 .D35 2025 | DDC 150.285/5133—dc23/eng/20240703\nLC\
    \ record available at https://lccn.loc.gov/2024027209\n\nISBN: 9781032004808 (hbk)\n\
    ISBN: 9781032000459 (pbk)\nISBN: 9781003174332 (ebk)\n\nDOI: 10.4324/9781003174332\n\
    \nTypeset in Galliard\nby codeMantra\n\nAccess the Instructor and Student Resources:\
    \ www.routledge.com/cw/dalmaijer\n\n# CONTENTS\n\n- About this book ... ix\n-\
    \ About Python ... xi\n- About the authors ... xiii\n\n1. Python ... 1\n2. Variable\
    \ Types ... 8\n   - Make Some Noise ... 32\n3. Creating and Presenting Stimuli\
    \ ... 35\n4. Processing Responses ... 60\n   - Make Some Noise ... 74\n5. Scripting\
    \ an Experiment ... 80\n   - Make Some Noise ... 102\n6. Analysing Behavioural\
    \ Data ... 110\n7. Analysing Traces ... 130\n8. Eye Tracking ... 142\n9. Common\
    \ Statistical Tests ... 163\n10. Getting Help ... 178\n11. Acknowledgements ...\
    \ 179\n12. References ... 181\n13. Index ... 183\n\n# ABOUT THIS BOOK\n\nThis\
    \ work is for researchers in Experimental Psychology and Cognitive Neuroscience,\
    \ who have no previous experience with Python or programming. It is suitable for\
    \ students and staff and aims to provide a basic working proficiency in Python.\
    \ After working your way through this book, you will have the knowledge and skills\
    \ required to code experiments and analyses.\n\nA major problem in Psychology\
    \ education is that students have very little exposure to programming, even though\
    \ most academic and industry jobs involve scripting experiments and data analyses.\
    \ As a consequence, people spend a lot of time on manual data processing: selecting,\
    \ sorting, and moving data from one spreadsheet to another. This is an unfortunate\
    \ waste of time! If you want to work in psychological science and adjacent fields,\
    \ but don't know how to code (yet), this book might just save a few years of your\
    \ life.\n\nThis book will teach you about installing Python, variables and functions,\
    \ displaying stimuli, making sounds, response collection, eye tracking, trial\
    \ structure, randomisation, loading files, combining data, doing statistics, computational\
    \ modelling, visualising data, creating publication-ready figures, and more!"
  mdcn: "# 面向实验心理学家的Python\n\n一种学习如何为你的实验和分析编写代码的趣味方式\n\n第二版\n\n![](img/07ad901823abb0ad885d2b362f9446b0_0_0.png)\n\
    \n埃德温·S·达尔迈杰\n\n> “对于心理学研究者而言，无论是进行实验还是分析所得数据，使用Python编程都是一项宝贵的技能”。\n\n**克里斯托弗·R·马丹**，*《重要的记忆：我们如何记住重要事物》、《学术界与博士后职业生涯》系列丛书，以及《面向行为研究者的MATLAB入门》的作者*\n\
    \n*对前一版的赞誉*\n\n> “一本易于阅读的入门书。它以幽默的风格向读者介绍Python编程，并从实验心理学家的现有水平出发进行引导。确实非常有用！”\n\
    \n**乌尔里希·冯·赫克**，*英国卡迪夫大学高级讲师*\n\n> “埃德温·达尔迈杰利用他本人参与开发的Python库，对心理学实验编程进行了直观的介绍。本书结构清晰、易于阅读，将很快让你能够使用开放、现代的工具来编程、运行和分析自己的实验。”\n\
    \n**托马斯·克纳彭**，*荷兰阿姆斯特丹自由大学认知神经科学助理教授*\n\n> “Python正迅速成为科学研究的*通用语言*，而这本优秀且高度易读的书填补了实验心理学家急需的空白。它对开发真正有用的实验代码的强烈关注，以及包含的全面示例，使其成为不仅对学生，而且对经验丰富的研究者都极为有用的资源。无疑是我所见过的最好（也最有趣！）的Python入门书。”\n\
    \n**马特·沃尔**，*英国伦敦帝国理工学院成像科学家*\n\n![](img/07ad901823abb0ad885d2b362f9446b0_2_0.png)\n\
    \n# 泰勒弗朗西斯集团\n\n泰勒弗朗西斯集团\n\nhttp://taylorandfrancis.com\n\n# 面向实验心理学家的Python\n\
    \n*《面向实验心理学家的Python》*为没有编程经验的研究者提供了必要的知识，使其能够独立使用Python语言编写实验和分析脚本。无论你是本科生、博士候选人还是资深研究者，本书都提供了一个极佳的入门。\n\
    \n这个更新版本基于Python 3（最新版本）。它首先教授Python编程的基础知识，然后用几章内容介绍如何使用流行的PsychoPy包编写实验脚本（显示刺激、获取和记录用户输入、精确计时等）。本书的其余部分专注于数据分析，包括读写文本文件、时间序列、眼动追踪、数据可视化和统计等章节。\n\
    \n配套网站提供了彩色图表、示例刺激、数据集、脚本和一个便携式Windows版Python安装包，丰富了学习体验。本书假定读者没有先验知识，其非正式且易于理解的语调有助于具有实验心理学和认知神经科学背景的读者快速理解Python。它不仅是这些领域研究者的有用资源，也是教授方法学和数据分析的讲师的宝贵参考。\n\
    \n*《面向实验心理学家的Python》*揭开了编程复杂性的神秘面纱，使研究者能够熟练地进行实验并分析其结果。\n\n**埃德温·S·达尔迈杰博士**是布里斯托尔大学的讲师（助理教授）。他拥有牛津大学的哲学博士学位，曾在剑桥大学从事博士后研究，并编写了Python库、独立软件包、教学材料和研究论文。\n\
    \n![](img/07ad901823abb0ad885d2b362f9446b0_4_0.png)\n\n# 泰勒弗朗西斯集团\n\n泰勒弗朗西斯集团\n\
    \nhttp://taylorandfrancis.com\n\n# 面向实验心理学家的Python\n\n一种学习如何为你的实验和分析编写代码的趣味方式\n\
    \n第二版\n\n埃德温·S·达尔迈杰\n\n丽贝卡·J·赫斯特和乔纳森·W·皮尔斯参与贡献\n\n![](img/07ad901823abb0ad885d2b362f9446b0_5_0.png)\n\
    \n劳特利奇\n泰勒弗朗西斯集团\n伦敦与纽约\n\n封面图片：Getty Images © Prateek Chaurasia\n\n第二版于2025年由劳特利奇出版\n\
    地址：4 Park Square, Milton Park, Abingdon, Oxon OX14 4RN\n以及\n地址：605 Third Avenue,\
    \ New York, NY 10158\n\n*劳特利奇是泰勒弗朗西斯集团旗下品牌，隶属于Informa公司*\n\n© 2025 埃德温·S·达尔迈杰\n\
    \n丽贝卡·J·赫斯特和乔纳森·W·皮尔斯参与贡献\n\n埃德温·S·达尔迈杰作为本书作者的权利已根据1988年《版权、设计和专利法》第77条和第78条予以确认。\n\
    \n保留所有权利。未经出版商书面许可，不得以任何形式或任何电子、机械或其他方式（无论是目前已知的还是未来发明的，包括影印和录制）或任何信息存储或检索系统，对本书的任何部分进行转载、复制或利用。\n\
    \n*商标声明*：产品或公司名称可能是商标或注册商标，仅用于识别和解释，无意侵权。\n\n第一版于2017年由劳特利奇出版\n\n*英国图书馆编目出版数据*\n\
    本书的编目记录可从英国图书馆获取\n\n*美国国会图书馆编目出版数据*\n名称：Dalmaijer, Edwin S., 1990- 作者。\n题名：面向实验心理学家的Python：一种学习如何为你的实验和分析编写代码的趣味方式\
    \ / 埃德温·S·达尔迈杰。\n版本说明：第2版。| Abingdon, Oxon ; New York, NY : 劳特利奇, 2025. |\n包含参考文献和索引。\n\
    标识符：LCCN 2024027209 | ISBN 9781032004808 (精装) | ISBN 9781032000459 (平装) | ISBN\
    \ 9781003174332 (电子书)\n主题：LCSH: 心理学, 实验—数据处理。| 心理学, 实验—研究—计算机程序。| Python (计算机程序语言)\n\
    分类：LCC BF39.5 .D35 2025 | DDC 150.285/5133—dc23/eng/20240703\nLC记录可在 https://lccn.loc.gov/2024027209\
    \ 获取\n\nISBN: 9781032004808 (精装)\nISBN: 9781032000459 (平装)\nISBN: 9781003174332\
    \ (电子书)\n\nDOI: 10.4324/9781003174332\n\n由codeMantra使用Galliard字体排版\n\n访问教师和学生资源：www.routledge.com/cw/dalmaijer\n\
    \n# 目录\n\n- 关于本书 ... ix\n- 关于Python ... xi\n- 关于作者 ... xiii\n\n1. Python ... 1\n\
    2. 变量类型 ... 8\n   - 制造一些噪音 ... 32\n3. 创建和呈现刺激 ... 35\n4. 处理反应 ... 60\n   - 制造一些噪音\
    \ ... 74\n5. 编写实验脚本 ... 80\n   - 制造一些噪音 ... 102\n6. 分析行为数据 ... 110\n7. 分析追踪数据\
    \ ... 130\n8. 眼动追踪 ... 142\n9. 常用统计检验 ... 163\n10. 获取帮助 ... 178\n11. 致谢 ... 179\n\
    12. 参考文献 ... 181\n13. 索引 ... 183\n\n# 关于本书\n\n本书适用于实验心理学和认知神经科学领域的研究者，他们此前没有使用Python或编程的经验。它适合学生和教职员工，旨在提供Python的基本工作能力。在通读本书后，你将掌握编写实验和分析代码所需的知识和技能。\n\
    \n心理学教育中的一个主要问题是学生很少接触编程，尽管大多数学术和行业工作都涉及编写实验和数据分析脚本。因此，人们花费大量时间进行手动数据处理：从一个电子表格中选择、排序和移动数据到另一个电子表格。这是对时间的不幸浪费！如果你想在心理科学及相关领域工作，但（还）不知道如何编程，这本书或许能为你节省几年的时间。\n\
    \n本书将教你安装Python、变量和函数、显示刺激、制作声音、反应收集、眼动追踪、试次结构、随机化、加载文件、合并数据、进行统计、计算建模、数据可视化、创建可发表的图表等等！"
