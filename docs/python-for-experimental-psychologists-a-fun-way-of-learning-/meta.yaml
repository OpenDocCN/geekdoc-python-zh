  md: "42 Creating and Presenting Stimuli\n\n```\n# pause the window\ncore.wait(2)\n\
    ```\n\n# 3.4.1 Understanding win.flip()\n\nwin.flip() is the most important command\
    \ to understand in your stimulus presentation script. Here's the thing: the timing\
    \ of visual stimulus presentation is *always* going to be constrained by the limits\
    \ of our monitor. Most monitors will have a set refresh rate of 60 Hz, which means\
    \ the screen can “refresh” itself once every 16.66 ms (ish). The win.flip() function\
    \ is the most important command for drawing visual stimuli, because it sets up\
    \ what will be presented on the next monitor refresh.\n\nYour computer operates\
    \ on a buffer system. When you call .draw(), it lines up a visual stimulus in\
    \ the back buffer, ready to be drawn. When you then call win.flip(), it brings\
    \ the stimulus to the front so that it can become visible on the monitor.\n\n\
    Drawn stimuli do not appear straight away when you call win.flip(). Instead, the\
    \ command waits until the next refresh of your screen to initiate. This impacts\
    \ the way in which we can present visual stimuli. First, we can only present visual\
    \ stimuli for intervals that fall in the limits of our refresh rate. On a 60-Hz\
    \ monitor, you can present something for 16.67 ms or 33.33 ms, but there is no\
    \ way to present something of 20 ms; this is just not possible. Another factor\
    \ to consider is that if your computer is under high processing demands, or if\
    \ we line up too much code to be executed between frames, it can cause your computer\
    \ to “drop” frames. This means that the interval between screen refreshes can\
    \ be longer than expected, which can cause your stimuli to either be presented\
    \ for longer than expected or to be presented at an offset.\n\nIt is important\
    \ to check the reliability of your system’s frame rate before running an experiment.\
    \ PsychoPy will try to do this for you, by measuring the time interval between\
    \ frame onsets. If this time exceeds what is expected (on the basis of your computer’s\
    \ refresh rate), PsychoPy will warn you in the Output window. If you’d like to\
    \ quickly test the reliability of your screens frame rate, you can look inside\
    \ the Demos drop-down menu in PsychoPy Coder and select timing > timebyframes.py.\
    \ (If it is your first time opening this section, you might need to “unpack” demos\
    \ first.) This will create you a figure like the one shown in Figure 3.2. In an\
    \ ideal world, you want no frames to be dropped (left panel) and a nice narrow\
    \ distribution around the expected interval, i.e. around 16.67 ms for 60 Hz monitors\
    \ (right panel).\n\nA handy feature of PsychoPy’s window is that it has an attribute\
    \ checkTiming, which by default is True. This means that your window is recording\
    \ the intervals between each frame refresh and checking them against the expected\
    \ refresh rate of your monitor (which is estimated by measuring the intervals\
    \ between a series of blank frames at the start of your experiment). If an interval\
    \ is substantially longer than expected, this indicates that frames might be dropping,\
    \ and you will see a warning about that in your Output window:\n\n```\n8.4776\t\
    \ WARNING\t Couldn't measure a consistent frame rate!\n   - Is your graphics card\
    \ set to sync to vertical blank?\n   - Are you running other processes on your\
    \ computer?\n\n9.7576\t WARNING\t t of last frame was 1280.40ms (=1/0)\n9.8314\t\
    \ WARNING\t t of last frame was 20.15ms (=1/49)\n9.9332\t WARNING\t t of last\
    \ frame was 21.09ms (=1/47)\n10.1900\t WARNING\t t of last frame was 27.58ms (=1/36)\n\
    ```"
