- md: "## 30 Variable Types\n\nwithin the function definition could be used to allow\
    \ you to specify how many times the function should print \"Hello World!\", like\
    \ so:\n\n```python\ndef hello_world(N):\n```\n\nwhere *N* is the amount of \"\
    Hello World!\". As you might remember from the chapter on *Strings*, you can multiply\
    \ a single string by an integer number to reproduce them. You can capitalise on\
    \ this in your new function:\n\n```python\n    print(N * 'Hello World! ')\n```\n\
    \nNow hit Enter twice and call the function!\n\n```python\nhello_world(5)\n```\n\
    \nYou can also try to test the limits of your computer:\n\n```python\nhello_world(10)\n\
    hello_world(100)\nhello_world(100000)\n```\n\n## 2.7.6 Create Your Third Function\n\
    \nAs a final exercise in function definition, let's create a function that not\
    \ only takes input but also produces output! This function will move beyond the\
    \ \"Hello World!\" examples from before and will actually do something useful:\
    \ check if a value is equal to 42.\n\nThe function will be named `is_this_the_answer`,\
    \ and the input argument will be named `number`. Type the following in the Interpreter\
    \ and hit Enter:\n\n```python\ndef is_this_the_answer(number):\n```\n\nNow, the\
    \ crucial part of the function is to check if the input is equal to 42. As you\
    \ might remember from the section on *Booleans*, you can use a double is-equal\
    \ sign to compare two variables. The result will be `True` if the variables are\
    \ equal or `False` when they are not.\n\n```python\n    result = number == 42\n\
    ```\n\n`result` is a Boolean that indicates whether `number` was equal to 42.\
    \ The only thing left to do is to return `result`.\n\n```python\n    return result\n\
    ```\n\nHit Enter twice and test your function:\n\n```python\nis_this_the_answer(7)\n\
    is_this_the_answer(3.50)\nis_this_the_answer(42)\nis_this_the_answer('kittens')\n\
    ```\n\nYou can also assign the returned value to a new variable:\n\n```python\n\
    result = is_this_the_answer(42)\nprint(result)\n```\n\nNote that you do not have\
    \ to use the same variable name that you used within the function. You can use\
    \ any variable name you want! So the following code is equally valid:\n\n```python\n\
    a = is_this_the_answer(42)\nprint(a)\n```\n\nPretty neat, huh?\n\n## MAKE SOME\
    \ NOISE\n\nAfter learning about all those variable types, it’s time to do something\
    \ cooler! In this random intermezzo, you will learn how to make visual noise.\n\
    \n## Random Numbers\n\nIn the previous chapters, you learned how to use NumPy\
    \ arrays. But there is more to NumPy than just array calculations! There is a\
    \ beautiful random module that allows you to generate random numbers:\n\n```python\n\
    import numpy\nnumpy.random.rand()\nnumpy.random.rand()\nnumpy.random.rand()\n\
    ```\n\nJust try it a few times, to make sure the numbers are actually random.\
    \ If you do recognise a pattern, you might actually be right. A computer’s random\
    \ numbers are produced by an algorithm that depends on a fixed number, a **seed**.\
    \ You can provide your own seed and see what happens:\n\n```python\nnumpy.random.seed(seed=14)\n\
    numpy.random.rand()\nnumpy.random.rand()\nnumpy.random.rand()\n```\n\nSeems to\
    \ do the same, right? Now provide the exact same seed and do it again:\n\n```python\n\
    numpy.random.seed(seed=14)\nnumpy.random.rand()\nnumpy.random.rand()\nnumpy.random.rand()\n\
    ```\n\nThe *exact* same “random” numbers came out! Why is this relevant? Because\
    \ it is important to realise that there is no such thing as truly random numbers\
    \ in a computer. They are **pseudo-random**. Whether this is a problem depends\
    \ on the circumstances. If you’re wanting to run a gambling website, having predictable\
    \ “random” numbers might not be wise.... But if you’re just using them to create\
    \ some visual static (like below), their pseudo-random is just fine.\n\n## Noise\n\
    \nVisual **noise** is the grey snow you see when an old television isn’t set to\
    \ a proper channel. It is the visual analogue of the feeling you have in your\
    \ arm after sleeping on it. The individual snowflakes range from completely white\
    \ to completely black. If we assign values to these colours, we could say white\
    \ corresponds to 1 and black to 0. All numbers between 0 and 1 correspond to some\
    \ shade of grey.\n\nUsing NumPy’s `rand` function, we can actually create a field\
    \ of random numbers. To do so, we only have to provide the width and height of\
    \ this field. Let’s try this with a field of 5-by-5 positions:\n\n```python\n\
    noise = numpy.random.rand(5, 5)\nprint(noise)\n```\n\nYou can check the dimensions\
    \ of a NumPy array by looking at its `shape` property:\n\n```python\nnoise.shape\n\
    ```\n\nOf course, grey noise is a little boring. Why not make it coloured? You\
    \ might know that computers encode colours with three values: their red component,\
    \ their green component, and their blue component. If we want to make a numerical\
    \ representation of coloured noise, we will need to create three random numbers\
    \ per pixel. (A pixel is one coloured unit on your screen: a combination of red,\
    \ green, and blue.)\n\nAlthough this may sound like a difficult problem, it’s\
    \ surprisingly easy to code. You can simply add another dimension in NumPy’s `rand`\
    \ function:\n\n```python\nrgb_noise = numpy.random.rand(5, 5, 3)\nprint(rgb_noise)\n\
    ```\n\nYour field of 5-by-5 random pixels now has a depth of 3. This depth represents\
    \ the red, green, and blue values of each pixel.\n\n## Matplotlib\n\nNow you know\
    \ how to make a numerical representation of visual noise, let’s turn it into an\
    \ image! To do this, we will use Matplotlib (Hunter, 2007). This is a library\
    \ that can do very advanced plotting. For now, we will only use its `pyplot` module.\
    \ This contains an `imshow` function, which can translate a field of numbers to\
    \ an image.\n\nTo create the visual noise, you can use the same approach as before,\
    \ but now with a bigger field. What about 500-by-500 pixels?\n\n```python\nimport\
    \ numpy\nfrom matplotlib import pyplot\n\nnoise = numpy.random.rand(500, 500,\
    \ 3)\npyplot.imshow(noise)\n\npyplot.show()\n```\n\nThe last function shows the\
    \ figure you made in an interactive window. If you want, you can save it to your\
    \ disk. Maybe show it to your grandmother.\n\n> “Look, granny, I can do programming!”\n\
    - “That’s nice, honey.”\n\n## 3 CREATING AND PRESENTING STIMULI\n\nIn this chapter,\
    \ you will learn how to create some basic stimuli (text, shapes, images) and how\
    \ to present these on a computer display. You’ll also learn how to manipulate\
    \ images using some external libraries and how to make stimuli “dynamic” (i.e.\
    \ moving and interactive). To do this, you will write scripts in which you will\
    \ use classes from a package known as PsychoPy (Peirce, 2007, 2009).\n\nPsychoPy\
    \ can do pretty much anything you could need in a psychological experiment. This\
    \ includes presenting stimuli on a monitor; producing sound; collecting responses\
    \ from keyboards, computer mice, joysticks, and controllers; communicating with\
    \ eye trackers; logging data; and accurately timing events. It is notable that\
    \ other packages do exist for similar purposes, such as PyGaze (Dalmaijer et al.,\
    \ 2014). Which package you choose is entirely up to you (or your teacher, if you’re\
    \ using this book in a course module). In this chapter, we’re going to focus on\
    \ PsychoPy, but the skills you learn here will help in extending your knowledge\
    \ enough to also try other packages!\n\nWithout delving too deep into software\
    \ architecture, it is worth noting that PsychoPy is built on top of a few other\
    \ external packages (dependencies). This means that it requires other packages\
    \ to do what it does. For this reason, we recommend installing standalone PsychoPy\
    \ to create your first experiment. This can be downloaded from https://www.psychopy.org/download.html\
    \ (see Chapter 1 for installation instructions).\n\nThis isn’t to say that you\
    \ can’t use PsychoPy in the other environments introduced earlier in this book.\
    \ For lots of reasons, many programmers prefer those environments rather than\
    \ PsychoPy’s inbuilt “Coder view” (introduced shortly). Alternative environments\
    \ offer lot more features and functionality compared to PsychoPy Coder, but they\
    \ also typically require that you install a number of dependencies and configure\
    \ your environment. Standalone PsychoPy comes pre-equipped with most packages\
    \ that you will need for a psychology experiment (including PyGaze!). This is\
    \ why we like using PsychoPy Coder for teaching: it saves *a lot* of time in setting\
    \ up in the classroom."
  mdcn: "## 30 变量类型\n\n在函数定义中，可以使用变量来指定函数应打印多少次“Hello World!”，如下所示：\n\n```python\n\
    def hello_world(N):\n```\n\n其中 *N* 是“Hello World!”的重复次数。正如你在*字符串*章节中可能记得的，你可以将一个字符串乘以一个整数来重复它。你可以在新函数中利用这一点：\n\
    \n```python\n    print(N * 'Hello World! ')\n```\n\n现在按两次回车并调用该函数！\n\n```python\n\
    hello_world(5)\n```\n\n你也可以尝试测试计算机的极限：\n\n```python\nhello_world(10)\nhello_world(100)\n\
    hello_world(100000)\n```\n\n## 2.7.6 创建你的第三个函数\n\n作为函数定义的最后一个练习，让我们创建一个不仅接受输入而且还能产生输出的函数！这个函数将超越之前的“Hello\
    \ World!”示例，并实际做一些有用的事情：检查一个值是否等于42。\n\n该函数将命名为 `is_this_the_answer`，输入参数将命名为\
    \ `number`。在解释器中输入以下内容并按回车：\n\n```python\ndef is_this_the_answer(number):\n```\n\
    \n现在，函数的关键部分是检查输入是否等于42。正如你在*布尔值*部分可能记得的，你可以使用双等号来比较两个变量。如果变量相等，结果将是 `True`，如果不相等，则是\
    \ `False`。\n\n```python\n    result = number == 42\n```\n\n`result` 是一个布尔值，表示\
    \ `number` 是否等于42。剩下的唯一事情就是返回 `result`。\n\n```python\n    return result\n```\n\
    \n按两次回车并测试你的函数：\n\n```python\nis_this_the_answer(7)\nis_this_the_answer(3.50)\n\
    is_this_the_answer(42)\nis_this_the_answer('kittens')\n```\n\n你也可以将返回值赋给一个新变量：\n\
    \n```python\nresult = is_this_the_answer(42)\nprint(result)\n```\n\n请注意，你不必使用函数内部使用的相同变量名。你可以使用任何你想要的变量名！因此，以下代码同样有效：\n\
    \n```python\na = is_this_the_answer(42)\nprint(a)\n```\n\n很巧妙，对吧？\n\n## 制造一些噪音\n\
    \n在学习了所有这些变量类型之后，是时候做些更酷的事情了！在这个随机的插曲中，你将学习如何制造视觉噪音。\n\n## 随机数\n\n在前面的章节中，你学习了如何使用\
    \ NumPy 数组。但 NumPy 的功能远不止数组计算！它有一个漂亮的随机模块，允许你生成随机数：\n\n```python\nimport numpy\n\
    numpy.random.rand()\nnumpy.random.rand()\nnumpy.random.rand()\n```\n\n只需尝试几次，以确保这些数字确实是随机的。如果你确实识别出某种模式，你可能是对的。计算机的随机数是由一个依赖于固定数字（即**种子**）的算法产生的。你可以提供自己的种子，看看会发生什么：\n\
    \n```python\nnumpy.random.seed(seed=14)\nnumpy.random.rand()\nnumpy.random.rand()\n\
    numpy.random.rand()\n```\n\n看起来做的是同样的事情，对吧？现在提供完全相同的种子并再次执行：\n\n```python\nnumpy.random.seed(seed=14)\n\
    numpy.random.rand()\nnumpy.random.rand()\nnumpy.random.rand()\n```\n\n*完全*相同的“随机”数字出现了！为什么这很重要？因为重要的是要认识到计算机中不存在真正的随机数。它们是**伪随机**的。这是否是一个问题取决于具体情况。如果你想运营一个赌博网站，可预测的“随机”数字可能并不明智……但如果你只是用它们来创建一些视觉静态效果（如下所示），它们的伪随机性就完全没问题了。\n\
    \n## 噪音\n\n视觉**噪音**是当老式电视机没有调到合适频道时你看到的灰色雪花。它是你手臂睡着后那种感觉的视觉类比。单个雪花从完全白色到完全黑色不等。如果我们为这些颜色分配数值，可以说白色对应1，黑色对应0。0到1之间的所有数字对应某种灰度。\n\
    \n使用 NumPy 的 `rand` 函数，我们实际上可以创建一个随机数场。为此，我们只需要提供这个场的宽度和高度。让我们用一个5x5位置的场来试试：\n\
    \n```python\nnoise = numpy.random.rand(5, 5)\nprint(noise)\n```\n\n你可以通过查看 NumPy\
    \ 数组的 `shape` 属性来检查其维度：\n\n```python\nnoise.shape\n```\n\n当然，灰色噪音有点无聊。为什么不把它变成彩色的呢？你可能知道计算机用三个值来编码颜色：红色分量、绿色分量和蓝色分量。如果我们想创建彩色噪音的数值表示，我们需要为每个像素创建三个随机数。（像素是你屏幕上的一个彩色单元：红色、绿色和蓝色的组合。）\n\
    \n虽然这听起来可能是一个难题，但编码起来却出奇地简单。你只需在 NumPy 的 `rand` 函数中添加另一个维度：\n\n```python\nrgb_noise\
    \ = numpy.random.rand(5, 5, 3)\nprint(rgb_noise)\n```\n\n你的5x5随机像素场现在深度为3。这个深度代表每个像素的红色、绿色和蓝色值。\n\
    \n## Matplotlib\n\n现在你知道如何创建视觉噪音的数值表示了，让我们把它变成一张图片！为此，我们将使用 Matplotlib (Hunter,\
    \ 2007)。这是一个可以进行非常高级绘图的库。目前，我们只使用它的 `pyplot` 模块。它包含一个 `imshow` 函数，可以将数字场转换为图像。\n\
    \n要创建视觉噪音，你可以使用与之前相同的方法，但现在使用更大的场。500x500像素怎么样？\n\n```python\nimport numpy\nfrom\
    \ matplotlib import pyplot\n\nnoise = numpy.random.rand(500, 500, 3)\npyplot.imshow(noise)\n\
    \npyplot.show()\n```\n\n最后一个函数在一个交互式窗口中显示你制作的图形。如果愿意，你可以将其保存到磁盘。也许可以展示给你的祖母看。\n\
    \n> “看，奶奶，我会编程了！”\n- “真不错，亲爱的。”\n\n## 3 创建和呈现刺激物\n\n在本章中，你将学习如何创建一些基本的刺激物（文本、形状、图像）以及如何在计算机显示器上呈现它们。你还将学习如何使用一些外部库来操作图像，以及如何使刺激物“动态化”（即移动和交互）。为此，你将编写脚本，其中使用一个名为\
    \ PsychoPy (Peirce, 2007, 2009) 的包中的类。\n\nPsychoPy 几乎可以完成你在心理学实验中可能需要的任何事情。这包括在显示器上呈现刺激物；产生声音；从键盘、计算机鼠标、操纵杆和控制器收集响应；与眼动仪通信；记录数据；以及精确计时事件。值得注意的是，确实存在其他用于类似目的的包，例如\
    \ PyGaze (Dalmaijer et al., 2014)。选择哪个包完全取决于你（或者你的老师，如果你在课程模块中使用本书）。在本章中，我们将重点介绍\
    \ PsychoPy，但你在这里学到的技能将帮助你扩展知识，从而也能尝试其他包！\n\n在不深入探讨软件架构的情况下，值得注意的是 PsychoPy 是建立在其他几个外部包（依赖项）之上的。这意味着它需要其他包来完成其工作。因此，我们建议安装独立的\
    \ PsychoPy 来创建你的第一个实验。可以从 https://www.psychopy.org/download.html 下载（安装说明见第1章）。\n\
    \n这并不是说你不能在本书前面介绍的其他环境中使用 PsychoPy。出于许多原因，许多程序员更喜欢那些环境，而不是 PsychoPy 内置的“编码器视图”（稍后介绍）。替代环境提供了比\
    \ PsychoPy 编码器更多的特性和功能，但它们通常也需要你安装许多依赖项并配置你的环境。独立的 PsycoPy 预装了大多数心理学实验所需的包（包括\
    \ PyGaze！）。这就是为什么我们喜欢使用 PsycoPy 编码器进行教学：它在课堂设置中节省了*大量*时间。"
