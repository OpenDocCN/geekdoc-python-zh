    \ create a new empty dict within the descr dict\n    descr[soa] = {}\n```\n\n\
    Now within the second for loop, after for val in ['valid', 'invalid'];, add code\
    \ to add yet another dict to descr (this time with keys for each validity condition):\n\
    \n```\n        # nest another empty dict within descr\n        descr[soa][val]\
    \ = {}\n```\n\nFinally, after calculating the values, you can now store them.\
    \ After line acc_m = numpy.mean(data['correct'][sel[soa] & sel[val]]);, add:\n\
    \n```\n            # store the calculated values in descr\n            descr[soa][val]['rt_m']\
    \ = rt_m\n            descr[soa][val]['rt_sd'] = rt_sd\n            descr[soa][val]['rt_sem']\
    \ = rt_sem\n            descr[soa][val]['acc_m'] = acc_m\n```\n\nRun your current\
