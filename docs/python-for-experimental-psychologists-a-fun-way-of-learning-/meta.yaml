    \        clear=False)\n```\n\n使用`getKeys()`而不是`waitKeys()`将捕获自事件缓冲区被清除以来发生的按键响应，但它不会在按键发生前暂停实验。现在，如果你只是尝试在现有脚本中将`waitKeys()`方法替换为`getKeys()`，你可能会收到一条错误消息（如果你按键不够快）：\n\
