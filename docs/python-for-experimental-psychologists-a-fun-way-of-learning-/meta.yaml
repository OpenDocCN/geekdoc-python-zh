    able to calculate their mean height and its variance.


    Because we’re lazy cost-effective, we rarely measure everyone in a population.
    Instead, we take a sample of individuals from a larger population. Even if we
    take a completely representative sample, it won’t always accurately reflect the
    population. For example, if I take the three friends from before, their mean height
    happened to accurately reflect that of Dutch women. However, this will not be
    true for any random sample of three out of that population. Imagine taking thousands
    of three-women samples and computing the mean height for each sample. These means
    would form their own distribution: the centre would be on the population mean,
    but there would also be substantial variance.


    Now imagine taking a sample of 3,000 women. This is a much larger sample than
    the three women from before, so intuitively you might already think that the mean
    height of this sample is closer to the mean height of the whole population. If
    you again take thousands of 3,000-women samples and again compute the mean height
    for each sample, they would again form a distribution. As before, the centre of
    this distribution of means would be on the population mean. However, this time
    the variance of the distribution of sample means would be smaller.


    It turns out that the variance of these sample means is directly related to the
    variance of the population and can be computed by dividing the population variance
    by the number of individuals in your sample. WOW! We can use this to estimate
    the **standard error of the mean**, which we compute as the standard deviation
    of a sample divided by the square root of the sample size.


    In sum, we can measure traits like the height of individuals in a population.
    There will be a mean height, which reflects the centre of a normal distribution.
    These will also be variance around this mean, which reflects how much individuals
