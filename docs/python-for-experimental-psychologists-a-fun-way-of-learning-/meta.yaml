  md: 'Now you need to set some parameters. These are the frame rate, which is the
    sampling rate (you defined that earlier), the number of channels (also defined
    earlier), and the sample width (set this to 2 and don’t think about it):


    ```

    # set parameters for the pure tone

    tonefile.setframerate(SAMPLERATE)

    tonefile.setnchannels(NCHANNELS)

    tonefile.setsampwidth(2)


    # set the same parameters for the noise

    noisefile.setframerate(SAMPLERATE)

    noisefile.setnchannels(NCHANNELS)

    noisefile.setsampwidth(2)

    ```


    Now that the wave files know what kind of sound they are getting, you can write
    the sound to them. However, they require the sound to be in a specific format.
    This format is a raw buffer, which is basically a string of bytes (this means
    nothing to humans, but computers can read it). You can get the buffer from `mixer.Sound`
    objects, by using their `get_buffer` method. This buffer contains a byte representation
    of itself in its raw property. You should write precisely that to the files:


    ```

    # get buffers

    tonebuffer = tone.get_raw()

    noisebuffer = whitenoise.get_raw()

    # write raw buffer to the wave file

    tonefile.writeframesraw(tonebuffer)

    noisefile.writeframesraw(noisebuffer)

    ```


    The only thing that’s left to do now is neatly close the two wave file objects,
    by using their `close` method.


    ```

    # neatly close the wave file objects

    tonefile.close()

    noisefile.close()

    ```


    If you run your script, you should now see two new files in the same folder that
    contains your script file (`make_sound.py`). They should be named ‘pure_tone.wav’
    and ‘noise.wav’, and you should be able to play them with a media player.


    This is still a relatively simple script, but it can be a good start for you to
    create more funky sounds. By simply changing `SOUNDFREQ`, you can already change
    the frequency of the pure tone. Try to think of some more ways to mess with it!
    (For jokes, change `numpy.sin` into `numpy.tan` and enjoy.)'
