    # 10 Variable Types


    Boom! 5.0 / 3.0 = 1.6666666666666667. A cool thing about floats is that they are
    contagious. If you use only one in your calculation, the answer will automatically
    be a float. Example:


    ```

    5 / 3.0

    ```


    One thing to note about floats is that they are imprecise. For example, consider
    the sum (5/3)*2. Think about what the outcome should be and then run the code:


    ```

    (5.0 / 3.0) * 2.0

    ```


    Note that the answer is 3.3333333333333335 (note the 5 in the end). Maybe this
    doesn''t rouse your suspicion, because it could be that things are rounded in
    between: 5.0 / 3.0 is 1.6666666666666667 and then 1.6666666666666667 * 2 = 3.3333333333333335.
    Now consider that the above is the same as 10/3. So an equivalent is


    ```

    10.0 / 3.0

    ```


    This still results in 3.3333333333333335! If you''re not a computer, you probably
    expected the outcome to be 3.3333333333333333. This discrepancy comes from the
    fact that floats are only *approximations* of numbers. Storing numbers with a
    high precision puts a high demand on a computer''s memory. Hence, people have
    developed clever compromises that store numbers with decent (but not exact!) precision,
    without requiring too much memory. As a consequence, floats are not always the
    exact number you think they ought to be.


    Now that you understand what a float is, you can use them in exponentiation. Why
    is that useful? Consider the following:


    ```

    3.0 ** 2

    9 ** 0.5

    ```


    Did that blow your mind? The square root of a number can be written in exponent
    notation! This is SO exciting!


    Remember the Pythagorean theorem? In a right-angle triangle, the square of the
    hypotenuse (side opposite the right angle) is equal to the summed squares of the
    other two sides. You can write this as $a^2 + b^2 = c^2$. The square root of $c^2$
    will give you the length of the hypotenuse, so you can write $c = \sqrt{(a^2 +
    b^2)}$. Let''s say $a = 3.0$ and $b = 4.0$ and try this in Python:


    ```

    (3.0**2 + 4.0**2) ** 0.5

    ```'
  - '[PAGE 25]


    names can contain letters (upper and lower case), some characters (such as underscores),
    and numbers; but they must always start with a letter. For example, you can make
    a variable with name **test** to refer to the number 5, like so


    ```

    test = 5

    ```


    You can now use this variable to do all sorts of freaky stuff. You could, for
    example, use it in calculations:


    ```

    test - 3

    test + 5

    test + test

    ```


    As you can see, using it in calculations does not actually change the variable.
    If you would want to reassign it a different value, simply overwrite it:


    ```

    test = 4

    ```


    If you want to know the current value of a variable, simply type its name in the
    interpreter and press Enter.


    ```

    test

    ```


    You can also change variables by referencing themselves:


    ```

    a = 2

    a = a + 1

    ```


    You can even create new variables based on the values of others!


    ```

    a = 2

    b = 3

    c = a + b

    ```


    You can make it even more confusing and define one variable by using another:


    ```

    a = 2

    b = a

    ```


    Be wary that both variables (a and b) now could point to the very same data (2).
    This may seem like an unimportant side note now, but it will prove to be important
    when you learn about lists.


    # 2.3 Booleans


    Booleans are named after the logician George Bool, who approached logic as though
    it was a type of algebra. He formalised the logical operations that we now know
    as AND, OR, and NOT. Logic operations can produce one of two results: True or
    False, which can also be denoted as 1 and 0.'
- md: '## 12 Variable Types


    These operations are built into practically all electronic circuits and are an
    essential part of programming. It is imperative that you learn how to implement
    them and that you sacrifice a goat to George Bool to honour his legacy. (*Note:
    don''t actually sacrifice a goat. Goats are amazing animals and should be left
    alive. If you feel like sacrificing something, please sacrifice some lettuce to
    a goat. In Bool''s honour, of course.*)


    Before you go on to start your own lettuce-sacrificing Bool fan club, you should
    probably find out how Booleans work. Type the following into an interpreter:


    ```

    a = 1

    b = 1

    a == b

    ```


    The result should be True, indicating that the variables point to equal values.
    Note that while "=" means "assign this value to this variable name", "==" means
    "equals". This is different from what you are used to, because normally "=" means
    "equals" and "==" does not mean anything. It is important to remember this difference,
    because you will at some point write "a = b" where you intended to write "a ==
    b" and that mistake will likely crash your script. (This is not a dunk on you;
    experienced programmers do this *all the time*.) Let''s move on:


    ```

    a = 1

    b = 2

    a == b

    ```


    The result is now False. We could also ask Python whether a "does not equal" b:


    ```

    a != b

    ```


    This is True, because a and b do not point to equal values. You can also directly
    use True or False in your code:


    ```

    a = True

    b = False

    c = True

    ```


    This allows you to use logic operators, such as AND (&) and OR (|):


    ```

    a & b

    a | b

    ```


    The first tests whether both variables are True and returns True if they are.
    The second tests if either variable is True and returns True if one or both are.
    There is another operator, the exclusive or (XOR, ^), which tests whether two
    Booleans are the same and returns True only if they are different:


    ```

    a = True

    b = False

    c = True

    ```


    ```

    a ^ b

    a ^ c

    ```


    The XOR operation is True for the first test (a ^ b), but not for the second (a
    ^ c). Contrast this with the OR, which is True in both cases:


    ```

    a | b

    a | c

    ```


    Note that Booleans can be used with normal mathematical operators, but then the
    values True and False will be interpreted as 1 and 0.


    ```

    True + True

    True - True

    True + False

    3 * True

    ```


    In most contexts, these operations do not make a lot of sense: Multiplying True
    by three does not make it any more True.


    Another cool thing about Python is that you can use English words to do the same
    things as the symbolic operators. You can check if variables are equal:


    ```

    a = 1

    b = 2


    a is b

    a is not b

    ```


    You can also use written logical operators:


    ```

    a = True

    b = False


    a and b

    a or b

    not a

    ```


    ## 2.4 Letters


    Some situations call for using text, for example when you want to present instructions
    to participants. In Python, a text is referred to as a **string**. These are defined
    by using either single or double quotation marks. Python also provides a number
    of built-in functions to easily manipulate strings, as you will soon see!


    ### 2.4.1 Strings


    Time to define your first string. Type the following into an interpreter:


    ```

    a = "Hello World!"

    b = ''Hello World!''

    ```


    Although you have used two different kinds of quotation marks, the resulting strings
    are identical:


    ```

    a == b

    ```


    The advantage of being able to use more than one type of quotation mark is that
    you can use the other within the string:


    ```

    a = "Programming is ''fun''..."

    ```


    There are more characters that you can use within strings. Some of these are useful
    for formatting:


    ```

    a = "I love newlines.\nI wish I could marry one.\n\nSwoon..."

    b = "TABS\tARE\tAWESOME\t!"

    ```


    When rendered, \n produces a return (or a “newline”), and \t a tab (a bit of whitespace).
    You can use mathematical operators to combine strings:


    ```

    a = "spo"

    b = "on"

    a + b

    ```


    Or to multiply them:


    ```

    a = "lala"

    10 * a

    ```


    But not to subtract or divide them, because that would not make any sense.


    ### 2.4.2 String Functions


    Functions have not been explained yet, but you will get to know them quite intimately
    later on. A function is a collection of code that will make your computer do something
    specific. Some functions are standalone things; you can *call* them at any time
    without having to do anything more than typing their name. One such function is
    `print`, which will simply show a value in the interpreter:


    ```

    print("Hello world!")

    ```


    This may not look very useful to you now, but you will learn to appreciate it.
    Some functions are not independent, like `print`, but are associated with a certain
    type of variable. Strings, for example, have a few of these built-in functions.
    Programmers sometimes refer to these built-ins as *methods*. A few examples:


    ```

    a = "I love farts!"

    b = "get away from me, stinky person."

    ```


    ```

    a.lower()

    a.upper()

    b.capitalize()

    ```


    The lower method will make all letters in a string lowercase, whereas the upper
    method will make them all uppercase. This is great if you want to emphasise things,
    or if you''re trying to talk to someone who doesn''t speak the same language.
    The capitalize method will make only the first character uppercase.


    Some other funky string stuff:


    ```

    a = "test"

    a.center(10)

    a.count("t")

    a.replace("s", "x")

    ```


    As you could see, the center method adds spaces to the front and back of your
    string to centre the original string, and the number (10) indicates the resulting
    string''s intended length. The count method counts the number of occurrences of
    "t", or anything else you would like to count. The replace method can be used
    to replace one part of the string by another. This is very useful if you want
    to convert files and need to change file names:


    ```

    a = "example.jpg"

    b = a.replace(".jpg", ".png")

    print(b)

    ```


    ### 2.4.3 String Formatting


    One thing you might have tried is combining a string with a number:


    ```

    a = "I''m number "

    b = 1

    a + b

    ```


    You will have faced a TypeError, because you can''t combine strings and integers
    in this way. There are other ways to make this work, though. You could use the
    str function, to turn your number into a string:


    ```

    a + str(b)

    ```


    This works but will turn into a hassle once things get complicated:


    ```

    a = "Every "

    b = " days, I brush my "

    c = ". I like this."


    a + str(30) + b + "finger nails" + c

    ```


    A better alternative is to use string formatting. This allows you to put placeholders
    in your strings that can later be filled with values. To replace the previous
    example:


    ```

    a = "Every {} days, I brush my {}. I like this."

    print(a)

    ```


    You can recognise the placeholders by the curly brackets, {}. Let''s try filling
    them out:


    ```

    a.format(30, "finger nails")

    ```


    The `format` function after the string allows you to replace the string''s curly
    brackets with actual values. The values are provided between round brackets.


    Using curly brackets allows you to pass any type of variable to the `format` function,
    and it will be added to the string in a default way. You can exert a bit more
    control over this, by specifying what type of variable you want to incorporate
    into your string. For example, you can force only integers to be allowed by using
    the {:d} notation:


    ```

    "The number is {:d}".format(2)

    ```


    Note that this will not work with other variable types, not even floats:


    ```

    "The number is {:d}".format("two")

    "The number is {:d}".format(2.0)

    ```


    You can use similar tricks to format fractions in strings. For example, you might
    want to present a percentage with one or two decimals. You can do this using {:.1f}
    or {:.2f}, respectively:


    ```

    "The percentage is {:.1f}%".format(10.126)

    "The percentage is {:.2f}%".format(10.126)

    ```


    A typical use case for this is using print to send yourself messages while an
    analysis is running. For example, you might want to report when a new data file
    is loaded or what the number of lines in that file is.


    ## 2.5 Sets


    Up until now, you have only seen single values (although strings can be seen as
    a collection of individual characters). Sometimes it can be useful to combine
    values together in a single set.


    Think about a reaction-time experiment: a researcher collects one response time
    in every trial. If you want to calculate the median response time, it would be
    useful to collect all individual response times in a single variable, rather than
    having one separate variable for each individual response time. This allows for
    easier access and calculations.


    Now imagine the researcher was also using an eye tracker. This device can measure
    pupil size. It will produce lots of data; sometimes over 1,000 data points per
    second! If you want'
  mdcn: '## 12 变量类型


    这些操作几乎内置于所有电子电路中，是编程不可或缺的一部分。你必须学会如何实现它们，并且要向乔治·布尔献祭一只山羊以纪念他的遗产。（*注：别真去献祭山羊。山羊是了不起的动物，应该让它们活着。如果你真想献祭点什么，那就请给山羊献上一些生菜吧。当然是为了纪念布尔。*）


    在你开始组建自己的布尔生菜献祭爱好者俱乐部之前，你可能应该先了解一下布尔值的工作原理。在解释器中输入以下内容：


    ```

    a = 1

    b = 1

    a == b

    ```


    结果应该是 True，表明这两个变量指向相等的值。注意，虽然 "=" 表示“将此值赋给此变量名”，但 "==" 表示“等于”。这与你习惯的用法不同，因为通常
    "=" 表示“等于”，而 "==" 没有任何意义。记住这个区别很重要，因为你总有一天会写 "a = b"，而你本意是写 "a == b"，这个错误很可能会导致你的脚本崩溃。（这不是在贬低你；经验丰富的程序员也*一直*会犯这种错。）让我们继续：


    ```

    a = 1

    b = 2

    a == b

    ```


    现在结果是 False。我们也可以问 Python a 是否“不等于” b：


    ```

    a != b

    ```


    这是 True，因为 a 和 b 指向不相等的值。你也可以在代码中直接使用 True 或 False：


    ```

    a = True

    b = False

    c = True

    ```


    这允许你使用逻辑运算符，例如 AND (&) 和 OR (|)：


    ```

    a & b

    a | b

    ```


    第一个测试两个变量是否都为 True，如果都是则返回 True。第二个测试任一变量是否为 True，如果其中一个或两个都是则返回 True。还有另一个运算符，异或（XOR,
    ^），它测试两个布尔值是否相同，仅当它们不同时才返回 True：


    ```

    a = True

    b = False

    c = True

    ```


    ```

    a ^ b

    a ^ c

    ```


    异或操作在第一次测试（a ^ b）中为 True，但在第二次（a ^ c）中不是。与之对比，或运算在两种情况下都为 True：


    ```

    a | b

    a | c

    ```


    注意，布尔值可以与普通的数学运算符一起使用，但此时 True 和 False 的值将被解释为 1 和 0。


    ```

    True + True

    True - True

    True + False

    3 * True

    ```


    在大多数情况下，这些操作没有太大意义：将 True 乘以三并不会让它变得更 True。


    Python 的另一个酷炫之处在于，你可以使用英文单词来完成与符号运算符相同的事情。你可以检查变量是否相等：


    ```

    a = 1

    b = 2


    a is b

    a is not b

    ```


    你也可以使用文字逻辑运算符：


    ```

    a = True

    b = False


    a and b

    a or b

    not a

    ```


    ## 2.4 字母


    有些情况需要使用文本，例如当你想向参与者展示说明时。在 Python 中，文本被称为**字符串**。它们通过使用单引号或双引号来定义。Python 还提供了许多内置函数来轻松操作字符串，你很快就会看到！


    ### 2.4.1 字符串


    是时候定义你的第一个字符串了。在解释器中输入以下内容：


    ```

    a = "Hello World!"

    b = ''Hello World!''

    ```


    尽管你使用了两种不同类型的引号，但生成的字符串是相同的：


    ```

    a == b

    ```


    能够使用多种类型引号的优点是，你可以在字符串内部使用另一种引号：


    ```

    a = "Programming is ''fun''..."

    ```


    还有更多字符可以在字符串中使用。其中一些对格式化很有用：


    ```

    a = "I love newlines.\nI wish I could marry one.\n\nSwoon..."

    b = "TABS\tARE\tAWESOME\t!"

    ```


    渲染时，\n 会产生一个回车（或“换行”），\t 产生一个制表符（一些空白）。你可以使用数学运算符来组合字符串：


    ```

    a = "spo"

    b = "on"

    a + b

    ```


    或者将它们相乘：


    ```

    a = "lala"

    10 * a

    ```


    但不能相减或相除，因为那没有任何意义。


    ### 2.4.2 字符串函数


    函数还没有解释，但你稍后会非常熟悉它们。函数是一段代码集合，它会让你的计算机执行特定的操作。有些函数是独立的；你可以在任何时候*调用*它们，除了输入它们的名字外不需要做任何其他事情。这样一个函数是
    `print`，它会简单地在解释器中显示一个值：


    ```

    print("Hello world!")

    ```


    这现在对你来说可能看起来没什么用，但你会学会欣赏它。有些函数不是独立的，比如 `print`，而是与某种特定类型的变量相关联。例如，字符串就有几个这样的内置函数。程序员有时将这些内置函数称为*方法*。几个例子：


    ```

    a = "I love farts!"

    b = "get away from me, stinky person."

    ```


    ```

    a.lower()

    a.upper()

    b.capitalize()

    ```


    lower 方法会将字符串中的所有字母转换为小写，而 upper 方法会将它们全部转换为大写。如果你想强调某些内容，或者你试图与一个不说同一种语言的人交谈，这非常有用。capitalize
    方法只会将第一个字符大写。


    其他一些有趣的字符串操作：


    ```

    a = "test"

    a.center(10)

    a.count("t")

    a.replace("s", "x")

    ```


    正如你所看到的，center 方法在字符串的前后添加空格以使原始字符串居中，数字（10）表示结果字符串的预期长度。count 方法计算 "t" 的出现次数，或者你想计算的任何其他内容。replace
    方法可用于将字符串的一部分替换为另一部分。如果你想转换文件并需要更改文件名，这非常有用：


    ```

    a = "example.jpg"

    b = a.replace(".jpg", ".png")

    print(b)

    ```


    ### 2.4.3 字符串格式化


    你可能尝试过的一件事是将字符串与数字组合：


    ```

    a = "I''m number "

    b = 1

    a + b

    ```


    你会遇到 TypeError，因为你不能以这种方式组合字符串和整数。不过，有其他方法可以实现这一点。你可以使用 str 函数，将你的数字转换为字符串：


    ```

    a + str(b)

    ```


    这可行，但一旦事情变得复杂，就会变成一件麻烦事：


    ```

    a = "Every "

    b = " days, I brush my "

    c = ". I like this."


    a + str(30) + b + "finger nails" + c

    ```


    一个更好的替代方法是使用字符串格式化。这允许你在字符串中放置占位符，这些占位符稍后可以用值填充。为了替换前面的例子：


    ```

    a = "Every {} days, I brush my {}. I like this."

    print(a)

    ```


    你可以通过花括号 {} 来识别占位符。让我们尝试填充它们：


    ```

    a.format(30, "finger nails")

    ```


    字符串后面的 `format` 函数允许你将字符串的花括号替换为实际的值。值在圆括号之间提供。


    使用花括号允许你将任何类型的变量传递给 `format` 函数，它将以默认方式添加到字符串中。你可以通过指定你想要合并到字符串中的变量类型来对此施加更多控制。例如，你可以使用
    {:d} 表示法强制只允许整数：


    ```

    "The number is {:d}".format(2)

    ```


    注意，这不适用于其他变量类型，甚至不适用于浮点数：


    ```

    "The number is {:d}".format("two")

    "The number is {:d}".format(2.0)

    ```


    你可以使用类似的技巧在字符串中格式化分数。例如，你可能想显示一个带有一位或两位小数的百分比。你可以分别使用 {:.1f} 或 {:.2f} 来实现：


    ```

    "The percentage is {:.1f}%".format(10.126)

    "The percentage is {:.2f}%".format(10.126)

    ```


    一个典型的用例是在分析运行时使用 print 向自己发送消息。例如，你可能想报告何时加载了新的数据文件，或者该文件中的行数是多少。


    ## 2.5 集合


    到目前为止，你只看到了单个值（尽管字符串可以看作是单个字符的集合）。有时将值组合成一个集合会很有用。


    考虑一个反应时间实验：研究人员在每次试验中收集一个反应时间。如果你想计算中位数反应时间，将所有单独的反应时间收集在一个变量中会很有用，而不是为每个单独的反应时间设置一个单独的变量。这使得访问和计算更容易。


    现在想象一下研究人员还在使用眼动仪。这种设备可以测量瞳孔大小。它会产生大量数据；有时每秒超过 1000 个数据点！如果你想'
