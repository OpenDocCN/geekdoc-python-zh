    feedback = visual.TextBox2(\n    win,\n    text='',\n    pos=(0, 0),\n    letterHeight=20,\n\
    \    alignment='center',\n    color = 'white'\n)\n```\n\nThen after your key response,\
    \ add:\n\n```\n# score accuracy\nif keys[0].name == trial['corr_ans']:\n    correct\
    \ = 1\n    feedback.setText('Correct!')\n    feedback.setColor('green')\nelse:\n\
    \    correct = 0\n    feedback.setText('Incorrect')\n    feedback.setColor('red')\n\
    \n# show the feedback\nfor frameN in range(feedbackFrames):\n    feedback.setAutoDraw(True)\n\
    \    win.flip()\nfeedback.setAutoDraw(False)\n```\n\nNote that you will also want\
    \ to make sure to add feedbackTime to your expInfo dictionary and apply your secs2frames()\
    \ function to set feedbackFrames.\n\n## 5.6 Block Designs and Counterbalancing\n\
    \nIn many experiments, we might want to present several blocks of trials. For\
