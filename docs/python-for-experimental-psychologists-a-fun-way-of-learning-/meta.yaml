    \ & sel[val]])\nrt_sd = numpy.std(data['RT'][sel[soa] & sel[val]])\nrt_sem = rt_sd\
    \ / numpy.sqrt(len(data['RT'][sel[soa] & sel[val]]))\nacc_m = numpy.mean(data['correct'][sel[soa]\
    \ & sel[val]])\n# 报告统计量\nprint('condition %d ms SOA, %s:' % (soa, val))\nprint('median\
    \ RT=%.2f, SD=%.2f, SEM=%.2f' % (rt_m, rt_sd, rt_sem))\nprint('proportion correct=%.2f\\\
    n' % (acc_m))\n```"
