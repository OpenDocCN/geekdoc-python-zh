    deviations mean lots of variance, whereas low standard deviation means individuals
    are relatively similar. Means and standard deviations are properties of the population.

    Instead of measuring the whole population, we can take samples of individuals
    from a population. These samples are imperfect, but their means should converge
    on the population mean. The larger samples get, the closer they are likely to
    be to the population mean. This is quantified by the standard error of the mean,
    which is computed by dividing a sample’s standard deviation by the square root
    of the sample’s size (i.e. the number of individuals in that sample). The standard
    error of the mean is a property of the sampling process.


    # 9.1.2 When Is Something Surprising?


    Now that we know the terminology, we should take a step back and think about some
    of the big questions. For example, if Taylor Swift were to move to the Netherlands,
    would she stand out in a crowd of her peers? According to a quick search on the
    internet, Swift is 180 cm tall. (According to personal observations at concerts,
    she looked about 3 cm tall, but this might have been affected by viewing distance.
    They were fantastic concerts regardless!) According to the CBS, women born in
    the Netherlands in 1989 are 169.8 cm tall on average. This means Swift is 10.2
    cm taller than the average Dutch woman. Does this mean she would stand out?

    Intuitively, you would probably answer “Well, that depends…” because you might
    feel that while Swift is taller than the average, we don’t quite know the spread
    around this average. Let’s assume the standard deviation is 13 centimetres (because
    we’re talking about Taylor Swift, but also because that’s the actual number).
    This means Swift falls within a single standard deviation from the mean. More
    precisely, assuming a normal distribution, 22% of Dutch women born in 1989 would
    be taller than her. This means Swift is tall but also that every fourth or fifth
    Dutch woman would be taller, and hence she wouldn’t quite stand out in a crowd.

    Now forget about the potential move and compare Swift to her country of origin.
    According to a publication by the National Centre for Health Statistics in the
    United States, the mean height of women aged 20–29 in the years 2015–2018 was
    162.6 cm with a standard deviation of about 10 cm (Fryar et al., 2021). Again
    assuming a normal distribution, this would mean Swift was among the tallest 4%
    of women in her age bracket! Hence, she would likely stand out in a crowd of her
    peers.

    We can rephrase the above to sound more stats-y: “Under the assumption that women
    in the USA have a mean height of 162.6 cm with a standard deviation of 10 cm,
    the probability of observing someone with height 180 cm or taller is 4%.” This
    is not too far away from a **p-value**, which will be introduced shortly.

    Whether finding someone as tall as Taylor Swift is surprising depends on your
    interpretation of 4%. Perhaps you wouldn’t find this practically significant:
    you might see hundreds of people when walking through busy streets and thus plenty
    of tall women among them. (Similarly, people do hundreds of studies, some are
    bound to show larger effects.) More generally, a 4% chance of winning the lottery
    would feel like a lot, whereas a 4% chance of improvement after surgery would
    likely feel underwhelming. (Similarly, the level of evidence from studies should
    be high if important policy will be decided on it.)'
- md: "## 9.2 T-tests\n\nSome of the most basic questions in science are about differences:\
    \ “I can hold my breath for a few minutes; is that better than others?”, “Are\
    \ the brains of cats smaller than those of dogs?”, or “I’ve recently started on\
    \ a new drug; are my poops bigger now?”. These questions often come down to the\
    \ more generic questions of: “Is my measurement different from what I expected?”\
    \ and “Is group A different from group B?”\n\nOne way to address the above questions\
    \ is by using t-tests. These formalise what a difference is and when we consider\
    \ it “statistically significant”. There are different flavours of t-tests, each\
    \ with their own specific purpose. What is common among all of them is computing\
    \ a t-value and comparing this t-value to a t-distribution. If a t-value is very\
    \ extreme, we could consider it “significant”.\n\nA t-distribution looks a lot\
    \ like a normal distribution, but it comes with an exciting addition: **degrees\
    \ of freedom**. Under infinite degrees of freedom, the t-distribution tends towards\
    \ the standard normal distribution (with a mean of 0, and a standard deviation\
    \ of 1). However, as the degrees of freedom decrease, the tails of a t-distribution\
    \ come up. This means more extreme values are more probable under fewer degrees\
    \ of freedom.\n\nI hear you thinking: what are degrees of freedom? Let’s say you’re\
    \ estimating the variance of a sample like we did a little while ago. You used\
    \ a number of independent observations to do so, for example the heights of individuals\
    \ in your sample. You also used another parameter to compute the variance, namely\
    \ the average height. The degrees of freedom for the variance are the number of\
    \ observations minus the one parameter you used to compute it. In other words,\
    \ the degrees of freedom for a parameter estimate are n – k, i.e. the sample size\
    \ minus the number of parameters used to compute the parameter. For t-tests, this\
    \ will be n – 1.\n\n### 9.2.1 What Is a p-Value?\n\nUsing the t-distribution and\
    \ a computed t-value, you can compute a **p-value**. This value reflects the probability\
    \ of finding your observed t-value or a more extreme one, *assuming that the null\
    \ hypothesis is true*. (The null hypothesis here is that there is no difference,\
    \ which would mean t-values are expected to be distributed around 0.)\n\nThe p-value\
    \ is NOT the probability that your hypothesis is true. It is also NOT the probability\
    \ of finding your data by chance. The p-value of a single study is also NOT akin\
    \ to an effect size or level of evidence (i.e. lower does not mean “bigger difference”\
    \ or “more evidence”).\n\nOnce more, for the people in the back (and the overconfident\
    \ students who skipped classes and underperformed on my exams): “The p-value is\
    \ the probability of observing a t-value that is as high or more extreme than\
    \ the observed t-value, under the assumption that the null hypothesis is true”.\n\
    \nWhen the null hypothesis is true, p-values are uniformly distributed: they are\
    \ just as likely to be 0.01 as they are to be 0.50 or 0.99. When the alternative\
    \ hypothesis is true, then p-values are skewed: they are now more likely to be\
    \ towards 0, then they are to be towards 1. How skewed they are depends on the\
    \ magnitude of the difference.\n\nIf someone says a result is “statistically significant”,\
    \ what they really mean is that their p-value was lower than some arbitrary threshold.\
    \ Often, this is set at 0.05. If the null hypothesis is true, p-values are uniformly\
    \ distributed between 0 and 1, and thus there is a 5% chance that the p-value\
    \ is 0.05 or lower. However, if the null hypothesis is not true, p-values are\
    \ skewed, and thus, the chance that a p-value is lower than 0.05 is larger than\
    \ 5%. How much larger depends on the effect size, with very small differences\
    \ only increasing the chances by a little bit.\n\nAnother important factor is\
    \ sample size. Increasing the sample size will decrease the standard error of\
    \ the mean, which in turn increases the t-value (you will see why in the next\
    \ sections), and it also increases the degrees of freedom. Both of these factors\
    \ will further skew the distribution of p-values.\n\n### 9.2.2 One-Sample t-test\n\
    \nImagine you have measurements from a single sample of individuals, and you also\
    \ have a very specific hypothesis about what these should be. For example, you\
    \ might be the CEO of a cooperation that has systematically dumped chemical waste\
    \ in lakes around your factories, and as a consequence people in local communities\
    \ have accused you of poisoning their drinking water. Oops! As a consequence of\
    \ the tap water quality, local residents have turned to bottled water. You saw\
    \ this business opportunity and branched out to siphoning public water reserves\
    \ into your own production of bottled water. Unfortunately, residents now complain\
    \ that your bottles are leaching microplastics into the water they contain, and\
    \ that this is harmful to them and their offspring. Not this again!\n\nFortunately,\
    \ you're quite sure that your chemicals in the tap water and the microplastics\
    \ in your bottled water are totally safe! You just have to run a quick study to\
    \ confirm this. People are complaining that their babies' birth weights have substantially\
    \ dropped since you started poisoning their water and then started selling them\
    \ potentially dodgy water. You, on the other hand, think there is nothing wrong\
    \ with poisoning enriching local lakes and commercial bottles of water. You thus\
    \ ask a local hospital to produce their anonymised records of birth weights in\
    \ the last year. You also know that the average birth weight was 3499 grams at\
    \ 40 weeks' gestation (Duryea et al., 2014) in the wider population. Your question\
    \ is thus: is the distribution of birth weights different from the national average?\n\
    \nYou vaguely recall the one-sample t-test from that one statistics unit in the\
    \ MBA you mostly blustered through. This was a test that allowed you to compare\
    \ a sample of observations (baby weights) to an expected mean (3499 grams). This\
    \ tests first computes a t-value by subtracting the expected mean from the observed\
    \ mean. You could consider this your **signal**: the real difference you've observed\
    \ between your data and your expectation. This signal is then divided by the standard\
    \ error of the mean (sample standard deviation divided by the square root of the\
    \ number of observations in your sample). You could consider your **noise**: expected\
    \ uncertainty in your sample. In some ways, the t-value is thus a bit like a signal-to-noise\
    \ ratio. In other words, it quantifies whether the difference you observe is larger\
    \ than the magnitude of differences you might expect anyway.\n\nYou ask the nerds\
    \ from your IT department to code this in Python. They use NumPy and SciPy's stats\
    \ module and offer you the following:\n\n```python\nfrom scipy.stats import ttest_1samp\n\
    \n# These are the weights for 10 babies born at\n# 40 weeks in the local hospital.\n\
    baby_weights = [2530, 3095, 3323, 3404, 3297,\n                2986, 2442, 3288,\
    \ 3219, 2822]\n# Test if the collection of weights could be\n# different from\
    \ the population mean.\nt, p = ttest_1samp(baby_weights, 3499)\n\nprint(t, p)\n\
    ```\n\nA-oh... That t-value of -4.26 suggests that babies were indeed born smaller\
    \ than the national average, and that p-value of 0.002 is “statistically significant”.\
    \ Under the assumption that local babies weigh just as much as the general population,\
    \ this suggests finding a t-value like the one you just observed or even more\
    \ extreme is quite unlikely.\n\nSeems like you might have some explaining to do\
    \ after all! Use your money to wipe your tears, claim the sample is too small,\
    \ and maybe invite a high-powered judge on a vacation in case the townsfolk ever\
    \ take you to court.\n\n### 9.2.3 Related-samples t-test\n\nNew example! Pretend\
    \ you’re running an editor, and you’ve developed an intervention that makes academics\
    \ more likely to submit their manuscripts in time. You’ve tracked a number of\
    \ writers’ previous book delays, and you’re curious to know if they have benefited\
    \ from your intervention on the delay for their next book. You thus have two measurements\
    \ for each writer: number of days delay pre-intervention and number of days delay\
    \ post-intervention:\n\n```python\nimport numpy\n\n# Collected data from 10 writers\
    \ before and\n# after the intervention.\npre = numpy.array([366, 298, 654, 712,\
    \ 378,\n                   453, 11, 343, 777, 827])\npost = numpy.array([452,\
    \ 559, 435, 380, 278,\n                    296, -2, 414, 636, 692])\n```\n\nNow\
    \ you can test if the post-intervention delays are different from the post-intervention\
    \ delays! You can do so using a related-samples t-test:\n\n```python\nfrom scipy.stats\
    \ import ttest_rel\n\nt, p = ttest_rel(pre, post)\n\nprint(t, p)\n```\n\nDisappointingly,\
    \ your intervention does not seem to have worked: the t-value is 1.25 and the\
    \ p-value is 0.243.... Maybe your sample was too small or maybe academics are\
    \ just incorrigible optimists who take on too much work and then fail to do it\
    \ all in the time they over-optimistically estimated all that work would take.\n\
    \n> (Frankly, the only unrealistic thing about this example is that one of the\
    \ writers got their manuscript in two days before the deadline. On a highly related\
    \ note: Sorry, Adam!)"
  mdcn: "## 9.2 t检验\n\n科学中一些最基本的问题都与差异有关：“我能憋气几分钟；这比别人强吗？”，“猫的大脑比狗的小吗？”，或者“我最近开始服用一种新药；我的排泄物现在变大了吗？”。这些问题通常归结为更一般性的问题：“我的测量结果与预期不同吗？”以及“A组与B组有差异吗？”\n\
    \n解决上述问题的一种方法是使用t检验。t检验将“差异”形式化，并定义了我们何时认为这种差异具有“统计学意义”。t检验有不同类型，各有其特定用途。它们的共同点是计算一个t值，并将该t值与t分布进行比较。如果t值非常极端，我们就可以认为它是“显著的”。\n\
    \nt分布看起来很像正态分布，但它有一个令人兴奋的附加特性：**自由度**。在自由度无限大时，t分布趋近于标准正态分布（均值为0，标准差为1）。然而，随着自由度减小，t分布的尾部会抬高。这意味着在自由度较少时，出现更极端值的概率更大。\n\
    \n我听到你在想：自由度是什么？假设你像我们之前那样估计一个样本的方差。你使用了一些独立的观测值来完成这个任务，例如样本中个体的身高。你还使用了另一个参数来计算方差，即平均身高。方差的自由度等于观测值数量减去你用来计算方差的那个参数。换句话说，参数估计的自由度是\
    \ n – k，即样本量减去用于计算该参数的参数数量。对于t检验，这将是 n – 1。\n\n### 9.2.1 什么是p值？\n\n使用t分布和计算出的t值，你可以计算一个**p值**。这个值反映了在*假设原假设为真*的情况下，观察到你所得到的t值或更极端t值的概率。（这里的原假设是没有差异，这意味着t值预期会分布在0附近。）\n\
    \np值**不是**你的假设为真的概率。它也**不是**你的数据是偶然发现的概率。单个研究的p值也**不等同于**效应量或证据水平（即，p值越低并不意味着“差异越大”或“证据越多”）。\n\
    \n让我再重复一遍，给后排的人听（以及那些逃课、考试表现不佳却过度自信的学生）：“p值是在原假设为真的假设下，观察到一个与观测到的t值一样高或更极端的t值的概率”。\n\
    \n当原假设为真时，p值是均匀分布的：它们是0.01的可能性与是0.50或0.99的可能性一样大。当备择假设为真时，p值是偏态的：它们现在更可能接近0，而不是接近1。偏态的程度取决于差异的大小。\n\
    \n如果有人说一个结果是“统计学显著的”，他们真正的意思是他们的p值低于某个任意的阈值。通常，这个阈值设定为0.05。如果原假设为真，p值在0到1之间均匀分布，因此有5%的概率p值等于或低于0.05。然而，如果原假设不为真，p值是偏态的，因此p值低于0.05的概率大于5%。大多少取决于效应量，非常小的差异只会使概率增加一点点。\n\
    \n另一个重要因素是样本量。增加样本量会减小均值的标准误，这反过来会增加t值（你将在下一节看到原因），同时也会增加自由度。这两个因素都会进一步使p值的分布偏斜。\n\
    \n### 9.2.2 单样本t检验\n\n假设你有一个个体样本的测量值，并且你对这些测量值应该是什么有一个非常具体的假设。例如，你可能是一家公司的CEO，该公司系统性地向工厂周围的湖泊倾倒化学废物，结果当地社区的人们指控你毒害了他们的饮用水。哎呀！由于自来水质量问题，当地居民转向了瓶装水。你看到了这个商机，并扩展业务，将公共水资源抽入你自己的瓶装水生产中。不幸的是，居民现在抱怨你的瓶子向水中渗出微塑料，这对他们和他们的后代有害。又来了！\n\
    \n幸运的是，你非常确定自来水中的化学物质和瓶装水中的微塑料是完全安全的！你只需要进行一项快速研究来证实这一点。人们抱怨说，自从你开始毒害他们的水源，然后开始向他们出售可能有问题的水以来，他们婴儿的出生体重显著下降。另一方面，你认为毒害——丰富当地湖泊和商业瓶装水并没有错。因此，你要求当地医院提供过去一年出生体重的匿名记录。你还知道，在更广泛的人群中，40周妊娠期的平均出生体重为3499克（Duryea等人，2014）。因此，你的问题是：出生体重的分布是否与全国平均水平不同？\n\
    \n你模糊地记得在MBA课程中那个你大部分时间都在混日子的统计单元里学过的单样本t检验。这是一种允许你将一组观测值（婴儿体重）与一个预期均值（3499克）进行比较的检验。该检验首先通过从观测均值中减去预期均值来计算t值。你可以将此视为你的**信号**：你观察到的数据与预期之间的实际差异。然后，这个信号除以均值的标准误（样本标准差除以样本中观测值数量的平方根）。你可以将此视为你的**噪声**：样本中预期的不确定性。在某些方面，t值因此有点像信噪比。换句话说，它量化了你观察到的差异是否大于你可能预期的差异幅度。\n\
    \n你让IT部门的极客用Python编写这个程序。他们使用NumPy和SciPy的stats模块，给你提供了以下代码：\n\n```python\nfrom\
    \ scipy.stats import ttest_1samp\n\n# These are the weights for 10 babies born\
    \ at\n# 40 weeks in the local hospital.\nbaby_weights = [2530, 3095, 3323, 3404,\
    \ 3297,\n                2986, 2442, 3288, 3219, 2822]\n# Test if the collection\
    \ of weights could be\n# different from the population mean.\nt, p = ttest_1samp(baby_weights,\
    \ 3499)\n\nprint(t, p)\n```\n\n哎呀...那个-4.26的t值表明婴儿出生时确实比全国平均水平小，而0.002的p值是“统计学显著的”。在假设当地婴儿体重与普通人群相同的前提下，这表明观察到像你刚刚观察到的t值或更极端的t值是相当不可能的。\n\
    \n看来你可能终究需要做些解释了！用你的钱擦干眼泪，声称样本太小，也许邀请一位有权势的法官去度假，以防镇民们真的把你告上法庭。\n\n### 9.2.3 相关样本t检验\n\
    \n新例子！假设你是一名编辑，你开发了一种干预措施，使学者更有可能按时提交他们的手稿。你跟踪了许多作者之前的书籍延迟情况，并且你很好奇他们是否从你对下一本书延迟的干预中受益。因此，你对每位作者有两个测量值：干预前的延迟天数和干预后的延迟天数：\n\
    \n```python\nimport numpy\n\n# Collected data from 10 writers before and\n# after\
    \ the intervention.\npre = numpy.array([366, 298, 654, 712, 378,\n           \
    \        453, 11, 343, 777, 827])\npost = numpy.array([452, 559, 435, 380, 278,\n\
    \                    296, -2, 414, 636, 692])\n```\n\n现在你可以检验干预后的延迟是否与干预前的延迟不同！你可以使用相关样本t检验来完成：\n\
    \n```python\nfrom scipy.stats import ttest_rel\n\nt, p = ttest_rel(pre, post)\n\
    \nprint(t, p)\n```\n\n令人失望的是，你的干预似乎没有奏效：t值是1.25，p值是0.243....也许你的样本太小，或者也许学者们只是无可救药的乐观主义者，承担了太多工作，然后未能在他们过于乐观估计的时间内完成所有工作。\n\
    \n> （坦率地说，这个例子中唯一不现实的地方是其中一位作者在截止日期前两天才提交手稿。与此高度相关的是：抱歉，亚当！）"
