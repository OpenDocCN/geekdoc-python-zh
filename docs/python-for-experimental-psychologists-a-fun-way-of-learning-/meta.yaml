  md: '78 Make Some Noise


    You might be confused by the `allsines.astype(''int16'')` bit. It turns all numbers
    in `allsines` into 16-bit integers, which is the format that PyGame needs.

    To play the sound, use its play method:


    ```

    # play the sinusoid sound

    tone.play()

    ```


    Run the script (if you haven''t yet) and enjoy your beautiful, self-made, pure
    tone!

    As promised, let''s briefly return to noise. Noise is actually a bit easier to
    make. First, simply create an array of random numbers with the length of the amount
    of samples in your sound (using the same sound length and the same sampling rate):


    ```

    # create a series of random numbers

    noise = numpy.random.rand(int(SOUNDLEN * SAMPLERATE))

    ```


    The sine wave''s values were between -1 and 1, whereas the noise''s values are
    now between 0 and 1. To correct this, multiply all noise by 2 (so the values are
    between 0 and 2) and then subtract 1 (so the values are between -1 and 1):


    ```

    # correct the value range (-1 to 1)

    noise = (noise * 2) - 1

    ```


    Now you can set the correct amplitude, as you did with the sine wave:


    ```

    # increase the noise''s amplitude

    noise = noise * MAXAMP

    ```


    And all that is left to do now is to turn it into an actual sound!


    ```

    # turn the noise vector into a sound

    whitenoise = pygame.mixer.Sound(noise.astype(''int16''))


    # play the noise sound

    whitenoise.play()

    ```


    Pretty cool, eh? Maybe you should turn up your computer''s volume, so that everyone
    around you can enjoy the sounds you just created.

    Naturally, you want to share your work with your loved ones. Regrettably, PyGame''s
    sounds are constructed in temporary memory, so you can''t save them to a file
    directly. Because it would be such a shame for your family and friends to miss
    the opportunity to hear your beautiful noise, let''s learn how to save your sound
    to a file you can share.

    First, you need to open a new file. In this case, you need to open two: one for
    the sinusoid (the pure tone) and one for the noise. To do this, you can use the
    `wave` module''s `open` function. This function requires a file name (a string
    that ends with `.wav`) and a letter indicating the opened files'' mode (use `''w''`
    for `''write''`).


    ```

    # open new wave file objects

    tonefile = wave.open(''pure_tone.wav'', ''w'')

    noisefile = wave.open(''noise.wav'', ''w'')

    ```'
