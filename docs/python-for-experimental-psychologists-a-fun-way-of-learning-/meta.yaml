  md: 'As you can see, the higher the step size (thus the fewer samples), the poorer
    the representation of the sine wave becomes. Fortunately, your computer has more
    than enough computing power to deal with high numbers of samples, so this shouldn''t
    be a problem. We call the amount of samples per second the **sampling rate**,
    and it can go up to several millions on fancy systems! For this example, we will
    stick to 48,000, which is just about enough to cover all sounds that a human can
    actually hear.


    Open a new file in a script editor and call it **make_sound.py**. For this to
    work, you need to import some libraries. NumPy is one of them, to create the waves.
    To actually turn them into sound, you''ll need two more: PyGame and wave. PyGame
    is mostly used for game development, but we can use its mixer module. This allows
    you to make sounds out of the sound waves that you create with NumPy. wave is
    a Python module that allows you to create .wav files. We will come back to that
    later. For now, just put this at the beginning of your script:


    ```

    import wave

    import numpy

    import pygame

    ```


    First, you should define the constants that you just learned about:


    ```

    # maximal sound amplitude and sampling rate

    MAXAMP = 16383

    SAMPLERATE = 48000

    ```


    You will also need to set the amount of channels. Let''s go for mono now, which
    is one channel. This will make the same sound come out of all speakers.


    ```

    # mono

    NCHANNELS = 1

    ```


    Now you need to decide what your sound''s length and frequency should be. Let''s
    go for a three-second sound of 1,000 vibrations per second (= 1,000 Herz):


    ```

    # sound length (seconds) and frequency (Herz)

    SOUNDLEN = 3.0

    SOUNDFREQ = 1000

    ```


    Time for a few quick calculations: if your sound has a length of three seconds
    and a frequency of 1,000 Herz, that means your sound will contain 3 * 1000 = 3,000
    cycles:


    ```

    # calculate the total amount of cycles

    ncycles = SOUNDLEN * SOUNDFREQ

    ```


    The sound will be sampled with 48,000 samples per second, so your entire sound
    will consist of three seconds * 48,000 samples = 144,000 samples. In every cycle,
    there will thus be 144,000 samples / 3,000 cycles = 48 samples per cycle (spc).


    ```

    # calculate the total amount of samples

    nsamples = SOUNDLEN * SAMPLERATE

    # calculate the number of samples per cycle

    spc = nsamples / ncycles

    ```'
