    \ names, the results of your calculations do not persist. That’s annoying, because\
    \ you will need them later on (for plotting, for example).\n\nA nice solution\
    \ is to store the descriptives that you calculated in a dictionary. Add the following\
    \ code *before* the outer (SOA) for loop:\n\n```\n# create an empty dict to hold\
