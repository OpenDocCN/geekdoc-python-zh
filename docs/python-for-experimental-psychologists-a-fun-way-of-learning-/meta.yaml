  - '[PAGE 132]


    # 6.5 Plotting Data


    Now that you calculated the mean and standard error of the mean for a single participant,
    you can plot them. Matplotlib’s `pyplot` library provides a whole range of functions
    to create high-quality graphs. The amount of customisation options might be a
    little overwhelming at first, but you’ll get used to it.


    The recipe for a graph is quite straightforward: you start with creating a new
    (empty) figure, then you draw the means and standard errors for each condition,
    and you end by adding axis labels and a legend.


    Let’s start with creating a new figure. Matplotlib has a very useful function
    to create figures with one or more subplots in them. You can create one subplot
    for the 100-ms SOA and one for 900 ms. You can add the following lines to `analysis.py`.
    Make sure to add them the very end and without indentation!


    ```

    # create a new figure with two subplots

    fig, (ax100, ax900) = pyplot.subplots(nrows=1, ncols=2, \n    sharey=True, figsize=(12.0,
    6.8), dpi=200.0)

    ```


    The `subplots` function creates a single **figure**, with multiple **axes**. In
    Matplotlib, a figure is the background that contains a single or multiple subplots.
    Each subplot is called an **axis**. The axes can be used to plot data.


    When you call the `subplots` function, you can pass a number of keywords. Two
    of the keywords determine the amount of axes (subplots): `nrows` is the number
    of horizontal rows of plots and `ncols` is the number of vertical columns of plots.
    You asked for one row and two columns, which results in two plots next to one
    another. Further keywords are concerned with the lay-out. `sharey` and `sharex`
    are Booleans that indicate whether all subplots should have the same $y$- and
    $x$-axis. `figsize` determines the size of the figure (the background containing
    all subplots) in inches, while `dpi` determines the amount of dots (pixels) **per
    inch**. A figure of 12.0 inches wide and 6.8 inches high, with a DPI of 200, results
    in a figure of 12.0 * 200 = 2,400 pixels wide and 6.8 * 200 = 1,360 pixels high.


    You can create a bar plot. Before you start, it is important that you know how
    wide your bars are going to be and how much distance you want between them. Matplotlib
    considers the $x$-axis in a bar plot to be no different from the $x$-axis in a
    scatter plot, which means that you can define the start and width of each bar
    in numbers. For example, your bars could be 0.4 wide, and the distance between
    them could be 0.1.


    ```

    # define the bar plot parameters

    width = 0.4

    intdist = 0.1

    ```


    While drawing bars, you will need to update the starting position of the next
    bar. For example, if you draw the first at 0.1, you will want to draw the second
    on 0.6. That is the position of the first bar, plus its width, plus the distance
    between bars.


    ```

    # define the starting position (left edge) of the first bar

    barpos = 0.1

    ```'
