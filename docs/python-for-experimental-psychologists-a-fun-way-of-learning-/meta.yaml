    \n**被试间**设计适用于你测试两个完全不同的群体的情况，比如冶金学家和海豚。独立样本 t 检验可以让你查看你测量的特征在这些组之间是否存在差异。其基本原理与其他\
    \ t 检验相同：你首先计算组间均值的差异，然后将其除以一个衡量变异性的指标。就像之前一样，这有点像信噪比，你试图确定你发现的差异是在预期范围内还是超出了预期。\n\
    \n由于我们处理的是两个样本，现在有两个方差需要考虑：每个组一个。如果样本的大小和方差相等，将它们合并在一起并不是特别麻烦。然而，当样本大小不等时，问题就会出现；如果方差不等，麻烦就更大了。这些问题背后的原因有点超出本章的范围，但如果你想了解个大概，可以查阅一下韦尔奇-萨特思韦特方程。\n\
    \n幸运的是，SciPy 的 `stats` 模块提供了一个简洁明了的解决方案：`ttest_ind` 函数！这个函数有一个关键字参数 `equal_var`，你可以将其设置为\
    \ `False`。如果你的样本确实方差不等，这会应用适当的校正。然而，将其用于方差相等的样本也没有坏处：如果样本大小和方差更相似，校正会趋向于基本的独立样本\
    \ t 检验。\n\n```python\nfrom scipy.stats import ttest_ind\n\n# Define a feature\
    \ that is different between\n# metallurgists and dolphins.\n# (Identifying this\
    \ feature is left as an\n# exercise to the reader.)\nmetal = [89, 137, 56, 104,\
    \ 78, 29, 65, 67, 73, 84]\ndolphin = [530, 642, 591, 593, 627, 595]\nt, p = ttest_ind(metal,\
    \ dolphin, equal_var=False)\nprint(t, p)\n```\n\n总而言之，独立样本 t 检验比相关样本 t 检验稍微复杂一些，但只要将\
    \ `ttest_ind` 的 `equal_var` 设置为 `False`，你基本上应该是安全的。\n\n## 9.3 相关性\n\n到目前为止，我们讨论的都是差异。但有时我们感兴趣的是事物是否相似。为此，我们可以使用相关性：不同测量值以相似方式变化的趋势。例如，像人们的工资、他们每天听泰勒·斯威夫特的分钟数，以及他们的配偶谈论机械键盘的频率等，都与生活满意度相关[需要引用]。\n\
    \n相关性是统计检验中的“坏小子”，因为每个人总是警告你。他们会说“相关性不等于因果关系！尼古拉斯·凯奇的电影数量与美国游泳池溺水事件的数量相关！”说到那位出色的演员：相关性就像是统计学中的尼古·凯奇：使用得当时值得奥斯卡奖，但使用不当时，结果可能会无意中变得滑稽。\n\
    \n### 9.3.1 协方差\n\n我们之前研究了 t 检验，并注意到它们通过（某种程度上的）信噪比来量化样本差异。它们通过将均值之间的差异除以从样本方差导出的指标来实现这一点。相关性非常相似，但它们量化的不是差异，而是两个样本之间的关联。这种关联的大小然后与，你猜对了，一个从样本方差导出的指标进行比较。\n\
    \n两个变量之间的关联可以用它们的协方差来量化。计算协方差归结为观察个体在两个变量上距离组均值的距离。例如，我可能比一般人花更多时间阅读关于鸽子飞行的文章，我的生活质量分数也可能高于平均水平。另一方面，我的一些同事出于某种原因（？！）不喜欢鸽子，我只能假设他们的生活质量低于平均水平。这就是协方差：当你在鸽子兴趣上得分高时，你在生活质量上得分也高；但当你在鸽子兴趣上得分低时，你在生活质量上得分也低。因此，如果你将这两个距离组均值的距离相乘，最终会得到一个高值。所有这些乘积差异的平均值（跨样本中的所有人）就是协方差。\n\
    \n当两个变量在每个参与者身上同时高或同时低时，协方差有效：两个正值相乘得到正值，两个负值相乘也得到正值！然而，当一个变量高而另一个变量低（反之亦然）时，它也有效。在这种情况下，乘积是一个正数和一个负数，或者一个负数和一个正数；两者最终都得到一个负值。\n\
    \n如果人们的得分不一致，协方差会很低。有些人在两个变量上的得分都高于平均值，但有些人在一个变量上得分高于平均值，在另一个变量上得分低于平均值，还有一些人在第一个变量上得分低于平均值，在第二个变量上得分高于平均值。如果是这种情况，结果就是正值和负值的混合，平均值大约为\
    \ 0：没有协方差！\n\n### 9.3.2 皮尔逊 R 系数\n\n你可以认为皮尔逊相关系数 R 是协方差与方差的比率。它通过将两个变量之间的协方差除以这些变量标准差的乘积来计算。R\
    \ 的范围从 -1（完全负相关）到 0（无相关），再到 1（完全正相关）。这种完全相关意味着，对于一个变量的每一个差异，另一个变量的差异完全相同。所以，如果我在阅读关于鸽子的文章上得分高于平均值\
    \ 1 个标准差，那么我在生活质量问卷上的得分也会高于平均值 1 个标准差。\n\n在 Python 中，你可以简单地使用 SciPy 的 `stats`\
    \ 模块，通过 `pearsonr` 函数来计算 R 和相关的 p 值：\n\n```python\nfrom scipy.stats import pearsonr\n\
    \nx = [1.4, -0.7, -0.9, 0.4, 0.3,\n     -0.1, 1.0, -0.3, -0.2, 1.1]\ny = [0.9,\
    \ -0.6, -0.7, -0.3, 0.5,\n     0.1, -0.2, -0.5, 0.3, 0.8]\nr, p = pearsonr(x,\
    \ y)\nprint(r, p)\n```\n\n相关性的 p 值量化了在假设两个变量之间不存在相关性的情况下，找到像观测到的 R 值或更极端的 R 值的概率。\n\
    \n### 9.3.3 斯皮尔曼 ρ 系数\n\n皮尔逊相关系数 R 受极端值影响。当这些值出现在任一变量中时，会影响协方差的计算，并且它们可能不成比例地拉动\
    \ R 值。在这些情况下，你可以选择使用非参数相关性检验。其中一个指标是斯皮尔曼等级相关系数 ρ。\n\nρ 的美妙之处在于它的工作原理与 R 完全相同：它是标准化的协方差，即两个变量之间的协方差除以它们标准差的乘积。然而，我们首先使用一个小技巧来摆脱那些讨厌的极端值！我们不使用实际数据，而是使用它们的等级顺序。对于上面的例子，等级顺序如下：\n\
    \n```python\nx_rank = [10, 2, 1, 7, 6, 5, 8, 3, 4, 9]\ny_rank = [10, 2, 1, 4,\
    \ 8, 6, 5, 3, 7, 9]\n```"
