    PsychoPy 窗口的一个便捷特性是它有一个 checkTiming 属性，默认为 True。这意味着你的窗口正在记录每次帧刷新之间的间隔，并根据显示器的预期刷新率（通过在实验开始时测量一系列空白帧之间的间隔来估算）进行检查。如果某个间隔明显长于预期，则表明可能发生了丢帧，你将在输出窗口中看到相关警告：\n\
