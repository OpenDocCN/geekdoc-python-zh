    \ we line up too much code to be executed between frames, it can cause your computer\
    \ to “drop” frames. This means that the interval between screen refreshes can\
    \ be longer than expected, which can cause your stimuli to either be presented\
    \ for longer than expected or to be presented at an offset.\n\nIt is important\
    \ to check the reliability of your system’s frame rate before running an experiment.\
