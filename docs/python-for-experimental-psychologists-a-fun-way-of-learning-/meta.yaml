  - '[PAGE 190]


    Note that standardisation should not happen the tweed variable, as this one is
    binary: 0 for no tweed and 1 for tweed. Mathematically this is convenient: a beta
    coefficient multiplied by 0 results in 0, but when multiplied by 1, the result
    is the beta value itself. So they can be readily interpreted as “wearing tweed
    is associated with a difference of beta in teaching evaluations”.


    Let’s see what the unstandardised coefficients are:


    ```

    print("tweed: {}".format(betas[1]))

    print("h-index: {}".format(betas[2]))

    ```


    This shows us that wearing tweed jackets is associated with an improvement in
    a lecturer’s evaluations by about 0.38 stars, and every step in their h-index
    is associated with an improvement of 0.13 stars. Note that these results are different
    from before: tweed previously was associated with an improvement of 2 stars and
    h-index with an improvement of 0.14 stars. This is because the two variables share
    **explained variance** in the outcome: part of the evaluation scores explained
    by wearing tweed were also explained by h-index!


    The other important value that was computed is the sum of squares of the residuals.
    This is the total of all of the distances between the predicted outcomes (this
    is what we previously visualised with the trend line) and the real outcomes. These
    distances were squared to make sure they were all positive (otherwise negative
    and positive values sum up to 0) and also to make larger differences count more
    strongly than smaller differences. The smaller the sum of squares of the residuals,
    the better the fit! However, without any context, we don’t really know what a
    “small” value is for the residuals.... How do we do that?


    You might have already guessed it, but we need to compare the sum of squares of
    the residuals to some measure of the variance of the outcome, to once again compute
    some kind of a signal-to-noise ratio. In this case, we can compute the total sum
    of squares of the outcome:


    ```

    # Turn the outcome into a NumPy array,

    # to make calculations easier.

    evaluation = numpy.array(evaluation)

    ss_tot = numpy.sum((evaluation \n    - numpy.mean(evaluation))**2)

    ```


    We can now compare the sum of squares of the residuals to the total sum of squares.
    The result is the proportion of variance that is residual, i.e., that is not explained
    by the regression model. To compute the variance that is explained, we simply
    subtract the unexplained variance from 1:


    ```

    r_sq = 1 - (ss_res / ss_tot)

    print(r_sq)

    ```


    The result here is the “coefficient of determination”, also called R² (pronounce
    “R square”), and quantifies the proportion of explained variance. In our case,
    it’s almost all of it! (That’s because this is an example with made-up data!)
    In realistic cases, it will be substantially lower, but that should not deter
    you. Reality is complex, and biological systems particularly so. Countless processes
    are active and interacting at any given time, and linear associations'
  - '[PAGE 191]


    between a handful of variables are not going to explain more than a small proportion
    of the total variance in most outcomes.


    In sum, the R² will tell you how much of the variance is explained by your model,
    and the betas will tell you the relationship between each predictor and their
    outcome. These are the most important values to base any conclusions on, as these
    tell you (1) how much of an outcome is associated with your predictors and (2)
    the practical association between each predictor and the outcome.


    At this point, you might wonder “How do I know if this is significant?” If you’re
    asking out of a habitual need to slap one to three stars on values before you
    feel good about a manuscript, then you might be asking the wrong types of questions.
    However, it is most certainly not unreasonable to want to know if an association
    is statistically significant before you start to interpret it. You can derive
    an F-value and associated p-value from the explained and unexplained variance,
    which will tell you if the whole model is “significant”. You can also derive t-values
    and their associated p-values from the betas and their standard errors. This requires
    some statistical knowledge, but no further programming skills (you know all the
    required ingredients at this point). However, you could also turn to specialised
    packages like scikit-learn (focusses on prediction, less on statistics) and statsmodels
    (will give you ALL the p-values). These are slightly beyond the scope of this
    book, but they will build on the programming skills and knowledge of the underlying
    fitting procedures that you have learned in this chapter.'
  - '[PAGE 192]


    # GETTING HELP


    After working your way through this book, you should be able to do quite a bit
    of research with Python. However, there will inevitably be moments where you get
    stuck on something. This is when you turn to the internet!


    # Stack Overflow


    Stack Overflow is a programming forum. It is populated by an interesting mix of
    complete idiots who will ask the stupidest questions, highly qualified and experienced
    nerds who can fix any bug, and every kind of programmer in between. If you have
    a question, chances are that you will find someone else has already asked it and
    that another someone has already provided an answer. You can find this wondrous
    website online on stackoverflow.com.


    # Documentation Websites


    Every Python package that was used in this book provides at least some documentation
    on their website. You can find out more about PyGaze on www.pygaze.org, more on
    PsychoPy can be found on www.psychopy.org, and more on PyGame can be found on
    www.pygame.org. NumPy and Matplotlib are both part of the SciPy project, and documentation
    can be found through the project’s website: scipy.org.


    # PyGaze Forum


    If you have a query that is specific to PyGaze, you can always turn to the PyGaze
    forum. This is available via forum.cogsci.nl and is a platform where psychologists
    can help each other. In addition, the package’s developers regularly check it
    and provide help wherever they can.


    DOI: 10.4324/9781003174332-13'
