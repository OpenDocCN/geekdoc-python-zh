    我永远感谢Ignace Hooge，是他将我引入了编程（使用Matlab）的大门；也感谢Sebastiaan Mathôt，他的代码和帮助让我得以在Python中找到自己的道路。还要感谢乌得勒支大学所有有勇气雇佣我——一个过度自信且技能不足的本科生——来满足他们编程需求的人。特别提及Chris
