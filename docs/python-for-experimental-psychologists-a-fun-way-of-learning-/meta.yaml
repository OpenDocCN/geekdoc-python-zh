    ## 2 VARIABLE TYPES


    Variables are very important in programming. Before learning about what they are
    and how to use them, perhaps it would be good to get some intuitive feeling for
    them. In the following chapters, you will play around with all sorts of variable
    types to get a hang of things.


    ### 2.1 Numbers


    Numbers can be represented in different ways. The most notable difference is between
    integers and floating points. An **integer** is a number without a fractional
    part, for example, 10, 0, or -5. A **floating point**, or **float**, is a number
    with a fractional part, such as 1.23, -99.9, or 1.0.


    Let’s start with the good news: you won’t normally have to worry about the distinction
    between 1.0 and 1. In addition, unlike some other languages, Python isn’t particularly
    fussy about numerical data types. This means it will understand that when you
    divide two integers, say 3/2, you expect the fraction 1.5 to be the outcome. From
    this perspective, it seems like you don’t have to care about integers or float!


    Now the bad news: the difference between integers and floats is actually important,
    and Python won’t always behave as you expect. There are many reasons for this,
    including that integer divisions do not always automatically result in floats,
    and that floats are actually more complex than they seem (it’s not just 1.5 to
    a computer!). Furthermore, sometimes floats just aren’t appropriate. For example,
    when creating images or presenting on a computer screen, there is no such thing
    as half a pixel. Such indivisible units shouldn’t typically be represented with
    floats.


    The above might be a bit confusing, and we won’t go into the details to avoid
    further confusion. The point for now is to be aware of what type of numerical
    value you’re using.


    #### 2.1.1 Integers


    Let’s start actually using these concepts. Fire up a Python interpreter and start
    typing:


    ```

    1 + 3

    ```


    Expected result, right? 1 + 3 = 4. Now let’s try subtraction:


    ```

    5 - 3

    3 - 5

    ```


    This should also be an expected result to you. Five minus three does indeed equal
    two. And three minus five equals minus two. Let’s move on:


    ```

    3 * 2

    ```


    Brilliant, Python can do multiplication. Would it be able to do exponentiation
    as well? Let’s try 3² (the square of three, or three to the power of two):


    ```

    3 ** 2

    ```


    The syntax might seem a bit weird, with the double asterisk. You might be used
    to exponentiating with a circumflex, ^, for example in spreadsheet editors (LibreOffice
    Calc or Microsoft Excel) or Matlab. In Python, the circumflex is used as a different
    operator (you will learn about it later on), so don’t use it for exponentiation!


    All right, now let’s check out division:


    ```

    5 / 3

    ```


    From version 3, Python automatically switches to floats if the answer to a division
    is a fraction. That’s why you’re getting 1.6666666666666667. In many circumstances,
    this is exactly what you want.


    In some circumstances, you might like to be more exact. Specifically, five divided
    by three is one, with a remainder of two. To get this result, you can use Python’s
    *integer division*:


    ```

    5 // 3

    ```


    When you use the double division operator, Python throws away the remainder. In
    this case, that leaves you with 1. To report the remainder, use the % operator:


    ```

    5 % 3

    ```


    So 5 // 3 = 1, and 5 % 3 = 2. But also 5 / 3 = 1.6666666666666667, which is a
    float. Let’s look at those next!


    #### 2.1.2 Floats


    We want to calculate how much 5 / 3 is, but we would like the answer to be an
    approximation rather than an exact answer. For this, we can use floats:


    ```

    5.0 / 3.0

    ```


    Boom! 5.0 / 3.0 = 1.6666666666666667. A cool thing about floats is that they are
    contagious. If you use only one in your calculation, the answer will automatically
    be a float. Example:


    ```

    5 / 3.0

    ```


    One thing to note about floats is that they are imprecise. For example, consider
    the sum (5/3)*2. Think about what the outcome should be and then run the code:


    ```

    (5.0 / 3.0) * 2.0

    ```


    Note that the answer is 3.3333333333333335 (note the 5 in the end). Maybe this
    doesn''t rouse your suspicion, because it could be that things are rounded in
    between: 5.0 / 3.0 is 1.6666666666666667 and then 1.6666666666666667 * 2 = 3.3333333333333335.
    Now consider that the above is the same as 10/3. So an equivalent is


    ```

    10.0 / 3.0

    ```


    This still results in 3.3333333333333335! If you''re not a computer, you probably
    expected the outcome to be 3.3333333333333333. This discrepancy comes from the
    fact that floats are only *approximations* of numbers. Storing numbers with a
    high precision puts a high demand on a computer''s memory. Hence, people have
    developed clever compromises that store numbers with decent (but not exact!) precision,
    without requiring too much memory. As a consequence, floats are not always the
    exact number you think they ought to be.


    Now that you understand what a float is, you can use them in exponentiation. Why
    is that useful? Consider the following:


    ```

    3.0 ** 2

    9 ** 0.5

    ```


    Did that blow your mind? The square root of a number can be written in exponent
    notation! This is SO exciting!


    Remember the Pythagorean theorem? In a right-angle triangle, the square of the
    hypotenuse (side opposite the right angle) is equal to the summed squares of the
    other two sides. You can write this as $a^2 + b^2 = c^2$. The square root of $c^2$
    will give you the length of the hypotenuse, so you can write $c = \sqrt{(a^2 +
    b^2)}$. Let''s say $a = 3.0$ and $b = 4.0$ and try this in Python:


    ```

    (3.0**2 + 4.0**2) ** 0.5

    ```


    names can contain letters (upper and lower case), some characters (such as underscores),
    and numbers; but they must always start with a letter. For example, you can make
    a variable with name **test** to refer to the number 5, like so


    ```

    test = 5

    ```


    You can now use this variable to do all sorts of freaky stuff. You could, for
    example, use it in calculations:


    ```

    test - 3

    test + 5

    test + test

    ```


    As you can see, using it in calculations does not actually change the variable.
    If you would want to reassign it a different value, simply overwrite it:


    ```

    test = 4

    ```


    If you want to know the current value of a variable, simply type its name in the
    interpreter and press Enter.


    ```

    test

    ```


    You can also change variables by referencing themselves:


    ```

    a = 2

    a = a + 1

    ```


    You can even create new variables based on the values of others!


    ```

    a = 2

    b = 3

    c = a + b

    ```


    You can make it even more confusing and define one variable by using another:


    ```

    a = 2

    b = a

    ```


    Be wary that both variables (a and b) now could point to the very same data (2).
    This may seem like an unimportant side note now, but it will prove to be important
    when you learn about lists.


    ### 2.3 Booleans


    Booleans are named after the logician George Bool, who approached logic as though
    it was a type of algebra. He formalised the logical operations that we now know
    as AND, OR, and NOT. Logic operations can produce one of two results: True or
    False, which can also be denoted as 1 and 0.'
