  md: 'The *exact* same “random” numbers came out! Why is this relevant? Because it
    is important to realise that there is no such thing as truly random numbers in
    a computer. They are **pseudo-random**. Whether this is a problem depends on the
    circumstances. If you’re wanting to run a gambling website, having predictable
    “random” numbers might not be wise.... But if you’re just using them to create
    some visual static (like below), their pseudo-random is just fine.


    # Noise


    Visual **noise** is the grey snow you see when an old television isn’t set to
    a proper channel. It is the visual analogue of the feeling you have in your arm
    after sleeping on it. The individual snowflakes range from completely white to
    completely black. If we assign values to these colours, we could say white corresponds
    to 1 and black to 0. All numbers between 0 and 1 correspond to some shade of grey.

    Using NumPy’s `rand` function, we can actually create a field of random numbers.
    To do so, we only have to provide the width and height of this field. Let’s try
    this with a field of 5-by-5 positions:


    ```

    noise = numpy.random.rand(5, 5)

    print(noise)

    ```


    You can check the dimensions of a NumPy array by looking at its `shape` property:


    ```

    noise.shape

    ```


    Of course, grey noise is a little boring. Why not make it coloured? You might
    know that computers encode colours with three values: their red component, their
    green component, and their blue component. If we want to make a numerical representation
    of coloured noise, we will need to create three random numbers per pixel. (A pixel
    is one coloured unit on your screen: a combination of red, green, and blue.)

    Although this may sound like a difficult problem, it’s surprisingly easy to code.
    You can simply add another dimension in NumPy’s `rand` function:


    ```

    rgb_noise = numpy.random.rand(5, 5, 3)

    print(rgb_noise)

    ```


    Your field of 5-by-5 random pixels now has a depth of 3. This depth represents
    the red, green, and blue values of each pixel.


    # Matplotlib


    Now you know how to make a numerical representation of visual noise, let’s turn
    it into an image! To do this, we will use Matplotlib (Hunter, 2007). This is a
    library that can do very advanced plotting. For now, we will only use its `pyplot`
    module. This contains an `imshow` function, which can translate a field of numbers
    to an image.

    To create the visual noise, you can use the same approach as before, but now with
    a bigger field. What about 500-by-500 pixels?'
