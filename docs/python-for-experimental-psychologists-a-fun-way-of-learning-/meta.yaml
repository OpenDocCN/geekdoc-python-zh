    # 16 Variable Types


    A better alternative is to use string formatting. This allows you to put placeholders
    in your strings that can later be filled with values. To replace the previous
    example:


    ```

    a = "Every {} days, I brush my {}. I like this."

    print(a)

    ```


    You can recognise the placeholders by the curly brackets, {}. Let''s try filling
    them out:


    ```

    a.format(30, "finger nails")

    ```


    The `format` function after the string allows you to replace the string''s curly
    brackets with actual values. The values are provided between round brackets.

    Using curly brackets allows you to pass any type of variable to the `format` function,
    and it will be added to the string in a default way. You can exert a bit more
    control over this, by specifying what type of variable you want to incorporate
    into your string. For example, you can force only integers to be allowed by using
    the {:d} notation:


    ```

    "The number is {:d}".format(2)

    ```


    Note that this will not work with other variable types, not even floats:


    ```

    "The number is {:d}".format("two")

    "The number is {:d}".format(2.0)

    ```


    You can use similar tricks to format fractions in strings. For example, you might
    want to present a percentage with one or two decimals. You can do this using {:.1f}
    or {:.2f}, respectively:


    ```

    "The percentage is {:.1f}%".format(10.126)

    "The percentage is {:.2f}%".format(10.126)

    ```


    A typical use case for this is using print to send yourself messages while an
    analysis is running. For example, you might want to report when a new data file
    is loaded or what the number of lines in that file is.


    # 2.5 Sets


    Up until now, you have only seen single values (although strings can be seen as
    a collection of individual characters). Sometimes it can be useful to combine
    values together in a single set.

    Think about a reaction-time experiment: a researcher collects one response time
    in every trial. If you want to calculate the median response time, it would be
    useful to collect all individual response times in a single variable, rather than
    having one separate variable for each individual response time. This allows for
    easier access and calculations.

    Now imagine the researcher was also using an eye tracker. This device can measure
    pupil size. It will produce lots of data; sometimes over 1,000 data points per
    second! If you want'
- md: "## 2.5.1 Lists\n\nAlthough some terms in programming might seem a bit weird,\
    \ the name of the list variable is quite self-explanatory. A list is simply a\
    \ list of other values. Remember how a variable is a reference to a value? A list\
    \ is a reference to a bunch of values. These values can be integers, floats, strings,\
    \ or any other variable type. Let’s see this in practice:\n\n```\na = ['one',\
    \ 'two', 'three']\n```\n\nThe variable a is now a list (you can recognise it by\
    \ the square brackets) that contains the values \"one\", \"two\", and \"three\"\
    . If you want to use one of the values, you will have to use its **index**. The\
    \ index of a value is its position in the list. That sounds simple enough, but\
    \ Python has a little quirk that could throw you off at first: it starts counting\
    \ at 0. That means the index number of the first value is 0. The index of the\
    \ second value is 1, the index of the third is 2, etc. To refer to a particular\
    \ index, use the variable name and the index between square brackets:\n\n```\n\
    print(a)\nprint(a[0])\nprint(a[1])\nprint(a[2])\n```\n\nSimple enough, right?\
    \ So why would Python start counting at 0? Well, it makes sense on multiple levels.\
    \ One of the reasons is that it allows you to index by counting backwards. Let’s\
    \ see what happens if we use -1 as an index number:\n\n```\nprint(a[-1])\n```\n\
    \nIt accesses the last value! Counting backwards from 0 allows you to index from\
    \ the end of the list rather than from the beginning. There are situations in\
    \ which this can be very useful! (There are also situations in which counting\
    \ from 0 can be confusing. Ultimately, it’s just a design decision, and not all\
    \ programming languages follow zero-based indexing. That doesn’t stop programmers\
    \ from having *strong* opinions, though. If you’re bored and want to start something,\
    \ go to your favourite social media platform and profess a strong like or dislike\
    \ for 0-based or 1-based indexing.)\n\nApart from accessing one index at a time,\
    \ you can also index a whole **slice**. You can do so by using the index of the\
    \ first value you want to access, a colon, and the index of the value *after*\
    \ the last value you want to access. For example, `a[0:3]` means “the values in\
    \ variable a from index 0 to index 3 (not inclusive!)”:\n\n```\na = [4, 5, 6,\
    \ 7, 8, 9]\nprint(a[0:3])\n```\n\nSomething you will see a lot later on is the\
    \ concept of **nested** lists. A nested list is a list that is contained by another\
    \ list:\n\n```\na = [ [10, 20, 30] ]\n```\n\nThe first index of this lists contains\
    \ the value of the nested list: `[10, 20, 30]`. This nested list can also be indexed:\n\
    \n```\nprint(a[0])\nprint(a[0][0])\nprint(a[0][1])\nprint(a[0][2])\n```\n\nNesting\
    \ can go on forever, but it is highly unlikely that you would want to do that.\
    \ An example of where nested lists are useful is in the numeric representation\
    \ of an image. You could represent the colour of each pixel by a list of three\
    \ values: one for red, one for green, and one for blue. You could represent every\
    \ horizontal line in the image as a list of nested [R, G, B] lists (one for each\
    \ pixel). You could put all these line-lists in a single list, which would then\
    \ be a good representation of the entire image.\n\nThe following is an example\
    \ of a 3 × 3 pixel image of a white (255, 255, 255) plus (‘+’) on a grey (128,\
    \ 128, 128) background:\n\n```\n[[ [128,128,128], [255,255,255], [128,128,128]\
    \ ],\n [ [255,255,255], [255,255,255], [255,255,255] ],\n [ [128,128,128], [255,255,255],\
    \ [128,128,128] ]]\n```\n\nYou could think of such a construction as a **matrix**.\
    \ (Although be careful with that terminology, as it can have a specific technical\
    \ meaning. Here it’s used in the more general sense.) You will learn about how\
    \ to create and use these a bit later on.\n\nLists, like strings, have a few built-in\
    \ functions that can be used to manipulate them. For example, the `index` method\
    \ can find the index of a value in a list:\n\n```\na = ['a', 'b', 'c']\na.index('b')\n\
    ```\n\nThere is also a method to reverse the order of a list:\n\n```\na.reverse()\n\
    print(a)\n```\n\nIf you want to remove values from a list, there are two methods\
    \ to choose from. The remove method allows you to choose a value, of which the\
    \ first occurrence should be removed. The pop method allows you to choose an index,\
    \ of which the value will be removed.\n\n```\na = [10, 20, 30, 40]\na.remove(20)\n\
    print(a)\n```\n\n```\na.pop(0)\nprint(a)\n```\n\nOf course, there are methods\
    \ to add values to a list as well. The first of these is the append method, which\
    \ allows you to add values to a list:\n\n```\na = [10, 20, 30]\na.append(40)\n\
    print(a)\n```\n\nAnother list-expanding method is the extend method. This is intended\
    \ for joining two lists together:\n\n```\na = [10, 20, 30]\nb = [40, 50, 60]\n\
    a.extend(b)\nprint(a)\n```\n\nIf you think append and extend seem to do the same\
    \ thing, and are interchangeable, you would be wrong. Have a look at the following\
    \ example:\n\n```\na = [10, 20, 30]\nb = [10, 20, 30]\nc = [40, 50, 60]\na.append(c)\n\
    b.extend(c)\nprint(a)\nprint(b)\n```\n\nAs you can see, the append method nested\
    \ the second (c) list within first list (a), whereas the extend method combined\
    \ two lists (b and c) into a single one.\n\nAt this point, it would be good to\
    \ remember what was explained about the nature of Python variables (see the *Assigning\
    \ Variables* chapter): they *are* not the values, they merely *reference* values.\
    \ Let's look at the following example:\n\n```\na = [1, 2, 3]\nb = a\n\nprint(a)\n\
    print(b)\n```\n\nBoth variables point to the exact same value. Neither of them\
    \ contains a unique copy of [1, 2, 3]. Now look at what happens if you change\
    \ one:\n\n```\na.append(4)\na.extend([5,6])\n\nprint(a)\nprint(b)\n```\n\nBoth\
    \ a and b changed! Ahh! This is probably not the kind of behaviour you expected,\
    \ nor that you would typically like to see. So just one more time, for the people\
    \ in the back: variables are references to values, and thus changing the underlying\
    \ values can affect more than one variable!\n\nIn programming, we say that lists\
    \ are mutable. This means that you can change them if you want to. This also means\
    \ that they can be accidentally changed, like in the example above, so be careful!\n\
    \nThere are ways to get around this issue. For example, you could use a mathematical\
    \ operator to extend a list:\n\n```\na = [1, 2, 3]\nb = a\na = a + [4, 5, 6]\n\
    \nprint(a)\nprint(b)\n```\n\nAnother alternative is to use the copy function,\
    \ which we have to import from the copy module (more on importing will follow\
    \ later, just go with it at this point). This will force Python to make a copy\
    \ of the underlying value, instead of having both variables point towards the\
    \ same underlying value:\n\n```\nfrom copy import copy\na = [1, 2, 3]\nb = copy(a)\n\
    a.append(4)\n\nprint(a)\nprint(b)\n```\n\n## 2.5.2 Tuples\n\nLists are great,\
    \ but you have seen some of the risks of using them on the previous page: they\
    \ are susceptible to accidental mutation. Although you now know ways to avoid\
    \ accidental changing, they do require you to pay attention. If only there was\
    \ some kind of list that cannot be changed, to prevent you from accidentally changing\
    \ it altogether...\n\nWell, it must be your lucky day! Look no further, because\
    \ here is the immutable list-like variable: the **tuple**. You can create them\
    \ by writing values in between round brackets:\n\n```\na = ('one', 'two', 'three')\n\
    print(a)\n```\n\nAlthough it looks like a list, walks like a list, and smells\
    \ like a list, it definitely is *not* like a list! Just try appending something:\n\
    \n```\na.append('four')\n```\n\nOh no, an error! Maybe you could change one of\
    \ its values?\n\n```\na[0] = 'zero'\n```\n\nHA! Puny mortal! You cannot touch\
    \ it! The only thing you can do is completely overwrite it:\n\n```\na = ('zero',\
    \ 'two', 'three')\n```\n\nThe take-home message here is that lists can be changed,\
    \ but tuples cannot. However, all variables can be overwritten by simply redefining\
    \ them. There are further similarities between tuples and lists, namely in the\
    \ `count` and `index` methods:\n\n```\na = [1, 1, 2, 3]\nb = (1, 1, 2, 3)\n\n\
    a.count(1)\nb.count(1)\n\na.index(2)\nb.index(2)\n```\n\nSo, when should you use\
    \ tuples, and when lists? It is mostly up to personal preference. In general,\
    \ people use tuples when they know the values they contain should remain *constant*.\
    \ For example, the resolution of a computer display should probably be the same\
    \ throughout an experiment and maybe the size of a particular stimulus too.\n\n\
    ## 2.5.3 Arrays\n\nAll right, so now that you can make a list of values, let's\
    \ do some calculations with them! Try adding one to a list of numbers:\n\n```\n\
    a = [5, 6, 7]\na + 1\n```"
  mdcn: "## 2.5.1 列表\n\n虽然编程中的一些术语可能看起来有点奇怪，但列表变量的名字却相当不言自明。列表就是其他值的列表。还记得变量是如何引用值的吗？列表就是对一组值的引用。这些值可以是整数、浮点数、字符串或任何其他变量类型。让我们在实践中看看：\n\
    \n```\na = ['one', 'two', 'three']\n```\n\n变量 `a` 现在是一个列表（你可以通过方括号识别它），其中包含值 \"\
    one\"、\"two\" 和 \"three\"。如果你想使用其中一个值，就必须使用它的**索引**。值的索引是它在列表中的位置。这听起来很简单，但 Python\
    \ 有一个小怪癖，一开始可能会让你困惑：它从 0 开始计数。这意味着第一个值的索引号是 0。第二个值的索引是 1，第三个值的索引是 2，依此类推。要引用特定的索引，请使用变量名和方括号中的索引：\n\
    \n```\nprint(a)\nprint(a[0])\nprint(a[1])\nprint(a[2])\n```\n\n很简单，对吧？那么为什么 Python\
    \ 要从 0 开始计数呢？嗯，这在多个层面上都说得通。原因之一是它允许你通过倒数来索引。让我们看看如果使用 -1 作为索引号会发生什么：\n\n```\n\
    print(a[-1])\n```\n\n它访问的是最后一个值！从 0 开始倒数允许你从列表的末尾而不是开头进行索引。在某些情况下，这非常有用！（当然，从\
    \ 0 开始计数有时也会让人困惑。归根结底，这只是一个设计决策，并非所有编程语言都遵循从零开始的索引。但这并不妨碍程序员们对此持有*强烈*的看法。如果你无聊了，想挑起点什么，就去你最喜欢的社交媒体平台，公开表达你对从零开始或从一开始的索引的强烈喜好或厌恶吧。）\n\
    \n除了一次访问一个索引，你还可以索引整个**切片**。你可以通过使用要访问的第一个值的索引、一个冒号以及要访问的最后一个值*之后*的值的索引来实现。例如，`a[0:3]`\
    \ 表示“变量 `a` 中从索引 0 到索引 3（不包括 3！）的值”：\n\n```\na = [4, 5, 6, 7, 8, 9]\nprint(a[0:3])\n\
    ```\n\n你以后会经常看到的一个概念是**嵌套**列表。嵌套列表是被另一个列表包含的列表：\n\n```\na = [ [10, 20, 30] ]\n\
    ```\n\n这个列表的第一个索引包含嵌套列表的值：`[10, 20, 30]`。这个嵌套列表也可以被索引：\n\n```\nprint(a[0])\nprint(a[0][0])\n\
    print(a[0][1])\nprint(a[0][2])\n```\n\n嵌套可以无限进行下去，但你不太可能想这么做。嵌套列表有用的一个例子是图像的数字表示。你可以用一个包含三个值的列表来表示每个像素的颜色：一个代表红色，一个代表绿色，一个代表蓝色。你可以将图像中的每一行表示为一个嵌套的\
    \ [R, G, B] 列表（每个像素一个）。你可以将所有这些行列表放入一个列表中，这将很好地表示整个图像。\n\n以下是一个 3 × 3 像素图像的示例，显示了一个白色（255,\
    \ 255, 255）的加号（‘+’）在灰色（128, 128, 128）背景上：\n\n```\n[[ [128,128,128], [255,255,255],\
    \ [128,128,128] ],\n [ [255,255,255], [255,255,255], [255,255,255] ],\n [ [128,128,128],\
    \ [255,255,255], [128,128,128] ]]\n```\n\n你可以将这样的结构视为一个**矩阵**。（不过要小心这个术语，因为它可能有特定的技术含义。这里用的是更一般的意义。）你稍后会学习如何创建和使用它们。\n\
    \n列表和字符串一样，有一些内置函数可以用来操作它们。例如，`index` 方法可以找到列表中某个值的索引：\n\n```\na = ['a', 'b',\
    \ 'c']\na.index('b')\n```\n\n还有一个方法可以反转列表的顺序：\n\n```\na.reverse()\nprint(a)\n\
    ```\n\n如果你想从列表中删除值，有两种方法可以选择。`remove` 方法允许你选择一个值，删除其第一次出现的位置。`pop` 方法允许你选择一个索引，删除该索引处的值。\n\
    \n```\na = [10, 20, 30, 40]\na.remove(20)\nprint(a)\n```\n\n```\na.pop(0)\nprint(a)\n\
    ```\n\n当然，也有向列表添加值的方法。第一种是 `append` 方法，它允许你向列表添加值：\n\n```\na = [10, 20, 30]\n\
    a.append(40)\nprint(a)\n```\n\n另一种扩展列表的方法是 `extend` 方法。这用于将两个列表连接在一起：\n\n```\n\
    a = [10, 20, 30]\nb = [40, 50, 60]\na.extend(b)\nprint(a)\n```\n\n如果你认为 `append`\
    \ 和 `extend` 似乎做同样的事情，并且可以互换，那你就错了。看看下面的例子：\n\n```\na = [10, 20, 30]\nb = [10,\
    \ 20, 30]\nc = [40, 50, 60]\na.append(c)\nb.extend(c)\nprint(a)\nprint(b)\n```\n\
    \n如你所见，`append` 方法将第二个列表（`c`）嵌套在第一个列表（`a`）中，而 `extend` 方法将两个列表（`b` 和 `c`）合并成一个。\n\
    \n此时，最好记住关于 Python 变量本质的解释（参见*变量赋值*章节）：它们*不是*值，它们只是*引用*值。让我们看看下面的例子：\n\n```\n\
    a = [1, 2, 3]\nb = a\n\nprint(a)\nprint(b)\n```\n\n两个变量指向完全相同的值。它们都不包含 [1, 2,\
