  md: '# 3

    CREATING AND PRESENTING STIMULI


    In this chapter, you will learn how to create some basic stimuli (text, shapes,
    images) and how to present these on a computer display. You’ll also learn how
    to manipulate images using some external libraries and how to make stimuli “dynamic”
    (i.e. moving and interactive). To do this, you will write scripts in which you
    will use classes from a package known as PsychoPy (Peirce, 2007, 2009).


    PsychoPy can do pretty much anything you could need in a psychological experiment.
    This includes presenting stimuli on a monitor; producing sound; collecting responses
    from keyboards, computer mice, joysticks, and controllers; communicating with
    eye trackers; logging data; and accurately timing events. It is notable that other
    packages do exist for similar purposes, such as PyGaze (Dalmaijer et al., 2014).
    Which package you choose is entirely up to you (or your teacher, if you’re using
    this book in a course module). In this chapter, we’re going to focus on PsychoPy,
    but the skills you learn here will help in extending your knowledge enough to
    also try other packages!


    Without delving too deep into software architecture, it is worth noting that PsychoPy
    is built on top of a few other external packages (dependencies). This means that
    it requires other packages to do what it does. For this reason, we recommend installing
    standalone PsychoPy to create your first experiment. This can be downloaded from
    https://www.psychopy.org/download.html (see Chapter 1 for installation instructions).


    This isn’t to say that you can’t use PsychoPy in the other environments introduced
    earlier in this book. For lots of reasons, many programmers prefer those environments
    rather than PsychoPy’s inbuilt “Coder view” (introduced shortly). Alternative
    environments offer lot more features and functionality compared to PsychoPy Coder,
    but they also typically require that you install a number of dependencies and
    configure your environment. Standalone PsychoPy comes pre-equipped with most packages
    that you will need for a psychology experiment (including PyGaze!). This is why
    we like using PsychoPy Coder for teaching: it saves *a lot* of time in setting
    up in the classroom.'
