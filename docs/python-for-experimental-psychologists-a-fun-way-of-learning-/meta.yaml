    \ = rt_sem\n            descr[soa][val]['acc_m'] = acc_m\n```\n\nRun your current\
    \ script within an Editor. In the Interpreter, you can now type, for example descr[100]['valid']\
    \ (and Enter) to get all measures for the 100 ms SOA and valid condition.\n\n\
