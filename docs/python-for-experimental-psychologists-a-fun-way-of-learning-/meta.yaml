    \ 'escape':\n    core.quit()\n```\n\n# 5.2 Presenting Several Trials\n\nWe now\
    \ have the basics of one trial complete, and so now we can think about presenting\
    \ several trials. This is a classic use case of loops, in which we are now well\
    \ versed! Imagine we want five trials. By far the easiest way to do this in python\
    \ would be to use for trial in range(5): and then indent our existing code by\
    \ one level, so that it is within the new for loop. This will easily present five\
    \ trials, but it doesn’t allow us a way to change our stimuli trial-by-trial.\
    \ What might be convenient is if we had a list of all the different kinds of trials\
    \ we need. In our task, we will have three parameters that change trial-by-trial:\
    \ the orientation of the cue, the location of the target, and the correct answer\
    \ for our key press. We could format the information needed for a single trial\
    \ as a python dictionary:\n\n```\ntrial_info = {'cue_ori':90, 'target_x': -300,\
    \ \\n    'corr_ans':'left'}\n```\n\nOf course though, we have several trials,\
    \ so we’d really need a list of these dictionaries.\n\n```\n# a list of 2 trials\
    \ - we probably want more!\ntrials = [ \\n    {'cue_ori':  0, 'target_x':-300,\
    \ \\n        'corr_ans':'left'}, \\n    {'cue_ori':180, 'target_x': 300, \\n \
    \       'corr_ans':'right'}, \\n    ]\n```\n\nRecall that, in Python, we can loop\
    \ through anything that is “iterable” i.e. anything that contains more than one\
    \ thing. Conveniently, we have made a list object that also contains several things\
    \ (with each thing being a dictionary) and so we could now loop through this.\
    \ Moreover, we can then use the current trial to set the stimuli on every trial.\n\
    \n```\n# loop through our list of trials\nfor trial in trials:\n    # update stimuli\
    \ for this trial\n    cue.setOri(trial['cue_ori'])\n    target.setPos([trial['target_x'],\
    \ 0])\n```"
