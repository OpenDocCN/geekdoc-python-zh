  md: "are in fact choosing to simply not calculate the standard deviation or error\
    \ for each individual participant’s error rate (you will be able to do so for\
    \ the whole group later on).\n\nReaction times are a different story, and the\
    \ correct way of analysing them can be debated. The reason for this is that reaction\
    \ times are typically not normally distributed. This makes sense: a reaction time\
    \ cannot be lower than 0, but it can always be longer (to infinity, and perhaps\
    \ beyond?). In most datasets, the distribution of reaction times has a positive\
    \ skew, i.e. a longer tail on the right.\n\nWhy does this matter? Well, if you\
    \ calculate a mean, it identifies the centre of a non-skewed distribution. So\
    \ when you calculate a mean of a skewed distribution, it might not correctly represent\
    \ its centre. Instead, the mean will be pulled towards the tail.\n\nOne alternative\
    \ option is to calculate a **median**. This is the value that is in the centre\
    \ when you make an ordered list of all the reaction times and can be a better\
    \ reflection of the centre of a skewed distribution.\n\nA more fancy alternative\
    \ is to fit an ExGaussian distribution to your reaction time data. This is a combination\
    \ of a normal distribution and an exponential decay function, so it matches the\
    \ typical profile of a distribution of reaction times. The ExGaussian provides\
    \ you with a centre parameter (equivalent to the mean) and a deviation parameter\
    \ (equivalent to the standard deviation). The downside of using an ExGaussian\
    \ fit is that you need a lot of data for a good parameter estimation.\n\nFor simplicity’s\
    \ sake, here you can calculate a median and then use the regular way of calculating\
    \ the standard deviation and the standard error. These will do a decent job on\
    \ most datasets, and in these example datasets, they will work very well indeed.\
    \ That’s because the examples were completely fabricated by sampling random numbers\
    \ from a normal distribution. Note that this was done only for teaching purposes!\
    \ Fabricating data for other purposes is widely considered to be naughty.\n\n\
    Let’s return to the actual programming. You stuck all your Boolean arrays in a\
    \ single dict, so you can loop through them a bit easier. You can do this by creating\
    \ two for loops: one to go through the SOA conditions and one nested loop to go\
    \ through the validity conditions:\n\n```\n# loop through all SOAs\nfor soa in\
    \ [100, 900]:\n    # loop through all validities\n    for val in ['valid', 'invalid']:\n\
    ```\n\nWithin these for loops, you can calculate all the descriptives you need:\n\
    \n```\n# calculate statistics\nrt_m = numpy.median(data['RT'][sel[soa] & sel[val]])\n\
    rt_sd = numpy.std(data['RT'][sel[soa] & sel[val]])\nrt_sem = rt_sd / numpy.sqrt(len(data['RT'][sel[soa]\
    \ & sel[val]]))\nacc_m = numpy.mean(data['correct'][sel[soa] & sel[val]])\n# report\
    \ statistics\nprint('condition %d ms SOA, %s:' % (soa, val))\nprint('median RT=%.2f,\
    \ SD=%.2f, SEM=%.2f' % (rt_m, rt_sd, rt_sem))\nprint('proportion correct=%.2f\\\
    n' % (acc_m))\n```"
