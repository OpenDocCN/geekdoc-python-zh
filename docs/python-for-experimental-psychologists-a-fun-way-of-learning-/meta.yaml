    That looks confusing, so let’s break it down. `__file__` is a special variable.
    You don’t have to create it, Python does that for you. It contains a **path**
    to the Python script file. This could be, for example, ‘C:\example\analysis.py’.
    The inner (and thus the first!) function you use on `__file__` is `abspath`, which
    transforms the path into an absolute path. Paths can be defined in two ways: relative
    and absolute. A relative path would be “the folder that contains the folder that
    this script is in” (“.\this_script.py”), whereas absolute is “C:\top_level\second_level\this_script.py”.
