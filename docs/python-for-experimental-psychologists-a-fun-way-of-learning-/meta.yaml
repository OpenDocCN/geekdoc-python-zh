    \ you start with creating a new (empty) figure, then you draw the means and standard\
    \ errors for each condition, and you end by adding axis labels and a legend.\n\
    \nLet’s start with creating a new figure. Matplotlib has a very useful function\
    \ to create figures with one or more subplots in them. You can create one subplot\
    \ for the 100-ms SOA and one for 900 ms. You can add the following lines to `analysis.py`.\
    \ Make sure to add them the very end and without indentation!\n\n```\n# create\
    \ a new figure with two subplots\nfig, (ax100, ax900) = pyplot.subplots(nrows=1,\
    \ ncols=2,\n    sharey=True, figsize=(12.0, 6.8), dpi=200.0)\n```\n\nThe `subplots`\
    \ function creates a single **figure**, with multiple **axes**. In Matplotlib,\
    \ a figure is the background that contains a single or multiple subplots. Each\
    \ subplot is called an **axis**. The axes can be used to plot data.\n\nWhen you\
    \ call the `subplots` function, you can pass a number of keywords. Two of the\
