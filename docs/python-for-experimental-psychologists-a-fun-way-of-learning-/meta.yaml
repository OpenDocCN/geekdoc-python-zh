  md: '# # 7

    ## ANALYSING TRACES


    Now that you know how to analyse reaction time and accuracy data, it’s time to
    move on to something a bit more complicated: trace analysis. A trace can be any
    type of data that you collect continuously: pupil size, EEG, fMRI, force output,
    movement velocity, and so on. It doesn’t really matter where the trace comes from,
    the basic steps of the analysis are always the same: you collect the traces for
    individual trials, average them per condition, and then test when the traces are
    different between conditions.


    # ### 7.1 Pupil Size


    In this chapter, you will use an example dataset of pupillometry measurements.
    You can download it from the companion website. Put this file in a new empty folder.


    The data was collected in a very straightforward experimental design: participants
    looked at a computer monitor that had a grey fixation dot. Every few seconds the
    display changed from black to white or vice versa.


    The effect of lighting on pupil size is rather strong: the pupil contracts when
    the eyes are exposed to bright light, and it dilates when there is little light.
    The pupil is a bit slow to respond, though. Usually, a change in pupil size becomes
    apparent after about half a second (or a little under).


    The data in the example file was collected with an EyeLink 1000 (SR Research Ltd).
    This is an eye tracker: a fancy camera that can recognise and follow eyes and
    can measure the diameter (and surface area) of pupils. The EyeLink 1000 operates
    at 1,000 Hz, which means that it provides one snapshot of the pupil diameter every
    millisecond.


    # ### 7.2 PyGaze Analyser


