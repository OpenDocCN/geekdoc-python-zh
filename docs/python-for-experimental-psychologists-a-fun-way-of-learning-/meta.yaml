    \ `descr` 字典应该有两个键，每个键对应两个新的字典：100 和 900。实现这一点的更简单方法是在 `for soa in [100, 900]:`\
    \ 行之后直接添加以下内容：\n\n```\n    # 在 descr 字典中创建一个新的空字典\n    descr[soa] = {}\n```\n\n\
    现在，在第二个 for 循环内，在 `for val in ['valid', 'invalid']:` 之后，添加代码以向 `descr` 添加另一个字典（这次是每个有效性条件的键）：\n\
    \n```\n        # 在 descr 中嵌套另一个空字典\n        descr[soa][val] = {}\n```\n\n最后，在计算完值之后，你现在可以存储它们了。在\
    \ `acc_m = numpy.mean(data['correct'][sel[soa] & sel[val]]);` 行之后，添加：\n\n```\n\
    \            # 将计算出的值存储在 descr 中\n            descr[soa][val]['rt_m'] = rt_m\n\
    \            descr[soa][val]['rt_sd'] = rt_sd\n            descr[soa][val]['rt_sem']\
    \ = rt_sem\n            descr[soa][val]['acc_m'] = acc_m\n```\n\n在编辑器中运行你当前的脚本。在解释器中，你现在可以输入，例如\
    \ `descr[100]['valid']`（然后按回车）来获取 100 ms SOA 和有效条件的所有测量值。\n\n在字典中嵌套字典可能并不总是灵活数据分析的最佳选择。其他方法包括将数据存储在多维\
    \ NumPy 数组中，每个因素（SOA 和有效性）一个维度。你将在后面的章节中了解这种方法，届时你可以处理来自多个参与者的数据。\n\n## 6.5 绘制数据\n\
    \n既然你已经计算了单个参与者的平均值和平均值的标准误，你就可以绘制它们了。Matplotlib 的 `pyplot` 库提供了一系列函数来创建高质量的图形。定制选项的数量一开始可能有点让人不知所措，但你会习惯的。\n\
    \n绘制图形的步骤相当直接：你首先创建一个新的（空的）图形，然后绘制每个条件的平均值和标准误，最后添加坐标轴标签和图例。\n\n让我们从创建一个新图形开始。Matplotlib\
    \ 有一个非常有用的函数来创建包含一个或多个子图的图形。你可以为 100 ms SOA 创建一个子图，为 900 ms 创建一个子图。你可以将以下几行添加到\
    \ `analysis.py`。确保将它们添加到最末尾，并且不要缩进！\n\n```\n# 创建一个包含两个子图的新图形\nfig, (ax100, ax900)\
    \ = pyplot.subplots(nrows=1, ncols=2,\n    sharey=True, figsize=(12.0, 6.8), dpi=200.0)\n\
    ```\n\n`subplots` 函数创建一个包含多个 **axes** 的单个 **figure**。在 Matplotlib 中，figure 是包含一个或多个子图的背景。每个子图称为一个\
    \ **axis**。这些 axes 可以用来绘制数据。\n\n当你调用 `subplots` 函数时，可以传递一些关键字参数。其中两个关键字决定了 axes（子图）的数量：`nrows`\
    \ 是水平行的数量，`ncols` 是垂直列的数量。你要求一行两列，结果就是两个并排的图形。其他关键字与布局有关。`sharey` 和 `sharex` 是布尔值，指示所有子图是否应共享相同的\
    \ $y$ 轴和 $x$ 轴。`figsize` 以英寸为单位确定图形（包含所有子图的背景）的大小，而 `dpi` 确定**每英寸**的点数（像素）。一个宽\
    \ 12.0 英寸、高 6.8 英寸、DPI 为 200 的图形，其像素尺寸为 12.0 * 200 = 2,400 像素宽，6.8 * 200 = 1,360\
    \ 像素高。\n\n你可以创建一个条形图。在开始之前，了解你的条形将有多宽以及你希望它们之间有多少距离是很重要的。Matplotlib 认为条形图中的 $x$\
    \ 轴与散点图中的 $x$ 轴没有区别，这意味着你可以用数字定义每个条形的起始位置和宽度。例如，你的条形可以宽 0.4，它们之间的距离可以是 0.1。\n\n\
    ```\n# 定义条形图参数\nwidth = 0.4\nintdist = 0.1\n```\n\n在绘制条形时，你需要更新下一个条形的起始位置。例如，如果你在\
    \ 0.1 处绘制第一个条形，你会希望在 0.6 处绘制第二个。那是第一个条形的位置，加上它的宽度，再加上条形之间的距离。\n\n```\n# 定义第一个条形的起始位置（左边缘）\n\
    barpos = 0.1\n```\n\n最后要决定的是你想为哪个条件使用哪种颜色。你可以将它们存储在一个字典中。Matplotlib 识别各种颜色格式：内置颜色缩写（例如\
    \ 'b' 表示蓝色，或 'g' 表示绿色）、值在 0 到 1 之间的 RGB 分量（例如 (1,0,0) 表示红色）、HTML 颜色名称（例如 'red'、'burlywood'\
    \ 或 'chartreuse'）以及十六进制值（例如 '#ff69b4' 表示粉红色）。\n\n```\n# 定义条形颜色\ncols = {'valid':'#4e9a06',\
    \ 'invalid':'#ce5c00'}\n```\n\n是时候绘制你的结果了。创建一个新的 for 循环，遍历有效性条件：\n\n```\nfor val\
    \ in ['valid', 'invalid']:\n```\n\n在 for 循环内，使用 axes 的 `bar` 方法绘制一个条形。这需要条形的起始点、高度和宽度。宽度和位置已经确定了。高度由数据决定（这里是中位数\
    \ RT）。你还可以通过 `yerr` 关键字传递一个值来创建误差线。通常，你希望这是标准误。最后，你还可以定义一个标签，它可以是任何字符串。标签会出现在图例中。\n\
    \n```\n# 绘制 100 ms SOA 的中位数反应时\nax100.bar(barpos, descr[100][val]['rt_m'],\n \
    \         width=width, yerr=descr[100][val]['rt_sem'],\n          color=cols[val],\
    \ ecolor='black', label=val,\n          align=\"edge\")\n```\n\n你也应该为 900 ms SOA\
    \ 做同样的操作：\n\n```\n# 绘制 900 ms SOA 的中位数反应时\nax900.bar(barpos, descr[900][val]['rt_m'],\n\
    \          width=width, yerr=descr[900][val]['rt_sem'],\n          color=cols[val],\
    \ ecolor='black', label=val,\n          align=\"edge\")\n```\n\n绘制完条形后，你应该更新下一个条形的位置。如果你忽略了这一点，所有的条形都会重叠绘制！\n\
    \n```\n# 更新条形位置\nbarpos += width + intdist\n```\n\n在 for 循环内绘制完数据后，你应该让图形更清晰。首先添加一个\
    \ y 轴标签（只添加到第一个子图，因为两个图形共享相同的 y 轴）。添加以下行，但不要缩进！\n\n```\n# 为左侧图形添加 y 轴标签\nax100.set_ylabel('median\
    \ reaction time (ms)')\n```\n\n你可以通过调用每个 axes 的 `legend` 方法来添加图例。这会向图形添加一个图例，只列出你明确标记的数据。你可以自己选择位置，或者让它自动设置到最佳位置。位置标签是\
    \ 'upper'、'center' 或 'lower'（表示垂直位置）与 'left'、'center' 或 'right'（表示水平位置）的组合。也可以是\
    \ 'best' 来自动选择最佳位置（Matplotlib 会尝试避免将图例绘制在其他任何东西上面）。\n\n```\n# 为右侧 axes 添加图例\n\
    ax900.legend(loc='upper right')\n```\n\n因为你添加了图例，x 轴就变得不必要了（它们都标注了 SOA）。你可以使用以下代码隐藏它：\n\
    \n```\n# 隐藏 x 轴\nax100.get_xaxis().set_visible(False)\nax900.get_xaxis().set_visible(False)\n\
    ```\n\n最后，你可以设置显示图形的比例尺。你可以将 x 轴设置为从 0 到下一个条形位置（左右留出相等的空间）。y 轴可以从 100 到 1,000，这是反应时通常所在的范围。\n\
    \n![](img/07ad901823abb0ad885d2b362f9446b0_134_0.png)\n\n图 6.1 这是有效（浅色）和无效（深色）条件的反应时条形图的样子。左侧面板是\
    \ SOA 为 100 毫秒的情况，右侧面板是 SOA 为 900 毫秒的情况。"
