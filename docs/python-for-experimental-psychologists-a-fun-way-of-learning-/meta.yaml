  md: "Units to use if you require the same physical size of stimulus across monitors\
    \ include centimetres and degrees of visual angle. However, these units require\
    \ PsychoPy to know exactly how many pixels can fit into a centimetre on your monitor\
    \ and how far a participant is sitting from the monitor. If you are using PsychoPy\
    \ Coder view, you can provide this information using Monitor Centre. If you are\
    \ using another development environment (e.g. Spyder), you can set up your own\
    \ monitor by importing PsychoPy’s monitors module and then specify that monitor\
    \ in the window so that it can use units like centimetres and degrees of visual\
    \ angle:\n\n```\nfrom psychopy import visual, monitors\n\n# set up the monitor\n\
    mon = monitors.Monitor('labMonitor', width=1280,\n    distance=57, gamma=None)\n\
    \n# make a window to draw things in\nwin = visual.Window(size=[1024, 768], fullscr=False,\n\
    \    units='pix', color=(0,0,0), colorSpace='rgb',\n    screen=0, monitor=mon)\n\
    ```\n\nIf your experiment will be satisfied with the same relative size of stimulus\
    \ across monitors. PsychoPy offers height or normalised units:\n\n+   - Height\
    \ units correspond to the height of your window: 1 unit of height is the total\
    \ distance from the bottom to the top of the window, -0.5 is the bottom edge of\
    \ the window, and 0.5 is the top edge of the window. If you imagine a perfect\
    \ square that is as wide as it is tall, -0.5 would be the left edge of that square,\
    \ and 0.5 the right edge of that square.\n- Normalised units range between -1\
    \ and 1 and represent relative distances. On a monitor with a resolution of 1920\
    \ × 1080 pixels, a horizontal distance of -1 (left edge of the monitor) to 0 (monitor\
    \ centre) will correspond to 960 pixels. On a monitor with a resolution of 1024\
    \ × 768, the same horizontal distance will correspond to 512 pixels.\n\nIn this\
    \ book, you will always use pixels. The upside is that this is the most conventional\
    \ and straightforward unit of distance on a computer monitor. The downside is\
    \ that pixels are specific to your monitor: a stimulus with a size of 200 pixels\
    \ will have a different size in centimetres on two different monitors, because\
    \ pixel sizes differ between monitors. Fortunately, you can measure how wide your\
    \ monitor is and calculate the amount of pixels per centimetre. From that, you\
    \ can calculate a stimulus’ size in centimetres and ultimately its size in visual\
    \ angle (using the distance between participant and monitor).\n\nAnother important\
    \ aspect of PsychoPy is that it uses a different colour space, which determines\
    \ how colours are defined. Typically, monitors produce colour with values for\
    \ red, green, and blue that range from 0 to 255.\n\nIn PsychoPy, colours can also\
    \ be defined as values for red, green, and blue. However, these values range between\
    \ -1 and 1. The logic behind this is that colours can be represented as deviations\
    \ from grey, which is defined as (0,0,0). Some additional examples: (-1, -1, -1)\
    \ is black, (1, 1, 1) is white, and (1, -1, -1) is red."
