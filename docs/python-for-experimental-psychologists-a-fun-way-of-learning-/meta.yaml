    The first line might indicate your user name and/or location (e.g. “C:\”, which
    is a folder on your computer).


    Now that you have opened a terminal, you can type python (or python3 on some Linux
    distributions) and then press Enter. This should access a Python interpreter.
    You can check if it worked by reading the text that has now appeared. It should
    mention “Python”, your version number and the current date and time. You should
    make sure the version number starts with a “3”.


    If you installed PsychoPy Standalone, Anaconda, or WinPython, accessing Python
    interpreters works slightly differently. On PsychoPy Standalone, run the application
    from your operating system, and then launch a new code editor window (running
    the code should happen in an interpreter). If you are using WinPython, simply
    open the WinPython folder and open WinPython Interpreter.exe. With Anaconda, start
    Anaconda Command Prompt from the Anaconda launcher.


    In the first chapters of this book, you will primarily use the interpreter. It’s
    a great tool to get to know the basic concepts. Once you get to the point of writing
    actual scripts, the book will switch to using a script editor.


    # 1.3 Editor


    A script editor is a bit like Open/LibreOffice Writer or Microsoft Word: it allows
    you to write text and typically has features that make this easier (such as syntax
    highlighting).'
