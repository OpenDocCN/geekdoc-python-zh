  md: '# 9.2 T-tests


    Some of the most basic questions in science are about differences: “I can hold
    my breath for a few minutes; is that better than others?”, “Are the brains of
    cats smaller than those of dogs?”, or “I’ve recently started on a new drug; are
    my poops bigger now?”. These questions often come down to the more generic questions
    of: “Is my measurement different from what I expected?” and “Is group A different
    from group B?”


    One way to address the above questions is by using t-tests. These formalise what
    a difference is and when we consider it “statistically significant”. There are
    different flavours of t-tests, each with their own specific purpose. What is common
    among all of them is computing a t-value and comparing this t-value to a t-distribution.
    If a t-value is very extreme, we could consider it “significant”.


    A t-distribution looks a lot like a normal distribution, but it comes with an
    exciting addition: **degrees of freedom**. Under infinite degrees of freedom,
    the t-distribution tends towards the standard normal distribution (with a mean
    of 0, and a standard deviation of 1). However, as the degrees of freedom decrease,
    the tails of a t-distribution come up. This means more extreme values are more
    probable under fewer degrees of freedom.


    I hear you thinking: what are degrees of freedom? Let’s say you’re estimating
    the variance of a sample like we did a little while ago. You used a number of
    independent observations to do so, for example the heights of individuals in your
    sample. You also used another parameter to compute the variance, namely the average
    height. The degrees of freedom for the variance are the number of observations
    minus the one parameter you used to compute it. In other words, the degrees of
    freedom for a parameter estimate are n – k, i.e. the sample size minus the number
    of parameters used to compute the parameter. For t-tests, this will be n – 1.


    # 9.2.1 What Is a p-Value?


    Using the t-distribution and a computed t-value, you can compute a **p-value**.
    This value reflects the probability of finding your observed t-value or a more
    extreme one, *assuming that the null hypothesis is true*. (The null hypothesis
    here is that there is no difference, which would mean t-values are expected to
    be distributed around 0.)


    The p-value is NOT the probability that your hypothesis is true. It is also NOT
    the probability of finding your data by chance. The p-value of a single study
    is also NOT akin to an effect size or level of evidence (i.e. lower does not mean
    “bigger difference” or “more evidence”).


    Once more, for the people in the back (and the overconfident students who skipped
    classes and underperformed on my exams): “The p-value is the probability of observing
    a t-value that is as high or more extreme than the observed t-value, under the
    assumption that the null hypothesis is true”.


    When the null hypothesis is true, p-values are uniformly distributed: they are
    just as likely to be 0.01 as they are to be 0.50 or 0.99. When the alternative
    hypothesis is true, then p-values are skewed: they are now more likely to be towards
    0, then they are to be towards 1. How skewed they are depends on the magnitude
    of the difference.


    If someone says a result is “statistically significant”, what they really mean
    is that their p-value was lower than some arbitrary threshold. Often, this is
    set at 0.05. If the null hypothesis is true, p-values are uniformly distributed
    between 0 and 1, and thus there is'
  merge: -1
  pgno: 180
- img_proc: true
  md: 'a 5% chance that the p-value is 0.05 or lower. However, if the null hypothesis
    is not true, p-values are skewed, and thus, the chance that a p-value is lower
    than 0.05 is larger than 5%. How much larger depends on the effect size, with
    very small differences only increasing the chances by a little bit.


    Another important factor is sample size. Increasing the sample size will decrease
    the standard error of the mean, which in turn increases the t-value (you will
    see why in the next sections), and it also increases the degrees of freedom. Both
    of these factors will further skew the distribution of p-values.


    # 9.2.2 One-Sample t-test


    Imagine you have measurements from a single sample of individuals, and you also
    have a very specific hypothesis about what these should be. For example, you might
    be the CEO of a cooperation that has systematically dumped chemical waste in lakes
    around your factories, and as a consequence people in local communities have accused
    you of poisoning their drinking water. Oops! As a consequence of the tap water
    quality, local residents have turned to bottled water. You saw this business opportunity
    and branched out to siphoning public water reserves into your own production of
    bottled water. Unfortunately, residents now complain that your bottles are leaching
    microplastics into the water they contain, and that this is harmful to them and
    their offspring. Not this again!


    Fortunately, you''re quite sure that your chemicals in the tap water and the microplastics
    in your bottled water are totally safe! You just have to run a quick study to
    confirm this. People are complaining that their babies'' birth weights have substantially
    dropped since you started poisoning their water and then started selling them
    potentially dodgy water. You, on the other hand, think there is nothing wrong
    with poisoning enriching local lakes and commercial bottles of water. You thus
    ask a local hospital to produce their anonymised records of birth weights in the
    last year. You also know that the average birth weight was 3499 grams at 40 weeks''
    gestation (Duryea et al., 2014) in the wider population. Your question is thus:
    is the distribution of birth weights different from the national average?


