  md: 'At this point, you might wonder how this related-samples t-test actually works.
    It’s inner workings rely on the fact that your data come from repeated measurements
    within the same individuals. (We call this a **within-participant** design.) This
    means you can compute a difference score between each of these measurements:


    ```

    # Compute the difference between delays before

    # and after your intervention.

    difference = pre - post

    ```


    This difference is a single collection of observed values. Your null hypothesis
    is that there is no difference, so you expect the average difference to be 0.
    As you’ve just learned, you could use a 1-sample t-test to test if the differences
    are different from 0:


    ```

    t, p = ttest_1samp(difference, 0.0)


    print(t, p)

    ```


    What?! Those are the exact same values as before!! So it turns out that a related-samples
    t-test is actually just a one-sample t-test in a trench coat!


    # 9.2.4 Independent-Samples t-test


    Previously, we only had to compare a single sample to an expected mean, or we
    cleverly used relations in the data to come up with a single set of differences
    from two measurements within a sample. Now let’s turn to a slightly more complicated
    problem: differences between two different groups!


    **Between-participant** designs are for when you are testing two completely different
    groups, like metallurgists and dolphins. The independent-samples t-test allows
    you to see if a feature you measure is different between these groups. The general
    principle is the same as for the other t-tests: you first compute the difference
    in means between the groups, and you divide it by a measure of the variability.
    Just like before, this is a bit like a signal-to-noise ratio, and you’re trying
    to determine if the difference you found is within the realm of expectation or
    over.


    As we are dealing with two samples, there are now two variances to contend with:
    one for each group. If the samples are of equal size and variance, pooling them
    together isn’t particularly troublesome. However, problems arise when samples
    are of unequal size, and even more trouble occurs if the variances are unequal.
    The reasons behind why these are issues are a bit beyond the scope of this chapter,
    but if you’d like a flavour, just look up the Welch-Satterthwaite equation.


    Fortunately, SciPy’s `stats` module offers a clean and simple solution: the `ttest_ind`
    function! This function has a keyword argument, `equal_var`, that you can set
    to `False`. This applies the appropriate correction if your samples are indeed
    of unequal variance. However, there is no harm in using it on samples with equal
    variance: the correction tends towards the basic independent-samples t-test if
    the sample sizes and variances are more similar.


    ```

    from scipy.stats import ttest_ind


    # Define a feature that is different between

    # metallurgists and dolphins.

    ```'
