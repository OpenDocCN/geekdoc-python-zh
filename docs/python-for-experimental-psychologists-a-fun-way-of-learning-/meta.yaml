    ## 2.5.5 Dictionaries


    The final set you should learn about is called a **dictionary**, which is known
    by the abbreviation **dict** within Python itself. You can think of a dict like
    an actual dictionary, in that it has **keys** that can be used to look up a **value**,
    much like words in a dictionary can be used to look up their meaning, for example,
    in an English-Dutch dictionary the key “monkey” points to the value “aapje”, and
    the key “banana” points to the value “banaan”. (You''ll thank me for this highly
    practical example if you ever visit Amsterdam.)


    In Python, these examples in a dict would look like the following:


    ```

    english_dutch = {''monkey'':''aapje'', ''banana'':''banaan''}

    ```


    You can recognise the dict by its curly brackets and by the colon between a key
    and its associated value. As for lists and types, you use commas to separate the
    entries.


    ## 2.6 Variable Types


    A dict is somewhat like a list, in the sense that it is a variable that can hold
    more than one value at a time. However, the way you index these values is quite
    different! Take a look at this:


    ```

    a = {0:1, 1:2, 2:3}

    b = [1, 2, 3]


    print(a[0], b[0])

    print(a[1], b[1])

    print(a[2], b[2])

    ```


    Currently, variable a (a dict, recognise it by the curly brackets) seems like
    a more elaborate version of variable b (a list). However, there is one big difference:
    in a list you can access values by using their index number, whereas in a dict
    this index is called a key. And keys can be any number or string you would like
    them to be! Next example:


    ```

    a = {''banana'':1, ''horse'':2, 19:1, 3:''cookie''}


    print(a[''banana''])

    print(a[''horse''])

    print(a[3])

    print(a[19])

    ```


    Cool, right? You can also add new entries to your dict after creating it:


    ```

    a[''answer''] = 42

    print(a)

    ```


    Using dicts can be very useful, for example if you want to store all data from
    one participant into the same variable. You could create a dict with keys “RT”
    for the response times and “accuracy” to indicate whether a response was correct.
    Or you could create a dict for all data, with keys for every participant. Each
    of these keys could point to the aforementioned dicts for single participants,
    which had keys for all your measures:


    ```

    data = {}

    data[''subject-1''] = {''RT'':[300, 256, 115], ''acc'':[1, 1, 0]}

    data[''subject-2''] = {''RT'':[400, 512, 268], ''acc'':[1, 0, 1]}

    ```


    As you can see, dicts can contain any kind of value, including other (nested)
    dicts.


    ## 2.7 Classes


    Before we go on to the good stuff, there is one more type of variable that you
    need to know. This is a very important one and a fundamental part of the Python
    language.


    Take a step back from programming for a second. If there is a window, take a look
    outside. If not, try to find better accommodation, because working without windows
    is awful. Can you see a car? And maybe another? If you can’t, just imagine two
    different cars. (But don’t make them too different!) The two cars are obviously
    similar: they both have four wheels, a steering wheel, a motor, windows, etc.
    However, they are also obviously different: they might have different colours,
    different types of wheels, different motors, and so on.


    You could think of the cars as two **instances** of the same **class**. They were
    built by using the same general blueprint that dictates wheels go on the bottom,
    lights on the front and the back, and that the steering wheel should be inside
    (preferably at the front). However, the cars were built using different types
    of wheels, different shapes of lights, and different types of steering wheels
    (one could be covered in leather, and the other in pink fluff). The blueprint
    is a car’s definition, whereas a car is a specific realisation of the blueprint.


    If you understand this example, you understand the basic principle of **object-oriented
    programming**. In this style of programming, we would refer to the blueprint as
    a **class** and to a specific car as an **instance**. Instances can also be referred
    to as objects, hence the name “object-oriented”.


    In programming, objects can have **properties** and **methods**. Properties are
    internal variables that define an individual instance’s settings (think of a car’s
    colour). Methods are internal functions that determine what each instance of a
    class can do (think of a car’s ability to drive).


    In Python, all variable types are essentially objects. That is a bit of trivia
    you will not likely use when programming, but it comes in handy when you want
    to impress people at a dinner party:


    > Nerd 1: “I am *such* a programmer, I am *acing* Java.”

    > Nerd 2: “Screw Java, I’m learning Go – did you know *Google* made that?”

    > Nerd 3: “I learned C++ in just *21 days*!”

    > You: “Pffft, C++ is just a silly way to make C object-oriented. Did you know
    Python was *designed* to be object-oriented? All variable types are really just
    objects.”


    (Be careful not to do this when more experienced programmers are around. Escape
    by pointing somewhere, asking “Is that R2D2?”, and then making a run for it.)


    Python and most external packages offer really useful classes that can do just
    about anything. Displaying stuff on the screen? There’s a class for that. Registering
    keyboard input? There’s a class for that. Communicating to an eye tracker? There’s
    a class for that. In the next chapters, we will explore all of these.


    ## 2.8 Functions


    Remember how you were promised that after learning about classes, you would get
    to do fun stuff? That was a lie. You need to learn about functions first. These
    aren’t really a type of variable, but they are in a way. You don’t have to worry
    about what they are precisely, but you should know that functions are a very important
    part of any programming language.


    A **function** is nothing more than a collection of code that does a specific
    thing or a few specific things. If you think that’s a pretty vague definition,
    you’re absolutely right. You can think about functions as descriptions of a task,
    such as building a bird house. Such a task requires input, like materials (wood,
    nails, and glue) and specifications (the house’s dimensions). It also has an output:
    a bird house. The function itself would be a description of how to build the bird
    house.'
