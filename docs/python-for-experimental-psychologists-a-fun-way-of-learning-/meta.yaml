- md: "## 9.2.4 Independent-Samples t-test\n\nPreviously, we only had to compare a\
    \ single sample to an expected mean, or we cleverly used relations in the data\
    \ to come up with a single set of differences from two measurements within a sample.\
    \ Now let’s turn to a slightly more complicated problem: differences between two\
    \ different groups!\n\n**Between-participant** designs are for when you are testing\
    \ two completely different groups, like metallurgists and dolphins. The independent-samples\
    \ t-test allows you to see if a feature you measure is different between these\
    \ groups. The general principle is the same as for the other t-tests: you first\
    \ compute the difference in means between the groups, and you divide it by a measure\
    \ of the variability. Just like before, this is a bit like a signal-to-noise ratio,\
    \ and you’re trying to determine if the difference you found is within the realm\
    \ of expectation or over.\n\nAs we are dealing with two samples, there are now\
    \ two variances to contend with: one for each group. If the samples are of equal\
    \ size and variance, pooling them together isn’t particularly troublesome. However,\
    \ problems arise when samples are of unequal size, and even more trouble occurs\
    \ if the variances are unequal. The reasons behind why these are issues are a\
    \ bit beyond the scope of this chapter, but if you’d like a flavour, just look\
    \ up the Welch-Satterthwaite equation.\n\nFortunately, SciPy’s `stats` module\
    \ offers a clean and simple solution: the `ttest_ind` function! This function\
    \ has a keyword argument, `equal_var`, that you can set to `False`. This applies\
    \ the appropriate correction if your samples are indeed of unequal variance. However,\
    \ there is no harm in using it on samples with equal variance: the correction\
    \ tends towards the basic independent-samples t-test if the sample sizes and variances\
    \ are more similar.\n\n```python\nfrom scipy.stats import ttest_ind\n\n# Define\
    \ a feature that is different between\n# metallurgists and dolphins.\n# (Identifying\
    \ this feature is left as an\n# exercise to the reader.)\nmetal = [89, 137, 56,\
    \ 104, 78, 29, 65, 67, 73, 84]\ndolphin = [530, 642, 591, 593, 627, 595]\nt, p\
    \ = ttest_ind(metal, dolphin, equal_var=False)\nprint(t, p)\n```\n\nIn sum, independent-samples\
    \ t-tests are a bit more complicated than related-samples t-tests, but with the\
    \ `ttest_ind` set to `equal_var=False`, you should mostly be safe.\n\n## 9.3 Correlation\n\
    \nSo far, we’ve talked about differences. But sometimes we’re interested in whether\
    \ things are similar. To this end, we can use correlation: the tendency for different\
    \ measurements to vary in similar ways. For example, things like people’s salary,\
    \ the number of minutes they listen to Taylor Swift per day, and how often their\
    \ spouse talks about mechanical keyboards all correlate with life satisfaction\
    \ [citation needed].\n\nCorrelation is the bad boy of statistical tests, because\
    \ everyone always warns you about them. They’ll say “Correlation does not equal\
    \ causation! The number of Nicholas Cage films correlates with the number of swimming\
    \ pool drownings in the USA!” Speaking of that wonderful actor: correlation is\
    \ the Nick Cage of stats: Oscar-worthy when used appropriately, but the results\
    \ can be unintentionally funny when used inappropriately.\n\n### 9.3.1 Covariance\n\
    \nWe previously looked at t-tests and noted that they quantified sample differences\
    \ with (kind of) signal-to-noise ratio. They did so by dividing differences between\
    \ means by a measure derived from sample variance(s). Correlations are highly\
    \ similar, but instead of differences, they quantify association between two samples.\
    \ The magnitude of this association is then compared against, you guessed it,\
    \ a measure derived from sample variance.\n\nAssociations between two variables\
    \ can be quantified as their covariance. Computing this comes down to looking\
    \ at how far individuals are from the group mean on both variables. For example,\
    \ I might spend more time reading about pigeon flight than the average person,\
    \ and my quality of life score might also be higher than the average. Some of\
    \ my colleagues, on the other hand, don’t care for pigeons for some reason (?!),\
    \ and I can only assume their quality of life is lower than the average. This\
    \ is covariance: when you score high on pigeon interest, you also score high on\
    \ quality of life; but when you score low on pigeon interest, you score low on\
    \ quality of life. Thus, if you were to multiply both distances from the group\
    \ mean, you would end up with a high value. The mean (across all people in your\
    \ sample) of all of these multiplied differences is the covariance.\n\nCovariance\
    \ works when two variables are high or low at the same time within each participant:\
    \ multiplying two positive values ends with a positive value but so does multiplying\
    \ two negative values! However, it also works for when one variable is high but\
    \ the other is low (and vice versa) within each participant. In this case, the\
    \ multiplication is of one positive and one negative number, or one negative and\
    \ one positive number; and both end up as a negative value.\n\nCovariance will\
    \ be low if people are not consistent in their scores. Some people will score\
    \ higher than the mean on two variables, but others will score higher than the\
    \ mean on one and lower on the other, and yet others will score lower on the first\
    \ and higher on the second. If this is the case, the result is a nice mixture\
    \ of positive and negative values, which will average out to around 0: no covariance!\n\
    \n### 9.3.2 Pearson’s R Coefficient\n\nYou can think Pearson’s correlation coefficient\
    \ R is computed as the ratio of covariance and variance. It is computed by dividing\
    \ the covariance between two variables by the product of the standard deviations\
    \ of those variables. R varies from –1 for a completely negative correlation via\
    \ 0 for no correlation, to 1 for a completely positive correlation. Such a complete\
    \ correlation would mean that for every difference in one variable, the difference\
    \ in the other variable is the exact same. So if I score 1 standard deviation\
    \ above the mean for reading about pigeons, I would also be one standard deviation\
    \ above the mean on a quality-of-life questionnaire.\n\nIn Python, you can simply\
    \ use SciPy’s `stats` module to compute R and an associated p-value, by using\
    \ the `pearsonr` function:\n\n```python\nfrom scipy.stats import pearsonr\n\n\
    x = [1.4, -0.7, -0.9, 0.4, 0.3,\n     -0.1, 1.0, -0.3, -0.2, 1.1]\ny = [0.9, -0.6,\
    \ -0.7, -0.3, 0.5,\n     0.1, -0.2, -0.5, 0.3, 0.8]\nr, p = pearsonr(x, y)\nprint(r,\
    \ p)\n```\n\nThe p-value for a correlation quantifies the probability of finding\
    \ an R value like the observed or more extreme, assuming that no correlation exists\
    \ between the two variables.\n\n### 9.3.3 Spearman’s ρ Coefficient\n\nPearson’s\
    \ correlation coefficient R suffers from extreme values. When these are present\
    \ in either variable, this impacts the covariance computation, and they can disproportionately\
    \ pull on the R value. In these cases, you could opt for using non-parametric\
    \ tests of correlation. One such metric is Spearman’s rank correlation coefficient\
    \ ρ.\n\nThe beauty of ρ is that it works exactly the same as R: it is the standardised\
    \ covariance, i.e. the covariance between two variables divided by the product\
    \ of their standard deviations. However, we employ a little trick first to get\
    \ rid of those pesky extreme values! Instead of using the actual data, we use\
    \ their rank-order instead. For the example above, the rank orders would be like\
    \ this:\n\n```python\nx_rank = [10, 2, 1, 7, 6, 5, 8, 3, 4, 9]\ny_rank = [10,\
    \ 2, 1, 4, 8, 6, 5, 3, 7, 9]\n```"
