- img_proc: true
  md: "opposite block order). Let's begin with a randomised block design, since this\
    \ is the simpler of the two.\n\nThe first step would be to import the blocks spreadsheet\
    \ as you would a normal spreadsheet:\n\n```\n# import spreadsheet of trials\n\
    blocksheet = data.importConditions('blocks.xlsx')\n```\n\n```\n# make a trial\
    \ handler for the blocks\nblocks = data.TrialHandler(trialList=blocksheet, \\\
    nnReps=1, method='random')\n```\n\n```\n# give this block of trials to the experiment\
    \ handler\nthisExp.addLoop(blocks)\n```\n\nNext, we want to next everything we\
    \ currently have for working through a set of trials inside another loop that\
    \ loops through our blocks. The start of our first loop would therefore loop like\
    \ this:\n\n```\nfor block in blocks:\n    # import spreadsheet of trials\n   \
    \ conditions = data.importConditions(block['blockfile'])\n\n    # make a trial\
    \ handler\n    trials = data.TrialHandler(trialList=conditions, \\n        nReps=5,\
    \ method='random')\n\n    # give this block of trials to the experiment handler\n\
    \    thisExp.addLoop(trials)\n\n    # set the opacity of the cue for this block\n\
    \    cue.setOpacity(block['cueopacity'])\n```\n\nNote that in this framework,\
    \ we are making a new trial handler on each iteration of our blocks loop. This\
    \ will create the set of trials corresponding to this block, and we use blocks['blockfile']\
    \ to specify the spreadsheet to use to create the trials for this specific block.\
    \ Furthermore, we also set the opacity of the cue at the start of the block cue.setOpacity(blocks['cueopacity'])\
    \ so that it will be visible in our experimental block but invisible in our neutral\
    \ block. Everything else can also be further indented one level so that our trials\
    \ loop is nested in our blocks loop.\n\nNote that the key here is that when we\
    \ made our blocks trialHandler, we set method='random'. This means we will present\
    \ conditions.xlsx and neutral.xlsx in a random order, resulting in a randomised\
    \ block design.\n\n# 5.6.2 Counterbalanced Block Designs\n\nIn order to present\
    \ a counterbalanced block design, we want to know the specific order in which\
    \ our blocks are presented. In our existing example, we could ensure that the"
