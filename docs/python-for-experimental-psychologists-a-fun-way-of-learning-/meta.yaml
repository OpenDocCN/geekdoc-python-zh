    \ (You could also consistently round up or down, depending on your preferences.)\n\
    \nTo calculate the number of frames to present our stimulus and calculate how\
    \ far off we would be, we could use:\n\n```\n# the intended stimulus duration\
    \ in seconds\ndesired_time = 0.420\n\n# monitor frame rate\nframerate = 60\n#\
    \ compute the time per frame in seconds\nframetime = 1.0 / framerate\n\n# total\
    \ frames required to get close to desired times\nnFrames = round(desired_time*framerate)\n\
    \n# print how far off we will be\nprint('Stimulus will be presented for {} frames'.format(\n\
    \    nFrames))\n\nprint('Actual time will be {:.3f} seconds'.format(\n    nFrames*frametime))\n\
    ```\n\nWe can then use this number of frames in a loop to present our stimulus.\
    \ So, instead of:\n\n```\nfor letter in myLetters:\n    letter.draw()\n\nwin.flip()\n\
    core.wait(0.420)\n```\n\nWe could use:\n\n```\n# run through the desired number\
