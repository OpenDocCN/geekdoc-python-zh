- md: "## 5.1 Make a Single Trial\n\nTo start with, let's create a new .py file and\
    \ call it experiment.py. It is a good idea when starting to create an experiment\
    \ to start with a new folder, which will contain only the files required to run\
    \ this experiment. Now, let's think about the timing of this experiment. Each\
    \ trial will consist of five different screens:\n\n| Screen | Timing | Description\
    \ |\n|---|---|---|\n| Fixation | 1,500 ms | Gives participants time to prepare\
    \ for the next trial |\n| Cue | 50 ms | Attracts attention to either the left\
    \ or the right |\n| Fixation | Depends on SOA | A neutral screen between cue and\
    \ target |\n| Target | Until response | Displays a target for participants to\
    \ respond to |\n| Feedback | 1,000 ms | Feedback to motivate the participant |\n\
    \nlocations of the cue and the target. If both appear on the same location, the\
    \ cue was valid: it correctly predicted the target. If the target appears on a\
    \ different location than the cue, the cue was invalid. The rate at which the\
    \ cue is valid is referred to as the validity. A 50% validity means that half\
    \ of the cues accurately predict the target location and the other half do not.\n\
    \nIn experimental psychology, one would predict the results as follows: if the\
    \ SOA is short (100 ms), there will be lower reaction times and higher precision\
    \ for responses to a validly cued target (compared to an invalidly cued target).\
    \ However, if the SOA is high (900 ms), there will be higher reaction times and\
    \ lower precision for validly cued targets (compared to invalidly cued targets).\
    \ In other words, we expect an interaction between SOA and trial validity: a valid\
    \ cue results in a brief period of facilitated attention for the cued location,\
    \ followed by a period of inhibition of return of attention to the cued location.\n\
    \n### 5.1.1 Presenting Stimuli in Our Experiment\n\nNow we know what constitutes\
    \ a trial, we can start by importing the modules we think we will need for a trial.\
    \ We know we present visual things, that we may want to halt the screen and that\
    \ we will use keyboards to gather responses:\n\n```python\nfrom psychopy import\
    \ visual, core, event\nfrom psychopy.hardware import keyboard\n```\n\nNext, we\
    \ can make our window a keyboard instance so that we have a window to present\
    \ things in and a way of watching for key events:\n\n```python\n# make a window\n\
    win = visual.Window(size=[1024, 768],\n    fullscr=False, units='pix', color=(0,0,0),\n\
    \    colorSpace='rgb', screen=0)\n\n# make a keyboard instance\nkb = keyboard.Keyboard()\n\
    ```\n\nFinally, we can make our stimuli that we intend to present:\n\n```python\n\
    # a fixation point\nfixation = visual.TextBox2(\n    win,\n    text='+',\n   \
    \ pos=(0, 0),\n    letterHeight=20,\n    alignment='center'\n)\n\n# an arrow for\
    \ our cue\narrowVert = [[-20, 5], [-20, -5], [0, -5],\n    [0, -10], [20, 0],\
    \ [0, 10], [0, 5]]\n\ncue = visual.ShapeStim(win, vertices=arrowVert,\n    fillColor='darkred',\
    \ size=2, pos=[0, 0],\n    lineColor='red')\n\n# a circle for our target\ntarget\
    \ = visual.Circle(win, size=20, pos=[-300, 0],\n    lineColor='white', fillColor='lightGrey')\n\
    ```\n\nWe can now apply what we learnt in Chapters 3 and 4 to present our stimuli\
    \ and wait for a response. Remember, the easiest method is as follows:\n\n```python\n\
    # draw the fixation\nfixation.draw()\nwin.flip()\ncore.wait(1.5)\n\n# draw the\
    \ cue\ncue.draw()\nwin.flip()\ncore.wait(0.05)\n\n# draw the target\ntarget.draw()\n\
    win.flip()\n\n# wait for a response\nkeys = kb.waitKeys(keyList=['left', 'right',\
    \ 'escape'])\n```\n\nBut a more accurate approach is to present stimuli in terms\
    \ of frames. Now, when we are making experiments, we hopefully plan to share our\
    \ code one day, for other researchers conducting similar experiments. We therefore\
    \ want to think ahead on what will be most intuitive for future you and future\
    \ researchers using your code. So, even though we want to present stimuli in terms\
    \ of frames, allowing researchers to specify a desired time in seconds would be\
    \ useful. So, let's repurpose that conversion code that we created in Chapter\
    \ 3:\n\n```python\n# time, in seconds, we want\ndesired_time = 1.5\n\n# monitor\
    \ frame rate\nframerate = 60\n\n# total frames required to get close to desired\
    \ times\ntotalframes = int((framerate/1.0)*desired_time)\n\n# print how far off\
    \ we will be\nprint('Stimulus will be presented for ',\n      totalframes, ' frames')\n\
    print('Actual time will be ', totalframes/framerate)\n```\n\nWe could then use\
    \ this number of frames in a loop to present our stimulus. So, use:\n\n```python\n\
    for frameN in range(totalframes):\n    fixation.draw()\n    win.flip()\n```\n\n\
    ### 5.1.2 Using Functions in Experiments\n\nWe have several stimuli we want to\
    \ present in terms of frames, so this conversion between seconds and frames is\
    \ probably something we will want to use again and again. This is the perfect\
    \ scenario for a function in our experiment (which we were introduced to in Section\
    \ 2.7). Let’s make a function to convert seconds to frames that can be used several\
    \ times in our experiment:\n\n```python\ndef secs2frames(desired_time, framerate=60):\n\
    \    '''\n    A function to convert desired time in seconds\n    to frames\n\n\
    \    Input:\n        desired_time (float) - desired time in seconds\n        framerate\
    \ (int) - screen refresh rate\n\n    Output:\n        nFrames (int) - the number\
    \ of frames required\n                        to present as close as possible\
    \ to desired\n                        time in seconds.\n    '''\n    # total frames\
    \ required to get close to desired\n    # times\n    nFrames = int((framerate/1.0)*desired_time)\n\
    \    return nFrames\n```\n\nHere, we have created a function using def and given\
    \ that function a name secs2frames. We’ve then specified that this function will\
    \ take two inputs, desired_time and framerate, and provided a default value for\
    \ framerate of 60 (which is a pretty common frame rate). Now, the first thing\
    \ we’ve added to our function is a multiline comment (which we’ve created by book-ending\
    \ the text with '''). When creating functions, it is very common (and best practice)\
    \ to add a comment like this, which states what the function does, what it takes\
    \ as input and what it will return as output. In Python, we often refer to this\
    \ as a “docstring”. The nice thing about docstrings is that other users could\
    \ then try to better understand a function using\n\n```python\nprint(secs2frames.__doc__)\n\
    ```\n\nwhich is a handy tip if you ever want to better understand a Python function\
    \ that you didn’t create (or that you yourself created in the past and have since\
    \ forgotten how to use!). Now we’ve created this function, we can allow the user\
    \ to specify the desired duration of each of the stimuli in seconds, but we can\
    \ then use our function to present in terms of frames:\n\n```python\n# get the\
    \ desired number of frames\nfixTime = secs2frames(1.5)\ncueTime = secs2frames(0.05)\n\
    totalframes = fixTime + cueTime\n\n# loop through frames for the trial (not including\n\
    # target time)\nfor frameN in range(totalframes):\n    if frameN < fixTime:\n\
    \        # if frameN is between 0 and fixTime -\n        # draw the fixation\n\
    \        fixation.setAutoDraw(True)\n\n    elif fixTime <= frameN < totalframes:\n\
    \        # undraw the fixation\n        fixation.setAutoDraw(False)\n        #\
    \ if frameN is between fixTime and\n        # totalframes- draw the cue\n    \
    \    cue.setAutoDraw(True)\n\n    win.flip()\n\n# undraw the cue, draw the target\n\
    cue.setAutoDraw(False)\ntarget.setAutoDraw(True)\nwin.flip()\n\n# wait for a response\n\
    keys = kb.waitKeys(keyList=['left', 'right',\n    'escape'])\ntarget.setAutoDraw(False)\n\
    ```\n\n### 5.1.3 Gathering Responses in Our Experiment\n\nWe nearly have a trial\
    \ set up, but recall that one important consideration in reaction time experiments\
    \ is “what is our zero point?”. Let’s imagine in this scenario that we want to\
    \ allow responses from the onset of the cue. To do this, we update our stimulus\
    \ presentation loop:\n\n```python\nfor frameN in range(totalframes):\n\n    if\
    \ frameN < fixTime:\n        # if frameN is between 0 and fixTime -\n        #\
    \ draw the fixation\n        fixation.setAutoDraw(True)\n\n    elif frameN ==\
    \ fixTime:\n        # reset clock and clear past keyboard\n        # events at\
    \ fixation offset\n        win.callOnFlip(kb.clock.reset)\n        win.callOnFlip(kb.clearEvents)\n\
    \n    elif fixTime <= frameN < totalframes:\n        # undraw the fixation\n \
    \       fixation.setAutoDraw(False)\n        # if frameN is between fixTime and\n\
    \        # totalframes- draw the cue\n        cue.setAutoDraw(True)\n```"
  mdcn: "## 5.1 进行单次试验\n\n首先，我们创建一个新的 `.py` 文件，并将其命名为 `experiment.py`。在开始创建实验时，最好从一个新文件夹开始，该文件夹将只包含运行此实验所需的文件。现在，让我们思考一下这个实验的时间安排。每次试验将包含五个不同的屏幕：\n\
    \n| 屏幕 | 时间 | 描述 |\n|---|---|---|\n| 注视点 | 1,500 毫秒 | 给参与者时间准备下一次试验 |\n| 提示 |\
    \ 50 毫秒 | 将注意力吸引到左侧或右侧 |\n| 注视点 | 取决于 SOA | 提示和目标之间的中性屏幕 |\n| 目标 | 直到反应 | 显示一个目标供参与者反应\
    \ |\n| 反馈 | 1,000 毫秒 | 激励参与者的反馈 |\n\n提示和目标的位置。如果两者出现在同一位置，则提示是有效的：它正确地预测了目标。如果目标出现在与提示不同的位置，则提示是无效的。提示有效的比率被称为有效性。50%\
    \ 的有效性意味着一半的提示准确地预测了目标位置，而另一半则没有。\n\n在实验心理学中，人们会预测结果如下：如果 SOA 较短（100 毫秒），那么对有效提示目标的反应将比对无效提示目标的反应具有更低的反应时间和更高的精确度。然而，如果\
    \ SOA 较长（900 毫秒），那么对有效提示目标的反应将比对无效提示目标的反应具有更高的反应时间和更低的精确度。换句话说，我们预期 SOA 和试验有效性之间存在交互作用：有效的提示会导致对提示位置的注意力在短时间内得到促进，随后出现注意力返回抑制的时期。\n\
    \n### 5.1.1 在我们的实验中呈现刺激\n\n现在我们知道了一次试验的构成，我们可以从导入我们认为试验所需的模块开始。我们知道我们呈现视觉内容，我们可能希望暂停屏幕，并且我们将使用键盘来收集响应：\n\
    \n```python\nfrom psychopy import visual, core, event\nfrom psychopy.hardware\
    \ import keyboard\n```\n\n接下来，我们可以将我们的窗口设为一个键盘实例，这样我们既有一个呈现内容的窗口，又有一种监视按键事件的方式：\n\
    \n```python\n# 创建一个窗口\nwin = visual.Window(size=[1024, 768],\n    fullscr=False,\
    \ units='pix', color=(0,0,0),\n    colorSpace='rgb', screen=0)\n\n# 创建一个键盘实例\n\
    kb = keyboard.Keyboard()\n```\n\n最后，我们可以创建我们打算呈现的刺激：\n\n```python\n# 一个注视点\nfixation\
    \ = visual.TextBox2(\n    win,\n    text='+',\n    pos=(0, 0),\n    letterHeight=20,\n\
    \    alignment='center'\n)\n\n# 一个箭头作为我们的提示\narrowVert = [[-20, 5], [-20, -5],\
    \ [0, -5],\n    [0, -10], [20, 0], [0, 10], [0, 5]]\n\ncue = visual.ShapeStim(win,\
    \ vertices=arrowVert,\n    fillColor='darkred', size=2, pos=[0, 0],\n    lineColor='red')\n\
    \n# 一个圆圈作为我们的目标\ntarget = visual.Circle(win, size=20, pos=[-300, 0],\n    lineColor='white',\
    \ fillColor='lightGrey')\n```\n\n我们现在可以应用我们在第 3 章和第 4 章学到的知识来呈现我们的刺激并等待响应。记住，最简单的方法如下：\n\
    \n```python\n# 绘制注视点\nfixation.draw()\nwin.flip()\ncore.wait(1.5)\n\n# 绘制提示\n\
    cue.draw()\nwin.flip()\ncore.wait(0.05)\n\n# 绘制目标\ntarget.draw()\nwin.flip()\n\
    \n# 等待响应\nkeys = kb.waitKeys(keyList=['left', 'right', 'escape'])\n```\n\n但更精确的方法是按帧呈现刺激。现在，当我们制作实验时，我们希望有一天能分享我们的代码给其他进行类似实验的研究人员。因此，我们需要提前考虑什么对未来的你和使用你代码的未来研究人员来说是最直观的。所以，即使我们想按帧呈现刺激，允许研究人员指定以秒为单位的期望时间也会很有用。那么，让我们重新利用我们在第\
    \ 3 章创建的转换代码：\n\n```python\n# 我们想要的时间，以秒为单位\ndesired_time = 1.5\n\n# 显示器帧率\nframerate\
    \ = 60\n\n# 接近期望时间所需的总帧数\ntotalframes = int((framerate/1.0)*desired_time)\n\n\
    # 打印我们将偏离多少\nprint('Stimulus will be presented for ',\n      totalframes, ' frames')\n\
    print('Actual time will be ', totalframes/framerate)\n```\n\n然后我们可以在循环中使用这个帧数来呈现我们的刺激。所以，使用：\n\
    \n```python\nfor frameN in range(totalframes):\n    fixation.draw()\n    win.flip()\n\
    ```\n\n### 5.1.2 在实验中使用函数\n\n我们有几个刺激需要按帧呈现，因此秒和帧之间的这种转换可能是我们希望反复使用的东西。这正是我们实验中函数的完美场景（我们在第\
    \ 2.7 节中介绍过）。让我们创建一个将秒转换为帧的函数，该函数可以在我们的实验中多次使用：\n\n```python\ndef secs2frames(desired_time,\
    \ framerate=60):\n    '''\n    一个将期望时间（秒）转换为帧的函数\n\n    输入：\n        desired_time\
    \ (float) - 期望时间，以秒为单位\n        framerate (int) - 屏幕刷新率\n\n    输出：\n        nFrames\
    \ (int) - 所需的帧数，\n                        以尽可能接近期望时间。\n    '''\n    # 接近期望时间所需的总帧数\n\
    \    nFrames = int((framerate/1.0)*desired_time)\n    return nFrames\n```\n\n\
    在这里，我们使用 `def` 创建了一个函数，并给该函数命名为 `secs2frames`。然后我们指定该函数将接受两个输入：`desired_time`\
    \ 和 `framerate`，并为 `framerate` 提供了默认值 60（这是一个相当常见的帧率）。现在，我们添加到函数中的第一件事是多行注释（我们通过用\
    \ ''' 将文本括起来创建）。在创建函数时，添加这样的注释是非常常见（也是最佳实践）的，它说明了函数的功能、它接受什么输入以及它将返回什么输出。在 Python\
    \ 中，我们通常称之为“文档字符串”。文档字符串的好处在于，其他用户可以尝试使用以下方式更好地理解函数：\n\n```python\nprint(secs2frames.__doc__)\n\
    ```\n\n如果你曾经想更好地理解一个你没有创建的 Python 函数（或者你自己过去创建但后来忘记如何使用的函数！），这是一个方便的技巧。现在我们已经创建了这个函数，我们可以允许用户以秒为单位指定每个刺激的期望持续时间，但我们可以使用我们的函数按帧呈现：\n\
    \n```python\n# 获取期望的帧数\nfixTime = secs2frames(1.5)\ncueTime = secs2frames(0.05)\n\
    totalframes = fixTime + cueTime\n\n# 循环试验的帧（不包括目标时间）\nfor frameN in range(totalframes):\n\
    \    if frameN < fixTime:\n        # 如果 frameN 在 0 和 fixTime 之间\n        # - 绘制注视点\n\
    \        fixation.setAutoDraw(True)\n\n    elif fixTime <= frameN < totalframes:\n\
    \        # 取消绘制注视点\n        fixation.setAutoDraw(False)\n        # 如果 frameN 在\
    \ fixTime 和\n        # totalframes 之间 - 绘制提示\n        cue.setAutoDraw(True)\n\n\
    \    win.flip()\n\n# 取消绘制提示，绘制目标\ncue.setAutoDraw(False)\ntarget.setAutoDraw(True)\n\
    win.flip()\n\n# 等待响应\nkeys = kb.waitKeys(keyList=['left', 'right',\n    'escape'])\n\
    target.setAutoDraw(False)\n```\n\n### 5.1.3 在我们的实验中收集响应\n\n我们几乎设置好了一次试验，但请记住，反应时间实验中的一个重要考虑是“我们的零点是什么？”。让我们想象一下，在这种情况下，我们希望允许从提示开始时就进行响应。为此，我们更新我们的刺激呈现循环：\n\
    \n```python\nfor frameN in range(totalframes):\n\n    if frameN < fixTime:\n \
    \       # 如果 frameN 在 0 和 fixTime 之间\n        # - 绘制注视点\n        fixation.setAutoDraw(True)\n\
    \n    elif frameN == fixTime:\n        # 在注视点偏移时重置时钟并清除过去的键盘事件\n        win.callOnFlip(kb.clock.reset)\n\
    \        win.callOnFlip(kb.clearEvents)\n\n    elif fixTime <= frameN < totalframes:\n\
    \        # 取消绘制注视点\n        fixation.setAutoDraw(False)\n        # 如果 frameN 在\
    \ fixTime 和\n        # totalframes 之间 - 绘制提示\n        cue.setAutoDraw(True)\n\
    ```"
