    brackets. Within those brackets, inputs are defined. These inputs are called **arguments**,
    and you will get back to those later. The final part of the function definition
    is a colon, `:`.


    All of the code that is part of a function is **indented**. You will learn more
    about indentation in the *If Statements* section. For now, all you need to know
    is that Python recognises all code that is part of a function by its offset with
    regard to the function definition. The offset is four spaces in front of each
    line of code that is part of the function.


    At the end of the code, the function **returns** a variable: `mash`. This is the
    output of a function, and it can be a single variable or a list of variables.
    Output variables can be numbers, strings, lists, tuples, classes, or even other
    functions.


