  md: 'PyGaze Analyser is currently a relatively simple library that can extract data
    from files produced by eye trackers of several manufacturers. In addition, it
    provides functions for high-level plotting of gaze fixation data, which can produce
    fancy pictures. You will encounter these in a later chapter.


    # 7.3 Read Eye-Tracker Data


    You currently have two things in your new analysis folder: the example data file
    (**ED_pupil.asc**) and the **pygazeanalyser** folder. Now add another file: an
    empty Python script that you could name **analysis.py**. Open analysis.py in a
    script Editor. Start by importing the relevant libraries and functions:


    ```

    import numpy

    from matplotlib import pyplot

    from scipy.stats import ttest_rel

    from pygazeanalyser.edfreader import read_edf

    ```


    You should recognise the first three from the last chapters. The fourth one is
    new, and it is specifically designed to read data from EyeLink files. These files
    have a **.edf** extension, which is why the function is called **read_edf**. The
    data file you have has a **.asc** extension. This is a converted EDF file; it
    contains the same data, but in a more readable format. (So, confusingly, the function
    named “read_edf” actually reads asc files.)


    Trace data files often consist of at least two types of data. The first type is
    **samples**. In this case, they contain gaze location, pupil diameter, and a timestamp.
    The second type of data is **events**. These are numbers or strings with information
    that appear between the samples. Usually, they indicate that something happened
    in the experiment (e.g. that a stimulus appeared) and provide anchors within the
    data file. Without these, you wouldn''t have known at what point in the experiment
    the samples were collected.


    In the current data file, there are four events of interest. The first indicates
    the start of a trial: **PUPIL_TRIALSTART**, colour=''black''. It can also end
    with ''white''. The colour indicates the colour on the monitor during that trial.
    The second kind of event was logged about 200 milliseconds before the monitor
    changed colour: **baseline_start**. The third event was **pupdata_start**. It
    was logged when the monitor changed colour. Finally, the event **pupdata_stop**
    was logged 2.5 seconds after the monitor changed colour.


    The **read_edf** function takes at least two arguments: the name of (or path to)
    the data file and the event that indicated a trial start. This does not need to
    be a full event. In your case, you can pass **PUPIL_TRIALSTART** and neglect the
    second bit (that indicated the colour and was not the same for every trial). You
    can also pass the event that indicated the end of a trial. If you do not provide
    this, **read_edf** will continue reading until it encounters the next trial start.
    By not passing the ending event, you risk reading irrelevant data. Add the following
    code to your analysis.py:


    ```

    # read data file

    data = read_edf(''ED_pupil.asc'', ''PUPIL_TRIALSTART'', \n               stop=''pupdata_stop'')

    ```'
