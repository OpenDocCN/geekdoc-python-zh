    ## 8.2.4 EyeTracker 类


    PyGaze 提供了一个统一的类来与不同制造商的眼动仪通信，所有功能都相同。这很有用，因为这意味着你不必每次想使用不同的眼动仪时都重新编程你的实验。


    这个类的名字相当缺乏想象力，叫做 `EyeTracker` 类。它属于同样缺乏创意的 `eyetracker` 模块。该类提供了一种相对简单的方式来与眼动仪通信。它允许你开始记录和暂停记录，并且可以向日志文件发送消息（例如，标记图像呈现的开始）。


    此外，`EyeTracker` 类允许你在其记录时访问样本。这意味着你可以知道参与者正在看哪里（使用 `sample` 方法）或他们的瞳孔有多大（使用 `pupil_size`
    方法）。还有方法可以等待扫视、注视和眨眼的开始和结束。例如，`wait_for_fixation_start` 将等待注视开始并返回开始时间和位置。这些方法允许你使实验依赖于参与者的眼动。


    最后，`EyeTracker` 类提供了允许你校准眼动仪并检查校准是否仍然准确的方法。眼动仪对某人注视位置的估计基于因人而异、因实验设置而异的参数。因此，设备需要对每个参与者进行校准。要启动校准程序，你只需调用
    `EyeTracker` 实例的 `calibrate` 方法。


    在整个实验过程中，你可以使用 `drift_correct` 方法检查校准是否仍然准确。它提供一个关键字参数 `pos`，用于确定注视目标的位置。`drift_correct`
    方法将显示一个注视目标，等待参与者看向它（由参与者按下空格键指示），然后该方法将检查跟踪器的注视位置估计是否接近注视目标。如果它在某个范围内，则跟踪器的校准仍然正常。


    校准可能会随时间发生漂移，导致其变得不准确。因此，在整个实验过程中检查校准是否仍然准确非常重要。频率取决于个人偏好、参与者配合度和你的设置质量。当准确性至关重要时，你可以在每次试验中调用
    `drift_correct`。如果你对你的设置更有信心，也可以每 20 次左右调用一次。


    初始化一个新的 `EyeTracker` 实例需要你将活动的 `Display` 作为参数传递。这是因为 `EyeTracker` 需要知道它可以在哪里显示其校准程序。将以下内容添加到你的
    `experiment.py` 脚本中：


    ```

    # Initialise a new EyeTracker

    tracker = EyeTracker(disp)


    # Calibrate the eye tracker

    tracker.calibrate()

    ```


    这将初始化与你的眼动仪的连接，然后在实验开始时对其进行校准。

    校准后，你可以向参与者展示说明。你也可以在系统校准之前这样做。这取决于你的个人偏好，也许还取决于你对参与者记忆力的信心。


    ```

    # Feed the instructions to the Display

    disp.fill(inscr)

    # Show the instructions

    disp.show()

    # Wait until the participant presses any key

    # (Allowing them to read the instructions at their own pace)

    kb.get_key()

    ```


    ## 8.2.5 单个试验


    本实验中的单个试验应显示一个注视点，然后是一张图像，并且应全程记录眼动。在显示图像之前，你需要确保眼动仪正在记录数据。你还需要在数据文件中发出信号，表明图像何时可见以及是哪张图像（这有助于你事后理解数据）。

    在显示图像之前，你需要从文件中加载它并将其绘制到屏幕上。例如，只需从 `IMGNAMES`（你之前创建的所有图像列表）中取第一张图像。你可以使用 `imgscr`
    实例的 `draw_image` 方法加载和绘制它。这需要图像的完整路径，你可以使用 `os.path` 模块的 `join` 方法构建：


    ```

    # Choose the first image for now

    imgname = IMGNAMES[0]


    # Construct the path to the image

    imgpath = os.path.join(IMDDIR, imgname)


    # Draw the image on imgscr

    # (clear imgscr first, to be sure it''s clean)

    imgscr.clear()

    imgscr.draw_image(imgpath)

    ```


