    \    fixation.draw()\n    win.flip()\n```\n\n# 5.1.2 Using Functions in Experiments\n\
    \nWe have several stimuli we want to present in terms of frames, so this conversion\
    \ between seconds and frames is probably something we will want to use again and\
    \ again. This is the perfect scenario for a function in our experiment (which\
    \ we were introduced to in Section"
  - "[PAGE 98]\n\n2.7). Let’s make a function to convert seconds to frames that can\
    \ be used several times in our experiment:\n\n```\ndef secs2frames(desired_time,\
    \ framerate=60):\n    '''\n    A function to convert desired time in seconds\n\
    \    to frames\n\n    Input:\n        desired_time (float) - desired time in seconds\n\
    \        framerate (int) - screen refresh rate\n\n    Output:\n        nFrames\
    \ (int) - the number of frames required\n                        to present as\
    \ close as possible to desired\n                        time in seconds.\n   \
    \ '''\n    # total frames required to get close to desired\n    # times\n    nFrames\
    \ = int((framerate/1.0)*desired_time)\n    return nFrames\n```\n\nHere, we have\
    \ created a function using def and given that function a name secs2frames. We’ve\
    \ then specified that this function will take two inputs, desired_time and framerate,\
    \ and provided a default value for framerate of 60 (which is a pretty common frame\
    \ rate). Now, the first thing we’ve added to our function is a multiline comment\
    \ (which we’ve created by book-ending the text with '''). When creating functions,\
    \ it is very common (and best practice) to add a comment like this, which states\
    \ what the function does, what it takes as input and what it will return as output.\
    \ In Python, we often refer to this as a “docstring”. The nice thing about docstrings\
    \ is that other users could then try to better understand a function using\n\n\
    ```\nprint(secs2frames.__doc__)\n```\n\nwhich is a handy tip if you ever want\
    \ to better understand a Python function that you didn’t create (or that you yourself\
    \ created in the past and have since forgotten how to use!). Now we’ve created\
    \ this function, we can allow the user to specify the desired duration of each\
    \ of the stimuli in seconds, but we can then use our function to present in terms\
    \ of frames:\n\n```\n# get the desired number of frames\nfixTime = secs2frames(1.5)\n\
    cueTime = secs2frames(0.05)\ntotalframes = fixTime + cueTime\n\n# loop through\
    \ frames for the trial (not including\n# target time)\nfor frameN in range(totalframes):\n\
    ```"
