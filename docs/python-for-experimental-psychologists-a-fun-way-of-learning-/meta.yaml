    Note that this is the exact same constants.py as in the previous chapter.


    # 8.3.1 Extracting Gaze Data


    Gaze data files are enormous, usually with anything between 60 and 1,000 samples
    for every second of data collection. Manually processing these files is a complete
    nightmare. Never do it! Instead, use programming libraries to do the work for
    you.


    One of the libraries you could use is PyGaze Analyser. This is a relatively simple
    library that can read data from several types of eye trackers. You can download
    PyGaze Analyser from the companion website.


    After downloading pygazeanalyser.zip, extract its contents, and copy it to the
    same folder as where constants.py is saved. This is crucial!


    If you haven''t done this yet, now would also be the time to download the example
    data file. Make sure that you copy it to the same folder as where constants.py
    is located.


    The next step is to start programming. In the same folder as where constants.py
    is located, open a new script. You can name it ''analysis.py''.


    The contents of your folder should now be:


    +   - **images** (folder that contains all images used in the experiment)

    - **pygazeanalyser** (folder that contains PyGaze Analyser)

    - **default.asc** (gaze data file)

    - **constants.py** (script with all constants)

    - **experiment.py** (only if you did previous chapter)

    - **analysis.py** (empty for now)


    Open analysis.py in an Editor and start by importing the relevant libraries. You
    will need the os module to handle files and folders. You will also need to import
    the constants. From PyGaze Analyser, you will need the gazeplotter module and
    the correct reader. In this example, the read_edf function from the edfreader
    module will be used, which is for EyeLink files. If you have a different (supported)
    tracker, use its reader instead. Finally, whatever you used, you also need the
    close function from Matplotlib''s pyplot module.


    ```

    import os


    from constants import *


    from pygazeanalyser.edfreader import read_edf

    from pygazeanalyser import gazeplotter


    from matplotlib.pyplot import close

    ```


    Your script will create and save quite a lot of data visualisations, which will
    be stored in separate image files. It''s a good idea to stick all of them in a
    separate folder to keep things organised. You could name that folder ''output''
    and construct the path using the DIR constant and the os.path module''s join function:


    ```

    # Construct the name of the output directory

    OUTPUTDIR = os.path.join(DIR, ''output'')

    ```'
- md: "## 8.3.2 Processing Gaze Data\n\nBefore running through all trials, you need\
    \ to know how many there are. To check how many trials there are in the data variable,\
    \ you can use the `len` function:\n\n```\n# Get the amount of trials in this dataset\n\
    ntrials = len(data)\n```\n\nNow you can use a `for` loop to run through all of\
    \ the trials:\n\n```\n# Loop through all trials\nfor trialnr in range(ntrials):\n\
    ```\n\n**Note that all code following the `for` loop will be indented!**\n\nThe\
    \ first thing you need is the name of the image that was presented in a trial.\
    \ In the experiment, you simply ran through the list of images you produced in\
    \ the constants. You sorted this list in alphabetical order, which means that\
    \ the list's order will be the same in the experiment and in the analysis. You\
    \ can use this to your advantage, by simply using the trial number to index the\
    \ list of image names:\n\n```\n# Get the image name\nimgname = IMGNAMES[trialnr]\n\
    ```\n\nYou also need the path to the image file, because some of the plotting\
    \ functions can use the actual image in their visualisations. You can construct\
    \ the path to each image file by using the `IMGDIR` constant and the image's name:\n\
    \n```\n# Get the path to the image\nimgpath = os.path.join(IMGDIR, imgname)\n\
    ```\n\nNow for the actual data, you need the fixations. As mentioned before, these\
    \ are stored in the `'events'` dict of each trial, specifically as a list that\
    \ is associated with the `'Efix'` key. You can access it like you would any other\
    \ dict:\n\n```\n# Get the fixations in this trial\nfixations = data[trialnr]['events']['Efix']\n\
    ```\n\nRemember, in the experiment you used a central fixation mark before each\
    \ image was presented. This means that the initial fixation on each image will\
    \ be in the centre, precisely where the fixation mark was. Because of this, the\
    \ first fixation does not reflect a participant's response to the image and maybe\
    \ you should get rid of it. You can remove it by popping it out of the fixations\
    \ list. To do so, use the list's `pop` method to remove the fixation at index\
    \ 0:\n\n```\n# Delete the first fixation\nfixations.pop(0)\n```\n\nIn addition\
    \ to the fixations, you can also get the x and y coordinates of each sample. These\
    \ are associated with the `'x'` and `'y'` keys of each trial's dict. Accessing\
    \ them is really easy:\n\n```\n# Get the raw x and y gaze coordinates\nx = data[trialnr]['x']\n\
    y = data[trialnr]['y']\n```\n\n## 8.3.3 Analysing Fixations\n\nIt's time to finally\
    \ plot something! Let's start by plotting all the collected (raw) samples on the\
    \ presented image. Having a look at your raw data is always a good idea. It should\
    \ provide you with a rough idea of your data quality, especially about how much\
    \ drift there was. In the example figure, you can already somewhat see fixations\
    \ and saccades (and blinks, if the samples suddenly jump to the bottom of the\
    \ image).\n\nIf you want to save the image, you need to create a path to the intended\
    \ save file's location first. To do so, you can construct a new name for the raw\
    \ data plot, for example by using the stimulus image's name:\n\n```\nsavename\
    \ = 'raw_{}'.format(imgname)\n```\n\nThen you need to combine the raw data plot's\
    \ name with the output directory:\n\n```\nsavepath = os.path.join(OUTPUTDIR, savename)\n\
    ```\n\nFinally, you can call the `draw_raw` function from the `gazeplotter` module.\
    \ This function requires three arguments: the x coordinates of your raw samples\
    \ (from your `x` variable), the y coordinates of your raw samples (from your `y`\
    \ variable), and the size of the original display (from your `DISPSIZE` constant).\n\
    \nIn addition, you can specify two keyword arguments. The first is `imagefile`,\
    \ which allows you to specify the image on which your raw samples were collected.\
    \ This image will be the background of your plot. The second is `savefilename`,\
    \ which allows you to specify the path to the file where the plot will be saved.\
    \ If you don't specify this argument, the plot will be displayed on screen instead.\n\
    \n```\n# Draw the raw data on the image\ndraw_raw(x, y, DISPSIZE, imagefile=imgpath,\
    \ savefilename=savepath)\n```\n\nYou don't have to go through the effort of manually\
    \ creating a new folder. Instead, you can create a new one using the `mkdir` function\
    \ from the `os` module.\n\nOne downside of using `mkdir` is that it causes an\
    \ error if you try to make a new folder when that folder already exists. To prevent\
    \ any kind of accidents, it's good practice to find out whether the folder you\
    \ were about to make already exists. You can do this with the `os.path` module's\
    \ `isdir` function. Use the following code in your script to combine these functions:\n\
    \n```\n# Check if the output directory exists yet\nif not os.path.isdir(OUTPUTDIR):\n\
    \    # If the output directory does not exist yet, make it\n    os.mkdir(OUTPUTDIR)\n\
    ```\n\nIf the output folder already exists, `os.path.isdir` will return `True`.\
    \ The `if` statement used here will only run if `False` is returned, though, due\
    \ to the use of `not`. Thus, if no output directory exists, `mkdir` will create\
    \ one.\n\nTime to actually read the data. You can do this using the `read_edf`\
    \ function; or any of the other supported trackers' reader functions, depending\
    \ on what data file you have. They all return the same data structure, so if you\
    \ need, you can simply substitute `read_edf` in the following example:\n\n```\n\
    # Read the data\ndata = read_edf('default.asc', 'image_onset',\n             \
    \   stop='image_offset')\n```\n\nThe `read_edf` function requires two input arguments:\
    \ the name of the data file and a string that indicates what event signalled the\
    \ start of a trial. This does not have to be the actual start of a trial; it can\
    \ also be the start of the period within a trial that you want to extract. In\
    \ addition, you can also pass the keyword argument `stop`. This allows you to\
    \ specify the string that indicates what event signalled the end of a trial.\n\
    \nIn your data file (which is named `default` if you didn't specify a file name),\
    \ the event that indicates the onset of an image is `'image_onset'`. There was\
    \ more to that string (it also included the presented image's name), but you don't\
    \ have to specify a full event string for `read_edf` to work. Finally, the event\
    \ that signalled the image's offset was `'image_offset'`.\n\nThe `read_edf` function\
    \ returned a variable that you named `data`. This variable is a list of all trials\
    \ that were extracted from the data file. Each trial is represented by a dict.\
    \ Within each trial dict, there are six different keys: `'x'` and `'y'` for the\
    \ horizontal and vertical gaze position, `'size'` for the pupil size, `'trackertime'`\
    \ and `'time'` for the absolute and relative time, and `'events'` for all detected\
    \ and logged events.\n\nWith the exception of `'events'`, all keys point to NumPy\
    \ arrays that contain data samples. How to process these is the topic of the *Analysing\
    \ Traces* chapter. The `'events'` key points to another dict, which has seven\
    \ keys. These keys are `'Sfix'` and `'Efix'` for fixation starts and ends, `'Ssac'`\
    \ and `'Esac'` for saccade starts and ends, `'Sblk'` and `'Eblk'` for blink starts\
    \ and ends, and `'msg'` for logged messages.\n\nEach of the `'events'` keys points\
    \ to a list. Each of these lists contains even more lists! What those lists contain\
    \ depends on which event you look at. For example, the `'msg'` key points to a\
    \ list that contains lists for every event that was logged. Each individual event\
    \ list consists of a timestamp and of the actual message. One individual list\
    \ within the `'msg'` list could look like this example: `[399495, 'image_onset\\\
    n']`.\n\nOf importance here is the `'Efix'` key. This points to a list of lists,\
    \ where each individual list represents a fixation end. Each fixation end is a\
    \ list that contains the start time, the end time, the duration, the ending x\
    \ position, and the ending y position of a fixation. One such an individual list\
    \ could look like this: `[399928, 400063, 136, 327.5, 371.1]`.\n\nThe quickest\
    \ way to get a feeling for what is in the data is by running your current script\
    \ within a code editor's console (for example within Spyder). After loading the\
    \ data by running your script, you can print several event lists. For example,\
    \ you could print all messages from the first trial (at index 0):\n\n```\nprint(data[0]['events']['msg'])\n\
    ```\n\nYou could also print all fixation end events from the second trial (at\
    \ index 1):\n\n```\nprint(data[1]['events']['Efix'])\n```\n\nFor now, you don't\
    \ have to become familiar with the \"events\" lists too intimately. Instead, you\
    \ can rely on several visualisation functions to do the work for you. More about\
    \ that in the next chapter!"
  mdcn: "## 8.3.2 处理注视数据\n\n在运行所有试次之前，你需要知道总共有多少个试次。要检查数据变量中有多少个试次，可以使用 `len` 函数：\n\
    \n```\n# 获取此数据集中的试次数量\nntrials = len(data)\n```\n\n现在你可以使用 `for` 循环来遍历所有试次：\n\n\
    ```\n# 遍历所有试次\nfor trialnr in range(ntrials):\n```\n\n**请注意，`for` 循环之后的所有代码都需要缩进！**\n\
    \n你需要的第一项信息是某个试次中呈现的图像名称。在实验中，你只需遍历在常量中生成的图像列表。你已按字母顺序对该列表进行了排序，这意味着该列表的顺序在实验和分析中将保持一致。你可以利用这一点，只需使用试次编号来索引图像名称列表：\n\
    \n```\n# 获取图像名称\nimgname = IMGNAMES[trialnr]\n```\n\n你还需要图像文件的路径，因为某些绘图函数可以在其可视化中使用实际图像。你可以通过使用\
    \ `IMGDIR` 常量和图像名称来构建每个图像文件的路径：\n\n```\n# 获取图像路径\nimgpath = os.path.join(IMGDIR,\
    \ imgname)\n```\n\n现在处理实际数据，你需要注视点。如前所述，这些数据存储在每个试次的 `'events'` 字典中，具体是与 `'Efix'`\
    \ 键关联的列表。你可以像访问其他任何字典一样访问它：\n\n```\n# 获取此试次中的注视点\nfixations = data[trialnr]['events']['Efix']\n\
    ```\n\n请记住，在实验中，你在每张图像呈现之前使用了一个中央注视标记。这意味着每张图像上的初始注视将位于中心，即注视标记所在的位置。因此，第一个注视点并不反映参与者对图像的反应，也许你应该将其移除。你可以通过从注视点列表中弹出它来移除它。为此，请使用列表的\
    \ `pop` 方法移除索引 0 处的注视点：\n\n```\n# 删除第一个注视点\nfixations.pop(0)\n```\n\n除了注视点，你还可以获取每个样本的\
    \ x 和 y 坐标。这些坐标与每个试次字典的 `'x'` 和 `'y'` 键相关联。访问它们非常简单：\n\n```\n# 获取原始的 x 和 y 注视坐标\n\
    x = data[trialnr]['x']\ny = data[trialnr]['y']\n```\n\n## 8.3.3 分析注视点\n\n是时候绘制一些东西了！让我们从将所有收集到的（原始）样本绘制在呈现的图像上开始。查看原始数据总是一个好主意。它应该能让你对数据质量有一个大致的了解，特别是关于漂移的程度。在示例图中，你已经可以大致看到注视点和扫视（以及眨眼，如果样本突然跳到图像底部的话）。\n\
    \n如果你想保存图像，你需要首先创建一个指向目标保存文件位置的路径。为此，你可以为原始数据图构建一个新名称，例如使用刺激图像的名称：\n\n```\nsavename\
    \ = 'raw_{}'.format(imgname)\n```\n\n然后你需要将原始数据图的名称与输出目录组合起来：\n\n```\nsavepath\
    \ = os.path.join(OUTPUTDIR, savename)\n```\n\n最后，你可以调用 `gazeplotter` 模块中的 `draw_raw`\
    \ 函数。此函数需要三个参数：原始样本的 x 坐标（来自你的 `x` 变量）、原始样本的 y 坐标（来自你的 `y` 变量）以及原始显示的大小（来自你的 `DISPSIZE`\
    \ 常量）。\n\n此外，你可以指定两个关键字参数。第一个是 `imagefile`，它允许你指定收集原始样本的图像。此图像将作为绘图的背景。第二个是 `savefilename`，它允许你指定绘图将保存到的文件路径。如果你不指定此参数，绘图将显示在屏幕上。\n\
    \n```\n# 在图像上绘制原始数据\ndraw_raw(x, y, DISPSIZE, imagefile=imgpath, savefilename=savepath)\n\
    ```\n\n你不必费力手动创建一个新文件夹。相反，你可以使用 `os` 模块中的 `mkdir` 函数创建一个新文件夹。\n\n使用 `mkdir` 的一个缺点是，如果你尝试创建一个已存在的文件夹，它会导致错误。为了防止任何意外，最好先检查你打算创建的文件夹是否已存在。你可以使用\
    \ `os.path` 模块的 `isdir` 函数来完成此操作。在你的脚本中使用以下代码来组合这些函数：\n\n```\n# 检查输出目录是否已存在\n\
    if not os.path.isdir(OUTPUTDIR):\n    # 如果输出目录尚不存在，则创建它\n    os.mkdir(OUTPUTDIR)\n\
    ```\n\n如果输出文件夹已存在，`os.path.isdir` 将返回 `True`。然而，由于使用了 `not`，这里使用的 `if` 语句仅在返回\
    \ `False` 时运行。因此，如果不存在输出目录，`mkdir` 将创建一个。\n\n是时候实际读取数据了。你可以使用 `read_edf` 函数来完成此操作；或者根据你拥有的数据文件，使用其他任何支持的跟踪器读取函数。它们都返回相同的数据结构，因此如果需要，你可以在以下示例中简单地替换\
    \ `read_edf`：\n\n```\n# 读取数据\ndata = read_edf('default.asc', 'image_onset',\n\
    \                stop='image_offset')\n```\n\n`read_edf` 函数需要两个输入参数：数据文件的名称和一个字符串，该字符串指示哪个事件标志着试次的开始。这不必是试次的实际开始；它也可以是你想要提取的试次内的开始时间。此外，你还可以传递关键字参数\
    \ `stop`。这允许你指定哪个事件标志着试次结束的字符串。\n\n在你的数据文件中（如果你没有指定文件名，则名为 `default`），表示图像开始的事件是\
    \ `'image_onset'`。该字符串还有更多内容（它还包括呈现的图像名称），但 `read_edf` 要工作，你不必指定完整的事件字符串。最后，表示图像结束的事件是\
    \ `'image_offset'`。\n\n`read_edf` 函数返回了一个你命名为 `data` 的变量。此变量是从数据文件中提取的所有试次的列表。每个试次由一个字典表示。在每个试次字典中，有六个不同的键：`'x'`\
    \ 和 `'y'` 表示水平和垂直注视位置，`'size'` 表示瞳孔大小，`'trackertime'` 和 `'time'` 表示绝对和相对时间，以及\
    \ `'events'` 表示所有检测到并记录的事件。\n\n除了 `'events'` 之外，所有键都指向包含数据样本的 NumPy 数组。如何处理这些是\
    \ *分析轨迹* 章节的主题。`'events'` 键指向另一个字典，该字典有七个键。这些键是 `'Sfix'` 和 `'Efix'` 表示注视开始和结束，`'Ssac'`\
    \ 和 `'Esac'` 表示扫视开始和结束，`'Sblk'` 和 `'Eblk'` 表示眨眼开始和结束，以及 `'msg'` 表示记录的消息。\n\n`'events'`\
    \ 的每个键都指向一个列表。这些列表中的每一个都包含更多的列表！这些列表包含的内容取决于你查看的是哪个事件。例如，`'msg'` 键指向一个列表，该列表包含每个记录事件的列表。每个单独的事件列表由一个时间戳和实际消息组成。`'msg'`\
    \ 列表中的一个单独列表可能如下所示：`[399495, 'image_onset\\n']`。\n\n这里重要的是 `'Efix'` 键。它指向一个列表的列表，其中每个单独的列表代表一个注视结束。每个注视结束是一个列表，包含注视的开始时间、结束时间、持续时间、结束\
    \ x 位置和结束 y 位置。这样一个单独的列表可能如下所示：`[399928, 400063, 136, 327.5, 371.1]`。\n\n快速了解数据内容的最快方法是在代码编辑器的控制台中运行你当前的脚本（例如在\
    \ Spyder 中）。通过运行脚本加载数据后，你可以打印几个事件列表。例如，你可以打印第一个试次（索引 0）的所有消息：\n\n```\nprint(data[0]['events']['msg'])\n\
    ```\n\n你也可以打印第二个试次（索引 1）的所有注视结束事件：\n\n```\nprint(data[1]['events']['Efix'])\n\
    ```\n\n目前，你不必过于熟悉“事件”列表。相反，你可以依赖几个可视化函数来为你完成工作。更多内容将在下一章中介绍！"
