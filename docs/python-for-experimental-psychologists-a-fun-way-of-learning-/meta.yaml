  - '[PAGE 119]


    # Using a Keyboard


    If you don’t have a joystick at hand, you can use your keyboard instead. Here,
    PyGaze’s Keyboard class is used to interact with the keyboard. You can import
    the Keyboard class from PyGaze’s keyboard module:


    ```

    from pygaze.keyboard import Keyboard

    ```


    To initialise an instance of the class, you can use the following:


    ```

    kb = Keyboard()

    ```


    As with the Joystick class, you can specify a default key list and timeout. You
    can use the range function to generate a list of the numbers between 0 and 10
    (not inclusive of the end point!), which are the names for the number keys. Because
    the Keyboard class requires a list of strings to be passed as key names, you should
    convert the generated numbers to strings. You can do this with the map function,
    which can apply a function of your choice to an entire list at once. You also
    need the str function, which can convert numeric values into strings. Combining
    the two, you could do the following:


    ```

    numbers = range(0, 10)

    stringnumbers = map(str, numbers)

    kb = Keyboard(keylist=stringnumbers)

    ```


    This would produce a Keyboard instance that only allows you to press the number
    keys. (Note: These are *not* the numpad keys, but the numbers aligned towards
    the top of your keyboard!)


    Let’s start programming to implement the above example. In the same folder as
    the constants.py script that you created a bit earlier, create a new Python script.
    You can name it “noisemaker_keyboard.py”. First, import the Keyboard and Sound
    classes


    ```

    from pygaze.keyboard import Keyboard

    from pygaze.sound import Sound

    ```


    You should also import the Display class, because the Keyboard only works if there
    is an active Display (this is not true for the Joystick and Sound classes, by
    the way).


    ```

    from pygaze.display import Display

    ```


    Time to initialise a Display and a Keyboard instance. Remember, the Keyboard instance
    should only respond to number keys!


    ```

    # initialise a Display instance

    # (required for the Keyboard to work)

    disp = Display()


    # create a range of numbers

    numbers = range(0,10)

    ```'
