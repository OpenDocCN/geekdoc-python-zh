    \ where=p<alpha, color='#babdb6', alpha=0.2)\n```\n\nNow finish the plot by setting\
    \ the labels and limits of the axes and by adding a legend:\n\n```\n# set axis\
    \ limits\nax.set_xlim([0, 2000])\nax.set_ylim([0, 2])\n# set axis labels\nax.set_xlabel('time\
    \ (ms)')\nax.set_ylabel('proportional pupil size change')\n# add legend\nax.legend(loc='upper\
    \ left')\n```\n\nAnd finally save the figure:\n\n```\nfig.savefig('pupil_traces.png')\n\
    ```"
