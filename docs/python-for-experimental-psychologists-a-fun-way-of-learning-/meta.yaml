- md: '## 8 EYE TRACKING


    Eye tracking is a popular technique in experimental psychology and cognitive neuroscience.
    It is applied to humans, other primates, and even to some non-primate animals.
    (That’s no joke, see for example a study in rats by Wallace and colleagues (2013)
    – the videos in the supplementary materials are amazing!) Eye tracking usually
    involves pointing a camera at someone’s face and using it to estimate where they
    are looking at.


    Eye tracking offers a lot of things to measure: where people look (fixations),
    how people move their eyes (saccadic trajectories), how quickly they do it (saccadic
    response time and velocity), and how big their pupils are (pupillometry). These
    metrics can give us insight into many things, including what people attend to,
    how motivated they are, and how attentive they are during tasks. Some eye-movement
    characteristics are affected in unique ways by a variety of diseases and disorders
    and can provide early diagnostic information or deeper insight into patients’
    conditions. This is reflected by a half-witty variation on an age-old cliché that
    you see in some papers and talks:


    > Not the eyes, but *eye movements* are the window to the soul.


    Eye movements are not only of interest in science and medicine but also in usability
    testing and marketing. Usability experts like to record the eye movements of people
    while they are using websites and graphical user interfaces. Eye-movement patterns
    can tell experts how intuitive an interface is. Marketing professionals employ
    the same methods but are more interested in whether people see their advertisements,
    products, and brand names.


    Another application of eye tracking is in software engineering. Eye movement characteristics
    are relatively unique and can be combined to form a finger (eye?) print that is
    specific to a user. Techniques have been developed to recognise people by their
    eye movements, and some experts think this technique can replace passwords in
    the future. In addition, eye movements can be used to navigate a computer’s operating
    system, which can be an assistive technology for those who need it and to people
    who play video games. Eye tracking is also a promising addition to virtual reality
    headsets, as it allows for more realistic rendering of a virtual environment.


    DOI: 10.4324/9781003174332-11


    ### 8.1 The Basics


    When you look at an image, you will show (mostly) three types of eye movements:
    fixations, saccades, and blinks. **Blinks** happen when you close your eyelids
    and see nothing. **Saccades** occur when you quickly move your eyes. When you
    do, your vision is largely suppressed (if it wasn’t, you would see a blur during
    saccades). **Fixations** are the times when your eyes stay relatively still, and
    you can actually see what you are looking at.


    Because most of your conscious vision happens during fixations, a lot of research
    focusses on them. Most researchers assume that when you look at something, that
    something is also what you attend to. This means that mapping where you are (or
    have been) looking at can provide crucial information about what draws your attention.


    The most simple experiment you could do is to show participants an image and to
    simultaneously record their gazing behaviour. Afterwards, you can map where participants
    looked, and that will hopefully tell you what parts of the image were interesting
    to a human observer.


    To record participants’ gaze behaviour, you need an eye tracker. This is nothing
    more than a camera with a filter, some infrared lights, and software that can
    do quick image processing through algorithmic magic. The concept is simple: the
    infrared lights illuminate your face, while the camera makes a snapshot of your
    eyes. Image processing software then tries to find your pupil and the reflection
    of the infrared light on your cornea (the front part of your eye). When you look
    around, the corneal reflection is relatively constant, but the pupil moves with
    your gaze. Using the difference between the pupil and the corneal reflection,
    and settings derived from a calibration, an algorithm can convert the location
    of your pupil within your eye to your point-of-regard on the computer monitor.
    In other words, the eye tracker manages to estimate where you are looking.


    ### 8.2 Creating an Eye-Tracking Experiment


    In this chapter, you are going to script a simple eye-tracking experiment. It
    will show images, each for a couple of seconds, and it will record eye movements
    while the images are being shown. The idea is to get you acquainted with the basics
    of recording and analysing fixation behaviour.


    #### 8.2.1 Materials


    To see this kind of eye tracking in practice, you need two things: an eye tracker
    and some images. Example images can be downloaded from the companion website,
    but you are also welcome to use your own holiday snaps. An eye tracker might be
    harder to come by, but don’t worry if you don’t have one: PyGaze offers a dummy
    mode that allows you to use the mouse cursor to simulate eye movements.


    A data file will be produced through your experiment, but an example will also
    be available if you don’t have an eye tracker. The example data and analysis software
    can be downloaded from the companion website. More on that later.


    ![img/07ad901823abb0ad885d2b362f9446b0_158_0.png](img/07ad901823abb0ad885d2b362f9446b0_158_0.png)


    **FIGURE 8.1** This is one of the example images. It''s a picture I took during
    a holiday on Texel, one of the islands north of the Netherlands. Where do you
    expect most fixations to occur?


    #### 8.2.2 Constants.py


    The first step of any experiment is to create a file that contains the settings
    of your experiment. Create a new folder and create a new Python script in it.
    Name the script ''constants.py'' and add the following code:


    ```python

    # The DISPTYPE can be either ''pygame'' or ''psychopy''

    DISPTYPE = ''pygame''

    # The DISPSIZE should match your monitor''s resolution!

    DISPSIZE = (1024, 768)

    ```


    Now on to a new constant: TRACKERTYPE, which establishes the type of eye tracker
    that you will be using. This can be a specific brand of supported eye trackers,
    or one of two dummy substitutes. At the time of writing, PyGaze supports Alea
    Technologies'' Inteligaze systems (''alea''), SR Research''s EyeLink systems (''eyelink''),
    EyeLogic trackers (''eyelogic''), the EyeTribe tracker (''eyetribe''), GazePoint
    trackers and their OpenGaze API (''opengaze''), SensoMotoric Instruments'' systems
    (''smi''), and Tobii''s systems (''tobii''). There is also a dummy mode that allows
    you to simulate eye movements with the mouse (''dummy''), and there is a really
    simply dummy mode (''dumbdummy'') that provides bogus values. In this example,
    the TRACKERTYPE will be set to ''eyelink''. Please change this to whatever type
    of tracker you actually wish to use.


    ```python

    # Set the TRACKERTYPE to the brand you use

    TRACKERTYPE = ''eyelink''

    ```


    Another constant you should add is DUMMYMODE. This is a Boolean that allows you
    to easily test your scripts without an eye tracker having to be attached. Setting
