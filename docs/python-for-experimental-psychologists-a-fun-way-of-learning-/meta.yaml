    # 1.1.2 Dependencies


    There are external packages that extend Python’s functionality. Some of these
    external packages run without any further ado. You install them, and they are
    ready to use. Other require additional external packages to be installed. (This
    rabbit hole can go rather deep, but we’ll aim to keep it as simple as possible!)

    When one package requires another, this is a **dependency** for that package.
    In this book, you will use the following external packages:


    | Name | Website | Description |

    | :--- | :--- | :--- |

    | SciPy | scipy.org | A collection of libraries for science. Useful for statistics
    and distributions |

    | NumPy | numpy.org | Does fast calculations on multi-dimensional arrays |

    | Matplotlib | matplotlib.org | Advanced and versatile data visualisation |

    | PyGaze | pygaze.org | Toolbox for eye-tracking experiments, with an easy syntax.
    Depends on PyGame and/or PsychoPy |

    | PyGame | pygame.org | Amazing package for game development. Perfect for experimenters,
    who basically make boring games |

    | PsychoPy | psychopy.org | Designed for psychophysics experiments; has impeccable
    timing and great functionality. Depends on pyglet and/or PyGame, and on Python
    Imaging Library (PIL) and NumPy, and many more |

    | PIL, now Pillow | python-pillow.org | PIL (which lives on by the name of Pillow)
    can be used for computer vision and images |

    | pyglet | pyglet.org | Package for OpenGL multimedia. Required by PsychoPy, which
    in turn is required by PyGaze |


    If you are installing Python from the python.org website, you will need to install
    the listed packages too. You can do so with a tool called “pip”. Alternatively,
    “Anaconda” is a Python distribution that comes with many packages pre-installed.
    Both options are further detailed in the next sections.


    # 1.1.3 Anaconda


    Instead of installing Python, and then installing all required external packages
    separately, you could opt for installing Anaconda. This is a product developed
    by a company named Anaconda (used to be known as Continuum Analytics), and free
    for students, academics, and hobbyists; but commercial users might be required
    to obtain a paid subscription. Before downloading the free version, you should
    read the Anaconda Terms of Service to make sure that you are eligible.

    Several of the packages that this book will introduce, like PsychoPy and PyGame,
    are not a part of Anaconda. These will have to be installed separately.'
