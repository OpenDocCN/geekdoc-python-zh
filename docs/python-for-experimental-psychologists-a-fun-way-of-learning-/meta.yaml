- md: "## 3.6.2 For Loops\n\nIn Python, there are several ways of repeating something\
    \ a specific number of times. The simplest approach is to use the `range()` function.\
    \ Whilst we practice different loop methods, let's make a separate .py script\
    \ from our stimuli.py file. Create a new file and call it loops.py. Try typing\
    \ this in a script and running it to see what happens:\n\n```python\nfor i in\
    \ range(0, 5):\n    print(i)\n```\n\nHopefully, if you look in your Output window,\
    \ you will see the numbers 0, 1, 2, 3, 4 printed sequentially. Note that this\
    \ does not include the number 5, as range counts from a starting point (0) to\
    \ a non-inclusive end (5). This makes sense in the context of index numbers: a\
    \ list with five items has indices 0, 1, 2, 3, and 4: exactly the numbers generated\
    \ by range!\n\nYou can simplify the above code a little bit, by relying on range's\
    \ default starting point. As this is 0, you could simply type:\n\n```python\n\
    for i in range(5):\n    print(i)\n```\n\nThe range function creates a range instance.\
    \ While it is not quite the same as a list, you could consider it similar to a\
    \ list for our current purposes. In Python, we can loop through anything that\
    \ is “iterable”, such as ranges, lists, and objects with several elements. Try\
    \ the following:\n\n```python\nfor letter in 'abc':\n    print(letter)\n```\n\n\
    Hopefully, you saw “a”, “b”, and “c” printed in your output window. A string has\
    \ several characters in it, so it is iterable, with each iteration of the loop\
    \ corresponding to one character. Now try this:\n\n```python\nfor animal in ['cat',\
    \ 'dog', 'mouse']:\n    print(animal)\n```\n\nHopefully, you saw “cat”, “dog”,\
    \ and “mouse” printed in your output window. A list also has several elements\
    \ in it, so it is iterable, with each iteration of the loop corresponding to one\
    \ element in the list.\n\nIn the examples until now, you looped through values.\
    \ It is also possible to get the index number of each value alongside. You can\
    \ do this by using the enumerate function:\n\n```python\nfor i, animal in enumerate(['cat',\
    \ 'dog', 'mouse']):\n    print(i, animal)\n```\n\nHopefully you saw:\n\n```\n\
    0 cat\n1 dog\n2 mouse\n```\n\nUsing enumerate, you can get both the index and\
    \ the value of the current element at each iteration of your for loop. We don’t\
    \ actually need the enumerate() function for our current example, but it is very\
    \ useful to know in general!\n\nOne question you may have is “what is i?” in these\
    \ loop situations. The answer is that i is commonly used as a variable that indicates\
    \ an index number in a for loop. However, this is just a convention. The name\
    \ you choose for your variable is entirely arbitrary, and you could make it anything\
    \ you’d like:\n\n```python\nfor henk, animal in enumerate(['cat', 'dog', 'mouse']):\n\
    \    print(henk, animal)\n```\n\nThis behaves in the same way, but now i is called\
    \ henk. The key here is to use a value that makes sense to you, future you, and\
    \ future people that you share your code with. With this in mind, you could consider\
    \ adopting the typical convention of using i and then using j in nested for loops:\n\
    \n```python\nfor i in range(3):\n    for j in range(5):\n        print(i, j)\n\
    ```\n\n## 3.6.3 Indentation\n\nIn Python, indentation is an integral part of your\
    \ code. Without it, for loops and other functionality will not work. For instance,\
    \ try the following:\n\n```python\nfor i in range(5):\nprint(i)\n```\n\nIf all\
    \ went well, then all didn’t go well and you saw the following error message:\n\
    \n```\nIndentationError: expected an indented block\n```\n\nThis indicates that\
    \ we are missing the required indentation, which produced an error message. Now\
    \ try the following:\n\n```python\nfor i in range(5):\n    print(i)\n    print('loop\
    \ complete')\n```\n\nThis didn’t produce an error message, but you saw the phrase\
    \ “loop complete” printed out every single loop. This likely wasn’t the intention\
    \ of the code, and instead, the programmer must have forgotten to deindent that\
    \ specific line. They probably meant to write this:\n\n```python\nfor i in range(5):\n\
    \    print(i)\n\nprint('loop complete')\n```\n\nOne “indent” can be indicated\
    \ by a tab or by spaces (typically people use four spaces per indent). Which you\
    \ use depends on your preferences and/or on your code editor’s settings. Although\
    \ indentation is generally considered a matter of personal preference, there are\
    \ some things that you should take into account.\n\nThe first thing to know is\
    \ that you should **never mix indentation types**. Use tabs OR spaces, but never\
    \ both within the same code. This causes an error (“TabError: inconsistent use\
    \ of tabs and spaces in indentation”). In addition, Python Enhancement Proposal\
    \ 666 (www.python.org/dev/peps/pep-0666/) suggests that people who mix up indentation\
    \ deserve an electric shock from a cattle prod.\n\nA more gentle guideline is\
    \ provided in Python Enhancement Proposal (PEP 8, www.python.org/dev/peps/pep-0008/#tabs-or-spaces),\
    \ which suggests using spaces should be preferred. This was written by Guido van\
    \ Rossum, the original creator of Python. While that is perhaps an authority you\
    \ might want to follow, you could also throw the entire style guide in the bin\
    \ and just do what you like. In short, style guides and conventions improve code\
    \ readability, but they’re not mandatory. (For an example of unfollowed style\
    \ guidelines, look no further than this book. We inconsistently use under_score\
    \ and camelCase variable names, like philistines!)\n\nPython reads code that is\
    \ on different indentation levels as separate blocks. With every indent you include\
    \ before a line, you effectively nest it within earlier lines. Try to predict\
    \ what the next code will print:\n\n```python\nfor i in range(5):\n    for letter\
    \ in 'abc':\n        print(i, letter)\n```\n\nIn the current state, it would print:\n\
    \n```\n0 a\n0 b\n0 c\n1 a\n1 b\n1 c\n2 a\n2 b\n2 c\n3 a\n3 b\n3 c\n4 a\n4 b\n\
    4 c\n```\n\nThis is because the number corresponds to the outer loop value, i,\
    \ and the letter corresponds to the inner loop value, letter. You can see that\
    \ we have two nested blocks here, one corresponding to the first (outer) loop\
    \ and one corresponding to the second (inner) loop.\n\n## 3.6.4 While Loops\n\n\
    Another approach to looping is to keep going until some “condition” has been achieved.\
    \ For instance, imagine we want to continuously add something to a list and then\
    \ stop once the list has the length we desire:\n\n```python\n# make an empty list\n\
    myList = []\n\n# use a while loop to keep going until a condition is met\nwhile\
    \ len(myList) < 10:\n    myList.append('na')\n\nprint(myList)\nprint('BATMAN!')\n\
    ```\n\nOK, so we could have just used a for loop that iterated ten times. The\
    \ while loop offers no benefit here, but it is just an introduction. While loops\
    \ are convenient when you don't know the number of iterations you need, but you\
    \ do know the exit condition. For example, imagine you want to keep going for\
    \ a set period of time, rather than a specific number of iterations:\n\n```python\n\
    from psychopy import core\n\n# make a clock\nclock = core.Clock()\n# create an\
    \ integer to use as a counter\na = 0\n\n# keep a loop going for 3 seconds\nwhile\
    \ clock.getTime() < 3:\n    # increment the counter\n    a += 1\n\nprint(a)\n\
    ```\n\nBe careful with while loops. First in the example above, you’ll notice\
    \ the printed value of the counter (a) was very high! (Rebecca’s computer managed\
    \ 947097 iterations, and Edwin’s absolutely smashed that with 4341881. Did yours\
    \ do better?) If we tried to print something on every iteration of the while loop,\
    \ your PsychoPy might have become unresponsive due to the high volume of data\
    \ to print.\n\nAnother (and more important!) reason to be careful with while loops\
    \ is that it is very easy to accidentally end up trapped in an infinite loop.\
    \ This happens when the exit condition is never met. For example, let’s imagine\
    \ we’re flipping a coin, and we want to keep a loop going until we get a “heads”:\n\
    \n```python\nfrom numpy.random import choice\n\n# a list with two values\ncoin\
    \ = ['heads', 'tails']\n\n# start without a result\nresult = None\n\n# create\
    \ an integer to count the number of flips\nnTries = 0\n\n# keep going until we\
    \ have a \"heads\" result\nwhile result != 'heads':\n    # flip the coin\n   \
    \ result = choice(coin)\n\n    # increment the attempts\n    nTries += 1\n\n#\
    \ print the counter\nprint(nTries)\n```\n\nRun the example several times and see\
    \ how many iterations it runs on each. Before we run the code, we don’t actually\
    \ know how many iterations it will take until we get a “heads” result.\n\nNow\
    \ imagine playing with your dodgy mate Dave. Unbeknownst to others, he has a weighted\
    \ coin; and he’s always keen to bet that it will land on tails at least ten times\
    \ in a row. Dave has recently learned how to code and is hoping to continue his\
    \ scam in Python. He writes the following code:\n\n```python\nfrom numpy.random\
    \ import choice\n\n# a list with two values\n```"
  mdcn: "## 3.6.2 For 循环\n\n在 Python 中，有多种方式可以将某件事重复特定次数。最简单的方法是使用 `range()` 函数。在我们练习不同的循环方法时，让我们从\
    \ `stimuli.py` 文件中创建一个单独的 `.py` 脚本。创建一个新文件并将其命名为 `loops.py`。尝试在脚本中输入以下内容并运行，看看会发生什么：\n\
    \n```python\nfor i in range(0, 5):\n    print(i)\n```\n\n希望你在输出窗口中看到数字 0、1、2、3、4\
    \ 按顺序打印出来。请注意，这不包括数字 5，因为 `range` 从起点（0）计数到不包含的终点（5）。这在索引数字的上下文中是有意义的：一个包含五个项目的列表的索引是\
    \ 0、1、2、3 和 4：这正是 `range` 生成的数字！\n\n你可以稍微简化上面的代码，依靠 `range` 的默认起点。由于默认起点是 0，你只需输入：\n\
    \n```python\nfor i in range(5):\n    print(i)\n```\n\n`range` 函数创建一个 range 实例。虽然它与列表不完全相同，但就我们当前的目的而言，你可以将其视为类似于列表。在\
    \ Python 中，我们可以遍历任何“可迭代”的对象，例如 range、列表和包含多个元素的对象。尝试以下代码：\n\n```python\nfor letter\
    \ in 'abc':\n    print(letter)\n```\n\n希望你在输出窗口中看到打印出的 “a”、 “b” 和 “c”。字符串包含多个字符，因此它是可迭代的，循环的每次迭代对应一个字符。现在尝试这个：\n\
    \n```python\nfor animal in ['cat', 'dog', 'mouse']:\n    print(animal)\n```\n\n\
    希望你在输出窗口中看到打印出的 “cat”、 “dog” 和 “mouse”。列表也包含多个元素，因此它是可迭代的，循环的每次迭代对应列表中的一个元素。\n\
    \n在目前的示例中，你遍历的是值。也可以同时获取每个值的索引号。你可以通过使用 `enumerate` 函数来实现：\n\n```python\nfor i,\
    \ animal in enumerate(['cat', 'dog', 'mouse']):\n    print(i, animal)\n```\n\n\
    希望你看到：\n\n```\n0 cat\n1 dog\n2 mouse\n```\n\n使用 `enumerate`，你可以在 `for` 循环的每次迭代中同时获取当前元素的索引和值。在我们当前的示例中，我们实际上不需要\
    \ `enumerate()` 函数，但了解它通常非常有用！\n\n你可能有一个疑问，在这些循环情况中 “i 是什么？” 答案是，`i` 通常用作表示 `for`\
    \ 循环中索引号的变量。然而，这只是一个约定。你为变量选择的名称完全是任意的，你可以将其设为你想要的任何名称：\n\n```python\nfor henk,\
    \ animal in enumerate(['cat', 'dog', 'mouse']):\n    print(henk, animal)\n```\n\
    \n它的行为方式相同，但现在 `i` 被称为 `henk`。这里的关键是使用一个对你、未来的你以及未来与你分享代码的人来说有意义的值。考虑到这一点，你可以考虑采用典型的约定，即使用\
    \ `i`，然后在嵌套的 `for` 循环中使用 `j`：\n\n```python\nfor i in range(3):\n    for j in range(5):\n\
    \        print(i, j)\n```\n\n## 3.6.3 缩进\n\n在 Python 中，缩进是代码不可或缺的一部分。没有它，`for`\
    \ 循环和其他功能将无法工作。例如，尝试以下代码：\n\n```python\nfor i in range(5):\nprint(i)\n```\n\n\
    如果一切顺利，那么一切都不顺利，你看到了以下错误消息：\n\n```\nIndentationError: expected an indented block\n\
    ```\n\n这表明我们缺少所需的缩进，从而产生了错误消息。现在尝试以下代码：\n\n```python\nfor i in range(5):\n   \
    \ print(i)\n    print('loop complete')\n```\n\n这没有产生错误消息，但你看到短语 “loop complete”\
    \ 在每次循环中都被打印出来。这可能不是代码的本意，相反，程序员一定是忘记了取消缩进那一行。他们可能想写的是这个：\n\n```python\nfor i\
    \ in range(5):\n    print(i)\n\nprint('loop complete')\n```\n\n一个“缩进”可以用制表符或空格表示（通常人们每个缩进使用四个空格）。使用哪种取决于你的偏好和/或你的代码编辑器的设置。虽然缩进通常被认为是个人偏好的问题，但有些事情你应该考虑。\n\
    \n首先要知道的是，你**永远不应该混合使用缩进类型**。使用制表符或空格，但绝不要在同一个代码中同时使用两者。这会导致错误（“TabError: inconsistent\
    \ use of tabs and spaces in indentation”）。此外，Python 增强提案 666（www.python.org/dev/peps/pep-0666/）建议，那些混淆缩进的人应该被电击棒电击。\n\
    \nPython 增强提案（PEP 8，www.python.org/dev/peps/pep-0008/#tabs-or-spaces）提供了一个更温和的准则，建议优先使用空格。这是由\
    \ Python 的原始创建者 Guido van Rossum 撰写的。虽然这可能是你想遵循的权威，但你也可以把整个风格指南扔进垃圾桶，只做你喜欢的事。简而言之，风格指南和约定提高了代码的可读性，但它们不是强制性的。（关于未遵循风格指南的例子，看看这本书就行了。我们不一致地使用\
    \ `under_score` 和 `camelCase` 变量名，就像野蛮人一样！）\n\nPython 将处于不同缩进级别的代码读取为单独的块。在每一行之前包含的每个缩进，你实际上将其嵌套在前面的行中。尝试预测以下代码将打印什么：\n\
    \n```python\nfor i in range(5):\n    for letter in 'abc':\n        print(i, letter)\n\
    ```\n\n在当前状态下，它将打印：\n\n```\n0 a\n0 b\n0 c\n1 a\n1 b\n1 c\n2 a\n2 b\n2 c\n3 a\n\
    3 b\n3 c\n4 a\n4 b\n4 c\n```\n\n这是因为数字对应于外层循环的值 `i`，字母对应于内层循环的值 `letter`。你可以看到我们这里有两个嵌套块，一个对应于第一个（外层）循环，另一个对应于第二个（内层）循环。\n\
    \n## 3.6.4 While 循环\n\n另一种循环方法是持续进行，直到达到某个“条件”。例如，想象我们想不断向列表添加内容，然后一旦列表达到我们想要的长度就停止：\n\
    \n```python\n# 创建一个空列表\nmyList = []\n\n# 使用 while 循环持续进行，直到满足条件\nwhile len(myList)\
    \ < 10:\n    myList.append('na')\n\nprint(myList)\nprint('BATMAN!')\n```\n\n好的，我们本可以只使用一个迭代十次的\
    \ `for` 循环。`while` 循环在这里没有提供任何好处，但这只是一个介绍。当你不知道需要多少次迭代，但知道退出条件时，`while` 循环很方便。例如，想象你想持续一段固定的时间，而不是特定的迭代次数：\n\
    \n```python\nfrom psychopy import core\n\n# 创建一个时钟\nclock = core.Clock()\n# 创建一个整数用作计数器\n\
    a = 0\n\n# 让循环持续 3 秒\nwhile clock.getTime() < 3:\n    # 递增计数器\n    a += 1\n\n\
    print(a)\n```\n\n小心使用 `while` 循环。首先，在上面的例子中，你会注意到计数器（`a`）的打印值非常高！（Rebecca 的计算机运行了\
    \ 947097 次迭代，而 Edwin 的计算机更是达到了 4341881 次。你的计算机表现更好吗？）如果我们尝试在 `while` 循环的每次迭代中打印一些内容，你的\
    \ PsychoPy 可能会因为要打印的数据量过大而变得无响应。\n\n另一个（也是更重要的！）需要小心使用 `while` 循环的原因是，很容易意外地陷入无限循环。当退出条件永远无法满足时，就会发生这种情况。例如，让我们想象我们正在抛硬币，我们想持续循环直到得到“正面”：\n\
    \n```python\nfrom numpy.random import choice\n\n# 一个包含两个值的列表\ncoin = ['heads',\
    \ 'tails']\n\n# 开始时没有结果\nresult = None\n\n# 创建一个整数来计算抛硬币的次数\nnTries = 0\n\n# 持续进行，直到得到“正面”结果\n\
    while result != 'heads':\n    # 抛硬币\n    result = choice(coin)\n\n    # 递增尝试次数\n\
    \    nTries += 1\n\n# 打印计数器\nprint(nTries)\n```\n\n多次运行示例，看看每次运行多少次迭代。在我们运行代码之前，我们实际上不知道需要多少次迭代才能得到“正面”结果。\n\
    \n现在想象和你那个狡猾的朋友 Dave 一起玩。在别人不知情的情况下，他有一枚加重的硬币；而且他总是热衷于打赌它会连续至少十次落在反面。Dave 最近学会了如何编码，并希望继续他的骗局用\
    \ Python 实现。他写了以下代码：\n\n```python\nfrom numpy.random import choice\n\n# 一个包含两个值的列表\n\
    ```"
