    \ the correct way of analysing them can be debated. The reason for this is that\
    \ reaction times are typically not normally distributed. This makes sense: a reaction\
    \ time cannot be lower than 0, but it can always be longer (to infinity, and perhaps\
    \ beyond?). In most datasets, the distribution of reaction times has a positive\
    \ skew, i.e. a longer tail on the right.\n\nWhy does this matter? Well, if you\
    \ calculate a mean, it identifies the centre of a non-skewed distribution. So\
    \ when you calculate a mean of a skewed distribution, it might not correctly represent\
    \ its centre. Instead, the mean will be pulled towards the tail.\n\nOne alternative\
    \ option is to calculate a **median**. This is the value that is in the centre\
    \ when you make an ordered list of all the reaction times and can be a better\
    \ reflection of the centre of a skewed distribution.\n\nA more fancy alternative\
    \ is to fit an ExGaussian distribution to your reaction time data. This is a combination\
    \ of a normal distribution and an exponential decay function, so it matches the\
    \ typical profile of a distribution of reaction times. The ExGaussian provides\
    \ you with a centre parameter (equivalent to the mean) and a deviation parameter\
    \ (equivalent to the standard deviation). The downside of using an ExGaussian\
    \ fit is that you need a lot of data for a good parameter estimation.\n\nFor simplicity’s\
