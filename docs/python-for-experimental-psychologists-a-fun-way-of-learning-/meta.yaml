  md: 'positive and one negative number, or one negative and one positive number;
    and both end up as a negative value.

    Covariance will be low if people are not consistent in their scores. Some people
    will score higher than the mean on two variables, but others will score higher
    than the mean on one and lower on the other, and yet others will score lower on
    the first and higher on the second. If this is the case, the result is a nice
    mixture of positive and negative values, which will average out to around 0: no
    covariance!


    # 9.3.2 Pearson’s R Coefficient


    You can think Pearson’s correlation coefficient R is computed as the ratio of
    covariance and variance. It is computed by dividing the covariance between two
    variables by the product of the standard deviations of those variables. R varies
    from –1 for a completely negative correlation via 0 for no correlation, to 1 for
    a completely positive correlation. Such a complete correlation would mean that
    for every difference in one variable, the difference in the other variable is
    the exact same. So if I score 1 standard deviation above the mean for reading
    about pigeons, I would also be one standard deviation above the mean on a quality-of-life
    questionnaire.

    In Python, you can simply use SciPy’s stats module to compute R and an associated
    p-value, by using the pearsonr function:


    ```

    from scipy.stats import pearsonr


    x = [1.4, -0.7, -0.9, 0.4, 0.3, \n     -0.1, 1.0, -0.3, -0.2, 1.1]

    y = [0.9, -0.6, -0.7, -0.3, 0.5, \n     0.1, -0.2, -0.5, 0.3, 0.8]

    r, p = pearsonr(x, y)

    print(r, p)

    ```


    The p-value for a correlation quantifies the probability of finding an R value
    like the observed or more extreme, assuming that no correlation exists between
    the two variables.


    # 9.3.3 Spearman’s ρ Coefficient


    Pearson’s correlation coefficient R suffers from extreme values. When these are
    present in either variable, this impacts the covariance computation, and they
    can disproportionately pull on the R value. In these cases, you could opt for
    using non-parametric tests of correlation. One such metric is Spearman’s rank
    correlation coefficient ρ.

    The beauty of ρ is that it works exactly the same as R: it is the standardised
    covariance, i.e. the covariance between two variables divided by the product of
    their standard deviations. However, we employ a little trick first to get rid
    of those pesky extreme values! Instead of using the actual data, we use their
    rank-order instead. For the example above, the rank orders would be like this:


    ```

    x_rank = [10, 2, 1, 7, 6, 5, 8, 3, 4, 9]

    y_rank = [10, 2, 1, 4, 8, 6, 5, 3, 7, 9]

    ```'
