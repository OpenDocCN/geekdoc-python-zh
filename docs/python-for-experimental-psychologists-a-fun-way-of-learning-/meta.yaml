  md: "```\nblurry_beach = visual.ImageStim(win, image=gaussImage,\n    flipHoriz=True,\
    \ pos=(0, -200), size=(200, 140),\n    mask=None)\n```\n\nAs always, add blurry_beach.draw()\
    \ to your set of draw commands in order to see the blurry beach.\n\nOne common\
    \ use of Python for experimental psychologists is to generate the stimuli for\
    \ experiments. If you wanted to create a set of images with different blur levels,\
    \ you could use variations of the above code. To save each blurred image, you\
    \ could use its save function:\n\n```\n# save this image\ngaussImage.save('blurry_beach.jpg')\n\
    ```\n\nYou could even use a loop to generate large sets of images, which we will\
    \ learn about in a moment.\n\n# 3.6 Making Many Stimuli\n\nIn some circumstances,\
    \ we want to present many stimuli on the screen at once. For example, a visual\
    \ search task could present a large number of letters on the screen, with one\
    \ target letter (“L”) embedded among many distractors (“T”).\n\nNow, we know how\
    \ to make one letter using TextBox2 (see Section 3.4 if you forgot). In theory,\
    \ we could just copy and paste this many times and manually edit each TextBox2\
    \ instance’s position to be different. However, this isn’t really very efficient,\
    \ requires a tonne of manual work, and results in ugly and unmaintainable code\
    \ (editing 50 lines of stimulus positions isn’t quick!). In order to achieve this\
    \ more efficiently, we need to know two things: how to set a stimulus to a random\
    \ location and how to use loops.\n\n# 3.6.1 Creating Stimuli in Random Locations\n\
    \nSetting a stimulus to a random location is another chance to practise using\
    \ the NumPy library. NumPy has a number of functions that we can use for randomisation\
    \ and housed within its random module. These include shuffle (to shuffle the order\
    \ of elements in a list), choice (to randomly pick an element from a list or array),\
    \ and randint (to generate a random integer between specified values). Using randint,\
    \ we will be able to create a random value for our horizontal (x) and vertical\
    \ (y) coordinates, but within a known bound. To set the position of a stimulus\
    \ to be in a random position, we could use:\n\n```\n# import a named method from\
    \ a module\nfrom numpy.random import randint\n\n# the minimum and maximum coordinates\n\
    min_xy = -200\nmax_xy = 200\n\n# generate a pseudo-random location\nrand_pos =\
    \ (randint(min_xy, max_xy),\n            randint(min_xy, max_xy))\n```"
