    as for the `draw_raw` and `draw_fixation` functions: `imagefile` to specify the
    original image and `savefilename` to store the produced heatmap. Another keyword
    is `alpha`, which allows you to set the transparency of the heatmap that will
    be superimposed on the image. If set to 0, the heatmap will be fully transparent,
    and if set to 1, the heatmap will be completely opaque. The default value is 0.5.
    The final keyword is `durationweight`, which requires a Boolean. If you set it
    to `True`, the duration of fixations will be weighted into the heatmap construction,
    with longer fixations being assigned more weight. If set to `False`, all fixations
    will be treated as equally important. The default value is `True`.


    To draw and save a heatmap, and to close it again afterwards, use the following
    code:


    ```

    # Plot a heatmap

    savename = ''heatmap_{}''.format(imgname)

    savepath = os.path.join(OUTPUTDIR, savename)

    fig = gazeplotter.draw_heatmap(fixations, DISPSIZE, \n                               imagefile=imgpath,
    savefilename=savepath)

    close(fig)

    ```


    And with that, your script should be finished. Run it to loop through all trials,
    creating three data visualisations per trial. When the script finishes, you can
    admire all of these plots in the output folder.


    The example images include a screenshot of a documentation website. The text on
    that webpage was clearly being scanned by the participant. You can see this in
    the raw data plot'
