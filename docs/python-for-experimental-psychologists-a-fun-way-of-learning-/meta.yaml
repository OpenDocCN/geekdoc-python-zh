  md: "Clearly, the engineers who thought this up were efficient but not research\
    \ psychologist. If you’re interested in human ergonomics and would like to see\
    \ a high-resolution mouse trajectory, can you still use standard computer peripherals?\n\
    \nMost modern peripherals are connected via USB. Most operating systems poll the\
    \ USB port at a rate of 125 Hz (every 8 milliseconds). This means you’ll have\
    \ an average timing error of 4 milliseconds. Some extra inaccuracy is added by\
    \ further delays, e.g. in the signal from your input device having to travel to\
    \ the computer, and within the computer’s processes that make sure the input reaches\
    \ your experiment software.\n\nSuch inaccuracy can be reduced by using software\
    \ that polls the USB port more often (**drivers**) and with specialised hardware\
    \ that can handle this. Some consumer-grade hardware and software can boost the\
    \ polling rate to (over) 1,000 Hz. That’s one data point every millisecond! Such\
    \ devices are popular among gamers, who think they might avoid getting shot in\
    \ their virtual heads if their keyboard registers their key-bashing a millisecond\
    \ or two quicker.\n\nThere are researchers who argue that one simply cannot investigate\
    \ short-lived mental processes with timing imprecisions of several milliseconds.\
    \ Therefore, they buy expensive devices (often connected in more intricate ways\
    \ than USB) with extremely high polling rates to achieve millisecond or sub-millisecond\
    \ accuracy.\n\nSo, are they right? “Yes” in principle but also probably “no” in\
    \ practice. Just like computers, participants are not free from timing imprecision.\
    \ In fact, people are so inconsistent that we need many trials to accurately measure\
    \ the distribution of their response times. This human timing inaccuracy is much\
