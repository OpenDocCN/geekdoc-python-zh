    \ Pixels with an alpha of -1 are fully transparent and pixels with an alpha of\
    \ 1 are fully opaque.\n\n### 3.6.2 Blurring Images Using Python Imaging Library\n\
    \nWhen presenting an image, you might want to manipulate the image in various\
