    Development Environment**. This is a simple editor but works just fine. There
    are also more generic editors, like Notepad++, a wonderful open-source editor
    that is simple and easy to use; Microsoft’s Visual Studio, a more complex but
    well-equipped platform (just make sure that free Community Edition is licensed
    for your purposes); and JetBrains’s PyCharm, another more advanced editor (the
    Community Edition is open source and licensed to use for almost all purposes).
    A rather exceptional code editor for Python is **Spyder**. It works on all platforms
    and is actually included with both Anaconda and WinPython. So if you have installed
    either of those, you already have it.


    Spyder has some very useful options. First, it sports a familiar interface for
    people with experience in Matlab, or with R Studio, the NetBeans IDE (for Java,
    PHP, C, and C++), or with the Java Editor. This is also an advantage for novice
    programmers, who will later be able to switch to other editors more comfortably.
    Another advantage is that Spyder has its own built-in interpreters (called **consoles**).
    This means you write and run scripts within Spyder, which is a feature you might
    come to find useful. Finally, Spyder is highly customisable. I usually set the
    editor’s background colour to black, for extra nerd credibility. And on Wednesdays,
