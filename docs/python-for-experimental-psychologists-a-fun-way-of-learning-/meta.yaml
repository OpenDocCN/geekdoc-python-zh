    \ will result in an error if you do not pass all arguments.**\n\n## 2.7.2 Keyword\
    \ Arguments\n\nKeyword arguments are basically the same thing as arguments, with\
    \ one important exception: they have a default value. You can assign this default\
    \ value in the function definition, as was done with `n_garlic` and `n_oregano`\
    \ in the `make_mash` function:\n\n```\ndef make_mash(n_potatoes, n_garlic=1, n_oregano=6):\n\
    ```\n\nThe practical benefit of using keyword arguments is that you don’t have\
    \ to assign their values when you call a function. For example, the following\
    \ two calls to the `make_mash` function are equivalent:\n\n```\nmash = make_mash(5,\
    \ n_garlic=1, n_oregano=6)\nmash = make_mash(5)\n```\n\nAs a result of having\
    \ a default value, if you don’t pass any keyword arguments, it will not cause\
    \ an error. This is in contrast to arguments: if you don’t specify an argument\
    \ when calling a function, you do get an error.\n\nIt is useful to define sensible\
    \ keyword arguments when you write function definitions. This allows you to call\
    \ the function without having to bother with specifying every little detail, but\
    \ it does keep the option to bother with details open. In the `make_mash` example,\
    \ this means that you could rely on the default amount of garlic (1 clove), but\
    \ if you really like it (and don’t mind smelling of it), you could also throw\
    \ in 6 cloves:\n\n```\nmash = make_mash(5, n_garlic=6)\n```\n\nOf course, mash\
    \ is a silly example, but you will encounter more practical examples of keyword\
    \ arguments later in this book. When you do, think about what type of argument\
    \ you would have used. In addition, you might want to think about whether you\
    \ could *only* use keyword arguments. Is there a benefit of using arguments?\n\
    \n## 2.7.3 Local and Global Variables\n\nVariables (including arguments and keyword\
    \ arguments) are **local** to the function that they were created in. That means\
    \ that the variable `potatoes` can be used throughout the entire `make_mash` function,\
    \ but not outside of it. This might sound trivial, but it’s not.\n\nIf you want\
    \ a variable that was created within a function to be accessible from outside\
    \ the function (i.e. in the rest of your script), you have to return it. This\
    \ is why the definition of the `make_mash` function ends with `return mash`. If\
    \ this last line was not there, the function would have no output. Consequently,\
    \ you would not be able to use `mash`.\n\nThe reason that variables are local\
    \ to a function is that they would otherwise crowd your work space. Imagine a\
    \ complicated function that would use 100 variables within. If you have a script\
    \ in which you call this complicated function, you would have to make sure that\
    \ *none* of your own variables share a name with those created within the complicated\
    \ function. If one does, it will be overwritten, and your script might start behaving\
    \ weirdly.\n\nAnother option to share variables between your script and the insides\
    \ of functions is to declare variables **global**. This means variables will be\
    \ recognised in your script and also within functions. This is not recommended,\
    \ unless you have a good reason to do so. To declare a variable global, include\
    \ the following line in your script:\n\n```\nglobal mash\n```\n\nAnd the following\
    \ in your function definition (don't forget the indentation with four spaces):\n\
    \n```\n    global mash\n```\n\nIn general, it is recommended to be very careful\
    \ with declaring global variables. The cleaner and clearer option is to explicitly\
    \ return the variables that you need from inside a function.\n\n## 2.7.4 Create\
    \ Your First Function\n\nAfter learning about functions, it's time to define one\
    \ yourself! This is an important moment in your personal programming history,\
    \ so savour it. In the Interpreter, type the following line:\n\n```\ndef hello_world():\n\
    ```\n\nAfter typing the line, hit Enter and type the following line (don't forget\
    \ to start the next line with four spaces!):\n\n```\n    print('Hello World!')\n\
    ```\n\nHit Enter twice and maybe a few times more for good measure. Now call your\
    \ own function by typing:\n\n```\nhello_world()\n```\n\nIf you did everything\
    \ correctly, \"Hello World!\" should have appeared in the Interpreter. That was\
    \ the result of your very first function! Congrats!\n\nWhat you just did is to\
    \ define a function named `hello_world`, which takes no inputs and produces no\
    \ outputs. It simply prints \"Hello World!\" to the Interpreter.\n\n## 2.7.5 Create\
    \ Your Second Function\n\nLet's make things more exciting. Let's create a function\
    \ that does take an input! You could create a function that prints \"Hello World!\"\
    \ a specified number of times. An argument"
  mdcn: "## 2.6 变量类型\n\n现实生活中一个常见的函数例子是烹饪食谱。食谱告诉你如何制作一道特定的菜肴。它的输入是食材，输出是你的晚餐。让我们看看土豆泥的食谱是如何定义的：\n\
    \n```\n制作土豆泥\n输入：\n5个土豆，1瓣大蒜，6茶匙牛至\n输出：\n土豆泥\n步骤：\n\n1 切碎大蒜\n2 清洗土豆\n3 削土豆皮\n\
    4 将土豆煮20分钟\n5 捣碎土豆\n6 将大蒜和牛至加入土豆泥\n7 搅拌土豆泥\n```\n\n你可能已经注意到，其中一些单独的步骤也可以被定义为函数。例如，函数“煮土豆”的输入（削皮的土豆、水和锅）、输出（煮熟的土豆和热水）以及步骤（“往锅里加水，把锅放在炉子上，加热炉子，等待20分钟”）。在编程中也会发生这种情况：一些函数会调用其他函数来工作。\n\
    \n作为练习，让我们看看如何在Python中定义制作土豆泥的函数：\n\n```\ndef make_mash(n_potatoes, n_garlic=1,\
    \ n_oregano=6):\n    potatoes = get_potatoes(n_potatoes)\n    garlic = get_garlic(n_garlic)\n\
    \    oregano = get_oregano(n_oregano)\n\n    garlic = chop(garlic)\n    potatoes\
    \ = wash(potatoes)\n    potatoes = peel(potatoes)\n    potatoes = boil(potatoes,\
    \ duration=20)\n    mash = smash(potatoes)\n\n    ingredients = [mash, garlic,\
    \ oregano]\n    mash = stir(ingredients)\n\n    return mash\n```\n\n这对你来说可能有点奇怪，确实如此。但有几点你应该注意。首先是一个重要的普遍观察：函数`make_mash`调用了几个其他函数（例如`get_potatoes`和`stir`），这些函数尚未定义，也不是Python基础语言的一部分。目前，只需假设它们在其他地方已定义。\n\
    \n另一个需要注意的重要事项是Python中函数的定义方式。函数定义总是以`def`开头。后面是函数名，在本例中是`make_mash`。函数名*总是*跟着一对圆括号。在这些括号内，定义了输入。这些输入被称为**参数**，我们稍后会再讨论它们。函数定义的最后一部分是冒号`:`。\n\
    \n属于函数的所有代码都是**缩进**的。你将在*If语句*部分学到更多关于缩进的知识。目前，你只需要知道Python通过代码相对于函数定义的偏移量来识别属于函数的所有代码。偏移量是函数内每行代码前的四个空格。\n\
    \n在代码的末尾，函数**返回**一个变量：`mash`。这是函数的输出，它可以是单个变量或变量列表。输出变量可以是数字、字符串、列表、元组、类，甚至是其他函数。\n\
    \n使用函数被称为**调用**函数。一般语法如下：\n\n```\noutput = function(input)\n```\n\n例如，调用`make_mash`函数的语法是：\n\
    \n```\nmash = make_mash(5, n_garlic=1, n_oregano=6)\n```\n\n这将调用`make_mash`函数，输入为五个土豆、一瓣大蒜和六茶匙牛至。输出将存储在名为`mash`的变量中。\n\
    \n## 2.7.1 参数\n\n参数是使用函数的重要组成部分，尽管它们不是必需的。理论上，你可以定义一个没有输入参数的函数。参数是在函数定义内定义的变量名。在`make_mash`函数中，有一个参数：`n_potatoes`。（我们稍后会再讨论`n_garlic`和`n_oregano`。）\n\
    \n`n_potatoes`是在以下行中创建的：\n\n```\ndef make_mash(n_potatoes, n_garlic=1, n_oregano=6):\n\
    ```\n\n你可能想知道为什么`n_potatoes`没有像`n_garlic`和`n_oregano`那样关联一个值。这是因为值只在调用`make_mash`时才被赋值。如果你想让`n_potatoes`为五，你可以这样调用`make_mash`函数：\n\
    \n```\nmash = make_mash(5, n_garlic=1, n_oregano=6)\n```\n\n如果你真的很饿，想用10个土豆做土豆泥，你可以这样调用`make_mash`函数：\n\
    \n```\nmash = make_mash(10, n_garlic=1, n_oregano=6)\n```\n\n其理念是自动化任务，同时允许参数的灵活性。你可以使用同一个函数来制作很少或大量的土豆泥，只需更改参数的值即可。\n\
    \n在编程中，为参数提供值通常被称为**传递**参数。重要的是，**如果你不传递所有参数，调用函数将导致错误。**\n\n## 2.7.2 关键字参数\n\n\
    关键字参数基本上与参数相同，但有一个重要例外：它们有一个默认值。你可以在函数定义中分配这个默认值，就像在`make_mash`函数中对`n_garlic`和`n_oregano`所做的那样：\n\
    \n```\ndef make_mash(n_potatoes, n_garlic=1, n_oregano=6):\n```\n\n使用关键字参数的实际好处是，你不必在调用函数时分配它们的值。例如，以下两次对`make_mash`函数的调用是等效的：\n\
    \n```\nmash = make_mash(5, n_garlic=1, n_oregano=6)\nmash = make_mash(5)\n```\n\
    \n由于有默认值，如果你不传递任何关键字参数，它不会导致错误。这与参数形成对比：如果你在调用函数时未指定参数，你确实会得到一个错误。\n\n在编写函数定义时，定义合理的关键字参数很有用。这允许你调用函数而不必费心指定每一个小细节，但它确实保留了处理细节的选项。在`make_mash`示例中，这意味着你可以依赖默认的大蒜量（1瓣），但如果你真的喜欢它（并且不介意身上有味道），你也可以加入6瓣：\n\
    \n```\nmash = make_mash(5, n_garlic=6)\n```\n\n当然，土豆泥是一个愚蠢的例子，但你将在本书后面遇到更多关键字参数的实际示例。当你遇到时，想想你会使用哪种类型的参数。此外，你可能想考虑是否*只能*使用关键字参数。使用参数有什么好处？\n\
    \n## 2.7.3 局部变量和全局变量\n\n变量（包括参数和关键字参数）对于创建它们的函数是**局部**的。这意味着变量`potatoes`可以在整个`make_mash`函数中使用，但不能在函数外部使用。这听起来可能微不足道，但事实并非如此。\n\
    \n如果你想让在函数内部创建的变量可以从函数外部（即在脚本的其余部分）访问，你必须返回它。这就是为什么`make_mash`函数的定义以`return mash`结尾。如果没有最后一行，函数将没有输出。因此，你将无法使用`mash`。\n\
    \n变量是函数局部的原因是，否则它们会挤占你的工作空间。想象一个复杂的函数，它在内部使用100个变量。如果你有一个脚本调用这个复杂的函数，你必须确保*没有*你自己的变量与在复杂函数内创建的变量同名。如果有，它将被覆盖，你的脚本可能会开始表现异常。\n\
    \n在脚本和函数内部之间共享变量的另一个选项是将变量声明为**全局**。这意味着变量将在你的脚本中以及函数内部被识别。除非你有充分的理由，否则不建议这样做。要声明一个全局变量，请在脚本中包含以下行：\n\
    \n```\nglobal mash\n```\n\n并在函数定义中包含以下行（不要忘记四个空格的缩进）：\n\n```\n    global mash\n\
    ```\n\n一般来说，建议非常谨慎地声明全局变量。更清晰、更明确的选项是从函数内部显式返回你需要的变量。\n\n## 2.7.4 创建你的第一个函数\n\n\
    在学习了函数之后，是时候自己定义一个了！这是你个人编程历史上的一个重要时刻，所以好好品味它。在解释器中，输入以下行：\n\n```\ndef hello_world():\n\
    ```\n\n输入该行后，按回车键并输入以下行（不要忘记下一行以四个空格开头！）：\n\n```\n    print('Hello World!')\n\
    ```\n\n按两次回车键，也许再多按几次以确保。现在通过输入以下内容来调用你自己的函数：\n\n```\nhello_world()\n```\n\n如果你做的一切都正确，“Hello\
    \ World!”应该已经出现在解释器中。这就是你的第一个函数的结果！恭喜！\n\n你刚才做的是定义一个名为`hello_world`的函数，它不接受任何输入，也不产生任何输出。它只是向解释器打印“Hello\
    \ World!”。\n\n## 2.7.5 创建你的第二个函数\n\n让我们让事情更令人兴奋。让我们创建一个确实接受输入的函数！你可以创建一个函数，打印“Hello\
    \ World!”指定的次数。一个参数"
