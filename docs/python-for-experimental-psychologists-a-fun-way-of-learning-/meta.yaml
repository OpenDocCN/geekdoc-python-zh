    Computations that involve a whole line of numbers are sometimes called *array
    calculations*, and they can make your life very easy. To do them in Python, you
    need to get acquainted with **NumPy** (Harris et al., 2020; Oliphant, 2007).


    NumPy is what people call an **external package** or **library**. It is not included
