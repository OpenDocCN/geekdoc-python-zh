    \      6:698, 7:784, 8:880, 9:988}\n```\n\nNow that you specified all the frequencies,\
    \ it’s time to create a Sound instance for each frequency. To do this, you could\
    \ use a for loop to loop through the freqs dict’s keys. You can use the dict’s\
    \ keys method to generate a list of all key names. The best way of storing the\
    \ Sound instances is in a dict with the same keys as the freqs dict. Add the following\
    \ code to your script, directly after the lines where you define the freqs variable:\n\
    \n```\n# create an empty dict for the sounds\nsounds = {}\n# loop through the\
    \ keys of the freqs dict\nfor button in freqs.keys():\n    # create a new Sound\
    \ instance with the right frequency\n    sounds[button] = Sound(osc='sine', freq=freqs[button],\
    \ \\n                          length=250, attack=10, decay=10)\n```\n\nNow only\
