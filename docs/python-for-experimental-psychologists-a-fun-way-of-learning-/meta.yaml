    # 9.3.4 Side Note: Who Are These Tests Named After?


    Like many statistical tests and concepts, the above tests are named after people:
    Karl Pearson and Charles Spearman. They are statisticians who were alive from
    around 1860 to 1940, and apparently the two hated each other (academic gossip
    shall not be referenced). Perhaps more notable, though, is how their efforts greatly
    helped the eugenics movement. Sadly, many statisticians and psychologists around
    this time were active and enthusiastic eugenicists, even though one could reasonably
    argue they could have known better. Much is written on this topic, in much better
    and more comprehensive prose than I will be able to produce. I simply wanted to
    contextualise the names of these tests, as it felt wrong to hide this information.


    # 9.4 Linear Regression


    Sometimes, we have more than one variable that we think is associated with an
    outcome of our interest. For example, we might want to probe how the teaching
    evaluations of lecturers are related to them wearing a tweed jacket and also their
    h-index. We could correlate both sets of values, but this only gets at the individual
    pairwise relationships. Instead, it could be that people with higher h-indices
    are more likely to wear tweed, which would make the variables overlap in their
    relationship with teaching evaluations. Linear regression allows us to test both
    variables at the same time, thereby avoiding double counting any overlap.


    Regression is often cloaked in the language of prediction. This is because we
    explicitly use variables to predict an outcome. However, you should really only
    consider this “prediction” from a practical mathematical standpoint, and not from
    a more philosophical viewpoint of causation. If we regress variables x1 and x2
    on outcome y, it does not necessarily mean that x1 and x2 caused y. In our example
    above, it could be that lecturers obtain high teaching evaluations because students
    trust them more when they are wearing tweed and because they have substantial
    experience with publishing papers (which has also improved their h-index). However,
    it could also be that lecturers are more likely to start wearing tweed if their
    confidence in their academic ability is boosted by teaching evaluations and their
    h-index. Linear regressions do not pick up on the direction of causality, they
    just tell you about associations. You need to address causality by cleverly designing
    your experiments and models, by using manipulations, and by simply waiting for
    the passage of time. Perhaps, taking all of these together, your theories can
    carefully converge on causality.'
