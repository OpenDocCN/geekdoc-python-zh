    # 4

    PROCESSING RESPONSES


    Almost every computer-based experiment in psychology and cognitive neuroscience
    requires participants to respond in one way or another. The most common instrument
    to collect these responses is the computer keyboard. In the following chapters,
    you will learn how to collect and process keypresses.


    # 4.1 Are Peripherals Accurate Enough?


    Some researchers claim that keyboards are too slow for their purposes, as they
    require “millisecond accuracy”. Because it is important to know your tools, this
    chapter will investigate this claim.


    In most operating systems, **peripherals** (keyboards, mice, joysticks, game controllers
    etc.) are **polled** at a certain rate. Polling a device means checking its state:
    are any of the keys or buttons pressed, or is there movement along any of the
    axes? The polling rate determines how often an operating system checks for new
    input. If the polling rate is 60 Hz, the keyboard will be checked roughly every
    17 milliseconds. If a key is pressed 2 milliseconds after the last ‘poll’, it
    will take another 15 milliseconds for it to be picked up.


    Traditionally, the polling rate of keyboards and mice was 60 Hz, matching the
    standard display refresh rate. This makes sense: if the display is updated only
    once every 17 milliseconds, why should you check for input more than that? The
    input is used to update the display, so polling devices twice every display refresh
    will result in one redundant poll.


    An example: Imagine your mouse is at screen coordinate (10,10) at time 0 ms (this
    coincides with the latest screen refresh). Now you move your mouse, which is polled
    at a rate of 120 Hz. The mouse was registered to be at point (15,15) at time 8
    ms and at point (20,20) at time 17 ms. The display is updated to show the mouse
    cursor at coordinate (20,20) at time 17 ms. The data from time 8 ms is disregarded
    for the updating of the monitor, because it’s old data. This means that polling
    the mouse at a higher rate than the monitor refresh is effectively useless.


