    Taylor & Francis Group


    http://taylorandfrancis.com


    # 关于 Python


    Python 是一门令人惊叹的编程语言，最初由 Guido van Rossum 开发，后经一个庞大的全球社区改进和维护。它拥有易于阅读的语法、庞大的用户基础和广泛的功能。它几乎可以用于任何事情，包括基础计算、探测和可视化黑洞、将你的仓鼠直播到互联网上，以及更多、*更多*的事情。Python
    在易用性和功能性之间达到了最佳平衡，这意味着你可以相对较快地学会如何做一些真正有用的事情。


    # Taylor & Francis


    Taylor & Francis Group


    http://taylorandfrancis.com


    # 关于作者


    **Edwin S. Dalmaijer** 在荷兰乌得勒支大学获得了*心理学*本科学位，并在那里开始了（但从未正式完成）*神经科学与认知*的硕士学位。他在牛津大学攻读*实验心理学*的哲学博士学位，随后在剑桥大学担任了四年的博士后研究助理，目前在布里斯托大学担任讲师（助理教授）。Edwin
    编写软件，教授 Python 工作坊，并正拼命地试图教他的猫编程。


    **Rebecca J. Hirst** 在诺丁汉大学完成了*心理学与认知神经科学*本科学位和*心理学研究方法*硕士学位，并在那里获得了*心理学*博士学位。她目前在
    Open Science Tools 担任科学官员，并在都柏林三一学院担任博士后研究员。


    **Jonathan W. Peirce** 是一位神经科学家、程序员和父亲。他拥有圣安德鲁斯大学的*心理学*本科学位和剑桥大学的*神经科学*博士学位。在纽约大学完成博士后职位后，Jon
    在诺丁汉大学先后担任助理教授、副教授，现为正教授。他因编写 PsychoPy 而闻名，这是一款免费且易于使用的心理学实验软件，在世界各地的实验室和课堂中广泛使用。他也是
    Open Science Tools 的创始人兼首席执行官。


    # Taylor & Francis


    Taylor & Francis Group


    http://taylorandfrancis.com


    # 1 Python


    Python 是一门编程语言。不仅仅是任何一门编程语言，它目前是世界上最受欢迎的编程语言之一。它在科学和工业领域被广泛使用，因为它易于使用、用途广泛，并且名字很酷。你可能正在翻阅这本书，心想“为什么我应该投入时间学习
    Python？”（或者你可能在网上盗版了这本书，现在在想“为什么我应该继续读下去？”）。以下是一些关于这个问题的答案：


    Python 可能对你的职业生涯有益。在心理学领域，有许多工具，如 E-Prime 和 Presentation，它们自带晦涩的编程语言。这些工具完全能够完成你研究中大部分想要做的事情。然而，你可能会发现很难找到对你这种晦涩技能感兴趣的雇主。如果你在意你的简历，学习一门更多实验室和公司熟悉的语言可能会更好。Python
    在学术界被广泛采用，在学术界之外更是如此，例如在数据科学领域。精通 Python 因此很可能会提高你的就业能力！


    Python 如此受欢迎的原因之一是它非常通用。你可以用它来制作电脑游戏、进行机器学习和运行网站。作为一名研究人员，这种通用性意味着你将能够使用 Python
    来编写你的实验和数据的自动化分析代码。此外，你还可以用它通过网络摄像头监视同事（*别再偷我的午餐了，Karen！*）或者做令人兴奋的计算机视觉项目。


    Python 受欢迎的另一个原因是它的易用性。Python 脚本是可读的。非常可读。事实上，可读性如此之高，以至于有人说阅读它们就像阅读英语。虽然这绝对是一种夸张，但脚本的可读性是
    Python 的优势之一。它帮助新用户相对较快地掌握这门语言。


    Python 的流行本身就是一个优势，因为它庞大的用户群使其更有可能继续得到支持，并且你可以在网上找到帮助。如果你遇到问题，很可能其他人也有同样的问题，并且他们可能已经为你解决了。互联网的一件很棒的事情是它充满了编程资源。只需搜索你的问题（通常是将错误消息复制到搜索引擎中），你很可能在
    Stack Overflow 或编程论坛等网站上找到解决方案。


    # 2 Python


    显然，使用 Python 也有缺点。经验丰富的程序员会指出它是一门相对较慢的语言，他们说得有道理：与 C 和 C++ 等“正经”编程语言相比，Python
    比较迟钝。幸运的是，这通常不是问题，因为在大多数情况下，Python 仍然比你需要的速度快。即使在速度成为问题时，例如处理大量数据时，某个聪明人也会找到解决方法。你稍后将了解到的
    NumPy 库就是一个例子：它是用 C 编写的，但它使 Python 中的计算变得超级快。


    尽管有其吸引力，一些人在学习 Python 后会转向其他语言。然而，即使对他们来说，Python 也是一个学习编程核心概念的好入门语言。


    **总而言之，Python 非常适合初学者以及那些喜欢通用且用户友好的编程语言的人。**


    哦，我们提到了吗？Python 是免费的。它是开源的，这意味着它的源代码是公开的。每个人都可以阅读它、改进它，并且无需支付任何费用即可下载该软件。


    ## 1.1 安装


    Python 可以安装在许多不同的操作系统上。这些包括 Windows、macOS 和几乎每个版本的 Linux。你可以在 python.org 上找到安装程序，大多数
    Linux 系统可能已经预装了它。在你开始下载东西之前，请继续阅读以了解要安装什么。


    ### 1.1.1 版本


    Python 有几个不同的版本。虽然它们相似，但安装哪个版本确实很重要。在撰写本文时，Python 3 是当前的主要版本。有几个次要版本在使用，如 Python
    3.10、3.9 和 3.8，每个版本都有一些额外的功能。最后，在次要版本下还有不同的补丁（如 3.10.5 或 3.8.10），每个补丁都修复了错误或提高了安全性。从大局来看，这些版本之间的差异相对微妙，不应该破坏任何代码。你应该能够在任何
    Python 3.7 及更高版本上运行本书中的脚本，但它们在 Python 4 下可能会崩溃（但距离其发布可能还有一段时间）。


    在实际使用中，你可能会遇到用 Python 2 编写或为 Python 2 编写的软件，其官方支持已于 2020 年 1 月 1 日结束。这种情况越来越少见，但这是
    Python 生态系统运作方式的结果：它不仅仅局限于基本编程语言，还以外部包或*库*的形式存在。这些是能够执行特定任务的代码集合，例如帮助创建认知实验。为
    Python 2 开发的库并不总是能与 Python 3 良好配合。其中一些库没有更新，因为它们是由爱好者编写的，这些人已经停止维护它们，或者太忙而无法进行耗时的升级。请记住，这些人是志愿者，他们有工作、伴侣、孩子、朋友和生活。这些通常被认为比升级一个
    Python 库更重要。


    总之，你应该目标下载一个 Python 3 版本。具体的次要版本（例如 3.9 或 3.12）不那么重要，所以只需选择你平台上可用的最新版本。如果你已经知道你可能会使用外部包，'
