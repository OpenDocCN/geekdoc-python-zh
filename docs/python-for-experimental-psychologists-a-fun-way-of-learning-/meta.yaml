    \ loop.\n- .thisRepN – the current repetition of our blocks loop.\n- .thisTrialN\
    \ – the current trial number within our trials loop.\n- .thisIndex – the original\
    \ row index of our trial within our spreadsheet.\n\nOf particular interest to\
    \ us is the “correct”, “key_rt”, and “condition” column. These will provide the\
    \ data we need to address our research question. We could in theory just eyeball\
    \ the data in Excel; however, another, widely used, use for Python is data analysis\
    \ – so let’s move on to how to analyse data in Python!"
- md: "## MAKE SOME NOISE\n\nIn this chapter, you’ll learn how to make a musical instrument\
    \ out of a joystick or game controller. If you don’t have one of those, you can\
    \ also use the keyboard. Although this might seem like a weak excuse to make some\
    \ noise, it will actually be a very good programming exercise. If you also manage\
    \ to annoy the people around you with obnoxious sound, that’s just a bonus!\n\n\
    Turning your joystick or keyboard into a musical instrument won’t require you\
    \ to be a modern-day MacGyver. Instead, you can write a script that responds to\
    \ a button press by making a sound. That’s not to say this is easy: Writing a\
    \ script that responds to events requires some abstract thinking.\n\nBefore you\
    \ start with the fun stuff, create a new folder. Within that folder, create a\
    \ new Python script and name it “constants.py”. Open it in an editor to define\
    \ some defaults:\n\n```\n# Set the display type to 'pygame'\nDISPTYPE = 'pygame'\n\
    # Make sure that the DISPSIZE matches your monitor resolution!\nDISPSIZE = (1920,\
    \ 1080)\n```\n\n## Do You Have A Joystick?\n\nFirst, let’s clarify the terminology.\
    \ The term “joystick” in a strict sense applies to devices that have a pivoting\
    \ stick that allows users to fly an aeroplane or helicopter. In a broader sense,\
    \ the term “joystick” often also applies to any gaming controller. In this chapter,\
    \ the term “joystick” will refer to this broader class of input devices. Joysticks\
    \ are not only useful for playing computer games but can also be used in psychological\
    \ research.\n\nA lot of joysticks have two **control sticks** (mini-joysticks)\
    \ that each cover two **axes** (movement directions), a couple of **buttons**,\
    \ and a **hat**. That’s not a fancy top hat, a baseball cap, or something that\
    \ was knitted by your grandmother. For joysticks, a hat is a special button that\
    \ you can push in four directions. If you ever owned a GameBoy, you might recall\
    \ the four-point button that controlled your movement. That button was a “hat”.\n\
    \nSome joysticks will also carry “balls”. (In a previous edition, this parenthetical\
    \ hinted at how some people might see the humour in “joysticks with balls” but\
    \ then someone left a review on the website of a major web retailer to point out\
    \ how this book and its author were “immature”. So now I feel self-conscious about\
    \ making childish and unprofessional jokes.) The concept behind these is very\
    \ similar to that of an old computer mouse: You can roll a ball, and the joystick\
    \ will convert the roll into a movement in a two-dimensional plane.\n\nAnother\
    \ cool thing about joysticks is that some offer a “rumble” feature. It allows\
    \ programmers to make the controller vibrate to give vibrotactile feedback. You\
    \ can find this feature in games, for example if you ram a car or shoot a gun;\
    \ but you can also use it to give feedback to participants in your psychological\
    \ experiment.\n\nIn this chapter, the focus is on the joystick’s buttons. If you\
    \ don’t have a joystick, you can substitute the buttons with the number keys.\n\
    \n## Using a Joystick\n\nProgramming for a joystick is easier than you might think,\
    \ and it is very similar to using the mouse or a keyboard through PyGaze or PsychoPy.\
    \ There are a few libraries that offer excellent functionality for joysticks,\
    \ including PyGame, PyGaze, and PsychoPy. In this chapter, PyGaze is used for\
    \ no particular reason at all. It’s a nice library, and it offers everything you\
    \ need for this project to work. Make sure you install it if you haven’t yet,\
    \ by running the following in a terminal or command prompt:\n\n```\npython -m\
    \ pip install python-pygaze\n```\n\nIn Python, you can import the Joystick class\
    \ from PyGaze’s joystick module:\n\n```\nfrom pygaze.joystick import Joystick\n\
    ```\n\nYou could then initialise a joystick object called js:\n\n```\njs = Joystick()\n\
    ```\n\nPyGaze will automatically detect and engage the first joystick attached\
    \ to your computer. Obviously, this only works if one is actually plugged in.\
    \ After initialising the joystick, you can poll the buttons with a single function:\n\
    \n```\njs.get_joybuttons()\n```\n\nYou can specify a list of allowed buttons and\
    \ a response timeout in milliseconds:\n\n```\nbutton, presstime = js.get_joybuttons(joybuttonlist=[0,4,6],\
    \ timeout=3000)\n```\n\nThe get_joybuttons method will return which button was\
    \ pressed and at what time it was pushed. In the above example, button is an integer\
    \ that indicates what button was pressed or None when no button was pressed. presstime\
    \ will be a float with a timestamp that is relative to when PyGaze was imported.\n\
    \nIf you have a joystick at your disposal, now would be the time to start coding.\
    \ In the same folder as the constants.py you created a bit earlier, create a new\
    \ Python script. You could call it “noisemaker_joystick.py”. Start by importing\
    \ the Joystick and the Sound classes:\n\n```\nfrom pygaze.joystick import Joystick\n\
    from pygaze.sound import Sound\nfrom pygaze.display import Display\n```\n\nNow\
    \ you want to initialise a Joystick instance to be able to use it as an input\
    \ device. You should also initialise a Display. This isn’t strictly necessary\
    \ but is for the sake of consistency with the keyboard implementation (which does\
    \ require a Display to be active).\n\n```\n# initialise a Display instance\ndisp\
    \ = Display()\n\n# create a Joystick instance\n# ('dev' is short for 'device')\n\
    dev = Joystick()\n```\n\nThe next step is to create a function that checks if\
    \ any buttons were pressed. The function’s input should be the device that you\
    \ want it to use, which is the joystick. The function’s output should be the number\
    \ of the button that was pressed (or None when no button was pressed). You might\
    \ wonder why you would want to create a custom function for this, while the Joystick\
    \ class’s get_joybutton does almost exactly the same thing. There is no programming-related\
    \ reason to do it, but it’s a good practice exercise!\n\nAs you might remember\
    \ from the *Functions* chapter, a function definition always starts with def,\
    \ followed by the function’s name, then the inputs between round brackets, and\
    \ it ends with a colon. Like so:\n\n```\n# definition of a function to get user\
    \ input\ndef get_input(device):\n```\n\nThe code that makes up the function should\
    \ be indented, preferably by four spaces per line. It should check whether a button\
    \ is pressed, but with a low timeout:\n\n```\n    # wait for a button press for\
    \ about 10 ms\n    button, presstime = device.get_joybutton(timeout=10)\n```\n\
    \nThe result should be returned as an output:\n\n```\n    # return the button\
    \ number (or None)\n    return button\n```\n\nThat’s it for now. Skip over the\
    \ next chapter on using a keyboard and continue with the chapter on *Playing Sounds\
    \ On Button Presses*.\n\n## Using a Keyboard\n\nIf you don’t have a joystick at\
    \ hand, you can use your keyboard instead. Here, PyGaze’s Keyboard class is used\
    \ to interact with the keyboard. You can import the Keyboard class from PyGaze’s\
    \ keyboard module:\n\n```\nfrom pygaze.keyboard import Keyboard\n```\n\nTo initialise\
    \ an instance of the class, you can use the following:\n\n```\nkb = Keyboard()\n\
    ```\n\nAs with the Joystick class, you can specify a default key list and timeout.\
    \ You can use the range function to generate a list of the numbers between 0 and\
    \ 10 (not inclusive of the end point!), which are the names for the number keys.\
    \ Because the Keyboard class requires a list of strings to be passed as key names,\
    \ you should convert the generated numbers to strings. You can do this with the\
    \ map function, which can apply a function of your choice to an entire list at\
    \ once. You also need the str function, which can convert numeric values into\
    \ strings. Combining the two, you could do the following:\n\n```\nnumbers = range(0,\
    \ 10)\nstringnumbers = map(str, numbers)\nkb = Keyboard(keylist=stringnumbers)\n\
    ```\n\nThis would produce a Keyboard instance that only allows you to press the\
    \ number keys. (Note: These are *not* the numpad keys, but the numbers aligned\
    \ towards the top of your keyboard!)\n\nLet’s start programming to implement the\
    \ above example. In the same folder as the constants.py script that you created\
    \ a bit earlier, create a new Python script. You can name it “noisemaker_keyboard.py”.\
    \ First, import the Keyboard and Sound classes:\n\n```\nfrom pygaze.keyboard import\
    \ Keyboard\nfrom pygaze.sound import Sound\n```\n\nYou should also import the\
    \ Display class, because the Keyboard only works if there is an active Display\
    \ (this is not true for the Joystick and Sound classes, by the way).\n\n```\n\
    from pygaze.display import Display\n```\n\nTime to initialise a Display and a\
    \ Keyboard instance. Remember, the Keyboard instance should only respond to number\
    \ keys!\n\n```\n# initialise a Display instance\n# (required for the Keyboard\
    \ to work)\ndisp = Display()\n\n# create a range of numbers\nnumbers = range(0,10)\n\
    ```"
  mdcn: "## 制造一些噪音\n\n在本章中，你将学习如何用摇杆或游戏控制器制作乐器。如果没有这些设备，也可以使用键盘。虽然这似乎是个制造噪音的蹩脚借口，但实际上这将是一个非常好的编程练习。如果你还能用恼人的声音惹恼周围的人，那就算额外收获了！\n\
    \n将摇杆或键盘变成乐器，并不需要你成为现代版的马盖先。相反，你可以编写一个脚本，在按下按钮时发出声音。这并不是说这很容易：编写一个响应事件的脚本需要一些抽象思维。\n\
    \n在开始有趣的部分之前，先创建一个新文件夹。在该文件夹中，创建一个新的Python脚本并命名为“constants.py”。在编辑器中打开它，定义一些默认值：\n\
    \n```\n# Set the display type to 'pygame'\nDISPTYPE = 'pygame'\n# Make sure that\
    \ the DISPSIZE matches your monitor resolution!\nDISPSIZE = (1920, 1080)\n```\n\
    \n## 你有摇杆吗？\n\n首先，让我们澄清一下术语。严格意义上的“摇杆”一词适用于那些带有可枢转操纵杆的设备，允许用户驾驶飞机或直升机。在更广泛的意义上，“摇杆”一词也常适用于任何游戏控制器。在本章中，“摇杆”一词将指代这一更广泛的输入设备类别。摇杆不仅对玩电脑游戏有用，也可用于心理学研究。\n\
    \n许多摇杆有两个**控制杆**（迷你摇杆），每个覆盖两个**轴**（移动方向），几个**按钮**，以及一个**帽键**。这不是指花哨的高顶帽、棒球帽，或者你祖母编织的东西。对于摇杆来说，帽键是一个可以向四个方向按下的特殊按钮。如果你曾经拥有过GameBoy，你可能会记得那个控制移动的四向按钮。那个按钮就是一个“帽键”。\n\
    \n有些摇杆还会带有“球”。（在之前的版本中，这个括号暗示了有些人可能会觉得“带球的摇杆”有幽默感，但后来有人在一家大型网络零售商的网站上留下评论，指出这本书及其作者“不成熟”。所以现在我对开这种幼稚和不专业的玩笑感到不自在。）其背后的概念与旧式电脑鼠标非常相似：你可以滚动一个球，摇杆会将滚动转换为二维平面上的移动。\n\
    \n摇杆的另一个酷炫之处在于，有些提供了“震动”功能。它允许程序员让控制器振动，以提供振动触觉反馈。你可以在游戏中找到这个功能，例如，当你撞车或开枪时；但你也可以用它来为你的心理学实验参与者提供反馈。\n\
    \n在本章中，重点是摇杆的按钮。如果你没有摇杆，可以用数字键来代替按钮。\n\n## 使用摇杆\n\n为摇杆编程比你想象的要容易，它与通过PyGaze或PsychoPy使用鼠标或键盘非常相似。有几个库为摇杆提供了出色的功能，包括PyGame、PyGaze和PsychoPy。在本章中，使用PyGaze并没有特别的原因。它是一个不错的库，提供了这个项目所需的一切。如果你还没有安装，请确保在终端或命令提示符中运行以下命令来安装它：\n\
    \n```\npython -m pip install python-pygaze\n```\n\n在Python中，你可以从PyGaze的joystick模块导入Joystick类：\n\
    \n```\nfrom pygaze.joystick import Joystick\n```\n\n然后你可以初始化一个名为js的摇杆对象：\n\n```\n\
    js = Joystick()\n```\n\nPyGaze将自动检测并连接到你计算机上连接的第一个摇杆。显然，这只有在实际插入摇杆时才有效。初始化摇杆后，你可以用一个函数来轮询按钮：\n\
    \n```\njs.get_joybuttons()\n```\n\n你可以指定一个允许的按钮列表和以毫秒为单位的响应超时时间：\n\n```\nbutton,\
    \ presstime = js.get_joybuttons(joybuttonlist=[0,4,6], timeout=3000)\n```\n\n\
    get_joybuttons方法将返回按下了哪个按钮以及按下时间。在上面的例子中，button是一个整数，表示按下了哪个按钮，如果没有按下任何按钮，则为None。presstime将是一个浮点数，包含一个相对于PyGaze导入时间的时间戳。\n\
    \n如果你手头有摇杆，现在就是开始编码的时候了。在你之前创建的constants.py所在的同一文件夹中，创建一个新的Python脚本。你可以将其命名为“noisemaker_joystick.py”。首先导入Joystick和Sound类：\n\
    \n```\nfrom pygaze.joystick import Joystick\nfrom pygaze.sound import Sound\n\
    from pygaze.display import Display\n```\n\n现在你想初始化一个Joystick实例，以便将其用作输入设备。你还应该初始化一个Display。这不是严格必要的，但为了与键盘实现保持一致（键盘实现确实需要一个活动的Display）。\n\
    \n```\n# initialise a Display instance\ndisp = Display()\n\n# create a Joystick\
    \ instance\n# ('dev' is short for 'device')\ndev = Joystick()\n```\n\n下一步是创建一个函数来检查是否按下了任何按钮。函数的输入应该是你希望它使用的设备，即摇杆。函数的输出应该是按下的按钮编号（如果没有按下任何按钮，则为None）。你可能想知道为什么要为此创建一个自定义函数，而Joystick类的get_joybutton几乎做同样的事情。没有编程相关的原因这样做，但这是一个很好的练习！\n\
    \n正如你可能从*函数*章节中记得的那样，函数定义总是以def开头，后跟函数名称，然后是圆括号中的输入，最后以冒号结束。像这样：\n\n```\n# definition\
    \ of a function to get user input\ndef get_input(device):\n```\n\n构成函数的代码应该缩进，最好每行四个空格。它应该检查是否按下了按钮，但使用较低的超时时间：\n\
    \n```\n    # wait for a button press for about 10 ms\n    button, presstime =\
    \ device.get_joybutton(timeout=10)\n```\n\n结果应作为输出返回：\n\n```\n    # return the\
    \ button number (or None)\n    return button\n```\n\n目前就这些。跳过下一章关于使用键盘的内容，继续阅读*按键播放声音*章节。\n\
    \n## 使用键盘\n\n如果你手头没有摇杆，可以使用键盘代替。这里，使用PyGaze的Keyboard类与键盘交互。你可以从PyGaze的keyboard模块导入Keyboard类：\n\
    \n```\nfrom pygaze.keyboard import Keyboard\n```\n\n要初始化该类的一个实例，你可以使用以下代码：\n\n\
    ```\nkb = Keyboard()\n```\n\n与Joystick类一样，你可以指定默认的按键列表和超时时间。你可以使用range函数生成一个0到10之间的数字列表（不包括端点！），这些是数字键的名称。因为Keyboard类要求传递一个字符串列表作为键名，你应该将生成的数字转换为字符串。你可以使用map函数来完成此操作，该函数可以一次将你选择的函数应用于整个列表。你还需要str函数，它可以将数值转换为字符串。结合两者，你可以这样做：\n\
    \n```\nnumbers = range(0, 10)\nstringnumbers = map(str, numbers)\nkb = Keyboard(keylist=stringnumbers)\n\
    ```\n\n这将生成一个Keyboard实例，只允许你按数字键。（注意：这些*不是*小键盘键，而是键盘顶部的数字键！）\n\n让我们开始编程来实现上面的例子。在你之前创建的constants.py脚本所在的同一文件夹中，创建一个新的Python脚本。你可以将其命名为“noisemaker_keyboard.py”。首先，导入Keyboard和Sound类：\n\
    \n```\nfrom pygaze.keyboard import Keyboard\nfrom pygaze.sound import Sound\n\
    ```\n\n你还应该导入Display类，因为Keyboard只有在有活动的Display时才有效（顺便说一句，Joystick和Sound类并非如此）。\n\
    \n```\nfrom pygaze.display import Display\n```\n\n是时候初始化一个Display和一个Keyboard实例了。记住，Keyboard实例应该只响应数字键！\n\
    \n```\n# initialise a Display instance\n# (required for the Keyboard to work)\n\
    disp = Display()\n\n# create a range of numbers\nnumbers = range(0,10)\n```"
