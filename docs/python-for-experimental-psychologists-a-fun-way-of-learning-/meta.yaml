    calculate other descriptive statistics, like the standard deviation and standard
    error of the mean. (Pedantic remark: that last one isn''t actually a descriptive
    statistic, as it tells you something about the sampling process, and not just
    about the distribution of your data!)


    Note that some of these descriptives work best for normally distributed data,
    which yours might not be! In fact, neither accuracy nor response time is typically
    normally distributed at the individual level. So before computing the descriptives,
