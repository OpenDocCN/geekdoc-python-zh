  md: 'After you’ve installed Python, open a command prompt or terminal. If you’ve
    installed Anaconda, use its launcher to start the Anaconda Command Prompt specifically!
    To install the NumPy package, simply type the following:


    ```

    python -m pip install numpy

    ```


    Or, if you’re on Linux, use:


    ```

    python3 -m pip install numpy

    ```


    This should check if NumPy is already installed. If it isn’t, then it should download
    the NumPy package and install it for your Python installation.

    If you are working on a computer with several parallel installations of Python,
    the above commands might not be specific enough. In order to install packages
    into the right Python installation, you might have to specify its version number.
    On Linux and macOS, you can do so like this if you would like to install the package
    NumPy for your Python 3.12 installation specifically:


    ```

    python3.12 -m pip install numpy

    ```


    On Windows, you would instead use:


    ```

    py -3.12 -m pip install numpy

    ```


    Note that all of the above commands should be executed in the (Anaconda) Command
    Prompt or Terminal. In case something goes wrong there, and you can’t troubleshoot
    the issue, there is another option you could try. This is to find the Python installation
    that you are wanting to install a package in, and running its python programme
    (e.g. “python.exe” on Windows). This will open a Python interpreter, in which
    you can type Python code. To install a package in an interpreter, use the following
    Python code:


    ```

    import subprocess, sys

    subprocess.call([sys.executable, "-m", "pip", \n    "install", "numpy"])

    ```


    This is a slightly roundabout way, in which you use the Python installation of
    your choice to call itself, and then use its own pip to install a new package
    (in this case NumPy). This is intended as a last resort, if none of the options
    listed above worked for you.


