    ```\n\n现在，唯一的问题是，为了让参与者看到他们键入的文本动态变化，你不能只使用 `core.wait(2)` 来暂停屏幕；因为这实际上会暂停屏幕，我们将看不到动态变化的文本。这是另一个基于帧来呈现和更新刺激很重要的例子。所以，首先创建一个可编辑的文本刺激：\n\
    \n```\n# 创建一个可编辑的文本框\ntextinput = visual.TextBox2(\n    win,\n    text='',\n \
