- md: '## 9 COMMON STATISTICAL TESTS


    ### 9.1 UGH Boring


    Yes, statistics can be boring. It’s also super important to know about: statistics
    can contextualise findings and inform policy. Most importantly, finding “significant”
    statistics can make you feel good about yourself and your decision to become a
    researcher.


    This chapter is not intended as a comprehensive class in advanced statistics.
    It just provides some basics and then tells you how to implement the most common
    tests of differences and relations in Python. More complex options exist, but
    they are beyond the scope of this book. If you are interested in doing advanced
    statistics, you could look at the statsmodels and scikit-learn packages.


    #### 9.1.1 Variance and Error


    Before we tackle statistical tests, let’s do a quick overview of some basics that
    you might have forgotten or just never learned about in the first place. These
    include variance, error, and p-values. What follows is a quick overview. You can
    skip it if you like (the next important header is “9.2 T-tests”). However, this
    might not be wise. I cannot begin to tell you how many students on the Natural
    Sciences Tripos at Cambridge never bothered to show up to my stats classes because
    they “knew it from before”, only to score quite poorly on my exceedingly straightforward
    exam. Their colleagues, blessed with very little in the way of prior mathematical
    or statistical background, ended up doing rather well. Hubris, it turns out, comes
    before the fail.


    Warnings aside, let’s dig in. In nature, individuals have the annoying habit of
    being different from each other. This is apparent when you measure people’s height,
    blood concentrations of various substances, or even the number of toes, tentacles,
    or testicles within the same species. That last one was the topic of an incomprehensibly
    timed joke in a talk at a pharmacology conference that I was lucky enough to attend,
    with the punchline coming down to the average person having one testicle. While
    accurate for some (hi fellow testicular cancer survivors!), it is also inaccurate
    for the majority of people. This is true for most means: they indicate the centre
    of a distribution (provided it’s symmetrical), but many or most individuals will
    not abide by this mean. Instead, they vary around the mean, with some scoring
    substantially to slightly lower and others scoring slightly to substantially higher.


    In a normal distribution (that bell-shaped curve), the mean is in the middle of
    the distribution. For example, when the Dutch Central Bureau for Statistics (CBS)
    studied the average height of people in the Netherlands in 2021, they found men
    born after 1970 reported a mean of 184 cm (that’s about 6 ft if you don’t speak
    metric) and women of 171 cm (about 5 ft 7 in) (Reep, 2021). Everyone deviates
    from this mean: half of men are shorter than 184 and the other is taller; and
    the same is true for women.


    Just as we can compute a mean, we can compute how much individuals are expected
    to deviate from the mean. We call this the **variance** of a distribution. It
    is defined as the mean squared distance between each individual and the mean of
    all individuals. For example, if three friends are 156, 171, and 186 cm tall,
    their mean height is 171 cm. Their distances from this mean are −15, 0, and 15.
    This averages out to 0, which is annoying; but their squared distances from the
    mean are 225, 0, and 225. The variance is the mean of these squared distances,
    which is 150.


    A highly related concept is the **standard deviation**, which is just the square
    root of the variance. For our example of the three friends, the standard deviation
    would thus be just over 12 cm. The variance and the standard deviation are properties
    of a distribution: if you measured all women in the Netherlands, you would be
    able to calculate their mean height and its variance.


    Because we’re lazy cost-effective, we rarely measure everyone in a population.
    Instead, we take a sample of individuals from a larger population. Even if we
    take a completely representative sample, it won’t always accurately reflect the
    population. For example, if I take the three friends from before, their mean height
    happened to accurately reflect that of Dutch women. However, this will not be
    true for any random sample of three out of that population. Imagine taking thousands
    of three-women samples and computing the mean height for each sample. These means
    would form their own distribution: the centre would be on the population mean,
    but there would also be substantial variance.


    Now imagine taking a sample of 3,000 women. This is a much larger sample than
    the three women from before, so intuitively you might already think that the mean
    height of this sample is closer to the mean height of the whole population. If
    you again take thousands of 3,000-women samples and again compute the mean height
    for each sample, they would again form a distribution. As before, the centre of
    this distribution of means would be on the population mean. However, this time
    the variance of the distribution of sample means would be smaller.


    It turns out that the variance of these sample means is directly related to the
    variance of the population and can be computed by dividing the population variance
    by the number of individuals in your sample. WOW! We can use this to estimate
    the **standard error of the mean**, which we compute as the standard deviation
    of a sample divided by the square root of the sample size.


    In sum, we can measure traits like the height of individuals in a population.
    There will be a mean height, which reflects the centre of a normal distribution.
    These will also be variance around this mean, which reflects how much individuals
    vary. High standard deviations mean lots of variance, whereas low standard deviation
    means individuals are relatively similar. Means and standard deviations are properties
    of the population.


    Instead of measuring the whole population, we can take samples of individuals
    from a population. These samples are imperfect, but their means should converge
    on the population mean. The larger samples get, the closer they are likely to
    be to the population mean. This is quantified by the standard error of the mean,
    which is computed by dividing a sample’s standard deviation by the square root
    of the sample’s size (i.e. the number of individuals in that sample). The standard
    error of the mean is a property of the sampling process.


    ### 9.1.2 When Is Something Surprising?


    Now that we know the terminology, we should take a step back and think about some
    of the big questions. For example, if Taylor Swift were to move to the Netherlands,
    would she stand out in a crowd of her peers? According to a quick search on the
    internet, Swift is 180 cm tall. (According to personal observations at concerts,
    she looked about 3 cm tall, but this might have been affected by viewing distance.
    They were fantastic concerts regardless!) According to the CBS, women born in
    the Netherlands in 1989 are 169.8 cm tall on average. This means Swift is 10.2
    cm taller than the average Dutch woman. Does this mean she would stand out?


    Intuitively, you would probably answer “Well, that depends…” because you might
    feel that while Swift is taller than the average, we don’t quite know the spread
    around this average. Let’s assume the standard deviation is 13 centimetres (because
    we’re talking about Taylor Swift, but also because that’s the actual number).
    This means Swift falls within a single standard deviation from the mean. More
    precisely, assuming a normal distribution, 22% of Dutch women born in 1989 would
    be taller than her. This means Swift is tall but also that every fourth or fifth
    Dutch woman would be taller, and hence she wouldn’t quite stand out in a crowd.


    Now forget about the potential move and compare Swift to her country of origin.
    According to a publication by the National Centre for Health Statistics in the
    United States, the mean height of women aged 20–29 in the years 2015–2018 was
    162.6 cm with a standard deviation of about 10 cm (Fryar et al., 2021). Again
    assuming a normal distribution, this would mean Swift was among the tallest 4%
    of women in her age bracket! Hence, she would likely stand out in a crowd of her
    peers.


    We can rephrase the above to sound more stats-y: “Under the assumption that women
    in the USA have a mean height of 162.6 cm with a standard deviation of 10 cm,
    the probability of observing someone with height 180 cm or taller is 4%.” This
    is not too far away from a **p-value**, which will be introduced shortly.


    Whether finding someone as tall as Taylor Swift is surprising depends on your
    interpretation of 4%. Perhaps you wouldn’t find this practically significant:
    you might see hundreds of people when walking through busy streets and thus plenty
    of tall women among them. (Similarly, people do hundreds of studies, some are
    bound to show larger effects.) More generally, a 4% chance of winning the lottery
    would feel like a lot, whereas a 4% chance of improvement after surgery would
    likely feel underwhelming. (Similarly, the level of evidence from studies should
    be high if important policy will be decided on it.)'
  mdcn: '## 9 种常见的统计检验


    ### 9.1 唉，真无聊


    是的，统计学可能很枯燥。但它也至关重要：统计学可以为研究发现提供背景信息，并为政策制定提供依据。最重要的是，找到“显著”的统计结果会让你对自己和选择成为研究者的决定感觉良好。


    本章并非旨在提供一门全面的高级统计学课程。它只提供一些基础知识，然后告诉你如何在 Python 中实现最常见的差异和关系检验。更复杂的选项是存在的，但超出了本书的范围。如果你对进行高级统计感兴趣，可以查看
    `statsmodels` 和 `scikit-learn` 包。


    #### 9.1.1 方差与误差


    在我们开始讨论统计检验之前，让我们快速回顾一些你可能已经忘记或从未学过的基础知识。这些包括方差、误差和 p 值。以下是一个快速概述。如果你愿意，可以跳过它（下一个重要的标题是“9.2
    T 检验”）。然而，这可能并不明智。我无法告诉你，在剑桥大学自然科学荣誉学位考试中，有多少学生因为“以前学过”而懒得来上我的统计课，结果在我那极其简单的考试中得分相当低。而他们的同学，几乎没有数学或统计学背景，最终却表现得相当好。事实证明，傲慢会导致失败。


    警告完毕，让我们开始吧。在自然界中，个体之间存在着令人烦恼的差异。当你测量人们的身高、血液中各种物质的浓度，甚至同一物种内的脚趾、触手或睾丸数量时，这一点就很明显了。最后一个话题是在我有幸参加的一次药理学会议上一个时机难以理解的笑话的主题，笑点在于平均每个人有一个睾丸。虽然这对某些人来说是准确的（嗨，
    fellow 睾丸癌幸存者！），但对大多数人来说是不准确的。大多数平均值都是如此：它们表示分布的中心（假设分布是对称的），但许多或大多数个体并不遵循这个平均值。相反，他们在平均值周围变化，有些得分明显或略微较低，而另一些得分略微或明显较高。


    在正态分布（钟形曲线）中，平均值位于分布的中间。例如，当荷兰中央统计局（CBS）研究 2021 年荷兰人的平均身高时，他们发现 1970 年后出生的男性平均身高为
    184 厘米（如果你不使用公制单位，大约是 6 英尺），女性为 171 厘米（大约 5 英尺 7 英寸）（Reep, 2021）。每个人都偏离这个平均值：一半的男性低于
    184 厘米，另一半高于 184 厘米；女性也是如此。


    正如我们可以计算平均值一样，我们也可以计算个体预期偏离平均值的程度。我们称之为分布的**方差**。它定义为每个个体与所有个体平均值之间的平均平方距离。例如，如果三个朋友的身高分别是
    156、171 和 186 厘米，他们的平均身高是 171 厘米。他们与这个平均值的距离分别是 -15、0 和 15。这平均为 0，这很烦人；但他们与平均值的平方距离是
    225、0 和 225。方差是这些平方距离的平均值，即 150。


    一个高度相关的概念是**标准差**，它只是方差的平方根。对于我们三个朋友的例子，标准差将略高于 12 厘米。方差和标准差是分布的属性：如果你测量荷兰所有的女性，你就能计算出她们的平均身高及其方差。


    因为我们懒惰（或者说注重成本效益），我们很少测量总体中的每个人。相反，我们从更大的总体中抽取个体样本。即使我们抽取了一个完全有代表性的样本，它也不会总是准确地反映总体。例如，如果我从之前的三个朋友中抽取样本，他们的平均身高恰好准确地反映了荷兰女性的平均身高。然而，对于从该总体中随机抽取的任何三个女性的样本，情况并非如此。想象一下，抽取数千个三人女性样本，并计算每个样本的平均身高。这些平均值将形成它们自己的分布：中心将在总体平均值上，但也会有相当大的方差。


    现在想象抽取一个 3000 名女性的样本。这比之前的三个女性样本大得多，所以你可能已经直觉地认为这个样本的平均身高更接近整个总体的平均身高。如果你再次抽取数千个
    3000 名女性的样本，并再次计算每个样本的平均身高，它们将再次形成一个分布。与之前一样，这个平均值分布的中心将在总体平均值上。然而，这一次样本平均值分布的方差会更小。


    事实证明，这些样本平均值的方差与总体的方差直接相关，可以通过将总体方差除以样本中的个体数量来计算。哇！我们可以用这个来估计**平均值的标准误**，我们将其计算为样本的标准差除以样本大小的平方根。


    总之，我们可以测量总体中个体的特征，如身高。会有一个平均身高，它反映了正态分布的中心。在这个平均值周围也会有方差，它反映了个体之间的差异程度。高标准差意味着方差大，而低标准差意味着个体相对相似。平均值和标准差是总体的属性。


    我们可以不测量整个总体，而是从总体中抽取个体样本。这些样本是不完美的，但它们的平均值应该收敛于总体平均值。样本越大，它们可能越接近总体平均值。这通过平均值的标准误来量化，它是通过将样本的标准差除以样本大小的平方根（即该样本中的个体数量）来计算的。平均值的标准误是抽样过程的属性。


    ### 9.1.2 什么时候事情会令人惊讶？


    既然我们知道了术语，我们应该退一步思考一些大问题。例如，如果泰勒·斯威夫特搬到荷兰，她会在同龄人中脱颖而出吗？根据网上的快速搜索，斯威夫特身高 180 厘米。（根据个人在演唱会上的观察，她看起来大约
    3 厘米高，但这可能受到了观看距离的影响。无论如何，那些演唱会都很棒！）根据 CBS 的数据，1989 年在荷兰出生的女性平均身高为 169.8 厘米。这意味着斯威夫特比荷兰女性平均身高高出
    10.2 厘米。这是否意味着她会脱颖而出？


    直觉上，你可能会回答“嗯，这取决于……”，因为你可能觉得虽然斯威夫特高于平均水平，但我们并不完全知道这个平均值周围的分布情况。让我们假设标准差是 13 厘米（因为我们谈论的是泰勒·斯威夫特，但也因为这是实际数字）。这意味着斯威夫特处于距离平均值一个标准差的范围内。更准确地说，假设正态分布，1989
    年出生的荷兰女性中有 22% 会比她高。这意味着斯威夫特很高，但每四五个荷兰女性中就有一个会比她高，因此她在人群中不会特别突出。


    现在忘记可能的搬迁，将斯威夫特与她的原籍国进行比较。根据美国国家健康统计中心的一份出版物，2015-2018 年间 20-29 岁女性的平均身高为 162.6
    厘米，标准差约为 10 厘米（Fryar et al., 2021）。再次假设正态分布，这意味着斯威夫特在她这个年龄段的女性中属于最高的 4%！因此，她很可能在同龄人中脱颖而出。


    我们可以将上述内容重新表述得更统计化：“假设美国女性的平均身高为 162.6 厘米，标准差为 10 厘米，观察到身高 180 厘米或更高的人的概率为 4%。”这与即将介绍的
    **p 值**相去不远。


    发现像泰勒·斯威夫特这样高的人是否令人惊讶，取决于你对 4% 的解释。也许你不会觉得这在实际意义上显著：当你在繁忙的街道上行走时，你可能会看到数百人，因此其中会有很多高个子女性。（同样，人们会进行数百项研究，其中一些必然会显示出更大的效应。）更一般地说，4%
    的中奖概率会感觉很多，而手术后 4% 的改善概率可能会感觉令人失望。（同样，如果重要的政策将基于研究证据来制定，那么证据水平应该很高。）'
