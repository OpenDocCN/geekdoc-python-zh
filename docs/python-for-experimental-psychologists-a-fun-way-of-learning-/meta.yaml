- md: "## 5.4 Gathering Participant Information\n\n### 5.4.1 Constants\n\nWe basically\
    \ have a full experiment now. However, at the moment we haven’t been kind to future\
    \ us, nor anyone else we will share our experiment with. The reason is because\
    \ there are several things that remain constant in our experiment, but that we\
    \ might want to tweak in future experiments, for example the duration of the fixation\
    \ and cue. Any researchers we share our experiment with (and our future selves\
    \ wanting to make adjustments) would have to search through our code to find the\
    \ line they need to edit. We can make life much easier by having the editable\
    \ information at the top of our experiment script. For this, we will make a dictionary:\n\
    \n```\n# a dictionary to handle global info\nexpInfo = {\n    'fixTime': 1,\n\
    \    'cueTime': 0.5\n}\n```\n\nWe can then update the code where we use these\
    \ values to determine timing:\n\n```\n# get the desired number of frames\nfixTime\
    \ = secs2frames(expInfo['fixTime'])\ncueTime = secs2frames(expInfo['cueTime'])\n\
    ```\n\nWe can even give this extra information to our Experiment Handler so that\
    \ it is saved to our data file along with the trial-by-trial data:\n\n```\nthisExp\
    \ = data.ExperimentHandler(\n    name = 'Best_Posner_Ever',\n    extraInfo=expInfo,\n\
    \    dataFileName = 'output')\n```\n\n### 5.4.2 Presenting a Dialogue Box\n\n\
    Another option to set parameters is to present a pop-up box at the start of the\
    \ experiment in which people can adjust settings without even needing to touch\
    \ our code. Let’s import one last module to do this, the gui module:\n\n```\n\
    from psychopy import visual, core, event, data, gui\n```\n\nThen, we could add\
    \ whatever parameters we might want to gather at the start of an experiment:\n\
    \n```\n# a dictionary to handle global info\nexpInfo = {\n    'fixTime': 1,\n\
    \    'cueTime':0.5,\n    'participant':'',\n    'session':'',\n    'group':['A',\
    \ 'B'],\n    'corrected vision':False\n}\n```\n\nAnd present these parameters\
    \ as editable within a dialogue box:\n\n```\n# present the dictionary as a pop\
    \ up dialogue box\ndlg = gui.DlgFromDict(expInfo)\n\n# check if the user pressed\
    \ OK\nif not dlg.OK:\n    core.quit()\n```\n\nThere are a few things to note here.\
    \ First, you’ll notice that different types of value in the expInfo dictionary\
    \ present as different types of options in the dialogue box. A string allows free-type\
    \ response, a list presents a set of drop-down options, and a Boolean presents\
    \ a checkbox (which we have left unchecked for now). Second, you’ll notice that\
    \ all of these fields are presented in the dialogue box. What if we only want\
    \ specific fields to be editable? The answer to that would be, you can always\
    \ add fields and corresponding values to a dictionary after the presentation of\
    \ the dialogue box. For instance, imagine we want to add a date string to the\
    \ experiment info:\n\n```\n# add date string to expInfo\n# (not editable in dlg\
    \ box)\nexpInfo['datestr'] = data.getDateStr()\n```\n\nFinally, we check if the\
    \ participant/researcher does or does not press the OK button on this dialogue\
    \ box. If we do not detect the OK button as pressed, we pull the plug on the whole\
    \ study using `core.quit()`.\n\nIt is advisable that you use the unique information\
    \ gathered from your `expInfo` dictionary to set a unique filename for each run.\
    \ This prevents accidental overwriting of previous files. At the moment, we simply\
    \ use \"output\" in the `dataFileName` of the experiment handler. Let's update\
    \ that:\n\n```\nthisExp = data.ExperimentHandler(\n    name = 'Best_Posner_Ever',\n\
    \    extraInfo=expInfo,\n    dataFileName=\n    'data/{participant}_{datestr}'.format(**expInfo),\n\
    \    )\n```\n\nHere, we are using a fancy method of string formatting used in\
    \ Python 3 onwards known as an fstring. This allows us to conveniently populate\
    \ a string with information contained in a dictionary.\n\n## 5.5 Storing Keyboard\
    \ Accuracy\n\nWe now have the basics of an experiment, but there are a few other\
    \ things that would be ideal. First, we currently store the name of the key pressed\
    \ and the response time of the key press. What if we want accuracy? This is actually\
    \ a small add on, which is easy given what we've learned about if statements.\n\
    \n```\n# score accuracy\nif keys[0].name == trial['corr_ans']:\n    correct =\
    \ 1\nelse:\n    correct = 0\n```\n\nThen we can add correct to our data file trial-by-trial\
    \ using\n\n```\nthisExp.addData('correct', correct)\n```\n\nWe could even use\
