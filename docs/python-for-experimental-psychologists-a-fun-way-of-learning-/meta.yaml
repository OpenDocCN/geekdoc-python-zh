  md: "154 Eye Tracking\n\nYou don't have to go through the effort of manually creating\
    \ a new folder. Instead, you can create a new one using the `mkdir` function from\
    \ the `os` module.\n\nOne downside of using `mkdir` is that it causes an error\
    \ if you try to make a new folder when that folder already exists. To prevent\
    \ any kind of accidents, it's good practice to find out whether the folder you\
    \ were about to make already exists. You can do this with the `os.path` module's\
    \ `isdir` function. Use the following code in your script to combine these functions:\n\
    \n```\n# Check if the output directory exists yet\nif not os.path.isdir(OUTPUTDIR):\n\
    \    # If the output directory does not exist yet, make it\n    os.mkdir(OUTPUTDIR)\n\
    ```\n\nIf the output folder already exists, `os.path.isdir` will return `True`.\
    \ The `if` statement used here will only run if `False` is returned, though, due\
    \ to the use of `not`. Thus, if no output directory exists, `mkdir` will create\
    \ one.\n\nTime to actually read the data. You can do this using the `read_edf`\
    \ function; or any of the other supported trackers' reader functions, depending\
    \ on what data file you have. They all return the same data structure, so if you\
    \ need, you can simply substitute `read_edf` in the following example:\n\n```\n\
    # Read the data\ndata = read_edf('default.asc', 'image_onset', \\n           \
    \    stop='image_offset')\n```\n\nThe `read_edf` function requires two input arguments:\
    \ the name of the data file and a string that indicates what event signalled the\
    \ start of a trial. This does not have to be the actual start of a trial; it can\
    \ also be the start of the period within a trial that you want to extract. In\
    \ addition, you can also pass the keyword argument `stop`. This allows you to\
    \ specify the string that indicates what event signalled the end of a trial.\n\
    \nIn your data file (which is named `default` if you didn't specify a file name),\
    \ the event that indicates the onset of an image is `'image_onset'`. There was\
    \ more to that string (it also included the presented image's name), but you don't\
    \ have to specify a full event string for `read_edf` to work. Finally, the event\
    \ that signalled the image's offset was `'image_offset'`.\n\nThe `read_edf` function\
    \ returned a variable that you named `data`. This variable is a list of all trials\
    \ that were extracted from the data file. Each trial is represented by a dict.\
    \ Within each trial dict, there are six different keys: `'x'` and `'y'` for the\
    \ horizontal and vertical gaze position, `'size'` for the pupil size, `'trackertime'`\
    \ and `'time'` for the absolute and relative time, and `'events'` for all detected\
    \ and logged events.\n\nWith the exception of `'events'`, all keys point to NumPy\
    \ arrays that contain data samples. How to process these is the topic of the *Analysing\
    \ Traces* chapter. The `'events'` key points to another dict, which has seven\
