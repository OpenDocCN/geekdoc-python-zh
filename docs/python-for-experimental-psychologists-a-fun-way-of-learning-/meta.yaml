    ```\n\nYou could even use a loop to generate large sets of images, which we will\
    \ learn about in a moment.\n\n## 3.6 Making Many Stimuli\n\nIn some circumstances,\
    \ we want to present many stimuli on the screen at once. For example, a visual\
