    # 6.7 Statistical Testing


    The comparisons you would like to make are within each SOA, between the valid
    and the invalid condition.


    Officially, with a design like this, you should do a repeated-measures analysis
    of variance (ANOVA) with SOA and validity as factors (each with two levels). This
    test could demonstrate a significant main effect of validity and/or of SOA, and
    it could show a significant interaction effect between the two. If you find such
    a significant effect, you could also compare individual cells (pairs of groups
    you can make from the factors and levels). For example, you could test whether
    there was a significant difference in reaction times between the valid and invalid
    conditions within the 100 millisecond SOA condition. Importantly, if the repeated-measures
    ANOVA did not show any significant effects, it might be inappropriate to do such
    follow-up tests (provided you don''t have a good reason to do so, for example
    a very strong hypothesis).


    Also, before even doing the repeated-measures ANOVA, you should check whether
    all of its underlying assumptions are met. For example, the variances in all cells
    should be equal, and you could test for this using Mauchly''s test of sphericity.


    > (Please note that some stats nerds might propose a different analysis, such
    as a linear mixed-effects model or something else entirely. When in doubt, consult
    a search engine. When still in doubt after that, consult a statistician.)


    For now, you can be a rebel and completely ignore the rules. Instead, you could
    do two related-samples t-tests. One to test if the reaction times to valid cues
    and invalid cues are different in the 100-ms SOA condition and another to test
    if reaction times to valid and invalid cues are different in the 900-ms SOA condition.


    You should not take this as advice to not do appropriate statistics! The reason
    for not doing a more appropriate test is that this chapter is not on statistics.
    You''re reading this to be able to get started with Python programming, not to
    get acquainted with the ins and outs of within-participant statistical testing.
    (That said: Chapter 9 is on statistics so leaf on through if you''re curious!)


    Now back to what you were doing: related-samples t-tests in Python. Open the analysis.py
    script from the previous chapters. To perform a related-samples t-test, you can
    use the ttest_rel function from SciPy''s stats module. This function requires
    two arguments: one NumPy array of data in one condition and another NumPy array
    of data from the other condition. This could be, for example, the reaction times
    from the valid condition and the reaction times from the invalid condition.


    ttest_rel will calculate and return a t-statistic and a p-value. For those not
    in the know: the t-statistic indicates how far apart two distributions are, and
    the p-value indicates how likely it is to find a more extreme t-statistic than
    you did (assuming there is no difference between the distributions).


    In your case, one array will contain valid reaction times and the other will be
    of invalid reaction times, split out according to SOA. Add the following lines
    to the end of analysis.py:'
