  md: '# 152 Eye Tracking


    Fixations occur when people hold their eyes relatively stable. Most conscious
    vision happens during fixations, and a lot of animals (including humans) tend
    to fixate their gaze on whatever has their interest.


    In this example, a participant was allowed to look at several images. The participant''s
    fixations can tell you about what parts of each image piqued their interest. Because
    this is highly exploratory research, you won''t have to go into statistics here.
    Instead, your task is to visualise the participants'' gaze behaviour in several
    ways. (Do note that this is not a general advice. Always ask for the statistics
    behind visualisations!)


    Gaze data visualisations provide qualitative rather than quantitative evidence
    and should not be interpreted with too much confidence. However, visualisations
    are rather useful to guide further quantitative research, and they are popular
    in marketing and usability research. Therefore, it''s good to learn how to create
    them!


    In this section, it will be assumed that you worked your way through the previous
    sections, in which you created an experiment that showed images to participants.
    It is required that you are using the same images and the same constants.py script.


    If you are using the example data file, make sure to download the example images
    for this chapter from the companion website. Place these images in a folder called
    "images". In addition, create a new Python script and name it constants.py. Add
    the following code:


    ```

    import os


    # The DISPTYPE can be either ''pygame'' or ''psychopy''

    DISPTYPE = ''pygame''

    # The DISPSIZE should match your monitor''s resolution!

    DISPSIZE = (1024, 768)


    # Set the TRACKERTYPE to the brand you use

    TRACKERTYPE = ''eyelink''

    # DUMMYMODE should be True if no tracker is attached

    DUMMYMODE = False


    # Foreground colour set to white

    FGC = (255, 255, 255)

    # Background colour set to black

    BGC = (0, 0, 0)

    # Fixation mark time (milliseconds)

    FIXTIME = 2000

    # Image time (milliseconds)

    IMGTIME = 10000

    # Get the path to the current folder

    DIR = os.path.dirname(os.path.abspath(__file__))


    # Get the path to the image folder

    IMGDIR = os.path.join(DIR, ''images'')

    # Get a list of all image names

    IMGNAMES = os.listdir(IMGDIR)

    # Sort IMGNAMES in alphabetical order

    IMGNAMES.sort()

    ```'
