    could probably think of a way in which compiled languages could rewrite themselves
    to also kill the human race. The real lesson here is that you shouldn’t worry
    about the distinction between interpreted and compiled languages too much!


    # 3.2 The PsychoPy Coder View


    When you first open PsychoPy, you will see three open windows: Builder view, Runner
    view, and Coder View. In this book, we are going to focus on Coder View. (For
    making experiments in Builder, see Peirce et al., 2022). The Coder view is shown
    in Figure 3.1, it is made up of three sections, the Shelf, Source Assistance,
    and Editor.


    The Editor window is the most important of these sections; it is where we will
    write our python scripts. To start a new script, you can select the new document
    icon (if you hover over this, it will read “create new experiment file”). This
    will create a new script in the Editor window named “untitled.py”. The “.py” extension
    indicates that this is a python file. In general, it is a good idea to save this
    with a new, unique, name before starting. Let’s save it as “stimuli.py”.


    Below the Editor window is the Shelf. This Shelf consists of two tabs, the Shell
    and the Output tab. The Shell is a place where you can type Python code to test
    it out. However, variables created in the shell are not saved to a “global” workspace.
    That is, unlike other development environments, you cannot access variables created
    in your script in Editor from Shell, nor vice versa. The Output tab is where any
    output (including important error messages!) will be generated when you run your
    scripts.


    Finally, the Source Assistant window also consists of two tabs. The Structure
    tab is intended to help us navigate large scripts, by showing us the functions
    and classes that we have created in one condensed location. The File Browser tab
    is intended to help us navigate where our current directory is. In this chapter,
    we will focus less on the Source Assistant window – but it is good to know it
    is there.


