    # 9.4.2 Multivariable Linear Regression


    The next step is to combine both predictors into a single model. To do so, we
    will need to stick them into a single array. To do so, let’s use NumPy’s ones
    function, which can create an array filled with the value 1. In this case, we
    will give it the shape 10 × 3: one row for each observation (i.e. the lecturers)
    and one column for each feature (i.e. the variables measured for each lecturer).


    ```

    X = numpy.ones((10,3))

    ```


