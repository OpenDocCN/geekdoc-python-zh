  md: '# MAKE SOME NOISE


    Welcome to another random intermezzo! In this chapter, you will learn how to construct
    your own sounds, how to play them via PyGame, and how to save them to a file.
    There are two upsides to this. First, you can show the file you created to your
    loved ones, and they will be so proud of you! Second, you can make a lot of noise
    while making the file. Let’s hope you are a student, working in a computer lab,
    with access to functional speakers.


    # What Is Sound?


    Good question! Sound is caused by vibrating air (or water, or any other medium
    that can move your eardrums), which results in movement of the *tympanic membrane*
    in your ear that is ultimately translated to neural activity in the cochlea. When
    something vibrates between 20 and 20,000 times per second, it produces a sound
    that humans can hear (although many humans are not able to hear the full spectrum
    equally well). The amount of vibrations per second is called the **frequency**.
    The extend to which the membrane is stretched is called the **amplitude**.

    In order to make sound with your computer, you need to be able to make a signal
    that goes up and down with a certain amplitude, at a frequency between 20 and
    20,000 times per second.


    # Sinusoid and Noise


    You might remember such a signal from secondary school maths. If you don’t, here’s
    a spoiler: it’s a **sinusoid**. You can create one using NumPy. To do so, you
    need a range of numbers between 0 and 2π (i.e. two times the number pi or roughly
    6.3). You use 2 pi, because it is the width of a single sine wave. NumPy’s `sin`
    function can turn that range of numbers into an actual wave. Type the following
    code into an Interpreter:


    ```

    import numpy

    ```'
