- md: "## 5.7 Understanding the Data\n\nAfter you’ve done a run through of your task,\
    \ you’ll notice a folder called “data” in the directory where your experiment.py\
    \ is saved. This folder is where your data will be saved. You’ll notice three\
    \ file types saved:\n\n- .csv: Your experimental data – each row will be a trial\
    \ and each column a variable.\n- .psydat: A file type ideal for batch processing\
    \ of data with Python scripts can even be used to recreate csv and excel files!\n\
    - .log: A chronological, timestamped log of everything that happened in your experiment.\n\
    \nWe’re going to open the .csv file. This file will contain one row per trial\
    \ and a column per variable. You’ll notice a few variables that are stored by\
    \ default from the trial handler:\n\n- .thisN – the current trial number within\
    \ our blocks loop.\n- .thisRepN – the current repetition of our blocks loop.\n\
    - .thisTrialN – the current trial number within our trials loop.\n- .thisIndex\
    \ – the original row index of our trial within our spreadsheet.\n\nOf particular\
    \ interest to us is the “correct”, “key_rt”, and “condition” column. These will\
    \ provide the data we need to address our research question. We could in theory\
    \ just eyeball the data in Excel; however, another, widely used, use for Python\
    \ is data analysis – so let’s move on to how to analyse data in Python!\n\n---\n\
    \nexperimental block is presented before the neutral block simply by setting our\
    \ method to “sequential” in our blocks trial handler like so:\n\n```python\n#\
    \ make a trial handler for the blocks\nblocks = data.TrialHandler(trialList=blocksheet,\n\
    \    nReps=1, method='sequential')\n```\n\nThis is fine for one group, but we\
    \ also want another group that is presented with the blocks in the opposing order.\
    \ To achieve this, rename your existing blocks spreadsheet as “blocksA.xlsx”.\
    \ We are then going to make one more spreadsheet “blocksB.xlsx” in which the order\
    \ of the rows is neutral followed by experimental.\n\n| blockname | blockfile\
    \ | cueopacity |\n| --- | --- | --- |\n| neutral | neutral.xlsx | 0 |\n| experimental\
    \ | conditions.xlsx | 1 |\n\nOk now we are going to use something that we previously\
    \ snuck into our expInfo dictionary and startup dialogue box, our “group” variable.\
    \ We can use the value of “groups” to select which of our blocks files we use:\n\
    \n```python\n# import spreadsheet of trials\nblocksheet = data.importConditions(\n\
    \    'blocks{group}.xlsx'.format(**expInfo))\n```\n\nNow, when we run our experiment,\
    \ we will first get a value for expInfo[ 'group' ] using the “group” drop down\
    \ in our startup dialogue box. This will then be used to import the blocks spreadsheet\
    \ corresponding to this group. Then, because the method used in our trial handler\
    \ is set to “sequential”, that specific order will be used for this group. One\
    \ thing we might want to add as a cherry on the cake is a message to warn participants\
    \ when they will go into the next block. To do this, you can create one more textbox\
    \ stimulus:\n\n```python\n# a message to present between blocks\nblockintro =\
    \ visual.TextBox2(\n    win,\n    text='You will now start the next block\\n '\n\
    \         + 'use the arrow keys to respond to the '\n         + 'location of the\
    \ target\\n press space '\n         + 'to start',\n    pos=(0, 0),\n    letterHeight=20,\n\
    \    alignment='center',\n    color = 'white',\n    )\n```\n\nNote that in this\
    \ text stimulus, we use the \\n in order to mark a new line in our text stimulus.\
    \ Then, we can present this block message at the start of each block. Your final\
    \ code, including all the bells and whistles of this chapter, will look like this.\n\
    \n```python\nfrom psychopy import visual, core, event, data, gui\nfrom psychopy.hardware\
    \ import keyboard\n\ndef secs2frames(desired_time, framerate=60):\n    '''\n \
    \   A function to convert desired time in seconds\n    to frames\n\n    Input:\n\
    \        desired_time (float) - desired time in seconds\n        framerate (int)\
    \ - screen refresh rate\n\n    Output:\n        nFrames (int) - the number of\
    \ frames required\n        to present as close as possible to desired\n      \
    \  time in seconds.\n    '''\n    # total frames required to get close to desired\n\
    \    # times\n    nFrames = int((framerate/1.0)*desired_time)\n    return nFrames\n\
    \n# a dictionary to handle global info\nexpInfo = {\n    'fixTime': 1,\n    'cueTime':0.5,\n\
    \    'feedbackTime': 0.5,\n    'participant':'',\n    'session':'',\n    'group':['A',\
    \ 'B'],\n    'corrected vision':False\n}\n\n# present the dictionary as a pop\
    \ up dialogue box\ndlg = gui.DlgFromDict(expInfo)\n\n# check if the user pressed\
    \ OK\nif not dlg.OK:\n    core.quit()\n\n# make a window\nwin = visual.Window(size=[1024,\
    \ 768],\n    fullscr=False, units='pix', color=(0,0,0),\n    colorSpace='rgb',\
    \ screen=0)\n\n# make a keyboard instance\nkb = keyboard.Keyboard()\n# a fixation\
    \ point\n\nfixation = visual.TextBox2(\n    win,\n    text='+',\n    pos=(0, 0),\n\
    \    letterHeight=20,\n    alignment='center'\n    )\n\n# an arrow for our cue\n\
    arrowVert = [[-20, 5], [-20, -5], [0, -5],\n    [0, -10], [20, 0], [0, 10], [0,\
    \ 5]]\n\ncue = visual.ShapeStim(win, vertices=arrowVert,\n    fillColor='darkred',\
    \ size=2, pos=[0, 0],\n    lineColor='red')\n\n# a circle for our target\ntarget\
    \ = visual.Circle(win, size=20, pos=[-300, 0],\n    lineColor='white', fillColor='lightGrey')\n\
    \n# some feedback text\nfeedback = visual.TextBox2(\n    win,\n    text='',\n\
    \    pos=(0, 0),\n    letterHeight=20,\n    alignment='center',\n    color = 'white'\n\
    \    )\n\n# a message to present between blocks\nblockintro = visual.TextBox2(\n\
    \    win,\n    text='You will now start the next block\\n '\n        + 'use the\
    \ arrow keys to respond to the '\n        + 'location of the target\\n press space\
    \ '\n        + 'to start',\n    pos=(0, 0),\n    letterHeight=20,\n    alignment='center',\n\
    \    color = 'white',\n    )\n\n# add date string to expInfo\n# (not editable\
    \ in dlg box)\nexpInfo['datestr'] = data.getDateStr()\n\n# make an experiment\
    \ handler\nthisExp = data.ExperimentHandler(\n    name = 'Best_Posner_Ever',\n\
    \    extraInfo=expInfo,\n    dataFileName=\n    'data/{participant}_{datestr}'.format(**expInfo),\n\
    \    )\n\n# import spreadsheet of trials\nblocksheet = data.importConditions(\n\
    \    'blocks{group}.xlsx'.format(**expInfo))\n\n# make a trial handler for the\
    \ blocks\nblocks = data.TrialHandler(trialList=blocksheet,\n    nReps=1, method='sequential')\n\
    \n# give this block of trials to the experiment handler\nthisExp.addLoop(blocks)\n\
    \n# add trials to the experiment handler for each block\nfor block in blocks:\n\
    \n    # show the block start message\n    blockintro.draw()\n    win.flip()\n\
    \    # wait for the participant to press space to start\n    keys = kb.waitKeys(keyList=['space'],\
    \ clear=True)\n\n    # import spreadsheet of trials\n    conditions = data.importConditions(block['blockfile'])\n\
    \n    # make a trial handler\n    trials = data.TrialHandler(trialList=conditions,\n\
    \        nReps=5, method='random')\n\n    # give this block of trials to the experiment\
    \ handler\n    thisExp.addLoop(trials)\n\n    # set the opacity of the cue for\
    \ this block\n    cue.setOpacity(block['cueopacity'])\n\n    # loop through our\
    \ list of trials\n    for trial in trials:\n\n        # get the desired number\
    \ of frames\n        fixTime = secs2frames(expInfo['fixTime'])\n        cueTime\
    \ = secs2frames(expInfo['cueTime'])\n        feedbackFrames = secs2frames(expInfo['feedbackTime'])\n\
    \        # set the soa\n        soa = secs2frames(trial['soa'])\n        totalframes\
    \ = fixTime + cueTime + soa + feedbackFrames\n\n        # update stimuli for this\
    \ trial\n        cue.setOri(trial['cue_ori'])\n        target.setPos([trial['target_x'],\
    \ 0])\n\n        # present our stimuli\n        for frameN in range(totalframes):\n\
    \            if frameN < fixTime:\n                fixation.setAutoDraw(True)\n\
    \            elif frameN == fixTime:\n                # reset the clock and clear\
    \ past\n                # keyboard events\n                win.callOnFlip(kb.clock.reset)\n\
    \                win.callOnFlip(kb.clearEvents)\n            elif fixTime <= frameN\
    \ < fixTime + cueTime:\n                # undraw the fixation\n              \
    \  fixation.setAutoDraw(False)\n                # draw the cue\n             \
    \   cue.setAutoDraw(True)\n            elif fixTime + cueTime <= frameN < totalframes:\n\
    \                # draw the fixation\n                fixation.setAutoDraw(True)\n\
    \                # undraw the cue\n                cue.setAutoDraw(False)\n  \
    \          win.flip()\n            # undraw the cue, draw the target\n       \
    \     target.setAutoDraw(True)\n            win.flip()\n            # wait for\
    \ a response\n            keys = kb.waitKeys(keyList=['left', 'right',\n     \
    \                              'escape'], clear=False)\n            target.setAutoDraw(False)\n\
    \            fixation.setAutoDraw(False)\n            # end if escape key pressed\n\
    \            if keys and keys[0].name == 'escape':\n                core.quit()\n\
    \            # score accuracy\n            if keys[0].name == trial['corr_ans']:\n\
    \                correct = 1\n            else:\n                correct = 0\n\
    \            # save the data\n            thisExp.addData('key_pressed', keys[0].name)\n\
    \            thisExp.addData('key_rt', keys[0].rt)\n            thisExp.addData('correct',\
    \ correct)\n            thisExp.nextEntry()\n\n        # score accuracy\n    \
    \    if keys[0].name == trial['corr_ans']:\n            correct = 1\n        \
    \    feedback.setText('Correct!')\n            feedback.setColor('green')\n  \
    \      else:\n            correct = 0\n            feedback.setText('Incorrect')\n\
    \            feedback.setColor('red')\n\n        # show the feedback\n       \
    \ for frameN in range(feedbackFrames):\n            feedback.setAutoDraw(True)\n\
    \            win.flip()\n        feedback.setAutoDraw(False)\n```"
  mdcn: "## 5.7 理解数据\n\n在你完成一次任务运行后，你会注意到在保存 `experiment.py` 的目录中有一个名为“data”的文件夹。这个文件夹就是你的数据将被保存的地方。你会注意到保存了三种文件类型：\n\
    \n- .csv：你的实验数据——每一行代表一次试验，每一列代表一个变量。\n- .psydat：一种非常适合使用 Python 脚本进行批量数据处理的文件类型，甚至可以用来重建\
    \ csv 和 excel 文件！\n- .log：一个按时间顺序记录的、带有时间戳的日志，记录了实验中发生的所有事情。\n\n我们将打开 .csv 文件。这个文件将包含每一行对应一次试验，每一列对应一个变量。你会注意到有几个变量是默认从试验处理器中存储的：\n\
    \n- .thisN – 当前在 blocks 循环中的试验编号。\n- .thisRepN – 当前 blocks 循环的重复次数。\n- .thisTrialN\
    \ – 当前在 trials 循环中的试验编号。\n- .thisIndex – 我们的试验在电子表格中的原始行索引。\n\n我们特别感兴趣的是“correct”、“key_rt”和“condition”列。这些将提供我们需要用来回答研究问题的数据。理论上，我们可以在\
    \ Excel 中直接查看数据；然而，Python 的另一个广泛用途是数据分析——所以让我们继续学习如何在 Python 中分析数据！\n\n---\n\n\
    通过将 blocks 试验处理器中的 method 设置为“sequential”，我们可以让实验块在中性块之前呈现，如下所示：\n\n```python\n\
    # make a trial handler for the blocks\nblocks = data.TrialHandler(trialList=blocksheet,\n\
    \    nReps=1, method='sequential')\n```\n\n这对于一组来说没问题，但我们还希望另一组以相反的顺序呈现这些块。为此，将你现有的\
    \ blocks 电子表格重命名为“blocksA.xlsx”。然后，我们将再创建一个电子表格“blocksB.xlsx”，其中行的顺序是中性块在前，实验块在后。\n\
    \n| blockname | blockfile | cueopacity |\n| --- | --- | --- |\n| neutral | neutral.xlsx\
    \ | 0 |\n| experimental | conditions.xlsx | 1 |\n\n好的，现在我们将使用之前悄悄放入 expInfo 字典和启动对话框中的“group”变量。我们可以使用“group”的值来选择使用哪个\
    \ blocks 文件：\n\n```python\n# import spreadsheet of trials\nblocksheet = data.importConditions(\n\
    \    'blocks{group}.xlsx'.format(**expInfo))\n```\n\n现在，当我们运行实验时，我们将首先通过启动对话框中的“group”下拉菜单为\
    \ expInfo[ 'group' ] 获取一个值。然后，这将用于导入对应于该组的 blocks 电子表格。接着，由于我们试验处理器中使用的方法设置为“sequential”，该特定顺序将用于此组。我们可能想锦上添花的一件事是添加一条消息，在参与者进入下一个块时提醒他们。为此，你可以再创建一个文本框刺激：\n\
    \n```python\n# a message to present between blocks\nblockintro = visual.TextBox2(\n\
    \    win,\n    text='You will now start the next block\\n '\n         + 'use the\
    \ arrow keys to respond to the '\n         + 'location of the target\\n press\
    \ space '\n         + 'to start',\n    pos=(0, 0),\n    letterHeight=20,\n   \
    \ alignment='center',\n    color = 'white',\n    )\n```\n\n请注意，在这个文本刺激中，我们使用了\
    \ `\\n` 来在文本刺激中标记换行。然后，我们可以在每个块开始时呈现这个块消息。你最终的代码，包括本章的所有功能，将如下所示。\n\n```python\n\
    from psychopy import visual, core, event, data, gui\nfrom psychopy.hardware import\
    \ keyboard\n\ndef secs2frames(desired_time, framerate=60):\n    '''\n    A function\
    \ to convert desired time in seconds\n    to frames\n\n    Input:\n        desired_time\
    \ (float) - desired time in seconds\n        framerate (int) - screen refresh\
    \ rate\n\n    Output:\n        nFrames (int) - the number of frames required\n\
    \        to present as close as possible to desired\n        time in seconds.\n\
    \    '''\n    # total frames required to get close to desired\n    # times\n \
    \   nFrames = int((framerate/1.0)*desired_time)\n    return nFrames\n\n# a dictionary\
    \ to handle global info\nexpInfo = {\n    'fixTime': 1,\n    'cueTime':0.5,\n\
    \    'feedbackTime': 0.5,\n    'participant':'',\n    'session':'',\n    'group':['A',\
    \ 'B'],\n    'corrected vision':False\n}\n\n# present the dictionary as a pop\
    \ up dialogue box\ndlg = gui.DlgFromDict(expInfo)\n\n# check if the user pressed\
    \ OK\nif not dlg.OK:\n    core.quit()\n\n# make a window\nwin = visual.Window(size=[1024,\
    \ 768],\n    fullscr=False, units='pix', color=(0,0,0),\n    colorSpace='rgb',\
    \ screen=0)\n\n# make a keyboard instance\nkb = keyboard.Keyboard()\n# a fixation\
    \ point\n\nfixation = visual.TextBox2(\n    win,\n    text='+',\n    pos=(0, 0),\n\
    \    letterHeight=20,\n    alignment='center'\n    )\n\n# an arrow for our cue\n\
    arrowVert = [[-20, 5], [-20, -5], [0, -5],\n    [0, -10], [20, 0], [0, 10], [0,\
    \ 5]]\n\ncue = visual.ShapeStim(win, vertices=arrowVert,\n    fillColor='darkred',\
    \ size=2, pos=[0, 0],\n    lineColor='red')\n\n# a circle for our target\ntarget\
    \ = visual.Circle(win, size=20, pos=[-300, 0],\n    lineColor='white', fillColor='lightGrey')\n\
    \n# some feedback text\nfeedback = visual.TextBox2(\n    win,\n    text='',\n\
    \    pos=(0, 0),\n    letterHeight=20,\n    alignment='center',\n    color = 'white'\n\
    \    )\n\n# a message to present between blocks\nblockintro = visual.TextBox2(\n\
    \    win,\n    text='You will now start the next block\\n '\n        + 'use the\
    \ arrow keys to respond to the '\n        + 'location of the target\\n press space\
    \ '\n        + 'to start',\n    pos=(0, 0),\n    letterHeight=20,\n    alignment='center',\n\
    \    color = 'white',\n    )\n\n# add date string to expInfo\n# (not editable\
    \ in dlg box)\nexpInfo['datestr'] = data.getDateStr()\n\n# make an experiment\
    \ handler\nthisExp = data.ExperimentHandler(\n    name = 'Best_Posner_Ever',\n\
    \    extraInfo=expInfo,\n    dataFileName=\n    'data/{participant}_{datestr}'.format(**expInfo),\n\
    \    )\n\n# import spreadsheet of trials\nblocksheet = data.importConditions(\n\
    \    'blocks{group}.xlsx'.format(**expInfo))\n\n# make a trial handler for the\
    \ blocks\nblocks = data.TrialHandler(trialList=blocksheet,\n    nReps=1, method='sequential')\n\
    \n# give this block of trials to the experiment handler\nthisExp.addLoop(blocks)\n\
    \n# add trials to the experiment handler for each block\nfor block in blocks:\n\
    \n    # show the block start message\n    blockintro.draw()\n    win.flip()\n\
    \    # wait for the participant to press space to start\n    keys = kb.waitKeys(keyList=['space'],\
    \ clear=True)\n\n    # import spreadsheet of trials\n    conditions = data.importConditions(block['blockfile'])\n\
    \n    # make a trial handler\n    trials = data.TrialHandler(trialList=conditions,\n\
    \        nReps=5, method='random')\n\n    # give this block of trials to the experiment\
    \ handler\n    thisExp.addLoop(trials)\n\n    # set the opacity of the cue for\
    \ this block\n    cue.setOpacity(block['cueopacity'])\n\n    # loop through our\
    \ list of trials\n    for trial in trials:\n\n        # get the desired number\
    \ of frames\n        fixTime = secs2frames(expInfo['fixTime'])\n        cueTime\
    \ = secs2frames(expInfo['cueTime'])\n        feedbackFrames = secs2frames(expInfo['feedbackTime'])\n\
    \        # set the soa\n        soa = secs2frames(trial['soa'])\n        totalframes\
    \ = fixTime + cueTime + soa + feedbackFrames\n\n        # update stimuli for this\
    \ trial\n        cue.setOri(trial['cue_ori'])\n        target.setPos([trial['target_x'],\
    \ 0])\n\n        # present our stimuli\n        for frameN in range(totalframes):\n\
    \            if frameN < fixTime:\n                fixation.setAutoDraw(True)\n\
    \            elif frameN == fixTime:\n                # reset the clock and clear\
    \ past\n                # keyboard events\n                win.callOnFlip(kb.clock.reset)\n\
    \                win.callOnFlip(kb.clearEvents)\n            elif fixTime <= frameN\
    \ < fixTime + cueTime:\n                # undraw the fixation\n              \
    \  fixation.setAutoDraw(False)\n                # draw the cue\n             \
    \   cue.setAutoDraw(True)\n            elif fixTime + cueTime <= frameN < totalframes:\n\
    \                # draw the fixation\n                fixation.setAutoDraw(True)\n\
    \                # undraw the cue\n                cue.setAutoDraw(False)\n  \
    \          win.flip()\n            # undraw the cue, draw the target\n       \
    \     target.setAutoDraw(True)\n            win.flip()\n            # wait for\
    \ a response\n            keys = kb.waitKeys(keyList=['left', 'right',\n     \
    \                              'escape'], clear=False)\n            target.setAutoDraw(False)\n\
    \            fixation.setAutoDraw(False)\n            # end if escape key pressed\n\
    \            if keys and keys[0].name == 'escape':\n                core.quit()\n\
    \            # score accuracy\n            if keys[0].name == trial['corr_ans']:\n\
    \                correct = 1\n            else:\n                correct = 0\n\
    \            # save the data\n            thisExp.addData('key_pressed', keys[0].name)\n\
    \            thisExp.addData('key_rt', keys[0].rt)\n            thisExp.addData('correct',\
    \ correct)\n            thisExp.nextEntry()\n\n        # score accuracy\n    \
    \    if keys[0].name == trial['corr_ans']:\n            correct = 1\n        \
    \    feedback.setText('Correct!')\n            feedback.setColor('green')\n  \
    \      else:\n            correct = 0\n            feedback.setText('Incorrect')\n\
    \            feedback.setColor('red')\n\n        # show the feedback\n       \
    \ for frameN in range(feedbackFrames):\n            feedback.setAutoDraw(True)\n\
    \            win.flip()\n        feedback.setAutoDraw(False)\n```"
