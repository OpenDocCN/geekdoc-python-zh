  md: '# ACKNOWLEDGEMENTS


    This book would have never been here, if it wasn''t for the support of colleagues,
    friends, and family. (I won''t explicitly name everyone here, for space reasons,
    but I''m grateful to all of you.) This is especially true for Becca Hirst and
    Jon Peirce, who generously contributed the chapters on coding experiments with
    PsychoPy. You''re great to work with, and I love what you do with PsychoPy and
    with Open Science Tools!


    My eternal gratitude goes out to Ignace Hooge, who introduced me to programming
    (in Matlab), and to Sebastiaan Mathôt, whose code and help allowed me to find
    my way in Python. Further thanks go out to all the people at Utrecht University
    who had the courage to hire me, an over-confident and under-skilled undergraduate,
    for their programming needs. A special mention for Chris Paffen and Stefan van
    der Stigchel, who were the first to employ me there.


    As for actually writing the first edition of this book, I am indebted to Masud
    Husain, my PhD supervisor. When he heard I was writing it, he shook his head and
    reminded me that I should really start to focus on my actual research projects.
    He was absolutely right, and any other supervisor would have rightfully stopped
    me and/or given up hope that I would ever finish my thesis. Thank you for understanding
    my perpetual need for distraction. I also owe the late Glyn Humphreys, who allowed
    me to organise a Python course for graduate students in his department, the materials
    of which formed the basis for this book. I''m also grateful to the participants
    of that course, for their enthusiasm, and for their suggestions and corrections.


    Huge thanks go to my former colleagues at the University of Oxford, my lab mates
    in the groups of Masud Husain and the late Mark Stokes, and my friends. You managed
    to cope with my continuous nagging and obsessing over this book, and you provided
    me with the support I needed to pull through. Bonus points for Laura Grima and
    Sean Fallon, who inquired about (or were involuntarily bothered with) my progress
    almost every day in the final weeks before the deadline.


    Writing the second edition was made substantially harder by the birth of my sons,
    to the point that this book has been delayed so much that they are now nearly
    old enough to help'
