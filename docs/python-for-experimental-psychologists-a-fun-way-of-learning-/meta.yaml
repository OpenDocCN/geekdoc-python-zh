    ## 2.5.4 NumPy Arrays


    All right, time to create your first **array**. NumPy arrays can contain any type
    of value you would like. They are very similar to lists in that sense. However,
    unlike lists, each array can only hold values of the same type: so no mixing integers
    and strings, for example.


    You can do calculations with NumPy arrays that contain numbers or that contain
    nested NumPy arrays that contain numbers. You can easily make a NumPy array out
    of a list:


    ```

    import numpy


    a = [1, 2, 3]

    b = numpy.array(a)

    print(b)

    ```


    You can now use this array to do calculations with, like adding a value to all
    elements at once:


    ```

    b += 1

    print(b)

    ```


    You can index NumPy arrays in the same way that you index lists:


    ```

    b[0] += 1

    b[1:3] += 10


    print(b)

    ```


    Great! Now see what happens when you try other mathematical operations:


    ```

    a = numpy.array([1, 2, 3, 4])

    a - 2

    a * 3

    a / 2.0

    ```


    You can even do this using two (or more) arrays:


    ```

    a = numpy.array([1, 2, 3])

    b = numpy.array([2, 4, 6])


    a + b

    b - a

    a * b

    b / a

    ```


    One very important thing to note here is that the way these calculations are performed
    is *per point*: a*b is equivalent to a[0]*b[0]; a[1]*b[1]; a[2]*b[2]. That this
    is an element-wise and not a matrix multiplication can be confusing to some people.
    For example, if you''ve previously worked with Matlab (a programming language
    to which NumPy is similar in a lot of ways), you might expect the default for
    a*b to be a matrix multiplication. There isn''t necessarily a better default option
    here; it''s just different.


    There are tons of other cool things you can do with NumPy. These won''t be discussed
