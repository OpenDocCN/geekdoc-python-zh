- md: '## 8.2 绘制原始样本、注视点和热图


    ![](img/07ad901823abb0ad885d2b362f9446b0_171_0.png)


    **FIGURE 8.2** These are the raw samples (grey dots) superimposed on the image
    they were collected with


    background on which the raw samples are plotted. If you don''t specify an image,
    a black background will be used instead. The second keyword argument is `savefilename`,
    which allows you to indicate where you want to save the produced plot. If you
    don''t specify a name (or None), no plot will be saved.


    To create a plot of your raw samples and save it in the output directory, use
    the following code:


    ```

    fig = gazeplotter.draw_raw(x, y, DISPSIZE, \n    imagefile=imgpath, savefilename=savepath)

    ```


    The `draw_raw` (and all other plotting functions in this chapter) returns a Matplotlib
    figure instance. You can use it to further manipulate your plot, and you can close
    it by using the `close` function from Matplotlib''s `pyplot` module:


    ```

    close(fig)

    ```


    Regularly closing your figures is good practice. Keeping too many open will flood
    your memory, which will cause your script to crash!


    Now, let''s move on to something more fancy: time to plot the fixations on an
    image! Fixations can be representing as (transparent) dots on the original image.
    You can create such a plot with the `gazeplotter` module''s `draw_fixations` function.
    It requires two arguments: the fixations (a list of ''Efix'' events) and the display
    size.


    ![](img/07ad901823abb0ad885d2b362f9446b0_172_0.png)


    **FIGURE 8.3** These are the fixations (grey circles) superimposed on the image
    they were collected with


    You can also specify some keyword arguments. These include the `imagefile` and
    `savefilename`, which work in the same way as they did with the `draw_raw` function.
    In addition, you can use the `durationsize` keyword to specify a Boolean. If set
    to True, dots will be sized according to how long a fixation was: the longer a
    fixation, the larger a dot will be. If set to `durationsize` is set to False,
    all dots will have the same size. A similar keyword argument is `durationcolour`,
    which also requires a Boolean. If you set it to True, longer fixations will have
    a “hotter” colour. If `durationcolour` is set to False, all dots will be green.
    For an example, see the figure.


    For this plot, you should also create a name and a path for the intended save
    file. After doing so, you can create the plot by using the aforementioned `draw_fixations`
    function. As before, close the figure after creating and saving it:


    ```

    # Plot the fixations

    savename = ''fixations_{}''.format(imgname)

    savepath = os.path.join(OUTPUTDIR, savename)

    fig = gazeplotter.draw_fixations(fixations, DISPSIZE, \n                                durationsize=True,
    durationcolour=False, \n                                imagefile=imgpath, savefilename=savepath)

    close(fig)

    ```


    The final plot is the most fancy one: a heatmap. This visualisation is rather
    popular in eye-tracking research, primarily because it looks really pretty. The
    idea is that you represent areas where fixations were denser with hotter colours.
    You can also weigh in the duration of fixations, to make long fixations count
    more than short fixations. The result is a visualisation that can instantly tell
    you where fixations occurred most (see the example figure).


    ![](img/07ad901823abb0ad885d2b362f9446b0_173_0.png)


    **FIGURE 8.4** This is a heatmap of the fixations superimposed on the image they
    were collected with


    To draw a heatmap, you can use the `draw_heatmap` function from the `gazeplotter`
    module. It requires the same two arguments as the `draw_fixations` function: a
    list of ''Efix'' events, and the display size.


    The `draw_heatmap` function can take four keywords, of which two are the same
    as for the `draw_raw` and `draw_fixation` functions: `imagefile` to specify the
    original image and `savefilename` to store the produced heatmap. Another keyword
    is `alpha`, which allows you to set the transparency of the heatmap that will
    be superimposed on the image. If set to 0, the heatmap will be fully transparent,
    and if set to 1, the heatmap will be completely opaque. The default value is 0.5.
    The final keyword is `durationweight`, which requires a Boolean. If you set it
    to `True`, the duration of fixations will be weighted into the heatmap construction,
    with longer fixations being assigned more weight. If set to `False`, all fixations
    will be treated as equally important. The default value is `True`.


    To draw and save a heatmap, and to close it again afterwards, use the following
    code:


    ```

    # Plot a heatmap

    savename = ''heatmap_{}''.format(imgname)

    savepath = os.path.join(OUTPUTDIR, savename)

    fig = gazeplotter.draw_heatmap(fixations, DISPSIZE, \n                               imagefile=imgpath,
    savefilename=savepath)

    close(fig)

    ```


    And with that, your script should be finished. Run it to loop through all trials,
    creating three data visualisations per trial. When the script finishes, you can
    admire all of these plots in the output folder.


    The example images include a screenshot of a documentation website. The text on
    that webpage was clearly being scanned by the participant. You can see this in
    the raw data plot


    160 Eye Tracking


    ![](img/07ad901823abb0ad885d2b362f9446b0_174_0.png)


    **FIGURE 8.5** Raw gaze samples (grey dots) on a screenshot of a documentation
    website. You can see that the participant followed the text with their eyes. Note
    how the overlap is not one-to-one, especially in the central-right part of the
    image. This indicates some drift occurred, reducing the quality of the data. This
    is very common


    ![](img/07ad901823abb0ad885d2b362f9446b0_174_1.png)


    **FIGURE 8.6** Fixations (grey circles) on a holiday picture. I took this picture
    in Barcelona, where a woman was posing with a street performer. You can see how
    most fixations landed on faces, and a few on the hands of the major actors in
    the picture


    ![](img/07ad901823abb0ad885d2b362f9446b0_175_0.png)


    **FIGURE 8.7** Heatmap on a picture of a scientific conference. This picture was
    taken at the European Conference on Eye Movements in 2013, where a bunch of nerds
    was discussing some software. Curiously, the fixations concentrated mostly on
    the douche on the right, and not on the most handsome bastard in the centre


    and in the fixation plot, where fixations land on consecutive parts of the text.
    Interestingly, people rarely fixate all words in a sentence and instead skip common
    words that they can read from the corner of their eye.


    There were quite a few pictures with faces in the examples. The fixation plots
    and heatmaps for these tell a clear story: our participant liked to look at faces.
    This is a common pattern, and you can see it in most humans who are allowed to
    look at a picture freely. The affinity for faces is not set in stone, though.
    If you ask a participant to look for your keys in a picture, it’s likely they
    will pay a lot less attention to the faces in it.


    The final example highlighted here is of a building at night. It is the Van Unnik
    building, on Utrecht University’s campus. Most of it was decommissioned in 2014,
    but it was my place of work at the time this picture was taken. The top-right
    window used to be my office.


    What’s interesting about the visualisation is that the fixations are concentrated
    on the lighter parts of the image. This reflects a very common tendency in human
    gazing behaviour: differences in contrast are very potent in grasping our attention.
    In this image, the lights in the offices, in the university logo, and on the street
    contrast with the generally dark background. Our eyes are drawn to these parts.
    Don’t go away thinking that our eyes are like moths, though! If the contrast was
    inverted, participants would have been looking at the dark parts against a generally
    light background.


    162 Eye Tracking


    ![](img/07ad901823abb0ad885d2b362f9446b0_176_0.png)


    **FIGURE 8.8** Fixations (green dots) on picture of an ugly building at night.
    Fixations are concentrated around the high-contrast areas in the picture


    One final thing to note here is that it is somewhat unusual to create heatmaps
    from a single participant’s viewing data. It was great for teaching purposes,
    but normally one would collect fixations from a larger group of participants.
    When testing participants, it’s usually *the more, the merrier*.'
