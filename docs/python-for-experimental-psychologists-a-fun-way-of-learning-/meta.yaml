  - '[PAGE 189]


    You’ll note that we left the first column, at index 0, untouched. It is to remain
    as 1s, because that is what the model uses as an intercept. For the `linregress`
    function, this intercept was included automatically, but in multivariable regression,
    we actually have to do some work for our results!


    Next, we need to run the regression. We’re going to do this using a technique
    called **ordinary least squares**, which aims to automatically find a solution
    that minimises the distance between the trend line and the data. This distance
    is called the **residuals**, and the lower they are the better a fit is. This
    is a complicated problem, because you need to find the best fitting intercept
    and slope parameters, but you can’t try out all of the infinitely many possibilities
    for what these parameters could be. Instead, most minimisation techniques do a
    clever search around parameter space. In these searches, they first randomly try
    a guess and then compute the residuals. Then they move a little and compute the
    residuals again. If they are lower, then we must be moving in the right direction!
    After a while, every direction we move into will lead to higher residuals. This
    means we’re in a **local minimum**. After trying a few different random starting
    guesses and ending up in several local minima, we choose the lowest of the minima
    and use the associated parameter values as our best fit.


    Parameter space can be thought of as a landscape. The longitude and latitude are
    determined by the intercept and the slope parameter, and the elevation can be
    thought of as the residuals for each combination of intercept and slope. The minimisation
    algorithm drops a sack of marbles out over the landscape and chooses the (intercept,
    slope) coordinate of the lowest landed marble.


    Fortunately, you don’t have to implement the above search by yourself. SciPy has
    a built-in function to do so! It’s part of the `linalg` module, called `lstsq`,
    and can be used like this:


    ```

    from scipy.linalg import lstsq


    betas, ss_res, rank, s = lstsq(X, evaluation)

    ```


    The least-squares algorithm produces quite a few outputs, but the most important
    ones for now are the coefficients `betas` and the sum of squares of the residuals
    `ss_res`. The betas here are the **unstandardised coefficients** and are ordered
    in the same way as the columns in our predictor array X. This means that beta₀
    (pronounce “beta naught”) is the intercept, beta₁ the coefficient associated with
    wearing tweed, and beta₂ the coefficient associated with the h-index.


    These coefficients are “unstandardised” because we kept them in their original
    spaces of h-index and “starts” for the evaluation scores. This is useful if you
    need to know the practical effect, i.e. by how much does an evaluation go up when
    wearing tweed. However, if you wanted to compare the relative effects of tweed
    and h-index, these unstandardised coefficients can’t just be compared. Instead,
    you would need to **standardise** all (continuous) predictors and outcomes. Standardisation
    means that you divide a set of scores by their standard deviation and then subtract
    their mean, so that the resulting values have a mean of 0 and a standard deviation
    of 1. When using these standardised values in the same regression, the betas reflect
    **standardised coefficients**, and their magnitudes can be directly compared to
    each other.'
