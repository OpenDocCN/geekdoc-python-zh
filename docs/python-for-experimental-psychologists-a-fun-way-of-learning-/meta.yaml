    t-tests, but with the ttest_ind set to equal_var=False, you should mostly be safe.


    # 9.3 Correlation


    So far, we’ve talked about differences. But sometimes we’re interested in whether
    things are similar. To this end, we can use correlation: the tendency for different
    measurements to vary in similar ways. For example, things like people’s salary,
    the number of minutes they listen to Taylor Swift per day, and how often their
    spouse talks about mechanical keyboards all correlate with life satisfaction [citation
    needed].


    Correlation is the bad boy of statistical tests, because everyone always warns
    you about them. They’ll say “Correlation does not equal causation! The number
    of Nicholas Cage films correlates with the number of swimming pool drownings in
    the USA!” Speaking of that wonderful actor: correlation is the Nick Cage of stats:
    Oscar-worthy when used appropriately, but the results can be unintentionally funny
    when used inappropriately.


    # 9.3.1 Covariance


    We previously looked at t-tests and noted that they quantified sample differences
    with (kind of) signal-to-noise ratio. They did so by dividing differences between
    means by a measure derived from sample variance(s). Correlations are highly similar,
    but instead of differences, they quantify association between two samples. The
    magnitude of this association is then compared against, you guessed it, a measure
    derived from sample variance.


    Associations between two variables can be quantified as their covariance. Computing
    this comes down to looking at how far individuals are from the group mean on both
    variables. For example, I might spend more time reading about pigeon flight that
    the average person, and my quality of life score might also be higher than the
    average. Some of my colleagues, on the other hand, don’t care for pigeons for
    some reason (?!), and I can only assume their quality of life is lower than the
    average. This is covariance: when you score high on pigeon interest, you also
    score high on quality of life; but when you score low on pigeon interest, you
    score low on quality of life. Thus, if you were to multiply both distances from
    the group mean, you would end up with a high value. The mean (across all people
    in your sample) of all of these multiplied differences is the covariance.


    Covariance works when two variables are high or low at the same time within each
    participant: multiplying two positive values ends with a positive value but so
    does multiplying two negative values! However, it also works for when one variable
    is high but the other is low (and vice versa) within each participant. In this
    case, the multiplication is of one'
  - '[PAGE 185]


    positive and one negative number, or one negative and one positive number; and
    both end up as a negative value.

    Covariance will be low if people are not consistent in their scores. Some people
    will score higher than the mean on two variables, but others will score higher
    than the mean on one and lower on the other, and yet others will score lower on
    the first and higher on the second. If this is the case, the result is a nice
    mixture of positive and negative values, which will average out to around 0: no
    covariance!


    # 9.3.2 Pearson’s R Coefficient


    You can think Pearson’s correlation coefficient R is computed as the ratio of
    covariance and variance. It is computed by dividing the covariance between two
    variables by the product of the standard deviations of those variables. R varies
    from –1 for a completely negative correlation via 0 for no correlation, to 1 for
    a completely positive correlation. Such a complete correlation would mean that
    for every difference in one variable, the difference in the other variable is
    the exact same. So if I score 1 standard deviation above the mean for reading
    about pigeons, I would also be one standard deviation above the mean on a quality-of-life
    questionnaire.

    In Python, you can simply use SciPy’s stats module to compute R and an associated
    p-value, by using the pearsonr function:


    ```

    from scipy.stats import pearsonr


    x = [1.4, -0.7, -0.9, 0.4, 0.3, \n     -0.1, 1.0, -0.3, -0.2, 1.1]

    y = [0.9, -0.6, -0.7, -0.3, 0.5, \n     0.1, -0.2, -0.5, 0.3, 0.8]

    r, p = pearsonr(x, y)

    print(r, p)

    ```


    The p-value for a correlation quantifies the probability of finding an R value
    like the observed or more extreme, assuming that no correlation exists between
    the two variables.


    # 9.3.3 Spearman’s ρ Coefficient


    Pearson’s correlation coefficient R suffers from extreme values. When these are
    present in either variable, this impacts the covariance computation, and they
    can disproportionately pull on the R value. In these cases, you could opt for
    using non-parametric tests of correlation. One such metric is Spearman’s rank
    correlation coefficient ρ.

    The beauty of ρ is that it works exactly the same as R: it is the standardised
    covariance, i.e. the covariance between two variables divided by the product of
    their standard deviations. However, we employ a little trick first to get rid
    of those pesky extreme values! Instead of using the actual data, we use their
    rank-order instead. For the example above, the rank orders would be like this:


    ```

    x_rank = [10, 2, 1, 7, 6, 5, 8, 3, 4, 9]

    y_rank = [10, 2, 1, 4, 8, 6, 5, 3, 7, 9]

    ```'
- md: "## 9.3.4 Side Note: Who Are These Tests Named After?\n\nLike many statistical\
    \ tests and concepts, the above tests are named after people: Karl Pearson and\
    \ Charles Spearman. They are statisticians who were alive from around 1860 to\
    \ 1940, and apparently the two hated each other (academic gossip shall not be\
    \ referenced). Perhaps more notable, though, is how their efforts greatly helped\
    \ the eugenics movement. Sadly, many statisticians and psychologists around this\
    \ time were active and enthusiastic eugenicists, even though one could reasonably\
    \ argue they could have known better. Much is written on this topic, in much better\
    \ and more comprehensive prose than I will be able to produce. I simply wanted\
    \ to contextualise the names of these tests, as it felt wrong to hide this information.\n\
    \n## 9.4 Linear Regression\n\nSometimes, we have more than one variable that we\
    \ think is associated with an outcome of our interest. For example, we might want\
    \ to probe how the teaching evaluations of lecturers are related to them wearing\
    \ a tweed jacket and also their h-index. We could correlate both sets of values,\
    \ but this only gets at the individual pairwise relationships. Instead, it could\
    \ be that people with higher h-indices are more likely to wear tweed, which would\
    \ make the variables overlap in their relationship with teaching evaluations.\
    \ Linear regression allows us to test both variables at the same time, thereby\
    \ avoiding double counting any overlap.\n\nRegression is often cloaked in the\
    \ language of prediction. This is because we explicitly use variables to predict\
    \ an outcome. However, you should really only consider this “prediction” from\
    \ a practical mathematical standpoint, and not from a more philosophical viewpoint\
    \ of causation. If we regress variables x1 and x2 on outcome y, it does not necessarily\
    \ mean that x1 and x2 caused y. In our example above, it could be that lecturers\
    \ obtain high teaching evaluations because students trust them more when they\
    \ are wearing tweed and because they have substantial experience with publishing\
    \ papers (which has also improved their h-index). However, it could also be that\
    \ lecturers are more likely to start wearing tweed if their confidence in their\
    \ academic ability is boosted by teaching evaluations and their h-index. Linear\
    \ regressions do not pick up on the direction of causality, they just tell you\
    \ about associations. You need to address causality by cleverly designing your\
    \ experiments and models, by using manipulations, and by simply waiting for the\
    \ passage of time. Perhaps, taking all of these together, your theories can carefully\
    \ converge on causality.\n\nWith that disclaimer out of the way, let’s get our\
    \ hands dirty. Our example demanded two predictors, so let’s make up some data!\
    \ First, we have the wearing of tweed jackets. Let’s keep this simple and set\
    \ it as a binary variable: some people wear tweed jackets, and they will be assigned\
    \ a 1; whereas others do not, and they will be assigned a 0:\n\n```\ntweed = [0,\
    \ 0, 1, 0, 1, 1, 1, 1, 0, 0]\n```\n\nNext, we have h-indices. These are almost\
    \ completely meaningless values that quantify how much an academic has published\
    \ and how many times each paper was cited. The higher the h-index, the more “impact”\
    \ we think someone has. (This metric is mostly meaningless, because it widely\
    \ differs between fields, can easily be gamed by pumping out many small papers\
    \ that cite each other, and for a whole host of other reasons.) Across all scientists,\
    \ h-indices are skewed towards 0. (This is not unlike p-values for true effects,\
    \ so I guess we should start calling people with low h-indices “significant”!)\
    \ However, among the staff within a department, it is likely to be somewhat closer\
    \ to being normally distributed because all will have been in academia for several\
    \ years and thus be published and be cited reasonably often.\n\n```\nh_index =\
    \ [14, 12, 29, 11, 2, 30, 33, 31, 10, 17]\n```\n\n> (If you’re wondering about\
    \ the 2 in there: that’s a recently graduated PhD student who happens to have\
    \ worked with the 33, copies everything about them (including the tweed), and\
    \ is so promising that the department simply had to offer them a Tenure Track\
    \ position after a completely fair hiring procedure.)\n\nThe final ingredient\
    \ to our regression is the outcome variable: teaching evaluations. These are completed\
    \ by a subset of students at the end of a course module and are supposed to reflect\
    \ teaching aptitude. (In practice, they also reflect the module’s topic, random\
    \ grievances, and a smorgasbord of stereotypes.) In many places, these scores\
    \ are between 1 and 5. Because this resembles how many internet reviews work,\
    \ let’s call these evaluation scores “stars”.\n\n```\nevaluation = [2.44, 1.66,\
    \ 4.40, 1.71, 1.00,\n              4.67, 5.00, 4.98, 1.66, 2.62]\n```\n\n### 9.4.1\
    \ Univariable Linear Regression\n\nFirst, let’s look at the relationship between\
    \ each predictor and the outcome separately. We can do so using SciPy’s stats\
    \ module’s linregress function:\n\n```\nfrom scipy.stats import linregress\n\n\
    result = linregress(tweed, evaluation)\nprint(result.rvalue, result.pvalue)\n\
    ```\n\nSo far, we have just treated this as a simple correlation, looking at only\
    \ the R coefficient and the p-value. These suggest that there is a relationship\
    \ between wearing tweed and student evaluations, but the beauty of regression\
    \ is that it can more precisely quantify this.\n\nYou can do so by looking at\
    \ the slope parameter, which tells you by how much the outcome increases for every\
    \ step in the predictor:\n\n```\nprint(result.slope)\n```\n\nThis slope tells\
    \ you that wearing tweed jackets increases your evaluation by a whopping 2 stars!\
    \ Let’s see if a similar thing is true for the h-index:\n\n```\nresult = linregress(h_index,\
    \ evaluation)\nprint(result.slope, result.rvalue, result.pvalue)\n```\n\nThis\
    \ result shows us that for every extra h-point, teaching evaluations increased\
    \ by about 0.14 points. The relationship is also very close, as R is approaching\
    \ 1! This would be a good time to stress that these values are completely made\
    \ up, and h-index does not actually correlate quite so strongly with teaching\
    \ performance (Figlio & Schapiro, 2017).\n\nAnother neat feature of doing linear\
    \ regression is that we can easily plot the outcomes:\n\n```\nfrom matplotlib\
    \ import pyplot\n\n# First, create a scatterplot of the data.\npyplot.plot(h_index,\
    \ evaluation, \"o\",\n            color=\"#FF69B4\")\n\n# Next, draw the fitted\
    \ line.\nx = numpy.linspace(0, 35, 10)\ny = result.intercept + result.slope *\
    \ x\npyplot.plot(x, y, \"-\", color=\"#FF69B4\")\n\n# Set axis labels\npyplot.xlabel(\"\
    h-index\", fontsize=16)\npyplot.ylabel(\"Teaching evaluation (stars)\",\n    \
    \          fontsize=16)\n```\n\n### 9.4.2 Multivariable Linear Regression\n\n\
    The next step is to combine both predictors into a single model. To do so, we\
    \ will need to stick them into a single array. To do so, let’s use NumPy’s ones\
    \ function, which can create an array filled with the value 1. In this case, we\
    \ will give it the shape 10 × 3: one row for each observation (i.e. the lecturers)\
    \ and one column for each feature (i.e. the variables measured for each lecturer).\n\
    \n```\nX = numpy.ones((10,3))\n```\n\nNow let’s add the variables to the array:\n\
    \n```\nX[:,1] = tweed\nX[:,2] = h_index\n```\n\nYou’ll note that we left the first\
    \ column, at index 0, untouched. It is to remain as 1s, because that is what the\
    \ model uses as an intercept. For the `linregress` function, this intercept was\
    \ included automatically, but in multivariable regression, we actually have to\
    \ do some work for our results!\n\nNext, we need to run the regression. We’re\
    \ going to do this using a technique called **ordinary least squares**, which\
    \ aims to automatically find a solution that minimises the distance between the\
    \ trend line and the data. This distance is called the **residuals**, and the\
    \ lower they are the better a fit is. This is a complicated problem, because you\
    \ need to find the best fitting intercept and slope parameters, but you can’t\
    \ try out all of the infinitely many possibilities for what these parameters could\
    \ be. Instead, most minimisation techniques do a clever search around parameter\
    \ space. In these searches, they first randomly try a guess and then compute the\
    \ residuals. Then they move a little and compute the residuals again. If they\
    \ are lower, then we must be moving in the right direction! After a while, every\
    \ direction we move into will lead to higher residuals. This means we’re in a\
    \ **local minimum**. After trying a few different random starting guesses and\
    \ ending up in several local minima, we choose the lowest of the minima and use\
    \ the associated parameter values as our best fit.\n\nParameter space can be thought\
    \ of as a landscape. The longitude and latitude are determined by the intercept\
    \ and the slope parameter, and the elevation can be thought of as the residuals\
    \ for each combination of intercept and slope. The minimisation algorithm drops\
    \ a sack of marbles out over the landscape and chooses the (intercept, slope)\
    \ coordinate of the lowest landed marble.\n\nFortunately, you don’t have to implement\
    \ the above search by yourself. SciPy has a built-in function to do so! It’s part\
    \ of the `linalg` module, called `lstsq`, and can be used like this:\n\n```\n\
    from scipy.linalg import lstsq\n\nbetas, ss_res, rank, s = lstsq(X, evaluation)\n\
    ```\n\nThe least-squares algorithm produces quite a few outputs, but the most\
    \ important ones for now are the coefficients `betas` and the sum of squares of\
    \ the residuals `ss_res`. The betas here are the **unstandardised coefficients**\
    \ and are ordered in the same way as the columns in our predictor array X. This\
    \ means that beta₀ (pronounce “beta naught”) is the intercept, beta₁ the coefficient\
    \ associated with wearing tweed, and beta₂ the coefficient associated with the\
    \ h-index.\n\nThese coefficients are “unstandardised” because we kept them in\
    \ their original spaces of h-index and “stars” for the evaluation scores. This\
    \ is useful if you need to know the practical effect, i.e. by how much does an\
    \ evaluation go up when wearing tweed. However, if you wanted to compare the relative\
    \ effects of tweed and h-index, these unstandardised coefficients can’t just be\
    \ compared. Instead, you would need to **standardise** all (continuous) predictors\
    \ and outcomes. Standardisation means that you divide a set of scores by their\
    \ standard deviation and then subtract their mean, so that the resulting values\
    \ have a mean of 0 and a standard deviation of 1. When using these standardised\
    \ values in the same regression, the betas reflect **standardised coefficients**,\
    \ and their magnitudes can be directly compared to each other."
  mdcn: "## 9.3.4 附注：这些检验以谁命名？\n\n与许多统计检验和概念一样，上述检验也是以人名命名的：卡尔·皮尔逊和查尔斯·斯皮尔曼。他们是活跃于约1860年至1940年间的统计学家，显然两人彼此憎恶（学术八卦不予引用）。不过，或许更值得注意的是，他们的工作极大地助长了优生学运动。遗憾的是，当时许多统计学家和心理学家都是积极而狂热的优生主义者，尽管有理由认为他们本应更明事理。关于这个话题已有大量著述，其文笔远比我所能写出的更为优美和全面。我只是想为这些检验的名称提供背景信息，因为隐瞒这些信息似乎不妥。\n\
    \n## 9.4 线性回归\n\n有时，我们认为有多个变量与我们感兴趣的结果相关。例如，我们可能想探究讲师的教学评价与他们穿粗花呢夹克以及他们的h指数有何关系。我们可以分别计算这两组值的相关性，但这只能揭示个体的成对关系。然而，实际情况可能是，h指数较高的人更有可能穿粗花呢夹克，这使得这些变量在与教学评价的关系上存在重叠。线性回归允许我们同时检验这两个变量，从而避免对任何重叠部分进行重复计算。\n\
    \n回归分析常被笼罩在预测的语言中。这是因为我们明确使用变量来预测结果。然而，你真的应该只从实用的数学角度来考虑这种“预测”，而不是从更哲学的因果关系角度。如果我们对结果y回归变量x1和x2，这并不一定意味着x1和x2导致了y。在我们上面的例子中，讲师获得高教学评价可能是因为学生更信任穿粗花呢夹克的讲师，并且他们拥有丰富的论文发表经验（这也提高了他们的h指数）。然而，也可能是如果讲师因教学评价和h指数而增强了对其学术能力的信心，他们就更有可能开始穿粗花呢夹克。线性回归无法捕捉因果关系的方向，它们只告诉你关联性。你需要通过巧妙地设计实验和模型、使用操纵手段以及简单地等待时间的推移来解决因果关系问题。也许，将所有这些结合起来，你的理论才能谨慎地趋近于因果关系。\n\
    \n在说明了这一点之后，让我们开始动手实践吧。我们的例子需要两个预测变量，所以让我们编造一些数据！首先，是穿粗花呢夹克的情况。我们保持简单，将其设为二元变量：有些人穿粗花呢夹克，他们将被赋值为1；而其他人不穿，他们将被赋值为0：\n\
    \n```\ntweed = [0, 0, 1, 0, 1, 1, 1, 1, 0, 0]\n```\n\n接下来，是h指数。这些几乎是完全无意义的数值，用于量化一位学者的发表量以及每篇论文被引用的次数。h指数越高，我们认为某人的“影响力”越大。（这个指标大多没有意义，因为它在不同领域差异很大，很容易通过大量相互引用的小论文来操纵，以及其他一系列原因。）在所有科学家中，h指数偏向于0。（这与真实效应的p值并无不同，所以我猜我们应该开始称h指数低的人为“显著”了！）然而，在一个系的教职员工中，它可能更接近正态分布，因为所有人都已在学术界工作了数年，因此发表和被引用的次数都相当可观。\n\
    \n```\nh_index = [14, 12, 29, 11, 2, 30, 33, 31, 10, 17]\n```\n\n> （如果你对其中的2感到疑惑：那是一位刚毕业的博士生，他恰好与那位h指数为33的同事合作过，模仿了对方的一切（包括粗花呢夹克），并且非常有前途，以至于系里在完全公平的招聘程序后不得不为他提供了一个终身教职。）\n\
    \n我们回归分析的最后一个要素是结果变量：教学评价。这些评价由部分学生在课程模块结束时完成，旨在反映教学能力。（实际上，它们也反映了模块主题、随机的不满情绪以及各种刻板印象。）在许多地方，这些分数在1到5之间。因为这类似于许多网络评论的工作方式，我们称这些评价分数为“星级”。\n\
    \n```\nevaluation = [2.44, 1.66, 4.40, 1.71, 1.00,\n              4.67, 5.00,\
    \ 4.98, 1.66, 2.62]\n```\n\n### 9.4.1 单变量线性回归\n\n首先，让我们分别查看每个预测变量与结果之间的关系。我们可以使用SciPy的stats模块中的linregress函数来完成：\n\
    \n```\nfrom scipy.stats import linregress\n\nresult = linregress(tweed, evaluation)\n\
    print(result.rvalue, result.pvalue)\n```\n\n到目前为止，我们只是将其视为简单的相关性，只查看R系数和p值。这些表明穿粗花呢夹克与学生评价之间存在关系，但回归分析的妙处在于它可以更精确地量化这种关系。\n\
    \n你可以通过查看斜率参数来做到这一点，它告诉你预测变量每增加一个单位，结果会增加多少：\n\n```\nprint(result.slope)\n```\n\
    \n这个斜率告诉你，穿粗花呢夹克会使你的评价提高整整2个星级！让我们看看h指数是否也有类似的情况：\n\n```\nresult = linregress(h_index,\
    \ evaluation)\nprint(result.slope, result.rvalue, result.pvalue)\n```\n\n这个结果向我们展示，h指数每增加一个点，教学评价大约提高0.14分。这种关系也非常紧密，因为R值接近1！现在需要强调的是，这些值完全是编造的，h指数实际上与教学表现的相关性并没有这么强（Figlio\
    \ & Schapiro, 2017）。\n\n进行线性回归的另一个巧妙之处在于我们可以轻松地绘制结果：\n\n```\nfrom matplotlib import\
    \ pyplot\n\n# 首先，创建数据的散点图。\npyplot.plot(h_index, evaluation, \"o\",\n        \
    \    color=\"#FF69B4\")\n\n# 接下来，绘制拟合线。\nx = numpy.linspace(0, 35, 10)\ny = result.intercept\
    \ + result.slope * x\npyplot.plot(x, y, \"-\", color=\"#FF69B4\")\n\n# 设置坐标轴标签\n\
    pyplot.xlabel(\"h-index\", fontsize=16)\npyplot.ylabel(\"Teaching evaluation (stars)\"\
    ,\n              fontsize=16)\n```\n\n### 9.4.2 多变量线性回归\n\n下一步是将两个预测变量合并到一个模型中。为此，我们需要将它们放入一个数组中。为此，让我们使用NumPy的ones函数，它可以创建一个填充了值1的数组。在这种情况下，我们将给它形状10\
    \ × 3：一行对应一个观察值（即讲师），一列对应一个特征（即为每位讲师测量的变量）。\n\n```\nX = numpy.ones((10,3))\n```\n\
    \n现在让我们将变量添加到数组中：\n\n```\nX[:,1] = tweed\nX[:,2] = h_index\n```\n\n你会注意到我们保留了第一列（索引0）不变。它保持为1，因为模型将其用作截距。对于`linregress`函数，这个截距是自动包含的，但在多变量回归中，我们实际上需要为结果做一些工作！\n\
    \n接下来，我们需要运行回归。我们将使用一种称为**普通最小二乘法**的技术来完成，该技术旨在自动找到一个使趋势线与数据之间距离最小化的解决方案。这个距离被称为**残差**，残差越小，拟合效果越好。这是一个复杂的问题，因为你需要找到最佳拟合的截距和斜率参数，但你不能尝试所有可能的参数组合。相反，大多数最小化技术会在参数空间周围进行巧妙的搜索。在这些搜索中，他们首先随机尝试一个猜测，然后计算残差。然后他们稍微移动一点，再次计算残差。如果残差变小了，那么我们一定是在朝正确的方向移动！过了一段时间，我们朝任何方向移动都会导致残差变大。这意味着我们处于一个**局部最小值**。在尝试了几个不同的随机起始猜测并最终陷入几个局部最小值后，我们选择最小值中最低的那个，并使用相关的参数值作为我们的最佳拟合。\n\
    \n参数空间可以被想象成一个景观。经度和纬度由截距和斜率参数决定，海拔可以被视为每个截距和斜率组合的残差。最小化算法在这个景观上撒下一袋弹珠，并选择落在最低处的弹珠的（截距，斜率）坐标。\n\
    \n幸运的是，你不必自己实现上述搜索。SciPy有一个内置函数可以做到这一点！它是`linalg`模块的一部分，名为`lstsq`，可以这样使用：\n\n\
    ```\nfrom scipy.linalg import lstsq\n\nbetas, ss_res, rank, s = lstsq(X, evaluation)\n\
    ```\n\n最小二乘算法产生相当多的输出，但目前最重要的是系数`betas`和残差平方和`ss_res`。这里的beta是**未标准化系数**，其顺序与我们预测变量数组X中的列相同。这意味着beta₀（读作“beta\
    \ naught”）是截距，beta₁是与穿粗花呢夹克相关的系数，beta₂是与h指数相关的系数。\n\n这些系数是“未标准化”的，因为我们保留了它们在h指数和评价分数“星级”中的原始空间。如果你需要知道实际效果，即穿粗花呢夹克时评价提高了多少，这很有用。然而，如果你想比较粗花呢夹克和h指数的相对影响，这些未标准化系数不能直接比较。相反，你需要**标准化**所有（连续）预测变量和结果。标准化意味着你将一组分数除以其标准差，然后减去其均值，使得结果值的均值为0，标准差为1。当在同一个回归中使用这些标准化值时，beta反映的是**标准化系数**，它们的大小可以直接相互比较。"
