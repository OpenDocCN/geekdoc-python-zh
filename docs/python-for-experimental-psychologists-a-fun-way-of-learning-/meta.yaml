    ## 8.2.4 The EyeTracker Class


    PyGaze offers a unified class to communicate with eye trackers of different manufacturers,
    all with the same functions. This is useful, as it means you don''t have to reprogram
    your experiments every time you want to use a different eye tracker.


    The name of this class is, rather unimaginatively, the `EyeTracker` class. It''s
    part of the equally unoriginally named `eyetracker` module. The class offers a
    relatively simple way to communicate with an eye tracker. It allows you to start
    recording and pause recording, and it can send messages to the log file (e.g.
    to signal the onset of image presentation).


    In addition, the `EyeTracker` class allows you to access samples while its recording.
    This means that you can know where a participant is looking (with the `sample`
    method) or how big their pupils are (with the `pupil_size` method). There are
    also methods to wait for the starts and ends of saccades, fixations, and blinks.
    For example, the `wait_for_fixation_start` will wait for a fixation to start and
    return the starting time and position. These methods allow you to make your experiments
    contingent on your participants'' eye movements.


    Finally, the `EyeTracker` class offers methods that allow you to calibrate the
    eye tracker and to check whether a calibration is still accurate. An eye tracker''s
    estimate of where someone looks is based on parameters that differ between people
    and between experimental setups. Therefore, devices need to be calibrated to each
    individual participant. To start a calibration routine, you need only call an
    `EyeTracker` instance''s `calibrate` method.


    Throughout the experiment, you can check whether a calibration is still accurate
    by using the `drift_correct` method. This offers one keyword argument, `pos`,
    which determines the position of a fixation target. The `drift_correct` method
    will show a fixation target, wait for a participant to look at it (indicated by
    the participant pressing the Space bar), and will the method then check whether
    the tracker''s gaze position estimate is near the fixation target. If it is within
    a certain range, then the tracker''s calibration is still fine.


    Calibrations can suffer from drift over time, which can cause them to become inaccurate.
    Therefore, it is important to check whether a calibration is still accurate throughout
    an experiment. How often is subject to personal preference, participant compliance,
    and the quality of your setup. When accuracy is of utmost importance, you could
    call `drift_correct` every trial. You could also call it every 20 or so trials,
    if you are more confident in your setup.


    Initialising a new EyeTracker instance requires you to pass the active Display
    as an argument. This is because the EyeTracker needs to know where it can display
    its calibration routine. Add the following to your experiment.py script:


    ```

    # Initialise a new EyeTracker

    tracker = EyeTracker(disp)


    # Calibrate the eye tracker

    tracker.calibrate()

    ```


    This will initialise a connection with your eye tracker and then calibrate it
    at the start of your experiment.

    After the calibration, you could show the instructions to your experiment. You
    could also do this before you calibrate the system. This depends on your personal
    preference and maybe on how much faith you have in your participant''s memory.


    ```

    # Feed the instructions to the Display

    disp.fill(inscr)

    # Show the instructions

    disp.show()

    # Wait until the participant presses any key

    # (Allowing them to read the instructions at their own pace)

    kb.get_key()

    ```


    ## 8.2.5 Single Trial


    A single trial in this experiment should show a fixation, followed by an image,
    and it should record eye movements throughout. Before showing the image, you need
    to make sure that the eye tracker is recording data. You also need to signal (in
    the data file) when the image was visible and which image it was (this helps you
    to make sense of the data afterwards).

    Before you can show the image, you need to load it from its file and draw it on
    a Screen. As an example, just take the first image from the IMGNAMES (that''s
    list of all images you created earlier). You can load and draw it using the imgscr
    instance''s draw_image method. This requires the full path to an image, which
    you can construct using the os.path module''s join method:


    ```

    # Choose the first image for now

    imgname = IMGNAMES[0]


    # Construct the path to the image

    imgpath = os.path.join(IMDDIR, imgname)


    # Draw the image on imgscr

    # (clear imgscr first, to be sure it''s clean)

    imgscr.clear()

    imgscr.draw_image(imgpath)

    ```


    That''s it for the preparation. Now let''s get this trial on the road! Start by
    asking the tracker to start recording gaze data:


    ```

    # Start recording gaze data

    tracker.start_recording()

    ```


    If you''re using an EyeLink, you can use the EyeTracker class'' status_msg method
    to display the name of this trial''s image on the EyeLink computer. This is a
    different computer from the one that is presenting the experiment, and it allows
    a researcher to monitor a participant''s eye movements in real time. In the bottom
    right, it also displays a ''status message'', which can be set by the experiment
    script:


    ```

    # Display a status message on the EyeLink computer

    # (EyeLink only; doesn''t do anything for other brands)

    tracker.status_msg(''Trial with {} image''.format(imgname))

    ```


    Next, log a message to the tracker to indicate that the trial has started:


    ```

    # Log trial start

    tracker.log(''TRIALSTART'')

    ```


    Now, time to actually present something. The fixation Screen should be shown first.
    It''s important to log the onset of each new Screen to the log file, so you can
    make sense of your gaze data afterwards. If you don''t log anything, all you have
    at the end of the experiment is a large heap of data, with no clues about what
    was on the screen when that data was collected!


    ```

    # Feed the fixation Screen to the Display

    disp.fill(fixscr)

    # Update the monitor to show the fixation mark

    disp.show()

    # Log the fixation onset to the gaze data file

    tracker.log(''fixation_onset'')

    # Wait for the right duration

    timer.pause(FIXTIME)

    ```


    The exact same principle applies to the image Screen:


    ```

    # Feed the image Screen to the Display

    disp.fill(imgscr)

    # Update the monitor to show the image

    disp.show()

    # Log the image onset to the gaze data file

    # Include the image name in the message!

    tracker.log(''image_onset, imgname{}''.format(imgname))

    # Wait for the right duration

    timer.pause(IMGTIME)

    ```'
