    \ so that it will be visible in our experimental block but invisible in our neutral\
    \ block. Everything else can also be further indented one level so that our trials\
    \ loop is nested in our blocks loop.\n\nNote that the key here is that when we\
    \ made our blocks trialHandler, we set method='random'. This means we will present\
    \ conditions.xlsx and neutral.xlsx in a random order, resulting in a randomised\
    \ block design.\n\n### 5.6.2 Counterbalanced Block Designs\n\nIn order to present\
    \ a counterbalanced block design, we want to know the specific order in which\
    \ our blocks are presented. In our existing example, we could ensure that the"
