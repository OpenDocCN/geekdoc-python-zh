  - '[PAGE 1]


    > “Programming in Python is an invaluable skill for psychology researchers, for
    both making experiments and analysing the resulting data”.


    **Christopher R Madan**, *author of Memories That Matter: How We Remember Important
    Things, Academia and the World Beyond book series on post-PhD careers, and An
    Introduction to MATLAB for Behavioral Researchers*


    *Praise for previous edition*


    > “An easy-to-read introduction. In a humorous style it introduces the reader
    to programming in Python, picking them up where they are as experimental psychologists.
    Very useful indeed!”


    **Ulrich von Hecker**, *Reader, Cardiff University, UK*


    > “Edwin Dalmaijer provides an intuitive introduction into psychological experimentation
    using Python libraries co-developed by the author himself. Well-structured and
    easy to read, this book will quickly have you programming, running, and analysing
    your own experiments using open, modern tools”.


    **Tomas Knapen**, *Assistant Professor Cognitive Neuroscience, Vrije Universiteit
    Amsterdam, The Netherlands*


    > “Python is fast becoming the *lingua franca* of scientific research, and this
    excellent and highly accessible book fills a much-needed gap for experimental
    psychologists. The strong focus on developing genuinely useful experimental code,
    and the comprehensive examples included, make it an outstandingly useful resource
    not just for students, but for seasoned researchers as well. Certainly the best
    (and funniest!) introduction to Python I’ve come across”.


    **Matt Wall**, *Imaging Scientist, Imperial College London, UK*'
