  md: 'Initialising a new EyeTracker instance requires you to pass the active Display
    as an argument. This is because the EyeTracker needs to know where it can display
    its calibration routine. Add the following to your experiment.py script:


    ```

    # Initialise a new EyeTracker

    tracker = EyeTracker(disp)


    # Calibrate the eye tracker

    tracker.calibrate()

    ```


    This will initialise a connection with your eye tracker and then calibrate it
    at the start of your experiment.

    After the calibration, you could show the instructions to your experiment. You
    could also do this before you calibrate the system. This depends on your personal
    preference and maybe on how much faith you have in your participant''s memory.


    ```

    # Feed the instructions to the Display

    disp.fill(inscr)

    # Show the instructions

    disp.show()

    # Wait until the participant presses any key

    # (Allowing them to read the instructions at their own pace)

    kb.get_key()

    ```


    # 8.2.5 Single Trial


    A single trial in this experiment should show a fixation, followed by an image,
    and it should record eye movements throughout. Before showing the image, you need
    to make sure that the eye tracker is recording data. You also need to signal (in
    the data file) when the image was visible and which image it was (this helps you
    to make sense of the data afterwards).

    Before you can show the image, you need to load it from its file and draw it on
    a Screen. As an example, just take the first image from the IMGNAMES (that''s
    list of all images you created earlier). You can load and draw it using the imgscr
    instance''s draw_image method. This requires the full path to an image, which
    you can construct using the os.path module''s join method:


    ```

    # Choose the first image for now

    imgname = IMGNAMES[0]


    # Construct the path to the image

    imgpath = os.path.join(IMDDIR, imgname)


    # Draw the image on imgscr

    # (clear imgscr first, to be sure it''s clean)

    imgscr.clear()

    imgscr.draw_image(imgpath)

    ```'
