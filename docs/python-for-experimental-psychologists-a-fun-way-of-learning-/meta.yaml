    # 8.2.4 The EyeTracker Class


    PyGaze offers a unified class to communicate with eye trackers of different manufacturers,
    all with the same functions. This is useful, as it means you don''t have to reprogram
    your experiments every time you want to use a different eye tracker.


    The name of this class is, rather unimaginatively, the `EyeTracker` class. It''s
    part of the equally unoriginally named `eyetracker` module. The class offers a
    relatively simple way to communicate with an eye tracker. It allows you to start
    recording and pause recording, and it can send messages to the log file (e.g.
    to signal the onset of image presentation).


    In addition, the `EyeTracker` class allows you to access samples while its recording.
    This means that you can know where a participant is looking (with the `sample`
    method) or how big their pupils are (with the `pupil_size` method). There are
    also methods to wait for the starts and ends of saccades, fixations, and blinks.
    For example, the `wait_for_fixation_start` will wait for a fixation to start and
    return the starting time and position. These methods allow you to make your experiments
    contingent on your participants'' eye movements.


    Finally, the `EyeTracker` class offers methods that allow you to calibrate the
    eye tracker and to check whether a calibration is still accurate. An eye tracker''s
    estimate of where someone looks is based on parameters that differ between people
    and between experimental setups. Therefore, devices need to be calibrated to each
    individual participant. To start a calibration routine, you need only call an
    `EyeTracker` instance''s `calibrate` method.


    Throughout the experiment, you can check whether a calibration is still accurate
    by using the `drift_correct` method. This offers one keyword argument, `pos`,
    which determines the position of a fixation target. The `drift_correct` method
    will show a fixation target, wait for a participant to look at it (indicated by
    the participant pressing the Space bar), and will the method then check whether
    the tracker''s gaze position estimate is near the fixation target. If it is within
    a certain range, then the tracker''s calibration is still fine.


    Calibrations can suffer from drift over time, which can cause them to become inaccurate.
    Therefore, it is important to check whether a calibration is still accurate throughout
    an experiment. How often is subject to personal preference, participant compliance,
    and the quality of your setup. When accuracy is of utmost importance, you could
    call `drift_correct` every trial. You could also call it every 20 or so trials,
    if you are more confident in your setup.'
