    names:


    ```

    # Get the image name

    imgname = IMGNAMES[trialnr]

    ```


    You also need the path to the image file, because some of the plotting functions
    can use the actual image in their visualisations. You can construct the path to
    each image file by using the IMGDIR constant and the image''s name:


    ```

    # Get the path to the image

    imgpath = os.path.join(IMGDIR, imgname)

    ```'
