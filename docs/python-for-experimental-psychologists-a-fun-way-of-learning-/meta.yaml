    # 2.7.2 Keyword Arguments


    Keyword arguments are basically the same thing as arguments, with one important
    exception: they have a default value. You can assign this default value in the
    function definition, as was done with `n_garlic` and `n_oregano` in the `make_mash`
    function:


    ```

    def make_mash(n_potatoes, n_garlic=1, n_oregano=6):

    ```


    The practical benefit of using keyword arguments is that you don’t have to assign
    their values when you call a function. For example, the following two calls to
    the `make_mash` function are equivalent:


    ```

    mash = make_mash(5, n_garlic=1, n_oregano=6)

    mash = make_mash(5)

    ```


    As a result of having a default value, if you don’t pass any keyword arguments,
    it will not cause an error. This is in contrast to arguments: if you don’t specify
    an argument when calling a function, you do get an error.

    It is useful to define sensible keyword arguments when you write function definitions.
    This allows you to call the function without having to bother with specifying
    every little detail, but it does keep the option to bother with details open.
    In the `make_mash` example, this means that you could rely on the default amount
    of garlic (1 clove), but if you really like it (and don’t mind smelling of it),
    you could also throw in 6 cloves:


    ```

    mash = make_mash(5, n_garlic=6)

    ```


    Of course, mash is a silly example, but you will encounter more practical examples
    of keyword arguments later in this book. When you do, think about what type of
    argument you would have used. In addition, you might want to think about whether
    you could *only* use keyword arguments. Is there a benefit of using arguments?


    # 2.7.3 Local and Global Variables


    Variables (including arguments and keyword arguments) are **local** to the function
    that they were created in. That means that the variable `potatoes` can be used
    throughout the entire `make_mash` function, but not outside of it. This might
    sound trivial, but it’s not.

    If you want a variable that was created within a function to be accessible from
    outside the function (i.e. in the rest of your script), you have to return it.
    This is why the definition of the `make_mash` function ends with `return mash`.
    If this last line was not there, the function would have no output. Consequently,
    you would not be able to use `mash`.'
