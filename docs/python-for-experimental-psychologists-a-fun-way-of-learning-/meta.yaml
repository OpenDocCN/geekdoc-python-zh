  md: 'Now that you know the amount of samples per second, you can calculate the step
    size for each cycle. Remember that a single vibration was made out of numbers
    between 0 and 2*pi, and that the step size determined the wave’s representation.
    Let’s make that range and the associated sine wave:


    ```

    # the stepsize is the distance between samples within a cycle

    # (divide the range by the amount of samples per cycle)

    stepsize = (2*numpy.pi) / spc

    # create a range of numbers between 0 and 2*pi

    x = numpy.arange(0, 2*numpy.pi, stepsize)

    # make a sine wave out of the range

    sine = numpy.sin(x)

    ```


    The next step is to crank up the sine wave’s amplitude:


    ```

    # increase the sine wave''s amplitude

    sine = sine * MAXAMP

    ```


    Now that you have created a single cycle (that’s one vibration), you can simply
    repeat it to create a longer sound. After all, a sound is nothing more than a
    series of vibrations! To repeat the sound, you can use NumPy’s tile function.
    This allows you to provide an array (your sine wave) and the number of times you
    want it repeated (an integer):


    ```

    # repeat the sine wave!

    allsines = numpy.tile(sine, int(ncycles))

    ```


    If you want to see if this works, simply plot it:


    ```

    from matplotlib import pyplot

    pyplot.plot(numpy.tile(sine, 4))

    pyplot.plot(numpy.tile(sine, 2))

    pyplot.plot(sine)

    pyplot.show()

    ```


    # Numbers to Sound


    You currently have a series of 3,000 cycles of a wave. The entire array contains
    144,000 numbers and represents a three-second long sound with a frequency of 1,000
    cycles per second. That’s impressive. Time to make an actual sound out of that
    representation!

    To make a sound, you can use PyGame’s mixer module. This conveniently allows you
    to turn a NumPy array (such as the allsines vector that you just created) into
    a mixer.Sound instance. You’ll have to initialise the mixer module first:


    ```

    # initialise the mixer module

    # (it requires the sampling rate and the number of channels)

    pygame.mixer.init(frequency=SAMPLERATE, channels=NCHANNELS)


    # now create a sound out of the allsines vector

    tone = pygame.mixer.Sound(allsines.astype(''int16''))

    ```'
