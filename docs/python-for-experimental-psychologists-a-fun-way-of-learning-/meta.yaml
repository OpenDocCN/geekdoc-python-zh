  md: '# ABOUT THIS BOOK


    This work is for researchers in Experimental Psychology and Cognitive Neuroscience,
    who have no previous experience with Python or programming. It is suitable for
    students and staff and aims to provide a basic working proficiency in Python.
    After working your way through this book, you will have the knowledge and skills
    required to code experiments and analyses.


    A major problem in Psychology education is that students have very little exposure
    to programming, even though most academic and industry jobs involve scripting
    experiments and data analyses. As a consequence, people spend a lot of time on
    manual data processing: selecting, sorting, and moving data from one spreadsheet
    to another. This is an unfortunate waste of time! If you want to work in psychological
    science and adjacent fields, but don''t know how to code (yet), this book might
    just save a few years of your life.


    This book will teach you about installing Python, variables and functions, displaying
    stimuli, making sounds, response collection, eye tracking, trial structure, randomisation,
    loading files, combining data, doing statistics, computational modelling, visualising
    data, creating publication-ready figures, and more!'
