  - "[PAGE 72]\n\n```\n# starting x coordinate of the movement\ncircle_x = -500\n\n\
    # set the circle to draw automatically on every frame\ncircle.setAutoDraw(True)\n\
    \n# iterate through the specified frames\nfor frameN in range(nFrames):\n    #\
    \ update the x value\n    circle_x += pixels_per_frame\n    # set the circle position\n\
    \    circle.setPos([circle_x, 0])\n    # flip the window\n    win.flip()\n\n#\
    \ disable the circle auto-draw\ncircle.setAutoDraw(False)\n```\n\nThis approach\
    \ can be used to generate dynamic stimuli without needing a video. It has the\
    \ advantage of being highly flexible and not that resource intensive. For example,\
    \ we could make a stimulus change based on the location of the mouse cursor! (See\
