  - '[PAGE 3]


    # PYTHON FOR EXPERIMENTAL PSYCHOLOGISTS


    *Python for Experimental Psychologists* equips researchers who have no prior programming
    experience with the essential knowledge to independently script experiments and
    analyses in the programming language Python. This book offers an excellent introduction,
    whether you are an undergraduate, a PhD candidate, or an established researcher.


    This updated edition is on Python 3 (the most current version). It starts by teaching
    the fundamentals of programming in Python and then offers several chapters on
    scripting experiments (displaying stimuli, obtaining and logging user input, precision
    timing, etc.) using the popular PsychoPy package. The remainder of the book is
    dedicated to data analysis and includes chapters on reading/writing to text files,
    time series, eye tracking, data visualisation, and statistics.


    Access to a companion website enriches the learning experience with colour figures,
    example stimuli, datasets, scripts, and a portable Windows installation of Python.
    This book assumes no prior knowledge, and its informal and accessible tone helps
    readers with backgrounds in experimental psychology and cognitive neuroscience
    to quickly understand Python. It serves as a useful resource not only for researchers
    in these fields but also for lecturers instructing on methodology and data analysis.


    *Python for Experimental Psychologists* demystifies programming complexities and
    empowers researchers to proficiently conduct experiments and analyse their results.


    **Dr Edwin S. Dalmaijer** is a Lecturer (Assistant Professor) at the University
    of Bristol. He holds a DPhil from the University of Oxford, was a postdoc at the
    University of Cambridge, and has authored Python libraries, standalone software
    packages, teaching materials, and research articles.'
