- img_proc: true
  md: 'But recall that our visual stimulus doesn''t actually become physically visible
    until the window has actually flipped. So, for an even more precise clock reset,
    we could use:


    ```

    # draw the fixation

    fixation.draw()


    # reset the keyboard clock (when the window flips)

    win.callOnFlip(kb.clock.reset)


    # clear the event buffer(when the window flips)

    win.callOnFlip(kb.clearEvents)

    win.flip()

    ```


    This second example used the `win.callOnFlip()` function. `win.callOnFlip()` will
    line up a function to be executed when the window flips, rather than executing
    it immediately. Here, we give it the name of the function to line up, `kb.clock.reset`,
    without the `()` after it (which would usually execute the function immediately).


    In addition to setting our zero point, we want to add an additional argument to
    our `waitKeys()` method:


    ```

    keys = kb.waitKeys(keyList=[''a'', ''e'', ''i'', ''o'', ''u''], \n                  clear=False)

    ```


    `clear` is an argument that, by default, is set to `True`, indicating that all
    previous events are cleared at this point. This isn''t ideal if we want to capture
    key events that occurred prior to the point at which we started waiting, so we
    set `clear=False`. This will mean that we capture any events from the point at
    which we explicitly cleared the event buffer, using `kb.clearEvents()`, to the
    current point in our script.


    # 4.2.2 Fetching Keyboard Input without Waiting


    Sometimes we might have an experiment where we want to present stimuli for a set
    amount of time and capture keyboard responses that occur within that time, but
    we don''t want to pause at the end of every trial until a keypress has been made.
    For this example, we use a slight variant of what we have already learned:


    ```

    keys = kb.getKeys(keyList=[''a'', ''e'', ''i'', ''o'', ''u''], \n                  clear=False)

    ```


    Using `getKeys()` instead of `waitKeys()` will capture keypress responses that
    occurred since the event buffer was cleared, but it won''t halt the experiment
    until a keypress is made. Now, if you just tried replacing the `waitKeys()` method
    with `getKeys()` in your existing script, you were probably greeted with an error
    message (if you did not press a key fast enough):


    ```

    print(keys[0].name, keys[0].rt)

    IndexError: list index out of range

    ```'
