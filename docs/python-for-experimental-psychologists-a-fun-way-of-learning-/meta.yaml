    # 9.3 Correlation


    So far, we’ve talked about differences. But sometimes we’re interested in whether
    things are similar. To this end, we can use correlation: the tendency for different
    measurements to vary in similar ways. For example, things like people’s salary,
    the number of minutes they listen to Taylor Swift per day, and how often their
    spouse talks about mechanical keyboards all correlate with life satisfaction [citation
    needed].


    Correlation is the bad boy of statistical tests, because everyone always warns
    you about them. They’ll say “Correlation does not equal causation! The number
    of Nicholas Cage films correlates with the number of swimming pool drownings in
    the USA!” Speaking of that wonderful actor: correlation is the Nick Cage of stats:
    Oscar-worthy when used appropriately, but the results can be unintentionally funny
    when used inappropriately.


    # 9.3.1 Covariance


    We previously looked at t-tests and noted that they quantified sample differences
    with (kind of) signal-to-noise ratio. They did so by dividing differences between
    means by a measure derived from sample variance(s). Correlations are highly similar,
    but instead of differences, they quantify association between two samples. The
    magnitude of this association is then compared against, you guessed it, a measure
    derived from sample variance.


    Associations between two variables can be quantified as their covariance. Computing
    this comes down to looking at how far individuals are from the group mean on both
    variables. For example, I might spend more time reading about pigeon flight that
    the average person, and my quality of life score might also be higher than the
    average. Some of my colleagues, on the other hand, don’t care for pigeons for
    some reason (?!), and I can only assume their quality of life is lower than the
    average. This is covariance: when you score high on pigeon interest, you also
    score high on quality of life; but when you score low on pigeon interest, you
    score low on quality of life. Thus, if you were to multiply both distances from
    the group mean, you would end up with a high value. The mean (across all people
    in your sample) of all of these multiplied differences is the covariance.


    Covariance works when two variables are high or low at the same time within each
    participant: multiplying two positive values ends with a positive value but so
    does multiplying two negative values! However, it also works for when one variable
    is high but the other is low (and vice versa) within each participant. In this
    case, the multiplication is of one'
