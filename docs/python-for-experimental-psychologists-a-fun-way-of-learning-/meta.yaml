- md: "## 4.4 Typed Responses\n\nA useful thing about TextBox2 is that it can be used\
    \ not only to present text but also to gather typed responses. It can be useful\
    \ to ask participants to type an open response. For instance, imagine we present\
    \ them with a picture and then ask them to recall everything that they remember\
    \ about that picture. We know how to present a picture (from Chapter 3) but what\
    \ about gathering typed responses? TextBox2 has the attribute editable which indicates\
    \ if the text in the object should be editable by the participant. If set to True,\
    \ the participant will be presented with a textbox that they can edit:\n\n```\n\
    # make some text for feedback\ntextinput = visual.TextBox2(\n    win,\n    text='',\n\
    \    pos=(0, 0),\n    letterHeight=20,\n    alignment='center',\n    editable\
    \ = True\n)\n```\n\nNow, the only thing is that in order for the participant to\
    \ see the text they type dynamically changing, you can't just use core.wait(2)\
    \ to halt the screen; because this literally halts the screen, we wouldn't see\
    \ dynamically changing text. This is another instance where it is important to\
    \ present and update stimuli based on frames. So, start by making an editable\
    \ text stimulus:\n\n```\n# make an editable textbox\ntextinput = visual.TextBox2(\n\
    \    win,\n    text='',\n    pos=(0, 0),\n    letterHeight=20,\n    alignment='center',\n\
    \    editable = True\n)\n\n# set the textbox to draw automatically on every win.flip\n\
    textinput.setAutoDraw(True)\n\n# how many frames do we present for\nnFrames =\
    \ 300\n\n# draw the textinput\nfor frameN in range(nFrames):\n    win.flip()\n\
    ```\n\nWhat's nice about this is because you can dynamically check the text typed\
    \ into the textbox (in this case through checking textinput.text), you can continuously\
    \ check the characteristics of the typed string. For instance, you might want\
    \ to display a character count or check if a keyword has been typed. Let's imagine\
    \ we are looking out for the keyword \"banana\" and you want to change the colour\
    \ of the text to be green if the keyword is typed. Update your code slightly to\
    \ watch for a keyword:\n\n```\n# how many frames do we present for\nnFrames =\
    \ 300\nkeyword = 'banana'\n\n# draw the textinput\nfor frameN in range(nFrames):\n\
    \    # check if the typed input contains the keyword\n    if keyword in textinput.text:\n\
    \        textinput.setColor('green')\n    else:\n        textinput.setColor('white')\n\
    \    win.flip()\n```\n\nHopefully you saw your text turn green once you type the\
    \ word “banana”!\n\n## 4.5 Mouse Responses\n\nAlthough most psychology experiments\
    \ use keyboards for their response modality, there are many neat things about\
    \ mouse responses that can be used to make some very cool experiments. First,\
    \ mouse responses (in PsychoPy) also translate to touch responses on touch screen\
    \ devices. Second, mouse responses not only have click behaviour, but they also\
    \ have trajectories. This means you can make things track the mouse, or store\
    \ the movement paths from the mouse. Third, you can use the mouse to create cool\
    \ interactive effects, such as hover effects. To make an instance of a mouse object,\
    \ we can use the event module:\n\n```\n# make a mouse (it will use win by default)\n\
    mouse = event.Mouse()\n```\n\nThen let’s make a shape stimulus:\n\n```\n# make\
    \ a shape to track the mouse\nsquare = visual.ShapeStim(win,\n    vertices=[[20,\
    \ 20], [-20, 20],\n              [-20, -20], [20, -20]],\n    fillColor='darkred',\n\
    \    size=2,\n    pos=[300,0],\n    lineColor='red')\n```\n\nOK, let’s consider\
    \ how we could make this simple square interact with our mouse.\n\n### 4.5.1 Fetching\
    \ the Current Mouse Position\n\nFetching the current mouse position is easy. You\
    \ can use mouse.getPos(), which will return an (x,y) pair indicating current location\
    \ in the window’s unit space. Try adding:\n\n```\nnFrames = 100\nsquare.setAutoDraw(True)\n\
    \nfor frame in range(nFrames):\n    print(mouse.getPos())\n    win.flip()\n```\n\
    \nHopefully, you saw a pair of (x,y) coordinates returned repeatedly in the Output\
    \ window; this indicates the current mouse position. Now we know we can get the\
    \ mouse position, we could make the square track the mouse. For example:\n\n```\n\
    # set the square to be in the position of the mouse\nfor frame in range(nFrames):\n\
    \    square.setPos(mouse.getPos())\n    win.flip()\n```\n\nAlternatively, we could\
    \ check if the mouse is hovering on something. Try this:\n\n```\nfor frame in\
    \ range(nFrames):\n    if square.contains(mouse.getPos()):\n        square.setColor('green')\n\
    \    else:\n        square.setColor('darkred')\n    win.flip()\n```\n\nThe contains()\
    \ method is something that lives in most stimuli in the visual class; it returns\
    \ True if a given (x,y) coordinate falls within that stimulus' border. In this\
    \ case, we've checked the current mouse location in the square. If yes, we set\
    \ the colour of the square to be green. Otherwise, we set the colour of the square\
    \ to be red.\n\n### 4.5.2 Check the Status of the Mouse Buttons\n\nThere are a\
    \ few different reasons that we might want to check the mouse status. First, your\
    \ mouse will typically have three buttons, a left button, right button, and central\
    \ scroller (which can also be used as a button). We can check the status of these\
    \ at any point using\n\n- mouse.getPressed(): this will return a list of three\
    \ elements indicating if the mouse is currently pressed in 1 or not 0.\n- mouse.isPressedIn(x):\
    \ this will return a binary value indicating if the mouse is currently pressed\
    \ in an object (x) or not.\n\nTogether these can be pretty powerful. At a simple\
    \ level, we could make a trial/loop end on a mouse click:\n\n```\nfor frame in\
    \ range(nFrames):\n    if square.contains(mouse.getPos()):\n        square.setColor('green')\n\
    \    else:\n        square.setColor('darkred')\n    win.flip()\n\n    # end the\
    \ loop early if the mouse is clicked\n    if sum(mouse.getPressed())>0:\n    \
    \    break\n```\n\nNote that unless we reset the colour of the square at the end\
    \ of this loop, it will stay green (because the trial/loop ended with the mouse\
    \ in the square). Following this, we could make a stimulus change location when\
    \ it is clicked, which would be the building blocks for a drag and drop task.\
    \ For instance, try this:\n\n```\nfor frame in range(nFrames):\n    # if the mouse\
    \ is pressed in the square\n    if mouse.isPressedIn(square):\n        # set the\
    \ square to be the location of the mouse\n        square.setPos(mouse.getPos())\n\
    \    win.flip()\n```\n\nThis works! But it is a little clunky, if you move your\
    \ mouse too fast, it can sometimes be possible that your mouse cursor “escapes”\
    \ the shape which makes the dragging behaviour sticky. Instead, let’s try this:\n\
    \n```\n# a boolean to indicate if a drag is currently\n# in process\ndragging\
    \ = False\n\nfor frame in range(nFrames):\n    # if the mouse is pressed in the\
    \ draggable,\n    # drag begins\n    if mouse.isPressedIn(square):\n        dragging\
    \ = True\n\n    # if drag in progress, set the draggable\n    # to mouse location\n\
    \    if dragging:\n        square.setPos(mouse.getPos())\n\n    # if no mouse\
    \ button is pressed in, the drag\n    # is over\n    if sum(mouse.getPressed())==0:\n\
    \        dragging = False\n\n    win.flip()\n```\n\nIn this example, we add a\
    \ bit more code, but it does make the behaviour smoother. Specifically, we use\
    \ isPressedIn() and getPressed() in combination with one another to determine\
    \ (a) when a drag starts (which is when the mouse is pressed in the square) and\
    \ (b) when a drag ends (which is when there are no mouse buttons pressed down\
    \ at all). Remember that getPressed() returns a list of three values, which will\
    \ be [0, 0, 0] when nothing is pressed in (which sums up to 0, or to a value up\
    \ to 3 if buttons are pressed).\n\n### 4.5.4 Check for Mouse Scroll Behaviour\n\
    \nSometimes we might want our participants to be able to scroll a stimulus. To\
    \ do this, we need two things: our stimulus (which will scroll) and our mouse\
    \ (which will do the scrolling). We can fetch the travel of the mouse wheel since\
    \ the last call"
