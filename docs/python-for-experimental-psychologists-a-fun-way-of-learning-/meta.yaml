    Looks cool, right? But not quite cool enough... Let''s make some actual NOISE!


    ```

    # create a bunch of random numbers

    # (with the same length as the sine wave)

    noise = numpy.random.rand(len(sine))

    ```


    ```

    # compare the sinusoid and the noise

    pyplot.plot(sine)

    pyplot.plot(noise)

    pyplot.show()

    ```


    For the next bit, let''s concentrate on the sine wave to learn about the basics
    of digital sounds. If you look at the y-axis, you can see that the sine wave''s
    maximum is 1 and its minimum is -1. That means its amplitude is 1. This is a little
    low for a sound, so you will need to adjust it. Simply multiply the sine by 16383,
    which should be high enough:


    ```

    sine = sine * 16383

    pyplot.plot(x, sine)

    pyplot.show()

    ```


    The wave still looks the same, but the y-axis has changed: the wave''s amplitude
    is a lot higher now! Now turn your attention to the sound''s frequency.


    When you created the x variable, you used NumPy''s arange function. This creates
    a range of numbers between a starting point (0) and an ending point (2*pi), with
    a certain step size. The higher the step size, the fewer points there will be
    in the wave. We call this number of points the amount of **samples**. Let''s see
    what sampling does to a wave''s shape:


    ```

    high = numpy.arange(0, 2*numpy.pi, 0.01)

    mid = numpy.arange(0, 2*numpy.pi, 0.5)

    low = numpy.arange(0, 2*numpy.pi, 2)

    ```


    ```

    pyplot.plot(high, numpy.sin(high))

    pyplot.plot(mid, numpy.sin(mid))

    pyplot.plot(low, numpy.sin(low))

    pyplot.show()

    ```'
