    ''__hash__'', ''__init__'', ''__init_subclass__'', ''__le__'', ''__lt__'',

    ''__module__'', ''__ne__'', ''__new__'', ''__reduce__'', ''__reduce_ex__'',

    ''__repr__'', ''__setattr__'', ''__sizeof__'', ''__slotnames__'', ''__str__'',

    ''__subclasshook__'', ''__weakref__'', ''code'', ''duration'', ''name'', ''rt'',

    ''tDown'']

    ```


    There are a number of methods here that start with an underscore; this is generally
    used by developers to indicate that a method is to be used for internal use, rather
    than by the users. Notably, we see a few attributes that are relevant to us:


    +   - Name: the name of the key that was pressed.

    - rt: the response time of the keypress relative to the last time the clock within
    the Keyboard instance was reset.

    - duration: the duration of the keypress event (i.e. the time from the key-down
    event to the key up event).

    - tDown: the time of the key-down event relative to the global clock.


    Given this information, we know that we can return the name of the key that was
