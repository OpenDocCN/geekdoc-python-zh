  md: '# MAKE SOME NOISE


    In this chapter, you’ll learn how to make a musical instrument out of a joystick
    or game controller. If you don’t have one of those, you can also use the keyboard.
    Although this might seem like a weak excuse to make some noise, it will actually
    be a very good programming exercise. If you also manage to annoy the people around
    you with obnoxious sound, that’s just a bonus!


    Turning your joystick or keyboard into a musical instrument won’t require you
    to be a modern-day MacGyver. Instead, you can write a script that responds to
    a button press by making a sound. That’s not to say this is easy: Writing a script
    that responds to events requires some abstract thinking.


    Before you start with the fun stuff, create a new folder. Within that folder,
    create a new Python script and name it “constants.py”. Open it in an editor to
    define some defaults:


    ```

    # Set the display type to ''pygame''

    DISPTYPE = ''pygame''

    # Make sure that the DISPSIZE matches your monitor resolution!

    DISPSIZE = (1920, 1080)

    ```


    # Do You Have A Joystick?


    First, let’s clarify the terminology. The term “joystick” in a strict sense applies
    to devices that have a pivoting stick that allows users to fly an aeroplane or
    helicopter. In a broader sense, the term “joystick” often also applies to any
    gaming controller. In this chapter, the term “joystick” will refer to this broader
    class of input devices. Joysticks are not only useful for playing computer games
    but can also be used in psychological research.


    A lot of joysticks have two **control sticks** (mini-joysticks) that each cover
    two **axes** (movement directions), a couple of **buttons**, and a **hat**. That’s
    not a fancy top hat, a baseball cap, or something that was knitted by your grandmother.
    For joysticks, a hat is a special button that you can push in four directions.
    If you ever owned a GameBoy, you might recall the four-point button that controlled
    your movement. That button was a “hat”.


    DOI: 10.4324/9781003174332-8'
