    The variables t1 and t2 each contain timestamps in tracker time. So now you know
    when events happened, but you don''t know what pupil size samples correspond with
    those timestamps yet. For that, you need to know how to index the data[0][''size'']
    array. To find out which samples you need, you can use data[0][''trackertime'']
    to check at which index numbers your timestamps occur. These index numbers can
    then be used to select samples from data[0][''size'']. With NumPy''s where function,
    you can find the index numbers for which a certain logical statement is True.
    Type this into the Interpreter:


    ```

    numpy.where(data[0][''trackertime''] == t1)

    ```


    The output format is a bit weird: it''s a tuple that contains a NumPy array, which
    in turn contains all indices for which data[0][''trackertime'']==t1. To store
    this value, use the following in the Interpreter:


    ```

    t1i = numpy.where(data[0][''trackertime''] == t1)[0][0]

    t2i = numpy.where(data[0][''trackertime''] == t2)[0][0]

    ```


    The variables t1i and t2i now refer to the index number of sample arrays (''time'',
    ''trackertime'', ''x'', ''y'', and ''size'') that correspond to t1 (baseline start)
    and t2 (monitor change). You can use these indices to select the baseline and
    the pupil response to a monitor change. Type the following in the Interpreter:


    ```

    baseline = data[0][''size''][t1i:t2i]

    trace = data[0][''size''][t2i:]

    ```


    It was mentioned before that the pupil size is in arbitrary units. This is of
    little use, because you don''t know what they mean. In theory, you could recalculate
    the arbitrary units to millimetres, but only if you can compare your data with
    data recorded from an artificial pupil in the same setup. In that case, you would
    know the exact size of the artificial pupil in millimetres. Because you would
    measure its size in arbitrary units, you would know what the mapping between millimetres
    and arbitrary units was.


    However, you don''t have to use an artificial eye. Pupil size is known to fluctuate
    over time and usually decreases quite dramatically during the course of most (boring)
    experiments. Therefore, researchers often calculate the proportional change in
    pupil size within each trial. This is the pupil size divided by the average (or
    median) pupil size during a baseline period. It reflects the relative increase
    or decrease in pupil size compared to the baseline. You can calculate this by
    typing the following line in the Interpreter and hitting Enter.


    ```

    prop_trace = trace / numpy.median(baseline)

    ```


    Now plot this trace by typing the following lines into the Interpreter. The ''-''
    in the first line indicates that the data should be drawn as a line.


    ```

    pyplot.plot(prop_trace, ''-'')

    pyplot.show()

    ```


    That''s your first pupil trace; go brag about it on social media!'
