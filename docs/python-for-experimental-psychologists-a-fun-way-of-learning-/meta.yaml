    \ | --- |\n| experimental | conditions.xlsx | 1 |\n| neutral | neutral.xlsx |\
    \ 0 |\n\n### 5.6.1 Randomised Block Designs\n\nWhen considering blocked designs\
    \ in experiments, we could consider either a randomised block design (where we\
    \ present all participants with a neutral block and an experimental block – in\
    \ a totally random order) or a counterbalanced design (where we present half our\
    \ participants with the experimental block followed by the neutral block, and\
    \ half the opposite block order). Let's begin with a randomised block design,\
    \ since this is the simpler of the two.\n\nThe first step would be to import the\
    \ blocks spreadsheet as you would a normal spreadsheet:\n\n```\n# import spreadsheet\
