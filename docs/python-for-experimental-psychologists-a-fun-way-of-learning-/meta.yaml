    \ 有一个 `editable` 属性，它指示对象中的文本是否应由参与者编辑。如果设置为 True，参与者将看到一个可以编辑的文本框：\n\n```\n#\
    \ 为反馈制作一些文本\ntextinput = visual.TextBox2(\n    win,\n    text='',\n    pos=(0,\
