    \ `None` 不是数值。这意味着你应该在将键变量的值转换为整数之前，检查它是否不是 `None`：\n\n```python\n    # 检查是否有键被按下\n\
    \    # （这会产生一个非 None 的值）\n    if key is not None:\n        # 将键名（字符串）转换为整数\n \
    \       key = int(key)\n    # 返回键名（或 None）\n    return key\n```\n\n这为下一步奠定了基础：当按键被按下时发出声音！\n\
    \n## 在按钮按下时播放声音\n\n乐器发出的声音由一个主音及其泛音组成，它们的相对贡献决定了声音的音色（也称为音质）。本书有点“俗气”，将完全忽略音色的概念。相反，我们将使用纯音。这些是只有主音，没有谐波或其他泛音的声音。\n\
    \n如你所知，声音是空气（或其他介质）的振动。声音可以用它们的频率来表征：每秒发生的振动次数。下面列出了几个音符的频率（四舍五入到最接近的整数）。你可以使用它们来创建可以播放特定音符的\
    \ Sound 实例。\n\n| 主音 | 频率 (Hz) |\n|---|---|\n| A4 | 440 |\n| B4 | 494 |\n| C5 |\
    \ 523 |\n| D5 | 587 |\n| E5 | 659 |\n| F5 | 698 |\n| G5 | 784 |\n| A5 | 880 |\n\
    | B5 | 988 |\n\n让我们从一个单音开始：A4 或 440 赫兹。你可以通过使用 Sound 类的 `freq` 关键字参数来指定这个频率。纯音是正弦波，因此在创建\
    \ Sound 实例时，你应该使用正弦波振荡器（由 `osc` 关键字参数指定）。你可以使用 `length` 关键字参数以毫秒为单位指定声音的持续时间。此外，你可以使用\
    \ `attack` 和 `decay` 关键字以毫秒为单位指定淡入和淡出时间。10 毫秒的 attack 意味着声音将需要 10 毫秒达到其峰值音量，而\
    \ 10 毫秒的 decay 意味着声音将需要 10 毫秒从峰值音量降至无音量。\n\n举个例子，想象一个长度为 100 毫秒、attack 为 10 毫秒、decay\
    \ 为 10 毫秒的声音。声音将需要 10 毫秒达到全音量，然后以全音量播放 80 毫秒，最后在 10 毫秒内降至无音量。\n\n现在在你的脚本中初始化一个\
    \ Sound 实例，以创建持续时间为 250 毫秒的 A4 音符：\n\n```python\na4 = Sound(osc='sine', freq=440,\
    \ length=250,\n           attack=10, decay=10)\n```\n\n下一步是监控按钮按下事件，然后在发生时播放声音。`while`\
    \ 循环非常适合这个目的！正如你可能记得的，`while` 循环可以无限运行。你可以通过将其关联的布尔变量从 `True` 翻转为 `False` 来使其停止。你可以在脚本中使用以下\
    \ `while` 循环：\n\n```python\n# 运行一个 while 循环直到停止\nstop = False\nwhile not stop:\n\
    ```\n\n在循环内部，你应该检查是否有按钮被按下。然后，你应该根据是否有按钮被按下，决定是否播放声音。你可以通过使用之前定义的 `get_input`\
    \ 函数来实现这一点：\n\n```python\n    # 检查是否有按钮被按下\n    number = get_input(dev)\n    #\
    \ 如果有按钮被按下，number 将不是 None\n    if number is not None:\n        # 如果有按钮被按下，播放声音\n\
    \        a4.play()\n```\n\n这个循环可能会永远运行下去，因为你从未指定它应该何时停止！为了修复这个问题，你可以让循环在按下 0 号按钮时停止。将\
    \ `while` 循环的内容更改为以下内容：\n\n```python\n    # 检查是否有按钮被按下\n    number = get_input(dev)\n\
    \    # 如果有按钮被按下，number 将不是 None\n    if number is not None:\n        # 检查 number\
    \ 是否为 0\n        if number == 0:\n            # 如果 number 为 0，则使 while 循环停止\n\
    \            stop = True\n        # 如果 number 不是 0，则播放声音\n        else:\n    \
    \        a4.play()\n```\n\n这应该就可以了！你的 `while` 循环将不断循环执行缩进的代码。这段代码将首先使用 `get_input`\
    \ 函数检查是否有按钮被按下。如果没有键被按下，它会将 `number` 变量设置为 `None`，否则设置为被按下的按钮编号。第一个 `if` 语句将首先检查\
    \ `number` 变量是否不是 `None`。如果是 `None`，代码将直接进入 `while` 循环的下一次迭代。如果 `number` 不是 `None`，下一个\
    \ `if` 语句将检查 number 是否为 0。如果是，那么 `stop` 变量将被设置为 `True`，这将使 `while` 循环在下一次迭代开始时停止。如果\
    \ `number` 不是 0，则播放声音。\n\n在尝试运行此代码之前，还有一件最后的事情要做。关闭 Display 至关重要，否则当你的脚本停止运行时，它可能会保持开启状态：\n\
    \n```python\n# 关闭 Display\ndisp.close()\n```\n\n现在运行脚本，按下按钮制造一些噪音吧！（按下编号为 0 的按钮以停止。）\n\
    \n## 意想不到的乐器\n\n你在上一章创建的脚本可能很快就会让你感到厌倦，因为它只能产生一个音符。为了使其更有趣，你可以修改脚本，使其为每个按钮播放不同的音符。\n\
    \n为此，你应该首先创建一堆不同的 Sound。最快的方法是创建一个包含所有你想要使用的声音频率的集合。你可以在一个字典中定义这些频率，使用按钮编号作为字典的键。用以下代码替换你在上一章定义\
    \ `a4` 变量的行：\n\n```python\n# 创建一个包含每个按钮频率的字典\nfreqs = {1:440, 2:494, 3:523, 4:587,\
    \ 5:659,\n         6:698, 7:784, 8:880, 9:988}\n```\n\n现在你已经指定了所有频率，是时候为每个频率创建一个\
    \ Sound 实例了。为此，你可以使用一个 `for` 循环来遍历 `freqs` 字典的键。你可以使用字典的 `keys` 方法生成所有键名的列表。存储\
    \ Sound 实例的最佳方式是使用一个与 `freqs` 字典具有相同键的字典。将以下代码添加到你的脚本中，直接放在定义 `freqs` 变量的行之后：\n\
    \n```python\n# 创建一个用于存放声音的空字典\nsounds = {}\n# 遍历 freqs 字典的键\nfor button in freqs.keys():\n\
    \    # 使用正确的频率创建一个新的 Sound 实例\n    sounds[button] = Sound(osc='sine', freq=freqs[button],\n\
    \                          length=250, attack=10, decay=10)\n```\n\n现在只需要更改一处就能让你的脚本工作。当前脚本仍然引用\
    \ `a4` 变量，尽管你已经用 `sounds` 变量替换了它。要修复此问题，请将 `a4.play()` 行替换为以下内容：\n\n```python\n\
    \    sounds[number].play()\n```\n\n这使用被按下的按钮编号从 `sounds` 字典中选择正确的 Sound 并播放它。运行你的脚本来测试一下吧！"
