  md: 'Some joysticks will also carry “balls”. (In a previous edition, this parenthetical
    hinted at how some people might see the humour in “joysticks with balls” but then
    someone left a review on the website of a major web retailer to point out how
    this book and its author were “immature”. So now I feel self-conscious about making
    childish and unprofessional jokes.) The concept behind these is very similar to
    that of an old computer mouse: You can roll a ball, and the joystick will convert
    the roll into a movement in a two-dimensional plane.


    Another cool thing about joysticks is that some offer a “rumble” feature. It allows
    programmers to make the controller vibrate to give vibrotactile feedback. You
    can find this feature in games, for example if you ram a car or shoot a gun; but
    you can also use it to give feedback to participants in your psychological experiment.


    In this chapter, the focus is on the joystick’s buttons. If you don’t have a joystick,
    you can substitute the buttons with the number keys.


    # Using a Joystick


    Programming for a joystick is easier than you might think, and it is very similar
    to using the mouse or a keyboard through PyGaze or PsychoPy. There are a few libraries
    that offer excellent functionality for joysticks, including PyGame, PyGaze, and
    PsychoPy. In this chapter, PyGaze is used for no particular reason at all. It’s
    a nice library, and it offers everything you need for this project to work. Make
    sure you install it if you haven’t yet, by running the following in a terminal
    or command prompt:


    ```

    python -m pip install python-pygaze

    ```


    In Python, you can import the Joystick class from PyGaze’s joystick module:


    ```

    from pygaze.joystick import Joystick

    ```


    You could then initialise a joystick object called js:


    ```

    js = Joystick()

    ```


    PyGaze will automatically detect and engage the first joystick attached to your
    computer. Obviously, this only works if one is actually plugged in. After initialising
    the joystick, you can poll the buttons with a single function:


    ```

    js.get_joybuttons()

    ```


    You can specify a list of allowed buttons and a response timeout in milliseconds:


    ```

    button, prestime = js.get_joybuttons(joybuttonlist=[0,4,6], \n    timeout=3000)

    ```


    The get_joybuttons method will return which button was pressed and at what time
    it was pushed. In the above example, button is an integer that indicates what
    button was'
