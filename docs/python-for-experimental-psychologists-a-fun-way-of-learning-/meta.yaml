- img_proc: true
  md: 'After showing the image, you should clear the display. You can do this by calling
    its `fill` method to fill the Display with the current background colour. Then
    call its `show` method to update the monitor and make sure to record the image''s
    offset in the log file:


    ```

    # Clear the Display

    disp.fill()

    # Update the monitor to show a blank screen

    disp.show()

    # Log the image offset

    tracker.log(''image_offset'')

    ```


    That''s the end of the trial. You can pause the recording of gaze data by calling
    the tracker instance''s `stop_recording` method.


    ```

    # Log the end of the trial

    tracker.log(''TRIALEND'')

    # Pause recording

    tracker.stop_recording()

    ```


    At the end of your experiment script, you might want to notify the participant
    that they are finished. You can recycle the instructions Screen for this:


    ```

    # Clear the instructions Screen

    inscr.clear()

    # Write a new message

    inscr.draw_text(text=''All done!'', fontsize=24)

    # Feed the new message to the Display

    disp.fill(inscr)

    # Show the message

    disp.show()

    # Wait until the participant presses any key

    # (Allowing them to read at their own pace)

    kb.get_key()

    ```


    After the message, make sure to close the connection to the eye tracker by calling
    the Eye-Tracker instance''s `close` method:


    ```

    # Close the connection to the eye tracker

    # (This will also close the log file!)

    tracker.close()

    ```


    The final thing to do is to close the Display:


    ```

    # Close the Display

    disp.close()

    ```


    If you want to, you can run the current script to show a single image and record
    your own gaze data. In the next section, you''ll learn how to modify the current
    script to show all your images in one long slide show.'
