    # 8.2.3 Screens


    Time to start coding the experiment. You will need the Display class to interact
    with the monitor, the Screen class to create stimuli, the Keyboard class to monitor
    key presses, the EyeTracker class to interact with the eye tracker, and the libtime
    module to tell the time. You will also need the os module to deal with the image
    files, and some of the constants you defined. In the same folder as your constants.py
    script, create a new Python script and name it ‘experiment.py’. Start by importing
    the classes you need:


    ```

    import os

    from constants import *

    from pygaze.display import Display

    from pygaze.screen import Screen

    from pygaze.keyboard import Keyboard

    from pygaze.eyetracker import EyeTracker

    import pygaze.libtime as timer

    ```


    Now, to get things started, you can initialise a Display and a Keyboard instance:


    ```

    # Initialise a Display to interact with the monitor

    disp = Display()


    # Initialise a Keyboard to collect key presses

    kb = Keyboard(keylist=None, timeout=None)

    ```


    In the experiment, you only need a few different Screens: one with task instructions,
    one with a central fixation mark, and one to draw the images on.

    Let’s start with the instructions:


    ```

    # Create a Screen for the image task instructions

    inscr = Screen()

    inscr.draw_text(text=''Please look at the images. \n\n(Press any key to begin)'',
    fontsize=24)

    ```


    Next is the fixation Screen. You can show this between the images, to allow people
    some rest. It also standardises the starting fixation position. People will typically
    start with a central gaze when the images are preceded by a central fixation mark.


    ```

    # Create a Screen with a central fixation cross

    fixscr = Screen()

    fixscr.draw_fixation(fixtype=''cross'', diameter=8)

