    \n```python\n# loop through the list of letters to draw them\nfor letter in myLetters:\n\
    \    letter.draw()\n```\n\n就这样，大量刺激被一次性绘制出来。尝试使用更大的数字，希望你现在能看到循环在减少制作多个刺激所需时间方面的巨大价值。\n\
    \n## 3.6.5 元素数组刺激\n\n如果你尝试了前面的例子，并使用了非常大的刺激数量，你可能已经注意到这给你的计算机带来了一些压力。也许你甚至在输出中收到了关于丢帧的警告！这第一种方法当然是循环的一个很好的入门，它通常适用于数量较少且多样的刺激。然而，有一种更有效的方式来显示一组刺激。\n\
    \n这种方法是使用 `ElementArrayStim`，它允许你指定多个刺激同时绘制，而不会丢帧。其工作原理是通过指定大量形状相同（例如，一个正方形）但在某些参数（如方向、大小或位置）上有所变化的对象。你可以指定一个特定的形状或图像作为纹理。例如：\n\
    \n```python\n# specify the number of stimuli to use\nnStim = 100\n# generate a\
    \ list of random coordinates\nxys = []\nfor i in range(nStim):\n    xys.append([randint(-200,\
    \ 200),\n                randint(-200, 200)])\n```\n\n```python\n# make an element\
    \ array stim\nmultiStim = visual.ElementArrayStim(win,\n    elementTex='beach.jpg',\n\
    \    elementMask=None,\n    nElements=nStim,\n    sizes=[20, 20],\n    xys=xys)\n\
    ```\n\n这将创建一个包含100张海滩图片的刺激数组，每张图片都在随机位置。你可以通过一次调用 `multiStim.draw()` 来绘制所有100张图片。更酷的是，你可以一次性更改\
    \ `ElementArrayStim` 中所有元素的属性！例如，尝试：\n\n```python\n# repeat 5 times\nfor i in\
    \ range(5):\n    # list of random values ranging from 1\n    # to and 360, with\
    \ length nStim\n    oris = randint(1,360,nStim)\n\n    # use the list to set the\
    \ orientations\n    # of elements in multiStim\n    multiStim.setOris(oris)\n\n\
    \    # draw the stimulus\n    multiStim.draw()\n    win.flip()\n    core.wait(1.0)\n\
    ```\n\n如果一切顺利，你看到了许多海滩，并且每个海滩连续改变了五次方向。如果你想要更混乱的显示，可以将重复次数改为50，等待时间改为0.1。\n\n\
    如果你是一位对随机点运动图感兴趣的视觉科学家，`ElementArrayStim` 可能对你来说是一个很有吸引力的类。你会很高兴地知道，`DotStim`\
    \ 类就是为此目的而设计的，它允许你控制点运动的更多方面。\n\n## 3.7 通过帧来计时视觉刺激\n\n我们提到过，我们呈现刺激的持续时间本质上受到显示器帧率的限制；呈现半帧是不可能的！因此，`core.wait()`\
