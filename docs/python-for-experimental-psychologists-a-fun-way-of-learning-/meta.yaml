- md: "## 6 ANALYSING BEHAVIOURAL DATA\n\nNow that you have a nice dataset from Chapter\
    \ 5, it’s time to learn how to analyse it. Almost all analyses go through the\
    \ same steps: reading raw data, reducing it to a more usable format, computing\
    \ statistics (calculating means, standard deviations, maybe fitting some models),\
    \ and making pretty graphs.\n\nIn this chapter, you will start by analysing the\
    \ behavioural data from your own experiment. In the next chapter, you will turn\
    \ to trace analyses (e.g. for pupillometry, electroencephalography, grip force,\
    \ movement velocity).\n\n### 6.1 Analysis Plan\n\nYou can get a dataset by downloading\
    \ the example data file from the companion website. Your focus should be on the\
    \ difference between the valid (cue and target on the same location) and the invalid\
    \ (cue and target on different locations) conditions. You have two variables of\
    \ interest: reaction time and accuracy.\n\nBefore starting to code, you should\
    \ always take a step back to think things through. In this analysis, you’ll need\
    \ to extract data from a text file. You can read this data line by line, with\
    \ each line representing a single trial. That’s not ideal: it would be easier\
    \ to have the data organised per variable rather than per trial so that you can\
    \ compute e.g. a mean over the whole variable. Hence, you need to convert the\
    \ data that is organised with an array per variable. For example, all reaction\
    \ times would then be in one long list.\n\nOnce you have a single array for each\
    \ variable, you can start selecting trials. In your cueing task, you have a “validity”\
    \ variable for each trial. This was 1 (valid) or 0 (invalid) and can thus be used\
    \ to select all valid trials. You also have an “accuracy” variable, which was\
    \ 1 (correct) or 0 (incorrect), and can thus be used to select all correct trials.\
    \ You could combine these to compute the average response times for valid and\
    \ correct trials and compare it with the averages for invalid and correct trials.\n\
    \nAfter selecting the correct trials, you can calculate descriptive statistics:\
    \ mean, standard deviation, and standard error of the mean. You could also opt\
    \ for calculating a median instead of a mean (more on that later).\n\nDOI: 10.4324/9781003174332-9\n\
    \nOnce you have calculated the means (for reaction times and accuracy) per condition\
    \ (valid and invalid), you can average these over the entire sample (i.e. your\
    \ group of participants). In addition, you could do statistical tests to see whether\
    \ there is a difference between the conditions.\n\nAfter calculating the group\
    \ mean and standard error of the mean, you can use these values to draw a nice\
    \ graph. Additionally, you can add the results of your statistics to show whether\
    \ there is a statistically significant difference.\n\n### 6.2 Extracting Data\n\
    \nIt’s good to separate your analysis completely from your experiment, in terms\
    \ of code organisation. Start by creating a new folder, and a new script that\
    \ you could name **analysis.py**. In your new folder, create a folder called **data**\
    \ and copy your data file(s) to the new data folder.\n\nNow open analysis.py in\
    \ an editor and write the following:\n\n```python\nimport os\nimport numpy\nfrom\
    \ matplotlib import pyplot\nfrom scipy.stats import ttest_rel\n```\n\nBy now,\
    \ you should already be familiar with NumPy. If you read the *Make Some Noise*\
    \ chapters, you will also have seen Matplotlib. You can use NumPy to read and\
    \ process your data, Matplotlib to plot them and `ttest_rel` from SciPy’s `stats`\
    \ module to do a related-samples *t*-test.\n\nThe other module, `os`, is useful\
    \ to do stuff that relates to the operating system. This includes folder and file\
    \ management, which is very useful when you’re dealing with data files. Let’s\
    \ start by making your script recognise the current folder:\n\n```python\n# get\
    \ the path to the current folder\nDIR = os.path.dirname(os.path.abspath(__file__))\n\
    ```\n\nThat looks confusing, so let’s break it down. `__file__` is a special variable.\
    \ You don’t have to create it, Python does that for you. It contains a **path**\
    \ to the Python script file. This could be, for example, ‘C:\\example\\analysis.py’.\
    \ The inner (and thus the first!) function you use on `__file__` is `abspath`,\
    \ which transforms the path into an absolute path. Paths can be defined in two\
    \ ways: relative and absolute. A relative path would be “the folder that contains\
    \ the folder that this script is in” (“.\\this_script.py”), whereas absolute is\
    \ “C:\\top_level\\second_level\\this_script.py”. You can’t assume `__file__` refers\
    \ to an absolute path, so you use `abspath` to ensure that you’re not dealing\
    \ with a relative path.\n\nThe second function is `dirname`. This takes the path\
    \ to a file and strips the file’s name out of it. What you are left with is the\
    \ path to the folder that contains the script file. If the file path was ‘C:\\\
    example\\analysis.py’, `dirname` will turn that into ‘C:\\example’.\n\nWhy do\
    \ you do this? Well, you need the path to the data folder! You can construct this\
    \ by combining the name to the script’s folder and ‘data’:\n\n```python\nDATADIR\
    \ = os.path.join(DIR, 'data')\n```\n\nThe join function takes all individual strings\
    \ that you pass and turns them into a path that makes sense to your operating\
    \ system. If your directory was ‘C:\\example’, the above line will turn that into\
    \ ‘C:\\example\\data’.\n\nTo construct the name of your data file, you can use\
    \ the same function:\n\n```python\n# construct the name of your data file\ndatafile\
    \ = os.path.join(DATADIR, 'example.txt')\n```\n\nChange ‘example.txt’ to the name\
    \ of your own data file (you placed it in the data folder earlier). Now that you\
    \ have the path to your data file, you can finally load its contents:\n\n```python\n\
    # load the raw contents of the data file\nraw = numpy.loadtxt(datafile, dtype=str,\
    \ unpack=True)\n```\n\nThe loadtxt function takes the contents of a file, which\
    \ is one big string, and parses this. Parsing means to analyse a string, in this\
    \ case to extract relevant information (data in rows and columns). loadtxt needs\
    \ the name of the file that you want to read, for obvious reasons. The first keyword\
    \ argument you pass is dtype, which specifies the data type. You set it to str\
    \ (for ‘string’), because some of the data in your file is formatted as a string\
    \ (the header, for example). Choosing a numeric data type would result in errors\
    \ with this string content. This also means that all numbers in your data file\
    \ will be loaded as strings, but you can fix this later on.\n\nThe second keyword\
    \ you passed is unpack, which tells loadtxt to transpose the data in your file.\
    \ This means that your data is rotated by 90 degrees. The result is that your\
    \ data’s columns become rows and rows become columns. This means that your data\
    \ is no longer ordered per trial (as in the data file’s lines), but per variable.\
    \ So all reaction times are in one array, and all accuracies in another, and so\
    \ on.\n\nRun the script within your Editor, to an interpreter. In Spyder, open\
    \ a new interpreter: click ‘Consoles’ in the menu, then click ‘New console’. Now\
    \ click ‘Run’ in the menu, then ‘Run’ to execute in the current Python interpreter.\
    \ In IDLE, select ‘Run’ in the menu, then ‘Run Module’.\n\nNow, in the interpreter\
    \ (=console), type raw and press Enter. You should see a NumPy array. Now type\
    \ raw[0] and press Enter. This should also print a NumPy array (the first within\
    \ the variable raw) that contains the string ‘fixonset’ and then a whole bunch\
    \ of numbers. These are the timestamps of the onset of the fixation screen in\
    \ each trial. Finally, type raw[11] and press Enter. This prints a single NumPy\
    \ array with the string ‘RT’ and the reaction times for all trials.\n\nThe current\
    \ format is a bit unwieldy: a single NumPy array that contains 12 other NumPy\
    \ arrays (one for each variable you logged in the experiment). The most annoying\
    \ thing is that the name of each variable is embedded among values in each NumPy\
    \ array.\n\nSo let’s think of a better format: how about a dict, with an informative\
    \ key for every variable that you logged? Something like:\n\n```python\ndata =\
    \ {'fixonset':array(['5485', '9575', ..., '1188518', '1191807'],\n    ...,\n \
    \   'RT':array(['690', '748', ..., '689', '689'])}\n```"
  mdcn: "## 6 分析行为数据\n\n既然你已经从第5章获得了良好的数据集，现在是时候学习如何分析它了。几乎所有分析都遵循相同的步骤：读取原始数据，将其转换为更可用的格式，计算统计量（计算均值、标准差，可能还要拟合一些模型），以及制作漂亮的图表。\n\
    \n在本章中，你将首先分析自己实验的行为数据。在下一章中，你将转向轨迹分析（例如，用于瞳孔测量、脑电图、握力、运动速度）。\n\n### 6.1 分析计划\n\
    \n你可以通过从配套网站下载示例数据文件来获取数据集。你的重点应该放在有效条件（线索和目标在同一位置）和无效条件（线索和目标在不同位置）之间的差异上。你有两个感兴趣的变量：反应时间和正确率。\n\
    \n在开始编写代码之前，你应该总是退一步，把事情想清楚。在这个分析中，你需要从文本文件中提取数据。你可以逐行读取这些数据，每一行代表一个单独的试次。这并不理想：按变量而不是按试次来组织数据会更容易，这样你就可以计算整个变量的均值等。因此，你需要将数据转换为按变量组织的数组。例如，所有的反应时间将放在一个长列表中。\n\
    \n一旦你为每个变量获得了一个数组，你就可以开始选择试次了。在你的线索任务中，每个试次都有一个“有效性”变量。这个变量是1（有效）或0（无效），因此可以用来选择所有有效的试次。你还有一个“正确率”变量，它是1（正确）或0（错误），因此可以用来选择所有正确的试次。你可以将这些结合起来，计算有效且正确试次的平均反应时间，并将其与无效且正确试次的平均值进行比较。\n\
    \n选择正确的试次后，你可以计算描述性统计量：均值、标准差和均值的标准误。你也可以选择计算中位数而不是均值（稍后会详细介绍）。\n\nDOI: 10.4324/9781003174332-9\n\
    \n一旦你计算出每个条件（有效和无效）的均值（反应时间和正确率），你就可以在整个样本（即你的参与者组）中对这些值进行平均。此外，你可以进行统计检验，看看条件之间是否存在差异。\n\
    \n计算出组均值和均值的标准误后，你可以使用这些值来绘制漂亮的图表。此外，你可以添加统计结果，以显示是否存在统计学上的显著差异。\n\n### 6.2 提取数据\n\
    \n在代码组织方面，最好将你的分析与实验完全分开。首先创建一个新文件夹，以及一个新脚本，你可以将其命名为**analysis.py**。在你的新文件夹中，创建一个名为**data**的文件夹，并将你的数据文件复制到新的data文件夹中。\n\
    \n现在在编辑器中打开analysis.py并编写以下内容：\n\n```python\nimport os\nimport numpy\nfrom matplotlib\
    \ import pyplot\nfrom scipy.stats import ttest_rel\n```\n\n到现在，你应该已经熟悉NumPy了。如果你阅读了*制造一些噪音*章节，你也会看到Matplotlib。你可以使用NumPy来读取和处理你的数据，使用Matplotlib来绘制它们，并使用SciPy的`stats`模块中的`ttest_rel`来进行相关样本*t*检验。\n\
    \n另一个模块`os`对于执行与操作系统相关的操作非常有用。这包括文件夹和文件管理，当你处理数据文件时非常有用。让我们从让你的脚本识别当前文件夹开始：\n\n\
    ```python\n# 获取当前文件夹的路径\nDIR = os.path.dirname(os.path.abspath(__file__))\n```\n\
    \n这看起来很令人困惑，所以让我们分解一下。`__file__`是一个特殊变量。你不需要创建它，Python会为你创建它。它包含指向Python脚本文件的**路径**。例如，这可能是‘C:\\\
    example\\analysis.py’。你对`__file__`使用的第一个（因此也是最内层的！）函数是`abspath`，它将路径转换为绝对路径。路径可以用两种方式定义：相对路径和绝对路径。相对路径是“包含此脚本所在文件夹的文件夹”（“.\\\
    this_script.py”），而绝对路径是“C:\\top_level\\second_level\\this_script.py”。你不能假设`__file__`指的是绝对路径，所以你使用`abspath`来确保你处理的不是相对路径。\n\
    \n第二个函数是`dirname`。它接受一个文件路径，并从中去除文件名。你剩下的是包含脚本文件的文件夹的路径。如果文件路径是‘C:\\example\\\
    analysis.py’，`dirname`会将其转换为‘C:\\example’。\n\n为什么这样做？嗯，你需要数据文件夹的路径！你可以通过组合脚本文件夹的名称和‘data’来构建它：\n\
    \n```python\nDATADIR = os.path.join(DIR, 'data')\n```\n\njoin函数接受你传递的所有单独字符串，并将它们转换为对你的操作系统有意义的路径。如果你的目录是‘C:\\\
    example’，上面的行会将其转换为‘C:\\example\\data’。\n\n要构建数据文件的名称，你可以使用相同的函数：\n\n```python\n\
    # 构建数据文件的名称\ndatafile = os.path.join(DATADIR, 'example.txt')\n```\n\n将‘example.txt’更改为你自己数据文件的名称（你之前已将其放入data文件夹中）。现在你有了数据文件的路径，终于可以加载其内容了：\n\
    \n```python\n# 加载数据文件的原始内容\nraw = numpy.loadtxt(datafile, dtype=str, unpack=True)\n\
    ```\n\nloadtxt函数接受文件的内容（一个大字符串）并对其进行解析。解析意味着分析字符串，在这种情况下是提取相关信息（行和列中的数据）。loadtxt需要你想要读取的文件的名称，这是显而易见的。你传递的第一个关键字参数是dtype，它指定数据类型。你将其设置为str（代表‘string’），因为你文件中的一些数据被格式化为字符串（例如，标题）。选择数字数据类型会导致此字符串内容出错。这也意味着你数据文件中的所有数字都将作为字符串加载，但你可以稍后修复这个问题。\n\
    \n你传递的第二个关键字是unpack，它告诉loadtxt转置文件中的数据。这意味着你的数据旋转了90度。结果是你的数据的列变成行，行变成列。这意味着你的数据不再按试次排序（如数据文件中的行），而是按变量排序。因此，所有的反应时间在一个数组中，所有的正确率在另一个数组中，依此类推。\n\
    \n在你的编辑器中运行脚本，进入解释器。在Spyder中，打开一个新的解释器：点击菜单中的‘Consoles’，然后点击‘New console’。现在点击菜单中的‘Run’，然后点击‘Run’在当前Python解释器中执行。在IDLE中，选择菜单中的‘Run’，然后点击‘Run\
    \ Module’。\n\n现在，在解释器（=控制台）中，输入raw并按回车键。你应该看到一个NumPy数组。现在输入raw[0]并按回车键。这应该也会打印一个NumPy数组（变量raw中的第一个数组），其中包含字符串‘fixonset’和一整串数字。这些是每个试次中注视屏开始的时间戳。最后，输入raw[11]并按回车键。这会打印一个单独的NumPy数组，其中包含字符串‘RT’和所有试次的反应时间。\n\
    \n当前的格式有点笨重：一个单独的NumPy数组包含12个其他的NumPy数组（每个对应你在实验中记录的一个变量）。最烦人的是，每个变量的名称嵌入在每个NumPy数组的值中。\n\
    \n所以让我们想一个更好的格式：一个字典怎么样，每个你记录的变量都有一个信息丰富的键？类似这样：\n\n```python\ndata = {'fixonset':array(['5485',\
    \ '9575', ..., '1188518', '1191807'],\n    ...,\n    'RT':array(['690', '748',\
    \ ..., '689', '689'])}\n```"
