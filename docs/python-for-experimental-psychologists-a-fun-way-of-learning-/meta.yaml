- md: "When the for loop is completed, you are left with two lists that contain all\
    \ trials for trials with black-to-white and white-to-black monitor changes. Because\
    \ NumPy arrays are easier to work with, it would be good to convert these lists\
    \ to NumPy arrays. You can do this with NumPy’s array function. Add the following\
    \ code at the end of analysis.py, **without any indentation**:\n\n```\n# convert\
    \ lists to NumPy arrays\ntraces['black'] = numpy.array(traces['black'])\ntraces['white']\
    \ = numpy.array(traces['white'])\n```\n\nThere are a few cool things you can do\
    \ now that the lists of traces are turned into arrays. The first is to calculate\
    \ the average trace. For this, it is important to understand the way in which\
    \ your traces are stored. They are in a multi-dimensional NumPy array, with the\
    \ first axis being all trial numbers and the second being all sample numbers.\
    \ To calculate the average trace, you should average over all trials, but not\
    \ over all timepoints. That is you have to average each trial’s timepoint 1 and\
    \ each trial’s timepoint 2, all the way to each trial’s timepoint 2,000. The array\
    \ that contains all 2,000 of these averages is the **average trace**.\n\nUsing\
    \ NumPy, you don’t have to calculate 2,000 averages individually. Instead, you\
    \ can simply use the mean function’s axis keyword to indicate that you want to\
    \ calculate the averages of all points in the first dimension of your trace array.\
    \ Example:\n\n```\nnumpy.mean(traces['black'], axis=0)\n```\n\nThis produces an\
    \ average trace just like the one discussed above. The trace has 2,000 values,\
    \ each of which is an average of all samples at an index. For example, the value\
    \ at index 5 (that’s the sixth value!) is the average of all black trials’ sixth\
    \ samples. This average trace characterises the average pupillary light response\
    \ to a light-to-dark transition of the computer monitor.\n\nYou can use NumPy’s\
    \ std function in the same way:\n\n```\nnumpy.std(traces['black'], axis=0)\n```\n\
    \nInstead of the average, this gives you the standard deviation of all traces.\
    \ If you divide this trace by the square root of the number of trials, you end\
    \ up with the standard error of the mean for each timepoint. This tells you roughly\
    \ how reliable your estimate of the average is across time. This should be relatively\
    \ constant, so seeing large deviations at some points might require a closer look\
    \ at your data!\n\nThe len function can tell you how much trials there are in\
    \ each array. As mentioned before, by dividing the standard deviation by the square\
    \ root of the number of trials, you can calculate the standard error of the mean.\
    \ Add the following code to your analysis.py, to calculate the average traces\
    \ of both the black and white condition and their standard errors. As per usual,\
    \ you can store these in a dict for easy access:\n\n```\n# create an empty dict\
    \ to contain mean and SEM\navgs = {'black':{}, 'white':{}}\n# loop through both\
    \ conditions\nfor con in ['black', 'white']:\n    # calculate the number of trials\
    \ in this condition\n    n_trials = len(traces[con])\n    # calculate the average\
    \ trace in this condition\n    avgs[con]['M'] = numpy.mean(traces[con], axis=0)\n\
    \    # calculate the standard deviation in this condition\n    sd = numpy.std(traces[con],\
    \ axis=0)\n    # calculate the standard error in this condition\n    avgs[con]['SEM']\
    \ = sd / numpy.sqrt(n_trials)\n```\n\nAs with the mean and std functions, you\
    \ can also use the axis keyword in the ttest_rel function to perform multiple\
    \ tests at once. Use this to check at which time points the pupil's response to\
    \ a light-to-dark change is significantly different from the pupil's response\
    \ to a dark-to-light change:\n\n```\n# do a t-test on every timepoint\nt, p =\
    \ ttest_rel(traces['black'], traces['white'], axis=0)\n```\n\nBecause you just\
    \ did 2,000 t-tests, you cannot simply use a p-value significance cut-off (alpha)\
    \ of 0.05. The idea behind an alpha of 0.05 is that you accept that in case of\
    \ a null effect, there is still a 5% of your p-value being “statistically significant”.\
    \ With 2,000 tests, each with an alpha of 5%, you would expect at least 100 significant\
    \ differences to occur even under a null effect.\nInstead, you could use a Bonferroni\
    \ correction. This requires you to divide alpha by the number of tests you performed\
    \ so that the overall chance of an accidental error is still only 5%.\n\n```\n\
    # Bonferroni-corrected alpha\nalpha = 0.05 / len(t)\n```\n\nYou consider differences\
    \ to be significant only when their t-test's p-value is below the new alpha level.\
    \ That is, where p<alpha, the 'black' and 'white' traces are actually different\
    \ from each other.\nThe next step is to create a pretty plot. First, define the\
    \ colour of each condition and create a new figure with a single axis (that's\
    \ what a subplot is called in Matplotlib):\n\n```\n# define the plotting colours\n\
    cols = {'black':'#204a87', 'white':'#c4a000'}\n# create a new figure with a single\
    \ axis\nfig, ax = pyplot.subplots(figsize=(9.6,5.4), dpi=200.0)\n```\n\nNext,\
    \ loop through the conditions with a for loop:\n\n```\n# loop through the conditions\n\
    for con in ['black', 'white']:\n```\n\nFor each condition, plot the average trace.\
    \ You can also plot a shaded area, by using the axis' fill_between method. This\
    \ method requires you to put in x values (the numbers 0–1999 in this case: the\
    \ elapsed time since a monitor change in milliseconds) as well as two y values.\
    \ The first array of y values will be the mean trace plus the standard error of\
    \ the mean trace. The second will be the mean trace minus the standard error of\
    \ the mean trace. By specifying the alpha keyword, you can set the transparency:\
    \ a value of 1 means completely opaque, whereas a value of 0 means invisible.\
    \ (Note that this alpha is completely different from the significance threshold\
    \ discussed earlier!) Add the following code in the for loop:\n\n```\n# create\
    \ x-values\nx = numpy.arange(len(avgs[con]['M']))\n# plot the mean trace\nax.plot(x,\
    \ avgs[con]['M'], '-', color=cols[con], label=con)\n# plot the standard error\
    \ of the mean shading\ny1 = avgs[con]['M'] + avgs[con]['SEM']\ny2 = avgs[con]['M']\
    \ - avgs[con]['SEM']\nax.fill_between(x, y1, y2, color=cols[con], alpha=0.3)\n\
    ```\n\n![](img/07ad901823abb0ad885d2b362f9446b0_153_0.png)\n\n**FIGURE 7.3** This\
    \ is what the average traces should look like. The blue line indicates the average\
    \ pupillary response to a light-dark luminance transition, and the yellow line\
    \ indicates the average pupillary response to a dark-to-light luminance transition.\
    \ Shading around the lines indicates the standard error of the mean, and the grey\
    \ shading indicates where the lines differ significantly from each other (point-wise\
    \ related-samples t-tests, Bonferroni corrected)\n\n![](img/07ad901823abb0ad885d2b362f9446b0_154_0.png)\n\
    \n**FIGURE 7.4** This is what happens when something goes wrong when you're trying\
    \ to plot a trace. Or when a participant's eye explodes during testing. Either\
    \ way: Oops!\n\nThe last thing to plot is a shaded area that indicates where the\
    \ two traces differ significantly from each other. You can do this using the same\
    \ `fill_between` method that you used to indicate the standard error of the mean.\
    \ The function has a `where` keyword that will make sure the shading is only drawn\
    \ at locations where a conditional statement is True, for example when p < 0.05.\n\
    \nTo do this, you need to know the limits of your y axis. Let's set those at 0\
    \ and 2 (the proportional change in pupil size will likely be between those numbers).\
    \ You can use these to create the top and bottom y traces. The bottom trace will\
