    feel good about a manuscript, then you might be asking the wrong types of questions.
    However, it is most certainly not unreasonable to want to know if an association
    is statistically significant before you start to interpret it. You can derive
    an F-value and associated p-value from the explained and unexplained variance,
    which will tell you if the whole model is “significant”. You can also derive t-values
    and their associated p-values from the betas and their standard errors. This requires
    some statistical knowledge, but no further programming skills (you know all the
    required ingredients at this point). However, you could also turn to specialised
    packages like scikit-learn (focusses on prediction, less on statistics) and statsmodels
