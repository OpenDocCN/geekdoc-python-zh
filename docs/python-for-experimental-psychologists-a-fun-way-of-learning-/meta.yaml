  md: 'timbre. Instead, we will use pure tones. These are sounds with only a main
    note, without harmonics or other overtones.


    As you know, sounds are the vibrations of air (or a different medium). Sounds
    can be characterised by their frequency: the amount of vibrations that occur per
    second. The frequencies of a few musical notes are listed below (rounded to the
    nearest integer). You can use them to create Sound instances that can play a certain
    note.


    | Keynote | Frequency (Hz) |

    |---|---|

    | A4 | 440 |

    | B4 | 494 |

    | C5 | 523 |

    | D5 | 587 |

    | E5 | 659 |

    | F5 | 698 |

    | G5 | 784 |

    | A5 | 880 |

    | B5 | 988 |


    Let''s start with a single note: A4 or 440 Herz. You can specify this frequency
    by using the Sound class''s freq keyword argument. A pure tone is a sine wave,
    so you should use a sinusoid oscillator when creating the Sound instance (specified
    by the osc keyword argument). You can use the length keyword argument to specify
    the sound''s duration in milliseconds. In addition, you can use the attack and
    decay keywords to specify the fade-in and fade-out times in milliseconds. An attack
    of 10 milliseconds means that the sound will take 10 milliseconds to reach its
    peak volume, and a decay of 10 milliseconds means that the sound will take 10
    milliseconds to go from peak volume down to no volume.


    As an example, think of a Sound with a length of 100 milliseconds, an attack of
    10 milliseconds, and a decay of 10 milliseconds. The sound will take 10 milliseconds
    to build up to full volume, then play at full volume for 80 milliseconds, and
    will then reduce to no volume during the final 10 milliseconds.


    Now initialise a Sound instance in your script to create A4 notes with a duration
    of 250 milliseconds:


    ```

    a4 = Sound(osc=''sine'', freq=440, length=250, \n           attack=10, decay=10)

    ```


    The following step is to monitor whether button presses occur and then play the
    sound whenever they do. A while loop is perfect for this! As you might remember,
    a while loop can run indefinitely. You can make it stop by flipping its associated
    Boolean variable from True to False. You could use the following while loop in
    your script:


    ```

    # run a while loop until stopped

    stop = False

    while not stop:

    ```'
