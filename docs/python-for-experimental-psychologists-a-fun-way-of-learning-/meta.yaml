    \ a keypress fast enough, the keys list will be empty, [], meaning it has no zeroth\
    \ element, and keys[0] will not work. And so, we need to build in some kind of\
    \ conditional, to only print if a key has been pressed. We could use:\n\n```\n\
    if len(keys)>0:\n    print(keys[0].name, keys[0].rt)\n```\n\nIn Python, the method\
    \ len() returns the length of a list. In this case, we are checking “Is the length\
    \ of my keys greater than 0? If yes, print the key name and rt”. Another, slightly\
    \ neater approach we could use in this case is:\n\n```\nif keys:\n    print(keys[0].name,\
    \ keys[0].rt)\n```\n\nWhen applied to a list, this is testing the same thing,\
    \ that is, if keys will return True only if the list contains elements. These\
    \ are some rather specific first examples of If statements in the wild; let’s\
    \ practise using If statements in a simpler context-response contingent feedback.\n\
    \n# 4.3 If Statements\n\nIf statements are an important building block of almost\
