    ```


    The result is now False. We could also ask Python whether a "does not equal" b:


    ```

    a != b

    ```


    This is True, because a and b do not point to equal values. You can also directly
    use True or False in your code:


    ```

    a = True

    b = False

    c = True

    ```


    This allows you to use logic operators, such as AND (&) and OR (|):


    ```

    a & b

    a | b

    ```


    The first tests whether both variables are True and returns True if they are.
    The second tests if either variable is True and returns True if one or both are.
    There is another operator, the exclusive or (XOR, ^), which tests whether two
    Booleans are the same and returns True only if they are different:


    ```

