    # 3.4 Comments


    If you want to make reusable code, comments are essential. You may have noticed
    here that we’ve added some lines that start with the # symbol. This is a single-line
    comment. Comments add human-readable information to your script but is ignored
    by the computer when your code is run.


    Consider comments as love notes to future you and to other researchers who might
    need to figure out what your code was supposed to do. You could have the most
    elaborate script in the world that achieves modern wonders, but if there are no
    comments, chances are no one will ever use it. That’s because they will have no
    idea what past you was thinking and doing on each line of code. There are two
    types of comments you can add to your code:


    ```

    # single-line comments: a quick note!

    ```


    You can write several consecutive lines of comments, as long as each line starts
    with #. If you prefer, you can also write several lines into a multi-line comment,
    using three quotation marks to open the comment and another three to close it:


    ```

    ''''''

    Multi-line comments.


    Useful for a summary of your script at the start of your code. For example:


    Experiment: My first python script

    Author: Codey McCodeFace

    Date: 25/06/2022

    ''''''

    ```


    Single-line comments are typically for quick notes on what a part of your script
    is doing, for example “make a window”. Multi-line comments give more detail about
    a part of your code, such as a summary at the start of your script or as a “doc
    string” (something that describes what a particular function or thing does).


