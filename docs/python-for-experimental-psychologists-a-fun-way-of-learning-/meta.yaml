  md: "Important note for people with non-English language settings: in some languages\
    \ (such as French, Italian, German, and Dutch), mathematical symbols are different\
    \ from English conventions. In English, decimal numbers are indicated with a full\
    \ stop: 4.5. However, in some other languages, decimal numbers are indicated with\
    \ a comma: 4,5. This particular symbol is called the decimal separator. Python\
    \ abides by English conventions, so the decimal separator will be a full stop\
    \ (or dot, or point, or period, or however you want to call it). Make sure that\
    \ your spreadsheet editor is using a full stop (\".\") as the decimal separator!\n\
    \nUsing a spreadsheet can be convenient, because it makes your experiment more\
    \ reusable for others who feel comfortable editing it but might not feel confident\
    \ editing a Python script. OK let's import that spreadsheet:\n\n```\nconditions\
    \ = data.importConditions('conditions.xlsx')\nprint(conditions)\n```\n\nRun your\
    \ script and take a look in the Output window. What you will see here is a list\
    \ of dictionaries. This is what the `importConditions` function is doing – it\
    \ is importing your spreadsheet and converting it to a list of dictionaries, which\
    \ can then be used, in this case, as a list of trials.\n\n# 5.3.2 The TrialHandler\n\
    \nImporting a spreadsheet overcomes the limitation of a cumbersome manually created\
    \ list of dictionaries, but it doesn't solve our other wish which was to have\
    \ better control over the trial randomisation. This is where the `TrialHandler`\
    \ comes in, which is a class that lives in the data module. To make a `TrialHandler`,\
    \ we use:\n\n```\n# import spreadsheet of trials\nconditions = data.importConditions('conditions.xlsx')\n\
    \n# make a trial handler\ntrials = data.TrialHandler(trialList = conditions,\n\
    \    nReps = 5, method = 'random')\n```\n\nThis allows us not only to have our\
    \ spreadsheet but also to repeat it several times and make use of several randomisation\
    \ methods e.g. \"sequential\", \"random\" (randomise trials within block repetitions),\
    \ or \"fullRandom\" (randomise trials across block repetitions). Now that we are\
    \ using the variable `trials` to refer to our `TrialHandler` object, we can delete\
    \ our old list of dictionaries we were using for an earlier example.\n\n# 5.3.3\
    \ The Experiment Handler\n\nTrial handlers are great for considering single blocks\
    \ of trials, but we are missing an important piece of the puzzle here – saving\
    \ the data! This is where the \"Experiment Handler\" comes in.\n\nNot only does\
    \ the Experiment Handler handle saving of data, but it can have several trial\
    \ handlers belonging to it (e.g. one for practice trials and one for main trials).\
    \ The Experiment Handler will probably also have additional information about\
    \ the task in"
  merge: -1
  pgno: 104
- img_proc: true
  md: "general – such as the participant ID or global information about the experiment.\
    \ To create an Experiment Handler, we can write something like:\n\n```\nthisExp\
    \ = data.ExperimentHandler(\n    name='Best_Posner_Ever',\n    dataFileName='output')\n\
    ```\n\nWe can then add our trialHandler to our experiment handler using\n\n```\n\
    thisExp.addLoop(trials)\n```\n\nImportantly, we can then add a few lines of code\
    \ to the end of our trial loop in order to save information trial-by-trial:\n\n\
    ```\n# save the data\nthisExp.addData('key_pressed', keys[0].name)\nthisExp.addData('key_rt',\
    \ keys[0].rt)\nthisExp.nextEntry()\n```\n\nImportantly, the nextEntry() function\
    \ is what tells our experiment to move to the next line in the output file, imagine\
    \ it as the code equivalent of hitting the end of a typewriter dramatically.\n\
    \nWhat is nice is that the other information about our trial (e.g. “cue_ori”,\
    \ “target_x” and “corr_ans”) will all also be saved to our datafile, because we\
    \ already gave the list of trials to our Experiment Handler.\n\n# 5.4 Gathering\
    \ Participant Information\n\n# 5.4.1 Constants\n\nWe basically have a full experiment\
    \ now. However, at the moment we haven’t been kind to future us, nor anyone else\
    \ we will share our experiment with. The reason is because there are several things\
    \ that remain constant in our experiment, but that we might want to tweak in future\
    \ experiments, for example the duration of the fixation and cue. Any researchers\
    \ we share our experiment with (and our future selves wanting to make adjustments)\
    \ would have to search through our code to find the line they need to edit. We\
    \ can make life much easier by having the editable information at the top of our\
    \ experiment script. For this, we will make a dictionary:\n\n```\n# a dictionary\
    \ to handle global info\nexpInfo = {\n    'fixTime': 1,\n    'cueTime': 0.5\n\
    }\n```\n\nWe can then update the code where we use these values to determine timing:\n\
    \n```\n# get the desired number of frames\nfixTime = secs2frames(expInfo['fixTime'])\n\
    cueTime = secs2frames(expInfo['cueTime'])\n```"
  merge: -1
  pgno: 105
- img_proc: true
  md: "We can even give this extra information to our Experiment Handler so that it\
    \ is saved to our data file along with the trial-by-trial data:\n\n```\nthisExp\
    \ = data.ExperimentHandler(\n    name = 'Best_Posner_Ever',\n    extraInfo=expInfo,\n\
    \    dataFileName = 'output')\n```\n\n# 5.4.2 Presenting a Dialogue Box\n\nAnother\
    \ option to set parameters is to present a pop-up box at the start of the experiment\
    \ in which people can adjust settings without even needing to touch our code.\
    \ Let’s import one last module to do this, the gui module:\n\n```\nfrom psychopy\
    \ import visual, core, event, data, gui\n```\n\nThen, we could add whatever parameters\
    \ we might want to gather at the start of an experiment:\n\n```\n# a dictionary\
    \ to handle global info\nexpInfo = {\n    'fixTime': 1,\n    'cueTime':0.5,\n\
    \    'participant':'',\n    'session':'',\n    'group':['A', 'B'],\n    'corrected\
    \ vision':False\n}\n```\n\nAnd present these parameters as editable within a dialogue\
    \ box:\n\n```\n# present the dictionary as a pop up dialogue box\ndlg = gui.DlgFromDict(expInfo)\n\
    \n# check if the user pressed OK\nif not dlg.OK:\n    core.quit()\n```\n\nThere\
    \ are a few things to note here. First, you’ll notice that different types of\
    \ value in the expInfo dictionary present as different types of options in the\
    \ dialogue box. A string allows free-type response, a list presents a set of drop-down\
    \ options, and a Boolean presents a checkbox (which we have left unchecked for\
    \ now). Second, you’ll notice that all of these fields are presented in the dialogue\
    \ box. What if we only want specific fields to be editable? The answer to that\
    \ would be, you can always add fields and corresponding values to a dictionary\
    \ after the presentation of the dialogue box. For instance, imagine we want to\
    \ add a date string to the experiment info:\n\n```\n# check if the user pressed\
    \ OK\nif not dlg.OK:\n    core.quit()\n```"
