  md: "# 4.2.3 Understanding the “Zero Point” of Keyboard Response Times\n\nOften\
    \ in psychology experiments, we present the participant with a series of events,\
    \ not just a single letter. For instance, we might present a fixation point and\
    \ then a letter. It is important to consider where you want the zero point of\
    \ your response time to be within your experiment. In our example, we present\
    \ a fixation point and then a letter. Do we want our reaction time to be relative\
    \ to the onset of the letter? Or do we want to allow participants to respond before\
    \ the letter? In which case, the zero point would be the onset of the fixation.\
    \ To talk this through, let’s add a simple fixation cross to our experiment by\
    \ making a second text stimulus.\n\n```\n# make a fixation cross\nfixation = visual.TextBox2(\n\
    \    win,\n    text='+',\n    pos=(0, 0),\n    letterHeight=20,\n    alignment='center'\n\
    )\n```\n\nAnd drawing it for 1 second in advance of our letter:\n\n```\n# draw\
    \ the fixation for 1 second\nfixation.draw()\nwin.flip()\ncore.wait(1)\n```\n\n\
    ```\n# draw the text\ntextbox.draw()\nwin.flip()\n```\n\n```\n# wait until a response\n\
    keys = kb.waitKeys(keyList = ['a', 'e', 'i', 'o', 'u'])\n```\n\nWe need to think\
    \ about when we want our response time to start. At this point, we would want\
    \ to reset the clock using kb.clock.reset() and clear the keyboard event buffer\
    \ of any previous events with kb.clearEvents(). Imagine we want our zero point\
    \ to be the onset of the fixation. We could use:\n\n```\n# draw the fixation\n\
    fixation.draw()\n```\n\n```\n# reset the keyboard clock\nkb.clock.reset()\n```\n\
    \n```\n# clear the event buffer\nkb.clearEvents()\nwin.flip()\n```"
  merge: -1
