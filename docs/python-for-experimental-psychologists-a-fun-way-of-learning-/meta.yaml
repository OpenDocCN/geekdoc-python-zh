- md: "## 3.6.5 Using Loops to Generate Many Stimuli\n\nBack to the task at hand,\
    \ you can now return to your stimuli.py file and leave the loops.py file to one\
    \ side. We will need two loops to achieve our goal of making several stimuli and\
    \ drawing them simultaneously. First, we need a loop to create our list of stimuli:\n\
    \n```python\n# specify the minimum and maximum xy coordinates\nmin_xy = -200\n\
    max_xy = 200\n\n# how many letters we want\nnLetters = 5\n\n# an empty list (our\
    \ letters will be added to this)\nmyLetters = []\n```\n\n```python\n# a loop that\
    \ repeats nLetters times\nfor i in range(nLetters):\n    # generate a pseudo-random\
    \ location\n    rand_pos = (randint(min_xy, max_xy),\n                randint(min_xy,\
    \ max_xy))\n    # make a textbox for the random location\n    randloc_textbox\
    \ = visual.TextBox2(\n        win,\n        text='T',\n        pos=rand_pos,\n\
    \        letterHeight=20,\n        alignment='center'\n    )\n    # add the textbox\
    \ to the list\n    myLetters.append(randloc_textbox)\n```\n\nThen, rather than\
    \ calling .draw() once, we need to loop through the list of stimuli to draw each\
    \ element:\n\n```python\n# loop through the list of letters to draw them\nfor\
    \ letter in myLetters:\n    letter.draw()\n```\n\nAnd there you have it, a large\
    \ number of stimuli drawn at once, try it with larger numbers, hopefully you can\
    \ now see the immense value of loops in reducing the time it would have taken\
    \ to make many stimuli.\n\n## 3.6.5 Element Array Stim\n\nIf you tried the previous\
    \ example with a very large number of stimuli, you might have noticed this put\
    \ your computer under some demand. Maybe you even received warnings in your Output\
    \ regarding dropped frames! This first approach was certainly a good introduction\
    \ to loops, and it typically works for a smaller number of varied stimuli. However,\
    \ there is a more efficient way of showing a set of stimuli.\n\nThis approach\
    \ is to use ElementArrayStim, which allows you to specify many stimuli to be drawn\
    \ simultaneously, without dropping a frame. The way that this works is by specifying\
    \ a large number of objects that are the same shape (e.g. a square), but that\
    \ vary on some parameter e.g. orientation, size, or location. You can specify\
    \ a specific shape or an image as a texture. For instance:\n\n```python\n# specify\
    \ the number of stimuli to use\nnStim = 100\n# generate a list of random coordinates\n\
    xys = []\nfor i in range(nStim):\n    xys.append([randint(-200, 200),\n      \
    \          randint(-200, 200)])\n```\n\n```python\n# make an element array stim\n\
    multiStim = visual.ElementArrayStim(win,\n    elementTex='beach.jpg',\n    elementMask=None,\n\
    \    nElements=nStim,\n    sizes=[20, 20],\n    xys=xys)\n```\n\nThis would create\
    \ a stimulus array of 100 beach pictures, each in a random location. You could\
    \ draw all 100 images with a single call to `multiStim.draw()`. What's cool about\
    \ this is that you can change the properties of the elements in your ElementArrayStim\
    \ all at once! For example, try:\n\n```python\n# repeat 5 times\nfor i in range(5):\n\
    \    # list of random values ranging from 1\n    # to and 360, with length nStim\n\
    \    oris = randint(1,360,nStim)\n\n    # use the list to set the orientations\n\
    \    # of elements in multiStim\n    multiStim.setOris(oris)\n\n    # draw the\
    \ stimulus\n    multiStim.draw()\n    win.flip()\n    core.wait(1.0)\n```\n\n\
    If this went well, you saw many beaches, and each changed orientation five times\
    \ in a row. If you'd like a more chaotic display, change the number of repeats\
    \ to 50 and the waiting time to 0.1.\n\nIf you are a vision scientist with an\
    \ interest in random dot kinematograms, the ElementArrayStim might seem like an\
    \ appealing class to you. You'll be delighted to know that the DotStim class is\
    \ designed especially for this purpose and allows you to control many more aspects\
    \ of dot motion.\n\n## 3.7 Timing Visual Stimuli by Frames\n\nWe mentioned that\
    \ the duration for which we can present stimuli is inherently constrained by our\
    \ monitor's frame rate; it is impossible to present something for half a frame!\
    \ Because of that, the `core.wait()` method isn't exactly fool proof. We could\
    \ write `core.wait(0.02)` and this would actually present for 33 ms on a 60 Hz\
    \ monitor, not 20 ms. Oops!\n\nTo present stimuli by frames, we can use our new\
    \ knowledge of for loops. Only this time, instead of looping through trials, we\
    \ loop through frames. Imagine you have an immature sense of humour and want to\
    \ present a set of Ts for 420 milliseconds. On a 60-Hz monitor, this would correspond\
    \ to 60 frames/second * 0.42 seconds = 25.2 frames. As we've discussed, it's impossible\
    \ to present stimuli for a partial frame, so we'll need to round the presentation\
    \ time to the nearest integer. (You could also consistently round up or down,\
    \ depending on your preferences.)\n\nTo calculate the number of frames to present\
    \ our stimulus and calculate how far off we would be, we could use:\n\n```python\n\
    # the intended stimulus duration in seconds\ndesired_time = 0.420\n\n# monitor\
    \ frame rate\nframerate = 60\n# compute the time per frame in seconds\nframetime\
    \ = 1.0 / framerate\n\n# total frames required to get close to desired times\n\
    nFrames = round(desired_time*framerate)\n\n# print how far off we will be\nprint('Stimulus\
    \ will be presented for {} frames'.format(\n    nFrames))\n\nprint('Actual time\
    \ will be {:.3f} seconds'.format(\n    nFrames*frametime))\n```\n\nWe can then\
    \ use this number of frames in a loop to present our stimulus. So, instead of:\n\
    \n```python\nfor letter in myLetters:\n    letter.draw()\n\nwin.flip()\ncore.wait(0.420)\n\
    ```\n\nWe could use:\n\n```python\n# run through the desired number of frames\n\
    for frameN in range(nFrames):\n    # draw all letters\n    for letter in myLetters:\n\
    \        letter.draw()\n    # show the letters\n    win.flip()\n```\n\nNotice\
    \ how, here, we replace core.wait(0.420) with a for loop that iterates through\
    \ a number of frames. In this way, we know the exact amount of times a stimulus\
    \ is presented for and therefore have better control over timing.\n\nWe also used\
    \ a for loop to draw all of the stimuli on each frame. An alternative way of doing\
    \ this is to use the .setAutoDraw() function. This allows us to automatically\
    \ draw stimuli: .setAutoDraw(True) effectively means “keep drawing on every win.flip()\
    \ until I say otherwise”. You can stop the automatic drawing by calling .setAutoDraw(False).\
    \ Using this approach, we don’t actually have to keep calling the .draw() method.\
    \ In our script, we would use:\n\n```python\n# set all the letters to automatically\
    \ draw\n# on every screen refresh\nfor letter in myLetters:\n    letter.setAutoDraw(True)\n\
    \n# flip the window for the desired number of frames\nfor frameN in range(nFrames):\n\
    \    win.flip()\n\n# stop auto-drawing the letters\nfor letter in myLetters:\n\
    \    letter.setAutoDraw(False)\n```\n\n## 3.8 Making Dynamic Stimuli\n\nNow that\
    \ you know how to present stimuli for a set number of frames, a cool thing we\
    \ can do next is to change their properties frame-by-frame. In this way, we can\
    \ make things move, grow, and spin dynamically in time. Let’s wind back a bit\
    \ to a single stimulus, rather than a large number of stimuli. Make yourself a\
    \ basic circle:\n\n```python\n# make a circle\ncircle = visual.Circle(win, size=20,\n\
    \    pos = [-500, 0], lineColor='white',\n    fillColor='lightGrey')\n```\n\n\
    You can change the attributes of Python instances after you’ve created them, by\
    \ specifically naming that attribute. For example, circle.size=80 would update\
    \ the size attribute to a value of 80. Some objects have methods that are built\
    \ into the class itself. Some examples in PsychoPy include:\n\n- circle.setPos()\
    \ to set the position of the circle\n- circle.setSize() to set the size of the\
    \ circle\n- circle.setFillColor() to set the fill colour of the circle\n\nIn PsychoPy’s\
    \ classes, changing stimulus attributes also changes what they look like on screen.\
    \ If you would like to move the newly created circle across the screen, you could\
    \ do so by updating its position every frame:\n\n```python\n# specify the total\
    \ frames we want to present\nnFrames = 100\n\n# how many pixels to move per frame\n\
    pixels_per_frame = 10\n```"
