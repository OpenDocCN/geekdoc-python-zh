    \ a random letter from your list appear on the screen! OK, so now we can show\
    \ the letter we want to gather a keyboard response. That means we don't want to\
    \ just show the textbox for two seconds using `core.wait(2)`, but we want to leave\
    \ the stimulus on screen until a keypress has been made.\n\n# 4.2.1 Waiting for\
    \ Keyboard Input\n\nIn PsychoPy, there are two ways of gathering a keyboard response.\
    \ The first is easy but not the most precise for response time measurements. This\
    \ method uses PsychoPy's event module, so add event to modules that you import\
    \ from PsychoPy. Then, rather than using `core.wait(2)`, we will replace this\
    \ with a command to wait for a keypress event:\n\n```\n# wait for a keypress event\n\
    keys = event.waitKeys(keyList=['a', 'e', 'i', 'o', 'u'])\nprint(keys)\n```\n\n\
    With `event.waitKeys(keyList=['a', 'e', 'i', 'o', 'u'])`, the argument keyList\
    \ indicates a list of keys to be watched. If we do not provide this argument,\
    \ PsychoPy will respond to any key that is pressed. If you look in your Output\
    \ window, you should see the name of the key that you just pressed.\n\nThe event\
    \ module is an easy way to watch for keypress events, but it isn't the best for\
    \ gathering response times. The reason for this is that the polling of the keyboard\
    \ in the event module is synchronous to the main thread, meaning that polling\
    \ occurs on every frame refresh. The other thing is that the event module only\
