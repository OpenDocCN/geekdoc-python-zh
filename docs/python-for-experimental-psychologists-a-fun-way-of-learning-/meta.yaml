    module to do a related-samples *t*-test.


    The other module, `os`, is useful to do stuff that relates to the operating system.
    This includes folder and file management, which is very useful when you’re dealing
    with data files. Let’s start by making your script recognise the current folder:


    ```

    # get the path to the current folder

