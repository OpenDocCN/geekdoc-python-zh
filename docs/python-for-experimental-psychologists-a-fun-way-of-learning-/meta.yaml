    \ sense to order the data per SOA and then per validity (because we are primarily\
    \ interested in the difference between the valid and invalid conditions within\
    \ each SOA condition). This means that the descr dict should have two keys, each\
    \ with two new dicts: 100 and 900. The easier way to achieve this is by adding\
