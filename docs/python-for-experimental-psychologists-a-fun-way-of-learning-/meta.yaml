    \ stimulus duration in seconds\ndesired_time = 0.420\n\n# monitor frame rate\n\
    framerate = 60\n# compute the time per frame in seconds\nframetime = 1.0 / framerate\n\
    \n# total frames required to get close to desired times\nnFrames = round(desired_time*framerate)\n\
    \n# print how far off we will be\nprint('Stimulus will be presented for {} frames'.format(\n\
    \    nFrames))\n\nprint('Actual time will be {:.3f} seconds'.format(\n    nFrames*frametime))\n\
    ```\n\nWe can then use this number of frames in a loop to present our stimulus.\
    \ So, instead of:\n\n```\nfor letter in myLetters:\n    letter.draw()\n\nwin.flip()\n\
    core.wait(0.420)\n```\n\nWe could use:\n\n```\n# run through the desired number\
    \ of frames\nfor frameN in range(nFrames):\n    # draw all letters\n    for letter\
    \ in myLetters:\n        letter.draw()\n    # show the letters\n    win.flip()\n\
    ```\n\nNotice how, here, we replace core.wait(0.420) with a for loop that iterates\
    \ through a number of frames. In this way, we know the exact amount of times a\
    \ stimulus is presented for and therefore have better control over timing.\n\n\
    We also used a for loop to draw all of the stimuli on each frame. An alternative\
    \ way of doing this is to use the .setAutoDraw() function. This allows us to automatically\
    \ draw"
  - "[PAGE 71]\n\nstimuli: .setAutoDraw(True) effectively means “keep drawing on every\
    \ win.flip() until I say otherwise”. You can stop the automatic drawing by calling\
    \ .setAutoDraw(False). Using this approach, we don’t actually have to keep calling\
    \ the .draw()method. In our script, we would use:\n\n```\n# set all the letters\
    \ to automatically draw\n# on every screen refresh\nfor letter in myLetters:\n\
    \    letter.setAutoDraw(True)\n\n# flip the window for the desired number of frames\n\
    for frameN in range(nFrames):\n    win.flip()\n\n# stop auto-drawing the letters\n\
    for letter in myLetters:\n    letter.setAutoDraw(False)\n```\n\n# 3.8 Making Dynamic\
    \ Stimuli\n\nNow that you know how to present stimuli for a set number of frames,\
    \ a cool thing we can do next is to change their properties frame-by-frame. In\
    \ this way, we can make things move, grow, and spin dynamically in time. Let’s\
    \ wind back a bit to a single stimulus, rather than a large number of stimuli.\
    \ Make yourself a basic circle:\n\n```\n# make a circle\ncircle = visual.Circle(win,\
    \ size=20,\n    pos = [-500, 0], lineColor='white',\n    fillColor='lightGrey')\n\
    ```\n\nYou can change the attributes of Python instances after you’ve created\
    \ them, by specifically naming that attribute. For example, circle.size=80 would\
    \ update the size attribute to a value of 80. Some objects have methods that are\
    \ built into the class itself. Some examples in PsychoPy include:\n\n+   - circle.setPos()\
    \ to set the position of the circle\n- circle.setSize() to set the size of the\
    \ circle\n- circle.setFillColor() to set the fill colour of the circle\n\nIn PsychoPy’s\
    \ classes, changing stimulus attributes also changes what they look like on screen.\
    \ If you would like to move the newly created circle across the screen, you could\
    \ do so by updating its position every frame:\n\n```\n# specify the total frames\
    \ we want to present\nnFrames = 100\n\n# how many pixels to move per frame\npixels_per_frame\
    \ = 10\n```"
- md: "## 3.9 Comments (again)\n\nYour scripts are gradually becoming longer and more\
    \ complicated, so this is a good time to really stress the importance of **comments**.\
    \ As you've seen, a comment is one or more lines that are ignored by Python. You\
    \ can add them as little notes to yourself or to other people (who might be using\
    \ your scripts at one point).\n\n**While writing code, you might be confident\
    \ that you can remember what you did and why. You will not.** Even though the\
    \ code is right there, you'll find yourself staring at your screen, wondering\
    \ what the bleep you did.\n\nThis will be a very frustrating experience, because\
    \ of three reasons:\n\n1.  You have code that works, and you want to change it\
    \ slightly. This should be easy and should not take too much time: YOU wrote this!\
    \ However, without comments, you actually have no clue what the code does. You\
    \ now need to spend ages on figuring it out. AGAIN!\n2.  Because you can't quite\
    \ figure out what you did *exactly*, you make assumptions about what/why you might\
    \ have done when you wrote the code. This makes you more prone to making mistakes\
    \ and leaves you with broken scripts and/or lots of debugging effort.\n3.  You\
    \ realise that your past self-implemented something in a very clever way, which\
    \ you now struggle to comprehend. This makes you realise that your cognitive skills\
    \ are ever declining. Also, because your uncommented code is only a few weeks\
    \ old, you realise the decline is very rapid. You're getting old, fast.\n\n**By\
    \ not commenting your code, you are faced with frustration, potentially flawed\
    \ scripts, and an unpleasant insight into your own mortality.**\n\nComments make\
    \ scripts much longer, even though there is absolutely no extra functionality.\
    \ However, comments ensure you'll continue to understand your code weeks, months,\
    \ or years from now. That will be a *huge* time-saver! (Well worth all the effort\
    \ of typing comments!)\n\n## 4 PROCESSING RESPONSES\n\nAlmost every computer-based\
    \ experiment in psychology and cognitive neuroscience requires participants to\
    \ respond in one way or another. The most common instrument to collect these responses\
    \ is the computer keyboard. In the following chapters, you will learn how to collect\
    \ and process keypresses.\n\n### 4.1 Are Peripherals Accurate Enough?\n\nSome\
    \ researchers claim that keyboards are too slow for their purposes, as they require\
    \ \"millisecond accuracy\". Because it is important to know your tools, this chapter\
    \ will investigate this claim.\n\nIn most operating systems, **peripherals** (keyboards,\
    \ mice, joysticks, game controllers etc.) are **polled** at a certain rate. Polling\
    \ a device means checking its state: are any of the keys or buttons pressed, or\
    \ is there movement along any of the axes? The polling rate determines how often\
    \ an operating system checks for new input. If the polling rate is 60 Hz, the\
    \ keyboard will be checked roughly every 17 milliseconds. If a key is pressed\
    \ 2 milliseconds after the last 'poll', it will take another 15 milliseconds for\
    \ it to be picked up.\n\nTraditionally, the polling rate of keyboards and mice\
    \ was 60 Hz, matching the standard display refresh rate. This makes sense: if\
    \ the display is updated only once every 17 milliseconds, why should you check\
    \ for input more than that? The input is used to update the display, so polling\
    \ devices twice every display refresh will result in one redundant poll.\n\nAn\
    \ example: Imagine your mouse is at screen coordinate (10,10) at time 0 ms (this\
    \ coincides with the latest screen refresh). Now you move your mouse, which is\
    \ polled at a rate of 120 Hz. The mouse was registered to be at point (15,15)\
    \ at time 8 ms and at point (20,20) at time 17 ms. The display is updated to show\
    \ the mouse cursor at coordinate (20,20) at time 17 ms. The data from time 8 ms\
    \ is disregarded for the updating of the monitor, because it's old data. This\
    \ means that polling the mouse at a higher rate than the monitor refresh is effectively\
    \ useless.\n\nClearly, the engineers who thought this up were efficient but not\
    \ research psychologists. If you're interested in human ergonomics and would like\
    \ to see a high-resolution mouse trajectory, can you still use standard computer\
    \ peripherals?\n\nMost modern peripherals are connected via USB. Most operating\
    \ systems poll the USB port at a rate of 125 Hz (every 8 milliseconds). This means\
    \ you'll have an average timing error of 4 milliseconds. Some extra inaccuracy\
    \ is added by further delays, e.g. in the signal from your input device having\
    \ to travel to the computer, and within the computer's processes that make sure\
    \ the input reaches your experiment software.\n\nSuch inaccuracy can be reduced\
    \ by using software that polls the USB port more often (**drivers**) and with\
    \ specialised hardware that can handle this. Some consumer-grade hardware and\
    \ software can boost the polling rate to (over) 1,000 Hz. That's one data point\
    \ every millisecond! Such devices are popular among gamers, who think they might\
    \ avoid getting shot in their virtual heads if their keyboard registers their\
    \ key-bashing a millisecond or two quicker.\n\nThere are researchers who argue\
    \ that one simply cannot investigate short-lived mental processes with timing\
    \ imprecisions of several milliseconds. Therefore, they buy expensive devices\
    \ (often connected in more intricate ways than USB) with extremely high polling\
    \ rates to achieve millisecond or sub-millisecond accuracy.\n\nSo, are they right?\
    \ \"Yes\" in principle but also probably \"no\" in practice. Just like computers,\
    \ participants are not free from timing imprecision. In fact, people are so inconsistent\
    \ that we need many trials to accurately measure the distribution of their response\
    \ times. This human timing inaccuracy is much higher than the timing inaccuracy\
    \ of computer peripherals! This means that **using keyboards is perfectly fine\
    \ in most experimental designs** (Damian, 2010). (For a more in-depth discussion,\
    \ please read the cited paper.)\n\n### 4.2 Keyboard Input\n\nNow that you know\
    \ you can use the keyboard in experiments, it is time to explore how to actually\
    \ do it. Get started with a new, empty experiment: create a new folder and create\
    \ a new script, let's call this script \"responses.py\".\n\nIn this example, we\
    \ will simply present participants with letters on the screen and ask them to\
    \ press the corresponding key on the keyboard. To get started, let's present a\
    \ random letter on the screen. We know how to present a letter (Section 3.4),\
    \ we even learned how to set the position of that letter to be in a random location\
    \ using `randint`, which you might recall was part of NumPy's random module. This\
    \ time, we will again use the random module, but now we want to randomly choose\
    \ a letter from a list of letters and then use that in the text field of our textbox.\
    \ That will look like this:\n\n```python\n# import modules\nfrom psychopy import\
    \ visual, core, event\nfrom numpy.random import choice\n\n# make a window\nwin\
    \ = visual.Window([1024, 768], fullscr=False,\n                    units='pix')\n\
    \n# make a list of vowels\nvowels = ['a', 'e', 'i', 'o', 'u']\n\n# randomly choose\
    \ a letter from that list\nthis_letter = choice(vowels)\n\n# make a textbox and\
    \ use the selected letter in the text field\ntextbox = visual.TextBox2(\n    win,\n\
    \    text=this_letter,\n    pos=(0, 0),\n    letterHeight=20,\n    alignment='center'\n\
    )\n\n# draw the textbox\ntextbox.draw()\nwin.flip()\ncore.wait(2)\n```\n\nHopefully,\
    \ you saw a random letter from your list appear on the screen! OK, so now we can\
    \ show the letter we want to gather a keyboard response. That means we don't want\
    \ to just show the textbox for two seconds using `core.wait(2)`, but we want to\
    \ leave the stimulus on screen until a keypress has been made.\n\n#### 4.2.1 Waiting\
    \ for Keyboard Input\n\nIn PsychoPy, there are two ways of gathering a keyboard\
    \ response. The first is easy but not the most precise for response time measurements.\
    \ This method uses PsychoPy's event module, so add event to modules that you import\
    \ from PsychoPy. Then, rather than using `core.wait(2)`, we will replace this\
    \ with a command to wait for a keypress event:\n\n```python\n# wait for a keypress\
    \ event\nkeys = event.waitKeys(keyList=['a', 'e', 'i', 'o', 'u'])\nprint(keys)\n\
    ```\n\nWith `event.waitKeys(keyList=['a', 'e', 'i', 'o', 'u'])`, the argument\
    \ keyList indicates a list of keys to be watched. If we do not provide this argument,\
    \ PsychoPy will respond to any key that is pressed. If you look in your Output\
    \ window, you should see the name of the key that you just pressed.\n\nThe event\
    \ module is an easy way to watch for keypress events, but it isn't the best for\
    \ gathering response times. The reason for this is that the polling of the keyboard\
    \ in the event module is synchronous to the main thread, meaning that polling\
    \ occurs on every frame refresh. The other thing is that the event module only\
    \ detects key-down events (when a key is pressed); sometimes it might be useful\
    \ to watch for key-up events too (when a key stops being pressed). This allows\
    \ us to access other properties, such as key-press duration or if a key is currently\
    \ being pressed (i.e. when a key-down event occurred, but a key-up event has not\
    \ yet occurred). The second method for watching for keypress responses is using\
    \ the hardware module. To do this, we first add another import to the start of\
    \ our script:\n\n```python\nfrom psychopy.hardware import keyboard\n```"
  mdcn: "## 3.9 注释（再说一次）\n\n你的脚本正逐渐变得更长、更复杂，因此现在是强调**注释**重要性的好时机。正如你所见，注释是被 Python\
    \ 忽略的一行或多行文本。你可以将它们作为给自己或其他人（可能在某个时候使用你的脚本的人）的小笔记添加进去。\n\n**在编写代码时，你可能自信能记住自己做了什么以及为什么这样做。但你不会记住。**\
    \ 即使代码就在眼前，你也会发现自己盯着屏幕，疑惑自己到底做了什么。\n\n这将是一段非常令人沮丧的经历，原因有三：\n\n1.  你有一段能工作的代码，想稍微修改一下。这应该很容易，不会花太多时间：这是你写的！然而，没有注释的话，你实际上完全不知道代码在做什么。现在你需要花大量时间重新理解它。\n\
    2.  因为你无法完全弄清楚自己*究竟*做了什么，你会对编写代码时可能做了什么/为什么这样做做出假设。这使你更容易犯错，并导致脚本出错和/或需要大量调试工作。\n\
    3.  你意识到自己过去以一种非常聪明的方式实现了某些功能，而你现在却难以理解。这让你意识到自己的认知能力在不断下降。而且，由于你未加注释的代码才几周前写的，你意识到这种下降非常迅速。你正在快速变老。\n\
    \n**不给代码添加注释，你将面临挫败感、可能出错的脚本，以及对自己生命有限的不愉快认识。**\n\n注释会使脚本变得更长，尽管它们没有任何额外的功能。然而，注释能确保你在几周、几个月或几年后仍然能理解自己的代码。这将*大大*节省时间！（完全值得花时间输入注释！）\n\
    \n## 4 处理反应\n\n心理学和认知神经科学中几乎每一个基于计算机的实验都要求参与者以某种方式做出反应。收集这些反应最常见的工具是计算机键盘。在接下来的章节中，你将学习如何收集和处理按键反应。\n\
    \n### 4.1 外设足够精确吗？\n\n一些研究者声称键盘对于他们的目的来说太慢了，因为他们需要“毫秒级的精度”。因为了解你的工具很重要，本章将探讨这一说法。\n\
    \n在大多数操作系统中，**外设**（键盘、鼠标、操纵杆、游戏控制器等）以特定的速率被**轮询**。轮询设备意味着检查其状态：是否有任何键或按钮被按下，或者是否有沿任何轴的移动？轮询速率决定了操作系统检查新输入的频率。如果轮询速率是\
    \ 60 Hz，键盘大约每 17 毫秒被检查一次。如果一个键在最后一次“轮询”后 2 毫秒被按下，它需要再等 15 毫秒才能被检测到。\n\n传统上，键盘和鼠标的轮询速率是\
    \ 60 Hz，与标准的显示器刷新率相匹配。这是有道理的：如果显示器每 17 毫秒才更新一次，为什么要更频繁地检查输入呢？输入是用来更新显示器的，因此在每次显示器刷新时轮询设备两次会导致一次冗余的轮询。\n\
    \n举个例子：想象一下，在时间 0 毫秒（这与最新的屏幕刷新重合）时，你的鼠标位于屏幕坐标 (10,10)。现在你移动鼠标，它以 120 Hz 的速率被轮询。鼠标在时间\
    \ 8 毫秒时被记录在点 (15,15)，在时间 17 毫秒时被记录在点 (20,20)。显示器在时间 17 毫秒时更新，显示鼠标光标位于坐标 (20,20)。时间\
    \ 8 毫秒的数据在更新显示器时被忽略，因为它是旧数据。这意味着以高于显示器刷新率的速率轮询鼠标实际上是无效的。\n\n显然，想出这个方案的工程师们很有效率，但不是研究心理学家。如果你对人类工效学感兴趣，并希望看到高分辨率的鼠标轨迹，你还能使用标准的计算机外设吗？\n\
    \n大多数现代外设通过 USB 连接。大多数操作系统以 125 Hz（每 8 毫秒）的速率轮询 USB 端口。这意味着你将有平均 4 毫秒的计时误差。一些额外的误差来自于进一步的延迟，例如，来自输入设备的信号必须传输到计算机，以及计算机内部确保输入到达你的实验软件的处理过程。\n\
    \n这种不精确性可以通过使用更频繁轮询 USB 端口的软件（**驱动程序**）以及能够处理此操作的专用硬件来减少。一些消费级硬件和软件可以将轮询速率提升到（超过）1,000\
    \ Hz。这意味着每毫秒一个数据点！这类设备在游戏玩家中很受欢迎，他们认为如果键盘能快一两毫秒记录下他们的按键操作，他们或许就能避免在虚拟世界中被爆头。\n\
    \n有研究者认为，对于持续时间短暂的心理过程，根本无法在几毫秒的计时误差下进行研究。因此，他们购买昂贵的设备（通常以比 USB 更复杂的方式连接），这些设备具有极高的轮询速率，以实现毫秒或亚毫秒级的精度。\n\
    \n那么，他们是对的吗？原则上“是”，但实践中很可能“否”。就像计算机一样，参与者也并非没有计时误差。事实上，人们是如此不一致，以至于我们需要许多试次才能准确测量他们反应时间的分布。这种人类的计时误差远高于计算机外设的计时误差！这意味着**在大多数实验设计中使用键盘是完全没问题的**（Damian,\
    \ 2010）。（更深入的讨论，请阅读引用的论文。）\n\n### 4.2 键盘输入\n\n既然你知道可以在实验中使用键盘，现在是时候探索如何实际操作了。从一个新的、空的实验开始：创建一个新文件夹并创建一个新脚本，我们称这个脚本为\
    \ \"responses.py\"。\n\n在这个例子中，我们将在屏幕上向参与者呈现字母，并要求他们按下键盘上相应的键。首先，让我们在屏幕上呈现一个随机字母。我们知道如何呈现一个字母（第\
    \ 3.4 节），我们甚至学会了如何使用 `randint`（你可能记得它是 NumPy 随机模块的一部分）将该字母的位置设置为随机位置。这次，我们将再次使用随机模块，但现在我们想从一个字母列表中随机选择一个字母，然后将其用于文本框的文本字段中。代码如下所示：\n\
    \n```python\n# import modules\nfrom psychopy import visual, core, event\nfrom\
    \ numpy.random import choice\n\n# make a window\nwin = visual.Window([1024, 768],\
    \ fullscr=False,\n                    units='pix')\n\n# make a list of vowels\n\
    vowels = ['a', 'e', 'i', 'o', 'u']\n\n# randomly choose a letter from that list\n\
    this_letter = choice(vowels)\n\n# make a textbox and use the selected letter in\
    \ the text field\ntextbox = visual.TextBox2(\n    win,\n    text=this_letter,\n\
    \    pos=(0, 0),\n    letterHeight=20,\n    alignment='center'\n)\n\n# draw the\
    \ textbox\ntextbox.draw()\nwin.flip()\ncore.wait(2)\n```\n\n希望你看到了列表中的一个随机字母出现在屏幕上！好的，现在我们可以显示我们想要收集键盘反应的字母了。这意味着我们不想仅仅使用\
    \ `core.wait(2)` 将文本框显示两秒钟，而是希望将刺激保留在屏幕上，直到按键发生。\n\n#### 4.2.1 等待键盘输入\n\n在 PsychoPy\
    \ 中，有两种收集键盘反应的方法。第一种方法简单，但对于反应时间测量来说不是最精确的。这种方法使用 PsychoPy 的 event 模块，因此请将 event\
    \ 添加到你从 PsychoPy 导入的模块中。然后，我们将不再使用 `core.wait(2)`，而是用一个等待按键事件的命令来替换它：\n\n```python\n\
    # wait for a keypress event\nkeys = event.waitKeys(keyList=['a', 'e', 'i', 'o',\
    \ 'u'])\nprint(keys)\n```\n\n使用 `event.waitKeys(keyList=['a', 'e', 'i', 'o', 'u'])`，参数\
    \ keyList 指示要监视的按键列表。如果我们不提供这个参数，PsychoPy 将响应任何被按下的键。如果你查看输出窗口，你应该能看到你刚刚按下的键的名称。\n\
    \nevent 模块是监视按键事件的一种简单方法，但它不是收集反应时间的最佳选择。原因在于 event 模块中键盘的轮询与主线程是同步的，这意味着轮询发生在每次帧刷新时。另一件事是\
    \ event 模块只检测按键按下事件（当一个键被按下时）；有时监视按键释放事件（当一个键停止被按下时）也很有用。这使我们能够访问其他属性，例如按键持续时间或某个键是否当前正被按下（即，当按键按下事件发生，但按键释放事件尚未发生时）。监视按键反应的第二种方法是使用\
    \ hardware 模块。为此，我们首先在脚本开头添加另一个导入：\n\n```python\nfrom psychopy.hardware import\
    \ keyboard\n```"
