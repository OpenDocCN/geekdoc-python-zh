  md: '```

    # create a range of numbers between 0 and 2 pi

    x = numpy.arange(0, 2*numpy.pi, 0.01)

    # create a sine wave

    sine = numpy.sin(x)

    ```


    Now that you created a sine wave, you can visualise it by using Matplotlib:


    ```

    from matplotlib import pyplot

