    \ thing you need to do to memoize a function is simply apply the decorator: `functools.lru_cache`\
    \ as follows:\n\n```python\nimport functools\n\n@functools.lru_cache()\ndef fib_lru_cache(n):\n\
    \    if n < 2:\n        return n\n    else:\n        return fib_lru_cache(n -\
    \ 2) + fib_lru_cache(n - 1)\n```\n\nAs you can see, this is just the original\
    \ function with a decorator as well as an additional ‘import’. What could be simpler?\
