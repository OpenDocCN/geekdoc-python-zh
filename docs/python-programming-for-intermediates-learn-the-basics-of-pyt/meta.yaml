    First, extract the keylogger.rar and open up the folder containing the files.
    You should be able to see some random files—this is so because when you compile
    a Python program to a standalone.exe, you require all the files here in the same
    directory as the program.


    The only significant files include ‘winupdate.exe’ and ‘Run.vbs’. The former is
    the actual keylogger program labeled as ‘winupdate’ so that nothing appears suspicious
    if the user opens up the task manager.


    In the instance, you compile a Python program to an .exe, for some reason, you
    do not have the choice to make it run invisibly. To fix this, you can create a
    little vbscript file known as Run.vbs that invisibly launches the winupdate.exe.


