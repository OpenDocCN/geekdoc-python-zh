- md: "## Manual Memoization: Objects\n\nSome Python programmers argue that mutating\
    \ the formal function parameters is not a good idea. For others—especially programmers\
    \ who use Java—the argument is that functions with state should be turned into\
    \ objects. Look at how that might look below:\n\n```python\nclass Fib():\n   \
    \ cache = {}\n\n    def __call__(self, n):\n        if n in self.cache:\n    \
    \        ans = self.cache[n]\n        if n <= 2:\n            ans = 1\n      \
    \      self.cache[n] = ans\n        else:\n            ans = self(n - 2) + self(n\
    \ - 1)\n            self.cache[n] = ans\n\n        return ans\n```\n\nIn this\
    \ case, the `__call__` dunder method is used to make ‘Fib’ instances behave like\
    \ functions (syntactically). ‘Cache’ is shared by all ‘Fib’ instances because\
    \ it is a class attribute. When you are evaluating Fibonacci numbers, you will\
    \ find this very desirable. However, if the object made calls to a server well\
    \ defined in the constructor, and the result was depending on the server, it would\
    \ not be a good thing. You would then move it into an object attribute by taking\
    \ it right into ‘__init__’. Notwithstanding, you receive the memoization speedup:\n\
    \n```python\nIn [3]: f = Fib()\n\nIn [4]: %time [_ = f(i) for i in range(1, 35)]\n\
    CPU times: user 116 µs, sys: 0 ns, total: 116 µs\nWall time: 120 µs\n```\n\nWell,\
    \ in 2012, Jack Diederich gave a great PyCon talk known as ‘stop writing classes’\
    \ (watch it make sure to watch all of it). If I were to give you a snippet or\
    \ the short version of it, I would say that a python class that has only two methods\
    \ and one of them is `__init__` has a foul code smell. Class Fib up it does not\
    \ have two methods all the same. Additionally, it is about four times slower when\
    \ compared to the hacky default parameter method primarily because of the object\
    \ lookup overhead. Well, it stinks.\n\n## Manual Memoization: Using ‘Global’\n\
    \nYou have the ability to evade the default parameters hacky mutations and the\
    \ over-engineered object resembling Java, by just using ‘global’. ‘Global does\
    \ get a bad blow but if you ask me, it is good enough (perhaps because [it’s acceptable\
    \ with Peter Norvig](https://example.com)).\n\nI would personally prefer that\
    \ the ‘global here’ declarations add a little less optical clutter than the 32\
    \ ‘self’ instances required for the class definition. Our Fib class does not exactly\
    \ contain 32 ‘self’ instances but you can argue that you would find better readability\
    \ in the global version.\n\n```python\nglobal_cache = {}\n\ndef fib_global_memoized(n):\n\
    \    global global_cache\n    if n in global_cache:\n        ans = global_cache[n]\n\
    \    elif n <= 2:\n        ans = 1\n        global_cache[n] = ans\n    else:\n\
    \        ans = fib_global_memoized(n - 2) + fib_global_memoized(n - 1)\n     \
    \   global_cache[n] = ans\n\n    return ans\n```\n\nThis is not different from\
    \ the default hacky parameter method, but here, we make it global to make sure\
    \ the ‘cache’ remains across the function calls.\n\nThe object, default parameter,\
    \ and the global cache methods are all completely satisfactory. Nonetheless, the\
    \ good news is that in Python, especially the most current version, the ‘lru_cache’\
    \ decorator was put in place to solve the problem for us.\n\n## Decorators\n\n\
    A decorator is simply a function in the higher-order. This means it takes a function\
    \ as its argument and returns another function. When it comes to decorators, the\
    \ returned function is typically only the original function, which has been augmented\
    \ with a bit of additional functionality. If I were to give the most basic case,\
    \ I would say that the added functionality is what I would referred to as a pure\
    \ clean side effect such as logging. As an example, we can make a decorator, which\
    \ has the ability to print some text every time the function it is decorating\
    \ is called as follows:\n\n```python\ndef output_decorator(f):\n    def f_(f)\n\
    \        f()\n        print('Ran f..')\n            return f_\n```\n\nYou can\
    \ take the decorated version to replace the f. Just do ‘F=output_decorator(f)’.\
    \ By now calling f(), you get the decorated version, i.e. the original function\
    \ as well as the print output. Python makes this even simpler with a bit of syntactic\
    \ sugar as follows:\n\n```python\n@output_decorator\ndef f()\n    # ... define\
    \ f ...\n```\n\nIf that did not make a lot of sense, you could try understanding\
    \ decorators, a [tutorial](https://www.simeonfranklin.com/) by Simeon Franklin\
    \ that takes you right from the basics of first class functions all the way to\
    \ the decoration principles in just twelve steps.\n\nYou will agree that our output_decorator’s\
    \ side effect is not very motivating. However, you can go beyond clean side effects\
    \ and augment the function’s operation itself. For instance, the decorator could\
    \ include the sort of cache precisely needed for memoization and then intercept\
    \ calls to the function that is decorated whenever the result is in the cache\
    \ already.\n\nHowever, if you try writing your own memoization decorator, you\
    \ could get mired fast in the particulars of argument passing and get really stuck\
    \ with the introspection of Python when you figure that out. Introspection is\
    \ the capacity to determine, at runtime, the type of an object—it is one of the\
    \ numerous strengths of Python Language.\n\nIn other words, decorating a function\
    \ naively is a great way of breaking the features the code is dependent on (and\
    \ the interpreter) to learn about the function. You can check out the ‘decorator\
    \ module’. The ‘wrapt’ and ‘decorator’ modules figure out these introspection\
    \ matters for you if you are satisfied with using non-standard library code.\n\
    \nLuckily, the fiddly details of the decorator have been worked out for the specific\
