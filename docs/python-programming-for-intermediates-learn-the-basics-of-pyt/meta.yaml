    \n你需要注意到你正在使用实时数据；因此，你的结果取决于当前在太空中的人数。\n\n### 显示飞船：挑战\n\nWeb 服务还提供了他们所在的飞船——除了宇航员的名字外，比如国际空间站。你可以添加到脚本中，以便也打印出宇航员所在的飞船。\n\
