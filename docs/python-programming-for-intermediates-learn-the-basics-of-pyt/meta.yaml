    \         ignore_zero_division):\n    try:\n        return number / divisor\n\
    \    except OverflowError:\n        if ignore_overflow:\n            return 0\n\
    \        else:\n            raise\n    except ZeroDivisionError:\n        if ignore_zero_division:\n\
    \            return float('inf')\n        else:\n            raise\n```\n\nYou\
    \ will note that this function is straightforward and the call will thus ignore\
    \ the overflow ‘float’ from division and return zero as a result."
  - "[PAGE 95]\n\n```\nresult = safe_division(1, 10**500, True, False)\nprint(result)\n\
    \n>>>\n    0.0\n```\n\nThis call ignores the error arising from dividing by zero\
    \ and returns infinity.\n\n```\nresult = safe_division(1, 0, False, True)\nprint(result)\n\
    \n>>>\n    inf\n```\n\nThe issue here is that it is quite easy to confuse the\
    \ exact position of both Boolean arguments controlling the behavior ignoring the\
    \ exception. This could easily bring about bugs that are very difficult to track\
    \ down. A good way to increase the code's readability is using the keyword arguments.\
    \ By default, the function can be extremely cautious and\n\nThe callers can then\
    \ use keyword arguments to specify the kind of ignore flags they need to flip\
    \ for particular operations to override the default behavior.\n\n```\nsafe_division_b(1,\
    \ 10**500, ignore_overflow=True)\nsafe_division_b(1, 0, ignore_zero_division=True)\n\
    ```\n\nThe keyword arguments are essentially optional behavior, such that there\
    \ is nothing forcing your functions' callers to use the keyword arguments for\
    \ clarity. With positional arguments, you can still be able to call it the old\
    \ way even with the new 'safe_division_b' definition.\n\n```\nsafe_division_b(1,\
    \ 10**500, True, False)\n```\n\nWith such complex function, you will want to require\
    \ that callers have their intentions clear. In Python, you can demand clarity\
    \ by making sure you define your functions with keyword-only"
  - "[PAGE 96]\n\narguments. Such arguments cannot be supplied by position, only by\
    \ keyword.\n\nIn this case, you redefine the function ‘safe_division’ such that\
    \ it accepts keyword-only arguments. The asterisk * in the argument list designates\
    \ the end of positional arguments and the start of keyword-only arguments.\n\n\
    ```\ndef safe_division_c(number, divisor, *,\n    ignore_overflow=False,\n   \
    \ ignore_zero_division=False):\n    # ...\n```\n\nAt this point, it will not be\
    \ workable to call the function for the keyword argument with positional arguments.\n\
    \n```\nsafe_division_c(1, 10**500, True, False)\n```\n\n```\n>>>\nTypeError: safe_division_c()\
    \ takes 2 positional arguments but 4 were given\n```\n\nKeyword arguments and\
    \ their default values work as expected.\n\n```\nsafe_division_c(1, 0, ignore_zero_division=True)\
    \ # OK\n```\n\n```\ntry:\n    safe_division_c(1, 0)\nexcept ZeroDivisionError:\n\
    \    pass # Expected\n```"
  - "[PAGE 97]\n\n# Python 2’s Keyword-Only Arguments\n\nUnfortunately, unlike Python\
    \ 3, Python 2 does not have an explicit syntax for specifying keyword-only arguments.\
    \ Nonetheless, you can still attain the same behavior of getting ‘TypeErrors’\
    \ for function calls that are not valid with the operator ‘**’ in the argument\
    \ lists. This operator is the same as the * operator. The only difference being\
    \ that it takes whichever number of keyword arguments instead of taking a variable\
    \ number of positional arguments regardless of the fact that they may not be defined.\n\
    \n```\n# Python 2\ndef print_args(*args, **kwargs):\n    print 'Positional:',\
    \ args\n    print 'Keyword: ', kwargs\n\nprint_args(1, 2, foo='bar', stuff='meep')\n\
    \n>>>\nPositional: (1, 2)\n    Keyword:  {'foo': 'bar', 'stuff': 'meep'}\n```\n\
    \nIf you want to have ‘safe_division’ take arguments that are keyword-only in\
    \ Python 2, you need to have the function take **kwargs. After that, you ‘pop’\
    \ the expected keyword arguments—that is, out of the kwargs dictionary with the\
    \ second argument of the ‘pop’ method to lay down the default value when the key\
    \ is not there. Lastly, you will need to ensure there are no more keyword arguments\
    \ remaining in kwargs so that the callers do not supply invalid arguments."
  - "[PAGE 98]\n\n```\n# Python 2\ndef safe_division_d(number, divisor, **kwargs):\n\
    \    ignore_overflow = kwargs.pop('ignore_overflow', False)\n    ignore_zero_div\
    \ = kwargs.pop('ignore_zero_division', False)\n    if kwargs:\n        raise TypeError('Unexpected\
    \ **kwargs: %r' % kwargs)\n        # ...\n```\n\nYou can now call the function\
    \ using or without using the keyword arguments.\n\n```\nsafe_division_d(1, 10)\n\
    safe_division_d(1, 0, ignore_zero_division=True)\nsafe_division_d(1, 10**500,\
    \ ignore_overflow=True)\n```\n\nJust as is the case with Python 3, it will not\
    \ be workable to passing keyword-only arguments.\n\n```\nsafe_division_d(1, 0,\
    \ False, True)\n>>>\nTypeError: safe_division_d() takes 2 positional arguments\
    \ but 4 were given\n```\n\nTrying to pass unexpected keyword arguments also won't\
    \ work.\n\n```\nsafe_division_d(0, 0, unexpected=True)\n>>>\n    TypeError: Unexpected\
    \ **kwargs: {'unexpected': True}\n```\n\n# DO NOT FORGET THE FOLLOWING:\n\n+ \
    \  √ Keyword arguments usually make a function's intention clearer.\n√ You could\
    \ use keyword-only arguments to enable you to force callers to actually supply\
    \ keyword arguments for any function that is potentially confusing. This particularly\
    \ applies to those that accept more than a single multiple Boolean flag."
- md: "## Namespaces in Python\n\nIn real life, name conflicts occur all the time.\
    \ For instance, most schools you have attended have had no less than two students\
    \ sharing the first name. For instance, when a teacher asked for student Y, most\
    \ of the other students would enthusiastically inquire about the one he or she\
    \ is talking about (since perhaps there are two students with the name Y). After\
    \ that, in this case, the teacher would give a last name and the right Y would\
    \ respond.\n\nYou would agree that if everyone had a special name, all the confusion\
    \ here and process of determining the right person talked about by seeking out\
    \ additional information alongside a first name would be easy to avoid. In a class\
    \ that has 20 or 30 students, this may not be a problem. However, in a school,\
    \ city, town—or even a country—it may not be possible to create a unique, relevant,\
    \ and simple-to-remember name for all the kids in those areas. Moreover, another\
    \ problem would be making sure we give each child a unique name; that is determining\
    \ whether someone else has a name with the same pronunciation as a given name\
    \ (for instance Macie, Maci, or Macey).\n\nProgramming may also face a very similar\
    \ conflict.\n\nWhen a programmer is writing a 30-line program without any external\
    \ dependencies, it is very easy for him or her to provide unique and relevant\
    \ names to all the variables. However, similarly, when there are a few thousand\
    \ lines in the program and perhaps some external modules loaded as well, there\
    \ arises a need for a system to manage names. This brings us to our topic of Namespaces.\n\
    \nIn this section, you will understand why they are important and scope resolution\
    \ in Python.\n\n## Meaning of Namespaces\n\nA namespace is a system of making\
    \ sure all program names are special and unique, and you, the programmer, can\
    \ use them without causing any conflict. By now, you should know very well that\
    \ all Python stuff such as functions, lists, and strings are objects. Well, you\
    \ may want to know Python usually makes use of namespaces as dictionaries. We\
    \ have a name-to-object mapping with objects as values and names as keys. Many\
    \ different namespaces can actually use one name and then proceed to map it to\
    \ a distinct object.\n\nLook at the following namespace examples.\n\n**Local namespaces:**\
    \ These namespaces comprise local names within a function. The creation of such\
    \ namespaces happens when functions are called, and only last up until the functions\
    \ return.\n\n**Global namespaces:** These namespaces comprise names from different\
    \ imported modules used in a project. Their creation happens when the modules\
    \ are incorporated into the project and stick around only before the scripts end.\n\
    \n**Built-in namespaces:** These namespaces consist of built-in exception names\
    \ and built-in functions.\n\nEven though we will discuss modules in a later chapter,\
    \ you need to note that there are useful arithmetic functions in different modules.\
    \ For instance, the cmath and math modules contain many functions that are shared\
    \ in the two, such as acos(), exp(), cos(), log10() and so on. If you use both\
    \ modules in one program, you will need to prefix them with the module’s name\
    \ if you want to be able to use the functions unambiguously—for instance, cmath.log10()\
    \ and math.log10().\n\n## Scope\n\nNamespaces are important because for one, they\
    \ identify the whole list of names within a program. Nonetheless, this does not\
    \ necessarily imply that variable names can be used anywhere. A name also contains\
    \ a scope defining the sections of the program that the name would be used without\
    \ the use of any prefix.\n\nSimilar to namespaces, we also have many scopes in\
    \ a program. Look at the following list of a number of scopes that can be in the\
    \ course of a program execution.\n\n- Local scope: The local scope is the innermost\
    \ scope containing a list of local names that are available in the existing function.\n\
    - The scope of the whole enclosing functions. A name search begins from the enclosing\
    \ scope that is nearest, moving outwards.\n- A module level scope containing the\
    \ entire list of global names from the existing module.\n- The outermost scope\
    \ containing the entire list of built-in names—this scope is usually searched\
    \ last to get the referenced name.\n\n## Scope Resolution\n\nAs we have already\
    \ seen, a search for a particular name begins from the innermost function before\
    \ moving higher until the name is mapped to the object (by the program). In cases\
    \ where the program does not find such name within the namespaces, the program\
    \ then raises what’s referred to as a NameError exception. As we start, try to\
    \ type ‘dir()’ in a python IDE such as IDLE.\n\n```\ndir()\n# ['__builtins__','__doc__','__loader__','__name__',\n\
    '__package__','__spec__']\n```\n\nAll the names listed by dir() are offered in\
    \ all Python programs. Just to be brief, I will, in the other examples, begin\
    \ by referring to these names as ‘__builtins__’…‘__specs__’.\n\nLet us see the\
    \ result of the dir() function once we define a variable and a function.\n\n```\n\
    a_num = 10\ndir()\n# ['__builtins__' .... '__spec__', 'a_num']\n```\n\n```\ndef\
    \ some_func():\n    b_num = 11\n    print(dir())\n```\n\n```\nsome_func()\n# ['b_num']\n\
    ```\n\n```\ndir()\n# ['__builtins__' ... '__spec__', 'a_num', 'some_func']\n```\n\
    \nThe function ‘dir()’ outputs the name list within the existing scope. This is\
    \ exactly why there is just a single name named b_num within the ‘some_func()’\
    \ scope. When you call ‘dir()’ after you define ‘some_func()’, you get it added\
    \ to the name list present in the global namespace.\n\nWe will now look at the\
    \ name list within some nested functions. Note that the code present in this block\
    \ goes on from the previous block.\n\n```\ndef outer_func():\n    c_num = 12\n\
    \    def inner_func():\n        d_num = 13\n        print(dir(), ' - names in\
    \ inner_func')\n    e_num = 14\n    inner_func()\n    print(dir(), ' - names in\
    \ outer_func')\n\nouter_func()\n# ['d_num'] - names in inner_func\n# ['c_num',\
    \ 'e_num', 'inner_func'] - names in outer_func\n```\n\nThe code above is defining\
    \ two variables and one function within the ‘outer_func()’ scope. The ‘dir()’\
    \ only prints the ‘d_num’ name within the ‘inner_func()’. Since there is no other\
    \ variable defined in there apart from ‘d_num’, it is fair.\n\nWhen we reassign\
    \ a global name within a local namespace, we create a new local variable containing\
    \ the same name; this is so unless plainly specified with global. The code below\
    \ describes this more evidently.\n\n```\na_num = 10\nb_num = 11\n\ndef outer_func():\n\
    \    global a_num\n    a_num = 15\n    b_num = 16\n    def inner_func():\n   \
    \     global a_num\n        a_num = 20\n        b_num = 21\n        print('a_num\
    \ inside inner_func :', a_num)\n        print('b_num inside inner_func :', b_num)\n\
    \    inner_func()\n    print('a_num inside outer_func :', a_num)\n    print('b_num\
    \ inside outer_func :', b_num)\n\nouter_func()\nprint('a_num outside all functions\
    \ :', a_num)\nprint('b_num outside all functions :', b_num)\n\n# a_num inside\
    \ inner_func : 20\n# b_num inside inner_func : 21\n\n# a_num inside outer_func\
    \ : 20\n# b_num inside outer_func : 16\n\n# a_num outside all functions : 20\n\
    # b_num outside all functions : 11\n```\n\n‘a_num’ has been declared within the\
    \ ‘outer_func()’ and also ‘inner_func()’ to be a global variable. A different\
    \ value is just being set for a similar global variable. It is for this reason\
    \ that the ‘a_num’ value is 20 at all locations. Each function, on the other hand,\
    \ builds its own variable ‘b_num’ with a local scope; the function ‘print()’ then\
    \ prints this locally scoped variable’s value.\n\n**Download the Audiobook version\
    \ of this book by clicking here:**\n\n[https://itunes.apple.com/us/audiobook/python-programming-your-intermediate-guide-to-learn/id1448033975](https://itunes.apple.com/us/audiobook/python-programming-your-intermediate-guide-to-learn/id1448033975)"
  mdcn: "## Python 中的命名空间\n\n在现实生活中，名称冲突时有发生。例如，你上过的大多数学校里，同名的学生至少有两个。比如，当老师叫学生 Y\
    \ 时，其他大多数学生都会热情地询问他指的是哪一位（因为可能有两个叫 Y 的学生）。在这种情况下，老师会说出姓氏，然后正确的 Y 会做出回应。\n\n你会同意，如果每个人都有一个特殊的名字，那么这里所有的困惑以及通过在名字之外寻找额外信息来确定所谈论的正确人物的过程，都可以轻松避免。在一个有\
    \ 20 或 30 名学生的班级里，这可能不是问题。然而，在一所学校、一个城市、一个城镇——甚至一个国家——为所有这些地区的孩子都创建一个独特、相关且易于记忆的名字可能是不可能的。此外，另一个问题是确保我们给每个孩子一个独特的名字；也就是说，确定是否有其他人拥有与给定名字发音相同的名字（例如\
    \ Macie、Maci 或 Macey）。\n\n编程也可能面临非常相似的冲突。\n\n当程序员编写一个没有外部依赖的 30 行程序时，他或她很容易为所有变量提供独特且相关的名字。然而，类似地，当程序有几千行代码，并且可能还加载了一些外部模块时，就需要一个系统来管理名称。这引出了我们的主题：命名空间。\n\
    \n在本节中，你将理解它们为何重要以及 Python 中的作用域解析。\n\n## 命名空间的含义\n\n命名空间是一个确保所有程序名称都是特殊且唯一的系统，你作为程序员可以使用它们而不会引起任何冲突。到现在，你应该非常清楚所有\
    \ Python 的东西，如函数、列表和字符串都是对象。嗯，你可能想知道 Python 通常将命名空间用作字典。我们有一个名称到对象的映射，其中对象是值，名称是键。许多不同的命名空间实际上可以使用一个名称，然后将其映射到不同的对象。\n\
    \n看看下面的命名空间示例。\n\n**局部命名空间：** 这些命名空间包含函数内的局部名称。此类命名空间的创建发生在函数被调用时，并且仅持续到函数返回。\n\
    \n**全局命名空间：** 这些命名空间包含项目中使用的不同导入模块的名称。它们的创建发生在模块被纳入项目时，并且仅在脚本结束之前存在。\n\n**内置命名空间：**\
    \ 这些命名空间由内置异常名称和内置函数组成。\n\n尽管我们将在后面的章节中讨论模块，但你需要注意不同的模块中有有用的算术函数。例如，`cmath` 和\
    \ `math` 模块包含许多共享的函数，如 `acos()`、`exp()`、`cos()`、`log10()` 等。如果你在一个程序中同时使用这两个模块，你需要在它们前面加上模块名称，以便能够明确地使用这些函数——例如，`cmath.log10()`\
    \ 和 `math.log10()`。\n\n## 作用域\n\n命名空间很重要，因为首先，它们标识了程序中的整个名称列表。然而，这并不一定意味着变量名称可以在任何地方使用。一个名称还包含一个作用域，定义了该名称可以在不使用任何前缀的情况下使用的程序部分。\n\
    \n与命名空间类似，我们在程序中也有多个作用域。看看下面列出的在程序执行过程中可能出现的一些作用域。\n\n-   局部作用域：局部作用域是最内层的作用域，包含当前函数中可用的局部名称列表。\n\
    -   所有封闭函数的作用域。名称搜索从最近的封闭作用域开始，向外移动。\n-   模块级作用域，包含来自当前模块的整个全局名称列表。\n-   最外层的作用域，包含整个内置名称列表——这个作用域通常是最后搜索以获取引用的名称。\n\
    \n## 作用域解析\n\n正如我们已经看到的，对特定名称的搜索从最内层的函数开始，然后向上移动，直到名称被映射到对象（由程序完成）。如果程序在命名空间中找不到这样的名称，程序就会引发所谓的\
    \ `NameError` 异常。当我们开始时，尝试在 Python IDE（如 IDLE）中输入 `dir()`。\n\n```\ndir()\n# ['__builtins__','__doc__','__loader__','__name__',\n\
    '__package__','__spec__']\n```\n\n`dir()` 列出的所有名称在所有 Python 程序中都可用。为了简洁起见，我将在其他示例中首先将这些名称称为\
    \ `__builtins__`……`__specs__`。\n\n让我们看看定义一个变量和一个函数后 `dir()` 函数的结果。\n\n```\na_num\
    \ = 10\ndir()\n# ['__builtins__' .... '__spec__', 'a_num']\n```\n\n```\ndef some_func():\n\
    \    b_num = 11\n    print(dir())\n```\n\n```\nsome_func()\n# ['b_num']\n```\n\
    \n```\ndir()\n# ['__builtins__' ... '__spec__', 'a_num', 'some_func']\n```\n\n\
    函数 `dir()` 输出当前作用域内的名称列表。这就是为什么在 `some_func()` 作用域内只有一个名为 `b_num` 的名称。当你在定义 `some_func()`\
    \ 之后调用 `dir()` 时，你会看到它被添加到全局命名空间中存在的名称列表中。\n\n我们现在来看看一些嵌套函数中的名称列表。请注意，此代码块中的代码是接续前一个代码块的。\n\
    \n```\ndef outer_func():\n    c_num = 12\n    def inner_func():\n        d_num\
    \ = 13\n        print(dir(), ' - names in inner_func')\n    e_num = 14\n    inner_func()\n\
    \    print(dir(), ' - names in outer_func')\n\nouter_func()\n# ['d_num'] - names\
    \ in inner_func\n# ['c_num', 'e_num', 'inner_func'] - names in outer_func\n```\n\
    \n上面的代码在 `outer_func()` 作用域内定义了两个变量和一个函数。`dir()` 只打印 `inner_func()` 中的 `d_num`\
    \ 名称。由于除了 `d_num` 之外没有定义其他变量，这是合理的。\n\n当我们在局部命名空间中重新分配一个全局名称时，我们创建了一个包含相同名称的新局部变量；除非明确指定为\
    \ `global`，否则情况如此。下面的代码更清楚地说明了这一点。\n\n```\na_num = 10\nb_num = 11\n\ndef outer_func():\n\
    \    global a_num\n    a_num = 15\n    b_num = 16\n    def inner_func():\n   \
    \     global a_num\n        a_num = 20\n        b_num = 21\n        print('a_num\
    \ inside inner_func :', a_num)\n        print('b_num inside inner_func :', b_num)\n\
    \    inner_func()\n    print('a_num inside outer_func :', a_num)\n    print('b_num\
    \ inside outer_func :', b_num)\n\nouter_func()\nprint('a_num outside all functions\
    \ :', a_num)\nprint('b_num outside all functions :', b_num)\n\n# a_num inside\
    \ inner_func : 20\n# b_num inside inner_func : 21\n\n# a_num inside outer_func\
    \ : 20\n# b_num inside outer_func : 16\n\n# a_num outside all functions : 20\n\
    # b_num outside all functions : 11\n```\n\n`a_num` 在 `outer_func()` 和 `inner_func()`\
    \ 中都被声明为全局变量。只是为同一个全局变量设置了不同的值。这就是为什么 `a_num` 的值在所有位置都是 20。另一方面，每个函数都创建了自己的具有局部作用域的变量\
    \ `b_num`；函数 `print()` 然后打印这个局部作用域变量的值。\n\n**点击此处下载本书的有声书版本：**\n\n[https://itunes.apple.com/us/audiobook/python-programming-your-intermediate-guide-to-learn/id1448033975](https://itunes.apple.com/us/audiobook/python-programming-your-intermediate-guide-to-learn/id1448033975)"
