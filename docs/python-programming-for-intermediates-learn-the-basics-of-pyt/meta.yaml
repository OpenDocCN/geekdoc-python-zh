    \n![](img/38ddc0cf78b6723be2853d1c42dfdfa0_13_0.png)\n\n为其中一个列表的元素分配新值可确保没有副作用。当你倾向于更改子列表的单个元素时，问题就会出现。\n\
    \n```\n>>> lst1 = ['a','b',['ab','ba']]\n>>> lst2 = lst1[:]\n>>> lst2[0] = 'c'\n\
