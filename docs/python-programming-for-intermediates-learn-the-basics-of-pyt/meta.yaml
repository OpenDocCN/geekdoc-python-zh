    Instead of trying to ‘code a bit and test a bit’, the intuitive, the extreme programming
    crowd has brought to us the very useful but quite counterintuitive maxim: ‘test
    a bit and code a bit’.


    In different terms, you test first and then code later—in what we also refer to
    as test-driven programming. This approach could seem unfamiliar at first but it
    has numerous advantages and over time, it grows on you. In the end, once you have
    used test-driven programming for a while, writing code without putting it into
    use could appear backwards.


    # PRECISE REQUIREMENT SPECIFICATION


