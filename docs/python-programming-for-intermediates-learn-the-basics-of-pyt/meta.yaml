    \ `valid_words` 中。注意处理重复字母；字母组中的字母一旦被使用，就不能再次使用。\n\n## 计分\n\n现在编写代码，使用上述分数字典为每个有效单词确定\
    \ Scrabble 分数。\n\n## 检查你的工作\n\n在这一步，问问自己，如果你在以下输出上运行脚本会发生什么：\n\n```\n$ python\
