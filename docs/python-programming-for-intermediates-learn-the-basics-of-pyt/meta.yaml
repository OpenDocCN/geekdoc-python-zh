    # Applications of Recursion


    Usually, recursion is a computer science subject studied at an advanced level.
    The main use of recursion is to solve difficult or complex problems that one can
    break down into smaller, identical problems.


    You do not entirely require recursion to solve a problem because many problems
    that recursion can solve can equally be solved using loops. Moreover, compared
    to a recursive function, a loop could be more efficient. Recursive functions typically
    need more resources and memory than loops, which makes them less efficient in
    many cases. At times, this usage requisite is called ‘overhead’.


    Having said that, I know you might now be asking yourself, “why waste time with
    recursion when I can just use a loop?” In any case, you already know how to use
    loops and this seems like pile of work. If you think so, I would totally understand
    even though it is ideal in itself. When you are trying to solve complex problems,
    a recursive function is a quicker, easier, and simpler way to construct and code.


    You can think of the following ‘rules’:


    +   ✓ If you can solve the problem without recursion right now, the function just
    returns a value.


    ✓ If you cannot solve the problem without recursion now, the function cuts the
    problem into something smaller but similar, and'
