    \ greets to\n    the person with the\n    provided message.\n\n    If message\
    \ is not provided,\n    it defaults to \"Good\n    morning!\"\n    \"\"\"\n\n\
    \    print(\"Hello\",name + ',' + msg)\n\ngreet(\"Kate\")\ngreet(\"Bruce\",\"\
    How do you do?\")\n```\n\nThe parameter ‘name’ in this function does not contain\
    \ a default value and during a call, it is compulsory. Conversely, the ‘msg’ parameter\
    \ contains a default ‘good morning!’ value. Thus, during a call, it is optional.\
    \ If a value is offered, it overwrites the default value.\n\nIn a function, any\
    \ given number of arguments can contain a default value but when you have a default\
    \ argument, all arguments to its right have to have default values as well. This\
    \ thus means that there is no way non-default arguments can follow the default\
    \ arguments. For instance, if we had the function header defined above as follows:\n\
    \n```\ndef greet(msg = \"Good morning!\", name):\n```\n\nIn this case, you would\
    \ receive the following error\n\n```\nSyntaxError: non-default argument follows\
    \ default argument\n```\n\n# 2: PYTHON KEYWORD ARGUMENTS"
