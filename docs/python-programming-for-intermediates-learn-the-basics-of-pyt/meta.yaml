  md: "# The Fibonacci Square\n\nThe usual Memoization expository example is the Fibonacci\
    \ sequence where every item in the sequence is the sum total of the previous double\
    \ items. Look at a Python implementation below:\n\n```\ndef fib(n):\n    if n\
    \ <= 2:\n        return 1\n    else:\n        return fib(n - 2) + fib(n - 1)\n\
    ```\n\nThe naïve recursive approach has a problem in that the total number of\
    \ calls swells exponentially with n- that makes it quite expensive for the large\
    \ n:\n\n```\nIn [1]: [_ = fib(i) for i in range(1, 35)]\nCPU times: user 30.6\
    \ s, sys: 395 ms, total: 31 s\nWall time: 31.9 s\n```\n\nTo make an evaluation\
    \ of fib (10), you require to compute fib(8) as well as fib(9). However, we already\
    \ computed the former when computing the latter. The trick here is remembering\
    \ these results. This is what we know as Memoization.\n\nThis section has a mnemonic\
    \ you can be able to memorize a function in the latest version of Python by importing\
    \ ‘functools’ and also adding the decorator ‘@functools.lru_cache’ to the function.\
    \ We will discuss this towards the end of this section.\n\nIf you want to know\
    \ a little more about the way memorization works in Python, and why doing it manually\
    \ has ugly compromises (syntactically) and what decorators are, you can continue\
    \ reading on the manual Memoization approaches."
