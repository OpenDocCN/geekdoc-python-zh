  md: '# Namespaces in Python


    In real life, name conflicts occur all the time. For instance, most schools you
    have attended have had no less than two students sharing the first name. For instance,
    when a teacher asked for student Y, most of the other students would enthusiastically
    inquire about the one he or she is talking about (since perhaps there are two
    students with the name Y). After that, in this case, the teacher would give a
    last name and the right Y would respond.


    You would agree that if everyone had a special name, all the confusion here and
    process of determining the right person talked about by seeking out additional
    information alongside a first name would be easy to avoid. In a class that has
    20 or 30 students, this may not be a problem. However, in a school, city, town—or
    even a country—it may not be possible to create a unique, relevant, and simple-to-remember
    name for all the kids in those areas. Moreover, another problem would be making
    sure we give each child a unique name; that is determining whether someone else
    has a name with the same pronunciation as a given name (for instance Macie, Maci,
    or Macey).


    Programming may also face a very similar conflict.


    When a programmer is writing a 30-line program without any external dependencies,
    it is very easy for him or her to provide unique and relevant names to all the
    variables. However, similarly, when there are a few thousand lines in the program
    and perhaps some external modules loaded as well, there arises a *are files that
    contain the definitions and statements of Python*. This brings to us to our topic
    of Namespaces.'
  merge: -1
