- md: "## The Function ‘Super()’\n\nThe function can help you gain some access to\
    \ the inherited methods overridden in a class object. When you use this function,\
    \ you are essentially calling a parent method into a child method to be able to\
    \ use it. For instance, you may want to override a single parent method’s aspect\
    \ with a particular functionality, but then call the other original parent method\
    \ to complete the method.\n\nIn a students’ grading program, you may want to have\
    \ a parent’s class method ‘weighted_grade’ overridden to be able to have the original\
    \ class functionality included. When you invoke the function ‘super()’ you can\
    \ achieve this.\n\nThis function is usually used inside the method `__init__()`\
    \ as this is where you will most likely require adding a bit of uniqueness to\
    \ the child class and then finish the initialization from the parent. Let us try\
    \ modifying the child class ‘Trout’ so that you see how this works.\n\nTrout are\
    \ naturally freshwater fish; thus, you will have to include the variable ‘water’\
    \ to the method ‘__init__()’ and set it equal to the ‘freshwater’ string, but\
    \ then maintain the other parent class’ parameters and variables:\n\n```python\n\
    # fish.py\n...\nclass Trout(Fish):\n    def __init__(self, water = \"freshwater\"\
    ):\n        self.water = water\n        super().__init__(self)\n...\n```\n\nAs\
    \ you can see the `__init__()` method has been overridden in the child class ‘Trout’\
    \ thus giving a different implementation of the `__init__()` that is already defined\
    \ by the ‘Fish’ parent class. Within the ‘Trout’ class’ `__init__()` method, the\
    \ ‘Fish’ class’ `__init__()` method has been invoked explicitly.\n\nSince you\
    \ have overridden the method, you do not need to pass ‘first_name’ in as a ‘Trout’\
    \ parameter anymore, and if you passed in a parameter, you would instead have\
    \ to reset ‘freshwater’. You will thus call the variable in your object instance\
    \ to initialize the ‘first_name’.\n\nYou can now invoke the initialized parent\
    \ class variables and use the unique child variable as well. Try using in the\
    \ ‘Trout’ instance:\n\n```python\n# fish.py\n...\nterry = Trout()\n\n# Initialize\
    \ first name\nterry.first_name = \"Terry\"\n\n# Use parent __init__() through\
    \ super()\nprint(terry.first_name + \" \" + terry.last_name)\nprint(terry.eyelids)\n\
    \n# Use child __init__() override\nprint(terry.water)\n\n# Use parent swim() method\n\
    terry.swim()\n```\n\nOutput:\n```\nTerry Fish\nFalse\nfreshwater\nThe fish is\
    \ swimming.\n```\n\nAccording to the output, the ‘terry’ object in the child class\
    \ ‘Trout’ can use the `__init__()` variable ‘water’ that is child specific, while\
    \ at the same time being able to call the `__init__()` variable of ‘last_name’,\
    \ ‘eyelids’ and ‘first_name’ in the ‘Fish’ parent. Thus, the inbuilt `super()`\
    \ function in Python enables you to make good use of the parent class methods\
    \ even when overriding particular aspects in our child classes of these methods.\n\
    \n## Multiple Inheritance\n\nA class can inherit methods and attributes from multiple\
    \ parent classes in what we call multiple inheritance. It has the ability to allow\
    \ programs to decrease redundancy and introduces a particular level of complexity\
    \ not to mention ambiguity—thus, you should do it with the entire program design\
    \ in mind.\n\nWe will try to make a child class ‘CoralReef’ that inherits from\
    \ a ‘Anemone’ and ‘Coral’ classes. You can create a method in each and use the\
    \ keyword ‘pass’ in the child class ‘CoralReef’ as follows:\n\n```python\n# coral_reef.py\n\
    \nclass Coral:\n    def community(self):\n        print(\"Coral lives in a community.\"\
    )\n\nclass Anemone:\n    def protect_clownfish(self):\n        print(\"The anemone\
    \ is protecting the clownfish.\")\n\nclass CoralReef(Coral, Anemone):\n    pass\n\
    ```\n\nThe class ‘Coral’ contains a method known as ‘community()’ that prints\
    \ a single line, and the class ‘Anemone’ contains a method known as ‘protect_clownfish()’\
    \ that prints another line. We then call both of these classes into the tuple\
    \ inheritance. Therefore, ‘CoralReef’ is simply inheriting from 2 parent classes.\n\
    \nWe will now instantiate an object ‘great_barrier’ as follows:\n\n```python\n\
    # coral_reef.py\n...\ngreat_barrier = CoralReef()\ngreat_barrier.community()\n\
    great_barrier.protect_clownfish()\n```\n\nThe ‘great_barrier’ object has been\
    \ created as a ‘CoralReef’ object and can actually use the methods in the two\
    \ parent classes. Running the program will give you the output below:\n\nOutput:\n\
    ```\nCoral lives in a community.\nThe anemone is protecting the clownfish.\n```\n\
    \nAs you can see in the output, the methods from the two parent classes were effectively\
    \ used in the child classes.\n\nMultiple inheritances will allow you to use the\
    \ code from multiple parent classes in a child class. If a similar method has\
    \ been defined in more than one parent method, the child class then uses the method\
    \ of the initial parent declared within its list of tuples.\n\nWhile you can use\
    \ multiple inheritances effectively, you need to do so with a lot of care so that\
    \ the programs don’t end up becoming ambiguous and hard for the other programmers\
    \ to make out.\n\n## Operator Overloading\n\nThe different operators in Python\
    \ work for in-built classes. When it comes to different types, the same operator\
    \ behaves differently. For instance, the operator ‘+’ performs addition (arithmetically)\
    \ on two numbers, concatenates two strings, and merges two lists. This Python\
    \ feature, a feature that gives the same operator the ability to have different\
    \ meanings depending on the context, is known as operator overloading.\n\nWhat\
    \ would happen when you used them with user-defined class objects? Consider the\
    \ class below that is trying to bring about a 2-D coordinate system simulation.\n\
    \n```python\nclass Point:\n    def __init__(self, x = 0, y = 0):\n        self.x\
    \ = x\n        self.y = y\n```\n\nYou can now try running the code and adding\
    \ two points in the shell.\n\n```python\n>>> p1 = Point(2,3)\n>>> p2 = Point(-1,2)\n\
    >>> p1 + p2\nTraceback (most recent call last):\n  ...\nTypeError: unsupported\
    \ operand type(s) for +: 'Point' and 'Point'\n```\n\nAs you can see, there are\
    \ a whole lot of complaints. The ‘TypeError’ came up because the program does\
    \ not know how to combine two ‘Point’ objects. Nonetheless, the good news is that\
    \ with operator overloading, you can teach this to Python. First, however, we\
    \ have to get an idea about special functions.\n\n## Python’s Special Functions\n\
    \nClass functions that start with a double underscore are known as special functions.\
    \ They, thus, are not ordinary. One of these functions is ‘__init__()’ which you\
    \ know very well. Each time you create a new object of that particular class,\
    \ it gets called.\n\nWhen you use the special functions, the class is made compatible\
    \ with the in-built functions.\n\n```python\n>>> p1 = Point(2,3)\n>>> print(p1)\n\
    <__main__.Point object at 0x0000000031F8CC0>\n```\n\nThis one did not print well\
    \ but when you define the method ‘__str__()’ in your class, you can control the\
    \ way it gets printed. Thus, try adding this to your class.\n\n```python\nclass\
    \ Point:\n    def __init__(self, x = 0, y = 0):\n        self.x = x\n        self.y\
    \ = y\n\n    def __str__(self):\n        return \"({0},{1})\".format(self.x,self.y)\n\
    ```\n\nWe will now try the function ‘print’ once more.\n\n```python\n>>> p1 =\
    \ Point(2,3)\n>>> print(p1)\n(2,3)\n```\n\nYou can see that what we get is better.\
    \ In fact, this method is also used when we are using the built-in function ‘format()’\
    \ or ‘str()’.\n\n```python\n>>> str(p1)\n'(2,3)'\n\n>>> format(p1)\n'(2,3)'\n\
    ```\n\nThus, when you do ‘format(p1)’ or ‘str(p1)’, the program is doing `p1.__str__()`.\
    \ Thus, the term special functions. That said, let us go back to operator overloading."
  mdcn: "## 函数 `super()`\n\n该函数能帮助你访问在类对象中被重写的继承方法。使用此函数时，本质上是在子方法中调用父方法以使用它。例如，你可能想用特定功能覆盖父方法的某个方面，但随后又调用其他原始父方法来完成该方法。\n\
    \n在学生成绩评分程序中，你可能希望覆盖父类的 `weighted_grade` 方法，同时保留原始类功能。调用 `super()` 函数即可实现这一点。\n\
    \n此函数通常在 `__init__()` 方法内使用，因为这里最可能需要为子类添加一些独特性，然后完成来自父类的初始化。让我们尝试修改子类 `Trout`，看看它是如何工作的。\n\
    \n鳟鱼是天然的淡水鱼；因此，你需要在 `__init__()` 方法中添加变量 `water` 并将其设置为字符串 `'freshwater'`，同时保留其他父类的参数和变量：\n\
    \n```python\n# fish.py\n...\nclass Trout(Fish):\n    def __init__(self, water\
    \ = \"freshwater\"):\n        self.water = water\n        super().__init__(self)\n\
    ...\n```\n\n如你所见，`__init__()` 方法在子类 `Trout` 中被重写，从而提供了与 `Fish` 父类中已定义的 `__init__()`\
    \ 不同的实现。在 `Trout` 类的 `__init__()` 方法内，显式调用了 `Fish` 类的 `__init__()` 方法。\n\n由于你已经重写了该方法，因此不再需要将\
    \ `first_name` 作为 `Trout` 参数传入。如果你传入了参数，则需要重置 `'freshwater'`。因此，你将在对象实例中调用该变量来初始化\
    \ `first_name`。\n\n现在你可以调用初始化的父类变量，同时使用独特的子类变量。尝试在 `Trout` 实例中使用：\n\n```python\n\
    # fish.py\n...\nterry = Trout()\n\n# 初始化名字\nterry.first_name = \"Terry\"\n\n#\
    \ 通过 super() 使用父类 __init__()\nprint(terry.first_name + \" \" + terry.last_name)\n\
    print(terry.eyelids)\n\n# 使用子类重写的 __init__()\nprint(terry.water)\n\n# 使用父类 swim()\
    \ 方法\nterry.swim()\n```\n\n输出：\n```\nTerry Fish\nFalse\nfreshwater\nThe fish is\
    \ swimming.\n```\n\n根据输出，子类 `Trout` 中的 `terry` 对象可以使用子类特有的 `__init__()` 变量 `water`，同时也能调用\
    \ `Fish` 父类中的 `last_name`、`eyelids` 和 `first_name` 等 `__init__()` 变量。因此，Python\
    \ 内置的 `super()` 函数使你即使在子类中重写了这些方法的特定方面，也能很好地利用父类方法。\n\n## 多重继承\n\n一个类可以从多个父类继承方法和属性，这称为多重继承。它能够减少程序冗余，但也引入了一定程度的复杂性，更不用说歧义了——因此，你应该在整个程序设计的背景下谨慎使用。\n\
    \n我们将尝试创建一个子类 `CoralReef`，它继承自 `Anemone` 和 `Coral` 类。你可以在每个类中创建一个方法，并在子类 `CoralReef`\
    \ 中使用关键字 `pass`，如下所示：\n\n```python\n# coral_reef.py\n\nclass Coral:\n    def community(self):\n\
    \        print(\"Coral lives in a community.\")\n\nclass Anemone:\n    def protect_clownfish(self):\n\
    \        print(\"The anemone is protecting the clownfish.\")\n\nclass CoralReef(Coral,\
    \ Anemone):\n    pass\n```\n\n`Coral` 类包含一个名为 `community()` 的方法，打印一行内容；`Anemone`\
    \ 类包含一个名为 `protect_clownfish()` 的方法，打印另一行内容。然后我们将这两个类调用到元组继承中。因此，`CoralReef` 简单地继承自两个父类。\n\
    \n现在我们将实例化一个对象 `great_barrier`，如下所示：\n\n```python\n# coral_reef.py\n...\ngreat_barrier\
    \ = CoralReef()\ngreat_barrier.community()\ngreat_barrier.protect_clownfish()\n\
    ```\n\n`great_barrier` 对象已作为 `CoralReef` 对象创建，并且实际上可以使用两个父类中的方法。运行程序将得到以下输出：\n\
    \n输出：\n```\nCoral lives in a community.\nThe anemone is protecting the clownfish.\n\
    ```\n\n如你所见，两个父类的方法在子类中被有效使用。\n\n多重继承允许你在子类中使用来自多个父类的代码。如果一个类似的方法在多个父方法中定义，那么子类将使用其元组列表中声明的第一个父类的方法。\n\
    \n虽然你可以有效地使用多重继承，但需要非常小心，以免程序最终变得模糊不清，难以被其他程序员理解。\n\n## 运算符重载\n\nPython 中的不同运算符适用于内置类。对于不同类型，相同运算符的行为不同。例如，运算符\
    \ `+` 对两个数字执行算术加法，连接两个字符串，并合并两个列表。Python 的这个特性——使相同运算符根据上下文具有不同含义的能力——称为运算符重载。\n\
    \n当你将它们与用户定义的类对象一起使用时会发生什么？考虑下面这个试图模拟二维坐标系的类。\n\n```python\nclass Point:\n   \
    \ def __init__(self, x = 0, y = 0):\n        self.x = x\n        self.y = y\n\
    ```\n\n现在你可以尝试运行代码并在 shell 中添加两个点。\n\n```python\n>>> p1 = Point(2,3)\n>>> p2 =\
    \ Point(-1,2)\n>>> p1 + p2\nTraceback (most recent call last):\n  ...\nTypeError:\
    \ unsupported operand type(s) for +: 'Point' and 'Point'\n```\n\n如你所见，出现了很多错误。出现\
    \ `TypeError` 是因为程序不知道如何组合两个 `Point` 对象。不过好消息是，通过运算符重载，你可以教会 Python 这一点。但首先，我们需要了解特殊函数。\n\
    \n## Python 的特殊函数\n\n以双下划线开头的类函数称为特殊函数。因此，它们不是普通的函数。其中一个函数是你非常熟悉的 `__init__()`。每次创建该特定类的新对象时，它都会被调用。\n\
    \n当你使用特殊函数时，类就与内置函数兼容了。\n\n```python\n>>> p1 = Point(2,3)\n>>> print(p1)\n<__main__.Point\
    \ object at 0x0000000031F8CC0>\n```\n\n这个打印效果不好，但当你在类中定义 `__str__()` 方法时，你可以控制它的打印方式。因此，尝试将此添加到你的类中。\n\
    \n```python\nclass Point:\n    def __init__(self, x = 0, y = 0):\n        self.x\
    \ = x\n        self.y = y\n\n    def __str__(self):\n        return \"({0},{1})\"\
    .format(self.x,self.y)\n```\n\n现在我们将再次尝试 `print` 函数。\n\n```python\n>>> p1 = Point(2,3)\n\
    >>> print(p1)\n(2,3)\n```\n\n你可以看到结果更好了。实际上，当我们使用内置函数 `format()` 或 `str()` 时，也会使用此方法。\n\
    \n```python\n>>> str(p1)\n'(2,3)'\n\n>>> format(p1)\n'(2,3)'\n```\n\n因此，当你执行 `format(p1)`\
    \ 或 `str(p1)` 时，程序实际上在执行 `p1.__str__()`。这就是特殊函数的由来。话虽如此，让我们回到运算符重载。"
