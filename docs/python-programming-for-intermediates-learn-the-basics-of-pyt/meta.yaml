    \ will also have to plot the location and outcome on the map.\n\n## 3: Creating\
    \ a simple Keylogger\n\nDo you know what a keylogger is? In case you do not, here\
    \ is a little bit of introduction.\nAlso known as keystroke logging, a keylogger\
    \ is some sort of surveillance software that has the ability to record every keystroke\
    \ made on a computer system it is installed in. The recording is then saved in\
    \ a typically encrypted log file.\nA keylogger can record email, instant messages,\
    \ and get any information typed anytime using the computer’s keyboard—this includes\
    \ passwords, usernames, and other pii (personally identifiable information). The\
    \ keylogger creates the log file and then sends it to a specific receiver. A number\
    \ of keylogger programs also record any email addresses used as well as the URLs\
    \ of the websites visited.\n\n## WHAT IS THE USE OF KEYLOGGERS?\n\nAs a surveillance\
    \ employers normally use keyloggers to make sure employees are using work computers\
    \ for purposes of business only. We also have an increasing market of parents\
    \ looking to use keyloggers to remain informed about the online activities of\
    \ their children.\nIt is rather unfortunate that some programmers embed keyloggers\
    \ in spyware; this means it could allow the transmission of your personal information\
    \ to an anonymous third party.\n\nIn any case, you see it (keyloggers) on the\
    \ internet, and maybe even have downloaded or installed it at some point in your\
    \ life—or seen someone doing it at least—whether to monitor or spy on someone\
    \ or something like that. Windows 10 actually contains an in-built keylogger.\n\
    \nAs you might have already guessed though, the process of installing this software\
    \ might come with various dangerous viruses. This is perhaps one of the reasons\
    \ why creating your own is the best option.\n\nLet us briefly go over the steps\
