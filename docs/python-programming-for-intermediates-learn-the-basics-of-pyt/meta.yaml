    \ `ob.func()` 时没有传递任何参数，它仍然有效！原因很简单；任何时候对象调用它们的方法时，对象本身都会作为第一个参数传递。因此，`ob.func()`\
    \ 最终会被转换为 `MyClass.func(ob)`。\n\n通常，当你调用一个包含参数列表的方法时，你会发现它仍然与调用相应的或对应的函数相同，只是将方法的对象放在初始参数之前。因此，类中初始函数的参数必须是对象本身。按照惯例，这被称为\
    \ `self`，也可以用不同的名字命名（不过，我强烈建议你遵循这个惯例）。\n\n此时，你应该已经精通实例对象、类对象、方法对象、函数对象，以及它们之间的区别了。\n\
    \n## 构造函数\n\n在类中，以双下划线开头的特殊函数是类函数；我们称它们为特殊函数，因为它们具有特殊的含义。\n其中一个应该引起你兴趣的函数是 `__init__()`。这是一个特殊函数，通常在每次实例化该类的新对象时被调用。在面向对象编程中，这种函数类型被称为构造函数；它通常用于初始化整个变量列表。\n\
    \n```python\nclass ComplexNumber:\n    def __init__(self, r = 0, i = 0):\n   \
    \     self.real = r\n        self.imag = i\n    def getData(self):\n        print(\"\
