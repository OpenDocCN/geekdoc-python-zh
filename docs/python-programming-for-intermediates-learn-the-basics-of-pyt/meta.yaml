    # Classes and Objects: Understanding their Meaning


    As mentioned in the first edition, Python is an object oriented programming language.
    Thus, unlike the procedure-oriented programming that stresses functions, it emphasizes
    objects.

    Simply put, objects are collection of data or variables and functions or methods
    acting on this data. On the other hand, a class acts as a blueprint for the object.

    The class is just like a prototype or sketch of a house that contains all details
    about the doors, windows, floors, and so on. According to these descriptions,
    you build a house; the house is the object.

    Since many houses can be built from a single description, you can make many objects
    from one class. An object can also be referred to as an instance of a class; the
    whole process of making this object is known as instantiation.'
