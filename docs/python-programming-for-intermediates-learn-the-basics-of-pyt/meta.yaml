    \ finding out who is in space right now.\n\nYou need to note that a web service\
    \ has a URL or address similar to a typical webpage. However, it returns data\
    \ instead of returning webpage HTML. In a web browser, open the following link:\n\
    [http://api.open-notify.org/astros.json](http://api.open-notify.org/astros.json)\n\
    \nWait to see something like this:\n\n```\n{\n  \"message\": \"success\",\n  \"\
    number\": 3,\n  \"people\": [\n    {\n      \"craft\": \"ISS\",\n      \"name\"\
    : \"Yuri Malenchenko\"\n    },\n    {\n      \"craft\": \"ISS\",\n      \"name\"\
    : \"Timothy Kopra\"\n    },\n    {\n      \"craft\": \"ISS\",\n      \"name\"\
    : \"Timothy Peake\"\n    }\n  ]\n}\n```\n\nSince the data is live, you will definitely\
    \ see a very different result. We call this format JSON.\n\nWe will now call the\
    \ web service from Python to be able to use the results. Open the trinket below:\n\
    \nThe modules: ‘json’ and ‘urllib.request’ are imported and are ready for your\
    \ use. Now add the code below to ‘main.py’ to be able to place the web address\
    \ you used earlier into a variable:\n\n```\nurl = 'http://api.open-notify.org/astros.json'\n\
    ```\n\nWe will now call the web service as follows:\n\n```\nurl = 'http://api.open-notify.org/astros.json'\n\
    response = urllib.request.urlopen(url)\n```\n\nAfter that, we will have to have\
    \ the JSON response loaded into a Python data structure as follows:\n\n```\nurl\
    \ = 'http://api.open-notify.org/astros.json'\nresponse = urllib.request.urlopen(url)\n\
    result = json.loads(response.read())\nprint(result)\n```\n\nIn this case, you\
    \ should be able to see something like:\n\n```\n{'message': 'success', 'number':\
    \ 3, 'people': [{'craft': 'ISS', 'name': 'Yuri Malenchenko'}, {'craft': 'ISS',\
    \ 'name': 'Timothy Kopra'}, {'craft': 'ISS', 'name': 'Timothy Peake'}]}\n```\n\
    \nThis is simply a Python dictionary containing three keys that include people,\
    \ number, and message. The value ‘success’ of the message shows that the request\
    \ was successful. Nonetheless, you need to note that depending on who is currently\
    \ in space, you will see different results.\n\nWe will now try printing the information\
    \ in a more readable manner: First, let us try looking up the total number of\
    \ people currently in space and print it as follows:\n\n```\nurl = 'http://api.open-notify.org/astros.json'\n\
    response = urllib.request.urlopen(url)\nresult = json.loads(response.read())\n\
    \nprint('People in Space: ', result['number'])\n```\n\nThe value related to the\
    \ ‘number’ key in the result dictionary will be printed by result['number']. In\
    \ the case here, it is 3.\n\nThe value related to the key ‘people’ is a dictionaries’\
    \ list. We will try putting that value into a variable so that you can be able\
    \ to use it as follows:\n\n```\nprint('People in Space: ', result['number'])\n\
    \npeople = result['people']\nprint(people)\n```\n\nYou will see something that\
    \ looks like this:\n\n```\n[{'craft': 'ISS', 'name': 'Yuri Malenchenko'}, {'craft':\
    \ 'ISS', 'name': 'Timothy Kopra'}, {'craft': 'ISS', 'name': 'Timothy Peake'}]\n\
    ```\n\nYou will now have to print out lines for all astronauts–one for each. To\
    \ achieve this, you can easily use a for loop. ‘p’ will be set to a dictionary\
    \ each time through the loop for a distinct astronaut.\n\n```\nprint('People in\
    \ Space: ', result['number'])\n\npeople = result['people']\n\nfor p in people:\n\
    \    print(p)\n```\n\nYou can now try looking up the values for ‘craft’ and ‘name’.\n\
    \n```\nprint('People in Space: ', result['number'])\n\npeople = result['people']\n\
    \nfor p in people:\n    print(p['name'])\n```\n\nIn this case, you will see something\
    \ that looks like this:\n\n```\nPeople in Space: 3\nYuri Malenchenko\nTimothy\
    \ Kopra\nTimothy Peake\n```\n\nYou need to note that you are using live data;\
    \ thus, your results are dependent on the number of people currently in space.\n\
    \n### Show the craft: challenge\n\nThe web service also gives the craft they are\
    \ in–like the ISS apart from the name of the astronaut. You can add to the script\
    \ so that the craft the astronaut is in also prints out.\n\nTake the example below:\n\
    \n```\nPeople in Space: 3\nYuri Malenchenko in ISS\nTimothy Kopra in ISS\nTimothy\
    \ Peake in ISS\n```\n\n### Step 2: Find the ISS Location\n\nThe ISS is always\
    \ going around or orbiting earth. It does so (orbits) after about one and a half\
    \ hours. It also travels an average of 7.66 kilometers per second, which means\
    \ it is very fast.\n\nYou will use a different web service to know where the ISS\
    \ is right now. In your browser, open the URL below for the web service in a new\
    \ tab:\n\n[http://api.open-notify.org/iss-now.json](http://api.open-notify.org/iss-now.json)\n\
    \nYou will see something that looks like so:\n\n```\n{\n  \"iss_position\": {\n\
    \    \"latitude\": 8.54938193505081,\n    \"longitude\": 73.16560793639105\n \
    \ },\n  \"message\": \"success\",\n  \"timestamp\": 1461931913\n}\n```\n\nThe\
    \ result has the coordinates of the spot on earth that the ISS is over now. The\
    \ longitude is the east to west position that runs from (negative) -180 to 180.\
    \ Zero is the prime meridian running through London (Greenwich) in the UK.\n\n\
    The latitude is the North to South position running from 90 to (negative) -90.\
    \ In this case, Zero is the equator. You will now have to use Python to actually\
    \ call the same web service. Add the code below to the finish of your script so\
    \ that you get the location of the ISS now.\n\n```\nurl = 'http://api.open-notify.org/iss-now.json'\n\
    response = urllib.request.urlopen(url)\nresult = json.loads(response.read())\n\
    \nprint(result)\n```\n\n```\n{'message': 'success',\n'iss_position': {'latitude':\n\
    17.0762447364, 'longitude':\n66.6454000717}, 'timestamp':\n1461931742}\n```\n\n\
    You will now build variables to store the longitude and latitude before printing\
    \ them.\n\n```\nurl = 'http://api.open-notify.org/iss-now.json'\nresponse = urllib.request.urlopen(url)\n\
    result = json.loads(response.read())\n\nlocation = result['iss_position']\nlat\
    \ = location['latitude']\nlon = location['longitude']\nprint('Latitude: ', lat)\n\
    print('Longitude: ', lon)\n```\n\n```\nLatitude:  26.4169023793\nLongitude:  58.378453289\n\
    ```\n\nAs you would guess, it would be better to display its position on the map.\
    \ To do that, we will have to import the turtle graphics"
  mdcn: "## 获取字母组\n\n编写代码，从传递给脚本的命令行参数中获取 Scrabble 字母组（即用于组成单词的字母）。例如，假设你的脚本名为 `scrabble_cheater.py`，如果你运行\
