- md: "## Overloading the Operator ‘+’ In Python\n\nTo be able to overload the sign\
    \ ‘+’ you need to implement ‘__add__()’ function in the class. You can do anything\
    \ you want within this function. It is, nonetheless, only sensible to return the\
    \ coordinate sum point object.\n\n```python\nclass Point:\n    def __init__(self,\
    \ x = 0, y = 0):\n        self.x = x\n        self.y = y\n\n    def __str__(self):\n\
    \        return \"({0},{1})\".format(self.x,self.y)\n\n    def __add__(self,other):\n\
    \        x = self.x + other.x\n        y = self.y + other.y\n        return Point(x,y)\n\
    ```\n\nGo ahead and try the addition once more.\n\n```python\n>>> p1 = Point(2,3)\n\
    >>> p2 = Point(-1,2)\n>>> print(p1 + p2)\n(1,5)\n```\n\nWhat happens is that when\
    \ we conduct p1+p2, the Python program calls p1.__add__(p2). This is in turn Point.__add__(p1,p2).\
    \ Likewise, you can also overload the other operators. The special function needed\
    \ to implement is illustrated in the table below:\n\n| Operator | Expression |\
    \ Internally |\n| --- | --- | --- |\n| Addition | p1 + p2 | p1.__add__(p2) |\n\
    | Subtraction | p1 - p2 | p1.__sub__(p2) |\n| Multiplication | p1 * p2 | p1.__mul__(p2)\
    \ |\n| Power | p1 ** p2 | p1.__pow__(p2) |\n| Division | p1 / p2 | p1.__truediv__(p2)\
    \ |\n| Floor Division | p1 // p2 | p1.__floordiv__(p2) |\n| Remainder (modulo)\
    \ | p1 % p2 | p1.__mod__(p2) |\n| Bitwise Left Shift | p1 << p2 | p1.__lshift__(p2)\
    \ |\n| Bitwise Right Shift | p1 >> p2 | p1.__rshift__(p2) |\n| Bitwise AND | p1\
    \ & p2 | p1.__and__(p2) |\n| Bitwise OR | p1 \\| p2 | p1.__or__(p2) |\n| Bitwise\
    \ XOR | p1 ^ p2 | p1.__xor__(p2) |\n| Bitwise NOT | ~ p1 | p1.__invert__() |\n\
    \n## Overloading Python’s Comparison Operators\n\nIn Python, operator overloading\
    \ is not limited to just the arithmetic operators. You can also overload comparison\
    \ operators. For instance, say you wanted to include the < less than symbol in\
    \ the Point class. We can compare the points’ magnitude from the origin and for\
    \ this purpose, return the result. Look at how you can implement this:\n\n```python\n\
    class Point:\n    def __init__(self, x = 0, y = 0):\n        self.x = x\n    \
    \    self.y = y\n\n    def __str__(self):\n        return \"({0},{1})\".format(self.x,self.y)\n\
    \n    def __lt__(self,other):\n        self_mag = (self.x ** 2) + (self.y ** 2)\n\
    \        other_mag = (other.x ** 2) + (other.y ** 2)\n        return self_mag\
    \ < other_mag\n```\n\nYou can try the following sample and see how it runs in\
    \ the shell:\n\n```python\n>>> Point(1,1) < Point(-2,-3)\nTrue\n\n>>> Point(1,1)\
    \ < Point(0.5,-0.2)\nFalse\n\n>>> Point(1,1) < Point(1,1)\nFalse\n```\n\nIn the\
    \ same way, the table below shows the various special functions that we have to\
    \ incorporate in order to overload the other comparison operators:\n\n| Operator\
    \ | Expression | Internally |\n| :--- | :--- | :--- |\n| Less than | p1 < p2 |\
    \ p1.__lt__(p2) |\n| Less than or equal to | p1 <= p2 | p1.__le__(p2) |\n| Equal\
    \ to | p1 == p2 | p1.__eq__(p2) |\n| Not equal to | p1 != p2 | p1.__ne__(p2) |\n\
    | Greater than | p1 > p2 | p1.__gt__(p2) |\n| Greater than or equal to | p1 >=\
    \ p2 | p1.__ge__(p2) |\n\n## Breather: Debugging and Testing\n\nBefore we, how\
    \ can you know that your programs are working? Can you really count on yourself\
    \ to write flawless code every time? That is highly unlikely. Without a doubt,\
    \ it is simple to write code in Python most of the time, but there are chances\
    \ that your code will have bugs.\n\nFor any programmer, debugging is a life fact\
    \ that plays an integral role in the programming craft. The only way you can begin\
    \ debugging is running your program—obviously. When you run your program, it might\
    \ not be enough. For instance, if you have written a program that processes files\
    \ in a way, you will need a couple of files to run it on. If you have conversely\
    \ written a utility library using arithmetic functions, you will need to supply\
    \ these functions with parameters to be able to get the code to run.\n\nProgrammers\
    \ do this sort of thing every time. In the compiled languages, the cycle goes\
    \ ‘edit-compile-run’ *or something like that* repeatedly. In some instances, even\
    \ creating the program to run could be a problem and you, the programmer, thus\
    \ has to switch between editing and compiling. The compilation step is not available\
    \ in Python. You thus have to edit and run only. Running the program is what testing\
    \ is all about.\n\n## FIRST RUN AND CODE AFTER\n\nChange and flexibility is important\
    \ for your code to survive at least to the end of the process of development.\
    \ To plan for it, you really have to set up tests for the different sections of\
    \ your program—commonly referred to as ‘unit tests’. This is also a highly pragmatic\
    \ and practical part of designing your application. Instead of trying to ‘code\
    \ a bit and test a bit’, the intuitive, the extreme programming crowd has brought\
    \ to us the very useful but quite counterintuitive maxim: ‘test a bit and code\
    \ a bit’.\n\nIn different terms, you test first and then code later—in what we\
    \ also refer to as test-driven programming. This approach could seem unfamiliar\
    \ at first but it has numerous advantages and over time, it grows on you. In the\
    \ end, once you have used test-driven programming for a while, writing code without\
    \ putting it into use could appear backwards.\n\n## PRECISE REQUIREMENT SPECIFICATION\n\
    \nWhen you are developing software, you first need to know the kind of problem\
    \ the software needs to solve and the objectives it needs to meet. You can write\
    \ a requirement specification to clarify your goals for the program—this document\
    \ could also be some quick notes that describe the requirements the program should\
    \ meet. With that, it is easier to check if the requirements have been satisfied.\n\
    \nHowever, most programmers do not like writing reports and generally prefer having\
    \ the computer doing as much of the work as possible. Well, the good news is that\
    \ you can specify your requirements and use the interpreter to check whether they\
    \ have been satisfied.\n\nThe idea here is to start with writing a test program\
    \ and then writing a program that passes the tests. This test program is simply\
    \ the requirement specification and helps you stick to the requirements as you\
    \ develop the program. In case you are lost, we will look at an easy example.\n\
    \nSupposing you need to write a module containing one function that will calculate\
    \ the area of a rectangle—i.e. with a known width and height—before you begin\
    \ to code. In this case, you start by writing a unit test with a couple of examples\
    \ whose answers you already know. The test program could look something like the\
    \ one below (listing 1).\n\n```python\n# THE SIMPLE TEST PROGRAM\nfrom area import\
    \ rect_area\n\nheight = 3\nwidth = 4\ncorrect_answer = 12\nanswer = rect_area(height,\
    \ width)\nif answer == correct_answer:\n    print('Test passed ')\nelse:\n   \
    \ print('Test failed ')\n```\n\nThe example above shows that we call the ‘rect_area’\
    \ function—not yet written—on the height and width (these are 3 and 4 respectively)\
    \ and then compare the result with the right one, which in this case is 12. If\
    \ thereafter, you implement rect_area carelessly (in the file area.py) as described\
    \ below and try running the test program, you will receive an error message.\n\
    \n```python\ndef rect_area(height, width):\n    return height * height # This\
    \ is wrong ...\n```\n\nYou could then try examining the code to see what the problem\
    \ was and replacing the expression returned with height * width.\n\nWhen you write\
    \ a test before writing your code, you do not do so just as preparation for finding\
    \ bugs; you do so as preparation for seeing if your code is working in the first\
    \ place.\n\nThe question with your code therefore is, until you test the code,\
    \ does it really do anything? You can use it to have the outlook that a feature\
    \ does not really exist until you have found a test for it. This means you can\
    \ clearly demonstrate that it is there and doing what it ought to do. This is\
    \ definitely useful for you as you develop the program at first, as well as when\
    \ you extend and maintain the code later on.\n\n## PLAN FOR CHANGE\n\nApart from\
    \ being greatly helpful as you write the program, the automated tests help you\
    \ evade accumulated errors when you make changes. This is particularly important\
    \ as your program grows in size. You have to be prepared to change your code instead\
    \ of clinging to what you have: change comes with its dangers.\n\nChanging a piece\
    \ of code might often mean you have introduced an unexpected bug or more. If you\
    \ make sure you have properly designed your program, this is with the right abstraction\
    \ and encapsulation, the change effects should be local, and affect a little part\
    \ of the code. If you therefore spot the bug, debugging becomes easier."
  mdcn: "## 在Python中重载运算符‘+’\n\n要能够重载符号‘+’，你需要在类中实现`__add__()`函数。你可以在这个函数中做任何你想做的事情。不过，返回坐标和点对象才是合理的做法。\n\
    \n```python\nclass Point:\n    def __init__(self, x = 0, y = 0):\n        self.x\
    \ = x\n        self.y = y\n\n    def __str__(self):\n        return \"({0},{1})\"\
    .format(self.x,self.y)\n\n    def __add__(self,other):\n        x = self.x + other.x\n\
    \        y = self.y + other.y\n        return Point(x,y)\n```\n\n现在，再试一次加法运算。\n\
    \n```python\n>>> p1 = Point(2,3)\n>>> p2 = Point(-1,2)\n>>> print(p1 + p2)\n(1,5)\n\
    ```\n\n发生的情况是，当我们执行`p1+p2`时，Python程序会调用`p1.__add__(p2)`。这反过来就是`Point.__add__(p1,p2)`。同样地，你也可以重载其他运算符。需要实现的特殊函数如下表所示：\n\
    \n| 运算符 | 表达式 | 内部调用 |\n| --- | --- | --- |\n| 加法 | p1 + p2 | p1.__add__(p2) |\n\
    | 减法 | p1 - p2 | p1.__sub__(p2) |\n| 乘法 | p1 * p2 | p1.__mul__(p2) |\n| 幂运算 |\
    \ p1 ** p2 | p1.__pow__(p2) |\n| 除法 | p1 / p2 | p1.__truediv__(p2) |\n| 整除 | p1\
    \ // p2 | p1.__floordiv__(p2) |\n| 取余（模运算） | p1 % p2 | p1.__mod__(p2) |\n| 按位左移\
    \ | p1 << p2 | p1.__lshift__(p2) |\n| 按位右移 | p1 >> p2 | p1.__rshift__(p2) |\n\
    | 按位与 | p1 & p2 | p1.__and__(p2) |\n| 按位或 | p1 \\| p2 | p1.__or__(p2) |\n| 按位异或\
    \ | p1 ^ p2 | p1.__xor__(p2) |\n| 按位取反 | ~ p1 | p1.__invert__() |\n\n## 重载Python的比较运算符\n\
    \n在Python中，运算符重载不仅限于算术运算符。你也可以重载比较运算符。例如，假设你想在`Point`类中包含小于号`<`。我们可以比较点到原点的距离大小，并为此目的返回结果。看看如何实现这一点：\n\
    \n```python\nclass Point:\n    def __init__(self, x = 0, y = 0):\n        self.x\
    \ = x\n        self.y = y\n\n    def __str__(self):\n        return \"({0},{1})\"\
    .format(self.x,self.y)\n\n    def __lt__(self,other):\n        self_mag = (self.x\
    \ ** 2) + (self.y ** 2)\n        other_mag = (other.x ** 2) + (other.y ** 2)\n\
    \        return self_mag < other_mag\n```\n\n你可以尝试以下示例，看看它在shell中如何运行：\n\n```python\n\
    >>> Point(1,1) < Point(-2,-3)\nTrue\n\n>>> Point(1,1) < Point(0.5,-0.2)\nFalse\n\
    \n>>> Point(1,1) < Point(1,1)\nFalse\n```\n\n同样地，下表展示了为了重载其他比较运算符，我们需要实现的各种特殊函数：\n\
    \n| 运算符 | 表达式 | 内部调用 |\n| :--- | :--- | :--- |\n| 小于 | p1 < p2 | p1.__lt__(p2)\
    \ |\n| 小于或等于 | p1 <= p2 | p1.__le__(p2) |\n| 等于 | p1 == p2 | p1.__eq__(p2) |\n\
    | 不等于 | p1 != p2 | p1.__ne__(p2) |\n| 大于 | p1 > p2 | p1.__gt__(p2) |\n| 大于或等于\
    \ | p1 >= p2 | p1.__ge__(p2) |\n\n## 休息一下：调试与测试\n\n在我们继续之前，你怎么知道你的程序正在正常工作？你真的能指望自己每次都能写出无懈可击的代码吗？这极不可能。毫无疑问，在Python中编写代码大多数时候很简单，但你的代码有可能存在错误。\n\
    \n对于任何程序员来说，调试都是编程工作中不可或缺的一部分。开始调试的唯一方法显然是运行你的程序。但仅仅运行程序可能还不够。例如，如果你编写了一个以某种方式处理文件的程序，你需要一些文件来运行它。相反，如果你编写了一个使用算术函数的实用库，你需要为这些函数提供参数才能让代码运行起来。\n\
    \n程序员每次都在做这类事情。在编译型语言中，循环是“编辑-编译-运行”*或类似的过程*反复进行。在某些情况下，甚至创建程序来运行都可能是个问题，因此你作为程序员必须在编辑和编译之间切换。Python中没有编译步骤。因此，你只需编辑和运行。运行程序就是测试的全部意义所在。\n\
    \n## 先运行，后编码\n\n变化和灵活性对于你的代码至少能存活到开发过程结束至关重要。为此，你确实需要为程序的不同部分设置测试——通常称为“单元测试”。这也是设计应用程序中非常务实和实际的一部分。与其试图“写一点代码，测试一点”，极限编程人群给我们带来了一个非常有用但相当反直觉的格言：“测试一点，写一点代码”。\n\
    \n换句话说，你先测试，然后再编码——这也被称为测试驱动编程。这种方法起初可能看起来不熟悉，但它有许多优点，随着时间的推移，你会逐渐喜欢上它。最终，一旦你使用了一段时间测试驱动编程，不先测试就写代码可能会显得本末倒置。\n\
    \n## 精确的需求规格说明\n\n在开发软件时，你首先需要知道软件需要解决什么问题以及需要达到什么目标。你可以编写一份需求规格说明来阐明程序的目标——这份文档也可以是一些描述程序应满足需求的快速笔记。这样，就更容易检查需求是否得到满足。\n\
    \n然而，大多数程序员不喜欢写报告，通常更喜欢让计算机尽可能多地完成工作。好消息是，你可以指定你的需求，并使用解释器来检查它们是否得到满足。\n\n这里的想法是先编写一个测试程序，然后编写一个通过测试的程序。这个测试程序就是需求规格说明，它帮助你在开发程序时坚持需求。如果你感到困惑，我们将看一个简单的例子。\n\
    \n假设你需要编写一个模块，其中包含一个函数，该函数将计算矩形的面积——即已知宽度和高度。在开始编码之前，你首先编写一个单元测试，其中包含几个你已经知道答案的例子。测试程序可能看起来像下面这样（清单1）。\n\
    \n```python\n# THE SIMPLE TEST PROGRAM\nfrom area import rect_area\n\nheight =\
    \ 3\nwidth = 4\ncorrect_answer = 12\nanswer = rect_area(height, width)\nif answer\
    \ == correct_answer:\n    print('Test passed ')\nelse:\n    print('Test failed\
    \ ')\n```\n\n上面的例子显示，我们调用了尚未编写的`rect_area`函数，传入高度和宽度（分别为3和4），然后将结果与正确答案（本例中为12）进行比较。如果之后，你粗心地实现了`rect_area`（在文件`area.py`中），如下所示，并尝试运行测试程序，你将收到错误消息。\n\
    \n```python\ndef rect_area(height, width):\n    return height * height # This\
    \ is wrong ...\n```\n\n然后你可以尝试检查代码，看看问题出在哪里，并将返回的表达式替换为`height * width`。\n\n当你在编写代码之前编写测试时，你这样做不仅仅是为了发现错误；你这样做是为了首先检查你的代码是否在工作。\n\
    \n因此，关于你的代码的问题是，在你测试代码之前，它真的做了任何事情吗？你可以这样看待：一个功能在你找到它的测试之前，它实际上并不存在。这意味着你可以清楚地证明它存在并且正在做它应该做的事情。这在你最初开发程序时，以及在你后来扩展和维护代码时，对你绝对是有用的。\n\
    \n## 为变化做计划\n\n除了在编写程序时非常有帮助外，自动化测试还可以帮助你在进行更改时避免累积错误。随着程序规模的增长，这一点尤为重要。你必须准备好更改你的代码，而不是固守已有的东西：变化伴随着风险。\n\
    \n更改一段代码通常意味着你引入了一个或多个意外的错误。如果你确保你的程序设计得当，具有正确的抽象和封装，那么更改的影响应该是局部的，只影响代码的一小部分。因此，如果你发现了错误，调试就会变得更容易。"
