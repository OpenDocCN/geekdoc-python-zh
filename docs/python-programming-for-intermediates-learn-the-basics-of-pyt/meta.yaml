    objects. Well, you may want to know Python usually makes use of namespaces as
    dictionaries. We have a name-to-object mapping with objects as values and names
    as keys. Many different namespaces can actually use one name and then proceed
    to map it to a distinct object.


    Look at the following namespace examples.


    **Local namespaces:** These namespaces comprise local names within a function.
    The creation of such namespaces happens when functions are called, and only last
    up until the functions return.


    **Global namespaces:** These namespaces comprise names from different imported
    modules used in a project. Their creation happens when the modules are incorporated
    into the project and stick around only before the scripts end.


    **Built-in namespaces:** These namespaces consist of built-in exception names
    and built-in functions.


    Even though we will discuss modules in a later chapter, you need to note that
    there are useful arithmetic functions in different modules. For instance, the
    cmath and math modules contain many functions that are shared in the two, such
    as acos(), exp(), cos(), log10() and so on. If you use both modules in one program,
    you will need to prefix them with the module’s name if'
  - '[PAGE 103]


    you want to be able to use the functions unambiguously—for instance, cmath.log10()
    and math.log10().'
  - '[PAGE 104]


    # Scope


    Namespaces are important because for one, they identify the whole list of names
    within a program. Nonetheless, this does not necessarily imply that variable names
    can be used anywhere. A name also contains a scope defining the sections of the
    program that the name would be used without the use of any prefix.

    Similar to namespaces, we also have many scopes in a program. Look at the following
    list of a number of scopes that can be in the course of a program execution.


    +   - Local scope: The local scope is the innermost scope containing a list of
    local names that are available in the existing function.

    - The scope of the whole enclosing functions. A name search begins from the enclosing
    scope that is nearest, moving outwards.

    - A module level scope containing the entire list of global names from the existing
    module and

    - The outermost scope containing the entire list of built-in names—this scope
    is usually searched last to get the referenced name.'
  - "[PAGE 105]\n\n# Scope Resolution\n\nAs we have already seen, a search for a particular\
    \ name begins from the innermost function before moving higher until the name\
    \ is mapped to the object (by the program). In cases where the program does not\
    \ find such name within the namespaces, the program then raises what’s referred\
    \ to as a NameError exception. As we start, try to type ‘dir ()’ in a python IDE\
    \ such as IDLE.\n\n```\ndir()\n# ['__builtins__','__doc__','__loader__','__name__',\n\
    '__package__','__spec__']\n```\n\nAll the names are listed by dir() are offered\
    \ in all Python programs. Just to be brief, I will, in the other examples, begin\
    \ by referring to these names as ‘__builtins__’…‘__specs__’.\nLet us see the result\
    \ of the dir() function once we define a variable and a function.\n\n```\na_num\
    \ = 10\ndir()\n# ['__builtins__' .... '__spec__', 'a_num']\n```\n\n```\ndef some_func():\n\
    \    b_num = 11\n    print(dir())\n```\n\n```\nsome_func()\n# ['b_num']\n```\n\
    \n```\ndir()\n# ['__builtins__' ... '__spec__', 'a_num', 'some_func'\n```\n\n\
    The function ‘dir()’ outputs the name list within the existing scope. This is\
    \ exactly why there is just a single name named"
  - "[PAGE 106]\n\nb_num within the ‘some_func()’ scope. When you call ‘dir()’ after\
    \ you define ‘some_func()’, you get it added to the name list present in the global\
    \ namespace.\n\nWe will now look at the name list within some nested functions.\
    \ Note that the code present in this block goes on from the previous block.\n\n\
    ```\ndef outer_func():\n    c_num = 12\n    def inner_func():\n        d_num =\
    \ 13\n        print(dir(), ' - names in inner_func')\n    e_num = 14\n    inner_func()\n\
    \    print(dir(), ' - names in outer_func')\n\nouter_func()\n# ['d_num'] - names\
    \ in inner_func\n# ['c_num', 'e_num', 'inner_func'] - names in outer_func\n```\n\
    \nThe code above is defining two variables and one function within the ‘outer_func()’\
    \ scope. The ‘dir()’ only prints the ‘d_num’ name within the ‘inner_func()’. Since\
    \ there is no other variable defined in there apart from ‘d_num’, it is fair.\n\
    \nWhen we reassign a global name within a local namespace, we create a new local\
    \ variable containing the same name; this is so unless plainly specified with\
    \ global. The code below describes this more evidently."
  - "[PAGE 107]\n\n```\na_num = 10\nb_num = 11\n\ndef outer_func():\n    global a_num\n\
    \    a_num = 15\n    b_num = 16\n    def inner_func():\n        global a_num\n\
    \        a_num = 20\n        b_num = 21\n        print('a_num inside inner_func\
    \ :', a_num)\n        print('b_num inside inner_func :', b_num)\n    inner_func()\n\
    \    print('a_num inside outer_func :', a_num)\n    print('b_num inside outer_func\
    \ :', b_num)\n\nouter_func()\nprint('a_num outside all functions :', a_num)\n\
    print('b_num outside all functions :', b_num)\n\n# a_num inside inner_func : 20\n\
    # b_num inside inner_func : 21\n\n# a_num inside outer_func : 20\n# b_num inside\
    \ outer_func : 16\n\n# a_num outside all functions : 20\n# b_num outside all functions\
    \ : 11\n```\n\n‘a_num’ has been declared within the ‘outer_func()’ and also ‘inner_func()’\
    \ to be a global variable. A different value is just being set for a similar global\
    \ variable. It is for this reason that the ‘a_num’ value is 20 at all locations.\
    \ Each function, on the other hand, builds its own variable ‘b_num’ with a local\
    \ scope; the function ‘print()’ then prints this locally scoped variable’s value."
