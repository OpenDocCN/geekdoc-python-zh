    ways of defining a function that can assume variable argument numbers. Described
    below are the three various types of this kind:


    # 1: PYTHON DEFAULT ARGUMENTS


    In Python, function arguments can contain default values. We can use the assignment
    operator denoted as ‘=’ to offer a default value to an argument. Look at the example
    below:'
