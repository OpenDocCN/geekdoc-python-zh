  md: '# **Breather: Debugging and Testing**


    Before we how can you know that your programs are working? Can you really count
    on yourself to write flawless code every time? That is highly unlikely. Without
    a doubt, it is simple to write code in Python most of the time, but there are
    chances that your code will have bugs.


    For any programmer, debugging is a life fact that plays an integral role in the
    programming craft. The only way you can begin debugging is running your program—obviously.
    When you run your program, it might not be enough. For instance, if you have written
    a program that processes files in a way, you will need a couple of files to run
    it on. If you have conversely written a utility library using arithmetic functions,
    you will need to supply these functions with parameters to be able to get the
    code to run.


    Programmers do this sort of thing every time. In the compiled languages, the cycle
    goes ‘edit-compile-run’ *or something like that* repeatedly. In some instances,
    even creating the program to run could be a problem and you, the programmer, thus
    has to switch between editing and compiling. The compilation step is not available
    in Python. You thus have to edit and run only. Running the program is what testing
    is all about.


