    \ time_diff, 3600,\n                           2.2)\n```\n\n如果你仔细想想，按位置提供可选参数可能会非常令人困惑，因为不清楚\
    \ 3600 和 2.2 的值对应什么。在这种情况下，最佳实践是始终使用关键字名称指定可选参数，而不是将它们作为位置参数传递。\n\n你需要记住，使用这种可选关键字参数的向后兼容性对于接受\
    \ `*args` 的函数很重要。你可以回顾讨论使用可变位置参数减少视觉冗余的子主题。同样，你会发现更好的实践是使用仅关键字参数——关于这一点，请阅读后续讨论使用基于关键字的参数强制清晰性的子主题。\n\
    \n## 关于参数你需要记住的事项\n\n在使用时，请记住以下事项：\n\n- ✓ 你可以通过关键字或位置指定函数参数。\n- ✓ 关键字可以澄清每个参数的目的，否则仅使用位置参数时可能会造成混淆。\n\
    - ✓ 包含默认值的关键字参数简化了向函数添加新行为的过程，特别是当函数包含现有调用者时。\n- ✓ 可选关键字参数必须通过关键字传递，而不是位置传递，始终如此。\n\
    \n## 使用 `None` 和文档字符串指定动态默认参数\n\n有时，你必须使用非静态类型作为关键字参数的默认值。例如，假设你需要打印带有记录事件时间的日志消息。在默认情况下，你希望消息包含函数被调用的时间。你可能还想尝试下面的方法，假设默认参数在每次调用函数时都会重新求值。\n\
    \n```python\ndef log(message, when=datetime.now()):\n    print('%s: %s' % (when,\
    \ message))\n\nlog('Hi there!')\nsleep(0.1)\nlog('Hi again!')\n\n>>>\n2014-11-15\
    \ 21:10:10.371432: Hi there!\n2014-11-15 21:10:10.371432: Hi again!\n```\n\n时间戳相同的原因很简单，`datetime.now`\
    \ 只执行一次——即在函数定义时。默认参数值仅在每次模块加载时求值一次，这通常发生在程序启动时。一旦包含此代码的模块被加载，默认参数 `datetime.now`\
    \ 就永远不会再次求值。\n\n在 Python 中，实现预期结果的惯例是提供一个默认的 `None` 值，并在文档字符串中记录实际行为。在你的代码看到 `None`\
    \ 参数值的情况下，你然后适当地分配默认值。"
