    >>> ob = MyClass()\n```\n\n这样，你将创建一个名为 `ob` 的新实例对象。你可以使用对象名作为前缀来访问对象的属性。\n属性可以是方法或数据。对象方法是属于该类的对应函数。任何被识别为类属性的函数对象都定义或描述了该特定类对象的一个方法。这仅仅意味着，因为\
