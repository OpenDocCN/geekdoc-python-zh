- md: "## Python Modules\n\nWe use modules to categorize the code in Python into smaller\
    \ parts. Essentially, in Python, a module is a Python file in which variables,\
    \ functions, and classes are defined. When you group the same code into one file,\
    \ you essentially make it easy to access. This is what modules mean. For instance,\
    \ we have categorized or indexed the content in this book into various chapters\
    \ so that it does not become boring or hectic. This means that by dividing the\
    \ book into chapters, the content becomes easier to understand and navigate.\n\
    \nIn the same vein, modules are the files that contain the same code.\n\n## Importing\
    \ a Module\n\nThere are ways of importing modules. They include the following:\n\
    \n### 1: USING IMPORT STATEMENT\n\nYou can use the ‘import’ statement for the\
    \ importation. Take the example of the syntax below:\n\n```\nimport <file_name1,\
    \ file_name2,...file_name(n)>\n```\n\nThe following is an example:\n\n```\ndef\
    \ add(a,b):\n  c=a+b\n  print c\n  return\n```\n\nYou can save the file under\
    \ the name ‘addition.py’. You will use the ‘import’ statement to import this file.\n\
    \n```\nimport addition\naddition.add(10,20)\naddition.add(30,40)\n```\n\nNow build\
    \ another file in Python where you want to import the former file. For that, you\
    \ will use the import statement as you have seen in the example above. You can\
    \ use ‘file_name.method()’ for the corresponding method. In this case, we have\
    \ addition.add (). Here, Addition is the file in Python, and add () is the method\
    \ defined in the addition.py file.\n\nThe output is as follows:\n\n```\n>>>\n\
    30\n70\n>>>\n```\n\nYou need to note that you can access any function within a\
    \ module by the function name and module name disjointed by a dot. This is termed\
    \ as a period. A whole notation is referred to as dot notation.\n\n### AN EXAMPLE\
    \ OF PYTHON IMPORTING MULTIPLE MODULES\n\nMsg.py:\n\n```\ndef msg_method():\n\
    \  print \"Today the weather is rainy\"\n  return\n```\n\ndisplay.py:\n\n```\n\
    def display_method():\n  print \"The weather is Sunny\"\n  return\n```\n\nmultiimport.py:\n\
    \n```\nimport msg,display\nmsg.msg_method()\ndisplay.display_method()\n```\n\n\
    The output is as follows:\n\n```\n>>>\nToday the weather is rainy\nThe weather\
    \ is Sunny\n>>>\n```\n\n### 2: USE OF FROM..IMPORT STATEMENT\n\nWe use the from..import\
    \ statement to import certain attributes from modules. In case you do not need\
    \ the entire module imported, you can simply use the from..import statement. The\
    \ syntax is as follows:\n\nSyntax:\n\n```\nfrom <module_name> import <attribute1,attribute2,attribute3,...attributen>\n\
    ```\n\n### AN EXAMPLE OF PYTHON FROM..IMPORT\n\n```\ndef circle(r):\n  print 3.14*r*r\n\
    \  return\n\ndef square(l):\n  print l*l\n  return\n\ndef rectangle(l,b):\n  print\
    \ l*b\n  return\n\ndef triangle(b,h):\n  print 0.5*b*h\n  return\n```\n\narea1.py\n\
    \n```\nfrom area import square,rectangle\nsquare(10)\nrectangle(2,5)\n```\n\n\
    The output is as follows:\n\n```\n>>>\n100\n10\n>>>\n```\n\n### 3: IMPORTING WHOLE\
    \ MODULES\n\nYou can import the entire module with ‘from..import*’. The syntax\
    \ is as follows:\n\n```\nfrom <module_name> import *\n```\n\nWith the statement\
    \ above, the entire list of attributes defined in the module will be imported\
    \ and thus, you can be able to access every attribute.\n\narea.py\n\nThis is same\
    \ as the example above:\n\narea1.py\n\n```\nfrom area import *\nsquare(10)\nrectangle(2,5)\n\
    circle(5)\ntriangle(10,20)\n```\n\nThe output is as follows:\n\n```\n>>>\n100\n\
    10\n78.5\n100.0\n>>>\n```\n\n## Built In Python Modules\n\nIn Python, we have\
    \ numerous built in modules; some of them include the following: random, math,\
    \ collections, threading, mailbox, os, time, string, tkinter, and so on.\nEach\
    \ module contains some built in functions you can use to perform different functions.\
    \ Here is a look at two modules:\n\n### 1: MATH\n\nWith the math you can use the\
    \ various built in arithmetic functions.\nThe functions and their descriptions\
    \ include the following:\n\n| Function | Description |\n| :--- | :--- |\n| ceil(n)\
    \ | It returns the next integer number of the given number |\n| sqrt(n) | It returns\
    \ the Square root of the given number. |\n| exp(n) | It returns the natural logarithm\
    \ e raised to the given number |\n| floor(n) | It returns the previous integer\
    \ number of the given number. |\n| log(n,baseto) | It returns the natural logarithm\
    \ of the number. |\n| pow(baseto, exp) | It returns baseto raised to the exp power.\
    \ |\n| sin(n) | It returns sine of the given radian. |\n| cos(n) | It returns\
    \ cosine of the given radian. |\n| tan(n) | It returns tangent of the given radian.\
    \ |\n\n### AN EXAMPLE OF A MATH MODULE\n\n```\nimport math\na=4.6\nprint math.ceil(a)\n\
    print math.floor(a)\nb=9\nprint math.sqrt(b)\nprint math.exp(3.0)\nprint math.log(2.0)\n\
    print math.pow(2.0,3.0)\nprint math.sin(0)\nprint math.cos(0)\nprint math.tan(45)\n\
    ```\n\nThe output is as\n\n```\n>>>\n5.0\n4.0\n3.0\n20.0855369232\n0.69314718056\n\
    8.0\n0.0\n1.0\n1.61977519054\n>>>\n```\n\nAgain, the math module gives two constants\
    \ for arithmetic operations as follows:\n\n| Constants | Descriptions |\n| ---\
    \ | --- |\n| Pi | Returns constant π = 3.14159... |\n| e | Returns constant e=\
    \ 2.71828... |\n\nLook at the example below:\n\n```\nimport math\n\nprint math.pi\n\
    print math.e\n```\n\nThe output is as follows:\n\n```\n>>>\n3.14159265359\n2.71828182846\n\
    >>>\n```\n\n### 2: RANDOM\n\nWe use the random module to generate random numbers.\
    \ It gives these two built-in functions:\n\n| Function | Description |\n| :---\
    \ | :--- |\n| random() | It returns a random number between 0.0 and 1.0 where\
    \ 1.0 is exclusive. |\n| randint(x,y) | It returns a random number between x and\
    \ y where both the numbers are inclusive. |\n\n### AN EXAMPLE OF THE PYTHON MODULE\n\
    \n```\nimport random\n\nprint random.random()\nprint random.randint(2,8)\n```\n\
    \nThe output is as\n\n```\n>>>\n0.797473843839\n7\n>>>\n```\n\nHaving looked at\
    \ most of the things you need to learn at this intermediate level, we shall look\
    \ at example Python projects that when practiced, should help you implement the\
    \ knowledge you have learnt thus far in this guide:\n\n## Simple Python projects\
    \ for Intermediates\n\nHaving covered all the topics relevant at an intermediate\
    \ level, I believe you are prepared to take on a few projects of your own. First,\
    \ let us look at a few project examples to give you a head start!\n\n### 1: Scrabble\
    \ Challenge\n\nIn this project, you will create a scrabble cheater.\nThe goals\
    \ of this project include the following:\n\n- Practicing to break a problem down\
    \ and solve it from scratch in Python\n- Practicing the command line argument\
    \ parsing\n- Practicing to read from Python files\n- Practicing to work with for\
    \ loops and dictionaries\n\nEssentially, you write a script in Python that assumes\
    \ a Scrabble rack to be a command-line argument before printing all the valid\
    \ Scrabble words that are buildable from the rack along with their respective\
    \ scores on Scrabble–(these ought to be sorted by score). Take the example invocation\
    \ below, and output.\n\n```\n$ python scrabble.py ZAEFIEE\n17 feeze\n17 feaze\n\
    16 faze\n15 fiz\n15 fez\n12 zee\n12 zea\n11 za\n6 fie\n6 fee\n6 fae\n5 if\n5 fe\n\
    5 fa\n5 ef\n2 ee\n2 ea\n2 ai\n2 ae\n```\n\nThe site in this [link](link) has all\
    \ the words in the [SOWPODS](SOWPODS) word list (official) a single word per line.\n\
    \nLook at the dictionary below—it contains all the letters and their values in\
    \ scrabble:\n\n```\nscores = {\"a\": 1, \"c\": 3, \"b\": 3, \"e\": 1, \"d\": 2,\
    \ \"g\": 2,\n    \"f\": 4, \"i\": 1, \"h\": 4, \"k\": 5, \"j\": 8, \"m\": 3,\n\
    \    \"l\": 1, \"o\": 1, \"n\": 1, \"q\": 10, \"p\": 3, \"s\": 1,\n    \"r\":\
    \ 1, \"u\": 1, \"t\": 1, \"w\": 4, \"v\": 4, \"y\": 4,\n    \"x\": 8, \"z\": 10}\n\
    ```\n\nLet us try to break the problem down.\n\n### CREATE A WORD LIST\n\nWrite\
    \ your code to open and read the word file ‘sowpods’. Build a list where every\
    \ element is essentially a word in the word file ‘sowpods’. You need to note that\
    \ every line in the file is ending in a new line, which you will have to eliminate\
    \ from the word."
  mdcn: "## Python 模块\n\n我们使用模块将 Python 中的代码划分为更小的部分。本质上，在 Python 中，模块是一个定义了变量、函数和类的\
    \ Python 文件。当你将相同的代码组织到一个文件中时，你实际上使其更易于访问。这就是模块的意义。例如，我们将本书的内容分类或索引到不同的章节中，使其不会变得枯燥或繁杂。这意味着通过将书分成章节，内容变得更容易理解和导航。\n\
    \n同样，模块就是包含相同代码的文件。\n\n## 导入模块\n\n导入模块有多种方式。包括以下几种：\n\n### 1：使用 IMPORT 语句\n\n\
    你可以使用 `import` 语句进行导入。请看下面的语法示例：\n\n```\nimport <file_name1, file_name2,...file_name(n)>\n\
    ```\n\n以下是一个示例：\n\n```\ndef add(a,b):\n  c=a+b\n  print c\n  return\n```\n\n你可以将文件保存为\
    \ `addition.py`。你将使用 `import` 语句来导入此文件。\n\n```\nimport addition\naddition.add(10,20)\n\
    addition.add(30,40)\n```\n\n现在，在另一个 Python 文件中构建，你想导入前面的文件。为此，你将使用如上例所示的 `import`\
    \ 语句。你可以使用 `file_name.method()` 来调用相应的方法。在本例中，我们有 `addition.add()`。这里，`addition`\
    \ 是 Python 文件，`add()` 是在 `addition.py` 文件中定义的方法。\n\n输出如下：\n\n```\n>>>\n30\n70\n\
    >>>\n```\n\n你需要注意，你可以通过函数名和模块名（用点号分隔）来访问模块内的任何函数。这被称为点号。整个表示法被称为点表示法。\n\n### PYTHON\
    \ 导入多个模块的示例\n\nMsg.py:\n\n```\ndef msg_method():\n  print \"Today the weather\
    \ is rainy\"\n  return\n```\n\ndisplay.py:\n\n```\ndef display_method():\n  print\
    \ \"The weather is Sunny\"\n  return\n```\n\nmultiimport.py:\n\n```\nimport msg,display\n\
    msg.msg_method()\ndisplay.display_method()\n```\n\n输出如下：\n\n```\n>>>\nToday the\
    \ weather is rainy\nThe weather is Sunny\n>>>\n```\n\n### 2：使用 FROM..IMPORT 语句\n\
    \n我们使用 `from..import` 语句从模块中导入特定的属性。如果你不需要导入整个模块，可以简单地使用 `from..import` 语句。语法如下：\n\
    \n语法：\n\n```\nfrom <module_name> import <attribute1,attribute2,attribute3,...attributen>\n\
    ```\n\n### PYTHON FROM..IMPORT 示例\n\n```\ndef circle(r):\n  print 3.14*r*r\n \
    \ return\n\ndef square(l):\n  print l*l\n  return\n\ndef rectangle(l,b):\n  print\
    \ l*b\n  return\n\ndef triangle(b,h):\n  print 0.5*b*h\n  return\n```\n\narea1.py\n\
    \n```\nfrom area import square,rectangle\nsquare(10)\nrectangle(2,5)\n```\n\n\
    输出如下：\n\n```\n>>>\n100\n10\n>>>\n```\n\n### 3：导入整个模块\n\n你可以使用 `from..import*`\
    \ 导入整个模块。语法如下：\n\n```\nfrom <module_name> import *\n```\n\n使用上述语句，模块中定义的所有属性都将被导入，因此你将能够访问每个属性。\n\
    \narea.py\n\n这与上面的示例相同：\n\narea1.py\n\n```\nfrom area import *\nsquare(10)\nrectangle(2,5)\n\
    circle(5)\ntriangle(10,20)\n```\n\n输出如下：\n\n```\n>>>\n100\n10\n78.5\n100.0\n>>>\n\
    ```\n\n## 内置 Python 模块\n\n在 Python 中，我们有众多内置模块；其中一些包括：random、math、collections、threading、mailbox、os、time、string、tkinter\
    \ 等等。\n每个模块都包含一些内置函数，你可以使用它们来执行不同的功能。下面来看两个模块：\n\n### 1：MATH\n\n使用 math 模块，你可以使用各种内置的算术函数。\n\
    函数及其描述如下：\n\n| 函数 | 描述 |\n| :--- | :--- |\n| ceil(n) | 返回给定数字的下一个整数 |\n| sqrt(n)\
    \ | 返回给定数字的平方根。 |\n| exp(n) | 返回自然对数 e 的给定数字次幂 |\n| floor(n) | 返回给定数字的前一个整数。 |\n\
    | log(n,baseto) | 返回数字的自然对数。 |\n| pow(baseto, exp) | 返回 baseto 的 exp 次幂。 |\n|\
    \ sin(n) | 返回给定弧度的正弦值。 |\n| cos(n) | 返回给定弧度的余弦值。 |\n| tan(n) | 返回给定弧度的正切值。 |\n\
    \n### MATH 模块示例\n\n```\nimport math\na=4.6\nprint math.ceil(a)\nprint math.floor(a)\n\
    b=9\nprint math.sqrt(b)\nprint math.exp(3.0)\nprint math.log(2.0)\nprint math.pow(2.0,3.0)\n\
    print math.sin(0)\nprint math.cos(0)\nprint math.tan(45)\n```\n\n输出为：\n\n```\n\
    >>>\n5.0\n4.0\n3.0\n20.0855369232\n0.69314718056\n8.0\n0.0\n1.0\n1.61977519054\n\
    >>>\n```\n\n此外，math 模块为算术运算提供了两个常量，如下所示：\n\n| 常量 | 描述 |\n| --- | --- |\n| Pi |\
    \ 返回常量 π = 3.14159... |\n| e | 返回常量 e= 2.71828... |\n\n看下面的例子：\n\n```\nimport\
    \ math\n\nprint math.pi\nprint math.e\n```\n\n输出如下：\n\n```\n>>>\n3.14159265359\n\
    2.71828182846\n>>>\n```\n\n### 2：RANDOM\n\n我们使用 random 模块生成随机数。它提供以下两个内置函数：\n\n\
    | 函数 | 描述 |\n| :--- | :--- |\n| random() | 返回一个介于 0.0 和 1.0 之间的随机数，其中 1.0 不包含在内。\
    \ |\n| randint(x,y) | 返回一个介于 x 和 y 之间的随机数，两个数字都包含在内。 |\n\n### PYTHON 模块示例\n\n\
    ```\nimport random\n\nprint random.random()\nprint random.randint(2,8)\n```\n\n\
    输出为：\n\n```\n>>>\n0.797473843839\n7\n>>>\n```\n\n在了解了这个中级阶段需要学习的大部分内容之后，我们将看一些\
    \ Python 项目示例，通过实践这些示例，应该能帮助你应用到目前为止在本指南中学到的知识：\n\n## 面向中级者的简单 Python 项目\n\n涵盖了所有与中级水平相关的主题后，我相信你已经准备好自己动手做几个项目了。首先，让我们看几个项目示例，让你有个好的开始！\n\
    \n### 1：Scrabble 挑战\n\n在这个项目中，你将创建一个 Scrabble 作弊器。\n该项目的目标包括：\n\n- 练习将问题分解并从头开始用\
    \ Python 解决\n- 练习命令行参数解析\n- 练习从 Python 文件中读取\n- 练习使用 for 循环和字典\n\n本质上，你编写一个 Python\
    \ 脚本，该脚本假设一个 Scrabble 字母架作为命令行参数，然后打印出所有可以从该字母架构建的有效 Scrabble 单词及其在 Scrabble 中的相应分数——（这些应该按分数排序）。请看下面的调用示例和输出。\n\
    \n```\n$ python scrabble.py ZAEFIEE\n17 feeze\n17 feaze\n16 faze\n15 fiz\n15 fez\n\
    12 zee\n12 zea\n11 za\n6 fie\n6 fee\n6 fae\n5 if\n5 fe\n5 fa\n5 ef\n2 ee\n2 ea\n\
