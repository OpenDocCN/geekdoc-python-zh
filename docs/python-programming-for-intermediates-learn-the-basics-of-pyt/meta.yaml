  md: '# THE TESTING ‘1-2-3’


    Look at the following breakdown of the process of development that is essentially
    test-driven (this is a version of it at least). This is necessary before we get
    into the details of writing tests.


    +   ✓ Make out the new feature you need. Try documenting it and then writing a
    test for it.


    +   ✓ Write a skeleton code for this feature so that your program is running devoid
    of any syntax errors or things like that, but (note) so your test is still failing.
    You have to see your test fail so that you are sure that it in fact CAN fail.
    If you note a problem with the test and it is always succeeding regardless, it
    simply means you are not testing anything.


    +   ✓ Write a dummy code for the skeleton to appease the test. This does not have
    to implement the functionality accurately but simply make the tests pass. This
    in turn allows you to have all your tests passing all the time when you are developing
    (except the first time you try to run the test), even as you first implement the
    functionality.


    +   ✓ Refactor or rewrite the code so that it is actually doing what it ought
    to do, while at the same time trying to ensure your test is still succeeding.'
