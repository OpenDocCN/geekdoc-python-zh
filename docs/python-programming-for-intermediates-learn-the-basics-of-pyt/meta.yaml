- md: "## GET THE RACK\n\nWrite your code to acquire the Scrabble rack (these are\
    \ the letters present to create words) from the command line argument passed to\
    \ your script. For instance, say your script was known as ‘scrabble_cheater.py’,\
    \ if you tend to run *scrabble_cheater.py* RSTLNEI, the rack would then be RSTLNEI.\n\
    \nTry handling the case when a user is forgetting to supply a rack—in which case,\
    \ print the error message that states that they have to supply certain letters;\
    \ now exit the program with the function ‘exit()’. Ensure you maintain consistency\
