  md: 'You will agree that our output_decorator’s side effect is not very motivating.
    However, you can go beyond clean side effects and augment the function’s operation
    itself. For instance, the decorator could include the sort of cache precisely
    needed for memoization and then intercept calls to the function that is decorated
