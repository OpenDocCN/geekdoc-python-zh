  md: 'You can also pass the entire list of positional arguments to the functions
    by a keyword; in this case, we use the argument’s name in an assignment inside
    the function call parentheses. The arguments of the keyword can actually be passed
    in whichever order provided the needed positional arguments are well specified.
    You can combine and match positional arguments and keyword arguments. The calls
    are the same:


    ```

    remainder(20, 7)

    remainder(20, divisor=7)

    remainder(number=20, divisor=7)

    remainder(divisor=7, number=20)

    ```


    You need to specify positional arguments before the keyword arguments.


    ```

    remainder(number=20, 7)

    >>>

    SyntaxError: non-keyword arg after keyword arg

    Each argument can only be specified once.

    remainder(20, number=7)

    >>>

    TypeError: remainder() got multiple values for argument ''number''

    ```


    # 3: THE KEYWORD ARGUMENTS’ FLEXIBILITY GIVES THREE MAJOR BENEFITS


    First, keyword arguments offer more clarity to the function call, which benefits
    new readers of the code. With regards to the ‘remainder(20,7)’ call, it is not
    crystal clear which argument represents the number and which one represents the
    divisor without looking at the ‘remainder’ method implementation. In the keyword
    arguments call, the ‘divisor=7’ and ‘number=20’ make it obvious, almost immediately,
    the kind of parameter in use for every purpose.'
