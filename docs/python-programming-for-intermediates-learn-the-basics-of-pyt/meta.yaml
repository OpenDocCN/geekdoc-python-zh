    \ 'ISS', 'name': 'Yuri Malenchenko'}, {'craft': 'ISS', 'name': 'Timothy Kopra'},\
    \ {'craft': 'ISS', 'name': 'Timothy Peake'}]\n```\n\n现在你需要为所有宇航员打印行——每人一行。为此，你可以轻松使用\
    \ for 循环。每次循环时，'p' 将被设置为一个代表不同宇航员的字典。\n\n```\nprint('People in Space: ', result['number'])\n\
    \npeople = result['people']\n\nfor p in people:\n    print(p)\n```\n\n你现在可以尝试查找\
