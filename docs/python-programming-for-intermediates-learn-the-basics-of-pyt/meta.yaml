    \ name within the namespaces, the program then raises what’s referred to as a\
    \ NameError exception. As we start, try to type ‘dir ()’ in a python IDE such\
    \ as IDLE.\n\n```\ndir()\n# ['__builtins__','__doc__','__loader__','__name__',\n\
    '__package__','__spec__']\n```\n\nAll the names are listed by dir() are offered\
