  md: '# Inheritance in Python


    Inheritance is simply when a class uses code built within another class. You can
    look at inheritance in a biological manner: it is similar to a child inheriting
    particular traits from a parent. This means that the child can inherit the finger
    shape or color of the parent. At the same time, children can also share the last
    name with their parents.


    Classes known as subclasses or child classes inherit variables and methods from
    base classes or parent classes. In this regard, think of the parent class known
    as ‘parent’ having class variables for ‘finger shape’, ‘color’ and ‘height’ the
    child class known as ‘child’ will inherit from its ‘parent’.


    Since the subclass ‘child’ inherits from the base class ‘parent’, the ‘child’
    class can be able to reuse the code of ‘parent’, which then allows the programmer
    use less lines of code and reduce redundancy.'
