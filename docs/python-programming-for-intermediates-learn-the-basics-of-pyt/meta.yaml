- img_proc: true
  md: '# Shallow Copy, Deep Copy


    From what you already know about Data Types and Variables, you know that Python
    is different from most other programming languages especially during the copying
    and assigning of simple data types such as strings and integers. The difference
    between deep copying and shallow copying is especially visible with compound objects,
    the objects that contain other objects such as class instances and lists.


    The code snippet below shows Y pointing to the same memory location compared to
    X. This changes when a dissimilar value to Y is assigned. In our case here, if
    you still remember what we had learnt on data types and variables, y will get
    a separate memory location.


    ```

    >>> x = 3

    >>> y = x

    ```


    However, even when this internal behavior appears strange compared to other languages
    such as C, Perl, and C++, the observable assignment results will answer your expectations.
    It can however be quite problematic if you copy mutable objects such as dictionaries
    and lists.


    Python only builds real copies if it has to i.e. if the programmer, the user,
    demands it explicitly.


    You will become acquainted with the most critical problems that can happen when
    you are copying different mutable objects i.e. whenever you are copying dictionaries
    and lists.


    Let us look at copying a list.'
  merge: -1
  pgno: 11
- img_proc: true
  md: '```

    >>> colours1 = ["red", "green"]

    >>> colours2 = colours1

    >>> colours2 = ["rouge", "vert"]

    >>> print colours1

    [''red'', ''green'']

    ```


    ![](img/38ddc0cf78b6723be2853d1c42dfdfa0_12_0.png)


    The above example shows a simple list being assigned to colors1. The subsequent
    step will entail assigning color1 to colors2. After this, a new list becomes assigned
    to colors2. As expected, the values of colors 1 do not change and as you may already
    know, a fresh memory location had been allotted for colors2 since we have assigned
    a full fresh list to this variable.


    ```

    >>> colours1 = ["red", "green"]

    >>> colours2 = colours1

    >>> colours2[1] = "blue"

    >>> colours1

    [''red'', ''blue'']

    ```


    ![](img/38ddc0cf78b6723be2853d1c42dfdfa0_12_1.png)


    The question, nonetheless, is about what would happen when you changed an element
    of the colors2 and colors1 list. In the above example, a new value is assigned
    to the second element of colors2. Many beginners will be surprised to know that
    the colors1 list has also been changed ‘automatically’. You can only explain this
    by saying that there have not been any new assignments to colors2 apart from one
    of its elements.'
  merge: -1
  pgno: 12
- img_proc: true
  md: '# Using the Slice Operator


    You can completely shallow copy the list structures using the slice operator without
    experiencing any of the side effects illustrated above:


    ```

    >>> list1 = [''a'',''b'',''c'',''d'']

    >>> list2 = list1[:]

    >>> list2[1] = ''x''

    >>> print list2

    [''a'', ''x'', ''c'', ''d'']

    >>> print list1

    [''a'', ''b'', ''c'', ''d'']

    >>>

    ```


    However, as soon as the list has sublists, you experience the same challenge i.e.
    just pointers to sublists.


    ```

    >>> lst1 = [''a'',''b'',[''ab'',''ba'']]

    >>> lst2 = lst1[:]

    ```


    The following diagram depicts this behavior perfectly:


    ![](img/38ddc0cf78b6723be2853d1c42dfdfa0_13_0.png)


    Assigning the element a new value to of one of these lists ensures there are no
    side effects. When you tend to change a single element of the sublist, problems
    come up.'
  merge: -1
  pgno: 13
