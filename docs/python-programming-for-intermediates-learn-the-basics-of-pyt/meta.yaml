    \ `c2`，创建并读取了一个新属性 `attr`。然而，这并没有为 `c1` 对象创建该属性。\n\n## 删除属性和对象\n\n你可以随时使用 `del`\
    \ 语句删除对象的任何属性。要执行此操作，请在 Python shell 中尝试以下操作以获取输出。\n\n```python\n>>> c1 = ComplexNumber(2,3)\n\
    >>> del c1.imag\n>>> c1.getData()\nTraceback (most recent call last):\n  ...\n\
    AttributeError: 'ComplexNumber' object has no attribute 'imag'\n\n>>> del ComplexNumber.getData\n\
    >>> c1.getData()\nTraceback (most recent call last):\n  ...\nAttributeError: 'ComplexNumber'\
    \ object has no attribute 'getData'\n```\n\n你实际上也可以用 `del` 语句删除对象本身。\n\n```python\n\
    >>> c1 = ComplexNumber(1,3)\n>>> del c1\n>>> c1\nTraceback (most recent call last):\n\
    \  ...\nNameError: name 'c1' is not defined\n```\n\n实际上，情况比这要复杂得多。当你执行 `c1 = ComplexNumber(1,3)`\
    \ 时，你会在内存中创建一个新的实例对象，并且 `c1` 名称与之绑定。\n\n执行 `del c1` 时，这种绑定被移除，`c1` 名称从相应的命名空间中删除。然而，该对象继续存在于内存中，如果没有其他名称与之绑定，它稍后会被自动销毁。这种对未引用的\
    \ Python 对象的销毁也被称为垃圾回收。\n\n正如你可能已经知道的，面向对象编程构建可重用的代码模式，以抑制开发项目中的冗余情况。面向对象编程实现可回收代码的一个好方法是通过继承，即一个子类利用另一个基类的代码。\n\
    \n为了了解更多，我们将介绍 Python 编程中继承的一些重要方面，包括学习子类和父类的工作原理、如何重写属性和方法、`super()` 函数的使用，以及如何使用多重继承。\n\
    \n## Python 中的继承\n\n继承就是一个类使用另一个类中构建的代码。你可以从生物学的角度来看待继承：它类似于孩子从父母那里继承特定的特征。这意味着孩子可以继承父母的手指形状或颜色。同时，孩子也可以与父母共享姓氏。\n\
    \n被称为子类或派生类的类从基类或父类继承变量和方法。在这方面，可以想象名为 `parent` 的父类拥有 `finger_shape`、`color` 和\
    \ `height` 的类变量，名为 `child` 的子类将从其 `parent` 继承这些变量。\n\n由于子类 `child` 从基类 `parent`\
    \ 继承，`child` 类能够重用 `parent` 的代码，这使得程序员可以使用更少的代码行并减少冗余。\n\n## 父类\n\n也称为基类，父类构建了一个模式，子类或派生类可以基于此模式。父类允许你通过继承来构建子类，而无需每次都重复编写相同的代码。嗯，一个类可以成为父类，因此它们各自都是非常实用或实际的类，而不仅仅是模板。\n\
    \n例如，我们有一个通用的父类：`Bank_account`，它包含子类：`Business_account` 和 `Personal_account`。商业账户和个人账户之间的许多方法将是相同的——比如存取现金的方法——因此，这些可以放在\
    \ `Bank_account` 父类中。子类 `Business_account` 将包含非常特定于它的方法，可能包括收集业务记录和表格的方法，以及变量\
    \ `employee_identification_number`。\n\n同样，一个 `Animal` 类可能包含像 `eating()` 和 `sleeping()`\
    \ 这样的方法，就像子类 `Snake` 可能包含自己的方法，如 `hissing()` 和 `slithering()`。\n\n让我们创建一个父类 `fish`，我们稍后将用它来构建不同类型的鱼作为其子类。除了特征之外，这些鱼中的每一条都将有名字和姓氏。\n\
    \n在这方面，你将创建一个名为 `fish.py` 的文件，并从 `__init__()` 构造函数方法开始。你将用以下内容填充它："
