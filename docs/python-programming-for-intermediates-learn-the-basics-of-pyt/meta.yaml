    create words) from the command line argument passed to your script. For instance,
    say your script was known as ‘scrabble_cheater.py’, if you tend to run *scrabble_cheater.py*
    RSTLNEI, the rack would then be RSTLNEI.


    Try handling the case when a user is forgetting to supply a rack—in which case,
    print the error message that states that they have to supply certain letters;
    now exit the program with the function ‘exit ()’. Ensure you maintain consistency
    when it comes to capitalization.


    # NOW GET VALID WORDS


    Now write the which will help you to get every word in the Scrabble word list,
    which is made of letters that are a subdivision of the different rack letters.
    You can do this in many ways. However, you can use one way that is simple to reason
    about but is fast enough for your purpose here: go over every word in the word
    list and see whether every letter is in the rack. If you find it is, save the
    word in a list: ‘valid_words’. Ensure to handle the repeat letters; a letter from
    the rack cannot be used once more when it has already been used.


    # THE SCORING


    Now write the code that will help you determine the scrabble scores for every
    valid word with the above scores dictionary.'
