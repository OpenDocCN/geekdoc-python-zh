  md: '# Classes and Objects: Understanding their Meaning


    As mentioned in the first edition, Python is an object oriented programming language.
    Thus, unlike the procedure-oriented programming that stresses functions, it emphasizes
    objects.

    Simply put, objects are collection of data or variables and functions or methods
    acting on this data. On the other hand, a class acts as a blueprint for the object.

    The class is just like a prototype or sketch of a house that contains all details
    about the doors, windows, floors, and so on. According to these descriptions,
    you build a house; the house is the object.

    Since many houses can be built from a single description, you can make many objects
    from one class. An object can also be referred to as an instance of a class; the
    whole process of making this object is known as instantiation.'
  merge: -1
  pgno: 21
- img_proc: true
  md: "# Defining a Class\n\nLet us try Defining a class:\nIf you can remember correctly,\
    \ in Python, functions begin with the ‘def’ keyword. On the other hand, the class\
    \ is defined using the ‘class’ keyword. The first string is known as the docstring\
    \ and contains a short description of the class. Even though not compulsory, it\
    \ is recommended.\nLook at the following simple definition of a class:\n\n```\n\
    class MyNewClass:\n    \"\"\"This is a docstring. I have created a new class\"\
    \"\"\n    pass\n```\n\nA class makes a fresh local namespace in which all the\
    \ attributes have been defined. The attributes could be functions or data.\nWe\
    \ also have special attributes contained in it starting with ‘__’ (double underscores).\
