    \ 35)]\nCPU times: user 57 µs, sys: 1 µs, total: 58 µs\nWall time: 61 µs\n```\n\
    \nIn case you are wondering, the LRU that is in ‘lru_cache’ symbolizes least recently\
    \ used. This is a FIFO approach to managing the cache’s size that could grow very\
