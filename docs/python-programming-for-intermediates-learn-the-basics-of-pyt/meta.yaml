    \ code which will help you to get every word in the Scrabble word list, which\
    \ is made of letters that are a subdivision of the different rack letters. You\
    \ can do this in many ways. However, you can use one way that is simple to reason\
    \ about but is fast enough for your purpose here: go over every word in the word\
    \ list and see whether every letter is in the rack. If you find it is, save the\
    \ word in a list: ‘valid_words’. Ensure to handle the repeat letters; a letter\
    \ from the rack cannot be used once more when it has already been used.\n\n##\
    \ THE SCORING\n\nNow write the code that will help you determine the Scrabble\
    \ scores for every valid word with the above scores dictionary.\n\n## CHECK YOUR\
