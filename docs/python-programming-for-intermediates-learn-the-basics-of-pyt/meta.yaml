  md: "# Specifying Dynamic Default Arguments using ‘none’ and Docstrings\n\nAt times,\
    \ you have to use a non-static type as a default value of a keyword argument.\
    \ For instance, assume you need to print logging messages marked with the logged\
    \ event time. When it comes to the default case, you will want the messages to\
    \ have the time when the function was called. You might also want to try the approach\
    \ below, with the assumption that the default arguments are evaluated again, every\
    \ time the function is called.\n\n```\ndef log(message, when=datetime.now()):\n\
    \    print('%s: %s' % (when, message))\n\nlog('Hi there!')\nsleep(0.1)\nlog('Hi\
    \ again!')\n\n>>>\n2014-11-15 21:10:10.371432: Hi there!\n2014-11-15 21:10:10.371432:\
    \ Hi again!\n```\n\nThe timestamps are similar for the simple reason that the\
    \ ‘datetime.now’ is executed only once—that is when the function is defined. The\
    \ default argument values evaluate once for every module load alone and that typically\
    \ occurs when a program starts up. Once the module that contains this code is\
    \ loaded, the default argument ‘datetime.now’ never evaluates again.\n\nIn Python,\
    \ the convention for accomplishing the wanted result is providing a default ‘none’\
    \ value and documenting the actual docstring behavior. In instances where your\
    \ code sees a ‘none’ argument value, you then allot the default value fittingly."
  merge: -1
