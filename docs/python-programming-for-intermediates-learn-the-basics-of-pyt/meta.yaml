  - "[PAGE 71]\n\n# Decorators\n\nA decorator is simply a function in the higher-order.\
    \ This means it takes a function as its argument and returns another function.\
    \ When it comes to decorators, the returned function is typically only the original\
    \ function, which has been augmented with a bit of additional functionality. If\
    \ I were to give the most basic case, I would say that the added functionality\
    \ is what I would referred to as a pure clean side effect such as logging. As\
    \ an example, we can make a decorator, which has the ability to print some text\
    \ every time the function it is decorating is called as follows:\n\n```\ndef output_decorator(f):\n\
    \    def f_(f)\n        f()\n        print('Ran f..')\n            return f_\n\
    ```\n\nYou can take the decorated version to replace the f. Just do ‘F=output_decorator(f)’.\
    \ By now calling f(), you get the decorated version, i.e. the original function\
    \ as well as the print output. Python makes this even simpler with a bit of syntactic\
    \ sugar as follows:\n\n```\n@output_decorator\ndef f()\n    # ... define f ...\n\
    ```\n\nIf that did not make a lot of sense, you could try understanding decorators,\
    \ a [tutorial](https://www.simeonfranklin.com/) by Simeon Franklin that takes\
    \ you right from the basics of first class functions all the way to the decoration\
    \ principles in just twelve steps."
