    \ that are in the sequence can be used as positional arguments for functions using\
    \ the *operator.\n- When you use the * operator along with a generator, you might\
    \ deplete your program’s memory and lead to its eventual crash.\n- Some coding\
    \ bugs are difficult to find; in most cases, the introduction of these bugs happens\
    \ when you add to the function fresh positional parameters that accept *args.\n\
    \n## 2: OFFER OPTIONAL BEHAVIOR USING KEYWORD ARGUMENTS\n\nLike current programming\
    \ languages, calling a Python function makes it possible to pass arguments by\
    \ position.\n\n```python\ndef remainder(number, divisor):\n    return number %\
    \ divisor\n\nassert remainder(20, 7) == 6\n```\n\nYou can also pass the entire\
    \ list of positional arguments to the functions by a keyword; in this case, we\
    \ use the argument’s name in an assignment inside the function call parentheses.\
    \ The arguments of the keyword can actually be passed in whichever order provided\
    \ the needed positional arguments are well specified. You can combine and match\
    \ positional arguments and keyword arguments. The calls are the same:\n\n```python\n\
    remainder(20, 7)\nremainder(20, divisor=7)\nremainder(number=20, divisor=7)\n\
    remainder(divisor=7, number=20)\n```\n\nYou need to specify positional arguments\
    \ before the keyword arguments.\n\n```python\nremainder(number=20, 7)\n>>>\nSyntaxError:\
    \ non-keyword arg after keyword arg\n```\n\nEach argument can only be specified\
    \ once.\n\n```python\nremainder(20, number=7)\n>>>\nTypeError: remainder() got\
    \ multiple values for argument 'number'\n```\n\n## 3: THE KEYWORD ARGUMENTS’ FLEXIBILITY\
    \ GIVES THREE MAJOR BENEFITS\n\nFirst, keyword arguments offer more clarity to\
    \ the function call, which benefits new readers of the code. With regards to the\
    \ ‘remainder(20,7)’ call, it is not crystal clear which argument represents the\
    \ number and which one represents the divisor without looking at the ‘remainder’\
    \ method implementation. In the keyword arguments call, the ‘divisor=7’ and ‘number=20’\
    \ make it obvious, almost immediately, the kind of parameter in use for every\
    \ purpose.\n\nSecondly, the keyword arguments have a special impact: by default,\
    \ they can have values specified in the function definition. This lets a function\
    \ offer extra capabilities when you require them, but most of the time, also allows\
    \ you to accept the default behavior. This may come in handy in getting rid of\
    \ the repetitive code and reducing noise.\n\nFor instance, assume you want to\
    \ calculate the rate of a certain fluid flowing into a vat. If in this case the\
    \ vat is on a scale as well, you could use the two weight measurements’ difference\
    \ at two different times to know the rate of flow.\n\n```python\ndef flow_rate(weight_diff,\
    \ time_diff):\n    return weight_diff / time_diff\n\nweight_diff = 0.5\ntime_diff\
    \ = 3\nflow = flow_rate(weight_diff, time_diff)\nprint('%.3f kg per second' %\
    \ flow)\n\n>>>\n0.167 kg per second\n```\n\nIt is important to know, in the typical\
    \ case, the rate of flow in kg’s per second. At other times, it would be great\
    \ to use the final sensor measurements to make approximations of bigger time scales\
    \ such as hours or days. You can also add an argument for the scaling factor in\
    \ the time period to offer the behavior in the same function.\n\n```python\ndef\
    \ flow_rate(weight_diff, time_diff, period):\n    return (weight_diff / time_diff)\
    \ * period\n```\n\nWell, the issue is that now you have to specify the argument\
    \ ‘period’ each time you call the function; this includes the common case of the\
    \ rate of flow per seconds where the period is 1.\n\n```python\nflow_per_second\
    \ = flow_rate(weight_diff, time_diff, 1)\n```\n\nTo make this a bit less noisy,\
    \ you can offer the argument ‘period’ a default value.\n\n```python\ndef flow_rate(weight_diff,\
    \ time_diff, period=1):\n    return (weight_diff / time_diff) * period\n```\n\n\
    ## 4: THE ARGUMENT ‘PERIOD’ IS NOW OPTIONAL\n\n```python\nflow_per_second = flow_rate(weight_diff,\
    \ time_diff)\nflow_per_hour = flow_rate(weight_diff, time_diff,\n    period=3600)\n\
    ```\n\nThis works perfectly for the simple default values but you need to note\
    \ that it gets a bit tricky for the complex default values. Look at the next subtopic\
    \ talking about using ‘none’ and docstrings to specify the dynamic default arguments\
    \ up next.\n\nThe other reason why you need to use keyword arguments is that they\
    \ offer a great way of extending the parameters of a function while remaining\
    \ backwards compatible with the prevailing callers. This allows you to offer extra\
    \ functionality without necessarily having to move a load of code, which in turn\
    \ lessens the chance of buggy code.\n\nAs an example, assume you need to extend\
    \ the above function ‘flow_rate’ to compute the rate of flows in weight units\
    \ alongside kilograms. You can achieve this by adding fresh optional parameters\
    \ that offer a conversion rate to your chosen units of measurement.\n\n```python\n\
    def flow_rate(weight_diff, time_diff,\n    period=1, units_per_kg=1):\n    return\
    \ ((weight_diff * units_per_kg) / time_diff) * period\n```\n\nThe ‘units_per_kg’\
    \ has a default argument value of 1, making the returned weight units stay as\
    \ kilograms. This means no existing callers shall see a behavioral change. New\
    \ callers to the ‘flow_rate’ can then specify the fresh keyword argument to observe\
    \ the fresh behavior.\n\n```python\npounds_per_hour = flow_rate(weight_diff, time_diff,\n\
    \                           period=3600, units_per_kg=2.2)\n```\n\nThe only issue\
    \ with this kind of approach is that the optional keyword arguments such as ‘units_per_kg’\
    \ and ‘period’ may go on to be identified as positional arguments.\n\n```python\n\
    pounds_per_hour = flow_rate(weight_diff, time_diff, 3600,\n                  \
    \         2.2)\n```\n\nIf you think about it, positionally supplying the optional\
    \ arguments can be very confusing because it is not very clear what the 3600 and\
    \ 2.2 values are corresponding to. In this case, the best practice is to specify,\
    \ always, the optional arguments using the keyword names and never passing them\
    \ as positional arguments.\n\nYou need to note that backwards compatibility using\
    \ such optional keyword arguments is important for functions that accept *args.\
    \ You can go back to the subtopic discussing reducing visual noise with variable\
    \ positional arguments. Again, you will find that an even better practice is using\
    \ keyword only arguments—for this, read more on a subsequent subtopic talking\
    \ about enforcing clarity with keyword-based arguments.\n\n## Things You Need\
    \ To Remember About Arguments\n\nAs you work with keep in mind the following things:\n\
    \n- ✓ You can specify function arguments by keyword or position\n- ✓ Keywords\
    \ clarify what each argument’s purpose is when it could otherwise be confusing\
    \ when done with positional arguments alone.\n- ✓ Keyword arguments that contain\
    \ default values ease the process of adding fresh behaviors to functions, particularly\
    \ when the function contains prevailing callers.\n- ✓ The optional keyword arguments\
    \ have to be passed by keyword as opposed to position, always.\n\n## Specifying\
    \ Dynamic Default Arguments using ‘none’ and Docstrings\n\nAt times, you have\
    \ to use a non-static type as a default value of a keyword argument. For instance,\
    \ assume you need to print logging messages marked with the logged event time.\
    \ When it comes to the default case, you will want the messages to have the time\
    \ when the function was called. You might also want to try the approach below,\
    \ with the assumption that the default arguments are evaluated again, every time\
    \ the function is called.\n\n```python\ndef log(message, when=datetime.now()):\n\
    \    print('%s: %s' % (when, message))\n\nlog('Hi there!')\nsleep(0.1)\nlog('Hi\
    \ again!')\n\n>>>\n2014-11-15 21:10:10.371432: Hi there!\n2014-11-15 21:10:10.371432:\
    \ Hi again!\n```\n\nThe timestamps are similar for the simple reason that the\
    \ ‘datetime.now’ is executed only once—that is when the function is defined. The\
    \ default argument values evaluate once for every module load alone and that typically\
    \ occurs when a program starts up. Once the module that contains this code is\
    \ loaded, the default argument ‘datetime.now’ never evaluates again.\n\nIn Python,\
    \ the convention for accomplishing the wanted result is providing a default ‘none’\
    \ value and documenting the actual docstring behavior. In instances where your\
    \ code sees a ‘none’ argument value, you then allot the default value fittingly."
