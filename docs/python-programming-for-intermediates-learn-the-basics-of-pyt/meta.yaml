    \n    Args:\n        message: Message to print.\n        when: datetime of when\
    \ the message occurred.\n              Defaults to the present time.\n    \"\"\
    \"\n    when = datetime.now() if when is None else when\n    print('%s: %s' %\
    \ (when, message))\n```\n\nAt this point, the timestamps will not be the same.\n\
