  md: '# **Child Classes**


    Subclasses or child classes are classes that inherit from parent classes. This
    means that every child class will have the ability to take advantage of the parent
    class’ methods and variables. For instance, a child class ‘Goldfish’ that belongs
    to the subclass of ‘fish’ class will have the chance to use the ‘swim()’ method
    that has been declared in ‘fish’ without necessarily having to declare it.


    You can look at every child class as taking the role of a class of the parent
    class. This means if you have a child class that is referred to as ‘Rhombus’ and
    its parent class named ‘Parallelogram’, you can say that a ‘Rhombus’ is actually
    a ‘Parallelogram’ much like a ‘Goldfish’ is a ‘fish’.


    The first child class’ line looks a bit different from the non-child classes since
    you have to ensure the parent class passes into the child class as a parameter
    as follows:


    ```

    class Trout(Fish):

    ```


