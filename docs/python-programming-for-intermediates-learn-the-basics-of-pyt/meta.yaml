  md: '# Memoization in Python


    Memoization is the method of caching a functional call’s results. When you memoize
    a function, you can only evaluate it by looking up the result you obtained the
    first time you used those parameters to call the function. The log for this is
    in the Memoization cache. The lookup might fail—to mean the function failed to
    call with the parameters. Only then would running the function itself be necessary.


    Memoization does not make sense unless the function is deterministic, or you can
    simply accept the result as out of date. However, if the function were expensive,
    a massive speedup would be the result of the memorization. Essentially, you are
    dealing the function’s computational complexity for the lookup’s complexity.


    Let us take it back little.


    As a programmer, you know recursion gives you a convenient way of breaking bigger
    problems into smaller, manageable pieces. Try considering iterative set against
    recursive solutions for a Fibonacci sum (even though we will talk more about Fibonacci
    in a bit).'
  merge: -1
