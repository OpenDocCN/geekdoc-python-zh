  md: '# Parent Classes


    Also called base parent classes build a pattern out of which subclasses or child
    classes can be based on. The parent classes will allow you to construct child
    classes through inheritance without the need to write the same code repeatedly
    each time. Well, a class can become a parent class, and thus, they are each very
    functional or practical classes in their own right instead of mere templates.


    As an example, we have, say, a general parent class: ‘Bank_account’ that contains
    the child classes: ‘Business_account’ and ‘Personal_account’. Many of the methods
    between business accounts and personal accounts will be the same—like the methods
    to deposit and withdraw cash—thus, these can fit in the ‘Bank_account’ parent
    class. The subclass ‘Business_account’ would contain methods very specific to
    it, which may include a way of collecting business records and forms and as the
    variable ‘employee_identification_number’.


