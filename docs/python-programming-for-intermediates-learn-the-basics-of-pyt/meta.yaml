- md: "# Python Programming For Intermediates\n\nLearn The Basics of Python in 7 Days\n\
    \nMaurice J. Thompson\n\n## Introduction\n\nI want to thank you and congratulate\
    \ you for downloading the book, *Programming For Intermediates: Learn The Basics\
    \ of Python in 7 Days*.\n\nThis book is the ultimate guide to python programming\
    \ for intermediates. It will enable you to learn all that in as little as 7 days.\n\
    \nCongratulations for making it to this level and welcome to the second edition\
    \ of our Python programming in 7 days series. I hope you had fun with the beginner’s\
    \ edition and are ready to learn some more!\n\nIn case you have forgotten, Python\
    \ is the best programming language for learners or established programmers not\
    \ only because of its convenience and ease of use, but also because it makes coding\
    \ so attractive and fun.\n\nIn this second edition of the tutorial, we will cover\
    \ a range of topics that will help you understand and perform complex Python programming\
    \ projects. My assumption is that you already know the basics of Python including\
    \ downloading and installing important Python programs and working with the basic\
    \ Python functions. Otherwise, you need to revisit the first edition to make sure\
    \ you are ready to take on intermediate level programming.\n\nLet us start by\
    \ mentioning what we covered in the first edition of this series:\n\n- Downloading\
    \ and installing Python on major operating systems\n- How to interact with Python\n\
    - Writing your first program\n- Methods and functions–including variables, strings,\
    \ lists, tuples, and dictionaries\n- Loops\n- User defined functions\n- Beginner\
    \ level Python projects\n\nIn this book, we will talk about the following:\n\n\
    - Shallow copy and deep copy\n- Objects and classes in Python–including python\
    \ inheritance, multiple inheritance, and so on\n- Recursion in Python\n- Debugging\
    \ and testing\n- Fibonacci sequence (definition) and Memoization in Python\n-\
    \ Arguments in Python\n- Namespaces in Python and Python Modules\n- Simple Python\
    \ projects for Intermediates\n\nBy reading this book, you will learn all that\
    \ and much more. Let’s begin.\nThanks again for downloading this book. I hope\
    \ you enjoy it!\n\nDownload the Audiobook version of this book by clicking here:\n\
    https://itunes.apple.com/us/audiobook/python-programming-your-intermediate-guide-to-learn/id1448033975\n\
    \n© Copyright 2018 by Maurice J. Thompson - All rights reserved.\n\nThis document\
    \ is geared towards providing exact and reliable information in regards to the\
    \ topic and issue covered. The publication is sold with the idea that the publisher\
    \ is not required to render accounting, officially permitted, or otherwise, qualified\
    \ services. If advice is necessary, legal or professional, a practiced individual\
    \ in the profession should be ordered.\n\n- From a Declaration of Principles which\
    \ was accepted and approved equally by a Committee of the American Bar Association\
    \ and a Committee of Publishers and Associations.\n\nIn no way is it legal to\
    \ reproduce, duplicate, or transmit any part of this document in either electronic\
    \ means or in printed format. Recording of this publication is strictly prohibited\
