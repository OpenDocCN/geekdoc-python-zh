  md: "# Python 2’s Keyword-Only Arguments\n\nUnfortunately, unlike Python 3, Python\
    \ 2 does not have an explicit syntax for specifying keyword-only arguments. Nonetheless,\
    \ you can still attain the same behavior of getting ‘TypeErrors’ for function\
    \ calls that are not valid with the operator ‘**’ in the argument lists. This\
    \ operator is the same as the * operator. The only difference being that it takes\
    \ whichever number of keyword arguments instead of taking a variable number of\
    \ positional arguments regardless of the fact that they may not be defined.\n\n\
    ```\n# Python 2\ndef print_args(*args, **kwargs):\n    print 'Positional:', args\n\
    \    print 'Keyword: ', kwargs\n\nprint_args(1, 2, foo='bar', stuff='meep')\n\n\
    >>>\nPositional: (1, 2)\n    Keyword:  {'foo': 'bar', 'stuff': 'meep'}\n```\n\n\
    If you want to have ‘safe_division’ take arguments that are keyword-only in Python\
    \ 2, you need to have the function take **kwargs. After that, you ‘pop’ the expected\
    \ keyword arguments—that is, out of the kwargs dictionary with the second argument\
    \ of the ‘pop’ method to lay down the default value when the key is not there.\
    \ Lastly, you will need to ensure there are no more keyword arguments remaining\
    \ in kwargs so that the callers do not supply invalid arguments."
  merge: -1
  pgno: 97
- img_proc: true
  md: "```\n# Python 2\ndef safe_division_d(number, divisor, **kwargs):\n    ignore_overflow\
    \ = kwargs.pop('ignore_overflow', False)\n    ignore_zero_div = kwargs.pop('ignore_zero_division',\
    \ False)\n    if kwargs:\n        raise TypeError('Unexpected **kwargs: %r' %\
    \ kwargs)\n        # ...\n```\n\nYou can now call the function using or without\
    \ using the keyword arguments.\n\n```\nsafe_division_d(1, 10)\nsafe_division_d(1,\
    \ 0, ignore_zero_division=True)\nsafe_division_d(1, 10**500, ignore_overflow=True)\n\
    ```\n\nJust as is the case with Python 3, it will not be workable to passing keyword-only\
    \ arguments.\n\n```\nsafe_division_d(1, 0, False, True)\n>>>\nTypeError: safe_division_d()\
    \ takes 2 positional arguments but 4 were given\n```\n\nTrying to pass unexpected\
    \ keyword arguments also won't work.\n\n```\nsafe_division_d(0, 0, unexpected=True)\n\
    >>>\n    TypeError: Unexpected **kwargs: {'unexpected': True}\n```\n\n# DO NOT\
    \ FORGET THE FOLLOWING:\n\n+   √ Keyword arguments usually make a function's intention\
    \ clearer.\n√ You could use keyword-only arguments to enable you to force callers\
    \ to actually supply keyword arguments for any function that is potentially confusing.\
    \ This particularly applies to those that accept more than a single multiple Boolean\
    \ flag."
