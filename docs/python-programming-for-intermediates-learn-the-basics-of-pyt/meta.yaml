    \ Contents\n\n- [Introduction](#)\n- [Shallow Copy, Deep Copy](#)\n  - [Using\
    \ the Slice Operator](#)\n  - [Using The Module's Copydeep Copy Method](#)\n-\
    \ [Recursion in Python (Recursive Functions)](#)\n  - [Meaning of Recursion](#)\n\
    \  - [Applications of Recursion](#)\n- [Classes and Objects: Understanding their\
    \ Meaning](#)\n  - [Defining a Class](#)\n  - [Constructors](#)\n  - [Deleting\
    \ Attributes and Objects](#)\n- [Inheritance in Python](#)\n  - [Parent Classes](#)\n\
    \  - [Child Classes](#)\n  - [Overriding Parent Methods](#)\n  - [The Function\
    \ 'Super()'](#)\n  - [Multiple Inheritance](#)\n  - [Operator Overloading](#)\n\
    - [Python's Special Functions](https://example.com)\n- [Overloading the Operator\
    \ '+' In Python](https://example.com)\n- [Overloading Python's Comparison Operators](https://example.com)\n\
    - [Breather: Debugging and Testing](https://example.com)\n- [The Fibonacci sequence](https://example.com)\n\
    - [Memoization in Python](https://example.com)\n- [The Fibonacci Square](https://example.com)\n\
    - [Manual Memoization (Memoization by Hand)](https://example.com)\n- [Manual Memoization:\
    \ Objects](https://example.com)\n- [Manual Memoization: Using 'Global']](https://example.com)\n\
    - [Decorators](https://example.com)\n- [Arguments in Python](https://example.com)\n\
    - [Variable Function Arguments](https://example.com)\n- [Best Practice for Python\
    \ Function Arguments](https://example.com)\n- [Things You Need To Remember About\
    \ Arguments](https://example.com)\n- [Specifying Dynamic Default Arguments using\
    \ 'none' and Docstrings](https://example.com)\n- [Enforcing Clarity with Keyword-Only\
    \ Arguments](https://example.com)\n- [Python 2's Keyword-Only Arguments](https://example.com)\n\
    \n## Namespaces in Python\n\n- Meaning of Namespaces\n- Scope\n- Scope Resolution\n\
    \n## Python Modules\n\n- Importing a Module\n- Built In Python Modules\n\n## Simple\
    \ Python projects for Intermediates\n\n1. Scrabble Challenge\n2. ‘Where Is the\
    \ Space Station’ Project\n3. Creating a simple Keylogger\n\n## Conclusion\n\n\
    To start us off today, we will first talk about shallow and deep copy.\n\n## Shallow\
    \ Copy, Deep Copy\n\nFrom what you already know about Data Types and Variables,\
    \ you know that Python is different from most other programming languages especially\
    \ during the copying and assigning of simple data types such as strings and integers.\
    \ The difference between deep copying and shallow copying is especially visible\
    \ with compound objects, the objects that contain other objects such as class\
    \ instances and lists.\n\nThe code snippet below shows Y pointing to the same\
    \ memory location compared to X. This changes when a dissimilar value to Y is\
    \ assigned. In our case here, if you still remember what we had learnt on data\
    \ types and variables, y will get a separate memory location.\n\n```\n>>> x =\
    \ 3\n>>> y = x\n```\n\nHowever, even when this internal behavior appears strange\
    \ compared to other languages such as C, Perl, and C++, the observable assignment\
    \ results will answer your expectations. It can however be quite problematic if\
    \ you copy mutable objects such as dictionaries and lists.\n\nPython only builds\
    \ real copies if it has to i.e. if the programmer, the user, demands it explicitly.\n\
    \nYou will become acquainted with the most critical problems that can happen when\
    \ you are copying different mutable objects i.e. whenever you are copying dictionaries\
    \ and lists.\n\nLet us look at copying a list.\n\n```\n>>> colours1 = [\"red\"\
    , \"green\"]\n>>> colours2 = colours1\n>>> colours2 = [\"rouge\", \"vert\"]\n\
    >>> print colours1\n['red', 'green']\n```\n\n![](img/38ddc0cf78b6723be2853d1c42dfdfa0_12_0.png)\n\
    \nThe above example shows a simple list being assigned to colours1. The subsequent\
    \ step will entail assigning colours1 to colours2. After this, a new list becomes\
    \ assigned to colours2. As expected, the values of colours1 do not change and\
    \ as you may already know, a fresh memory location had been allotted for colours2\
    \ since we have assigned a full fresh list to this variable.\n\n```\n>>> colours1\
    \ = [\"red\", \"green\"]\n>>> colours2 = colours1\n>>> colours2[1] = \"blue\"\n\
    >>> colours1\n['red', 'blue']\n```\n\n![](img/38ddc0cf78b6723be2853d1c42dfdfa0_12_1.png)\n\
    \nThe question, nonetheless, is about what would happen when you changed an element\
    \ of the colours2 and colours1 list. In the above example, a new value is assigned\
    \ to the second element of colours2. Many beginners will be surprised to know\
    \ that the colours1 list has also been changed ‘automatically’. You can only explain\
    \ this by saying that there have not been any new assignments to colours2 apart\
    \ from one of its elements."
  mdcn: "# Python 编程进阶指南\n\n7天掌握Python基础\n\nMaurice J. Thompson\n\n## 引言\n\n我要感谢并祝贺你下载了这本书，*《Python编程进阶：7天掌握Python基础》*。\n\
    \n本书是Python编程进阶的终极指南。它将使你能在短短7天内掌握所有内容。\n\n祝贺你达到这个水平，并欢迎来到我们Python 7天编程系列的第二版。希望你在初级版中玩得开心，并准备好学习更多内容！\n\
    \n如果你忘记了，Python是学习者或资深程序员的最佳编程语言，不仅因为其便捷性和易用性，还因为它使编码变得如此有吸引力和有趣。\n\n在本教程的第二版中，我们将涵盖一系列主题，帮助你理解和执行复杂的Python编程项目。我的假设是你已经了解Python的基础知识，包括下载和安装重要的Python程序，以及使用基本的Python函数。否则，你需要回顾第一版，以确保你准备好进行中级编程。\n\
    \n让我们首先回顾一下本系列第一版涵盖的内容：\n\n- 在主要操作系统上下载和安装Python\n- 如何与Python交互\n- 编写你的第一个程序\n\
    - 方法和函数——包括变量、字符串、列表、元组和字典\n- 循环\n- 用户自定义函数\n- 初级Python项目\n\n在本书中，我们将讨论以下内容：\n\
    \n- 浅拷贝和深拷贝\n- Python中的对象和类——包括Python继承、多重继承等\n- Python中的递归\n- 调试和测试\n- 斐波那契数列（定义）和Python中的记忆化\n\
    - Python中的参数\n- Python中的命名空间和Python模块\n- 适合中级开发者的简单Python项目\n\n通过阅读本书，你将学到所有这些以及更多内容。让我们开始吧。\n\
    再次感谢你下载这本书。希望你喜欢它！\n\n点击此处下载本书的有声书版本：\nhttps://itunes.apple.com/us/audiobook/python-programming-your-intermediate-guide-to-learn/id1448033975\n\
