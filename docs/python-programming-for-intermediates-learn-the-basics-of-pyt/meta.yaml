    # Overriding Parent Methods


    So far, we have looked at the ‘Trout’ child class that has used the keyword ‘pass’
    to inherit all the behaviors of ‘fish’ parent class. We have also looked at the
    ‘Clownfish’ child class that inherited all the behaviors of the parent class and
    built its own unique method that is specific to the child class.


    At times though, you will want to use some of the behaviors of the parent class
    but not the entire list. When you change the methods of the parent class, you
    essentially override them.


    When you are creating the child and parent classes, you really have to keep the
    design of the program in mind. This will allow overriding not to produce unnecessary,
    redundant code.


    You will now create a child class ‘shark’ of the parent class ‘fish’. Since you
    built the class ‘fish’ with the idea of primarily creating a bony fish, you will
    need to create adjustments for the class ‘shark’ rather than a cartilaginous fish.
    When it comes to program design, if you had more than a single non-bony fish,
    you would probably want to create separate classes for every one of these two
    fish types.


    Unlike bony fish, sharks have skeletons made out of cartilage rather than bone.
    Sharks also have eyelids and cannot swim backwards. By sinking though, the sharks
