  - "[PAGE 65]\n\n# Manual Memoization (Memoization by Hand)\n\nThe first Memoization\
    \ approach involves taking advantage of an infamous Python feature: to add state\
    \ to a function as follows:\n\n```\ndef fib_default_memoized(n, cache={}):\n \
    \   if n in cache:\n        ans = cache[n]\n    elif n <= 2:\n        ans = 1\n\
    \        cache[n] = ans\n    else:\n        ans = fib_default_memoized(n - 2)\
    \ + fib_default_memoized(n - 1)\n        cache[n] = ans\n\n    return ans\n```\n\
    \nThe basic logic ought to be very obvious: the ‘cache’ is a results dictionary\
    \ of the earlier calls to ‘fib_default_memoized()’. The ‘n’ parameter is the key;\
    \ the nth Fibonacci number is the value. If it is that way, you are done, but\
    \ if it is not, you have to evaluate it as in the version of the native recursive\
    \ and keep it in the cache before the return of the result.\n\nThe thing here\
    \ is ‘cache’ is the function’s keyword parameter. Python usually evaluates the\
    \ keyword parameters just once, which is upon importation of the function. This\
    \ simply means that if there is mutability in the keyword parameter—note that\
    \ a dictionary is—it therefore just gets initialized once. This is usually the\
