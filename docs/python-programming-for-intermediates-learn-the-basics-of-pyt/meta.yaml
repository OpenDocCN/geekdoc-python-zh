  md: 'When you use some values to call a function, these values are assigned to the
    arguments based on their position. For instance, in the ‘greet()’ function above,
    the ‘Bruce’ value in “greet(Bruce, how do you do?”) becomes assigned to the ‘name’
    argument and likewise “how do you do?” to ‘msg’.


    Python allows for the use of keyboard arguments to call functions. When you call
    functions in this way, the position or order of the arguments can become altered—the
    Following calls to the function above are valid and give out the same result.


    ```

    >>> # 2 keyword arguments

    >>> greet(name = "Bruce",msg = "How do you do?")


    >>> # 2 keyword arguments (out of order)

    >>> greet(msg = "How do you do?",name = "Bruce")


    >>> # 1 positional, 1 keyword argument

    >>> greet("Bruce",msg = "How do you do?")

    ```


    You can see that we can combine keyword arguments with positional arguments in
    the course of a function call. We, however, consider the fact that keyword arguments
    must go with positional arguments.


    When you have a positional argument following keyword arguments, it will give
    out errors— for instance, look at the function call below:


    ```

    greet(name="Bruce","How do you do?")

    ```


    This results into following error:


    ```

    SyntaxError: non-keyword arg after keyword arg

    ```


    # 3: ARBITRARY ARGUMENTS IN PYTHON'
