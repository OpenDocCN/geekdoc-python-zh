  md: "# Enforcing Clarity with Keyword-Only Arguments\n\nA powerful feature in the\
    \ functions of Python is passing arguments by keyword. The flexibility given by\
    \ the keyword arguments makes it possible to write code that will be clear for\
    \ use cases.\n\nFor instance, you need to divide a single number by another but\
    \ are at the same time careful about the special cases. At times, you need to\
    \ ignore the exceptions: ‘ZeroDivisionError’ and instead return infinity. Again,\
    \ you will want to ignore the exceptions: ‘OverflowError’ and instead return zero.\n\
    \n```\ndef safe_division(number, divisor, ignore_overflow,\n                 ignore_zero_division):\n\
    \    try:\n        return number / divisor\n    except OverflowError:\n      \
    \  if ignore_overflow:\n            return 0\n        else:\n            raise\n\
    \    except ZeroDivisionError:\n        if ignore_zero_division:\n           \
    \ return float('inf')\n        else:\n            raise\n```\n\nYou will note\
    \ that this function is straightforward and the call will thus ignore the overflow\
    \ ‘float’ from division and return zero as a result."
  merge: -1
