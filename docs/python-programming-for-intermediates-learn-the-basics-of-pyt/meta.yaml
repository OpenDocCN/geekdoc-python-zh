    \ Scrabble 时作弊。继续练习吧！\n\n## 2：“空间站在哪里”项目\n\n这个项目让你使用 Web 服务获取国际空间站（ISS）的当前位置，然后在地图上绘制其精确位置。\n\
    \n### 步骤 1：了解谁在太空\n\n首先，你将使用一个提供太空实时信息的 Web 服务。我们将首先尝试找出当前谁在太空中。\n\n你需要注意到，Web\
    \ 服务有一个类似于典型网页的 URL 或地址。然而，它返回的是数据而不是网页 HTML。在网页浏览器中，打开以下链接：\n[http://api.open-notify.org/astros.json](http://api.open-notify.org/astros.json)\n\
    \n等待看到类似这样的内容：\n\n```\n{\n  \"message\": \"success\",\n  \"number\": 3,\n  \"\
    people\": [\n    {\n      \"craft\": \"ISS\",\n      \"name\": \"Yuri Malenchenko\"\
    \n    },\n    {\n      \"craft\": \"ISS\",\n      \"name\": \"Timothy Kopra\"\n\
    \    },\n    {\n      \"craft\": \"ISS\",\n      \"name\": \"Timothy Peake\"\n\
    \    }\n  ]\n}\n```\n\n由于数据是实时的，你肯定会看到一个非常不同的结果。我们称这种格式为 JSON。\n\n我们现在将从 Python\
    \ 调用 Web 服务以使用结果。打开下面的 trinket：\n\n模块 `json` 和 `urllib.request` 已导入并可供使用。现在将以下代码添加到\
    \ `main.py` 中，以便将你之前使用的网址放入一个变量：\n\n```\nurl = 'http://api.open-notify.org/astros.json'\n\
    ```\n\n我们现在将如下调用 Web 服务：\n\n```\nurl = 'http://api.open-notify.org/astros.json'\n\
    response = urllib.request.urlopen(url)\n```\n\n之后，我们需要将 JSON 响应加载到 Python 数据结构中，如下所示：\n\
    \n```\nurl = 'http://api.open-notify.org/astros.json'\nresponse = urllib.request.urlopen(url)\n\
