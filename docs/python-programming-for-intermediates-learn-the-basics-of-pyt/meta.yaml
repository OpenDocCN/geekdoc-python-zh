  md: '# Meaning of Namespaces


    A namespace is a system of making sure all program names are special unique and
    you, the programmer, can use them without causing any conflict. By now, you should
    know very well that all Python stuff such as functions, lists, and strings are
    objects. Well, you may want to know Python usually makes use of namespaces as
    dictionaries. We have a name-to-object mapping with objects as values and names
    as keys. Many different namespaces can actually use one name and then proceed
    to map it to a distinct object.


    Look at the following namespace examples.


    **Local namespaces:** These namespaces comprise local names within a function.
    The creation of such namespaces happens when functions are called, and only last
    up until the functions return.


    **Global namespaces:** These namespaces comprise names from different imported
    modules used in a project. Their creation happens when the modules are incorporated
    into the project and stick around only before the scripts end.


    **Built-in namespaces:** These namespaces consist of built-in exception names
    and built-in functions.


    Even though we will discuss modules in a later chapter, you need to note that
    there are useful arithmetic functions in different modules. For instance, the
    cmath and math modules contain many functions that are shared in the two, such
    as acos(), exp(), cos(), log10() and so on. If you use both modules in one program,
    you will need to prefix them with the module’s name if'
