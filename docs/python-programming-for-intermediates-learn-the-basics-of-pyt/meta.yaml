  md: "# Best Practice for Python Function Arguments\n\nWhen it comes to dealing with\
    \ function arguments in Python, you should keep the following best practices in\
    \ mind:\n\n# 1: USING VARIABLE POSITIONAL ARGUMENTS TO REDUCE VISUAL NOISE\n\n\
    In reference to the parameter’s conventional name, args*, optional positional\
    \ arguments are also known as ‘star args’. When you accept these optional positional\
    \ arguments, you can make a function call clearer and eliminate ‘visual noise’.\n\
    For instance, assume you want to log or record a bit of debug information. You\
    \ would require a function taking a message and a group of values.\n\n```\ndef\
    \ log(message, values):\n    if not values:\n        print(message)\n    else:\n\
    \        values_str = ', '.join(str(x) for x in values)\n        print('%s: %s'\
    \ % (message, values_str))\n\nlog('My numbers are', [1, 2])\nlog('Hi there', [])\n\
    \n>>>\nMy numbers are: 1, 2\nHi there\n```\n\nWhen you have to pass an empty list\
    \ without any values to log, it is burdensome and noisy. Entirely leaving out\
    \ the second argument would be better. In Python, you can do this by simply prefixing\
    \ the final positional parameter with the use of *. The first log message parameter\
    \ is needed—although whichever number of"
  merge: -1
  pgno: 81
- img_proc: true
  md: "succeeding positional arguments are entirely optional. Save for the callers,\
    \ the function body does not have to change.\n\n```\ndef log(message, *values):\
    \  # The only difference\n    if not values:\n        print(message)\n    else:\n\
    \        values_str = ', '.join(str(x) for x in values)\n        print('%s: %s'\
    \ % (message, values_str))\n\nlog('My numbers are', 1, 2)\nlog('Hi there')  #\
    \ Much better\n```\n\n```\n>>>\nMy numbers are: 1, 2\nHi there\n```\n\nIf you\
    \ have a list ready and maybe desire to call a variable argument function such\
    \ as ‘log’, you can simply use the * operator to achieve that. This will tell\
    \ Python to pass the items as positional arguments from the sequence.\n\n```\n\
    favorites = [7, 33, 99]\nlog('Favorite colors', *favorites)\n```\n\n```\n>>>\n\
    Favorite colors: 7, 33, 99\n```\n\nWhen it comes to taking a variable number of\
    \ positional arguments, we have two issues. For one, variable arguments are converted\
    \ into tuples before being transferred to your function. What this means is that\
    \ when your function’s caller uses the asterisk operator within a generator, it\
    \ is then iterated to its exhaustion. The tuple that results will include each\
    \ value from the generator, which could use up a lot of memory, which would cause\
    \ your program to crash."
