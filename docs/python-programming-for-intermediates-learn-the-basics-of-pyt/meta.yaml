- img_proc: true
  md: '# Using The Module’s Copydeep Copy Method


    A good way to approach the problems we have described is using the module *copy*.
    This module gives the ‘copy’ method, which in turn enables a total copy of an
    arbitrary list- that is, shallow, and the other lists.


    Look at the example script below that uses the example above and the method here:


    ```

    from copy import deepcopy


    lst1 = [''a'',''b'',[''ab'',''ba'']]


    lst2 = deepcopy(lst1)


    lst2[2][1] = "d"

    lst2[0] = "c";


    print lst2

    print lst1

    ```


    If you save our script and name it deep_copy.py, and if you call your script with
    ‘python deep_copy.py’, you will get the output below:


    ```

    $ python deep_copy.py

    [''c'', ''b'', [''ab'', ''d'']]

    [''a'', ''b'', [''ab'', ''ba'']]

    ```


    ![](img/38ddc0cf78b6723be2853d1c42dfdfa0_15_0.png)'
  merge: -1
  pgno: 15
