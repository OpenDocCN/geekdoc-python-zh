    12,zee\n12,zea\n11,za\n3,aia\n2,ee\n2,ea\n2,ai\n2,aa\n2,ae\n```\n\nCongratulations!\
    \ You have just implemented an important and useful script in Python from the\
    \ beginning; and as you know, it is ideal for cheating at words or Scrabble with\
    \ friends. Do not stop practicing!\n\n## 2: ‘Where Is the Space Station’ Project\n\
    \nThis project allows you to use a web service to get the present location of\
    \ the ISS (International Space Station), and then plot its exact location on a\
    \ map.\n\n### Step 1: Know who is in space\n\nTo get started, you are going to\
