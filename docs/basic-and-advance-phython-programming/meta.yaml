    \ to 123\"\nf=re.search(\"\\d\",s)\nprint(f.start())\n```\n\n`split()`: #returns\
    \ a list where the string match with a string\n\n```python\ns=\"welcome to itutees\"\
    \nf=re.split(\"\\s\",s)\nprint(f)\n```\n\n`sub()`: #Replaces one or many matches\
    \ with a string\n\n```python\ns=\"welcome to itutees\"\nf=re.sub(\"\\s\",\"*\"\
    ,s)\nprint(f)\n```\n\n##### Metacharacters\n\nCharacters with a special meaning.\n\
    \n`[]` a set characters\n\n```python\ns=\"itutees channel\"\nf=re.findall(\"[a-f]\"\
    ,s) #A set of characters\nprint(f)\n```\n\n`\\` signals a special sequence\n\n\
    ```python\ns=\"itutees 123\"\nf=re.findall(\"\\d\",s)\nprint(f)\n```\n\n`.` any\
    \ character (except newline character)\n\n```python\ns=\"welcome to itutees\"\n\
    f=re.findall(\"it....s\",s)\nprint(f)\n```\n\n`^` starts with\n\n```python\ns=\"\
