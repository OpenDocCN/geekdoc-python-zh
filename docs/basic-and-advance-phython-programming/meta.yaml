    \n```\n   a  b\n1  3  4\n1  7  8\n```\n\n## 11.10 Python Pandas - Panel\n\n**Panel**是一个三维的数据容器。术语**面板数据**源自计量经济学，并且部分负责pandas这个名字——**pan(el)-da(ta)-s**。\n\
