    # 1. Python 编程基础概念


    ## 1.1 简介


    Python 是一种解释型、高级、通用的编程语言，由吉多·范罗苏姆开发，其第一个版本于 1991 年发布。Python 有两个主要版本：**Python 2
    和 Python 3**。两者差异很大。


    ## 1.2 Python 编程入门


    ### 1.2.1 寻找解释器


    在开始 Python 编程之前，我们需要一个解释器来解释和运行我们的程序。


    **Windows：** 有许多免费的解释器可用于运行 Python 脚本，例如 IDLE（集成开发环境），它随从 http://python.org/ 下载的
    Python 软件捆绑提供。


    **Linux：** Python 预装在流行的 Linux 发行版中，如 Ubuntu 和 Fedora。要检查你正在运行的 Python 版本，请在终端模拟器中输入
    “python”。解释器应该会启动并打印版本号。


    **macOS：** 通常，Python 2.7 随 macOS 捆绑提供。你需要从 http://python.org/ 手动安装 Python 3。


    ## 1.3 编译器与解释器：探索编译器和解释器之间的区别是什么？


    解释器和编译器都是将源代码（高级语言）转换为机器码（以便计算机能够理解它们）的程序。在本章中，我们将讨论编译器和解释器之间的区别。


    一个典型的计算机程序通常以人类可以理解的高级语言存在。因此，它们包含来自英语（或任何其他常用语言）的各种短语和单词。另一方面，计算机无法像我们一样理解这些语言——但可以理解二进制代码的程序。因此，我们首先用高级语言（源代码）编写程序，将它们转换为机器语言，并使它们对计算机可读。这正是我们需要解释器和编译器的时候。


    ### 1.3.1 什么是编译器？


    编译器是一种翻译器，它通过接受高级语言的输入来产生低级语言（如汇编语言或机器语言）的输出。它基本上是一个计算机程序，用于将用编程语言编写的代码转换为机器码（将人类可读的代码转换为计算机处理器可以理解的二进制
    0 和 1 位语言）。然后计算机处理机器码以执行相应的任务。


    - 编译器检查所有类型的错误、限制和范围。因此，它更智能。

    - 其程序的运行时间更长，并且占用更多内存。


    ### 1.3.2 什么是解释器？


    它是一个将编程语言翻译成可理解语言的程序。它是一个用于将高级程序语句转换为机器码的计算机程序。它包括预编译代码、源代码和脚本。


    - 解释器一次只翻译程序中的一条语句。

    - 它们在程序运行之前创建编程语言的 exe 文件。


    ### 1.3.3 编译器与解释器的区别


    | 序号 | 编译器 | 解释器 |

    |---|---|---|

    | 1 | 它首先扫描整个程序并将其翻译成机器码 | 它逐行扫描程序并将其翻译成机器码 |

    | 2 | 编译器同时显示所有错误和警告。 | 解释器一次显示一个错误 |

    | 3 | 错误在扫描整个程序后发生 | 错误在扫描每一行后发生 |

    | 4 | 调试较慢 | 调试更快 |

    | 5 | 执行时间较短 | 执行时间较长 |

    | 6 | 编译器被 C、C++ 等语言使用。 | 解释器被 Python、Java 等语言使用。 |


    ## 1.4 为什么要学习 Python？


    它的增长相当高。它被广泛用于许多领域，例如：


    - 数据分析

    - 机器学习

    - 深度学习

    - 人工智能

    - 桌面应用程序开发

    - Web 开发等。


    ## 1.5 什么是 Python IDLE？


    安装 Python 后，只需转到开始菜单，找到 “IDLE (python 3.7)”。IDLE 代表集成开发学习环境。这是 Python 的默认开发环境。还有更多开发环境，如
    PyCharm、Eclipse、Eric 等。


    ## 1.6 用 Python 编写程序


    Python 为我们提供了在一个文件中编写 Python 程序的便利，该程序将按顺序逐行执行。编写 Python 程序的步骤：


    1. 打开 Python IDLE。

    2. 单击 “File Menu”，然后选择 “New File”。

    3. 将出现一个新的屏幕/窗口。

    4. 在此输入 Python 程序，并以 “.py” 扩展名保存程序。

    5. 要运行程序，请单击 “Run” 菜单，然后单击 “Run Module”。

    6. Python 代码将开始运行。


    ### 示例


    ```

    Print()

    此函数用于打印消息/值。

    语法：

    Print(“Hello”)

    输出：Hello

    a=5

    b=6

    c=a+b

    ```'
