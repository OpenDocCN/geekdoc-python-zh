    # Python Program to find Area Of Circle using Radius\nPI = 3.14\nradius = float(input('\
    \ Please Enter the radius of a circle: '))\narea = PI * radius * radius\ncircumference\
    \ = 2 * PI * radius\nprint(area)\nprint(circumference)\n```\n\n### 示例 3：编写一个程序来交换两个数字的值。\n\
    \n```\na = int(input(\"enter 1st num:\"))\nb = int(input(\"enter 2nd num:\"))\n\
    c = a\na = b\nb = c\nprint(\"value of a=\", a)\nprint(\"value of b=\", b)\n```\n\
    \n## 3 循环语句\n\n### 3.1 Python 中的控制语句\n\nPython 语句按照它们在程序中出现的顺序逐一执行。但有时我们可能需要根据条件来执行语句。甚至可能存在这样的情况：我们希望在条件为真时，将单个语句或多个语句（语句块）执行“n”次。因此，为了控制程序的执行流程，Python\
    \ 为我们提供了控制语句。\n\n控制语句有两种类型：\n\n(a) 选择语句\n    (i) if\n(b) 循环条件\n    (i) While (ii)\
    \ for\n\n#### 3.1.1 选择语句\n\n选择语句用于根据条件选择要执行的语句。换句话说，如果存在某个条件，根据该条件决定是否执行某个语句，那么这就称为选择语句。Python\
    \ 为我们提供了“if”选择语句。\n\n#### 3.1.2 循环语句\n\n循环语句用于在条件为真时，将单个语句或语句块（多个语句）执行“N”次。循环语句会持续执行语句，直到给定条件为真。一旦条件变为假，它就会停止工作。\n\
    \n#### 3.1.3 If 语句\n\nIf 是一个双向条件控制语句，它检查条件并根据该条件执行操作。一个条件可能只有两种结果：条件为真或条件为假。\n\
    \na. If 条件 :\n    语句 1\n    语句 2\n    ------------\n    语句 n\n\nb. If 条件 :\n \
    \   语句 1\n    ------------\n    else:\n    语句 1\n    ------------\n\nc. If 条件\
    \ :\n    语句 1\n    ------------\n    elif 条件 :\n    语句 1\n    ------------\n \
    \   else:\n    语句 1\n    ------------\n\n可能存在需要测试多个条件的情况。\n语法：\n\nd. If 条件 :\n\
    \    语句 1\n    ------------\n    elif 条件 :\n    语句 1\n    ------------------\n\
    \    elif 条件 :\n    语句 1\n    ------------------\n    else:\n    语句 1\n    ------------------\n\
    \n### 一级程序\n\n#### 示例 1：编写一个程序来检查一个数字是奇数还是偶数。\n\n解决方案\n\n```\na = int(input(\"\
    enter the number to check:\"))\nif (a % 2 == 0):\n    print(\"the number is even.\"\
    )\nelse:\n    print(\"the number is odd.\")\n```\n\n#### 示例 2：编写一个程序来检查一个年龄是否达到投票年龄\n\
    \n解决方案\n\n```\na = int(input(\"enter your age:\"))\nif (a > 18):\n    print(\"\
    Eligible vote.\")\nelse:\n    print(\"Eligible not vote.\")\n```\n\n#### 示例 3：编写一个程序来找出两个数字中的最大值\n\
    \n解决方案\n\n```\na = int(input(\"enter 1st num:\"))\nb = int(input(\"enter 2nd num:\"\
    ))\nif (a > b):\n    print(\"max no.\", a)\nelse:\n    print(\"max no.\", b)\n\
    ```\n\n#### 示例 4：编写一个程序来找出三个数字中的最大值\n\n解决方案\n\n```\na = int(input(\"enter 1st\
    \ num:\"))\nb = int(input(\"enter 2nd num:\"))\nc = int(input(\"enter 3rd num:\"\
    ))\nif (a > b and a > c):\n    print(\"max no.\", a)\nelif (b > a and b > c):\n\
    \    print(\"max no.\", b)\nelse:\n    print(\"max no.\", c)\n```\n\n#### 示例 5：编写一个程序来检查给定的数字是正数、负数还是零。\n\
    \n解决方案\n\n```\na = int(input(\"enter 1st num:\"))\nif (a > 0):\n    print(\"positive\
    \ no.\")\nelif (a < 0):\n    print(\"negative no\")\nelse:\n    print(\"zero.\"\
    )\n```\n\n#### 示例 6：编写一个程序来计算 5 个科目的总分（满分=100）以及根据以下条件计算等级百分比：\n\n- 百分比>=80-等级\
    \ A\n- 百分比>=60-等级 B\n- 百分比>=40-等级 C\n- 百分比<40-等级 D\n\n解决方案\n\n```\na = int(input(\"\
    enter 1st num:\"))\nb = int(input(\"enter 2nd num:\"))\nc = int(input(\"enter\
    \ 3rd num:\"))\nd = int(input(\"enter 4th num:\"))\ne = int(input(\"enter 5th\
    \ num:\"))\ntotal = a + b + c + d + e\npercent = (total / 500) * 100\nprint(\"\
    Total Marks=\", total, \"Percentage\", percent)\nif (percent >= 80):\n    print(\"\
    you have got grade A.\")\nelif (percent >= 60):\n    print(\"you have got grade\
    \ B.\")\nelif (percent >= 40):\n    print(\"you have got grade C.\")\nelse:\n\
    \    print(\"you have got grade D.\")\n```\n\n### 3.1.4 循环语句\n\n循环语句是一种控制语句，它会在条件为真时，将单个语句或语句块执行“N”次。一旦条件变为假，执行就会终止。\n\
    \n基本上，Python 提供以下循环语句：\n\n1. While 语句\n2. For 循环\n\n这两种循环语句执行相同的任务。唯一的区别在于它们的语法。\n\
    \n### 3.1.5 While 循环\n\nWhile 循环是一种控制语句，它会在条件为真时，将单个语句或语句块执行“N”次。一旦条件变为假，执行就会终止。\n\
    \n每个循环语句都有三个部分：\n\na. 初始化\nb. 条件\nc. 增量/减量\n\n如果上述三个语句中缺少任何一个，循环将不会执行。\n\n####\
    \ 初始化\n\n这是使用循环执行的计数器变量的初始化。换句话说，我们可以说必须有一个起始值，这个值就称为初始化。"
