    # 18.3 Python Tkinter Geometry


    The Tkinter geometry specifies the method by using which, the widgets are represented
    on display. The python Tkinter provides the following geometry methods.


    +   1. The pack() method

    2. The grid() method

    3. The place() method


    Let’s discuss each one of them in detail.


    # 18.3.1 Python Tkinter Pack() Method


    The pack() widget is used to organize widget in the block. The positions widgets
    added to the python application using the pack() method can be controlled by using
    the various options specified in the method call.


    However, the controls are less and widgets are generally added in the less organized
    manner.


    The syntax to use the pack() is given below.


    Syntax: widget.pack(options)


    A list of possible options that can be passed in pack() is given below.


    +   - **expand**: If the expand is set to true, the widget expands to fill any
    space.

    - **Fill**: By default, the fill is set to NONE. However, we can set it to X or
    Y to determine whether the widget contains any extra space.

    - **size**: it represents the side of the parent to which the widget is to be
    placed on the window.


    # Example


    ```

    from tkinter import *


    parent = Tk()


    redbutton = Button(parent, text = “Red”, fg = “red”)

    redbutton.pack( side = LEFT)


    greenbutton = Button(parent, text = “Black”, fg = “black”)

    greenbutton.pack( side = RIGHT )


    bluebutton = Button(parent, text = “Blue”, fg = “blue”)

    ```'
  - '[PAGE 219]


    ```

    bluebutton.pack( side = TOP )

    blackbutton = Button(parent, text = “Green”, fg = “red”)

    blackbutton.pack( side = BOTTOM)

    parent.mainloop()

    ```


    # Output


    ![](img/47b28f190e036c6a53fc1640ab2c3296_219_0.png)


    # 18.3.2 Python Tkinter Grid() Method


    The grid() geometry manager organizes the widgets in the tabular form. We can
    specify the rows and columns as the options in the method call. We can also specify
    the column span (width) or rowspan(height) of a widget.


    This is a more organized way to place the widgets to the python application. The
    syntax to use the grid() is given below.


    **Syntax:** widget.grid(options)


    A list of possible options that can be passed inside the grid() method is given
    below.


    +   - **Column:** The column number in which the widget is to be placed. The leftmost
    column is represented by 0.

    - **Columnspan:** The width of the widget. It represents the number of columns
    up to which, the column is expanded.

    - **ipadx, ipady:** It represents the number of pixels to pad the widget inside
    the widget’s border.

    - **padx, pady:** It represents the number of pixels to pad the widget outside
    the widget’s border.

    - **Row:** The row number in which the widget is to be placed. The topmost row
    is represented by 0.'
  - '[PAGE 220]


    +   - **Rowspan:** The height of the widget, i.e. the number of the row up to
    which the widget is expanded.

    - **Sticky:** If the cell is larger than a widget, then sticky is used to specify
    the position of the widget inside the cell. It may be the concatenation of the
    sticky letters representing the position of the widget. It may be N, E, W, S,
    NE, NW, NS, EW, ES.


    # Example


    ```

    # !/usr/bin/python3

    from tkinter import *

    parent = Tk()

    name = Label(parent,text = "Name").grid(row = 0, column = 0)

    e1 = Entry(parent).grid(row = 0, column = 1)

    password = Label(parent,text = "Password").grid(row = 1, column = 0)

    e2 = Entry(parent).grid(row = 1, column = 1)

    submit = Button(parent, text = "Submit").grid(row = 4, column = 0)

    parent.mainloop()

    ```


    Output


    ![](img/47b28f190e036c6a53fc1640ab2c3296_220_0.png)


    # 18.3.3 Python Tkinter Place() Method


    The place() geometry manager organizes the widgets to the specific x and y coordinates.


    Syntax:widget.place(options)


    A list of possible options is given below.


    +   - **Anchor:** It represents the exact position of the widget within the container.
    The default value (direction) is NW (the upper left corner).

    - **bordermode:** The default value of the border type is INSIDE that refers to
    ignore the parent\u2019s inside the border. The other option is OUTSIDE.

    - **height, width:** It refers to the height and width in pixels.'
  - '[PAGE 221]


    +   - **relheight, relwidth**: It is represented as the float between 0.0 and
    1.0 indicating the fraction of the parent''s height and width.

    - **relx, rely**: It is represented as the float between 0.0 and 1.0 that is the
    offset in the horizontal and vertical direction.

    - **x, y**: It refers to the horizontal and vertical offset in the pixels.


    # Example


    ```

    # !/usr/bin/python3

    from tkinter import *

    top = Tk()

    top.geometry("400x250")

    name = Label(top, text = "Name").place(x = 30,y = 50)

    email = Label(top, text = "Email").place(x = 30, y = 90)

    password = Label(top, text = "Password").place(x = 30, y = 130)

    e1 = Entry(top).place(x = 80, y = 50)

    e2 = Entry(top).place(x = 80, y = 90)

    e3 = Entry(top).place(x = 95, y = 130)

    top.mainloop()

    ```


