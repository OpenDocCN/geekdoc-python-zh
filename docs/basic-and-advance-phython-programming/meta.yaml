    Syntax:


    ```

    cmp(list1,list2)

    ```


    Returns: return 1 is list1 is greater than list2 return 0 if both the list are
    equal returns -1 is list2 is greater than list1


    There are some certain cases for comparison for two lists


    Case1:


    +   a. If both the list contains integers, then the comparison is done from left
    to right. If we get a larger number at any particular index, that list becomes
    greater and further comparison is stopped.

    b. If all the elements in both the list are similar and one list is larger is
    size the larger size list is greater.

    c. And if both contain some value the lists are equal.


