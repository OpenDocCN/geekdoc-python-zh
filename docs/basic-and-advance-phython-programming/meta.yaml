    \ [no items]; if any of the axes are of length 0. |\n| 5 | ndim<br>Number of axes\
    \ / array dimensions. |\n| 6 | shape<br>Returns a tuple representing the dimensionality\
    \ of the DataFrame. |\n| 7 | size<br>Number of elements in the NDFrame. |\n| 8\
    \ | values<br>Numpy representation of NDFrame. |\n| 9 | head()<br>Returns the\
    \ first n rows. |\n| 10 | tail()<br>Returns last n rows. |\n\nLet us now create\
    \ a DataFrame and see all how the above mentioned attributes operate.\n\n####\
    \ 12.3.1 Example\n\n```\nimport pandas as pd\nimport numpy as np\n#Create a Dictionary\
    \ of series\nd = {'Name':pd.Series(['Tom','James','Ricky','Vin','Steve','Smith','Jack']),\n\
    \     'Age':pd.Series([25,26,25,23,30,29,23]),\n     'Rating':pd.Series([4.23,3.24,3.98,2.56,3.20,4.6,3.8])}\n\
    #Create a DataFrame\ndf = pd.DataFrame(d)\nprint (\"Our data series is:\")\nprint\
    \ df\n```\n\nIts **output** is as follows:\n\nOur data series is:\n\n| Age | Name\
    \ | Rating |\n|---|---|---|\n| 0 | 25 | Tom | 4.23 |\n| 1 | 26 | James | 3.24\
    \ |\n| 2 | 25 | Ricky | 3.98 |\n| 3 | 23 | Vin | 2.56 |\n| 4 | 30 | Steve | 3.20\
    \ |\n| 5 | 29 | Smith | 4.60 |\n| 6 | 23 | Jack | 3.80 |\n\n#### 12.3.2 T (Transpose)\n\
    \nReturns the transpose of the DataFrame. The rows and columns will interchange.\n\
    \n#### Example\n\n```\nimport pandas as pd\nimport numpy as np\n# Create a Dictionary\
    \ of series\nd= {'Name':pd.Series(['Tom','James','Ricky','Vin','Steve','Smith','Jack']),\n\
    \    'Age':pd.Series([25,26,25,23,30,29,23]),\n    'Rating':pd.Series([4.23,3.24,3.98,2.56,3.20,4.6,3.8])}\n\
    # Create a DataFrame\ndf = pd.DataFrame(d)\nprint (\"The transpose of the data\
    \ series is:\")\nprint df.T\n```\n\nIts **output** is as follows:\n\nThe transpose\
    \ of the data series is:\n\n| | 0 | 1 | 2 | 3 | 4 | 5 | 6 |\n|---|---|---|---|---|---|---|---|\n\
    | Age | 25 | 26 | 25 | 23 | 30 | 29 | 23 |\n| Name | Tom | James | Ricky | Vin\
    \ | Steve | Smith | Jack |\n| Rating | 4.23 | 3.24 | 3.98 | 2.56 | 3.2 | 4.6 |\
    \ 3.8 |\n\n#### 12.3.3 Axes\n\nReturns the list of row axis labels and column\
    \ axis labels.\n\n#### Example\n\n```\nimport pandas as pd\nimport numpy as np\n\
    #Create a Dictionary of series\nd = {'Name':pd.Series(['Tom','James','Ricky','Vin','Steve','Smith','Jack']),\n\
    \     'Age':pd.Series([25,26,25,23,30,29,23]),\n     'Rating':pd.Series([4.23,3.24,3.98,2.56,3.20,4.6,3.8])}\n\
    #Create a DataFrame\ndf = pd.DataFrame(d)\nprint (\"Row axis labels and column\
