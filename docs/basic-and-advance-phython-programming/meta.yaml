    | ram | 10 | shyam | 12.5 | |\n| -4 | -3 | -2 | -1 | 反向索引 |\n\n**示例：**\n\n```\n\
    a=[\"ram\",10,\"shyam\",12.5]\nprint(a[1])\na[1]=\"Ramesh\"\noutput : a=[ram,10,shyam,12.5]\n\
