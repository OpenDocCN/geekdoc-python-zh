  md: "# 16.6.2 Constructor with Super() Method\n\n+   - If we write constructor in\
    \ the both classes, parent class and child class then the parent class constructor\
    \ is not available to the child class.\n- In this case only child class constructor\
    \ is accessible which means child class constructor is replacing parent class\
    \ constructor. This concept is called overriding constructor.\n- **super()** method\
    \ is used to call parent class constructor or methods from the child class.\n\n\
    # Example supper use command\n\n```\nclass a:\n    def __init__(self): #constructor\
    \ method\n        print(“hii”)\n    def feature1(self):\n        print(“fature1\
    \ of a”)\n    def feature2(self):\n        print(“feature2 of a”)\nclass b(a):\n\
    \    def __init__(self): #constructor method\n        print(“bye”)\n        super().__init__()\
    \ #this command use for calling init fuction inheriance\n    def feature3(self):\n\
    \        print(“feature1 of b”)\n        super().feature1()\n    def feature4(self):\n\
    \        print(“fature2 of b”)\nob1=b()\nob1.feature3()\n```\n\n# 16.6.3 Method\
    \ Resolution Order\n\nIn the multiple inheritance scenario members of class are\
    \ searched first in the current class. If not found, the search continue into\
    \ parent classed in depth first, left to right manner without searching the same\
    \ class twice.\n\n+   - Search for the child class before going to its parent\
    \ class.\n- When a class is inherited from several classes, it searches in the\
    \ order from left to right in the parent classes.\n- It will not visit any class\
    \ more than once which means a class in the inheritance hierarchy is traversed\
    \ only once exactly"
