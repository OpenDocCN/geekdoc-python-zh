    # 11.2 NumPy vs Pandas


    NumPy array is used for the implementation of pandas data objects.


    Python Pandas - Environment Setup


    Standard Python distribution doesn’t come bundled with Pandas module. A lightweight
    alternative is to install NumPy using popular Python package installer, **pip**.


    ```

    pip install pandas

    ```


    # 11.3 Introduction to Data Structures


    Pandas deals with the following three data structures


    +   - Series

    - DataFrame

    - Panel


    These data structures are built on top of Numpy array, which means they are fast.


    Dimension & Description


    The best way to think of these data structures is that the higher dimensional
    data structure is a container of its lower dimensional data structure. For example,
    DataFrame is a container of Series, Panel is a container of DataFrame.


    | Data Structure | Dimensions | Description |

    |---|---|---|

    | Series | 1 | 1D labeled homogeneous array, size immutable. |

    | Data Frames | 2 | General 2D labeled, size-mutable tabular structure with potentially
    heterogeneously typed columns. |

    | Panel | 3 | General 3D labeled, size-mutable array. |


    Building and handling two or more dimensional arrays is a tedious task, burden
    is placed on the user to consider the orientation of the data set when writing
    functions. But using Pandas data structures, the mental effort of the user is
    reduced.


    For example, with tabular data (DataFrame) it is more semantically helpful to
    think of the **index** (the rows) and the **columns** rather than axis 0 and axis
    1.


    # Mutability


    All Pandas data structures are value mutable (can be changed) and except Series
    all are size mutable. Series is size immutable.'
