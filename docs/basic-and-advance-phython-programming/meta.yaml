- md: "## 13.1.2 Correlation\n\nCorrelation shows the linear relationship between\
    \ any two array of values (series). There are multiple methods to compute the\
    \ correlation like pearson(default), spearman and kendall.\n\n### Example\n\n\
    ```python\nimport pandas as pd\nimport numpy as np\nframe = pd.DataFrame(np.random.randn(10,\
    \ 5), columns=['a', 'b', 'c', 'd', 'e'])\nprint(frame['a'].corr(frame['b']))\n\
    print(frame.corr())\n```\n\nIts **output** is as follows:\n\n```\n-0.383712785514\n\
    \          a         b         c         d         e\na  1.000000 -0.383713 -0.145368\
    \  0.002235 -0.104405\nb -0.383713  1.000000  0.125311 -0.372821  0.224908\nc\
    \ -0.145368  0.125311  1.000000 -0.045661 -0.062840\nd  0.002235 -0.372821 -0.045661\
    \  1.000000 -0.403380\ne -0.104405  0.224908 -0.062840 -0.403380  1.000000\n```\n\
    \nIf any non-numeric column is present in the DataFrame, it is excluded automatically.\n\
    \n## 13.1.3 Data Ranking\n\nData Ranking produces ranking for each element in\
    \ the array of elements. In case of ties, assigns the mean rank.\n\n### Example\n\
    \n```python\nimport pandas as pd\nimport numpy as np\ns = pd.Series(np.random.randn(5),\
    \ index=list('abcde'))\ns['d'] = s['b'] # so there's a tie\nprint(s.rank())\n\
    ```\n\nIts **output** is as follows:\n\n```\na    1.0\nb    3.5\nc    2.0\nd \
    \   3.5\ne    5.0\ndtype: float64\n```\n\nRank optionally takes a parameter `ascending`\
    \ which by default is `True`; when `False`, data is reverse-ranked, with larger\
    \ values assigned a smaller rank.\n\nRank supports different tie-breaking methods,\
    \ specified with the `method` parameter:\n\n- **average** – average rank of tied\
    \ group\n- **min** – lowest rank in the group\n- **max** – highest rank in the\
    \ group\n- **first** – ranks assigned in the order they appear in the array\n\n\
