- md: "## 16.4.6 Passing Member of one Class to Another Class\n\n```python\nclass\
    \ student:\n    #constructor\n    def __init__(self, n, r):\n        self.name\
    \ = n\n        self.roll = r\n    #instance method\n    def disp(self):\n    \
    \    print(\"student Name:\", self.name)\n        print(\"student Roll:\", self.roll)\n\
    \n#user define class\nclass user:\n    @staticmethod\n    def show(s):\n     \
    \   print(\"user Name:\", s.name)\n        print(\"user Roll:\", s.roll)\n   \
    \     s.disp()\n\n#creating object of student class\nstu = student('Rahul', 101)\n\
    user.show(stu)\n```\n\n## 16.4.7 Inner Class\n\nIt means class generated within\
    \ the class.\n\n### Example\n\n```python\nclass a:\n    def laptop(self):\n  \
    \      print(\"i5,1tb\")\n    class comname:\n        def name(self):\n      \
    \      print(\"dell\")\n\nlap1 = a()  #constructor it means class name and ()\n\
    lap1.laptop()  #call function\nlap2 = a.comname()  #call inner class\nlap2.name()\n\
    ```\n\n### Single inheritance\n\n### Example\n\n```python\nclass a:\n    def feature1(self):\n\
    \        print(\"feature of 1\")\n    def feature2(self):\n        print(\"feature2\
    \ of a\")\n\nclass b(a):\n    def feature3(self):\n        print(\"feature1 of\
    \ b\")\n    def feature4(self):\n        print(\"feature2 of b\")\n\nob1 = b()\n\
    ob1.feature1()\n```\n\nNote: inheritance means kisi dusere class ki value ko kisi\
    \ dusere class se access kerna it is called inheritance.\n\n### Multiple inheritance\n\
    \nIf a class is derived from more than one parent class, then it is called multiple\
    \ inheritance.\n\n```python\nclass Father:\n    def feature1(self):\n        print(\"\
    feature of 1\")\n    def feature2(self):\n        print(\"feature2 of a\")\n\n\
    class Mother:\n    def feature3(self):\n        print(\"feature1 of b\")\n   \
    \ def feature4(self):\n        print(\"feature2 of b\")\n\nclass Son(Father, Mother):\n\
    \    def feature5(self):\n        print(\"feature1 of c\")\n    def feature6(self):\n\
    \        print(\"feature2 of c\")\n\nob1 = Son()\nob1.feature4()\n```\n\n## 16.5\
    \ Multiple Level Inheritance\n\nIn multi-level inheritance, the class inherits\
    \ the feature of another derived class (child class).\n\n### Example\n\n```python\n\
    class a:\n    def feature1(self):\n        print(\"feature of 1\")\n    def feature2(self):\n\
    \        print(\"feature2 of a\")\n\nclass b(a):\n    def feature3(self):\n  \
    \      print(\"feature1 of b\")\n    def feature4(self):\n        print(\"feature2\
    \ of b\")\n\nclass c(b):\n    def feature5(self):\n        print(\"feature1 of\
    \ c\")\n    def feature6(self):\n        print(\"feature2 of c\")\n\nob1 = c()\n\
    ob1.feature1()\n```\n\n## 16.6 Constructor in Inheritance\n\nBy default, The constructor\
    \ in the parent class is available to the child class.\n\n### Example with init\
    \ method\n\n```python\nclass a:\n    def __init__(self):  #constructor method\n\
    \        print(\"hii\")\n    def feature1(self):\n        print(\"feature of 1\"\
    )\n    def feature2(self):\n        print(\"feature2 of a\")\n\nclass b(a):\n\
    \    def feature3(self):\n        print(\"feature1 of b\")\n    def feature4(self):\n\
    \        print(\"feature2 of b\")\n\nob1 = b()\nob1.feature1()\n```\n\n### 16.6.1\
    \ Constructor Overriding\n\nIf we write constructor in the both classes, parent\
    \ class and child class then the parent class constructor is not available to\
    \ child class.\n\nIn this case only child class constructor is accessible which\
    \ means child class constructor is replacing parent class constructor. This concept\
    \ is called overriding constructor.\n\n### Example\n\n```python\nclass Father:\n\
