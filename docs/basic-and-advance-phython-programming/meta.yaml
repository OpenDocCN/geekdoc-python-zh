  md: '# 2.1.2 Relational/Comparison Operator


    Relational/comparison operators are those that perform comparison among operands.
    It gives either true or false based on the condition. Relational operators are:

    a=4, b=2


    | Operator | Description | Example |

    | :--- | :--- | :--- |

    | >(Greater than) | Checks whether first number is greater than second | a>b return
    true |

    | >=(Greater than equal to) | Checks whether first number is greater than equal
    to second number or not | a>=b return true |

    | <(less than) | Checks whether first number is smaller than second | a<b return
    false |

    | <=(less than equal to) | Checks whether first number is smaller than equal to
    second number | a<=b return false |

    | ==(Equal to) | Checks whether first number is equal to second number | a==b
    return false |

    | != (not equal to) | Checks whether first number is not equal to second number
    | a!=b return true |


    # 2.1.3 Assignment Operator


    Assignment operator is used to assign a value to a variable

    a=4,b=2,c=6


    | Operator | Description | Example |

    | :--- | :--- | :--- |

    | = | Assign values from right to left | c=a+b assigns value of a+b into c. |

    | += add & assign | It adds the right operand to left operand and assign the value
    to left operand | c+=a is equal to c=c+a |

    | -= subtract & assign | It subtracts the right operand from left operand and
    assigns the value to left operand | c-=a is equal to c=c-a |

    | *= multiply & assign | It multiplies the right operand with left operand and
    assign the value to left operand | c*=a is equal to c=c*a |

    | /= divide & assign | It divides left operand with the right operand and assign
    the value to left operand | c/=a is equal to c=c/a |

    | %=Modulus & assign | It divides left operand with the right operand and assign
    the remainder value to left operand | c%=a is equal to c=c%a |'
