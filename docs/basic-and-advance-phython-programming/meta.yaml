    \  raise BalanceException('Insuficent balance')  # raise exception\n        print(balance)\n\
    \    except BalanceException as be:\n        print(be)\ncheckbalance()\n```\n\n\
    output:\n\nInsuficent balance\n\n## 18\n\n## Python Library\n\n### 18.1 Library\
