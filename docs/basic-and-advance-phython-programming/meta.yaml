    #方法1\nimport module1\nimport module2\nmodule1.display()\nmodule2.show()\n#方法2\n\
    from module1 import*\nfrom module2 import*\ndisplay()\nshow()\n```\n\n## 示例\n\n\
    从两个不同的包导入模块\n\n![](img/47b28f190e036c6a53fc1640ab2c3296_206_0.png)\n\n```python\n\
    import sys\nsys.path.append(\"C:/Users/AGYA VERMA/PycharmProjects/myProject/demo1\"\
    )\nfrom module1 import*\nsys.path.append(\"C:/Users/AGYA VERMA/PycharmProjects/myProject/demo1/demo2\"\
    )\nfrom module2 import*\nmodule1.display()\nmodule2.show()\n```\n\n## 如何访问变量、函数、方法、类等\n\
    \n`packageName.moduleName.functionName()`\n`packageName.subpackageName.moduleName.functionName()`\n\
