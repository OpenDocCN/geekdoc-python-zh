    # Acknowledgements


    Our debts in the writing of this book are many, and we spell them out now. Bear
    with us. We acknowledge many in the ‘References’ section towards the end of the
    book. We have tried our best but almost certainly failed to recognize some of
    the others by not making proper notes. To any such creators that we may have overlooked,
    our apologies. We have learned a great deal from the writings of experts in the
    investor/trader community and the Python community on online forums like stackoverflow.com,
    quora.com, and others and are indebted to them.


    Finally, we would like to thank all the students we have taught in the past several
    years. A special thanks to those of you who endured our first few iterations of
    the lectures before we learned how best to teach it. Dear students, we exist because
    you exist. You have inspired us, challenged us, and pushed us never to stop learning
    just to keep up with you. We hope you enjoy reading this as much as we enjoyed
    writing it for you.


    A.R. Verma

    Y. Kumar

