    print(os.getcwd())\nprint(os.chdir('C:\\itutees'))\nprint(os.getcwd())\nos.system('mkdir\
    \ xyz')\nos.renames('xyz','abc')\n```\n\n#### 20.4.1 String Pattern Matching\n\
    \nThe `re` module provides regular expression tools for advanced string processing.\n\
    \nFunction – `import re`\n\n`findall()`: #returns a list containing all matches\n\
    \n##### Example\n\n```python\ns=\"itutees channel\"\nf=re.findall(\"[a-f]\",s)\
