    \n**注意：** 模块可以导入其他模块。\n\n### 17.1.4 如何访问方法、函数、变量和类\n\n使用模块名，你可以访问函数。\n\n语法：`module_name.function_name()`\n\
    \n## 示例\n\n```python\naddition.add(12,13)\n```\n\n## 17.2 Python 编程中的包\n\n一个包可以有一个或多个模块，这意味着一个包是模块和包的集合。\n\
    \n一个包可以包含包。\n\n包不过是一个目录/文件夹。\n\n![](img/47b28f190e036c6a53fc1640ab2c3296_205_0.png)\n\
    \n### 17.2.1 创建包\n\n包不过是一个目录/文件夹，它必须包含一个名为 `__init__.py` 的特殊文件。\n\n`__init__.py`\
    \ 文件可以为空，它表示它包含的目录是一个 Python 包，因此可以像导入模块一样导入它。\n\n如何导入包\n\n`import packageName.moduleName`\n\
    \n## 示例\n\n从单个包导入模块\nPack1 文件夹\n```python\ndef display():\n    print(\"this is\
    \ display function in module1 \")\n```\npack1 文件夹\n```python\ndef show():\n  \
    \  print(\"this is show function in module2 \")\n```\n\n![](img/47b28f190e036c6a53fc1640ab2c3296_205_1.png)\n\
