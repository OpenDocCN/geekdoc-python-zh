    \ Father(ABC):  # abstract class\n    @abstractmethod\n    def disp(self):  #\
    \ abstract method\n        pass\nclass child(Father):\n    def disp(self):\n \
    \       print(\"child class\")\n        print(\"defing abstract method\")\nc =\
    \ child()\nc.disp()\n```\n\n## Rules\n\n- All methods of an interface is abstract.\n\
    - We can not create object of interface.\n- If a class is implementing an interface\
    \ it has to define all the methods given in that interface.\n- If a class does\
    \ not implement all the methods declared in the interface, the class must be declared\
    \ abstract.\n\n## When use interface\n\nWe use interface when all the feature\
    \ need to be implemented differently for different object.\n\n## 17.5 Data Hiding\
