    \ counter clockwise |\n| penup() | None | It picks up the turtle’s Pen |\n| pendown()\
    \ | None | Puts down the turtle’s Pen |\n| up() | None | Picks up the turtle’s\
    \ Pen |\n| down() | None | Puts down the turtle’s Pen |\n| color() | Color name\
    \ | Changes the color of the turtle’s pen |\n| fillcolor() | Color name | Changes\
    \ the color of the turtle will use to fill a polygon |\n| heading() | None | It\
    \ returns the current heading |\n| position() | None | It returns the current\
    \ position |\n| goto() | x, y | It moves the turtle to position x,y |\n| begin_fill()\
    \ | None | Remember the starting point for a filled polygon |\n| end_fill() |\
    \ None | It closes the polygon and fills with the current fill color |\n| dot()\
    \ | None | Leaves the dot at the current position |\n| stamp() | None | Leaves\
