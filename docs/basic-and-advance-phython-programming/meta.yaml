    # 关于作者


    **阿格亚·拉姆·维尔马博士**出生于印度北方邦阿约提亚。他于2010年获得印度北方邦巴雷利IET MJPRU的电子与仪器工程学士学位。他在印度贾巴尔普尔的印度信息技术学院（IIIT）设计与制造分校完成了电子与通信工程硕士学位。他于2019年获得北阿坎德邦德拉敦北阿坎德邦技术大学的博士学位。他于2013年加入印度北阿坎德邦保里加瓦尔的G.
    B. 帕特工程学院电子与通信工程系，担任助理教授。他的研究兴趣包括机器学习、信号处理。他在国际知名期刊和会议上发表了超过35篇研究论文。他于2021年发表了一项专利。他于2021年通过Sara
    book publication出版了一本关于机器学习基础的书籍。他还获得了一个研发项目和一个咨询项目。他也是许多知名国际期刊的审稿人，例如《计算机方法在生物力学与生物医学工程中的应用：成像与可视化》（Taylor
    & Francis）、《IET发电、输电与配电》、《国际信号与成像系统工程杂志》（IJSISE）、《智能与模糊系统杂志》、GUCON 2019 IEEE会议（印度）、《信号处理杂志》、《电子学快报》、《IET》。


    **亚滕德拉·库马尔博士**是印度北方邦巴雷利马哈特马·约蒂巴·普勒罗希尔坎德大学工程与技术学院电子与仪器工程系的前系主任和副教授。他于1999年完成电子与仪器工程学士学位，并于2001年在哈里亚纳邦库鲁克谢特拉国家技术学院（前身为区域工程学院）获得仪器工程硕士学位。他在印度丹巴德印度矿业学院（ISM）完成了博士学位。他拥有超过20年的教学经验。此外，他还撰写和合著了多篇发表在国内和国际期刊上的研究论文。他也是许多知名国际期刊的审稿人，如《IEEE
    Access》、《国际电子学杂志》、《微波与光学技术快报》、《国际电子与通信杂志》（AEU）、《国际射频与计算机辅助设计杂志》（RFCAD）和《国际微波与技术杂志》。


    **萨格·拉姆·维尔马博士**于2003年获得印度阿约提亚R. M. L. 阿瓦德大学理学学士学位，并于2005年获得印度瓦拉纳西贝拿勒斯印度教大学数学理学硕士学位。他于2009年获得印度瓦拉纳西印度理工学院（BHU）应用数学博士学位。他自2011年起在印度北阿坎德邦哈里德瓦尔的Gurukula
    Kangri（被认定为大学）担任数学助理教授。他的研究兴趣包括数学规划、小波分析及其应用。他在国际知名期刊和会议上发表了超过25篇研究论文。他指导了4名博士生。


