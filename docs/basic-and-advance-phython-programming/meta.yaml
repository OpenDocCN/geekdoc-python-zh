    # # Object Oriented Programming in Python


    # ## 16.1 OOP in python


    Object-oriented programming (OOP) is a programming language model which organized
    object and data.


    # ### 16.1.1 What is Encapsulation


    If same variable is reapect in two different palce then which problem is solved
    using encapsulation it means one variable is making private otherwise program
    generate error.


    # ### 16.1.2 Abstraction


    Abstraction in Python is the process of hiding the real implementation of an application
    from the user and emphasizing only on usage of it. For example, consider you have
    bought a new electronic gadget. Along with the gadget, you get a user guide, instructing
    how to use the application, but this user guide has no info regarding the internal
    working of the gadget.


    Another example is, when you use TV remote, you do not know how pressing a key
    in the remote changes the channel internally on the TV. You just know that pressing
    + volume key will increase the volume.


    # ### 16.1.3 Why Do We Need Abstraction?


    Through the process of abstraction in Python, a programmer can hide all the irrelevant
    data/process of an application in order to reduce complexity and increase efficiency.


