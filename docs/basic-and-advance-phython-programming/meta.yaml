    \ print(\"tabdak tabdak\")\ndef myfunction(obj):\n    obj.walk()\nd=duck()\nmyfunction(d)\n\
    ```\n\n## 16.8.2 Strong Typing\n\nWe can check whether the object passed to the\
    \ method has the method being invoked or not.\n\nhasattr() function is used to\
    \ check whether the object has a method or not.\nSyntax: hasattr(object, attribute)\n\
