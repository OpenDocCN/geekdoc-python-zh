    real time data processing and also discuss a few other DataStructures.


    # ### 12.2 Series Basic Functionality


    | S.No | Attribute or Method & Description |

    |---|---|

    | 1 | axes<br>Returns a list of the row axis labels |

    | 2 | dtype<br>Returns the dtype of the object. |

    | 3 | empty<br>Returns True if series is empty. |

    | 4 | ndim<br>Returns the number of dimensions of the underlying data, by definition
    1. |

    | 5 | size<br>Returns the number of elements in the underlying data. |

    | 6 | values<br>Returns the Series as ndarray. |

    | 7 | head()<br>Returns the first n rows |

    | 8 | tail()<br>Returns the last n rows. |


    Let us now create a Series and see all the above tabulated attributes operation


    # #### Example


    ```

    import pandas as pd

    import numpy as np

    #Create a series with 100 random numbers

    s = pd.Series(np.random.randn(4))

    print(s)

    ```'
