    | copy | Copy data. Default, **false** |\n\n### 11.10.1 Create Panel\n\nA Panel\
    \ can be created using multiple ways like:\n\n- From ndarrays\n- From dict of\
    \ DataFrames\n\n#### From 3D ndarray\n\n##### Example\n\n```\n# creating an empty\
    \ panel\nimport pandas as pd\nimport numpy as np\ndata = np.random.rand(2,4,5)\n\
    p = pd.Panel(data)\nprint(p)\n```\n\nIts **output** is as follows:\n\n```\n<class\
    \ 'pandas.core.panel.Panel'>\nDimensions: 2 (items) x 4 (major_axis) x 5 (minor_axis)\n\
    Items axis: 0 to 1\nMajor_axis axis: 0 to 3\nMinor_axis axis: 0 to 4\n```\n\n\
    **Note** – Observe the dimensions of the empty panel and the above panel, all\
    \ the objects are different.\n\n#### From dict of DataFrame Objects\n\n```\n#creating\
    \ an empty panel\nExample:\nimport pandas as pd\nimport numpy as np\ndata = {'Item1'\
    \ : pd.DataFrame(np.random.randn(4, 3)),\n        'Item2' : pd.DataFrame(np.random.randn(4,\
    \ 2))}\np = pd.Panel(data)\nprint(p)\n```\n\nIts **output** is as follows:\n\n\
    ```\nDimensions: 2 (items) x 4 (major_axis) x 3 (minor_axis)\nItems axis: Item1\
    \ to Item2\nMajor_axis axis: 0 to 3\nMinor_axis axis: 0 to 2\n```\n\n### 11.11.2\
    \ Create an Empty Panel\n\nAn empty panel can be created using the Panel constructor\
    \ as follows:\n\n```\n#creating an empty panel\n\nExample:\n\nimport pandas as\
    \ pd\np = pd.Panel()\nprint(p)\n```\n\nIts **output** is as follows:\n\n```\n\
