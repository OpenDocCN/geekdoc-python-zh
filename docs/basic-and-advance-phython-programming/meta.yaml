    ## 示例\n\n```python\nclass duck:\n    def walk(self):\n        print(\"thapak thapak\"\
    )\nclass horse:\n    def walk(self):\n        print(\"tabdak tabdak\")\ndef myfunction(obj):\n\
    \    obj.walk()\nd=duck()\nmyfunction(d)\n```\n\n## 16.8.2 强类型\n\n我们可以检查传递给方法的对象是否具有被调用的方法。\n\
    \n`hasattr()` 函数用于检查对象是否具有某个方法。\n语法：`hasattr(object, attribute)`\n其中 `attribute`\
