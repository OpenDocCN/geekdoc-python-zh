    最后，我们要感谢过去几年我们教过的所有学生。特别感谢那些在我们学会如何最好地教授这门课程之前，忍受了我们最初几次讲座迭代的同学们。亲爱的学生们，我们因你们而存在。你们激励了我们，挑战了我们，并推动我们永不停止学习，只是为了跟上你们的步伐。我们希望你们喜欢阅读这本书，就像我们喜欢为你们写作一样。


