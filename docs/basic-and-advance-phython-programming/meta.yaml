    \ with\n\n```python\ns=\"welcome to itutees\"\nf=re.findall(\"itutees$\",s)\n\
    print(f)\n```\n\n`*` Zero or more occurrences\n\n```python\ns=\"The ran in spain\"\
    \nf=re.findall(\"ai*\",s)\nprint(f)\n```\n\n`+` One or more occurrences\n\n```python\n\
    s=\"welcome to itutees\"\nf=re.findall(\"ai+\",s)\nprint(f)\n```\n\n`{}` exactly\
    \ the specify number of occurrence\n\n```python\ns=\"welcome to itutees\"\nf=re.findall(\"\
    te{2}\",s)\nprint(f)\n```\n\n`|` either or\n\n```python\ns='good boy'\nf=re.findall(\"\
    good|nice\",s)\nprint(f)\n```\n\n### 20.5 Datetime Module\n\n- `datetime` - it\
    \ handles date and time. It has year, month, day, hour, minute, second, microsecond\
