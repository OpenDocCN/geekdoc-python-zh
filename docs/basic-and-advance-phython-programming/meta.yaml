    \    (e) 圆的面积\n    (f) 圆的周长\n7.  编写一个程序，接受用电量并按每单位 5 卢比的费率计算总价。对所有超过的账单给予 10%\
    \ 的折扣。\n8.  编写一个程序，接受 5 个科目的分数，并计算总分和百分比，假设每个科目的满分为 100。\n9.  编写一个程序来交换两个数字的值。\n\
    10. 编写一个程序，接受总销售额并按 5% 计算利润额。\n\n### 示例 1：编写一个程序，在同一个程序中执行加法/减法/乘法/除法。\n\n```\n\
    a = int(input(\"enter 1st num:\"))\nb = int(input(\"enter 2nd num:\"))\nadd =\
    \ a + b\nsub = a - b\nmul = a * b\ndiv = a / b\nprint(\"addition=\", add)\nprint(\"\
