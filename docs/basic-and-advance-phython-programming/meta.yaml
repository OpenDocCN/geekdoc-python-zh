    ## 4.4 Break and Continue in Python\n\n**Break:** terminate the loop, **continue:**\
    \ loop terminates particular condition otherwise loop continue run.\n\n## 4.4.1\
    \ Break Statement\n\nThe break statement takes care of terminating the loop in\
    \ which it is used. If the break statement is used inside nested loops, the current\
    \ loop is terminated, and the flow will continue with the code followed that comes\
    \ after the loop.\n\nThe flow chart for the break statement is as follows:\n\n\
    ![](img/47b28f190e036c6a53fc1640ab2c3296_52_0.png)\n\n**Fig. 4.1:** Flow chart\
    \ of break statement\n\nThe following are the steps involved in the flowchart.\n\
    \n**Step 1:** The loop execution starts.\n\n**Step 2:** If the loop condition\
    \ is true, it will execute step 2, wherein the body of the loop will get executed.\n\
    \n**Step 3:** If the loop's body has a break statement, the loop will exit and\
    \ go to Step 6.\n\n**Step 4:** After the loop condition is executed and done,\
    \ it will proceed to the next iteration in Step 4.\n\n**Step 5:** If the loop\
    \ condition is false, it will exit the loop and go to Step 6.\n\n**Step 6:** End\
    \ of the loop.\n\n### Example\n\n```python\ni = 1\nwhile(i <= 5):\n    if(i ==\
    \ 3):\n        break\n    print(i)\n    i = i + 1\nOutput: 1, 2\n```\n\n## 4.4.2\
    \ Continue Statement\n\nThe continue statement skips the code that comes after\
    \ it, and the control is passed back to the start for the next iteration.\n\n\
    The following are the steps involved in the flowchart.\n\n**Step 1:** The loop\
    \ execution starts.\n\n**Step 2:** The execution of code inside the loop will\
    \ be done. If there is a continued statement inside the loop, the control will\
    \ go back to Step 4, i.e., the start of the loop for the next iteration.\n\n**Step\
    \ 3:** The execution of code inside the loop will be done.\n\n**Step 4:** If there\
    \ is a continue statement or the loop execution inside the body is done, it will\
    \ call the next iteration.\n\n**Step 5:** Once the loop execution is complete,\
    \ the loop will exit and go to step 7.\n\n**Step 6:** If the loop condition in\
    \ step 1 fails, it will exit the loop and go to step 7.\n\n**Step 7:** End of\
    \ the loop.\n\n![](img/47b28f190e036c6a53fc1640ab2c3296_53_0.png)\n\n**Fig. 4.2:**\
    \ Flow chart of continue statement\n\n### Example:\n\n```python\ni = 0\nwhile(i\
    \ <= 5):\n    i = i + 1\n    if(i == 3):\n        continue\n    print(i)\nOutput:\
    \ 1, 2, 4, 5, 6\n```\n\n# 5\n\n## String in Python Programming\n\n### 5.1 String\
    \ Statement\n\nString in python is stored as individual characters i.e. indexed\
    \ wise. The index by default starts with 0.\n\n| Forward indexing | 0 | 1 | 2\
    \ | 3 | 4 | 5 |\n|---|---|---|---|---|---|---|\n| string | p | y | t | h | o |\
    \ n |\n| Backward indexing | -6 | -5 | -4 | -3 | -2 | -1 |\n\nSo, here P will\
    \ be represented by str[0] or str[-6], y will be represented by str[1] or str[-5]\n\
    \n**Note:** strings are immutable and hence you cannot change the individual letters\
    \ of string using assignment operator.\n\n**Example:**\n\n```python\nname = \"\
    shyam\"\nName[0] = \"A\"\nResult error\n```\n\n**Example:**\n\n```python\nname\
    \ = \"shyam\"\nprint(name)\n```\n\n**Example:**\n\n```python\nname = \"shyam\"\
    \nfor i in name:\n    print(i)\n```\n\noutput\n\ns\nh\ny\na\nm\n\nExample:\n\n\
    ```python\nname = \"shyam\"\nfor i in name:\n    print(i, end=\"\")\noutput: shyam\n\
    ```\n\n### 5.2 String Operators\n\n- 1. **Concatenation operator (+)**: The +\
    \ operator concatenates two different string\n\n    **Example:**\n    \n    x\
