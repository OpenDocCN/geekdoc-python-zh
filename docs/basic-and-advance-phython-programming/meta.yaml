- md: "## 12 Python Pandas Basic Functionality\n\n### 12.1 Introduction Basic Functionality\n\
    \nBy now, we learnt about the three Pandas DataStructures and how to create them.\
    \ We will majorly focus on the DataFrame objects because of its importance in\
    \ the real time data processing and also discuss a few other DataStructures.\n\
    \n### 12.2 Series Basic Functionality\n\n| S.No | Attribute or Method & Description\
    \ |\n|---|---|\n| 1 | axes<br>Returns a list of the row axis labels |\n| 2 | dtype<br>Returns\
    \ the dtype of the object. |\n| 3 | empty<br>Returns True if series is empty.\
    \ |\n| 4 | ndim<br>Returns the number of dimensions of the underlying data, by\
    \ definition 1. |\n| 5 | size<br>Returns the number of elements in the underlying\
    \ data. |\n| 6 | values<br>Returns the Series as ndarray. |\n| 7 | head()<br>Returns\
    \ the first n rows |\n| 8 | tail()<br>Returns the last n rows. |\n\nLet us now\
    \ create a Series and see all the above tabulated attributes operation\n\n####\
    \ Example\n\n```\nimport pandas as pd\nimport numpy as np\n#Create a series with\
    \ 100 random numbers\ns = pd.Series(np.random.randn(4))\nprint(s)\n```\n\nIts\
    \ **output** is as follows:\n0  0.967853\n1 -0.148368\n2 -1.395906\n3 -1.758394\n\
    dtype: float64\n\n#### 12.2.1 Axes\n\nReturns the list of the labels of the series.\n\
    \n#### Example\n\n```\nimport pandas as pd\nimport numpy as np\n#Create a series\
    \ with 100 random numbers\ns = pd.Series(np.random.randn(4))\nprint (\"The axes\
    \ are:\")\nprint s.axes\n```\n\nIts **output** is as follows :\nThe axes are:\n\
    [RangeIndex(start=0, stop=4, step=1)]\nThe above result is a compact format of\
    \ a list of values from 0 to 5, i.e.,\n[0,1,2,3,4].\n\n#### 12.2.2 Empty\n\nReturns\
    \ the Boolean value saying whether the Object is empty or not. True indicates\
    \ that the object is empty.\n\n#### Example\n\n```\nimport pandas as pd\nimport\
    \ numpy as np\n#Create a series with 100 random numbers\ns = pd.Series(np.random.randn(4))\n\
    print (\"Is the Object empty?\")\nprint s.empty\n```\n\nIts **output** is as follows:\n\
    Is the Object empty?\nFalse\n\n#### 12.2.3 Ndim\n\nReturns the number of dimensions\
    \ of the object. By definition, a Series is a 1D data structure, so it returns\n\
    \n#### Example\n\n```\nimport pandas as pd\nimport numpy as np\n#Create a series\
    \ with 4 random numbers\ns = pd.Series(np.random.randn(4))\nprint(s)\nprint (\"\
    The dimensions of the object:\")\nprint s.ndim\n```\n\nIts **output** is as follows:\n\
    \n```\n0  0.175898\n1  0.166197\n2 -0.609712\n3 -1.377000\ndtype: float64\nThe\
    \ dimensions of the object: 1\n```\n\n#### 12.2.4 Size\n\nReturns the size(length)\
    \ of the series.\n\n#### Example\n\n```\nimport pandas as pd\nimport numpy as\
    \ np\n#Create a series with 4 random numbers\ns = pd.Series(np.random.randn(2))\n\
    print s\nprint (\"The size of the object:\")\nprint s.size\n```\n\nIts **output**\
    \ is as follows :\n\n```\n0  3.078058\n1 -1.207803\ndtype: float64\nThe size of\
    \ the object:\n2\n```\n\n#### 12.2.5 Values\n\nReturns the actual data in the\
    \ series as an array.\n\n#### Example\n\n```\nimport pandas as pd\nimport numpy\
    \ as np\n#Create a series with 4 random numbers\ns = pd.Series(np.random.randn(4))\n\
    print(s)\nprint (\"The actual data series is:\")\nprint s.values\n```\n\nIts **output**\
    \ is as follows:\n\n```\n0  1.787373\n1 -0.605159\n2  0.180477\n3 -0.140922\n\
    dtype: float64\n\nThe actual data series is:\n[ 1.78737302 -0.60515881  0.18047664\
    \ -0.1409218 ]\n```\n\n#### 12.2.6 Head & Tail\n\nTo view a small sample of a\
    \ Series or the DataFrame object, use the head() and the tail() methods.\n\n**head()**\
    \ returns the first **n** rows(observe the index values). The default number of\
    \ elements to display is five, but you may pass a custom number.\n\n#### Example\n\
    \n```\nimport pandas as pd\nimport numpy as np\n#Create a series with 4 random\
    \ numbers\ns = pd.Series(np.random.randn(4))\nprint (\"The original series is:\"\
    )\nprint(s)\nprint (\"The first two rows of the data series:\")\nprint s.head(2)\n\
    ```\n\nIts **output** is as follows :\n\nThe original series is:\n0  0.720876\n\
    1 -0.765898\n2  0.479221\n3 -0.139547\ndtype: float64\n\nThe first two rows of\
    \ the data series:\n0  0.720876\n1 -0.765898\ndtype: float64\n\n**tail()** returns\
    \ the last **n** rows(observe the index values). The default number of elements\
    \ to display is five, but you may pass a custom number.\n\n#### Example\n\n```\n\
    import pandas as pd\nimport numpy as np\n#Create a series with 4 random numbers\n\
    s = pd.Series(np.random.randn(4))\nprint (\"The original series is:\")\nprint(s)\n\
    print (\"The last two rows of the data series:\")\nprint s.tail(2)\n```\n\nIts\
    \ **output** is as follows :\n\nThe original series is:\n0 -0.655091\n1 -0.881407\n\
    2 -0.608592\n3 -2.341413\ndtype: float64\n\nThe last two rows of the data series:\n\
    2 -0.608592\n3 -2.341413\ndtype: float64\n\n### 12.3 DataFrame Basic Functionality\n\
    \nLet us now understand what DataFrame Basic Functionality is. The following tables\
    \ lists down the important attributes or methods that help in DataFrame Basic\
    \ Functionality.\n\n| S.No | Attribute or Method & Description |\n|---|---|\n\
    | 1 | T<br>Transposes rows and columns. |\n| 2 | axes<br>Returns a list with the\
