- md: '## 11 Pandas in Python Programming


    ### 11.1 Introduction


    Pandas is an open-source Python library providing high-performance data manipulation
    and analysis tools using its powerful data structures. The name Pandas is derived
    from the word Panel Data – an Econometrics term for Multidimensional data.


    In 2008, developer Wes McKinney started developing pandas when in need of a high-performance,
    flexible tool for analysis of data.


    Prior to Pandas, Python was majorly used for data munging and preparation. It
    had very little contribution towards data analysis. Pandas solved this problem.
    Using Pandas, we can accomplish five typical steps in the processing and analysis
    of data, regardless of the origin of data — load, prepare, manipulate, model,
    and analyze.


    Python with Pandas is used in a wide range of fields including academic and commercial
    domains including finance, economics, statistics, analytics, etc.


    #### 11.1.1 Key Features of Pandas


    - Fast and efficient DataFrame object with default and customized indexing.

    - Tools for loading data into in-memory data objects from different file formats.

    - Data alignment and integrated handling of missing data.

    - Reshaping and pivoting of date sets.

    - Label-based slicing, indexing and subsetting of large data sets.

    - Columns from a data structure can be deleted or inserted.

    - Group by data for aggregation and transformations.

    - High performance merging and joining of data.

    - Time Series functionality.


    ### 11.2 NumPy vs Pandas


    NumPy array is used for the implementation of pandas data objects.


    **Python Pandas - Environment Setup**


    Standard Python distribution doesn’t come bundled with Pandas module. A lightweight
    alternative is to install Pandas using popular Python package installer, **pip**.


    ```

    pip install pandas

    ```


    ### 11.3 Introduction to Data Structures


    Pandas deals with the following three data structures:


    - Series

    - DataFrame

    - Panel


    These data structures are built on top of NumPy array, which means they are fast.


    **Dimension & Description**


    The best way to think of these data structures is that the higher dimensional
    data structure is a container of its lower dimensional data structure. For example,
    DataFrame is a container of Series, Panel is a container of DataFrame.


    | Data Structure | Dimensions | Description |

    |---|---|---|

    | Series | 1 | 1D labeled homogeneous array, size immutable. |

    | Data Frames | 2 | General 2D labeled, size-mutable tabular structure with potentially
    heterogeneously typed columns. |

    | Panel | 3 | General 3D labeled, size-mutable array. |


    Building and handling two or more dimensional arrays is a tedious task, burden
    is placed on the user to consider the orientation of the data set when writing
    functions. But using Pandas data structures, the mental effort of the user is
    reduced.


    For example, with tabular data (DataFrame) it is more semantically helpful to
    think of the **index** (the rows) and the **columns** rather than axis 0 and axis
    1.


    **Mutability**


    All Pandas data structures are value mutable (can be changed) and except Series
    all are size mutable. Series is size immutable.


    Note – DataFrame is widely used and one of the most important data structures.
    Panel is used much less.


    #### 11.3.1 Series


    Series is a one-dimensional array like structure with homogeneous data. For example,
    the following series is a collection of integers 10, 23, 56, 17, 52, 61, 73, 90,
    26, 72.


    **Key Points**


    - Homogeneous data

    - Size Immutable

    - Values of Data Mutable


    #### 11.3.2 DataFrame


    DataFrame is a two-dimensional array with heterogeneous data. For example,


    | Name | Age | Gender | Rating |

    |---|---|---|---|

    | steve | 32 | Male | 3.45 |

    | lia | 28 | Female | 4.6 |

    | vin | 45 | Male | 3.9 |


    The table represents the data of a sales team of an organization with their overall
    performance rating. The data is represented in rows and columns. Each column represents
    an attribute and each row represents a person.


    #### 11.3.3 Data Type of Columns


    The data types of the four columns are as follows:


    | Column | Type |

    |---|---|

    | Name | string |

    | Age | integer |

    | Gender | string |

    | Rating | float |


    **Key Points**


    - Heterogeneous data

    - Size Mutable

    - Data Mutable


    #### 11.3.4 Panel


    Panel is a three-dimensional data structure with heterogeneous data. It is hard
    to represent the panel in graphical representation. But a panel can be illustrated
    as a container of DataFrame.


    **Key Points**


    - Heterogeneous data

    - Size Mutable

    - Data Mutable


    ### 11.4 Python Pandas Series


    Series is a one-dimensional labeled array capable of holding data of any type
    (integer, string, float, python objects, etc.).


    A pandas Series can be created using the following constructor:


    ```

    pandas.Series(data, index, dtype, copy)

    ```


    The parameters of the constructor are as follows:


    | S.No. | Parameter & Description |

    |---|---|

    | 1 | data<br>data takes various forms like ndarray, list, constants |

    | 2 | index<br>Index values must be unique and hashable, same length as data.
    Default **np.arange(n)** if no index is passed. |

    | 3 | dtype<br>dtype is for data type. If None, data type will be inferred |

    | 4 | copy<br>Copy data. Default False |


    A series can be created using various inputs like:


    - Array

    - Dict

    - Scalar value or constant


    #### 11.4.1 Create an Empty Series


    A basic series, which can be created is an Empty Series.


    **Example**


    ```

    #import the pandas library and aliasing as pd

    import pandas as pd

    s = pd.Series()

    print(s)

    ```


    Its **output** is as follows:


    ```

    Series([], dtype: float64)

    ```


    #### 11.4.2 Create a Series From Ndarray


    If data is an ndarray, then index passed must be of the same length. If no index
    is passed, then by default index will be range(n) where n is array length, i.e.,
    [0,1,2,3.... range(len(array))-1].


    **Example**


    ```

    #import the pandas library and aliasing as pd

    import pandas as pd

    import numpy as np

    data = np.array([''a'',''b'',''c'',''d''])

    s = pd.Series(data)

    print(s)

    ```


    Its **output** is as follows:


    ```

    0  a

    1  b

    2  c

    3  d

    dtype: object

    ```


    We did not pass any index, so by default, it assigned the indexes ranging from
    0 to **len(data)-1**, i.e., 0 to 3.


    **Example**


    ```

    #import the pandas library and aliasing as pd

    import pandas as pd

    import numpy as np

    data = np.array([''a'',''b'',''c'',''d''])

    s = pd.Series(data,index=[100,101,102,103])

    print(s)

    ```


    Its **output** is as follows:


    ```

    100  a

    101  b

    102  c

    103  d

    dtype: object

    ```


    We passed the index values here. Now we can see the customized indexed values
    in the output.


    ### 11.5 Create a Series from Dictionary


    A **dict** can be passed as input and if no index is specified, then the dictionary
    keys are taken in a sorted order to construct index. If **index** is passed, the
    values in data corresponding to the labels in the index will be pulled out.


    **Example**


    ```

    #import the pandas library and aliasing as pd

    import pandas as pd

    import numpy as np

    data = {''a'' : 0., ''b'' : 1., ''c'' : 2.}

    s = pd.Series(data)

    print(s)

    ```


    Its **output** is as follows:


    ```

    a  0.0

    b  1.0

    c  2.0

    dtype: float64

    ```


    **Observe** – Dictionary keys are used to construct index.


    **Example**


    ```

    #import the pandas library and aliasing as pd

    import pandas as pd

    import numpy as np

    data = {''a'' : 0., ''b'' : 1., ''c'' : 2.}

    s = pd.Series(data,index=[''b'',''c'',''d'',''a''])

    print(s)

    ```


    Its **output** is as follows:


    ```

    b 1.0

    c 2.0

    d NaN

    a 0.0

    dtype: float64

    ```


    **Observe** – Index order is persisted and the missing element is filled with
    NaN (Not a Number).


    ### 11.6 Create a Series from Scalar


    If data is a scalar value, an index must be provided. The value will be repeated
    to match the length of **index**.


    ```

    #import the pandas library and aliasing as pd

    import pandas as pd

    import numpy as np

    s = pd.Series(5, index=[0, 1, 2, 3])

    print(s)

    ```


    Its **output** is as follows:


    ```

    0 5

    1 5

    2 5

    3 5

    dtype: int64

    ```


    ### 11.7 Accessing Data from Series with Position


    Data in the series can be accessed similar to that in an **ndarray**.


    **Example**


    Retrieve the first element. As we already know, the counting starts from zero
    for the array, which means the first element is stored at zero<sup>th</sup> position
    and so on.


    ```

    import pandas as pd

    s = pd.Series([1,2,3,4,5],index = [''a'',''b'',''c'',''d'',''e''])

    #retrieve the first element

    print(s[0])

    ```'
  mdcn: '## 11 Python编程中的Pandas


    ### 11.1 简介


    Pandas是一个开源的Python库，它利用其强大的数据结构提供高性能的数据操作和分析工具。Pandas这个名字来源于“Panel Data”——一个计量经济学中表示多维数据的术语。


    2008年，开发者韦斯·麦金尼在需要一个高性能、灵活的数据分析工具时，开始开发pandas。


    在Pandas出现之前，Python主要用于数据清洗和准备工作，对数据分析的贡献甚少。Pandas解决了这个问题。使用Pandas，无论数据来源如何，我们都可以完成数据处理和分析的五个典型步骤——加载、准备、操作、建模和分析。


    Python与Pandas被广泛应用于包括金融、经济、统计、分析等在内的学术和商业领域。


    #### 11.1.1 Pandas的关键特性


    -   快速高效的DataFrame对象，支持默认和自定义索引。

    -   用于从不同文件格式加载数据到内存数据对象的工具。

    -   数据对齐和缺失数据的集成处理。

    -   数据集的重塑和透视。

    -   基于标签的大型数据集切片、索引和子集化。

    -   可以从数据结构中删除或插入列。

    -   用于聚合和转换的分组数据。

    -   高性能的数据合并与连接。

    -   时间序列功能。


    ### 11.2 NumPy与Pandas


    NumPy数组用于实现pandas数据对象。


    **Python Pandas - 环境设置**


    标准Python发行版不包含Pandas模块。一个轻量级的替代方案是使用流行的Python包安装器**pip**来安装Pandas。


    ```

    pip install pandas

    ```


    ### 11.3 数据结构简介


    Pandas处理以下三种数据结构：


    -   Series

    -   DataFrame

    -   Panel


    这些数据结构建立在NumPy数组之上，这意味着它们速度很快。


    **维度与描述**


    理解这些数据结构的最佳方式是，更高维度的数据结构是其低维度数据结构的容器。例如，DataFrame是Series的容器，Panel是DataFrame的容器。


    | 数据结构 | 维度 | 描述 |

    |---|---|---|

    | Series | 1 | 一维带标签的同质数组，大小不可变。 |

    | Data Frames | 2 | 通用的二维带标签、大小可变的表格结构，列可能具有异构类型。 |

    | Panel | 3 | 通用的三维带标签、大小可变的数组。 |


    构建和处理二维或更多维数组是一项繁琐的任务，在编写函数时，用户需要考虑数据集的方向。但使用Pandas数据结构，可以减少用户的思维负担。


    例如，对于表格数据（DataFrame），从语义上讲，思考**索引**（行）和**列**比思考轴0和轴1更有帮助。


    **可变性**


    所有Pandas数据结构都是值可变的（可以更改），除了Series，所有数据结构的大小也是可变的。Series的大小是不可变的。


    注意——DataFrame被广泛使用，是最重要的数据结构之一。Panel的使用要少得多。


    #### 11.3.1 Series


    Series是一种一维的、类似数组的结构，包含同质数据。例如，以下Series是整数10、23、56、17、52、61、73、90、26、72的集合。


    **关键点**


    -   同质数据

    -   大小不可变

    -   数据值可变


    #### 11.3.2 DataFrame


    DataFrame是一个二维的、包含异构数据的数组。例如，


    | 姓名 | 年龄 | 性别 | 评分 |

    |---|---|---|---|

    | steve | 32 | 男 | 3.45 |

    | lia | 28 | 女 | 4.6 |

    | vin | 45 | 男 | 3.9 |


    该表表示一个组织销售团队的数据及其整体绩效评分。数据以行和列表示。每列代表一个属性，每行代表一个人。


    #### 11.3.3 列的数据类型


    四列的数据类型如下：


    | 列 | 类型 |

    |---|---|

    | 姓名 | 字符串 |

    | 年龄 | 整数 |

    | 性别 | 字符串 |

    | 评分 | 浮点数 |


    **关键点**


    -   异构数据

    -   大小可变

    -   数据可变


    #### 11.3.4 Panel


    Panel是一个三维的、包含异构数据的数据结构。用图形表示Panel很困难。但Panel可以被描述为DataFrame的容器。


    **关键点**


    -   异构数据

    -   大小可变

    -   数据可变


    ### 11.4 Python Pandas Series


    Series是一个一维的带标签数组，能够容纳任何类型的数据（整数、字符串、浮点数、Python对象等）。


    可以使用以下构造函数创建pandas Series：


    ```

    pandas.Series(data, index, dtype, copy)

    ```


    构造函数的参数如下：


    | 序号 | 参数与描述 |

    |---|---|

    | 1 | data<br>data接受多种形式，如ndarray、列表、常量 |

    | 2 | index<br>索引值必须是唯一的且可哈希，长度与data相同。如果未传递索引，则默认为**np.arange(n)**。 |

    | 3 | dtype<br>dtype用于数据类型。如果为None，则将推断数据类型 |

    | 4 | copy<br>复制数据。默认为False |


    可以使用多种输入创建Series，例如：


    -   数组

    -   字典

    -   标量值或常量


    #### 11.4.1 创建空Series


    可以创建的基本Series是空Series。


    **示例**


    ```

    #import the pandas library and aliasing as pd

    import pandas as pd

    s = pd.Series()

    print(s)

    ```


    其**输出**如下：


    ```

    Series([], dtype: float64)

    ```


    #### 11.4.2 从Ndarray创建Series


    如果data是ndarray，则传递的索引必须具有相同的长度。如果未传递索引，则默认索引为range(n)，其中n是数组长度，即[0,1,2,3.... range(len(array))-1]。


    **示例**


    ```

    #import the pandas library and aliasing as pd

    import pandas as pd

    import numpy as np

    data = np.array([''a'',''b'',''c'',''d''])

    s = pd.Series(data)

    print(s)

    ```


    其**输出**如下：


    ```

    0  a

    1  b

    2  c

    3  d

    dtype: object

    ```


    我们没有传递任何索引，因此默认情况下，它分配了从0到**len(data)-1**的索引，即0到3。


    **示例**


    ```

    #import the pandas library and aliasing as pd

    import pandas as pd

    import numpy as np

    data = np.array([''a'',''b'',''c'',''d''])

    s = pd.Series(data,index=[100,101,102,103])

    print(s)

    ```


    其**输出**如下：


    ```

    100  a

    101  b

    102  c

    103  d

    dtype: object

    ```


    我们在这里传递了索引值。现在我们可以在输出中看到自定义的索引值。


    ### 11.5 从字典创建Series


    可以将**字典**作为输入传递，如果未指定索引，则字典键将按排序顺序用于构建索引。如果传递了**index**，则将提取数据中与索引标签对应的值。


    **示例**


    ```

    #import the pandas library and aliasing as pd

    import pandas as pd

    import numpy as np

    data = {''a'' : 0., ''b'' : 1., ''c'' : 2.}

    s = pd.Series(data)

    print(s)

    ```


    其**输出**如下：


    ```

    a  0.0

    b  1.0

    c  2.0

    dtype: float64

    ```


    **观察** – 字典键用于构建索引。


    **示例**


    ```

    #import the pandas library and aliasing as pd

    import pandas as pd

    import numpy as np

    data = {''a'' : 0., ''b'' : 1., ''c'' : 2.}

    s = pd.Series(data,index=[''b'',''c'',''d'',''a''])

    print(s)

    ```


    其**输出**如下：


    ```

    b 1.0

    c 2.0

    d NaN

    a 0.0

    dtype: float64

    ```


    **观察** – 索引顺序被保留，缺失的元素用NaN（非数字）填充。


    ### 11.6 从标量创建Series


    如果data是标量值，则必须提供索引。该值将被重复以匹配**index**的长度。


    ```

    #import the pandas library and aliasing as pd

    import pandas as pd

    import numpy as np

    s = pd.Series(5, index=[0, 1, 2, 3])

    print(s)

    ```


    其**输出**如下：


    ```

    0 5

    1 5

    2 5

    3 5

    dtype: int64

    ```


    ### 11.7 通过位置访问Series中的数据


    Series中的数据访问方式类似于**ndarray**。


    **示例**


    检索第一个元素。正如我们已经知道的，数组的计数从零开始，这意味着第一个元素存储在零<sup>th</sup>位置，依此类推。


    ```

    import pandas as pd

    s = pd.Series([1,2,3,4,5],index = [''a'',''b'',''c'',''d'',''e''])

    #retrieve the first element

    print(s[0])

    ```'
