    # 4.4.2 Continue Statement


    The continue statement skips the code that comes after it, and the control is
    passed back to the start for the next iteration.


    The following are the steps involved in the flowchart.


    **Step 1:** The loop execution starts.


    **Step 2:** The execution of code inside the loop will be done. If there is a
    continued statement inside the loop, the control will go back to Step 4, i.e.,
    the start of the loop for the next iteration.


    **Step 3:** The execution of code inside the loop will be done.


    **Step 4:** If there is a continue statement or the loop execution inside the
    body is done, it will call the next iteration.


    **Step 5:** Once the loop execution is complete, the loop will exit and go to
    step 7.


    **Step 6:** If the loop condition in step 1 fails, it will exit the loop and go
    to step 7.


    **Step 7:** End of the loop.


    ![](img/47b28f190e036c6a53fc1640ab2c3296_53_0.png)


    **Fig. 4.2:** Flow chart of continue statement'
