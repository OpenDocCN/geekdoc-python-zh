    \n| | three |\n|---|---|\n| a | 10.0 |\n| b | 20.0 |\n| c | 30.0 |\n| d | NaN\
    \ |\n\n## 11.9.9 Row Selection, Addition, and Deletion\n\nWe will now understand\
    \ row selection, addition and deletion through examples. Let us begin with the\
    \ concept of selection.\n\n## 11.9.10 Selection by Label\n\nRows can be selected\
    \ by passing row label to a **loc** function.\n\n### Example\n\n```\nimport pandas\
    \ as pd\nd = {'one' : pd.Series([1, 2, 3], index=['a', 'b', 'c']),\n      'two'\
    \ : pd.Series([1, 2, 3, 4], index=['a', 'b', 'c', 'd'])}\ndf = pd.DataFrame(d)\n\
    print(df.loc['b'])\n```\n\nIts **output** is as follows:\none 2.0\ntwo 2.0\nName:\
    \ b, dtype: float64\n\nThe result is a series with labels as column names of the\
    \ DataFrame. And, the Name of the series is the label with which it is retrieved.\n\
    \n## 11.9.11 Selection by Integer Location\n\nRows can be selected by passing\
    \ integer location to an **iloc** function.\n\n### Example\n\n```\nimport pandas\
    \ as pd\nd = {'one' : pd.Series([1, 2, 3], index=['a', 'b', 'c']),\n      'two'\
    \ : pd.Series([1, 2, 3, 4], index=['a', 'b', 'c', 'd'])}\ndf = pd.DataFrame(d)\n\
    print(df.iloc[2])\n```\n\nIts **output** is as follows:\none  3.0\ntwo  3.0\n\
    Name: c, dtype: float64\n\n## 11.9.12 Slice Rows\n\nMultiple rows can be selected\
    \ using ' : ' operator.\n\n### Example\n\n```\nimport pandas as pd\nd = {'one'\
    \ : pd.Series([1, 2, 3], index=['a', 'b', 'c']),\n      'two' : pd.Series([1,\
    \ 2, 3, 4], index=['a', 'b', 'c', 'd'])}\ndf = pd.DataFrame(d)\nprint(df[2:4])\n\
    ```\n\nIts **output** is as follows:\n    one  two\nc  3.0    3\nd  NaN    4\n\
    \n## 11.9.13 Addition of Rows\n\nAdd new rows to a DataFrame using the **append**\
    \ function. This function will append the rows at the end.\n\n### Example\n\n\
    ```\nimport pandas as pd\ndf = pd.DataFrame([[1, 2], [3, 4]], columns = ['a','b'])\n\
    df2 = pd.DataFrame([[5, 6], [7, 8]], columns = ['a','b'])\ndf = df.append(df2)\n\
    print(df)\n```\n\nIts **output** is as follows:\n\n```\n   a  b\n0  1  2\n1  3\
    \  4\n0  5  6\n1  7  8\n```\n\n## 11.9.14 Deletion of Rows\n\nUse index label\
    \ to delete or drop rows from a DataFrame. If label is duplicated, then multiple\
