  md: '# About the Authors


    **Dr Agya Ram Verma** was born Ayodhya, Uttar Pradesh, India. He received the
    B. Tech degree in Electronic and Instrumentation Engineering from IET MJPRU Bareilly,
    UP, India, in 2010. He completed the M.Tech. degree in Electronic and Communication
    Engineering from the Indian Institute of Information Technology (IIIT), Design
    and Manufacturing, Jabalpur, India. He received the PhD degree from Uttarakhand
    Technical University, Dehradun, in 2019. He joined the Department of Electronics
    & Communication Engineering, G. B. Pant Engineering College, Pauri Garhwal, India,
    in 2013, as Assistant Professor. His research interest includes machine learning,
    signal processing. He has published more than 35 research papers in refereed international
    journals and conferences. He has published one Patent in 2021. He has published
    one book on fundamental of machine learning form Sara book publication in 2021.
    He also obtains one R&D Project and one Constancy Project. He is also reviewer
    of many reputed international journals like Computer Methods in Biomechanics and
    Biomedical Engineering: Imaging & Visualization (Taylor & Francis), IET Generation,
    Transmission & Distribution, International Journal of Signal and Imaging Systems
    Engineering (IJSISE), Journal of Intelligent & Fuzzy Systems, GUCON 2019 IEEE
    Conference, India, Signal processing journal, Electronics Letters, IET.


    **Dr.Yatendra Kumar** is former Head and Associate Professor, Department of Electronics
    and Instrumentation Engineering, Faculty of Engineering and Technology, Mahatma
    Jyotiba Phule Rohilkhand University, Bareilly, UP (India). He has completed his
    B.Tech (Electronics and Instrumentation Engineering) in 1999 and M.Tech (Instrumentation
    Engineering) from National Institute of Technology (Formerly known as Regional
    Engineering College), Kurukshetra, Haryana in 2001. He has completed his Ph.D.
    degree from Indian School of Mines (ISM), Dhanbad. He has more than 20 years of
    teaching experience. Besides, he has authored and co-authored several research
    papers published in national and international journals. He is also reviewer of
    many reputed international journals like IEEE Access, International Journal of
    Electronics, Microwave and Optical Technologies Letter, International Journal
    of Electronics and Communications(AEU) International Journal of RF and Computer
    Aided Design (RFCAD) and International Journal of microwave and Technologies.


    **Dr. Sag Ram Verma** received his B.Sc. in 2003 from Dr. R. M. L. Awadh University,
    Ayodhya, India and M.Sc. in 2005 with Mathematics from Banaras Hindu University,
    Varanasi, India. He received his Ph.D. in Applied Mathematics from Indian Institute
    of Technology (BHU), Varanasi, India in year 2009. He is currently working as
    an Assistant Professor in Mathematics, Gurukula Kangri (Deemed to be University),
    Haridwar (UK) India since 2011. His research interest includes Mathematical programming,
    Wavelet analysis and its applications. He has published more than 25 research
    papers in refereed international journals and conferences. He has guided 4 PhD
    student.'
