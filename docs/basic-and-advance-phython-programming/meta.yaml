    2 in this chapter define python operator. Chapter 3 in this chapter define looping
    statement. Chapter 4 in this chapter define python function. Chapter 5 in this
    chapter explain string statement. Chapter 6 in this chapter define list in python
    programming. Chapter 7 in this chapter explain tuple in python programming. Chapter
    8 in this chapter explain dictionary in python programming. Chapter 9 in this
