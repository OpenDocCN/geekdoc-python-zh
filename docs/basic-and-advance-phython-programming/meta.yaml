  mdcn: "## 19 海龟图形\n\n### 19.1 Python 海龟图形\n\n海龟是 Python 的一个特色功能。使用海龟，我们可以轻松地在画板上绘图。\n\
    \n首先我们导入 turtle 模块。然后创建一个窗口，接着我们创建海龟对象，并使用海龟方法在画板上绘图。\n\n### 19.2 一些海龟方法\n\n|\
    \ 方法 | 参数 | 描述 |\n|---|---|---|\n| Turtle() | 无 | 创建并返回一个新的海龟对象 |\n| forward()\
    \ | 距离 | 将海龟向前移动指定的距离 |\n| backward() | 距离 | 将海龟向后移动指定的距离 |\n| right() | 角度 |\
    \ 将海龟顺时针转动 |\n| left() | 角度 | 将海龟逆时针转动 |\n| penup() | 无 | 抬起海龟的画笔 |\n| pendown()\
    \ | 无 | 放下海龟的画笔 |\n| up() | 无 | 抬起海龟的画笔 |\n| down() | 无 | 放下海龟的画笔 |\n| color()\
    \ | 颜色名称 | 更改海龟画笔的颜色 |\n| fillcolor() | 颜色名称 | 更改海龟用于填充多边形的颜色 |\n| heading() |\
    \ 无 | 返回当前朝向 |\n| position() | 无 | 返回当前位置 |\n| goto() | x, y | 将海龟移动到位置 x,y |\n\
    | begin_fill() | 无 | 记住填充多边形的起始点 |\n| end_fill() | 无 | 关闭多边形并用当前填充颜色填充 |\n| dot()\
    \ | 无 | 在当前位置留下一个点 |\n| stamp() | 无 | 在当前位置留下一个海龟形状的印记 |\n| shape() | 形状名称 | 应为\
    \ 'arrow'、'classic'、'turtle' 或 'circle' |\n\n#### 示例\n\n```python\nfrom turtle\
    \ import *\nt = Turtle()  #object in python\nwn=Screen()\nwn.title(\"my first\
    \ graphic\")\nwn.bgcolor(\"yellow\")  #color filling in window\nt.shape(\"turtle\"\
    )    #turtle shape given\nt.color(\"red\", \"green\")\nt.speed(1)        #turtle\
    \ speed given\nt.begin_fill()\nfor i in range(4):\n    t.forward(100)\n    t.left(90)\n\
    t.penup()    #pen up\nt.forward(200)\nt.pendown()\nfor i in range(4):\n    t.forward(100)\n\
    \    t.left(90)\nt.end_fill()\ndone()\n```\n\n## 20 标准库概览\n\n### 20.1 Python 编程中的单元测试\n\
    \n测试特定单元是否正常工作的过程称为单元测试。单元测试检查应用程序中的小组件。\n\n#### 示例\n\n```python\ndef testsum1():\n\
    \    assert sum([1,2,3])==6\ndef testsum2():\n    assert sum([1,1,1])==6  #assertion\
    \ error\ntestsum1()\ntestsum2()\n```\n\n#### 20.1.1 单元测试涉及的步骤\n\n- (1) 从库中导入 unittest。\n\
    - (2) 创建一个测试类并继承 (unittest.TestCase)。\n- (3) 在类中编写测试函数。\n- (4) 调用 unittest.main()\n\
    \n#### 20.1.2 编写测试用例与运行测试\n\n##### 示例\n\n```python\nimport unittest\nclass Testsum(unittest.TestCase):\n\
    \    def testsum1(self):\n        self.assertEqual(sum([1,2,3]),6)\n    def testsum2(self):\n\
    \        self.assertEqual(sum([1,2,2]),6)\nunittest.main()\n```\n\n##### 输出\n\n\
    ```\nAssertionError: 5 != 6\n```\n\n##### 示例 2\n\n```python\nimport unittest\n\
