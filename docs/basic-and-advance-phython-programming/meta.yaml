    \    fp='yes'    #类变量\n    def __init__(self):\n        self.model='realme x'\n\
    \    def show_model(self):\n        print(self.model)\n    @classmethod    #类方法\n\
    \    def is_fp(cls):\n        cls.fp    #在类方法内部访问类变量\nrealme=mobile()\nmobile.fp\
    \    #在类外部访问类变量\n```\n\n**注意：** 类变量是其单一副本可供类的所有实例使用的变量。如果我们修改实例中类变量的副本，它将影响其他实例中的所有副本。\n\
    \n## 示例\n\n```python\nclass mobile:\n    fp='yes'\n    def __init__(self):\n \
    \       self.model='realme x'\n    def show_model(self):\n        print(self.model)\n\
    \    @classmethod\n    def show_model(cls):\n        print(\"Fingerprint:\",cls.fp)\
    \ #在类方法内部访问类变量\nrealme=mobile()\nrealme.show_model()\nmobile.is_fp\nprint()\n\
    mobile.fp='No' #在方法外部更改类值\nmobile.is_fp\n```\n\n## 多对象示例\n\n```python\nclass mobile:\n\
    \    fp='yes'\n    @classmethod\n    def show_model(cls):\n        print(\"Fingerprint:\"\
    ,cls.fp) #在类方法内部访问类变量\nrealme=mobile()\nredmi=mobile()\ngeek=mobile()\nprint(\"\
    RealMe:\", mobile.fp)\nprint(\"Remi:\", mobile.fp)\nprint(\"geek:\", mobile.fp)\n\
    print()\nmobile.fp='No' #在方法外部更改类值\nprint(\"RealMe:\", mobile.fp)\nprint(\"Remi:\"\
    , mobile.fp)\nprint(\"geek:\", mobile.fp)\n```\n\n## 类方法\n\n类方法是作用于类变量或类的静态变量的方法。\n\
    \n装饰器 `@classmethod` 需要写在类方法上方。\n\n默认情况下，类方法的第一个参数是 `cls`，它指向类本身。\n\n语法：\n\n```python\n\
    @classmethod\ndef method_name(cls): # 无参数的类方法\n    方法体\n```\n\n示例\n\n```python\n\
    class mobile:\n    fp='yes'\n    @classmethod\n    def show_model(cls):\n    \
    \    print(\"Fingerprint:\",cls.fp)\nrealme=mobile()\nmobile.show_model() #无参数调用类方法\n\
    ```\n\n调用类方法\n语法：类名.方法名()\n\n带参数的类方法\n\n```python\n@classmethod\ndef method_name(cls,f1,f2):\
    \ # 带参数的类方法\n    方法体\n```\n\n示例\n\n```python\nclass mobile:\n    fp='yes'\n  \
    \  @classmethod\n    def show_model(cls,r):\n        cls.ram=r\n        print(\"\
    Fingerprint:\",cls.fp)\n        print(\"RAM:\",cls.ram)\nrealme=mobile()   #对象\n\
    mobile.show_model('4GB')  #无参数调用类方法\n```\n\n## 调用类方法\n\n语法：类名.方法名(实际参数)\n\n访问类/静态变量\n\
    \n**使用类方法：** 要访问类变量，我们需要以 `cls` 作为第一个参数的类方法，然后我们可以使用 `cls.变量名` 来访问类变量。\n\n## 16.3\
    \ Python编程中的命名空间\n\n在Python中，命名空间表示一个内存块，其中名称被映射到对象。\n\n**类命名空间** - 一个类维护自己的命名空间，称为类命名空间。在类命名空间中，名称被映射到类变量。\n\
    \n**实例命名空间** - 每个实例都有自己的命名空间，称为实例命名空间。在实例命名空间中，名称被映射到实例变量。\n\n```python\nclass\
    \ mobile:\n    fp='yes'  #类变量\nrealme=mobile()\nredmi=mobile()\ngeek=mobile()\n\
    mobile.fp    #yes\nrealme.fp   #yes\nredmi.fp    #yes\ngeek.fp     #yes\n```\n\
    \n**注意：** 如果使用类名和类变量更改任何值，则会影响实例对象和类命名空间两者，例如\n\n```python\nmobile.fp='no'\nmobile.fp\
    \   #no\nrealme.fp   #no\nredmi.fp    #no\ngeek.fp     #no\n```\n\n但如果使用类变量和实例名称进行更改，则仅影响单个对象，例如。\n\
    \n```python\nrealme.fp='not working'\nmobile.fp   #no\nrealme.fp   # not working\n\
    redmi.fp    #no\ngeek.fp     #no\n```\n\n## 16.4 方法类型\n\n### 16.4.1 实例方法\n\n实例方法是作用于类的实例变量的方法。实例方法需要知道实例的内存地址，该地址通过默认作为实例方法第一个参数的\
    \ *self* 变量提供。\n\n语法：无参数\n```python\ndef method_name(self):\n    函数体\n```\n\n\
    语法：带参数\n```python\ndef method_name(self, f1, f2):\n    函数体\n```\n\n### 无参数调用实例方法\n\
    \n实例方法绑定到类的对象，因此我们使用对象名称调用实例方法。\n\n语法：对象名.方法名()\n\n```python\nclass Mobile:\n\
    \    def __init__(self):\n        self.model='RealMe X'  #实例变量\n    def show_model(self):\
    \  #实例方法\n        self.model  #在实例方法内部访问实例变量\nrealme=Mobile()  #对象调用\nrealme.show_model()\
    \  # 无参数调用实例方法\n```\n\n语法：带参数调用实例方法\n语法：对象名.方法名(实际参数)\n\n## 示例\n\n```python\n\
    class Mobile:\n    def __init__(self):\n        self.model='RealMe X'  #实例变量\n\
    \    def show_model(self,p):  #实例方法\n        self.price=p # 实例变量\n        print(self.model,\
    \ self.price)\nrealme=Mobile()  #对象调用\nrealme.show_model(1000)  # 无参数调用实例方法\n\
    ```\n\n(i) 访问器方法 (ii) 修改器方法\n\n### 16.4.2 访问器方法\n\n此方法用于访问或读取变量的数据。此方法不修改变量中的数据。这被称为getter方法。\n\
    \n语法：\n```python\ndef get_value(self):\ndef get_result(self):\n```\n\n## 示例\n\n\
    ```python\nclass Mobile:\n    def __init__(self):\n        self.model='RealMe\
    \ X'  #实例变量\n    def get_model(self):  #实例方法\n        return self.model\nrealme=Mobile()\
    \  #对象调用\nm=realme.get_model()\n```\n\n### 16.4.3 修改器方法\n\n此方法用于访问或读取并修改变量的数据。此方法修改变量中的数据。这也被称为setter方法。\n\
    \n语法：\n\n```python\ndef set_value(self):\ndef set_result(self):\n```\n\n## 示例\n\
    \n```python\nclass Mobile:\n    def __init__(self):\n        self.model='RealMe\
    \ X'  #实例变量\n    def set_model(self):  #实例方法\n        self.model='RealMe 2'\n\
    realme=Mobile()  #对象调用\nm=realme.set_model()\n```\n\n### 16.4.4 类方法\n\n- 类方法是作用于类变量或类的静态变量的方法。\n\
    - 装饰器 `@classmethod` 需要写在类方法上方。\n- 默认情况下，类方法的第一个参数是 `cls`，它指向类本身。\n\n语法：\n\n```python\n\
    @classmethod\ndef method_name(cls):  # 无参数的类方法\n    方法体\n```\n\n## 示例\n\n```python\n\
    class mobile:\n    fp='yes'\n    @classmethod\n    def show_model(cls):\n    \
    \    print(\"Fingerprint:\",cls.fp)\nrealme=mobile()\nmobile.show_model()  #无参数调用类方法\n\
    ```\n\n## 带参数调用类方法\n\n## 示例\n\n```python\nclass mobile:\n    fp='yes'\n    @classmethod\n\
    \    def show_model(cls, r):\n        cls.ram=r\n        print(cls.fp, cls.ram)\n\
    realme=mobile()\nmobile.show_model(101)  #带参数调用类方法\n```\n\n## 示例 类变量或静态变量和类方法\n\
    \n```python\nclass computer:\n    name=\"dell\" #类变量或静态变量\n    def __init__(self,ram,hd,pro):\n\
    \        self.ram=ram\n        self.hd=hd\n        self.pro=\"i5\"\n    def feature(self):\
    \  #self作为指针，它自动获取对象\n        print(\"your computer config is:\",self.ram,self.hd,self.pro)\n\
    \    @classmethod    #类方法\n    def company(cls):\n        print(\"company name\
    \ is:\",cls.name)\ncom1=computer(\"8gb\",\"1tb\",pro=\"i6\")  #对象，意味着获取制造计算机的原材料\n\
    com2=computer(\"16gb\", \"2tb\",pro=\"i5\")\ncom1.pro=\"i6\"\ncomputer.feature(com1)\
    \ #第一种参数传递方法，这是为计算机提供最终形状\ncom2.feature()  #第二种参数传递方法\ncom2.company()  #调用类方法\n\
    ```\n\n### 16.4.5 静态方法\n\n当某些处理与类相关，但不需要类或其实例来执行任何工作时，使用静态方法。\n\n当我们想从外部传递一些值并在方法中执行某些操作时，使用静态方法。\n\
    \n装饰器 `@staticmethod` 需要写在静态方法上方"
