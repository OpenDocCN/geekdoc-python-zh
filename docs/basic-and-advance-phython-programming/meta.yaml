    \ concrete method\n        print(\"concrete Method\")\nclass child(Father):\n\
    \    def disp(self):\n        print(\"child class\")\n        print(\"defing abstract\
    \ method\")\nc = child()\nc.disp()\nc.show()\n```\n\n## Rules\n\n- PVM can not\
    \ create objects of an abstract class.\n- It is not necessary to declare all methods\
    \ abstract in an abstract class.\n- Abstract class can have abstract method and\
    \ concrete methods.\n- If there is any abstract method in a class, that class\
    \ must be abstract.\n- The abstract methods of an abstract class must be defined\
    \ in its child class/subclass.\n- If you are inheriting abstract class that have\
    \ abstract method, you must either provide the implementation of the method or\
    \ make this class abstract.\n\n## When use abstract class\n\nWe use abstract class\
    \ when there are some common feature shared by all the objects as they are.\n\n\
    ## 17.4 Interface\n\nIn python, the interface concept is not explicitly available,\
