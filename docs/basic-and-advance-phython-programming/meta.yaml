    # 15.11 Plotting Curves of Given Equation


    Here, we use **NumPy** which is a general-purpose array-processing package in
    python.


    +   - To set the x-axis values, we use the **np.arange()** method in which the
    first two arguments are for range and the third one for step-wise increment. The
    result is a NumPy array.

    - To get corresponding y-axis values, we simply use the predefined **np.sin()**
    method on the NumPy array.

    - Finally, we plot the points by passing x and y arrays to the **plt.plot()**
    function.


    # Example


    ```

    # importing the required modules

    import matplotlib.pyplot as plt

    import numpy as np

    # setting the x - coordinates

    x = np.arange(0, 2*(np.pi), 0.1)

    # setting the corresponding y - coordinates

    y = np.sin(x)

    # plotting the points

    plt.plot(x, y)

    # function to show the plot

    plt.show()

    ```'
