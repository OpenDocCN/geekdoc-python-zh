    \ axis labels and column axis labels are:\n[RangeIndex(start=0, stop=7, step=1),\
    \ Index([u'Age', u'Name', u'Rating'],\ndtype='object')]\n\n#### 12.3.4 Dtypes\n\
    \nReturns the data type of each column.\n\n#### Example\n\n```\nimport pandas\
