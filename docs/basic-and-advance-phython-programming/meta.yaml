    \ 16.2.1 如何创建一个类\n\n```python\n语法1：\n\nClass classname(object):\n    def __init__(self):\
    \  #构造函数\n        self.variable_name=value  #属性\n        self.variable_name='value'\n\
    \    def method_name(self):\n        方法体\n\n或者\n\nClass classname(object):\n \
    \   def __init__(self):  #构造函数\n        self.variable_name=value  #属性\n      \
    \  self.variable_name='value'\n    def method_name(self):\n        方法体\n\n语法2：\n\
