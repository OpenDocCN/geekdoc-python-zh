  md: '# # 2


    # # Python Operators


    # ## 2.1 Operators


    Operators are those who perform some specific operation. Python has a wide variety
    of operators. The various python operators are categorized into:


    +   1. Arithmetic operators

    2. Comparison/relational operators

    3. Assignment operators

    4. Logical operators

    5. Identity operators

    6. Membership operators

    7. Bitwise operator


    # ### 2.1.1 Arithmetic Operators


    Arithmetic operators are those that perform mathematical calculation. Arithmetic
    operators are


    If a=4, b=2 then


    | Operators | Description | Example |

    | :--- | :--- | :--- |

    | + (Addition) | Adds two or more numbers | a+b=6 |

    | -(Subtraction) | Subtracts two or more numbers | a-b |

    | *(multiply) | Multiplies two or more numbers | a*b=8 |

    | /(division) | Divides two number | a/b=2 |

    | %(modulus) | Gives the remainder after dividing first number with second | a%b=0
    |

    | **(exponent) | Return exponential (power) | a**b=16 |

    | //(floor division) | Divides two numbers but gives the quotient but removes
    the decimal place. But in case of Negative value it floors the number to far from
    zero. | a//b=2 |'
