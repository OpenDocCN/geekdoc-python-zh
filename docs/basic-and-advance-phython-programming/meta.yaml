    \ is present for that object then it will work. The type of object is distinguished\
    \ only at runtime. This is called as duck typing.\n\nPython doesn’t care about\
    \ which class of object it is, in order to call an existing method on an object.\
    \ If the method is defined on the object, then it will be called.\n\n![](img/47b28f190e036c6a53fc1640ab2c3296_199_0.png)\n\
