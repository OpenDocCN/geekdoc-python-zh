    - handling exception\n\n## 17.7.5 Creating Exception\n\nwe can create our own\
    \ exception by creating a sub class to built-in exception class:\n\nsyntax:\n\n\
    ```python\nclass MyException(exception):\n    pass\n```\n\n```python\nclass MyException(Exception):\n\
