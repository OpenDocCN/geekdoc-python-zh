    | 2 | index

    Index values must be unique and hashable, same length as data. Default **np.arange(n)**
    if no index is passed. |

    | 3 | columns

    For column labels, the optional default syntax is - np.arange(n). This is only
    true if no index is passed. |

    | 4 | dtype

    dtype is for data type. If None, data type will be inferred |

    | 5 | copy

