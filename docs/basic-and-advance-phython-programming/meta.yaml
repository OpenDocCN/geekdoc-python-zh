    a=[\"ram\",1,\"shyam\",12.5]\nb=[1,2,3,4]\n```\n\n| 0 | 1 | 2 | 3 | 正向索引 |\n|---|---|---|---|---|\n\
    | ram | 10 | shyam | 12.5 | |\n| -4 | -3 | -2 | -1 | 反向索引 |\n\n```\na[0]=ram\n\
    a=[\"ram\",1,\"shyam\",12.5]\nprint(a)\nprint(a[0])\nram\n```\n\n### 6.2 Python列表切片\n\
    \n与字符串类似，Python中也有列表切片的概念。\n\n**示例：**\n\n```\na=[\"ram\",10,\"shyam\",12.5]\n\
