    \ using class\n#print(obj.__secretverma)  # without using class name, object can\
    \ not access hide data member and show\n```\n\n## 17.6 Error in Python\n\nErrors\
    \ are the problems in a program due to which the program will stop the execution.\
    \ On the other hand, exceptions are raised when some internal events occur which\
    \ changes the normal flow of the program.\n\nTwo types of Error occurs in python.\n\
    \n- Syntax errors\n- Logical errors (Exceptions)\n\n## 17.7 Exception in Python\n\
    \nAn exception is a runtime error which can be handled by the programmer.\nAll\
    \ exception are represented as classes in python.\n\n## 17.7.1 Type of Exception\n\
    \n(i) Built in exception: Exception which are already available in python language.\
    \ The base class for all built-in exception is base exception class.\n\n(ii) User\
    \ defined exception: A programmer can create his own exception, called user-defined\
    \ exceptions.\n\n## 17.7.2 Need of Exception Handling\n\n- When an exception occurs,\
    \ the program terminates suddenly.\n- Sudden termination of program may corrupt\
    \ the program.\n- Exception may cause data loss from the database or a file.\n\
    \n## 17.7.3 Exception Handling\n\nTry – the try block contains code which may\
    \ cause exceptions.\n\nSyntax:\n\n```python\ntry:\n    statement\n```\n\nExcept-\
    \ The except block is used to catch an exception that is raised in the try block.\
    \ There can be multiple except block for try block.\n\nSyntax:\n\n```python\n\
    except Exception Name:\n```\n\nElse-this block will get executed when no exception\
    \ is raised. Else block is executed after try block.\n\nSyntax:\n\n```python\n\
    else:\n    statement\n```\n\nFinally-this block will get execute irrespective\
    \ of whether there is an exception or not.\n\nSyntax:\n\n```python\nfinally:\n\
    \    statement\n```\n\nSome points for exception handling\n\n- We can write several\
    \ except block for a single try block.\n- We can write multiple except blocks\
    \ to handle multiple exceptions.\n- We can write try block without any except\
    \ blocks.\n- We cannot write except block without a try block.\n- Finally block\
    \ is always executed irrespective of whether there is an exception or not.\n-\
    \ Else block is optional.\n- Finally block is optional.\n\n## Example\n\n```python\n\
    a = 10\nb = 5\nd = a / 0\nprint(d)\nprint('rest of the code')\n```\n\noutput:\n\
    \nexception error\nzerodivisionerror: division by zero\n\nNote: program terminate\n\
    \nHandling exception\n\n## Example\n\n```python\na = 10\nb = 0\ntry:\n    d =\
    \ a / b\n    print(d)\nexcept:\n    print(\"division by zero not allowed\")\n\
    print('rest of code')\n```\n\noutput:\n\ndivision by zero not allowed\nrest of\
    \ code\n\nNote: it means program is not terminate\n\n## Example\n\n```python\n\
    a = 10\nb = 0\ntry:\n    d = a / b\n    print(d)\nexcept:\n    print(\"division\
    \ by zero not allowed\")\nelse:\n    print('inside else')  # if exception occur\
    \ then this line not run\nfinally:\n    print('inside finally')  # this line always\
    \ run\nprint('rest of code')\n```\n\n## output:\n\ndivision by zero not allowed\n\
    inside finally\nrest of code\n\n## 17.7.4 User Defined Exception\n\nA programmer\
    \ can create his own exception, called user-defined exceptions.\n\n- creating\
