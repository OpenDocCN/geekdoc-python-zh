  md: '# # 1

    Basic Concept

    of Python Programming


    # ## 1.1 Introduction


    Python is an interpreter, high level, general purpose programming language developed
    by Guido Van Rossum and its first version was released in 1991. There are two
    major Python versions: **Python 2 and Python 3**. Both are quite different.


    # ## 1.2 Beginning with Python Programming


    # ### 1.2.1 Finding an Interpreter


    Before we start Python programming, we need to have an interpreter to interpret
    and run our programs.


    **Windows:** There are many interpreters available freely to run Python scripts
    like IDLE (Integrated Development Environment) that comes bundled with the Python
    software downloaded from http://python.org/.


    **Linux:** Python comes preinstalled with popular Linux distros such as Ubuntu
    and Fedora. To check which version of Python you’re running, type “python” in
    the terminal emulator. The interpreter should start and print the version number.


    **macOS:** Generally, Python 2.7 comes bundled with macOS. You’ll have to manually
    install Python 3 from http://python.org/.


    # ## 1.3 Compiler Vs. Interpreter: Explore What is the Difference Between Compiler
    and Interpreter?


    Both interpreters and compilers are programs that convert the Source Code (high-level
    language) into machine codes (so that the computers can understand them). In this
    chapter, we will discuss the difference between Compiler and Interpreter.'
  merge: -1
  pgno: 19
- img_proc: true
  md: 'A typical computer program usually exists in high-level languages that a human
    can understand. Thus, they contain various phrases and words from the English
    language (or any other in common use). Computers, on the other hand, cannot understand
    these languages as we do- but can comprehend a program in binary codes. As a result,
    we first write a program in a high-level language (source code), convert them
    into machine language, and make them readable for the computers. It is exactly
    when we need interpreters and compilers.


    # 1.3.1 What is a Compiler?


    A compiler is a translator that produces an output of low-level language (like
    an assembly or machine language) by taking an input of high-level language. It
    is basically a computer program used to transform codes written in a programming
    language into machine code (human-readable code to a binary 0 and 1 bits language
    for a computer processor to understand). The computer then processes the machine
    code for performing the corresponding tasks.


    +   - Compilers check all types of errors, limits, and ranges. Thus, it’s more
    intelligent.

    - The run time of its program is longer, and it occupies more memory.


    # 1.3.2 What Is an Interpreter?


    It is a program that functions for the translation of a programming language into
    a comprehensible one. It is a computer program used for converting high-level
    program statements into machine codes. It includes pre-compiled code, source code,
    and scripts.


    +   - An interpreter translates only one statement at a time of the program.

    - They create an exe of the programming language before the program runs.


    # 1.3.3 Difference Between Compiler and Interpreter


    | S.No. | Compiler | Interpreter |

    |---|---|---|

    | 1 | It scans the entire programs first and translate it into machine code |
    It sacns the program line by line and translate it into mechine code |

    | 2 | Compiler show all errors and warning at same time. | Interpreter show one
    error at a time |

    | 3 | Error occurs after scanning the whole program | Error occurs after scaning
    each line |

    | 4 | Debugging is slow | Debugging is faster |

    | 5 | Execution time is less | Execution time is more |

    | 6 | Compiler used by language such as C, C++ etec. | An Interpreter is used
    by language such as python, Java etec. |'
