  mdcn: "## 17.3.2 具体方法\n\n具体方法是指其行为在抽象类本身中定义的方法。\n\n## 示例\n\n```python\nfrom abc\
    \ import ABC, abstractmethod\nclass Father(ABC):  # abstract class\n    @abstractmethod\n\
    \    def disp(self):  # abstract method\n        pass\n    def show(self):  #\
    \ concrete method\n        print(\"concrete Method\")\nclass child(Father):\n\
    \    def disp(self):\n        print(\"child class\")\n        print(\"defing abstract\
    \ method\")\nc = child()\nc.disp()\nc.show()\n```\n\n## 规则\n\n- PVM 无法创建抽象类的对象。\n\
    - 在抽象类中，不必将所有方法都声明为抽象方法。\n- 抽象类可以同时拥有抽象方法和具体方法。\n- 如果一个类中存在任何抽象方法，那么该类必须是抽象类。\n\
    - 抽象类的抽象方法必须在其子类/派生类中定义。\n- 如果你继承了一个包含抽象方法的抽象类，你必须提供该方法的实现，或者将这个类也声明为抽象类。\n\n\
    ## 何时使用抽象类\n\n当所有对象都共享一些共同特征时，我们使用抽象类。\n\n## 17.4 接口\n\n在 Python 中，接口的概念不像其他语言（例如\
    \ Java）那样明确可用。\n\n在 Python 中，接口是一个只包含抽象方法而不包含任何具体方法的抽象类。\n\n## 示例\n\n```python\n\
    from abc import ABC, abstractmethod\nclass Father(ABC):  # abstract class\n  \
    \  @abstractmethod\n    def disp(self):  # abstract method\n        pass\nclass\
    \ child(Father):\n    def disp(self):\n        print(\"child class\")\n      \
    \  print(\"defing abstract method\")\nc = child()\nc.disp()\n```\n\n## 规则\n\n\
    - 接口的所有方法都是抽象的。\n- 我们无法创建接口的对象。\n- 如果一个类实现了某个接口，它必须定义该接口中给出的所有方法。\n- 如果一个类没有实现接口中声明的所有方法，那么该类必须被声明为抽象类。\n\
    \n## 何时使用接口\n\n当所有特征需要为不同对象进行不同实现时，我们使用接口。\n\n## 17.5 Python 中的数据隐藏\n\n我们在属性名前使用双下划线（__），这些属性就会对程序中的其他类隐藏。\n\
    \na = 10  # public in the program\n_a = 10  # protected\n__a = 10  # private\n\
    \n## 示例\n\n```python\nclass arv:\n    __secretverma = 0  # data member is hiding\
    \ by prefixing two__ it means private variable\n    def verma(self):\n       \
    \ self.__secretverma += 1\n        print(self.__secretverma)\nobj = arv()\nobj.verma()\n\
    obj.verma()\nprint(obj._arv__secretverma)  # you can access hide data member by\
    \ object with using class\n#print(obj.__secretverma)  # without using class name,\
    \ object can not access hide data member and show\n```\n\n## 17.6 Python 中的错误\n\
    \n错误是程序中导致程序停止执行的问题。另一方面，当发生某些内部事件改变了程序的正常流程时，就会引发异常。\n\nPython 中会发生两种类型的错误。\n\
    \n- 语法错误\n- 逻辑错误（异常）\n\n## 17.7 Python 中的异常\n\n异常是一种运行时错误，可以由程序员处理。\n在 Python\
    \ 中，所有异常都表示为类。\n\n## 17.7.1 异常类型\n\n(i) 内置异常：Python 语言中已经可用的异常。所有内置异常的基类是基础异常类。\n\
    \n(ii) 用户定义异常：程序员可以创建自己的异常，称为用户定义异常。\n\n## 17.7.2 异常处理的必要性\n\n- 当异常发生时，程序会突然终止。\n\
    - 程序的突然终止可能会损坏程序。\n- 异常可能导致数据库或文件中的数据丢失。\n\n## 17.7.3 异常处理\n\nTry – try 块包含可能导致异常的代码。\n\
    \n语法：\n\n```python\ntry:\n    statement\n```\n\nExcept- except 块用于捕获在 try 块中引发的异常。一个\
    \ try 块可以有多个 except 块。\n\n语法：\n\n```python\nexcept Exception Name:\n```\n\nElse-当没有引发异常时，将执行此块。Else\
    \ 块在 try 块之后执行。\n\n语法：\n\n```python\nelse:\n    statement\n```\n\nFinally-无论是否有异常，此块都会执行。\n\
    \n语法：\n\n```python\nfinally:\n    statement\n```\n\n关于异常处理的一些要点\n\n- 我们可以为一个 try\
    \ 块编写多个 except 块。\n- 我们可以编写多个 except 块来处理多个异常。\n- 我们可以编写不带任何 except 块的 try 块。\n\
    - 我们不能编写没有 try 块的 except 块。\n- Finally 块总是会执行，无论是否有异常。\n- Else 块是可选的。\n- Finally\
    \ 块是可选的。\n\n## 示例\n\n```python\na = 10\nb = 5\nd = a / 0\nprint(d)\nprint('rest\
    \ of the code')\n```\n\n输出：\n\nexception error\nzerodivisionerror: division by\
    \ zero\n\n注意：程序终止\n\n处理异常\n\n## 示例\n\n```python\na = 10\nb = 0\ntry:\n    d =\
    \ a / b\n    print(d)\nexcept:\n    print(\"division by zero not allowed\")\n\
    print('rest of code')\n```\n\n输出：\n\ndivision by zero not allowed\nrest of code\n\
    \n注意：这意味着程序没有终止\n\n## 示例\n\n```python\na = 10\nb = 0\ntry:\n    d = a / b\n  \
    \  print(d)\nexcept:\n    print(\"division by zero not allowed\")\nelse:\n   \
    \ print('inside else')  # if exception occur then this line not run\nfinally:\n\
    \    print('inside finally')  # this line always run\nprint('rest of code')\n\
    ```\n\n## 输出：\n\ndivision by zero not allowed\ninside finally\nrest of code\n\n\
    ## 17.7.4 用户定义异常\n\n程序员可以创建自己的异常，称为用户定义异常。\n\n- 使用异常类作为基类创建异常类\n- 引发异常\n- 处理异常\n\
    \n## 17.7.5 创建异常\n\n我们可以通过创建内置异常类的子类来创建自己的异常：\n\n语法：\n\n```python\nclass MyException(exception):\n\
    \    pass\n```\n\n```python\nclass MyException(Exception):\n    def __init__(self,\
    \ arg):\n```\n\n## 17.7.6 引发异常\n\nRaise 语句用于引发用户定义的异常。\n\n语法：\n\n```python\nraise\
    \ MyException(exception)\n```\n\n处理异常：使用 try 和 except 块，程序员可以处理异常。\n\n语法：\n\n\
    ```python\ntry:\n    statement\nexcept MyException as mye:\n    statement\n```\n\
    \n## 示例 用户定义异常的创建、引发和处理\n\n```python\nclass BalanceException(Exception):\n   \
    \ pass\ndef checkbalance():\n    money = 10000\n    withdraw = 9000\n    try:\n\
    \        balance = money - withdraw\n        if(balance <= 2000):\n          \
    \  raise BalanceException('Insuficent balance')  # raise exception\n        print(balance)\n\
    \    except BalanceException as be:\n        print(be)\ncheckbalance()\n```\n\n\
    输出：\n\nInsuficent balance\n\n## 18\n\n## Python 库\n\n### 18.1 库简介\n\n此库包含用于各种类型功能的模块。Python\
    \ 标准库中一些常用的模块有：\n\n- (i) math 模块：提供数学函数以支持不同类型的计算。\n- (ii) cmath 模块：提供用于复数的数学函数。\n\
    - (iii) random 模块：提供生成随机数的函数。\n- (iv) statistics 模块：提供数学统计函数。\n- (v) urllib 模块：提供\
    \ URL 处理函数，以便你可以从程序内部访问网站。\n\n1. NumPy 库，提供一些高级数学功能以及创建和操作数值数组的工具。\n2. Scipy 库，为科学计算提供算法和数学工具。\n\
    3. Tkinter 库，提供 Python 用户界面工具包，帮助你为不同类型的应用程序创建用户友好的 GUI。\n4. Matplotlib 库，提供函数和工具，以多种格式（如绘图、图表、图形等）生成高质量输出。\n\
    \n### 18.1.1 标准库简览\n\nPython 中的 GUI 编程\n\n你可能已经使用过很多应用程序。你在所有应用程序中观察到的一个共同点是，它们都有多个组件，如标签、用于输入的字段、按钮等。这些是构成\
    \ GUI（图形用户界面）的元素。"
