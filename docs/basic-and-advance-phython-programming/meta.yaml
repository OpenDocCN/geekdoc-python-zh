    ## 用于GUI编程的Python库


    在Python中，我们可以使用以下任何工具包进行GUI编程。


    - 1. Tkinter：Tkinter是Python中用于GUI编程的标准包。它建立在Tk接口之上。

    - 2. PyQt：PyQt是Qt工具包的Python绑定工具包。Qt是一个C++框架，Python将其作为插件来实现跨平台的PyQt工具包。

