  mdcn: "## 6. Python编程中的列表\n\n### 6.1 列表简介\n\n1. 列表是不同值或不同类型项目的集合。\n2. 与C/C++/Java中的数组不同，列表能够在同一个容器中存储不同类型的值。\n\
