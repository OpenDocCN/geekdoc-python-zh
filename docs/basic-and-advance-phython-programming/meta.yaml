    # 20.7 Numbers and Numeric Representation


    | Sr.No. | Function & Description |

    |---|---|

    | 1 | ceil(x)<br>Return the Ceiling value. It is the smallest integer, greater
    or equal to the number x. |

    | 2 | copysign(x, y)<br>It returns the number x and copy the sign of y to x. |

    | 3 | fabs(x)<br>Returns the absolute value of x. |

    | 4 | factorial(x)<br>Returns factorial of x. where x ≥ 0 |

    | 5 | floor(x)<br>Return the Floor value. It is the largest integer, less or equal
    to the number x. |

    | 6 | fsum(iterable)<br>Find sum of the elements in an iterable object |

    | 7 | gcd(x, y)<br>Returns the Greatest Common Divisor of x and y |

    | 8 | isfinite(x)<br>Checks whether x is neither an infinity nor nan. |

    | 9 | isinf(x)<br>Checks whether x is infinity |

    | 10 | isnan(x)<br>Checks whether x is not a number. |

    | 11 | remainder(x, y)<br>Find remainder after dividing x by y. |


    These functions are used to represent numbers in different forms. The methods
    are like below


    # Example


    ```

    import math

    print(''The Floor and Ceiling value of 23.56 are: '' + str(math.ceil(23.56)) +
    '', '' + str(math.floor(23.56)))

    x = 10

    y = -15

    print(''The value of x after copying the sign from y is: '' + str(math.copysign(x,
    y)))

    ```'
