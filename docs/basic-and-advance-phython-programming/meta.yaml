- md: "# Preface\n\nThis book will introduce you to the Python programming language.\
    \ It’s aimed at beginning programmers, but even if you have written programs before\
    \ and just want to add Python to your list of languages.\n\nThe first eight chapters\
    \ explain Python’s basics and you should read them in order. The later chapters\
    \ show how Python is used in specific application areas such as the web, database,\
    \ networks, and so on, read them in any order you like. Chapter 1 this chapter\
    \ explains different basic topics related to Python programming. Chapter 2 in\
    \ this chapter defines Python operators. Chapter 3 in this chapter defines looping\
    \ statements. Chapter 4 in this chapter defines Python functions. Chapter 5 in\
    \ this chapter explains string statements. Chapter 6 in this chapter defines lists\
    \ in Python programming. Chapter 7 in this chapter explains tuples in Python programming.\
    \ Chapter 8 in this chapter explains dictionaries in Python programming. Chapter\
    \ 9 in this chapter explains NumPy in Python programming. Chapter 10 in this chapter\
    \ explains lambda functions in Python programming. Chapter 11 in this chapter\
    \ explains pandas in Python programming. Chapter 12 in this chapter explains Python\
    \ pandas functionality. Chapter 12 in this chapter explains DataFrame basic functionality.\
    \ Chapter 13 in this chapter explains Python pandas statistical functions. Chapter\
    \ 14 in this chapter explains Python pandas visualization. Chapter 15 in this\
    \ chapter explains data visualization in Python programming. Chapter 16 in this\
    \ chapter explains object-oriented programming. Chapter 17 in this chapter explains\
    \ modules in Python programming. Chapter 18 in this chapter explains Python libraries.\
    \ Chapter 19 in this chapter explains turtle graphics in Python programming. Chapter\
    \ 20 in this chapter explains a brief tour of the standard library.\n\nA.R. Verma\n\
    Y. Kumar\nS.R. Verma\n\n# Contents\n\nAcknowledgements\n\nPreface\n\n## 1. Basic\
    \ Concept of Python Programming\n1.1 Introduction\n1.2 Beginning with Python Programming\n\
    \    1.2.1 Finding an Interpreter\n1.3 Compiler Vs. Interpreter: Explore What\
