    \n### 17.1.3 创建模块\n\n## 示例\n\n```python\n#addition.py\ndef add(a,b):\n    c=a+b\n\
    \    print(c)\n```\n\n## 如何使用\n\n```python\nimport addition\naddition.add(12,13)\n\
    ```\n\n## 导入模块\n\n`import` 语句可以以两种形式使用\n\n- a. `import <module_name>`\n- b. `from\
    \ <module_name> import <function_name>`\n- c. `import module_name as alias_name`\n\
