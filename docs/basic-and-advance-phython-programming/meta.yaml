  md: '# # 7 Tuple in Python Programming


    # ## 7.1 Tuple Introduction


    A tuple is a collection which is order and unchangeable. In python tuples are
    written with round brackets. Tuples in python are very similar to list which contains
    different types of elements with the following major differences.


    It is declared as

    tuple1=(1,2,3,"ram","shyam")


    | List | Tuple |

    |---|---|

    | List write in [] | Tuple write in () |

    | List is mutable | Tuples are immutable |

    | List occupies more memory spaces as compare that tuple | tuple occupies less
    memory spaces as compare that list |

    | Program implementation<br>import sys<br>list=[1,2,"ram","shyam","true","ravi"]<br>tuple=(1,2,"ram","shyam","true","ravi")<br>print("size
    of list=",sys.getsizeof(list))<br>print("size of tuple=",sys.getsizeof(tuple))
    | List takes more time to execute as compared to tuple<br>tuple takes less time
    to execute as compared to list |


    Program implementation


    ```

    import timeit

    listtime=timeit.timeit(stmt="[1,2,3,4,5,6,7,8,9]",number=1000000)

    tupletime=timeit.timeit(stmt="(1,2,3,4,5,6,7,8,9)",number=1000000)

    print("List takes time:", listtime)

    print("Tuple takes time:", tupletime)

    ```'
