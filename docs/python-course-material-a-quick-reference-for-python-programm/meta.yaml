    dict_keys([''k1'', ''k2''])

    >>> for k in dict1.keys():

    ...     print( k, '':'', dict1[k])

    ...

    k1 : Value1

    k2 : Value2

    >>> print(''k3'' in dict1)

    False

    >>> # Unpack tuple returned by items()

    >>> for k, v in dict1.items():

    ...     print( k, '':'', v)

    ...

    k1 : Value1

    k2 : Value2

