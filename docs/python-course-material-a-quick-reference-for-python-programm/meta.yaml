  md: '# THE SET DATA STRUCTURE


    +   - A set is an *unordered* collection with *no duplicate* elements.

    - Set objects also support mathematical operations like union, intersection, difference,
    and symmetric difference.

    - Curly braces or the set() function can be used to create sets.

    - To create an empty set you have to use set(), not {}; the latter creates an
    empty dictionary.

    - Items cannot be accessed using index, i.e., not subscriptable.


    | Method | Meaning |

    |---|---|

    | isdisjoint(other) | Returns True if the set has no elements in common with other.
    |

    | issubset(other) or set <= other | Tests whether every element in the set is
    in other. |

    | set < other | Tests whether the set is a proper subset of other, that is, set
    <= other and set != other. |

    | issuperset(other) or set >= other | Tests whether every element in other is
    in the set. |

    | set > other | Tests whether the set is a proper superset of other, that is,
    set >= other and set != other. |

    | union(*others) or set | other | ... | Returns a new set with elements from the
    set and all others. |

    | intersection(*others) or set & other & ... | Returns a new set with elements
    common to the set and all others. |

    | difference(*others) or set - other - ... | Returns a new set with elements in
    the set that are not in the others. |

    | symmetric_difference(other) or set ^ other | Returns a new set with elements
    in either the set or other but not both. |

    | update(*others) or set |= other | Updates the set, adding elements from all
    others. |'
