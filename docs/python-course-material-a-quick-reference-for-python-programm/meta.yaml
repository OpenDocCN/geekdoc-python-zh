  md: "# LOCAL FUNCTIONS\n\n+   - Functions defined inside another function are called\
    \ local functions.\n- Local functions are local to function in which they are\
    \ defined.\n- They are defined each time the enclosing function is called.\n-\
    \ They are governed by same **LEGB** (Local, Enclosing, Global, Built-in) rule.\n\
    - They can access variables that are in enclosing scope.\n- Cannot be called from\
    \ outside outer function using notation *outerfunction.Localfunction*.\n- They\
    \ can contain multiple statements whereas lambdas can have only one statement.\n\
    - Local function can be returned from outer function and then can be called from\
    \ outside.\n- Local function can refer to variables in global namespace using\
    \ **global** keyword and enclosing namespace using **nonlocal** keyword.\n\n```\n\
    01 gv = 100  # Global variable\n02 def f1():\n03     v = 200  # enclosing variable\n\
    04 \n05     # Local function f2\n06     def f2():\n07         lv = 300  # local\
    \ variable\n08         # Local, Enclosing, Global, Built-in name\n09         print(lv,\
    \ v, gv, True)\n10 \n11 \n12     f2()  #call local fun from enclosing fun\n13\
    \ \n14 \n15 f1()\n```"
