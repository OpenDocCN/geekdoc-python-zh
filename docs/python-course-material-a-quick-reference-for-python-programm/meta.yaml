    \ row. |\n| arraysize | Read/write attribute that controls the number of rows\
    \ returned by fetchmany(). The default value is 1, which means a single row would\
    \ be fetched per call. |\n| connection | This read-only attribute provides the\
    \ SQLite database Connection used by the Cursor object. |\n\n**NOTE:** Use SQLite\
    \ Studio, which is a free GUI tool, to manage SQLite database. Download it from\
    \ [https://sqlitestudio.pl/index.rvt](https://sqlitestudio.pl/index.rvt)\n\nThe\
    \ following program shows how to connect to a database and close connection.\n\
    \n```\npython\n01 import sqlite3\n02 con = sqlite3.connect(\"test.db\")\n03 print(\"\
    Connected to test database!\")\n04 con.close()\n```\n\nCreate the following table\
    \ in **test.db** database:\n\n```\nsql\ncreate table expenses\n(\n    id integer\
    \ primary key autoincrement,\n    description text (30),\n    amount real\n)\n\
    ```"
