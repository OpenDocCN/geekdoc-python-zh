    # THE DICTIONARY DATA STRUCTURE


    +   - Dictionaries are indexed by keys, which can be any immutable type; strings
    and numbers can always be keys.

    - It is best to think of a dictionary as an unordered set of *key: value* pairs,
    with the requirement that the keys are unique (within one dictionary).

    - Placing a comma-separated list of *key:value* pairs within the braces adds initial
    *key:value* pairs to the dictionary.

    - It is an error to extract a value using a non-existent key.

    - The **dict()** constructor builds dictionaries directly from sequences of key-value
    pairs.

    - When looping through dictionaries, the key and corresponding value can be retrieved
    at the same time using the **items()** method.


    ```

    >>> dict1 = {"k1": "Value1", "k2": "Value2"}

    >>> print(dict1)

    {''k1'': ''Value1'', ''k2'': ''Value2''}

    >>> print(dict1.keys())

    dict_keys([''k1'', ''k2''])

    >>> for k in dict1.keys():

    ...     print( k, '':'', dict1[k])

    ...

    k1 : Value1

    k2 : Value2

    >>> print(''k3'' in dict1)

    False

    >>> # Unpack tuple returned by items()

    >>> for k, v in dict1.items():

    ...     print( k, '':'', v)

    ...

    k1 : Value1

    k2 : Value2

    ```'
  - '[PAGE 53]


    | Method | Meaning |

    |--------|---------|

    | d[key] | Returns the item of d with key *key*. Raises a KeyError if key is not
    in the map. |

    | d[key] = value | Sets d[key] to value. |

    | del d[key] | Removes d[key] from d. Raises a KeyError if key is not in the map.
    |

    | key in d | Returns True if d has a key *key*, else False. |

    | key not in d | Equivalent to not key in d. |

    | iter(d) | Returns an iterator over the keys of the dictionary. This is a shortcut
    for iter(d.keys()). |

    | clear() | Removes all items from the dictionary. |

    | copy() | Returns a shallow copy of the dictionary. |

    | get(key[, default]) | Returns the value for key if key is in the dictionary,
    else default. If default is not given, it defaults to None, so that this method
    never raises a KeyError. |

    | items() | Returns a new view of the dictionary''s items ((key, value) pairs).
    |

    | keys() | Returns a new view of the dictionary''s keys. |

    | pop(key[, default]) | If key is in the dictionary, removes it and returns its
    value, else returns default. If default is not given and key is not in the dictionary,
    a KeyError is raised. |

    | setdefault(key[, default]) | If key is in the dictionary, returns its value.
    If not, inserts key with a value of default and returns default. The *default*
    defaults to None. |

    | update([other]) | Updates the dictionary with the key/value pairs from other,
    overwriting existing keys. Returns None. |

    | values() | Returns a new view of the dictionary''s values. |'
