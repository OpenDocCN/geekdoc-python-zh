    - **BaseException** 是所有内置异常的基类。\n- **Exception** 是所有内置、非系统退出异常的基类。所有用户定义的异常也应派生自此类。\n\
    - 在 `try` 块之后，必须至少给出一个 `except` 块或 `finally` 块。\n\n```\ntry:\n    语句\n[except\
    \ (异常 [as 标识符] [, 异常] ...)] ... :\n    语句]\n[else:\n    语句]\n[finally:\n    语句]\n\
    ```\n\n| 子句 | 含义 |\n|---|---|\n| try | 为一组语句指定异常处理程序和/或清理代码。 |\n| except | 指定一个或多个异常处理程序。一个\
    \ `try` 语句可以有多个 `except` 语句。每个 `except` 可以指定它处理的一个或多个异常。 |\n| else | 当 `try` 成功退出时执行。\
    \ |\n| finally | 无论 `try` 成功还是失败，都在 `try` 结束时执行。 |\n\n> 注意：在 `try` 之后，必须给出一个 *except*\
    \ 块或 *finally* 块。\n\n```python\na = 10\nb = 20\n\ntry:\n    c = a / b\n    print(c)\n\
    except:\n    print(\"Error\")\nelse:\n    print(\"Job Done!\")\nfinally:\n   \
    \ print(\"The End!\")\n```\n\n**输出：**\n\n```\n0.5\nJob Done!\nThe End!\n```\n\n\
    下面的例子产生不同的结果，因为 **b** 的值为 0。我们捕获异常并在 **except** 块中使用 **ex** 来引用它。由于 **ex** 包含错误消息，打印\
    \ `ex` 将产生错误消息。**else** 块没有执行，因为 `try` 因错误而失败。\n\n```python\na = 10\nb = 0\n\n\
    try:\n    c = a / b\n    print(c)\nexcept Exception as ex:\n    print(\"Error\
    \ :\", ex)\nelse:\n    print(\"Job Done!\")\nfinally:\n    print(\"The End!\"\
    )\n```\n\n**输出：**\n\n```\nError : division by zero\nThe End!\n```\n\n以下程序从用户那里获取数字，直到输入\
