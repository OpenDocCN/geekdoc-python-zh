    # THE RANGE() FUNCTION


    +   - We can use range() function to generate numbers between the given start
    and end (exclusive).

    - If you do need to iterate over a sequence of numbers, the built-in function
    range() comes in handy. It generates arithmetic progressions.

    - In many ways the object returned by range() behaves as if it is a list, but
    in fact it isn''t. It is an object which returns the successive items of the desired
    sequence when you iterate over it, but it doesn''t really make the list, thus
    saving space.


    ```

    range([start,] end [, step])

    ```


    If start is not given then 0 is taken, if step is not given then 1 is taken.


    ```

    range (10)                 # will produce 0 to 9

    range (1, 10, 2)            # will produce 1,3,5,7,9

    ```


    # THE PASS STATEMENT


    The pass statement does nothing. It can be used when a statement is required syntactically
    but the program requires no action.'
- md: "## THE FOR STATEMENT\n\nExecutes given statements until list is exhausted.\n\
    \n```python\nfor target in expression_list:\n    statements\n[else:\n    statements]\n\
