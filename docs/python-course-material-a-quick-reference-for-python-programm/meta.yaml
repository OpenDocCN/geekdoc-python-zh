    corresponding match object. Returns None if no position in the string matches
    the pattern. |

    | match(pattern, string,flags=0) | If zero or more characters at the beginning
    of string match the regular expression pattern, returns a corresponding match
    object. Returns None if the string does not match the pattern. |

    | fullmatch(pattern, string,flags=0) | If the whole string matches the regular
    expression pattern, returns a corresponding match object. Returns None if the
    string does not match the pattern. |

    | split(pattern,string, maxsplit=0, flags=0) | Splits string by the occurrences
    of pattern. If capturing parentheses are used in pattern, then the text of all
    groups in the pattern are also returned as part of the resulting list. If maxsplit
    is nonzero, at most maxsplit splits occur, and the remainder of the string is
