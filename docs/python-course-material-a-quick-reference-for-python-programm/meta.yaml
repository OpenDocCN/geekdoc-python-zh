    \    num = int(input(\"Enter number [0 to stop] :\"))\nValueError: invalid literal\
    \ for int() with base 10: 'abc'\n```\n\n为了使程序更健壮，以便在用户输入无效时仍能继续运行，我们需要将程序的敏感部分放在\
    \ `try` 块中，并在显示有关无效输入的错误消息后继续执行。\n\n```python\ntotal = 0\nwhile True:\n    try:\n\
    \        num = int(input(\"Enter number [0 to stop]: \"))\n        if num == 0:\n\
    \            break\n        total += num\n    except ValueError:\n        print(\"\
