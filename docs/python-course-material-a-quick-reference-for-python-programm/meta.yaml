    \ types are ZeroDivisionError, KeyError and AttributeError.\n- **BaseException**\
    \ is base class for all built-in exceptions.\n- **Exception** is base class for\
    \ all built-in, non-system-exiting exceptions. All user-defined exceptions should\
    \ also be derived from this class.\n- After try block, at least one except block\
    \ or finally block must be given.\n\n```\ntry:\n    Statements\n[except (exception\
    \ [as identifier] [, exception] ...)] ... :\n    Statements]\n[else:\n    Statements]\n\
    [finally:\n    Statements]\n```\n\n| Clause | Meaning |\n|---|---|\n| try | Specifies\
    \ exception handlers and/or cleanup code for a group of statements. |\n| except\
    \ | Specifies one or more exception handlers. It is possible to have multiple\
    \ except statements for a single try statement. Each except can specify one or\
    \ more exceptions that it handles. |\n| else | Executed when try exits successfully.\
    \ |\n| finally | Executed at the end of try whether try succeeds or fails. |\n\
    \n> NOTE: After try, one *except* block or *finally* block must be given.\n\n\
    ```python\na = 10\nb = 20\n\ntry:\n    c = a / b\n    print(c)\nexcept:\n    print(\"\
    Error\")\nelse:\n    print(\"Job Done!\")\nfinally:\n    print(\"The End!\")\n\
    ```\n\n**Output:**\n\n```\n0.5\nJob Done!\nThe End!\n```\n\nThe following example\
    \ produces a different result as value of **b** is 0. We are catching exception\
