- md: "## SQLite3 Database\n\n- SQLite is a C library that provides a lightweight\
    \ disk-based database that doesn't require a separate server process and allows\
    \ accessing the database using a nonstandard variant of the SQL query language.\n\
    - It is possible to prototype an application using SQLite and then port the code\
    \ to a larger database such as Oracle.\n- Python ships with SQLite Database.\n\
    \n## Data types in SQLite3\n\nThe following are available data types in SQLite\
    \ Database.\n\n| Datatype | Meaning | Python Type |\n| :--- | :--- | :--- |\n\
    | NULL | The value is a NULL value. | None |\n| INTEGER | The value is a signed\
    \ integer, stored in 1, 2, 3, 4, 6, or 8 bytes depending on the magnitude of the\
    \ value. | int |\n| REAL | The value is a floating-point value, stored as an 8-byte\
    \ IEEE floating point number. | float |\n| TEXT | The value is a text string,\
    \ stored using the database encoding (UTF-8, UTF-16BE or UTF-16LE). | str |\n\
    | BLOB | The value is a blob of data, stored exactly as it was input. | bytes\
    \ |\n\n## MODULE SQLITE3\n\n- It is the interface for SQLite database.\n- This\
    \ module is part of Python standard library.\n- It implements DB API 2.0 specifications\
    \ (PEP 249).\n\n## Method connect()\n\n- It is used to establish a connection\
    \ to database with given parameters.\n- Parameter is name of the database to connect\
    \ to. If database is not present, it is created.\n- It returns Connection object.\n\
    \n```\nconnect(databasename)\n```\n\n## Connection object\n\nConnection object\
    \ represents a connection to database.\n\n| Method | Meaning |\n|---|---|\n| close()\
    \ | Closes connection. |\n| commit() | Commits pending changes in transaction\
    \ to database. |\n| rollback() | Causes the database to roll back to the start\
    \ of any pending transaction. Closing a connection without committing the changes\
    \ first will cause an implicit rollback to be performed. |\n| cursor() | Returns\
    \ a cursor object using this connection. |\n\n## Cursor Object\n\n- Cursor represents\
    \ a database cursor, which is used to manage the context of a fetch operation.\n\
    - Cursors created from the same connection are not isolated, i.e., any changes\
    \ done to the database by a cursor are immediately visible to other cursors.\n\
    \n| Method | Meaning |\n|--------|---------|\n| close() | Closes cursor. |\n|\
    \ execute(operation [, parameters]) | Prepare and execute a database operation.\
    \ |\n| executemany(operation, seq_of_parameters) | Prepare a database operation\
    \ (query or command) and then execute it against all parameter sequences or mappings\
    \ found in the sequence seq_of_parameters. |\n| fetchone() | Fetch the next row\
    \ of a query result set, returning a single sequence, or None when no more data\
    \ is available. |\n| fetchmany([size=cursor.arraysize]) | Fetch the next set of\
    \ rows of a query result, returning a sequence of sequences (e.g. a list of tuples).\
    \ An empty sequence is returned when no more rows are available. |\n| fetchall()\
    \ | Fetch all (remaining) rows of a query result, returning them as a sequence\
    \ of sequences (e.g. a list of tuples). Note that the cursor's arraysize attribute\
    \ can affect the performance of this operation. |\n\n| Attribute | Meaning |\n\
    | --- | --- |\n| rowcount | This read-only attribute specifies the number of rows\
    \ that the last execute() method retrieved or affected. |\n| lastrowid | Read-only\
    \ attribute provides the rowid of the last modified row. |\n| arraysize | Read/write\
    \ attribute that controls the number of rows returned by fetchmany(). The default\
    \ value is 1, which means a single row would be fetched per call. |\n| connection\
    \ | This read-only attribute provides the SQLite database Connection used by the\
    \ Cursor object. |\n\n**NOTE:** Use SQLite Studio, which is a free GUI tool, to\
    \ manage SQLite database. Download it from [https://sqlitestudio.pl/index.rvt](https://sqlitestudio.pl/index.rvt)\n\
    \nThe following program shows how to connect to a database and close connection.\n\
    \n```\npython\n01 import sqlite3\n02 con = sqlite3.connect(\"test.db\")\n03 print(\"\
    Connected to test database!\")\n04 con.close()\n```\n\nCreate the following table\
    \ in **test.db** database:\n\n```\nsql\ncreate table expenses\n(\n    id integer\
    \ primary key autoincrement,\n    description text (30),\n    amount real\n)\n\
    ```\n\n## Inserting row into table\n\nThe following program shows how to insert\
    \ a row into EXPENSES table by taking data from user.\n\n```\n01 import sqlite3\n\
    02 con = sqlite3.connect(\"test.db\")\n03 cur = con.cursor()\n04 \n05 # insert\
    \ a row into EXPENSES table\n06 try:\n07     # take data from user\n08     des\
    \ = input(\"Enter Description :\")\n09     amt = input(\"Enter Amount      :\"\
    )\n10     row = (des, amt)\n11     cur.execute(\n12     \"insert into expenses(description,amount)values(?,?)\"\
    \n13     , row)\n14     con.commit()\n15     print(\"Added successfully!\")\n\
    16 except Exception as ex:\n17     print(\"Sorry! Error: \", ex)\n18 finally:\n\
    19     con.close()\n```\n\n## Retrieving rows from table\n\nThe following program\
    \ shows how to list all rows from EXPENSES table.\n\n```\npython\n01 import sqlite3\n\
    02 \n03 con = sqlite3.connect(\"test.db\")\n04 cur = con.cursor()\n05 \n06 # List\
    \ rows from EXPENSES table\n07 try:\n08     cur.execute(\"select * from expenses\
    \ order by id\")\n09     for row in cur.fetchall():\n10         print(f\"{row[0]:3d}\
