    \ as ex:\n14     print(\"Error : \", ex)\n15 finally:\n16     con.close()\n```\n\
    \n## Updating row in table\n\nThe following program updates an existing row in\
    \ EXPENSES table.\n\n```\npython\nimport sqlite3\n\ncon = sqlite3.connect(r\"\
    c:\\dev\\python\\test.db\")\ncur = con.cursor()\n\n# Update EXPENSES table\ntry:\n\
    \    # take data from user\n    id = input(\"Enter Id       :\")\n    amount =\
    \ input(\"Enter Amount :\")\n    cur.execute\n    (\"update expenses set amount=?\
    \ where id = ?\",\n     (amount, id))\n    if cur.rowcount == 1:\n        con.commit()\n\
    \        print(\"Updated successfully!\")\n    else:\n        print('Sorry! Id\
    \ not found!')\nexcept Exception as ex:\n    print(\"Sorry! Error: \", ex)\nfinally:\n\
    \    con.close()\n```\n\n## Deleting row from table\n\nThe following program deletes\
