    02          \" JavaScript\", \"C#  \", \"cobol\"]\n03 #Sort after stripping spaces\
    \ and converting to lowercase\n04 for n in sorted(names,\n05                 key=lambda\
    \ s: s.strip().lower()):\n06 print(n)\n```"
  - "[PAGE 69]\n\n# # PASSING ARGUMENTS - PASS BY VALUE AND REFERENCE\n\n+   - In\
    \ Python everything is an object.\n- An int is an object, string is an object\
    \ and list is an object.\n- Some objects are mutable, some are immutable.\n- All\
    \ objects are passed by reference (address) to a function. That means we pass\
    \ reference of the object and not the object itself.\n- But whether the function\
    \ can modify the value of the object depends on the mutability of the object.\n\
    - So, if you pass a string, it behaves like pass by value as we can't change actual\
    \ parameter with formal parameter.\n- If you pass a list (mutable object) then\
    \ it behaves like pass by reference as we can use formal parameter to change actual\
    \ parameter.\n\n```\npython\n# Effectively pass by reference\ndef add_num(v, num):\n\
    \    v.append(num)    # modify list\n\nnums = []\n# Call function with a list\
    \ and value to add to list\nadd_num(nums, 10)\nadd_num(nums, 20)\nprint(nums)\n\
    ```\n\n```\n\n[10, 20]\n```"
  - "[PAGE 70]\n\n```\n01 # Effectively pass by value\n02 def swap(n1, n2):\n03  \
    \   n1, n2 = n2, n1\n04     print('Inside swap() :', 'id(n1)', id(n1),\n05   \
    \            'id(n2)', id(n2))\n06     print('Values : ', n1, n2)\n07 \n08 # call\
    \ swap with two int variables\n09 a = 10\n10 b = 20\n11 print('Original Ids:',\
    \ 'id(a)', id(a), 'id(b)', id(b))\n12 swap(a, b)\n13 print('Values after swap\
    \ :', a, b)\n```\n\n**Output:**\n\nOriginal Ids  : id(a) 503960768 id(b) 503960928\n\
    Inside swap() : id(n1) 503960928 id(n2) 503960768\nValues :  20 10\nValues after\
    \ swap :  10 20"
  - "[PAGE 71]\n\n# LOCAL FUNCTIONS\n\n+   - Functions defined inside another function\
    \ are called local functions.\n- Local functions are local to function in which\
    \ they are defined.\n- They are defined each time the enclosing function is called.\n\
    - They are governed by same **LEGB** (Local, Enclosing, Global, Built-in) rule.\n\
    - They can access variables that are in enclosing scope.\n- Cannot be called from\
    \ outside outer function using notation *outerfunction.Localfunction*.\n- They\
    \ can contain multiple statements whereas lambdas can have only one statement.\n\
    - Local function can be returned from outer function and then can be called from\
    \ outside.\n- Local function can refer to variables in global namespace using\
    \ **global** keyword and enclosing namespace using **nonlocal** keyword.\n\n```\n\
    01 gv = 100  # Global variable\n02 def f1():\n03     v = 200  # enclosing variable\n\
    04 \n05     # Local function f2\n06     def f2():\n07         lv = 300  # local\
    \ variable\n08         # Local, Enclosing, Global, Built-in name\n09         print(lv,\
    \ v, gv, True)\n10 \n11 \n12     f2()  #call local fun from enclosing fun\n13\
    \ \n14 \n15 f1()\n```"
  - "[PAGE 72]\n\n# VARIABLE'S SCOPE\n\n+   - Variables that are defined outside all\
    \ functions in a module are called global variables and can be accessed from anywhere\
    \ in the module.\n- Variables created inside a function can be used only inside\
    \ the function.\n- Keyword **global** is used to access a global variable from\
    \ a function so that Python doesn't create a local variable with the same name\
    \ when you assign a value to a variable.\n- Python looks in the order – local,\
    \ enclosing, global and built-in (LEGB) variables.\n\n```\n01 sum = 0   # Global\
    \ variable\n02 def add_square(value):\n03     square = value * value # Square\
    \ is local variable\n04     global sum            # Refer to global variable\n\
    05     sum += square         # Add square to global sum\n06 \n07 def outerfun():\n\
    08     a = 10\n09     def innerfun():\n10         nonlocal a\n11         a = a\
    \ + 1         # Increment nonlocal a\n12 \n13     innerfun()\n14     print(a)\n\
    15 \n16 add_square(4)\n17 add_square(5)\n18 print(sum)\n19 outerfun()\n```"
- md: "## MODULES\n\n- A module is a file containing Python definitions (functions\
    \ and classes) and statements.\n- It can be used in a script (another module)\
    \ or in an interactive instance of the interpreter.\n- A module can be *imported*\
    \ into other modules or run as a script.\n- The file name is the module name with\
    \ the suffix .py appended. Within a module, the module's name (as a string) is\
    \ available as the value of the global variable __name__.\n- A module can contain\
    \ executable statements as well as function and class definitions. These statements\
    \ are intended to initialize the module. They are executed only the *first* time\
    \ the module name is encountered in an import statement.\n\n## num_funs.py\n\n\
    ```python\ndef is_even(n):\n    return n % 2 == 0\n\ndef is_odd(n):\n    return\
    \ n % 2 == 1\n\ndef is_positive(n):\n    return n > 0\n```\n\n## use_num_funs.py\n\
    \n```python\nimport num_funs          # import module\n\nprint(num_funs.__name__)\n\
    print(num_funs.is_even(10))\n```\n\n## THE IMPORT STATEMENT\n\n- In order to make\
    \ use of classes and functions in a module, we must first import module using\
    \ **import** statement.\n- The system maintains a table of modules that have been\
    \ initialized, indexed by module name. This table is accessible as **sys.modules**.\n\
    - If no matching file is found, **ImportError** is raised. If a file is found,\
    \ it is parsed, yielding an executable code block. If a syntax error occurs, **SyntaxError**\
    \ is raised.\n- Whenever module is imported, code in module (not classes and functions)\
    \ is executed.\n\n```\nimport module [as name] (, module [as name])*\nfrom module\
    \ import identifier [as name]\n                (, identifier [as name])*\nfrom\
    \ module import *\n```\n\nThe following are examples of import statement:\n\n\
    ```python\n# import num_funs and refer to it by alias nf\nimport num_funs as nf\n\
    \nprint(nf.is_even(10))\n```\n\n```python\n# import all definitions of module\
    \ num_funs\nfrom num_funs import *\n\nprint(is_even(10))\n```\n\n```python\n#\
    \ import specific function from num_funs module\nfrom num_funs import is_even,\
    \ is_odd\n\nprint(is_odd(10))\n```\n\n## THE DIR() FUNCTION\n\nIt is used to get\
    \ members of the module. It returns a sorted list of strings.\n\nThe following\
    \ shows members of num_funs module.\n\n```python\nimport num_funs\nprint(dir(num_funs))\n\
    ```\n\nOutput:\n\n```\n['__builtins__', '__cached__', '__doc__', '__file__',\n\
    '__loader__', '__name__', '__package__', '__spec__',\n'is_even', 'is_odd', 'is_positive']\n\
    ```\n\nNOTE: When **dir()** and **__name__** are used in a module they refer to\
    \ current module.\n\n## THE HELP() FUNCTION\n\n- It invokes the built-in help\
    \ system.\n- If no argument is given, the interactive help system starts on the\
    \ interpreter console.\n- If the argument is any other kind of object, a help\
    \ page on the object is generated.\n\n```\nhelp([object])\n```\n\nUse SPACE key\
    \ to go to next page and Q to quit the help system.\n\n## MODULE SEARCH PATH\n\
    \nWhen a module is imported, the interpreter first searches for a built-in module\
    \ with that name. If not found, it then searches for a file named modulename.py\
    \ in a list of directories given by the variable **sys.path**.\n\nThe **sys.path**\
    \ is initialized from the following locations:\n\n- The directory containing the\
    \ input script (or the current directory when no file is specified).\n- PYTHONPATH\
    \ (a list of directory names, with the same syntax as the shell variable PATH).\n\
    - The installation-dependent default.\n\n```python\n>>> import sys\n>>> sys.path\n\
    ['', 'C:\\\\python\\\\python38.zip', 'C:\\\\python\\\\DLLs', 'C:\\\\python\\\\\
    lib', 'C:\\\\python', 'C:\\\\python\\\\lib\\\\site-packages']\n>>>\n```\n\n##\
    \ Setting PYTHONPATH\n\nThe following example sets PYTHONPATH to a few directories\
    \ so that they are added to module search path.\n\n```\nc:\\python>set PYTHONPATH=c:\\\
    dev\\python;c:\\dev\\projects\n```\n\n> **NOTE:** It is possible to add entries\
    \ to **sys.path** as it is a list. Use **r** as prefix to indicate it is raw string\
    \ so that \\ (backslash) is treated as a normal character and not special character.\n\
    \n```python\nsys.path.append(r'c:\\dev\\python\\projects')\n```\n\n## EXECUTING\
    \ MODULE AS SCRIPT\n\n- A module can contain executable statements as well as\
    \ function and class definitions. These statements are intended to initialize\
    \ the module.\n- Executable statements in a module are executed whenever you run\
    \ module as a script and when you import module into another module using import\
    \ statement.\n- When you run a Python module using `python filename.py` then the\
    \ code in the module will be executed, but with the `__name__` set to `__main__`.\n\
    - But if we want to execute code only when module is run as script then we need\
    \ to check whether name of the module is set to `__main__`.\n\nmodule1.py\n\n\
    ```python\n# this is simple module\ndef print_info():\n    print(\"I am in module1.print_info()\"\
    )\n\n# code executed when imported or when run as script\nprint(\"In Module1\"\
    )\n\n# code executed only when run as script\nif __name__ == \"__main__\":\n \
    \   print(\"Running as script\")\n```\n\nWhen you run the above code as script\
    \ (`python.exe module1.py`) the following output is generated:\n\n```\nIn Module1\n\
    Running as script\n```\n\nBut when you import this module into another file as\
    \ shown below then the output shown below is generated.\n\n## use_module1.py\n\
    \n```python\nimport module1\n\nmodule1.print_info()\n```\n\nOutput when module\
    \ is just imported and function is called:\n\n```\nIn Module1\nI am in module1.print_info()\n\
    ```\n\n## USING COMMAND LINE ARGUMENTS\n\n- It is possible to pass command line\
    \ arguments while invoking a module from command line.\n- Command line arguments\
    \ are placed in argv list, which is present in sys module.\n- First element in\
    \ sys.argv is always name of the module that is being executed.\n\nargv_demo.py\n\
    \n```python\nimport sys\nprint(\"No. of arguments:\", len(sys.argv))\nprint(\"\
    File: \", sys.argv[0])\nfor v in sys.argv[1:]:\n    print(v)\n```\n\nRun argv_demo.py\
    \ as script using python as follows:\n\n```\nC:\\python>python argv_demo.py first\
    \ second\nNo. of arguments: 3\nFile: argv_demo.py\nfirst\nsecond\n```\n\n## DOCUMENTATION\n\
    \n- By convention, every function must be documented using documentation conventions.\n\
    - Documentation is provided between three double quotes (\"\"\").\n- The first\
    \ line should always be a short, concise summary of the object's purpose. This\
    \ line should begin with a capital letter and end with a period.\n\n```python\n\
    def add(n1,n2):\n    \"\"\"Adds two numbers and returns the result.\n\n    Args:\n\
    \        n1(int) : first number.\n        n2(int) : second number.\n\n    Returns:\n\
    \        int : Sum of the given two numbers.\n    \"\"\"\n\n    return n1 + n2\n\
    \nhelp(add) # prints documentation for add()\nprint(add.__doc__) # prints documentation\n\
    ```\n\n## PACKAGES\n\n- Package is a collection of modules.\n- When importing\
    \ the package, Python searches through the directories on **sys.path** looking\
    \ for the package subdirectory.\n- Generally, __init__.py file is used to make\
    \ Python treat the directory as package; this is done to prevent directories with\
    \ a common name, such as string, from unintentionally hiding valid modules that\
    \ occur later on the module search path. However, __init__.py is optional.\n-\
    \ File __init__.py can just be an empty file, but it can also execute initialization\
    \ code for the package or set the __all__ variable.\n- Users of the package can\
    \ import individual modules from the package.\n\n## Folder Structure\n\n```\n\
    use_st_lib.py\nstlib\n    __init__.py\n    str_funs.py\n    num_funs.py\n    mis_funs.py\n\
    ```\n\n## stlib\\str_funs.py\n\n```python\ndef has_upper(st):\n    # code\ndef\
    \ has_digit(st):\n    # code\n```\n\n## use_st_lib.py\n\n```python\n# Import module\
    \ from package\nimport stlib.str_funs\n\n# call a function in module\nprint(stlib.str_funs.has_upper(\"\
    Python\"))\n\n# import a function from a module in a package\nfrom stlib.str_funs\
    \ import has_digit\n\n# call function after it is imported\nprint(has_digit(\"\
    Python 3.10\"))\n```\n\n## Importing with *\n\n- In order to import specific modules\
    \ when * is used for module with package, we must define variable `__all__` in\
    \ package's `__init__.py` to list modules that are to be imported.\n- If variable\
    \ `__all__` is not defined in `__init__.py` then Python ensures that the package\
    \ has been imported (running initialization code in `__init__.py`) and then imports\
    \ whatever names are defined in the package but no modules are imported.\n\n##\
    \ stlib\\_\\_init\\_\\_.py\n\n```python\n__all__ = [\"num_funs\", \"str_funs\"\
    ]\n```"
  mdcn: "## 模块\n\n- 模块是一个包含 Python 定义（函数和类）以及语句的文件。\n- 它可以在脚本（另一个模块）中使用，也可以在解释器的交互式实例中使用。\n\
    - 一个模块可以被*导入*到其他模块中，或者作为脚本运行。\n- 文件名就是模块名加上后缀 .py。在模块内部，模块的名称（作为一个字符串）可以通过全局变量\
    \ `__name__` 获得。\n- 模块可以包含可执行语句以及函数和类定义。这些语句旨在初始化模块。它们仅在 `import` 语句中*首次*遇到该模块名时执行。\n\
    \n## num_funs.py\n\n```python\ndef is_even(n):\n    return n % 2 == 0\n\ndef is_odd(n):\n\
    \    return n % 2 == 1\n\ndef is_positive(n):\n    return n > 0\n```\n\n## use_num_funs.py\n\
    \n```python\nimport num_funs          # 导入模块\n\nprint(num_funs.__name__)\nprint(num_funs.is_even(10))\n\
    ```\n\n## 导入语句\n\n- 为了使用模块中的类和函数，我们必须首先使用 **import** 语句导入模块。\n- 系统维护一个已初始化的模块表，按模块名索引。该表可通过\
    \ **sys.modules** 访问。\n- 如果没有找到匹配的文件，会引发 **ImportError**。如果找到文件，它会被解析，生成一个可执行代码块。如果发生语法错误，会引发\
    \ **SyntaxError**。\n- 每当导入一个模块时，模块中的代码（而非类和函数）就会被执行。\n\n```\nimport module [as\
    \ name] (, module [as name])*\nfrom module import identifier [as name]\n     \
    \           (, identifier [as name])*\nfrom module import *\n```\n\n以下是导入语句的示例：\n\
    \n```python\n# 导入 num_funs 并通过别名 nf 引用它\nimport num_funs as nf\n\nprint(nf.is_even(10))\n\
    ```\n\n```python\n# 导入模块 num_funs 的所有定义\nfrom num_funs import *\n\nprint(is_even(10))\n\
    ```\n\n```python\n# 从 num_funs 模块导入特定函数\nfrom num_funs import is_even, is_odd\n\
    \nprint(is_odd(10))\n```\n\n## dir() 函数\n\n它用于获取模块的成员。它返回一个已排序的字符串列表。\n\n以下展示了\
    \ num_funs 模块的成员。\n\n```python\nimport num_funs\nprint(dir(num_funs))\n```\n\n\
    输出：\n\n```\n['__builtins__', '__cached__', '__doc__', '__file__',\n'__loader__',\
    \ '__name__', '__package__', '__spec__',\n'is_even', 'is_odd', 'is_positive']\n\
    ```\n\n注意：当在模块内部使用 **dir()** 和 **__name__** 时，它们指的是当前模块。\n\n## help() 函数\n\n-\
    \ 它调用内置的帮助系统。\n- 如果没有给出参数，交互式帮助系统将在解释器控制台启动。\n- 如果参数是任何其他类型的对象，将生成该对象的帮助页面。\n\n\
    ```\nhelp([object])\n```\n\n使用空格键转到下一页，按 Q 键退出帮助系统。\n\n## 模块搜索路径\n\n当导入一个模块时，解释器首先搜索同名的内置模块。如果没有找到，则在变量\
    \ **sys.path** 给出的目录列表中搜索名为 `modulename.py` 的文件。\n\n**sys.path** 从以下位置初始化：\n\n\
    - 包含输入脚本的目录（或未指定文件时的当前目录）。\n- PYTHONPATH（一个目录名列表，语法与 shell 变量 PATH 相同）。\n- 安装依赖的默认值。\n\
    \n```python\n>>> import sys\n>>> sys.path\n['', 'C:\\\\python\\\\python38.zip',\
    \ 'C:\\\\python\\\\DLLs', 'C:\\\\python\\\\lib', 'C:\\\\python', 'C:\\\\python\\\
    \\lib\\\\site-packages']\n>>>\n```\n\n## 设置 PYTHONPATH\n\n以下示例将 PYTHONPATH 设置为几个目录，以便将它们添加到模块搜索路径。\n\
    \n```\nc:\\python>set PYTHONPATH=c:\\dev\\python;c:\\dev\\projects\n```\n\n> **注意：**\
    \ 由于 **sys.path** 是一个列表，因此可以向其中添加条目。使用 **r** 作为前缀表示这是一个原始字符串，这样反斜杠（\\）将被视为普通字符而非特殊字符。\n\
    \n```python\nsys.path.append(r'c:\\dev\\python\\projects')\n```\n\n## 将模块作为脚本执行\n\
    \n- 模块可以包含可执行语句以及函数和类定义。这些语句旨在初始化模块。\n- 当将模块作为脚本运行，以及使用 `import` 语句将模块导入到另一个模块时，模块中的可执行语句都会被执行。\n\
    - 当你使用 `python filename.py` 运行一个 Python 模块时，模块中的代码将被执行，但 `__name__` 会被设置为 `__main__`。\n\
    - 但是，如果我们只想在模块作为脚本运行时执行代码，那么我们需要检查模块的名称是否被设置为 `__main__`。\n\nmodule1.py\n\n```python\n\
    # 这是一个简单的模块\ndef print_info():\n    print(\"I am in module1.print_info()\")\n\n\
    # 在导入时或作为脚本运行时执行的代码\nprint(\"In Module1\")\n\n# 仅在作为脚本运行时执行的代码\nif __name__ ==\
    \ \"__main__\":\n    print(\"Running as script\")\n```\n\n当你将上述代码作为脚本运行 (`python.exe\
    \ module1.py`) 时，会生成以下输出：\n\n```\nIn Module1\nRunning as script\n```\n\n但是，当你将此模块导入到另一个文件（如下所示）时，则会生成以下输出。\n\
    \n## use_module1.py\n\n```python\nimport module1\n\nmodule1.print_info()\n```\n\
    \n当仅导入模块并调用函数时的输出：\n\n```\nIn Module1\nI am in module1.print_info()\n```\n\n##\
    \ 使用命令行参数\n\n- 在从命令行调用模块时，可以传递命令行参数。\n- 命令行参数被放置在 `sys` 模块中的 `argv` 列表中。\n- `sys.argv`\
    \ 中的第一个元素始终是正在执行的模块的名称。\n\nargv_demo.py\n\n```python\nimport sys\nprint(\"No.\
    \ of arguments:\", len(sys.argv))\nprint(\"File: \", sys.argv[0])\nfor v in sys.argv[1:]:\n\
    \    print(v)\n```\n\n使用 python 作为脚本运行 argv_demo.py 如下：\n\n```\nC:\\python>python\
    \ argv_demo.py first second\nNo. of arguments: 3\nFile: argv_demo.py\nfirst\n\
    second\n```\n\n## 文档字符串\n\n- 按照惯例，每个函数都必须使用文档字符串约定进行文档化。\n- 文档字符串位于三个双引号 (\"\"\
    \") 之间。\n- 第一行应该是对象目的的简短、简洁的摘要。这一行应以大写字母开头，以句号结尾。\n\n```python\ndef add(n1,n2):\n\
