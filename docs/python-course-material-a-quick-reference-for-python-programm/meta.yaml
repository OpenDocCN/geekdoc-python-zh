    - 要成为抽象类的类必须继承自 **abc** 模块的 **ABC**（抽象基类）类。\n- 不能创建抽象类的实例。\n\n```python\nfrom\
    \ abc import ABC, abstractmethod\nclass Student(ABC):\n    @abstractmethod\n \
    \   def getsubject(self):\n        pass\n\nclass PythonStudent(Student):\n   \
