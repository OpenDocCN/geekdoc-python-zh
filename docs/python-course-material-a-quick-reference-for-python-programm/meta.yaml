  - '[PAGE 10]


    # PYTHON LANGUAGE


    +   - Easy and powerful language.

    - Supports different programming paradigms like *Structured programming* and *Object-oriented
    programming*.

    - Is an interpreted language.

    - Ideal for scripting and rapid application development.

    - Supports high-level data structures like List, Set, Dictionary and Tuple.

    - Python has a design philosophy that emphasizes code readability, and a syntax
    that allows programmers to express concepts in fewer lines of code.

    - Created by **Guido van Rossum** and first released in 1991.

    - Python features a dynamic type system and automatic memory management.

    - Python 2.0 was released on 16th October 2000.

    - Python 3.0 (initially called Python 3000 or py3k) was released on 3rd December
    2008.

    - Python 3.10 was released on October, 2021.'
- md: "## INSTALLATION OF PYTHON\n\n1.  Go to python.org (https://www.python.org/downloads).\n\
    2.  Click on Downloads menu and select your platform.\n3.  It will take you to\
    \ related downloads page. For example, for Windows it takes you to https://www.python.org/downloads/windows/.\n\
    4.  Select Windows x86-64 executable installer and download the installer (python-3.10.0-amd64.exe).\n\
    5.  Run installer and opt for *Custom installation*.\n6.  Change directory into\
    \ which installer installs Python to something like c:\\python.\n7.  Also make\
    \ sure you select *Add Python 3.10 to PATH* option in installation window.\n8.\
    \  Installer installs all required files into selected folder. Installer automatically\
    \ sets python installation folder in system path.\n\n## Install Python 3.10.0\
    \ (64-bit)\n\nSelect Install Now to install Python with default settings, or choose\
    \ Customize to enable or disable features.\n\n-   Install Now\n    C:\\Users\\\
    Srikanth Pragada\\AppData\\Local\\Programs\\Python\\Python310\n    Includes IDLE,\
    \ pip and documentation\n    Creates shortcuts and file associations\n-   Customize\
    \ installation\n    Choose location and features\n\nInstall launcher for all users\
    \ (recommended)\n\nAdd Python 3.10 to PATH\n\n## Optional Features\n\n-   Documentation\n\
    \    Installs the Python documentation file.\n-   pip\n    Installs pip, which\
    \ can download and install other Python packages.\n-   tcl/tk and IDLE\n    Installs\
    \ tkinter and the IDLE development environment.\n-   Python test suite\n    Installs\
    \ the standard library test suite.\n-   py launcher\n    for all users (requires\
    \ elevation)\n    Upgrades the global 'py' launcher from the previous version.\n\
    \n## USING PYTHON INTERPRETER - REPL\n\n-   Go to Command Prompt.\n-   Make sure\
    \ system PATH is set to folder where Python was installed. If that is not the\
    \ case then you need to be in the folder into which you installed Python (for\
    \ example, c:\\python).\n-   Run **python.exe** to start interpreter. It is also\
    \ known as *Read Evaluate Print Loop* (REPL).\n\n```\nc:\\python>python\nPython\
    \ 3.10.0 (tags/v3.10.0:b494f59, Oct 4 2021, 19:00:18) [MSC v.1929 64 bit (AMD64)]\
    \ on win32\nType \"help\", \"copyright\", \"credits\" or \"license\" for more\
    \ information.\n>>>\n```\n\n-   Use CTRL-Z or exit() to end interpreter and come\
    \ back to command prompt.\n-   The interpreter’s line-editing features include\
    \ interactive editing, history substitution and code completion on systems that\
    \ support reading line.\n\n## INTERACTIVE MODE\n\n-   When commands are read from\
    \ keyboard, the interpreter is said to be in *interactive mode*.\n-   It prompts\
    \ for the next command with the *primary prompt*, usually three greater-than signs\
    \ (>>>); for continuation lines it prompts with the *secondary prompt*, by default\
    \ three dots (...).\n-   In the interactive interpreter, the output string is\
    \ enclosed in quotes and special characters are escaped with backslashes.\n- \
    \  The *print()* function produces a more readable output, by omitting the enclosing\
    \ quotes and by printing escape and special characters.\n-   Two or more *string\
    \ literals* (i.e. the ones enclosed between quotes) next to each other are automatically\
    \ concatenated.\n\n## VARIABLES\n\n-   Python is a dynamic language where variable\
    \ is created by directly assigning value to it.\n-   Based on the value assigned\
    \ to a variable, its datatype is determined.\n-   Built-in function **type** ()\
    \ can be used to find out the type of a variable.\n\n```\n>>> a = 10\n>>> type(a)\n\
    <class 'int'>\n>>> b = \"Python\"\n>>> type(b)\n<class 'str'>\n>>>\n```\n\n> **NOTE:**\
    \ We can find out data type of any variable using type () built-in function.\n\
    \n## RULES FOR IDENTIFIER\n\nWhile creating names for variables, function and\
    \ other identifiers, we need to follow the rules given below:\n\n-   Can contain\
    \ 0-9, a-z, A-Z and underscore\n-   Cannot start with a digit\n-   Length is unlimited\n\
    -   Case is significant\n\n## OPERATORS\n\nThe following are different types of\
    \ operators available in Python.\n\n## Assignment operator (=)\n\n-   Assignment\
    \ operator is used to assign a value to a variable.\n-   It creates variables\
    \ if not already present otherwise it changes its current value.\n-   It is possible\
    \ to assign multiple values to multiple variables in single assignment statement.\n\
    \n```\n>>> # create variables\n>>> a = 10\n>>> b = 20.50\n>>>\n>>> # Assign multiple\
    \ values to multiple variables\n>>> a, b = 0, 1\n>>>\n>>> # swap two variables\n\
    >>> a, b = b, a\n>>>\n>>> # Assign 10 to a, b and c\n>>> a = b = c = 10\n```\n\
    \n## Arithmetic Operators\n\nThe following are available arithmetic operators:\n\
    \n| Operator | Meaning |\n| --- | --- |\n| + | Addition |\n| - | Subtraction |\n\
    | * | Multiplication |\n| ** | Exponentiation |\n| / | Division |\n| // | Integer\
    \ Division |\n| % | Modulus |\n\n```\n>>> a, b = 10, 4\n>>> a / b, a // b\n(2.5,\
    \ 2)\n>>> a ** b\n10000\n>>> a % 4\n2\n```\n\n## Relational Operators\n\nThe following\
    \ relational operators are available to compare values:\n\n| Operator | Meaning\
    \ |\n|----------|------------------|\n| <        | Less than |\n| >        | Greater\
    \ than |\n| <=       | Less than or equal to |\n| >=       | Greater than or equal\
    \ to |\n| ==       | Equal to |\n| !=       | Not equal to |\n\n```\n>>> a = 10\n\
    >>> b = 20\n>>> a < b\nTrue\n>>> a == b\nFalse\n>>> s1 = \"Abc\"\n>>> s2 = \"\
    ABC\"\n>>> s1 > s2\nTrue\n>>> s1 == s2\nFalse\n>>> s1 > s2\nTrue\n```\n\n## Logical\
    \ Operators\n\nThe following are logical operators used to combine conditions:\n\
    \n| Operator | Meaning |\n| :--- | :--- |\n| **and** | Anding |\n| **or** | Oring\
    \ |\n| **not** | Negates condition |\n\n```\n>>> a, b, c = 10, 20, 30\n>>> a <\
    \ b and a < c\nTrue\n>>> a < b < c    # same as a < b and b < c\nTrue\n>>> a !=\
    \ b or b != c\nTrue\n```\n\n> **NOTE:** The Boolean operators **and** & **or**\
    \ are known as *short-circuit operators* - their arguments are evaluated from\
    \ left to right, and evaluation stops as soon as the outcome is determined.\n\n\
    ## BUILT-IN DATA TYPES\n\nThe following are built-in data types in Python.\n\n\
    | Data Type | Meaning |\n|---|---|\n| None | There is a single object with this\
    \ value. This object is accessed through the built-in name **None**. It is used\
    \ to signify the absence of a value in many situations, e.g., it is returned from\
    \ functions that don’t explicitly return anything. Its truth value is false. |\n\
    | NotImplemented | There is a single object with this value. This object is accessed\
    \ through the built-in name ***NotImplemented***. Numeric methods and rich comparison\
    \ methods should return this value if they do not implement the operation for\
    \ the operands provided. Its truth value is true. |\n| Integers (int) | These\
    \ represent numbers in an unlimited range, subject to available (virtual) memory\
    \ only. |\n| Booleans (bool) | These represent the truth values *False* and *True*.\
    \ The two objects representing the values False and True are the only Boolean\
    \ objects. The Boolean type is a subtype of the integer type, and Boolean values\
    \ behave like the values 0 (False) and 1 (True), respectively, in almost all contexts,\
    \ the exception being that when converted to a string, the strings \"False\" or\
    \ \"True\" are returned, respectively. |\n| Real (float) | These represent machine-level\
    \ double precision floating point numbers. You are at the mercy of the underlying\
    \ machine architecture for the accepted range and handling of overflow. Python\
    \ does not support single-precision floating point numbers. |\n| Complex (complex)\
    \ | These represent complex numbers as a pair of machine-level double precision\
    \ floating point numbers. |\n| String (str) | A string is a sequence of values\
    \ that represent Unicode codes. |\n| Tuple (tuple) | The items of a tuple are\
    \ arbitrary Python objects. Tuples of two or more items are formed by comma-separated\
    \ lists of expressions. |\n| Bytes (bytes) | A bytes object is an immutable array.\
    \ The items are 8-bit bytes, represented by integers in the range 0 <= x < 256.\
    \ |\n| List (list) | The items of a list are arbitrary Python objects. Lists are\
    \ formed by placing a comma-separated list of expressions in square brackets.\
    \ |\n| Byte Array (bytearray) | A bytearray object is a mutable array. They are\
    \ created by the built-in bytearray() constructor. |\n| Set (set) | These represent\
    \ a mutable set of unique values created by set() constructor. |\n| Frozen set\
    \ (frozenset) | These represent an immutable set created by built-in frozenset()\
    \ constructor. |\n| Dictionary (dict) | These represent finite sets of objects\
    \ indexed by nearly arbitrary values. |"
  mdcn: "## 安装 Python\n\n1.  访问 python.org (https://www.python.org/downloads)。\n2.\
    \  点击 Downloads 菜单并选择你的操作系统平台。\n3.  这将带你到相关的下载页面。例如，对于 Windows 系统，它会跳转到 https://www.python.org/downloads/windows/。\n\
    4.  选择 Windows x86-64 可执行安装程序并下载安装文件 (python-3.10.0-amd64.exe)。\n5.  运行安装程序并选择\
    \ *自定义安装*。\n6.  将安装程序安装 Python 的目录更改为类似 c:\\python 的路径。\n7.  同时，请确保在安装窗口中选中 *Add\
    \ Python 3.10 to PATH* 选项。\n8.  安装程序会将所有必需的文件安装到所选文件夹中。安装程序会自动将 Python 安装文件夹添加到系统路径中。\n\
    \n## 安装 Python 3.10.0 (64 位)\n\n选择“立即安装”以使用默认设置安装 Python，或选择“自定义”以启用或禁用功能。\n\n\
    -   立即安装\n    C:\\Users\\Srikanth Pragada\\AppData\\Local\\Programs\\Python\\\
    Python310\n    包含 IDLE、pip 和文档\n    创建快捷方式和文件关联\n-   自定义安装\n    选择安装位置和功能\n\n\
    为所有用户安装启动器（推荐）\n\n将 Python 3.10 添加到 PATH\n\n## 可选功能\n\n-   文档\n    安装 Python 文档文件。\n\
    -   pip\n    安装 pip，它可用于下载和安装其他 Python 包。\n-   tcl/tk 和 IDLE\n    安装 tkinter 和\
    \ IDLE 开发环境。\n-   Python 测试套件\n    安装标准库测试套件。\n-   py 启动器\n    为所有用户安装（需要管理员权限）\n\
    \    从先前版本升级全局 'py' 启动器。\n\n## 使用 Python 解释器 - REPL\n\n-   打开命令提示符。\n-   确保系统\
    \ PATH 设置为 Python 的安装文件夹。如果不是，则需要进入你安装 Python 的文件夹（例如，c:\\python）。\n-   运行 **python.exe**\
    \ 以启动解释器。它也被称为 *读取-求值-打印循环* (REPL)。\n\n```\nc:\\python>python\nPython 3.10.0 (tags/v3.10.0:b494f59,\
    \ Oct 4 2021, 19:00:18) [MSC v.1929 64 bit (AMD64)] on win32\nType \"help\", \"\
    copyright\", \"credits\" or \"license\" for more information.\n>>>\n```\n\n- \
    \  使用 CTRL-Z 或 exit() 结束解释器并返回命令提示符。\n-   解释器的行编辑功能包括交互式编辑、历史记录替换以及在支持读取行的系统上进行代码补全。\n\
    \n## 交互模式\n\n-   当命令从键盘读入时，解释器处于 *交互模式*。\n-   它使用 *主提示符*（通常是三个大于号 `>>>`）提示输入下一个命令；对于续行，它使用\
    \ *次提示符*（默认是三个点 `...`）。\n-   在交互式解释器中，输出字符串用引号括起来，特殊字符用反斜杠转义。\n-   *print()* 函数通过省略引号并打印转义字符和特殊字符，产生更易读的输出。\n\
    -   两个或多个相邻的 *字符串字面量*（即用引号括起来的字符串）会自动连接。\n\n## 变量\n\n-   Python 是一种动态语言，变量通过直接赋值来创建。\n\
    -   根据赋给变量的值，其数据类型被确定。\n-   内置函数 **type**() 可用于查找变量的类型。\n\n```\n>>> a = 10\n>>>\
    \ type(a)\n<class 'int'>\n>>> b = \"Python\"\n>>> type(b)\n<class 'str'>\n>>>\n\
    ```\n\n> **注意：** 我们可以使用内置函数 type() 查找任何变量的数据类型。\n\n## 标识符规则\n\n在为变量、函数和其他标识符创建名称时，我们需要遵循以下规则：\n\
    \n-   可以包含 0-9、a-z、A-Z 和下划线\n-   不能以数字开头\n-   长度不受限制\n-   区分大小写\n\n## 运算符\n\n\
    以下是 Python 中可用的不同类型的运算符。\n\n## 赋值运算符 (=)\n\n-   赋值运算符用于将值赋给变量。\n-   如果变量不存在，则创建变量；否则，更改其当前值。\n\
    -   可以在单个赋值语句中为多个变量赋多个值。\n\n```\n>>> # 创建变量\n>>> a = 10\n>>> b = 20.50\n>>>\n\
    >>> # 为多个变量赋多个值\n>>> a, b = 0, 1\n>>>\n>>> # 交换两个变量\n>>> a, b = b, a\n>>>\n>>>\
    \ # 将 10 赋给 a, b 和 c\n>>> a = b = c = 10\n```\n\n## 算术运算符\n\n以下是可用的算术运算符：\n\n\
    | 运算符 | 含义 |\n| --- | --- |\n| + | 加法 |\n| - | 减法 |\n| * | 乘法 |\n| ** | 幂运算 |\n\
    | / | 除法 |\n| // | 整数除法 |\n| % | 取模 |\n\n```\n>>> a, b = 10, 4\n>>> a / b, a //\
    \ b\n(2.5, 2)\n>>> a ** b\n10000\n>>> a % 4\n2\n```\n\n## 关系运算符\n\n以下是用于比较值的关系运算符：\n\
    \n| 运算符 | 含义 |\n|----------|------------------|\n| <        | 小于 |\n| >      \
    \  | 大于 |\n| <=       | 小于或等于 |\n| >=       | 大于或等于 |\n| ==       | 等于 |\n| !=\
    \       | 不等于 |\n\n```\n>>> a = 10\n>>> b = 20\n>>> a < b\nTrue\n>>> a == b\n\
    False\n>>> s1 = \"Abc\"\n>>> s2 = \"ABC\"\n>>> s1 > s2\nTrue\n>>> s1 == s2\nFalse\n\
    >>> s1 > s2\nTrue\n```\n\n## 逻辑运算符\n\n以下是用于组合条件的逻辑运算符：\n\n| 运算符 | 含义 |\n| :---\
    \ | :--- |\n| **and** | 逻辑与 |\n| **or** | 逻辑或 |\n| **not** | 逻辑非 |\n\n```\n>>>\
    \ a, b, c = 10, 20, 30\n>>> a < b and a < c\nTrue\n>>> a < b < c    # 等同于 a <\
    \ b and b < c\nTrue\n>>> a != b or b != c\nTrue\n```\n\n> **注意：** 布尔运算符 **and**\
    \ 和 **or** 被称为 *短路运算符* - 它们的参数从左到右求值，一旦结果确定，求值即停止。\n\n## 内置数据类型\n\n以下是 Python\
    \ 中的内置数据类型。\n\n| 数据类型 | 含义 |\n|---|---|\n| None | 有一个具有此值的单个对象。此对象通过内置名称 **None**\
    \ 访问。它在许多情况下用于表示值的缺失，例如，从没有显式返回任何内容的函数返回。其真值为假。 |\n| NotImplemented | 有一个具有此值的单个对象。此对象通过内置名称\
    \ ***NotImplemented*** 访问。数值方法和富比较方法如果未对提供的操作数实现该操作，则应返回此值。其真值为真。 |\n| 整数 (int)\
    \ | 这些表示无限范围内的数字，仅受可用（虚拟）内存的限制。 |\n| 布尔值 (bool) | 这些表示真值 *False* 和 *True*。表示值\
    \ False 和 True 的两个对象是唯一的布尔对象。布尔类型是整数类型的子类型，布尔值在几乎所有上下文中分别表现得像值 0 (False) 和 1 (True)，例外情况是当转换为字符串时，分别返回字符串\
    \ \"False\" 或 \"True\"。 |\n| 浮点数 (float) | 这些表示机器级双精度浮点数。接受的范围和溢出处理取决于底层机器架构。Python\
    \ 不支持单精度浮点数。 |\n| 复数 (complex) | 这些将复数表示为一对机器级双精度浮点数。 |\n| 字符串 (str) | 字符串是表示\
    \ Unicode 码点的值序列。 |\n| 元组 (tuple) | 元组的项是任意的 Python 对象。由两个或多个项组成的元组由逗号分隔的表达式列表形成。\
    \ |\n| 字节 (bytes) | 字节对象是一个不可变的数组。项是 8 位字节，由范围 0 <= x < 256 内的整数表示。 |\n| 列表 (list)\
    \ | 列表的项是任意的 Python 对象。列表通过将逗号分隔的表达式列表放在方括号中形成。 |\n| 字节数组 (bytearray) | 字节数组对象是一个可变的数组。它们由内置的\
    \ bytearray() 构造函数创建。 |\n| 集合 (set) | 这些表示由 set() 构造函数创建的唯一值的可变集合。 |\n| 冻结集合 (frozenset)\
    \ | 这些表示由内置 frozenset() 构造函数创建的不可变集合。 |\n| 字典 (dict) | 这些表示由几乎任意值索引的对象的有限集合。"
