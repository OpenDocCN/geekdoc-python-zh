  md: '# # BUILT-IN DATA TYPES


    The following are built-in data types in Python.


    | Data Type | Meaning |

    |---|---|

    | None | There is a single object with this value. This object is accessed through
    the built-in name **None**. It is used to signify the absence of a value in many
    situations, e.g., it is returned from functions that don’t explicitly return anything.
    Its truth value is false. |

    | NotImplemented | There is a single object with this value. This object is accessed
    through the built-in name ***NotImplemented***. Numeric methods and rich comparison
    methods should return this value if they do not implement the operation for the
    operands provided. Its truth value is true. |

    | Integers (int) | These represent numbers in an unlimited range, subject to available
    (virtual) memory only. |

    | Booleans (bool) | These represent the truth values *False* and *True*. The two
    objects representing the values False and True are the only Boolean objects. The
    Boolean type is a subtype of the integer type, and Boolean values behave like
    the values 0 (False) and 1 (True), respectively, in almost all contexts, the exception
    being that when converted to a string, the strings "False" or "True" are returned,
    respectively. |

    | Real (float) | These represent machine-level double precision floating point
    numbers. You are at the mercy of the underlying machine architecture for the accepted
    range and handling of overflow. Python does not support single-precision floating
    point numbers. |'
