  md: '# The f-string


    +   - F-string is a string prefixed with f and inserts values of variables when
    variables are enclosed in {} inside the string.

    - New feature of Python 3.6.


    ```

    >>> name = "Srikanth"

    >>> lang = "Python"

    >>> f"{name} is a {lang} trainer"

    ''Srikanth is a Python trainer''

    ```


    It is possible to format values as follows:


    ```

    >>> mode = "Cash"

    >>> amount = 251.567

    >>> print(f"{mode:10} {amount:8.2f} {amount*0.20:5.2f}")

    Cash        251.57  50.31

    >>> f"{10000.00:8.2}"

    ''   1e+04''

    ```


    > NOTE: In format specifier, 8.2 means; total columns including decimal point
    is 8 and 2 digits after decimal point. Char f means fixed format, otherwise it
    uses E format.'
