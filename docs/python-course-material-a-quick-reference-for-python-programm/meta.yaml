    | Mode | Meaning |

    | :--- | :--- |

    | ''r'' | Open for reading (default). |

    | ''w'' | Open for writing, truncating the file first. |

    | ''x'' | Open for exclusive creation, failing if the file already exists. |

    | ''a'' | Open for writing, appending to the end of the file if it exists. |

    | ''b'' | Binary mode. |

    | ''t'' | Text mode (default). |

    | ''+'' | Open a disk file for updating (reading and writing). |


    > > NOTE: Python doesn''t depend on the underlying operating system''s notion
    of text files; all the processing is done by Python itself, and is therefore platform-independent.


    > > NOTE: When a string is prefixed with r, it is called as raw string. In raw
    string, even character like \ is treated as simple character and not escape sequence
    character.'
