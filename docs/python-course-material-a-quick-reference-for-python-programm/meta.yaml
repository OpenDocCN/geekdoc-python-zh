    test.db\")\ncur = con.cursor()\n\n# Delete row from EXPENSES table\ntry:\n   \
    \ # take data from user\n    id = input(\"Enter Id    :\")\n    cur.execute\n\
    \         (\"delete from expenses where id = ?\", (id, ))\n    if cur.rowcount\
    \ == 1:\n        con.commit()\n        print(\"Deleted successfully!\")\n    else:\n\
    \        print('Sorry! Id not found!')\nexcept Exception as ex:\n    print(\"\
    Sorry! Error: \", ex)\nfinally:\n    con.close()\n```\n\n## WORKING WITH OTHER\
