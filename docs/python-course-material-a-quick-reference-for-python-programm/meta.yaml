  mdcn: "## SQLite3 数据库\n\n-   SQLite 是一个 C 语言库，它提供了一个轻量级的基于磁盘的数据库，无需单独的服务器进程，并允许使用非标准的\
    \ SQL 查询语言变体来访问数据库。\n-   可以使用 SQLite 来原型化一个应用程序，然后将代码移植到像 Oracle 这样的大型数据库上。\n\
    -   Python 自带了 SQLite 数据库。\n\n## SQLite3 中的数据类型\n\n以下是 SQLite 数据库中可用的数据类型。\n\n\
    | 数据类型 | 含义 | Python 类型 |\n| :--- | :--- | :--- |\n| NULL | 值为 NULL。 | None |\n\
    | INTEGER | 值为有符号整数，根据值的大小存储为 1、2、3、4、6 或 8 字节。 | int |\n| REAL | 值为浮点值，存储为 8\
    \ 字节 IEEE 浮点数。 | float |\n| TEXT | 值为文本字符串，使用数据库编码（UTF-8、UTF-16BE 或 UTF-16LE）存储。\
    \ | str |\n| BLOB | 值为数据块，完全按照输入时的样子存储。 | bytes |\n\n## MODULE SQLITE3\n\n-  \
    \ 这是 SQLite 数据库的接口。\n-   此模块是 Python 标准库的一部分。\n-   它实现了 DB API 2.0 规范（PEP 249）。\n\
    \n## 方法 connect()\n\n-   用于使用给定参数建立到数据库的连接。\n-   参数是要连接的数据库的名称。如果数据库不存在，则会创建它。\n\
    -   返回一个连接对象。\n\n```\nconnect(databasename)\n```\n\n## 连接对象\n\n连接对象代表一个到数据库的连接。\n\
    \n| 方法 | 含义 |\n|---|---|\n| close() | 关闭连接。 |\n| commit() | 将事务中挂起的更改提交到数据库。 |\n\
    | rollback() | 使数据库回滚到任何挂起事务的开始。在未先提交更改的情况下关闭连接将导致执行隐式回滚。 |\n| cursor() | 使用此连接返回一个游标对象。\
    \ |\n\n## 游标对象\n\n-   游标代表一个数据库游标，用于管理获取操作的上下文。\n-   从同一连接创建的游标不是隔离的，即，一个游标对数据库所做的任何更改都会立即对其他游标可见。\n\
    \n| 方法 | 含义 |\n|--------|---------|\n| close() | 关闭游标。 |\n| execute(operation\
    \ [, parameters]) | 准备并执行一个数据库操作。 |\n| executemany(operation, seq_of_parameters)\
    \ | 准备一个数据库操作（查询或命令），然后对 `seq_of_parameters` 序列中找到的所有参数序列或映射执行该操作。 |\n| fetchone()\
    \ | 获取查询结果集的下一行，返回一个单独的序列，或者在没有更多数据可用时返回 None。 |\n| fetchmany([size=cursor.arraysize])\
    \ | 获取查询结果的下一批行，返回一个序列的序列（例如，元组列表）。当没有更多行可用时，返回一个空序列。 |\n| fetchall() | 获取查询结果的所有（剩余）行，将它们作为序列的序列返回（例如，元组列表）。请注意，游标的\
    \ `arraysize` 属性可能会影响此操作的性能。 |\n\n| 属性 | 含义 |\n| --- | --- |\n| rowcount | 此只读属性指定最后一次\
    \ `execute()` 方法检索或影响的行数。 |\n| lastrowid | 只读属性，提供最后修改行的 rowid。 |\n| arraysize\
    \ | 读/写属性，控制 `fetchmany()` 返回的行数。默认值为 1，这意味着每次调用将获取单行。 |\n| connection | 此只读属性提供\
    \ Cursor 对象使用的 SQLite 数据库连接。 |\n\n**注意：** 使用 SQLite Studio（一个免费的 GUI 工具）来管理 SQLite\
    \ 数据库。可以从 [https://sqlitestudio.pl/index.rvt](https://sqlitestudio.pl/index.rvt)\
    \ 下载它。\n\n以下程序展示了如何连接到数据库并关闭连接。\n\n```\npython\n01 import sqlite3\n02 con = sqlite3.connect(\"\
    test.db\")\n03 print(\"Connected to test database!\")\n04 con.close()\n```\n\n\
    在 **test.db** 数据库中创建以下表：\n\n```\nsql\ncreate table expenses\n(\n    id integer\
    \ primary key autoincrement,\n    description text (30),\n    amount real\n)\n\
    ```\n\n## 向表中插入行\n\n以下程序展示了如何从用户获取数据，并将其插入到 `EXPENSES` 表中。\n\n```\n01 import sqlite3\n\
    02 con = sqlite3.connect(\"test.db\")\n03 cur = con.cursor()\n04 \n05 # insert\
    \ a row into EXPENSES table\n06 try:\n07     # take data from user\n08     des\
    \ = input(\"Enter Description :\")\n09     amt = input(\"Enter Amount      :\"\
    )\n10     row = (des, amt)\n11     cur.execute(\n12     \"insert into expenses(description,amount)values(?,?)\"\
    \n13     , row)\n14     con.commit()\n15     print(\"Added successfully!\")\n\
    16 except Exception as ex:\n17     print(\"Sorry! Error: \", ex)\n18 finally:\n\
    19     con.close()\n```\n\n## 从表中检索行\n\n以下程序展示了如何列出 `EXPENSES` 表中的所有行。\n\n```\n\
    python\n01 import sqlite3\n02 \n03 con = sqlite3.connect(\"test.db\")\n04 cur\
    \ = con.cursor()\n05 \n06 # List rows from EXPENSES table\n07 try:\n08     cur.execute(\"\
    select * from expenses order by id\")\n09     for row in cur.fetchall():\n10 \
    \        print(f\"{row[0]:3d} {row[1]:30s} {row[2]:10.2f}\")\n11 \n12     cur.close()\n\
    13 except Exception as ex:\n14     print(\"Error : \", ex)\n15 finally:\n16  \
    \   con.close()\n```\n\n## 更新表中的行\n\n以下程序更新了 `EXPENSES` 表中的一个现有行。\n\n```\npython\n\
    import sqlite3\n\ncon = sqlite3.connect(r\"c:\\dev\\python\\test.db\")\ncur =\
    \ con.cursor()\n\n# Update EXPENSES table\ntry:\n    # take data from user\n \
    \   id = input(\"Enter Id       :\")\n    amount = input(\"Enter Amount :\")\n\
    \    cur.execute\n    (\"update expenses set amount=? where id = ?\",\n     (amount,\
    \ id))\n    if cur.rowcount == 1:\n        con.commit()\n        print(\"Updated\
    \ successfully!\")\n    else:\n        print('Sorry! Id not found!')\nexcept Exception\
    \ as ex:\n    print(\"Sorry! Error: \", ex)\nfinally:\n    con.close()\n```\n\n\
    ## 从表中删除行\n\n以下程序删除了 `EXPENSES` 表中的一个现有行。\n\n```\npython\nimport sqlite3\n\ncon\
    \ = sqlite3.connect(\"test.db\")\ncur = con.cursor()\n\n# Delete row from EXPENSES\
    \ table\ntry:\n    # take data from user\n    id = input(\"Enter Id    :\")\n\
    \    cur.execute\n         (\"delete from expenses where id = ?\", (id, ))\n \
    \   if cur.rowcount == 1:\n        con.commit()\n        print(\"Deleted successfully!\"\
    )\n    else:\n        print('Sorry! Id not found!')\nexcept Exception as ex:\n\
    \    print(\"Sorry! Error: \", ex)\nfinally:\n    con.close()\n```\n\n## 处理其他数据库\n\
    \n以下是我的博客，关于如何从 Python 访问其他数据库系统。\n\n### 从 Python 访问 Oracle\n\n[http://www.srikanthtechnologies.com/blog/python/using_cx_oracle.aspx](http://www.srikanthtechnologies.com/blog/python/using_cx_oracle.aspx)\n\
    \n### 从 Python 访问 MySQL\n\n[http://www.srikanthtechnologies.com/blog/python/using_mysql.aspx](http://www.srikanthtechnologies.com/blog/python/using_mysql.aspx)"
