  md: '# BUILT-IN FUNCTIONS


    The following are built-in functions in Python.


    | Function | Meaning |

    |---|---|

    | abs(x) | Returns the absolute value of a number. |

    | all(iterable) | Returns True if all elements of the iterable are true (or if
    the iterable is empty). |

    | any(iterable) | Returns True if any element of the iterable is true. If the
    iterable is empty, returns False. |

    | bin(x) | Converts an integer number to a binary string prefixed with “0b”. |

    | chr(i) | Returns the string representing a character whose Unicode code point
    is the integer i. |

    | dir([object]) | Without arguments, returns the list of names in the current
    local scope. With an argument, attempts to return a list of valid attributes for
    that object. |

    | filter(function, iterable) | Constructs an iterator from those elements of iterable
    for which function returns true. |

    | format(value[, format_spec]) | Converts a value to a “formatted” representation,
    as controlled by format_spec. |

    | getattr(object, name[, default]) | Returns the value of the named attribute
    of object. |

    | hex(x) | Converts an integer number to a lowercase hexadecimal string prefixed
    with “0x”. |

    | id(object) | Returns the “identity” of an object. This is an integer which is
    guaranteed to be unique and constant for this object during its lifetime. |

    | len(s) | Returns the length (the number of items) of an object. |'
