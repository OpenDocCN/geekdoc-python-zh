    \ last modified row. |\n| arraysize | Read/write attribute that controls the number\
    \ of rows returned by fetchmany(). The default value is 1, which means a single\
    \ row would be fetched per call. |\n| connection | This read-only attribute provides\
    \ the SQLite database Connection used by the Cursor object. |\n\n**NOTE:** Use\
