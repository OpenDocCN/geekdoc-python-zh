  - "[PAGE 101]\n\n# # MULTIPLE INHERITANCE\n\nPython supports a form of multiple\
    \ inheritance as well. A class definition with multiple super classes is as follows:\n\
    \n```\npython\nclass SubClassName(superclass1,superclass2,...):\n    ...\n\n```\n\
    \nPython searches for attributes in Subclass first. If not found it searches in\
    \ superclass1, then (recursively) in the super classes of superclass1, and if\
    \ it was not found there, it searches in superclass2, and so on.\n\nIn the following\
    \ example, as method process() is not found in class C, Python calls process()\
    \ method in class A as it is the first superclass.\n\n```\npython\nclass A:\n\
    \    def process(self):\n        print('A process()')\n\nclass B:\n    def process(self):\n\
    \        print('B process()')\n\nclass C(A, B):\n    pass\n\nobj = C()\nobj.process()\
    \  # will call process() of A\n\n```"
- md: "Python always considers subclass version, if one is present. In the following\
    \ example, process() from class C is called because Python considers subclass\
    \ version ahead of superclass version. So, it will not consider process() method\
    \ in A as class A is superclass of C and method is present in class C.\n\n```python\n\
    class A:\n    def process(self):\n        print('A process()')\n\n\nclass B(A):\n\
    \    pass\n\n\nclass C(A):\n    def process(self):\n        print('C process()')\n\
    \n\nclass D(B, C):\n    pass\n\n\nobj = D()\nobj.process()     # Calls method\
    \ from class C\n```\n\n## Method Resolution Order (MRO)\n\nMRO is the order in\
    \ which Python searches for a method in the hierarchy of classes.\n\nFor the above\
    \ example, calling method mro() on class D will return the following:\n\n```\n\
    [<class '__main__.D'>, <class '__main__.B'>, <class '__main__.C'>, <class '__main__.A'>,\
