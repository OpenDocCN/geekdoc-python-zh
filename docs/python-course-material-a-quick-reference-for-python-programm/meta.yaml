    \ members (Name Mangling)\n\n+   - Python doesn't have private variables concept.\n\
    - However, a convention followed by most Python programmers is, an attribute prefixed\
    \ with a single underscore (_attribute) or double underscore (__attribute) should\
    \ be treated as non-public (protected and private respectively) part of the API.\n\
    - Any identifier of the form __attribute (two leading underscores) is textually\
    \ replaced with _classname__attribute, where classname is the current class name.\
    \ This process is called as name mangling.\n- For example, __salary in Employee\
    \ class becomes _Employee__salary.\n- However, it is still possible to access\
    \ or modify a variable that is considered private from outside the class.\n\n\
    | Name    | Notation | Behaviour |\n|---------|----------|-----------|\n| name\
    \    | Public   | Can be accessed from inside and outside. |\n| _name   | Protected\
    \ | Like a public member, but they shouldn't be directly accessed from outside.\
    \ |\n| __name  | Private  | Can't be seen and accessed from outside. |"
