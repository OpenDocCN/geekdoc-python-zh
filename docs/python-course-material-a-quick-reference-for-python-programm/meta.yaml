  md: "# VARIABLE'S SCOPE\n\n+   - Variables that are defined outside all functions\
    \ in a module are called global variables and can be accessed from anywhere in\
    \ the module.\n- Variables created inside a function can be used only inside the\
    \ function.\n- Keyword **global** is used to access a global variable from a function\
    \ so that Python doesn't create a local variable with the same name when you assign\
    \ a value to a variable.\n- Python looks in the order – local, enclosing, global\
    \ and built-in (LEGB) variables.\n\n```\n01 sum = 0   # Global variable\n02 def\
    \ add_square(value):\n03     square = value * value # Square is local variable\n\
