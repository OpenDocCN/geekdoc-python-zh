    \ # 从 -2 到 -5 反向取字符\n'oht'\n```\n\n| 方法 | 描述 |\n| :--- | :--- |\n| capitalize()\
    \ | 返回字符串的副本，其首字符大写，其余字符小写。 |\n| count(sub[, start[, end]]) | 返回子字符串 `sub` 在范围\
