    \ An iterator is created for the result of the expression_list. The set of statements\
    \ is then executed once for each item provided by the iterator, in the order returned\
    \ by the iterator.\n\nWhen the items are exhausted (which is immediately when\
    \ the sequence is empty or an iterator raises a StopIteration exception), the\
    \ statements in the else clause, if present, are executed, and the loop terminates.\n\
    \n```python\n# Print numbers from 1 to 10 across\nfor n in range(1, 11):\n   \
    \ print(n, end = ' ')\n```\n\n```python\n# program to take a number and display\
    \ its factorial\nnum = int(input(\"Enter a number :\"))\nfact = 1\nfor i in range(2,\
    \ num + 1):\n    fact *= i\nprint(f\"Factorial of {num} is {fact}\")\n```\n\n\
    ## BREAK, CONTINUE AND ELSE\n\n- The **break** statement, like in C, breaks out\
    \ of the innermost enclosing **for** or **while** loop.\n- Loop statements may\
    \ have an **else** clause; it is executed when the loop terminates through exhaustion\
    \ of the list (with for) or when the condition becomes false (with while), but\
    \ not when the loop is terminated by a **break** statement.\n- The **continue**\
    \ statement, also borrowed from C, continues with the next iteration of the loop.\n\
    \n![](img/6dd1124ad0340c1e75e84cf487013a5c_34_0.png)\n\n```python\n# Check whether\
