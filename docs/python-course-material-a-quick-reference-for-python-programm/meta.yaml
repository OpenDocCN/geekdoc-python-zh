    \ ?? \", issubclass(Manager, Employee)) # True\n```\n\n# 多重继承\n\nPython 也支持一种多重继承形式。具有多个超类的类定义如下：\n\
    \n```python\nclass SubClassName(superclass1,superclass2,...):\n    ...\n```\n\n\
    Python 首先在子类中搜索属性。如果未找到，则在 superclass1 中搜索，然后（递归地）在 superclass1 的超类中搜索，如果在那里也未找到，则在\
    \ superclass2 中搜索，依此类推。\n\n在以下示例中，由于在类 C 中未找到方法 process()，Python 调用类 A 中的 process()\
    \ 方法，因为它是第一个超类。\n\n```python\nclass A:\n    def process(self):\n        print('A\
    \ process()')\n\nclass B:\n    def process(self):\n        print('B process()')\n\
    \nclass C(A, B):\n    pass\n\nobj = C()\nobj.process()  # will call process()\
    \ of A\n```"
