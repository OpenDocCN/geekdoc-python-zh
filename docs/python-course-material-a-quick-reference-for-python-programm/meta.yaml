  md: '# # Cursor Object


    +   - Cursor represents a database cursor, which is used to manage the context
    of a fetch operation.

    - Cursors created from the same connection are not isolated, i.e., any changes
    done to the database by a cursor are immediately visible to other cursors.


    | Method | Meaning |

    |--------|---------|

    | close() | Closes cursor. |

    | execute(operation [, parameters]) | Prepare and execute a database operation.
    |

    | Executemany (operation, seq_of_parameters) | Prepare a database operation (query
    or command) and then execute it against all parameter sequences or mappings found
    in the sequence seq_of_parameters. |

    | fetchone() | Fetch the next row of a query result set, returning a single sequence,
    or None when no more data is available. |

    | fetchmany ([size=cursor.arraysize]) | Fetch the next set of rows of a query
    result, returning a sequence of sequences (e.g. a list of tuples). An empty sequence
    is returned when no more rows are available. |

    | fetchall() | Fetch all (remaining) rows of a query result, returning them as
    a sequence of sequences (e.g. a list of tuples). Note that the cursor''s arraysize
    attribute can affect the performance of this operation. |'
