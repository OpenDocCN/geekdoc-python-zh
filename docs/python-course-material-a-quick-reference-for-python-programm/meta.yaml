    # Match Object


    Match object is returned by match() and search() and fullmatch() functions of
    re module.


    | Function | Meaning |

    | :--- | :--- |

    | group ([group1, ...]) | Returns one or more subgroups of the match. If there
    is a single argument, the result is a single string; if there are multiple arguments,
    the result is a tuple with one item per argument. Without arguments, group1 defaults
    to zero (the whole match is returned). If the regular expression uses the (?P<name>...)
    syntax, the groupN arguments may also be strings identifying groups by their group
    name. |

    | groups() | Returns a tuple containing all the subgroups of the match, from 1
    up to however many groups are in the pattern. The default argument is used for
    groups that did not participate in the match; it defaults to None. |

    | groupdict (default=None) | Returns a dictionary containing all the named subgroups
    of the match, keyed by the subgroup name. |

    | start([group]), end([group]) | Returns the indices of the start and end of the
    substring matched by group. |

    | span([group]) | For a match m, returns the 2-tuple (m.start(group), m.end(group)).
    |

    | pos | Returns the value of pos which was passed to the search() or match() method
    of a regex object. |

    | endpos | Returns the value of endpos which was passed to the search() or match()
    method of a regex object. |

    | lastindex | Returns the integer index of the last matched capturing group, or
    None if no group was matched at all. |'
- md: "# THE DATETIME MODULE\n\n- The datetime module supplies classes for manipulating\
    \ dates and times in both simple and complex ways.\n- Provides classes like **date**,\
    \ **time**, **datetime** and **timedelta**.\n- A timedelta object represents a\
    \ duration, the difference between two dates or times.\n- Modules **calendar**\
    \ and **time** provide additional functionality related to dates and times.\n\
    - Type **date** contains year, month and day.\n- Type **time** contains hour,\
    \ minute, second and microsecond.\n- Type **datetime** is a composite of date\
    \ and time.\n- Type **timedelta** contains days, seconds, microseconds.\n- They\
    \ are all immutable.\n\n| lastgroup | Returns the name of the last matched capturing\
    \ group, or None if the group didn’t have a name or if no group was matched at\
    \ all. |\n| re | Returns the regular expression object whose match() or search()\
    \ method produced this match instance. |\n| string | Returns the string passed\
    \ to match() or search(). |\n\nThe following example uses grouping concept to\
    \ extract name and phone number from the given string.\n\n```\npython\n>>> st\
    \ = \"Srikanth Pragada 9059057000\"\n>>> m = re.fullmatch(r'([A-Za-z ]+)(\\d+)',st)\n\
    >>> m.group(1)\n'Srikanth Pragada '\n>>> m.group(2)\n'9059057000'\n>>> m.span(2)\n\
    (17, 27)\n>>> m.groups()\n('Srikanth Pragada ', '9059057000')\n```\n\n### The\
    \ date type\n\nA date object represents a date (year, month and day).\n\n```\n\
    python\ndatetime.date(year, month, day)\n```\n\nAll arguments are required. Arguments\
    \ are integers, in the following ranges:\n\n- MINYEAR <= year <= MAXYEAR\n- 1\
    \ <= month <= 12\n- 1 <= day <= number of days in the given month and year\n\n\
    The class method **today()** returns the current local date.\n\nClass attributes\
    \ **date.min** and **date.max** contain the earliest and latest representable\
    \ dates - date(MINYEAR, 1, 1) and date(MAXYEAR, 12, 31).\n\n| Operation | Result\
    \ |\n| --- | --- |\n| date1 + timedelta | Adds timedelta.days to date1. |\n| date1\
    \ - timedelta | Subtracts timedelta.days from date1. |\n| date1 - date2 | Subtracts\
    \ date2 from date1 and returns timedelta to represent period between dates. |\n\
    | date1 < date2 | Returns true if date1 is less than date2. |\n\n| Attribute |\
    \ Meaning |\n| --- | --- |\n| year | Between MINYEAR and MAXYEAR inclusive. |\n\
    | month | Between 1 and 12 inclusive. |\n| day | Between 1 and the number of days\
    \ in the given month of the given year. |\n\n| Instance Method | Meaning |\n|\
    \ --- | --- |\n| replace (year, month, day) | Returns a date with the same value,\
    \ except for those parameters given new values by whichever keyword arguments\
    \ are specified. |\n| weekday() | Returns the day of the week as an integer, where\
    \ Monday is 0 and Sunday is 6. |\n| isoweekday() | Returns the day of the week\
    \ as an integer, where Monday is 1 and Sunday is 7. |\n| isocalendar() | Returns\
    \ a 3-tuple, (ISO year, ISO week number, ISO weekday). |\n| isoformat() | Returns\
    \ a string representing the date in ISO 8601 format, 'YYYY-MM-DD'. |\n| ctime()\
    \ | Returns a string representing the date. |\n| strftime(format) | Returns a\
    \ string representing the date, controlled by an explicit format string. |\n\n\
    ### The time type\n\nA time object represents (local) time of day.\n\n```\npython\n\
    datetime.time(hour=0, minute=0, second=0, microsecond=0)\n```\n\n| Attribute |\
    \ Meaning |\n|---|---|\n| hour | Hours between 0 to 23 |\n| minute | Minutes between\
    \ 0 to 59 |\n| second | Seconds between 0 to 59 |\n| microsecond | Microseconds\
    \ between 0 and 999999 |\n\n| Instance Method | Meaning |\n|---|---|\n| replace(hour,\
    \ minute, second, microsecond) | Returns a time with the same value, except for\
    \ those attributes given new values by whichever keyword arguments are specified.\
    \ |\n| isoformat (timespec='auto') | Returns a string representing the time in\
    \ ISO 8601 format, HH:MM:SS.mmmmmm or, if microsecond is 0, HH:MM:SS. |\n| strftime(format)\
    \ | Returns a string representing the time, controlled by an explicit format string.\
    \ |\n\n### The datetime type\n\nA datetime object represents both date and time.\n\
    \n```\npython\ndatetime.datetime (year, month, day, hour=0, minute=0, second=0,\
    \ microsecond=0, tzinfo=None, *, fold=0)\n```\n\n| Class Method | Meaning |\n\
    | :--- | :--- |\n| today() | Returns the current local datetime, with tzinfo None.\
    \ |\n| now() | Returns the current local date and time. |\n| utcnow() | Returns\
    \ the current UTC date and time |\n| combine (date, time) | Returns a new datetime\
    \ object combining date and time. |\n| strptime (date_string, format) | Returns\
    \ a datetime corresponding to date_string, parsed according to format. |\n\n|\
    \ Attribute | Meaning |\n| :--- | :--- |\n| year | Between MINYEAR and MAXYEAR\
    \ inclusive. |\n| month | Between 1 and 12 inclusive. |\n| day | Between 1 and\
    \ the number of days in the given month of the given year. |\n| hour | In range(24).\
    \ |\n| minute | In range(60). |\n| second | In range(60). |\n| microsecond | In\
    \ range(1000000). |\n\n| Instance Method | Meaning |\n|---|---|\n| date() | Returns\
    \ date object with same year, month and day. |\n| time() | Returns time object\
    \ with same hour, minute, second, microsecond and fold. |\n| replace(year, month,\
    \ day, hour, minute, second, microsecond) | Returns a datetime with the same attributes,\
    \ except for those attributes given new values by whichever keyword arguments\
    \ are specified. |\n| weekday() | Returns the day of the week as an integer, where\
    \ Monday is 0 and Sunday is 6. The same as self.date().weekday(). See also isoweekday().\
    \ |\n| isoweekday() | Returns the day of the week as an integer, where Monday\
    \ is 1 and Sunday is 7. |\n| isocalendar() | Returns a named tuple with three\
    \ components - year, week and weekday. |\n| isoformat() | Returns a string representing\
    \ the date and time in ISO 8601 format |\n| ctime() | Returns a string representing\
    \ the date and time. |\n| strftime(format) | Returns a string representing the\
    \ date and time, controlled by an explicit format string. |\n\n# The timedelta\
    \ type\n\nA timedelta object represents a duration, the difference between two\
    \ dates or times.\n\n```\ntimedelta(days=0, seconds=0, microseconds=0,\n     \
    \     milliseconds=0, minutes=0, hours=0, weeks=0)\n```\n\nOnly *days*, *seconds*\
    \ and *microseconds* are stored internally. Arguments are converted to those units:\n\
    \n- A millisecond is converted to 1000 microseconds\n- A minute is converted to\
    \ 60 seconds\n- An hour is converted to 3600 seconds\n- A week is converted to\
    \ 7 days\n\nThe following are instance attributes of timedelta type:\n\n| Attribute\
    \ | Value |\n|---|---|\n| days | Between -999999999 and 999999999 inclusive |\n\
    | seconds | Between 0 and 86399 inclusive |\n| microseconds | Between 0 and 999999\
    \ inclusive |\n\n### Format Codes\n\nThe following are format codes used in strftime()\
    \ and strptime() functions.\n\n| Directive | Meaning | Example |\n| :--- | :---\
    \ | :--- |\n| %a | Weekday as locale's abbreviated name. | Sun, Mon, ..., Sat\
    \ |\n| %w | Weekday as a decimal number, where 0 is Sunday and 6 is Saturday.\
    \ | 0, 1, ..., 6 |\n| %d | Day of the month as a zero-padded decimal number. |\
    \ 01, 02, ..., 31 |\n| %b | Month as locale's abbreviated name. | Jan, Feb, ...,\
    \ Dec |\n| %m | Month as a zero-padded decimal number. | 01, 02, ..., 12 |\n|\
    \ %y | Year without century as a zero-padded decimal number. | 00, 01, ..., 99\
    \ |\n| %Y | Year with century as a decimal number. | 2018 |\n| %H | Hour (24-hour\
    \ clock) as a zero-padded decimal number. | 00, 01, ..., 23 |\n| %l | Hour (12-hour\
    \ clock) as a zero-padded decimal number. | 01, 02, ..., 12 |\n| %p | Locale's\
    \ equivalent of either AM or PM. | AM, PM |\n| %M | Minute as a zero-padded decimal\
    \ number. | 00, 01, ..., 59 |\n| %S | Second as a zero-padded decimal number.\
    \ | 00, 01, ..., 59 |\n| %j | Day of the year as a zero-padded decimal number.\
    \ | 001, 002, ..., 366 |\n| %c | Locale's appropriate date and time representation.\
    \ | Tue Aug 16 21:30:00 1988 (en_US) |\n\n```\n>>> from datetime import *\n>>>\
    \ date.today()\ndatetime.date(2022, 4, 29)\n>>> dob = date(1998, 10, 24)\n>>>\
    \ cd = date.today()\n>>> cd - dob\ndatetime.timedelta(days=8588)\n>>> cd + timedelta(days=10)\n\
    datetime.date(2022, 5, 9)\n```\n\n```\n# Convert string to datetime\n>>> datetime.strptime(\"\
    24-oct-1998\", \"%d-%b-%Y\")\ndatetime.datetime(1998, 10, 24, 0, 0)\n```\n\n```\n\
    >>> cd = datetime.now()\n>>> cd.strftime(\"%d-%m-%Y %H:%M:%S\")\n'29-04-2022 11:03:07'\n\
    ```"
  mdcn: "# DATETIME 模块\n\n-   datetime 模块提供了用于以简单和复杂方式处理日期和时间的类。\n-   提供了诸如 **date**、**time**、**datetime**\
    \ 和 **timedelta** 等类。\n-   一个 timedelta 对象表示一个持续时间，即两个日期或时间之间的差异。\n-   **calendar**\
    \ 和 **time** 模块提供了与日期和时间相关的其他功能。\n-   **date** 类型包含年、月和日。\n-   **time** 类型包含小时、分钟、秒和微秒。\n\
    -   **datetime** 类型是 date 和 time 的组合。\n-   **timedelta** 类型包含天、秒、微秒。\n-   它们都是不可变的。\n\
    \n| lastgroup | 返回最后一个匹配的捕获组的名称，如果该组没有名称或根本没有匹配任何组，则返回 None。 |\n| re | 返回其 match()\
    \ 或 search() 方法生成此匹配实例的正则表达式对象。 |\n| string | 返回传递给 match() 或 search() 的字符串。 |\n\
    \n以下示例使用分组概念从给定字符串中提取姓名和电话号码。\n\n```\npython\n>>> st = \"Srikanth Pragada 9059057000\"\
    \n>>> m = re.fullmatch(r'([A-Za-z ]+)(\\d+)',st)\n>>> m.group(1)\n'Srikanth Pragada\
    \ '\n>>> m.group(2)\n'9059057000'\n>>> m.span(2)\n(17, 27)\n>>> m.groups()\n('Srikanth\
    \ Pragada ', '9059057000')\n```\n\n### date 类型\n\n一个 date 对象表示一个日期（年、月、日）。\n\n\
    ```\npython\ndatetime.date(year, month, day)\n```\n\n所有参数都是必需的。参数是整数，在以下范围内：\n\
    \n-   MINYEAR <= year <= MAXYEAR\n-   1 <= month <= 12\n-   1 <= day <= 给定月份和年份的天数\n\
    \n类方法 **today()** 返回当前的本地日期。\n\n类属性 **date.min** 和 **date.max** 包含最早和最晚的可表示日期\
    \ - date(MINYEAR, 1, 1) 和 date(MAXYEAR, 12, 31)。\n\n| 操作 | 结果 |\n| --- | --- |\n\
    | date1 + timedelta | 将 timedelta.days 加到 date1 上。 |\n| date1 - timedelta | 从\
    \ date1 中减去 timedelta.days。 |\n| date1 - date2 | 从 date1 中减去 date2 并返回 timedelta\
    \ 以表示日期之间的间隔。 |\n| date1 < date2 | 如果 date1 小于 date2，则返回 true。 |\n\n| 属性 | 含义\
    \ |\n| --- | --- |\n| year | 在 MINYEAR 和 MAXYEAR 之间（含）。 |\n| month | 在 1 和 12\
    \ 之间（含）。 |\n| day | 在 1 和给定年份给定月份的天数之间。 |\n\n| 实例方法 | 含义 |\n| --- | --- |\n| replace\
    \ (year, month, day) | 返回一个具有相同值的日期，但由关键字参数指定的参数除外。 |\n| weekday() | 返回星期几的整数，其中\
    \ Monday 为 0，Sunday 为 6。 |\n| isoweekday() | 返回星期几的整数，其中 Monday 为 1，Sunday 为 7。\
    \ |\n| isocalendar() | 返回一个 3 元组：(ISO 年, ISO 周数, ISO 星期几)。 |\n| isoformat() |\
    \ 返回一个表示 ISO 8601 格式日期的字符串，格式为 'YYYY-MM-DD'。 |\n| ctime() | 返回一个表示日期的字符串。 |\n\
    | strftime(format) | 返回一个表示日期的字符串，由显式格式字符串控制。 |\n\n### time 类型\n\n一个 time 对象表示（本地）一天中的时间。\n\
    \n```\npython\ndatetime.time(hour=0, minute=0, second=0, microsecond=0)\n```\n\
