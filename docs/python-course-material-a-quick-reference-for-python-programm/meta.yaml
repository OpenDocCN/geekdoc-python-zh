    \ 44]\n02 \n03 # with lambda, get all odd numbers\n04 for n in filter (lambda\
    \ v: v % 2 == 1, nums):\n05     print(n)\n```\n\nThe following example sorts all\
    \ names by stripping all whitespaces and then converting them to lowercase (for\
