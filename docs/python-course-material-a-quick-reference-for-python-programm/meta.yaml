    # # KEYWORD ARGUMENTS


    +   - A function can be defined to take arbitrary sequence of keyword arguments
    by defining a parameter with ** as prefix.

    - Function treats this parameter as a dictionary and provides all keyword arguments
    as keys in dictionary.

    - A function can be called with keyword arguments using kwarg=value, where kwarg
    is keyword and value is value.

    - In a function call, keyword arguments must follow positional arguments, if any
    are present.


    ```

    python

    01 def show(**kwargs):

    02     for k, v in kwargs.items():

    03         print(k, v)

    04

    05 def showall(*args, **kwargs):

    06     print(args)

    07     for k, v in kwargs.items():

    08         print(k, v)

    09

    10 show(a=10, b=20, c=20, msg="Hello")

    11 showall(10, 20, 30, x=1, y=20)


    ```


    The above program will display:


    ```


    a 10

    b 20

    c 20

    msg Hello

    (10, 20, 30)

    x 1

    y 20


    ```'
