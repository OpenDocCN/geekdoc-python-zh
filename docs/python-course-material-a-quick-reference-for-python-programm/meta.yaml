    # INHERITANCE


    +   - When a new class is created from an existing class, it is called as inheritance.
    It enables us to reuse existing classes while creating new classes.

    - A new class can be created from *one or more* existing classes.

    - If a requested attribute is not found in the class, the search proceeds to look
    in the base class. This rule is applied recursively if the base class itself is
    derived from some other class.

    - New class is called **subclass** and the class being inherited is called **superclass**.

    - Subclass can **override** a method of superclass to enhance or change functionality
    of superclass method.

    - Function **super()** is used to access superclass from subclass.

    - It is possible to call methods of superclass using super() function – *super().methodname(arguments)*.

    - It is also possible to call superclass method directly - *superclassname.methodname(self,
    arguments)*. We must send self as first argument.

    - Inheritance is also known as *generalization* as we start with most generic
    class (superclass) and create more specific classes (subclasses) later.


    ![](img/6dd1124ad0340c1e75e84cf487013a5c_97_0.png)'
