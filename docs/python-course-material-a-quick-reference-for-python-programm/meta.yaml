  - "[PAGE 74]\n\n# THE IMPORT STATEMENT\n\n+   - In order to make use of classes\
    \ and functions in a module, we must first import module using **import** statement.\n\
    - The system maintains a table of modules that have been initialized, indexed\
    \ by module name. This table is accessible as **sys.modules**.\n- If no matching\
    \ file is found, **ImportError** is raised. If a file is found, it is parsed,\
    \ yielding an executable code block. If a syntax error occurs, **SyntaxError**\
    \ is raised.\n- Whenever module is imported, code in module (not classes and functions)\
    \ is executed.\n\n```\nimport module [as name] (, module [as name])*\nfrom module\
    \ import identifier [as name]\n                (, identifier [as name])*\nfrom\
    \ module import *\n```\n\nThe following are examples of import statement:\n\n\
    ```\n01 # import num_funs and refer to it by alias nf\n02 import num_funs as nf\n\
    03\n04 print(nf.is_even(10))\n```\n\n```\n01 # import all definitions of module\
    \ num_funs\n02 from num_funs import *\n03\n04 print(is_even(10))\n```\n\n```\n\
    01 # import specific function from num_funs module\n02 from num_funs import is_even,\
    \ is_odd\n03\n04 print(is_odd(10))\n```"
