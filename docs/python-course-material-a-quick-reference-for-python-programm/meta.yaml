    \ abstract.\n- A class that is to be abstract must extend class **ABC** (Abstract\
    \ Base Class) of abc module.\n- No instances of abstract class can be created.\n\
    \n```python\nfrom abc import ABC, abstractmethod\nclass Student(ABC):\n    @abstractmethod\n\
    \    def getsubject(self):\n        pass\n\nclass PythonStudent(Student):\n  \
