  mdcn: "Python 总是优先考虑子类版本（如果存在的话）。在下面的例子中，会调用类 C 中的 `process()` 方法，因为 Python 会优先考虑子类版本而非父类版本。因此，它不会考虑类\
    \ A 中的 `process()` 方法，因为类 A 是类 C 的父类，并且该方法在类 C 中已经存在。\n\n```python\nclass A:\n\
    \    def process(self):\n        print('A process()')\n\n\nclass B(A):\n    pass\n\
    \n\nclass C(A):\n    def process(self):\n        print('C process()')\n\n\nclass\
    \ D(B, C):\n    pass\n\n\nobj = D()\nobj.process()     # 调用类 C 中的方法\n```\n\n##\
    \ 方法解析顺序（MRO）\n\nMRO 是 Python 在类层次结构中搜索方法的顺序。\n\n对于上面的例子，在类 D 上调用 `mro()` 方法将返回以下结果：\n\
    \n```\n[<class '__main__.D'>, <class '__main__.B'>, <class '__main__.C'>, <class\
    \ '__main__.A'>, <class 'object'>]\n```\n\n请参考以下关于此主题的额外资源：\n\n- 我的博客：http://www.srikanthtechnologies.com/blog/python/mro.aspx\n\
    - 我的视频教程：https://youtu.be/tViLEZXUO3U\n\n## 抽象类和方法\n\n- 模块 **abc** 提供了对抽象类和方法的支持。\n\
