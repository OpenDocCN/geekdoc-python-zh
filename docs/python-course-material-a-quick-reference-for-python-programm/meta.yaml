- md: "# SPECIAL METHODS\n\n- Python allows us to overload different operators and\
    \ operations related to our class by implementing special methods.\n- Objects\
    \ related to operation are passed as parameters to function.\n\n## Relational\
    \ operators\n\nThe following special methods represent relational operators. By\
    \ implementing these methods, we provide support for those operators in our user-defined\
    \ class.\n\n| Operator | Method |\n| --- | --- |\n| < | object.__lt__(self, other)\
    \ |\n| <= | object.__le__(self, other) |\n| == | object.__eq__(self, other) |\n\
    | != | object.__ne__(self, other) |\n| >= | object.__ge__(self, other) |\n| >\
    \ | object.__gt__(self, other) |\n\n## Unary operators\n\nThe following are special\
    \ methods for unary operators.\n\n| Operator | Method |\n| --- | --- |\n| - |\
    \ object.__neg__(self) |\n| + | object.__pos__(self) |\n| abs() | object.__abs__(self)\
    \ |\n| ~ | object.__invert__(self) |\n| complex() | object.__complex__(self) |\n\
    | int() | object.__int__(self) |\n| float() | object.__float__(self) |\n| oct()\
    \ | object.__oct__(self) |\n| hex() | object.__hex__(self) |\n\n## Binary operators\n\
    \nThe following are special methods related to binary operators.\n\n| Operator\
    \ | Method |\n| --- | --- |\n| + | object.__add__(self, other) |\n| - | object.__sub__(self,\
    \ other) |\n| * | object.__mul__(self, other) |\n| // | object.__floordiv__(self,\
    \ other) |\n| / | object.__truediv__(self, other) |\n| % | object.__mod__(self,\
    \ other) |\n| ** | object.__pow__(self, other[, modulo]) |\n| << | object.__lshift__(self,\
    \ other) |\n| >> | object.__rshift__(self, other) |\n| & | object.__and__(self,\
    \ other) |\n| ^ | object.__xor__(self, other) |\n| \\| | object.__or__(self, other)\
    \ |\n\n## Extended assignments\n\nHere are special methods related to extended\
    \ operators.\n\n| Operator | Method |\n| --- | --- |\n| += | object.__iadd__(self,\
    \ other) |\n| -= | object.__isub__(self, other) |\n| *= | object.__imul__(self,\
    \ other) |\n| /= | object.__idiv__(self, other) |\n| //= | object.__ifloordiv__(self,\
    \ other) |\n| %= | object.__imod__(self, other) |\n| **= | object.__ipow__(self,\
    \ other[, modulo]) |\n| <<= | object.__ilshift__(self, other) |\n| >>= | object.__irshift__(self,\
    \ other) |\n| &= | object.__iand__(self, other) |\n| ^= | object.__ixor__(self,\
    \ other) |\n| \\|= | object.__ior__(self, other) |\n\nThe following program shows\
    \ how to implement special methods.\n\n```python\nclass Time:\n    def __init__(self,\
    \ h=0, m=0, s=0):\n        \"\"\" Initializes hours, mins and seconds \"\"\"\n\
    \        self.h = h\n        self.m = m\n        self.s = s\n\n    def total_seconds(self):\n\
    \        \"\"\"Returns total no. of seconds \"\"\"\n        return self.h * 3600\
    \ + self.m * 60 + self.s\n\n    def __eq__(self, other):\n        return self.total_seconds()\
    \ == \\\n                            other.total_seconds()\n\n    def __str__(self):\n\
    \        return f\"{self.h:02}:{self.m:02}:{self.s:02}\"\n\n    def __bool__(self):\n\
    \        \"\"\"Returns false if hours, mins and seconds\n            are 0 otherwise\
    \ true\n        \"\"\"\n        return self.h != 0 or self.m != 0 \\\n       \
    \                     or self.s != 0\n\n    def __gt__(self,other):\n        return\
    \ self.total_seconds() > \\\n                            other.total_seconds()\n\
    \n    def __add__(self, other):\n        return Time(self.h + other.h,\n     \
    \               self.m + other.m, self.s + other.s)\n\nt1 = Time(1, 20, 30)\n\
    t2 = Time(10, 20, 30)\nprint(t1)\nprint(t1 == t2)\n\nt3 = Time()    # h,m,s are\
    \ set to zeros\nif t3:\n    print(\"True\")\nelse:\n    print(\"False\")\n\nprint\
    \ (t1 < t2)\n\nt4 = t1 + t2\nprint(t4)\n```\n\n01:20:30\nFalse\nFalse\nTrue\n\
    11:40:60\n\n# PROPERTIES\n\n- It is possible to create a property in Python using\
    \ two decorators - @property and @setter.\n- A property is used like an attribute,\
    \ but it is internally implemented by two methods – one to get value (getter)\
    \ and one to set value (setter).\n- Properties provide advantages like validation,\
    \ abstraction and lazy loading.\n\n```python\nclass Person:\n    def __init__(self,\
    \ first='', last=''):\n        self.__first = first\n        self.__last = last\n\
    \n    @property   # Getter\n    def name(self):\n        return self.__first +\
    \ \" \" + self.__last\n\n    @name.setter   # Setter\n    def name(self, value):\n\
    \        self.__first, self.__last = value.split(\" \")\n\np = Person(\"Srikanth\"\
    , \"Pragada\")\nprint(p.name)   # Calls @property getter method\np.name=\"Pragada\
    \ Srikanth\" #Calls @name.setter method\n```\n\n# INHERITANCE\n\n- When a new\
    \ class is created from an existing class, it is called as inheritance. It enables\
    \ us to reuse existing classes while creating new classes.\n- A new class can\
    \ be created from *one or more* existing classes.\n- If a requested attribute\
    \ is not found in the class, the search proceeds to look in the base class. This\
    \ rule is applied recursively if the base class itself is derived from some other\
    \ class.\n- New class is called **subclass** and the class being inherited is\
    \ called **superclass**.\n- Subclass can **override** a method of superclass to\
    \ enhance or change functionality of superclass method.\n- Function **super()**\
    \ is used to access superclass from subclass.\n- It is possible to call methods\
    \ of superclass using super() function – *super().methodname(arguments)*.\n- It\
    \ is also possible to call superclass method directly - *superclassname.methodname(self,\
    \ arguments)*. We must send self as first argument.\n- Inheritance is also known\
    \ as *generalization* as we start with most generic class (superclass) and create\
    \ more specific classes (subclasses) later.\n\n![](img/6dd1124ad0340c1e75e84cf487013a5c_97_0.png)\n\
    \n```\nclass SubclassName (superclass [,superclass]...):\n    <statement-1>\n\
    \    ...\n    <statement-N>\n```\n\n> **NOTE:** Every class that is not a subclass\
    \ of another class is implicitly inheriting **object** class.\n\n![](img/6dd1124ad0340c1e75e84cf487013a5c_98_0.png)\n\
    \n```python\nclass Employee:\n    def __init__(self,name, salary):\n        self.__name\
    \ = name\n        self.__salary = salary\n    def print(self):\n        print(self.__name)\n\
    \        print(self.__salary)\n    def get_salary(self):\n        return self.__salary\n\
    ```\n\n```python\nclass Manager(Employee):\n    def __init__(self,name, salary,\
    \ hra):\n        super().__init__(name,salary)\n        self.__hra = hra\n   \
    \ def print(self):    # Overrides print()\n        super().print()\n        print(self.__hra)\n\
    \    def get_salary(self):  # Overrides get_salary()\n        return super().get_salary()\
    \ + self.__hra\n\ne = Employee(\"Scott\",100000)\nm = Manager(\"Mike\",150000,50000)\n\
    e.print()\nprint(\"Net Salary : \", e.get_salary())\nm.print()\nprint(\"Net Salary\
    \ : \", m.get_salary())\n```\n\n# Output:\n\n```\nScott\n100000\nNet Salary :\
    \ 100000\nMike\n150000\n50000\nNet Salary : 200000\n```\n\n# Overriding\n\n- When\
    \ a method in subclass is created with same name as a method in superclass, it\
    \ is called as overriding.\n- Subclass method is said to override method in superclass.\n\
    - Overriding is done to change the behavior of inherited method of superclass\
    \ by creating a new version in subclass.\n\n# Functions isinstance() and issubclass()\n\
    \n- Function isinstance() checks whether an object is an instance of a class.\n\
    - Function issubclass() checks whether a class is a subclass of another class.\n\
    \n```\nisinstance(object, class)\nissubclass(class, class)\n```\n\n```\ne = Employee(...)\n\
    print(\"Employee ?? \", isinstance(e, Employee)) # True\nprint(\"Manager subclass\
    \ of Employee ?? \", issubclass(Manager, Employee)) # True\n```\n\n# MULTIPLE\
    \ INHERITANCE\n\nPython supports a form of multiple inheritance as well. A class\
    \ definition with multiple super classes is as follows:\n\n```python\nclass SubClassName(superclass1,superclass2,...):\n\
    \    ...\n```\n\nPython searches for attributes in Subclass first. If not found\
    \ it searches in superclass1, then (recursively) in the super classes of superclass1,\
    \ and if it was not found there, it searches in superclass2, and so on.\n\nIn\
    \ the following example, as method process() is not found in class C, Python calls\
    \ process() method in class A as it is the first superclass.\n\n```python\nclass\
    \ A:\n    def process(self):\n        print('A process()')\n\nclass B:\n    def\
    \ process(self):\n        print('B process()')\n\nclass C(A, B):\n    pass\n\n\
    obj = C()\nobj.process()  # will call process() of A\n```"
  mdcn: "# 特殊方法\n\n- Python 允许我们通过实现特殊方法来重载与我们的类相关的不同运算符和操作。\n- 与操作相关的对象作为参数传递给函数。\n\
