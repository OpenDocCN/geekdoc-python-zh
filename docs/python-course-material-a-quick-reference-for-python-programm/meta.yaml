  mdcn: "## FOR 循环语句\n\n执行给定的语句，直到列表耗尽。\n\n```python\nfor target in expression_list:\n\
    \    statements\n[else:\n    statements]\n```\n\n`expression_list` 会被求值一次；它应该产生一个可迭代对象。系统会为\
    \ `expression_list` 的结果创建一个迭代器。然后，对于迭代器提供的每个项目，语句集会按迭代器返回的顺序执行一次。\n\n当项目耗尽时（当序列为空或迭代器引发\
    \ `StopIteration` 异常时立即发生），如果存在 `else` 子句中的语句，则会被执行，然后循环终止。\n\n```python\n# 从\
    \ 1 到 10 打印数字\nfor n in range(1, 11):\n    print(n, end = ' ')\n```\n\n```python\n\
    # 程序：输入一个数字并显示其阶乘\nnum = int(input(\"Enter a number :\"))\nfact = 1\nfor i in\
    \ range(2, num + 1):\n    fact *= i\nprint(f\"Factorial of {num} is {fact}\")\n\
    ```\n\n## BREAK、CONTINUE 和 ELSE\n\n-   **break** 语句，与 C 语言中一样，会跳出最内层的 **for**\
    \ 或 **while** 循环。\n-   循环语句可以有一个 **else** 子句；当循环因列表耗尽（对于 `for`）或条件变为假（对于 `while`）而终止时，它会被执行，但当循环被\
    \ **break** 语句终止时则不会执行。\n-   **continue** 语句，同样借鉴自 C 语言，会继续循环的下一次迭代。\n\n![](img/6dd1124ad0340c1e75e84cf487013a5c_34_0.png)\n\
    \n```python\n# 检查数字是否为质数\nnum = int(input(\"Enter a number :\"))\nfor i in range(2,\
    \ num//2 + 1):\n    if num % i == 0:\n        print('Not a prime number')\n  \
    \      break\nelse:\n    print('Prime number')\n```\n\n![](img/6dd1124ad0340c1e75e84cf487013a5c_35_0.png)\n\
    \n```python\n# 程序：打印 1 到 100 的质数\nfor num in range(1, 101):\n    for i in range(2,\
    \ num//2 + 1):\n        if num % i == 0:\n            break\n    else:\n     \
    \   print(num)\n```\n\n## 字符串\n\n-   字符串可以用单引号或双引号括起来。\n-   Python 字符串不能被修改——它们是不可变的。\n\
    -   内置的 `len()` 函数返回字符串的长度。\n-   字符串可以被*索引*（下标），第一个字符的索引为 0。\n-   没有单独的字符类型；字符只是大小为一的字符串。\n\
    -   索引也可以是负数，从右边开始计数。\n-   除了索引，还支持*切片*。索引用于获取单个字符，而*切片*允许你获取子字符串。\n-   切片索引有有用的默认值；省略的第一个索引默认为零，省略的第二个索引默认为被切片字符串的大小。\n\
    \n![](img/6dd1124ad0340c1e75e84cf487013a5c_36_0.png)\n\n以下是索引和切片的示例：\n\n```\n\
    >>>name=\"Python\"\n>>>name[0]\n'p'\n>>>name[-1]       # 最后一个字符\n'n'\n>>>name[-3:]\
    \      # 从末尾第 3 个字符开始取\n'hon'\n>>>name[0:2]      # 从索引 0 到 1\n'Py'\n>>>name[4:]\
