  md: "# # MULTIPLE INHERITANCE\n\nPython supports a form of multiple inheritance\
    \ as well. A class definition with multiple super classes is as follows:\n\n```\n\
    python\nclass SubClassName(superclass1,superclass2,...):\n    ...\n\n```\n\nPython\
    \ searches for attributes in Subclass first. If not found it searches in superclass1,\
    \ then (recursively) in the super classes of superclass1, and if it was not found\
    \ there, it searches in superclass2, and so on.\n\nIn the following example, as\
    \ method process() is not found in class C, Python calls process() method in class\
    \ A as it is the first superclass.\n\n```\npython\nclass A:\n    def process(self):\n\
    \        print('A process()')\n\nclass B:\n    def process(self):\n        print('B\
    \ process()')\n\nclass C(A, B):\n    pass\n\nobj = C()\nobj.process()  # will\
    \ call process() of A\n\n```"
