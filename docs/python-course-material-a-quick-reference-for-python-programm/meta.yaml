    # USING RE (REGULAR EXPRESSION) MODULE


    +   - Module `re` provides methods that use regular expressions.

    - A regular expression (or RE) is a string with special characters that specifies
    which strings would match it.

    - Module `re` provides functions to search for a partial and full match for a
    regular expression in the given string. It provides functions to split strings
    and extract strings using regular expression.


    The following are special characters (metacharacters) used in regular expressions:


    | Character | Description |

    |---|---|

    | `[]` | A set of characters |

    | `\` | Signals a special sequence (can also be used to escape special characters)
    |

    | `.` | Any character (except newline character) |

    | `^` | Starts with |

    | `$` | Ends with |

    | `*` | Zero or more occurrences |

    | `+` | One or more occurrences |

    | `{}` | Exactly the specified number of occurrences |

    | `|` | Either or |

    | `()` | Represents a group |'
  - '[PAGE 130]


    The following are special sequences that have special meaning in a regular expression.


    | Character | Description |

    |---|---|

    | \d | Returns a match where the string contains a digit (numbers from 0-9). |

    | \D | Returns a match where the string contains a non-digit. |

    | \s | Returns a match where the string contains a whitespace character. |

    | \S | Returns a match where the string contains a non-whitespace character. |

    | \w | Returns a match where the string contains any word character (characters
    from a to Z, digits from 0-9, and the underscore _ character). |

    | \W | Returns a match where the string contains a non-word character. |'
  - '[PAGE 131]


    The following are functions provided by **re** module.


    | Function | Meaning |

    | --- | --- |

    | compile(pattern, flags=0) | Compiles a regular expression pattern into a regular
    expression object, which can be used for matching using its match(), search()
    and other methods. |

    | search(pattern, string,flags=0) | Scans through string looking for the first
    location where the regular expression pattern produces a match, and returns a
    corresponding match object. Returns None if no position in the string matches
    the pattern. |

    | match(pattern, string,flags=0) | If zero or more characters at the beginning
    of string match the regular expression pattern, returns a corresponding match
    object. Returns None if the string does not match the pattern. |

    | fullmatch(pattern, string,flags=0) | If the whole string matches the regular
    expression pattern, returns a corresponding match object. Returns None if the
    string does not match the pattern. |

    | split(pattern,string, maxsplit=0, flags=0) | Splits string by the occurrences
    of pattern. If capturing parentheses are used in pattern, then the text of all
    groups in the pattern are also returned as part of the resulting list. If maxsplit
    is nonzero, at most maxsplit splits occur, and the remainder of the string is
    returned as the final element of the list. |

    | findall(pattern, string, flags=0) | Returns all non-overlapping matches of pattern
    in string, as a list of strings. The string is scanned left-to-right, and matches
    are returned in the order found. |

    | sub(pattern, replace, string) | Replaces string that matches pattern with the
    given string. |'
