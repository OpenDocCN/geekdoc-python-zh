  md: '# THE DICTIONARY DATA STRUCTURE


    +   - Dictionaries are indexed by keys, which can be any immutable type; strings
    and numbers can always be keys.

    - It is best to think of a dictionary as an unordered set of *key: value* pairs,
    with the requirement that the keys are unique (within one dictionary).

    - Placing a comma-separated list of *key:value* pairs within the braces adds initial
    *key:value* pairs to the dictionary.

    - It is an error to extract a value using a non-existent key.

    - The **dict()** constructor builds dictionaries directly from sequences of key-value
    pairs.

    - When looping through dictionaries, the key and corresponding value can be retrieved
    at the same time using the **items()** method.


