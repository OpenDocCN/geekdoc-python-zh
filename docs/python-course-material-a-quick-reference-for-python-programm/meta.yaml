    \ or omissions. Neither is any liability assumed for damages resulting from the\
    \ use of information contained therein.\n\n## ABOUT THE AUTHOR\n\n**Srikanth Pragada**\
    \ is the director of Srikanth Technologies, a software training company. He started\
    \ programming in early 90s and worked with more than 15 different programming\
    \ languages.\n\n**Srikanth Pragada** holds the following certifications:\n\n-\
    \ Sun Certified Java Programmer\n- Sun Certified Web Component Developer\n- Sun\
    \ Certified Business Component Developer\n- Oracle Database SQL Certified Expert\n\
    - Oracle PL/SQL Developer Certified Associate\n- Microsoft Certified Technology\
    \ Specialist for .NET 4.0 (Web Applications)\n\nHe currently conducts online,\
    \ classroom and onsite training on C, Java, Oracle, Microsoft.NET, Python, Data\
    \ Science, Angular, AWS and React.\n\nHis website [www.srikanthtechnologies.com](http://www.srikanthtechnologies.com)\
    \ provides online examinations, programs, projects, articles and his blog.\n\n\
    He provides a lot of example programs of various languages and technologies using\
    \ [https://github.com/srikanthpragada](https://github.com/srikanthpragada).\n\n\
    When he is not teaching or learning, he would like to visit new places, read books,\
    \ play sports and listen to music.\n\nHe can be reached through his email address\
    \ [srikanthpragada@gmail.com](mailto:srikanthpragada@gmail.com).\n\n## HOW TO\
    \ USE THIS MATERIAL\n\nYou are suggested to read relevant content before and after\
    \ attending the class.\n\nUse picture and text to grasp the concept. Programs\
    \ are to illustrate how to implement the concepts. Try the programs given in this\
    \ material in your system.\n\n## REQUEST FOR FEEDBACK\n\nWe have taken considerable\
    \ effort to ensure accuracy of the contents of this material. However, if you\
    \ come across any mistakes or have any suggestions to improve the quality of this\
    \ material, please take a few minutes of your valuable time to send an email to\
    \ me at srikanthpragada@gmail.com.\n\nAlternatively, you can visit my website\
    \ **http://www.srikanthtechnologies.com/feedback.aspx** and provide feedback there.\n\
    \n## TABLE OF CONTENT\n\n- Copyright 2\n- About the Author 3\n- How to use this\
    \ material 4\n- Request for Feedback 4\n- Table of Content 5\n- Python Language\
    \ 11\n- Installation of Python 12\n- Using Python Interpreter - REPL 15\n- Interactive\
    \ Mode 15\n- Variables 16\n- Rules for Identifier 16\n- Operators 17\n  - Assignment\
    \ operator (=) 17\n  - Arithmetic Operators 18\n  - Relational Operators 19\n\
    \  - Logical Operators 20\n- Built-in Data Types 21\n- Keywords 23\n- Built-in\
    \ Functions 24\n- function input() 27\n  - Using print() function 27\n  - Formatted\
    \ output 28\n  - The f-string 29\n- The if statement 30\n- Conditional Expression\
    \ 31\n- The while loop 32\n- The range() function 33\n- The pass statement 33\n\
    - The for statement 34\n- break, CONTINUE and else 35\n- Strings 37\n- The List\
    \ Data Structure 42\n  - List Comprehension 44\n- The del statement 45\n- Operations\
    \ related to Sequence Types 46\n- The Tuple data structure 47\n- Function zip()\
    \ and Enumerate() 48\n- Sorted() and reversed() 49\n- The Set data structure 50\n\
    \  - Set Comprehension 52\n- List vs. Set vs. Tuple 52\n- The Dictionary data\
    \ structure 53\n  - Dictionary Comprehension 55\n- Structural Pattern Matching\
    \ 56\n- Functions 59\n- Default Argument Values 60\n- Varying Arguments 61\n-\
    \ Keyword Arguments 62\n- Keyword-Only Arguments 63\n- Positional-Only Arguments\
    \ 64\n- Passing function as a parameter 65\n- Using filter, sorted and map functions\
    \ 66\n  - Filter function 66\n  - Sorted function 67\n  - Map function 68\n- Lambda\
    \ Expression 69\n- Passing Arguments - Pass by value and reference 70\n- Local\
    \ Functions 72\n- Variable’s Scope 73\n- Modules 74\n  - The import statement\
    \ 75\n  - The dir() function 76\n  - The help() function 76\n  - Module search\
    \ path 77\n    - Setting PYTHONPATH 77\n  - Executing Module as Script 78\n- Using\
    \ command line arguments 80\n- Documentation 81\n- Packages 82\n  - Importing\
    \ with * 83\n- PIP and PyPI 84\n- Classes 85\n  - __init__ method 85\n  - Private\
    \ members (Name Mangling) 86"
  mdcn: "# Python 语言与库\n\n作者\n\nSrikanth Pragada\n\n## 版权信息\n\n版权所有 @ 2022 **Srikanth\
    \ Technologies**。保留所有权利。\n\n未经作者兼出版商 **Srikanth Pragada** 事先书面许可，不得以任何形式或任何方式复制或分发本书的任何部分，也不得将其存储在数据库或检索系统中，但程序可以在计算机系统中输入、存储和执行，但不得复制用于出版。\n\
    \n尽管在准备本书时已采取了所有预防措施，但作者对任何错误或遗漏不承担责任。对于因使用其中所含信息而造成的任何损害，也不承担任何责任。\n\n## 关于作者\n\
    \n**Srikanth Pragada** 是软件培训公司 Srikanth Technologies 的总监。他于 90 年代初开始编程，曾使用过 15\
    \ 种以上不同的编程语言。\n\n**Srikanth Pragada** 持有以下认证：\n\n- Sun 认证 Java 程序员\n- Sun 认证 Web\
    \ 组件开发人员\n- Sun 认证业务组件开发人员\n- Oracle 数据库 SQL 认证专家\n- Oracle PL/SQL 开发人员认证助理\n\
    - 微软 .NET 4.0（Web 应用程序）认证技术专家\n\n他目前提供 C、Java、Oracle、Microsoft.NET、Python、数据科学、Angular、AWS\
    \ 和 React 的在线、课堂和现场培训。\n\n他的网站 [www.srikanthtechnologies.com](http://www.srikanthtechnologies.com)\
    \ 提供在线考试、程序、项目、文章和他的博客。\n\n他通过 [https://github.com/srikanthpragada](https://github.com/srikanthpragada)\
    \ 提供大量各种语言和技术的示例程序。\n\n当他不教学或学习时，他喜欢游览新地方、阅读书籍、进行体育运动和听音乐。\n\n可以通过他的电子邮件地址 [srikanthpragada@gmail.com](mailto:srikanthpragada@gmail.com)\
    \ 联系他。\n\n## 如何使用本材料\n\n建议您在上课前后阅读相关内容。\n\n利用图片和文字来理解概念。程序用于说明如何实现这些概念。请在您的系统中尝试本材料中给出的程序。\n\
    \n## 反馈请求\n\n我们已付出相当大的努力来确保本材料内容的准确性。但是，如果您发现任何错误或有任何改进建议，请花几分钟宝贵时间发送电子邮件至 srikanthpragada@gmail.com。\n\
    \n或者，您可以访问我的网站 **http://www.srikanthtechnologies.com/feedback.aspx** 并在那里提供反馈。\n\
    \n## 目录\n\n- 版权信息 2\n- 关于作者 3\n- 如何使用本材料 4\n- 反馈请求 4\n- 目录 5\n- Python 语言 11\n\
    - Python 的安装 12\n- 使用 Python 解释器 - REPL 15\n- 交互模式 15\n- 变量 16\n- 标识符规则 16\n-\
    \ 运算符 17\n  - 赋值运算符 (=) 17\n  - 算术运算符 18\n  - 关系运算符 19\n  - 逻辑运算符 20\n- 内置数据类型\
    \ 21\n- 关键字 23\n- 内置函数 24\n- 函数 input() 27\n  - 使用 print() 函数 27\n  - 格式化输出 28\n\
    \  - f-string 29\n- if 语句 30\n- 条件表达式 31\n- while 循环 32\n- range() 函数 33\n- pass\
    \ 语句 33\n- for 语句 34\n- break、CONTINUE 和 else 35\n- 字符串 37\n- 列表数据结构 42\n  - 列表推导式\
    \ 44\n- del 语句 45\n- 与序列类型相关的操作 46\n- 元组数据结构 47\n- 函数 zip() 和 Enumerate() 48\n\
    - Sorted() 和 reversed() 49\n- 集合数据结构 50\n  - 集合推导式 52\n- 列表 vs. 集合 vs. 元组 52\n\
    - 字典数据结构 53\n  - 字典推导式 55\n- 结构化模式匹配 56\n- 函数 59\n- 默认参数值 60\n- 可变参数 61\n- 关键字参数\
    \ 62\n- 仅关键字参数 63\n- 仅位置参数 64\n- 将函数作为参数传递 65\n- 使用 filter、sorted 和 map 函数 66\n\
    \  - Filter 函数 66\n  - Sorted 函数 67\n  - Map 函数 68\n- Lambda 表达式 69\n- 参数传递 -\
    \ 按值传递和按引用传递 70\n- 局部函数 72\n- 变量作用域 73\n- 模块 74\n  - import 语句 75\n  - dir() 函数\
