  md: "# # THE GENERATOR\n\n+   - Generator is a simple and powerful tool for creating\
    \ iterators.\n- They are written like regular functions but use the **yield**\
    \ statement whenever they want to return data.\n- Each time **next()** is called\
    \ on it, the generator resumes where it left off.\n- Generator can be thought\
    \ of as resumable function.\n- Generator can be used where iterable is needed.\n\
    \n```\npython\ndef leap_years(start, end):\n    for year in range(start, end +\
    \ 1):\n        if year % 4 == 0 and year % 100 != 0 \\\n                     \
    \     or year % 400 == 0:\n            yield year\n\ndef alphabets(st):\n    for\
    \ ch in st:\n        if ch.isalpha():\n            yield ch\n\n# Get all leap\
    \ years in the range 2000 and 2050\nfor year in leap_years(2000, 2050):\n    print(year)\n\
    \n# Get all alphabets from the given string\nfor ch in alphabets (\"Python 3.10\
    \ version\"):\n    print (ch, end=' ')\n\n```"
