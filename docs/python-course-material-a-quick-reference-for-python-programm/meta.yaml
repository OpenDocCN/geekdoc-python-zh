- md: "## Python Language and Library\n\n- Function open()\n- The with statement (Context\
    \ Manager)\n- File object\n- Pickle – Python Object Serialization\n- JSON module\n\
    - The sys module\n- The os module\n- Using re (regular expression) module\n  -\
    \ Match Object\n- The datetime module\n  - The date type\n  - The time type\n\
    \  - The datetime type\n  - The timedelta type\n  - Format Codes\n- Multithreading\n\
    \  - Functions in threading module\n  - Thread Class\n- requests module\n  - The\
    \ requests.Response object\n- BeautifulSoup module\n  - Tag Object\n  - Methods\
    \ find() and find_all()\n- Database Programming\n  - SQLite3 Database\n    - Module\
    \ sqlite3\n      - Method connect()\n      - Connection object\n      - Cursor\
    \ Object\n      - Inserting row into table\n      - Retrieving rows from table\n\
    \      - Updating row in table\n      - Deleting row from table\n    - Working\
    \ with Other Databases\n\n## PYTHON LANGUAGE\n\n- Easy and powerful language.\n\
    - Supports different programming paradigms like *Structured programming* and *Object-oriented\
    \ programming*.\n- Is an interpreted language.\n- Ideal for scripting and rapid\
    \ application development.\n- Supports high-level data structures like List, Set,\
    \ Dictionary and Tuple.\n- Python has a design philosophy that emphasizes code\
    \ readability, and a syntax that allows programmers to express concepts in fewer\
    \ lines of code.\n- Created by **Guido van Rossum** and first released in 1991.\n\
    - Python features a dynamic type system and automatic memory management.\n- Python\
    \ 2.0 was released on 16th October 2000.\n- Python 3.0 (initially called Python\
    \ 3000 or py3k) was released on 3rd December 2008.\n- Python 3.10 was released\
    \ on October, 2021."
  mdcn: "## Python 语言与库\n\n- 函数 open()\n- with 语句（上下文管理器）\n- 文件对象\n- Pickle – Python\
    \ 对象序列化\n- JSON 模块\n- sys 模块\n- os 模块\n- 使用 re（正则表达式）模块\n  - 匹配对象\n- datetime\
    \ 模块\n  - date 类型\n  - time 类型\n  - datetime 类型\n  - timedelta 类型\n  - 格式化代码\n\
    - 多线程\n  - threading 模块中的函数\n  - Thread 类\n- requests 模块\n  - requests.Response\
    \ 对象\n- BeautifulSoup 模块\n  - 标签对象\n  - 方法 find() 和 find_all()\n- 数据库编程\n  - SQLite3\
    \ 数据库\n    - sqlite3 模块\n      - connect() 方法\n      - 连接对象\n      - 游标对象\n  \
    \    - 向表中插入行\n      - 从表中检索行\n      - 更新表中的行\n      - 从表中删除行\n    - 与其他数据库协同工作\n\
    \n## PYTHON 语言\n\n- 简单而强大的语言。\n- 支持不同的编程范式，如*结构化编程*和*面向对象编程*。\n- 是一种解释型语言。\n-\
    \ 非常适合脚本编写和快速应用开发。\n- 支持高级数据结构，如列表、集合、字典和元组。\n- Python 的设计哲学强调代码可读性，其语法允许程序员用更少的代码行表达概念。\n\
    - 由**吉多·范罗苏姆**创建，于 1991 年首次发布。\n- Python 具有动态类型系统和自动内存管理。\n- Python 2.0 于 2000\
    \ 年 10 月 16 日发布。\n- Python 3.0（最初称为 Python 3000 或 py3k）于 2008 年 12 月 3 日发布。\n\
    - Python 3.10 于 2021 年 10 月发布。"
