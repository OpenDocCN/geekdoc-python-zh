    Enter number [0 to stop]: 30\nEnter number [0 to stop]: xyz\nInvalid Number!\n\
    Enter number [0 to stop]: 50\nEnter number [0 to stop]: 0\nTotal = 90\n```\n\n\
    ## 预定义异常\n\n以下是 Python 中的预定义异常。\n\n- BaseException\n  - SystemExit\n  - KeyboardInterrupt\n\
    \  - GeneratorExit\n  - Exception\n    - StopIteration\n    - StopAsyncIteration\n\
