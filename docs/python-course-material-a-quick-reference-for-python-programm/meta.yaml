    regular expression in the given string. It provides functions to split strings
    and extract strings using regular expression.


    The following are special characters (metacharacters) used in regular expressions:


    | Character | Description |

    |---|---|

    | `[]` | A set of characters |

    | `\` | Signals a special sequence (can also be used to escape special characters)
    |

    | `.` | Any character (except newline character) |

    | `^` | Starts with |

    | `$` | Ends with |

    | `*` | Zero or more occurrences |

    | `+` | One or more occurrences |

    | `{}` | Exactly the specified number of occurrences |

    | `|` | Either or |

    | `()` | Represents a group |'
