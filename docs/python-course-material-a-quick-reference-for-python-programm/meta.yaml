    \ |\n| dir([object]) | 不带参数时，返回当前本地作用域中的名称列表。带一个参数时，尝试返回该对象的有效属性列表。 |\n| filter(function,\
    \ iterable) | 使用那些使函数返回真值的可迭代对象元素来构建一个迭代器。 |\n| format(value[, format_spec]) |\
    \ 将值转换为由format_spec控制的“格式化”表示。 |\n| getattr(object, name[, default]) | 返回对象object中名为name的属性值。\
    \ |\n| hex(x) | 将一个整数转换为以\"0x\"为前缀的小写十六进制字符串。 |\n| id(object) | 返回对象的“身份标识”。这是一个整数，保证在对象生命周期内唯一且恒定。\
    \ |\n| len(s) | 返回对象的长度（元素个数）。 |\n| `max(iterable)`<br>`max(arg1, arg2, *args)`\
    \ | 返回可迭代对象中的最大项，或者返回两个或更多参数中的最大值。 |\n| `input([prompt])` | 如果存在prompt参数，则将其写入标准输出，不带尾随换行符。然后该函数从输入读取一行，将其转换为一个字符串（去掉尾随的换行符），并返回该字符串。当读取到EOF时，引发EOFError。\
    \ |\n| `min(iterable)`<br>`min(arg1, arg2, *args)` | 返回可迭代对象中的最小项，或者返回两个或更多参数中的最小值。\
    \ |\n| `oct(x)` | 将一个整数转换为以\"0o\"为前缀的八进制字符串。 |\n| `ord(c)` | 给定一个表示单个Unicode字符的字符串，返回一个表示该字符Unicode码位的整数。\
    \ |\n| `print(*objects, sep=' ', end='\\n', file=sys.stdout, flush=False)` | 将对象打印到文本流文件中，以sep分隔并在末尾添加end。如果提供了sep、end、file和flush，必须以关键字参数的形式给出。\
    \ |\n| `reversed(seq)` | 返回一个反向迭代器。 |\n| `round(number[, ndigits])` | 返回将number四舍五入到小数点后ndigits位精度的值。\
    \ |\n| `sorted(iterable, *, key=None, reverse=False)` | 从可迭代对象的元素中返回一个新的已排序列表。\
    \ |\n| `sum(iterable[, start])` | 从左到右将start与可迭代对象中的各项相加，返回总和。start默认为0。 |\n|\
    \ `type(object)` | 带一个参数时，返回对象的类型。 |\n\n```\npython\n>>> abs(-10)\n10\n>>> bin(10)\n\
    '0b1010'\n>>> chr(65)        # char for ascii code\n'A'\n>>> a = 10\n>>> id(a)\
    \        # Address of the object\n140728047310784\n>>> max(10, 20, 30)\n30\n>>>\
    \ ord('a')        # Ordinal value (ascii code)\n97\n>>> round(10.566)\n11\n>>>\
    \ type(True)\n<class 'bool'>\n>>>\n```\n\n# 函数 input()\n\n- 内置函数**input()**用于从用户获取输入。\n\
    - 它总是返回一个字符串，因此我们需要使用其他内置函数（如**int()**）将其转换为所需的类型。\n\n```\n>>> num = int(input(\"\
    Enter a number :\"))\nEnter a number :25\n>>> print(\"Square of\", num, \"is\"\
    , num * num)\nSquare of 25 is 625\n>>>\n```\n\n# 使用 print() 函数\n\n- 内置函数 print()\
    \ 用于打印一个或多个值。\n- 可以指定分隔符和结束字符。\n\n```\n>>> print(1, 2, 3)\n1 2 3\n>>> print(1,\
    \ 2, 3, sep = '-')\n1-2-3\n>>> print(1, 2, 3, end = '\\n\\n')\n1 2 3\n>>> print(\"\
    Python\", 3.10, sep= \" - \", end = \"\\n\\n\")\nPython - 3.10\n>>>\n```\n\n#\
    \ 格式化输出\n\n- 可以使用`%`配合转换字符（如`%d`和`%s`）来打印格式化输出。\n- 字符串的**format()**方法可用于格式化输出。调用此方法的字符串可以包含字面文本或由花括号`{}`界定的替换字段。\n\
    - 每个替换字段包含位置参数的数字索引，或关键字参数的名称。返回字符串的一个副本，其中每个替换字段都替换为对应参数的字符串值。\n\n```\nstr %\
    \ (values)\n```\n\n```\nstr.format(*args, **kwargs)\n```\n\n```\n>>> name = \"\
    Srikanth\"\n>>> mobile = \"9059057000\"\n>>> print(\"%s %s\" % (name, mobile))\n\
    Srikanth 9059057000\n>>> print(\"Name = {0}\".format(name))\nName = Srikanth\n\
    >>> print(\"Name = {}, Mobile = {}\".format(name, mobile))\nName = Srikanth, Mobile\
    \ = 9059057000\n>>> print(\"{name} {ver}\".format(name=\"Python\", ver=3.10))\n\
    Python 3.10\n>>>\n```\n\n# f-string\n\n- F-string 是一个以 `f` 为前缀的字符串，当变量被花括号`{}`包围在字符串中时，会插入变量的值。\n\
    - Python 3.6 的新特性。\n\n```\n>>> name = \"Srikanth\"\n>>> lang = \"Python\"\n>>>\
    \ f\"{name} is a {lang} trainer\"\n'Srikanth is a Python trainer'\n```\n\n可以按如下方式格式化值：\n\
    \n```\n>>> mode = \"Cash\"\n>>> amount = 251.567\n>>> print(f\"{mode:10} {amount:8.2f}\
    \ {amount*0.20:5.2f}\")\nCash        251.57  50.31\n>>> f\"{10000.00:8.2}\"\n\
    '   1e+04'\n```\n\n> 注意：在格式说明符中，`8.2`表示：包括小数点在内的总列数为8，小数点后有2位数字。字符`f`表示定点格式，否则使用科学计数法（E）格式。\n\
    \n# IF 语句\n\n- 用于条件执行。\n- 它通过逐一评估表达式，直到找到一个为真的表达式，从而恰好选择一个代码块执行。\n- 可以有零个或多个`elif`部分，`else`部分是可选的。\n\
    \n```\nif boolean_expression:\n    statements\n[elif boolean_expression:\n   \
    \ statements] ...\n[else:\n    statements]\n```\n\n```\nif a > b:\n    print(a)\n\
    else:\n    print(b)\n```\n\n```\nif a > 0:\n    print(\"Positive\")\nelif a <\
    \ 0:\n    print(\"Negative\")\nelse:\n    print(\"Zero\")\n```\n\n# 条件表达式\n\n\
    - 它根据条件返回真值或假值。\n- 如果条件为真，则返回 `true_value`，否则返回 `false_value`。\n\n```\ntrue_value\
    \ if condition else false_value\n```\n\n```\n>>> a = 10\n>>> b = 20\n>>> a if\
    \ a > b else b\n20\n```\n\n# WHILE 循环\n\n`while` 语句用于只要布尔表达式为真就重复执行代码块。\n\n```\n\
    while boolean_expression:\n    statements\n[else:\n    statements]\n```\n\n> 注意：只有当循环正常终止（即没有`break`语句）时，`while`的`else`部分才会被执行。\n\
    \n```\n# 打印1到10的程序\ni = 1\nwhile i <= 10:\n    print(i)\n    i += 1\n```\n\n```\n\
