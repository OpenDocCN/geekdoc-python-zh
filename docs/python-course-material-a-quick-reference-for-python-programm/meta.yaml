  md: '# Formatted output


    +   - It is possible to print formatted output using % with conversion characters
    like %d and %s.

    - Method **format()** of string can be used to format output. String on which
    this method is called can contain literal text or replacement fields delimited
    by braces {}.

    - Each replacement field contains either the numeric index of a positional argument,
    or the name of a keyword argument. Returns a copy of the string where each replacement
    field is replaced with the string value of the corresponding argument.


    ```

    str % (values)

    ```


    ```

    str.format(*args, **kwargs)

    ```


    ```

    >>> name = "Srikanth"

    >>> mobile = "9059057000"

    >>> print("%s %s" % (name, mobile))

    Srikanth 9059057000

    >>> print("Name = {0}".format(name))

    Name = Srikanth

    >>> print("Name = {}, Mobile = {}".format(name, mobile))

    Name = Srikanth, Mobile = 9059057000

    >>> print("{name} {ver}".format(name="Python", ver=3.10))

    Python 3.10

    >>>

    ```'
  merge: -1
