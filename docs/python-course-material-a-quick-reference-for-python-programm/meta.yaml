  - '[PAGE 153]


    # SQLite3 Database


    +   - SQLite is a C library that provides a lightweight disk-based database that
    doesn''t require a separate server process and allows accessing the database using
    a nonstandard variant of the SQL query language.

    - It is possible to prototype an application using SQLite and then port the code
    to a larger database such as Oracle.

    - Python ships with SQLite Database.


    # Data types in SQLite3


    The following are available data types in SQLite Database.


    | Datatype | Meaning | Python Type |

    | :--- | :--- | :--- |

    | NULL | The value is a NULL value. | None |

    | INTEGER | The value is a signed integer, stored in 1, 2, 3, 4, 6, or 8 bytes
    depending on the magnitude of the value. | int |

    | REAL | The value is a floating-point value, stored as an 8-byte IEEE floating
    point number. | float |

    | TEXT | The value is a text string, stored using the database encoding (UTF-8,
    UTF-16BE or UTF-16LE). | str |

    | BLOB | The value is a blob of data, stored exactly as it was input. | bytes
    |'
  - '[PAGE 154]


    # MODULE SQLITE3


    +   - It is the interface for SQLite database.

    - This module is part of Python standard library.

    - It implements DB API 2.0 specifications (PEP 249).


    # Method connect()


    +   - It is used to establish a connection to database with given parameters.

    - Parameter is name of the database to connect to. If database is not present,
    it is created.

    - It returns Connection object.


    ```

    connect(databasename)

    ```


    # Connection object


    Connection object represents a connection to database.


    | Method | Meaning |

    |---|---|

    | close() | Closes connection. |

    | commit() | Commits pending changes in transaction to database. |

    | rollback() | Causes the database to roll back to the start of any pending transaction.
    Closing a connection without committing the changes first will cause an implicit
    rollback to be performed. |

    | cursor() | Returns a cursor object using this connection. |'
  - '[PAGE 155]


    # # Cursor Object


    +   - Cursor represents a database cursor, which is used to manage the context
    of a fetch operation.

    - Cursors created from the same connection are not isolated, i.e., any changes
    done to the database by a cursor are immediately visible to other cursors.


    | Method | Meaning |

    |--------|---------|

    | close() | Closes cursor. |

    | execute(operation [, parameters]) | Prepare and execute a database operation.
    |

    | Executemany (operation, seq_of_parameters) | Prepare a database operation (query
    or command) and then execute it against all parameter sequences or mappings found
    in the sequence seq_of_parameters. |

    | fetchone() | Fetch the next row of a query result set, returning a single sequence,
    or None when no more data is available. |

    | fetchmany ([size=cursor.arraysize]) | Fetch the next set of rows of a query
    result, returning a sequence of sequences (e.g. a list of tuples). An empty sequence
    is returned when no more rows are available. |

    | fetchall() | Fetch all (remaining) rows of a query result, returning them as
    a sequence of sequences (e.g. a list of tuples). Note that the cursor''s arraysize
    attribute can affect the performance of this operation. |'
