- md: "## PIP AND PyPI\n\n- PyPI (Python Package Index) is a repository of python\
    \ packages.\n- URL https://pypi.org/ lists all python packages that we can download\
    \ and use.\n- PIP is a general-purpose installation tool for Python packages.\n\
    - Run **pip.exe** from **python\\scripts** folder.\n\nThe following are some of\
    \ the important options available with PIP:\n\n```\n>pip install requests    \
    \ # Installs requests package\n>pip uninstall requests   # Uninstalls requests\
    \ package\n>pip list                 # Lists all installed packages\n```\n\n```\n\
    >pip show requests\nName: requests\nVersion: 2.27.1\nSummary: Python HTTP for\
    \ Humans.\nHome-page: https://requests.readthedocs.io\nAuthor: Kenneth Reitz\n\
    Author-email: me@kennethreitz.org\nLicense: Apache 2.0\nLocation: c:\\python\\\
    lib\\site-packages\nRequires: certifi, charset-normalizer, idna, urllib3\nRequired-by:\n\
    ```\n\n## CLASSES\n\n- A class contains data (data attributes) and code (methods)\
    \ encapsulated.\n- Creating a new class creates a new *type*, allowing new *instances*\
    \ of that type to be made.\n- Data attributes need not be declared; like local\
    \ variables, they spring into existence when they are first assigned a value.\n\
    - Class *instantiation* uses function notation. Just pretend that the class object\
    \ is a parameter-less function that returns a new instance of the class.\n- The\
    \ special thing about methods is that the instance object is passed as the first\
    \ argument (called self) of the function.\n\n```\nclass className:\n    definition\n\
    ```\n\n### __init__ method\n\n- When a class defines an __init__() method, class\
    \ instantiation automatically invokes __init__() for the newly-created class instance.\n\
    - Arguments given to the class instantiation operator are passed on to __init__().\n\
    \n![](img/6dd1124ad0340c1e75e84cf487013a5c_84_0.png)\n\n```\nclass Product:\n\
    \    def __init__(self, name, price):\n        # Object attributes\n        self.name\
    \ = name\n        self.price = price\n\n    def print_details(self):\n       \
    \ print(\"Name  : \", self.name)\n        print(\"Price : \", self.price)\n\n\
    p = Product(\"Dell XPS Laptop\",80000)  # create object\np.print_details()\n```\n\
    \n### Private members (Name Mangling)\n\n- Python doesn't have private variables\
    \ concept.\n- However, a convention followed by most Python programmers is, an\
    \ attribute prefixed with a single underscore (_attribute) or double underscore\
    \ (__attribute) should be treated as non-public (protected and private respectively)\
    \ part of the API.\n- Any identifier of the form __attribute (two leading underscores)\
    \ is textually replaced with _classname__attribute, where classname is the current\
    \ class name. This process is called as name mangling.\n- For example, __salary\
    \ in Employee class becomes _Employee__salary.\n- However, it is still possible\
    \ to access or modify a variable that is considered private from outside the class.\n\
    \n| Name    | Notation | Behaviour |\n|---------|----------|-----------|\n| name\
    \    | Public   | Can be accessed from inside and outside. |\n| _name   | Protected\
    \ | Like a public member, but they shouldn't be directly accessed from outside.\
    \ |\n| __name  | Private  | Can't be seen and accessed from outside. |\n\n```\n\
    class Product:\n    def __init__(self, name, price):\n        self.__name = name\n\
    \        self.__price = price\n\n    def print_details(self):\n        print(\"\
    Name  : \", self.__name)\n        print(\"Price : \", self.__price)\n```\n\nAs\
    \ attributes name and price are prefixed with __ (double underscore) they are\
    \ to be treated as private members of the class. Python will prefix classname\
    \ to those attributes.\n\nThe following code fails to access __name attribute\
    \ because its name is prefixed with class name due to **name mangling**.\n\n```\n\
    p = Product(\"Dell XPS Laptop\", 80000)\nprint(p.__name)          # will throw\
    \ error\n```\n\n```\nAttributeError : 'Product' object has no attribute '__name'\n\
    ```\n\nHowever, you can access private attributes from outside if you use _classname\
    \ as prefix as shown below:\n\n```\np = Product(\"Dell XPS Laptop\", 80000)\n\
    print(p._Product__name)\n```\n\n> NOTE: Object attribute __dict__ returns a dictionary\
    \ of attributes, where keys are attribute names and values are attribute values.\n\
    \n### STATIC METHODS AND VARIABLES\n\n- Any variable declared in the class is\
    \ called class variable. It is also known as static variable and class attribute.\n\
    - Any method created with **@staticmethod** decorator becomes static method.\n\
    - Static methods are not passed any parameter by default.\n- Static methods are\
    \ called with class name.\n- Static methods perform operations that are related\
    \ to class such as manipulating static variables.\n\n```\nclass Point:\n    #\
    \ Static attributes\n    max_x = 100\n    max_y = 50\n    def __init__(self, x,\
    \ y):\n        self.x = x\n        self.y = y\n\n    @staticmethod\n    def isvalid(x,y):\n\
    \        return x <= Point.max_x and y <= Point.max_y\n```\n\nIn order to call\
    \ a static method, we need to use classname as follows:\n\n```\nprint(Point.isvalid(10,20))\n\
    ```\n\n### CLASS METHODS\n\n- When a method in the class is decorated with `@classmethod`,\
    \ it is called as a class method.\n- Class methods are used as **factory methods**\
    \ to create and return objects of class.\n- They are always passed the class that\
    \ is invoking them, as first parameter.\n\n```\nclass Time:\n    @classmethod\n\
    \    def create(cls):\n        return cls(0,0,0)\n\n    def __init__(self,h,m,s):\n\
    \        self.h = h\n        self.m = m\n        self.s = s\n\n# create an object\n\
    t = Time.create()    # Time is passed to create()\n```\n\n### Comparison of methods\n\
    \nHere is a table listing different types of methods that can be created in a\
    \ class and their characteristics.\n\n| | Instance Method | Static Method | Class\
    \ Method |\n|---|---|---|---|\n| Decorator used | None | @staticmethod | @classmethod\
    \ |\n| Invoked by | Object | Classname | Classname |\n| Must return | None | None\
    \ | An object |\n| Mandatory param | Self | None | Class |\n\n## BUILT-IN FUNCTIONS\
    \ RELATED TO ATTRIBUTES\n\n- It is possible to create new attributes any time\
    \ by just assigning value to attribute using an object.\n- If class name is used\
    \ with attribute, it becomes class attribute.\n- If object is used with attribute,\
    \ it becomes object attribute.\n- We can also use the following predefined methods\
    \ to manipulate attributes of class or object.\n\n| Function | Meaning |\n| ---\
    \ | --- |\n| getattr(object, name [, default]) | Returns the value of the named\
    \ attribute of object If attribute is found otherwise returns default value, if\
    \ given, else raises error. |\n| hasattr(object, name) | Returns True if object\
    \ has the attribute. |\n| setattr(object, name, value) | Creates or modifies an\
    \ attribute with the given value. |\n| delattr(object, name) | Deletes the specified\
    \ attribute from the given object. |\n\n```\nclass Product:\n    tax = 10\n  \
    \  def __init__(self, name):\n        self.name = name\n```\n\n```\n>>> p = Product(\"\
    iPad Air 2\")\n>>> getattr(p, 'qoh', 0)\n0\n>>> setattr(p, 'price', 45000)\n>>>\
    \ hasattr(p, 'price')\nTrue\n>>> delattr(p, 'price')\n>>> hasattr(p, 'price')\n\
    False\n```\n\n### BUILT-IN CLASS ATTRIBUTES\n\nEvery Python class has the following\
    \ built-in attributes.\n\n| Attribute | Description |\n|---|---|\n| __dict__ |\
    \ Dictionary containing the members. |\n| __doc__ | Class documentation string\
    \ or none, if undefined. |\n| __name__ | Class name. |\n| __module__ | Module\
    \ name in which the class is defined. This attribute is \"__main__\" when module\
    \ is run as a script. |\n| __bases__ | A tuple containing the base classes, in\
    \ the order of their occurrence in the base class. |\n\n```\n>>> Product.__module__\n\
    '__main__'\n>>> Product.__bases__\n(<class 'object'>,)\n>>> Product.__dict__\n\
    mappingproxy({'__module__': '__main__', 'tax': 10, '__init__': <function Product.__init__\
    \ at 0x00000269FF186280>, '__dict__': <attribute '__dict__' of 'Product' objects>,\
    \ '__weakref__': <attribute '__weakref__' of 'Product' objects>, '__doc__': None})\n\
    ```"
  mdcn: "## PIP 与 PyPI\n\n- PyPI（Python 包索引）是一个 Python 包的仓库。\n- 网址 https://pypi.org/\
    \ 列出了所有可供下载和使用的 Python 包。\n- PIP 是一个通用的 Python 包安装工具。\n- 从 **python\\scripts**\
    \ 文件夹运行 **pip.exe**。\n\n以下是 PIP 提供的一些重要选项：\n\n```\n>pip install requests     #\
    \ 安装 requests 包\n>pip uninstall requests   # 卸载 requests 包\n>pip list        \
    \         # 列出所有已安装的包\n```\n\n```\n>pip show requests\nName: requests\nVersion:\
    \ 2.27.1\nSummary: Python HTTP for Humans.\nHome-page: https://requests.readthedocs.io\n\
    Author: Kenneth Reitz\nAuthor-email: me@kennethreitz.org\nLicense: Apache 2.0\n\
    Location: c:\\python\\lib\\site-packages\nRequires: certifi, charset-normalizer,\
    \ idna, urllib3\nRequired-by:\n```\n\n## 类\n\n- 一个类封装了数据（数据属性）和代码（方法）。\n- 创建一个新类会创建一个新的*类型*，允许创建该类型的新*实例*。\n\
    - 数据属性无需声明；就像局部变量一样，它们在第一次被赋值时就会出现。\n- 类的*实例化*使用函数表示法。只需将类对象视为一个无参数函数，该函数返回类的一个新实例。\n\
    - 方法的特殊之处在于，实例对象会作为函数的第一个参数（称为 self）传递。\n\n```\nclass className:\n    definition\n\
    ```\n\n### __init__ 方法\n\n- 当一个类定义了 __init__() 方法时，类的实例化会自动为新创建的类实例调用 __init__()。\n\
    - 传递给类实例化运算符的参数会传递给 __init__()。\n\n![](img/6dd1124ad0340c1e75e84cf487013a5c_84_0.png)\n\
    \n```\nclass Product:\n    def __init__(self, name, price):\n        # 对象属性\n\
    \        self.name = name\n        self.price = price\n\n    def print_details(self):\n\
    \        print(\"Name  : \", self.name)\n        print(\"Price : \", self.price)\n\
    \np = Product(\"Dell XPS Laptop\",80000)  # 创建对象\np.print_details()\n```\n\n###\
    \ 私有成员（名称修饰）\n\n- Python 没有私有变量的概念。\n- 然而，大多数 Python 程序员遵循的一个惯例是，以单下划线（_attribute）或双下划线（__attribute）为前缀的属性应被视为\
    \ API 的非公共（分别为受保护和私有）部分。\n- 任何形如 __attribute（两个前导下划线）的标识符在文本上会被替换为 _classname__attribute，其中\
    \ classname 是当前类名。这个过程称为名称修饰。\n- 例如，Employee 类中的 __salary 会变成 _Employee__salary。\n\
    - 但是，仍然可以从类外部访问或修改被认为是私有的变量。\n\n| 名称    | 表示法 | 行为 |\n|---------|----------|-----------|\n\
    | name    | 公有   | 可以从内部和外部访问。 |\n| _name   | 受保护 | 类似于公有成员，但不应从外部直接访问。 |\n| __name\
    \  | 私有  | 无法从外部看到和访问。 |\n\n```\nclass Product:\n    def __init__(self, name,\
    \ price):\n        self.__name = name\n        self.__price = price\n\n    def\
    \ print_details(self):\n        print(\"Name  : \", self.__name)\n        print(\"\
    Price : \", self.__price)\n```\n\n由于属性 name 和 price 以 __（双下划线）为前缀，它们应被视为类的私有成员。Python\
    \ 会为这些属性添加类名前缀。\n\n以下代码无法访问 __name 属性，因为由于**名称修饰**，其名称被添加了类名前缀。\n\n```\np = Product(\"\
    Dell XPS Laptop\", 80000)\nprint(p.__name)          # 将抛出错误\n```\n\n```\nAttributeError\
    \ : 'Product' object has no attribute '__name'\n```\n\n但是，如果使用 _classname 作为前缀，您可以从外部访问私有属性，如下所示：\n\
    \n```\np = Product(\"Dell XPS Laptop\", 80000)\nprint(p._Product__name)\n```\n\
    \n> 注意：对象属性 __dict__ 返回一个属性字典，其中键是属性名，值是属性值。\n\n### 静态方法和变量\n\n- 在类中声明的任何变量都称为类变量。它也称为静态变量和类属性。\n\
    - 使用 **@staticmethod** 装饰器创建的任何方法都成为静态方法。\n- 默认情况下，静态方法不会传递任何参数。\n- 静态方法使用类名调用。\n\
    - 静态方法执行与类相关的操作，例如操作静态变量。\n\n```\nclass Point:\n    # 静态属性\n    max_x = 100\n\
    \    max_y = 50\n    def __init__(self, x, y):\n        self.x = x\n        self.y\
    \ = y\n\n    @staticmethod\n    def isvalid(x,y):\n        return x <= Point.max_x\
    \ and y <= Point.max_y\n```\n\n为了调用静态方法，我们需要使用类名，如下所示：\n\n```\nprint(Point.isvalid(10,20))\n\
    ```\n\n### 类方法\n\n- 当类中的方法用 `@classmethod` 装饰时，它被称为类方法。\n- 类方法用作**工厂方法**来创建和返回类的对象。\n\
    - 它们总是将调用它们的类作为第一个参数传递。\n\n```\nclass Time:\n    @classmethod\n    def create(cls):\n\
    \        return cls(0,0,0)\n\n    def __init__(self,h,m,s):\n        self.h =\
    \ h\n        self.m = m\n        self.s = s\n\n# 创建一个对象\nt = Time.create()   \
    \ # Time 被传递给 create()\n```\n\n### 方法比较\n\n下表列出了可以在类中创建的不同类型的方法及其特征。\n\n| | 实例方法\
    \ | 静态方法 | 类方法 |\n|---|---|---|---|\n| 使用的装饰器 | 无 | @staticmethod | @classmethod\
    \ |\n| 调用者 | 对象 | 类名 | 类名 |\n| 必须返回 | 无 | 无 | 一个对象 |\n| 必需参数 | Self | 无 | 类 |\n\
    \n## 与属性相关的内置函数\n\n- 可以随时通过使用对象为属性赋值来创建新属性。\n- 如果类名与属性一起使用，它就成为类属性。\n- 如果对象与属性一起使用，它就成为对象属性。\n\
    - 我们也可以使用以下预定义方法来操作类或对象的属性。\n\n| 函数 | 含义 |\n| --- | --- |\n| getattr(object, name\
    \ [, default]) | 返回对象的指定属性的值。如果找到属性，否则返回默认值（如果提供），否则引发错误。 |\n| hasattr(object,\
    \ name) | 如果对象具有该属性，则返回 True。 |\n| setattr(object, name, value) | 使用给定值创建或修改属性。\
    \ |\n| delattr(object, name) | 从给定对象中删除指定的属性。 |\n\n```\nclass Product:\n    tax\
    \ = 10\n    def __init__(self, name):\n        self.name = name\n```\n\n```\n\
    >>> p = Product(\"iPad Air 2\")\n>>> getattr(p, 'qoh', 0)\n0\n>>> setattr(p, 'price',\
    \ 45000)\n>>> hasattr(p, 'price')\nTrue\n>>> delattr(p, 'price')\n>>> hasattr(p,\
    \ 'price')\nFalse\n```\n\n### 内置类属性\n\n每个 Python 类都有以下内置属性。\n\n| 属性 | 描述 |\n|---|---|\n\
    | __dict__ | 包含成员的字典。 |\n| __doc__ | 类文档字符串，如果未定义则为 none。 |\n| __name__ | 类名。\
    \ |\n| __module__ | 定义类的模块名。当模块作为脚本运行时，此属性为 \"__main__\"。 |\n| __bases__ | 包含基类的元组，按其在基类中出现的顺序排列。\
    \ |\n\n```\n>>> Product.__module__\n'__main__'\n>>> Product.__bases__\n(<class\
    \ 'object'>,)\n>>> Product.__dict__\nmappingproxy({'__module__': '__main__', 'tax':\
    \ 10, '__init__': <function Product.__init__ at 0x00000269FF186280>, '__dict__':\
    \ <attribute '__dict__' of 'Product' objects>, '__weakref__': <attribute '__weakref__'\
    \ of 'Product' objects>, '__doc__': None})\n```"
