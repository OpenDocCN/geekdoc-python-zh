    +   - Use CTRL-Z or exit() to end interpreter and come back to command prompt.

    - The interpreter’s line-editing features include interactive editing, history
    substitution and code completion on systems that support reading line.


    # INTERACTIVE MODE


    +   - When commands are read from keyboard, the interpreter is said to be in *interactive
    mode*.

    - It prompts for the next command with the *primary prompt*, usually three greater-than
    signs (>>>); for continuation lines it prompts with the *secondary prompt*, by
    default three dots (...).

    - In the interactive interpreter, the output string is enclosed in quotes and
    special characters are escaped with backslashes.

    - The *print()* function produces a more readable output, by omitting the enclosing
    quotes and by printing escape and special characters.

    - Two or more *string literals* (i.e. the ones enclosed between quotes) next to
    each other are automatically concatenated.'
  - '[PAGE 15]


    # VARIABLES


    +   - Python is a dynamic language where variable is created by directly assigning
    value to it.

    - Based on the value assigned to a variable, its datatype is determined.

    - Built-in function **type** () can be used to find out the type of a variable.


    ```

    >>> a = 10

    >>> type(a)

    <class ''int''>

    >>> b = "Python"

    >>> type(b)

    <class ''str''>

    >>>

    ```


    > **NOTE:** We can find out data type of any variable using type () built-in function.


    # RULES FOR IDENTIFIER


    While creating names for variables, function and other identifiers, we need to
    follow the rules given below:


    +   - Can contain 0-9, a-z, A-Z and underscore

    - Cannot start with a digit

    - Length is unlimited

    - Case is significant'
  - '[PAGE 16]


    # OPERATORS


    The following are different types of operators available in Python.


    # Assignment operator (=)


    +   - Assignment operator is used to assign a value to a variable.

    - It creates variables if not already present otherwise it changes its current
    value.

    - It is possible to assign multiple values to multiple variables in single assignment
    statement.


    ```

    >>> # create variables

    >>> a = 10

    >>> b = 20.50

    >>>

    >>> # Assign multiple values to multiple variables

    >>> a, b = 0, 1

    >>>

    >>> # swap two variables

    >>> a, b = b, a

    >>>

    >>> # Assign 10 to a, b and c

    >>> a = b = c = 10

    ```'
  - '[PAGE 17]


    # Arithmetic Operators


    The following are available arithmetic operators:


    | Operator | Meaning |

    | --- | --- |

    | + | Addition |

    | - | Subtraction |

    | * | Multiplication |

    | ** | Exponentiation |

    | / | Division |

    | // | Integer Division |

    | % | Modulus |


    ```

    >>> a, b = 10, 4

    >>> a / b, a // b

    (2.5, 2)

    >>> a ** b

    10000

    >>> a % 4

    2

    ```'
  - '[PAGE 18]


    # Relational Operators


    The following relational operators are available to compare values:


    | Operator | Meaning |

    |----------|------------------|

    | <        | Less than |

    | >        | Greater than |

    | <=       | Less than or equal to |

    | >=       | Greater than or equal to |

    | ==       | Equal to |

    | !=       | Not equal to |


    ```

    >>> a = 10

    >>> b = 20

    >>> a < b

    True

    >>> a == b

    False

    >>> s1 = "Abc"

    >>> s2 = "ABC"

    >>> s1 > s2

    True

    >>> s1 == s2

    False

    >>> s1 > s2

    True

    ```'
  - '[PAGE 19]


    # Logical Operators


    The following are logical operators used to combine conditions:


    | Operator | Meaning |

    | :--- | :--- |

    | **and** | Anding |

    | **or** | Oring |

    | **not** | Negates condition |


    ```

    >>> a, b, c = 10, 20, 30

    >>> a < b and a < c

    True

    >>> a < b < c    # same as a < b and b < c

    True

    >>> a != b or b != c

    True

    ```


    > **NOTE:** The Boolean operators **and** & **or** are known as *short-circuit
    operators* - their arguments are evaluated from left to right, and evaluation
    stops as soon as the outcome is determined.'
  - '[PAGE 20]


    # # BUILT-IN DATA TYPES


    The following are built-in data types in Python.


    | Data Type | Meaning |

    |---|---|

    | None | There is a single object with this value. This object is accessed through
    the built-in name **None**. It is used to signify the absence of a value in many
    situations, e.g., it is returned from functions that don’t explicitly return anything.
    Its truth value is false. |

    | NotImplemented | There is a single object with this value. This object is accessed
    through the built-in name ***NotImplemented***. Numeric methods and rich comparison
    methods should return this value if they do not implement the operation for the
    operands provided. Its truth value is true. |

    | Integers (int) | These represent numbers in an unlimited range, subject to available
    (virtual) memory only. |

    | Booleans (bool) | These represent the truth values *False* and *True*. The two
    objects representing the values False and True are the only Boolean objects. The
    Boolean type is a subtype of the integer type, and Boolean values behave like
    the values 0 (False) and 1 (True), respectively, in almost all contexts, the exception
    being that when converted to a string, the strings "False" or "True" are returned,
    respectively. |

    | Real (float) | These represent machine-level double precision floating point
    numbers. You are at the mercy of the underlying machine architecture for the accepted
    range and handling of overflow. Python does not support single-precision floating
    point numbers. |'
  - '[PAGE 21]


    | Complex (complex) | These represent complex numbers as a pair of machine-level
    double precision floating point numbers. |

    | String (str) | A string is a sequence of values that represent Unicode codes.
    |

    | Tuple (tuple) | The items of a tuple are arbitrary Python objects. Tuples of
    two or more items are formed by comma-separated lists of expressions. |

    | Bytes (bytes) | A bytes object is an immutable array. The items are 8-bit bytes,
    represented by integers in the range 0 <= x < 256. |

    | List (list) | The items of a list are arbitrary Python objects. Lists are formed
    by placing a comma-separated list of expressions in square brackets. |

    | Byte Array (bytearray) | A bytearray object is a mutable array. They are created
    by the built-in bytearray() constructor. |

    | Set (set) | These represent a mutable set of unique values created by set()
    constructor. |

    | Frozen set (frozenset) | These represent an immutable set created by built-in
    frozenset() constructor. |

    | Dictionary (dict) | These represent finite sets of objects indexed by nearly
    arbitrary values. |'
- md: "# KEYWORDS\n\nThe following are important keywords in Python.\n\n| False |\
    \ class | finally | is | return |\n| None | continue | for | lambda | try |\n\
    | True | def | from | nonlocal | while |\n| and | del | global | not | with |\n\
    | as | elif | if | or | yield |\n| assert | else | import | pass | break |\n|\
    \ except | in | raise | | |\n\n# BUILT-IN FUNCTIONS\n\nThe following are built-in\
    \ functions in Python.\n\n| Function | Meaning |\n|---|---|\n| abs(x) | Returns\
    \ the absolute value of a number. |\n| all(iterable) | Returns True if all elements\
    \ of the iterable are true (or if the iterable is empty). |\n| any(iterable) |\
    \ Returns True if any element of the iterable is true. If the iterable is empty,\
    \ returns False. |\n| bin(x) | Converts an integer number to a binary string prefixed\
    \ with “0b”. |\n| chr(i) | Returns the string representing a character whose Unicode\
    \ code point is the integer i. |\n| dir([object]) | Without arguments, returns\
    \ the list of names in the current local scope. With an argument, attempts to\
    \ return a list of valid attributes for that object. |\n| filter(function, iterable)\
    \ | Constructs an iterator from those elements of iterable for which function\
    \ returns true. |\n| format(value[, format_spec]) | Converts a value to a “formatted”\
    \ representation, as controlled by format_spec. |\n| getattr(object, name[, default])\
    \ | Returns the value of the named attribute of object. |\n| hex(x) | Converts\
    \ an integer number to a lowercase hexadecimal string prefixed with “0x”. |\n\
    | id(object) | Returns the “identity” of an object. This is an integer which is\
    \ guaranteed to be unique and constant for this object during its lifetime. |\n\
    | len(s) | Returns the length (the number of items) of an object. |\n| `max(iterable)`<br>`max(arg1,\
    \ arg2, *args)` | Returns the largest item in an iterable or the largest of two\
    \ or more arguments. |\n| `input([prompt])` | If the prompt argument is present,\
    \ it is written to standard output without a trailing newline. The function then\
    \ reads a line from input, converts it to a string (stripping a trailing newline),\
    \ and returns that. When EOF is read, EOFError is raised. |\n| `min(iterable)`<br>`min(arg1,\
    \ arg2, *args)` | Returns the smallest item in an iterable or the smallest of\
    \ two or more arguments. |\n| `oct(x)` | Converts an integer number to an octal\
    \ string prefixed with “0o”. |\n| `ord(c)` | Given a string representing one Unicode\
    \ character, returns an integer representing the Unicode code point of that character.\
    \ |\n| `print(*objects, sep=' ', end='\\n', file=sys.stdout, flush=False)` | Prints\
    \ objects to the text stream file, separated by sep and followed by end. sep,\
    \ end, file and flush, if present, must be given as keyword arguments. |\n| `reversed(seq)`\
    \ | Returns a reverse iterator. |\n| `round(number[, ndigits])` | Returns number\
    \ rounded to ndigits precision after the decimal point. |\n| `sorted(iterable,\
    \ *, key=None, reverse=False)` | Returns a new sorted list from the items in iterable.\
    \ |\n| `sum(iterable[, start])` | Sums start and the items of an iterable from\
    \ left to right and returns the total. start defaults to 0. |\n| `type(object)`\
    \ | With one argument, returns the type of an object. |\n\n```\npython\n>>> abs(-10)\n\
    10\n>>> bin(10)\n'0b1010'\n>>> chr(65)        # char for ascii code\n'A'\n>>>\
    \ a = 10\n>>> id(a)        # Address of the object\n140728047310784\n>>> max(10,\
    \ 20, 30)\n30\n>>> ord('a')        # Ordinal value (ascii code)\n97\n>>> round(10.566)\n\
    11\n>>> type(True)\n<class 'bool'>\n>>>\n```\n\n# FUNCTION INPUT()\n\n- Built-in\
    \ function **input()** is used to take input from user.\n- It always returns a\
    \ string, so we need to convert it to required type using other built-in functions\
    \ like **int()**.\n\n```\n>>> num = int(input(\"Enter a number :\"))\nEnter a\
    \ number :25\n>>> print(\"Square of\", num, \"is\", num * num)\nSquare of 25 is\
    \ 625\n>>>\n```\n\n# Using print() function\n\n- Built-in function print() is\
    \ used to print one or more values.\n- It is possible to specify separator and\
    \ end characters.\n\n```\n>>> print(1, 2, 3)\n1 2 3\n>>> print(1, 2, 3, sep =\
    \ '-')\n1-2-3\n>>> print(1, 2, 3, end = '\\n\\n')\n1 2 3\n>>> print(\"Python\"\
    , 3.10, sep= \" - \", end = \"\\n\\n\")\nPython - 3.10\n>>>\n```\n\n# Formatted\
    \ output\n\n- It is possible to print formatted output using % with conversion\
    \ characters like %d and %s.\n- Method **format()** of string can be used to format\
    \ output. String on which this method is called can contain literal text or replacement\
    \ fields delimited by braces {}.\n- Each replacement field contains either the\
    \ numeric index of a positional argument, or the name of a keyword argument. Returns\
    \ a copy of the string where each replacement field is replaced with the string\
    \ value of the corresponding argument.\n\n```\nstr % (values)\n```\n\n```\nstr.format(*args,\
    \ **kwargs)\n```\n\n```\n>>> name = \"Srikanth\"\n>>> mobile = \"9059057000\"\n\
    >>> print(\"%s %s\" % (name, mobile))\nSrikanth 9059057000\n>>> print(\"Name =\
    \ {0}\".format(name))\nName = Srikanth\n>>> print(\"Name = {}, Mobile = {}\".format(name,\
    \ mobile))\nName = Srikanth, Mobile = 9059057000\n>>> print(\"{name} {ver}\".format(name=\"\
    Python\", ver=3.10))\nPython 3.10\n>>>\n```\n\n# The f-string\n\n- F-string is\
    \ a string prefixed with f and inserts values of variables when variables are\
    \ enclosed in {} inside the string.\n- New feature of Python 3.6.\n\n```\n>>>\
    \ name = \"Srikanth\"\n>>> lang = \"Python\"\n>>> f\"{name} is a {lang} trainer\"\
    \n'Srikanth is a Python trainer'\n```\n\nIt is possible to format values as follows:\n\
    \n```\n>>> mode = \"Cash\"\n>>> amount = 251.567\n>>> print(f\"{mode:10} {amount:8.2f}\
    \ {amount*0.20:5.2f}\")\nCash        251.57  50.31\n>>> f\"{10000.00:8.2}\"\n\
    '   1e+04'\n```\n\n> NOTE: In format specifier, 8.2 means; total columns including\
    \ decimal point is 8 and 2 digits after decimal point. Char f means fixed format,\
    \ otherwise it uses E format.\n\n# THE IF STATEMENT\n\n- It is used for conditional\
    \ execution.\n- It selects exactly one of the suites by evaluating the expressions\
    \ one by one until one is found to be true.\n- There can be zero or more elif\
    \ parts, and the else part is optional.\n\n```\nif boolean_expression:\n    statements\n\
    [elif boolean_expression:\n    statements] ...\n[else:\n    statements]\n```\n\
    \n```\nif a > b:\n    print(a)\nelse:\n    print(b)\n```\n\n```\nif a > 0:\n \
    \   print(\"Positive\")\nelif a < 0:\n    print(\"Negative\")\nelse:\n    print(\"\
    Zero\")\n```\n\n# CONDITIONAL EXPRESSION\n\n- It returns either true value or\
    \ false value depending on the condition.\n- If condition is true then it returns\
    \ true_value otherwise it returns false_value.\n\n```\ntrue_value if condition\
    \ else false_value\n```\n\n```\n>>> a = 10\n>>> b = 20\n>>> a if a > b else b\n\
    20\n```\n\n# THE WHILE LOOP\n\nThe while statement is used for repeated execution\
    \ as long as the boolean expression is true.\n\n```\nwhile boolean_expression:\n\
    \    statements\n[else:\n    statements]\n```\n\n> NOTE: The else part of while\
    \ is executed only when loop is terminated normally, i.e. without break statement.\n\
    \n```\n# Program to print numbers from 1 to 10\ni = 1\nwhile i <= 10:\n    print(i)\n\
    \    i += 1\n```\n\n```\n# Program to print digits in a number in reverse order\n\
    num = int(input(\"Enter a number :\"))\nwhile num > 0:\n    digit = num % 10 \
    \  # Take rightmost digit\n    print(digit)\n    num = num // 10    # Remove rightmost\
    \ digit\n```\n\n# THE RANGE() FUNCTION\n\n- We can use range() function to generate\
    \ numbers between the given start and end (exclusive).\n- If you do need to iterate\
    \ over a sequence of numbers, the built-in function range() comes in handy. It\
    \ generates arithmetic progressions.\n- In many ways the object returned by range()\
    \ behaves as if it is a list, but in fact it isn't. It is an object which returns\
    \ the successive items of the desired sequence when you iterate over it, but it\
    \ doesn't really make the list, thus saving space.\n\n```\nrange([start,] end\
    \ [, step])\n```\n\nIf start is not given then 0 is taken, if step is not given\
    \ then 1 is taken.\n\n```\nrange (10)                 # will produce 0 to 9\n\
    range (1, 10, 2)            # will produce 1,3,5,7,9\n```\n\n# THE PASS STATEMENT\n\
    \nThe pass statement does nothing. It can be used when a statement is required\
    \ syntactically but the program requires no action."
