    # MODULES


    +   - A module is a file containing Python definitions (functions and classes)
    and statements.

    - It can be used in a script (another module) or in an interactive instance of
    the interpreter.

    - A module can be *imported* into other modules or run as a script.

    - The file name is the module name with the suffix .py appended. Within a module,
    the module''s name (as a string) is available as the value of the global variable
    __name__.

    - A module can contain executable statements as well as function and class definitions.
    These statements are intended to initialize the module. They are executed only
    the *first* time the module name is encountered in an import statement.


