    \n# 继承\n\n- 当从现有类创建新类时，称为继承。它使我们能够在创建新类的同时重用现有类。\n- 新类可以从*一个或多个*现有类创建。\n- 如果在类中找不到请求的属性，则搜索将继续在基类中查找。如果基类本身派生自其他类，则此规则将递归应用。\n\
    - 新类称为**子类**，被继承的类称为**超类**。\n- 子类可以**重写**超类的方法，以增强或更改超类方法的功能。\n- 函数 **super()**\
