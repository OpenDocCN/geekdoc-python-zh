  - "[PAGE 113]\n\n# THE ITERATOR\n\n+   - An iterator is an object representing a\
    \ stream of data; this object returns the data one element at a time.\n- Several\
    \ of Python’s built-in data types support iteration, the most common being lists\
    \ and dictionaries.\n- An object is called **iterable** if you can get an **iterator**\
    \ for it.\n- Method **iter()** of an object returns iterator object that defines\
    \ \\_\\_next\\_\\_() method.\n- Method \\_\\_next\\_\\_() is used to return next\
    \ element and raises **StopIteration** exception when there are no more elements\
    \ to return.\n\nThe following example shows how **list** class provides **list_iterator**\
    \ to iterate over elements of list.\n\n```\n\n>>> l = [1, 2, 3]\n>>> li = iter(l)\n\
    >>> type(l), type(li)\n(<class 'list'>, <class 'list_iterator'>)\n>>> next(li)\n\
    1\n>>> next(li)\n2\n>>> next(li)\n3\n>>> next(li)\nTraceback (most recent call\
    \ last):\n  File \"<stdin>\", line 1, in <module>\nStopIteration\n>>>\n```"
- md: "An **iterable** class is the one that provides `__iter__()` method, which returns\
    \ an object **iterator** class that provides `__next__()` method to return one\
    \ element at a time.\n\n![](img/6dd1124ad0340c1e75e84cf487013a5c_114_0.png)\n\n\
    In the following example **Marks** is an iterable class that provides **Marks_Iterator**\
    \ class to iterate over it.\n\n```python\nclass Marks_Iterator:\n    def __init__(self,\
    \ marks):\n        self.marks = marks\n        self.pos = 0\n\n    def __next__(self):\n\
    \        if self.pos == len(self.marks):\n            raise StopIteration\n  \
    \      else:\n            value = self.marks[self.pos]\n            self.pos +=\
    \ 1      # move to next element\n            return value\n\nclass Marks:\n  \
    \  def __init__(self):\n        self.marks = [20, 30, 40, 25, 66]\n\n    def __iter__(self):\n\
    \        return Marks_Iterator(self.marks)\n```\n\nIt is possible to use an object\
    \ of Marks as an iterable with for loop.\n\n```python\nm = Marks()\nfor v in m:\n\
    \    print(v)\n```\n\n## THE GENERATOR\n\n- Generator is a simple and powerful\
    \ tool for creating iterators.\n- They are written like regular functions but\
    \ use the **yield** statement whenever they want to return data.\n- Each time\
    \ **next()** is called on it, the generator resumes where it left off.\n- Generator\
    \ can be thought of as resumable function.\n- Generator can be used where iterable\
    \ is needed.\n\n```python\ndef leap_years(start, end):\n    for year in range(start,\
    \ end + 1):\n        if year % 4 == 0 and year % 100 != 0 \\\n               \
    \           or year % 400 == 0:\n            yield year\n\ndef alphabets(st):\n\
    \    for ch in st:\n        if ch.isalpha():\n            yield ch\n\n# Get all\
    \ leap years in the range 2000 and 2050\nfor year in leap_years(2000, 2050):\n\
    \    print(year)\n\n# Get all alphabets from the given string\nfor ch in alphabets\
    \ (\"Python 3.10 version\"):\n    print (ch, end=' ')\n```\n\n## Generator Expression\n\
    \nGenerator expression creates a generator object that returns a value at a time.\n\
    \n```\n(expression for expr in sequence if condition)\n```\n\n```\n>>> st = \"\
    Python 3.10\"\n>>> digits = (ch for ch in st if ch.isdigit())\n>>> digits\n<generator\
    \ object <genexpr> at 0x0000026347C520B0>\n>>> for d in digits:\n...     print(d)\n\
    ...\n3\n1\n0\n>>>\n```\n\n## FILE HANDLING\n\nThe following are important functions\
    \ related to file handling.\n\n### Function open()\n\nOpens the specified file\
    \ in the given mode and returns file object. If the file cannot be opened, an\
    \ OSError is raised.\n\n```python\nopen(file, mode='r')\n```\n\n| Mode | Meaning\
    \ |\n| :--- | :--- |\n| 'r' | Open for reading (default). |\n| 'w' | Open for\
    \ writing, truncating the file first. |\n| 'x' | Open for exclusive creation,\
    \ failing if the file already exists. |\n| 'a' | Open for writing, appending to\
    \ the end of the file if it exists. |\n| 'b' | Binary mode. |\n| 't' | Text mode\
    \ (default). |\n| '+' | Open a disk file for updating (reading and writing). |\n\
    \n> NOTE: Python doesn't depend on the underlying operating system's notion of\
    \ text files; all the processing is done by Python itself, and is therefore platform-independent.\n\
    \n> NOTE: When a string is prefixed with r, it is called as raw string. In raw\
    \ string, even character like \\ is treated as simple character and not escape\
    \ sequence character.\n\n```python\nf = open(r\"c:\\python\\names.txt\",\"wt\"\
    )\nnames = [\"Python\", \"C#\", \"Java\", \"JavaScript\", \"C++\"]\n\nfor name\
    \ in names:\n    f.write(name + \"\\n\")\nf.close()\n```\n\n### The with statement\
    \ (Context Manager)\n\nIt is a good practice to use the **with** keyword when\
    \ dealing with file objects. The advantage is that the file is properly closed\
    \ after its suite finishes, even if an exception is raised at some point.\n\n\
    ```\nwith expression [as variable]:\n    with-block\n```\n\nBy using parentheses,\
    \ we can have multiple lines in context managers.\n\n```\nwith\n(   open(\"a.txt\"\
    , \"r\") as file1,\n    open(\"b.txt\", \"r\") as file2\n):\n    print(\"Do something!\"\
    )\n```\n\n## File object\n\nFile object represents an open file. Built-in function\
    \ open() returns File object on success.\n\nThe following are important attributes\
    \ of file object.\n\n| Attribute | Meaning |\n|-----------|---------|\n| file.closed\
    \ | Returns true if file is closed, false otherwise. |\n| file.mode | Returns\
    \ access mode with which file was opened. |\n| file.name | Returns name of the\
    \ file. |\n\nThe following are important methods of File object.\n\n| Method |\
    \ Meaning |\n|--------|---------|\n| read([count]) | Reads everything until end\
    \ of file unless count is specified, otherwise only count number of chars. |\n\
    | readline() | Reads a single line. Returns empty string on EOF. |\n| readlines()\
    \ | Reads all lines and returns a list of lines. |\n| close() | Closes and flushes\
    \ content to file. |\n| write(value) | Writes the given content to file. |\n|\
    \ tell() | Returns current position of file. |\n| seek(offset, base) | Takes file\
    \ pointer to the required location from the given base. |\n\nThe following program\
    \ displays all lines along with line numbers.\n\n```python\nwith open(r\"c:\\\
    python\\names.txt\", \"r\") as f:\n    for idx, name in enumerate(f.readlines(),\
    \ start = 1):\n        print(f\"{idx:03} : {name.strip()}\")\n```\n\nNOTE: While\
    \ reading lines from file, readlines() reads line along with new line (\\n) character\
    \ at the end of the line.\n\nUse strip() function of str class to get rid of it,\
    \ if necessary.\n\nThe following program displays all customer names and phone\
    \ numbers in the sorted order of customer name by reading data from phones.txt,\
    \ which is given below:\n\n```\nSteve,9339933390\nJason,3939101911\nBen,2939991113\n\
    George,3939999999\nLarry\nEllison,39393999393\n```\n\n```python\nf = open(\"phones.txt\"\
    ,\"rt\")\nphones = {}      # Empty dictionary\nfor line in f:\n    # Split line\
    \ into two parts - name and phone\n    parts = line.split(\",\")\n\n    # Ignore\
    \ line if it doesn't contain 2 parts\n    if len(parts) != 2:\n        continue\n\
    \n    # Add entry to dictionary\n    phones[parts[0]]= parts[1].strip()\n\n# sort\
    \ by names and print along with phone number\nfor name,phone in sorted(phones.items()):\n\
    \    print(f\"{name:20} - {phone}\")\n```\n\n## PICKLE – PYTHON OBJECT SERIALIZATION\n\
    \n- The pickle module is used to serialize and de-serialize Python objects.\n\
    - It provides methods like **dump()** for pickling and **load()** for unpickling.\n\
    - It uses binary protocol.\n\n![](img/6dd1124ad0340c1e75e84cf487013a5c_122_0.png)\n\
    \nThe following are functions in pickle module.\n\n| Function | Meaning |\n| :---\
    \ | :--- |\n| dump(obj, file) | Writes a pickled representation of obj to the\
    \ open file object *file*. |\n| dumps(obj) | Returns the pickled representation\
    \ of the object as a bytes object, instead of writing it to a file. |\n| load(file)\
    \ | Reads a pickled object representation from the open file object *file* and\
    \ returns the reconstituted object hierarchy specified therein. |\n| loads(bytes_object)\
    \ | Reads a pickled object hierarchy from a bytes object and returns the reconstituted\
    \ object hierarchy specified therein. |\n\n```python\nimport pickle\nclass Person:\n\
    \    def __init__(self, name, email):\n        self.name = name\n        self.email\
    \ = email\n    def __str__(self):\n        return f\"{self.name}-{self.email}\"\
    \n\n\nf = open(\"person.dat\", \"wb\")\np1 = Person(\"Srikanth\", \"srikanthpragada@yahoo.com\"\
    )\npickle.dump(p1, f)                # pickle object\nprint(\"Dumped object to\
    \ file!\")\nf.close()\n```\n\nThe following program opens person.dat and retrieves\
    \ (unpickles) object pickled to it.\n\n```python\n# Unpickle object from person.dat\n\
    f = open(\"person.dat\", \"rb\")\np1 = pickle.load(f)\nprint(p1)\n```\n\n## JSON\
    \ MODULE\n\n- JSON module allows serializing and deserializing object to and from\
    \ JSON format.\n- JSON stands for JavaScript Object Notation.\n- It converts a\
    \ dict in Python to JSON object.\n- It converts a JSON object back to dict object\
    \ in Python.\n- JSON array is converted to Python list, which contains dict as\
    \ elements.\n- Any Python iterable is converted to JSON array.\n\nThe following\
    \ are methods available in json module:\n\n```\ndump(object, file)\ndumps(object)\n\
    Load(file)\nLoads(str)\n```\n\n```python\nimport json\n\nclass Contact:\n    def\
    \ __init__(self, name, phone, email):\n        self.name = name\n        self.phone\
    \ = phone\n        self.email = email\n\nc = Contact(\"Srikanth\",\n         \
    \  \"9059057000\",\n           \"contact@srikanthtechnologies.com\")\nprint(json.dumps(c.__dict__))\n\
    ```"
