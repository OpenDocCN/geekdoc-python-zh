    # # THE LIST DATA STRUCTURE


    +   - Represents a list of values.

    - Supports duplicates and maintains order of the elements.

    - List can be modified (Mutable).

    - Elements can be accessed using index.


    | Method | Meaning |

    |--------|---------|

    | append(x) | Adds an item to the end of the list. Equivalent to `a[len(a):] =
    [x]`. |

    | extend(iterable) | Extends the list by appending all the items from the iterable.
    Equivalent to `a[len(a):] = iterable`. |

    | insert(i, x) | Inserts an item at a given position. The first argument is the
    index of the element before which to insert, so `a.insert(0, x)` inserts at the
    front of the list, and `a.insert(len(a), x)` is equivalent to `a.append(x)`. |

    | remove(x) | Removes the first item from the list whose value is x. It is an
    error if there is no such item. |

    | pop([i]) | Removes the item at the given position in the list, and returns it.
    If no index is specified, `a.pop()` removes and returns the last item in the list.
    The square brackets around the i in the method signature denote that the parameter
    is optional, not that you should type square brackets at that position. |

    | clear() | Removes all items from the list. Equivalent to `del a[:]`. |

    | index(x[, start [, end]]) | Returns zero-based index in the list of the first
    item whose value is x. Raises a ValueError if there is no such item. Optional
    arguments start and end are interpreted as in the slice notation and are used
    to limit the search to a particular subsequence of the list. The returned index
    is computed relative to the beginning of the full sequence rather than the start
    argument. |'
- md: "## List Methods\n\n| Method | Description |\n|--------|-------------|\n| count(x)\
    \ | Returns the number of times x appears in the list. |\n| sort(key=None, reverse=False)\
    \ | Sorts the items of the list in place (the arguments can be used for sort customization,\
    \ see sorted() for their explanation). |\n| reverse() | Reverses the elements\
    \ of the list in place. |\n| copy() | Returns a shallow copy of the list. Equivalent\
    \ to a[:]. |\n\n```python\n>>> fruits = ['orange', 'apple', 'grape',\n...    \
    \       'banana', 'mango', 'apple']\n>>> print(fruits.count('apple'))   # count\
    \ of apple\n2\n>>> print(fruits.index('banana'))  # index of banana\n3\n>>> print(fruits.index('apple',\
    \ 3)) # search from 3rd index\n5\n>>> fruits.reverse()\n>>> print(fruits)\n['apple',\
    \ 'mango', 'banana', 'grape', 'apple', 'orange']\n>>> fruits.append('kiwi')\n\
    >>> fruits\n['apple', 'mango', 'banana', 'grape', 'apple', 'orange', 'kiwi']\n\
    >>> fruits.sort()\n>>> fruits\n['apple', 'apple', 'banana', 'grape', 'kiwi', 'mango',\
    \ 'orange']\n>>> print(fruits.pop())\norange\n```\n\n## List Comprehension\n\n\
    - List comprehensions provide a concise way to create lists.\n- A list comprehension\
    \ consists of brackets containing an expression followed by a **for** clause,\
    \ then zero or more **for** or **if** clauses.\n\n```\n[value for v in iterable\
    \ [if condition]]\n```\n\n```\n>>> [n * n for n in range(1,10)]\n[1, 4, 9, 16,\
    \ 25, 36, 49, 64, 81]\n```\n\n```\n>>> nums = [5, 3, 4, 7, 8]\n>>> [n * n for\
    \ n in nums if n % 2 == 0]\n[16, 64]\n```\n\n## The Del Statement\n\nRemoves one\
    \ or more items from the list.\n\n```\ndel item\n```\n\n```python\n>>> a = [10,\
    \ 20, 30, 40, 50]\n>>> del a[0]\n>>> a\n[20, 30, 40, 50]\n>>> del a[1:3]\n>>>\
    \ a\n[20, 50]\n>>> del a[:]\n>>> a\n[]\n>>> del a\n>>> a    # Throws error\n```\n\
    \n## Operations Related to Sequence Types\n\nSequences like str, list and tuple\
    \ support the following common operations:\n\n| Operation | Result |\n|---|---|\n\
    | x in s | True if an item of s is equal to x, else False |\n| x not in s | False\
    \ if an item of s is equal to x, else True |\n| s + t | the concatenation of s\
    \ and t |\n| s * n or n * s | equivalent to adding s to itself n times |\n| s[i]\
    \ | ith item of s, origin 0 |\n| s[i:j] | slice of s from i to j |\n| s[i:j:k]\
    \ | slice of s from i to j with step k |\n| len(s) | length of s |\n| min(s) |\
    \ smallest item of s |\n| max(s) | largest item of s |\n\n## The Tuple Data Structure\n\
    \n- A tuple consists of a number of values separated by commas.\n- Tuples are\
    \ immutable, and usually contain a heterogeneous sequence of elements that are\
    \ accessed via unpacking or indexing.\n- It is not possible to assign to the individual\
    \ items of a tuple, however it is possible to create tuples which contain mutable\
    \ objects, such as lists.\n- Membership operator **in** and **not in** can be\
    \ used to check whether an object is member of tuple.\n- A function can return\
    \ multiple values using a tuple.\n- Empty tuples are constructed by an empty pair\
    \ of parentheses; a tuple with one item is constructed by following a value with\
    \ a comma (it is not sufficient to enclose a single value in parentheses).\n\n\
    ```python\n>>> t1 = ()                                          # Empty tuple\n\
    >>> t2 = (10, )                                      # single value tuple\n>>>\
    \ t3 = (\"Python\", \"Language\", 1991)                # Tuple with 3 values\n\
    >>> t4 = ((1, 2), (10, 20))                          # Nested tuple\n>>> t1\n\
    ()\n>>> t2\n(10,)\n>>> t3\n('Python', 'Language', 1991)\n>>> t3[0]           \
    \                                 # prints first element\nPython\n>>> n, t, y\
    \ = t3                                     # Unpacking of tuple\n>>> print(n,\
    \ t, y)\nPython Language 1991\n```\n\n## Function Zip() and Enumerate()\n\n- When\
    \ looping through a sequence, the position index and corresponding value can be\
    \ retrieved at the same time using the **enumerate()** function.\n- To loop over\
    \ two or more sequences at the same time, the entries can be paired with the **zip()**\
    \ function.\n\n```\nenumerate(iterable, start=0)\n```\n\n```python\nl1 = [10,\
    \ 20, 30]\nfor i, n in enumerate(l1, start = 1):\n    print(i, n)\n```\n\nOutput\n\
    \n```\n1 10\n2 20\n3 30\n```\n\n```\nzip(*iterables, strict=False)\n```\n\nIf\
    \ **strict** is True then all iterables must be of same size, otherwise it considers\
    \ the smallest length of the given sequences.\n\n```python\nl1 = [10, 20, 30]\n\
    l2 = ['abc', 'xyz', 'pqr']\nfor fv, sv in zip(l1, l2):\n    print(fv, sv)\n```\n\
    \nOutput\n\n```\n10 abc\n20 xyz\n30 pqr\n```\n\n## Sorted() and Reversed()\n\n\
    Function **sorted()** is used to return a new sorted list of values for the given\
    \ iterable.\n\n```\nsorted(iterable, *, key=None, reverse=False)\n```\n\nNOTE:\
    \ Argument **key** is used to specify a function whose return value is considered\
    \ for comparison of values. More on passing function as parameter later.\n\n```\n\
    >>> l = [4, 3, 5, 1, 2]\n>>> sorted(l)\n[1, 2, 3, 4, 5]\n```\n\nFunction **reversed()**\
    \ is used to provide the iterable in reverse order.\n\n```\nreversed(iterable)\n\
    ```\n\n```\n>>> l = [4, 3, 5, 1, 2]\n>>> for n in reversed(l):\n...     print(n)\n\
    ...\n2\n1\n5\n3\n4\n```\n\n## The Set Data Structure\n\n- A set is an *unordered*\
    \ collection with *no duplicate* elements.\n- Set objects also support mathematical\
    \ operations like union, intersection, difference, and symmetric difference.\n\
    - Curly braces or the set() function can be used to create sets.\n- To create\
    \ an empty set you have to use set(), not {}; the latter creates an empty dictionary.\n\
    - Items cannot be accessed using index, i.e., not subscriptable.\n\n| Method |\
    \ Meaning |\n|---|---|\n| isdisjoint(other) | Returns True if the set has no elements\
    \ in common with other. |\n| issubset(other) or set <= other | Tests whether every\
    \ element in the set is in other. |\n| set < other | Tests whether the set is\
    \ a proper subset of other, that is, set <= other and set != other. |\n| issuperset(other)\
    \ or set >= other | Tests whether every element in other is in the set. |\n| set\
    \ > other | Tests whether the set is a proper superset of other, that is, set\
    \ >= other and set != other. |\n| union(*others) or set \\| other \\| ... | Returns\
    \ a new set with elements from the set and all others. |\n| intersection(*others)\
    \ or set & other & ... | Returns a new set with elements common to the set and\
    \ all others. |\n| difference(*others) or set - other - ... | Returns a new set\
    \ with elements in the set that are not in the others. |\n| symmetric_difference(other)\
    \ or set ^ other | Returns a new set with elements in either the set or other\
    \ but not both. |\n| update(*others) or set \\|= other | Updates the set, adding\
    \ elements from all others. |\n| add(elem) | Adds element elem to the set. |\n\
    | remove(elem) | Removes element elem from the set. Raises KeyError if elem is\
    \ not contained in the set. |\n| discard(elem) | Removes element elem from the\
    \ set if it is present. |\n| pop() | Removes and returns an arbitrary element\
    \ from the set. Raises KeyError if the set is empty. |\n| clear() | Removes all\
    \ elements from the set. |\n\n```python\n>>> langs = {\"Python\",\"Java\",\"C#\"\
    ,\"C\",\"Pascal\"}\n>>> old_langs = {\"C\",\"Pascal\",\"COBOL\"}\n>>> print(\"\
    Java\" in langs)\nTrue\n>>> letters = set(\"Python\")  # Convert str to set\n\
    >>> print(letters)\n{'t', 'o', 'h', 'y', 'P', 'n'}\n>>> print(\"Union:\", langs\
    \ | old_langs)\nUnion: {'C#', 'COBOL', 'Python', 'C', 'Java', 'Pascal'}\n>>> print(\"\
    Minus:\", langs - old_langs)\nMinus: {'C#', 'Java', 'Python'}\n>>> print(\"Intersection:\"\
    , langs & old_langs)\nIntersection: {'C', 'Pascal'}\n>>> print(\"Exclusive Or:\"\
    , langs ^ old_langs)\nExclusive Or: {'C#', 'COBOL', 'Python', 'Java'}\n```\n\n\
    ## Set Comprehension\n\nIt is used to create a set from the given iterable, optionally\
    \ based on condition.\n\n```\n{value for v in iterable [if condition]}\n```\n\n\
    ```python\n>>> st = \"abc123acdef456\"\n>>> {c for c in st if c.isalpha()}\n{'c',\
    \ 'd', 'b', 'f', 'e', 'a'}\n```\n\n## List vs. Set vs. Tuple\n\nThe following\
    \ table compares features of different data structures.\n\n| Feature | List |\
    \ Set | Tuple |\n|---|---|---|---|\n| Supports Duplicates | Yes | No | Yes |\n\
    | Mutable | Yes | Yes | No |\n| Indexable | Yes | No | Yes |\n| Insertion Order\
    \ | Yes | No | Yes |\n| Iterable | Yes | Yes | Yes |"
