    \ the requirement that the keys are unique (within one dictionary).\n- Placing\
    \ a comma-separated list of *key:value* pairs within the braces adds initial *key:value*\
    \ pairs to the dictionary.\n- It is an error to extract a value using a non-existent\
    \ key.\n- The **dict()** constructor builds dictionaries directly from sequences\
    \ of key-value pairs.\n- When looping through dictionaries, the key and corresponding\
    \ value can be retrieved at the same time using the **items()** method.\n\n```python\n\
    >>> dict1 = {\"k1\": \"Value1\", \"k2\": \"Value2\"}\n>>> print(dict1)\n{'k1':\
    \ 'Value1', 'k2': 'Value2'}\n>>> print(dict1.keys())\ndict_keys(['k1', 'k2'])\n\
    >>> for k in dict1.keys():\n...     print( k, ':', dict1[k])\n...\nk1 : Value1\n\
    k2 : Value2\n>>> print('k3' in dict1)\nFalse\n>>> # Unpack tuple returned by items()\n\
    >>> for k, v in dict1.items():\n...     print( k, ':', v)\n...\nk1 : Value1\n\
    k2 : Value2\n```\n\n| Method | Meaning |\n|--------|---------|\n| d[key] | Returns\
    \ the item of d with key *key*. Raises a KeyError if key is not in the map. |\n\
    | d[key] = value | Sets d[key] to value. |\n| del d[key] | Removes d[key] from\
    \ d. Raises a KeyError if key is not in the map. |\n| key in d | Returns True\
    \ if d has a key *key*, else False. |\n| key not in d | Equivalent to not key\
    \ in d. |\n| iter(d) | Returns an iterator over the keys of the dictionary. This\
    \ is a shortcut for iter(d.keys()). |\n| clear() | Removes all items from the\
    \ dictionary. |\n| copy() | Returns a shallow copy of the dictionary. |\n| get(key[,\
    \ default]) | Returns the value for key if key is in the dictionary, else default.\
    \ If default is not given, it defaults to None, so that this method never raises\
    \ a KeyError. |\n| items() | Returns a new view of the dictionary's items ((key,\
    \ value) pairs). |\n| keys() | Returns a new view of the dictionary's keys. |\n\
    | pop(key[, default]) | If key is in the dictionary, removes it and returns its\
    \ value, else returns default. If default is not given and key is not in the dictionary,\
    \ a KeyError is raised. |\n| setdefault(key[, default]) | If key is in the dictionary,\
    \ returns its value. If not, inserts key with a value of default and returns default.\
    \ The *default* defaults to None. |\n| update([other]) | Updates the dictionary\
    \ with the key/value pairs from other, overwriting existing keys. Returns None.\
    \ |\n| values() | Returns a new view of the dictionary's values. |\n\n## Dictionary\
    \ Comprehension\n\nIt is possible to create a dictionary by taking values from\
    \ an iterable.\n\nThe following is general syntax for dictionary comprehension.\n\
    \n```python\n{key:value for v in iterable}\n```\n\n```python\n>>> # Create a dictionary\
    \ from a list\n>>> nums = [10, 4, 55, 23, 9]\n>>> squares = {n:n*n for n in nums}\n\
    >>> print(squares)\n{10: 100, 4: 16, 55: 3025, 23: 529, 9: 81}\n>>> # Create a\
    \ dictionary from a string\n>>> name = \"Srikanth\"\n>>> codes = {ch:ord(ch) for\
    \ ch in name}\n>>> print(codes)\n{'S': 83, 'r': 114, 'i': 105, 'k': 107, 'a':\
    \ 97, 'n': 110, 't': 116, 'h': 104}\n>>>\n```\n\n## STRUCTURAL PATTERN MATCHING\n\
    \n- Structural pattern matching has been added in the form of a **match statement**\
    \ and **case statements** of patterns with associated actions.\n- A match statement\
    \ takes an **expression** and compares its value to successive **patterns** given\
    \ as one or more case blocks.\n- Patterns consist of sequences, mappings, primitive\
    \ data types as well as class instances.\n- This feature was introduced in Python\
    \ **3.10**.\n\n```python\nmatch expression:\n    case <pattern_1>:\n        <action_1>\n\
    \    case <pattern_2>:\n        <action_2>\n    case <pattern_3>:\n        <action_3>\n\
    \    case _:\n        <action_wildcard>\n```\n\n```python\n01 match code:\n02\
