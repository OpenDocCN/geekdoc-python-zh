    # MODULE SEARCH PATH


    When a module is imported, the interpreter first searches for a built-in module
    with that name. If not found, it then searches for a file named modulename.py
    in a list of directories given by the variable **sys.path**.


    The **sys.path** is initialized from the following locations:


    +   - The directory containing the input script (or the current directory when
    no file is specified).

    - PYTHONPATH (a list of directory names, with the same syntax as the shell variable
    PATH).

    - The installation-dependent default.


    ```

    >>> import sys

    >>> sys.path

    ['''', ''C:\python\python38.zip'', ''C:\python\DLLs'', ''C:\python\lib'', ''C:\python'',
    ''C:\python\lib\site-packages'']

    >>>

    ```


    # Setting PYTHONPATH


    The following example sets PYTHONPATH to a few directories so that they are added
    to module search path.


    ```

    c:\python>set PYTHONPATH=c:\dev\python;c:\dev\projects

    ```


    > **NOTE:** It is possible to add entries to **sys.path** as it is a list. Use
    **r** as prefix to indicate it is raw string so that \ (backslash) is treated
    as a normal character and not special character.


    ```

    sys.path.append(r''c:\dev\python\projects'')

    ```'
