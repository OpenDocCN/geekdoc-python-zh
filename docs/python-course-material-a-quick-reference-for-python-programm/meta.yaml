    # STRINGS


    +   - Strings can be enclosed either in single quotes or double quotes.

    - Python strings cannot be changed — they are immutable.

    - Built-in `len()` function returns length of the string.

    - Strings can be *indexed* (subscripted), with the first character having index
    0.

    - There is no separate character type; a character is simply a string of size
    one.


    +   - Indices may also be negative numbers, to start counting from the right.

    - In addition to indexing, *slicing* is also supported. While indexing is used
    to obtain individual characters, *slicing* allows you to obtain substring.

    - Slice indices have useful defaults; an omitted first index defaults to zero,
    an omitted second index defaults to the size of the string being sliced.


    ![](img/6dd1124ad0340c1e75e84cf487013a5c_36_0.png)'
