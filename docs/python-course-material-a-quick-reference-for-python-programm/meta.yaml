  md: "# # MULTITHREADING\n\n+   - Threading is a technique for decoupling tasks which\
    \ are not sequentially dependent.\n- Threads can be used to improve the responsiveness\
    \ of applications that accept user input while other tasks run in the background.\n\
    - Use `threading` module and `Thread` class to implement multi-threading.\n- In\
    \ order to create a new thread, extend `Thread` class and provide required code\
    \ in `run()` method.\n- Subclass of `Thread` class must call `Thread.__init__()`\
    \ from subclass’s `__init__()` if it overrides it in subclass.\n\n```\npython\n\
    #Create a new thread to print numbers from 1 to 10\n\nfrom threading import Thread\n\
    \nclass PrintThread(Thread):\n    def run(self):\n        for i in range(1,11):\n\
