    print("I am " + name + ". I am " + str(age) + " years old")

    -----------------------------------------------

    I am Andy. I am 20 years old

    ```


    ![](img/754e520429142dbf037b2b2434cf63fd_43_0.png)


    b) % Format: The second option is to use % formatting. But it also has its problems.
    For one, it is not readable. You would need to look at the first %s and try to
    find the corresponding variable in the list at the end. And imagine if you have
    a long list of variables that you may want to print.


    ```

    print("I am %s. I am %s years old" % (name, age))

    ```'
  merge: -1
  pgno: 43
- img_proc: true
  md: '# HOW AND WHY TO USE F STRINGS IN PYTHON3?


    **c) str.format():** Next comes the way that has been used in most Python 3 codes
    and has become the standard of printing in Python. Using str.format()


    ```

    print("I am {}. I am {} years old".format(name, age))

    ```


    Here we use {} to denote the placeholder of the object in the list. It still has
    the same problem of readability, but we can also use str.format :


    ```

    print("I am {name}. I am {age} years old".format(name = name, age = age))

    ```


    If this seems a little too repetitive, we can use dictionaries too:


    ```

    data = {''name'':''Andy'', ''age'':20}

    print("I am {name}. I am {age} years old".format(**data))

    ```


    * * *


    # The Fourth Way with f'
  merge: -1
  pgno: 44
- img_proc: true
  md: '# ADVANCED PYTHON TIPS


    ![](img/754e520429142dbf037b2b2434cf63fd_45_0.png)


    Since Python 3.6, we have a new formatting option, which makes it even more trivial.
    We could simply use:


    ```

    print(f"I am {name}. I am {age} years old")

    ```


    We just append f at the start of the string and use {} to include our variable
    name, and we get the required results.

    An added functionality that f string provides is that **we can put expressions**
    in the {} brackets. For Example:


    ```

    num1 = 4

    num2 = 5

    print(f"The sum of {num1} and {num2} is {num1+num2}.")

    ---------------------------------------------

    The sum of 4 and 5 is 9.

    ```


    This is quite useful as you can use any sort of expression inside these brackets.
    ***The expression can contain dictionaries***'
  merge: -1
  pgno: 45
