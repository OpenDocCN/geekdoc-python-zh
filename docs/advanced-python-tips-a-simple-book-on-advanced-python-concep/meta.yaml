- md: "# Easily Explained\n\n## ADVANCED PYTHON TIPS\n\nA SIMPLE BOOK ON ADVANCED\
    \ PYTHON CONCEPTS\n\nBY RAHUL AGARWAL\n\n![](img/754e520429142dbf037b2b2434cf63fd_0_0.png)\n\
    \nRAHUL AGARWAL\n\n## Advanced Python Tips\n\nExplained Simply\n\nCopyright ©\
    \ 2020 by Rahul Agarwal\n\nAll rights reserved. No part of this publication may\
    \ be reproduced, stored or transmitted in any form or by any means, electronic,\
    \ mechanical, photocopying, recording, scanning, or otherwise without written\
    \ permission from the publisher. It is illegal to copy this book, post it to a\
    \ website, or distribute it by any other means without permission.\n\nRahul Agarwal\
    \ asserts the moral right to be identified as the author of this work.\n\nRahul\
    \ Agarwal has no responsibility for the persistence or accuracy of URLs for external\
    \ or third-party Internet Websites referred to in this publication and does not\
    \ guarantee that any content on such Websites is, or will remain, accurate or\
    \ appropriate.\n\nDesignations used by companies to distinguish their products\
    \ are often claimed as trademarks. All brand names and product names used in this\
    \ book and on its cover are trade names, service marks, trademarks and registered\
    \ trademarks of their respective owners. The publishers and the book are not associated\
    \ with any product or vendor mentioned in this book. None of the companies referenced\
    \ within the book have endorsed the book.\n\nFirst edition\n\nThis book was professionally\
    \ typeset on Reedsy.\nFind out more at [reesdy.com](https://reesdy.com)\n\n##\
    \ Contents\n\n- About me iv\n- Introduction v\n- 1 Minimize for loop usage in\
    \ Python 1\n- 2 Python defaultdict and Counter 7\n- 3 *args, **kwargs, decorators\
    \ for Data Scientists 12\n- 4 Use Itertools, Generators, and Generator Expressions\
    \ 23\n- 5 How and Why to use f strings in Python3? 34\n- Afterword 41\n\n## About\
    \ me\n\nI am Rahul Agarwal(MLWhiz), a data scientist consultant, and big data\
    \ engineer based in Bangalore, where I am currently working with **WalmartLabs**.\n\
    \nPreviously, I have worked at startups like **Fractal** and **MyCity-Way** and\
    \ conglomerates like **Citi**. I started my blog [mlwhiz.com](http://mlwhiz.com)\
    \ with a purpose to augment my own understanding of new things while helping others\
    \ learn about them. I also write for publications on Medium like [Towards Data\
    \ Science](https://towardsdatascience.com/) and [HackerNoon](https://hackernoon.com/)\n\
    \n> As Feynman said: “**I couldn’t do it. I couldn’t reduce it to the freshman\
    \ level. That means we don’t really understand it**”\n\nPersonally I am tool agnostic.\
    \ I like learning new tools and constantly work to add up new skills as I face\
    \ new problems that cannot be accomplished with my current set of techniques.\
    \ But the tools that get most of my work done currently are Python, Hadoop, and\
    \ Spark.\n\nI also really like working with data-intensive problems and am constantly\
    \ in search of new ideas to work on.\n\n## Introduction\n\n**Learning a language\
    \ is easy.** Whenever I start with a new language, I focus on a few things in\
    \ the below order, and it is a breeze to get started with writing code in any\
    \ language.\n\n- Operators and Data Types: +,-,int,float,str\n- Conditional statements:\
    \ if,else,case,switch\n- Loops: For, while\n- Data structures: List, Array, Dict,\
    \ Hashmaps\n- Define Function\n\n**However, learning to write a language and writing\
    \ a language in an optimized way are two different things.**\n\nEvery Language\
    \ has some ingredients which make it unique.\n\nYet, **a new programmer to any\
    \ language will always do some forced overfitting.** A Java programmer, new to\
    \ python, for example, might write this code to add numbers in a list.\n\n```\n\
    x=[1,2,3,4,5]\nsum_x = 0\nfor i in range(len(x)):\n    sum_x+=x[i]\n```\n\nWhile\
    \ a Python programmer will naturally do this:\n\n```\nsum_x = sum(x)\n```\n\n\
    In this book, I will explain some simple constructs provided by Python, some essential\
    \ tips, and some use cases I come up with regularly in my Data Science work. Most\
    \ of the book is of a practical nature and you will find it beaming with examples.\n\
    \n**This book is about efficient and readable code.**\n\nThis book is distributed\
    \ as free to read/pay as you want. If you like it, I would appreciate it if you\
    \ could [buy](buy) the paid version here.\n\n## 1 Minimize for loop usage in Python\n\
    \nThere are many ways to write a for loop in python.\n\nA beginner may get confused\
    \ on what to use.\n\nLet me explain this with a simple example statement.\n\n\
    Suppose you want to take the **sum of squares in a list.**\n\nThis is a valid\
    \ problem we all face in machine learning whenever we want to calculate the distance\
    \ between two points in n dimension.\n\nYou can do this using loops easily.\n\n\
    In fact, I will show you **three ways to do the same task which I have seen people\
    \ use and let you choose for yourself which you find the best.**\n\n```\nx = [1,3,5,7,9]\n\
    sum_squared = 0\nfor i in range(len(x)):\n    sum_squared+=x[i]**2\n```\n\nWhenever\
    \ I see the above code in a python codebase, I understand that the person has\
    \ come from C or Java background.\n\nA **slightly more pythonic way** of doing\
    \ the same thing is:\n\n```\nx = [1,3,5,7,9]\nsum_squared = 0\nfor y in x:\n \
    \   sum_squared+=y**2\n```\n\nBetter.\n\nI didn't index the list. And my code\
    \ is more readable.\n\nBut still, the pythonic way to do it is in one line.\n\n\
    ```\nx = [1,3,5,7,9]\nsum_squared = sum([y**2 for y in x])\n```\n\n**This approach\
    \ is called List Comprehension, and this may very well be one of the reasons that\
    \ I love Python.**\n\nYou can also use **if** in a list comprehension.\n\nLet's\
    \ say we wanted a list of squared numbers for even numbers only.\n\n```\nx = [1,2,3,4,5,6,7,8,9]\n\
    even_squared = [y**2 for y in x if y%2==0]\n----------------------------------------\n\
    [4, 16, 36, 64]\n```\n\n### What about if-else?\n\nWhat if we wanted to have the\
    \ number squared for even and cubed for odd?\n\n```\nx = [1,2,3,4,5,6,7,8,9]\n\
    squared_cubed = [y**2 if y%2==0 else y**3 for y in x]\n----------------------------------------\n\
    [1, 4, 27, 16, 125, 36, 343, 64, 729]\n```\n\nGreat!!!\n\n![](img/754e520429142dbf037b2b2434cf63fd_11_0.png)\n\
    \nSo basically follow specific **guidelines**: Whenever you feel like writing\
    \ a for statement, you should ask yourself the following questions,\n\n- Can it\
    \ be done without a **for** loop? Most Pythonic\n- Can it be done using **list\
    \ comprehension**? If yes, use it.\n- Can I do it without indexing arrays? if\
    \ not, think about using **enumerate**\n\nWhat is enumerate?\n\nSometimes we need\
    \ both the index in an array as well as the value in an array.\n\nIn such cases,\
    \ I prefer to use **enumerate** rather than indexing the list.\n\n```\nL = ['blue',\
    \ 'yellow', 'orange']\nfor i, val in enumerate(L):\n    print(\"index is %d and\
    \ value is %s\" % (i, val))\n------------------------------------------------------------\n\
    index is 0 and value is blue\nindex is 1 and value is yellow\nindex is 2 and value\
    \ is orange\n```\n\nThe rule is:\n\n> Never index a list, if you can do without\
    \ it.\n\n### Try Using Dictionary Comprehension\n\nAlso try using **dictionary\
    \ comprehension**, which is a relatively new addition in Python. The syntax is\
    \ pretty similar to List comprehension.\n\nLet me explain using an example. I\
    \ want to get a dictionary with (key: squared value) for every value in x.\n\n\
    ```\nx = [1,2,3,4,5,6,7,8,9]\n{k:k**2 for k in x}\n------------------------------------------------------------\n\
    {1: 1, 2: 4, 3: 9, 4: 16, 5: 25, 6: 36, 7: 49, 8: 64,\n9: 81}\n```\n\nWhat if\
    \ I want a dict only for even values?\n\n```\nx = [1,2,3,4,5,6,7,8,9]\n{k:k**2\
    \ for k in x if k%2==0}\n----------------------------------------\n{2: 4, 4: 16,\
    \ 6: 36, 8: 64}\n```\n\nWhat if we want squared value for even key and cubed number\
    \ for the odd key?\n\n```\nx = [1,2,3,4,5,6,7,8,9]\n{k:k**2 if k%2==0 else k**3\
    \ for k in x}\n----------------------------------------\n{1: 1, 2: 4, 3: 27, 4:\
    \ 16, 5: 125, 6: 36, 7: 343, 8: 64, 9: 729}\n```\n\n### Conclusion\n\nTo conclude,\
    \ I will say that while it might seem easy to transfer the knowledge you acquired\
    \ from other languages to Python, you won't be able to appreciate the beauty of\
    \ Python if you keep doing that.\n\nPython is much more powerful when we use its\
    \ ways and decidedly much more fun.\n\n**So, use List Comprehensions and Dict\
    \ comprehensions when you need a for loop. Use enumerate if you need array index.**\n\
    \n> Avoid for loops like plague\n\nYour code will be much more readable and maintainable\
    \ in the long run."
  mdcn: "# 轻松讲解\n\n## 高级Python技巧\n\n一本关于高级Python概念的简明书籍\n\n作者：Rahul Agarwal\n\n![](img/754e520429142dbf037b2b2434cf63fd_0_0.png)\n\
    \nRAHUL AGARWAL\n\n## 高级Python技巧\n\n简明讲解\n\n版权所有 © 2020 Rahul Agarwal\n\n保留所有权利。未经出版商书面许可，不得以任何形式或任何方式（电子、机械、影印、录音、扫描或其他方式）复制、存储或传播本出版物的任何部分。未经许可复制本书、将其发布到网站或通过任何其他方式分发均属非法。\n\
    \nRahul Agarwal主张其作为本作品作者的署名权。\n\nRahul Agarwal对本出版物中提及的外部或第三方互联网网站的URL的持续性或准确性不承担任何责任，并且不保证此类网站上的任何内容现在或将来是准确或适当的。\n\
    \n公司用于区分其产品的名称通常被声明为商标。本书及其封面上使用的所有品牌名称和产品名称均为其各自所有者的商品名、服务标志、商标和注册商标。出版商和本书与本书中提及的任何产品或供应商均无关联。本书中引用的任何公司均未认可本书。\n\
    \n第一版\n\n本书使用Reedsy进行专业排版。\n了解更多请访问 [reesdy.com](https://reesdy.com)\n\n## 目录\n\
    \n- 关于我 iv\n- 引言 v\n- 1 在Python中最小化for循环的使用 1\n- 2 Python的defaultdict和Counter\
    \ 7\n- 3 数据科学家的*args、**kwargs和装饰器 12\n- 4 使用Itertools、生成器和生成器表达式 23\n- 5 在Python3中如何以及为何使用f字符串？\
    \ 34\n- 后记 41\n\n## 关于我\n\n我是Rahul Agarwal（MLWhiz），一位数据科学家顾问和大数据工程师，目前在班加罗尔工作，就职于**沃尔玛实验室**。\n\
    \n此前，我曾在**Fractal**和**MyCity-Way**等初创公司以及**花旗集团**等大型企业工作过。我开设博客[mlwhiz.com](http://mlwhiz.com)的目的是在帮助他人学习新事物的同时，加深自己对新事物的理解。我也为Medium上的出版物撰稿，例如[Towards\
    \ Data Science](https://towardsdatascience.com/)和[HackerNoon](https://hackernoon.com/)。\n\
    \n> 正如费曼所说：“**我做不到。我无法将其简化到大一新生的水平。这意味着我们并没有真正理解它。**”\n\n就个人而言，我并不拘泥于特定工具。我喜欢学习新工具，并不断努力增加新技能，以应对那些无法用我现有技术解决的新问题。但目前完成我大部分工作的工具是Python、Hadoop和Spark。\n\
    \n我也非常喜欢处理数据密集型问题，并不断寻找新的想法来实践。\n\n## 引言\n\n**学习一门语言很容易。** 每当我开始学习一门新语言时，我会按照以下顺序关注几件事，这样就能轻松上手编写任何语言的代码。\n\
    \n- 运算符和数据类型：+,-,int,float,str\n- 条件语句：if,else,case,switch\n- 循环：For, while\n\
    - 数据结构：List, Array, Dict, Hashmaps\n- 定义函数\n\n**然而，学习如何编写一门语言和以优化的方式编写一门语言是两回事。**\n\
    \n每种语言都有一些使其独特的要素。\n\n然而，**任何语言的新程序员总会进行一些强制性的过度拟合。** 例如，一个刚接触Python的Java程序员可能会这样写代码来计算列表中数字的和：\n\
    \n```\nx=[1,2,3,4,5]\nsum_x = 0\nfor i in range(len(x)):\n    sum_x+=x[i]\n```\n\
    \n而一个Python程序员自然会这样做：\n\n```\nsum_x = sum(x)\n```\n\n在本书中，我将解释Python提供的一些简单结构、一些基本技巧，以及我在数据科学工作中经常遇到的一些用例。本书大部分内容具有实用性，你会发现其中充满了示例。\n\
    \n**本书是关于高效且可读的代码。**\n\n本书以免费阅读/按需付费的方式分发。如果你喜欢它，如果你能在这里[购买](buy)付费版本，我将不胜感激。\n\
    \n## 1 在Python中最小化for循环的使用\n\n在Python中编写for循环有很多种方式。\n\n初学者可能会对使用哪种方式感到困惑。\n\n\
    让我用一个简单的例子来解释。\n\n假设你想计算**列表中数字的平方和。**\n\n这是一个我们在机器学习中经常遇到的有效问题，当我们想计算n维空间中两点之间的距离时。\n\
    \n你可以轻松地使用循环来完成。\n\n事实上，我将向你展示**三种完成相同任务的方法，我见过人们使用这些方法，并让你自己选择你觉得最好的一种。**\n\n\
    ```\nx = [1,3,5,7,9]\nsum_squared = 0\nfor i in range(len(x)):\n    sum_squared+=x[i]**2\n\
    ```\n\n每当我看到Python代码库中的上述代码时，我就知道这个人来自C或Java背景。\n\n完成同样任务的**一种更Python化的方式**是：\n\
    \n```\nx = [1,3,5,7,9]\nsum_squared = 0\nfor y in x:\n    sum_squared+=y**2\n\
    ```\n\n更好。\n\n我没有对列表进行索引。我的代码更具可读性。\n\n但更Python化的方式是一行代码完成。\n\n```\nx = [1,3,5,7,9]\n\
    sum_squared = sum([y**2 for y in x])\n```\n\n**这种方法被称为列表推导式，这很可能就是我喜欢Python的原因之一。**\n\
    \n你也可以在列表推导式中使用**if**。\n\n假设我们只想要偶数的平方列表。\n\n```\nx = [1,2,3,4,5,6,7,8,9]\neven_squared\
    \ = [y**2 for y in x if y%2==0]\n----------------------------------------\n[4,\
    \ 16, 36, 64]\n```\n\n### 那么if-else呢？\n\n如果我们想要偶数平方，奇数立方呢？\n\n```\nx = [1,2,3,4,5,6,7,8,9]\n\
    squared_cubed = [y**2 if y%2==0 else y**3 for y in x]\n----------------------------------------\n\
    [1, 4, 27, 16, 125, 36, 343, 64, 729]\n```\n\n太棒了！！！\n\n![](img/754e520429142dbf037b2b2434cf63fd_11_0.png)\n\
    \n所以基本上要遵循特定的**准则**：每当你想写一个for语句时，你应该问自己以下问题，\n\n- 不使用**for**循环能完成吗？最Python化的方式\n\
    - 能使用**列表推导式**完成吗？如果可以，就使用它。\n- 我能在不索引数组的情况下完成吗？如果不能，考虑使用**enumerate**\n\n什么是enumerate？\n\
    \n有时我们需要数组中的索引和数组中的值。\n\n在这种情况下，我更喜欢使用**enumerate**而不是对列表进行索引。\n\n```\nL = ['blue',\
    \ 'yellow', 'orange']\nfor i, val in enumerate(L):\n    print(\"index is %d and\
    \ value is %s\" % (i, val))\n------------------------------------------------------------\n\
    index is 0 and value is blue\nindex is 1 and value is yellow\nindex is 2 and value\
    \ is orange\n```\n\n规则是：\n\n> 如果可以不用索引，就永远不要索引列表。\n\n### 尝试使用字典推导式\n\n也尝试使用**字典推导式**，这是Python中相对较新的功能。其语法与列表推导式非常相似。\n\
    \n让我用一个例子来解释。我想为x中的每个值获取一个字典（键：平方值）。\n\n```\nx = [1,2,3,4,5,6,7,8,9]\n{k:k**2\
    \ for k in x}\n------------------------------------------------------------\n\
    {1: 1, 2: 4, 3: 9, 4: 16, 5: 25, 6: 36, 7: 49, 8: 64,\n9: 81}\n```\n\n如果我只想要偶数值的字典呢？\n\
    \n```\nx = [1,2,3,4,5,6,7,8,9]\n{k:k**2 for k in x if k%2==0}\n----------------------------------------\n\
    {2: 4, 4: 16, 6: 36, 8: 64}\n```\n\n如果我们想要偶数键的平方值和奇数键的立方值呢？\n\n```\nx = [1,2,3,4,5,6,7,8,9]\n\
    {k:k**2 if k%2==0 else k**3 for k in x}\n----------------------------------------\n\
    {1: 1, 2: 4, 3: 27, 4: 16, 5: 125, 6: 36, 7: 343, 8: 64, 9: 729}\n```\n\n### 结论\n\
    \n总之，我想说，虽然将你从其他语言获得的知识转移到Python中可能看起来很容易，但如果你一直这样做，你将无法欣赏Python的美妙之处。\n\n当我们使用Python的方式时，它会强大得多，而且无疑更有趣。\n\
    \n**所以，当你需要for循环时，使用列表推导式和字典推导式。如果你需要数组索引，使用enumerate。**\n\n> 像躲避瘟疫一样避免for循环\n\
    \n从长远来看，你的代码将更具可读性和可维护性。"
