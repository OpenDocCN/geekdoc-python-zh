- md: "## USE ITERTOOLS, GENERATORS, AND GENERATOR EXPRESSIONS\n\nHow can we get it?\n\
    \nUsing a generator, now we know how to use them.\n\n```python\ndef triplet(n):\
    \  # Find all the Pythagorean triplets between 1 and n\n    for a in range(n):\n\
    \        for b in range(a):\n            for c in range(b):\n                if\
    \ a*a == b*b + c*c:\n                    yield(a, b, c)\n```\n\nWe can use this\
    \ as:\n\n```python\ntriplet_generator = triplet(1000)\nfor x in triplet_generator:\n\
    \    print(x)\n```\n\n```\n(5, 4, 3)\n(10, 8, 6)\n(13, 12, 5)\n(15, 12, 9)\n.....\n\
    ```\n\nOr, we could also have used a generator expression here:\n\n```python\n\
    triplet_generator = ((a,b,c) for a in range(1000) for\nb in range(a) for c in\
    \ range(b) if a*a == b*b + c*c)\nfor x in triplet_generator:\n    print(x)\n```\n\
    \n```\n(5, 4, 3)\n(10, 8, 6)\n(13, 12, 5)\n(15, 12, 9)\n.....\n```\n\n## Isn’t\
    \ Python Beautiful?\n\nI hate code blocks sometimes due to code breaks and copy\
