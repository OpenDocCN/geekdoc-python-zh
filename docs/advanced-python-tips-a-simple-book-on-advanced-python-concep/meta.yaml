    \ legend='brief', ax=None, **kwargs) 这是什么？\n```\n\n简单来说，**你可以使用 **kwargs 为你的函数提供任意数量的带关键字的输入**，并使用字典来访问它们。\n\
    \n一个简单的例子：假设你想创建一个 print 函数，它可以接受姓名和年龄作为输入并打印出来。\n\n```python\ndef myprint(name,\
    \ age):\n    print(f'{name} is {age} years old')\n```\n\n很简单。现在假设你想让同一个函数接受两个姓名和两个年龄。\n\
    \n```python\ndef myprint(name1, age1, name2, age2):\n    print(f'{name1} is {age1}\
    \ years old')\n    print(f'{name2} is {age2} years old')\n```\n\n你猜对了，我的下一个问题是：**如果我不知道需要多少个参数怎么办？**\n\
    \n我能用 *args 吗？恐怕不行，因为姓名和年龄的顺序很重要。我们不想写出“28 is Michael years old”这样的句子。这时 **kwargs\
