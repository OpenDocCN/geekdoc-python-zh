    ## 3\n\n## 面向数据科学家的 *args、**kwargs 和装饰器\n\nPython 有许多构造，在我们的代码中学习和使用起来相当容易。但也有一些构造，当我们在代码中遇到它们时，总会让我们感到困惑。还有一些构造，即使是经验丰富的程序员也无法理解。*args、**kwargs\
    \ 和装饰器就属于这一类。\n\n我猜我的很多数据科学朋友也遇到过它们。大多数 seaborn 函数都以某种方式使用了 *args 和 **kwargs。\n\
    \n## seaborn.scatterplot\n\n```python\nseaborn.scatterplot(x=None, y=None, hue=None,\
    \ style=None, size=None, data=None, palette=None, hue_order=None, hue_norm=None,\
