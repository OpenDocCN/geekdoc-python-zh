    ```\n\n* * *\n\n## 什么是 *args？\n\n简单来说，**你可以使用 *args 为你的函数提供任意数量的输入。**\n\n一个简单的例子：假设我们需要创建一个函数来将两个数字相加。我们可以很容易地在\
    \ Python 中实现。\n\n```python\ndef adder(x,y):\n    return x+y\n```\n\n如果我们想创建一个函数来将三个变量相加呢？\n\
