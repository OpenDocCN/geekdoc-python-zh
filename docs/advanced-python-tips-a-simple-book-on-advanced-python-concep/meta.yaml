    * * *


    # Conclusion


    Until recently, I had been using Python 2 for all my work, and so was not able
    to check out this new feature. But now, as I am shifting to Python 3, f strings
    has become my go-to syntax to format strings. It is easy to write and read with
    the ability to incorporate arbitrary expressions as well. In a way, this new function
    adheres to at least 3 PEP concepts —


    > Beautiful is better than ugly, Simple is better than complex and Readability
    counts.'
