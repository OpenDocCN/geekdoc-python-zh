  md: '# # 1


    # # Minimize for loop usage in Python


    There are many ways to write a for loop in python.


    A beginner may get confused on what to use.


    Let me explain this with a simple example statement.


    Suppose you want to take the **sum of squares in a list.**


    This is a valid problem we all face in machine learning whenever we want to calculate
    the distance between two points in n dimension.


    You can do this using loops easily.


    In fact, I will show you **three ways to do the same task which I have seen people
    use and let you choose for yourself which you find the best.**'
  merge: -1
  pgno: 8
- img_proc: true
  md: "# ADVANCED PYTHON TIPS\n\n```\nx = [1,3,5,7,9]\nsum_squared = 0\nfor i in range(len(x)):\n\
    \    sum_squared+=x[i]**2\n```\n\nWhenever I see the above code in a python codebase,\
    \ I understand that the person has come from C or Java background.\n\nA **slightly\
    \ more pythonic way** of doing the same thing is:\n\n```\nx = [1,3,5,7,9]\nsum_squared\
    \ = 0\nfor y in x:\n    sum_squared+=y**2\n```\n\nBetter.\n\nI didn't index the\
    \ list. And my code is more readable.\n\nBut still, the pythonic way to do it\
    \ is in one line.\n\n```\nx = [1,3,5,7,9]\nsum_squared = sum([y**2 for y in x])\n\
    ```\n\n**This approach is called List Comprehension, and this may very well be\
    \ one of the reasons that I love Python.**\n\nYou can also use **if** in a list\
    \ comprehension.\n\nLet's say we wanted a list of squared numbers for even numbers\
    \ only."
  merge: -1
