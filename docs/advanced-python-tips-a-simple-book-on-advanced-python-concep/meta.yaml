- md: "## A simple example:\n\nLet us say we want to add custom functionality to some\
    \ of our functions. The functionality is that whenever the function gets called\
    \ the “**function name begins**” is printed and whenever the function ends the\
    \ “**function name ends**” and time taken by the function is printed.\n\nLet us\
    \ assume our function is:\n\n```python\ndef somefunc(a,b):\n    output = a+b\n\
    \    return output\n```\n\nWe can add some print lines to all our functions to\
    \ achieve this.\n\n```python\nimport time\ndef somefunc(a,b):\n    print(\"somefunc\
    \ begins\")\n    start_time = time.time()\n    output = a+b\n    print(\"somefunc\
    \ ends in \",time.time()-start_time,\n          \"secs\")\n    return output\n\
    out = somefunc(4,5)\n```\n\nOUTPUT:\n```\n----------------------------------------\n\
    somefunc begins\nsomefunc ends in  9.5367431640625e-07 secs\n```\n\n## But, Can\
    \ we do better?\n\nThis is where decorators excel. We can use decorators to wrap\
    \ any function.\n\n```python\nfrom functools import wraps\ndef timer(func):\n\
    \    @wraps(func)\n    def wrapper(a,b):\n        print(f\"{func.__name__!r} begins\"\
    )\n        start_time = time.time()\n        result = func(a,b)\n        print(f\"\
    {func.__name__!r} ends in\n        {time.time()-start_time}  secs\")\n       \
    \ return result\n    return wrapper\n```\n\nThis is how we can define any decorator.\
    \ functools helps us create decorators using wraps. In essence, we do something\
    \ before any function is called and do something after a function is called in\
    \ the above decorator.\n\nWe can now use this timer decorator to decorate our\
    \ function somefunc\n\n```python\n@timer\ndef somefunc(a,b):\n    output = a+b\n\
    \    return output\n```\n\nNow calling this function, we get:\n\n```\na = somefunc(4,5)\n\
    Output\n----------------------------------------\n'somefunc' begins\n'somefunc'\
    \ ends in 2.86102294921875e-06  secs\n```\n\nNow we can append @timer to each\
    \ of our function for which we want to have the time printed. And we are done.\n\
    \nReally?\n\n* * *\n\n## Connecting all the pieces\n\n![](img/754e520429142dbf037b2b2434cf63fd_27_0.png)\n\
    \n**What if our function takes three arguments? Or many arguments?**\n\nThis is\
    \ where whatever we have learned till now connects. We use *args and **kwargs\n\
    \nWe change our decorator function as:\n\n```python\nfrom functools import wraps\n\
    def timer(func):\n    @wraps(func)\n    def wrapper(*args, **kwargs):\n      \
    \  print(f\"{func.__name__!r} begins\")\n        start_time = time.time()\n  \
    \      result = func(*args, **kwargs)\n        print(f\"{func.__name__!r} ends\
    \ in\n        {time.time()-start_time} secs\")\n        return result\n    return\
    \ wrapper\n```\n\nNow our function can take any number of arguments, and our decorator\
    \ will still work.\n\nIsn't Python Beautiful?\n\nIn my view, decorators could\
    \ be pretty helpful. I provided only one use case of decorators, but there are\
    \ several ways one can use them.\n\nYou can use a decorator to debug code by checking\
    \ which arguments go in a function. Or a decorator could be used to count the\
    \ number of times a particular function has been called. This could help with\
    \ counting recursive calls.\n\n* * *\n\n## Conclusion\n\nIn this post, I talked\
    \ about some of the constructs you can find in python source code and how you\
    \ can understand them.\n\nIt is not necessary that you end up using them in your\
    \ code now. But I guess understanding how these things work helps mitigate some\
    \ of the confusion and panic one faces whenever these constructs come up.\n\n\
    # 4 Use Itertools, Generators, and Generator Expressions\n\n![](img/754e520429142dbf037b2b2434cf63fd_30_0.png)\n\
    \nPython in many ways has made our life easier when it comes to programming.\n\
    \nWith its many libraries and functionalities, sometimes we forget to focus on\
    \ some of the useful things it offers.\n\nOne of such functionalities are generators\
    \ and generator expressions. I stalled learning about them for a long time but\
    \ they are useful.\n\nHave you ever encountered yield in Python code and didn’t\
    \ knew what it meant? or what does an iterator or a generator means and why we\
    \ use it? Or have you used ImageDataGenerator while working with Keras and didn’t\
    \ understand what is going at the backend? Then this chapter is for you.\n\n*The\
    \ Problem Statement:*\n\n![](img/754e520429142dbf037b2b2434cf63fd_31_0.png)\n\n\
    *Let us say that we need to run a for loop over 10 Million Prime numbers.*\n\n\
    *I am using prime numbers in this case for understanding but it could be extended\
    \ to a case where we have to process a lot of images or files in a database or\
    \ big data.*\n\n**How would you proceed with such a problem?**\n\nSimple. We can\
    \ create a list and keep all the prime numbers there.\n\nReally? **Think of the\
    \ memory such a list would occupy.**\n\nIt would be great if we had something\
    \ that could just keep the last prime number we have checked and returns just\
    \ the next prime number.\n\nThat is where iterators could help us.\n\n* * *\n\n\
    ## The Iterator Solution\n\nWe create a class named primes and use it to generate\
    \ primes.\n\n```python\ndef check_prime(number):\n    for divisor in range(2,\
    \ int(number ** 0.5) + 1):\n        if number % divisor == 0:\n            return\
    \ False\n    return True\n\nclass Primes:\n    def __init__(self, max):\n    \
    \    # the maximum number of primes we want generated\n        self.max = max\n\
    \        # start with this number to check if it is a prime.\n        self.number\
    \ = 1\n        # No of primes generated yet. We want to StopIteration when it\
    \ reaches max\n        self.primes_generated = 0\n    def __iter__(self):\n  \
    \      return self\n    def __next__(self):\n        self.number += 1\n      \
    \  if self.primes_generated >= self.max:\n            raise StopIteration\n  \
    \      elif check_prime(self.number):\n            self.primes_generated+=1\n\
    \            return self.number\n        else:\n            return self.__next__()\n\
    ```\n\nWe can then use this as:\n\n```python\nprime_generator = Primes(10000000)\n\
    for x in prime_generator:\n    # Process Here\n```\n\nHere I have defined an iterator.\
    \ This is how most of the functions like xrange or ImageGenerator work.\n\nEvery\
    \ iterator needs to have:\n\n1. an `__iter__` method that returns self, and\n\
    2. an `__next__` method that returns the next value.\n3. a StopIteration exception\
    \ that signifies the ending of the iterator.\n\nEvery iterator takes the above\
    \ form and we can tweak the functions to our liking in this boilerplate code to\
    \ do what we want to do.\n\nSee that we don't keep all the prime numbers in memory\
    \ just the state of the iterator like\n\n- what max prime number we have returned\
    \ and\n- how many primes we have returned already.\n\nBut it seems a little too\
    \ much code. Can we do better?\n\n* * *\n\n## The Generator Solution\n\n![](img/754e520429142dbf037b2b2434cf63fd_35_0.png)\n\
    \n**Put simply Generators provide us ways to write iterators easily using the\
    \ yield statement.**\n\n```python\ndef Primes(max):\n    number = 1\n    generated\
    \ = 0\n    while generated < max:\n        number += 1\n        if check_prime(number):\n\
    \            generated+=1\n            yield number\n```\n\nwe can use the function\
    \ as:\n\n```python\nprime_generator = Primes(10)\nfor x in prime_generator:\n\
    \    # Process Here\n```\n\nIt is so much simpler to read. But what is yield?\n\
    \nWe can think of yield as a return statement only as it returns the value.\n\n\
    But when a yield happens the state of the function is also saved in the memory.\
    \ So at every iteration in for loop the function variables like number, generated\
    \ and max are stored somewhere in memory.\n\nSo what is happening is that the\
    \ above function is taking care of all the boilerplate code for us by using the\
    \ yield statement.\n\nMuch More pythonic.\n\n* * *\n\n## Generator Expression\
    \ Solution\n\n![](img/754e520429142dbf037b2b2434cf63fd_37_0.png)\n\nWhile not\
    \ explicitly better than the previous solution but we can also use Generator expression\
    \ for the same task. But we might lose some functionality here. They work exactly\
    \ like list comprehensions but they don’t keep the whole list in memory.\n\n```python\n\
    primes = (i for i in range(1,10000000) if check_prime(i))\nfor x in primes:\n\
    \    # do something\n```\n\nFunctionality loss: We can generate primes till 10M.\
    \ But we can’t generate 10M primes. One can only do so much with generator expressions.\n\
    \nBut generator expressions let us do some pretty cool things.\n\n***Let us say\
    \ we wanted to have all Pythagorean Triplets lower than 1000.***"
