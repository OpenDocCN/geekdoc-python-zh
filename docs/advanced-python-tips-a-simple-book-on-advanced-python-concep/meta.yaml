    # HOW AND WHY TO USE F STRINGS IN PYTHON3?


    **c) str.format():** Next comes the way that has been used in most Python 3 codes
    and has become the standard of printing in Python. Using str.format()


    ```

    print("I am {}. I am {} years old".format(name, age))

    ```


    Here we use {} to denote the placeholder of the object in the list. It still has
    the same problem of readability, but we can also use str.format :


    ```

    print("I am {name}. I am {age} years old".format(name = name, age = age))

    ```


    If this seems a little too repetitive, we can use dictionaries too:


    ```

    data = {''name'':''Andy'', ''age'':20}

    print("I am {name}. I am {age} years old".format(**data))

    ```


