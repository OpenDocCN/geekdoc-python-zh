    \ \" + str(age) + \" years old\")\n```\n\n```\nI am Andy. I am 20 years old\n\
    ```\n\n![](img/754e520429142dbf037b2b2434cf63fd_43_0.png)\n\n**b) % Format:**\
    \ The second option is to use % formatting. But it also has its problems. For\
    \ one, it is not readable. You would need to look at the first %s and try to find\
