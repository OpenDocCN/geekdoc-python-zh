    \ 12, 5)\n(15, 12, 9)\n.....\n```\n\n## Python 不是很美吗？\n\n有时我讨厌代码块，因为代码换行和复制粘贴的问题。所以你可以在这个\
    \ [kaggle kernel](https://www.kaggle.com/) 中看到所有代码。\n\n* * *\n\n## 结论\n\n**我们必须始终努力减少\
    \ Python 中的内存占用。** 迭代器和生成器通过惰性求值为我们提供了一种实现方式。\n\n**我们如何选择使用哪一个？** 生成器表达式能做的事情，生成器或迭代器也能做到。\n\
    \n这里没有正确答案。每当我面临这样的困境时，我总是从功能性和可读性的角度来思考。通常，\n\n功能性方面：迭代器 > 生成器 > 生成器表达式。\n\n\
    可读性方面：迭代器 < 生成器 < 生成器表达式。\n\n你现在不一定非要在代码中使用它们。但我认为理解这些东西的工作原理有助于缓解每当遇到这些构造时产生的一些困惑和恐慌。\n\
    \n## 5\n\n## 在 Python3 中如何以及为何使用 f 字符串？\n\n![](img/754e520429142dbf037b2b2434cf63fd_41_0.png)\n\
    \nPython 为我们提供了多种编码风格。随着时间的推移，Python 定期推出新的编码标准和工具，这些工具更加符合 Python 之禅中的编码标准。\n\
    \n> 优美胜于丑陋。\n\n因此，本章**关于在 Python 中使用 f 字符串，该特性在 Python 3.6 中引入。**\n\n* * *\n\n\
    ## 三种常见的打印方式：\n\n让我用一个简单的例子来解释。假设你有一些变量，并且想在语句中打印它们。\n\n```python\nname = 'Andy'\n\
    age = 20\nprint(?)\n```\n\n```\nOutput: I am Andy. I am 20 years old\n```\n\n\
    你可以用多种方式做到这一点：\n\n**a) 字符串拼接：** 一种非常简单的方法是在 print 函数中直接使用 + 进行拼接。但这很笨拙。我们需要将数字变量转换为字符串，并在拼接时注意空格。而且看起来不太好，因为使用它时代码可读性会受到一点影响。\n\
    \n```python\nname = 'Andy'\nage = 20\nprint(\"I am \" + name + \". I am \" + str(age)\
    \ + \" years old\")\n```\n\n```\nI am Andy. I am 20 years old\n```\n\n![](img/754e520429142dbf037b2b2434cf63fd_43_0.png)\n\
    \n**b) % 格式化：** 第二个选项是使用 % 格式化。但它也有其问题。首先，它不可读。你需要查看第一个 %s，然后尝试在末尾的列表中找到对应的变量。想象一下，如果你有一个很长的变量列表需要打印。\n\
    \n```python\nprint(\"I am %s. I am %s years old\" % (name, age))\n```\n\n## 在\
    \ Python3 中如何以及为何使用 f 字符串？\n\n**c) str.format()：** 接下来是在大多数 Python 3 代码中使用并已成为\
    \ Python 打印标准的方式。使用 str.format()\n\n```python\nprint(\"I am {}. I am {} years\
    \ old\".format(name, age))\n```\n\n这里我们使用 {} 来表示列表中对象的占位符。它仍然存在可读性问题，但我们也可以使用\
    \ str.format：\n\n```python\nprint(\"I am {name}. I am {age} years old\".format(name\
    \ = name, age = age))\n```\n\n如果这看起来有点重复，我们也可以使用字典：\n\n```python\ndata = {'name':'Andy',\
    \ 'age':20}\nprint(\"I am {name}. I am {age} years old\".format(**data))\n```\n\
    \n* * *\n\n## 使用 f 的第四种方式\n\n## 高级 Python 技巧\n\n![](img/754e520429142dbf037b2b2434cf63fd_45_0.png)\n\
    \n从 Python 3.6 开始，我们有了一个新的格式化选项，这使得它变得更加简单。我们可以简单地使用：\n\n```python\nprint(f\"\
    I am {name}. I am {age} years old\")\n```\n\n我们只需在字符串开头附加 f，并使用 {} 包含变量名，就能得到所需的结果。\n\
    \nf 字符串提供的一个附加功能是**我们可以在 {} 括号中放入表达式**。例如：\n\n```python\nnum1 = 4\nnum2 = 5\n\
    print(f\"The sum of {num1} and {num2} is {num1+num2}.\")\n```\n\n```\nThe sum\
    \ of 4 and 5 is 9.\n```\n\n这非常有用，因为你可以在这个括号中使用任何类型的表达式。**表达式可以包含字典或函数。** 一个简单的例子：\n\
    \n```python\ndef totalFruits(apples,oranges):\n    return apples+oranges\n\ndata\
    \ = {'name':'Andy','age':20}\n\napples = 20\noranges = 30\n\nprint(f\"{data['name']}\
    \ has {totalFruits(apples,oranges)} fruits\")\n```\n\n```\nAndy has 50 fruits\n\
    ```\n\n此外，你可以使用 ''' 来使用**多行字符串**。\n\n```python\nnum1 = 4\nnum2 = 5\nprint(f'''The\
    \ sum of\n{num1} and\n{num2} is\n{num1+num2}.''')\n```\n\n```\nThe sum of\n4 and\n\
    5 is\n9.\n```\n\n格式化字符串时的一个常见用例是**格式化浮点数**。你可以使用 f 字符串按如下方式操作：\n\n```python\n\
    numFloat = 10.23456678\nprint(f'Printing Float with 2 decimals: {numFloat:.2f}')\n\
    ```\n\n```\nPrinting Float with 2 decimals: 10.23\n```\n\n* * *\n\n## 结论\n\n直到最近，我所有工作都使用\
    \ Python 2，因此无法检查这个新功能。但现在，随着我转向 Python 3，f 字符串已成为我格式化字符串的首选语法。它易于编写和阅读，并且能够包含任意表达式。在某种程度上，这个新功能至少遵循了\
    \ 3 个 PEP 概念——\n\n> 优美胜于丑陋，简洁胜于复杂，可读性很重要。\n\n## 后记\n\n这只是 Python 中部分功能的简要概述。我试图让它们尽可能对初学者友好，而不涉及太多术语。请在\
    \ Twitter @mlwhiz 上告诉我你对这本小书的看法。\n\n我还会继续写更多关于 Python 新功能的文章。在 **Medium** 上关注我。一如既往，我欢迎反馈和建设性批评，可以通过\
    \ Twitter @mlwhiz 联系我。\n\n另外，如果你想了解更多关于 Python 3 的知识，我想推荐密歇根大学的一门优秀课程：[中级 Python](https://www.coursera.org/learn/intermediate-python)。请务必查看一下。\n\
    \n本书免费阅读/按需付费分发。如果你喜欢它，如果你能在这里[购买](https://gumroad.com/l/mlwhiz)付费版本，我将不胜感激。"
