    \n# 4 使用 Itertools、生成器和生成器表达式\n\n![](img/754e520429142dbf037b2b2434cf63fd_30_0.png)\n\
    \nPython 在许多方面使我们的编程生活变得更加轻松。\n\n凭借其众多的库和功能，有时我们忘记了关注它提供的一些有用的东西。\n\n其中一项功能就是生成器和生成器表达式。我拖延学习它们很长时间了，但它们很有用。\n\
    \n你是否曾在 Python 代码中遇到过 `yield` 却不知道它的意思？或者不知道迭代器或生成器是什么以及为什么使用它们？或者在使用 Keras 时使用了\
    \ `ImageDataGenerator` 却不明白后台发生了什么？那么这一章就是为你准备的。\n\n*问题陈述：*\n\n![](img/754e520429142dbf037b2b2434cf63fd_31_0.png)\n\
    \n*假设我们需要对 1000 万个质数运行一个 for 循环。*\n\n*我在这里使用质数是为了便于理解，但可以扩展到我们必须处理数据库或大数据中大量图像或文件的情况。*\n\
    \n**你将如何处理这样的问题？**\n\n很简单。我们可以创建一个列表，把所有质数都放在那里。\n\n真的吗？**想想这样一个列表会占用多少内存。**\n\
    \n如果我们有一些东西可以只保留我们检查过的最后一个质数，并且只返回下一个质数，那就太好了。\n\n这就是迭代器可以帮助我们的地方。\n\n* * *\n\n\
    ## 迭代器解决方案\n\n我们创建一个名为 `primes` 的类，并用它来生成质数。\n\n```python\ndef check_prime(number):\n\
    \    for divisor in range(2, int(number ** 0.5) + 1):\n        if number % divisor\
    \ == 0:\n            return False\n    return True\n\nclass Primes:\n    def __init__(self,\
    \ max):\n        # 我们想要生成的最大质数数量\n        self.max = max\n        # 从这个数字开始检查它是否是质数。\n\
    \        self.number = 1\n        # 已生成的质数数量。当达到 max 时我们想要 StopIteration\n   \
    \     self.primes_generated = 0\n    def __iter__(self):\n        return self\n\
    \    def __next__(self):\n        self.number += 1\n        if self.primes_generated\
    \ >= self.max:\n            raise StopIteration\n        elif check_prime(self.number):\n\
    \            self.primes_generated+=1\n            return self.number\n      \
    \  else:\n            return self.__next__()\n```\n\n然后我们可以这样使用它：\n\n```python\n\
    prime_generator = Primes(10000000)\nfor x in prime_generator:\n    # 在这里处理\n```\n\
    \n这里我定义了一个迭代器。大多数像 `xrange` 或 `ImageGenerator` 这样的函数就是这样工作的。\n\n每个迭代器都需要有：\n\n\
    1.  一个返回自身的 `__iter__` 方法，以及\n2.  一个返回下一个值的 `__next__` 方法。\n3.  一个表示迭代器结束的 `StopIteration`\
    \ 异常。\n\n每个迭代器都采用上述形式，我们可以在这个样板代码中根据自己的喜好调整函数，以做我们想做的事情。\n\n注意，我们没有将所有质数保存在内存中，只保存了迭代器的状态，比如\n\
    \n-   我们返回的最大质数是多少，以及\n-   我们已经返回了多少个质数。\n\n但这似乎代码有点太多了。我们能做得更好吗？\n\n* * *\n\n\
    ## 生成器解决方案\n\n![](img/754e520429142dbf037b2b2434cf63fd_35_0.png)\n\n**简单来说，生成器为我们提供了使用\
    \ `yield` 语句轻松编写迭代器的方法。**\n\n```python\ndef Primes(max):\n    number = 1\n   \
    \ generated = 0\n    while generated < max:\n        number += 1\n        if check_prime(number):\n\
    \            generated+=1\n            yield number\n```\n\n我们可以这样使用该函数：\n\n```python\n\
    prime_generator = Primes(10)\nfor x in prime_generator:\n    # 在这里处理\n```\n\n\
    它读起来简单多了。但 `yield` 是什么？\n\n我们可以将 `yield` 视为一个 `return` 语句，因为它返回值。\n\n但当 `yield`\
    \ 发生时，函数的状态也会保存在内存中。因此，在 `for` 循环的每次迭代中，函数变量如 `number`、`generated` 和 `max` 都存储在内存中的某个地方。\n\
    \n所以发生的事情是，上面的函数通过使用 `yield` 语句为我们处理了所有的样板代码。\n\n更加 Pythonic。\n\n* * *\n\n## 生成器表达式解决方案\n\
    \n![](img/754e520429142dbf037b2b2434cf63fd_37_0.png)\n\n虽然不一定比之前的解决方案更好，但我们可以使用生成器表达式来完成相同的任务。但我们可能会在这里失去一些功能。它们的工作方式与列表推导式完全相同，但它们不会将整个列表保存在内存中。\n\
    \n```python\nprimes = (i for i in range(1,10000000) if check_prime(i))\nfor x\
    \ in primes:\n    # 做点什么\n```\n\n功能损失：我们可以生成多达 1000 万个质数。但我们不能生成 1000 万个质数。生成器表达式只能做这么多。\n\
    \n但生成器表达式让我们可以做一些非常酷的事情。\n\n***假设我们想要所有小于 1000 的毕达哥拉斯三元组。***"
