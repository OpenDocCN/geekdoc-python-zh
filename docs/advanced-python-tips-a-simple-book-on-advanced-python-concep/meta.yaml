  md: "# MINIMIZE FOR LOOP USAGE IN PYTHON\n\nIn such cases, I prefer to use **enumerate**\
    \ rather than indexing the list.\n\n```\nL = ['blue', 'yellow', 'orange']\nfor\
    \ i, val in enumerate(L):\n    print(\"index is %d and value is %s\" % (i, val))\n\
    ------------------------------------------------------------\nindex is 0 and value\
    \ is blue\nindex is 1 and value is yellow\nindex is 2 and value is orange\n```\n\
    \nThe rule is:\n\n> Never index a list, if you can do without it.\n\n# Try Using\
    \ Dictionary Comprehension\n\nAlso try using **dictionary comprehension**, which\
    \ is a relatively new addition in Python. The syntax is pretty similar to List\
    \ comprehension.\n\nLet me explain using an example. I want to get a dictionary\
    \ with (key: squared value) for every value in x.\n\n```\nx = [1,2,3,4,5,6,7,8,9]\n\
    {k:k**2 for k in x}\n------------------------------------------------------------\n\
    {1: 1, 2: 4, 3: 9, 4: 16, 5: 25, 6: 36, 7: 49, 8: 64,\n9: 81}\n```\n\nWhat if\
