- md: "## 2\n\n## Python defaultdict and Counter\n\n![](img/754e520429142dbf037b2b2434cf63fd_14_0.png)\n\
    \nLet's say I need to count the number of word occurrences in a piece of text.\
    \ Maybe for a book like Hamlet. How could I do that?\n\n## ADVANCED PYTHON TIPS\n\
    \nPython always provides us with multiple ways to do the same thing. But only\
    \ one way I find elegant.\n\nThis is a **Naive Python implementation** using the\
    \ dict object.\n\n```python\ntext = \"I need to count the number of word occurrences\
    \ in a piece of text. How could I do that? Python provides us with multiple ways\
    \ to do the same thing. But only one way I find beautiful.\"\n\nword_count_dict\
    \ = {}\n\nfor w in text.split(\" \"):\n    if w in word_count_dict:\n        word_count_dict[w]+=1\n\
    \    else:\n        word_count_dict[w]=1\n```\n\nWe could use **defaultdict**\
    \ to reduce the number of lines in the code.\n\n```python\nfrom collections import\
    \ defaultdict\nword_count_dict = defaultdict(int)\nfor w in text.split(\" \"):\n\
    \    word_count_dict[w]+=1\n```\n\nWe could also have used **Counter** to do this,\
    \ which according to me is the most preferable method for this problem.\n\n```python\n\
    from collections import Counter\nword_count_dict = Counter()\nfor w in text.split(\"\
    \ \"):\n    word_count_dict[w]+=1\n```\n\nIf we use Counter, we can also get the\
    \ most common words using a simple function.\n\n```python\nword_count_dict.most_common(10)\n\
    ----------------------------------------\n[('I', 3), ('to', 2), ('the', 2)]\n\
    ```\n\nOther use cases of Counter:\n\n```python\n# Count Characters\nCounter('abccccccddddd')\n\
    ----------------------------------------\nCounter({'a': 1, 'b': 1, 'c': 6, 'd':\
    \ 5})\n# Count List elements\nCounter([1,2,3,4,5,1,2])\n----------------------------------------\n\
    Counter({1: 2, 2: 2, 3: 1, 4: 1, 5: 1})\n```\n\n***\n\n## So, why ever use defaultdict?\n\
    \nNotice that in *Counter*, the value is always an integer. What if we wanted\
    \ to parse through a list of tuples containing colors and fruits. And wanted to\
    \ create a dictionary of key and list of values.\n\nThe main functionality provided\
    \ by a defaultdict is that it defaults a key to empty/zero if it is not found\
    \ in the defaultdict.\n\n```python\ns = [('color', 'blue'), ('color', 'orange'),\n\
    ('color', 'yellow'), ('fruit', 'banana'), ('fruit', 'orange'),('fruit', 'banana')]\n\
    d = defaultdict(list)\nfor k, v in s:\n    d[k].append(v)\nprint(d)\n-----------------------------------------------------------------------\n\
    defaultdict(<class 'list'>, {'color': ['blue', 'orange', 'yellow'], 'fruit': ['banana',\
    \ 'orange', 'banana']})\n```\n\nbanana comes two times in fruit, we could use\
    \ set\n\n```python\nd = defaultdict(set)\nfor k, v in s:\n    d[k].add(v)\nprint(d)\n\
    -----------------------------------------------------------------------\ndefaultdict(<class\
    \ 'set'>, {'color': {'yellow', 'blue', 'orange'}, 'fruit': {'banana', 'orange'}})\n\
    ```\n\n***\n\n## Conclusion\n\nTo conclude, I will say that **there is always\
    \ a beautiful way to do anything in Python**. Search for it before you write code.\
    \ Going to StackOverflow is okay. I go there a lot of times when I get stuck.\
    \ Always Remember:\n\nCreating a function for what already is provided is not\
    \ pythonic.\n\n## 3\n\n## *args, **kwargs, decorators for Data Scientists\n\n\
    Python has a lot of constructs that are reasonably easy to learn and use in our\
    \ code. Then there are some constructs which always confuse us when we encounter\
    \ them in our code. Then are some that even seasoned programmers are not able\
    \ to understand. *args, **kwargs and decorators are some constructs that fall\
    \ into this category.\n\nI guess a lot of my data science friends have faced them\
    \ too. Most of the seaborn functions use *args and **kwargs in some way or other.\n\
    \n## seaborn.scatterplot\n\n```python\nseaborn.scatterplot(x=None, y=None, hue=None,\
    \ style=None, size=None, data=None, palette=None, hue_order=None, hue_norm=None,\
    \ sizes=None, size_order=None, size_norm=None, markers=True, style_order=None,\
    \ x_bins=None, y_bins=None, units=None, estimator=None, ci=95, n_boot=1000, alpha='auto',\
    \ x_jitter=None, y_jitter=None, legend='brief', ax=None, **kwargs) What is this?\n\
    ```\n\nOr what about decorators? Every time you see a warning like some function\
    \ will be deprecated in the next version. The sklearn package uses decorators\
    \ for that. You can see the **@deprecated** in the source code. That is a decorator\
    \ function.\n\n```python\nfrom .utils import deprecated\n\ndef zero_one_loss(y_true,\
    \ y_pred, normalize=True):\n    # actual implementation\n    pass\n\n@deprecated(\"\
    Function 'zero_one' was renamed to 'zero_one_loss' \"\n            \"in version\
    \ 0.13 and will be removed in release 0.15. \"\n            \"Default behavior\
    \ is changed from 'normalize=False' to \"\n            \"'normalize=True'\")\n\
    def zero_one(y_true, y_pred, normalize=False):\n    return zero_one_loss(y_true,\
    \ y_pred, normalize)\n```\n\n* * *\n\n## What are *args?\n\nIn simple terms, **you\
    \ can use *args to give an arbitrary number of inputs to your function.**\n\n\
    A simple example: Let us say we have to create a function that adds two numbers.\
    \ We can do this easily in python.\n\n```python\ndef adder(x,y):\n    return x+y\n\
    ```\n\nWhat if we want to create a function to add three variables?\n\n```python\n\
    def adder(x,y,z):\n    return x+y+z\n```\n\nWhat if we want the same function\
    \ to add an unknown number of variables? Please note that we can use *args or\
    \ *argv or *anyOtherName to do this. It is the * that matters.\n\n```python\n\
    def adder(*args):\n    result = 0\n    for arg in args:\n        result+=arg\n\
    \    return result\n```\n\nWhat *args does is that it takes all your passed arguments\
    \ and provides a variable length argument list to the function which you can use\
    \ as you want. Now you can use the same function as follows:\n\n```python\nadder(1,2)\n\
    adder(1,2,3)\nadder(1,2,5,7,8,9,100)\n```\n\nand so on. Now, have you ever thought\
    \ how the print function in python could take so many arguments? *args\n\n* *\
    \ *\n\n## What are **kwargs?\n\n## seaborn.scatterplot\n\n```python\nseaborn.scatterplot(x=None,\
    \ y=None, hue=None, style=None, size=None, data=None, palette=None, hue_order=None,\
    \ hue_norm=None, sizes=None, size_order=None, size_norm=None, markers=True, style_order=None,\
    \ x_bins=None, y_bins=None, units=None, estimator=None, ci=95, n_boot=1000, alpha='auto',\
    \ x_jitter=None, y_jitter=None, legend='brief', ax=None, **kwargs) What is this?\n\
    ```\n\nIn simple terms, **you can use **kwargs to give an arbitrary number of\
    \ Keyworded inputs to your function** and access them using a dictionary.\n\n\
    A simple example: Let’s say you want to create a print function that can take\
    \ a name and age as input and print that.\n\n```python\ndef myprint(name, age):\n\
    \    print(f'{name} is {age} years old')\n```\n\nSimple. Let us now say you want\
    \ the same function to take two names and two ages.\n\n```python\ndef myprint(name1,\
    \ age1, name2, age2):\n    print(f'{name1} is {age1} years old')\n    print(f'{name2}\
    \ is {age2} years old')\n```\n\nYou guessed right my next question is: **What\
    \ if I don't know how many arguments I am going to need?**\n\nCan I use *args?\
    \ Guess not since name and age order is essential. We don't want to write \"28\
    \ is Michael years old\". Come **kwargs in the picture.\n\n```python\ndef myprint(**kwargs):\n\
    \    for k,v in kwargs.items():\n        print(f'{k} is {v} years old')\n```\n\
    \nYou can call this function using:\n\n```python\nmyprint(Sansa=20,Tyrion=40,Arya=17)\n\
    Output:---------------------------------------\nSansa is 20 years old\nTyrion\
    \ is 40 years old\nArya is 17 years old\n```\n\n**Remember we never defined Sansa\
    \ or Arya or Tyrion as our methods arguments.** **That is a pretty powerful concept.**\
    \ And many programmers utilize this pretty cleverly when they write wrapper libraries.\n\
    \nFor example, **seaborn.scatterplot** function wraps the **plt.scatter** function\
    \ from Matplotlib. Essentially, using *args and **kwargs we can provide all the\
    \ arguments that **plt.scatter** can take to **seaborn.Scatterplot** as well.\n\
    \nThis can save a lot of coding effort and also makes the code future proof. If\
    \ at any time in the future **plt.scatter** starts accepting any new arguments\
    \ the **seaborn.Scatterplot** function will still work.\n\n* * *\n\n## What are\
    \ Decorators?\n\n![](img/754e520429142dbf037b2b2434cf63fd_24_0.png)\n\nIn simple\
    \ terms: **Decorators are functions that wrap another function thus modifying\
    \ its behavior.**"
