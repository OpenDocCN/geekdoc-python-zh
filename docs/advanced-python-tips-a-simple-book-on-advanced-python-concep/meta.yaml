    \ we get it?\n\nUsing a generator, now we know how to use them.\n\n```\ndef triplet(n):\
    \ # Find all the Pythagorean triplets\nbetween 1 and n\n    for a in range(n):\n\
    \        for b in range(a):\n            for c in range(b):\n                if\
    \ a*a == b*b + c*c:\n                    yield(a, b, c)\n```\n\nWe can use this\
