    word_count_dict = defaultdict(int)\nfor w in text.split(\" \"):\n    word_count_dict[w]+=1\n\
    ```\n\n我们也可以使用 **Counter** 来实现，我认为这是解决此问题的首选方法。\n\n```python\nfrom collections\
    \ import Counter\nword_count_dict = Counter()\nfor w in text.split(\" \"):\n \
