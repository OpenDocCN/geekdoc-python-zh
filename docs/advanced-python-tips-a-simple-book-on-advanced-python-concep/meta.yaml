    \n假设我需要统计一段文本中单词出现的次数。比如统计《哈姆雷特》这样的书。我该如何实现呢？\n\n## 高级 Python 技巧\n\nPython 总是为我们提供多种实现同一功能的方法。但在我看来，只有一种方式是优雅的。\n\
