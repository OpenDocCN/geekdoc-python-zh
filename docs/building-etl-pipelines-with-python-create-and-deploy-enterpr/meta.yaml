  md: '# Preface


    We’re living in an era where the volume of generated data is rapidly outgrowing
    its practicality in its unprocessed state. In order to gain valuable insights
    from this data, it needs to be transformed into digestible pieces of information.
    There is no shortage of quick and easy ways to accomplish this using numerous
    licensed tools on the market to create “plug-and-play” data ingestion environments.
    However, the data requirements of industry-level projects often exceed the capabilities
    of existing tools and technologies. This is because the processing capacity needed
    to handle large amounts of data increases exponentially, and the cost of processing
    also increases exponentially. As a result, it can be prohibitively expensive to
    process the data requirements of industry-level projects using traditional methods.


    This growing demand for highly customizable data processing at a reasonable price
    point goes hand in hand with a growing demand for skilled data engineers. Data
    engineers handle the extraction, transformation, and loading of data, which is
    commonly referred to as the **Extract, Transform, and Load (ETL)** process. ETL
    workflows, also known as ETL pipelines, enable data engineers to create customized
    solutions that are not only strategic but also enable developers to create flexible
    deployment environments that can scale up or down depending on any data requirement
    fluctuations that occur between pipeline runs.


    Popular programming languages, such as SQL, Python, R, and Spark, are some of
    the most popular languages used to develop custom data solutions. Python, in particular,
    has emerged as a frontrunner. This is mainly because'
  merge: -1
  pgno: 24
- img_proc: false
  md: 'of its adaptability and how user-friendly it is, making collaboration easier
    for developers. In simpler terms, think of Python as the “universal tool” in the
    data world – it’s flexible and people love working with it.


    *Building ETL Pipelines in Python* introduces the fundamentals of data pipelines
    using open source tools and technologies in Python. It provides a comprehensive
    guide to creating robust, scalable ETL pipelines broken down into clear and repeatable
    steps. Our goal for this book is to provide readers with a resource that combines
    knowledge and practical application to encourage the pursuit of a career in data.


    Our aim with this book is to offer you a comprehensive guide as you explore the
    diverse tools and technologies Python provides to create customized data pipelines.
    By the time you finish reading, you will have first-hand experience developing
    robust, scalable, and resilient pipelines using Python. These pipelines can seamlessly
    transition into a production environment, often without needing further adjustments.


    We are excited to embark on this learning journey with you, sharing insights and
    expertise that can empower you to transform the way you approach data pipeline
    development. Let’s get to it!'
  merge: -1
  pgno: 25
- img_proc: false
  md: '# Who this book is for


    This book is a comprehensive guide to ETL data pipelines in Python. It is targeted
    toward data enthusiasts and software professionals who want to learn about the
    core concepts of ETL designs and applications. To get the most out of this book,
    a basic understanding of Python is recommended.'
  merge: -1
  pgno: 26
- img_proc: false
  md: '# What this book covers


    *Chapter 1, A Primer on Python and the Development Environment*, introduces Python,
    the core of this book. You must have prior experience with Python to understand
    this book. This chapter will not cover anything in detail; instead, it will give
    a primer on Python that’s needed for this book. Also, it will illustrate how to
    set up a development environment with an IDE and check out the code in Git.


    *Chapter 2, Understanding the ETL Process and Data Pipelines*, explains the ETL
    process and the significance of a robust ETL pipeline. This starts with an example
    of how and when to implement an ETL process and how a good pipeline can help automate
    the ETL process. This also explains the difference between ETL and ELT.


    *Chapter 3, Design Principles for Creating Scalable and Resilient Pipelines*,
    deals with the implementation of the best design patterns with open source Python
    libraries to create an enterprise-grade ETL pipeline. It illustrates how to install
    these libraries and primers on all the functions available to create robust pipelines.
    This also explains all the design patterns and approaches available to create
    an ETL process.


    *Chapter 4, Sourcing Insightful Data and Data Extraction Strategies*, deals with
    sourcing data from different source systems. Firstly, we identify an open source
    to get high-quality, insightful data that can act as an input for ETL pipelines.
    Secondly, we discuss various strategies to ingest the sourced data.'
  merge: -1
  pgno: 27
- img_proc: false
  md: '*Chapter 5, Data Cleansing and Transformation*, deals with various data transformation
    techniques in Python. We start with a hands-on example of data cleansing and massaging.
    We also learn how to handle missing data. Finally, we apply various transformation
    techniques to transform the data in the desired format


    *Chapter 6, Loading Transformed Data*, deals with various data loading techniques
    in Python. We start with a hands-on example of data loading in an RDBMS and then
    we repeat this process for NoSQL databases. We’ll also learn about various use
    cases of data loading. Finally, we’ll look into some of the best practices for
    data loading.


    *Chapter 7, Tutorial – Building an End-to-End ETL Pipeline in Python*, creates
    a full-fledged ETL pipeline using various tools and technologies we have learned
    about so far. We’ll source data, ingest data, transform data, and finally, load
    the data into final tables. We use the MySQL database for the example.


    *Chapter 8, Powerful ETL Libraries and Tools in Python*, explores various open
    source tools to create a modern data pipeline. First, we’ll explore Python libraries
    such as Bonobo, Odo, mETL, and Riko. We’ll go through the pros and cons and create
    an ETL pipeline by applying these libraries. Finally, we’ll move to big data and
    study tools such as Apache Airflow, Luigi, and pETL.


    *Chapter 9, A Primer on AWS Tools for ETL Processes*, explains various AWS tools
    for creating ETL pipelines. It goes from explaining various strategies to selecting
    the best tools and design patterns. You’ll learn how to create a development environment
    for AWS and deploy the code locally.'
  merge: -1
  pgno: 28
- img_proc: false
  md: 'We’ll also explore the best strategies for deployment and testing. Finally,
    we’ll use some automation techniques to automate boring stuff.


    *Chapter 10*, *Tutorial – Creating an ETL Pipeline in AWS*, creates an ETL pipeline
    in AWS in conjunction with Python. We start by creating a mini pipeline using
    a step function and AWS Lambda. Then, we go on to create a full-fledged pipeline
    using Bonobo, EC2, and RDS.


    *Chapter 11*, *Building Robust Deployment Pipelines in AWS*, creates a basic CI/CD
    pipeline for ETL jobs. We’ll use AWS CodePipeline, CodeDeploy, and CodeCommit
    to create a robust CI/CD pipeline to automate the code deployment. We’ll see an
    example of how Git can be leveraged for a CI/CD pipeline in AWS. We’ll also get
    familiar with using Terraform for code deployment.


    *Chapter 12*, *Orchestration and Scaling in ETL Pipelines*, covers the limitations
    of ETL pipelines and how to scale ETL pipelines to handle increasing demand seamlessly.
    It goes on to explain how to choose the best scaling strategies. It also explains
    how to create robust orchestration for ETL pipelines. Finally, we’ll work on a
    hands-on exercise to create an ETL pipeline and apply scaling and orchestration
    strategies.


    *Chapter 13*, *Testing Strategies for ETL Pipelines*, deals with ETL testing strategies.
    A pipeline may contain bugs and it is very important to catch them before they
    make it to production. Unit testing using pytest does cover most errors, but an
    external ETL testing strategy is central to creating a high-performance, resilient
    ETL pipeline.


    *Chapter 14*, *Best Practices for ETL Pipelines*, covers some of the industry
    best practices for creating ETL pipelines in production. It also identifies'
  merge: -1
  pgno: 29
- img_proc: false
  md: 'some of the common pitfalls that users should avoid while building ETL pipelines.


    *Chapter 15*, *Use Cases and Further Reading*, covers practical exercises and
    mini-project outlines, with further reading suggestions included in this chapter.
    Also, it exposes you to a use case of creating a robust ETL pipeline for New York
    yellow-taxi data for analysis. Finally, we’ll get US construction market data
    through AWS Marketplace and create a production-ready, fault-tolerant, high-quality
    data pipeline in AWS.


    # To get the most out of this book


    To effectively utilize the resources and code examples referenced within this
    book, ensure that your system meets the following technical requirements:


    | Software/hardware covered in the book | Operating system requirements |

    | :--- | :--- |

    | PyCharm 2023.2 | Windows, macOS, or Linux |

    | Jupyter Notebook 7.0.2 | |

    | Python 3.6+ | |


    We recommend using PyCharm as the preferred **Integrated Development Environment
    (IDE)** for working with Python, and we might make specific references to PyCharm
    throughout this book. However, you are free to use any Python-compatible IDE of
    your choice.'
  merge: -1
  pgno: 30
- img_proc: false
  md: 'We also recommend installing `pipenv` as it is used for managing dependencies.


    # Download the example code files


    You can download the example code files for this book from GitHub at [https://github.com/PacktPublishing/Building-ETL-Pipelines-with-Python](https://github.com/PacktPublishing/Building-ETL-Pipelines-with-Python).
    If there’s an update to the code, it will be updated in the GitHub repository.
    We recommend that you fork and clone the repository to your local machine


    We also have other code bundles from our rich catalog of books and videos available
    at [https://github.com/PacktPublishing/](https://github.com/PacktPublishing/).
    Check them out!


    # Conventions used


    There are a number of text conventions used throughout this book.


    **Code in text**: Indicates code words in text, database table names, folder names,
    filenames, file extensions, pathnames, dummy URLs, user input, and Twitter (now,
    X) handles. Here is an example: “For example, let’s write a simple data pipeline
    that imports three CSVs, `traffic_crashes.csv`, `traffic_crash_vehicle.csv`, and
    `traffic_crash_people.csv`, as input data.”


