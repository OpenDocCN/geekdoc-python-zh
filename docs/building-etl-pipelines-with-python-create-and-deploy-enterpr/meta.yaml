    IDE: PyCharm. For those of you unfamiliar with IDEs, you can think of an IDE in
    a similar fashion to iTerm: a visual interface that not only creates an aesthetically
    pleasing coding environment but also allows you to quickly, efficiently format
    and structure files with a few short commands. Our local PyCharm environment will
    be where we choose to clone the Git repository that we created in the previous
    section.'
