- img_proc: false
  md: 'Creating and maintaining a `requirements.txt` document is a standard practice
    in Python application development. Future updates or major changes to dependencies
    could potentially break the application, but developers can always install the
    recorded previous versions, ensuring smooth execution of the code without errors.
    By freezing the application to specific versions of dependencies, it ensures that,
    given the correct requirements, your project will maintain its original state.
    This approach proves beneficial, providing a win-win situation for developers
    and the application’s reliability.


    Let’s look at how to install dependencies using the `requirements.txt` file:


    ```

    (base) usr@project%  pip install -r requirements.txtex:

    requirements.txt

    pip==3.9

    python==3.9.4

    pandas==1.4.2

    requests==2.28.0

    ```


    Additionally, you can update and store the new package imports and versions with
    the following command to keep the `requirements.txt` file up to date:


    ```

    (base) usr@project %  pip freeze >> requirements.txt

    ```


    That is how we can collect dependencies in the `requirements.txt` file. The next
    section will review some key concepts that are essential to know before we start
    building data pipelines.


    # Accounting for circular dependencies


    The concept of circular dependency is not always talked about when first learning
    Python, but it’s a concept where one or more modules depend on'
  merge: -1
  pgno: 54
- img_proc: false
  md: 'each other:


    ![](bbox=[0.13, 0.14, 0.87, 0.54])


    Figure 1.1: A circular dependency


    While there are many useful aspects of this interdependency, underlying second
    and third-degree inconsistencies, such as one Python module version being incompatible
    with another Python module version, can result in a cascading effect of uncontrolled
    errors that lead to a smorgasbord of application failures. Alluding back to our
    initial analogy about a development project being similar to a laboratory experiment,
    this is why system *sterility* comes into play. To create an internally consistent
    environment, versions of the dependencies must be flexibly adjusted to account
    for the circular interdependencies of imports. This magic of MMS begins!'
  merge: -1
  pgno: 55
- img_proc: false
  md: '# Utilizing module management systems (MMSs)


    MMSs are like special folders that only work in certain environments. They do
    this by changing `sys.prefix` and `sys.exec_prefix` so that they point to the
    base directory of the virtual environment. This is helpful because it lets developers
    create “clean” applications and also makes sure that all the different parts of
    the project work well together.


    There are many different module management systems to choose from, but Anaconda
    is the most popular. However, it doesn’t always have the most up-to-date packages
    for data engineers, and `pip`, the regular package manager for Python, doesn’t
    work well with Anaconda. That’s why we’re using `pipenv` in this book. It’s a
    virtual environment and package management system that uses `Pipfile` and `Pipfile.lock`,
    similar to a `requirements.txt` file.


    # Instigating a virtual MMS environment within your local IDE


    Creating a virtual MMS environment within your local IDE can be a helpful way
    to test and run your code before you implement it in a larger system. This virtual
    environment allows you to simulate different scenarios and conditions to ensure
    that your code is working properly and efficiently. It can also help you identify
    and fix any errors or bugs that may arise during the development process.


    Overall, setting up a virtual MMS environment within your local IDE can be a valuable
    tool for streamlining your coding workflow and ensuring that your projects are
    successful.'
  merge: -1
  pgno: 56
- img_proc: false
  md: '# Configuring a Pipenv environment in PyCharm


    In Python development, managing project environments is crucial to keep your project’s
    dependencies organized and controlled. One way to achieve this is by using pipenv.
    Let’s start the process by installing Pipenv. Open your Terminal and execute the
    following command:


    ```

    (base) usr@project % pip install --user pipenv

    ```


    This command instructs `pip` (a Python package manager) to install Pipenv in your
    user space. The `--user` option ensures that Pipenv is installed in the user install
    directory for your platform.


