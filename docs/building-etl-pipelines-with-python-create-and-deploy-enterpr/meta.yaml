  md: '# What is a data pipeline?


    A data pipeline is a series of tasks, such as transformations, filters, aggregations,
    and merging multiple sources, before outputting the processed data into some target.
    In layman’s terms, a data pipeline gets data from the “source” to the “target,”
    as depicted in the following diagram:


    ![](bbox=[0.12, 0.28, 0.88, 0.68])


    Figure 2.1: A sample ETL process illustration


    You can think of pipelines as transport tubes in a mailroom. Mail can be placed
    in specific tubes and *sucked* up to specific processing centers. Based on specific
    labels, the mail is then moved and sorted into specific pathways that eventually
    bring it to its destination. The core concept of data pipelines is quite similar.
    Like mail, packets of raw data are ingested into the entry of'
  merge: -1
  pgno: 63
- img_proc: false
  md: 'the pipeline and, through a series of steps and processes, the raw material
    is formatted and packaged into an output location, which is most commonly used
    for storage.


    From a business perspective, the driving incentive for creating data pipelines
    is to design a system to transform their most valuable asset – raw data – into
    actionable information (*Reference #2*). Typically, data pipeline architectures
    feature a unidirectional (one-way) communication flow between the flow of input
    data sources to output data storage systems (*Reference #1*):'
