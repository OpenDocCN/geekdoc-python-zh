  md: '# Import statement


    If you want to use functionality stored in another package you must use an import
    statement.

    Lets print your user name on the screen using Python interpreter:


    ```

    >>> import getpass

    >>> getpass.getuser()

    ''gunther''

    ```


    The snippet above shows how to import the most top level package. As you can see
    members of the package are supposed to be accessed via the dot operator.

    You may avoid using the dot operator by importing the thing you need directly:


    ```

    >>> from getpass import getuser

    >>> getuser()

    ''gunther''

    ```


    To indicate the source of the import you must use from keyword. Sometimes you
    may want to use multiple entities from the same package. In this case it is simpler
    to import all the entities straight away:


    ```

    >>> from sys import pydebug, flags

    ```


    Note, the entities kept inside Python packages can be virtually any Python constructs.
    A class, a function, a variable, a module or even a package (nested packages are
    possible).'
