    of it is to transform arbitrary object’s state into something that could be transfered
    over the wire and/or stored in such a manner that the original object could be
    reconstructed later on. The process of reconstruction is called deserialization.

    A real life analogy of serialization is the process of investigating an existing
    artifact (e.g. a car) and making a detailed blueprint of it (engine, wheels, transmission,
    etc). Sending serialized data over the wire is similar to sending the blueprint
    over a normal mail. And deserialization is the process of constructing a copy
    of the original object by someone based on the fetched blueprints.

    In the realm of web programming two standards of data serialization gained highest
    popularity. XML and JSON. Both are textual which implies that data represented
    using these standards can be easily viewed by a human-being via a simple text
    editor like VIM. The subject of this chapter is JSON and the means of Python to
    serialize data using it.

    JSON is a native way to operate with data in JavaScript programming language.

    As a format JSON operates with three major constructs.


    +   1. Primitives: integers, floating point numbers, strings, booleans and null
    datatype

    2. Objects: equivalents of Python dictionaries

    3. Arrays: equivalents of Python lists


    As you can see all JSON constructs perfectly match Python built-in types. Thus
    the main purpose of serialization of Python data'
