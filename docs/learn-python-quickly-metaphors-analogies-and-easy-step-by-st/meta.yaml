    \n```\n1. try:\n2. raise YourException(“Human-readable message”)\n3. except YourException\
    \ as e:\n4. print(“Your exception just occurred with a message: “ + str(e))\n\
    ```\n\n## Quiz\n\nPROBLEM:\n\n+   1. Which block is supposed to be used to handle\
    \ exceptions?\n2. What is the name of the long text blob that is printed once\
    \ an exception takes place?\n\nANSWER:\n\n+   1. try/except block\n2. traceback\n\
    \n![](img/aa40a53b0a290b6d5f6161cb7a1b7c68_67_0.png)\n\n## Import statement and\
    \ Python modules and packages\n\nAll source code in Python, as you may have noticed,\
    \ is stored in various files called modules. Each module has a .py extension.\
    \ Different modules are logically combined together into collections called packages.\
    \ A package is a plain folder with\n\ninit .py file. E.g. the following is a package:\n\
    \n+   1. foobar/\n2. init .py\n3. one.py\n4. two.py\n5. three.py\n\nAnd this one\
    \ is not:\n\n+   1. foobar/\n2. one.py\n3. two.py\n4. three.py\n\nDefault Python\
    \ installation comes with a significant amount of packages.\nThis set of packages\
    \ is called a standard library.\n\n## Import statement\n\nIf you want to use functionality\
    \ stored in another package you must use an import statement.\nLets print your\
    \ user name on the screen using Python interpreter:\n\n```\n>>> import getpass\n\
    >>> getpass.getuser()\n'gunther'\n```\n\nThe snippet above shows how to import\
    \ the most top level package. As you can see members of the package are supposed\
    \ to be accessed via the dot operator.\nYou may avoid using the dot operator by\
    \ importing the thing you need directly:\n\n```\n>>> from getpass import getuser\n\
    >>> getuser()\n'gunther'\n```\n\nTo indicate the source of the import you must\
    \ use from keyword. Sometimes you may want to use multiple entities from the same\
    \ package. In this case it is simpler to import all the entities straight away:\n\
    \n```\n>>> from sys import pydebug, flags\n```\n\nNote, the entities kept inside\
    \ Python packages can be virtually any Python constructs. A class, a function,\
    \ a variable, a module or even a package (nested packages are possible)."
  mdcn: "## While 循环\n\nPython 提供了 `break` 和 `continue` 语句，以便对循环进行更精细的控制。\n\n![](img/aa40a53b0a290b6d5f6161cb7a1b7c68_57_0.png)\n\
    \n```\n1. **while** <test1>:\n2. <statement1>\n3. **if** <test2>: **break**\n\
    4. **if** <test3>: **continue**\n5. **else**:\n6. <statement2>\n```\n\n#循环退出，跳过\
    \ else #返回顶部 <test1> #如果未发生 break 则执行\n\n## 循环\n\n![](img/aa40a53b0a290b6d5f6161cb7a1b7c68_58_0.png)\n\
    \n你可以使用 “for” 循环来遍历一个集合。\n假设你有以下列表：\n1. a = [“one”, “two”, “three”]\n要逐个打印每个字符串，你可以使用这个循环：\n\
    1. **for** item **in** a:\n2. **print**(item)\n\n循环必须使用 “for” 关键字、用于保存每个单独项的新变量名、“in”\
    \ 关键字、集合的名称以及冒号来定义。“for” 循环内部的语句也必须缩进。\n\n你可以使用 “break” 命令从循环中跳出：\n\n```\n1. numbers\
    \ = [1, 2, 5, 6, 7, 8, 9]\n2. **for** number **in** numbers:\n3. **print**(“Looking\
    \ at: “ + **str**(number))\n4. **if** number > 6:\n5. **print**(“Too big: “ +\
    \ **str**(number) + “!”)\n6. **break**\n```\n\n上述代码产生以下输出：\n\n```\nLooking at:\
    \ 1\nLooking at: 2\nLooking at: 5\nLooking at: 6\nLooking at: 7\n```\n\nToo big:\
    \ 7!\n\n迭代在数字 7 之后停止，这意味着数字 8 和 9 不会被包含。\n你也可以使用 “continue” 关键字跳过集合中的特定项：\n\n\
    ```\n1. numbers = [1, 6, 7, 8, 9, 2, 5]\n2. for number in numbers:\n3. if number\
    \ > 6:\n4. continue\n5. print(“Looking at: “ + str(number))\n```\n\n上述代码产生以下输出：\n\
    \n```\nLooking at: 1\nLooking at: 6\nLooking at: 2\nLooking at: 5\n```\n\n这里，我们忽略了数字\
    \ 7、8 和 9。\n字典也可以用同样的方式遍历。\n\n```\n1. ages = {\n2. “John”: 34,\n3. “Matt”: 23,\n\
    4. “Natasha”: 27,\n5. “Gabriella”: 33\n6. }\n7. for name in ages:\n8. print(name)\n\
    ```\n\n## 测验\n\n问题：\n\n+   1. 如果你想编写代码，只要你在睡觉，就每十分钟触发一次警报，你应该使用 “for” 循环还是 “while”\
    \ 循环？\n2. 如何完全停止一个 while 循环？给出两种方法。 3. 如何在 for 循环中跳过特定项？给出两种方法。\n\n答案：\n\n+  \
    \ 1. while\n2. 将 while 循环的条件更改为求值为 False，或使用 break 关键字。\n3. 将项处理的代码隔离在 if 语句中，或使用\
    \ continue 关键字。\n\n## 练习\n\n问题：编写一些代码，打印出 ages 字典中最年长者的名字。这将用到本书前面章节的知识。\n答案：\n\
    \n```\n1. ages = {\n2. “John”: 34,\n3. “Matt”: 23,\n4. “Natasha”: 27,\n5. “Gabriella”:\
    \ 33\n6. }\n7. oldest_person = None\n8. current_biggest_age = 0\n9. for name in\
    \ ages:\n10. age = ages[name]\n11. if age > current_biggest_age: 12. oldest_person\
    \ = name 13. current_biggest_age = age 14. print(oldest_person)\n```\n\n## 文件操作\n\
    \n大多数文件操作可以归结为：打开文件、读取文件、将数据写入文件以及关闭文件。通常，你写入文件的数据是文本。\n假设你想将一个整数列表写入文件，使每个整数占一行。首先，打开文件：\n\
    \n```\n1. the_file = open(“integers.txt”, “w”)\n```\n\n“open” 函数的第一个参数是文件的路径，第二个参数告诉\
    \ Python 你想将数据写入文件。这意味着文件在你开始之前不必存在。该函数返回一个文件对象，你可以在之后使用。首先，让我们定义一个整数数组，并将它们作为字符串写入文件。\n\
    \n```\n1. integers = [1, 2, 3, 4, 5]\n2. for integer in integers:\n3. the_file.write(str(integer)\
    \ + ‘\\n’)\n```\n\n“write” 方法接受一个字符串作为参数，并将其写入文件。\n注意 “\\n” 符号 - 这是换行符。它在文件中开始一个新行。\n\
    \n当你完成文件操作后，必须关闭它：\n\n```\n1. the_file.close()\n```\n\n你也可以从文件中读取数据。\n首先，不使用 “w”\
    \ 标志打开文件：\n\n```\n1. the_file = open(“integers.txt”)\n```\n\n获取文件中的所有行：\n\n```\n\
    1. lines = the_file.readlines()\n```\n\nreadlines() 函数将文件中的所有行作为字符串列表返回。\n让我们打印这些行：\n\
    \n```\n1. for line in lines: 2. print(line)\n```\n\n执行上述代码后，你将在屏幕上看到以下内容：\n\n\
    ```\n1\n2\n3\n4\n5\n```\n\n与写入文件一样 - 完成后关闭它：\n\n```\n1. the_file.close()\n```\n\
    \n## 测验\n\n问题：\n\n+   1. 换行符是什么样子的？\n2. 完成文件操作后，你应该做什么？\n3. 哪种方法用于将数据放入文件？\n4.\
    \ 你应该使用哪种方法来获取文件中的所有行？\n\n答案：\n\n+   1. \\n\n2. 关闭它\n3. write\n4. readlines\n\n\
    ## 异常\n\n有时会发生意外情况，导致程序无法按预期执行。这些事件称为“异常”。\n>>> 1 / 0\n按下回车键后，你将看到以下输出：\n\n```\n\
    Traceback (most recent call last):\n  File \"<stdin>\", line 1, in <module>\n\
    ZeroDivisionError: division by zero\n```\n\n这称为异常回溯。它向你显示在异常发生之前调用了哪些函数或方法。最后一行告诉你引发了哪个异常，并提供一些额外的、人类可读的信息。\n\
    在 Python 中，你可以通过 try/except 块来实现这一点。\n如果异常发生在重要操作的中间怎么办？让我们打印 “*division by zero.\
    \ But it is totally fine.*” 而不是抛出回溯。\n\n```\n1. try:\n2.     1 / 0\n3. except\
    \ ZeroDivisionError as e:\n4.     print(str(e) + “. But it is totally fine.”)\n\
    ```\n\n在上面的代码中，你可以看到你想要尝试执行的语句放在 try 块中。所有错误处理代码都放在 except 下。\nexcept 关键字必须伴随一个异常类。\n\
    它也可以后跟一个 as 关键字和一个变量，该变量用于存储错误的人类可读描述。\n\n## 自定义异常\n\n你可以定义自己的异常类，以进一步通知代码内部发生了异常情况：\n\
    \n```\n1. class YourException(Exception): 2. pass\n```\n\n所有自定义异常都必须有一个内置的 Python\
    \ 异常作为父类。异常不必实现任何其他逻辑。为了引发异常，你应该使用 raise 关键字：\n\n```\n1. raise YourException(“Human-readable\
    \ message”)\n```\n\n一旦你执行上述代码，你将看到一个回溯，其中 “Human-readable message” 字符串作为额外细节。处理自定义异常与处理内置异常没有区别：\n\
    \n```\n1. try:\n2. raise YourException(“Human-readable message”)\n3. except YourException\
    \ as e:\n4. print(“Your exception just occurred with a message: “ + str(e))\n\
    ```\n\n## 测验\n\n问题：\n\n+   1. 应该使用哪个块来处理异常？\n2. 异常发生时打印的长文本块叫什么名字？\n\n答案：\n\n\
    +   1. try/except 块\n2. traceback\n\n![](img/aa40a53b0a290b6d5f6161cb7a1b7c68_67_0.png)\n\
    \n## Import 语句、Python 模块和包\n\n正如你可能已经注意到的，Python 中的所有源代码都存储在称为模块的各种文件中。每个模块都有一个\
    \ .py 扩展名。不同的模块在逻辑上组合在一起，形成称为包的集合。包是一个普通的文件夹，其中包含一个 `__init__.py` 文件。例如，以下是一个包：\n\
    \n+   1. foobar/\n2. __init__.py\n3. one.py\n4. two.py\n5. three.py\n\n而这个不是：\n\
    \n+   1. foobar/\n2. one.py\n3. two.py\n4. three.py\n\n默认的 Python 安装附带了大量的包。\n\
    这组包称为标准库。\n\n## Import 语句\n\n如果你想使用存储在另一个包中的功能，必须使用 import 语句。\n让我们使用 Python 解释器在屏幕上打印你的用户名：\n\
    \n```\n>>> import getpass\n>>> getpass.getuser()\n'gunther'\n```\n\n上面的代码片段展示了如何导入最顶层的包。如你所见，包的成员应该通过点运算符访问。\n\
    你可以通过直接导入所需内容来避免使用点运算符：\n\n```\n>>> from getpass import getuser\n>>> getuser()\n\
    'gunther'\n```\n\n要指明导入的来源，必须使用 from 关键字。有时你可能想从同一个包中使用多个实体。在这种情况下，更简单的方法是直接导入所有实体：\n\
    \n```\n>>> from sys import pydebug, flags\n```\n\n请注意，Python 包中保存的实体可以是几乎任何 Python\
    \ 构造。一个类、一个函数、一个变量、一个模块甚至一个包（嵌套包是可能的）。"
