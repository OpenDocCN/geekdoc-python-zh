    \ substring):\n    findings = list(re.finditer(substring, string))\n    return\
    \ len(findings)\n```\n\n## 数学模块\n\n本章概述了 Python 标准库中的数学模块。该模块包含常见数学运算的实现，例如平方根，这些运算未包含在标准函数集中。\n\
