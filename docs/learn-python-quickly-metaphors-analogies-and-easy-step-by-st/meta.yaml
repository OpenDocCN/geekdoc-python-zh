    \ JSON\n\nIn software engineering there is a process called serialization. The\
    \ main purpose of it is to transform arbitrary object’s state into something that\
    \ could be transferred over the wire and/or stored in such a manner that the original\
    \ object could be reconstructed later on. The process of reconstruction is called\
    \ deserialization.\n\nA real life analogy of serialization is the process of investigating\
    \ an existing artifact (e.g. a car) and making a detailed blueprint of it (engine,\
    \ wheels, transmission, etc). Sending serialized data over the wire is similar\
    \ to sending the blueprint over a normal mail. And deserialization is the process\
    \ of constructing a copy of the original object by someone based on the fetched\
    \ blueprints.\n\nIn the realm of web programming two standards of data serialization\
    \ gained highest popularity. XML and JSON. Both are textual which implies that\
    \ data represented using these standards can be easily viewed by a human-being\
    \ via a simple text editor like VIM. The subject of this chapter is JSON and the\
    \ means of Python to serialize data using it.\n\nJSON is a native way to operate\
    \ with data in JavaScript programming language.\n\nAs a format JSON operates with\
    \ three major constructs.\n\n1.  Primitives: integers, floating point numbers,\
    \ strings, booleans and null datatype\n2.  Objects: equivalents of Python dictionaries\n\
    3.  Arrays: equivalents of Python lists\n\nAs you can see all JSON constructs\
    \ perfectly match Python built-in types. Thus the main purpose of serialization\
    \ of Python data structures into JSON is to transform Python built-in types into\
    \ a JSON string that could be e.g. sent as a payload inside of an HTTP request/response\
    \ body.\n\nBy default Python can serialize the following datatypes: `int`, `bool`,\
    \ `None`, `str`, `float`, `long`, `dict` and `list`. There are ways of extending\
    \ this functionality but they are out of the scope of this chapter.\n\nPython’s\
    \ module responsible for serialization is called `json`. It contains two major\
    \ functions: `dumps` and `loads`. `dumps` expects Python data structure as the\
    \ input and returns JSON string as the output. `loads` does the inverse - it expects\
    \ a JSON string as an input and returns Python data structure as an output.\n\n\
    ## Code Examples\n\nImport JSON module\n\n```python\nimport json\n```\n\nSerialize\
    \ a list of strings into JSON array\n\n```python\nlist_of_strings = [\"one\",\
    \ \"two\", \"three\", \"four\"]\njson_array = json.dumps(list_of_strings)\n```\n\
    \nDeserialize a JSON object into a Python data structure\n\n```python\njson_data\
    \ = \"\"\"\n{\n    \"integer\": 1,\n    \"inner_object\": {\n        \"nothing\"\
    : null,\n        \"boolean\": false,\n        \"string\": \"foo\"\n    },\n  \
    \  \"list_of_strings\": [\n        \"one\",\n        \"two\"\n    ]\n}\n\"\"\"\
    \npython_dict = json.loads(json_data)\n```\n\nSerialize an integer\n\n```python\n\
    print(json.dumps(1))  # 1\nprint(type(json.dumps(1)))  # <class 'str'>\n```\n\n\
    ## Code Samples\n\nSerialize a string\n\n```python\n>>> print(json.dumps(\"FOO\"\
    ))\n\"FOO\"\n>>> print(len(json.dumps(\"FOO\")))\n5\n```\n\nTry to deserialize\
    \ something that is not JSON - `ValueError` is raised when the input can’t be\
    \ processed\n\n```python\n>>> json.loads(\"FOO\")\nTraceback ...\n...\nValueError:\
    \ No JSON object could be decoded\n```\n\nTry to serialize something that does\
    \ not have a representation in JSON - only a limited set of Python built-in types\
    \ is supported by default\n\n```python\n>>> class Teacher(object):\n...     pass\n\
    >>> t = Teacher()\n>>> json.dumps(t)\nTraceback ...\n...\nTypeError: <...Teacher\
    \ instance at ...> is not JSON serializable\n```\n\n## Quiz\n\n**PROBLEM:**\n\n\
    1.  Which function is responsible for JSON serialization in Python?\n2.  What\
