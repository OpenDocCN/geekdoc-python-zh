    # Regular Expressions


    Although you can use the “in” operator to check if a substring is present within
    a string, it doesn’t tell you where the substring is located, nor does it let
    you match the substring nonprecisely. Take this string:


    ```

    >>> lorem_text = “Lorem ipsum dolor sit amet, consectetur adipiscing elit, sed
    do eiusmod tempor incididunt ut labore et dolore magna aliqua.”

    ```


    You want to find out if this text contains something like “dolor BLA BLA BLA amet”
    -the words “dolor” and “amet” in that order, with any amount of text in between.
    To do this, you can use the re.search method:


    ```

    >>> import re

    >>> found = re.search(“dolor .* amet”, lorem_text)

    >>> found

    <_sre.SRE_Match object; span=(12, 26), match=’dolor sit amet’>

    ```


    The “search” function takes a regular expression pattern as its first argument,
    and the text to be searched as its second argument. The regular expression patter
    is a flexible description of what you’re looking for in the text. The format is
    covered later in this chapter.


    Look at the return value of the search function: it’s called a MatchObject, and
    it tells you where the substring was found in the original text.


    If the pattern can’t be found, then the function returnsNone:'
  - '[PAGE 78]


    ```

    >>> match = re.search("found", lorem_text)

    >>> type(match)

    <class ''NoneType''>

    ```


    You may get start and end indices of the substring from the match object:


    ```

    >>> found.start()

    12

    >>> found.end()

    26

    ```


    and access the substring matched by the pattern:


    ```

    >>> found.group()

    ''dolor sit amet''

    >>> lorem_text[12:26]

    ''dolor sit amet''

    ```


    Note: if multiple occurrences of the patter are found, only the first one is returned.
    If you need to go through all of the occurrences, use the re.finditer function:


    ```

    >>> list(re.finditer("dolor .*amet", lorem_text))

    [<sre.SRE_Match object; span=(12, 26), match=''dolor sit amet''>]

    ```


    If you want to see if a string matches a certain pattern, you should use the re.match
    function, which tries to apply the pattern to the whole string:


    ```

    >>> bool(re.match("[0-9][az]*", "0dgfgfg"))

    True

    >>> bool(re.match("[0-9][az]*", "dgfgfg"))

    False

    ```


    The symbols “ .*” in the regular expression pattern match to zero or more arbitrary
    characters. A dot represents an arbitrary'
