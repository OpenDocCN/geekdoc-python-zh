    \ you missed double quotes inside JSON string\n\nImplement `join_two_arrays` function\n\
    \n```python\n>>> array_of_strings_one = [\"one\", \"two\"]\n>>> array_of_strings_two\
    \ = [\"three\", \"four\"]\n>>> print(join_two_arrays(array_of_strings_one, array_of_strings_two))\n\
    [\"one\", \"two\", \"three\", \"four\"]\n>>> type(join_two_arrays(array_of_strings_one,\
