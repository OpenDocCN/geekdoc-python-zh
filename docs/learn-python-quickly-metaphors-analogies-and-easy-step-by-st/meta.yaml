    Metaphors, Analogies And Easy Step-By-Step Exercises To Learn Fundamentals


    ## Why Python?


    When you set out on your software engineering venture at school, you’ll most likely
    beginning by learning Python. So why pick Python over some other programming language?
    It’s simple:


    - Regardless of your operating system, Python is easy to set up.

    - Python code uses plain English, making it easy to understand.

    - Python will let you run bad code.


    Why is this good?

    When you’re learning you will undoubtedly commit errors. Python lets you know
    the mistake after you run the code, assisting you with finding the problem.


    Python is a very powerful tool, but it’s also easy and fast to learn, which is
    why most people prefer it.


    ## Installation


    There are pre-aggregated bundles made for simple establishment on various working
    frameworks like Windows, Linux, UNIX and Mac OS to name yet a few.

    If you head over to https://www.python.org/downloads/ you can select the right
    installation method for your operating system. Most Linux frameworks accompany
    Python pre-installed.

    Version 3 of Python is utilized in this book.

    In Windows, whenever you have introduced Python, select Python IDLE or Python
    order line/console from the Start menu or screen. The distinction between the
    IDLE and the control center is that the IDLE has a graphical interface, which
    appears to be like a word processor. In Linux, UNIX, and OS X, you can dispatch
    Python emulator from order line by composing Python.


    To choose a specific version of Python type PythonX where X is the version number
    (e.g. “Python3” for version 3).


    ## Hello World!


    Most of the time that you compose Python code, you will compose the content in
    the IDLE or some other IDE like Eclipse or rich word processor like Sublime text
    or Notepad++. Notwithstanding, you can utilize the Python translator to compose
    code intuitively as it behaves like a UNIX shell,

    Even however it is feasible to make programs utilizing only the mediator it is
    emphatically prescribed not to do as such since it is difficult to save the code
    as a content for additional reuse. Rather consider the translator as an“on the
    fly” testing device for your coding concepts.

    Now lets make the mediator yield“Hi World!” string on the screen. Lets do it through
    the interpreter.


    ### Terminal way


    Launch the mediator from order line utilizing Python order as it was portrayed
    in the past chapter.

    Type the following: print(“Hello world!”) and hit“Enter”. The terminal shall look
    the following way:


    In the code piece above you can see that the primary line begins with >>>.

    This image demonstrates the line where you give dynamic contribution to the translator.
    Notice, when the aftereffect of your first order was imprinted on the screen the
    mediator printed >>> once more. Giving directions to the translator is successive.
    You give one guidance - you stand by till execution gets done, you enter another
    order thus on. Note, further on in this book assuming you spot >>> image in a
    code scrap it will imply that you are relied upon to test the code in the mediator
    yourself.

    On the main line you entered an assertion. The assertion is nothing else except
    for a guidance for a PC to play out some undertaking. The undertaking could be
    anything from make_a_coffee to launch_a_rocket. For your situation it is a basic
    print work though. Functions will be shrouded further in this book.


    ### Scripting Way


    One of the fundamental standards of computer programming is reusability. How about
    we make the code that was simply tried in the mediator reusable. To do as such,
    make a record called “hello_world.py” and type the following text inside:


    1. print(“Hello World!”)


    What you put into the document is by and large the line that was recently executed
    by means of the interpreter.

    Now lets execute the content that you wrote.

    Open the order line, explore to the area where the content dwells and type the
    accompanying: python hello_world.py. After you hit enter you will see that a“Hi
    World!” text was put on the screen.

    Congratulations!

    You’ve figured out how to compose your first Python program and effectively dispatch
    it.


    # Part I: Built-in language features


    ## Variables


    In Python, a variable can be utilized to store the result of an assertion in the
    PC’s memory.


    The equivalents sign is utilized to allocate a worth to a variable. The name of
    the variable is called its identifier.


    ```

    >>> a is b

    True

    >>> print (id(a))

    123123123

    >>> print (id(b))

    123123123

    ```


    You might allocate similar worth to various factors utilizing the accompanying
    syntax:


    ```

    >>> a = b = c = d = f = "Hello World!"

    >>> a

    Hello World!

    >>> c

    Hello World!

    >>> f

    Hello World!

    ```


    Python variable names should follow the accompanying rules:

    1. They should begin with a letter or an underscore

    2. They must contain only letters, digits or underscores


    Several examples of illegal variable names:


    1. 2var

    2. var-bar

    3. foo.loo

    4. @var

    5. $var


    Python also has some special words that can’t be used as variable names:


    and assert break class continue def del elif else except exec finally for from
    global if import in is lambda not or pass raise return try while yield


    **PROBLEM:** Which statements are valid?


    1. $foo = “bar”

    2. lambda = “bar”

    3. finally = “yes”

    4. pass = “you shall not”

    5. buga_wuga_ = “@@@huz”

    6. foo_bar = “bar”


    **ANSWER:** The two last ones. Note, the assertion before the last one simply
    looks mistaken. Actually it is a totally lawful variable with a legitimate string
    value.


    **PROBLEM:** Assign value “blah” to variables zen, foo and bar in one line.


    **ANSWER:**


    ```

    foo = bar = harmony = “blah”

    ```


    ## Data types


    The accompanying table gives an outline of the most habitually utilized information
    types in Python.


    | Variable type | Example | Usage comment |

    | :--- | :--- | :--- |

    | bool | life_is_good = True | true/false values |

    | | hamsters_are_evil = False | |

    | int, long | size_of_shoes = 42 | various whole digits |

    | | earth_population = 7000000000 | |

    | float | pi = 3.14159265359 | not whole digits - with one or more signs after
    a dot |

    | str | chinese_hi = "hi" | any text |

    | None | my_new_book = None | empty variable without any meaningful value |


    You can store information of various kinds inside a variable utilizing the assignment
    administrator“=“.

    Multiline strings can be used to store large text blocks.


    ```

    long_text = """ Line one

    Line two

    Line three

    Line Four

    """

    ```


    As you can see, a multiline string is a typical string encased by triple statements
    rather than single ones.

    In Python it is possible to convert strings to integers and integers to strings:


    ```

    >>> str(100)

    ''100''

    >>> int("234")

    234

    ```


    ## Quiz


    **PROBLEM:**

    1. What is the name of this = operator?

    2. How to change over a digit 3.14 into a string‘3.14’?


    **ANSWER:**

    1. task administrator

    2. str(3.14)


    ## Basic Math


    Python has a lot of implicit number juggling administrators. The table underneath
    gives a concise examination of the short documentations and their more extended
    equivalents. Assume that at first coming up next is valid: a = 3.


    | Operation | Short notation | Long notation | Value of a | Comment |

    | :--- | :--- | :--- | :--- | :--- |

    | Addition | a += 1 | a = a + 1 | 4 | |

    | Subtraction | a -= 1 | a = a - 1 | 2 | |

    | Multiplication | a *= 2 | a = a * 2 | 6 | |

    | Division | a /= 2 | a = a / 2 | 1.5 | Returns decimal values or float numbers
    |

    | Modulo | a %= 2 | a = a % 2 | 1 | Returns an integer remainder of a division
    |

    | Exponent | a **= 2 | a = a ** 2 | 9 | Similar to a^2 in regular maths |

    | Floor division | a //= 2 | a = a // 2 | 1 | Returns only decimal (int) values
    |

    | Negation | a = -a | a = 0 - a | -3 | Returns the same value with an opposite
    sign |


    Finding the square foundation of a number is additionally simple in Python, yet
    it’s anything but an inherent language include. You’ll look into it later in the
    book!

    You can calculate the absolute value of a digit (e.g. |-3|), using abs(). For
    example, abs(-3) returns 3.'
  mdcn: '# 快速学习 Python


    通过比喻、类比和简单的分步练习来学习基础知识


    ## 为什么选择 Python？


    当你在学校开始软件工程学习时，很可能会从学习 Python 开始。那么，为什么选择 Python 而不是其他编程语言呢？原因很简单：


    -   无论你使用什么操作系统，Python 都很容易安装。

    -   Python 代码使用纯英文，易于理解。

    -   Python 允许你运行错误的代码。


    为什么这是好事？

    在学习过程中，你难免会犯错。Python 会在你运行代码后告诉你错误，帮助你找到问题所在。


    Python 是一个非常强大的工具，但它也易于快速学习，这就是为什么大多数人更喜欢它的原因。


    ## 安装


    针对不同的操作系统（如 Windows、Linux、UNIX 和 Mac OS 等），有预编译好的安装包，便于简单安装。

    如果你访问 https://www.python.org/downloads/，你可以为你的操作系统选择合适的安装方法。大多数 Linux 系统都预装了 Python。

    本书使用的是 Python 3 版本。

    在 Windows 中，安装 Python 后，从“开始”菜单或屏幕中选择 Python IDLE 或 Python 命令行/控制台。IDLE 和控制台的区别在于
    IDLE 有一个图形界面，看起来像一个文字处理器。在 Linux、UNIX 和 OS X 中，你可以通过在命令行输入 `python` 来启动 Python
    解释器。


    要选择特定版本的 Python，请输入 `pythonX`，其中 `X` 是版本号（例如，版本 3 输入 “python3”）。


    ## Hello World！


    大多数时候，你编写 Python 代码时，会在 IDLE 或其他 IDE（如 Eclipse）或富文本编辑器（如 Sublime Text 或 Notepad++）中编写内容。但是，你也可以使用
    Python 解释器以交互方式编写代码，因为它的工作方式类似于 UNIX shell。

    尽管仅使用解释器来创建程序是可行的，但强烈建议不要这样做，因为很难将代码保存为文件以便进一步重用。相反，应将解释器视为用于测试编码概念的“即时”工具。

    现在，让我们让解释器在屏幕上输出 “Hello World!” 字符串。我们通过解释器来实现。


    ### 终端方式


    使用上一章描述的 `python` 命令，从命令行启动解释器。

    输入以下内容：`print("Hello world!")` 并按 “Enter”。终端将显示如下：


    在上面的代码片段中，你可以看到第一行以 `>>>` 开头。

    此图像显示了你向解释器提供动态输入的行。请注意，当你的第一个命令的结果打印在屏幕上后，解释器再次打印了 `>>>`。向解释器发出指令是连续的。你给出一个指令
    - 等待执行完成，然后输入另一个命令，依此类推。请注意，在本书的后续部分，如果你在代码片段中看到 `>>>` 符号，这意味着你需要自己在解释器中测试代码。

    在第一行，你输入了一个语句。语句无非是指示计算机执行某项任务的指令。任务可以是任何事情，从 `make_a_coffee` 到 `launch_a_rocket`。但在你的情况下，它只是一个简单的
    `print` 函数。本书后面会介绍函数。


    ### 脚本方式


    计算机编程的基本原则之一是可重用性。让我们将刚刚在解释器中测试的代码变得可重用。为此，创建一个名为 “hello_world.py” 的文件，并在其中输入以下文本：


    1.  `print("Hello World!")`


    你放入文件的内容通常就是刚刚通过解释器执行的那行代码。

    现在，让我们执行你编写的脚本。

    打开命令行，导航到脚本所在的目录，然后输入以下内容：`python hello_world.py`。按回车后，你会看到屏幕上出现了 “Hello World!”
    文本。

    恭喜！

    你已经学会了编写你的第一个 Python 程序并成功运行它。


    # 第一部分：内置语言特性


    ## 变量


    在 Python 中，变量可用于将语句的结果存储在计算机的内存中。


    等号用于为变量赋值。变量的名称称为其标识符。


    ```

    >>> a is b

    True

    >>> print (id(a))

    123123123

    >>> print (id(b))

    123123123

    ```


    你可以使用以下语法将相同的值分配给多个变量：


    ```

    >>> a = b = c = d = f = "Hello World!"

    >>> a

    Hello World!

    >>> c

    Hello World!

    >>> f

    Hello World!

    ```


    Python 变量名应遵循以下规则：

    1.  必须以字母或下划线开头

    2.  只能包含字母、数字或下划线


    一些非法变量名的示例：


    1.  `2var`

    2.  `var-bar`

    3.  `foo.loo`

    4.  `@var`

    5.  `$var`


    Python 还有一些不能用作变量名的特殊单词：


    `and assert break class continue def del elif else except exec finally for from
    global if import in is lambda not or pass raise return try while yield`


    **问题：** 哪些语句是有效的？


    1.  `$foo = "bar"`

    2.  `lambda = "bar"`

    3.  `finally = "yes"`

    4.  `pass = "you shall not"`

    5.  `buga_wuga_ = "@@@huz"`

    6.  `foo_bar = "bar"`


    **答案：** 最后两个。注意，倒数第二个语句看起来只是错误。实际上，它是一个完全合法的变量，具有合法的字符串值。


    **问题：** 在一行中将值 “blah” 赋给变量 `zen`、`foo` 和 `bar`。


    **答案：**


    ```

    foo = bar = harmony = "blah"

    ```


    ## 数据类型


    下表概述了 Python 中最常用的数据类型。


    | 变量类型 | 示例 | 用法说明 |

    | :--- | :--- | :--- |

    | bool | `life_is_good = True` | 真/假值 |

    | | `hamsters_are_evil = False` | |

    | int, long | `size_of_shoes = 42` | 各种整数 |

    | | `earth_population = 7000000000` | |

    | float | `pi = 3.14159265359` | 非整数 - 小数点后有一个或多个数字 |

    | str | `chinese_hi = "hi"` | 任何文本 |

    | None | `my_new_book = None` | 没有任何有意义值的空变量 |


    你可以使用赋值运算符 “=” 在变量中存储不同类型的信息。

    多行字符串可用于存储大段文本。


    ```

    long_text = """ Line one

    Line two

    Line three

    Line Four

    """

    ```


    如你所见，多行字符串是用三引号而不是单引号括起来的普通字符串。

    在 Python 中，可以将字符串转换为整数，也可以将整数转换为字符串：


    ```

    >>> str(100)

    ''100''

    >>> int("234")

    234

    ```


    ## 测验


    **问题：**

    1.  这个 `=` 运算符叫什么名字？

    2.  如何将数字 `3.14` 转换为字符串 `''3.14''`？


    **答案：**

    1.  赋值运算符

    2.  `str(3.14)`


    ## 基础数学


    Python 有很多内置的算术运算符。下表简要分析了简写符号及其对应的完整形式。假设最初以下条件成立：`a = 3`。


    | 运算 | 简写符号 | 完整形式 | a 的值 | 说明 |

    | :--- | :--- | :--- | :--- | :--- |

    | 加法 | `a += 1` | `a = a + 1` | 4 | |

    | 减法 | `a -= 1` | `a = a - 1` | 2 | |

    | 乘法 | `a *= 2` | `a = a * 2` | 6 | |

    | 除法 | `a /= 2` | `a = a / 2` | 1.5 | 返回小数或浮点数 |

    | 取模 | `a %= 2` | `a = a % 2` | 1 | 返回除法的整数余数 |

    | 指数 | `a **= 2` | `a = a ** 2` | 9 | 类似于普通数学中的 a^2 |

    | 整除 | `a //= 2` | `a = a // 2` | 1 | 仅返回整数（int）值 |

    | 取反 | `a = -a` | `a = 0 - a` | -3 | 返回相同值但符号相反 |


    在 Python 中计算一个数的平方根也很简单，但它不是内置的语言特性。你将在本书后面学习它！

    你可以使用 `abs()` 计算一个数字的绝对值（例如 `|-3|`）。例如，`abs(-3)` 返回 `3`。'
