    4.  What is the output of this command: `print(len(json.dumps(None)))`?\n5.  What\
    \ is the output of this command: `print(type(json.dumps(\"1.57\")))`?\n\n**ANSWER:**\n\
    \n1.  `json.dumps`\n2.  deserialization / `json.loads`\n3.  `\"`\n4.  `4`\n5.\
    \  `<type 'str'>`\n\n1.  if you answered `F` - you forgot that JSON representation\
