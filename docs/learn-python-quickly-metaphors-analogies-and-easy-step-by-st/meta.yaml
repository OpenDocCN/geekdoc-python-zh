    2.718281828459045\n```\n\n你还可以计算平方根：\n\n```python\n>>> math.sqrt(16)\n4.0\n>>>\
    \ math.sqrt(25)\n5.0\n```\n\n## 测验\n\n**问题：** 为了回答以下问题，你需要深入研究标准库。\n\n1.  你会使用哪个函数来计算反正切？\n\
    2.  应该使用哪个函数进行指数运算？\n3.  如何计算一个数的阶乘？\n\n**答案：**\n\n1.  `math.atan`\n2.  `math.exp`\n\
    3.  `math.factorial`\n\n## JSON\n\n在软件工程中，有一个过程称为序列化。其主要目的是将任意对象的状态转换为可以通过网络传输和/或以某种方式存储的内容，以便稍后可以重建原始对象。重建过程称为反序列化。\n\
    \n序列化的一个现实生活类比是调查现有文物（例如一辆汽车）并为其制作详细蓝图（发动机、车轮、变速箱等）的过程。通过网络发送序列化数据类似于通过普通邮件发送蓝图。而反序列化是某人根据获取的蓝图构建原始对象副本的过程。\n\
    \n在 Web 编程领域，两种数据序列化标准获得了最高的普及度。XML 和 JSON。两者都是文本格式，这意味着使用这些标准表示的数据可以通过简单的文本编辑器（如\
    \ VIM）轻松地被人查看。本章的主题是 JSON 以及 Python 使用它进行数据序列化的方法。\n\nJSON 是 JavaScript 编程语言中操作数据的原生方式。\n\
    \n作为一种格式，JSON 操作三种主要结构。\n\n1.  基本类型：整数、浮点数、字符串、布尔值和 null 数据类型\n2.  对象：等同于 Python\
    \ 字典\n3.  数组：等同于 Python 列表\n\n如你所见，所有 JSON 结构都与 Python 内置类型完美匹配。因此，将 Python 数据结构序列化为\
    \ JSON 的主要目的是将 Python 内置类型转换为 JSON 字符串，该字符串可以例如作为有效负载在 HTTP 请求/响应体中发送。\n\n默认情况下，Python\
    \ 可以序列化以下数据类型：`int`、`bool`、`None`、`str`、`float`、`long`、`dict` 和 `list`。有扩展此功能的方法，但它们超出了本章的范围。\n\
    \n负责序列化的 Python 模块名为 `json`。它包含两个主要函数：`dumps` 和 `loads`。`dumps` 期望 Python 数据结构作为输入，并返回\
    \ JSON 字符串作为输出。`loads` 执行相反的操作 - 它期望 JSON 字符串作为输入，并返回 Python 数据结构作为输出。\n\n## 代码示例\n\
    \n导入 JSON 模块\n\n```python\nimport json\n```\n\n将字符串列表序列化为 JSON 数组\n\n```python\n\
    list_of_strings = [\"one\", \"two\", \"three\", \"four\"]\njson_array = json.dumps(list_of_strings)\n\
    ```\n\n将 JSON 对象反序列化为 Python 数据结构\n\n```python\njson_data = \"\"\"\n{\n    \"\
    integer\": 1,\n    \"inner_object\": {\n        \"nothing\": null,\n        \"\
    boolean\": false,\n        \"string\": \"foo\"\n    },\n    \"list_of_strings\"\
    : [\n        \"one\",\n        \"two\"\n    ]\n}\n\"\"\"\npython_dict = json.loads(json_data)\n\
    ```\n\n序列化一个整数\n\n```python\nprint(json.dumps(1))  # 1\nprint(type(json.dumps(1)))\
    \  # <class 'str'>\n```\n\n## 代码样本\n\n序列化一个字符串\n\n```python\n>>> print(json.dumps(\"\
    FOO\"))\n\"FOO\"\n>>> print(len(json.dumps(\"FOO\")))\n5\n```\n\n尝试反序列化非 JSON\
