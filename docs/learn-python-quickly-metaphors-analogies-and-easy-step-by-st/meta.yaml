    line is a date (yyyy-mm-dd).


    ```

    1. import os

    2. import time

    3. count = 0

    4. kept = 0

    5. deleted = 0

    6. for (root, dirs, files) in os.walk(‘.’):for filename in files:

    7. if filename.endswith(‘.txt’):

    8. f = open(filename, ‘r’)

    9. sdate = f.readline();

    10. f.close()

    11. pdate = time.strptime(sdate, ‘%Y-%m-%d\n’) 12. if pdate.tm_year > 2002:

    13. kept += 1

    14. else:

    15. os.remove(filename)

    16. deleted += 1

    17. count += 1

    18. print(‘Total files: ‘ + str(count))

    19. print(‘Kept: ‘ + str(kept))

    20. print(‘Deleted: ‘ + str(deleted))

    ```


