    \ change the calculation logic to use different BMI formulas if needed.\n- Customize\
    \ the appearance and layout of the GUI to your liking.\n\n## PROJECT 24: DRAWING\
    \ APPLICATION\n\nCode link Run here - Reptil\n\nThis Drawing Application built\
