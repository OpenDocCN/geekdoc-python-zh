    \ 用于处理与时间相关的操作。\n- 定义三个函数：`start`、`stop` 和 `reset`。当点击相应的按钮时，将调用这些函数。\n- 在 `start`\
    \ 函数内部，将 `running` 变量设置为 `True` 以指示秒表正在运行，并调用 `update` 函数。\n- 在 `stop` 函数内部，将\
    \ `running` 变量设置为 `False` 以暂停秒表。\n- 在 `reset` 函数内部，将 `running` 设置为 `False`，将 `counter`\
    \ 重置为零，并将时间标签更新为“00:00:00”。\n- `update` 函数负责更新标签上显示的时间。它计算经过的时间，将其格式化为小时、分钟和秒，并更新标签文本。`root.after(1000,\
    \ update)` 这行代码安排 `update` 函数每 1000 毫秒（1 秒）运行一次，前提是秒表正在运行。\n- 初始化全局变量 `running`\
    \ 和 `counter`。\n- 创建主 tkinter 窗口并将其标题设置为“秒表”。创建一个标签组件用于显示时间，三个按钮分别用于开始、停止和重置操作，并将它们打包到窗口上。\n\
    - 使用 `root.mainloop()` 启动 tkinter 主事件循环。"
