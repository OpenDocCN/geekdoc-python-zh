    \ Modify the appearance of the GUI by adjusting the widget properties like colors,\
    \ fonts, and sizes.\n- Add additional features like snooze, multiple alarms, or\
    \ a more advanced time input method.\n\n## PROJECT 23: BMI CALCULATOR\n\nCode\
    \ link Run here - Reptil\n\nThis simple BMI (Body Mass Index) Calculator built\
