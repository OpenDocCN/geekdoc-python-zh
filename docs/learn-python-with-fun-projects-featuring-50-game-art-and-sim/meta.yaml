    \ = new_color\n\n# Create a function to clear the canvas\ndef clear_canvas():\n\
    \    canvas.delete(\"all\")\n\n# Create a function to handle mouse button click\n\
    def start_drawing(event):\n    global last_x, last_y\n    last_x, last_y = event.x,\
    \ event.y\n\n# Create a function to handle mouse movement\ndef draw(event):\n\
    \    global last_x, last_y\n    x, y = event.x, event.y\n    canvas.create_line((last_x,\
    \ last_y, x, y),\n        fill=pen_color, width=2)\n    last_x, last_y = x, y\n\
    \n# Create the main application window\napp = tk.Tk()\napp.title(\"Drawing Application\"\
    )\n\n# Create a canvas for drawing\ncanvas = tk.Canvas(app, bg=\"white\",\n  \
