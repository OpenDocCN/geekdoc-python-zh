    \ interface. This hands-on project helps beginners understand the basics of GUI\
    \ development and file handling in Python.\n\n```python\nimport tkinter as tk\n\
    from tkinter import filedialog\nimport os\n\n# Function to open the file explorer\
    \ dialog\ndef open_file_explorer():\n    filepath = filedialog.askopenfilename()\n\
    \    if filepath:\n        status_label.config(text=f\"Selected File: {os.path.basename(filepath)}\"\
    )\n    else:\n        status_label.config(text=\"No file selected\")\n\n# Create\
    \ the main window\nroot = tk.Tk()\nroot.title(\"File Explorer\")\n\n# Create and\
