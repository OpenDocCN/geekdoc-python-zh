    \ and clearing canvas\ncolors = [\"red\", \"green\", \"blue\", \"black\"]\nfor\
    \ color in colors:\n    tk.Button(app, bg=color, width=2, command=\n        lambda\
    \ c=color: change_color(c)).pack(side=\"left\")\ntk.Button(app, text=\"Clear\"\
    ,\n    width=8, command=clear_canvas).pack(side=\"left\")\n\n# Bind mouse events\
    \ to canvas\ncanvas.bind(\"<Button-1>\", start_drawing)\ncanvas.bind(\"<B1-Motion>\"\
    , draw)\n\n# Initialize the pen color\npen_color = \"black\"\n\n# Initialize variables\
    \ to store last mouse position\nlast_x, last_y = None, None\n\napp.mainloop()\n\
    ```\n\n## Explanation:\n\n- We import the Tkinter library to create the GUI.\n\
    - change_color() function changes the pen color based on the button clicked.\n\
    - clear_canvas() function clears the canvas.\n- start_drawing() function is called\
    \ when the left mouse button is clicked to start drawing.\n- draw() function is\
    \ called when the mouse is moved to draw lines. We create the main application\
    \ window (app) and a canvas for drawing.\n- Buttons for color selection and clearing\
    \ the canvas are created. We bind mouse events to the canvas to handle drawing.\n\
    - The program initializes the pen color and variables to store the last mouse\
