- img_proc: true
  md: "**edit:** Allows read/write access to most objects in a namespace. It does\
    \ not allow viewing or modifying roles or role bindings.\n\n**view:** Allows read-only\
    \ access to see most objects in a namespace. It does not allow viewing roles or\
    \ role bindings. It does not allow viewing secrets, since those are considered\
    \ to encapsulate sensitive information.\n\n**system:node:** Grants permissions\
    \ to nodes (kubelets), allowing them to communicate with the API server and manage\
    \ pod resources on the nodes they run.\n\nIn addition to **ClusterRoles**, there\
    \ are Roles that are namespace-specific and also come predefined in Kubernetes.\
    \ These roles include permissions tailored to managing resources within a single\
    \ namespace and are useful for granting access within that namespace's scope.\n\
    \nThese built-in roles can be assigned to users, groups, or service accounts in\
    \ your cluster through **RoleBindings** or **ClusterRoleBindings**, depending\
    \ on whether you want the permissions to apply cluster-wide or within a specific\
