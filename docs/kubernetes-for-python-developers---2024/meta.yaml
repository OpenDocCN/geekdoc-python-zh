    ## Unsuccessful run


    What just happened? My port is free now, but I still can''t access the app. This
    is because Flask runs it on 127.0.0.1 **inside the container**. When I hit localhost
    on the browser of my host, it translates into 127.0.0.1 of my host machine.


    The default flask run command starts the Flask development server and listens
    for connections only on the loopback interface (127.0.0.1 or localhost). This
    behavior is intentional for security reasons, as it restricts access to the server
    to only those requests originating from the same machine on which the Flask application
    is running. When running Flask inside a Docker container, the container is treated
    as a separate machine with its own set of network interfaces. As a result, when
    Flask listens only on 127.0.0.1 within the container, it cannot receive requests
    from the host machine or any other machine because those requests do not come
    from the container''s localhost.


    To allow the Flask application to accept requests from the host machine''s localhost
    (or other machines), you need to tell Flask to listen on all network interfaces.
    This is done by setting the –host option to 0.0.0.0 when you start the Flask server:


    ```

    $ flask run --host=0.0.0.0

    ```


    By binding to 0.0.0.0, you''re instructing the Flask development server to accept
    requests on all network interfaces available to the Docker container, which includes
    the Docker host. This way, when you map the Docker container''s port to a port
    on the host machine using Docker''s port mapping feature, requests sent to the
    host machine''s IP address on the mapped port are successfully forwarded to the
    Flask application inside the container.


    Let''s make this change and also make the port configurable.


    We will add a new file **entrypoint.sh**.


    ```

    #!/bin/sh


    exec flask run -h 0.0.0.0 -p $PORT

    ```


    This is a shell script to run flask while listening to all network interfaces
    and run it in a port specified by the **$PORT** environment variable.


    Why not run something like this?


    ```

    CMD ["flask", "run", "-h", "0.0.0.0", "-p", "$PORT"]

    ```


    This won''t evaluate the **$PORT** variable when starting the container. Also,
    we run it as **exec** inside the shell script so that the **Ctrl+C** signal we
    give to kill the container is interpreted correctly.


    We also make the following Dockerfile changes:


    ```

    COPY entrypoint.sh /entrypoint.sh # (1)

    RUN chmod +x /entrypoint.sh


    COPY . . # (2)


    ENTRYPOINT ["/entrypoint.sh"] # (3)

    ```


    (1) -> Copy the entrypoint.sh file inside the container. (Otherwise we can''t
    run it :) ). Also, give it exec permissions. (2) -> Note that the **COPY** command
    has been moved below this step. This is to ensure that we leverage the layer caching
    feature when building the container. (3) -> Finally, we run the **entrypoint.sh**
    script.


    ## Difference between ENTRYPOINT and CMD


    **ENTRYPOINT** and **CMD** are both Dockerfile instructions used to specify the
    default command that will be executed when a Docker container starts. However,
    they serve different purposes and are used in slightly different ways.


    **ENTRYPOINT** sets the executable that will be run when the container starts.
    It''s meant to set the container''s main command, allowing that container to be
    run as if it were that command or application.


    If **ENTRYPOINT** is used, any command and parameters passed to **docker run <image>**
    will be appended as arguments to the **ENTRYPOINT**.


    **Example:** Consider a Dockerfile designed to run a Python script as its main
    purpose:


    ```

    FROM python:3.10

    COPY . /app

    WORKDIR /app

    ENTRYPOINT ["python", "myscript.py"]

    ```


    In this case, running **docker run myimage** will execute **python myscript.py**
    in the container. If you add arguments after **myimage**, they will be passed
    to **myscript.py**.


    **CMD** specifies the default command and/or parameters that will be executed
    only when no arguments are provided to **docker run <image>**. If you specify
    a command after the image name in **docker run <image>**, this command will override
    the **CMD** instruction.


    **Example:** Using **CMD** to provide default arguments to a script, or a default
    command:


    ```

    FROM ubuntu

    CMD ["echo", "Hello, Docker!"]

    ```


    Running **docker run myimage** will print "**Hello, Docker!**" because no command
    was specified, so the **CMD** is executed. However, if you run **docker run myimage
    echo "Another command"**, the **CMD** is overridden and "**Another command**"
    is printed instead.


    ## Combining ENTRYPOINT and CMD


    They can be used together to provide a container that acts as an executable and
    allows default parameters that can be overridden. **ENTRYPOINT** defines the executable,
    and **CMD** provides default arguments.


    ```

    FROM ubuntu


    ENTRYPOINT ["echo"]


    CMD ["Hello, Docker!"]

    ```


    Running **docker run myimage** without any additional arguments will print "**Hello,
    Docker!**" because the **CMD** provides the default parameters to the **ENTRYPOINT**.


    Running **docker run myimage "Another message"** will override the **CMD** and
    print "**Another message**" instead.


    This combination allows for both flexibility and control over what the container
    executes by default and how it can be customized at runtime.


    Now, with these new changes, let''s rebuild the container.


    ```

    $ docker build -t flask-app .

    ```


    And run it.


    ```

    $ docker run -e PORT=8080 --publish 8080:8080 flask-app

    * Debug mode: off

