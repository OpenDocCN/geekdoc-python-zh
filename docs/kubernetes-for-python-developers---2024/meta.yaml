    # # My first configmap


    *my first configmap*


    # ## Volumes and VolumeMounts


    In the above Pod specification, we introduced **volumes** and **volumeMounts**
    in the spec. Both serve complementary roles in managing storage for containers
    within the Pod. Here''s a breakdown of their differences and how they work together:


    # ### volumes


    The volumes field in the Pod specification defines storage volumes that the Pod
    can use. This storage can come from a variety of sources, like configmaps in the
    above case, or persistent volume claims (PVCs), secrets, and others as we will
    learn in later chapters. The volumes section is a part of the Pod specification
    and is not specific to any individual container within the Pod.'
  - '[PAGE 226]


    Its main purpose is to declare storage volumes that will be made available to
    the containers in the Pod. These volumes can hold application data, configuration
    files, secrets, and other data that need to be shared between containers or persisted
    beyond the lifecycle of the Pod.


    The scope of volumes is at the **Pod level**. Once defined, any container in the
    Pod can mount the declared volumes.


    # volumeMounts


    The volumeMounts field is part of a container''s specification within a Pod. It
    specifies how the volumes defined at the Pod level (in the volumes section) are
    mounted into the filesystem of each container. It allows you to define the mount
    path (where in the container''s filesystem the volume will be available) and other
    mount-related options.


    Its purpose is to make a specific volume accessible to a container at a specified
    path, allowing the container to read from and write to the volume.


    The scope of volumeMounts is at the **container level** within a Pod. Each container
    in a Pod can have its own volumeMounts section, allowing it to mount any of the
    Pod''s volumes to its own filesystem paths.


    # How They Work Together


    **Define Volumes:** In the Pod spec, you first define a list of volumes under
    the volumes field. This is where you specify the type of volume (e.g., a PVC,
    secret, configmap) and the details specific to that type.'
  - "[PAGE 227]\n\n**Mount Volumes to Containers:** For each container that needs\
    \ access to a volume, you specify a volumeMounts section. Here, you reference\
    \ the volume by name (as defined in the volumes section) and specify the mount\
    \ path within the container.\n\n# Configmap from deployments\n\nCan we configure\
    \ configmaps from a deployment? Yes, we can. Here's the same configmap, configured\
    \ as a deployment.\n\n```\napiVersion: apps/v1\nkind: Deployment\nmetadata:\n\
    \  name: nginx-deployment\nspec:\n  replicas: 3 # Specifies the number of replicas\n\
    \  selector:\n    matchLabels:\n      app: nginx # This label is used to select\
    \ the Pods that the Deployment manages\n  template: # The template field contains\
    \ the Pod specification\n    metadata:\n      labels:\n        app: nginx # Pod\
    \ label, must match the selector above\n    spec:\n      containers:\n```"
- md: "## Exercise 24: Use configmaps and run 2 nginxes in same pod.\n\nUse the twin-nginx\
    \ example from previous chapters, instead of running Bitnami's nginx, run the\
    \ official nginx and use different **nginx.conf** files, mount them as configmaps\
    \ and run both nginx containers in different ports within the same pod.\n\n##\
    \ Environment variables from configmaps\n\nIt is a common practice to model environment\
    \ variables as configmaps, especially when you have too many of them. Let's take\
    \ the flask-redis example and inject a few variables as configmaps.\n\n```yaml\n\
    apiVersion: v1\nkind: ConfigMap\nmetadata:\n  name: flask-config\ndata:\n  DEBUG:\
    \ \"False\" # (1)\n  REDIS_HOST: \"cache\" # (2)\n  PORT: \"8080\" # (3)\n```\n\
    \n(1) -> debug flag turned off. String values, even for Booleans or numbers, are\
    \ recommended in ConfigMaps.\n\n**Note** that we are using the **DEBUG** as an\
    \ illustrative example here to demonstrate a Boolean flag. This could be any environment\
    \ variable. In this context, the Flask app can read the **DEBUG** environment\
    \ variable and run the server in debug mode.\n\n(2) -> configure **REDIS_HOST**.\n\
    \n(3) -> Flask application port. **Note** that this is also a number modelled\
    \ as string.\n\nLet's make the necessary changes in the **flask-redis** deployment\
    \ to accommodate this.\n\n```yaml\napiVersion: apps/v1\nkind: Deployment\nmetadata:\n\
    \  name: flask-redis\nspec:\n  replicas: 1\n  selector:\n    matchLabels:\n  \
    \    app: flask-redis\n  template:\n    metadata:\n      labels:\n        app:\
    \ flask-redis\n    spec:\n      containers:\n        - name: flask\n         \
    \ image: ghcr.io/badri/flask-redis:1.0\n          env:\n            - name: DEBUG\
    \ # (1)\n              valueFrom: # (2)\n                configMapKeyRef: # (3)\n\
    \                  name: flask-config # (4)\n                  key: DEBUG # (5)\n\
    \            - name: PORT\n              valueFrom: # (6)\n                configMapKeyRef:\n\
    \                  name: flask-config\n                  key: PORT\n         \
    \   - name: REDIS_HOST\n              valueFrom: # (7)\n                configMapKeyRef:\n\
    \                  name: flask-config\n                  key: REDIS_HOST\n   \
    \         - name: REDIS_PASSWORD # (8)\n              value: SuperS3cret\n   \
    \       ports:\n            - containerPort: 8080\n```\n\n(1) -> The first environment\
    \ variable **DEBUG**, is not set directly.\n\n(2) -> Instead of **value**, we\
    \ use a new construct **valueFrom**, which is used to refer to a configmap (or\
    \ a secret, which we will show in the next section).\n\n(3) -> The **configMapKeyRef**\
    \ points at the configmap from which this value should be inferred.\n\n(4) ->\
    \ the name of the configmap, which **must be present in the same namespace**.\n\
    \n(5) -> the key in the configmap key-value set.\n\n(6) -> we rinse-repeat the\
    \ same for **PORT**, ensuring that this value is the same as the **containerPort**\
    \ value down below.\n\n(7) -> ...and **REDIS_HOST**.\n\n(8) -> The **REDIS_PASSWORD**\
    \ is a usual environment variable like before.\n\nAfter we deploy this, we can\
    \ refer to the environment variables inside the app:\n\n```python\nimport os\n\
    DEBUG = os.environ.get('DEBUG', 'True') # Default to 'True' if not found\nREDIS_HOST\
    \ = os.environ.get('REDIS_HOST', 'localhost') # Provide a default value\n# ...\n\
    ```\n\n## Exercise 25: Application error\n\nDo you think the **REDIS_HOST** value\
    \ in the configmap above will work? If not, what change will you make to fix it?\n\
    \nHint: **cache** service exists, we did create it in the previous chapter. But\
    \ can your **flask-redis** app access it across namespaces?\n\n## Configmaps and\
    \ 12-factor principles\n\nThe [12-factor app methodology](https://12factor.net/)\
    \ is a set of principles designed for building scalable, portable, and maintainable\
    \ applications, especially in the cloud. ConfigMaps in Kubernetes align with several\
    \ aspects of the 12-factor methodology, particularly around configuration, codebase,\
    \ dependencies, and backing services.\n\nThe third factor of the 12-factor app\
    \ methodology emphasizes strict separation of configuration from code. Configuration\
    \ might include database URLs, external service credentials, or deployment-specific\
    \ parameters. According to the 12-factor methodology, such configuration should\
    \ vary between deployments but remain independent of the application's code, making\
    \ it easy to change configuration without changing the code.\n\nLet's see how\
    \ ConfigMaps align with this principle.\n\n**External Configuration:** ConfigMaps\
    \ provide a way to store configuration data separate from container images and\
    \ application code, aligning perfectly with the 12-factor app's directive to separate\
    \ configuration from code. This allows the same application image to be promoted\
    \ across different environments (development, testing, production) without rebuilds,\
    \ with environment-specific configurations applied at deployment time.\n\n**Environment\
    \ Parity:** By externalizing configuration, ConfigMaps help maintain parity between\
    \ different environments, a key tenet of the 12-factor app. Configurations can\
    \ be changed or updated without affecting the application's binary, ensuring that\
    \ differences between environments are limited to configurations stored in ConfigMaps.\n\
    \n**Portability:** ConfigMaps enhance the portability of applications across different\
    \ Kubernetes clusters or environments. Since the application code does not hard-code\
    \ configuration values, moving the application simply involves applying the appropriate\
    \ ConfigMaps in the new environment.\n\n## Supporting Other 12-Factor Principles\n\
    \nWhile the most direct alignment of ConfigMaps is with Factor III: Config, their\
    \ use also supports other 12-factor principles:\n\n**Factor I: Codebase and Factor\
    \ II: Dependencies:** Although ConfigMaps are more directly related to configuration,\
    \ their use supports the principles of a single codebase tracked in revision control\
    \ and explicitly declared and isolated dependencies. By keeping configuration\
    \ separate and external, ConfigMaps ensure that the codebase remains clean and\
    \ focused, and dependencies (on external resources or configurations) are clearly\
    \ defined and managed outside the application."
  mdcn: "## 练习 24：使用 ConfigMap 并在同一个 Pod 中运行两个 Nginx。\n\n使用前几章中的双 Nginx 示例，不运行 Bitnami\
    \ 的 Nginx，而是运行官方 Nginx，并使用不同的 **nginx.conf** 文件，将它们作为 ConfigMap 挂载，并在同一个 Pod 中的不同端口上运行两个\
    \ Nginx 容器。\n\n## 从 ConfigMap 获取环境变量\n\n将环境变量建模为 ConfigMap 是一种常见做法，尤其是在环境变量数量过多时。让我们以\
    \ flask-redis 示例为例，将几个变量作为 ConfigMap 注入。\n\n```yaml\napiVersion: v1\nkind: ConfigMap\n\
    metadata:\n  name: flask-config\ndata:\n  DEBUG: \"False\" # (1)\n  REDIS_HOST:\
    \ \"cache\" # (2)\n  PORT: \"8080\" # (3)\n```\n\n(1) -> 调试标志已关闭。在 ConfigMap 中，即使是布尔值或数字，也建议使用字符串值。\n\
    \n**注意**，我们这里使用 **DEBUG** 作为示例来演示布尔标志。这可以是任何环境变量。在此上下文中，Flask 应用可以读取 **DEBUG**\
    \ 环境变量，并以调试模式运行服务器。\n\n(2) -> 配置 **REDIS_HOST**。\n\n(3) -> Flask 应用端口。**注意**，这也是一个被建模为字符串的数字。\n\
    \n让我们在 **flask-redis** 部署中进行必要的更改以适应这一点。\n\n```yaml\napiVersion: apps/v1\nkind:\
    \ Deployment\nmetadata:\n  name: flask-redis\nspec:\n  replicas: 1\n  selector:\n\
    \    matchLabels:\n      app: flask-redis\n  template:\n    metadata:\n      labels:\n\
    \        app: flask-redis\n    spec:\n      containers:\n        - name: flask\n\
    \          image: ghcr.io/badri/flask-redis:1.0\n          env:\n            -\
    \ name: DEBUG # (1)\n              valueFrom: # (2)\n                configMapKeyRef:\
    \ # (3)\n                  name: flask-config # (4)\n                  key: DEBUG\
    \ # (5)\n            - name: PORT\n              valueFrom: # (6)\n          \
    \      configMapKeyRef:\n                  name: flask-config\n              \
    \    key: PORT\n            - name: REDIS_HOST\n              valueFrom: # (7)\n\
    \                configMapKeyRef:\n                  name: flask-config\n    \
    \              key: REDIS_HOST\n            - name: REDIS_PASSWORD # (8)\n   \
    \           value: SuperS3cret\n          ports:\n            - containerPort:\
    \ 8080\n```\n\n(1) -> 第一个环境变量 **DEBUG** 没有直接设置。\n\n(2) -> 我们没有使用 **value**，而是使用了一个新的构造\
    \ **valueFrom**，它用于引用一个 ConfigMap（或 Secret，我们将在下一节中展示）。\n\n(3) -> **configMapKeyRef**\
    \ 指向应从中推断此值的 ConfigMap。\n\n(4) -> ConfigMap 的名称，它**必须存在于同一个命名空间中**。\n\n(5) ->\
    \ ConfigMap 键值集中的键。\n\n(6) -> 我们对 **PORT** 重复相同的操作，确保此值与下面的 **containerPort**\
    \ 值相同。\n\n(7) -> ...以及 **REDIS_HOST**。\n\n(8) -> **REDIS_PASSWORD** 是一个像以前一样的普通环境变量。\n\
    \n部署后，我们可以在应用内部引用这些环境变量：\n\n```python\nimport os\nDEBUG = os.environ.get('DEBUG',\
    \ 'True') # 如果未找到，默认为 'True'\nREDIS_HOST = os.environ.get('REDIS_HOST', 'localhost')\
    \ # 提供一个默认值\n# ...\n```\n\n## 练习 25：应用程序错误\n\n你认为上面 ConfigMap 中的 **REDIS_HOST**\
    \ 值会起作用吗？如果不会，你会做什么更改来修复它？\n\n提示：**cache** 服务是存在的，我们在上一章中确实创建了它。但是你的 **flask-redis**\
    \ 应用能否跨命名空间访问它？\n\n## ConfigMap 与 12-Factor 原则\n\n[12-Factor 应用方法论](https://12factor.net/)\
    \ 是一套旨在构建可扩展、可移植和可维护应用程序的原则，尤其适用于云环境。Kubernetes 中的 ConfigMap 与 12-Factor 方法论的多个方面保持一致，特别是在配置、代码库、依赖项和后端服务方面。\n\
    \n12-Factor 应用方法论的第三个原则强调配置与代码的严格分离。配置可能包括数据库 URL、外部服务凭据或特定于部署的参数。根据 12-Factor\
    \ 方法论，此类配置应在不同部署之间有所不同，但应独立于应用程序的代码，从而可以轻松更改配置而无需更改代码。\n\n让我们看看 ConfigMap 如何与这一原则保持一致。\n\
    \n**外部配置：** ConfigMap 提供了一种将配置数据与容器镜像和应用程序代码分开存储的方式，这与 12-Factor 应用将配置与代码分离的指令完美契合。这允许相同的应用程序镜像在不同环境（开发、测试、生产）中推广而无需重建，并在部署时应用特定于环境的配置。\n\
    \n**环境一致性：** 通过外部化配置，ConfigMap 有助于保持不同环境之间的一致性，这是 12-Factor 应用的一个关键原则。配置可以在不影响应用程序二进制文件的情况下进行更改或更新，确保环境之间的差异仅限于存储在\
    \ ConfigMap 中的配置。\n\n**可移植性：** ConfigMap 增强了应用程序在不同 Kubernetes 集群或环境之间的可移植性。由于应用程序代码没有硬编码配置值，移动应用程序只需在新环境中应用相应的\
    \ ConfigMap 即可。\n\n## 支持其他 12-Factor 原则\n\n虽然 ConfigMap 最直接的对应是原则 III：配置，但它们的使用也支持其他\
    \ 12-Factor 原则：\n\n**原则 I：代码库和原则 II：依赖项：** 尽管 ConfigMap 与配置更直接相关，但它们的使用支持在版本控制中跟踪单一代码库以及显式声明和隔离依赖项的原则。通过将配置保持分离和外部化，ConfigMap\
    \ 确保代码库保持干净和专注，并且依赖项（对外部资源或配置的依赖）在应用程序外部被清晰地定义和管理。"
