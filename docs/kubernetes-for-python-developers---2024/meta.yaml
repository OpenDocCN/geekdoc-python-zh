    \ * Full resync requested by replica 10.244.0.189:6379\n17:M 29 Feb 2024 06:24:09.700\
    \ * Delay next BGSAVE for diskless SYNC\n17:M 29 Feb 2024 06:24:14.842 * Starting\
    \ BGSAVE for SYNC with target: replicas sockets\n17:M 29 Feb 2024 06:24:14.843\
    \ * Background RDB transfer started by pid 23\n23:C 29 Feb 2024 06:24:14.845 *\
    \ Fork CoW for RDB: current 0 MB, peak 0 MB, average 0 MB\n17:M 29 Feb 2024 06:24:14.845\
