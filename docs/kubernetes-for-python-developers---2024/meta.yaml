    is suitable for sensitive data that requires manual backup or audit before deletion.


    # Delete


    The PV and the associated storage asset in the underlying infrastructure (such
    as an AWS EBS volume, Google Compute Engine disk, or Azure Disk) are automatically
    deleted when the PVC is released.


    **Use Case:** Ideal for dynamic environments and development, where automatic
