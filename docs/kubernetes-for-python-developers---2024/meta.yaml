- md: "## Kube Controller Manager\n\nThe Kube Controller Manager is a component on\
    \ the master node that runs controller processes. These controllers include the\
    \ node controller, replication controller, endpoints controller, and service account\
    \ & token controllers, among others. Each controller is responsible for managing\
    \ specific aspects of cluster operations, watching the shared state of the cluster\
    \ through the apiserver and making changes attempting to move the current state\
    \ towards the desired state.\n\n## Kubelet\n\nThe Kubelet runs on each node in\
    \ the cluster and is responsible for ensuring that containers are running in a\
    \ Pod. It takes a set of PodSpecs that are provided through various mechanisms\
    \ (primarily through the apiserver) and ensures that the containers described\
    \ in those PodSpecs are running and healthy. The Kubelet monitors the state of\
    \ pods and containers, reports back to the control plane, handles pod and container\
    \ lifecycle events, and manages container runtime environments.\n\n## Kube-proxy\n\
    \nKube-proxy is a network proxy that runs on each node in the cluster, implementing\
    \ part of the Kubernetes Service concept. Kube-proxy maintains network rules on\
    \ nodes. These network rules allow network communication to your Pods from network\
    \ sessions inside or outside of your cluster. Kube-proxy uses the operating system\
    \ packet filtering layer if there is one and it's available. Otherwise, kube-proxy\
    \ forwards the traffic itself.\n\n## Container Runtime\n\nThe container runtime\
    \ is the software that is responsible for running containers. Kubernetes supports\
    \ several container runtimes: Docker, containerd, CRI-O, and any implementation\
    \ of the Kubernetes CRI (Container Runtime Interface). The container runtime is\
    \ responsible for pulling the container image from a registry, unpacking the container,\
    \ and running the application. Kubernetes abstracts the process of managing containers\
    \ to the container runtime, allowing it to manage the container's lifecycle according\
    \ to the Pod specifications.\n\n## Other container orchestrators\n\nIn the evolving\
    \ landscape of container orchestration, Kubernetes has certainly emerged as a\
    \ front-runner, but it is not the only player in the game. Various other container\
    \ orchestrators have made their mark, each with its unique features and benefits\
    \ catering to different use cases and preferences.\n\n**Docker Swarm** is Docker's\
    \ native clustering and scheduling tool. Its primary appeal lies in its simplicity\
    \ and tight integration with the Docker ecosystem. Swarm employs a similar command-line\
    \ interface as Docker, which eases the learning curve for teams already familiar\
    \ with Docker commands. It's known for its straightforward setup process, and\
    \ its declarative model allows you to define the desired state of your services.\
    \ However, it may not match the advanced features and scalability of Kubernetes,\
    \ making it more suitable for smaller deployments or organizations beginning their\
    \ containerization journey.\n\n**Nomad** by HashiCorp is another notable tool\
    \ that offers workload orchestration. Unlike Kubernetes, which is container-specific,\
    \ Nomad is workload-agnostic, meaning it can schedule not only containers but\
    \ also non-containerized applications. It integrates seamlessly with other HashiCorp\
    \ tools like Consul for service discovery and Vault for secrets management, providing\
    \ a full-stack solution. Its simplicity and flexibility in scheduling diverse\
    \ workloads make it a compelling option for multi-platform deployments.\n\n**Kamal**\
    \ is a deployment tool that is specifically crafted to deploy web applications\
    \ on various platforms, from cloud VMs to bare metal, with a focus on simplicity\
    \ and portability. It offers features such as zero-downtime deploys and asset\
    \ bridging, with the ability to handle complex tasks in production using Docker.\
    \ Kamal is described as a Capistrano for Containers, allowing for the automation\
    \ of deployment without prepping servers in advance. It provides a simpler alternative\
    \ to Kubernetes and Docker Swarm for those who wish to avoid the complexity of\
    \ these systems, favoring an imperative approach for ease of use and clarity.\n\
    \n## Create your first Kubernetes cluster\n\nEnough theory. Let's get hands-on\
    \ already! We shall now create our first Kubernetes cluster. There are countless\
    \ tutorials on the internet about how to use a minikube cluster (a popular Kubernetes\
    \ cluster which runs on your laptop). I have a slightly opinionated take on this.\
    \ We will not be using Minikube. We will create a real-world cluster to learn\
    \ and play around with Kubernetes. Before you get terrified with this idea, hear\
    \ my arguments in favour of this approach. It might not be that bad after all.\n\
    \n## Rationale for using a real cluster\n\nSpinning up actual Kubernetes clusters,\
    \ as opposed to relying solely on local development environments like Minikube,\
    \ offers developers a wealth of practical experience that is critical for understanding\
    \ the nuances of Kubernetes in real-world scenarios. While Minikube is a fantastic\
    \ tool for learning the basics of Kubernetes and testing applications locally,\
    \ it simplifies many aspects of Kubernetes management and networking. By deploying\
    \ clusters in a more realistic environment, developers gain invaluable insights\
    \ into the complexities of cluster architecture, networking, storage, and security\
    \ in a way that mimics production environments more closely.\n\nMoreover, managing\
    \ real Kubernetes clusters exposes developers to the challenges of scaling, resilience,\
    \ and multi-tenancy. It's one thing to deploy an application on a local cluster;\
    \ it's entirely another to ensure that the same application remains highly available,\
    \ secure, and scalable when subjected to the unpredictable variables of real user\
    \ traffic and data volume. This hands-on experience is crucial for understanding\
    \ how to design and manage applications that can withstand the rigors of production\
    \ use.\n\nAdditionally, using actual Kubernetes clusters provides developers the\
    \ opportunity to familiarize themselves with cloud-native technologies and services\
    \ provided by cloud platforms like AWS, Google Cloud, and Azure Kubernetes Service\
    \ (AKS). Each cloud provider offers unique tools and services that integrate with\
    \ Kubernetes, such as managed databases, CI/CD pipelines, and monitoring tools,\
    \ which are vital components of a comprehensive cloud-native application stack.\
    \ Learning to navigate these services and understanding how they complement Kubernetes\
    \ deployments is essential for developers looking to leverage the full power of\
    \ the cloud.\n\nIn essence, while tools like Minikube play a crucial role in Kubernetes\
    \ education, the transition to managing actual Kubernetes clusters is a pivotal\
    \ step for developers. It bridges the gap between theoretical knowledge and practical\
    \ skills, preparing developers for the challenges of deploying and managing production-grade\
    \ applications in the cloud. This hands-on experience not only enhances technical\
    \ proficiency but also builds confidence in using Kubernetes as a solution for\
    \ real-world application deployment and management challenges.\n\nI want you to\
    \ walk away with the fulfillment of deploying a real application in a real cluster.\
    \ Anything less wouldn't do justice to a book which targets developers who want\
    \ to get their hands dirty with Kubernetes.\n\n## Create a cluster in DigitalOcean\n\
    \nI highly recommend you create an account with DigitalOcean. This will give you\
    \ USD 200$ in credits valid for 60 days, which is more than enough to work with\
    \ throughout the duration of this book. I'll give brief instructions on how to\
    \ create a cluster in the next section.\n\n## Setting up your Kubernetes cluster\n\
    \nDownload and setup **doctl** command-line tool to interact with your DigitalOcean\
    \ cloud account. [This page](https://cloud.digitalocean.com/account/api/tokens)\
    \ contains detailed instructions on how to set it up for your OS and authenticate\
    \ with your account.\n\n```bash\n$ doctl auth init\nPlease authenticate doctl\
    \ for use with your DigitalOcean account. You can generate a token in the control\
    \ panel at https://cloud.digitalocean.com/account/api/tokens\n\n> Enter your access\
    \ token: ************************************\n\nValidating token... ✓\n\n$ doctl\
    \ kubernetes options regions\nSlug    Name\nnyc1    New York 1\nsgp1    Singapore\
    \ 1\nlon1    London 1\nnyc3    New York 3\nams3    Amsterdam 3\nfra1    Frankfurt\
    \ 1\ntor1    Toronto 1\nsfo2    San Francisco 2\nblr1    Bangalore 1\nsfo3   \
    \ San Francisco 3\nsyd1    Sydney 1\n$ \n```\n\n*Authenticate doctl using DigitalOcean\
    \ token and list regions*"
  mdcn: "## Kube Controller Manager\n\nKube Controller Manager 是运行在主节点上的组件，负责执行控制器进程。这些控制器包括节点控制器、副本控制器、端点控制器以及服务账户与令牌控制器等。每个控制器负责管理集群操作的特定方面，通过\
    \ apiserver 监视集群的共享状态，并做出变更以尝试将当前状态推向期望状态。\n\n## Kubelet\n\nKubelet 运行在集群中的每个节点上，负责确保存储在\
    \ Pod 中的容器正常运行。它接收通过各种机制（主要通过 apiserver）提供的一组 PodSpec，并确保这些 PodSpec 中描述的容器处于运行且健康的状态。Kubelet\
    \ 监视 Pod 和容器的状态，向控制平面报告，处理 Pod 和容器的生命周期事件，并管理容器运行时环境。\n\n## Kube-proxy\n\nKube-proxy\
    \ 是运行在集群每个节点上的网络代理，实现了 Kubernetes Service 概念的一部分。Kube-proxy 在节点上维护网络规则，这些规则允许来自集群内部或外部网络会话的流量与你的\
    \ Pod 进行通信。如果操作系统存在并可用，Kube-proxy 会使用操作系统的数据包过滤层；否则，kube-proxy 会自行转发流量。\n\n##\
    \ 容器运行时\n\n容器运行时是负责运行容器的软件。Kubernetes 支持多种容器运行时：Docker、containerd、CRI-O 以及任何符合\
    \ Kubernetes CRI（容器运行时接口）的实现。容器运行时负责从仓库拉取容器镜像、解压容器并运行应用程序。Kubernetes 将管理容器的过程抽象到容器运行时，使其能够根据\
    \ Pod 规范管理容器的生命周期。\n\n## 其他容器编排工具\n\n在不断发展的容器编排领域，Kubernetes 无疑已成为领跑者，但它并非唯一的选择。其他各种容器编排工具也各具特色，各自拥有独特的功能和优势，以满足不同的用例和偏好。\n\
    \n**Docker Swarm** 是 Docker 原生的集群和调度工具。其主要吸引力在于其简洁性以及与 Docker 生态系统的紧密集成。Swarm\
    \ 采用了与 Docker 类似的命令行界面，这降低了已经熟悉 Docker 命令的团队的学习门槛。它以简单的设置过程而闻名，其声明式模型允许你定义服务的期望状态。然而，它可能无法匹敌\
    \ Kubernetes 的高级功能和可扩展性，因此更适合较小规模的部署或刚开始容器化之旅的组织。\n\n**Nomad** 是 HashiCorp 推出的另一款著名工具，提供工作负载编排功能。与专注于容器的\
    \ Kubernetes 不同，Nomad 与工作负载无关，这意味着它不仅可以调度容器，还可以调度非容器化应用程序。它与其他 HashiCorp 工具（如用于服务发现的\
    \ Consul 和用于密钥管理的 Vault）无缝集成，提供了一个全栈解决方案。其在调度多样化工作负载方面的简洁性和灵活性，使其成为多平台部署的一个引人注目的选择。\n\
    \n**Kamal** 是一个专门用于在各种平台（从云虚拟机到裸金属）上部署 Web 应用程序的部署工具，注重简洁性和可移植性。它提供了零停机部署和资产桥接等功能，并能够使用\
    \ Docker 处理生产环境中的复杂任务。Kamal 被描述为“容器的 Capistrano”，允许在无需预先准备服务器的情况下实现部署自动化。对于那些希望避免\
    \ Kubernetes 和 Docker Swarm 复杂性的人来说，它提供了一个更简单的替代方案，倾向于使用命令式方法以提高易用性和清晰度。\n\n##\
    \ 创建你的第一个 Kubernetes 集群\n\n理论讲得够多了。让我们开始动手实践吧！现在我们将创建我们的第一个 Kubernetes 集群。互联网上有无数关于如何使用\
    \ minikube 集群（一个流行的、在笔记本电脑上运行的 Kubernetes 集群）的教程。对此我有一些个人看法。我们将不使用 Minikube。我们将创建一个真实的集群来学习和实践\
    \ Kubernetes。在你被这个想法吓到之前，请先听听我支持这种方法的理由。它可能并没有那么糟糕。\n\n## 使用真实集群的理由\n\n启动实际的 Kubernetes\
    \ 集群，而不是仅仅依赖像 Minikube 这样的本地开发环境，能为开发者提供大量实践经验，这对于理解 Kubernetes 在真实场景中的细微差别至关重要。虽然\
    \ Minikube 是一个学习 Kubernetes 基础知识和在本地测试应用程序的绝佳工具，但它简化了 Kubernetes 管理和网络的许多方面。通过在更真实的环境中部署集群，开发者能够获得关于集群架构、网络、存储和安全复杂性的宝贵见解，这种方式更接近于模拟生产环境。\n\
    \n此外，管理真实的 Kubernetes 集群让开发者接触到扩展性、弹性和多租户方面的挑战。在本地集群上部署应用程序是一回事；而确保同一应用程序在面对真实用户流量和数据量的不可预测变量时，仍然保持高可用性、安全性和可扩展性，则完全是另一回事。这种实践经验对于理解如何设计和管理能够承受生产环境严苛考验的应用程序至关重要。\n\
    \n此外，使用实际的 Kubernetes 集群让开发者有机会熟悉云原生技术以及 AWS、Google Cloud 和 Azure Kubernetes Service\
    \ (AKS) 等云平台提供的服务。每个云提供商都提供与 Kubernetes 集成的独特工具和服务，例如托管数据库、CI/CD 流水线和监控工具，这些都是全面的云原生应用程序栈的重要组成部分。学习如何使用这些服务并理解它们如何补充\
    \ Kubernetes 部署，对于希望充分利用云能力的开发者来说至关重要。\n\n本质上，虽然像 Minikube 这样的工具在 Kubernetes 教育中扮演着关键角色，但过渡到管理实际的\
    \ Kubernetes 集群是开发者的关键一步。它弥合了理论知识与实践技能之间的差距，为开发者在云中部署和管理生产级应用程序的挑战做好了准备。这种实践经验不仅提高了技术熟练度，也增强了使用\
    \ Kubernetes 解决真实世界应用程序部署和管理挑战的信心。\n\n我希望你在真实集群中部署真实应用程序后能获得成就感。任何低于此标准的体验，对于一本旨在让开发者亲自动手实践\
    \ Kubernetes 的书籍来说，都是不够的。\n\n## 在 DigitalOcean 创建集群\n\n我强烈建议你在 DigitalOcean 创建一个账户。这将为你提供\
    \ 200 美元的信用额度，有效期为 60 天，这在本书的整个学习过程中绰绰有余。我将在下一节简要介绍如何在 DigitalOcean 创建集群。\n\n\
    ## 设置你的 Kubernetes 集群\n\n下载并设置 **doctl** 命令行工具，以便与你的 DigitalOcean 云账户进行交互。[此页面](https://cloud.digitalocean.com/account/api/tokens)\
    \ 包含针对你的操作系统进行设置和账户认证的详细说明。\n\n```bash\n$ doctl auth init\nPlease authenticate\
    \ doctl for use with your DigitalOcean account. You can generate a token in the\
    \ control panel at https://cloud.digitalocean.com/account/api/tokens\n\n> Enter\
    \ your access token: ************************************\n\nValidating token...\
    \ ✓\n\n$ doctl kubernetes options regions\nSlug    Name\nnyc1    New York 1\n\
    sgp1    Singapore 1\nlon1    London 1\nnyc3    New York 3\nams3    Amsterdam 3\n\
    fra1    Frankfurt 1\ntor1    Toronto 1\nsfo2    San Francisco 2\nblr1    Bangalore\
    \ 1\nsfo3    San Francisco 3\nsyd1    Sydney 1\n$ \n```\n\n*使用 DigitalOcean 令牌认证\
    \ doctl 并列出区域*"
