    \ 提供的用于管理有状态应用程序、增强安全性和扩展 Kubernetes 能力的复杂机制。这个循序渐进的介绍将为理解 StatefulSets、服务账户、基于角色的访问控制（RBAC）、Ingress、自定义资源定义（CRD）和证书管理器铺平道路——它们都是\
