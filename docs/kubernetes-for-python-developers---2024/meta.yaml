    # Full fledged Flask redis app


    Armed with the new knowledge of deployments and services, let''s deploy the Flask
    app backed by Redis to the cluster. Let''s first consolidate what artefacts we
    need to deploy this:


    +   1. A flask-redis application container image. Make sure to make this container
    image public as well, similar to what you did with the **flask-app** image.

    2. A deployment for the flask-redis image.

    3. A service for the flask-redis image.

    4. A deployment for the redis service.

    5. A service for the redis deployment.


    First, we will create a separate namespace called **full-stack** to deploy these
    artefacts.


    ```

    $ kubectl create namespace full-stack

    namespace/full-stack created

    ```


    First, let''s create the last 2 items. If our flask app has to access a Redis
    service, then we need one to be present in that cluster. The service should be
    backed by a Redis pod.


    Here''s the Bitnami redis image, packaged as a deployment.'
  merge: -1
  pgno: 207
- img_proc: true
  md: "```\napiVersion: apps/v1\nkind: Deployment\nmetadata:\n  name: cache # (1)\n\
    spec:\n  replicas: 1 # (2)\n  selector:\n    matchLabels:\n      app: cache #\
    \ (3)\n  template:\n    metadata:\n      labels:\n        app: cache # (4)\n \
    \   spec:\n      containers:\n      - name: redis\n        image: bitnami/redis:7.2.4\
    \ # (5)\n        env:\n        - name: REDIS_PASSWORD # (6)\n          value:\
    \ SuperS3cret\n        ports:\n        - containerPort: 6379 # (7)\n```"
  merge: -1
  pgno: 208
- img_proc: true
  md: '(1) -> Names the Deployment as "cache".


    (2) -> Specifies that only one replica of the Pod should be maintained. We will
    see how we can bump this up in later chapters.


    (3) -> The Deployment''s selector that matches Pods with the label **app=cache**.


    (4) -> Labels the Pod template with **app=cache**, making it selectable by the
    Deployment''s selector.


    (5) -> Specifies the Docker image to use for the container, in this case, tag
    **7.2.4** of the **bitnami/redis** image, just like what we did in the docker-compose
    counterpart.


    (6) -> Defines an environment variable named **REDIS_PASSWORD** for the container.
    Bitnami redis image allows us to set the password via environment variables.


    (7) -> Exposes port **6379** on the container, which is the default port for Redis.


