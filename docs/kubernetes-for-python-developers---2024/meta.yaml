- md: "## Considerations\n\nThe supported access modes depend on the capabilities\
    \ of the storage provider or the StorageClass being used. Not all storage systems\
    \ support all access modes.\n\nThe choice of access mode affects how your application\
    \ interacts with the storage. For example, choosing ReadWriteMany enables scenarios\
    \ that require shared storage, but not all applications or storage backends might\
    \ need or support this mode.\n\nWhen defining a PersistentVolumeClaim (PVC) to\
    \ claim storage from a PV, the requested access mode in the PVC must be compatible\
    \ with the access modes offered by the PV. Kubernetes will only bind a PVC to\
    \ a PV if their access modes are compatible.\n\nChoosing the right access mode\
    \ is crucial for the performance, scalability, and functionality of your applications\
    \ that rely on persistent storage in Kubernetes.\n\n(6) -> Specifies that the\
    \ volume will be retained after it is released from a claim.\n\nThe **persistentVolumeReclaimPolicy**\
    \ field in a Kubernetes PersistentVolume (PV) specifies what happens to the underlying\
    \ physical storage when a PersistentVolumeClaim (PVC) is released. This policy\
    \ helps manage storage resources efficiently, ensuring that the lifecycle of storage\
    \ is appropriately handled according to the needs of your applications and the\
    \ cluster. There are three main reclaim policies:\n\n## Retain\n\nThe PV is not\
    \ automatically deleted when the PVC is released. The data on the volume remains\
    \ intact, and the volume is considered \"released\" but still bound to the cluster.\
    \ Manual intervention is required to reclaim the resource and delete the data.\n\
    \n**Use Case:** Useful when you want to manually review the data before deletion\
    \ or when you need to ensure that data is not accidentally deleted. This policy\
    \ is suitable for sensitive data that requires manual backup or audit before deletion.\n\
    \n## Delete\n\nThe PV and the associated storage asset in the underlying infrastructure\
    \ (such as an AWS EBS volume, Google Compute Engine disk, or Azure Disk) are automatically\
    \ deleted when the PVC is released.\n\n**Use Case:** Ideal for dynamic environments\
    \ and development, where automatic cleanup of resources is preferred to prevent\
    \ accumulation of unused volumes and associated costs.\n\n## Recycle (Deprecated)\n\
    \nThe volume is scrubbed (i.e., data is deleted) and made available again for\
    \ a new claim. This policy is deprecated due to its limitations and potential\
    \ security concerns, and it is not recommended for use in new deployments.\n\n\
    **Use Case:** Was previously used for simple scenarios where automatic data erasure\
    \ and volume reuse were needed without creating a new storage asset. Since it's\
    \ deprecated, consider using dynamic provisioning with the Delete policy for similar\
    \ behavior.\n\n(7) -> Associates the PersistentVolume with the **do-block-storage**\
    \ StorageClass.\n\nA StorageClass in Kubernetes is a resource that allows administrators\
    \ to define different classes of storage based on the underlying storage systems\
    \ available in their cluster. StorageClasses abstract the details of the storage\
    \ backend and provisioning mechanism, providing a way to provision PersistentVolumes\
    \ based on the demands of PersistentVolumeClaims (PVCs).\n\nThe following command\
    \ lists all the storage classes available in our cluster:\n\n```\n$ kubectl get\
    \ storageclass\n```\n\n| NAME | PROVISIONER | RECLAIMPOLICY | VOLUMEBINDINGMODE\
    \ | ALLOWVOLUMEEXPANSION | AGE |\n| :--- | :--- | :--- | :--- | :--- | :--- |\n\
    | do-block-storage (default) | dobs.csi.digitalocean.com | Delete | Immediate\
    \ | true | 27d |\n| do-block-storage-retain | dobs.csi.digitalocean.com | Retain\
    \ | Immediate | true | 27d |\n| do-block-storage-xfs | dobs.csi.digitalocean.com\
    \ | Delete | Immediate | true | 27d |\n| do-block-storage-xfs-retain | dobs.csi.digitalocean.com\
    \ | Retain | Immediate | true | 27d |\n\n(8) -> Identifies the Container Storage\
    \ Interface (CSI) driver for DigitalOcean Block Storage.\n\nThe Container Storage\
    \ Interface (CSI) is a standard for exposing arbitrary block and file storage\
    \ systems to containerized workloads on Container Orchestration Systems (COS)\
    \ like Kubernetes, Mesos, Docker, and Cloud Foundry. Developed as a collaborative\
    \ project among various stakeholders in the container ecosystem, CSI aims to provide\
    \ a consistent, standardized API for containerized applications to access storage\
    \ resources.\n\n(9) -> Specifies the unique identifier for the DigitalOcean volume.\
    \ This will be different for you.\n\n(10) -> Sets the filesystem type of the volume\
    \ to **ext4**.\n\nThe filesystem type of a Persistent Volume (PV) in Kubernetes\
    \ depends on the underlying storage system and the Container Storage Interface\
    \ (CSI) driver or in-tree volume plugin being used. When you provision a PV, you\
    \ can specify the filesystem type that the volume should be formatted with, assuming\
    \ the underlying storage system supports that filesystem type.\n\nLet's apply\
    \ this PV.\n\n```\n$ kubectl apply -f pv.yaml\npersistentvolume/cache created\n\
    ```\n\n```\n$ kubectl get pv\nNAME    CAPACITY   ACCESS MODES   RECLAIM POLICY\
    \   STATUS      CLAIM   STORAGECLASS   VOLUMEATTRIBUTESCLASS   REASON   AGE\n\
    cache   2Gi        RWO            Retain           Available           do-block-storage\
    \   <unset>                 4s\n```\n\nWe have associated a PersistentVolume **cache**\
    \ with the block storage object **cache**.\n\nNext, let's associate a persistent\
    \ volume claim with this persistent volume.\n\n```\napiVersion: v1 # (1)\nkind:\
    \ PersistentVolumeClaim # (2)\nmetadata:\n  name: cache # (3)\nspec:\n  accessModes:\
    \ # (4)\n    - ReadWriteOnce\n  resources:\n    requests:\n      storage: 2Gi\
    \ # (5)\n  storageClassName: do-block-storage # (6)\n```\n\n(1) -> Specifies the\
    \ API version for the PersistentVolumeClaim resource.\n\n(2) -> Identifies the\
    \ Kubernetes resource type as a PersistentVolumeClaim.\n\n(3) -> Names the PersistentVolumeClaim\
    \ as \"cache\". Again, this is arbitrary.\n\n(4) -> Defines how the volume can\
    \ be accessed; in this case, as read-write by a single node.\n\n(5) -> Requests\
    \ a volume of 2 gigabytes in size for the claim.\n\n(6) -> Specifies the StorageClass\
    \ to use for provisioning the volume, named **do-block-storage**.\n\nYou'll notice\
    \ that a lot of parameters are similar between PVC and a PV. Once we apply this\
    \ resource, Kubernetes will find out a PV from its inventory and associate it\
    \ with this PVC, *provided* the PVC spec matches any of the PVs lying around.\
    \ For example, Kubernetes will only bind a PVC to a PV if their access modes are\
    \ compatible. This PVC won't be bound to the PV we created had we given **ReadWriteMany**\
    \ value to the **accessMode** attribute.\n\n```\n$ kubectl apply -f pvc.yaml -n\
    \ full-stack\npersistentvolumeclaim/cache created\n```\n\n```\n$ kubectl get pvc\
    \ -n full-stack\nNAME    STATUS   VOLUME   CAPACITY   ACCESS MODES   STORAGECLASS\
    \       VOLUMEATTRIBUTESCLASS   AGE\ncache   Bound    cache    2Gi        RWO\
    \            do-block-storage   <unset>                 33s\n```\n\nThe **STATUS**\
    \ shows **Bound**, implying that this PVC is bound with a PV. Let's check the\
    \ status of the PV.\n\n```\n$ kubectl get pv\nNAME    CAPACITY   ACCESS MODES\
    \   RECLAIM POLICY   STATUS   CLAIM                 STORAGECLASS       VOLUMEATTRIBUTESCLASS\
    \   REASON   AGE\ncache   2Gi        RWO            Retain           Bound   \
    \ full-stack/cache      do-block-storage   <unset>                       2m57s\n\
    ```\n\nIt shows that the PV is bound with a PVC **full-stack/cache**, cache PVC\
    \ in **full-stack** namespace.\n\nWe have a fully functional PVC which is ready\
    \ to be associated with a pod now. And that's what we will be doing next.\n\n\
    ```\napiVersion: apps/v1\nkind: Deployment\nmetadata:\n  name: cache\nspec:\n\
    \  replicas: 1\n  selector:\n    matchLabels:\n      app: cache\n  template:\n\
    \    metadata:\n      labels:\n        app: cache\n    spec:\n      containers:\n\
    \      - name: redis\n        image: bitnami/redis:7.2.4\n        env:\n     \
    \   - name: REDIS_PASSWORD\n          value: SuperS3cret\n        ports:\n   \
    \     - containerPort: 6379\n        volumeMounts: # (1)\n        - name: redis-data\
    \ # (2)\n          mountPath: /bitnami/redis/data # (3)\n      volumes:\n    \
    \  - name: redis-data # (4)\n        persistentVolumeClaim: # (5)\n          claimName:\
    \ cache  # (6)\n```"
  mdcn: "## 注意事项\n\n支持的访问模式取决于存储提供程序或所使用的 StorageClass 的功能。并非所有存储系统都支持所有访问模式。\n\n\
    访问模式的选择会影响应用程序与存储的交互方式。例如，选择 ReadWriteMany 可以实现需要共享存储的场景，但并非所有应用程序或存储后端都需要或支持此模式。\n\
    \n在定义 PersistentVolumeClaim (PVC) 以从 PV 申请存储时，PVC 中请求的访问模式必须与 PV 提供的访问模式兼容。Kubernetes\
    \ 仅在 PVC 和 PV 的访问模式兼容时才会将它们绑定。\n\n选择正确的访问模式对于依赖 Kubernetes 持久化存储的应用程序的性能、可扩展性和功能至关重要。\n\
    \n(6) -> 指定卷在从声明中释放后将被保留。\n\nKubernetes PersistentVolume (PV) 中的 **persistentVolumeReclaimPolicy**\
    \ 字段指定了当 PersistentVolumeClaim (PVC) 被释放时，底层物理存储会发生什么。此策略有助于高效管理存储资源，确保根据应用程序和集群的需求妥善处理存储的生命周期。主要有三种回收策略：\n\
    \n## Retain\n\n当 PVC 被释放时，PV 不会自动删除。卷上的数据保持完整，卷被视为“已释放”但仍绑定到集群。需要手动干预来回收资源并删除数据。\n\
    \n**使用场景：** 当您希望在删除前手动审查数据，或需要确保数据不会被意外删除时非常有用。此策略适用于在删除前需要手动备份或审计的敏感数据。\n\n##\
    \ Delete\n\n当 PVC 被释放时，PV 和底层基础设施中的关联存储资产（例如 AWS EBS 卷、Google Compute Engine 磁盘或\
    \ Azure 磁盘）会被自动删除。\n\n**使用场景：** 非常适合动态环境和开发场景，其中首选自动清理资源以防止未使用的卷和相关成本的积累。\n\n\
    ## Recycle (已弃用)\n\n卷会被清除（即数据被删除）并再次可用于新的声明。由于其局限性和潜在的安全问题，此策略已被弃用，不建议在新部署中使用。\n\
    \n**使用场景：** 以前用于需要自动擦除数据和重用卷而无需创建新存储资产的简单场景。由于已弃用，请考虑使用带有 Delete 策略的动态配置来实现类似行为。\n\
    \n(7) -> 将 PersistentVolume 与 **do-block-storage** StorageClass 关联。\n\nKubernetes\
    \ 中的 StorageClass 是一种资源，允许管理员根据其集群中可用的底层存储系统定义不同的存储类别。StorageClass 抽象了存储后端和配置机制的细节，提供了一种根据\
    \ PersistentVolumeClaim (PVC) 的需求来配置 PersistentVolume 的方法。\n\n以下命令列出了我们集群中所有可用的存储类：\n\
    \n```\n$ kubectl get storageclass\n```\n\n| NAME | PROVISIONER | RECLAIMPOLICY\
    \ | VOLUMEBINDINGMODE | ALLOWVOLUMEEXPANSION | AGE |\n| :--- | :--- | :--- | :---\
    \ | :--- | :--- |\n| do-block-storage (default) | dobs.csi.digitalocean.com |\
    \ Delete | Immediate | true | 27d |\n| do-block-storage-retain | dobs.csi.digitalocean.com\
    \ | Retain | Immediate | true | 27d |\n| do-block-storage-xfs | dobs.csi.digitalocean.com\
    \ | Delete | Immediate | true | 27d |\n| do-block-storage-xfs-retain | dobs.csi.digitalocean.com\
    \ | Retain | Immediate | true | 27d |\n\n(8) -> 标识 DigitalOcean 块存储的容器存储接口 (CSI)\
    \ 驱动程序。\n\n容器存储接口 (CSI) 是一个标准，用于向容器编排系统 (COS)（如 Kubernetes、Mesos、Docker 和 Cloud\
    \ Foundry）上的容器化工作负载暴露任意块和文件存储系统。CSI 作为容器生态系统中各利益相关者的协作项目开发，旨在为容器化应用程序提供一致、标准化的\
    \ API 来访问存储资源。\n\n(9) -> 指定 DigitalOcean 卷的唯一标识符。这对您来说会有所不同。\n\n(10) -> 将卷的文件系统类型设置为\
    \ **ext4**。\n\nKubernetes 中持久卷 (PV) 的文件系统类型取决于底层存储系统以及正在使用的容器存储接口 (CSI) 驱动程序或内联卷插件。当您配置\
    \ PV 时，您可以指定卷应格式化的文件系统类型，前提是底层存储系统支持该文件系统类型。\n\n让我们应用这个 PV。\n\n```\n$ kubectl\
    \ apply -f pv.yaml\npersistentvolume/cache created\n```\n\n```\n$ kubectl get\
    \ pv\nNAME    CAPACITY   ACCESS MODES   RECLAIM POLICY   STATUS      CLAIM   STORAGECLASS\
    \   VOLUMEATTRIBUTESCLASS   REASON   AGE\ncache   2Gi        RWO            Retain\
    \           Available           do-block-storage   <unset>                 4s\n\
    ```\n\n我们已经将一个 PersistentVolume **cache** 与块存储对象 **cache** 关联起来。\n\n接下来，让我们将一个持久卷声明与此持久卷关联。\n\
    \n```\napiVersion: v1 # (1)\nkind: PersistentVolumeClaim # (2)\nmetadata:\n  name:\
    \ cache # (3)\nspec:\n  accessModes: # (4)\n    - ReadWriteOnce\n  resources:\n\
    \    requests:\n      storage: 2Gi # (5)\n  storageClassName: do-block-storage\
    \ # (6)\n```\n\n(1) -> 指定 PersistentVolumeClaim 资源的 API 版本。\n\n(2) -> 将 Kubernetes\
    \ 资源类型标识为 PersistentVolumeClaim。\n\n(3) -> 将 PersistentVolumeClaim 命名为 \"cache\"\
    。同样，这是任意的。\n\n(4) -> 定义卷的访问方式；在这种情况下，是单节点读写。\n\n(5) -> 为声明请求一个大小为 2 GB 的卷。\n\n\
    (6) -> 指定用于配置卷的 StorageClass，名为 **do-block-storage**。\n\n您会注意到 PVC 和 PV 之间有很多参数是相似的。一旦我们应用此资源，Kubernetes\
    \ 将从其库存中找到一个 PV 并将其与此 PVC 关联，*前提是* PVC 规范与任何现有的 PV 匹配。例如，Kubernetes 仅在 PVC 和 PV\
    \ 的访问模式兼容时才会将它们绑定。如果我们给 **accessMode** 属性赋予 **ReadWriteMany** 值，这个 PVC 将不会绑定到我们创建的\
    \ PV。\n\n```\n$ kubectl apply -f pvc.yaml -n full-stack\npersistentvolumeclaim/cache\
    \ created\n```\n\n```\n$ kubectl get pvc -n full-stack\nNAME    STATUS   VOLUME\
    \   CAPACITY   ACCESS MODES   STORAGECLASS       VOLUMEATTRIBUTESCLASS   AGE\n\
    cache   Bound    cache    2Gi        RWO            do-block-storage   <unset>\
    \                 33s\n```\n\n**STATUS** 显示为 **Bound**，意味着此 PVC 已与一个 PV 绑定。让我们检查一下\
    \ PV 的状态。\n\n```\n$ kubectl get pv\nNAME    CAPACITY   ACCESS MODES   RECLAIM\
    \ POLICY   STATUS   CLAIM                 STORAGECLASS       VOLUMEATTRIBUTESCLASS\
    \   REASON   AGE\ncache   2Gi        RWO            Retain           Bound   \
    \ full-stack/cache      do-block-storage   <unset>                       2m57s\n\
    ```\n\n它显示 PV 已与 PVC **full-stack/cache**（**full-stack** 命名空间中的 cache PVC）绑定。\n\
    \n我们有一个功能齐全的 PVC，现在可以与 Pod 关联了。这就是我们接下来要做的。\n\n```\napiVersion: apps/v1\nkind:\
    \ Deployment\nmetadata:\n  name: cache\nspec:\n  replicas: 1\n  selector:\n  \
    \  matchLabels:\n      app: cache\n  template:\n    metadata:\n      labels:\n\
    \        app: cache\n    spec:\n      containers:\n      - name: redis\n     \
    \   image: bitnami/redis:7.2.4\n        env:\n        - name: REDIS_PASSWORD\n\
    \          value: SuperS3cret\n        ports:\n        - containerPort: 6379\n\
    \        volumeMounts: # (1)\n        - name: redis-data # (2)\n          mountPath:\
    \ /bitnami/redis/data # (3)\n      volumes:\n      - name: redis-data # (4)\n\
    \        persistentVolumeClaim: # (5)\n          claimName: cache  # (6)\n```"
