  mdcn: "(9) -> 将特定的 **redis.conf** 文件从 configMap 挂载到容器内的 **/tmp/redis/redis.conf**。\n\
    \n(10) -> 定义一个名为 redis-script 的卷，其数据源为 ConfigMap，其中包含 **redis-init.sh** 脚本。\n\n\
    (11) -> 定义另一个名为 redis-config 的卷，其数据源为同一个 ConfigMap，其中包含 redis.conf 文件。\n\n(12)\
    \ -> 指定用于动态卷配置的 PersistentVolumeClaim 模板，确保 StatefulSet 中的每个 Pod 都拥有自己的持久化存储。\n\
    \n## 关于持久卷声明模板\n\nStatefulSet 规范中的 **volumeClaimTemplates** 部分是一个强大的功能，它能自动为 StatefulSet\
    \ 中的每个 Pod 配置 PersistentVolume (PV)。这确保了每个 Pod 都拥有自己独特的、持久化的存储，即使 Pod 重启或重新调度，数据也能得以保留，这对于需要在重启和故障中维持状态的有状态应用至关重要。以下是\
    \ volumeClaimTemplates 工作原理及其重要性的详细说明：\n\n## 持久化存储的自动化\n\n**动态配置：** 当部署 StatefulSet\
    \ 时，对于创建的每个 Pod，Kubernetes 会根据 volumeClaimTemplates 中定义的规格动态配置一个新的 PersistentVolume\
    \ (PV)。这意味着你无需为有状态应用中的每个 Pod 手动创建 PV。\n\n**一对一映射：** StatefulSet 中的每个 Pod 都会获得自己的\
    \ PersistentVolumeClaim (PVC)，该 PVC 又会绑定到一个唯一的 PV。这种一对一映射确保了存储在 PV 上的数据为该 Pod\
    \ 所独占，即使 Pod 被创建和销毁，也能提供稳定的存储系统。\n\n## 模板结构\n\n**声明规范：** volumeClaimTemplates\
    \ 将包含一个或多个 PVC 定义，这些定义指定了所需的存储类、访问模式（例如 ReadWriteOnce）和资源请求（例如存储大小）。这些定义被用作模板，为每个\
    \ Pod 创建实际的 PVC。\n\n**稳定且唯一的存储：** 从 volumeClaimTemplates 创建的 PVC 会根据 Pod 的序数索引自动添加唯一后缀进行命名。这确保了每个\
    \ Pod 的存储是隔离且持久的，从而维护了应用的有状态特性。\n\n**存储类使用：** 模板可以指定 storageClassName，以确定使用哪个\
    \ StorageClass 来配置 PV。这允许使用不同类型的存储（例如 SSD、标准磁盘驱动器）以及来自不同提供商（云、本地）的存储。\n\n在 Redis\
    \ StatefulSet 示例的上下文中，**volumeClaimTemplates** 部分确保 StatefulSet 中的每个 Redis Pod\
    \ 都有自己的 PVC，命名为 **redis-data-\\<pod-index\\>**，该 PVC 又绑定到一个唯一配置的、至少具有 **1Gi**\
    \ 存储空间、以 **ReadWriteOnce** 模式访问的 PV。\n\nStatefulSet 中的 **volumeClaimTemplates**\
    \ 功能对于在 Kubernetes 中管理有状态应用至关重要，它提供了一种可扩展且自动化的方式来处理持久化存储。它抽象了管理单个 PV 和 PVC 的复杂性，使开发人员能够专注于应用逻辑，而非底层基础设施。\n\
    \n## Headless 服务\n\n在 Kubernetes 中 Redis StatefulSet 的上下文中包含一个 Service 条目，特别是\
    \ headless 服务，对于有状态应用及其发现机制有几个关键目的。\n\nKubernetes 中的 headless 服务不提供负载均衡或单个 IP\
    \ 地址。相反，它允许通过 Pod 自身的 IP 地址直接访问它们。对于像 Redis 这样的有状态应用，每个实例可能需要单独访问（例如用于复制或分片），headless\
    \ 服务为每个 Pod 提供了一个基于其主机名和服务名称的稳定 DNS 条目。\n\n![](img/91c4bde832e221ba5bc429caf9587286_320_0.png)\n\
    \n## Headless 服务\n\n这种稳定的网络标识对于 Redis 节点之间的通信至关重要，尤其是在集群或复制设置中，节点需要发现并连接到主节点或其他副本。\n\
    \n该服务充当集群内服务发现的一种方法。Pod 可以使用 DNS 查询来发现其他 Pod 的 IP 地址。例如，如果知道主节点的主机名，Redis 副本可以使用\
    \ DNS 发现主节点的 IP 地址。\n\n在提供的示例中，如果你将服务命名为 **redis**，并且你的 StatefulSet Pod 的命名模式为\
    \ **redis-0**、**redis-1** 等，那么一个 Pod 可以查询 DNS 以获取 **redis-0.redis** 的 IP 地址，从而得到\
    \ **redis-0** Pod 的 IP 地址。这对于初始配置以及处理 Redis 集群内的故障转移或拓扑变更特别有用。\n\n我们如下定义一个 headless\
    \ 服务：\n\n```\napiVersion: v1\nkind: Service\nmetadata:\n  name: redis # (1)\n\
    spec:\n  ports:\n    - port: 6379 # (2)\n      targetPort: 6379\n  clusterIP:\
    \ None # (3)\n  selector:\n    app: redis # (4)\n```\n\n(1) -> 服务的名称。这是任意的。\n\n\
    (2) -> 我们希望暴露服务的端口。\n\n(3) -> 此配置文件中最重要的行。当我们设置 **clusterIP** 为 **None** 时，Kubernetes\
    \ 将其视为 headless 服务，并且不会为其分配任何 IP。\n\n(4) -> 选择器标签应与我们的 statefulset 标签匹配。\n\n让我们按顺序应用\
    \ configmap、statefulset 和 service。\n\n```\n$ kubectl create configmap redis-custom\
    \ --from-file=redis.conf=redis.conf --from-file=redis-init.sh=redis-init.sh -n\
    \ robust-setup\nconfigmap/redis-custom created\n```\n\n```\n$ kubectl apply -f\
    \ redis-sts.yaml -n robust-setup\nstatefulset.apps/redis created\n```\n\n```\n\
    $ kubectl apply -f redis-headless-svc.yaml -n robust-setup\nservice/redis created\n\
    ```\n\n你会注意到 statefulset 的 Pod 是逐个启动的，而不是同时启动。\n\n```\n$ kubectl get pod -n robust-setup\
    \ --watch\nNAME      READY   STATUS              RESTARTS   AGE\nredis-0   0/1\
    \     Init:0/1            0          4s\nredis-0   0/1     PodInitializing   \
    \  0          12s\nredis-0   1/1     Running             0          13s\nredis-1\
    \   0/1     Pending             0          0s\nredis-1   0/1     Pending     \
    \        0          3s\nredis-1   0/1     Init:0/1            0          3s\n\
    ```\n\n```\n$ kubectl get pod -n robust-setup\nNAME      READY   STATUS    RESTARTS\
    \   AGE\nredis-0   1/1     Running   0          119s\nredis-1   1/1     Running\
    \   0          106s\nredis-2   1/1     Running   0          92s\n```\n\n第一个序号\
    \ **0** 的 Pod 最先启动，然后是 **1** 和 **2**。这是 statefulset 的固有属性。让我们检查日志，看看为什么这在 Redis\
    \ 的上下文中很重要。\n\n```\n$ kubectl logs -f redis-0 -n robust-setup # (1)\nDefaulted\
    \ container \"redis\" out of: redis, volume-permissions (init)\nStarting as as\
