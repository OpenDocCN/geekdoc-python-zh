  md: '# Port forward


    We''ve covered the basic capabilities of kubernetes pods, the smallest building
    units in a Kubernetes cluster. But how exactly do we access the applications running
    in these pods/containers?


    There are idiomatic ways to do this in Kubernetes which we will cover in a later
    chapter. For now, kubectl gives us a provision to do this by port-forwarding.


    To port forward a Pod in Kubernetes, you can use the kubectl port-forward command.
    This command forwards one or more local ports to a Pod. Port forwarding can be
    particularly useful for debugging or temporarily accessing an application running
    within a Pod from your local machine.'
