    # services


    A Service in Kubernetes is an abstract way to expose an application running on
    a set of Pods as a network service. With Kubernetes you don''t need to modify
    your application to use an unfamiliar service discovery mechanism. Kubernetes
    gives Pods their own IP addresses and a single DNS name for a set of Pods and
    can load-balance across them. The Service resource routes traffic across a set
    of Pods. Services are defined using YAML or JSON like all Kubernetes objects.


    # Why We Need Services


    **Stable Endpoint for Pod Communication:** Pods are ephemeral and can be created
    or destroyed at any time. A Service provides a stable IP address and DNS name
    that clients can use to communicate with the Pods,'
  merge: -1
  pgno: 187
- img_proc: true
  md: 'even as the Pods are replaced or rescheduled.


    **Load Balancing:** A Service can distribute network traffic across all Pods matching
    a specified label selector. This balances the load and ensures that the application
    is scalable and resilient.


    **Abstraction:** Services abstract the way you access the application. You don''t
    need to know which specific Pods are serving the application at any given time.


    **Service Discovery:** Kubernetes Services are integrated into its DNS system,
    allowing applications to easily discover other services through DNS lookups, using
    the service names.


    # Types of Services


    **ClusterIP (default):** Exposes the Service on an internal IP in the cluster.
    This type makes the Service only reachable from within the cluster.


    **NodePort:** Exposes the Service on the same port of each selected Node in the
    cluster using NAT. It makes the Service accessible from outside the cluster using
    `<NodeIP>:<NodePort>`.


    **LoadBalancer:** Exposes the Service externally using a cloud provider''s load
    balancer. NodePort and ClusterIP Services, to which the external load balancer
    routes, are automatically created.


    **ExternalName:** Maps the Service to the contents of the externalName field (e.g.,
    foo.bar.example.com), by returning a CNAME record with its value. No proxying
    of any kind is set up.


    # CoreDNS primer


    CoreDNS is the default DNS server in Kubernetes, responsible for DNS-based service
    discovery within the'
  merge: -1
  pgno: 188
- img_proc: true
  md: 'cluster. It plays a crucial role in resolving service names to their corresponding
    IP addresses, enabling Pods to communicate with each other and with services seamlessly.
    Here''s how CoreDNS works in the context of Kubernetes Services:


    When you create a Service in Kubernetes, it gets assigned a unique DNS name. This
    name follows a standard pattern: `<service-name>.<namespace-name>.svc.cluster.local`,
    where:


    +   - `<service-name>` is the name of your Service.

    - `<namespace-name>` is the namespace in which your Service resides.

    - `svc.cluster.local` is the default domain for services within a Kubernetes cluster.


    CoreDNS is configured to watch the Kubernetes API for changes to Services and
    Endpoints. When a new Service is created, CoreDNS automatically creates DNS records
    for it. Thus, when a Pod in the cluster queries a Service by its DNS name, CoreDNS
    resolves the name to the Service''s ClusterIP (for ClusterIP Services) or to the
    appropriate IP addresses (for NodePort or LoadBalancer Services).


    # Examples


    A **ClusterIP** Service makes the Nginx application accessible within the cluster
    on a stable internal IP address. This is useful for internal applications or services
    that should not be exposed outside the cluster.'
