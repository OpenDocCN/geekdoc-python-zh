  - '[PAGE 308]


    # Need for stateful sets


    What if each pod in a deployment could have its own PVC? Also, what if we get
    strong guarantees about the order in which each replica would start? For instance,
    the master always comes up first, followed by the slave replicas. In addition,
    if Kuberbetes could give us predictable pod identities, like **redis-master-0**,
    instead of a random **cache-cd5968d5b-btjcg** (we don''t know if **cache-cd5968d5b-btjcg**
    is a master or a slave pod), that would solve all our problems. This is exacly
    what a statefulset offers.


    Let''s see how statefulsets solve each of these issues and more.


    **Stable, Unique Network Identifiers:** Each pod in a StatefulSet has a stable
    hostname derived from the name of the StatefulSet and an ordinal index (e.g.,
    **redis-0**, **redis-1**). This ensures that even after restarts or rescheduling,
    the identity of the pods remains consistent, preserving network communication
    and data replication configurations.


    **Persistent Storage Binding:** Each pod in a StatefulSet can be associated with
    a dedicated PersistentVolume through PVC templates. This ensures that each pod
    always reattaches to the same PV, preserving its state across restarts and rescheduling.


    **Ordered, Graceful Deployment and Scaling:** StatefulSet ensures that pods are
    created, scaled, and terminated in a strict, ordered manner (according to their
    ordinal index). For Redis, this means that master and replica instances can be
    managed to ensure data integrity and consistent replication.'
  - '[PAGE 309]


    # Modelling redis as a statefulset


    ![](img/91c4bde832e221ba5bc429caf9587286_309_0.png)


    Redis as a statefulset'
  - '[PAGE 310]


    Let''s model Redis under a master-slave architecture to achieve more resilience.
    We are now convinced that this can''t be done as a deployment. How will all these
    conditions pan out in a redis statefulset?


    If we model our Redis cluster as a 3-pod StatefulSet with one master (e.g., **redis-0**)
    and two replicas (e.g., **redis-1**, **redis-2**), Kubernetes ensures that:


    +   1. Each Redis pod is bound to its own PersistentVolume, preserving data even
    if the pod moves to another node.

    2. Pods are started and terminated in an orderly fashion, respecting Redis''s
    replication and data integrity requirements.

    3. Network identities (hostnames) remain consistent, ensuring that replication
    and client connections are stable and predictable.


    We want to make a few changes this time. We won''t be using the Bitnami Redis
    image. Even though it is possible to use that image and build a statefulset, we
    have to tweak a lot of configuration parameters in their setup. I also want to
    mention that Bitnami makes building this master-slave Redis cluster a breeze,
    but we will build a watered down version of the same for pedagogical purposes.
    Also, the focus will be mostly on modelling a statefulset and less on Redis configuration
    (which is a separate book in itself). Hence, we will stick to the official Redis
    image.


    The official Redis image doesn''t come with a **redis.conf**. We have to create
    a minimal version and attach it to the pods, since both the master and slave redis
    instances need redis configuration. This file, as we will learn later, will contain
    the network identity (fancy word for the network accessible service name) of the
    master pod so that slave instances know who the master is and how to connect to
    that.'
  - '[PAGE 311]


    We will also write a script, which will find out if the current pod is master
    or not, and accordingly append the master''s network identity to the **redis.conf**
    file. After this, it will start the redis process. We will model both of these
    as configmaps.


    ```

    masterauth SuperS3cret # (1)

    requirepass SuperS3cret # (2)

    bind 0.0.0.0 # (3)

    protected-mode no # (4)

    port 6379 # (5)

    dir "/data" # (6)

    ```


    (1) -> Sets the password required for a slave to authenticate with the master.


    (2) -> Configures the password required by clients to connect to the Redis server.


    (3) -> Allows Redis to accept connections on all network interfaces.


    (4) -> Disables protected mode, allowing connections from any IP address.


    (5) -> Specifies the port on which the Redis server listens for connections.


    (6) -> Sets the directory where Redis will write persistent data files.


    The redis init script follows next.


    ```

    #!/bin/sh

    ```'
