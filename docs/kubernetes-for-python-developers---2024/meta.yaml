    # Dynamic provisioning


    Let''s recap the steps we did. We first created a block storage object using **doctl**,
    then created a PV to associate with it, followed by a PVC. Then we associated
    the PVC with the deployment. What if we just created a PVC and updated the deployment
    while Kubernetes does all the grunt work of creating the block storage, PV etc.?


    That''s just what dynamic provisioning means.


    Dynamic provisioning in Kubernetes is a feature that automatically creates storage
    resources (Persistent Volumes, PVs) on-demand for Persistent Volume Claims (PVCs).
    This process eliminates the need for ad-'
  - '[PAGE 294]


    ministrators to manually pre-provision storage and allows applications to request
    and consume storage dynamically.


    # How Dynamic Provisioning Works


    ![](img/91c4bde832e221ba5bc429caf9587286_294_0.png)'
- md: "## How dynamic provisioning works\n\n**StorageClass:** Administrators define\
    \ one or more StorageClass objects in the cluster. Each StorageClass specifies\
    \ a provisioner (e.g., AWS EBS, Google Persistent Disk, Azure Disk Storage, or\
    \ a local storage option) and a set of parameters specific to that provisioner,\
    \ such as disk type, size, and IOPS. The StorageClass acts as a template for creating\
    \ PersistentVolumes.\n\n**PersistentVolumeClaim (PVC) Request:** When a user or\
    \ application requires storage, they create a PVC specifying the desired characteristics,\
    \ such as size and access modes. Importantly, the PVC references a StorageClass\
    \ to indicate the type of storage required.\n\n**Automatic Provisioning:** The\
    \ Kubernetes control plane watches for PVCs that cannot be satisfied by existing\
    \ PVs. When it detects such a PVC, it uses the specified StorageClass to dynamically\
    \ provision a new PV that matches the PVC's requirements. The provisioning is\
    \ handled by the storage provisioner defined in the StorageClass.\n\n**Binding:**\
    \ Once the new PV is created, Kubernetes automatically binds it to the PVC, making\
    \ the storage available to the application. This binding process matches PVCs\
    \ and PVs based on their specifications and claims.\n\n## Benefits of Dynamic\
    \ Provisioning\n\n**Efficiency:** Eliminates the need for manual pre-provisioning\
    \ of storage. Storage is created automatically when required, ensuring efficient\
    \ use of resources.\n\n**Speed:** Speeds up the deployment of applications that\
    \ require persistent storage by reducing manual steps.\n\n**Flexibility:** Allows\
    \ users to consume storage resources transparently, regardless of the underlying\
    \ storage infrastructure. Applications can specify exactly what type of storage\
    \ they need (e.g., SSD vs. HDD, size, IOPS) without worrying about the details\
    \ of provisioning.\n\n**Scalability:** Supports the scalable deployment of applications\
    \ by automating the provisioning process, which is especially important in dynamic\
    \ and large-scale environments.\n\n## Example Scenario\n\nAn organization running\
    \ Kubernetes in the cloud wants to deploy a database application that requires\
    \ persistent storage with high IOPS. Instead of manually creating a cloud disk\
    \ and binding it to the application:\n\n- An administrator creates a StorageClass\
    \ specific to high-IOPS SSDs provided by their cloud provider.\n- The application's\
    \ deployment includes a PVC that specifies the required storage size and references\
    \ the high-IOPS StorageClass.\n- When the application is deployed, Kubernetes\
    \ automatically provisions an appropriate cloud disk according to the StorageClass\
    \ parameters and binds it to the application's PVC.\n- The database application\
    \ uses the dynamically provisioned storage without any manual intervention in\
    \ the storage provisioning process.\n\nDynamic provisioning streamlines and automates\
    \ the storage allocation process, making Kubernetes environments more flexible\
    \ and easier to manage.\n\nAlso, think of our context where every developer requiring\
    \ storage for their application needs to have DigitalOcean cloud keys and access\
    \ to **doctl** so that they can create the block object storage before creating\
    \ any PVC. Sounds pretty complicated right? Dynamic provisioning abstracts away\
    \ all this away from your developers.\n\n## A practical illustration\n\nWe create\
    \ only the PVC this time.\n\n```yaml\napiVersion: v1\nkind: PersistentVolumeClaim\n\
    metadata:\n  name: dynamic-cache\nspec:\n  accessModes:\n    - ReadWriteOnce\n\
    \  resources:\n    requests:\n      storage: 2Gi\n  storageClassName: do-block-storage\n\
    ```\n\n```\n$ kubectl apply -f pvc-dynamic.yaml -n full-stack\npersistentvolumeclaim/dynamic-cache\
    \ created\n```\n\nThe PVC gets created, and so does the PV!\n\n```\n$ kubectl\
    \ get pvc -n full-stack\nNAME            STATUS   VOLUME          CAPACITY   ACCESS\
    \ MODES   STORAGECLASS      VOLUMEATTRIBUTESCLASS AGE\ncache           Bound \
    \   cache           2Gi        RWO            do-block-storage  <unset>      \
    \          157m\ndynamic-cache   Bound    pvc-991f35c9-c4d2-4e9f-9fdf-9aa65e819935\
    \  2Gi  RWO  do-block-storage  <unset>  9s\n```\n\n```\n$ kubectl get pv\nNAME\
    \                                       CAPACITY   ACCESS MODES   RECLAIM POLICY\
    \   STATUS   CLAIM                       STORAGECLASS      VOLUMEATTRIBUTESCLASS\
    \   REASON   AGE\ncache                                      2Gi        RWO  \
    \          Retain           Bound    full-stack/cache            do-block-storage\
    \  <unset>                       160m\npvc-991f35c9-c4d2-4e9f-9fdf-9aa65e819935\
    \   2Gi        RWO            Delete           Bound    full-stack/dynamic-cache\
    \    do-block-storage  <unset>                       13s\n```\n\nLet's check if\
    \ the storage object also gets created in the backend.\n\n```\n$ doctl compute\
    \ volume list\nID                                    Name                    \
    \                  Size   Region   Filesystem Type   Filesystem Label   Droplet\
    \ IDs   Tags\nd5716c46-d22a-11ee-b619-0a58ac14b586  cache                    \
    \                 2 GiB  blr1     ext4               [402016564]        k8s:72ad2064-31b4-4552-a630-c88487140b6f\n\
    c993be03-d241-11ee-bb89-0a58ac14b93e  pvc-991f35c9-c4d2-4e9f-9fdf-9aa65e819935\
    \  2 GiB  blr1     unknown            k8s:72ad2064-31b4-4552-a630-c88487140b6f\n\
    ```\n\nThe rest of the steps hereon are the same.\n\n## Key differences between\
    \ PV and PVC\n\nPersistent Volumes (PVs) and Persistent Volume Claims (PVCs) are\
    \ two fundamental concepts in Kubernetes related to storage. They work together\
    \ to provide and manage storage in a cluster, but they serve different roles:\n\
    \n### Persistent Volumes (PVs)\n\n**Cluster Resource:** PVs are cluster-level\
    \ resources representing a piece of storage in the cluster. They are independent\
    \ of any single Pod's lifecycle and can be provisioned by administrators manually\
    \ or dynamically through StorageClasses.\n\n**Provisioning:** Can be pre-provisioned\
    \ by an administrator or dynamically provisioned by Kubernetes using a StorageClass.\
    \ The provisioning method determines how a PV is created and what it represents\
    \ (e.g., a disk in cloud storage, a local path on a node, etc.).\n\n**Lifecycle\
    \ and Management:** Managed at the cluster level, which means they exist in the\
    \ Kubernetes cluster until they are manually deleted or reclaimed by a reclaim\
    \ policy. PVs have their lifecycle, independent of the Pods using them.\n\n**Access\
    \ Policies:** Includes access modes (e.g., ReadWriteOnce, ReadOnlyMany, ReadWriteMany)\
    \ and a reclaim policy that dictates what happens to the PV once it's released\
    \ from a claim (e.g., Retain, Delete, Recycle).\n\n### Persistent Volume Claims\
    \ (PVCs)\n\n**Pod Resource:** PVCs are requests for storage by a user. They specify\
    \ size, access modes, and sometimes a specific StorageClass. PVCs are namespaced\
    \ resources, meaning they exist within a specific namespace and are used by Pods\
    \ in that namespace.\n\n**Requesting Storage:** Acts as a request for storage\
    \ by a user. It specifies the size and access modes (e.g., can the volume be mounted\
    \ as read-write by a single node, or read-only by many nodes) and optionally requests\
    \ a specific StorageClass.\n\n**Binding:** PVCs are automatically bound to an\
    \ available PV that meets their requirements. This binding is done by Kubernetes\
    \ and is based on the size, access modes, and StorageClass specified in the PVC.\n\
    \n**Lifetime:** The lifecycle of a PVC is tied to the namespace and the Pods that\
    \ use it. A PVC exists as long as it is needed by a Pod and is deleted when it\
    \ is no longer used.\n\n### Key Differences summary\n\n**Scope:** PVs are cluster-scoped\
    \ resources, whereas PVCs are namespaced.\n\n**Purpose:** PVs represent physical\
    \ or virtual storage space available in the cluster, while PVCs represent a request\
    \ for storage by a user or application.\n\n**Lifecycle:** The lifecycle of a PV\
    \ is managed independently of Pods, but a PVC is tied to the lifecycle of the\
    \ Pods that use it.\n\n**Provisioning:** PVs can be provisioned statically (pre-provisioned\
    \ by an admin) or dynamically (automatically created by Kubernetes in response\
    \ to a PVC). PVCs are always created by users or applications to request storage\
    \ resources.\n\n**Usage:** PVs are bound to PVCs to fulfill storage requests.\
    \ A PVC specifies what it needs in terms of storage, and Kubernetes binds it to\
    \ an appropriate PV.\n\nUnderstanding the relationship and differences between\
    \ PVs and PVCs is crucial for effectively managing storage in Kubernetes, ensuring\
    \ applications have the necessary storage resources they need to operate.\n\n\
