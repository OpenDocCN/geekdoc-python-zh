    \n(3) -> 探针等待响应的时间。如果就绪检查在 1 秒内未完成，则认为探针失败。\n\n(4) -> 指定就绪探针的频率（以秒为单位）。此示例每 5\
    \ 秒执行一次检查，以持续验证 Nginx 服务器是否准备好接收流量。\n\n(5) -> 将容器标记为未就绪所需的连续失败次数。在此示例中，连续 3 次失败后，Pod\
    \ 将从任何匹配它的服务的端点列表中移除，因此在再次就绪之前不会接收任何流量。\n\n使用具有这些设置的就绪探针可确保 Pod 内的 Nginx 容器在完全准备好处理请求之前不会接收流量。此设置对于确保流量仅定向到完全运行的\
    \ Pod 特别有用，从而增强了在 Kubernetes 中部署的应用程序的整体可靠性和稳定性。\n\n## 存活探针和就绪探针的最佳实践\n\n存活探针和就绪探针对于维护\
    \ Kubernetes 中应用程序的健康和可用性至关重要。有效使用它们需要理解其目的和细微差别。以下是利用这两种探针的一些最佳实践：\n\n- 1. 对复杂应用程序同时使用两种探针\
    \ 存活探针：确保用于检查您的应用程序是否存活并需要重启。存活探针失败应表明您的应用程序处于无法恢复的状态，必须重启。 就绪探针：使用就绪探针来确定您的应用程序何时准备好开始接收流量。这对于启动后需要时间才能处理流量或可能因负载或依赖项中断而暂时不可用的应用程序至关重要。\n\
    - 2. 根据应用程序要求配置探针 了解应用程序的启动时间、依赖项和典型故障模式，以适当配置探针的参数（initialDelaySeconds、periodSeconds、timeoutSeconds\
    \ 和 failureThreshold）。避免使用可能导致不必要的重启或流量被阻止到达健康 Pod 的激进探针配置。\n- 3. 区分存活检查和就绪检查\
    \ 设计应用程序的健康端点以准确反映存活状态和就绪状态。存活端点可能检查关键进程的可用性，而就绪端点可以检查数据库连接、缓存就绪性或其他依赖项。\n- 4.\
    \ 避免对两种探针使用相同的端点 虽然可能倾向于对存活探针和就绪探针使用相同的端点，但这可能导致问题，例如暂时过载的应用程序因无响应而被终止，而不是给予其恢复时间。不同的端点可以反映“存活”与“准备好处理流量”的细微状态差异。\n\
    - 5. 从保守的阈值开始 从 failureThreshold 和 timeoutSeconds 的保守阈值开始，以防止抖动（频繁的状态变化）和不必要的重启。随着您对应用程序在生产环境中的行为有更深入的了解，可以调整这些值。\n\
    - 6. 为启动缓慢的容器利用启动探针 对于启动时间较长的应用程序，考虑使用启动探针。启动探针允许您为就绪和存活检查的启动设置较长的延迟，为您的应用程序提供足够的初始化时间，而不会被过早终止。\n\
    - 7. 基于观察进行监控和调整 定期监控应用程序的性能和探针的有效性。根据观察到的数据，必要时调整探针配置。过于敏感的探针可能造成与其旨在预防的问题一样多的停机时间。\n\
    \n## 命名空间\n\n到目前为止，从讨论 Kubernetes 架构到将 Pod 放置在节点中，我们一直假设命名空间的概念不存在。Kubernetes\
    \ 中的命名空间是在多个用户和项目之间划分集群资源的一种方式。它们本质上是在 Kubernetes 集群内限定访问和资源范围的一种方法。命名空间有助于组织集群中的对象（例如\
    \ Pod、服务和部署），并可以简化访问控制和资源管理，尤其是在拥有许多用户和应用程序的环境中。"
