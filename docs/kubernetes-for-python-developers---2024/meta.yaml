    # Exercise 24: Use configmaps and run 2 nginxes in same pod.


    Use the twin-nginx example from previous chapters, instead of running Bitnami''s
    nginx, run the official nginx and use different **nginx.conf** files, mount them
    as configmaps and run both nginx containers in different ports within the same
    pod.


    # Solution


    To run two NGINX containers in a single Kubernetes pod on different ports, you
    will need to:


    +   1. Create two NGINX configuration files, each configured to listen on a different
    port.

    2. Create a Kubernetes ConfigMap to store these configuration files.

    3. Define a pod specification that uses this ConfigMap to mount the configuration
    files into the appropriate location within each container.'
