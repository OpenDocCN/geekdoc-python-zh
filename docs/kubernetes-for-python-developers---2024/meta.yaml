    used by containers within the pod are available, allowing the image pull operations
    to succeed.


    # Exercise 29: Scale out redis statefulset.


    Scale the Redis StatefulSet up and down. Observe and document the effects on Redis
    data and pod naming conventions.


    # Solution


    The general syntax for scaling the statefulset is:


    ```

    $ kubectl scale statefulsets <statefulset-name> --replicas=<new-replica-count>

    ```


    Scaling up will create new pods with higher ordinals. Saling down will remove
    the pod with the highest ordinal number.


    # Exercise 30: Set up high availability for Redis using Redis Sentinel.


    Deploy Redis Sentinel alongside the Redis StatefulSet to monitor the master and
    perform automatic failover in case of master failure. Document the deployment
    process and failover testing.


    # Solution


    Use the sentinel script in **redis-init.sh** to achieve this. Refer to [https://faun.pub/redis-high-availability-with-sentinel-on-kubernetes-k8s-a1d67842e0ce](https://faun.pub/redis-high-availability-with-sentinel-on-kubernetes-k8s-a1d67842e0ce).'
