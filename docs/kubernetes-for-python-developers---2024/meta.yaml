    kind: Pod\nmetadata:\n  name: nginx-with-readiness\nspec:\n  containers:\n  -\
    \ name: nginx\n    image: nginx\n    ports:\n    - containerPort: 80\n    readinessProbe:\n\
    \      httpGet: # (1)\n        path: /\n```"
