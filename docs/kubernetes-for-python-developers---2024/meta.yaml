- md: "## Github actions\n\nGitHub Actions, the automation and CI/CD platform integrated\
    \ within GitHub, provides developers with a powerful tool to automate workflows\
    \ directly from their GitHub repositories. By defining workflows for building,\
    \ testing, and deploying applications, GitHub Actions simplifies the process of\
    \ integrating continuous integration (CI) and continuous deployment (CD) practices\
    \ into the software development lifecycle.\n\n### Core Components of GitHub Actions\n\
    \n**Workflows:** A workflow is a configurable automated process composed of one\
    \ or more jobs. Defined in a YAML file within the .github/workflows directory\
    \ of a GitHub repository, workflows are triggered by specific events, such as\
    \ a push to a repository, a pull request creation, or on a scheduled basis. Each\
    \ workflow specifies the actions that should be taken, the environment it runs\
    \ in, and the conditions under which it is triggered.\n\n**Events:** Events are\
    \ specific activities that trigger workflows. GitHub Actions supports a wide range\
    \ of events, including code pushes, issue creations, pull request events, and\
    \ even external events via webhooks. Developers can specify the events that trigger\
    \ workflows, making automation highly contextual and responsive to the development\
    \ process.\n\n**Jobs:** Workflows consist of jobs, which are sets of steps that\
    \ execute on the same runner. Jobs can run sequentially or in parallel, depending\
    \ on dependencies defined within the workflow. Each job runs in a fresh instance\
    \ of the virtual environment specified by the runner.\n\n**Steps:** Steps are\
    \ individual tasks that run commands or actions within a job. A step can be either\
    \ a custom script or an action. Actions are reusable units of code that can be\
    \ shared within a repository or with the GitHub community. Developers can leverage\
    \ a vast marketplace of actions to perform common tasks, such as setting up a\
    \ development environment, running tests, or deploying code.\n\n**Runners:** Runners\
    \ are GitHub-hosted virtual machines or self-hosted environments where workflows\
    \ are executed. GitHub provides runners with different operating systems, including\
    \ Linux, Windows, and macOS. Developers can also use self-hosted runners for specialized\
    \ environments or to leverage specific hardware.\n\n### How GitHub Actions Work\n\
    \nWhen an event occurs in a GitHub repository, such as a push to the main branch,\
    \ GitHub Actions looks for workflow files that are triggered by that event. The\
    \ platform then queues jobs defined in the workflow, allocating them to available\
    \ runners based on the specified operating system and environment. Each job executes\
    \ its steps in sequence, using actions or scripts to accomplish tasks like building\
    \ the application, running tests, or deploying to a server.\n\nFeedback and logs\
    \ from running workflows are available in real time, providing visibility into\
    \ the automation process. If a step fails, the workflow can halt, send notifications,\
    \ or trigger other workflows based on failure handling defined in the workflow\
    \ file.\n\n```yaml\nname: CD # (1)\n\non:\n  push:\n    branches: [ \"main\" ]\
    \ # (2)\n\njobs: # (3)\n  build:\n    runs-on: ubuntu-latest # (4)\n    permissions:\
    \ # (5)\n      contents: read\n      packages: write\n    steps: # (6)\n     \
    \ - name: Checkout # (7)\n        uses: actions/checkout@v3\n\n      - name: Set\
    \ up Docker Buildx # (8)\n        uses: docker/setup-buildx-action@v3\n\n    \
    \  - name: Login to GitHub Container Registry # (9)\n        uses: docker/login-action@v3\n\
    \        with: # (10)\n          registry: ghcr.io\n          username: ${{ github.actor\
    \ }}\n          password: ${{ secrets.GITHUB_TOKEN }}\n\n      - name: Build and\
    \ push # (11)\n        uses: docker/build-push-action@v5\n        with:\n    \
    \      context: .\n          platforms: linux/amd64\n          file: ./Dockerfile\n\
    \          push: true\n          tags: ghcr.io/${{ github.repository }}/flask-redis:${{\
    \ github.sha }} # (12)\n          cache-from: type=gha # (13)\n          cache-to:\
    \ type=gha,mode=max # (14)\n\n      - name: Set kubernetes context # (15)\n  \
    \      uses: azure/k8s-set-context@v3\n        with:\n          method: service-account\n\
    \          k8s-url: https://72ad2064-31b4-4552-a630-c88487140b6f.k8s.ondigitalocean.com\
    \ # (16)\n          k8s-secret: ${{ secrets.KUBERNETES_SECRET }} # (17)\n\n  \
    \    - name: Install kubectl # (18)\n        uses: azure/setup-kubectl@v3\n  \
    \      id: install\n\n      - name: Deploy to the Kubernetes cluster # (19)\n\
    \        uses: azure/k8s-deploy@v4\n        with:\n          namespace: dev #\
    \ (20)\n          manifests: |\n            kubernetes/flask.yaml # (21)\n   \
    \       images: |\n            ghcr.io/badri/flask-redis-cd/flask-redis:${{ github.sha\
    \ }} # (22)\n```\n\nThis GitHub Actions workflow is designed for Continuous Deployment\
    \ (CD), specifically targeting a scenario where a Docker image is built and pushed\
    \ to the GitHub Container Registry (GHCR) upon commits to the **main** branch,\
    \ followed by a deployment to our Kubernetes cluster. Let's break down each annotated\
    \ line for clarity:\n\n(1) -> name: **CD** sets the name of the workflow. This\
    \ name appears on the GitHub repository's Actions page, helping identify the workflow's\
    \ purpose.\n\n(2) -> This section triggers the workflow on push events to the\
    \ **main** branch. It specifies that the workflow should only run when changes\
    \ are pushed to **main**.\n\n(3) -> jobs: defines a group of tasks (jobs) that\
    \ the workflow will execute. Jobs run independently of each other by default.\n\
    \n(4) -> runs-on: **ubuntu-latest** specifies that the job should run on the latest\
    \ version of Ubuntu available in GitHub Actions' virtual environments.\n\n(5)\
    \ -> permissions: explicitly sets the permissions for the GitHub token in the\
    \ workflow, limiting token access to repository contents (read-only) and package\
    \ uploads.\n\n(6) -> steps: outlines the sequential tasks or operations that the\
    \ job will perform. Each step can run commands or actions.\n\n(7) -> This step\
    \ checks out the repository code, making it available for the workflow to use.\n\
    \n(8) -> Sets up Docker Buildx, a Docker CLI plugin for extended build capabilities\
    \ with BuildKit, enhancing the building and pushing of Docker images.\n\n(9) ->\
    \ Logs into the GitHub Container Registry (GHCR) to allow subsequent steps to\
    \ push Docker images to the registry.\n\n(10) -> with: specifies the inputs to\
    \ the **docker/login-action**, including the registry URL, username, and password\
    \ (GitHub token in this case). The `${{ secrets.GITHUB_TOKEN }}` is the syntax\
    \ for accessing secrets in the pipeline. This specific secret is available by\
    \ default. This can be substituted with any other container registry.\n\n(11)\
    \ -> This step builds the Docker image from a **Dockerfile** in the repository\
    \ and pushes it to GHCR using the build-push-action.\n\n(12) -> Specifies the\
    \ tag for the Docker image to be pushed. It uses the repository path and commit\
    \ SHA for a unique identifier.\n\n(13) -> **cache-from: type=gha** enables caching\
    \ of build layers from previous runs to improve build performance.\n\n(14) ->\
    \ **cache-to: type=gha,mode=max** specifies where to store the cache from the\
    \ current build, optimizing subsequent builds.\n\n(15) -> Prepares the Kubernetes\
    \ context for deployment, configuring access to the Kubernetes cluster.\n\n(16)\
    \ -> The Kubernetes cluster API URL to which kubectl commands will be directed.\n\
    \n(17) -> The secret containing the service account token for authenticating with\
    \ the Kubernetes cluster.\n\n(18) -> Installs the kubectl command-line tool, which\
    \ is used to interact with the Kubernetes cluster.\n\n(19) -> Deploys the application\
    \ to the Kubernetes cluster using the specified manifests and images.\n\n(20)\
    \ -> namespace: **dev** specifies the Kubernetes namespace where the resources\
    \ will be deployed.\n\n(21) -> manifests: specifies the path to the Kubernetes\
    \ manifest file(s) that define the desired state of the application.\n\n(22) ->\
    \ images: specifies the Docker image(s) to be used in the deployment, allowing\
    \ the action to update the image references in the manifests."
  mdcn: "## GitHub Actions\n\nGitHub Actions 是集成在 GitHub 中的自动化与 CI/CD 平台，为开发者提供了一个强大的工具，可以直接从他们的\
    \ GitHub 仓库自动化工作流程。通过为构建、测试和部署应用程序定义工作流程，GitHub Actions 简化了将持续集成（CI）和持续部署（CD）实践融入软件开发生命周期的过程。\n\
    \n### GitHub Actions 的核心组件\n\n**工作流程：** 工作流程是一个可配置的自动化过程，由一个或多个作业组成。它在 GitHub\
    \ 仓库的 `.github/workflows` 目录中的一个 YAML 文件中定义，由特定事件触发，例如推送到仓库、创建拉取请求或按计划触发。每个工作流程指定了应采取的操作、运行环境以及触发条件。\n\
    \n**事件：** 事件是触发工作流程的特定活动。GitHub Actions 支持广泛的事件，包括代码推送、问题创建、拉取请求事件，甚至通过 Webhook\
    \ 触发的外部事件。开发者可以指定触发工作流程的事件，使自动化高度依赖上下文并能响应开发过程。\n\n**作业：** 工作流程由作业组成，作业是在同一个运行器上执行的一组步骤。作业可以按顺序或并行运行，具体取决于工作流程中定义的依赖关系。每个作业都在运行器指定的虚拟环境的新实例中运行。\n\
    \n**步骤：** 步骤是在作业中运行命令或操作的单个任务。步骤可以是自定义脚本或操作。操作是可重用的代码单元，可以在仓库内或与 GitHub 社区共享。开发者可以利用庞大的操作市场来执行常见任务，例如设置开发环境、运行测试或部署代码。\n\
    \n**运行器：** 运行器是 GitHub 托管的虚拟机或自托管环境，工作流程在其中执行。GitHub 提供了不同操作系统的运行器，包括 Linux、Windows\
    \ 和 macOS。开发者也可以使用自托管运行器来适应特定环境或利用特定硬件。\n\n### GitHub Actions 的工作原理\n\n当 GitHub\
    \ 仓库中发生事件时，例如推送到主分支，GitHub Actions 会查找由该事件触发的工作流程文件。然后，平台会将工作流程中定义的作业加入队列，并根据指定的操作系统和环境将它们分配给可用的运行器。每个作业按顺序执行其步骤，使用操作或脚本来完成构建应用程序、运行测试或部署到服务器等任务。\n\
    \n运行中的工作流程的反馈和日志可以实时查看，提供了对自动化过程的可见性。如果某个步骤失败，工作流程可以停止、发送通知，或者根据工作流程文件中定义的失败处理逻辑触发其他工作流程。\n\
    \n```yaml\nname: CD # (1)\n\non:\n  push:\n    branches: [ \"main\" ] # (2)\n\n\
    jobs: # (3)\n  build:\n    runs-on: ubuntu-latest # (4)\n    permissions: # (5)\n\
    \      contents: read\n      packages: write\n    steps: # (6)\n      - name:\
    \ Checkout # (7)\n        uses: actions/checkout@v3\n\n      - name: Set up Docker\
    \ Buildx # (8)\n        uses: docker/setup-buildx-action@v3\n\n      - name: Login\
    \ to GitHub Container Registry # (9)\n        uses: docker/login-action@v3\n \
    \       with: # (10)\n          registry: ghcr.io\n          username: ${{ github.actor\
    \ }}\n          password: ${{ secrets.GITHUB_TOKEN }}\n\n      - name: Build and\
    \ push # (11)\n        uses: docker/build-push-action@v5\n        with:\n    \
    \      context: .\n          platforms: linux/amd64\n          file: ./Dockerfile\n\
    \          push: true\n          tags: ghcr.io/${{ github.repository }}/flask-redis:${{\
