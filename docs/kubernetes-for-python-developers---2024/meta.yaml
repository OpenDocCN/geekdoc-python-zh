    # Ingress controllers


    If we are creating ingresses for a lot of services in our cluster, then it starts
    becoming cumbersome, as we have to identify the node port and IP for each service.
    We can''t use external loadbalancer IP for each service as IP is a scarce resource.
    To tackle this problem, we have the concept of ingress controllers.'
  merge: -1
  pgno: 365
- img_proc: true
  md: 'An ingress controller serves as the bridge between Kubernetes services and
    the outside world. It offers a centralized, efficient way to manage routing, SSL
    termination, and load balancing for HTTP(S) traffic, making it easier to expose
    and securely access applications running in Kubernetes.


    The Ingress Controller continuously monitors the Kubernetes API server for new,
    updated, or deleted Ingress resources. It reads the specifications of these Ingress
    resources, which contain rules for routing external traffic to services within
    the cluster.


    Based on the rules defined in Ingress resources, the Ingress Controller acts as
    a reverse proxy or load balancer. It listens for incoming HTTP(S) traffic on predefined
    or dynamically allocated IP addresses and ports.


    When an external request is received, the Ingress Controller inspects the request''s
    headers (e.g., **Host**) and path to determine how it should be routed according
    to the Ingress rules. The Controller then forwards the request to the appropriate
    backend service(s) within the cluster, based on the matching Ingress rule.


    In addition to this, Ingress Controllers can manage SSL/TLS termination for the
    services in the cluster. This means that the Ingress Controller decrypts incoming
    HTTPS traffic and then forwards it as HTTP to the backend services, offloading
    the SSL/TLS workload from the services themselves.


    Beyond basic routing, Ingress Controllers can offer advanced features like URL
    rewriting, sticky sessions, WebSockets support, rate limiting, and integration
    with authentication and authorization services.


    Let''s install nginx ingress controller, a popular ingress controller in our cluster.


    ```

    $ kubectl apply -f https://raw.githubusercontent.com/kubernetes/ingress-nginx/controller-v1.10.0/deploy/static/provider/cloud/deploy.yaml

    namespace/ingress-nginx created

    ```'
