    \ Kubernetes API 交互。结合 RBAC，我们可以定义细粒度的访问控制策略，以限制用户或服务账户可以执行的操作，确保我们集群的操作是安全且管理良好的。\n\
    \n**Ingress** 是我们将涵盖的另一个关键概念。它为集群内的服务提供 HTTP 和 HTTPS 路由，允许外部流量到达在 Kubernetes 中运行的应用程序。理解\
    \ Ingress 对于以受控且高效的方式将您的服务暴露给外界至关重要。\n\n在本章中，我们将看到这些高级功能如何相互作用，为在 Kubernetes 中部署和管理应用程序提供一个健壮、安全且可扩展的平台。在本章结束时，您将更深入地了解如何利用\
    \ Kubernetes 满足复杂现实应用程序的需求，确保它们安全、可扩展且可维护。\n\n### Redis 作为有状态集\n\n让我们以之前章节中实现的\
    \ Redis 缓存为例。我们决定使其更具弹性，并将副本数增加到 2。我们遇到了以下问题：\n\n```\n$ kubectl describe pod cache-77dd5d666f-scrrl\
    \ -n robust-setup\n...\nEvents:\n  Type    Reason     Age   From             \
    \  Message\n  ----    ------     ----  ----               -------\n  Normal  Scheduled\
    \  62s   default-scheduler  Successfully assigned robust-setup/cache-77dd5d666f-scrrl\
    \ to first-cluster-default-pool-oeo8s\n  Warning FailedAttachVolume  56s   attachdetach-controller\
    \  Multi-Attach error for volume \"pvc-cb035503-13c4-4740-9262-7e65837999cd\"\
    \ Volume is already used by pod(s) cache-77dd5d666f-2d8t2\n```\n\n我们的 PVC **cache**\
    \ 配置为 **ReadWriteOnce**，这意味着第一个启动的 Pod 会挂载该卷，而第二个 Pod 无法启动，因为它无法挂载已经挂载到第一个 Pod\
    \ 的卷。\n\n我们可以将卷配置为 **ReadWriteMany** 访问模式，但 Digitalocean Kubernetes 的存储策略不允许我们创建此类卷，至少开箱即用不支持。在我们朝那个方向努力之前，让我们讨论一下\
    \ Redis 以及通常情况下，大多数有状态应用程序在扩缩容时是如何工作的。\n\n无状态应用程序不内部存储数据或会话信息。处理所需的任何状态或数据通常在每个请求中提供，响应生成不依赖于存储的数据。在\
    \ Kubernetes 中扩缩容无状态应用程序相对简单。您可以增加或减少 Pod 副本的数量，而无需担心数据持久性或同步问题，因为每个实例都是独立且相同的。\n\
    \n示例：nginx 部署被认为是无状态的，因为它不需要在请求之间记住有关客户端会话的信息。即使是 Flask hello world 和 redis 页面计数应用程序也是无状态的。**请注意**，尽管页面计数在每次访问页面时都会递增，但页面计数应用程序仍被认为是无状态的。这是因为页面计数并非直接存储在该应用程序中，而是从\
    \ Redis 缓存中获取的。\n\n有状态应用程序保存交互过程中生成的数据，并依赖这些数据进行未来的事务处理。扩缩容有状态应用程序更为复杂。它需要仔细管理数据持久性、复制和一致性。\n\
    \n示例：Redis 缓存部署是有状态的。\n\nRedis 主从架构是在 Redis 部署中实现数据复制和高可用性的一种方法。它是 Redis 能够水平扩展并为存储数据提供容错能力的基础部分。以下是其工作原理的概述：\n\
    \n### 组件\n\n**主节点：** 主节点是接收所有写操作的主节点。它保存原始数据集，并负责处理客户端请求，包括读和写。主节点还将更改复制到一个或多个从节点。\n\
    \n**从节点：** 从节点是主节点的副本。它们连接到主节点以执行初始同步（从主节点复制整个数据集），随后在发生更改时从主节点接收更新。从节点可以接受读请求，以分担读负载并提高系统的读吞吐量。在主节点发生故障时，可以将从节点提升为新的主节点，从而确保服务的可用性。\n\
    \n### 复制过程\n\n**初始同步：** 当从节点连接到主节点时，它会启动一个同步过程。主节点创建其当前数据集的快照并将其发送给从节点。从节点将此快照加载到其内存中，有效地克隆了主节点的数据集。\n\
    \n**命令传播：** 初始同步后，主节点继续将所有写命令传播到已连接的从节点。这确保了对主节点所做的所有更改都会在从节点上镜像，从而保持主节点及其所有副本之间数据集的一致性。\n\
    \n**部分重新同步：** 如果从节点暂时与主节点失去连接，但在主节点缓冲区耗尽之前重新连接，它可以请求部分重新同步。然后主节点仅发送断开连接期间发生的更改，从而避免了完整数据集传输的需要。\n\
    \n通过将数据从主节点复制到一个或多个从节点，Redis 确保即使在硬件故障或网络问题的情况下数据也不会丢失，并且它支持跨多个节点扩展读操作。\n\n这表明每个\
    \ redis 实例（主节点或从节点）都需要有自己的持久卷来存储数据。现在共享同一个 PVC 是不可能的了。\n\n### 临时 Pod 身份的问题\n\n\
    Deployment 中的每个 Pod 都是可互换的，没有稳定的网络身份或存储。当 Pod 被终止并替换时（这可能在扩缩容操作、更新或节点故障期间发生），新\
    \ Pod 被视为一个全新的实例。即使 PVC 确保了数据在单个 Pod 生命周期之外的持久性，新 Pod 也可能不会重新挂载到与旧 Pod 相同的持久卷（PV），特别是当\
    \ Deployment 扩展到多个副本时。这可能导致数据不一致或丢失，因为新 Pod 可能以空数据集或过时的数据快照启动。\n\n### 没有有序、优雅的扩缩容或更新\n\
    \nDeployment 不保证 Pod 启动、停止或更新的顺序。对于通常依赖主从架构进行复制和高可用性的 Redis 来说，这可能会破坏复制拓扑。例如，主实例可能在新的副本完全同步之前被终止，从而导致潜在的数据丢失或服务中断。"
