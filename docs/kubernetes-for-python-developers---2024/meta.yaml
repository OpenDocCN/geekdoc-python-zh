  md: '# # Kubeconfig


    Kubeconfig, in simple terms, is like a keychain that holds the keys and directions
    needed to access and communicate with your Kubernetes clusters. Imagine you have
    several keys to different houses (clusters), and each house has its own security
    system (authentication method). The kubeconfig file keeps track of all these keys
    and the addresses for the houses, so you know which key opens which house and
    how to get there. When you use the kubectl command, it looks at your kubeconfig
    to figure out which cluster you''re trying to talk to and which key (credentials)
    to use for that conversation. It''s essentially a configuration file that makes
    managing and switching between different Kubernetes clusters and their access
    details a breeze, ensuring you''re always talking to the right cluster with the
    right access permissions.


    Assuming you''re already logged into your Digitalocean account, you can download
    the kubeconfig of the cluster you created.


    ```

    $ doctl kubernetes cluster kubeconfig save first-cluster

    ```


    ![](img/91c4bde832e221ba5bc429caf9587286_83_0.png)


    *Save kubeconfig of the cluster locally*


    **first-cluster** is the name of the cluster you created previously.'
