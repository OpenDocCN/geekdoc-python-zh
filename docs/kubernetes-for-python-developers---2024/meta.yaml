- md: "## Exercise 14: Print the port number\n\nPrint the port number of the 2nd container\
    \ in the twin bitnami nginx-es pod.\n\n### Solution\n\n```\n$ kubectl exec two-containers-better\
    \ -c nginx-container-2 -- sh -c 'echo $NGINX_HTTP_PORT_NUMBER'\n```\n\n## Exercise\
    \ 15: Deploy nginx pod in a new namespace\n\nCreate a new namespace **python-dev**\
    \ and deploy an nginx pod in that namespace. Try 2 variations:\na. Specify the\
    \ namespace in the command-line.\nb. Specify the namespace in the pod YAML.\n\
    Now, try deploying a pod with **python-dev** namespace specified in the YAML and\
    \ a different namespace(**development**) specified in the command-line. See what\
    \ happens.\n\n### Solution\n\n```\n$ kubectl create namespace python-dev\n\n$\
    \ kubectl apply -f nginx-pod.yaml -n python-dev # (a)\n```\n\n```\n$ kubectl apply\
    \ -f nginx-pod.yaml # (b) assuming \"namespace: python-dev\" is there in metadata\
    \ section\n```\n\nBoth (a) and (b) will work as expected.\n\nThe last part will\
    \ error out as Kubernetes tries to take the namespace YAML spec at a higher priority\
    \ than CLI namespace flag.\n\n## Exercise 16: Delete a namespace\n\nDelete the\
    \ **python-dev** namespace created above. Find out what happened to the nginx\
    \ pod deployed in the namespace once the namespace is deleted.\n\n### Solution\n\
    \n```\n$ kubectl delete namespace python-dev\n```\n\nWhen a Kubernetes namespace\
    \ is deleted, all the resources associated with that namespace, including pods,\
    \ services, deployments, and others, are also deleted. Namespaces are a way to\
    \ partition cluster resources between multiple users and projects. They provide\
    \ a scope for names and a mechanism to attach authorization and policy to a subsection\
    \ of the cluster.\n\n## Exercise 17: Same IP or different IP?\n\nDo the same curl\
    \ exercise and try to hit both the containers from the twin-nginx pod. Will the\
    \ IP be different for each container, or will it be the same?\n\n### Solution\n\
    \nThe IP of all the containers inside a pod will be the same, i.e. the pod IP.\
    \ Containers in a pod share the same IP and port space.\n\n## Exercise 18: Deploy\
    \ a pod by specifying a different tag\n\nDeploy your flask/nginx container by\
    \ specifying a different tag in the pod YAML manifest.\n\n### Solution\n\nChange\
    \ the tag in the **image** section after the \":\" and do a kubectl apply.\n\n\
    ## Exercise 19: Deploy a pod by specifying image SHA digest.\n\nDeploy your flask\
    \ container by specifying the image's SHA digest in the pod YAML manifest.\n\n\
    ### Solution\n\nChange the **image** value to point to your image SHA.\n\n```\n\
    apiVersion: v1\nkind: Pod\nmetadata:\n  name: simple-flask\n  labels:\n    app:\
    \ simple-flask\nspec:\n  containers:\n  - name: flask\n    image: ghcr.io/badri/flask-app@sha256:<sha>\n\
    \    imagePullPolicy: Always\n    env:\n    - name: PORT\n      value: \"8080\"\
    \n    ports:\n    - containerPort: 8080\n```\n\n## Exercise 20: Create a deployment\
    \ for nginx using the recreate strategy.\n\nObserve the events and confirm that\
    \ all the old pods are deleted simultaneously and newer pods are recreated after\
    \ that, again simultaneously.\n\n### Solution\n\nChange the .spec.strategy.type\
    \ to Recreate .\n\n```\napiVersion: apps/v1\nkind: Deployment\nmetadata:\n  name:\
    \ nginx-deployment\nspec:\n  replicas: 3\n  strategy:\n    type: Recreate\n  selector:\n\
    \    matchLabels:\n      app: nginx\n  template:\n    metadata:\n      labels:\n\
