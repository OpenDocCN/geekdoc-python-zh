    \ granting only the permissions necessary for common tasks and roles within the\
    \ cluster. This helps simplify RBAC setup and ensures a higher level of security\
    \ by default.\n\n# Spreading your pods across nodes\n\nImagine a scenario where\
    \ your cluster hosts multiple applications in a microservices architecture, with\
    \ several nodes accommodating your application pods. While the scheduler ensures\
    \ that your pods are placed on nodes that are healthy and have adequate resources,\
    \ it does not consider the distribution of those pods in the nodes.\n\nThere is\
    \ a good chance that pods belonging to a specific deployment are all scheduled\
    \ on a single node. The obvious problem with this situation is, when that node\
    \ goes down, your users experience downtime as there are no pods available to\
