    ## 运行失败


    刚才发生了什么？我的端口现在是空闲的，但我仍然无法访问应用程序。这是因为 Flask 在**容器内部**的 127.0.0.1 上运行它。当我在主机的浏览器中访问
    localhost 时，它被解析为主机的 127.0.0.1。


    默认的 flask run 命令启动 Flask 开发服务器，并且仅在回环接口（127.0.0.1 或 localhost）上监听连接。出于安全原因，此行为是有意为之的，因为它将服务器的访问限制为仅来自运行
    Flask 应用程序的同一台机器的请求。当在 Docker 容器内运行 Flask 时，该容器被视为具有自己网络接口集的独立机器。因此，当 Flask 仅在容器内的
    127.0.0.1 上监听时，它无法接收来自主机或任何其他机器的请求，因为这些请求并非来自容器的 localhost。


    要允许 Flask 应用程序接受来自主机 localhost（或其他机器）的请求，您需要告诉 Flask 在所有网络接口上监听。这可以通过在启动 Flask
    服务器时将 –host 选项设置为 0.0.0.0 来实现：


    ```

    $ flask run --host=0.0.0.0

    ```


    通过绑定到 0.0.0.0，您是在指示 Flask 开发服务器在 Docker 容器可用的所有网络接口上接受请求，这包括 Docker 主机。这样，当您使用
    Docker 的端口映射功能将 Docker 容器的端口映射到主机上的端口时，发送到主机 IP 地址上映射端口的请求将被成功转发到容器内的 Flask 应用程序。


    让我们进行此更改，并使端口可配置。


    我们将添加一个新文件 **entrypoint.sh**。


    ```

    #!/bin/sh


    exec flask run -h 0.0.0.0 -p $PORT

    ```


    这是一个 shell 脚本，用于在监听所有网络接口的同时运行 flask，并在 **$PORT** 环境变量指定的端口上运行它。


    为什么不运行类似这样的命令？


    ```

    CMD ["flask", "run", "-h", "0.0.0.0", "-p", "$PORT"]

    ```


    这在启动容器时不会评估 **$PORT** 变量。此外，我们在 shell 脚本中使用 **exec** 运行它，以便我们用于终止容器的 **Ctrl+C**
    信号能被正确解释。


    我们还对 Dockerfile 进行了以下更改：


    ```

    COPY entrypoint.sh /entrypoint.sh # (1)

    RUN chmod +x /entrypoint.sh


    COPY . . # (2)


    ENTRYPOINT ["/entrypoint.sh"] # (3)

    ```


    (1) -> 将 entrypoint.sh 文件复制到容器内部。（否则我们无法运行它 :)）。同时，赋予其执行权限。(2) -> 注意 **COPY**
    命令已移至此步骤下方。这是为了确保我们在构建容器时利用层缓存功能。(3) -> 最后，我们运行 **entrypoint.sh** 脚本。


    ## ENTRYPOINT 和 CMD 的区别


    **ENTRYPOINT** 和 **CMD** 都是 Dockerfile 指令，用于指定 Docker 容器启动时将执行的默认命令。然而，它们的用途不同，使用方式也略有差异。


    **ENTRYPOINT** 设置容器启动时将运行的可执行文件。它旨在设置容器的主命令，允许该容器像该命令或应用程序一样运行。


    如果使用了 **ENTRYPOINT**，任何传递给 **docker run <image>** 的命令和参数都将作为参数附加到 **ENTRYPOINT**。


    **示例：** 考虑一个设计用于运行 Python 脚本作为其主要目的的 Dockerfile：


    ```

    FROM python:3.10

    COPY . /app

    WORKDIR /app

    ENTRYPOINT ["python", "myscript.py"]

    ```


    在这种情况下，运行 **docker run myimage** 将在容器中执行 **python myscript.py**。如果您在 **myimage**
    后添加参数，它们将被传递给 **myscript.py**。


    **CMD** 指定仅在未向 **docker run <image>** 提供参数时执行的默认命令和/或参数。如果您在 **docker run <image>**
    中的镜像名称后指定命令，该命令将覆盖 **CMD** 指令。


    **示例：** 使用 **CMD** 为脚本提供默认参数，或提供默认命令：


    ```

    FROM ubuntu

    CMD ["echo", "Hello, Docker!"]

    ```


    运行 **docker run myimage** 将打印 "**Hello, Docker!**"，因为未指定命令，所以执行 **CMD**。但是，如果您运行
    **docker run myimage echo "Another command"**，**CMD** 将被覆盖，转而打印 "**Another command**"。


    ## 结合使用 ENTRYPOINT 和 CMD


    它们可以一起使用，以提供一个充当可执行文件并允许覆盖默认参数的容器。**ENTRYPOINT** 定义可执行文件，**CMD** 提供默认参数。


    ```

    FROM ubuntu


    ENTRYPOINT ["echo"]


    CMD ["Hello, Docker!"]

    ```


    运行不带任何额外参数的 **docker run myimage** 将打印 "**Hello, Docker!**"，因为 **CMD** 为 **ENTRYPOINT**
    提供了默认参数。


    运行 **docker run myimage "Another message"** 将覆盖 **CMD**，转而打印 "**Another message**"。


    这种组合既提供了灵活性，又可以控制容器默认执行的内容以及如何在运行时进行自定义。


    现在，有了这些新的更改，让我们重新构建容器。


    ```

    $ docker build -t flask-app .

    ```


    并运行它。


    ```

    $ docker run -e PORT=8080 --publish 8080:8080 flask-app

    * Debug mode: off

    WARNING: This is a development server. Do not use it in a production deployment.
    Use a production WSGI server

    ```'
