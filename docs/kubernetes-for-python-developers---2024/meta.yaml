    At the time of writing this, the latest stable version of Kubernetes is 1.29.
    Kubernetes versions are expressed as x.y.z, where x is the major version, y is
    the minor version, and z is the patch version, following Semantic Versioning terminology.


    The Kubernetes project maintains release branches for the most recent three minor
    releases, ex: 1.29, 1.28 and 1.27 in our case. It is not mandatory to upgrade/downgrade
    kubectl to use a newer/older version of Kubernetes.'
