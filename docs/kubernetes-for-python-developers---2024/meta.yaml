    TLDR; Kubernetes allows * in roles, use it sparingly.


    There are cases where we want to give cluster-wide access to certain resources,
    instead of restricting it to a namespace. This calls for a separate class of resource
    called **ClusterRole**. The are the same as **Role**, but the cluster-wide counterpart
    of roles. Because they are cluster-wise, they are not scoped by any namespace.


    A **ClusterRole** can be associated with a service account primarily via a **ClusterRoleBinding**.
    While **ClusterRole** defines permissions across the entire cluster, the **ClusterRoleBinding**
    is what grants those permissions to a user, group, or service account at the cluster
    level.


    Kubernetes comes with several built-in **ClusterRoles** and **Roles** that are
    predefined and offer common sets of permissions for various cluster operations.
    These built-in roles are designed to simplify the management of access control
    by providing ready-to-use sets of permissions that cover common use cases for
    interacting with Kubernetes resources.


    Some of the notable built-in ClusterRoles include:


    **cluster-admin:** Grants super-user access to perform any action on any resource.
    It gives full control over every resource in the cluster and all namespaces.


    **admin:** Allows admin access, intended to be granted within a namespace using
    a RoleBinding. It allows read/write access to most resources in a namespace, including
    the ability to create roles and role bindings within the namespace. It does not
    allow write access to resource quota or to the namespace itself.'
