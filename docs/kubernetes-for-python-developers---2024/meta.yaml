    # Exercise 15: Deploy nginx pod in a new namespace


    Create a new namespace **python-dev** and deploy an nginx pod in that namespace.
    Try 2 variations:


    +   a. Specify the namespace in the command-line.

    b. Specify the namespace in the pod YAML.


    Now, try deploying a pod with **python-dev** namespace specified in the YAML and
    a different namespace(**development**) specified in the command-line. See what
    happens.


    # Exercise 16: Delete a namespace


    Delete the **python-dev** namespace created above. Find out what happened to the
    nginx pod deployed in the namespace once the namespace is deleted.


    # Pod networking


    Pod networking in Kubernetes is designed to allow Pods to communicate with each
    other and the outside world in a consistent and predictable manner. Kubernetes
    imposes a fundamental set of networking requirements to ensure seamless interaction
    across the cluster:


    +   1. All Pods can communicate with all other Pods without NAT (Network Address
    Translation).

    2. All nodes can communicate with all Pods without NAT.

    3. The IP that a Pod sees itself as is the same IP that others see it as.'
  - '[PAGE 147]


    To meet these requirements, Kubernetes adopts a flat network model where each
    Pod is assigned a unique IP address. This design simplifies the network configuration
    and allows for direct communication between Pods, regardless of their host nodes.
    Here''s a closer look at how pod networking is facilitated:


    # CNI (Container Network Interface)


    Kubernetes uses CNI plugins to set up Pod networking. When a Pod is created, the
    Kubernetes kubelet invokes the configured CNI plugin to allocate an IP address
    to the Pod and set up the network routes to ensure compliance with the Kubernetes
    networking model. There are many CNI plugins available, such as Calico, Flannel,
    Weave Net, and Cilium, each offering different features and capabilities.


    # Pod-to-Pod Communication


    Since each Pod gets a unique IP address within the cluster''s network, Pods can
    communicate with each other directly using this IP address. The routing rules
    set up by the CNI plugin ensure that packets sent from one Pod to another reach
    their destination, regardless of the nodes on which the Pods are running.


    # Node-to-Pod Communication


    Nodes can communicate with Pods using the Pod''s IP address. This is facilitated
    by route rules that direct traffic destined for a Pod''s IP to the appropriate
    node. Once the traffic reaches the node, additional rules route the traffic to
    the correct Pod.


    # External-to-Pod Communication


    To allow communication from outside the cluster to Pods, Kubernetes provides a
    resource called Services. We will do a more detailed take on services in the next
    chapter.'
- md: "## Pod-to-External Communication\n\nPods can communicate with external entities\
    \ by routing their traffic through the node where they are running. Egress rules\
    \ can be configured to allow outbound connections to the internet or other networks.\n\
    \n## Network Policies\n\nKubernetes allows administrators to control the flow\
    \ of traffic at the IP address or port level using network policies. This provides\
    \ a way to restrict connections to and from Pods according to specific requirements.\
    \ This is an advanced concept which we won't deal with in this book, but it's\
    \ good to know.\n\n## Pod networking example\n\nTo demonstrate pod networking\
    \ in Kubernetes with an example involving an Nginx pod and a curl pod, we'll go\
    \ through the steps to set up both pods, ensuring the curl pod can communicate\
    \ with the Nginx pod using Kubernetes networking. Assuming you are running the\
    \ nginx pod already, let's get the IP of the nginx pod.\n\n```\n$ kubectl get\
    \ pod -o wide\nNAME           READY   STATUS             RESTARTS   AGE   IP \
    \           NODE                            NOMINATED NODE   READINESS GATES\n\
    bash-sleep     0/1     CrashLoopBackOff   296        25h   10.244.1.126  first-cluster-default-pool-oeo85\
    \   <none>           <none>\nnginx          1/1     Running            0     \
    \     29h   10.244.0.146  first-cluster-default-pool-oeo8s   <none>          \
    \ <none>\nnginx-201      1/1     Running            0          20h   10.244.0.204\
    \  first-cluster-default-pool-oeo8s   <none>           <none>\ntwo-containers\
    \     1/2     CrashLoopBackOff   286 (4m3s ago)   24h   10.244.0.117   first-cluster-default-pool-oeo8k\
    \   <none>           <none>\ntwo-containers-better   2/2     Running         \
    \   0                24h   10.244.0.178   first-cluster-default-pool-oeo8s   <none>\
    \           <none>\n```\n\nThis command shows more information, like IPs, what\
    \ node the pod is running in etc. As we can see from the output of this command,\
    \ the nginx node IP is **10.244.0.146**.\n\nWe will deploy a curl pod now.\n\n\
    ```\napiVersion: v1\nkind: Pod\nmetadata:\n  name: curl-pod\nspec:\n  containers:\n\
    \  - name: curl-container\n    image: curlimages/curl # (1)\n    command: [ \"\
    sleep\", \"infinity\" ] # (2)\n```\n\n(1) -> The **curlimages/curl** is a public\
    \ container image which ships with curl.\n\n(2) -> The above image doesn't have\
    \ a default command. So, the pod will crash if we try to run it. To keep the lights\
    \ on, we run **sleep infinity**.\n\nLet's create the pod and get inside the pod.\n\
    \n```\n$ kubectl apply -f curl-pod.yaml\npod/curl-pod created\n```\n\n```\n# After\
    \ a minute ...\n```\n\n```\n$ kubectl exec -it curl-pod -- sh # (1)\n~ $ curl\
    \ http://10.244.0.146 # (2)\n<!DOCTYPE html>\n<html>\n<head>\n<title>Welcome to\
    \ nginx!</title>\n<style>\nhtml { color-scheme: light dark; }\nbody { width: 35em;\
    \ margin: 0 auto;\nfont-family: Tahoma, Verdana, Arial, sans-serif; }\n</style>\n\
    </head>\n<body>\n<h1>Welcome to nginx!</h1>\n<p>If you see this page, the nginx\
    \ web server is successfully installed and\nworking. Further configuration is\
    \ required.</p>\n<p>For online documentation and support please refer to\n<a href=\"\
    http://nginx.org/\">nginx.org</a>.<br/>\nCommercial support is available at\n\
    <a href=\"http://nginx.com/\">nginx.com</a>.</p>\n\n<p><em>Thank you for using\
    \ nginx.</em></p>\n</body>\n</html>\n~ $\n```\n\n(1) -> We exec into the pod using\
    \ sh.(This curl image doesn't have bash).\n\n(2) -> We ran a curl with the IP\
    \ of the nginx pod and got the default nginx index page.\n\n## Exercise 17\n\n\
    Do the same curl exercise and try to hit both the containers from the twin-nginx\
    \ pod. Will the IP be different for each container, or will it be the same?\n\n\
    ## Deploy the flask application\n\nBy this point, you know enough kubernetes to\
    \ deploy a simple flask application in Kubertnes, and that's exactly we will be\
    \ doing now. Remember the container image **flask-app** we built in an earlier\
    \ chapter? We will use that image and deploy a pod out of it.\n\nWe built and\
    \ pushed the container image to ghcr registry. Let's construct a pod manifest.\n\
    \n```\napiVersion: v1\nkind: Pod\nmetadata:\n  name: simple-flask\n  labels:\n\
    \    app: simple-flask # (1)\nspec:\n  containers:\n  - name: flask # (2)\n  \
    \  image: ghcr.io/badri/flask-app:1.0 # (3)\n    env:\n    - name: PORT # (4)\n\
    \      value: \"8080\"\n    ports:\n    - containerPort: 8080 # (5)\n```\n\n(1)\
    \ -> The label of the pod. We're giving ourselves some creative freedom here.\n\
    \n(2) -> The name of the container. We will run only 1 container.\n\n(3) -> The\
    \ image registry name with tags. Even if you're a casual observer, you will notice\
    \ that we didn't use this image pattern for all our previous pods. This is a convention\
    \ in the Kubernetes world. The syntax for an image is:\n\n```\n<registry-url>:<optional-port>/<image-namespace>/<image-name>:<optional-tag>\n\
    ```\n\nLet's break it down.\n\n**registry-url** indicates the registry URL where\
    \ the container images are stored. If this is not given, it is assumed to be the\
    \ Dockerhub registry URL, **docker.io**.\n\n**optional-port** sometimes, registries\
    \ operate out of a different port, like **5000**. If this is the case, then we\
    \ need to specify the port explicitly. Otherwise, it is assumed to be **443**.\n\
    \n**image-namespace** is a way to organize multiple container images in a container\
    \ registry. Think of it like a folder or a directory in your operating system.\
    \ If your registry is used by multiple teams (which is usually the case), there\
    \ will be a **team-a** image namespace and a **team-b** image namespace. **Note**\
    \ that this is not to be confused with kubernetes namespaces, which is an entirely\
    \ different thing. For the curl pod, **curlimages** is the image namespace. For\
    \ nginx, this will be **library**, as it belongs to Dockerhub's official library\
    \ of commonly used container images.\n\n**image-name** the image name. Enough\
    \ said!\n\n**optional-tag** The tag of the image. For our flask app, it is **1.0**.\
    \ If no tag is specified, the latest tag is pulled. We will learn why not specifying\
    \ tags is a bad practice later.\n\nA couple of examples to reinforce this convention.\n\
    \n**nginx** translates to **docker.io:443/library/nginx:latest**.\n\n**curlimages/curl**\
    \ translates to **docker.io:443/curlimages/curl:latest**.\n\nLet's now deploy\
    \ this pod already.\n\n```\n$ kubectl apply -f simple-flask-pod.yaml\npod/simple-flask\
    \ created\n```\n\n```\n# After a few seconds ...\n```\n\n```\n$ kubectl get pod\
    \ simple-flask\nNAME            READY   STATUS             RESTARTS   AGE\nsimple-flask\
    \    0/1     ImagePullBackOff   0          27s\n```\n\nWe got us a new error,\
    \ **ImagePullBackOff**. Let's dig deep and find out what that means.\n\n```\n\
    $ kubectl describe pod simple-flask\n...\nEvents:\n  Type    Reason     Age  \
    \              From               Message\n  ----    ------     ----         \
    \      ----               -------\n  Normal  Scheduled  49s                default-scheduler\
    \  Successfully assigned default/simple-flask to first-cluster-default-pool-oeo85\n\
    \  Normal  BackOff    21s (x2 over 47s)  kubelet            Back-off pulling image\
    \ \"ghcr.io/badri/flask-app:1.0\"\n  Warning Failed     21s (x2 over 47s)  kubelet\
    \            Error: ImagePullBackOff\n  Normal  Pulling    9s (x3 over 48s)  \
    \ kubelet            Pulling image \"ghcr.io/badri/flask-app:1.0\"\n  Warning\
    \ Failed     9s (x3 over 48s)   kubelet            Failed to pull image \"ghcr.io/badri/flask-app:1.0\"\
    : failed to pull and unpack image \"ghcr.io/badri/flask-app:1.0\": failed to resolve\
    \ reference \"ghcr.io/badri/flask-app:1.0\": failed to authorize: failed to fetch\
    \ anonymous token: unexpected status from GET request to https://ghcr.io/token?scope=repository%3Abadri%2Fflask-app%3Apull&service=ghcr.io:\
    \ 401 Unauthorized\n  Warning Failed     9s (x3 over 48s)   kubelet          \
    \  Error: ErrImagePull\n```\n\nThe kubelet in node **first-cluster-default-pool-oeo85**\
    \ tries to pull the **ghcr.io/badri/flask-app:1.0** image from ghcr's registry,\
    \ but it gets a 401 unauthorized response from the registry. Hence, it fails saying,\
    \ \"I can't bring up the pod, because I can't pull that image from the registry\
    \ you gave me\".\n\nWhen we published the image to ghcr registry, we did so as\
    \ a private image. So, it can't be pulled and used without authentication. We\
    \ can either give authentication credentials to the kubelet, or we can make the\
    \ image public. The former, we will see how to do that in the next chapter. For\
    \ now, we will make the image public.\n\nVisit **https://github.com/users/<your-user-name>/packages/container/package/flask-app/settings**,\
    \ assuming you published the image as **flask-app**, scroll down to \"Danger Zone\"\
    , and click on \"Change visibility\".\nChange the visibility of the package to\
    \ \"Public\".\nNow, let's take down the pod and redeploy it.\n\n```\n$ kubectl\
    \ delete pod simple-flask\npod \"simple-flask\" deleted\n\n# recreate ..\n\n$\
    \ kubectl apply -f simple-flask.yaml\npod/simple-flask created\n```\n\nWe can\
    \ see that the image gets pulled successfully now, as it is a public image."
  mdcn: "## Pod到外部的通信\n\nPod可以通过其运行所在节点的路由与外部实体通信。可以配置出站规则，以允许连接到互联网或其他网络的出站连接。\n\n\
    ## 网络策略\n\nKubernetes允许管理员使用网络策略在IP地址或端口级别控制流量。这提供了一种根据特定要求限制Pod进出连接的方法。这是一个高级概念，我们不会在本书中深入探讨，但了解它很有好处。\n\
    \n## Pod网络示例\n\n为了通过一个涉及Nginx Pod和curl Pod的示例来演示Kubernetes中的Pod网络，我们将逐步设置这两个Pod，确保curl\
    \ Pod能够使用Kubernetes网络与Nginx Pod通信。假设你已经运行了nginx Pod，让我们获取nginx Pod的IP地址。\n\n```\n\
    $ kubectl get pod -o wide\nNAME           READY   STATUS             RESTARTS\
    \   AGE   IP            NODE                            NOMINATED NODE   READINESS\
    \ GATES\nbash-sleep     0/1     CrashLoopBackOff   296        25h   10.244.1.126\
    \  first-cluster-default-pool-oeo85   <none>           <none>\nnginx         \
    \ 1/1     Running            0          29h   10.244.0.146  first-cluster-default-pool-oeo8s\
    \   <none>           <none>\nnginx-201      1/1     Running            0     \
    \     20h   10.244.0.204  first-cluster-default-pool-oeo8s   <none>          \
    \ <none>\ntwo-containers     1/2     CrashLoopBackOff   286 (4m3s ago)   24h \
    \  10.244.0.117   first-cluster-default-pool-oeo8k   <none>           <none>\n\
    two-containers-better   2/2     Running            0                24h   10.244.0.178\
    \   first-cluster-default-pool-oeo8s   <none>           <none>\n```\n\n此命令显示更多信息，例如IP地址、Pod运行所在的节点等。从该命令的输出中我们可以看到，nginx节点的IP是**10.244.0.146**。\n\
    \n我们现在将部署一个curl Pod。\n\n```\napiVersion: v1\nkind: Pod\nmetadata:\n  name: curl-pod\n\
    spec:\n  containers:\n  - name: curl-container\n    image: curlimages/curl # (1)\n\
    \    command: [ \"sleep\", \"infinity\" ] # (2)\n```\n\n(1) -> **curlimages/curl**是一个公共容器镜像，自带curl。\n\
    \n(2) -> 上述镜像没有默认命令。因此，如果我们尝试运行它，Pod将会崩溃。为了保持运行，我们执行**sleep infinity**。\n\n让我们创建Pod并进入Pod内部。\n\
    \n```\n$ kubectl apply -f curl-pod.yaml\npod/curl-pod created\n```\n\n```\n# 一分钟后\
    \ ...\n```\n\n```\n$ kubectl exec -it curl-pod -- sh # (1)\n~ $ curl http://10.244.0.146\
    \ # (2)\n<!DOCTYPE html>\n<html>\n<head>\n<title>Welcome to nginx!</title>\n<style>\n\
    html { color-scheme: light dark; }\nbody { width: 35em; margin: 0 auto;\nfont-family:\
    \ Tahoma, Verdana, Arial, sans-serif; }\n</style>\n</head>\n<body>\n<h1>Welcome\
    \ to nginx!</h1>\n<p>If you see this page, the nginx web server is successfully\
    \ installed and\nworking. Further configuration is required.</p>\n<p>For online\
    \ documentation and support please refer to\n<a href=\"http://nginx.org/\">nginx.org</a>.<br/>\n\
    Commercial support is available at\n<a href=\"http://nginx.com/\">nginx.com</a>.</p>\n\
    \n<p><em>Thank you for using nginx.</em></p>\n</body>\n</html>\n~ $\n```\n\n(1)\
    \ -> 我们使用sh进入Pod。（这个curl镜像没有bash）。\n\n(2) -> 我们使用nginx Pod的IP地址运行了curl命令，并得到了默认的nginx索引页。\n\
    \n## 练习17\n\n进行相同的curl练习，尝试从twin-nginx Pod访问两个容器。每个容器的IP地址会不同，还是相同？\n\n## 部署Flask应用程序\n\
    \n至此，你已经掌握了足够的Kubernetes知识，可以在Kubernetes中部署一个简单的Flask应用程序，而这正是我们现在要做的。还记得我们在前面章节构建的容器镜像**flask-app**吗？我们将使用该镜像并部署一个Pod。\n\
    \n我们构建了容器镜像并将其推送到ghcr注册表。让我们构建一个Pod清单。\n\n```\napiVersion: v1\nkind: Pod\nmetadata:\n\
    \  name: simple-flask\n  labels:\n    app: simple-flask # (1)\nspec:\n  containers:\n\
    \  - name: flask # (2)\n    image: ghcr.io/badri/flask-app:1.0 # (3)\n    env:\n\
    \    - name: PORT # (4)\n      value: \"8080\"\n    ports:\n    - containerPort:\
    \ 8080 # (5)\n```\n\n(1) -> Pod的标签。我们在这里发挥了一些创意自由。\n\n(2) -> 容器的名称。我们将只运行1个容器。\n\
    \n(3) -> 带标签的镜像注册表名称。即使你是随意观察，你也会注意到我们之前所有的Pod都没有使用这种镜像模式。这是Kubernetes世界中的一个约定。镜像的语法是：\n\
    \n```\n<registry-url>:<optional-port>/<image-namespace>/<image-name>:<optional-tag>\n\
    ```\n\n让我们分解一下。\n\n**registry-url**表示存储容器镜像的注册表URL。如果未给出，则假定为Dockerhub注册表URL，**docker.io**。\n\
    \n**optional-port**有时，注册表在不同的端口上运行，例如**5000**。如果是这种情况，那么我们需要明确指定端口。否则，假定为**443**。\n\
    \n**image-namespace**是在容器注册表中组织多个容器镜像的一种方式。可以将其视为操作系统中的文件夹或目录。如果你的注册表被多个团队使用（通常如此），那么会有一个**team-a**镜像命名空间和一个**team-b**镜像命名空间。**注意**，不要将其与kubernetes命名空间混淆，那是完全不同的东西。对于curl\
    \ Pod，**curlimages**是镜像命名空间。对于nginx，这将是**library**，因为它属于Dockerhub官方常用容器镜像库。\n\n\
    **image-name**镜像名称。无需多言！\n\n**optional-tag**镜像的标签。对于我们的flask应用，它是**1.0**。如果未指定标签，则会拉取latest标签。我们稍后将了解为什么指定标签是不好的做法。\n\
    \n几个例子来强化这个约定。\n\n**nginx**翻译为**docker.io:443/library/nginx:latest**。\n\n**curlimages/curl**翻译为**docker.io:443/curlimages/curl:latest**。\n\
    \n现在让我们部署这个Pod。\n\n```\n$ kubectl apply -f simple-flask-pod.yaml\npod/simple-flask\
    \ created\n```\n\n```\n# 几秒钟后 ...\n```\n\n```\n$ kubectl get pod simple-flask\n\
    NAME            READY   STATUS             RESTARTS   AGE\nsimple-flask    0/1\
    \     ImagePullBackOff   0          27s\n```\n\n我们遇到了一个新错误，**ImagePullBackOff**。让我们深入挖掘，找出这意味着什么。\n\
    \n```\n$ kubectl describe pod simple-flask\n...\nEvents:\n  Type    Reason   \
    \  Age                From               Message\n  ----    ------     ----  \
    \             ----               -------\n  Normal  Scheduled  49s           \
    \     default-scheduler  Successfully assigned default/simple-flask to first-cluster-default-pool-oeo85\n\
    \  Normal  BackOff    21s (x2 over 47s)  kubelet            Back-off pulling image\
    \ \"ghcr.io/badri/flask-app:1.0\"\n  Warning Failed     21s (x2 over 47s)  kubelet\
    \            Error: ImagePullBackOff\n  Normal  Pulling    9s (x3 over 48s)  \
    \ kubelet            Pulling image \"ghcr.io/badri/flask-app:1.0\"\n  Warning\
    \ Failed     9s (x3 over 48s)   kubelet            Failed to pull image \"ghcr.io/badri/flask-app:1.0\"\
    : failed to pull and unpack image \"ghcr.io/badri/flask-app:1.0\": failed to resolve\
    \ reference \"ghcr.io/badri/flask-app:1.0\": failed to authorize: failed to fetch\
    \ anonymous token: unexpected status from GET request to https://ghcr.io/token?scope=repository%3Abadri%2Fflask-app%3Apull&service=ghcr.io:\
    \ 401 Unauthorized\n  Warning Failed     9s (x3 over 48s)   kubelet          \
    \  Error: ErrImagePull\n```\n\n节点**first-cluster-default-pool-oeo85**中的kubelet尝试从ghcr的注册表中拉取**ghcr.io/badri/flask-app:1.0**镜像，但它从注册表收到了401未授权响应。因此，它失败了，并表示：“我无法启动Pod，因为我无法从你给我的注册表中拉取该镜像”。\n\
    \n当我们发布镜像到ghcr注册表时，我们将其作为私有镜像发布。因此，未经身份验证无法拉取和使用它。我们可以向kubelet提供身份验证凭据，或者我们可以将镜像设为公开。前者，我们将在下一章了解如何操作。现在，我们将把镜像设为公开。\n\
    \n访问**https://github.com/users/<your-user-name>/packages/container/package/flask-app/settings**，假设你将镜像发布为**flask-app**，向下滚动到“Danger\
    \ Zone”，然后单击“Change visibility”。\n将包的可见性更改为“Public”。\n现在，让我们删除Pod并重新部署它。\n\n```\n\
    $ kubectl delete pod simple-flask\npod \"simple-flask\" deleted\n\n# 重新创建 ..\n\
    \n$ kubectl apply -f simple-flask.yaml\npod/simple-flask created\n```\n\n我们可以看到镜像现在被成功拉取了，因为它是一个公开镜像。"
