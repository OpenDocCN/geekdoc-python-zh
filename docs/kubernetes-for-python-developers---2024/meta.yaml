    # A word about port names


    The ports specification within a **Service** or **Pod** definition can include
    a name parameter for each port. The name parameter is a descriptive string that
    identifies the port within the specification. It''s particularly useful when you
    have multiple ports exposed by a single Service or Pod, providing a way to reference
    each port by name rather than just by number.


    # Purpose of Port Names


    **Clarity and Readability:** Naming ports makes it easier to understand the purpose
    of each port, especially'
  merge: -1
  pgno: 194
- img_proc: true
  md: "when dealing with multiple ports. For instance, names like http or metrics\
    \ can indicate the use of specific ports.\n\n**Reference in Other Configurations:**\
    \ Port names can be used to reference ports in other parts of the Kubernetes configuration,\
    \ such as in Ingress rules or when defining probes. This allows configurations\
    \ to remain valid even if the port numbers change.\n\n# Example with Port Names\n\
    \nHere's an example of a Service definition that includes named ports:\n\n```\n\
    apiVersion: v1\nkind: Service\nmetadata:\n  name: my-service\nspec:\n  selector:\n\
    \    app: my-app\n  ports:\n    - name: http\n      protocol: TCP\n      port:\
    \ 80\n      targetPort: http-port\n    - name: https\n      protocol: TCP\n```"
  merge: -1
  pgno: 195
- img_proc: true
  md: "```\nport: 443\ntargetPort: https-port\n```\n\nIn this example, two ports are\
    \ exposed by the Service: port **80** for HTTP traffic and port **443** for HTTPS\
    \ traffic. Each port has a corresponding name ( **http** and **https** ), making\
    \ it clear what each port is used for.\n\n# Using Port Names in Pod Probes\n\n\
    Port names can also be used in liveness and readiness probes within a Pod specification,\
    \ referencing the port by name. For instance:\n\n```\nlivenessProbe:\n  httpGet:\n\
    \    path: /healthz\n    port: http-port\n```\n\nHere, the liveness probe uses\
    \ the port named **http-port** for the HTTP GET request to the **/healthz** endpoint.\n\
    \nIncluding a **name** parameter for ports in your Service or Pod definitions\
    \ enhances clarity and allows for more flexible configuration management. It helps\
    \ ensure that your configurations are easier to maintain and understand, especially\
    \ in complex applications with multiple ports.\n\nLet's create another service\
    \ type, **NodePort**.\n\nA NodePort Service exposes the Nginx application on a\
    \ specific port on all the nodes of the cluster. This allows external access to\
    \ the service through **<NodeIP>:<NodePort>**."
  merge: -1
  pgno: 196
- img_proc: true
  md: '![](img/91c4bde832e221ba5bc429caf9587286_197_0.png)


    Node port service


    Here are some primary use cases for NodePort Services:'
  merge: -1
  pgno: 197
- img_proc: true
  md: "**External Access for Development and Testing:** NodePort services provide\
    \ an easy way to access applications from outside the Kubernetes cluster, which\
    \ can be useful for development and testing purposes.\n\n**Public Exposure of\
    \ Small-scale Applications:** For small-scale or proof-of-concept applications,\
    \ a NodePort Service can serve as a simple method to make an application accessible\
    \ to external users, without needing an external load balancer or Ingress controller.\n\
    \n**Basis for LoadBalancer Services:** In cloud environments, a NodePort Service\
    \ is often the underlying mechanism used by LoadBalancer services. The cloud provider's\
    \ load balancer targets the NodePort across all nodes, distributing traffic to\
    \ the application. We will see this service type in the next section.\n\n**Integrating\
    \ with Existing Infrastructure:** In scenarios where an external load balancer\
    \ or other routing infrastructure already exists, a NodePort Service can be used\
    \ to route external traffic to the Kubernetes cluster by directing traffic to\
    \ the node IP addresses at the specified node port. Ex: the same application can\
    \ be exposed as an external load balancer IP as well as a node port by creating\
    \ 2 different services.\n\n**Non-HTTP/TCP Applications:** For applications that\
    \ do not use HTTP/TCP protocols and therefore cannot be easily exposed through\
    \ an Ingress, a NodePort can provide a direct way to access services from outside\
    \ the Kubernetes cluster.\n\nHere's an example of a NodePort service.\n\n```\n\
    apiVersion: v1\nkind: Service\nmetadata:\n  name: nginx-nodeport\n```"
  merge: -1
  pgno: 198
- img_proc: true
  md: "```\nspec:\n  selector:\n    app: nginx\n  ports:\n    - port: 80\n      nodePort:\
    \ 30007 # (1)\n  type: NodePort # (2)\n```\n\n(1) -> what port number to expose\
    \ the service in.\n\n(2) -> type should be **NodePort**.\n\nNow, let's create\
    \ the service and try accessing it via curl, both from inside a pod, and from\
    \ the outside world.\n\n```\n$ kubectl apply -f svc-node-port.yaml\nservice/nginx-nodeport\
    \ created\n```\n\n```\n$ kubectl get svc\nNAME               TYPE       CLUSTER-IP\
    \      EXTERNAL-IP   PORT(S)          AGE\nkubernetes         ClusterIP  10.245.0.1\
    \      <none>        443/TCP          3d8h\nnginx-clusterip    ClusterIP  10.245.216.117\
    \  <none>        80/TCP           36m\nnginx-nodeport     NodePort   10.245.196.9\
    \    <none>        80:30007/TCP     17s\n```\n\nThe new service has a different\
    \ type, and notice how the port has the **X:Y** pattern where **X** is the port\
    \ the pod exposes, **Y** is the node port through which it is routed."
