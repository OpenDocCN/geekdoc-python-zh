  - "[PAGE 354]\n\nKubernetes gives us a way to spread out the pods evenly across\
    \ the nodes, so that there is no single point of failure. There are very slim\
    \ chances that all the nodes in your cluster go down at the same time, right?\n\
    \nWe specify this as a part of the pod/deployment spec and is called **podAntiAffinity**.\n\
    \n```\napiVersion: apps/v1\nkind: Deployment\nmetadata:\n  name: my-deployment\n\
    spec:\n  replicas: 3 # (1)\n  selector:\n    matchLabels:\n      app: my-app #\
    \ (2)\n  template:\n    metadata:\n      labels:\n        app: my-app # (3)\n\
    \    spec:\n      affinity: # (4)\n        podAntiAffinity: # (5)\n          requiredDuringSchedulingIgnoredDuringExecution:\
    \ # (6)\n          - labelSelector:\n```"
  - "[PAGE 355]\n\n```\nmatchExpressions: # (7)\n  - key: app\n    operator: In\n\
    \    values:\n      - my-app\ntopologyKey: \"kubernetes.io/hostname\" # (8)\n\
    containers:\n  - name: server\n    image: nginx\n```\n\n(1) -> Specifies the desired\
    \ number of replica pods for the deployment.\n\n(2) -> Defines the label selector\
    \ used to identify the pods that belong to this deployment.\n\n(3) -> Sets the\
    \ label for pods created from this template, used for matching against the deployment\
    \ selector.\n\n(4) -> Begins the specification of scheduling preferences regarding\
    \ pod placement.\n\n(5) -> Specifies the use of pod anti-affinity rules to influence\
    \ pod scheduling decisions.\n\n(6) -> Indicates that the anti-affinity rule must\
    \ be considered during scheduling but may be ignored after pod placement.\n\n\
    (7) -> Defines how the label selector should match against labels of existing\
    \ pods.\n\n(8) -> Specifies the node label key that the system uses to denote\
    \ the boundary within which to apply the pod anti-affinity rules."
