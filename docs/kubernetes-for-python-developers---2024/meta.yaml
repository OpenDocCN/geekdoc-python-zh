    yaml\napiVersion: apps/v1\nkind: Deployment\nmetadata:\n  name: flask-redis #\
    \ (1)\nspec:\n  replicas: 1 # (2)\n  selector:\n    matchLabels:\n      app: flask-redis\
    \ # (3)\n  template:\n    metadata:\n      labels:\n        app: flask-redis\n\
    \    spec:\n      containers:\n      - name: flask\n        image: ghcr.io/badri/flask-redis:1.0\
    \ # (4)\n        env:\n        - name: PORT # (5)\n```"
