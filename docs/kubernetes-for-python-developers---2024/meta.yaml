  md: 'Our PVC **cache** is configured with **ReadWriteOnce**, which means that the
    first pod which comes up attaches to the volume, and the second pod can''t boot
    because it can''t attach to a volume which is already attached to the first pod.


    We could configure our volume to have an access mode of **ReadWriteMany**, but
    Digitalocean Kubernetes'' storage policy doesn''t allow us to create volumes of
    such type, at least out of the box. Before we go in that direction, let''s discuss
    how Redis, and in general, most stateful applications work when scaled.


    Stateless applications do not store data or session information internally. Any
    state or data needed for processing is typically provided in each request, and
    responses are generated without relying on stored data. Scaling stateless applications
    is relatively straightforward in Kubernetes. You can increase or decrease the
    number of pod replicas without worrying about data persistence or synchronization
    issues, as each instance is independent and identical.


    Examples: The nginx deployment is considered stateless as it does not need to
    remember information about client sessions between requests. Even the Flask hello
    world and redis page count applications are stateless. **Note** that the page
    count application is considered to be stateless in spite of the fact that the
    page count increments everytime the page is visited. This is because the page
    count is not store in that application directly, it is being fetched from the
    Redis cache.


    Stateful applications save data generated during interactions and rely on this
    data for future transactions. Scaling stateful applications is more complex. It
    requires careful management of data persistence, replication, and consistency.


    Examples: The Redis cache deployment is stateful.'
  merge: -1
