    \n*缓存 Pod 重启后的页面访问计数*\n\n## 动态配置\n\n让我们回顾一下我们所做的步骤。我们首先使用 **doctl** 创建了一个块存储对象，然后创建了一个与之关联的\
    \ PV，接着是一个 PVC。然后我们将 PVC 与部署关联起来。如果我们只创建一个 PVC 并更新部署，而 Kubernetes 负责创建块存储、PV 等所有繁重的工作呢？\n\
