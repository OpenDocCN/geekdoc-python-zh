  - "[PAGE 152]\n\n```\napiVersion: v1\nkind: Pod\nmetadata:\n  name: simple-flask\n\
    \  labels:\n    app: simple-flask # (1)\nspec:\n  containers:\n  - name: flask\
    \ # (2)\n    image: ghcr.io/badri/flask-app:1.0 # (3)\n    env:\n    - name: PORT\
    \ # (4)\n      value: \"8080\"\n    ports:\n    - containerPort: 8080 # (5)\n\
    ```\n\n(1) -> The label of the pod. We're giving ourselves some creative freedom\
    \ here.\n\n(2) -> The name of the container. We will run only 1 container.\n\n\
    (3) -> The image registry name with tags. Even if you're a casual observer, you\
    \ will notice that we didn't use this image pattern for all our previous pods.\
    \ This is a convention in the Kubernetes world. The syntax for an image is:\n\n\
    ```\n<registry-url>:<optional-port>/<image-namespace>/<image-name>:<optional-tag>\n\
    ```"
  - '[PAGE 153]


    Let''s break it down.


    **registry-url** indicates the registry URL where the container images are stored.
    If this is not given, it is assumed to be the Dockerhub registry URL, **docker.io**.


    **optional-port** sometimes, registries operate out of a different port, like
    **5000**. If this is the case, then we need to specify the port explicitly. Otherwise,
    it is assumed to be **443**.


    **image-namespace** is a way to organize multiple container images in a container
    registry. Think of it like a folder or a directory in your operating system. If
    your registry is used by multiple teams (which is usually the case), there will
    be a **team-a** image namespace and a **team-b** image namespace. **Note** that
    this is not to be confused with kubernetes namespaces, which is an entirely different
    thing. For the curl pod, **curlimages** is the image namespace. For nginx, this
    will be **library**, as it belongs to Dockerhub''s official library of commonly
    used container images.


    **image-name** the image name. Enough said!


    **optional-tag** The tag of the image. For our flask app, it is **1.0**. If no
    tag is specified, the latest tag is pulled. We will learn why not specifying tags
    is a bad practice later.


    A couple of examples to reinforce this convention.


    **nginx** translates to **docker.io:443/library/nginx:latest**.


    **curlimages/curl** translates to **docker.io:443/curlimages/curl:latest**.


    Let''s now deploy this pod already.'
