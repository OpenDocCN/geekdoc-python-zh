  - "[PAGE 93]\n\nHere's a simplified model of how it works: We create a YAML artifact\
    \ of the desired state of the pod. The Kubernetes cluster creates/modifies the\
    \ pods in such a way that it matches our desired state. Kubernetes tries to the\
    \ maximum possible extent to match the existing state to the desired state. Sometimes,\
    \ it can't do so. For example, if you have only 1 node and request the cluster\
    \ to create 100s of pods, the cluster will give up saying that it is not able\
    \ to \"match the cluster state to your desired state.\"\n\nHere's the YAML artifact\
    \ equivalent for the nginx pod we created from the command-line.\n\n```\napiVersion:\
    \ v1 # (1)\nkind: Pod # (2)\nmetadata: # (3)\n  labels: # (4)\n    run: nginx\n\
    \  name: nginx # (5)\nspec: # (6)\n  containers: # (7)\n  - image: nginx\n   \
    \ name: nginx\n```\n\n(1) -> In Kubernetes, the API serves as the foundation for\
    \ defining, managing, and controlling various resources within a cluster.\n\n\
    (2) -> A \"resource\" in Kubernetes refers to an entity that the system knows\
    \ how to manage, such as Pods, Deployments, Services, and more, which we will\
    \ see in future sections. Each of these resources is defined by a \"kind,\" which\
    \ specifies the type of the resource in question."
  - '[PAGE 94]


    Alongside the kind, every Kubernetes resource is associated with an API version.
    The API version is crucial because Kubernetes'' API evolves over time, adding
    new features and making changes to existing ones. The API version is specified
    in the format **apiVersion: <group>/<version>**, such as **apiVersion: v1** or
    **apiVersion: apps/v1**, and it informs Kubernetes about the version of the API
    schema that the resource definition is intended to use. This versioning system
    allows Kubernetes to provide backward compatibility and manage the transition
    to new API versions smoothly, ensuring that users can adopt new features at their
    own pace while maintaining the stability of their existing deployments.


    (3) -> metadata is a set of data that provides information about other data managed
    within the Kubernetes system. It is a structured collection of information used
    to identify, describe, and organize resources such as Pods, Services, and Deployments.
    Metadata plays a crucial role in resource management, enabling efficient querying,
    selection, and operation on resources within the Kubernetes ecosystem.


    (4) -> Labels are key-value pairs attached to Kubernetes objects such as Pods,
    Services, and Deployments. They serve as identifiers and organizational tags that
    make it easier to manage, select, and operate on groups of objects. Labels can
    be used to organize resources in meaningful ways according to the needs of the
    user or application. For example, labels can denote environments (e.g., **env=production**),
    application versions (e.g., **version=1.2.3**), or any other categorization that
    aids in managing resources at scale. One of the key features of labels is their
    use in selectors, which are queries that allow users to filter resources based
    on label criteria.


    (5) -> Name of the pod you want to create. Part of the metadata.


    (6) -> The "spec" in Kubernetes is a required section of an object definition
    that describes the desired state of the resource. It is where you specify the
    characteristics of the resource you want to create or configure.'
  - '[PAGE 95]


    For example, in a Pod definition, the spec might include the container images
    to use, the number of replicas, network settings, and volume mounts, among other
    configurations. The spec is essentially a blueprint that tells Kubernetes how
    to build and manage the resource in question.


    (7) -> Containers are part of the pod spec, which tells Kubernetes what containers
    the pod contains and what their names and images are. **Note** that the image
    should be a valid container registry image with an optional tag. Name is an arbitrary
    name used by humans to identify the containers.


    You can also generate this YAML by running the following command:


    ```

    $ kubectl run nginx --image=nginx --dry-run=client -o yaml > nginx-pod.yaml

    ```


    The **--dry-run=client** parameter tells kubectl to output the definition of the
    resource instead of creating the resource via the Kubernetes API. The **-o yaml**
    parameter tells kubectl to output the resource spec in YAML format. You can also
    try giving the less useful **-o json** parameter and see what happens.


