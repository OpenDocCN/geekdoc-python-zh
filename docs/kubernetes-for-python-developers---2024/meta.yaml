- md: "learnt about secrets, let's leverage docker registry secrets and fetch these\
    \ images by using the credentials.\n\nIn Kubernetes, Image Pull Secrets are used\
    \ to store credentials for accessing private container registries. When a Kubernetes\
    \ cluster needs to pull a container image from a private registry to deploy a\
    \ Pod, it requires authentication details. Image pull secrets provide a secure\
    \ way to store and use these credentials.\n\n## Why We Need Image Pull Secrets\n\
    \n**Access Control:** Private container registries restrict access to images,\
    \ requiring users to authenticate. Image pull secrets ensure that Kubernetes can\
    \ authenticate with the registry to pull images.\n\n**Security:** Storing credentials\
    \ in secrets rather than in Pod specifications or Dockerfiles enhances security\
    \ by avoiding exposure of sensitive data.\n\n**Automation:** Facilitates automated\
    \ deployments and management of applications that use private images, without\
    \ manual intervention for authentication.\n\n## How Image Pull Secrets Work\n\n\
    When you create a Pod that uses images from a private registry, you reference\
    \ the image pull secret in the Pod's specification. Kubernetes uses the credentials\
    \ from the image pull secret to authenticate with the private registry and pull\
    \ the image.\n\n## Creating an Image Pull Secret\n\nFirst, you create an image\
    \ pull secret with the registry credentials.\n\n```\n$ kubectl create secret docker-registry\
    \ ghcr-creds \\\n  --docker-server=ghcr.io \\\n  --docker-username=<GH-USERNAME>\
    \ \\\n  --docker-password=<GH-TOKEN> \\\n  --docker-email=<GH-EMAIL> \\\n  -n\
    \ notch-further\nsecret/ghcr-creds created\n```\n\nWe create a secret of type\
    \ **docker-registry**, with the name **ghcr-creds**.\n\nThe **docker-server**\
    \ value is the registry url, which is **ghcr.io**.\n\nThe username is your Github\
    \ username and the **<GH-TOKEN>** is the token you creating for authenticating\
    \ with the registry while pushing the image to the registry.\n\nThe **<GH-EMAIL>**\
    \ is your Github account's email. Finally, we have to create this secret in the\
    \ same namespace we're trying to pull the private image.\n\nBefore we add this\
    \ image pull secret in our **flask-redis** deployment, we have to make that image\
    \ a private image. Go to **https://github.com/users/<your-user-name>/packages/container/package/flask-redis/settings**,\
    \ assuming you published the image as **flask-redis**, scroll down to \"Danger\
    \ Zone\", and click on \"Change visibility\".\n\nChange the visibility of the\
    \ package to \"Private\".\n\n## Using image pull secret in the deployment\n\n\
    Let's fix the **flask-redis** deployment to use image pull secret **ghcr-creds**.\n\
    \n```yaml\napiVersion: apps/v1\nkind: Deployment\nmetadata:\n  name: flask-redis-pvt\n\
    spec:\n  replicas: 1\n  selector:\n    matchLabels:\n      app: flask-redis\n\
    \  template:\n    metadata:\n      labels:\n        app: flask-redis\n    spec:\n\
    \      containers:\n      - name: flask\n        image: ghcr.io/badri/flask-redis:1.0\n\
    \        imagePullPolicy: Always # (1)\n        env:\n        - name: DEBUG\n\
    \          valueFrom:\n            configMapKeyRef:\n              name: flask-config\n\
    \              key: DEBUG\n        - name: PORT\n          valueFrom:\n      \
    \      configMapKeyRef:\n              name: flask-config\n              key:\
    \ PORT\n        - name: REDIS_HOST\n          valueFrom:\n            configMapKeyRef:\n\
    \              name: flask-config\n              key: REDIS_HOST\n        - name:\
    \ REDIS_PASSWORD\n          valueFrom:\n            secretKeyRef:\n          \
    \    name: redis-credentials\n              key: REDIS_PASSWORD\n        ports:\n\
    \          - containerPort: 8080\n      imagePullSecrets: # (2)\n      - name:\
    \ ghcr-creds # (3)\n```\n\n(1) -> We give an **imagePullPolicy** value of **Always**,\
    \ otherwise the image pull secret will be ignored as the image is already present\
    \ in the node.\n\n(2) -> The **imagePullSecrets** section is a sibling of **containers**,\
    \ which contains image pull credentials.\n\n(3) -> The image pull secret name\
    \ we created just now.\n\n## Exercise 27: Give a different secret\n\nTry giving\
    \ a different kind of secret for the deployment above and see how it changes things.\n\
    \n## Exercise 28: Multiple image pull secrets\n\nBuild another private image in\
    \ another registry. Add it as another container in same pod/deployment, and add\
    \ another image pull secret to the configuration, for the newer container.\n\n\
    ## init containers\n\nInit Containers are specialized containers that run before\
    \ app containers in a Pod. They are executed in sequence, each one completing\
    \ successfully before the next is started. If any init container fails, Kubernetes\
    \ repeatedly restarts the Pod until the init container succeeds. They are perfect\
    \ for setup scripts or utilities that are not part of the main application but\
    \ must run before the application starts.\n\n![](img/91c4bde832e221ba5bc429caf9587286_260_0.png)\n\
    \n![](img/91c4bde832e221ba5bc429caf9587286_260_1.png)\n\n![](img/91c4bde832e221ba5bc429caf9587286_260_2.png)\n\
    \n![](img/91c4bde832e221ba5bc429caf9587286_260_3.png)\n\n![](img/91c4bde832e221ba5bc429caf9587286_260_4.png)\n\
    \ninit containers\n\n## Why We Need Init Containers\n\n**Sequential Initialization:**\
    \ Init containers ensure that certain setup tasks are completed before your application\
    \ starts. This is useful for waiting on a service to be up, initializing a database,\
    \ or ensuring that configuration files are in place.\n\n**Security:** By separating\
    \ initialization tasks into separate containers, you can keep the main application\
    \ container as clean and secure as possible, reducing the attack surface by not\
    \ including utilities or scripts that are only needed at startup.\n\n**Simplicity:**\
    \ They simplify the main application container by offloading pre-startup tasks.\
    \ This keeps the main application container focused solely on running the application\
    \ itself.\n\n## Using an Init Container with Flask-Redis Deployment\n\nSuppose\
    \ we want to check if the Redis service is up and running before starting our\
    \ Flask app. Here you can use an init container to wait for the Redis service\
    \ to be fully operational before starting the Flask application. This ensures\
    \ that your application doesn't start before its dependencies are ready.\n\n##\
    \ Redis Check Script\n\nFirst, you'd need a simple script to check if Redis is\
    \ up and running. This script could be a simple shell script that tries to connect\
    \ to the Redis server:\n\n```bash\n# check-redis.sh\nuntil nc -z -v -w30 $REDIS_HOST\
    \ 6379\ndo\n  echo \"Waiting for redis connection...\"\n  sleep 1\ndone\necho\
    \ \"Connected to Redis\"\n```\n\nThis script uses **nc** (netcat) to check if\
    \ it can connect to Redis on the default port (**6379**). **$REDIS_HOST** is the\
    \ name of your Redis service in Kubernetes.\n\nNext, we want to make a configmap\
    \ out of this script so that we can mount it as part of the init container.\n\n\
    ```\n$ kubectl create configmap redis-check --from-file=check-redis.sh -n notch-further\n\
    configmap/redis-check created\n```\n\nFinally, we change the deployment to accommodate\
    \ the init container.\n\n```yaml\napiVersion: apps/v1\nkind: Deployment\nmetadata:\n\
    \  name: flask-redis-init\nspec:\n  replicas: 1\n  selector:\n    matchLabels:\n\
    \      app: flask-redis-init\n  template:\n    metadata:\n      labels:\n    \
    \    app: flask-redis-init\n    spec:\n      initContainers: # (1)\n        -\
    \ name: check-redis # (2)\n          image: alpine # (3)\n          command: ['/bin/sh',\
    \ '-c', 'apk add --no-cache netcat-openbsd && /usr/local/bin/check-redis.sh']\
    \ # (4)\n          env: # (5)\n            - name: REDIS_HOST\n              value:\
    \ redis-service\n          volumeMounts: # (6)\n            - name: redis-check-script\n\
    \              mountPath: /usr/local/bin/check-redis.sh\n              subPath:\
    \ check-redis.sh\n      containers:\n        - name: flask\n          image: ghcr.io/badri/flask-redis:1.0\n\
    \          env:\n            - name: DEBUG\n              valueFrom:\n       \
    \         configMapKeyRef:\n                  name: flask-config\n           \
    \       key: DEBUG\n            - name: PORT\n              valueFrom:\n     \
    \           configMapKeyRef:\n                  name: flask-config\n         \
    \         key: PORT\n            - name: REDIS_HOST\n              valueFrom:\n\
    \                configMapKeyRef:\n                  name: flask-config\n    \
    \              key: REDIS_HOST\n            - name: REDIS_PASSWORD\n         \
    \     valueFrom:\n                secretKeyRef:\n                  name: redis-credentials\n\
    \                  key: REDIS_PASSWORD\n          ports:\n            - containerPort:\
    \ 8080\n      volumes: # (7)\n        - name: redis-check-script # (8)\n     \
    \     configMap:\n            name: redis-check # (9)\n            defaultMode:\
    \ 0755 # (10)\n```"
  mdcn: "了解了密钥，让我们利用 Docker Registry 密钥并使用凭据来拉取这些镜像。\n\n在 Kubernetes 中，镜像拉取密钥用于存储访问私有容器镜像仓库的凭据。当\
    \ Kubernetes 集群需要从私有仓库拉取容器镜像以部署 Pod 时，它需要认证详情。镜像拉取密钥提供了一种安全的方式来存储和使用这些凭据。\n\n\
    ## 为什么我们需要镜像拉取密钥\n\n**访问控制：** 私有容器镜像仓库限制对镜像的访问，要求用户进行身份验证。镜像拉取密钥确保 Kubernetes\
    \ 能够向仓库进行身份验证以拉取镜像。\n\n**安全性：** 将凭据存储在密钥中，而不是存储在 Pod 规范或 Dockerfile 中，可以避免敏感数据暴露，从而增强安全性。\n\
    \n**自动化：** 无需手动进行身份验证干预，即可促进使用私有镜像的应用程序的自动化部署和管理。\n\n## 镜像拉取密钥如何工作\n\n当你创建一个使用来自私有仓库镜像的\
    \ Pod 时，你需要在 Pod 的规范中引用镜像拉取密钥。Kubernetes 使用来自镜像拉取密钥的凭据向私有仓库进行身份验证并拉取镜像。\n\n##\
    \ 创建镜像拉取密钥\n\n首先，你需要使用仓库凭据创建一个镜像拉取密钥。\n\n```\n$ kubectl create secret docker-registry\
    \ ghcr-creds \\\n  --docker-server=ghcr.io \\\n  --docker-username=<GH-USERNAME>\
    \ \\\n  --docker-password=<GH-TOKEN> \\\n  --docker-email=<GH-EMAIL> \\\n  -n\
    \ notch-further\nsecret/ghcr-creds created\n```\n\n我们创建了一个类型为 **docker-registry**\
    \ 的密钥，名称为 **ghcr-creds**。\n\n**docker-server** 的值是仓库的 URL，即 **ghcr.io**。\n\n用户名是你的\
    \ Github 用户名，**<GH-TOKEN>** 是你在将镜像推送到仓库时创建的用于身份验证的令牌。\n\n**<GH-EMAIL>** 是你的 Github\
    \ 账户邮箱。最后，我们必须在尝试拉取私有镜像的同一个命名空间中创建此密钥。\n\n在我们向 **flask-redis** 部署中添加此镜像拉取密钥之前，我们必须先将该镜像设为私有镜像。访问\
    \ **https://github.com/users/<your-user-name>/packages/container/package/flask-redis/settings**，假设你已将镜像发布为\
    \ **flask-redis**，向下滚动到“危险区域”，然后点击“更改可见性”。\n\n将包的可见性更改为“私有”。\n\n## 在部署中使用镜像拉取密钥\n\
    \n让我们修改 **flask-redis** 部署以使用镜像拉取密钥 **ghcr-creds**。\n\n```yaml\napiVersion: apps/v1\n\
    kind: Deployment\nmetadata:\n  name: flask-redis-pvt\nspec:\n  replicas: 1\n \
    \ selector:\n    matchLabels:\n      app: flask-redis\n  template:\n    metadata:\n\
    \      labels:\n        app: flask-redis\n    spec:\n      containers:\n     \
    \ - name: flask\n        image: ghcr.io/badri/flask-redis:1.0\n        imagePullPolicy:\
    \ Always # (1)\n        env:\n        - name: DEBUG\n          valueFrom:\n  \
    \          configMapKeyRef:\n              name: flask-config\n              key:\
    \ DEBUG\n        - name: PORT\n          valueFrom:\n            configMapKeyRef:\n\
    \              name: flask-config\n              key: PORT\n        - name: REDIS_HOST\n\
    \          valueFrom:\n            configMapKeyRef:\n              name: flask-config\n\
    \              key: REDIS_HOST\n        - name: REDIS_PASSWORD\n          valueFrom:\n\
    \            secretKeyRef:\n              name: redis-credentials\n          \
    \    key: REDIS_PASSWORD\n        ports:\n          - containerPort: 8080\n  \
    \    imagePullSecrets: # (2)\n      - name: ghcr-creds # (3)\n```\n\n(1) -> 我们将\
    \ **imagePullPolicy** 的值设为 **Always**，否则镜像拉取密钥将被忽略，因为镜像已存在于节点上。\n\n(2) -> **imagePullSecrets**\
    \ 部分与 **containers** 是同级的，其中包含镜像拉取凭据。\n\n(3) -> 我们刚刚创建的镜像拉取密钥的名称。\n\n## 练习 27：使用不同的密钥\n\
    \n尝试为上述部署提供一个不同类型的密钥，看看会发生什么变化。\n\n## 练习 28：多个镜像拉取密钥\n\n在另一个仓库中构建另一个私有镜像。将其作为另一个容器添加到同一个\
    \ Pod/部署中，并为新的容器在配置中添加另一个镜像拉取密钥。\n\n## init 容器\n\nInit 容器是在 Pod 中应用容器之前运行的专用容器。它们按顺序执行，每个容器成功完成后才会启动下一个。如果任何\
    \ init 容器失败，Kubernetes 会反复重启 Pod，直到 init 容器成功为止。它们非常适合用于设置脚本或工具，这些脚本或工具不是主应用程序的一部分，但必须在应用程序启动之前运行。\n\
    \n![](img/91c4bde832e221ba5bc429caf9587286_260_0.png)\n\n![](img/91c4bde832e221ba5bc429caf9587286_260_1.png)\n\
    \n![](img/91c4bde832e221ba5bc429caf9587286_260_2.png)\n\n![](img/91c4bde832e221ba5bc429caf9587286_260_3.png)\n\
    \n![](img/91c4bde832e221ba5bc429caf9587286_260_4.png)\n\ninit 容器\n\n## 为什么我们需要\
    \ Init 容器\n\n**顺序初始化：** Init 容器确保在应用程序启动之前完成某些设置任务。这对于等待服务启动、初始化数据库或确保配置文件就位非常有用。\n\
    \n**安全性：** 通过将初始化任务分离到单独的容器中，你可以使主应用程序容器尽可能干净和安全，通过不包含仅在启动时需要的工具或脚本来减少攻击面。\n\n\
    **简洁性：** 它们通过卸载启动前任务来简化主应用程序容器。这使主应用程序容器可以专注于运行应用程序本身。\n\n## 在 Flask-Redis 部署中使用\
    \ Init 容器\n\n假设我们希望在启动 Flask 应用程序之前检查 Redis 服务是否已启动并运行。在这里，你可以使用一个 init 容器来等待\
    \ Redis 服务完全运行，然后再启动 Flask 应用程序。这确保了你的应用程序不会在其依赖项就绪之前启动。\n\n## Redis 检查脚本\n\n\
    首先，你需要一个简单的脚本来检查 Redis 是否已启动并运行。这个脚本可以是一个简单的 shell 脚本，尝试连接到 Redis 服务器：\n\n```bash\n\
    # check-redis.sh\nuntil nc -z -v -w30 $REDIS_HOST 6379\ndo\n  echo \"Waiting for\
    \ redis connection...\"\n  sleep 1\ndone\necho \"Connected to Redis\"\n```\n\n\
    此脚本使用 **nc** (netcat) 来检查是否可以连接到默认端口 (**6379**) 上的 Redis。**$REDIS_HOST** 是你在 Kubernetes\
    \ 中的 Redis 服务的名称。\n\n接下来，我们希望将这个脚本制作成一个 configmap，以便我们可以将其作为 init 容器的一部分挂载。\n\n\
    ```\n$ kubectl create configmap redis-check --from-file=check-redis.sh -n notch-further\n\
    configmap/redis-check created\n```\n\n最后，我们修改部署以容纳 init 容器。\n\n```yaml\napiVersion:\
    \ apps/v1\nkind: Deployment\nmetadata:\n  name: flask-redis-init\nspec:\n  replicas:\
