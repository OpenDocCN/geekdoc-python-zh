    Deployments in Kubernetes provide a powerful and flexible way to manage your applications.
    They abstract away the complexity of managing individual Pods and ReplicaSets,
    offering a simpler and more robust mechanism for deploying, scaling, and maintaining
    applications. Deployments are essential for anyone looking to leverage Kubernetes
    for production-grade applications due to their automated management features,
    including seamless rollouts and rollbacks, scaling, and self-healing capabilities.


    # Difference between replicasets and deployments


    The main difference between a ReplicaSet and a Deployment in Kubernetes lies in
    their purpose and capabilities. While both ensure that a specified number of pod
    replicas are running, Deployments provide additional features such as the ability
    to update those pods and manage their lifecycle more comprehensively.


    A **ReplicaSet** ensures that a specified number of pod replicas are running at
    any given time. It is primarily used for maintaining the availability of a set
    of identical Pods. It can create and destroy Pods as needed to reach the desired
    replica count. It watches for Pods that match its criteria and takes action if
    the number is not met. But a replicaset does not provide a built-in mechanism
    for updating the Pods with a new version of the container image. To update Pods
    managed by a ReplicaSet, you would need to manually delete Pods for the ReplicaSet
    to recreate them with the new image, or use other mechanisms outside of the ReplicaSet
    itself.'
  - '[PAGE 175]


    A **Deployment** provides declarative updates for Pods and ReplicaSets. Deployments
    manage the deployment and scaling of a set of Pods and allow for declarative updates
    to the Pods and their configurations. A Deployment includes all the capabilities
    of a ReplicaSet (managing replicas) and adds support for rolling updates, rollbacks,
    and versioning. Deployments keep a history of updates, allowing for easy rollbacks
    to previous versions if needed. Deployments are ideal for managing stateless applications
    that require easy scaling, rolling updates, and rollback capabilities.


    # Which One Should You Use?


    **For Simple Pod Replica Management:** If your sole requirement is to ensure a
    certain number of pod replicas are running, and you do not need to update those
    pods once they are created, a ReplicaSet might suffice. However, this use case
    is relatively rare in practice because most applications need to be updated after
    deployment.


    **For General Application Deployment and Management:** In most scenarios, Deployments
    are the recommended choice. Deployments offer a superset of the ReplicaSet''s
    capabilities, including managing replicas with the added benefits of seamless
    updates and rollbacks. They provide a higher level of abstraction that simplifies
    many aspects of application management, making Deployments suitable for most application
    deployment needs in Kubernetes.


    In summary, while ReplicaSets are useful for maintaining a specific number of
    replicas, Deployments are generally preferred for application deployment and management
    in Kubernetes due to their comprehensive set of features that cover the lifecycle
    management of Pods and ReplicaSets.'
- md: "Do **note** that a Deployment in Kubernetes automatically creates a ReplicaSet\
    \ to manage the Pods. The Deployment specifies the desired state of the application,\
    \ such as the number of replicas, and the ReplicaSet ensures that the specified\
    \ number of Pods, based on the Pod template in the Deployment, are running at\
    \ any given time. When you create a Deployment, it creates a ReplicaSet to orchestrate\
    \ the Pod instances. If you update the Deployment (e.g., changing the Pod template),\
    \ it will create a new ReplicaSet for the new version of Pods and manage the transition\
    \ from the old version to the new version according to the Deployment's update\
    \ strategy (such as a rolling update).\n\nThe relationship between Deployments\
    \ and ReplicaSets simplifies the process of deploying, scaling, and managing stateless\
    \ applications. It provides mechanisms for rolling updates, rollback, scaling,\
    \ and self-healing of Pods, making Deployments a higher-level concept compared\
    \ to ReplicaSets, which are more focused on maintaining a specific number of Pod\
    \ replicas.\n\n## Why are replicasets still around?\n\nReplicaSets are still a\
    \ fundamental part of the Kubernetes ecosystem for several reasons, despite Deployments\
    \ offering a superset of their functionality with additional features like rolling\
    \ updates and rollbacks. Here's why ReplicaSets remain important and in use:\n\
    \n- 1. **Fundamental Building Block:** ReplicaSets serve as a foundational building\
    \ block in Kubernetes. They provide a simple, focused mechanism for ensuring that\
    \ a specified number of pod replicas are running at any given time. This is a\
    \ critical functionality for maintaining the availability and scaling of applications.\n\
    - 2. **Abstraction Layer for Deployments:** Deployments manage the deployment\
    \ and updating of applications by using ReplicaSets under the hood. When you create\
    \ a Deployment, it creates a ReplicaSet to manage the Pods. This separation of\
    \ concerns allows Deployments to abstract away the complexities of pod lifecycle\
    \ management and update strategies, while still leveraging the ReplicaSet's capability\
    \ to maintain a desired number of replicas.\n- 3. **Direct Use Cases:** In scenarios\
    \ where users need a simple replication controller without the need for rolling\
    \ updates or version history, ReplicaSets can be used directly. They are simpler\
    \ and can be more appropriate for certain stateless applications that require\
    \ a fixed number of replicas but don't need the additional features provided by\
    \ Deployments.\n- 4. **Learning and Debugging:** Understanding ReplicaSets is\
    \ crucial for learning how Kubernetes works internally. They are often used for\
    \ educational purposes to teach the basics of pod replication and scaling. Additionally,\
    \ when debugging, understanding the relationship between Deployments and their\
    \ underlying ReplicaSets can be valuable.\n- 5. **API Stability and Evolution:**\
    \ Kubernetes aims to maintain API stability and backward compatibility. As such,\
    \ once a resource type like ReplicaSets is introduced and widely used, it remains\
    \ part of the ecosystem to ensure existing applications and systems continue to\
    \ function. This stability is crucial for enterprise environments and production\
    \ applications that rely on specific Kubernetes resources.\n- 6. **Flexibility\
    \ for Advanced Use Cases:** While Deployments cover the majority of use cases\
    \ for managing stateless applications, there might be advanced scenarios where\
    \ the granular control provided by ReplicaSets is necessary. For example, users\
    \ might want to manage the rolling update logic themselves or implement custom\
    \ deployment strategies not directly supported by the Deployment API.\n\nIn summary,\
    \ ReplicaSets remain a crucial part of Kubernetes for their simplicity, role as\
    \ building blocks for Deployments, and their use in specific scenarios that benefit\
    \ from a more focused approach to replica management. Their continued presence\
    \ ensures flexibility, stability, and backward compatibility within the Kubernetes\
    \ ecosystem.\n\n## Deployment strategies\n\nDeployment strategies in Kubernetes\
    \ dictate how updates to applications are rolled out to ensure availability and\
    \ minimize disruption. The two primary strategies are Rolling Update and Recreate,\
    \ but other advanced strategies like Blue/Green and Canary can also be implemented\
    \ using Kubernetes features. Here's how each strategy works with examples using\
    \ Nginx pods:\n\n### Rolling Update (Default Strategy)\n\nA Rolling Update gradually\
    \ replaces old versions of pods with new ones, ensuring that the application remains\
    \ available during the update and does not exceed the available resources.\n\n\
    ```yaml\napiVersion: apps/v1\nkind: Deployment\nmetadata:\n  name: nginx-deployment\n\
    spec:\n  replicas: 3\n  strategy:\n    type: RollingUpdate # (1)\n    rollingUpdate:\
    \ # (2)\n      maxUnavailable: 1 # (3)\n      maxSurge: 1 # (4)\n  selector:\n\
    \    matchLabels:\n      app: nginx\n  template:\n    metadata:\n      labels:\n\
    \        app: nginx\n    spec:\n      containers:\n      - name: nginx\n     \
    \   image: nginx:1.24\n        ports:\n        - containerPort: 80\n```\n\n(1)\
    \ -> The type of deployment strategy.\n\n(2) -> We give specific configuration\
    \ for the rolling update strategy.\n\n(3) -> The number of pods that can be unavailable\
    \ during the update process.\n\n(4) -> The number of pods that can be created\
    \ above the desired amount of pods during an update.\n\nBoth **maxSurge** and\
    \ **maxUnavailable** can be specified as either an integer (in our case, **1**)\
    \ or a percentage (e.g. 25%), and they cannot both be zero. When specified as\
    \ an integer, it represents the actual number of pods; when specifying a percentage,\
    \ that percentage of the desired number of pods is used, rounded down.\n\nIt is\
    \ important to note that maxSurge indicates the maximum number of new pods that\
    \ will be created at the time of deployment, and maxUnavailable is the maximum\
    \ number of old pods that will be deleted during the time of deployment.\n\nFor\
    \ example, if we re-apply the deployment with a newer nginx image( **nginx:1.25**\
    \ ), the kubelet will create at most 1 new pod for the deployment with the **1.25**\
    \ image, and at most 1 pod with the **1.24** tag will be deleted at any given\
    \ point in time **during the deployment**.\n\nLet's check the series of events\
    \ that happen to confirm this.\n\n```bash\n$ kubectl apply -f deployment-1.yaml\n\
    deployment.apps/nginx-deployment created\n\n# After a few secs...\n\n$ kubectl\
    \ get pod -l app=nginx\nNAME                                READY   STATUS   \
    \ RESTARTS   AGE\nnginx-deployment-5948f7484f-7wtj7   1/1     Running   0    \
    \      29s\nnginx-deployment-5948f7484f-88kkp  1/1     Running   0          29s\n\
    nginx-deployment-5948f7484f-9m2fx  1/1     Running   0          29s\n```\n\n```bash\n\
    $ kubectl apply -f deployment-2.yaml\ndeployment.apps/nginx-deployment configured\n\
    ```\n\n# After a few seconds ..\n\n```bash\n$ kubectl get pod -l app=nginx\nNAME\
    \                                READY   STATUS    RESTARTS   AGE\nnginx-deployment-cd5968d5b-btjcg\
    \   1/1     Running   0          28s\nnginx-deployment-cd5968d5b-x7pdb   1/1 \
    \    Running   0          30s\nnginx-deployment-cd5968d5b-xmjw2   1/1     Running\
    \   0          30s\n```\n\n```bash\n$ kubectl get events --sort-by='.lastTimestamp'\n\
    ...\n4m9s        Normal  ScalingReplicaSet  deployment/nginx-deployment      \
    \        Scaled up replica set nginx-deployment-cd5968d5b to 2 from 1 # (A)\n\
    4m9s        Normal  Pulling            pod/nginx-deployment-cd5968d5b-x7pdb  \
    \  Pulling image \"nginx:1.25\"\n4m9s        Normal  SuccessfulDelete   replicaset/nginx-deployment-5948f7484f\
    \  Deleted pod: nginx-deployment-5948f7484f-88kkp # (B)\n4m9s        Normal  SuccessfulCreate\
    \   replicaset/nginx-deployment-cd5968d5b   Created pod: nginx-deployment-cd5968d5b-xmjw2\n\
    4m9s        Normal  Scheduled          pod/nginx-deployment-cd5968d5b-xmjw2  \
    \ Successfully assigned default/nginx-deployment-cd5968d5b-xmjw2 to first-cluster-default-pool-oeo85\n\
    4m9s    Normal  Killing     pod/nginx-deployment-5948f7484f-88kkp  Stopping container\
    \ nginx\n4m9s    Normal  SuccessfulCreate replicaset/nginx-deployment-cd5968d5b\
    \  Created pod: nginx-deployment-cd5968d5b-x7pdb\n4m9s    Normal  ScalingReplicaSet\
    \ deployment/nginx-deployment    Scaled down replica set nginx-deployment-5948f7484f\
    \ to 2 from 3\n4m9s    Normal  ScalingReplicaSet deployment/nginx-deployment \
    \   Scaled up replica set nginx-deployment-cd5968d5b to 1\n4m9s    Normal  Scheduled\
    \     pod/nginx-deployment-cd5968d5b-x7pdb  Successfully assigned default/nginx-deployment-cd5968d5b-x7pdb\
    \ to first-cluster-default-pool-oeo8k\n4m8s    Normal  Pulling     pod/nginx-deployment-cd5968d5b-xmjw2\
    \  Pulling image \"nginx:1.25\"\n4m7s    Normal  ScalingReplicaSet deployment/nginx-deployment\
    \    Scaled down replica set nginx-deployment-5948f7484f to 1 from 2\n4m7s   \
    \ Normal  Pulled      pod/nginx-deployment-cd5968d5b-x7pdb  Successfully pulled\
    \ image \"nginx:1.25\" in 1.677s (1.677s including waiting)\n4m7s    Normal  Created\
    \     pod/nginx-deployment-cd5968d5b-x7pdb  Created container nginx\n4m7s    Normal\
    \  Started     pod/nginx-deployment-cd5968d5b-x7pdb  Started container nginx\n\
    4m7s    Normal  Scheduled     pod/nginx-deployment-cd5968d5b-btjcg  Successfully\
    \ assigned default/nginx-deployment-cd5968d5b-btjcg to first-cluster-default-pool-oeo8s\n\
    4m7s    Normal  ScalingReplicaSet deployment/nginx-deployment    Scaled up replica\
    \ set nginx-deployment-cd5968d5b to 3 from 2\n4m7s    Normal  SuccessfulDelete\
    \ replicaset/nginx-deployment-5948f7484f  Deleted pod: nginx-deployment-5948f7484f-7wtj7\n\
