    # Kubernetes resources


    Modeling everything as a resource in Kubernetes is a fundamental design choice
    that aligns with its declarative approach to managing applications and infrastructure.
    This model offers several advantages:'
  merge: -1
  pgno: 102
- img_proc: true
  md: '+   1. **Consistency:** By treating all entities (pods, services, deployments,
    etc.) as resources, Kubernetes provides a consistent way to manage different aspects
    of the system. Users interact with each resource in a similar manner, whether
    they''re creating, reading, updating, or deleting resources, which simplifies
    the learning curve and operational practices.


    2. **Declarative Management:** Kubernetes adopts a declarative model where users
    specify the desired state of their applications or infrastructure in terms of
    resources. Kubernetes then works to ensure the actual state matches the desired
    state. This approach abstracts away the procedural steps required to achieve the
    desired state, simplifying complex operations like scaling, rollouts, and self-healing.


    3. **Extensibility:** The resource model allows Kubernetes to be highly extensible.
    Custom resources can be defined to extend Kubernetes with new functionalities,
    fitting specific needs without altering the core Kubernetes code. This enables
    developers to build on Kubernetes'' capabilities and integrate with other tools
    and systems seamlessly.


    4. **Automation and Orchestration:** Treating entities as resources allows Kubernetes
    to automate their management effectively. Kubernetes controllers continuously
    monitor the state of resources and take actions to reconcile differences between
    the desired and current states. This enables sophisticated orchestration capabilities,
    such as automatically rolling out updates, scaling applications in response to
    demand, and maintaining system health.


    5. **Interoperability:** The resource model facilitates interoperability between
    different components within the Kubernetes ecosystem. Resources defined in a standard
    way can be easily'
  merge: -1
  pgno: 103
- img_proc: true
  md: 'understood and manipulated by various tools and operators, enhancing the ecosystem''s
    richness and utility.


    +   6. **Access Control and Policy Enforcement:** Kubernetes can uniformly apply
    access controls, policies, and quotas across all resources. This ensures security,
    compliance, and efficient resource usage across the entire cluster, irrespective
    of the type of resource or its purpose within the system.


    In essence, modeling everything as a resource in Kubernetes provides a uniform,
    extensible, and manageable way to automate the deployment, scaling, and operation
    of containerized applications. It lays the foundation for Kubernetes'' powerful
    orchestration capabilities, making it easier for users to describe complex systems
    declaratively and have Kubernetes maintain those systems'' desired states over
    time.


