    \ Wed, 14 Feb 2024 16:03:00 GMT\nConnection: keep-alive\nETag: \"65cce434-267\"\
    \nAccept-Ranges: bytes\n```\n\n```\nlocal-laptop $ curl -I http://139.59.2.214:30007\n\
    HTTP/1.1 200 OK\nServer: nginx/1.25.4\nDate: Thu, 22 Feb 2024 08:12:01 GMT\nContent-Type:\
    \ text/html\nContent-Length: 615\nLast-Modified: Wed, 14 Feb 2024 16:03:00 GMT\n\
    Connection: keep-alive\nETag: \"65cce434-267\"\nAccept-Ranges: bytes\n```\n\n\
    Finally, let's have a look at **LoadBalancer** service type.\n\nA **LoadBalancer**\
    \ Service exposes the Nginx application externally through a cloud provider's\
    \ load balancer (in our case, the [DigitalOcean Load Balancer](https://www.digitalocean.com/)).\
    \ The cloud provider automatically assigns an external IP address to the service,\
    \ enabling external access to the application.\n\n![](img/91c4bde832e221ba5bc429caf9587286_202_0.png)\n\
    \n## Load balancer service\n\n```\napiVersion: v1\nkind: Service\nmetadata:\n\
    \  name: nginx-loadbalancer\nspec:\n  selector:\n    app: nginx\n  ports:\n  \
    \  - port: 80\n  type: LoadBalancer # (1)\n```\n\n(1) -> Internally, it's resolved\
    \ at **nginx-loadbalancer.<namespace>.svc.cluster.local**, and externally, it's\
    \ accessed through the load balancer's IP or hostname.\n\nLet's create this service.\n\
    \n```\n$ kubectl apply -f svc-loadbalancer.yaml\nservice/nginx-loadbalancer created\n\
    ```\n\n```\n$ kubectl get svc\nNAME                TYPE        CLUSTER-IP    \
    \  EXTERNAL-IP   PORT(S)   AGE\nkubernetes          ClusterIP   10.245.0.1   \
    \   <none>        443/TCP   3d8h\nnginx-clusterip     ClusterIP   10.245.216.117\
    \  <none>        80/TCP    51m\nnginx-loadbalancer  LoadBalancer 10.245.178.209\
    \ <pending>     80:30919/TCP 9s\nnginx-nodeport      NodePort    10.245.196.9\
    \    <none>        80:30007/TCP 15m\n```\n\nYou can see that the **EXTERNAL-IP**\
    \ column for our LoadBalancer service is in **<pending>** state. The cloud provider\
    \ (DigitalOcean in our case) tries to create a load balancer cloud resource (not\
    \ a Kubernetes resource) and assigns it to our service.\n\n```\n$ kubectl describe\
    \ svc nginx-loadbalancer\n...\n\nEvents:\nType    Reason              Age   From\
    \               Message\n----    ------              ----  ----              \
