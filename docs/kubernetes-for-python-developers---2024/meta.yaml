    headers (e.g., **Host**) and path to determine how it should be routed according
    to the Ingress rules. The Controller then forwards the request to the appropriate
    backend service(s) within the cluster, based on the matching Ingress rule.


    In addition to this, Ingress Controllers can manage SSL/TLS termination for the
    services in the cluster. This means that the Ingress Controller decrypts incoming
    HTTPS traffic and then forwards it as HTTP to the backend services, offloading
    the SSL/TLS workload from the services themselves.


    Beyond basic routing, Ingress Controllers can offer advanced features like URL
    rewriting, sticky sessions, WebSockets support, rate limiting, and integration
    with authentication and authorization services.


    Let''s install nginx ingress controller, a popular ingress controller in our cluster.


    ```

    $ kubectl apply -f https://raw.githubusercontent.com/kubernetes/ingress-nginx/controller-v1.10.0/deploy/static/provider/cloud/deploy.yaml

    namespace/ingress-nginx created

    ```'
