    # Pods


    Pods are the smallest deployable units in Kubernetes, encapsulate one or more
    containers that share storage, network, and specifications on how to run the containers.
    We will breakdown that sentence in a bit. Just imagine for now that a pod is a
    collection of 1 or more containers which can be deployed in a Kubernetes cluster.


    Why are pods, rather than individual containers, considered the smallest deployable
    units? This design decision is based on a few key considerations that enhance
    the platform''s ability to manage applications in a distributed and scalable manner.
    Here''s why pods play such a crucial role in Kubernetes architecture:'
  merge: -1
