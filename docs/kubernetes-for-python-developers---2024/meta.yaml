    \ we hit the application URL,\n\n```\n$ kubectl port-forward deploy/flask-redis\
    \ 8080:8080 -n full-stack\nForwarding from 127.0.0.1:8080 -> 8080\nForwarding\
    \ from [::1]:8080 -> 8080\n```\n\n![](img/91c4bde832e221ba5bc429caf9587286_273_0.png)\n\
    \n## cache reset\n\nWe find that the count has been reset to **1** again. This\
    \ experiment shows the ephemeral nature of containers. Containers are designed\
    \ to be transient, which means any data stored inside a container's filesystem\
    \ is lost when the container stops or is deleted. This poses a challenge for applications\
    \ like Redis, a cache and store, which need to retain data across restarts and\
    \ deployments.\n\nIf this is the case, how do we use containers and Kubernetes\
    \ for anything stateful? That's where volumes come in.\n\nA **Persistent Volume\
    \ (PV)** in Kubernetes is a cluster-level resource that abstracts the details\
    \ of how storage is provided from how it is consumed. It represents a piece of\
    \ storage in the cluster that has been provisioned by an administrator or dynamically\
    \ provisioned using Storage Classes (we will see what that term means shortly).\
    \ PVs are intended for use by applications requiring persistent storage that outlives\
    \ the lifespan of individual Pods.\n\nA **Persistent Volume Claim (PVC)** is a\
    \ namespaced resource Pods use to request and consume PV resources. We will see\
    \ how PVCs allow developers to abstract the details of the underlying storage\
    \ infrastructure, enabling them to focus on the application's needs rather than\
    \ the specifics of how storage is provided.\n\nBut we are getting a bit ahead\
    \ of ourselves. Let's illustrate the needs for PVCs and PVs by manually creating\
    \ PVs and the underlying storage first.\n\nPersistent Volumes (PVs) in Kubernetes\
    \ are modeled as cluster-level resources for several foundational reasons, each\
    \ aligning with Kubernetes' design principles and the needs of managing storage\
    \ in a distributed, multi-tenant environment. Here's why:\n\n## Abstraction and\
    \ Decoupling\n\nPVs provide an abstraction layer over the underlying storage infrastructure.\
    \ This decoupling allows developers and administrators to work with storage without\
    \ needing to know the details of the underlying storage implementation (be it\
    \ cloud block storage, NFS, iSCSI, etc.). As cluster-level resources, PVs can\
    \ be provisioned, managed, and allocated independently of the individual Pods\
    \ and applications that use them, promoting a clean separation of concerns.\n\n\
    ## Shared Resource Management\n\nStorage is typically a shared resource in a cluster,\
    \ potentially used by multiple applications and namespaces. Modeling PVs as cluster-level\
    \ resources fits this paradigm, enabling centralized management, allocation, and\
    \ recycling of storage resources. This approach simplifies the task of managing\
    \ storage lifecycles and capacities at the scale of the cluster, rather than at\
    \ the more granular level of individual Pods or containers.\n\n## Dynamic Provisioning\
    \ and Portability\n\nDynamic provisioning of PVs allows for the automatic creation\
    \ of storage resources as needed by Persistent Volume Claims (PVCs). This system-wide\
    \ feature necessitates that PVs be cluster-level to efficiently match PVCs from\
    \ various namespaces to appropriate storage resources. Additionally, the abstraction\
    \ provided by PVs enhances the portability of applications across clusters by\
    \ standardizing how storage resources are requested and consumed, regardless of\
    \ the underlying infrastructure.\n\n## Access Control and Security\n\nKubernetes'\
    \ role-based access control (RBAC) can be applied to PVs as cluster-level resources,\
    \ enabling fine-grained control over who can create, view, or delete PVs. This\
    \ level of control is crucial in multi-tenant environments where different teams\
    \ or users may have varying levels of access and permissions. It ensures that\
    \ sensitive storage resources are adequately protected and only accessible by\
    \ authorized entities.\n\n## Consistency with Other Cluster Resources\n\nKubernetes\
    \ models other infrastructure components, such as Nodes and PersistentVolumeClaims,\
    \ as cluster-level resources. This consistency simplifies understanding and working\
    \ with the Kubernetes API, as the same patterns of interaction apply across different\
    \ types of resources. It also facilitates the development of higher-level orchestration\
    \ and management tools that operate across the entire cluster.\n\nIn a DigitalOcean\
    \ Kubernetes cluster, you might leverage Digitalocean Block storage (https://docs.digitalocean.com/glossary/block-storage/)\
    \ as a persistent storage solution for your applications. But before we create\
    \ a persistent volume out of a block storage instance, we first have to create\
    \ that instance.\n\nHere's the command to do that:\n\n```\n$ doctl compute volume\
    \ create cache --fs-type ext4 --region blr1 --size 2GiB\nID                  \
    \                  Name   Size  Region Filesystem Type Filesystem Label Droplet\
    \ IDs Tags\nd5716c46-d22a-11ee-b619-0a58ac14b586  cache  2 GiB blr1   ext4\n```\n\
    \nThis command creates a block storage called **cache**, with the **ext4** filesystem,\
    \ of size **2GiB** in the **blr1** region (because that's where I created my Kubernetes\
    \ cluster too). Please change the command to suit your region. Make a note of\
