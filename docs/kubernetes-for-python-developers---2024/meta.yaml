  md: '# # Chapter 1: The meta stuff


    # ## The audience of this book


    If you''re a Python developer eager to learn Kubernetes, or just curious about
    it, this book is tailor-made for you. I assume that you have no prior knowledge
    of Kubernetes, although it doesn''t hurt if you know something about it.


    That said, developers who come from other languages like PHP, Ruby/Rails, Golang,
    Node.js etc. will also find this book useful. I wanted to use a specific stack/programming
    language throughout the book so that I don''t distract you, the reader, by giving
    examples of different concepts in different stacks. I plan to release other language
    specific editions of this book(as in Kubernetes for PHP devs, Kubernetes for Node.js
    devs etc.) if there is enough interest. Please email me at [lakshmi@lakshminp.com](mailto:lakshmi@lakshminp.com)
    or consider signing up for updates to this book at [https://www.lakshminp.com/kubernetes-for-python-developers/](https://www.lakshminp.com/kubernetes-for-python-developers/).


    If you are a devops engineer, you will learn a perspective or two about the other
    side of the river, i.e. the application context and what goes into containerizing,
    deploying and maintaining an application in Kubernetes. I won''t be talking about
    the ops side of Kubernetes(eg. how to spin up Kubernetes clusters using infra-as-code,
    how to upgrade clusters without downtime etc.), as that is a topic for a whole
    new book altogether.'
  merge: -1
  pgno: 22
- img_proc: true
  md: '# Code examples


    The code examples for each chapter in the book can be found at [https://github.com/badri/kubernetes-for-python-devs](https://github.com/badri/kubernetes-for-python-devs).


    The final chapter contains a CD pipeline and a separate repository, which can
    be found at [https://github.com/badri/flask-redis-cd](https://github.com/badri/flask-redis-cd).


    # Why developers should learn Kubernetes


    I need not sell you on how popular Kubernetes is or how it has fundamentally transformed
    how applications are deployed, scaled, and managed in the cloud. But why should
    you, as a developer learn it? There is already someone in your organization who
    does this, so why bother?


    It arms you with a deep understanding of modern, cloud-native architectures, enabling
    the design of resilient, scalable, and highly available systems. For Python developers,
    who are the main audience of this book, working with web frameworks like Django
    or Flask, Kubernetes simplifies the process of containerizing applications and
    managing environment-specific configurations through ConfigMaps and Secrets, making
    your applications more portable and easier to manage across different environments.
    Overall, it will make you a better developer. To quote Paul Graham from his essay
    Beating the Averages([https://paulgraham.com/avg.html](https://paulgraham.com/avg.html)),'
  merge: -1
  pgno: 23
- img_proc: true
  md: '> Lisp is worth learning for the profound enlightenment experience you will
    have when you finally get it; that experience will make you a better programmer
    for the rest of your days, even if you never actually use Lisp itself a lot.


    He talks about why learning the Lisp programming language will make you a better
    developer, even though you actually won''t end up using Lisp on a regular basis,
    like your day job. The only difference in our case is, you will very much use
    Kubernetes in your day job.


    Moreover, Kubernetes is widely adopted across the industry, with support from
    cloud providers like AWS, Google Cloud, and Azure, ensuring that skills in Kubernetes
    are highly relevant and in demand. By mastering Kubernetes, you can increase your
    marketability, open up new career opportunities, and contribute more effectively
    to your organizations'' digital transformation strategies. In essence, learning
    Kubernetes is not just about keeping up with the latest technology trends; it''s
    about empowering yourself with the tools and methodologies needed to build the
    next generation of web applications.


    # What we will build


    In this book, we embark on an exciting journey to bridge the world of Python development
    with the powerful orchestration capabilities of Kubernetes. Our adventure culminates
    in the creation of a dynamic, scalable Flask-based application, enhanced with
    the resilience and flexibility that Kubernetes brings to the table. Here''s what
    awaits you:'
  merge: -1
  pgno: 24
- img_proc: true
  md: '**A Flask Application:** We''ll start with the basics—developing a simple yet
    functional Flask application. This Python web application will serve as the cornerstone
    of our exploration, offering a familiar starting point for Python developers.
    As we progress, you''ll see how even the simplest application can benefit from
    Kubernetes.


    **Containerization with Docker:** Next, we''ll containerize our Flask application,
    encapsulating it within a Docker container. This step is crucial for understanding
    how applications are prepared for deployment in a Kubernetes environment, ensuring
    consistency across different environments and simplifying deployment processes.


    **Deployment to Kubernetes:** It''s time to deploy our application to Kubernetes.
    You''ll learn how to define and manage deployments, allowing our Flask application
    to be seamlessly deployed, managed, and scaled within the Kubernetes ecosystem.
    This includes creating and configuring Pods, Deployments, and Services to ensure
    our application is accessible and scalable.


    **Advanced Kubernetes Features:** As our application grows more complex, we''ll
    introduce Redis for storing state, illustrating how stateful applications operate
    within Kubernetes. You''ll get hands-on experience with persistent storage, secret
    management, and configuring inter-service communication, embodying real-world
    application needs.


    **Continuous Deployment (CD):** Finally, we''ll automate the deployment process
    using GitHub Actions, achieving a Continuous Deployment pipeline that takes your
    code from git push to a deployed application in Kubernetes, showcasing the best
    practices in DevOps.'
