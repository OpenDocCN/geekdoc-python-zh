  md: "**Associating secrets with pods** When we create a sevice account, we can add\
    \ existing secrets to that account in the YAML artifact. Then, we associate the\
    \ service account with a pod. This association is particularly useful for automating\
    \ the process of making credentials available to applications running inside pods\
    \ without hardcoding sensitive information. Kubernetes automatically mounts these\
    \ secrets into pods using the specified service account, providing a secure way\
    \ to store and manage sensitive information such as database passwords, API keys,\
    \ and SSH keys.\n\nHere's an example of a service account with a secret.\n\n```\n\
    apiVersion: v1\nkind: ServiceAccount\nmetadata:\n  name: my-service-account\n\
    secrets:\n- name: my-secret\n```\n\nWe will see a more detailed example of this.\
    \ Before that, we will associate a pod with the **test** service account and inspect\
    \ what happens.\n\n```\napiVersion: v1\nkind: Pod\nmetadata:\n  name: service-account-test-pod\
    \ # (1)\nspec:\n  containers:\n```"
