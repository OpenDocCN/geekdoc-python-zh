    # Multiple containers in a pod


    Before we run multiple containers in a pod, let''s briefly go through the concept
    of container ports.


    In a Kubernetes Pod specification, the **containerPort** parameter is part of
    the container spec. It declares a port that the container listens on. While this
    declaration is not mandatory for a container to open a port, it serves several
    purposes:


    **Documentation**: It documents the ports that the container is expected to listen
    on, making the Pod''s configuration clearer to developers and operators who inspect
    the Pod spec.


    **Service Discovery**: In conjunction with services, **containerPort** can be
    used to simplify service discovery within the Kubernetes cluster. When a Service
    selects a Pod, the **containerPort** can be used to direct traffic to the correct
    port on the Pod''s containers, which we will see in later chapters.


    **Security**: In environments that enforce network policies, specifying **containerPort**
    can be a part of defining and enforcing security rules that control ingress and
    egress traffic to and from Pods.


    Let''s try to run 2 nginx containers in the same pod. Here''s the YAML spec for
    the same.


    ```

    apiVersion: v1

    kind: Pod

    metadata:

    ```'
