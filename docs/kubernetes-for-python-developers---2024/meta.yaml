- md: "## Creating service accounts\n\nWe will stick to service accounts only as it\
    \ is good enough to deploy a working application in production. Working with human\
    \ users and Kubernetes is a vast topic and deserves a book of its own.\n\nA service\
    \ account is a namespaced resource in Kubernetes. This means that service accounts\
    \ are defined and operate within the scope of a specific namespace. Each service\
    \ account is tied to a namespace and can be used to grant permissions for operations\
    \ within that namespace, allowing for fine-grained access control and limiting\
    \ the scope of what processes running in pods can access or modify.\n\nCreating\
    \ a service account is a simple command.\n\n```\n$ kubectl create serviceaccount\
    \ test -n robust-setup\nserviceaccount/test created\n```\n\nThat's it. We created\
    \ a service account in the **robust-setup** namespace. But this is a toothless\
    \ artifact, for now. It doesn't tell us about what this service account can or\
    \ cannot do. Let's define that part now. First, we have to define what kind of\
    \ \"role\" it can have. For this, we create a **Role** artifact.\n\nA **Role**\
    \ is a Kubernetes resource which specifies rules that represent a set of permissions.\
    \ These permissions include actions like get, list, create, update, delete, etc.,\
    \ on resources such as pods, services, deployments, and more. The rules within\
    \ a Role determine what actions are allowed on which resources, providing fine-grained\
    \ control over access within a namespace.\n\nHere's a simple role which allows\
    \ read operations on pods.\n\n```\napiVersion: rbac.authorization.k8s.io/v1\n\
    kind: Role\nmetadata:\n  name: pod-reader # (1)\nrules:\n- apiGroups: [\"\"] #\
    \ (2)\n  resources: [\"pods\"] # (3)\n  verbs: [\"get\", \"watch\", \"list\"]\
    \ # (4)\n```\n\n(1) -> Name of the role. Something meaningful.\n\n(2) -> Which\
    \ API group the resources controlled by the role belong to. We have defined an\
    \ empty string, \"\", which implies the core API group. This is what pods, services,\
    \ deployments etc. belong to.\n\n(3) -> List of resources the permissions apply\
    \ to. For now, it's only pods.\n\n(4) -> What operations we can do with the resources.\n\
    \nWe create the role in the **robust-setup** namespace.\n\n```\n$ kubectl apply\
    \ -f pod-reader-role.yaml -n robust-setup\nrole.rbac.authorization.k8s.io/pod-reader\
    \ created\n```\n\nWe have a service account, and we have a role now. But there\
    \ is no way Kubernetes knows that it has to \"bind\" the **pod-reader** role to\
    \ **test** service account. To do this, we create a **RoleBinding** artifact.\n\
    \nHere's an example of a **RoleBinding** that binds the **pod-reader** Role to\
    \ a service account named **test**:\n\n```\napiVersion: rbac.authorization.k8s.io/v1\
    \ # (1)\nkind: RoleBinding # (2)\nmetadata:\n  name: read-pods # (3)\nsubjects:\n\
    - kind: ServiceAccount # (4)\n  name: test # (5)\nroleRef:\n  kind: Role # (6)\n\
    \  name: pod-reader # (7)\n  apiGroup: rbac.authorization.k8s.io # (8)\n```\n\n\
    (1) -> Specifies the API version for the RoleBinding resource within the RBAC\
    \ authorization API group.\n\n(2) -> Defines the resource type as a RoleBinding,\
    \ which grants permissions defined in a Role to a set of subjects.\n\n(3) -> The\
    \ name of the role binding.\n\n(4) -> Identifies the kind of subject the Role\
    \ is being bound to; in this case, a ServiceAccount. Other possible values: **User**,\
    \ **Group** for binding roles to individual users or groups. We won't be discussing\
    \ those in the book.\n\n(5) -> Specifies the name of the ServiceAccount (**test**)\
    \ to which the Role is bound.\n\n(6) -> Indicates the kind of role referenced;\
    \ here, it is a Role for namespace-scoped permissions. This could also be **ClusterRole**,\
    \ as we will see later in this section.\n\n(7) -> The name of the Role (**pod-reader**)\
    \ that defines the permissions being granted.\n\n(8) -> Specifies the API group\
    \ for the referenced Role, confirming it's part of the RBAC API group. Generally,\
    \ for RoleBindings, this remains **rbac.authorization.k8s.io**, as it references\
    \ RBAC resources.\n\nService accounts and RBAC\n\nLet's create this resource object.\n\
    \n```\n$ kubectl apply -f pod-reader-role-binding.yaml -n robust-setup\nrolebinding.rbac.authorization.k8s.io/read-pods\
    \ created\n```\n\nLet's take this service account for a spin now. To do that,\
    \ we have to issue kubectl commands \"as\" that service account. Kubernetes helps\
    \ you to do that using tokens.\n\nA Kubernetes JSON Web Token (JWT) is a compact,\
    \ URL-safe means of representing claims to be transferred between two parties.\
    \ In the context of Kubernetes, JWTs are used extensively for authentication purposes,\
    \ especially with service accounts.\n\n## Components of a Kubernetes JWT\n\nA\
    \ JWT typically consists of three parts, separated by dots (.):\n\n**Header:**\
    \ The header typically consists of two parts: the type of token, which is JWT,\
    \ and the signing algorithm being used, such as HMAC SHA256 or RSA.\n\n**Payload:**\
    \ The payload contains the claims. Claims are statements about an entity (typically,\
    \ the user) and additional metadata. In Kubernetes, the payload often includes\
    \ information about the service account (like its name and namespace), the issuer\
    \ of the token, and the scope of access.\n\n**Signature:** To create the signature\
    \ part, the encoded header, the encoded payload, a secret, the algorithm specified\
    \ in the header are used to sign the token. This ensures that the token hasn't\
    \ been altered after it was issued.\n\n## Usage in Kubernetes\n\n**Authentication:**\
    \ Kubernetes uses JWTs for authenticating service accounts to the Kubernetes API.\
    \ When a pod that is associated with a service account makes a request to the\
    \ Kubernetes API, it attaches the JWT token as a bearer token in the Authorization\
    \ header of the HTTP request.\n\n**Service Accounts:** Each service account in\
    \ Kubernetes automatically gets a JWT token generated and assigned to it. This\
    \ token can be found within the pod at /var/run/secrets/kubernetes.io/serviceaccount/token\
    \ and is used by applications running inside the pod to authenticate with the\
    \ Kubernetes API.\n\n**Security:** The JWT token allows Kubernetes to verify the\
    \ identity of the requestor without needing to query an external authentication\
    \ service each time. The signature of the JWT ensures that the token hasn't been\
    \ tampered with.\n\nLet's generate a token for our service account.\n\n```\n$\
    \ kubectl create token test --duration=600s -n robust-setup > token.txt\n```\n\
    \nThis command creates a token for the **test** service account which is valid\
    \ for 10 minutes (At the time of writing this, this was the minimum duration value\
    \ we could give). The generated token is written to a **token.txt** file.\n\n\
    Let's decode this JWT token and find out more about it. You can decode it yourself\
    \ by pasting the token at [jwt.io](https://jwt.io).\n\nThe header part indicates\
    \ what algorithm it uses.\n\n```\n{\n  \"alg\": \"RS256\",\n  \"kid\": \"quaAkoqCy2G-lp-YZYGv1UCJZnW1EcPZiCrDb197uZo\"\
    \n}\n```\n\nThe payload part is of more interest to us.\n\n```\n{\n  \"aud\":\
    \ [\n    \"system:konnectivity-server\"\n  ],\n  \"exp\": 1709302847, // (1)\n\
    \  \"iat\": 1709302247,\n  \"iss\": \"https://kubernetes.default.svc.cluster.local\"\
    , // (2)\n  \"kubernetes.io\": {\n    \"namespace\": \"robust-setup\", // (3)\n\
    \    \"serviceaccount\": {\n      \"name\": \"test\", // (4)\n      \"uid\": \"\
    67a83c4d-e55d-4c4d-821e-0f5acbff094e\"\n    }\n  },\n  \"nbf\": 1709302247,\n\
    \  \"sub\": \"system:serviceaccount:robust-setup:test\" // (5)\n}\n```\n\n(1)\
    \ -> The expiration time (exp) of the token, indicating when the token will become\
    \ invalid (Unix timestamp).\n\n(2) -> The issuer (iss) of the token, identifying\
    \ the authority that issued the token; here, it's the Kubernetes API server.\n\
    \n(3) -> Specifies the Kubernetes namespace in which the service account associated\
    \ with this token is located.\n\n(4) -> The name of the Kubernetes service account\
    \ to which the token was issued.\n\n(5) -> The subject (sub) of the token, typically\
    \ identifying the principal that is the subject of the JWT; here, it represents\
    \ the service account in the format system:serviceaccount:<namespace>:<service\
    \ account name>.\n\nThe Kubernetes API server is the primary consumer of these\
    \ tokens. When a pod or external entity makes a request to the Kubernetes API,\
    \ it can authenticate itself using a service account token. The API server validates\
    \ the token to ensure it's valid and hasn't expired, then uses the information\
    \ in the token (like the service account name and namespace) to enforce access\
    \ control policies based on the role bindings associated with the service account.\n\
    \nLet's make a request to our cluster with this token.\n\n```\n$ export KUBE_TOKEN=$(cat\
    \ token.txt) # (1)\n$ kubectl --token=$KUBE_TOKEN get pods # (2)\nError from server\
    \ (Forbidden): pods is forbidden: User \"system:serviceaccount:robust-setup:test\"\
    \ cannot list resource \"pods\" in API group \"\" in the namespace \"default\"\
    \n```"
  mdcn: "## 创建服务账户\n\n我们将只关注服务账户，因为它足以在生产环境中部署一个可运行的应用程序。处理人类用户和 Kubernetes 是一个庞大的主题，值得单独写一本书。\n\
    \n服务账户是 Kubernetes 中的一个命名空间资源。这意味着服务账户是在特定命名空间的范围内定义和操作的。每个服务账户都绑定到一个命名空间，可用于授予在该命名空间内操作的权限，从而实现细粒度的访问控制，并限制\
    \ Pod 中运行的进程可以访问或修改的范围。\n\n创建服务账户是一个简单的命令。\n\n```\n$ kubectl create serviceaccount\
    \ test -n robust-setup\nserviceaccount/test created\n```\n\n就这样。我们在 **robust-setup**\
    \ 命名空间中创建了一个服务账户。但目前，这是一个没有权限的实体。它没有告诉我们这个服务账户能做什么或不能做什么。现在让我们来定义这部分。首先，我们必须定义它可以拥有什么样的“角色”。为此，我们创建一个\
    \ **Role** 资源对象。\n\n**Role** 是一个 Kubernetes 资源，它指定了代表一组权限的规则。这些权限包括对 Pod、Service、Deployment\
    \ 等资源执行 get、list、create、update、delete 等操作。Role 中的规则决定了允许对哪些资源执行哪些操作，从而提供对命名空间内访问的细粒度控制。\n\
    \n这是一个允许对 Pod 进行读取操作的简单角色。\n\n```\napiVersion: rbac.authorization.k8s.io/v1\n\
    kind: Role\nmetadata:\n  name: pod-reader # (1)\nrules:\n- apiGroups: [\"\"] #\
    \ (2)\n  resources: [\"pods\"] # (3)\n  verbs: [\"get\", \"watch\", \"list\"]\
    \ # (4)\n```\n\n(1) -> 角色的名称。应具有意义。\n\n(2) -> 角色控制的资源所属的 API 组。我们定义了一个空字符串 `\"\
    \"`，这表示核心 API 组。Pod、Service、Deployment 等都属于这个组。\n\n(3) -> 权限适用的资源列表。目前，只有 Pod。\n\
    \n(4) -> 我们可以对资源执行的操作。\n\n我们在 **robust-setup** 命名空间中创建这个角色。\n\n```\n$ kubectl\
    \ apply -f pod-reader-role.yaml -n robust-setup\nrole.rbac.authorization.k8s.io/pod-reader\
    \ created\n```\n\n我们现在有了一个服务账户和一个角色。但 Kubernetes 并不知道它需要将 **pod-reader** 角色“绑定”到\
    \ **test** 服务账户。为此，我们创建一个 **RoleBinding** 资源对象。\n\n这是一个将 **pod-reader** Role 绑定到名为\
    \ **test** 的服务账户的 **RoleBinding** 示例：\n\n```\napiVersion: rbac.authorization.k8s.io/v1\
    \ # (1)\nkind: RoleBinding # (2)\nmetadata:\n  name: read-pods # (3)\nsubjects:\n\
    - kind: ServiceAccount # (4)\n  name: test # (5)\nroleRef:\n  kind: Role # (6)\n\
    \  name: pod-reader # (7)\n  apiGroup: rbac.authorization.k8s.io # (8)\n```\n\n\
    (1) -> 指定 RBAC 授权 API 组中 RoleBinding 资源的 API 版本。\n\n(2) -> 将资源类型定义为 RoleBinding，它将\
    \ Role 中定义的权限授予一组主体。\n\n(3) -> 角色绑定的名称。\n\n(4) -> 标识 Role 被绑定到的主体类型；在本例中是 ServiceAccount。其他可能的值：**User**、**Group**，用于将角色绑定到单个用户或组。我们不会在本书中讨论这些。\n\
    \n(5) -> 指定 Role 绑定到的 ServiceAccount（**test**）的名称。\n\n(6) -> 指示引用的角色类型；这里是一个用于命名空间范围权限的\
    \ Role。正如我们将在本节后面看到的，这也可以是 **ClusterRole**。\n\n(7) -> 定义被授予权限的 Role（**pod-reader**）的名称。\n\
    \n(8) -> 指定被引用 Role 的 API 组，确认它是 RBAC API 组的一部分。通常，对于 RoleBinding，这始终是 **rbac.authorization.k8s.io**，因为它引用的是\
    \ RBAC 资源。\n\n服务账户与 RBAC\n\n让我们创建这个资源对象。\n\n```\n$ kubectl apply -f pod-reader-role-binding.yaml\
    \ -n robust-setup\nrolebinding.rbac.authorization.k8s.io/read-pods created\n```\n\
    \n现在让我们来测试一下这个服务账户。为此，我们必须以该服务账户的身份发出 kubectl 命令。Kubernetes 使用令牌来帮助你做到这一点。\n\n\
    Kubernetes JSON Web Token (JWT) 是一种紧凑、URL 安全的方式，用于表示要在双方之间传输的声明。在 Kubernetes 的上下文中，JWT\
    \ 被广泛用于身份验证，特别是与服务账户一起使用。\n\n## Kubernetes JWT 的组成部分\n\nJWT 通常由三个部分组成，用点（.）分隔：\n\
    \n**Header（头部）：** 头部通常由两部分组成：令牌类型（即 JWT）和使用的签名算法，例如 HMAC SHA256 或 RSA。\n\n**Payload（负载）：**\
    \ 负载包含声明。声明是关于实体（通常是用户）和附加元数据的陈述。在 Kubernetes 中，负载通常包含有关服务账户的信息（如其名称和命名空间）、令牌的颁发者以及访问范围。\n\
    \n**Signature（签名）：** 要创建签名部分，需要使用编码后的头部、编码后的负载、一个密钥以及头部中指定的算法来对令牌进行签名。这确保了令牌在颁发后未被篡改。\n\
    \n## 在 Kubernetes 中的使用\n\n**身份验证：** Kubernetes 使用 JWT 对服务账户进行身份验证以访问 Kubernetes\
    \ API。当与服务账户关联的 Pod 向 Kubernetes API 发出请求时，它会在 HTTP 请求的 Authorization 头中附加 JWT\
    \ 令牌作为持有者令牌。\n\n**服务账户：** Kubernetes 中的每个服务账户都会自动生成并分配一个 JWT 令牌。可以在 Pod 内的 `/var/run/secrets/kubernetes.io/serviceaccount/token`\
    \ 路径找到此令牌，Pod 内运行的应用程序使用它来向 Kubernetes API 进行身份验证。\n\n**安全性：** JWT 令牌允许 Kubernetes\
    \ 验证请求者的身份，而无需每次都查询外部身份验证服务。JWT 的签名确保了令牌未被篡改。\n\n让我们为我们的服务账户生成一个令牌。\n\n```\n$\
    \ kubectl create token test --duration=600s -n robust-setup > token.txt\n```\n\
    \n此命令为 **test** 服务账户创建一个有效期为 10 分钟的令牌（在撰写本文时，这是我们可以设置的最小持续时间值）。生成的令牌被写入 **token.txt**\
    \ 文件。\n\n让我们解码这个 JWT 令牌并了解更多关于它的信息。你可以通过将令牌粘贴到 [jwt.io](https://jwt.io) 来自行解码。\n\
    \n头部部分指明了它使用的算法。\n\n```\n{\n  \"alg\": \"RS256\",\n  \"kid\": \"quaAkoqCy2G-lp-YZYGv1UCJZnW1EcPZiCrDb197uZo\"\
    \n}\n```\n\n负载部分更值得关注。\n\n```\n{\n  \"aud\": [\n    \"system:konnectivity-server\"\
    \n  ],\n  \"exp\": 1709302847, // (1)\n  \"iat\": 1709302247,\n  \"iss\": \"https://kubernetes.default.svc.cluster.local\"\
    , // (2)\n  \"kubernetes.io\": {\n    \"namespace\": \"robust-setup\", // (3)\n\
    \    \"serviceaccount\": {\n      \"name\": \"test\", // (4)\n      \"uid\": \"\
    67a83c4d-e55d-4c4d-821e-0f5acbff094e\"\n    }\n  },\n  \"nbf\": 1709302247,\n\
    \  \"sub\": \"system:serviceaccount:robust-setup:test\" // (5)\n}\n```\n\n(1)\
    \ -> 令牌的过期时间（exp），指示令牌何时失效（Unix 时间戳）。\n\n(2) -> 令牌的颁发者（iss），标识颁发令牌的机构；这里是 Kubernetes\
    \ API 服务器。\n\n(3) -> 指定与此令牌关联的服务账户所在的 Kubernetes 命名空间。\n\n(4) -> 令牌颁发给的 Kubernetes\
    \ 服务账户的名称。\n\n(5) -> 令牌的主题（sub），通常标识作为 JWT 主体的实体；这里它以 `system:serviceaccount:<namespace>:<service\
    \ account name>` 的格式表示服务账户。\n\nKubernetes API 服务器是这些令牌的主要消费者。当 Pod 或外部实体向 Kubernetes\
    \ API 发出请求时，它可以使用服务账户令牌进行身份验证。API 服务器验证令牌以确保其有效且未过期，然后使用令牌中的信息（如服务账户名称和命名空间）来执行基于与该服务账户关联的角色绑定的访问控制策略。\n\
    \n让我们使用这个令牌向我们的集群发出请求。\n\n```\n$ export KUBE_TOKEN=$(cat token.txt) # (1)\n$ kubectl\
    \ --token=$KUBE_TOKEN get pods # (2)\nError from server (Forbidden): pods is forbidden:\
    \ User \"system:serviceaccount:robust-setup:test\" cannot list resource \"pods\"\
    \ in API group \"\" in the namespace \"default\"\n```"
