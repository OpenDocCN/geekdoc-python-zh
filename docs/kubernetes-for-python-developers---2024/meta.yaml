    \ use self-hosted runners for specialized environments or to leverage specific\
    \ hardware.\n\n# How GitHub Actions Work\n\nWhen an event occurs in a GitHub repository,\
    \ such as a push to the main branch, GitHub Actions looks for workflow files that\
    \ are triggered by that event. The platform then queues jobs defined in the workflow,\
    \ allocating them to available runners based on the specified operating system\
