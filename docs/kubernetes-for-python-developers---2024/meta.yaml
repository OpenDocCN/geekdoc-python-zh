    # Chapter 7: Going a notch further


    As we move forward, our journey into Kubernetes continues to unfold the layers
    of application management, focusing on enhancing security, configuration management,
    and ensuring data persistence. This chapter will introduce you to ConfigMaps and
    Secrets, two pivotal resources for externalizing configuration data and securely
    managing sensitive information. You''ll learn how to decouple configuration from
    application code, making your deployments more flexible and secure.


    Moreover, we''ll explore the power of Init Containers in preparing the environment
    for your application containers. Whether it''s waiting for a service to be ready,
    configuring permissions, or performing preliminary setup tasks, Init Containers
    offer a sequential, controlled approach to initializing your application''s environment.


    Lastly, we''ll tackle the critical aspect of data persistence in Kubernetes, with
    a focus on implementing persistence for Redis. Despite the ephemeral nature of
    containers, certain applications require data to persist beyond the lifecycle
    of individual Pods. We''ll delve into persistent volumes and claims, exploring
    how they can be used to ensure your Redis data remains intact and available, even
    as Pods are rescheduled or redeployed.


    # config maps


    ConfigMaps are Kubernetes objects used to store non-confidential data in key-value
    pairs. ConfigMaps allow you to separate your configurations from your Pod and
    container specifications, making your ap-'
- md: "## Why We Need ConfigMaps\n\n**Configuration Decoupling:** ConfigMaps decouple\
    \ configuration from container images, so you can change configurations without\
    \ touching the container's image. This simplifies the application deployment and\
    \ management process.\n\n**Environment Consistency:** They help maintain consistency\
    \ across different environments (development, testing, production) by allowing\
    \ you to apply environment-specific configurations without altering the application\
    \ code.\n\n**Configuration Management:** ConfigMaps provide a centralized way\
    \ to manage application configurations, which can be easily updated and deployed\
    \ without restarting the pods or services.\n\n## Our first configmap\n\nSuppose\
    \ you want to serve a custom **index.html** page with the Nginx pod. The path\
    \ of least resistance is to change index.html, test it locally, build a new container\
    \ image tag, push it to the container registry, and finally redeploy the tag.\
    \ This is a good approach, until it becomes cumbersome and tiring.\n\nLet's see\
    \ how to solve this with a configmap.\n\nFirst, create a ConfigMap that contains\
    \ the **index.html**.\n\nThis is the index.html file we want to make a configmap\
    \ out of.\n\n```html\n<!doctype html>\n<html>\n<head>\n  <meta charset=\"UTF-8\"\
    >\n  <meta name=\"viewport\" content=\"width=device-width, initial-scale=1.0\"\
    >\n  <title> Kubernetes for Python devs</title>\n  <script src=\"https://cdn.tailwindcss.com\"\
    ></script>\n</head>\n<body>\n  <h1 class=\"text-3xl font-bold underline\">\n \
    \   My first configmap\n  </h1>\n</body>\n</html>\n```\n\nNow, create a configmap\
    \ from this file.\n\nLet's create a new namespace devoted to this chapter.\n\n\
    ```bash\n$ kubectl create ns notch-further\nnamespace/notch-further created\n\
    ```\n\nand create the configmap there.\n\n```bash\n$ kubectl create configmap\
    \ nginx-config --from-file=index.html -n notch-further\nconfigmap/nginx-config\
    \ created\n```\n\n**nginx-config** is the name of the configmap, and the contents\
    \ of the configmap will be loaded from **index.html**, which is what the **--from-file**\
    \ flag does.\n\nLet's inspect the configmap we created.\n\n```bash\n$ kubectl\
    \ get configmap nginx-config -n notch-further -o yaml\napiVersion: v1 # (1)\n\
    data: # (2)\n  index.html: |\n    <!doctype html>\n    <html>\n    <head>\n  \
    \    <meta charset=\"UTF-8\">\n      <meta name=\"viewport\" content=\"width=device-width,\
    \ initial-scale=1.0\">\n      <title> Kubernetes for Python devs</title>\n   \
    \   <script src=\"https://cdn.tailwindcss.com\"></script>\n    </head>\n    <body>\n\
    \      <h1 class=\"text-3xl font-bold underline\">\n        My first configmap\n\
    \      </h1>\n    </body>\n    </html>\nkind: ConfigMap # (3)\nmetadata:\n  creationTimestamp:\
    \ \"2024-02-22T11:36:12Z\" # (4)\n  name: nginx-config\n  namespace: notch-further\n\
    \  resourceVersion: \"1056760\" # (5)\n  uid: ce499044-e349-4cb8-8f04-4fdce7b5d5d3\
    \ # (6)\n```\n\n(1) -> Specifies the API version for the ConfigMap resource, indicating\
    \ it's a stable version within the Kubernetes API.\n\n(2) -> Contains the data\
    \ stored in the ConfigMap, where each key-value pair represents a configuration\
    \ item. In this case, we have only 1 key-value pair. The key is the filename (**index.html**),\
    \ the value is the contents of the file. The | is YAML syntax for multiline strings.\n\
    \n(3) -> Identifies the Kubernetes resource type as a ConfigMap, used for storing\
    \ non-confidential data in key-value pairs.\n\n(4) -> Automatically generated\
    \ timestamp marking when the ConfigMap was created.\n\n(5) -> A unique version\
    \ identifier for the current state of the ConfigMap, used internally by Kubernetes\
    \ for tracking and concurrency control.\n\n(6) -> A unique identifier assigned\
    \ by Kubernetes to the ConfigMap for internal tracking and management.\n\n**Note**\
    \ that attributes (4), (5) and (6) are there for other Kubernetes resources as\
    \ well, like pods, services and deployments.\n\nWe've just created a configmap\
    \ that is floating in the void, not being used by any application for now. In\
    \ order to make it useful, we have to attach the configmap to a pod.\n\nThat's\
    \ exactly what we will do in this final step.\n\n```yaml\napiVersion: v1\nkind:\
    \ Pod\nmetadata:\n  name: nginx-pod\nspec:\n  containers:\n  - name: nginx\n \
    \   image: nginx\n    volumeMounts: # (1)\n    - name: config-volume # (2)\n \
    \     mountPath: /usr/share/nginx/html # (3)\n  volumes: # (4)\n  - name: config-volume\
    \ # (5)\n    configMap: # (6)\n      name: nginx-config # (7)\n```\n\n(1) -> Specifies\
    \ the volumes to be mounted into containers.\n\n(2) -> Identifies the volume to\
    \ mount, linking it to the volumes section. A container can have more than 1 value\
    \ in the **volumeMounts** section (e.g. another configmap mounted in a different\
    \ path).\n\n(3) -> The path within the container where the volume should be mounted.\n\
    \n(4) -> Defines the volumes available to be mounted by containers in the pod.\
    \ **Note** that this is a sibling of **spec**, not **containers**.\n\n(5) -> Names\
    \ the volume, used to reference it in **volumeMounts**.\n\n(6) -> Specifies that\
    \ the volume source is a ConfigMap.\n\n(7) -> The name of the ConfigMap to be\
    \ mounted as a volume.\n\n```bash\n$ kubectl apply -f nginx-with-configmap-1.yaml\
    \ -n notch-further\npod/nginx-pod created\n```\n\n## Check the pod\n\n```bash\n\
    $ kubectl port-forward pod/nginx-pod 8080:80 -n notch-further\nForwarding from\
    \ 127.0.0.1:8080 -> 80\nForwarding from [::1]:8080 -> 80\n```\n\n![My first configmap](img/91c4bde832e221ba5bc429caf9587286_225_0.png)\n\
    \n## Volumes and VolumeMounts\n\nIn the above Pod specification, we introduced\
    \ **volumes** and **volumeMounts** in the spec. Both serve complementary roles\
    \ in managing storage for containers within the Pod. Here's a breakdown of their\
    \ differences and how they work together:\n\n### volumes\n\nThe volumes field\
    \ in the Pod specification defines storage volumes that the Pod can use. This\
    \ storage can come from a variety of sources, like configmaps in the above case,\
    \ or persistent volume claims (PVCs), secrets, and others as we will learn in\
    \ later chapters. The volumes section is a part of the Pod specification and is\
    \ not specific to any individual container within the Pod.\n\nIts main purpose\
    \ is to declare storage volumes that will be made available to the containers\
    \ in the Pod. These volumes can hold application data, configuration files, secrets,\
    \ and other data that need to be shared between containers or persisted beyond\
    \ the lifecycle of the Pod.\n\nThe scope of volumes is at the **Pod level**. Once\
    \ defined, any container in the Pod can mount the declared volumes.\n\n### volumeMounts\n\
    \nThe volumeMounts field is part of a container's specification within a Pod.\
    \ It specifies how the volumes defined at the Pod level (in the volumes section)\
    \ are mounted into the filesystem of each container. It allows you to define the\
    \ mount path (where in the container's filesystem the volume will be available)\
    \ and other mount-related options.\n\nIts purpose is to make a specific volume\
    \ accessible to a container at a specified path, allowing the container to read\
    \ from and write to the volume.\n\nThe scope of volumeMounts is at the **container\
    \ level** within a Pod. Each container in a Pod can have its own volumeMounts\
    \ section, allowing it to mount any of the Pod's volumes to its own filesystem\
    \ paths.\n\n### How They Work Together\n\n**Define Volumes:** In the Pod spec,\
    \ you first define a list of volumes under the volumes field. This is where you\
    \ specify the type of volume (e.g., a PVC, secret, configmap) and the details\
    \ specific to that type.\n\n**Mount Volumes to Containers:** For each container\
    \ that needs access to a volume, you specify a volumeMounts section. Here, you\
    \ reference the volume by name (as defined in the volumes section) and specify\
    \ the mount path within the container.\n\n## Configmap from deployments\n\nCan\
    \ we configure configmaps from a deployment? Yes, we can. Here's the same configmap,\
    \ configured as a deployment.\n\n```yaml\napiVersion: apps/v1\nkind: Deployment\n\
    metadata:\n  name: nginx-deployment\nspec:\n  replicas: 3 # Specifies the number\
    \ of replicas\n  selector:\n    matchLabels:\n      app: nginx # This label is\
    \ used to select the Pods that the Deployment manages\n  template: # The template\
    \ field contains the Pod specification\n    metadata:\n      labels:\n       \
    \ app: nginx # Pod label, must match the selector above\n    spec:\n      containers:\n\
    ```"
  mdcn: "## 为什么我们需要 ConfigMap\n\n**配置解耦：** ConfigMap 将配置与容器镜像解耦，因此你可以在不修改容器镜像的情况下更改配置。这简化了应用程序的部署和管理流程。\n\
    \n**环境一致性：** 它们有助于在不同环境（开发、测试、生产）之间保持一致性，允许你应用特定于环境的配置，而无需修改应用程序代码。\n\n**配置管理：**\
    \ ConfigMap 提供了一种集中管理应用程序配置的方式，可以轻松更新和部署，而无需重启 Pod 或服务。\n\n## 我们的第一个 ConfigMap\n\
    \n假设你想用 Nginx Pod 提供一个自定义的 **index.html** 页面。最直接的方法是修改 index.html，在本地测试，构建新的容器镜像标签，将其推送到容器注册表，最后重新部署该标签。这是一个好方法，直到它变得繁琐和令人疲惫。\n\
    \n让我们看看如何用 ConfigMap 解决这个问题。\n\n首先，创建一个包含 **index.html** 的 ConfigMap。\n\n这是我们想要制作成\
    \ ConfigMap 的 index.html 文件。\n\n```html\n<!doctype html>\n<html>\n<head>\n  <meta\
    \ charset=\"UTF-8\">\n  <meta name=\"viewport\" content=\"width=device-width,\
    \ initial-scale=1.0\">\n  <title> Kubernetes for Python devs</title>\n  <script\
    \ src=\"https://cdn.tailwindcss.com\"></script>\n</head>\n<body>\n  <h1 class=\"\
    text-3xl font-bold underline\">\n    My first configmap\n  </h1>\n</body>\n</html>\n\
    ```\n\n现在，从这个文件创建一个 ConfigMap。\n\n让我们创建一个专门用于本章的新命名空间。\n\n```bash\n$ kubectl create\
    \ ns notch-further\nnamespace/notch-further created\n```\n\n并在那里创建 ConfigMap。\n\
    \n```bash\n$ kubectl create configmap nginx-config --from-file=index.html -n notch-further\n\
    configmap/nginx-config created\n```\n\n**nginx-config** 是 ConfigMap 的名称，ConfigMap\
    \ 的内容将从 **index.html** 加载，这就是 **--from-file** 标志的作用。\n\n让我们检查一下我们创建的 ConfigMap。\n\
    \n```bash\n$ kubectl get configmap nginx-config -n notch-further -o yaml\napiVersion:\
    \ v1 # (1)\ndata: # (2)\n  index.html: |\n    <!doctype html>\n    <html>\n  \
    \  <head>\n      <meta charset=\"UTF-8\">\n      <meta name=\"viewport\" content=\"\
    width=device-width, initial-scale=1.0\">\n      <title> Kubernetes for Python\
    \ devs</title>\n      <script src=\"https://cdn.tailwindcss.com\"></script>\n\
    \    </head>\n    <body>\n      <h1 class=\"text-3xl font-bold underline\">\n\
    \        My first configmap\n      </h1>\n    </body>\n    </html>\nkind: ConfigMap\
    \ # (3)\nmetadata:\n  creationTimestamp: \"2024-02-22T11:36:12Z\" # (4)\n  name:\
    \ nginx-config\n  namespace: notch-further\n  resourceVersion: \"1056760\" # (5)\n\
    \  uid: ce499044-e349-4cb8-8f04-4fdce7b5d5d3 # (6)\n```\n\n(1) -> 指定 ConfigMap\
    \ 资源的 API 版本，表明它是 Kubernetes API 中的一个稳定版本。\n\n(2) -> 包含存储在 ConfigMap 中的数据，其中每个键值对代表一个配置项。在这种情况下，我们只有\
    \ 1 个键值对。键是文件名（**index.html**），值是文件的内容。| 是 YAML 中用于多行字符串的语法。\n\n(3) -> 将 Kubernetes\
    \ 资源类型标识为 ConfigMap，用于以键值对形式存储非机密数据。\n\n(4) -> 自动生成的时间戳，标记 ConfigMap 的创建时间。\n\n\
    (5) -> ConfigMap 当前状态的唯一版本标识符，Kubernetes 内部用于跟踪和并发控制。\n\n(6) -> Kubernetes 分配给\
    \ ConfigMap 的唯一标识符，用于内部跟踪和管理。\n\n**请注意**，属性 (4)、(5) 和 (6) 也存在于其他 Kubernetes 资源中，例如\
    \ Pod、Service 和 Deployment。\n\n我们刚刚创建了一个 ConfigMap，它目前漂浮在虚空中，尚未被任何应用程序使用。为了使其有用，我们必须将\
    \ ConfigMap 附加到 Pod。\n\n这正是我们将在最后一步中做的事情。\n\n```yaml\napiVersion: v1\nkind: Pod\n\
    metadata:\n  name: nginx-pod\nspec:\n  containers:\n  - name: nginx\n    image:\
    \ nginx\n    volumeMounts: # (1)\n    - name: config-volume # (2)\n      mountPath:\
    \ /usr/share/nginx/html # (3)\n  volumes: # (4)\n  - name: config-volume # (5)\n\
    \    configMap: # (6)\n      name: nginx-config # (7)\n```\n\n(1) -> 指定要挂载到容器中的卷。\n\
    \n(2) -> 标识要挂载的卷，将其链接到 volumes 部分。一个容器可以在 **volumeMounts** 部分有多个值（例如，另一个 ConfigMap\
    \ 挂载在不同的路径）。\n\n(3) -> 卷应在容器内挂载的路径。\n\n(4) -> 定义 Pod 中容器可挂载的卷。**请注意**，这是 **spec**\
    \ 的同级节点，而不是 **containers** 的。\n\n(5) -> 为卷命名，用于在 **volumeMounts** 中引用它。\n\n(6)\
    \ -> 指定卷源是 ConfigMap。\n\n(7) -> 要作为卷挂载的 ConfigMap 的名称。\n\n```bash\n$ kubectl apply\
    \ -f nginx-with-configmap-1.yaml -n notch-further\npod/nginx-pod created\n```\n\
    \n## 检查 Pod\n\n```bash\n$ kubectl port-forward pod/nginx-pod 8080:80 -n notch-further\n\
    Forwarding from 127.0.0.1:8080 -> 80\nForwarding from [::1]:8080 -> 80\n```\n\n\
    ![我的第一个 ConfigMap](img/91c4bde832e221ba5bc429caf9587286_225_0.png)\n\n## 卷和卷挂载\n\
    \n在上面的 Pod 规范中，我们在 spec 中引入了 **volumes** 和 **volumeMounts**。两者在管理 Pod 内容器的存储方面扮演着互补的角色。以下是它们的区别以及如何协同工作的详细说明：\n\
    \n### volumes\n\nPod 规范中的 volumes 字段定义了 Pod 可以使用的存储卷。这种存储可以来自多种来源，例如上面案例中的 ConfigMap，或者持久卷声明（PVC）、Secret\
    \ 等，我们将在后续章节中学习。volumes 部分是 Pod 规范的一部分，并非特定于 Pod 内的任何单个容器。\n\n其主要目的是声明将提供给 Pod\
    \ 中容器使用的存储卷。这些卷可以保存应用程序数据、配置文件、Secret 以及其他需要在容器之间共享或在 Pod 生命周期之外持久化的数据。\n\n卷的作用范围在\
    \ **Pod 级别**。一旦定义，Pod 中的任何容器都可以挂载声明的卷。\n\n### volumeMounts\n\nvolumeMounts 字段是\
    \ Pod 内容器规范的一部分。它指定 Pod 级别定义的卷（在 volumes 部分）如何挂载到每个容器的文件系统中。它允许你定义挂载路径（卷在容器文件系统中的可用位置）以及其他与挂载相关的选项。\n\
    \n其目的是使特定卷在指定路径对容器可访问，允许容器从卷读取和写入数据。\n\nvolumeMounts 的作用范围在 Pod 内的 **容器级别**。Pod\
    \ 中的每个容器都可以有自己的 volumeMounts 部分，允许它将 Pod 的任何卷挂载到自己的文件系统路径。\n\n### 它们如何协同工作\n\n\
    **定义卷：** 在 Pod 规范中，你首先在 volumes 字段下定义一个卷列表。在这里，你指定卷的类型（例如 PVC、Secret、ConfigMap）以及该类型的特定详细信息。\n\
    \n**将卷挂载到容器：** 对于需要访问卷的每个容器，你指定一个 volumeMounts 部分。在这里，你通过名称（在 volumes 部分中定义）引用卷，并指定容器内的挂载路径。\n\
    \n## 从 Deployment 配置 ConfigMap\n\n我们可以从 Deployment 配置 ConfigMap 吗？是的，我们可以。以下是同一个\
    \ ConfigMap，配置为 Deployment。\n\n```yaml\napiVersion: apps/v1\nkind: Deployment\n\
    metadata:\n  name: nginx-deployment\nspec:\n  replicas: 3 # 指定副本数量\n  selector:\n\
    \    matchLabels:\n      app: nginx # 此标签用于选择 Deployment 管理的 Pod\n  template:\
    \ # template 字段包含 Pod 规范\n    metadata:\n      labels:\n        app: nginx # Pod\
    \ 标签，必须与上面的 selector 匹配\n    spec:\n      containers:\n```"
