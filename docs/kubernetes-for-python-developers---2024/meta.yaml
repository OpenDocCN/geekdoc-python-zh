    # ## Getting inside a pod


    We can exec into a pod and do stuff inside it within permissions and boundaries
    using the **kubectl exec**.


    The kubectl exec command is used to execute commands inside a container in a Kubernetes
    Pod. This command is incredibly useful for debugging and interactive troubleshooting
    within containers managed by Kubernetes. It allows developers and administrators
    direct access to the runtime environment of a container, making it easier to diagnose
    problems, inspect the state of an application, or interact with processes running
    inside the container.


    The basic syntax of kubectl exec is:


    ```

    $ kubectl exec [POD_NAME] -- [COMMAND]

    ```


    **[POD_NAME]** is the name of the Pod containing the container you want to access.


    **[COMMAND]** is the command you want to execute inside the container. If the
    command includes arguments, they follow the command name.'
