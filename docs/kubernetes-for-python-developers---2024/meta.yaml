    # ingress


    A Kubernetes Ingress is an API object that provides HTTP and HTTPS routing to
    services within a Kubernetes cluster. It allows you to expose services to the
    internet in a more flexible and unified way, managing external access to the services
    in a cluster, typically HTTP(S) traffic. Ingress can provide load balancing, SSL
    termination, and name-based virtual hosting.


    Without Ingress, exposing each service to the external world would require configuring
    a LoadBalancer or NodePort for each service, which can be inefficient and expensive.
    Ingress simplifies this by being a single entry point for all your services.


    To make Ingress resources work, you need an Ingress controller in your cluster.
    An Ingress controller is responsible for fulfilling the Ingress, usually with
    a load balancer, though it may configure an edge router or additional frontends
    to help handle the traffic. Popular Ingress controllers include Nginx, HAProxy,
    Traefik, and Istio.'
- md: "We can create ingresses without an ingress controller. To appreciate the utility\
    \ of an ingress controller, let's create ingresses without it.\n\n```\n$ cd robust-setup/ingress\n\
    $ kubectl apply -f deployment.yaml -n robust-setup\ndeployment.apps/nginx-deployment\
    \ created\n$ kubectl apply -f nginx-lb-svc.yaml -n robust-setup\nservice/nginx-loadbalancer\
    \ created\n$ kubectl apply -f nginx-np-svc.yaml -n robust-setup\nservice/nginx-nodeport\
    \ created\n```\n\nAfter a few minutes...\n\n```\n$ kubectl get svc -n robust-setup\n\
    NAME                 TYPE           CLUSTER-IP      EXTERNAL-IP     PORT(S)  \
    \        AGE\nnginx-loadbalancer   LoadBalancer   10.245.80.181   139.59.53.169\
    \   80:30864/TCP     3m35s\nnginx-nodeport       NodePort       10.245.23.243\
    \   <none>          80:30908/TCP     3m9s\nredis                ClusterIP    \
    \  None            <none>          6379/TCP         46h\n```\n\nFirst, we create\
    \ an ingress which points to the node port service.\n\n```yaml\napiVersion: networking.k8s.io/v1\
    \ # (1)\nkind: Ingress # (2)\nmetadata:\n  name: nginx-ingress-nodeport\nspec:\n\
    \  rules: # (3)\n  - host: nginx-nodeport.example.com # (4)\n    http: # (5)\n\
    \      paths: # (6)\n      - path: / # (7)\n        pathType: Prefix # (8)\n \
    \       backend: # (9)\n          service:\n            name: nginx-nodeport\n\
    \            port:\n              number: 80\n```\n\n(1) -> Specifies the API\
    \ version for the Ingress resource, indicating the networking.k8s.io/v1 group.\n\
    \n(2) -> Defines the resource type as Ingress, used for managing external access\
    \ to services in a cluster via HTTP/HTTPS.\n\n(3) -> Begins the specification\
    \ of Ingress rules, which define how to route external HTTP traffic to services.\n\
    \n(4) -> Specifies the host name for routing HTTP traffic. Requests to this host\
    \ will be matched and routed according to the defined rules. This can be any valid\
    \ domain name or subdomain, such as **example.com** or **api.example.com**.\n\n\
    (5) -> Indicates the section for defining HTTP paths and backends for the specified\
    \ host.\n\n(6) -> Lists the paths to match against incoming requests and the corresponding\
    \ backends to which traffic should be forwarded.\n\n(7) -> Specifies the URL path\
    \ to match for routing to the backend service. This example matches the root path.\
    \ Alternatively, this can be any valid URL path served by your application, such\
    \ as `/api`, `/users`, etc.\n\n(8) -> Specifies the type of path matching to use.\
    \ \"Prefix\" matches any path that begins with the specified value. If you want\
    \ an exact match, use **Exact**.\n\n(9) -> Defines the backend service and port\
    \ to which traffic matching the path should be forwarded.\n\nThis Ingress resource\
    \ configuration specifies that HTTP traffic coming to **nginx-nodeport.example.com**\
    \ on any path (/) should be routed to the **nginx-nodeport** service on port 80,\
    \ using prefix-based path matching.\n\nLet's curl this endpoint.\n\n```\n$ curl\
    \ -I -H \"Host: nginx-nodeport.example.com\" http://139.59.6.116:30908\nHTTP/1.1\
    \ 200 OK\nServer: nginx/1.25.4\nDate: Sat, 02 Mar 2024 03:35:38 GMT\nContent-Type:\
    \ text/html\nContent-Length: 615\nLast-Modified: Wed, 14 Feb 2024 16:03:00 GMT\n\
    Connection: keep-alive\nETag: \"65cce434-267\"\nAccept-Ranges: bytes\n```\n\n\
    I use the **Host** header to specify the DNS name. The IP can be the external\
    \ IP of any node in the cluster. We can get the port number from the **kubectl\
    \ get service** command above.\n\nWe can build a similar ingress for the load\
    \ balancer service as well.\n\n```yaml\napiVersion: networking.k8s.io/v1\nkind:\
    \ Ingress\nmetadata:\n  name: nginx-ingress-loadbalancer\nspec:\n  rules:\n  -\
    \ host: nginx-loadbalancer.example.com # (1)\n    http:\n      paths:\n      -\
    \ path: /\n        pathType: Prefix\n        backend:\n          service:\n  \
    \          name: nginx-loadbalancer # (2)\n            port:\n              number:\
    \ 80\n```\n\n(1) -> we give a different host domain.\n\n(2) -> this ingress points\
    \ to the **nginx-loadbalancer** service.\n\nWe can do a similar curl to access\
    \ this service externally.\n\n```\n$ curl -I -H \"Host: nginx-loadbalancer.example.com\"\
    \ http://139.59.53.169\nHTTP/1.1 200 OK\nServer: nginx/1.25.4\nDate: Sat, 02 Mar\
    \ 2024 03:39:44 GMT\nContent-Type: text/html\nContent-Length: 615\nLast-Modified:\
    \ Wed, 14 Feb 2024 16:03:00 GMT\nConnection: keep-alive\nETag: \"65cce434-267\"\
    \nAccept-Ranges: bytes\n```\n\nThe IP is the service load balancer IP for **nginx-loadbalancer**.\n\
    \n## Exercise 33: Multi-service ingress\n\nCreate an ingress with host **multiservice.example.com**\
    \ where the **/nginx** path goes to nginx deployment, and **/flask** path goes\
    \ to the redis flask service.\n\n## Ingress controllers\n\nIf we are creating\
    \ ingresses for a lot of services in our cluster, then it starts becoming cumbersome,\
    \ as we have to identify the node port and IP for each service. We can't use external\
    \ loadbalancer IP for each service as IP is a scarce resource. To tackle this\
    \ problem, we have the concept of ingress controllers.\n\nAn ingress controller\
    \ serves as the bridge between Kubernetes services and the outside world. It offers\
    \ a centralized, efficient way to manage routing, SSL termination, and load balancing\
    \ for HTTP(S) traffic, making it easier to expose and securely access applications\
    \ running in Kubernetes.\n\nThe Ingress Controller continuously monitors the Kubernetes\
    \ API server for new, updated, or deleted Ingress resources. It reads the specifications\
    \ of these Ingress resources, which contain rules for routing external traffic\
    \ to services within the cluster.\n\nBased on the rules defined in Ingress resources,\
    \ the Ingress Controller acts as a reverse proxy or load balancer. It listens\
    \ for incoming HTTP(S) traffic on predefined or dynamically allocated IP addresses\
    \ and ports.\n\nWhen an external request is received, the Ingress Controller inspects\
    \ the request's headers (e.g., **Host**) and path to determine how it should be\
    \ routed according to the Ingress rules. The Controller then forwards the request\
    \ to the appropriate backend service(s) within the cluster, based on the matching\
    \ Ingress rule.\n\nIn addition to this, Ingress Controllers can manage SSL/TLS\
    \ termination for the services in the cluster. This means that the Ingress Controller\
    \ decrypts incoming HTTPS traffic and then forwards it as HTTP to the backend\
    \ services, offloading the SSL/TLS workload from the services themselves.\n\n\
    Beyond basic routing, Ingress Controllers can offer advanced features like URL\
    \ rewriting, sticky sessions, WebSockets support, rate limiting, and integration\
    \ with authentication and authorization services.\n\nLet's install nginx ingress\
    \ controller, a popular ingress controller in our cluster.\n\n```\n$ kubectl apply\
    \ -f https://raw.githubusercontent.com/kubernetes/ingress-nginx/controller-v1.10.0/deploy/static/provider/cloud/deploy.yaml\n\
    namespace/ingress-nginx created\nserviceaccount/ingress-nginx created\nserviceaccount/ingress-nginx-admission\
    \ created\nrole.rbac.authorization.k8s.io/ingress-nginx created\nrole.rbac.authorization.k8s.io/ingress-nginx-admission\
    \ created\nclusterrole.rbac.authorization.k8s.io/ingress-nginx created\nclusterrole.rbac.authorization.k8s.io/ingress-nginx-admission\
    \ created\nrolebinding.rbac.authorization.k8s.io/ingress-nginx created\nrolebinding.rbac.authorization.k8s.io/ingress-nginx-admission\
    \ created\nclusterrolebinding.rbac.authorization.k8s.io/ingress-nginx created\n\
    clusterrolebinding.rbac.authorization.k8s.io/ingress-nginx-admission created\n\
    configmap/ingress-nginx-controller created\nservice/ingress-nginx-controller created\n\
    service/ingress-nginx-controller-admission created\ndeployment.apps/ingress-nginx-controller\
    \ created\njob.batch/ingress-nginx-admission-create created\njob.batch/ingress-nginx-admission-patch\
    \ created\ningressclass.networking.k8s.io/nginx created\nvalidatingwebhookconfiguration.admissionregistration.k8s.io/ingress-nginx-admission\
    \ created\n```\n\nThe ingress resources above url contains all the YAML artefacts\
    \ required to create an nginx ingress controller. After a few minutes, you should\
    \ have an ingress controller running in the **ingress-nginx** namespace."
  mdcn: "我们可以在没有 Ingress 控制器的情况下创建 Ingress。为了体会 Ingress 控制器的实用性，让我们先在没有它的情况下创建 Ingress。\n\
    \n```\n$ cd robust-setup/ingress\n$ kubectl apply -f deployment.yaml -n robust-setup\n\
    deployment.apps/nginx-deployment created\n$ kubectl apply -f nginx-lb-svc.yaml\
    \ -n robust-setup\nservice/nginx-loadbalancer created\n$ kubectl apply -f nginx-np-svc.yaml\
    \ -n robust-setup\nservice/nginx-nodeport created\n```\n\n几分钟后...\n\n```\n$ kubectl\
    \ get svc -n robust-setup\nNAME                 TYPE           CLUSTER-IP    \
    \  EXTERNAL-IP     PORT(S)          AGE\nnginx-loadbalancer   LoadBalancer   10.245.80.181\
    \   139.59.53.169   80:30864/TCP     3m35s\nnginx-nodeport       NodePort    \
    \   10.245.23.243   <none>          80:30908/TCP     3m9s\nredis             \
    \   ClusterIP      None            <none>          6379/TCP         46h\n```\n\
    \n首先，我们创建一个指向 NodePort 服务的 Ingress。\n\n```yaml\napiVersion: networking.k8s.io/v1\
    \ # (1)\nkind: Ingress # (2)\nmetadata:\n  name: nginx-ingress-nodeport\nspec:\n\
    \  rules: # (3)\n  - host: nginx-nodeport.example.com # (4)\n    http: # (5)\n\
    \      paths: # (6)\n      - path: / # (7)\n        pathType: Prefix # (8)\n \
    \       backend: # (9)\n          service:\n            name: nginx-nodeport\n\
    \            port:\n              number: 80\n```\n\n(1) -> 指定 Ingress 资源的 API\
    \ 版本，表示 networking.k8s.io/v1 组。\n\n(2) -> 将资源类型定义为 Ingress，用于通过 HTTP/HTTPS 管理对集群中服务的外部访问。\n\
    \n(3) -> 开始定义 Ingress 规则，这些规则定义了如何将外部 HTTP 流量路由到服务。\n\n(4) -> 指定用于路由 HTTP 流量的主机名。发送到此主机的请求将根据定义的规则进行匹配和路由。这可以是任何有效的域名或子域名，例如\
    \ **example.com** 或 **api.example.com**。\n\n(5) -> 表示为指定主机定义 HTTP 路径和后端的部分。\n\n\
    (6) -> 列出要匹配传入请求的路径以及流量应转发到的相应后端。\n\n(7) -> 指定要匹配以路由到后端服务的 URL 路径。此示例匹配根路径。或者，这可以是你的应用程序提供的任何有效\
    \ URL 路径，例如 `/api`、`/users` 等。\n\n(8) -> 指定要使用的路径匹配类型。\"Prefix\" 匹配任何以指定值开头的路径。如果你想要精确匹配，请使用\
    \ **Exact**。\n\n(9) -> 定义匹配路径的流量应转发到的后端服务和端口。\n\n此 Ingress 资源配置指定，发送到 **nginx-nodeport.example.com**\
    \ 任何路径 (/) 的 HTTP 流量，应使用基于前缀的路径匹配路由到 **nginx-nodeport** 服务的 80 端口。\n\n让我们 curl\
    \ 这个端点。\n\n```\n$ curl -I -H \"Host: nginx-nodeport.example.com\" http://139.59.6.116:30908\n\
    HTTP/1.1 200 OK\nServer: nginx/1.25.4\nDate: Sat, 02 Mar 2024 03:35:38 GMT\nContent-Type:\
    \ text/html\nContent-Length: 615\nLast-Modified: Wed, 14 Feb 2024 16:03:00 GMT\n\
    Connection: keep-alive\nETag: \"65cce434-267\"\nAccept-Ranges: bytes\n```\n\n\
    我使用 **Host** 头来指定 DNS 名称。IP 可以是集群中任何节点的外部 IP。我们可以从上面的 **kubectl get service**\
    \ 命令获取端口号。\n\n我们也可以为负载均衡器服务构建一个类似的 Ingress。\n\n```yaml\napiVersion: networking.k8s.io/v1\n\
    kind: Ingress\nmetadata:\n  name: nginx-ingress-loadbalancer\nspec:\n  rules:\n\
    \  - host: nginx-loadbalancer.example.com # (1)\n    http:\n      paths:\n   \
    \   - path: /\n        pathType: Prefix\n        backend:\n          service:\n\
    \            name: nginx-loadbalancer # (2)\n            port:\n             \
    \ number: 80\n```\n\n(1) -> 我们给出一个不同的主机域名。\n\n(2) -> 此 Ingress 指向 **nginx-loadbalancer**\
    \ 服务。\n\n我们可以执行类似的 curl 命令从外部访问此服务。\n\n```\n$ curl -I -H \"Host: nginx-loadbalancer.example.com\"\
    \ http://139.59.53.169\nHTTP/1.1 200 OK\nServer: nginx/1.25.4\nDate: Sat, 02 Mar\
    \ 2024 03:39:44 GMT\nContent-Type: text/html\nContent-Length: 615\nLast-Modified:\
    \ Wed, 14 Feb 2024 16:03:00 GMT\nConnection: keep-alive\nETag: \"65cce434-267\"\
    \nAccept-Ranges: bytes\n```\n\n该 IP 是 **nginx-loadbalancer** 服务的负载均衡器 IP。\n\n\
    ## 练习 33：多服务 Ingress\n\n创建一个主机为 **multiservice.example.com** 的 Ingress，其中 **/nginx**\
    \ 路径指向 nginx 部署，**/flask** 路径指向 redis flask 服务。\n\n## Ingress 控制器\n\n如果我们为集群中的许多服务创建\
    \ Ingress，那么这会开始变得繁琐，因为我们必须为每个服务识别节点端口和 IP。我们不能为每个服务使用外部负载均衡器 IP，因为 IP 是稀缺资源。为了解决这个问题，我们有了\
    \ Ingress 控制器的概念。\n\nIngress 控制器充当 Kubernetes 服务与外部世界之间的桥梁。它提供了一种集中、高效的方式来管理 HTTP(S)\
    \ 流量的路由、SSL 终止和负载均衡，使得在 Kubernetes 中运行的应用程序更容易暴露和安全访问。\n\nIngress 控制器持续监控 Kubernetes\
    \ API 服务器，以获取新的、更新的或删除的 Ingress 资源。它读取这些 Ingress 资源的规范，其中包含将外部流量路由到集群内服务的规则。\n\
    \n根据 Ingress 资源中定义的规则，Ingress 控制器充当反向代理或负载均衡器。它在预定义或动态分配的 IP 地址和端口上监听传入的 HTTP(S)\
    \ 流量。\n\n当收到外部请求时，Ingress 控制器会检查请求的头信息（例如 **Host**）和路径，以确定应如何根据 Ingress 规则进行路由。然后，控制器根据匹配的\
    \ Ingress 规则将请求转发到集群内适当的后端服务。\n\n除此之外，Ingress 控制器可以管理集群中服务的 SSL/TLS 终止。这意味着 Ingress\
    \ 控制器解密传入的 HTTPS 流量，然后将其作为 HTTP 转发给后端服务，从而将 SSL/TLS 工作负载从服务本身卸载。\n\n除了基本路由，Ingress\
    \ 控制器还可以提供高级功能，如 URL 重写、会话保持、WebSockets 支持、速率限制以及与身份验证和授权服务的集成。\n\n让我们在集群中安装 nginx\
    \ ingress controller，这是一个流行的 Ingress 控制器。\n\n```\n$ kubectl apply -f https://raw.githubusercontent.com/kubernetes/ingress-nginx/controller-v1.10.0/deploy/static/provider/cloud/deploy.yaml\n\
    namespace/ingress-nginx created\nserviceaccount/ingress-nginx created\nserviceaccount/ingress-nginx-admission\
    \ created\nrole.rbac.authorization.k8s.io/ingress-nginx created\nrole.rbac.authorization.k8s.io/ingress-nginx-admission\
    \ created\nclusterrole.rbac.authorization.k8s.io/ingress-nginx created\nclusterrole.rbac.authorization.k8s.io/ingress-nginx-admission\
    \ created\nrolebinding.rbac.authorization.k8s.io/ingress-nginx created\nrolebinding.rbac.authorization.k8s.io/ingress-nginx-admission\
    \ created\nclusterrolebinding.rbac.authorization.k8s.io/ingress-nginx created\n\
    clusterrolebinding.rbac.authorization.k8s.io/ingress-nginx-admission created\n\
    configmap/ingress-nginx-controller created\nservice/ingress-nginx-controller created\n\
    service/ingress-nginx-controller-admission created\ndeployment.apps/ingress-nginx-controller\
    \ created\njob.batch/ingress-nginx-admission-create created\njob.batch/ingress-nginx-admission-patch\
    \ created\ningressclass.networking.k8s.io/nginx created\nvalidatingwebhookconfiguration.admissionregistration.k8s.io/ingress-nginx-admission\
    \ created\n```\n\n上面的 URL 包含了创建 nginx ingress controller 所需的所有 YAML 工件。几分钟后，你应该会在\
    \ **ingress-nginx** 命名空间中看到一个正在运行的 Ingress 控制器。"
