  md: "Kubernetes gives us a way to spread out the pods evenly across the nodes, so\
    \ that there is no single point of failure. There are very slim chances that all\
    \ the nodes in your cluster go down at the same time, right?\n\nWe specify this\
    \ as a part of the pod/deployment spec and is called **podAntiAffinity**.\n\n\
    ```\napiVersion: apps/v1\nkind: Deployment\nmetadata:\n  name: my-deployment\n\
