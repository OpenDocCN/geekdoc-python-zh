    Printing logs to stdout (standard output) in containerized applications is considered
    a good practice for several reasons, aligning with the design principles of containerized
    environments and facilitating effective log management. Here''s why it''s advantageous:


    # Simplifies Log Collection


    Container orchestration systems like Kubernetes and container runtimes like Docker
    are designed to automatically capture stdout and stderr streams from containers.
    This design simplifies log collection, as logs are centrally managed and can be
    easily aggregated and monitored without the need for additional logging drivers
    or agents within the container.


    # Eases Log Management


    By directing logs to stdout, managing logs becomes more straightforward. Orchestration
    tools can handle the rotation, aggregation, and retention of logs without requiring
    additional configuration or tools inside the container. This approach reduces
    the complexity of log management and avoids filling up container storage with
    log files.


    # Supports Twelve-Factor App Methodology


    The Twelve factor app methodology([https://12factor.net/](https://12factor.net/)),
    a set of best practices for building scalable,'
- md: "## Summary\n\nIn this chapter, we got a thorough introduction to the fundamental\
    \ building blocks of Kubernetes: Pods. The chapter details the mechanics of running\
    \ containers within the Kubernetes ecosystem, emphasizing the crucial role of\
    \ pods as the smallest deployable units. It elaborates on how pods allow for the\
    \ co-location of containers that can share storage, network, and lifecycle, illustrating\
    \ the importance of pods in grouping containers for efficient management and communication.\n\
    \nThe use of kubectl is introduced as the essential command-line tool for Kubernetes,\
    \ allowing you to interact with your clusters and manage your applications effectively.\
    \ By understanding kubeconfig, you learnt to connect securely to clusters and\
    \ begin hands-on interaction with Kubernetes, setting the foundation for practical\
    \ applications of the concepts covered so far.\n\nLooking ahead to the next chapter,\
    \ the narrative will dive deeper into the intricacies of pod management. We will\
    \ explore advanced pod functions, delving into aspects such as pod health checks,\
    \ lifecycle management, inter-pod communication, and best practices for using\
    \ pods in production environments.\n\n## Chapter 5: Pods 201\n\nWe now know what\
    \ a pod is, how a pod fits in the larger picture of Kubernetes ecosystem and the\
    \ concepts and design principles behind pods. We also drew a lot of parallels\
    \ between docker containers/docker compose and pods. In this chapter, we will\
    \ transcend beyond those similarities and get into the nitty gritties of pods\
    \ and go a few steps further.\n\n### Getting inside a pod\n\nWe can exec into\
    \ a pod and do stuff inside it within permissions and boundaries using the **kubectl\
    \ exec**.\n\nThe kubectl exec command is used to execute commands inside a container\
    \ in a Kubernetes Pod. This command is incredibly useful for debugging and interactive\
    \ troubleshooting within containers managed by Kubernetes. It allows developers\
    \ and administrators direct access to the runtime environment of a container,\
    \ making it easier to diagnose problems, inspect the state of an application,\
    \ or interact with processes running inside the container.\n\nThe basic syntax\
    \ of kubectl exec is:\n\n```\n$ kubectl exec [POD_NAME] -- [COMMAND]\n```\n\n\
    **[POD_NAME]** is the name of the Pod containing the container you want to access.\n\
    \n**[COMMAND]** is the command you want to execute inside the container. If the\
    \ command includes arguments, they follow the command name.\n\nLet's run a simple\
    \ command inside the nginx pod.\n\n```\n$ kubectl exec nginx -- ls /\nbin\nboot\n\
    dev\ndocker-entrypoint.d\ndocker-entrypoint.sh\netc\nhome\nlib\nlib64\nmedia\n\
    mnt\nopt\nproc\nroot\nrun\nsbin\nsrv\nsys\ntmp\nusr\nvar\n```\n\nWhy the double\
    \ dash ( -- ) ?\n\nThe double dash ( -- ) separates the kubectl exec parameters\
    \ from the command you want to run inside the container.\n\nIf we run a variation\
    \ of the above command without -- , it would look like:\n\n```\n$ kubectl exec\
    \ nginx ls -l\n```\n\nIn this example, -l might be mistakenly interpreted as an\
    \ option for kubectl exec rather than as part of the ls command intended to run\
    \ inside the container.\n\nHence, the right way would be,\n\n```\n$ kubectl exec\
    \ nginx -- ls -l\n```\n\nIf you want to run commands inside a specific container,\
    \ add the -c [container-name] option.\n\nLet's print the nginx port environment\
    \ variable for the twin bitnami nginx-es pod.\n\n```\n$ kubectl exec two-containers-better\
    \ -c nginx-container-1 -- sh -c 'echo $NGINX_HTTP_PORT_NUMBER'\n8080\n```\n\n\
    For interactive commands, such as opening a shell, add the -i (interactive) and\
    \ -t (TTY) flags to allocate a pseudo-TTY and keep stdin open:\n\n```\n$ kubectl\
    \ exec -it nginx -- /bin/bash\n```\n\nThis command opens an interactive bash shell\
    \ inside **nginx** container of **nginx** pod. You can then run any command inside\
    \ the shell as if you were logged into a shell session on the container. To exit\
    \ the shell, type **exit**.\n\n### Use Cases for exec\n\n- **Debugging Applications:**\
    \ Quickly inspect the current state of an application, check environment variables,\
    \ or view logs stored locally within the container.\n- **File Operations:** Perform\
    \ file operations like viewing, editing, or deleting files within the container's\
    \ filesystem to troubleshoot configuration issues or modify application behavior\
    \ temporarily.\n- **Database Interaction:** Access and interact with a database\
    \ running inside a Pod for maintenance tasks, queries, or updates without exposing\
    \ database services externally.\n\n### Exercise 14: Print the port number\n\n\
    Print the port number of the 2nd container in the twin bitnami nginx-es pod.\n\
    \n### Running the pod in a different node\n\nKubernetes decides where to schedule\
    \ a pod using its kube-scheduler component, which is part of the control plane.\
    \ The kube-scheduler determines the most suitable node for a pod based on several\
    \ factors, ensuring optimal operation and resource utilization within the cluster.\
    \ Here's how the process works in more detail:\n\nThe scheduler evaluates the\
    \ resource requirements of a pod, such as CPU, memory, and storage, and matches\
    \ them with the available resources on nodes. It aims to place the pod on a node\
    \ that has sufficient resources to meet the pod's needs without overloading any\
    \ node.\n\n![How the kubernetes schedule works, simplified](img/91c4bde832e221ba5bc429caf9587286_130_0.png)\n\
    \nIf there is more than 1 node which matches these criteria, then the scheduler\
    \ randomly places the pod in one of the node to avoid overloading any 1 node.\n\
    \nLet's try to schedule a pod in a specific node. For this to happen, let's pick\
    \ a node.\n\n```\n$ kubectl get nodes\nNAME                           STATUS \
    \  ROLES    AGE   VERSION\nfirst-cluster-default-pool-oeo85   Ready    <none>\
    \   15h   v1.29.1\nfirst-cluster-default-pool-oeo8k   Ready    <none>   15h  \
    \ v1.29.1\nfirst-cluster-default-pool-oeo8s   Ready    <none>   15h   v1.29.1\n\
    ```\n\nLet's choose **first-cluster-default-pool-oeo8s** node to schedule our\
    \ nginx pod.\n\nHere's the change we will make to the pod spec:\n\n```yaml\napiVersion:\
    \ v1\nkind: Pod\nmetadata:\n  labels:\n    run: nginx\n  name: nginx-201\nspec:\n\
    \  containers:\n  - image: nginx\n    name: nginx\n  nodeName: first-cluster-default-pool-oeo8s\
    \ # (1)\n```\n\n(1) -> Indicates the node name in which the pod will be scheduled.\n\
    \nWhen a **nodeName** is specified, the pod bypasses the kube scheduler and goes\
    \ to kubelet on the named node tries to place the Pod on that node. This is usually\
    \ a bad idea as we breach the cardinal rule of devops, i.e. we should be treating\
    \ infrastructure as cattle, not as pets.\n\nIn this case, we are treating nodes\
    \ as pets by remembering their name and giving it in our pod spec. Node names\
    \ in cloud environments are not predictable. If the named node does not exist,\
    \ the Pod will not run. If the named node does not have the resources to accommodate\
    \ the Pod, the Pod will fail without any indication as to why it failed.\n\nThere\
    \ are other ways to schedule pods in specific nodes which we will look at when\
    \ we talk about deployments in a later chapter.\n\nFor now, it will suffice to\
    \ understand that we have a say in how to place pods in nodes.\n\n### liveness\
    \ probes\n\nLiveness probes are used in Kubernetes to determine if a container\
    \ is running as expected. If a liveness probe fails, the kubelet kills the container,\
    \ which will be restarted according to its restart policy. Liveness probes are\
    \ crucial for self-healing in applications that might become unresponsive over\
    \ time due to deadlocks or other issues, even though the application process is\
    \ still running.\n\nHere's an example of a Pod specification that includes a liveness\
    \ probe for an Nginx container. This example uses an HTTP GET request as the liveness\
    \ probe, which is one of the common methods for checking container health. The\
    \ kubelet sends an HTTP GET request to the Nginx server inside the container;\
    \ if the server fails to respond with a success status (200-399), the container\
    \ will be restarted."
  mdcn: "## 总结\n\n本章我们全面介绍了 Kubernetes 的基本构建模块：Pod。本章详细阐述了在 Kubernetes 生态系统中运行容器的机制，强调了\
    \ Pod 作为最小可部署单元的关键作用。它详细说明了 Pod 如何允许共享存储、网络和生命周期的容器共存，阐明了 Pod 在分组容器以实现高效管理和通信方面的重要性。\n\
    \n我们介绍了 kubectl 作为 Kubernetes 必备的命令行工具，它允许你与集群交互并有效管理应用程序。通过理解 kubeconfig，你学会了如何安全地连接到集群，并开始与\
    \ Kubernetes 进行动手交互，为迄今为止所涵盖概念的实际应用奠定了基础。\n\n展望下一章，我们将深入探讨 Pod 管理的复杂细节。我们将探索 Pod\
    \ 的高级功能，深入研究 Pod 健康检查、生命周期管理、Pod 间通信以及在生产环境中使用 Pod 的最佳实践等方面。\n\n## 第 5 章：Pod 201\n\
    \n我们现在知道了什么是 Pod，Pod 如何融入 Kubernetes 生态系统的大局，以及 Pod 背后的概念和设计原则。我们还对比了许多 docker\
    \ 容器/docker compose 与 Pod 之间的相似之处。在本章中，我们将超越这些相似点，深入探讨 Pod 的具体细节，并更进一步。\n\n###\
    \ 进入 Pod 内部\n\n我们可以使用 **kubectl exec** 在权限和边界内进入 Pod 并在其中执行操作。\n\nkubectl exec\
    \ 命令用于在 Kubernetes Pod 中的容器内执行命令。此命令对于调试和交互式故障排除 Kubernetes 管理的容器非常有用。它允许开发人员和管理员直接访问容器的运行时环境，从而更容易诊断问题、检查应用程序状态或与容器内运行的进程进行交互。\n\
    \nkubectl exec 的基本语法是：\n\n```\n$ kubectl exec [POD_NAME] -- [COMMAND]\n```\n\n\
    **[POD_NAME]** 是包含你要访问的容器的 Pod 的名称。\n\n**[COMMAND]** 是你想要在容器内执行的命令。如果命令包含参数，它们跟在命令名称之后。\n\
    \n让我们在 nginx Pod 内运行一个简单的命令。\n\n```\n$ kubectl exec nginx -- ls /\nbin\nboot\n\
    dev\ndocker-entrypoint.d\ndocker-entrypoint.sh\netc\nhome\nlib\nlib64\nmedia\n\
    mnt\nopt\nproc\nroot\nrun\nsbin\nsrv\nsys\ntmp\nusr\nvar\n```\n\n为什么需要双破折号 ( --\
    \ )？\n\n双破折号 ( -- ) 将 kubectl exec 参数与你想要在容器内运行的命令分开。\n\n如果我们运行上述命令的变体而不使用 --\
    \ ，它看起来会像这样：\n\n```\n$ kubectl exec nginx ls -l\n```\n\n在这个例子中，-l 可能会被错误地解释为 kubectl\
    \ exec 的选项，而不是作为要在容器内运行的 ls 命令的一部分。\n\n因此，正确的方式是，\n\n```\n$ kubectl exec nginx\
    \ -- ls -l\n```\n\n如果你想在特定容器内运行命令，请添加 -c [container-name] 选项。\n\n让我们打印双容器 bitnami\
    \ nginx-es Pod 中的 nginx 端口环境变量。\n\n```\n$ kubectl exec two-containers-better -c\
    \ nginx-container-1 -- sh -c 'echo $NGINX_HTTP_PORT_NUMBER'\n8080\n```\n\n对于交互式命令，例如打开\
    \ shell，请添加 -i（交互式）和 -t（TTY）标志以分配伪 TTY 并保持 stdin 打开：\n\n```\n$ kubectl exec -it\
    \ nginx -- /bin/bash\n```\n\n此命令在 **nginx** Pod 的 **nginx** 容器内打开一个交互式 bash shell。然后，你可以像登录到容器上的\
    \ shell 会话一样在 shell 中运行任何命令。要退出 shell，请输入 **exit**。\n\n### exec 的用例\n\n- **调试应用程序：**\
    \ 快速检查应用程序的当前状态、检查环境变量或查看存储在容器本地的日志。\n- **文件操作：** 在容器的文件系统内执行文件操作，如查看、编辑或删除文件，以排查配置问题或临时修改应用程序行为。\n\
    - **数据库交互：** 访问并交互运行在 Pod 内的数据库，用于维护任务、查询或更新，而无需将数据库服务暴露到外部。\n\n### 练习 14：打印端口号\n\
    \n打印双容器 bitnami nginx-es Pod 中第 2 个容器的端口号。\n\n### 在不同节点上运行 Pod\n\nKubernetes 使用其\
    \ kube-scheduler 组件（控制平面的一部分）来决定在何处调度 Pod。kube-scheduler 根据多个因素确定最适合 Pod 的节点，确保集群内的最佳运行和资源利用。以下是该过程更详细的说明：\n\
    \n调度器评估 Pod 的资源需求，例如 CPU、内存和存储，并将其与节点上的可用资源进行匹配。它旨在将 Pod 放置在具有足够资源以满足 Pod 需求且不会使任何节点过载的节点上。\n\
    \n![Kubernetes 调度器工作原理（简化版）](img/91c4bde832e221ba5bc429caf9587286_130_0.png)\n\
    \n如果有多个节点符合这些标准，则调度器会随机将 Pod 放置在其中一个节点上，以避免任何单个节点过载。\n\n让我们尝试将 Pod 调度到特定节点。为此，我们先选择一个节点。\n\
    \n```\n$ kubectl get nodes\nNAME                           STATUS   ROLES    AGE\
    \   VERSION\nfirst-cluster-default-pool-oeo85   Ready    <none>   15h   v1.29.1\n\
    first-cluster-default-pool-oeo8k   Ready    <none>   15h   v1.29.1\nfirst-cluster-default-pool-oeo8s\
    \   Ready    <none>   15h   v1.29.1\n```\n\n我们选择 **first-cluster-default-pool-oeo8s**\
    \ 节点来调度我们的 nginx Pod。\n\n以下是我们将对 Pod 规范进行的更改：\n\n```yaml\napiVersion: v1\nkind:\
    \ Pod\nmetadata:\n  labels:\n    run: nginx\n  name: nginx-201\nspec:\n  containers:\n\
    \  - image: nginx\n    name: nginx\n  nodeName: first-cluster-default-pool-oeo8s\
    \ # (1)\n```\n\n(1) -> 指示将调度 Pod 的节点名称。\n\n当指定 **nodeName** 时，Pod 会绕过 kube-scheduler，直接由命名节点上的\
    \ kubelet 尝试将 Pod 放置在该节点上。这通常不是一个好主意，因为我们违反了 DevOps 的基本原则，即我们应该将基础设施视为牛群（可随意替换），而不是宠物（需要精心呵护）。\n\
    \n在这种情况下，我们通过记住节点名称并在 Pod 规范中指定它，将节点视为宠物。云环境中的节点名称是不可预测的。如果指定的节点不存在，Pod 将不会运行。如果指定的节点没有足够的资源来容纳\
    \ Pod，Pod 将失败，且不会有任何关于失败原因的提示。\n\n还有其他方法可以将 Pod 调度到特定节点，我们将在后面讨论部署时介绍。\n\n目前，只需理解我们可以对\
    \ Pod 在节点上的放置方式发表意见即可。\n\n### 存活探针\n\nKubernetes 中使用存活探针来确定容器是否按预期运行。如果存活探针失败，kubelet\
    \ 会终止容器，该容器将根据其重启策略重新启动。存活探针对于应用程序的自愈至关重要，因为即使应用程序进程仍在运行，应用程序也可能由于死锁或其他问题而变得无响应。\n\
    \n这是一个包含 Nginx 容器存活探针的 Pod 规范示例。此示例使用 HTTP GET 请求作为存活探针，这是检查容器健康状况的常用方法之一。kubelet\
    \ 向容器内的 Nginx 服务器发送 HTTP GET 请求；如果服务器未能以成功状态（200-399）响应，容器将被重新启动。"
