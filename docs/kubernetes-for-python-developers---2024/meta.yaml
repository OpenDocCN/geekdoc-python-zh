    # Exercise 11: 2 containers twisted variation


    Run 2 containers in a pod again. But 1 will be nginx, the other will be a bash
    container which runs "sleep 5" and kills after that. Will the pod crash? If yes,
    how will you fix it without changing the image of the bash container?


    **Solution**


    The pod will crash even if one of the containers have a process which gets killed.
    In this case, the bash sleep container will shut down after 5 seconds, indicating
    to the kubelet that the pod in question needs to be restarted, resulting in an
    endless **CrashloopBackoff** situation. Add a **sleep infinity** instead to the
    bash container.


