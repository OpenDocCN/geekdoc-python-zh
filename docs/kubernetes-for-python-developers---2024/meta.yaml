  md: 'In this, the first step is to build the flask redis docker image.


    Here''s a recap of the steps.


    ```

    $ export DOCKER_DEFAULT_PLATFORM=linux/amd64 # (1)

    $ docker build -t ghcr.io/<GH-USERNAME>/flask-redis:1.0 . # (2)

    $ export CR_PAT=ghp_XXXyyyZZZ # (3)

    $ docker push ghcr.io/<GH-USERNAME>/flask-redis:1.0 # (4)

    ```


    (1) -> Indicate what target architecture you are going to build your container
    image on. **Note** run this step only if you are using Apple Silicon laptop.


    (2) -> build your image. Replace **<GH-USERNAME>** with your Github username.


    (3) -> push the image to ghcr.io container registry.


