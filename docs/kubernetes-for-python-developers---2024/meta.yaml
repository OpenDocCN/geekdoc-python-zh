    \n镜像拉取失败：由于认证失败，Kubernetes 将无法从私有仓库拉取所需的镜像。这将导致在尝试启动 Pod 时出现错误，你可能会在 Pod 的事件或日志中看到与镜像拉取失败相关的错误。\n\
    \nPod 保持等待状态：Pod 将保持在“等待”状态，具体表现为 `ImagePullBackOff` 或 `ErrImagePull` 状态，因为 Kubernetes\
    \ 会定期重试镜像拉取，并由于认证错误而持续失败。\n\n## 练习 28：多个镜像拉取密钥\n\n在另一个仓库中构建另一个私有镜像。将其作为另一个容器添加到同一个\
    \ Pod/部署中，并为新的容器在配置中添加另一个镜像拉取密钥。\n\n## 解答\n\n以下是如何实现此设置的方法：\n\n首先，为每个私有仓库在你的 Kubernetes\
    \ 集群中创建所需的 Docker 仓库密钥。使用 `kubectl create secret docker-registry` 命令创建每个密钥。例如：\n\
    \n```\n$ kubectl create secret docker-registry secret1 --docker-server=REGISTRY1_URL\
    \ --docker-username=USER1 --docker-password=PASSWORD1 --docker-email=EMAIL1\n\n\
    $ kubectl create secret docker-registry secret2 --docker-server=REGISTRY2_URL\
    \ --docker-username=USER2 --docker-password=PASSWORD2 --docker-email=EMAIL2\n\
    ```\n\n将 `REGISTRY1_URL`、`USER1`、`PASSWORD1`、`EMAIL1`、`REGISTRY2_URL`、`USER2`、`PASSWORD2`\
    \ 和 `EMAIL2` 替换为你的实际仓库 URL 和凭据。\n\n在定义 Pod 时，在 `imagePullSecrets` 字段中包含两个密钥。这使得两个密钥对\
    \ Pod 内的所有容器都可用。以下是一个 Pod 定义示例：\n\n```\napiVersion: v1\nkind: Pod\nmetadata:\n\
    \  name: my-pod\nspec:\n  imagePullSecrets:\n  - name: secret1\n  - name: secret2\n\
    \  containers:\n  - name: container1\n    image: registry1.example.com/myimage1:latest\n\
    \  - name: container2\n    image: registry2.example.com/myimage2:latest\n```\n\
    \n在此设置中，`container1` 将使用 `secret1` 中的凭据从 `registry1.example.com` 拉取其镜像，而 `container2`\
    \ 将使用 `secret2` 中的凭据从 `registry2.example.com` 拉取其镜像。Kubernetes 将尝试使用 `imagePullSecrets`\
    \ 中提供的所有密钥对每个仓库进行认证，直到成功或用尽所有密钥。\n\n**注意：** 虽然此方法允许每个容器可能使用不同的密钥，但它并不限制容器必须使用特定的密钥。Pod\
    \ 中的每个容器都可以使用任何提供的密钥进行镜像拉取。关键在于，Pod 内容器使用的所有私有仓库所需的凭据都是可用的，从而允许镜像拉取操作成功。\n\n##\
    \ 练习 29：扩展 Redis 有状态集。\n\n扩展 Redis 有状态集的副本数。观察并记录对 Redis 数据和 Pod 命名约定的影响。\n\n\
    ## 解答\n\n扩展有状态集的一般语法是：\n\n```\n$ kubectl scale statefulsets <statefulset-name>\
    \ --replicas=<new-replica-count>\n```\n\n扩容将创建序号更高的新 Pod。缩容将移除序号最高的 Pod。\n\n##\
