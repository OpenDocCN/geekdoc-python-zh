    you can have 1 container in the pod with an **Always** pull policy and another
    one with **IfNotPresent**.


    # Default Behavior


    The default imagePullPolicy is determined by the image tag:


    If the image tag is **:latest**, Kubernetes defaults to **Always**. If the image
    tag is specific and not **:latest**, Kubernetes defaults to **IfNotPresent**.


    # Choosing the Right imagePullPolicy


    Use **Always** for development environments where you are pushing and testing
    image changes frequently.'
  - '[PAGE 164]


    **IfNotPresent** is suitable for production environments or when network efficiency
    and speed are crucial, and image updates are controlled.


    **Never** is mainly for testing with local images or in environments with strict
    network restrictions.


    Understanding and correctly setting the imagePullPolicy ensures that your deployments
    run the expected versions of your container images, balancing between stability,
    security, and efficiency.


    # How many pods in a cluster


    The number of pods that can run on a Kubernetes node or within a cluster depends
    on various factors, including the node''s resources (CPU, memory, storage), the
    cluster''s overall resources and configuration, and the resource requirements
    and limits of the pods themselves. Kubernetes doesn''t have a fixed limit on the
    number of pods per node or cluster; instead, it''s governed by the resources and
    configurations you have in place.


    # Considerations for Pods per Node


    **Node Resources:** The most basic limitation is the amount of CPU and memory
    resources available on a node. Each pod and its containers consume resources,
    and a node can only support pods up to its resource capacity.


    **Pod Resource Requests and Limits:** When you define a pod, you can specify resource
    requests and limits. Requests guarantee that the pod gets a minimum amount of
    resources, affecting scheduling decisions.'
  - '[PAGE 165]


    Limits ensure a pod doesn''t consume more than a specified amount of resources,
    preventing resource starvation among pods.


    **Kubelet Settings:** The Kubelet has a default setting for the maximum number
    of pods per node, which can be adjusted. For example, the default might be set
    to 110 pods per node, but this can vary depending on the Kubernetes setup and
    the version.


    **Network Resources:** Pods communicate with each other through the network, and
    network resources and configurations (like the number of IP addresses available)
    can also limit the number of pods per node.


    # Considerations for Pods per Cluster


    **Cluster Size and Resources:** The total capacity of a cluster (sum of the resources
    of all nodes) ultimately determines how many pods it can run. Adding more nodes
    or using nodes with more resources can increase the number of pods a cluster can
    support.


    **Kubernetes Master Components Scalability:** The scalability of the master components
    (such as the API server, scheduler, and etcd) also affects how many pods the cluster
    can handle efficiently. Large clusters may require tuning and optimization of
    these components.


    **Networking and Service Limits:** Kubernetes networking and the number of services
    in the cluster can impose limitations. For example, the maximum number of services
    and endpoints might impact cluster scalability.


    **Etcd Storage:** Etcd is used by Kubernetes to store all runtime data. As the
    number of objects (including pods) grows, the size and performance of the etcd
    database can become a limiting factor.'
  - '[PAGE 166]


    # Scalability Guidelines


    Kubernetes officially provides scalability guidelines that offer insight into
    how clusters perform under different loads. At the time of writing this, Kubernetes
    supports clusters with up to 5000 nodes and 150,000 total pods, but these numbers
    are continually evolving as Kubernetes and its underlying infrastructure improve.


    # Summary


    In this chapter, we embarked on a journey through the core of Kubernetes'' orchestration
    capabilities by exploring Pods—the smallest and most basic deployable objects
    in Kubernetes. Pods serve as the foundational building blocks of Kubernetes applications,
    encapsulating one or more containers that share storage, networking, and specifications
    on how to run the containers.


    The next chapter transitions from the foundational understanding of Pods to explore
    Deployments and Services, focusing on how Kubernetes orchestrates and manages
    containerized applications at scale, ensuring their availability and accessibility
    within the cluster.


    # Key Concepts Introduced


    **Pod Fundamentals:** We began with an introduction to what Pods are and why they
    are crucial in Kubernetes. Unlike traditional container deployment, which might
    focus on individual containers, Kubernetes uses Pods as the smallest deployable
    units, enabling sophisticated management, scaling, and networking features.'
  - '[PAGE 167]


    **Pod Lifecycle and Management:** Understanding the lifecycle of a Pod is essential
    for effectively managing applications in Kubernetes. We covered how Pods are created,
    scheduled, run, and eventually terminated. This section also introduced the importance
    of readiness and liveness probes for maintaining the health of Pods.


    **Multi-Container Pods:** We delved into the scenarios where a Pod might contain
    multiple containers. This setup allows for tightly coupled application components
    to be packaged together, sharing resources and networking space, which facilitates
    inter-communication and supports common patterns like sidecars, adapters, and
    ambassadors.


    **Networking in Pods:** Networking is a critical aspect of Pods, enabling them
    to communicate with each other and the outside world. We explored how each Pod
    is assigned a unique IP address and how services are used to provide a stable
    interface to groups of Pods.


    **Best Practices:** The chapter concluded with best practices for working with
    Pods, including designing for failure, understanding the importance of immutability
    and statelessness, and strategies for debugging and logging within Pods.'
  - '[PAGE 168]


    # Chapter 6: Beyond pods


    Having laid a solid groundwork with Pods—the atomic unit of scheduling in Kubernetes—we
    now venture deeper into the Kubernetes ecosystem. This chapter unfolds the orchestration
    capabilities of Kubernetes, introducing you to a suite of resources that empower
    scalability, management, and service discovery. These resources are pivotal in
    transforming standalone Pods into a coordinated, self-healing application system
    that epitomizes the essence of cloud-native principles.


    **Deployments** take center stage as we delve into the declarative management
    of Pods. You''ll learn how Deployments abstract the complexities of rolling out
    updates, managing replicas, and ensuring application availability. We''ll dissect
    the anatomy of a Deployment, illustrating how it supervises a desired state for
    your Pods, thereby automating your deployment strategies and scaling operations.


    Transitioning to **Services**, we explore the backbone of network communication
    within Kubernetes. Services enable loose coupling between Pods by providing a
    consistent endpoint for accessing the functionalities of a set of Pods. Whether
    you''re routing internal traffic or exposing your application to the external
    world, Services ensure your application components communicate efficiently and
    remain discoverable.


    As we navigate through these concepts, we also touch upon the significance of
    Labels and Selectors—the Kubernetes way of organizing and selecting subsets of
    objects. Understanding labels and selectors is crucial as they form the underlying
    mechanism for associating Deployments with Pods, and Services with the Pods they
    route traffic to.'
- md: "The narrative then extends to Ingress, an indispensable resource for managing\
    \ external access to your services. Ingress provides HTTP and HTTPS routing to\
    \ Services, enabling you to define entry points into your application that are\
    \ both secure and scalable. You'll learn how to configure Ingress rules to expose\
    \ your application to the outside world, implement load balancing, terminate SSL/TLS,\
    \ and offer name-based virtual hosting.\n\nBy integrating practical examples and\
    \ real-world scenarios, this chapter aims to equip you with the knowledge to design,\
    \ scale, and expose applications on Kubernetes confidently. From managing multiple\
    \ replicas of your application with Deployments to making your services accessible\
    \ via Ingress, you'll gain the insights needed to architect and deploy resilient,\
    \ accessible, and scalable applications on Kubernetes.\n\n## ReplicaSets\n\nReplicaSets\
    \ in Kubernetes are a fundamental workload API object that ensure a specified\
    \ number of replicas of a pod are running at any given time. They provide a way\
    \ to manage the lifecycle of pods, making sure that a specified number of pod\
    \ instances, based on a template, are running. ReplicaSets are primarily used\
    \ for maintaining the availability of a set of identical Pods, making them crucial\
    \ for fault tolerance and scalability in a Kubernetes environment.\n\n## Why We\
    \ Need ReplicaSets\n\n**High Availability:** ReplicaSets ensure that a specified\
    \ number of pod replicas are always running, even if some pods fail. This is crucial\
    \ for maintaining the availability of applications.\n\n**Load Distribution:**\
    \ By maintaining multiple replicas of a pod, ReplicaSets allow requests to be\
    \ distributed across the replicas, improving the application's performance and\
    \ reliability.\n\n**Scalability:** ReplicaSets make it easy to scale applications\
    \ up or down by simply changing the number of desired replicas, allowing applications\
    \ to handle varying loads efficiently.\n\n**Self-healing:** ReplicaSets provide\
    \ a self-healing mechanism by automatically replacing pods that fail, are deleted,\
    \ or are terminated for any reason, ensuring the application continues to run\
    \ as expected.\n\nHere's a simple example of a ReplicaSet that ensures three replicas\
    \ of an Nginx server are always running:\n\n```yaml\napiVersion: apps/v1 # (1)\n\
    kind: ReplicaSet # (2)\nmetadata:\n  name: nginx-replicaset\nspec: # (3)\n  replicas:\
    \ 3 # (4)\n  selector: # (5)\n    matchLabels:\n      app: nginx\n  template:\
    \ # (6)\n    metadata:\n      labels:\n        app: nginx\n    spec:\n      containers:\n\
    \        - name: nginx\n          image: nginx:latest\n```\n\n(1) -> Specifies\
    \ the API version; apps/v1 is the version for ReplicaSets.\n\n(2) -> Specifies\
    \ the kind of Kubernetes object; in this case, a ReplicaSet.\n\n(3) -> Provides\
    \ metadata about the ReplicaSet, including its name.\n\n(4) -> Defines the desired\
    \ state of the ReplicaSet.\n\n(5) -> Specifies the desired number of pod replicas.\n\
    \n(6) -> Defines how the ReplicaSet identifies the pods it manages, using labels\
    \ to select the correct pods.\n\n(7) -> Describes the pod template that the replicas\
    \ will be based on, including the container image to use ( **nginx:latest** )\
    \ and labels.\n\nThis ReplicaSet configuration tells Kubernetes to maintain three\
    \ replicas of the Nginx server pod. If any of the pods crash, the ReplicaSet will\
    \ automatically create a new pod to replace it, maintaining the desired state\
    \ of three replicas.\n\n## Deployments\n\nDeployments in Kubernetes offer a declarative\
    \ way to manage the lifecycle of Pods and ReplicaSets. They allow you to describe\
    \ the desired state of your application in a Deployment configuration, which Kubernetes\
    \ then works to maintain. Deployments handle the rolling update of Pods, enabling\
    \ you to easily update the version of your application running in Pods, roll back\
    \ to previous versions, scale up or down, and manage the state of your application\
    \ with ease.\n\n## Why We Need Deployments\n\n**Automated Rollouts and Rollbacks:**\
    \ Deployments automate the process of updating the application running in Pods,\
    \ including rolling updates, which ensure zero downtime during updates, and the\
    \ ability to roll back to a previous version if something goes wrong.\n\n**Scaling:**\
    \ Deployments make it easy to scale your application up or down based on demand,\
    \ by simply changing the number of replicas in the Deployment configuration.\n\
    \n**Self-healing:** Similar to ReplicaSets, Deployments ensure that a specified\
    \ number of Pods are always running, even if some Pods fail. They provide a higher\
    \ level of abstraction that includes the self-healing mechanism of ReplicaSets.\n\
    \n**Management of Pod Versions:** Deployments manage different versions of Pods,\
    \ making it easy to update the container images, configuration, or resource limits\
    \ without manually deleting and recreating Pods.\n\nLet's create a deployment\
    \ of 3 nginx pods.\n\n```yaml\napiVersion: apps/v1 # (1)\nkind: Deployment # (2)\n\
    metadata:\n  name: nginx-deployment\nspec:\n  replicas: 3 # (3)\n  selector:\n\
    \    matchLabels:\n      app: nginx\n  template: # (4)\n    metadata:\n      labels:\n\
    \        app: nginx\n    spec:\n      containers:\n      - name: nginx\n     \
    \   image: nginx:1.16.1\n        ports:\n        - containerPort: 80\n```\n\n\
    (1) -> Specifies the API version for Deployments.\n\n(2) -> Specifies the Kubernetes\
    \ resource type, in this case, a Deployment.\n\n(3) -> The spec section details\
    \ the desired state of the Deployment.\n\nreplicas: The number of desired Pod\
    \ replicas. selector: Defines how the Deployment identifies the Pods it manages.\
    \ It should match the labels of the Pods described in the template.\n\n(4) ->\
    \ The Pod template used to create replicas. This includes metadata (like labels)\
    \ and the spec (such as the container image and ports).\n\nThis Deployment ensures\
    \ that three replicas of the Nginx server (version 1.16.1) are running at all\
    \ times. If a Pod fails, the Deployment will automatically create a new one to\
    \ replace it. You can update the Deployment to roll out new versions of the application,\
    \ scale the number of replicas, and roll back to previous versions if necessary.\n\
    \nDeployments in Kubernetes provide a powerful and flexible way to manage your\
    \ applications. They abstract away the complexity of managing individual Pods\
    \ and ReplicaSets, offering a simpler and more robust mechanism for deploying,\
    \ scaling, and maintaining applications. Deployments are essential for anyone\
    \ looking to leverage Kubernetes for production-grade applications due to their\
    \ automated management features, including seamless rollouts and rollbacks, scaling,\
    \ and self-healing capabilities.\n\n## Difference between ReplicaSets and Deployments\n\
    \nThe main difference between a ReplicaSet and a Deployment in Kubernetes lies\
    \ in their purpose and capabilities. While both ensure that a specified number\
    \ of pod replicas are running, Deployments provide additional features such as\
    \ the ability to update those pods and manage their lifecycle more comprehensively.\n\
    \nA **ReplicaSet** ensures that a specified number of pod replicas are running\
    \ at any given time. It is primarily used for maintaining the availability of\
    \ a set of identical Pods. It can create and destroy Pods as needed to reach the\
    \ desired replica count. It watches for Pods that match its criteria and takes\
    \ action if the number is not met. But a ReplicaSet does not provide a built-in\
    \ mechanism for updating the Pods with a new version of the container image. To\
    \ update Pods managed by a ReplicaSet, you would need to manually delete Pods\
    \ for the ReplicaSet to recreate them with the new image, or use other mechanisms\
    \ outside of the ReplicaSet itself.\n\nA **Deployment** provides declarative updates\
    \ for Pods and ReplicaSets. Deployments manage the deployment and scaling of a\
    \ set of Pods and allow for declarative updates to the Pods and their configurations.\
    \ A Deployment includes all the capabilities of a ReplicaSet (managing replicas)\
    \ and adds support for rolling updates, rollbacks, and versioning. Deployments\
    \ keep a history of updates, allowing for easy rollbacks to previous versions\
    \ if needed. Deployments are ideal for managing stateless applications that require\
    \ easy scaling, rolling updates, and rollback capabilities.\n\n## Which One Should\
    \ You Use?\n\n**For Simple Pod Replica Management:** If your sole requirement\
    \ is to ensure a certain number of pod replicas are running, and you do not need\
    \ to update those pods once they are created, a ReplicaSet might suffice. However,\
    \ this use case is relatively rare in practice because most applications need\
    \ to be updated after deployment.\n\n**For General Application Deployment and\
    \ Management:** In most scenarios, Deployments are the recommended choice. Deployments\
    \ offer a superset of the ReplicaSet's capabilities, including managing replicas\
    \ with the added benefits of seamless updates and rollbacks. They provide a higher\
    \ level of abstraction that simplifies many aspects of application management,\
    \ making Deployments suitable for most application deployment needs in Kubernetes.\n\
    \nIn summary, while ReplicaSets are useful for maintaining a specific number of\
    \ replicas, Deployments are generally preferred for application deployment and\
    \ management in Kubernetes due to their comprehensive set of features that cover\
    \ the lifecycle management of Pods and ReplicaSets."
  mdcn: "随后，叙述扩展到 Ingress，这是管理服务外部访问不可或缺的资源。Ingress 为服务提供 HTTP 和 HTTPS 路由，使你能够定义既安全又可扩展的应用程序入口点。你将学习如何配置\
    \ Ingress 规则以将应用程序暴露给外部世界、实现负载均衡、终止 SSL/TLS 以及提供基于名称的虚拟主机。\n\n通过结合实际示例和真实场景，本章旨在让你掌握在\
    \ Kubernetes 上自信地设计、扩展和暴露应用程序的知识。从使用 Deployments 管理应用程序的多个副本，到通过 Ingress 使服务可访问，你将获得在\
    \ Kubernetes 上构建和部署弹性、可访问且可扩展应用程序所需的见解。\n\n## ReplicaSets\n\nKubernetes 中的 ReplicaSets\
    \ 是一种基本的工作负载 API 对象，它确保在任何给定时间都有指定数量的 Pod 副本在运行。它们提供了一种管理 Pod 生命周期的方式，确保基于模板的指定数量的\
    \ Pod 实例正在运行。ReplicaSets 主要用于维护一组相同 Pod 的可用性，使其在 Kubernetes 环境中对于容错和可扩展性至关重要。\n\
    \n## 为什么我们需要 ReplicaSets\n\n**高可用性：** ReplicaSets 确保始终有指定数量的 Pod 副本在运行，即使某些 Pod\
    \ 发生故障。这对于维护应用程序的可用性至关重要。\n\n**负载分布：** 通过维护 Pod 的多个副本，ReplicaSets 允许将请求分布到各个副本上，从而提高应用程序的性能和可靠性。\n\
    \n**可扩展性：** ReplicaSets 使得通过简单地更改所需副本数量来轻松扩展应用程序成为可能，使应用程序能够高效处理不同的负载。\n\n**自愈能力：**\
    \ ReplicaSets 提供了一种自愈机制，通过自动替换因任何原因而失败、被删除或被终止的 Pod，确保应用程序继续按预期运行。\n\n这是一个简单的\
    \ ReplicaSet 示例，它确保始终运行三个 Nginx 服务器副本：\n\n```yaml\napiVersion: apps/v1 # (1)\n\
    kind: ReplicaSet # (2)\nmetadata:\n  name: nginx-replicaset\nspec: # (3)\n  replicas:\
    \ 3 # (4)\n  selector: # (5)\n    matchLabels:\n      app: nginx\n  template:\
    \ # (6)\n    metadata:\n      labels:\n        app: nginx\n    spec:\n      containers:\n\
    \        - name: nginx\n          image: nginx:latest\n```\n\n(1) -> 指定 API 版本；apps/v1\
    \ 是 ReplicaSets 的版本。\n\n(2) -> 指定 Kubernetes 对象的类型；在本例中是 ReplicaSet。\n\n(3) ->\
    \ 提供关于 ReplicaSet 的元数据，包括其名称。\n\n(4) -> 定义 ReplicaSet 的期望状态。\n\n(5) -> 指定期望的 Pod\
    \ 副本数量。\n\n(6) -> 定义 ReplicaSet 如何识别其管理的 Pod，使用标签选择正确的 Pod。\n\n(7) -> 描述副本将基于的\
    \ Pod 模板，包括要使用的容器镜像（**nginx:latest**）和标签。\n\n此 ReplicaSet 配置告诉 Kubernetes 维持三个\
    \ Nginx 服务器 Pod 的副本。如果任何 Pod 崩溃，ReplicaSet 将自动创建一个新的 Pod 来替换它，从而维持三个副本的期望状态。\n\
    \n## Deployments\n\nKubernetes 中的 Deployments 提供了一种声明式的方式来管理 Pod 和 ReplicaSets\
    \ 的生命周期。它们允许你在 Deployment 配置中描述应用程序的期望状态，然后 Kubernetes 会努力维持该状态。Deployments 处理\
    \ Pod 的滚动更新，使你能够轻松更新在 Pod 中运行的应用程序版本、回滚到先前版本、向上或向下扩展以及轻松管理应用程序的状态。\n\n## 为什么我们需要\
    \ Deployments\n\n**自动推出和回滚：** Deployments 自动化了更新在 Pod 中运行的应用程序的过程，包括滚动更新（确保更新期间零停机）以及在出现问题时回滚到先前版本的能力。\n\
    \n**扩展：** Deployments 使得根据需求轻松扩展应用程序成为可能，只需更改 Deployment 配置中的副本数量即可。\n\n**自愈能力：**\
    \ 与 ReplicaSets 类似，Deployments 确保始终有指定数量的 Pod 在运行，即使某些 Pod 发生故障。它们提供了更高层次的抽象，包括\
    \ ReplicaSets 的自愈机制。\n\n**Pod 版本管理：** Deployments 管理不同版本的 Pod，使得更新容器镜像、配置或资源限制变得容易，而无需手动删除和重新创建\
    \ Pod。\n\n让我们创建一个包含 3 个 nginx Pod 的 Deployment。\n\n```yaml\napiVersion: apps/v1\
    \ # (1)\nkind: Deployment # (2)\nmetadata:\n  name: nginx-deployment\nspec:\n\
    \  replicas: 3 # (3)\n  selector:\n    matchLabels:\n      app: nginx\n  template:\
    \ # (4)\n    metadata:\n      labels:\n        app: nginx\n    spec:\n      containers:\n\
    \      - name: nginx\n        image: nginx:1.16.1\n        ports:\n        - containerPort:\
    \ 80\n```\n\n(1) -> 指定 Deployments 的 API 版本。\n\n(2) -> 指定 Kubernetes 资源类型，在本例中是\
    \ Deployment。\n\n(3) -> spec 部分详细说明了 Deployment 的期望状态。\n\nreplicas: 期望的 Pod 副本数量。selector:\
    \ 定义 Deployment 如何识别其管理的 Pod。它应与模板中描述的 Pod 的标签匹配。\n\n(4) -> 用于创建副本的 Pod 模板。这包括元数据（如标签）和\
    \ spec（如容器镜像和端口）。\n\n此 Deployment 确保始终运行三个 Nginx 服务器（版本 1.16.1）的副本。如果 Pod 失败，Deployment\
    \ 将自动创建一个新的 Pod 来替换它。你可以更新 Deployment 以推出应用程序的新版本、扩展副本数量，并在必要时回滚到先前版本。\n\nKubernetes\
    \ 中的 Deployments 提供了一种强大且灵活的方式来管理你的应用程序。它们抽象了管理单个 Pod 和 ReplicaSets 的复杂性，为部署、扩展和维护应用程序提供了更简单、更健壮的机制。Deployments\
    \ 对于任何希望利用 Kubernetes 运行生产级应用程序的人来说都是必不可少的，因为它们具有自动化管理功能，包括无缝的推出和回滚、扩展以及自愈能力。\n\
    \n## ReplicaSets 和 Deployments 之间的区别\n\nKubernetes 中 ReplicaSet 和 Deployment 之间的主要区别在于它们的目的和功能。虽然两者都确保有指定数量的\
    \ Pod 副本在运行，但 Deployments 提供了额外的功能，例如更新这些 Pod 以及更全面地管理其生命周期的能力。\n\n**ReplicaSet**\
    \ 确保在任何给定时间都有指定数量的 Pod 副本在运行。它主要用于维护一组相同 Pod 的可用性。它可以根据需要创建和销毁 Pod 以达到所需的副本计数。它监视与其标准匹配的\
    \ Pod，并在数量未达到时采取行动。但是，ReplicaSet 不提供使用新版本容器镜像更新 Pod 的内置机制。要更新由 ReplicaSet 管理的\
    \ Pod，你需要手动删除 Pod，以便 ReplicaSet 使用新镜像重新创建它们，或者使用 ReplicaSet 本身之外的其他机制。\n\n**Deployment**\
    \ 为 Pod 和 ReplicaSets 提供声明式更新。Deployments 管理一组 Pod 的部署和扩展，并允许对 Pod 及其配置进行声明式更新。Deployment\
    \ 包含 ReplicaSet 的所有功能（管理副本），并增加了对滚动更新、回滚和版本控制的支持。Deployments 保留更新历史记录，允许在需要时轻松回滚到先前版本。Deployments\
    \ 非常适合管理需要轻松扩展、滚动更新和回滚功能的无状态应用程序。\n\n## 你应该使用哪一个？\n\n**对于简单的 Pod 副本管理：** 如果你的唯一要求是确保一定数量的\
    \ Pod 副本在运行，并且你不需要在创建后更新这些 Pod，那么 ReplicaSet 可能就足够了。然而，这种用例在实践中相对较少，因为大多数应用程序在部署后都需要更新。\n\
    \n**对于通用的应用程序部署和管理：** 在大多数情况下，Deployments 是推荐的选择。Deployments 提供了 ReplicaSet 功能的超集，包括管理副本以及无缝更新和回滚的额外好处。它们提供了更高层次的抽象，简化了应用程序管理的许多方面，使\
    \ Deployments 适用于 Kubernetes 中的大多数应用程序部署需求。\n\n总之，虽然 ReplicaSets 对于维护特定数量的副本很有用，但由于其全面的功能集涵盖了\
    \ Pod 和 ReplicaSets 的生命周期管理，Deployments 通常是 Kubernetes 中应用程序部署和管理的首选。"
