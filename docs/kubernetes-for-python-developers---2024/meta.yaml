  - '[PAGE 305]


    Our PVC **cache** is configured with **ReadWriteOnce**, which means that the first
    pod which comes up attaches to the volume, and the second pod can''t boot because
    it can''t attach to a volume which is already attached to the first pod.


    We could configure our volume to have an access mode of **ReadWriteMany**, but
    Digitalocean Kubernetes'' storage policy doesn''t allow us to create volumes of
    such type, at least out of the box. Before we go in that direction, let''s discuss
    how Redis, and in general, most stateful applications work when scaled.


    Stateless applications do not store data or session information internally. Any
    state or data needed for processing is typically provided in each request, and
    responses are generated without relying on stored data. Scaling stateless applications
    is relatively straightforward in Kubernetes. You can increase or decrease the
    number of pod replicas without worrying about data persistence or synchronization
    issues, as each instance is independent and identical.


    Examples: The nginx deployment is considered stateless as it does not need to
    remember information about client sessions between requests. Even the Flask hello
    world and redis page count applications are stateless. **Note** that the page
    count application is considered to be stateless in spite of the fact that the
    page count increments everytime the page is visited. This is because the page
    count is not store in that application directly, it is being fetched from the
    Redis cache.


    Stateful applications save data generated during interactions and rely on this
    data for future transactions. Scaling stateful applications is more complex. It
    requires careful management of data persistence, replication, and consistency.


    Examples: The Redis cache deployment is stateful.'
  - '[PAGE 306]


    The Redis Master-Slave architecture is a method to achieve data replication and
    high availability in Redis deployments. It is a fundamental part of Redis''s ability
    to scale out and provide fault tolerance for stored data. Here''s an overview
    of how it works:


    # Components


    **Master:** The master node is the primary node that receives all write operations.
    It holds the original dataset and is responsible for handling client requests,
    including reads and writes. The master node also replicates changes to one or
    more slave nodes.


    **Slave:** Slave nodes are replicas of the master node. They connect to the master
    to perform an initial sync (copying the entire dataset from the master) and subsequently
    receive updates from the master as changes occur. Slaves can accept read requests
    to distribute the read load and increase the system''s read throughput. In the
    event of a master failure, a slave can be promoted to a new master, ensuring the
    availability of the service.


    # Replication Process


    **Initial Sync:** When a slave connects to a master, it initiates a synchronization
    process. The master creates a snapshot of its current dataset and sends it to
    the slave. The slave loads this snapshot into its memory, effectively cloning
    the master''s dataset.


    **Command Propagation:** After the initial sync, the master continues to propagate
    all write commands to the connected slaves. This ensures that all changes made
    to the master are mirrored on the slaves, keeping the datasets consistent across
    the master and all its replicas.'
  - '[PAGE 307]


    **Partial Resynchronization:** If a slave temporarily loses connection to the
    master but reconnects before the master''s buffer is exhausted, it can request
    a partial resynchronization. The master then sends only the changes that occurred
    during the disconnection, avoiding the need for a full dataset transfer.


    By replicating data from the master to one or more slaves, Redis ensures that
    data is not lost even in the event of hardware failures or network issues, and
    it supports scaling read operations across multiple nodes.


    This indicates that each instance of redis(master or slave) needs to have its
    own persistent volume to store the data. Sharing the same PVC is out of question
    now.


    # The problem of ephemeral pod identity


    Each pod in a Deployment is interchangeable, with no stable network identity or
    storage. When a pod is terminated and replaced (which can happen during scaling
    operations, updates, or node failures), the new pod is treated as a brand new
    instance. Even though the PVC ensures data persistence beyond the lifecycle of
    a single pod, the new pod might not reattach to the same PersistentVolume (PV)
    as the old one, especially if the Deployment is scaled to multiple replicas. This
    can lead to data inconsistency or loss, as new pods might start with an empty
    data set or an outdated snapshot of the data.


    # No Ordered, Graceful Scaling or Updates


    Deployments do not provide guarantees about the order in which pods are started,
    stopped, or updated. For Redis, which often relies on a master-slave architecture
    for replication and high availability, this can disrupt the replication topology.
    For instance, a master instance could be terminated before a new replica has fully
    synchronized, leading to potential data loss or service downtime.'
- md: "## Need for stateful sets\n\nWhat if each pod in a deployment could have its\
    \ own PVC? Also, what if we get strong guarantees about the order in which each\
    \ replica would start? For instance, the master always comes up first, followed\
    \ by the slave replicas. In addition, if Kubernetes could give us predictable\
    \ pod identities, like **redis-master-0**, instead of a random **cache-cd5968d5b-btjcg**\
    \ (we don't know if **cache-cd5968d5b-btjcg** is a master or a slave pod), that\
    \ would solve all our problems. This is exactly what a statefulset offers.\n\n\
    Let's see how statefulsets solve each of these issues and more.\n\n**Stable, Unique\
    \ Network Identifiers:** Each pod in a StatefulSet has a stable hostname derived\
    \ from the name of the StatefulSet and an ordinal index (e.g., **redis-0**, **redis-1**).\
    \ This ensures that even after restarts or rescheduling, the identity of the pods\
    \ remains consistent, preserving network communication and data replication configurations.\n\
    \n**Persistent Storage Binding:** Each pod in a StatefulSet can be associated\
    \ with a dedicated PersistentVolume through PVC templates. This ensures that each\
    \ pod always reattaches to the same PV, preserving its state across restarts and\
    \ rescheduling.\n\n**Ordered, Graceful Deployment and Scaling:** StatefulSet ensures\
    \ that pods are created, scaled, and terminated in a strict, ordered manner (according\
    \ to their ordinal index). For Redis, this means that master and replica instances\
    \ can be managed to ensure data integrity and consistent replication.\n\n## Modelling\
    \ redis as a statefulset\n\n![](img/91c4bde832e221ba5bc429caf9587286_309_0.png)\n\
    \nRedis as a statefulset\n\nLet's model Redis under a master-slave architecture\
    \ to achieve more resilience. We are now convinced that this can't be done as\
    \ a deployment. How will all these conditions pan out in a redis statefulset?\n\
    \nIf we model our Redis cluster as a 3-pod StatefulSet with one master (e.g.,\
    \ **redis-0**) and two replicas (e.g., **redis-1**, **redis-2**), Kubernetes ensures\
    \ that:\n\n- 1. Each Redis pod is bound to its own PersistentVolume, preserving\
    \ data even if the pod moves to another node.\n- 2. Pods are started and terminated\
    \ in an orderly fashion, respecting Redis's replication and data integrity requirements.\n\
    - 3. Network identities (hostnames) remain consistent, ensuring that replication\
    \ and client connections are stable and predictable.\n\nWe want to make a few\
    \ changes this time. We won't be using the Bitnami Redis image. Even though it\
    \ is possible to use that image and build a statefulset, we have to tweak a lot\
    \ of configuration parameters in their setup. I also want to mention that Bitnami\
    \ makes building this master-slave Redis cluster a breeze, but we will build a\
    \ watered down version of the same for pedagogical purposes. Also, the focus will\
    \ be mostly on modelling a statefulset and less on Redis configuration (which\
    \ is a separate book in itself). Hence, we will stick to the official Redis image.\n\
    \nThe official Redis image doesn't come with a **redis.conf**. We have to create\
    \ a minimal version and attach it to the pods, since both the master and slave\
    \ redis instances need redis configuration. This file, as we will learn later,\
    \ will contain the network identity (fancy word for the network accessible service\
    \ name) of the master pod so that slave instances know who the master is and how\
    \ to connect to that.\n\nWe will also write a script, which will find out if the\
    \ current pod is master or not, and accordingly append the master's network identity\
    \ to the **redis.conf** file. After this, it will start the redis process. We\
    \ will model both of these as configmaps.\n\n```\nmasterauth SuperS3cret # (1)\n\
    requirepass SuperS3cret # (2)\nbind 0.0.0.0 # (3)\nprotected-mode no # (4)\nport\
    \ 6379 # (5)\ndir \"/data\" # (6)\n```\n\n(1) -> Sets the password required for\
    \ a slave to authenticate with the master.\n\n(2) -> Configures the password required\
    \ by clients to connect to the Redis server.\n\n(3) -> Allows Redis to accept\
    \ connections on all network interfaces.\n\n(4) -> Disables protected mode, allowing\
    \ connections from any IP address.\n\n(5) -> Specifies the port on which the Redis\
    \ server listens for connections.\n\n(6) -> Sets the directory where Redis will\
    \ write persistent data files.\n\nThe redis init script follows next.\n\n```\n\
    #!/bin/sh\nmkdir -p /etc/redis # (1)\ncp /tmp/redis/redis.conf /etc/redis/redis.conf\
    \ # (2)\n\nPOD_NAME=$(hostname) # (3)\n\nPOD_BASE_NAME=$(echo $POD_NAME | sed\
    \ 's/-[0-9]*$//') # (4)\nPOD_INDEX=$(echo $POD_NAME | sed 's/^.*-//') # (5)\n\n\
    MASTER_POD_NAME=\"${POD_BASE_NAME}-0.redis\" # (6)\n\nREDIS_CONF=\"/etc/redis/redis.conf\"\
    \ # (7)\n\nif [ \"$POD_INDEX\" = \"0\" ]; then # (8)\n    echo \"Starting as master...\"\
    \nelse # (9)\n    echo \"Setting up as replica of $MASTER_POD_NAME...\"\n    echo\
    \ \"replicaof $MASTER_POD_NAME 6379\" >> $REDIS_CONF\nfi\n\nredis-server $REDIS_CONF\
    \  # (10)\n```\n\n(1) -> Creates the /etc/redis directory if it doesn't already\
    \ exist.\n\n(2) -> Copies the redis.conf file from /tmp/redis to /etc/redis. We\
    \ will later learn that we mount this file as a configmap in the statefulset.\n\
    \n(3) -> Stores the hostname of the current pod in **POD_NAME**.\n\n(4) -> Extracts\
    \ the base name of the pod by removing the numeric suffix. So, if your pod name\
    \ is **redis-1**, the base name will be **redis**.\n\n(5) -> Retrieves the index\
    \ number of the pod from its hostname. For pod name **redis-1**, index number\
    \ will be **1**.\n\n(6) -> Constructs the master pod's name by appending **-0.redis**\
    \ to the base name. **Note** that steps 4,5 and 6 wouldn't be possible if this\
    \ were a deployment, as we wouldn't get predictable pod names/network identifiers.\n\
    \n(7) -> Sets the path to the Redis configuration file.\n\n(8) -> Checks if the\
    \ current pod is the first one (master) based on its index. Again, wouldn't be\
    \ possible if this pod is part of a deployment.\n\n(9) -> For pods other than\
    \ the first one, configures them as replicas of the master.\n\n(10) -> Starts\
    \ the Redis server using the configuration file.\n\nThen, we move on to create\
    \ the statefulset.\n\n```yaml\napiVersion: apps/v1\nkind: StatefulSet # (1)\n\
    metadata:\n  name: redis\nspec:\n  serviceName: \"redis\" # (2)\n  replicas: 3\
    \ # (3)\n  selector:\n    matchLabels:\n      app: redis\n  template:\n    metadata:\n\
    \      labels:\n        app: redis\n    spec:\n      initContainers:\n      -\
    \ name: volume-permissions # (4)\n        image: busybox\n        command: ['sh',\
    \ '-c', 'chmod -R 777 /data']\n        volumeMounts:\n        - name: redis-data\n\
    \          mountPath: /data\n      containers:\n      - name: redis\n        image:\
    \ redis:7.2.4 # (5)\n        command: ['/scripts/redis-init.sh'] # (6)\n     \
    \   ports:\n        - containerPort: 6379\n        volumeMounts:\n        - name:\
    \ redis-data # (7)\n          mountPath: /data\n        - name: redis-script #\
    \ (8)\n          mountPath: /scripts\n        - name: redis-config # (9)\n   \
    \       mountPath: /tmp/redis/redis.conf\n          subPath: redis.conf\n    \
    \  volumes:\n      - name: redis-script # (10)\n        configMap:\n         \
    \ name: redis-custom\n          items:\n          - key: redis-init.sh\n     \
    \       path: redis-init.sh\n          defaultMode: 0755\n      - name: redis-config\
    \ # (11)\n        configMap:\n          name: redis-custom\n          items:\n\
    \          - key: redis.conf\n            path: redis.conf\n  volumeClaimTemplates:\
    \ # (12)\n  - metadata:\n      name: redis-data\n    spec:\n      accessModes:\
    \ [ \"ReadWriteOnce\" ]\n      resources:\n        requests:\n          storage:\
    \ 1Gi\n```\n\n(1) -> Defines the resource as a StatefulSet, which is used for\
    \ managing stateful applications.\n\n(2) -> Specifies the name of the Service\
    \ that will govern this StatefulSet, used for network identity. Each pod in this\
    \ statefulset will use this as the base name along with the ordinal number to\
    \ address other pods.\n\n(3) -> Sets the desired number of pod replicas to 3.\
    \ 1 master and 2 slaves in our case.\n\n(4) -> Declares an init container named\
    \ volume-permissions to change permissions of the /data directory.\n\n(5) -> We\
    \ use the official Redis Docker image instead of the Bitnami image for reasons\
    \ mentioned above.\n\n(6) -> Overrides the default command to run a custom initialization\
    \ script for Redis configuration.\n\n(7) -> Mounts a volume named redis-data at\
    \ /data path in the Redis container for persistent storage. This has been configured\
    \ in the redis.conf earlier.\n\n(8) -> Mounts a configmap volume named redis-script\
    \ at /scripts, where the custom init script is located."
  mdcn: "## 有状态集的需求\n\n如果部署中的每个 Pod 都能拥有自己的 PVC 会怎样？此外，如果我们能获得关于每个副本启动顺序的强力保证呢？例如，主节点总是先启动，然后是从副本节点。另外，如果\
    \ Kubernetes 能给我们提供可预测的 Pod 标识，比如 **redis-master-0**，而不是随机的 **cache-cd5968d5b-btjcg**（我们不知道\
    \ **cache-cd5968d5b-btjcg** 是主节点还是从节点 Pod），那将解决我们所有的问题。这正是有状态集所提供的。\n\n让我们看看有状态集如何解决这些问题以及更多问题。\n\
    \n**稳定、唯一的网络标识符：** 有状态集中的每个 Pod 都有一个稳定的主机名，该主机名源自有状态集的名称和一个序号索引（例如 **redis-0**、**redis-1**）。这确保了即使在重启或重新调度后，Pod\
    \ 的标识也保持一致，从而保留了网络通信和数据复制配置。\n\n**持久存储绑定：** 有状态集中的每个 Pod 都可以通过 PVC 模板与一个专用的 PersistentVolume\
    \ 关联。这确保了每个 Pod 始终重新连接到相同的 PV，从而在重启和重新调度过程中保留其状态。\n\n**有序、优雅的部署和扩缩容：** 有状态集确保\
    \ Pod 以严格、有序的方式（根据其序号索引）创建、扩缩容和终止。对于 Redis，这意味着可以管理主节点和副本实例，以确保数据完整性和一致的复制。\n\n\
    ## 将 Redis 建模为有状态集\n\n![](img/91c4bde832e221ba5bc429caf9587286_309_0.png)\n\n\
    Redis 作为有状态集\n\n让我们将 Redis 建模为主从架构以实现更高的弹性。我们现在确信，这无法通过部署来实现。所有这些条件在 Redis 有状态集中将如何实现？\n\
    \n如果我们把 Redis 集群建模为一个包含 1 个主节点（例如 **redis-0**）和 2 个副本（例如 **redis-1**、**redis-2**）的\
    \ 3 Pod 有状态集，Kubernetes 将确保：\n\n- 1. 每个 Redis Pod 都绑定到自己的 PersistentVolume，即使\
    \ Pod 移动到另一个节点也能保留数据。\n- 2. Pod 以有序的方式启动和终止，尊重 Redis 的复制和数据完整性要求。\n- 3. 网络标识（主机名）保持一致，确保复制和客户端连接稳定且可预测。\n\
    \n这次我们想做一些改变。我们将不使用 Bitnami Redis 镜像。尽管可以使用该镜像构建有状态集，但我们必须在其设置中调整大量配置参数。我还想提一下，Bitnami\
    \ 使得构建这个主从 Redis 集群变得轻而易举，但为了教学目的，我们将构建一个简化版本。此外，重点将主要放在建模有状态集上，而不是 Redis 配置（这本身就是一个独立的主题）。因此，我们将坚持使用官方\
    \ Redis 镜像。\n\n官方 Redis 镜像不包含 **redis.conf**。我们必须创建一个最小版本并将其附加到 Pod，因为主节点和从节点\
    \ Redis 实例都需要 Redis 配置。正如我们稍后将了解到的，此文件将包含主节点 Pod 的网络标识（网络可访问服务名称的花哨说法），以便从节点实例知道谁是主节点以及如何连接到它。\n\
    \n我们还将编写一个脚本，该脚本将找出当前 Pod 是否是主节点，并相应地将主节点的网络标识附加到 **redis.conf** 文件中。之后，它将启动 Redis\
    \ 进程。我们将把这两者都建模为配置映射。\n\n```\nmasterauth SuperS3cret # (1)\nrequirepass SuperS3cret\
    \ # (2)\nbind 0.0.0.0 # (3)\nprotected-mode no # (4)\nport 6379 # (5)\ndir \"\
    /data\" # (6)\n```\n\n(1) -> 设置从节点向主节点进行身份验证所需的密码。\n\n(2) -> 配置客户端连接到 Redis 服务器所需的密码。\n\
    \n(3) -> 允许 Redis 在所有网络接口上接受连接。\n\n(4) -> 禁用保护模式，允许来自任何 IP 地址的连接。\n\n(5) -> 指定\
    \ Redis 服务器监听连接的端口。\n\n(6) -> 设置 Redis 将写入持久数据文件的目录。\n\n接下来是 Redis 初始化脚本。\n\n\
    ```\n#!/bin/sh\nmkdir -p /etc/redis # (1)\ncp /tmp/redis/redis.conf /etc/redis/redis.conf\
    \ # (2)\n\nPOD_NAME=$(hostname) # (3)\n\nPOD_BASE_NAME=$(echo $POD_NAME | sed\
    \ 's/-[0-9]*$//') # (4)\nPOD_INDEX=$(echo $POD_NAME | sed 's/^.*-//') # (5)\n\n\
    MASTER_POD_NAME=\"${POD_BASE_NAME}-0.redis\" # (6)\n\nREDIS_CONF=\"/etc/redis/redis.conf\"\
    \ # (7)\n\nif [ \"$POD_INDEX\" = \"0\" ]; then # (8)\n    echo \"Starting as master...\"\
    \nelse # (9)\n    echo \"Setting up as replica of $MASTER_POD_NAME...\"\n    echo\
    \ \"replicaof $MASTER_POD_NAME 6379\" >> $REDIS_CONF\nfi\n\nredis-server $REDIS_CONF\
    \  # (10)\n```\n\n(1) -> 如果 /etc/redis 目录不存在，则创建它。\n\n(2) -> 将 redis.conf 文件从\
    \ /tmp/redis 复制到 /etc/redis。我们稍后将了解到，我们在有状态集中将此文件作为配置映射挂载。\n\n(3) -> 将当前 Pod 的主机名存储在\
    \ **POD_NAME** 中。\n\n(4) -> 通过移除数字后缀提取 Pod 的基本名称。因此，如果你的 Pod 名称是 **redis-1**，基本名称将是\
    \ **redis**。\n\n(5) -> 从其主机名中检索 Pod 的索引号。对于 Pod 名称 **redis-1**，索引号将是 **1**。\n\n\
    (6) -> 通过将 **-0.redis** 附加到基本名称来构造主节点 Pod 的名称。**请注意**，如果这是一个部署，步骤 4、5 和 6 将无法实现，因为我们将无法获得可预测的\
    \ Pod 名称/网络标识符。\n\n(7) -> 设置 Redis 配置文件的路径。\n\n(8) -> 根据其索引检查当前 Pod 是否是第一个（主节点）。同样，如果此\
    \ Pod 是部署的一部分，这将无法实现。\n\n(9) -> 对于第一个以外的 Pod，将它们配置为主节点的副本。\n\n(10) -> 使用配置文件启动\
    \ Redis 服务器。\n\n然后，我们继续创建有状态集。\n\n```yaml\napiVersion: apps/v1\nkind: StatefulSet\
    \ # (1)\nmetadata:\n  name: redis\nspec:\n  serviceName: \"redis\" # (2)\n  replicas:\
    \ 3 # (3)\n  selector:\n    matchLabels:\n      app: redis\n  template:\n    metadata:\n\
    \      labels:\n        app: redis\n    spec:\n      initContainers:\n      -\
    \ name: volume-permissions # (4)\n        image: busybox\n        command: ['sh',\
    \ '-c', 'chmod -R 777 /data']\n        volumeMounts:\n        - name: redis-data\n\
    \          mountPath: /data\n      containers:\n      - name: redis\n        image:\
    \ redis:7.2.4 # (5)\n        command: ['/scripts/redis-init.sh'] # (6)\n     \
    \   ports:\n        - containerPort: 6379\n        volumeMounts:\n        - name:\
    \ redis-data # (7)\n          mountPath: /data\n        - name: redis-script #\
    \ (8)\n          mountPath: /scripts\n        - name: redis-config # (9)\n   \
    \       mountPath: /tmp/redis/redis.conf\n          subPath: redis.conf\n    \
    \  volumes:\n      - name: redis-script # (10)\n        configMap:\n         \
    \ name: redis-custom\n          items:\n          - key: redis-init.sh\n     \
    \       path: redis-init.sh\n          defaultMode: 0755\n      - name: redis-config\
    \ # (11)\n        configMap:\n          name: redis-custom\n          items:\n\
    \          - key: redis.conf\n            path: redis.conf\n  volumeClaimTemplates:\
    \ # (12)\n  - metadata:\n      name: redis-data\n    spec:\n      accessModes:\
    \ [ \"ReadWriteOnce\" ]\n      resources:\n        requests:\n          storage:\
    \ 1Gi\n```\n\n(1) -> 将资源定义为有状态集，用于管理有状态应用程序。\n\n(2) -> 指定将管理此有状态集的 Service 名称，用于网络标识。此有状态集中的每个\
    \ Pod 都将使用此名称作为基本名称，并结合序号来寻址其他 Pod。\n\n(3) -> 将所需的 Pod 副本数设置为 3。在我们的例子中是 1 个主节点和\
    \ 2 个从节点。\n\n(4) -> 声明一个名为 volume-permissions 的初始化容器，用于更改 /data 目录的权限。\n\n(5)\
    \ -> 我们使用官方 Redis Docker 镜像，而不是 Bitnami 镜像，原因如上所述。\n\n(6) -> 覆盖默认命令以运行用于 Redis\
    \ 配置的自定义初始化脚本。\n\n(7) -> 在 Redis 容器中的 /data 路径挂载一个名为 redis-data 的卷，用于持久存储。这在之前的\
    \ redis.conf 中已经配置过。\n\n(8) -> 在 /scripts 挂载一个名为 redis-script 的配置映射卷，自定义初始化脚本位于此处。"
