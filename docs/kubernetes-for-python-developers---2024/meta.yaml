    ## 练习 29：扩展 Redis StatefulSet。


    扩展 Redis StatefulSet 的规模。观察并记录对 Redis 数据和 Pod 命名约定的影响。


    ## 练习 30：使用 Redis Sentinel 为 Redis 设置高可用性。


    在 Redis StatefulSet 旁边部署 Redis Sentinel，以监控主节点并在主节点故障时执行自动故障转移。记录部署过程和故障转移测试。


    ## 其他上下文中的 StatefulSet


    上述示例展示了 StatefulSet 在高可用 Redis 主从设置中的概念。除了 Redis，Kubernetes 中的 StatefulSet 旨在管理各种用例中的有状态应用程序和服务，特别是数据库，这些数据库从
    StatefulSet 提供的特定功能中受益匪浅。


    这些功能包括为每个 Pod 提供稳定、唯一的网络标识符，确保可预测和一致的寻址；稳定、持久的存储，允许每个 Pod 永久连接到其存储，在 Pod 重新调度和重启时保留数据；有序、优雅的部署和扩展，这对于管理依赖关系和维护有状态应用程序的完整性至关重要；以及有序、自动化的滚动更新，允许无缝、最小停机时间的更新。这些能力对于任何有状态服务都至关重要，确保复杂、依赖状态的应用程序（如数据库）在应用程序的整个生命周期中保持其状态，提高可靠性和运营效率。


    例如，对于 PostgreSQL，使用 StatefulSet 实现高可用性（HA）涉及利用这些功能来确保数据库实例得到一致且可靠的管理。典型的设置可能包括一个由一个
    StatefulSet 管理的主 PostgreSQL 实例和多个由另一个 StatefulSet 管理的副本，或者根据架构全部在单个 StatefulSet
    中。PersistentVolume 确保在 Pod 被移动或重启时数据不会丢失。稳定的网络标识符使得配置和维护主实例和副本实例之间的复制更加容易。Kubernetes
    服务可用于公开数据库实例，并将流量管理到主节点进行写入，副本节点进行读取，从而提高性能。


    ## 服务账户和 RBAC


    Kubernetes 被设计为一个容器编排系统。其重点在于管理集群内的资源，而不是管理单个用户账户。因此，Kubernetes 没有用户账户的概念。嗯，至少不是直接的。可以将用户身份验证委托给外部系统。Kubernetes
    依赖外部机制（如 OpenID Connect、LDAP、x509 证书等）来对用户进行身份验证。这种设计允许 Kubernetes 与各种身份验证提供者集成，而无需直接管理用户账户。


    在许多情况下，我们需要一个非人类用户账户来对集群执行特定操作，例如在 Kubernetes 中运行 CI/CD 流水线，或者一个 Pod 与其运行所在的同一集群内的
    Kubernetes 资源进行交互。这些特殊类型的账户称为服务账户。


    服务账户（以及用户账户）有两个特点：


    **作用域访问：** 服务账户的作用域限定于特定的命名空间，或者可以配置为集群范围，从而更容易管理集群内运行的应用程序和进程的权限和访问控制。


    **细粒度权限：** Kubernetes 使用基于角色的访问控制（RBAC）来定义经过身份验证的用户或服务账户可以在集群内做什么。Role 和 ClusterRole
    定义权限（如创建、列出或删除资源），而 RoleBinding 和 ClusterRoleBinding 将这些权限分配给用户、组或服务账户。


    ## 示例


    ### 示例 1：与 Kubernetes API 通信的内部应用程序


    需要查询 Kubernetes API 以发现其他 Pod、服务或配置的集群内应用程序可以使用服务账户来认证其请求。例如，运行在集群内从其他 Pod 收集指标的监控工具可以使用一个具有跨命名空间读取
    Pod 指标权限的服务账户。


    ### 示例 2：CI/CD 流水线自动化


    将应用程序部署到 Kubernetes 集群的持续集成/持续部署（CI/CD）工具将使用服务账户来创建或更新部署和服务。此服务账户将被授予管理特定命名空间或整个集群内资源的必要权限，具体取决于
    CI/CD 工具操作的范围。


    ### 示例 3：访问 Kubernetes 资源的外部应用程序


    需要与 Kubernetes 集群交互的外部应用程序（例如，在集群外运行的仪表板或管理工具）也可以使用服务账户。你可以安全地公开必要的 API 端点，并让外部应用程序使用具有所需权限的服务账户的令牌进行身份验证。'
