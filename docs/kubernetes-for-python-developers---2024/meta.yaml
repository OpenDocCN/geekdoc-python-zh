    # Current Context


    Specifies the default context (from the contexts section) that kubectl should
    use for commands. This makes it easy to switch between different cluster and user
    combinations without needing to specify them each time you run a command. You
    can change the current context using the kubectl config use-context command.


    # Preferences


    Contains global configuration options for kubectl. While not as commonly used
    as the other sections, it allows for setting default values that affect how kubectl
    behaves across all contexts, such as colors in output.


    # Why TLS auth?


    The Kubernetes API server uses TLS (Transport Layer Security) authentication to
    ensure secure communication between the client and the server, as well as between
    services within the cluster. TLS provides several critical security features that
    make it more suitable than say, basic authentication for most scenarios, especially
    in a distributed system like Kubernetes where sensitive data and system integrity
    need protection. Here are the key reasons why TLS is preferred over basic authentication:


    # Encryption


    TLS provides end-to-end encryption of data in transit. This means that all data
    sent between the Kubernetes API server and clients (or between services) is encrypted,
    preventing eavesdroppers from in-'
  merge: -1
  pgno: 86
- img_proc: true
  md: 'tercepting and reading the data. Basic authentication, where credentials are
    sent over the network, can be vulnerable to interception, especially if not encrypted.


    # Authentication


    TLS supports mutual authentication. The client verifies the server''s identity
    through a digital certificate signed by a trusted certificate authority (CA).
    Optionally, the server can also require clients to present a certificate, verifying
    the client''s identity. This mutual authentication ensures that both parties are
    who they claim to be, reducing the risk of man-in-the-middle attacks. Basic authentication
    only provides one-way authentication, where the server''s identity isn''t verified
    by the client, making it more susceptible to impersonation attacks.


    # Integrity


    TLS ensures the integrity of the transmitted data through cryptographic message
    digests. This means that any tampering with the data during transit can be detected,
    ensuring that the data received is exactly what was sent. Basic authentication
    does not provide this level of integrity checking, making transmitted data vulnerable
    to unauthorized modifications.


    # Revocation and Expiry


    Certificates used in TLS can be revoked or set to expire after a certain period,
    allowing for better management of access and security. If a certificate is compromised,
    it can be revoked to prevent further misuse. Expiring certificates force periodic
    renewal, ensuring that authentication mechanisms are regularly updated. Basic
    authentication lacks this mechanism, making it harder to manage credentials securely
    over time.'
