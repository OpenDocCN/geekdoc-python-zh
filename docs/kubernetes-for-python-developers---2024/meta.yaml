    a new tag. Compare the build step output in both cases and note what you observe.


    # Summary


    This chapter lays the foundation for understanding the vital components of container
    technology, crucial for mastering Kubernetes. It starts with the basics of how
    containers work, leveraging Linux kernel features like namespaces for isolation
    and cgroups for resource management, to run multiple isolated environments on
    a single host system efficiently. This understanding is pivotal for you to grasp
    the significance of containerization in achieving consistency across various environments
    and simplifying application deployment.


    We further delved into container networking, the Overlay Filesystem, and the practical
    aspects of building and running an application within a container. It illustrates
    different networking modes, such as Bridge and Overlay networks, essential for
    configuring inter-container communication and connecting containers to the external
    world. Additionally, it walks readers through containerizing a Flask application,
    highlighting the process of creating Docker images and running containers, thereby
    offering a hands-on approach to understanding the nuances of container operations.'
- md: 'Finally, the introduction of Docker Compose as a tool for managing multi-container
    applications in local development environments sets the stage for Kubernetes''
    orchestration capabilities. Now you''re equipped with a fundamental understanding
    of container technology, paving the way for exploring the advanced orchestration
    features of Kubernetes, which are essential for deploying, scaling, and managing
    containerized applications in a production environment.


    ## Chapter 3: Kubernetes 101


    While Docker Compose is excellent for development and small production deployments,
    Kubernetes is designed to handle large-scale, production-grade deployments with
    complex management and orchestration needs. Here''s why Kubernetes is necessary
    for the same Flask and Redis example, especially as you scale:


    **Orchestration and Scheduling:** Kubernetes can automatically decide where to
    run your containers based on their resource requirements and other constraints,
    improving utilization and efficiency across your infrastructure.


    **High Availability and Failover:** Kubernetes ensures your application is always
    available and can replace failed containers automatically, a crucial feature for
    production environments that Docker Compose alone doesn''t provide.


    **Scalability:** Kubernetes excels in scaling applications up or down based on
    demand with horizontal pod autoscaling. It allows for more sophisticated scaling
    policies compared to Docker Compose, which is essential for handling variable
    workloads.


    **Service Discovery and Load Balancing:** Kubernetes provides built-in service
    discovery and load balancing, automatically distributing traffic across your containers
    to ensure smooth and efficient operations. This is particularly important as your
    application grows in complexity and traffic volume.


    **Configuration and Secret Management:** Kubernetes offers robust mechanisms for
    managing configuration and secrets, allowing you to update your application configuration
    and sensitive information without rebuilding your container images.


    **Self-healing:** Kubernetes continuously monitors the state of your pods and
    services, automatically restarting failed containers, replacing and rescheduling
    containers when nodes die, killing containers that don''t respond to user-defined
    health checks, and not advertising them to clients until they are ready to serve.


    In essence, while Docker Compose provides a great starting point for defining
    and running multi-container applications in development and single machine production
    environments, Kubernetes offers the scalability, reliability, and flexibility
    needed to manage complex applications in a large-scale, distributed, and dynamic
    production environment. Transitioning to Kubernetes from Docker Compose when your
    application grows ensures that you can leverage the full potential of containerized
    deployments.


    ## How Kubernetes works


    In simple terms, Kubernetes is a distributed system designed to orchestrate containers
    across one or more virtual machines (VMs) or physical machines. What does orchestration
    entail?


    Orchestration, in the context of containerized applications and cloud computing,
    refers to the automated management, coordination, and arrangement of computer
    systems, applications, and services. It involves a broad set of actions: deploying,
    managing, scaling, networking, and connecting containers across multiple hosts
    within a cluster. The goal of orchestration is to streamline and optimize the
    deployment and operation of these containers to ensure they work harmoniously
    as part of a larger, distributed application or system.


    Here are key aspects of what orchestration encompasses:


    ### Automated Deployment


    Orchestration tools automatically handle the deployment of containers based on
    predefined configurations. This includes deciding which hosts (virtual or physical
    machines) should run the containers, considering factors like resource availability
    and constraints.


    ### Scaling


    Orchestration enables the dynamic scaling of applications by automatically adjusting
    the number of running container instances based on demand. This can involve scaling
    up (adding more containers) to handle increased load or scaling down (removing
    containers) to conserve resources during quieter periods.


    ### Health Monitoring and Self-healing


    Orchestration systems continuously monitor the health of containers and automatically
    replace unhealthy ones with new instances, ensuring the application remains available
    and reliable without manual intervention.


    ### Networking


    Orchestration tools manage the networking between containers, enabling them to
    communicate with each other and with external networks. This includes assigning
    IP addresses, configuring network policies, and setting up load balancers to distribute
    traffic.


    ### Service Discovery


    In a dynamic environment where containers are frequently created and destroyed,
    orchestration facilitates service discovery, allowing containers to find and communicate
    with each other using logical names instead of relying on static IP addresses.


    ### Configuration Management


    Orchestration involves managing and injecting configuration into containers at
    runtime. This can include environment variables, configuration files, and secrets
    (like passwords and API keys), ensuring that containers are configured correctly
    without hard-coding sensitive information.


    ### Resource Allocation


    Orchestration tools allocate resources (CPU, memory, storage) to containers based
    on their requirements and available capacity, optimizing resource utilization
    across the cluster.


    ### Update & Rollback


    Orchestration enables the rolling update of applications, where new versions of
    containers are gradually rolled out without downtime. It also supports rollback
    to previous versions if an update fails or introduces issues.


    In essence, orchestration automates the complex, manual processes involved in
    deploying and managing containerized applications at scale. It turns a potentially
    chaotic environment—where containers are constantly started, stopped, and moved—into
    a well-coordinated system.


    A Kubernetes cluster comprises of at least 1 control plane node and worker plan
    nodes.


    The control plane node is responsible for managing the state of the cluster. It
    schedules applications, manages deployments and scaling, and maintains the desired
    state of the applications. The control plane''s components include the kube-apiserver,
    etcd storage, kube-scheduler, kube-controller-manager, and cloud-controller-manager.


    The worker nodes run the actual applications and workloads. Each worker node has
    a Kubelet, which is an agent for managing the state of the node and communicating
    with the Kubernetes master. Worker nodes also run services necessary to route
    traffic and allow containers to communicate with each other, such as the kube-proxy
    and the container runtime.


    ## Components of a Kubernetes cluster


    ![Kubernetes architecture](img/91c4bde832e221ba5bc429caf9587286_73_0.png)


    ## kube-apiserver


    The kube-apiserver acts as the front-end to the Kubernetes control plane. It is
    the component through which the Kubernetes API is exposed, serving as the primary
    interface for users, external components, and internal parts of the cluster to
    communicate and manage the state of Kubernetes objects (pods, services, deployments,
    etc.). The kube-apiserver processes REST operations, validates them, and updates
    the corresponding objects in etcd, making it a critical gateway to the cluster''s
    operational state.


    ## etcd


    etcd is a distributed key-value store used by Kubernetes as the backing store
    for all cluster data. It provides a reliable way to store data that needs to be
    accessed by a distributed system like Kubernetes. etcd''s primary job is to maintain
    and manage the state of the Kubernetes cluster, keeping track of all Kubernetes
    objects. It is designed for high availability and is the ultimate source of truth
    for the cluster, ensuring persistence, consistency, and fault-tolerance of cluster
    state data.


    ## kube-scheduler


    The kube-scheduler is responsible for assigning pods to nodes. It observes the
    creation of new pods with no assigned node, and selects a node for them to run
    on, based on several scheduling criteria. These criteria include individual and
    collective resource requirements, hardware/software/policy constraints, affinity
    and anti-affinity specifications, data locality, inter-workload interference,
    and deadlines. The kube-scheduler ensures that, where possible, workloads are
    balanced across the available compute resources.'
  mdcn: '最后，Docker Compose 作为在本地开发环境中管理多容器应用程序的工具被引入，为 Kubernetes 的编排能力奠定了基础。现在，你已经具备了容器技术的基础知识，这为探索
    Kubernetes 的高级编排功能铺平了道路，这些功能对于在生产环境中部署、扩展和管理容器化应用程序至关重要。


    ## 第 3 章：Kubernetes 入门


    虽然 Docker Compose 非常适合开发和小规模生产部署，但 Kubernetes 旨在处理具有复杂管理和编排需求的大规模、生产级部署。以下是为什么对于相同的
    Flask 和 Redis 示例，尤其是在扩展时，Kubernetes 是必要的：


    **编排与调度：** Kubernetes 可以根据容器的资源需求和其他约束自动决定在哪里运行它们，从而提高整个基础设施的利用率和效率。


    **高可用性与故障转移：** Kubernetes 确保你的应用程序始终可用，并能自动替换失败的容器，这是生产环境的关键特性，而 Docker Compose
    本身并不提供此功能。


    **可扩展性：** Kubernetes 擅长根据需求通过水平 Pod 自动伸缩来扩展应用程序。与 Docker Compose 相比，它允许更复杂的伸缩策略，这对于处理可变工作负载至关重要。


    **服务发现与负载均衡：** Kubernetes 提供内置的服务发现和负载均衡功能，自动将流量分配到你的容器，以确保操作顺畅高效。随着应用程序复杂性和流量的增长，这一点尤为重要。


    **配置与密钥管理：** Kubernetes 提供了强大的机制来管理配置和密钥，允许你在不重建容器镜像的情况下更新应用程序配置和敏感信息。


    **自愈能力：** Kubernetes 持续监控 Pod 和服务的状态，自动重启失败的容器，在节点故障时替换和重新调度容器，终止未通过用户定义健康检查的容器，并在它们准备好服务之前不向客户端通告。


    本质上，虽然 Docker Compose 为在开发和单机生产环境中定义和运行多容器应用程序提供了一个很好的起点，但 Kubernetes 提供了在大规模、分布式和动态生产环境中管理复杂应用程序所需的可扩展性、可靠性和灵活性。当你的应用程序增长时，从
    Docker Compose 过渡到 Kubernetes 可确保你能够充分利用容器化部署的潜力。


    ## Kubernetes 的工作原理


    简单来说，Kubernetes 是一个分布式系统，旨在跨一台或多台虚拟机（VM）或物理机编排容器。编排涉及什么？


    在容器化应用程序和云计算的背景下，编排是指对计算机系统、应用程序和服务的自动化管理、协调和安排。它涉及一系列广泛的操作：在集群内的多个主机上部署、管理、扩展、联网和连接容器。编排的目标是简化和优化这些容器的部署和运行，确保它们作为更大分布式应用程序或系统的一部分和谐地工作。


    以下是编排所涵盖的关键方面：


    ### 自动化部署


    编排工具根据预定义的配置自动处理容器的部署。这包括决定哪些主机（虚拟或物理机）应该运行容器，同时考虑资源可用性和约束等因素。


    ### 扩展


    编排通过根据需求自动调整运行的容器实例数量，实现应用程序的动态扩展。这可以包括扩展（添加更多容器）以处理增加的负载，或缩减（移除容器）以在较安静的时期节省资源。


    ### 健康监控与自愈


    编排系统持续监控容器的健康状况，并自动用新实例替换不健康的容器，确保应用程序无需人工干预即可保持可用和可靠。


    ### 网络


    编排工具管理容器之间的网络，使它们能够相互通信以及与外部网络通信。这包括分配 IP 地址、配置网络策略以及设置负载均衡器来分发流量。


    ### 服务发现


    在容器频繁创建和销毁的动态环境中，编排促进了服务发现，允许容器使用逻辑名称而不是依赖静态 IP 地址来查找和相互通信。


    ### 配置管理


    编排涉及在运行时管理和向容器注入配置。这可以包括环境变量、配置文件和密钥（如密码和 API 密钥），确保容器配置正确，而无需硬编码敏感信息。


    ### 资源分配


    编排工具根据容器的需求和可用容量为其分配资源（CPU、内存、存储），优化整个集群的资源利用率。


    ### 更新与回滚


    编排支持应用程序的滚动更新，即逐步推出新版本的容器而无需停机。如果更新失败或引入问题，它还支持回滚到以前的版本。


    本质上，编排自动化了大规模部署和管理容器化应用程序所涉及的复杂手动过程。它将一个潜在混乱的环境——容器不断启动、停止和移动——转变为一个协调良好的系统。


    一个 Kubernetes 集群至少包含 1 个控制平面节点和工作平面节点。


    控制平面节点负责管理集群的状态。它调度应用程序，管理部署和扩展，并维护应用程序的期望状态。控制平面的组件包括 kube-apiserver、etcd 存储、kube-scheduler、kube-controller-manager
    和 cloud-controller-manager。


    工作节点运行实际的应用程序和工作负载。每个工作节点都有一个 Kubelet，它是管理节点状态并与 Kubernetes 主节点通信的代理。工作节点还运行路由流量和允许容器相互通信所需的服务，例如
    kube-proxy 和容器运行时。


    ## Kubernetes 集群的组件


    ![Kubernetes 架构](img/91c4bde832e221ba5bc429caf9587286_73_0.png)


    ## kube-apiserver


    kube-apiserver 充当 Kubernetes 控制平面的前端。它是 Kubernetes API 暴露的组件，作为用户、外部组件和集群内部部分之间通信和管理
    Kubernetes 对象（Pod、服务、部署等）状态的主要接口。kube-apiserver 处理 REST 操作，验证它们，并更新 etcd 中的相应对象，使其成为通往集群操作状态的关键网关。


    ## etcd


    etcd 是一个分布式键值存储，被 Kubernetes 用作所有集群数据的后备存储。它提供了一种可靠的方式来存储需要被像 Kubernetes 这样的分布式系统访问的数据。etcd
    的主要工作是维护和管理 Kubernetes 集群的状态，跟踪所有 Kubernetes 对象。它被设计为高可用性，并且是集群的最终事实来源，确保集群状态数据的持久性、一致性和容错性。


    ## kube-scheduler


    kube-scheduler 负责将 Pod 分配给节点。它观察没有分配节点的新 Pod 的创建，并根据多个调度标准为它们选择运行节点。这些标准包括单个和集体资源需求、硬件/软件/策略约束、亲和性和反亲和性规范、数据局部性、工作负载间干扰和截止日期。kube-scheduler
    确保在可能的情况下，工作负载在可用的计算资源之间保持平衡。'
