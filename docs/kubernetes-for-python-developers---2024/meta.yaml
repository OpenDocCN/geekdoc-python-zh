    fetch https://dl-cdn.alpinelinux.org/alpine/v3.19/main/x86_64/APKINDEX.tar.gz\n\
    fetch https://dl-cdn.alpinelinux.org/alpine/v3.19/community/x86_64/APKINDEX.tar.gz\n\
    (1/3) Installing libmd (1.1.0-r0)\n(2/3) Installing libbsd (0.11.7-r3)\n(3/3)\
    \ Installing netcat-openbsd (1.226-r0)\nExecuting busybox-1.36.1-r15.trigger\n\
    OK: 8 MiB in 18 packages\nConnection to cache.full-stack.svc.cluster.local (10.245.218.215)\
    \ 6379 port [tcp/redis] succeeded!\nConnected to Redis\n```\n\n## 与非初始化容器的对比\n\
    \nKubernetes 中的初始化容器和常规（非初始化）容器共享一些共同功能，但在 Pod 的生命周期中被设计用于不同的目的。以下是它们的异同点：\n\n\
    ## 相同点\n\n**容器镜像：** 初始化容器和常规容器都可以使用注册表中任何可用的容器镜像。\n\n**资源控制：** Kubernetes 允许你为这两种容器指定资源请求和限制。\n\
    \n**环境变量：** 两者都可以配置环境变量来控制其行为。\n\n**卷支持：** 初始化容器和常规容器都可以挂载和访问卷，从而允许在 Pod 内共享数据。\n\
    \n**Kubernetes API：** 两者都使用相同的 Kubernetes API 进行定义和管理，并且可以使用 Kubernetes 清单中的 YAML\
    \ 或 JSON 进行配置。\n\n## 不同点\n\n1.  **执行顺序和生命周期**\n\n    **初始化容器：** 在任何常规容器启动之前按顺序运行。每个初始化容器必须在下一个启动之前成功完成。如果初始化容器失败，Kubernetes\
    \ 将根据其重启策略重启 Pod，直到初始化容器成功。\n\n    **常规容器：** 在所有初始化容器成功完成后运行。它们可以并行运行，旨在运行 Pod\
    \ 的主要应用工作负载。\n\n2.  **目的和用例**\n\n    **初始化容器：** 用于需要在应用容器启动之前运行完成的设置任务。常见用例包括等待服务就绪、执行数据库迁移和设置文件权限。\n\
    \n    **常规容器：** 托管 Pod 要运行的实际应用或服务。只要 Pod 在运行，它们就会持续运行，处理主要工作负载。\n\n3.  **重启行为**\n\
    \n    **初始化容器：** 不支持诸如 restartPolicy=Always 之类的生命周期策略。如果初始化容器失败，整个 Pod 将被重启（假设\
    \ Pod 的重启策略允许），并且所有初始化容器将再次执行。\n\n    **常规容器：** Pod 的 restartPolicy 影响常规容器在失败时如何重启。例如，使用\
    \ restartPolicy=Always 时，失败的容器会独立于 Pod 中的其他容器进行重启。\n\n4.  **资源共享**\n\n    **初始化容器：**\
    \ 不能直接与其他初始化容器或常规容器通信，因为它们在应用容器启动之前按顺序运行。\n\n    **常规容器：** 可以通过 localhost 和共享卷相互通信，因为它们在同一个\
    \ Pod 网络命名空间中并发运行。\n\n5.  **存活探针和就绪探针**\n\n    **初始化容器：** 不支持存活探针或就绪探针，因为它们必须在\
    \ Pod 就绪之前完成其任务。\n\n    **常规容器：** 支持存活探针、就绪探针和启动探针，以管理容器生命周期事件，例如重启失败的容器或在 Pod\
    \ 能够处理请求时将其标记为就绪。\n\n## 用例\n\n初始化容器为在主应用容器启动之前准备环境提供了一种灵活的解决方案。它们按顺序执行，并且每个都必须在下一个启动之前成功完成，这使得它们非常适合需要运行完成的设置任务。以下是\
    \ Kubernetes 中初始化容器的几个示例用例：\n\n### 等待服务可用\n\n初始化容器可以在启动应用容器之前等待依赖服务变得可用，确保应用程序在其依赖项就绪之前不会启动。这在微服务架构中特别有用，因为服务之间相互依赖。\n\
    \n### 数据库迁移和模式更新\n\n在应用程序启动之前，初始化容器可以执行数据库迁移或模式更新。这确保数据库处于应用程序的正确状态，防止与数据库模式不匹配相关的运行时错误。\n\
    \n### 配置文件准备\n\n初始化容器可以根据环境或其他动态输入生成或修改配置文件。这允许在不构建新镜像的情况下自定义应用程序配置。\n\n### 动态凭证收集\n\
    \n对于需要凭证且不应存储在镜像或标准 Kubernetes Secrets 中的应用程序（例如，来自保险库的令牌），初始化容器可以获取这些凭证并将其写入应用程序容器可访问的共享卷。\n\
    \n### 访问控制和安全设置\n\n它们可用于设置安全上下文、文件权限或生成应用程序所需的 SSL 证书，确保应用程序以正确的安全设置运行。\n\n###\
    \ 数据预加载\n\n在应用程序需要在启动前本地获取特定数据的场景中，初始化容器可以从远程源预填充数据到共享卷中，或执行必要的数据转换。\n\n### 服务注册\n\
    \n对于需要向发现服务或反向代理注册自身的应用程序，初始化容器可以在应用程序启动之前处理注册过程，确保应用程序在开始运行时即可被发现。\n\n### 健康检查和就绪探针\n\
    \n虽然 Kubernetes 支持存活探针和就绪探针，但初始化容器可用于复杂的启动检查，这些检查可能无法通过标准探针机制轻松表达。\n\n### 存储持久数据\n\
    \n我们的 Redis 缓存存储页面访问计数，我们从 flask-redis 应用中检索它并显示在页面上。到现在为止，它应该显示一个非零数字。\n\n让我们继续删除\
    \ redis 缓存 pod。在本章的这一部分，我们将坚持使用 **full-stack** 命名空间。\n\n```\n$ kubectl get pod\
    \ -n full-stack\nNAME                READY   STATUS    RESTARTS   AGE\n```"
