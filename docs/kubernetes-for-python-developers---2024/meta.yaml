    \nKubernetes 中的就绪探针用于确定容器何时准备好开始接收流量。\n\n与用于了解容器是否存活的存活探针不同，就绪探针用于了解容器是否准备好处理请求。这种区别对于启动后需要一些时间才能完全运行或可能暂时无法处理流量的服务至关重要。就绪探针失败不会终止容器，但会将\
