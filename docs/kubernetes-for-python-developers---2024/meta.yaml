    # Canary Deployment


    Canary deployments roll out the change to a small subset of users before rolling
    it out to the entire infrastructure.


    We deploy a canary version alongside the stable version and route a subset of
    traffic to it. This can be achieved by tweaking the ingress to route a small percentage
    of traffic to the canary version. We will look at this when dealing with ingresses.


    # Exercise 21: deploy the flask app as a deployment


    Deploy the simple flask app as a deployment in a new namespace **dev** with 4
    replicas. Delete 1 or 2 of the pods and observe what happens.


    # services


    A Service in Kubernetes is an abstract way to expose an application running on
    a set of Pods as a network service. With Kubernetes you don''t need to modify
    your application to use an unfamiliar service discovery mechanism. Kubernetes
    gives Pods their own IP addresses and a single DNS name for a set of Pods and
    can load-balance across them. The Service resource routes traffic across a set
    of Pods. Services are defined using YAML or JSON like all Kubernetes objects.


    # Why We Need Services


    **Stable Endpoint for Pod Communication:** Pods are ephemeral and can be created
    or destroyed at any time. A Service provides a stable IP address and DNS name
    that clients can use to communicate with the Pods,'
  - '[PAGE 188]


    even as the Pods are replaced or rescheduled.


    **Load Balancing:** A Service can distribute network traffic across all Pods matching
    a specified label selector. This balances the load and ensures that the application
    is scalable and resilient.


    **Abstraction:** Services abstract the way you access the application. You don''t
    need to know which specific Pods are serving the application at any given time.


    **Service Discovery:** Kubernetes Services are integrated into its DNS system,
    allowing applications to easily discover other services through DNS lookups, using
    the service names.


    # Types of Services


    **ClusterIP (default):** Exposes the Service on an internal IP in the cluster.
    This type makes the Service only reachable from within the cluster.


    **NodePort:** Exposes the Service on the same port of each selected Node in the
    cluster using NAT. It makes the Service accessible from outside the cluster using
    `<NodeIP>:<NodePort>`.


    **LoadBalancer:** Exposes the Service externally using a cloud provider''s load
    balancer. NodePort and ClusterIP Services, to which the external load balancer
    routes, are automatically created.


    **ExternalName:** Maps the Service to the contents of the externalName field (e.g.,
    foo.bar.example.com), by returning a CNAME record with its value. No proxying
    of any kind is set up.


    # CoreDNS primer


    CoreDNS is the default DNS server in Kubernetes, responsible for DNS-based service
    discovery within the'
  - '[PAGE 189]


    cluster. It plays a crucial role in resolving service names to their corresponding
    IP addresses, enabling Pods to communicate with each other and with services seamlessly.
    Here''s how CoreDNS works in the context of Kubernetes Services:


    When you create a Service in Kubernetes, it gets assigned a unique DNS name. This
    name follows a standard pattern: `<service-name>.<namespace-name>.svc.cluster.local`,
    where:


    +   - `<service-name>` is the name of your Service.

    - `<namespace-name>` is the namespace in which your Service resides.

    - `svc.cluster.local` is the default domain for services within a Kubernetes cluster.


    CoreDNS is configured to watch the Kubernetes API for changes to Services and
    Endpoints. When a new Service is created, CoreDNS automatically creates DNS records
    for it. Thus, when a Pod in the cluster queries a Service by its DNS name, CoreDNS
    resolves the name to the Service''s ClusterIP (for ClusterIP Services) or to the
    appropriate IP addresses (for NodePort or LoadBalancer Services).


    # Examples


    A **ClusterIP** Service makes the Nginx application accessible within the cluster
    on a stable internal IP address. This is useful for internal applications or services
    that should not be exposed outside the cluster.'
- md: "## Cluster IP service\n\nLet's front the nginx deployment we created by a service\
    \ which is of the clusterIP type.\n\n```yaml\napiVersion: v1 # (1)\nkind: Service\
    \ # (2)\nmetadata:\n  name: nginx-clusterip\nspec:\n  selector: # (3)\n    app:\
    \ nginx\n  ports: # (4)\n    - protocol: TCP\n      port: 80\n      targetPort:\
    \ 80\n  type: ClusterIP # (5)\n```\n\n(1) -> Specifies the version of the Kubernetes\
    \ API to use for creating the Service. The **v1** version indicates that this\
    \ is a stable version of the resource definition.\n\n(2) -> Defines the kind of\
    \ Kubernetes resource to create. In this case, a **Service**, which is used to\
    \ expose applications running on a set of Pods as a network service.\n\n(3) ->\
    \ Used to select the Pods that this Service will target and route traffic to.\
    \ The Service will manage all Pods with labels that match this selector. **Note**\
    \ that this applies to only pods in the same namespace as that of the service.\n\
    \n(4) -> Specifies the network ports that the Service will listen on. Each entry\
    \ includes port specifications such as the protocol (TCP/UDP), the port number\
    \ on the Service, and the target port on the Pods to forward to.\n\n(5) -> Defines\
    \ the type of Service. **ClusterIP** is the default type, which gives the Service\
    \ a stable internal IP address so that it can be accessed from within the cluster.\n\
    \n```bash\n$ kubectl apply -f svc-cluster-ip.yaml\nservice/nginx-clusterip created\n\
    ```\n\n```bash\n$ kubectl get svc\nNAME                TYPE        CLUSTER-IP\
    \      EXTERNAL-IP   PORT(S)   AGE\nkubernetes          ClusterIP   10.245.0.1\
    \      <none>        443/TCP   3d7h\nnginx-clusterip     ClusterIP   10.245.216.117\
    \  <none>        80/TCP    9s\n```\n\nWe can see that **nginx-clusterip** is assigned\
    \ a new cluster IP (10.245.216.117, yours might be different) and exposes port\
    \ 80. Let's try to access this from a curl pod.\n\n```bash\n$ kubectl exec -it\
    \ curl-pod -- sh\n~ $ curl http://10.245.216.117\n<!DOCTYPE html>\n...\n<p><em>Thank\
    \ you for using nginx.</em></p>\n</body>\n</html>\n```\n\nIt is not a good design\
    \ choice to access a service by the IP, as the IP keeps on changing in an environment.\
    \ To fix this, we use a designated DNS name. We discussed earlier that CoreDNS\
    \ assigns an internal DNS name for every service. According to the DNS naming\
    \ conventions, this service will have a DNS name of **nginx-clusterip.default.svc.cluster.local**,\
    \ or if you are accessing it from a pod within the same namespace, simply **nginx-clusterip**.\n\
    \nLet's test that out.\n\n```bash\n$ kubectl exec -it curl-pod -- sh # (1)\n~\
    \ $ curl -I http://nginx-clusterip.default.svc.cluster.local # (2)\nHTTP/1.1 200\
    \ OK\nServer: nginx/1.25.4\nDate: Thu, 22 Feb 2024 07:45:28 GMT\nContent-Type:\
    \ text/html\nContent-Length: 615\nLast-Modified: Wed, 14 Feb 2024 16:03:00 GMT\n\
    Connection: keep-alive\nETag: \"65cce434-267\"\nAccept-Ranges: bytes\n\n~ $ curl\
    \ -I http://nginx-clusterip # (3)\nHTTP/1.1 200 OK\nServer: nginx/1.25.4\nDate:\
    \ Thu, 22 Feb 2024 07:45:34 GMT\nContent-Type: text/html\nContent-Length: 615\n\
    Last-Modified: Wed, 14 Feb 2024 16:03:00 GMT\nConnection: keep-alive\nETag: \"\
    65cce434-267\"\nAccept-Ranges: bytes\n```\n\n```bash\n~ $ curl -I http://non-existent-service\
    \ # (4)\ncurl: (6) Could not resolve host: non-existent-service\n```\n\n- (1)\
    \ -> get inside the curl pod first.\n- (2) -> curl using the cluster FQDN (Fully\
    \ Qualified Domain Name)\n- (3) -> curl using the service name alone, as curl\
    \ pod is in the same namespace as service.\n- (4) -> ensure that curl is working\
    \ fine :)\n\n## A word about port names\n\nThe ports specification within a **Service**\
    \ or **Pod** definition can include a name parameter for each port. The name parameter\
    \ is a descriptive string that identifies the port within the specification. It's\
    \ particularly useful when you have multiple ports exposed by a single Service\
    \ or Pod, providing a way to reference each port by name rather than just by number.\n\
    \n## Purpose of Port Names\n\n**Clarity and Readability:** Naming ports makes\
    \ it easier to understand the purpose of each port, especially when dealing with\
    \ multiple ports. For instance, names like http or metrics can indicate the use\
    \ of specific ports.\n\n**Reference in Other Configurations:** Port names can\
    \ be used to reference ports in other parts of the Kubernetes configuration, such\
    \ as in Ingress rules or when defining probes. This allows configurations to remain\
    \ valid even if the port numbers change.\n\n## Example with Port Names\n\nHere's\
    \ an example of a Service definition that includes named ports:\n\n```yaml\napiVersion:\
    \ v1\nkind: Service\nmetadata:\n  name: my-service\nspec:\n  selector:\n    app:\
    \ my-app\n  ports:\n    - name: http\n      protocol: TCP\n      port: 80\n  \
    \    targetPort: http-port\n    - name: https\n      protocol: TCP\n      port:\
    \ 443\n      targetPort: https-port\n```\n\nIn this example, two ports are exposed\
    \ by the Service: port **80** for HTTP traffic and port **443** for HTTPS traffic.\
    \ Each port has a corresponding name (**http** and **https**), making it clear\
    \ what each port is used for.\n\n## Using Port Names in Pod Probes\n\nPort names\
    \ can also be used in liveness and readiness probes within a Pod specification,\
    \ referencing the port by name. For instance:\n\n```yaml\nlivenessProbe:\n  httpGet:\n\
    \    path: /healthz\n    port: http-port\n```\n\nHere, the liveness probe uses\
    \ the port named **http-port** for the HTTP GET request to the **/healthz** endpoint.\n\
    \nIncluding a **name** parameter for ports in your Service or Pod definitions\
    \ enhances clarity and allows for more flexible configuration management. It helps\
    \ ensure that your configurations are easier to maintain and understand, especially\
    \ in complex applications with multiple ports.\n\nLet's create another service\
    \ type, **NodePort**.\n\nA NodePort Service exposes the Nginx application on a\
    \ specific port on all the nodes of the cluster. This allows external access to\
    \ the service through **<NodeIP>:<NodePort>**.\n\nNode port service\n\nHere are\
    \ some primary use cases for NodePort Services:\n\n- **External Access for Development\
    \ and Testing:** NodePort services provide an easy way to access applications\
    \ from outside the Kubernetes cluster, which can be useful for development and\
    \ testing purposes.\n\n- **Public Exposure of Small-scale Applications:** For\
    \ small-scale or proof-of-concept applications, a NodePort Service can serve as\
    \ a simple method to make an application accessible to external users, without\
    \ needing an external load balancer or Ingress controller.\n\n- **Basis for LoadBalancer\
    \ Services:** In cloud environments, a NodePort Service is often the underlying\
    \ mechanism used by LoadBalancer services. The cloud provider's load balancer\
    \ targets the NodePort across all nodes, distributing traffic to the application.\
    \ We will see this service type in the next section.\n\n- **Integrating with Existing\
    \ Infrastructure:** In scenarios where an external load balancer or other routing\
    \ infrastructure already exists, a NodePort Service can be used to route external\
    \ traffic to the Kubernetes cluster by directing traffic to the node IP addresses\
    \ at the specified node port. Ex: the same application can be exposed as an external\
    \ load balancer IP as well as a node port by creating 2 different services.\n\n\
    - **Non-HTTP/TCP Applications:** For applications that do not use HTTP/TCP protocols\
    \ and therefore cannot be easily exposed through an Ingress, a NodePort can provide\
    \ a direct way to access services from outside the Kubernetes cluster.\n\nHere's\
    \ an example of a NodePort service.\n\n```yaml\napiVersion: v1\nkind: Service\n\
    metadata:\n  name: nginx-nodeport\nspec:\n  selector:\n    app: nginx\n  ports:\n\
    \    - port: 80\n      nodePort: 30007 # (1)\n  type: NodePort # (2)\n```\n\n\
    (1) -> what port number to expose the service in.\n\n(2) -> type should be **NodePort**.\n\
    \nNow, let's create the service and try accessing it via curl, both from inside\
    \ a pod, and from the outside world.\n\n```bash\n$ kubectl apply -f svc-node-port.yaml\n\
    service/nginx-nodeport created\n```\n\n```bash\n$ kubectl get svc\nNAME      \
    \         TYPE       CLUSTER-IP      EXTERNAL-IP   PORT(S)          AGE\nkubernetes\
    \         ClusterIP  10.245.0.1      <none>        443/TCP          3d8h\nnginx-clusterip\
    \    ClusterIP  10.245.216.117  <none>        80/TCP           36m\nnginx-nodeport\
    \     NodePort   10.245.196.9    <none>        80:30007/TCP     17s\n```\n\nThe\
    \ new service has a different type, and notice how the port has the **X:Y** pattern\
    \ where **X** is the port the pod exposes, **Y** is the node port through which\
    \ it is routed."
  mdcn: "## Cluster IP 服务\n\n让我们为之前创建的 nginx 部署创建一个 ClusterIP 类型的服务作为前端。\n\n```yaml\n\
    apiVersion: v1 # (1)\nkind: Service # (2)\nmetadata:\n  name: nginx-clusterip\n\
    spec:\n  selector: # (3)\n    app: nginx\n  ports: # (4)\n    - protocol: TCP\n\
    \      port: 80\n      targetPort: 80\n  type: ClusterIP # (5)\n```\n\n(1) ->\
    \ 指定用于创建 Service 的 Kubernetes API 版本。**v1** 版本表示这是一个稳定的资源定义版本。\n\n(2) -> 定义要创建的\
    \ Kubernetes 资源类型。此处为 **Service**，用于将运行在一组 Pod 上的应用程序作为网络服务暴露出来。\n\n(3) -> 用于选择此\
    \ Service 将定位并路由流量到的 Pod。Service 将管理所有标签与此选择器匹配的 Pod。**请注意**，这仅适用于与 Service 处于同一命名空间中的\
    \ Pod。\n\n(4) -> 指定 Service 将监听的网络端口。每个条目包含端口规范，例如协议（TCP/UDP）、Service 上的端口号以及要转发到的\
    \ Pod 上的目标端口。\n\n(5) -> 定义 Service 的类型。**ClusterIP** 是默认类型，它为 Service 提供一个稳定的内部\
    \ IP 地址，以便从集群内部访问。\n\n```bash\n$ kubectl apply -f svc-cluster-ip.yaml\nservice/nginx-clusterip\
    \ created\n```\n\n```bash\n$ kubectl get svc\nNAME                TYPE       \
    \ CLUSTER-IP      EXTERNAL-IP   PORT(S)   AGE\nkubernetes          ClusterIP \
    \  10.245.0.1      <none>        443/TCP   3d7h\nnginx-clusterip     ClusterIP\
    \   10.245.216.117  <none>        80/TCP    9s\n```\n\n我们可以看到 **nginx-clusterip**\
    \ 被分配了一个新的集群 IP（10.245.216.117，你的可能不同）并暴露了 80 端口。让我们尝试从一个 curl Pod 访问它。\n\n```bash\n\
    $ kubectl exec -it curl-pod -- sh\n~ $ curl http://10.245.216.117\n<!DOCTYPE html>\n\
    ...\n<p><em>Thank you for using nginx.</em></p>\n</body>\n</html>\n```\n\n通过 IP\
    \ 访问服务并不是一个好的设计选择，因为在环境中 IP 会不断变化。为了解决这个问题，我们使用指定的 DNS 名称。我们之前讨论过，CoreDNS 会为每个服务分配一个内部\
    \ DNS 名称。根据 DNS 命名约定，此服务的 DNS 名称将是 **nginx-clusterip.default.svc.cluster.local**，或者如果你从同一命名空间内的\
    \ Pod 访问它，只需使用 **nginx-clusterip**。\n\n让我们测试一下。\n\n```bash\n$ kubectl exec -it\
    \ curl-pod -- sh # (1)\n~ $ curl -I http://nginx-clusterip.default.svc.cluster.local\
    \ # (2)\nHTTP/1.1 200 OK\nServer: nginx/1.25.4\nDate: Thu, 22 Feb 2024 07:45:28\
    \ GMT\nContent-Type: text/html\nContent-Length: 615\nLast-Modified: Wed, 14 Feb\
    \ 2024 16:03:00 GMT\nConnection: keep-alive\nETag: \"65cce434-267\"\nAccept-Ranges:\
    \ bytes\n\n~ $ curl -I http://nginx-clusterip # (3)\nHTTP/1.1 200 OK\nServer:\
    \ nginx/1.25.4\nDate: Thu, 22 Feb 2024 07:45:34 GMT\nContent-Type: text/html\n\
    Content-Length: 615\nLast-Modified: Wed, 14 Feb 2024 16:03:00 GMT\nConnection:\
    \ keep-alive\nETag: \"65cce434-267\"\nAccept-Ranges: bytes\n```\n\n```bash\n~\
    \ $ curl -I http://non-existent-service # (4)\ncurl: (6) Could not resolve host:\
    \ non-existent-service\n```\n\n- (1) -> 首先进入 curl Pod 内部。\n- (2) -> 使用集群 FQDN（完全限定域名）进行\
    \ curl 访问。\n- (3) -> 仅使用服务名称进行 curl 访问，因为 curl Pod 与服务处于同一命名空间。\n- (4) -> 确保 curl\
    \ 工作正常 :)\n\n## 关于端口名称的说明\n\n**Service** 或 **Pod** 定义中的端口规范可以为每个端口包含一个 name 参数。name\
    \ 参数是一个描述性字符串，用于在规范中标识该端口。当单个 Service 或 Pod 暴露多个端口时，它特别有用，提供了一种通过名称（而不仅仅是数字）来引用每个端口的方式。\n\
    \n## 端口名称的目的\n\n**清晰性和可读性：** 为端口命名使得更容易理解每个端口的用途，尤其是在处理多个端口时。例如，像 http 或 metrics\
    \ 这样的名称可以指示特定端口的用途。\n\n**在其他配置中引用：** 端口名称可用于在 Kubernetes 配置的其他部分中引用端口，例如在 Ingress\
    \ 规则中或定义探针时。这允许配置在端口号更改时仍然有效。\n\n## 带端口名称的示例\n\n这是一个包含命名端口的 Service 定义示例：\n\n\
    ```yaml\napiVersion: v1\nkind: Service\nmetadata:\n  name: my-service\nspec:\n\
    \  selector:\n    app: my-app\n  ports:\n    - name: http\n      protocol: TCP\n\
    \      port: 80\n      targetPort: http-port\n    - name: https\n      protocol:\
    \ TCP\n      port: 443\n      targetPort: https-port\n```\n\n在此示例中，Service 暴露了两个端口：用于\
    \ HTTP 流量的端口 **80** 和用于 HTTPS 流量的端口 **443**。每个端口都有一个对应的名称（**http** 和 **https**），清楚地表明了每个端口的用途。\n\
    \n## 在 Pod 探针中使用端口名称\n\n端口名称也可以在 Pod 规范中的存活和就绪探针中使用，通过名称引用端口。例如：\n\n```yaml\n\
    livenessProbe:\n  httpGet:\n    path: /healthz\n    port: http-port\n```\n\n这里，存活探针使用名为\
    \ **http-port** 的端口向 **/healthz** 端点发送 HTTP GET 请求。\n\n在 Service 或 Pod 定义中为端口包含\
    \ **name** 参数可增强清晰度，并允许更灵活的配置管理。它有助于确保你的配置更易于维护和理解，尤其是在具有多个端口的复杂应用程序中。\n\n让我们创建另一种服务类型，**NodePort**。\n\
    \nNodePort 服务在集群的所有节点上的特定端口上暴露 Nginx 应用程序。这允许通过 **<NodeIP>:<NodePort>** 从外部访问该服务。\n\
    \n节点端口服务\n\n以下是 NodePort 服务的一些主要用例：\n\n- **用于开发和测试的外部访问：** NodePort 服务提供了一种从 Kubernetes\
    \ 集群外部访问应用程序的简单方法，这对于开发和测试目的非常有用。\n\n- **小型应用程序的公共暴露：** 对于小型或概念验证应用程序，NodePort\
    \ 服务可以作为一种简单的方法，使应用程序可被外部用户访问，而无需外部负载均衡器或 Ingress 控制器。\n\n- **LoadBalancer 服务的基础：**\
    \ 在云环境中，NodePort 服务通常是 LoadBalancer 服务使用的底层机制。云提供商的负载均衡器针对所有节点上的 NodePort，将流量分发到应用程序。我们将在下一节中看到这种服务类型。\n\
    \n- **与现有基础设施集成：** 在已经存在外部负载均衡器或其他路由基础设施的场景中，NodePort 服务可用于通过将流量定向到指定节点端口的节点 IP\
    \ 地址，将外部流量路由到 Kubernetes 集群。例如：可以通过创建 2 个不同的服务，将同一应用程序同时作为外部负载均衡器 IP 和节点端口暴露。\n\
    \n- **非 HTTP/TCP 应用程序：** 对于不使用 HTTP/TCP 协议因此无法通过 Ingress 轻松暴露的应用程序，NodePort 可以提供一种从\
    \ Kubernetes 集群外部直接访问服务的方式。\n\n这是一个 NodePort 服务的示例。\n\n```yaml\napiVersion: v1\n\
    kind: Service\nmetadata:\n  name: nginx-nodeport\nspec:\n  selector:\n    app:\
    \ nginx\n  ports:\n    - port: 80\n      nodePort: 30007 # (1)\n  type: NodePort\
    \ # (2)\n```\n\n(1) -> 要在哪个端口号上暴露服务。\n\n(2) -> 类型应为 **NodePort**。\n\n现在，让我们创建服务并尝试通过\
    \ curl 访问它，分别从 Pod 内部和外部世界进行访问。\n\n```bash\n$ kubectl apply -f svc-node-port.yaml\n\
    service/nginx-nodeport created\n```\n\n```bash\n$ kubectl get svc\nNAME      \
    \         TYPE       CLUSTER-IP      EXTERNAL-IP   PORT(S)          AGE\nkubernetes\
    \         ClusterIP  10.245.0.1      <none>        443/TCP          3d8h\nnginx-clusterip\
    \    ClusterIP  10.245.216.117  <none>        80/TCP           36m\nnginx-nodeport\
    \     NodePort   10.245.196.9    <none>        80:30007/TCP     17s\n```\n\n新服务具有不同的类型，请注意端口如何呈现\
    \ **X:Y** 模式，其中 **X** 是 Pod 暴露的端口，**Y** 是路由通过的节点端口。"
