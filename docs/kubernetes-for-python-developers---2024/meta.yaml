    # service accounts inside pods


    There are many scenarios where we would want to associate a service account with
    a pod. Kubernetes automatically mounts the service account token and related credentials
    (CA certificates and namespace) into pods using the associated service account.
    This eliminates the need for manual credential management, making it easier to
    build and deploy secure, cloud-native applications.


    There are 2 broad scenarios where this is useful.


    **Authentication:** Service accounts provide an identity for pods to use when
    making requests to the Kubernetes API, allowing for secure and authenticated API
    access. This is essential for applications that need to interact with the Kubernetes
    system to read or modify resources.'
  - "[PAGE 346]\n\n**Associating secrets with pods** When we create a sevice account,\
    \ we can add existing secrets to that account in the YAML artifact. Then, we associate\
    \ the service account with a pod. This association is particularly useful for\
    \ automating the process of making credentials available to applications running\
    \ inside pods without hardcoding sensitive information. Kubernetes automatically\
    \ mounts these secrets into pods using the specified service account, providing\
    \ a secure way to store and manage sensitive information such as database passwords,\
    \ API keys, and SSH keys.\n\nHere's an example of a service account with a secret.\n\
    \n```\napiVersion: v1\nkind: ServiceAccount\nmetadata:\n  name: my-service-account\n\
    secrets:\n- name: my-secret\n```\n\nWe will see a more detailed example of this.\
    \ Before that, we will associate a pod with the **test** service account and inspect\
    \ what happens.\n\n```\napiVersion: v1\nkind: Pod\nmetadata:\n  name: service-account-test-pod\
    \ # (1)\nspec:\n  containers:\n```"
- md: "## Beefy roles\n\nIt is always a good practice to follow the [principle of\
    \ least privilege](https://www.paloaltonetworks.com/cyberpedia/what-is-the-principle-of-least-privilege)\
    \ when assigning roles to service accounts, i.e. don't give more permissions than\
    \ what's necessary to do the job. For example, if we want a service account to\
    \ do CRUD with services, deployments, configmaps, pods, secrets and PVCs, we should\
    \ only give explicit permissions to those resources. If I want to deal with statefulsets\
    \ via the database team, then I'd give them a separate service account which has\
    \ access to pods, PVCs, configmaps/secrets and statefulsets, nothing more.\n\n\
    Sometimes, we want to give access to lot of resources. Instead of typing out verbose\
    \ roles (which is still recommended IMO), Kubernetes allows you to shoot in the\
    \ foot where you can specify wildcards ( * ). Here's an example you DON'T want\
    \ to try at home.\n\n```yaml\napiVersion: rbac.authorization.k8s.io/v1\nkind:\
    \ Role\nmetadata:\n  namespace: default\n  name: megalomaniac-villain\nrules:\n\
    - apiGroups: [\"*\"]\n  resources: [\"*\"]\n  verbs: [\"*\"]\n```\n\nTLDR; Kubernetes\
    \ allows * in roles, use it sparingly.\n\nThere are cases where we want to give\
    \ cluster-wide access to certain resources, instead of restricting it to a namespace.\
    \ This calls for a separate class of resource called **ClusterRole**. The are\
    \ the same as **Role**, but the cluster-wide counterpart of roles. Because they\
    \ are cluster-wise, they are not scoped by any namespace.\n\nA **ClusterRole**\
    \ can be associated with a service account primarily via a **ClusterRoleBinding**.\
    \ While **ClusterRole** defines permissions across the entire cluster, the **ClusterRoleBinding**\
    \ is what grants those permissions to a user, group, or service account at the\
    \ cluster level.\n\nKubernetes comes with several built-in **ClusterRoles** and\
    \ **Roles** that are predefined and offer common sets of permissions for various\
    \ cluster operations. These built-in roles are designed to simplify the management\
    \ of access control by providing ready-to-use sets of permissions that cover common\
    \ use cases for interacting with Kubernetes resources.\n\nSome of the notable\
    \ built-in ClusterRoles include:\n\n**cluster-admin:** Grants super-user access\
    \ to perform any action on any resource. It gives full control over every resource\
    \ in the cluster and all namespaces.\n\n**admin:** Allows admin access, intended\
    \ to be granted within a namespace using a RoleBinding. It allows read/write access\
    \ to most resources in a namespace, including the ability to create roles and\
    \ role bindings within the namespace. It does not allow write access to resource\
    \ quota or to the namespace itself.\n\n**edit:** Allows read/write access to most\
    \ objects in a namespace. It does not allow viewing or modifying roles or role\
    \ bindings.\n\n**view:** Allows read-only access to see most objects in a namespace.\
    \ It does not allow viewing roles or role bindings. It does not allow viewing\
    \ secrets, since those are considered to encapsulate sensitive information.\n\n\
    **system:node:** Grants permissions to nodes (kubelets), allowing them to communicate\
    \ with the API server and manage pod resources on the nodes they run.\n\nIn addition\
    \ to **ClusterRoles**, there are Roles that are namespace-specific and also come\
    \ predefined in Kubernetes. These roles include permissions tailored to managing\
    \ resources within a single namespace and are useful for granting access within\
    \ that namespace's scope.\n\nThese built-in roles can be assigned to users, groups,\
    \ or service accounts in your cluster through **RoleBindings** or **ClusterRoleBindings**,\
    \ depending on whether you want the permissions to apply cluster-wide or within\
    \ a specific namespace.\n\nFor example, to grant a user admin permissions in a\
    \ specific namespace, you might create a **RoleBinding** in that namespace referencing\
    \ the admin **ClusterRole**:\n\n```yaml\napiVersion: rbac.authorization.k8s.io/v1\n\
    kind: RoleBinding\nmetadata:\n  name: namespace-admin\n  namespace: mynamespace\n\
    subjects:\n- kind: ServiceAccount\n  name: mynamespace-admin\n  apiGroup: rbac.authorization.k8s.io\n\
    roleRef:\n  kind: ClusterRole\n  name: admin\n  apiGroup: rbac.authorization.k8s.io\n\
    ```\n\nThe primary advantage of using built-in roles is the convenience and best\
    \ practices they offer. They are maintained by the Kubernetes project and are\
    \ designed to follow the principle of least privilege, granting only the permissions\
    \ necessary for common tasks and roles within the cluster. This helps simplify\
    \ RBAC setup and ensures a higher level of security by default.\n\n## Spreading\
    \ your pods across nodes\n\nImagine a scenario where your cluster hosts multiple\
    \ applications in a microservices architecture, with several nodes accommodating\
    \ your application pods. While the scheduler ensures that your pods are placed\
    \ on nodes that are healthy and have adequate resources, it does not consider\
    \ the distribution of those pods in the nodes.\n\nThere is a good chance that\
    \ pods belonging to a specific deployment are all scheduled on a single node.\
    \ The obvious problem with this situation is, when that node goes down, your users\
    \ experience downtime as there are no pods available to serve the requests."
  mdcn: "## 强化角色\n\n在为服务账户分配角色时，始终遵循[最小权限原则](https://www.paloaltonetworks.com/cyberpedia/what-is-the-principle-of-least-privilege)是一个好习惯，即不要授予超出完成工作所需的权限。例如，如果我们希望一个服务账户对服务、部署、配置映射、Pod、密钥和持久卷声明执行CRUD操作，我们应该只明确授予这些资源的权限。如果我想通过数据库团队处理有状态集，那么我会给他们一个单独的服务账户，该账户可以访问Pod、持久卷声明、配置映射/密钥和有状态集，仅此而已。\n\
    \n有时，我们希望授予对大量资源的访问权限。Kubernetes允许你使用通配符（*）来指定权限，这可能会让你自掘坟墓（尽管我仍然建议编写详细的规则）。以下是一个你**不**想在家尝试的示例。\n\
    \n```yaml\napiVersion: rbac.authorization.k8s.io/v1\nkind: Role\nmetadata:\n \
    \ namespace: default\n  name: megalomaniac-villain\nrules:\n- apiGroups: [\"*\"\
    ]\n  resources: [\"*\"]\n  verbs: [\"*\"]\n```\n\n简而言之；Kubernetes允许在角色中使用*，请谨慎使用。\n\
    \n有些情况下，我们希望授予对某些资源的集群范围访问权限，而不是将其限制在某个命名空间内。这就需要一种单独的资源类别，称为**ClusterRole**。它们与**Role**相同，但是角色的集群范围对应物。因为它们是集群范围的，所以不受任何命名空间的限制。\n\
    \n**ClusterRole**主要可以通过**ClusterRoleBinding**与服务账户关联。**ClusterRole**定义了整个集群的权限，而**ClusterRoleBinding**则是在集群级别将这些权限授予用户、组或服务账户。\n\
    \nKubernetes自带了几个内置的**ClusterRoles**和**Roles**，它们是预定义的，为各种集群操作提供了通用的权限集。这些内置角色旨在通过提供现成的权限集来简化访问控制的管理，这些权限集涵盖了与Kubernetes资源交互的常见用例。\n\
    \n一些值得注意的内置ClusterRoles包括：\n\n**cluster-admin：** 授予超级用户权限，可以在任何资源上执行任何操作。它提供对集群中每个资源和所有命名空间的完全控制。\n\
    \n**admin：** 允许管理员访问，旨在通过RoleBinding在命名空间内授予。它允许对命名空间中的大多数资源进行读/写访问，包括在该命名空间内创建角色和角色绑定的能力。它不允许对资源配额或命名空间本身进行写访问。\n\
    \n**edit：** 允许对命名空间中的大多数对象进行读/写访问。它不允许查看或修改角色或角色绑定。\n\n**view：** 允许只读访问以查看命名空间中的大多数对象。它不允许查看角色或角色绑定。它不允许查看密钥，因为这些被认为封装了敏感信息。\n\
    \n**system:node：** 授予节点（kubelet）权限，允许它们与API服务器通信并管理其运行节点上的Pod资源。\n\n除了**ClusterRoles**，还有特定于命名空间的Roles，它们在Kubernetes中也是预定义的。这些角色包含为管理单个命名空间内的资源而量身定制的权限，对于在该命名空间范围内授予权限非常有用。\n\
    \n这些内置角色可以通过**RoleBindings**或**ClusterRoleBindings**分配给集群中的用户、组或服务账户，具体取决于你希望权限在集群范围内还是在特定命名空间内生效。\n\
    \n例如，要授予用户在特定命名空间中的管理员权限，你可以在该命名空间中创建一个引用admin **ClusterRole**的**RoleBinding**：\n\
    \n```yaml\napiVersion: rbac.authorization.k8s.io/v1\nkind: RoleBinding\nmetadata:\n\
    \  name: namespace-admin\n  namespace: mynamespace\nsubjects:\n- kind: ServiceAccount\n\
    \  name: mynamespace-admin\n  apiGroup: rbac.authorization.k8s.io\nroleRef:\n\
    \  kind: ClusterRole\n  name: admin\n  apiGroup: rbac.authorization.k8s.io\n```\n\
    \n使用内置角色的主要优势在于它们提供的便利性和最佳实践。它们由Kubernetes项目维护，旨在遵循最小权限原则，仅授予集群内常见任务和角色所需的权限。这有助于简化RBAC设置，并默认确保更高水平的安全性。\n\
    \n## 将Pod分散到各个节点\n\n想象一个场景，你的集群在微服务架构中托管多个应用程序，多个节点容纳你的应用程序Pod。虽然调度器确保你的Pod被放置在健康且资源充足的节点上，但它并不考虑这些Pod在节点上的分布情况。\n\
    \n属于特定部署的Pod很有可能全部被调度到单个节点上。这种情况的明显问题是，当该节点宕机时，你的用户会经历停机时间，因为没有可用的Pod来处理请求。"
