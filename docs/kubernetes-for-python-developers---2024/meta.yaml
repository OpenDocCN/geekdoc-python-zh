- md: "(1) Specifies the init containers that run before the main application containers.\
    \ We can have as many init containers we want.\n\n(2) Names the init container\
    \ **check-redis**, whose purpose is to check if the Redis service is ready before\
    \ starting the main flask app container.\n\n(3) Uses the Alpine Linux image for\
    \ the init container due to its small size and package availability.\n\n(4) Executes\
    \ a shell command to install **netcat** and run a script to check Redis availability.\n\
    \n(5) Sets environment variables accessible by the init container. These are like\
    \ container's environment variables.\n\n(6) Mounts volumes inside the init container,\
    \ for setting up the redis check script.\n\n(7) Defines volumes to be mounted\
    \ by both the init container and the main application containers.\n\n(8) Names\
    \ a volume sourced from a ConfigMap, containing the Redis check script.\n\n(9)\
    \ Specifies the ConfigMap that contains the script to check if Redis is available.\n\
    \n(10) Sets the permission mode for the files in the volume, making the script\
    \ executable.\n\nWhen we apply this new deployment and check the logs,\n\n```\n\
    $ kubectl apply -f flask-redis-with-init.yaml -n notch-further\ndeployment.apps/flask-redis-init\
    \ created\n```\n\n```\n$ kubectl get pod -n notch-further -l app=flask-redis-init\n\
    NAME                          READY   STATUS    RESTARTS   AGE\nflask-redis-init-5cc7f7646d-fs42x\
    \   0/1     Init:0/1   0          4s\n```\n\n```\n$ kubectl logs -f -l app=flask-redis-init\
    \ -n notch-further -c check-redis\nWaiting for redis connection...\nnc: getaddrinfo\
    \ for host \"redis-service\" port 6379: Name does not resolve\nnc: getaddrinfo\
    \ for host \"redis-service\" port 6379: Name does not resolve\nWaiting for redis\
    \ connection...\nnc: getaddrinfo for host \"redis-service\" port 6379: Name does\
    \ not resolve\nWaiting for redis connection...\n...\n```\n\nNotice that the pod\
    \ **STATUS** shows that it is running the init container first. Unless the init\
    \ container exits gracefully(with an error of **0** ), the main container won't\
    \ be starting.\n\nThe init container will be in an infinite loop till redis service\
    \ is available. This is because we don't have a service by name **redis-service**\
    \ . This will prevent the issue of the main container starting and crashing endlessly,\
    \ only to be restarted mechanically by the kubelet.\n\nLet's fix the init-container\
    \ to start successfully by pointing at **REDIS_HOST** to the **cache** service\
    \ in the **full-stack** namespace.\n\n```\n$ kubectl logs -f -l app=flask-redis-init\
    \ -n notch-further -c check-redis\nfetch https://dl-cdn.alpinelinux.org/alpine/v3.19/main/x86_64/APKINDEX.tar.gz\n\
    fetch https://dl-cdn.alpinelinux.org/alpine/v3.19/community/x86_64/APKINDEX.tar.gz\n\
    (1/3) Installing libmd (1.1.0-r0)\n(2/3) Installing libbsd (0.11.7-r3)\n(3/3)\
    \ Installing netcat-openbsd (1.226-r0)\nExecuting busybox-1.36.1-r15.trigger\n\
    OK: 8 MiB in 18 packages\nConnection to cache.full-stack.svc.cluster.local (10.245.218.215)\
    \ 6379 port [tcp/redis] succeeded!\nConnected to Redis\n```\n\n## Contrasting\
    \ with non-init containers\n\nInit containers and regular (non-init) containers\
    \ in Kubernetes share some common functionalities but are designed for different\
    \ purposes in the lifecycle of a Pod. Here are their similarities and differences:\n\
    \n## Similarities\n\n**Container Images:** Both init containers and regular containers\
    \ can use any container image available in a registry.\n\n**Resource Controls:**\
    \ Kubernetes allows you to specify resource requests and limits for both types\
    \ of containers.\n\n**Environment Variables:** Both can be configured with environment\
    \ variables to control their behavior.\n\n**Volume Support:** Both init and regular\
    \ containers can mount and access volumes, allowing data sharing within the Pod.\n\
    \n**Kubernetes API:** Both types are defined and managed using the same Kubernetes\
    \ API and can be configured using YAML or JSON in Kubernetes manifests.\n\n##\
    \ Differences\n\n1.  **Execution Order and Lifecycle**\n\n    **Init Containers:**\
    \ Run sequentially before any regular containers start. Each init container must\
    \ complete successfully before the next starts. If an init container fails, Kubernetes\
    \ restarts the Pod according to its restart policy until the init container succeeds.\n\
    \n    **Regular Containers:** Run after all init containers have completed successfully.\
    \ They can run in parallel and are meant to run the main application workload\
    \ of the Pod.\n\n2.  **Purpose and Use Cases**\n\n    **Init Containers:** Used\
    \ for setup tasks that need to run to completion before the application containers\
    \ start. Common use cases include waiting for a service to be ready, performing\
    \ database migrations, and setting file permissions.\n\n    **Regular Containers:**\
    \ Host the actual application or service the Pod is meant to run. They remain\
    \ running as long as the Pod is running, handling the primary workload.\n\n3.\
    \  **Restart Behavior**\n\n    **Init Containers:** Do not support lifecycle policies\
    \ such as restartPolicy=Always. If an init container fails, the entire Pod is\
    \ restarted (assuming the Pod's restartPolicy allows it), and all init containers\
    \ are executed again.\n\n    **Regular Containers:** The Pod's restartPolicy affects\
    \ how regular containers are restarted upon failure. For example, with restartPolicy=Always,\
    \ a failing container is restarted independently of other containers in the Pod.\n\
    \n4.  **Resource Sharing**\n\n    **Init Containers:** Cannot directly communicate\
    \ with other init or regular containers since they run sequentially before the\
    \ application containers start.\n\n    **Regular Containers:** Can communicate\
    \ with each other through localhost and shared volumes, as they run concurrently\
    \ in the same Pod network namespace.\n\n5.  **Liveness and Readiness Probes**\n\
    \n    **Init Containers:** Do not support liveness or readiness probes because\
    \ they must complete their tasks before the Pod becomes ready.\n\n    **Regular\
    \ Containers:** Support liveness, readiness, and startup probes to manage container\
    \ lifecycle events, such as restarting a failed container or marking a Pod as\
    \ ready when it's able to serve requests.\n\n## Use cases\n\nInit containers offer\
    \ a flexible solution for preparing the environment before the main application\
    \ containers start. They are executed sequentially, and each must complete successfully\
    \ before the next starts, making them ideal for setup tasks that need to run to\
    \ completion. Here are several example use cases for init containers in Kubernetes:\n\
    \n### Waiting for a Service to be Available\n\nAn init container can wait for\
    \ a dependent service to become available before starting the application container,\
    \ ensuring the application doesn't start before its dependencies are ready. This\
    \ is particularly useful in microservices architectures where services depend\
    \ on each other.\n\n### Database Migration and Schema Updates\n\nBefore the application\
    \ starts, an init container can perform database migrations or schema updates.\
    \ This ensures that the database is in the correct state for the application,\
    \ preventing runtime errors related to database schema mismatches.\n\n### Configuration\
    \ Files Preparation\n\nInit containers can generate or modify configuration files\
    \ based on the environment or other dynamic inputs. This allows for customizing\
    \ the application configuration without building a new image.\n\n### Dynamic Credential\
    \ Gathering\n\nFor applications requiring credentials that should not be stored\
    \ in images or standard Kubernetes Secrets (e.g., tokens from a vault), an init\
    \ container can fetch these credentials and write them to a shared volume accessible\
    \ by the application container.\n\n### Access Control and Security Setup\n\nThey\
    \ can be used to set up security contexts, file permissions, or generate SSL certificates\
    \ that the application requires, ensuring that the application runs with the correct\
    \ security settings.\n\n### Data Preloading\n\nIn scenarios where an application\
    \ needs specific data available locally before starting, init containers can pre-populate\
    \ data into a shared volume from remote sources or perform necessary data transformations.\n\
    \n### Service Registration\n\nFor applications that need to register themselves\
    \ with a discovery service or a reverse proxy, an init container can handle the\
