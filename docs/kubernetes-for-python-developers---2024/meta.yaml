- md: "Here's a simplified model of how it works: We create a YAML artifact of the\
    \ desired state of the pod. The Kubernetes cluster creates/modifies the pods in\
    \ such a way that it matches our desired state. Kubernetes tries to the maximum\
    \ possible extent to match the existing state to the desired state. Sometimes,\
    \ it can't do so. For example, if you have only 1 node and request the cluster\
    \ to create 100s of pods, the cluster will give up saying that it is not able\
    \ to \"match the cluster state to your desired state.\"\n\nHere's the YAML artifact\
    \ equivalent for the nginx pod we created from the command-line.\n\n```\napiVersion:\
    \ v1 # (1)\nkind: Pod # (2)\nmetadata: # (3)\n  labels: # (4)\n    run: nginx\n\
    \  name: nginx # (5)\nspec: # (6)\n  containers: # (7)\n  - image: nginx\n   \
    \ name: nginx\n```\n\n(1) -> In Kubernetes, the API serves as the foundation for\
    \ defining, managing, and controlling various resources within a cluster.\n\n\
    (2) -> A \"resource\" in Kubernetes refers to an entity that the system knows\
    \ how to manage, such as Pods, Deployments, Services, and more, which we will\
    \ see in future sections. Each of these resources is defined by a \"kind,\" which\
    \ specifies the type of the resource in question.\n\nAlongside the kind, every\
    \ Kubernetes resource is associated with an API version. The API version is crucial\
    \ because Kubernetes' API evolves over time, adding new features and making changes\
    \ to existing ones. The API version is specified in the format **apiVersion: <group>/<version>**,\
    \ such as **apiVersion: v1** or **apiVersion: apps/v1**, and it informs Kubernetes\
    \ about the version of the API schema that the resource definition is intended\
    \ to use. This versioning system allows Kubernetes to provide backward compatibility\
    \ and manage the transition to new API versions smoothly, ensuring that users\
    \ can adopt new features at their own pace while maintaining the stability of\
    \ their existing deployments.\n\n(3) -> metadata is a set of data that provides\
    \ information about other data managed within the Kubernetes system. It is a structured\
    \ collection of information used to identify, describe, and organize resources\
    \ such as Pods, Services, and Deployments. Metadata plays a crucial role in resource\
    \ management, enabling efficient querying, selection, and operation on resources\
    \ within the Kubernetes ecosystem.\n\n(4) -> Labels are key-value pairs attached\
    \ to Kubernetes objects such as Pods, Services, and Deployments. They serve as\
    \ identifiers and organizational tags that make it easier to manage, select, and\
    \ operate on groups of objects. Labels can be used to organize resources in meaningful\
    \ ways according to the needs of the user or application. For example, labels\
    \ can denote environments (e.g., **env=production**), application versions (e.g.,\
    \ **version=1.2.3**), or any other categorization that aids in managing resources\
    \ at scale. One of the key features of labels is their use in selectors, which\
    \ are queries that allow users to filter resources based on label criteria.\n\n\
    (5) -> Name of the pod you want to create. Part of the metadata.\n\n(6) -> The\
    \ \"spec\" in Kubernetes is a required section of an object definition that describes\
    \ the desired state of the resource. It is where you specify the characteristics\
    \ of the resource you want to create or configure.\n\nFor example, in a Pod definition,\
    \ the spec might include the container images to use, the number of replicas,\
    \ network settings, and volume mounts, among other configurations. The spec is\
    \ essentially a blueprint that tells Kubernetes how to build and manage the resource\
    \ in question.\n\n(7) -> Containers are part of the pod spec, which tells Kubernetes\
    \ what containers the pod contains and what their names and images are. **Note**\
    \ that the image should be a valid container registry image with an optional tag.\
    \ Name is an arbitrary name used by humans to identify the containers.\n\nYou\
    \ can also generate this YAML by running the following command:\n\n```\n$ kubectl\
    \ run nginx --image=nginx --dry-run=client -o yaml > nginx-pod.yaml\n```\n\nThe\
    \ **--dry-run=client** parameter tells kubectl to output the definition of the\
    \ resource instead of creating the resource via the Kubernetes API. The **-o yaml**\
    \ parameter tells kubectl to output the resource spec in YAML format. You can\
    \ also try giving the less useful **-o json** parameter and see what happens.\n\
    \nWhen we try to apply these changes, here's what we get:\n\n```\n$ kubectl apply\
    \ -f nginx-pod.yaml\nWarning: resource pods/nginx is missing the kubectl.kubernetes.io/last-applied-configuration\
    \ annotation which is required by kubectl apply. kubectl apply should only be\
    \ used on resources created declaratively by either kubectl create --save-config\
    \ or kubectl apply. The missing annotation will be patched automatically.\npod/nginx\
    \ configured\n```\n\nThe message clearly states that only the changes not there\
    \ in the current state will be applied. This sort of ties into the idea behind\
    \ how kubectl works. It tries to match the current state of the system with the\
    \ desired state in the YAML file. If both are the same, there is nothing to \"\
    apply\".\n\n## Exercise 5: Change the pod spec and re-apply\n\nChange the name\
    \ of the nginx container in the pod spec YAML and run **kubectl apply** again.\n\
    \n## Exercise 6: Change the name of the pod\n\nTry changing the name of the pod\
    \ from **nginx** to **webapp** in the pod spec YAML's metadata and run **kubectl\
    \ apply**.\n\n## Exercise 7: run Apache httpd server\n\nSimilar to Nginx, run\
    \ Apache httpd server as a pod with the name \"httpd\", with label **app=webserver**.\n\
    \n## Pod restart behaviour\n\nLet's create a pod which \"sleeps\" for 5 seconds.\n\
    \n```\napiVersion: v1\nkind: Pod\nmetadata:\n  name: bash-sleep\nspec:\n  containers:\n\
    \  - name: sleepy-app # (1)\n    image: bash # (2)\n    command: [\"bash\", \"\
    -c\", \"sleep 5\"] # (3)\n```\n\n(1) -> The name of the container inside the pod.\n\
    \n(2) -> we will use the official bash image.\n\n(3) -> The **command** spec is\
    \ similar to the **CMD** directive in Dockerfiles. We run a process which terminates\
    \ after 5 seconds.\n\nWhen we apply this pod,\n\n```\n$ kubectl apply -f bash-sleep-pod.yaml\n\
    ```\n\nKubernetes runs the pod happily, until it doesn't. After a minute,\n\n\
    ```\n$ kubectl get pod\nNAME         READY   STATUS             RESTARTS   AGE\n\
    bash-sleep   0/1     CrashLoopBackOff   2 (18s ago)   55s\nnginx        1/1  \
    \   Running            0            4h20m\n```\n\n## After some minutes...\n\n\
    ```\n$ kubectl get pod\nNAME         READY   STATUS             RESTARTS   AGE\n\
    bash-sleep   0/1     CrashLoopBackOff   6 (45s ago)   7m15s\nnginx        1/1\
    \     Running            0            4h27m\n```\n\nYou can observe that the restart\
    \ count keeps on increasing (in the **RESTARTS** column). The **STATUS** is **CrashLoopBackOff**.\
    \ Kubernetes sees that the pod is down (as the container kills after 5 seconds)\
    \ and tries to restart it. The **READY** column indicates that 0 out of 1 containers\
    \ in the pod are ready.\n\n## what does CrashLoopBackOff mean?\n\nCrashLoopBackOff\
    \ is a status message you might see in Kubernetes when a container in a Pod repeatedly\
    \ starts, crashes, then restarts in a loop. This behavior occurs when Kubernetes\
    \ adheres to the specified restartPolicy (which, by default, is Always for Pods)\
    \ but finds that the container cannot stay running. After each crash, Kubernetes\
    \ waits a bit longer before trying to restart the container again, leading to\
    \ the \"back-off\" part of CrashLoopBackOff.\n\nThe reasons for a CrashLoopBackOff\
    \ status can vary widely but often include:\n\n- The application within the container\
    \ is encountering an error during startup due to misconfiguration, missing environment\
    \ variables, incorrect or missing dependencies, etc.\n- The container is trying\
    \ to bind to a port that is already in use or does not have the permissions to\
    \ use.\n- The application is designed to exit after completing its tasks, but\
    \ the Pod's restartPolicy is set to Always, causing Kubernetes to continually\
    \ restart the container.\n\n## Exercise 8: Configure sleepy pod not to restart\n\
    \nFix the configuration of the bash-sleep container in such a way that the pod\
    \ goes down.\n\n## Describe a pod\n\nkubectl has a \"describe\" action, which\
    \ describes a resource. Let's describe our nginx pod."
  mdcn: "以下是其工作原理的简化模型：我们创建一个表示 Pod 期望状态的 YAML 构件。Kubernetes 集群会创建/修改 Pod，使其与我们的期望状态相匹配。Kubernetes\
    \ 会尽最大可能将现有状态与期望状态进行匹配。有时，它无法做到这一点。例如，如果你只有 1 个节点，却请求集群创建数百个 Pod，集群会放弃，并表示它无法“将集群状态与你的期望状态匹配”。\n\
    \n以下是我们从命令行创建的 nginx Pod 对应的 YAML 构件。\n\n```\napiVersion: v1 # (1)\nkind: Pod\
    \ # (2)\nmetadata: # (3)\n  labels: # (4)\n    run: nginx\n  name: nginx # (5)\n\
    spec: # (6)\n  containers: # (7)\n  - image: nginx\n    name: nginx\n```\n\n(1)\
    \ -> 在 Kubernetes 中，API 是定义、管理和控制集群内各种资源的基础。\n\n(2) -> Kubernetes 中的“资源”指的是系统知道如何管理的实体，例如\
    \ Pod、Deployment、Service 等，我们将在后续章节中看到。每种资源都由一个“kind”定义，它指定了所讨论资源的类型。\n\n除了 kind，每个\
    \ Kubernetes 资源都与一个 API 版本相关联。API 版本至关重要，因为 Kubernetes 的 API 会随时间演进，添加新功能并修改现有功能。API\
    \ 版本以 **apiVersion: <group>/<version>** 的格式指定，例如 **apiVersion: v1** 或 **apiVersion:\
    \ apps/v1**，它告知 Kubernetes 资源定义所使用的 API 模式版本。这种版本控制系统允许 Kubernetes 提供向后兼容性，并平滑地管理向新\
    \ API 版本的过渡，确保用户可以按自己的节奏采用新功能，同时保持其现有部署的稳定性。\n\n(3) -> metadata 是一组数据，提供有关 Kubernetes\
    \ 系统内管理的其他数据的信息。它是一个结构化的信息集合，用于标识、描述和组织 Pod、Service 和 Deployment 等资源。元数据在资源管理中起着至关重要的作用，能够实现\
    \ Kubernetes 生态系统内资源的高效查询、选择和操作。\n\n(4) -> 标签是附加到 Kubernetes 对象（如 Pod、Service\
    \ 和 Deployment）的键值对。它们充当标识符和组织标签，使得管理、选择和操作一组对象变得更加容易。标签可以根据用户或应用程序的需要，以有意义的方式组织资源。例如，标签可以表示环境（例如\
    \ **env=production**）、应用程序版本（例如 **version=1.2.3**）或任何其他有助于大规模管理资源的分类。标签的一个关键特性是它们在选择器中的使用，选择器是允许用户根据标签标准过滤资源的查询。\n\
    \n(5) -> 你要创建的 Pod 的名称。是元数据的一部分。\n\n(6) -> Kubernetes 中的“spec”是对象定义的一个必需部分，描述了资源的期望状态。你在这里指定要创建或配置的资源的特性。\n\
    \n例如，在 Pod 定义中，spec 可能包括要使用的容器镜像、副本数量、网络设置和卷挂载等配置。spec 本质上是一个蓝图，告诉 Kubernetes\
    \ 如何构建和管理所讨论的资源。\n\n(7) -> 容器是 Pod spec 的一部分，它告诉 Kubernetes Pod 包含哪些容器，以及它们的名称和镜像是什么。**请注意**，镜像应该是一个有效的容器注册表镜像，带有可选的标签。Name\
    \ 是人类用来标识容器的任意名称。\n\n你也可以通过运行以下命令生成此 YAML：\n\n```\n$ kubectl run nginx --image=nginx\
    \ --dry-run=client -o yaml > nginx-pod.yaml\n```\n\n**--dry-run=client** 参数告诉\
    \ kubectl 输出资源的定义，而不是通过 Kubernetes API 创建资源。**-o yaml** 参数告诉 kubectl 以 YAML 格式输出资源规范。你也可以尝试使用不太有用的\
    \ **-o json** 参数，看看会发生什么。\n\n当我们尝试应用这些更改时，得到以下结果：\n\n```\n$ kubectl apply -f nginx-pod.yaml\n\
    Warning: resource pods/nginx is missing the kubectl.kubernetes.io/last-applied-configuration\
    \ annotation which is required by kubectl apply. kubectl apply should only be\
    \ used on resources created declaratively by either kubectl create --save-config\
    \ or kubectl apply. The missing annotation will be patched automatically.\npod/nginx\
    \ configured\n```\n\n该消息明确指出，只有当前状态中不存在的更改才会被应用。这与 kubectl 工作方式背后的理念紧密相关。它尝试将系统的当前状态与\
    \ YAML 文件中的期望状态进行匹配。如果两者相同，则无需“应用”。\n\n## 练习 5：更改 Pod 规范并重新应用\n\n更改 Pod 规范 YAML\
    \ 中 nginx 容器的名称，然后再次运行 **kubectl apply**。\n\n## 练习 6：更改 Pod 的名称\n\n尝试在 Pod 规范\
    \ YAML 的元数据中将 Pod 的名称从 **nginx** 更改为 **webapp**，然后运行 **kubectl apply**。\n\n##\
    \ 练习 7：运行 Apache httpd 服务器\n\n类似于 Nginx，以名称“httpd”运行 Apache httpd 服务器作为 Pod，并带有标签\
    \ **app=webserver**。\n\n## Pod 重启行为\n\n让我们创建一个“休眠”5 秒的 Pod。\n\n```\napiVersion:\
    \ v1\nkind: Pod\nmetadata:\n  name: bash-sleep\nspec:\n  containers:\n  - name:\
    \ sleepy-app # (1)\n    image: bash # (2)\n    command: [\"bash\", \"-c\", \"\
    sleep 5\"] # (3)\n```\n\n(1) -> Pod 内容器的名称。\n\n(2) -> 我们将使用官方的 bash 镜像。\n\n(3)\
    \ -> **command** 规范类似于 Dockerfile 中的 **CMD** 指令。我们运行一个在 5 秒后终止的进程。\n\n当我们应用这个\
    \ Pod 时，\n\n```\n$ kubectl apply -f bash-sleep-pod.yaml\n```\n\nKubernetes 会愉快地运行\
    \ Pod，直到它停止运行。一分钟后，\n\n```\n$ kubectl get pod\nNAME         READY   STATUS   \
    \          RESTARTS   AGE\nbash-sleep   0/1     CrashLoopBackOff   2 (18s ago)\
    \   55s\nnginx        1/1     Running            0            4h20m\n```\n\n##\
    \ 几分钟后...\n\n```\n$ kubectl get pod\nNAME         READY   STATUS             RESTARTS\
    \   AGE\nbash-sleep   0/1     CrashLoopBackOff   6 (45s ago)   7m15s\nnginx  \
    \      1/1     Running            0            4h27m\n```\n\n你可以观察到重启次数不断增加（在\
    \ **RESTARTS** 列中）。**STATUS** 是 **CrashLoopBackOff**。Kubernetes 看到 Pod 已停止运行（因为容器在\
    \ 5 秒后终止），并尝试重启它。**READY** 列表明 Pod 中 1 个容器中有 0 个已就绪。\n\n## CrashLoopBackOff 是什么意思？\n\
    \nCrashLoopBackOff 是你在 Kubernetes 中可能看到的一种状态消息，当 Pod 中的容器反复启动、崩溃，然后在循环中重启时会出现。当\
    \ Kubernetes 遵循指定的 restartPolicy（对于 Pod，默认为 Always）但发现容器无法保持运行时，就会发生这种行为。每次崩溃后，Kubernetes\
    \ 会等待更长的时间再尝试重启容器，从而导致 CrashLoopBackOff 中的“back-off”部分。\n\n导致 CrashLoopBackOff\
    \ 状态的原因可能多种多样，但通常包括：\n\n- 容器内的应用程序在启动过程中遇到错误，原因可能是配置错误、缺少环境变量、依赖项不正确或缺失等。\n- 容器尝试绑定到一个已被使用的端口，或者没有使用该端口的权限。\n\
    - 应用程序设计为在完成任务后退出，但 Pod 的 restartPolicy 设置为 Always，导致 Kubernetes 不断重启容器。\n\n##\
    \ 练习 8：配置休眠 Pod 不重启\n\n修复 bash-sleep 容器的配置，使 Pod 停止运行。\n\n## 描述 Pod\n\nkubectl\
    \ 有一个“describe”操作，用于描述资源。让我们描述我们的 nginx Pod。"
