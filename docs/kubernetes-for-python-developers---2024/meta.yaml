    You can see that our **two-containers** pod is in **CrashLoopBackOff** status,
    only 1 container is active of the 2, and obviously Kubernetes tries to perform
    CPR unsuccessfully on the pod which will never run successfully till end of eternity!


    Why is that? Because containers in a pod share the same IP and port space. If
    the first nginx container goes and brags port **80**, the 2nd unfortunate container
    cannot brag that port and hence sadly fails. You might argue that you gave a different
    **containerPort** value to both the containers, but the nginx process in that
    container''s image is hardcoded to run on port **80**, so no matter what arbitrary
    port value you give to your **containerPort**, the 2nd container is doomed to
    get killed.


    The solution is to run nginx in different ports. The official nginx image doesn''t
    allow this type of arrangement out of the box, but Bitnami''s nginx image allows
    you to configure the port number as an environment variable. Let''s give that
    approach a shot.


    ```

    apiVersion: v1

    kind: Pod

    metadata:

    ```'
