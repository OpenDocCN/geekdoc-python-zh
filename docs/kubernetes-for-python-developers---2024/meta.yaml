    \nThe kubeconfig is a YAML file which looks like this:\n\n```\napiVersion: v1\n\
    kind: Config\nclusters:\n- name: development-cluster\n  cluster:\n    server:\
    \ https://development.example.com\n    certificate-authority-data: ...\ncontexts:\n\
    - name: development\n  context:\n    cluster: development-cluster\n    user: developer\n\
    \    namespace: dev\nusers:\n- name: developer\n  user:\n    client-certificate-data:\
    \ ...\n    client-key-data: ...\ncurrent-context: development\npreferences: {}\n\
