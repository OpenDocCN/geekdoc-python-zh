    metadata:\n  name: read-pods # (3)\nsubjects:\n- kind: ServiceAccount # (4)\n\
    \  name: test # (5)\nroleRef:\n  kind: Role # (6)\n  name: pod-reader # (7)\n\
    \  apiGroup: rbac.authorization.k8s.io # (8)\n```\n\n(1) -> Specifies the API\
    \ version for the RoleBinding resource within the RBAC authorization API group.\n\
    \n(2) -> Defines the resource type as a RoleBinding, which grants permissions\
