    # # Chapter 1: The meta stuff


    # ## The audience of this book


    If you''re a Python developer eager to learn Kubernetes, or just curious about
    it, this book is tailor-made for you. I assume that you have no prior knowledge
    of Kubernetes, although it doesn''t hurt if you know something about it.


    That said, developers who come from other languages like PHP, Ruby/Rails, Golang,
    Node.js etc. will also find this book useful. I wanted to use a specific stack/programming
    language throughout the book so that I don''t distract you, the reader, by giving
    examples of different concepts in different stacks. I plan to release other language
    specific editions of this book(as in Kubernetes for PHP devs, Kubernetes for Node.js
    devs etc.) if there is enough interest. Please email me at [lakshmi@lakshminp.com](mailto:lakshmi@lakshminp.com)
    or consider signing up for updates to this book at [https://www.lakshminp.com/kubernetes-for-python-developers/](https://www.lakshminp.com/kubernetes-for-python-developers/).


    If you are a devops engineer, you will learn a perspective or two about the other
    side of the river, i.e. the application context and what goes into containerizing,
    deploying and maintaining an application in Kubernetes. I won''t be talking about
    the ops side of Kubernetes(eg. how to spin up Kubernetes clusters using infra-as-code,
    how to upgrade clusters without downtime etc.), as that is a topic for a whole
    new book altogether.'
- md: '# Code examples


    The code examples for each chapter in the book can be found at [https://github.com/badri/kubernetes-for-python-devs](https://github.com/badri/kubernetes-for-python-devs).


    The final chapter contains a CD pipeline and a separate repository, which can
    be found at [https://github.com/badri/flask-redis-cd](https://github.com/badri/flask-redis-cd).


    # Why developers should learn Kubernetes


    I need not sell you on how popular Kubernetes is or how it has fundamentally transformed
    how applications are deployed, scaled, and managed in the cloud. But why should
    you, as a developer learn it? There is already someone in your organization who
    does this, so why bother?


    It arms you with a deep understanding of modern, cloud-native architectures, enabling
    the design of resilient, scalable, and highly available systems. For Python developers,
    who are the main audience of this book, working with web frameworks like Django
    or Flask, Kubernetes simplifies the process of containerizing applications and
    managing environment-specific configurations through ConfigMaps and Secrets, making
    your applications more portable and easier to manage across different environments.
    Overall, it will make you a better developer. To quote Paul Graham from his essay
    Beating the Averages([https://paulgraham.com/avg.html](https://paulgraham.com/avg.html)),


    > Lisp is worth learning for the profound enlightenment experience you will have
    when you finally get it; that experience will make you a better programmer for
    the rest of your days, even if you never actually use Lisp itself a lot.


    He talks about why learning the Lisp programming language will make you a better
    developer, even though you actually won''t end up using Lisp on a regular basis,
    like your day job. The only difference in our case is, you will very much use
    Kubernetes in your day job.


    Moreover, Kubernetes is widely adopted across the industry, with support from
    cloud providers like AWS, Google Cloud, and Azure, ensuring that skills in Kubernetes
    are highly relevant and in demand. By mastering Kubernetes, you can increase your
    marketability, open up new career opportunities, and contribute more effectively
    to your organizations'' digital transformation strategies. In essence, learning
    Kubernetes is not just about keeping up with the latest technology trends; it''s
    about empowering yourself with the tools and methodologies needed to build the
    next generation of web applications.


    # What we will build


    In this book, we embark on an exciting journey to bridge the world of Python development
    with the powerful orchestration capabilities of Kubernetes. Our adventure culminates
    in the creation of a dynamic, scalable Flask-based application, enhanced with
    the resilience and flexibility that Kubernetes brings to the table. Here''s what
    awaits you:


    **A Flask Application:** We''ll start with the basics—developing a simple yet
    functional Flask application. This Python web application will serve as the cornerstone
    of our exploration, offering a familiar starting point for Python developers.
    As we progress, you''ll see how even the simplest application can benefit from
    Kubernetes.


    **Containerization with Docker:** Next, we''ll containerize our Flask application,
    encapsulating it within a Docker container. This step is crucial for understanding
    how applications are prepared for deployment in a Kubernetes environment, ensuring
    consistency across different environments and simplifying deployment processes.


    **Deployment to Kubernetes:** It''s time to deploy our application to Kubernetes.
    You''ll learn how to define and manage deployments, allowing our Flask application
    to be seamlessly deployed, managed, and scaled within the Kubernetes ecosystem.
    This includes creating and configuring Pods, Deployments, and Services to ensure
    our application is accessible and scalable.


    **Advanced Kubernetes Features:** As our application grows more complex, we''ll
    introduce Redis for storing state, illustrating how stateful applications operate
    within Kubernetes. You''ll get hands-on experience with persistent storage, secret
    management, and configuring inter-service communication, embodying real-world
    application needs.


    **Continuous Deployment (CD):** Finally, we''ll automate the deployment process
    using GitHub Actions, achieving a Continuous Deployment pipeline that takes your
    code from git push to a deployed application in Kubernetes, showcasing the best
    practices in DevOps.


    **Conclusion:** By the end of this book, you''ll have a fully functional Flask
    application, architected to thrive in a Kubernetes environment. You''ll understand
    not just the how, but the why, empowering you to leverage Kubernetes for your
    own Python projects with confidence and skill.


    # What prerequisites do you need


    To get the most out of this book, you should be familiar with:


    - Basic command-line usage

    - Flask or Django frameworks

    - Basic Git commands

    - Docker client setup


    Here''s a set of tools you need to have:


    1. git

    2. Terminal

    3. A decent IDE (I recommend VSCode)

    4. docker client. There are instructions on how to set it up ([https://docs.docker.com/engine/install/](https://docs.docker.com/engine/install/)).


    Finally, you need a cloud account. Many books and tutorials teach you how to setup
    something with a local or a tame Kubernetes setup like Minikube. I''m opinionated
    about this one and I strongly recommend that you create a real Kubernetes cluster
    for running the examples in this book. There are a lot of cloud vendors who offer
    free credits to setup Kubernetes, I recommend Digitalocean, you can sign up with
    the referral link ([https://m.do.co/c/dfe1fd4e27d6](https://m.do.co/c/dfe1fd4e27d6))
    or without a referral link ([https://www.digitalocean.com/](https://www.digitalocean.com/)).
    For some reason, if you cannot create a real Kubernetes cluster with a cloud provider,
    you can use Minikube. You won''t be able to run the continuous delivery example
    in the last chapter using Minikube.


    # Chapter 2: Containers recap


    Unlike virtual machines that each require a full copy of an operating system,
    containers share the host system''s kernel and isolate the application processes
    from each other. This leads to lower overhead, higher density of applications
    running on the same hardware, and ultimately, cost savings on infrastructure.
    Furthermore, the lightweight nature of containers and their rapid startup times
    are ideal for scaling applications in response to demand, enhancing the application''s
    availability and performance.


    Using containers also simplifies application management and updates. With containers,
    updating an application or rolling back to a previous version can be as simple
    as stopping a container and starting a new one with the updated image. This atomicity
    and speed in managing application versions are invaluable in today''s fast-paced
    development environments where agility and responsiveness are key to staying competitive.


    Should you also run containers locally, during development? The short answer is
    yes. But allow me to elaborate. By containerizing an application locally, you
    ensure that it runs within an isolated environment that closely mirrors production.
    This "build once, run anywhere" approach significantly reduces the "it works on
    my machine" syndrome, a common pitfall where code behaves differently in development
    than in production due to environmental discrepancies. Containers abstract away
    the underlying differences in OS, libraries, and dependencies, making applications
    more portable and less prone to environmental issues.


    Besides, containers facilitate a smoother transition from development to production.
    The container that developers use locally is the same container that gets deployed
    to production, which streamlines the development lifecycle and minimizes the risk
    of deployment errors. This seamless integration is a boon for implementing continuous
    integration and continuous deployment (CI/CD) pipelines, allowing for faster and
    more reliable software releases.


    # How containers work


    Under the hood, containers leverage several key Linux kernel features: namespaces,
    cgroups, and overlay filesystems, each playing a crucial role in providing the
    isolation and resource management that make containers so powerful.'
  mdcn: '# 代码示例


    本书各章节的代码示例可在 [https://github.com/badri/kubernetes-for-python-devs](https://github.com/badri/kubernetes-for-python-devs)
    找到。


    最后一章包含一个 CD 流水线和一个独立的代码仓库，可在 [https://github.com/badri/flask-redis-cd](https://github.com/badri/flask-redis-cd)
    找到。


    # 为什么开发者应该学习 Kubernetes


    我不必向你推销 Kubernetes 有多受欢迎，或者它如何从根本上改变了应用程序在云中的部署、扩展和管理方式。但是，作为开发者，你为什么要学习它呢？你的组织里已经有人在做这件事了，那为什么还要费心去学呢？


    它能让你深入理解现代的、云原生的架构，从而能够设计出具有弹性、可扩展性和高可用性的系统。对于本书的主要读者——Python 开发者来说，无论是使用 Django
    还是 Flask 这样的 Web 框架，Kubernetes 都能简化容器化应用程序的过程，并通过 ConfigMaps 和 Secrets 管理特定环境的配置，使你的应用程序更具可移植性，也更容易在不同环境中管理。总的来说，它会让你成为一名更好的开发者。引用保罗·格雷厄姆在其文章《超越平庸》（[https://paulgraham.com/avg.html](https://paulgraham.com/avg.html)）中的话：


    > Lisp 值得学习，因为当你最终理解它时，你会获得深刻的启蒙体验；这种体验将使你在余生中成为一名更好的程序员，即使你实际上很少使用 Lisp 本身。


    他谈论的是为什么学习 Lisp 编程语言会让你成为更好的开发者，即使你最终并不会像日常工作那样经常使用 Lisp。在我们的情况下，唯一的区别是，你将在日常工作中大量使用
    Kubernetes。


    此外，Kubernetes 在整个行业被广泛采用，得到了 AWS、Google Cloud 和 Azure 等云提供商的支持，确保了 Kubernetes
    技能具有高度的相关性和需求。通过掌握 Kubernetes，你可以提高自己的市场竞争力，开辟新的职业机会，并更有效地为组织的数字化转型战略做出贡献。本质上，学习
    Kubernetes 不仅仅是为了跟上最新的技术趋势；更是为了让自己掌握构建下一代 Web 应用程序所需的工具和方法论。


    # 我们将构建什么


    在本书中，我们将踏上一段激动人心的旅程，将 Python 开发的世界与 Kubernetes 强大的编排能力连接起来。我们的冒险最终将创建一个动态的、可扩展的
    Flask 应用程序，并借助 Kubernetes 带来的弹性和灵活性得到增强。以下是你将遇到的内容：


    **一个 Flask 应用程序：** 我们将从基础开始——开发一个简单但功能齐全的 Flask 应用程序。这个 Python Web 应用程序将作为我们探索的基石，为
    Python 开发者提供一个熟悉的起点。随着我们的进展，你将看到即使是最简单的应用程序也能从 Kubernetes 中受益。


    **使用 Docker 进行容器化：** 接下来，我们将把 Flask 应用程序容器化，将其封装在 Docker 容器中。这一步对于理解应用程序如何为在 Kubernetes
    环境中部署做准备至关重要，它确保了不同环境之间的一致性，并简化了部署流程。


    **部署到 Kubernetes：** 现在是时候将我们的应用程序部署到 Kubernetes 了。你将学习如何定义和管理部署，使我们的 Flask 应用程序能够在
    Kubernetes 生态系统中无缝部署、管理和扩展。这包括创建和配置 Pod、Deployment 和 Service，以确保我们的应用程序可访问且可扩展。


    **高级 Kubernetes 功能：** 随着我们的应用程序变得越来越复杂，我们将引入 Redis 来存储状态，展示有状态应用程序如何在 Kubernetes
    中运行。你将获得关于持久化存储、密钥管理以及配置服务间通信的实践经验，这体现了真实世界的应用程序需求。


    **持续部署（CD）：** 最后，我们将使用 GitHub Actions 自动化部署流程，实现一个持续部署流水线，将你的代码从 git push 一直带到部署在
    Kubernetes 中的应用程序，展示 DevOps 的最佳实践。


    **结论：** 在本书结束时，你将拥有一个功能齐全的 Flask 应用程序，其架构设计使其能够在 Kubernetes 环境中蓬勃发展。你不仅将理解“如何做”，还将理解“为什么这样做”，从而让你能够自信且熟练地将
    Kubernetes 应用于你自己的 Python 项目。


    # 你需要哪些先决条件


    为了充分利用本书，你应该熟悉以下内容：


    - 基本的命令行使用

    - Flask 或 Django 框架

    - 基本的 Git 命令

    - Docker 客户端设置


    以下是你需要拥有的一套工具：


    1. git

    2. 终端

    3. 一个不错的 IDE（我推荐 VSCode）

    4. Docker 客户端。有关如何设置的说明，请参阅 [https://docs.docker.com/engine/install/](https://docs.docker.com/engine/install/)。


    最后，你需要一个云账户。许多书籍和教程教你如何使用本地或像 Minikube 这样受控的 Kubernetes 环境来设置某些东西。对此我有明确的观点，我强烈建议你创建一个真实的
    Kubernetes 集群来运行本书中的示例。有很多云供应商提供免费额度来设置 Kubernetes，我推荐 Digitalocean，你可以通过推荐链接（[https://m.do.co/c/dfe1fd4e27d6](https://m.do.co/c/dfe1fd4e27d6)）或不使用推荐链接（[https://www.digitalocean.com/](https://www.digitalocean.com/)）进行注册。如果由于某些原因，你无法使用云提供商创建真实的
    Kubernetes 集群，你可以使用 Minikube。但你将无法使用 Minikube 运行最后一章中的持续交付示例。


    # 第 2 章：容器回顾


    与每个虚拟机都需要一份完整的操作系统副本不同，容器共享主机系统的内核，并将应用程序进程彼此隔离。这带来了更低的开销、在相同硬件上运行更高密度的应用程序，并最终节省基础设施成本。此外，容器的轻量级特性和快速启动时间非常适合根据需求扩展应用程序，从而提高应用程序的可用性和性能。


    使用容器也简化了应用程序的管理和更新。使用容器，更新应用程序或回滚到以前的版本可以像停止一个容器并使用更新后的镜像启动一个新容器一样简单。这种管理应用程序版本的原子性和速度在当今快节奏的开发环境中非常宝贵，因为敏捷性和响应能力是保持竞争力的关键。


    在开发期间，你也应该在本地运行容器吗？简短的回答是肯定的。但请允许我详细说明。通过在本地容器化应用程序，你可以确保它在一个与生产环境非常相似的隔离环境中运行。这种“一次构建，随处运行”的方法显著减少了“在我的机器上可以运行”的问题，这是一个常见的陷阱，即由于环境差异，代码在开发环境和生产环境中的行为不同。容器抽象了底层操作系统、库和依赖项的差异，使应用程序更具可移植性，也更不容易出现环境问题。


    此外，容器促进了从开发到生产的更平滑过渡。开发者在本地使用的容器与部署到生产环境的容器是同一个，这简化了开发生命周期，并最大限度地降低了部署错误的风险。这种无缝集成对于实施持续集成和持续部署（CI/CD）流水线是一个福音，允许更快、更可靠的软件发布。


    # 容器如何工作


    在底层，容器利用了几个关键的 Linux 内核特性：命名空间、控制组和联合文件系统，每个特性都在提供使容器如此强大的隔离和资源管理方面发挥着至关重要的作用。'
