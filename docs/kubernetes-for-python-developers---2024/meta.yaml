    \ -> 将容器的 REDIS_HOST 环境变量设置为 'cache'，即 Redis 容器的服务名称。(5) -> 设置容器的 REDIS_PASSWORD\
    \ 环境变量。(6) -> 指定 'flask-app' 依赖于 'cache' 服务。这确保了 'cache' 服务在 'flask-app' 之前启动。(7)\
    \ -> 指定 Redis 服务使用的 Docker 镜像。我们指定 Bitnami 的 Redis 镜像，因为它被广泛使用。Bitnami 镜像还允许用户通过环境变量配置\
    \ Redis 服务的认证。(8) -> 设置容器的 REDIS_PASSWORD 环境变量。(9) -> 将主机的 6379 端口映射到容器内的 6379\
    \ 端口，这是 Redis 的默认端口。\n\n现在，我们启动这两个服务。\n\n```\n$ export PORT=8080\n$ docker-compose\
    \ up\n```\n\n你的输出将与此类似。\n\n![](img/91c4bde832e221ba5bc429caf9587286_60_0.png)\n\
    \nFlask 应用将可通过 [http://localhost:8080/](http://localhost:8080/) 访问。\n\n![](img/91c4bde832e221ba5bc429caf9587286_61_0.png)\n\
    \n由 Redis 缓存支持的 docker-compose flask 应用\n\n## 练习 2：设置实时重载\n\n修改 docker-compose\
    \ 配置，使其在开发期间支持实时重载。这确保了主机上源代码的更改无需重启容器即可在容器内生效。\n\n## 练习 3：配置 Nginx\n\n生产环境的 Flask\
    \ 应用不使用 `flask run` 来提供应用服务。它们要么使用 gunicorn，要么使用像 Nginx 这样的 Web 服务器进行代理。不要使用默认的\
    \ Flask run 命令来提供服务，而是使用一个 Nginx 容器进行代理。对 docker-compose 文件进行必要的更改。\n\n## 注册表\n\
    \n![](img/91c4bde832e221ba5bc429caf9587286_62_0.png)\n\n一个容器注册表\n\n容器注册表是一个存储和内容分发系统，用于存放容器镜像。这些镜像包含可在容器化环境中运行的软件的可执行包，其中包含运行所需的所有元素，例如代码、运行时、系统工具、系统库和设置。注册表是容器生态系统中的关键组件，作为存储、组织和管理镜像的仓库。以下是对容器注册表及其重要性的更深入了解：\n\
    \n## 为什么我们需要容器注册表？\n\n**集中存储：** 容器注册表提供了一个集中存储和管理容器镜像的位置。这种集中化便于开发团队和部署环境之间更轻松地访问和分发镜像，确保部署的一致性和可靠性。\n\
    \n**版本控制和镜像管理：** 注册表跟踪容器镜像的不同版本，允许团队部署特定版本的应用程序或服务。此功能对于维护应用程序稳定性、在必要时回滚到以前的版本以及实施蓝/绿或金丝雀部署策略至关重要。\n\
    \n**安全性和合规性：** 许多容器注册表提供安全功能，例如漏洞扫描，它会检查镜像是否存在已知的安全问题。这有助于维护应用程序的安全态势。注册表还可以强制执行合规策略，确保只有经过批准和审查的镜像才能在生产环境中使用。\n\
    \n**与 CI/CD 管道集成：** 容器注册表与持续集成/持续部署 (CI/CD) 管道无缝集成。这种集成自动化了构建、测试和部署应用程序的过程，显著加快了开发周期并减少了人为错误的可能性。\n\
    \n**访问控制：** 注册表提供控制谁可以推送和拉取镜像的机制，使组织能够实施访问策略来保护敏感的应用程序和数据。这种访问控制对于维护容器化应用程序的完整性和安全性至关重要。\n\
    \n**分发效率：** 容器注册表通常具有高效分发镜像的机制，例如层缓存和镜像压缩。这些功能减少了带宽使用并加快了镜像的下载速度，这在分布式或云原生环境中尤其有益，因为应用程序可能部署在多个区域或云提供商中。\n\
    \n## 示例注册表\n\n**Docker Hub：** 最大的公共容器镜像注册表，托管数百万个容器镜像。它被广泛用于公共和私有仓库，为各种软件和服务提供大量社区生成的镜像。\n\
    \n**Google Container Registry (GCR)：** 一个私有容器注册表，提供对容器镜像的高速访问，集成在 Google Cloud\
    \ Platform 中，确保 Docker 镜像的安全高效存储和管理。\n\n**Amazon Elastic Container Registry (ECR)：**\
    \ AWS 提供的完全托管的 Docker 容器注册表，允许开发人员轻松存储、管理和部署 Docker 容器镜像。\n\n**Azure Container\
    \ Registry (ACR)：** Microsoft Azure 提供的服务，提供私有 Docker 注册表功能，并与 Azure 服务集成，支持 Windows\
    \ 和 Linux 容器。\n\n总之，容器注册表通过提供可靠、安全和高效的方式来存储、管理和分发容器镜像，在容器化生态系统中发挥着关键作用。它们支持部署过程的自动化，通过镜像扫描和访问控制增强安全性，并促进开发和运维团队之间的协作。\n\
    \n## 设置容器注册表\n\nGithub 自带一个免费的容器注册表。假设你已经拥有一个 Github 账户并已注册，请从其网站创建一个新令牌 (https://github.com/settings/tokens/new?scopes=write:packages)。复制并保存此令牌以登录\
    \ Github 注册表。\n\n以下是使用你刚获得的令牌登录 Github 注册表的命令。\n\n```\n$ export CR_PAT=ghp_XXXX\
    \ # 你刚才获得的令牌\n$ echo $CR_PAT | docker login ghcr.io -u <your-github-username>\
    \ --password-stdin # 将 \"<your-github-username>\" 替换为你的 github 用户名。\n```\n\n登录后，你可以重新标记你的\
    \ Flask 容器镜像并将其推送到 ghcr。\n\n```\n$ docker tag flask-app ghcr.io/<your-github-username>/flask-app:1.0\
    \ # 将 \"<your-github-username>\" 替换为你的 github 用户名。\n$ docker push ghcr.io/<your-github-username>/flask-app:1.0\
    \ # 将 \"<your-github-username>\" 替换为你的 github 用户名。\n```\n\n## 练习 4：在 Ghcr 中构建并推送新标签。\n\
    \n对你的代码进行任意更改，构建它并将新标签推送到 Github 注册表。\n\n接下来，在 **requirements.txt** 中添加一个新的依赖项，重新构建镜像并推送一个新标签。比较两种情况下的构建步骤输出，并记录你的观察结果。\n\
    \n## 总结\n\n本章为理解容器技术的关键组件奠定了基础，这对于掌握 Kubernetes 至关重要。它从容器如何工作的基础知识开始，利用 Linux\
    \ 内核特性（如用于隔离的命名空间和用于资源管理的 cgroups）来在单个主机系统上高效地运行多个隔离环境。这种理解对于你掌握容器化在实现跨各种环境的一致性和简化应用程序部署方面的意义至关重要。\n\
    \n我们进一步深入探讨了容器网络、覆盖文件系统以及在容器内构建和运行应用程序的实际方面。它说明了不同的网络模式，例如桥接和覆盖网络，这些对于配置容器间通信和将容器连接到外部世界至关重要。此外，它还引导读者完成将\
    \ Flask 应用程序容器化的过程，重点介绍了创建 Docker 镜像和运行容器的过程，从而提供了一种实践方法来理解容器操作的细微差别。"
