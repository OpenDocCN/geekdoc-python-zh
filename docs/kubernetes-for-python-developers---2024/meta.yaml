  md: '# kube-apiserver


    The kube-apiserver acts as the front-end to the Kubernetes control plane. It is
    the component through which the Kubernetes API is exposed, serving as the primary
    interface for users, external components, and internal parts of the cluster to
    communicate and manage the state of Kubernetes objects (pods, services, deployments,
    etc.). The kube-apiserver processes REST operations, validates them, and updates
    the corresponding objects in etcd, making it a critical gateway to the cluster''s
    operational state.


    # etcd


    etcd is a distributed key-value store used by Kubernetes as the backing store
    for all cluster data. It provides a reliable way to store data that needs to be
    accessed by a distributed system like Kubernetes. etcd''s primary job is to maintain
    and manage the state of the Kubernetes cluster, keeping track of all Kubernetes
    objects. It is designed for high availability and is the ultimate source of truth
    for the cluster, ensuring persistence, consistency, and fault-tolerance of cluster
    state data.


    # kube-scheduler


    The kube-scheduler is responsible for assigning pods to nodes. It observes the
    creation of new pods with no assigned node, and selects a node for them to run
    on, based on several scheduling criteria. These criteria include individual and
    collective resource requirements, hardware/software/policy constraints, affinity
    and anti-affinity specifications, data locality, inter-workload interference,
    and deadlines. The kube-scheduler ensures that, where possible, workloads are
    balanced across the available compute resources.'
  merge: -1
  pgno: 74
- img_proc: true
  md: '# Kube Controller Manager


    The Kube Controller Manager is a component on the master node that runs controller
    processes. These controllers include the node controller, replication controller,
    endpoints controller, and service account & token controllers, among others. Each
    controller is responsible for managing specific aspects of cluster operations,
    watching the shared state of the cluster through the apiserver and making changes
    attempting to move the current state towards the desired state.


    # Kubelet


    The Kubelet runs on each node in the cluster and is responsible for ensuring that
    containers are running in a Pod. It takes a set of PodSpecs that are provided
    through various mechanisms (primarily through the apiserver) and ensures that
    the containers described in those PodSpecs are running and healthy. The Kubelet
    monitors the state of pods and containers, reports back to the control plane,
    handles pod and container lifecycle events, and manages container runtime environments.


    # Kube-proxy


    Kube-proxy is a network proxy that runs on each node in the cluster, implementing
    part of the Kubernetes Service concept. Kube-proxy maintains network rules on
    nodes. These network rules allow network communication to your Pods from network
    sessions inside or outside of your cluster. Kube-proxy uses the operating system
    packet filtering layer if there is one and it''s available. Otherwise, kube-proxy
    forwards the traffic itself.'
  merge: -1
  pgno: 75
