    You can observe that the restart count keeps on increasing(in the **RESTARTS**
    column). The **STATUS** is **CrashLoopBackOff**. Kubernetes sees that the pod
    is down(as the container kills after 5 seconds) and tries to restart it. The **READY**
    column indicates that 0 out of 1 containers in the pod are ready.


    # what does CrashLoopBackOff mean?


    CrashLoopBackOff is a status message you might see in Kubernetes when a container
    in a Pod repeatedly starts, crashes, then restarts in a loop. This behavior occurs
    when Kubernetes adheres to the specified restartPolicy (which, by default, is
    Always for Pods) but finds that the container cannot stay running. After each
    crash, Kubernetes waits a bit longer before trying to restart the container again,
    leading to the "back-off" part of CrashLoopBackOff.


    The reasons for a CrashLoopBackOff status can vary widely but often include:


    The application within the container is encountering an error during startup due
    to misconfiguration, missing environment variables, incorrect or missing dependencies,
    etc. The container is trying to bind to a port that is already in use or does
    not have the permissions to use. The application is designed to exit after completing
    its tasks, but the Pod''s restartPolicy is set to Always, causing Kubernetes to
    continually restart the container.


    # Exercise 8: Configure sleepy pod not to restart


    Fix the configuration of the bash-sleep container in such a way that the pod goes
    down.


    # Describe a pod


    kubectl has a "describe" action, which describes a resource. Let''s describe our
    nginx pod.'
- md: "## Exercise 9: Describe the bash-sleep pod.\n\nYou can run describe even on\
    \ crashing pods. You'll learn later in the Troubleshooting chapter that you should\
    \ especially run describe on crashing pods. Try to make sense and infer what information\
    \ kubectl gives you about this pod.\n\n```\n$ kubectl describe pod nginx\nName:\
    \         nginx # (1)\nNamespace:    default # (2)\nPriority:     0\nService Account:\
    \ default\nNode:         first-cluster-default-pool-oeo8s/10.122.0.4 # (3)\nStart\
    \ Time:   Mon, 19 Feb 2024 11:32:56 +0530 # (4)\nLabels:       run=nginx # (5)\n\
    Annotations:  <none>\nStatus:       Running # (6)\nIP:           10.244.0.187\
    \ # (7)\nIPs:\n  IP: 10.244.0.187\nContainers:\n  nginx:\n    Container ID:  \
    \ containerd://49122f24393291163f861fd366dc027395ed636d3442e5705e84875a340117af\
    \ # (8)\n    Image:          nginx # (9)\n...\n```\n\n(1) -> **nginx** - The unique\
    \ identifier of the Pod within the Kubernetes cluster.\n\n(2) -> **default** -\
    \ The namespace in which the Pod is running, used for organizing resources into\
    \ groups for management and access control. We will talk more about namespaces\
    \ in a later chapter.\n\n(3) -> **first-cluster-default-pool-oeo8s/10.122.0.4**\
    \ - The name and IP address of the cluster node on which the Pod is scheduled\
    \ and running.\n\n(4) -> **Mon, 19 Feb 2024 11:32:56 +0530** - The timestamp when\
    \ the Pod was started.\n\n(5) -> **run=nginx** - Key-value pairs attached to the\
    \ Pod, used for organizing, selecting, and managing Kubernetes objects.\n\n(6)\
    \ -> **Running** - The current state of the Pod, indicating that it is actively\
    \ running.\n\n(7) -> **10.244.0.187** - The IP address assigned to the Pod, allowing\
    \ it to communicate with other Pods and services within the cluster.\n\n(8) ->\
    \ **containerd://49122f24393291163f861fd366dc027395ed636d3442e5705e84875a340117af**\
    \ - The unique identifier of the container running within the Pod, managed by\
    \ the container runtime (containerd in this case).\n\n(9) -> **nginx** - The Docker\
    \ image used to create the container running in the Pod, specifying the application\
    \ or service it's meant to run.\n\n## Events\n\nIf you tried your hands on the\
    \ previous exercise, you will notice that the describe output contains a list\
    \ of events in reverse chronological order. These are Kubernetes events which\
    \ occur when stuff happens in a cluster. Let's take a look at events which happened\
    \ when we spun up the nginx pod:\n\n```\n$ kubectl get events\nLAST SEEN   TYPE\
    \     REASON      OBJECT      MESSAGE\n14m         Normal   Scheduled   pod/nginx\
    \   Successfully assigned default/nginx to first-cluster-default-pool-oeo8s #\
    \ (1)\n14m         Normal   Pulling     pod/nginx   Pulling image \"nginx\" #\
    \ (2)\n14m         Normal   Pulled      pod/nginx   Successfully pulled image\
    \ \"nginx\" in 8.203s (8.203s including waiting) # (3)\n14m         Normal   Created\
    \     pod/nginx   Created container nginx # (4)\n14m         Normal   Started\
    \     pod/nginx   Started container nginx # (5)\n44s         Normal   Killing\
    \     pod/nginx   Stopping container nginx # (6)\n32s         Normal   Scheduled\
    \   pod/nginx   Successfully assigned default/nginx to first-cluster-default-pool-oeo8s\
    \ # (7)\n32s         Normal   Pulling     pod/nginx   Pulling image \"nginx\"\
    \ # (8)\n30s         Normal   Pulled      pod/nginx   Successfully pulled image\
    \ \"nginx\" in 1.634s (1.634s including waiting) # (9)\n30s         Normal   Created\
    \     pod/nginx   Created container nginx\n30s         Normal   Started     pod/nginx\
    \   Started container nginx\n```\n\n(1) -> The Kubernetes scheduler assigned the\
    \ nginx pod to the node named first-cluster-default-pool-oeo8s.\n\n(2) -> The\
    \ kubelet in **first-cluster-default-pool-oeo8s** began pulling the Docker image\
    \ named nginx for the pod.\n\n(3) -> The kubelet in **first-cluster-default-pool-oeo8s**\
    \ successfully pulled the nginx image from the container registry within 8.203\
    \ seconds, including any wait time.\n\n(4) -> After pulling the image, the kubelet\
    \ created the nginx container within the pod.\n\n(5) -> The kubelet started the\
    \ nginx container, initiating the application or service it's meant to run.\n\n\
    (6) -> The kubelet is stopping the nginx container, possibly due to a pod deletion\
    \ request. I later recalled that I deleted the pod just to verify an exercise\
    \ :)\n\n(7) -> The nginx pod was again scheduled to the same node, indicating\
    \ a pod restart or rescheduling. I re-created the pod after I deleted it.\n\n\
    (8) -> The kubelet began pulling the nginx image for the pod again, part of a\
    \ pod restart or rescheduling process.\n\n(9) -> The image pull was faster this\
    \ time, indicating possibly that it has cached layers in that node.\n\n**NOTE**\
    \ that events are also a type of resource in Kubernetes much like pods, which\
