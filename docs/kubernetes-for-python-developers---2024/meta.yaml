    **image-namespace** is a way to organize multiple container images in a container
    registry. Think of it like a folder or a directory in your operating system. If
    your registry is used by multiple teams (which is usually the case), there will
    be a **team-a** image namespace and a **team-b** image namespace. **Note** that
    this is not to be confused with kubernetes namespaces, which is an entirely different
    thing. For the curl pod, **curlimages** is the image namespace. For nginx, this
