    (1) ->


    **openssl**: This is the command-line tool for using the various cryptography
    functions of OpenSSL''s crypto library from the shell. genrsa: This option tells
    OpenSSL to generate an RSA private key.


    **-out nginx-clusterip.example.com.key** Specifies the filename to save the generated
    private key. In this case, it''s named after the domain it''s intended for, but
    this name can be arbitrary.


    **4096** This is the size of the private key in bits. A 4096-bit key is longer
    than the more common 2048-bit key, offering higher security at the cost of slightly
    increased computational overhead for encryption and decryption processes.


    (2) ->


    **req**: This option is used to specify that a certificate request is being created.


    **-new** Indicates that this is a new request.


    **-x509** This flag tells OpenSSL to generate a self-signed certificate instead
    of a certificate signing request (CSR).


    **-days 365** Sets the validity period of the certificate to 365 days. After this
    period, the certificate will expire and need to be renewed.


    **-key nginx-clusterip.example.com.key** Specifies the private key to use when
    generating the certificate. This key was created in the first command.


    **-out nginx-clusterip.example.com.crt** Designates the filename for the generated
    certificate.'
  - "[PAGE 373]\n\n-addext \"subjectAltName = DNS:nginx-clusterip.example.com\" This\
