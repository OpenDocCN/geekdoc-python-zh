    The request is sent to the Kubernetes API server, which is the central management
    entity and serves as the gateway to the Kubernetes cluster. Authentication, authorization,
    and admission control processes are performed by the API server to ensure that
    the user is allowed to perform the requested operation.


    Upon passing security checks, the API server queries the cluster''s data store
    (etcd) to retrieve the current state of all pod resources in the cluster or within
    the specified namespace if provided. If you recall, etcd is a consistent and highly-available
    key-value store used by Kubernetes to store all cluster data, including the state
    of all resources.


    The API server processes the data retrieved from etcd, formats it according to
    the request (in this case, a list of pods), and generates a response. The response
    includes details about each pod, such as its name, status, and other metadata.'
