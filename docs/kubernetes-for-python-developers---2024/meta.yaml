    \ as configmaps, especially when you have too many of them. Let's take the flask-redis\
    \ example and inject a few variables as configmaps.\n\n```\napiVersion: v1\nkind:\
    \ ConfigMap\nmetadata:\n  name: flask-config\ndata:\n  DEBUG: \"False\" # (1)\n\
    ```"
  - "[PAGE 232]\n\n```\nREDIS_HOST: \"cache\" # (2)\nPORT: \"8080\" # (3)\n```\n\n\
    (1) -> debug flag turned off. String values, even for Booleans or numbers, are\
