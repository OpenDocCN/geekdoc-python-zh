    \ alpine # (3)\n          command: ['/bin/sh', '-c', 'apk add --no-cache netcat-openbsd\
    \ && /usr/local/bin/check-redis.sh'] # (4)\n          env: # (5)\n           \
    \ - name: REDIS_HOST\n              value: redis-service\n          volumeMounts:\
    \ # (6)\n            - name: redis-check-script\n              mountPath: /usr/local/bin/check-redis.sh\n\
    \              subPath: check-redis.sh\n      containers:\n        - name: flask\n\
    \          image: ghcr.io/badri/flask-redis:1.0\n          env:\n            -\
    \ name: DEBUG\n              valueFrom:\n                configMapKeyRef:\n  \
    \                name: flask-config\n                  key: DEBUG\n          \
    \  - name: PORT\n              valueFrom:\n                configMapKeyRef:\n\
    \                  name: flask-config\n                  key: PORT\n         \
    \   - name: REDIS_HOST\n              valueFrom:\n                configMapKeyRef:\n\
    \                  name: flask-config\n                  key: REDIS_HOST\n   \
    \         - name: REDIS_PASSWORD\n              valueFrom:\n                secretKeyRef:\n\
    \                  name: redis-credentials\n                  key: REDIS_PASSWORD\n\
    \          ports:\n            - containerPort: 8080\n      volumes: # (7)\n \
    \       - name: redis-check-script # (8)\n          configMap:\n            name:\
    \ redis-check # (9)\n            defaultMode: 0755 # (10)\n```"
