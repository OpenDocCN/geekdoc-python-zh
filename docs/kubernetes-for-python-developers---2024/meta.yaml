    \n## 缓存重置\n\n我们发现计数又被重置为 **1**。这个实验展示了容器的短暂性。容器被设计为短暂的，这意味着当容器停止或被删除时，存储在容器文件系统中的任何数据都会丢失。这对于像\
    \ Redis 这样的缓存和存储应用程序来说是一个挑战，因为它们需要在重启和部署之间保留数据。\n\n如果是这样，我们如何使用容器和 Kubernetes\
    \ 来处理任何有状态的应用程序？这就是卷的用武之地。\n\nKubernetes 中的**持久卷 (PV)** 是一种集群级资源，它将存储的提供方式与其使用方式抽象开来。它代表集群中由管理员预配置或使用存储类动态配置的一块存储（我们稍后会看到这个术语的含义）。PV\
    \ 旨在供需要持久存储的应用程序使用，这些存储的生命周期比单个 Pod 更长。\n\n**持久卷声明 (PVC)** 是 Pod 用于请求和消耗 PV 资源的命名空间资源。我们将看到\
    \ PVC 如何让开发者抽象底层存储基础设施的细节，使他们能够专注于应用程序的需求，而不是存储提供方式的具体细节。\n\n但我们有点超前了。让我们首先通过手动创建\
    \ PV 和底层存储来说明对 PVC 和 PV 的需求。\n\nKubernetes 中的持久卷 (PV) 被建模为集群级资源，有几个基本原因，每个原因都符合\
    \ Kubernetes 的设计原则以及在分布式、多租户环境中管理存储的需求。原因如下：\n\n## 抽象与解耦\n\nPV 在底层存储基础设施之上提供了一个抽象层。这种解耦允许开发者和管理员在不需要了解底层存储实现细节（无论是云块存储、NFS、iSCSI\
    \ 等）的情况下使用存储。作为集群级资源，PV 可以独立于使用它们的单个 Pod 和应用程序进行配置、管理和分配，从而促进清晰的关注点分离。\n\n## 共享资源管理\n\
    \n存储通常是集群中的共享资源，可能被多个应用程序和命名空间使用。将 PV 建模为集群级资源符合这一范式，能够对存储资源进行集中管理、分配和回收。这种方法简化了在集群规模上管理存储生命周期和容量的任务，而不是在更细粒度的单个\
    \ Pod 或容器级别上进行管理。\n\n## 动态配置与可移植性\n\nPV 的动态配置允许根据持久卷声明 (PVC) 的需求自动创建存储资源。这个系统级功能要求\
    \ PV 是集群级的，以便有效地将来自不同命名空间的 PVC 与适当的存储资源匹配。此外，PV 提供的抽象通过标准化存储资源的请求和使用方式，增强了应用程序在集群之间的可移植性，无论底层基础设施如何。\n\
    \n## 访问控制与安全\n\nKubernetes 的基于角色的访问控制 (RBAC) 可以应用于作为集群级资源的 PV，从而对谁可以创建、查看或删除 PV\
    \ 进行细粒度控制。这种级别的控制在多租户环境中至关重要，因为不同的团队或用户可能具有不同的访问和权限级别。它确保敏感的存储资源得到充分保护，并且只能由授权实体访问。\n\
    \n## 与其他集群资源的一致性\n\nKubernetes 将其他基础设施组件（如节点和 PersistentVolumeClaims）建模为集群级资源。这种一致性简化了对\
    \ Kubernetes API 的理解和使用，因为相同的交互模式适用于不同类型的资源。它还促进了在集群范围内运行的高级编排和管理工具的开发。\n\n在 DigitalOcean\
    \ Kubernetes 集群中，你可以利用 Digitalocean 块存储 (https://docs.digitalocean.com/glossary/block-storage/)\
    \ 作为应用程序的持久存储解决方案。但在我们从块存储实例创建持久卷之前，我们首先必须创建该实例。\n\n以下是执行此操作的命令：\n\n```\n$ doctl\
    \ compute volume create cache --fs-type ext4 --region blr1 --size 2GiB\nID   \
    \                                 Name   Size  Region Filesystem Type Filesystem\
    \ Label Droplet IDs Tags\nd5716c46-d22a-11ee-b619-0a58ac14b586  cache  2 GiB blr1\
    \   ext4\n```\n\n此命令创建一个名为 **cache** 的块存储，使用 **ext4** 文件系统，大小为 **2GiB**，位于 **blr1**\
    \ 区域（因为我也在那里创建了我的 Kubernetes 集群）。请根据你的区域修改命令。记下创建的卷的唯一 ID。\n\n你可以在 UI 中看到这个新创建的卷。\n\
    \n![](img/91c4bde832e221ba5bc429caf9587286_276_0.png)\n\n*新的块存储卷*\n\n接下来，我们创建一个指向此块存储实例的\
    \ **PersistentVolume** 资源。\n\n```yaml\napiVersion: v1 # (1)\nkind: PersistentVolume\
    \ # (2)\nmetadata:\n  name: cache # (3)\nspec:\n  capacity:\n    storage: 2Gi\
    \ # (4)\n  accessModes:\n    - ReadWriteOnce # (5)\n  persistentVolumeReclaimPolicy:\
    \ Retain # (6)\n  storageClassName: do-block-storage # (7)\n  csi:\n    driver:\
    \ dobs.csi.digitalocean.com # (8)\n    volumeHandle: d5716c46-d22a-11ee-b619-0a58ac14b586\
    \ # (9)\n    fsType: ext4 # (10)\n```\n\n(1) -> 指定 PersistentVolume 资源的 API 版本，**v1**\
    \ 表示它是一个稳定的 API 资源。\n\n(2) -> 将 Kubernetes 资源类型标识为 **PersistentVolume**。\n\n(3)\
    \ -> 将 PersistentVolume 命名为 \"cache\"。**请注意**，此名称是任意的，与我们创建的块存储实例的名称无关。\n\n(4)\
    \ -> 将 PersistentVolume 的存储容量设置为 2GiB。\n\n(5) -> 允许卷以读写方式挂载到单个节点。\n\n**accessModes**\
    \ 字段指定卷如何在节点上挂载以及 Pod 中的容器如何访问该字段。此字段对于确保卷的访问级别与应用程序的需求相匹配，同时遵守底层存储系统的能力至关重要。有四种主要的访问模式：\n\
    \n### ReadWriteOnce (RWO)\n\n描述：卷可以以读写方式挂载到单个节点。用例：适用于需要独占读写访问存储的单 Pod 应用程序，例如数据库或其他不支持数据复制的有状态应用程序。\n\
    \n### ReadOnlyMany (ROX)\n\n描述：卷可以以只读方式挂载到多个节点。用例：适用于需要共享数据而不修改数据的应用程序，例如为 Web\
    \ 应用程序提供静态内容或在多个 Pod 之间共享配置文件。\n\n### ReadWriteMany (RWX)\n\n描述：卷可以以读写方式挂载到多个节点。用例：适用于需要来自不同节点的多个\
    \ Pod 并发读写访问的应用程序，例如协作应用程序、共享工作区或分布式文件系统。\n\n### ReadWriteOncePod (RWOP) (从 Kubernetes\
    \ v1.22 开始可用)\n\n描述：卷可以以读写方式挂载到单个 Pod。此访问模式比 ReadWriteOnce 更严格，因为它将卷限制为单个 Pod，而不仅仅是单个节点。用例：设计用于需要卷被同一\
    \ Pod 中的多个容器访问的用例，确保卷不会被其他 Pod 意外挂载。"
