  md: 'a powerful tool to automate workflows directly from their GitHub repositories.
    By defining workflows for building, testing, and deploying applications, GitHub
    Actions simplifies the process of integrating continuous integration (CI) and
    continuous deployment (CD) practices into the software development lifecycle.


    # Core Components of GitHub Actions


    **Workflows:** A workflow is a configurable automated process composed of one
    or more jobs. Defined in a YAML file within the .github/workflows directory of
    a GitHub repository, workflows are triggered by specific events, such as a push
    to a repository, a pull request creation, or on a scheduled basis. Each workflow
    specifies the actions that should be taken, the environment it runs in, and the
    conditions under which it is triggered.


    **Events:** Events are specific activities that trigger workflows. GitHub Actions
    supports a wide range of events, including code pushes, issue creations, pull
    request events, and even external events via webhooks. Developers can specify
    the events that trigger workflows, making automation highly contextual and responsive
    to the development process.


    **Jobs:** Workflows consist of jobs, which are sets of steps that execute on the
    same runner. Jobs can run sequentially or in parallel, depending on dependencies
    defined within the workflow. Each job runs in a fresh instance of the virtual
    environment specified by the runner.


    **Steps:** Steps are individual tasks that run commands or actions within a job.
    A step can be either a custom script or an action. Actions are reusable units
    of code that can be shared within a repository or with the GitHub community. Developers
    can leverage a vast marketplace of actions to perform common tasks, such as setting
    up a development environment, running tests, or deploying code.'
  merge: -1
  pgno: 388
- img_proc: true
  md: "**Runners:** Runners are GitHub-hosted virtual machines or self-hosted environments\
    \ where workflows are executed. GitHub provides runners with different operating\
    \ systems, including Linux, Windows, and macOS. Developers can also use self-hosted\
    \ runners for specialized environments or to leverage specific hardware.\n\n#\
    \ How GitHub Actions Work\n\nWhen an event occurs in a GitHub repository, such\
    \ as a push to the main branch, GitHub Actions looks for workflow files that are\
    \ triggered by that event. The platform then queues jobs defined in the workflow,\
    \ allocating them to available runners based on the specified operating system\
    \ and environment. Each job executes its steps in sequence, using actions or scripts\
    \ to accomplish tasks like building the application, running tests, or deploying\
    \ to a server.\n\nFeedback and logs from running workflows are available in real\
    \ time, providing visibility into the automation process. If a step fails, the\
    \ workflow can halt, send notifications, or trigger other workflows based on failure\
    \ handling defined in the workflow file.\n\n```\nname: CD # (1)\n\non:\n  push:\n\
    \    branches: [ \"main\" ] # (2)\n\njobs: # (3)\n  build:\n```"
