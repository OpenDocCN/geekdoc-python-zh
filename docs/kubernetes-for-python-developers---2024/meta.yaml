- md: '## Authentication


    TLS supports mutual authentication. The client verifies the server''s identity
    through a digital certificate signed by a trusted certificate authority (CA).
    Optionally, the server can also require clients to present a certificate, verifying
    the client''s identity. This mutual authentication ensures that both parties are
    who they claim to be, reducing the risk of man-in-the-middle attacks. Basic authentication
    only provides one-way authentication, where the server''s identity isn''t verified
    by the client, making it more susceptible to impersonation attacks.


    ## Integrity


    TLS ensures the integrity of the transmitted data through cryptographic message
    digests. This means that any tampering with the data during transit can be detected,
    ensuring that the data received is exactly what was sent. Basic authentication
    does not provide this level of integrity checking, making transmitted data vulnerable
    to unauthorized modifications.


    ## Revocation and Expiry


    Certificates used in TLS can be revoked or set to expire after a certain period,
    allowing for better management of access and security. If a certificate is compromised,
    it can be revoked to prevent further misuse. Expiring certificates force periodic
    renewal, ensuring that authentication mechanisms are regularly updated. Basic
    authentication lacks this mechanism, making it harder to manage credentials securely
    over time.


    ## Compliance and Standards


    Many regulations and security standards require the use of TLS for securing communications
    because of its comprehensive security features. Relying on basic authentication
    without encryption does not meet these security standards and can result in non-compliance
    with data protection regulations.


    ## Interact with your cluster


    The way to connect to your cluster is to download the kubeconfig and point the
    **KUBECONFIG** environment variable to the absolute path of the downloaded kubeconfig
    file.


    ```

    $ export KUBECONFIG=~/k8s-for-devs/kubeconfig.first-cluster

    ```


    After this, you can run your **kubectl** commands.


    ## A word about kubernetes versions


    At the time of writing this, the latest stable version of Kubernetes is 1.29.
    Kubernetes versions are expressed as x.y.z, where x is the major version, y is
    the minor version, and z is the patch version, following Semantic Versioning terminology.


    The Kubernetes project maintains release branches for the most recent three minor
    releases, ex: 1.29, 1.28 and 1.27 in our case. It is not mandatory to upgrade/downgrade
    kubectl to use a newer/older version of Kubernetes.


    ## Your first interaction with Kubernetes


    Assuming you''ve set your **KUBECONFIG** environment variable, run a command to
    get all the nodes in your cluster.


    ```

    $ kubectl get nodes

    NAME                       STATUS   ROLES    AGE   VERSION

    first-cluster-default-pool-oeo85   Ready    <none>   6m32s   v1.29.1

    first-cluster-default-pool-oeo8k   Ready    <none>   6m39s   v1.29.1

    first-cluster-default-pool-oeo8s   Ready    <none>   6m42s   v1.29.1

    ```


    The **NAME** column shows the name of each node in the 3-node cluster. The **STATUS**
    shows that the nodes are in a **Ready** state. Let''s ignore the **ROLES** for
    now. **AGE** is the time elapsed since the nodes were created. The final column
    **VERSION** shows the Kubernetes version running in the nodes.


    ## Pods


    Pods are the smallest deployable units in Kubernetes, encapsulate one or more
    containers that share storage, network, and specifications on how to run the containers.
    We will breakdown that sentence in a bit. Just imagine for now that a pod is a
    collection of 1 or more containers which can be deployed in a Kubernetes cluster.


    Why are pods, rather than individual containers, considered the smallest deployable
    units? This design decision is based on a few key considerations that enhance
    the platform''s ability to manage applications in a distributed and scalable manner.
    Here''s why pods play such a crucial role in Kubernetes architecture:


    ### Grouping Containers


    Pods allow multiple containers to be grouped into a single deployable entity.
    This is particularly useful for applications that involve closely related containers
    that need to work together, share resources, or be managed as a single unit. For
    example, a main application container might run alongside a sidecar container
    that handles logging or monitoring. By grouping these containers within a single
    pod, Kubernetes can manage their deployment, scaling, and networking as a unified
    entity.


    ### Sharing Resources and Networking


    Containers within a pod share the same network namespace, meaning they share an
    IP address, port space, and can communicate with each other using localhost. This
    simplifies inter-container communication and resource sharing, such as disk volumes,
    which can be mounted into multiple containers within the same pod. This shared
    context is crucial for applications designed to work as a cohesive unit where
    tight coupling and efficient communication between components are required.


    ### Simplifying Management and Communication


    By treating pods as the smallest deployable units, Kubernetes simplifies application
    deployment and management. Pods serve as a single point of management for Kubernetes,
    where operations like scaling, networking, and lifecycle management are applied
    to the pod as a whole rather than to individual containers. This approach streamlines
    the deployment process and makes it easier to ensure that related containers are
    scheduled on the same host, improving performance and reducing complexity.


    ### Enabling Fine-grained Control


    Pods provide a level of abstraction that allows developers to specify how their
    applications should run and interact with other components of the system. This
    includes specifying resource requests and limits on a per-pod basis, which helps
    Kubernetes make intelligent scheduling decisions to optimize resource utilization
    across the cluster.


    ### Facilitating Service Discovery and Load Balancing


    Kubernetes uses pods to facilitate service discovery and load balancing. When
    a service is created in Kubernetes, it logically groups pods that provide the
    same functionality and automatically manages access to them through a single DNS
    name or IP address. This decouples the front-end access to an application from
    the individual instances of the containers running the application, enabling seamless
    scaling and management.


    In summary, pods are not just a grouping mechanism for containers; they are a
    fundamental unit of deployment in Kubernetes that encapsulate the application''s
    runtime environment, simplify resource sharing, and enhance the platform''s ability
    to efficiently manage, scale, and maintain applications in a distributed computing
    environment.


    ## Run a simple pod


    Let''s create and run a simple Nginx pod.


    ```

    $ kubectl run nginx --image=nginx

    pod/nginx created

    ```


    The **run** subcommand creates and runs a particular resource. In our case, it
    happens to be a standalone pod.


    The **nginx** parameter is the name of the pod which gets created.


    The **--image=nginx** This option specifies the container image to use for the
    pod. In this case, it''s using the official Nginx image from Docker Hub. Kubernetes
    will pull this image from the container registry (Docker Hub) if it''s not already
    available on the node.


    Let''s check the pod we just created.


    ```

    $ kubectl get pod

    NAME   READY   STATUS    RESTARTS   AGE

    nginx  1/1     Running   0          26s

    ```


    The "get" tells kubectl to fetch a resource, of type "pod".


    The **NAME** column shows the name of the pod. The **READY** column indicates
    the containers are ready (i.e. up and running). The number **1/1** says that out
    of 1 containers in the pod, 1 is/are in "Ready" state. The convention **X/Y**
    means that out of Y containers in a pod, X are running successfully. For a healthy
    state, X and Y should be the same.


    The **STATUS** column indicates the status of the pod, i.e. they are in a "Running"
    state. More about pod states below. **RESTARTS** is the number of times the pod
    has been restarted. In our case it is 0, which is good. The **AGE** column shows
    the age of the pod (duh!).


    Although it is simple and easy to create resources in our cluster from the command-line
    directly, we usually don''t do so. We use YAML to describe various specs of the
    pod, and *apply* that YAML manifest in our cluster.'
  mdcn: '## 身份验证


    TLS 支持双向身份验证。客户端通过受信任的证书颁发机构（CA）签发的数字证书来验证服务器的身份。此外，服务器也可以选择要求客户端出示证书，以验证客户端的身份。这种双向身份验证确保了通信双方都是其声称的身份，从而降低了中间人攻击的风险。基本身份验证仅提供单向认证，客户端不会验证服务器的身份，因此更容易受到冒充攻击。


    ## 完整性


    TLS 通过加密消息摘要确保传输数据的完整性。这意味着在传输过程中对数据的任何篡改都能被检测到，确保接收到的数据与发送的数据完全一致。基本身份验证不提供这种级别的完整性检查，使得传输的数据容易受到未授权的修改。


    ## 吊销与过期


    TLS 中使用的证书可以被吊销或设置为在一定期限后过期，从而实现对访问和安全性的更好管理。如果证书被泄露，可以将其吊销以防止进一步滥用。证书过期会强制定期更新，确保身份验证机制得到定期更新。基本身份验证缺乏这种机制，使得凭证的安全管理随时间推移变得更加困难。


    ## 合规性与标准


    许多法规和安全标准要求使用 TLS 来保护通信安全，因为它具有全面的安全特性。依赖未加密的基本身份验证不符合这些安全标准，并可能导致违反数据保护法规。


    ## 与集群交互


    连接到集群的方法是下载 kubeconfig 文件，并将 **KUBECONFIG** 环境变量指向下载的 kubeconfig 文件的绝对路径。


    ```

    $ export KUBECONFIG=~/k8s-for-devs/kubeconfig.first-cluster

    ```


    之后，你就可以运行 **kubectl** 命令了。


    ## 关于 Kubernetes 版本的说明


    在撰写本文时，Kubernetes 的最新稳定版本是 1.29。Kubernetes 版本采用 x.y.z 的格式表示，其中 x 是主版本号，y 是次版本号，z
    是补丁版本号，遵循语义化版本控制术语。


    Kubernetes 项目为最近三个次版本维护发布分支，例如在我们的案例中是 1.29、1.28 和 1.27。使用较新或较旧版本的 Kubernetes
    并不强制要求升级或降级 kubectl。


    ## 与 Kubernetes 的首次交互


    假设你已经设置了 **KUBECONFIG** 环境变量，运行一个命令来获取集群中的所有节点。


    ```

    $ kubectl get nodes

    NAME                       STATUS   ROLES    AGE   VERSION

    first-cluster-default-pool-oeo85   Ready    <none>   6m32s   v1.29.1

    first-cluster-default-pool-oeo8k   Ready    <none>   6m39s   v1.29.1

    first-cluster-default-pool-oeo8s   Ready    <none>   6m42s   v1.29.1

    ```


    **NAME** 列显示了 3 节点集群中每个节点的名称。**STATUS** 列显示节点处于 **Ready** 状态。我们暂时忽略 **ROLES**
    列。**AGE** 列是节点创建以来经过的时间。最后一列 **VERSION** 显示了节点上运行的 Kubernetes 版本。


    ## Pod


    Pod 是 Kubernetes 中最小的可部署单元，它封装了一个或多个共享存储、网络以及如何运行容器规范的容器。我们稍后会详细分解这句话。现在，你可以将
    Pod 想象成一个包含 1 个或多个容器的集合，可以在 Kubernetes 集群中部署。


    为什么 Pod 而不是单个容器被视为最小的可部署单元？这一设计决策基于几个关键考虑，这些考虑增强了平台以分布式和可扩展方式管理应用程序的能力。以下是 Pod
    在 Kubernetes 架构中扮演如此关键角色的原因：


    ### 容器分组


    Pod 允许将多个容器分组到一个可部署的实体中。这对于涉及需要协同工作、共享资源或作为单个单元进行管理的紧密相关容器的应用程序特别有用。例如，一个主应用程序容器可能与一个处理日志记录或监控的
    sidecar 容器一起运行。通过将这些容器分组在单个 Pod 中，Kubernetes 可以将它们的部署、扩展和网络作为一个统一的实体来管理。


    ### 共享资源和网络


    Pod 内的容器共享相同的网络命名空间，这意味着它们共享一个 IP 地址、端口空间，并且可以使用 localhost 相互通信。这简化了容器间通信和资源共享，例如磁盘卷可以挂载到同一
    Pod 内的多个容器中。这种共享上下文对于设计为作为一个内聚单元工作的应用程序至关重要，这些应用程序需要组件之间的紧密耦合和高效通信。


    ### 简化管理和通信


    通过将 Pod 视为最小的可部署单元，Kubernetes 简化了应用程序的部署和管理。Pod 是 Kubernetes 的单一管理点，扩展、网络和生命周期管理等操作应用于整个
    Pod，而不是单个容器。这种方法简化了部署过程，并更容易确保相关容器被调度到同一主机上，从而提高性能并降低复杂性。


    ### 实现细粒度控制


    Pod 提供了一种抽象级别，允许开发人员指定其应用程序应如何运行以及如何与系统的其他组件交互。这包括在每个 Pod 的基础上指定资源请求和限制，这有助于 Kubernetes
    做出智能的调度决策，以优化整个集群的资源利用率。


    ### 促进服务发现和负载均衡


    Kubernetes 使用 Pod 来促进服务发现和负载均衡。当在 Kubernetes 中创建一个服务时，它会在逻辑上将提供相同功能的 Pod 分组，并通过单个
    DNS 名称或 IP 地址自动管理对它们的访问。这将应用程序的前端访问与运行应用程序的容器的单个实例解耦，从而实现无缝的扩展和管理。


    总之，Pod 不仅仅是容器的分组机制；它们是 Kubernetes 中部署的基本单元，封装了应用程序的运行时环境，简化了资源共享，并增强了平台在分布式计算环境中高效管理、扩展和维护应用程序的能力。


    ## 运行一个简单的 Pod


    让我们创建并运行一个简单的 Nginx Pod。


    ```

    $ kubectl run nginx --image=nginx

    pod/nginx created

    ```


    **run** 子命令创建并运行一个特定的资源。在我们的例子中，它恰好是一个独立的 Pod。


    **nginx** 参数是创建的 Pod 的名称。


    **--image=nginx** 此选项指定用于 Pod 的容器镜像。在这种情况下，它使用的是来自 Docker Hub 的官方 Nginx 镜像。如果该镜像在节点上尚不可用，Kubernetes
    将从容器注册表（Docker Hub）拉取此镜像。


    让我们检查一下我们刚刚创建的 Pod。


    ```

    $ kubectl get pod

    NAME   READY   STATUS    RESTARTS   AGE

    nginx  1/1     Running   0          26s

    ```


    "get" 告诉 kubectl 获取一个资源，类型为 "pod"。


    **NAME** 列显示 Pod 的名称。**READY** 列指示容器已就绪（即已启动并正在运行）。数字 **1/1** 表示 Pod 中的 1 个容器中有
    1 个处于 "Ready" 状态。约定 **X/Y** 表示 Pod 中的 Y 个容器中有 X 个正在成功运行。对于健康状态，X 和 Y 应该相同。


    **STATUS** 列指示 Pod 的状态，即它们处于 "Running" 状态。关于 Pod 状态的更多信息见下文。**RESTARTS** 是 Pod
    被重启的次数。在我们的例子中是 0，这是好的。**AGE** 列显示 Pod 的年龄（废话！）。


    虽然直接从命令行在集群中创建资源既简单又容易，但我们通常不会这样做。我们使用 YAML 来描述 Pod 的各种规范，并将该 YAML 清单 *应用* 到我们的集群中。'
