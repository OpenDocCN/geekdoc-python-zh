- img_proc: true
  md: '# Why We Need Namespaces


    # Environment Separation


    Namespaces are often used to separate different environments within the same cluster,
    such as development, staging, and production, which might otherwise interfere
    with each other.


    # Resource Organization


    They help in organizing and categorizing resources within a Kubernetes cluster.
    This is particularly useful in larger clusters with resources deployed for multiple
    projects or teams.


    # Access Control


    Kubernetes uses namespaces in conjunction with Role-Based Access Control (RBAC)
    to control who has access to specific resources within the cluster. This allows
    administrators to restrict user permissions to the least privileges needed for
    their role.


    # Quota Management


    Administrators can apply resource quotas to namespaces, limiting the amount of
    resources (CPU, memory, etc.) that can be consumed by the resources within a specific
    namespace. This helps in managing and allocating cluster resources efficiently
    among multiple users or teams.


    # Creating our first namespace


    To create a new namespace named **development**, you would use the following command:


    ```

    $ kubectl create namespace development

    ```'
