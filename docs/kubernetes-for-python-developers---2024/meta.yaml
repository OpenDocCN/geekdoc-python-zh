    \  1/1     Running   0          29s\n```\n\n```bash\n$ kubectl apply -f deployment-2.yaml\n\
    deployment.apps/nginx-deployment configured\n```\n\n# 几秒钟后 ..\n\n```bash\n$ kubectl\
