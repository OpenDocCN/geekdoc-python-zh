    # Appendix A: Troubleshooting common scenarios


    When working with Kubernetes, encountering issues during the deployment and operation
    of applications is common. Understanding how to effectively troubleshoot these
    scenarios is crucial for maintaining the health and availability of your services.
    This appendix delves into common troubleshooting scenarios, providing insights
    into why these issues happen, how to diagnose them, and strategies for resolution.
    By equipping yourself with these troubleshooting skills, you can ensure your Kubernetes
    applications run smoothly and efficiently.


    # Pod Not Coming Up


    # Why It Happens


    Pods may fail to start due to configuration errors, insufficient resources, image
    issues, or security constraints.


    # Diagnosis


    Use `kubectl describe pod <pod-name>` to inspect events and statuses related to
    the pod. Check for errors like `ImagePullBackOff`, `CrashLoopBackOff`, or resource
    limits.


    # Fix


    Ensure the pod''s configuration is correct, including image names, resource requests,
    and limits. Adjust configurations or resource quotas as necessary.'
  - '[PAGE 400]


    # Image Not Found


    # Why It Happens


    This error occurs when Kubernetes cannot pull the container image, possibly due
    to incorrect image names, tags, or registry access issues.


    # Diagnosis


    Check the pod description for **ImagePullBackOff** or **ErrImagePull** statuses.
    Ensure the image name and tag are correct and that the registry is accessible.


    # Fix


    Correct the image name/tag in your deployment configuration. For private registries,
    ensure image pull secrets are correctly configured.


    # Incorrect Labels


    # Why It Happens


    Labels are key-value pairs used to organize and select subsets of objects. Incorrect
    or missing labels can disrupt service discovery or pod selection.


    # Diagnosis


    Use **kubectl get pods --show-labels** to list pods and their labels. Verify they
    match your intended selectors.'
  - '[PAGE 401]


    # Fix


    Update your deployment or pod manifest with the correct labels and reapply the
    configuration.


    # Not Exposing the Correct Port


    # Why It Happens


    Services route traffic to pods based on port numbers. If a pod doesn''t expose
    the expected port, it can lead to connectivity issues.


    # Diagnosis


    Inspect the pod and service configurations to ensure the ports match.


    # Fix


    Update the pod''s container spec to expose the correct port and ensure the service
    targets this port.


    # Not Enough Resources


    # Why It Happens


    Pods may not start if the node lacks sufficient CPU or memory resources, often
    indicated by **Pending** status due to unschedulable conditions.


    # Diagnosis


    Use `kubectl describe pod <pod-name>` to check for events indicating insufficient
    resources.'
  - '[PAGE 402]


    # Fix


    Adjust the pod''s resource requests and limits, or scale your cluster to add more
    resources.


    # Different Image Architecture


    # Why It Happens


    This issue arises when the container image''s architecture does not match the
    node''s architecture, for example, running an ARM image on an x86 node. Check
    the pod logs for **exec format error**.


    # Diagnosis


    Inspect pod logs or describe the pod to identify architecture mismatch errors.


    # Fix


    Use a multi-architecture image or ensure the image architecture matches your nodes.


    # CRD Not Found


    # Why It Happens


    Custom Resource Definitions (CRDs) extend Kubernetes API. If a CRD is missing,
    resources dependent on it cannot be created.


    # Diagnosis


    Check for errors indicating missing CRDs in application logs or during deployment.'
- md: "## Fix\n\nApply the missing CRD definitions to your cluster before deploying\
    \ resources that depend on them.\n\n## Unauthorized\n\n### Why It Happens\n\n\
    Pods or operators may attempt to perform actions without appropriate permissions,\
    \ leading to authorization errors.\n\n### Diagnosis\n\nReview logs for authorization-related\
    \ errors, indicating denied actions.\n\n### Fix\n\nAdjust Role-Based Access Control\
    \ (RBAC) settings, ensuring that service accounts have the necessary permissions\
    \ for the required actions.\n\n## Conclusion\n\nTroubleshooting in Kubernetes\
    \ requires a methodical approach to diagnose and resolve issues effectively. By\
    \ understanding common scenarios and their resolutions, developers and operators\
    \ can minimize downtime and ensure the stability of their applications. Always\
    \ start with gathering information using kubectl commands, review configurations\
    \ for common errors, and apply best practices for Kubernetes application deployment\
    \ and management.\n\n## Appendix B: Solutions to exercises\n\n### Exercise 1:\
    \ configure gunicorn\n\nFlask apps in production run gunicorn. Configure your\
    \ entrypoint to run gunicorn.\n\n**Solution**\n\n2 changes need to be done. Add\
    \ the gunicorn library to **requirements.txt**.\n\nWe change the **entrypoint.sh**\
    \ script to run Gunicorn instead.\n\n```\nexec gunicorn -b 0.0.0.0:$PORT app:app\n\
    ```\n\n### Exercise 2: Setup live-reloading\n\nChange the docker-compose config\
    \ such that it allows for live-reloading during development. This ensures that\
    \ changes to the source code on the host are reflected inside the container without\
    \ rebooting it.\n\n**Solution**\n\nNeed to add the –reload flag to the flask command\
    \ in **entrypoint.sh**.\n\n```\nexec flask run -h 0.0.0.0 -p $PORT –reload\n```\n\
    \nMount the source code as a volume in the container in **docker-compose.yml**\n\
    \n**services:**\n\n```\nflask-app:\n  image: flask-redis:1.0\n  ports:\n    -\
    \ \"8080:${PORT}\"\n  environment:\n    - PORT=8080\n    - REDIS_HOST=cache\n\
    \    - REDIS_PASSWORD=SuperS3cret\n  depends_on:\n    - cache\n  volumes:\n  \
    \  - ./:/code # <--\n```\n\n### Exercise 3: Configure Nginx\n\nProduction Flask\
    \ apps don't serve the application using **flask run**. They either use gunicorn\
    \ or proxy it using a web server like Nginx. Instead of serving from the default\
    \ Flask run command, proxy it using an Nginx container. Make necessary changes\
    \ to the docker-compose file.\n\n**Solution**\n\nDon't expose the flask port outside.\
    \ Add a new nginx container and mount a custom **nginx.conf** to proxy it on behalf\
    \ of Flask.\n\nStructure of **docker-compose.yml**\n\n```\nversion: '3'\n\nservices:\n\
    \n  flask-app:\n\n    image: flask-redis:1.0\n\n    expose:\n\n      - \"8080\"\
    \n\n    environment:\n\n      - PORT=8080\n\n      - REDIS_HOST=cache\n\n    \
    \  - REDIS_PASSWORD=SuperS3cret\n\n    depends_on:\n\n      - cache\n\ncache:\n\
    \  image: \"bitnami/redis:7.2.4\"\n  environment:\n    - REDIS_PASSWORD=SuperS3cret\n\
    \  ports:\n    - \"6379:6379\"\n\nnginx:\n  image: nginx:alpine\n  ports:\n  \
    \  - \"8080:80\"\n  volumes:\n    - ./nginx.conf:/etc/nginx/conf.d/default.conf\n\
    \  depends_on:\n    - flask-app\n```\n\nnginx.conf file.\n\n```\nserver {\n  \
    \  listen 80;\n    server_name localhost;\n\n    location / {\n        proxy_pass\
    \ http://flask-app:8080;\n        proxy_set_header Host $host;\n        proxy_set_header\
    \ X-Real-IP $remote_addr;\n        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;\n\
    \        proxy_set_header X-Forwarded-Proto $scheme;\n    }\n}\n```\n\n### Exercise\
    \ 4: Build and push a new tag in Ghcr.\n\nMake arbitrary changes to your code,\
    \ build it and push a new tag to Github registry.\n\n**Solution**\n\nMake changes\
    \ to your application code as needed.\n\nBuild the new Docker image with a new\
    \ tag. If your GitHub username is your-username and your application is named\
    \ my-flask-app, you would use:\n\n```\ndocker build -t ghcr.io/your-username/my-flask-app:new-tag\
    \ .\n```\n\nPush the new tag to GHCR. You'll need to authenticate with GHCR using\
    \ a personal access token with package read/write permissions if you haven't already.\n\
    \n```\necho $CR_PAT | docker login ghcr.io -u your-username --password-stdin\n\
    docker push ghcr.io/your-username/my-flask-app:new-tag\n```\n\n### Exercise 5:\
    \ Change the pod spec and re-apply\n\nChange the name of the nginx container in\
    \ the pod spec YAML and run `kubectl apply` again.\n\n**Solution**\n\n```\napiVersion:\
    \ v1\nkind: Pod\nmetadata:\n  labels:\n    run: nginx\n  name: nginx\nspec:\n\
    \  containers:\n  - image: nginx\n    name: a-new-name\n```\n\n### Exercise 6:\
    \ Change the name of the pod\n\nTry changing the name of the pod from `nginx`\
    \ to `webapp` in the pod spec YAML's metadata and run `kubectl apply`.\n\n**Solution**\n\
    \n```\napiVersion: v1\nkind: Pod\nmetadata:\n  labels:\n    run: nginx\n  name:\
    \ webapp\nspec:\n  containers:\n  - image: nginx\n    name: nginx\n```\n\n###\
    \ Exercise 7: run Apache httpd server\n\nSimilar to Nginx, run Apache httpd server\
    \ as a pod with the name \"httpd\", with label **app=webserver**.\n\n**Solution**\n\
    \n```\napiVersion: v1\nkind: Pod\nmetadata:\n  labels:\n    app: webserver\n \
    \ name: httpd\nspec:\n  containers:\n  - image: httpd\n    name: apache\n```\n\
    \n### Exercise 8: Configure sleepy pod not to crash\n\nFix the configuration of\
    \ the bash-sleep container in such a way that the pod does not go down.\n\n**Solution**\n\
    \n```\napiVersion: v1\nkind: Pod\nmetadata:\n  name: bash-sleep\nspec:\n  containers:\n\
    \  - name: sleepy-app\n    image: bash\n    command: [\"bash\", \"-c\", \"sleep\
    \ infinity\"]\n```\n\n### Exercise 9: Describe the bash-sleep pod.\n\nYou can\
    \ run describe even on crashing pods. You'll learn later in the Troubleshooting\
    \ chapter that you should especially run describe on crashing pods. Try to make\
    \ sense and infer what information kubectl gives you about this pod.\n\n**Solution**\n\
    \n```\n$ kubectl describe bash-sleep\n```\n\n### Exercise 10: Run 3 containers\
    \ in a pod.\n\nUse the same spec as the previous section, add another container\
    \ and run it as,\n\n- a. same pod by updating the pod spec above\n- b. different\
    \ pod by creating a new pod spec\n\nTry to understand what is the difference between\
    \ tasks (a) and (b).\n\n**Solution**\n\nFor (a), you have to edit the pod spec\
    \ as follows,\n\n```\napiVersion: v1\n\nkind: Pod\n\nmetadata:\n\n  name: two-containers-better\n\
    \n  labels:\n\n    purpose: demonstrate-multi-container\n\nspec:\n  containers:\n\
    \    - name: nginx-container-1\n      image: bitnami/nginx\n      env:\n     \
    \   - name: NGINX_HTTP_PORT_NUMBER\n          value: \"8080\"\n      ports:\n\
    \        - containerPort: 8080\n    - name: nginx-container-2\n      image: bitnami/nginx\n\
    \      env:\n        - name: NGINX_HTTP_PORT_NUMBER\n          value: \"8081\"\
    \n      ports:\n        - containerPort: 8081\n    - name: nginx-container-3\n\
    \      image: bitnami/nginx\n      env:\n        - name: NGINX_HTTP_PORT_NUMBER\n\
    \          value: \"8082\"\n      ports:\n        - containerPort: 8082\n```\n\
    \nAnd **kubectl apply** this.\n\nFor (b), you have to create a new pod spec file\
    \ with a new pod name and run **kubectl create**.\n\nThe kubectl create and kubectl\
    \ apply commands are both used to create resources in a Kubernetes cluster, but\
    \ they are designed for slightly different purposes and have different behaviors.\n\
    \nWhen you use kubectl create, it expects that the resources do not already exist\
    \ in the cluster. If a resource with the same name already exists, the command\
    \ will fail with an error.\n\nkubectl apply can create resources if they do not\
    \ exist, or update them if they do. It does this by keeping track of the previous\
    \ configuration you applied in an annotation. This allows kubectl apply to calculate\
    \ the difference (delta) between the last applied configuration and the new desired\
    \ configuration you provide and apply just those changes.\n\n### Exercise 11:\
    \ 2 containers twisted variation\n\nRun 2 containers in a pod again. But 1 will\
    \ be nginx, the other will be a bash container which runs \"sleep 5\" and kills\
    \ after that. Will the pod crash? If yes, how will you fix it without changing\
    \ the image of the bash container?\n\n**Solution**\n\nThe pod will crash even\
    \ if one of the containers have a process which gets killed. In this case, the\
    \ bash sleep container will shut down after 5 seconds, indicating to the kubelet\
    \ that the pod in question needs to be restarted, resulting in an endless **CrashloopBackoff**\
    \ situation. Add a **sleep infinity** instead to the bash container.\n\n### Exercise\
    \ 12: Port forward in 8008\n\nTry port forwarding the same pod in your host machine's\
    \ 8008 port.\n\n**Solution**\n\n```\n$ kubectl port-forward pod/nginx 8008:80\n\
    ```\n\n### Exercise 13: Port forward multiple containers\n\nTake the 2-pod Bitnami\
    \ nginx setup. Port forward 8080 nginx in localhost's 8080 and 8081 nginx container"
  mdcn: "## 修复\n\n在部署依赖于它们的资源之前，请将缺失的 CRD 定义应用到您的集群。\n\n## 未授权\n\n### 为何发生\n\nPod\
    \ 或操作员可能尝试在没有适当权限的情况下执行操作，从而导致授权错误。\n\n### 诊断\n\n检查日志中的授权相关错误，这些错误表明操作被拒绝。\n\n\
    ### 修复\n\n调整基于角色的访问控制（RBAC）设置，确保服务账户拥有执行所需操作的必要权限。\n\n## 结论\n\n在 Kubernetes 中进行故障排除需要采用系统化的方法来有效诊断和解决问题。通过理解常见场景及其解决方案，开发人员和运维人员可以最大限度地减少停机时间并确保应用程序的稳定性。始终从使用\
    \ kubectl 命令收集信息开始，检查配置中的常见错误，并应用 Kubernetes 应用程序部署和管理的最佳实践。\n\n## 附录 B：练习解答\n\
    \n### 练习 1：配置 gunicorn\n\n生产环境中的 Flask 应用运行 gunicorn。配置您的入口点以运行 gunicorn。\n\n\
    **解答**\n\n需要进行两项更改。将 gunicorn 库添加到 **requirements.txt**。\n\n我们修改 **entrypoint.sh**\
    \ 脚本以运行 Gunicorn。\n\n```\nexec gunicorn -b 0.0.0.0:$PORT app:app\n```\n\n### 练习\
    \ 2：设置实时重载\n\n更改 docker-compose 配置，使其在开发期间允许实时重载。这确保了主机上源代码的更改无需重启容器即可在容器内反映出来。\n\
    \n**解答**\n\n需要在 **entrypoint.sh** 中的 flask 命令添加 –reload 标志。\n\n```\nexec flask\
    \ run -h 0.0.0.0 -p $PORT –reload\n```\n\n在 **docker-compose.yml** 中将源代码作为卷挂载到容器中\n\
    \n**services:**\n\n```\nflask-app:\n  image: flask-redis:1.0\n  ports:\n    -\
    \ \"8080:${PORT}\"\n  environment:\n    - PORT=8080\n    - REDIS_HOST=cache\n\
    \    - REDIS_PASSWORD=SuperS3cret\n  depends_on:\n    - cache\n  volumes:\n  \
    \  - ./:/code # <--\n```\n\n### 练习 3：配置 Nginx\n\n生产环境的 Flask 应用不使用 **flask run**\
    \ 来提供应用程序服务。它们要么使用 gunicorn，要么使用像 Nginx 这样的 Web 服务器进行代理。不要使用默认的 Flask run 命令提供服务，而是使用\
    \ Nginx 容器进行代理。对 docker-compose 文件进行必要的更改。\n\n**解答**\n\n不要将 flask 端口暴露到外部。添加一个新的\
    \ nginx 容器，并挂载一个自定义的 **nginx.conf** 来代表 Flask 进行代理。\n\n**docker-compose.yml**\
    \ 的结构\n\n```\nversion: '3'\n\nservices:\n\n  flask-app:\n\n    image: flask-redis:1.0\n\
    \n    expose:\n\n      - \"8080\"\n\n    environment:\n\n      - PORT=8080\n\n\
    \      - REDIS_HOST=cache\n\n      - REDIS_PASSWORD=SuperS3cret\n\n    depends_on:\n\
    \n      - cache\n\ncache:\n  image: \"bitnami/redis:7.2.4\"\n  environment:\n\
    \    - REDIS_PASSWORD=SuperS3cret\n  ports:\n    - \"6379:6379\"\n\nnginx:\n \
    \ image: nginx:alpine\n  ports:\n    - \"8080:80\"\n  volumes:\n    - ./nginx.conf:/etc/nginx/conf.d/default.conf\n\
    \  depends_on:\n    - flask-app\n```\n\nnginx.conf 文件。\n\n```\nserver {\n    listen\
    \ 80;\n    server_name localhost;\n\n    location / {\n        proxy_pass http://flask-app:8080;\n\
    \        proxy_set_header Host $host;\n        proxy_set_header X-Real-IP $remote_addr;\n\
    \        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;\n      \
    \  proxy_set_header X-Forwarded-Proto $scheme;\n    }\n}\n```\n\n### 练习 4：在 Ghcr\
    \ 中构建并推送新标签。\n\n对您的代码进行任意更改，构建它并将新标签推送到 Github 注册表。\n\n**解答**\n\n根据需要对您的应用程序代码进行更改。\n\
    \n使用新标签构建新的 Docker 镜像。如果您的 GitHub 用户名是 your-username，您的应用程序名为 my-flask-app，您将使用：\n\
    \n```\ndocker build -t ghcr.io/your-username/my-flask-app:new-tag .\n```\n\n将新标签推送到\
    \ GHCR。如果您尚未进行身份验证，您需要使用具有包读/写权限的个人访问令牌对 GHCR 进行身份验证。\n\n```\necho $CR_PAT | docker\
    \ login ghcr.io -u your-username --password-stdin\ndocker push ghcr.io/your-username/my-flask-app:new-tag\n\
    ```\n\n### 练习 5：更改 Pod 规范并重新应用\n\n更改 Pod 规范 YAML 中 nginx 容器的名称，然后再次运行 `kubectl\
    \ apply`。\n\n**解答**\n\n```\napiVersion: v1\nkind: Pod\nmetadata:\n  labels:\n\
    \    run: nginx\n  name: nginx\nspec:\n  containers:\n  - image: nginx\n    name:\
    \ a-new-name\n```\n\n### 练习 6：更改 Pod 的名称\n\n尝试在 Pod 规范 YAML 的 metadata 中将 Pod\
    \ 的名称从 `nginx` 更改为 `webapp`，然后运行 `kubectl apply`。\n\n**解答**\n\n```\napiVersion:\
    \ v1\nkind: Pod\nmetadata:\n  labels:\n    run: nginx\n  name: webapp\nspec:\n\
    \  containers:\n  - image: nginx\n    name: nginx\n```\n\n### 练习 7：运行 Apache httpd\
    \ 服务器\n\n与 Nginx 类似，运行 Apache httpd 服务器作为名为 \"httpd\" 的 Pod，标签为 **app=webserver**。\n\
    \n**解答**\n\n```\napiVersion: v1\nkind: Pod\nmetadata:\n  labels:\n    app: webserver\n\
    \  name: httpd\nspec:\n  containers:\n  - image: httpd\n    name: apache\n```\n\
    \n### 练习 8：配置 sleep pod 使其不崩溃\n\n修复 bash-sleep 容器的配置，使 Pod 不会宕机。\n\n**解答**\n\n\
    ```\napiVersion: v1\nkind: Pod\nmetadata:\n  name: bash-sleep\nspec:\n  containers:\n\
    \  - name: sleepy-app\n    image: bash\n    command: [\"bash\", \"-c\", \"sleep\
    \ infinity\"]\n```\n\n### 练习 9：描述 bash-sleep Pod。\n\n您甚至可以在崩溃的 Pod 上运行 describe。您将在后面的故障排除章节中了解到，您应该特别在崩溃的\
    \ Pod 上运行 describe。尝试理解并推断 kubectl 关于此 Pod 给出的信息。\n\n**解答**\n\n```\n$ kubectl\
    \ describe bash-sleep\n```\n\n### 练习 10：在 Pod 中运行 3 个容器。\n\n使用与上一节相同的规范，添加另一个容器并将其运行为：\n\
    \n- a. 通过更新上面的 Pod 规范在同一个 Pod 中\n- b. 通过创建新的 Pod 规范在不同的 Pod 中\n\n尝试理解任务 (a) 和\
    \ (b) 之间的区别。\n\n**解答**\n\n对于 (a)，您必须如下编辑 Pod 规范，\n\n```\napiVersion: v1\n\nkind:\
    \ Pod\n\nmetadata:\n\n  name: two-containers-better\n\n  labels:\n\n    purpose:\
    \ demonstrate-multi-container\n\nspec:\n  containers:\n    - name: nginx-container-1\n\
    \      image: bitnami/nginx\n      env:\n        - name: NGINX_HTTP_PORT_NUMBER\n\
    \          value: \"8080\"\n      ports:\n        - containerPort: 8080\n    -\
    \ name: nginx-container-2\n      image: bitnami/nginx\n      env:\n        - name:\
    \ NGINX_HTTP_PORT_NUMBER\n          value: \"8081\"\n      ports:\n        - containerPort:\
    \ 8081\n    - name: nginx-container-3\n      image: bitnami/nginx\n      env:\n\
    \        - name: NGINX_HTTP_PORT_NUMBER\n          value: \"8082\"\n      ports:\n\
    \        - containerPort: 8082\n```\n\n然后 **kubectl apply** 它。\n\n对于 (b)，您必须创建一个新的\
    \ Pod 规范文件，使用新的 Pod 名称，并运行 **kubectl create**。\n\nkubectl create 和 kubectl create\
    \ 命令都用于在 Kubernetes 集群中创建资源，但它们的设计目的略有不同，行为也不同。\n\n当您使用 kubectl create 时，它期望资源在集群中尚不存在。如果同名资源已存在，该命令将因错误而失败。\n\
    \nkubectl apply 可以在资源不存在时创建它们，如果存在则更新它们。它通过跟踪您在注解中应用的先前配置来实现这一点。这允许 kubectl apply\
    \ 计算上次应用的配置与您提供的新所需配置之间的差异（delta），并仅应用这些更改。\n\n### 练习 11：2 个容器的变体\n\n再次在 Pod 中运行\
    \ 2 个容器。但 1 个是 nginx，另一个是运行 \"sleep 5\" 然后终止的 bash 容器。Pod 会崩溃吗？如果是，您将如何在不更改 bash\
    \ 容器镜像的情况下修复它？\n\n**解答**\n\n即使其中一个容器的进程被终止，Pod 也会崩溃。在这种情况下，bash sleep 容器将在 5 秒后关闭，向\
    \ kubelet 指示该 Pod 需要重新启动，从而导致无限的 **CrashloopBackoff** 情况。改为在 bash 容器中添加 **sleep\
    \ infinity**。\n\n### 练习 12：在 8008 端口进行端口转发\n\n尝试将同一个 Pod 端口转发到您主机的 8008 端口。\n\n\
    **解答**\n\n```\n$ kubectl port-forward pod/nginx 8008:80\n```\n\n### 练习 13：端口转发多个容器\n\
    \n采用 2-pod Bitnami nginx 设置。将 8080 nginx 端口转发到 localhost 的 8080，将 8081 nginx 容器端口转发到\
    \ localhost 的 8081。"
