- md: "## Summary\n\nIn this chapter, we explored several key Kubernetes concepts\
    \ and how they can be applied to deploy, manage, and expose applications like\
    \ Redis in a Kubernetes environment. Let's recap the critical takeaways and understand\
    \ how they fit together in the broader context of Kubernetes orchestration.\n\n\
    ## Understanding StatefulSets with Redis\n\nWe delved into StatefulSets, an essential\
    \ Kubernetes resource for managing stateful applications such as Redis. Unlike\
    \ Deployments, StatefulSets maintain a sticky identity for each of their Pods,\
    \ making them ideal for scenarios where pod identity, stable network identifiers,\
    \ and persistent storage are crucial. By using StatefulSets for Redis, we saw\
    \ how to ensure that our Redis instances are managed predictably and reliably,\
    \ preserving data and ensuring consistent networking even through rescheduling\
    \ and restarts.\n\n```\n$ kubectl get deploy -n ingress-nginx\nNAME          \
    \             READY   UP-TO-DATE   AVAILABLE   AGE\ningress-nginx-controller \
    \  1/1     1            1           3m14s\n```\n\n```\n$ kubectl get service -n\
    \ ingress-nginx\nNAME                       TYPE           CLUSTER-IP      EXTERNAL-IP\
    \     PORT(S)                      AGE\ningress-nginx-controller   LoadBalancer\
    \   10.245.39.164   174.138.120.165  80:31372/TCP,443:30382/TCP   3m44s\ningress-nginx-controller-admission\
    \   ClusterIP   10.245.230.107   <none>          443/TCP                     \
    \ 3m44s\n```\n\nThe ingress controller deployment is running, along with a load\
    \ balancer service which represents the ingress. To check whether an external\
    \ host routed through the ingress controller, we will create a new clusterIP service\
    \ and an ingress.\n\n```\n$ kubectl apply -f ingress-clusterip.yaml -n robust-setup\n\
    ingress.networking.k8s.io/nginx-ingress-clusterip created\n```\n\nThe ingress\
    \ this time is only slightly different.\n\n```yaml\napiVersion: networking.k8s.io/v1\n\
    kind: Ingress\nmetadata:\n  name: nginx-ingress-clusterip\nspec:\n  ingressClassName:\
    \ nginx # (1)\n  rules:\n  - host: nginx-clusterip.example.com\n    http:\n  \
    \    paths:\n      - path: /\n        pathType: Prefix\n        backend:\n   \
    \       service:\n            name: nginx-clusterip # (2)\n            port:\n\
    \              number: 80\n```\n\n(1) -> We specify an ingress class. An Ingress\
    \ Class in Kubernetes is a way to classify or categorize Ingress controllers based\
    \ on a set of characteristics or behaviors they implement. This mechanism allows\
    \ you to use multiple Ingress controllers within a single Kubernetes cluster and\
    \ select which Ingress controller should handle a particular Ingress resource.\
    \ The concept of Ingress Class was introduced to provide more flexibility and\
    \ support for multiple Ingress controllers operating in the same cluster.\n\n\
    (2) -> We point to the **nginx-clusterip** service we created.\n\nLet's leverage\
    \ some of the advanced features ingress controllers offer. We will start by implementing\
    \ rate limiting.\n\n```yaml\napiVersion: networking.k8s.io/v1\nkind: Ingress\n\
    metadata:\n  name: nginx-ingress-ratelimit\n  annotations:\n    nginx.ingress.kubernetes.io/limit-connections:\
    \ \"1\" # (1)\n    nginx.ingress.kubernetes.io/limit-rps: \"1\" # (2)\nspec:\n\
    \  ingressClassName: nginx\n  rules:\n  - host: nginx-ratelimit.example.com\n\
    \    http:\n      paths:\n      - path: /\n        pathType: Prefix\n        backend:\n\
    \          service:\n            name: nginx-clusterip\n            port:\n  \
    \            number: 80\n```\n\nWe give 2 annotations to this new ingress.\n\n\
    (1) -> Limit number of simultaneous connections to 1. (2) -> limit the number\
    \ of requests per second to 1.\n\nNow, when we try to curl 10 requests simultaneously.\n\
    \n```\n$ for i in {1..10}; do curl -i -H \"Host: nginx-ratelimit.example.com\"\
    \ http://174.138.120.165; done\n```\n\nWe might get 503 for some of the requests,\
    \ which is the default response configured in nginx controller when we hit the\
    \ rate limits. The controller will have log entries like this:\n\n```\n10.122.0.9\
    \ - - [02/Mar/2024:06:05:52 +0000] \"GET / HTTP/1.1\" 200 615 \"-\" \"curl/8.4.0\"\
    \ 90 0.000 [robust-setup-nginx-clusterip-80][] 10.244.1.101:80 615 0.001 200 f4a0d3f0a1bc9d211c5d8a09256b50f6\n\
    2024/03/02 06:05:52 [error] 239#239: *52996 limiting requests, excess: 5.320 by\
    \ zone \"robust-setup_nginx-ingress-ratelimit_8330be13-c601-4a32-9687-57d4a2f2898b_rps\"\
    , client: 10.122.0.9, server: nginx-ratelimit.example.com, request: \"GET / HTTP/1.1\"\
    , host: \"nginx-ratelimit.example.com\"\n10.122.0.9 - - [02/Mar/2024:06:05:52\
    \ +0000] \"GET / HTTP/1.1\" 503 190 \"-\" \"curl/8.4.0\" 90 0.000 [robust-setup-nginx-clusterip-80][]\
    \ - - - - 865fa11eb057a978a2592e94b544f1af\n```\n\nThe first line is a normal\
    \ request-response log. The second line indicates that the controller hit a rate\
    \ limit, for which it responds with **503**.\n\nNext, let's add TLS certificates\
    \ for our ingress. We will generate self signed certificates for this exercise\
    \ just to illustrate how TLS termination will happen in the ingress controller\
    \ itself.\n\n```\n$ openssl genrsa -out nginx-clusterip.example.com.key 4096 #\
    \ (1)\n\n$ openssl req -new -x509 -days 365 -key nginx-clusterip.example.com.key\
    \ -out nginx-clusterip.example.com.crt -addext \"subjectAltName = DNS:nginx-clusterip.example.com\"\
    \ -subj \"/CN=nginx-clusterip.example.com\" # (2)\n\n$ kubectl create secret tls\
    \ nginx-clusterip-tls --key=\"nginx-clusterip.example.com.key\" --cert=\"nginx-clusterip.example.com.crt\"\
    \ -n robust-setup # (3)\n```\n\n(1) ->\n\n**openssl**: This is the command-line\
    \ tool for using the various cryptography functions of OpenSSL's crypto library\
    \ from the shell. genrsa: This option tells OpenSSL to generate an RSA private\
    \ key.\n\n**-out nginx-clusterip.example.com.key** Specifies the filename to save\
    \ the generated private key. In this case, it's named after the domain it's intended\
    \ for, but this name can be arbitrary.\n\n**4096** This is the size of the private\
    \ key in bits. A 4096-bit key is longer than the more common 2048-bit key, offering\
    \ higher security at the cost of slightly increased computational overhead for\
    \ encryption and decryption processes.\n\n(2) ->\n\n**req**: This option is used\
    \ to specify that a certificate request is being created.\n\n**-new** Indicates\
    \ that this is a new request.\n\n**-x509** This flag tells OpenSSL to generate\
    \ a self-signed certificate instead of a certificate signing request (CSR).\n\n\
    **-days 365** Sets the validity period of the certificate to 365 days. After this\
    \ period, the certificate will expire and need to be renewed.\n\n**-key nginx-clusterip.example.com.key**\
    \ Specifies the private key to use when generating the certificate. This key was\
    \ created in the first command.\n\n**-out nginx-clusterip.example.com.crt** Designates\
    \ the filename for the generated certificate.\n\n**-addext \"subjectAltName =\
    \ DNS:nginx-clusterip.example.com\"** This extension adds a Subject Alternative\
    \ Name (SAN) to the certificate, allowing the certificate to be valid not only\
    \ for the Common Name (CN) but also for additional names. In this case, it specifies\
    \ the same domain as the CN.\n\n**-subj \"/CN=nginx-clusterip.example.com\"**\
    \ : Sets the Common Name for the certificate to **nginx-clusterip.example.com**,\
    \ which is typically the primary domain name that the certificate will secure.\n\
    \n(3) ->\n\nCreate a kubernetes secret of type **tls** from the key file and the\
    \ cert file in the same namespace.\n\nWe now update the ingress spec with this\
    \ TLS secret.\n\n```yaml\napiVersion: networking.k8s.io/v1\nkind: Ingress\nmetadata:\n\
    \  name: nginx-ingress-clusterip\nspec:\n  tls: # (1)\n  - hosts:\n    - nginx-clusterip.example.com\
    \ # (2)\n    secretName: nginx-clusterip-tls # (3)\n  ingressClassName: nginx\n\
    ... # rest of the stuff is same\n```\n\n(1) -> Defines TLS settings for securing\
    \ the Ingress, specifying how HTTPS traffic should be handled.\n\n(2) -> Lists\
    \ the hostnames that are covered by this TLS configuration, indicating which domains\
    \ should use the specified TLS secret for HTTPS.\n\n(3) -> Specifies the name\
    \ of the Kubernetes Secret containing the TLS certificate and private key for\
    \ the listed hosts, enabling HTTPS.\n\nLet's test whether TLS works now.\n\n```\n\
    $ curl -I -H \"Host: nginx-clusterip.example.com\" https://174.138.120.165 -k\n\
    HTTP/2 200\ndate: Sat, 02 Mar 2024 12:25:56 GMT\ncontent-type: text/html\ncontent-length:\
    \ 615\nlast-modified: Wed, 14 Feb 2024 16:03:00 GMT\netag: \"65cce434-267\"\n\
    accept-ranges: bytes\nstrict-transport-security: max-age=31536000; includeSubDomains\n\
    ```\n\nThe ingress controller also does a redirect if the service is called with\
    \ http.\n\n```\n$ curl -I -H \"Host: nginx-clusterip.example.com\" http://174.138.120.165\n\
    HTTP/1.1 308 Permanent Redirect\nDate: Sat, 02 Mar 2024 12:27:04 GMT\nContent-Type:\
    \ text/html\nContent-Length: 164\nConnection: keep-alive\nLocation: https://nginx-clusterip.example.com\n\
    ```\n\n**Note:** If you're using a self-signed certificate, clients (such as web\
    \ browsers) will likely show a security warning because the certificate is not\
    \ issued by a trusted Certificate Authority (CA). This setup is typically used\
    \ for development, testing environments, or internal applications where you can\
    \ safely bypass the warning.\n\nIn a production setting, you would generate certificates\
    \ using [certbot](https://certbot.eff.org/) and install them as secrets in your\
    \ cluster. Better yet, you would use an in-cluster controller called [Cert manager](https://cert-manager.io/)\
    \ to generate certificates automatically and renew them."
  mdcn: "## 总结\n\n在本章中，我们探讨了几个关键的 Kubernetes 概念，以及如何将它们应用于在 Kubernetes 环境中部署、管理和暴露像\
    \ Redis 这样的应用程序。让我们回顾一下关键要点，并理解它们如何在更广泛的 Kubernetes 编排背景下协同工作。\n\n## 通过 Redis\
    \ 理解 StatefulSet\n\n我们深入探讨了 StatefulSet，这是管理像 Redis 这样有状态应用程序的 Kubernetes 核心资源。与\
    \ Deployment 不同，StatefulSet 为其每个 Pod 维护一个稳定的标识，这使得它们非常适合需要 Pod 标识、稳定网络标识符和持久化存储的场景。通过为\
    \ Redis 使用 StatefulSet，我们看到了如何确保 Redis 实例得到可预测和可靠的管理，即使在重新调度和重启过程中也能保留数据并确保一致的网络连接。\n\
    \n```\n$ kubectl get deploy -n ingress-nginx\nNAME                       READY\
    \   UP-TO-DATE   AVAILABLE   AGE\ningress-nginx-controller   1/1     1       \
    \     1           3m14s\n```\n\n```\n$ kubectl get service -n ingress-nginx\n\
    NAME                       TYPE           CLUSTER-IP      EXTERNAL-IP     PORT(S)\
    \                      AGE\ningress-nginx-controller   LoadBalancer   10.245.39.164\
    \   174.138.120.165  80:31372/TCP,443:30382/TCP   3m44s\ningress-nginx-controller-admission\
    \   ClusterIP   10.245.230.107   <none>          443/TCP                     \
    \ 3m44s\n```\n\nIngress 控制器部署正在运行，同时还有一个代表 Ingress 的负载均衡器服务。为了检查通过 Ingress 控制器路由的外部主机，我们将创建一个新的\
    \ ClusterIP 服务和一个 Ingress。\n\n```\n$ kubectl apply -f ingress-clusterip.yaml -n\
    \ robust-setup\ningress.networking.k8s.io/nginx-ingress-clusterip created\n```\n\
    \n这次的 Ingress 只有细微差别。\n\n```yaml\napiVersion: networking.k8s.io/v1\nkind: Ingress\n\
    metadata:\n  name: nginx-ingress-clusterip\nspec:\n  ingressClassName: nginx #\
    \ (1)\n  rules:\n  - host: nginx-clusterip.example.com\n    http:\n      paths:\n\
    \      - path: /\n        pathType: Prefix\n        backend:\n          service:\n\
    \            name: nginx-clusterip # (2)\n            port:\n              number:\
    \ 80\n```\n\n(1) -> 我们指定了一个 Ingress Class。Kubernetes 中的 Ingress Class 是一种根据 Ingress\
    \ 控制器实现的一组特性或行为对其进行分类或归类的方式。此机制允许你在单个 Kubernetes 集群中使用多个 Ingress 控制器，并选择哪个 Ingress\
    \ 控制器应处理特定的 Ingress 资源。引入 Ingress Class 概念是为了提供更大的灵活性，并支持在同一集群中运行多个 Ingress 控制器。\n\
    \n(2) -> 我们指向了创建的 **nginx-clusterip** 服务。\n\n让我们利用 Ingress 控制器提供的一些高级功能。我们将从实现速率限制开始。\n\
    \n```yaml\napiVersion: networking.k8s.io/v1\nkind: Ingress\nmetadata:\n  name:\
    \ nginx-ingress-ratelimit\n  annotations:\n    nginx.ingress.kubernetes.io/limit-connections:\
    \ \"1\" # (1)\n    nginx.ingress.kubernetes.io/limit-rps: \"1\" # (2)\nspec:\n\
    \  ingressClassName: nginx\n  rules:\n  - host: nginx-ratelimit.example.com\n\
    \    http:\n      paths:\n      - path: /\n        pathType: Prefix\n        backend:\n\
    \          service:\n            name: nginx-clusterip\n            port:\n  \
    \            number: 80\n```\n\n我们为这个新的 Ingress 添加了两个注解。\n\n(1) -> 将同时连接数限制为 1。(2)\
    \ -> 将每秒请求数限制为 1。\n\n现在，当我们尝试同时发起 10 个 curl 请求时。\n\n```\n$ for i in {1..10}; do\
    \ curl -i -H \"Host: nginx-ratelimit.example.com\" http://174.138.120.165; done\n\
    ```\n\n我们可能会收到一些请求返回 503，这是当达到速率限制时 nginx 控制器配置的默认响应。控制器将会有如下日志条目：\n\n```\n10.122.0.9\
    \ - - [02/Mar/2024:06:05:52 +0000] \"GET / HTTP/1.1\" 200 615 \"-\" \"curl/8.4.0\"\
    \ 90 0.000 [robust-setup-nginx-clusterip-80][] 10.244.1.101:80 615 0.001 200 f4a0d3f0a1bc9d211c5d8a09256b50f6\n\
    2024/03/02 06:05:52 [error] 239#239: *52996 limiting requests, excess: 5.320 by\
    \ zone \"robust-setup_nginx-ingress-ratelimit_8330be13-c601-4a32-9687-57d4a2f2898b_rps\"\
    , client: 10.122.0.9, server: nginx-ratelimit.example.com, request: \"GET / HTTP/1.1\"\
    , host: \"nginx-ratelimit.example.com\"\n10.122.0.9 - - [02/Mar/2024:06:05:52\
    \ +0000] \"GET / HTTP/1.1\" 503 190 \"-\" \"curl/8.4.0\" 90 0.000 [robust-setup-nginx-clusterip-80][]\
    \ - - - - 865fa11eb057a978a2592e94b544f1af\n```\n\n第一行是正常的请求-响应日志。第二行表明控制器触发了速率限制，因此它以\
    \ **503** 响应。\n\n接下来，让我们为 Ingress 添加 TLS 证书。为了说明 TLS 终止如何在 Ingress 控制器本身发生，我们将为本次练习生成自签名证书。\n\
    \n```\n$ openssl genrsa -out nginx-clusterip.example.com.key 4096 # (1)\n\n$ openssl\
    \ req -new -x509 -days 365 -key nginx-clusterip.example.com.key -out nginx-clusterip.example.com.crt\
    \ -addext \"subjectAltName = DNS:nginx-clusterip.example.com\" -subj \"/CN=nginx-clusterip.example.com\"\
    \ # (2)\n\n$ kubectl create secret tls nginx-clusterip-tls --key=\"nginx-clusterip.example.com.key\"\
    \ --cert=\"nginx-clusterip.example.com.crt\" -n robust-setup # (3)\n```\n\n(1)\
    \ ->\n\n**openssl**: 这是一个命令行工具，用于从 shell 中使用 OpenSSL 加密库的各种加密函数。genrsa: 此选项告诉\
    \ OpenSSL 生成一个 RSA 私钥。\n\n**-out nginx-clusterip.example.com.key** 指定保存生成的私钥的文件名。在这种情况下，它以预期的域名命名，但此名称可以是任意的。\n\
    \n**4096** 这是私钥的位数大小。4096 位的密钥比更常见的 2048 位密钥更长，以略微增加加密和解密过程的计算开销为代价，提供了更高的安全性。\n\
    \n(2) ->\n\n**req**: 此选项用于指定正在创建证书请求。\n\n**-new** 表示这是一个新请求。\n\n**-x509** 此标志告诉\
    \ OpenSSL 生成自签名证书，而不是证书签名请求 (CSR)。\n\n**-days 365** 将证书的有效期设置为 365 天。在此期限之后，证书将过期并需要续订。\n\
    \n**-key nginx-clusterip.example.com.key** 指定生成证书时要使用的私钥。此密钥是在第一个命令中创建的。\n\n**-out\
    \ nginx-clusterip.example.com.crt** 指定生成的证书的文件名。\n\n**-addext \"subjectAltName\
    \ = DNS:nginx-clusterip.example.com\"** 此扩展为证书添加了主题备用名称 (SAN)，允许证书不仅对通用名称 (CN)\
    \ 有效，也对其他名称有效。在这种情况下，它指定了与 CN 相同的域名。\n\n**-subj \"/CN=nginx-clusterip.example.com\"\
    ** : 将证书的通用名称设置为 **nginx-clusterip.example.com**，这通常是证书将保护的主要域名。\n\n(3) ->\n\n\
    使用密钥文件和证书文件在相同命名空间中创建一个类型为 **tls** 的 Kubernetes Secret。\n\n我们现在用这个 TLS Secret\
    \ 更新 Ingress 规范。\n\n```yaml\napiVersion: networking.k8s.io/v1\nkind: Ingress\n\
    metadata:\n  name: nginx-ingress-clusterip\nspec:\n  tls: # (1)\n  - hosts:\n\
    \    - nginx-clusterip.example.com # (2)\n    secretName: nginx-clusterip-tls\
    \ # (3)\n  ingressClassName: nginx\n... # 其余部分相同\n```\n\n(1) -> 定义用于保护 Ingress\
    \ 的 TLS 设置，指定应如何处理 HTTPS 流量。\n\n(2) -> 列出此 TLS 配置涵盖的主机名，指示哪些域名应使用指定的 TLS Secret\
    \ 进行 HTTPS 访问。\n\n(3) -> 指定包含所列主机的 TLS 证书和私钥的 Kubernetes Secret 的名称，从而启用 HTTPS。\n\
    \n让我们测试一下 TLS 现在是否有效。\n\n```\n$ curl -I -H \"Host: nginx-clusterip.example.com\"\
    \ https://174.138.120.165 -k\nHTTP/2 200\ndate: Sat, 02 Mar 2024 12:25:56 GMT\n\
    content-type: text/html\ncontent-length: 615\nlast-modified: Wed, 14 Feb 2024\
    \ 16:03:00 GMT\netag: \"65cce434-267\"\naccept-ranges: bytes\nstrict-transport-security:\
    \ max-age=31536000; includeSubDomains\n```\n\n如果使用 http 调用服务，Ingress 控制器也会进行重定向。\n\
    \n```\n$ curl -I -H \"Host: nginx-clusterip.example.com\" http://174.138.120.165\n\
    HTTP/1.1 308 Permanent Redirect\nDate: Sat, 02 Mar 2024 12:27:04 GMT\nContent-Type:\
    \ text/html\nContent-Length: 164\nConnection: keep-alive\nLocation: https://nginx-clusterip.example.com\n\
    ```\n\n**注意：** 如果你使用的是自签名证书，客户端（如 Web 浏览器）很可能会显示安全警告，因为该证书不是由受信任的证书颁发机构 (CA) 签发的。此设置通常用于开发、测试环境或内部应用程序，在这些场景中你可以安全地绕过警告。\n\
    \n在生产环境中，你会使用 [certbot](https://certbot.eff.org/) 生成证书，并将其作为 Secret 安装在集群中。更好的做法是，你会使用名为\
    \ [Cert manager](https://cert-manager.io/) 的集群内控制器来自动生成证书并续订它们。"
