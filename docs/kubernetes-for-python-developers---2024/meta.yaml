    \  ports: # (2)\n    - containerPort: 80\n  - name: nginx-container-2 # (3)\n\
    \    image: nginx\n    ports: # (4)\n    - containerPort: 81\n```\n\n(1) -> The\
    \ first container is named **nginx-container-1**.\n\n(2) -> It exposes port **80**,\
    \ as we can see from the **containerPort** value.\n\n(3) -> the 2nd container\
    \ is named **nginx-container-2**. Note that both run the same image. Perfectly\
    \ valid. Only the names should be unique.\n\n(4) -> The 2nd container exposes\
    \ a different port.\n\nWhen we try to run this pod, we get a facepalm moment.\n\
    \n```\n$ kubectl apply -f two-containers.yaml\n```"
