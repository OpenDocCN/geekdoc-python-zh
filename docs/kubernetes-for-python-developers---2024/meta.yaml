  - "[PAGE 237]\n\n**Factor IV: Backing Services:** ConfigMaps can store information\
    \ about backing services, treating these resources as attached resources that\
    \ can be swapped or reconfigured without code changes. This facilitates loose\
    \ coupling to backing services. This is exactly what we did when we externalized\
    \ **REDIS_HOST** as a configmap-based environment variable.\n\nConsider a Flask\
    \ application that requires an external API URL and credentials. Instead of hardcoding\
    \ these within the application or its Docker image, you would store them in a\
    \ ConfigMap:\n\n```\napiVersion: v1\nkind: ConfigMap\nmetadata:\n  name: flask-config\n\
    data:\n  API_URL: \"https://api.example.com\"\n  API_KEY: \"secret-api-key\"\n\
    ```\n\nThe application reads these values from its environment, which Kubernetes\
    \ populates from the ConfigMap at runtime. This setup adheres to the 12-factor\
    \ methodology by separating configuration (the API URL and key) from the application\
    \ code, promoting configurability, portability, and environment parity.\n\nFor\
    \ instance, you might run a deployment in a development namespace and point it\
    \ to a dev-version of the configmap with different set of **API_URL** and **API_KEY**\
    \ . You can run the same instance in a production namespace and point it to a\
    \ different configmap with different set of values for these variables. All this\
    \ without changing the code."
  - '[PAGE 238]


    ConfigMaps embody the principles of the 12-factor app methodology by enabling
    external, environment-specific configuration. This enhances application portability,
    scalability, and maintainability in cloud-native environments.


    You might be thinking whether to externalize stuff like **REDIS_PASSWORD** and
    **API_KEY** as configmaps as these are plain-text, and you are right. That''s
    why we have secrets.


    # Secrets


    Kubernetes Secrets are objects that let you store and manage sensitive information,
    such as passwords, OAuth tokens, and ssh keys, avoiding the need to store sensitive
    data in your Pod specifications or in container images. Using Secrets is more
    secure than using ConfigMaps for non-sensitive configuration, as Secrets can be
    encrypted at rest and accessed through a secure API.


    # Why Use Secrets?


    **Security:** Secrets are designed to hold sensitive information, reducing the
    risk of exposing confidential data.


    **Management:** They provide a centralized way to manage sensitive information,
    making it easier to update or rotate credentials without modifying your application
    code or deployment configurations.


    # An example: nginx auth


    Let''s demonstrate how to use Kubernetes Secrets by setting up basic authentication
    for an Nginx server.'
  - '[PAGE 239]


    We''ll create a Secret to store the credentials and configure Nginx to use this
    Secret for authentication.


    # Step 1: Create the htpasswd File


    First, create a file with the username and encrypted password. You can use tools
    like **openssl** or **htpasswd** (part of Apache utilities) for encryption. For
    example:


    ```

    $ htpasswd -c ./auth myuser

    ```


    This command prompts you for a password and creates an auth file containing your
    encrypted password.


    **Note:** Don''t sweat over if you don''t have **htpasswd** installed in your
    system, you can copy over the generated file from the source code without running
    this step. The password is **mypassword**.


    # Step 2: Create a Kubernetes Secret from the htpasswd File


    Convert the auth file into a Kubernetes Secret:


    ```

    $ kubectl create secret generic nginx-auth --from-file=auth -n notch-further

    secret/nginx-auth created

    ```


    This command creates a Secret named **nginx-auth** containing the content of your
    auth file.


    # Step 3: Configure the Nginx deployment to use the Secret


    Modify your Nginx deployment to mount the Secret and configure Nginx to use basic
    authentication.


    You have to slightly tweak your **nginx.conf** to support the auth you just created.


    ```

    user nginx;

    worker_processes auto;

    ```'
