    # Run Flask Container


    Start a Flask container, also attached to the **my_bridge_network**. This container
    will communicate with the Redis container.


    ```

    $ docker run --name my-flask-app --network my_bridge_network -d -e REDIS_HOST=my-redis-container
    my-flask-image

    ```


    In this setup, the Flask application can access the Redis container using the
    hostname my-redis-container, which resolves to the internal IP address assigned
    to the Redis container on the **my_bridge_network**. This is possible because
    Docker''s internal DNS resolver ensures containers can find each other by name
    within the same custom network.


    This example demonstrates how a bridge network facilitates easy communication
    between containers on the same host. Each container can securely talk to others
    on the network as needed, without exposing unnecessary access externally. The
    use of a custom bridge network also allows for network-level isolation between
    different groups of containers, enhancing security and organization of containerized
    components in a microservices architecture.


    # Isolating processes


    In the example above, why can''t I run both redis and flask inside the same container?


    Running both Redis and a Flask application inside the same container is technically
    possible but goes against the containerization philosophy, which promotes the
    "one process per container" principle. This'
  merge: -1
  pgno: 39
- img_proc: true
  md: 'principle is rooted in the broader concept of microservices architecture, aiming
    for modularity, scalability, and maintainability. Here are several reasons why
    it''s generally discouraged to run both Redis and Flask inside the same container:


    +   1. **Isolation of Concerns** Containers are designed to encapsulate a single
    responsibility or service. This isolation simplifies development, debugging, scaling,
    and maintenance. By running Redis and Flask together, you blur the lines of responsibility,
    making it harder to manage the lifecycle of each process independently (e.g.,
    updating, restarting, and monitoring).

    2. **Scalability** In a microservices architecture, different components may need
    to scale independently based on demand. For instance, you might need more Flask
    instances to handle web requests but not as many Redis instances since Redis can
    handle a high number of connections. Combining both in a single container complicates
    scaling and can lead to inefficient resource use.

    3. **Reusability** Containers are meant to be reusable components that can be
    deployed in different environments and scenarios. By combining Redis and Flask,
    you lose the ability to reuse the container in contexts where only one of those
    services is needed. It also complicates the deployment process in distributed
    systems, where different services may be managed by different teams.

    4. **Security** Running multiple services in a single container can pose security
    risks. The principle of least privilege suggests that a process should have only
    the permissions necessary to perform its function. If one service is compromised,
    having another service in the same container can provide an attacker with unnecessary
    access or resources to exploit. Separating services into different containers
    helps limit the impact of a security breach.'
  merge: -1
  pgno: 40
- img_proc: true
  md: '+   5. **Lifecycle Management** Containers are designed to represent a single,
    stateless service that can be easily started, stopped, or replaced. This aligns
    well with stateless applications like Flask but less so with stateful services
    like Redis, which may require persistent storage and more nuanced lifecycle management.
    Combining stateful and stateless services in a single container complicates backup,
    recovery, and data persistence strategies.


    # Example Scenario


    Imagine needing to update the Flask application without affecting Redis. If both
    run in the same container, you''d have to rebuild and restart the entire container,
    leading to unnecessary downtime for the Redis service. Separating them into different
    containers allows for independent updates, reducing downtime and potential impact
    on the availability of the Redis service.


    While container technology offers the flexibility to run multiple processes together,
    adhering to the one process per container principle facilitates better manageability,
    security, scalability, and modularity of applications. This approach aligns with
    the best practices of cloud-native development and microservices architectures,
    ensuring that applications are resilient, maintainable, and scalable.


