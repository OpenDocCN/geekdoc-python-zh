    \n## 解答\n\n使用 **redis-init.sh** 中的 sentinel 脚本来实现这一点。参考 [https://faun.pub/redis-high-availability-with-sentinel-on-kubernetes-k8s-a1d67842e0ce](https://faun.pub/redis-high-availability-with-sentinel-on-kubernetes-k8s-a1d67842e0ce)。\n\
    \n## 练习 31：更新角色以获取服务。\n\n扩大角色/令牌的范围，除了 Pod 之外，还包括服务。\n\n## 解答\n\n```\napiVersion:\
    \ rbac.authorization.k8s.io/v1\nkind: Role\nmetadata:\n  name: pod-reader\nrules:\n\
    - apiGroups: [\"\"]\n  resources: [\"pods\", \"services\"]\n  verbs: [\"get\"\
    , \"watch\", \"list\"]\n```\n\n## 练习 32：创建长期令牌以访问 Pod 日志\n\n你会注意到，使用此角色我们无法访问\
    \ Pod 的日志。更改角色，以便我们可以使用为此角色创建的长期令牌访问 Pod 日志。\n\n## 解答\n\n```\napiVersion: rbac.authorization.k8s.io/v1\n\
    kind: Role\nmetadata:\n  name: pod-reader\nrules:\n- apiGroups: [\"\"]\n  resources:\
    \ [\"pods\", \"pods/log\"]\n  verbs: [\"get\", \"watch\", \"list\"]\n```\n\n##\
    \ 练习 33：多服务入口\n\n创建一个入口，主机为 **multiservice.example.com**，其中 **/nginx** 路径指向 nginx\
    \ 部署，**/flask** 路径指向 redis flask 服务。\n\n## 解答\n\n```\napiVersion: networking.k8s.io/v1\n\
    kind: Ingress\nmetadata:\n  name: multiservice-ingress\n  annotations:\n    nginx.ingress.kubernetes.io/rewrite-target:\
    \ /$1\nspec:\n  rules:\n  - host: multiservice.example.com\n    http:\n      paths:\n\
    \      - path: /nginx(/|$)(.*)\n        pathType: Prefix\n        backend:\n \
    \         service:\n            name: nginx\n            port:\n             \
    \ number: 80\n      - path: /flask(/|$)(.*)\n        pathType: Prefix\n      \
    \  backend:\n          service:\n            name: redis-flask\n            port:\n\
    \              number: 8080\n```\n\n此入口定义执行以下操作：\n\n- 定义了一个名为 **multiservice-ingress**\
    \ 的入口。确保底层服务已部署。\n- 使用注解 **nginx.ingress.kubernetes.io/rewrite-target** 修改传递给后端服务的路径。这对于可能不期望接收路径前缀的服务很有帮助。\n\
    - 为主机 `multiservice.example.com` 指定了一个规则，包含两个路径：\n    - 到 **multiservice.example.com/nginx**\
    \ 的流量被路由到端口 80 上的 **nginx** 服务。\n    - 到 **multiservice.example.com/flask** 的流量被路由到端口\
    \ 8080 上的 **redis-flask** 服务。"
