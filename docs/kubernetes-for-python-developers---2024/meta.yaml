    \ 29 Feb 2024 06:24:14.850 * Background RDB transfer terminated with success\n\
    17:M 29 Feb 2024 06:24:14.850 * Streamed RDB transfer with replica 10.244.0.189:6379\
    \ succeeded (socket). Waiting for REPLCONF ACK from replica to enable streaming\n\
