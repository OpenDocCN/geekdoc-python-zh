    \    image: nginx:latest\n    ports:\n    - containerPort: 8080\n    volumeMounts:\n\
    \    - name: nginx-config-volume\n      mountPath: /etc/nginx/nginx.conf\n   \
    \   readOnly: true\n      subPath: nginx1.conf\n  - name: nginx2\n    image: nginx\n\
