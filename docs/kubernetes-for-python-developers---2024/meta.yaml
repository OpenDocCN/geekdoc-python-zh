  md: 'Pod Stays in Waiting State: The pod will remain in a "waiting" state, specifically
    with an ImagePullBackOff or ErrImagePull status, as Kubernetes periodically retries
    the image pull and continues to fail due to authentication errors.


    # Exercise 28: Multiple image pull secrets


    Build another private image in another registry. Add it as another container in
    same pod/deployment, and add another image pull secret to the configuration, for
    the newer container.


    # Solution


    Here''s how you can achieve this setup:


    First, create the required Docker registry secrets in your Kubernetes cluster
    for each private registry. Use the kubectl create secret docker-registry command
    to create each secret. For example:


    ```

    $ kubectl create secret docker-registry secret1 --docker-server=REGISTRY1_URL
    --docker-username=USER1 --docker-password=PASSWORD1 --docker-email=EMAIL1


    $ kubectl create secret docker-registry secret2 --docker-server=REGISTRY2_URL
    --docker-username=USER2 --docker-password=PASSWORD2 --docker-email=EMAIL2

    ```


    Replace REGISTRY1_URL, USER1, PASSWORD1, EMAIL1, REGISTRY2_URL, USER2, PASSWORD2,
    and EMAIL2 with your actual registry URLs and credentials.


    When defining your pod, include both secrets in the imagePullSecrets field. This
    makes both secrets available to all containers within the pod. Here''s an example
    pod definition:


    ```

    apiVersion: v1

    ```'
  merge: -1
  pgno: 433
- img_proc: true
  md: "```\nkind: Pod\nmetadata:\n  name: my-pod\nspec:\n  imagePullSecrets:\n  -\
    \ name: secret1\n  - name: secret2\n  containers:\n  - name: container1\n    image:\
    \ registry1.example.com/myimage1:latest\n  - name: container2\n    image: registry2.example.com/myimage2:latest\n\
    ```\n\nIn this setup, container1 will pull its image from registry1.example.com\
    \ using credentials from secret1, and container2 will pull its image from registry2.example.com\
    \ using credentials from secret2. Kubernetes will attempt to authenticate against\
    \ each registry using all provided secrets in imagePullSecrets until it succeeds\
    \ or exhausts the secrets.\n\n**Note:** While this method allows each container\
    \ to potentially use different secrets, it does not restrict a container to use\
    \ a specific secret. Each container in the pod can use any of the provided secrets\
    \ for image"
  merge: -1
