    # Full fledged Flask redis app


    Armed with the new knowledge of deployments and services, let''s deploy the Flask
    app backed by Redis to the cluster. Let''s first consolidate what artefacts we
    need to deploy this:


    +   1. A flask-redis application container image. Make sure to make this container
    image public as well, similar to what you did with the **flask-app** image.

    2. A deployment for the flask-redis image.

