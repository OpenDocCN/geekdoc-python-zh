  - '[PAGE 339]


    (1) -> The expiration time (exp) of the token, indicating when the token will
    become invalid (Unix timestamp).


    (2) -> The issuer (iss) of the token, identifying the authority that issued the
    token; here, it''s the Kubernetes API server.


    (3) -> Specifies the Kubernetes namespace in which the service account associated
    with this token is located.


    (4) -> The name of the Kubernetes service account to which the token was issued.


    (5) -> The subject (sub) of the token, typically identifying the principal that
    is the subject of the JWT; here, it represents the service account in the format
    system:serviceaccount:<namespace>:<service account name>.


    The Kubernetes API server is the primary consumer of these tokens. When a pod
    or external entity makes a request to the Kubernetes API, it can authenticate
    itself using a service account token. The API server validates the token to ensure
    it''s valid and hasn''t expired, then uses the information in the token (like
    the service account name and namespace) to enforce access control policies based
    on the role bindings associated with the service account.


    Let''s make a request to our cluster with this token.


    ```

    $ export KUBE_TOKEN=$(cat token.txt) # (1)

    $ kubectl --token=$KUBE_TOKEN get pods # (2)

    Error from server (Forbidden): pods is forbidden: User "system:serviceaccount:robust-setup:test"
    cannot list resource "pods" in API group "" in the namespace "default"

    ```'
- md: "## Exercise 31: Update the role to get services.\n\nIncrease the scope of the\
    \ role/token to include services, in addition to pods.\n\nIt would be very inconvenient\
    \ indeed to create tokens every time they expire. Hence Kubernetes allows us to\
    \ create long lived tokens.\n\n```yaml\napiVersion: v1\nkind: Secret # (1)\nmetadata:\n\
    \  name: test-llt # (2)\n  annotations:\n    kubernetes.io/service-account.name:\
    \ test # (3)\ntype: kubernetes.io/service-account-token # (4)\n```\n\n(1) -> This\
    \ will be a **Secret** resource.\n(2) -> The name of our secret.\n(3) -> We annotate\
    \ the secret to indicate to Kubernetes that this secret will generate and hold\
    \ the token for the **test** service account.\n(4) -> This secret is of type **kubernetes.io/service-account-token**.\
    \ If you recall, we discussed that secrets are of different types in Kubernetes.\
    \ This is one such type.\n\n## Kubernetes annotations\n\nKubernetes annotations\
    \ are a flexible and optional mechanism that allows you to attach arbitrary non-identifying\
    \ metadata to Kubernetes objects. Unlike labels, which are used to organize and\
    \ select objects and resources within Kubernetes, annotations are not used to\
    \ identify and select resources. Annotations can hold larger and more complex\
    \ data than labels and are ideal for storing additional information that might\
    \ be used by tools, libraries, clients, or other external sources interacting\
    \ with Kubernetes objects.\n\n### Key Characteristics of Annotations\n\n- **Arbitrary\
    \ Metadata:** Annotations can store arbitrary metadata, which can include operational\
    \ information about objects, such as build/release timestamps, client library\
    \ information, debugging data, or contact information for the people responsible\
    \ for the object, among others.\n- **Not Used for Selection:** Unlike labels,\
    \ annotations are not meant to be used in queries or to organize resources into\
    \ collections. They are purely informational.\n- **Larger Data Capacity:** Annotations\
    \ can hold larger amounts of data than labels, making them suitable for storing\
    \ serialized JSON or YAML data, lengthy descriptions, and other non-compact data.\n\
    - **Tooling Integration:** They are often used by tools and extensions for storage\
    \ of configuration data, definitions, or command options that are not directly\
    \ supported by Kubernetes core resources.\n\nAnnotations, like labels, are key-value\
    \ pairs. They are defined in the metadata section of Kubernetes object definitions:\n\
    \n```yaml\nmetadata:\n  annotations:\n    example.com/annotation: \"This is an\
    \ example annotation\"\n    buildInfo: |\n      {\n        \"version\": \"v1.2.3\"\
    ,\n        \"buildDate\": \"2024-03-01T12:00:00Z\"\n      }\n```\n\nThe above\
    \ code is an example of annotation containing build information.\n\nIn our secret\
    \ example for the service account, the Kubernetes API server is the primary consumer\
    \ of this annotation. When a Secret of type **kubernetes.io/service-account-token**\
    \ is created, the API server reads the annotation to associate the Secret with\
    \ the specified service account (**test** in this case). This association is crucial\
    \ for the automatic management of service account tokens within Kubernetes.\n\n\
    ### Use Cases for Annotations\n\n- **Tracking Information:** Annotations can be\
    \ used to keep track of tools used for deployment, build information, timestamps,\
    \ release information, and more.\n- **Configuration and Management:** Some Kubernetes\
    \ components and third-party tools use annotations to configure behaviors, integrate\
    \ additional features, or manage component-specific information. For example,\
    \ Ingress controllers often use annotations to configure SSL, load balancer behavior,\
    \ and authentication.\n- **Development and Debugging:** Developers and operators\
    \ can use annotations to add debugging information, notes, or external references\
    \ (like ticket IDs or documentation links) that can help in understanding the\
    \ purpose and management of certain resources.\n\nWhen we create the secret and\
    \ describe it,\n\n```bash\n$ kubectl apply -f long-lived-token.yaml -n robust-setup\n\
    secret/test-llt created\n```\n\n```bash\n$ kubectl describe secret test-llt -n\
    \ robust-setup\nName:         test-llt\nNamespace:    robust-setup\nLabels:  \
    \     <none>\nAnnotations:  kubernetes.io/service-account.name: test\n       \
    \       kubernetes.io/service-account.uid: 67a83c4d-e55d-4c4d-821e-0f5acbff094e\n\
    \nType:  kubernetes.io/service-account-token\n\nData\n====\nca.crt:     1155 bytes\n\
    namespace:  12 bytes\ntoken:      eyJhbGciOiJSUzI1NiIsImtpZCI6InF1YUFrb3FDeTJHLWxwLVlaWUd2MVVDSlpuVzFFY1BaaUNyRGIxOTd1Wm8ifQ..pyskXzOFwQkVVcdsENfeuuuze0dNCaX38ePIDSbIwUdaMUDE-jKSm7XyuBRee_w6r3K8fPdCFAUjXyQ7wJocr3XWOyjzmyVJ3gf-gSgK7OjKsPe5JbcvlOyo8Q0zI7UZZ7CydKgcI-hfTMNpUYWeBXOyLOAaSSenkANWB5Dqwftg_BRKwE6-UQRXeOTkVBHNoOZ9Nut7eh6yIB_H_5EsswYk-bLgyBTrHxVPOXds_bTNctmimJOU2MRzl6S8Y842MKIgsBH-KkPYXeuk_i6oZ_HNlh8t1f3tDOnnuSis-nlPOm-fcgL1Lm20sA8LlG-j8nSdoWSOcUEZ1NwIuNIx4q21EA\n\
    ```\n\nWe can see that Kubernetes has attached a token to this secret. We can\
    \ use this token similar to previous steps and run kubectl commands.\n\n## Exercise\
    \ 32: Create a long lived token to access pod logs\n\nYou will notice that we\
    \ can't access the logs of the pod using this role. Change the role so that we\
    \ can access pod logs using a long lived token we created for this role.\n\n##\
    \ service accounts inside pods\n\nThere are many scenarios where we would want\
    \ to associate a service account with a pod. Kubernetes automatically mounts the\
    \ service account token and related credentials (CA certificates and namespace)\
    \ into pods using the associated service account. This eliminates the need for\
    \ manual credential management, making it easier to build and deploy secure, cloud-native\
    \ applications.\n\nThere are 2 broad scenarios where this is useful.\n\n- **Authentication:**\
    \ Service accounts provide an identity for pods to use when making requests to\
    \ the Kubernetes API, allowing for secure and authenticated API access. This is\
    \ essential for applications that need to interact with the Kubernetes system\
    \ to read or modify resources.\n- **Associating secrets with pods:** When we create\
    \ a service account, we can add existing secrets to that account in the YAML artifact.\
    \ Then, we associate the service account with a pod. This association is particularly\
    \ useful for automating the process of making credentials available to applications\
    \ running inside pods without hardcoding sensitive information. Kubernetes automatically\
    \ mounts these secrets into pods using the specified service account, providing\
    \ a secure way to store and manage sensitive information such as database passwords,\
    \ API keys, and SSH keys.\n\nHere's an example of a service account with a secret.\n\
    \n```yaml\napiVersion: v1\nkind: ServiceAccount\nmetadata:\n  name: my-service-account\n\
    secrets:\n- name: my-secret\n```\n\nWe will see a more detailed example of this.\
    \ Before that, we will associate a pod with the **test** service account and inspect\
    \ what happens.\n\n```yaml\napiVersion: v1\nkind: Pod\nmetadata:\n  name: service-account-test-pod\
    \ # (1)\nspec:\n  containers:\n```"
  mdcn: "## 练习 31：更新角色以获取服务\n\n除了 Pod 之外，增加角色/令牌的范围以包含服务。\n\n每次令牌过期都重新创建确实非常不便。因此\
    \ Kubernetes 允许我们创建长期有效的令牌。\n\n```yaml\napiVersion: v1\nkind: Secret # (1)\nmetadata:\n\
    \  name: test-llt # (2)\n  annotations:\n    kubernetes.io/service-account.name:\
    \ test # (3)\ntype: kubernetes.io/service-account-token # (4)\n```\n\n(1) -> 这将是一个\
    \ **Secret** 资源。\n(2) -> 我们 Secret 的名称。\n(3) -> 我们为 Secret 添加注解，以告知 Kubernetes\
    \ 此 Secret 将为 **test** 服务账户生成并持有令牌。\n(4) -> 此 Secret 的类型为 **kubernetes.io/service-account-token**。如果还记得，我们之前讨论过\
    \ Kubernetes 中 Secret 有不同的类型。这就是其中一种。\n\n## Kubernetes 注解\n\nKubernetes 注解是一种灵活且可选的机制，允许你将任意的非标识性元数据附加到\
    \ Kubernetes 对象上。与用于组织和选择 Kubernetes 内对象和资源的标签不同，注解不用于标识和选择资源。注解可以比标签容纳更大、更复杂的数据，非常适合存储可能被与\
    \ Kubernetes 对象交互的工具、库、客户端或其他外部来源使用的附加信息。\n\n### 注解的关键特性\n\n- **任意元数据：** 注解可以存储任意元数据，这些元数据可以包括关于对象的操作信息，例如构建/发布时间戳、客户端库信息、调试数据或负责该人员的联系信息等。\n\
    - **不用于选择：** 与标签不同，注解不用于查询或组织资源集合。它们纯粹是信息性的。\n- **更大的数据容量：** 注解可以比标签容纳更大量的数据，使其适合存储序列化的\
    \ JSON 或 YAML 数据、冗长的描述和其他非紧凑数据。\n- **工具集成：** 它们通常被工具和扩展用于存储配置数据、定义或 Kubernetes\
    \ 核心资源不直接支持的命令选项。\n\n注解与标签一样，是键值对。它们在 Kubernetes 对象定义的 metadata 部分中定义：\n\n```yaml\n\
    metadata:\n  annotations:\n    example.com/annotation: \"This is an example annotation\"\
    \n    buildInfo: |\n      {\n        \"version\": \"v1.2.3\",\n        \"buildDate\"\
    : \"2024-03-01T12:00:00Z\"\n      }\n```\n\n以上代码是一个包含构建信息的注解示例。\n\n在我们用于服务账户的\
    \ Secret 示例中，Kubernetes API 服务器是此注解的主要消费者。当创建类型为 **kubernetes.io/service-account-token**\
    \ 的 Secret 时，API 服务器会读取注解以将 Secret 与指定的服务账户（本例中为 **test**）关联起来。这种关联对于 Kubernetes\
    \ 中服务账户令牌的自动管理至关重要。\n\n### 注解的用例\n\n- **跟踪信息：** 注解可用于跟踪部署所用的工具、构建信息、时间戳、发布信息等。\n\
    - **配置和管理：** 一些 Kubernetes 组件和第三方工具使用注解来配置行为、集成附加功能或管理特定于组件的信息。例如，Ingress 控制器通常使用注解来配置\
    \ SSL、负载均衡器行为和身份验证。\n- **开发和调试：** 开发人员和运维人员可以使用注解添加调试信息、注释或外部引用（如工单 ID 或文档链接），这些信息有助于理解某些资源的用途和管理。\n\
    \n当我们创建 Secret 并查看它时，\n\n```bash\n$ kubectl apply -f long-lived-token.yaml -n\
    \ robust-setup\nsecret/test-llt created\n```\n\n```bash\n$ kubectl describe secret\
    \ test-llt -n robust-setup\nName:         test-llt\nNamespace:    robust-setup\n\
    Labels:       <none>\nAnnotations:  kubernetes.io/service-account.name: test\n\
    \              kubernetes.io/service-account.uid: 67a83c4d-e55d-4c4d-821e-0f5acbff094e\n\
    \nType:  kubernetes.io/service-account-token\n\nData\n====\nca.crt:     1155 bytes\n\
    namespace:  12 bytes\ntoken:      eyJhbGciOiJSUzI1NiIsImtpZCI6InF1YUFrb3FDeTJHLWxwLVlaWUd2MVVDSlpuVzFFY1BaaUNyRGIxOTd1Wm8ifQ..pyskXzOFwQkVVcdsENfeuuuze0dNCaX38ePIDSbIwUdaMUDE-jKSm7XyuBRee_w6r3K8fPdCFAUjXyQ7wJocr3XWOyjzmyVJ3gf-gSgK7OjKsPe5JbcvlOyo8Q0zI7UZZ7CydKgcI-hfTMNpUYWeBXOyLOAaSSenkANWB5Dqwftg_BRKwE6-UQRXeOTkVBHNoOZ9Nut7eh6yIB_H_5EsswYk-bLgyBTrHxVPOXds_bTNctmimJOU2MRzl6S8Y842MKIgsBH-KkPYXeuk_i6oZ_HNlh8t1f3tDOnnuSis-nlPOm-fcgL1Lm20sA8LlG-j8nSdoWSOcUEZ1NwIuNIx4q21EA\n\
    ```\n\n我们可以看到 Kubernetes 已经将一个令牌附加到了这个 Secret 上。我们可以像之前的步骤一样使用这个令牌来运行 kubectl\
    \ 命令。\n\n## 练习 32：创建长期有效的令牌以访问 Pod 日志\n\n你会注意到我们无法使用此角色访问 Pod 的日志。更改角色，以便我们可以使用为此角色创建的长期有效令牌来访问\
    \ Pod 日志。\n\n## Pod 内部的服务账户\n\n在许多场景中，我们希望将服务账户与 Pod 关联起来。Kubernetes 使用关联的服务账户自动将服务账户令牌和相关凭证（CA\
    \ 证书和命名空间）挂载到 Pod 中。这消除了手动管理凭证的需要，使得构建和部署安全的云原生应用程序变得更加容易。\n\n这在两种主要场景中非常有用。\n\
    \n- **身份验证：** 服务账户为 Pod 在向 Kubernetes API 发出请求时提供身份，从而实现安全且经过身份验证的 API 访问。这对于需要与\
    \ Kubernetes 系统交互以读取或修改资源的应用程序至关重要。\n- **将 Secret 与 Pod 关联：** 当我们创建服务账户时，我们可以在\
    \ YAML 文件中将现有的 Secret 添加到该账户。然后，我们将服务账户与 Pod 关联起来。这种关联对于自动化将凭证提供给在 Pod 内运行的应用程序的过程特别有用，无需硬编码敏感信息。Kubernetes\
    \ 使用指定的服务账户自动将这些 Secret 挂载到 Pod 中，提供了一种安全的方式来存储和管理敏感信息，如数据库密码、API 密钥和 SSH 密钥。\n\
    \n这是一个带有 Secret 的服务账户示例。\n\n```yaml\napiVersion: v1\nkind: ServiceAccount\nmetadata:\n\
    \  name: my-service-account\nsecrets:\n- name: my-secret\n```\n\n我们将看到一个更详细的例子。在此之前，我们将一个\
    \ Pod 与 **test** 服务账户关联起来，并检查会发生什么。\n\n```yaml\napiVersion: v1\nkind: Pod\nmetadata:\n\
    \  name: service-account-test-pod # (1)\nspec:\n  containers:\n```"
