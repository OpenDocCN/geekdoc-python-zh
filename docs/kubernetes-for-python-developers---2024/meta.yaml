    \ deployment spec.\n\n```\napiVersion: apps/v1\nkind: Deployment\nmetadata:\n\
    \  name: simple-flask\n  namespace: dev\nspec:\n  replicas: 4\n  strategy:\n \
    \   type: RollingUpdate\n    rollingUpdate:\n      maxUnavailable: 1\n      maxSurge:\
    \ 1\n  selector:\n    matchLabels:\n      app: flask\n  template:\n    metadata:\n\
    \      labels:\n        app: flask\n    spec:\n      containers:\n      - name:\
    \ flask\n        image: ghcr.io/<your-username>/flask-app:1.0\n        ports:\n\
    \          - containerPort: 8080\n```\n\n## Exercise 22: Make a change and re-deploy\n\
    \nChange the <title> tag content to \"Flask Redis app\" and redeploy a new image.\n\
