    # liveness probes


    Liveness probes are used in Kubernetes to determine if a container is running
    as expected. If a liveness probe fails, the kubelet kills the container, which
    will be restarted according to its restart policy. Liveness probes are crucial
    for self-healing in applications that might become unresponsive over time due
    to deadlocks or other issues, even though the application process is still running.


    Here''s an example of a Pod specification that includes a liveness probe for an
    Nginx container. This example uses an HTTP GET request as the liveness probe,
    which is one of the common methods for checking container health. The kubelet
    sends an HTTP GET request to the Nginx server inside the container; if the server
    fails to respond with a success status (200-399), the container will be restarted.'
  merge: -1
  pgno: 132
- img_proc: true
  md: "```\napiVersion: v1\nkind: Pod\nmetadata:\n  name: nginx-with-liveness\nspec:\n\
    \  containers:\n  - name: nginx\n    image: nginx\n    ports:\n    - containerPort:\
    \ 80\n    livenessProbe: # (1)\n      httpGet: # (2)\n        path: /\n      \
    \  port: 80 # (3)\n      initialDelaySeconds: 15 # (4)\n      timeoutSeconds:\
    \ 2 # (5)\n      periodSeconds: 5 # (6)\n      failureThreshold: 3 # (7)\n```\n\
    \n(1) -> This specifies an HTTP GET request for the liveness probe. The kubelet\
    \ sends this request to the container's IP address on a specified port and path."
  merge: -1
  pgno: 133
- img_proc: true
  md: '(2) -> The URL path that the probe requests. This example uses the root path
    ( / ), which is a common end-point for checking the health of web servers.


    (3) -> The port on which the kubelet will send the HTTP GET request. This should
    match the port on which the Nginx server is listening, 80 in this case.


    (4) -> Number of seconds after the container has started before the liveness probe
    is initiated. This gives the application time to boot up before it starts getting
    checked. In this example, it''s set to **15** seconds.


    (5) -> Number of seconds after which the probe times out. If the Nginx server
    does not respond within **2** seconds, the probe is considered failed.


    (6) -> Specifies how often (in seconds) to perform the probe. This example checks
    the health of the Nginx server every **5** seconds.


    (7) -> Number of times the probe can fail before the kubelet decides to kill and
    restart the container. In this example, the Nginx container will be restarted
    if it fails the liveness check 3 times in a row.


    This configuration ensures that if the Nginx server inside the container becomes
    unresponsive (for example, it starts returning error codes or stops responding
    entirely), the kubelet will automatically restart the container, potentially resolving
    the issue without manual intervention. Liveness probes are a key part of ensuring
    the reliability and resilience of applications running in Kubernetes.


    # Readiness probe


    Readiness probes in Kubernetes are used to determine when a container is ready
    to start accepting traffic.'
