    \ of the resource definition.\n\n(2) -> Defines the kind of Kubernetes resource\
    \ to create. In this case, a **Service**, which is used to expose applications\
    \ running on a set of Pods as a network service.\n\n(3) -> Used to select the\
    \ Pods that this Service will target and route traffic to. The Service will manage\
    \ all Pods with labels that match this selector. **Note** that this applies to\
    \ only pods in the same namespace as that of the service."
