    # init containers


    Init Containers are specialized containers that run before app containers in a
    Pod. They are executed in sequence, each one completing successfully before the
    next is started. If any init container fails, Kubernetes repeatedly restarts the
    Pod until the init container succeeds. They are perfect for setup scripts or utilities
    that are not part of the main application but must run before the application
    starts.'
