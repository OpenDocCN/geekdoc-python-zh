  md: '# # Chapter 2: Containers recap


    Unlike virtual machines that each require a full copy of an operating system,
    containers share the host system''s kernel and isolate the application processes
    from each other. This leads to lower overhead, higher density of applications
    running on the same hardware, and ultimately, cost savings on infrastructure.
    Furthermore, the lightweight nature of containers and their rapid startup times
    are ideal for scaling applications in response to demand, enhancing the application''s
    availability and performance.


    Using containers also simplifies application management and updates. With containers,
    updating an application or rolling back to a previous version can be as simple
    as stopping a container and starting a new one with the updated image. This atomicity
    and speed in managing application versions are invaluable in today''s fast-paced
    development environments where agility and responsiveness are key to staying competitive.


    Should you also run containers locally, during development? The short answer is
    yes. But allow me to elaborate. By containerizing an application locally, you
    ensure that it runs within an isolated environment that closely mirrors production.
    This "build once, run anywhere" approach significantly reduces the "it works on
    my machine" syndrome, a common pitfall where code behaves differently in development
    than in production due to environmental discrepancies. Containers abstract away
    the underlying differences in OS, libraries, and dependencies, making applications
    more portable and less prone to environmental issues.'
  merge: -1
  pgno: 28
- img_proc: true
  md: 'Besides, containers facilitate a smoother transition from development to production.
    The container that developers use locally is the same container that gets deployed
    to production, which streamlines the development lifecycle and minimizes the risk
    of deployment errors. This seamless integration is a boon for implementing continuous
    integration and continuous deployment (CI/CD) pipelines, allowing for faster and
    more reliable software releases.


    # How containers work


    Under the hood, containers leverage several key Linux kernel features: namespaces,
    cgroups, and overlay filesystems, each playing a crucial role in providing the
    isolation and resource management that make containers so powerful.'
  merge: -1
  pgno: 29
- img_proc: true
  md: '![](img/91c4bde832e221ba5bc429caf9587286_30_0.png)


    # Container architecture


    Namespaces are a feature of the Linux kernel that partitions kernel resources
    so that each set appears to have its own isolated instance to processes within
    that namespace. This means that processes running'
  merge: -1
  pgno: 30
- img_proc: true
  md: 'in one namespace are unable to see or affect processes running in another namespace,
    making it possible for multiple containers to run on the same host without interfering
    with each other. For example, the PID (Process ID) namespace isolates the process
    ID number space, meaning that a process in one PID namespace can have the same
    PID as a process in another namespace. This isolation extends to other system
    resources such as network interfaces, mount points, and inter-process communication
    resources.


    In short, a namespace makes a process running inside that namespace believe it
    has its own instance of that resource. A namespace can limit visibility to certain
    process trees, network interfaces, user IDs, or filesystem mounts.


    Control Groups (cgroups) are another key feature used by containers to manage
    and limit the amount of resources a process or group of processes can use. This
    ensures that no single container can monopolize system resources, such as CPU,
    memory, and I/O bandwidth, thereby maintaining the overall stability and performance
    of the host system. For instance, you could have a container running a web server
    that''s limited to using 50% of the CPU and 1GB of memory, ensuring that other
    containers running on the same host have access to the remaining resources.


    To run an instance of an Ubuntu container and set the memory limit to 1 GB and
    access to 1 CPU the command is:


    ```

    $ docker run -it --memory="1g" -cpus="1.0" ubuntu

    ```


    Overlay Filesystems enable containers to be lightweight and fast. An overlay filesystem
    combines multiple directories into a single directory view, making it possible
    to overlay a writable directory (where a container writes its changes) on top
    of a read-only directory (the container image). This means when a con-'
  merge: -1
  pgno: 31
- img_proc: true
  md: 'tainer modifies a file, the change is recorded in the writable layer without
    altering the underlying image. This approach supports container immutability and
    portability, as the base image remains unchanged and can be used to spawn new
    containers, while only the changes are stored and managed separately.


    To illustrate how these components work together, imagine deploying a simple Python
    web application in a container. When the container starts, namespaces ensure that
    the web application''s processes run in an isolated environment, unaware of processes
    in other containers or on the host system. If the application tries to access
    the network, it does so using network interfaces isolated by its namespace. Cgroups
    limit the application''s CPU and memory usage, preventing it from exhausting the
    host''s resources. Finally, the application reads from an overlay filesystem,
    where its base image is mounted read-only, and any changes are written to a separate
    writable layer. When the container is stopped or deleted, the writable layer can
    be removed, while the base image remains unchanged, ready to be reused.


    In summary, containers rely on namespaces for process isolation, cgroups for resource
    management, and overlay filesystems for efficient storage, working together to
    provide a lightweight, isolated, and efficient environment for running applications.


    Let''s go through a hands-on example that illustrates the concepts of namespaces,
    cgroups, and overlay filesystems by running a simple Docker container. Docker
    abstracts these lower-level details, making it easier to understand how containers
    utilize these features without manually manipulating them. For this example, we''ll
    run an Ubuntu container, install a basic tool, and inspect how it''s isolated
    from the host.


    # Namespaces and cgroups


    First, let''s run an Ubuntu container in interactive mode and attach a terminal
    to it. This will allow us to'
