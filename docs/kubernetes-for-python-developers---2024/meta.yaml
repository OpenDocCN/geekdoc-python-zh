    A kubernetes cluster comprises of at least 1 control plane node and worker plan
    nodes.


    The control plane node is responsible for managing the state of the cluster. It
    schedules applications, manages deployments and scaling, and maintains the desired
    state of the applications. The control plane''s components include the kube-apiserver,
    etcd storage, kube-scheduler, kube-controller-manager, and cloud-controller-manager.


    The worker nodes run the actual applications and workloads. Each worker node has
    a Kubelet, which is an agent for managing the state of the node and communicating
    with the Kubernetes master. Worker nodes also run services necessary to route
    traffic and allow containers to communicate with each other, such as the kube-proxy
    and the container runtime.'
