    In a production setting, you would generate certificates using [certbot](https://certbot.eff.org/)
    and install them as secrets in your cluster. Better yet, you would use an in-cluster
    controller called [Cert manager](https://cert-manager.io/) to generate certificates
    automatically and renew them.


    # Summary


    In this chapter, we explored several key Kubernetes concepts and how they can
    be applied to deploy, manage, and expose applications like Redis in a Kubernetes
    environment. Let''s recap the critical takeaways and understand how they fit together
    in the broader context of Kubernetes orchestration.


    # Understanding StatefulSets with Redis


    We delved into StatefulSets, an essential Kubernetes resource for managing stateful
    applications such as Redis. Unlike Deployments, StatefulSets maintain a sticky
    identity for each of their Pods, making them ideal for scenarios where pod identity,
    stable network identifiers, and persistent storage are crucial. By using StatefulSets
    for Redis, we saw how to ensure that our Redis instances are managed predictably
    and reliably, preserving data and ensuring consistent networking even through
    rescheduling and restarts.'
- md: "## Creating and Managing Service Accounts\n\nService accounts are pivotal for\
    \ granting permissions and managing access within Kubernetes. We learned how to\
    \ create and manage these accounts, providing our applications and Pods specific\
    \ permissions to interact with the Kubernetes API. This is crucial for maintaining\
    \ security and ensuring that applications have only the access they need, nothing\
    \ more, nothing less.\n\n## Spreading Pods Across Nodes\n\nWe explored strategies\
    \ to distribute Pods across nodes effectively, enhancing fault tolerance and improving\
    \ application availability. Using affinity and anti-affinity rules, we can influence\
    \ the scheduler's decisions, ensuring our application components are spread out\
    \ to avoid single points of failure. This is especially important in production\
    \ environments where high availability is paramount.\n\n## Ingresses and Ingress\
    \ Controllers\n\nIngress resources and Ingress controllers were covered in detail,\
    \ highlighting their role in managing external access to services within a Kubernetes\
    \ cluster. We saw how Ingresses could define rules for routing external HTTP(S)\
    \ traffic to internal services, making applications accessible from the outside\
    \ world. Coupled with Ingress controllers, like NGINX, we learned how to implement\
    \ advanced traffic management features such as SSL/TLS termination, path-based\
    \ routing, and rate limiting, significantly enhancing the security and efficiency\
    \ of application exposure.\n\nThis chapter provided a comprehensive overview of\
    \ managing stateful applications with StatefulSets, utilizing service accounts\
    \ for secure API access, strategically distributing Pods across the cluster for\
    \ high availability, and effectively exposing applications to the outside world\
    \ using Ingress resources and controllers. Each of these components plays a vital\
    \ role in the Kubernetes ecosystem, offering the tools and mechanisms needed to\
    \ deploy, manage, and scale applications reliably and securely in a cloud-native\
    \ environment.\n\nBy mastering these concepts, you're well-equipped to harness\
    \ the full potential of Kubernetes, paving the way for scalable, resilient, and\
    \ efficient application deployment and management strategies that are crucial\
    \ for modern software environments.\n\n## Chapter 9: Closing thoughts\n\nAs we\
    \ conclude our journey through \"Kubernetes for Python Developers,\" we've traversed\
    \ the foundational landscapes that make Kubernetes the powerhouse it is for orchestrating\
    \ containerized applications. From deploying stateful applications with StatefulSets\
    \ to mastering the intricacies of service accounts, and from the strategic spread\
    \ of pods across nodes to leveraging the dynamic world of Ingress and Ingress\
    \ controllers, we've covered significant ground. This knowledge isn't just theoretical;\
    \ it's profoundly practical and forms the bedrock upon which we can confidently\
    \ deploy production-grade applications.\n\n## Deploying to Kubernetes with confidence\n\
    \nOur final endeavor will be to encapsulate our learning into action by constructing\
    \ a GitHub Continuous Deployment (CD) pipeline for a Flask-Redis application.\
    \ This pipeline embodies the essence of modern DevOps practices, integrating our\
    \ application's build, test, and deployment processes into a seamless workflow.\
    \ By automating deployments, we minimize human error, increase efficiency, and\
    \ ensure that our application can be reliably deployed to production at any time.\n\
    \nThis pipeline not only automates the deployment process but also showcases the\
    \ application of Kubernetes' core concepts in a real-world scenario. It emphasizes\
    \ the importance of containerization, orchestrated deployment, and network configuration,\
    \ underlining how Kubernetes facilitates each step to ensure that our application\
    \ is resilient, scalable, and easily manageable.\n\n## Setting up the CD pipeline\n\
    \nThe application and the accompanying CD pipeline can be found in the [https://github.com/badri/flask-redis-cd](https://github.com/badri/flask-redis-cd)\
    \ repository.\n\nHere's how the structure looks like:\n\n```\n.\n├── .dockerignore\n\
    ├── .github\n│   └── workflows\n│       └── cd.yml # (1)\n├── .gitignore\n├──\
    \ Dockerfile # (2)\n├── app.py # (3)\n├── docker-compose.yml # (4)\n├── entrypoint.sh\n\
    ├── kubernetes # (5)\n│   ├── check-redis.sh\n│   ├── flask-config.yaml\n│   ├──\
    \ flask-redis.example.com.crt\n│   ├── flask-redis.example.com.key\n│   └── flask.yaml\
    \ # (6)\n├── redis-init.sh\n├── redis.conf\n├── redis.yaml\n├── requirements.txt\
    \ # (7)\n└── templates\n    └── index.html\n```\n\n- (1) -> The standard location\
    \ for the github CD pipeline code. We will walk through this file in detail.\n\
    - (2) -> The dockerfile used to build the application image.\n- (3) -> The main\
    \ application source code.\n- (4) -> A docker compose setup used to test the setup\
    \ locally.\n- (5) -> The **kubernetes** folder contains the artefacts required\
    \ to deploy the application in Kubernetes.\n- (6) -> The main YAML file which\
    \ contains the flask-redis deployment, service and ingress. This will be used\
    \ in the CD pipeline. The other files will only be used to setup the first version\
    \ of the application.\n- (7) -> Used to install application libraries and dependencies.\n\
    \n## Setting up the scaffold\n\nBefore we build a pipeline, we first have to create\
    \ the scaffold necessary to run that pipeline. When the developer \"git push\"\
    es the code, the pipeline will build a new container image and push it to the\
    \ ghcr registry. This will be followed by redeploying the application with the\
    \ new container image and running any optional tests after that.\n\nThe pipeline\
    \ assumes that,\n\n1. The namespace is already created.\n2. All the other scaffoldings\
    \ like secrets (including image pull secrets), configmaps and Redis services are\
    \ already present.\n\nThe pipeline also needs a service account to create and\
    \ manage resources within that namespace.\n\nLet's create all this. We will start\
    \ with the namespace.\n\n```\n$ kubectl create namespace dev\n```\n\nNext, we\
    \ will create a **ClusterRole** which we will associate with the service account.\
    \ As this is a cluster-wide resource, we don't need to specify a namespace.\n\n\
    ```yaml\napiVersion: rbac.authorization.k8s.io/v1\nkind: ClusterRole\nmetadata:\n\
    \  name: continuous-deployment # (1)\nrules:\n  - apiGroups: # (2)\n    - \"\"\
    \n    - apps\n    - networking.k8s.io\n  resources: # (3)\n    - namespaces\n\
    \    - deployments\n    - replicasets\n    - ingresses\n    - services\n    -\
    \ secrets\n    - pvcs\n    - statefulsets\n    - configmaps\n  verbs: # (4)\n\
    \    - create\n    - delete\n    - deletecollection\n    - get\n    - list\n \
    \   - patch\n    - update\n    - watch\n```\n\n- (1) -> The name of our cluster\
    \ role.\n- (2) -> The list of API groups to which all the resources belong to.\
    \ Most core resources don't need an API group. The **apps** is for deployments\
    \ and **networking.k8s.io** is for ingresses.\n- (3) -> The list of resources\
    \ for which we need access to. These are resources we will end up creating and\
    \ managing through the pipeline. Feel free to make this as less/more permissive\
    \ as needed.\n- (4) -> The list of verbs/actions which a service account with\
    \ this cluster role can do on the above resources.\n\n```\n$ kubectl apply -f\
    \ cd-clusterrole.yaml\nclusterrole.rbac.authorization.k8s.io/continuous-deployment\
    \ created\n```\n\nWe will also create a service account.\n\n```\n$ kubectl create\
    \ serviceaccount github\nserviceaccount/github created\n```\n\nNext, we shall\
    \ create a cluster role binding to associate **github** service account with **continuous-deployment**\
    \ cluster role.\n\n```yaml\napiVersion: rbac.authorization.k8s.io/v1\nkind: ClusterRoleBinding\
    \ # (1)\nmetadata:\n  name: continuous-deployment # (2)\nsubjects:\n- kind: ServiceAccount\
    \ # (3)\n  name: github # (4)\n  namespace: default # (5)\nroleRef:\n  kind: ClusterRole\
    \ # (6)\n  name: continuous-deployment # (7)\n  apiGroup: rbac.authorization.k8s.io\n\
    ```\n\n- (1) -> This is a resource of type **ClusterRoleBinding**.\n- (2) -> The\
    \ name is arbitrary. Preferably something meaningful.\n- (3) -> What kind of subject\
    \ we are associating the cluster role binding with. In our case, it is **ServiceAccount**.\n\
    - (4) -> Name of the subject.\n- (5) -> What namespace the subject belongs to.\
    \ We created the **github** service account in the default namespace.\n- (6) ->\
    \ What role are we associating with. It is of kind **ClusterRole**.\n- (7) ->\
    \ Whose name is **continuous-deployment**.\n\nWe will create this cluster role\
    \ binding.\n\n```\n$ kubectl apply -f github-clusterrole-binding.yaml\nclusterrolebinding.rbac.authorization.k8s.io/continuous-deployment\
    \ created\n```\n\nNext, we will create a secret which will hold the token for\
    \ this service account.\n\n```yaml\napiVersion: v1\nkind: Secret\nmetadata:\n\
    ```"
  mdcn: "## 创建和管理服务账户\n\n服务账户对于在 Kubernetes 中授予权限和管理访问至关重要。我们学习了如何创建和管理这些账户，为我们的应用程序和\
    \ Pod 提供与 Kubernetes API 交互的特定权限。这对于维护安全性和确保应用程序仅拥有其所需的访问权限（不多也不少）至关重要。\n\n##\
    \ 将 Pod 分布在节点上\n\n我们探讨了有效将 Pod 分布在节点上的策略，以增强容错能力和提高应用程序可用性。通过使用亲和性和反亲和性规则，我们可以影响调度器的决策，确保我们的应用程序组件被分散开，以避免单点故障。这在生产环境中尤为重要，因为高可用性是至关重要的。\n\
    \n## Ingress 和 Ingress 控制器\n\n我们详细介绍了 Ingress 资源和 Ingress 控制器，强调了它们在管理 Kubernetes\
    \ 集群内服务外部访问方面的作用。我们看到了 Ingress 如何定义规则，将外部 HTTP(S) 流量路由到内部服务，使应用程序可以从外部访问。结合 Ingress\
    \ 控制器（如 NGINX），我们学习了如何实现高级流量管理功能，例如 SSL/TLS 终止、基于路径的路由和速率限制，显著增强了应用程序暴露的安全性和效率。\n\
    \n本章全面概述了使用 StatefulSets 管理有状态应用程序、利用服务账户进行安全的 API 访问、战略性地将 Pod 分布在集群中以实现高可用性，以及使用\
    \ Ingress 资源和控制器有效地将应用程序暴露给外部世界。这些组件中的每一个都在 Kubernetes 生态系统中扮演着至关重要的角色，提供了在云原生环境中可靠且安全地部署、管理和扩展应用程序所需的工具和机制。\n\
    \n通过掌握这些概念，你已准备好充分利用 Kubernetes 的潜力，为可扩展、有弹性且高效的应用程序部署和管理策略铺平道路，这些策略对于现代软件环境至关重要。\n\
    \n## 第 9 章：结语\n\n随着我们结束《面向 Python 开发者的 Kubernetes》之旅，我们已经穿越了使 Kubernetes 成为容器化应用程序编排强大工具的基础领域。从使用\
    \ StatefulSets 部署有状态应用程序，到掌握服务账户的复杂性，再到将 Pod 战略性地分布在节点上，以及利用 Ingress 和 Ingress\
    \ 控制器的动态世界，我们已经涵盖了重要的内容。这些知识不仅仅是理论性的；它非常实用，并构成了我们可以自信地部署生产级应用程序的基石。\n\n## 自信地部署到\
    \ Kubernetes\n\n我们的最终任务是将我们的学习转化为行动，为 Flask-Redis 应用程序构建一个 GitHub 持续部署 (CD) 流水线。这条流水线体现了现代\
    \ DevOps 实践的精髓，将我们应用程序的构建、测试和部署过程集成到一个无缝的工作流中。通过自动化部署，我们最大限度地减少人为错误，提高效率，并确保我们的应用程序可以随时可靠地部署到生产环境。\n\
    \n这条流水线不仅自动化了部署过程，还展示了 Kubernetes 核心概念在现实场景中的应用。它强调了容器化、编排部署和网络配置的重要性，突出了 Kubernetes\
    \ 如何促进每一步，以确保我们的应用程序具有弹性、可扩展且易于管理。\n\n## 设置 CD 流水线\n\n应用程序和随附的 CD 流水线可以在 [https://github.com/badri/flask-redis-cd](https://github.com/badri/flask-redis-cd)\
    \ 仓库中找到。\n\n结构如下所示：\n\n```\n.\n├── .dockerignore\n├── .github\n│   └── workflows\n\
    │       └── cd.yml # (1)\n├── .gitignore\n├── Dockerfile # (2)\n├── app.py # (3)\n\
    ├── docker-compose.yml # (4)\n├── entrypoint.sh\n├── kubernetes # (5)\n│   ├──\
    \ check-redis.sh\n│   ├── flask-config.yaml\n│   ├── flask-redis.example.com.crt\n\
    │   ├── flask-redis.example.com.key\n│   └── flask.yaml # (6)\n├── redis-init.sh\n\
    ├── redis.conf\n├── redis.yaml\n├── requirements.txt # (7)\n└── templates\n  \
    \  └── index.html\n```\n\n- (1) -> GitHub CD 流水线代码的标准位置。我们将详细讲解此文件。\n- (2) ->\
    \ 用于构建应用程序镜像的 Dockerfile。\n- (3) -> 主要的应用程序源代码。\n- (4) -> 用于在本地测试设置的 Docker Compose\
    \ 配置。\n- (5) -> **kubernetes** 文件夹包含在 Kubernetes 中部署应用程序所需的工件。\n- (6) -> 包含 flask-redis\
    \ 部署、服务和 Ingress 的主要 YAML 文件。这将用于 CD 流水线。其他文件仅用于设置应用程序的第一个版本。\n- (7) -> 用于安装应用程序库和依赖项。\n\
    \n## 设置脚手架\n\n在构建流水线之前，我们首先必须创建运行该流水线所需的脚手架。当开发者 \"git push\" 代码时，流水线将构建一个新的容器镜像并将其推送到\
    \ ghcr 注册表。随后将使用新的容器镜像重新部署应用程序，并在之后运行任何可选的测试。\n\n该流水线假设，\n\n1. 命名空间已创建。\n2. 所有其他脚手架（包括\
    \ secrets（包括镜像拉取 secrets）、configmaps 和 Redis 服务）都已存在。\n\n流水线还需要一个服务账户来在该命名空间内创建和管理资源。\n\
    \n让我们创建所有这些。我们将从命名空间开始。\n\n```\n$ kubectl create namespace dev\n```\n\n接下来，我们将创建一个\
    \ **ClusterRole**，并将其与服务账户关联。由于这是一个集群范围的资源，我们不需要指定命名空间。\n\n```yaml\napiVersion:\
    \ rbac.authorization.k8s.io/v1\nkind: ClusterRole\nmetadata:\n  name: continuous-deployment\
    \ # (1)\nrules:\n  - apiGroups: # (2)\n    - \"\"\n    - apps\n    - networking.k8s.io\n\
    \  resources: # (3)\n    - namespaces\n    - deployments\n    - replicasets\n\
    \    - ingresses\n    - services\n    - secrets\n    - pvcs\n    - statefulsets\n\
    \    - configmaps\n  verbs: # (4)\n    - create\n    - delete\n    - deletecollection\n\
    \    - get\n    - list\n    - patch\n    - update\n    - watch\n```\n\n- (1) ->\
    \ 我们的集群角色的名称。\n- (2) -> 所有资源所属的 API 组列表。大多数核心资源不需要 API 组。**apps** 用于 deployments，**networking.k8s.io**\
    \ 用于 ingresses。\n- (3) -> 我们需要访问权限的资源列表。这些是我们最终将通过流水线创建和管理的资源。请根据需要随意调整其权限范围。\n\
    - (4) -> 拥有此集群角色的服务账户可以对上述资源执行的动词/操作列表。\n\n```\n$ kubectl apply -f cd-clusterrole.yaml\n\
    clusterrole.rbac.authorization.k8s.io/continuous-deployment created\n```\n\n我们还将创建一个服务账户。\n\
    \n```\n$ kubectl create serviceaccount github\nserviceaccount/github created\n\
    ```\n\n接下来，我们将创建一个集群角色绑定，将 **github** 服务账户与 **continuous-deployment** 集群角色关联起来。\n\
    \n```yaml\napiVersion: rbac.authorization.k8s.io/v1\nkind: ClusterRoleBinding\
    \ # (1)\nmetadata:\n  name: continuous-deployment # (2)\nsubjects:\n- kind: ServiceAccount\
    \ # (3)\n  name: github # (4)\n  namespace: default # (5)\nroleRef:\n  kind: ClusterRole\
    \ # (6)\n  name: continuous-deployment # (7)\n  apiGroup: rbac.authorization.k8s.io\n\
    ```\n\n- (1) -> 这是一个 **ClusterRoleBinding** 类型的资源。\n- (2) -> 名称是任意的。最好是有意义的名称。\n\
    - (3) -> 我们将集群角色绑定与哪种类型的主体关联。在我们的例子中，是 **ServiceAccount**。\n- (4) -> 主体的名称。\n\
    - (5) -> 主体所属的命名空间。我们在默认命名空间中创建了 **github** 服务账户。\n- (6) -> 我们关联的角色是什么。它是 **ClusterRole**\
    \ 类型。\n- (7) -> 其名称为 **continuous-deployment**。\n\n我们将创建此集群角色绑定。\n\n```\n$ kubectl\
    \ apply -f github-clusterrole-binding.yaml\nclusterrolebinding.rbac.authorization.k8s.io/continuous-deployment\
    \ created\n```\n\n接下来，我们将创建一个 secret，用于保存此服务账户的令牌。\n\n```yaml\napiVersion: v1\n\
    kind: Secret\nmetadata:\n```"
