- md: "## A word about deployment pod names\n\nIn Kubernetes, when a Deployment creates\
    \ Pods, the names of these Pods are automatically generated by appending a unique\
    \ identifier to the name of the ReplicaSet managing those Pods. This unique identifier\
    \ consists of a random string, which includes hexadecimal characters, ensuring\
    \ that each Pod name within the same ReplicaSet is unique.\n\nHere's a breakdown\
    \ of how the Pod names are constructed:\n\n**Deployment Name:** The base name\
    \ you give to your Deployment.\n\n**ReplicaSet Suffix:** When a Deployment creates\
    \ a ReplicaSet, it appends a unique hash to the Deployment's name to form the\
    \ ReplicaSet's name. This hash is a deterministic function of the Deployment's\
    \ Pod template (meaning it changes if and only if the Pod template changes).\n\
    \n**Pod Suffix:** Each Pod created by the ReplicaSet gets a further unique alphanumeric\
    \ string appended to the ReplicaSet's name, ensuring each Pod's name is unique.\
    \ This suffix often contains hexadecimal characters.\n\nFor example, if you have\
    \ a Deployment named nginx-deployment, it might create a ReplicaSet named **nginx-deployment-75675f5897**\
    \ (where **75675f5897** is a hash based on the Pod template). Each Pod managed\
    \ by this ReplicaSet might have names like **nginx-deployment-75675f5897-qwerty**\
    \ and **nginx-deployment-75675f5897-asdfgh**, where **qwerty** and **asdfgh**\
    \ are unique alphanumeric strings that include hexadecimal characters.\n\nThe\
    \ hexadecimal characters in the Pod name (part of the unique hash and unique alphanumeric\
    \ string) represent values in the hexadecimal numeral system (base 16), consisting\
    \ of digits from 0 to 9 and letters from a to f (or A to F). These characters\
    \ are part of the encoding used to represent binary data in a compact and human-readable\
    \ form.\n\nIt's worth noting that the exact method Kubernetes uses to generate\
    \ these hashes and unique strings may evolve over time, but the principle of using\
    \ a base Deployment name, followed by a ReplicaSet hash, followed by a unique\
    \ Pod identifier, remains a consistent approach to ensure uniqueness and traceability\
    \ of Pods within a Deployment.\n\n## Recreate strategy\n\nThe Recreate strategy\
    \ terminates all the old versions of the pods before new ones are created, leading\
    \ to downtime but ensuring that no two versions are running simultaneously.\n\n\
    ```yaml\napiVersion: apps/v1\nkind: Deployment\nmetadata:\n  name: nginx-deployment\n\
    spec:\n  replicas: 3\n  strategy:\n    type: Recreate # (1)\n  selector:\n   \
    \ matchLabels:\n    app: nginx\n  template:\n    metadata:\n      labels:\n  \
    \      app: nginx\n    spec:\n      containers:\n      - name: nginx\n       \
    \ image: nginx:1.25.1\n        ports:\n        - containerPort: 80\n```\n\n(1)\
    \ -> This configuration ensures that all old pods are deleted before any new pods\
    \ are created.\n\n## Exercise 20: Create a deployment for nginx using the recreate\
    \ strategy.\n\nObserve the events and confirm that all the old pods are deleted\
    \ simultaneously and newer pods are recreated after that, again simultaneously.\n\
    \n## Blue/Green Deployment\n\nBlue/Green deployment involves running two versions\
    \ of the application (\"blue\" and \"green\") simultaneously then switching traffic\
    \ from blue to green once the green version is fully tested and ready.\n\nKubernetes\
    \ does not provide a built-in Blue/Green deployment strategy, but you can implement\
    \ it using services and labels. We will see how to implement this in the services\
    \ section.\n\n## Canary Deployment\n\nCanary deployments roll out the change to\
    \ a small subset of users before rolling it out to the entire infrastructure.\n\
    \nWe deploy a canary version alongside the stable version and route a subset of\
    \ traffic to it. This can be achieved by tweaking the ingress to route a small\
    \ percentage of traffic to the canary version. We will look at this when dealing\
    \ with ingresses.\n\n## Exercise 21: deploy the flask app as a deployment\n\n\
    Deploy the simple flask app as a deployment in a new namespace **dev** with 4\
    \ replicas. Delete 1 or 2 of the pods and observe what happens.\n\n## services\n\
    \nA Service in Kubernetes is an abstract way to expose an application running\
    \ on a set of Pods as a network service. With Kubernetes you don't need to modify\
    \ your application to use an unfamiliar service discovery mechanism. Kubernetes\
    \ gives Pods their own IP addresses and a single DNS name for a set of Pods and\
    \ can load-balance across them. The Service resource routes traffic across a set\
    \ of Pods. Services are defined using YAML or JSON like all Kubernetes objects.\n\
    \n## Why We Need Services\n\n**Stable Endpoint for Pod Communication:** Pods are\
    \ ephemeral and can be created or destroyed at any time. A Service provides a\
    \ stable IP address and DNS name that clients can use to communicate with the\
    \ Pods, even as the Pods are replaced or rescheduled.\n\n**Load Balancing:** A\
    \ Service can distribute network traffic across all Pods matching a specified\
    \ label selector. This balances the load and ensures that the application is scalable\
    \ and resilient.\n\n**Abstraction:** Services abstract the way you access the\
    \ application. You don't need to know which specific Pods are serving the application\
    \ at any given time.\n\n**Service Discovery:** Kubernetes Services are integrated\
    \ into its DNS system, allowing applications to easily discover other services\
    \ through DNS lookups, using the service names.\n\n## Types of Services\n\n**ClusterIP\
    \ (default):** Exposes the Service on an internal IP in the cluster. This type\
    \ makes the Service only reachable from within the cluster.\n\n**NodePort:** Exposes\
    \ the Service on the same port of each selected Node in the cluster using NAT.\
    \ It makes the Service accessible from outside the cluster using `<NodeIP>:<NodePort>`.\n\
    \n**LoadBalancer:** Exposes the Service externally using a cloud provider's load\
    \ balancer. NodePort and ClusterIP Services, to which the external load balancer\
    \ routes, are automatically created.\n\n**ExternalName:** Maps the Service to\
    \ the contents of the externalName field (e.g., foo.bar.example.com), by returning\
    \ a CNAME record with its value. No proxying of any kind is set up.\n\n## CoreDNS\
    \ primer\n\nCoreDNS is the default DNS server in Kubernetes, responsible for DNS-based\
    \ service discovery within the cluster. It plays a crucial role in resolving service\
    \ names to their corresponding IP addresses, enabling Pods to communicate with\
    \ each other and with services seamlessly. Here's how CoreDNS works in the context\
    \ of Kubernetes Services:\n\nWhen you create a Service in Kubernetes, it gets\
    \ assigned a unique DNS name. This name follows a standard pattern: `<service-name>.<namespace-name>.svc.cluster.local`,\
    \ where:\n\n- `<service-name>` is the name of your Service.\n- `<namespace-name>`\
    \ is the namespace in which your Service resides.\n- `svc.cluster.local` is the\
    \ default domain for services within a Kubernetes cluster.\n\nCoreDNS is configured\
    \ to watch the Kubernetes API for changes to Services and Endpoints. When a new\
    \ Service is created, CoreDNS automatically creates DNS records for it. Thus,\
    \ when a Pod in the cluster queries a Service by its DNS name, CoreDNS resolves\
    \ the name to the Service's ClusterIP (for ClusterIP Services) or to the appropriate\
    \ IP addresses (for NodePort or LoadBalancer Services).\n\n## Examples\n\nA **ClusterIP**\
    \ Service makes the Nginx application accessible within the cluster on a stable\
    \ internal IP address. This is useful for internal applications or services that\
    \ should not be exposed outside the cluster."
  mdcn: "## 关于部署 Pod 名称的说明\n\n在 Kubernetes 中，当 Deployment 创建 Pod 时，这些 Pod 的名称是通过在管理这些\
    \ Pod 的 ReplicaSet 名称后附加一个唯一标识符来自动生成的。这个唯一标识符由一个随机字符串组成，其中包含十六进制字符，确保同一 ReplicaSet\
    \ 内的每个 Pod 名称都是唯一的。\n\n以下是 Pod 名称的构建方式分解：\n\n**Deployment 名称：** 你为 Deployment\
    \ 指定的基础名称。\n\n**ReplicaSet 后缀：** 当 Deployment 创建 ReplicaSet 时，它会在 Deployment 名称后附加一个唯一的哈希值来形成\
    \ ReplicaSet 的名称。这个哈希值是 Deployment Pod 模板的确定性函数（意味着它仅在 Pod 模板更改时才会更改）。\n\n**Pod\
    \ 后缀：** ReplicaSet 创建的每个 Pod 都会在 ReplicaSet 名称后附加一个进一步的唯一字母数字字符串，确保每个 Pod 的名称都是唯一的。这个后缀通常包含十六进制字符。\n\
    \n例如，如果你有一个名为 `nginx-deployment` 的 Deployment，它可能会创建一个名为 **nginx-deployment-75675f5897**\
    \ 的 ReplicaSet（其中 **75675f5897** 是基于 Pod 模板的哈希值）。此 ReplicaSet 管理的每个 Pod 可能具有类似\
    \ **nginx-deployment-75675f5897-qwerty** 和 **nginx-deployment-75675f5897-asdfgh**\
    \ 的名称，其中 **qwerty** 和 **asdfgh** 是包含十六进制字符的唯一字母数字字符串。\n\nPod 名称中的十六进制字符（唯一哈希和唯一字母数字字符串的一部分）代表十六进制数字系统（基数为\
    \ 16）中的值，由数字 0 到 9 和字母 a 到 f（或 A 到 F）组成。这些字符是用于以紧凑且人类可读的形式表示二进制数据的编码的一部分。\n\n\
    值得注意的是，Kubernetes 用于生成这些哈希值和唯一字符串的确切方法可能会随时间演变，但使用基础 Deployment 名称，后跟 ReplicaSet\
    \ 哈希值，再后跟唯一 Pod 标识符的原则，仍然是确保 Deployment 内 Pod 唯一性和可追溯性的一致方法。\n\n## Recreate 策略\n\
    \nRecreate 策略在创建新 Pod 之前终止所有旧版本的 Pod，这会导致停机时间，但确保不会同时运行两个版本。\n\n```yaml\napiVersion:\
    \ apps/v1\nkind: Deployment\nmetadata:\n  name: nginx-deployment\nspec:\n  replicas:\
    \ 3\n  strategy:\n    type: Recreate # (1)\n  selector:\n    matchLabels:\n  \
    \  app: nginx\n  template:\n    metadata:\n      labels:\n        app: nginx\n\
    \    spec:\n      containers:\n      - name: nginx\n        image: nginx:1.25.1\n\
    \        ports:\n        - containerPort: 80\n```\n\n(1) -> 此配置确保在创建任何新 Pod 之前删除所有旧\
    \ Pod。\n\n## 练习 20：使用 recreate 策略为 nginx 创建一个部署。\n\n观察事件并确认所有旧 Pod 同时被删除，然后新的\
    \ Pod 在之后再次同时重新创建。\n\n## 蓝/绿部署\n\n蓝/绿部署涉及同时运行应用程序的两个版本（“蓝色”和“绿色”），然后在绿色版本经过充分测试并准备就绪后，将流量从蓝色切换到绿色。\n\
    \nKubernetes 不提供内置的蓝/绿部署策略，但你可以使用服务和标签来实现它。我们将在服务部分了解如何实现这一点。\n\n## 金丝雀部署\n\n\
    金丝雀部署在将更改推广到整个基础设施之前，先将其推广给一小部分用户。\n\n我们在稳定版本旁边部署一个金丝雀版本，并将一部分流量路由到它。这可以通过调整入口来将一小部分流量路由到金丝雀版本来实现。我们将在处理入口时查看这一点。\n\
    \n## 练习 21：将 flask 应用部署为一个部署\n\n在新的命名空间 **dev** 中，将简单的 flask 应用部署为一个具有 4 个副本的部署。删除\
    \ 1 或 2 个 Pod 并观察发生了什么。\n\n## 服务\n\nKubernetes 中的服务是一种将运行在一组 Pod 上的应用程序作为网络服务暴露的抽象方式。使用\
    \ Kubernetes，你无需修改应用程序以使用不熟悉的服务发现机制。Kubernetes 为 Pod 提供自己的 IP 地址和一组 Pod 的单一 DNS\
    \ 名称，并且可以跨它们进行负载均衡。服务资源跨一组 Pod 路由流量。服务使用 YAML 或 JSON 定义，就像所有 Kubernetes 对象一样。\n\
    \n## 为什么我们需要服务\n\n**用于 Pod 通信的稳定端点：** Pod 是临时性的，可以随时创建或销毁。服务提供一个稳定的 IP 地址和 DNS\
    \ 名称，客户端可以使用它们与 Pod 进行通信，即使 Pod 被替换或重新调度也是如此。\n\n**负载均衡：** 服务可以将网络流量分配到与指定标签选择器匹配的所有\
    \ Pod。这平衡了负载，并确保应用程序具有可扩展性和弹性。\n\n**抽象：** 服务抽象了你访问应用程序的方式。你不需要知道在任何给定时间哪些特定的 Pod\
    \ 正在提供应用程序服务。\n\n**服务发现：** Kubernetes 服务集成到其 DNS 系统中，允许应用程序通过 DNS 查找轻松发现其他服务，使用服务名称。\n\
    \n## 服务类型\n\n**ClusterIP（默认）：** 在集群内的内部 IP 上暴露服务。此类型使服务仅可从集群内部访问。\n\n**NodePort：**\
    \ 使用 NAT 在集群中每个选定节点的相同端口上暴露服务。它使服务可以使用 `<NodeIP>:<NodePort>` 从集群外部访问。\n\n**LoadBalancer：**\
    \ 使用云提供商的负载均衡器将服务暴露到外部。外部负载均衡器路由到的 NodePort 和 ClusterIP 服务会自动创建。\n\n**ExternalName：**\
    \ 通过返回一个 CNAME 记录及其值，将服务映射到 externalName 字段的内容（例如，`foo.bar.example.com`）。不设置任何类型的代理。\n\
    \n## CoreDNS 入门\n\nCoreDNS 是 Kubernetes 中的默认 DNS 服务器，负责集群内基于 DNS 的服务发现。它在将服务名称解析为其对应的\
    \ IP 地址方面起着至关重要的作用，使 Pod 能够无缝地相互通信以及与服务通信。以下是 CoreDNS 在 Kubernetes 服务上下文中的工作方式：\n\
    \n当你在 Kubernetes 中创建一个服务时，它会被分配一个唯一的 DNS 名称。此名称遵循标准模式：`<service-name>.<namespace-name>.svc.cluster.local`，其中：\n\
    \n- `<service-name>` 是你的服务名称。\n- `<namespace-name>` 是你的服务所在的命名空间。\n- `svc.cluster.local`\
    \ 是 Kubernetes 集群内服务的默认域。\n\nCoreDNS 被配置为监视 Kubernetes API 中服务和端点的更改。当创建新的服务时，CoreDNS\
    \ 会自动为其创建 DNS 记录。因此，当集群中的 Pod 通过其 DNS 名称查询服务时，CoreDNS 会将该名称解析为服务的 ClusterIP（对于\
    \ ClusterIP 服务）或适当的 IP 地址（对于 NodePort 或 LoadBalancer 服务）。\n\n## 示例\n\n一个 **ClusterIP**\
    \ 服务使 Nginx 应用程序可以在集群内通过稳定的内部 IP 地址访问。这对于不应暴露在集群外部的内部应用程序或服务很有用。"
