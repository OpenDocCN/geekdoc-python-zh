  mdcn: '## 一个 Pod 中有多少个容器


    在 Kubernetes 中，Pod 被设计用来运行一个或多个紧密耦合且需要共享资源的容器。虽然 Kubernetes 没有对 Pod 中可以运行的容器数量设置硬性限制，但实际限制通常由
    Pod 所调度到的节点上的可用资源，以及你的应用程序的设计和需求来决定。


    ## 实际考虑因素


    **资源约束：** Pod 中的每个容器都会消耗节点上的 CPU、内存和其他资源。Pod 内所有容器的总资源消耗不得超过节点的可用资源。


    **网络：** Pod 中的所有容器共享同一个网络命名空间，这意味着它们共享相同的 IP 地址和端口空间。你需要确保 Pod 内运行的应用程序不会尝试使用相同的端口。


    **管理复杂性：** Pod 中的容器越多，管理日志、卷和容器生命周期事件的复杂性就越高。通常更简单的方法是让 Pod 专注于运行一个主要的应用程序容器，并在必要时（例如日志收集器或监控代理）附带几个辅助容器。


    **安全性：** 同一 Pod 中的容器共享相同的生命周期、网络和存储。这种紧密耦合意味着，如果一个容器被攻破，Pod 中的其他容器也可能面临风险。设计 Pod
    时只包含必要的最少容器，有助于限制安全问题的范围。


    ## 最佳实践


    **单一职责原则：** 每个 Pod 应专注于运行给定应用程序或服务的单个实例。如果你的应用程序由多个可以独立扩展的组件组成，它们应该被部署在单独的 Pod
    中。


    **边车容器：** 在 Pod 中运行一个或多个边车容器来支持主应用程序是很常见的，例如处理日志记录、监控或数据同步任务。然而，边车容器的数量应保持最少，并与应用程序的需求相关。


    ## 技术限制


    虽然 Kubernetes 本身没有明确限制每个 Pod 的容器数量，但必须考虑 kubelet 的性能以及管理 Pod 中多个容器的开销。Kubernetes
    文档和社区建议通常建议将每个 Pod 的容器数量保持在最少，而是专注于需要紧密共享资源的容器的逻辑分组。


    总之，虽然从技术上讲你可以在单个 Pod 中运行多个容器，但最佳实践和实际资源考虑建议保持数量较少，并专注于应用程序中紧密耦合的组件。


    ## 端口转发


    我们已经介绍了 Kubernetes Pod 的基本功能，它们是 Kubernetes 集群中最小的构建单元。但我们究竟如何访问这些 Pod/容器中运行的应用程序呢？


    在 Kubernetes 中有一些惯用的方法，我们将在后面的章节中介绍。目前，kubectl 通过端口转发为我们提供了实现这一目标的途径。


    要在 Kubernetes 中转发 Pod 的端口，你可以使用 `kubectl port-forward` 命令。该命令将一个或多个本地端口转发到 Pod。端口转发对于调试或从本地机器临时访问
    Pod 内运行的应用程序特别有用。


    ![](img/91c4bde832e221ba5bc429caf9587286_118_0.png)


    ## 端口转发


    以下是该命令的一般语法：


    ```

    $ kubectl port-forward pod/<pod-name> <local-port>:<pod-port>

    ```


