    \n### Redis as a statefulset\n\nLet's take the Redis cache implemented in earlier\
    \ chapters. We decide to make it more resilient, and bump up the replica count\
    \ to 2. We run into the following issue:\n\n```\n$ kubectl describe pod cache-77dd5d666f-scrrl\
    \ -n robust-setup\n...\nEvents:\n  Type    Reason     Age   From             \
    \  Message\n  ----    ------     ----  ----               -------\n  Normal  Scheduled\
    \  62s   default-scheduler  Successfully assigned robust-setup/cache-77dd5d666f-scrrl\
    \ to first-cluster-default-pool-oeo8s\n  Warning FailedAttachVolume  56s   attachdetach-controller\
    \  Multi-Attach error for volume \"pvc-cb035503-13c4-4740-9262-7e65837999cd\"\
    \ Volume is already used by pod(s) cache-77dd5d666f-2d8t2\n```\n\nOur PVC **cache**\
    \ is configured with **ReadWriteOnce**, which means that the first pod which comes\
    \ up attaches to the volume, and the second pod can't boot because it can't attach\
    \ to a volume which is already attached to the first pod.\n\nWe could configure\
    \ our volume to have an access mode of **ReadWriteMany**, but Digitalocean Kubernetes'\
    \ storage policy doesn't allow us to create volumes of such type, at least out\
    \ of the box. Before we go in that direction, let's discuss how Redis, and in\
    \ general, most stateful applications work when scaled.\n\nStateless applications\
    \ do not store data or session information internally. Any state or data needed\
    \ for processing is typically provided in each request, and responses are generated\
    \ without relying on stored data. Scaling stateless applications is relatively\
    \ straightforward in Kubernetes. You can increase or decrease the number of pod\
    \ replicas without worrying about data persistence or synchronization issues,\
    \ as each instance is independent and identical.\n\nExamples: The nginx deployment\
    \ is considered stateless as it does not need to remember information about client\
    \ sessions between requests. Even the Flask hello world and redis page count applications\
    \ are stateless. **Note** that the page count application is considered to be\
    \ stateless in spite of the fact that the page count increments every time the\
    \ page is visited. This is because the page count is not stored in that application\
    \ directly, it is being fetched from the Redis cache.\n\nStateful applications\
    \ save data generated during interactions and rely on this data for future transactions.\
    \ Scaling stateful applications is more complex. It requires careful management\
    \ of data persistence, replication, and consistency.\n\nExamples: The Redis cache\
    \ deployment is stateful.\n\nThe Redis Master-Slave architecture is a method to\
    \ achieve data replication and high availability in Redis deployments. It is a\
    \ fundamental part of Redis's ability to scale out and provide fault tolerance\
    \ for stored data. Here's an overview of how it works:\n\n### Components\n\n**Master:**\
    \ The master node is the primary node that receives all write operations. It holds\
    \ the original dataset and is responsible for handling client requests, including\
    \ reads and writes. The master node also replicates changes to one or more slave\
    \ nodes.\n\n**Slave:** Slave nodes are replicas of the master node. They connect\
    \ to the master to perform an initial sync (copying the entire dataset from the\
    \ master) and subsequently receive updates from the master as changes occur. Slaves\
    \ can accept read requests to distribute the read load and increase the system's\
    \ read throughput. In the event of a master failure, a slave can be promoted to\
    \ a new master, ensuring the availability of the service.\n\n### Replication Process\n\
    \n**Initial Sync:** When a slave connects to a master, it initiates a synchronization\
    \ process. The master creates a snapshot of its current dataset and sends it to\
    \ the slave. The slave loads this snapshot into its memory, effectively cloning\
    \ the master's dataset.\n\n**Command Propagation:** After the initial sync, the\
    \ master continues to propagate all write commands to the connected slaves. This\
    \ ensures that all changes made to the master are mirrored on the slaves, keeping\
    \ the datasets consistent across the master and all its replicas.\n\n**Partial\
    \ Resynchronization:** If a slave temporarily loses connection to the master but\
    \ reconnects before the master's buffer is exhausted, it can request a partial\
    \ resynchronization. The master then sends only the changes that occurred during\
    \ the disconnection, avoiding the need for a full dataset transfer.\n\nBy replicating\
    \ data from the master to one or more slaves, Redis ensures that data is not lost\
    \ even in the event of hardware failures or network issues, and it supports scaling\
    \ read operations across multiple nodes.\n\nThis indicates that each instance\
    \ of redis (master or slave) needs to have its own persistent volume to store\
    \ the data. Sharing the same PVC is out of question now.\n\n### The problem of\
    \ ephemeral pod identity\n\nEach pod in a Deployment is interchangeable, with\
    \ no stable network identity or storage. When a pod is terminated and replaced\
    \ (which can happen during scaling operations, updates, or node failures), the\
    \ new pod is treated as a brand new instance. Even though the PVC ensures data\
    \ persistence beyond the lifecycle of a single pod, the new pod might not reattach\
    \ to the same PersistentVolume (PV) as the old one, especially if the Deployment\
    \ is scaled to multiple replicas. This can lead to data inconsistency or loss,\
    \ as new pods might start with an empty data set or an outdated snapshot of the\
    \ data.\n\n### No Ordered, Graceful Scaling or Updates\n\nDeployments do not provide\
    \ guarantees about the order in which pods are started, stopped, or updated. For\
    \ Redis, which often relies on a master-slave architecture for replication and\
    \ high availability, this can disrupt the replication topology. For instance,\
    \ a master instance could be terminated before a new replica has fully synchronized,\
    \ leading to potential data loss or service downtime."
