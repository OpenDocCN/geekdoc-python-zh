    \            auth_basic \"Restricted Content\"; # (1)\n            auth_basic_user_file\
    \ /etc/nginx/auth/auth; # (2)\n        }\n    }\n}\n```\n\n(1) -> The message\
    \ you display to the user.\n\n(2) -> The auth file to refer to for checking the\
