- md: "## Multiple containers in a pod\n\nBefore we run multiple containers in a pod,\
    \ let's briefly go through the concept of container ports.\n\nIn a Kubernetes\
    \ Pod specification, the **containerPort** parameter is part of the container\
    \ spec. It declares a port that the container listens on. While this declaration\
    \ is not mandatory for a container to open a port, it serves several purposes:\n\
    \n**Documentation**: It documents the ports that the container is expected to\
    \ listen on, making the Pod's configuration clearer to developers and operators\
    \ who inspect the Pod spec.\n\n**Service Discovery**: In conjunction with services,\
    \ **containerPort** can be used to simplify service discovery within the Kubernetes\
    \ cluster. When a Service selects a Pod, the **containerPort** can be used to\
    \ direct traffic to the correct port on the Pod's containers, which we will see\
    \ in later chapters.\n\n**Security**: In environments that enforce network policies,\
    \ specifying **containerPort** can be a part of defining and enforcing security\
    \ rules that control ingress and egress traffic to and from Pods.\n\nLet's try\
    \ to run 2 nginx containers in the same pod. Here's the YAML spec for the same.\n\
    \n```yaml\napiVersion: v1\nkind: Pod\nmetadata:\n  name: two-containers\n  labels:\n\
    \    purpose: demonstrate-multi-container\nspec:\n  containers:\n  - name: nginx-container-1\
    \ # (1)\n    image: nginx\n    ports: # (2)\n    - containerPort: 80\n  - name:\
    \ nginx-container-2 # (3)\n    image: nginx\n    ports: # (4)\n    - containerPort:\
    \ 81\n```\n\n(1) -> The first container is named **nginx-container-1**.\n\n(2)\
    \ -> It exposes port **80**, as we can see from the **containerPort** value.\n\
    \n(3) -> the 2nd container is named **nginx-container-2**. Note that both run\
    \ the same image. Perfectly valid. Only the names should be unique.\n\n(4) ->\
    \ The 2nd container exposes a different port.\n\nWhen we try to run this pod,\
    \ we get a facepalm moment.\n\n```bash\n$ kubectl apply -f two-containers.yaml\n\
    ```\n\nAfter a few minutes...\n\n```bash\n$ kubectl get pod\nNAME            \
    \    READY   STATUS             RESTARTS   AGE\nbash-sleep          0/1     CrashLoopBackOff\
    \   16         4m13s ago   62m\nnginx               1/1     Running          \
    \  0          5h22m\ntwo-containers      1/2     CrashLoopBackOff   5        \
    \  94s ago     5m5s\n```\n\nYou can see that our **two-containers** pod is in\
    \ **CrashLoopBackOff** status, only 1 container is active of the 2, and obviously\
    \ Kubernetes tries to perform CPR unsuccessfully on the pod which will never run\
    \ successfully till end of eternity!\n\nWhy is that? Because containers in a pod\
    \ share the same IP and port space. If the first nginx container goes and brags\
    \ port **80**, the 2nd unfortunate container cannot brag that port and hence sadly\
    \ fails. You might argue that you gave a different **containerPort** value to\
    \ both the containers, but the nginx process in that container's image is hardcoded\
    \ to run on port **80**, so no matter what arbitrary port value you give to your\
    \ **containerPort**, the 2nd container is doomed to get killed.\n\nThe solution\
    \ is to run nginx in different ports. The official nginx image doesn't allow this\
    \ type of arrangement out of the box, but Bitnami's nginx image allows you to\
    \ configure the port number as an environment variable. Let's give that approach\
    \ a shot.\n\n```yaml\napiVersion: v1\nkind: Pod\nmetadata:\n  name: two-containers-better\n\
    \  labels:\n    purpose: demonstrate-multi-container\nspec:\n  containers:\n \
    \ - name: nginx-container-1\n    image: bitnami/nginx # (1)\n    env: # (2)\n\
    \    - name: NGINX_HTTP_PORT_NUMBER # (3)\n      value: \"8080\"\n    ports:\n\
    \    - containerPort: 8080\n  - name: nginx-container-2\n    image: bitnami/nginx\n\
    \    env:\n    - name: NGINX_HTTP_PORT_NUMBER\n      value: \"8081\" # (4)\n \
    \   ports:\n    - containerPort: 8081 # (5)\n```\n\n(1) -> As mentioned before,\
    \ we run the **bitnami/nginx** image.\n\n(2) -> In order to specify runtime environment\
    \ variables, similar to docker-compose's **environment**, the pod spec has a per\
    \ container **env:** section. This is a list of name/value pairs used to specify\
    \ environment variables.\n\n(3) -> The Bitnami nginx image allows you to run nginx\
    \ on a port of your choice, which can be configured by giving the **NGINX_HTTP_PORT_NUMBER**\
    \ variable. We provide this value in the **env** section of each container.\n\n\
    (4) -> The first container runs nginx on port **8080**, hence we run this in a\
    \ different port, i.e. **8081**.\n\n**Note:** It is important to understand here\
    \ that the **NGINX_HTTP_PORT_NUMBER** indicates the port where nginx runs and\
    \ exposes from inside the pod. This should match the **containerPort** value for\
    \ each container in the pod.\n\n(5) -> In this case, the **containerPort** value\
    \ will take effect as the container indeed runs a process in the said port.\n\n\
    When we kubectl apply this pod, we see that it runs successfully.\n\nHow a pod\
    \ looks inside\n\n```bash\n$ kubectl apply -f two-containers-better.yaml\npod/two-containers-better\
    \ created\n```\n\nAfter a minute ...\n\n```bash\n$ kubectl get pod\nNAME     \
    \                READY   STATUS             RESTARTS   AGE\nbash-sleep       \
    \        0/1     CrashLoopBackOff   17         3m14s ago   67m\nnginx        \
    \            1/1     Running            0          5h27m\ntwo-containers     \
    \      1/2     CrashLoopBackOff   5          41s ago     4m4s\ntwo-containers-better\
    \    2/2     Running            0          35s\n```\n\n## Exercise 10: Run 3 containers\
    \ in a pod.\n\nUse the same spec as the previous section, add another container\
    \ and run it as,\n\na. same pod by updating the pod spec above\n\nb. different\
    \ pod by creating a new pod spec\n\nTry to understand what is the difference between\
    \ tasks (a) and (b).\n\n## Exercise 11: 2 containers twisted variation\n\nRun\
    \ 2 containers in a pod again. But 1 will be nginx, the other will be a bash container\
    \ which runs \"sleep 5\" and kills after that. Will the pod crash? If yes, how\
    \ will you fix it without changing the image of the bash container?"
  mdcn: "## Pod 中的多个容器\n\n在 Pod 中运行多个容器之前，我们先简要了解一下容器端口的概念。\n\n在 Kubernetes Pod 规范中，**containerPort**\
    \ 参数是容器规范的一部分。它声明了容器监听的端口。虽然此声明对于容器打开端口并非强制性的，但它有几个用途：\n\n**文档记录**：它记录了容器预期监听的端口，使检查\
    \ Pod 规范的开发人员和运维人员能更清楚地了解 Pod 的配置。\n\n**服务发现**：与服务结合使用时，**containerPort** 可用于简化\
    \ Kubernetes 集群内的服务发现。当 Service 选择一个 Pod 时，**containerPort** 可用于将流量定向到 Pod 容器的正确端口，我们将在后续章节中看到这一点。\n\
    \n**安全**：在强制执行网络策略的环境中，指定 **containerPort** 可以是定义和执行控制 Pod 出入站流量安全规则的一部分。\n\n\
    让我们尝试在同一个 Pod 中运行 2 个 nginx 容器。以下是相应的 YAML 规范。\n\n```yaml\napiVersion: v1\nkind:\
    \ Pod\nmetadata:\n  name: two-containers\n  labels:\n    purpose: demonstrate-multi-container\n\
    spec:\n  containers:\n  - name: nginx-container-1 # (1)\n    image: nginx\n  \
    \  ports: # (2)\n    - containerPort: 80\n  - name: nginx-container-2 # (3)\n\
    \    image: nginx\n    ports: # (4)\n    - containerPort: 81\n```\n\n(1) -> 第一个容器命名为\
    \ **nginx-container-1**。\n\n(2) -> 从 **containerPort** 值可以看出，它暴露了端口 **80**。\n\n\
    (3) -> 第二个容器命名为 **nginx-container-2**。请注意，两者运行相同的镜像。这是完全有效的。只有名称应该是唯一的。\n\n(4)\
    \ -> 第二个容器暴露了一个不同的端口。\n\n当我们尝试运行这个 Pod 时，会遇到一个令人头疼的时刻。\n\n```bash\n$ kubectl apply\
    \ -f two-containers.yaml\n```\n\n几分钟后...\n\n```bash\n$ kubectl get pod\nNAME \
    \               READY   STATUS             RESTARTS   AGE\nbash-sleep        \
    \  0/1     CrashLoopBackOff   16         4m13s ago   62m\nnginx              \
    \ 1/1     Running            0          5h22m\ntwo-containers      1/2     CrashLoopBackOff\
    \   5          94s ago     5m5s\n```\n\n你可以看到我们的 **two-containers** Pod 处于 **CrashLoopBackOff**\
    \ 状态，2 个容器中只有 1 个是活跃的，显然 Kubernetes 正在徒劳地尝试对这个 Pod 进行“心肺复苏”，而它将永远无法成功运行！\n\n为什么会这样？因为\
    \ Pod 中的容器共享相同的 IP 和端口空间。如果第一个 nginx 容器占用了端口 **80**，那么第二个不幸的容器就无法再占用该端口，因此会失败。你可能会争辩说你为两个容器指定了不同的\
    \ **containerPort** 值，但该容器镜像中的 nginx 进程被硬编码为在端口 **80** 上运行，所以无论你给 **containerPort**\
    \ 指定什么任意端口值，第二个容器都注定会被终止。\n\n解决方案是在不同的端口上运行 nginx。官方的 nginx 镜像开箱即用不支持这种配置，但 Bitnami\
    \ 的 nginx 镜像允许你通过环境变量配置端口号。让我们尝试一下这种方法。\n\n```yaml\napiVersion: v1\nkind: Pod\n\
    metadata:\n  name: two-containers-better\n  labels:\n    purpose: demonstrate-multi-container\n\
    spec:\n  containers:\n  - name: nginx-container-1\n    image: bitnami/nginx #\
    \ (1)\n    env: # (2)\n    - name: NGINX_HTTP_PORT_NUMBER # (3)\n      value:\
    \ \"8080\"\n    ports:\n    - containerPort: 8080\n  - name: nginx-container-2\n\
    \    image: bitnami/nginx\n    env:\n    - name: NGINX_HTTP_PORT_NUMBER\n    \
    \  value: \"8081\" # (4)\n    ports:\n    - containerPort: 8081 # (5)\n```\n\n\
    (1) -> 如前所述，我们运行 **bitnami/nginx** 镜像。\n\n(2) -> 为了指定运行时环境变量，类似于 docker-compose\
    \ 的 **environment**，Pod 规范有一个每个容器的 **env:** 部分。这是一个用于指定环境变量的名称/值对列表。\n\n(3) ->\
    \ Bitnami nginx 镜像允许你在选择的端口上运行 nginx，这可以通过设置 **NGINX_HTTP_PORT_NUMBER** 变量来配置。我们在每个容器的\
    \ **env** 部分提供此值。\n\n(4) -> 第一个容器在端口 **8080** 上运行 nginx，因此我们在不同的端口上运行此容器，即 **8081**。\n\
    \n**注意：** 这里需要理解的是，**NGINX_HTTP_PORT_NUMBER** 表示 nginx 在 Pod 内部运行并暴露的端口。这应该与 Pod\
    \ 中每个容器的 **containerPort** 值相匹配。\n\n(5) -> 在这种情况下，**containerPort** 值将生效，因为容器确实在指定的端口上运行了进程。\n\
    \n当我们 kubectl apply 这个 Pod 时，可以看到它运行成功了。\n\nPod 内部是什么样子\n\n```bash\n$ kubectl\
    \ apply -f two-containers-better.yaml\npod/two-containers-better created\n```\n\
    \n一分钟后...\n\n```bash\n$ kubectl get pod\nNAME                     READY   STATUS\
    \             RESTARTS   AGE\nbash-sleep               0/1     CrashLoopBackOff\
    \   17         3m14s ago   67m\nnginx                    1/1     Running     \
    \       0          5h27m\ntwo-containers           1/2     CrashLoopBackOff  \
    \ 5          41s ago     4m4s\ntwo-containers-better    2/2     Running      \
    \      0          35s\n```\n\n## 练习 10：在 Pod 中运行 3 个容器。\n\n使用与上一节相同的规范，添加另一个容器并运行它，方式如下：\n\
    \na. 通过更新上面的 Pod 规范，在同一个 Pod 中运行\n\nb. 通过创建一个新的 Pod 规范，在不同的 Pod 中运行\n\n尝试理解任务\
    \ (a) 和 (b) 之间的区别是什么。\n\n## 练习 11：2 个容器的变体\n\n再次在 Pod 中运行 2 个容器。但一个是 nginx，另一个是一个\
    \ bash 容器，它运行 \"sleep 5\" 然后终止。Pod 会崩溃吗？如果会，你如何在不更改 bash 容器镜像的情况下修复它？"
