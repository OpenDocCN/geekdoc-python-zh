- img_proc: true
  md: 'netes, serves several crucial purposes for stateful applications and their
    discovery mechanisms.


    A headless service in Kubernetes does not provide load-balancing or a single IP
    address. Instead, it allows pods to be accessed directly through their own IP
    addresses. For stateful applications like Redis, where each instance may need
    to be accessed individually (e.g., for replication or sharding purposes), a headless
    service provides a stable DNS entry for each pod based on its hostname and the
    service name.'
  merge: -1
  pgno: 319
- img_proc: true
  md: '![](img/91c4bde832e221ba5bc429caf9587286_320_0.png)


    # Headless service


    This stable network identity is crucial for Redis nodes to communicate with each
    other, especially in cluster or replication setups where nodes need to discover
    and connect to the master or other replicas.'
  merge: -1
  pgno: 320
- img_proc: true
  md: "The service acts as a method for service discovery within the cluster. Pods\
    \ can discover the IP addresses of other pods using DNS queries. For example,\
    \ a Redis replica can discover the master's IP address using DNS if the master's\
    \ hostname is known.\n\nIn the provided example, if you name your service **redis**,\
    \ and your StatefulSet pods are named in the pattern **redis-0**, **redis-1**,\
    \ etc., a pod can query DNS for **redis-0.redis** to get the IP address of the\
    \ **redis-0** pod. This is especially useful for initial configuration and for\
    \ handling failovers or topology changes within the Redis cluster.\n\nWe define\
    \ a headless service as follows:\n\n```\napiVersion: v1\nkind: Service\nmetadata:\n\
    \  name: redis # (1)\nspec:\n  ports:\n    - port: 6379 # (2)\n      targetPort:\
    \ 6379\n  clusterIP: None # (3)\n  selector:\n    app: redis # (4)\n```\n\n(1)\
    \ -> The name of the service. This is arbitrary."
