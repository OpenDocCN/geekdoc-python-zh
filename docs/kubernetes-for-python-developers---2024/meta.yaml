    \ # (3)\n    - \"3600\"\n  serviceAccountName: test  # (4)\n```\n\n(1) -> Name\
    \ of the pod.\n\n(2) -> we use the alpine image.\n\n(3) -> we run a long sleep\
    \ command so that we can get into the pod and test the token.\n\n(4) -> The most\
    \ important line in this context. We associate **test** service account with the\
    \ pod.\n\nOnce we apply the pod, we can see that Kubernetes has mounted the token\
    \ and the certificate(remember that Kubernetes uses TLS certificates to encrypt\
    \ the requests).\n\n```\n$ kubectl apply -f service-account-pod.yaml -n robust-setup\n\
    pod/service-account-test-pod created\n```\n\n```\n$ kubectl exec -it service-account-test-pod\
    \ -n robust-setup -- ls /var/run/secrets/kubernetes.io/serviceaccount\nca.crt\
    \  namespace  token\n```\n\nThe `/var/run/secrets/kubernetes.io/serviceaccount`\
    \ is the standard location where this information is mounted.\n\nNow, we have\
    \ everything to access the Kubernetes API from inside the pod."
