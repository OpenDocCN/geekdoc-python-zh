- md: "Once you have successfully authenticated, you will get an output similar to\
    \ this:\n\n```\n$ doctl account get\nEmail              Droplet Limit  Email Verified\
    \  UUID                                    Status\nsammy@example.org  10     \
    \        true            3a56c5e109736b50e823eaebca85708ca0e5087c  active\n```\n\
    \nNext, we can go ahead and create our cluster.\n\n```\n$ doctl kubernetes cluster\
    \ create first-cluster --region blr1 --size s-2vcpu-4gb --count 3\n```\n\n**doctl\
    \ kubernetes cluster create** is the cluster creation sub-command. **first-cluster**\
    \ is the name of the cluster. **blr1** indicates that the cluster should be provisioned\
    \ in Bangalore region (NOTE that for other region options, you can run **doctl\
    \ kubernetes options regions** as shown above). **s-2vcpu-4gb** is the size of\
    \ the cluster, with 2 VCPUs and 4GB RAM. Finally, the **--count** parameter indicates\
    \ how many nodes will be created.\n\n![](img/91c4bde832e221ba5bc429caf9587286_80_0.png)\n\
    \n*Create a kubernetes cluster using doctl*\n\nWhy not use the UI? The UI of many\
    \ products keep changing frequently, hence this section might become obsolete\
    \ and confuse people. If we use the CLI, the instructions are more precise and\
    \ we know what we are requesting and what we are getting, thus it stays relevant\
    \ for a longer time.\n\n## Summary\n\nKubernetes distinguishes itself from Docker\
    \ Compose by offering a resilient framework that not only scales as demand fluctuates\
    \ but also sustains applications with minimal downtime. We contrasted this robust\
    \ infrastructure with the simplicity of Docker Compose, setting the stage for\
    \ you to appreciate the sophistication and necessity of Kubernetes in real-world\
    \ applications. The chapter also delves into the operational components of a Kubernetes\
    \ cluster, detailing the roles of the control plane, worker nodes, and essential\
    \ components like kube-apiserver, etcd, kube-scheduler, Kube Controller Manager,\
    \ Kubelet, and Kube-proxy.\n\nAs we anticipate the next chapter, the focus will\
    \ sharpen on one of Kubernetes' most fundamental concepts: Pods. Understanding\
    \ Pods is critical as they serve as the basic building block of Kubernetes deployments.\
    \ We will unpack the lifecycle of a Pod, its interactions within the Kubernetes\
    \ ecosystem, and how to manage and troubleshoot them effectively. Prepare to dive\
    \ deep into the micro-level mechanics of Kubernetes that bolster the macro-level\
    \ operations we've explored in this chapter.\n\n## Chapter 4: Pods 101\n\nSo far,\
    \ we've built container images of our Python application and run them locally.\
    \ We've also setup a production grade Kubernetes cluster. Let's combine both of\
    \ these and deploy the Python application in this newly created cluster.\n\nBut\
    \ before we get ahead of ourselves, we have to get familiar with a few concepts.\n\
    \n### Kubectl\n\nThe first of these concepts is a tool called **kubectl**. There\
    \ are straightforward instructions on how to download it for your operating system.\n\
    \n**kubectl** is a command-line tool that serves as the primary interface for\
    \ interacting with Kubernetes, allowing users to deploy applications, inspect\
    \ and manage cluster resources, and view logs. It communicates with the Kubernetes\
    \ API server to control the Kubernetes cluster, offering a wide range of commands\
    \ that enable users to execute operations such as creating and deleting pods,\
    \ scaling deployments, and managing configurations.\n\n**kubectl** is designed\
    \ to be user-friendly, supporting various output formats for displaying cluster\
    \ information, and includes features for troubleshooting and debugging applications\
    \ running in the cluster. By providing a powerful and flexible interface, **kubectl**\
    \ empowers developers and administrators to efficiently manage the lifecycle of\
    \ their applications and the Kubernetes cluster itself.\n\n### Kubeconfig\n\n\
    Kubeconfig, in simple terms, is like a keychain that holds the keys and directions\
    \ needed to access and communicate with your Kubernetes clusters. Imagine you\
    \ have several keys to different houses (clusters), and each house has its own\
    \ security system (authentication method). The kubeconfig file keeps track of\
    \ all these keys and the addresses for the houses, so you know which key opens\
    \ which house and how to get there. When you use the kubectl command, it looks\
    \ at your kubeconfig to figure out which cluster you're trying to talk to and\
    \ which key (credentials) to use for that conversation. It's essentially a configuration\
    \ file that makes managing and switching between different Kubernetes clusters\
    \ and their access details a breeze, ensuring you're always talking to the right\
    \ cluster with the right access permissions.\n\nAssuming you're already logged\
