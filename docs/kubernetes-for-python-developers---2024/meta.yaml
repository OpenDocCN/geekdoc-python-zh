  md: 'maintain replication between the primary and secondary instances. Kubernetes
    services can be used to expose the database instances and manage traffic to the
    primary node for writes and replicas for reads, enhancing performance.


    # Service accounts and RBAC


    Kubernetes is designed as a container orchestration system. Its focus is on managing
    resources within the cluster rather than managing individual user accounts. Hence,
    Kubernetes doesn''t have the notion of user accounts. Well, at least not directly.
    It is possible to delegate user authentication to external systems. Kubernetes
    relies on external mechanisms (like OpenID Connect, LDAP, x509 certificates, etc.)
    to authenticate users. This design allows Kubernetes to integrate with a wide
    variety of authentication providers without needing to manage user accounts directly.


    In many cases, we need a non-human user account to perform specific actions with
    the cluster, like running a CI/CD pipeline in Kubernetes, or a pod interacting
    with Kubernetes resources within the same cluster where it is running. These special
    kinds of accounts are called service accounts.


    There are 2 characteristics for service accounts(and user accounts too):


    **Scoped Access:** Service accounts are scoped to a particular namespace or can
    be configured cluster-wide, making it easier to manage permissions and access
    controls for applications and processes running within the cluster.


    **Fine-Grained Permissions:** Kubernetes uses Role-Based Access Control (RBAC)
    to define what authenticated users or service accounts can do within the cluster.
    Roles and ClusterRoles define permissions (like'
  merge: -1
  pgno: 329
- img_proc: true
  md: 'creating, listing, or deleting resources), while RoleBindings and ClusterRoleBindings
    assign those permissions to users, groups, or service accounts.


    # Examples


    # Example 1: Internal Application Communicating with the Kubernetes API


    An in-cluster application that needs to query the Kubernetes API to discover other
    pods, services, or configurations can use a service account to authenticate its
    requests. For instance, a monitoring tool running within your cluster that gathers
    metrics from other pods could use a service account with permissions to read pod
    metrics across namespaces.


    # Example 2: CI/CD Pipeline Automation


    A Continuous Integration/Continuous Deployment (CI/CD) tool that deploys applications
    to your Kubernetes cluster would use a service account to create or update deployments
    and services. This service account would be granted the necessary permissions
    to manage resources within a specific namespace or across the cluster, depending
    on the scope of the CI/CD tool''s operations.


    # Example 3: External Application Accessing Kubernetes Resources


    External applications that need to interact with your Kubernetes cluster (e.g.,
    a dashboard or management tool running outside of the cluster) can also use service
    accounts. You can expose the necessary API endpoints securely and have the external
    application authenticate using the token of a service account that has the required
    permissions.'
