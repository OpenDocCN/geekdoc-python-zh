    \ service each time. The signature of the JWT ensures that the token hasn't been\
    \ tampered with.\n\nLet's generate a token for our service account.\n\n```\n$\
    \ kubectl create token test --duration=600s -n robust-setup > token.txt\n```\n\
    \nThis command creates a token for the **test** service account which is valid\
    \ for 10 minutes(At the time of writing this, this was the minimum duration value\
    \ we could give). The generated token is written to a **token.txt** file.\n\n\
    Let's decode this JWT token and find out more about it. You can decode it yourself\
    \ by pasting the token at [jwt.io](https://jwt.io).\n\nThe header part indicates\
    \ what algorithm it uses.\n\n```\n{\n  \"alg\": \"RS256\",\n```"
  - "[PAGE 338]\n\n```\n\"kid\": \"quaAkoqCy2G-lp-YZYGv1UCJZnW1EcPZiCrDb197uZo\"\n\
    }\n```\n\nThe payload part is of more interest to us.\n\n```\n{\n  \"aud\": [\n\
    \    \"system:konnectivity-server\"\n  ],\n  \"exp\": 1709302847, // (1)\n  \"\
    iat\": 1709302247,\n  \"iss\": \"https://kubernetes.default.svc.cluster.local\"\
    , // (2)\n  \"kubernetes.io\": {\n    \"namespace\": \"robust-setup\", // (3)\n\
    \    \"serviceaccount\": {\n      \"name\": \"test\", // (4)\n      \"uid\": \"\
    67a83c4d-e55d-4c4d-821e-0f5acbff094e\"\n    }\n  },\n  \"nbf\": 1709302247,\n\
