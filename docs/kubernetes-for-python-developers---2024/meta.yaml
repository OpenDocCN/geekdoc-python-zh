- img_proc: true
  md: '# How dynamic provisioning works


    **StorageClass:** Administrators define one or more StorageClass objects in the
    cluster. Each StorageClass specifies a provisioner (e.g., AWS EBS, Google Persistent
    Disk, Azure Disk Storage, or a local storage option) and a set of parameters specific
    to that provisioner, such as disk type, size, and IOPS. The StorageClass acts
    as a template for creating PersistentVolumes.


    **PersistentVolumeClaim (PVC) Request:** When a user or application requires storage,
    they create a PVC specifying the desired characteristics, such as size and access
    modes. Importantly, the PVC references a StorageClass to indicate the type of
    storage required.


    **Automatic Provisioning:** The Kubernetes control plane watches for PVCs that
    cannot be satisfied by existing PVs. When it detects such a PVC, it uses the specified
    StorageClass to dynamically provision a new PV that matches the PVC''s requirements.
    The provisioning is handled by the storage provisioner defined in the StorageClass.


    **Binding:** Once the new PV is created, Kubernetes automatically binds it to
    the PVC, making the storage available to the application. This binding process
    matches PVCs and PVs based on their specifications and claims.


    # Benefits of Dynamic Provisioning


    **Efficiency:** Eliminates the need for manual pre-provisioning of storage. Storage
    is created automatically when required, ensuring efficient use of resources.


    **Speed:** Speeds up the deployment of applications that require persistent storage
    by reducing manual steps.'
  merge: -1
  pgno: 295
- img_proc: true
  md: '**Flexibility:** Allows users to consume storage resources transparently, regardless
    of the underlying storage infrastructure. Applications can specify exactly what
    type of storage they need (e.g., SSD vs. HDD, size, IOPS) without worrying about
    the details of provisioning.


    **Scalability:** Supports the scalable deployment of applications by automating
    the provisioning process, which is especially important in dynamic and large-scale
    environments.


    # Example Scenario


    An organization running Kubernetes in the cloud wants to deploy a database application
    that requires persistent storage with high IOPS. Instead of manually creating
    a cloud disk and binding it to the application:


    An administrator creates a StorageClass specific to high-IOPS SSDs provided by
    their cloud provider.


    The application''s deployment includes a PVC that specifies the required storage
    size and references the high-IOPS StorageClass.


    When the application is deployed, Kubernetes automatically provisions an appropriate
    cloud disk according to the StorageClass parameters and binds it to the application''s
    PVC.


    The database application uses the dynamically provisioned storage without any
    manual intervention in the storage provisioning process.


    Dynamic provisioning streamlines and automates the storage allocation process,
    making Kubernetes environments more flexible and easier to manage.


    Also, think of our context where every developer requiring storage for their application
    needs to have DigitalOcean cloud keys and access to **doctl** so that they can
    create the block object storage before creating'
