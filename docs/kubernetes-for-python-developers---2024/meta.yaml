  mdcn: "## 动态供应的工作原理\n\n**StorageClass：** 管理员在集群中定义一个或多个 StorageClass 对象。每个 StorageClass\
    \ 指定一个供应器（例如，AWS EBS、Google 持久磁盘、Azure 磁盘存储或本地存储选项）以及一组特定于该供应器的参数，如磁盘类型、大小和 IOPS。StorageClass\
    \ 充当创建 PersistentVolumes 的模板。\n\n**PersistentVolumeClaim (PVC) 请求：** 当用户或应用程序需要存储时，他们会创建一个\
    \ PVC，指定所需的特性，如大小和访问模式。重要的是，PVC 引用一个 StorageClass 来指示所需的存储类型。\n\n**自动供应：** Kubernetes\
    \ 控制平面监视那些无法由现有 PV 满足的 PVC。当它检测到这样的 PVC 时，它会使用指定的 StorageClass 动态供应一个新的 PV，以匹配\
    \ PVC 的要求。供应过程由 StorageClass 中定义的存储供应器处理。\n\n**绑定：** 一旦新的 PV 被创建，Kubernetes 会自动将其绑定到\
    \ PVC，使存储可供应用程序使用。此绑定过程根据 PVC 和 PV 的规格和声明进行匹配。\n\n## 动态供应的优势\n\n**效率：** 消除了手动预供应存储的需要。存储在需要时自动创建，确保资源的高效利用。\n\
    \n**速度：** 通过减少手动步骤，加快了需要持久存储的应用程序的部署速度。\n\n**灵活性：** 允许用户透明地使用存储资源，无论底层存储基础设施如何。应用程序可以精确指定它们需要的存储类型（例如，SSD\
    \ 与 HDD、大小、IOPS），而无需担心供应的细节。\n\n**可扩展性：** 通过自动化供应过程，支持应用程序的可扩展部署，这在动态和大规模环境中尤为重要。\n\
    \n## 示例场景\n\n一个在云中运行 Kubernetes 的组织想要部署一个需要高 IOPS 持久存储的数据库应用程序。与其手动创建云磁盘并将其绑定到应用程序：\n\
    \n- 管理员创建一个特定于其云提供商提供的高 IOPS SSD 的 StorageClass。\n- 应用程序的部署包含一个 PVC，该 PVC 指定所需的存储大小并引用高\
    \ IOPS StorageClass。\n- 当应用程序部署时，Kubernetes 根据 StorageClass 参数自动供应一个合适的云磁盘，并将其绑定到应用程序的\
    \ PVC。\n- 数据库应用程序使用动态供应的存储，无需在存储供应过程中进行任何手动干预。\n\n动态供应简化并自动化了存储分配过程，使 Kubernetes\
    \ 环境更灵活且更易于管理。\n\n此外，想想我们的情况，每个需要为其应用程序存储的开发者都需要拥有 DigitalOcean 云密钥和访问 **doctl**\
    \ 的权限，以便在创建任何 PVC 之前创建块对象存储。听起来相当复杂，对吧？动态供应将所有这些从你的开发者那里抽象出来。\n\n## 实际示例\n\n这次我们只创建\
    \ PVC。\n\n```yaml\napiVersion: v1\nkind: PersistentVolumeClaim\nmetadata:\n  name:\
    \ dynamic-cache\nspec:\n  accessModes:\n    - ReadWriteOnce\n  resources:\n  \
    \  requests:\n      storage: 2Gi\n  storageClassName: do-block-storage\n```\n\n\
    ```\n$ kubectl apply -f pvc-dynamic.yaml -n full-stack\npersistentvolumeclaim/dynamic-cache\
    \ created\n```\n\nPVC 被创建了，PV 也被创建了！\n\n```\n$ kubectl get pvc -n full-stack\n\
    NAME            STATUS   VOLUME          CAPACITY   ACCESS MODES   STORAGECLASS\
    \      VOLUMEATTRIBUTESCLASS AGE\ncache           Bound    cache           2Gi\
    \        RWO            do-block-storage  <unset>                157m\ndynamic-cache\
    \   Bound    pvc-991f35c9-c4d2-4e9f-9fdf-9aa65e819935  2Gi  RWO  do-block-storage\
    \  <unset>  9s\n```\n\n```\n$ kubectl get pv\nNAME                           \
    \            CAPACITY   ACCESS MODES   RECLAIM POLICY   STATUS   CLAIM       \
    \                STORAGECLASS      VOLUMEATTRIBUTESCLASS   REASON   AGE\ncache\
    \                                      2Gi        RWO            Retain      \
    \     Bound    full-stack/cache            do-block-storage  <unset>         \
    \              160m\npvc-991f35c9-c4d2-4e9f-9fdf-9aa65e819935   2Gi        RWO\
    \            Delete           Bound    full-stack/dynamic-cache    do-block-storage\
    \  <unset>                       13s\n```\n\n让我们检查一下后端是否也创建了存储对象。\n\n```\n$ doctl\
    \ compute volume list\nID                                    Name            \
    \                          Size   Region   Filesystem Type   Filesystem Label\
    \   Droplet IDs   Tags\nd5716c46-d22a-11ee-b619-0a58ac14b586  cache          \
    \                           2 GiB  blr1     ext4               [402016564]   \
    \     k8s:72ad2064-31b4-4552-a630-c88487140b6f\nc993be03-d241-11ee-bb89-0a58ac14b93e\
    \  pvc-991f35c9-c4d2-4e9f-9fdf-9aa65e819935  2 GiB  blr1     unknown         \
    \   k8s:72ad2064-31b4-4552-a630-c88487140b6f\n```\n\n接下来的步骤与此相同。\n\n## PV 和 PVC\
    \ 之间的关键区别\n\n持久卷 (PV) 和持久卷声明 (PVC) 是 Kubernetes 中与存储相关的两个基本概念。它们协同工作以在集群中提供和管理存储，但它们扮演着不同的角色：\n\
    \n### 持久卷 (PV)\n\n**集群资源：** PV 是集群级别的资源，代表集群中的一块存储。它们独立于任何单个 Pod 的生命周期，可以由管理员手动或通过\
    \ StorageClass 动态供应。\n\n**供应：** 可以由管理员预供应，也可以由 Kubernetes 使用 StorageClass 动态供应。供应方法决定了\
    \ PV 的创建方式及其代表的内容（例如，云存储中的磁盘、节点上的本地路径等）。\n\n**生命周期和管理：** 在集群级别进行管理，这意味着它们存在于 Kubernetes\
    \ 集群中，直到被手动删除或根据回收策略被回收。PV 有其自己的生命周期，独立于使用它们的 Pod。\n\n**访问策略：** 包括访问模式（例如，ReadWriteOnce、ReadOnlyMany、ReadWriteMany）和回收策略，该策略规定了\
    \ PV 从声明中释放后会发生什么（例如，Retain、Delete、Recycle）。\n\n### 持久卷声明 (PVC)\n\n**Pod 资源：**\
    \ PVC 是用户对存储的请求。它们指定大小、访问模式，有时还指定特定的 StorageClass。PVC 是命名空间资源，这意味着它们存在于特定的命名空间中，并由该命名空间中的\
    \ Pod 使用。\n\n**请求存储：** 充当用户对存储的请求。它指定大小和访问模式（例如，卷是否可以作为读写挂载到单个节点，或作为只读挂载到多个节点），并可选地请求特定的\
    \ StorageClass。\n\n**绑定：** PVC 会自动绑定到满足其要求的可用 PV。此绑定由 Kubernetes 完成，并基于 PVC 中指定的大小、访问模式和\
    \ StorageClass。\n\n**生命周期：** PVC 的生命周期与其所在的命名空间和使用它的 Pod 相关联。只要 Pod 需要，PVC 就存在，当不再使用时会被删除。\n\
    \n### 关键区别总结\n\n**范围：** PV 是集群范围的资源，而 PVC 是命名空间范围的。\n\n**目的：** PV 代表集群中可用的物理或虚拟存储空间，而\
    \ PVC 代表用户或应用程序对存储的请求。\n\n**生命周期：** PV 的生命周期独立于 Pod 进行管理，但 PVC 与使用它的 Pod 的生命周期相关联。\n\
    \n**供应：** PV 可以静态供应（由管理员预供应）或动态供应（由 Kubernetes 响应 PVC 自动创建）。PVC 始终由用户或应用程序创建以请求存储资源。\n\
    \n**使用：** PV 绑定到 PVC 以满足存储请求。PVC 指定其在存储方面的需求，Kubernetes 将其绑定到适当的 PV。\n\n理解 PV\
    \ 和 PVC 之间的关系和区别对于在 Kubernetes 中有效管理存储至关重要，确保应用程序拥有其运行所需的必要存储资源。\n\n## 总结\n\n\
    在本章中，我们探讨了几个关键概念，这些概念是管理 Kubernetes 中状态和配置的基础，增强了应用程序的可移植性、可扩展性和安全性。通过深入研究 ConfigMaps、Secrets、Init\
    \ Containers 和持久性，我们掌握了创建复杂的云原生应用程序所需的工具，这些应用程序可以优雅地处理配置数据、安全管理敏感信息、确保正确的初始化，并在应用程序的整个生命周期中维护数据。\n\
    \n**ConfigMaps** 允许我们将配置工件与镜像内容解耦，使应用程序能够动态配置。这种灵活性对于在不同环境中部署相同的应用程序而无需重新构建或更改代码至关重要。\n\
    \n**Secrets** 提供了一种安全的机制来存储和管理敏感信息，如密码、OAuth 令牌和 ssh 密钥，保护它们免受暴露和未经授权的访问。我们学习了如何使用\
    \ Secrets 来保护应用程序的机密数据，确保其在传输和静态时保持加密。\n\n**Init Containers** 提供了一种强大的方式，在 Pod\
    \ 的主容器启动之前执行设置任务。我们看到 init 容器可用于诸如等待依赖项就绪、设置"
