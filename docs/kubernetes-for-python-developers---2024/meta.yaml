- md: "(9) -> Mounts a specific **redis.conf** file from a configMap to **/tmp/redis/redis.conf**\
    \ in the container.\n\n(10) -> Defines a volume named redis-script, sourced from\
    \ a ConfigMap, containing the **redis-init.sh** script.\n\n(11) -> Defines another\
    \ volume named redis-config, sourced from the same ConfigMap, containing the redis.conf\
    \ file.\n\n(12) -> Specifies the PersistentVolumeClaim templates for dynamic volume\
    \ provisioning, ensuring each pod in the StatefulSet has its own persistent storage.\n\
    \n## About persistent volume claim templates\n\nThe **volumeClaimTemplates** section\
    \ in a StatefulSet specification is a powerful feature that automates the provisioning\
    \ of PersistentVolumes (PVs) for each pod in the StatefulSet. This ensures that\
    \ each pod has its own unique, persistent storage that survives pod restarts and\
    \ rescheduling, which is crucial for stateful applications that need to maintain\
    \ state across restarts and failures. Here's a breakdown of how volumeClaimTemplates\
    \ work and their significance:\n\n## Automation of Persistent Storage\n\n**Dynamic\
    \ Provisioning:** When a StatefulSet is deployed, for each pod that is created,\
    \ Kubernetes dynamically provisions a new PersistentVolume (PV) based on the specifications\
    \ defined in the volumeClaimTemplates. This means you don't need to manually create\
    \ PVs for each pod in your stateful application.\n\n**One-to-One Mapping:** Each\
    \ pod in the StatefulSet gets its own PersistentVolumeClaim (PVC), which in turn\
    \ is bound to a unique PV. This one-to-one mapping ensures that the data stored\
    \ on the PV is exclusive to the pod, providing a stable storage system even as\
    \ pods are created and destroyed.\n\n## Template Structure\n\n**Specifying Claims:**\
    \ The volumeClaimTemplates will include one or more PVC definitions that specify\
    \ the desired storage class, access modes (e.g., ReadWriteOnce), and resource\
    \ requests (e.g., storage size). These definitions are used as templates to create\
    \ actual PVCs for each pod.\n\n**Stable and Unique Storage:** The PVCs created\
    \ from volumeClaimTemplates are automatically named with a unique suffix based\
    \ on the pod's ordinal index. This ensures that each pod's storage is isolated\
    \ and persistent, maintaining the stateful nature of the application.\n\n**Storage\
    \ Class Usage:** The template can specify a storageClassName to determine which\
    \ StorageClass to use for provisioning the PVs. This allows for the use of different\
    \ types of storage (e.g., SSDs, standard disk drives) and storage from different\
    \ providers (cloud, on-premises).\n\nIn the context of the Redis StatefulSet example,\
    \ the **volumeClaimTemplates** section ensures that each Redis pod in the StatefulSet\
    \ has its own PVC named **redis-data-<pod-index>**, which in turn is bound to\
    \ a uniquely provisioned PV with at least **1Gi** of storage, accessible in **ReadWriteOnce**\
    \ mode.\n\nThe **volumeClaimTemplates** feature in StatefulSets is essential for\
    \ managing stateful applications in Kubernetes, providing a scalable and automated\
    \ way to handle persistent storage. It abstracts the complexity of managing individual\
    \ PVs and PVCs, allowing developers to focus on the application logic rather than\
    \ the underlying infrastructure.\n\n## Headless service\n\nThe inclusion of a\
    \ Service entry, especially a headless service, in the context of a Redis StatefulSet\
    \ in Kubernetes, serves several crucial purposes for stateful applications and\
    \ their discovery mechanisms.\n\nA headless service in Kubernetes does not provide\
    \ load-balancing or a single IP address. Instead, it allows pods to be accessed\
    \ directly through their own IP addresses. For stateful applications like Redis,\
    \ where each instance may need to be accessed individually (e.g., for replication\
    \ or sharding purposes), a headless service provides a stable DNS entry for each\
    \ pod based on its hostname and the service name.\n\n![](img/91c4bde832e221ba5bc429caf9587286_320_0.png)\n\
    \n## Headless service\n\nThis stable network identity is crucial for Redis nodes\
    \ to communicate with each other, especially in cluster or replication setups\
    \ where nodes need to discover and connect to the master or other replicas.\n\n\
    The service acts as a method for service discovery within the cluster. Pods can\
    \ discover the IP addresses of other pods using DNS queries. For example, a Redis\
    \ replica can discover the master's IP address using DNS if the master's hostname\
    \ is known.\n\nIn the provided example, if you name your service **redis**, and\
    \ your StatefulSet pods are named in the pattern **redis-0**, **redis-1**, etc.,\
    \ a pod can query DNS for **redis-0.redis** to get the IP address of the **redis-0**\
    \ pod. This is especially useful for initial configuration and for handling failovers\
    \ or topology changes within the Redis cluster.\n\nWe define a headless service\
    \ as follows:\n\n```\napiVersion: v1\nkind: Service\nmetadata:\n  name: redis\
    \ # (1)\nspec:\n  ports:\n    - port: 6379 # (2)\n      targetPort: 6379\n  clusterIP:\
    \ None # (3)\n  selector:\n    app: redis # (4)\n```\n\n(1) -> The name of the\
    \ service. This is arbitrary.\n\n(2) -> The port through which we want to expose\
    \ the service.\n\n(3) -> The most important line in this artifact. When we give\
    \ **clusterIP** as **None**, Kubernetes treats it as a headless service and doesn't\
    \ assign any IP for that.\n\n(4) -> The selector labels should match our statefulset\
    \ labels.\n\nLet's apply the configmap, statefulset and service in that order.\n\
    \n```\n$ kubectl create configmap redis-custom --from-file=redis.conf=redis.conf\
    \ --from-file=redis-init.sh=redis-init.sh -n robust-setup\nconfigmap/redis-custom\
    \ created\n```\n\n```\n$ kubectl apply -f redis-sts.yaml -n robust-setup\nstatefulset.apps/redis\
    \ created\n```\n\n```\n$ kubectl apply -f redis-headless-svc.yaml -n robust-setup\n\
    service/redis created\n```\n\nYou will notice that the pods of the statefulset\
    \ come up one by one and not all at the same time.\n\n```\n$ kubectl get pod -n\
    \ robust-setup --watch\nNAME      READY   STATUS              RESTARTS   AGE\n\
    redis-0   0/1     Init:0/1            0          4s\nredis-0   0/1     PodInitializing\
    \     0          12s\nredis-0   1/1     Running             0          13s\nredis-1\
    \   0/1     Pending             0          0s\nredis-1   0/1     Pending     \
    \        0          3s\nredis-1   0/1     Init:0/1            0          3s\n\
    ```\n\n```\n$ kubectl get pod -n robust-setup\nNAME      READY   STATUS    RESTARTS\
    \   AGE\nredis-0   1/1     Running   0          119s\nredis-1   1/1     Running\
    \   0          106s\nredis-2   1/1     Running   0          92s\n```\n\nThe first\
    \ ordinal **0** boots first, followed by **1** and **2**. This is an inherent\
    \ property of statefulsets. Let's check the logs to see why this is important\
    \ in the context of Redis.\n\n```\n$ kubectl logs -f redis-0 -n robust-setup #\
    \ (1)\nDefaulted container \"redis\" out of: redis, volume-permissions (init)\n\
    Starting as as master... # (2)\n17:C 29 Feb 2024 06:23:42.714 * oO0OoO0OoO0Oo\
    \ Redis is starting oO0OoO0OoO0Oo\n17:C 29 Feb 2024 06:23:42.714 * Redis version=7.2.4,\
    \ bits=64, commit=00000000, modified=0, pid=17, just started\n17:C 29 Feb 2024\
    \ 06:23:42.714 * Configuration loaded\n17:M 29 Feb 2024 06:23:42.715 * monotonic\
    \ clock: POSIX clock_gettime\n17:M 29 Feb 2024 06:23:42.715 * Running mode=standalone,\
    \ port=6379.\n17:M 29 Feb 2024 06:23:42.716 * Server initialized\n17:M 29 Feb\
    \ 2024 06:23:42.716 * Ready to accept connections tcp\n17:M 29 Feb 2024 06:23:56.580\
    \ * Replica 10.244.0.20:6379 asks for synchronization # (3)\n17:M 29 Feb 2024\
    \ 06:23:56.580 * Full resync requested by replica 10.244.0.20:6379\n17:M 29 Feb\
    \ 2024 06:23:56.580 * Replication backlog created, my new replication IDs are\
    \ 'c23ad16898eaf58472ee2dd577d908119df94c07' and '0000000000000000000000000000000000000000'\n\
    17:M 29 Feb 2024 06:23:56.580 * Delay next BGSAVE for diskless SYNC\n17:M 29 Feb\
    \ 2024 06:24:01.787 * Starting BGSAVE for SYNC with target: replicas sockets\n\
    17:M 29 Feb 2024 06:24:01.788 * Background RDB transfer started by pid 22\n22:C\
    \ 29 Feb 2024 06:24:01.789 * Fork CoW for RDB: current 0 MB, peak 0 MB, average\
    \ 0 MB\n17:M 29 Feb 2024 06:24:01.789 * Diskless rdb transfer, done reading from\
    \ pipe, 1 replicas still up.\n17:M 29 Feb 2024 06:24:01.796 * Background RDB transfer\
    \ terminated with success\n17:M 29 Feb 2024 06:24:01.796 * Streamed RDB transfer\
    \ with replica 10.244.0.20:6379 succeeded (socket). Waiting for REPLCONF ACK from\
    \ replica to enable streaming\n17:M 29 Feb 2024 06:24:01.796 * Synchronization\
    \ with replica 10.244.0.20:6379 succeeded\n17:M 29 Feb 2024 06:24:09.700 * Replica\
