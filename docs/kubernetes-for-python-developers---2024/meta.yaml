    # service accounts inside pods


    There are many scenarios where we would want to associate a service account with
    a pod. Kubernetes automatically mounts the service account token and related credentials
    (CA certificates and namespace) into pods using the associated service account.
    This eliminates the need for manual credential management, making it easier to
    build and deploy secure, cloud-native applications.


    There are 2 broad scenarios where this is useful.


    **Authentication:** Service accounts provide an identity for pods to use when
    making requests to the Kubernetes API, allowing for secure and authenticated API
    access. This is essential for applications that need to interact with the Kubernetes
    system to read or modify resources.'
