    Container images in registries can be identified by either tags or SHA (Secure\
    \ Hash Algorithm) digests. Both serve as identifiers, but they have different\
    \ characteristics and uses:\n\n+   1. Image Tags\n\n    Tags are human-readable\
    \ labels attached to image versions, such as nginx:1.19, where nginx is the image\
    \ name, and 1.19 is the tag indicating the version. Tags are mutable, meaning\
    \ the same tag can be reassigned to a different image over time (e.g., latest\
    \ tag).\n\n    Tags are used for easier reference and management of images, allowing\
