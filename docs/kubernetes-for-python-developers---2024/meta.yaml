    # Configmaps and 12-factor principles


    The [12-factor app methodology](https://12factor.net/) is a set of principles
    designed for building scalable, portable, and maintainable applications, especially
    in the cloud. ConfigMaps in Kubernetes align with several aspects of the 12-factor
    methodology, particularly around configuration, codebase, dependencies, and backing
    services.


    The third factor of the 12-factor app methodology emphasizes strict separation
    of configuration from code. Configuration might include database URLs, external
    service credentials, or deployment-specific parameters. According to the 12-factor
    methodology, such configuration should vary between deployments but remain independent
    of the application''s code, making it easy to change configuration without changing
    the code.


    Let''s see how ConfigMaps align with this principle.'
  - '[PAGE 236]


    **External Configuration:** ConfigMaps provide a way to store configuration data
    separate from container images and application code, aligning perfectly with the
    12-factor app''s directive to separate configuration from code. This allows the
    same application image to be promoted across different environments (development,
    testing, production) without rebuilds, with environment-specific configurations
    applied at deployment time.


    **Environment Parity:** By externalizing configuration, ConfigMaps help maintain
    parity between different environments, a key tenet of the 12-factor app. Configurations
    can be changed or updated without affecting the application''s binary, ensuring
    that differences between environments are limited to configurations stored in
    ConfigMaps.


    **Portability:** ConfigMaps enhance the portability of applications across different
    Kubernetes clusters or environments. Since the application code does not hard-code
    configuration values, moving the application simply involves applying the appropriate
    ConfigMaps in the new environment.


    # Supporting Other 12-Factor Principles


    While the most direct alignment of ConfigMaps is with Factor III: Config, their
    use also supports other 12-factor principles:


    **Factor I: Codebase and Factor II: Dependencies:** Although ConfigMaps are more
    directly related to configuration, their use supports the principles of a single
    codebase tracked in revision control and explicitly declared and isolated dependencies.
    By keeping configuration separate and external, ConfigMaps ensure that the codebase
    remains clean and focused, and dependencies (on external resources or configurations)
    are clearly defined and managed outside the application.'
- md: "## Factor IV: Backing Services\n\nConfigMaps can store information about backing\
    \ services, treating these resources as attached resources that can be swapped\
    \ or reconfigured without code changes. This facilitates loose coupling to backing\
    \ services. This is exactly what we did when we externalized **REDIS_HOST** as\
    \ a configmap-based environment variable.\n\nConsider a Flask application that\
    \ requires an external API URL and credentials. Instead of hardcoding these within\
    \ the application or its Docker image, you would store them in a ConfigMap:\n\n\
    ```yaml\napiVersion: v1\nkind: ConfigMap\nmetadata:\n  name: flask-config\ndata:\n\
    \  API_URL: \"https://api.example.com\"\n  API_KEY: \"secret-api-key\"\n```\n\n\
    The application reads these values from its environment, which Kubernetes populates\
    \ from the ConfigMap at runtime. This setup adheres to the 12-factor methodology\
    \ by separating configuration (the API URL and key) from the application code,\
    \ promoting configurability, portability, and environment parity.\n\nFor instance,\
    \ you might run a deployment in a development namespace and point it to a dev-version\
    \ of the configmap with a different set of **API_URL** and **API_KEY**. You can\
    \ run the same instance in a production namespace and point it to a different\
    \ configmap with a different set of values for these variables. All this without\
    \ changing the code.\n\nConfigMaps embody the principles of the 12-factor app\
    \ methodology by enabling external, environment-specific configuration. This enhances\
    \ application portability, scalability, and maintainability in cloud-native environments.\n\
    \nYou might be thinking whether to externalize stuff like **REDIS_PASSWORD** and\
    \ **API_KEY** as configmaps as these are plain-text, and you are right. That's\
    \ why we have secrets.\n\n## Secrets\n\nKubernetes Secrets are objects that let\
    \ you store and manage sensitive information, such as passwords, OAuth tokens,\
    \ and ssh keys, avoiding the need to store sensitive data in your Pod specifications\
    \ or in container images. Using Secrets is more secure than using ConfigMaps for\
    \ non-sensitive configuration, as Secrets can be encrypted at rest and accessed\
    \ through a secure API.\n\n## Why Use Secrets?\n\n- **Security:** Secrets are\
    \ designed to hold sensitive information, reducing the risk of exposing confidential\
    \ data.\n- **Management:** They provide a centralized way to manage sensitive\
    \ information, making it easier to update or rotate credentials without modifying\
    \ your application code or deployment configurations.\n\n## An example: nginx\
    \ auth\n\nLet's demonstrate how to use Kubernetes Secrets by setting up basic\
    \ authentication for an Nginx server.\n\nWe'll create a Secret to store the credentials\
    \ and configure Nginx to use this Secret for authentication.\n\n### Step 1: Create\
    \ the htpasswd File\n\nFirst, create a file with the username and encrypted password.\
    \ You can use tools like **openssl** or **htpasswd** (part of Apache utilities)\
    \ for encryption. For example:\n\n```bash\n$ htpasswd -c ./auth myuser\n```\n\n\
    This command prompts you for a password and creates an auth file containing your\
    \ encrypted password.\n\n**Note:** Don't sweat over if you don't have **htpasswd**\
    \ installed in your system, you can copy over the generated file from the source\
    \ code without running this step. The password is **mypassword**.\n\n### Step\
    \ 2: Create a Kubernetes Secret from the htpasswd File\n\nConvert the auth file\
    \ into a Kubernetes Secret:\n\n```bash\n$ kubectl create secret generic nginx-auth\
    \ --from-file=auth -n notch-further\nsecret/nginx-auth created\n```\n\nThis command\
    \ creates a Secret named **nginx-auth** containing the content of your auth file.\n\
    \n### Step 3: Configure the Nginx deployment to use the Secret\n\nModify your\
    \ Nginx deployment to mount the Secret and configure Nginx to use basic authentication.\n\
    \nYou have to slightly tweak your **nginx.conf** to support the auth you just\
    \ created.\n\n```nginx\nuser nginx;\nworker_processes auto;\n\nevents {\n    worker_connections\
    \ 1024;\n}\n\nhttp {\n    server {\n        listen 80;\n        server_name localhost;\n\
    \n        location / {\n            root /usr/share/nginx/html;\n            index\
    \ index.html;\n            auth_basic \"Restricted Content\"; # (1)\n        \
    \    auth_basic_user_file /etc/nginx/auth/auth; # (2)\n        }\n    }\n}\n```\n\
    \n(1) -> The message you display to the user.\n(2) -> The auth file to refer to\
    \ for checking the credentials. We will mount this as a Kubernetes secret.\n\n\
    ```bash\n$ kubectl create configmap nginx-auth-conf --from-file=nginx-auth.conf\
    \ -n notch-further\nconfigmap/nginx-auth-conf created\n```\n\nLet's finally look\
    \ at the nginx deployment changes.\n\n```yaml\napiVersion: apps/v1\nkind: Deployment\n\
    metadata:\n  name: nginx-auth\nspec:\n  replicas: 1\n  selector:\n    matchLabels:\n\
    \      app: nginx\n  template:\n    metadata:\n      labels:\n        app: nginx\n\
    \    spec:\n      containers:\n      - name: nginx\n        image: nginx\n   \
    \     volumeMounts: # (1)\n        - name: auth-volume # (2)\n          mountPath:\
    \ \"/etc/nginx/auth\" # (3)\n          readOnly: true # (4)\n        - name: conf-volume\
    \ # (5)\n          mountPath: /etc/nginx/nginx.conf # (6)\n          subPath:\
    \ nginx-auth.conf # (7)\n        ports:\n        - containerPort: 80\n      volumes:\n\
    \      - name: auth-volume # (8)\n        secret: # (9)\n          secretName:\
    \ nginx-auth # (10)\n      - name: conf-volume # (11)\n        configMap:\n  \
    \        name: nginx-auth-conf\n```\n\n(1) -> Specifies the volumes to be mounted\
    \ into the container.\n(2) -> Names the volume that contains authentication data,\
    \ linking it to the volumes section.\n(3) -> Defines the container directory where\
    \ the authentication volume will be mounted.\n(4) -> Indicates that the mounted\
    \ volume is read-only.\n(5) -> Names another volume for Nginx configuration, linking\
    \ it to the volumes section.\n(6) -> Specifies the path in the container where\
    \ the Nginx configuration file is to be mounted.\n(7) -> Uses a specific file\
    \ from the volume, allowing a single file to be mounted from a ConfigMap or Secret.\n\
    (8) -> Declares a volume sourced from a Secret, intended for authentication data.\n\
    (9) -> Indicates the volume source is a Kubernetes Secret.\n(10) -> Specifies\
    \ the name of the Secret that contains the authentication data.\n(11) -> Declares\
    \ another volume, this time sourced from a ConfigMap, intended for the Nginx configuration.\n\
    \nAfter deploying this, let's check if the secrets work.\n\n```bash\n$ kubectl\
    \ apply -f nginx-auth-deployment.yaml -n notch-further\ndeployment.apps/nginx-auth\
    \ created\n```\n\n```bash\n$ kubectl port-forward deploy/nginx-auth 8080:80 -n\
    \ notch-further\nForwarding from 127.0.0.1:8080 -> 80\nForwarding from [::1]:8080\
    \ -> 80\n```\n\nLet's check http://localhost:8080/ from our browser.\n\n![nginx\
    \ auth in action](img/91c4bde832e221ba5bc429caf9587286_244_0.png)\n\n**Note:**\
    \ There is a good chance that you might see an older cached copy and you won't\
    \ be prompted for the credentials. So, it is recommended to open this in an incognito\
    \ window.\n\n## Inspecting secrets\n\nLet's take a closer look at secrets.\n\n\
    ```bash\n$ kubectl get secret nginx-auth -n notch-further -o yaml\napiVersion:\
    \ v1\ndata:\n  auth: bXl1c2VyOiRhcHIxJEZKUVFyLy95JE5PRVdsTkFPUjBhWW9ORkowandKcTEK\
    \ # (1)\nkind: Secret\nmetadata:\n  creationTimestamp: \"2024-02-23T04:55:27Z\"\
    \n  name: nginx-auth\n  namespace: notch-further\n  resourceVersion: \"1277520\"\
    \n  uid: bedd4dc1-044a-470e-9212-0da650c56c78\ntype: Opaque\n```\n\n(1) -> The\
    \ **auth** key has a gibberish value, but it is just a base64 encoded version\
    \ of your auth file.\n\nLet's confirm this.\n\n```bash\n$ echo \"bXl1c2VyOiRhcHIxJEZKUVFyLy95JE5PRVdsTkFPUjBhWWOORkowandKcTEK\"\
    \ | base64 --decode\nmyuser:$apr1$FJQQr//y$NOEWlNAOR0aYm4FJ0jwJq1\n```\n\nKubernetes\
    \ Secrets are by default base64-encoded, not encrypted. Base64 encoding is used\
    \ for data representation, making binary data compatible with systems that only\
    \ handle textual data. It's important to note that base64 encoding is not a security\
    \ measure; it merely ensures safe transport and storage of data that may not be\
    \ inherently text-friendly.\n\n## Why encrypt and not encode\n\n- **Simplicity\
    \ and Compatibility:** Encoding simplifies the handling of binary or special character\
    \ data across different systems and software. It ensures that the secret data\
    \ can be safely represented in Kubernetes manifests or APIs without corruption.\n\
    - **Legacy Design Choices:** The initial design of Kubernetes Secrets did not\
    \ include built-in encryption at rest, focusing instead on ease of use and basic\
    \ protection against casual browsing. The responsibility for securing access to\
    \ Secrets was largely delegated to the underlying storage system and cluster access\
    \ controls."
  mdcn: "## 因素四：后端服务\n\nConfigMap 可以存储关于后端服务的信息，将这些资源视为可随时替换或重新配置的附加资源，而无需更改代码。这有助于实现与后端服务的松耦合。这正是我们之前将\
    \ **REDIS_HOST** 外部化为基于 ConfigMap 的环境变量时所做的。\n\n考虑一个需要外部 API URL 和凭据的 Flask 应用程序。与其在应用程序或其\
    \ Docker 镜像中硬编码这些信息，不如将它们存储在 ConfigMap 中：\n\n```yaml\napiVersion: v1\nkind: ConfigMap\n\
    metadata:\n  name: flask-config\ndata:\n  API_URL: \"https://api.example.com\"\
    \n  API_KEY: \"secret-api-key\"\n```\n\n应用程序从其环境中读取这些值，而 Kubernetes 在运行时从 ConfigMap\
    \ 中填充这些环境变量。这种设置通过将配置（API URL 和密钥）与应用程序代码分离，遵循了 12 因素应用方法论，从而提升了可配置性、可移植性和环境一致性。\n\
    \n例如，你可能在开发命名空间中运行一个部署，并将其指向一个具有不同 **API_URL** 和 **API_KEY** 集的开发版本 ConfigMap。你也可以在生产命名空间中运行相同的实例，并将其指向另一个具有不同变量值的\
    \ ConfigMap。所有这些都无需更改代码。\n\nConfigMap 通过支持外部的、特定于环境的配置，体现了 12 因素应用方法论的原则。这增强了应用程序在云原生环境中的可移植性、可扩展性和可维护性。\n\
    \n你可能会考虑是否应该将 **REDIS_PASSWORD** 和 **API_KEY** 等明文信息外部化为 ConfigMap，你的想法是对的。这就是为什么我们有\
    \ Secrets。\n\n## Secrets\n\nKubernetes Secrets 是允许你存储和管理敏感信息（如密码、OAuth 令牌和 ssh\
    \ 密钥）的对象，避免了将敏感数据存储在 Pod 规范或容器镜像中的需要。与用于非敏感配置的 ConfigMap 相比，使用 Secrets 更安全，因为\
    \ Secrets 可以静态加密，并通过安全的 API 进行访问。\n\n## 为什么使用 Secrets？\n\n- **安全性：** Secrets 旨在保存敏感信息，降低了泄露机密数据的风险。\n\
    - **管理：** 它们提供了一种集中管理敏感信息的方式，使得在不修改应用程序代码或部署配置的情况下更新或轮换凭据变得更加容易。\n\n## 示例：nginx\
    \ 认证\n\n让我们通过为 Nginx 服务器设置基本认证来演示如何使用 Kubernetes Secrets。\n\n我们将创建一个 Secret 来存储凭据，并配置\
    \ Nginx 使用此 Secret 进行认证。\n\n### 步骤 1：创建 htpasswd 文件\n\n首先，创建一个包含用户名和加密密码的文件。你可以使用\
    \ **openssl** 或 **htpasswd**（Apache 工具的一部分）等工具进行加密。例如：\n\n```bash\n$ htpasswd\
    \ -c ./auth myuser\n```\n\n此命令会提示你输入密码，并创建一个包含加密密码的 auth 文件。\n\n**注意：** 如果你的系统中没有安装\
    \ **htpasswd**，也不必担心，你可以直接从源代码中复制生成的文件，而无需执行此步骤。密码是 **mypassword**。\n\n### 步骤\
    \ 2：从 htpasswd 文件创建 Kubernetes Secret\n\n将 auth 文件转换为 Kubernetes Secret：\n\n```bash\n\
    $ kubectl create secret generic nginx-auth --from-file=auth -n notch-further\n\
    secret/nginx-auth created\n```\n\n此命令创建一个名为 **nginx-auth** 的 Secret，其中包含你的 auth\
    \ 文件的内容。\n\n### 步骤 3：配置 Nginx 部署以使用 Secret\n\n修改你的 Nginx 部署以挂载 Secret，并配置 Nginx\
    \ 使用基本认证。\n\n你需要稍微调整你的 **nginx.conf** 以支持你刚刚创建的认证。\n\n```nginx\nuser nginx;\n\
    worker_processes auto;\n\nevents {\n    worker_connections 1024;\n}\n\nhttp {\n\
    \    server {\n        listen 80;\n        server_name localhost;\n\n        location\
    \ / {\n            root /usr/share/nginx/html;\n            index index.html;\n\
    \            auth_basic \"Restricted Content\"; # (1)\n            auth_basic_user_file\
    \ /etc/nginx/auth/auth; # (2)\n        }\n    }\n}\n```\n\n(1) -> 显示给用户的消息。\n\
    (2) -> 用于检查凭据的认证文件。我们将将其作为 Kubernetes secret 挂载。\n\n```bash\n$ kubectl create\
    \ configmap nginx-auth-conf --from-file=nginx-auth.conf -n notch-further\nconfigmap/nginx-auth-conf\
    \ created\n```\n\n最后，让我们看看 nginx 部署的变更。\n\n```yaml\napiVersion: apps/v1\nkind:\
    \ Deployment\nmetadata:\n  name: nginx-auth\nspec:\n  replicas: 1\n  selector:\n\
    \    matchLabels:\n      app: nginx\n  template:\n    metadata:\n      labels:\n\
    \        app: nginx\n    spec:\n      containers:\n      - name: nginx\n     \
    \   image: nginx\n        volumeMounts: # (1)\n        - name: auth-volume # (2)\n\
    \          mountPath: \"/etc/nginx/auth\" # (3)\n          readOnly: true # (4)\n\
    \        - name: conf-volume # (5)\n          mountPath: /etc/nginx/nginx.conf\
    \ # (6)\n          subPath: nginx-auth.conf # (7)\n        ports:\n        - containerPort:\
    \ 80\n      volumes:\n      - name: auth-volume # (8)\n        secret: # (9)\n\
    \          secretName: nginx-auth # (10)\n      - name: conf-volume # (11)\n \
    \       configMap:\n          name: nginx-auth-conf\n```\n\n(1) -> 指定要挂载到容器中的卷。\n\
    (2) -> 命名包含认证数据的卷，将其链接到 volumes 部分。\n(3) -> 定义认证卷将挂载到的容器目录。\n(4) -> 指示挂载的卷是只读的。\n\
    (5) -> 命名另一个用于 Nginx 配置的卷，将其链接到 volumes 部分。\n(6) -> 指定 Nginx 配置文件要挂载到的容器路径。\n\
    (7) -> 使用卷中的特定文件，允许从 ConfigMap 或 Secret 挂载单个文件。\n(8) -> 声明一个源自 Secret 的卷，用于认证数据。\n\
    (9) -> 指示卷源是 Kubernetes Secret。\n(10) -> 指定包含认证数据的 Secret 的名称。\n(11) -> 声明另一个卷，这次源自\
    \ ConfigMap，用于 Nginx 配置。\n\n部署此配置后，让我们检查 secrets 是否有效。\n\n```bash\n$ kubectl apply\
    \ -f nginx-auth-deployment.yaml -n notch-further\ndeployment.apps/nginx-auth created\n\
    ```\n\n```bash\n$ kubectl port-forward deploy/nginx-auth 8080:80 -n notch-further\n\
    Forwarding from 127.0.0.1:8080 -> 80\nForwarding from [::1]:8080 -> 80\n```\n\n\
    让我们从浏览器检查 http://localhost:8080/。\n\n![nginx auth in action](img/91c4bde832e221ba5bc429caf9587286_244_0.png)\n\
    \n**注意：** 你很有可能看到的是旧的缓存副本，而不会提示你输入凭据。因此，建议在隐身窗口中打开此页面。\n\n## 检查 secrets\n\n让我们更仔细地看看\
    \ secrets。\n\n```bash\n$ kubectl get secret nginx-auth -n notch-further -o yaml\n\
    apiVersion: v1\ndata:\n  auth: bXl1c2VyOiRhcHIxJEZKUVFyLy95JE5PRVdsTkFPUjBhWW9ORkowandKcTEK\
    \ # (1)\nkind: Secret\nmetadata:\n  creationTimestamp: \"2024-02-23T04:55:27Z\"\
    \n  name: nginx-auth\n  namespace: notch-further\n  resourceVersion: \"1277520\"\
    \n  uid: bedd4dc1-044a-470e-9212-0da650c56c78\ntype: Opaque\n```\n\n(1) -> **auth**\
    \ 键的值看起来是乱码，但它只是你的 auth 文件的 base64 编码版本。\n\n让我们确认一下。\n\n```bash\n$ echo \"bXl1c2VyOiRhcHIxJEZKUVFyLy95JE5PRVdsTkFPUjBhWWOORkowandKcTEK\"\
    \ | base64 --decode\nmyuser:$apr1$FJQQr//y$NOEWlNAOR0aYm4FJ0jwJq1\n```\n\nKubernetes\
    \ Secrets 默认是 base64 编码的，而不是加密的。Base64 编码用于数据表示，使二进制数据与仅处理文本数据的系统兼容。需要指出的是，base64\
    \ 编码不是一种安全措施；它只是确保可能本身不适合文本表示的数据能够安全地传输和存储。\n\n## 为什么是加密而不是编码\n\n- **简单性和兼容性：**\
    \ 编码简化了跨不同系统和软件处理二进制或特殊字符数据的过程。它确保 secret 数据可以在 Kubernetes 清单或 API 中安全地表示而不会损坏。\n\
    - **遗留设计选择：** Kubernetes Secrets 的初始设计并未包含内置的静态加密，而是侧重于易用性和防止随意浏览的基本保护。保护对 Secrets\
    \ 访问的责任在很大程度上被委托给了底层的存储系统和集群访问控制。"
