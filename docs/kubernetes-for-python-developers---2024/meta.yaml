- img_proc: true
  md: 'The main characteristic of tags is their mutability; the same tag can point
    to different image content at different times. This makes them convenient for
    indicating evolving states like the latest version but can lead to unpredictability
    in deployments if not managed carefully.


    # 2. Image SHAs (Digests)


    SHA digests are immutable identifiers for image content, generated by the registry
    when an image is pushed. It''s a hash of the image''s contents. For example, an
    image might have a SHA digest like **sha256:45b23dee0a....**


    SHAs are used when you need an immutable reference to an image. Since the digest
    is a hash of the image''s content, it uniquely and reliably identifies a specific
    set of content. Using SHAs ensures that the exact version of an image is always
    used, eliminating the "it works on my machine" problem.


    The immutability of SHAs means that once an image digest is created, it always
    refers to the same image content. This is critical for security, auditability,
    and reliability, ensuring that an image has not been altered or tampered with.


    Image SHA digests can be found out by running the following command.


    ```

    $ docker inspect --format=''{{index .RepoDigests 0}}'' ghcr.io/badri/flask-app:1.0

    ghcr.io/badri/flask-app@sha256:eda44382a1cfee8810a0dd0f5452ae239b59a489dc9001081254ae97ee5ba3b7

    ```


    # 3. Key Differences'
  merge: -1
  pgno: 160
- img_proc: true
  md: '+   a. Mutability vs. Immutability


    Tags are mutable and can be moved from one image to another, while SHAs are immutable
    and permanently linked to specific image content.


    b. Human-readability


    Tags are designed to be human-readable and meaningful, such as version numbers
    or environment names. SHAs are cryptographic hashes that are not human-friendly
    but provide a higher level of precision and reliability.


    c. Purpose


    Tags are suitable for development and identifying versions in a more general sense.
    SHAs are used for security, ensuring that the exact content expected is what is
    being used, without the risk of unexpected changes.


    In practice, tags and SHAs serve complementary roles in container image management.
    Tags offer convenience and readability for identifying and working with images,
    while SHAs provide an immutable reference to ensure the integrity and reliability
    of the image being used. Properly managing both is key to a robust containerized
    application lifecycle.


