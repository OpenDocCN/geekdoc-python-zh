    scope=repository%3Abadri%2Fflask-app%3Apull&service=ghcr.io: 401 Unauthorized

    Warning Failed 9s (x3 over 48s) kubelet Error: ErrImagePull


    The kubelet in node **first-cluster-default-pool-oeo85** tries to pull the **ghcr.io/badri/flask-app:1.0**
    image from ghcr''s registry, but it gets a 401 unauthorized response from the
    registry. Hence, it fails saying, "I can''t bring up the pod, because I can''t
    pull that image from the registry you gave me".


    When we published the image to ghcr registry, we did so as a private image. So,
    it can''t be pulled and used without authentication. We can either give authentication
    credentials to the kubelet, or we can make the image public. The former, we will
    see how to do that in the next chapter. For now, we will make the image public.


    Visit **https://github.com/users/<your-user-name>/packages/container/package/flask-app/settings**,
    assuming you published the image as **flask-app**, scroll down to "Danger Zone",
    and click on "Change visibility".

    Change the visibility of the package to "Public".

    Now, let''s take down the pod and redeploy it.


    ```

    $ kubectl delete pod simple-flask

    pod "simple-flask" deleted


    # recreate ..


    $ kubectl apply -f simple-flask.yaml

    pod/simple-flask created

    ```


    We can see that the image gets pulled successfully now, as it is a public image.'
- md: "## A word about tagging\n\nAdopting best practices for container image tagging\
    \ can significantly enhance the reliability, traceability, and security of your\
    \ software deployment processes in a containerized environment. Here are some\
    \ essential best practices for tagging container images:\n\n1.  **Use Semantic\
    \ Versioning.** Apply semantic versioning (SemVer) to your tags to make them informative\
    \ and indicative of the changes they contain. Semantic versioning follows a **MAJOR.MINOR.PATCH**\
    \ format, where you increment the:\n    *   **MAJOR** version when you make incompatible\
    \ API changes, **MINOR** version when you add functionality in a backward-compatible\
    \ manner, and **PATCH** version when you make backward-compatible bug fixes.\n\
    \    *   This practice helps users and automated systems to understand the scope\
    \ of changes in a new image version.\n2.  **Include Specific Versions, Avoid**\
    \ latest. While it's common to tag an image as **latest**, relying solely on this\
    \ tag for deployments can lead to unpredictability, as **latest** can point to\
    \ different image versions over time. Always tag images with specific versions,\
    \ in addition to latest, to ensure reproducible deployments and easier rollback.\
    \ Use latest for development or quick testing but specify exact versions for staging\
    \ and production environments.\n3.  **Utilize Short Git SHAs.** Including a short\
    \ Git SHA (commit hash) in the tag provides traceability back to the source code\
    \ at the time of the image build. This practice enhances the ability to track\
    \ an image back to its codebase, improving auditability and debugging processes.\n\
    4.  **Incorporate Build Timestamps.** Adding a timestamp to your image tags (e.g.,\
    \ **20231005-1345**) can provide insights into when the image was built. This\
    \ is particularly useful for identifying the most recent builds or correlating\
    \ image deployments with specific events.\n5.  **Use Descriptive Tags for Different\
    \ Environments.** For images that are tailored to specific environments (development,\
    \ staging, production), include the environment in the tag (e.g., 1.2.3-staging).\
    \ This helps in quickly identifying the right image for each environment and prevents\
    \ accidental cross-environment deployments.\n6.  **Automate Tagging in CI/CD Pipelines.**\
    \ Automate the tagging process as part of your Continuous Integration/Continuous\
    \ Deployment (CI/CD) pipeline. Automation ensures consistency in tagging practices\
    \ and reduces human error. Implement rules within your CI/CD system to tag images\
    \ based on branch names, commit SHAs, build numbers, or other meaningful identifiers\
    \ related to the build context.\n7.  **Adhere to Immutable Tags.** Once a tag\
    \ is associated with an image and pushed to a registry, avoid reusing the tag\
    \ for a different image. Immutable tags ensure that a specific tag always refers\
    \ to the exact same image content, which is crucial for reliable deployments and\
    \ security audits.\n8.  **Prune Old Tags Regularly.** Regularly review and prune\
    \ old or unused tags from your container registry to manage storage costs and\
    \ reduce clutter. However, ensure that any automated pruning processes respect\
    \ tags that must be retained for compliance, rollback capabilities, or historical\
    \ reasons.\n\nBy following these tagging best practices, teams can significantly\
    \ improve the management, deployment, and security of containerized applications,\
    \ ensuring that the right versions are deployed in the appropriate environments\
    \ with full traceability back to the source code.\n\nAfter pushing the image,\
    \ update the image tag in the pod, and re-apply the pod.\n\n## Image digests\n\
    \nContainer images in registries can be identified by either tags or SHA (Secure\
    \ Hash Algorithm) digests. Both serve as identifiers, but they have different\
    \ characteristics and uses:\n\n1.  **Image Tags**\n\n    Tags are human-readable\
    \ labels attached to image versions, such as nginx:1.19, where nginx is the image\
    \ name, and 1.19 is the tag indicating the version. Tags are mutable, meaning\
    \ the same tag can be reassigned to a different image over time (e.g., latest\
    \ tag).\n\n    Tags are used for easier reference and management of images, allowing\
    \ developers to specify versions in a human-friendly format. They are especially\
    \ useful in development and deployment scripts to specify which version of an\
    \ image should be used.\n\n    The main characteristic of tags is their mutability;\
    \ the same tag can point to different image content at different times. This makes\
    \ them convenient for indicating evolving states like the latest version but can\
    \ lead to unpredictability in deployments if not managed carefully.\n\n2.  **Image\
    \ SHAs (Digests)**\n\n    SHA digests are immutable identifiers for image content,\
    \ generated by the registry when an image is pushed. It's a hash of the image's\
    \ contents. For example, an image might have a SHA digest like **sha256:45b23dee0a....**\n\
    \n    SHAs are used when you need an immutable reference to an image. Since the\
    \ digest is a hash of the image's content, it uniquely and reliably identifies\
    \ a specific set of content. Using SHAs ensures that the exact version of an image\
    \ is always used, eliminating the \"it works on my machine\" problem.\n\n    The\
    \ immutability of SHAs means that once an image digest is created, it always refers\
    \ to the same image content. This is critical for security, auditability, and\
    \ reliability, ensuring that an image has not been altered or tampered with.\n\
    \n    Image SHA digests can be found out by running the following command.\n\n\
    \    ```\n    $ docker inspect --format='{{index .RepoDigests 0}}' ghcr.io/badri/flask-app:1.0\n\
    \    ghcr.io/badri/flask-app@sha256:eda44382a1cfee8810a0dd0f5452ae239b59a489dc9001081254ae97ee5ba3b7\n\
    \    ```\n\n3.  **Key Differences**\n\n    a. **Mutability vs. Immutability**\n\
    \n    Tags are mutable and can be moved from one image to another, while SHAs\
    \ are immutable and permanently linked to specific image content.\n\n    b. **Human-readability**\n\
    \n    Tags are designed to be human-readable and meaningful, such as version numbers\
    \ or environment names. SHAs are cryptographic hashes that are not human-friendly\
    \ but provide a higher level of precision and reliability.\n\n    c. **Purpose**\n\
    \n    Tags are suitable for development and identifying versions in a more general\
    \ sense. SHAs are used for security, ensuring that the exact content expected\
    \ is what is being used, without the risk of unexpected changes.\n\nIn practice,\
    \ tags and SHAs serve complementary roles in container image management. Tags\
    \ offer convenience and readability for identifying and working with images, while\
    \ SHAs provide an immutable reference to ensure the integrity and reliability\
    \ of the image being used. Properly managing both is key to a robust containerized\
    \ application lifecycle.\n\n## Exercise 18: Deploy a pod by specifying a different\
    \ tag\n\nDeploy your flask/nginx container by specifying a different tag in the\
    \ pod YAML manifest."
  mdcn: "## 关于标签的说明\n\n在容器化环境中，采用容器镜像标签的最佳实践可以显著提升软件部署流程的可靠性、可追溯性和安全性。以下是一些关键的容器镜像标签最佳实践：\n\
    \n1.  **使用语义化版本号。** 为标签应用语义化版本号（SemVer），使其具有信息性并能反映所包含的变更。语义化版本号遵循 **主版本号.次版本号.修订号**\
    \ 格式，其中：\n    *   当进行不兼容的 API 变更时递增 **主版本号**，以向后兼容的方式添加功能时递增 **次版本号**，进行向后兼容的错误修复时递增\
    \ **修订号**。\n    *   此实践有助于用户和自动化系统理解新镜像版本中的变更范围。\n2.  **包含具体版本号，避免使用** latest。虽然将镜像标记为\
    \ **latest** 很常见，但仅依赖此标签进行部署可能导致不可预测性，因为 **latest** 可能随时间指向不同的镜像版本。务必为镜像添加具体版本标签，同时保留\
    \ latest 标签，以确保可重现的部署和更轻松的回滚。在开发或快速测试中使用 latest，但在预发布和生产环境中指定确切版本。\n3.  **使用短\
    \ Git SHA。** 在标签中包含短 Git SHA（提交哈希）可提供从镜像构建时追溯到源代码的能力。此实践增强了将镜像追溯到其代码库的能力，提高了可审计性和调试过程的效率。\n\
    4.  **包含构建时间戳。** 在镜像标签中添加时间戳（例如 **20231005-1345**）可以提供镜像构建时间的信息。这对于识别最新构建或将镜像部署与特定事件关联起来特别有用。\n\
    5.  **为不同环境使用描述性标签。** 对于针对特定环境（开发、预发布、生产）定制的镜像，在标签中包含环境信息（例如 1.2.3-staging）。这有助于快速识别每个环境的正确镜像，并防止意外的跨环境部署。\n\
    6.  **在 CI/CD 流水线中自动化标签。** 将标签过程作为持续集成/持续部署（CI/CD）流水线的一部分进行自动化。自动化可确保标签实践的一致性并减少人为错误。在\
    \ CI/CD 系统中实施规则，根据分支名称、提交 SHA、构建编号或与构建上下文相关的其他有意义的标识符为镜像打标签。\n7.  **遵守不可变标签原则。**\
    \ 一旦标签与镜像关联并推送到注册表，避免将该标签用于不同的镜像。不可变标签确保特定标签始终指向完全相同的镜像内容，这对于可靠的部署和安全审计至关重要。\n\
    8.  **定期清理旧标签。** 定期审查并清理容器注册表中的旧标签或未使用标签，以管理存储成本并减少杂乱。但是，请确保任何自动清理过程都尊重因合规性、回滚能力或历史原因而必须保留的标签。\n\
    \n通过遵循这些标签最佳实践，团队可以显著改善容器化应用程序的管理、部署和安全性，确保正确的版本部署在适当的环境中，并具有完整的可追溯性直至源代码。\n\n\
    推送镜像后，更新 Pod 中的镜像标签，并重新应用 Pod。\n\n## 镜像摘要\n\n注册表中的容器镜像可以通过标签或 SHA（安全哈希算法）摘要来标识。两者都用作标识符，但具有不同的特性和用途：\n\
    \n1.  **镜像标签**\n\n    标签是附加到镜像版本的人类可读标签，例如 nginx:1.19，其中 nginx 是镜像名称，1.19 是表示版本的标签。标签是可变的，这意味着同一个标签可以随时间重新分配给不同的镜像（例如\
    \ latest 标签）。\n\n    标签用于更方便地引用和管理镜像，允许开发者以人类友好的格式指定版本。它们在开发和部署脚本中特别有用，用于指定应使用哪个版本的镜像。\n\
    \n    标签的主要特性是其可变性；同一个标签在不同时间可以指向不同的镜像内容。这使得它们便于表示不断演变的状态（如最新版本），但如果管理不当，可能导致部署的不可预测性。\n\
    \n2.  **镜像 SHA（摘要）**\n\n    SHA 摘要是镜像内容的不可变标识符，在镜像推送时由注册表生成。它是镜像内容的哈希值。例如，一个镜像可能具有如下\
    \ SHA 摘要：**sha256:45b23dee0a....**\n\n    当你需要对镜像进行不可变引用时，可以使用 SHA。由于摘要是镜像内容的哈希值，它唯一且可靠地标识特定的内容集。使用\
    \ SHA 可确保始终使用镜像的确切版本，消除了“在我的机器上可以运行”的问题。\n\n    SHA 的不可变性意味着一旦创建了镜像摘要，它就始终指向相同的镜像内容。这对于安全性、可审计性和可靠性至关重要，确保镜像未被更改或篡改。\n\
    \n    可以通过运行以下命令找到镜像 SHA 摘要。\n\n    ```\n    $ docker inspect --format='{{index\
    \ .RepoDigests 0}}' ghcr.io/badri/flask-app:1.0\n    ghcr.io/badri/flask-app@sha256:eda44382a1cfee8810a0dd0f5452ae239b59a489dc9001081254ae97ee5ba3b7\n\
    \    ```\n\n3.  **关键区别**\n\n    a. **可变性与不可变性**\n\n    标签是可变的，可以从一个镜像移动到另一个镜像，而\
    \ SHA 是不可变的，永久链接到特定的镜像内容。\n\n    b. **人类可读性**\n\n    标签设计为人类可读且有意义，例如版本号或环境名称。SHA\
    \ 是加密哈希值，对人类不友好，但提供更高程度的精确性和可靠性。\n\n    c. **用途**\n\n    标签适用于开发和更通用意义上的版本标识。SHA\
    \ 用于安全性，确保使用的是预期的确切内容，没有意外更改的风险。\n\n在实践中，标签和 SHA 在容器镜像管理中扮演互补的角色。标签为识别和处理镜像提供了便利性和可读性，而\
    \ SHA 提供了不可变的引用，以确保所使用镜像的完整性和可靠性。正确管理两者是构建健壮的容器化应用程序生命周期的关键。\n\n## 练习 18：通过指定不同的标签部署\
    \ Pod\n\n在 Pod YAML 清单中指定不同的标签来部署你的 flask/nginx 容器。"
