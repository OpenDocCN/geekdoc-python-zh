- md: '## Container architecture


    Namespaces are a feature of the Linux kernel that partitions kernel resources
    so that each set appears to have its own isolated instance to processes within
    that namespace. This means that processes running in one namespace are unable
    to see or affect processes running in another namespace, making it possible for
    multiple containers to run on the same host without interfering with each other.
    For example, the PID (Process ID) namespace isolates the process ID number space,
    meaning that a process in one PID namespace can have the same PID as a process
    in another namespace. This isolation extends to other system resources such as
    network interfaces, mount points, and inter-process communication resources.


    In short, a namespace makes a process running inside that namespace believe it
    has its own instance of that resource. A namespace can limit visibility to certain
    process trees, network interfaces, user IDs, or filesystem mounts.


    Control Groups (cgroups) are another key feature used by containers to manage
    and limit the amount of resources a process or group of processes can use. This
    ensures that no single container can monopolize system resources, such as CPU,
    memory, and I/O bandwidth, thereby maintaining the overall stability and performance
    of the host system. For instance, you could have a container running a web server
    that''s limited to using 50% of the CPU and 1GB of memory, ensuring that other
    containers running on the same host have access to the remaining resources.


    To run an instance of an Ubuntu container and set the memory limit to 1 GB and
    access to 1 CPU the command is:


    ```

    $ docker run -it --memory="1g" -cpus="1.0" ubuntu

    ```


    Overlay Filesystems enable containers to be lightweight and fast. An overlay filesystem
    combines multiple directories into a single directory view, making it possible
    to overlay a writable directory (where a container writes its changes) on top
    of a read-only directory (the container image). This means when a container modifies
    a file, the change is recorded in the writable layer without altering the underlying
    image. This approach supports container immutability and portability, as the base
    image remains unchanged and can be used to spawn new containers, while only the
    changes are stored and managed separately.


    To illustrate how these components work together, imagine deploying a simple Python
    web application in a container. When the container starts, namespaces ensure that
    the web application''s processes run in an isolated environment, unaware of processes
    in other containers or on the host system. If the application tries to access
    the network, it does so using network interfaces isolated by its namespace. Cgroups
    limit the application''s CPU and memory usage, preventing it from exhausting the
    host''s resources. Finally, the application reads from an overlay filesystem,
    where its base image is mounted read-only, and any changes are written to a separate
    writable layer. When the container is stopped or deleted, the writable layer can
    be removed, while the base image remains unchanged, ready to be reused.


    In summary, containers rely on namespaces for process isolation, cgroups for resource
    management, and overlay filesystems for efficient storage, working together to
    provide a lightweight, isolated, and efficient environment for running applications.


    Let''s go through a hands-on example that illustrates the concepts of namespaces,
    cgroups, and overlay filesystems by running a simple Docker container. Docker
    abstracts these lower-level details, making it easier to understand how containers
    utilize these features without manually manipulating them. For this example, we''ll
    run an Ubuntu container, install a basic tool, and inspect how it''s isolated
    from the host.


    ## Namespaces and cgroups


    First, let''s run an Ubuntu container in interactive mode and attach a terminal
    to it. This will allow us to execute commands inside the container.


    ```

    docker run -it --rm ubuntu bash

    ```


    This command does the following:


    - `docker run`: Creates and starts a container.

    - `-it`: Makes the container interactive and attaches a terminal to it.

    - `--rm`: Automatically removes the container when it exits.

    - `ubuntu`: Specifies the Docker image to use (in this case, the latest Ubuntu
    image).

    - `bash`: Executes the bash shell, giving you a command prompt inside the container.


    Once inside the container, let''s check the process ID of the bash shell:


    ```

    echo $$ # This shows the PID of the current bash session.

    ```


    You might see a low number, like 1 or another small number, indicating that within
    the container''s PID namespace, this shell thinks it''s the first (or an early)
    process, isolated from the host''s processes.


    To compare, on your host machine (in a new terminal window), you can list the
    processes running in Docker containers using:


    ```

    docker ps

    ```


    And to see the actual PID of the bash process inside the container from the host''s
    perspective:


    ```

    ps aux | grep bash

    ```


    You''ll notice the PID on the host is different and typically much higher, illustrating
    how the container''s processes are isolated within their own namespace.


    While still in the container, you can explore how Docker uses cgroups to limit
    resource usage. This is a bit more complex to demonstrate directly, as it involves
    inspecting specific files within the `/sys/fs/cgroup/` directory. Docker automatically
    sets these limits based on default or specified configurations when you run a
    container.


    ## Overlay filesystem


    To see the overlay filesystem in action, create a new file inside the container:


    ```

    touch /my-container-file.txt

    ```


    This file is written to the writable layer of the container''s filesystem. When
    you exit the container and start a new one using the same image, you''ll see that
    `/my-container-file.txt` does not exist in the new container instance, showcasing
    the overlay filesystem''s separation of the image and the container-specific writable
    layer.


    ## Structure of the Overlay Filesystem


    Overlay filesystem


    The overlay filesystem is a union filesystem that allows multiple filesystems
    to be layered on top of each other. Within a container''s context, this typically
    involves:


    **Read-only Layers:** These layers contain the container image itself, which includes
    the application and its dependencies. When you pull an image from a container
    registry, you are essentially downloading these read-only layers. These layers
    are shared among all containers instantiated from the same image, ensuring that
    the base filesystem remains unchanged and immutable. This immutability is crucial
    for consistency, ensuring that every instance of the container starts from the
    exact same state.


    **Writable Layer:** On top of the read-only layers, a writable layer is added
    when a container is started. This layer captures any changes made during the container''s
    runtime. For example, if the application writes to a file, the change is recorded
    in this writable layer. This allows each container instance to have its own unique
    set of changes, separate from the underlying image and any other containers.


    ## Purpose of Read-Only Layers


    The read-only nature of the base layers serves several important purposes:


    **Immutability:** By keeping the base image layers read-only, it ensures that
    the original content cannot be altered, providing a consistent and reliable foundation
    for containers. This immutability is essential for predictable behavior across
    different environments and deployments.


    **Efficiency:** Read-only layers can be shared among multiple container instances.
    This means that if you have multiple containers based on the same image, they
    all share the same underlying layers on the host system, reducing storage and
    memory usage.


    **Security:** Read-only layers enhance security by preventing unauthorized changes
    to the base filesystem of the container. Any attempt to modify the base layers
    results in a copy-on-write operation, where the changes are applied only to the
    writable layer of the active container. This isolation helps to contain potential
    security breaches within the scope of a single container.


    ## Cleaning Up


    Exit the container by typing `exit`. Since we used the `--rm` flag, Docker automatically
    cleans up and removes the container, including its writable layer.


    This hands-on example demonstrates how Docker leverages Linux kernel features
    like namespaces for process isolation, cgroups for resource management, and overlay
    filesystems for efficient storage management. By abstracting these complexities,
    Docker provides a user-friendly interface to the powerful underlying container
    technologies.


    ## Container networking


    Container networking is a crucial aspect of container orchestration that enables
    containers to communicate with each other and with the outside world. This communication
    is facilitated through various networking modes and concepts designed to ensure
    secure, efficient, and scalable interactions between containers, services, and
    applications.


    The most common container networking models include:


    **Bridge Network**: The default network mode for containers. In this mode, a virtual
    bridge is created on the host, and containers are attached to this bridge with
    virtual network interfaces. This setup allows containers on the same host to communicate
    with each other.'
  mdcn: '## 容器架构


    命名空间是 Linux 内核的一项功能，它将内核资源进行分区，使得每个分区内的进程都拥有其独立的资源实例。这意味着在一个命名空间中运行的进程无法看到或影响另一个命名空间中运行的进程，从而使得多个容器可以在同一台主机上运行而互不干扰。例如，PID（进程
    ID）命名空间隔离了进程 ID 编号空间，这意味着一个 PID 命名空间中的进程可以与另一个命名空间中的进程拥有相同的 PID。这种隔离性还扩展到其他系统资源，如网络接口、挂载点和进程间通信资源。


    简而言之，命名空间使得在其中运行的进程相信它拥有该资源的独立实例。命名空间可以限制对某些进程树、网络接口、用户 ID 或文件系统挂载的可见性。


    控制组（cgroups）是容器用于管理和限制进程或进程组可使用资源量的另一项关键特性。这确保了没有单个容器能够独占系统资源，如 CPU、内存和 I/O 带宽，从而维护主机系统的整体稳定性和性能。例如，你可以有一个运行
    Web 服务器的容器，其 CPU 使用限制为 50%，内存限制为 1GB，从而确保同一主机上运行的其他容器能够访问剩余的资源。


    要运行一个 Ubuntu 容器实例，并将内存限制设置为 1 GB，CPU 访问限制为 1 个核心，可以使用以下命令：


    ```

    $ docker run -it --memory="1g" -cpus="1.0" ubuntu

    ```


    联合文件系统使容器变得轻量且快速。联合文件系统将多个目录组合成一个单一的目录视图，从而可以将一个可写目录（容器写入其更改的地方）叠加在一个只读目录（容器镜像）之上。这意味着当容器修改文件时，更改会被记录在可写层中，而不会修改底层的镜像。这种方法支持容器的不可变性和可移植性，因为基础镜像保持不变，可用于创建新的容器，而只有更改被单独存储和管理。


    为了说明这些组件如何协同工作，想象一下在容器中部署一个简单的 Python Web 应用程序。当容器启动时，命名空间确保 Web 应用程序的进程在隔离的环境中运行，无法感知其他容器或主机系统上的进程。如果应用程序尝试访问网络，它将使用其命名空间隔离的网络接口进行访问。控制组限制应用程序的
    CPU 和内存使用，防止其耗尽主机的资源。最后，应用程序从联合文件系统读取数据，其基础镜像以只读方式挂载，任何更改都写入单独的可写层。当容器停止或删除时，可写层可以被移除，而基础镜像保持不变，随时可以重用。


    总而言之，容器依赖命名空间实现进程隔离，依赖控制组进行资源管理，并利用联合文件系统实现高效存储，三者协同工作，为运行应用程序提供了一个轻量、隔离且高效的环境。


    让我们通过一个实际操作示例来说明命名空间、控制组和联合文件系统的概念，我们将运行一个简单的 Docker 容器。Docker 抽象了这些底层细节，使得无需手动操作即可更容易地理解容器如何利用这些特性。在这个示例中，我们将运行一个
    Ubuntu 容器，安装一个基本工具，并检查它如何与主机隔离。


    ## 命名空间和控制组


    首先，让我们以交互模式运行一个 Ubuntu 容器，并为其附加一个终端。这将允许我们在容器内执行命令。


    ```

    docker run -it --rm ubuntu bash

    ```


    此命令执行以下操作：


    - `docker run`：创建并启动一个容器。

    - `-it`：使容器具有交互性并为其附加一个终端。

    - `--rm`：容器退出时自动删除它。

    - `ubuntu`：指定要使用的 Docker 镜像（本例中为最新的 Ubuntu 镜像）。

    - `bash`：执行 bash shell，为你提供容器内的命令提示符。


    进入容器后，让我们检查 bash shell 的进程 ID：


    ```

    echo $$ # 这显示当前 bash 会话的 PID。

    ```


    你可能会看到一个较小的数字，如 1 或其他小数字，这表明在容器的 PID 命名空间内，该 shell 认为它是第一个（或早期的）进程，与主机的进程隔离。


    作为对比，在你的主机机器上（在一个新的终端窗口中），你可以使用以下命令列出 Docker 容器中运行的进程：


    ```

    docker ps

    ```


    要从主机的角度查看容器内 bash 进程的实际 PID：


    ```

    ps aux | grep bash

    ```


    你会注意到主机上的 PID 不同，并且通常大得多，这说明了容器的进程是如何在其自己的命名空间内隔离的。


    在容器内，你还可以探索 Docker 如何使用控制组来限制资源使用。直接演示这一点稍微复杂一些，因为它涉及检查 `/sys/fs/cgroup/` 目录中的特定文件。当你运行容器时，Docker
    会根据默认或指定的配置自动设置这些限制。


    ## 联合文件系统


    要查看联合文件系统的实际运作，请在容器内创建一个新文件：


    ```

    touch /my-container-file.txt

    ```


    此文件被写入容器文件系统的可写层。当你退出容器并使用相同的镜像启动一个新容器时，你会看到 `/my-container-file.txt` 在新的容器实例中不存在，这展示了联合文件系统如何将镜像与容器特定的可写层分离。


    ## 联合文件系统的结构


    联合文件系统


    联合文件系统是一种联合文件系统，允许多个文件系统相互叠加。在容器的上下文中，这通常涉及：


    **只读层：** 这些层包含容器镜像本身，其中包括应用程序及其依赖项。当你从容器注册表拉取镜像时，你实际上是在下载这些只读层。这些层在所有从同一镜像实例化的容器之间共享，确保基础文件系统保持不变且不可变。这种不可变性对于一致性至关重要，确保每个容器实例都从完全相同的状态启动。


    **可写层：** 在只读层之上，当容器启动时会添加一个可写层。此层捕获容器运行期间所做的任何更改。例如，如果应用程序写入文件，更改会记录在此可写层中。这允许每个容器实例拥有自己独特的更改集，与底层镜像和任何其他容器分开。


    ## 只读层的目的


    基础层的只读特性有几个重要目的：


    **不可变性：** 通过保持基础镜像层只读，确保原始内容无法被更改，为容器提供一致且可靠的基础。这种不可变性对于跨不同环境和部署的可预测行为至关重要。


    **效率：** 只读层可以在多个容器实例之间共享。这意味着如果你有多个基于相同镜像的容器，它们都在主机系统上共享相同的底层层，从而减少存储和内存使用。


    **安全性：** 只读层通过防止对容器基础文件系统的未授权更改来增强安全性。任何修改基础层的尝试都会导致写时复制操作，其中更改仅应用于活动容器的可写层。这种隔离有助于将潜在的安全漏洞限制在单个容器的范围内。


    ## 清理


    输入 `exit` 退出容器。由于我们使用了 `--rm` 标志，Docker 会自动清理并删除容器，包括其可写层。


    这个实际操作示例展示了 Docker 如何利用 Linux 内核特性，如用于进程隔离的命名空间、用于资源管理的控制组以及用于高效存储管理的联合文件系统。通过抽象这些复杂性，Docker
    为强大的底层容器技术提供了用户友好的接口。


    ## 容器网络


    容器网络是容器编排的一个关键方面，它使容器能够相互通信以及与外部世界通信。这种通信通过各种网络模式和概念来实现，旨在确保容器、服务和应用程序之间安全、高效且可扩展的交互。


    最常见的容器网络模型包括：


    **桥接网络**：容器的默认网络模式。在此模式下，在主机上创建一个虚拟桥，容器通过虚拟网络接口连接到此桥。此设置允许同一主机上的容器相互通信。'
