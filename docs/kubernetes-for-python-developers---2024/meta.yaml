    # # Chapter 4: Pods 101


    So far, we''ve built container images of our Python application and run them locally.
    We''ve also setup a production grade Kubernetes cluster. Let''s combine both of
    these and deploy the Python application in this newly created cluster.


    But before we get ahead of ourselves, we have to get familiar with a few concepts.


    # ## Kubectl


    The first of these concepts is a tool called **kubectl**. There are straightforward
    instructions on how to download it for your operating system.


    **kubectl** is a command-line tool that serves as the primary interface for interacting
    with Kubernetes, allowing users to deploy applications, inspect and manage cluster
    resources, and view logs. It communicates with the Kubernetes API server to control
    the Kubernetes cluster, offering a wide range of commands that enable users to
    execute operations such as creating and deleting pods, scaling deployments, and
    managing configurations.


    **kubectl** is designed to be user-friendly, supporting various output formats
    for displaying cluster information, and includes features for troubleshooting
    and debugging applications running in the cluster. By providing a powerful and
    flexible interface, **kubectl** empowers developers and administrators to efficiently
    manage the lifecycle of their applications and the Kubernetes cluster itself.'
