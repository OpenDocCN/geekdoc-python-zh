    \    app: nginx\ntemplate:\n  metadata:\n    labels:\n      app: nginx\n  spec:\n\
    \    containers:\n    - name: nginx\n      image: nginx:1.24\n      ports:\n \
    \     - containerPort: 80\n```\n\n(1) -> The type of deployment strategy.\n\n\
    (2) -> We give specific configuration for the rolling update strategy."
  - '[PAGE 180]


    (3) -> The number of pods that can be unavailable during the update process.


    (4) -> The number of pods that can be created above the desired amount of pods
    during an update.


    Both **maxSurge** and **maxUnavailable** can be specified as either an integer
    (in our case, **1**) or a percentage (e.g. 25%), and they cannot both be zero.
    When specified as an integer, it represents the actual number of pods; when specifying
    a percentage, that percentage of the desired number of pods is used, rounded down.


    It is important to note that maxSurge indicates the maximum number of new pods
    that will be created at the time of deployment, and maxUnavailable is the maximum
    number of old pods that will be deleted during the time of deployment.


    For example, if we re-apply the deployment with a newer nginx image( **nginx:1.25**
    ), the kubelet will create at most 1 new pod for the deployment with the **1.25**
    image, and at most 1 pod with the **1.24** tag will be deleted at any given point
    in time **during the deployment**.


