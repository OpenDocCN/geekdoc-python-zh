    Let''s confirm this.


    ```

    $ echo "bXl1c2VyOiRhcHIxJEZKUVFyLy95JE5PRVdsTkFPUjBhWWOORkowandKcTEK" | base64
    --decode

    myuser:$apr1$FJQQr//y$NOEWlNAOR0aYm4FJ0jwJq1

    ```


    Kubernetes Secrets are by default base64-encoded, not encrypted. Base64 encoding
    is used for data representation, making binary data compatible with systems that
    only handle textual data. It''s important to note that base64 encoding is not
    a security measure; it merely ensures safe transport and storage of data that
    may not be inherently text-friendly.


    # Why encrypt and not encode


    **Simplicity and Compatibility:** Encoding simplifies the handling of binary or
    special character data across different systems and software. It ensures that
    the secret data can be safely represented in Kubernetes manifests or APIs without
    corruption.


    **Legacy Design Choices:** The initial design of Kubernetes Secrets did not include
    built-in encryption at rest, focusing instead on ease of use and basic protection
    against casual browsing. The responsibility for securing access to Secrets was
    largely delegated to the underlying storage system and cluster access controls.'
- md: "**Performance Considerations:** Encoding is computationally less intensive\
    \ than encryption. While not a substitute for encryption's security, avoiding\
    \ encryption in the base mechanism allows for faster access and simpler management\
    \ of Secrets, under the assumption that additional security measures are implemented\
    \ as needed.\n\n## The Need for Encryption\n\nWhile encoding offers no confidentiality\
    \ on its own, Kubernetes has evolved to support encryption at rest for Secrets\
    \ to address security concerns. Encryption at rest ensures that Secret data is\
    \ not stored in plain text on disk, providing a much higher level of security.\
    \ This feature must be explicitly enabled and configured in Kubernetes, allowing\
    \ cluster administrators to choose encryption providers and keys.\n\n## Best Practices\
    \ for Secret Management\n\nEven though this is beyond the scope of this book,\
    \ here are some best practices to consider when managing secrets in Kubernetes.\n\
    \n**Enable Encryption at Rest:** Use Kubernetes' ability to encrypt Secrets at\
    \ rest within the etcd datastore. This ensures that even if unauthorized access\
    \ to the data store occurs, the Secrets remain unreadable without the encryption\
    \ key.\n\n**Use RBAC and Access Controls:** Properly configure Role-Based Access\
    \ Control (RBAC) policies to limit who can access Secrets. Minimize access to\
    \ only those who absolutely need it.\n\n**Consider External Secrets Management:**\
    \ For advanced use cases or enhanced security requirements, consider integrating\
    \ Kubernetes with external secrets management solutions like HashiCorp Vault,\
    \ AWS Secrets Manager, or Azure Key Vault. These tools offer robust mechanisms\
    \ for storing, accessing, and managing sensitive information, including dynamic\
    \ secret generation, automatic rotation, and detailed audit logs.\n\n**In-Transit\
    \ Encryption:** Ensure that communication between clients and the Kubernetes API\
    \ server is encrypted, as well as communication between services within the cluster,\
    \ to prevent secrets from being intercepted during transmission.\n\nBy understanding\
    \ the limitations of base64 encoding and implementing encryption and proper access\
    \ controls, you can significantly enhance the security of Secrets in Kubernetes.\n\
    \n## Secrets of the other kind\n\nWhat we just executed was a generic secret.\
    \ Kubernetes Secrets are intended to secure other sensitive data such as passwords,\
    \ OAuth tokens, and SSH keys. Understanding the different types of Secrets and\
    \ their use cases can help in properly managing sensitive data within your Kubernetes\
    \ cluster. Here are the main types of Secrets provided by Kubernetes and examples\
    \ for each:\n\n### Opaque Secrets\n\nThe default Secret type; used for storing\
    \ arbitrary user-defined data.\n\nExample Use Case: Store application credentials,\
    \ such as API keys or database passwords, that don't fit into other predefined\
    \ Secret types.\n\nExample: The one we saw just now. It will have the following\
    \ scaffold.\n\n```\napiVersion: v1\nkind: Secret\nmetadata:\n  name: my-app-secret\n\
    type: Opaque\ndata:\n  api-key: <base64-encoded-api-key>\n```\n\n### Service Account\
    \ Token Secrets\n\nUsed to store a token that identifies a service account.\n\n\
    Example Use Case: Automatically created by Kubernetes when a ServiceAccount is\
    \ created, allowing Pods to authenticate to the Kubernetes API.\n\nExample: Automatically\
    \ managed by Kubernetes; typically, you wouldn't manually create this type of\
    \ Secret. We will see a detailed example of this when dealing with service accounts.\n\
    \n### Docker Registry Secrets\n\nUsed to store credentials for accessing private\
    \ Docker registries.\n\nExample Use Case: Pull container images from private Docker\
    \ registries in your Pod/Deployment definitions.\n\nHere's how we can create one.\n\
    \n```\n$ kubectl create secret docker-registry my-reg-secret \\\n--docker-server=DOCKER_REGISTRY_SERVER\
    \ \\\n--docker-username=DOCKER_USER \\\n--docker-password=DOCKER_PASSWORD \\\n\
    --docker-email=DOCKER_EMAIL\n```\n\n### Basic Authentication Secrets\n\nUsed to\
    \ store credentials for basic authentication.\n\nExample Use Case: Authenticate\
    \ against an external system requiring basic auth, such as a web application's\
    \ admin interface.\n\nIt will have the following form:\n\n```\napiVersion: v1\n\
    kind: Secret\nmetadata:\n  name: my-basic-auth\ntype: kubernetes.io/basic-auth\n\
    stringData:\n  username: admin\n  password: secret\n```\n\n### SSH Authentication\
    \ Secrets\n\nUsed to store data needed for SSH authentication.\n\nExample Use\
    \ Case: Authenticate against an SSH server, such as for secure Git access within\
    \ a CI/CD pipeline.\n\n```\napiVersion: v1\nkind: Secret\nmetadata:\n  name: my-ssh-key\n\
    type: kubernetes.io/ssh-auth\ndata:\n  ssh-privatekey: <base64-encoded-private-key>\n\
    ```\n\n### TLS Secrets\n\nUsed to store a certificate and its associated private\
    \ key.\n\nExample Use Case: Securely serve traffic over HTTPS from within your\
    \ cluster, or authenticate against external systems requiring TLS.\n\n```\napiVersion:\
    \ v1\nkind: Secret\nmetadata:\n  name: my-tls-secret\ntype: kubernetes.io/tls\n\
    data:\n  tls.crt: <base64-encoded-certificate>\n  tls.key: <base64-encoded-key>\n\
    ```\n\nWe will see a detailed example when working with ingresses in a later chapter.\n\
    \nBy choosing the right type of Secret for your use case, you can enhance the\
    \ security of your applications and leverage Kubernetes' built-in mechanisms for\
    \ managing sensitive data.\n\n## Why Different Types of Secrets?\n\nThe categorization\
    \ into different types serves several purposes:\n\n**Specialized Handling:** Kubernetes\
    \ can optimize how each type of Secret is handled. For example, automatically\
    \ attaching service account tokens to Pods, or ensuring that TLS Secrets contain\
    \ valid certificate and key pairs.\n\n**Simplification for Users:** By providing\
    \ specific types for common use cases (like accessing a Docker registry or storing\
    \ TLS certificates), Kubernetes simplifies the process of creating and managing\
    \ Secrets.\n\n**Improved Security:** Different types of Secrets often imply different\
    \ security considerations and access patterns. By distinguishing the types, Kubernetes\
    \ can enforce stricter validation and access policies, reducing the risk of misconfiguration\
    \ and exposure.\n\n**Integration with Kubernetes Features:** Some Secret types\
    \ are tightly integrated with Kubernetes features and components, like service\
    \ accounts and ingress controllers. This integration allows for seamless and secure\
    \ use of these features within the cluster.\n\nBy offering various types of Secrets,\
    \ Kubernetes enables more secure, efficient, and error-resistant management of\
    \ sensitive data, tailored to a wide range of application needs and security requirements.\n\
    \n## Injecting secrets as environment variables\n\nIn the **flask-redis** example,\
    \ we inject the **REDIS_PASSWORD** environment variable as a plaintext configuration.\
    \ Let's convert that into a secret.\n\nFirst, we create a secret out of the **REDIS_PASSWORD**\
    \ value. This will be a generic secret.\n\n```\n$ kubectl create secret generic\
    \ redis-credentials --from-literal=REDIS_PASSWORD=SuperS3cret -n notch-further\n\
    secret/redis-credentials created\n```\n\nLet's update the **flask-redis** deployment\
    \ to pick up this secret.\n\n```\napiVersion: apps/v1\nkind: Deployment\nmetadata:\n\
    \  name: flask-redis\nspec:\n  replicas: 1\n  selector:\n    matchLabels:\n  \
    \    app: flask-redis\n  template:\n    metadata:\n      labels:\n        app:\
    \ flask-redis\n    spec:\n      containers:\n        - name: flask\n         \
    \ image: ghcr.io/badri/flask-redis:1.0\n          env:\n            - name: DEBUG\n\
    \              valueFrom:\n                configMapKeyRef:\n                \
    \  name: flask-config\n                  key: DEBUG\n            - name: PORT\n\
    \              valueFrom:\n                configMapKeyRef:\n                \
    \  name: flask-config\n                  key: PORT\n            - name: REDIS_HOST\n\
    \              valueFrom:\n                configMapKeyRef:\n                \
    \  name: flask-config\n                  key: REDIS_HOST\n            - name:\
    \ REDIS_PASSWORD # (1)\n              valueFrom:\n                secretKeyRef:\
    \ # (2)\n                  name: redis-credentials # (3)\n                  key:\
    \ REDIS_PASSWORD # (4)\n          ports:\n            - containerPort: 8080\n\
    ```\n\nWhile the rest of the file is the same, I'll just walk through the changes\
    \ specific to this context.\n\n(1) -> The **REDIS_PASSWORD** is a **valueFrom**,\
    \ like other environment variables.\n\n(2) -> It takes the value from a secret,\
    \ which is referenced by the **secretKeyRef** section.\n\n(3) -> points to a secret\
    \ in the same namespace, which is the **redis-credentials** secret we just created.\n\
    \n(4) -> the key in the secret resource which we want to grab.\n\nAfter you re-apply\
    \ this deployment, your **flask-redis** application will run *most* of the idiomatic\
    \ Kubernetes best practices.\n\n## Exercise 26: Configure redis deployment\n\n\
    Make the redis deployment also pick up the password from **redis-credentials**\
    \ secret. Once this is done, the credentials are only stored at 1 location, and\
    \ will be referenced by both deployments (flask and redis).\n\n## Image pull secret\n\
    \nIn all the deployments till now, we've been dealing with public container images.\
    \ Even the **flask-redis** and **simple-flask** images in ghcr.io were converted\
    \ to public images in the previous chapters. Now that we've"
  mdcn: "**性能考量：** 编码的计算强度低于加密。虽然它不能替代加密的安全性，但在基础机制中避免使用加密可以实现更快的访问和更简单的密钥管理，前提是根据需要实施了额外的安全措施。\n\
    \n## 加密的必要性\n\n虽然编码本身不提供机密性，但 Kubernetes 已经发展到支持对密钥进行静态加密，以解决安全问题。静态加密确保密钥数据不会以明文形式存储在磁盘上，从而提供更高水平的安全性。此功能必须在\
    \ Kubernetes 中显式启用和配置，允许集群管理员选择加密提供者和密钥。\n\n## 密钥管理的最佳实践\n\n尽管这超出了本书的范围，但以下是在\
    \ Kubernetes 中管理密钥时需要考虑的一些最佳实践。\n\n**启用静态加密：** 使用 Kubernetes 在 etcd 数据存储中对密钥进行静态加密的能力。这确保了即使发生对数据存储的未授权访问，密钥在没有加密密钥的情况下仍然不可读。\n\
    \n**使用 RBAC 和访问控制：** 正确配置基于角色的访问控制（RBAC）策略，以限制谁可以访问密钥。将访问权限最小化到绝对需要的人员。\n\n**考虑外部密钥管理：**\
    \ 对于高级用例或增强的安全要求，考虑将 Kubernetes 与外部密钥管理解决方案集成，如 HashiCorp Vault、AWS Secrets Manager\
    \ 或 Azure Key Vault。这些工具提供了强大的机制来存储、访问和管理敏感信息，包括动态密钥生成、自动轮换和详细的审计日志。\n\n**传输中加密：**\
    \ 确保客户端与 Kubernetes API 服务器之间的通信以及集群内服务之间的通信是加密的，以防止密钥在传输过程中被截获。\n\n通过理解 base64\
    \ 编码的局限性并实施加密和适当的访问控制，您可以显著增强 Kubernetes 中密钥的安全性。\n\n## 另一种密钥\n\n我们刚刚执行的是一个通用密钥。Kubernetes\
    \ 密钥旨在保护其他敏感数据，如密码、OAuth 令牌和 SSH 密钥。了解不同类型的密钥及其用例有助于在 Kubernetes 集群中正确管理敏感数据。以下是\
    \ Kubernetes 提供的主要密钥类型及其示例：\n\n### Opaque 密钥\n\n默认的密钥类型；用于存储任意的用户定义数据。\n\n示例用例：存储不适合其他预定义密钥类型的应用程序凭据，如\
    \ API 密钥或数据库密码。\n\n示例：我们刚才看到的那个。它将具有以下结构。\n\n```\napiVersion: v1\nkind: Secret\n\
    metadata:\n  name: my-app-secret\ntype: Opaque\ndata:\n  api-key: <base64-encoded-api-key>\n\
    ```\n\n### Service Account Token 密钥\n\n用于存储标识服务账户的令牌。\n\n示例用例：当创建 ServiceAccount\
    \ 时由 Kubernetes 自动创建，允许 Pod 向 Kubernetes API 进行身份验证。\n\n示例：由 Kubernetes 自动管理；通常，您不会手动创建这种类型的密钥。我们将在处理服务账户时看到一个详细的示例。\n\
    \n### Docker Registry 密钥\n\n用于存储访问私有 Docker 注册表的凭据。\n\n示例用例：在 Pod/Deployment 定义中从私有\
    \ Docker 注册表拉取容器镜像。\n\n以下是我们如何创建一个。\n\n```\n$ kubectl create secret docker-registry\
    \ my-reg-secret \\\n--docker-server=DOCKER_REGISTRY_SERVER \\\n--docker-username=DOCKER_USER\
    \ \\\n--docker-password=DOCKER_PASSWORD \\\n--docker-email=DOCKER_EMAIL\n```\n\
    \n### Basic Authentication 密钥\n\n用于存储基本身份验证的凭据。\n\n示例用例：对需要基本身份验证的外部系统进行身份验证，例如\
    \ Web 应用程序的管理界面。\n\n它将具有以下形式：\n\n```\napiVersion: v1\nkind: Secret\nmetadata:\n\
    \  name: my-basic-auth\ntype: kubernetes.io/basic-auth\nstringData:\n  username:\
    \ admin\n  password: secret\n```\n\n### SSH Authentication 密钥\n\n用于存储 SSH 身份验证所需的数据。\n\
    \n示例用例：对 SSH 服务器进行身份验证，例如在 CI/CD 管道中进行安全的 Git 访问。\n\n```\napiVersion: v1\nkind:\
    \ Secret\nmetadata:\n  name: my-ssh-key\ntype: kubernetes.io/ssh-auth\ndata:\n\
    \  ssh-privatekey: <base64-encoded-private-key>\n```\n\n### TLS 密钥\n\n用于存储证书及其关联的私钥。\n\
    \n示例用例：在集群内通过 HTTPS 安全地提供流量，或对需要 TLS 的外部系统进行身份验证。\n\n```\napiVersion: v1\nkind:\
    \ Secret\nmetadata:\n  name: my-tls-secret\ntype: kubernetes.io/tls\ndata:\n \
    \ tls.crt: <base64-encoded-certificate>\n  tls.key: <base64-encoded-key>\n```\n\
    \n我们将在后面的章节中处理 Ingress 时看到一个详细的示例。\n\n通过为您的用例选择正确的密钥类型，您可以增强应用程序的安全性，并利用 Kubernetes\
    \ 的内置机制来管理敏感数据。\n\n## 为什么有不同类型的密钥？\n\n将其分类为不同类型有几个目的：\n\n**专门处理：** Kubernetes\
    \ 可以优化每种类型密钥的处理方式。例如，自动将服务账户令牌附加到 Pod，或确保证书密钥包含有效的证书和密钥对。\n\n**简化用户操作：** 通过为常见用例（如访问\
    \ Docker 注册表或存储 TLS 证书）提供特定类型，Kubernetes 简化了创建和管理密钥的过程。\n\n**提高安全性：** 不同类型的密钥通常意味着不同的安全考虑和访问模式。通过区分类型，Kubernetes\
    \ 可以实施更严格的验证和访问策略，降低配置错误和暴露的风险。\n\n**与 Kubernetes 功能集成：** 某些密钥类型与 Kubernetes 功能和组件紧密集成，如服务账户和\
    \ Ingress 控制器。这种集成允许在集群内无缝且安全地使用这些功能。\n\n通过提供各种类型的密钥，Kubernetes 能够实现更安全、高效且不易出错的敏感数据管理，以适应广泛的应用需求和安全要求。\n\
    \n## 将密钥注入为环境变量\n\n在 **flask-redis** 示例中，我们将 **REDIS_PASSWORD** 环境变量作为明文配置注入。让我们将其转换为密钥。\n\
    \n首先，我们从 **REDIS_PASSWORD** 值创建一个密钥。这将是一个通用密钥。\n\n```\n$ kubectl create secret\
    \ generic redis-credentials --from-literal=REDIS_PASSWORD=SuperS3cret -n notch-further\n\
    secret/redis-credentials created\n```\n\n让我们更新 **flask-redis** 部署以获取此密钥。\n\n```\n\
    apiVersion: apps/v1\nkind: Deployment\nmetadata:\n  name: flask-redis\nspec:\n\
    \  replicas: 1\n  selector:\n    matchLabels:\n      app: flask-redis\n  template:\n\
    \    metadata:\n      labels:\n        app: flask-redis\n    spec:\n      containers:\n\
    \        - name: flask\n          image: ghcr.io/badri/flask-redis:1.0\n     \
    \     env:\n            - name: DEBUG\n              valueFrom:\n            \
    \    configMapKeyRef:\n                  name: flask-config\n                \
    \  key: DEBUG\n            - name: PORT\n              valueFrom:\n          \
    \      configMapKeyRef:\n                  name: flask-config\n              \
    \    key: PORT\n            - name: REDIS_HOST\n              valueFrom:\n   \
    \             configMapKeyRef:\n                  name: flask-config\n       \
    \           key: REDIS_HOST\n            - name: REDIS_PASSWORD # (1)\n      \
    \        valueFrom:\n                secretKeyRef: # (2)\n                  name:\
    \ redis-credentials # (3)\n                  key: REDIS_PASSWORD # (4)\n     \
    \     ports:\n            - containerPort: 8080\n```\n\n虽然文件的其余部分相同，但我将只介绍此上下文中的特定更改。\n\
    \n(1) -> **REDIS_PASSWORD** 是一个 **valueFrom**，就像其他环境变量一样。\n\n(2) -> 它从密钥中获取值，该密钥由\
    \ **secretKeyRef** 部分引用。\n\n(3) -> 指向同一命名空间中的密钥，即我们刚刚创建的 **redis-credentials**\
    \ 密钥。\n\n(4) -> 我们想要获取的密钥资源中的键。\n\n重新应用此部署后，您的 **flask-redis** 应用程序将运行*大多数*符合\
    \ Kubernetes 最佳实践的规范。\n\n## 练习 26：配置 redis 部署\n\n使 redis 部署也从 **redis-credentials**\
    \ 密钥中获取密码。完成后，凭据仅存储在一个位置，并将被两个部署（flask 和 redis）引用。\n\n## 镜像拉取密钥\n\n到目前为止的所有部署中，我们一直在处理公共容器镜像。即使\
    \ ghcr.io 中的 **flask-redis** 和 **simple-flask** 镜像在前面的章节中也被转换为公共镜像。现在我们已经"
