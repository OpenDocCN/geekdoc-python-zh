  md: '# Creating service accounts


    We will stick to service accounts only as it is good enough to deploy a working
    application in production. Working with human users and Kubernetes is a vast topic
    and deserves a book of its own.


    A service account is a namespaced resource in Kubernetes. This means that service
    accounts are defined and operate within the scope of a specific namespace. Each
    service account is tied to a namespace and can be used to grant permissions for
    operations within that namespace, allowing for fine-grained access control and
    limiting the scope of what processes running in pods can access or modify.


    Creating a service account is a simple command.


    ```

    $ kubectl create serviceaccount test -n robust-setup

    serviceaccount/test created

    ```


    That''s it. We created a service account in the **robust-setup** namespace. But
    this is a toothless artifact, for now. It doesn''t tell us about what this service
    account can or cannot do. Let''s define that part now. First, we have to define
    what kind of "role" it can have. For this, we create a **Role** artifact.


    A **Role** is a Kubernetes resource which specifies rules that represent a set
    of permissions. These permissions include actions like get, list, create, update,
    delete, etc., on resources such as pods, services, deployments, and more. The
    rules within a Role determine what actions are allowed on which resources, providing
    fine-grained control over access within a namespace.


    Here''s a simple role which allows read operations on pods.'
  merge: -1
  pgno: 331
- img_proc: true
  md: "```\napiVersion: rbac.authorization.k8s.io/v1\nkind: Role\nmetadata:\n  name:\
    \ pod-reader # (1)\nrules:\n- apiGroups: [\"\"] # (2)\n  resources: [\"pods\"\
    ] # (3)\n  verbs: [\"get\", \"watch\", \"list\"] # (4)\n```\n\n(1) -> Name of\
    \ the role. Something meaningful.\n\n(2) -> Which API group the resources controlled\
    \ by the role belong to. We have defined an empty string, \"\", which implies\
    \ the core API group. This is what pods, services, deployments etc. belong to.\n\
    \n(3) -> List of resources the permissions apply to. For now, it's only pods.\n\
    \n(4) -> What operations we can do with the resources.\n\nWe create the role in\
    \ the **robust-setup** namespace.\n\n```\n$ kubectl apply -f pod-reader-role.yaml\
    \ -n robust-setup\nrole.rbac.authorization.k8s.io/pod-reader created\n```\n\n\
    We have a service account, and we have a role now. But there is no way Kubernetes\
    \ knows that it has to \"bind\" the **pod-reader** role to **test** service account.\
    \ To do this, we create a **RoleBinding** artifact.\n\nHere's an example of a\
    \ **RoleBinding** that binds the **pod-reader** Role to a service account named\
    \ **test**:"
