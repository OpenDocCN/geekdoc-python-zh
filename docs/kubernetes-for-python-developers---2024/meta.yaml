    # Best practices for liveness and readiness probes


    Liveness and readiness probes are crucial for maintaining the health and availability
    of applications in Kubernetes. Using them effectively requires understanding their
    purposes and nuances. Here are some best practices for utilizing both liveness
    and readiness probes:


    +   1. Use Both Probes for Complex Applications Liveness Probes: Ensure they are
    used to check if your application is alive and needs restarting. A liveness probe
    failure should indicate that your application is in a state from which it cannot
    recover without being restarted. Readiness Probes: Use readiness probes to determine
    when your application is ready to start accepting traffic. This is crucial for
    applications that have a startup time before they can serve traffic or might become
    temporarily unavailable due to load or dependency outages.

    2. Configure Probes According to Application Requirements Understand the startup
    time, dependencies, and typical failure modes of your application to configure
    the probes'' parameters (initialDelaySeconds, periodSeconds, timeoutSeconds, and
    failureThreshold) appropriately.'
  merge: -1
  pgno: 137
- img_proc: true
  md: 'Avoid aggressive probe configurations that might lead to unnecessary restarts
    or traffic being blocked to healthy pods.


    +   3. Differentiate Between Liveness and Readiness Checks Design your application''s
    health end-points to reflect liveness and readiness accurately. A liveness endpoint
    might check for critical process availability, whereas a readiness endpoint could
    check for database connectivity, cache readiness, or other dependencies.


    +   4. Avoid Using the Same Endpoint for Both Probes While it might be tempting
    to use the same endpoint for both liveness and readiness probes, this can lead
    to issues where a temporarily overloaded application is killed because it''s not
    responsive, rather than being given time to recover. Different endpoints can reflect
    the nuanced states of being alive vs. being ready to serve traffic.


    +   5. Start with Conservative Thresholds Begin with conservative thresholds for
    failureThreshold and timeoutSeconds to prevent flapping (frequent state changes)
    and unnecessary restarts. You can adjust these values as you gain more insight
    into your application''s behavior in production.


    +   6. Leverage Startup Probes for Slow-Starting Containers For applications that
    have a significant startup time, consider using a startup probe. Startup probes
    allow you to set a generous delay for readiness and liveness checks to start,
    giving your application sufficient time to initialize without being prematurely
    killed.'
