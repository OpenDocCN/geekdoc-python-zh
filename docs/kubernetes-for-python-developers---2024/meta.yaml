- md: "Kubernetes gives us a way to spread out the pods evenly across the nodes, so\
    \ that there is no single point of failure. There are very slim chances that all\
    \ the nodes in your cluster go down at the same time, right?\n\nWe specify this\
    \ as a part of the pod/deployment spec and is called **podAntiAffinity**.\n\n\
    ```yaml\napiVersion: apps/v1\nkind: Deployment\nmetadata:\n  name: my-deployment\n\
    spec:\n  replicas: 3 # (1)\n  selector:\n    matchLabels:\n      app: my-app #\
    \ (2)\n  template:\n    metadata:\n      labels:\n        app: my-app # (3)\n\
    \    spec:\n      affinity: # (4)\n        podAntiAffinity: # (5)\n          requiredDuringSchedulingIgnoredDuringExecution:\
    \ # (6)\n          - labelSelector:\n            matchExpressions: # (7)\n   \
    \         - key: app\n              operator: In\n              values:\n    \
    \          - my-app\n            topologyKey: \"kubernetes.io/hostname\" # (8)\n\
    \      containers:\n      - name: server\n        image: nginx\n```\n\n(1) ->\
    \ Specifies the desired number of replica pods for the deployment.\n\n(2) -> Defines\
    \ the label selector used to identify the pods that belong to this deployment.\n\
    \n(3) -> Sets the label for pods created from this template, used for matching\
    \ against the deployment selector.\n\n(4) -> Begins the specification of scheduling\
    \ preferences regarding pod placement.\n\n(5) -> Specifies the use of pod anti-affinity\
    \ rules to influence pod scheduling decisions.\n\n(6) -> Indicates that the anti-affinity\
    \ rule must be considered during scheduling but may be ignored after pod placement.\n\
    \n(7) -> Defines how the label selector should match against labels of existing\
    \ pods.\n\n(8) -> Specifies the node label key that the system uses to denote\
    \ the boundary within which to apply the pod anti-affinity rules.\n\nLet's apply\
    \ this deployment and check how the pods are scheduled.\n\n```bash\n$ kubectl\
    \ apply -f pod-anti-affinity.yaml -n robust-setup\ndeployment.apps/my-deployment\
    \ created\n```\n\n```bash\n$ kubectl get pod -n robust-setup -l app=my-app -o\
    \ wide\nNAME                          READY   STATUS    RESTARTS   AGE   IP  \
    \         NODE                             NOMINATED NODE   READINESS GATES\n\
    my-deployment-bbb987cc-l8mm5  1/1     Running   0          19s   10.244.1.90 \
    \ first-cluster-default-pool-oeo85 <none>           <none>\nmy-deployment-bbb987cc-nzcfx\
    \  1/1     Running   0          19s   10.244.0.234 first-cluster-default-pool-oeo8s\
    \  <none>           <none>\nmy-deployment-bbb987cc-p6q2q  1/1     Running   0\
    \          19s   10.244.0.1   first-cluster-default-pool-oeo8k <none>        \
    \   <none>\n```\n\nWe can see that each pod is placed in a different node. What\
    \ happens if there are more replicas than the number of nodes in the cluster?\
    \ Let's run that scenario by bumping up the number of deployments.\n\n```bash\n\
    $ kubectl scale deployment my-deployment --replicas=5 -n robust-setup\n```\n\n\
    After a few seconds,\n\n```bash\n$ kubectl get pod -n robust-setup -l app=my-app\
    \ -o wide\nNAME                          READY   STATUS    RESTARTS   AGE   IP\
    \           NODE                             NOMINATED NODE   READINESS GATES\n\
    my-deployment-bbb987cc-5jz9b  0/1     Pending   0          3s    <none>      \
    \ <none>                           <none>           <none>\nmy-deployment-bbb987cc-l8mm5\
    \  1/1     Running   0          7m40s  10.244.1.90   first-cluster-default-pool-oeo85\
    \   <none>           <none>\nmy-deployment-bbb987cc-nzcfx  1/1     Running   0\
    \          7m40s  10.244.0.234   first-cluster-default-pool-oeo8s   <none>   \
    \        <none>\nmy-deployment-bbb987cc-p6q2q  1/1     Running   0          7m40s\
    \  10.244.0.1     first-cluster-default-pool-oeo8k   <none>           <none>\n\
    my-deployment-bbb987cc-s7k2v  0/1     Pending   0          3s     <none>     \
    \    <none>                              <none>           <none>\n```\n\nWe can\
    \ see that the 2 new pods are in **Pending** status.\n\nWhen we describe one of\
    \ the pods, we find that the scheduler cannot assign a node for the pod as the\
    \ anti-affinity rules prevent it from doing so.\n\n```bash\n$ kubectl describe\
    \ pod my-deployment-bbb987cc-5jz9b -n robust-setup\nName:         my-deployment-bbb987cc-5jz9b\n\
    Namespace:    robust-setup\nPriority:     0\n....\nEvents:\n  Type     Reason\
    \            Age   From               Message\n  ----     ------            ----\
    \  ----               -------\n  Warning  FailedScheduling  21s   default-scheduler\
    \  0/3 nodes are available: 3 node(s) didn't match pod anti-affinity rules. preemption:\
    \ 0/3 nodes are available: 3 No preemption victims found for incoming pod.\n```\n\
    \nKubernetes allows us to relax the pod anti-affinity rules a little bit using\
    \ the **preferredDuringSchedulingIgnoredDuringExecution** spec. We change our\
    \ deployment slightly.\n\n```yaml\napiVersion: apps/v1\nkind: Deployment\nmetadata:\n\
    \  name: my-deployment\nspec:\n  replicas: 5 # (1)\n  ...\n  affinity:\n    podAntiAffinity:\n\
    \      preferredDuringSchedulingIgnoredDuringExecution:\n      - weight: 100 #\
    \ (3)\n        podAffinityTerm: # (4)\n          labelSelector:\n            matchExpressions:\n\
    \            - key: app\n              operator: In\n              values:\n \
    \             - my-app\n          topologyKey: \"kubernetes.io/hostname\"\n  ...\n\
    ```\n\n(1) -> we change the number of replicas to 5.\n\n(2) -> we change the pod\
    \ anti-affinity policy to more of a best effort basis. This means that the scheduler\
    \ will try to spread the pods across nodes to the maximum extent possible, but\
    \ if no matching node is found, it will still schedule the pod.\n\n(3) -> Specify\
    \ the weight for this preference. Each item in the **preferredDuringSchedulingIgnoredDuringExecution**\
    \ list must have a weight field. This value must be between 1 and 100 and indicates\
    \ the preference level of this rule compared to other rules.\n\n(4) -> Wrap the\
    \ labelSelector and **topologyKey** within **podAffinityTerm**. This encapsulation\
    \ is necessary for the structure of the **preferredDuringSchedulingIgnoredDuringExecution**\
    \ specification.\n\nLet's delete the older deployment and apply this new deployment.\n\
    \n```bash\n$ kubectl apply -f pod-anti-affinity-preferred.yaml -n robust-setup\n\
    deployment.apps/my-deployment created\n```\n\n```bash\n# after a few seconds ...\n\
    $ kubectl get pod -n robust-setup -l app=my-app -o wide\nNAME                \
    \                      READY   STATUS    RESTARTS   AGE   IP           NODE  \
    \                           NOMINATED NODE   READINESS GATES\nmy-deployment-5b878b869f-8v2jc\
    \            1/1     Running   0          17s   10.244.0.112 first-cluster-default-pool-oeo8k\
    \ <none>           <none>\nmy-deployment-5b878b869f-gs2j4            1/1     Running\
    \   0          17s   10.244.0.16  first-cluster-default-pool-oeo8k <none>    \
    \       <none>\nmy-deployment-5b878b869f-hzm29            1/1     Running   0\
    \          17s   10.244.1.59   first-cluster-default-pool-oeo85   <none>     \
    \      <none>\nmy-deployment-5b878b869f-qqj2f            1/1     Running   0 \
    \         17s   10.244.0.201  first-cluster-default-pool-oeo8s   <none>      \
    \     <none>\nmy-deployment-5b878b869f-wv8rt            1/1     Running   0  \
    \        17s   10.244.1.113  first-cluster-default-pool-oeo85   <none>       \
    \    <none>\n```\n\nWe can see that the scheduler has deployed the pods across\
    \ nodes.\n\n## ingress\n\nA Kubernetes Ingress is an API object that provides\
    \ HTTP and HTTPS routing to services within a Kubernetes cluster. It allows you\
    \ to expose services to the internet in a more flexible and unified way, managing\
    \ external access to the services in a cluster, typically HTTP(S) traffic. Ingress\
    \ can provide load balancing, SSL termination, and name-based virtual hosting.\n\
    \nWithout Ingress, exposing each service to the external world would require configuring\
    \ a LoadBalancer or NodePort for each service, which can be inefficient and expensive.\
    \ Ingress simplifies this by being a single entry point for all your services.\n\
    \nTo make Ingress resources work, you need an Ingress controller in your cluster.\
    \ An Ingress controller is responsible for fulfilling the Ingress, usually with\
    \ a load balancer, though it may configure an edge router or additional frontends\
    \ to help handle the traffic. Popular Ingress controllers include Nginx, HAProxy,\
    \ Traefik, and Istio."
  mdcn: "Kubernetes 为我们提供了一种将 Pod 均匀分布到各个节点上的方法，从而避免单点故障。你的集群中所有节点同时宕机的可能性非常小，对吧？\n\
    \n我们将此作为 Pod/部署规范的一部分进行指定，称为 **podAntiAffinity**。\n\n```yaml\napiVersion: apps/v1\n\
    kind: Deployment\nmetadata:\n  name: my-deployment\nspec:\n  replicas: 3 # (1)\n\
    \  selector:\n    matchLabels:\n      app: my-app # (2)\n  template:\n    metadata:\n\
    \      labels:\n        app: my-app # (3)\n    spec:\n      affinity: # (4)\n\
    \        podAntiAffinity: # (5)\n          requiredDuringSchedulingIgnoredDuringExecution:\
    \ # (6)\n          - labelSelector:\n            matchExpressions: # (7)\n   \
    \         - key: app\n              operator: In\n              values:\n    \
    \          - my-app\n            topologyKey: \"kubernetes.io/hostname\" # (8)\n\
    \      containers:\n      - name: server\n        image: nginx\n```\n\n(1) ->\
    \ 指定部署所需的副本 Pod 数量。\n\n(2) -> 定义用于识别属于此部署的 Pod 的标签选择器。\n\n(3) -> 设置从此模板创建的 Pod\
    \ 的标签，用于与部署选择器进行匹配。\n\n(4) -> 开始指定关于 Pod 放置的调度偏好。\n\n(5) -> 指定使用 Pod 反亲和性规则来影响\
    \ Pod 调度决策。\n\n(6) -> 表示在调度期间必须考虑反亲和性规则，但在 Pod 放置后可能会被忽略。\n\n(7) -> 定义标签选择器应如何匹配现有\
    \ Pod 的标签。\n\n(8) -> 指定系统用于表示应用 Pod 反亲和性规则边界的节点标签键。\n\n让我们应用此部署并检查 Pod 的调度情况。\n\
    \n```bash\n$ kubectl apply -f pod-anti-affinity.yaml -n robust-setup\ndeployment.apps/my-deployment\
    \ created\n```\n\n```bash\n$ kubectl get pod -n robust-setup -l app=my-app -o\
    \ wide\nNAME                          READY   STATUS    RESTARTS   AGE   IP  \
    \         NODE                             NOMINATED NODE   READINESS GATES\n\
    my-deployment-bbb987cc-l8mm5  1/1     Running   0          19s   10.244.1.90 \
    \ first-cluster-default-pool-oeo85 <none>           <none>\nmy-deployment-bbb987cc-nzcfx\
    \  1/1     Running   0          19s   10.244.0.234 first-cluster-default-pool-oeo8s\
    \  <none>           <none>\nmy-deployment-bbb987cc-p6q2q  1/1     Running   0\
    \          19s   10.244.0.1   first-cluster-default-pool-oeo8k <none>        \
    \   <none>\n```\n\n我们可以看到每个 Pod 都被放置在不同的节点上。如果副本数多于集群中的节点数会发生什么？让我们通过增加部署数量来运行这个场景。\n\
    \n```bash\n$ kubectl scale deployment my-deployment --replicas=5 -n robust-setup\n\
    ```\n\n几秒钟后，\n\n```bash\n$ kubectl get pod -n robust-setup -l app=my-app -o wide\n\
    NAME                          READY   STATUS    RESTARTS   AGE   IP          \
    \ NODE                             NOMINATED NODE   READINESS GATES\nmy-deployment-bbb987cc-5jz9b\
    \  0/1     Pending   0          3s    <none>       <none>                    \
    \       <none>           <none>\nmy-deployment-bbb987cc-l8mm5  1/1     Running\
    \   0          7m40s  10.244.1.90   first-cluster-default-pool-oeo85   <none>\
    \           <none>\nmy-deployment-bbb987cc-nzcfx  1/1     Running   0        \
    \  7m40s  10.244.0.234   first-cluster-default-pool-oeo8s   <none>           <none>\n\
    my-deployment-bbb987cc-p6q2q  1/1     Running   0          7m40s  10.244.0.1 \
    \    first-cluster-default-pool-oeo8k   <none>           <none>\nmy-deployment-bbb987cc-s7k2v\
    \  0/1     Pending   0          3s     <none>         <none>                 \
    \             <none>           <none>\n```\n\n我们可以看到两个新 Pod 处于 **Pending** 状态。\n\
    \n当我们描述其中一个 Pod 时，我们发现调度器无法为该 Pod 分配节点，因为反亲和性规则阻止了它这样做。\n\n```bash\n$ kubectl\
    \ describe pod my-deployment-bbb987cc-5jz9b -n robust-setup\nName:         my-deployment-bbb987cc-5jz9b\n\
    Namespace:    robust-setup\nPriority:     0\n....\nEvents:\n  Type     Reason\
    \            Age   From               Message\n  ----     ------            ----\
    \  ----               -------\n  Warning  FailedScheduling  21s   default-scheduler\
    \  0/3 nodes are available: 3 node(s) didn't match pod anti-affinity rules. preemption:\
    \ 0/3 nodes are available: 3 No preemption victims found for incoming pod.\n```\n\
    \nKubernetes 允许我们使用 **preferredDuringSchedulingIgnoredDuringExecution** 规范稍微放宽\
    \ Pod 反亲和性规则。我们稍微修改一下部署。\n\n```yaml\napiVersion: apps/v1\nkind: Deployment\nmetadata:\n\
    \  name: my-deployment\nspec:\n  replicas: 5 # (1)\n  ...\n  affinity:\n    podAntiAffinity:\n\
    \      preferredDuringSchedulingIgnoredDuringExecution:\n      - weight: 100 #\
    \ (3)\n        podAffinityTerm: # (4)\n          labelSelector:\n            matchExpressions:\n\
    \            - key: app\n              operator: In\n              values:\n \
    \             - my-app\n          topologyKey: \"kubernetes.io/hostname\"\n  ...\n\
    ```\n\n(1) -> 我们将副本数更改为 5。\n\n(2) -> 我们将 Pod 反亲和性策略更改为更多基于尽力而为的基础。这意味着调度器将尝试尽可能地将\
    \ Pod 分散到各个节点上，但如果找不到匹配的节点，它仍然会调度该 Pod。\n\n(3) -> 指定此偏好的权重。**preferredDuringSchedulingIgnoredDuringExecution**\
    \ 列表中的每个项目都必须有一个 weight 字段。此值必须在 1 到 100 之间，表示此规则与其他规则相比的偏好级别。\n\n(4) -> 将 labelSelector\
    \ 和 **topologyKey** 包装在 **podAffinityTerm** 中。这种封装对于 **preferredDuringSchedulingIgnoredDuringExecution**\
    \ 规范的结构是必要的。\n\n让我们删除旧的部署并应用这个新的部署。\n\n```bash\n$ kubectl apply -f pod-anti-affinity-preferred.yaml\
    \ -n robust-setup\ndeployment.apps/my-deployment created\n```\n\n```bash\n# 几秒钟后\
    \ ...\n$ kubectl get pod -n robust-setup -l app=my-app -o wide\nNAME         \
    \                             READY   STATUS    RESTARTS   AGE   IP          \
    \ NODE                             NOMINATED NODE   READINESS GATES\nmy-deployment-5b878b869f-8v2jc\
    \            1/1     Running   0          17s   10.244.0.112 first-cluster-default-pool-oeo8k\
    \ <none>           <none>\nmy-deployment-5b878b869f-gs2j4            1/1     Running\
    \   0          17s   10.244.0.16  first-cluster-default-pool-oeo8k <none>    \
    \       <none>\nmy-deployment-5b878b869f-hzm29            1/1     Running   0\
    \          17s   10.244.1.59   first-cluster-default-pool-oeo85   <none>     \
    \      <none>\nmy-deployment-5b878b869f-qqj2f            1/1     Running   0 \
    \         17s   10.244.0.201  first-cluster-default-pool-oeo8s   <none>      \
    \     <none>\nmy-deployment-5b878b869f-wv8rt            1/1     Running   0  \
    \        17s   10.244.1.113  first-cluster-default-pool-oeo85   <none>       \
    \    <none>\n```\n\n我们可以看到调度器已经将 Pod 部署到了各个节点上。\n\n## Ingress\n\nKubernetes Ingress\
    \ 是一个 API 对象，它为 Kubernetes 集群内的服务提供 HTTP 和 HTTPS 路由。它允许你以更灵活和统一的方式将服务暴露到互联网，管理对集群中服务的外部访问，通常是\
    \ HTTP(S) 流量。Ingress 可以提供负载均衡、SSL 终止和基于名称的虚拟主机。\n\n没有 Ingress，将每个服务暴露给外部世界将需要为每个服务配置\
    \ LoadBalancer 或 NodePort，这可能效率低下且成本高昂。Ingress 通过作为所有服务的单一入口点简化了这一点。\n\n要使 Ingress\
    \ 资源工作，你需要在集群中有一个 Ingress 控制器。Ingress 控制器负责实现 Ingress，通常使用负载均衡器，尽管它可能配置边缘路由器或额外的前端来帮助处理流量。流行的\
    \ Ingress 控制器包括 Nginx、HAProxy、Traefik 和 Istio。"
