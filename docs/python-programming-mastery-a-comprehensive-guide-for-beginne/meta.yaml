    ing a collection of Python modules, allowing for a hierarchical structure to manage
    and access related modules in a more organized manner.


    In other words, both libraries and packages are ways to bundle reusable code so
    that it can be used in different programs.


    # INSTALLING LIBRARIES AND PACKAGES


    Python''s standard library comes with Python''s installation. It contains many
    useful modules, like **math, datetime, random**, etc. However, there are thousands
    of other libraries available that can be installed using Python''s package manager,
    pip.


    Here''s how you can install a library using pip:


    ```

    pip install library_name

    ```


    For example, to install the popular data manipulation library pandas, you would
    use:


    ```

    pip install pandas

