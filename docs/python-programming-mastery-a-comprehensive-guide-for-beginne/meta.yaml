    - You can slice a list to get a new list with a subset of the items.


    ```python

    some_fruits = fruits[1:3] # Gets the items at positions 1 and 2

    ```


    - The **sort()** method sorts the items in place, and the **sorted()** function
    returns a new sorted list.


    ```python

    fruits.sort() # Sorts the items in fruits

    sorted_fruits = sorted(fruits) # Returns a new sorted list

    ```


    - The **reverse()** method reverses the items in place, and the **reversed()**
    function returns a new reversed list.


    ```python

    fruits.reverse() # Reverses the items in fruits

    reversed_fruits = list(reversed(fruits)) # Returns a new reversed list

    ```


    - The **count()** method returns the number of times a specified item appears
    in the list.


    ```python

    apple_count = fruits.count(''apple'')

    ```


    These are just a few examples. Python provides many more list methods, and you
    can find them in the Python documentation.


    ## INTRODUCTION TO TUPLES


    However, unlike lists, tuples are immutable, meaning you cannot add, remove, or
    change items after the tuple creation. Tuples are often used for heterogeneous
    data, while lists are used for homogenous data.


    ## CREATING A TUPLE


    You can create a tuple by placing items inside parentheses (), separated by commas.
    For example:


    ```python

    point = (3, 4)

    ```


    Here, **point** is a tuple that contains two integers.


    If you''re defining a tuple with only one element, you need to include a trailing
    comma, like so: **singleton = (5,)**. Without the comma, Python treats the parentheses
    as mathematical parentheses rather than a tuple definition.


    ## Accessing Tuple Elements


    You can access tuple elements in the same way as list elements - by their indices.


    ```python

    print(point[0]) # Outputs: 3

    ```


    ## Tuple Unpacking


    One common usage of tuples is unpacking. This means assigning the items of a tuple
    to multiple variables at once.


    ```python

    x, y = point

    print(x) # Outputs: 3

    print(y) # Outputs: 4

    ```


    ## TUPLE OPERATIONS AND FUNCTIONS


    While you cannot modify tuples, you can perform other operations similar to lists,
    such as concatenation and repetition. Python also provides several built-in functions
    that work with tuples, like **len()**, **min()**, **max()**, and **sum()**.


    ## INTRODUCTION TO SETS


    It''s similar to a mathematical set: it cannot have duplicate items, and it supports
    operations like union, intersection, and difference.


    ## Creating a Set


    You can create a set by placing items inside curly braces **{}**, separated by
    commas. For example:


    ```python

    fruits_set = {''apple'', ''banana'', ''cherry'', ''apple''}

    ```


    This creates a set with three items. Even though ''apple'' is included twice,
    it only appears once in the set because sets cannot have duplicate items.


    Note: An empty set must be created using the **set()** constructor, like so: **empty_set
    = set()**. If you use {}, Python creates an empty dictionary, not a set.


    ## Modifying Sets


    Since sets are mutable, you can add and remove items.


    - To add an item, use the **add()** method.


    ```python

    fruits_set.add(''date'')

    ```


    - To remove an item, use the **remove()** method. If the item is not found, **remove()**
    raises a KeyError.


    ```python

    fruits_set.remove(''apple'')

    ```


    - If you want to remove an item without raising an error if the item is not found,
    use the **discard()** method.


    ```python

    fruits_set.discard(''apple'')

    ```


    - To add multiple items at once, use the **update()** method.


    ```python

    fruits_set.update([''elderberry'', ''fig''])

    ```


    ## SET OPERATIONS


    Python supports several mathematical set operations.


    - Union: The union of two sets is a new set containing all items from both sets.
    You can find the union with the **union()** method or the | operator.


    ```python

    other_fruits = {''grape'', ''kiwi''}

    all_fruits = fruits_set.union(other_fruits)

    all_fruits = fruits_set | other_fruits # equivalent to the previous line

    ```


    - Intersection: The intersection of two sets is a new set containing only the
    items found in both sets. You can find the intersection with the **intersection()**
    method or the **&** operator.


    ```python

    common_fruits = fruits_set.intersection(other_fruits)

    common_fruits = fruits_set & other_fruits # equivalent to the previous line

    ```


    - Difference: The difference of two sets is a new set containing items in the
    first set but not in the second set. You can find the difference with the **difference()**
    method or the **-** operator.


    ```python

    unique_fruits = fruits_set.difference(other_fruits)

    unique_fruits = fruits_set - other_fruits # equivalent to the previous line

    ```


    - Symmetric Difference: The symmetric difference of two sets is a new set containing
    items in either set but not in both.


    ```python

    exclusive_fruits = fruits_set.symmetric_difference(other_fruits)

    exclusive_fruits = fruits_set ^ other_fruits # equivalent to the previous line

    ```


    Note that all these operations do not modify the original sets. If you want to
    perform these operations and update the set at the same time, use the corresponding
    update methods: **update()**, **intersection_update()**, **difference_update()**,
    and **symmetric_difference_update()**.


    ## LIST, TUPLE, AND SET COMPREHENSIONS


    Just like with lists, Python supports comprehensions for tuples and sets.


    - List comprehension:


    ```python

    squares = [x**2 for x in range(1, 6)] # Creates a list of squares

    ```


    - Tuple comprehension (actually called a generator expression):


    ```python

    squares_tuple = tuple(x**2 for x in range(1, 6)) # Creates a tuple of squares

    ```


    - Set comprehension:


    ```python

    squares_set = {x**2 for x in range(1, 6)} # Creates a set of squares

    ```


    ## CHOOSING THE RIGHT DATA STRUCTURE


    Lists, tuples, and sets each have their uses. Here are some general guidelines:


    - Use a list if you have an ordered collection of items, and you might need to
    change, add, or remove items.

    - Use a tuple if you have an ordered collection of items, and you won''t change
    the items. Tuples can also be used for multiple assignments and to return multiple
    values from a function.

    - Use a set if you need to keep track of unique items, and you don''t care about
    their order. Sets also support efficient membership tests and set operations.


    Keep in mind that these are just guidelines, and the right data structure depends
    on what you''re trying to achieve.


    In this chapter, you''ve learned about three fundamental data structures in Python:
    lists, tuples, and sets. You''ve seen how to create, manipulate, and operate on
    these data structures. Understanding these data structures is key to writing efficient
    Python code.


    ## CHAPTER 7: DICTIONARIES AND DATA MANIPULATION


    Python''s data structures extend beyond lists, tuples, and sets. In this chapter,
    we''ll dive into another essential data structure: the dictionary. Moreover, we''ll
    explore how to perform various data manipulation tasks using Python. This chapter
    will guide you to a more sophisticated understanding of how Python structures
    data, allowing you to write more efficient and cleaner code.


    ## INTRODUCING DICTIONARIES


    Dictionaries, sometimes referred to as ''dicts'', are Python''s version of hash
    tables. They store key-value pairs and provide a quick way of accessing a value
    by its unique key. Unlike lists and tuples, dictionaries aren''t ordered collections.'
