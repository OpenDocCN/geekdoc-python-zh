    greeting = 'Hello, world!'\nname = \"Alice\"\nparagraph = \"\"\"This is a multi-line\
    \ string.\"\"\"\n```\n\n### BOOLEANS\n\nIn Python, a boolean is a type of variable\
    \ that can have one of two values: **True** or **False**. Booleans are used to\
    \ represent the truth values that are associated with the logic branches of programming.\n\
    \n```python\nis_true = True\nis_false = False\n```\n\n### Type Function\n\nPython\
    \ provides a built-in function, **type()**, that allows you to find out the data\
    \ type of any variable or value. Simply pass the variable or value as an argument\
    \ to the **type()** function, and it will return its data type.\n\n```python\n\
    num = 10\nprint(type(num))  # <class 'int'>\npi = 3.14\nprint(type(pi))  # <class\
    \ 'float'>\ngreeting = 'Hello, world!'\nprint(type(greeting))  # <class 'str'>\n\
    is_true = True\nprint(type(is_true))  # <class 'bool'>\n```\n\n### Type Conversion\n\
    \nPython allows you to convert values from one data type to another using various\
    \ built-in functions.\n\n```python\nnum = '10'\nprint(int(num))  # 10\nnum = 10\n\
    print(float(num))  # 10.0\nnum = 10\nprint(str(num))  # '10'\nstatement = 1\n\
    print(bool(statement))  # True\n```\n\n### Immutability\n\nIn Python, some data\
    \ types are immutable, which means their state cannot be changed after they are\
    \ created. For example, strings and numbers are immutable in Python.\n\n```python\n\
    greeting = 'Hello, world!'\ngreeting[0] = 'h'  # TypeError: 'str' object does\
    \ not support item assignment\n```\n\nIn contrast, some data types are mutable\
    \ and can be changed after they are created. Lists and dictionaries, which we'll\
    \ cover in a later chapter, are examples of mutable data types in Python.\n\n\
    Understanding variables and data types is crucial for programming in Python, as\
    \ it forms the foundation upon which the rest of your programming knowledge is\
    \ built. Spend time to understand these concepts thoroughly, as they'll make learning\
    \ the more advanced aspects of Python much easier.\n\n## Chapter 4: Making Decisions\
    \ with Conditional Statements\n\nIn the world of programming, the ability to make\
    \ decisions based on certain conditions is a valuable tool. This chapter introduces\
    \ you to conditional statements in Python, including **if**, **else**, and **elif**\
    \ statements, and Boolean logic operators.\n\n### The if Statement\n\nThe **if**\
    \ statement is the most straightforward way to control the flow of a program based\
    \ on a condition. If the condition is true, the code block under the **if** statement\
    \ will execute. If it's false, the code block will be skipped.\n\nLet's take a\
    \ look at the basic structure of an **if** statement:\n\nHere's an example:\n\n\
    ```python\ntemperature = 30\nif temperature > 20:\n    print(\"It's a warm day.\"\
    )\n```\n\nIn this example, the **if** statement checks if the variable **temperature**\
    \ is greater than 20. Since **temperature** equals 30, which is indeed greater\
    \ than 20, the code block under the **if** statement executes and prints \"It's\
    \ a warm day.\"\n\n### THE ELSE STATEMENT\n\nIn Python, the else statement is\
    \ utilized to define a code block that will be executed when the condition in\
    \ the if statement evaluates to false.\n\nHere's an example:\n\n```python\ntemperature\
    \ = 15\nif temperature > 20:\n    print(\"It's a warm day.\")\nelse:\n    print(\"\
    It's a cool day.\")\n```\n\nIn this case, since **temperature** is not greater\
    \ than 20, the code block under the **else** statement executes, and \"It's a\
    \ cool day.\" is printed.\n\n### THE ELIF STATEMENT\n\nThe elif statement provides\
    \ a means to evaluate multiple expressions for truthfulness and execute a specific\
    \ block of code as soon as one of the conditions is found to be true.\n\nIt's\
    \ short for \"else if\".\n\nHere is its basic structure:\n\n```python\nif condition1:\n\
    \    # block of code to execute if condition1 is true\nelif condition2:\n    #\
    \ block of code to execute if condition2 is true\nelse:\n    # block of code to\
    \ execute if both conditions are false\n```\n\nHere's an example:\n\n```python\n\
    temperature = 20\nif temperature > 30:\n    print(\"It's a hot day.\")\nelif 20\
    \ <= temperature <= 30:\n    print(\"It's a warm day.\")\nelse:\n    print(\"\
    It's a cool day.\")\n```\n\nIn this example, the first condition **temperature\
    \ > 30** is not met, so Python checks the second condition **20 <= temperature\
    \ <= 30**. Since this condition is met, \"It's a warm day.\" is printed.\n\n###\
    \ BOOLEAN LOGIC\n\nBoolean logic, also known as Boolean algebra, is a subset of\
