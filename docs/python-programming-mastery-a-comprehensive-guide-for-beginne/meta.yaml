    \ Python commands, you'll need to activate the venv. The activation process will\
    \ vary based on your operating system.\n\n- On macOS and Linux:\n  ```bash\n \
    \ source myvenv/bin/activate\n  ```\n- On Windows:\n  ```bash\n  .\\myvenv\\Scripts\\\
    activate\n  ```\n\nWhen the venv is activated, your shell prompt will be prefixed\
    \ with the name of the venv, confirming that you're working inside the venv.\n\
    \n## Managing Packages with a Virtual Environment\n\nOnce you've activated your\
    \ venv, you can start installing, upgrading, and removing Python packages using\
    \ pip, just as you would with a global Python installation. The key difference\
    \ is that the modifications you make will only apply to the current venv, leaving\
    \ your global Python untouched.\n\nSetting up and using virtual environments can\
    \ significantly simplify your Python development work, especially when juggling\
    \ multiple projects with different dependencies. So, take the time to familiarize\
    \ yourself with venvs – they'll be a key tool in your Python toolkit!\n\n## SELECTING\
    \ AN INTEGRATED DEVELOPMENT ENVIRONMENT (IDE)\n\nWriting Python code requires\
    \ more than just a basic text editor. You need an environment that can help you\
    \ write, debug, and run your code efficiently. They are advanced text editors\
    \ designed specifically for programming, packed with features like syntax highlighting,\
    \ auto-completion, and debugging tools.\n\nIn this section, we'll introduce some\
    \ of the popular IDEs used for Python development - PyCharm, Visual Studio Code,\
    \ and Jupyter Notebooks - to help you decide which one fits your needs best.\n\
    \n## PYCHARM\n\nDeveloped by JetBrains, PyCharm is a dedicated Python IDE loaded\
    \ with features. It provides robust coding assistance, including intelligent code\
    \ completion, on-the-fly error checking, easy project navigation, and more. It\
    \ has built-in support for Python web frameworks like Django and Flask, making\
    \ it a go-to choice for many web developers.\n\nHowever, PyCharm can be resource-heavy,\
    \ and its multitude of features may be overwhelming for beginners. It also comes\
    \ in two versions: a free community version and a paid professional version.\n\
    \n## VISUAL STUDIO CODE (VS CODE)\n\nVS Code is a versatile, lightweight, and\
    \ powerful source code editor developed by Microsoft. It supports Python development\
    \ through a rich Python extension that offers features like IntelliSense (smart\
    \ code completion), linting, debugging, code navigation, and more.\n\nThe selling\
    \ point of VS Code is its customization ability. You can tailor it to your needs\
    \ with numerous plugins and themes. While VS Code provides extensive features,\
    \ its interface is simpler than PyCharm, making it a good choice for both beginners\
    \ and seasoned programmers.\n\n## JUPYTER NOTEBOOKS\n\nJupyter Notebooks is a\
    \ unique IDE, especially popular among data scientists.\n\nOne standout feature\
    \ is its support for \"cells,\" which lets you run small portions of code independently,\
    \ making it excellent for iterative and exploratory coding. However, it lacks\
    \ some of the advanced features other IDEs provide, such as robust debugging and\
    \ refactoring tools.\n\n## Making Your Choice\n\nThere's no 'one size fits all'\
    \ when it comes to choosing an IDE. The best IDE for you depends on your coding\
    \ style, project requirements, and personal preferences. Experiment with these\
    \ options, explore their features, and find the one that makes your Python development\
    \ enjoyable and productive. After all, your IDE will be your primary tool as you\
    \ delve deeper into Python programming.\n\n## GETTING FAMILIAR WITH PYTHON'S INTERACTIVE\
    \ SHELL\n\nThe Python interactive shell is a powerful tool that lets you interact\
    \ with the Python interpreter in real-time. It's an excellent way to explore Python,\
    \ test your code snippets, and debug your applications. In this subsection, we'll\
    \ show you how to use the Python interactive shell and why it's such a valuable\
    \ part of any Python programmer's toolkit.\n\n## Starting a Python Interactive\
    \ Shell Session\n\nStarting a Python interactive shell session is as simple as\
    \ running the Python interpreter without passing it a script to execute. Here's\
    \ how:\n\n- On Windows, open the Command Prompt and type **python**, then press\
    \ Enter.\n- On macOS and Linux, open the Terminal and type **python3**, then press\
    \ Enter.\n\n```\nPython 3.x.x (default, Date, Time, [GCC/Clang version]) Type\
    \ \"help\", \"copyright\", \"credits\" or \"license\" for more information. >>>\n\
    ```\n\nThe >>> is the Python shell's prompt, where you'll type your commands.\n\
    \n## Executing Python Commands in Real-Time\n\nNow that you've opened the Python\
    \ interactive shell, you can start executing Python commands. For instance, try\
    \ a simple addition:\n\n```python\n>>> 2 + 2\n4\n```\n\nAs soon as you press Enter,\
    \ Python evaluates the expression and displays the result. You can also define\
    \ variables, write functions, and even import modules – just like you would in\
    \ a Python script.\n\n```python\n>>> x = 5\n>>> y = 10\n>>> z = x + y\n>>> print(z)\n\
    15\n```"
  mdcn: "## Python 可从任何命令提示符访问。\n\n## 在 Mac 上\n\n1.  macOS 预装了 Python 2.7，但我们希望使用\
    \ Python 3。请访问 [Python 官方下载页面](https://www.python.org/downloads/)。\n2.  要继续，请选择最新的\
    \ Python 3 版本。\n3.  下载 macOS 64 位安装程序。\n4.  运行安装文件并按照安装向导操作。\n\n## 在 Linux 上\n\
    \n许多 Linux 发行版预装了 Python。要检查 Python 是否已安装并验证其版本，请打开终端并输入：\n\n```bash\npython3\
    \ --version\n```\n\n如果已安装 Python 3，将打印版本号。如果未安装，你可以通过特定发行版的包管理器安装 Python 3。要在\
    \ Ubuntu 上执行此任务，可以使用以下命令：\n\n```bash\nsudo apt-get update\nsudo apt-get install\
    \ python3\n```\n\n## 安装 PIP\n\nPIP（Pip Installs Packages）是 Python 的包管理器，它允许我们轻松安装和管理不属于\
    \ Python 标准库的额外库和依赖项。\n\nPython 3.4 及更高版本默认捆绑了 pip。要检查是否已安装 pip，请打开命令提示符或终端并输入：\n\
    \n```bash\npip --version\n```\n\n如果已安装 pip，将打印版本号。如果未安装或你想升级它，可以通过运行以下命令来完成：\n\
    \n```bash\npython -m ensurepip --upgrade\n```\n\n在你的机器上设置 Python 和 PIP 是进行任何 Python\
    \ 开发的基础步骤。安装了 Python 并拥有 PIP，你现在已准备好迎接任何 Python 项目！编码愉快！\n\n## 设置你的虚拟环境\n\n随着你深入\
    \ Python 编程，你会发现不同的项目可能需要不同版本的库，甚至不同版本的 Python 本身。如果你在系统上全局安装这些依赖项，管理这些不同的依赖项可能会变成一场噩梦。这时就需要\
    \ Python 虚拟环境——一个独立的“沙盒”，允许你按项目管理依赖项，而不会相互干扰。\n\n## 为什么使用虚拟环境？\n\n虚拟环境，简称“venv”，通过为不同项目创建隔离的\
    \ Python 环境来保持它们使用的依赖项分离。这是一种干净、优雅且无冲突的管理项目依赖项的方式，允许你安装、升级和删除 Python 模块，而不影响其他项目或你的系统\
    \ Python。本质上，每个 venv 都充当一个独特的 Python 安装。\n\n## 创建虚拟环境\n\n以下是如何设置一个新的 venv：\n\n\
    1.  首先，导航到你想要创建 venv 的目录，通常是项目的根目录。例如：\n\n```bash\ncd my_python_project\n```\n\
    \n2.  进入所需目录后，你可以使用以下命令创建一个新的 venv：\n\n```bash\npython3 -m venv myvenv\n```\n\n\
    将 'myvenv' 替换为你想给虚拟环境起的任何名称。\n\n## 激活虚拟环境\n\n在开始安装包和运行 Python 命令之前，你需要激活 venv。激活过程因操作系统而异。\n\
    \n- 在 macOS 和 Linux 上：\n  ```bash\n  source myvenv/bin/activate\n  ```\n- 在 Windows\
    \ 上：\n  ```bash\n  .\\myvenv\\Scripts\\activate\n  ```\n\n当 venv 被激活时，你的 shell\
    \ 提示符将添加 venv 的名称作为前缀，确认你正在 venv 内工作。\n\n## 使用虚拟环境管理包\n\n一旦你激活了 venv，你就可以开始使用\
    \ pip 安装、升级和删除 Python 包，就像使用全局 Python 安装一样。关键的区别在于，你所做的修改将仅应用于当前的 venv，而不会影响你的全局\
    \ Python。\n\n设置和使用虚拟环境可以显著简化你的 Python 开发工作，尤其是在处理具有不同依赖项的多个项目时。因此，花时间熟悉 venv 吧——它们将成为你\
    \ Python 工具箱中的关键工具！\n\n## 选择集成开发环境（IDE）\n\n编写 Python 代码不仅仅需要一个基本的文本编辑器。你需要一个能帮助你高效编写、调试和运行代码的环境。它们是专门为编程设计的高级文本编辑器，集成了语法高亮、自动完成和调试工具等功能。\n\
    \n在本节中，我们将介绍一些用于 Python 开发的流行 IDE——PyCharm、Visual Studio Code 和 Jupyter Notebooks——以帮助你决定哪一个最适合你的需求。\n\
    \n## PYCHARM\n\nPyCharm 由 JetBrains 开发，是一个功能丰富的专用 Python IDE。它提供强大的编码辅助，包括智能代码补全、实时错误检查、便捷的项目导航等。它内置了对\
    \ Django 和 Flask 等 Python Web 框架的支持，使其成为许多 Web 开发者的首选。\n\n然而，PyCharm 可能比较耗费资源，其众多功能可能让初学者感到不知所措。它还提供两个版本：免费的社区版和付费的专业版。\n\
    \n## VISUAL STUDIO CODE (VS CODE)\n\nVS Code 是由 Microsoft 开发的多功能、轻量级且强大的源代码编辑器。它通过丰富的\
    \ Python 扩展支持 Python 开发，提供诸如 IntelliSense（智能代码补全）、代码检查、调试、代码导航等功能。\n\nVS Code\
    \ 的卖点在于其可定制性。你可以通过众多插件和主题来定制它以满足你的需求。虽然 VS Code 提供了广泛的功能，但其界面比 PyCharm 更简洁，使其成为初学者和经验丰富的程序员的良好选择。\n\
    \n## JUPYTER NOTEBOOKS\n\nJupyter Notebooks 是一个独特的 IDE，在数据科学家中尤其受欢迎。\n\n一个突出的特点是它支持“单元格”，这让你可以独立运行小段代码，使其非常适合迭代和探索性编码。然而，它缺乏其他\
    \ IDE 提供的一些高级功能，例如强大的调试和重构工具。\n\n## 做出你的选择\n\n在选择 IDE 时，没有“一刀切”的方案。最适合你的 IDE 取决于你的编码风格、项目需求和个人偏好。尝试这些选项，探索它们的功能，找到那个能让你的\
    \ Python 开发既愉快又高效的选择。毕竟，随着你深入 Python 编程，IDE 将成为你的主要工具。\n\n## 熟悉 Python 的交互式 Shell\n\
    \nPython 交互式 shell 是一个强大的工具，允许你实时与 Python 解释器交互。它是探索 Python、测试代码片段和调试应用程序的绝佳方式。在本小节中，我们将向你展示如何使用\
    \ Python 交互式 shell，以及为什么它是任何 Python 程序员工具箱中如此有价值的一部分。\n\n## 启动 Python 交互式 Shell\
    \ 会话\n\n启动 Python 交互式 shell 会话非常简单，只需运行 Python 解释器而不传递要执行的脚本即可。方法如下：\n\n- 在 Windows\
    \ 上，打开命令提示符并输入 **python**，然后按 Enter。\n- 在 macOS 和 Linux 上，打开终端并输入 **python3**，然后按\
    \ Enter。\n\n```\nPython 3.x.x (default, Date, Time, [GCC/Clang version]) Type\
    \ \"help\", \"copyright\", \"credits\" or \"license\" for more information. >>>\n\
    ```\n\n>>> 是 Python shell 的提示符，你将在此输入命令。\n\n## 实时执行 Python 命令\n\n现在你已经打开了 Python\
    \ 交互式 shell，可以开始执行 Python 命令了。例如，尝试一个简单的加法：\n\n```python\n>>> 2 + 2\n4\n```\n\n\
    一旦你按下 Enter，Python 就会计算表达式并显示结果。你还可以定义变量、编写函数，甚至导入模块——就像在 Python 脚本中一样。\n\n```python\n\
    >>> x = 5\n>>> y = 10\n>>> z = x + y\n>>> print(z)\n15\n```"
