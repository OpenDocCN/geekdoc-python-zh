    \ where the first element in each passed iterator is paired together, and then\
    \ the second element in each passed iterator is paired together, and so on.\n\n\
    ```python\nnames = ['Alice', 'Bob', 'Charlie']\nages = [25, 30, 35]\nfor name,\
    \ age in zip(names, ages):\n    print(f\"{name} is {age} years old.\")\n```\n\n\
    In this example, the **zip()** function combines **names** and **ages** into pairs,\
    \ and the **for** loop iterates over these pairs.\n\n### Looping in Sorted Order\n\
    \nCombining **sorted()** with a **for** loop lets you iterate over elements in\
    \ a sorted order.\n\n```python\nfruits = ['banana', 'apple', 'cherry']\nfor fruit\
    \ in sorted(fruits):\n    print(fruit)\n```\n\nThis code will print 'apple', 'banana',\
    \ and 'cherry', in that order. Despite the original `fruits` list being in a different\
    \ order, the `sorted()` function rearranges the elements in ascending order for\
    \ the loop.\n\n### 5.6.3 Enumerate in Loops\n\nWhen looping through a sequence,\
    \ you might want to keep track of the index of the current item. You could do\
    \ this with a separate counter variable, but Python's `enumerate()` function makes\
    \ this much easier. `enumerate()` takes an iterable as input and adds a counter\
    \ to an iterable and returns it as an enumerate object.\n\n```python\nfruits =\
    \ ['apple', 'banana', 'cherry']\nfor i, fruit in enumerate(fruits):\n    print(f\"\
    The fruit at index {i} is {fruit}.\")\n```\n\nIn this example, **enumerate(fruits)**\
    \ returns an enumerate object that produces tuples of the form **(index, element)**.\
    \ The **for** loop then unpacks these tuples into **i** and **fruit**.\n\n## List\
    \ Comprehensions\n\nA list comprehension is a compact way of creating a new list\
    \ by performing an operation on each item in an existing list (or other iterable),\
    \ optionally filtering items. List comprehensions are a hallmark of Python and\
    \ something you'll see a lot in Python code.\n\n```python\nnumbers = [1, 2, 3,\
    \ 4, 5]\nsquares = [number**2 for number in numbers]\n```\n\nThis list comprehension\
