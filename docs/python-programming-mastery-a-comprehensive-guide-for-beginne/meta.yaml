    \ loop:\n\n```python\nfor item in sequence:\n    # block of code to be executed\
    \ for each item\n```\n\nLet's consider an example:\n\n```python\nfruits = ['apple',\
    \ 'banana', 'cherry']\nfor fruit in fruits:\n    print(fruit)\n```\n\nIn this\
    \ example, the **for** loop prints each fruit in the list **fruits**. The loop\
    \ iterates over the list, and for each iteration, the variable **fruit** takes\
    \ the value of the current item. This process continues until the list is exhausted.\n\
    \n## The while Loop\n\nThe **while** loop in Python is used to repeatedly execute\
    \ a block of statements as long as a given condition is true. The test of this\
    \ condition occurs before the loop body is executed.\n\n```python\nwhile condition:\n\
    \    # block of code to be executed while the condition is true\n```\n\nFor example:\n\
    \n```python\ncount = 0\nwhile count < 5:\n    print(count)\n    count += 1  #\
    \ This is equivalent to count = count + 1\n```\n\nIn this case, the **while**\
    \ loop prints the numbers 0 through 4. Inside the loop, we increment **count**\
    \ by 1 with each iteration.\n\n## The Range Function\n\nHere's an example that\
    \ demonstrates the use of **range()** in a **for** loop:\n\n```python\nfor i in\
    \ range(5):\n    print(i)\n```\n\nThis loop prints the numbers 0 through 4. **range(5)**\
    \ generates a sequence of numbers from 0 to 4, and the **for** loop iterates over\
    \ this sequence.\n\n## The Break Statement\n\nWhen a **break** statement is encountered\
    \ inside a loop, the loop is immediately terminated, and program control resumes\
    \ at the next statement following the loop.\n\n## The Continue Statement\n\nThe\
    \ **continue** statement in Python is used to skip the current iteration of a\
    \ loop and continue with the next one.\n\nConsider this example:\n\n```python\n\
    for i in range(5):\n    if i == 3:\n        continue\n    print(i)\n```\n\nThis\
    \ loop prints the numbers 0, 1, 2, and 4. When **i** equals 3, the **continue**\
    \ statement is executed, skipping the **print(i)** command in the current iteration\
    \ and continuing with the next iteration of the loop.\n\n## Looping Techniques\
    \ and More\n\nPython provides several other techniques to make your loops more\
    \ efficient and easier to read.\n\n### Looping Through Multiple Sequences\n\n\
    Python's built-in **zip()** function allows you to loop over multiple sequences\
