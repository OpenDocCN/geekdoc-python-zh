    # WHAT ARE PYTHON LIBRARIES AND PACKAGES?


    **Libraries** in Python are collections of modules, where a module is a file containing
    Python definitions and statements. A library can have one or several modules.


    Packages in Python offer a mechanism for organizing the module namespace using
    "dotted module names". Essentially, a package is a directory contain-'
