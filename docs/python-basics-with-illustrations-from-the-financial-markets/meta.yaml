    of variables. We can check the data type of a variable using type() function as
    seen above.


    There can be two types of conversion possible: *implicit* termed as coercion,
    and *explicit* often referred to as casting. When we change the type of a variable
    from one to another, this is called *typecasting*.


    **Implicit Conversion:** This is an automatic type conversion and the Python interpreter
    handles this on the fly for us. We need not to specify any command or function
    for same. Take a look at the following example:'
  - "[PAGE 56]\n\n```\nIn []: 8 / 2\nOut[]: 4.0\n```\n\nThe division operation performed\
    \ between two integers 8 being a dividend and 2 being a divisor. Mathematically,\
    \ we expect the output to be 4 - an integer value, but instead, Python returned\
    \ the output as 4.0 - a float value. That is, Python internally converted an integer\
    \ 4 to float 4.0.\n\n**Explicit Conversion** : This type of conversion is user-defined.\
    \ We need to explicitly change the data type for certain literals to make it compatible\
    \ for data operations. Let us try to concatenate a string and an integer using\
    \ the + operator.\n\n```\nIn []: 'This is the year ' + 2019\nTraceback (most recent\
    \ call last):\n\nFile \"<ipython-input-68>\", line 1, in <module>\n    'This is\
    \ the year ' + 2019\n\nTypeError: must be str, not int\n```\n\nHere we attempted\
    \ to join a string 'This is the year ' and an integer 2019. Doing so, Python threw\
    \ an error TypeError stating incompatible data types. One way to perform the concatenation\
    \ between the two is to convert the data type of 2019 to string explicitly and\
    \ then perform the operation. We use str() to convert an integer to string.\n\n\
    ```\nIn []: 'This is the year ' + str(2019)\nOut[]: 'This is the year 2019'\n\
    ```\n\nSimilarly, we can explicitly change the data type of literals in the following\
    \ manner.\n\n```\n# Integer to float conversion\nIn []: float(4)\nOut[]: 4.0\n\
    \n# String to float conversion\nIn []: float('4.2')\n```"
