    \    - 用 C 或 C++ 等编译语言编写的程序需要使用编译器（带有各种标志和选项）将代码从原始语言（C、C++ 等）转换为计算机可理解的机器可读语言（如二进制代码，即\
    \ 0 和 1）。然后将此编译后的程序输入计算机内存以运行。\n    - 另一方面，Python 不需要编译成机器语言。我们直接从源代码*运行*程序。在内部，Python\
    \ 将源代码转换为称为字节码的中间形式，然后将其翻译为底层机器的本机语言。我们不需要担心正确的链接和加载到内存中。这也使得 Python 具有更强的可移植性，因为我们可以将相同的程序运行在另一个平台上，它也能正常工作！\n\
    \    - 'CPython' 实现是该语言的解释器，它在运行时将 Python 代码翻译为可执行的字节码。\n\n- **多范式**\n    - Python\
    \ 支持多种编程和实现范式，例如面向对象、函数式或过程式编程。\n\n- **可扩展**\n    - 如果我们需要某段代码运行得更快，我们可以用 C 或\
    \ C++ 编写该部分代码，然后通过我们的 Python 程序使用它。相反，我们可以在 C/C++ 程序中嵌入 Python 代码，为其赋予*脚本*能力。\n\
    \n- **丰富的库**\n    - Python 标准库⁴ 非常庞大，提供了广泛的设施。它包含用 C 编写的内置模块，提供对系统功能（如 I/O 操作）的访问，以及用\
    \ Python 编写的模块，为日常编程中出现的许多问题提供标准化解决方案。其中一些模块如下所列：\n        - 文本处理模块\n        -\
    \ 数据类型\n        - 数值和数学模块\n        - 文件和目录模块\n        - 加密模块\n        - 通用操作系统模块\n\
    \        - 网络模块\n        - 互联网协议和支持模块\n        - 多媒体服务\n        - 带 Tk 的图形用户界面\n\
    \        - 调试和性能分析\n        - 软件开发、打包和分发\n    - 除了 Python 标准库，我们还有各种其他第三方库，可以从\
    \ Python 包索引⁵ 访问。\n\n- **垃圾回收**\n    - Python 自行处理内存的分配和释放。换句话说，程序员不必管理内存分配，也不必在构造变量和对象之前预分配和释放内存。此外，Python\
    \ 提供了垃圾收集器接口来处理垃圾回收。\n\n⁴https://docs.python.org/3/library/\n⁵https://pypi.org/\n\
    \n## 1.4 Python 的历史\n\nPython 是 Guido van Rossum 的创意，他在 1980 年代开始了其开发工作。它的名字与任何蛇类无关，实际上是受到英国喜剧《蒙提·派森》的启发！第一个\
    \ Python 实现于 1989 年 12 月在荷兰完成。自那时起，Python 经历了定期的重大转变。以下可视为 Python 发展中的里程碑：\n\n\
    - Python 0.9.0 于 1991 年 2 月发布\n- Python 1.0 于 1994 年 1 月发布\n- Python 2.0 于 2000\
    \ 年 10 月发布\n- Python 2.6 于 2008 年 10 月发布\n- Python 2.7 于 2010 年 7 月发布\n- Python\
    \ 3.0 于 2008 年 12 月发布\n- Python 3.4 于 2014 年 3 月发布\n- Python 3.6 于 2016 年 12 月发布\n\
    - Python 3.7 于 2018 年 6 月发布\n\n对于新手来说，常常令人困惑的是**有两个主要版本 2.x 和 3.x 可用**，自 2008\
    \ 年以来一直在并行开发和使用。这种情况可能会持续一段时间，因为两个版本都非常流行，并在科学和软件开发社区中广泛使用。需要注意的一点是，它们之间的代码并非完全兼容。我们可以在任一版本中开发程序和编写代码，但会存在语法和其他差异。本手册基于\
    \ 3.x 版本，但我们相信大多数代码示例在稍作调整后也适用于 2.x 版本。\n\n> https://docs.python.org/3/library/gc.html"
