  md: '# Chapter 8


    # Iterators & Generators


    In this section we will explore the natural world of iterators, objects that we
    have already encountered in the context of `for` loops without necessarily knowing
    it, followed by its easier implementation via a handy concept of generators. Let’s
    begin.


    # 8.1 Iterators


    Iterators are everywhere in Python. They are elegantly implemented in `for` loop,
    comprehensions, etc. but they are simply hidden in plain sight. An iterator is
    an object that can be iterated upon and which will return data, one element at
    a time. It allows us to traverse through all elements of a collection, regardless
    of its specific implementation.


    Technically, in Python, an iterator is an object which implements the iterator
    protocol, which in turn consists of the methods `__next__()` and `__iter__()`.


    # 8.1.1 Iterables


    An iterable is an object, not necessarily a data structure that can return an
    iterator. Its primary purpose is to return all of its elements. An object is known
    as iterable if we can get an iterator from it. Directly or indirectly it will
    define two methods:'
  merge: -1
