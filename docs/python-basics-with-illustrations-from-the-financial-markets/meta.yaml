    \ Key Takeaways\n\n1. Pandas DataFrame and Pandas Series are some of the most\
    \ important data structures. It is a must to acquire fluency in its handling because\
    \ we will find them in practically all the problems that we handle.\n2. A DataFrame\
    \ is a data structure formed by rows and columns and has an index.\n3. We must\
    \ think of them as if they were data tables (for the Array with a single column)\
    \ with which we can select, filter, sort, add and delete elements, either by rows\
    \ or columns.\n4. Help in ETL processes (Extraction, Transformation and Loading)\n\
    5. We can select, insert, delete and update elements with simple functions.\n\
    6. We can perform computations by rows or columns.\n7. Has the ability to run\
    \ vectorized computations.\n8. We can work with several DataFrames at the same\
    \ time.\n9. Indexing and subsetting are the most important features from Pandas.\n\
    10. Facilitates the statistical exploration of the data.\n11. It offers us a variety\
    \ of options for handling NaN data.\n12. Another additional advantage is the ability\
    \ to read & write multiple data formats (CSV, Excel, HDF5, etc.).\n13. Retrieve\
    \ data from external sources (Yahoo, Google, Quandl, etc.)\n14. Finally, it has\
    \ the ability to work with date and time indexes and offers us a set of functions\
    \ to work with dates.\n\n# Chapter 12\n\n## Data Visualization with Matplotlib\n\
    \nMatplotlib is a popular Python library that can be used to create data visualizations\
    \ quite easily. It is probably the single most used Python package for 2D-graphics\
    \ along with limited support for 3D-graphics. It provides both, a very quick way\
    \ to visualize data from Python and publication-quality figures in many formats.\
    \ Also, It was designed from the beginning to serve two purposes:\n\n1. Allow\
    \ for interactive, cross-platform control of figures and plots\n2. Make it easy\
    \ to produce static vector graphics files without the need for any GUIs.\n\nMuch\
    \ like Python itself, Matplotlib gives the developer complete control over the\
    \ appearance of their plots. It tries to make easy things easy and hard things\
    \ possible. We can generate plots, histograms, power spectra, bar charts, error\
    \ charts, scatter plots, etc. with just a few lines of code. For simple plotting,\
    \ the `pyplot` module within `matplotlib` package provides a MATLAB-like interface\
    \ to the underlying object-oriented plotting library. It implicitly and automatically\
    \ creates figures and axes to achieve the desired plot.\n\nTo get started with\
    \ Matplotlib, we first *import* the package. It is a common practice to import\
    \ `matplotlib.pyplot` using the alias as `plt`. The `pyplot` being the sub-package\
    \ within Matplotlib provides the common charting functionality. Also, if we are\
    \ working in a Jupyter Notebook, the line %matplotlib inline becomes important,\
    \ as it makes sure that the plots are embedded inside the notebook. This is demonstrated\
    \ in the example below:\n\n```\nimport matplotlib.pyplot as plt\n\n%matplotlib\
    \ inline\n```\n\n> NOTE: Matplotlib does not fall under the Python Standard Library\
    \ and hence, like any other third party library, it needs to be installed before\
    \ it can be used. It can be installed using the command pip install matplotlib.\n\
    \n### 12.1 Basic Concepts\n\nMatplotlib allows creating a wide variety of plots\
    \ and graphs. It is a humongous project and can seem daunting at first. However,\
    \ we will break it down into bite-sized components and so learning it should be\
    \ easier. Different sources use ‘plot’ to mean different things. So let us begin\
    \ by defining specific terminology used across the domain.\n\n- Figure is the\
    \ top-level container in the hierarchy. It is the overall window where everything\
    \ is drawn. We can have multiple independent figures, and each figure can have\
    \ multiple Axes. It can be created using the figure method of pyplot module.\n\
    - Axes is where the plotting occurs. The axes are effectively the area that we\
    \ plot data on. Each Axes has an X-Axis and a Y-Axis.\n\nThe below mentioned example\
    \ illustrates the use of the above-mentioned terms:\n\n```\nfig = plt.figure()\n\
    <Figure size 432x288 with 0 Axes>\n```\n\nUpon running the above example, nothing\
    \ happens really. It only creates a figure of size 432 x 288 with 0 Axes. Also,\
    \ Matplotlib will not show anything until told to do so. Python will wait for\
    \ a call to show method to display the plot. This is because we might want to\
    \ add some extra features to the plot before displaying it, such as title and\
    \ label customization. Hence, we need to call plt.show() method to show the figure\
    \ as shown below:\n\n```\nplt.show()\n```\n\nAs there is nothing to plot, there\
    \ will be no output. While we are on the topic, we can control the size of the\
    \ figure through the figsize argument, which expects a tuple of (width, height)\
    \ in inches.\n\n```\nfig = plt.figure(figsize=(8, 4))\n<Figure size 576x288 with\
    \ 0 Axes>\nplt.show()\n```\n\n#### 12.1.1 Axes\n\nAll plotting happens with respect\
    \ to an Axes. An Axes is made up of Axis objects and many other things. An Axes\
    \ object must belong to a Figure. Most commands that we will ever issue will be\
    \ with respect to this Axes object. Typically, we will set up a Figure, and then\
    \ add Axes on to it. We can use fig.add_axes but in most cases, we find that adding\
    \ a subplot fits our need perfectly. A subplot is an axes on a grid system.\n\n\
    - add_subplot method adds an Axes to the figure as part of a subplot arrangement.\n\
    \n```\n# -Example 1-\n# Creating figure\nfig = plt.figure()\n\n# Creating subplot\n\
    # Sub plot with 1 row and 1 column at the index 1\nax = fig.add_subplot(111)\n\
    plt.show()\n```\n\nThe above code adds a single plot to the figure fig with the\
    \ help of add_subplot() method. The output we get is a blank plot with axes ranging\
    \ from 0 to 1 as shown in figure 1.\n\n![](img/32a9d429dd2d2dd2fe70820b62431b3e_283_0.png)\n\
    \nFigure 1: Empty plot added on axes\n\nWe can customize the plot using a few\
    \ more built-in methods. Let us add the title, X-axis label, Y-axis label, and\
    \ set limit range on both axes. This is illustrated in the below code snippet.\n\
