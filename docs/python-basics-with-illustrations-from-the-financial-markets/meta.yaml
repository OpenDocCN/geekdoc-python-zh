- md: '## 12.2.3 Histogram Plots


    A histogram is a graphical representation of the distribution of data. It is a
    kind of bar graph and a great tool to visualize the frequency distribution of
    data that is easily understood by almost any audience. To construct a histogram,
    the first step is to bin the range of data values, divide the entire range into
    a series of intervals and finally count how many values fall into each interval.
    Here, the bins are consecutive and non-overlapping. In other words, histograms
    shows the data in the form of some groups. All the bins/groups go on X-axis, and
    Y-axis shows the frequency of each bin/group.


    The matplotlib library offers a very convenient way to plot histograms. To create
    a histogram, we use the hist method of pyplot sub-module of the matplotlib library
    as shown in the below example:


    ```

    # -Example 23-

    # Data values for creating a histogram

    y = [95, 42, 69, 11, 49, 32, 74, 62, 25, 32]


    # Creating a histogram

    plt.hist(y)

    plt.xlabel(''Bins'')

    plt.ylabel(''Frequency'')

    plt.show()

    ```


    This is the simplest code possible to plot a histogram with minimal arguments.
    We create a range of values and simply provide it to the hist method and let it
    perform the rest of the things (creating bins, segregating each value to corresponding
    bin, plotting, etc.). It produces the plot as shown in figure 23. The hist method
    also take bins as an optional argument. If this argument is specified, bins will
    be created as per the specified value, otherwise, it will create bins on its own.
    To illustrate this, we explicitly specify the number of bins in the above code
    and generate the plot. The modified code and output is shown below:


    ```

    # -Example 24-

    # Data values for creating a histogram

    y = [95, 42, 69, 11, 49, 32, 74, 62, 25, 32]


    # Creating a histogram

    plt.hist(y, bins=20)

    plt.xlabel(''Bins'')

    plt.ylabel(''Frequency'')

    plt.show()

    ```


    The output we got in figure 24 is very straight forward. Number 32 appears twice
    in the list y and so it''s twice as tall as the other bars on the plot. We specify
    the number of bins to be 20 and hence, the hist method tries to divide the whole
    range of values into 20 bins and plots them on the X-axis. Similar to the plot
    method, the hist method also takes any sequential data structure as its input
    and plots histogram of it. Let us try to generate a histogram of an array which
    draws samples from the standard normal distribution.


    ```

    # -Example 25-

    # Creating an array

    array = np.random.normal(0, 1, 10000)


    # Creating a histogram

    plt.hist(array)

    plt.xlabel(''Bins'')

    plt.ylabel(''Frequency'')

    plt.show()

    ```


    The output we got in figure 25 shows that the data distribution indeed resembles
    a normal distribution. Apart from bins argument, other arguments that can be provided
    to hist are color and histtype. There are a number of arguments that can be provided,
    but we will keep our discussion limited to these few arguments only. The color
    of a histogram can be changed using the color argument. The histtype argument
    takes some of the pre-defined values such as bar, barstacked, step and stepfilled.
    The below example illustrates the usage of these arguments and the output is shown
    in figure 26.


    ```

    # -Example 26-

    # Creating an array

    array = np.random.normal(0, 1, 10000)


    # Creating a histogram and plotting it

    plt.hist(array, color=''purple'', histtype=''step'')

    plt.xlabel(''Bins'')

    plt.ylabel(''Frequency'')

    plt.show()

    ```


    In addition to optional arguments discussed so far, one argument that needs attention
    is orientation. This argument takes either of two values: horizontal or vertical.
    The default is vertical. The below given example demonstrate the usage of orientation
    and the output is shown in figure 27.


    ```

    # -Example 27-

    # Creating an array

    array = np.random.normal(0, 1, 10000)


    # Creating a histogram and plotting it

    plt.hist(array, color=''teal'', orientation=''horizontal'')

    plt.xlabel(''Frequency'')

    plt.ylabel(''Bins'')

    plt.show()

    ```


    We now shift our focus on plotting a histogram directly from a pandas dataframe.
    Again, the plot method within pandas provides a wrapper around the hist function
    in matplotlib as was the case with scatter plots. To plot a histogram, we need
    to specify the argument kind with the value hist when a call to plot is made directly
    from the dataframe. We will be working with the same dataframe data that contains
    historical data for AAPL stock.


    ```

    # -Example 28: Technique 1-

    # Creating a histogram using a dataframe method

    data[''Volume''].plot(kind=''hist'')

    plt.show()


    # -Example 28: Technique 2-

    plt.hist(data[''Volume''])

    plt.ylabel(''Frequency'')

    plt.show()

    ```


    In the first method, we directly make a call to plot method on the dataframe data
    sliced with Volume column. Whereas in the second method, we use the hist method
    provided by matplotlib.pyplot module to plot the histogram. Both methods plot
    the same result as shown in figure 28.'
  mdcn: '## 12.2.3 直方图


    直方图是数据分布的图形化表示。它是一种条形图，是可视化数据频率分布的绝佳工具，几乎任何受众都能轻松理解。要构建直方图，第一步是对数据值范围进行分箱，将整个范围划分为一系列区间，最后统计每个区间内的数值个数。这里的箱是连续且不重叠的。换句话说，直方图以某些分组的形式展示数据。所有箱/组位于X轴上，Y轴则显示每个箱/组的频率。


    matplotlib库提供了一种非常便捷的绘制直方图的方法。要创建直方图，我们使用matplotlib库的pyplot子模块的hist方法，如下例所示：


    ```

    # -示例 23-

    # 创建直方图的数据值

    y = [95, 42, 69, 11, 49, 32, 74, 62, 25, 32]


    # 创建直方图

    plt.hist(y)

    plt.xlabel(''Bins'')

    plt.ylabel(''Frequency'')

    plt.show()

    ```


    这是使用最少参数绘制直方图的最简单代码。我们创建一个值范围，简单地将其提供给hist方法，让它执行其余操作（创建箱、将每个值分配到相应的箱、绘图等）。它生成的图如图23所示。hist方法还接受一个可选参数bins。如果指定了此参数，则将根据指定的值创建箱，否则它将自行创建箱。为了说明这一点，我们在上面的代码中明确指定了箱的数量并生成图表。修改后的代码和输出如下所示：


    ```

    # -示例 24-

    # 创建直方图的数据值

    y = [95, 42, 69, 11, 49, 32, 74, 62, 25, 32]


    # 创建直方图

    plt.hist(y, bins=20)

    plt.xlabel(''Bins'')

    plt.ylabel(''Frequency'')

    plt.show()

    ```


    我们在图24中得到的输出非常直观。数字32在列表y中出现了两次，因此它在图中的高度是其他条形的两倍。我们指定箱的数量为20，因此hist方法尝试将整个值范围划分为20个箱，并将它们绘制在X轴上。与plot方法类似，hist方法也接受任何顺序数据结构作为输入并绘制其直方图。让我们尝试生成一个从标准正态分布中抽取样本的数组的直方图。


    ```

    # -示例 25-

    # 创建一个数组

    array = np.random.normal(0, 1, 10000)


    # 创建直方图

    plt.hist(array)

    plt.xlabel(''Bins'')

    plt.ylabel(''Frequency'')

    plt.show()

    ```


    我们在图25中得到的输出表明，数据分布确实类似于正态分布。除了bins参数外，可以提供给hist的其他参数有color和histtype。有许多参数可以提供，但我们的讨论将仅限于这几个参数。直方图的颜色可以使用color参数更改。histtype参数接受一些预定义的值，例如bar、barstacked、step和stepfilled。下面的示例说明了这些参数的用法，输出如图26所示。


    ```

    # -示例 26-

    # 创建一个数组

    array = np.random.normal(0, 1, 10000)


    # 创建直方图并绘制

    plt.hist(array, color=''purple'', histtype=''step'')

    plt.xlabel(''Bins'')

    plt.ylabel(''Frequency'')

    plt.show()

    ```


    除了到目前为止讨论的可选参数外，还有一个需要注意的参数是orientation。此参数接受两个值之一：horizontal或vertical。默认值为vertical。下面的示例演示了orientation的用法，输出如图27所示。


    ```

    # -示例 27-

    # 创建一个数组

    array = np.random.normal(0, 1, 10000)


    # 创建直方图并绘制

    plt.hist(array, color=''teal'', orientation=''horizontal'')

    plt.xlabel(''Frequency'')

    plt.ylabel(''Bins'')

    plt.show()

    ```


    我们现在将重点转向直接从pandas数据框绘制直方图。同样，pandas中的plot方法提供了对matplotlib中hist函数的封装，这与散点图的情况类似。要绘制直方图，当直接从数据框调用plot时，我们需要指定参数kind的值为hist。我们将使用包含AAPL股票历史数据的同一个数据框data。


    ```

    # -示例 28：方法 1-

    # 使用数据框方法创建直方图

    data[''Volume''].plot(kind=''hist'')

    plt.show()


    # -示例 28：方法 2-

    plt.hist(data[''Volume''])

    plt.ylabel(''Frequency'')

    plt.show()

    ```


    在第一种方法中，我们直接在切片了Volume列的数据框data上调用plot方法。而在第二种方法中，我们使用matplotlib.pyplot模块提供的hist方法来绘制直方图。两种方法绘制的结果相同，如图28所示。'
