    \nIt can have any number of items and they may be of different data types and\
    \ can be created in the following manner:\n\n```python\n# Empty list\nIn []: list_a\
    \ = []\n\nIn []: list_a\nOut[]: []\n\n# List with integers\nIn []: list_b = [1,\
    \ 2, 3]\n\nIn []: list_b\nOut[]: [1, 2, 3]\n\n# List with mixed data types\nIn\
    \ []: list_c = [1, 2.5, 'hello']\n\nIn []: list_c\nOut[]: [1, 2.5, 'hello']\n\
    ```\n\nA list can also have another list as an item. This is called *nested list*.\n\
    \n```python\nIn []: a_list = [1, 2, 3, ['hello', 'stock'], 4.5]\n```\n\n### 5.4.1\
    \ Accessing List Items\n\nLike with any other data structure, slice operator is\
    \ used to access list items or a range of list items. It can be used in the following\
    \ manner.\n\n```python\nIn []: stock_list = ['HP', 'GOOG', 'TSLA', 'MSFT', 'AAPL',\n\
    \                    'AMZN', 'NFLX']\n\n# Accessing an element at index 2\nIn\
    \ []: stock_list[2]\nOut[]: 'TSLA'\n\n# Accessing multiple elements using slicing\n\
    In []: stock_list[1:4]\nOut[]: ['GOOG', 'TSLA', 'MSFT']\n\n# Accessing last element\
    \ using negative index\nIn []: stock_list[-1]\nOut[]: 'NFLX'\n```\n\n### 5.4.2\
    \ Updating Lists\n\nUnlike tuples, lists are mutable. That is, we can change the\
    \ content even after it is created. Again, the slicing operation helps us here.\n\
    \n```python\nIn []: stock_list\nOut[]: ['HP', 'GOOG', 'TSLA', 'MSFT', 'AAPL',\
    \ 'AMZN', 'NFLX']\n\n# Updating the first element\nIn []: stock_list[0] = 'NVDA'\n\
    \n# Updating the last three elements\nIn []: stock_list[-3:] = ['AMD', 'GE', 'BAC']\n\
    \nIn []: stock_list\nOut[]: ['NVDA', 'GOOG', 'TSLA', 'AMD', 'GE', 'BAC']\n```\n\
    \nIt is also possible to add new elements to an existing list. Essentially a list\
    \ is an object in Python. Hence, the list class provides various methods to be\
    \ used upon the list object. There are two methods `append()` and `extend()` which\
    \ are used to update an existing list.\n\n- `append(element)` method adds a single\
    \ element to the end of the list. It does not return the new list, just modifies\
    \ the original list.\n- `extend(list2)` method adds the elements in `list2` to\
    \ the end of the list.\n\n```python\nIn []: stock_list\nOut[]: ['HP', 'GOOG',\
    \ 'MSFT']\n\nIn []: stock_list.append('AMZN')\n\nIn []: stock_list\nOut[]: ['HP',\
    \ 'GOOG', 'MSFT', 'AMZN']\n```\n\nIn the above example, we add new element using\
    \ the `append()` method. Let's add multiple elements to the list. In Python, whenever\
    \ we are to add multiple literals to any object, we enclose it within list i.e.\
    \ using `[]` the square brackets. The output that we expect is the appended list\
    \ with all the new elements.\n\n```python\nIn []: stock_list.append(['TSLA', 'GE',\
    \ 'NFLX'])\n\nIn []: stock_list\nOut[]: ['HP', 'GOOG', 'MSFT', 'AMZN', ['TSLA',\
    \ 'GE', 'NFLX']]\n```\n\nThe output we got is not as per our expectation. Python\
    \ amended the new element as a single element to the `stock_list` instead of appending\
    \ three different elements. Python provides the `extend()` method to achieve this.\n\
    \n```python\nIn []: stock_list\nOut[]: ['HP', 'GOOG', 'MSFT', 'AMZN']\n\nIn []:\
    \ stock_list.extend(['TSLA', 'GE', 'NFLX'])\n\nIn []: stock_list\nOut[]: ['HP',\
    \ 'GOOG', 'MSFT', 'AMZN', 'TSLA', 'GE', 'NFLX']\n```\n\nTo simplify, the `append()`\
    \ method is used to add a single element to existing list and it takes a single\
    \ element as an argument, whereas the `extend()` method is used to add multiple\
    \ elements to existing list and it takes a list as an argument.\n\n### 5.4.3 List\
    \ Manipulation\n\nLists are one of the most versatile and used data structures\
    \ in Python. In addition to the above discussed methods, we also have other useful\
