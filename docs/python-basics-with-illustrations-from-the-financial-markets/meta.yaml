  md: '![](img/32a9d429dd2d2dd2fe70820b62431b3e_290_0.png)


    Figure 6: Line plot with $x$ and $y$ as data


    Here, we define a list called $y$ that contains values to be plotted on Y-axis.
    The output for the same is shown in *figure 7*.


    The plots created uses *the default* line style and color. The optional parameter
    *fmt* in the plot method is a convenient way for defining basic formatting like
    color, marker, and line-style. It is a shortcut string notation consisting of
    color, marker, and line:


    ```

    fmt = ''[color][marker][line]''

    ```


    Each of them is optional. If not provided, the value from the style cycle$^2$
    is used. We use this notation in the below example to change the line color:


    ```

    # -Example 8-

    # Plot line with green color

    plt.plot(y, ''g'')


    # Plot axes labels and show the plot

