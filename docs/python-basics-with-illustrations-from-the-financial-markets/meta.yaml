    # Chapter 10


    # NumPy Module


    NumPy, an acronym for *Numerical Python*, is a package to perform scientific computing
    in Python efficiently. It includes random number generation capabilities, functions
    for basic linear algebra, Fourier transforms as well as a tool for integrating
    Fortran and C/C++ code along with a bunch of other functionalities.


    NumPy is an open-source project and a successor to two earlier scientific Python
    libraries: *Numeric* and *Numarray*.


    It can be used as an efficient multi-dimensional container of generic data. This
    allows NumPy to integrate with a wide variety of databases seamlessly. It also
    features a collection of routines for processing single and multidimensional vectors
    known as arrays in programming parlance.


    NumPy is not a part of the Python Standard Library and hence, as with any other
    such library or module, it needs to be installed on a workstation before it can
    be used. Based on the Python distribution one uses, it can be installed via a
    command prompt, conda prompt, or terminal using the following command. *One point
    to note is that if we use the Anaconda distribution to install Python, most of
    the libraries (like NumPy, pandas, scikit-learn, matplotlib, etc. ) used in the
    scientific Python ecosystem come pre-installed.*


    ```

    pip install numpy

    ```


    **NOTE:** If we use the Python or iPython console to install the'
