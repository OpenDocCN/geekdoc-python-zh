  md: '# 12.2.1 Line Plot


    A line plot can be plotted using the `plot` method. It plots Y versus X as lines
    and/or markers. Below we discuss a few scenarios for plotting line. To plot a
    line, we provide coordinates to be plotted along X and Y axes separately as shown
    in the below code snippet.


    ```

    # -Example 6-

    # Defining coordinates to be plotted on X and Y axes

    # respectively

    x = [1.3, 2.9, 3.1, 4.7, 5.6, 6.5, 7.4, 8.8, 9.2, 10]

    y = [95, 42, 69, 11, 49, 32, 74, 62, 25, 32]


    # Plot lists ''x'' and ''y''

    plt.plot(x, y)


    # Plot axes labels and show the plot

    plt.xlabel(''X-axis Label'')

    plt.ylabel(''Y-axis Label'')

    plt.show()

    ```


    The above code plots values in the list `x` along the X-axis and values in the
    list `y` along the Y-axis as shown in *figure 6*.


    The call to `plot` takes minimal arguments possible, i.e. values for Y-axis only.
    In such a case, Matplotlib will implicitly consider the index of elements in list
    `y` as the input to the X-axis as demonstrated in the below example:


    ```

    # -Example 7-

    # Defining ''y'' coordinates

    y = [95, 42, 69, 11, 49, 32, 74, 62, 25, 32]


    # Plot list ''y''

    plt.plot(y)


    # Plot axes labels and show the plot

    plt.xlabel(''Index Values'')

    plt.ylabel(''Elements in List Y'')

    plt.show()

    ```'
