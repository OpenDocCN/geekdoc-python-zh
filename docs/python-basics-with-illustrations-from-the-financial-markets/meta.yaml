    # Chapter 11


    # Pandas Module


    Pandas is a Python library to deal with sequential and tabular data. It includes
    many tools to manage, analyze and manipulate data in a convenient and efficient
    manner. We can think of its data structures as akin to database tables or spreadsheets.


    Pandas is built on top of the Numpy library and has two primary data structures
    viz. Series (1-dimensional) and DataFrame (2- dimensional). It can handle both
    homogeneous and heterogeneous data, and some of its many capabilities are:


    +   - ETL tools (Extraction, Transformation and Load tools)

    - Dealing with missing data (NaN)

    - Dealing with data files (csv, xls, db, hdf5, etc.)

    - Time-series manipulation tools


    In the Python ecosystem, Pandas is the best choice to retrieve, manipulate, analyze
    and transform financial data.


    # 11.1 Pandas Installation


    The official documentation<sup>1</sup> has a detailed explanation that spans over
    several pages on installing Pandas. We summarize it below.


    <sup>1</sup>https://pandas.pydata.org/pandas-docs/stable/install.html'
  - '[PAGE 229]


    # 11.1.1 Installing with pip


    The simplest way to install Pandas is from PyPI. In a terminal window, run the
    following command.


    ```

    pip install pandas

    ```


    In your code, you can use the escape character ‘!’ to install pandas directly
    from your Python console.


    ```

    !pip install pandas

    ```


    Pip is a useful tool to manage Python’s packages and it is worth investing some
    time in knowing it better.


    ```

    pip help

    ```


    # 11.1.2 Installing with Conda environments


    For advanced users, who like to work with Python environments for each project,
    you can create a new environment and install pandas as shown below.


    ```

    conda create -n EPAT python

    source activate EPAT

    conda install pandas

    ```


    # 11.1.3 Testing Pandas installation


    To check the installation, Pandas comes with a test suite to test almost all of
    the codebase and verify that everything is working.


    ```

    import pandas as pd

    pd.test()

    ```


    # 11.2 What problem does Pandas solve?


    Pandas works with homogeneous data series (1-Dimension) and heterogeneous tabular
    data series (2-Dimensions). It includes a multitude of tools to work with these
    data types, such as:'
  - '[PAGE 230]


    +   - Indexes and labels.

    - Searching of elements.

    - Insertion, deletion and modification of elements.

    - Apply set techniques, such as grouping, joining, selecting, etc.

    - Data processing and cleaning.

    - Work with time series.

    - Make statistical calculations

    - Draw graphics

    - Connectors for multiple data file formats, such as, csv, xlsx, hdf5, etc.


    # 11.3 Pandas Series


    The first data structure in Pandas that we are going to see is the Series. They
    are homogeneous one-dimensional objects, that is, all data are of the same type
    and are implicitly labeled with an index.


    For example, we can have a Series of integers, real numbers, characters, strings,
    dictionaries, etc. We can conveniently manipulate these series performing operations
    like adding, deleting, ordering, joining, filtering, vectorized operations, statistical
    analysis, plotting, etc.


    Let''s see some examples of how to create and manipulate a Pandas Series:


    +   - We will start by creating an empty Pandas Series:


    ```

    import pandas as pd

    s = pd.Series()

    print(s)


    Out[]: Series([], dtype: float64)

    ```


    +   - Let''s create a Pandas Series of integers and print it:


    ```

    import pandas as pd

    s = pd.Series([1, 2, 3, 4, 5, 6, 7])

    print(s)


    Out[]: 0    1

    ```'
