    ```


    We cannot access items in a set by referring to an index (slicing operation),
    since sets are unordered the item has no index. But we can loop through all items
    using the for loop which will be discussed in the upcoming section. Once a set
    set is created, we cannot change its items, but we can add new items using the
    add() method.'
