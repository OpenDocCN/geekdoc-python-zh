    # 1.4 History of Python


    Python is the brainchild of Guido van Rossum who started its developmental efforts
    in the 1980s. Its name has nothing to do with anything serpentine, it''s in fact
    inspired by the British comedy Monty Python! The first Python implementation was
    in December 1989 in the Netherlands. Since then, Python has gone through major
    turnarounds periodically. The following can be considered milestones in the development
    of Python:


    +   - Python 0.9.0 released in February 1991

    - Python 1.0 released in January 1994

    - Python 2.0 released in October 2000

    - Python 2.6 released in October 2008

    - Python 2.7 released in July 2010

    - Python 3.0 released in December 2008

    - Python 3.4 released in March 2014

    - Python 3.6 released in December 2016

    - Python 3.7 released in June 2018


    Often times it is quite confusing for newcomers that there are **two major versions
    2.x and 3.x available**, still being developed and in parallel use since 2008.
    This will likely persist for a while since both versions are quite popular and
    used extensively in the scientific and software development community. One point
    to note is that they are not entirely code compatible between the versions. We
    can develop programs and write code in either version but there will be syntactical
    and other differences. This handbook is based on the 3.x version, but we believe
    most of the code examples should work with version 2.x as well with some minor
    tweaks.


    > https://docs.python.org/3/library/gc.html'
- md: "## 1.5 Python 3 versus Python 2\n\nThe first version of the Python 3.x was\
    \ released at the end of 2008. It made changes that made some of the old Python\
    \ 2.x code incompatible. In this section, we will discuss the difference between\
    \ the two versions. However, before moving further one might wonder why Python\
    \ 3 and not Python 2. The most compelling reason for porting to Python 3 is, Python\
    \ 2.x will not be developed after 2020. So it’s no longer a good idea to start\
    \ new projects in Python 2.x. There won’t ever be a Python 2.8. Also, Python 2.7\
    \ will only get security updates from the Python 3 development branch. That being\
    \ said, most of the code we write will work on either version with some small\
    \ caveats.\n\nA non-exhaustive list of features only available in 3.x releases\
    \ are shown below.\n\n- strings are Unicode by default\n- clean Unicode/bytes\
    \ separation\n- exception chaining\n- function annotations\n- the syntax for keyword-only\
    \ arguments\n- extended tuple unpacking\n- non-local variable declarations\n\n\
    We now discuss some of the significant changes between the two versions.\n\n###\
    \ Unicode and Strings\n\n- There are two types of strings which can be broadly\
    \ classified as *byte sequences* and *Unicode strings*.\n- Byte sequences have\
    \ to be literal characters from the ASCII alphabet. Unicode strings can hold onto\
    \ pretty much any character we put in there. In Unicode, we can include various\
    \ languages and, with the right encoding, emoji as well.\n- In Python 2, we have\
    \ to mark every single Unicode string with a u at the beginning, like u'Hello\
    \ Python!'. As we use Unicode string every now and then, it becomes cumbersome\
    \ to type a u for every Unicode string. If we forget to prefix the u, we would\
    \ have a byte sequence instead.\n- With the introduction to Python 3, we need\
    \ not write a u every time. All strings are now Unicode by default and we have\
    \ to mark byte sequences with a b. As Unicode is a much more common scenario,\
    \ Python 3 has reduced development time for everyone this way.\n\n## Division\
    \ with Integers\n\n- One of the core values of Python is to never do anything\
    \ implicitly. For example, never turn a number into string unless a programmer\
    \ codes for it. Unfortunately, Python 2 took this a bit too far. Consider the\
    \ following operation\n\n```\n5 / 2\n```\n\n- The answer we expect here is 2.5,\
    \ but instead Python 2 will return only 2. Following the core value mentioned\
    \ above, Python will return the output of the same type as the input type. Here,\
    \ the input is integer and Python returned the output as the integer.\n- Again,\
    \ this has been fixed in Python 3. It will now output 2.5 as the output to the\
    \ above problem. In fact, it gives a float output to every division operation.\n\
    \n## Print Function\n\n- The most significant change brought in Python 3 is with\
    \ regard to the print keyword.\n- In Python 2, if we are to output any text, we\
    \ use print followed by output text, which would internally work as a function\
    \ to render output.\n- In Python 3, print has parentheses and hence, if we are\
    \ to output any text, we use print() with the output text inside parentheses.\n\
    \n## Input Function\n\n- There has been an important change to the input() function.\n\
    - In Python 2, we have raw_input() and input() functions for capturing user input\
    \ from a terminal and standard input devices. raw_input() would capture input\
    \ and treat everything as a string. Whereas, input() function helps a user in\
    \ a way that if an integer is inputted such as 123, it would be treated as an\
    \ integer without being converted to a string. If a string is inputted for input(),\
    \ Python 2 will throw an error.\n- In Python 3, `raw_input()` is gone and `input()`\
    \ no longer evaluates the data it receives. We always get back a string whatever\
    \ the input may be.\n\n### Error Handling\n\n- There is a small change in the\
    \ way each version handles errors.\n- In Python 3, we need to use as keyword in\
    \ except clause while checking error, whereas as keyword is not required in Python\
    \ 2. Consider the following example\n\n```\n# Python 2\ntry:\n    trying_to_check_error\n\
    except NameError, err: # 'as' keyword is NOT needed\n    print (err, 'Error Occurred!')\n\
    \n# Python 3\ntry:\n    trying_to_check_error\nexcept NameError as err: # 'as'\
    \ keyword is needed\n    print (err, 'Error Occurred!')\n```\n\n### `__future__`\
    \ module\n\n- `__future__` module is introduced in Python 3 to allow backward\
    \ compatibility, i.e. to use the features of Python 3 in code developed in Python\
    \ 2.\n- For example, if we are to use the division feature with float output or\
    \ print() in Python 2, we can do so by using this module.\n\n```\n# Python 2 Code\n\
    from __future__ import division\nfrom __future__ import print_function\n\nprint\
    \ 5/2 # Output will be 2.5\n\nprint('Hello Python using Future module!')\n```\n\
    \nAlthough we have discussed most of the key differences between two versions,\
    \ there are many other changes being introduced or changed in Python 3 such as\
    \ `next()` for generators and iterators, how `xrange()` became `range()`, etc.\n\
    \n## 1.6 Key Takeaways\n\n1. Python is a high level and cross-platform language\
    \ developed by Guido van Rossum in 1991.\n2. It is used in many fields ranging\
    \ from simple web development to scientific applications.\n3. It is characterized\
    \ by features such as ease of learning and extensibility to other languages.\n\
    4. In addition to built-in or standard libraries known as Python Standard Libraries,\
    \ Python also offers support for third-party libraries.\n5. It supports multiple\
    \ programming styles like Object Oriented, Procedural and Functional.\n6. There\
    \ are two major versions of Python: 2.x and 3.x. The code developed in either\
    \ version are to some extent compatible with each other.\n7. The latest version\
    \ in the Python 2.x franchise is Python 2.7. There won't be any new update in\
    \ Python 2.x after 2020.\n\n## Chapter 2\n\n## Getting Started with Python\n\n\
    As we have seen in the previous section, Python offers different versions, comes\
    \ in a variety of distributions and is suited for a myriad combinations of platform\
    \ and devices. Thanks to its versatility, we can use Python to code nearly any\
    \ task that we can think of logically. One of the most important tasks that a\
    \ computer performs is mathematical computation. Python provides a direct interface\
    \ to this fundamental functionality of modern computers. In fact an introduction\
    \ of Python could be started by showing how it can be used as a tool for simple\
    \ mathematical calculations.\n\n## 2.1 Python as a Calculator\n\nThe easiest way\
    \ to perform mathematical calculations using Python is to use the *Console*, which\
    \ can be used as a fancy calculator. To begin with the simplest mathematical operations,\
    \ such as addition, subtraction, multiplication and division, we can start using\
    \ the Python *Console* using the following expressions.\n\n```\n# Addition\nIn\
    \ []: 5 + 3\nOut[]: 8\n\n# Subtraction\nIn []: 5 - 3\nOut[]: 2\n\n# Multiplication\n\
    In []: 5 * 3\nOut[]: 15\n\n# Division\nIn []: 5 / 3\nOut[]: 1.6666666666666667\n\
    \n# Modulo\nIn []: 5 % 2\nOut[]: 1\n```\n\nNOTE: The content after the # symbols\
    \ are comments and can be ignored when typing the examples. We will examine comments\
    \ in more detail in the later sections. Here, In refers to an input provided to\
    \ the Python interpreter and Out represents the output returned by the interpreter.\
    \ Here we use the IPython console to perform the above mathematical operations.\
    \ They can also be performed in the Python IDLE (Integrated Development and Learning\
    \ Environment) (aka The Shell), the Python console, or Jupyter notebook in a similar\
    \ fashion. Basically, we have a host of interfaces to choose from and programmers\
    \ choose what they find most comfortable. We will stick to the Python Console\
    \ interface to write and run our Python code in this handbook. To be clear, each\
    \ of the above-mentioned interfaces connects us to the Python interpreter (which\
    \ does the computational heavy lifting behind the scenes).\n\nLet us dissect the\
    \ above examples. A simple Python expression is similar to a mathematical expression.\
    \ It consists of some numbers, connected by a mathematical *operator*. In programming\
    \ terminology, numbers (this includes integers as well as numbers with fractional\
    \ parts ex. 5, 3.89) are called *numeric literals*. An operator (e.g. +, -, /)\
    \ indicates mathematical operation between its *operands*, and hence the *value*\
    \ of the expression. The process of deriving the value of an expression is called\
    \ the *evaluation* of the expression. When a mathematical expression is entered,\
    \ the Python interpreter automatically evaluates and displays its value in the\
    \ next line."
  mdcn: "## 1.5 Python 3 与 Python 2\n\nPython 3.x 的首个版本于 2008 年底发布。它进行了一些更改，导致部分旧的\
    \ Python 2.x 代码不再兼容。本节将讨论这两个版本之间的差异。不过，在进一步讨论之前，人们可能会想：为什么是 Python 3 而不是 Python\
    \ 2？迁移到 Python 3 最主要的原因是，Python 2.x 在 2020 年之后将不再开发。因此，使用 Python 2.x 启动新项目已不再是一个好主意。Python\
    \ 2.8 永远不会出现。此外，Python 2.7 也将仅从 Python 3 开发分支获得安全更新。话虽如此，我们编写的大部分代码在两个版本上都能运行，只是有一些小的注意事项。\n\
    \n以下列出了仅在 3.x 版本中可用的部分特性（并非全部）：\n\n-   字符串默认为 Unicode\n-   清晰的 Unicode/字节分离\n\
    -   异常链\n-   函数注解\n-   仅限关键字参数的语法\n-   扩展的元组解包\n-   非局部变量声明\n\n我们现在来讨论两个版本之间的一些重大变化。\n\
    \n### Unicode 与字符串\n\n-   字符串有两种类型，可以大致分为 *字节序列* 和 *Unicode 字符串*。\n-   字节序列必须是\
    \ ASCII 字母表中的字面字符。Unicode 字符串可以容纳我们放入的几乎任何字符。在 Unicode 中，我们可以包含各种语言，并且通过正确的编码，还可以包含表情符号。\n\
    -   在 Python 2 中，我们必须在每个 Unicode 字符串的开头标记一个 `u`，例如 `u'Hello Python!'`。由于我们时不时地使用\
    \ Unicode 字符串，为每个 Unicode 字符串输入 `u` 变得非常繁琐。如果我们忘记添加 `u` 前缀，得到的将是一个字节序列。\n-   随着\
    \ Python 3 的引入，我们不再需要每次都写 `u`。所有字符串现在默认都是 Unicode，我们必须用 `b` 来标记字节序列。由于 Unicode\
    \ 是更常见的场景，Python 3 通过这种方式减少了每个人的开发时间。\n\n## 整数除法\n\n-   Python 的核心价值观之一是绝不进行任何隐式操作。例如，除非程序员明确编码，否则绝不将数字转换为字符串。不幸的是，Python\
    \ 2 在这一点上有些过头了。考虑以下操作：\n\n```\n5 / 2\n```\n\n-   我们期望的答案是 2.5，但 Python 2 只会返回\
    \ 2。遵循上述核心价值观，Python 将返回与输入类型相同的输出类型。这里，输入是整数，Python 返回的输出也是整数。\n-   同样，这在 Python\
    \ 3 中得到了修复。现在它将输出 2.5 作为上述问题的结果。实际上，它对每个除法操作都给出浮点数输出。\n\n## Print 函数\n\n-   Python\
    \ 3 带来的最显著变化是关于 `print` 关键字。\n-   在 Python 2 中，如果要输出任何文本，我们使用 `print` 后跟输出文本，这在内部会作为一个函数来渲染输出。\n\
    -   在 Python 3 中，`print` 带有括号，因此，如果要输出任何文本，我们使用 `print()` 并将输出文本放在括号内。\n\n## Input\
    \ 函数\n\n-   `input()` 函数有一个重要变化。\n-   在 Python 2 中，我们有 `raw_input()` 和 `input()`\
    \ 函数，用于从终端和标准输入设备捕获用户输入。`raw_input()` 会捕获输入并将所有内容视为字符串。而 `input()` 函数以一种方式帮助用户：如果输入的是整数（如\
    \ 123），它将被视为整数，而不会转换为字符串。如果为 `input()` 输入的是字符串，Python 2 会抛出错误。\n-   在 Python 3\
    \ 中，`raw_input()` 已被移除，`input()` 不再对其接收的数据进行求值。无论输入是什么，我们总是得到一个字符串。\n\n### 错误处理\n\
    \n-   每个版本处理错误的方式有一个小变化。\n-   在 Python 3 中，检查错误时需要在 `except` 子句中使用 `as` 关键字，而在\
