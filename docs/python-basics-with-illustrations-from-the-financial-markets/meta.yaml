    \ the `def` keyword, followed by an *identifier* name along with the parentheses,\
    \ and by the final colon that ends the line. The block of statements which forms\
    \ the *body* of the function follows the *function definition*. Here's a simple\
    \ example.\n\n```python\ndef greet():\n    \"\"\"Block of statement.\n    or Body\
    \ of function.\n    \"\"\"\n    print(' Hello from inside the function!')\n```\n\
    \nThe above defined greet function can be called using its name as shown here.\n\
    \n```python\n# Calling the function\ngreet()\n```\n\nAnd the output will be\n\n\
    ```\nHello from inside the function.\n```\n\n### 9.2.1 Functions with a single\
    \ argument\n\nA function can be called as many times as we want, and Python will\
