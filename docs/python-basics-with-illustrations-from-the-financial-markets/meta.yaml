    \       b    2\n       c    3\n       d    4\n       e    5\n       dtype: int64\n\
    ```\n\nIn this case, the Pandas Series is created with the dictionary keys as\
    \ index unless we specify any other index.\n\n### 11.3.1 Simple operations with\
    \ Pandas Series\n\nWhen we have a Pandas Series, we can perform several simple\
