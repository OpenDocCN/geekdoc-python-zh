    \n```\nIn []: x = y = z = 200 # Chaining assignment operation\nIn []: print(x,\
    \ y, z) # Printing all variables\nOut[]: 200 200 200 # Output\n```\n\nThe chained\
    \ assignment shown in the above example assigns the value 200 to variables x,\
    \ y, and z simultaneously.\n\n### 3.1.2 Variable Naming Conventions\n\nWe use\
    \ variables everywhere in Python. A variable can have a short name or more descriptive\
    \ name. The following list of rules should be followed for naming a variable.\n\
    \n- A variable name must start with a letter or the underscore character.\n\n\
