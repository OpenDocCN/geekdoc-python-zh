  md: 'This time it worked, and calculations were performed element-wise. The first
    observation in pcr array was calculated by dividing the first element in n_put_vol
    by the first element in n_call_vol array. The second element in pcr was computed
    using the second element in the respective arrays and so on.


    First, when we tried to compute PCR with regular lists, we got an error, because
    Python cannot do calculations with lists like we want it to. Then we converted
    these regular lists to NumPy arrays and the same operation worked without any
    problem. NumPy work with arrays as if they are scalars. But we need to pay attention
    here. NumPy can do this easily because it assumes that array can only contain
    values of a single type. It''s either an array of integers, floats or booleans
    and so on. If we try to create an array of different types like the one mentioned
    below, the resulting NumPy array will contain a single type only. String in the
    below case:


    ```

    In []: np.array([1, ''Python'', True])

    Out[]: array([''1'', ''Python'', ''True''], dtype=''<U11'')

    ```


    > NOTE: NumPy arrays are made to be created as homogeneous arrays, considering
    the mathematical operations that can be performed on them. It would not be possible
    with heterogeneous data sets.


    In the example given above, an integer and a boolean were both converted to strings.
    NumPy array is a new type of data structure type like the Python list type that
    we have seen before. This also means that it comes with its own methods, which
    will behave differently from other types. Let us implement the + operation on
    the Python list and NumPy arrays and see how they differ.


    ```

    # Creating lists

    In []: list_1 = [1, 2, 3]


    In []: list_2 = [5, 6, 4]


    # Adding two lists

    In []: list_1 + list_2

    Out[]: [1, 2, 3, 5, 6, 4]

    ```'
