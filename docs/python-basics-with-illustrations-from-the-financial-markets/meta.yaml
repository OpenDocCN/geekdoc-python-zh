    \ Python 控制台界面来编写和运行我们的 Python 代码。需要明确的是，上述每个接口都将我们连接到 Python 解释器（它在幕后进行繁重的计算工作）。\n\
    \n让我们剖析上面的例子。一个简单的 Python 表达式类似于一个数学表达式。它由一些数字组成，通过数学 *运算符* 连接。在编程术语中，数字（这包括整数以及带有小数部分的数字，例如\
