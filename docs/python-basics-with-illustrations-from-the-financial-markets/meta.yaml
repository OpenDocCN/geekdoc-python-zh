    \nOften times it is required that a code should execute only if a condition holds\
    \ true, or depending on several mutually exclusive conditions. Python allows us\
    \ to implement such a scenario using an `if` statement.\n\n### 7.1.1 The `if`\
    \ statement\n\nThe `if` statement is used when we want a code to be executed under\
    \ certain conditions only. It can be either a single condition or multiple conditions.\
    \ The code within the `if` block will be executed if and only if the logical conditions\
    \ are held true. We use a comparison operator to check the truthfulness of the\
    \ condition. The `if` statement evaluates the output of any logical condition\
    \ to be either `True` or `False`, and the codes within the `if` block gets executed\
    \ if the condition is evaluated true.\n\nLet us consider a scenario where we want\
