    \ will be (5 / 2) resulting into 2.5 followed by (2 + 5) evaluating to 7 and finally\
    \ 2.5 multiplied with 7 with the multiplication * operator providing the output\
    \ as 17.5.\n\n## 6.3 Key Takeaways\n\n1. Keywords are reserved words in Python.\
    \ They can be used only in certain predefined ways when we code. They are always\
