    type which is mutable, iterable and contains no duplicate values. A set in Python
    represents the mathematical notion of a set.


    In Python sets are written using the curly brackets in the following way:


    ```

    In []: universe ={''GOOG'', ''AAPL'', ''NFLX'', ''GE''}


    In []: universe

