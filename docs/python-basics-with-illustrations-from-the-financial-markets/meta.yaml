    # Chapter 7


    # Control Flow Statements


    The code we write gets executed in the order they are written. In other words,
    a program''s *control flow* is the order in which the program''s code executes.
    Using conditional statements such as `if` statements, and loops, we can define
    or alter the execution order of the code. This section covers a conditional `if`
    statement and `for` and `while` loops; functions are covered in the upcoming section.
    Raising and handling exceptions also affects the control flow which will be discussed
    in subsequent sections.


    # 7.1 Conditional Statements


    Often times it is required that a code should execute only if a condition holds
    true, or depending on several mutually exclusive conditions. Python allows us
    to implement such a scenario using an `if` statement.


    # 7.1.1 The `if` statement


    The `if` statement is used when we want a code to be executed under certain conditions
    only. It can be either a single condition or multiple conditions. The code within
    the `if` block will be executed if and only if the logical conditions are held
    true. We use a comparison operator to check the truthfulness of the condition.
    The `if` statement evaluates the output of any logical condition to be either
    `True` or `False`, and the codes within the `if` block gets executed if the condition
    is evaluated true.'
