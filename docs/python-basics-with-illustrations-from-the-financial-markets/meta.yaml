    \  columns=['A', 'B', 'C', 'D'])\n      print(df)\nOut []:\n```\n\n| | A | B |\
    \ C | D |\n|---|---|---|---|---|\n| a | -0.633249 | -2.699088 | 0.574052 | 0.652742\
