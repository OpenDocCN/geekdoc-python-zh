    # 11.13 Key Takeaways


    +   1. Pandas DataFrame and Pandas Series are some of the most important data
    structures. It is a must to acquire fluency in its handling because we will find
    them in practically all the problems that we handle.

    2. A DataFrame is a data structure formed by rows and columns and has an index.

    3. We must think of them as if they were data tables (for the Array with a single
    column) with which we can select, filter, sort, add and delete elements, either
    by rows or columns.

    4. Help in ETL processes (Extraction, Transformation and Loading)

    5. We can select, insert, delete and update elements with simple functions.

    6. We can perform computations by rows or columns.

    7. Has the ability to run vectorized computations.

    8. We can work with several DataFrames at the same time.

    9. Indexing and subsetting are the most important features from Pandas.

    10. Facilitates the statistical exploration of the data.

    11. It offers us a variety of options for handling NaN data.

    12. Another additional advantage is the ability to read & write multiple data
    formats (CSV, Excel, HDF5, etc.).

    13. Retrieve data from external sources (Yahoo, Google, Quandl, etc.)

    14. Finally, it has the ability to work with date and time indexes and offers
    us a set of functions to work with dates.'
