- md: "## 3.4 Key Takeaways\n\n- 1. A variable is used to store a value that can be\
    \ used repetitively based on the requirement within a program.\n- 2. Python is\
    \ a loosely typed language. It is not required to specify the type of a variable\
    \ while declaring it. Python determines the type of the variable based on the\
    \ value assigned to it.\n- 3. Assignment operator = is used for assigning a value\
    \ to a variable.\n- 4. Variable names should start with either a letter or an\
    \ underscore character. They can contain alpha-numeric characters only. It is\
    \ a good programming practice to have descriptive variable names.\n- 5. Variable\
    \ names are case sensitive and cannot start with a number.\n- 6. There are four\
    \ primitive data types in Python:\n    - (a) Integer represented by `int`\n  \
    \  - (b) Float represented by `float`\n    - (c) String represented by `str`\n\
    \    - (d) Boolean (True or False) represented by `bool`\n- 7. Internally, `True`\
    \ is treated as 1 and `False` is treated as 0 in Python.\n- 8. A substring or\
    \ a part of a string is selected using the square brackets `[]` also known as\
    \ slice operation.\n- 9. Type conversion happens either implicitly or explicitly.\n\
    \    - (a) Implicit type conversion happens when an operation with compatible\
    \ data types is executed. For example, 4/2 (integer division) will return 2.0\
    \ (float output).\n    - (b) When an operation involves incompatible data types,\
    \ they need to be converted to compatible or similar data type. For example: To\
    \ print a string and an integer together, the integer value needs to be converted\
    \ to a string before printing.\n\n# Chapter 4\n\n## Modules, Packages and Libraries\n\
    \nTo start with, a module allows us to organize Python code in a systematic manner.\
    \ It can be considered as a file consisting of Python code. A module can define\
    \ functions, classes and variables. It can also include runnable code. Consider\
    \ writing code directly on the Python or IPython console. The definitions that\
    \ we create(functions and variables) will be lost if we quit the console and enter\
    \ it again. Therefore, in order to write a longer program, we might consider switching\
    \ to a text editor to prepare an input for the interpreter and running it with\
    \ that file as an input instead. This is known as writing a *script*. As a program\
    \ gets longer, we may want it to split it into several small files for easier\
    \ maintenance. Also, we may want to use a handy function that we have written\
    \ in several programs without copying its definition into each program.\n\nTo\
    \ support this, Python has a way to put a code definition in a file and use them\
    \ in another script or directly in an interactive instance of the interpreter.\
    \ Such a file is called a *module*; definitions from a module can be *imported*\
    \ into other modules or in the program that we code.\n\nAs we discussed above,\
    \ a module is a file containing Python definitions and statements. The file name\
    \ is the module name with the suffix `.py` appended. For instance, we create a\
    \ file called `arithmetic.py` in the current directory with the following contents:\n\
    \n```python\n# -*- coding: utf-8 -*-\n\"\"\"\nCreated on Fri Sep 21 09:29:05 2018\n\
    @filename: arithmetic.py\n@author: Jay Parmar\n\"\"\"\n\ndef addition(a, b):\n\
    \    \"\"\"Returns the sum of of two numbers\"\"\"\n    return a + b\n\ndef multiply(a,\
    \ b):\n    \"\"\"Returns the product of two numbers\"\"\"\n    return a * b\n\n\
    def division(dividend, divisor):\n    \"\"\"\n    Performs the division operation\
    \ between the dividend\n    and divisor\n    \"\"\"\n    return dividend / divisor\n\
    \ndef factorial(n):\n    \"\"\"Returns the factorial of n\"\"\"\n    i = 0\n \
    \   result = 1\n    while(i != n):\n        i = i + 1\n        result = result\
    \ * i\n    return result\n```\n\nWe are now ready to import this file in other\
    \ scripts or directly into the Python interpreter. We can do so with the following\
    \ command:\n\n```python\nIn []: import arithmetic\n```\n\nOnce we have imported\
    \ the module, we can start using its definition in the script without re-writing\
    \ the same code in the script. We can access functions within the imported module\
    \ using its name. Consider an example below:\n\n```python\nIn []: result = arithmetic.addition(2,\
    \ 3)\n\nIn []: print(result)\nOut[]: 5\n\nIn []: arithmetic.multiply(3, 5)\nOut[]:\
    \ 15\n\nIn []: arithmetic.division(10, 4)\nOut[]: 2.5\n\nIn []: arithmetic.factorial(5)\n\
    Out[]: 120\n```\n\nA module name is available as a string within a script or the\
    \ interpreter as the value of the global variable `__name__`.\n\n```python\nIn\
    \ []: arithmetic.__name__\nOut[]: 'arithmetic'\n```\n\nWhen we import the module\
    \ named `arithmetic`, the interpreter first searches for a built-in module with\
    \ that name. If not found, it then searches for a file named `arithmetic.py` in\
    \ a list of directories given by the variables `sys.path`.\n\nThis variable is\
    \ initialized from the following locations:\n\n- The directory containing the\
    \ input script (or the current directory).\n- PYTHONPATH (An environment variable)\n\
    - The installation-dependent path.\n\nHere, the module named `arithmetic` has\
    \ been created that can be imported into the other modules as well. Apart from\
    \ this, Python has a large set of built-in modules known as the *Python Standard\
    \ Library*, which we will discuss next.\n\n## 4.1 Standard Modules\n\nPython comes\
    \ with a library of standard modules also referred to as the Python Standard Library¹.\
    \ Some modules are built into the interpreter; these modules provide access to\
    \ operations that are not part of the core of the language but are either for\
    \ efficiency or to provide access to tasks pertaining to the operating system.\
    \ The set of such modules available also depends on the underlying platform. For\
    \ example, winreg² module is available only on the Windows platform.\n\nPython’s\
    \ standard library is very extensive and offers a wide range of facilities. The\
    \ library contains built-in modules that provide access to system functionality\
    \ such as file I/O operations as well as modules that provide standardized solutions\
    \ for many problems that occur in everyday programming.\n\nThe Python installers\
    \ for the Windows platform usually include the entire standard library and often\
    \ also include many additional components. For Unix-like operating systems, Python\
    \ is normally provided as a collection of packages, so it may be necessary to\
    \ use the packaging tools provided with the operating system to obtain some or\
    \ all of the optional components.\n\nOne particular module that deserves attention\
    \ is sys, which is built into every Python interpreter. This module provides access\
    \ to variables used or maintained by the interpreter and to functions that interact\
    \ with the interpreter. It is always available and used as follows:\n\n```python\n\
    In []: import sys\n\n# Returns a string containing the copyright pertaining to\n\
    # the Python interpreter\nIn []: sys.copyright\nOut[]: 'Copyright (c) 2001-2018\
    \ Python Software Foundation.\n       \\nAll Rights Reserved.\\n\\nCopyright (c)\
    \ 2000\n       BeOpen.com.\\nAll Rights Reserved.\\n\\n\n       Copyright (c)\
    \ 1995-2001 Corporation for National\n       Research Initiatives.\\nAll Rights\
    \ Reserved.\\n\\nCopyright (c) 1991-1995 Stichting Mathematisch\\nCentrum, Amsterdam.\\\
    nAll Rights Reserved.'\n```\n\n```python\n# Return the name of the encoding used\
    \ to convert between\n# unicode filenames and bytes filenames.\nIn []: sys.getfilesystemencoding()\n\
    Out[]: 'utf-8'\n```\n\n```python\n# Returns information regarding the Python interpreter\n\
    In []: sys.implementation\nOut[]: namespace(cache_tag='cpython-36',\n        hexversion=50726384,\
    \ name='cpython',\n        version=sys.version_info(major=3, minor=6,\n      \
    \  micro=5, releaselevel='final', serial=0))\n```\n\n```python\n# Returns a string\
    \ containing a platform identifier\nIn []: sys.platform\nOut[]: 'win32'\n```\n\
    \n```python\n# Returns a string containing the version number of the\n# Python\
    \ interpreter plus additional information on the\n# compiler\nIn []: sys.version\n\
    Out[]: '3.6.5 |Anaconda, Inc.| (default, Mar 29 2018,\n        13:32:41) [MSC\
    \ v.1900 64 bit (AMD64)]'\n```\n\nIn the above examples, we discussed a handful\
    \ of functionalities provided by the sys module. As can be seen, we can use it\
    \ to access system level functionality through Python code. In addition to this,\
    \ there are various other built-in modules in Python. We list some of them below\
    \ based on their functionality.\n\n- Text Processing : string,readline, re, unicodedata,\
    \ etc.\n- Data Types : datetime, calendar, array, copy, pprint, enum, etc.\n-\
    \ Mathematical : numbers, math, random, decimal, statistics, etc.\n- Files and\
    \ Directories : pathlib, stat, glob, shutil, fileinput, etc.\n- Data Persistence:\
    \ pickle, dbm, sqlite3, etc.\n- Compression and Archiving: gzip, bz2, zipfile,\
    \ tarfile, etc.\n\n¹https://docs.python.org/3/library/\n²https://docs.python.org/3/library/winreg.html#module-winreg"
  mdcn: "## 3.4 关键要点\n\n- 1. 变量用于存储一个值，该值可根据程序中的需求重复使用。\n- 2. Python 是一种动态类型语言。在声明变量时无需指定其类型。Python\
    \ 会根据赋给变量的值来确定其类型。\n- 3. 赋值运算符 `=` 用于为变量赋值。\n- 4. 变量名应以字母或下划线字符开头。它们只能包含字母数字字符。使用描述性的变量名是一种良好的编程实践。\n\
    - 5. 变量名区分大小写，且不能以数字开头。\n- 6. Python 中有四种基本数据类型：\n    - (a) 整数，用 `int` 表示\n  \
    \  - (b) 浮点数，用 `float` 表示\n    - (c) 字符串，用 `str` 表示\n    - (d) 布尔值（True 或 False），用\
    \ `bool` 表示\n- 7. 在 Python 内部，`True` 被视为 1，`False` 被视为 0。\n- 8. 子字符串或字符串的一部分使用方括号\
    \ `[]` 选择，这也称为切片操作。\n- 9. 类型转换可以隐式或显式发生。\n    - (a) 当执行涉及兼容数据类型的操作时，会发生隐式类型转换。例如，4/2（整数除法）将返回\
    \ 2.0（浮点数输出）。\n    - (b) 当操作涉及不兼容的数据类型时，需要将它们转换为兼容或相似的数据类型。例如：要一起打印字符串和整数，需要在打印前将整数值转换为字符串。\n\
    \n# 第 4 章\n\n## 模块、包和库\n\n首先，模块允许我们以系统化的方式组织 Python 代码。它可以被视为一个包含 Python 代码的文件。模块可以定义函数、类和变量。它也可以包含可运行的代码。考虑直接在\
    \ Python 或 IPython 控制台中编写代码。我们创建的定义（函数和变量）在退出控制台并重新进入时会丢失。因此，为了编写更长的程序，我们可能考虑切换到文本编辑器来为解释器准备输入，并使用该文件作为输入来运行它。这被称为编写\
    \ *脚本*。随着程序变长，我们可能希望将其拆分为几个小文件以便于维护。此外，我们可能希望在多个程序中使用一个方便的函数，而无需将其定义复制到每个程序中。\n\
    \n为了支持这一点，Python 提供了一种将代码定义放在文件中并在另一个脚本或直接在解释器的交互式实例中使用它们的方法。这样的文件称为 *模块*；模块中的定义可以被\
    \ *导入* 到其他模块或我们编写的程序中。\n\n如上所述，模块是包含 Python 定义和语句的文件。文件名是模块名加上后缀 `.py`。例如，我们在当前目录中创建一个名为\
    \ `arithmetic.py` 的文件，内容如下：\n\n```python\n# -*- coding: utf-8 -*-\n\"\"\"\nCreated\
    \ on Fri Sep 21 09:29:05 2018\n@filename: arithmetic.py\n@author: Jay Parmar\n\
    \"\"\"\n\ndef addition(a, b):\n    \"\"\"Returns the sum of of two numbers\"\"\
    \"\n    return a + b\n\ndef multiply(a, b):\n    \"\"\"Returns the product of\
    \ two numbers\"\"\"\n    return a * b\n\ndef division(dividend, divisor):\n  \
    \  \"\"\"\n    Performs the division operation between the dividend\n    and divisor\n\
    \    \"\"\"\n    return dividend / divisor\n\ndef factorial(n):\n    \"\"\"Returns\
    \ the factorial of n\"\"\"\n    i = 0\n    result = 1\n    while(i != n):\n  \
    \      i = i + 1\n        result = result * i\n    return result\n```\n\n我们现在可以将此文件导入到其他脚本或直接导入到\
    \ Python 解释器中。我们可以使用以下命令执行此操作：\n\n```python\nIn []: import arithmetic\n```\n\n\
    一旦导入了模块，我们就可以在脚本中开始使用其定义，而无需在脚本中重写相同的代码。我们可以使用其名称访问导入模块中的函数。考虑以下示例：\n\n```python\n\
    In []: result = arithmetic.addition(2, 3)\n\nIn []: print(result)\nOut[]: 5\n\n\
    In []: arithmetic.multiply(3, 5)\nOut[]: 15\n\nIn []: arithmetic.division(10,\
    \ 4)\nOut[]: 2.5\n\nIn []: arithmetic.factorial(5)\nOut[]: 120\n```\n\n模块名称在脚本或解释器中作为全局变量\
    \ `__name__` 的值，以字符串形式提供。\n\n```python\nIn []: arithmetic.__name__\nOut[]: 'arithmetic'\n\
    ```\n\n当我们导入名为 `arithmetic` 的模块时，解释器首先搜索具有该名称的内置模块。如果未找到，则在变量 `sys.path` 给出的目录列表中搜索名为\
    \ `arithmetic.py` 的文件。\n\n此变量从以下位置初始化：\n\n- 包含输入脚本的目录（或当前目录）。\n- PYTHONPATH（一个环境变量）\n\
    - 与安装相关的路径。\n\n这里，创建了名为 `arithmetic` 的模块，也可以导入到其他模块中。除此之外，Python 还有一组大型的内置模块，称为\
    \ *Python 标准库*，我们接下来将讨论。\n\n## 4.1 标准模块\n\nPython 附带了一个标准模块库，也称为 Python 标准库¹。一些模块内置于解释器中；这些模块提供对不属于语言核心但出于效率或提供对操作系统相关任务访问的操作的访问。此类模块的可用性也取决于底层平台。例如，winreg²\
    \ 模块仅在 Windows 平台上可用。\n\nPython 的标准库非常广泛，提供了广泛的设施。该库包含内置模块，提供对系统功能（如文件 I/O 操作）的访问，以及为日常编程中出现的许多问题提供标准化解决方案的模块。\n\
    \nWindows 平台的 Python 安装程序通常包含整个标准库，通常还包含许多其他组件。对于类 Unix 操作系统，Python 通常作为软件包集合提供，因此可能需要使用操作系统提供的打包工具来获取部分或所有可选组件。\n\
    \n一个特别值得注意的模块是 sys，它内置于每个 Python 解释器中。此模块提供对解释器使用或维护的变量以及与解释器交互的函数的访问。它始终可用，使用方法如下：\n\
    \n```python\nIn []: import sys\n\n# 返回一个包含与 Python 解释器相关的版权信息的字符串\nIn []: sys.copyright\n\
    Out[]: 'Copyright (c) 2001-2018 Python Software Foundation.\n       \\nAll Rights\
    \ Reserved.\\n\\nCopyright (c) 2000\n       BeOpen.com.\\nAll Rights Reserved.\\\
    n\\n\n       Copyright (c) 1995-2001 Corporation for National\n       Research\
    \ Initiatives.\\nAll Rights Reserved.\\n\\nCopyright (c) 1991-1995 Stichting Mathematisch\\\
    nCentrum, Amsterdam.\\nAll Rights Reserved.'\n```\n\n```python\n# 返回用于在 unicode\
    \ 文件名和字节文件名之间转换的编码名称。\nIn []: sys.getfilesystemencoding()\nOut[]: 'utf-8'\n```\n\
    \n```python\n# 返回有关 Python 解释器的信息\nIn []: sys.implementation\nOut[]: namespace(cache_tag='cpython-36',\n\
    \        hexversion=50726384, name='cpython',\n        version=sys.version_info(major=3,\
    \ minor=6,\n        micro=5, releaselevel='final', serial=0))\n```\n\n```python\n\
    # 返回一个包含平台标识符的字符串\nIn []: sys.platform\nOut[]: 'win32'\n```\n\n```python\n# 返回一个包含\
    \ Python 解释器版本号以及有关编译器的附加信息的字符串\nIn []: sys.version\nOut[]: '3.6.5 |Anaconda,\
    \ Inc.| (default, Mar 29 2018,\n        13:32:41) [MSC v.1900 64 bit (AMD64)]'\n\
    ```\n\n在上面的例子中，我们讨论了 sys 模块提供的一些功能。可以看出，我们可以使用它通过 Python 代码访问系统级功能。除此之外，Python\
    \ 中还有各种其他内置模块。我们根据其功能列出其中一些。\n\n- 文本处理：string、readline、re、unicodedata 等。\n- 数据类型：datetime、calendar、array、copy、pprint、enum\
    \ 等。\n- 数学运算：numbers、math、random、decimal、statistics 等。\n- 文件和目录：pathlib、stat、glob、shutil、fileinput\
    \ 等。\n- 数据持久化：pickle、dbm、sqlite3 等。\n- 压缩和归档：gzip、bz2、zipfile、tarfile 等。\n\n¹https://docs.python.org/3/library/\n\
    ²https://docs.python.org/3/library/winreg.html#module-winreg"
