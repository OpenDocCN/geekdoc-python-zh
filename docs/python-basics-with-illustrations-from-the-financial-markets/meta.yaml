    > - ''FALSE''

    > - FALSE

    > - false


    ## 3.2.4 String


    A string is a collection of alphabets, numbers, and other characters written within
    a single quote '' or double quotes ". In other words, it is a sequence of characters
    within quotes. Let us understand how a string works with the help of some examples.


    ```python

    # Variable assignment with a string

    sample_string = ''1% can also be expressed as 0.01''


    # Print the variable sample_string

    sample_string

    # Output: ''1% can also be expressed as 0.01''

    ```


    In the above examples we have defined a string variable with name sample_string
    assigned a value ''1% can also be expressed as 0.01''. It is interesting to note
    here that we have used a combination of alphabets, numbers and special characters
    for defining the variable. In Python, anything that goes within quotes is a string.
    Consider the following example:


    ```python

    stock_price = ''224.61''

    stock_price

    # Output: ''224.61''

    ```


    We define the variable stock_price assigning the string value ''224.61''. The
    interesting thing to notice is the output of the variable is also a string. Python
    will not convert the data types implicitly whenever numeric values are given as
    a string.


    We can concatenate two or more string using the + operator.


    ```python

    ''Price of AAPL is '' + stock_price

    # Output: ''Price of AAPL is 224.61''

    ```


    Concatenation operation using the + operator works only on a string. It does not
    work with different data types. If we try to perform the operation, we will be
    presented with an error.


    ```python

    # Re-declaring the variable with an integer value

    stock_price = 224.61


    ''Price of AAPL is '' + stock_price # Error line

    # Traceback (most recent call last):

    #   File "<ipython-input-28>", line 1, in <module>

    #     ''Price of AAPL is '' + stock_price

    # TypeError: must be str, not float

    ```


    As expected, Python spat out a TypeError when we tried concatenating a string
    and float literal. Similar to the + operator, we can use the * operator with a
    string literal to produce the same string multiple times.


    ```python

    string = ''Python! ''

    string * 3

    # Output: ''Python! Python! Python! ''

    ```


    We can select a substring or part of a string using the slice operation. Slicing
    is performed using the square brackets []. The syntax for slicing a single element
    from the string is [index] which will return an element at index. The index refers
    to the position of each element in a string and it begins with 0, which keeps
    on increasing in chronological order for every next element.


    ```python

    string = ''EPAT Handbook!''

    string[0] # 0 refers to an element E

    # Output: ''E''

    string[1] # 1 refers to an element P

    # Output: ''P''

    ```


    In the above example, an element E being the first character belongs to an index
    0, P being next to E belongs to an index 1, and so on. Similarly, the index for
    element b will be 9. Can you guess the index for element k in the above example?


    To slice a substring from a string, the syntax used is [start index:end index]
    which will return the substring starting from an element at start index up to
    but not including an element at end index. Consider the following example, where
    we substring the string from an index 0 up to 4 which yields the output ''EPAT''.
    Notice how the element '' '' at an index 4 is not included in the output. Similarly,
    we slice a substring as seen in the below example.


    ```python

    string[0:4]

    # Output: ''EPAT''

    string[4]

    # Output: '' ''

    string[5:13]

    # Output: ''Handbook''

    string[13]

    # Output: ''!''

    ```


    In Python, we cannot perform the slicing operation with an index not present in
    the string. Python will throw IndexError whenever it encounters slicing operation
    with incorrect index.


    ```python

    string[141]

    # Traceback (most recent call last):

    #   File "<ipython-input-36>", line 1, in <module>

    #     string[14]

    # IndexError: string index out of range

    ```


    In the above example, the last index is 13. The slicing operation performed with
    an index 14 will result in an error IndexError stating that index we are looking
    for is not present.


    > NOTE: We list out some of the important points for string literals below:

    > - In Python 3.x all strings are Unicode by default.

    > - A string can be written within either '''' or "". Both work fine.

    > -'
