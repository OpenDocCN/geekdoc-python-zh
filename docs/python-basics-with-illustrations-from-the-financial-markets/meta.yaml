- md: "## 9.2 User defined functions\n\nAlthough Python provides a wide array of built-in\
    \ functions, it does not suffice in tackling issues we would face while we develop\
    \ programs and applications. As Python programmers, we might need to break down\
    \ the programming challenge into smaller chunks and implement them in the form\
    \ of custom or *user defined* functions. The concept of writing functions is probably\
