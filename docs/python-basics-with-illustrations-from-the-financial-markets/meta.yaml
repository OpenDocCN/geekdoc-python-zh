  md: '# 5.5 Dictionaries


    A Python dictionary is an unordered collection of items. It stores data in *key-value*
    pairs. A dictionary is like a phone-book where we can find the phone numbers or
    contact details of a person by knowing only his/her name i.e. we associate names
    (*keys*) with corresponding details (*values*). Note that the keys must be unique
    just like the way it is in a phone book i.e. we cannot have two persons with the
    exact same name.


    In a dictionary, pairs of keys and values are specified within curly brackets
    {} using the following notation:


    ```

    dictionary = {key1 : value1, key2 : value2, key3 : value3}

    ```


    Notice that the key-value pairs are separated by the colon : and pairs themselves
    are separated by ,. Also, we can use only immutable objects like strings and tuples
    for the keys of a dictionary. Values of a dictionary can be either mutable or
    immutable objects. Dictionaries that we create are instances of the `dict` class
    and they are unordered, so the order that keys are added doesn''t necessarily
    reflect the same order when they are retrieved back.


    # 5.5.1 Creating and accessing dictionaries


    A dictionary can be created either using the curly brackets {} or the method `dict()`.
    For example:


    ```

    # Creating an empty dictionary using {}

    In []: tickers = {}


    In []: type(tickers)

    Out[]: dict


    # Creating an empty dictionary using the dict() method

    In []: tickers = dict()


    In []: type(tickers)

    Out[]: dict

    ```


    Let us create a dictionary with values of the same data type.'
