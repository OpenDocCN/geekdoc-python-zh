    anaconda3\\lib\\site-packages\nC:\\Users\\...\\Continuum\\anaconda3\\lib\\site-packages\\\
    win32\nC:\\Users\\...\\Continuum\\anaconda3\\lib\\site-packages\\win32\\lib\n\
    C:\\Users\\...\\Continuum\\anaconda3\\lib\\site-packages\\Pythonwin\nC:\\Users\\\
    ...\\.ipython\n```\n\nIn the above code snippet, we print paths present in the\
    \ `sys.path`. The `vwap_strategy.py` file is in the `strategy` directory, and\
    \ this directory is not in the `sys.path` list.\n\nBecause `sys.path` is just\
    \ a Python list, we can make the import statement work by appending the `strategy`\
    \ directory to the list.\n\n```python\nIn []: import sys\nIn []: sys.path.append('strategy')\n\
    \n# Now the import statement will work\nIn []: import vwap_strategy\n```\n\nThere\
    \ are various ways of making sure a directory is always on the `sys.path` list\
    \ when you run Python. Some of them are:\n\n- Keep the directory into the contents\
    \ of the `PYTHONPATH` environment variable.\n- Make the module part of an installable\
    \ package, and install it.\n\nAs a crude hack, we can keep the module in the same\
    \ directory as the code file.\n\n## 4.5 dir() function\n\nWe can use the built-in\
    \ function `dir()` to find which names a module defines. It returns a sorted list\
    \ of strings.\n\n```python\nIn []: import arithmetic\n\nIn []: dir(arithmetic)\n\
    Out[]:\n['__builtins__',\n '__cached__',\n '__doc__',\n '__file__',\n '__loader__',\n\
    \ '__name__',\n '__package__',\n '__spec__',\n 'addition',\n 'division',\n 'factorial',\n\
    \ 'multiply']\n```\n\nHere, we can see a sorted list of names within the module\
    \ `arithmetic`. All other names that begin with an underscore are default Python\
    \ attributes associated with the module (we did not define them.)\n\nWithout arguments,\
    \ `dir()` lists the names we have defined currently:\n\n```python\nIn []: a =\
    \ 1\n\nIn []: b = 'string'\n\nIn []: import arithmetic\n\nIn []: dir()\nOut[]:\n\
    ['__builtins__',\n 'a',\n 'arithmetic',\n 'b',\n 'exit',\n 'quit']\n```\n\nNote\
    \ that it lists all types of names: variables, modules, functions, etc. The `dir()`\
    \ does not list the names of built-in functions and variables. They are defined\
    \ in the standard module `builtins`. We can list them by passing `builtins` as\
    \ an argument in the `dir()`.\n\n```python\nIn []: import builtins\n\nIn []: dir(builtins)\n\
    Out[]: ['ArithmeticError', 'AssertionError',\n        'AttributeError', 'BaseException',\n\
    \        'BlockingIOError', 'BrokenPipeError',\n        'BufferError', 'BytesWarning',\
    \ 'ChildProcessError',\n        'ConnectionAbortedError', 'ConnectionError',\n\
    \        'ConnectionRefusedError', 'ConnectionResetError',\n        'DeprecationWarning',\
    \ 'EOFError', 'Ellipsis',\n        'EnvironmentError', 'Exception', 'False',\n\
    \        'SyntaxError', ... ]\n```\n\n## 4.6 Key Takeaways\n\n1. A module is a\
    \ Python file which can be referenced and used in other Python code.\n2. A single\
    \ module can also have multiple Python files grouped together.\n3. A collection\
    \ of modules are known as packages or libraries. The words library and package\
    \ are used interchangeably.\n4. Python comes with a large set of built-in libraries\
    \ known as the Python Standard Library.\n5. Modules in Python Standard Library\
    \ provides access to core system functionality and solutions for many problems\
    \ that occur in everyday programming.\n6. The `sys` library is present in every\
    \ Python installation irrespective of the distribution and underlying architecture\
    \ and it acts as an intermediary between the system and Python.\n7. In addition\
    \ to built-in libraries, additional third-party/external libraries can be installed\
    \ using either the `pip` or `conda` package managers.\n8. The `pip` command comes\
    \ pre-installed for Python version >= 2.7 or Python >= 3.4.\n9. A library (either\
    \ built-in or external) needs to be imported into Python code before it can be\
    \ used. It can be achieved using `import library_name` keyword.\n10. It is a good\
    \ idea to alias the library name that we import using an `as` keyword.\n11. It\
    \ is always a good programming practice to selectively import only those modules\
