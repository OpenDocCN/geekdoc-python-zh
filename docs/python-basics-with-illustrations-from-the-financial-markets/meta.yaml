    \n| Bits | 1 2 3 4 |\n| :--- | :--- |\n| *Input 1* | 0 0 1 1 |\n| *Input 2* |\
    \ 0 1 0 1 |\n| *^ Output* | 0 1 1 0 |\n\nNotice that it does not return 1 if all\
    \ inputs are 1. The bitwise ^ can be performed as follows:\n\n```\nIn []: 201\
