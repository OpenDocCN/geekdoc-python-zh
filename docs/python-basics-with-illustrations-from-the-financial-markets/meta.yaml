- md: "## 5.6 Sets\n\nA set is an unordered and unindexed collection of items. It\
    \ is a collection data type which is mutable, iterable and contains no duplicate\
    \ values. A set in Python represents the mathematical notion of a set.\n\nIn Python\
    \ sets are written using the curly brackets in the following way:\n\n```python\n\
    In []: universe ={'GOOG', 'AAPL', 'NFLX', 'GE'}\n\nIn []: universe\nOut[]: {'AAPL',\
    \ 'GE', 'GOOG', 'NFLX'}\n```\n\nWe cannot access items in a set by referring to\
    \ an index (slicing operation), since sets are unordered the item has no index.\
    \ But we can loop through all items using the for loop which will be discussed\
    \ in the upcoming section. Once a set is created, we cannot change its items,\
    \ but we can add new items using the add() method.\n\n```python\nIn []: universe.add('AMZN')\n\
    \nIn []: universe\nOut[]: {'AAPL', 'AMZN', 'GE', 'GOOG', 'NFLX'}\n```\n\nPython\
    \ won't add the same item again nor will it throw any error.\n\n```python\nIn\
    \ []: universe.add('AMZN')\n\nIn []: universe.add('GOOG')\n\nIn []: universe\n\
    Out[]: {'AAPL', 'AMZN', 'GE', 'GOOG', 'NFLX'}\n```\n\nIn order to add multiple\
    \ items, we use the update() method with new items to be added within a list.\n\
    \n```python\nIn []: universe.update(['FB', 'TSLA'])\n\nIn []: universe\nOut[]:\
    \ {'AAPL', 'AMZN', 'FB', 'GE', 'GOOG', 'NFLX', 'TSLA'}\n```\n\nWe can use the\
    \ inbuilt len() function to determine the length of a set.\n\n```python\nIn []:\
    \ len(universe)\nOut[]: 7\n```\n\nTo remove or delete an item, we can use the\
    \ remove() or discard() methods. For example,\n\n```python\nIn []: universe.remove('FB')\n\
    \nIn []: universe.discard('TSLA')\n\nIn []: universe\nOut[]: {'AAPL', 'AMZN',\
    \ 'GE', 'GOOG', 'NFLX'}\n```\n\nIf we try to remove an item using the remove()\
    \ which is not present in the set, Python will throw an error.\n\n```python\n\
    In []: universe.remove('FB')\nTraceback (most recent call last):\n\nFile \"<ipython-input-159>\"\
    , line 1, in <module>\n    universe.remove('FB')\n\nKeyError: 'FB'\n```\n\nThe\
    \ discard() method will not throw any error if we try to discard an item which\
    \ is not present in the set.\n\n```python\nIn []: universe\nOut[]: {'AAPL', 'AMZN',\
    \ 'GE', 'GOOG', 'NFLX'}\n\nIn []: universe.discard('FB')\n```\n\nWe use the clear()\
    \ method to empty the set.\n\n```python\nIn []: universe.clear()\n\nIn []: universe\n\
    Out[]: set()\n```\n\nFollowing the mathematical notation, we can perform set operations\
    \ such as union, intersection, difference, etc. in Python using the set. Consider\
    \ the following examples:\n\n- We define two sets tech_stocks and fin_stocks as\
    \ follows:\n\n    ```python\n    In []: tech_stocks = {'AMD', 'GOOG', 'AAPL',\
    \ 'WDC'}\n\n    In []: fin_stocks = {'BAC', 'BMO', 'JPLS'}\n    ```\n\n- union()\
    \ method: This method allows performing a union between sets. This operation returns\
    \ all elements within both sets.\n\n    ```python\n    # Performs the 'union'\
    \ operation\n    In []: universe = tech_stocks.union(fin_stocks)\n\n    # 'universe'\
    \ contains all elements of both sets\n    In []: universe\n    Out[]: {'AAPL',\
    \ 'AMD', 'BAC', 'BMO', 'GOOG', 'JPLS', 'WDC'}\n    ```\n\n- intersection() method:\
    \ This method performs the intersection between sets. It returns only elements\
    \ which are available in both sets.\n\n    ```python\n    # Only elements present\
    \ in the 'universe' set and\n    # 'fin_stocks' are returned\n    In []: universe.intersection(fin_stocks)\n\
    \    Out[]: {'BAC', 'BMO', 'JPLS'}\n    ```\n\n- difference() method: This method\
    \ performs the difference operation and returns a set containing all elements\
    \ of the calling object but not including elements of the second set.\n\n    ```python\n\
    \    # All elements of the 'universe' set is returned except\n    # elements of\
    \ the 'fin_stocks'\n    In []: universe.difference(fin_stocks)\n    Out[]: {'AAPL',\
    \ 'AMD', 'GOOG', 'WDC'}\n    ```\n\n- issubset() method: This method checks whether\
    \ all elements of calling set is present within a second set or not. It returns\
    \ true if the calling set is subset of the second set, false otherwise.\n\n  \
    \  ```python\n    # True, as the 'universe' contains all elements of\n    # the\
    \ 'fin_stocks'\n    In []: fin_stocks.issubset(universe)\n    Out[]: True\n  \
    \  ```\n\n    ```python\n    # Can you guess why it resulted in to False?\n  \
    \  In []: universe.issubset(tech_stocks)\n    Out[]: False\n    ```\n\n- isdisjoint()\
    \ method: This method checks for the intersection between two sets. It returns\
    \ true if the calling set is disjoint and not intersected with the second set,\
    \ false otherwise.\n\n    ```python\n    # True, none of the set contains any\
    \ element of each other\n    In []: fin_stocks.isdisjoint(tech_stocks)\n    Out[]:\
    \ True\n\n    # False, the 'universe' set contains elements of\n    # the 'fin_stocks'\
    \ set\n    In []: fin_stocks.isdisjoint(universe)\n    Out[]: False\n    ```\n\
    \n- issuperset() method: This method checks whether the calling set contains all\
    \ elements of the second set. It returns true, if the calling set contains all\
    \ elements of the second set, false otherwise.\n\n    ```python\n    # True, the\
    \ 'universe' set contains all elements of\n    # the 'fin_stocks'\n    In []:\
    \ universe.issuperset(fin_stocks)\n    Out[]: True\n\n    # True, the 'universe'\
    \ set contains all elements of\n    # the 'tech_stocks'\n    In []: universe.issuperset(tech_stocks)\n\
    \    Out[]: True\n\n    # False, the 'fin_stocks' set does not contains all\n\
    \    # elements of the 'universe' set\n    In []: fin_stocks.issuperset(universe)\n\
    \    Out[]: False\n    ```\n\n## 5.7 Key Takeaways\n\n1. Data structures are used\
    \ to store a collection of values.\n2. Arrays, tuples, lists, sets and dictionaries\
    \ are primitive data structures in Python. Except for dictionaries, all data structures\
    \ are sequential in nature.\n3. In Python, indexing starts with 0 and negative\
    \ indexing starts with -1.\n4. Elements within data structures are accessed using\
    \ the slicing operation [start_index:end_index] where start_index is inclusive\
    \ and end_index is exclusive.\n5. An array can hold a fixed number of data values\
    \ of the same type. Arrays are not built-in data structures. We can use an array\
    \ library to perform basic array operations.\n6. A tuple can hold multiple values\
    \ of different types within it separated by commas. Tuples are enclosed within\
    \ parentheses () and they are immutable.\n7. A list holds an ordered collection\
    \ of items. Lists are created by placing all items within square brackets [] separated\
    \ by a comma. They can also be used to implement other data structures like stacks\
    \ and queues.\n8. A list can also have another list as an item. This is called\
    \ a nested list.\n9. Dictionary stores data in the form of a key-value pair. It\
    \ can be created using the curly brackets {}. Element/Pair within the dictionary\
    \ is accessed using the corresponding keys instead of an index.\n10. Sets are\
    \ an unordered data structure created using the curly brackets {}. It cannot contain\
    \ duplicate elements.\n\n# Chapter 6\n\n## Keywords & Operators\n\nPython is a\
    \ high-level language that allows us to nearly write programs in a natural language\
    \ like English. However, there are certain words and symbols used internally by\
    \ Python which carry a definite unambiguous meaning. They can be used only in\
    \ certain pre-defined ways when we program. We will explore such words known as\
    \ keywords and various operators in this section.\n\n## 6.1 Python Keywords\n\n\
    Keywords are reserved (plainspeak for ‘set aside’ or ‘on hold’) words in Python.\
    \ They are built into the core language. They cannot be used as a variable name,\
    \ class name, function name or any other identifier. These keywords are used to\
    \ define the syntax and semantics of the Python.\n\nSince Python is case-sensitive,\
    \ so are the keywords. All keywords are in lowercase except True, False and None.\
    \ In this section, we will learn various keywords.\n\n- The and keyword is a logical\
    \ operator used to combine conditional statements and it returns True if both\
    \ statements are True, False otherwise.\n\n    ```python\n    In []: (5 > 3) and\
    \ (4 > 2)\n    Out[]: True\n    ```"
  mdcn: "## 5.6 集合\n\n集合是一个无序且无索引的项目集合。它是一种可变、可迭代且不包含重复值的集合数据类型。Python 中的集合代表了数学中集合的概念。\n\
    \n在 Python 中，集合使用花括号按如下方式编写：\n\n```python\nIn []: universe ={'GOOG', 'AAPL', 'NFLX',\
    \ 'GE'}\n\nIn []: universe\nOut[]: {'AAPL', 'GE', 'GOOG', 'NFLX'}\n```\n\n我们无法通过索引（切片操作）来访问集合中的项目，因为集合是无序的，项目没有索引。但是我们可以使用\
    \ `for` 循环遍历所有项目，这将在下一节中讨论。一旦创建了集合，我们就不能更改其项目，但可以使用 `add()` 方法添加新项目。\n\n```python\n\
    In []: universe.add('AMZN')\n\nIn []: universe\nOut[]: {'AAPL', 'AMZN', 'GE',\
    \ 'GOOG', 'NFLX'}\n```\n\nPython 不会再次添加相同的项目，也不会抛出任何错误。\n\n```python\nIn []: universe.add('AMZN')\n\
    \nIn []: universe.add('GOOG')\n\nIn []: universe\nOut[]: {'AAPL', 'AMZN', 'GE',\
    \ 'GOOG', 'NFLX'}\n```\n\n为了添加多个项目，我们使用 `update()` 方法，并将要添加的新项目放在一个列表中。\n\n```python\n\
    In []: universe.update(['FB', 'TSLA'])\n\nIn []: universe\nOut[]: {'AAPL', 'AMZN',\
    \ 'FB', 'GE', 'GOOG', 'NFLX', 'TSLA'}\n```\n\n我们可以使用内置的 `len()` 函数来确定集合的长度。\n\n\
    ```python\nIn []: len(universe)\nOut[]: 7\n```\n\n要移除或删除一个项目，我们可以使用 `remove()`\
    \ 或 `discard()` 方法。例如，\n\n```python\nIn []: universe.remove('FB')\n\nIn []: universe.discard('TSLA')\n\
    \nIn []: universe\nOut[]: {'AAPL', 'AMZN', 'GE', 'GOOG', 'NFLX'}\n```\n\n如果我们尝试使用\
    \ `remove()` 移除一个不在集合中的项目，Python 将会抛出一个错误。\n\n```python\nIn []: universe.remove('FB')\n\
    Traceback (most recent call last):\n\nFile \"<ipython-input-159>\", line 1, in\
    \ <module>\n    universe.remove('FB')\n\nKeyError: 'FB'\n```\n\n`discard()` 方法在尝试丢弃一个不在集合中的项目时不会抛出任何错误。\n\
    \n```python\nIn []: universe\nOut[]: {'AAPL', 'AMZN', 'GE', 'GOOG', 'NFLX'}\n\n\
    In []: universe.discard('FB')\n```\n\n我们使用 `clear()` 方法来清空集合。\n\n```python\nIn\
    \ []: universe.clear()\n\nIn []: universe\nOut[]: set()\n```\n\n遵循数学符号，我们可以在 Python\
    \ 中使用集合执行并集、交集、差集等集合运算。考虑以下示例：\n\n- 我们定义两个集合 `tech_stocks` 和 `fin_stocks` 如下：\n\
    \n    ```python\n    In []: tech_stocks = {'AMD', 'GOOG', 'AAPL', 'WDC'}\n\n \
    \   In []: fin_stocks = {'BAC', 'BMO', 'JPLS'}\n    ```\n\n- `union()` 方法：此方法允许在集合之间执行并集操作。此操作返回两个集合中的所有元素。\n\
    \n    ```python\n    # 执行 'union' 操作\n    In []: universe = tech_stocks.union(fin_stocks)\n\
    \n    # 'universe' 包含两个集合的所有元素\n    In []: universe\n    Out[]: {'AAPL', 'AMD',\
    \ 'BAC', 'BMO', 'GOOG', 'JPLS', 'WDC'}\n    ```\n\n- `intersection()` 方法：此方法执行集合之间的交集操作。它只返回两个集合中都存在的元素。\n\
    \n    ```python\n    # 仅返回 'universe' 集合和\n    # 'fin_stocks' 中都存在的元素\n    In\
    \ []: universe.intersection(fin_stocks)\n    Out[]: {'BAC', 'BMO', 'JPLS'}\n \
    \   ```\n\n- `difference()` 方法：此方法执行差集操作，并返回一个包含调用对象所有元素但不包含第二个集合元素的集合。\n\n  \
    \  ```python\n    # 返回 'universe' 集合的所有元素，但不包括\n    # 'fin_stocks' 的元素\n    In\
    \ []: universe.difference(fin_stocks)\n    Out[]: {'AAPL', 'AMD', 'GOOG', 'WDC'}\n\
    \    ```\n\n- `issubset()` 方法：此方法检查调用集合的所有元素是否都存在于第二个集合中。如果调用集合是第二个集合的子集，则返回 true，否则返回\
    \ false。\n\n    ```python\n    # True，因为 'universe' 包含了 'fin_stocks' 的所有元素\n \
    \   In []: fin_stocks.issubset(universe)\n    Out[]: True\n    ```\n\n    ```python\n\
    \    # 你能猜出为什么结果是 False 吗？\n    In []: universe.issubset(tech_stocks)\n    Out[]:\
    \ False\n    ```\n\n- `isdisjoint()` 方法：此方法检查两个集合之间是否存在交集。如果调用集合与第二个集合不相交且没有交集，则返回\
    \ true，否则返回 false。\n\n    ```python\n    # True，两个集合都不包含对方的任何元素\n    In []: fin_stocks.isdisjoint(tech_stocks)\n\
    \    Out[]: True\n\n    # False，'universe' 集合包含了 'fin_stocks' 集合的元素\n    In []:\
    \ fin_stocks.isdisjoint(universe)\n    Out[]: False\n    ```\n\n- `issuperset()`\
    \ 方法：此方法检查调用集合是否包含第二个集合的所有元素。如果调用集合包含第二个集合的所有元素，则返回 true，否则返回 false。\n\n    ```python\n\
    \    # True，'universe' 集合包含了 'fin_stocks' 的所有元素\n    In []: universe.issuperset(fin_stocks)\n\
    \    Out[]: True\n\n    # True，'universe' 集合包含了 'tech_stocks' 的所有元素\n    In []:\
    \ universe.issuperset(tech_stocks)\n    Out[]: True\n\n    # False，'fin_stocks'\
    \ 集合不包含 'universe' 集合的所有元素\n    In []: fin_stocks.issuperset(universe)\n    Out[]:\
    \ False\n    ```\n\n## 5.7 关键要点\n\n1. 数据结构用于存储值的集合。\n2. 数组、元组、列表、集合和字典是 Python\
    \ 中的基本数据结构。除了字典，所有数据结构本质上都是顺序的。\n3. 在 Python 中，索引从 0 开始，负索引从 -1 开始。\n4. 数据结构中的元素使用切片操作\
    \ `[start_index:end_index]` 访问，其中 `start_index` 是包含的，`end_index` 是不包含的。\n5. 数组可以容纳固定数量的相同类型的数据值。数组不是内置数据结构。我们可以使用数组库来执行基本的数组操作。\n\
    6. 元组可以容纳多个不同类型的值，值之间用逗号分隔。元组用圆括号 `()` 括起来，它们是不可变的。\n7. 列表保存项目的有序集合。列表通过将所有项目放在方括号\
    \ `[]` 内并用逗号分隔来创建。它们也可以用于实现其他数据结构，如栈和队列。\n8. 列表也可以将另一个列表作为项目。这称为嵌套列表。\n9. 字典以键值对的形式存储数据。可以使用花括号\
    \ `{}` 创建。字典中的元素/对使用相应的键而不是索引来访问。\n10. 集合是使用花括号 `{}` 创建的无序数据结构。它不能包含重复的元素。\n\n\
    # 第 6 章\n\n## 关键字与运算符\n\nPython 是一种高级语言，允许我们几乎用像英语这样的自然语言编写程序。然而，Python 内部使用某些单词和符号，它们具有明确无歧义的含义。在编程时，它们只能以某些预定义的方式使用。我们将在本节中探索这些称为关键字的单词和各种运算符。\n\
    \n## 6.1 Python 关键字\n\n关键字是 Python 中的保留字（通俗地说就是“预留”或“搁置”）。它们内置于核心语言中。它们不能用作变量名、类名、函数名或任何其他标识符。这些关键字用于定义\
    \ Python 的语法和语义。\n\n由于 Python 区分大小写，关键字也是如此。除了 `True`、`False` 和 `None`，所有关键字都是小写的。在本节中，我们将学习各种关键字。\n\
    \n- `and` 关键字是一个逻辑运算符，用于组合条件语句，如果两个语句都为 True，则返回 True，否则返回 False。\n\n    ```python\n\
    \    In []: (5 > 3) and (4 > 2)\n    Out[]: True\n    ```"
