    \ | -1.102989 | 0.582455 |\n\n```\nIn []: df_filtered = df[df['A'] > 0]\n    \
    \   print(df_filtered)\nOut []:\n```\n\n| | A | B | C | D |\n|---|---|---|---|---|\n\
