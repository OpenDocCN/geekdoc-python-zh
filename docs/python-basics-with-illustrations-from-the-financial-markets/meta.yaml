    \ with a given name, such as `vwap_module`. It looks for a file called `vwap_module.py`\
    \ in the directories listed in the variable `sys.path`.\n\n```python\nIn []: import\
    \ sys\n\nIn []: type(sys.path)\nOut[]: list\n\nIn []: for path in sys.path:\n\
    \   ...:     print(path)\n   ...:\n```\n\n```\nC:\\Users\\...\\Continuum\\anaconda3\\\
    python36.zip\nC:\\Users\\...\\Continuum\\anaconda3\\DLLs\nC:\\Users\\...\\Continuum\\\
