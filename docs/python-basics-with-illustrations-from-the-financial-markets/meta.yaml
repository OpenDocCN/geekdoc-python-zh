    \ an random array with 20 values\nIn []: rand_arr = np.random.randint(1, 50, 20)\n\
    \n# Printing the array\nIn []: rand_arr\nOut[]:\narray([14, 25, 39, 18, 40, 10,\
    \ 33, 36, 29, 25, 27, 4, 28,\n       43, 43, 19, 30, 29, 47, 41])\n\n# Filtering\
    \ the array values which are greater than 30\nIn []: rand_arr[rand_arr > 30]\n\
    Out[]: array([39, 40, 33, 36, 43, 43, 47, 41])\n```\n\nHere, we create an array\
    \ with the name rand_arr with 20 random values. We then try to subset it with\
    \ values which are greater than 30 using the logical operator >. When an array\
    \ is being sliced using the logical operator,"
  - "[PAGE 220]\n\nNumPy generates an anonymous array of True and False values which\
    \ is then used to subset the array. To illustrate this, let us execute the code\
    \ used to subset the rand_arr, i.e. code written within the square brackets.\n\
    \n```\nIn []: filter_ = rand_arr > 30\n\nIn []: filter_\nOut[]:\narray([False,\
