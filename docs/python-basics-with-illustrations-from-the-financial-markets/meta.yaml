  md: 'Similarly, such conflicts also arise in programming. It is easy and manageable
    to have unique names when programs are small without any external dependencies.
    Things start becoming complex when programs become larger and external modules
    are incorporated. It becomes difficult and wearisome to have unique names for
    all objects in the program when it spans hundreds of lines.


    A namespace can be thought of a naming system to avoid ambiguity between names
    and ensures that all the names in a program are unique and can be used without
    any conflict. Most namespaces are implemented as a dictionary in Python. There
    is a name to object mapping, with names as keys and objects as values. Multiple
    namespaces can use the same name and map it to a different object. Namespaces
    are created at different moments and have different lifetimes. Examples of namespaces
    are:


    +   - The set of built-in names: It includes built-in functions and built-in exception
    names.

    - The global names in a module: It includes names from various modules imported
    in a program.

    - The local names in a function: It includes names inside a function. It is created
    when a function is called and lasts until the function returns.


    The important thing to know about namespaces is that there is absolutely no relation
    between names in different namespaces; that is, two different modules can contain
    a function sum without any conflict or confusion. However, they must be prefixed
    with the module name when used.


