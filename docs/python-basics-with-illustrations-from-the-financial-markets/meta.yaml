    \ And if they are false, the interpreter will execute the code following the elif\
    \ block. It is also possible to have multiple elif blocks, and the interpreter\
    \ will keep on checking the conditions listed by each elif clause and executes\
    \ the code block wherever conditions will be held true.\n\n### 7.1.3 The else\
    \ clause\n\nThe else clause can be thought of as the last part of conditional\
    \ statements. It does not evaluate any conditions. When defined it just executes\
    \ the code within its block if all conditions defined by the if and elif statements\
    \ are false. We can use the else clause in the following way.\n\n```\n# Input\n\
