- md: "## 4.2 Packages\n\nPackages can be considered as a collection of modules. It\
    \ is a way of structuring Python's module namespace by using \"dotted module names\"\
    . For example, the module name `matplotlib.pyplot` designates a submodule named\
    \ `pyplot` in a package named `matplotlib`. Packaging modules in such a way saves\
    \ the author of different modules from having to worry about each other's global\
    \ variable names and the use of dotted module names saves the author of multi-module\
    \ packages from having to worry about each other's module names.\n\nSuppose we\
    \ want to design a package (a collection of modules) for the uniform handling\
    \ of various trading strategies and their data. There are many different data\
    \ files based on data frequencies, so we may need to create and maintain a growing\
    \ collection of modules for the conversion between the various data frequencies.\
    \ Also, there are many different strategies and operations that we might need\
    \ to perform. All of this put together means we would have to write a never-ending\
    \ stream of modules to handle the combinatorics of data, strategies, and operations.\
    \ Here's a possible package structure to make our lives easier.\n\n```\nstrats/\
    \                  Top-level package\n    __init__.py      Initialize strats package\n\
    \    data/            Sub-package for data\n        __init__.py\n        equity.py\n\
    \        currency.py\n        options.py\n        ...\n    strategies/\n     \
    \   __init__.py\n        rsi.py\n        macd.py\n        smalma.py\n        peratio.py\n\
    \        fundamentalindex.py\n        statisticalarbitrage.py\n        turtle.py\n\
    \        ...\n    operations/\n        __init__.py\n        performanceanalytics.py\n\
    \        dataconversion.py\n        ...\n```\n\nWhen importing the package, Python\
    \ searches through the directories in sys.path looking for the package subdirectory.\
    \ The `__init__.py` file is required to make Python treat the directories as containing\
    \ packages. If we are to use this package, we can do so in the following manner:\n\
    \n```\nimport strats.data.equity\nimport strats.strategies.statisticalarbitrage\n\
    ```\n\nAbove statements loads the equity and statisticalarbitrage modules from\
    \ the data and strategies sub-packages respectively under the strats package.\n\
    \n## 4.3 Installation of External Libraries\n\nOne of the great things about using\
    \ Python is the number of fantastic code libraries (apart from the Python Standard\
    \ Library) which are readily available for a wide variety of domains that can\
    \ save much coding or make a particular task much easier to accomplish. Before\
    \ we can use such external libraries, we need to install them.\n\nThe goal here\
    \ is to install software that can automatically download and install Python modules/libraries\
    \ for us. Two commonly used installation managers are conda³ and pip⁴. We choose\
    \ to go with pip for our installations.\n\n> pip comes pre-installed for Python\
    \ >= 2.7 or Python >= 3.4 downloaded from Python official site⁵. If the Anaconda\
    \ distribution has been installed, both pip and conda are available to manage\
    \ package installations.\n\n### 4.3.1 Installing pip\n\nWe can install a pip via\
    \ the command line by using the *curl command*, which downloads the pip installation\
    \ *perl script*.\n\n```\ncurl -O https://bootstrap.pypa.io/get-pip.py\n```\n\n\
    Once it is downloaded, we need to execute it in the command prompt with the Python\
    \ interpreter.\n\n```\npython get-pip.py\n```\n\nIf the above command fails on\
    \ a Mac and Linux distribution due to permission issues (most likely because Python\
    \ does not have permission to update certain directories on the file system. These\
    \ directories are read-only by default to ensure that random scripts cannot mess\
    \ with important files and infect the system with viruses), we may need to run\
    \ following command.\n\n```\nsudo python get-pip.py\n```\n\n### 4.3.2 Installing\
    \ Libraries\n\nNow that we have installed pip, it is easy to install python modules\
    \ since it does all the work for us. When we find a module that we want to use,\
    \ usually the documentation or installation instructions will include the necessary\
    \ pip command.\n\nThe Python Package Index⁶ is the main repository for third-party\
    \ Python packages. The advantage of a library being available on PyPI is the ease\
    \ of installation using `pip install <package_name>` such as\n\n```\npip install\
    \ pandas\npip install numpy\npip install nsepy\n```\n\nRemember, again if the\
    \ above command fails on a Mac and Linux distribution due to permission issue,\
    \ we can run the following command:\n\n```\nsudo pip install pandas\nsudo pip\
    \ install nsepy\n```\n\nThe above examples will install the latest version of\
    \ the libraries. To install a specific version, we execute the following command:\n\
    \n```\npip install SomeLibrary==1.1\n```\n\nTo install greater than or equal to\
    \ one version and less than another:\n\n```\npip install SomeLibrary>=1, < 2\n\
    ```\n\nListed below are some of the most popular libraries used in different domains:\n\
    \n- Data Science : NumPy, pandas, SciPy, etc\n- Graphics : matplotlib, plotly,\
    \ seaborn, bokeh, etc.\n- Statistics : statsmodels\n- Machine learning : SciKit-Learn,\
    \ Keras, TensorFlow, Theano, etc.\n- Web scraping : Scrapy, BeautifulSoup,\n-\
    \ GUI Toolkit : pyGtk, pyQT, wxPython, etc.\n- Web Development : Django, web2py,\
    \ Flask, Pyramid, etc.\n\nWe can upgrade already installed libraries to the latest\
    \ version from PyPI using the following command:\n\n```\npip install --upgrade\
    \ SomeLibrary\n```\n\nRemember, pip commands are run directly within the command\
    \ prompt or shell without the python interpreter. If we are to run pip commands\
    \ from Jupyter Notebook we need to prefix it with the ! letter like `!pip install\
    \ SomeLibrary`.\n\n## 4.4 Importing modules\n\nNow that we have installed the\
    \ module that we are interested in, we can start using it right away. First, we\
    \ need to import the installed module in our code. We do so with the *import*\
    \ statement. The import statement is the most common way of invoking the module\
    \ machinery.\n\n### 4.4.1 import statement\n\nWe can import any module, either\
    \ internal or external into our code using the import statement. Take a look at\
    \ below example:\n\n```\n# Importing an internal module\nIn []: import math\n\n\
    # Importing an external library\nIn []: import pandas\n```\n\nThe above example\
    \ will import all definitions within the imported library. We can use these definitions\
    \ using . (dot operator). For example,\n\n```\n# Accessing the 'pi' attribute\
    \ of the 'math' module\nIn []: math.pi\nOut[]: 3.141592653589793\n\n# Accessing\
    \ the 'floor' function from the 'math' module\nIn []: math.floor\nOut[]: <function\
    \ math.floor>\n\n# Accessing the 'floor' method from the 'math'\nIn []: math.floor(10.8)\n\
    Out[]: 10\n\n# Accessing the 'DataFrame' module from the 'pandas'\n# library\n\
    In []: pandas.DataFrame\nOut[]: pandas.core.frame.DataFrame\n```\n\nAs seen in\
    \ the above example, we can access attributes and methods of the imported library\
    \ using the dot operator along with the library name. In fact, the library we\
    \ import acts as an object and hence, we can call its attributes using the dot\
    \ notation. We can also alias a library name while importing it with the help\
    \ of the as keyword.\n\n```\n# Aliasing math as 'm'\nIn []: import math as m\n\
    \n# Aliasing pandas as 'pd'\nIn []: import pandas as pd\n\n# Aliasing numpy as\
    \ 'np'\nIn []: import numpy as np\n```\n\nAn alias can be used in the same way\
    \ as the module name.\n\n```\nIn []: m.pi\nOut[]: 3.141592653589793\n\nIn []:\
    \ m.e\nOut[]: 2.718281828459045\n\nIn []: m.gamma\nOut[]: <function math.gamma>\n\
    ```\n\n### 4.4.2 Selective imports\n\nThe other way to import a definition/module\
    \ is to import all *definitions* in that particular module or all modules in the\
    \ particular package. We can do so by using `from` keyword.\n\n```\n# Import all\
    \ definitions of math module\nIn []: from math import *\n```\n\n---\n³ https://conda.io/docs/\n\
    ⁴ https://pip.pypa.io/en/stable/installing/\n⁵ https://www.python.org\n⁶ https://pypi.org/"
  mdcn: "## 4.2 包\n\n包可以看作是模块的集合。这是一种通过使用“点号模块名”来组织Python模块命名空间的方式。例如，模块名 `matplotlib.pyplot`\
    \ 指定了一个名为 `pyplot` 的子模块，该子模块位于名为 `matplotlib` 的包中。以这种方式组织模块，可以让不同模块的作者不必担心彼此的全局变量名，而使用点号模块名则让多模块包的作者不必担心彼此的模块名。\n\
    \n假设我们想设计一个包（模块的集合），用于统一处理各种交易策略及其数据。基于数据频率，存在许多不同的数据文件，因此我们可能需要创建并维护一个不断增长的模块集合，用于在各种数据频率之间进行转换。此外，我们可能需要执行许多不同的策略和操作。所有这些加在一起意味着，我们必须编写源源不断的模块来处理数据、策略和操作的组合问题。下面是一个可能的包结构，可以让我们的工作更轻松。\n\
    \n```\nstrats/                  顶层包\n    __init__.py      初始化 strats 包\n    data/\
    \            数据子包\n        __init__.py\n        equity.py\n        currency.py\n\
    \        options.py\n        ...\n    strategies/\n        __init__.py\n     \
    \   rsi.py\n        macd.py\n        smalma.py\n        peratio.py\n        fundamentalindex.py\n\
    \        statisticalarbitrage.py\n        turtle.py\n        ...\n    operations/\n\
    \        __init__.py\n        performanceanalytics.py\n        dataconversion.py\n\
    \        ...\n```\n\n导入包时，Python会搜索 `sys.path` 中的目录以查找包子目录。`__init__.py` 文件是必需的，它使Python将这些目录视为包含包。如果我们要使用这个包，可以采用以下方式：\n\
    \n```\nimport strats.data.equity\nimport strats.strategies.statisticalarbitrage\n\
    ```\n\n上述语句分别从 `strats` 包下的 `data` 和 `strategies` 子包中加载 `equity` 和 `statisticalarbitrage`\
    \ 模块。\n\n## 4.3 外部库的安装\n\n使用Python的一大优点是，除了Python标准库之外，还有大量优秀的代码库可供使用，这些库覆盖了广泛的领域，可以节省大量编码工作或使特定任务更容易完成。在使用这些外部库之前，我们需要先安装它们。\n\
    \n这里的目标是安装能够自动为我们下载和安装Python模块/库的软件。两个常用的安装管理器是conda³和pip⁴。我们选择使用pip进行安装。\n\n\
    > 从Python官方站点⁵下载的Python >= 2.7或Python >= 3.4版本已预装pip。如果已安装Anaconda发行版，则pip和conda都可用于管理包安装。\n\
    \n### 4.3.1 安装pip\n\n我们可以通过命令行使用 *curl命令* 来安装pip，该命令会下载pip安装的 *perl脚本*。\n\n```\n\
    curl -O https://bootstrap.pypa.io/get-pip.py\n```\n\n下载后，我们需要在命令提示符下使用Python解释器执行它。\n\
    \n```\npython get-pip.py\n```\n\n如果上述命令在Mac和Linux发行版上因权限问题而失败（很可能是因为Python没有权限更新文件系统上的某些目录。这些目录默认是只读的，以确保随机脚本不会弄乱重要文件并使系统感染病毒），我们可能需要运行以下命令。\n\
    \n```\nsudo python get-pip.py\n```\n\n### 4.3.2 安装库\n\n既然我们已经安装了pip，安装Python模块就变得很容易，因为它为我们完成了所有工作。当我们找到想要使用的模块时，通常文档或安装说明会包含必要的pip命令。\n\
    \nPython包索引⁶是第三方Python包的主要仓库。库在PyPI上的优势在于使用 `pip install <package_name>` 可以轻松安装，例如\n\
    \n```\npip install pandas\npip install numpy\npip install nsepy\n```\n\n请记住，如果上述命令在Mac和Linux发行版上因权限问题而失败，我们可以运行以下命令：\n\
    \n```\nsudo pip install pandas\nsudo pip install nsepy\n```\n\n上述示例将安装库的最新版本。要安装特定版本，我们执行以下命令：\n\
    \n```\npip install SomeLibrary==1.1\n```\n\n要安装大于或等于一个版本且小于另一个版本的版本：\n\n```\n\
    pip install SomeLibrary>=1, < 2\n```\n\n下面列出了一些在不同领域中最常用的库：\n\n- 数据科学：NumPy、pandas、SciPy等\n\
    - 图形：matplotlib、plotly、seaborn、bokeh等\n- 统计：statsmodels\n- 机器学习：SciKit-Learn、Keras、TensorFlow、Theano等\n\
    - 网页抓取：Scrapy、BeautifulSoup\n- GUI工具包：pyGtk、pyQT、wxPython等\n- Web开发：Django、web2py、Flask、Pyramid等\n\
    \n我们可以使用以下命令将已安装的库从PyPI升级到最新版本：\n\n```\npip install --upgrade SomeLibrary\n```\n\
    \n请记住，pip命令直接在命令提示符或shell中运行，无需Python解释器。如果我们要从Jupyter Notebook运行pip命令，需要在前面加上\
    \ `!` 字符，例如 `!pip install SomeLibrary`。\n\n## 4.4 导入模块\n\n既然我们已经安装了感兴趣的模块，就可以立即开始使用它了。首先，我们需要在代码中导入已安装的模块。我们使用\
    \ *import* 语句来完成。import语句是调用模块机制的最常见方式。\n\n### 4.4.1 import语句\n\n我们可以使用import语句将任何模块（内部或外部）导入到我们的代码中。看下面的例子：\n\
    \n```\n# 导入内部模块\nIn []: import math\n\n# 导入外部库\nIn []: import pandas\n```\n\n\
    上述示例将导入被导入库中的所有定义。我们可以使用 .（点运算符）来使用这些定义。例如，\n\n```\n# 访问 'math' 模块的 'pi' 属性\n\
    In []: math.pi\nOut[]: 3.141592653589793\n\n# 访问 'math' 模块的 'floor' 函数\nIn []:\
    \ math.floor\nOut[]: <function math.floor>\n\n# 调用 'math' 模块的 'floor' 方法\nIn []:\
    \ math.floor(10.8)\nOut[]: 10\n\n# 访问 'pandas' 库的 'DataFrame' 模块\nIn []: pandas.DataFrame\n\
    Out[]: pandas.core.frame.DataFrame\n```\n\n如上例所示，我们可以使用点运算符和库名来访问导入库的属性和方法。实际上，我们导入的库充当一个对象，因此我们可以使用点表示法调用其属性。我们还可以在导入库时使用\
    \ `as` 关键字为其设置别名。\n\n```\n# 将 math 别名为 'm'\nIn []: import math as m\n\n# 将 pandas\
    \ 别名为 'pd'\nIn []: import pandas as pd\n\n# 将 numpy 别名为 'np'\nIn []: import numpy\
    \ as np\n```\n\n别名可以像模块名一样使用。\n\n```\nIn []: m.pi\nOut[]: 3.141592653589793\n\n\
    In []: m.e\nOut[]: 2.718281828459045\n\nIn []: m.gamma\nOut[]: <function math.gamma>\n\
    ```\n\n### 4.4.2 选择性导入\n\n导入定义/模块的另一种方式是导入该特定模块中的所有 *定义* 或该特定包中的所有模块。我们可以使用 `from`\
    \ 关键字来完成。\n\n```\n# 导入 math 模块的所有定义\nIn []: from math import *\n```\n\n---\n³\
    \ https://conda.io/docs/\n⁴ https://pip.pypa.io/en/stable/installing/\n⁵ https://www.python.org\n\
    ⁶ https://pypi.org/"
