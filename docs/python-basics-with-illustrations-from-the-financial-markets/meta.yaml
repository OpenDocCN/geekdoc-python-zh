    ## 1.6 关键要点\n\n1.  Python 是一种高级、跨平台的语言，由 Guido van Rossum 于 1991 年开发。\n2.  它被用于许多领域，从简单的\
    \ Web 开发到科学应用。\n3.  它的特点是易于学习和可扩展到其他语言。\n4.  除了称为 Python 标准库的内置或标准库外，Python 还提供对第三方库的支持。\n\
    5.  它支持多种编程风格，如面向对象、过程式和函数式。\n6.  Python 有两个主要版本：2.x 和 3.x。任一版本开发的代码在某种程度上彼此兼容。\n\
    7.  Python 2.x 系列的最新版本是 Python 2.7。2020 年之后，Python 2.x 将不再有任何新更新。\n\n## 第 2 章\n\
    \n## Python 入门\n\n正如我们在上一节所看到的，Python 提供了不同的版本，有多种发行版，并且适用于各种平台和设备的组合。得益于其多功能性，我们可以使用\
    \ Python 来编码几乎任何我们能逻辑想到的任务。计算机执行的最重要的任务之一是数学计算。Python 为现代计算机的这一基本功能提供了直接接口。事实上，Python\
    \ 的介绍可以从展示它如何作为简单数学计算的工具开始。\n\n## 2.1 Python 作为计算器\n\n使用 Python 进行数学计算最简单的方法是使用\
