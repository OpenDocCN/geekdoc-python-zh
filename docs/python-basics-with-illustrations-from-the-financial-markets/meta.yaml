    # 1.1 什么是 Python？


    Python 是一种动态、解释型（字节码编译）语言，广泛应用于各个领域和技术领域。它由 Guido van Rossum 于 1991 年开发。它主要是为了代码可读性而开发的，其语法允许程序员用更少的代码行来编写/表达概念。与
    C、Java 或 Fortran 等编译语言相比，我们在用 Python 编写代码时不需要声明变量、函数等的类型。这使得我们的代码简短而灵活。Python
