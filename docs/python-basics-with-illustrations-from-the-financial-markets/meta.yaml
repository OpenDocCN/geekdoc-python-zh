- md: "## 11.7.13 The .shift() function\n\nThe .shift() function removes the first\
    \ element from an array and returns that removed element. This method changes\
    \ the length of the array.\n\n**Syntax:**\n```javascript\narr.shift()\n```\n\n\
    **Return value:**\nThe removed element from the array; `undefined` if the array\
    \ is empty.\n\n**Description:**\nThe `shift()` method reads the length property\
    \ of `this`. It then sets the key \"0\" to the value of the property \"1\", deletes\
    \ the property \"1\", and so on. When the last property is removed, the property\
    \ \"length\" is updated to the previous value minus one.\n\n`shift()` is intentionally\
    \ generic: it only expects `this` to have a `length` property and integer-keyed\
    \ properties. Since arrays are objects in JavaScript, it is possible to call `Array.prototype.shift()`\
    \ on array-like objects.\n\n**Examples:**\n\n**Using shift()**\n```javascript\n\
    const myFish = ['angel', 'clown', 'mandarin', 'sturgeon'];\n\nconst shifted =\
    \ myFish.shift();\n\nconsole.log(myFish);\n// ['clown', 'mandarin', 'sturgeon']\n\
    \nconsole.log(shifted);\n// 'angel'\n```\n\n**Calling shift() on non-array objects**\n\
    ```javascript\nconst myFish = {\n  0: 'angel',\n  1: 'clown',\n  2: 'mandarin',\n\
    \  3: 'sturgeon',\n  length: 4,\n};\n\nconst shifted = Array.prototype.shift.call(myFish);\n\
    // shift() is intentionally generic\n\nconsole.log(shifted);\n// 'angel'\n\nconsole.log(myFish);\n\
    // { 0: 'clown', 1: 'mandarin', 2: 'sturgeon', length: 3 }\n```\n\n**Using shift()\
    \ in a for loop**\n```javascript\nconst arr = [1, 2, 3, 4];\nconst arr2 = [];\n\
    \nwhile (arr.length !== 0) {\n  arr2.push(arr.shift());\n}\n\nconsole.log(arr2);\n\
    // [1, 2, 3, 4]\n\nconsole.log(arr);\n// []\n```"
  mdcn: "## 11.7.13 .shift() 函数\n\n`.shift()` 函数会移除数组的第一个元素并返回该被移除的元素。此方法会改变数组的长度。\n\
    \n**语法：**\n```javascript\narr.shift()\n```\n\n**返回值：**\n数组中被移除的元素；如果数组为空，则返回 `undefined`。\n\
    \n**描述：**\n`shift()` 方法会读取 `this` 的 `length` 属性。然后，它将键 \"0\" 设置为属性 \"1\" 的值，删除属性\
    \ \"1\"，依此类推。当最后一个属性被移除时，`length` 属性的值会更新为之前的值减一。\n\n`shift()` 是有意设计为通用的：它只期望\
    \ `this` 具有 `length` 属性和整数键属性。由于数组在 JavaScript 中是对象，因此可以在类数组对象上调用 `Array.prototype.shift()`。\n\
    \n**示例：**\n\n**使用 shift()**\n```javascript\nconst myFish = ['angel', 'clown',\
    \ 'mandarin', 'sturgeon'];\n\nconst shifted = myFish.shift();\n\nconsole.log(myFish);\n\
    // ['clown', 'mandarin', 'sturgeon']\n\nconsole.log(shifted);\n// 'angel'\n```\n\
    \n**在非数组对象上调用 shift()**\n```javascript\nconst myFish = {\n  0: 'angel',\n  1:\
    \ 'clown',\n  2: 'mandarin',\n  3: 'sturgeon',\n  length: 4,\n};\n\nconst shifted\
    \ = Array.prototype.shift.call(myFish);\n// shift() 是有意设计为通用的\n\nconsole.log(shifted);\n\
    // 'angel'\n\nconsole.log(myFish);\n// { 0: 'clown', 1: 'mandarin', 2: 'sturgeon',\
    \ length: 3 }\n```\n\n**在 for 循环中使用 shift()**\n```javascript\nconst arr = [1,\
    \ 2, 3, 4];\nconst arr2 = [];\n\nwhile (arr.length !== 0) {\n  arr2.push(arr.shift());\n\
    }\n\nconsole.log(arr2);\n// [1, 2, 3, 4]\n\nconsole.log(arr);\n// []\n```"
