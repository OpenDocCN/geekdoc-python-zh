    \ `n` within the function.\n\n```\n# Global variable\nn = 3\n\ndef relu(val):\n\
    \    # Local variable\n    n = max(0, val)\n    return n\n\nprint('First statement:\
    \ ', relu(-3))\nprint('Second statement:', n)\n```\n\n```\n# Output\nFirst statement:\
    \  0\nSecond statement: 3\n```\n\nHere, the first print statement calls the `relu`\
    \ function with a value of -3 which evaluates the maximum number to 0 and assigns\
    \ the maximum"
  - "[PAGE 185]\n\nnumber to the variable n which in turn gets returned thereby printing\
    \ 0. Next, we attempt to print the n and Python prints 3. This is because Python\
    \ now refers to the variable n defined outside the function (within the global\
    \ scope). Hence, we got two different values of n as they reside in different\
    \ scopes. This brings us to one obvious question, what if the variable is not\
    \ defined within the local scope, but available in the globals scope and we try\
    \ to access that global variable? The answer is intuitive, we will be able to\
    \ access it within the function. However, it would be a read-only variable and\
    \ hence we won't be able to modify it. An attempt to modify a global variable\
    \ result in the error as shown below:\n\n```\n# Global variable\nnumber = 5\n\n\
    # Function that updates the global variable\ndef update_number():\n    number\
    \ = number + 2\n    print('Within function: Number is', number)\n\n# Calling the\
    \ function\nupdate_number()\n\nprint('Outside function: Number is', number)\n\
    ```\n\n```\n# Output\nTraceback (most recent call last):\n\nFile \"<ipython-input-8>\"\
    , line 8, in <module>\n    update_number()\n\nFile \"<ipython-input-8>\", line\
    \ 4, in update_number\n    number = number + 2\n\nUnboundLocalError: local variable\
    \ 'number' referenced before assignment\n```\n\nTo handle such a situation which\
    \ demands modification of a global name, we define the global name within the\
    \ function followed by the global key-"
- md: "## 9.4 Lambda functions\n\nWe have written functions above using the def keyword,\
    \ function headers, DocStrings and function bodies. There's a quicker way to write\
    \ on-the-fly functions in Python and they are known as lambda functions. They\
    \ are also referred to as anonymous functions sometimes. We use the keyword lambda\
    \ to write such functions. The syntax for lambda functions is as follows:\n\n\
    ```\nlambda arguments: expression\n```\n\nFirstly, the syntax shows that there\
    \ is no function name. Secondly, *arguments* refers to parameters, and finally,\
    \ *expression* depicts the function body. Let us create a function square which\
    \ squares the argument provided to it and returns the result. We create this function\
    \ using the def keyword.\n\n```\n# Function definition\ndef square(arg):\n   \
    \ \"\"\"\n    Computes the square of an argument and returns the\n    result.\n\
    \n    It does not implement the print statement.\"\"\"\n    result = arg * arg\n\
    \    return result\n\n# Calling the function and printing its output\nprint(square(3))\n\
    \n# Output\n9\n```\n\nThe function square defined above can be re-written in a\
    \ single line using the lambda keyword as shown below:\n\n```\n# Creating a lambda\
    \ function and assigning it to square\nsquare = lambda arg: arg * arg\n```\n\n\
    ```\n# Calling the lambda function using the name 'square'\nprint(square(3))\n\
    \n# Output\n9\n```\n\nIn the above lambda function, it takes one argument denoted\
    \ by *arg* and returns its square. Lambda functions can have as many number of\
    \ arguments as we want after the `lambda` keyword during its definition. We will\
    \ restrict our discussion up to two arguments to understand how multiple arguments\
    \ work. We create another lambda function to raise the first argument to the power\
    \ of the second argument.\n\n```\n# Creating a lambda function to mimic 'raise\
    \ to power'\n# operation\npower = lambda a, b: a ** b\n\n# Calling the lambda\
    \ function using the name 'power'\nprint(power(2, 3))\n\n# Output\n8\n```\n\n\
    Lambda functions are extensively used along with built-in `map` and `filter` functions.\n\
    \n### 9.4.1 map() Function\n\nThe `map` function takes two arguments: a function\
    \ and a sequence such as a list. This function makes an iterator that applies\
    \ the function to each element of a sequence. We can pass lambda function to this\
    \ `map` function without even naming it. In this case, we refer to lambda functions\
    \ as an anonymous function. In the following example, we create a list `nums`\
    \ consisting of numbers and pass it to a `map` function along with the lambda\
    \ function which will square each element of the list.\n\n```\n# Creating a list\
    \ of all numbers\nnums = [1, 2, 3, 4, 5]\n```\n\n```\n# Defining a lambda function\
    \ to square each number and\n# passing it as an argument to map function\nsquares\
    \ = map(lambda num: num ** 2, nums)\n```\n\nThe lambda function in the above example\
    \ will square each element of the list nums and the map function will map each\
    \ output to the corresponding elements in the original list. We then store the\
    \ result into a variable called squares. If we print the square variable, Python\
    \ will reveal us that it is a map object.\n\n```\n# Printing squares\nprint(squares)\n\
    \n# Output\n<map object at 0x00000000074EAD68>\n```\n\nTo see what this object\
    \ contains, we need to cast it to list using the list function as shown below:\n\
    \n```\n# Casting map object squares to a list and printing it\nprint(list(squares))\n\
    \n# Output\n[1, 4, 9, 16, 25]\n```\n\n### 9.4.2 filter() Function\n\nThe filter\
    \ function takes two arguments: a function or None and a sequence. This function\
    \ offers a way to filter out elements from a list that don't satisfy certain criteria.\
    \ Before we embed a lambda function with it, let's understand how it works.\n\n\
    ```\n# Creating a list of booleans\nbooleans = [False, True, True, False, True]\n\
    \n# Filtering 'booleans', casting it to a list, and finally\n# printing it\nprint(list(filter(None,\
    \ booleans)))\n```\n\n```\n# Output\n[True, True, True]\n```\n\nIn the above example,\
    \ we first create a list of random boolean values. Next, we pass it to the `filter`\
    \ function along with the `None` which specifies to return the items that are\
    \ true. Lastly, we cast the output of the `filter` function to a list as it outputs\
    \ a filter object. In a more advanced scenario, we can embed a lambda function\
    \ in the `filter` function. Consider that we have been given a scenario where\
    \ we need to filter all strings whose length is greater than 3 from a given set\
    \ of strings. We can use filter and lambda functions together to achieve this.\
    \ This is illustrated below:\n\n```\n# Creating a pool of random strings\nstrings\
    \ = ['one', 'two', 'three', 'four', 'five', 'six']\n\n# Filtering strings using\
    \ a lambda and filter functions\nfiltered_strings = filter(lambda string: len(string)\
    \ > 3,\n                         strings)\n\n# Casting 'filtered_strings' to a\
    \ list and printing it\nprint(list(filtered_strings))\n\n# Output\n['three', 'four',\
    \ 'five']\n```\n\nIn the above example, a lambda function is used within the `filter`\
    \ function which checks for the length of each string in the `strings` list. And\
    \ the `filter` function will then filter out the strings which match the criteria\
    \ defined by the lambda function.\n\nApart from the `map` and `filter` functions\
    \ discussed above, now we will learn another handy function `zip` which can be\
    \ used for iterating through multiple sequences simultaneously.\n\n### 9.4.3 zip()\
    \ Function\n\nAs regular computer users, we often come across a file with `.zip`\
    \ extension aka zip files. Basically, these files are the files which have zipped\
    \ other files within them. In other words, zip files work as a container to hold\
    \ other files.\n\nIn the Python world, the zip function works more or less as\
    \ a container for iterables instead of real files. The syntax for the zip is shown\
    \ below:\n\n```\nzip(*iterables)\n```\n\nIt takes an iterable as an input and\
    \ returns the iterator that aggregates elements from each of the iterable. The\
    \ output contains the iterator of a tuple. The *i-th* element in the iterator\
    \ is the tuple consisting the *i-th* element from each input. If the iterables\
    \ in the input are of unequal sizes, the output iterator stops when the shortest\
    \ input iterable is exhausted. With no input, it returns an empty iterator. Let\
    \ us understand the working of zip with the help of an example.\n\n```\n# Defining\
    \ iterables for the input\ntickers = ['AAPL', 'MSFT', 'GOOG']\ncompanies = ['Apple\
    \ Inc', 'Microsoft Corporation',\n            'Alphabet Inc']\n\n# Zipping the\
    \ above defined iterables using the 'zip'\nzipped = zip(tickers, companies)\n\
    ```\n\nWe define two lists tickers and companies which are used as an input to\
    \ the zip. The zipped object is the iterator of type zip and hence we can iterate\
    \ either over it using a looping technique to print its content:\n\n```\n# Iterating\
    \ over a zipped object\nfor ticker, company in zipped:\n    print('Ticker name\
    \ of {} is {}.'.format(ticker,\n        company))\n\n# Output\nTicker name of\
    \ AAPL is Apple Inc.\nTicker name of MSFT is Microsoft Corporation.\nTicker name\
    \ of GOOG is Alphabet Inc.\n```\n\nor cast it to sequential data structures such\
    \ as list or tuple easily."
  mdcn: "## 9.4 Lambda 函数\n\n我们之前使用 `def` 关键字、函数头、文档字符串和函数体来编写函数。在 Python 中，还有一种更快捷的方式来编写临时函数，它们被称为\
    \ lambda 函数。有时也被称为匿名函数。我们使用 `lambda` 关键字来编写这类函数。Lambda 函数的语法如下：\n\n```\nlambda\
    \ arguments: expression\n```\n\n首先，语法显示没有函数名。其次，*arguments* 指的是参数，最后，*expression*\
    \ 描述了函数体。让我们创建一个名为 `square` 的函数，它计算传入参数的平方并返回结果。我们使用 `def` 关键字来创建这个函数。\n\n```\n\
    # 函数定义\ndef square(arg):\n    \"\"\"\n    计算参数的平方并返回结果。\n\n    它不执行 print 语句。\"\
    \"\"\n    result = arg * arg\n    return result\n\n# 调用函数并打印其输出\nprint(square(3))\n\
    \n# 输出\n9\n```\n\n上面定义的 `square` 函数可以使用 `lambda` 关键字重写为单行形式，如下所示：\n\n```\n# 创建一个\
    \ lambda 函数并将其赋值给 square\nsquare = lambda arg: arg * arg\n```\n\n```\n# 使用名称 'square'\
    \ 调用 lambda 函数\nprint(square(3))\n\n# 输出\n9\n```\n\n在上面的 lambda 函数中，它接受一个由 *arg*\
    \ 表示的参数并返回其平方。Lambda 函数在定义时，可以在 `lambda` 关键字后拥有任意数量的参数。我们将讨论限制在两个参数以内，以理解多个参数的工作方式。我们创建另一个\
    \ lambda 函数，将第一个参数提升到第二个参数的幂。\n\n```\n# 创建一个 lambda 函数来模拟 '幂运算'\npower = lambda\
    \ a, b: a ** b\n\n# 使用名称 'power' 调用 lambda 函数\nprint(power(2, 3))\n\n# 输出\n8\n\
    ```\n\nLambda 函数与内置的 `map` 和 `filter` 函数一起被广泛使用。\n\n### 9.4.1 map() 函数\n\n`map`\
    \ 函数接受两个参数：一个函数和一个序列（如列表）。此函数创建一个迭代器，将该函数应用于序列的每个元素。我们可以将 lambda 函数传递给这个 `map`\
    \ 函数，甚至无需为其命名。在这种情况下，我们将 lambda 函数称为匿名函数。在下面的示例中，我们创建一个由数字组成的列表 `nums`，并将其与 lambda\
    \ 函数一起传递给 `map` 函数，该 lambda 函数将对列表的每个元素求平方。\n\n```\n# 创建一个包含所有数字的列表\nnums = [1,\
    \ 2, 3, 4, 5]\n```\n\n```\n# 定义一个 lambda 函数来对每个数字求平方，\n# 并将其作为参数传递给 map 函数\nsquares\
    \ = map(lambda num: num ** 2, nums)\n```\n\n上面示例中的 lambda 函数将对列表 `nums` 的每个元素求平方，而\
    \ `map` 函数会将每个输出映射到原始列表中的相应元素。然后我们将结果存储到一个名为 `squares` 的变量中。如果我们打印 `squares` 变量，Python\
    \ 会告诉我们它是一个 map 对象。\n\n```\n# 打印 squares\nprint(squares)\n\n# 输出\n<map object\
    \ at 0x00000000074EAD68>\n```\n\n要查看此对象包含的内容，我们需要使用 `list` 函数将其转换为列表，如下所示：\n\n\
    ```\n# 将 map 对象 squares 转换为列表并打印\nprint(list(squares))\n\n# 输出\n[1, 4, 9, 16,\
    \ 25]\n```\n\n### 9.4.2 filter() 函数\n\n`filter` 函数接受两个参数：一个函数或 `None`，以及一个序列。此函数提供了一种从列表中过滤掉不满足特定条件的元素的方法。在我们将\
    \ lambda 函数与之结合之前，让我们先了解它的工作原理。\n\n```\n# 创建一个布尔值列表\nbooleans = [False, True,\
    \ True, False, True]\n\n# 过滤 'booleans'，将其转换为列表，最后打印\nprint(list(filter(None,\
    \ booleans)))\n```\n\n```\n# 输出\n[True, True, True]\n```\n\n在上面的示例中，我们首先创建一个包含随机布尔值的列表。接下来，我们将其与\
    \ `None` 一起传递给 `filter` 函数，`None` 指定返回为真的项。最后，我们将 `filter` 函数的输出转换为列表，因为它输出的是一个\
    \ filter 对象。在更高级的场景中，我们可以在 `filter` 函数中嵌入一个 lambda 函数。假设我们有一个场景，需要从给定的字符串集合中过滤出所有长度大于\
    \ 3 的字符串。我们可以结合使用 `filter` 和 lambda 函数来实现这一点。下面进行了说明：\n\n```\n# 创建一个随机字符串池\nstrings\
    \ = ['one', 'two', 'three', 'four', 'five', 'six']\n\n# 使用 lambda 和 filter 函数过滤字符串\n\
    filtered_strings = filter(lambda string: len(string) > 3,\n                  \
    \       strings)\n\n# 将 'filtered_strings' 转换为列表并打印\nprint(list(filtered_strings))\n\
    \n# 输出\n['three', 'four', 'five']\n```\n\n在上面的示例中，`filter` 函数中使用了一个 lambda 函数，该函数检查\
    \ `strings` 列表中每个字符串的长度。然后 `filter` 函数将过滤掉符合 lambda 函数定义条件的字符串。\n\n除了上面讨论的 `map`\
    \ 和 `filter` 函数外，现在我们将学习另一个方便的函数 `zip`，它可以用于同时遍历多个序列。\n\n### 9.4.3 zip() 函数\n\n\
    作为常规计算机用户，我们经常遇到扩展名为 `.zip` 的文件，即 zip 文件。基本上，这些文件是将其他文件压缩在其中的文件。换句话说，zip 文件充当容纳其他文件的容器。\n\
    \n在 Python 世界中，`zip` 函数或多或少地充当可迭代对象的容器，而不是实际的文件。`zip` 的语法如下所示：\n\n```\nzip(*iterables)\n\
    ```\n\n它接受一个可迭代对象作为输入，并返回一个迭代器，该迭代器聚合来自每个可迭代对象的元素。输出包含一个元组的迭代器。迭代器中的 *第 i 个* 元素是由每个输入的\
    \ *第 i 个* 元素组成的元组。如果输入中的可迭代对象大小不等，则当最短的输入可迭代对象耗尽时，输出迭代器停止。如果没有输入，它返回一个空迭代器。让我们通过一个示例来理解\
    \ `zip` 的工作原理。\n\n```\n# 定义输入的可迭代对象\ntickers = ['AAPL', 'MSFT', 'GOOG']\ncompanies\
    \ = ['Apple Inc', 'Microsoft Corporation',\n            'Alphabet Inc']\n\n# 使用\
    \ 'zip' 将上面定义的可迭代对象打包\nzipped = zip(tickers, companies)\n```\n\n我们定义了两个列表 `tickers`\
    \ 和 `companies`，它们用作 `zip` 的输入。`zipped` 对象是 `zip` 类型的迭代器，因此我们可以使用循环技术遍历它以打印其内容：\n\
    \n```\n# 遍历打包后的对象\nfor ticker, company in zipped:\n    print('Ticker name of {}\
    \ is {}.'.format(ticker,\n        company))\n\n# 输出\nTicker name of AAPL is Apple\
    \ Inc.\nTicker name of MSFT is Microsoft Corporation.\nTicker name of GOOG is\
    \ Alphabet Inc.\n```\n\n或者轻松地将其转换为顺序数据结构，如列表或元组。"
