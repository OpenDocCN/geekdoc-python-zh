    \ as it involves heavy memory usage to change the position of every element with\
    \ each insertion and deletion operation.\n\nIt can be created using the `append()`\
    \ and `popleft()` methods. For example,\n\n```python\n# Import 'deque' module\
    \ from the 'collections' package\nIn []: from collections import deque\n\n# Define\
    \ initial queue\nIn []: queue = deque(['Perl', 'PHP', 'Go'])\n\n# 'R' arrives\
    \ and joins the queue\nIn []: queue.append('R')\n\n# 'Python' arrives and joins\
    \ the queue\nIn []: queue.append('Python')\n\n# The first to arrive leaves the\
    \ queue\nIn []: queue.popleft()\nOut[]: 'Perl'\n\n# The second to arrive leaves\
    \ the queue\nIn []: queue.popleft()\nOut[]: 'PHP'\n\n# The remaining queue in\
    \ order of arrival\nIn []: queue\nOut[]: deque(['Go', 'R', 'Python'])\n```\n\n\
    ## 5.5 Dictionaries\n\nA Python dictionary is an unordered collection of items.\
    \ It stores data in *key-value* pairs. A dictionary is like a phone-book where\
    \ we can find the phone numbers or contact details of a person by knowing only\
    \ his/her name i.e. we associate names (*keys*) with corresponding details (*values*).\
    \ Note that the keys must be unique just like the way it is in a phone book i.e.\
    \ we cannot have two persons with the exact same name.\n\nIn a dictionary, pairs\
    \ of keys and values are specified within curly brackets {} using the following\
    \ notation:\n\n```\ndictionary = {key1 : value1, key2 : value2, key3 : value3}\n\
    ```\n\nNotice that the key-value pairs are separated by the colon : and pairs\
    \ themselves are separated by ,. Also, we can use only immutable objects like\
    \ strings and tuples for the keys of a dictionary. Values of a dictionary can\
    \ be either mutable or immutable objects. Dictionaries that we create are instances\
    \ of the `dict` class and they are unordered, so the order that keys are added\
    \ doesn't necessarily reflect the same order when they are retrieved back.\n\n\
    ### 5.5.1 Creating and accessing dictionaries\n\nA dictionary can be created either\
    \ using the curly brackets {} or the method `dict()`. For example:\n\n```python\n\
    # Creating an empty dictionary using {}\nIn []: tickers = {}\n\nIn []: type(tickers)\n\
    Out[]: dict\n\n# Creating an empty dictionary using the dict() method\nIn []:\
    \ tickers = dict()\n\nIn []: type(tickers)\nOut[]: dict\n```\n\nLet us create\
    \ a dictionary with values of the same data type.\n\n```python\nIn []: tickers\
    \ = {'GOOG' : 'Alphabet Inc.',\n   ...:             'AAPL' : 'Apple Inc.',\n \
    \  ...:             'MSFT' : 'Microsoft Corporation'}\n\nIn []: tickers\nOut[]:\n\
    {'GOOG': 'Alphabet Inc.',\n 'AAPL': 'Apple Inc.',\n 'MSFT': 'Microsoft Corporation'}\n\
    ```\n\nNext, we will create a dictionary with multiple data types.\n\n```python\n\
    In []: ticker = {'symbol' : 'AAPL',\n   ...:           'price' : 224.95,\n   ...:\
    \           'company' : 'Apple Inc',\n   ...:           'founded' : 1976,\n  \
    \ ...:           'products' : ['Machintosh', 'iPod',\n   ...:                \
    \         'iPhone', 'iPad']\n   ...:           }\n```\n\nWe can also provide a\
    \ dictionary as a value to another dictionary key. Such a dictionary is called\
    \ *nested dictionary*. Take a look at below example:\n\n```python\nIn []: tickers\
    \ = {'AAPL' : {'name' : 'Apple Inc.',\n   ...:                       'price' :\
    \ 224.95\n   ...:                       },\n   ...:             'GOOG' : {'name'\
    \ : 'Alphabet Inc.',\n   ...:                       'price' : 1194.64\n   ...:\
    \                       }\n   ...:             }\n```\n\nKeys in a dictionary\
    \ should be unique. If we supply the same key for multiple pairs, Python will\
    \ ignore the previous value associated with the key and only the recent value\
    \ will be stored. Consider the following example:\n\n```python\nIn []: same_keys\
    \ = {'symbol' : 'AAPL',\n   ...:               'symbol' : 'GOOG'}\n\nIn []: same_keys\n\
    Out[]: {'symbol': 'GOOG'}\n```\n\nIn the above example, Python discarded the value\
    \ AAPL and retained the latest value assigned to the same key. Once we have created\
    \ dictionaries, we can access them with the help of the respective keys. We use\
    \ the slice operator [] to access the values; however, we supply a key to obtain\
    \ its value. With the dictionaries created above, we can access values in the\
    \ following manner:\n\n```python\nIn []: ticker\nOut[]:\n{'symbol': 'AAPL',\n\
    \ 'price': 224.95,\n 'company': 'Apple Inc',\n 'founded': 1976,\n 'products':\
    \ ['Machintosh', 'iPod', 'iPhone', 'iPad']}\n```\n\n```python\nIn []: tickers\n\
    Out[]:\n{'AAPL': {'name': 'Apple Inc.', 'price': 224.95},\n 'GOOG': {'name': 'Alphabet\
    \ Inc.', 'price': 1194.64}}\n```\n\n```python\n# Accessing the symbol name\nIn\
    \ []: ticker['symbol']\nOut[]: 'AAPL'\n```\n\n```python\n# Accessing the ticker\
    \ price\nIn []: ticker['price']\nOut[]: 224.95\n```\n\n```python\n# Accessing\
    \ the product list\nIn []: ticker['products']\nOut[]: ['Machintosh', 'iPod', 'iPhone',\
    \ 'iPad']\n```\n\n```python\n# Accessing the item at position 2 in the product\
    \ list.\nIn []: ticker['products'][2]\nOut[]: 'iPhone'\n```\n\n```python\n# Accessing\
    \ the first nested dictionary from the\n# 'tickers' dictionary\nIn []: tickers['AAPL']\n\
    Out[]: {'name': 'Apple Inc.', 'price': 224.95}\n\n# Accessing the price of 'GOOG'\
    \ ticker using chaining\n# operation\nIn []: tickers['GOOG']['price']\nOut[]:\
    \ 1194.64\n```\n\n### 5.5.2 Altering dictionaries\n\nA value in a dictionary can\
    \ be updated by assigning a new value to its corresponding key using the assignment\
    \ operator =.\n\n```python\nIn []: ticker['price']\nOut[]: 224.95\n\nIn []: ticker['price']\
    \ = 226\n\nIn []: ticker['price']\nOut[]: 226\n```\n\nA new key-value pair can\
    \ also be added in a similar fashion. To add a new element, we write the new key\
    \ inside the square brackets [] and assign a new value. For example:\n\n```python\n\
    In []: ticker['founders'] = ['Steve Jobs', 'Steve Wozniak',\n                \
    \           'Ronald Wayne']\n\nIn []: ticker\nOut[]:\n{'symbol': 'AAPL',\n 'price':\
    \ 226,\n 'company': 'Apple Inc',\n 'founded': 1976,\n 'products': ['Machintosh',\
    \ 'iPod', 'iPhone', 'iPad'],\n 'founders': ['Steve Jobs', 'Steve Wozniak',\n \
    \             'Ronald Wayne']}\n```\n\nIn the above example, we add the key founders\
    \ and assign the list ['Steve Jobs', 'Steve Wozniak', 'Ronald Wayne'] as value.\
    \ If we are to delete any key-value pair in the dictionary, we use the built-in\
    \ del() function as follows:\n\n```python\nIn []: del(ticker['founders'])\n\n\
    In []: ticker\nOut[]:\n{'symbol': 'AAPL',\n 'price': 226,\n 'company': 'Apple\
    \ Inc',\n 'founded': 1976,\n 'products': ['Machintosh', 'iPod', 'iPhone', 'iPad']}\n\
    ```\n\n### 5.5.3 Dictionary Methods\n\nThe dict class provides various methods\
    \ using which we can perform a variety of operations. In addition to these methods,\
    \ we can use built-in len() functions to get the length of a dictionary.\n\n```python\n\
    In []: len(ticker)\nOut[]: 5\n\nIn []: len(tickers)\nOut[]: 2\n```\n\nNow we discuss\
    \ some of the popular methods provided by the dict class.\n\n- items() : This\
    \ method returns an object containing all items in the calling object.\n\n```python\n\
    In []: ticker.items()\nOut[]: dict_items([('symbol', 'AAPL'), ('price', 226),\n\
    \                  ('company', 'Apple Inc'),\n                  ('founded', 1976),\n\
    \                  ('products', ['Machintosh', 'iPod',\n                     \
    \          'iPhone', 'iPad'])])\n```\n\n- keys() : This method returns all keys\
    \ in the calling dictionary.\n\n```python\nIn []: ticker.keys()\nOut[]: dict_keys(['symbol',\
    \ 'price', 'company', 'founded', 'products'])\n```\n\n- values() : This method\
    \ returns all values in the calling object.\n\n```python\nIn []: ticker.values()\n\
    Out[]: dict_values(['AAPL', 224.95, 'Apple Inc', 1976, ['Machintosh', 'iPod',\
    \ 'iPhone', 'iPad']])\n```\n\n- pop() : This method pops the item whose key is\
    \ given as an argument.\n\n```python\nIn []: tickers\nOut[]:\n{'GOOG': 'Alphabet\
    \ Inc.',\n 'AAPL': 'Apple Inc.',\n 'MSFT': 'Microsoft Corporation'}\n\nIn []:\
    \ tickers.pop('GOOG')\nOut[]: 'Alphabet Inc.'\n\nIn []: tickers\nOut[]: {'AAPL':\
    \ 'Apple Inc.',\n'MSFT': 'Microsoft Corporation'}\n```\n\n- copy() : As the name\
    \ suggests, this method copies the calling dictionary to another dictionary.\n\
    \n```python\nIn []: aapl = ticker.copy()\n\nIn []: aapl\nOut[]:\n{'symbol': 'AAPL',\n\
    \ 'price': 224.95,\n 'company': 'Apple Inc',\n 'founded': 1976,\n 'products':\
    \ ['Machintosh', 'iPod', 'iPhone', 'iPad']}\n```\n\n- clear() : This method empties\
    \ the calling dictionary."
