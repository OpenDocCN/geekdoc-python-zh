  - "[PAGE 63]\n\n# 4.1 Standard Modules\n\nPython comes with a library of standard\
    \ modules also referred to as the Python Standard Library¹. Some modules are built\
    \ into the interpreter; these modules provide access to operations that are not\
    \ part of the core of the language but are either for efficiency or to provide\
    \ access to tasks pertaining to the operating system. The set of such modules\
    \ available also depends on the underlying platform. For example, winreg² module\
    \ is available only on the Windows platform.\n\nPython’s standard library is very\
    \ extensive and offers a wide range of facilities. The library contains built-in\
    \ modules that provide access to system functionality such as file I/O operations\
    \ as well as modules that provide standardized solutions for many problems that\
    \ occur in everyday programming.\n\nThe Python installers for the Windows platform\
    \ usually include the entire standard library and often also include many additional\
    \ components. For Unix-like operating systems, Python is normally provided as\
    \ a collection of packages, so it may be necessary to use the packaging tools\
    \ provided with the operating system to obtain some or all of the optional components.\n\
    \nOne particular module that deserves attention is sys, which is built into every\
    \ Python interpreter. This module provides access to variables used or maintained\
    \ by the interpreter and to functions that interact with the interpreter. It is\
    \ always available and used as follows:\n\n```\nIn []: import sys\n\n# Returns\
