    12. Each operator has specific precedence in Python. The precedence of any expression\
    \ can be changed using the parenthesis ().\n\n# Chapter 7\n\n## Control Flow Statements\n\
    \nThe code we write gets executed in the order they are written. In other words,\
    \ a program's *control flow* is the order in which the program's code executes.\
    \ Using conditional statements such as `if` statements, and loops, we can define\
    \ or alter the execution order of the code. This section covers a conditional\
    \ `if` statement and `for` and `while` loops; functions are covered in the upcoming\
    \ section. Raising and handling exceptions also affects the control flow which\
