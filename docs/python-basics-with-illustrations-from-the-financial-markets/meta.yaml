    # 6.3 Key Takeaways


    +   1. Keywords are reserved words in Python. They can be used only in certain
    predefined ways when we code. They are always available and cannot be used as
    a variable name, class name, function name or any other identifier.

    2. Keywords are case-sensitive. All keywords are in lowercase except True, False
    and None.

    3. In Python, logical expressions are evaluated from left to right.

    4. Operators are special constructs or symbols which are used to perform operations
    on variables and literals.

    5. Arithmetic operators are used for performing various mathematical operations.

    6. Comparison operators are used for comparing two or more values. It works with
    almost all data types and returns either True or False as an output.

    7. Logical operators are used for comparing two or more conditional statements
    or expressions. They return boolean True or False as an output.

    8. Bitwise operators act on bits and perform bit by bit operations. These operators
    perform operations on a binary (0 and 1) equivalent of a decimal number.

    9. Assignment operators are used for assigning values to variables.

    10. Membership operators check whether the given value exists in a data structure
    or not.'
