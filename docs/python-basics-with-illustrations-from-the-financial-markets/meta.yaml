    Python is an interpreted, object-oriented, high-level programming language with
    dynamic semantics. Its high-level built in data structures, combined with dynamic
    typing and dynamic binding, make it very attractive for Rapid Application Development,
    as well as for use as a scripting or glue language to connect existing components
    together. Python’s simple, easy to learn syntax emphasizes readability and therefore
    reduces the cost of program maintenance. Python supports modules and packages,
    which encourages program modularity and code reuse. The Python interpreter and
    the extensive standard library are available in source or binary form without
    charge for all major platforms and can be freely distributed.


    # 1.2 Where is Python used?


    Python is used by the novice programmer as well as by the highly skilled professional
    developer. It is being used in academia, at web companies, in large corporations
    and financial institutions. It is used for


    +   - *Web and Internet development*: Python is used on the server side to create
    web applications.

    - *Software development*: Python is used to create GUI applications, connecting
    databases, etc.

    - *Scientific and Numeric applications*: Python is used to handle big data and
    perform complex mathematics.

    - *Education*: Python is a great language for teaching programming, both at the
    introductory level and in more advanced courses.

    - *Desktop GUIs*: The Tk GUI library² included with most binary distributions
    of Python is used extensively to build desktop applications.

    - *Business Applications*: Python is also used to build ERP and e-commerce systems.


    # 1.3 Why Python?


    Python is characterized by many features. Let’s examine a few of them here:


    ²https://wiki.python.org/moin/TkInter'
  - "[PAGE 16]\n\n+   - **Simple**\n    - Compared to many other programming languages,\
    \ coding in Python is like writing simple strict English sentences. In fact, one\
    \ of its oft-touted strengths is how Python code appears like pseudo-code. It\
    \ allows us to concentrate on the solution to the problem rather than the language\
    \ itself.\n- **Easy to Learn**\n    - As we will see, Python has a gentler learning\
    \ curve (compared to languages like C, Java, etc.) due to its simple syntax.\n\
    - **Free and Open Source**\n    - Python and the majority of supporting libraries\
    \ available are open source and generally come with flexible and open licenses.\
    \ It is an example of a FLOSS(Free/Libré and Open Source Software). In layman\
    \ terms, we can freely distribute copies of open source software, access its source\
    \ code, make changes to it, and use it in new free programs.\n- **High-level**\n\
    \    - Python is a programming language with strong abstraction from the details\
    \ of the underlying platform or the machine. In contrast to low-level programming\
    \ languages, it uses natural language elements, is easier to use, automates significant\
    \ areas of computing systems such as resource allocation. This simplifies the\
    \ development process when compared to a lower-level language. When we write programs\
    \ in Python, we never need to bother about the lower-level details such as managing\
    \ the memory used by programs we write, etc.\n- **Dynamically Typed**\n    - Types\
    \ of variables, objects, etc. in Python are generally inferred during runtime\
    \ and not statically assigned/declared as in most of the other compiled languages\
    \ such as C or Fortran.\n- **Portable/Platform Independent/Cross Platform**\n\
    \    - Being open source and also with support across multiple platforms, Python\
    \ can be ported to Windows, Linux and Mac"
