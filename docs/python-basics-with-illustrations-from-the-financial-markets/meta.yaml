    # 1.4 History of Python


    Python is the brainchild of Guido van Rossum who started its developmental efforts
    in the 1980s. Its name has nothing to do with anything serpentine, it''s in fact
    inspired by the British comedy Monty Python! The first Python implementation was
    in December 1989 in the Netherlands. Since then, Python has gone through major
    turnarounds periodically. The following can be considered milestones in the development
    of Python:


    +   - Python 0.9.0 released in February 1991

    - Python 1.0 released in January 1994

    - Python 2.0 released in October 2000

    - Python 2.6 released in October 2008

    - Python 2.7 released in July 2010

    - Python 3.0 released in December 2008

    - Python 3.4 released in March 2014

    - Python 3.6 released in December 2016

    - Python 3.7 released in June 2018


    Often times it is quite confusing for newcomers that there are **two major versions
    2.x and 3.x available**, still being developed and in parallel use since 2008.
    This will likely persist for a while since both versions are quite popular and
    used extensively in the scientific and software development community. One point
    to note is that they are not entirely code compatible between the versions. We
    can develop programs and write code in either version but there will be syntactical
    and other differences. This handbook is based on the 3.x version, but we believe
    most of the code examples should work with version 2.x as well with some minor
    tweaks.


    > https://docs.python.org/3/library/gc.html'
