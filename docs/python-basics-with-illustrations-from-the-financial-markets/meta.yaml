    \ number)\n\n    print('Number =', number)\n    inner()\n    print('Number =',\
    \ number)\n```\n\n调用 `outer` 函数现在将打印传递给它的参数、它的平方以及新更新的数字（实际上就是平方后的数字）。\n\n```\n\
    outer(3)\n\n# 输出\nNumber = 3\nNumber 的平方 = 9\nNumber = 9\n```\n\n请记住，给变量赋值只会在特定函数（或作用域）内创建或更改变量，除非它们使用\
    \ `nonlocal` 语句声明。\n\n## 9.3 变量命名空间和作用域\n\n如果我们阅读 *Python 之禅*（在 Python 控制台中尝试\
