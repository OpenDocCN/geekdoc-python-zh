- md: '# Preface


    > "If I have seen further, it is by standing upon the shoulders of giants."


    - Sir Isaac Newton (1643 - 1727)


    The universe we inhabit today is swimming in data. About 90% of the data created
    until 2016 was in just the previous couple of years!¹ There have also been simultaneous
    advances in affordable data storage (on both local workstations and cloud-based)
    and computing power. Case in point: The smartphones that we carry with us all
    day are cheap, pocket-sized supercomputers.


    Closer home, our world of quantitative finance and algorithmic trading is awash
    with facts and figures, on financial markets, the macroeconomy, market sentiments,
    etc. We need a suitable tool to harness and profitably exploit the power of all
    this information. In a perfect world, this tool would be both easy to use and
    efficient. Reality, however, is rarely perfect. These qualities are often at odds
    with each other, and we have to choose our tool wisely.


    As an algorithmic/quantitative trader, what are some of the critical issues we
    deal with every day?


    - Downloading and managing massive datasets in multiple file formats from varied
    web sources

    - Data cleaning/munging

    - Backtesting and automating trading strategies

    - Managing order executions with little manual intervention


    ¹https://www-01.ibm.com/common/ssi/cgi-bin/ssialias?htmlfid=WRL12345USEN


    We find that based on the domain-specific needs of our community, Python is a
    near-perfect fit. It’s a high-level programming language that is relatively easy
    to learn. When used in conjunction with some of its libraries, it’s incredibly
    powerful.


    # Why was this written?


    This book grew out of the EPAT lectures that we have been conducting in Python
    for a number of years. In the EPAT Python lectures, we attempt to cover topics
    as widely as possible and therefore do not dig as deep as we’d like to, given
    the time limitations. These notes give us the freedom to marinate on some concepts
    a little longer and fill in on gaps that arise in the lecture format. We hope
    that our writing is compact and adequate for you, the reader, to obtain a greater
    understanding of the language and some of its essential libraries. We expect that
    for the interested reader, this book would be among the first of many books or
    blogs that you would read on Python. There is also a list of references towards
    the end of the book which we trust you may find useful.


    # Who should read this?


    When this writing project began, our intended objective was to prepare a book
    geared towards the needs of our EPAT participants. In retrospect though, we think
    it should also be useful to


    - anyone who wants a brief introduction to Python and the key components of its
    data science stack, and

    - Python programmers who want a quick refresher on using Python for data analysis.


    We do not expect any of our readers to have a formal background in computer science,
    although some familiarity with programming would be nice to have. The concepts
    and ideas here are covered with several examples to help connect theory to practice.


    # What’s in this book?


    The material presented here is a condensed introduction to Python and its data
    science related libraries such as NumPy, Pandas, and Matplotlib. The illustrative
    examples we use are associated with the financial markets. We like to think we
    have done a satisfactory job of meeting the goals we set out to achieve.


    # How to read this?


    We can suggest three ways to learn from this book depending on your conversance
    with Python and the time you have.


    1. Read the book sequentially at your own pace from beginning to end. Ideally,
    you should read the chapters before or soon after you attend/watch the relevant
    EPAT lectures. It will certainly help in developing intuitions on new concepts
    that you pick up.

    2. Blaze through the book linearly to get a big picture view of all the areas
    covered. You can then concentrate on the different parts based on what you find
    harder or what is more important for your work.

    3. If you’re already familiar with Python programming, you can pretty much hop
    on and hop off chapters as you like it.


    We believe there is value to be had with any of these approaches, and each of
    us needs to assess what works best for us based on our learning style.


    # Where else can you find all this?


    The short answer: Lots and lots of places (way too many to enlist here). We direct
    you to a non-exhaustive set of resources that we really like at in the references
    towards end of the book for further reading.


    Python has been around for about three decades now. There are several excellent
    books, videos, online courses, and blogs covering it from various angles and directed
    at different kinds of users. However, the core set of ideas and concepts are well-understood
    and covered by most of them.


    # Copyright License


    This work is licensed under the Creative Commons Attribution-ShareAlike 4.0 International
    License².


    ²http://creativecommons.org/licenses/by-sa/4.0/


    ![](img/32a9d429dd2d2dd2fe70820b62431b3e_11_0.png)


    That is why you see this image here. In essence, it means that you can use, share,
    or improve upon this work (even commercially) as long as you provide attribution
    to us. To put things in perspective, Wikipedia³ also uses the same license.


    # Acknowledgments


    Jay Parmar, Mario Pisa Pena, and Vivek Krishnamoorthy are the authors of this
    book. Jay’s done the lion’s share of the writing and formatting. Mario’s written
    some sections and reviewed most of the others. Vivek was the principal conspirator
    in hatching the book-writing plan to ease a student’s learning journey as far
    as possible. He was also involved in the writing, the editing, the review, and
    in overseeing this venture.


    Most of the material we present here is but an incremental change or modification
    to some of the fine works we have read and admired. We are in complete alignment
    with Isaac Newton, who viewed any knowledge as building upon itself.


    Our debts in the writing of this book are many, and we spell them out now. Bear
    with us.


    We acknowledge many in the ‘References’ section of each chapter in the book. We
    have tried our best but almost certainly failed to recognize some of the others
    by not making proper notes. To any such creators that we may have overlooked,
    our apologies.


    We have learned a great deal from the writings of experts in the investor/trader
    community and the Python community on online Q&A forums like stackoverflow.com,
    quora.com, and others and are indebted to them. A special shout-out to Dave Bergstrom
    (Twitter handle @Dburgh), Matt Harrison (Twitter handle @__mharrison__) and PlanB
    (Twitter handle @100trillionUSD) for their comments on our work.


    ³https://en.wikipedia.org/wiki/Main_Page


    We are also grateful to the helpful and supportive team members of QuantInsti.
    Many of them worked uncomplainingly on tight timelines and despite our badgering
    (or perhaps because :)), gave us insightful suggestions.


    Finally, we would like to thank all the students we have taught in the past several
    years. A special thanks to those of you who endured our first few iterations of
    the lectures before we learned how best to teach it. Dear students, we exist because
    you exist. You have inspired us, challenged us, and pushed us never to stop learning
    just to keep up with you. We hope you enjoy reading this as much as we enjoyed
    writing it for you.


    # Suggestions and Errors


    Any suggestions from you are welcome. We would be even more eager to receive any
    comments from you about errors in our work. Please write to us about any or all
    of these at contact@quantinsti.com.


    # Chapter 1


    # Introduction


    Welcome to our first module on *programming*. In this module, we will be discussing
    the nuts and bolts of the Python programming language ranging from the very basic
    to more advanced topics.


    Python is a general-purpose programming language that is becoming more and more
    popular for


    - performing data analysis,

    - automating tasks,

    - learning data science,

    - machine learning, etc.


    # 1.1 What is Python?


    Python is a dynamic, interpreted (bytecode-compiled) language that is used in
    a wide range of domains and technical fields. It was developed by Guido van Rossum
    in 1991. It was mainly developed for code readability and its syntax is such that
    it allows programmers to code/express concepts in fewer lines of code. Compared
    to compiled languages like C, Java, or Fortran, we do not need to declare the
    type of variables, functions, etc. when we write code in Python. This makes our
    code short and flexible. Python tracks the types of all values at runtime and
    flags code that does not make sense as it runs. On the Python website¹, we find
    the following executive summary.


    ¹https://www.python.org/doc/essays/blurb/'
  mdcn: '# 前言


    > “如果说我比别人看得更远，那是因为我站在巨人的肩膀上。”


    - 艾萨克·牛顿爵士（1643 - 1727）


    我们今天所处的宇宙正被数据所淹没。截至2016年，约90%的数据都是在最近几年才产生的！¹ 与此同时，经济实惠的数据存储（无论是本地工作站还是云端）和计算能力也取得了长足进步。一个典型的例子就是：我们整天随身携带的智能手机，就是廉价的、口袋大小的超级计算机。


    更贴近我们生活的是，我们的量化金融和算法交易世界充斥着关于金融市场、宏观经济、市场情绪等的事实和数据。我们需要一个合适的工具来驾驭并有效利用所有这些信息的力量。在一个完美的世界里，这个工具应该既易于使用又高效。然而，现实很少是完美的。这些特性往往相互矛盾，我们必须明智地选择我们的工具。


    作为一名算法/量化交易者，我们每天处理的一些关键问题是什么？


    - 从各种网络来源下载和管理多种文件格式的海量数据集

    - 数据清洗/整理

    - 回测和自动化交易策略

    - 以最少的人工干预管理订单执行


    ¹https://www-01.ibm.com/common/ssi/cgi-bin/ssialias?htmlfid=WRL12345USEN


    我们发现，基于我们社区的特定领域需求，Python 几乎是一个完美的选择。它是一种相对容易学习的高级编程语言。当与它的一些库结合使用时，它变得异常强大。


    # 为什么写这本书？


    这本书源于我们多年来一直在用 Python 进行的 EPAT 讲座。在 EPAT Python 讲座中，我们试图尽可能广泛地涵盖主题，因此由于时间限制，我们无法像希望的那样深入挖掘。这些笔记给了我们一些自由，让我们可以更长时间地思考某些概念，并填补讲座形式中出现的空白。我们希望我们的写作是紧凑且充分的，以便您，读者，能够更好地理解这门语言及其一些基本库。我们预计，对于感兴趣的读者，这本书将是您阅读的关于
    Python 的众多书籍或博客中的第一本。书末还有一份参考文献列表，我们相信您可能会觉得有用。


    # 谁应该读这本书？


    当这个写作项目开始时，我们的目标是准备一本针对我们 EPAT 参与者需求的书。然而，回顾过去，我们认为它也应该对以下人群有用：


    - 任何想要简要了解 Python 及其数据科学栈关键组件的人，以及

    - 想要快速复习如何使用 Python 进行数据分析的 Python 程序员。


    我们不期望我们的任何读者具有计算机科学的正式背景，尽管熟悉编程会更好。这里的概念和思想通过几个例子来阐述，以帮助将理论与实践联系起来。


    # 这本书里有什么？


    这里呈现的材料是对 Python 及其数据科学相关库（如 NumPy、Pandas 和 Matplotlib）的精炼介绍。我们使用的说明性示例与金融市场相关。我们愿意认为我们在实现既定目标方面做得令人满意。


    # 如何阅读这本书？


    根据您对 Python 的熟悉程度和可用时间，我们可以建议三种从本书学习的方法。


    1.  按顺序从头到尾阅读本书，按自己的节奏进行。理想情况下，您应该在参加/观看相关 EPAT 讲座之前或之后不久阅读各章。这无疑将有助于培养您对所学新概念的直觉。

    2.  快速线性浏览本书，以获得所涵盖所有领域的概览。然后，您可以根据您觉得更困难或对您的工作更重要的部分，专注于不同的部分。

    3.  如果您已经熟悉 Python 编程，您可以根据自己的喜好随意跳转章节。


    我们相信任何一种方法都有其价值，我们每个人都需要根据自己的学习风格来评估哪种方法最有效。


    # 在哪里还能找到所有这些内容？


    简短的回答：很多很多地方（太多了，无法在此一一列举）。我们引导您参考书末的参考文献中我们非常喜欢的一组非详尽资源，以供进一步阅读。


    Python 已经存在了大约三十年。有许多优秀的书籍、视频、在线课程和博客从不同角度、针对不同类型的用户涵盖了它。然而，核心的思想和概念已被大多数人很好地理解和涵盖。


    # 版权许可


    本作品采用知识共享署名-相同方式共享 4.0 国际许可协议² 进行许可。


