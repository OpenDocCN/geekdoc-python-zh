    ```\n\n在执行期间，解释器将首先检查 `if` 语句列出的条件是否为真。如果为真，则执行 `if` 块内的代码。否则，解释器将尝试检查 `elif`\
    \ 语句列出的条件，如果为真，则执行 `elif` 块内的代码。如果它们为假，解释器将执行 `elif` 块之后的代码。也可以有多个 `elif` 块，解释器将继续检查每个\
    \ `elif` 子句列出的条件，并在条件为真的地方执行相应的代码块。\n\n### 7.1.3 `else` 子句\n\n`else` 子句可以被视为条件语句的最后一部分。它不评估任何条件。当定义时，如果\
