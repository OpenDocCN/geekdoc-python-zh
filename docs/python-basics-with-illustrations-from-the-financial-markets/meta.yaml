    \ 的优先级高于 `+`。\n\n如果表达式中有多个运算符，Python 将从最高优先级的运算符开始，从左到右执行相同优先级的运算符。下表列出了从最高优先级到最低优先级的运算符。\n\
    \n| 运算符 | 优先级 |\n| :--- | :--- |\n| () | 圆括号 |\n| ** | 指数 |\n| +, -, ~ | 正号、负号、按位取反\
    \ |\n| *, /, //, % | 乘法、除法、整除、取模 |\n| +, - | 加法、减法 |\n| <<, >> | 按位左移、按位右移 |\n\
    | & | 按位与 |\n| ^ | 按位异或 |\n| \\| | 按位或 |\n| ==, !=, >, >=, <, <=, is, is not,\
    \ in, not in | 比较、身份、成员运算符 |\n| not | 逻辑非 |\n| and | 逻辑与 |\n| or | 逻辑或 |\n\n由于上表将\
    \ `()` 列为最高优先级，因此可以使用它来将任何运算符的优先级更改为最高。写在圆括号 `()` 内的任何表达式都具有最高优先级，并首先被计算。\n\n\
    ```\nIn []: (5 / 2) * (2 + 5)\nOut[]: 17.5\n```\n\n在上面的例子中，计算顺序将是 `(5 / 2)` 得到\
    \ 2.5，然后是 `(2 + 5)` 计算为 7，最后 2.5 乘以 7，乘法运算符 `*` 输出结果为 17.5。\n\n## 6.3 关键要点\n\n\
    1.  关键字是 Python 中的保留字。在编写代码时，它们只能以某些预定义的方式使用。它们始终可用，不能用作变量名、类名、函数名或任何其他标识符。\n\
    2.  关键字区分大小写。除了 `True`、`False` 和 `None` 外，所有关键字均为小写。\n3.  在 Python 中，逻辑表达式从左到右计算。\n\
    4.  运算符是用于对变量和字面量执行操作的特殊构造或符号。\n5.  算术运算符用于执行各种数学运算。\n6.  比较运算符用于比较两个或多个值。它几乎适用于所有数据类型，并返回\
    \ `True` 或 `False` 作为输出。\n7.  逻辑运算符用于比较两个或多个条件语句或表达式。它们返回布尔值 `True` 或 `False`\
    \ 作为输出。\n8.  按位运算符作用于位并执行逐位操作。这些运算符对十进制数的二进制（0 和 1）等效值执行操作。\n9.  赋值运算符用于为变量赋值。\n\
    10. 成员运算符检查给定值是否存在于数据结构中。\n11. 身份运算符检查两个对象是否属于同一内存位置或引用同一实例。\n12. 每个运算符在 Python\
    \ 中都有特定的优先级。可以使用圆括号 `()` 来更改任何表达式的优先级。\n\n# 第 7 章\n\n## 控制流语句\n\n我们编写的代码按照它们被编写的顺序执行。换句话说，程序的*控制流*是程序代码执行的顺序。使用条件语句（如\
    \ `if` 语句）和循环，我们可以定义或改变代码的执行顺序。本节涵盖条件 `if` 语句以及 `for` 和 `while` 循环；函数将在下一节中介绍。引发和处理异常也会影响控制流，这将在后续章节中讨论。\n\
    \n## 7.1 条件语句\n\n通常需要代码仅在条件为真时执行，或者根据几个互斥的条件执行。Python 允许我们使用 `if` 语句来实现这种场景。\n\
    \n### 7.1.1 `if` 语句\n\n当我们希望代码仅在特定条件下执行时，可以使用 `if` 语句。它可以是单个条件或多个条件。仅当逻辑条件为真时，`if`\
    \ 块内的代码才会执行。我们使用比较运算符来检查条件的真假。`if` 语句将任何逻辑条件的输出计算为 `True` 或 `False`，如果条件计算为真，则执行\
    \ `if` 块内的代码。\n\n让我们考虑一个场景，如果 `buy_condition` 为真，我们希望做多一只股票。\n\n```\n# 当买入条件为真时买入股票\n\
    if buy_condition == True:\n    position = 'Buy'\n```\n\n在 Python 中，我们使用冒号 `:`\
    \ 来标记语句的结束和代码块的开始。这对于任何语句（如类或函数定义、条件语句、循环等）都是如此。注意 `if` 语句末尾的冒号，它标记了 `if` 块的开始。代码在块内缩进，以表示它属于特定的块。要结束块，我们只需编写没有缩进的代码即可。\n\
