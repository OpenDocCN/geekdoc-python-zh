    A set is an unordered and unindexed collection of items. It is a collection data
    type which is mutable, iterable and contains no duplicate values. A set in Python
    represents the mathematical notion of a set.


    In Python sets are written using the curly brackets in the following way:


    ```

    In []: universe ={''GOOG'', ''AAPL'', ''NFLX'', ''GE''}


    In []: universe

    Out[]: {''AAPL'', ''GE'', ''GOOG'', ''NFLX''}

    ```


    We cannot access items in a set by referring to an index (slicing operation),
    since sets are unordered the item has no index. But we can loop through all items
    using the for loop which will be discussed in the upcoming section. Once a set
    set is created, we cannot change its items, but we can add new items using the
    add() method.'
