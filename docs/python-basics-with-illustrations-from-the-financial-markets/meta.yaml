- md: "## 6.2 Operators\n\nOperators are constructs or special symbols which can manipulate\
    \ or compute the values of operands in an expression. In other words, they are\
    \ used to perform operations on variables and values. Python provides a bunch\
    \ of different operators to perform a variety of operations. They are broadly\
    \ categorized into the following:\n\n## 6.2.1 Arithmetic operators\n\nArithmetic\
    \ operators are used with numerical values to perform the common mathematical\
    \ operations.\n\n- + : This is an addition operator used to perform the addition\
    \ between values.\n\n  ```\n  In []: 5 + 3\n  Out[]: 8\n  ```\n\n- - : This is\
    \ a subtraction operator used to perform the subtraction between operands.\n\n\
    \  ```\n  In []: 5 - 2\n  Out[]: 3\n  ```\n\n- * : This is a multiplication operator\
    \ used to multiply the operands.\n\n  ```\n  In []: 5 * 2\n  Out[]: 10\n  ```\n\
    \n- / : This is a division operator which performs the division operation and\
    \ returns a float output.\n\n  ```\n  In []: 10 / 2\n  Out[]: 5.0\n  ```\n\n-\
    \ % : This is a modulus operator. It returns the remainder of the division operation.\n\
    \n  ```\n  In []: 16 % 5\n  Out[]: 1\n  ```\n\n- ** : This operator is used to\
    \ perform the exponentiation operation, sometimes referred to as the *raised to\
    \ power* operation. This essentially performs the operation of raising one quantity\
    \ to the power of another quantity.\n\n  ```\n  In []: 2 ** 3\n  Out[]: 8\n\n\
    \  In []: 3 ** 2\n  Out[]: 9\n  ```\n\n- // : This operator is used to perform\
    \ the floor division operation and it returns the integer output.\n\n  ```\n \
    \ # Floor division operation\n  In []: 10 // 4\n  Out[]: 2\n\n  # Normal division\
    \ operation\n  In []: 10 / 4\n  Out[]: 2.5\n  ```\n\n## 6.2.2 Comparison operators\n\
    \nComparison operators are used to compare two or more values. It works with almost\
    \ all data types in Python and returns either True or False. We define the below\
    \ variables to understand these operators better.\n\n```\nIn []: a = 5\n\nIn []:\
    \ b = 3\n\nIn []: x = 5\n\nIn []: y = 8\n```\n\n- == : This is an *equal to* operator\
    \ used to check whether two values are equal or not. It returns true if values\
    \ are equal, false otherwise.\n\n  ```\n  In []: a == x\n  Out[]: True\n\n  In\
    \ []: a == b\n  Out[]: False\n  ```\n\n- != : This is a *not equal to* operator\
    \ and works exactly opposite to the above discussed *equal to* operator. It returns\
    \ True if values are not equal, and false otherwise.\n\n  ```\n  In []: a != x\n\
    \  Out[]: False\n\n  In []: a != b\n  Out[]: True\n  ```\n\n- > : This is a *greater\
    \ than* operator used to check whether one value is greater than another value.\
    \ It returns true if the first value is greater compared to the latter, false\
    \ otherwise.\n\n  ```\n  In []: y > x\n  Out[]: True\n\n  In []: b > y\n  Out[]:\
    \ False\n  ```\n\n- < : This is a *less than* operator used to check whether one\
    \ value is less than another value. It returns true if the first value is less\
    \ compared to the latter, false otherwise.\n\n  ```\n  In []: y < x\n  Out[]:\
    \ False\n\n  In []: b < y\n  Out[]: True\n  ```\n\n- >= : This is a *greater than\
    \ or equal to* operator used to check whether one value is greater than or equal\
    \ to another value or not. It returns true if the first value is either greater\
    \ than or equal to the latter value, false otherwise.\n\n  ```\n  In []: a >=\
    \ x\n  Out[]: True\n\n  In []: y >= a\n  Out[]: True\n\n  In []: b >= x\n  Out[]:\
    \ False\n  ```\n\n- <= : This is a *less than or equal to* operator used to check\
    \ whether one value is less than or equal to another value or not. It returns\
    \ true if the first value is either less than or equal to the latter value, false\
    \ otherwise.\n\n  ```\n  In []: a <= x\n  Out[]: True\n\n  In []: y <= a\n  Out[]:\
    \ False\n\n  In []: b <= x\n  Out[]: True\n  ```\n\n## 6.2.3 Logical operators\n\
    \nLogical operators are used to compare two or more conditional statements or\
    \ expressions, and returns boolean result.\n\n- and : This operator compares multiple\
    \ conditional statements and returns true if all statements results in true, and\
    \ false if any statement is false.\n\n  ```\n  In []: 5 == 5 and 3 < 5\n  Out[]:\
    \ True\n  ```\n\n  ```\n  In []: 8 >= 8 and 5 < 5\n  Out[]: False\n  ```\n\n \
    \ ```\n  In []: 5 > 3 and 8 == 8 and 3 <= 5\n  Out[]: True\n  ```\n\n- or : This\
    \ operator compares multiple conditional statements and returns true if at least\
    \ one of the statements is true, and false if all statements are false.\n\n  ```\n\
    \  In []: 5 == 5 or 3 > 5\n  Out[]: True\n  ```\n\n  ```\n  In []: 3 <= 3 or 5\
    \ < 3 or 8 < 5\n  Out[]: True\n  ```\n\n  ```\n  In []: 3 < 3 or 5 < 3 or 8 <\
    \ 5\n  Out[]: False\n  ```\n\n- not : This operator reverses the result. It returns\
    \ true if the result is false, and vice versa.\n\n  ```\n  In []: 3 == 3\n  Out[]:\
    \ True\n  ```\n\n  ```\n  In []: not 3 == 3\n  Out[]: False\n  ```\n\n  ```\n\
    \  In []: 3 != 3\n  Out[]: False\n  ```\n\n  ```\n  In []: not 3 != 3\n  Out[]:\
    \ True\n  ```\n\n## 6.2.4 Bitwise operator\n\nBitwise operators are used to compare\
    \ and perform logical operations on binary numbers. Essentially operations are\
    \ performed on each bit of a binary number instead of a number. Binary numbers\
    \ are represented by a combination of 0 and 1. For better understanding, we define\
    \ following numbers (integers) and their corresponding binary numbers.\n\n| Number\
    \ | Binary |\n|---|---|\n| 201 | 1100 1001 |\n| 15 | 0000 1111 |\n\nIn the above\
    \ example, both 201 and 15 are represented by 8 bits. Bitwise operators work on\
    \ multi-bit values, but conceptually one bit at a time. In other words, these\
    \ operator works on 0 and 1 representation of underlying numbers.\n\n- & : This\
    \ is a bitwise *AND* operator that returns 1 only if *both* of its inputs are\
    \ 1, 0 otherwise. Below is the truth table for the & operator with four bits.\n\
    \n  | Bits | 1 2 3 4 |\n  |---|---|\n  | *Input 1* | 0 0 1 1 |\n  | *Input 2*\
    \ | 0 1 0 1 |\n  | *& Output* | 0 0 0 1 |\n\n  We can compute the bitwise & operation\
    \ between 201 and 15 as follows:\n\n  ```\n  In []: 201 & 15\n  Out[]: 9\n  ```\n\
    \n  Let us understand with the help of a truth table, how Python returned the\
    \ value 9.\n\n  | | Binary Numbers |\n  |---|---|\n  | *Input 1* | 201 | 1100\
    \ 1001 |\n  | *Input 2* | 15 | 0000 1111 |\n  | *& Output* | 9 | 0000 1001 |\n\
    \n  Python evaluated & operation based on each bit of inputs and re-\n\nThe `or`\
    \ keyword is a logical operator used to check multiple conditional statements\
    \ and it returns True if at least one statement is True, False otherwise.\n\n\
    ```\nIn []: (5 > 3) or (4 < 2)\nOut[]: True\n```\n\nThe `pass` keyword is used\
    \ as a placeholder for a null statement. It does nothing when used. If we have\
    \ empty function definition, Python will return an error. Hence, it can be used\
    \ as a placeholder in an empty function.\n\n```\nIn []: def empty_function():\n\
    \    ...:\n    ...:\n    ...:\nIn []: empty_function()\n\nFile \"<ipython-input-49>\"\
    , line 5\n    empty_function()\n    ^\nIndentationError: expected an indented\
    \ block\n\nIn []: def empty_function():\n    ...:     pass\n    ...:\n    ...:\n\
    \    ...: empty_function()\n```\n\nThe `raise` keyword is used to raise an error\
    \ explicitly in a code.\n\n```\nIn []: x = 'Python'\n\nIn []: if not type(x) is\
    \ int:\n    ...:     raise TypeError('Only integers are allowed')\n    ...:\n\
    Traceback (most recent call last):\n\nFile \"<ipython-input-52>\", line 2, in\
    \ <module>\n    raise TypeError('Only integers are allowed')\n```\n\nTypeError:\
    \ Only integers are allowed\n\nThe `return` keyword is used to return a value\
    \ from a function or method.\n\n```\nIn []: def addition(a, b):\n    ...:    \
    \ return a + b\n    ...:\n\nIn []: addition(2, 3)\nOut[]: 5\n```\n\nThe `with`\
    \ keyword is used to wrap the execution of a block with methods defined by a context\
    \ manager¹. It simplifies exception handling by encapsulating common preparation\
    \ and cleanup tasks. For example, the open() function is a context manager in\
    \ itself, which allows opening a file, keeping it open as long as the execution\
    \ is in context of the with, and closing it as soon as we leave the context. So\
    \ simply put, some resources are acquired by the with statement and released when\
    \ we leave the with context.\n\n```\n# Open the file 'abc.txt' using the 'with'\
    \ keyword in the\n# append mode\nIn []: with open('abc.txt', 'a') as file:\n \
    \   ...:     # Append the file\n    ...:     file.write('Hello Python')\n    ...:\n\
    \    ...:\n\n# We do not need to close the file as it will be called\n# automatically\
    \ as soon as we leave the 'with' block\n\n# Open the file in the read mode\nIn\
    \ []: with open('abc.txt', 'r') as file:\n    ...:     print(file.readline())\n\
    \    ...:\n    ...:\nOut[]: Hello Python\n```\n\n¹https://docs.python.org/3/reference/datamodel.html#context-managers"
  mdcn: "## 6.2 运算符\n\n运算符是用于操作或计算表达式中操作数值的构造或特殊符号。换句话说，它们用于对变量和值执行操作。Python 提供了多种不同的运算符来执行各种操作。它们大致可分为以下几类：\n\
    \n## 6.2.1 算术运算符\n\n算术运算符用于数值，以执行常见的数学运算。\n\n- + : 这是一个加法运算符，用于执行值之间的加法。\n\n \
    \ ```\n  In []: 5 + 3\n  Out[]: 8\n  ```\n\n- - : 这是一个减法运算符，用于执行操作数之间的减法。\n\n\
    \  ```\n  In []: 5 - 2\n  Out[]: 3\n  ```\n\n- * : 这是一个乘法运算符，用于将操作数相乘。\n\n  ```\n\
    \  In []: 5 * 2\n  Out[]: 10\n  ```\n\n- / : 这是一个除法运算符，执行除法运算并返回浮点数输出。\n\n  ```\n\
    \  In []: 10 / 2\n  Out[]: 5.0\n  ```\n\n- % : 这是一个取模运算符。它返回除法运算的余数。\n\n  ```\n\
    \  In []: 16 % 5\n  Out[]: 1\n  ```\n\n- ** : 此运算符用于执行幂运算，有时也称为*乘方*运算。它本质上执行将一个量提升到另一个量的幂次的操作。\n\
    \n  ```\n  In []: 2 ** 3\n  Out[]: 8\n\n  In []: 3 ** 2\n  Out[]: 9\n  ```\n\n\
    - // : 此运算符用于执行整除运算，并返回整数输出。\n\n  ```\n  # 整除运算\n  In []: 10 // 4\n  Out[]: 2\n\
    \n  # 普通除法运算\n  In []: 10 / 4\n  Out[]: 2.5\n  ```\n\n## 6.2.2 比较运算符\n\n比较运算符用于比较两个或多个值。它适用于\
    \ Python 中几乎所有数据类型，并返回 True 或 False。我们定义以下变量以更好地理解这些运算符。\n\n```\nIn []: a = 5\n\
    \nIn []: b = 3\n\nIn []: x = 5\n\nIn []: y = 8\n```\n\n- == : 这是一个*等于*运算符，用于检查两个值是否相等。如果值相等则返回\
    \ true，否则返回 false。\n\n  ```\n  In []: a == x\n  Out[]: True\n\n  In []: a == b\n\
    \  Out[]: False\n  ```\n\n- != : 这是一个*不等于*运算符，其工作方式与上述*等于*运算符完全相反。如果值不相等则返回 True，否则返回\
    \ false。\n\n  ```\n  In []: a != x\n  Out[]: False\n\n  In []: a != b\n  Out[]:\
    \ True\n  ```\n\n- > : 这是一个*大于*运算符，用于检查一个值是否大于另一个值。如果第一个值大于后者，则返回 true，否则返回 false。\n\
    \n  ```\n  In []: y > x\n  Out[]: True\n\n  In []: b > y\n  Out[]: False\n  ```\n\
    \n- < : 这是一个*小于*运算符，用于检查一个值是否小于另一个值。如果第一个值小于后者，则返回 true，否则返回 false。\n\n  ```\n\
    \  In []: y < x\n  Out[]: False\n\n  In []: b < y\n  Out[]: True\n  ```\n\n- >=\
    \ : 这是一个*大于或等于*运算符，用于检查一个值是否大于或等于另一个值。如果第一个值大于或等于后者，则返回 true，否则返回 false。\n\n \
    \ ```\n  In []: a >= x\n  Out[]: True\n\n  In []: y >= a\n  Out[]: True\n\n  In\
    \ []: b >= x\n  Out[]: False\n  ```\n\n- <= : 这是一个*小于或等于*运算符，用于检查一个值是否小于或等于另一个值。如果第一个值小于或等于后者，则返回\
    \ true，否则返回 false。\n\n  ```\n  In []: a <= x\n  Out[]: True\n\n  In []: y <= a\n\
    \  Out[]: False\n\n  In []: b <= x\n  Out[]: True\n  ```\n\n## 6.2.3 逻辑运算符\n\n\
    逻辑运算符用于比较两个或多个条件语句或表达式，并返回布尔结果。\n\n- and : 此运算符比较多个条件语句，如果所有语句结果都为 true，则返回 true；如果任何语句为\
    \ false，则返回 false。\n\n  ```\n  In []: 5 == 5 and 3 < 5\n  Out[]: True\n  ```\n\
    \n  ```\n  In []: 8 >= 8 and 5 < 5\n  Out[]: False\n  ```\n\n  ```\n  In []: 5\
