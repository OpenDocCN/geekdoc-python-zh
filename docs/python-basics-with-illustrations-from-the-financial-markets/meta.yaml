    \ '00 00 00 00' # Replace 1 with 0\n\n- `split(delim)` method: This method is\
    \ used to split a string into multiple strings based on the delim argument.\n\n\
    \    In []: 'AAPL MSFT GOOG'.split(' ')\n    Out[]: ['AAPL', 'MSFT', 'GOOG']\n\
    \nHere, the Python outputs three strings in a single data structure called List.\
    \ We will learn list in more detail in the upcoming section.\n\n- `index(character)`\
    \ method: This method returns the index of the first occurrence of the character.\n\
    \n    In []: 'EPAT Handbook!'.index('P')\n    Out[]: 1\n\nPython will provide\
    \ an error if the character provided as an argument is not found within the string.\n\
    \n    In []: 'EPAT Handbook!'.index('Z')\n    Traceback (most recent call last):\n\
    \n    File \"<ipython-input-52>\", line 1, in <module>\n        'EPAT Handbook!'.index('Z')\n\
    \n    ValueError: substring not found\n\n- `capitalize()` method: This method\
    \ returns a capitalized version of the string.\n\n    In []: 'python is amazing!'.capitalize()\n\
    \    Out[]: 'Python is amazing!'\n\n- `count(character)` method: This method returns\
    \ a count of an argument provided by character.\n\n    In []: 'EPAT Handbook'.count('o')\n\
    \    Out[]: 2\n\n    In []: 'EPAT Handbook'.count('a')\n    Out[]: 1\n\n## 3.2.6\
    \ type() function\n\nThe inbuilt type(argument) function is used to evaluate the\
    \ data type and returns the class type of the argument passed as a parameter.\
    \ This function is mainly used for debugging.\n\n    # A string is represented\
    \ by the class 'str'.\n    In []: type('EPAT Handbook')\n    Out[]: str\n\n  \
    \  # A float literal is represented by the class 'float'.\n    In []: type(224.61)\n\
    \    Out[]: float\n\n    # An integer literal is represented by the class 'int'.\n\
    \    In []: type(224)\n    Out[]: int\n\n    # An argument provided is within\
    \ quotation marks.\n    In []: type('0')\n    Out[]: str\n\n    # A boolean value\
    \ is represented by the class 'bool'.\n    In []: type(True)\n    Out[]: bool\n\
    \n    In []: type(False)\n    Out[]: bool\n\n    # An argument is provided within\
    \ a quotation mark.\n    In []: type('False')\n    Out[]: str\n\n    # An object\
    \ passed as an argument belongs to the\n    # class 'list'.\n    In []: type([1,\
    \ 2, 3])\n    Out[]: list\n\n    # An object passed as an argument belongs to\
    \ the\n    # class 'dict'.\n    In []: type({'key':'value'})\n    Out[]: dict\n\
    \n    # An object passed as an argument belongs to the\n    # class 'tuple'.\n\
    \    In []: type((1, 2, 3))\n    Out[]: tuple\n\n    # An object passed as an\
    \ argument belongs to the\n    # class 'set'.\n    In []: type({1, 2, 3})\n  \
    \  Out[]: set\n\nA list, dict, tuple, set are native data structures within Python.\
    \ We will learn these data structures in the upcoming section.\n\n## 3.3 Type\
    \ Conversion\n\nWe often encounter situations where it becomes necessary to change\
    \ the data type of the underlying data. Or maybe we find out that we have been\
    \ using an integer when what we really need is a float. In such cases, we can\
    \ convert the data types of variables. We can check the data type of a variable\
    \ using type() function as seen above.\n\nThere can be two types of conversion\
    \ possible: *implicit* termed as coercion, and *explicit* often referred to as\
    \ casting. When we change the type of a variable from one to another, this is\
    \ called *typecasting*.\n\n**Implicit Conversion:** This is an automatic type\
    \ conversion and the Python interpreter handles this on the fly for us. We need\
    \ not to specify any command or function for same. Take a look at the following\
    \ example:\n\n    In []: 8 / 2\n    Out[]: 4.0\n\nThe division operation performed\
    \ between two integers 8 being a dividend and 2 being a divisor. Mathematically,\
    \ we expect the output to be 4 - an integer value, but instead, Python returned\
    \ the output as 4.0 - a float value. That is, Python internally converted an integer\
    \ 4 to float 4.0.\n\n**Explicit Conversion** : This type of conversion is user-defined.\
    \ We need to explicitly change the data type for certain literals to make it compatible\
    \ for data operations. Let us try to concatenate a string and an integer using\
    \ the + operator.\n\n    In []: 'This is the year ' + 2019\n    Traceback (most\
    \ recent call last):\n\n    File \"<ipython-input-68>\", line 1, in <module>\n\
    \        'This is the year ' + 2019\n\n    TypeError: must be str, not int\n\n\
    Here we attempted to join a string 'This is the year ' and an integer 2019. Doing\
    \ so, Python threw an error TypeError stating incompatible data types. One way\
    \ to perform the concatenation between the two is to convert the data type of\
    \ 2019 to string explicitly and then perform the operation. We use str() to convert\
    \ an integer to string.\n\n    In []: 'This is the year ' + str(2019)\n    Out[]:\
    \ 'This is the year 2019'\n\nSimilarly, we can explicitly change the data type\
    \ of literals in the following manner.\n\n    # Integer to float conversion\n\
    \    In []: float(4)\n    Out[]: 4.0\n\n    # String to float conversion\n   \
    \ In []: float('4.2')\n    Out[]: 4.2\n\n    In []: float('4.0')\n    Out[]: 4.0\n\
    \n    # Float to integer conversion\n    In []: int(4.0)\n    Out[]: 4 # Python\
    \ will drop the fractional part.\n\n    In []: int(4.2)\n    Out[]: 4\n\n    #\
    \ String to integer conversion\n    In []: int('4')\n    Out[]: 4\n\n    # Python\
    \ does not convert a string literal with a\n    # fractional part, and instead,\
    \ it will throw an error.\n    In []: int('4.0')\n    Traceback (most recent call\
    \ last):\n\n    File \"<ipython-input-75>\", line 1, in <module>\n        int('4.0')\n\
    \n    ValueError: invalid literal for int() with base 10: '4.0'\n\n    # Float\
    \ to string conversion\n    In []: str(4.2)\n    Out[]: '4.2'\n\n    # Integer\
    \ to string conversion\n    In []: str(4)\n    Out[]: '4'\n\nIn the above example,\
    \ we have seen how we can change the data type of literals from one to another.\
    \ Similarly, the boolean data type represented by bool is no different. We can\
    \ typecast bool to int as we do for the rest. In fact, Python internally treats\
    \ the boolean value False as 0 and True as 1."
