    \  Out[]: True\n  ```\n\n  ```\n  In []: 3 <= 3 or 5 < 3 or 8 < 5\n  Out[]: True\n\
    \  ```\n\n  ```\n  In []: 3 < 3 or 5 < 3 or 8 < 5\n  Out[]: False\n  ```\n\n-\
