    # 输出：False

    ```


    正如我们将在后续章节中看到的，Python 中的表达式通常在布尔上下文中进行求值，这意味着它们被解释为表示其真值。布尔表达式广泛用于逻辑条件和控制流语句中。考虑以下示例：


    ```python

    # 使用比较运算符 ''=='' 检查 1 是否等于自身。

    1 == 1

    # 输出：True


    # 检查值 1 和 -1 是否相等

    1 == -1

    # 输出：False


    # 比较值 1 和 -1

    1 > -1

    # 输出：True

    ```


