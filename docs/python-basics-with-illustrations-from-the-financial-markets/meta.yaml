    # 4.6 Key Takeaways


    +   1. A module is a Python file which can be referenced and used in other Python
    code.

    2. A single module can also have multiple Python files grouped together.

    3. A collection of modules are known as packages or libraries. The words library
    and package are used interchangeably.

    4. Python comes with a large set of built-in libraries known as the Python Standard
    Library.

    5. Modules in Python Standard Library provides access to core system functionality
    and solutions for many problems that occur in everyday programming.

    6. The `sys` library is present in every Python installation irrespective of the
    distribution and underlying architecture and it acts as an intermediary between
    the system and Python.

    7. In addition to built-in libraries, additional third-party/external libraries
    can be installed using either the pip or conda package managers.

    8. The pip command comes pre-installed for Python version >= 2.7 or Python >=3.4

    9. A library (either built-in or external) needs to be imported into Python code
    before it can be used. It can be achieved using `import library_name` keyword.

    10. It is a good idea to alias the library name that we import using an `as` keyword.

    11. It is always a good programming practice to selectively import only those
    modules which are required, instead of importing the whole library.

    12. Python will look out for the library being imported in the module search path.
    If the library is not available in any of the paths listed by module search path,
    Python will throw an error.

    13. The `dir()` function is used to list all attributes and methods of an object.
    If a library name is passed as an argument to the `dir()`, it returns sub-modules
    and functions of the library.'
