    \ asset under consideration. We will look at these things in more detail when\
    \ we discuss *pandas* and *numpy* libraries.\n\n## 6.2.5 Assignment operators\n\
    \nAs the name suggests, assignment operators are used to assign values to variables.\n\
    \n+   - = : This operator assigns the value on its right side to the operand on\
    \ its left.\n\n```\nIn []: a = 5\nIn []: b = 3\n```\n\nWe can also use this operator\
    \ to assign multiple values to multiple operands on the left side. Number of values\
    \ and operands must be same on both sides, else Python will throw an error.\n\n\
    ```\nIn []: a, b = 5, 3\n\n# Error line. Number of operands on both sides should\n\
