    the highest precedence. Following table lists the operators from highest precedence
    to lowest.


    | Operators | Precedence |

    | :--- | :--- |

    | () | Parentheses |

    | ** | Exponential |

    | +, -, ~ | Positive, Negative, Bitwise NOT |

    | *, /, //, % | Multiplication, Division, Floor Division, Modulus |

    | +, - | Addition, Subtraction |

    | <<, >> | Bitwise Left, Bitwise Right |

    | & | Bitwise AND |

    | ^ | Bitwise XOR |

    | | | Bitwise OR |

    | ==, !=, >, >=, <, <=, is, is not, in, not in | Comparison, Identity, Membership
    Operators |

    | not | Logical NOT |

    | and | Logical AND |

    | or | Logical OR |'
