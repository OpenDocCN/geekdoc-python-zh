    # 12.1.1 Axes


    All plotting happens with respect to an Axes. An Axes is made up of Axis objects
    and many other things. An Axes object must belong to a Figure. Most commands that
    we will ever issue will be with respect to this Axes object. Typically, we will
    set up a Figure, and then add Axes on to it. We can use fig.add_axes but in most
    cases, we find that adding a subplot fits our need perfectly. A subplot is an
    axes on a grid system.


    +   - add_subplot method adds an Axes to the figure as part of a subplot arrangement.


    ```

    # -Example 1-

    # Creating figure

    fig = plt.figure()


    # Creating subplot

    # Sub plot with 1 row and 1 column at the index 1

    ax = fig.add_subplot(111)

    plt.show()

    ```


    The above code adds a single plot to the figure fig with the help of add_subplot()
    method. The output we get is a blank plot with axes ranging from 0 to 1 as shown
    in figure 1.'
