    # Chapter 6


    # Keywords & Operators


    Python is a high-level language that that allows us to nearly write programs in
    a natural language like English. However, there are certain words and symbols
    used internally by Python which carry a definite unambiguous meaning. They can
    be used only in certain pre-defined ways when we program. We will explore such
    words known as keywords and various operators in this section.


    # 6.1 Python Keywords


    Keywords are reserved (plainspeak for ‘set aside’ or ‘on hold’) words in Python.
    They are built into the core language. They cannot be used as a variable name,
    class name, function name or any other identifier. These keywords are used to
    define the syntax and semantics of the Python.


    Since Python is case-sensitive, so are the keywords. All keywords are in lowercase
    except True, False and None. In this section, we will learn various keywords.


    +   - The and keyword is a logical operator used to combine conditional statements
    and it returns True if both statements are True, False otherwise.


    ```

    In []: (5 > 3) and (4 > 2)

    Out[]: True

    ```'
