    \ return the element from sequence at index i. We can access multiple elements\
    \ from the sequence using the syntax [start index : end index] in the following\
    \ manner:\n\n```\nsequence[si : ei]\n```\n\nThe above statement will return values\
    \ starting at index si up to but NOT including the element at index ei. This operation\
    \ is referred to as *slicing*. For example:\n\n```\nsequence[0:4] will return\
    \ elements from 'A' to 'D' and not up to 'E'. Element at the last index in the\
    \ provided range will not be returned.\n```\n\nPython also supports negative indexing\
    \ to access elements from the sequence end and it starts with -1 as follows:\n\
