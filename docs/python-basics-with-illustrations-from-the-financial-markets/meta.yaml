    As can be seen in the above example, performing the + operation with list_1 and
    list_2, the list elements are pasted together, generating a list with 6 elements.
    On the other hand, if we do this with NumPy arrays, Python will do an element-wise
    sum of the arrays.


    # 10.1.1 N-dimensional arrays


    Until now we have worked with two arrays: n_put_vol and n_call_vol. If we are
    to check its type using type(), Python tells us that they are of type numpy.ndarray
    as shown below:


    ```

    # Checking array type

    In []: type(n_put_vol)

    Out[]: numpy.ndarray

    ```


    Based on the output we got, it can be inferred that they are of data type ndarray
    which stands for *n-dimensional array* within NumPy. These arrays are one-dimensional
    arrays, but NumPy also allows us to create two dimensional, three dimensional
    and so on. We will stick to two dimensional for our learning purpose in this module.
    We can create a 2D (two dimensional) NumPy array from a regular Python list of
    lists. Let us create one array for all put and call volumes.


    ```

    # Recalling put and call volumes lists

    In []: put_vol

    Out[]: [52.89, 45.14, 63.84, 77.1, 74.6]


    In []: call_vol

    Out[]: [49.51, 50.45, 59.11, 80.49, 65.11]

    ```'
