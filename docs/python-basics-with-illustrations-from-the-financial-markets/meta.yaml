    # 12.2 Plotting


    We have discussed a lot about laying things out, but we haven’t really discussed
    anything about plotting data yet. Matplotlib has various plotting functions. Many
    more than we will discuss and cover here. However, a full list or gallery¹ can
    be a bit overwhelming at first. Hence, we will condense it down and attempt to
    start with simpler plotting and than move towards more complex plotting. The plot
    method of pyplot is one of the most widely used methods in Matplotlib to plot
    the data. The syntax to call the plot method is shown below:


    ```

    plot([x], y, [fmt], data=None, **kwargs)

    ```


    The coordinates of the points or line nodes are given by $x$ and $y$. The optional
    parameter $fmt$ is a convenient way of defining basic formatting like color, market,
    and style. The plot method is used to plot almost any kind of data in Python.
    It tells Python what to plot and how to plot it, and also allows customization
    of the plot being generated such as color, type, etc.


    ¹https://matplotlib.org/gallery/index.html'
