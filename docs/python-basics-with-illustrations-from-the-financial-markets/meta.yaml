    \ other files.\n\nIn the Python world, the zip function works more or less as\
    \ a container for iterables instead of real files. The syntax for the zip is shown\
    \ below:\n\n```\nzip(*iterables)\n```\n\nIt takes an iterable as an input and\
    \ returns the iterator that aggregates elements from each of the iterable. The\
    \ output contains the iterator of a tuple. The *i-th* element in the iterator\
    \ is the tuple consisting the *i-th* element from each input. If the iterables\
    \ in the input are of unequal sizes, the output iterator stops when the shortest\
    \ input iterable is exhausted. With no input, it returns an empty iterator. Let\
    \ us understand the working of zip with the help of an example.\n\n```\n# Defining\
    \ iterables for the input\ntickers = ['AAPL', 'MSFT', 'GOOG']\ncompanies = ['Apple\
    \ Inc', 'Microsoft Corporation',\n            'Alphabet Inc']\n\n# Zipping the\
    \ above defined iterables using the 'zip'\nzipped = zip(tickers, companies)\n\
    ```\n\nWe define two lists tickers and companies which are used as an input to\
    \ the zip. The zipped object is the iterator of type zip and hence we can iterate\
    \ either over it using a looping technique to print its content:\n\n```\n# Iterating\
    \ over a zipped object\nfor ticker, company in zipped:\n    print('Ticker name\
    \ of {} is {}.'.format(ticker,\n        company))\n\n# Output\nTicker name of\
    \ AAPL is Apple Inc.\nTicker name of MSFT is Microsoft Corporation.\nTicker name\
    \ of GOOG is Alphabet Inc.\n```\n\nor cast it to sequential data structures such\
    \ as list or tuple easily."
- md: "# Casting the zip object to a list and printing it\nprint(list(zipped))\n\n\
    # Output\n[('AAPL', 'Apple Inc.'),\n ('MSFT', 'Microsoft Corporation'),\n ('GOOG',\
    \ 'Alphabet Inc.')]\n\nAs we should expect, the zipped object contains a sequence\
    \ of tuples where elements are from the corresponding inputs. A zip object in\
    \ conjunction with * unzips the elements as they were before. For example:\n\n\
    # Unzipping the zipped object\nnew_tickers, new_companies = zip(*zipped)\n\n#\
    \ Printing new unzipped sequences\nprint(new_tickers)\n('AAPL', 'MSFT', 'GOOG')\n\
    \nprint(new_companies)\n('Apple Inc.', 'Microsoft Corporation', 'Alphabet Inc.')\n\
    \nWe unzip the zip object zipped to two sequences new_tickers and new_companies.\
    \ By printing these sequences, we can see that the operation got successful and\
    \ elements got unzipped successfully into respective tuples.\n\n## 9.5 Key Takeaways\n\
    \n1. A function is a block of statements that can be reused as and when required.\n\
    2. There are three types of functions available in Python: Built-in functions,\
    \ User-defined functions and anonymous functions using the lambda keyword.\n3.\
    \ Python provides various built-in functions to perform common programming tasks\
    \ such as print(), len(), dir(), type(), etc.\n4. User-defined functions are defined\
    \ using the keyword def.\n5. Functions may take zero or more arguments. Arguments\
    \ are specified while defining a function within parentheses ().\n6. It is possible\
    \ that arguments take some default value in the function definition. Such arguments\
    \ are called default arguments.\n7. Functions can return a value using the keyword\
    \ `return`.\n8. Functions can have variable-length arguments. There are two types\
    \ of such arguments:\n    (a) An argument that is preceded by `*` in the function\
    \ definition can have a flexible number of values within it. And gets unpacked\
    \ to a tuple inside a function.\n    (b) An argument that is preceded by `**`\
    \ in the function definition can have a flexible number of key-value pairs and\
    \ gets unpacked to a dictionary inside a function.\n9. A docstring is used to\
    \ document a function and is written within triple single/double quotes. It can\
    \ be accessed by the `__doc__` attribute on the function name.\n10. Docstrings\
    \ can be used to document modules and classes as well.\n11. A namespace is a naming\
    \ system in Python to avoid ambiguity between names (variable names, object names,\
    \ module names, class names, etc.).\n12. A scope is a region of a Python program\
    \ where a namespace is directly accessible.\n13. The `global` keyword is used\
    \ when a variable that is defined outside a function and needs to be accessed\
    \ from within a function.\n14. The `lambda` keyword is used to create anonymous\
    \ functions. Such functions are created during the run time and do not have any\
    \ name associated with them.\n15. `map()`, `filter()` and `zip()` functions are\
    \ often used with anonymous functions.\n\n# Chapter 10\n\n## NumPy Module\n\n\
    NumPy, an acronym for *Numerical Python*, is a package to perform scientific computing\
    \ in Python efficiently. It includes random number generation capabilities, functions\
    \ for basic linear algebra, Fourier transforms as well as a tool for integrating\
    \ Fortran and C/C++ code along with a bunch of other functionalities.\n\nNumPy\
    \ is an open-source project and a successor to two earlier scientific Python libraries:\
    \ *Numeric* and *Numarray*.\n\nIt can be used as an efficient multi-dimensional\
    \ container of generic data. This allows NumPy to integrate with a wide variety\
    \ of databases seamlessly. It also features a collection of routines for processing\
    \ single and multidimensional vectors known as arrays in programming parlance.\n\
    \nNumPy is not a part of the Python Standard Library and hence, as with any other\
    \ such library or module, it needs to be installed on a workstation before it\
    \ can be used. Based on the Python distribution one uses, it can be installed\
    \ via a command prompt, conda prompt, or terminal using the following command.\
    \ *One point to note is that if we use the Anaconda distribution to install Python,\
    \ most of the libraries (like NumPy, pandas, scikit-learn, matplotlib, etc. )\
    \ used in the scientific Python ecosystem come pre-installed.*\n\n```\npip install\
    \ numpy\n```\n\n**NOTE:** If we use the Python or iPython console to install the\
    \ NumPy library, the command to install it would be preceded by the character\
    \ !.\n\nOnce installed we can use it by importing into our program by using the\
    \ import statement. The de facto way of importing is shown below:\n\n```\nimport\
    \ numpy as np\n```\n\nHere, the NumPy library is imported with an alias of np\
    \ so that any functionality within it can be used with convenience. We will be\
    \ using this form of alias for all examples in this section.\n\n### 10.1 NumPy\
    \ Arrays\n\nA Python list is a pretty powerful sequential data structure with\
    \ some nifty features. For example, it can hold elements of various data types\
    \ which can be added, changed or removed as required. Also, it allows index subsetting\
    \ and traversal. But lists lack an important feature that is needed while performing\
    \ data analysis tasks. We often want to carry out operations over an entire collection\
    \ of elements, and we expect Python to perform this fast. With lists executing\
    \ such operations over all elements efficiently is a problem. For example, let's\
    \ consider a case where we calculate PCR (Put Call Ratio) for the previous 5 days.\
    \ Say, we have put and call options volume (in Lacs) stored in lists call_vol\
    \ and put_vol respectively. We then compute the PCR by dividing put volume by\
    \ call volume as illustrated in the below script:\n\n```\n# Put volume in lacs\n\
    In []: put_vol = [52.89, 45.14, 63.84, 77.1, 74.6]\n\n# Call volume in lacs\n\
    In []: call_vol = [49.51, 50.45, 59.11, 80.49, 65.11]\n\n# Computing Put Call\
    \ Ratio (PCR)\nIn []: put_vol / call_vol\nTraceback (most recent call last):\n\
    \nFile \"<ipython-input-12>\", line 1, in <module>\n    put_vol / call_vol\nTypeError:\
    \ unsupported operand type(s) for /: 'list' and 'list'\n```\n\nUnfortunately,\
    \ Python threw an error while calculating PCR values as it has no idea on how\
    \ to do calculations on lists. We can do this by iterating over each item in lists\
    \ and calculating the PCR for each day separately. However, doing so is inefficient\
    \ and tiresome too. A way more elegant solution is to use NumPy arrays, an alternative\
    \ to the regular Python list.\n\nThe NumPy array is pretty similar to the list,\
    \ but has one useful feature: we can perform operations over entire arrays(all\
    \ elements in arrays). It's easy as well as super fast. Let us start by creating\
    \ a NumPy array. To do this, we use array() function from the NumPy package and\
    \ create the NumPy version of put_vol and call_vol lists.\n\n```\n# Importing\
    \ NumPy library\nIn []: import numpy as np\n\n# Creating arrays\nIn []: n_put_vol\
    \ = np.array(put_vol)\n\nIn []: n_call_vol = np.array(call_vol)\n\nIn []: n_put_vol\n\
    Out[]: array([52.89, 45.14, 63.84, 77.1 , 74.6 ])\n\nIn []: n_call_vol\nOut[]:\
    \ array([49.51, 50.45, 59.11, 80.49, 65.11])\n```\n\nHere, we have two arrays\
    \ n_put_vol and n_call_vol which holds put and call volume respectively. Now,\
    \ we can calculate PCR in one line:\n\n```\n# Computing Put Call Ratio (PCR)\n\
    In []: pcr = n_put_vol / n_call_vol\n\nIn []: pcr\nOut[]: array([1.06826904, 0.89474727,\
    \ 1.0800203,\n             0.95788297, 1.14575334])\n```\n\nThis time it worked,\
    \ and calculations were performed element-wise. The first observation in pcr array\
    \ was calculated by dividing the first element in n_put_vol by the first element\
    \ in n_call_vol array. The second element in pcr was computed using the second\
    \ element in the respective arrays and so on.\n\nFirst, when we tried to compute\
    \ PCR with regular lists, we got an error, because Python cannot do calculations\
    \ with lists like we want it to. Then we converted these regular lists to NumPy\
    \ arrays and the same operation worked without any problem. NumPy work with arrays\
    \ as if they are scalars. But we need to pay attention here. NumPy can do this\
    \ easily because it assumes that array can only contain values of a single type.\
    \ It's either an array of integers, floats or booleans and so on. If we try to\
    \ create an array of different types like the one mentioned below, the resulting\
    \ NumPy array will contain a single type only. String in the below case:\n\n```\n\
    In []: np.array([1, 'Python', True])\nOut[]: array(['1', 'Python', 'True'], dtype='<U11')\n\
    ```\n\n> NOTE: NumPy arrays are made to be created as homogeneous arrays, considering\
    \ the mathematical operations that can be performed on them. It would not be possible\
    \ with heterogeneous data sets.\n\nIn the example given above, an integer and\
    \ a boolean were both converted to strings. NumPy array is a new type of data\
    \ structure type like the Python list type that we have seen before. This also\
    \ means that it comes with its own methods, which will behave differently from\
    \ other types. Let us implement the + operation on the Python list and NumPy arrays\
    \ and see how they differ.\n\n```\n# Creating lists\nIn []: list_1 = [1, 2, 3]\n\
    \nIn []: list_2 = [5, 6, 4]\n\n# Adding two lists\nIn []: list_1 + list_2\nOut[]:\
    \ [1, 2, 3, 5, 6, 4]\n```"
  mdcn: "# 将 zip 对象转换为列表并打印\nprint(list(zipped))\n\n# 输出\n[('AAPL', 'Apple Inc.'),\n\
    \ ('MSFT', 'Microsoft Corporation'),\n ('GOOG', 'Alphabet Inc.')]\n\n正如我们所预期的，zip\
    \ 对象包含一系列元组，其中的元素来自对应的输入。一个 zip 对象与 * 结合使用，可以将元素解压缩回之前的状态。例如：\n\n# 解压缩 zip 对象\n\
    new_tickers, new_companies = zip(*zipped)\n\n# 打印新的解压缩序列\nprint(new_tickers)\n\
    ('AAPL', 'MSFT', 'GOOG')\n\nprint(new_companies)\n('Apple Inc.', 'Microsoft Corporation',\
    \ 'Alphabet Inc.')\n\n我们将 zip 对象 zipped 解压缩为两个序列 new_tickers 和 new_companies。通过打印这些序列，我们可以看到操作成功，元素已成功解压缩到各自的元组中。\n\
    \n## 9.5 关键要点\n\n1.  函数是一个可以在需要时重复使用的语句块。\n2.  Python 中有三种类型的函数：内置函数、使用 `def`\
    \ 关键字定义的用户自定义函数，以及使用 `lambda` 关键字定义的匿名函数。\n3.  Python 提供了多种内置函数来执行常见的编程任务，例如 `print()`、`len()`、`dir()`、`type()`\
    \ 等。\n4.  用户自定义函数使用关键字 `def` 来定义。\n5.  函数可以接受零个或多个参数。参数在定义函数时在圆括号 `()` 内指定。\n\
    6.  在函数定义中，参数可以具有默认值。这样的参数称为默认参数。\n7.  函数可以使用关键字 `return` 返回一个值。\n8.  函数可以有可变长度的参数。这类参数有两种类型：\n\
    \    (a) 在函数定义中以 `*` 为前缀的参数，可以接受任意数量的值，并在函数内部解包为一个元组。\n    (b) 在函数定义中以 `**` 为前缀的参数，可以接受任意数量的键值对，并在函数内部解包为一个字典。\n\
    9.  文档字符串用于记录函数，写在三重单引号或双引号内。可以通过函数名的 `__doc__` 属性来访问它。\n10. 文档字符串也可用于记录模块和类。\n\
    11. 命名空间是 Python 中的一个命名系统，用于避免名称（变量名、对象名、模块名、类名等）之间的歧义。\n12. 作用域是 Python 程序中一个可以直接访问命名空间的区域。\n\
    13. 当需要在函数内部访问在函数外部定义的变量时，使用 `global` 关键字。\n14. `lambda` 关键字用于创建匿名函数。这类函数在运行时创建，没有与之关联的名称。\n\
    15. `map()`、`filter()` 和 `zip()` 函数经常与匿名函数一起使用。\n\n# 第 10 章\n\n## NumPy 模块\n\n\
    NumPy，是 *Numerical Python*（数值 Python）的缩写，是一个用于在 Python 中高效执行科学计算的包。它包括随机数生成功能、基础线性代数函数、傅里叶变换，以及一个用于集成\
    \ Fortran 和 C/C++ 代码的工具，还有许多其他功能。\n\nNumPy 是一个开源项目，是两个早期科学 Python 库 *Numeric*\
    \ 和 *Numarray* 的后继者。\n\n它可以用作通用数据的高效多维容器。这使得 NumPy 能够与各种数据库无缝集成。它还包含一系列用于处理单维和多维向量（在编程术语中称为数组）的例程。\n\
    \nNumPy 不是 Python 标准库的一部分，因此，与任何其他此类库或模块一样，需要在工作站上安装后才能使用。根据所使用的 Python 发行版，可以通过命令提示符、conda\
    \ 提示符或终端使用以下命令进行安装。*需要注意的一点是，如果我们使用 Anaconda 发行版来安装 Python，科学 Python 生态系统中使用的大多数库（如\
    \ NumPy、pandas、scikit-learn、matplotlib 等）都是预装的。*\n\n```\npip install numpy\n```\n\
    \n**注意：** 如果我们使用 Python 或 iPython 控制台来安装 NumPy 库，安装命令前需要加上字符 `!`。\n\n安装完成后，我们可以通过\
    \ `import` 语句将其导入到我们的程序中来使用。事实上的导入方式如下所示：\n\n```\nimport numpy as np\n```\n\n\
    这里，NumPy 库以别名 `np` 导入，以便方便地使用其中的任何功能。在本节的所有示例中，我们将使用这种形式的别名。\n\n### 10.1 NumPy\
    \ 数组\n\nPython 列表是一个功能相当强大的顺序数据结构，具有一些巧妙的特性。例如，它可以容纳各种数据类型的元素，这些元素可以根据需要添加、更改或删除。此外，它还允许索引子集和遍历。但是，列表缺少在执行数据分析任务时所需的一个重要特性。我们经常希望对整个元素集合执行操作，并期望\
    \ Python 能够快速执行。使用列表高效地对所有元素执行此类操作是一个问题。例如，让我们考虑一个计算过去 5 天 PCR（看跌看涨比率）的案例。假设我们有两个列表\
    \ `call_vol` 和 `put_vol`，分别存储看跌期权和看涨期权的成交量（以拉克为单位）。然后，我们通过将看跌期权成交量除以看涨期权成交量来计算\
    \ PCR，如下所示：\n\n```\n# 看跌期权成交量（单位：拉克）\nIn []: put_vol = [52.89, 45.14, 63.84, 77.1,\
    \ 74.6]\n\n# 看涨期权成交量（单位：拉克）\nIn []: call_vol = [49.51, 50.45, 59.11, 80.49, 65.11]\n\
    \n# 计算看跌看涨比率 (PCR)\nIn []: put_vol / call_vol\nTraceback (most recent call last):\n\
    \nFile \"<ipython-input-12>\", line 1, in <module>\n    put_vol / call_vol\nTypeError:\
    \ unsupported operand type(s) for /: 'list' and 'list'\n```\n\n不幸的是，Python 在计算\
    \ PCR 值时抛出了一个错误，因为它不知道如何对列表进行计算。我们可以通过遍历列表中的每个项目并分别计算每天的 PCR 来实现。然而，这样做既低效又繁琐。一个更优雅的解决方案是使用\
    \ NumPy 数组，它是常规 Python 列表的替代品。\n\nNumPy 数组与列表非常相似，但有一个有用的功能：我们可以对整个数组（数组中的所有元素）执行操作。这既简单又超级快。让我们从创建一个\
    \ NumPy 数组开始。为此，我们使用 NumPy 包中的 `array()` 函数，并创建 `put_vol` 和 `call_vol` 列表的 NumPy\
    \ 版本。\n\n```\n# 导入 NumPy 库\nIn []: import numpy as np\n\n# 创建数组\nIn []: n_put_vol\
    \ = np.array(put_vol)\n\nIn []: n_call_vol = np.array(call_vol)\n\nIn []: n_put_vol\n\
    Out[]: array([52.89, 45.14, 63.84, 77.1 , 74.6 ])\n\nIn []: n_call_vol\nOut[]:\
    \ array([49.51, 50.45, 59.11, 80.49, 65.11])\n```\n\n这里，我们有两个数组 `n_put_vol` 和\
    \ `n_call_vol`，分别持有看跌和看涨期权成交量。现在，我们可以用一行代码计算 PCR：\n\n```\n# 计算看跌看涨比率 (PCR)\nIn\
    \ []: pcr = n_put_vol / n_call_vol\n\nIn []: pcr\nOut[]: array([1.06826904, 0.89474727,\
    \ 1.0800203,\n             0.95788297, 1.14575334])\n```\n\n这次成功了，计算是逐元素进行的。`pcr`\
    \ 数组中的第一个观察值是通过将 `n_put_vol` 数组中的第一个元素除以 `n_call_vol` 数组中的第一个元素计算得出的。`pcr` 中的第二个元素是使用各自数组中的第二个元素计算的，依此类推。\n\
    \n首先，当我们尝试使用常规列表计算 PCR 时，我们得到了一个错误，因为 Python 无法像我们希望的那样对列表进行计算。然后我们将这些常规列表转换为\
    \ NumPy 数组，相同的操作就没有任何问题地工作了。NumPy 处理数组就像处理标量一样。但这里我们需要注意。NumPy 可以轻松做到这一点，因为它假设数组只能包含单一类型的值。它要么是整数数组、浮点数数组，要么是布尔数组等等。如果我们尝试创建一个包含不同类型（如下所示）的数组，生成的\
    \ NumPy 数组将只包含一种类型。在下面的例子中是字符串：\n\n```\nIn []: np.array([1, 'Python', True])\n\
    Out[]: array(['1', 'Python', 'True'], dtype='<U11')\n```\n\n> 注意：NumPy 数组被设计为同质数组，考虑到可以对它们执行的数学运算。使用异构数据集是不可能的。\n\
    \n在上面的例子中，整数和布尔值都被转换成了字符串。NumPy 数组是一种新的数据结构类型，就像我们之前见过的 Python 列表类型一样。这也意味着它带有自己的方法，这些方法的行为将与其他类型不同。让我们在\
    \ Python 列表和 NumPy 数组上实现 `+` 操作，看看它们有何不同。\n\n```\n# 创建列表\nIn []: list_1 = [1,\
    \ 2, 3]\n\nIn []: list_2 = [5, 6, 4]\n\n# 将两个列表相加\nIn []: list_1 + list_2\nOut[]:\
    \ [1, 2, 3, 5, 6, 4]\n```"
