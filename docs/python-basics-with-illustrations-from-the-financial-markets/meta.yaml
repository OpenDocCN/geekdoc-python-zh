    # 6.2.8 Operator Precedence


    In Python, expressions are evaluated from left to right order. That is, if there
    are multiple operators within an expression, Python will evaluate its value starting
    from left most operand and ultimately up to the right most operator. Consider
    the following example:'
  merge: -1
  pgno: 132
- img_proc: true
  md: '```

    In []: 2 + 5 - 3 + 1

    Out[]: 5

    ```


    In the above example, Python will first evaluate 2 + 5 resulting into 7, then
    subtracts 3 from it to get 4, and finally adding 1 to obtain the final result
    of 5. But this is not the case always. If we include more operators, Python will
    behave in the different manner. For example,


    ```

    In []: 2 + 5 * 3

    Out[]: 17

    ```


    Based on the principle discussed above (left to right evaluation), Python should
    evaluate the above expression to 21, but instead, it returned 17. Here, the Python
    first evaluated 5 * 3 resulting into 15 and then added 2 to obtain the final value
    of 17, because the operator * has higher precedence over the +.


    If there are multiple operators in an expression, Python will execute operators
    at same precedence from the left to right order starting from operators having
    the highest precedence. Following table lists the operators from highest precedence
    to lowest.


    | Operators | Precedence |

    | :--- | :--- |

    | () | Parentheses |

    | ** | Exponential |

    | +, -, ~ | Positive, Negative, Bitwise NOT |

    | *, /, //, % | Multiplication, Division, Floor Division, Modulus |

    | +, - | Addition, Subtraction |

    | <<, >> | Bitwise Left, Bitwise Right |

    | & | Bitwise AND |

    | ^ | Bitwise XOR |

    | | | Bitwise OR |

    | ==, !=, >, >=, <, <=, is, is not, in, not in | Comparison, Identity, Membership
    Operators |

    | not | Logical NOT |

    | and | Logical AND |

    | or | Logical OR |'
