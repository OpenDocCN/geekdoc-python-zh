    在这里，我们可以看到模块 `arithmetic` 内部的排序名称列表。所有其他以单下划线开头的名称是与模块关联的默认 Python 属性（我们没有定义它们）。\n\
    \n不带参数时，`dir()` 列出我们当前已定义的名称：\n\n```python\nIn []: a = 1\n\nIn []: b = 'string'\n\
    \nIn []: import arithmetic\n\nIn []: dir()\nOut[]:\n['__builtins__',\n 'a',\n\
    \ 'arithmetic',\n 'b',\n 'exit',\n 'quit']\n```\n\n请注意，它列出了所有类型的名称：变量、模块、函数等。`dir()`\
