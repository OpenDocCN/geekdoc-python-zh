    It is called a *literal* because we use its value literally. The number 5 always
    represents itself and nothing else -- it is a *constant* because its value cannot
    be changed. Similarly, value 2.85 represents itself. Hence, all these are said
    to be a literal constant.


    # 2.2.2 Numbers


    We have already covered numbers in detail in the above section. Here we will discuss
    it in brief. Numbers can be broadly classified into two types - integer and float.


    Examples of an integer number (*int* for short) are - 5, 3, 2, etc. It is just
    a whole number.


    Examples of a floating point number (*floats* for short) are - 2.98745, 5.5, 5e-1,
    etc. Here, e refers to the power of 10. We can write either e or E, both work
    just fine.


    > NOTE: As compared to other programming languages, we do not have separate long
    or double. In Python, int can be of any length.


    # 2.2.3 Strings


    Simply put, a string is a sequence of characters. We use strings almost everywhere
    in Python code. Python supports both ASCII and Unicode strings. Let us explore
    strings in more detail.


    *Single Quote* - We can specify a string using single quotes such as ''Python
    is an easy programming language!''. All spaces and tabs within the quotes are
    preserved as-is.


    *Double Quotes* - We can also specify string using double quotes such as "Yes!
    Indeed, Python is easy.". Double quotes work the same way single quotes works.
    Either can be used.


    *Triple Quotes* - This is used as a delimiter to mark the start and end of a comment.
    We explain it in greater detail in the next topic.'
