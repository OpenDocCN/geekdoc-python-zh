  mdcn: "## Python 关键字\n\n- `as` 关键字用于创建别名。考虑以下示例，我们在导入 `calendar` 模块时为其创建了一个别名 `c`。一旦创建了别名，我们就可以使用该别名来引用导入的模块。\n\
    \n```python\nIn []: import calendar as c\n\nIn []: c.isleap(2019)\nOut[]: False\n\
    ```\n\n- `assert` 关键字在调试代码时使用。它允许我们检查代码中的条件是否返回 `True`，如果不是，Python 将引发一个 `AssertionError`。如果条件返回\
    \ `True`，则不会显示任何输出。\n\n```python\nIn []: stock = 'GOOG'\n\nIn []: assert stock\
    \ == 'GOOG'\n\nIn []: assert stock == 'AAPL'\nTraceback (most recent call last):\n\
    \nFile \"<ipython-input-6>\", line 1, in <module>\n    assert stock == 'AAPL'\n\
    \nAssertionError\n```\n\n- `break` 关键字用于中断 `for` 循环和 `while` 循环。\n\n```python\n\
    # 一个将打印从 0 到 9 的 for 循环\n# 当 'i' 大于 3 时，循环将中断\nIn []: for i in range(10):\n  \
    \  ...:     if i > 3:\n    ...:         break\n    ...:     print(i)\n\n# 输出\n\
    0\n1\n2\n3\n```\n\n- `class` 关键字用于创建一个类。\n\n```python\nIn []: class stock():\n\
    \    ...:     name = 'AAPL'\n    ...:     price = 224.61\n    ...:\n```\n\n```python\n\
    In []: s1 = stock()\n```\n\n```python\nIn []: s1.name\nOut[]: 'AAPL'\n```\n\n\
    ```python\nIn []: s1.price\nOut[]: 224.61\n```\n\n- `continue` 关键字用于结束 `for` 循环或\
    \ `while` 循环中的当前迭代，并继续下一次迭代。\n\n```python\n# 一个打印 0 到 9 的 for 循环\n# 当 `i` 为 4\
    \ 时，迭代将继续，而不检查后续条件\nIn []: for i in range(9):\n    ...:     if i == 4:\n    ...:\
    \         continue\n    ...:     else:\n    ...:         print(i)\n\n# 输出：不包含\
    \ 4，因为循环继续了下一次迭代\n0\n1\n2\n3\n5\n6\n7\n8\n```\n\n- `def` 关键字用于在 Python 中创建/定义一个函数。\n\
    \n```python\nIn []: def python_function():\n    ...:     print('Hello! This is\
    \ a Python Function.')\n\nIn []: python_function()\nOut[]: Hello! This is a Python\
    \ Function.\n```\n\n- `del` 关键字用于删除对象。它也可以用于删除变量、列表或数据结构中的元素等。\n\n```python\n\
    # 定义变量 'a'\nIn []: a = 'Hello'\n\n# 删除变量 'a'\nIn []: del(a)\n\n# 打印变量 'a'。Python\
    \ 将抛出一个错误，因为变量 'a' 不存在。\nIn []: a\nTraceback (most recent call last):\n\nFile\
    \ \"<ipython-input-17>\", line 1, in <module>\n    a\n\nNameError: name 'a' is\
    \ not defined\n```\n\n- `if` 关键字用作布尔表达式之间的逻辑测试。如果布尔表达式求值为 `True`，则将执行 'if' 条件之后的代码。\n\
    \n- `elif` 关键字用于定义多个 `if` 条件。它也被称为 'else if'。如果表达式求值为 `True`，则将执行条件之后的代码。\n\n\
    - `else` 关键字用于定义当其上方所有 `if` 条件都失败时将执行的代码块。它不检查任何条件，只是在上方所有条件都失败时执行代码。\n\n```python\n\
    In []: number = 5\n    ...:\n    ...: if number < 5:\n    ...:     print('Number\
    \ is less than 5')\n    ...: elif number == 5:\n    ...:     print('Number is\
    \ equal to 5')\n    ...: else:\n    ...:     print('Number is greater than 5')\n\
    \    ...:\n\n# 输出\nNumber is equal to 5\n```\n\n- `try` 关键字用于定义 `try...except`\
    \ 代码块，该代码块后面将跟着由 `except` 关键字定义的代码块。Python 尝试执行 `try` 块中的代码，如果执行成功，则忽略后续块。\n\n\
    - `except` 关键字在 `try...except` 块中用于处理 `try` 块引发的任何错误。它用于定义一个代码块，该代码块将在 `try` 块执行失败并引发任何错误时执行。\n\
    \n```python\n# Python 将在这里抛出一个错误，因为变量 'y' 未定义\nIn []: try:\n    ...:     y > 5\n\
    \    ...: except:\n    ...:     print('Something went wrong.')\n    ...:\n\n#\
    \ 输出\nSomething went wrong.\n```\n\n- `finally` 关键字用于 `try...except` 块，以定义一个无论\
    \ `try` 块是否引发错误都会运行的代码块。这对于关闭对象和清理资源很有用。\n\n```python\n# 'finally' 块中的代码将执行，无论\
    \ 'try' 块中的代码是否引发错误\nIn []: try:\n    ...:     y > 5\n    ...: except:\n    ...:\
    \     print('Something went wrong.')\n    ...: finally:\n    ...:     print('The\
    \ try...except code is finished')\n    ...:\n\n# 输出\nSomething went wrong.\nThe\
    \ try...except code is finished\n```\n\n- `False` 关键字用于表示布尔结果 false。当转换为整数值时，其求值为\
