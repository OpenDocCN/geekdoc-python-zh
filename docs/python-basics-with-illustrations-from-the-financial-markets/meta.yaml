    # 5.4.4 Stacks and Queues


    The list methods make it very easy to use a list as a stack or queue. A *stack*
    is a data structure (though not available directly in Python) where the last element
    added is the first element retrieved, also known as *Last In, First Out* (LIFO).
    A list can be used as a stack using the `append()` and `pop()` method. To add
    an item to the top of the stack, we use the `append()` and to retrieve an item
    from the top of the stack, we use the `pop()` without an explicit index. For example:


    ```

    # (Bottom) 1 -> 5 -> 6 (Top)

    In []: stack = [1, 5, 6]


    In []: stack.append(4)    # 4 is added on top of 6 (Top)


    In []: stack.append(5)    # 5 is added on top of 4 (Top)


    In []: stack

    Out[]: [1, 5, 6, 4, 5]


    In []: stack.pop()        # 5 is removed from the top

    Out[]: 5


    In []: stack.pop()        # 4 is removed from the top

    Out[]: 4


    In []: stack.pop()        # 6 is removed from the top

    Out[]: 6


    In []: stack              # Remaining elements in the stack

    Out[]: [1, 5]

    ```


    Another data structure that can be built using list methods is *queue*, where'
