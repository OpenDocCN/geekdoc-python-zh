    Out[]: True\n\n# 反转 'stock_list' 中的元素也会反转 'y' 中的元素，因为它们是同一个对象\nIn []: stock_list.reverse()\n\
    \nIn []: y\nOut[]: ['TSLA', 'NFLX', 'MSFT', 'GOOG']\n```\n\n- `lambda` 关键字用于在\
    \ Python 中创建一个小型匿名函数。它可以接受多个参数，但只接受一个表达式。\n\n```python\n# 创建一个匿名函数，将 'x' 和 'y'\
    \ 提供的两个值相加\nIn []: addition = lambda x, y : x + y\n\nIn []: addition(5, 2)\nOut[]:\
    \ 7\n```\n\n- `None` 关键字用于定义一个空值，或完全没有值。它与 0、`False` 或空字符串不同。`None` 由 `NoneType`\
    \ 数据类型表示。\n\n```python\nIn []: x = None\n\nIn []: type(x)\nOut[]: NoneType\n```\n\
    \n- `nonlocal` 关键字用于声明一个非局部变量。它用于处理嵌套函数中的变量，其中该变量不应属于内部函数。\n\n```python\n# 不是在\
    \ 'nested_function' 块内创建一个新变量 'x'，而是使用在 'main function' 中定义的变量 'x'\nIn []: def\
