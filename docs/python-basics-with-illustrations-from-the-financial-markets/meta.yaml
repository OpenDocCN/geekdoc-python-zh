  - '[PAGE 67]


    external libraries, we need to install them.


    The goal here is to install software that can automatically download and install
    Python modules/libraries for us. Two commonly used installation managers are conda³
    and pip⁴. We choose to go with pip for our installations.


    > pip comes pre-installed for Python >= 2.7 or Python >= 3.4 downloaded from Python
    official site⁵. If the Anaconda distribution has been installed, both pip and
    conda are available to manage package installations.


    # 4.3.1 Installing pip


    We can install a pip via the command line by using the *curl command*, which downloads
    the pip installation *perl script*.


    ```

    curl -O https://bootstrap.pypa.io/get-pip.py

    ```


    Once it is downloaded, we need to execute it in the command prompt with the Python
    interpreter.


    ```

    python get-pip.py

    ```


    If the above command fails on a Mac and Linux distribution due to permission issues
    (most likely because Python does not have permission to update certain directories
    on the file system. These directories are read-only by default to ensure that
    random scripts cannot mess with important files and infect the system with viruses),
    we may need to run following command.


    ```

    sudo python get-pip.py

    ```


    # 4.3.2 Installing Libraries


    Now that we have installed pip, it is easy to install python modules since it
    does all the work for us. When we find a module that we want to use,


    ³https://conda.io/docs/

    ⁴https://pip.pypa.io/en/stable/installing/

    ⁵https://www.python.org'
  - '[PAGE 68]


    usually the documentation or installation instructions will include the necessary
    pip command.


    The Python Package Index<sup>6</sup> is the main repository for third-party Python
    packages. The advantage of a library being available on PyPI is the ease of installation
    using `pip install <package_name>` such as


    ```

    pip install pandas

    pip install numpy

    pip install nsepy

    ```


    Remember, again if the above command fails on a Mac and Linux distribution due
    to permission issue, we can run the following command:


    ```

    sudo pip install pandas

    sudo pip install nsepy

    ```


    The above examples will install the latest version of the libraries. To install
    a specific version, we execute the following command:


    ```

    pip install SomeLibrary==1.1

    ```


    To install greater than or equal to one version and less than another:


    ```

    pip install SomeLibrary>=1, < 2

    ```


    Listed below are some of the most popular libraries used in different domains:


    +   - Data Science : NumPy, pandas, SciPy, etc

    - Graphics : matplotlib, plotly, seaborn, bokeh, etc.

    - Statistics : statsmodels

    - Machine learning : SciKit-Learn, Keras, TensorFlow, Theano, etc.

    - Web scraping : Scrapy, BeautifulSoup,

    - GUI Toolkit : pyGtk, pyQT, wxPython, etc.

    - Web Development : Django, web2py, Flask, Pyramid, etc.


    We can upgrade already installed libraries to the latest version from PyPI using
    the following command:


    <sup>6</sup>https://pypi.org/'
  - '[PAGE 69]


    ```

    pip install --upgrade SomeLibrary

    ```


    Remember, pip commands are run directly within the command prompt or shell without
    the python interpreter. If we are to run pip commands from Jupyter Notebook we
    need to prefix it with the ! letter like !pip install SomeLibrary.


    # 4.4 Importing modules


    Now that we have installed the module that we are interested in, we can start
    using it right away. First, we need to import the installed module in our code.
    We do so with the *import* statement. The import statement is the most common
    way of invoking the module machinery.


    # 4.4.1 import statement


    We can import any module, either internal or external into our code using the
    import statement. Take a look at below example:


    ```

    # Importing an internal module

    In []: import math


    # Importing an external library

    In []: import pandas

    ```


    The above example will import all definitions within the imported library. We
    can use these definitions using . (dot operator). For example,


    ```

    # Accessing the ''pi'' attribute of the ''math'' module

    In []: math.pi

    Out[]: 3.141592653589793


    # Accessing the ''floor'' function from the ''math'' module

    In []: math.floor

    Out[]: <function math.floor>


    # Accessing the ''floor'' method from the ''math''

    In []: math.floor(10.8)

    Out[]: 10

    ```'
  - '[PAGE 70]


    ```

    # Accessing the ''DataFrame'' module from the ''pandas''

    # library

    In []: pandas.DataFrame

    Out[]: pandas.core.frame.DataFrame

    ```


    As seen in the above example, we can access attributes and methods of the imported
    library using the dot operator along with the library name. In fact, the library
    we import acts as an object and hence, we can call its attributes using the dot
    notation. We can also alias a library name while importing it with the help of
    the as keyword.


    ```

    # Aliasing math as ''m''

    In []: import math as m


    # Aliasing pandas as ''pd''

    In []: import pandas as pd


    # Aliasing numpy as ''np''

    In []: import numpy as np

    ```


    An alias can be used in the same way as the module name.


    ```

    In []: m.pi

    Out[]: 3.141592653589793


    In []: m.e

    Out[]: 2.718281828459045


    In []: m.gamma

    Out[]: <function math.gamma>

    ```


    # 4.4.2 Selective imports


    The other way to import a definition/module is to import all *definitions* in
    that particular module or all modules in the particular package. We can do so
    by using `from` keyword.


    ```

    # Import all definitions of math module

    In []: from math import *

    ```'
