    \    Out[]: 'epat handbook!'\n\n- `strip()` 方法：此方法返回一个移除了开头和结尾空白字符的字符串。\n\n  \
    \  In []: '  A string with whitespace at both the ends.  '.strip()\n    Out[]:\
    \ 'A string with whitespace at both the ends.'\n\n- `isalpha()` 方法：如果字符串中的所有字符都是字母，则此方法返回布尔值\
    \ True，否则返回 False。\n\n    In []: 'Alphabets'.isalpha()\n    Out[]: True\n\n  \
    \  # 被评估的字符串包含空白字符。\n    In []: 'This string contains only alphabets'.isalpha()\n\
    \    Out[]: False\n\n- `isdigit()` 方法：如果字符串中的所有字符都是数字，则此方法返回布尔值 True，否则返回 False。\n\
    \n    In []: '12345'.isdigit()\n    Out[]: True\n\n- `startswith(argument)` 方法：如果字符串的第一个字符以作为参数提供的字符开头，则此方法返回布尔值\
    \ True，否则返回 False。\n\n    In []: 'EPAT Handbook!'.startswith('E')\n    Out[]:\
    \ True\n\n- `endswith(argument)` 方法：如果字符串的最后一个字符以作为参数提供的字符结尾，则此方法返回布尔值 True，否则返回\
    \ False。\n\n    In []: 'EPAT Handbook!'.startswith('k')\n    Out[]: False # 字符串以\
    \ '!' 字符结尾。\n\n- `find(sub, start, end)` 方法：此方法返回在切片 [start:end] 中找到子字符串 sub 的字符串中的最低索引。这里，参数\
    \ start 和 end 是可选的。如果未找到 sub，则返回 -1。\n\n    In []: 'EPAT Handbook!'.find('EPAT')\n\
    \    Out[]: 0\n\n    In []: 'EPAT Handbook!'.find('A')\n    Out[]: 2 # 'A' 的第一次出现是在索引\
    \ 2 处。\n\n    In []: 'EPAT Handbook!'.find('Z')\n    Out[]: -1 # 字符串中没有 'Z'。\n\
    \n- `replace(old, new)` 方法：此方法返回字符串的一个副本，其中所有出现的 old 都被 new 替换。\n\n    Out[]:\
    \ '00 01 10 11'.replace('0', '1')\n    Out[]: '11 11 11 11' # 将 0 替换为 1\n\n  \
    \  In []: '00 01 10 11'.replace('1', '0')\n    Out[]: '00 00 00 00' # 将 1 替换为\
    \ 0\n\n- `split(delim)` 方法：此方法用于根据 delim 参数将字符串分割成多个字符串。\n\n    In []: 'AAPL MSFT\
    \ GOOG'.split(' ')\n    Out[]: ['AAPL', 'MSFT', 'GOOG']\n\n这里，Python 在一个称为列表（List）的单一数据结构中输出了三个字符串。我们将在接下来的章节中更详细地学习列表。\n\
    \n- `index(character)` 方法：此方法返回字符首次出现的索引。\n\n    In []: 'EPAT Handbook!'.index('P')\n\
    \    Out[]: 1\n\n如果作为参数提供的字符在字符串中未找到，Python 将提供一个错误。\n\n    In []: 'EPAT Handbook!'.index('Z')\n\
    \    Traceback (most recent call last):\n\n    File \"<ipython-input-52>\", line\
    \ 1, in <module>\n        'EPAT Handbook!'.index('Z')\n\n    ValueError: substring\
    \ not found\n\n- `capitalize()` 方法：此方法返回字符串的首字母大写版本。\n\n    In []: 'python is\
    \ amazing!'.capitalize()\n    Out[]: 'Python is amazing!'\n\n- `count(character)`\
    \ 方法：此方法返回由 character 提供的参数的计数。\n\n    In []: 'EPAT Handbook'.count('o')\n   \
    \ Out[]: 2\n\n    In []: 'EPAT Handbook'.count('a')\n    Out[]: 1\n\n## 3.2.6\
    \ type() 函数\n\n内置的 type(argument) 函数用于评估数据类型，并返回作为参数传递的参数的类类型。此函数主要用于调试。\n\n \
    \   # 字符串由类 'str' 表示。\n    In []: type('EPAT Handbook')\n    Out[]: str\n\n  \
    \  # 浮点数字面量由类 'float' 表示。\n    In []: type(224.61)\n    Out[]: float\n\n    #\
    \ 整数字面量由类 'int' 表示。\n    In []: type(224)\n    Out[]: int\n\n    # 提供的参数在引号内。\n\
    \    In []: type('0')\n    Out[]: str\n\n    # 布尔值由类 'bool' 表示。\n    In []: type(True)\n\
    \    Out[]: bool\n\n    In []: type(False)\n    Out[]: bool\n\n    # 参数在引号内提供。\n\
    \    In []: type('False')\n    Out[]: str\n\n    # 作为参数传递的对象属于\n    # 类 'list'。\n\
    \    In []: type([1, 2, 3])\n    Out[]: list\n\n    # 作为参数传递的对象属于\n    # 类 'dict'。\n\
    \    In []: type({'key':'value'})\n    Out[]: dict\n\n    # 作为参数传递的对象属于\n    #\
    \ 类 'tuple'。\n    In []: type((1, 2, 3))\n    Out[]: tuple\n\n    # 作为参数传递的对象属于\n\
    \    # 类 'set'。\n    In []: type({1, 2, 3})\n    Out[]: set\n\n列表、字典、元组、集合是 Python\
    \ 中的原生数据结构。我们将在接下来的章节中学习这些数据结构。\n\n## 3.3 类型转换\n\n我们经常遇到需要更改底层数据的数据类型的情况。或者也许我们发现我们一直在使用整数，而我们真正需要的是浮点数。在这种情况下，我们可以转换变量的数据类型。我们可以使用上面看到的\
    \ type() 函数检查变量的数据类型。\n\n可能有两种类型的转换：*隐式*转换（称为强制转换）和*显式*转换（通常称为类型转换）。当我们更改变量的类型从一种到另一种时，这称为*类型转换*。\n\
    \n**隐式转换：** 这是一种自动类型转换，Python 解释器会为我们即时处理。我们不需要为此指定任何命令或函数。看下面的例子：\n\n    In []:\
    \ 8 / 2\n    Out[]: 4.0\n\n在两个整数 8（被除数）和 2（除数）之间执行除法运算。从数学上讲，我们期望输出为 4（一个整数值），但\
    \ Python 返回的输出是 4.0（一个浮点数值）。也就是说，Python 在内部将整数 4 转换为浮点数 4.0。\n\n**显式转换：** 这种类型的转换是用户定义的。我们需要显式地更改某些字面量的数据类型，以使其兼容数据操作。让我们尝试使用\
    \ + 运算符连接一个字符串和一个整数。\n\n    In []: 'This is the year ' + 2019\n    Traceback (most\
    \ recent call last):\n\n    File \"<ipython-input-68>\", line 1, in <module>\n\
    \        'This is the year ' + 2019\n\n    TypeError: must be str, not int\n\n\
    这里我们尝试连接字符串 'This is the year ' 和整数 2019。这样做时，Python 抛出了一个 TypeError 错误，指出数据类型不兼容。执行两者之间连接的一种方法是显式地将\
    \ 2019 的数据类型转换为字符串，然后执行操作。我们使用 str() 将整数转换为字符串。\n\n    In []: 'This is the year\
    \ ' + str(2019)\n    Out[]: 'This is the year 2019'\n\n类似地，我们可以按照以下方式显式地更改字面量的数据类型。\n\
    \n    # 整数到浮点数的转换\n    In []: float(4)\n    Out[]: 4.0\n\n    # 字符串到浮点数的转换\n \
    \   In []: float('4.2')\n    Out[]: 4.2\n\n    In []: float('4.0')\n    Out[]:\
    \ 4.0\n\n    # 浮点数到整数的转换\n    In []: int(4.0)\n    Out[]: 4 # Python 将丢弃小数部分。\n\
    \n    In []: int(4.2)\n    Out[]: 4\n\n    # 字符串到整数的转换\n    In []: int('4')\n\
    \    Out[]: 4\n\n    # Python 不会转换带有小数部分的字符串字面量，\n    # 而是会抛出一个错误。\n    In []:\
    \ int('4.0')\n    Traceback (most recent call last):\n\n    File \"<ipython-input-75>\"\
    , line 1, in <module>\n        int('4.0')\n\n    ValueError: invalid literal for\
    \ int() with base 10: '4.0'\n\n    # 浮点数到字符串的转换\n    In []: str(4.2)\n    Out[]:\
    \ '4.2'\n\n    # 整数到字符串的转换\n    In []: str(4)\n    Out[]: '4'\n\n在上面的例子中，我们已经看到了如何将字面量的数据类型从一种更改为另一种。类似地，由\
    \ bool 表示的布尔数据类型也没有什么不同。我们可以像处理其他类型一样将 bool 类型转换为 int。事实上，Python 在内部将布尔值 False\
    \ 视为 0，将 True 视为 1。"
