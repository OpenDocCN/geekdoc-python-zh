    \ `{}` 定义，键和值之间用冒号 `:` 分隔。\n\n```python\n# 创建一个字典\nperson = {\n    \"name\": \"\
    Alice\",\n    \"age\": 30,\n    \"city\": \"New York\"\n}\n\n# 访问字典中的值\nprint(person[\"\
    name\"])  # 输出: Alice\n\n# 修改字典中的值\nperson[\"age\"] = 31\n\n# 添加新的键值对\nperson[\"\
    email\"] = \"alice@example.com\"\n\n# 删除键值对\ndel person[\"city\"]\n\n# 检查键是否存在\n\
    if \"name\" in person:\n    print(\"Name exists\")\n\n# 遍历字典\nfor key, value in\
    \ person.items():\n    print(f\"{key}: {value}\")\n```\n\n字典提供了多种方法来操作数据，例如 `keys()`、`values()`\
    \ 和 `items()` 方法，分别用于获取所有的键、值和键值对。字典在需要快速查找和关联数据时非常有用。"
