  - '[PAGE 326]


    The last method that we will study is the savefig method that is used to save
    the figure on a local machine. It takes the name of the figure by which it will
    be saved. This is illustrated below:


    ```

    plt.savefig(''AAPL_chart.png'')

    ```


    Executing the above code will save the chart we plotted above with the name AAPL_chart.png.

    This brings us to the end of this chapter. We started with the basics of figure
    and plots, gradually learning various types of charts and along with the finer
    details.


    We also learned customization and took a sneak peek into plotting multiple plots
    within the same chart.


    # 12.4 Key Takeaways


    +   1. Matplotlib does not fall under the Python Standard Library. Hence, it needs
    to be installed before it can be used.

    2. The pyplot module within matplotlib provides the common charting functionality
    and is used to plot various kinds of charts. A common practice is to import it
    using the alias plt.

    3. The code `%matplotlib inline` is used to enable plotting charts within Jupyter
    Notebook.

    4. Figure is the top-level container and Axes is the area where plotting occurs.
    `plt.figure()` creates an empty figure with axes. The figsize argument is used
    to specify the figure size.

    5. The show() method of pyplot sub-module is used to display the plot.

    6. Methods available on the axes object can also be called directly using the
    plt notation.

    7. The plot() method from pyplot module is used to plot line chart from a sequential
    data structures such as lists, tuples, NumPy arrays, pandas series, etc.

    8. The scatter() method from pyplot module is used to generate scatter plots.

    9. The hist() method from pyplot module is used to generate histogram plots.

    10. The bar() method from pyplot module is used to create a bar chart.'
  - '[PAGE 327]


    +   11. `xlabel()` and `ylabel()` methods are used to label the charts. The `title()`
    method is used to title the chart.

    12. The `legend()` method is used to annotate the charts.

    13. The `axhline()` is used to add a horizontal line across the axis to a plot.

    14. `xticks()` and `yticks()` methods are used to customize the ticks along the
    axes in a plot.

    15. The `grid()` method is used to add a grid to a plot.

    16. The `subplots()` method is used to create multiple plots within a figure.

    17. The `style` attribute is used to configure the style of a plot.

    18. Methods discussed in this chapter have their own attributes specific to each
    method.'
