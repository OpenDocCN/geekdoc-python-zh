  md: '# Chapter 1


    # Introduction


    Welcome to our first module on *programming*. In this module, we will be discussing
    the nuts and bolts of the Python programming language ranging from the very basic
    to more advanced topics.


    Python is a general-purpose programming language that is becoming more and more
    popular for


    +   - performing data analysis,

    - automating tasks,

    - learning data science,

    - machine learning, etc.


    # 1.1 What is Python?


    Python is a dynamic, interpreted (bytecode-compiled) language that is used in
    a wide range of domains and technical fields. It was developed by Guido van Rossum
    in 1991. It was mainly developed for code readability and its syntax is such that
    it allows programmers to code/express concepts in fewer lines of code. Compared
    to compiled languages like C, Java, or Fortran, we do not need to declare the
    type of variables, functions, etc. when we write code in Python. This makes our
    code short and flexible. Python tracks the types of all values at runtime and
    flags code that does not make sense as it runs. On the Python website<sup>1</sup>,
    we find the following executive summary.


    <sup>1</sup>https://www.python.org/doc/essays/blurb/'
  merge: -1
  pgno: 14
- img_proc: true
  md: 'Python is an interpreted, object-oriented, high-level programming language
    with dynamic semantics. Its high-level built in data structures, combined with
    dynamic typing and dynamic binding, make it very attractive for Rapid Application
    Development, as well as for use as a scripting or glue language to connect existing
    components together. Python’s simple, easy to learn syntax emphasizes readability
    and therefore reduces the cost of program maintenance. Python supports modules
    and packages, which encourages program modularity and code reuse. The Python interpreter
    and the extensive standard library are available in source or binary form without
    charge for all major platforms and can be freely distributed.


    # 1.2 Where is Python used?


    Python is used by the novice programmer as well as by the highly skilled professional
    developer. It is being used in academia, at web companies, in large corporations
    and financial institutions. It is used for


    +   - *Web and Internet development*: Python is used on the server side to create
    web applications.

    - *Software development*: Python is used to create GUI applications, connecting
    databases, etc.

    - *Scientific and Numeric applications*: Python is used to handle big data and
    perform complex mathematics.

    - *Education*: Python is a great language for teaching programming, both at the
    introductory level and in more advanced courses.

    - *Desktop GUIs*: The Tk GUI library² included with most binary distributions
    of Python is used extensively to build desktop applications.

    - *Business Applications*: Python is also used to build ERP and e-commerce systems.


    # 1.3 Why Python?


    Python is characterized by many features. Let’s examine a few of them here:


    ²https://wiki.python.org/moin/TkInter'
