    \ Fanuary 初始化了变量 `month_name`。之后，我们尝试通过将字母 F 替换为 J 来纠正它，这时我们遇到了 TypeError，它告诉我们字符串不支持更改操作。\n\
    \n## 2.2.4 注释\n\n我们之前已经见过注释了。注释用于为代码添加说明，Python 不会解释它们。Python 中的注释以井号字符 # 开头，到代码行的末尾结束。注释可以出现在行首，或者在空格或代码之后，但不能出现在字符串字面量内部。字符串字面量中的井号字符只是一个井号字符。这种类型的注释也称为单行注释。\n\
    \n我们注释代码的另一种方式是使用多行注释，它作为参考或文档，帮助他人理解代码。\n\n让我们看下面示例中的单行注释。\n\n```\n# 以下行将两个整数相加\n\
    In []: 5 + 3\nOut[]: 8\n```\n\n我们可以在代码行之后编写注释，以说明该特定行的功能，如下例所示。\n\n```\nIn []:\
    \ 5 + 3 # 将两个字面量相加\nOut[]: 8\n\nIn []: # 这也是一个注释！\n```\n\nPython 不支持多行/块注释。但是，我们可以使用与单行注释相同的符号将注释跨多行书写。块注释的缩进级别应与代码相同。块注释的每一行都以\
    \ # 和一个空格开头。\n\n```\n# 这是一个多行注释的示例\n# 在 Python 中，它跨越多行并\n# 描述代码。它可以用来\n# 标注任何内容，如作者姓名、修订记录、\n\
    # 脚本目的等。它使用分隔符\n# 来标记其开始和结束。\n```\n\n在代码中大量穿插注释始终是一种良好的编程实践。记住：代码告诉你“如何做”，注释告诉你“为什么这样做”。\n\
    \n## 2.2.5 print() 函数\n\nprint() 函数是一个非常通用的工具，用于在 Python 中打印任何内容。\n\n> 注意：在 Python\
    \ 2 中，print 只是一个没有括号的语句，而不是一个函数，而在 Python 3 中，print() 是一个函数，我们需要输出的内容放在括号内。我们在第\
    \ 1 章的“Python 2 与 Python 3”主题下已经详细介绍了这一点。\n\n让我们看几个例子来了解 print() 是如何工作的。\n\n```\n\
    # 简单的 print 函数\nIn []: print(\"Hello World!\")\nOut[]: Hello World!\n```\n\n```\n\
    # 连接字符串和整数字面量\nIn []: print(\"January\", 2010)\nOut[]: January 2010\n```\n\n```\n\
    # 连接两个字符串\nIn []: print(\"AAPL\", \"is the stock ticker of Apple Inc.\")\nOut[]:\
    \ AAPL is the stock ticker of Apple Inc.\n```\n\n```\n# 连接一个变量和一个字符串。\n# 这里，stock_name\
    \ 是一个包含股票名称的变量。\nIn []: print(stock_name + \" is the stock name of\n         \
    \       Microsoft Corporation.\")\nOut[]: MSFT is the stock name of Microsoft\
    \ Corporation.\n```\n\n正如我们在上面的例子中看到的，print() 可以以多种方式使用。我们可以用它来打印一个简单的语句，与字面量连接，连接两个字符串，或者将字符串与变量组合。使用\
    \ print() 函数的一种常见方式是 f-strings 或格式化字符串字面量。\n\n```\n# f-strings\nIn []: print(f'The\
    \ stock ticker for Apple Inc\n                is {stock_name}.')\nOut[]: The stock\
    \ ticker for Apple Inc is AAPL.\n```\n\n上面的字符串称为格式化字符串字面量。这种字符串以字母 f 开头，表示当我们在花括号\
    \ {} 之间使用变量名时，它会被格式化。这里的 stock_name 是一个包含股票代码的变量名。\n\n另一种打印字符串的方式是使用 %-格式化风格。\n\
    \n```\n# %-格式化字符串\nIn []: print(\"%s is currently trading at %.2f.\"\n       \
    \     %(stock_name, price))\nOut[]: AAPL is currently trading at 226.41.\n```\n\
    \n这里我们打印 AAPL 股票的当前交易价格。股票名称存储在变量 stock_name 中，其价格存储在变量 price 中。%s 用于指定字符串字面量，%f\
    \ 用于指定浮点字面量。我们使用 %.2f 来限制小数点后两位数字。\n\n## 2.2.6 format() 函数\n\n另一个用于打印和构建输出字符串的有用函数是\
    \ format() 函数。使用这个函数，我们可以从变量等信息构建字符串。请看以下代码片段。\n\n```\nIn []: stock_ticker = 'AAPL'\n\
    In []: price = 226.41\nIn []: print('We are interested in {x} which is currently\
    \ trading at {y}'.format(x=stock_ticker, y=price))\n```\n\n运行上述代码后，我们将得到以下输出。\n\
    \n```\n# 输出\nOut[]: We are interested in AAPL which is currently trading at 226.41\n\
    ```\n\n上面的代码将首先在内部准备一个字符串，分别用变量 stock_ticker 和 price 替换 x 和 y 占位符，然后将最终输出作为单个字符串打印出来。除了使用占位符，我们还可以用以下方式构建字符串：\n\
    \n```\nIn []: print('We are interested in {0} which is currently trading at {1}'.format(stock_ticker,\
    \ price))\n```\n\n这里，输出将与上面的示例类似。可以使用某些规范来构建字符串，并且可以调用 format 函数，用 format 函数的相应参数替换这些规范。在上面的例子中，{0}\
    \ 将被变量 stock_ticker 替换，同样，{1} 将获得 price 的值。规范中提供的数字是可选的，因此我们也可以将相同的语句写成如下形式：\n\
    \n```\nprint('We are interested in {} which is currently trading at {}'.format(stock_ticker,\
    \ price))\n```\n\n这将提供与上面显示的完全相同的输出。\n\n## 2.2.7 转义序列\n\n转义字符通常用于执行某些任务，它们在代码中的使用指示编译器采取与该字符映射的适当操作。\n\
    \n假设我们想写一个字符串 That's really easy.. 如果我们要在双引号 \" 内写这个字符串，我们可以写成 \"That's really\
    \ easy.\"，但如果我们想在单引号内写相同的字符串，比如 'That's really easy. '，我们就无法写出来，因为我们有三个 '，Python\
    \ 解释器会混淆字符串从哪里开始和结束。因此，我们需要指定字符串不是在 s 处结束，而是它是字符串的一部分。我们可以通过使用*转义序列*来实现这一点。我们可以使用\
    \ \\（反斜杠字符）来指定它。例如，\n\n```\nIn []: 'That\\'s really easy.'\nOut[]: \"That's really\
    \ easy.\"\n```\n\n这里，我们在 ' 前面加上了 \\ 字符，以表示它是字符串的一部分。同样，如果我们要在双引号内写字符串，也需要对双引号使用转义序列。此外，我们可以使用\
    \ \\\\ 在字符串中包含反斜杠字符。我们可以使用 \\n 转义序列将单行分成多行。\n\n```\nIn []: print('That is really\
    \ easy.\\nYes, it really is.')\nOut[]: That is really easy.\n       Yes, it really\
    \ is.\n```\n\n另一个有用的转义字符是 \\t 制表符转义序列。它用于在字符串之间留下制表符空格。\n\n```\nIn []: print('AAPL.\\\
    tNIFTY50.\\tDJIA.\\tNIKKEI225.')\nOut[]: AAPL.    NIFTY50.         DJIA.    NIKKEI225.\n\
    ```"
