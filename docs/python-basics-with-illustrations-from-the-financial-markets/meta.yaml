    # 8.3 Key Takeaways


    +   1. An iterator is an object which can be iterated upon and will return data,
    one element at a time. It implements the iterator protocol, that is, `__next__()`
    and `__iter__()` methods.

    2. An iterable is an object that can return an iterator.

    3. Lists, Tuples, Strings, Dictionaries, etc. are iterables in Python. Directly
    or indirectly they implement the above-mentioned two methods.

    4. Iterables have an `iter()` method which returns an iterator.

    5. The `next()` method is used to iterate manually through all the items of an
    iterator.

    6. The `enumerate()` function takes an iterable as an input and returns the enumerate
    object containing a pair of index and elements.

    7. The `zip()` function accepts an arbitrary number of iterables and returns zip
    object which can be iterated upon.

    8. Generators provides an easy way to create and implement iterators.

    9. The syntax for generators is very similar to list comprehension, except that
    it uses a parentheses ().

    10. Generators do not store elements in the memory and often creates the elements
    on the fly as required.'
