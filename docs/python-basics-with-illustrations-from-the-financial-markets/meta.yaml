    except NameError, err: # 不需要 'as' 关键字\n    print (err, 'Error Occurred!')\n\n\
    # Python 3\ntry:\n    trying_to_check_error\nexcept NameError as err: # 需要 'as'\
    \ 关键字\n    print (err, 'Error Occurred!')\n```\n\n### `__future__` 模块\n\n-   `__future__`\
    \ 模块在 Python 3 中引入，以允许向后兼容，即在 Python 2 开发的代码中使用 Python 3 的特性。\n-   例如，如果我们要在 Python\
