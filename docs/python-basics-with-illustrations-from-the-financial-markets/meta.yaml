    \n### 5.4.4 Stacks and Queues\n\nThe list methods make it very easy to use a list\
    \ as a stack or queue. A *stack* is a data structure (though not available directly\
    \ in Python) where the last element added is the first element retrieved, also\
    \ known as *Last In, First Out* (LIFO). A list can be used as a stack using the\
