- md: "## 5.3.4 Unpacking Tuples\n\nIn one of the above examples, we encountered the\
    \ statement `tup = 1, 2, 3` which is in turn an example of tuple packing. That\
    \ is we pack various values together into a single variable `tup`. The reverse\
    \ operation is also possible:\n\n```python\nIn []: tup\nOut[]: (1, 2, 3)\n\nIn\
    \ []: x, y, z = tup\n```\n\nThe above statement performs the unpacking operation.\
    \ It will assign the value 1 to the variable `x`, 2 to `y`, and 3 to `z`. This\
    \ operation requires that there are as many variables on the left hand side of\
    \ the equal sign as there are elements in the tuple.\n\n## 5.3.5 Tuple methods\n\
    \nTuple being one of the simple objects in Python, it is easier to maintain. There\
    \ are only two methods available for tuple objects:\n\n- `index()`: This method\
    \ returns the index of the element.\n\n```python\nIn []: tup\nOut[]: (1, 2, 3)\n\
    \n# Returns the index of value '3'.\nIn []: tup.index(3)\nOut[]: 2\n```\n\n- `count()`:\
    \ This method counts the number of occurrences of a value.\n\n```python\nIn []:\
    \ tup = (1, 1, 1, 1, 1)\n\nIn []: tup.count(1)\nOut[]: 5\n```\n\nSome of the reasons\
    \ why tuples are useful are given below:\n\n- They are faster than lists.\n- They\
    \ protect the data as they are immutable.\n- They can be used as keys on dictionaries.\n\
    \n## 5.4 Lists\n\nA list is a data structure that holds an ordered collection\
    \ of items i.e. we can store a sequence of items in a list. In Python, lists are\
