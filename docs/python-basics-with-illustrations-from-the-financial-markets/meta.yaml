    \ integer conversion\nIn []: int(4.0)\nOut[]: 4 # Python will drop the fractional\
    \ part.\n\nIn []: int(4.2)\nOut[]: 4\n\n# String to integer conversion\nIn []:\
    \ int('4')\nOut[]: 4\n\n# Python does not convert a string literal with a\n# fractional\
