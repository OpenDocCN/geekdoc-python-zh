    ## 5.5 字典\n\nPython字典是项目的无序集合。它以*键值对*的形式存储数据。字典就像电话簿，我们可以通过只知道某人的姓名来查找其电话号码或联系方式，即我们将姓名（*键*）与相应的详情（*值*）关联起来。请注意，键必须是唯一的，就像电话簿中一样，即我们不能有两个完全同名的人。\n\
