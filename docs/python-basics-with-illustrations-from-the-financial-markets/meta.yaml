    \ parameter **kwargs are known as *keywords arguments* which will be converted\
    \ into a dictionary of the same name. We then loop over it and print all keys\
    \ and values. Again, it is totally valid to use an identifier other than kwargs\
    \ as the parameter name. The info function can be called as follows:\n\n```\n\
    # Calling the function\nprint(info(ticker='AAPL', price='146.83',\nname='Apple\
    \ Inc.', country='US'))\n\n# Output\nticker: AAPL\nprice: 146.83\nname: Apple\
    \ Inc.\ncountry: US\n```\n\nThat is all about the default and flexible arguments.\
    \ We now attempt to head towards the documentation part of functions.\n\n## 9.2.5\
    \ DocStrings\n\nPython has a nifty feature called *documentation string*, usually\
    \ referred to by its shorter name *docstrings*. This is an important but not required\
    \ tool that should be used every time we write a program since it helps to document\
    \ the program better and makes it easier to understand.\n\nDocstrings are written\
    \ within triple single/double quotes just after definition header. They are written\
    \ on the first logical line of a function. Docstrings are not limited to functions\
    \ only; they also apply to modules and classes. The convention followed for a\
    \ docstring is a multi-line string where the first line starts with a capital\
    \ letter and ends with a dot. The second line is blank followed by any detailed\
    \ explanation starting from the third line. It is strongly advised to follow this\
    \ convention for all docstrings. Let's see this in practice with the help of an\
    \ example:\n\n```\ndef power(x, y):\n    \"\"\"\n    Equivalent to x**y or built-in\
    \ pow() with two\n    arguments.\n\n    x and y should be numerical values else\
    \ an appropriate\n    error will be thrown for incompatible types.\n\n    Parameters:\n\
    \    x (int or float): Base value for the power operation.\n    y (int or float):\
    \ Power to which base value should be\n                      raised.\n\n    Returns:\n\
    \    int or float: It returns x raised to the power of y.\n    \"\"\"\n\n    try:\n\
    \        return x ** y\n    except Exception as e:\n        print(e)\n```\n\n\
    The function power defined above returns the raised value of the argument x powered\
    \ to y. The thing of our interest is the docstring written within ''' which documents\
    \ the function. We can access a docstring of any function using the __doc__ attribute\
    \ (notice the double underscores) of that function. The docstring for the power\
    \ function can be accessed with the following code:\n\n```\nprint(power.__doc__)\n\
    ```\n\nAnd the output is shown below:\n\n```\nEquivalent to x**y or built-in pow()\
    \ with two arguments.\n\nx and y should be numerical values else an appropriate\n\
    error will be thrown for incompatible types.\n\nParameters:\nx (int or float):\
    \ Base value for the power operation.\ny (int or float): Power to which base value\
    \ should be raised.\n\nReturns:\nint or float: It returns x raised to the power\
    \ of y.\n```\n\nWe have already seen the indirect usage of docstrings in previous\
    \ sections. When we use a function help in Python, it will show up the docstring.\
    \ What it does is fetch the `__doc__` attribute of that function and displays\
    \ it in a neat manner. If we ask for the help on the user defined power using\
    \ the `print(help(power))`, Python will return the same output as shown above\
    \ that we got using the `print(power.__doc__)`.\n\n## 9.2.6 Nested functions and\
    \ non-local variable\n\nA nested function is a function that is defined inside\
    \ another function. The syntax for the nested function is the same as that of\
    \ any other function. Though the applications of nested functions are complex\
    \ in nature and limited at times, even in the quant domain, it is worth mentioning\
    \ it, as we might encounter this out there in the wild. Below is an example which\
    \ demonstrates the nested functions.\n\n```\n# Defining nested function\ndef outer():\n\
    \    \"\"\"This is an enclosing function\"\"\"\n    def inner():\n        \"\"\
    \"This is a nested function\"\"\"\n        print('Got printed from the nested\
    \ function.')\n\n    print('Got printed from the outer function.')\n    inner()\n\
    ```\n\nWe define the function `outer` which nests another function `inner` within\
    \ it. The `outer` function is referred to as an *enclosing* function and `inner`\
    \ is known as *nested* function. They are also referred to as *inner* functions\
    \ sometimes. Upon calling the outer function, Python will, in turn, call the inner\
    \ function nested inside it and execute it. The output for the same is shown below:\n\
    \n```\n# Calling the 'outer' function\nouter()\n\n# Output\nGot printed from the\
    \ outer function.\nGot printed from the nested function.\n```\n\nThe output we\
    \ got here is intuitive. First, the print statement within the outer function\
    \ got executed, followed by the print statement in the inner function. Additionally,\
    \ nested functions can access variables of the enclosing functions. i.e. variables\
    \ defined in the outer function can be accessed by the inner function. However,\
    \ the inner or the nested function cannot modify the variables defined in the\
    \ outer or enclosing function.\n\n```\ndef outer(n):\n    number = n\n\n    def\
    \ inner():\n        print('Number =', number)\n\n    inner()\n```\n\nA call to\
    \ outer function will print the following\n\n```\nouter(5)\n\n# Output\nNumber\
    \ = 5\n```\n\nThough the variable number is not defined within inner function,\
    \ it is able to access and print the number. This is possible because of scope\
    \ mechanism that Python provided. We discuss more on this in the following section.\
    \ Now consider, what if we want the nested function to modify the variable that\
    \ is declared in the enclosing function. The default behavior of Python does not\
    \ allow this. If we try to modify it, we will be presented with an error. To handle\
    \ such a situation, the keyword nonlocal comes to the rescue.\n\nIn the nested\
    \ function, we use the keyword `nonlocal` to create and change the variables defined\
    \ in the enclosing function. In the example that follows, we alter the value of\
    \ the variable `number`.\n\n```\ndef outer(n):\n    number = n\n    def inner():\n\
    \        nonlocal number\n        number = number ** 2\n        print('Square\
    \ of number =', number)\n\n    print('Number =', number)\n    inner()\n    print('Number\
    \ =', number)\n```\n\nA call to the `outer` function will now print the number\
    \ passed as an argument to it, the square of it and the newly updated number (which\
    \ is nothing but the squared number only).\n\n```\nouter(3)\n\n# Output\nNumber\
    \ = 3\nSquare of number = 9\nNumber = 9\n```\n\nRemember, assigning a value to\
    \ a variable will only create or change the variable within a particular function\
    \ (or a scope) unless they are declared using the `nonlocal` statement.\n\n##\
    \ 9.3 Variable Namespace and Scope\n\nIf we read the *The Zen of Python* (try\
    \ `import this` in Python console), the last line states *Namespaces are one honking\
    \ great idea -- let's do more of those!* Let's try to understand what these mysterious\
    \ namespaces are. However, before that, it will be worth spending some time understanding\
    \ `names` in the context of Python."
