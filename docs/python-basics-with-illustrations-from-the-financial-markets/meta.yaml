    # 5.2 Array


    An array can be thought of as a container that can hold a fixed number of data
    values of the same type. Though the use of array is less popular in Python as
    compared to other languages such as C and Java, most other data structures internally
    make use of arrays to implement their algorithms. An array consists of two components,
    viz *Element* and *Index*.


    +   - Element: These are the actual data values to be stored in an array.

    - Index: Each element in array is positioned at the particular location depicted
    by an index. Python follows *zero based indexing* which means an index will always
    start with 0.


    We can create an array by using the built-in array module. It can be created as
    follows:


    ```

    In []: from array import *


