    # 10.1 NumPy Arrays


    A Python list is a pretty powerful sequential data structure with some nifty features.
    For example, it can hold elements of various data types which can be added, changed
    or removed as required. Also, it allows index subsetting and traversal. But lists
    lack an important feature that is needed while performing data analysis tasks.
    We often want to carry out operations over an entire collection of elements, and
    we expect Python to perform this fast. With lists executing such operations over
    all elements efficiently is a problem. For example, let''s consider a case where
    we calculate PCR (Put Call Ratio) for the previous 5 days. Say, we have put and
    call options volume (in Lacs) stored in lists call_vol and put_vol respectively.
    We then compute the PCR by dividing put volume by call volume as illustrated in
    the below script:


    ```

    # Put volume in lacs

    In []: put_vol = [52.89, 45.14, 63.84, 77.1, 74.6]


    # Call volume in lacs

    In []: call_vol = [49.51, 50.45, 59.11, 80.49, 65.11]


    # Computing Put Call Ratio (PCR)

    In []: put_vol / call_vol

