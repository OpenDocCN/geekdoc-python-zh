    \      e    1.073244\n      dtype: float64\n```\n\n## 11.9 Filtering Pandas DataFrame\n\
    \nWe have already seen how to filter data in a DataFrame, including logical statements\
    \ to filter rows or columns with some logical criteria. For example, we will filter\
    \ rows whose column 'A' is greater than zero:\n\n```\nIn []: import pandas as\
    \ pd\n       import numpy as np\n       df=pd.DataFrame(np.random.randn(5, 4),\n\
