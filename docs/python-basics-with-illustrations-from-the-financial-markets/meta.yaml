    ```\n\n输出如下所示：\n\n```\n等同于 x**y 或具有两个参数的内置 pow()。\n\nx 和 y 应为数值，否则将因类型不兼容而抛出适当的错误。\n\
    \n参数：\nx (int 或 float)：幂运算的底数值。\ny (int 或 float)：底数值应提升到的幂次。\n\n返回：\nint 或 float：返回\
    \ x 的 y 次幂。\n```\n\n我们在前面的章节中已经看到了文档字符串的间接用法。当我们使用 Python 中的函数帮助时，它会显示文档字符串。它所做的就是获取该函数的\
    \ `__doc__` 属性并以整洁的方式显示它。如果我们使用 `print(help(power))` 请求关于用户定义的 `power` 的帮助，Python\
    \ 将返回与我们使用 `print(power.__doc__)` 得到的相同输出。\n\n## 9.2.6 嵌套函数和非局部变量\n\n嵌套函数是在另一个函数内部定义的函数。嵌套函数的语法与任何其他函数相同。尽管嵌套函数的应用本质上是复杂的，并且有时是有限的，即使在量化领域，也值得一提，因为我们可能会在实际中遇到它。下面是一个演示嵌套函数的例子。\n\
    \n```\n# 定义嵌套函数\ndef outer():\n    \"\"\"这是一个外围函数\"\"\"\n    def inner():\n  \
    \      \"\"\"这是一个嵌套函数\"\"\"\n        print('从嵌套函数打印。')\n\n    print('从外围函数打印。')\n\
    \    inner()\n```\n\n我们定义了函数 `outer`，它在内部嵌套了另一个函数 `inner`。`outer` 函数被称为 *外围* 函数，`inner`\
    \ 被称为 *嵌套* 函数。它们有时也被称为 *内部* 函数。调用外围函数时，Python 将依次调用嵌套在其内部的内部函数并执行它。输出如下所示：\n\n\
    ```\n# 调用 'outer' 函数\nouter()\n\n# 输出\n从外围函数打印。\n从嵌套函数打印。\n```\n\n我们在这里得到的输出是直观的。首先，外围函数内的\
    \ print 语句被执行，然后是内部函数中的 print 语句。此外，嵌套函数可以访问外围函数的变量。即，内部函数可以访问在外围函数中定义的变量。但是，内部或嵌套函数不能修改在外围或外围函数中定义的变量。\n\
    \n```\ndef outer(n):\n    number = n\n\n    def inner():\n        print('Number\
    \ =', number)\n\n    inner()\n```\n\n调用 `outer` 函数将打印以下内容\n\n```\nouter(5)\n\n\
    # 输出\nNumber = 5\n```\n\n尽管变量 `number` 未在内部函数中定义，但它能够访问并打印 `number`。这之所以可能，是因为\
    \ Python 提供的作用域机制。我们将在下一节中进一步讨论这一点。现在考虑，如果我们希望嵌套函数修改在外围函数中声明的变量怎么办？Python 的默认行为不允许这样做。如果我们尝试修改它，将会出现错误。为了处理这种情况，关键字\
    \ `nonlocal` 来救场了。\n\n在嵌套函数中，我们使用关键字 `nonlocal` 来创建和更改在外围函数中定义的变量。在接下来的例子中，我们修改了变量\
    \ `number` 的值。\n\n```\ndef outer(n):\n    number = n\n    def inner():\n     \
