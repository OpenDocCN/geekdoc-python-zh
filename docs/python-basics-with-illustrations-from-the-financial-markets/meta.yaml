  - "[PAGE 65]\n\n+   - Concurrent Execution: threading, multiprocessing, sched, queue,\
    \ etc.\n- Networking: socket, ssl, asyncio, signal, etc.\n- Internet Data Handling:\
    \ email, json, mailbox, mimetypes, binascii, etc.\n- Internet Protocols: urllib,\
    \ http, ftplib, smtplib, telnetlib, xmlrpc, etc.\n\nIn addition to the standard\
    \ library, there is a growing collection of several thousand modules ranging from\
    \ individual modules to packages and entire application development frameworks,\
    \ available from the *Python Package Index*.\n\n# 4.2 Packages\n\nPackages can\
    \ be considered as a collection of modules. It is a way of structuring Python's\
    \ module namespace by using \"dotted module names\". For example, the module name\
    \ `matplotlib.pyplot` designates a submodule named `pyplot` in a package named\
    \ `matplotlib`. Packaging modules in such a way saves the author of different\
    \ modules from having to worry about each other's global variable names and the\
    \ use of dotted module names saves the author of multi-module packages from having\
    \ to worry about each other's module names.\n\nSuppose we want to design a package\
    \ (a collection of modules) for the uniform handling of various trading strategies\
    \ and their data. There are many different data files based on data frequencies,\
    \ so we may need to create and maintain a growing collection of modules for the\
    \ conversion between the various data frequencies. Also, there are many different\
    \ strategies and operations that we might need to perform. All of this put together\
