  md: "# 1.5 Python 3 versus Python 2\n\nThe first version of the Python 3.x was released\
    \ at the end of 2008. It made changes that made some of the old Python 2.x code\
    \ incompatible. In this section, we will discuss the difference between the two\
    \ versions. However, before moving further one might wonder why Python 3 and not\
    \ Python 2. The most compelling reason for porting to Python 3 is, Python 2.x\
    \ will not be developed after 2020. So it’s no longer a good idea to start new\
    \ projects in Python 2.x. There won’t ever be a Python 2.8. Also, Python 2.7 will\
    \ only get security updates from the Python 3 development branch. That being said,\
    \ most of the code we write will work on either version with some small caveats.\n\
    \nA non-exhaustive list of features only available in 3.x releases are shown below.\n\
    \n+   - strings are Unicode by default\n- clean Unicode/bytes separation\n- exception\
    \ chaining\n- function annotations\n- the syntax for keyword-only arguments\n\
    - extended tuple unpacking\n- non-local variable declarations\n\nWe now discuss\
    \ some of the significant changes between the two versions.\n\n+   - **Unicode\
    \ and Strings**\n  - There are two types of strings which can be broadly classified\
    \ as *byte sequences* and *Unicode strings*.\n  - Byte sequences have to be literal\
    \ characters from the ASCII alphabet. Unicode strings can hold onto pretty much\
    \ any character we put in there. In Unicode, we can include various languages\
    \ and, with the right encoding, emoji as well.\n  - In Python 2, we have to mark\
    \ every single Unicode string with a u at the beginning, like u'Hello Python!'.\
    \ As we use Unicode string every now and then, it becomes cumbersome to type a\
    \ u for every Unicode string. If we forget to prefix the u, we would have a byte\
    \ sequence instead."
