    \nIn Python, we use the colon : to mark the end of the statement and start of\
    \ the block. This is true for any statement such as a class or function definition,\
    \ conditional statements, loops, etc. Notice the : at the end of the if statement\
    \ which marks the start of the if block. The code is indented inside the block\
    \ to depict that it belongs to a particular block. To end the block, we just write\
    \ the code without any indentation.\n\nIn the above statement, the code statement\
    \ position = 'Buy' is said to be inside the if block. If the variable or logical\
    \ condition itself tends to be boolean i.e. True or False, we can directly write\
    \ the condition without comparing. We can re-write the above example as shown\
    \ below:\n\n```\n# Here, buy_condition itself is a boolean variable\nif buy_condition:\n\
    \    position = 'Buy'\n```\n\nIn another scenario we want to buy a stock when\
    \ an indicator is below 20, we can use the if statement as depicted in the following\
    \ example:\n\n```\n# Buy a stock when an indicator (RSI value) is less than\n\
    # or equal to 20\nif rsi_indicator <= 20:\n    position = 'Buy'\n```\n\nAdditionally,\
    \ two or more conditions can be combined using any logical operator such as and,\
    \ or, etc. In a more refined scenario, we might want to go long on a stock only\
    \ if two conditions are true. We can do so in the following way:\n\n```\n# Input\n\
    if buy_condition_1 == True and rsi_indicator <= 20:\n    position = 'Buy'\n```\n\
    \nSimilar to the above scenario, we can compound the if condition to be as complex\
    \ as we want it to be, using different combinations of logical operators.\n\n\
    ### 7.1.2 The elif clause\n\nThe elif clause checks for new conditions and executes\
    \ the code if they are held true after the conditions evaluated by the previous\
    \ if statement weren't true. In a scenario with mutually exclusive conditions,\
    \ we might want the code to execute when one set of condition/s fails and another\
    \ holds true. Consider the following example:\n\n```\n# Input\nif buy_condition_1\
    \ == True and rsi_indicator <= 20:\n    position = 'Buy'\nelif sell_condition_1\
    \ and rsi_indicator >= 80:\n    position = 'Sell'\n```\n\nDuring the execution,\
    \ the interpreter will first check whether the conditions listed by the if statement\
    \ holds true or not. If they are true, the code within the if block will be executed.\
    \ Otherwise, the interpreter will try to check the conditions listed by the elif\
