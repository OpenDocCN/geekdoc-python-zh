    # 11.5 Importing data in Pandas


    Pandas DataFrame is able to read several data formats, some of the most used are:
    CSV, JSON, Excel, HDF5, SQL, etc.


    # 11.5.1 Importing data from CSV file


    One of the most useful functions is `read_csv` that allows us to read csv files
    with almost any format and load it into our DataFrame to work with it. Let''s
    see how to work with csv files:


    ```

    import pandas as pd

    df=pd.read_csv(''Filename.csv'')

    type(df)


    Out[]: pandas.core.frame.DataFrame

    ```


    This simple operation, loads the csv file into the Pandas DataFrame after which
    we can explore it as we have seen before.


    # 11.5.2 Customizing pandas import


    Sometimes the format of the csv file come with a particular separator or we need
    specific columns or rows. We will now see some ways to deal with this.


    In this example, we want to load a csv file with blank space as separator:


    ```

    import pandas as pd

    df=pd.read_csv(''Filename.csv'', sep='' '')

    ```


    In this example, we want to load columns from 0 and 5 and the first 100 rows:'
