- md: "## 12.3 Customization\n\nNow that we have got a good understanding of plotting\
    \ various types of charts and their basic formatting techniques, we can delve\
    \ deeper and look at some more formatting techniques. We already learned that\
    \ matplotlib does not add any styling components on its own. It will plot a simple\
    \ plain chart by default. We, as users, need to specify whatever customization\
    \ we need. We start with a simple line plot and will keep on making it better.\
    \ The following example shows plotting of close prices of the AAPL ticker that\
    \ is available with us in the dataframe data.\n\n```python\n# -Example 29-\n#\
    \ Extracting close prices from the dataframe\nclose_prices = data['AdjClose']\n\
    \n# Plotting the close prices\nplt.plot(close_prices)\nplt.show()\n```\n\nHere,\
    \ as shown in figure 29 the close_prices is the pandas Series object which gets\
    \ plotted using the plot method. However, values on the X-axis are something that\
    \ we don't want. They are all overlapped with each other. This happens as the\
    \ `plot` method did not find sufficient space for each date. One way to overcome\
    \ this issue is to rotate the values on the X-axis to make it look better.\n\n\
    ```python\n# -Example 30-\nplt.plot(close_prices)\n\n# Rotating the values along\
    \ x-axis to 45 degrees\nplt.xticks(rotation=45)\nplt.show()\n```\n\nThe `xticks`\
    \ method along with the `rotation` argument is used to rotate the values/tick\
    \ names along the x-axis. The output of this approach is shown in *figure 30*.\
    \ Another approach that can be used to resolve the overlapping issue is to increase\
    \ the figure size of the plot such that the matplotlib can easily show values\
    \ without overlapping. This is shown in the below example and the output is shown\
    \ in *figure 31*:\n\n```python\n# -Example 31-\n# Creating a figure with the size\
    \ 10 inches by 5 inches\nfig = plt.figure(figsize=(10, 5))\nplt.plot(close_prices)\n\
    plt.show()\n```\n\nSimilarly, the matplotlib provides yticks method that can be\
    \ used to customize the values on the Y-axis. Apart from the rotation argument,\
    \ there are a bunch of other parameters that can be provided xticks and yticks\
    \ to customize them further. We change the font size, color and orientation of\
    \ ticks along the axes using the appropriate arguments within these methods in\
    \ the following example:\n\n```python\n# -Example 32-\n# Creating a figure, setting\
    \ its size and plotting close\n# prices on it\nfig = plt.figure(figsize=(10, 5))\n\
    plt.plot(close_prices, color='purple')\n\n# Customizing the axes\nplt.xticks(rotation=45,\
    \ color='teal', size=12)\nplt.yticks(rotation=45, color='teal', size=12)\n\n#\
    \ Setting axes labels\nplt.xlabel('Dates', {'color': 'orange', 'fontsize':15})\n\
    plt.ylabel('Prices', {'color': 'orange', 'fontsize':15})\nplt.show()\n```\n\n\
    Along with the axes values, we change the color and font size of axes labels as\
    \ shown in figure 32. There are numbers of other customizations possible using\
    \ various arguments and matplotlib provides total flexibility to create the charts\
    \ as per one’s desire. Two main components that are missing in the above plot\
    \ are title and legend, which can be provided using the methods title and legends\
    \ respectively. Again, as with the other methods, it is possible to customize\
    \ them in a variety of way, but we will be restricting our discussion to a few\
    \ key arguments only. Adding these two methods as shown below in the above code\
    \ would produce the plot as shown in figure 33:\n\n```python\n# -Example 33-\n\
    # Showing legends and setting the title of plot\nplt.legend()\nplt.title('AAPL\
    \ Close Prices', color='purple', size=20)\n```\n\nAnother important feature that\
    \ can be added to a figure is to draw a grid within a plot using the grid method\
    \ which takes either True or False. If true, a grid is plotted, otherwise not.\
    \ An example of a plot with grid is shown below and its output is shown in figure\
    \ 34.\n\n```python\n# -Example 34-\n# Adding the grid to the plot\nplt.grid(True)\n\
    ```\n\nThe axhline method allows us to add a horizontal line across the axis to\
    \ the plot. For example, we might consider adding the mean value of close prices\
    \ to show the average price of a stock for the whole duration. It can be added\
    \ using axhline method. Computation of mean value and its addition to the original\
    \ plot is shown below:\n\n```python\n# -Example 35-\n# Importing NumPy library\n\
    import numpy as np\n\n# Calculating the mean value of close prices\nmean_price\
    \ = np.mean(close_prices)\n\n# Plotting the horizontal line along with the close\
    \ prices\nplt.axhline(mean_price, color='r', linestyle='dashed')\n```\n\nNow that\
    \ we have the mean value of close prices plotted in the figure 35, one who looks\
    \ at the chart for the first time might think what this red line conveys? Hence,\
    \ there is a need to explicitly mention it. To do so, we can use the text method\
    \ provided by matplotlib.pyplot module to plot text anywhere on the figure.\n\n\
    ```python\n# -Example 36-\n# Importing DateTime from DateTime library\nfrom datetime\
    \ import datetime\n\n# Plotting text on date 2014-1-7 and price 120\nplt.text(datetime(2014,1,7),\
    \ 120, 'Mean Price',\nsize=15, color='r')\n```\n\nThe text method takes three\
    \ compulsory arguments: x, y and t which specifies the coordinates on X and Y-axis\
    \ and text respectively. Also, we use a datetime sub-module from a datetime library\
    \ to specify a date on the X-axis as the plot we are generating has dates on the\
    \ X-axis. The chart with text indicating the mean price is shown in figure 36.\n\
    \nUsing all these customization techniques, we have been able to evolve the dull\
    \ looking price series chart to a nice and attractive graphic which is not only\
    \ easy to understand but presentable too. However, we have restricted ourselves\
    \ to plotting only a single chart. Let us brace ourselves and learn to apply these\
    \ newly acquired customization techniques to multiple plots.\n\nWe already learned\
    \ at the beginning of this chapter that a figure can have multiple plots, and\
    \ that can be achieved using the subplots method. The following examples show\
    \ stock prices of AAPL stock along with its traded volume on each day. We start\
    \ with a simple plot that plots stock prices and volumes in the below example:\n\
    \n```python\n# -Example 37-\n# Extracting volume from the dataframe 'data'\nvolume\
    \ = data['AdjVolume']\n\n# Creating figure with two rows and one column\nfig,\
    \ (ax1, ax2) = plt.subplots(nrows=2, ncols=1,\n                              \
    \  sharex=True,\n                                figsize=(10, 8))\n\n# Plotting\
    \ close prices on the first sub-plot\nax1.plot(close_prices, color='purple')\n\
    ax1.grid(True)\n\n# Plotting trading volume on the second sub-plot\nax2.bar(volume.index,\
    \ volume)\nax2.grid(True)\n\n# Displaying the plot\nplt.show()\n```\n\nFirst,\
    \ we extract the AdjVolume column from the data dataframe into a volume which\
    \ happens to be pandas series object. Then, we create a figure with sub-plots\
    \ having two rows and a single column. This is achieved using nrows and ncols\
    \ arguments respectively. The sharex argument specifies that both sub-plots will\
    \ share the same x-axis. Likewise, we also specify the figure size using the figsize\
    \ argument. These two subplots are unpacked into two axes: ax1 and ax2 respectively.\
    \ Once, we have the axes, desired charts can be plotted on them.\n\nNext, we plot\
    \ the close_prices using the plot method and specify its color to be purple using\
    \ the color argument. Similar to the plot method, matplotlib provides bar method\
    \ to draw bar plots which takes two arguments: the first argument to be plotted\
    \ on the X-axis and second argument to be plotted along the y-axis. For our example,\
    \ values on X-axis happens to be a date (specified by volume.index), and value\
    \ for each bar on the Y-axis is provided using the recently created volume series.\
    \ After that, we plot grids"
  mdcn: "## 12.3 自定义\n\n现在我们已经很好地理解了绘制各种图表及其基本格式化技术，我们可以更深入地探讨一些更高级的格式化技术。我们已经知道，matplotlib\
    \ 默认不会添加任何样式组件。它默认绘制一个简单的纯图表。作为用户，我们需要指定所需的任何自定义设置。我们从一个简单的折线图开始，并将不断优化它。以下示例展示了使用我们数据框\
    \ `data` 中的 AAPL 股票代码绘制收盘价。\n\n```python\n# -示例 29-\n# 从数据框中提取收盘价\nclose_prices\
    \ = data['AdjClose']\n\n# 绘制收盘价\nplt.plot(close_prices)\nplt.show()\n```\n\n这里，如图\
    \ 29 所示，`close_prices` 是一个 pandas Series 对象，它使用 `plot` 方法进行绘制。然而，X 轴上的值是我们不希望看到的。它们全部重叠在一起。这是因为\
    \ `plot` 方法没有为每个日期找到足够的空间。解决此问题的一种方法是旋转 X 轴上的值，使其看起来更美观。\n\n```python\n# -示例 30-\n\
    plt.plot(close_prices)\n\n# 将 x 轴上的值旋转 45 度\nplt.xticks(rotation=45)\nplt.show()\n\
    ```\n\n`xticks` 方法与 `rotation` 参数一起使用，用于旋转 x 轴上的值/刻度名称。此方法的输出如 *图 30* 所示。另一种可用于解决重叠问题的方法是增加图表的图形尺寸，以便\
    \ matplotlib 可以轻松显示值而不会重叠。下面的示例展示了这一点，其输出如 *图 31* 所示：\n\n```python\n# -示例 31-\n\
    # 创建一个尺寸为 10 英寸乘 5 英寸的图形\nfig = plt.figure(figsize=(10, 5))\nplt.plot(close_prices)\n\
    plt.show()\n```\n\n类似地，matplotlib 提供了 `yticks` 方法，可用于自定义 Y 轴上的值。除了 `rotation`\
    \ 参数外，还可以向 `xticks` 和 `yticks` 提供许多其他参数以进一步自定义它们。在下面的示例中，我们使用这些方法中的相应参数来更改刻度沿轴的字体大小、颜色和方向：\n\
    \n```python\n# -示例 32-\n# 创建一个图形，设置其大小并在其上绘制收盘价\nfig = plt.figure(figsize=(10,\
    \ 5))\nplt.plot(close_prices, color='purple')\n\n# 自定义坐标轴\nplt.xticks(rotation=45,\
    \ color='teal', size=12)\nplt.yticks(rotation=45, color='teal', size=12)\n\n#\
    \ 设置坐标轴标签\nplt.xlabel('Dates', {'color': 'orange', 'fontsize':15})\nplt.ylabel('Prices',\
    \ {'color': 'orange', 'fontsize':15})\nplt.show()\n```\n\n除了坐标轴值，我们还更改了坐标轴标签的颜色和字体大小，如图\
    \ 32 所示。使用各种参数可以进行许多其他自定义，matplotlib 提供了完全的灵活性来根据个人意愿创建图表。上述图表中缺少的两个主要组件是标题和图例，可以分别使用\
    \ `title` 和 `legend` 方法添加。同样，与其他方法一样，可以以多种方式自定义它们，但我们将讨论限制在几个关键参数上。在上面的代码中添加这两个方法，如下所示，将生成如图\
    \ 33 所示的图表：\n\n```python\n# -示例 33-\n# 显示图例并设置图表标题\nplt.legend()\nplt.title('AAPL\
    \ Close Prices', color='purple', size=20)\n```\n\n可以添加到图表的另一个重要功能是使用 `grid` 方法在绘图中绘制网格，该方法接受\
    \ `True` 或 `False`。如果为 `True`，则绘制网格，否则不绘制。下面是一个带网格的绘图示例，其输出如图 34 所示。\n\n```python\n\
    # -示例 34-\n# 向绘图添加网格\nplt.grid(True)\n```\n\n`axhline` 方法允许我们在绘图中添加一条横跨坐标轴的水平线。例如，我们可能考虑添加收盘价的平均值，以显示股票在整个时间段内的平均价格。可以使用\
    \ `axhline` 方法添加。平均值的计算及其添加到原始绘图的过程如下所示：\n\n```python\n# -示例 35-\n# 导入 NumPy 库\n\
    import numpy as np\n\n# 计算收盘价的平均值\nmean_price = np.mean(close_prices)\n\n# 绘制水平线以及收盘价\n\
    plt.axhline(mean_price, color='r', linestyle='dashed')\n```\n\n现在我们已经在图 35 中绘制了收盘价的平均值，第一次查看图表的人可能会想这条红线表示什么？因此，需要明确说明。为此，我们可以使用\
    \ `matplotlib.pyplot` 模块提供的 `text` 方法在图形的任何位置绘制文本。\n\n```python\n# -示例 36-\n#\
    \ 从 DateTime 库导入 DateTime\nfrom datetime import datetime\n\n# 在日期 2014-1-7 和价格\
    \ 120 处绘制文本\nplt.text(datetime(2014,1,7), 120, 'Mean Price',\nsize=15, color='r')\n\
    ```\n\n`text` 方法接受三个必需参数：`x`、`y` 和 `t`，分别指定 X 轴和 Y 轴上的坐标以及文本。此外，我们使用 `datetime`\
    \ 库中的 `datetime` 子模块来指定 X 轴上的日期，因为我们生成的图表在 X 轴上有日期。带有指示平均价格文本的图表如图 36 所示。\n\n\
    使用所有这些自定义技术，我们已经能够将看起来单调的价格序列图表演变成一个美观且吸引人的图形，它不仅易于理解，而且易于展示。然而，我们仅限于绘制单个图表。让我们准备好，学习如何将这些新获得的自定义技术应用于多个绘图。\n\
    \n我们在本章开头已经了解到，一个图形可以有多个绘图，这可以通过 `subplots` 方法实现。以下示例展示了 AAPL 股票的股价及其每日交易量。我们从一个简单的绘图开始，该绘图在下面的示例中绘制股票价格和交易量：\n\
    \n```python\n# -示例 37-\n# 从数据框 'data' 中提取交易量\nvolume = data['AdjVolume']\n\n#\
    \ 创建一个包含两行一列的图形\nfig, (ax1, ax2) = plt.subplots(nrows=2, ncols=1,\n          \
    \                      sharex=True,\n                                figsize=(10,\
    \ 8))\n\n# 在第一个子图上绘制收盘价\nax1.plot(close_prices, color='purple')\nax1.grid(True)\n\
    \n# 在第二个子图上绘制交易量\nax2.bar(volume.index, volume)\nax2.grid(True)\n\n# 显示绘图\nplt.show()\n\
    ```\n\n首先，我们从 `data` 数据框中提取 `AdjVolume` 列到 `volume` 中，它恰好是一个 pandas series 对象。然后，我们创建一个包含两行一列的子图图形。这分别通过\
    \ `nrows` 和 `ncols` 参数实现。`sharex` 参数指定两个子图将共享相同的 x 轴。同样，我们使用 `figsize` 参数指定图形大小。这两个子图被解包为两个坐标轴：`ax1`\
    \ 和 `ax2`。一旦我们有了坐标轴，就可以在它们上绘制所需的图表。\n\n接下来，我们使用 `plot` 方法绘制 `close_prices`，并使用\
    \ `color` 参数指定其颜色为紫色。与 `plot` 方法类似，matplotlib 提供了 `bar` 方法来绘制条形图，它接受两个参数：第一个参数绘制在\
    \ X 轴上，第二个参数绘制在 y 轴上。对于我们的示例，X 轴上的值恰好是日期（由 `volume.index` 指定），而每个条形在 Y 轴上的值则使用最近创建的\
    \ `volume` series 提供。之后，我们绘制网格"
