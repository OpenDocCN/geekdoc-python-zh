    \ each item in the array is one of the subplots. Therefore, when we want to work\
    \ with one of these axes, we can index it and use that item's methods. Let us\
    \ add the title to each subplot using the axes methods.\n\n```python\n# -Example\
    \ 5-\n# Create a figure with four subplots and shared axes\nfig, axes = plt.subplots(nrows=2,\
    \ ncols=2, sharex=True,\n                        sharey=True)\naxes[0, 0].set(title='Upper\
    \ Left')\naxes[0, 1].set(title='Upper Right')\naxes[1, 0].set(title='Lower Left')\n\
    axes[1, 1].set(title='Lower Right')\nplt.show()\n```\n\nThe above code generates\
    \ a figure with four subplots and shared X and Y axes. Axes are shared among subplots\
    \ in row wise and column-wise manner. We then set a title to each subplot using\
    \ the set method for each subplot. Subplots are arranged in a clockwise fashion\
    \ with each subplot having a unique index. The output is shown in figure 5.\n\n\
    Figure 5: Subplots with the share axes\n\n## 12.2 Plotting\n\nWe have discussed\
    \ a lot about laying things out, but we haven’t really discussed anything about\
    \ plotting data yet. Matplotlib has various plotting functions. Many more than\
    \ we will discuss and cover here. However, a full list or gallery¹ can be a bit\
    \ overwhelming at first. Hence, we will condense it down and attempt to start\
    \ with simpler plotting and than move towards more complex plotting. The plot\
    \ method of pyplot is one of the most widely used methods in Matplotlib to plot\
    \ the data. The syntax to call the plot method is shown below:\n\n```\nplot([x],\
    \ y, [fmt], data=None, **kwargs)\n```\n\nThe coordinates of the points or line\
    \ nodes are given by $x$ and $y$. The optional parameter $fmt$ is a convenient\
    \ way of defining basic formatting like color, market, and style. The plot method\
    \ is used to plot almost any kind of data in Python. It tells Python what to plot\
    \ and how to plot it, and also allows customization of the plot being generated\
    \ such as color, type, etc.\n\n¹https://matplotlib.org/gallery/index.html\n\n\
    ## 12.2.1 Line Plot\n\nA line plot can be plotted using the `plot` method. It\
    \ plots Y versus X as lines and/or markers. Below we discuss a few scenarios for\
    \ plotting line. To plot a line, we provide coordinates to be plotted along X\
    \ and Y axes separately as shown in the below code snippet.\n\n```python\n# -Example\
    \ 6-\n# Defining coordinates to be plotted on X and Y axes\n# respectively\nx\
    \ = [1.3, 2.9, 3.1, 4.7, 5.6, 6.5, 7.4, 8.8, 9.2, 10]\ny = [95, 42, 69, 11, 49,\
    \ 32, 74, 62, 25, 32]\n\n# Plot lists 'x' and 'y'\nplt.plot(x, y)\n\n# Plot axes\
    \ labels and show the plot\nplt.xlabel('X-axis Label')\nplt.ylabel('Y-axis Label')\n\
    plt.show()\n```\n\nThe above code plots values in the list `x` along the X-axis\
    \ and values in the list `y` along the Y-axis as shown in *figure 6*.\n\nThe call\
    \ to `plot` takes minimal arguments possible, i.e. values for Y-axis only. In\
    \ such a case, Matplotlib will implicitly consider the index of elements in list\
    \ `y` as the input to the X-axis as demonstrated in the below example:\n\n```python\n\
    # -Example 7-\n# Defining 'y' coordinates\ny = [95, 42, 69, 11, 49, 32, 74, 62,\
    \ 25, 32]\n\n# Plot list 'y'\nplt.plot(y)\n\n# Plot axes labels and show the plot\n\
    plt.xlabel('Index Values')\nplt.ylabel('Elements in List Y')\nplt.show()\n```\n\
    \nFigure 6: Line plot with $x$ and $y$ as data\n\nHere, we define a list called\
    \ $y$ that contains values to be plotted on Y-axis. The output for the same is\
    \ shown in *figure 7*.\n\nThe plots created uses *the default* line style and\
    \ color. The optional parameter *fmt* in the plot method is a convenient way for\
    \ defining basic formatting like color, marker, and line-style. It is a shortcut\
    \ string notation consisting of color, marker, and line:\n\n```\nfmt = '[color][marker][line]'\n\
    ```\n\nEach of them is optional. If not provided, the value from the style cycle$^2$\
    \ is used. We use this notation in the below example to change the line color:\n\
    \n```python\n# -Example 8-\n# Plot line with green color\nplt.plot(y, 'g')\n\n\
    # Plot axes labels and show the plot\nplt.xlabel('Index Values')\nplt.ylabel('Elements\
    \ in List Y')\nplt.show()\n```\n\n$^2$https://matplotlib.org/tutorials/intermediate/color_cycle.html\n\
    \nFigure 7: Line plot with y as the only data\n\nFollowing the *fmt* string notation,\
    \ we changed the color of a line to green using the character g which refers to\
    \ the line color. This generates the plot with green line as shown in *figure\
    \ 8*. Likewise, markers are added using the same notation as shown below:\n\n\
    ```python\n# -Example 9-\n# Plot continuous green line with circle markers\nplt.plot(y,\
    \ 'go-')\n\n# Plot axes labels and show the plot\nplt.xlabel('Index Values')\n\
    plt.ylabel('Elements in List Y')\nplt.show()\n```\n\nHere, the *fmt* parameters:\
    \ g refers to the green color, o refers to circle markers and - refers to a continuous\
    \ line to be plotted as shown in *figure 9*. This formatting technique allows\
    \ us to format a line plot in virtually any way we like. It is also possible to\
    \ change marker style by tweaking marker parameter in *fmt* string as shown below:\n\
    \n```python\n# -Example 10-\n# Plot continuous green line with asterisk markers\n\
    plt.plot(y, 'g*-')\n\n# Plot axes labels and show the plot\nplt.xlabel('Index\
    \ Values')\nplt.ylabel('Elements in List Y')\nplt.show()\n```\n\nThe output of\
    \ the above code is *figure 10* where the line and markers share the same color,\
    \ i.e. green specified by the *fmt* string. If we are to plot line and markers\
    \ with different colors, we can use multiple plot methods to achieve the same.\n\
    \n```python\n# -Example 11-\n# Plot list 'y'\nplt.plot(y, 'g')\n\n# Plot red circle\
    \ markers\nplt.plot(y, 'ro')\n\n# Plot axes labels and show the plot\nplt.xlabel('Index\
    \ Values')\nplt.ylabel('Elements in List Y')\nplt.show()\n```\n\nThe above code\
    \ plots line along with *red circle markers* as seen in *figure 11*. Here, we\
    \ first plot the line with the default style and then attempt to plot *markers*\
    \ with attributes *r* referring to red color and *o* referring to circle. On the\
    \ same lines, we can plot multiple sets of data using the same technique. The\
    \ example given below plots two lists on the same plot.\n\n```python\n# -Example\
    \ 12: Technique 1-\n# Define two lists\ny = [95, 42, 69, 11, 49, 32, 74, 62, 25,\
    \ 32]\ny2 = [35, 52, 96, 77, 36, 66, 50, 12, 35, 63]\n\n# Plot lists and show\
    \ them\nplt.plot(y, 'go-')\nplt.plot(y2, 'b*--')\n\n# Plot axes labels and show\
    \ the plot\nplt.xlabel('Index Values')\nplt.ylabel('Elements in Lists')\nplt.show()\n\
    ```\n\nThe output can be seen in figure 12 where both green and blue lines are\
    \ drawn on the same plot. We can achieve the same result as shown above using\
    \ the different technique as shown below:\n\n```python\n# -Example 12: Technique\
    \ 2-\n# Plot lists and show them\nplt.plot(y, 'go-', y2, 'b*--')\n\n# Plot axes\
    \ labels and show the plot\nplt.xlabel('Index Values')\nplt.ylabel('Elements in\
    \ Lists')\nplt.show()\n```\n\nEssentially, the plot method makes it very easy\
    \ to plot sequential data"
