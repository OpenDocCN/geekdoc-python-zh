- md: "## 10.4 Array Attributes and Methods\n\nWe now have some idea about the working\
    \ of NumPy arrays. Let us now explore the functionalities provided by them. As\
    \ with any Python object, NumPy arrays also have a rich set of attributes and\
    \ methods which simplifies the data analysis process to a great extent. Following\
    \ are the most useful array attributes. For illustration purpose, we will be using\
    \ previously defined arrays.\n\n- `ndim` attribute displays the number of dimensions\
    \ of an array. Using this attribute on `n_call_vol` and `pcr`, we expect dimensions\
    \ to be 1 and 2 respectively. Let's check.\n\n```python\n# Checking dimensions\
    \ for n_call_vol array\nIn []: np_call_vol.ndim\nOut[]: 1\n\nIn []: n_2d.ndim\n\
    Out[]: 2\n```\n\n- `shape` returns a tuple with the dimensions of the array. It\
    \ may also be used to reshape the array in-place by assigning a tuple of array\
    \ dimensions to it.\n\n```python\n# Checking the shape of the one-dimensional\
    \ array\nIn []: n_put_vol.shape\nOut[]: (5,)\n\n# Checking shape of the two-dimensional\
    \ array\nIn []: n_2d.shape\nOut[]: (2, 5) # It shows 2 rows and 5 columns\n\n\
    # Printing n_2d with 2 rows and 5 columns\nIn []: n_2d\nOut[]:\narray([[52.89,\
    \ 45.14, 63.84, 77.1 , 74.6 ],\n       [49.51, 50.45, 59.11, 80.49, 65.11]])\n\
    \n# Reshaping n_2d using the shape attribute\nIn []: n_2d.shape = (5, 2)\n\n#\
    \ Printing reshaped array\nIn []: n_2d\nOut[]:\narray([[52.89, 45.14],\n     \
    \  [63.84, 77.1 ],\n       [74.6 , 49.51],\n       [50.45, 59.11],\n       [80.49,\
    \ 65.11]])\n```\n\n- `size` returns the number of elements in the array.\n\n```python\n\
    In []: n_call_vol.size\nOut[]: 5\n\nIn []: n_2d.size\nOut[]: 10\n```\n\n- `dtype`\
    \ returns the data-type of the array's elements. As we learned above, NumPy comes\
    \ with its own data type just like regular built-in data types such as int, float,\
    \ str, etc.\n\n```python\nIn []: n_put_vol.dtype\nOut[]: dtype('float64')\n```\n\
    \nA typical first step in analyzing a data is getting to the data in the first\
    \ place. In an ideal data analysis process, we generally have thousands of numbers\
    \ which need to be analyzed. Simply staring at these numbers won't provide us\
    \ with any insights. Instead, what we can do is generate summary statistics of\
    \ the data. Among many useful features, NumPy also provides various statistical\
    \ functions which are good to perform such statistics on arrays.\n\nLet us create\
    \ a samples array and populate it with samples drawn from a normal distribution\
    \ with a mean of 5 and standard deviation of 1.5 and compute various statistics\
    \ on it.\n\n```python\n# Creating a one-dimensional array with 1000 samples drawn\n\
    # from a normal distribution\nIn []: samples = np.random.normal(5, 1.5, 1000)\n\
    \n# Creating a two-dimensional array with 25 samples\n# drawn from a normal distribution\n\
    In []: samples_2d = np.random.normal(5, 1.5, size=(5, 5))\n\nIn []: samples_2d\n\
    Out[]:\narray([[5.30338102, 6.29371936, 2.74075451, 3.45505812,\n        7.24391809],\n\
    \       [5.20554917, 5.33264245, 6.08886915, 5.06753721,\n        6.36235494],\n\
    \       [5.86023616, 5.54254211, 5.38921487, 6.77609903,\n        7.79595902],\n\
    \       [5.81532883, 0.76402556, 5.01475416, 5.20297957,\n        7.57517601],\n\
    \       [5.76591337, 1.79107751, 5.03874984, 5.05631362,\n        2.16099478]])\n\
    ```\n\n- `mean(a, axis=None)` returns the average of the array elements. The average\
    \ is computed over the flattened array by default, otherwise over the specified\
    \ axis.\n- `average(a, axis=None)` returns the average of the array elements and\
    \ works similar to that of `mean()`.\n\n```python\n# Computing mean\nIn []: np.mean(samples)\n\
    Out[]: 5.009649198007546\n\nIn []: np.average(samples)\nOut[]: 5.009649198007546\n\
    \n# Computing mean with axis=1 (over each row)\nIn []: np.mean(samples_2d, axis=1)\n\
    Out[]: array([5.00736622, 5.61139058, 6.27281024,\n              4.87445283, 3.96260983])\n\
    \nIn []: np.average(samples_2d, axis=1)\nOut[]: array([5.00736622, 5.61139058,\
    \ 6.27281024,\n              4.87445283, 3.96260983])\n```\n\n- `max(a, axis=None)`\
    \ returns the maximum of an array or maximum along an axis.\n\n```python\nIn []:\
    \ np.max(samples)\nOut[]: 9.626572532562523\n\nIn []: np.max(samples_2d, axis=1)\n\
    Out[]: array([7.24391809, 6.36235494, 7.79595902,\n       7.57517601, 5.76591337])\n\
    ```\n\n- `median(a, axis=None)` returns the median along the specified axis.\n\
    \n```python\nIn []: np.median(samples)\nOut[]: 5.0074934668143865\n\nIn []: np.median(samples_2d)\n\
    Out[]: 5.332642448141249\n```\n\n- `min(a, axis=None)` returns the minimum of\
    \ an array or minimum along an axis.\n\n```python\nIn []: np.min(samples)\nOut[]:\
    \ 0.1551821703754115\n\nIn []: np.min(samples_2d, axis=1)\nOut[]: array([2.74075451,\
    \ 5.06753721, 5.38921487,\n       0.76402556, 1.79107751])\n```\n\n- `var(a, axis=None)`\
    \ returns the variance of an array or along the specified axis.\n\n```python\n\
    In []: np.var(samples)\nOut[]: 2.2967299389550466\n\nIn []: np.var(samples_2d)\n\
    Out[]: 2.93390175942658\n\n# The variance is computed over each column of numbers\n\
    In []: np.var(samples_2d, axis=0)\nOut[]: array([0.07693981, 4.95043105, 1.26742732,\n\
    \       1.10560727, 4.37281009])\n```\n\n- `std(a, axis=None)` returns the standard\
    \ deviation of an array or along the specified axis.\n\n```python\nIn []: np.std(samples)\n\
    Out[]: 1.5154965981337756\n\nIn []: np.std(samples_2d)\nOut[]: 1.7128636137844075\n\
    ```\n\n- `sum(a, axis=None)` returns the sum of array elements.\n\n```python\n\
    # Recalling the array n_put_vol\nIn []: n_put_vol\nOut[]: array([52.89, 45.14,\
    \ 63.84, 77.1 , 74.6 ])\n\n# Computing sum of all elements within n_put_vol\n\
    In []: np.sum(n_put_vol)\nOut[]: 313.57\n\n# Computing sum of all array over each\
    \ row\nIn []: np.sum(samples_2d, axis=1)\nOut[]: array([25.03683109, 28.05695291,\
    \ 31.36405118,\n             24.37226413, 19.81304913])\n```\n\n- `cumsum(a, axis=None)`\
    \ returns the cumulative sum of the elements along a given axis.\n\n```python\n\
    In []: np.cumsum(n_put_vol)\nOut[]: array([ 52.89,  98.03, 161.87, 238.97, 313.57])\n\
    ```\n\nThe methods discussed above can also be directly called upon NumPy objects\
    \ such as `samples`, `n_put_vol`, `samples_2d`, etc. instead of using the `np.`\
    \ format as shown below. The output will be the same in both cases.\n\n```python\n\
    # Using np. format to compute the sum\nIn []: np.sum(samples)\nOut[]: 5009.649198007546\n\
    \n# Calling sum() directly on a NumPy object\nIn []: samples.sum()\nOut[]: 5009.649198007546\n\
    ```"
  mdcn: "## 10.4 数组属性与方法\n\n我们现在对 NumPy 数组的工作原理有了一些了解。接下来，让我们探索它们提供的功能。与任何 Python\
    \ 对象一样，NumPy 数组也拥有一套丰富的属性和方法，这在很大程度上简化了数据分析过程。以下是最有用的数组属性。为了说明目的，我们将使用之前定义的数组。\n\
    \n- `ndim` 属性显示数组的维度数量。对 `n_call_vol` 和 `pcr` 使用此属性，我们预期维度分别为 1 和 2。让我们验证一下。\n\
    \n```python\n# 检查 n_call_vol 数组的维度\nIn []: np_call_vol.ndim\nOut[]: 1\n\nIn []:\
    \ n_2d.ndim\nOut[]: 2\n```\n\n- `shape` 返回一个包含数组维度的元组。它也可用于通过将一个数组维度的元组赋值给它来就地重塑数组。\n\
    \n```python\n# 检查一维数组的形状\nIn []: n_put_vol.shape\nOut[]: (5,)\n\n# 检查二维数组的形状\n\
    In []: n_2d.shape\nOut[]: (2, 5) # 显示为 2 行 5 列\n\n# 打印具有 2 行 5 列的 n_2d\nIn []:\
    \ n_2d\nOut[]:\narray([[52.89, 45.14, 63.84, 77.1 , 74.6 ],\n       [49.51, 50.45,\
    \ 59.11, 80.49, 65.11]])\n\n# 使用 shape 属性重塑 n_2d\nIn []: n_2d.shape = (5, 2)\n\
    \n# 打印重塑后的数组\nIn []: n_2d\nOut[]:\narray([[52.89, 45.14],\n       [63.84, 77.1\
    \ ],\n       [74.6 , 49.51],\n       [50.45, 59.11],\n       [80.49, 65.11]])\n\
    ```\n\n- `size` 返回数组中的元素数量。\n\n```python\nIn []: n_call_vol.size\nOut[]: 5\n\n\
    In []: n_2d.size\nOut[]: 10\n```\n\n- `dtype` 返回数组元素的数据类型。正如我们上面所学，NumPy 有其自己的数据类型，就像常规的内置数据类型如\
    \ int、float、str 等一样。\n\n```python\nIn []: n_put_vol.dtype\nOut[]: dtype('float64')\n\
    ```\n\n数据分析的典型第一步是首先获取数据。在理想的数据分析过程中，我们通常有成千上万的数字需要分析。仅仅盯着这些数字看不会给我们带来任何洞察。相反，我们可以做的是生成数据的摘要统计。在众多有用的功能中，NumPy\
    \ 还提供了各种统计函数，非常适合对数组执行此类统计。\n\n让我们创建一个样本数组，并用从均值为 5、标准差为 1.5 的正态分布中抽取的样本填充它，并计算其各种统计量。\n\
    \n```python\n# 创建一个一维数组，包含从正态分布中抽取的 1000 个样本\nIn []: samples = np.random.normal(5,\
    \ 1.5, 1000)\n\n# 创建一个二维数组，包含从正态分布中抽取的 25 个样本\nIn []: samples_2d = np.random.normal(5,\
    \ 1.5, size=(5, 5))\n\nIn []: samples_2d\nOut[]:\narray([[5.30338102, 6.29371936,\
    \ 2.74075451, 3.45505812,\n        7.24391809],\n       [5.20554917, 5.33264245,\
    \ 6.08886915, 5.06753721,\n        6.36235494],\n       [5.86023616, 5.54254211,\
    \ 5.38921487, 6.77609903,\n        7.79595902],\n       [5.81532883, 0.76402556,\
    \ 5.01475416, 5.20297957,\n        7.57517601],\n       [5.76591337, 1.79107751,\
    \ 5.03874984, 5.05631362,\n        2.16099478]])\n```\n\n- `mean(a, axis=None)`\
    \ 返回数组元素的平均值。默认情况下，平均值是在展平的数组上计算的，否则在指定的轴上计算。\n- `average(a, axis=None)` 返回数组元素的平均值，其工作方式与\
    \ `mean()` 类似。\n\n```python\n# 计算均值\nIn []: np.mean(samples)\nOut[]: 5.009649198007546\n\
    \nIn []: np.average(samples)\nOut[]: 5.009649198007546\n\n# 计算均值，axis=1（沿每行计算）\n\
    In []: np.mean(samples_2d, axis=1)\nOut[]: array([5.00736622, 5.61139058, 6.27281024,\n\
    \              4.87445283, 3.96260983])\n\nIn []: np.average(samples_2d, axis=1)\n\
    Out[]: array([5.00736622, 5.61139058, 6.27281024,\n              4.87445283, 3.96260983])\n\
    ```\n\n- `max(a, axis=None)` 返回数组的最大值或沿轴的最大值。\n\n```python\nIn []: np.max(samples)\n\
    Out[]: 9.626572532562523\n\nIn []: np.max(samples_2d, axis=1)\nOut[]: array([7.24391809,\
    \ 6.36235494, 7.79595902,\n       7.57517601, 5.76591337])\n```\n\n- `median(a,\
    \ axis=None)` 返回沿指定轴的中位数。\n\n```python\nIn []: np.median(samples)\nOut[]: 5.0074934668143865\n\
    \nIn []: np.median(samples_2d)\nOut[]: 5.332642448141249\n```\n\n- `min(a, axis=None)`\
    \ 返回数组的最小值或沿轴的最小值。\n\n```python\nIn []: np.min(samples)\nOut[]: 0.1551821703754115\n\
    \nIn []: np.min(samples_2d, axis=1)\nOut[]: array([2.74075451, 5.06753721, 5.38921487,\n\
    \       0.76402556, 1.79107751])\n```\n\n- `var(a, axis=None)` 返回数组的方差或沿指定轴的方差。\n\
    \n```python\nIn []: np.var(samples)\nOut[]: 2.2967299389550466\n\nIn []: np.var(samples_2d)\n\
    Out[]: 2.93390175942658\n\n# 方差是按每列数字计算的\nIn []: np.var(samples_2d, axis=0)\n\
    Out[]: array([0.07693981, 4.95043105, 1.26742732,\n       1.10560727, 4.37281009])\n\
    ```\n\n- `std(a, axis=None)` 返回数组的标准差或沿指定轴的标准差。\n\n```python\nIn []: np.std(samples)\n\
    Out[]: 1.5154965981337756\n\nIn []: np.std(samples_2d)\nOut[]: 1.7128636137844075\n\
    ```\n\n- `sum(a, axis=None)` 返回数组元素的总和。\n\n```python\n# 回顾数组 n_put_vol\nIn []:\
    \ n_put_vol\nOut[]: array([52.89, 45.14, 63.84, 77.1 , 74.6 ])\n\n# 计算 n_put_vol\
    \ 中所有元素的总和\nIn []: np.sum(n_put_vol)\nOut[]: 313.57\n\n# 计算数组沿每行的总和\nIn []: np.sum(samples_2d,\
    \ axis=1)\nOut[]: array([25.03683109, 28.05695291, 31.36405118,\n            \
    \ 24.37226413, 19.81304913])\n```\n\n- `cumsum(a, axis=None)` 返回沿给定轴的元素的累积和。\n\
    \n```python\nIn []: np.cumsum(n_put_vol)\nOut[]: array([ 52.89,  98.03, 161.87,\
    \ 238.97, 313.57])\n```\n\n上面讨论的方法也可以直接在 NumPy 对象（如 `samples`、`n_put_vol`、`samples_2d`\
    \ 等）上调用，而不是使用下面所示的 `np.` 格式。两种情况下的输出将是相同的。\n\n```python\n# 使用 np. 格式计算总和\nIn []:\
    \ np.sum(samples)\nOut[]: 5009.649198007546\n\n# 直接在 NumPy 对象上调用 sum()\nIn []:\
    \ samples.sum()\nOut[]: 5009.649198007546\n```"
