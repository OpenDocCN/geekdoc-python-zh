    | :--- | :--- |\n| *Input* | 15 | 0000 1111 |\n| *<< Output* | 60 | 0011 1100\
    \ |\n\n+   - >> : Similar to the left shift operator, we have a shift right operator\
    \ that shifts bits right and fills zero on the left. While shifting bits to right,\
    \ it let the rightmost bits fall off and add new zeros to the left.\n\n```\nIn\
    \ []: 201 >> 2\nOut[]: 50\n```\n\nIn the above example, the number 201 gets shifted\
    \ right by 2 bits and we get 50 as an output. Its integrity can be verified by\
    \ the following truth table.\n\n| | Binary Numbers |\n| :--- | :--- |\n| *Input*\
    \ | 201 | 1100 1001 |\n| *>> Output* | 50 | 0011 0010 |\n\nBitwise operators find\
    \ great significance in the quantitative trading domain. They are used to determine\
    \ the trading signals based on different conditions. Generally, we assign 1 to\
    \ the *buy signal*, -1 to the *sell signal* and 0 to the *no signal*. If we have\
