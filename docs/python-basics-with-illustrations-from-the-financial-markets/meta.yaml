  md: '```

    # Creating arrays

    In []: arr_1 = np.array([1, 2, 3])


    In []: arr_2 = np.array([5, 6, 4])


    # Adding two arrays

    In []: arr_1 + arr_2

    Out[]: array([6, 8, 7])

