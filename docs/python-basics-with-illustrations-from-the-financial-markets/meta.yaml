    # Chapter 2


    # Getting Started with Python


    As we have seen in the previous section, Python offers different versions, comes
    in a variety of distributions and is suited for a myriad combinations of platform
    and devices. Thanks to its versatility, we can use Python to code nearly any task
    that we can think of logically. One of the most important tasks that a computer
    performs is mathematical computation. Python provides a direct interface to this
    fundamental functionality of modern computers. In fact an introduction of Python
    could be started by showing how it can be used as a tool for simple mathematical
    calculations.


    # 2.1 Python as a Calculator


    The easiest way to perform mathematical calculations using Python is to use the
    *Console*, which can be used as a fancy calculator. To begin with the simplest
    mathematical operations, such as addition, subtraction, multiplication and division,
    we can start using the Python *Console* using the following expressions.


    ```

    # Addition

    In []: 5 + 3

    Out[]: 8


    # Subtraction

    In []: 5 - 3

    Out[]: 2

    ```'
  - '[PAGE 25]


    ```

    # Multiplication

    In []: 5 * 3

    Out[]: 15


    # Division

    In []: 5 / 3

    Out[]: 1.6666666666666667


    # Modulo

    In []: 5 % 2

    Out[]: 1

    ```


    NOTE: The content after the # symbols are comments and can be ignored when typing
    the examples. We will examine comments in more detail in the later sections. Here,
    In refers to an input provided to the Python interpreter and Out represents the
    output returned by the interpreter. Here we use the IPython console to perform
    the above mathematical operations. They can also be performed in the Python IDLE
    (Integrated Development and Learning Environment) (aka The Shell), the Python
    console, or Jupyter notebook in a similar fashion. Basically, we have a host of
    interfaces to choose from and programmers choose what they find most comfortable.
    We will stick to the Python Console interface to write and run our Python code
    in this handbook. To be clear, each of the above-mentioned interfaces connects
    us to the Python interpreter (which does the computational heavy lifting behind
    the scenes).


    Let us dissect the above examples. A simple Python expression is similar to a
    mathematical expression. It consists of some numbers, connected by a mathematical
    *operator*. In programming terminology, numbers (this includes integers as well
    as numbers with fractional parts ex. 5, 3.89) are called *numeric literals*. An
    operator (e.g. +, -, /) indicates mathematical operation between its *operands*,
    and hence the *value* of the expression. The process of deriving the value of
    an expression is called the *evaluation* of the expression. When a mathematical
    expression is entered, the Python interpreter automatically evaluates and displays
    its value in the next line.'
- md: 'Similar to the / division operator, we also have the // integer division operator.
    The key difference is that the former outputs the decimal value known as a *float*
    which can be seen in the above example and the latter outputs an *integer* value
    i.e. without any fractional parts. We will discuss about the float and integer
    datatype in more detail in the upcoming sections. Below is an example of an integer
    division where Python returns the output value without any decimals.


    ```

    In []: 5 // 3

    Out[]: 1

    ```


    We can also use expressions as operands in longer *composite expressions*. For
    example,


    ```

    # Composite expression

    In []: 5 + 3 - 3 + 4

    Out[]: 9

    ```


    In the example above, the order of evaluation is from *left* to *right*, resulting
    in the expression 5 + 3 evaluating first. Its value 8 is then combined with the
    next operand 3 by the - operator, evaluating to the value 5 of the composite expression
    5 + 3 - 3. This value is in turn combined with the last literal 4 by the + operator,
    ending up with the value 9 for the whole expression.


    In the example, operators are applied from left to right, because - and + have
    the same priority. For an expression where we have more than one operators, it
    is not necessary all the operators have the same priority. Consider the following
    example,


    ```

    In []: 5 + 3 * 3 - 4

    Out[]: 10

    ```


    Here, the expression above evaluated to 10, because the * operator has a higher
    priority compared to - and + operators. The expression 3 * 3 is evaluated first
    resulting in the value of 9 which will be combined with the operand 5 by the operator
    + producing the value of 14. This value is in turn combined with the next operand
    4 by the operator - which results in the final value of 10. The order in which
    operators are applied is called *operator precedence*. In Python, mathematical
    operators follow the natural precedence observed in mathematics.


    Similar to mathematical functions, Python allows the use of brackets ( and ) to
    manually specify the order of evaluation, like the one illustrated below:


    ```

    # Brackets

    In []: (5 + 3) * (3 - 4)

    Out[]: -8

    ```


    The expression above evaluated to the value -8 as we explicitly defined the precedence
    for the expression 5 + 3 to be evaluated first resulting in the value 8, followed
    by 3 - 4 producing the value -1 and then finally we combined both the values 8
    and -1 with operator * resulting in the final value to be -8.


    In the examples above, an operator connects two operands, and hence they are called
    *binary operators*. In contrast, operators can also be *unary* which take only
    one operand. Such an operator is - known as negation.


    ```

    # Negation

    In []: - (5 + 3)

    Out[]: -8

    ```


    First, We compute the expression 5 + 3 resulting in the value 8 and secondly,
    we negate it with - operator producing the final value of -8.


    ## 2.1.1 Floating Point Expressions


    Whatever examples we have seen so far were performed on integers also to yield
    integers. Notice that for the expression 5 / 3 we would get a real number as an
    output even though the operands are integers. In computer science, real numbers
    are typically called *floating point numbers*. For example:


    ```

    # Floating Point Addition

    In []: 5.0 + 3

    Out[]: 8.0

    ```


    ```

    # Floating Point Multiplication

    In []: 5.0 * 3

    Out[]: 15.0

    ```


    ```

    # Floating Point Exponential

    In []: 5.0 ** 3

    Out[]: 125.0

    ```


    ```

    # Floating Point Exponential

    In []: 36 ** 0.5

    Out[]: 6.0

    ```


    For the above example, the last part calculates the positive square root of 36.


    Python provides a very convenient option to check the type of number, be it an
    output of an expression or the operand itself.


    ```

    In []: type(5)

    Out[]: int

    ```


    ```

    In []: type(5.0)

    Out[]: float

    ```


    ```

    In []: type(5.0 ** 3)

    Out[]: float

    ```


    The command `type(x)` returns the type of x. This command is a *function* in Python
    where `type()` is a built-in function in Python. We can call a function with a
    specific *argument* in order to obtain a return value. In the above example, calling
    a function `type` with the argument 5 returns the value `int` which means 5 is
    an Integer. The function calls can also be considered as an expression similar
    to mathematical expressions, with a function name followed by a comma-separated
    list of arguments enclosed within parentheses. The value of a function call expression
    is the return value of the function. Following the same example discussed above,
    `type` is the function name, which takes a single argument and returns the type
    of argument. As a result, the call to function `type(5.0)` returns the value as
    a float.


    We can also convert the type of an argument using the following built-in functions.
    For example,


    ```

    In []: float(5)

    Out[]: 5.0


    In []: type(float(5))

    Out[]: float


    In []: int(5.9)

    Out[]: 5


    In []: type(int(5.9))

    Out[]: int

    ```


    As can be seen in the above example, using the `float` function call, which takes
    a single argument, we can convert an integer input to a float value. Also, we
    cross verify it by using the `type` function. Likewise, we have an `int` function
    using which we can change a float input to the integer value. During the conversion
    process `int` function just ignores the fractional part of the input value. In
    the last example, the return value of `int(5.9)` is 5, even though 5.9 is numerically
    closer to the integer 6. For floating point conversion by rounding up an integer,
    we can use the `round` function.


    ```

    In []: round(5.9)

    Out[]: 6


    In []: round(5.2)

    Out[]: 5

    ```


    A call to the `round` function will return a value numerically closer to the argument.
    It can also round up to a specific number of digits after the decimal point in
    the argument. We then need to specify two arguments to the function call, with
    the second argument specifying the number of digits to keep after the decimal
    point. The following examples illustrate the same. A *comma* is used to separate
    the arguments in the function call.


    ```

    In []: round(5.98765, 2)

    Out[]: 5.99

    ```


    ```

    In []: round(5.98765, 1)

    Out[]: 6.0

    ```


    Another useful function is abs, which takes one numerical argument and returns
    its absolute value.


    ```

    In []: abs(-5)

    Out[]: 5


    In []: abs(5)

    Out[]: 5


    In []: abs(5.0)

    Out[]: 5.0

    ```


    We can also express a floating point expression using *scientific notation* in
    the following manner.


    ```

    In []: 5e1

    Out[]: 50.0


    In []: 5e-1

    Out[]: 0.5


    In []: 5E2

    Out[]: 500.0

    ```


    ## 2.2 Python Basics


    We have just completed a brief overview of some functionalities in Python. Let''s
    now get ourselves acquainted with the basics of Python.


    ### 2.2.1 Literal Constants


    We have seen literals and their use in the above examples. Here we define what
    they are. Some more concrete examples of numeric literals are 5, 2.85, or string
    literals are `I am a string` or `Welcome to EPAT!`.


    It is called a *literal* because we use its value literally. The number 5 always
    represents itself and nothing else -- it is a *constant* because its value cannot
    be changed. Similarly, value 2.85 represents itself. Hence, all these are said
    to be a literal constant.


    ### 2.2.2 Numbers


    We have already covered numbers in detail in the above section. Here we will discuss
    it in brief. Numbers can be broadly classified into two types - integer and float.


    Examples of an integer number (*int* for short) are - 5, 3, 2, etc. It is just
    a whole number.


    Examples of a floating point number (*floats* for short) are - 2.98745, 5.5, 5e-1,
    etc. Here, e refers to the power of 10. We can write either e or E, both work
    just fine.


    > NOTE: As compared to other programming languages, we do not have separate long
    or double. In Python, int can be of any length.


    ### 2.2.3 Strings


    Simply put, a string is a sequence of characters. We use strings almost everywhere
    in Python code. Python supports both ASCII and Unicode strings. Let us explore
    strings in more detail.


    *Single Quote* - We can specify a string using single quotes such as ''Python
    is an easy programming language!''. All spaces and tabs within the quotes are
    preserved as-is.


    *Double Quotes* - We can also specify string using double quotes such as "Yes!
    Indeed, Python is easy.". Double quotes work the same way single quotes works.
    Either can be used.


    *Triple Quotes* - This is used as a delimiter to mark the start and end of a comment.
    We explain it in greater detail in the next topic.'
