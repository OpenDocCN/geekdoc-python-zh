- md: "## Looping over a one-dimensional array\n\n```python\nIn []: for element in\
    \ arr_1d:\n   ...:     print(element)\n\n# Output\n52\n88\n41\n63\n94\n```\n\n\
    Looping over a one-dimensional array is easy and straight forward. But, if we\
    \ are to execute the for loop with arr_2d, it will be traverse all rows and provide\
    \ that as the output. It is demonstrated in the following example.\n\n```python\n\
    In []: for element in arr_2d:\n   ...:     print(element)\n\n# Output\n['a' 'b'\
    \ 'c']\n['d' 'e' 'f']\n['g' 'h' 'i']\n```\n\nTo iterate over two-dimensional arrays,\
    \ we need to take care of both axes. A separate for loop can be used in a nested\
    \ format to traverse through each element as shown below:\n\n```python\nIn []:\
    \ for element in arr_2d:\n   ...:     for e in element:\n   ...:         print(e)\n\
    \n# Output\na\nb\nc\nd\ne\nf\ng\nh\ni\n```\n\nThe output that we got can also\
    \ be achieved using `nditer()` method of NumPy, and it works for irrespective\
    \ of dimensions.\n\n```python\nIn []: for element in np.nditer(arr_2d):\n   ...:\
    \     print(element)\n\n# Output\na\nb\nc\nd\ne\nf\ng\nh\ni\n```\n\nThis brings\
    \ us to the end of a journey with the NumPy module. The examples provided above\
    \ depicts only a minimal set of NumPy functionalities. Though not comprehensive,\
    \ it should give us a pretty good feel about what is NumPy and why we should be\
    \ using it.\n\n## 10.7 Key Takeaways\n\n1. NumPy library is used to perform scientific\
