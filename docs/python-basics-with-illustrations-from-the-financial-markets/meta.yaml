    ModuleNotFoundError: No module named 'vwap_module'\n```\n\nWhen Python hits the\
    \ line `import vwap_module`, it tries to find a package or a module called `vwap_module`.\
    \ A module is a file with a matching extension, such as `.py`. Here, Python is\
