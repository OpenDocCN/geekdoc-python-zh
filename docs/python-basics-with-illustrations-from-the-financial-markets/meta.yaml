    \n### 8.1.2 enumerate() 函数\n\n`enumerate()` 函数接受任何可迭代对象（如列表）作为参数，并返回一个特殊的枚举对象，该对象包含由原始可迭代对象的元素及其在可迭代对象中的索引组成的对。我们可以使用\
