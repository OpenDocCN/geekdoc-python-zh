    ```


    我们也可以在更长的 *复合表达式* 中使用表达式作为操作数。例如，


    ```

    # 复合表达式

    In []: 5 + 3 - 3 + 4

    Out[]: 9

    ```


    在上面的例子中，求值顺序是从 *左* 到 *右*，因此表达式 `5 + 3` 首先被求值。其值 8 然后与下一个操作数 3 通过 `-` 运算符结合，计算出复合表达式
    `5 + 3 - 3` 的值 5。这个值接着与最后一个字面量 4 通过 `+` 运算符结合，最终得到整个表达式的值 9。


    在这个例子中，运算符从左到右应用，因为 `-` 和 `+` 具有相同的优先级。对于包含多个运算符的表达式，并非所有运算符都具有相同的优先级。考虑以下例子，


    ```

    In []: 5 + 3 * 3 - 4

    Out[]: 10

    ```


    这里，上面的表达式求值为 10，因为 `*` 运算符的优先级高于 `-` 和 `+` 运算符。表达式 `3 * 3` 首先被求值，结果为 9，然后与操作数
    5 通过 `+` 运算符结合，产生值 14。这个值接着与下一个操作数 4 通过 `-` 运算符结合，最终得到值 10。运算符应用的顺序称为 *运算符优先级*。在
    Python 中，数学运算符遵循数学中观察到的自然优先级。


    与数学函数类似，Python 允许使用括号 `(` 和 `)` 来手动指定求值顺序，如下所示：


    ```

    # 括号

    In []: (5 + 3) * (3 - 4)

    Out[]: -8

    ```


    上面的表达式求值为 -8，因为我们明确定义了表达式 `5 + 3` 的优先级，使其首先被求值，结果为 8，接着 `3 - 4` 产生值 -1，最后我们将值
    8 和 -1 通过 `*` 运算符结合，最终得到值 -8。


    在上面的例子中，一个运算符连接两个操作数，因此它们被称为 *二元运算符*。相比之下，运算符也可以是 *一元* 的，只接受一个操作数。这样的运算符是 `-`，称为取反。


    ```

    # 取反

    In []: - (5 + 3)

    Out[]: -8

    ```


    首先，我们计算表达式 `5 + 3`，结果为 8，其次，我们使用 `-` 运算符对其取反，产生最终值 -8。


    ## 2.1.1 浮点表达式


    到目前为止我们看到的所有例子都是在整数上执行的，结果也是整数。注意，对于表达式 `5 / 3`，即使操作数是整数，我们也会得到一个实数作为输出。在计算机科学中，实数通常被称为
    *浮点数*。例如：


    ```

    # 浮点数加法

    In []: 5.0 + 3

    Out[]: 8.0

    ```


    ```

    # 浮点数乘法

    In []: 5.0 * 3

    Out[]: 15.0

    ```


    ```

    # 浮点数幂运算

    In []: 5.0 ** 3

    Out[]: 125.0

    ```


    ```

    # 浮点数幂运算

    In []: 36 ** 0.5

    Out[]: 6.0

    ```


    对于上面的例子，最后一部分计算的是 36 的正平方根。


    Python 提供了一个非常方便的选项来检查数字的类型，无论是表达式的输出还是操作数本身。


    ```

    In []: type(5)

    Out[]: int

    ```


    ```

    In []: type(5.0)

    Out[]: float

    ```


    ```

    In []: type(5.0 ** 3)

    Out[]: float

    ```


    命令 `type(x)` 返回 x 的类型。这个命令是 Python 中的一个 *函数*，其中 `type()` 是 Python 的内置函数。我们可以使用特定的
    *参数* 调用函数以获取返回值。在上面的例子中，使用参数 5 调用函数 `type` 返回值 `int`，这意味着 5 是一个整数。函数调用也可以被视为类似于数学表达式的表达式，由函数名后跟括号内逗号分隔的参数列表组成。函数调用表达式的值是函数的返回值。按照上面讨论的同一个例子，`type`
    是函数名，它接受一个参数并返回参数的类型。因此，调用函数 `type(5.0)` 返回的值是浮点数。


    我们也可以使用以下内置函数转换参数的类型。例如，


    ```

    In []: float(5)

    Out[]: 5.0


    In []: type(float(5))

    Out[]: float


    In []: int(5.9)

    Out[]: 5


    In []: type(int(5.9))

    Out[]: int

    ```


    如上例所示，使用 `float` 函数调用（它接受一个参数），我们可以将整数输入转换为浮点数值。此外，我们使用 `type` 函数进行了交叉验证。同样，我们有一个
    `int` 函数，可以使用它将浮点数输入更改为整数值。在转换过程中，`int` 函数只是忽略输入值的小数部分。在最后一个例子中，`int(5.9)` 的返回值是
    5，即使 5.9 在数值上更接近整数 6。对于通过向上取整进行浮点数转换，我们可以使用 `round` 函数。


    ```

    In []: round(5.9)

    Out[]: 6


    In []: round(5.2)

    Out[]: 5

    ```


    调用 `round` 函数将返回一个在数值上更接近参数的值。它也可以将参数四舍五入到小数点后特定位数。然后我们需要向函数调用指定两个参数，第二个参数指定小数点后要保留的位数。以下示例对此进行了说明。函数调用中使用
    *逗号* 分隔参数。


    ```

    In []: round(5.98765, 2)

    Out[]: 5.99

    ```


    ```

    In []: round(5.98765, 1)

    Out[]: 6.0

    ```


    另一个有用的函数是 `abs`，它接受一个数值参数并返回其绝对值。


    ```

    In []: abs(-5)

    Out[]: 5


    In []: abs(5)

    Out[]: 5


    In []: abs(5.0)

    Out[]: 5.0

    ```


    我们也可以使用 *科学计数法* 以以下方式表示浮点表达式。


    ```

    In []: 5e1

    Out[]: 50.0


    In []: 5e-1

    Out[]: 0.5


    In []: 5E2

    Out[]: 500.0

    ```


    ## 2.2 Python 基础


    我们刚刚完成了 Python 中一些功能的简要概述。现在让我们熟悉一下 Python 的基础知识。


    ### 2.2.1 字面量常量


    我们已经在上面的例子中看到了字面量及其用法。这里我们定义它们是什么。更多具体的数字字面量例子是 5、2.85，或者字符串字面量是 `I am a string`
    或 `Welcome to EPAT!`。


    它被称为 *字面量*，因为我们直接使用它的值。数字 5 总是代表它自己，而不是其他任何东西——它是一个 *常量*，因为它的值不能被改变。同样，值 2.85
    代表它自己。因此，所有这些都被称为字面量常量。


    ### 2.2.2 数字


    我们已经在上面的章节中详细介绍了数字。这里我们将简要讨论它。数字可以大致分为两种类型——整数和浮点数。


    整数（简称 *int*）的例子有 - 5、3、2 等。它只是一个整数。


    浮点数（简称 *floats*）的例子有 - 2.98745、5.5、5e-1 等。这里，e 指的是 10 的幂。我们可以写 e 或 E，两者都可以。


    > 注意：与其他编程语言相比，我们没有单独的 long 或 double。在 Python 中，int 可以是任意长度。


    ### 2.2.3 字符串


    简单来说，字符串是字符的序列。我们在 Python 代码中几乎到处使用字符串。Python 支持 ASCII 和 Unicode 字符串。让我们更详细地探讨字符串。


    *单引号* - 我们可以使用单引号指定字符串，例如 ''Python is an easy programming language!''。引号内的所有空格和制表符都按原样保留。


    *双引号* - 我们也可以使用双引号指定字符串，例如 "Yes! Indeed, Python is easy."。双引号的工作方式与单引号相同。两者都可以使用。


    *三引号* - 这用作分隔符来标记注释的开始和结束。我们将在下一个主题中更详细地解释它。'
