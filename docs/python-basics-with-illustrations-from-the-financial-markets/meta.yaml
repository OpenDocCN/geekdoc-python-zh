    \ is simply a name given to an object. From Python basics, we know that everything\
    \ in Python are objects. And a name is a way to access the underlying object.\
    \ Let us create a new variable with a name price having a value 144, and check\
    \ the *memory location identifier* accessible by the function id.\n\n```python\n\
    # Creating new variable\nprice = 144\n\n# Case 1: Print memory id of the variable\
    \ price\nprint(id(price))\n\n# Case 1: Output\n1948155424\n\n# Case 2: Print memory\
    \ id of the absolute value 144\nprint(id(144))\n\n# Case 2: Output\n1948155424\n\
    ```\n\nInterestingly we see that the memory location of both cases (the variable\
    \ and its assigned value) is the same. In other words, both refer to the same\
    \ integer object. If you would execute the above code on your workstation, memory\
    \ location would almost certainly be different, but it would be the same for both\
    \ the variable and value. Let’s add more fun to it. Consider the following code:\n\
    \n```python\n# Assign price to old_price\nold_price = price\n\n# Assign new value\
    \ to price\nprice = price + 1\n\n# Print price\nprint(price)\n\n# Output\n145\n\
    \n# Print memory location of price and 145\nprint('Memory location of price:',\
    \ id(price))\nprint('Memory location of 145:', id(145))\n\n# Output\nMemory location\
    \ of price: 1948155456\nMemory location of 145: 1948155456\n\n# Print memory location\
    \ of old_price and 144\nprint('Memory location of old_price:', id(old_price))\n\
    print('Memory location of 144:', id(144))\n\n# Output\nMemory location of old_price:\
    \ 1948155424\nMemory location of 144: 1948155424\n```\n\nWe increased the value\
    \ of a variable price by 1 unit and see that the memory location of it got changed.\
    \ As you may have guessed, the memory location of an integer object 145 would\
    \ also be the same as that of price. However, if we check the memory location\
    \ of a variable old_price, it would point to the memory location of integer object\
    \ 144. This is efficient as Python does not need to create duplicate objects.\
    \ This also makes Python powerful in a sense that a name could refer to any object,\
    \ even functions. Note that functions are also objects in Python. Now that we\
    \ are aware of the nitty-gritty of names in Python, we are ready to examine namespaces\
    \ closely.\n\n## 9.3.2 Namespace\n\nName conflicts happen all the time in real\
    \ life. For example, we often see that there are multiple students with the same\
    \ name X in a classroom. If someone has to call the student X, there would be\
    \ a conflicting situation for determining which student X is actually being called.\
    \ While calling, one might use the last name along with the student's first name\
    \ to ensure that the call is made to the correct student X.\n\nSimilarly, such\
    \ conflicts also arise in programming. It is easy and manageable to have unique\
    \ names when programs are small without any external dependencies. Things start\
    \ becoming complex when programs become larger and external modules are incorporated.\
    \ It becomes difficult and wearisome to have unique names for all objects in the\
    \ program when it spans hundreds of lines.\n\nA namespace can be thought of a\
    \ naming system to avoid ambiguity between names and ensures that all the names\
    \ in a program are unique and can be used without any conflict. Most namespaces\
    \ are implemented as a dictionary in Python. There is a name to object mapping,\
    \ with names as keys and objects as values. Multiple namespaces can use the same\
    \ name and map it to a different object. Namespaces are created at different moments\
    \ and have different lifetimes. Examples of namespaces are:\n\n- The set of built-in\
    \ names: It includes built-in functions and built-in exception names.\n- The global\
    \ names in a module: It includes names from various modules imported in a program.\n\
    - The local names in a function: It includes names inside a function. It is created\
    \ when a function is called and lasts until the function returns.\n\nThe important\
    \ thing to know about namespaces is that there is absolutely no relation between\
    \ names in different namespaces; that is, two different modules can contain a\
    \ function sum without any conflict or confusion. However, they must be prefixed\
    \ with the module name when used.\n\n## 9.3.3 Scopes\n\nUntil now we've been using\
    \ objects anywhere in a program. However, an important thing to note is not all\
    \ objects are always accessible everywhere in a program. This is where the concept\
    \ of scope comes into the picture. A *scope* is a region of a Python program where\
    \ a namespace is directly accessible. That is when a reference to a name (lists,\
    \ tuples, variables, etc.) is made, Python attempts to find the name in the namespace.\
    \ The different types of scopes are:\n\n*Local scope*: Names that are defined\
    \ within a local scope means they are defined inside a function. They are accessible\
    \ only within a function. Names defined within a function cannot be accessed outside\
    \ of it. Once the execution of a function is over, names within the local scope\
    \ cease to exist. This is illustrated below:\n\n```python\n# Defining a function\n\
    def print_number():\n    # This is local scope\n    n = 10\n    # Printing number\n\
    \    print('Within function: Number is', n)\n\nprint_number()\n\n# This statement\
    \ will cause error when executed\nprint('Outside function: Number is', n)\n\n\
    # Output\nWithin function: Number is 10\n\nTraceback (most recent call last):\n\
    \nFile \"<ipython-input-2>\", line 8, in <module>\n    print('Outside function:\
    \ Number is', n)\n\nNameError: name 'n' is not defined\n```\n\n*Enclosing scope*:\
    \ Names in the enclosing scope refer to the names defined within enclosing functions.\
    \ When there is a reference to a name that is not available within the local scope,\
    \ it will be searched within the enclosing scope. This is known as scope resolution.\
    \ The following example helps us understand this better:\n\n```python\n# This\
    \ is enclosing / outer function\ndef outer():\n\n    number = 10\n\n    # This\
    \ is nested / inner function\n    def inner():\n        print('Number is', number)\n\
    \n    inner()\n\nouter()\n\n# Output\nNumber is 10\n```\n\nWe try to print the\
    \ variable `number` from within the `inner` function where it is not defined.\
    \ Hence, Python tries to find the variable in the `outer` function which works\
    \ as an enclosing function. What if the variable is not found within the enclosing\
    \ scope as well? Python will try to find it in the `global` scope which we discuss\
    \ next.\n\n*Global scope*: Names in the global scope means they are defined within\
    \ the main script of a program. They are accessible almost everywhere within the\
    \ program. Consider the following example where we define a variable `n` before\
    \ a function definition (that is, within global scope) and define another variable\
    \ with the same name `n` within the function.\n\n```python\n# Global variable\n\
    n = 3\n\ndef relu(val):\n    # Local variable\n    n = max(0, val)\n    return\
    \ n\n\nprint('First statement: ', relu(-3))\nprint('Second statement:', n)\n\n\
    # Output\nFirst statement:  0\nSecond statement: 3\n```\n\nHere, the first print\
    \ statement calls the `relu` function with a value of -3 which evaluates the maximum\
    \ number to 0 and assigns the maximum number to the variable n which in turn gets\
    \ returned thereby printing 0. Next, we attempt to print the n and Python prints\
    \ 3. This is because Python now refers to the variable n defined outside the function\
    \ (within the global scope). Hence, we got two different values of n as they reside\
    \ in different scopes. This brings us to one obvious question, what if the variable\
    \ is not defined within the local scope, but available in the globals scope and\
    \ we try to access that global variable? The answer is intuitive, we will be able\
    \ to access it within the function. However, it would be a read-only variable\
    \ and hence we won't be able to modify it. An attempt to modify a global variable\
    \ result in the error as shown below:\n\n```python\n# Global variable\nnumber\
    \ = 5\n\n# Function that updates the global variable\ndef update_number():\n \
    \   number = number + 2\n    print('Within function: Number is', number)\n\n#\
    \ Calling the function\nupdate_number()\n\nprint('Outside function: Number is',\
    \ number)\n\n# Output\nTraceback (most recent call last):\n\nFile \"<ipython-input-8>\"\
    , line 8, in <module>\n    update_number()\n\nFile \"<ipython-input-8>\", line\
    \ 4, in update_number\n    number = number + 2\n\nUnboundLocalError: local variable\
    \ 'number' referenced before assignment\n```\n\nTo handle such a situation which\
    \ demands modification of a global name, we define the global name within the\
    \ function followed by the global key-"
  mdcn: "## 9.3.1 Python 世界中的名称\n\n一个*名称*（也称为标识符）就是赋予对象的一个名字。从 Python 基础知识中，我们知道 Python\
    \ 中的一切都是对象。而名称是访问底层对象的一种方式。让我们创建一个名为 `price`、值为 144 的新变量，并通过函数 `id` 检查其可访问的*内存位置标识符*。\n\
    \n```python\n# Creating new variable\nprice = 144\n\n# Case 1: Print memory id\
    \ of the variable price\nprint(id(price))\n\n# Case 1: Output\n1948155424\n\n\
    # Case 2: Print memory id of the absolute value 144\nprint(id(144))\n\n# Case\
    \ 2: Output\n1948155424\n```\n\n有趣的是，我们看到两种情况（变量及其赋值）的内存位置是相同的。换句话说，它们都指向同一个整数对象。如果你在自己的工作站上执行上述代码，内存位置几乎肯定会不同，但对于变量和值来说，它们将是相同的。让我们再增加点趣味。考虑以下代码：\n\
    \n```python\n# Assign price to old_price\nold_price = price\n\n# Assign new value\
    \ to price\nprice = price + 1\n\n# Print price\nprint(price)\n\n# Output\n145\n\
    \n# Print memory location of price and 145\nprint('Memory location of price:',\
    \ id(price))\nprint('Memory location of 145:', id(145))\n\n# Output\nMemory location\
    \ of price: 1948155456\nMemory location of 145: 1948155456\n\n# Print memory location\
    \ of old_price and 144\nprint('Memory location of old_price:', id(old_price))\n\
    print('Memory location of 144:', id(144))\n\n# Output\nMemory location of old_price:\
    \ 1948155424\nMemory location of 144: 1948155424\n```\n\n我们将变量 `price` 的值增加了 1\
    \ 个单位，并看到它的内存位置发生了变化。正如你可能猜到的，整数对象 145 的内存位置也将与 `price` 相同。然而，如果我们检查变量 `old_price`\
    \ 的内存位置，它将指向整数对象 144 的内存位置。这是高效的，因为 Python 不需要创建重复的对象。这也使得 Python 在某种意义上非常强大，因为一个名称可以引用任何对象，甚至是函数。请注意，函数在\
    \ Python 中也是对象。既然我们已经了解了 Python 中名称的细节，我们就可以开始仔细研究命名空间了。\n\n## 9.3.2 命名空间\n\n\
    名称冲突在现实生活中时有发生。例如，我们经常看到一个教室里有多个同名的学生 X。如果有人要叫学生 X，就会出现确定到底在叫哪个学生 X 的冲突情况。在呼叫时，可能会使用姓氏加上学生的名字，以确保呼叫的是正确的学生\
    \ X。\n\n同样，这种冲突在编程中也会出现。当程序很小且没有任何外部依赖时，拥有唯一的名称是容易且可管理的。当程序变大并引入外部模块时，事情开始变得复杂。当程序跨越数百行代码时，为程序中的所有对象都拥有唯一的名称变得困难且令人厌烦。\n\
    \n命名空间可以被认为是一个命名系统，用于避免名称之间的歧义，并确保程序中的所有名称都是唯一的，可以无冲突地使用。大多数命名空间在 Python 中实现为字典。存在一个名称到对象的映射，其中名称作为键，对象作为值。多个命名空间可以使用相同的名称并将其映射到不同的对象。命名空间在不同的时刻创建，并具有不同的生命周期。命名空间的示例包括：\n\
    \n-   内置名称的集合：它包括内置函数和内置异常名称。\n-   模块中的全局名称：它包括程序中导入的各种模块的名称。\n-   函数中的局部名称：它包括函数内部的名称。它在函数被调用时创建，并持续到函数返回。\n\
    \n关于命名空间需要了解的重要一点是，不同命名空间中的名称之间绝对没有关系；也就是说，两个不同的模块可以包含一个函数 `sum` 而不会产生任何冲突或混淆。但是，在使用时必须加上模块名作为前缀。\n\
    \n## 9.3.3 作用域\n\n到目前为止，我们一直在程序中的任何地方使用对象。然而，需要注意的一个重要事项是，并非所有对象在程序中的任何地方都是可访问的。这就是作用域概念出现的地方。*作用域*是\
    \ Python 程序中可以直接访问命名空间的区域。也就是说，当引用一个名称（列表、元组、变量等）时，Python 会尝试在命名空间中查找该名称。不同类型的作用域包括：\n\
    \n*局部作用域*：在局部作用域中定义的名称意味着它们是在函数内部定义的。它们只能在函数内部访问。在函数内部定义的名称不能在函数外部访问。一旦函数执行完毕，局部作用域内的名称就不再存在。下面对此进行了说明：\n\
    \n```python\n# Defining a function\ndef print_number():\n    # This is local scope\n\
    \    n = 10\n    # Printing number\n    print('Within function: Number is', n)\n\
    \nprint_number()\n\n# This statement will cause error when executed\nprint('Outside\
    \ function: Number is', n)\n\n# Output\nWithin function: Number is 10\n\nTraceback\
    \ (most recent call last):\n\nFile \"<ipython-input-2>\", line 8, in <module>\n\
    \    print('Outside function: Number is', n)\n\nNameError: name 'n' is not defined\n\
    ```\n\n*嵌套作用域*：嵌套作用域中的名称指的是在嵌套函数中定义的名称。当引用一个在局部作用域中不可用的名称时，它将在嵌套作用域中进行搜索。这被称为作用域解析。以下示例帮助我们更好地理解这一点：\n\
    \n```python\n# This is enclosing / outer function\ndef outer():\n\n    number\
    \ = 10\n\n    # This is nested / inner function\n    def inner():\n        print('Number\
    \ is', number)\n\n    inner()\n\nouter()\n\n# Output\nNumber is 10\n```\n\n我们尝试从\
    \ `inner` 函数内部打印变量 `number`，但它并未在该函数中定义。因此，Python 尝试在 `outer` 函数中查找该变量，该函数充当嵌套函数。如果变量在嵌套作用域中也找不到呢？Python\
    \ 将尝试在 `global` 作用域中查找它，我们接下来讨论。\n\n*全局作用域*：全局作用域中的名称意味着它们是在程序的主脚本中定义的。它们几乎可以在程序中的任何地方访问。考虑以下示例，我们在函数定义之前（即在全局作用域内）定义了一个变量\
    \ `n`，并在函数内部定义了另一个同名变量 `n`。\n\n```python\n# Global variable\nn = 3\n\ndef relu(val):\n\
    \    # Local variable\n    n = max(0, val)\n    return n\n\nprint('First statement:\
    \ ', relu(-3))\nprint('Second statement:', n)\n\n# Output\nFirst statement:  0\n\
    Second statement: 3\n```\n\n这里，第一个打印语句调用 `relu` 函数，传入值 -3，计算出最大数为 0，并将最大数赋值给变量\
    \ `n`，然后返回该值，从而打印出 0。接下来，我们尝试打印 `n`，Python 打印出 3。这是因为 Python 现在引用的是在函数外部（全局作用域内）定义的变量\
    \ `n`。因此，我们得到了两个不同的 `n` 值，因为它们位于不同的作用域中。这引出了一个显而易见的问题：如果变量在局部作用域中未定义，但在全局作用域中可用，并且我们尝试访问该全局变量呢？答案是直观的，我们可以在函数内部访问它。然而，它将是一个只读变量，因此我们无法修改它。尝试修改全局变量将导致如下所示的错误：\n\
    \n```python\n# Global variable\nnumber = 5\n\n# Function that updates the global\
    \ variable\ndef update_number():\n    number = number + 2\n    print('Within function:\
    \ Number is', number)\n\n# Calling the function\nupdate_number()\n\nprint('Outside\
    \ function: Number is', number)\n\n# Output\nTraceback (most recent call last):\n\
    \nFile \"<ipython-input-8>\", line 8, in <module>\n    update_number()\n\nFile\
    \ \"<ipython-input-8>\", line 4, in update_number\n    number = number + 2\n\n\
    UnboundLocalError: local variable 'number' referenced before assignment\n```\n\
    \n为了处理需要修改全局名称的这种情况，我们在函数内部定义全局名称，后跟 `global` 关键字-"
