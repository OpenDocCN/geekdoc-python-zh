    \n```python\nIn []: len(ticker)\nOut[]: 5\n\nIn []: len(tickers)\nOut[]: 2\n```\n\
    \n现在我们讨论dict类提供的一些常用方法。\n\n- items()：此方法返回一个包含调用对象中所有项目的对象。\n\n```python\nIn []:\
