    \n```python\nIn []: import builtins\n\nIn []: dir(builtins)\nOut[]: ['ArithmeticError',\
    \ 'AssertionError',\n        'AttributeError', 'BaseException',\n        'BlockingIOError',\
    \ 'BrokenPipeError',\n        'BufferError', 'BytesWarning', 'ChildProcessError',\n\
