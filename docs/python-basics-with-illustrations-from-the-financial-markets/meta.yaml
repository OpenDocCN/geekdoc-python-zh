    # 12.1 Basic Concepts


    Matplotlib allows creating a wide variety of plots and graphs. It is a humongous
    project and can seem daunting at first. However, we will break it down into bite-sized
    components and so learning it should be easier. Different sources use ‘plot’ to
    mean different things. So let us begin by defining specific terminology used across
    the domain.


    +   - Figure is the top-level container in the hierarchy. It is the overall window
    where everything is drawn. We can have multiple independent figures, and each
    figure can have multiple Axes. It can be created using the figure method of pyplot
    module.

    - Axes is where the plotting occurs. The axes are effectively the area that we
    plot data on. Each Axes has an X-Axis and a Y-Axis.


    The below mentioned example illustrates the use of the above-mentioned terms:


    ```

    fig = plt.figure()

    <Figure size 432x288 with 0 Axes>

    ```


    Upon running the above example, nothing happens really. It only creates a figure
    of size 432 x 288 with 0 Axes. Also, Matplotlib will not show anything until told
    to do so. Python will wait for a call to show method to display the'
