    \n```python\n# 生成一个0到6之间的随机整数\nIn []: np.random.randint(6)\nOut[]: 2\n```\n\n\
    ```python\n# 生成一个6到9之间的随机整数\nIn []: np.random.randint(6, 9)\nOut[]: 7\n```\n\n\
