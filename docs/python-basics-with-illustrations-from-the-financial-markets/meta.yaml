    \ True\n  ```\n\n## 6.2.4 位运算符\n\n位运算符用于比较和对二进制数执行逻辑运算。本质上，操作是针对二进制数的每一位执行的，而不是针对整个数字。二进制数由\
    \ 0 和 1 的组合表示。为了更好地理解，我们定义以下数字（整数）及其对应的二进制数。\n\n| 数字 | 二进制 |\n|---|---|\n| 201\
    \ | 1100 1001 |\n| 15 | 0000 1111 |\n\n在上面的例子中，201 和 15 都用 8 位表示。位运算符作用于多位值，但概念上一次处理一位。换句话说，这些运算符作用于底层数字的\
    \ 0 和 1 表示。\n\n- & : 这是一个按位*与*运算符，仅当*两个*输入都为 1 时才返回 1，否则返回 0。下面是 & 运算符的四比特真值表。\n\
    \n  | 比特 | 1 2 3 4 |\n  |---|---|\n  | *输入 1* | 0 0 1 1 |\n  | *输入 2* | 0 1 0\
    \ 1 |\n  | *& 输出* | 0 0 0 1 |\n\n  我们可以如下计算 201 和 15 之间的按位 & 运算：\n\n  ```\n  In\
    \ []: 201 & 15\n  Out[]: 9\n  ```\n\n  让我们借助真值表来理解 Python 如何返回值 9。\n\n  | | 二进制数\
    \ |\n  |---|---|\n  | *输入 1* | 201 | 1100 1001 |\n  | *输入 2* | 15 | 0000 1111\
    \ |\n  | *& 输出* | 9 | 0000 1001 |\n\n  Python 根据输入的每一位计算 & 运算，并重新组合结果。\n\n`or`\
    \ 关键字是一个逻辑运算符，用于检查多个条件语句，如果至少有一个语句为 True，则返回 True，否则返回 False。\n\n```\nIn []: (5\
    \ > 3) or (4 < 2)\nOut[]: True\n```\n\n`pass` 关键字用作空语句的占位符。使用时它不执行任何操作。如果我们有一个空的函数定义，Python\
