    \    ...:         nonlocal x\n    ...:         x = \"GOOG\"\n    ...:     nested_function()\n\
    \    ...:     return x\n    ...:\n    ...:\n    ...: print(main_function())\n\n\
    # 输出\nGOOG\n```\n\n- `not` 关键字是一个逻辑运算符，类似于 `and` 运算符。如果表达式不为真，则返回布尔值 `True`，否则返回\
    \ `False`。\n\n```python\nIn []: buy = False\n\nIn []: not buy\nOut[]: True\n```"
