    \ `nonlocal` statement.\n\n# 9.3 Variable Namespace and Scope\n\nIf we read the\
    \ *The Zen of Python* (try `import this` in Python console), the last line states\
    \ *Namespaces are one honking great idea -- let's do more of those!* Let's try\
    \ to understand what these mysterious namespaces are. However, before that, it\
    \ will be worth spending some time understanding `names` in the context of Python."
