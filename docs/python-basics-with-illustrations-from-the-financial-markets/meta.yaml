    # 12.1.2 Axes method v/s pyplot


    Interestingly, almost all methods of axes objects exist as a method in the pyplot
    module. For example, we can call `plt.xlabel(''X-Axis Label'')` to set label of
    X-axis (plt being an alias for pyplot), which in turn calls `ax.set_xlabel(''X-Axis
    Label'')` on whichever axes is *current*.


    ```

    # -Example 3-

    # Creating subplots, setting title and axes labels

    # using `pyplot`

    plt.subplots()

    plt.title(''Plot using pyplot'')

    plt.xlabel(''X-Axis Label'')

    plt.ylabel(''Y-Axis Label'')

    plt.show()

    ```


    The code above is more intuitive and has fewer variables to construct a plot.
    The output for the same is shown in *figure* 3. It uses implicit calls to axes
    method for plotting. However, if we take a look at "The Zen of Python" (try import
    this), it says:


    > "Explicit is better than implicit."


    While very simple plots, with short scripts, would benefit from the conciseness
    of the pyplot implicit approach, when doing more complicated plots, or working
    within larger scripts, we will want to explicitly pass around the axes and/or
    figure object to operate upon. We will be using both approaches here wherever
    it deems appropriate.


    Anytime we see something like below:


    ```

    fig = plt.figure()

    ax = fig.add_subplot(111)

    ```'
