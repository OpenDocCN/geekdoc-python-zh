  md: '# 10.5 Array Manipulation


    NumPy defines a new data type called ndarray for the array object it creates.
    This also means that various operators such as arithmetic operators, logical operator,
    boolean operators, etc. work in ways unique to it as we''ve seen so far. There''s
    a flexible and useful array manipulation technique that NumPy provides to use
    on its data structure using *broadcasting*.


    The term broadcasting describes how NumPy treats arrays with different shapes
    during arithmetic operations (with certain constraints). The smaller array is
    ''broadcast'' across the larger array so that they have compatible shapes. It
    also provides a mean of vectorizing array operations.


    NumPy operations are usually done on pairs of arrays on an element-by-element
    basis. In the simplest case, the two arrays must have exactly the same shape as
    in the following example.


    ```

    In []: a = np.array([1, 2, 3])


    In []: b = np.array([3, 3, 3])


    In []: a * b

    Out[]: array([3, 6, 9])

    ```


    NumPy''s broadcasting rule relaxes this constraint when the array''s shapes meet
    certain constraints. The simplest broadcasting example occurs when an array and
    a scalar value are combined in operation as depicted below:


    ```

    In []: a = np.array([1, 2, 3])


    In []: b = 3


    In []: a * b

    Out[]: array([3, 6, 9])

    ```


    The result is equivalent to the previous example where b was an array. We can
    think of the scalar b in the above example being *stretched* during the arithmetic
    operation into an array with the same shape as a. The new elements in b are simply
    copies of the original scalar. Here, the'
