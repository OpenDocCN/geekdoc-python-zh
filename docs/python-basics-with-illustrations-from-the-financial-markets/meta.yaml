    \ section we will explore the natural world of iterators, objects that we have\
    \ already encountered in the context of `for` loops without necessarily knowing\
    \ it, followed by its easier implementation via a handy concept of generators.\
    \ Let’s begin.\n\n## 8.1 Iterators\n\nIterators are everywhere in Python. They\
    \ are elegantly implemented in `for` loop, comprehensions, etc. but they are simply\
    \ hidden in plain sight. An iterator is an object that can be iterated upon and\
    \ which will return data, one element at a time. It allows us to traverse through\
    \ all elements of a collection, regardless of its specific implementation.\n\n\
    Technically, in Python, an iterator is an object which implements the iterator\
    \ protocol, which in turn consists of the methods `__next__()` and `__iter__()`.\n\
    \n### 8.1.1 Iterables\n\nAn iterable is an object, not necessarily a data structure\
    \ that can return an iterator. Its primary purpose is to return all of its elements.\
    \ An object is known as iterable if we can get an iterator from it. Directly or\
    \ indirectly it will define two methods:\n\n- `__iter__()` method which returns\
    \ the iterator object itself and is used while using the `for` and `in` keywords.\n\
    - `__next__()` method returns the next value. It also returns `StopIteration`\
    \ error once all the objects have been traversed.\n\nThe Python Standard Library\
    \ contains many iterables: lists, tuples, strings, dictionaries and even files\
    \ and we can run a loop over them. It essentially means we have indirectly used\
    \ the iterator in the previous section while implementing looping techniques.\n\
    \nAll these objects have an `iter()` method which is used to get an iterator.\
    \ Below code snippet returns an iterator from a tuple, and prints each value:\n\
    \n```python\nIn []: stocks = ('AAPL', 'MSFT', 'AMZN')\nIn []: iterator = iter(stocks)\n\
    \nIn []: next(iterator)\nOut[]: 'AAPL'\n\nIn []: next(iterator)\nOut[]: 'MSFT'\n\
    \nIn []: iterator.__next__()\nOut[]: 'AMZN'\n\nIn []: next(iterator)\nTraceback\
    \ (most recent call last):\n\nFile \"<ipython-input-6>\", line 1, in <module>\n\
    \    next(iterator)\n\nStopIteration\n```\n\nWe use the `next()` function to iterate\
    \ manually through all the items of an iterator. Also, the `next()` function will\
    \ implicitly call the `__next__()` method of an iterator as seen in the above\
    \ example. It will raise `StopIteration` error once we reach the end and there\
    \ is no more data to be returned.\n\nWe can iterate manually through other iterables\
    \ like strings and list, in the manner similar to one we used to iterate over\
    \ the tuple in the above example. The more elegant and automated way is to use\
    \ a for loop. The for loop actually creates an iterator object and executes the\
    \ next() method for each loop.\n\nWe are now going to dive a bit deeper into the\
    \ world of iterators and iterables by looking at some handy functions viz. the\
    \ enumerate(), zip() and unzip() functions.\n\n### 8.1.2 enumerate() function\n\
    \nThe enumerate() function takes any iterable such as a list as an argument and\
    \ returns a special enumerate object which consists of pairs containing an element\
    \ of an original iterable along with their index within the iterable. We can use\
    \ the list() function to convert the enumerate object into a list of tuples. Let's\
    \ see this in practice.\n\n```python\nIn []: stocks = ['AAPL', 'MSFT', 'TSLA']\n\
    \nIn []: en_object = enumerate(stocks)\n\nIn []: en_object\nOut[]: <enumerate\
    \ at 0x7833948>\n\nIn []: list(en_object)\nOut[]: [(0, 'AAPL'), (1, 'MSFT'), (2,\
    \ 'TSLA')]\n```\n\nThe enumerate object itself is also iterable, and we can loop\
    \ over while unpacking its elements using the following clause.\n\n```python\n\
    In []: for index, value in enumerate(stocks):\n    ...:     print(index, value)\n\
    \n0 AAPL\n1 MSFT\n2 TSLA\n```\n\nIt is the default behaviour to start an index\
    \ with 0. We can alter this behaviour using the start parameter within the enumerate()\
    \ function.\n\n```python\nIn []: for index, value in enumerate(stocks, start=10):\n\
    \   ...:     print(index, value)\n\n10 AAPL\n11 MSFT\n12 TSLA\n```\n\nNext, we\
    \ have the zip() function.\n\n### 8.1.3 The zip() function\n\nThe zip() function\
    \ accepts an arbitrary number of iterables and returns a zip object which is an\
    \ iterator of tuples. Consider the following example:\n\n```python\nIn []: company_names\
    \ = ['Apple', 'Microsoft', 'Tesla']\nIn []: tickers = ['AAPL', 'MSFT', 'TSLA']\n\
    \nIn []: z = zip(company_names, tickers)\n\nIn []: print(type(z))\n<class 'zip'>\n\
    ```\n\nHere, we have two lists company_names and tickers. Zipping them together\
    \ creates a zip object which can be then converted to list and looped over.\n\n\
    ```python\nIn []: z_list = list(z)\n\nIn []: z_list\nOut[]: [('Apple', 'AAPL'),\
    \ ('Microsoft', 'MSFT'),\n        ('Tesla', 'TSLA')]\n```\n\nThe first element\
    \ of the z_list is a tuple which contains the first element of each list that\
    \ was zipped. The second element in each tuple contains the corresponding element\
    \ of each list that was zipped and so on. Alternatively, we could use a for()\
    \ loop to iterate over a zip object print the tuples.\n\n```python\nIn []: for\
    \ company, ticker in z_list:\n   ...:     print(f'{ticker} = {company}')\n\nAAPL\
    \ = Apple\nMSFT = Microsoft\nTSLA = Tesla\n```\n\nWe could also have used the\
    \ splat operator(*) to print all the elements.\n\n```python\nIn []: print(*z)\n\
    ('Apple', 'AAPL') ('Microsoft', 'MSFT') ('Tesla', 'TSLA')\n```\n\n### 8.1.4 Creating\
    \ a custom iterator\n\nLet's see how an iterator works internally to produce the\
    \ next element in a sequence when asked for. Python iterator objects are required\
    \ to support two methods while following the iterator protocol. They are `__iter__()`\
    \ and `__next__()`. The custom iterator coded below returns a series of numbers:\n\
    \n```python\nclass Counter(object):\n    def __init__(self, start, end):\n   \
    \     \"\"\"Initialize the object\"\"\"\n        self.current = start\n      \
    \  self.end = end\n\n    def __iter__(self):\n        \"\"\"Returns itself as\
    \ an iterator object\"\"\"\n        return self\n\n    def __next__(self):\n \
    \       \"\"\"Returns the next element in the series\"\"\"\n        if self.current\
    \ > self.end:\n            raise StopIteration\n        else:\n            self.current\
    \ += 1\n            return self.current - 1\n```\n\nWe created a Counter class\
