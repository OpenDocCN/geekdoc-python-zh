- md: "## 7.2 Loops\n\nLet us consider a scenario where we want to compare the value\
    \ of the variable `rsi_indicator` multiple times. To address this situation, we\
    \ need to update the variable each time manually and check it with the `if` statement.\
    \ We keep repeating this until we check all the values that we are interested\
    \ in. Another approach we can use is to write multiple `if` conditions for checking\
    \ multiple values. The first approach is botched and cumbersome, whereas the latter\
    \ is practically non-feasible.\n\nThe approach we are left with is to have a range\
    \ of values that need to be logically compared, check each value and keep iterating\
    \ over them. Python allows us to implement such approach using loops or more precisely\
    \ the `while` and `for` statements.\n\n### 7.2.1 The while statement\n\nThe `while`\
    \ statement in Python is used to repeat execution of code or block of code that\
    \ is controlled by a conditional expression. The syntax for a `while` loop is\
    \ given below:\n\n```\nwhile conditional expression:\n    code statement 1\n \
    \   code statement 2\n    ...\n    code statement n\n```\n\nA `while` statement\
    \ allows us to repeat code execution until a conditional expression becomes true.\
    \ Consider the following `while` loop:\n\n```\n# Input\ndata_points = 6\ncount\
    \ = 0\n\nwhile count != data_points:\n    print(count)\n    count += 1\n```\n\n\
    The `while` statement is an example of what is called a looping statement. The\
    \ above loop will print 6 digits starting from 0 up to 5 and the output will be\
    \ the following:\n\n```\n# Output\n0\n1\n2\n3\n4\n5\n```\n\nWhen the above code\
    \ is run, the interpreter will first check the conditional expression laid by\
    \ the `while` loop. If the expression is false and the condition is not met, it\
    \ will enter the loop and executes the code statements within the loop. The interpreter\
    \ will keep executing the code within the loop until the condition becomes true.\
    \ Once the condition is true, the interpreter will stop executing the code within\
    \ the loop and move to the next code statement. A `while` statement can have an\
    \ optional `else` clause. Continuing the above example, we can add the `else`\
    \ clause as shown in the below example:\n\n```\n# Input\ndata_points = 6\ncount\
    \ = 0\n\nwhile count != data_points:\n    print(count)\n    count += 1\nelse:\n\
    \    print('The while loop is over.')\n```\n\nIn the above example, the interpreter\
    \ will execute the `while` loop as we discussed above. Additionally, when the\
    \ condition becomes true, the interpreter will execute the `else` clause also\
    \ and the output will be as follows:\n\n```\n# Output\n0\n1\n2\n3\n4\n5\nThe while\
    \ loop is over.\n```\n\n### 7.2.2 The for statement\n\nThe `for` statement in\
    \ Python is another looping technique which iterates over a sequence of objects.\
    \ That is, it will go through each item in a sequence. A sequence may be either\
    \ a list, tuple, dictionary, set or string. The syntax of a `for` loop is as follows:\n\
    \n```\nfor item in sequence:\n    code statement 1\n    code statement 2\n   \
    \ ...\n    code statement n\n```\n\nThe `for` statement is also known as `for..in`\
    \ loop in Python. The `item` in the above syntax is the placeholder for each item\
    \ in the sequence.\n\nThe `for` loop in Python is different as compared to other\
    \ programming languages. We shall now see some of its avatars below.\n\n### 7.2.3\
    \ The range() function\n\nPython provides the built-in function `range()` that\
    \ is used to generate sequences or arithmetic progressions which in turn can be\
    \ combined with the `for` loop to repeat the code.\n\nThe `range()` function returns\
    \ a sequence of numbers, starting from 0 by default, and increments by 1 (by default),\
    \ and ends at a specified number. The syntax of `range()` is as follows:\n\n```\n\
    range([start,] stop [, step])\n```\n\nParameter Values:\n- `start`: Optional.\
    \ An integer specifying at which number to start. The default is 0.\n- `stop`:\
    \ Required. An integer specifying at which number to end.\n- `step`: Optional.\
    \ An integer specifying the incrementation. The default is 1.\n\nThe `range()`\
    \ function can be used along with the `for` loop as follows:\n\n```\n# Input\n\
    for i in range(5):\n    print(i)\n```\n\nHere, we have provided only `stop` parameter\
    \ value as 5. Hence, the `range()` function will start with 0 and end at 5 providing\
    \ us with a sequence of 5 numbers. The output of the above `for` loop will be\
    \ the following:\n\n```\n# Output\n0\n1\n2\n3\n4\n```\n\nIn the above `for` loop,\
    \ the variable `i` will take the value of 0 generated by the `range()` function\
    \ for the first iteration and execute the code block following it. For the second\
    \ iteration, the variable `i` will take the value of 1 and again execute the code\
    \ block following it and such repetition will continue until the last value is\
    \ yielded by the `range()` function.\n\nIt is also possible to use various combinations\
    \ of the `start`, `stop` and `step` parameters in a `range()` function to generate\
    \ any sort of sequence. Consider the following example:\n\n```\n# Input\nfor i\
    \ in range(1, 10, 2):\n    print(i)\n```\n\nThe above `range()` function will\
    \ generate the sequence starting from 1 up to 10 with an increment of 2 and the\
    \ output will be the following:\n\n```\n# Output\n1\n3\n5\n7\n9\n```\n\n### 7.2.4\
    \ Looping through lists\n\nWith the `for` loop we can execute a set of code, once\
    \ for each item in a list. The `for` loop will execute the code for all elements\
    \ in a list.\n\n```\n# Input\ntop_gainers = ['BHARTIARTL', 'EICHERMOT', 'HCLTECH',\n\
    \               'BAJFINANCE', 'RELIANCE']\n\nfor gainer in top_gainers:\n    print(str(top_gainers.index(gainer))\
    \ + ' : ' + gainer)\n```\n\nHere the `for` loop will iterate over the list `top_gainers`\
    \ and it will print each item within it along with their corresponding index number.\
    \ The output of the above `for` loop is shown below:\n\n```\n# Output\n0 : BHARTIARTL\n\
    1 : EICHERMOT\n2 : HCLTECH\n3 : BAJFINANCE\n4 : RELIANCE\n```\n\n### 7.2.5 Looping\
    \ through strings\n\nStrings in Python are iterable objects. In other words, strings\
    \ are a sequence of characters. Hence, we can use a string as a sequence object\
    \ in the `for` loop.\n\n```\nvolume_name = 'Python'\n\nfor character in volume_name:\n\
    \    print(character)\n```\n\nWe initialize the string `volume_name` with the\
    \ value 'Python' and provide it as an iterable object to the `for` loop. The `for`\
    \ loop yields each character from it and prints the respective character using\
    \ the `print` statement. The output is shown below:\n\n```\n# Output\nP\ny\nt\n\
    h\no\nn\n```\n\n### 7.2.6 Looping through dictionaries\n\nAnother sequential data\
    \ structure available at our disposal is dictionary. We learnt about dictionaries\
    \ in detail in the previous section. Looping through dictionaries involves a different\
    \ approach as compared to lists and strings. As dictionaries are not index based,\
    \ we need to use its built-in `items()` method as depicted below:\n\n```\ndict\
    \ = {'AAPL':193.53,\n        'HP':24.16,\n        'MSFT':108.29,\n        'GOOG':1061.49}\n\
    \nfor key, value in dict.items():\n    print(f'Price of {key} is {value}')\n```\n\
    \nIf we execute the command `dict.items()` directly, Python will return us a collection\
    \ of a dictionary items (in form of tuples), as shown below:\n\n```\n# Input\n\
    dict.items()\n\n# Output\ndict_items([('AAPL', 193.53), ('HP', 24.16),\n     \
    \      ('MSFT', 108.29), ('GOOG', 1061.49)])\n```\n\nAs we are iterating over\
    \ tuples, we need to fetch a key and value for each item in the `for` loop. We\
    \ fetch the key and value of each item yielded by the `dict.items()` method in\
    \ the `key` and `value` variables and the output is shown below:\n\n```\n# Output\n\
    Price of AAPL is 193.53\nPrice of HP is 24.16\nPrice of MSFT is 108.29\nPrice\
    \ of GOOG is 1061.49\n```\n\nIn Python version 2.x, we need to use the method\
    \ `iteritems()` of the dictionary object to iterate over its items.\n\nA `for`\
    \ loop can also have an optional `else` statement which gets executed once the\
    \ `for` loop completes iterating over all items in a sequence. Sample `for` loop\
    \ with an optional `else` statement is shown below:\n\n```\nfor item in range(1,\
    \ 6):\n    print(f'This is {item}.')\nelse:\n    print('For loop is over!')\n\
    ```\n\nThe above `for` loop prints five statements and once it completes iterating\
    \ over the `range()` function, it will execute the `else` clause and the output\
    \ will be the following:\n\n```\n# Output\nThis is 1.\nThis is 2.\nThis is 3.\n\
    This is 4.\nThis is 5.\nFor loop is over!\n```"
  mdcn: "## 7.2 循环\n\n让我们考虑一个场景：我们需要多次比较变量 `rsi_indicator` 的值。为了应对这种情况，我们需要每次手动更新变量，并使用\
    \ `if` 语句进行检查。我们不断重复此过程，直到检查完所有感兴趣的值。我们还可以采用的另一种方法是编写多个 `if` 条件来检查多个值。第一种方法笨拙且繁琐，而后者实际上不可行。\n\
    \n我们剩下的方法是：对需要进行逻辑比较的一系列值，逐一检查并持续迭代。Python 允许我们使用循环，更准确地说是 `while` 和 `for` 语句来实现这种方法。\n\
    \n### 7.2.1 while 语句\n\nPython 中的 `while` 语句用于重复执行由条件表达式控制的代码或代码块。`while` 循环的语法如下：\n\
    \n```\nwhile conditional expression:\n    code statement 1\n    code statement\
    \ 2\n    ...\n    code statement n\n```\n\n`while` 语句允许我们重复执行代码，直到条件表达式变为真。考虑以下\
    \ `while` 循环：\n\n```\n# Input\ndata_points = 6\ncount = 0\n\nwhile count != data_points:\n\
    \    print(count)\n    count += 1\n```\n\n`while` 语句是所谓循环语句的一个例子。上面的循环将打印从 0 到\
    \ 5 的 6 个数字，输出如下：\n\n```\n# Output\n0\n1\n2\n3\n4\n5\n```\n\n当运行上述代码时，解释器首先会检查\
    \ `while` 循环设定的条件表达式。如果表达式为假且条件不满足，它将进入循环并执行循环内的代码语句。解释器将持续执行循环内的代码，直到条件变为真。一旦条件为真，解释器将停止执行循环内的代码，并移动到下一条代码语句。`while`\
    \ 语句可以有一个可选的 `else` 子句。继续上面的例子，我们可以添加 `else` 子句，如下例所示：\n\n```\n# Input\ndata_points\
    \ = 6\ncount = 0\n\nwhile count != data_points:\n    print(count)\n    count +=\
    \ 1\nelse:\n    print('The while loop is over.')\n```\n\n在上面的例子中，解释器将如我们之前讨论的那样执行\
    \ `while` 循环。此外，当条件变为真时，解释器也会执行 `else` 子句，输出如下：\n\n```\n# Output\n0\n1\n2\n3\n\
    4\n5\nThe while loop is over.\n```\n\n### 7.2.2 for 语句\n\nPython 中的 `for` 语句是另一种循环技术，它遍历一个对象序列。也就是说，它将遍历序列中的每个项目。序列可以是列表、元组、字典、集合或字符串。`for`\
    \ 循环的语法如下：\n\n```\nfor item in sequence:\n    code statement 1\n    code statement\
    \ 2\n    ...\n    code statement n\n```\n\n`for` 语句在 Python 中也称为 `for..in` 循环。上述语法中的\
    \ `item` 是序列中每个项目的占位符。\n\nPython 中的 `for` 循环与其他编程语言不同。我们现在来看一下它的几种变体。\n\n### 7.2.3\
    \ range() 函数\n\nPython 提供了内置函数 `range()`，用于生成序列或等差数列，这些序列可以与 `for` 循环结合使用来重复执行代码。\n\
    \n`range()` 函数返回一个数字序列，默认从 0 开始，默认递增 1，并在指定数字处结束。`range()` 的语法如下：\n\n```\nrange([start,]\
    \ stop [, step])\n```\n\n参数值：\n- `start`：可选。一个整数，指定从哪个数字开始。默认为 0。\n- `stop`：必需。一个整数，指定在哪个数字结束。\n\
    - `step`：可选。一个整数，指定增量。默认为 1。\n\n`range()` 函数可以与 `for` 循环一起使用，如下所示：\n\n```\n# Input\n\
    for i in range(5):\n    print(i)\n```\n\n这里，我们只提供了 `stop` 参数值为 5。因此，`range()`\
    \ 函数将从 0 开始，到 5 结束，为我们提供一个包含 5 个数字的序列。上述 `for` 循环的输出如下：\n\n```\n# Output\n0\n\
    1\n2\n3\n4\n```\n\n在上面的 `for` 循环中，变量 `i` 在第一次迭代时将取 `range()` 函数生成的值 0，并执行其后的代码块。在第二次迭代中，变量\
    \ `i` 将取值 1，并再次执行其后的代码块，这种重复将持续到 `range()` 函数产生最后一个值。\n\n也可以在 `range()` 函数中使用\
    \ `start`、`stop` 和 `step` 参数的各种组合来生成任何类型的序列。考虑以下示例：\n\n```\n# Input\nfor i in\
    \ range(1, 10, 2):\n    print(i)\n```\n\n上述 `range()` 函数将生成从 1 到 10、增量为 2 的序列，输出如下：\n\
    \n```\n# Output\n1\n3\n5\n7\n9\n```\n\n### 7.2.4 遍历列表\n\n使用 `for` 循环，我们可以对列表中的每个项目执行一组代码。`for`\
    \ 循环将为列表中的所有元素执行代码。\n\n```\n# Input\ntop_gainers = ['BHARTIARTL', 'EICHERMOT',\
    \ 'HCLTECH',\n               'BAJFINANCE', 'RELIANCE']\n\nfor gainer in top_gainers:\n\
    \    print(str(top_gainers.index(gainer)) + ' : ' + gainer)\n```\n\n这里，`for` 循环将遍历列表\
    \ `top_gainers`，并打印其中的每个项目及其对应的索引号。上述 `for` 循环的输出如下：\n\n```\n# Output\n0 : BHARTIARTL\n\
    1 : EICHERMOT\n2 : HCLTECH\n3 : BAJFINANCE\n4 : RELIANCE\n```\n\n### 7.2.5 遍历字符串\n\
    \nPython 中的字符串是可迭代对象。换句话说，字符串是一个字符序列。因此，我们可以在 `for` 循环中将字符串用作序列对象。\n\n```\nvolume_name\
    \ = 'Python'\n\nfor character in volume_name:\n    print(character)\n```\n\n我们用值\
    \ 'Python' 初始化字符串 `volume_name`，并将其作为可迭代对象提供给 `for` 循环。`for` 循环从中逐个产生字符，并使用 `print`\
    \ 语句打印相应的字符。输出如下：\n\n```\n# Output\nP\ny\nt\nh\no\nn\n```\n\n### 7.2.6 遍历字典\n\n\
    我们可以使用的另一种顺序数据结构是字典。我们在上一节中已经详细学习了字典。遍历字典涉及与列表和字符串不同的方法。由于字典不是基于索引的，我们需要使用其内置的\
    \ `items()` 方法，如下所示：\n\n```\ndict = {'AAPL':193.53,\n        'HP':24.16,\n   \
    \     'MSFT':108.29,\n        'GOOG':1061.49}\n\nfor key, value in dict.items():\n\
    \    print(f'Price of {key} is {value}')\n```\n\n如果我们直接执行命令 `dict.items()`，Python\
    \ 将返回给我们一个字典项的集合（以元组形式），如下所示：\n\n```\n# Input\ndict.items()\n\n# Output\ndict_items([('AAPL',\
    \ 193.53), ('HP', 24.16),\n           ('MSFT', 108.29), ('GOOG', 1061.49)])\n\
    ```\n\n由于我们遍历的是元组，我们需要在 `for` 循环中为每个项目获取键和值。我们从 `dict.items()` 方法产生的每个项目中获取键和值，分别存储在\
    \ `key` 和 `value` 变量中，输出如下：\n\n```\n# Output\nPrice of AAPL is 193.53\nPrice of\
