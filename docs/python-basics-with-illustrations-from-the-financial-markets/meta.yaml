    \ \"<ipython-input-1-file>\", line 1, in <module>\n    a, b = 5, 3, 8\n\nValueError:\
    \ too many values to unpack (expected 2)\n```\n\n+   - +=: This operator adds\
    \ the operand on the right side with the operand on the left side and assigns\
    \ the result back to the same operand on the left side.\n\n```\nIn []: a += 2\n\
    \nIn []: print(a)\nOut[]: 7\n\n# The above operation is same as the one mentioned\
    \ below\nIn []: a = a + 2\n```\n\n+   - -=: This operator subtracts the operand\
    \ on the right side with the operand on the left side and assigns the result back\
    \ to the same operand on the left side.\n\n```\nIn []: a -= 2\n\nIn []: print(a)\n\
    Out[]: 5\n```\n\n+   - *=: This operator multiplies the operand on the right side\
    \ with the operand on the left side and assigns the result back to the same operand\
    \ on the left side.\n\n```\nIn []: a *= 2\n\nIn []: print(a)\nOut[]: 10\n```\n\
    \n+   - /= : This operator divides the operand on the left side by the operand\
    \ on the right side and assigns the result back to the same operand on the left\
    \ side.\n\n```\nIn []: a /= 3\n\nIn []: print(a)\nOut[]: 3.3333333333333335\n\
    ```\n\n+   - %= : This operator performs the division operation between operands\
    \ and assigns the remainder to the operand on the left.\n\n```\nIn []: a = 10\n\
    In []: a %= 3\n\nIn []: print(a)\nOut[]: 1\n```\n\n+   - **= : This operator performs\
    \ the exponential operation between operands and assigns the result to the operand\
    \ on the left.\n\n```\nIn []: a **= 3\n\nIn []: print(a)\nOut[]: 8\n```\n\n+ \
    \  - //= : This operator divides the left operand with the right operand and then\
    \ assigns the result (floored to immediate integer) to the operand on the left.\n\
    \n```\nIn []: a = 10\nIn []: a //= 4\n\nIn []: print(a)\nOut[]: 2\n```\n\n+  \
    \ - &= : This operator performs the bitwise 'AND' operation between the operands\
    \ and then assigns the result to the operand on the left side.\n\n```\nIn []:\
    \ a = 0\nIn []: a &= 1\n\n# & operation results into 0 as one operand is 0 and\n\
    # the other is 1.\nIn []: print(a)\nOut[]: 0\n```\n\n+   - |= : This operator\
    \ performs the bitwise 'OR' operation between the operands and then assigns the\
    \ result to the operand on the left side.\n\n```\nIn []: a = 0\nIn []: a |= 1\n\
    \n# | operation results into 1\nIn []: print(a)\nOut[]: 1\n```\n\n+   - ^= : This\
    \ operator performs the bitwise 'XOR' operation between the operands and then\
    \ assigns the result to the operand on the left side.\n\n```\nIn []: a = 1\nIn\
    \ []: a ^= 1\n\n# ^ operation results into 0 as both operands will be 1\nIn []:\
    \ print(a)\nOut[]: 0\n```\n\n+   - >>= : This operator shifts bits of the left\
    \ operand to the right specified by the right operand and then assigns the new\
    \ value to the operand on the left side.\n\n```\nIn []: a = 32\nIn []: a >>= 2\n\
    \nIn []: print(a)\nOut[]: 8\n```\n\n+   - <<= : This operator shifts bits of the\
    \ left operand to the left specified by the left operand and then assigns the\
    \ new value to the operand on the left side.\n\n```\nIn []: a = 8\nIn []: a <<=\
    \ 2\n\nIn []: print(a)\nOut[]: 32\n```\n\n## 6.2.6 Membership operators\n\nThese\
    \ operators are used check whether the value/variable exist in a sequence or not.\n\
    \n+   - in : This operator returns True if a value exists in a sequence, False\
    \ otherwise.\n\n```\nIn []: stock_list = ['GOOG', 'MSFT', 'AMZN', 'NFLX']\n\n\
    In []: 'GOOG' in stock_list\nOut[]: True\n\nIn []: 'AAPL' in stock_list\nOut[]:\
    \ False\n```\n\n+   - not in : This operator returns True if a value *does not*\
    \ exists in a sequence, False otherwise.\n\n```\nIn []: 'AAPL' not in stock_list\n\
    Out[]: True\n\nIn []: 'GOOG' not in stock_list\nOut[]: False\n```\n\n## 6.2.7\
    \ Identity operators\n\nThese operators are used to check if two values or objects\
    \ belong to same memory location or refer to same instance in Python. They can\
    \ be used in the following way:\n\n+   - is : This operator returns True if both\
    \ operands are identical, False otherwise.\n\n```\nIn []: a = 3\nIn []: b = a\n\
    \n# True as both variables refers to same value in\n# the memory\nIn []: a is\
    \ b\nOut[]: True\n\nIn []: x = 3\n\n# True as Python will create new reference\
    \ of variable 'x'\n# to value 3 on the same memory location\nIn []: x is a\nOut[]:\
    \ True\n```\n\n+   - is not : This operator returns True if both operands are\
    \ *not* on same memory location, False otherwise.\n\n```\nIn []: stock_list =\
    \ ['AMZN', 'NFLX']\nIn []: my_list = ['AMZN', 'NFLX']\n\nIn []: stock_list is\
    \ my_list\nOut[]: False\n\n# Though both lists are identical, they will not be\
    \ stored\n# at the same memory location as lists are mutable.\nIn []: stock_list\
    \ is not my_list\nOut[]: True\n```\n\n## 6.2.8 Operator Precedence\n\nIn Python,\
    \ expressions are evaluated from left to right order. That is, if there are multiple\
    \ operators within an expression, Python will evaluate its value starting from\
    \ left most operand and ultimately up to the right most operator. Consider the\
    \ following example:"
