    \nIt returned a boolean array with only True and False values. Here, True appears\
    \ wherever the logical condition holds true. NumPy uses this outputted array to\
    \ subset the original array and returns only those values where it is True.\n\n\
    Apart from this approach, NumPy provides a where method using which we can achieve\
