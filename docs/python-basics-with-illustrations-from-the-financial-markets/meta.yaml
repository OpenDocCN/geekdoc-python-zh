    \ 3, 4, 5]\n       s2 = pd.Series(array)\n\nOut[]: a    1\n       b    2\n   \
    \    c    3\n       d    4\n       e    5\n       dtype: int64\n\n       0   \
    \ 1\n       1    2\n       2    3\n       3    4\n       4    5\n       dtype:\
    \ int64\n```\n\nWe can perform operations similar to Numpy arrays:\n\n- Selecting\
