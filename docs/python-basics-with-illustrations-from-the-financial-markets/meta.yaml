    \n## 4.5 dir() 函数\n\n我们可以使用内置函数 `dir()` 来查找模块定义了哪些名称。它返回一个排序后的字符串列表。\n\n```python\n\
    In []: import arithmetic\n\nIn []: dir(arithmetic)\nOut[]:\n['__builtins__',\n\
