    \ want to return the `is_vip` attribute value and log a warning message rather\
    \ than throwing out an error. Can we do that?\n\nSome readers may know that behind\
    \ the scenes, there is a beginner-unfriendly concept called descriptor for managed\
    \ attribute lookup, storage and manipulation. We will cover it in the next chapter,\
    \ together with the attribute lookup order.\n\nSuppose that you follow the attribute\
    \ lookup order and there is no attribute called `is_VIP` anywhere, not the instance,\
    \ not in the class `Customer` and all its parent classes. Python has a built-in\
    \ special method called `__getattr__()` to handle this safely. We can customize\
    \ it to handle the error gracefully.\n\n> In fact, the attribute access logic\
    \ first goes through the `__getattribute__()` dunder method. It is called regardless\
    \ of whether the attribute exists first, and it is called before `__getattr__()`,\
    \ which serves as the last resort of failed attribute retrieval attempt.\n\nThe\
    \ logic in code snippet 1.18 is that whenever an attribute that contains the string\
    \ `vip` is requested, we return the `is_vip` value.\n\n```\n# class Customer:\n\
    def __getattr__(self, attr_name: str):\n    if \"vip\" in attr_name.lower():\n\
    \        return self.is_vip\n    else:\n        raise AttributeError(attr_name)\n\
    ```\n\nCODE 1.18 Allow minor typo to work while retrieving VIP status.\n\nThis\
    \ works.\n\nThe `__getattr__()` is a catch-all fallback method as the last resolution.\
    \ If there is no user-defined `__getattr__()` method, the default behavior is\
    \ just to raise an `AttributeError` exception.\n\nThe lesson here is that the\
    \ `instance.attribute` syntax is largely implemented as a dictionary lookup. Can\
    \ we do it the other way around? Can we fake a dictionary lookup process by something\
    \ else, like a function call, etc.? Sure.\n\n`SymPy` has an example exactly for\
