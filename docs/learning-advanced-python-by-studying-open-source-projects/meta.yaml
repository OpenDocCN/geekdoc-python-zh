    \ the French fries and the beef stew at the same time.\n\nBeing concurrent is\
    \ a behavioral property of an application or a system. It is something we observe\
    \ from the outside of a system. Having a *concurrent* kitchen doesn't say anything\
    \ about the actual cooking of the food. There is something that I call an observation\
