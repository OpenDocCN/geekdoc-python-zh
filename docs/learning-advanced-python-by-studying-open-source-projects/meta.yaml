- md: "## MULTITHREADING FOR I/O BOUND TASKS\n\nLet's first confirm that multithreading\
    \ is no worse or even better than multiprocessing for I/O bound tasks.\n\nFirst,\
    \ let's try a CPU bound task as a benchmark. Run code snippet 3.14 with viztracer.\n\
    \n```python\nimport time\nfrom multiprocessing import Process\nfrom threading\
    \ import Thread\nimport math\n\ndef f(x):\n    for _ in range(10_000_000):\n \
    \       x = math.sqrt(x) if x > 1.000001 else 2*x\n    return x * x\n\nif __name__\
    \ == '__main__':\n    start = time.time()\n    processes = [Process(target=f,\
    \ args=(x,)) for x in [1.1, 2.1, 3.1]]\n    for p in processes:\n        p.start()\n\
    \    for p in processes:\n        p.join()\n    end = time.time()\n    process_time\
    \ = end - start\n\n    start = time.time()\n    threads = [Thread(target=f, args=(x,))\
    \ for x in [1.1, 2.1, 3.1]]\n    for t in threads:\n        t.start()\n    for\
    \ t in threads:\n        t.join()\n    end = time.time()\n    thread_time = end\
    \ - start\n\n    print(f\"Multiprocessing time: {process_time:.2f} seconds\")\n\
    \    print(f\"Multithreading time: {thread_time:.2f} seconds\")\n```\n\nCODE 3.14\
    \ Benchmark code for CPU bound tasks.\n\nOn my desktop, the multiprocessing version\
    \ finishes in about 1.87 seconds and the multithreading version finishes in about\
    \ 3.13 seconds.\n\nAt the process level shown in Figure 3.14, we have three spawned\
    \ processes that do the computation. On the contrary, the highlighted part is\
    \ where the multithreading computation *actually* happens.\n\nNow, zoom into the\
    \ main process. We see three threads are spawned, and it is very clear that no\
    \ two threads can run at the same time in Figure 3.15. The GIL is real.\n\nThe\
    \ longer the computation lasts, the less effect the overhead has, therefore multiprocessing\
    \ is more suitable for multithreading.\n\nHow about I/O bound tasks? The most\
    \ typical I/O bound task is probably an http request. The key change of the snippet\
    \ above is to replace the mathematical function $f()$ with `retrieve_homepage()`.\
    \ I am leaving the implementation to you. After you are done, run your code, which\
    \ should look like snippet 3.15, with viztracer.\n\n```python\nnewspapers = ['https://www.nytimes.com/',\n\
    \              'https://www.theguardian.com/',\n              'https://www.huffingtonpost.com/',\n\
    \              'https://www.bbc.com/']\n```\n\n```python\ndef retrieve_homepage(newspaper):\n\
    \    # Write a multiprocessing version and a multithreading version\n    # of\
    \ this function\n    response = requests.get(newspaper)\n```\n\nCODE 3.15\n\n\
    ![](img/d6c2267970090ab811ee8826699fffd7_71_0.png)\n\nFIGURE 3.14 Multiprocessing\
    \ vs multithreading on CPU bound tasks.\n\n![](img/d6c2267970090ab811ee8826699fffd7_71_1.png)\n\
    \nFIGURE 3.15 No two threads can run at the same time.\n\nOn my desktop, the multiprocessing\
    \ version takes about 1.29 seconds, and the multithreading version takes about\
    \ 0.76 seconds. Running multiple times, the multithreading version is always faster\
    \ than the multiprocessing version. If you check the flame graph, you will see\
    \ that most of the time, the spawned threads are just doing connecting, handshaking,\
    \ etc. The CPU can handle multiple of them at the same time.\n\nAs described in\
    \ earlier section, the CPU very quickly shifts between threads to make progress\
    \ on each one. This is called preemptive as we have no explicit control over when\
    \ the CPU should make the shift, and the CPU asks no opinions from the threads.\
    \ You may wonder what's the point of having multithreading in Python.\n\nLet's\
    \ check one specific use case of multithreading: graphical user interface (GUI).\
    \ Even without real parallel multithreading, Python multithreading can also become\
    \ handy. Video games are probably a better example for multithreading programming\
    \ in C++ as performance is the key, but we are talking about Python now.\n\nImagine\
    \ the most typical use case of interacting with a GUI application. Oftentimes,\
    \ there are many different components that constitute the application: the visuals,\
    \ the sound, the interactions, etc.\n\nSuppose you are using an RSS reader to\
    \ browse news. RSS reader fetches the headlines for you to glance at. If you click\
    \ one headline, the reader then fetches the whole content of the article. If the\
    \ RSS reader is single-threaded, the application won't respond to your scrolling\
    \ or clicking gestures. You will have to wait for the content to load, then the\
    \ reader becomes responsive again. This is a horrible user experience.\n\nThere\
    \ should be one thread dedicated to content fetching and another thread dedicated\
    \ to responding to user gestures for optimal experiences. You may wonder if the\
    \ application is written in Python, won't GIL prevent it from doing so? Remember,\
    \ a CPU is way faster than humans. Between two clicks and even two screen frames,\
    \ the CPU has already switched between threads countless times. The user won't\
    \ notice anything.\n\nLet's look at one example from the Python open source library\
    \ PySimpleGUI. It is a Python library for building simple graphical user interfaces\
    \ with more than 10K stars. Below is one official example: *Demo_Multithreaded_Write_Event_Value.py*.\
    \ For space reasons, I will only paste the core part in snippet 3.16. You can\
    \ follow the link to read the whole code.\n\n```python\nwhile True:\n    event,\
    \ values = window.read()\n    sg.cprint(event, values)\n    if event == sg.WIN_CLOSED\
    \ or event == 'Exit':\n        break\n    if event.startswith('Start'):\n    \
    \    threading.Thread(target=the_thread, args=(window,), daemon=True).start()\n\
    \    if event == THREAD_EVENT:\n        sg.cprint(f'Data from the thread ', colors='white\
    \ on purple', end='')\n        sg.cprint(f'{values[THREAD_EVENT]}', colors='white\
    \ on red')\n    window.close()\n```\n\nCODE 3.16 Certain events are handled with\
    \ new threads.\n\nThe window object listens to events, which are essentially user\
    \ interactions with the application. For example, closing the window is an event\
    \ and clicking a button is also an event. In the second if statement, if the event\
    \ starts with 'Start', a new thread is created to run the `the_thread` function.\
    \ You will see by clicking a button called Start A Thread will trigger such an\
    \ event (code snippet 3.17). What does the `the_thread` do?\n\n```python\ndef\
    \ the_thread(window):\n    \"\"\"\n    The thread that communicates with the application\
    \ through the\n    window's events.\n    Once a second wakes and sends a new event\
    \ and associated value\n    to the window\n    \"\"\"\n    i = 0\n    while True:\n\
    \        time.sleep(1)\n        window.write_event_value(\n            '-THREAD-',\
    \ (threading.current_thread().name, i))\n        i += 1\n```\n\nCODE 3.17 `the_thread`\
    \ periodically writes to the active window.\n\nIt is merely a function that sleeps\
    \ for a while and then sends some info back for the window to render on the GUI.\
    \ It is not CPU intensive as time.sleep() puts CPU to idle.\n\nNow, let's run\
    \ the program with viztracer. Note that your Python version must have the latest\
    \ tkinter installed. The Python version I am using on my MacOS is 3.10 for this\
    \ part of the demo. You can install it using Homebrew as shown in snippet 3.18.\n\
    \n```bash\nbrew install python-tk@3.10\n```\n\nCODE 3.18 Install Python with tkinter.\n\
    \nRun the demo, a new window should pop up as Figure 3.16.\n\nNow, randomly click\
    \ the Start A Thread button three times. Periodic messages will appear in the\
    \ active window as shown in Figure 3.17. Close the window, in the viztracer's\
    \ visualization, we will see three threads periodically send information to the\
    \ window as shown in Figure 3.18. That's exactly what the `the_thread` is supposed\
    \ to do.\n\nThere is one process which contains one main thread and three spawned\
    \ worker threads.\n\n62 ■ Learning Advanced Python by Studying Open Source Projects\n\
    \n![](img/d6c2267970090ab811ee8826699fffd7_74_0.png)\n\nFIGURE 3.16 Demo GUI.\n\
    \n![](img/d6c2267970090ab811ee8826699fffd7_74_1.png)\n\nFIGURE 3.17 Three working\
    \ threads write to the UI.\n\nWe do see in Figure 3.18 that these three threads\
    \ sleep for most of the time. The example may be simple, but the idea is clear:\
    \ if you are fast enough, people won’t notice that you are multithreading. It\
    \ is like in the remote working age, some people choose to work for more than\
    \ two companies secretly: if you are productive enough and some tasks are basically\
    \ boring and only require periodic checks, nobody will notice."
  mdcn: "## 面向I/O密集型任务的多线程\n\n首先让我们确认，对于I/O密集型任务，多线程并不比多进程差，甚至可能更好。\n\n首先，让我们以一个CPU密集型任务作为基准测试。使用viztracer运行代码片段3.14。\n\
    \n```python\nimport time\nfrom multiprocessing import Process\nfrom threading\
    \ import Thread\nimport math\n\ndef f(x):\n    for _ in range(10_000_000):\n \
    \       x = math.sqrt(x) if x > 1.000001 else 2*x\n    return x * x\n\nif __name__\
    \ == '__main__':\n    start = time.time()\n    processes = [Process(target=f,\
    \ args=(x,)) for x in [1.1, 2.1, 3.1]]\n    for p in processes:\n        p.start()\n\
    \    for p in processes:\n        p.join()\n    end = time.time()\n    process_time\
    \ = end - start\n\n    start = time.time()\n    threads = [Thread(target=f, args=(x,))\
    \ for x in [1.1, 2.1, 3.1]]\n    for t in threads:\n        t.start()\n    for\
    \ t in threads:\n        t.join()\n    end = time.time()\n    thread_time = end\
    \ - start\n\n    print(f\"Multiprocessing time: {process_time:.2f} seconds\")\n\
    \    print(f\"Multithreading time: {thread_time:.2f} seconds\")\n```\n\n代码 3.14\
    \ CPU密集型任务的基准测试代码。\n\n在我的台式机上，多进程版本大约需要1.87秒完成，而多线程版本大约需要3.13秒完成。\n\n在图3.14所示的进程层面，我们有三个生成的进程在进行计算。相反，高亮部分是多线程计算*实际*发生的地方。\n\
    \n现在，放大到主进程。我们看到生成了三个线程，并且在图3.15中非常清楚地看到，没有两个线程可以同时运行。GIL是真实存在的。\n\n计算持续时间越长，开销的影响就越小，因此多进程比多线程更适合CPU密集型任务。\n\
    \n那么I/O密集型任务呢？最典型的I/O密集型任务可能是HTTP请求。上述代码片段的关键更改是将数学函数$f()$替换为`retrieve_homepage()`。其实现留给你完成。完成后，使用viztracer运行你的代码，其结构应类似于代码片段3.15。\n\
    \n```python\nnewspapers = ['https://www.nytimes.com/',\n              'https://www.theguardian.com/',\n\
    \              'https://www.huffingtonpost.com/',\n              'https://www.bbc.com/']\n\
    ```\n\n```python\ndef retrieve_homepage(newspaper):\n    # 编写此函数的多进程版本和多线程版本\n\
    \    response = requests.get(newspaper)\n```\n\n代码 3.15\n\n![](img/d6c2267970090ab811ee8826699fffd7_71_0.png)\n\
    \n图 3.14 CPU密集型任务上的多进程与多线程对比。\n\n![](img/d6c2267970090ab811ee8826699fffd7_71_1.png)\n\
    \n图 3.15 没有两个线程可以同时运行。\n\n在我的台式机上，多进程版本大约需要1.29秒，而多线程版本大约需要0.76秒。多次运行，多线程版本总是比多进程版本快。如果你查看火焰图，你会看到大部分时间，生成的线程只是在进行连接、握手等操作。CPU可以同时处理多个这样的操作。\n\
    \n如前面章节所述，CPU在不同线程之间快速切换以推进每个线程的执行。这被称为抢占式，因为我们无法明确控制CPU何时切换，CPU也不会征求线程的意见。你可能想知道在Python中使用多线程的意义何在。\n\
    \n让我们看看多线程的一个具体用例：图形用户界面（GUI）。即使没有真正的并行多线程，Python多线程也能派上用场。视频游戏可能是C++多线程编程的一个更好例子，因为性能是关键，但我们现在讨论的是Python。\n\
    \n想象一下与GUI应用程序交互的最典型用例。通常，应用程序由许多不同的组件构成：视觉效果、声音、交互等。\n\n假设你正在使用一个RSS阅读器浏览新闻。RSS阅读器为你获取标题供你浏览。如果你点击一个标题，阅读器随后会获取文章的全部内容。如果RSS阅读器是单线程的，应用程序将不会响应你的滚动或点击手势。你将不得不等待内容加载，然后阅读器才会再次响应。这是一种糟糕的用户体验。\n\
    \n应该有一个专门用于内容获取的线程和另一个专门用于响应用户手势的线程，以获得最佳体验。你可能想知道，如果应用程序是用Python编写的，GIL难道不会阻止它这样做吗？记住，CPU比人类快得多。在两次点击之间，甚至在两帧屏幕之间，CPU已经在线程之间切换了无数次。用户不会注意到任何事情。\n\
    \n让我们看一个来自Python开源库PySimpleGUI的例子。它是一个用于构建简单图形用户界面的Python库，拥有超过1万颗星。下面是其中一个官方示例：*Demo_Multithreaded_Write_Event_Value.py*。由于篇幅原因，我只会在代码片段3.16中粘贴核心部分。你可以通过链接阅读完整代码。\n\
    \n```python\nwhile True:\n    event, values = window.read()\n    sg.cprint(event,\
    \ values)\n    if event == sg.WIN_CLOSED or event == 'Exit':\n        break\n\
    \    if event.startswith('Start'):\n        threading.Thread(target=the_thread,\
    \ args=(window,), daemon=True).start()\n    if event == THREAD_EVENT:\n      \
    \  sg.cprint(f'Data from the thread ', colors='white on purple', end='')\n   \
    \     sg.cprint(f'{values[THREAD_EVENT]}', colors='white on red')\n    window.close()\n\
    ```\n\n代码 3.16 某些事件由新线程处理。\n\n窗口对象监听事件，这些事件本质上是用户与应用程序的交互。例如，关闭窗口是一个事件，点击按钮也是一个事件。在第二个if语句中，如果事件以'Start'开头，则会创建一个新线程来运行`the_thread`函数。你会看到，点击一个名为Start\
    \ A Thread的按钮会触发这样的事件（代码片段3.17）。`the_thread`函数做什么呢？\n\n```python\ndef the_thread(window):\n\
    \    \"\"\"\n    通过窗口事件与应用程序通信的线程。\n    每秒唤醒一次，向窗口发送一个新事件和关联的值。\n    \"\"\"\n\
    \    i = 0\n    while True:\n        time.sleep(1)\n        window.write_event_value(\n\
    \            '-THREAD-', (threading.current_thread().name, i))\n        i += 1\n\
    ```\n\n代码 3.17 `the_thread`定期向活动窗口写入数据。\n\n它只是一个休眠一段时间然后发送一些信息回窗口以在GUI上渲染的函数。它不是CPU密集型的，因为time.sleep()会让CPU处于空闲状态。\n\
    \n现在，让我们用viztracer运行程序。请注意，你的Python版本必须安装了最新的tkinter。我在这部分演示中使用的MacOS上的Python版本是3.10。你可以使用Homebrew安装它，如代码片段3.18所示。\n\
    \n```bash\nbrew install python-tk@3.10\n```\n\n代码 3.18 安装带有tkinter的Python。\n\n\
    运行演示，应该会弹出一个新窗口，如图3.16所示。\n\n现在，随机点击Start A Thread按钮三次。周期性的消息将出现在活动窗口中，如图3.17所示。关闭窗口，在viztracer的可视化中，我们将看到三个线程定期向窗口发送信息，如图3.18所示。这正是`the_thread`函数应该做的事情。\n\
    \n有一个进程包含一个主线程和三个生成的工作线程。\n\n62 ■ 通过研究开源项目学习高级Python\n\n![](img/d6c2267970090ab811ee8826699fffd7_74_0.png)\n\
    \n图 3.16 演示GUI。\n\n![](img/d6c2267970090ab811ee8826699fffd7_74_1.png)\n\n图 3.17\
    \ 三个工作线程向UI写入数据。\n\n我们在图3.18中确实看到这三个线程大部分时间都在休眠。这个例子可能很简单，但思想很明确：如果你足够快，人们就不会注意到你在使用多线程。这就像在远程工作时代，有些人选择秘密为两家以上的公司工作：如果你效率足够高，而且有些任务基本上很无聊，只需要定期检查，没有人会注意到。"
