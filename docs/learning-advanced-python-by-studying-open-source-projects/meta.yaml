    : \"2021-03-21\",\n    \"tags\": [\"sci-fi\", \"thriller\"]\n}\n```\n\n**CODE\
    \ 2.20** A sample *document* in the blog *index*.\n\nAfter saving this document\
    \ to Elasticsearch, you can search for it by text. You can use “apes” or “Richard”\
    \ as keywords to search in the title field or in the author field. Elasticsearch\
    \ will use *analyzers* to analyze different fields. For example, a good text analyzer\
    \ will find *apes* for you even if you typed *ape*, etc.\n\nWhat’s a domain-specific\
    \ language (DSL)? A domain-specific language is a programming language that is\
    \ designed to solve problems in a specific domain. They are not for general purposes.\
    \ For example, SQL is for relational database operation. HTML is only for frontend\
    \ development. LaTeX is only for document typesetting. Elasticsearch DSL is not\
    \ really a language but a library that can, I quote, help with writing and running\
    \ queries against Elasticsearch. It provides a more convenient and idiomatic way\
    \ to write and manipulate queries.\n\n**TABLE 2.3** Concepts Matching in Elasticsearch\
    \ and SQL-Like Databases\n\n| Elasticsearch Concepts | SQL Concepts |\n| :---\
    \ | :--- |\n| Index | Table |\n| Document | Row |\n| Field | Column |\n| None\
    \ | Schema |\n\nHow so? Let's look at the official example of Elasticsearch DSL.\
    \ Let's say you want to save an *article* object and save it to the *blog* index.\
    \ To run this example, you need to set up an Elasticsearch instance locally. I\
