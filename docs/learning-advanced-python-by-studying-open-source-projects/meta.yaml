  md: '# # The Data Model of Python


    A GENTLE INTRODUCTION TO PYTHON''S DATA MODEL


    Have you wondered what makes a Python *dict* a dictionary, and what makes a Python
    *list* a list? In Python, you can perform different kinds of operations on different
    kinds of data structures. Take a *list*, for example, you can append a member
    to a list, *extend* one list with another one and *index* it with integers. Let''s
    build a list of cars with code snippet 1.1.


    ```

    cars = list()

    cars.append(''bmw'')

    cars.extend([''audi'', ''toyota''])

    assert cars[0] == ''bmw''

    last_car = cars.pop()

    assert last_car == ''toyota''

    assert len(cars) == 2

    ```


    CODE 1.1 Operations on a Python list object.¹


    For a dictionary, you can perform a different set of operations as shown in code
    snippet 1.2. You can *get* a member of the dictionary. Note that both *list* and
    *dict* support the *len()* method.


    ```

    fruit_prices = dict()

    fruit_prices[''apple''] = 0.5

    fruit_prices[''orange''] = 0.25

    assert len(fruit_prices) == 2

    assert fruit_prices.get(''pear'') == None

    ```


    CODE 1.2 Operations with a Python *dict* object.


    What makes lists and dictionaries behave in different ways? What if we want to
    modify their behaviors and create a hybrid data structure to suit our needs? This
    will be the main topic of this chapter: the data model² for built-in Python data
    types.'
  merge: -1
  pgno: 17
- img_proc: true
  md: "# 6 ■ Learning Advanced Python by Studying Open Source Projects\n\nIn Python,\
    \ everything is an instance of the object class. You can think of object as the\
    \ ancestor of all *things* in Python, including the built-in types like *int*,\
    \ *str*, *list*, *dict* and all user-defined classes. Let’s try some examples\
    \ with code snippet 1.3.\n\n```\nisinstance(\"California\",object)\n# True\n\n\
    isinstance(int,object)\n# True\n\nisinstance(list(),object)\n# True\n\nclass Car:\n\
    \    pass\n\nisinstance(Car(),object)\n# True\n\nisinstance(Car, object)\n# True\n\
    ```\n\nCODE 1.3 Check the objects’ types with *isinstance()* function.\n\nA *Car*\
    \ instance is an object instance. Also, the *Car* class itself is an object instance.\
    \ The question is that if all *stuffs* are instances of the object class, then\
    \ what makes a *list* different from a *dict*?\n\nLet’s check the supported methods\
    \ of a *list* and a *dict*.\nThe *dir()* function returns a list of attributes\
    \ and methods supported by an object. We sort the list in alphabetical order to\
    \ make it easier to compare the results. Code snippet 1.4 shows the result for\
    \ a list instance.\n\n```\nsorted(dir(list()))\n\n# ['__add__', '__class__', '__class_getitem__',\
    \ '__contains__',\n'__delattr__', '__delitem__', '__dir__', '__dir__', '__doc__',\n\
    '__eq__', '__format__', '__ge__', ...] # skipped\n```\n\nCODE 1.4 The attributes\
    \ and methods supported by a Python list object.\n\nLet’s check what methods are\
    \ supported by a *list* instance but not supported by a *dict* instance and vice\
    \ versa. To do that, we need to build two sets and take a difference as shown\
    \ in code snippet 1.5.\n\n```\nset(dir(list())) - set(dir(dict()))\n```"
