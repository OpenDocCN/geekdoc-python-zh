    \ trademarks and are used only for identification and explanation without intent\
    \ to infringe.\n\n*Library of Congress Cataloging-in-Publication Data*\nNames:\
    \ Li, Rongpeng, author.\nTitle: Learning advanced Python from open source projects\
    \ / Rongpeng Li.\nDescription: Boca Raton, FL : CRC Press, 2024. | Series: Chapman\
    \ & Hall/CRC the Python series | Includes bibliographical references and index.\n\
    Identifiers: LCCN 2023024040 (print) | LCCN 2023024041 (ebook) | ISBN 9781032328164\
    \ (paperback) | ISBN 9781032328188 (hardback) | ISBN 9781003316909 (ebook)\nSubjects:\
    \ LCSH: Python (Computer program language) | Open source software.\nClassification:\
    \ LCC QA76.73.P98 L49 2024 (print) | LCC QA76.73.P98 (ebook) | DDC 005.13/3—dc23/eng/20230725\n\
    LC record available at https://lccn.loc.gov/2023024040\nLC ebook record available\
    \ at https://lccn.loc.gov/2023024041\n\nISBN: 978-1-032-32818-8 (hbk)\nISBN: 978-1-032-32816-4\
    \ (pbk)\nISBN: 978-1-003-31690-9 (ebk)\n\nDOI: 10.1201/9781003316909\n\nTypeset\
    \ in Minion\nby codeMantra\n\nTo Yan, the brightest light in my life.\nTo my family,\
    \ whose decisions made my life today possible.\nTo Holly and Prosper, the endless\
    \ source of joy in the room.\n\n## Contents\n\nPreface, x\n\nAcknowledgments,\
    \ xi\n\n+   INTRODUCTION\nPURPOSE AND SCOPE OF THIS BOOK\nOVERVIEW OF THE APPROACH\
    \ TAKEN\nNOTE\n\n+   Chapter 1 ■ The Data Model of Python\nA GENTLE INTRODUCTION\
    \ TO PYTHON'S DATA MODEL\nCUSTOMIZED COMPARISON\nA MANAGED ITERATION BEHAVIOR\n\
    ATTRIBUTES, FUNCTION OR DICTIONARY?\nSUMMARY\nNOTES\n\n+   Chapter 2 ■ Selected\
    \ Topics of Python Classes\nINTRODUCTION\nDESCRIPTORS AND ATTRIBUTE LOOKUP ORDER\n\
    Descriptor Demystified\nLazy Evaluation in Matplotlib\nMETACLASS AND ITS USAGE\
    \ IN ELASTICSEARCH DSL\nUnderstanding Metaclass Using Meta-Recipe\nUse Metaclass\
    \ to Model Documents in Elasticsearch DSL\nSUMMARY\nAPPENDIX\nNOTES\n\n## CHAPTER\
    \ 3 ■ Concurrency in Python\n\n- CONCURRENCY FROM A TOP-DOWN PERSPECTIVE\n   \
    \ - Operating System and Concurrency\n    - Introducing Global Interpreter Lock\
    \ (GIL)\n- MULTIPROCESSING FOR CPU BOUND TASKS\n    - Parallel Pandas Apply in\
    \ pandarallel\n- MULTITHREADING FOR I/O BOUND TASKS\n- SUMMARY\n- NOTES\n\n##\
    \ CHAPTER 4 ■ Asynchronous Programming in Python\n\n- A SHIFT OF PARADIGM\n- EVENT-DRIVEN\
    \ SIMULATION\n- ASYNC AS A PATTERN\n- SUMMARY\n- APPENDIX\n- NOTES\n\n## CHAPTER\
    \ 5 ■ Power Up Your Python Functions\n\n- INTRODUCTION\n- THE DECORATOR FOR RETRYING\
    \ A FUNCTION\n- CONTEXT MANAGER IN A NUTSHELL\n- DIVE INTO THE AIOSQLITE EXAMPLE\n\
    \    - Connection as an Executor and a Scheduler\n    - Connection and Cursor\
    \ as Async Context Managers\n- SUMMARY\n- NOTES\n\n## CHAPTER 6 ■ Selected OOP\
    \ Design Best Practices\n\n- UNDERSTAND YOUR BUSINESS\n    - A Quick Overview\
    \ of the Business\n- MODEL THE BUSINESS ENTITIES WITH OOP\n    - Design the Core\
    \ Entities\n    - Establish the Relationship between Classes\n    - The Benefits\
    \ of Universal interface\n    - Sometimes No OOP is the Best Design\n- SUMMARY\
    \ 108\n- NOTES 108\n\n## CHAPTER 7 ■ Testing in a Pistachio Shell 109\n\n- INTRODUCTION\
    \ 109\n- FIXTURE AND PARAMETERIZATION 109\n    - Parameterization 111\n    - Resources\
    \ and Fixture 113\n- MONKEY PATCH 115\n    - Modify the Built-in Print 115\n \
    \   - More Powerful Monkey Patching 117\n- PROPERTY-BASED TEST 118\n- SUMMARY\
    \ 122\n- NOTES 122\n\nINDEX, 123\n\n## Preface\n\nI am very excited and happy\
    \ to present this book to you.\nThis book is somewhat like my previous two books.\
    \ Not because they share similar topics, but because I wrote it with a vivid image\
    \ of readers in my mind. In my opinion, a book like this should have existed long\
    \ before: there are tons of great open source Python projects, and there are a\
    \ lot of people who find it hard to learn advanced Python topics. It is natural\
    \ to have a book that seamlessly bridges the golden resources and the hungry learners.\
    \ This book is it. When I tried to learn from the pros, I did it the hard way\
    \ by bashing my head and absorbing much-alike materials from 20 browser tabs.\
    \ Looking back, I think there are better ways to do it: an educational and instructional\
    \ way. My experience as an instructor helped me a lot in writing this book: I\
    \ am able to put my feet in the learners’ shoes.\nI am very grateful to the editors\
    \ at Taylor & Francis who helped me identify and confirmed the value of this approach.\
    \ I hope you find this experimental approach educational, accessible and entertaining."
  mdcn: "PYTHON 系列\n\n## 通过研究开源项目学习高级 Python\n\n李荣鹏\n\nCRC 出版社\n泰勒-弗朗西斯集团\n查普曼与霍尔图书\n\
    \n## 通过研究开源项目学习高级 Python\n\n本书独树一帜。它既不是一本百科全书，也不是那种将读者困在教程地狱中的实践指南。它仅仅是一位普通 Python\
    \ 用户学习经验的提炼。这些经验融合了卓越的教学技巧、细致的依赖关系梳理，最重要的是，饱含热情。\n\n*《通过研究开源项目学习高级 Python》* 帮助读者克服日常任务中的困难，并从著名开源项目的解决方案中寻求洞见。与技术手册不同，本书将技术知识、现实世界应用以及更理论化的内容相结合，为读者提供了一种实用且引人入胜的\
    \ Python 学习方法。\n\n通读本书，读者将学习如何编写高效、可读且可维护的 Python 代码，涵盖数据结构、算法、面向对象编程等关键主题。作者对\
    \ Python 的热情在本书中熠熠生辉，使其成为初学者和经验丰富的程序员都能享受并从中获得启发的读物。\n\n**李荣鹏 (Ron)** 是一位 YouTube\
    \ 教育工作者和动画师。他对教育怀有持久的热情。他已出版了两本关于统计学和科学模拟的书籍。\n\n## 查普曼与霍尔/CRC\n\nPython 系列\n\n\
    ### 关于本系列\n\nPython 已被列为最受欢迎的编程语言，并在教育和工业界得到广泛应用。本系列丛书将为学生和专业人士提供广泛的 Python 相关书籍。系列中的书目将帮助用户在入门和高级水平上学习该语言，并探索其在数据科学、人工智能和机器学习中的众多应用。系列书目还可辅以\
    \ Jupyter 笔记本。\n\n*《使用 Python 进行图像处理与获取，第二版》*\nRavishankar Chityala, Sridevi Pudipeddi\n\
    \n*《Python 包》*\nTomas Beuzen and Tiffany-Anne Timbers\n\n*《使用 Python 进行统计与数据可视化》*\n\
