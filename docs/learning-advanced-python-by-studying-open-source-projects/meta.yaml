    \ 的行为应大体类似于集合。在所有常见数据结构中，只有字典和集合支持在 *O(1)* 时间内进行成员测试。由于我们不是在查找数据，一个集合就足够了。默认集合的问题在于，在进行一些成员操作后，其迭代顺序不是特定的。然而，你应该知道，自Python\
    \ 3.7起，如果你遍历一个字典，默认的 *dict* 数据结构是插入有序的。我将引用Python文档中的话：\n\n> 集合是一个无序的、不包含重复元素的集合。基本用途包括成员测试和消除重复条目。集合对象还支持数学运算，如并集、交集、差集和对称差集。\n\
    \n我们不想完全实现一个有序集合，因为我们不偏好某个VIP客户胜过另一个，也不偏好某个非VIP客户胜过另一个。如果你对一个功能齐全的有序集合感兴趣，可以查看\
    \ ordered sorted container Python 库。⁷\n\n那么问题就归结为实现 `__iter__` 方法，该方法决定了迭代的行为。有趣的是，*SymPy*\
    \ 的开发者面临过与我们类似的问题。他们想实现有理数集，并允许调用者以特定方式遍历该集合。为什么？回想一下，有理数是可以表示为分数的任何数字。例如，$\\\
    frac{1}{2}$、$\\frac{3}{5}$ 都是有理数，而 $\\pi$（圆的周长与直径的比值）则不是。有理数集也是无限大的。如何合理且穷尽地遍历这样一个无限集合是他们关注的问题。\n\
