    \n## 总结\n\n在这一长章中，我们从基本概念出发，探讨了通用编程语言与 Python 之间的差异：GIL 的作用。接着，我们接触了来自 pandarallel\
    \ 的多进程示例和来自 PySimpleGUI 的多线程示例。我们理解了它们的使用场景。\n\n并发编程是否总是需要多进程或多线程？如果我们想控制线程何时以及在何处让出\
    \ CPU 所有权，该怎么办？我们将在下一章中找到答案。\n\n## 注释\n\n- 1. https://github.com/gaogaotiantian/viztracer\n\
    - 2. https://www.maartenbreddels.com/perf/jupyter/python/tracing/gil/2021/01/14/Tracing-the-Python-GIL.html\n\
    - 3. https://github.com/nalepae/pandarallel\n- 4. https://github.com/nalepae/pandarallel/blob/master/pandarallel/data_types/dataframe.py\n\
    - 5. https://github.com/PySimpleGUI/PySimpleGUI\n- 6. https://github.com/PySimpleGUI/PySimpleGUI/blob/master/DemoPrograms/Demo_Multithreaded_Write_Event_Value.py\n\
    \n## Python 中的异步编程\n\n### 范式的转变\n\n在第 3 章中，我们将并发介绍为一种*行为*属性。如果用户与应用程序交互并感觉系统是并发的，那么用户可能不会关心其实现。在实现层面，我们研究了如何通过利用*真正的*并行性（多进程）和*不那么真实的*并行性（受\
    \ GIL 限制的多线程）来实现并发。前者适用于 CPU 密集型任务，后者适用于 I/O 密集型任务。\n\n对于这两种情况，我们都是从时间维度的角度来思考的，即我们关心多个任务是如何执行的，或者它们是否在特定时间点执行。这种视角对于多线程尤其正确，因为我们知道\
    \ CPU 在线程之间抢占式跳转，没有线程在完全相同的时间运行。\n\n那么，对于 I/O 密集型任务，从 I/O 事件的角度来思考如何？让我们研究一个现实世界的例子。\n\
    \n假设你正在组织一场慈善国际象棋比赛。你邀请了 1 位大师同时与 5 位业余爱好者对弈。大师比业余爱好者强得多，他甚至不需要思考每一步棋。这场 1 对 5\
    \ 的比赛应该如何组织？\n\n自然的方式是同步进行。大师等待玩家 1 走一步棋，然后他走一步棋，接着去和玩家 2 对弈。那时，玩家 2 可能已经走了一步，也可能没有。大师可能需要等待。\n\
    \n更糟糕的是，玩家 3、4 和 5 可能也在等待。本质上，他们被其他玩家的思考时间*阻塞*了。\n\n如果我们想模拟这场比赛，更重要的是，我们不想使用多线程，因为\
    \ CPU 在线程之间疯狂地快速跳转。这相当于业余爱好者在思考时抢夺大师的注意力！大师可能会发疯并退出。\n\n这就是需要引入新的思维范式的地方。我们需要从事件驱动的角度来思考。在我们的\
    \ 1 对 5 比赛中，重要的事件是玩家 x 走了一步棋。如果没有人走棋，只是在思考，大师就不需要做任何事情。大师如此强大，以至于比赛永远不会被他阻塞。\n\
    \n换句话说，只要每场比赛都能*自愿*且*合作*地让出大师的注意力，并回到*思考*模式，单个线程就*应该*足以模拟比赛。\n\n这就是范式的转变：从抢占式到协作式，从时间驱动到事件驱动。\n\
    \n### 事件驱动模拟\n\n我们需要解决两个问题。\n\n- 1. 每场比赛需要自愿放弃其*执行*。\n- 2. 一个玩家的思考不应阻塞其他玩家的比赛。\n\
    \n第一个问题可以通过使用生成器函数来解决。生成器函数有一个 *yield* 关键字，而不是 *return* 关键字。生成器函数在 yield 关键字处*暂停*，可以通过调用生成器的\
    \ *next()* 函数来恢复。代码片段 4.1 是一个经典的斐波那契数生成器示例。\n\n```python\ndef fibonacci():\n \
    \   a, b = 0, 1\n    while True:\n        yield a\n        a, b = b, a + b\n\n\
    fib = fibonacci()\nfor i in range(10):\n    print(next(fib))\n```\n\n代码 4.1 经典的斐波那契函数。\n\
    \n*fib* 对象是一个生成器对象。每次我们调用 *next()* 函数时，它运行无限循环的 1 轮，并 yield 一个 *a* 的值。生成器不*必须*\
    \ yield 任何东西。如果它不 yield，它只是让出运行的特权，直到下一次 *next()* 被调用。然而，生成器也可以通过调用其 *send()*\
    \ 方法来接受输入。这种可以非抢占式地暂停和恢复的函数变体通常被称为协程。\n\n现在，让我们编写一个国际象棋游戏模拟的版本，其中每个玩家在开始思考时让大师离开。这是代码片段\
    \ 4.2。\n\n```python\nimport time\nimport random\nfrom itertools import cycle\n\
    \ndef play_chess(player_name):\n    while True:\n        # 模拟玩家思考随机时间（1到10秒）的生成器函数\n\
    \        print(f\"{player_name} is thinking...\")\n        yield\n        time.sleep(random.uniform(1,\
    \ 2))\n        print(f\"{player_name} made a move!\")\n\ndef main():\n    # 模拟国际象棋游戏的主函数\n\
    \    players = ['Player 1', 'Player 2', 'Player 3', 'Player 4',\n            \
    \   'Player 5']\n    player_gen = cycle((play_chess(player) for player in players))\n\
    \    for player_g in player_gen:\n        next(player_g)\n\nif __name__ == \"\
    __main__\":\n    main()\n```\n\n代码 4.2 使用生成器让出大师的注意力。\n\n这里，我们看到了另一种创建生成器的方法：只需将列表推导式的方括号替换为圆括号。(play_chess(player)\
    \ for player in players) 创建了一个长度为 5 的有限生成器，然后我们使用 cycle 函数反复迭代它。运行它，我们在终端中看到代码片段\
    \ 4.3 的输出。\n\n```\nPlayer 1 is thinking...\nPlayer 2 is thinking...\nPlayer 3\
    \ is thinking...\nPlayer 4 is thinking...\nPlayer 5 is thinking...\nPlayer 1 made\
    \ a move!\nPlayer 1 is thinking...\nPlayer 2 made a move!\nPlayer 2 is thinking..\n\
    ```\n\n代码 4.3 代码片段 4.2 的输出。\n\n这解决了第一个问题，即每场比赛确实自愿让出了大师的注意力。然而，一个玩家的思考仍然阻塞了其他玩家的动作。我们真正想要的是不同玩家的日志信息顺序会混合在一起，当玩家举手说：嗨，我刚走了一步棋时，大师实际上会从一张桌子跑到另一张桌子。我们有两个解决方案。\n\
    \n代码片段 4.4 中的解决方案是使用强大的 asyncio 库将阻塞的 *time.sleep()* 转换为非阻塞的 *asyncio.sleep()*，并使用\
    \ *async-await* 对来替代生成器的 yield 语法。\n\n```python\nimport asyncio\nimport random\n\
    \nasync def play_chess(player_name):\n    while True:\n        await asyncio.sleep(random.uniform(1,\
    \ 2))\n        print(f\"{player_name}'s made a move!\")\n\nasync def main():\n\
    \    players = ['Player 1', 'Player 2', 'Player 3', 'Player 4', 'Player 5']\n\
    \    tasks = [play_chess(player) for player in players]\n    await asyncio.gather(*tasks)\n\
    \nif __name__ == \"__main__\":\n    asyncio.run(main())\n```\n\n代码 4.4 使用 *asyncio.sleep()*\
    \ 解除玩家思考的阻塞。\n\n好的，很多新语法，但别担心。\n通过在函数前加上 *async* 关键字，我们将一个普通的 Python 函数变成了协程，这意味着协程可以自愿地暂停和恢复。\n\
    问题是：在哪里？在 *await* 关键字使用的地方。我们将 *await* 关键字后面的对象称为*可等待对象*。顾名思义，它们可以被等待。有两种最常见的可等待对象。\n\
    \n- 1. 协程对象是可等待的，我们已经看到了。\n- 2. Future 对象也是可等待的。\n\n那么，什么是 future？一个 future 实例代表一个最终应该兑现的承诺。换句话说，你可以持有这个\
    \ future 实例，并期望它在稍后的时间拥有一个*最终状态*。例如，你在餐车点餐，你得到一个号码。这个号码是一个 future，表明你的订单将被履行。Future\
    \ 也可以被*取消*，就像你可以取消你的食物订单一样。\n我们将在后面的章节中更多地讨论 future。\n在 *play_chess* 协程中，当它进入休眠时，代码将暂停，并将控制权交还给事件循环。事件循环是编程中的一个构造，它不断等待并分派事件或消息。在我们的国际象棋游戏示例中，没有现实世界的事件循环类比。然而，在我们上一章的餐厅/厨房示例中有一个：服务员。"
