    \        raise Exception(\"Eel is not allowed in the ingredients!\")\n    return\
    \ type(class_name, bases, attrs)\n\nclass ChickenStew(metaclass = RecipeMeta):\n\
    \    ingredients = ('chicken',)\n\nclass SmokedEel(metaclass = RecipeMeta):\n\
    \    ingredients = ('eel',)\n```\n\nCODE 2.13 The *RecipeMeta* metaclass\n\nRun\
    \ this snippet, you will get an error that the *definition of SmokedEel* raised\
