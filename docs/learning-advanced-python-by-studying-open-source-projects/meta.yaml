    # CHAPTER 3

    Concurrency in Python


    # CONCURRENCY FROM A TOP-DOWN PERSPECTIVE


    Imagine that you and your friends are waiting in a restaurant. You ordered French
    fries, roast chicken, beef stew and some salads. After about 15 minutes, all the
    food is ready. You are very happy.


    From your perspective, the cooking of the food *happens* at the same time. In
    other words, they happen concurrently. You, as a diner, don''t care about what
    happens in the kitchen. What you care about is that you can enjoy the French fries
    and the beef stew at the same time.


    Being concurrent is a behavioral property of an application or a system. It is
    something we observe from the outside of a system. Having a *concurrent* kitchen
    doesn''t say anything about the actual cooking of the food. There is something
    that I call an observation barrier that hides the actual *implementation* of concurrency
    (Figure 3.1).


    Now, let''s shift the perspective to the kitchen side. Suppose the four dishes
    require the following task and time to complete as shown in Table 3.1.


    If there is only one cook in the kitchen and she must prepare the four dishes
    by herself, what would she do?


    If she does each task sequentially, the total time is 29 minutes, which is unacceptable
    for the diners. However, anyone who has ever cooked will do something like the
    following.


    First, she needs to put the pre-prepared chicken in the oven and start stewing
    the beef as they both take time. Setting timers is a good idea. Then, she prepares
    the salad as it is cold anyway. Lastly, she needs to fry the potato stripes and
    closely monitor it as it is easy to get under-fried or over-fried. French fries
    are better served hot, so we do it at the end. During the cooking process, it
    is safe to check the chicken and beef to make sure they are good until the timers
    ring.


    In the time domain, the cooking tasks look like Figure 3.2.


    The tasks marked with white are tasks that only need occasional attention. The
    shaded tasks are attention-exhausting. Remember, there is only one cook in the
    kitchen, but she can prepare these four dishes just fine.'
- md: "## Operating System and Concurrency\n\nNext, we are ready to combine the restaurant\
    \ example with our operating system knowledge. If you are reading this book on\
    \ your computer, the relationship between the diners and the kitchen is just like\
    \ the relationship between you and your computer, more specifically, the operating\
    \ system. Just as the diners order food and the kitchen prepares it, we ask the\
    \ operating systems to do various tasks for us. Just as there are a lot of things\
    \ going on in the kitchen that diners don't know or don't care about, there are\
    \ also a lot of things going on in the operating system that we end-users don't\
    \ care about.\n\nTable 3.2 lays out the analogy between these two relationships.\
    \ Remember, we are still discussing the general programming scenario. In CPython,\
    \ there are some differences that we will discuss very soon.\n\nLet's look at\
    \ the similarities and differences between a CPU and a cook. They are both the\
    \ heavy lifters of actual tasks. For a single-core CPU, there is no real parallelism\
    \ as it can only perform one task at a time. A CPU will switch between tasks to\
    \ provide an illusion that it does several things simultaneously. However, for\
    \ a cook, roasting chicken and stewing beef can somehow be considered *real* parallelism\
    \ still.\n\nSo why are there two modellings for tasks: processes and threads?\
    \ What's the difference?\nSimply put, threads can be treated as lightweight processes\
    \ *within* a process with shared resources, smaller footprint and less creation\
    \ overhead.\n\nProcesses are heavy. The operating system keeps track of resources\
    \ a process uses like the file descriptor, the memory location and the port number,\
    \ etc. By creating lightweight threads in a process, they can share some resources\
    \ like the shared memory and use them. This is obviously powerful as well as dangerous.\
    \ Writing the so-called multithreading code is considered difficult even for experienced\
    \ developers.\n\nTable 3.3 summarizes the key differences between process and\
    \ thread.\n\nTABLE 3.2 Compare the User-Operating Relationship with the Diner-Kitchen\
    \ Relationship\n\n| User-Operating System Scenario | Diner-Kitchen Scenario |\n\
    | :--- | :--- |\n| User | Diner |\n| Operating system | Kitchen |\n| CPU | Cook\
    \ |\n| Processes and threads | Dish cooking tasks |\n\nTABLE 3.3 Key Differences\
    \ between Process and Thread\n\n| Perspective | Process | Thread |\n| :--- | :---\
    \ | :--- |\n| Independency | Processes are considered independent by the Operating\
    \ system | Threads in the same process are considered dependent |\n| Memory Sharing\
    \ | Processes have different memory space | Threads in the same process can share\
    \ memory |\n| Data and Code sharing | Processes have independent data and code\
    \ segments. | Threads in the same process share the same data segment, code segment,\
    \ files, etc. |\n| Overhead | Processes take longer time to create, terminate,\
    \ etc. | Threads require less time to create, terminate, etc. |\n\nIn general,\
    \ different threads in a process *can* run in parallel. If the operating system\
    \ has access to multiple CPUs, it can assign different threads to different CPUs.\
    \ For simplicity, we are not considering multiple-core CPUs and other varieties.\n\
    \nThe question now is how does the operating system achieve concurrency? The answer\
    \ can be answered by following a set of Yes-No questions.\n\n1. Is there real\
    \ parallelism involved? Parallelism means that more than one CPU is processing\
    \ tasks.\n   a. If Yes, at what level?\n      i. Process level: multiprocessing\n\
    \      ii. Thread level: multithreading\n   b. If No, a single thread can also\
    \ achieve concurrency, which will be covered in the next chapter. Concurrency\
    \ doesn't need to be achieved through parallelization. It heavily depends on the\
    \ nature of the task.\n\nIn the rest of this chapter, we cover the first two cases.\
    \ The first case is multiprocessing. See Figure 3.4 for the visualization: three\
    \ processes run on three different CPUs.\n\nThe second case is Multithreading.\
    \ We can also combine multiprocessing and multithreading. This is a common pattern\
    \ in scientific computing.\n\nAs shown in Figure 3.5, process 1 has 3 threads\
    \ that are running in parallel on three different CPUs. Process 2 only has 1 thread,\
    \ running on another CPU.\n\nIt is important to mention the idea of thread safety\
    \ a little bit. An operation/function is thread safe if it can work properly and\
    \ reliably in a multithreading environment. For general programming, since threads\
    \ can share resources like variables, database connections, etc., there may be\
    \ race conditions that two or more threads try to manipulate the same shared objects.\
    \ Imagine the cooking scenario. If two chefs are using a knife at the same time\
    \ without *properly* cleaning it, a guest may have a serious food allergy. And,\
    \ of course, two chefs cannot use a knife at the *exact* same time.\n\nEverything\
    \ seems nice so far. However, the existence of GIL in Python makes Python a little\
    \ bit special.\n\n## Introducing Global Interpreter Lock (GIL)\n\nIn the most\
    \ widely used Python implementation CPython, GIL ensures that a Python process,\
    \ at any time, can only have one *running* thread. It means that even if there\
    \ are multiple threads in a single Python process, only one of them can run at\
    \ a time.\n\nFigure 3.6 shows that threads 1-1, 1-2 and 1-3 *compete* for one\
    \ CPU although there are two other idle CPUs marked as shaded.\n\nGIL is a result\
    \ of history. In the old days, computers only had one CPU, and a CPU only had\
    \ one core. Having GIL makes single-thread code run quickly and safely. It also\
    \ makes writing C extensions for Python much easier, which is considered one reason\
    \ for the booming of the Python ecosystem.\n\nDoesn't GIL make Python multithreading\
    \ completely meaningless? Not really. Not all tasks require full, continuous power\
    \ of a CPU, just as not all dishes require a cook's attention. For example, solving\
    \ scientific models to predict weather will exhaust a CPU's capacity but sending\
    \ an http request to a server is largely waiting. We can classify tasks into two\
    \ categories: CPU bound tasks and input/output (I/O) bound tasks. Here *bound*\
    \ means the task is limited by certain resources or bottlenecks.\n\n---\n\nFIGURE\
    \ 3.1 Kitchen concurrency from the customers’ perspective.\n\nTABLE 3.1 Dishes\
    \ and Their Preparing Efforts\n\n| Dish Name | Task | Effort | Mostly Waiting?\
    \ |\n| :--- | :--- | :--- | :--- |\n| French Fries | Fry the pre-cut potato |\
    \ 2 minutes | No |\n| Roast Chicken | Roast the chicken | 10 minutes | Yes |\n\
    | Beef Stew | Heat the pre-prepared beef | 14 minutes | Yes |\n| Salad | Cut vegetables\
    \ and add dressing | 3 minutes | No |\n\nWhy? At any specific moment, she is only\
    \ *busy* doing one thing and one thing only. She may be *doing* two or even more\
    \ things but cooking the chicken and beef doesn’t require much attention: she\
    \ is mostly waiting for the timer to ring or occasionally checking. In short,\
