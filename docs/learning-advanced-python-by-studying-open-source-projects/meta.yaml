    \n## 属性、函数还是字典？\n\nPython的灵活性是其主要优势之一，但如果使用不当，也是一颗定时炸弹。在上一节中，让我们思考一个案例，我们有不同的方法来解决同一个问题，尽管有些方法在直觉上似乎很奇怪。\n\
