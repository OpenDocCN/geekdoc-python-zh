    # Asynchronous Programming in Python


    # A SHIFT OF PARADIGM


    In Chapter 3, we introduced concurrency as a *behavior* property. If a user interacts
    with an application and feels that the system is concurrent, then the user probably
    won’t care about its implementation. At the implementation level, we studied how
    it is possible to achieve concurrency by utilizing *real* parallelism, multiprocessing,
    and *not-so-real* parallelism, multithreading limited by GIL. The former is suitable
    for CPU-bound tasks, and the latter is suitable for I/O-bound tasks.


    For both cases, we are thinking from the perspective of time dimension, namely
    we care about how multiple tasks are carried out or whether they are carried out
    at a specific point in time. This perspective is particularly true for multithreading
    as we know the CPU jumps preemptively between threads and no threads are running
    at the exact same time.


    Well, for I/O bound tasks, how about thinking from the perspective of I/O events?
    Let’s study a real-world example.


    Suppose you are organizing a chess game for charity. You invited 1 grandmaster
    to play against 5 hobbyists at the same time. The grandmaster is way better than
    the hobbyists, so he doesn’t even need to think about each move. How should this
    1-versus-5 game be organized?


    The natural way is to play synchronously. The grandmaster waits for player 1 to
    make 1 move, then he makes his move and goes to play with player 2. At that time,
    player 2 may already make a move or may not. The grandmaster probably needs to
    wait.


    What’s worse is that players 3, 4 and 5 may be waiting too. Essentially, they
    are *blocked* by other players’ thinking time.


    If we want to simulate this game, what’s more important is that we don’t want
    to do multithreading as the CPU jumps between threads crazily fast. It is equivalent
    to the hobbyists grabbing the grandmaster’s attention while the hobbyist is still
    thinking! The grandmaster will probably go nuts and quit.'
