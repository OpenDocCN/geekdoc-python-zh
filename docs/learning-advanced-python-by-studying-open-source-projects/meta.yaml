    \ ('chicken',)} |\n\nThis is not achievable with `__init__()` as it is not in\
    \ charge of instance creation. In fact, `__new__()` can do everything that `__init__()`\
    \ can do, but not vice versa. Well, using `__init__()` allows users to focus on\
    \ the business logic, as the majority of the time users don't care about the creation\
    \ of the instance.\n\nNow, move on to the metaclass cases. Our example is a little\
