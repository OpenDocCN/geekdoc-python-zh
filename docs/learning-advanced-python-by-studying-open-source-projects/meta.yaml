    Next, the newly created index object is assigned to the new class’ `_index` attribute.


    > If you are interested, you can dive into the *Index* class in the `index.py`⁶
    file.


    When everything is done, the `new_class` is passed back to the user with all the
    messy preparation under the rug. There are many tedious details here and there.
    Everything is taken care of by metaclass, rather than user-defined classes. The
    users don’t need to worry about which API to call to create an index, etc. All
    the users care about are the actual structure of an article.

    To summarize, Figure 2.4 compares the patterns with and without metaclass.

    How to justify the usage of metaclass? Suppose there is a system with a high level
    of internal complexity. The system can be a database, a search engine or just
    a large system another team built. Now you need to set rules for users to interact
    with such a complicated system. Every class they created needs to be in a very
    good standing. You have two options to ensure the class is compatible, healthy
    and well-functioning.


    +   1. Option 1, you create a metaclass to talk to the system and the class, to
    make sure that both sides are happy, and the class is solid since inception.

    2. Option 2, you throw 100 terms for the class creator to follow and hope there
    is no mistake.


    This is where metaclass really shines. The conservation of complexity is like
    the conservation of energy: if you can’t reduce complexity anymore, you had better
    move it to somewhere safe.


    ![](img/d6c2267970090ab811ee8826699fffd7_51_0.png)


    FIGURE 2.4 Patterns with and without metaclass.'
