  md: "This is where a new thinking paradigm needs to be introduced. We need to think\
    \ from an event-driven perspective. In our 1-vs-5 game, the important events are\
    \ player-x making a move. If nobody makes a move and just thinks, the grandmaster\
    \ doesn't need to do anything. The grandmaster is so powerful that the games never\
    \ get blocked by him.\n\nIn other words, a single thread *should* be enough to\
    \ simulate the games as long as each game can give up the grandmaster's attention\
    \ *willingly* and *cooperatively* and go back to *thinking* mode.\n\nThis is the\
    \ shift of paradigm: from preemptive to co-operative, from time-driven to event-driven.\n\
    \n# EVENT-DRIVEN SIMULATION\n\nWe need to solve two issues.\n\n+   1. Each game\
    \ needs to give up its *execution* willingly.\n2. One player's thinking shouldn't\
    \ block other players' games.\n\nThe first issue can be solved by using a generator\
    \ function. A generator function has a *yield* keyword instead of a *return* keyword.\
    \ The generator function *pauses* at the yield keyword and can be resumed by calling\
    \ the *next()* function with the generator. Code snippet 4.1 is a classic example\
    \ of a Fibonacci number generator.\n\n```\ndef fibonacci():\n    a, b = 0, 1\n\
    \    while True:\n        yield a\n        a, b = b, a + b\n\nfib = fibonacci()\n\
    for i in range(10):\n    print(next(fib))\n```\n\nCODE 4.1 Classic Fibonacci function.\n\
    \nThe *fib* object is a generator object. Every time we call the *next()* function,\
    \ it runs 1 round of the infinite loop and yields one value of *a*. A generator\
    \ doesn't *have to* yield anything. If it doesn't, it simply yields the privilege\
    \ to run until the next *next()* is called. However, a generator can also accept\
    \ an input by calling its *send()* method. Such a variant of function that can\
    \ be non-preemptively suspended and resumed is often referred to as a coroutine.\n\
    \nNow, let's write a version of the chess game simulation in which each player\
    \ lets the grandmaster go when the player starts thinking. It is code snippet\
    \ 4.2.\n\n```\nimport time\nimport random\n```"
