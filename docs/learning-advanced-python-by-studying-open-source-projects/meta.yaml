- md: "## SUMMARY\n\nIn this chapter, we used scikit-learn as an example to talk about\
    \ how object-oriented programming is utilized. We covered the goals that the library\
    \ tries to achieve, the design of the core entities and their relationships. We\
    \ also demonstrated several benefits brought by the design choices of scikit-learn.\
    \ In the end, we covered some duck typing and a special case that OOP is not always\
    \ the best option for the development of a library or an ecosystem.\n\n## NOTES\n\
    \n- 1. https://arxiv.org/abs/1309.0238\n- 2. https://github.com/scikit-learn/scikit-learn/blob/main/sklearn/tree/_classes.py#L177\n\
    - 3. https://github.com/scikit-learn/scikit-learn/blob/main/sklearn/preprocessing/_data.py#L659\n\
    \n## Testing in a Pistachio Shell\n\n### INTRODUCTION\n\nThis is the last chapter\
    \ of this book. The chapter topic is testing. I put testing at the end of this\
    \ book not because it is unimportant, but because it is so important that I hope\
    \ readers have a good grasp of concepts like decorators and attribute lookup to\
    \ fully appreciate the testing techniques. Those concepts are covered in earlier\
    \ chapters. If you don't know them, I would suggest you read corresponding chapters\
    \ first. If you do, we can start.\n\nLike other chapters, I will assume that you\
    \ have a rough idea of what testing is. There are three most common Python testing\
    \ frameworks: `unittest`, `pytest` and `doctest`. We will focus on the `unittest`\
    \ and `pytest`. Instead of turning this chapter into a hands-on tutorial, let's\
    \ focus on *ideas* that are universal in both libraries rather than *syntax* differences.\n\
    \n### FIXTURE AND PARAMETERIZATION\n\nLet's say you wrote a function to find all\
    \ the prime factors of a number. It looks like code snippet 7.1. We want to ensure\
    \ its correctness.\n\n```python\nclass PrimeFactorizer:\n    def __init__(self):\n\
    \        pass\n\n    def prime_factors(self, n):\n        factors = []\n     \
    \   i = 2\n        while i * i <= n:\n            if n % i:\n                i\
    \ += 1\n            else:\n                n //= i\n                factors.append(i)\n\
    \        if n > 1:\n            factors.append(n)\n        return factors\n```\n\
    \nCODE 7.1 Plain implementation to find all prime factors.\n\nFirst, let me briefly\
    \ introduce what the *prime_factors()* method does. Any positive integer greater\
    \ than 1 can be decomposed as a product of prime numbers. A prime number is a\
    \ number that can only be decomposed as a product of 1 and itself, no other options.\
    \ For example, 5 is a prime number but 6 is not: 6 equals 3 times 2. After it,\
    \ 7, 11 and 13 are also prime numbers. The prime numbers are more and more sparse\
    \ but there are infinitely many of them.\n\nA fundamental theorem in number theory\
    \ is that all non-prime numbers are products of prime numbers. For example, 72\
    \ is a product of 2, 2, 2, 3 and 3. This is somewhat easy for small numbers but\
    \ can be notoriously difficult for large numbers. In the code above, we have the\
    \ naivest way to find them.\n\nStarting at 2, and capped by the square root of\
    \ the input value, we divide the input value by 2, 3, etc. If there is an exact\
    \ division, we take the quotient to repeat the process.\n\nLet's manually try\
    \ a number, say 70.\n\nThe number 2 divides 70 so the first number is 2 and the\
    \ quotient is 35; 3 doesn't divide 35 but 5 does. Therefore, the second prime\
    \ number is 5. The quotient is 7; 7 divides 7 and the quotient is 1. The code\
    \ does a few more *useless* loops and stops. We have our final list 2, 5 and 7.\n\
    \nLet's write some tests. I put code snippet 7.1 into a file called *prime_factorizer.py*\
    \ and code snippet 7.2 into a file called *test_prime_factorizer.py*. They are\
    \ in the same folder.\n\n```python\nimport pytest\n\nfrom prime_factorizer import\
    \ PrimeFactorizer\n\nclass TestPrimeFactorizer:\n    def test_prime_factors(self):\n\
    \        factorizer = PrimeFactorizer()\n        assert factorizer.prime_factors(12)\
    \ == [2, 2, 3]\n        assert factorizer.prime_factors(84) == [2, 2, 3, 7]\n\
    \        assert factorizer.prime_factors(1024) == [2] * 10\n        assert factorizer.prime_factors(1)\
    \ == []\n        assert factorizer.prime_factors(2) == [2]\n        assert factorizer.prime_factors(7919)\
    \ == [7919]\n        assert factorizer.prime_factors(123456789) == [3, 3, 3607,\
    \ 3803]\n```\n\nCODE 7.2 Test the *prime_factors()* method.\n\nIt looks like we\
    \ write some pretty good edge cases. We can run the test by typing the command\
    \ in snippet 7.3 in the terminal.\n\n```bash\npython3 -m pytest test_prime_factorizer.py\n\
    ```\n\nCODE 7.3 Run the test from command line.\n\nThe test passed successfully.\n\
    \n### Parameterization\n\nEverything looks good so far. However, we would love\
    \ to *extract* the inputs and expected outputs out of the *test_prime_factors()*\
