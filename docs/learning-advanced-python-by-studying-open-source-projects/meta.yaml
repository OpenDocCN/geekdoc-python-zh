  md: 'Please be aware of the difference between the abstract base class and the abstract
    base class for containers. The former is a superset of the latter. The abstract
    base classes in Python also include those from the numbers module and the io module,
    etc.


    Each abstract class is required to have a specific set of abstract methods. A
    *realization* of one of those abstract classes must implement the corresponding
    abstract methods.

    The abstract classes also have inheritance relationships. For example, the *Reversible*
    abstract class is a subclass of the *Iterable* abstract class. Therefore, besides
    the `iter()` method, the *Reversible* class also defines the `reversed()` method.
    The *Sequence* abstract class is a subclass of both the *Reversible* and the *Collection*
    abstract classes. Therefore, the Sequence class also needs to define the `len()`
    method and the `contains()` method to support the `in` operator, as you often
    see in the `for` loop statements.

    By the courtesy of Sangmoon Oh, the inheritance relationship between abstract
    base classes for containers can be visualized as a hierarchy as shown in Figure
    1.1. You can find his blog on Medium.⁶

    The reason we are interested in the hierarchy of abstract classes is that sometimes
    we need to create our own hybrid or Frankenstein classes. Here is the continuation
    of the car dealership example.

    Your employer, the car dealer, is pleased with your work. Now, the managements
    want you to create an application to store and retrieve customer data according
