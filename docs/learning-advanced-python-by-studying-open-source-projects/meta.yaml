    \ that sleep periodically.\n\n## SUMMARY\n\nIn this long chapter, we started from\
    \ basic concepts and investigated the discrepancies between general programming\
    \ language and Python: the GIL's role. We then jump on the multiprocessing examples\
    \ from pandarallel and multithreading examples from PySimpleGUI. We understand\
    \ their use cases.\n\nDoes concurrent programming always require multiprocessing\
    \ or multithread? What if we want to control when and where should a thread yield\
    \ CPU ownership? We will find out in the next chapter.\n\n## NOTES\n\n- 1. https://github.com/gaogaotiantian/viztracer\n\
    - 2. https://www.maartenbreddels.com/perf/jupyter/python/tracing/gil/2021/01/14/Tracing-the-Python-GIL.html\n\
    - 3. https://github.com/nalepae/pandarallel\n- 4. https://github.com/nalepae/pandarallel/blob/master/pandarallel/data_types/dataframe.py\n\
    - 5. https://github.com/PySimpleGUI/PySimpleGUI\n- 6. https://github.com/PySimpleGUI/PySimpleGUI/blob/master/DemoPrograms/Demo_Multithreaded_Write_Event_Value.py\n\
    \n## Asynchronous Programming in Python\n\n### A SHIFT OF PARADIGM\n\nIn Chapter\
    \ 3, we introduced concurrency as a *behavior* property. If a user interacts with\
    \ an application and feels that the system is concurrent, then the user probably\
    \ won’t care about its implementation. At the implementation level, we studied\
    \ how it is possible to achieve concurrency by utilizing *real* parallelism, multiprocessing,\
    \ and *not-so-real* parallelism, multithreading limited by GIL. The former is\
    \ suitable for CPU-bound tasks, and the latter is suitable for I/O-bound tasks.\n\
    \nFor both cases, we are thinking from the perspective of time dimension, namely\
    \ we care about how multiple tasks are carried out or whether they are carried\
    \ out at a specific point in time. This perspective is particularly true for multithreading\
    \ as we know the CPU jumps preemptively between threads and no threads are running\
    \ at the exact same time.\n\nWell, for I/O bound tasks, how about thinking from\
    \ the perspective of I/O events? Let’s study a real-world example.\n\nSuppose\
    \ you are organizing a chess game for charity. You invited 1 grandmaster to play\
    \ against 5 hobbyists at the same time. The grandmaster is way better than the\
    \ hobbyists, so he doesn’t even need to think about each move. How should this\
    \ 1-versus-5 game be organized?\n\nThe natural way is to play synchronously. The\
    \ grandmaster waits for player 1 to make 1 move, then he makes his move and goes\
    \ to play with player 2. At that time, player 2 may already make a move or may\
    \ not. The grandmaster probably needs to wait.\n\nWhat’s worse is that players\
    \ 3, 4 and 5 may be waiting too. Essentially, they are *blocked* by other players’\
    \ thinking time.\n\nIf we want to simulate this game, what’s more important is\
    \ that we don’t want to do multithreading as the CPU jumps between threads crazily\
    \ fast. It is equivalent to the hobbyists grabbing the grandmaster’s attention\
    \ while the hobbyist is still thinking! The grandmaster will probably go nuts\
    \ and quit.\n\nThis is where a new thinking paradigm needs to be introduced. We\
    \ need to think from an event-driven perspective. In our 1-vs-5 game, the important\
    \ events are player-x making a move. If nobody makes a move and just thinks, the\
    \ grandmaster doesn't need to do anything. The grandmaster is so powerful that\
    \ the games never get blocked by him.\n\nIn other words, a single thread *should*\
    \ be enough to simulate the games as long as each game can give up the grandmaster's\
    \ attention *willingly* and *cooperatively* and go back to *thinking* mode.\n\n\
    This is the shift of paradigm: from preemptive to co-operative, from time-driven\
    \ to event-driven.\n\n### EVENT-DRIVEN SIMULATION\n\nWe need to solve two issues.\n\
    \n- 1. Each game needs to give up its *execution* willingly.\n- 2. One player's\
    \ thinking shouldn't block other players' games.\n\nThe first issue can be solved\
    \ by using a generator function. A generator function has a *yield* keyword instead\
    \ of a *return* keyword. The generator function *pauses* at the yield keyword\
    \ and can be resumed by calling the *next()* function with the generator. Code\
    \ snippet 4.1 is a classic example of a Fibonacci number generator.\n\n```python\n\
    def fibonacci():\n    a, b = 0, 1\n    while True:\n        yield a\n        a,\
    \ b = b, a + b\n\nfib = fibonacci()\nfor i in range(10):\n    print(next(fib))\n\
    ```\n\nCODE 4.1 Classic Fibonacci function.\n\nThe *fib* object is a generator\
    \ object. Every time we call the *next()* function, it runs 1 round of the infinite\
    \ loop and yields one value of *a*. A generator doesn't *have to* yield anything.\
    \ If it doesn't, it simply yields the privilege to run until the next *next()*\
    \ is called. However, a generator can also accept an input by calling its *send()*\
    \ method. Such a variant of function that can be non-preemptively suspended and\
    \ resumed is often referred to as a coroutine.\n\nNow, let's write a version of\
    \ the chess game simulation in which each player lets the grandmaster go when\
    \ the player starts thinking. It is code snippet 4.2.\n\n```python\nimport time\n\
    import random\nfrom itertools import cycle\n\ndef play_chess(player_name):\n \
    \   while True:\n        # Generator function that simulates a player thinking\
    \ for\n        # a random amount of time between 1 to 10 seconds\n        print(f\"\
    {player_name} is thinking...\")\n        yield\n        time.sleep(random.uniform(1,\
    \ 2))\n        print(f\"{player_name} made a move!\")\n\ndef main():\n    # The\
    \ main function that simulates the chess game\n    players = ['Player 1', 'Player\
    \ 2', 'Player 3', 'Player 4',\n               'Player 5']\n    player_gen = cycle((play_chess(player)\
    \ for player in players))\n    for player_g in player_gen:\n        next(player_g)\n\
    \nif __name__ == \"__main__\":\n    main()\n```\n\nCODE 4.2 Use a generator to\
    \ yield the attention of the grand master.\n\nHere, we see another way to create\
    \ a generator: just replace the bracket of list comprehension with parentheses.\
    \ (play_chess(player) for player in players) creates a finite generator of length\
    \ 5, we then use the cycle function to iterate it over and over again. Run it,\
    \ and we see snippet 4.3 in the terminal.\n\n```\nPlayer 1 is thinking...\nPlayer\
    \ 2 is thinking...\nPlayer 3 is thinking...\nPlayer 4 is thinking...\nPlayer 5\
    \ is thinking...\nPlayer 1 made a move!\nPlayer 1 is thinking...\nPlayer 2 made\
    \ a move!\nPlayer 2 is thinking..\n```\n\nCODE 4.3 Output from code snippet 4.2.\n\
    \nThis solves issue one that each game does give up the grandmaster's attention\
    \ willingly. However, one player's thinking still blocks other players' actions.\
    \ What we really want is that the order of different players' logging information\
    \ will be mixed, and the grandmaster literally runs from table to table when a\
    \ player raises hands and says: Hi, I just made a move. We have two solutions.\n\
    \nSolution in code snippet 4.4 is to use the powerful asyncio library to turn\
    \ the blocking *time.sleep()* into a non-blocking *asyncio.sleep()* and use the\
    \ *async-await* pair to replace the generator's yield syntax.\n\n```python\nimport\
    \ asyncio\nimport random\n\nasync def play_chess(player_name):\n    while True:\n\
    \        await asyncio.sleep(random.uniform(1, 2))\n        print(f\"{player_name}'s\
    \ made a move!\")\n\nasync def main():\n    players = ['Player 1', 'Player 2',\
    \ 'Player 3', 'Player 4', 'Player 5']\n    tasks = [play_chess(player) for player\
    \ in players]\n    await asyncio.gather(*tasks)\n\nif __name__ == \"__main__\"\
    :\n    asyncio.run(main())\n```\n\nCODE 4.4 Use *asyncio.sleep()* to unblock the\
    \ player's thinking.\n\nOkay, a lot of new syntax but don't worry.\nBy putting\
    \ an *async* keyword in front of a function, we turn a regular Python function\
    \ into a coroutine which means the coroutine can be suspended as resumed willingly.\n\
    The question is where: at where the *await* keyword is used. We call the objects\
    \ that follow the *await* keywords *awaitable*. As the name suggests, they can\
    \ be waited for. There are two most common awaitables.\n\n- 1. Coroutine objects\
    \ are awaitable as we already saw.\n- 2. Future objects are also awaitable.\n\n\
    So, what's a future? A future instance represents a promise that should eventually\
    \ be honored. In other words, you can hold on to the future instance and expect\
    \ it to have a *final state* in a later time. For example, you order something\
    \ at a food truck, and you get a number. This number is a future that indicates\
    \ that your order will be fulfilled. A future can also be *canceled* just like\
    \ you can cancel your food order.\nWe will talk more about the future in a later\
    \ section.\nIn the *play_chess* coroutine, the code will pause when it goes to\
    \ sleep and hand over the control back to the event loop. An event loop is a construct\
    \ in programming that constantly waits for and dispatches events or messages.\
    \ In our chess game example, there is no real-world event loop analogy. However,\
    \ there is one in our restaurant/kitchen example in the last chapter: a waiter."
