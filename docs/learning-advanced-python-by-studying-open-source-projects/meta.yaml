  md: '# SUMMARY


    It is fascinating that the descriptor protocol is responsible for so many features
    and characteristics of Python classes. We went through the basic anatomy of descriptors
    and showed examples in the Matplotlib library and built-in modules.


    Metaclass provides a *separation of concerns* in programming. It enables powerful
    class customization and creation in the class definition time, rather than instance
    creation time. This way, end users can focus on their own object modeling or other
    business concerns.


    # APPENDIX


    Here is a quick how-to to set up an Elasticsearch instance running locally. I
    have tested it on a Mac machine with an M1 chip. With minor tweaks, it should
    work for other operating systems easily.


    Step 1: Install Docker if you don''t have it on your system. Go to the docker
    desktop⁷ page, it should install the right version based on your operating system.


    Step 2: Open a terminal and pull the docker image by running the command in code
    sample 2.27.


