    The following topics are indeed important, but they are not really Python specific.


    +   1. Documentation

    2. Project management and communication


    The first draft of this book included documentation as an independent chapter.
    Popular Python open source libraries often have fabulous documentation. However,
    the more I wrote about it, the more I feel that they are not *advanced Python*,
    they are skills related to *advanced Programming*. Everyone who wrote code needs
    to know them. It is not suitable to include them in a book about Python.


    Similar ideas apply to project management. Since most open source projects are
    developed for the public, you can read the comments, the interactions and sometimes
    spicy exchanges between developers and users. I personally find this topic super
    interesting while preparing the materials. However, they are, again, not Python
    specific. I have to drop it.


    Let’s discuss the purpose of this book. This book’s purpose is to help moderately
    good Python users to become professional Python users.


    What is a Python user? What is moderately good? What makes a Python user professional?


    A Python user is a superset of a Python developer. When I was a PhD student, I
    used Python a lot. I was not a Python developer. Namely, I wrote Python as a tool
    to do something else, rather than for the sake of writing Python. On the contrary,
    a Python developer’s job is to write high-quality Python applications.'
  - '[PAGE 15]


    However, I find Python users’ work often requires very high technical skills.
    For example, a Jupyter Notebook is far from enough for a researcher. The researchers
    sometimes *hack* their way through the development and write terrible code. This
    book aims at the aspirational and ambitious Python users so they can use Python
    in the most efficient way. Of course, developers are welcome.


    So, what is exactly being *moderately* good that qualifies you to read this book?

    If you


    +   1. have day-to-day experience writing Python code to perform tasks like string
    manipulation and tabulated data processing.

    2. are familiar with basic object-oriented programming concepts like class, instance
    and inheritance.

    3. understand basic operating system concepts like process, thread and memory.

    4. are familiar with tools/platforms like Git, GitHub and VS Code.


    Then, you are considered moderately good. Sounds easy, right?

    What makes a Python user professional? This is important as it is what you will
    gradually learn to become while reading this book.

    A professional user can, not limited to the list though, perform the following
    tasks:


    +   1. read code written by others *efficiently* and *correctly*.

    2. write more robust, elegant and well-tested Python code.

    3. have a deep understanding of Python’s data model and use it *appropriately*.

    4. know how to design an OOP system and turn it into reality.


    I hope this gives a good idea of what topics this book covers, and what kind of
    prerequisites I am expecting the readers to have.


    # OVERVIEW OF THE APPROACH TAKEN


    One of the biggest features of this book is that it is not written in a textbook
    style. Instead, it is written somewhat like a novel as long as the circumstance
    permits.

    In a textbook, the author introduces the concepts, then the theorems, then the
    solved examples, followed by exercises.

    In a novel, a character doesn’t get on the stage until it is time for the character.
    The plot has its own rhythm, and characters have natural development paths.

    In this book, concepts and best practices are not introduced until it becomes
    evident and obvious that they are absolutely needed. For example, the idea of
    mixin is not introduced until we find the class relationship in scikit-learn becomes
    error-prone and unmanageable. This is how humans learn. Newton’s laws are not
    written as a bullet list. They are discovered after countless observations, experiments
    and calculations.'
  - '[PAGE 16]


    4 ■ Learning Advanced Python by Studying Open Source Projects


    Here is another more detailed example.

    You want to write a test that tests whether the tested function writes some output
    to the screen. You are not sure how to do it so you Google it.

    Google returns some links and you click in. Several pages mention the idea of
    monkey patch but the code examples in the StackOverflow links are so complex that
    you can''t use them directly. You try to read the official docs and it is so long.
    You try to search on GitHub but there are decorators on top of decorators with
    weird syntax. You give up.

    What this book offers is a guidance to smoothen the path from the problem to the
    answer. I will explain why monkey patch is introduced in testing, what problems
    it tries to resolve and how it solves it. I have carefully designed the order
    of the topics in this book so you will already have a good grasp of the Python
    data model before using the, say, *setattr()* function doing monkey patching.
    Then I will show you that the problems you are facing also exist in the big-name
    open source projects. We will study how they solve the problems and the solution
    to your own problem will be self-revealing.

    I do acknowledge that sometimes the order has to be reversed if the example in
    the open source project is too complex to absorb at the beginning. I will provide
    a solution to your problems first then move on to the open source counterparts.

    Again, I am very excited that you picked up this highly experimental book. I hope
    you enjoy it and I look forward to your feedback.


    NOTE


    1 Dane Hillard. Publishing Python Package. Dec 2022. NY: Manning.'
- md: "## The Data Model of Python\n\nA GENTLE INTRODUCTION TO PYTHON'S DATA MODEL\n\
    \nHave you wondered what makes a Python *dict* a dictionary, and what makes a\
    \ Python *list* a list? In Python, you can perform different kinds of operations\
    \ on different kinds of data structures. Take a *list*, for example, you can append\
    \ a member to a list, *extend* one list with another one and *index* it with integers.\
    \ Let's build a list of cars with code snippet 1.1.\n\n```python\ncars = list()\n\
    cars.append('bmw')\ncars.extend(['audi', 'toyota'])\nassert cars[0] == 'bmw'\n\
    last_car = cars.pop()\nassert last_car == 'toyota'\nassert len(cars) == 2\n```\n\
    \nCODE 1.1 Operations on a Python list object.¹\n\nFor a dictionary, you can perform\
    \ a different set of operations as shown in code snippet 1.2. You can *get* a\
    \ member of the dictionary. Note that both *list* and *dict* support the *len()*\
    \ method.\n\n```python\nfruit_prices = dict()\nfruit_prices['apple'] = 0.5\nfruit_prices['orange']\
    \ = 0.25\nassert len(fruit_prices) == 2\nassert fruit_prices.get('pear') == None\n\
    ```\n\nCODE 1.2 Operations with a Python *dict* object.\n\nWhat makes lists and\
    \ dictionaries behave in different ways? What if we want to modify their behaviors\
    \ and create a hybrid data structure to suit our needs? This will be the main\
    \ topic of this chapter: the data model² for built-in Python data types.\n\n##\
    \ 6 ■ Learning Advanced Python by Studying Open Source Projects\n\nIn Python,\
    \ everything is an instance of the object class. You can think of object as the\
    \ ancestor of all *things* in Python, including the built-in types like *int*,\
    \ *str*, *list*, *dict* and all user-defined classes. Let's try some examples\
    \ with code snippet 1.3.\n\n```python\nisinstance(\"California\", object)\n# True\n\
    \nisinstance(int, object)\n# True\n\nisinstance(list(), object)\n# True\n\nclass\
    \ Car:\n    pass\n\nisinstance(Car(), object)\n# True\n\nisinstance(Car, object)\n\
    # True\n```\n\nCODE 1.3 Check the objects’ types with *isinstance()* function.\n\
    \nA *Car* instance is an object instance. Also, the *Car* class itself is an object\
    \ instance. The question is that if all *stuffs* are instances of the object class,\
    \ then what makes a *list* different from a *dict*?\n\nLet's check the supported\
    \ methods of a *list* and a *dict*.\nThe *dir()* function returns a list of attributes\
    \ and methods supported by an object. We sort the list in alphabetical order to\
    \ make it easier to compare the results. Code snippet 1.4 shows the result for\
    \ a list instance.\n\n```python\nsorted(dir(list()))\n\n# ['__add__', '__class__',\
    \ '__class_getitem__', '__contains__',\n'__delattr__', '__delitem__', '__dir__',\
    \ '__dir__', '__doc__',\n'__eq__', '__format__', '__ge__', ...] # skipped\n```\n\
    \nCODE 1.4 The attributes and methods supported by a Python list object.\n\nLet's\
    \ check what methods are supported by a *list* instance but not supported by a\
    \ *dict* instance and vice versa. To do that, we need to build two sets and take\
    \ a difference as shown in code snippet 1.5.\n\n```python\nset(dir(list())) -\
    \ set(dir(dict()))\n# {'__add__', '__iadd__', '__imul__', '__mul__', '__rmul__',\n\
    'append', 'count', 'extend', 'index', 'insert', 'remove',\n'reverse', 'sort'}\n\
    \n# the other way around\n\nset(dir(dict())) - set(dir(list()))\n# {'__ior__',\
    \ '__or__', '__ror__', 'fromkeys', 'get',\n'items', 'keys', 'popitem', 'setdefault',\
    \ 'update', 'values'}\n```\n\nCODE 1.5 Compare the differences of supported methods\
    \ for a list and a set.\n\nYou may notice that both *list* and *set* support the\
    \ `__gt__` methods. It means that you can compare two lists or two dictionaries.\
    \ It seems that they follow the same *protocol* here that defines what they can\
    \ do: they can be compared against their own kinds.\n\nHowever, a list supports\
    \ the `__add__` method while a *dict* instance does not. This hints that they\
    \ follow different protocols: lists can be added directly, while dictionaries\
    \ cannot.\n\nIn the following sections, you will learn how to create your own\
    \ data structures that follow different protocols and control exactly how they\
    \ behave.\n\n## CUSTOMIZED COMPARISON\n\nLet's begin with a scenario. You are\
    \ hired by a major car dealer to create an application that will help them to\
    \ keep track of their customers' information. One key feature of the application\
    \ is to compare the in-house creditability of customers. For example, if two customers\
    \ bid for the same car, the application needs to tell your boss which customer\
    \ is more credible.\n\nWe need a *Customer* class. Code snippet 1.6 creates it.\n\
    \n```python\nclass Customer:\n    def __init__(self, first_name: str, last_name:\
    \ str, credit_score: int, credit_limit: int, in_debt: bool, monthly_income: int):\n\
    \        self.first_name = first_name\n        self.last_name = last_name\n  \
    \      self.credit_score = credit_score\n        self.credit_limit = credit_limit\n\
    \        self.in_debt = in_debt\n        self.monthly_income = monthly_income\n\
    \n    def __repr__(self):\n        debt_status = \"not in debt\" if self.in_debt\
    \ == False else \"in debt\"\n        return f\"Customer {self.first_name} {self.last_name},\
    \ {debt_status}, with a credit score of {self.credit_score}, credit limit of {self.credit_limit}\
    \ and a monthly income of {self.monthly_income}.\"\n```\n\nCODE 1.6 The *Customer*\
    \ class.\n\nThe `__repr__` method is used to print the object. If you don't define\
    \ it, Python will print the object's memory address like `<__main__.Customer object\
    \ at 0x1083c4ee0>`. We can create a few customers and play around with them as\
    \ shown in code snippet 1.7.\n\n```python\njohn_smith = Customer(\"John\", \"\
    Smith\", 800, 200000, False, 10000)\nrichard_dawkins = Customer(\"Richard\", \"\
    Dawkins\", 700, 240000, True, 8000)\nalbert_jackson = Customer(\"Albert\", \"\
    Jackson\", 700, 250000, True, 12000)\nmelissa_miller = Customer(\"Melissa\", \"\
    Miller\", 700, 250000, False, 9000)\n\nprint(melissa_miller)\n# Customer Melissa\
    \ Miller, not in debt, with a credit score of 700, credit limit of 250000 and\
    \ a monthly income of 9000.\n```\n\nCODE 1.7 Create a few customers and print\
    \ one out.\n\nTo compare the financial credibility of the customers, the car dealer\
    \ has created a set of rules based on their historical experiences. The rules\
    \ are organized in order such that the rules are checked in order. These rules\
    \ are:\n\n1.  The customer with a higher credit score is more credible.\n2.  When\
    \ credit scores are equal, the customer with a higher credit limit is more credible.\n\
    3.  When both are equal, the customer with a higher monthly income is more credible.\n\
    \nHowever, if the one who gets paid higher is in debt while another who gets paid\
    \ lower is not, the difference of monthly income must be larger than 4000. Otherwise,\
    \ the one who is not in debt is more credible.\nIdeally, we want to compare the\
    \ `john_smith` and `richard_dawkins` objects in code snippet 1.8. However, we\
    \ can't do it because *Customers* don't support such operations.\n\n```python\n\
    john_smith < richard_dawkins\n# Traceback (most recent call last):\n#   File \"\
    FILE_PATH\", line 25, in <module>\n#     john_smith < richard_dawkins\n# TypeError:\
    \ '<' not supported between instances of 'Customer' and 'Customer'\n```\n\nCODE\
    \ 1.8 Comparison is not supported for the *Customer* class.\n\nWe have two solutions.\
    \ One is to write a helper function that compares two customers. Every time we\
    \ need to compare customers, we can pass the function to something like the *key*\
    \ parameter of the *sort()* method. Another solution is to enable native support\
    \ for *Customer* comparison.\n\n> Which solution is better? The logic of comparison\
    \ needs to go somewhere in the code. The question is where. The canonical way\
    \ is in the *Customer* class. There are two reasons. First, by enabling syntax\
    \ like *john_smith < richard_dawkins*, we aligned our syntax with the Pythonic\
    \ way of doing comparison. It is much easier for your coworkers to integrate the\
    \ code into their projects. Second, the built-in comparison logic is more robust\
    \ and error-free than a standalone function. When you ship your code to someone\
    \ else, you have a better control over the code unless the code users deliberately\
    \ overwrite the comparison logic in the *Customer* class, which is much less likely\
    \ than them writing another standalone comparison function.\n\nLet's pause our\
    \ concerns for a while to learn from the pros and see how this is done in the\
    \ *SymPy* library. *SymPy* is an open source Python library for symbolic computation.\
    \ It can be used to perform algebraic computations and symbolic differentiation,\
    \ etc. Code snippet 1.9 shows a differentiation example.\n\n```python\nimport\
    \ sympy as sym\nx = sym.symbols(\"x\")\nprint(type(x))\n# <class 'sympy.core.symbol.Symbol'>\n\
    print(sym.diff(x**2 + sym.sin(x) + 2*x, x))\n# 2*x + cos(x) + 2\n```\n\nCODE 1.9\
    \ Use *SymPy* to calculate the derivative of a function.\n\nIn snippet 1.9, we\
    \ defined a symbol *x* and differentiated the expression *x² + sin(x) + 2x*, the\
    \ result is correct: *2x + cos(x) + 2*.\n\nLike our cases, customized comparisons\
    \ are also common in *SymPy*. For example, a polynomial's terms can be arranged\
    \ in any order, but the polynomial remains the same. We would love to enable such\
    \ mathematical expression comparison.\n\nIn Python, *magic* methods or *dunder*\
    \ methods like *__lt__* and *__ge__* define how comparisons are done. The first\
    \ stands for *less than*, and the latter stands for *greater than or equal to*.\
    \ Redefining them, in other programming languages, is often called *operating\
    \ overloading*.\n\n> Dunder is an abbreviation of *double underscore* if you are\
    \ wondering.\n\nBack to *SymPy*, instead of studying its implementation, let's\
    \ investigate a bug to pierce into its core. The developers found a bug that alternating\
    \ two objects' order in comparison"
  mdcn: "## Python 的数据模型\n\n**Python 数据模型的温和入门**\n\n你是否曾好奇，是什么让 Python 的 *dict* 成为字典，又是什么让\
    \ Python 的 *list* 成为列表？在 Python 中，你可以对不同类型的数据结构执行不同的操作。以 *list* 为例，你可以向列表追加成员，用另一个列表\
    \ *extend*（扩展）它，或者用整数对其进行 *index*（索引）。让我们用代码片段 1.1 来构建一个汽车列表。\n\n```python\ncars\
    \ = list()\ncars.append('bmw')\ncars.extend(['audi', 'toyota'])\nassert cars[0]\
    \ == 'bmw'\nlast_car = cars.pop()\nassert last_car == 'toyota'\nassert len(cars)\
    \ == 2\n```\n\n代码 1.1 对 Python 列表对象的操作。¹\n\n对于字典，你可以执行一组不同的操作，如代码片段 1.2 所示。你可以\
    \ *get*（获取）字典的一个成员。请注意，*list* 和 *dict* 都支持 *len()* 方法。\n\n```python\nfruit_prices\
    \ = dict()\nfruit_prices['apple'] = 0.5\nfruit_prices['orange'] = 0.25\nassert\
    \ len(fruit_prices) == 2\nassert fruit_prices.get('pear') == None\n```\n\n代码 1.2\
    \ 对 Python *dict* 对象的操作。\n\n是什么让列表和字典的行为方式不同？如果我们想修改它们的行为，并创建一个混合数据结构以满足我们的需求呢？这将是本章的主要主题：内置\
    \ Python 数据类型的数据模型²。\n\n## 6 ■ 通过研究开源项目学习高级 Python\n\n在 Python 中，一切都是 object 类的实例。你可以将\
    \ object 视为 Python 中所有 *事物* 的祖先，包括内置类型如 *int*、*str*、*list*、*dict* 以及所有用户定义的类。让我们用代码片段\
    \ 1.3 尝试一些例子。\n\n```python\nisinstance(\"California\", object)\n# True\n\nisinstance(int,\
    \ object)\n# True\n\nisinstance(list(), object)\n# True\n\nclass Car:\n    pass\n\
    \nisinstance(Car(), object)\n# True\n\nisinstance(Car, object)\n# True\n```\n\n\
    代码 1.3 使用 *isinstance()* 函数检查对象的类型。\n\n一个 *Car* 实例是一个对象实例。同样，*Car* 类本身也是一个对象实例。问题是，如果所有\
    \ *东西* 都是 object 类的实例，那么是什么让 *list* 与 *dict* 不同呢？\n\n让我们检查 *list* 和 *dict* 支持的方法。\n\
    *dir()* 函数返回一个对象支持的属性和方法列表。我们按字母顺序排序该列表，以便更容易比较结果。代码片段 1.4 显示了一个列表实例的结果。\n\n```python\n\
    sorted(dir(list()))\n\n# ['__add__', '__class__', '__class_getitem__', '__contains__',\n\
    '__delattr__', '__delitem__', '__dir__', '__dir__', '__doc__',\n'__eq__', '__format__',\
    \ '__ge__', ...] # 已跳过\n```\n\n代码 1.4 Python 列表对象支持的属性和方法。\n\n让我们检查哪些方法是 *list*\
    \ 实例支持但 *dict* 实例不支持的，反之亦然。为此，我们需要构建两个集合并取差集，如代码片段 1.5 所示。\n\n```python\nset(dir(list()))\
    \ - set(dir(dict()))\n# {'__add__', '__iadd__', '__imul__', '__mul__', '__rmul__',\n\
    'append', 'count', 'extend', 'index', 'insert', 'remove',\n'reverse', 'sort'}\n\
    \n# 反之亦然\n\nset(dir(dict())) - set(dir(list()))\n# {'__ior__', '__or__', '__ror__',\
    \ 'fromkeys', 'get',\n'items', 'keys', 'popitem', 'setdefault', 'update', 'values'}\n\
    ```\n\n代码 1.5 比较列表和集合支持方法的差异。\n\n你可能注意到 *list* 和 *set* 都支持 `__gt__` 方法。这意味着你可以比较两个列表或两个字典。看起来它们在这里遵循相同的\
    \ *协议*，该协议定义了它们能做什么：它们可以与自身同类进行比较。\n\n然而，列表支持 `__add__` 方法，而 *dict* 实例不支持。这暗示它们遵循不同的协议：列表可以直接相加，而字典不能。\n\
    \n在接下来的章节中，你将学习如何创建遵循不同协议的自定义数据结构，并精确控制它们的行为。\n\n## 自定义比较\n\n让我们从一个场景开始。你被一家大型汽车经销商聘用，创建一个应用程序来帮助他们跟踪客户信息。该应用程序的一个关键功能是比较客户的内部信用度。例如，如果两个客户竞标同一辆车，应用程序需要告诉你的老板哪个客户更可信。\n\
    \n我们需要一个 *Customer* 类。代码片段 1.6 创建了它。\n\n```python\nclass Customer:\n    def __init__(self,\
    \ first_name: str, last_name: str, credit_score: int, credit_limit: int, in_debt:\
    \ bool, monthly_income: int):\n        self.first_name = first_name\n        self.last_name\
    \ = last_name\n        self.credit_score = credit_score\n        self.credit_limit\
    \ = credit_limit\n        self.in_debt = in_debt\n        self.monthly_income\
    \ = monthly_income\n\n    def __repr__(self):\n        debt_status = \"not in\
    \ debt\" if self.in_debt == False else \"in debt\"\n        return f\"Customer\
    \ {self.first_name} {self.last_name}, {debt_status}, with a credit score of {self.credit_score},\
    \ credit limit of {self.credit_limit} and a monthly income of {self.monthly_income}.\"\
    \n```\n\n代码 1.6 *Customer* 类。\n\n`__repr__` 方法用于打印对象。如果你不定义它，Python 将打印对象的内存地址，如\
    \ `<__main__.Customer object at 0x1083c4ee0>`。我们可以创建几个客户并像代码片段 1.7 所示那样操作它们。\n\
    \n```python\njohn_smith = Customer(\"John\", \"Smith\", 800, 200000, False, 10000)\n\
    richard_dawkins = Customer(\"Richard\", \"Dawkins\", 700, 240000, True, 8000)\n\
    albert_jackson = Customer(\"Albert\", \"Jackson\", 700, 250000, True, 12000)\n\
    melissa_miller = Customer(\"Melissa\", \"Miller\", 700, 250000, False, 9000)\n\
    \nprint(melissa_miller)\n# Customer Melissa Miller, not in debt, with a credit\
    \ score of 700, credit limit of 250000 and a monthly income of 9000.\n```\n\n\
    代码 1.7 创建几个客户并打印其中一个。\n\n为了比较客户的财务可信度，汽车经销商根据他们的历史经验制定了一套规则。这些规则按顺序组织，以便按顺序检查。这些规则是：\n\
    \n1.  信用评分更高的客户更可信。\n2.  当信用评分相同时，信用额度更高的客户更可信。\n3.  当两者都相同时，月收入更高的客户更可信。\n\n\
    然而，如果收入更高的人负债，而收入更低的人没有负债，那么月收入的差额必须大于 4000。否则，没有负债的人更可信。\n理想情况下，我们希望比较代码片段 1.8\
    \ 中的 `john_smith` 和 `richard_dawkins` 对象。然而，我们无法这样做，因为 *Customers* 不支持这样的操作。\n\
    \n```python\njohn_smith < richard_dawkins\n# Traceback (most recent call last):\n\
    #   File \"FILE_PATH\", line 25, in <module>\n#     john_smith < richard_dawkins\n\
    # TypeError: '<' not supported between instances of 'Customer' and 'Customer'\n\
    ```\n\n代码 1.8 *Customer* 类不支持比较。\n\n我们有两个解决方案。一个是编写一个比较两个客户的辅助函数。每次我们需要比较客户时，我们可以将该函数传递给类似\
    \ *sort()* 方法的 *key* 参数。另一个解决方案是启用对 *Customer* 比较的原生支持。\n\n> 哪个解决方案更好？比较的逻辑需要放在代码中的某个地方。问题是在哪里。规范的方式是在\
    \ *Customer* 类中。有两个原因。首先，通过启用像 *john_smith < richard_dawkins* 这样的语法，我们将我们的语法与\
    \ Python 风格的比较方式对齐。你的同事更容易将代码集成到他们的项目中。其次，内置的比较逻辑比独立函数更健壮、更不容易出错。当你将代码交付给其他人时，除非代码用户故意覆盖\
    \ *Customer* 类中的比较逻辑（这比他们编写另一个独立的比较函数可能性小得多），否则你能更好地控制代码。\n\n让我们暂停一下我们的担忧，向专业人士学习，看看在\
    \ *SymPy* 库中是如何完成的。*SymPy* 是一个用于符号计算的开源 Python 库。它可用于执行代数计算和符号微分等。代码片段 1.9 显示了一个微分示例。\n\
    \n```python\nimport sympy as sym\nx = sym.symbols(\"x\")\nprint(type(x))\n# <class\
