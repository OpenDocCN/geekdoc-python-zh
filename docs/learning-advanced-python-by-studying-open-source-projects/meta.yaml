  md: '# CHAPTER 6


    # Selected OOP Design Best Practices


    # UNDERSTAND YOUR BUSINESS


    Before writing the first line of Python code, you should understand the business
    you are trying to model or emulate very well. This is especially true for object-oriented
    programming. If there are design flaws in object-oriented programming code and
    you provide them to users, it will take extra effort on the user’s end to mitigate
    the damage and the mitigation is often error prone. Ultimately, the *complexity*
    of the codebase will become unmanageable. However, having a clean, reusable oriented-programming
    design will lower the barrier to understanding, remove obstacles to integrate
    the new code with existing code base and build robust and reliable applications.


    ![](img/d6c2267970090ab811ee8826699fffd7_106_0.png)


    FIGURE 6.1 Basic machine learning flowchart.'
