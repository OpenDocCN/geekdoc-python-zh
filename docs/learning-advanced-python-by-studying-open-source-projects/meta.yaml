    \ also an asynchronous iterator.\n\n```python\nasync with aiosqlite.connect(\"\
    movie.db\") as db:\n    async with db.execute(\"SELECT * FROM movie\") as cursor:\n\
    \        async for row in cursor:\n            print(row)\n```\n\nCODE 5.23 `Cursor`\
    \ is also an asynchronous iterator.\n\nHow is this possible?\nLet's check the\
    \ first case first. What does the `cursor()` method of the `Connection` class\
    \ do? The `cursor()` method returns a `Cursor` object but the `Cursor` object's\
    \ argument, a real sqlite3 connection cursor, is not immediately available which\
    \ should be awaited for (code snippet 5.24).\n\n```python\n@contextmanager\nasync\
    \ def cursor(self) -> Cursor:\n    \"\"\"Create an aiosqlite cursor wrapping a\
    \ sqlite3 cursor\n    object.\"\"\"\n    return Cursor(self, await self._execute(self._conn.cursor))\n\
    ```\n\nCODE 5.24 The *cursor()* method returns a *Cursor* object.\n\nOr Is it?\
