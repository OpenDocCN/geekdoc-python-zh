  md: "Similarly, you can even change the system paths visible to Python. The fixture\
    \ defined in code snippet 7.15 prepends the *test _ apps'* path to the system\
    \ PATH environment variable so it will be picked up by Python first.\n\n```\n\
    @pytest.fixture\ndef test_apps(monkeypatch):\n    monkeypatch.syspath_prepend(os.path.join(os.path.dirname(__\n\
    file__), \"test_apps\"))\n    original_modules = set(sys.modules.keys())\n\n \
    \   yield\n\n    for key in sys.modules.keys() - original_modules:\n        sys.modules.pop(key)\n\
    ```\n\nCODE 7.15 Change *PATH* with monkey patch.\n\nRemember that we have the\
    \ *setUp()* and *tearDown()* functions from unittest that behave like coroutines.\
    \ This pytest fixture is just a coroutine. Whatever before the *yield* is like\
