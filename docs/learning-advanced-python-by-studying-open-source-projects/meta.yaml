  - "[PAGE 133]\n\nThe interesting test is that we reuse our tested function to check\
    \ whether each factor is a prime number. If it is a prime number, then we should\
    \ get a list of one member: itself. This is not enough to say that the factor\
    \ is *in fact* a prime number, but it does prove that the `prime_factors()` is\
    \ self-consistent. If you pass a prime number to it, it will always return the\
    \ prime number itself in a list.\n\nWriting a property-based testing usually requires\
    \ deeper insights into the problem you were trying to solve. It can help you find\
    \ bugs that you might not have thought to test for manually, as well as increase\
    \ the coverage of your tests. Property-based testing can also help you identify\
    \ edge cases and boundary conditions that your code may not handle properly.\n\
    \nHowever, property-based testing is not always fancy. There are low-hanging,\
    \ property-based tests like a there-and-back test. If you are writing something\
    \ that converts A to B, then converting it back from B should give A back exactly.\
    \ This is a very common test that you can find in libraries like `xarray`.\n\n\
    `xarray` is a Python library that provides a way to work with labeled multi-dimensional\
    \ arrays and labeled multi-dimensional datasets. It is built on top of numpy.\
    \ A natural task is to convert an xarray object to a pandas DataFrame. The `test_pandas_roundtrip.py`\
    \ file does the job exactly.\n\nFor example, the test in snippet 7.20 converts\
    \ a dataset with 1d variables to a pandas DataFrame and then converts it back.\
    \ The roundtripped result must be exactly the same as the original one.\n\n```\n\
    @given(datasets_1d_vars())\ndef test_roundtrip_dataset(dataset) -> None:\n   \
    \ df = dataset.to_dataframe()\n    assert isinstance(df, pd.DataFrame)\n    roundtripped\
    \ = xr.Dataset(df)\n    xr.testing.assert_identical(dataset, roundtripped)\n```\n\
    \nCODE 7.20 pandas DataFrame round trip test.\n\nHere, `datasets_1d_vars()` is\
    \ a customized strategy. It is defined as in snippet 7.21. The creation of an\
    \ xarray object is like a pandas DataFrame: we specify an index and a dictionary\
    \ object that determines the *column* name and values.\n\n```\n@st.composite\n\
    def datasets_1d_vars(draw) -> xr.Dataset:\n    idx = draw(pdst.indexes(dtype=\"\
    u8\", min_size=0, max_size=100))\n\n    vars_strategy = st.dictionaries(\n   \
    \     keys=st.text(),\n        values=npst.arrays(dtype=numeric_dtypes, shape=len(idx)).map(\n\
    \            partial(xr.Variable, (\"rows\",))\n        ),\n```"
