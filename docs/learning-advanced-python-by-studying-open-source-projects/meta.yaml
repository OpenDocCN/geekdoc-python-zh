    CODE 6.14  The iris dataset in the Arff format.


    This text file is essentially a class. The class has attributes like *title*,
    *sources* and *number of instances*, etc. Although not all fields are necessary,
    you still need to meet the minimum requirements for Weka to read it.


    In scikit-learn, none of the information is needed. If the user wants to know
    how many attributes are there, just check the *shape* of the input X. In my opinion,
    this significantly increased the popularity of scikit-learn. When you run a SQL
    query to obtain a tabular dataset or convert an Excel file to a csv file, scikit-learn
    will just read it without asking you to provide more information. The implicit
    agreement between the user and the library creator is awesome: we do what we are
    supposed to do well, respectively.


    To clarify that I am not criticizing any other software or libraries. The development
    of statistical learning tools has its own historical footprints. For example,
    Weka was originally developed in the 1990s while numpy was first available in
    the 2000s.


    # SUMMARY


    In this chapter, we used scikit-learn as an example to talk about how object-oriented
    programming is utilized. We covered the goals that the library tries to achieve,
    the design of the core entities and their relationships. We also demonstrated
    several benefits brought by the design choices of scikit-learn. In the end, we
    covered some duck typing and a special case that OOP is not always the best option
    for the development of a library or an ecosystem.


