- md: "## 14 ■ Learning Advanced Python by Studying Open Source Projects\n\nfollowing\
    \ requirements. Let's call such a data structure *CustomerStruct*, which is essentially\
    \ a container of *Customers*.\n\n1.  A *CustomerStruct* should support membership\
    \ tests in *O(1)* time.\n2.  A *CustomerStruct* should support insertion, deletion\
    \ and union efficiently.\n3.  A *CustomerStruct* should support iteration in a\
    \ special way that it always returns the VIP customers first.\n\nIf a new car\
    \ is available, the car dealer can iterate through VIP customers first to give\
    \ them privileges to choose first. The *CustomerStruct* should largely behave\
    \ like a set. Among all the common data structures, only dictionaries and sets\
    \ support membership tests in *O(1)* time. Since we are not looking up for data,\
    \ a set is enough. The issue with a default set is that its iteration is not in\
    \ any particular order after some member manipulation. However, you should know\
    \ that since Python 3.7, the default *dict* data structure is insertion-ordered\
    \ if you iterate over a dictionary. I will quote from the Python documentation:\n\
    \n> A set is an unordered collection with no duplicate elements. Basic uses include\
    \ membership testing and eliminating duplicate entries. Set objects also support\
    \ mathematical operations like union, intersection, difference and symmetric difference.\n\
    \nWe don't want to implement an ordered set completely because we don't prefer\
    \ one VIP customer over another or one non-VIP customer over another. If you are\
    \ interested in a fully functional ordered set, you can check the ordered sorted\
    \ container Python library.⁷\n\nThe problem then boils down to the implementation\
    \ of the `__iter__` method which dictates the behavior of iteration. Interestingly,\
    \ the *SymPy* developers faced a similar concern like ours. They want to implement\
    \ the rational number set and allow callers to iterate over the set in a specific\
    \ way. Why? Recall that a rational number is any number that can be represented\
    \ as a fraction. For example, $\\frac{1}{2}$, $\\frac{3}{5}$ are both rational\
    \ numbers while $\\pi$, the ratio of a circle's circumference to its diameter,\
    \ is not. The rational number set is also infinitely large. Iterating over such\
    \ an infinite set exhaustively and reasonably is their concern.\n\nThe source\
    \ code is in the *sympy.sets.fancyssets.Rationals* class as shown in code snippet\
    \ 1.14.\n\n```python\ndef __iter__(self):\n    from sympy.core.numbers import\
    \ igcd, Rational  # comment 1\n    yield S.Zero\n    yield S.One\n    yield S.NegativeOne\n\
    \    d = 2\n    while True:\n        for n in range(d):\n            if igcd(n,\
    \ d) == 1:  # comment 2\n                yield Rational(n, d)\n              \
    \  yield Rational(d, n)\n                yield Rational(-n, d)\n             \
    \   yield Rational(-d, n)\n            d += 1\n```\n\nCODE 1.14 Generate all rational\
    \ numbers systematically.\n\nIn the line denoted with the first comment, they\
    \ used a function called `igcd()` to determine whether two numbers are relatively\
    \ prime. The `Rational` class is used to build a rational number. Two rational\
    \ numbers are essentially the same if one can be reduced to another. For example,\
    \ $\\frac{1}{2}$ is essentially equivalent to $\\frac{23}{46}$. Several Singleton\
    \ objects are being yielded in the following lines first. There is only one 0,\
    \ one positive 1 and one negative 1, etc. Then the iteration is dictated by increasing\
    \ a value $d$, while finding all the possible combinations of the pair $(n, d)$,\
    \ where $n$ is smaller than $d$ and relatively prime to it.\n\n> Notice that the\
    \ `__iter__` method can yield rational numbers indefinitely, which gives you an\
    \ idea why protocols are important to write efficient code. The code doesn't need\
    \ to be honest if it does what it is supposed to do faithfully, according to the\
    \ protocol. For example, you can pass a handler to users to iterate over a large\
    \ amount of data records from a database. You don't want to query so much data\
    \ beforehand because it is going to be a disaster memory-wise and time-wise. What\
    \ you can do is to return a small amount of data for the user to use, maintain\
    \ a cursor and defer additional queries until needed. The amortized cost will\
    \ be low.\n\nLet's give it a try to check the pattern. I am examining the first\
    \ 20 results in code snippet 1.15.\n\n```python\nfor idx, val in enumerate(sympy.Rationals):\n\
    \    if idx < 20:\n        print(val)\n    else:\n        break\n# 0\n# 1\n# -1\n\
    # 1/2\n# 2\n# -1/2\n# -2\n# 1/3\n# 3\n# -1/3\n# -3\n# 2/3\n# 3/2\n# -2/3\n# -3/2\n\
    # 1/4\n# 4\n# -1/4\n# -4\n# 3/4\n```\n\nCODE 1.15 Use the *Rationals* class to\
    \ generate first 20 rational numbers.\n\nTime to go back to our *CustomerStruct*\
    \ case. We also need to slightly modify the *Customer* class to initiate them\
    \ with an *is_vip* argument (snippet 1.16).\n\n```python\nclass Customer:\n  \
    \  def __init__(self, ..., is_vip: bool):\n        self.is_vip = is_vip\n```\n\
    \n```python\nclass CustomerStruct:\n    def __init__(self, customer_set: set):\n\
    \        self.customer_set = customer_set\n\n    def __iter__(self):\n       \
    \ for customer in self.customer_set:\n            if customer.is_vip:\n      \
    \          yield customer\n        for customer in self.customer_set:\n      \
    \      if not customer.is_vip:\n                yield customer\n```\n\nCODE 1.16\
    \ Iterate through VIP customers first.\n\nThe drawback of this approach is that\
    \ we will have to loop the *customer_set* twice. Well, there is no free lunch.\
    \ Better solutions so exist but you get the point.\n\n## ATTRIBUTES, FUNCTION\
    \ OR DICTIONARY?\n\nThe flexibility of Python is one of its main strengths, as\
    \ well as a timed bomb if used improperly. In the last section, let's think about\
    \ a case where we have different approaches to solve the same problem, although\
    \ some approaches seem intuitively weird.\n\nA defined instance attribute can\
    \ be found in the *\\_\\_dict\\_\\_* dictionary that the instance maintains. Code\
    \ snippet 1.17 is an example.\n\n```python\nclass Customer:\n    def __init__(self,\
    \ is_vip: bool):\n        self.is_vip = is_vip\nprint(Customer(True).__dict__)\n\
    # {'is_vip': True}\n```\n\nCODE 1.17 Check a class' `__dict__` attribute.\n\n\
    It looks like the attribute retrieval is merely a `get()` call on the `__dict__`\
    \ attribute.\n\nShall we manipulate the instance's attribute dictionary directly\
    \ whenever an attribute is not found? Say you want to make room for flexibility.\
    \ If a code user asks for an attribute `is_VIP` rather than `is_vip`, you still\
    \ want to return the `is_vip` attribute value and log a warning message rather\
    \ than throwing out an error. Can we do that?\n\nSome readers may know that behind\
    \ the scenes, there is a beginner-unfriendly concept called descriptor for managed\
    \ attribute lookup, storage and manipulation. We will cover it in the next chapter,\
    \ together with the attribute lookup order.\n\nSuppose that you follow the attribute\
    \ lookup order and there is no attribute called `is_VIP` anywhere, not the instance,\
    \ not in the class `Customer` and all its parent classes. Python has a built-in\
    \ special method called `__getattr__()` to handle this safely. We can customize\
    \ it to handle the error gracefully.\n\n> In fact, the attribute access logic\
    \ first goes through the `__getattribute__()` dunder method. It is called regardless\
    \ of whether the attribute exists first, and it is called before `__getattr__()`,\
    \ which serves as the last resort of failed attribute retrieval attempt.\n\nThe\
    \ logic in code snippet 1.18 is that whenever an attribute that contains the string\
    \ `vip` is requested, we return the `is_vip` value.\n\n```python\nclass Customer:\n\
    \    def __getattr__(self, attr_name: str):\n        if \"vip\" in attr_name.lower():\n\
    \            return self.is_vip\n        else:\n            raise AttributeError(attr_name)\n\
    ```\n\nCODE 1.18 Allow minor typo to work while retrieving VIP status.\n\nThis\
    \ works.\n\nThe `__getattr__()` is a catch-all fallback method as the last resolution.\
    \ If there is no user-defined `__getattr__()` method, the default behavior is\
    \ just to raise an `AttributeError` exception.\n\nThe lesson here is that the\
    \ `instance.attribute` syntax is largely implemented as a dictionary lookup. Can\
    \ we do it the other way around? Can we fake a dictionary lookup process by something\
    \ else, like a function call, etc.? Sure.\n\n`SymPy` has an example exactly for\
    \ this. In `SymPy`, there is a class called `Transform` that represents a mathematical\
    \ transformation. Since high school, we know this is naturally represented as\
    \ a function. However, in `SymPy`, it is abstractly represented by a custom class,\
    \ partially implementing the `Mapping` protocol. Code snippet 1.19 is the key\
    \ part of it."
  mdcn: "## 14 ■ 通过研究开源项目学习高级Python\n\n满足以下要求。我们将这样的数据结构称为 *CustomerStruct*，它本质上是\
