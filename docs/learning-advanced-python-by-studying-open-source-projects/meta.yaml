    \ np.array([0 for _ in range(len(X.shape[0]))])\n    def score(self, X, y):\n\
    \        return 0\n```\n\nCODE 6.12 Create a new estimator called *AllZeroEstimator*.\n\
    \nHowever, I can plug it into a pipeline without any issue. Code snippet 6.13\
