- md: "## The Benefits of Universal *interface*\n\nNow, let's talk about some additional\
    \ important *business* topics in machine learning besides the core entities.\n\
    There are estimators that take other estimators as basic building blocks. They\
    \ are called meta-estimators. For example, the *Pipeline* class takes multiple\
    \ estimators *in order* as input and bundles them together, so they function as\
    \ a unified entity.\nCode snippet 6.8 is an example of pipelining.\n\n```python\n\
    pipe = Pipeline([('scaler', StandardScaler()),\n                 ('dtc', DecisionTreeClassifier())])\n\
    pipe.fit(X_train, y_train)\npipe.score(X_test, y_test)\n```\n\nCODE 6.8 Combine\
    \ *StandardScaler* and *DecisionTreeClassifier* in a pipeline.\nThe pipe takes\
    \ a list of tuples for initialization. Each tuple contains a string as the name\
    \ of the current step and an estimator instance that does the actual job.\n\n\
    ![](img/d6c2267970090ab811ee8826699fffd7_116_0.png)\n\nFIGURE 6.7 Mixin structure.\n\
    \nPipeline *is* an estimator therefore it also implements the *fit()* method,\
    \ which continuously calls each estimator in the line. If the last estimator in\
    \ the pipe is a *predictor*, then Pipeline will also become a *predictor* with\
    \ *score()* or *predict()* implemented.\n\nWhat's super nice is that you can easily\
    \ switch components of the pipeline. Let's say you think a single decision tree\
    \ classifier is not enough, you want a forest (code snippet 6.9).\n\n```python\n\
    pipe = Pipeline([('scaler', StandardScaler()),\n                  ('rfc', RandomForestClassifier())])\n\
    ```\n\nCODE 6.9 Switch the classifier from code snippet 6.8.\n\nWith such minimal\
    \ code change, our code base will continue to work. This is a clear demonstration\
    \ of the power of universal interface.\n\nLet's look at a different meta-estimator:\
    \ *GridSearchCV*. It is an estimator that takes another estimator and searches\
    \ for the latter's best hyperparameters on a parameter space grid, using cross-validation\
    \ (code snippet 6.10).\n\n```python\nfrom sklearn import svm, datasets\nfrom sklearn.model_selection\
    \ import GridSearchCV\niris = datasets.load_iris()\nparameters = {'kernel':('linear',\
    \ 'rbf'), 'C':[1, 10]}\nsvc = svm.SVC()\nclf = GridSearchCV(svc, parameters)\n\
    clf.fit(iris.data, iris.target)\n```\n\nCODE 6.10 An official example of *GridSearchCV*.\n\
    \nThe estimator *SVC*, C-support vector machine classifier, is a classifier that\
    \ utilizes a support vector machine, which is a once-super-hot machine learning\
    \ model. The *C* here stands for penalization because people often use letter\
    \ *C* to denote the penalizing coefficient.\n\nLet's check the class *__init__()*\
    \ method in code snippet 6.11.\n\n```python\ndef __init__(\n    self,\n    *,\n\
    \    C=1.0,\n    kernel=\"rbf\",\n    # skipped\n)\n```\n\nCODE 6.11 Initialization\
    \ of a support vector machine classifier.\n\nBoth *C* and *kernel* are pre-defined\
    \ hyperparameters. The *GridSearchCV* basically takes the *parameters* and builds\
    \ a 2 by 2 parameter space grid, in total 4 combinations, to find the best parameter\
    \ set for the classifier.\n\nTo avoid overfitting, the model quality evaluation\
    \ is done using cross-validation. The *iris* dataset is split into several *folds*,\
    \ by default five. Four of them will be used for training and one for *validation*.\
    \ This is repeated five times and the average is used for the final evaluation.\n\
    \nLike pipelining, the greatest thing about *GridSearchCV* is that you can easily\
    \ plug in any estimator and provide a set of parameters and its choices. *GridSearchCV*\
    \ will work out of the box. This is another advantage of the universal interface.\n\
    \nEven *GridSearchCV* itself is also an estimator. It has its own *fit()* method,\
    \ so you attach it as the last stage of a pipeline.\n\n## Sometimes No OOP is\
    \ the Best Design\n\nSometimes the best OOP design is to not have one. In scikit-learn,\
    \ there are two examples.\n\nDuck-typing may be more suitable than a rigorous\
    \ inheritance relationship. scikit-learn supports duck-typing. Duck-typing is\
    \ a programming concept in which the type or class of an object is less important\
    \ than the set of methods and attributes it possesses. In other words, if an object\
    \ walks like a duck and quacks like a duck, it's considered a duck, regardless\
    \ of its actual type.\n\nFor example, when building pipelines or performing cross-validation,\
    \ scikit-learn doesn't check the objects' type. Instead, it checks whether the\
    \ class implements the necessary methods that an estimator or predictor *should*\
