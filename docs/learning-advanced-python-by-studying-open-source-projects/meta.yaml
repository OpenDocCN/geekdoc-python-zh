    # Introducing Global Interpreter Lock (GIL)


    In the most widely used Python implementation CPython, GIL ensures that a Python
    process, at any time, can only have one *running* thread. It means that even if
    there are multiple threads in a single Python process, only one of them can run
    at a time.


    Figure 3.6 shows that threads 1-1, 1-2 and 1-3 *compete* for one CPU although
    there are two other idle CPUs marked as shaded.


    GIL is a result of history. In the old days, computers only had one CPU, and a
    CPU only had one core. Having GIL makes single-thread code run quickly and safely.
    It also makes writing C extensions for Python much easier, which is considered
    one reason for the booming of the Python ecosystem.


    Doesn''t GIL make Python multithreading completely meaningless? Not really. Not
    all tasks require full, continuous power of a CPU, just as not all dishes require
    a cook''s attention. For example, solving scientific models to predict weather
    will exhaust a CPU''s capacity but sending an http request to a server is largely
    waiting. We can classify tasks into two categories: CPU bound tasks and input/output
    (I/O) bound tasks. Here *bound* means the task is limited by certain resources
    or bottlenecks.'
- md: "1. CPU bound tasks are limited by the speed of CPUs. They are computationally\
    \ heavy and make the CPUs busy. Examples include scientific computation, video\
    \ compressing, bitcoin mining if you choose to mine with CPU.\n\n2. I/O bound\
    \ tasks are limited by the speed of input and output. They depend on external\
    \ components or systems’ performance. For example, reading and writing to the\
    \ disk, sending and receiving files from the internet, etc. During the life cycle\
    \ of an I/O bound task, a CPU is mostly idle.\n\nIf a Python process has multiple\
    \ threads, the operating system will schedule each thread to have access to the\
    \ CPU in a preemptive fashion. Being preemptive means the operating system by\
    \ default *forces* the thread that currently runs to give up the CPU without asking\
    \ whether it is a good time to do so. Such shifting between threads is so fast\
    \ that they happen millions of times before you even notice.\n\nIf these threads\
    \ are executing I/O bound tasks, it is totally fine! If they are human, they probably\
    \ will say: hey CPU, I don’t need you, I am waiting for my data from the disk.\
    \ Ultimately, the I/O bound tasks can wait together, therefore *progress* together.\n\
    \nLooking back at the cooking example, roast chicken and beef stew can be considered\
    \ I/O bound dishes. Salad and poke bowls are *cook-bound* dishes. I have seen\
    \ experienced cooks oversee the preparation of 40 Tofu stews in Koreatown in Los\
    \ Angeles, but I never see any cook mixing seaweed in three bowls simultaneously.\n\
    \nIf there is no real multithreading in Python, does it mean that with GIL, thread\
    \ safety is guaranteed? Not really. It depends on at what level we are talking\
    \ about thread safety. Yes, the threads will not compete for the shared resources\
    \ at the same time, but it doesn’t mean that they will mess the status up.\n\n\
    Here is an example, if two chefs are going to need the same bowl, one is going\
    \ to make a rice pudding and another one is going to make kimchi. If right in\
    \ the middle of the pudding making, the second chef just blindly obtains the *ownership*\
    \ of the bowl and puts some kimchi into the bowl. When the first chef *resumes*\
    \ the ownership of the bowl, I am pretty sure the chef will go crazy. A Python\
    \ interpreter is thread safe, but it doesn’t necessarily make a Python program\
    \ thread safe if the logics overlay each other.\n\n## MULTIPROCESSING FOR CPU\
    \ BOUND TASKS\n\nIn this section, we will dive into the Python concurrent pattern\
