  md: "What is *builtins*? Every time you start a Python program, Python will import\
    \ some functions or classes that you can use out of the box. They are shipped\
    \ together with Python in a module named *builtins*. You can run `dir(__builtin__)`\
    \ to examine the built-in functions, errors, etc. `print()` is one of them.\n\n\
    The *builtins* module behaves like a class object with attributes, therefore *monkeypatch*\
    \ can dynamically set its attribute with the `setattr()` method. Then in and only\
    \ in the test function that uses the `mock_print` fixture, the system standard\
    \ output becomes a list!\n\n# More Powerful Monkey Patching\n\nThe *monkeypatch*\
    \ in pytest can do much more. Let's look at its usage in two famous open source\
    \ libraries. *flask*³ is a very popular light-weight web framework written in\
    \ Python. Let's see what kind of fixtures it defines in its `conftest.py`⁴ file.\
    \ We will also pick up some additional tips along the way.\n\nFirst, monkeypatch\
    \ can change the environment variable. The fixture in snippet 7.14 will be created\
    \ only once for the whole test session according to the decorator's argument.\
    \ This fixture will also be *automatically* used for every test.\n\n```\n@pytest.fixture(scope=\"\
    session\", autouse=True)\ndef _standard_os_environ():\n    mp = monkeypatch.MonkeyPatch()\n\
    \    out = (\n        (os.environ, \"FLASK_ENV_FILE\", monkeypatch.notset),\n\
    \        (os.environ, \"FLASK_APP\", monkeypatch.notset),\n        (os.environ,\
    \ \"FLASK_DEBUG\", monkeypatch.notset),\n        (os.environ, \"FLASK_RUN_FROM_CLI\"\
    , monkeypatch.notset),\n        (os.environ, \"WERKZEUG_RUN_MAIN\", monkeypatch.notset),\n\
    \    )\n\n    for _, key, value in out:\n        if value is monkeypatch.notset:\n\
    \            mp.delenv(key, False)\n        else:\n            mp.setenv(key,\
    \ value)\n\n    yield out\n    mp.undo()\n```\n\nCODE 7.14 Change environment\
    \ variables with monkey patch.\n\n*monkeypatch* provides the `delenv()` and `setenv()`\
    \ functions to delete and set environment variables."
