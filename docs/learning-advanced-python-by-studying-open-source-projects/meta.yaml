    \ method implements a lock to ensure that the execution of a query and the returning\
    \ of the query from the result queue is undisturbed. If there is no result in\
    \ the result queue, it will just keep quickly polling the queue until the task\
    \ completes. This clearly causes a potential performance issue.\n\nTo fix this,\
    \ the contributor removed the result queue and the lock. Instead, let Python itself\
    \ take care of the thread safety by calling standard library functions. This is\
    \ a beautiful pull request.\n\nHere is a quick summary of what we have figured\
    \ out.\n\n1. A real sqlite3 connection is wrapped with a *Connection* class instance\
    \ which inherits a *Thread* object.\n2. The *Connection* class, when started,\
    \ will keep fetching queued tasks and execute them. This process is synchronous.\
    \ However, the future's result setting is scheduled by an event loop. The asynchronous\
    \ *execute()* method will await for the future's finalization and return to the\
    \ caller.\n\n## Connection and Cursor as Async Context Managers\n\nFor most other\
    \ *Connection* methods, they are just mirroring of the sqlite3 counterparts. However,\
