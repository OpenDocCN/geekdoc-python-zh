    Well, we can add more test cases, probably more difficult ones. No engineers won't\
    \ be able to eyeball the prime factors of 345,234,139,217. I made up this random\
    \ number while I was writing this book. It is perhaps a good idea to randomize\
    \ the example input.\nHowever, to implement this *brilliant* idea, we will have\
    \ to implement a prime factorization method in our test! We can be creative to\
    \ avoid the trial division method. The ugly truth is that we are reinventing wheels\
    \ in our test.\nCan we test without introducing examples?\nThe right direction\
    \ is to test the property of our function. A property of a result is independent\
    \ of specific examples but intrinsic to the core of the algorithm or application.\n\
    For example, based on the way we write the *prime_factorizer()* method, our result\
    \ must have the following *properties*.\n\n+   1. The return is a list of integers,\
    \ unless the input is 1.\n2. Every integer in this list divides the input exactly,\n\
    3. The integers are arranged in an increasing order.\n4. Every integer is a prime\
    \ number.\n5. The product of the integers is exactly the input.\n\nThe idea of\
    \ property testing is that we randomly create some examples and check against\
    \ those properties. Fortunately, there is already a library called *hypothesis*\
    \ that does most of the job for us. Code snippet 7.18 is an example of using the\
    \ hypothesis library.\n\n```\nfrom hypothesis import given\nfrom hypothesis import\
    \ strategies as st\n\nclass TestPrimeFactorizer:\n    @given(st.integers(min_value=1,\
    \ max_value=10000))\n    def test_prime_factors_property(self, n):\n        factorizer\
    \ = PrimeFactorizer()\n```"
