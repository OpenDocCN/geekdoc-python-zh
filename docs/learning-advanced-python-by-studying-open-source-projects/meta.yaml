    \ the directory.\n\nNext, let's move on to another important topic that is commonly\
    \ missed in testing discussion.\n\n# PROPERTY-BASED TEST\n\nLet's look at our\
    \ test more closely. We take several positive integers, pass them to the tested\
    \ function and compare the results with pre-obtained, expected results.\nRegardless\
    \ of the usage of fixture and monkey patch, what we have done so far are example-based\
