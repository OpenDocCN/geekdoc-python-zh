- md: "## 3.11 pandarallel multiprocessing.\n\n1.  将数据集分割成更小的块。\n2.  使用多进程对每个子集应用数据操作。\n\
    3.  将结果收集回来并拼接在一起。\n\n让我们逐一考察每个阶段。你会发现，一个实用的多进程程序除了多进程本身，还必须解决许多微妙的问题。pandarallel\
    \ 实现了一个名为 `chunk()` 的实用函数，并将其应用于 pandas 中的不同数据类型，如 DataFrame、Series 和其他 `group_by`\
    \ 对象。它简单地返回一个切片对象列表，可用于切分一个 `Iterable` 对象。让我们以最基本的 DataFrame 为例。代码片段 3.5 取自 `data_types/dataframe.py`⁴\
    \ 文件。\n\n```python\n@staticmethod\ndef get_chunks(\n    nb_workers: int, data:\
    \ pd.DataFrame, **kwargs\n) -> Iterator[pd.DataFrame]:\n    user_defined_function_kwargs\
    \ = kwargs[\"user_defined_function_kwargs\"]\n\n    axis_int = get_axis_int(user_defined_function_kwargs)\n\
    \    opposite_axis_int = 1 - axis_int\n\n    for chunk_ in chunk(data.shape[opposite_axis_int],\
    \ nb_workers):\n        yield data.iloc[chunk_] if axis_int == 1 else data.iloc[:,\
    \ chunk_]\n```\n\n代码 3.5 DataFrame 切片逻辑。\n\n`nb_workers` 变量是将执行数据操作的进程数。默认情况下，它是机器的物理核心数。现在的问题是，切分出的子集将临时存储在哪里？嗯，你可以选择不存储数据，而是将其从主进程传递给生成的工作进程，但这通常不是最优的。请记住，进程是重量级的，为了保持高效，它们最好不要直接相互通信。\n\
    \n答案是内存。在基于 Unix 的操作系统中，一切都是文件，包括*内存*。你可以将 `/dev/shm` 路径视为一个文件系统。*shm* 代表*共享内存*。在\
    \ pandarallel 中，这用 `MEMORY_FS_ROOT` 表示，它是内存文件系统的根目录。然而，并非所有操作系统都启用共享内存文件系统，因此\
    \ pandarallel 也有跨进程管道模式。\n\n对于每个物理核心，都会创建一个输入文件和一个输出文件。这不可避免地会消耗更多内存。代码片段 3.6\
    \ 展示了这些文件是如何定义的。\n\n```python\ninput_files = [\n    NamedTemporaryFile(\n    \
    \    prefix=PREFIX_INPUT, suffix=SUFFIX, dir=MEMORY_FS_ROOT,\n        delete=False\n\
    \    )\n    for _ in range(nb_workers)\n]\n\noutput_files = [\n    NamedTemporaryFile(\n\
    \        prefix=PREFIX_OUTPUT, suffix=SUFFIX, dir=MEMORY_FS_ROOT,\n        delete=False\n\
