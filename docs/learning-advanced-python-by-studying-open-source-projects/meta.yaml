    The interesting thing here is the usage of the *call_soon_threadsafe()* function.\
    \ It enforces that the task passed to it will run in a thread safe way. In other\
    \ words, it ensures that the future will be set properly.\n\nTo understand why\
    \ we need to check how this was done earlier. Before PR #15 back in 2018, there\
    \ was a task queue *tx* and a result queue *rx*. When the thread grabs a task\
    \ and runs it, it puts the result back into the result queue in the order the\
    \ task is processed.\n\nRecall that Python a *Queue* object is shared between\
    \ threads. Multiple coroutines can put results into it. This causes an issue:\
    \ how do we make sure that the order of the query results agrees with the order\
