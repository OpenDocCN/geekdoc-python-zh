    # Operating System and Concurrency


    Next, we are ready to combine the restaurant example with our operating system
    knowledge. If you are reading this book on your computer, the relationship between
    the diners and the kitchen is just like the relationship between you and your
    computer, more specifically, the operating system. Just as the diners order food
    and the kitchen prepares it, we ask the operating systems to do various tasks
    for us. Just as there are a lot of things going on in the kitchen that diners
    don''t know or don''t care about, there are also a lot of things going on in the
    operating system that we end-users don''t care about.


    Table 3.2 lays out the analogy between these two relationships. Remember, we are
    still discussing the general programming scenario. In CPython, there are some
    differences that we will discuss very soon.


    Let''s look at the similarities and differences between a CPU and a cook. They
    are both the heavy lifters of actual tasks. For a single-core CPU, there is no
    real parallelism as it can only perform one task at a time. A CPU will switch
    between tasks to provide an illusion that it does several things simultaneously.
    However, for a cook, roasting chicken and stewing beef can somehow be considered
    *real* parallelism still.


    So why are there two modellings for tasks: processes and threads? What''s the
    difference?

    Simply put, threads can be treated as lightweight processes *within* a process
    with shared resources, smaller footprint and less creation overhead.


    Processes are heavy. The operating system keeps track of resources a process uses
    like the file descriptor, the memory location and the port number, etc. By creating
    lightweight threads in a process, they can share some resources like the shared
    memory and use them. This is obviously powerful as well as dangerous. Writing
    the so-called multithreading code is considered difficult even for experienced
    developers.


    Table 3.3 summarizes the key differences between process and thread.


    TABLE 3.2 Compare the User-Operating Relationship with the Diner-Kitchen Relationship


    | User-Operating System Scenario | Diner-Kitchen Scenario |

    | :--- | :--- |

    | User | Diner |

    | Operating system | Kitchen |

    | CPU | Cook |

    | Processes and threads | Dish cooking tasks |


    TABLE 3.3 Key Differences between Process and Thread


    | Perspective | Process | Thread |

    | :--- | :--- | :--- |

    | Independency | Processes are considered independent by the Operating system
    | Threads in the same process are considered dependent |

    | Memory Sharing | Processes have different memory space | Threads in the same
    process can share memory |

    | Data and Code sharing | Processes have independent data and code segments. |
    Threads in the same process share the same data segment, code segment, files,
    etc. |

    | Overhead | Processes take longer time to create, terminate, etc. | Threads require
    less time to create, terminate, etc. |'
