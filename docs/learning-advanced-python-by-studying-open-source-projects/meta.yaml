    \ Python》*\nStephen Lynch\n\n*《学习专业 Python》*\nUsharani Bhimavarapu and Jude D.\
    \ Hemanth\n\n*《通过研究开源项目学习高级 Python》*\n李荣鹏\n\n欲了解有关本系列的更多信息，请访问：https://www.crcpress.com/Chapman--HallCRC/book-series/PYTH\n\
