- img_proc: true
  md: '1. CPU bound tasks are limited by the speed of CPUs. They are computationally
    heavy and make the CPUs busy. Examples include scientific computation, video compressing,
    bitcoin mining if you choose to mine with CPU.


    2. I/O bound tasks are limited by the speed of input and output. They depend on
    external components or systems’ performance. For example, reading and writing
    to the disk, sending and receiving files from the internet, etc. During the life
    cycle of an I/O bound task, a CPU is mostly idle.


    If a Python process has multiple threads, the operating system will schedule each
    thread to have access to the CPU in a preemptive fashion. Being preemptive means
    the operating system by default *forces* the thread that currently runs to give
    up the CPU without asking whether it is a good time to do so. Such shifting between
    threads is so fast that they happen millions of times before you even notice.


    If these threads are executing I/O bound tasks, it is totally fine! If they are
    human, they probably will say: hey CPU, I don’t need you, I am waiting for my
    data from the disk. Ultimately, the I/O bound tasks can wait together, therefore
    *progress* together.


    Looking back at the cooking example, roast chicken and beef stew can be considered
    I/O bound dishes. Salad and poke bowls are *cook-bound* dishes. I have seen experienced
    cooks oversee the preparation of 40 Tofu stews in Koreatown in Los Angeles, but
    I never see any cook mixing seaweed in three bowls simultaneously.


    If there is no real multithreading in Python, does it mean that with GIL, thread
    safety is guaranteed? Not really. It depends on at what level we are talking about
    thread safety. Yes, the threads will not compete for the shared resources at the
    same time, but it doesn’t mean that they will mess the status up.


    Here is an example, if two chefs are going to need the same bowl, one is going
    to make a rice pudding and another one is going to make kimchi. If right in the
    middle of the pudding making, the second chef just blindly obtains the *ownership*
    of the bowl and puts some kimchi into the bowl. When the first chef *resumes*
    the ownership of the bowl, I am pretty sure the chef will go crazy. A Python interpreter
    is thread safe, but it doesn’t necessarily make a Python program thread safe if
    the logics overlay each other.


    # MULTIPROCESSING FOR CPU BOUND TASKS


    In this section, we will dive into the Python concurrent pattern that is backed
    by *real* parallel computing: multiprocessing.


    Before we start, I need to explain one more concept clarification and introduce
    probably one of the most powerful python code analysis tools I know.


    First, multiprocessing may not happen on the Python-level, oftentimes you don’t
    know that your Python code utilizes multiprocessing at C-level if you import a
    library that is written in C, C++ or Fortran. These are not considered multiprocessing
    in Python in this book. Similarly, multithreading in other languages evolved from
    Python are not considered multithreading in Python.'
