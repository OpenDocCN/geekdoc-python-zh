    \n为了简化概念，我将引用elasticsearch-dsl-py文档中使用的示例，你可以想象以下json对象是一个*文档*，你可以将其保存到名为blog的*索引*中，以及其他类似对象。该文档有五个*字段*：*author*、*title*、*publish_date*、*tags*和body，如代码片段2.20所示。\n\
