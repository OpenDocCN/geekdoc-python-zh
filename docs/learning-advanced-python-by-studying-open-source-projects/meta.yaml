    2. Second, blue tasks are not limited by the cook’s energy, you can just wait.\
    \ The red ones require the cook’s full attention. Therefore, the red ones can\
    \ only be prepared sequentially as there is only one cook.\n\n44 ■ Learning Advanced\
    \ Python by Studying Open Source Projects\n\nFIGURE 3.2 Cooking scheduling.\n\n\
    FIGURE 3.3 Two cooks case.\n\nThings will become harder if diners also order three\
