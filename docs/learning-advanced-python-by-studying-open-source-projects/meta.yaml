    \ as shown in code snippet 3.2.\n\n```\nfrom multiprocessing import Process\n\
    import math\n\ndef f(x):\n    for _ in range(1_000_000):\n        x = math.sqrt(x)\
    \ if x > 1.000001 else 2*x\n    return x * x\n\nif __name__ == '__main__':\n \
