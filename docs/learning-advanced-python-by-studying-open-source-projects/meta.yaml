    CODE 6.13 Use *AllZeroEstimator* with scikit-learn pipelines.


    This makes development and customization of scikit-learn very handy and friendly.
    Users can create their own estimator without inheriting the classes provided by
    the library.


    In addition to duck-typing, scikit-learn made another important decision: no modeling
    for the dataset. It is completely up to the library users to make sure their dataset
    is tidy and well-formatted. In another word, there is no such a class called *BaseDataset*
    so users can inherit and model their data.


    scikit-learn algorithms take plain NumPy arrays as input. This seems very trivial
    nowadays and has almost become a default truth not only for scikit-learn but for
    the whole machine learning ecosystem. However, if you look at scikit-learn''s
    predecessors, people spend quite some time to get the dataset right.


    In Weka, a statistical learning and data mining software, you must format your
    data as an Arff format. Arff stands for *Attribute-Relation File Format*. It is
    a text file that contains a lot of metadata. The famous iris dataset looks like
    snippet 6.14. Note that I already skipped a lot of information.


