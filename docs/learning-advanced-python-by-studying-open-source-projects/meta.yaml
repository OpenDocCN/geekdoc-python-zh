    \        name = 'blog'\n        settings = {\n            \"number_of_shards\"\
    : 2,\n        }\n\n    def save(self, ** kwargs):\n        self.lines = len(self.body.split())\n\
    \        return super(Article, self).save(** kwargs)\n\n    def is_published(self):\n\
    \        return datetime.now() > self.published_from\n\nArticle.init()\n```\n\n\
    **CODE 2.21** Create the *Article* class.\n\nThen, we can create a concrete article\
    \ and save it with code snippet 2.22.\n\n```python\narticle = Article(meta={'id':\
