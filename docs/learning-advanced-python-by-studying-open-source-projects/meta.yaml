    # SUMMARY


    In this chapter, we covered the pattern shifting from thinking in the time dimension
    to thinking in the event dimension. We used a chess game as an example to demonstrate
    the paradigm shift. Then we peeked into an event-driven simulation library to
    understand how the scheduling works. Asyncio creates an event loop to schedule
    the coroutines. We also emphasized that asynchronous doesn''t necessarily work
    on only one thread, but merely a pattern.


    Although we covered examples how you can submit normal tasks to *concurrent.futures*
    executors so they return awaitable futures. However, we deliberately skipped the
    example of turning some synchronous operations natively asynchronous. Let''s cover
    this big project in our next chapter.


    # APPENDIX


    For developers who know how code runs at a lower level, I think it is time to
    shed some light on how single-thread asynchronous programming is implemented at
    a lower level. In procedural programming, each thread maintains one call *stack*:
    an ordered pile of frames. For simplicity, we can think of frames as cards that
    contain instructions or data. Each time the CPU picks up one card and does exactly
    what the card tells it to do. When a program starts, the stack is initialized
    as an empty list, the instructions are pushed into the stack in a last in, first
    out (LIFO) pattern. If you call a function *first_function()* which calls another
    *second_function()* in the code, the *second_function()* will be on top of the
    *first_function()* and therefore gets executed first so it can handle some results
    to the *first_function()*. This abstraction is called the stack machine.


    Figure 4.5 is a simplification of how the stack machine works. The CPU uses an
    instruction pointer to track what the program is executing. When a new function
    is called, it is


    ![](img/d6c2267970090ab811ee8826699fffd7_87_0.png)


    FIGURE 4.5 Stack machine.'
