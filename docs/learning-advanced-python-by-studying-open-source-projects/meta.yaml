    \ cleaner.\n\n```\npython\nfrom multiprocessing import Pool\nimport math\n\ndef\
    \ f(x):\n    for _ in range(1_000_000):\n        x = math.sqrt(x) if x > 1.000001\
    \ else 2*x\n    return x*x\n\nif __name__ == '__main__':\n    with Pool(3) as\
    \ p:\n        p.map(f, [1.1, 2.1, 3.1])\n```\n\nCODE 3.3 Use a process pool to\
    \ run tasks.\n\nHowever, if you viztrace it, the main process has three additional\
    \ threads. They are introduced by using the pool pattern. Figure 3.10 looks strange,\
    \ right? We know that GIL prevents multiple threads from running simultaneously\
    \ but they look like they run at the same time.\n\nThis is due to a limitation\
    \ of viztracer. If you are interested in diving deeper, Maarten Breddels has a\
    \ great blog post² explaining the combination of Linux *perf* and viztracer to\
    \ solve this issue. I found that in other cases that if you explicitly create\
    \ and manage threads, the issue is gone. We will see an example in the next section.\n\
    \n![](img/d6c2267970090ab811ee8826699fffd7_64_0.png)\n\nFIGURE 3.10 Three more\
    \ threads are generated in main process.\n\n## Parallel Pandas Apply in pandarallel\n\
    \nIt's time to see multiprocessing in the real world. The star project pandarallel³\
    \ is a library that enables parallel data manipulation of pandas DataFrame objects.\n\
    \nIn Pandas, you can manipulate a column using the *apply()* method. The following\
    \ code snippet 3.4 is a typical example that creates a bool variable that indicates\
    \ the leap year status for DataFrame *df*.\n\n```\npython\ndef is_leap_year(year):\n\
    \    if year % 400 == 0:\n        return True\n    elif year % 100 == 0:\n   \
    \     return False\n    elif year % 4 == 0:\n        return True\n    else:\n\
    \        return False\n\ndf[\"is_leap\"] = df[\"year\"].apply(is_leap_year)\n\
    ```\n\nCODE 3.4 A normal Pandas apply example.\n\nHowever, this operation is done\
    \ linearly. If the DataFrame is very large, it can take a long time. What pandarallel\
    \ does is that for the apply method and similar operations, it shadows the default\
    \ method that a DataFrame has inherently with a parallel, multiprocessing version.\n\
    \nVisually, the process contains three steps, which can be considered a *map-reduce*\
    \ pattern as shown in Figure 3.11."
  mdcn: "1.  CPU密集型任务受限于CPU的运算速度。它们计算量大，会使CPU持续繁忙。例如科学计算、视频压缩，以及如果你选择用CPU挖矿时的比特币挖矿。\n\
    \n2.  I/O密集型任务受限于输入输出的速度。它们依赖于外部组件或系统的性能。例如，读写磁盘、从互联网发送和接收文件等。在I/O密集型任务的生命周期中，CPU大部分时间处于空闲状态。\n\
    \n如果一个Python进程拥有多个线程，操作系统会以抢占式的方式调度每个线程访问CPU。抢占式意味着操作系统默认会*强制*当前运行的线程放弃CPU，而不会询问现在是否是合适的时机。这种线程间的切换速度如此之快，以至于在你注意到之前，它们已经发生了数百万次。\n\
    \n如果这些线程正在执行I/O密集型任务，那完全没问题！如果它们是人类，它们可能会说：嘿，CPU，我不需要你，我正在等待从磁盘获取我的数据。最终，I/O密集型任务可以一起等待，因此*共同推进*。\n\
    \n回顾烹饪的例子，烤鸡和炖牛肉可以被视为I/O密集型菜肴。沙拉和波奇碗则是*烹饪密集型*菜肴。我见过经验丰富的厨师在洛杉矶韩国城同时监督40份豆腐炖菜的准备工作，但我从未见过任何厨师同时在三个碗里搅拌海藻。\n\
    \n如果Python中没有真正的多线程，这是否意味着有了GIL，线程安全就得到了保证？并非如此。这取决于我们谈论线程安全的层面。是的，线程不会同时竞争共享资源，但这并不意味着它们不会搞乱状态。\n\
    \n这里有一个例子，如果两位厨师需要同一个碗，一位要做米布丁，另一位要做泡菜。如果在布丁制作过程中，第二位厨师盲目地获得了碗的*所有权*并放入了一些泡菜。当第一位厨师*恢复*对碗的所有权时，我敢肯定这位厨师会发疯。Python解释器是线程安全的，但如果逻辑相互重叠，它并不一定使Python程序线程安全。\n\
    \n## 用于CPU密集型任务的多进程\n\n在本节中，我们将深入探讨由*真实*并行计算支持的Python并发模式：多进程。\n\n在开始之前，我需要再解释一个概念澄清，并介绍我所知的最强大的Python代码分析工具之一。\n\
    \n首先，多进程可能并不发生在Python层面，通常，如果你导入一个用C、C++或Fortran编写的库，你并不知道你的Python代码在C层面利用了多进程。在本书中，这些不被视为Python中的多进程。同样，从Python演化而来的其他语言中的多线程也不被视为Python中的多线程。\n\
    \n其次，让我向你介绍viztracer，¹ 一个Python日志记录器、分析器和可视化工具。它支持多进程和多线程Python代码，并以信息丰富且令人愉悦的方式呈现结果。请注意，viztracer确实对代码速度有一定影响。如果它扭曲了代码性能，你可以在不使用它的情况下运行代码以评估影响。\n\
    \n安装和使用viztracer非常容易，只需遵循代码片段3.1。你只需三行代码即可开始可视化你的代码跟踪。假设你的`code`在`main.py`中，我们使用默认输出文件名`result.json`。\n\
    \n```\npip install viztracer\n\nviztracer main.py\n\nvizviewer result.json\n```\n\
    \n代码3.1 安装并使用viztracer运行`main.py`并可视化其结果。\n\n现在，我们准备深入探讨。让我们先从一个基本示例开始。我们向每个进程抛出一百万次简单数学计算的迭代。总共有三个这样的进程。以下代码应该是不言自明的。每个进程被赋予不同的参数，启动然后在主进程上`join`，这简单意味着主进程将等待生成的计算进程完成。让我们将此脚本称为`multiprocessing_basic.py`，如代码片段3.2所示。\n\
    \n```\nfrom multiprocessing import Process\nimport math\n\ndef f(x):\n    for\
    \ _ in range(1_000_000):\n        x = math.sqrt(x) if x > 1.000001 else 2*x\n\
    \    return x * x\n\nif __name__ == '__main__':\n    processes = [Process(target=f,\
    \ args=(x,)) for x in [1.1, 2.1,\n    3.1]]\n    for p in processes:\n       \
    \ p.start()\n    for p in processes:\n        p.join()\n```\n\n代码3.2 基本多进程示例。\n\
    \n使用viztracer分析此代码片段。我们得到以下可视化结果。请注意，根据你的计算机计算能力和物理核心数，实际时间可能会有所不同，进程标识符当然也会不同。\n\
    \n从图3.7中，我们可以清楚地看到有四个进程。我们启动了主进程，它又生成了三个进程。放大主进程和其中一个生成的进程，如图3.8所示。你可以看到每个进程中只有一个线程。右侧显示的图表称为火焰图，但与一般用法相反，它是倒置的。它分解了代码的依赖关系，并在时域中分离运行程序。\n\
    \n接下来，我们放大代码的最小单元，一个`math.sqrt()`函数调用。如图3.9所示，所选调用大约需要20纳秒，这相当快。从火焰图中，你也可以看到这个调用来自代码示例3.2的第7行。请注意，它之前的调用花费了更长的时间，因此并不总是均匀的。为了达到相同的精度，`math.sqrt`的底层实现在C层面可能需要执行更多迭代。这是viztracer无法记录的内容。\n\
    \n![](img/d6c2267970090ab811ee8826699fffd7_62_0.png)\n\n图3.7 来自multiprocessing_basic.py的四个进程。\n\
    \n![](img/d6c2267970090ab811ee8826699fffd7_62_1.png)\n\n图3.8 每个进程只有一个线程。\n\n![](img/d6c2267970090ab811ee8826699fffd7_63_0.png)\n\
    \n![](img/d6c2267970090ab811ee8826699fffd7_63_1.png)\n\n图3.9 *一次math.sqrt调用。*\n\
    \n进程和线程的管理可以通过一个称为*池*的概念系统地完成。池是一个对象，你可以向其提交任务，而无需担心进程和线程的创建和终止。你可以使用*map*方法提交任务并直接检索结果。代码片段3.3是代码片段3.2的池版本。它更短更清晰。\n\
    \n```\npython\nfrom multiprocessing import Pool\nimport math\n\ndef f(x):\n  \
    \  for _ in range(1_000_000):\n        x = math.sqrt(x) if x > 1.000001 else 2*x\n\
    \    return x*x\n\nif __name__ == '__main__':\n    with Pool(3) as p:\n      \
    \  p.map(f, [1.1, 2.1, 3.1])\n```\n\n代码3.3 使用进程池运行任务。\n\n然而，如果你用viztracer分析它，主进程有三个额外的线程。它们是通过使用池模式引入的。图3.10看起来很奇怪，对吧？我们知道GIL阻止多个线程同时运行，但它们看起来像是同时运行的。\n\
    \n这是由于viztracer的一个限制。如果你有兴趣深入了解，Maarten Breddels有一篇很棒的博文²解释了如何结合Linux *perf*和viztracer来解决这个问题。我在其他情况下发现，如果你显式地创建和管理线程，这个问题就消失了。我们将在下一节看到一个例子。\n\
    \n![](img/d6c2267970090ab811ee8826699fffd7_64_0.png)\n\n图3.10 主进程中生成了三个额外的线程。\n\
    \n## pandarallel中的并行Pandas Apply\n\n是时候看看现实世界中的多进程了。明星项目pandarallel³是一个库，它能够对pandas\
    \ DataFrame对象进行并行数据操作。\n\n在Pandas中，你可以使用*apply()*方法操作一列。以下代码片段3.4是一个典型的例子，它创建了一个布尔变量，用于指示DataFrame\
    \ *df*的闰年状态。\n\n```\npython\ndef is_leap_year(year):\n    if year % 400 == 0:\n\
    \        return True\n    elif year % 100 == 0:\n        return False\n    elif\
    \ year % 4 == 0:\n        return True\n    else:\n        return False\n\ndf[\"\
    is_leap\"] = df[\"year\"].apply(is_leap_year)\n```\n\n代码3.4 一个普通的Pandas apply示例。\n\
    \n然而，这个操作是线性完成的。如果DataFrame非常大，可能需要很长时间。pandarallel所做的就是，对于apply方法和类似操作，它用一个并行的、多进程版本覆盖了DataFrame固有的默认方法。\n\
    \n直观地说，这个过程包含三个步骤，可以被视为一种*map-reduce*模式，如图3.11所示。"
