    \ 5.19 The *run()* method consumes tasks from the queue.\n\nAs long as there are\
    \ queries to be completed, the *Connection*, a subclass of *Thread*, will pop\
    \ tasks from the queue and try to run it. If the run is successful, it sets the\
    \ future's result which also automatically marks the future as done, otherwise\
    \ it sets an exception to the future.\n\nThe interesting thing here is the usage\
    \ of the *call_soon_threadsafe()* function. It enforces that the task passed to\
    \ it will run in a thread safe way. In other words, it ensures that the future\
    \ will be set properly.\n\nTo understand why we need to check how this was done\
    \ earlier. Before PR #15 back in 2018, there was a task queue *tx* and a result\
    \ queue *rx*. When the thread grabs a task and runs it, it puts the result back\
    \ into the result queue in the order the task is processed.\n\nRecall that Python\
    \ a *Queue* object is shared between threads. Multiple coroutines can put results\
    \ into it. This causes an issue: how do we make sure that the order of the query\
    \ results agrees with the order of the queries created?\n\nBefore PR #15, the\
    \ *run()* method is unaware of who is waiting for the result. The problem was\
    \ solved in a blunt way: the *execute()* method implements a lock to ensure that\
    \ the execution of a query and the returning of the query from the result queue\
    \ is undisturbed. If there is no result in the result queue, it will just keep\
    \ quickly polling the queue until the task completes. This clearly causes a potential\
    \ performance issue.\n\nTo fix this, the contributor removed the result queue\
    \ and the lock. Instead, let Python itself take care of the thread safety by calling\
    \ standard library functions. This is a beautiful pull request.\n\nHere is a quick\
    \ summary of what we have figured out.\n\n+   1. A real sqlite3 connection is\
    \ wrapped with a *Connection* class instance which inherits a *Thread* object.\n\
