  md: "> Visually, *square _ even[4]* can also be interpreted as an array indexing:\
    \ we want the fifth element in the list *square _ even*. However, *__getitem __()*\
    \ for *Mapping* protocol has a signature of *__getitem __ (self, key)* while *__getitem\
    \ __()* for *Sequence* protocol has a signature of *__getitem __ (self, index)*.\
    \ Clearly, we are sticking to the *Mapping* protocol here.\n\nA *square _ even*\
    \ object behaves *like* a dictionary, but not exactly. For example, it doesn't\
    \ have a *values* attribute, and you can't loop through its members. We cherrypicked\
    \ what we need from the *Mapping* protocol and built our own class.\n\nWell, a\
    \ Python function itself is natively a mapping. Why don't we write a function\
    \ like *square _ even(4)* directly? We surely can. We can implement the *__call\
    \ __* dunder method for the *Transform* class to make an instance behave like\
    \ a function as shown in code snippet 1.21.\n\n```\nclass Transform:\n    # omitted\
    \ for the lack of space\n    def __call__(self, val):\n        if self._filter(val):\n\
    \            return self._transform(val)\n        return ValueError(val)\n```\n\
    \nCODE 1.21 Add *__call __()* method to the *Transform* class.\n\nBy implementing\
    \ the *__call __()* method, we are essentially adhering to the *Callable* protocol.\
    \ Anything can *behave like* a function, if it implements an *__call __()* dunder\
    \ method. Download a copy of the *SymPy* source code, manipulate the *Transform*\
    \ class and give it a try.\n\nAt this moment, we have seen three different approaches\
    \ to do something similar: through attribute accessing, dictionary-like lookup\
    \ or function call. Which should we choose? The answer depends on the context\
    \ and the actual implication of the scenario.\n\nTake the *is _ vip* attribute\
    \ as an obvious example, we can implement a dictionary look-up directly to enable\
    \ syntax like *customer[\"is _ vip\"]*. We can handle the missing key using the\
    \ *__missing __()* dunder method, the fallback resolution counterpart of *__getattr\
    \ __()*, for a dictionary-like data structure. However, it doesn't make sense\
    \ because your colleagues are not supposed to *look for* the VIP status of a customer.\
    \ They know it *must* be there. The look-up syntax creates an illusion that there\
    \ may be some other keys to look up for, which there aren't.\n\nSimilarly, there\
    \ is a justification for the *Transform* example. The *Mapping*-like modeling\
    \ enables a correspondence between mathematical concepts and Python syntaxes.\
    \ For example, in mathematics, we say the domain of a function or transformation\
    \ is the set of all values on which a function is defined. Syntax in code snippet\
    \ 1.22 is Pythonic and easy to understand: it is asking whether the number 3 is\
    \ in the domain of our transformation."
