    \                  body=''' long text that spawns multiple lines\n''',\n     \
    \             published_from=datetime.now())\narticle.save()\n```\n\n**CODE 2.22**\
    \ Create an article instance.\n\nIf you have experience working with ORM (object-relational\
    \ mapping), you probably already recognized that this is very similar to the idea\
    \ of ORM. Instead of using an object to represent a *row*, we use an object to\
    \ represent a *document*, which is Elasticsearch's row.\n\nWe defined the *Article*\
    \ class as a subclass of the *Document* class. The Article class doesn't have\
