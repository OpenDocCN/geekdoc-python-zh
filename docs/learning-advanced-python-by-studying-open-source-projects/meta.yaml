  md: "For non-data descriptors, the instance's `__dict__` has higher priority. In\
    \ another word, Python will prioritize the same-name key in instance's `__dict__`\
    \ before falling back to its class attribute.\n\nLet's add a `__set__()` dunder\
    \ to the *Answer* class to make it a so-called *data descriptor*, also known as\
    \ an *overriding descriptor*, and run the code again as code snippet 2.4.\n\n\
    ```\nclass Answer:\n    def __get__(self, obj, objtype):\n        return 42\n\
    \    def __set__(self, obj, value):\n        obj.answer = value\n\nclass Universe:\n\
    \    answer = Answer()\n\nu = Universe()\nprint(u.answer) # 42\n\n# The following\
    \ line will cause an error:\n\nu.answer = 24 # maximum recursion depth exceeded\n\
    ```\n\nCODE 2.4 Change *Answer* to a data descriptor.\n\nAt the end, we get a\
    \ recursion error. To understand this error, we need to look at the meaning of\
    \ the arguments for the `__get__()` and `__set__()` methods.\n\nTake `__get__()`\
    \ for an example, *self* is the self-reference of the descriptor instance: the\
    \ *answer* variable. The *obj* is the *instance* that the descriptor instance\
    \ is assigned to. The *objtype* is the instance's type. Let's use code snippet\
    \ 2.5 to show this explicitly.\n\n```\n# skipped the rest\n    def __get__(self,\
    \ obj, objtype):\n        print(obj, objtype)\n        return 42\n\nu.answer\n\
    # <__main__.Universe object at 0x7f28856c22e0> <class `__main__.Universe`>\nUniverse.answer\n\
    # None <class `__main__.Universe`>\n```\n\nCODE 2.5 The *obj* and *objtype* passed\
    \ to the `__get__` method.\n\nIf you invoke the descriptor from the class, there\
    \ is no instance associated, so *obj* is None.\n\nWhen we try to assign 24 to\
    \ *u.answer*, the data descriptor's `__set__()` method is invoked, which executes\
    \ *obj.answer=24*. However, *obj* is exactly the *Universe* instance *u*, and\
    \ we are trying to assign to its *answer* attribute."
