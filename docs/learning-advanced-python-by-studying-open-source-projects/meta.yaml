    \n如果你没跟上，这里快速说明一下。我们怎么知道浮点数的`__eq__`方法是错误的？因为`S.false == S(0.0)`给出了正确的答案，即`False`，所以我们知道`S.false.__eq__(S(0.0))`返回了正确的答案。这就是我们知道问题出在浮点数单例对象的`__eq__`实现中的原因。\n\
