    \ kinds of events going on in the restaurants and acts responsively to each event.\n\
    \nA waiter is the center of the message in a restaurant. He is also a *scheduler*\
    \ that decides which goes first, which goes later. If you ever went to a restaurant\
    \ right after the pandemic was over when every restaurant was short staffed, you\
