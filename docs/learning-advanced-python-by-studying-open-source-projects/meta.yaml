    numerically. This makes distance calculation highly unstable, which is widely
    used in many unsupervised machine learning algorithms. We need to *normalize*
    the numerical values. Such a step is often called preprocessing. Then our workflow
    becomes something in Figure 6.2.


    So, we use training data to create a preprocessor and use the same preprocessor
    to pre-process the test data. You may wonder why not use all the data. Isn''t
    it more accurate? Not really. Using test data at any step in the training process,
    including data preprocessing has the risk of *data leaking*. No information from
    the testing data, even the range of the numerical values, should be allowed when
    we build the model.


    Fair enough, but this is not the whole picture. There are other steps that are
    part of the flow chart. For example, cross-validation is a common practice when
    building a model: because machine learning models often have untrainable parameters,
    and we often don''t know which set of parameters is better. Cross-validation allows
    us to evaluate the qualities of different models. It can also help us prevent
    the so-called overfitting.


    Our pipeline becomes the following Figure 6.3.


    Besides entities and processes in this pipeline, there are other entities we need
    to model. Metrics is one of them. We need metrics to measure how good a machine
    learning model is. For example, if the model predicts binary categories, the accuracy
    rate and F1 score are the go-to metrics. The dataset also needs to be modeled.
    We need a *unified* format of data-sets so the digestion of datasets will follow
    a *unified* interface.


    Before moving on, let''s summarize what we try to achieve in our *business*.


    +   1. Data needs to be preprocessed and separated into training sets and test
    sets.

    2. A model needs to be built by something like a *model* factory using the training
    dataset.

    3. Model selection like cross-validation needs to be integrated seamlessly.


    Next, we will design our classes that enable such a *business*.'
