  md: "```\nclass Answer:\n    def __get__(self, obj, objtype):\n        return 42\n\
    ```\n\nCODE 2.1 A simple Python descriptor called *Answer*.\n\nThe *Answer* class\
    \ is a descriptor. To be more specific, it is a non-data descriptor, or a non-overriding\
    \ descriptor. It means that this descriptor will be shadowed by attribute assignment.\
    \ Instead, descriptors implementing `__delete__()` and `__set__()` are called\
    \ data descriptors. They will not be shadowed by attribute assignment after initialization.\
    \ We will see examples very soon.\n\nLet's first check a simple use case of descriptor\
    \ in code snippet 2.2.\n\n```\nclass Answer:\n    def __get__(self, obj, objtype):\n\
    \        return 42\n\nclass Universe:\n    answer = Answer() # comment 1\n\nu\
    \ = Universe()\nprint(u.answer) # 42\nprint(Universe.answer) # 42\n```\n\nCODE\
    \ 2.2 Assign an *Answer* instance to an attribute.\n\n*answer* is a class attribute.\
    \ The instance *u* doesn't have an *answer* attribute, so it falls back to the\
    \ class' attribute.\n\nNext, we overwrite the instance's *answer* attribute in\
    \ code snippet 2.3.\n\n```\nu = Universe()\nprint(u.__dict__) # {}\nu.answer =\
    \ 24\nprint(u.answer) # 24\nprint(u.__dict__) # {'answer': 24}\nprint(Universe.answer)\
    \ # 42\n```\n\nCODE 2.3 Overwriting the *answer* descriptor of the class.\n\n\
    Code snippet 2.3 shows that *Answer* is a *non-data descriptor*: it doesn't *manage*\
    \ data; it just gives back the data.\n\n> A non-data descriptor is a type of descriptor\
    \ that only defines the `__get__()` method, but not the `__set__()` or `__delete__()`\
    \ methods. When an attribute is accessed on an instance of a class that uses a\
    \ non-data descriptor, the `__get__()` method of the descriptor is called, and\
    \ the value returned by the method is used as the attribute value. However, attempts\
    \ to set or delete the attribute will result in an AttributeError."
