    \ may not happen on the Python-level, oftentimes you don’t know that your Python\
    \ code utilizes multiprocessing at C-level if you import a library that is written\
    \ in C, C++ or Fortran. These are not considered multiprocessing in Python in\
    \ this book. Similarly, multithreading in other languages evolved from Python\
    \ are not considered multithreading in Python.\n\nSecond, let me introduce you\
    \ to viztracer,¹ a Python logger, profiler and visualization tool. It supports\
    \ multiprocessing and multithreading Python code and presents the result in an\
    \ informative and pleasing way. Note that viztracer does have some impact on the\
    \ speed of the code. If it skews the code performance, you can run your code without\
    \ it to assess the impact.\n\nIt is very easy to install and use viztracer just\
    \ follow code snippet 3.1. You can start visualizing your code traces in three\
    \ lines. Suppose your `code` is in `main.py` and we use the default output file\
    \ name `result.json`.\n\n```\npip install viztracer\n\nviztracer main.py\n\nvizviewer\
    \ result.json\n```\n\nCODE 3.1 Install and use viztracer to run `main.py` and\
    \ visualize its result.\n\nNow, we are ready to dive in. Let's first start with\
    \ a basic example. We throw a million iterations of simple math computation to\
