    \ asynchronous context manager. The syntax in snippet 5.20 therefore becomes legal.\n\
    \n```python\nasync with aiosqlite.connect(\"movie_async.db\") as db:\n    # do\
    \ stuff\n```\n\nCODE 5.20 Asynchronous context manager for establishing a connection.\n\
    \nThis simple syntax involves a series of delegation.\n\n1. First, the `connect()`\
    \ function returns a `Connection` instance.\n2. The `__aenter__()` is called which\
    \ invokes the `__await__()` method.\n3. In the `__await__()` method, the thread\
    \ starts which further calls the `_connect()` method.\n4. The `_connect()` method,\
    \ as we discussed earlier, creates the task to establish a real connection, and\
    \ returns it to the hands of the user as `db`.\n\nThis concludes our analysis\
    \ of the `Connection` class. How about the `Cursor`?\nIn vanilla sqlite3 code,\
    \ code snippet 5.21 will return an error as a cursor cannot be used as a context\
    \ manager.\n\n```python\nwith sqlite3.connect(\"movie.db\") as con:\n    with\
    \ con.cursor() as cur:\n        # AttributeError: __enter__\n```\n\nCODE 5.21\
