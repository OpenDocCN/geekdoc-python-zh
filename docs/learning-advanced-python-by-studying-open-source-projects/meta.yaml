    献给我的家人，他们的决定成就了我今天的生活。\n献给 Holly 和 Prosper，房间里无尽的欢乐源泉。\n\n## 目录\n\n前言，x\n\n致谢，xi\n\
    \n+   引言\n    本书的目的与范围\n    所采用方法概述\n    注意事项\n\n+   第 1 章 ■ Python 的数据模型\n  \
    \  Python 数据模型简介\n    自定义比较\n    受管理的迭代行为\n    属性、函数还是字典？\n    总结\n    注释\n\n\
    +   第 2 章 ■ Python 类的精选主题\n    引言\n    描述符与属性查找顺序\n    描述符揭秘\n    Matplotlib 中的惰性求值\n\
    \    元类及其在 Elasticsearch DSL 中的用法\n    使用元食谱理解元类\n    使用元类在 Elasticsearch DSL\
    \ 中建模文档\n    总结\n    附录\n    注释\n\n## 第 3 章 ■ Python 中的并发\n\n- 从自顶向下视角看并发\n  \
    \  - 操作系统与并发\n    - 全局解释器锁 (GIL) 简介\n- 用于 CPU 密集型任务的多进程\n    - pandarallel 中的并行\
    \ Pandas Apply\n- 用于 I/O 密集型任务的多线程\n- 总结\n- 注释\n\n## 第 4 章 ■ Python 中的异步编程\n\n\
    - 范式的转变\n- 事件驱动模拟\n- 异步作为一种模式\n- 总结\n- 附录\n- 注释\n\n## 第 5 章 ■ 增强你的 Python 函数\n\
    \n- 引言\n- 用于重试函数的装饰器\n- 上下文管理器简述\n- 深入 aiosqlite 示例\n    - 连接作为执行器和调度器\n    -\
    \ 连接和游标作为异步上下文管理器\n- 总结\n- 注释\n\n## 第 6 章 ■ 精选的面向对象设计最佳实践\n\n- 理解你的业务\n    - 业务概览\n\
    - 使用面向对象对业务实体建模\n    - 设计核心实体\n    - 建立类之间的关系\n    - 通用接口的好处\n    - 有时不用面向对象才是最佳设计\n\
    - 总结 108\n- 注释 108\n\n## 第 7 章 ■ 开心果壳中的测试 109\n\n- 引言 109\n- Fixture 和参数化 109\n\
    \    - 参数化 111\n    - 资源和 Fixture 113\n- 猴子补丁 115\n    - 修改内置 Print 115\n    -\
    \ 更强大的猴子补丁 117\n- 基于属性的测试 118\n- 总结 122\n- 注释 122\n\n索引，123\n\n## 前言\n\n我非常激动和高兴地向您呈现这本书。\n\
    这本书与我之前的两本书有些相似。并非因为它们主题相似，而是因为我在写作时心中始终清晰地想着读者的形象。在我看来，像这样的书早该存在：有大量优秀的开源 Python\
