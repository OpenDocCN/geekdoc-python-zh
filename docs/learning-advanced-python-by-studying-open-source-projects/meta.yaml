  - '[PAGE 10]


    # Preface


    I am very excited and happy to present this book to you.

    This book is somewhat like my previous two books. Not because they share similar
    topics, but because I wrote it with a vivid image of readers in my mind. In my
    opinion, a book like this should have existed long before: there are tons of great
    open source Python projects, and there are a lot of people who find it hard to
    learn advanced Python topics. It is natural to have a book that seamlessly bridges
    the golden resources and the hungry learners. This book is it. When I tried to
    learn from the pros, I did it the hard way by bashing my head and absorbing much-alike
    materials from 20 browser tabs. Looking back, I think there are better ways to
    do it: an educational and instructional way. My experience as an instructor helped
    me a lot in writing this book: I am able to put my feet in the learners’ shoes.

    I am very grateful to the editors at Taylor & Francis who helped me identify and
    confirmed the value of this approach. I hope you find this experimental approach
    educational, accessible and entertaining.'
- md: '# Acknowledgments


    I would like to thank the creators, maintainers and all contributors to the open
    source projects I used as examples in this book. It is unimaginable if those amazing
    resources are not freely accessible to me and to everyone around the globe. The
    open source movement has astronomically impacted not only the software engineering
    but also the advance of technology universally. Thank you, from the bottom of
    my heart.


    # Introduction


    ## PURPOSE AND SCOPE OF THIS BOOK


    *Learning Advanced Python by Studying Open Source Projects* is a book that is
    written for 95% of Python users, covering 95% of their daily use cases.


    What does this mean? From the content perspective, it means that this book is
    not an encyclopedia that covers everything. It covers all the *important* things
    for *most* Python users. Based on my observations and research, the following
    topics are considered important:


    - 1. The Python data model

    - 2. The Python classes

    - 3. Concurrency and asynchronous programming

    - 4. Functions and related tips

    - 5. How to design an OOP system

    - 6. How to test code


    They are important in different ways.


    - 1. The Python data model and Python classes are fundamentally important as they
    are the basics to learn everything else. They are basic but they are not obviously
    easy to master. Many Python users, or most Python users didn''t graduate with
    a computer science master''s degree. They started using Python by copying and
    pasting so long as the code worked. At some point in their learning or career
    path, the lack of foundation will bite. I want to solidify your foundations.

    - 2. The other four topics are deemed as a gap between so-so engineers and more
    professional engineers. I picked these four because they are the ones that I find
    easy to break the cyclic dependencies of the advanced topics. For example, it
    is impossible to talk about concepts like fixture without talking about decorators
    first. It is hard to imagine context manager without talking about the idea of
    coroutine first: well technically you can. I try to chop the open source projects
    that utilize multiple such concepts into digestible pieces. The example of aiosqlite
    is probably the most typical example. Please do read Chapter 5 and let me know
    whether I did an acceptable job.


    The following topics are not considered important enough for most readers.


    - 1. Improve Python performance by writing C or C++

    - 2. Publishing a Python package


    Well, those topics are very important if you are working on fine-tuning Python
    performances: not because of bad code but because of Python itself. For example,
    some high-performance computing work requires such skills, but most Python users
    don’t ever write a line of C in their whole career. Similarly, most people don’t
    publish Python packages as well.


    There are great resources on these two topics. I would recommend the official
    doc for the former and the book *Publishing Python Packages* by Dane Hillard for
    the latter. Honestly speaking, the fact that the second topic is enough for an
    independent book also makes it impractical to be included in this book. The first
    topic is also big enough for an independent book.


    The following topics are indeed important, but they are not really Python specific.


    - 1. Documentation

    - 2. Project management and communication


    The first draft of this book included documentation as an independent chapter.
    Popular Python open source libraries often have fabulous documentation. However,
    the more I wrote about it, the more I feel that they are not *advanced Python*,
    they are skills related to *advanced Programming*. Everyone who wrote code needs
    to know them. It is not suitable to include them in a book about Python.


    Similar ideas apply to project management. Since most open source projects are
    developed for the public, you can read the comments, the interactions and sometimes
    spicy exchanges between developers and users. I personally find this topic super
    interesting while preparing the materials. However, they are, again, not Python
    specific. I have to drop it.


    Let’s discuss the purpose of this book. This book’s purpose is to help moderately
    good Python users to become professional Python users.


    What is a Python user? What is moderately good? What makes a Python user professional?


    A Python user is a superset of a Python developer. When I was a PhD student, I
    used Python a lot. I was not a Python developer. Namely, I wrote Python as a tool
    to do something else, rather than for the sake of writing Python. On the contrary,
    a Python developer’s job is to write high-quality Python applications. However,
    I find Python users’ work often requires very high technical skills. For example,
    a Jupyter Notebook is far from enough for a researcher. The researchers sometimes
    *hack* their way through the development and write terrible code. This book aims
    at the aspirational and ambitious Python users so they can use Python in the most
    efficient way. Of course, developers are welcome.


    So, what is exactly being *moderately* good that qualifies you to read this book?
    If you


    - 1. have day-to-day experience writing Python code to perform tasks like string
    manipulation and tabulated data processing.

    - 2. are familiar with basic object-oriented programming concepts like class,
    instance and inheritance.

    - 3. understand basic operating system concepts like process, thread and memory.

    - 4. are familiar with tools/platforms like Git, GitHub and VS Code.


    Then, you are considered moderately good. Sounds easy, right? What makes a Python
    user professional? This is important as it is what you will gradually learn to
    become while reading this book. A professional user can, not limited to the list
    though, perform the following tasks:


    - 1. read code written by others *efficiently* and *correctly*.

    - 2. write more robust, elegant and well-tested Python code.

    - 3. have a deep understanding of Python’s data model and use it *appropriately*.

    - 4. know how to design an OOP system and turn it into reality.


    I hope this gives a good idea of what topics this book covers, and what kind of
    prerequisites I am expecting the readers to have.


    ## OVERVIEW OF THE APPROACH TAKEN


    One of the biggest features of this book is that it is not written in a textbook
    style. Instead, it is written somewhat like a novel as long as the circumstance
    permits. In a textbook, the author introduces the concepts, then the theorems,
    then the solved examples, followed by exercises. In a novel, a character doesn’t
    get on the stage until it is time for the character. The plot has its own rhythm,
    and characters have natural development paths. In this book, concepts and best
    practices are not introduced until it becomes evident and obvious that they are
    absolutely needed. For example, the idea of mixin is not introduced until we find
    the class relationship in scikit-learn becomes error-prone and unmanageable. This
    is how humans learn. Newton’s laws are not written as a bullet list. They are
    discovered after countless observations, experiments and calculations.


    Here is another more detailed example. You want to write a test that tests whether
    the tested function writes some output to the screen. You are not sure how to
    do it so you Google it. Google returns some links and you click in. Several pages
    mention the idea of monkey patch but the code examples in the StackOverflow links
    are so complex that you can''t use them directly. You try to read the official
    docs and it is so long. You try to search on GitHub but there are decorators on
    top of decorators with weird syntax. You give up. What this book offers is a guidance
    to smoothen the path from the problem to the answer. I will explain why monkey
    patch is introduced in testing, what problems it tries to resolve and how it solves
    it. I have carefully designed the order of the topics in this book so you will
    already have a good grasp of the Python data model before using the, say, *setattr()*
    function doing monkey patching. Then I will show you that the problems you are
    facing also exist in the big-name open source projects. We will study how they
    solve the problems and the solution to your own problem will be self-revealing.
    I do acknowledge that sometimes the order has to be reversed if the example in
    the open source project is too complex to absorb at the beginning. I will provide
    a solution to your problems first then move on to the open source counterparts.
    Again, I am very excited that you picked up this highly experimental book. I hope
    you enjoy it and I look forward to your feedback.


    NOTE


    1 Dane Hillard. Publishing Python Package. Dec 2022. NY: Manning.'
  mdcn: '# 致谢


    我要感谢本书中作为示例使用的开源项目的创建者、维护者和所有贡献者。如果这些优秀的资源不能让我和全球各地的人们自由获取，那是难以想象的。开源运动不仅对软件工程，而且对技术的普遍进步都产生了巨大的影响。衷心感谢你们。


    # 引言


    ## 本书的目的与范围


    *《通过研究开源项目学习高级Python》* 是一本为95%的Python用户编写的书，涵盖了他们95%的日常使用场景。


    这意味着什么？从内容角度来看，这意味着本书并非一本包罗万象的百科全书。它涵盖了对*大多数*Python用户而言*重要*的所有内容。根据我的观察和研究，以下主题被认为是重要的：


    - 1. Python数据模型

    - 2. Python类

    - 3. 并发与异步编程

    - 4. 函数及相关技巧

    - 5. 如何设计面向对象系统

    - 6. 如何测试代码


    它们的重要性体现在不同方面。


    - 1. Python数据模型和Python类是基础性的，因为它们是学习其他一切内容的基础。它们是基础，但显然并不容易掌握。许多Python用户，或者说大多数Python用户，并非计算机科学硕士毕业。他们开始使用Python时，只要代码能运行，就只是复制粘贴。在他们学习或职业生涯的某个阶段，基础的缺乏会带来麻烦。我想巩固你们的基础。

    - 2. 另外四个主题被认为是普通工程师和更专业工程师之间的差距。我选择这四个，是因为我发现它们容易打破高级主题的循环依赖。例如，不先谈论装饰器就不可能谈论像fixture这样的概念。不先谈论协程的概念就很难想象上下文管理器：嗯，技术上你可以。我试图将利用多个此类概念的开源项目分解成易于消化的部分。aiosqlite的例子可能是最典型的例子。请务必阅读第5章，并告诉我我是否做得可以接受。


    以下主题对大多数读者来说不够重要。


    - 1. 通过编写C或C++来提升Python性能

    - 2. 发布Python包


    嗯，如果你在微调Python性能方面工作，这些主题非常重要：不是因为代码不好，而是因为Python本身。例如，一些高性能计算工作需要这些技能，但大多数Python用户在整个职业生涯中从未写过一行C代码。同样，大多数人也不会发布Python包。


    关于这两个主题有很好的资源。对于前者，我推荐官方文档；对于后者，我推荐Dane Hillard的书《发布Python包》。老实说，第二个主题本身就足以成为一本独立的书，这也使得将其包含在本书中不切实际。第一个主题也足够写成一本独立的书。


    以下主题确实重要，但它们并非Python特有。


    - 1. 文档

    - 2. 项目管理与沟通


    本书的第一稿将文档作为独立的一章。流行的Python开源库通常拥有出色的文档。然而，我写得越多，就越觉得它们不是*高级Python*，而是与*高级编程*相关的技能。每个写代码的人都需要了解它们。将它们包含在一本关于Python的书中并不合适。


    类似的想法也适用于项目管理。由于大多数开源项目是为公众开发的，你可以阅读评论、互动，有时甚至是开发者和用户之间激烈的交流。我个人在准备材料时觉得这个话题非常有趣。然而，它们同样不是Python特有的。我不得不放弃它。


    让我们讨论一下本书的目的。本书的目的是帮助中等水平的Python用户成为专业的Python用户。


    什么是Python用户？什么是中等水平？什么使Python用户变得专业？


    Python用户是Python开发者的超集。当我还是博士生时，我经常使用Python。我不是Python开发者。也就是说，我写Python是作为做其他事情的工具，而不是为了写Python本身。相反，Python开发者的工作是编写高质量的Python应用程序。然而，我发现Python用户的工作往往需要非常高的技术技能。例如，对于研究人员来说，Jupyter
    Notebook远远不够。研究人员有时会*黑入*他们的开发过程，写出糟糕的代码。本书面向有抱负和雄心的Python用户，以便他们能以最高效的方式使用Python。当然，也欢迎开发者。


    那么，到底什么是*中等*水平，使你有资格阅读本书呢？如果你


    - 1. 有日常编写Python代码执行任务的经验，如字符串操作和表格数据处理。

    - 2. 熟悉基本的面向对象编程概念，如类、实例和继承。

    - 3. 理解基本的操作系统概念，如进程、线程和内存。

    - 4. 熟悉Git、GitHub和VS Code等工具/平台。


    那么，你就被认为是中等水平。听起来很容易，对吧？什么使Python用户变得专业？这很重要，因为这正是你在阅读本书时将逐渐学习成为的样子。一个专业的用户可以（但不限于列表）执行以下任务：


    - 1. *高效*且*正确*地阅读他人编写的代码。

    - 2. 编写更健壮、优雅且经过充分测试的Python代码。

    - 3. 深入理解Python的数据模型并*恰当地*使用它。

    - 4. 知道如何设计面向对象系统并将其变为现实。


    我希望这能让您对本书涵盖的主题以及我期望读者具备的先决条件有一个清晰的了解。


    ## 所采用方法概述


    本书最大的特点之一是它不是以教科书的风格编写的。相反，在情况允许的情况下，它有点像小说一样编写。在教科书中，作者介绍概念，然后是定理，接着是已解决的例子，最后是练习。在小说中，一个角色只有在该出场时才会登场。情节有其自身的节奏，角色有自然的发展路径。在本书中，概念和最佳实践只有在明显且绝对需要时才会被引入。例如，直到我们发现scikit-learn中的类关系变得容易出错且难以管理时，才引入mixin的概念。这就是人类学习的方式。牛顿定律不是以要点列表的形式写成的。它们是在无数次观察、实验和计算之后被发现的。


    这里还有一个更详细的例子。你想编写一个测试，测试被测函数是否向屏幕输出了一些内容。你不确定如何做，于是去谷歌搜索。谷歌返回了一些链接，你点击进去。几个页面提到了猴子补丁的概念，但StackOverflow链接中的代码示例太复杂，你无法直接使用。你尝试阅读官方文档，但它太长了。你尝试在GitHub上搜索，但装饰器套着装饰器，语法奇怪。你放弃了。本书提供的是从问题到答案的路径指引。我将解释为什么在测试中引入猴子补丁，它试图解决什么问题以及如何解决。我精心设计了本书中主题的顺序，以便在使用，比如说，*setattr()*函数进行猴子补丁之前，你已经对Python数据模型有了很好的掌握。然后我会向你展示你所面临的问题也存在于知名开源项目中。我们将研究他们如何解决问题，而你自己问题的解决方案将不言自明。我承认，如果开源项目中的例子在开始时太复杂难以吸收，有时顺序必须颠倒。我会先提供你的问题的解决方案，然后再转向开源项目中的对应部分。再次，我非常高兴你选择了这本高度实验性的书。我希望你喜欢它，并期待你的反馈。


    注意


    1 Dane Hillard. Publishing Python Package. Dec 2022. NY: Manning.'
