    We have two solutions. One is to write a helper function that compares two customers.
    Every time we need to compare customers, we can pass the function to something
    like the *key* parameter of the *sort()* method. Another solution is to enable
    native support for *Customer* comparison.


    > Which solution is better? The logic of comparison needs to go somewhere in the
    code. The question is where. The canonical way is in the *Customer* class. There
    are two reasons. First, by enabling syntax like *john_smith < richard_dawkins*,
    we aligned our syntax with the Pythonic way of doing comparison. It is much easier
    for your coworkers to integrate the code into their projects. Second, the built-in
    comparison logic is more robust and error-free than a standalone function. When
    you ship your code to someone else, you have a better control over the code unless
    the code users deliberately overwrite the comparison logic in the *Customer* class,
    which is much less likely than them writing another standalone comparison function.


    Let''s pause our concerns for a while to learn from the pros and see how this
    is done in the *SymPy* library. *SymPy* is an open source Python library for symbolic
    computation. It can be used to perform algebraic computations and symbolic differentiation,
    etc. Code snippet 1.9 shows a differentiation example.


    ```

    import sympy as sym

    x = sym.symbols("x")

    print(type(x))

    # <class ''sympy.core.symbol.Symbol''>

    print(sym.diff(x**2+sym.sin(x) + 2*x,x))

    # 2*x + cos(x) + 2

    ```


    CODE 1.9 Use *SymPy* to calculate the derivative of a function.


    In snippet 1.9, we defined a symbol *x* and differentiated the expression *x²
    + sin(x) + 2x*, the result is correct: *2x + cos(x) + 2*.


    Like our cases, customized comparisons are also common in *SymPy*. For example,
    a polynomial''s terms can be arranged in any order, but the polynomial remains
    the same. We would love to enable such mathematical expression comparison.


    In Python, *magic* methods or *dunder* methods like *__lt__* and *__ge__* define
    how comparisons are done. The first stands for *less than*, and the latter stands
    for *greater than or equal to*. Redefining them, in other programming languages,
    is often called *operating overloading*.


    > Dunder is an abbreviation of *double underscore* if you are wondering.


    Back to *SymPy*, instead of studying its implementation, let''s investigate a
    bug to pierce into its core. The developers found a bug that alternating two objects''
    order in comparison'
