    \ self.with_mean:\n            X -= self.mean_\n        if self.with_std:\n  \
    \          X /= self.scale_\n    return X\n```\n\nCODE 6.3 Implementation of standardization.\n\
    \nThe core logic is that if we want to centralize the data around its mean, we\
    \ subtract the mean from everyone. If we want to shrink the values by a scale\
    \ of standard deviation, we divide everyone by the standard deviation.\n\nBesides\
    \ the `transform()` method, transformer classes also implement the `fit_transform()`\
    \ method that combines the fit and transform steps together.\n\nThe interesting\
    \ thing is that there is no such class called `BaseTransformer`. There is only\
