    In this chapter, we will study a well-designed Python library: scikit-learn. scikit-learn
    is a popular machine learning library that makes it super easy for programmers
    to build predictive models and perform data analysis and machine learning. It
    provides a set of tools for machine learning tasks, such as classification, regression,
    clustering and dimensionality reduction. Note that Scikit-learn is not the go-to
    library for deep learning and other neural-network-based tasks, at which PyTorch
    and TensorFlow do a better job.


    # A Quick Overview of *the* Business


    Suppose this year is 2010 and you are thinking of developing a machine learning
    library. You have had enough of MATLAB or other shabby commercial software. How
    would you design the architecture of the library? Earlier we saw that in *aiosqlite*,
    the core classes are *Cursor* and *Connection*. What are our core classes for
    machine learning?


    For readers who are not familiar with machine learning, here is a quick, incomplete
    introduction.


    For *traditional* machine learning tasks, in contrast with deep learning, there
    are two common goals:


    +   1. To find a relationship between the *features* and the *labels*.

    2. Or to find structural characteristics in the unlabeled datasets.


    The former is called supervised machine learning and the latter is called unsupervised
    machine learning.


    An example for supervised machine learning is to create a model to predict the
    chance of having diabetes, given a set of features like eating habits, family
    diabetes history, exercising habits, etc.


    An example of unsupervised machine learning is clustering. For example, there
    are a few movies with descriptions. A clustering algorithm should be able to group
    these movies into several categories.


    The biggest difference between supervised learning and unsupervised learning is
    that supervised learning makes use of ground truth. To learn what features contribute
    to diabetes, we must know whether a person has diabetes or not beforehand. In
    other words, we need to have *labels*. Unsupervised learning aims to discover
    the characteristics of the feature set itself. For example, if two movies’ descriptions
    both include the word “angel” then it may indicate that these two movies are like
    each other. However, we are never *certain* about this association as we don’t
    have access to the ground truth.


    For both types of algorithms, the following steps shown in Figure 6.1 are the
    most basic ones.


    However, in real life, this workflow is too good to be true. For example, most
    training data are not suitable for machine learning algorithms to digest directly.
    Computers don’t understand the word “angel” and we must use numerical values to
    represent them. Some features may be in the magnitude of thousands and others
    may be much smaller'
