    \n```\nfactors = factorizer.prime_factors(n)\n\nassert n == 1 or len(factors)\
    \ > 0\nassert all(isinstance(f, int) for f in factors)\nassert all(f > 1 for f\
    \ in factors)\nassert n == 1 or all(n % factor == 0 for factor in factors)\nassert\
    \ n == 1 or all([factor] == factorizer.prime_\nfactors(factor) for factor in factors)\n\
    assert all(factors[i] <= factors[i + 1] for i in\nrange(len(factors) - 1))\nassert\
    \ n == 1 or n == reduce(lambda x, y: x * y, factors)\n```\n\nCODE 7.18 Use hypothesis\
    \ to test the *prime _ factors*().\n\nhypothesis provides two basic objects called\
    \ *given* and *strategies*. *given* is essentially a decorator that takes a strategy\
    \ as input to generate test samples for the decorated function to use.\n\nThe\
    \ *strategies* module provides a wide range of functions to define the input space\
    \ of the function. In our example above, we use the *integers* strategy and limit\
    \ the lower bound and upper bound of the inputs.\n\nhypothesis library provides\
    \ a wide range of possibilities of strategies, and you can combine them to build\
    \ your own. Code 7.19 is a customized strategy for the demo purpose.\n\n```\n\
    from hypothesis import strategies as st\n\nmy_tuple_strategy = st.builds(\n  \
    \  tuple,\n    st.integers(min_value=0, max_value=100),\n    st.text(min_size=1,\
    \ max_size=10)\n)\n\nmy_list_strategy = st.lists(my_tuple_strategy, min_size=1)\n\
    ```\n\nCODE 7.19 A customized *strategy*.\n\nFirst, we create a strategy that\
    \ binds an integer and a string to a tuple. We also specify the bounds of the\
    \ integers and the length of the string. Then, we build another strategy that\
    \ creates a list of such tuples with a minimal size of 1. Such flexibility makes\
    \ strategy building very powerful for generating test data so we can focus on\
    \ the properties without worrying about the *evil* developer's crafting.\n\nBack\
    \ to the factorization test, disregarding the special case 1, we first test that\
    \ the returned list must contain at least one factor. The factors must all be\
    \ integers greater than 1. The factors must all divide the input. The factors\
    \ must be arranged in an increasing order and their product must match the input."
- md: "The interesting test is that we reuse our tested function to check whether\
    \ each factor is a prime number. If it is a prime number, then we should get a\
    \ list of one member: itself. This is not enough to say that the factor is *in\
    \ fact* a prime number, but it does prove that the `prime_factors()` is self-consistent.\
    \ If you pass a prime number to it, it will always return the prime number itself\
    \ in a list.\n\nWriting a property-based testing usually requires deeper insights\
    \ into the problem you were trying to solve. It can help you find bugs that you\
    \ might not have thought to test for manually, as well as increase the coverage\
    \ of your tests. Property-based testing can also help you identify edge cases\
    \ and boundary conditions that your code may not handle properly.\n\nHowever,\
    \ property-based testing is not always fancy. There are low-hanging, property-based\
    \ tests like a there-and-back test. If you are writing something that converts\
    \ A to B, then converting it back from B should give A back exactly. This is a\
    \ very common test that you can find in libraries like `xarray`.\n\n`xarray` is\
    \ a Python library that provides a way to work with labeled multi-dimensional\
    \ arrays and labeled multi-dimensional datasets. It is built on top of numpy.\
    \ A natural task is to convert an xarray object to a pandas DataFrame. The `test_pandas_roundtrip.py`\
    \ file does the job exactly.\n\nFor example, the test in snippet 7.20 converts\
    \ a dataset with 1d variables to a pandas DataFrame and then converts it back.\
    \ The roundtripped result must be exactly the same as the original one.\n\n```\n\
    @given(datasets_1d_vars())\ndef test_roundtrip_dataset(dataset) -> None:\n   \
    \ df = dataset.to_dataframe()\n    assert isinstance(df, pd.DataFrame)\n    roundtripped\
    \ = xr.Dataset(df)\n    xr.testing.assert_identical(dataset, roundtripped)\n```\n\
    \nCODE 7.20 pandas DataFrame round trip test.\n\nHere, `datasets_1d_vars()` is\
    \ a customized strategy. It is defined as in snippet 7.21. The creation of an\
    \ xarray object is like a pandas DataFrame: we specify an index and a dictionary\
    \ object that determines the *column* name and values.\n\n```\n@st.composite\n\
    def datasets_1d_vars(draw) -> xr.Dataset:\n    idx = draw(pdst.indexes(dtype=\"\
    u8\", min_size=0, max_size=100))\n\n    vars_strategy = st.dictionaries(\n   \
    \     keys=st.text(),\n        values=npst.arrays(dtype=numeric_dtypes, shape=len(idx)).map(\n\
    \            partial(xr.Variable, (\"rows\",))\n        ),\n        min_size=1,\n\
    \        max_size=3,\n    )\n    return xr.Dataset(draw(vars_strategy), coords={\"\
    rows\": idx})\n```\n\nCODE 7.21 Creation of a 1-d xarray dataset.\n\nThe *strategies.composite*\
    \ is another decorator that provides more powerful strategy building. You can\
    \ use the *draw* function to draw values from other strategies within the composite\
    \ strategy. In this example, the *pdst* variable is a strategy that stands for\
    \ *hypothesis.extra.pandas*. It is like an *extension module* from the hypothesis\
    \ library that allows you to generate data for some common data types.\n\n## SUMMARY\n\
    \nIn summary, fixture, parameterization, monkey patch, and property-based testing\
    \ are essential techniques in Python testing. Fixtures provide a way to share\
    \ code between tests, while parameterization allows for testing of multiple inputs\
    \ with a single test function. Monkey patching is useful for modifying objects\
    \ and attributes during testing, while property-based testing uses generated input\
    \ to ensure that code behaves correctly under a wide range of scenarios. These\
    \ techniques improve testing efficiency and coverage, allowing for more robust\
    \ and reliable code.\n\n## NOTES\n\n- https://github.com/psf/requests/blob/main/tests/test_requests.py#L94\n\
    - https://github.com/omnilib/aiosqlite/blob/main/aiosqlite/tests/smoke.py\n- https://github.com/pallets/flask\n\
