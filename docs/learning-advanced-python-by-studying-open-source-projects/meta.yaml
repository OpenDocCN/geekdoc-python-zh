    CODE 4.13 Use `concurrent.future` to run tasks in a thread pool.


    We create a list of futures called *futures*. When we submit the jobs to the executor,
    we get a future back, whose status we can check. Then in the main thread, we periodically
    check its status every 0.5 second. When all futures are *done*, we stop checking.


    Note that a significant difference between a coroutine and a future, who are both
    awaitables, is that a future will be executed whatsoever, but a coroutine will
    only run if we *await* for it. In the code above, we simply submitted the jobs
    to the pool without using the *await* keyword. A coroutine, however, must follow
    the *await* keyword.


    This is a very typical case in real life too: an impatient customer keeps asking
    when his food is ready.


    Let''s check the viztracer flame graph Figure 4.4.


    Imagine that we have both I/O-bound tasks and CPU-bound tasks, we can submit the
    I/O-bound tasks to the thread executor pool and the CPU-bound tasks to the process
    executor pool. The advantage is that you can have a unified way to handle those
    futures.


