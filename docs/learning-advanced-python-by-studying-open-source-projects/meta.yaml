  md: "# METACLASS AND ITS USAGE IN ELASTICSEARCH DSL\n\nIn this section, we will\
    \ dive into metaclasses, from the very basics. We will also take Elasticsearch\
    \ domain-specific language (DSL) as an example to examine its usage in this open\
    \ source project.\n\n# Understanding Metaclass Using Meta-Recipe\n\nWhat is a\
    \ metaclass in Python? A metaclass is a class that can create classes. As we discussed\
    \ in Chapter 2, everything in Python is an object. To create an instance, we call\
    \ the corresponding class. We can customize the creation of the instance by initializing\
    \ it with different arguments. We can do some logic checking in the `__init__()`\
    \ method to ensure everything is good.\n\nSimilarly, sometimes we want code users\
    \ to create their own *classes*, so they can create their own instances. We want\
    \ to do *something* about their classes before they are used to create instances.\
    \ For example, those classes need to be either *validated*, *enchanted* or *transformed*.\
    \ This is where metaclass shines.\n\nFor most scenarios, we provide classes for\
    \ other developers to use rather than allow them to build *enchanted* classes.\
    \ This is why metaclass is often only *legitimately* used in libraries that allow\
    \ users to build tools to achieve their own customized tasks. For other occasions,\
    \ I think 99% of the time, you can achieve the same effect without using metaclass.\n\
    \nHere is a scenario.\nYou are the *head* of the kitchens of a big hotel. You\
    \ don't cook, instead you manage the cooks and the operation of the kitchens.\n\
    \nOther cooks continuously create new recipes to satisfy guests' endless appetite.\
    \ Every day, each meal is cooked according to its recipe for hundreds of times.\
    \ You want to ensure that the foods are always safe and healthy.\n\nAccording\
    \ to the scenario, we have the corresponding relationship as shown in Figure 2.3.\n\
    \nLet's pay attention to the right two columns. A recipe is a template for creating\
    \ foods. Their relationship is just like classes and instances. You as the head\
    \ of kitchen need to own something called *Meta Recipe* to manage the creation\
    \ of all possible recipes. In Python, this position in the hierarchy is reserved\
    \ for metaclass.\n\nTo make this example more specific, let's say you want to\
    \ make sure that all recipe ingredients don't contain eel. This is just a random\
    \ example. I personally love eel a lot.\n\nThe code is presented in code snippet\
    \ 2.13.\n\n```\nclass RecipeMeta(type):\n    @classmethod\n    def _ingredient_check(cls,\
    \ ingredients:list):\n        if 'eel' in ingredients:\n            return False\n\
    \        return True\n```"
