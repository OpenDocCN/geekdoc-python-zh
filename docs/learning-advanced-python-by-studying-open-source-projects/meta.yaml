    \ indicate that something had gone wrong.\n\nHere we also see a new class method\
    \ *setUpClass()*. It only runs once for all the test methods under a test class.\
    \ Its effect will last for the whole life cycle of the class, rather than specific\
    \ methods. Here it sets up a logger which makes sense.\n\n# MONKEY PATCH\n\nNow,\
    \ we have ensured that our *prime_factors()* works properly. Let’s say you want\
    \ to use this code in educational software. It needs to print out the result on\
    \ the screen so students can see the results. Of course, in real life there should\
    \ be an API that handles all outputs, etc. The idea here is that you want to access\
    \ the *print()* function in a test environment to ensure it works properly. If\
    \ you are testing on a virtual machine without a screen, how should you test it?\n\
    \nThis is a typical situation with huge implications: some resources are just\
    \ not accessible or too expensive to test. Examples include running a test against\
    \ some external APIs and they are rate-limited or expensive, or testing some plotting\
    \ libraries to ensure certain behaviors without a human checking.\n\nWe need monkey\
    \ patching. In Python, monkey patching refers to the process of dynamically modifying\
    \ a class or module at runtime, by replacing attributes or methods with new implementations.\
    \ This technique can be used to modify the behavior of existing code without changing\
    \ the source code.\n\nMonkey patching is *dangerous* and should be avoided in\
    \ production code. It often implies bad object-oriented programming designs, misaligned\
    \ code versioning or lack of maintenance, etc. However, monkey patching is also\
    \ a powerful technique that can be used for testing and debugging.\n\nModify the\
    \ Built-in Print\n\nLet’s dynamically modify the *print()* function’s behavior.\
    \ Let’s redirect the normal system standard output to a variable.\n\nFirst, we\
