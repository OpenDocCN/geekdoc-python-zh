  md: "```\n# {'is_vip': True}\n```\n\nCODE 1.17 Check a class' `__dict__` attribute.\n\
    \nIt looks like the attribute retrieval is merely a `get()` call on the `__dict__`\
    \ attribute.\n\nShall we manipulate the instance's attribute dictionary directly\
    \ whenever an attribute is not found? Say you want to make room for flexibility.\
