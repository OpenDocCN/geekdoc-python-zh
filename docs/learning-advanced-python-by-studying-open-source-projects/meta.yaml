    \             fut.set_exception(e)\n            get_loop(future).call_soon_threadsafe(set_exception,\n\
    \                future, e)\n```\n\nCODE 5.19 The *run()* method consumes tasks\
    \ from the queue.\n\nAs long as there are queries to be completed, the *Connection*,\
    \ a subclass of *Thread*, will pop tasks from the queue and try to run it. If\
    \ the run is successful, it sets the future's result which also automatically\
