    \ contextlib contextmanager as we didn't import it. Sometimes it gets overwritten\
    \ (code snippet 5.25).\n\n```python\ndef contextmanager(\n    method: Callable[...,\
    \ Coroutine[Any, Any, _T]]\n) -> Callable[..., Result[_T]]:\n    @wraps(method)\n\
    \    def wrapper(self, *args, **kwargs) -> Result[_T]:\n        return Result(method(self,\
    \ *args, **kwargs))\n\n    return wrapper\n```\n\nCODE 5.25 Definition of `@contextmanager`.\n\
    \nThe contextmanager function takes a callable called *method* and returns another\
