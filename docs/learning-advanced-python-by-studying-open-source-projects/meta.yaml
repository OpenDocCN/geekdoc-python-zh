    \ 20 个浏览器标签页中吸收大量相似的材料。回想起来，我认为有更好的方法：一种具有教育性和指导性的方式。我作为讲师的经验在撰写本书时给了我很大帮助：我能够设身处地为学习者着想。\n\
    我非常感谢泰勒-弗朗西斯出版社的编辑们，他们帮助我识别并确认了这种方法的价值。我希望您能发现这种实验性的方法具有教育意义、易于理解且充满乐趣。"
