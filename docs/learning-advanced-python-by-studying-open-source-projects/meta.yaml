- md: "## SUMMARY\n\nIn this chapter, we covered the pattern shifting from thinking\
    \ in the time dimension to thinking in the event dimension. We used a chess game\
    \ as an example to demonstrate the paradigm shift. Then we peeked into an event-driven\
    \ simulation library to understand how the scheduling works. Asyncio creates an\
    \ event loop to schedule the coroutines. We also emphasized that asynchronous\
    \ doesn't necessarily work on only one thread, but merely a pattern.\n\nAlthough\
    \ we covered examples how you can submit normal tasks to *concurrent.futures*\
    \ executors so they return awaitable futures. However, we deliberately skipped\
    \ the example of turning some synchronous operations natively asynchronous. Let's\
    \ cover this big project in our next chapter.\n\n## APPENDIX\n\nFor developers\
    \ who know how code runs at a lower level, I think it is time to shed some light\
    \ on how single-thread asynchronous programming is implemented at a lower level.\
    \ In procedural programming, each thread maintains one call *stack*: an ordered\
    \ pile of frames. For simplicity, we can think of frames as cards that contain\
    \ instructions or data. Each time the CPU picks up one card and does exactly what\
    \ the card tells it to do. When a program starts, the stack is initialized as\
    \ an empty list, the instructions are pushed into the stack in a last in, first\
    \ out (LIFO) pattern. If you call a function *first_function()* which calls another\
    \ *second_function()* in the code, the *second_function()* will be on top of the\
    \ *first_function()* and therefore gets executed first so it can handle some results\
    \ to the *first_function()*. This abstraction is called the stack machine.\n\n\
    Figure 4.5 is a simplification of how the stack machine works. The CPU uses an\
    \ instruction pointer to track what the program is executing. When a new function\
    \ is called, it is pushed to the top of the stack. After it finishes, it pops\
    \ out of the stack. this process continues until the *main* function returns.\n\
    \nIn a one-stack scenario, it is impossible to jump executions between different\
    \ tasks as the instruction pointer is only tracking at the top of the stack. We\
    \ can't pile unfinished work on top of unfinished work. As you may guess, different\
    \ coroutines maintain separate stacks, or to differentiate from normal stacks,\
    \ coroutine stacks.\n\nIn Figure 4.6, we have three coroutines that each does\
    \ different tasks. When one coroutine yields the CPU to the scheduler, its *own*\
    \ instruction pointer remembers where it is pointing to. Next time when the event\
    \ loop picks it up, it can recover from exactly where it left.\n\nThe idea is\
    \ quite like the context switch between different processes. Different from context\
    \ switch, each coroutine determines when it yields the CPU cooperatively, as we\
    \ have emphasized many times.\n\n## NOTES\n\n- 1. https://github.com/MagicStack/uvloop\n\
    - 2. https://www.youtube.com/watch?v=Y4Gt3Xjd7G8\n- 3. https://simpy.readthedocs.io/en/latest/\n\
    - 4. https://gitlab.com/team-simpy/simpy/-/blob/master/src/simpy/core.py\n- 5.\
    \ https://gitlab.com/team-simpy/simpy/-/blob/master/src/simpy/events.py\n- 6.\
    \ https://martinfowler.com/articles/injection.html\n- 7. https://github.com/omnilib/aiosqlite\n\
    \n## Power Up Your Python Functions\n\n### INTRODUCTION\n\nThis chapter’s title\
    \ is Power Up Your Python Functions. This is not a chapter about pure functional\
    \ programming, and Python is not a pure functional programming language. However,\
    \ Python assimilated a lot of great stuff from functional programming in its development.\
    \ When writing Python codes, it is possible to combine the best from different\
    \ paradigms like object-oriented programming, procedural programming and functional\
    \ programming. Don’t be a fundamentalist, be Pythonic.\n\nLet’s find out how to\
    \ 10X Python functions.\n\n### THE DECORATOR FOR RETRYING A FUNCTION\n\nSuppose\
    \ we are writing an application that talks to an external service. Your application\
    \ talks to more than 20 API endpoints managed by the service. However, the external\
    \ service is known to have several issues. Some API endpoints are unstable that\
    \ 40% of the time the request will fail even if you did nothing wrong. The API\
    \ endpoints are also rate limited so that you can’t exceed a request frequency\
    \ like once every second.\n\nIn general, you want to retry the requests in a controlled\
    \ fashion. The plain Python implementation will look like code snippet 5.1.\n\n\
    ```python\nimport time\nfrom random import random\nTIME_DELTA = 1\nIS_SUCCESS\
    \ = False\n\ndef post_to_endpoint():\n    return random() < 0.6\n```"
  mdcn: "## 总结\n\n本章我们探讨了从时间维度思维转向事件维度思维的模式。我们以棋局为例展示了这种范式转变。随后，我们窥探了一个事件驱动模拟库，以理解其调度机制。Asyncio\
    \ 通过创建事件循环来调度协程。我们还强调了异步编程不一定仅限于单线程，它只是一种模式。\n\n虽然我们介绍了如何将普通任务提交到 *concurrent.futures*\
    \ 执行器，使其返回可等待的 future 对象。然而，我们刻意跳过了将某些同步操作原生转换为异步操作的示例。让我们在下一章中探讨这个大型项目。\n\n##\
    \ 附录\n\n对于了解代码底层运行机制的开发者，我认为是时候揭示单线程异步编程在底层是如何实现的了。在过程式编程中，每个线程维护一个调用*栈*：一个有序的帧堆栈。为简化起见，我们可以将帧视为包含指令或数据的卡片。每次\
    \ CPU 取出一张卡片，并严格按照卡片指示执行操作。当程序启动时，栈被初始化为空列表，指令按照后进先出（LIFO）的模式压入栈中。如果你在代码中调用一个函数\
    \ *first_function()*，而该函数又调用了另一个 *second_function()*，那么 *second_function()* 将位于\
    \ *first_function()* 之上，因此会先执行，以便将某些结果传递给 *first_function()*。这种抽象被称为栈机。\n\n图 4.5\
    \ 简化展示了栈机的工作原理。CPU 使用指令指针来跟踪程序当前执行的位置。当调用一个新函数时，它会被压入栈顶。执行完毕后，它会从栈中弹出。这个过程持续进行，直到\
    \ *main* 函数返回。\n\n在单栈场景下，由于指令指针仅跟踪栈顶，不可能在不同任务之间跳转执行。我们不能将未完成的工作堆叠在未完成的工作之上。正如你可能猜测的那样，不同的协程维护着独立的栈，或者为了与普通栈区分，称为协程栈。\n\
    \n在图 4.6 中，我们有三个协程，每个协程执行不同的任务。当一个协程将 CPU 让出给调度器时，它*自己的*指令指针会记住当前指向的位置。下次事件循环再次调度它时，它可以从上次中断的地方精确恢复。\n\
    \n这个想法与不同进程之间的上下文切换非常相似。与上下文切换不同的是，每个协程是协作式地决定何时让出 CPU，正如我们多次强调的那样。\n\n## 注释\n\
    \n- 1. https://github.com/MagicStack/uvloop\n- 2. https://www.youtube.com/watch?v=Y4Gt3Xjd7G8\n\
    - 3. https://simpy.readthedocs.io/en/latest/\n- 4. https://gitlab.com/team-simpy/simpy/-/blob/master/src/simpy/core.py\n\
    - 5. https://gitlab.com/team-simpy/simpy/-/blob/master/src/simpy/events.py\n-\
    \ 6. https://martinfowler.com/articles/injection.html\n- 7. https://github.com/omnilib/aiosqlite\n\
    \n## 强化你的 Python 函数\n\n### 引言\n\n本章的标题是“强化你的 Python 函数”。这不是一章关于纯函数式编程的内容，Python\
    \ 也不是一门纯函数式编程语言。然而，Python 在其发展过程中吸收了函数式编程的许多优秀特性。编写 Python 代码时，可以结合面向对象编程、过程式编程和函数式编程等不同范式的优点。不要成为教条主义者，要\
    \ Pythonic。\n\n让我们探索如何让 Python 函数效能提升 10 倍。\n\n### 用于重试函数的装饰器\n\n假设我们正在编写一个与外部服务通信的应用程序。你的应用程序需要与该服务管理的\
    \ 20 多个 API 端点进行交互。然而，该外部服务已知存在一些问题。某些 API 端点不稳定，即使你没有做错任何事，也有 40% 的时间请求会失败。这些\
    \ API 端点还有速率限制，因此你不能超过像每秒一次这样的请求频率。\n\n通常，你希望以受控的方式重试请求。纯 Python 的实现看起来会像代码片段\
    \ 5.1。\n\n```python\nimport time\nfrom random import random\nTIME_DELTA = 1\n\
    IS_SUCCESS = False\n\ndef post_to_endpoint():\n    return random() < 0.6\n```"
