    \ look at the last core entity: predictors.\n\nA `predictor` class is an estimator\
    \ with prediction capacity. It has the `predict()` and `score()` methods. The\
    \ former takes the test X and predicts the labels for them. Even for unsupervised\
    \ machine learning algorithms like K means, whose `predict()` will produce the\
    \ unordered cluster label as an integer index.\n\nThe `score()` method produces\
    \ a numerical score that measures how good the prediction is. For classification\
    \ problems, it quantifies the discrepancy between the predicted labels and the\
