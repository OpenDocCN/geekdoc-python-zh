  md: "By default, SymPy will try to run the simulation in a virtual time as fast\
    \ as possible. However, using the *RealtimeEnvironment* slows down the simulation\
    \ to wall-time.\n\nThe SymPy library gives us a good taste how asynchronous events\
    \ dispatching is performed. If you dive into the core.py⁴ code, The environment\
    \ has a method called *run()* which calls the *step()* method until the end of\
    \ the simulation. What does the *step()* do? It essentially picks up the next\
    \ event from a heap object, ordered by the event time. Take a look at its implementation\
    \ in snippet 4.9.\n\n```\ndef step(self) -> None:\n    \"\"\"Process the next\
    \ event.\n    \"\"\"\n    try:\n        self._now, _, _, event = heappop(self._queue)\n\
    \    except IndexError:\n        raise EmptySchedule()\n    # skipped\n```\n\n\
    CODE 4.9 *Step()* function pops an event out of the heap.\n\nWell, how does the\
    \ event loop, essentially the environment, know when and what the next event is?\
    \ The Environment class has a *schedule* method that does exactly this as shown\
    \ in snippet 4.10. It pushes an event that will happen in the future to the heap.\
    \ Without specification, all events have a *NORMAL* priority.\n\n```\ndef schedule(\n\
    \    self,\n    event: Event,\n    priority: EventPriority = NORMAL,\n    delay:\
    \ SimTime = 0,\n) -> None:\n    \"\"\"Schedule an *event* with a given *priority*\
    \ and a\n    *delay*.\"\"\"\n    heappush(self._queue,\n             (self._now\
    \ + delay, priority, next(self._eid),\n              event))\n    # skip\n```\n\
    \nCODE 4.10 *schedule()* function pushes an event to the heap.\n\nThe heap data\
    \ structure has a unique property that the first item *self. _ queue[0]* is always\
    \ the smallest one. In this case, the earliest event. By maintaining this heap\
    \ structure, our environment always knows what the next event to simulate is.\n\
    \nWhen an event instance is initialized, an environment instance is passed to\
    \ it. Therefore, an event can schedule itself by calling the environment instance's\
    \ *schedule* method. There are plenty of examples in the events.py⁵ source code\
    \ which manage statuses and lifecycle of an event. This is a design pattern called\
    \ dependency injection⁶: it"
