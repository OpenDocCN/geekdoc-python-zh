    worker_index, worker_status, payload = message\n```\n\nCODE 3.12 Master process\
    \ reads from the shared queue.\n\nYou may wonder, why is this piece of information\
    \ needed? The reason is that although each worker process runs rather independently,\
    \ pandarallel maintains a progress bar chart that shows how much work has been\
    \ done for each process. It needs information from all processes. On Jupyter notebook,\
    \ it is like Figure 3.13.\n\nYou can enable the progress bar when initializing\
    \ pandarallel. Each progress bar is updated by the logic in snippet 3.13:\n\n\
    ```\n# initialization of the progress bar\npandarallel.initialize(progress_bar\
    \ = True)\n\n# update of the progress bar\n\nif worker_status == WorkerStatus.Success:\n\
    \    progresses[worker_index] = progresses_length[worker_index]\n    progress_bars.update(progresses)\n\
    elif worker_status == WorkerStatus.Running:\n    progress = cast(int, payload)\n\
    \    progresses[worker_index] = progress\n\n    if next(generation) % nb_workers\
