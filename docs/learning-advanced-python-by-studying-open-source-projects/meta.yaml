    # # The Data Model of Python


    A GENTLE INTRODUCTION TO PYTHON''S DATA MODEL


    Have you wondered what makes a Python *dict* a dictionary, and what makes a Python
    *list* a list? In Python, you can perform different kinds of operations on different
    kinds of data structures. Take a *list*, for example, you can append a member
    to a list, *extend* one list with another one and *index* it with integers. Let''s
    build a list of cars with code snippet 1.1.


    ```

    cars = list()

    cars.append(''bmw'')

    cars.extend([''audi'', ''toyota''])

    assert cars[0] == ''bmw''

    last_car = cars.pop()

    assert last_car == ''toyota''

    assert len(cars) == 2

    ```


    CODE 1.1 Operations on a Python list object.¹


    For a dictionary, you can perform a different set of operations as shown in code
    snippet 1.2. You can *get* a member of the dictionary. Note that both *list* and
    *dict* support the *len()* method.


    ```

    fruit_prices = dict()

    fruit_prices[''apple''] = 0.5

    fruit_prices[''orange''] = 0.25

    assert len(fruit_prices) == 2

    assert fruit_prices.get(''pear'') == None

    ```


    CODE 1.2 Operations with a Python *dict* object.


    What makes lists and dictionaries behave in different ways? What if we want to
    modify their behaviors and create a hybrid data structure to suit our needs? This
    will be the main topic of this chapter: the data model² for built-in Python data
    types.'
