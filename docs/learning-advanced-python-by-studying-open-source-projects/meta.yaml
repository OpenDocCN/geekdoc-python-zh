    FIGURE 4.6 Multiple stack scenario.


    pushed to the top of the stack. After it finishes, it pops out of the stack. This
    process continues until the *main* function returns.


    In a one-stack scenario, it is impossible to jump executions between different
    tasks as the instruction pointer is only tracking at the top of the stack. We
    can''t pile unfinished work on top of unfinished work. As you may guess, different
    coroutines maintain separate stacks, or to differentiate from normal stacks, coroutine
    stacks.


    In Figure 4.6, we have three coroutines that each does different tasks. When one
    coroutine yields the CPU to the scheduler, its *own* instruction pointer remembers
    where it is pointing to. Next time when the event loop picks it up, it can recover
    from exactly where it left.


    The idea is quite like the context switch between different processes. Different
    from context switch, each coroutine determines when it yields the CPU cooperatively,
    as we have emphasized many times.


