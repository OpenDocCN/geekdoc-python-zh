  md: '# CHAPTER 2

    Selected Topics of Python Classes


    # INTRODUCTION


    I choose these two topics because they are often deemed as solutions that you
    will be looking for problems to apply on. However, normal Python users don''t
    use them often.

    In fact, a lot of Python built-in behaviors and functionalities from standard
    library are implemented using the descriptor protocol. The famous web framework
    Django uses metaclass to customize model classes. We will look at another example
    other than Django though, as every talk on metaclasses already used it.

    This chapter is going to be fun. Let''s dive in.


    # DESCRIPTORS AND ATTRIBUTE LOOKUP ORDER


    First thing first, from previous chapter, we have two cliffhangers: descriptor
    and attribute lookup order. In fact, it is impossible to talk about attribute
    lookup order without introducing descriptor, as attributes managed by descriptors
    are kind of special.


    # Descriptor Demystified


    A descriptor is just a class that implements *at least* one of the following three
    dunder methods. Sorry that I am introducing the concepts first, but I promise
    it is going to be smooth and easy.


    +   1. `__get__(self, obj, type=None) -> value`

    2. `__set__(self, obj, value) -> None`

    3. `__delete__(self, obj) -> None`


    That''s it. Let''s define a descriptor in code snippet 2.1.'
