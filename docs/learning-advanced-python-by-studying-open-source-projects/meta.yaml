    \ is not a context manager. However, the aiosqlite allows syntax in snippet 5.22\
    \ which indicates that cursor itself is an asynchronous context manager.\n\n```python\n\
    async with aiosqlite.connect(\"movie.db\") as db:\n    async with db.cursor()\
