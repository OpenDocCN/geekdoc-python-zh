    \ rather than instance creation. In real life, it corresponds to the process that\
    \ you, as the head of kitchen, review a recipe proposal and you reject it. You\
    \ don't need to see an *actual* plate of smoked eel to reject it. Let's take a\
    \ close look at the *RecipeMeta*. It is extending *type* which indicates that\
    \ it is a metaclass. In Python, all metaclasses are children of *type*. The magic\
    \ happens"
  - "[PAGE 44]\n\nin the __new__() dunder method. The __new__() method of a class\
    \ *creates* its instance and returns it to __init__() to initialize it. In the\
    \ metaclass case, the metaclass' __new__() method creates the class.\n\nTo understand\
    \ what the arguments mean, let's check a normal class example first. The __new__()\
    \ method exists for every class, not only metaclasses. This class extends the\
    \ *dict* built-in class and adds an underscore to every key. Check it out in code\
    \ snippet 2.14.\n\n```\nclass UnderScoreDict(dict):\n    def __new__(cls, d):\n\
    \        return {\"_\" + str(k):v for k,v in d.items()}\n\nUnderScoreDict({\"\
    a\":1, \"b\":2}) # {'_a': 1, '_b': 2}\n```\n\nCODE 2.14 Adding an underscore to\
    \ each key of a dictionary.\n\nFirst, the __new__() method doesn't necessarily\
    \ call its parent's methods. Instead, the only requirement is for it to return\
    \ something, ideally the instance, for initialization in the downstream. Here,\
    \ I just create the manipulated dictionary directly.\n\nSecond, can we achieve\
    \ the same thing with __init__()? The answer is Yes as shown in code snippet 2.15.\n\
    \n```\nclass UnderScoreDict(dict):\n    def __init__(self, d):\n        for k,v\
    \ in d.items():\n            self[\"_\" + str(k)] = v\n```\n\nCODE 2.15 Achieve\
    \ the same effect without using metaclass.\n\nThe default __new__() method returns\
    \ an empty dictionary to the __init__() method to initialize, and __init__() assigns\
    \ the key-value pairs one by one.\n\nIn practice, there are situations where only\
    \ __new__() can resolve. For example, you want to make sure there is only one\
    \ instance in your program: the singleton design pattern, which you already saw\
    \ in Chapter 2. Code snippet 2.16 creates a singleton.\n\n```\nclass Singleton:\n\
    \    _instance = None\n    def __new__(cls, *args, **kwargs):\n        if not\
    \ cls._instance:\n            cls._instance = object.__new__(cls, *args, **kwargs)\n\
    \        return cls._instance\n```\n\nCODE 2.16 A *singleton* class always returns\
    \ the same entity.\n\nIn this example, the class *Singleton* maintains a class\
    \ variable _instance. Every time a new instance is created, the __new__() method\
    \ checks whether this is the first time such an instance is created. If yes, create\
    \ the instance, track it with the _instance variable, then return it. If not,\
    \ just return the instance created earlier."
  - "[PAGE 45]\n\nTABLE 2.1 Arguments of Metaclass' `__new__()` method\n\n| Argument\
    \ Name | Meaning | Value |\n| :--- | :--- | :--- |\n| cls | the metaclass | <class\
    \ `__main__.RecipeMeta`> |\n| class_name | the name of the created class | ChickenStew\
    \ |\n| bases | the parents of the created class | () |\n| attrs | attribute dictionary\
    \ of the created class | {'__module__': '__main__', '__qualname__': 'ChickenStew',\
    \ 'ingredients': ('chicken',)} |\n\nThis is not achievable with `__init__()` as\
    \ it is not in charge of instance creation. In fact, `__new__()` can do everything\
    \ that `__init__()` can do, but not vice versa. Well, using `__init__()` allows\
    \ users to focus on the business logic, as the majority of the time users don't\
    \ care about the creation of the instance.\n\nNow, move on to the metaclass cases.\
    \ Our example is a little different as we are customizing the creation of a class.\
    \ The `__new__()` method takes four arguments, which I lay out in a table (Table\
    \ 2.1).\n\nIf you inherit the *ChickenStew* class to create something like *SpanishChickenStew*,\
    \ then *ChickenStew* should appear in the *bases*. There is a pitfall here which\
    \ we will discuss very soon.\n\nThe argument *class_name* is a string. What we\
    \ get out of the metaclass calling is a class. Who does the magic? It is the `type(class_name,\
    \ bases, attrs)` that is responsible for such construction.\n\n`type()` can take\
    \ either 1 or 3 arguments. The common one-argument usage returns the type of an\
    \ object. However, when feeding 3 arguments, it can create arbitrary classes.\
    \ Code snippet 2.17 provides an example.\n\n```\nclass_name = \"Duck\"\nquack\
    \ = lambda x: \"Quack\"\nclass Bird:\n    pass\n\nDuck = type(class_name, (Bird,),\
    \ {'quack': quack})\n\nduck = Duck()\nprint(duck.quack()) # Quack\nduck.__class__.mro()\
    \ # [__main__.Duck, __main__.Bird, object]\n```\n\nCODE 2.17 Dynamic class creation\
    \ with `type()`.\n\nI created a *Duck* class without writing the normal class\
    \ definition. Instead, I created it by passing its class name, its parent *Bird*\
    \ and a `quack()` lambda function to the `type()` function.\n\nThis is amazing\
    \ and super powerful.\n\nHowever, there is one last issue with this example. If\
    \ you did create a subclass of *ChickenStew* with eel in its ingredient, the check\
    \ fails to work. The following code snippet 2.18 works fine, by passing the checking."
