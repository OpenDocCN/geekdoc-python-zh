    \ them. The *BaseEstimator* implemented a *_get_tags()* method that returns all\
    \ tags describing an estimator as a set, as shown in snippet 6.5.\n\n```\ndef\
    \ _get_tags(self):\n    collected_tags = {}\n    for base_class in reversed(inspect.getmro(self.__class__)):\n\
