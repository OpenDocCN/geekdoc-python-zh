    \ and *strategies*. *given* is essentially a decorator that takes a strategy as\
    \ input to generate test samples for the decorated function to use.\n\nThe *strategies*\
    \ module provides a wide range of functions to define the input space of the function.\
    \ In our example above, we use the *integers* strategy and limit the lower bound\
    \ and upper bound of the inputs.\n\nhypothesis library provides a wide range of\
    \ possibilities of strategies, and you can combine them to build your own. Code\
    \ 7.19 is a customized strategy for the demo purpose.\n\n```\nfrom hypothesis\
    \ import strategies as st\n\nmy_tuple_strategy = st.builds(\n    tuple,\n    st.integers(min_value=0,\
    \ max_value=100),\n    st.text(min_size=1, max_size=10)\n)\n\nmy_list_strategy\
    \ = st.lists(my_tuple_strategy, min_size=1)\n```\n\nCODE 7.19 A customized *strategy*.\n\
    \nFirst, we create a strategy that binds an integer and a string to a tuple. We\
    \ also specify the bounds of the integers and the length of the string. Then,\
    \ we build another strategy that creates a list of such tuples with a minimal\
    \ size of 1. Such flexibility makes strategy building very powerful for generating\
    \ test data so we can focus on the properties without worrying about the *evil*\
    \ developer's crafting.\n\nBack to the factorization test, disregarding the special\
    \ case 1, we first test that the returned list must contain at least one factor.\
    \ The factors must all be integers greater than 1. The factors must all divide\
    \ the input. The factors must be arranged in an increasing order and their product\
