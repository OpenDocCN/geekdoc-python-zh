    \ request 20801修复的内容。\n\n请注意，这个实践与我们为`Customer`类提出的`__lt__`或`__gt__`方法的实现非常相似。标准的顺序很重要。\n\
    \n回到我们最初的问题，代码片段1.12为`Customer`类实现了`__lt__`方法。这可能是写得最优雅的代码。在生产环境中，确保你也编写全面的测试。\n\
