    FIGURE 6.3 Machine learning pipelines with cross-validation.


    # MODEL THE BUSINESS ENTITIES WITH OOP


    Design the Core Entities


    First, the most important entities are the *machine learning algorithms* and *models*.
    Technically, the algorithm is a *factory* of the models. With the same algorithm
    but different parameters, we can produce a lot of copies of models.


    However, if you think about it more carefully, this may not sound right. A model
    is created by training on a training dataset. This is a *continuous* process.
    Say I have 5000 rows of records in my training dataset. I trained a linear regression
    model using 2500 rows. I got a model called `lg_2500`. However, I am not done
    training, I need to finish training on the remaining 2500 rows to get `lg_5000`.
    This doesn''t make sense as we literally created 5000 models during the process,
    even though we choose to *release* the final model only. This is just conceptually
    ugly.


    Another drawback is the lack of ease of use. Say I pick up a serialized model,
    deserialize it as I want to continue improving it with recently available data.
    However, I got the model from another engineer, and he already left the company.
    I can''t train the model as I can''t find the factory that produces it. What if
    there are version issues (and there will be)? This is a nightmare.'
