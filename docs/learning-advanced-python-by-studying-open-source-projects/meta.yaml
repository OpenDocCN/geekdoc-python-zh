  md: "Solution in code snippet 4.4 is to use the powerful asyncio library to turn\
    \ the blocking *time.sleep()* into a non-blocking *asyncio.sleep()* and use the\
    \ *async-await* pair to replace the generator's yield syntax.\n\n```\nimport asyncio\n\
    import random\n\nasync def play_chess(player_name):\n    while True:\n       \
    \ await asyncio.sleep(random.uniform(1, 2))\n        print(f\"{player_name}'s\
    \ made a move!\")\n\nasync def main():\n    players = ['Player 1', 'Player 2',\
    \ 'Player 3', 'Player 4', 'Player 5']\n    tasks = [play_chess(player) for player\
    \ in players]\n    await asyncio.gather(*tasks)\n\nif __name__ == \"__main__\"\
    :\n    asyncio.run(main())\n```\n\nCODE 4.4 Use *asyncio.sleep()* to unblock the\
    \ player's thinking.\n\nOkay, a lot of new syntax but don't worry.\nBy putting\
    \ an *async* keyword in front of a function, we turn a regular Python function\
    \ into a coroutine which means the coroutine can be suspended as resumed willingly.\n\
    The question is where: at where the *await* keyword is used. We call the objects\
    \ that follow the *await* keywords *awaitable*. As the name suggests, they can\
    \ be waited for. There are two most common awaitables.\n\n+   1. Coroutine objects\
    \ are awaitable as we already saw.\n2. Future objects are also awaitable.\n\n\
    So, what's a future? A future instance represents a promise that should eventually\
    \ be honored. In other words, you can hold on to the future instance and expect\
    \ it to have a *final state* in a later time. For example, you order something\
    \ at a food truck, and you get a number. This number is a future that indicates\
    \ that your order will be fulfilled. A future can also be *canceled* just like\
    \ you can cancel your food order.\nWe will talk more about the future in a later\
    \ section.\nIn the *play_chess* coroutine, the code will pause when it goes to\
    \ sleep and hand over the control back to the event loop. An event loop is a construct\
    \ in programming that constantly waits for and dispatches events or messages.\
    \ In our chess game example, there is no real-world event loop analogy. However,\
    \ there is one in our restaurant/kitchen example in the last chapter: a waiter."
