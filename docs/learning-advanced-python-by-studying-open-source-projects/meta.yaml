    # Introducing Global Interpreter Lock (GIL)


    In the most widely used Python implementation CPython, GIL ensures that a Python
    process, at any time, can only have one *running* thread. It means that even if
    there are multiple threads in a single Python process, only one of them can run
    at a time.


    Figure 3.6 shows that threads 1-1, 1-2 and 1-3 *compete* for one CPU although
    there are two other idle CPUs marked as shaded.


    GIL is a result of history. In the old days, computers only had one CPU, and a
    CPU only had one core. Having GIL makes single-thread code run quickly and safely.
    It also makes writing C extensions for Python much easier, which is considered
    one reason for the booming of the Python ecosystem.


    Doesn''t GIL make Python multithreading completely meaningless? Not really. Not
    all tasks require full, continuous power of a CPU, just as not all dishes require
    a cook''s attention. For example, solving scientific models to predict weather
    will exhaust a CPU''s capacity but sending an http request to a server is largely
    waiting. We can classify tasks into two categories: CPU bound tasks and input/output
    (I/O) bound tasks. Here *bound* means the task is limited by certain resources
    or bottlenecks.'
