  md: "# Use Metaclass to Model Documents in Elasticsearch DSL\n\nThe open source\
    \ project we are going to study is called elasticsearch-dsl-py. It provides easy-to-use\
    \ syntax to manipulate queries and performs object-document mapping out of the\
    \ box.\n\nHere is a quick introduction of Elasticsearch. Elasticsearch is a search\
    \ engine based on the Lucene library. It provides a full-text search engine with\
    \ an HTTP web interface and schema-free JSON documents. Elasticsearch is closer\
    \ to MongoDB than PostgreSQL. It stores records as documents. Here is a concept\
    \ mapping between Elasticsearch and SQL-like databases. This does require that\
    \ you have some basic knowledge of SQL or both (Table 2.3).\n\nTo simplify the\
    \ idea, I will refer to the example used in elasticsearch-dsl-py’s documentation,\
    \ you can imagine the following json object is a *document*, and you can save\
    \ it and other similar objects to an *index* called blog. The document has five\
    \ *fields*: *author*, *title*, *publish_date*, *tags* and body, as shown in code\
    \ snippet 2.20.\n\n```\n{\n    \"author\": \"Richard. W\",\n    \"title\": \"\
    Rule of Apes\",\n    \"body\": \"a long long body.\",\n    \"published_date\"\
    : \"2021-03-21\",\n    \"tags\": [\"sci-fi\", \"thriller\"]\n}\n```\n\nCODE 2.20\
    \ A sample *document* in the blog *index*.\n\nAfter saving this document to Elasticsearch,\
    \ you can search for it by text. You can use “apes” or “Richard” as keywords to\
    \ search in the title field or in the author field. Elasticsearch will use *analyzers*\
    \ to analyze different fields. For example, a good text analyzer will find *apes*\
    \ for you even if you typed *ape*, etc.\n\nWhat’s a domain-specific language (DSL)?\
    \ A domain-specific language is a programming language that is designed to solve\
    \ problems in a specific domain. They are not for general purposes. For example,\
    \ SQL is for relational database operation. HTML is only for frontend development.\
    \ LaTeX is only for document typesetting. Elasticsearch DSL is not really a language\
    \ but a library that can, I quote, help with writing and running queries against\
    \ Elasticsearch. It provides a more convenient and idiomatic way to write and\
    \ manipulate queries.\n\nTABLE 2.3 Concepts Matching in Elasticsearch and SQL-Like\
    \ Databases\n\n| Elasticsearch Concepts | SQL Concepts |\n| :--- | :--- |\n| Index\
    \ | Table |\n| Document | Row |\n| Field | Column |\n| None | Schema |"
