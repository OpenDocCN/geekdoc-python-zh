  md: '![](img/d6c2267970090ab811ee8826699fffd7_55_0.png)


    FIGURE 3.1 Kitchen concurrency from the customers’ perspective.


    TABLE 3.1 Dishes and Their Preparing Efforts


    | Dish Name | Task | Effort | Mostly Waiting? |

    | :--- | :--- | :--- | :--- |

    | French Fries | Fry the pre-cut potato | 2 minutes | No |

    | Roast Chicken | Roast the chicken | 10 minutes | Yes |

    | Beef Stew | Heat the pre-prepared beef | 14 minutes | Yes |

    | Salad | Cut vegetables and add dressing | 3 minutes | No |


    Why? At any specific moment, she is only *busy* doing one thing and one thing
    only. She may be *doing* two or even more things but cooking the chicken and beef
    doesn’t require much attention: she is mostly waiting for the timer to ring or
    occasionally checking. In short, she is *not busy* cooking two dishes simultaneously
    at any moment.


    In the cook’s eyes, being concurrent is a structural property that different components
    of a task or different sub-tasks, if you consider serving the diner as a super-task,
    can be performed *out of order* or in parallel, to still obtain the same deterministic
    results.


    Note that there are two significant differences between the blue cooking tasks
    and red cooking tasks.


    +   1. First, blue tasks are done in parallel, which means the two dishes do have
    overlapping cooking time. The red ones don’t.

    2. Second, blue tasks are not limited by the cook’s energy, you can just wait.
    The red ones require the cook’s full attention. Therefore, the red ones can only
    be prepared sequentially as there is only one cook.'
