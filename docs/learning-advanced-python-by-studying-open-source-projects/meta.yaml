  - "[PAGE 114]\n\nThe *score()* method calculates the accuracy score between the\
    \ ground truth and the predicted value. The higher the score is, the better the\
    \ model is. The *_more_tags()* method adds a tag to the estimator’s tags. scikit-learn\
    \ uses a very *explicit* approach to identify the properties of an estimator:\
    \ by tagging them. The *BaseEstimator* implemented a *_get_tags()* method that\
    \ returns all tags describing an estimator as a set, as shown in snippet 6.5.\n\
    \n```\ndef _get_tags(self):\n    collected_tags = {}\n    for base_class in reversed(inspect.getmro(self.__class__)):\n\
    \        if hasattr(base_class, \"_more_tags\"):\n            # need the if because\
    \ mixins might not have _more_tags\n            # but might do redundant work\
    \ in estimators\n            # (i.e. calling more tags on BaseEstimator multiple\
    \ times)\n            more_tags = base_class._more_tags(self)\n            collected_tags.update(more_tags)\n\
    \    return collected_tags\n```\n\nCODE 6.5 *tags* are used to identify classes\
    \ as well. Mixin provides additional tags.\n\nBack to the mixin topic. With mixin,\
    \ a classifier will be a child of both *BaseEstimator* and *ClassifierMixin*.\
    \ For example, the *DecisionTreeClassifier* inherits the *ClassifierMixin* and\
    \ *BaseDecisionTree* (code snippet 6.6).\n\n```\nclass DecisionTreeClassifier(ClassifierMixin,\
    \ BaseDecisionTree):\n    #pass\n```\n\nCODE 6.6 *DecisionTreeClassifier* parents.\n\
    \nThe *BaseDecisionTree* is a child of the *BaseEstimator* and another mixin *MultiOutputMixin*.\
    \ This mixin basically allows estimators to support multiple output like performing\
    \ multiple category classification (code snippet 6.7).\n\n```\nclass BaseDecisionTree(MultiOutputMixin,\
    \ BaseEstimator,\n                       metaclass=ABCMeta):\n    #pass\n```\n\
    \nCODE 6.7 *BaseDecisionTree* parents.\n\nWhy is this approach important? In our\
    \ first lesson of OOP in college or on any OOP YouTube video, isn’t the go-to\
    \ relationship? Why don’t we have something as in Figure 6.5?\n\nThe reason is\
    \ that it is too easy to create a diamond structure with such multiple inheritances.\
    \ A decision tree is a classifier, and it can output multiple labels. We then\
    \ have the following inheritance relationship as in Figure 6.6."
