  md: "in the __new__() dunder method. The __new__() method of a class *creates* its\
    \ instance and returns it to __init__() to initialize it. In the metaclass case,\
    \ the metaclass' __new__() method creates the class.\n\nTo understand what the\
    \ arguments mean, let's check a normal class example first. The __new__() method\
    \ exists for every class, not only metaclasses. This class extends the *dict*\
    \ built-in class and adds an underscore to every key. Check it out in code snippet\
    \ 2.14.\n\n```\nclass UnderScoreDict(dict):\n    def __new__(cls, d):\n      \
    \  return {\"_\" + str(k):v for k,v in d.items()}\n\nUnderScoreDict({\"a\":1,\
    \ \"b\":2}) # {'_a': 1, '_b': 2}\n```\n\nCODE 2.14 Adding an underscore to each\
    \ key of a dictionary.\n\nFirst, the __new__() method doesn't necessarily call\
    \ its parent's methods. Instead, the only requirement is for it to return something,\
    \ ideally the instance, for initialization in the downstream. Here, I just create\
    \ the manipulated dictionary directly.\n\nSecond, can we achieve the same thing\
    \ with __init__()? The answer is Yes as shown in code snippet 2.15.\n\n```\nclass\
    \ UnderScoreDict(dict):\n    def __init__(self, d):\n        for k,v in d.items():\n\
    \            self[\"_\" + str(k)] = v\n```\n\nCODE 2.15 Achieve the same effect\
    \ without using metaclass.\n\nThe default __new__() method returns an empty dictionary\
    \ to the __init__() method to initialize, and __init__() assigns the key-value\
    \ pairs one by one.\n\nIn practice, there are situations where only __new__()\
    \ can resolve. For example, you want to make sure there is only one instance in\
    \ your program: the singleton design pattern, which you already saw in Chapter\
    \ 2. Code snippet 2.16 creates a singleton.\n\n```\nclass Singleton:\n    _instance\
    \ = None\n    def __new__(cls, *args, **kwargs):\n        if not cls._instance:\n\
    \            cls._instance = object.__new__(cls, *args, **kwargs)\n        return\
    \ cls._instance\n```\n\nCODE 2.16 A *singleton* class always returns the same\
    \ entity.\n\nIn this example, the class *Singleton* maintains a class variable\
    \ _instance. Every time a new instance is created, the __new__() method checks\
    \ whether this is the first time such an instance is created. If yes, create the\
    \ instance, track it with the _instance variable, then return it. If not, just\
    \ return the instance created earlier."
