    # Parametric equations


    Parametric equations are groups of equations that depend on the same parameters:
    x = f(a,b), y = g(a,b). Quite often, in physics, the common parameter is time,
    so we have a position (x,y) which is a function of time: x = f(t), y = g(t), but
    x and y are different functions of time because they have different forces acting
    upon them.


    Another example is cartesian and polar coordinates. While the equation of a circle
    in Cartesian coordinates can be given by r²=x²+y², the parametric'
  merge: -1
  pgno: 158
- img_proc: true
  md: 'equations for the same circle are given by:


    $$x = r \cdot \cos \Theta$$

    $$y = r \cdot \sin \Theta$$


    There is a single parameter, $\Theta$, in our example for which x and y are both
    functions of. This happens to be very convenient when moving between different
    coordinate systems and in a way we have seen this behaviour with the representation
    of complex numbers which exist on a surface.


    We can show that both coordinate systems are effectively the same by substituting
    the two parametric polar equations directly back into the cartesian equivalent.


    $$r^2 = x^2 + y^2$$

    $$r^2 = r^2 \cdot \cos^2 \Theta + r^2 \cdot \sin^2 \Theta$$

    $$r^2 = r^2 \cdot (\cos^2 \Theta + \sin^2 \Theta)$$

