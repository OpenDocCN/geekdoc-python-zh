    \ more efficient way without copying and pasting 10,000 printing statements, we\
    \ can use iteration or looping in Python. This approach involves printing the\
    \ value of a variable (count), incrementing the variable (count += 1), and repeating\
    \ this process until the variable reaches the desired value (in this case, count\
    \ == 10000). This repetitive execution of the same section of code is known as\
    \ iteration or looping. Python provides two different statements, while and for,\
    \ that enable iteration. By using a while loop, we can incrementally increase\
