    \ time.\n\n- Get or create the data\n- Organise the data and how the chart looks\n\
    - Plot the chart (with `plt.show()` )\n\nWe can now begin to do statistical analysis.\
    \ Imagine that we have x and y points and we want to find a simple relationship\
