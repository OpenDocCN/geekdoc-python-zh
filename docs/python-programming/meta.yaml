    # Code that does not include a break or continue statement

    break # This break statement has no effect; loop restarts

    ```


    Using a for loop with a range that never exhausts:


    ```

    for i in range(10):

    # Code that keeps the loop running without exhausting the range

    ```


    To prevent infinite loops, ensure that your loops have appropriate exit conditions,
    such as a specific number of iterations, a flag variable, or user input that allows
    the user to break out of the loop.


    Additionally, make sure that any break or continue statements are placed correctly
    to avoid unintended infinite iterations.


    If you ever find yourself stuck in an infinite loop during testing or execution,
    you can stop the program''s execution forcefully by pressing Ctrl+C in the command-line
    interface or by stopping the execution in your development environment.


