    a range from approximately 2.22507 x 10^-308 to 1.79769 x 10^308, and it provides
    a precision of up to 15 significant digits. However, it’s crucial to note that
    the actual range and precision of floating-point numbers may vary depending on
    the Python implementation used on a particular machine.'
