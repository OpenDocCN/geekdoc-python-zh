    ```


    The number within the square brackets is called the index. A nonnegative index
    indicates the distance from the beginning of the list. The expression lst[0] therefore
    indicates the element at the very beginning (a distance of zero from the beginning)
    of lst, and lst[1] is the second element (a distance of one away from the beginning).
    We can read aloud the expression a[3] as “a sub three,” where the index 3 represents
    a subscript.


    ![](img/1dbe1e06b9d31a6f7ada030324ed273a_309_0.png)


    **Figure 10.1.** A simple list with three elements. The small number below a list
    element represents the index of that element.


    The subscript terminology is borrowed from mathematicians who use subscripts to
    reference elements in a mathematical vector or matrix; for example, V2 represents
    the second element in vector V. Unlike the convention often used in mathematics,
    however, the first element in a list is at position zero, not one. As mentioned
    above, the index indicates the distance from the beginning; thus, the very first
    element is at a distance of zero from the beginning of the list. The first element
    of list a is a[0]. As a consequence of a zero beginning index, if list a holds
    n elements, the last element in a is a[n − 1], not a[n].


    If a is a list with n elements, and i is an integer such that 0 ≤ i <n, then a[n]
    is an element in the list.


    A negative list index represents a negative offset from an imaginary element one
    past the end of the list. For list a, the expression a[-1] represents the last
    element in a. The expression a[-2] represents the next to the last element, and
    so forth. If a contains n elements, the expression a[0] corresponds to lst[-n].
    In the next code, the use of negative indices to print a list in reverse.'
