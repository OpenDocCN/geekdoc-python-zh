    A correct simple recursive function definition is based on four key concepts:


    +   1. The function optionally must call itself within its definition; this is
    the recursive case.

    2. The function optionally must not call itself within its definition; this is
    the base case.

    3. Some sort of conditional execution (such as an if/else statement) selects between
    the recursive case and the base case based on one or more parameters passed to
    the function.

    4. Each invocation that does correspond to the base case must call itself with
    parameter(s) that move the execution closer to the base case. The function’s recursive
    execution must converge to the base case.


    In a recursive function, every recursive call should lead the execution closer
    to the base case. The factorial function exemplifies this principle. When the
    factorial function calls itself, it does so within the else block of an if/else
    statement. The base case of the factorial function is executed when the condition
    of the if statement holds true. Since the factorial is valid only for nonnegative
    integers, the initial invocation of the factorial function must be supplied with
    a value of zero or greater.


    +   - When the parameter is zero (the base case), no recursive call occurs.

    - For any other positive parameter, a recursive call is made with a parameter
    that is numerically closer to zero than the preceding one.


    This recursive process continues, progressively moving towards the base case.
    Ultimately, the recursion terminates when the base case is reached, completing
    the entire process.


