    生命游戏是一个零玩家游戏，这意味着它的演化仅由其初始状态决定，无需进一步输入。\n\n用户可以设置初始状态，此后模拟将无限期地继续下去。\n\n游戏的规则如下：\n\
    \n- 每个细胞处于两种可能状态之一，**存活**或**死亡**（**开**或**关**或**1**或**0**）。\n- 每个细胞与其八个邻居互动\n\n\
    ![](img/4e4fc350228cd1c84055205e597f4fc0_252_0.png)\n\n在每个时间步，为下一次迭代计算以下内容。\n\n\
    1. 任何*存活邻居少于两个*的存活细胞死亡，如同因人口不足而死。\n2. 任何*有两个或三个存活邻居*的存活细胞存活到下一代。\n3. 任何*存活邻居超过三个*的存活细胞死亡，如同因人口过剩而死。\n\
