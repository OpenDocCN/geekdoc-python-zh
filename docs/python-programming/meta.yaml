    \n$$m_1 \\frac{d^2\\hat{\\mathbf{r}}_1}{dt^2} = G \\frac{m_1 m_2}{r^2} \\cdot\
    \ \\hat{\\mathbf{r}}$$\n\n事实上，我们知道两个物体的行为是有序的，有时会表现出优美的行为。我们可以称这些有序的模式为稳定状态。它们是可预测的，解会趋向于它们，就像我们在曼德博集合中看到的那样，那里存在收敛区域。\n\
