    # Digital Image Processing


    A huge amount of work has been done over the past 25 year with respect to image
    processing and the growth of the subject and technologies arising from such have
    been tremendous.


    Image processing can often be processor intensive and as such has greatly benefitted
    from the increase in processing power over the same period.


    Python has proved to be a popular language for image processing and comes with
    a number of libraries that intrinsically contain the techniques that this section
    will be looking at. In particular, it is Python''s ability to harness and leverage
    the much faster C++ algo''s that has provided this popularity.


    One of the more popular modules that Python, called opencv , was originally written
    in C++. Whilst there are a number of other modules, we will focus on this one.


    In this chapter we will attempt to understand a number of the processes leading
    up to and finally including face detection or other interesting digital equivalents.
    We will start at the beginning here:


    +   - Read images, videos, webcams

    - Basic functions

    - Resizing and cropping


    # Introduction to images


    Even though we might not be able to see this with the naked eye, computer images
    that we see on our screens, monitors or other devices are made up from many small
    points called pixels. When we zoom into the images this becomes noticeable as
    the image becomes more and more pixelated.'
- md: "So we can consider an image as a series of squares.\n\nAnd we can keep on zooming\
    \ in to those squares until we reach the resolution of the pixels themselves.\
    \ So imagine that we wanted to draw the number “3”, it would look something like\
    \ this:\n\nAll the black boxes are given the value 0 and all of the white boxes\
    \ are given the value 1. The image itself is 8x8 squares (or pixels) width and\
    \ height. So 64 pixels in total.\n\nScreen sizes are understood to be in terms\
    \ of ( width x height ) where each parameter represents the number of pixels in\
    \ each dimension. Typical screen sizes are:\n\n- VGA: 640 x 480\n- HD: 1280 x\
    \ 720\n- 4k: 3840 x 2160\n\nSo an HD display has 1280 pixels going across and\
    \ 720 pixels in the vertical direction. So there are 921,600 pixels in this display.\
    \ Since the human eye cannot resolve each dot of the nearly 1 million dots in\
    \ a VGA image, this is sufficiently sharp for highly detailed images to be displayed.\n\
    \nThe image above is a binary image. It can either contain a black square or a\
    \ white square, but no other colour.\n\n- 0 = Black\n- 1 = white\n\nBut we could\
    \ improve this by allowing for different numbers to create a grayscale in place\
    \ of the basic black and white images.\n\nThe different shades of grey make the\
    \ image clearer. The scales go up in powers of 2 (because they are binary) and\
    \ the current number of levels that gives a good image is 2^8 which is 256 levels.\n\
    \nA colour image is made up in exactly the same way as grayscale images with the\
    \ only difference being that there are 3 scales: **red** + **green** + **blue**.\
    \ And the sum of these gives the image that we see. We know this as RGB.\n\nSo\
    \ a coloured HD image is now 1280 x 730 x 3 (a pixel for each colour). Each one\
    \ of these 921,600 pixels is made up from a sum of 3 colours each with 256 levels\
    \ of intensity.\n\n## Reading images and videos\n\nNow that we have a basic understanding\
    \ of how images are made we can begin to move a bit deeper into the process.\n\
    \nOne of the nice things about Python is the ease of use that it provides. Importing\
    \ an image is done with the opencv-python module which is a third party module\
    \ like the pandas and numpy modules and is quickly installed with the package\
    \ manager ( pip install opencv-python ).\n\nWith this module it is easy to read\
    \ an image:\n\n```python\nimport cv2\n\nimg = cv2.imread('assets/apple_colour.png')\n\
    cv2.imshow('Output', img)\ncv2.waitKey(0)\n```\n\nThe entire image is read into\
    \ the memory and then displayed on the screen.\n\nWe can inspect the contents\
    \ of the image like this:\n\n```python\nprint(img)\nprint('columns:', len(img))\n\
    print('rows:', len(img[0]))\nprint('colours:', len(img[0][0]))\n```\n\nAnd we\
    \ see this:\n\n```\n[[ 64 104 129]\n [ 64 104 129]\n [ 64 104 129]\n ...\n [ 88\
    \  73  70]\n [ 88  73  70]\n [ 88  73  70]]\n ...\n ...\n [194 194 178]\n [193\
    \ 193 175]\n [192 192 174]]]\n\ncolumns: 1204\nrows: 1164\ncolours: 3\n```\n\n\
    This is a list of lists (an array) with each sub list containing the RGB values.\
    \ So, our example image (of the coloured apple) contained a list of 1204 elements\
    \ (the height) x 1164 elements (the width) x 3 elements (the red, green and blue\
    \ values). So describing this image was over 4 million values. Whilst we don't\
    \ get to appreciate the brilliance of the image in a book, the blown up image\
    \ on a HD screen is spectacular.\n\nImportantly, we now have the data in just\
    \ a few lines of code and this is valuable.\n\nSwiftly moving on from images,\
    \ we can capture a video (by creating a video capture object) like this:\n\n```python\n\
    import cv2\n\ncap = cv2.VideoCapture('assets/sample_video.mkv')\n\nwhile True:\n\
    \    done, img = cap.read()\n    if done == False:\n        break\n    cv2.imshow('Video',\
    \ img)\n    if cv2.waitKey(1) & 0xFF == ord('q'):\n        break\n```\n\nThe first\
    \ thing that we note is that a video is made up of a series of images. The cap.read()\
    \ function returns a tuple with the first value being if the image was read successfully\
    \ and the second value the image file itself. We have seen list unpacking before\
    \ (in the data science chapter) and this is now a convenient feature.\n\nThe complicated\
    \ waitkey(1) line is essentially waiting for the escape key or the letter “q”\
    \ to be pressed and could be replaced by this:\n\n```python\nkey = cv2.waitKey(1)\n\
    if key == 27 or key == 113:\n    break\n```\n\nWe like to keep things simple.\n\
    \nSo, we were able to read and display an image file, then we were able to read\
    \ and display a video file which was a series of images. Our last technique is\
    \ to capture a video from the device webcam. So this is a **real-time** video\
    \ as opposed to a pre-stored video.\n\nReading data from the webcam exactly the\
    \ same as the video with the exception of 1 line of code changing into 3 lines:\n\
    \n```python\ncap = cv2.VideoCapture(0)\ncap.set(3,640) # width\ncap.set(4,480)\
