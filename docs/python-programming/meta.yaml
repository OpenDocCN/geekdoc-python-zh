    \n```python\na = 'x'\nb = 'y'\nprint('a{0}b{1}c{0}d'.format(a, b))\n```\n\n生成的字符串格式与格式化字符串完全相同，包括空格，唯一的区别是格式化参数替换了位置参数。也可以在格式化字符串中多次重复使用一个位置参数。\n\
