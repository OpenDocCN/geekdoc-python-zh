  md: 'In particular, if we consider a weather system evolving over time, that the
    1-dimensional time steps that we used in the example become 3 spatial dimensions
    evolving over time (so 4 dimensions) and all of a sudden our 365 calculations
    grows to 365³ (or roughly 50 million calculations).


    If we were to take a weather system over the uk which is roughly 240,000 km² and
    consider cubes of 1km then the model would require 250 cubes just for the basic
    footprint. And if we wanted to increase the accuracy to 1 metre blocks, this would
    quickly bifurcate to 240 million volumes for a single iteration of evolution.
    All of a sudden the computational systems are challenged.


