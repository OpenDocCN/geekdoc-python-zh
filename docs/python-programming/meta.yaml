- md: "## Making modules\n\nSo we can import modules that we made by the community,\
    \ for which there are thousands. These modules were very powerful collections\
    \ of useful functions with use case examples and plenty of support.\n\nHowever,\
    \ the modules created only serve to assist the user in building their own project.\
    \ The project could be one snippet of code in one file of no more than 20 lines\
    \ of code or it could be a large meaningful piece of code spanning many thousands\
    \ of lines and also have user created modules of its own.\n\nPython caters well\
    \ for both of these and in fact makes it very easy for the user to both create\
    \ and import their own modules.\n\nEvery file that a user creates is saved as\
    \ a *.py file and this will live in a folder. So for example, the “hello_world.py”\
    \ would have been saved somewhere on the pc.\n\nLet's assume that it is saved\
    \ on the C drive (for a windows based computer) in a folder that we named “code”.\
    \ Then the full path would look like this:\nC:\\code\\hello_world.py\n\nWe can\
    \ say that the python file is called hello_world.py and the project folder is\
    \ c:\\code . Now, if we create another file in the same folder, say hello_moon.py\
    \ then we would have two files in the project folder.\n\nAnd all we have to do\
    \ is this:\n\n![](img/4e4fc350228cd1c84055205e597f4fc0_48_0.png)\n\nSo we can\
    \ see that the import statement brings in all the attributes and methods from\
    \ one file ( hello_moon.py ) into the other file ( hello_world.py ) in just one\
    \ line of code.\n\nThe rules are very simple too. The imported folder should be\
    \ in the same folder or a sub folder of the project folder. That is it.\n\nSo\
    \ we now have the tools necessary to create an entire project which is broken\
    \ into useful and meaningful modules.\n\n## The main module\n\nThere is one final\
    \ part to all of this, which is that we now have a collection of attributes and\
    \ functions and collections of modules (the python files) in various folders (hopefully\
    \ not too many otherwise the project is complicated). So how do we determine the\
    \ starting point in all of this?\n\nThere is usually one file which is deemed\
    \ to be the main file or we could say the entry point to the code. the file could\
    \ have any useful or descriptive name that the user wants.\n\nHaving read the\
    \ **magic methods** chapter we are aware that all objects in python have special\
    \ built in functions which are denoted with the double underscore. Well, the file\
    \ object is no different. Here are some of the more useful ones:\n\n- `__file__`:\
    \ the path name of the file.\n- `__doc__`: a description of the file.\n- `__name__`:\
    \ the name of the file\n\nWe could actually get a list of these by typing `print(dir())`\
    \ in a file and running the code.\n\nThe interesting one here is the `__name__`\
    \ attribute as this tells us the name of the file that was imported. It gets its\
    \ value depending on how we execute the containing script. So, the actual **main\
    \ file** (which is not imported) is given the name `__main__`.\n\nWe often see\
    \ this at the bottom of the main file in nearly every large project.\n\n```\n\
    if __name__==\"__main__\":\n    # run some code\n    print('do something')\n```\n\
    \nThe code inside the if statement is now only run when the filename is that of\
    \ the main file. Our entry point !\n\nAs a side note, we could import files from\
    \ other folders that are not contained within the project folder by adding an\
    \ additional path name like this.\n\n```\n# some_file.py\nimport sys\n# caution:\
    \ path[0] is reserved for script path (or \"\" in REPL)\nsys.path.insert(1, '/path/to/application/app/folder')\n\
    \nimport file\n```\n\nBut for the purpose of what we do and *best practice we\
    \ like to keep the package together* in one folder.\n\n## Coding Techniques\n\n\
    So at this point we have had an overview of python, how to set up the environment\
    \ and also an overview of the basics of the language itself.\n\nWe looked at variables,\
    \ collections, functions, loops and if statements among others. Everything that\
    \ we have seen has been relatively top level as a deep dive into even just one\
    \ topic could be a book in itself.\n\nIt would be wise for the reader to recap\
    \ and support their book reading with actual real world testing on a device. Yes,\
    \ this means **writing code yourself**, starting with the `hello_world.py` program.\
    \ This cannot be stressed enough, you now have to get your fingers onto a keyboard\
    \ to enrich the benefit of this read.\n\nHaving said this, it is now time to look\
    \ at some problems that we tend to encounter. I am not sure how I will break these\
    \ down into categories.\n\nThe important thing to remember is that these “problems”\
    \ should be considered to be fun brain teasers and other interesting cases.\n\n\
    ## What is a coding problem\n\nIt is any kind of problem and usually interesting\
    \ ones that we might not be able to solve with a pen and paper alone. Initially,\
    \ when trying to learn, I took the 100 daily coding questions. That basically,\
    \ means, every day for 100 days, pick a problem and try to solve that problem\
    \ in any language.\n\nInitially, I was using `node.js` and a friend was using\
    \ `python`, so it was interesting to compare methods. The reality is that both\
    \ languages (sometimes referred to as scripting languages) have a >75% similarity.\n\
    \nIn fact, if one swaps curly braces for indents and removes the semicolons at\
    \ the end of lines, then the languages are even closer.\n\n## What is a coding\
    \ technique\n\nWe could consider a technique to be a general form as to how we\
    \ approach a problem. We tend to use the same techniques quite often to solve\
    \ a whole variety of problems in the same way that a particular tool in a toolbox\
    \ might be used to fix many issues.\n\nWe have common techniques, like for loops\
    \ and while loops just in the same way that we have screwdrivers and spanners\
