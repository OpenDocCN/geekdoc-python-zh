  md: "Whilst the example is basic, it contains all that is necessary for both the\
    \ client and the server to talk to each other. Processes could be done at either\
    \ end and the results sent back to the other one.\n\nThis means that we could,\
    \ for example, send small bits of information from the client to the server and\
    \ have the server compute a heavy process (like a heavy duty cloud server) or\
    \ alternatively the other way around if we chose to.\n\nSo we could have our functions\
    \ and modules live on the server. This is, in fact, the basis for the internet\
