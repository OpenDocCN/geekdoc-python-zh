    \n# ABOUT THE AUTHORS\n\n**Dr. Vinod Patidar**, presently working with Parul Institute\
    \ of Technology (PIT), Vadodara (Gujarat) as an Assistant Professor in Computer\
    \ Science and Engineering Department since 24/04/2023. Prior, I Served as an Assistant\
    \ Professor and Discipline Head (1st October, 2022 - 20th April, 2023) at Bansal\
    \ College of Engineering, Mandideep (Bhopal). A Senior Lecturer (08th August,\
    \ 2008 - 31th August, 2013) and Assistant Professor (1st Sept., 2021 - 30th Sept.,2022)\
    \ at Scope College of Engineering, Bhopal. I Done My Bachelor of Engineering (BE-CSE)\
    \ from University Institute of Technology (UIT), Bhopal in 2006. And also Completed\
    \ Master of Technology (M.Tech-CSE) from University Institute Of Technology (UIT),\
    \ Bhopal in 2013. And Completed the Doctoral Research (Ph.D.) in the Topic of\
    \ “Multi Objective Virtual Machine Resource Allocation by Dynamic Load Scheduling\
    \ Techniques”, From Rabindranath Tagore University, Bhopal, (M.P.) in July, 2021.\n\
    \n**Dr. Manmohan Singh**, working as Professor in Department of Computer Science\
    \ and Engineering at IES College of Technology Bhopal India M.P. Prior to that\
    \ he has more than 12+ years of teaching experience in several engineering colleges\
    \ as Chameli Devi Group of Institution, Indore and Dr. A.P.J. Abdul Kalam University,\
    \ he completed His academic qualifications include Master in Computers engineering,\
    \ Ph.D. in Computer Science and engineering. His research includes Data Mining,\
    \ AI, Data Science He is having 25 + research publications in reputed International\
    \ journal, International-National conferences and 9 - patents (5 published- 4\
    \ Registered). He is publishing more than 10+book is field of computer science.\
    \ He is completed one DST sponsor project.\n\n**Dr. Shiv Shakti Shrivastava**\
    \ is the Professor in Computer Science & Engineering department in Rabindranath\
    \ Tagore University, Bhopal. He has more than 20 years of experience. Under his\
    \ guidance nine scholars has been awarded Ph.D. M.Tech.-MCA students also guided\
    \ by him. He has published more than fourth five International & National papers\
    \ in difference reputed journals. He has three patents and also trying funded\
    \ patents. He is connected with many universities like Barkatullah Univ., RGPV,\
    \ Makhanlal Univ., Bhoj Univ., and many more universities. He has taken many expert\
    \ lectures, guest lecture, judge in different universities and colleges for technical\
    \ and other events. He has been attended as guest in different webinars. He has\
    \ completed many Faculty Development Program and also successfully completed training\
    \ of the IEEE Xplore Digital Library. Ph.D. Thesis\n\n**Mr. Rahul Sharma**, working\
    \ as Assistant Professor in Department of Computer Science and Engineering at\
    \ Parul Institute of Technology, Parul University Vadodara, Gujarat. Prior to\
    \ that he has more than 6+ years of teaching experience in several engineering\
    \ colleges as Chameli Devi Group of Institution, Indore and Dr. A.P.J. Abdul Kalam\
    \ University, he completed B.E. (CSE) from Patel College of Science and Technology,\
    \ Indore (M.P.) and M.Tech (NM&IS) from SCSIT, DAVV, Indore (M.P.). And Pursuing\
    \ PhD degree in Computer Science and Engineering from Rabindranath Tagore University\
    \ Bhopal (M.P.). His research includes Computer Network, Network Security, Cryptography,\
    \ Data Mining and Web Programming’s. He is having 13 research publications in\
    \ reputed International journal, International- National conferences and 6 - patents\
    \ (3 published- 3 Registered). He also has qualified GATE (CSE) in 2015. He is\
    \ publishing more than 9+ books in the field of computer science and Engineering.\n\
