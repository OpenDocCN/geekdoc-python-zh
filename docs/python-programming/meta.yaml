    \ color == 'red':\n        color = 'green'\n        canvas.itemconfigure(red_lamp,\
    \ fill='black')\n        canvas.itemconfigure(green_lamp, fill='green')\n    elif\
    \ color == 'green':\n        color = 'yellow'\n        canvas.itemconfigure(green_lamp,\
    \ fill='black')\n        canvas.itemconfigure(yellow_lamp, fill='yellow')\n  \
    \  elif color == 'yellow':\n        color = 'red'\n        canvas.itemconfigure(yellow_lamp,\
    \ fill='black')\n        canvas.itemconfigure(red_lamp, fill='red')\n# 创建并初始化全局变量\n\
    color = 'red' # 表示信号灯的当前颜色\nroot = Tk() # 初始化主窗口\nroot.title(\"Traffic Light\"\
    ) # 设置窗口标题\nframe = Frame(root) # 创建一个框架来容纳控件\nframe.pack()    # 调整框架以填充整个窗口\n\
    canvas = Canvas(frame, width=150, height=300) # 在框架内创建一个绘图区域\n# 设计交通信号灯的视觉元素\n\
    canvas.create_rectangle(50, 20, 150, 280, fill='gray') # 交通信号灯框架\nred_lamp = canvas.create_oval(70,\
    \ 40, 130, 100, fill='red')  # 红灯\nyellow_lamp = canvas.create_oval(70, 120, 130,\
    \ 180, fill='black') # 黄灯\ngreen_lamp = canvas.create_oval(70, 200, 130, 260,\
    \ fill='black') # 绿灯\n# 创建一个触发 do_button_press 函数的图形按钮\nbutton = Button(frame,\
    \ text='Change', command=do_button_press)\n# 在框架的网格布局中排列按钮和画布\nbutton.grid(row=0,\
    \ column=0)\ncanvas.grid(row=0, column=1)\n# 启动 GUI 事件循环\nroot.mainloop()\n```\n\
    \n上述代码使用了 tkinter 包中的两个类和 tkinter.ttk 包中的两个类：\n\n-   **Tk 类：** 如前所述，此类充当图形窗口的体现。代码段：\n\
    \n```python\nroot = Tk()\n```\n\n实例化一个 Tk 对象，将其标记为 \"root\"。这个 \"root\" 对象承担应用程序中央图形窗口的角色。接下来的代码行：\n\
    \n```python\nroot.title(\"Traffic Light\")\n```\n\n配置出现在窗口标题栏中的文本。此外，代码行：\n\n\
    ```python\nroot.mainloop()\n```\n\n在根窗口对象上启动 mainloop 方法的执行，从而有效地开始图形程序的进程。\n\n\
    -   **Frame 类：** 此类代表一个可以容纳其他图形实体的隐藏容器。代码行：\n\n```python\nframe = Frame(root)\n\
    ```\n\n生成一个框架对象并建立其与主图形窗口的连接。随后，代码行：\n\n```python\nframe.pack()\n```\n\n指示容器控件占据图形窗口的全部空间。\n\
    \n-   **Canvas 类：** 此类代表嵌入在图形窗口中的绘图区域。代码行：\n\n```python\ncanvas = Canvas(frame,\
    \ width=150, height=300)\n```\n\n生成一个名为 \"canvas\" 的 Canvas 对象，插入到名为 \"frame\"\
    \ 的容器控件中。此 Canvas 对象的尺寸为宽度 150 像素，高度 300 像素，由 width 和 height 参数指定。至关重要的是要注意，坐标系的原点\
    \ (0, 0) 位于窗口内绘图区域的左上角。此外，y 轴是反向运行的——不是向上递增，而是向下递增。因此，在画布内，x 值从左到右增加，而 y 值从上到下增加。图\
    \ 9.3 提供了视觉表示。图 9.3 说明了这一点。\n\n代码行：\n\n```python\ncanvas.create_rectangle(50,\
    \ 20, 150, 280, fill='gray')\n```\n\n使用 create_rectangle 方法向画布添加一个具有指定尺寸的灰色矩形。前两个参数将矩形的左上角设置在坐标\
    \ (50, 20)。后续参数确定矩形右下角的位置，精确地位于点 (150, 280) 左侧一个像素和上方一个像素处。fill 参数指定矩形的背景颜色。此矩形用作信号灯的封闭框架。\n\
    \ncreate_oval 方法以类似的方式工作，用于制作信号灯的圆形表示。图 9.4 提供了视觉"
