  md: "**Functional Independence:** Excluding global variables from a function fosters\
    \ functional independence. A dependent function relies on external information,\
    \ such as global variables, to perform correctly. The more dependent functions\
    \ a program contains, the more challenging it becomes to debug and extend. In\
    \ contrast, truly independent functions that abstain from global variables and\
    \ external functions can be tested and transferred between programs with minimal\
    \ modifications.\n\n**Predictable Behavior:** Pure functions, which don’t perform\
    \ input/output operations or use global variables, produce consistent and predictable\
    \ results. These functions are considered “pure” because their behavior is solely\
    \ determined by their inputs and doesn’t lead to side effects. In conclusion,\
    \ the choice between global and local variables impacts the clarity, predictability,\
    \ and maintainability of your code. Embracing functional independence through\
    \ local variables contributes to more manageable and comprehensible codebases.\n\
    \n# 8.2. DEFAULT PARAMETERS\n\nIn Python, we have observed that some functions\
    \ can be invoked by callers with different numbers of parameters. A comparison\
    \ can be drawn between these two uses of the input function:\n\n```\na = input()\n\
    ```\n\nVersus\n\n```\na = input(“Enter your name: “)\n```\n\nWe possess the capability\
    \ to design our own functions that can accommodate varying numbers of parameters\
    \ through the application of a technique known as default parameters. For instance,\
    \ consider the subsequent function which executes a countdown:\n\n```\ndef countdown(n=10):\n\
    \    for count in range(n, -1, -1):\n        print(count)\n```\n\nHere, the formal\
    \ parameter represented by n=10 denotes a default parameter or default argument.\
    \ In cases where the caller omits an actual parameter, the formal parameter n\
    \ assumes a value of 10. The subsequent function call demonstrates this concept:\n\
    \n```\ncountdown()\nprint()\n```"
  merge: -1
