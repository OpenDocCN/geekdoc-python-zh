  md: "# Fractals\n\nA Fractal is a curve or geometrical figure, each part of which\
    \ has the same statistical character as the whole. They are useful in modelling\
    \ structures in which similar patterns recur at progressively smaller scales,\
    \ and in describing partly random or chaotic phenomena.\n\nFractals could be said\
    \ to be part of the dynamic systems. Indeed, if we look at the world around us,\
    \ it can quite easily be seen that we are surrounded by hundreds of fractals often\
    \ without even knowing it.\n\nLet's create a fractal using the basic turtle module:\n\
    \n```\nimport turtle as ttl\n\nttl.shape('turtle')\nttl.speed(0)\n\ndef tree(size,\
    \ levels, angle):\n    if levels==0:\n        ttl.color('green')\n        ttl.dot(size)\n\
    \        ttl.color('black')\n        return\n    \n    ttl.forward(size)\n   \
    \ \n    ttl.right(angle)\n    tree(size*0.8, levels-1, angle)\n    \n    ttl.left(angle\
    \ * 2)\n    tree(size*0.8, levels-1, angle)\n    \n    ttl.right(angle)\n    ttl.backward(size)\n\
    \nttl.left(90)\ntree(70, 9, 60)\n\nttl.mainloop()\n```\n\nOne of the properties\
    \ of fractals is the repeated nature and this fits well computationally with recursive\
    \ functions."
