    ```python\n>>> x, y, z = range(10, 31, 10)\n>>> x\n10\n>>> y\n20\n>>> z\n30\n\
    ```\n\nYou must ensure the number of values match exactly:\n\n```python\n>>> x,\
    \ y, z = range(0, 100)\nTraceback (most recent call last):\n  File \"<stdin>\"\
    , line 1, in <module>\nValueError: too many values to unpack (expected 3)\n>>>\
    \ x, y, z = range(0, 2)\nTraceback (most recent call last):\n  File \"<stdin>\"\
    , line 1, in <module>\nValueError: need more than 2 values to unpack\n```\n\n\
    ## 11.3. DICTIONARIES\n\nLists and tuples are convenient for storing collections\
    \ of data, but they have some limitations. For one, we locate an element within\
    \ a list or tuple based on its position (index). While this approach is fine for\
    \ many applications, in other situations this access-by-index approach is awkward\
    \ or inefficient.\n\nA Python dictionary is an associative container which permits\
    \ access based on a key, rather than an index. Unlike an index, a key is not restricted\
    \ to an integer expression. The following interactive sequence builds a simple\
    \ dictionary that uses string keys:\n\n```python\n>>> d = {} # Make an empty dictionary\n\
    >>> d\n{}\n>>> # Add an element\n... d['Fred'] = 44\n>>> d\n{'Fred': 44}\n>>>\
    \ # Add another element\n... d['Ella'] = 31\n>>> d\n{'Fred': 44, 'Ella': 31}\n\
    >>> print(d)\n{'Fred': 44, 'Ella': 31}\n```"
