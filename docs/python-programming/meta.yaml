  md: 'So we up with a transformation that looks like this:


    ![](img/4e4fc350228cd1c84055205e597f4fc0_276_0.png)


    There are other similar representations of the same, but with this type of model,
    the colours are split into their categories in a more convenient way. For example
    one can obtain all the reds which include the light and dark reds, but seeking
    a hue that is close to 0 degrees, say <30% and > 330% on the polar scale.


    In OpenCV, Hue has values from 0 to 180, Saturation and Value from 0 to 255. Thus,
    OpenCV uses HSV ranges between (0-180, 0-255, 0-255).


    So with our original apple image we could transform the BRG image to an HSV image.
    With the HSV image we then create a mask image and finally and extract the reds
    from this using the mask as follows:


    ```

    python

    import cv2


    img = cv2.imread(base_path + ''assets/apple_colour.png'')

    img_hsv = cv2.cvtColor(img, cv2.COLOR_BGR2HSV)

    hue_low, hue_high = 160, 180  # hugh for reds

    img_mask = cv2.inRange(img_hsv, (hue_low,0,0), (hue_high, 255,255))

    img_result = cv2.bitwise_and(img, img, mask=img_mask)


    cv2.imshow(''image'', img)

    cv2.imshow(''hsv image'', img_hsv)

    cv2.imshow(''mask image'', img_mask)

    cv2.imshow(''result image'', img_result)

    cv2.waitKey(0)

    ```


