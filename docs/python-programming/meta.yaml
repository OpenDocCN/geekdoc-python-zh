  mdcn: "## 网页抓取\n\n至此，我们已拥有强大的计算能力。我们还掌握了设备间通信的方法。现在，我们了解了用于I/O连接的异步方法，这些连接可能导致瓶颈。\n\
    \n各种系统将数据推送到网络这个生态系统中，而这些系统可以提取数据。例如，我们可以使用设备浏览网页，但我们也有自动化工具。\n\n我们已经研究过`requests`模块，它使用户能够以文本、JSON或二进制格式检索数据，这在许多情况下都很有用。\n\
    \n我们还可以通过应用程序编程接口（API）进行连接，并更高效地收集数据。\n\n然而，使用`selenium`和`beautiful soup`等模块，还有强大的替代方法。我们将概述这些方法，讨论何时可能更倾向于使用某种机制而非另一种，并考虑“糟糕，他们重新设计了”这个问题。\n\
    \n## Selenium\n\n根据官方网站，“*selenium自动化浏览器。仅此而已。你如何使用这个能力完全取决于你*”。\n\n我们首先想尝试的是selenium模块中相当于“hello\
    \ world”的操作。那么让我们尝试打开一个网页：\n\n```python\nfrom selenium import webdriver\nfrom\
    \ selenium.webdriver.chrome.service import Service\nfrom webdriver_manager.chrome\
    \ import ChromeDriverManager\nimport time\n\nservice=Service(ChromeDriverManager().install())\n\
    driver = webdriver.Chrome(service=service)\n\nurl = \"http://www.spacegoo.com/solar_system/\"\
    \n\ndriver.get(url)\ntime.sleep(30)\n```\n\n首先需要注意的是，selenium包比我们之前见过的其他包需要更多的导入。\n\
    \n这是因为Selenium模块需要考虑市场上所有可用的浏览器（chrome、firefox、edge等）以及浏览器的所有不同版本。所以这本身就是一个庞大的任务，因此是模块使用场景的一个典型例子。\n\
    \n事实上，hello world示例需要3个导入：\n\n1.  Selenium - selenium模块\n2.  Service - 选择chrome浏览器\n\
    3.  ChromeDriverManager - 获取最新版本\n\n第一个是webdriver工具本身。第二和第三个导入步骤选择要自动化的*哪个浏览器*，以及用于所选浏览器*最新版本*的便捷工具。\n\
    \n在引入管理器工具（在selenium版本4中引入）之前，用户需要指向PC上的驱动程序文件路径，并且当浏览器升级时，代码需要更新。\n\n对于我们检测到的每个掩码，我们需要找到对象在图像中的位置。为此，我们需要找到轮廓并围绕它近似一个边界框，以便我们可以找到对象的位置。\n\
    \n为此，我们可以创建一个像这样的轮廓函数：\n\n```python\ndef get_contours(img):\n    contours, hierachy\
    \ = cv2.findContours(img,\n                                         cv2.RETR_EXTERNAL,\
    \ cv2.CHAIN_APPROX_NONE)\n    for cnt in contours:\n        area = cv2.contourArea(cnt)\n\
    \        print(area)\n        if area>500:\n            cv2.drawContours(img_result,\
    \ cnt, -1, (255,0,0), 3)\n            peri = cv2.arcLength(cnt, True)\n      \
    \      approx = cv2.approxPolyDP(cnt, 0.02*peri, True)\n            x,y,w,h =\
    \ cv2.boundingRect(approx)\n```\n\n这基本上使我们能够显示笔周围的轮廓。\n\n结果看起来令人满意，因为我们可以看到笔被红色边框高亮显示。所以下一个任务是识别区域的顶部，因为这是我们打算在屏幕上绘制的地方。\n\
    \n我们可以通过向我们之前创建的轮廓函数添加一个返回值来实现这一点，使用这行代码。\n\n```\nreturn x+w//2, y + h//10\n```\n\
    \nx + w/2是左上角加上一半的宽度，这是水平中心点。同样，对于垂直方向，我们使用y和十分之一的高度，这样我们就靠近笔尖了。（记住，在大多数绘图模块中，高度是从顶部向下开始的。）\n\
    \n我们可以将这些返回值解析回`find_color()`函数，并通过添加此代码在这些点绘制圆圈：\n\n```\nx, y = get_contours(mask)\n\
    cv2.circle(img_result, (x,y), 10 , (0,0,255), cv2.FILLED)\n```\n\n这再次产生了令人满意的结果。\n\
    \n下一个阶段是将红色圆圈更改为笔的颜色。最简单的方法是扩展`my_colors`字典，为每支笔包含一种颜色。\n\n```python\nmy_colors\
    \ = {'blue':\n    {'lower':lower_blue, 'upper':upper_blue, 'value':[255,0,0]},\n\
    \    'Green':\n    {'lower':lower_green, 'upper':upper_green, 'value':[0,255,0]}}\n\
    ```\n\n这意味着我们已方便地将值作为字典的一部分解析回`find_color()`函数。字典是此类用途的绝佳工具，因为它们可扩展且速度快。\n\n最后的任务是将这些点捕获到一个列表中，以便我们可以存储并将它们绘制到屏幕上。列表需要包含屏幕上的(x,\
    \ y)位置及其颜色。因此列表中的每个项目将是一个像这样的元组：(x, y, colour)。\n\n我们需要创建一个绘制函数，将存储在列表中的项目绘制到画布上，这是通过此函数完成的：\n\
    \n```python\ndef draw_on_canvas(my_points):\n    for p in my_points:\n       \
    \ cv2.circle(img_result, (p[0], p[1]), 10, p[2], cv2.FILLED)\n```\n\n为完整起见，我们展示整个代码，长度不到80行。\n\
