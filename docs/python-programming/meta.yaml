- md: "## 11.4. USING DICTIONARIES\n\n```python\n>>> d = dict(zip(names, numbers))\n\
    >>> d\n{'Zoe': 2012, 'Owen': 5003, 'Fred': 4174, 'Ella': 2287}\n```\n\nThe elements\
    \ of the list specified as the first actual parameter to zip become the dictionary\
    \ keys, and the elements of the list specified as the second argument to zip form\
    \ the values in the dictionary. As we noted earlier, the ordering of the key:\
    \ value pairs is different from their order in the original lists, but the first\
    \ element from the names list is paired with the first element of the numbers\
    \ list, the second element from names is paired with the second element of numbers,\
    \ and so forth.\n\nA dictionary is sometimes called an associative array because\
    \ its elements (values) are associated with keys instead of indices. The placement\
    \ and lookup of an element within a dictionary uses a process known as hashing.\
