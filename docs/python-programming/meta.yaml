- md: "## Asynchronous\n\nIn the websockets chapter we came across a function that\
    \ we have not seen before. The usual format for a function is as follows.\n\n\
    ```python\ndef normal_function(a, b):\n    \"\"\" this is a normal function \"\
    \"\"\n    c = a + b\n    return c\n```\n\nBut we now see a function definition\
    \ preceded by the keyword `async` and we also see the `await` keyword.\n\n```python\n\
    async def normal_function(a, b):\n    \"\"\" this is a normal function \"\"\"\n\
    \    c = a + b\n    await asyncio.sleep(0)\n    return c\n```\n\nSometimes we\
    \ want to run routines at the same time. We do not want to wait for one to finish\
    \ before starting the next. A real world example of an asynchronous process might\
    \ be making a cup of tea. If we switch the kettle on first then we can prepare\
    \ the tea cups with bags, milk and sugar whilst the kettle is boiling. We were\
    \ able to do two processes at the same time which saved time.\n\nThe await keyword\
    \ is where the process can hand over control to another process and in the case\
    \ of the tea example, it would logically occur once the kettle was switched on.\
    \ We now have two processes running simultaneously [1] the kettle boiling, [2]\
    \ the cups being prepared.\n\nThese routines that are run at the same time are\
    \ termed coroutines and require some use of asynchronous input and output (Async\
    \ IO) in Python. Async IO is related to multiprocessing and threading in the sense\
    \ that languages need some kind of process that **does not block code execution**\
    \ whilst other parts of the code run. And this is what python has to offer, so\
    \ let’s get a deeper understanding.\n\n| Async type | cpu | description |\n| :---\
    \ | :--- | :--- |\n| Parallelism (multiprocessing) | many | spreading tasks over\
    \ a computer cpu (or cores) |\n| Concurrency | one | multiple tasks have the ability\
    \ to run in an overlapping manner (controlled by code). |\n| Threading | one |\
    \ multiple threads take turns executing tasks. One process can contain multiple\
    \ threads. |\n\nA coroutine is a function that can suspend its execution before\
    \ reaching return, and it can indirectly pass control to another coroutine for\
    \ some time.\n\nBefore we get to this point we have to understand that this is\
    \ a new technology (python 3.7 and above) which has been built from existing tech\
    \ and we are only looking at the top level as a deep dive would require a book\
    \ in itself. The components to understand are:\n\n- 1. The async ecosystem\n-\
    \ 2. The event loop (all languages)\n- 3. Using coroutines\n- 4. How coroutines\
    \ work\n- 5. What comes included in the ecosystem\n- 6. Typical web applications\n\
    - 7. Interacting with the blocking world\n- 8. Error handling, testing, debugging\n\
    \nEach of the asynchronous methods has its advantages and disadvantages. **With\
    \ multiprocessing**, the user is able to use multiple processors at any point\
    \ in time, but the con is that processors are limited. **With threading** the\
    \ user has an easy way of sharing processes on the same thread but the con is\
    \ that the computer takes control of when this happens which can give rise to\
    \ race conditions. **With asyncio** the user can achieve the same as threading\
    \ and also keep control, but the con is that the functions need to be defined\
    \ as async and there are additional keywords and terminology to use.\n\nHere is\
    \ a classic example of race conditions in threading which gives rise to additional\
    \ implementations being required and ultimately asyncio.\n\n```python\nimport\
    \ threading\nimport time\n\nx = 10\n\ndef increment(by):\n    global x\n\n   \
    \ local_counter = x\n    local_counter += by\n\n    time.sleep(1)\n\n    x = local_counter\n\
    \    print(f'{threading.current_thread().name} inc x {by}, x: {x}')\n```\n\nThe\
    \ has the advantage that it pushes messages between the **server** and the **client**\
    \ *on demand* as they need them.\n\nSo let's look at the basic setup for both\
    \ sides:\n\n- Server\n- Client\n\nHere's a WebSocket server example.\n\n```python\n\
    import asyncio\nimport websockets\n\nasync def hello(websocket, path):\n    name\
    \ = await websocket.recv()\n    print(f\"< {name}\")\n\n    greeting = f\"Hello\
    \ {name}!\"\n\n    await websocket.send(greeting)\n    print(f\"> {greeting}\"\
    )\n\nstart_server = websockets.serve(hello, \"localhost\", 8765)\n\nasyncio.get_event_loop().run_until_complete(start_server)\n\
    asyncio.get_event_loop().run_forever()\n```\n\nAnd here is the corresponding client\
    \ example.\n\n```python\nimport asyncio\nimport websockets\n\nasync def hello():\n\
    \    uri = \"ws://localhost:8765\"\n    async with websockets.connect(uri) as\
    \ websocket:\n        name = input(\"What's your name? \")\n\n        await websocket.send(name)\n\
    \        print(f\"> {name}\")\n\n        greeting = await websocket.recv()\n \
    \       print(f\"< {greeting}\")\n\nasyncio.get_event_loop().run_until_complete(hello())\n\
    ```\n\nAnd this was all that we needed to have a server-client connection.\n\n\
    In the example given, both pieces of code are run at the same time. **The server**\
    \ sits and waits for the connection to be made. **The client** connects to the\
    \ server (on localhost:8765 in the example) and sends the string name. If **the\
    \ server** receives a message, then it sends a reply back. And finally, **the\
    \ client** receives the reply.\n\nSo the example did this:\n\nWhilst the example\
    \ is basic, it contains all that is necessary for both the client and the server\
    \ to talk to each other. Processes could be done at either end and the results\
    \ sent back to the other one.\n\nThis means that we could, for example, send small\
    \ bits of information from the client to the server and have the server compute\
    \ a heavy process (like a heavy duty cloud server) or alternatively the other\
    \ way around if we chose to.\n\nSo we could have our functions and modules live\
    \ on the server. This is, in fact, the basis for the internet and how our web\
    \ browsers and mobile devices interact.\n\nHere is some code where the server\
    \ sends messages which are accessed by a browser. In the case of the example it\
    \ is just sending the current time every 3 seconds, but similar methods could\
    \ be used to stream stock prices, news headlines, security data and any other\
    \ data that is dynamic.\n\n```python\nimport asyncio\nimport datetime\nimport\
    \ random\nimport websockets\n\nasync def time(websocket):\n    while True:\n \
    \       now = datetime.datetime.utcnow().isoformat() + \"Z\"\n        await websocket.send(now)\n\
    \        await asyncio.sleep(random.random() * 3)\n\nstart_server = websockets.serve(time,\
    \ \"127.0.0.1\", 5678)\n\nasyncio.get_event_loop().run_until_complete(start_server)\n\
    asyncio.get_event_loop().run_forever()\n```\n\nAnd this is the HTML page that\
    \ reads the same data and will open in any standard browser.\n\n```html\n<!DOCTYPE\
    \ html>\n<html>\n    <head>\n        <title>WebSocket demo</title>\n    </head>\n\
    \    <body>\n        <script>\n            var ws = new WebSocket(\"ws://127.0.0.1:5678/\"\
    ),\n                messages = document.createElement('ul');\n            ws.onmessage\
    \ = function (event) {\n                var messages = document.getElementsByTagName('ul')[0],\n\
    \                    message = document.createElement('li'),\n               \
    \     content = document.createTextNode(event.data);\n                message.appendChild(content);\n\
    \                messages.appendChild(message);\n            };\n            document.body.appendChild(messages);\n\
    \        </script>\n    </body>\n</html>\n```\n\nYou will notice that the body\
    \ of the code contains a script tag which contains javascript which as we are\
    \ now aware is similar to python in many ways but gets its syntax of curly braces\
    \ and semicolons from the c family of languages.\n\nWith this HTML containing\
    \ javascript, we are able to see the time stream down the screen every 3 seconds.\n\
    \nGenerally speaking, a mobile device, which is low powered, is the **client**.\
    \ On the other hand, the web host, which has a lot of power, is the **server**.\
    \ So our low powered device sends lightweight messages (instructions) to the hosts\
    \ server.\n\nAnd large processes which consume a lot of energy can occur at the\
    \ server end. These are then sent back to the mobile device, which means that\
    \ the small batteries in mobile phones are sufficient."
  mdcn: "## 异步\n\n在 WebSockets 章节中，我们遇到了一个之前未曾见过的函数。函数的通常格式如下。\n\n```python\ndef normal_function(a,\
    \ b):\n    \"\"\" this is a normal function \"\"\"\n    c = a + b\n    return\
    \ c\n```\n\n但现在我们看到一个以关键字 `async` 开头的函数定义，并且还看到了 `await` 关键字。\n\n```python\nasync\
    \ def normal_function(a, b):\n    \"\"\" this is a normal function \"\"\"\n  \
    \  c = a + b\n    await asyncio.sleep(0)\n    return c\n```\n\n有时我们希望同时运行多个例程，而不希望等待一个完成后再开始下一个。异步过程的一个现实世界例子可能是泡茶。如果我们先打开水壶，那么在水壶烧水的同时，我们可以准备茶杯，放入茶包、牛奶和糖。我们能够同时进行两个过程，从而节省了时间。\n\
    \n`await` 关键字是过程可以将控制权移交给另一个过程的地方，在泡茶的例子中，逻辑上它会在水壶打开后发生。我们现在有两个过程同时运行：[1] 水壶烧水，[2]\
    \ 准备茶杯。\n\n这些同时运行的例程被称为协程，并且需要在 Python 中使用一些异步输入输出（Async IO）。Async IO 与多进程和线程相关，因为语言需要某种**不阻塞代码执行**的过程，以便代码的其他部分可以运行。这就是\
    \ Python 所提供的，所以让我们更深入地理解它。\n\n| 异步类型 | CPU | 描述 |\n| :--- | :--- | :--- |\n|\
    \ 并行（多进程） | 多个 | 将任务分布到计算机 CPU（或核心）上 |\n| 并发 | 一个 | 多个任务能够以重叠的方式运行（由代码控制）。 |\n\
    | 线程 | 一个 | 多个线程轮流执行任务。一个进程可以包含多个线程。 |\n\n协程是一种可以在到达 `return` 之前挂起执行的函数，它可以间接地将控制权传递给另一个协程一段时间。\n\
    \n在我们深入之前，必须理解这是一种新技术（Python 3.7 及以上版本），它建立在现有技术之上，我们只关注顶层，因为深入探讨本身就需要一本书。需要理解的组件包括：\n\
    \n- 1. 异步生态系统\n- 2. 事件循环（所有语言）\n- 3. 使用协程\n- 4. 协程如何工作\n- 5. 生态系统中包含什么\n- 6. 典型的\
    \ Web 应用程序\n- 7. 与阻塞世界交互\n- 8. 错误处理、测试、调试\n\n每种异步方法都有其优点和缺点。**使用多进程**，用户可以在任何时间点使用多个处理器，但缺点是处理器数量有限。**使用线程**，用户可以轻松地在同一线程上共享进程，但缺点是计算机控制何时发生这种情况，这可能导致竞态条件。**使用\
    \ asyncio**，用户可以实现与线程相同的功能并保持控制权，但缺点是函数需要定义为 `async`，并且需要使用额外的关键字和术语。\n\n这是一个线程中竞态条件的经典例子，它导致需要额外的实现，并最终催生了\
    \ asyncio。\n\n```python\nimport threading\nimport time\n\nx = 10\n\ndef increment(by):\n\
    \    global x\n\n    local_counter = x\n    local_counter += by\n\n    time.sleep(1)\n\
    \n    x = local_counter\n    print(f'{threading.current_thread().name} inc x {by},\
    \ x: {x}')\n```\n\n它的优点在于可以根据**服务器**和**客户端**的需要*按需*推送消息。\n\n那么让我们看看双方的基本设置：\n\n\
    - 服务器\n- 客户端\n\n这是一个 WebSocket 服务器示例。\n\n```python\nimport asyncio\nimport websockets\n\
    \nasync def hello(websocket, path):\n    name = await websocket.recv()\n    print(f\"\
    < {name}\")\n\n    greeting = f\"Hello {name}!\"\n\n    await websocket.send(greeting)\n\
    \    print(f\"> {greeting}\")\n\nstart_server = websockets.serve(hello, \"localhost\"\
    , 8765)\n\nasyncio.get_event_loop().run_until_complete(start_server)\nasyncio.get_event_loop().run_forever()\n\
    ```\n\n这是相应的客户端示例。\n\n```python\nimport asyncio\nimport websockets\n\nasync def\
    \ hello():\n    uri = \"ws://localhost:8765\"\n    async with websockets.connect(uri)\
    \ as websocket:\n        name = input(\"What's your name? \")\n\n        await\
    \ websocket.send(name)\n        print(f\"> {name}\")\n\n        greeting = await\
    \ websocket.recv()\n        print(f\"< {greeting}\")\n\nasyncio.get_event_loop().run_until_complete(hello())\n\
    ```\n\n这就是我们建立服务器-客户端连接所需的全部内容。\n\n在给定的示例中，两段代码同时运行。**服务器**坐着等待连接建立。**客户端**连接到服务器（在示例中是\
    \ localhost:8765）并发送字符串名称。如果**服务器**收到消息，它会发送回复。最后，**客户端**接收回复。\n\n所以这个例子做了这个：\n\
    \n虽然这个例子很基础，但它包含了客户端和服务器相互通信所需的一切。可以在任一端进行处理，并将结果发送回另一端。\n\n这意味着我们可以，例如，从客户端向服务器发送少量信息，并让服务器计算一个繁重的过程（比如一个强大的云服务器），或者如果我们选择的话，也可以反过来。\n\
    \n所以我们可以让我们的函数和模块存在于服务器上。事实上，这就是互联网的基础，也是我们的网络浏览器和移动设备如何交互的基础。\n\n这是一些代码，其中服务器发送消息，由浏览器访问。在示例的情况下，它只是每\
    \ 3 秒发送一次当前时间，但类似的方法可用于流式传输股票价格、新闻标题、安全数据和任何其他动态数据。\n\n```python\nimport asyncio\n\
    import datetime\nimport random\nimport websockets\n\nasync def time(websocket):\n\
    \    while True:\n        now = datetime.datetime.utcnow().isoformat() + \"Z\"\
    \n        await websocket.send(now)\n        await asyncio.sleep(random.random()\
    \ * 3)\n\nstart_server = websockets.serve(time, \"127.0.0.1\", 5678)\n\nasyncio.get_event_loop().run_until_complete(start_server)\n\
    asyncio.get_event_loop().run_forever()\n```\n\n这是读取相同数据的 HTML 页面，可以在任何标准浏览器中打开。\n\
    \n```html\n<!DOCTYPE html>\n<html>\n    <head>\n        <title>WebSocket demo</title>\n\
    \    </head>\n    <body>\n        <script>\n            var ws = new WebSocket(\"\
    ws://127.0.0.1:5678/\"),\n                messages = document.createElement('ul');\n\
    \            ws.onmessage = function (event) {\n                var messages =\
    \ document.getElementsByTagName('ul')[0],\n                    message = document.createElement('li'),\n\
    \                    content = document.createTextNode(event.data);\n        \
    \        message.appendChild(content);\n                messages.appendChild(message);\n\
    \            };\n            document.body.appendChild(messages);\n        </script>\n\
    \    </body>\n</html>\n```\n\n你会注意到代码的主体包含一个 `script` 标签，其中包含 JavaScript，我们现在知道它在许多方面与\
    \ Python 相似，但其花括号和分号的语法来自 C 语言家族。\n\n有了这个包含 JavaScript 的 HTML，我们就能看到时间每 3 秒在屏幕上流动一次。\n\
    \n一般来说，低功耗的移动设备是**客户端**。另一方面，拥有强大能力的网络主机是**服务器**。所以我们低功耗的设备向主机服务器发送轻量级消息（指令）。\n\
    \n而消耗大量能源的大型处理可以在服务器端进行。然后这些处理结果被发送回移动设备，这意味着手机中的小电池就足够了。"
