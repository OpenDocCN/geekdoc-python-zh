    \n## 双摆\n\n双摆直接源于单摆的概念。\n\n众所周知，单摆是一个极好的计时器，因为无论单摆以何种振幅开始摆动，从一端到另一端的给定摆动（时钟的滴答声）所花费的时间都是恒定的。事实上，我们能够从基本原理证明，恒定时间\
    \ T 遵循以下公式。\n\n$$T = 2\\pi \\sqrt{\\frac{L}{g}}$$\n\n其中 L 是摆长，g 是重力（在地球表面是恒定的）。我们看到，唯一能控制的、决定周期\
    \ T 的物理因素是摆长 L。\n\n我们可以利用作用在摆上的基本力和牛顿运动定律完成上述所有操作。\n\n![](img/4e4fc350228cd1c84055205e597f4fc0_224_0.png)\n\
    \n然而，双摆是一个经典的物理问题，它产生了一个混沌运动的例子，而人们原本可能预期的是有序运动。特别是，因为双摆的设置看起来与其单摆兄弟非常相似。\n\n\
    ![](img/4e4fc350228cd1c84055205e597f4fc0_225_0.png)\n\n这个问题背后的数学很冗长，但本质上我们有每个摆锤的位置和速度。\n\
    \n位置：\n\n- $(x_1,y_1) = (L_1\\sin\\theta_1 , L_1\\cos\\theta_1)$\n- $(x_2,y_2)\
    \ = (L_1\\sin\\theta_1 + L_2\\sin\\theta_2, - L_2\\cos\\theta_1 - L_2\\cos\\theta_2\
    \ )$\n\n速度：\n\n- $(\\underline{x}_1,\\underline{y}_1) = (L_1\\underline{\\theta}_1\\\
    cos \\theta_1, L_1\\underline{\\theta}_1\\sin \\theta_1)$\n- $(\\underline{x}_2,\\\
    underline{y}_2) = (L_1\\underline{\\theta}_1\\cos\\theta_1 + L_2\\underline{\\\
    theta}_2\\cos\\theta_2 , L_1\\underline{\\theta}_1\\sin\\theta_1 + L_2\\underline{\\\
    theta}_2\\sin\\theta_2)$\n\n其中 $\\underline{x} = \\frac{dx}{dt}$ 且 $\\underline{\\\
    theta} = \\frac{d\\theta}{dt}$\n\n根据以上信息，我们可以计算出两个摆锤的势能和动能，已知：\n\n$$ke = \\frac{1}{2}mv^2$$\
    \ 且 $$pe = mgh$$\n\n我们知道能量是守恒的，因此：\n\n$$ke + pe = Constant$$，这是哈密顿力学中系统的总能量。\n\
    \n然而，对于双摆，我们使用拉格朗日力学，即 ke - pe，代表能量之差。所以我们说：\n\nL = ke - pe\n\n这适用于欧拉-拉格朗日方程：\n\
    \n$$\\frac{d}{dt}\\left(\\frac{dL}{dq}\\right) = \\frac{dL}{dq}$$\n\n这给出了系统的运动方程，而无需考虑系统中的各个力。\n\
    \n经过一些微积分和代数运算，我们得到了两个涉及二阶导数的冗长方程。但既然我们知道二阶导数是对一阶导数的导数，我们就可以将其放入代码中。\n\n我们从打算使用的导入开始：\n\
    \n```python\nfrom numpy import sin, cos\nimport numpy as np\nimport matplotlib.pyplot\
