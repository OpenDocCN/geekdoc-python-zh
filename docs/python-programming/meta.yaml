- md: "## 11.2. ARBITRARY ARGUMENT LISTS\n\nWe can easily write a function that adds\
    \ two numbers; consider the following sum function:\n\n```python\ndef sum(a, b):\n\
    \    return a + b\n```\n\nWhat if we need sum to be flexible enough to add two\
    \ or three numbers? We can implement such a function with default arguments (Section\
    \ 8.2). Next code illustrates such a function:\n\n```python\ndef sum(a, b, c=0):\n\
    \    return a + b + c    # Adding zero will not affect a + b\nprint(sum(3, 4))\n\
    print(sum(3, 4, 5))\n```\n\nThe sum function in the above code handles two and\
    \ three arguments equally well:\n\n```\n7\n12\n```\n\nA function that is capable\
    \ of adding up to five numbers is equally easy:\n\n```python\ndef sum(a, b=0,\
    \ c=0, d=0, e=0):\n    return a + b + c + d + e\n```\n\nSuppose we wish to write\
    \ a sum function that can add as many numbers as the caller can supply? The default\
    \ parameter approach is not practical in this situation.\n\nOur function must\
    \ be able to handle 1,000 numbers or more, and these numbers must be separate\
    \ arguments—not a single list containing 1,000 numbers.\n\nWhen we define a function\
    \ we specify the individual parameters it accepts, providing default values as\
    \ needed. In the function definitions we have seen to this point the number of\
    \ parameters is fixed. We need a way to define a function in such a way so that\
    \ it can accept an arbitrary number of parameters. Fortunately Python has a mechanism\
    \ for specifying that a function can accept an arbitrary number of parameters.\
    \ Next code illustrates how to write such a function.\n\n```python\ndef sum(*nums):\n\
    \    s = 0        # Initialize sum to zero\n    for num in nums:    # Consider\
    \ each argument passed to the function\n        s += num        # Accumulate their\
    \ values\n    return s        # Return the sum\nprint(sum(3, 4))\nprint(sum(3,\
    \ 4, 5))\nprint(sum(3, 3, 3, 3, 3, 4, 1, 9, 44, -2, 8, 8))\n```\n\nOutput:\n\n\
    ```\n7\n12\n84\n```\n\nThe single asterisk (*) before the formal parameter nums\
    \ indicates the parameter is not necessarily a single value but potentially a\
    \ collection of values. Next the code reveals what really is going on behind the\
    \ scenes.\n\n```python\ndef sum(*nums):\n    print(nums)           # See what\
    \ nums really is\n    s = 0                 # Initialize sum to zero\n    for\
    \ num in nums:      # Consider each argument passed to the function\n        s\
    \ += num          # Accumulate their values\n    return s              # Return\
    \ the sum\nprint(sum(3, 4))\nprint(sum(3, 4, 5))\nprint(sum(3, 3, 3, 3, 4, 1,\
    \ 9, 44, -2, 8, 8))\n```\n\nOutput:\n\n```\n(3, 4)\n7\n(3, 4, 5)\n12\n(3, 3, 3,\
    \ 3, 4, 1, 9, 44, -2, 8, 8)\n84\n```\n\nAbove the code exposes the fact that the\
    \ formal parameter nums is a tuple wrapping all the actual parameters sent by\
    \ the caller. Since nums is simply a tuple, we can iterate over it with the for\
    \ statement to extract all the actual parameters provided by the caller.\n\nA\
    \ function definition may contain at most one of these parameters that represents\
    \ a tuple of arguments, and, if present, this parameter must appear after all\
    \ the named, single formal parameters, if any. In the following sum function,\
    \ callers must provide at least two parameters but may pass more:\n\n```python\n\
    def sum(num1, num2, *extranums):\n    s = num1 + num2\n    for n in extranums:\n\
    \        s += n\n    return s\n```\n\nNote that the formal parameters num1 and\
    \ num2 must appear before *extranums in sum's formal parameter list.\n\nAs we\
    \ have seen, a formal parameter declared with an asterisk is really a tuple from\
    \ the function's perspective. The caller can pass individual arguments not packed\
    \ within a tuple. The Python interpreter takes care of packing the caller's arguments\
    \ into a tuple during the call. This process works in reverse also. Consider the\
    \ following function that accepts four parameters:\n\n```python\ndef f(a, b, c,\
    \ d):\n    print('a =', a, ' b = ', b, ' c = ', c, ' d = ', d)\n```\n\nWe can\
    \ pass a single argument to function f if we express it in the proper way:\n\n\
    ```python\nargs = (10, 20, 30, 40)\nf(*args)\n```\n\nThe variable args is a tuple,\
    \ but f does not accept a single tuple; it accepts four parameters. Expressing\
    \ the actual parameter as *args enables the interpreter to unpack the tuple into\
    \ the four parameters the function expects. Note that the tuple must contain exactly\
    \ the number of parameters that the function expects.\n\nGiven the definition\
    \ of function f above, the following call is legal:\n\n```python\nf(*(10, 20,\
    \ 30, 40)) # Legal, unpacks the tuple into separate args\n```\n\nPython supports\
    \ a concept known as *generalized unpacking*. It extends simple unpacking by using\
    \ the asterisk to represent a collection of elements not covered by individual\
    \ variables during the unpacking. The following interactive sequence shows how\
    \ generalized unpacking can extract a prefix of a tuple, storing the remainder\
    \ of the tuple's elements in a list:\n\n```python\n>>> a = 1, 2, 3, 4, 5, 6, 7,\
    \ 8\n>>> a\n(1, 2, 3, 4, 5, 6, 7, 8)\n>>> x, y, *rest = a\n>>> x\n1\n>>> y\n2\n\
    >>> rest\n[3, 4, 5, 6, 7, 8]\n```\n\nCuriously, the elements in the remainder\
    \ of the tuple are copied into a list, not a tuple.\n\nPrefer extracting a suffix\
