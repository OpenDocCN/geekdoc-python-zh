  md: 'A computer program can be seen as a set of instructions that control the flow
    of electrical impulses within a computer system. These impulses manipulate the
    computer''s memory and interface with peripheral devices such as the display screen,
    keyboard, mouse, and potentially other computers connected over a network. Through
    this process, the computer is able to execute tasks, solve complex problems, and
    even engage in recreational activities like gaming. For instance, a program may
    enable the computer to function as a financial calculator, while another program
    could turn it into a formidable chess player. It is important to note the stark
    contrast between these two examples, which represent the spectrum of possibilities.


    At the lower, more concrete level electrical impulses alter the internal state
    of the computer, while At the higher, more abstract level computer users accomplish
    real-world work or derive actual pleasure. The illusion of higher-level functionality
    achieved by computer programs is so well-executed that most users are unaware
    of the underlying machinery. Interestingly, contemporary programmers also primarily
    write software at this higher, more abstract level. They can create sophisticated
    software without necessarily having in-depth knowledge or interest in the specific
    computer system it will run on. Advanced software development tools effectively
    shield programmers from lower-level details, enabling them to tackle problems
    using higher-level concepts. Computer programming concepts are inherently logical
    and mathematical. In theory, it is possible to develop computer programs without
    the aid of an actual computer. Programmers can analyze the feasibility, correctness,
    and efficiency of a program by examining abstract symbols representing the features
    of real-world programming languages, even if these symbols do not correspond to
    any specific language. While such exercises can be valuable, in practice, computer
    programmers work in conjunction with their machines. They write software intended
    for use on real computer systems. Software engineers, a group of computing professionals,
    develop software tailored to specific systems, which are defined by their underlying
    hardware and operating system. Developers employ concrete tools like compilers,
    debuggers, and profilers. This chapter explores the context of software development,
    encompassing computer systems and the associated tools.


    # 1.1. SOFTWARE


    A computer program is a form of computer software. While it may be referred to
    as a tangible object, software itself is intangible. Instead, it is stored on'
  merge: -1
  pgno: 22
- img_proc: true
  md: 'various types of media. Examples of such media include hard drives, CDs, DVDs,
    and USB pen drives. It’s important to note that the media itself is not the software;
    rather, the software is represented as a pattern on the media. In order to be
    utilized, software needs to be stored in the computer’s memory. Typically, computer
    programs are loaded into memory from a medium like the hard disk. On the hard
    drive, there exists an electromagnetic pattern that represents the program. This
    pattern, consisting of electronic symbols, must be transferred to the computer’s
    memory before the program can be executed. The program may have been originally
    installed on the hard disk from a CD or downloaded from the Internet. Regardless
    of the source, what gets transferred from one medium to another is a pattern of
    electronic symbols that governs the operation of the computer system.


    These patterns of electronic symbols are most effectively represented as a sequence
    of zeroes and ones, which are digits from the binary (base 2) number system. For
    instance, an example of a binary program sequence could be 10001011011000010001000000100111001010101010111.


    To the computer hardware, particularly the processor, a specific arrangement of
    zeroes and ones can signify instructions to send certain electrical signals to
    the graphics device, resulting in a designated portion of the display screen turning
    red, for example. However, it is an exceedingly rare feat for someone to manually
    generate the complete binary sequence representing the Microsoft Word program
    for an Intel-based computer running Windows 8.1. Moreover, even among those who
    possess such capability, it is unlikely that they would derive enjoyment from
    such a task.


    The Word program, designed for older Mac OS X computers using a PowerPC processor,
    follows a similar operational principle to its Windows counterpart and is developed
    by the same company. However, the binary representation of the program is entirely
    different. The Intel Core i7 processor in the Windows machine understands a distinct
    machine language compared to the PowerPC processor found in the older Mac computers.
    In essence, each processor has its own unique machine language.


    # 1.2. DEVELOPMENT TOOLS


    Developing software has been possible despite the limited number of individuals
    proficient in the machine language of computers’ processors. This is primarily
    due to the use of higher-level programming languages that allow programmers to
    express solutions to programming problems in a more human-readable format. Rather
    than dealing with complex binary'
  merge: -1
  pgno: 23
- img_proc: true
  md: 'sequences, software can be represented using printed words and symbols, making
    it more manageable for humans.


    Various tools have been created to automatically convert higher-level descriptions
    of desired functionality into the necessary lower-level code. This enables programmers
    to focus on problem-solving and expressing their ideas in a manner closer to natural
    languages such as English. Over the past six decades, a multitude of higher-level
    programming languages have been developed, including popular ones like FORTRAN,
    COBOL, Lisp, Haskell, C, Perl, C++, Java, and C#. These languages have abstracted
    the underlying hardware platform and machine language details, allowing programmers,
    especially those working on high-level applications, to work without being overly
    concerned about the intricacies of the hardware.


    By utilizing higher-level programming languages and abstraction tools, software
    development has flourished, enabling programmers to create complex systems without
    having to directly interact with machine language or processor-level code.


    Regenerate responseOne might think that ideally such a conversion tool would accept
    a description in a natural language, such as English, and produce the desired
    executable code. This is not possible today because natural languages are quite
    complex compared to computer programming languages. Programs called compilers
    that translate one computer language into another have been around for over 60
    years, but natural language processing is still an active area of artificial intelligence
    research. Natural languages, as they are used by most humans, are inherently ambiguous.
    To understand properly all but a very limited subset of a natural language, a
    human (or artificially intelligent computer system) requires a vast amount of
    background knowledge that is beyond the capabilities of today’s software. Fortunately,
    programming languages provide a relatively simple structure with very strict rules
    for forming statements that can express a solution to any problem that can be
    solved by a computer.


    Consider the following program fragment written in the Python programming language:


    ```

    abc = 2

    def = 3

    Total = abc + def

    ```


