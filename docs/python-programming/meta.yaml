  - '[PAGE 300]


    # Automation processes


    Getting data is important. Infact, aside from setting up the environment it is
    the first task that a process usually has whether that is in data science or any
    other field.


    There are some key aspect of data acquisition that one needs to consider:


    +   - Quantity of data

    - Speed (latency) of transfer

    - Complexity of the data

    - Easy of access

    - Evolution of the source


    The above are some headline considerations, but can be further broken down which
    is why it was prudent to pause on the selenium and beautiful soup modules.


    **Quantity:**

    Some pieces of data might only be a few lines. For example the price of a particular
    item in a supermarket. This might be in the form of a web query where we would
    use the requests module.


    We might also have light data in the form of the price of a particular stock,
    but this would be continuously changing throughout the course of the day, which
    would be more suited to a websocket.


    **Speed:**

    Aside from the volume of data requested, various sources take different lengths
    of time to be acquired into the system. For example reading a csv file via the
    pandas or csv modules is a relatively fast process compared to an http request
    via the web.


    If a user was to make many http requests, then they would need to consider asynchronous
    methods (such as asyncio, threading or multiprocessing) such that the requests
    do not block each other.'
  - '[PAGE 301]


    We call this “speed” the **latency** of the network which involves the round trip
    of the data request and receiving the data pursuant to the request.


    ![](img/4e4fc350228cd1c84055205e597f4fc0_301_0.png)


    So reading a file is low latency whereas reading a web page is high latency.


    **complexity:**

    Next we need to consider the complexity of the data. This will encompass factors
    like which format does the data come in, for example text, csv or json and also
    how structured in the data.


    A flat csv file will read very quickly into a pandas dataframe, whereas a json
    file is larger, but may contain richer content such as many nested levels.


    We also need to consider encoding of the data and if omitted it would break or
    mean something different in the selenium and bs4 modules than we may otherwise
    have expected.


    **Ease of access:**

    This aspect might seem trivial, but there are a whole host of features which prevent
    simple data transfer. This could be as simple as access to a database or a password
    or link or forwarded page in an html document where the user logs into one page
    and is sent elsewhere to a second or third page to get the data that they need.'
  - '[PAGE 302]


    Sometimes, the method of access will change when the system is updated. Like an
    upgraded API.


    The other issue is that some web hosts are averse to openly sharing data in a
    machine readable format or be scraped by bots and have measures in place to prevent
    this. The user would then have to resort to alternative measures such as a headless
    browser.


    # Evolution of the source:


    The internet, databases and other sources such as the likes of ccd arrays (ie.
    web cameras) are continually evolving. Most prominently the evolution and format
    of web pages. It is quite common to create a crawler that works very well for
    a significant period of time, but then breaks when the formatting of the web page
    changes.


    This is because a typical html document is made up from elements and with a refactoring
    of the website a number of the terms will change, just like a a refactoring of
    code might prompt the coder to modify their variable names even if it is for a
    simple reason like clarity.


    Nevertheless, if the scraping code is searching an HTML page for an element or
    xPath[28] that no longer exists and relies on this data, then the scraping code
    will be compromised.


    And this is the curse of the “whoops, they redesigned” problem.


    # The optimal tool:


    Finally, with a more complete knowledge of the products available, let''s explore
    various data sources and the appropriate Python tool for completing the task.


    | Content type | method |

    |---|---|

    | files | - Read and write with context managers.<br>- Read csv, pandas.read_csv
    |'
