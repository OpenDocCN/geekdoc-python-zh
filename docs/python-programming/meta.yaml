    # Python Basics


    With Python installed and a suitable text editor in place we are now ready to
    code. And the first place to start will be to get a hello world program working.


    This is a simple way of testing that the **environment** works.


    # Hello world


    The beauty of python, is that this can be done in one line of code. We create
    a file and give it a name, most suitably hello_world.py and off we go.


    ![](img/4e4fc350228cd1c84055205e597f4fc0_19_0.png)


    The user can then run the code and it will print to the terminal (or interactive'
  - '[PAGE 20]


