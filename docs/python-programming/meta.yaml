    \ of prey\nb = 0.1  # death rate of prey due to predation\nc = 0.5  # natural\
    \ death rate of predator\nd = 0.02  # consumed prey that give rise to predator\n\
    \n# initial conditions at time=0\nx.append(100) # prey (x)\ny.append(20)  # predator\
