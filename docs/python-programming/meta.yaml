    </body>\n</html>\n```\n\nYou will notice that the body of the code contains a\
    \ script tag which contains javascript which as we are now aware is similar to\
    \ python in many ways but gets its syntax of curly braces and semicolons from\
    \ the c family of languages.\n\nWith this HTML containing javascript, we are able\
    \ to see the time stream down the screen every 3 seconds.\n\nGenerally speaking,\
    \ a mobile device, which is low powered, is the **client**. On the other hand,\
    \ the web host, which has a lot of power, is the **server**. So our low powered\
    \ device sends lightweight messages (instructions) to the hosts server.\n\nAnd\
    \ large processes which consume a lot of energy can occur at the server end. These\
    \ are then sent back to the mobile device, which means that the small batteries\
    \ in mobile phones are sufficient.\n\n# Asynchronous\n\nIn the websockets chapter\
    \ we came across a function that we have not seen before. The usual format for\
    \ a function is as follows.\n\n```\npython\ndef normal_function(a, b):\n    \"\
    \"\" this is a normal function \"\"\"\n    c = a + b\n    return c\n```\n\nBut\
    \ we now see a function definition preceded by the keyword `async` and we also\
    \ see the `await` keyword.\n\n```\npython\nasync def normal_function(a, b):\n\
    \    \"\"\" this is a normal function \"\"\"\n    c = a + b\n    await asyncio.sleep(0)\n\
    \    return c\n```\n\nSometimes we want to run routines at the same time. We do\
    \ not want to wait for one to finish before starting the next. A real world example\
    \ of an asynchronous process might be making a cup of tea. If we switch the kettle"
