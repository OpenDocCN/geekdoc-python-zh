    # Double pendulum


    The double pendulum comes directly from the concept of the single pendulum.


    The single pendulum is known to be an excellent timekeeper due to the fact that
    the time taken for a given swing from end to end (a tick-tock in a clock) is constant
    whatever amplitude the single pendulum is started at. In fact we are able to prove
    from first principles that the constant time taken, T, follows this formula.


    $$T = 2\pi \sqrt{\frac{L}{g}}$$


    Where L is the length of the pendulum and g is the force of gravity (which is
    constant on the surface of the Earth). We see that the only physical factor that
    we can control that determines the period T is the length of the pendulum L.


    We can do all of the above knowing the basic forces that act upon the pendulum
    and Newton''s laws of motion.


    ![](img/4e4fc350228cd1c84055205e597f4fc0_224_0.png)


    However, the double pendulum is a classic Physics problem that gives rise to'
