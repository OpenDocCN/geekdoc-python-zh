  md: '# Double pendulum


    The double pendulum comes directly from the concept of the single pendulum.


    The single pendulum is known to be an excellent timekeeper due to the fact that
    the time taken for a given swing from end to end (a tick-tock in a clock) is constant
    whatever amplitude the single pendulum is started at. In fact we are able to prove
    from first principles that the constant time taken, T, follows this formula.


    $$T = 2\pi \sqrt{\frac{L}{g}}$$


    Where L is the length of the pendulum and g is the force of gravity (which is
    constant on the surface of the Earth). We see that the only physical factor that
    we can control that determines the period T is the length of the pendulum L.


    We can do all of the above knowing the basic forces that act upon the pendulum
    and Newton''s laws of motion.


    ![](img/4e4fc350228cd1c84055205e597f4fc0_224_0.png)


    However, the double pendulum is a classic Physics problem that gives rise to'
  merge: -1
  pgno: 224
- img_proc: true
  md: 'an example of chaotic motion where one might have otherwise expected order.
    In particular, because the setup of the double pendulum looks rather similar to
    its sibling.


    ![](img/4e4fc350228cd1c84055205e597f4fc0_225_0.png)


    The mathematics behind the problem are lengthy, but essentially we have positions
    and velocities for each of the pendulum bobs.


    Positions:


    +   - $(x_1,y_1) = (L_1\sin\theta_1 , L_1\cos\theta_1)$

    - $(x_2,y_2) = (L_1\sin\theta_1 + L_2\sin\theta_2, - L_2\cos\theta_1 - L_2\cos\theta_2
    )$


    Velocities:


    +   - $(\underline{x}_1,\underline{y}_1) = (L_1\underline{\theta}_1\cos \theta_1,
    L_1\underline{\theta}_1\sin \theta_1)$

    - $(\underline{x}_2,\underline{y}_2) = (L_1\underline{\theta}_1\cos\theta_1 +
    L_2\underline{\theta}_2\cos\theta_2 , L_1\underline{\theta}_1\sin\theta_1 + L_2\underline{\theta}_2\sin\theta_2)$


    Where $\underline{x} = \frac{dx}{dt}$ and $\underline{\theta} = \frac{d\theta}{dt}$'
  merge: -1
  pgno: 225
- img_proc: true
  md: 'From the above we can work out the potential energy and kinetic energy of both
    pendulum bobs knowing that:


    $$ke = \frac{1}{2}mv^2$$ and $$pe = mgh$$


    And we know that energy is conserved, such that:


    $$ke + pe = Constant$$, which is the total energy in the system known by Hamiltonian
    mechanics


    However, for the purpose of the double pendulum, one uses Lagrangian mechanics
    which is ke - pe and represents the difference in the energies. So we say that:


    L = ke - pe


    And this fits into the euler-lagrange equation:


    $$\frac{d}{dt}\left(\frac{dL}{dq}\right) = \frac{dL}{dq}$$


    Which yields the equation of motion of the system without needing to consider
    the individual forces in the system.


    After some calculus and algebra we are left with two lengthy equations that involve
    second derivatives. But since we know that the second derivative is a derivative
    on the first derivative, we can put this into the code.


    We start with imports that we intend to use:


    ```

    from numpy import sin, cos

    import numpy as np

    import matplotlib.pyplot as plt

    import scipy.integrate as integrate

    import matplotlib.animation as animation

    ```


    and set the initial conditions.


    ```

    G = 9.8 # acceleration due to gravity, in m/s^2

    L1 = 1.0 # length of pendulum 1 in m

    L2 = 1.0 # length of pendulum 2 in m

    M1 = 1.0 # mass of pendulum 1 in kg

    ```'
  merge: -1
  pgno: 226
- img_proc: true
  md: "```\nM2 = 1.0  # mass of pendulum 2 in kg\n```\n\nNext we need a function to\
    \ deal with the derivatives in a given state.\n\n```\ndef derivs(state, t):\n\n\
    \    dydx = np.zeros_like(state)\n    dydx[0] = state[1]\n\n    delta = state[2]\
    \ - state[0]\n    den1 = (M1+M2) * L1 - M2 * L1 * cos(delta) * cos(delta)\n  \
    \  dydx[1] = ((M2 * L1 * state[1] * state[1] * sin(delta) * cos(delta)\n     \
    \           + M2 * G * sin(state[2]) * cos(delta)\n                + M2 * L2 *\
    \ state[3] * state[3] * sin(delta)\n                - (M1+M2) * G * sin(state[0]))\n\
    \               / den1)\n\n    dydx[2] = state[3]\n\n    den2 = (L2/L1) * den1\n\
    \    dydx[3] = ((- M2 * L2 * state[3] * state[3] * sin(delta) * cos(delta)\n \
    \               + (M1+M2) * G * sin(state[0]) * cos(delta)\n                -\
    \ (M1+M2) * L1 * state[1] * state[1] * sin(delta)\n                - (M1+M2) *\
    \ G * sin(state[2]))\n               / den2)\n\n    return dydx\n```\n\nWe then\
    \ need to set a range of times for the simulation and also the starting angles\
    \ and angular velocities.\n\n```\n# create a time array from 0..100 sampled at\
    \ 0.05 second steps\ndt = 0.05\nt = np.arange(0, 20, dt)\nprint(t)\n\n# th1 and\
    \ th2 are the initial angles (degrees)\n# w10 and w20 are the initial angular\
    \ velocities (degrees per second)\nth1 = 120.0\nw1 = 0.0\nth2 = -10.0\nw2 = 0.0\n\
    \n# initial state\nstate = np.radians([th1, w1, th2, w2])\n```\n\nWe then use\
    \ the scipy module to integrate the ordinary differential equation that we originally\
    \ derived."
