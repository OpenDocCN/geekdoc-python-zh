- md: '## CHAPTER 9


    ## Objects


    ## Contents


    - 9.1. Using Objects

    - 9.2. String Objects

    - 9.3. File Objects

    - 9.4. Fraction Objects

    - 9.5. Turtle Graphics Objects

    - 9.6. Graphics with tkinter Objects

    - 9.7. Other Standard Python Objects

    - 9.8. Object Mutability and Aliasing

    - 9.9. Garbage Collection

    - 9.10. Exercises


    In the hardware arena, a personal computer is built by assembling a motherboard
    (a circuit board containing sockets for a microprocessor and assorted support
    chips), a processor, memory, a video card, a disk controller, a disk drive, a
    case, a keyboard, a mouse, and a monitor. The video card by itself is a sophisticated
    piece of hardware containing a video processor chip, memory, and other electronic
    components. A technician does not need to assemble the card; the card is used
    as is off the shelf. The video card provides a substantial amount of functionality
    in a standard package. One video card can be replaced with another card from a
    different vendor or with another card with different capabilities. The overall
    computer will work with either card (subject to availability of drivers for the
    operating system) because standard interfaces allow the components to work together.


    Software development today is increasingly component based. Software components
    are used like hardware components. A software system can be built largely by assembling
    pre-existing software building blocks. Python supports various kinds of software
    building blocks. The simplest of these is the function that we investigated in
    Chapter 6 and Chapter 7. A more powerful technique uses software objects.


    Python is object oriented. Most modern programming languages support object-oriented
    (OO) development to one degree or another. An OO programming language allows the
    programmer to define, create, and manipulate objects. Objects bundle together
    data and functions. Like other variables, each Python object has a type, or class.
    The terms class and type are synonymous. In this chapter we explore some of the
    classes available in the Python standard library.


    ## 9.1. USING OBJECTS


    An object stands as an exemplar of a class. While we’ve been employing objects
    from the outset, we’ve yet to exploit the full spectrum of capabilities that objects
    offer. In Python, integers, floating-point numbers, strings, and functions all
    assume the form of objects. Excluding function objects, we’ve interacted with
    these objects as inert data entities. We can assign an integer value to a variable
    and subsequently utilize the variable’s assigned value. We have the ability to
    perform addition on floating-point numbers and concatenate strings through the
    + operator. Objects can be furnished as arguments to functions, and functions
    in turn can yield objects as return values. In the realm of object-oriented programming,
    the approach transcends regarding data as passive entities and functions as active
    agents solely manipulating data. Instead, data and functions are united into cohesive
    software entities known as objects. A prototypical object comprises two fundamental
    constituents: data and methods. The data component of an object encompasses its
    instance variables. The nomenclature “instance variable” arises from the notion
    that the data is represented by a variable owned by a specific object, and an
    object itself embodies an instance of a class. Synonyms for instance variables
    include “attributes” and “fields.” Methods, akin to functions, are also referred
    to as operations. The amalgamation of instance variables and methods within an
    object collectively constitutes the object’s components. The section of code that
    employs an object is denoted as the object’s client. It can be stated that an
    object extends its services to its clients. The services rendered by an object
    can exhibit a higher level of sophistication than those of elementary functions
    due to the convenience offered by objects in persistently storing data within
    their instance variables.


    ## 9.2. STRING OBJECTS


    We have been using string objects—instances of class str—for some time. Objects
    bundle data and functions together, and the data that comprise a string consist
    of the sequence of characters that make up the string. We now turn our attention
    to string methods. The following example shows how a programmer can use the upper
    method available to string objects.


    This code prompts the user to enter their name, stores the input in the variable
    name, and then prints out a greeting message that includes the name in uppercase
    letters. The upper() function is used to convert the name to uppercase before
    displaying it in the message.


    Here’s how the code works:


    1. The input() function prompts the user to enter their name. The input is stored
    in the variable name.

    2. The print() function is used to display a greeting message. The message includes
    the value of name converted to uppercase using the upper() function.


    So, if a user enters “John” as their name, the output would be:


    ```

    Please enter your name: John

    Hello John, how are you?

    ```


    The expression


    ```

    name.upper()

    ```


    within the print statement represents a method call. The general form of a method
    call is


    ![](img/1dbe1e06b9d31a6f7ada030324ed273a_270_0.png)


    - Object is an expression that represents an object. In the example in Listing
    9.1 (stringupper.py), name is a reference to a string object.

    - The period, pronounced dot, associates an object expression with the method
    to be called.

    - Methodname is the name of the method to execute.

    - The parameterlist is a comma-separated list of parameters to the method. For
    some methods the parameter list may be empty, but the parentheses always are required.
    The parameter list for a method call works exactly like the parameter list for
    a function call.


    Except for the object prefix, a method call works like a function call. It can
    return a value to its caller.


    The upper method returns a new string. The upper method does not affect the object
    upon which it is called; this means name.upper() does not modify the name object.


    A method may accept parameters. The following code uses the rjust string method
    to right justify a string padded with a specified character.


    ```

    word = "ABCD"

    print(word.rjust(10, "*"))

    print(word.rjust(3, "*"))

    print(word.rjust(15, ">"))

    print(word.rjust(10))

    ```


    Output:


    ```

    ******ABCD

    ABCD

    >>>>>>>>>>>>ABCD

    ABCD

    ```


    Here''s an explanation of the outputs:


    1. word.rjust(10, "*"): The word "ABCD" is aligned to the right within a width
    of 10 characters, and the remaining space is filled with asterisks (''*''). The
    output is ******ABCD.

    2. word.rjust(3, "*"): The specified width is 3, which is less than the length
    of "ABCD" (4). Therefore, the word "ABCD" is printed as is, without any alignment
    or padding.

    3. word.rjust(15, ">"): The word "ABCD" is aligned to the right within a width
    of 15 characters, and the remaining space is filled with greater-than signs (''>'').
    The output is >>>>>>>>>>>>ABCD.

    4. word.rjust(10): The word "ABCD" is aligned to the right within a width of 10
    characters, using the default padding (whitespace). The output is ABCD, where
    the extra spaces are the default padding.


    ## Table 9.1. A Few of the Methods Available to str Objects


    | str Methods | Description |

    | :--- | :--- |

    | upper | Returns a copy of the original string with all the characters converted
    to uppercase |

    | lower | Returns a copy of the original string with all the characters converted
    to lower case |

    | rjust | Returns a string right justified within an area padded with a specified
    character which defaults to a space |

    | ljust | Returns a string left justified within an area padded with a specified
    character which defaults to a space |

    | center | Returns a copy of the string centered within an area of a given width
    and optional fill characters; fill characters default to spaces |

    | strip | Returns a copy of the given string with the leading and trailing whitespace
    removed; if provided an optional string, the strip function strips leading and
    trailing characters found in the parameter string |

    | startswith | Determines if the string parameter is a prefix of the invoking
    string |

    | endswith | Determines if the string parameter is a suffix of the invoking string
    |'
  mdcn: '## 第9章


    ## 对象


    ## 目录


    - 9.1. 使用对象

    - 9.2. 字符串对象

    - 9.3. 文件对象

    - 9.4. 分数对象

    - 9.5. 海龟图形对象

    - 9.6. 使用 tkinter 对象进行图形编程

    - 9.7. 其他标准 Python 对象

    - 9.8. 对象的可变性与别名

    - 9.9. 垃圾回收

    - 9.10. 练习


    在硬件领域，一台个人计算机是通过组装主板（一块包含微处理器和各种支持芯片插槽的电路板）、处理器、内存、显卡、磁盘控制器、磁盘驱动器、机箱、键盘、鼠标和显示器来构建的。显卡本身就是一个复杂的硬件设备，包含视频处理芯片、内存和其他电子元件。技术人员无需组装显卡；显卡是直接从货架上取用的成品。显卡在一个标准封装中提供了大量的功能。一块显卡可以被来自不同供应商的另一块显卡或具有不同功能的另一块显卡所替代。整台计算机将能与任一显卡协同工作（前提是操作系统有可用的驱动程序），因为标准接口允许这些组件协同工作。


    当今的软件开发越来越基于组件。软件组件的使用方式类似于硬件组件。一个软件系统可以主要通过组装预先存在的软件构建块来构建。Python 支持各种类型的软件构建块。其中最简单的是我们在第6章和第7章中探讨过的函数。一种更强大的技术是使用软件对象。


    Python 是面向对象的。大多数现代编程语言都在不同程度上支持面向对象（OO）开发。一种面向对象的编程语言允许程序员定义、创建和操作对象。对象将数据和函数捆绑在一起。与其他变量一样，每个
    Python 对象都有一个类型，或称为类。术语“类”和“类型”是同义的。在本章中，我们将探索 Python 标准库中可用的一些类。


    ## 9.1. 使用对象


    一个对象是某个类的范例。虽然我们从一开始就一直在使用对象，但我们尚未充分利用对象提供的全部功能。在 Python 中，整数、浮点数、字符串和函数都以对象的形式存在。除了函数对象外，我们一直将这些对象视为被动的数据实体进行交互。我们可以将一个整数值赋给一个变量，然后使用该变量被赋予的值。我们能够对浮点数执行加法运算，并通过
    + 运算符连接字符串。对象可以作为参数传递给函数，而函数反过来也可以将对象作为返回值。在面向对象编程的领域中，这种方法超越了将数据视为被动实体、将函数视为仅操作数据的主动代理的观念。相反，数据和函数被统一成称为对象的内聚软件实体。一个典型的对象包含两个基本组成部分：数据和方法。对象的数据部分包含其实例变量。“实例变量”这个名称源于这样的概念：数据由特定对象拥有的变量表示，而对象本身就是一个类的实例。实例变量的同义词包括“属性”和“字段”。方法类似于函数，也被称为操作。对象内部实例变量和方法的结合共同构成了对象的组成部分。使用对象的代码部分被称为对象的客户端。可以说，对象向其客户端扩展其服务。对象提供的服务可以比基本函数的服务表现出更高层次的复杂性，因为对象提供了在其内部实例变量中持久存储数据的便利性。


    ## 9.2. 字符串对象


    我们已经使用字符串对象——`str` 类的实例——一段时间了。对象将数据和函数捆绑在一起，而构成字符串的数据由组成该字符串的字符序列组成。我们现在将注意力转向字符串方法。以下示例展示了程序员如何使用字符串对象可用的
    `upper` 方法。


    此代码提示用户输入他们的名字，将输入存储在变量 `name` 中，然后打印出一条问候消息，其中包含大写形式的名字。`upper()` 函数用于在将名字显示在消息中之前将其转换为大写。


    代码的工作原理如下：


    1. `input()` 函数提示用户输入他们的名字。输入存储在变量 `name` 中。

    2. `print()` 函数用于显示问候消息。该消息包含使用 `upper()` 函数转换为大写的 `name` 的值。


    因此，如果用户输入“John”作为他们的名字，输出将是：


    ```

    Please enter your name: John

    Hello John, how are you?

    ```


    `print` 语句中的表达式


    ```

    name.upper()

    ```


    表示一个方法调用。方法调用的一般形式是


    ![](img/1dbe1e06b9d31a6f7ada030324ed273a_270_0.png)


    - `Object` 是一个表示对象的表达式。在清单 9.1（stringupper.py）的示例中，`name` 是对一个字符串对象的引用。

    - 句点（读作“点”）将对象表达式与要调用的方法关联起来。

    - `Methodname` 是要执行的方法的名称。

    - `parameterlist` 是传递给方法的、以逗号分隔的参数列表。对于某些方法，参数列表可能为空，但括号始终是必需的。方法调用的参数列表的工作方式与函数调用的参数列表完全相同。


    除了对象前缀外，方法调用的工作方式类似于函数调用。它可以向其调用者返回一个值。


    `upper` 方法返回一个新字符串。`upper` 方法不会影响调用它的对象；这意味着 `name.upper()` 不会修改 `name` 对象。


    一个方法可以接受参数。以下代码使用 `rjust` 字符串方法，用指定的字符填充字符串以实现右对齐。


    ```

    word = "ABCD"

    print(word.rjust(10, "*"))

    print(word.rjust(3, "*"))

    print(word.rjust(15, ">"))

    print(word.rjust(10))

    ```


    输出：


    ```

    ******ABCD

    ABCD

    >>>>>>>>>>>>ABCD

    ABCD

    ```


    以下是输出的解释：


    1. `word.rjust(10, "*")`：单词“ABCD”在宽度为10个字符的区域内右对齐，剩余空间用星号（''*''）填充。输出为 ******ABCD。

    2. `word.rjust(3, "*")`：指定的宽度为3，小于“ABCD”的长度（4）。因此，单词“ABCD”按原样打印，没有任何对齐或填充。

    3. `word.rjust(15, ">")`：单词“ABCD”在宽度为15个字符的区域内右对齐，剩余空间用大于号（''>''）填充。输出为 >>>>>>>>>>>>ABCD。

    4. `word.rjust(10)`：单词“ABCD”在宽度为10个字符的区域内右对齐，使用默认填充（空格）。输出为 ABCD，其中额外的空格是默认填充。


    ## 表 9.1. str 对象可用的部分方法


    | str 方法 | 描述 |

    | :--- | :--- |

    | upper | 返回原始字符串的副本，其中所有字符都转换为大写 |

    | lower | 返回原始字符串的副本，其中所有字符都转换为小写 |

    | rjust | 返回一个字符串，该字符串在指定字符（默认为空格）填充的区域内右对齐 |

    | ljust | 返回一个字符串，该字符串在指定字符（默认为空格）填充的区域内左对齐 |

    | center | 返回一个字符串的副本，该字符串在给定宽度和可选填充字符的区域内居中；填充字符默认为空格 |

    | strip | 返回给定字符串的副本，其中前导和尾随的空白字符被移除；如果提供了可选的字符串参数，则 `strip` 函数会移除在该参数字符串中找到的前导和尾随字符
    |

    | startswith | 确定字符串参数是否是调用该方法的字符串的前缀 |

    | endswith | 确定字符串参数是否是调用该方法的字符串的后缀 |'
