    C:\Users\username\Documents

    ```


    These examples illustrate how to manage special characters and quotation marks
    within Python strings, making it easier to handle diverse textual content.


    ## 2.6. USER INPUT


    In Python, the print function is used to display textual information to the user,
    while the input function allows programs to obtain information from the user.
    The simplest usage of the input function involves assigning a string to a variable:


    ```

    x = input()

    ```


    The parentheses are left empty because the input function doesn''t require any
    specific information to perform its task. In the next code it is demonstrated
    that the input function returns a string value.


    ```

    user_input = input("Please enter some text: ")

    print("You entered:", user_input)

    ```


    Output:


    ```

    Please enter some text: Hello, Python!

    You entered: Hello, Python!

    ```


    The second line shown in the output is entered by the user, and the program prints
    the first, third, and fourth lines. After displaying the message "Please enter
    some text:", the program execution halts and waits for the user to provide text
    using the keyboard. The user can type, use backspace to make changes, and continue
    typing. The text is not committed until the user presses the center (or return)
    key.


    In many scenarios, programs need to perform calculations using numbers provided
    by the user. The input function always returns a string, but we can use the int
    function to convert a properly formed string of digits into an integer. Next the
    code illustrates how to obtain an integer from the user:


    ```

    num1 = int(input("Enter the first integer: "))

    num2 = int(input("Enter the second integer: "))

    sum_result = num1 + num2

    print("The sum is:", sum_result)

    ```


    Output:


    ```

    Enter the first integer: 25

    Enter the second integer: 17

    The sum is: 42

    ```


    Lines two and four represent user input, while the program generates the other
    lines. The program pauses after printing the first message and does not proceed
    until the user provides the input. After displaying the second message, it again
    waits for the user''s second input.


    When accepting user input, it is often essential to provide a message about the
    expected input. The input function in Python can optionally accept a string argument,
    which it will display before waiting for the user''s response.


    For example:


    ```

    x = input(''Please enter some text: '')

    ```


    The message "Please enter some text:" is printed, and then the program waits for
    the user to provide input, which will be assigned to the variable x.


    we make the code even shorter by combining the input and int functions into one
    statement:


    ```

    result = int(input(''Please enter an integer value: ''))

    ```


    This technique, known as functional composition, directly passes the result of
    the input function to the int function, eliminating the need for intermediate
    variables. Functional composition is a useful technique for simplifying program
    code.


    However, we must be cautious when using code like this:


    ```

    num = int(input(''Please enter a number: ''))

    ```


    This statement expects the user to enter an integer value. If the user enters
    “3,” everything works as expected, and the variable num will refer to the integer
    object 3. The int function can convert the string “3” to the integer value 3.
    However, if the user inputs “3.4,” the input statement will return the string
    “3.4.” The int function cannot directly convert the string “3.4” to an integer
    since it contains a decimal point, even though it can convert the floating-point
    number 3.4 to the integer 3. The following interactive sequence demonstrates this
    behavior:


    ```

    Please enter a number: 3.4

    ValueError: invalid literal for int() with base 10: ''3.4''

    ```


    The int function can convert a string to an integer only if the string represents
    a whole number.


    If you specifically want to accept an integer value from the user but also tolerate
    decimal places, you can use additional functions in a composition of functions,
    like so:


    ```

    value = int(float(input(''Please enter an integer or decimal value: '')))

    ```


    This code first uses the input function to obtain the number from the user as
    a string. It then uses the float function to convert the received string to a
    floating-point number. Finally, it converts the floating-point number to an integer
    using the int function. If you want to round the user’s input value instead of
    truncating it, you can use the round function after converting it to a floating-point
    number.


    ## 2.7. CONTROLLING THE PRINT FUNCTION


    It is preferable to have the cursor remain at the end of the printed line so that
    when the user types a value, it appears on the same line as the message prompting
    for the input. This way, when the user presses the enter key, the cursor automatically
    moves down to the next line.


    The print function, as seen so far, always prints a line of text and then moves
    the cursor down to the next line, causing any future printing to appear on the
    subsequent line. However, the print statement can accept an additional argument
    to allow the cursor to stay on the same line as the printed text:


    ```

    print(''Please enter an integer value:'', end='''')

    ```


    As we can see from the interactive session, truncation always “rounds down” to
    the nearest integer, while rounding behaves as we would typically expect. These
    concepts are important to consider while dealing with floating-point numbers and
    their conversions to integers in Python. Understanding the inherent limitations
    and behavior of these data types can help ensure accurate and reliable numerical
    computations in your programs. We can utilize the round function in Python to
    round a floating-point number to a specified number of decimal places. The round
    function can accept an optional argument, which determines the desired number
    of decimal places to round the number to. This additional argument must be an
    integer, and it controls the precision of the rounding operation.


    In the Python shell, we can observe the following behavior:


    ```

    >>> x = 3.14159

    >>> round(x)

    3

    >>> round(x, 2)

    3.14

    ```


    As demonstrated, using round with a single argument produces an integer result,
    while using two arguments returns a floating-point result.


    The second argument passed to the round function can also be a negative integer:


    ```

    >>> round(123.456, -2)

    100.0

    >>> round(123.456, 1)

    123.5

    ```


    When we call round(n, r), the function rounds the floating-point expression n
    to the 10^(-r) decimal digit. For instance, round(n, -2) rounds the value n to
    the hundreds place (10^2), and round(n, 3) rounds it to the thousandths place
    (10^(-3)).


    The round function can also be applied to integer values. If the first argument
    to round is an integer and the second argument is a negative integer, the second
    argument specifies the number of decimal places to the left of the decimal point
    to round.


    ```

    >>> y = 1000

    >>> round(y, -2)

    1000

    >>> z = 10000

    >>> round(z, -4)

    10000

    ```


    In all of these cases, the round function produces an integer result. As observed,
    if the second argument is a non-negative integer, the round function returns the
    original value without any changes.


    ```

    >>> x = 3.8

    >>> round_x = round(x)

    >>> truncate_x = int(x)

    >>> round_x

    4

    >>> truncate_x

    3

    ```'
