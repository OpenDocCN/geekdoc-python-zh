    more than 12+ years of teaching experience in several engineering colleges as
    Chameli Devi Group of Institution, Indore and Dr. A.P.J. Abdul Kalam University,
    he completed his academic qualifications include Master in Computers engineering,
    Ph.D. in Computer Science and engineering. His research includes Data Mining,
