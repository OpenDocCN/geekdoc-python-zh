    Because each decision eliminates half of the remaining tree, the binary search
    is powerful at arriving at a solution. Because of the repetitive nature of the
    tree structure, one can use a recursive process to traverse through the tree nodes
    or alternatively an iterative search (which we have seen to be more efficient).


    The search runs until we reach some leaf node at which point the final result
    is reached.


    The binary tree is even more powerful than this as one can traverse **down the
    tree** and then, with a process called **backward induction**, reverse all the
    way back **up the tree** to the parent node. This is one possible technique for
    financial option pricing.'
