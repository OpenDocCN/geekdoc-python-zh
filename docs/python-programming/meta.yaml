    \ “A || B” is `true` if either A or B (or both) are `true`.\n3.  **NOT (`!`):**\
    \ Represents the logical “not” operation. It returns the opposite Boolean value\
    \ of the operand. If the operand is `true`, “!” makes it `false`, and if the operand\
    \ is `false`, “!” makes it `true`. For example, “!A” is `true` if A is `false`.\n\
    \nCombining simple Boolean expressions using these logical operators allows us\
