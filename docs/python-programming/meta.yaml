  - '[PAGE 97]


    Multi-way conditionals are more efficient when you need to choose from multiple
    exclusive options. They avoid unnecessary evaluations once a true condition is
    found and improve performance.


    Sequential conditionals are more flexible when you have independent conditions,
    and you want to execute multiple blocks of code for each true condition. Multi-way
    conditionals are generally more readable and concise when you have a fixed number
    of options. Sequential conditionals can be useful when you have dynamic conditions
    or when the conditions are not mutually exclusive. In most cases, multi-way conditionals
    are preferred when the conditions are mutually exclusive, and you want to choose
    exactly one option. Sequential conditionals are more appropriate when you have
    multiple independent conditions and want to execute multiple blocks of code based
    on each true condition. The choice between the two depends on the specific problem
    and the logic you want to implement in your program.


    # 4.11. CONDITIONAL EXPRESSIONS


    Conditional expressions, also known as ternary operators, provide a concise way
    to express simple conditional statements in Python. They allow you to evaluate
    a condition and return one of two expressions based on whether the condition is
    true or false.


    The general form of a conditional expression is:


    ```

    expression_if_true if condition else expression_if_false

    ```


    Here’s how it works:


    +   1. The condition is evaluated first.

    2. If the condition is true, the expression before the if keyword is returned.

    3. If the condition is false, the expression after the else keyword is returned.


    **Example 1:**


    ```

    x = 10

    result = "Even" if x % 2 == 0 else "Odd"

    print(result)

    ```


    In this example, the condition x % 2 == 0 checks if x is even. If true, the expression
    “Even” is returned; otherwise, the expression “Odd” is returned. The output will
    be “Even” since x is 10.'
