    # 9.3. FILE OBJECTS


    All the programs we have seen lose their data at the end of their execution. Most
    useful applications, however, require greater data persistence. Imagine using
    a word processor that does not allow you to save your document and retrieve it
    later for further editing. Most modern operating systems store persistent data
    in files. A word processor, for example, could store one of its documents in a
    file named thesis.doc. Fortunately, Python’s standard library has a file class
    that makes it easy for programmers to make objects that can store data to, and
    retrieve data from, disk. The formal name of the class of file objects we will
    be using is TextIOWrapper, and it is found in the io module. Since file processing
    is such a common activity, the functions and classes defined in the io module
    are available to any program, and no import statement is required.


    The statement:


    ```

    f = open(‘myfile.txt’, ‘r’)

    ```


    Creates and returns a file object (literally a TextIOWrapper object) named f.
    The first argument to open is the name of the file, and the second argument is
    a mode. The open function supports the following modes:


    +   - ‘r’ opens the file for reading.

    - ‘w’ opens the file for writing; creates a new file.

    - ‘a’ opens the file to append data to it.


    The statement:


    ```

    f = open(‘myfile.txt’, ‘r’)

    ```


    creates a file object named f capable of reading the contents of the text file
    named myfile.txt. If the file does not exist or the user of the program'
  - '[PAGE 276]


    does not have adequate permissions to open the file, the open function will raise
    an exception.


    The statement:


    ```

    f = open(''myfile.txt'', ''w'')

    ```


    Creates and returns a file object named f capable of writing data to the text
    file named myfile.txt. If the file does not exist, the function creates the file
    on disk. If a file by that name currently exists, new data will replace the current
    data stored in the file. This means any pre-existing data in the file will be
    lost.


    The statement:


    ```

    f = open(''myfile.txt'', ''a'')

    ```


    Creates and returns a file object named f capable of writing data to the text
    file named myfile.txt. If the file does not exist, the function creates the file
    on disk. If a file by that name currently exists, new data will be appended after
    the pre-existing data in that file. This means that the original data in the file
    is not lost.


    If the second argument to the open function is missing, it defaults to ''r'',
    so the statement


    ```

    f = open(fname)

    ```


    is equivalent to


    ```

    f = open(fname, ''r'')

    ```


    Once you have a file object capable of writing (opened with ''w'' or ''a''), you
    can save data to the file associated with that file object using the write method.
    For a file object named f, the statement


    ```

    f.write(''data'')

    ```


    stores the string ''data'' to the file. The three statements


    ```

    f.write(''data'') f.write(''compute'') f.write(''process'')

    ```


    writes the text ''datacomputeprocess'' to the file. If our intention is to retrieve
    the three separate original strings, we must add delimiters to separate the pieces
    of data. Newline characters serve as good delimiters:


    ```

    f.write(''data\n'') f.write(''compute\n'') f.write(''process\n'')

    ```'
