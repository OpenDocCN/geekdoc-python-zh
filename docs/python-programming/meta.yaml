    \ * 3 seconds) because the time consuming function was placed inside the loop\
    \ and it could have been much worse with just a change in the loop number.\n\n\
    These are the easy wins that the coder needs to be aware of.\n\n## Recursive functions\n\
    \nRecursion is a common mathematical and programming concept. It means that a\
    \ function calls itself. This has the benefit of meaning that you can loop through\
    \ data and apply logic to reach a result.\n\nThis is especially useful when the\
    \ same pattern repeats itself, although an unfinished or indefinite recursion\
    \ could cause a stack overflow. So the coder needs to make sure that at some point\
    \ an end condition is met.\n\nThe recursion process looks like this in python:\n\
    \n![](img/4e4fc350228cd1c84055205e597f4fc0_54_0.png)\n\nA popular mathematical\
    \ problem solved by recursion is finding the factorial of a number, n.\n\nLet's\
    \ take a look at how the recursion process works in practice:\n\n```\ndef recur_factorial(n):\n\
    \    \"\"\" calculate factorial of n \"\"\"\n    if n == 1:\n        return n\n\
    \    else:\n        return n*recur_factorial(n-1)\n\nrecur_factorial(1000)\n```\n\
    \nWe notice how the recursion function simply keeps returning itself, each time\
    \ lowering the value of n until the condition that n==1 is reached and the recursion\
    \ stops returning the final value.\n\nIn this example we see that 1000! is computed\
    \ in a fraction of a second yielding a monstrous number that had to be shrunk\
    \ in font size to fit on this page.\n\n40238726007709377354370243392300398571937486421071463254379991042993851239862902059204420848696940480047\n\
    \nHaving praised the recursive function, we can see that the same can be achieved\
    \ in a linear fashion with the for loop.\n\n```\ndef ret_factorial(n):\n    f\
    \ = 1\n    for i in range(1,n+1):\n        f = f * i\n    return f\n```\n\nWe\
    \ note that recursions are elegant to look at and have the advantage that they\
    \ can break complex tasks into small simple units.\n\nHowever, the downside of\
    \ recursion is that they are expensive in terms of memory and time. In the above\
    \ example, the factorial problem works well, but a value of n > 2000 would have\
    \ caused a memory issue because each new function was assigned a new place in\
    \ memory.\n\n## Backtracking\n\nBacktracking is recursive in nature. Backtracking\
    \ is simply reverting back to the previous step or solution as soon as we determine\
    \ that our current solution cannot be continued into a complete one.\n\n```\n\
    # backtracking\n\ndef permute(list, s):\n    if list == 1:\n        return s\n\
    \    else:\n        return [\n            y + x\n            for y in permute(1,\
    \ s)\n            for x in permute(list - 1, s)\n        ]\nprint(permute(1, [\"\
    a\",\"b\",\"c\"]))\nprint(permute(2, [\"a\",\"b\",\"c\"]))\n```\n\nthe above code\
    \ returns this:\n\n```\n['a', 'b', 'c']\n['aa', 'ab', 'ac', 'ba', 'bb', 'bc',\
    \ 'ca', 'cb', 'cc']\n```\n\n## List comprehension\n\nIf we take a look at the\
    \ backtracking algo, there is something that we have not seen before. It is a\
    \ complicated version of a list comprehension.\n\nThe ‘list comprehension’ offers\
    \ a *shorter syntax* when you want to create a new list based on the values of\
