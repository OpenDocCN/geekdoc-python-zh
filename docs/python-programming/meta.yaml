    # 3.10. ALGORITHM


    In computer science, an algorithm is a step-by-step procedure or a finite sequence
    of well-defined instructions that are designed to solve a specific problem or
    perform a particular task.


    It is a crucial concept in programming and problem-solving because it allows us
    to represent a solution in a clear and systematic way, making it easier to implement
    using a programming language.


    **Key Characteristics of Algorithms:**


    +   1. **Well-Defined:** Algorithms have precisely defined steps that are clear,
    unambiguous, and leave no room for interpretation. Each step must be concrete
    and executable.

    2. **Finiteness:** Algorithms must terminate after a finite number of steps. They
    cannot be infinite loops, as this would prevent the program from producing a result.

    3. **Input:** Algorithms take zero or more inputs, and based on those inputs,
    they produce an output.

    4. **Output:** Algorithms produce an output, which is the result of the problem-solving
    process.

    5. **Effectiveness:** Algorithms must be effective, meaning they can be carried
    out using basic operations and in a reasonable amount of time.'
