    \nAnd when the user clicks the “Login” button invokes another piece of code, via\
    \ a callback. In the example, the code yields this:\n\n![](img/4e4fc350228cd1c84055205e597f4fc0_143_1.png)\n\
    \n## Animations\n\nAll of the GUI features are nice. They give a user the ability\
    \ to interact with the device via a clean and friendly interface via inputs and\
    \ outputs provisioned by the numerous widgets.\n\nHowever, all of this has been\
    \ rather static in the sense that our application sits and waits for a user action\
    \ like a willing dog, but until that point is idle (although, we could remove\
    \ the idleness by, say, having the device look at a share price and set an alert\
    \ when it was breached).\n\nWe now move onto the dynamic part of coding with an\
    \ example of two planets moving through space.\n\n```python\nimport tkinter as\
    \ tk\nimport time\n\n# by convention constants are in capitals\nWIDTH = 500\n\
    HEIGHT = 300\nvelocity_x = 1\nvelocity_y = 1\n\nwin = tk.Tk()\nwin.title(\"moving\
    \ planets\")\n\ncanvas = tk.Canvas(win, width=WIDTH, height=HEIGHT)\ncanvas.pack()\n\
