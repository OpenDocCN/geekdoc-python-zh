  md: "3. **Decorator Function:** A decorator is essentially a function that takes\
    \ another function as an argument, adds some functionality to it, and returns\
    \ the modified function. In other words, decorators wrap around the original function.\n\
    \nHere's a simple example of how a decorator works:\n\n```\ndef my_decorator(func):\n\
    \    def wrapper():\n        print(\"Something is happening before the function\
    \ is called.\")\n        func()\n        print(\"Something is happening after\
    \ the function is called.\")\n    return wrapper\n\n@my_decorator\ndef say_hello():\n\
    \    print(\"Hello!\")\n\nsay_hello()\n```\n\nOutput:\n\n```\nSomething is happening\
    \ before the function is called.\nHello!\nSomething is happening after the function\
    \ is called.\n```\n\nIn the example above, the my_decorator function takes another\
    \ function (func) as an argument, defines an inner function (wrapper) that adds\
    \ some behavior before and after calling func, and then returns the wrapper function.\
    \ The @my_decorator syntax is a shorthand for applying the decorator to the say_hello\
    \ function. Decorators can also take arguments, which adds an extra layer of flexibility.\
    \ Here's an example:\n\n```\ndef repeat(n):\n    def decorator(func):\n      \
    \  def wrapper(*args, **kwargs):\n            for _ in range(n):\n           \
    \     result = func(*args, **kwargs)\n            return result\n        return\
    \ wrapper\n    return decorator\n\n@repeat(n=3)\ndef greet(name):\n    print(f\"\
    Hello, {name}!\")\n\ngreet(\"Alice\")\n```\n\nOutput:"
