    # Graphical user interfaces


    The web is by far the go to place and python has its own offerings in the form
    of the Django and Flask web frameworks.


    Aside from the web, there are bespoke graphical user interfaces (GUI’s) that allow
    a user to build local apps on their devices which are predominantly desktop computers,
    laptops, tablets and mobile devices.


    At the time of writing, at a glance, there were roughly 30 GUI’s which operate
    across a variety of operating systems. Each will have its own specific features
    and advantages.


    However, we will focus on one particular GUI called tkinter[18]. The main reasons
    that we focus on tkinter are:


    +   1. It is fast.

    2. It comes bundled with Python.

    3. The general concepts of using GUI’s are broadly the same. And we will justify
    why this general statement is true.


    # Hello world GUI


    Let''s take a look at a basic hello world implementation using tkinter.


    ```

    import tkinter as tk


    # create an instance

    root = tk.Tk()


    # place a label on the root window

    message = tk.Label(root, text="Hello, World!")

    message.pack()


    # keeps the window displaying and running until you close it

    root.mainloop()

    ```


    Which opens the GUI with the text hello world like this:'
  - '[PAGE 136]


    ![](img/4e4fc350228cd1c84055205e597f4fc0_136_0.png)


    So out of the box, we were able to get a result quickly. All we had to do was
    this:


    +   1. Import the module

    2. Create an instance

    3. Create a label with the “hello world” text

    4. Pack the label

    5. Run the main loop


    Typically, we place the call to the mainloop() method as the last statement in
    a Tkinter program.


    The components that are added are called “widgets”. We create widgets of our choice
    and then pack them to the container. If we forget to pack the widget, then it
    will be created but remain invisible. There are roughly 20 basic widgets to choose
    from, like scroll bars, checkboxes and entry boxes etc…


    The reason why we said that the general concepts of all GUI’s are the same is
    because they tend to follow the same 5 step process as above.


    What actually happens with all the drawing packages is that the screen refreshes
    itself many times per second (which is usually called the Frames Per Second, FPS)
    with the images being created or drawn sequentially one-by-one. This is more obvious
    for games modules like pygame where we might need to be careful to draw the background
    before the items.


    The hello world was great, but let''s now extend upon this. We can give the GUI
    a title and a position and size on the screen:


    ```

    root.title("Tkinter Window Demo")

    root.geometry("600x400+200+50")

    ```


    The geometry is made of two components:


    +   - width * height

    - Position of top left corner relative to the screen'
  - '[PAGE 137]


    ![](img/4e4fc350228cd1c84055205e597f4fc0_137_0.png)


    There are more options, but this is sufficient. In fact, omitting the top left
    position would leave a suitable default.


    If we wanted to position and size the GUI relative to the screen, then we would
    need to get the screen dimensions and calibrate.


    ```

    # get the screen dimension

    screen_width = root.winfo_screenwidth()

    screen_height = root.winfo_screenheight()


    # the GUI width and height

    window_width = int(screen_width / 3)

    window_height = int(screen_height / 3)

    ```


    We can do other things like:


    +   - Control window size: resizable() , minsize() , maxsize()

    - Adjust transparency: attributes(''-alpha'',0.5)

    - Stacking order: attributes(''-topmost'', 1)'
  - '[PAGE 138]


    +   - Default icon: iconbitmap(''my_image.ico'')


    We can implement all of the above.


    ```

    import tkinter as tk


    # create an instance

    root = tk.Tk()

    root.title(''Tkinter Window Demo'')


    # get the screen dimension

    screen_width = root.winfo_screenwidth()

    screen_height = root.winfo_screenheight()


    # the GUI width and height

    window_width = int(screen_width / 3)

    window_height = int(screen_height / 3)


    # the GUI position

    window_x_pos = int(screen_width * 0.1)

    window_y_pos = int(screen_height * 0.1)


    root.geometry(f''{window_width}x{window_height}+{window_x_pos}+{window_y_pos}'')


    # transparency

    root.attributes(''-alpha'', 0.75)


    # place a label on the root window

    message = tk.Label(root, text="Hello, World!")

    message.pack()


    # keeps the window displaying and running until you close it

    root.mainloop()

    ```


    Which gives this 25% transparent window which is positioned 10% from the top left
    hand corner of the screen and is ⅓ of the screen size in the x and y directions:'
  - '[PAGE 139]


    ![](img/4e4fc350228cd1c84055205e597f4fc0_139_0.png)


    So we have a GUI which we can customise reasonably well in terms of position and
    size etc.


    So next, we can add some widgets.


    Common widgets are buttons and entry boxes although there are many others. These
    will be sufficient for creating an example of receiving data and performing a
    basic operation.


    We will create the button and entry box in a similar way that we created the label.
    The difference being that the button executes a function, which is usually referred
    to as a callback function. Callback[19] functions are very common in modern programming
    and we have already seen them in Asynchronous programming.


    Here is the button example, with a callback:'
