    \n```\n# 定义函数\ndef my_function():\n    print('hello world')\n\n# 调用函数\nmy_function()\n\
    ```\n\n我们可以根据需要多次调用该函数，因为它是一个可重复使用的代码块：\n\n```\n# 定义函数\ndef my_function():\n \
    \   print('hello world')\n\n# 调用函数 10 次\nfor i in range(10):\n    my_function()\n\
    ```\n\n返回结果如下：\n\n```\nhello world\nhello world\nhello world\nhello world\nhello\
    \ world\nhello world\nhello world\nhello world\nhello world\nhello world\n```\n\
    \n就像 ‘for’ 和 ‘while’ 循环以及 ‘if’ 语句一样，一旦代码块（由缩进定义）完成，函数就结束了。\n函数可以有称为参数的输入：\n\n\
    ```\nname = 'world'           # 一个变量\n\ndef my_function(name):    # 函数接受变量\n \
    \   print('hello ' + name) # 函数使用变量\n```\n\n函数通常用一个字符串注释，称为文档字符串，向用户描述函数的功能：\n\
    \n```\ndef my_function(name):    # 函数接受变量\n    \"\"\" 打印 hello 和名字 \"\"\"\n  \
    \  print('hello ' + name) # 函数使用变量\n```\n\n函数可以返回一些内容。\n\n```\nname = 'world'\
    \           # 一个变量\n\ndef my_function(name):    # 函数接受变量\n    \"\"\" 接受一个名字，返回一个字符串\n\
    \n        输入: name (str)\n        返回: s (str)\n    \"\"\"\n\n    s = 'hello '\
    \ + name    # 连接字符串\n    return s # 函数返回一个字符串\n```\n\n我们可以将返回值赋值给一个变量，像这样：\n\n\
    ```\ndef add_numbers(a, b):\n    \"\"\" 将 a 和 b 相加，返回结果 \"\"\"\n    return a +\
    \ b\n\nmy_sum = add_numbers(1, 3) # 返回的值\n\nprint('the sum is', my_sum) # 打印结果\n\
    ```\n\n返回结果如下：\n\n```\nthe sum is 4\n```\n\n函数可以调用之前定义的其他函数，因此我们可以很好地以模块化块控制代码流程。\n\
    \n```\ndef add_numbers(a, b):\n    \"\"\" 将 a 和 b 相加，返回结果 \"\"\"\n    return a\
    \ + b\n```\n\n```\ndef my_name(name):\n    \"\"\" 接受一个名字，返回一个字符串\n\n    输入: name\
    \ (str)\n    返回: s (str)\n    \"\"\"\n\n    s = 'hello ' + name\n    return s\n\
    ```\n\n```\ndef main():\n    \"\"\" 调用上述两个函数 \"\"\"\n\n    z = add_numbers(7,\
    \ 8)\n\n    if z > 10:\n        s = my_name('world')\n        print(s)\n```\n\n\
    ```\n# 调用主函数\nmain()\n```\n\n大量有用函数的集合可以被视为一个*库*（或*模块*）。我们可以保存这个包含非常有用函数的模块，并在以后（即我们可以导入该模块）在另一段代码中调用它。\n\
    \n## 类\n\n紧随函数之后的是类。类是许多面向对象语言的基础。可以将类视为*用户定义的蓝图或原型，对象由此创建*。我们将看到这意味着什么。\n\n我们将看一个例子，但请注意有很多例子。通常，我们看到的例子是关于人、汽车或动物的（狗是一个很好的例子）。事实上，任何具有可复制属性和方法的事物都非常适合类系统，这就是它如此强大的原因。\n\
    \n在我们这样做之前，让我们看看 Python 中的类是什么样子的。代码块如下所示。\n\n```\nclass MyClass:\n    \"\" 这是一个类\
    \ \"\"\"\n    pass\n```\n\n我们可以添加属性和方法（函数）。\n\n```\nclass MyClass:\n    \"\" 这是一个类\
    \ \"\"\"\n    pass\n\n    x = 10    # 变量称为属性\n    y = 100\n\n    def add_one(self):\n\
    \        \"\"\"\n        这个函数是类的“方法”\n        x 增加 1\n        \"\"\"\n       \
    \ self.x = self.x + 1\n        return self.x\n```\n\n这里我们添加了两个属性 x 和 y，以及一个方法\
    \ add_one()，它将输入的数字加 1。我们还注意到惯例（但不是规则）是使用大写字母来命名类。我们看到了一个新的关键字 `self`。\n\n`self`\
    \ 参数是类的一个重要特性，因为它引用自身，其他面向对象编程（OOP）语言使用类似的术语（例如 nodejs 使用 `this` 关键字来引用自身）。\n\n\
    我们可以通过调用它来创建类的实例。这称为实例化类。\n\n```\nx = MyClass()\n```\n\n我们可以轻松地调用其属性和方法。\n\n```\n\
    class MyClass:\n    \"\"\" 这是一个类 \"\"\"\n    pass\n\n    x = 10    # 变量称为属性\n\
    \    y = 100   # 这是另一个属性\n\n    def add_one(self):\n        \"\"\"\n        这个函数是类的“方法”\n\
    \        x 增加 1\n        \"\"\"\n        self.x = self.x + 1\n        return self.x\n\
    \n# 创建类的实例\nsomething = MyClass()  # 实例化类\n\nprint(something.x)    # 打印 10\nprint(something.y)\
    \    # 打印 100\n\nsomething.add_one()   # 执行方法（加 1）\nprint(something.x)    # 打印\
    \ 11\n```\n\n简而言之，以上内容概述了类的大部分内容及其使用方法。同样，为了本书的目的，我们仅坚持此描述，但请注意，实际上可以单独写一整本关于类的书。读者可以自行深入研究。\n\
    \n## 魔术方法\n\n当我们查看类时，会注意到一些函数以双下划线 `__` 开头。它们也被称为 dunder 方法，是 double 和 under 的混合词。\n\
    \n它们可以帮助为自定义类覆盖内置函数的功能。常见方法有：\n\n`__str__`：用于字符串\n\n`__len__`：项目数量\n\n`__dict__`：项目的字典\n\
    \n对于类，我们经常在顶部看到 `__init__()`：这表示 Python 将在内部使用该方法。用户不应显式调用此方法。由于此方法在创建新类后立即被调用，我们可以用它来初始化对象的属性。\n\
    \n```\nclass Node:\n    \"\" 树的节点 \"\"\"\n\n    def __init__(self, data):\n  \
    \      \"\" 构造类 \"\"\"\n        self.left = None\n        self.right = None\n\
    \        self.data = data\n\n    def PrintTree(self):\n        \"\" 另一个函数 \"\"\
    \"\n        print(self.data)\n```\n\n我们目前不会深入探讨这一点，原因有二。"
