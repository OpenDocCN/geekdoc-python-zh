    # 添加一些红色文本\ncv2.putText(img, text='Hello World', org=(200,100),\n            fontFace=cv2.FONT_HERSHEY_PLAIN,\n\
    \            fontScale=3, color=(0,0,255), thickness=2)\n```\n\n所有上述组件的整个组合看起来像这样：\n\
    \n此时，我们已经尝试了一些我们可以对图像进行的基本操作，剩下的就是让读者发挥创造力。\n\n## 透视变换\n\n这是一种改变图像透视的有用技术，这样我们可以获得*扁平化*图像的鸟瞰图。例如，想象一下我们以一定角度拍摄文档的照片，但我们想看到它的真实矩形形状。\n\
    \n所需卡片\n\n或者在我们上面的示例案例中，我们有一些散落在桌子上的扑克牌，我们想获取黑桃K。我们需要知道卡片角的坐标才能做到这一点，我们可以通过将鼠标悬停在图像上来获取。\n\
    \n```python\nimport cv2\nimport numpy as np\n\nimg = cv2.imread('assets/cards.jpg')\n\
    \nwidth, height = 200, 300\npoints = np.float32([[82,157],[212,134],[115,356],[264,323]])\n\
