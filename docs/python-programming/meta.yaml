    supports non-integer numbers, referring to them as floating-point numbers. The
    term “floating-point” suggests that the decimal point can move or “float” to different
    positions within the number to preserve the required number of significant digits
    during mathematical computations. In Python, these floating-point numbers are
    represented by the float data type.


