    >>> lst = [''a'', ''b'', ''c'', ''d'']

    >>> lst

    [''a'', ''b'', ''c'', ''d'']

    >>> tuple(lst)

    (''a'', ''b'', ''c'', ''d'')

    ```


    Neither the list nor tuple function actually modifies its argument; that is, tuple(lst)
    does not modify lst, and list(tpl) does not modify tuple (since tuples are immutable,
    any modification would be impossible anyway). The list function makes a new list
    out of the contents of a tuple, and the tuple function makes a new tuple out of
    the elements in a list.


    We can use the built-in zip function to generate a sequence of tuples from two
    lists. Consider the following interactive sequence:


