    \ # declare grid\n    grid = np.array([])\n    grid = randomGrid(N)\n\n    for\
    \ i in range(5):\n        addGlider(np.random.randint(2,N-2),\n              \
    \    np.random.randint(2,N-2), grid)\n\n    # set up animation\n    fig, ax =\
    \ plt.subplots()\n    img = ax.imshow(grid, interpolation='nearest')\n    ani\
    \ = animation.FuncAnimation(fig, update,\n                                 fargs=(img,\
    \ grid, N, ), frames = 10,\n                                 interval=updateInterval,save_count=50)\n\
    \n    plt.show()\n\n\ndef randomGrid(N):\n    \"\"\"returns a grid of NxN random\
    \ values\"\"\"\n    pyes=0.04\n    pno=1-pyes\n    return np.random.choice(vals,\
    \ N*N, p=[pyes, pno]).reshape(N, N)\n\n\ndef addGlider(i, j, grid):\n    \"\"\"\
    adds a glider with top left cell at (i, j)\"\"\"\n    glider = [[0,0,1],[1,0,1],[0,1,1]]\n\
    \    grid[i:i+3, j:j+3] = glider\n\n\ndef update(frameNum, img, grid, N):\n  \
    \  # copy grid since we require 8 neighbors\n    newGrid = grid.copy()\n    for\
    \ i in range(N):\n        for j in range(N):\n\n            # compute 8-neighbor\
    \ sum (x and y wrap around)\n            total = int(grid[i, (j-1)%N] + grid[i,\
    \ (j+1)%N] +\n                        grid[(i-1)%N, j] + grid[(i+1)%N, j] +\n\
    \                        grid[(i-1)%N, (j-1)%N] + grid[(i-1)%N, (j+1)%N] +\n \
    \                       grid[(i+1)%N, (j-1)%N] + grid[(i+1)%N, (j+1)%N])\n\n \
    \           # apply Conway's rules\n            if grid[i, j] == ON:\n       \
    \         if (total < 2) or (total > 3):\n                    newGrid[i, j] =\
    \ OFF\n            else:\n                if total == 3:\n                   \
    \ newGrid[i, j] = ON\n\n    # update data\n    img.set_data(newGrid)\n    grid[:]\
    \ = newGrid[:]\n    return img\n```"
