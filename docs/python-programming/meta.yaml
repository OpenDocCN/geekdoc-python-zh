    \ 0.2, 0.6],\n     'second_index_names':['d', 'e', 'f'],\n     'second_index_weights':[0.1,\
    \ 0.1, 0.8]}\n```\n\n而这些列表是 100% 相似的。\n\n```python\nd = {'first_index_names':['a','b','c'],\n\
    \    'first_index_weights':[0.2, 0.2, 0.6],\n    'second_index_names':['c', 'a',\
    \ 'b'],\n    'second_index_weights':[0.6, 0.2, 0.2]}\n```\n\n这运行得很好。介于两者之间的一切将介于\
    \ 0% 和 100% 之间。\n\n这是一个非常有用的工具，因为它使得在进行历史价格比较之前，预测和解释两个投资组合或指数的表现成为可能，因为具有*高度相似性*的指数预期在价格上是*相关的*。\n\
    \n## 网络\n\n网络提供了海量的数据和无数的用例，这些用例几乎产生了我们所知的所有信息。截至 2022 年 4 月，全球数字人口超过 50 亿互联网用户和近\
    \ 50 亿社交媒体用户，但现实是，在世界某些地区，使用互联网的人口比例更接近 100%。\n\n![](img/4e4fc350228cd1c84055205e597f4fc0_124_0.png)\n\
    \n我们可以用几乎任何编程语言来自动化提取这种资源，而 Python 有模块使这变得相对容易。\n\n我们将探讨两种类型的连接。HTTP 请求和 WebSockets。\n\
    \n## HTTP 请求\n\n用于 http 请求的主要模块恰如其分地命名为 requests。requests 模块允许你使用 Python 发送 HTTP\
    \ 请求。HTTP 请求返回一个 Response 对象，其中包含所有响应数据（内容、编码、状态等）。\n\n主要函数是：\n\n-   get：用于获取数据\n\
    -   post：用于发送数据\n\n主要参数需要 url[15]，然后可以包含可选参数，例如用于身份验证的 auth，它需要一个 ('user', 'pass')\
    \ 元组，或者用于保证连接超时的 timeout。\n\n用户可以向任何网站发送 get 请求并会收到响应。\n\n```python\nimport requests\n\
    \nr = requests.get('https://w3schools.com')\nprint(r.status_code)\n```\n\n响应带有一个状态码。\n\
    \n有许多状态码，分类如下：\n\n-   信息性响应 (100–199)\n-   成功响应 (200–299)\n-   重定向消息 (300–399)\n\
    -   客户端错误响应 (400–499)\n-   服务器错误响应 (500–599)\n\n主要响应是：200。这意味着请求成功。其他常见的有：\n\n\
    -   400：错误请求 - 服务器无法处理请求\n-   401 未授权 - 需要密码/身份验证\n-   403 禁止 - 客户端没有访问内容的权限\n\
    \n我们可以在 try-except 块中检查请求：\n\n```python\nimport requests\n\ntry:\n    # a site\
    \ that does NOT exist\n    r = requests.get('https://blahblah.com')\n    print(r.status_code)\n\
    except Exception as e:\n    print('failed to connect')\n    print(e)\n\ntry:\n\
    \    # a site that exists\n    r = requests.get('https://google.com')\n    print(r.status_code)\n\
    except Exception as e:\n    print('failed to connect')\n    print(e)\n```\n\n\
    但鉴于我们知道任何给定的站点都是有效的，更常见的做法是直接查看响应 status_code，如下所示：\n\n```python\nif r.status_code==200:\n\
    \    print('proceed with code...')\nelse:\n    print('can not proceed:', r.status_code)\n\
    ```\n\n除了状态码，我们还可以读取服务器响应的内容。这通常有 4 种类型：\n\n1.  文本。r.text\n2.  二进制。r.content\n\
    3.  JSON。r.json()\n4.  原始（较少见）。r.raw\n\n通常，requests 模块会根据 HTTP 头对响应的编码进行有根据的猜测。\n\
    \n然而，用户可以通过执行 r.encoding 来找到编码。\n\n## Websockets\n\nWebSocket 是一种事件驱动的协议，这意味着你实际上可以将其用于真正的实时通信。与\
    \ HTTP 不同，你必须不断请求更新，而使用 websockets，更新会在可用时立即发送。\n\n以金融交易所为例，它全天持续更新不同证券的价格。websocket\
    \ 允许用户登录交易所一次，然后在价格发生时监听各种证券的价格，而 HTTP 版本则要求用户不断连接并请求价格。"
