    system from the top left hand corner of the screen. That means that the top left
    is the point of origin (x=0, y=0) .


    This is different from the standard cartesian coordinate system that we are used
    to which has the origin in the bottom left hand corner and can also have negative
    values.


    | Cartesian coordinates | Screen coordinates |

