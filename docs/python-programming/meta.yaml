    \ power of the * unpacking operator for flexible list printing:\n\n```python\n\
    lst = [2*i for i in range(6)]\n# Typical list printing\nprint(lst)\n# Print just\
    \ the list elements\nprint(*lst)\n# Print the list in a special way\nprint(*lst,\
    \ sep=\" and \", end=\"--that's all folks!\\n\")\n```\n\nOutput:\n\n```\n[0, 2,\
    \ 4, 6, 8, 10]\n0 2 4 6 8 10\n0 and 2 and 4 and 6 and 8 and 10--that's all folks!\n\
    ```\n\nWhile we are on the subject of unpacking tuples, we can unpack a tuple\
