  md: "# Classes and mutability\n\nhttps://stackoverflow.com/questions/73537529/unexpected-behavior-with-python-list-of-dictionaries-when-adding-new-key-to-them/73538560#73538560\n\
    \nHere was the original question:\n\n> “I have encountered unexpected behaviour\
    \ from my python interpreter during a project. I'm aware that, in certain situations,\
    \ python uses the reference to an object, not the object itself. However, I cannot\
    \ explain why this problem arises in this piece of code since the elements of\
    \ the list seem to be different instances with different object ids. Whenever\
    \ I add a new {key:value} pair to the dictionary, all other dictionaries in that\
    \ list get updated.”\n\n```\nclass Node():\n    def __init__(self, name, neighbors=dict()):\n\
    \        self.name = name\n        self.neighbors = neighbors # a dict {}\n\n\
    \    def add_neighbor(self, neighbor, value=0):\n        self.neighbors[str(neighbor)]\
    \ = value\n\nif __name__ == \"__main__\":\n    n_1 = Node(name='node_1')\n   \
    \ n_1.add_neighbor('node_2', value=5)\n    n_2 = Node(name='node_2')\n\n    node_list\
    \ = [n_1, n_2]\n    for node in node_list:\n        print(id(node), node.name,\
    \ node.neighbors)\n```\n\nThe result is this:\n\n```\n2129022374520 node_1 {'node_2':\
    \ 5}\n2129022374576 node_2 {'node_2': 5}\n```\n\nSo why did this happen and how\
    \ do we fix this problem?\n\nThe default value for “neighbors” is a single dictionary\
    \ that is shared across class instances. This means that every instance points\
    \ to the same dict. It is an"
  merge: -1
  pgno: 310
- img_proc: true
  md: "inherent part of the mutability of lists and dicts (the memory address does\
    \ not change when the value changes). This is a useful feature when used properly,\
    \ but when overlooked or misunderstood could cause problems.\n\nSo how do we rectify\
    \ this?\n\nOne method would be to just type-hint of a dict in place of assigning\
    \ a dict. Remember, a type-hint in python is exactly that. This then means that\
    \ the user could assign their dicts in each instance when creating (instantiating)\
    \ the object.\n\n```\nclass Node():\n    def __init__(self, name, neighbors:dict):\
    \  # hint\n        self.name = name\n        self.neighbors = neighbors # a dict\
    \ {}\n\n    def add_neighbor(self, neighbor, value=0):\n        self.neighbors[str(neighbor)]\
    \ = value\n\nif __name__ == \"__main__\":\n    n_1 = Node(name='node_1', neighbors={})\
    \  # dict a\n    n_1.add_neighbor('node_2', value=5)\n    n_2 = Node(name='node_2',\
    \ neighbors={})  # dict b\n\n    node_list = [n_1, n_2]\n    for node in node_list:\n\
    \        print(id(node), node.name, node.neighbors)\n```"
  merge: -1
