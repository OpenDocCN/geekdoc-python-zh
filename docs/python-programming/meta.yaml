  md: '# The web


    The web provides a vast assortment of data and a myriad of use cases that spawns
    nearly all the information that we are aware of. The Global digital population
    as of April 2022 was over 5 billion internet users and nearly 5 billion social
    media users, but the reality is that in certain parts of the world, the share
    of the population using the internet is much closer to 100%.


    ![](img/4e4fc350228cd1c84055205e597f4fc0_124_0.png)


    We can automate the extraction of this resource with nearly any programming language
    and python has modules that make this relatively easy.


    We will explore two types of connection. The HTTP request and WebSockets.


    # HTTP request


    The main module for http requests is aptly named requests . The requests module
    allows you to send HTTP requests using Python. The HTTP request returns a Response
    Object with all the response data (content, encoding, status, etc).


    There main functions are:


    +   - get: for getting data

    - post: for sending data'
  merge: -1
  pgno: 124
