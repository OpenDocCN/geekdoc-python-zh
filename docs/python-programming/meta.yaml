    ```\n\n`t` 的长度和状态的数量是相同的。\n\n我们实际上存储了每个时间点 `t` 对应的两个角度和角速度。\n\n现在，给定我们知道每个时间点摆锤的角度（θ₁,\
    \ θ₂）和长度（L₁, L₂），绘制（x₁,y₁）和（x₂, y₂）的位置就变得很简单了。\n\n```python\nx1 = L1*sin(y[:,\
    \ 0])\ny1 = -L1*cos(y[:, 0])\n\nx2 = L2*sin(y[:, 2]) + x1\ny2 = -L2*cos(y[:, 2])\
