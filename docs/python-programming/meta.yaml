    \"\n    self.notified += 1\n    if self.notified > 1:\n        self.motivation\
    \ = self.motivation - 10\n\n    if self.aware == False:\n        # just heard\
    \ a rumor, now spread it.\n        self.aware = True\n        self.care = True\n\
    \n    if self.notified > 3:\n        # now bored so dont care\n        self.care\
    \ = False\n```\n\nWe add logical rules, such as motivation declining and people\
