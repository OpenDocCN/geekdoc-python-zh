    ## The web\n\nThe web provides a vast assortment of data and a myriad of use cases\
    \ that spawns nearly all the information that we are aware of. The Global digital\
    \ population as of April 2022 was over 5 billion internet users and nearly 5 billion\
    \ social media users, but the reality is that in certain parts of the world, the\
    \ share of the population using the internet is much closer to 100%.\n\n![](img/4e4fc350228cd1c84055205e597f4fc0_124_0.png)\n\
    \nWe can automate the extraction of this resource with nearly any programming\
    \ language and python has modules that make this relatively easy.\n\nWe will explore\
    \ two types of connection. The HTTP request and WebSockets.\n\n## HTTP request\n\
    \nThe main module for http requests is aptly named requests. The requests module\
    \ allows you to send HTTP requests using Python. The HTTP request returns a Response\
    \ Object with all the response data (content, encoding, status, etc).\n\nThere\
    \ main functions are:\n\n- get: for getting data\n- post: for sending data\n\n\
    The primary argument requires the url[15] and then there are optional arguments\
    \ that can be included, for example auth for authentication and requires a ('user',\
    \ 'pass') tuple or timeout to guarantee that the connection will be timed out.\n\
    \nThe user can send a get request to any website and will receive a response.\n\
    \n```python\nimport requests\n\nr = requests.get('https://w3schools.com')\nprint(r.status_code)\n\
    ```\n\nThe response comes with a status code.\n\nThere are many status codes categorised\
    \ as follows:\n\n- Informational responses (100–199)\n- Successful responses (200–299)\n\
    - Redirection messages (300–399)\n- Client error responses (400–499)\n- Server\
    \ error responses (500–599)\n\nThe main response is: 200. This means the request\
    \ was successful. Other common ones are:\n\n- 400: bad request - server cannot\
    \ process the request\n- 401 Unauthorised - needed a password/authenticate\n-\
    \ 403 Forbidden - The client does not have access rights to the content\n\nWe\
    \ can check requests in a try-except block:\n\n```python\nimport requests\n\n\
    try:\n    # a site that does NOT exist\n    r = requests.get('https://blahblah.com')\n\
    \    print(r.status_code)\nexcept Exception as e:\n    print('failed to connect')\n\
    \    print(e)\n\ntry:\n    # a site that exists\n    r = requests.get('https://google.com')\n\
    \    print(r.status_code)\nexcept Exception as e:\n    print('failed to connect')\n\
    \    print(e)\n```\n\nbut given that we know that any given site is valid it is\
    \ more common to just look at the response status_code like this:\n\n```python\n\
    if r.status_code==200:\n    print('proceed with code...')\nelse:\n    print('can\
    \ not proceed:', r.status_code)\n```\n\nAside from the status code, we can read\
    \ the content of the server’s response. This typically comes in 4 types:\n\n1.\
    \ Text. r.text\n2. Binary. r.content\n3. JSON. r.json()\n4. Raw (less common).\
    \ r.raw\n\nGenerally, the requests module makes educated guesses about the encoding\
    \ of the response based on the HTTP headers.\n\nHowever, the user can find the\
    \ encoding by doing r.encoding.\n\n## Websockets\n\nWebSocket is an event-driven\
    \ protocol, which means you can actually use it for truly real time communication.\
    \ Unlike HTTP, where you have to constantly request updates, with websockets,\
    \ updates are sent immediately when they are available.\n\nTake for example a\
    \ financial exchange which has continually updating prices for different securities\
    \ throughout the day. The websocket allows the user to log in once to the exchange\
    \ and then listen to the prices for various securities as and when they happen\
    \ compared to the HTTP version where the user would continually have to connect\
    \ and make requests for prices."
