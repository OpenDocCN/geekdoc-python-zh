    \n然而，这种方法可能会降低字符串在源代码中的可读性。Python提供了一种更自然地表示跨多行字符串的替代方法，使用三引号（`\"\"\"`或`'''`）。这些三引号分隔的字符串可以在源代码中跨越多行。例如，考虑以下代码，它演示了多行字符串的用法。\n\
