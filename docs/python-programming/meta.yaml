    \ JSON. r.json()\n4. Raw (less common). r.raw\n\nGenerally, the requests module\
    \ makes educated guesses about the encoding of the response based on the HTTP\
    \ headers.\n\nHowever, the user can find the encoding by doing r.encoding .\n\n\
    # Websockets\n\nWebSocket is an event-driven protocol, which means you can actually\
    \ use it for truly real time communication. Unlike HTTP, where you have to constantly\
    \ request updates, with websockets, updates are sent immediately when they are\
    \ available.\n\nTake for example a financial exchange which has continually updating\
    \ prices for different securities throughout the day. The websocket allows the\
    \ user to log in once to the exchange and then listen to the prices for various\
    \ securities as and when they happen compared to the HTTP version where the user\
    \ would continually have to connect and make requests for prices."
