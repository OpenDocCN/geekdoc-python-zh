  md: "The primary argument requires the url[15] and then there are optional arguments\
    \ that can be included, for example auth for authentication and requires a ('user',\
    \ 'pass') tuple or timeout to guarantee that the connection will be timed out.\n\
    \nThe user can send a get request to any website and will receive a response.\n\
    \n```\nimport requests\n\nr = requests.get('https://w3schools.com')\nprint(r.status_code)\n\
    ```\n\nThe response comes with a status code.\n\nThere are many status codes categorised\
    \ as follows:\n\n+   - Informational responses (100–199)\n- Successful responses\
    \ (200–299)\n- Redirection messages (300–399)\n- Client error responses (400–499)\n\
    - Server error responses (500–599)\n\nThe main response is: 200. This means the\
    \ request was successful. Other common ones are:\n\n+   - 400: bad request - server\
    \ cannot process the request\n- 401 Unauthorised - needed a password/authenticate\n\
    - 403 Forbidden - The client does not have access rights to the content\n\nWe\
    \ can check requests in a try-except block:\n\n```\nimport requests\n\ntry:\n\
    \    # a site that does NOT exist\n    r = requests.get('https://blahblah.com')\n\
    \    print(r.status_code)\nexcept Exception as e:\n    print('failed to connect')\n\
    \    print(e)\n\ntry:\n    # a site that exists\n```"
