    随着程序变得越来越大和越来越复杂，“导入整个模块”的方法变得更具吸引力。限定的函数名提高了代码的可读性，并避免了提供同名函数的模块之间的名称冲突。很快我们就会编写自己的自定义函数。限定名确保我们自己创建的名称不会与模块可能提供的任何名称冲突。


    ## 6.3. 内置函数


    在第 6.1 节中，我们注意到从初始章节开始，我们一直在 Python 中持续使用函数。这些包括 `print`、`input`、`int`、`float`、`str`
    和 `type` 等函数。这些函数以及各种其他函数都包含在一个名为 `builtins` 的特殊模块中。`builtins` 模块的独特之处在于它对所有 Python
    程序都是固有可访问的，无需显式的 `import` 语句。虽然 `print` 函数的完整名称是 `builtins.print`，但在 Python 脚本中很少遇到它的完整名称。我们可以在解释器中确认它的完整限定名。


    ```

    >>> print(''Hi'')

    Hi

    >>> builtins.print(''Hi'')

    Hi

    >>> print

    <built-in function print>

    >>> builtins.print

    <built-in function print>

    >>> id(print)

    ```


    解释：


    1.  第一行 `print(''Hi'')` 演示了使用 `print` 函数在输出中显示字符串 ''Hi''。

    2.  第二行 `builtins.print(''Hi'')` 通过显式引用 `builtins` 模块中的 `print` 函数，也达到了相同的结果。

    3.  第三行单独的 `print` 显示了关于内置 `print` 函数的信息。

    4.  第四行 `builtins.print` 同样显示了关于内置 `print` 函数的信息，表明它是 `builtins` 模块中的一个函数。

    5.  第五行 `id(print)` 检索 `print` 函数的唯一标识符（内存地址），但你没有完成这一行，因此没有显示输出。要查看输出，你需要用 `print`
    语句完成这一行，例如 `print(id(print))`。


    请注意，`builtins` 模块在 Python 中是隐式可用的，在大多数情况下你不需要显式引用它。上面的例子用于演示 `print` 函数在 `builtins`
    模块上下文中的行为和属性。'
