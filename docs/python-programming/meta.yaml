    \    # Compute the satellite's new (x, y) location after rotating by 60 degrees\n\
    \    x, y = x * COS_theta - y * SIN_theta, x * SIN_theta + y * COS_theta\n```\n\
    \nThis code calculates and prints the distance to a satellite from a stationary\
