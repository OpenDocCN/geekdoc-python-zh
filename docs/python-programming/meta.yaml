    # 7.2. PARAMETER PASSING


    When a function call is made and it requires a parameter, the caller needs to
    provide a parameter value to the function. The process of parameter passing in
    Python is straightforward: the function call connects the formal parameter to
    the object referenced by the actual parameter.


    The objects we’ve discussed so far—such as integers, floating-point numbers, and
    strings—are categorized as immutable objects. This classification means that once
    an object’s value is assigned, it cannot be altered. For example, when we write:


    ```

    x = 4

    ```


    The variable x is linked to the integer 4. We can reassign x, but we cannot modify
    the value of 4. The value of 4 remains constant.


    Likewise, we can assign a string literal to a variable, like:


    ```

    word = ‘great’

    ```


    However, we cannot modify the string object itself that word points to. When the
    caller’s actual parameter refers to an immutable object, the function’s actions
    cannot impact the value of the actual parameter.


    The code you’ve provided demonstrates the behavior of parameter passing in Python,
    specifically focusing on how modifications to the parameter inside a function
    do not affect the original variable outside the function.'
