    \n在Python（和其他语言）中，大多数数据库函数的过程是相似的。\n\n1.  连接到数据库\n2.  执行SQL命令（以接收或发送数据）。\n3. \
    \ 关闭连接。\n\n在示例中，“employee.db”包含一些员工薪资数据。前两列是姓名，为**文本**，下一列薪资是**整数**。\n\n我们可以这样向数据库添加数据：\n\
    \n```\nc.execute('insert into employees VALUES (\"alice\", \"apple\", 50000)')\n\
