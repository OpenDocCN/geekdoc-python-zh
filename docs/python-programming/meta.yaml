  md: "For this reason, it is suitable to use SQLite as the example case as it has\
    \ the potential to provide use cases for both beginners and advanced users.\n\n\
    The key difference between SQLite and most other databases is that SQLite does\
    \ not have a separate server process. SQLite reads and writes directly to ordinary\
    \ disk files.\n\nIn general, databases are faster than file systems and SQLite\
    \ claims to be approximately 35% faster than a standard file. One main reason\
    \ for this is that the open() and close() system calls are invoked only once for\
    \ databases.\n\nMost SQL database engines use static, rigid typing. So each column\
    \ is effectively given a type at the outset.\n\nThese are the types that SQLite\
    \ offers:\n\n+   - NULL. The value is a NULL value.\n- INTEGER. The value is a\
    \ signed[27] integer.\n- REAL. The value is a floating point value.\n- TEXT. The\
    \ value is a text string.\n- BLOB. The value is a blob of data, stored exactly\
    \ as it was input.\n\nSo the Python language has good familiarity with the types\
    \ with the introduction of the “blob”.\n\nSQLite does not offer the boolean data\
    \ type, but this is handled with 1 (True) & 0 (False).\n\nSQLite also does not\
    \ have a Date and Time Datatype, so handles this as the **Text**, **Real** or\
