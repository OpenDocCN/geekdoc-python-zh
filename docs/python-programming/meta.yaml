    y = x*SIN_theta + y*COS_theta        # Compute new y value using original x\n\n\
    x = new_x                            # Update x\n```\n\n## 6.5. TIME FUNCTIONS\n\
    \nThe time module contains a number of functions that relate to time. We will\
