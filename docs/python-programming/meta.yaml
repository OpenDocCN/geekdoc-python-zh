- md: "## 5.6. WHILE/ELSE AND FOR/ELSE\n\nPython loops offer the flexibility of including\
    \ an optional else block. When a loop completes all its iterations without encountering\
    \ a break statement, the code within the loop’s else block executes. However,\
    \ if the loop is terminated prematurely due to a break statement, the code within\
    \ the else block will be skipped.\n\nFor instance, in the case of a while loop,\
    \ if its condition becomes false during its regular check, the associated else\
    \ block will still be executed, even if the loop’s body has not had a chance to\
    \ execute yet. This behavior can be observed in Listing 5.28 (whileelse.py), which\
    \ demonstrates the functionality of the while/else statement.\n\n```\ncount =\
    \ sum = 0\nprint('Please provide five nonnegative numbers when prompted')\nwhile\
    \ count < 5:\n    # Get value from the user\n    val = float(input('Enter number:\
    \ '))\n    if val < 0:\n        print('Negative numbers not acceptable! Terminating')\n\
    \        break\n    count += 1\n    sum += val\nelse:\n    print('Average =',\
    \ sum / count)\n```\n\ncount and sum are initialized to 0 to keep track of the\
    \ number of valid inputs and their sum, respectively.\n\nThe while loop runs until\
    \ five nonnegative numbers are provided (count < 5).\n\nInside the loop, the user\
    \ is prompted to enter a number using input, and the value is converted to a float\
    \ using float(input('Enter number: ')).\n\nThe code inside the if statement checks\
    \ if the entered value is negative (val < 0). If it is negative, the loop is terminated\
    \ using the break statement, and the program prints an error message.\n\nIf the\
    \ value is nonnegative, the count is incremented, and the value is added to the\
    \ sum.\n\nAfter the loop completes all iterations without encountering a break\
    \ statement, the else block is executed, and the program prints the average of\
    \ the five nonnegative numbers by dividing sum by count. The code is well-structured\
    \ and effectively calculates the average of five nonnegative numbers, handling\
    \ invalid inputs properly.\n\nOutput:\n\n```\nPlease provide five nonnegative\
    \ numbers when prompted Enter number: 23\nEnter number: 12\nEnter number: 14\n\
    Enter number: 10\nEnter number: 11\nAverage = 14.0\n```\n\nWhen the user does\
    \ not comply with the instructions, the program will print a corrective message\
    \ and not attempt to compute the average:\n\n```\nPlease provide five nonnegative\
    \ numbers when prompted Enter number: 23\nEnter number: 12\nEnter number: -4\n\
    Negative numbers not acceptable! Terminating\n```\n\nIn the context of a while\
    \ loop, it is helpful to think of the else keyword as “if no break.” This interpretation\
    \ means that the code within the else block will be executed only if the program’s\
    \ execution of the while block completes without encountering a break statement.\
    \ By considering “if no break” as a mnemonic for the else keyword in a while loop,\
    \ programmers can better understand when the else block will be executed. It helps\
    \ provide clarity and improves the code’s readability, making it easier to comprehend\
    \ the control flow in loops that include an else clause.\n\n```\ncount = sum =\
    \ 0\nprint('Please provide five nonnegative numbers when prompted')\nwhile count\
    \ < 5:\n    # Get value from the user\n    val = float(input('Enter number: '))\n\
    \    if val < 0:\n        break\n    count += 1\n    sum += val\nif count < 5:\n\
    \    print('Negative numbers not acceptable! Terminating')\nelse:\n    print('Average\
    \ =', sum / count)\n```\n\nExplanation:\n\n1. The variables count and sum are\
    \ initialized to 0 to keep track of the number of valid inputs and their sum,\
    \ respectively.\n2. The user is prompted to enter a number using input, and the\
    \ value is converted to a float using float(input('Enter number: ')).\n3. If the\
    \ entered value is negative (val < 0), the break statement is executed, terminating\
    \ the loop immediately.\n4. If the value is nonnegative, the count is incremented,\
    \ and the value is added to the sum.\n5. After the while loop completes all iterations,\
    \ the code checks whether count is less than 5. If it is, that means the loop\
    \ terminated early due to encountering a negative number, and the program prints\
    \ an error message. Otherwise, the program prints the average of the five nonnegative\
    \ numbers by dividing sum by count.\n\nNow the code should work correctly to calculate\
    \ the average of five nonnegative numbers provided by the user and handle negative\
    \ numbers appropriately.\n\n```\nword = input('Enter the text')\nvowel_count =\
    \ 0\nfor c in word:\n    if c in 'AEIOUaeiou':\n        print(c, ', ', sep='',\
    \ end='') # Print the vowel\n        vowel_count += 1 # Count the vowel\n    elif\
    \ c == 'X' or c == 'x':\n        print('X not allowed')\n        break\n    else:\n\
    \        print('(', vowel_count, ' vowels)', sep='')\n```\n\nExplanation:\n\n\
    1. The user is prompted to enter a text input, which is stored in the variable\
    \ word.\n2. The variable vowel_count is initialized to 0 to keep track of the\
    \ number of vowels encountered in the input.\n3. The for loop iterates through\
    \ each character c in the input word.\n4. If c is a vowel (either uppercase or\
    \ lowercase), it is printed without a new line and followed by a comma and a space.\
    \ The vowel_count is incremented to track the number of vowels.\n5. If c is 'X'\
    \ or 'x,' the program prints 'X not allowed' and exits the loop using the break\
    \ statement.\n6. If none of the above conditions are met, the program prints the\
    \ total count of vowels encountered in the input.\n\nThe code checks for vowels\
    \ in the input text and handles the presence of 'X' or 'x' accordingly.\n\n##\
    \ 5.7. INFINITE LOOPS\n\nAn infinite loop in Python is a loop that keeps running\
    \ indefinitely as long as the loop condition remains true, or there is no explicit\
    \ way to exit the loop. Infinite loops can be unintentional and cause the program\
    \ to hang or become unresponsive, leading to undesirable outcomes. It's essential\
    \ to avoid or carefully manage infinite loops to prevent such issues.\n\nHere\
    \ are some examples of infinite loops:\n\nUsing a while loop without an exit condition:\n\
    \n```\nwhile True:\n    # Code that keeps running indefinitely\n```\n\nIncorrectly\
    \ written while loop with an incorrect condition that never becomes false:\n\n\
    ```\nx = 10\nwhile x > 0:\n    # Code that doesn't change the value of x, causing\
    \ an infinite loop\n```\n\nUsing break or continue in a way that always results\
    \ in re-entering the loop:\n\n```\nwhile True:\n    # Code that does not include\
    \ a break or continue statement\n    break # This break statement has no effect;\
    \ loop restarts\n```\n\nUsing a for loop with a range that never exhausts:\n\n\
    ```\nfor i in range(10):\n    # Code that keeps the loop running without exhausting\
    \ the range\n```\n\nTo prevent infinite loops, ensure that your loops have appropriate\
    \ exit conditions, such as a specific number of iterations, a flag variable, or\
    \ user input that allows the user to break out of the loop.\n\nAdditionally, make\
    \ sure that any break or continue statements are placed correctly to avoid unintended\
    \ infinite iterations.\n\nIf you ever find yourself stuck in an infinite loop\
    \ during testing or execution, you can stop the program's execution forcefully\
    \ by pressing Ctrl+C in the command-line interface or by stopping the execution\
    \ in your development environment.\n\nA loop is a sequence of iterative statements\
    \ or instructions that are continuously repeated until a certain condition meets.\
    \ Loops are used in scenarios where we want to do certain work numerous times.\
    \ So instead of writing the same code multiple times, we use a loop.\n\nThere\
    \ are mainly two kinds of loops in Python namely the for loop and the while loop."
  mdcn: "## 5.6. WHILE/ELSE 和 FOR/ELSE\n\nPython 循环提供了包含可选 else 代码块的灵活性。当一个循环在未遇到\
    \ `break` 语句的情况下完成所有迭代时，循环的 else 代码块中的代码将会执行。然而，如果循环因 `break` 语句而提前终止，则 else 代码块中的代码将被跳过。\n\
    \n例如，在 while 循环的情况下，如果其条件在常规检查期间变为 false，即使循环体尚未有机会执行，关联的 else 代码块仍将被执行。这种行为可以在清单\
    \ 5.28（whileelse.py）中观察到，该清单演示了 while/else 语句的功能。\n\n```\ncount = sum = 0\nprint('Please\
    \ provide five nonnegative numbers when prompted')\nwhile count < 5:\n    # Get\
    \ value from the user\n    val = float(input('Enter number: '))\n    if val <\
    \ 0:\n        print('Negative numbers not acceptable! Terminating')\n        break\n\
    \    count += 1\n    sum += val\nelse:\n    print('Average =', sum / count)\n\
    ```\n\n`count` 和 `sum` 被初始化为 0，分别用于跟踪有效输入的数量及其总和。\n\nwhile 循环运行，直到提供了五个非负数（`count\
    \ < 5`）。\n\n在循环内部，使用 `input` 提示用户输入一个数字，并使用 `float(input('Enter number: '))` 将该值转换为浮点数。\n\
    \n`if` 语句内部的代码检查输入的值是否为负数（`val < 0`）。如果为负数，则使用 `break` 语句终止循环，程序打印一条错误消息。\n\n\
    如果该值为非负数，则 `count` 递增，并将该值添加到 `sum` 中。\n\n在循环完成所有迭代且未遇到 `break` 语句后，else 代码块被执行，程序通过将\
    \ `sum` 除以 `count` 来打印五个非负数的平均值。该代码结构良好，能有效计算五个非负数的平均值，并正确处理无效输入。\n\n输出：\n\n```\n\
    Please provide five nonnegative numbers when prompted Enter number: 23\nEnter\
    \ number: 12\nEnter number: 14\nEnter number: 10\nEnter number: 11\nAverage =\
    \ 14.0\n```\n\n当用户未遵守说明时，程序将打印一条纠正消息，而不会尝试计算平均值：\n\n```\nPlease provide five nonnegative\
    \ numbers when prompted Enter number: 23\nEnter number: 12\nEnter number: -4\n\
    Negative numbers not acceptable! Terminating\n```\n\n在 while 循环的上下文中，将 `else`\
    \ 关键字理解为“如果没有 break”会很有帮助。这种解释意味着，只有当程序执行 while 代码块完成且未遇到 `break` 语句时，else 代码块中的代码才会执行。通过将“如果没有\
    \ break”作为 while 循环中 `else` 关键字的记忆法，程序员可以更好地理解 else 代码块何时执行。它有助于提供清晰度并提高代码的可读性，使包含\
    \ else 子句的循环中的控制流更容易理解。\n\n```\ncount = sum = 0\nprint('Please provide five nonnegative\
    \ numbers when prompted')\nwhile count < 5:\n    # Get value from the user\n \
    \   val = float(input('Enter number: '))\n    if val < 0:\n        break\n   \
    \ count += 1\n    sum += val\nif count < 5:\n    print('Negative numbers not acceptable!\
    \ Terminating')\nelse:\n    print('Average =', sum / count)\n```\n\n解释：\n\n1.\
    \  变量 `count` 和 `sum` 被初始化为 0，分别用于跟踪有效输入的数量及其总和。\n2.  使用 `input` 提示用户输入一个数字，并使用\
    \ `float(input('Enter number: '))` 将该值转换为浮点数。\n3.  如果输入的值为负数（`val < 0`），则执行 `break`\
    \ 语句，立即终止循环。\n4.  如果该值为非负数，则 `count` 递增，并将该值添加到 `sum` 中。\n5.  while 循环完成所有迭代后，代码检查\
    \ `count` 是否小于 5。如果是，则意味着循环因遇到负数而提前终止，程序打印一条错误消息。否则，程序通过将 `sum` 除以 `count` 来打印五个非负数的平均值。\n\
    \n现在代码应该能正确计算用户提供的五个非负数的平均值，并适当处理负数。\n\n```\nword = input('Enter the text')\n\
    vowel_count = 0\nfor c in word:\n    if c in 'AEIOUaeiou':\n        print(c, ',\
    \ ', sep='', end='') # Print the vowel\n        vowel_count += 1 # Count the vowel\n\
    \    elif c == 'X' or c == 'x':\n        print('X not allowed')\n        break\n\
    \    else:\n        print('(', vowel_count, ' vowels)', sep='')\n```\n\n解释：\n\n\
    1.  提示用户输入文本，该文本存储在变量 `word` 中。\n2.  变量 `vowel_count` 被初始化为 0，用于跟踪输入中遇到的元音数量。\n\
    3.  `for` 循环遍历输入 `word` 中的每个字符 `c`。\n4.  如果 `c` 是元音（大写或小写），则打印它（不换行），后跟一个逗号和一个空格。`vowel_count`\
    \ 递增以跟踪元音数量。\n5.  如果 `c` 是 'X' 或 'x'，程序打印 'X not allowed' 并使用 `break` 语句退出循环。\n\
    6.  如果以上条件均不满足，程序打印输入中遇到的元音总数。\n\n该代码检查输入文本中的元音，并相应处理 'X' 或 'x' 的存在。\n\n## 5.7.\
    \ 无限循环\n\nPython 中的无限循环是指只要循环条件保持为真，或者没有明确的退出循环方式，就会无限期运行的循环。无限循环可能是无意的，会导致程序挂起或变得无响应，从而导致不良结果。避免或仔细管理无限循环以防止此类问题至关重要。\n\
    \n以下是一些无限循环的示例：\n\n使用没有退出条件的 while 循环：\n\n```\nwhile True:\n    # Code that keeps\
    \ running indefinitely\n```\n\n编写错误的 while 循环，其条件永远不会变为 false：\n\n```\nx = 10\n\
    while x > 0:\n    # Code that doesn't change the value of x, causing an infinite\
    \ loop\n```\n\n以总是导致重新进入循环的方式使用 `break` 或 `continue`：\n\n```\nwhile True:\n  \
    \  # Code that does not include a break or continue statement\n    break # This\
    \ break statement has no effect; loop restarts\n```\n\n使用范围永远不会耗尽的 `for` 循环：\n\
    \n```\nfor i in range(10):\n    # Code that keeps the loop running without exhausting\
    \ the range\n```\n\n为防止无限循环，请确保您的循环具有适当的退出条件，例如特定的迭代次数、标志变量或允许用户跳出循环的用户输入。\n\n\
    此外，请确保任何 `break` 或 `continue` 语句放置正确，以避免意外的无限迭代。\n\n如果您在测试或执行过程中发现自己陷入无限循环，可以通过在命令行界面中按\
    \ `Ctrl+C` 或在开发环境中停止执行来强制停止程序的执行。\n\n循环是一系列迭代语句或指令，它们会持续重复，直到满足某个条件。循环用于我们需要多次执行某些工作的场景。因此，我们使用循环，而不是多次编写相同的代码。\n\
    \nPython 中主要有两种循环，即 `for` 循环和 `while` 循环。"
