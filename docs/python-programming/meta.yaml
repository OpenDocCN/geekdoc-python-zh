    # 6.9. TURTLE GRAPHICS


    Creating drawings on paper with a pen is a basic method of illustration. By positioning
    the pen on the paper, we can generate marks that vary in length and shape based
    on pen movement. To continue the composition, we can relocate the pen on the paper.
    Additionally, the availability of pens in different colors adds to our artistic
    possibilities. In the realm of computer graphics, turtle graphics replicates these
    manual actions of pen placement, movement, and rotation on a digital display.
    The term “Turtle graphics” originates from the depiction of the pen as a turtle
    navigating within the display window. This idea was pioneered by Seymour Papert
    as part of his Logo programming language during the late 1960s. (For further insights
    into Turtle graphics, refer to http://en.wikipedia.org/wiki/Turtle graphics).
    Python offers an accessible Turtle graphics library, making the process notably
    straightforward. Turtle Graphics is a graphical educational tool in Python that
    allows you to create drawings and patterns using a virtual “turtle” that moves
    around the screen. It’s often used to teach programming concepts to beginners
    in a fun and interactive way. The turtle starts at a specific location on the
    screen and can be directed to move and draw by using simple commands.


    Here’s a basic example of using Turtle Graphics in Python:


    ```

    import turtle

    # Create a turtle screen

    screen = turtle.Screen()

    # Create a turtle object

    t = turtle.Turtle()

    ```'
