    \ Given an initial position (x, y) of a point, a rotation of θ degrees around\
    \ the origin will yield a new point at (x', y'), where;\n\n    x' = x cosθ - y\
    \ sinθ\n    y' = x sinθ + y cosθ\n\n2.  Problem: We must recalculate the distance\
    \ between the moving point and the fixed point as the moving point moves to a\
    \ new position.\n\n    Solution: The distance d in Figure 6.4 between the two\
