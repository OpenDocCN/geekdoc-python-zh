    from a planet. A satellite is orbiting the planet in a circular orbit. We wish
    to compute how much farther away the satellite will be from the spacecraft when
    it has progressed θ degrees along its orbital path.


    We will let the origin of our coordinate system (0, 0) be located at the center
    of the planet. This location corresponds also to the center of the satellite’s
    circular orbital path. The satellite is located as some point, (x, y) and the
    spacecraft is stationary at point (px, py). The spacecraft is located in the same
    plane as the satellite’s orbit. We wish to compute the distances between the moving
    point (satellite) and the fixed point (spacecraft) as the satellite orbits the
    planet.


    Facts from mathematics provide solutions to the following two problems:


    +   1. Problem: We must recompute the location of the moving point as it moves
    along the circle.


    Solution: Given an initial position (x, y) of a point, a rotation of θ degrees
    around the origin will yield a new point at (x'', y''), where;


    x'' = x cosθ - y sinθ

    y'' = x sinθ + y cosθ


    2. Problem: We must recalculate the distance between the moving point and the
    fixed point as the moving point moves to a new position.


