    Too small\")\nelse:\n    if value == 0:\n        print(\"zero\")\n    else:\n\
    \        if value == 1:\n```"
  mdcn: "## 4.7. 浮点数相等性\n\n浮点数相等性是编程中一个常见问题，这源于计算机中浮点数的表示方式。浮点数是近似值，由于内存和表示方式的限制，它们可能无法被精确存储。在\
    \ Python 中，与许多编程语言一样，浮点数使用 IEEE 754 标准表示。由于以二进制形式表示实数的限制，某些十进制数无法精确表示为浮点数，从而导致微小的舍入误差。因此，使用相等运算符（==）来比较两个浮点数是否完全相等可能会出现问题。例如，考虑以下代码：\n\
    \n```python\na = 0.1 + 0.2\nb = 0.3\nif a == b:\n    print(\"Equal\")\nelse:\n\
    \    print(\"Not Equal\")\n```\n\n这段代码的输出将是 \"Not Equal\"，因为由于舍入误差，0.1 + 0.2 的结果并不完全等于\
    \ 0.3。\n\n为了处理浮点数相等性比较，通常使用容差或 epsilon 值。不是检查完全相等，而是检查两个数的差值是否在一个小范围或容差值内。例如：\n\
    \n```python\ntolerance = 1e-9\na = 0.1 + 0.2\nb = 0.3\nif abs(a - b) < tolerance:\n\
    \    print(\"Equal\")\nelse:\n    print(\"Not Equal\")\n```\n\n在这段代码中，我们定义了一个小的容差值（这里是\
    \ 1e-9），并检查 a 和 b 的绝对差值是否小于这个容差。如果差值在容差范围内，我们就认为这两个数相等。请记住，容差值的选择取决于你所处理的具体问题和所需的精度。较小的容差值意味着更严格的比较，但在某些情况下可能导致假阴性。较大的容差值可能导致假阳性。因此，选择合适的容差值对于平衡准确性和性能至关重要。\n\
    \n## 4.8. 嵌套条件语句\n\n嵌套条件语句指的是在一个条件语句（if 语句）的主体内使用一个或多个条件语句的做法。这允许你通过基于多个条件对代码进行分支，来创建更复杂的决策结构。在\
    \ Python（以及大多数编程语言）中，你可以使用以下语法来创建嵌套条件语句：\n\n```python\nif condition1:\n    # 当\
    \ condition1 为 True 时执行的代码块\n    if condition2:\n        # 当 condition2 为 True\
    \ 时执行的代码块\n    else:\n        # 当 condition2 为 False 时执行的代码块\nelse:\n    # 当 condition1\
    \ 为 False 时执行的代码块\n    if condition3:\n        # 当 condition3 为 True 时执行的代码块\n\
    \    else:\n        # 当 condition3 为 False 时执行的代码块\n```\n\n以下是一个说明嵌套条件语句的示例：\n\
