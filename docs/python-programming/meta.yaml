    ```\n\nWe create lists so that we can plot the data later. The loop itself contains\
    \ a cycle of messaging friends and then other friends receiving those messages.\n\
    \nFinally, we can plot the data:\n\n```python\nplt.plot(community_motivation,\
    \ label='community motivation')\nplt.plot(community_aware, label='community aware')\n\
    plt.plot(community_care, label='community care', linewidth=4)\n\nplt.title('who\
    \ is aware and who cares')\nplt.xlabel(' iteration ->')\nplt.ylabel('count ->')\n\
    plt.legend()\nplt.grid()\nplt.show()\n```\n\nThe three lines we care for are:\n\
    \n- 1. Community awareness: Here we find a typical s-shaped curve where there\
    \ is a steep incline and then saturation.\n- 2. Community care: This is the number\
    \ of people at any point in time that care to send on the rumour. Here we see\
    \ a point of “peak” interest, before people get bored of the rumour.\n- 3. Community\
    \ motivation: is an alternative measure for community care. It represents how\
    \ motivated in total the community is to transmit the rumour. We see that this\
    \ wanes with time.\n\nOur first plot is the standard model.\n\n![](img/4e4fc350228cd1c84055205e597f4fc0_200_0.png)\n\
    \nOur second plot is similar to the first, but with the motivation levels reduced.\
