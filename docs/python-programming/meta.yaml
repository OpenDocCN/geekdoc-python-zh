    \n## 10.1. USING LISTS\n\nA list is an object that holds a collection of objects;\
    \ it represents a sequence of data. In that sense, a list is similar to a string,\
    \ except a string can hold only characters. A list can hold any Python object.\
    \ A list need not be homogeneous; that is, the elements of a list do not all have\
    \ to be of the same type.\n\nLike any other variable, a list variable can be local\
    \ or global, and it must be defined (assigned) before its use. The following code\
    \ fragment defines a list named lst that holds the integer values 2, -3, 0, 4,\
    \ -1:\n\n```python\nlst = [2, -3, 0, 4, -1]\n```\n\nThe right-hand side of the\
    \ assignment statement is a literal list. The elements of the list appear within\
    \ square brackets ([ ]), and commas separate the elements. The following statement\
    \ assigns the empty list to a variable named a:\n\n```python\na = []\n```\n\n\
    We can print list literals and lists referenced through variables:\n\n```python\n\
    lst = [2, -3, 0, 4, -1]       # Assign the list\nprint([2, -3, 0, 4, -1])    \
    \  # Print a literal list\nprint(lst)                     # Print a list via a\
    \ variable\n```\n\nThe above code prints:\n\n```\n[2, -3, 0, 4, -1]\n[2, -3, 0,\
    \ 4, -1]\n```\n\nWe may access the elements contained in a list via their position\
    \ within the list. We access individual elements of a list using square brackets:\n\
    \n```python\nlst = [2, -3, 0, 4, -1]       # Assign the list\nlst[0] = 5     \
    \               # Make the first element 5\nprint(lst[1])                 # Print\
    \ the second element\nlst[4] = 12                   # Make the last element 12\n\
    print(lst)                    # Print a list variable\nprint([10, 20, 30][1])\
    \        # Print second element of literal list\n```\n\nThis code prints:\n\n\
    ```\n-3\n[5, -3, 0, 4, 12]\n20\n```\n\nThe number within the square brackets is\
    \ called the index. A nonnegative index indicates the distance from the beginning\
    \ of the list. The expression lst[0] therefore indicates the element at the very\
    \ beginning (a distance of zero from the beginning) of lst, and lst[1] is the\
    \ second element (a distance of one away from the beginning). We can read aloud\
    \ the expression a[3] as “a sub three,” where the index 3 represents a subscript.\n\
    \n![A simple list with three elements. The small number below a list element represents\
    \ the index of that element.](img/1dbe1e06b9d31a6f7ada030324ed273a_309_0.png)\n\
    \n**Figure 10.1.** A simple list with three elements. The small number below a\
    \ list element represents the index of that element.\n\nThe subscript terminology\
    \ is borrowed from mathematicians who use subscripts to reference elements in\
    \ a mathematical vector or matrix; for example, V2 represents the second element\
    \ in vector V. Unlike the convention often used in mathematics, however, the first\
    \ element in a list is at position zero, not one. As mentioned above, the index\
    \ indicates the distance from the beginning; thus, the very first element is at\
