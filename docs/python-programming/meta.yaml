    # Colour detection


    When it comes to colour detection, the logical step would be to select colours
    by their RGB (or BGR) tuple values. For example, if we wanted to pick blues, then
    these would be all tuples where the blue value was relatively high compared to
    the other values.


    So (200, 50, 50) in the opencv module would be predominantly blue. We could therefore,
    by this logic, select all colours that were blue in nature. The blue ordinate
    > 200 would be sufficient.


    However, whilst this logic could be used, the preferred method is to convert the
    image to HSV or Hue Saturation Value which is used to separate image luminance
    from colour information. This makes it easier when we are working on or need luminance
    of the image/frame. HSV is also used in situations where colour description plays
    an integral role.


    In the HSV representation of colour, hue determines the colour you want, saturation
    determines how intense the colour is and value determines the lightness of the
    image.'
