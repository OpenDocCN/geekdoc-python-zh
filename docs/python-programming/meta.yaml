    \ L2 * state[3] * state[3] * sin(delta)\n                - (M1+M2) * G * sin(state[0]))\n\
    \               / den1)\n\n    dydx[2] = state[3]\n\n    den2 = (L2/L1) * den1\n\
    \    dydx[3] = ((- M2 * L2 * state[3] * state[3] * sin(delta) * cos(delta)\n \
