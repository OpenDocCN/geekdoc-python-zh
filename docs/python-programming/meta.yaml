    # 11.9. SET QUANTIFICATION WITH ALL AND ANY


    Python provides functions named all and any that respectively correspond to mathematical
    universal and existential quantification. These fancy mathematical terms label
    relatively simple concepts.


    Figure 11.1 Python’s set operations: union, intersection, set difference, and
    symmetric difference. The shaded area in each diagram indicates the elements that
