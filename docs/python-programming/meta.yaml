    The parentheses are optional in the following statement:

    my_tuple = (1, 2, 3)

    The following statement is equivalent:

    my_tuple = 1, 2, 3

    Lists can hold heterogeneous data types, and so too can tuples:


    ```

    >>> t = (2, ''Fred'', 41.2, [30, 20, 10])

    >>> t

    (2, ''Fred'', 41.2, [30, 20, 10])

    ```


    In general practice, however, many Python programmers favor storing

    only homogeneous types in lists and prefer tuples for holding heterogeneous

    types.


    Section 7.1 introduced tuple unpacking. The following code unpacks a

    tuple into separate variables:

    t = 3, ''A'', 99

    val, letter, quant = t

    After this code executes val will refer to 3, letter will be assigned to the

    string ''A'', and quant will be another name for the integer 99.


    Tuple unpacking is convenient if you need to extract most, if not all, of

    the elements from a tuple. If you need only one element from a potentially

    large tuple, the index operator is a better choice, as shown here:

    t = 3, ''A'', 99

    letter = t[1]

    Here letter is assigned to the string ''A''.


    If you wish to extract several components from a tuple and ignore others,

    tuple extraction with “throw away” _ variables (see Section 10.14) can be a

    good choice. The following code illustrates:

    t = 3, ''A'', 99, 16, 0, 42

    _, letter, _, _, quant, rating = t

    The nameless _ variable will end up with the value 16, but this variable

    is meant to be ignored. The code that follows these statements would be

    interested only in the variables letter, quant, and rating.'
