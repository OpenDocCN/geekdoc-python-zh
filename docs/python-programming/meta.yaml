    \n![](img/4e4fc350228cd1c84055205e597f4fc0_234_0.png)\n\n除了被限制在某些边界内，我们通过计算机模拟表明，双摆对初始条件敏感，且运动是混沌的。\n\
    \n## 三体问题\n\n三体问题之所以有趣，是因为它代表了另一种类型的混沌问题，其中*初始条件的微小变化会导致截然不同的结果*。\n\n同时，它也具有一定程度的可预测性，因为问题中的每个物体都遵循一个预先描述的运动模式，即万有引力。\n\
