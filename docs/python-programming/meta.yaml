  mdcn: "## 创建模块\n\n因此，我们可以导入由社区创建的模块，这类模块有成千上万之多。这些模块是非常强大的实用函数集合，包含用例示例和大量支持。\n\n\
    然而，创建的模块仅用于协助用户构建自己的项目。项目可以是一个不超过20行代码的单个代码片段，也可以是一个跨越数千行代码的大型有意义的代码块，并且还可以拥有用户自己创建的模块。\n\
    \nPython很好地兼顾了这两种情况，实际上它使用户创建和导入自己的模块变得非常容易。\n\n用户创建的每个文件都保存为*.py文件，并且会存放在一个文件夹中。例如，“hello_world.py”会被保存在电脑上的某个位置。\n\
    \n假设它保存在C盘（对于基于Windows的计算机）的一个我们命名为“code”的文件夹中。那么完整路径将如下所示：\nC:\\code\\hello_world.py\n\
    \n我们可以说这个Python文件名为hello_world.py，项目文件夹为c:\\code。现在，如果我们在同一个文件夹中创建另一个文件，比如hello_moon.py，那么项目文件夹中就会有两个文件。\n\
    \n我们只需要这样做：\n\n![](img/4e4fc350228cd1c84055205e597f4fc0_48_0.png)\n\n因此我们可以看到，import语句仅用一行代码就将一个文件（hello_moon.py）的所有属性和方法引入到另一个文件（hello_world.py）中。\n\
    \n规则也非常简单。被导入的文件夹应该位于项目文件夹的同一级或子文件夹中。仅此而已。\n\n因此，我们现在拥有了创建整个项目所需的工具，该项目被分解为有用且有意义的模块。\n\
    \n## 主模块\n\n这一切还有一个最后的部分，那就是我们现在拥有了属性和函数的集合，以及位于不同文件夹中的模块集合（Python文件）（希望不要太多，否则项目会很复杂）。那么我们如何确定这一切的起点呢？\n\
    \n通常有一个文件被认为是主文件，或者我们可以说它是代码的入口点。该文件可以是用户想要的任何有用或描述性的名称。\n\n阅读过**魔法方法**章节后，我们了解到Python中的所有对象都有特殊的内置函数，用双下划线表示。文件对象也不例外。以下是一些更有用的：\n\
    \n- `__file__`：文件的路径名。\n- `__doc__`：文件的描述。\n- `__name__`：文件的名称\n\n实际上，我们可以通过在文件中输入`print(dir())`并运行代码来获取这些属性的列表。\n\
    \n这里有趣的是`__name__`属性，因为它告诉我们被导入文件的名称。它的值取决于我们如何执行包含该文件的脚本。因此，实际的**主文件**（未被导入的那个）被赋予名称`__main__`。\n\
    \n我们经常在几乎每个大型项目的主文件底部看到这个。\n\n```\nif __name__==\"__main__\":\n    # run some\
    \ code\n    print('do something')\n```\n\nif语句内的代码现在仅在文件名是主文件时才运行。这就是我们的入口点！\n\
    \n作为旁注，我们可以通过添加额外的路径名来从项目文件夹之外的其他文件夹导入文件，如下所示。\n\n```\n# some_file.py\nimport\
    \ sys\n# caution: path[0] is reserved for script path (or \"\" in REPL)\nsys.path.insert(1,\
    \ '/path/to/application/app/folder')\n\nimport file\n```\n\n但出于我们的目的和*最佳实践，我们喜欢将包保持在一个文件夹中*。\n\
    \n## 编码技巧\n\n至此，我们已经概览了Python、如何设置环境以及语言本身的基础知识。\n\n我们研究了变量、集合、函数、循环和if语句等。我们所看到的一切都相对处于顶层，因为即使深入探讨一个主题本身也可能是一本书。\n\
    \n读者最好进行回顾，并通过在设备上进行实际的现实世界测试来支持他们的阅读。是的，这意味着**自己编写代码**，从`hello_world.py`程序开始。这一点再怎么强调也不为过，你现在必须将手指放在键盘上，以丰富这次阅读的收益。\n\
    \n话虽如此，现在是时候看看我们经常遇到的一些问题了。我不确定我将如何将它们分类。\n\n需要记住的重要一点是，这些“问题”应该被视为有趣的脑筋急转弯和其他有趣的案例。\n\
    \n## 什么是编码问题\n\n它是任何类型的问题，通常是我们可能无法仅用纸笔解决的有趣问题。最初，在尝试学习时，我参加了100天每日编码挑战。这基本上意味着，在100天里，每天选择一个问题，并尝试用任何语言解决该问题。\n\
    \n起初，我使用`node.js`，而一个朋友使用`python`，因此比较方法很有趣。现实是，这两种语言（有时被称为脚本语言）有超过75%的相似性。\n\n\
    事实上，如果将花括号替换为缩进，并移除行尾的分号，那么这两种语言就更接近了。\n\n## 什么是编码技巧\n\n我们可以将技巧视为我们处理问题的一般形式。我们经常使用相同的技巧来解决各种各样的问题，就像工具箱中的特定工具可能用于修复许多问题一样。\n\
    \n我们有常见的技巧，比如for循环和while循环，就像我们标准家用工具箱中有螺丝刀和扳手一样。\n\n然后我们有更专业的工具，比如pandas dataframe，它可能更类似于工具台上的砂光机。它们做的事情更少，但做得更好。\n\
    \n有时我们甚至可以使用错误的工具来完成工作，比如用螺丝刀或刀子打开一罐油漆。\n\n每种工具都有其优点和缺点。然而，如果我们能更多地选择正确的工具，那么我们的代码就会变得越来越高效。当数据量或处理数量变大时，这种效率尤其重要且明显。\n\
    \n可能就像将静态变量移到循环外一样简单。看看这两段代码：\n\n### for循环内的变量\n\n```\nimport time\n\nt0 = time.time()\n\
    for i in range(1_000_000):\n    a = 100\n    b = 2\n    if i%1000 == 0:\n    \
    \    print(a + b + i, end = \"\\r\")\n\nt1 = time.time()\n\nprint('the time taken\
    \ was', (t1-t0), 'seconds.')\n```\n\n### for循环外的变量\n\n```\nimport time\n\nt0 =\
    \ time.time()\na = 100\nb = 2\nfor i in range(1_000_000):\n    if i%1000==0:\n\
    \        print(a + b + i, end = \"\\r\")\n\nt1 = time.time()\n\nprint('the time\
    \ taken was', (t1-t0), 'seconds.')\n```\n\n哪一个更快，为什么？\n\n如果我们看第一段代码，变量a和b在每次循环中都被赋值。有100万次循环，因此这行代码额外执行了100万次。而在第二段代码中，变量被移出了循环，节省了大量的编程开销。\n\
    \n在这种情况下，我们受到的惩罚并不太严重，因为我们的代码片段很小，在两种情况下运行时间都不到一秒。但如果代码更复杂，或者变量恰好是大型函数，那么代码就会面临效率问题。\n\
    \n这里，高效方法的差异是90毫秒，而低效方法是180毫秒。\n\n我们可以通过以下方式轻松地突出显示这有多糟糕：\n\n```\nimport time\n\
    \nn = 3\ndef n_second_process(n):\n    \"\"\" a process that lasts for n seconds\
    \ \"\"\"\n    time.sleep(n)\n    return 'hello'\n\nx = n_second_process(n)\n\n\
    for i in range(100):\n    print(x + ' world')\n```\n\n再次是这个：\n\n```\nimport time\n\
    \ndef n_second_process(n):\n    \"\"\" a process that lasts for n seconds \"\"\
    \"\n    time.sleep(n)\n```"
