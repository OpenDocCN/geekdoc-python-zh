  md: "So a coloured HD image is now 1280 x 730 x 3 (a pixel for each colour). Each\
    \ one of these 921,600 pixels is made up from a sum of 3 colours each with 256\
    \ levels of intensity.\n\n# Reading images and videos\n\nNow that we have a basic\
    \ understanding of how images are made we can begin to move a bit deeper into\
    \ the process.\n\nOne of the nice things about Python is the ease of use that\
    \ it provides. Importing an image is done with the opencv-python module which\
    \ is a third party module like the pandas and numpy modules and is quickly installed\
    \ with the package manager ( pip install opencv-python ).\n\nWith this module\
    \ it is easy to read an image:\n\n```\nimport cv2\n\nimg = cv2.imread('assets/apple_colour.png')\n\
    cv2.imshow('Output', img)\ncv2.waitKey(0)\n```\n\nThe entire image is read into\
    \ the memory and then displayed on the screen.\n\nWe can inspect the contents\
    \ of the image like this:\n\n```\nprint(img)\nprint('columns:', len(img))\nprint('rows:',\
    \ len(img[0]))\nprint('colours:', len(img[0][0]))\n```\n\nAnd we see this:\n\n\
    ```\n[[ 64 104 129]\n [ 64 104 129]\n [ 64 104 129]\n ...\n [ 88  73  70]\n [\
    \ 88  73  70]\n [ 88  73  70]]\n ...\n ...\n [194 194 178]\n [193 193 175]\n [192\
    \ 192 174]]]\n\ncolumns: 1204\nrows: 1164\ncolours: 3\n```\n\nThis is a list of\
    \ lists (an array) with each sub list containing the RGB values. So, our example\
    \ image (of the coloured apple) contained a list of 1204 elements (the height)\
    \ x 1164 elements (the width) x 3 elements (the red,"
  merge: -1
