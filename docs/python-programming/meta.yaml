- md: '## Finance


    Python is a *general purpose high level programming language* which lends itself
    very well to the finance sector primarily because it bridges a very specific gap
    somewhere between spreadsheets and lower level languages.


    | type | example | difficulty | computation | Build time |

    |---|---|---|---|---|

    | Spreadsheet (code) | excel | easy | slow | fast |

    | High level code | python | medium | medium | medium |

    | Low level code | c++ | hard | fast | fast |


    The syntax is clean and dealing with lists and arrays is relatively straight forward.
    The language connects well with other parts of the system. Accessing databases
    and reading from and writing to files is easy.


    There is a level of automation in python that is beyond that of excel and it is
    simpler to use than (more powerful) languages like c++ that have longer development
    times.


    So python is good for prototyping. For example, let''s take a look at the lognormal
    distribution which is one of the most common distributions in finance or in fact
    any biological system whose distribution has a lower bound at zero and is random
    in nature.


    - Take a bunch of random variables.

    - Take the log of those: $y = \ln(x)$


    We know that the dependent variable, y is some function of x and in the case of
    the lognormal distribution some function of the natural logarithm of x.


    $y = f(x) \Leftrightarrow x = f^{-1}(y)$


    $y = \ln(x) \Leftrightarrow x = e^y$


    Here we set the mean, $\mu$, and standard deviation $\sigma$.


    $y = \mu + \sigma x$


    If x is normal, then $\mu + \sigma x$ is also normal as the transformations just
    scale the distribution, and do not affect normality, which means that the logarithm
    of x is normally distributed.


    The lognormal distribution satisfies this:


    $$f(x) = \frac{1}{x\sigma\sqrt{2\pi}}e^{-\left(\frac{(\ln x - \mu)^2}{2\sigma^2}\right)}$$


    This is easy to replicate in python.


    ```python

    import math

    import numpy as np

    import statistics as sts

    from matplotlib import pyplot as plt


    n = 1000           # number of samples

    avg, std = 100, 0.2 # avg , std

    mu = math.log(avg)

    sigma = math.sqrt(std)

    y = np.random.lognormal(mean=mu, sigma=sigma, size=n)


    print(''avg:'', round(sts.mean(y), 2))

    print(''std:'', round(sts.stdev(y), 2))


    fig, ax = plt.subplots(1,2)


    ax[0].plot(y, ''+'')

    # plt.show()

    ax[1].hist(y, bins=int(n/10), orientation=''horizontal'')

    ax[1].set_yticks([])

    plt.show()

    ```


    The imports at the top provide tools to do all the basic maths operations and
    the entire distribution is generated by the np.random.lognormal() function.

    We are able to plot this using matplotlib showing 1000 points, but also plotting
    a histogram oriented sideways to indicate the frequency of the plots.


    ![](img/4e4fc350228cd1c84055205e597f4fc0_103_0.png)


    For this particular chart the average was 108.36 and std of 47.59. We could run
    this routine many times, which would create many similarly looking random distributions.

    Running simulations many times is a common technique especially with the increased
    computing power that is available and is referred to as a monte-carlo simulation
    and takes a number of different formats.


    ## Time series


    The time series is important because it represents the evolution of a function
    (price) with respect to time. In finance, other value metrics are used, such as
    bond yields or spreads (which are the differences in yields).


    We often see prices dropping and yields rising or spreads widening when the market
    is taking off risk and conversely prices rising and yields dropping or spreads
    tightening when the market is adding risk.


    We can capture this data and measure and analyse it and make various statistical
    statements about the systems that we have measured.


    There are a few approaches, but let''s try these two:


    - Generate our own sample data by creating a random walk.

    - We could download a common dataset.


    The random walk is fun and we can do lots with it, plus it is good for testing
    out some of the techniques that we have been through and has real world applications.


    In the simplest case, we start with a price and make it evolve over discrete intervals
    of time, such as days. So we can say that the price tomorrow is some function
    of the price today or equivalently the next price was contingent on the previous
    price and some other input parameters that the user sets.


    $$P_{n+1} = f(P_n)$$


    For the price of the stock, we might crudely assume that there is an upward drift
    and on top of this we could add a random value to represent an unknown volatility
    component, so we have this:


    $$P_{n+1} = (\alpha + \beta_n)P_n$$


    Where $\alpha$ is a predefined constant and $\beta_n$ is a random number generated
    at each step. So we have a **drift** and a **diffusion**.


    Let''s say that over the course of a year, the price should increase by 5%, with
    no volatility (so, $\beta_n = 0, \forall n$). Then the following would be true:


    $$P_{365} = \alpha^{365}P_0$$'
  mdcn: '## 金融


    Python 是一种*通用高级编程语言*，它非常适合金融领域，主要因为它在电子表格和低级语言之间架起了一座非常具体的桥梁。


    | 类型 | 示例 | 难度 | 计算能力 | 构建时间 |

    |---|---|---|---|---|

    | 电子表格（代码） | excel | 简单 | 慢 | 快 |

    | 高级代码 | python | 中等 | 中等 | 中等 |

    | 低级代码 | c++ | 困难 | 快 | 快 |


    其语法简洁，处理列表和数组相对直接。该语言能与系统的其他部分良好连接。访问数据库以及读写文件都很方便。


    Python 具备一定程度的自动化能力，这超出了 Excel 的范畴，并且比（更强大的）C++ 等开发周期更长的语言更易于使用。


    因此，Python 非常适合用于原型开发。例如，让我们看看对数正态分布，这是金融领域乃至任何具有零下限且本质上是随机的生物系统中最常见的分布之一。


    - 取一组随机变量。

    - 取这些变量的对数：$y = \ln(x)$


    我们知道，因变量 y 是 x 的某个函数，而在对数正态分布的情况下，它是 x 的自然对数的某个函数。


    $y = f(x) \Leftrightarrow x = f^{-1}(y)$


    $y = \ln(x) \Leftrightarrow x = e^y$


    这里我们设定均值 $\mu$ 和标准差 $\sigma$。


    $y = \mu + \sigma x$


    如果 x 是正态分布，那么 $\mu + \sigma x$ 也是正态分布，因为这些变换只是缩放分布，而不影响正态性，这意味着 x 的对数服从正态分布。


    对数正态分布满足以下条件：


    $$f(x) = \frac{1}{x\sigma\sqrt{2\pi}}e^{-\left(\frac{(\ln x - \mu)^2}{2\sigma^2}\right)}$$


    这在 Python 中很容易实现。


    ```python

    import math

    import numpy as np

    import statistics as sts

    from matplotlib import pyplot as plt


    n = 1000           # number of samples

    avg, std = 100, 0.2 # avg , std

    mu = math.log(avg)

    sigma = math.sqrt(std)

    y = np.random.lognormal(mean=mu, sigma=sigma, size=n)


    print(''avg:'', round(sts.mean(y), 2))

    print(''std:'', round(sts.stdev(y), 2))


    fig, ax = plt.subplots(1,2)


    ax[0].plot(y, ''+'')

    # plt.show()

    ax[1].hist(y, bins=int(n/10), orientation=''horizontal'')

    ax[1].set_yticks([])

    plt.show()

    ```


    顶部的导入提供了执行所有基本数学运算的工具，整个分布由 `np.random.lognormal()` 函数生成。

    我们能够使用 matplotlib 绘制此图，显示 1000 个点，同时绘制一个横向的直方图来表示数据的频率。


    ![](img/4e4fc350228cd1c84055205e597f4fc0_103_0.png)


    对于这个特定的图表，平均值为 108.36，标准差为 47.59。我们可以多次运行这个程序，这将创建许多外观相似的随机分布。

    多次运行模拟是一种常见技术，尤其是在计算能力日益增强的今天，这被称为蒙特卡洛模拟，并有多种形式。


    ## 时间序列


    时间序列很重要，因为它代表了一个函数（价格）随时间的演变。在金融领域，使用其他价值指标，例如债券收益率或利差（即收益率之间的差异）。


    我们经常看到，当市场正在消除风险时，价格下跌而收益率上升或利差扩大；相反，当市场正在增加风险时，价格上涨而收益率下降或利差收窄。


    我们可以捕获这些数据，对其进行测量和分析，并对我们所测量的系统做出各种统计陈述。


    有几种方法，但让我们尝试以下两种：


    - 通过创建随机游走生成我们自己的样本数据。

    - 我们可以下载一个常用的数据集。


    随机游走很有趣，我们可以用它做很多事情，而且它非常适合测试我们已经讨论过的一些技术，并且具有现实世界的应用。


    在最简单的情况下，我们从一个价格开始，让它在离散的时间间隔（如天）上演变。因此，我们可以说明天的价格是今天价格的某个函数，或者等价地说，下一个价格取决于前一个价格以及用户设置的一些其他输入参数。


    $$P_{n+1} = f(P_n)$$


    对于股票价格，我们可以粗略地假设存在一个向上的漂移，在此基础上我们可以添加一个随机值来代表未知的波动率成分，所以我们有：


    $$P_{n+1} = (\alpha + \beta_n)P_n$$


    其中 $\alpha$ 是一个预定义的常数，$\beta_n$ 是在每一步生成的随机数。所以我们有一个**漂移**和一个**扩散**。


    假设在一年的时间里，价格应该上涨 5%，没有波动（即，$\beta_n = 0, \forall n$）。那么以下等式成立：


    $$P_{365} = \alpha^{365}P_0$$'
