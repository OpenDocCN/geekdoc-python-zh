  mdcn: "## 6.4. 标准数学函数\n\n标准数学模块提供了科学计算器的大部分功能。表 6.1 仅列出了部分可用函数。\n\n表 6.1. 数学模块中的部分函数\n\
    \n| 序号 | math 模块 |\n|---|---|\n| 1. | ‘sqrt’：计算一个数的平方根：sqrt(x) = √x |\n| 2. |\
