    # 3.7.1. Syntax Errors


    The Python interpreter is designed to execute all valid Python programs. It performs
    two essential phases: reading the Python source file and translating it into an
    executable form, which is the translation phase. If the interpreter encounters
    an invalid program statement during this translation phase, it terminates the
    program’s execution and reports an error. Such errors are typically a result of
    the programmer’s incorrect usage of the language.


    A syntax error is a common type of error that the interpreter can detect while
    attempting to translate a Python statement into machine language. Just like in
    the English language, where certain sentences may contain grammatical errors,
    in Python, a syntax error occurs when the structure of a statement violates the
    language’s rules.


    For example, the Python statement “x = y + 2” is syntactically correct because
    it adheres to the rules for the structure of an assignment statement. However,
    if we modify this assignment statement to “y + 2 = x”, the interpreter will raise
    an error since it is not a valid assignment statement. Syntax errors are identified
    by the interpreter before the program starts running. This allows developers to
    fix these errors before any part of the program is executed. Common syntax errors
    can stem from simple typographical mistakes like mismatched parentheses or mismatched
    string quotes or even faulty indentation. The examples provided illustrate only
    a few ways in which programmers may inadvertently write ill-formed code. Nonetheless,
    the interpreter’s ability to detect syntax errors early on helps ensure that programs
    run smoothly and accurately.'
