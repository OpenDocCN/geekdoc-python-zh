    \n## 4.5. COMPLEX BOOLEAN EXPRESSIONS\n\nWe can form complex Boolean expressions\
    \ by combining simple ones, each involving a single relational operator, using\
    \ logical operators such as `and`, `or`, and `not`. When we combine two or more\
