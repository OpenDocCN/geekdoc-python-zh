- md: '## Comments


    Comments are for humans to read, they do not interfere with the code in any way.
    Generally they are used so that we can remember or give hints to what we have
    done especially when we come back to the code six months later or alternatively
    when somebody else reads the code and wants to know what is going on or if what
    we have done is complicated.


    There are two types of comments in Python. **Single line** and **multiline** (block
    comments). In Python they look like this.


    The single line comment starts with a #.


    ```

    # this is a single line comment

    ```


    The Multiline (block) comment starts with three quotation marks and ends that
    way too. So six quotation marks in total.


    ```

    """

    this is also a block comment

    it uses quotation marks "

    and is a bit more descriptive

    """

    ```


    Or it can start with three single quotes.


    ```

    ''''''

    this is a block comment

    it uses single quotes ''

    and is a bit more descriptive

    ''''''

    ```


    The multiline comments are often used as doc strings for functions. These are
    basically blocks of text explaining how the function works and are very helpful
    for other users of the function.


    ## The data types


    There are 5 main types, string, integer, float, bool and None.


    1. String: A string is a character or series of characters.

    2. Integer: Any positive or negative whole number.

    3. Float: A number with a decimal.

    4. Bool: True or False, but can also be 1 or 0.

    5. None: Used to define a null value, or no value at all.


    ```

    s = ''hello world''  # this is a string

    i = 100            # this is an integer

    f = 10.5           # this is a float

    b = True           # starts with a capital

    n = None           # starts with a capital

    ```


    ## Variables


    This takes us nicely onto variables. You will notice in the example above that
    each datatype was allocated a letter.


    I had just chosen those letters because they had meaning in the context (i.e.
    “s” for string, “i” for integer and so forth).


    But I could have just as well done this:


    ```

    my_string = ''hello world''  # this is a string

    an_int = 100              # this is an integer

    a_float = 10.5            # this is a float

    boo = True                # starts with a capital

    nothingHere = None        # starts with a capital

    ```


    You can think of a variable as a bucket that can be filled with something. In
    Python we say that a value is assigned to the variable. So an_int is assigned
    the value 100 and boo is assigned the value True.


    Notice that although the “equals to sign” is used, I was careful not to say equals
    to. There is a subtle difference and this is how Python works.


    The “buckets” that were mentioned above are actual parts of the memory space,
    so literally physical memory addresses in the processor. And the values get assigned
    to those memory spaces which have the given variable names.


    This is a very simplistic overview, so the reader is encouraged to research more,
    but a good starting point and sufficient for what we will do.


    One of the reasons that Python is a bit easier than other languages to pick up
    is that the coder does not have to declare a type. In fact, the type is inferred
    from the value given and this means that the **type of any variable can change.**


    ```

    # x starts as a string, but then becomes an integer

    x = ''hello world''    # x is a string

    x = 100              # now x is an integer

    ```


    This has advantages in particular that it is cleaner (less cluttered) and quicker
    to write code and disadvantages because the coder may accidentally change a variable
    type that *structured language* might pick up on.


    In the example above, Python simply allows the user to change the “x” variable
    type from a string to an integer without warning the user that the type has been
    changed.


    This could have been an accident on the part of the user or this could be convenient
    for the user.


    In terms of naming variables, you will notice that I had used different conventions.
    The common ones are this:


    1. camelCase

    2. PascalCase

    3. snake_case


    The convention in Python is to use snake_case for variables and PascalCase for
    classes (which we will come to later).


    The coder can use numbers in variable names too as long as the numbers do not
    precede the name.


    ```

    # this is allowed

    hello_01 = ''hello world''

    hello_02 = ''hello mars''

    hello99jupiter = ''hello jupiter''


    # but this is not allowed

    99hello = ''hello world''

    ```


    There are quite a few more rules for naming variables, but these are the main
    ones and it is left for the reader to experiment.


    The one thing that the reader should take from this is that **variable names should
    be meaningful**. It is easy to get away with single letter variables in examples,
    but imagine code that is 1000 lines in length with many variable names and lots
    of complicated work.


    Which is clearer: `house_value` or `hv`?


    ## Lists, Dictionaries and Tuples


    Variables are extremely useful as they enable the user to do quite a lot already,
    but the power of all coding languages is increased with lists.


    ![](img/4e4fc350228cd1c84055205e597f4fc0_24_0.png)


    Notice that the term List is used and **not** array.


    The reason for this is that *an array is a "list of lists" with the length of
    each level of list the same*.


    A list is a data structure consisting of an ordered set of elements, each of which
    may be a number, another list, etc. A list is usually denoted (a_1, a_2, ...,
    a_n) or {a_1,a_2,...,a_n}, and may also be interpreted as a vector.


    In simplistic terms, using the bucket example, a list is like a bigger bucket
    that contains all the smaller buckets.


    A list might look like this:


    ![](img/4e4fc350228cd1c84055205e597f4fc0_25_0.png)


    Where each item in the list has an index (its position in the list) and a number
    which is the value contained at that position.


    The list in Python is very convenient, because each element (i.e. each bucket)
    can actually contain any data type.


    ```python

    list_of_ints = [1, 2, 3, 4, 5, 6]

    list_of_strings = [''a'', ''b'', ''c'', ''d'', ''e'', ''f'']

    list_of_words = [''hello'', ''how'', ''are'', ''you'']

    list_of_bools = [True, True, False, True, False, True]


    # the types in the list can be anything

    mixed_list = [1, ''hello'', True, 100.5, ''world'']

    ```


    We can even have an empty list, but just using the square brackets but adding
    no elements inside them.


    ```python

    new_list = []

    ```


    Not only that, but we can now create Arrays which by the definition above are
    **lists of lists**.


    ```python

    my_array = [list_of_ints, list_of_strings, list_of_bools]

    ```


    And we can get really clever by putting lists into lists into lists etc. 3-D arrays,
    n-D arrays.


    All of a sudden our very basic data types have blossomed into powerful collections
    of data in a short space of time.


    Moving on from the list, we have the **Dictionary**. Dictionaries in Python are
    used to store data values in {key: value} pairs. A dictionary is a collection
    which is unordered, changeable and does not allow duplicate keys (i.e. the keys
    in a dictionary are unique).


    Because the word dictionary is rather a long one which is used often, we often
    shorten this to **dict** which is in fact the name (or type) of the dictionary
    class.


    If we go back to the bucket analogy, the only difference between the list and
    the dict is that with the dict the buckets now have specific names. So instead
    of the indices being the position in the list, the index is now the specific name
    (the key) of the bucket element.


    An empty dict looks like this:


    ```

    my_dict = {}

    ```


    From here we can add items to the list remembering that each item is a key: value
    pair.


    ```

    my_dict = {''a'': 100, ''b'':200, ''c'':300}

    ```


    The keys can be anything so long as they are unique. If the coder was to duplicate
    an item either accidentally or on purpose, then the last item in the dict would
    overwrite the earlier one.


    ```

    my_fruits = {''apples'': 100, ''bananas'':200, ''carrots'':300}

    my_numbers = {0:''hello'', 1:''world'', 2:''mars'', 3:''mars''}

    ```


    Notice how the keys and the values can both be any valid data type (string, integer,
    float, bool, none).


    ```

    random_dict = {0:''c'', 1.1:None, 2.5:''d'', 3:True}

    ```


    If we go back to the my_numbers example above, we see that this is in fact nearly
    identical to the list because the keys are sorted in numeric order.


    So we see that there are strong similarities between **lists** and **dicts**.
    And in fact we could consider a list to be a special type of dict.


    ```

    my_list = [''hello'', ''world'', ''mars'', ''mars'']

    my_dict = {0:''hello'', 1:''world'', 2:''mars'', 3:''mars''}

    ```'
  mdcn: '## 注释


    注释是给人类阅读的，它们不会以任何方式干扰代码。通常使用注释是为了让我们能够记住或提示我们所做的事情，特别是当我们六个月后重新查看代码时，或者当其他人阅读代码并想知道发生了什么，或者我们所做的事情比较复杂时。


    Python 中有两种类型的注释。**单行**注释和**多行**（块）注释。在 Python 中它们看起来像这样。


    单行注释以 # 开头。


    ```

    # this is a single line comment

    ```


    多行（块）注释以三个引号开头，也以三个引号结尾。所以总共是六个引号。


    ```

    """

    this is also a block comment

    it uses quotation marks "

    and is a bit more descriptive

    """

    ```


    或者它也可以以三个单引号开头。


    ```

    ''''''

    this is a block comment

    it uses single quotes ''

    and is a bit more descriptive

    ''''''

    ```


    多行注释通常用作函数的文档字符串。这些基本上是解释函数如何工作的文本块，对函数的其他用户非常有帮助。


    ## 数据类型


    主要有 5 种类型：字符串、整数、浮点数、布尔值和 None。


    1.  字符串：字符串是一个字符或一系列字符。

    2.  整数：任何正或负的整数。

    3.  浮点数：带小数点的数字。

    4.  布尔值：True 或 False，但也可以是 1 或 0。

    5.  None：用于定义空值，或完全没有值。


    ```

    s = ''hello world''  # this is a string

    i = 100            # this is an integer

    f = 10.5           # this is a float

    b = True           # starts with a capital

    n = None           # starts with a capital

    ```


    ## 变量


    这自然地引出了变量。你会注意到在上面的例子中，每个数据类型都被分配了一个字母。


    我选择这些字母是因为它们在上下文中有意义（即 “s” 代表字符串，“i” 代表整数，等等）。


    但我也可以这样做：


    ```

    my_string = ''hello world''  # this is a string

    an_int = 100              # this is an integer

    a_float = 10.5            # this is a float

    boo = True                # starts with a capital

    nothingHere = None        # starts with a capital

    ```


    你可以把变量想象成一个可以装东西的桶。在 Python 中，我们说一个值被赋给了变量。所以 an_int 被赋值为 100，boo 被赋值为 True。


    注意，虽然使用了“等于号”，但我小心地没有说“等于”。这里有一个微妙的区别，这就是 Python 的工作方式。


    上面提到的“桶”实际上是内存空间的一部分，所以字面上是处理器中的物理内存地址。值被分配给这些具有给定变量名的内存空间。


    这是一个非常简化的概述，因此鼓励读者进行更多研究，但这是一个很好的起点，并且对于我们即将进行的工作来说已经足够了。


    Python 比其他语言更容易上手的原因之一是，编码者不需要声明类型。事实上，类型是从给定的值推断出来的，这意味着**任何变量的类型都可以改变**。


    ```

    # x starts as a string, but then becomes an integer

    x = ''hello world''    # x is a string

    x = 100              # now x is an integer

    ```


    这有优点，特别是它更简洁（更少杂乱）并且编写代码更快，也有缺点，因为编码者可能会意外地改变一个变量类型，而*结构化语言*可能会检测到这一点。


    在上面的例子中，Python 只是允许用户将 “x” 变量类型从字符串更改为整数，而没有警告用户类型已经改变。


    这可能是用户的意外，也可能是对用户方便。


    关于变量命名，你会注意到我使用了不同的约定。常见的约定有：


    1.  驼峰命名法（camelCase）

    2.  帕斯卡命名法（PascalCase）

    3.  蛇形命名法（snake_case）


    Python 中的约定是变量使用蛇形命名法，类使用帕斯卡命名法（我们稍后会讲到）。


    编码者也可以在变量名中使用数字，只要数字不在名称开头即可。


    ```

    # this is allowed

    hello_01 = ''hello world''

    hello_02 = ''hello mars''

    hello99jupiter = ''hello jupiter''


    # but this is not allowed

    99hello = ''hello world''

    ```


    变量命名还有更多规则，但这些是主要的，留给读者去尝试。


    读者应该从中得到的一点是，**变量名应该是有意义的**。在示例中使用单字母变量很容易蒙混过关，但想象一下代码有 1000 行长，有许多变量名和大量复杂的工作。


    哪个更清晰：`house_value` 还是 `hv`？


    ## 列表、字典和元组


    变量非常有用，因为它们已经让用户能够做很多事情，但所有编程语言的力量都随着列表而增强。


    ![](img/4e4fc350228cd1c84055205e597f4fc0_24_0.png)


    注意这里使用的是术语 List（列表），而**不是** array（数组）。


    原因是*数组是一个“列表的列表”，其中每个级别的列表长度都相同*。


    列表是一种数据结构，由一组有序的元素组成，每个元素可以是一个数字、另一个列表等。列表通常表示为 (a_1, a_2, ..., a_n) 或 {a_1,a_2,...,a_n}，也可以解释为一个向量。


    简单地说，使用桶的例子，列表就像一个更大的桶，里面装着所有的小桶。


    列表可能看起来像这样：


    ![](img/4e4fc350228cd1c84055205e597f4fc0_25_0.png)


    其中列表中的每个项目都有一个索引（它在列表中的位置）和一个数字，即该位置包含的值。


    Python 中的列表非常方便，因为每个元素（即每个桶）实际上可以包含任何数据类型。


    ```python

    list_of_ints = [1, 2, 3, 4, 5, 6]

    list_of_strings = [''a'', ''b'', ''c'', ''d'', ''e'', ''f'']

    list_of_words = [''hello'', ''how'', ''are'', ''you'']

    list_of_bools = [True, True, False, True, False, True]


    # the types in the list can be anything

    mixed_list = [1, ''hello'', True, 100.5, ''world'']

    ```


    我们甚至可以有一个空列表，只需使用方括号，但不在其中添加任何元素。


    ```python

    new_list = []

    ```


    不仅如此，我们现在可以创建数组，根据上面的定义，数组是**列表的列表**。


    ```python

    my_array = [list_of_ints, list_of_strings, list_of_bools]

    ```


    我们还可以通过将列表放入列表再放入列表等方式变得非常聪明。三维数组，n 维数组。


    突然之间，我们非常基本的数据类型在短时间内发展成了强大的数据集合。


    从列表继续，我们有**字典**。Python 中的字典用于以 {键: 值} 对的形式存储数据值。字典是一个无序、可变且不允许重复键（即字典中的键是唯一的）的集合。


    因为“dictionary”这个词相当长且经常使用，我们通常将其缩写为 **dict**，这实际上是字典类的名称（或类型）。


    如果我们回到桶的类比，列表和字典之间的唯一区别是，对于字典，桶现在有了特定的名称。所以索引不再是列表中的位置，索引现在是桶元素的特定名称（键）。


    一个空的字典看起来像这样：


    ```

    my_dict = {}

    ```


    从这里我们可以向列表中添加项目，记住每个项目都是一个键：值对。


    ```

    my_dict = {''a'': 100, ''b'':200, ''c'':300}

    ```


    键可以是任何东西，只要它们是唯一的。如果编码者意外或故意复制了一个项目，那么字典中的最后一个项目将覆盖前面的项目。


    ```

    my_fruits = {''apples'': 100, ''bananas'':200, ''carrots'':300}

    my_numbers = {0:''hello'', 1:''world'', 2:''mars'', 3:''mars''}

    ```


    注意键和值都可以是任何有效的数据类型（字符串、整数、浮点数、布尔值、None）。


    ```

    random_dict = {0:''c'', 1.1:None, 2.5:''d'', 3:True}

    ```


    如果我们回到上面的 my_numbers 示例，我们看到这实际上与列表几乎相同，因为键是按数字顺序排序的。


    所以我们看到**列表**和**字典**之间有很强的相似性。事实上，我们可以认为列表是一种特殊类型的字典。


    ```

    my_list = [''hello'', ''world'', ''mars'', ''mars'']

    my_dict = {0:''hello'', 1:''world'', 2:''mars'', 3:''mars''}

    ```'
