- md: '## 1.3. LEARNING PROGRAMMING WITH PYTHON


    Guido van Rossum created the Python programming language in the late 1980s. In
    contrast to other popular languages such as C, C++, Java, and C#, Python strives
    to provide a simple but powerful syntax.


    Python is used for software development at companies and organizations such as
    Google, Yahoo, Facebook, CERN, Industrial Light and Magic, and NASA. Experienced
    programmers can accomplish great things with Python, but Python’s beauty is that
    it is accessible to beginning programmers and allows them to tackle interesting
    problems more quickly than many other, more complex languages that have a steeper
    learning curve.


    More information about Python, including links to download the latest version
    for Microsoft Windows, Mac OS X, and Linux, can be found at http://www.python.org.


    In the 3rd December 2008, Python 3.0 was released. Commonly called Python 3, the
    current version of Python is incompatible with earlier versions of the language.
    Currently the Python world still is in transition between Python 2 and Python
    3. Many existing published books cover Python 2, but more Python 3 resources now
    are becoming widely available. The code in this book is based on Python 3.


    This book does not attempt to cover all the facets of the Python programming language.
    Experienced programmers should look elsewhere for books that cover Python in much
    more detail. The focus here is on introducing programming techniques and developing
    good habits. To that end, our approach avoids some of the more esoteric features
    of Python and concentrates on the programming basics that transfer directly to
    other imperative programming languages such as Java, C#, and C++. We stick with
    the basics and explore more advanced features of Python only when necessary to
    handle the problem at hand.


    ## 1.4. WRITING A PYTHON PROGRAM


    Python programs are structured with specific syntax requirements. If the syntax
    is incorrect, the interpreter will generate error messages and the program will
    not execute. In this section, we will introduce Python by presenting a simple
    example program.


    A program is composed of one or more statements, which are instructions executed
    by the interpreter. For instance, the following statement utilizes the print function
    to display a message:


    ```

    # Get user input for the length and width of the rectangle

    length = float(input("Enter the length of the rectangle: "))

    width = float(input("Enter the width of the rectangle: "))

    # Calculate the area of the rectangle

    area = length * width

    # Display the result

    print(f"The area of the rectangle is {area}")

    ```


    Here''s how the program works:


    - 1. We use the input function to get user input for the length and width of the
    rectangle. float is used to convert the input values to floating-point numbers.

    - 2. We calculate the area of the rectangle by multiplying the length and width.

    - 3. Finally, we use print to display the result to the user.


