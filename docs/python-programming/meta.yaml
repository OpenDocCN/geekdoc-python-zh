    img_result = cv2.bitwise_and(img, img, mask=img_mask)


    cv2.imshow(''image'', img)

    cv2.imshow(''hsv image'', img_hsv)

    cv2.imshow(''mask image'', img_mask)

    cv2.imshow(''result image'', img_result)

    cv2.waitKey(0)

    ```


