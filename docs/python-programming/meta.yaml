    of the function.

    2. **Function Invocation:** Functions are utilized within a program through function
    invocations. In a previous section (Chapter 6), we worked with standard functions
    that were predefined and didn’t require us to define them ourselves.


    Each function possesses a single definition but can be invoked multiple times.
    A regular function definition comprises four essential components:


    +   - **def:** The “def” keyword is used to initiate a function definition.

    - **Name:** The name is an identifier (as discussed in Section 2.3). Similar to
    variable names, a function’s name should accurately represent its intended purpose
    or describe the functionality it provides. (Python also offers specialized anonymous
    functions known as lambda expressions, which we’ll introduce later in Section
    8.7.)

    - **Parameters:** Every function definition specifies the parameters it accepts
    from callers. These parameters are listed within parentheses and separated by
    commas. If a function doesn’t require any information from the calling code, the
    parameter list remains empty. A colon follows the parameter list.

    - **Body:** The function definition also includes a block of indented statements
    forming the function’s body. This body contains the code that executes when the
    function is invoked. The code within the body is responsible for generating the
    result, if applicable, to be returned to the caller.


