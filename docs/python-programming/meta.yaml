  md: 'If you need to prioritize certain operations over others, you can use parentheses
    to override the normal precedence rules in Python. For example:


    ```

    print(3 * (x + 2) * (y - 5))

    ```


    This format ensures that the addition and subtraction operations within the parentheses
    are performed before the multiplications. But remember, readability should always
    be a priority when formatting expressions in Python.


    # 3.6. COMMENTS


    Effective use of comments is a fundamental aspect of good programming practice.
    Programmers often annotate their code by inserting remarks to explain the purpose
    of a section of code or the reasoning behind their implementation choices. These
    comments primarily serve as aids for human readers, including other programmers
    and technical managers who review the code for correctness.


    Well-chosen identifiers and comments contribute to a smoother assessment process
    during code reviews. They also play a crucial role in collaborative software development,
    where different programmers may need to work on parts of the program written by
    others. Clear comments help team members understand new code quickly and enhance
    their productivity when modifying existing or unfinished code.


    Even when the same programmer revisits their code months later, it is common to
    face difficulties in remembering the specific functionalities of various parts.
    In such cases, well-written comments become invaluable.


    In Python, comments are designated using the ‘#’ symbol and are ignored by the
    interpreter. They can appear at the end of a line, explaining the statement that
    precedes them, or on a separate line to describe the purpose of a code section.
    When using comments, it is essential to strike a balance and avoid stating the
    obvious. For instance, comments explaining straightforward statements, such as
    variable assignments, are unnecessary for experienced Python programmers. However,
    comments that clarify the purpose of a specific action or code block are valuable
    for readers’ understanding. As a general rule, programmers should not hesitate
    to add remarks when in doubt. Taking the extra time to write clear and meaningful
    comments is well worth the effort, as it improves code readability, maintainability,
    and collaboration within a team.'
