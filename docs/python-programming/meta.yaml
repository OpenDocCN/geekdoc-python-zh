    We have also looked at functions and derivatives and can numerically compute the
    derivative of a function at a given point by using two local points to work out
    the slope.


    For example, given the function y = f(x), we were able to computationally achieve
    dy/dx at the point x=n by taking a neighbour point (n+1) and working out the slope.


    We refer to a function as f(x) and the derivative of the same function as f''(x).
    We do this because the notation is cleaner (but still means the same thing f''(x)
    = df/dx).


    We say: $f''(x) = \frac{d}{dx}f(x) = \frac{df}{dx}$


    And: $f''(x_n) = \left[\frac{df}{dx}\right]_{x=n}$


    Meaning *the derivative at the point x=n*.


    The newton-raphson formula is iterative in the same sense that the binary search
    was. Basically, this means that given an $x_n$ we can find the next point $x_{n+1}$
    and keep on repeating this process until we have iterated a way towards the final
    result.


    We start with the famous formula:


    $x_{n+1} = x_n - \frac{f(x_n)}{f''(x_n)}$


