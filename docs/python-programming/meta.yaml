    \ be indented consistently. This indentation is essential in Python to identify\
    \ the blocks of code belonging to each branch.\n5. It is important to note that\
    \ either the if block or the else block will be executed; they are mutually exclusive\
    \ based on the Boolean expression’s truth value.\n\nHere’s a simple example to\
    \ illustrate the usage of the if/else statement:\n\n```\n# Getting user input\n\
    age = int(input(\"Please enter your age: \"))\n# Checking the age using if/else\n\
    if age >= 18:\n    print(\"You are an adult.\")\nelse:\n    print(\"You are a\
