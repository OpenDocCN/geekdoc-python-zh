    # What is the stack?


    A good formal description comes from Wikipedia:


    > “Stack Overflow is a question and answer website for professional and enthusiast
    programmers. It is the flagship site of the Stack Exchange'
  - '[PAGE 13]


    *Network. It was created in 2008. It features questions and answers on a wide
    range of topics in computer programming*”. There are roughly 14 million users
    registered on the platform.


    The stack rewards and punishes for contribution with up or down votes for positive
    and negative contributions respectively.


    Or more pythonically put:


    The stack **rewards** and **punishes** for contribution:


    +   - With **up** or **down** votes

    - For **positive** and **negative** contributions

    - Respectively.


    The basic format is this:


    | Good question | Up vote |

    | Good answer | Up vote |

    | Good comment | Up vote |

    | Bad question | Down vote |

    | Bad answer | Down vote |


    The above voting system, whilst sometimes harsh for the beginner, keeps the community
    honest by rewarding contributions and punishing distractions.


    Just like any other platform or system, there are specific nuances and ways of
    asking and answering questions. The stack is quite direct with “a Minimal, Reproducible
    Example” approach.


    This basically means that good questions isolate very specific problems in a'
  - '[PAGE 14]


    “short and concise” manner and helps target solutions quickly. Likewise, the same
    is for the answers, “short and concise” wins.


    So how does one get to the top of the stack?


    Quite simple really, with a thirst to learn and contribute and by being a “good
    citizen”.


    # Who uses the stack?


    Basically anybody who has ever asked a programming question in any language has
    probably visited the stackoverflow website.


    The most recent statistics show that there are around 50 million users and about
    half of those are professional developers and university students. So the other
    half are enthusiasts or novices or some other cohort of people with an interest
    in coding.


    There are plenty of other excellent resources and websites and also, as for any
    programming language, the documents are excellent.


    Nevertheless, sometimes it is simply more efficient to look up an answer on the
    web. We often “google it” and invariably stackoverflow with its plethora of completeness
    (for a whole variety of programming languages) will rank in or among the top few
    links.'
  - '[PAGE 15]


    # What is a stack overflow?


    A stack overflow is a type of buffer overflow error that occurs when a computer
    program tries to use more memory space in the call stack than has been allocated
    to that stack.


    One of the most common causes of a stack overflow is the recursive function, which
    is a type of function that repeatedly calls itself in an attempt to carry out
    specific logic. Each time the function calls itself, it uses up more of the stack
    memory. If the function runs too many times it consumes all the available memory,
    resulting in a stack overflow. This invariably leads to corruption of variables
    and data and is likely to cause the program to crash.


    The term in many ways is suitable for the name of the community website as this
    is one of the problems that many of the users are trying to avoid.


    The users go to stackoverflow to find out how to prevent a stack overflow.'
