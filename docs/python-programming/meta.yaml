    # SQLite (Database)


    The database section of the book could have been included into a number of the
    chapters and most notably the *data types* and the *data science* sections.


    There are many different databases on the markets and these are broadly categorised
    into two sections.


    +   - SQL

    - No SQL


    SQL and NoSQL differ in whether they are relational (SQL) or non-relational (NoSQL),
    whether their schemas are predefined or dynamic, how they scale, the type of data
    they include and whether they are more fit for multi-row transactions or unstructured
    data.


    Python offers SQLite out of the box as one of the core modules and this was the
    case since version 2.5 (so prior to the existence of version 3).


    > “SQLite is an in-process library that implements a **self-contained, serverless,
    zero-configuration, transactional** SQL database engine”.


    The terms in the description above are basically telling us that SQLite is a relatively
    simple database to work with. And it is the most widely deployed and used database
    engine which has found its way into every major operating system and also every
    web browser along with a host of major products and companies using it.'
