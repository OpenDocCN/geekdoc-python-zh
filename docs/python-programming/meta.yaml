    the programmer must ensure that the index used is within the bounds of the list.
    The code provided is a good example of how to handle potential out-of-bounds list
    index errors in Python. It shows how to use a conditional statement to ensure
    that the provided index is within the bounds of the list before attempting to
    access or modify an element in the list. This approach helps prevent “IndexError”
    exceptions and makes the code more robust.


