    # 2.3. IDENTIFIERS


    In Python, an identifier is a name used to identify a variable, function, class,
    module, or other objects. Identifiers play a crucial role in the Python programming
    language as they provide a way to refer to entities within the code. Here are
    some rules and conventions that apply to Python identifiers:


    **Valid Characters:** An identifier can contain letters (both uppercase and lowercase),
    digits, and underscores (_). It must start with a letter (a-z, A-Z) or an underscore.


    **Case Sensitivity:** Python is a case-sensitive language, meaning identifiers
    with different cases (e.g., ‘variable’ and ‘Variable’) are treated as distinct
    entities.


    **Reserved Words:** Python has reserved words, also known as keywords, which are
    used to define the syntax and structure of the language. These words cannot be
    used as identifiers. For example, “if”, “else”, “while”, “class”, etc., are reserved
    words.


    **Convention:** It is common in Python to use lowercase letters for variable names
    and underscore-separated words for improved readability (e.g., ‘user_name’, ‘total_count’,
    ‘product_price’). For class names, the convention is to use CamelCase, starting
    with an uppercase letter for each word (e.g., ‘CustomerData’, ‘RectangleShape’).


