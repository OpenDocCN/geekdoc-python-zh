    \ (M1+M2) * L1 * state[1] * state[1] * sin(delta)\n                - (M1+M2) *\
    \ G * sin(state[2]))\n               / den2)\n\n    return dydx\n```\n\n然后，我们需要为模拟设定一个时间范围，以及初始角度和角速度。\n\
    \n```python\n# 创建一个从0到100的时间数组，采样间隔为0.05秒\ndt = 0.05\nt = np.arange(0, 20, dt)\n\
    print(t)\n\n# th1 和 th2 是初始角度（度）\n# w10 和 w20 是初始角速度（度/秒）\nth1 = 120.0\nw1 = 0.0\n\
    th2 = -10.0\nw2 = 0.0\n\n# 初始状态\nstate = np.radians([th1, w1, th2, w2])\n```\n\
