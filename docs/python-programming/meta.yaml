    Required card


    Or in our example case above, we have some playing cards scattered on the table
    and we want to get the king of spades. We would need to know the coordinates of
    the corners of the card to do this which we can get by hovering over the image.


    ```

    python

    import cv2

    import numpy as np


    img = cv2.imread(''assets/cards.jpg'')


    width, height = 200, 300

    points = np.float32([[82,157],[212,134],[115,356],[264,323]])

    new_pts = np.float32([[0,0], [width,0], [0,height], [width,height]])

    matrix = cv2.getPerspectiveTransform(points, new_pts)

    img_warp = cv2.warpPerspective(img, matrix, (width, height))


    cv2.imshow(''output image'', img_warp)

    cv2.waitKey(0)

    ```


    Using the old points and the new points one can produce the transformation matrix.
    This is done in the cv2 module with the function getPerspectiveTransform() and
    using this matrix one can then proceed to perform the warp retaining the perpendicular
    flattened image.'
