  md: 'There are a whole number of methods for interpolation, such as straight line,
    cubic spline or a polynomial fit each own with its merits and errors.


    A straight line interpolation is the easiest method. It works well when the curvature
    of the curve that we are trying to interpolate is low or when the number of datapoints
    is high.


    The calculation for the interpolated point is:


    $$y_{\text{interp}} = x_{\text{low}} + (x_{\text{interp}} - x_{\text{low}}) \cdot
    \frac{y_{\text{up}} - y_{\text{low}}}{x_{\text{up}} - x_{\text{low}}}$$


    $$y_{\text{interp}} = x_{\text{low}} + (x_{\text{interp}} - x_{\text{low}}) \cdot
    \text{slope}$$


    Where $x_{\text{low}}$ is the lower bound of the range and $x_{\text{up}}$ is
    the upper bound of the range.


    ![](img/4e4fc350228cd1c84055205e597f4fc0_166_0.png)


    Following the recipe in the above picture and given that we have already computed
    the slopes, we are able to complete the interpolation process in Python.


    ```

    python

    x_list = [x for x in range(10)]

    y_list = [x**2 for x in x_list]

    ```'
