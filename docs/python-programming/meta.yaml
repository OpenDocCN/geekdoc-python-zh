    # 9.9. GARBAGE COLLECTION


    Garbage collection in Python refers to the automatic process of identifying and
    reclaiming memory occupied by objects that are no longer accessible or referenced
    by the program. This mechanism prevents memory leaks and ensures efficient memory
    utilization within Python programs. Python employs a reference counting garbage
    collector as its primary means of memory management.


    The key concept of reference counting is to keep track of the number of references
    (variables) that point to a specific object. When the reference count of an object
    drops to zero, it indicates that the object is no longer reachable from the program
    and can be safely deallocated. However, reference counting has limitations, particularly
    in handling circular references.


    Circular references occur when objects reference each other in a loop, resulting
    in their reference counts never reaching zero. To address this issue, Python employs
    additional strategies, such as cyclic garbage collection, which involves detecting
    and clearing circular references.


    Python''s garbage collector operates behind the scenes and frees up memory in
    the following ways:


    +   1. **Reference Counting:** The primary mechanism involves decrementing reference
    counts as variables go out of scope or are reassigned. When the reference count
    drops to zero, the object becomes garbage and can be safely collected.

    2. **Cycle Detection:** For objects involved in circular references, Python''s
    cyclic garbage collector identifies and breaks these cycles. It reclaims memory
    by identifying groups of objects that reference each other but are unreachable
    from the rest of the program.

    3. **Automatic Collection:** The garbage collector runs automatically at intervals
    determined by Python''s internal algorithms. It identifies and collects unreachable
    objects, releasing memory back to the system.


    While Python''s garbage collector is efficient for most scenarios, it''s generally
    unnecessary for programmers to manually manage memory'
