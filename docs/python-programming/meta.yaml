  - '[PAGE 164]


    Derivatives are hugely important right across the spectrum of subjects. A derivative
    is essentially the rate of change of one variable with respect to another variable.


    The general concept is that for any given function y = f(x), we seek the rate
    of change of y with respect to x where:


    $$y = f(x)$$

    $$\frac{dy}{dx} = \frac{d}{dx}f(x)$$


    The same concept could be extended to higher dimensions, where: a = f(x, y, z,
    t) for example. However, the principals are still the same and in this case one
    might differentiate with respect to every independent variable in the function.


    $$\frac{d}{dx}f(x, y, z, t) + \frac{d}{dy}f(x, y, z, t) + \frac{d}{dz}f(x, y,
    z, t)...$$


    Ultimately, however, this process is done, what we are seeking is a slope between
    two points.


    The computer version of $$\frac{dy}{dx}$$ is $$\frac{\Delta y}{\Delta x}$$ where:

    $$\Delta y = y_1 - y_0$$ and $$\Delta x = x_1 - x_0$$ and these are the discrete
    calculations that are done.'
