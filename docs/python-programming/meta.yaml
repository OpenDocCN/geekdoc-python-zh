- md: "## 4.3. THE IF/ELSE STATEMENT\n\n```python\nif <condition>:\n    # Block of\
    \ code to be executed if the condition is True\nelse:\n    # Block of code to\
    \ be executed if the condition is False\n```\n\nHere’s how the if/else statement\
    \ works:\n\n1.  The `if` keyword is used to begin the if/else statement, followed\
    \ by a Boolean expression that determines whether the if block or the else block\
    \ will be executed.\n2.  If the Boolean expression evaluates to `True`, the code\
    \ inside the if block is executed. If the Boolean expression is `False`, the code\
    \ inside the else block is executed.\n3.  The `else` keyword is followed by a\
    \ colon (`:`), and the code block associated with the else is indented below it.\n\
    4.  The code blocks under both `if` and `else` must be indented consistently.\
    \ This indentation is essential in Python to identify the blocks of code belonging\
    \ to each branch.\n5.  It is important to note that either the if block or the\
    \ else block will be executed; they are mutually exclusive based on the Boolean\
    \ expression’s truth value.\n\nHere’s a simple example to illustrate the usage\
    \ of the if/else statement:\n\n```python\n# Getting user input\nage = int(input(\"\
    Please enter your age: \"))\n# Checking the age using if/else\nif age >= 18:\n\
    \    print(\"You are an adult.\")\nelse:\n    print(\"You are a minor.\")\n```\n\
    \nIn this example, if the user enters an age greater than or equal to 18, the\
    \ code within the if block will be executed, and the message “You are an adult”\
