    # Real numbers:


    Real numbers are all the numbers in between the integer numbers. If we break 1
    into two parts then we have ½ . The square root of two is a number that exists
    between 1 and 2 and very close to 1.41. These numbers definitely exist, but are
    not the integers that we count on our fingers or have invented on the conventional
    number line.


    ![](img/4e4fc350228cd1c84055205e597f4fc0_152_1.png)


    # Finally, Complex numbers:


    Complex numbers came into creation some 400 years ago. They were the roots of
    cubic and quadratic equations. In particular it was shown that the roots of a
    quadratic equation of the form ax² + bx + c = 0 are:


    ```

    x = -b ± √(b² - 4ac) / 2a

    ```


    Most importantly for complex numbers is the case where:


    ```

    b² < 4ac

    ```


    It is at this point that we are taking the square root of a negative number. And
    without the invention of a new type of number or a change in the accepted numbering
    system, this simply could not be done.'
