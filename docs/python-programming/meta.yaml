    \ to reach a saturation point.\n\n![](img/4e4fc350228cd1c84055205e597f4fc0_201_0.png)\n\
    \nIn fact, we see that the maximum saturation level is lower when the motivation\
    \ levels are reduced. This is because the rumour has died out before it has reached\
    \ the entire population (ie. people have gotten too bored too quickly).\n\nThe\
    \ entire contents of the code was just 120 lines in python and yet produced extremely\
    \ powerful computations and results.\n\n```python\ndef generate_friends(self)\
    \ -> list:\n    \"\"\" generate a list of friends from the community \"\"\"\n\
    \    friends = random.choices(community, k=5)\n    friends = list(set(friends))\n\
    \    return friends\n```"
