- md: "All the programs discussed in the earlier chapters have one thing in common:\
    \ they follow a linear sequence, executing the same set of statements regardless\
    \ of the input given to them. This limitation restricts their ability to solve\
    \ more complex problems. In this chapter, we introduce new constructs that enable\
    \ program statements to be executed selectively based on the context of the program’s\
    \ execution, providing greater flexibility and the ability to solve a wider range\
    \ of problems.\n\n## 4.1. BOOLEAN EXPRESSIONS\n\nArithmetic expressions yield\
    \ numeric values, while Boolean expressions, also known as predicates, can only\
    \ have two possible values: false or true. The name ‘Boolean’ originates from\
    \ the renowned British mathematician George Boole, and Boolean algebra, a branch\
    \ of discrete mathematics, focuses on exploring the properties and manipulation\
    \ of logical expressions. Although Boolean expressions may seem less complex than\
    \ numeric ones, they play a vital role in constructing more captivating and functional\
    \ programs. In Python, the most basic Boolean expressions are represented by True\
    \ and False. When using a Python interactive shell, we observe:\n\n```\n>>> True\n\
    True\n>>> False\nFalse\n>>> type(True)\n<class 'bool'>\n>>> type(False)\n<class\
    \ 'bool'>\n```\n\nTable 4.1. The Python Relational Operators\n\n| Expression |\
    \ Meaning |\n| :--- | :--- |\n| x == y | True if x = y (mathematical equality,\
    \ not assignment); otherwise, false |\n| x < y | True if x < y; otherwise, false\
    \ |\n| x <= y | True if x ≤ y; otherwise, false |\n| x > y | True if x > y; otherwise,\
    \ false |\n| x >= y | True if x ≥ y; otherwise, false |\n| x != y | True if x\
    \ /= y; otherwise, false |\n\nTable 4.2. Examples of Some Simple Relational Expressions\n\
    \n| Expression | Value |\n|---|---|\n| 10 < 20 | True |\n| 10 >= 20 | False |\n\
    | x < 100 | True if x is less than 100; otherwise, False |\n| x != y | True unless\
    \ x and y are equal |\n\nIn Python, the simplest Boolean expressions are represented\
    \ by the literals False and True. Additionally, a Boolean variable itself can\
    \ be considered a Boolean expression. Another form of Boolean expressions involves\
    \ comparing numeric expressions for equality or inequality, utilizing relational\
    \ operators. Python provides various relational operators for this purpose, as\
    \ listed in Table 4.1.\n\nTable 4.2 showcases some straightforward Boolean expressions\
    \ along with their corresponding values. While an expression like 10 < 20 is technically\
    \ valid, it offers little practical utility as 10 < 20 is always true. Instead,\
    \ using the literal True is more straightforward, clearer, and less likely to\
    \ confuse readers. The true power of Boolean expressions lies in their ability\
    \ to change their truth values based on the variables' values during a program's\
    \ execution, making them most valuable when their outcomes depend on one or more\
    \ variable values.\n\nIn the Python interactive shell we see:\n\n```\n>>> x =\
    \ 10\n>>> x\n10\n>>> x < 10\nFalse\n>>> x <= 10\nTrue\n>>> x == 10\nTrue\n>>>\
    \ x >= 10\nTrue\n>>> x > 10\nFalse\n>>> x < 100\nTrue\n>>> x < 5\nFalse\n```\n\
    \nIn this code snippet, the variable “x” is assigned the value 10. Then, various\
    \ Boolean expressions are evaluated using relational operators such as <, <=,\
    \ ==, >=, and >. Each expression compares the value of “x” with the given number,\
    \ and Python returns the resulting Boolean value (True or False) based on the\
    \ comparison. The initial input in the Python shell assigns the value 10 to the\
    \ variable “x.” The subsequent expressions are exploratory examples using relational\
    \ operators. These operators directly correspond to their mathematical representations,\
    \ making the following expressions entirely equivalent:\n\n```\nx < 10\n10 > x\n\
    !(x >= 10)\n!(10 <= x)\n```\n\nThe relational operators in Python are binary operators\
    \ and are all left-associative. They have lower precedence than any of the arithmetic\
    \ operators. Consequently, when Python evaluates the expression:\n\n```\nx + 2\
    \ < y / 10\n```\n\nIt behaves as if parentheses were included as follows:\n\n\
    ```\n(x + 2) < (y / 10)\n```\n\n## 4.2. THE SIMPLE IF STATEMENT\n\nInitially,\
    \ Boolean expressions, as discussed in Section 4.1, might appear complex and lacking\
    \ practical use in programs.\n\nFigure 4.1. Provides a visual representation of\
    \ the program execution flow within the if statement.\n\nHowever, in reality,\
    \ they play a crucial role in enabling programs to adapt their behavior dynamically\
    \ during runtime. Boolean expressions are indispensable for creating genuinely\
    \ practical and useful programs, and much functionality would be unattainable\
    \ without them.\n\nThe errors in program execution mentioned in Section 3.6 are\
    \ typically attributed to logic errors. An example is illustrated in the code\
    \ next where the program may encounter an issue if the user inputs a zero as the\
    \ divisor. Fortunately, programmers can take preventive measures to ensure that\
    \ division by zero does not occur.\n\n```\nif <condition>:\n    <block>\n```\n\
    \nWhere,\nThe keyword “if” initiates the if statement.\nThe condition is a Boolean\
    \ expression that determines whether the body will be executed. It must be followed\
    \ by a colon (“:”).\n\nThe block consists of one or more statements to be executed\
    \ if the condition evaluates to true. All statements within the block must have\
    \ the same indentation level. The block within the if statement must be indented\
    \ more than the line where the if statement starts. This portion is often referred\
    \ to as the “body” of the if statement.\n\nIn Python, proper indentation is crucial\
    \ for defining blocks. If the block contains only one statement, some programmers\
    \ might choose to place it on the same line as the if statement. For instance,\
    \ the following if statement with an optional assignment of “y”:\n\n```\nif x\
    \ < 10:\n    y = x\n```\n\ncould also be written as:\n\n```\nif x < 10: y = x\n\
    ```\n\nHowever, it should not be written without indentation, like this:\n\n```\n\
    if x < 10:\ny = x\n```\n\nBecause the lack of indentation could obscure the fact\
    \ that the assignment statement is contingent on the if condition. Indentation\
    \ is essential for Python to determine which statements belong to a particular\
    \ block.\n\nBoth the assignment statement and the first printing statement are\
    \ part of the block belonging to the if statement. Based on the truth value of\
    \ the Boolean expression divisor != 0 during program execution, either both statements\
    \ will be executed, or neither will be executed. However, the last statement,\
    \ which prints “Program finished,” is not indented and is not part of the if block.\
    \ As a result, this statement will always be executed, regardless of the user’s\
    \ input.\n\nRemember, when checking for equality, such as in the code snippet:\n\
    \n```\nif x == 10:\n    print('ten')\n```\n\nUse the relational equality operator\
    \ ==, not the assignment operator =.\n\nIn Python, the concept of true and false\
    \ extends beyond standard Boolean expressions. For example:\n\n```\nif 1:\n  \
    \  print('one')\n```\n\nThis code always prints “one,” whereas:\n\n```\nif 0:\n\
    \    print('zero')\n```\n\nDoes not print anything. Python considers the integer\
    \ value 0 to be false, while all other integer values, positive and negative,\
    \ are considered true. Similarly, the floating-point value 0.0 is false, but any\
    \ other floating-point value is true.\n\nThe empty string (“” or “”) is treated\
    \ as false, while any non-empty string is treated as true. Essentially, any Python\
    \ expression can serve as the condition for an if statement. In later chapters,\
    \ we will explore additional types of expressions and how they relate to Boolean\
    \ conditions. The program requests an integer value from the user and displays\
    \ the number using exactly four digits. Leading zeros are added where necessary\
    \ to ensure all four digits are occupied. If the number is less than zero, it\
    \ is treated as zero, and if the number is greater than 9,999, it is treated as\
    \ 9,999.\n\n## 4.3. THE IF/ELSE STATEMENT\n\nThe if/else statement in Python is\
    \ a conditional control flow statement that allows you to execute different blocks\
    \ of code based on the evaluation of a Boolean expression. It follows this general\
    \ syntax:"
  mdcn: "前面章节讨论的所有程序都有一个共同点：它们遵循线性顺序，无论输入什么，都执行同一组语句。这种限制制约了它们解决更复杂问题的能力。在本章中，我们将引入新的结构，使程序语句能够根据程序执行的上下文有选择地执行，从而提供更大的灵活性和解决更广泛问题的能力。\n\
    \n## 4.1. 布尔表达式\n\n算术表达式产生数值，而布尔表达式（也称为谓词）只能有两个可能的值：假或真。“布尔”这个名字源于著名的英国数学家乔治·布尔，布尔代数是离散数学的一个分支，专注于探索逻辑表达式的性质和操作。尽管布尔表达式看起来可能不如数值表达式复杂，但它们在构建更引人入胜和功能更强大的程序中起着至关重要的作用。在\
    \ Python 中，最基本的布尔表达式由 `True` 和 `False` 表示。当使用 Python 交互式 shell 时，我们观察到：\n\n```\n\
    >>> True\nTrue\n>>> False\nFalse\n>>> type(True)\n<class 'bool'>\n>>> type(False)\n\
    <class 'bool'>\n```\n\n表 4.1. Python 关系运算符\n\n| 表达式 | 含义 |\n| :--- | :--- |\n\
    | x == y | 如果 x = y（数学上的相等，而非赋值），则为真；否则为假 |\n| x < y | 如果 x < y，则为真；否则为假 |\n|\
    \ x <= y | 如果 x ≤ y，则为真；否则为假 |\n| x > y | 如果 x > y，则为真；否则为假 |\n| x >= y | 如果 x\
    \ ≥ y，则为真；否则为假 |\n| x != y | 如果 x ≠ y，则为真；否则为假 |\n\n表 4.2. 一些简单关系表达式的示例\n\n| 表达式\
    \ | 值 |\n|---|---|\n| 10 < 20 | 真 |\n| 10 >= 20 | 假 |\n| x < 100 | 如果 x 小于 100，则为真；否则为假\
    \ |\n| x != y | 除非 x 和 y 相等，否则为真 |\n\n在 Python 中，最简单的布尔表达式由字面量 `False` 和 `True`\
    \ 表示。此外，布尔变量本身也可以被视为布尔表达式。布尔表达式的另一种形式涉及使用关系运算符比较数值表达式的相等性或不等性。Python 提供了各种关系运算符来实现此目的，如表\
    \ 4.1 所列。\n\n表 4.2 展示了一些简单的布尔表达式及其对应的值。虽然像 `10 < 20` 这样的表达式在技术上是有效的，但它几乎没有实际用途，因为\
    \ `10 < 20` 总是为真。相反，直接使用字面量 `True` 更直接、更清晰，也不太可能让读者困惑。布尔表达式的真正威力在于它们能够根据程序执行期间变量的值改变其真值，因此当它们的结果取决于一个或多个变量的值时，它们最有价值。\n\
    \n在 Python 交互式 shell 中，我们看到：\n\n```\n>>> x = 10\n>>> x\n10\n>>> x < 10\nFalse\n\
    >>> x <= 10\nTrue\n>>> x == 10\nTrue\n>>> x >= 10\nTrue\n>>> x > 10\nFalse\n>>>\
    \ x < 100\nTrue\n>>> x < 5\nFalse\n```\n\n在这段代码片段中，变量 `x` 被赋值为 10。然后，使用关系运算符（如\
    \ `<`、`<=`、`==`、`>=` 和 `>`）对各种布尔表达式进行求值。每个表达式都将 `x` 的值与给定的数字进行比较，Python 根据比较结果返回相应的布尔值（`True`\
    \ 或 `False`）。Python shell 中的初始输入将值 10 赋给变量 `x`。后续的表达式是使用关系运算符的探索性示例。这些运算符直接对应于它们的数学表示，因此以下表达式完全等价：\n\
    \n```\nx < 10\n10 > x\n!(x >= 10)\n!(10 <= x)\n```\n\nPython 中的关系运算符是二元运算符，并且都是左结合的。它们的优先级低于任何算术运算符。因此，当\
    \ Python 对表达式求值时：\n\n```\nx + 2 < y / 10\n```\n\n它的行为就像包含了如下括号：\n\n```\n(x + 2)\
    \ < (y / 10)\n```\n\n## 4.2. 简单的 IF 语句\n\n最初，如第 4.1 节所讨论的布尔表达式可能看起来很复杂，并且在程序中缺乏实际用途。\n\
    \n图 4.1. 提供了 if 语句内程序执行流程的可视化表示。\n\n然而，实际上，它们在使程序能够在运行时动态调整其行为方面起着至关重要的作用。布尔表达式对于创建真正实用和有用的程序是不可或缺的，没有它们，许多功能将无法实现。\n\
    \n第 3.6 节中提到的程序执行错误通常归因于逻辑错误。一个例子在接下来的代码中说明，如果用户输入零作为除数，程序可能会遇到问题。幸运的是，程序员可以采取预防措施来确保不会发生除以零的情况。\n\
    \n```\nif <条件>:\n    <代码块>\n```\n\n其中，\n关键字 `if` 启动 if 语句。\n条件是一个布尔表达式，用于确定是否执行主体。它后面必须跟一个冒号（`:`）。\n\
    \n代码块由一个或多个语句组成，如果条件求值为真，则执行这些语句。代码块中的所有语句必须具有相同的缩进级别。if 语句中的代码块必须比 if 语句开始的行缩进更多。这部分通常被称为\
    \ if 语句的“主体”。\n\n在 Python 中，正确的缩进对于定义代码块至关重要。如果代码块只包含一条语句，一些程序员可能会选择将其放在与 if 语句同一行。例如，以下带有可选赋值\
    \ `y` 的 if 语句：\n\n```\nif x < 10:\n    y = x\n```\n\n也可以写成：\n\n```\nif x < 10:\
