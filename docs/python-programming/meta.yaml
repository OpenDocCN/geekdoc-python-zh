    # 8.10. DECORATORS


    In Python, decorators are a powerful and flexible feature that allow you to modify
    or enhance the behavior of functions or methods without changing their source
    code. Decorators are often used to add functionality to functions, such as logging,
    timing, access control, or caching, without altering the original function’s code.


    Here’s a basic overview of how decorators work:


    +   1. **Functions as First-Class Objects:** In Python, functions are treated
    as first-class objects, which means you can assign them to variables, pass them
    as arguments to other functions, and even return them from functions.

    2. **Nested Functions:** Python allows you to define functions within functions.
    A function defined inside another function is known as a nested or inner function.'
