    Listing 1.1 (simple.py) consists of a single line of code:


    ```

    print("This is a simple Python program")

    ```


    This line is a Python statement, which the interpreter executes. It prints the
    message “This is a simple Python program” on the screen. In Python, a statement
    is the fundamental unit of execution, and statements can be grouped into blocks
    to form more complex statements. Higher-order constructs like functions and methods
    are composed of these blocks. The statement “print(“This is a simple Python program”)”
    utilizes the built-in function called “print.” As you progress through the chapters,
    you will explore various types of statements.


    While integrated development environments like Wingware’s WingIDE-101 are valuable
    for Python development, you can also execute Python programs directly from the
    command line. In Microsoft Windows, the command console (cmd.exe) and PowerShell
    offer command line interfaces. On Apple Mac OS X, Linux, and Unix systems, you
