    :\n    main(120, 90, 8)\n```\n\nWhilst this is just a game, it allows the user\
    \ to try out a number of techniques, indeed, we could have used tkinter (or even\
    \ turtle) for the GUI with similar implementation.\n\nWe note the different colouration\
    \ for cells which are about to die, which are those that will be removed in the\
    \ next iteration.\n\nWe also note that the starting grid is explicitly defined\
    \ where the pattern of the glider cannon (the gun) is saved in the variable named\
    \ pattern.\n\nThe output is an animation, but the pattern for the gun is static:\n\
    \n![](img/4e4fc350228cd1c84055205e597f4fc0_257_0.png)\n\nA follow up of the game\
    \ of life is left to the reader…\n\n## The Lorenz Attractor\n\nAn exercise for\
    \ the reader.\n\n## Digital Image Processing\n\nA huge amount of work has been\
    \ done over the past 25 years with respect to image processing and the growth\
    \ of the subject and technologies arising from such have been tremendous.\n\n\
    Image processing can often be processor intensive and as such has greatly benefitted\
    \ from the increase in processing power over the same period.\n\nPython has proved\
    \ to be a popular language for image processing and comes with a number of libraries\
    \ that intrinsically contain the techniques that this section will be looking\
    \ at. In particular, it is Python's ability to harness and leverage the much faster\
    \ C++ algorithms that has provided this popularity.\n\nOne of the more popular\
    \ modules that Python, called opencv, was originally written in C++. Whilst there\
    \ are a number of other modules, we will focus on this one.\n\nIn this chapter\
    \ we will attempt to understand a number of the processes leading up to and finally\
    \ including face detection or other interesting digital equivalents. We will start\
    \ at the beginning here:\n\n- Read images, videos, webcams\n- Basic functions\n\
    - Resizing and cropping\n\n## Introduction to images\n\nEven though we might not\
    \ be able to see this with the naked eye, computer images that we see on our screens,\
    \ monitors or other devices are made up from many small points called pixels.\
    \ When we zoom into the images this becomes noticeable as the image becomes more\
    \ and more pixelated."
  mdcn: "我们能够使用这段代码块制作一个简单的滑翔机：\n\n```python\ndef addGlider(i, j, grid):\n    \"\"\
    \"adds a glider with top left cell at (i, j)\"\"\"\n    glider = [[0,0,1],[1,0,1],[0,1,1]]\n\
    \    grid[i:i+3, j:j+3] = glider\n```\n\n还有许多更复杂的此类形状，例如能产生滑翔机的“枪”，并且人们已经对这个最初看似相当\
    \ trivial 的游戏进行了大量研究。\n\n在另一段独立的代码中，展示了不同的技术（使用 pygame 代替 matplotlib 动画），我们可以看到一个“枪”的示例。\n\
    \n```python\nimport pygame\nimport numpy as np\n\ncol_about_to_die = (100, 200,\
    \ 225)\ncol_alive = (255, 255, 215)\ncol_background = (10, 10, 40)\ncol_grid =\
    \ (30, 30, 60)\n\ndef update(surface, cur, sz):\n    nxt = np.zeros((cur.shape[0],\
    \ cur.shape[1]))\n\n    for r, c in np.ndindex(cur.shape):\n        num_alive\
    \ = np.sum(cur[r-1:r+2, c-1:c+2]) - cur[r, c]\n\n        if cur[r, c] == 1 and\
    \ num_alive < 2 or num_alive > 3:\n            col = col_about_to_die\n      \
    \  elif (cur[r, c] == 1 and 2 <= num_alive <= 3) or \\\n                (cur[r,\
