- img_proc: true
  md: "A coroutine is a function that can suspend its execution before reaching return,\
    \ and it can indirectly pass control to another coroutine for some time.\n\nBefore\
    \ we get to this point we have to understand that this is a new technology (python\
    \ 3.7 and above) which has been built from existing tech and we are only looking\
    \ at the top level as a deep dive would require a book in itself. The components\
    \ to understand are:\n\n+   1. The async ecosystem\n2. The event loop (all languages)\n\
    3. Using coroutines\n4. How coroutines work\n5. What comes included in the ecosystem\n\
    6. Typical web applications\n7. Interacting with the blocking world\n8. Error\
    \ handling, testing, debugging\n\nEach of the asynchronous methods has its advantages\
    \ and disadvantages. **With multiprocessing**, the user is able to use multiple\
    \ processors at any point in time, but the con is that processors are limited.\
    \ **With threading** the user has an easy way of sharing processes on the same\
    \ thread but the con is that the computer takes control of when this happens which\
    \ can give rise to race conditions. **With asyncio** the user can achieve the\
    \ same as threading and also keep control, but the con is that the functions need\
    \ to be defined as async and there are additional keywords and terminology to\
    \ use.\n\nHere is a classic example of race conditions in threading which gives\
    \ rise to additional implementations being required and ultimately asyncio.\n\n\
    ```\nimport threading\nimport time\n\nx = 10\n\ndef increment(by):\n    global\
    \ x\n\n    local_counter = x\n    local_counter += by\n\n    time.sleep(1)\n\n\
    \    x = local_counter\n    print(f'{threading.current_thread().name} inc x {by},\
    \ x: {x}')\n```"
  merge: -1
  pgno: 132
- img_proc: true
  md: "```\npython\ndef main():\n    # creating threads\n    t1 = threading.Thread(target=increment,\
    \ args=(5,))\n    t2 = threading.Thread(target=increment, args=(10,))\n\n    #\
    \ starting the threads\n    t1.start()\n    t2.start()\n\n    # waiting for the\
    \ threads to complete\n    t1.join()\n    t2.join()\n\n    print(f'The final value\
    \ of x is {x}')\n\nfor i in range(10):\n    main()\n```\n\nThe results look like\
    \ this:\n\n```\n\nThread-56 (increment) inc x 10, x: 20Thread-55 (increment) inc\
    \ x 5, x: 15\n\nThe final value of x is 15\nThread-57 (increment) inc x 5, x:\
    \ 20Thread-58 (increment) inc x 10, x: 25\n\nThe final value of x is 25\nThread-60\
    \ (increment) inc x 10, x: 35Thread-59 (increment) inc x 5, x: 30\n\nThe final\
    \ value of x is 30\nThread-61 (increment) inc x 5, x: 35\nThread-62 (increment)\
    \ inc x 10, x: 40\nThe final value of x is 40\nThread-64 (increment) inc x 10,\
    \ x: 50Thread-63 (increment) inc x 5, x: 45\n\nThe final value of x is 45\n```\n\
    \nWhich is inconsistent at each loop and this was caused by the processor allocating\
    \ control in an “unexpected” way.\n\nThere are ways to address this in threading\
    \ with the GIL [17] and even better, using the await keyword in an async function\
    \ for proper handover of the function and control of the program.\n\nThe important\
    \ thing to note about asynchronous input and output routines is that the control\
    \ of the program flow can now be definitely broken down into linear cycles where\
    \ a callback function is only invoked once the preceding function allows for this."
