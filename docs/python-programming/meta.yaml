    \ (Exp).\n- The candidate must be proficient in a programming language (Prog).\n\
    \nA compound Boolean expression for a candidate to be considered for the job could\
    \ be:\n\n```\n(CS && Exp >= 2) || (Prog == true)\n```\n\nThis expression states\
    \ that the candidate will be considered if they have a computer science degree\
    \ and at least 2 years of work experience, or if they are proficient in a programming\
    \ language. If any of these conditions are met, the compound expression will evaluate\
