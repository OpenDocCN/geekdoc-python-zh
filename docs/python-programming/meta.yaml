    ## 2.3. IDENTIFIERS


    In Python, an identifier is a name used to identify a variable, function, class,
    module, or other objects. Identifiers play a crucial role in the Python programming
    language as they provide a way to refer to entities within the code. Here are
    some rules and conventions that apply to Python identifiers:


    **Valid Characters:** An identifier can contain letters (both uppercase and lowercase),
    digits, and underscores (_). It must start with a letter (a-z, A-Z) or an underscore.


    **Case Sensitivity:** Python is a case-sensitive language, meaning identifiers
    with different cases (e.g., ‘variable’ and ‘Variable’) are treated as distinct
    entities.


    **Reserved Words:** Python has reserved words, also known as keywords, which are
    used to define the syntax and structure of the language. These words cannot be
    used as identifiers. For example, “if”, “else”, “while”, “class”, etc., are reserved
    words.


    **Convention:** It is common in Python to use lowercase letters for variable names
    and underscore-separated words for improved readability (e.g., ‘user_name’, ‘total_count’,
    ‘product_price’). For class names, the convention is to use CamelCase, starting
    with an uppercase letter for each word (e.g., ‘CustomerData’, ‘RectangleShape’).


    Examples of valid Python identifiers:


    ```

    x

    count

    total_cost

    my_function

    is_active

    _PI

    user_1

    ```


    Examples of invalid Python identifiers:


    ```

    2x (starts with a digit)

    my-variable (contains a dash, not allowed)

    if (a reserved word)

    while (a reserved word)

    ```


    It’s essential to choose meaningful and descriptive names for identifiers to make
    code more readable and maintainable. Following Python’s naming conventions and
    avoiding reserved words will help ensure that identifiers are used correctly in
    Python programs.


    ## 2.4. FLOATING-POINT NUMBERS


    Floating-point numbers are essential for many computational tasks that involve
    fractional parts. For instance, calculating the area of a circle using the radius
    requires the use of the value π, which is approximately 3.14159. Python fully
    supports non-integer numbers, referring to them as floating-point numbers. The
    term “floating-point” suggests that the decimal point can move or “float” to different
    positions within the number to preserve the required number of significant digits
    during mathematical computations. In Python, these floating-point numbers are
    represented by the float data type.


    Here’s an example interactive session demonstrating the use of floating-point
    numbers:


    ```

    >>> radius = 5

    >>> area = 3.14159 * radius ** 2

    >>> area

    78.53975

    ```


    The float data type in Python is represented using 64 bits of storage. It has
    a range from approximately 2.22507 x 10^-308 to 1.79769 x 10^308, and it provides
    a precision of up to 15 significant digits. However, it’s crucial to note that
    the actual range and precision of floating-point numbers may vary depending on
    the Python implementation used on a particular machine.


    ### Table 2.1. Characteristics of Floating-Point Numbers


    | Title | Storage | Smallest Magnitude | Largest Magnitude | Minimum Precision
    |

    |---|---|---|---|---|

    | Float | 64 Bits | 2.22507 × 10⁻³⁰⁸ | 1.79769 × 10⁺³⁰⁸ | 15 digits |


    Table 2.2 provides characteristics of floating-point numbers commonly implemented
    on most computer systems, including the storage size, the smallest and largest
    magnitudes, and the minimum precision. Floating-point numbers can represent both
    positive and negative values.


    Unlike Python integers, which can be arbitrarily large (or small for negatives),
    floating-point numbers have definite bounds, as shown in Table 2.1. It’s essential
    to be aware of these limits when working with floating-point numbers in Python.


    In the next code, we print an approximation of the mathematical value π.


    ```

    pi = 3.14159

    print(pi)

    print("The value of pi is:", 3.14159)

    ```


    The first line assigns an approximate value of π to the variable named ‘pi’, and
    the second line prints its value. The last line combines text with a literal floating-point
    value. In Python, any numeric value containing a decimal point is automatically
    considered a float data type. So, the literal 2.0 in Python is considered a float,
    even though mathematically it is an integer.


    It’s important to note that Python distinguishes between integers (whole numbers)
    and floats (numbers with fractional parts) using the presence or absence of a
    decimal point. The value 2 is an integer, while 2.0 is a float.


    Floating-point numbers in Python are an approximation of mathematical real numbers.
    Unlike integers, floating-point numbers have a limited range since each value
    requires a fixed amount of memory.


    However, there is a fundamental difference between integers and floating-point
    numbers. Integers have an exact representation, while this is not necessarily
    true for floating-point numbers. Consider the mathematical constant π (pi), which
    is an irrational number.


    Being irrational means it has an infinite number of non-repeating digits after
    the decimal point. Since Python’s floating-point numbers have a finite number
    of digits, they can only approximate the value of π. Moreover, even some numbers
    with a finite number of digits cannot be represented exactly in Python’s float
    data type. For example, the number 23.3123400654033989 has too many digits for
    the float type, and Python will store it as 23.312340065403397 due to the limited
    precision available.


    Here’s an illustration of this behavior:


    ```

    >>> x = 23.3123400654033989

    >>> x

    23.312340065403397

    ```


    As demonstrated in the interactive session, Python approximates the value of x
    to fit within the available precision for floating-point numbers, resulting in
    a slight loss of accuracy.


    It is essential to be aware of this limitation when dealing with floating-point
    numbers, especially in critical numerical computations where precision is crucial.
    Python offers other modules, such as the Decimal module, for applications requiring
    high-precision arithmetic to mitigate these potential issues.


    Floating-point numbers can be expressed in scientific notation in Python. To accommodate
    programming editors that lack superscripting and special symbols like ‘× 10^’,
