- md: '## 9.4. FRACTION OBJECTS


    The fractions module in Python provides the Fraction class, which allows you to
    work with rational numbers (fractions) precisely, represented as the ratio of
    two integers: a numerator and a denominator.


    Here''s a brief overview of how to use the Fraction class from the fractions module:


    ```python

    from fractions import Fraction

    # Creating Fraction objects

    fraction1 = Fraction(3, 4) # Represents the fraction 3/4

    fraction2 = Fraction(5, 2) # Represents the fraction 5/2

    # Arithmetic operations with fractions

    result_add = fraction1 + fraction2

    result_sub = fraction1 - fraction2

    result_mul = fraction1 * fraction2

    result_div = fraction1 / fraction2

    # Conversion from float to Fraction

    float_value = 0.75

    fraction_from_float = Fraction(float_value) # Converts 0.75 to 3/4

    # Conversion from string to Fraction

    string_value = "7/8"

    fraction_from_string = Fraction(string_value) # Converts "7/8" to 7/8

    # Accessing the numerator and denominator

    numerator = fraction1.numerator

    denominator = fraction1.denominator

    # Simplifying fractions

    simplified_fraction = Fraction(16, 24) # Represents 16/24, which simplifies to
    2/3

    # Converting a Fraction to a float or string

    float_result = float(fraction1)

    string_result = str(fraction2)

    ```


    The Fraction class is particularly useful when you need to maintain exact precision
    with fractions, as opposed to the inherent approximations that can occur with
    floating-point numbers. This can be important in various applications, such as
    financial calculations or any scenario where maintaining exact ratios is crucial.
    Feel free to explore the various methods and capabilities of the Fraction class
    to handle rational numbers accurately in your Python programs.


    The Fraction class from the fractions module to perform operations with fractions.
    Here''s a breakdown of the code and its output:


    ```python

    from fractions import Fraction

    f1 = Fraction(3, 4)  # Make the fraction 3/4

    print(f1)    # Print it (Output: 3/4)

    print(f1.numerator)  # Print numerator (Output: 3)

    print(f1.denominator) # Print denominator (Output: 4)

    print(float(f1))  # Floating-point equivalent (Output: 0.75)

    f2 = Fraction(1, 8)  # Make another fraction, 1/8

    print(f2)    # Print the second fraction (Output: 1/8)

    f3 = f1 + f2  # Add the two fractions

    print(f3)    # 3/4 + 1/8 = 6/8 + 1/8 = 7/8

    ```


    1. f1 = Fraction(3, 4): Creates a Fraction object representing the fraction 3/4.

    2. print(f1): Prints the Fraction object f1, which will output 3/4.

    3. print(f1.numerator): Prints the numerator of the Fraction object f1, which
    is 3.

    4. print(f1.denominator): Prints the denominator of the Fraction object f1, which
    is 4.

    5. print(float(f1)): Converts the Fraction object f1 to a floating-point equivalent,
    which is 0.75.

    6. f2 = Fraction(1, 8): Creates another Fraction object representing the fraction
    1/8.

    7. print(f2): Prints the Fraction object f2, which will output 1/8.

    8. f3 = f1 + f2: Adds the Fraction objects f1 and f2 together, resulting in the
    fraction 7/8.

    9. print(f3): Prints the result of the addition, which is the fraction 7/8.


    The code demonstrates basic operations with fractions, including creation, printing,
    accessing numerators and denominators, and performing arithmetic operations. The
    Fraction class is useful when you need to work with fractions precisely, especially
    in scenarios where decimal approximations may not be sufficient.


    Some Python code that deals with fractions using a custom Fraction class. Explanation
    is mostly accurate, but there are a few clarifications I''d like to make:


    1. **Class Constructors:** Yes, you''re right that the line f1 = Fraction(3, 4)
    creates a Fraction object using the constructor of the Fraction class. Constructors
    are special methods used to initialize objects when they are created.

    2. **Instance Variables:** You''re correct that Fraction objects have instance
    variables like numerator and denominator, which are used to store the numerator
    and denominator values of the fraction.

    3. **Method Calls:** The addition statement f3 = f1 + f2 indeed involves a method
    call, but it''s not the add method. Python uses special methods like __add__ for
    operator overloading. When you use the + operator between two Fraction objects,
    Python internally calls the __add__ method of the Fraction class. This method
    defines how the addition operation should be carried out for Fraction objects.

    4. **Operator Overloading:** The line f3 = f1 + f2 is equivalent to f3 = f1.__add__(f2),
    not f3 = f1.add(f2). The magic method __add__ is responsible for handling the
    addition operation.

    5. **Method Naming:** You mentioned a method named add in your explanation, but
    the standard way to implement addition of Fraction objects is through the __add__
    method, not add.


    Here’s a corrected version of the last part of your explanation:


    > “The program appears to be devoid of any method calls, but the addition statement
    involves a method call behind the scenes. Python uses special methods, like __add__,
    for operator overloading. The Fraction class defines a __add__ method. This allows
    clients to add two fraction objects using the + operator, as shown:


    ```python

    f3 = f1 + f2

    ```


    This line is a more elegant way of expressing:


    ```python

    f3 = f1.__add__(f2)

    ```


    > The __add__ method is responsible for defining how the addition operation should
    be performed between two Fraction objects.”


    We say the former statement using the + operator is syntactic sugar for latter
    statement that uses the explicit add method. Most human readers prefer the version
    with +, but, in reality, both statements are identical to the Python interpreter.
    The str class of string objects also provides an add method. If s and t are string
    objects, the string concatenation expression s + t is syntactic sugar for s.add(t),
    particularly in the context of operator overloading and built-in types like int,
    float, and str. Your explanation is generally correct, but there are a few more
    details I can add for further clarity:


    The special methods you mentioned (__mul__, __eq__, __gt__, __sub__, __neg__)
    are indeed essential for defining how objects of your custom class should interact
    with the corresponding operators. This mechanism allows you to make your objects
    behave in a way that’s intuitive to users, making your class more user-friendly.


    Here’s the continuation of your explanation, elaborating on the interactive sequence:
    “Consider the following interactive sequence, which demonstrates the usage of
    these special methods with built-in types:


    ```python

    x = 5

    y = 3

    # Using special methods for operators with int objects

    product = x.__mul__(y) # Equivalent to x * y

    print(product) # Outputs: 15

    equal = x.__eq__(y) # Equivalent to x == y

    print(equal) # Outputs: False

    greater_than = x.__gt__(y) # Equivalent to x > y

    print(greater_than) # Outputs: True

    difference = x.__sub__(y) # Equivalent to x - y

    print(difference) # Outputs: 2

    negative = x.__neg__() # Equivalent to -x

    print(negative) # Outputs: -5

    ```


    While using these special methods directly is possible, it’s more common to use
    the operators themselves for a cleaner and more readable code:


    ```python

    x = 5

    y = 3

    product = x * y

    print(product) # Outputs: 15

    equal = x == y

    print(equal) # Outputs: False

    greater_than = x > y

    print(greater_than) # Outputs: True

    difference = x - y

    print(difference) # Outputs: 2

    negative = -x

    print(negative) # Outputs: -5

    ```


    As you can see, Python’s built-in types have these special methods defined to
    provide the familiar behavior of arithmetic and comparison operations. This consistency
    allows developers to work with various types using the same syntax, enhancing
    code readability and maintainability.” However, there are some issues in the way
    you’re presenting the code. Let me help you correct and explain the examples you’ve
    given:


    ```python

    >>> (20).__add__(4) # Equivalent to 20 + 4

    24

    ```


    In this example, the special method __add__ is used to perform addition between
    the integer value 20 and the integer 4, resulting in 24.


    ```python

    >>> 0.25.__mul__(4) # Equivalent to 0.25 * 4

    1.0

    ```'
  mdcn: '## 9.4. 分数对象


    Python 中的 `fractions` 模块提供了 `Fraction` 类，它允许你精确地处理有理数（分数），这些分数被表示为两个整数的比值：分子和分母。


    以下是使用 `fractions` 模块中 `Fraction` 类的简要概述：


    ```python

    from fractions import Fraction

    # 创建 Fraction 对象

    fraction1 = Fraction(3, 4) # 表示分数 3/4

    fraction2 = Fraction(5, 2) # 表示分数 5/2

    # 分数的算术运算

    result_add = fraction1 + fraction2

    result_sub = fraction1 - fraction2

    result_mul = fraction1 * fraction2

    result_div = fraction1 / fraction2

    # 从浮点数转换为 Fraction

    float_value = 0.75

    fraction_from_float = Fraction(float_value) # 将 0.75 转换为 3/4

    # 从字符串转换为 Fraction

    string_value = "7/8"

    fraction_from_string = Fraction(string_value) # 将 "7/8" 转换为 7/8

    # 访问分子和分母

    numerator = fraction1.numerator

    denominator = fraction1.denominator

    # 简化分数

    simplified_fraction = Fraction(16, 24) # 表示 16/24，简化为 2/3

    # 将 Fraction 转换为浮点数或字符串

    float_result = float(fraction1)

    string_result = str(fraction2)

    ```


    当你需要保持分数的精确精度时，`Fraction` 类特别有用，这与浮点数固有的近似值形成对比。这在各种应用中都很重要，例如金融计算或任何需要保持精确比率的场景。请随意探索
    `Fraction` 类的各种方法和功能，以便在你的 Python 程序中准确处理有理数。


    `fractions` 模块中的 `Fraction` 类用于执行分数运算。以下是代码及其输出的分解：


    ```python

    from fractions import Fraction

    f1 = Fraction(3, 4)  # 创建分数 3/4

