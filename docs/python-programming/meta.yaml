    \n以下是结果图像：\n\n调整图像大小（拉伸）后，我们可能还想裁剪图像。当用户只想从更大的图像中获取一个特定的兴趣区域时，这很有用，例如从人群中获取一个人的脸，或从交通中获取汽车的车牌等。\n\
    \n对于裁剪，我们不需要模块中的方法，因为我们可以利用图像是一个矩阵（即列表的列表）的知识，因此我们可以通过切片列表来提取兴趣区域。\n\nPython原生提供了一个对列表有用的功能，称为切片，其工作方式如下：\n\
