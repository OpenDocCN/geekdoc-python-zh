    \ result, continue the calculation, and finally print the final answer, with all\
    \ the output appearing on one line of text. The `end` keyword argument allows\
    \ us to achieve this.\n\nAdditionally, there is another keyword argument called\
    \ `sep`, which allows us to control how the print function visually separates\
    \ the items it displays. By default, `print` places a single space in between\
    \ the items it prints. However, with the `sep` argument, we can specify a custom\
    \ string to insert between the items.\n\nThe following code demonstrates the use\
    \ of the `sep` keyword to customize the behavior of the print function:\n\n```python\n\
    x = 10\ny = 20\nz = 30\nprint(x, y, z) # Output: 10 20 30\nprint(x, y, z, sep=',\
    \ ') # Output: 10, 20, 30\nprint(x, y, z, sep='') # Output: 102030\nprint(x, y,\
    \ z, sep='---') # Output: 10---20---30\n```\n\nThe first output line shows `print`'s\
    \ default behavior, where it uses a single space between the printed items. The\
    \ second output line uses commas with spaces as separators. The third line shows\
    \ that the items are concatenated together with no separator. The fourth line\
    \ demonstrates that the separator can be a string consisting of multiple characters.\n\
    \nUsing the `end` and `sep` keyword arguments gives us flexibility in formatting\
    \ the output to meet our specific needs.\n\n## 2.8. STRING FORMATTING\n\nLet's\
    \ examine the following code, which demonstrates printing the first few powers\
    \ of 10:\n\n```python\nfor i in range(6):\n    print(10 ** i)\n```\n\nThe output:\n\
    \n```\n1\n10\n100\n1000\n10000\n100000\n```\n\nIn this output, each number is\
    \ left-justified.\n\nNow, let's move on to the next code, which achieves the same\
    \ result but in a more complex manner:\n\n```python\nfor i in range(6):\n    print('{0}'.format(10\
    \ ** i))\n```\n\nOutput:\n\n```\n1\n10\n100\n1000\n10000\n100000\n```\n\nIn the\
    \ third print statement of the code, the expression `'{0} {1}'.format(2, 10**2)`\
    \ is printed.\n\nThe expression `'{0} {1}'.format(2, 10**2)` has two main parts:\n\
    \n1. `'{0} {1}'`: This is the formatting string, represented by a Python string\
    \ enclosed in quotes. The program does not print the literal string \"0 1.\" Instead,\
    \ it serves as a pattern with placeholders `{0}` and `{1}`, known as positional\
    \ parameters, which will be replaced by other objects. The formatting string represents\
    \ two objects separated by a single space.\n2. `format(2, 10**2)`: This part provides\
    \ arguments to be substituted into the formatting string. The first argument,\
    \ `2`, will replace the `{0}` positional parameter in the formatting string. The\
    \ second argument, `10**2`, which is 100, will replace the `{1}` positional parameter.\n\
    \nThe format operation matches the arguments with the positions marked by `{0}`\
    \ and `{1}`, resulting in the string '2 100'. The print function then outputs\
    \ this string as the first line of the program's output.\n\nSimilarly, in the\
    \ statement:\n\n```python\nprint('{0} {1}'.format(7, 10**7))\n```\n\nThe expression\
    \ `'{0} {1}'.format(7, 10**7)` becomes '7 10000000', as `7` replaces `{0}` and\
    \ `10**7` (10000000) replaces `{1}`. This demonstrates how the arguments of `format`\
    \ substitute for the positional parameters in the formatting string.\n\nThe above\
    \ code does not provide any advantage over the previous code, and it is more complicated.\
    \ However, the extra effort of string formatting can be useful in cases where\
    \ numeric values need to be right-justified to align on the right, instead of\
    \ the default left justification. The next code utilizes a string formatter with\
    \ enhanced positional parameters to right-justify the values it prints.\n\nOutput:\n\
    \n```\n1       1\n10      100\n100     10000\n1000    1000000\n10000   100000000\n\
    100000  10000000000\n```\n\nIn this program, the positional parameters `{0:>3}`\
    \ and `{1:>16}` are used for formatting. `{0:>3}` means \"right-justify the first\
    \ argument within a width of three characters,\" while `{1:>16}` indicates that\
    \ the second argument should be right-justified within 16 places. This formatting\
    \ aligns the two columns of numbers properly. The format string can contain arbitrary\
    \ text along with the positional parameters. As shown in the interactive sequence:\n\
    \n```python\na = 'x'\nb = 'y'\nprint('a{0}b{1}c{0}d'.format(a, b))\n```\n\nThe\
    \ resulting string is formatted exactly like the format string, including spaces,\
    \ with the only difference being that the format arguments replace the positional\
    \ parameters. It is also possible to repeat a positional parameter multiple times\
    \ within a formatting string.\n\n## 2.9. MULTI-LINE STRINGS\n\nIn Python, a string\
    \ is usually limited to a single line of text. For example, the following statement\
