    # Rescue boats


    An imminent hurricane threatens a coastal town.


    > If at most two people can fit in a rescue boat, and the maximum weight limit
    for a given boat is k, determine how many boats will be needed to save everyone.


    For example, given a population with weights [100, 200, 150, 80] and a boat limit
    of 200, the smallest number of boats required will be three.


    This is a typical fun question that could be solved with pen and paper for a small
    population size, but anything meaningful lends itself well in a programming language
    like python.


    We want to look at all the combinations of two people from the sample set. If
    we can put the pairs (called tuples) into a list then we can determine all the
    tuples that satisfy the weight limit.


    Python has a module named itertools which *standardises a core set of fast, memory
    efficient tools* and in particular for this question, deals with things like combinations
    and permutations.


    We can also sort lists quickly. So in the example, the sorted list looks like
    this: [80, 100, 150, 200]. The nice thing about sorting the list before running
    the combinations is that the tuples are matched largest with smallest which just
    happens to be a feature that we desire (ie. matching two light people would be
    a waste of capacity, so we prefer to match heavy people with light ones).


    And we can keep whittling the pairs of people with a recursion until there are
    no pairs left. So the solution will look like this:


