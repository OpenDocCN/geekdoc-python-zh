  md: '# Conway Game of life


    The game of life is a zero player game, meaning that its evolution is determined
    by its initial state, requiring no further input.


    The user can set the initial state and thereafter the simulation continues indefinitely.


    The rules of the game are as follows:


    +   - Each of which is in one of two possible states, **live** or **dead** (**on**
    or **off** or **1** or **0**).

    - Every cell interacts with its eight neighbours


    ![](img/4e4fc350228cd1c84055205e597f4fc0_252_0.png)


    At each step in time, the following is calculated for the next iteration.


    +   1. Any live cell with *fewer than two live neighbours* dies, as if by underpopulation.

    2. Any live cell with *two or three live neighbours* lives on to the next generation.

    3. Any live cell with *more than three live neighbours* dies, as if by overpopulation.

    4. Any dead cell with *exactly three live neighbours* becomes a live cell, as
    if by reproduction.


    So the evolution of a cell is contingent on the neighbouring cells in all cases.


    We can set up these rules in python and create an animation in matplotlib:


    ```

    import numpy as np

    import matplotlib.pyplot as plt

    import matplotlib.animation as animation


    # globals

    OFF, ON = 0, 1

    vals = [ON, OFF]

    ```'
  merge: -1
