  mdcn: "因此，我们可以将图像视为一系列方格。\n\n我们可以不断放大这些方格，直到达到像素本身的分辨率。假设我们想绘制数字“3”，它看起来会像这样：\n\n\
    所有黑色方格的值为0，所有白色方格的值为1。图像本身是8x8个方格（或像素）的宽度和高度。因此总共有64个像素。\n\n屏幕尺寸通常以（宽度 x 高度）表示，其中每个参数代表每个维度的像素数量。典型的屏幕尺寸有：\n\
    \n- VGA：640 x 480\n- HD：1280 x 720\n- 4k：3840 x 2160\n\n因此，高清显示屏在水平方向有1280个像素，在垂直方向有720个像素。所以这个显示屏共有921,600个像素。由于人眼无法分辨VGA图像中近百万个点中的每一个点，因此这对于显示高度详细的图像来说已经足够清晰了。\n\
    \n上面的图像是二值图像。它只能包含黑色方格或白色方格，没有其他颜色。\n\n- 0 = 黑色\n- 1 = 白色\n\n但我们可以通过允许不同的数字来创建灰度图像，从而改进这一点，以替代基本的黑白图像。\n\
    \n不同的灰度阴影使图像更加清晰。灰度级别以2的幂次递增（因为它们是二进制的），目前能提供良好图像质量的级别数是2^8，即256个级别。\n\n彩色图像的构成方式与灰度图像完全相同，唯一的区别是有3个尺度：**红色**\
    \ + **绿色** + **蓝色**。它们的总和构成了我们看到的图像。我们称之为RGB。\n\n因此，一张彩色高清图像现在是1280 x 730 x 3（每种颜色一个像素）。这921,600个像素中的每一个都由3种颜色的总和组成，每种颜色有256个强度级别。\n\
    \n## 读取图像和视频\n\n既然我们对图像的构成有了基本的理解，我们就可以开始更深入地了解这个过程。\n\nPython的优点之一是它提供的易用性。导入图像使用opencv-python模块，这是一个像pandas和numpy模块一样的第三方模块，可以通过包管理器快速安装（pip\
    \ install opencv-python）。\n\n使用这个模块可以轻松读取图像：\n\n```python\nimport cv2\n\nimg =\
    \ cv2.imread('assets/apple_colour.png')\ncv2.imshow('Output', img)\ncv2.waitKey(0)\n\
    ```\n\n整个图像被读入内存，然后显示在屏幕上。\n\n我们可以这样检查图像的内容：\n\n```python\nprint(img)\nprint('columns:',\
    \ len(img))\nprint('rows:', len(img[0]))\nprint('colours:', len(img[0][0]))\n\
    ```\n\n我们看到：\n\n```\n[[ 64 104 129]\n [ 64 104 129]\n [ 64 104 129]\n ...\n [\
    \ 88  73  70]\n [ 88  73  70]\n [ 88  73  70]]\n ...\n ...\n [194 194 178]\n [193\
    \ 193 175]\n [192 192 174]]]\n\ncolumns: 1204\nrows: 1164\ncolours: 3\n```\n\n\
    这是一个列表的列表（一个数组），每个子列表包含RGB值。因此，我们的示例图像（彩色苹果）包含一个由1204个元素（高度）x 1164个元素（宽度）x 3个元素（红色、绿色和蓝色值）组成的列表。因此，描述这张图像需要超过400万个值。虽然我们在书中无法欣赏到图像的精彩，但在高清屏幕上放大的图像非常壮观。\n\
    \n重要的是，我们现在只需几行代码就获得了数据，这很有价值。\n\n从图像快速过渡，我们可以通过创建视频捕获对象来捕获视频，如下所示：\n\n```python\n\
    import cv2\n\ncap = cv2.VideoCapture('assets/sample_video.mkv')\n\nwhile True:\n\
    \    done, img = cap.read()\n    if done == False:\n        break\n    cv2.imshow('Video',\
    \ img)\n    if cv2.waitKey(1) & 0xFF == ord('q'):\n        break\n```\n\n我们首先注意到的是，视频是由一系列图像组成的。cap.read()函数返回一个元组，第一个值表示图像是否成功读取，第二个值是图像文件本身。我们之前见过列表解包（在数据科学章节中），现在这是一个方便的功能。\n\
    \n复杂的waitkey(1)行本质上是在等待按下退出键或字母“q”，可以替换为：\n\n```python\nkey = cv2.waitKey(1)\n\
    if key == 27 or key == 113:\n    break\n```\n\n我们喜欢保持简单。\n\n因此，我们能够读取并显示图像文件，然后我们能够读取并显示视频文件，视频文件是一系列图像。我们的最后一个技术是从设备网络摄像头捕获视频。因此，这是**实时**视频，而不是预先存储的视频。\n\
    \n从网络摄像头读取数据与视频完全相同，除了1行代码变为3行：\n\n```python\ncap = cv2.VideoCapture(0)\ncap.set(3,640)\
    \ # 宽度\ncap.set(4,480) # 高度\n```\n\nVideoCapture()函数将零读取为设备的*默认网络摄像头*。两个set()函数是我们想要返回的图像尺寸（宽度和高度）。\n\
    \n## 基本功能\n\n在上一节中，我们能够：\n\n- 读取图像文件并显示图片。\n- 读取视频文件并显示视频。\n- 读取设备摄像头并显示视频。\n\n\
    Python中的cv2模块提供了许多开箱即用的图像处理功能。我们将首先尝试理解它们，然后实现几个。\n\n图像处理的一般规则是将一个扫描方格在图像上移动。通过这个，我们可以做很多功能，比如模糊和边缘增强、锐化等等。我们甚至可以做颜色过滤等等。\n\
    \n如果我们想模糊或平滑图像，我们可以取方格中所有像素的平均值，并将平均值分配给中心像素。\n\n在上面的例子中，扫描方格中所有9个像素的平均值是6（四舍五入到最接近的整数）。我们将这个值分配给中心像素，所以它的值从2变为6。当我们通过嵌套for循环或列表推导在i和j方向上移动这个方格时，会为图像中的所有像素生成平均值。我们已经平滑了图像。在这个过程中有几件事需要注意。\n\
    \n- 扫描方格的大小（平滑和处理时间）。\n- 边缘处的平均值（信息损失）。\n- 不同类型的平均值（不同的效果和复杂性）。\n\n同样，通过比较列表中相邻的像素列，可以进行边缘增强。\n\
    \n应用范围广泛，从时尚、媒体和娱乐到军事和工业设备。\n\n## 模糊图像：\n\n模糊图像的过程实际上是取目标像素周围数组中像素的平均值。cv2模块提供高斯模糊，这与简单的平均类型过程不同。\n\
    \n以下是代码：\n\n```python\nimport cv2\nimg = cv2.imread('assets/apple_colour.png')\n\
    img_gray = cv2.cvtColor(img, cv2.COLOR_BGR2GRAY)\nimg_blur = cv2.GaussianBlur(img_gray,\
    \ (49,49), 0)\n\ncv2.imshow('Gray image', img_gray)\ncv2.imshow('Blur image',\
    \ img_blur)\n\ncv2.waitKey(0)\n```\n\n结果如下：\n\n| 普通图像 | 模糊图像 |\n|---|---|\n| |\
    \ |\n\n在代码中，我们做了两个处理：\n\n1. 将图像转换为灰色（我们本可以保留颜色）。\n2. 模糊了图像。\n\n一个有趣的旁注是，opencv模块将颜色称为BGR（蓝色、绿色、红色），而不是众所周知的RGB惯例。这是opencv房间里的大象，其核心模块是在早期创建的，BGR惯例一直沿用至今，所以我们必须习惯这一点。\n\
    \n## 边缘检测器：\n\n对于边缘检测，我们只需要两行额外的代码：\n\n```python\nimg_edge = cv2.Canny(img_gray,150,200)\n\
    cv2.imshow('Edge image', img_edge)\n```\n\n如果我们想进一步增强边缘，我们可以膨胀图像。使用这段额外的代码：\n\n\
    ```python\nimport numpy as np\nkernel = np.ones((5,5), np.uint8)\nimg_dilation\
    \ = cv2.dilate(img_edge, kernel, iterations=2)\ncv2.imshow('dilated image', img_dilation)\n\
    ```\n\n| 边缘检测 | 边缘增强 |\n| --- | --- |"
