  md: 'We can convert a tuple to a list using the list function, and the tuple function
    performs the reverse conversion. The following interactive sequence demonstrates
    the use of the conversion functions:


    ```

    >>> tpl = 1, 2, 3, 4, 5, 6, 7, 8

    >>> tpl

    (1, 2, 3, 4, 5, 6, 7, 8)

    >>> list(tpl)

