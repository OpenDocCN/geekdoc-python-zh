    \ sequences of data. In this chapter we examine several other ways that Python\
    \ provides for storing aggregate data: tuples, dictionaries, and sets.\n\n# 11.1.\
    \ TUPLES\n\nTuples are similar to lists, except tuples are immutable. The next\
    \ code compares the usage of lists versus tuples.\n\n```\nmy_list = [1, 2, 3,\
    \ 4, 5, 6, 7]                # Make a list\nmy_tuple = (1, 2, 3, 4, 5, 6, 7) \
    \               # Make a tuple\nprint('The list:', my_list)                  \
    \    # Print the list\nprint('The tuple:', my_tuple)                    # Print\
