    # Selenium


    According to the official website “*selenium automates browsers. That’s it. What
    you do with that power is entirely up to you*”.


    The first thing that we want to try is the equivalent of hello world in the selenium
    module. So let’s try to open a web page:


    ```

    from selenium import webdriver

    from selenium.webdriver.chrome.service import Service

    from webdriver_manager.chrome import ChromeDriverManager

    import time


    service=Service(ChromeDriverManager().install())

    driver = webdriver.Chrome(service=service)


    url = "http://www.spacegoo.com/solar_system/"


    driver.get(url)

    time.sleep(30)

    ```


    The first thing to note is that the selenium package requires more imports than
    other packages that we have seen before.


    This is because the Selenium module needs to take into account all of the browsers
    that are available on the market (chrome, firefox, edge etc.) as well as all of
    the different versions that the browsers come in. So this in itself is a large
    task and hence a prime example of a use case for a module.


    In fact the hello world example required 3 imports:


    +   1. Selenium - the selenium module

    2. Service - selects the chrome browser

    3. ChromeDriverManager - gets latest version


    The first is the webdriver tool itself. The second and third imports steps select
    *which browser* to automate and a convenient tool for the *latest version* of
    the selected browser.


    Prior to the introduction of the manager tool (which was introduced in selenium
    version 4), the user was required to point to the driver file path on the pc and
    when an upgrade of the browser took place, the code needed to be'
