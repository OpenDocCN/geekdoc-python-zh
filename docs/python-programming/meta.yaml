- md: '## 2.5. CONTROL CODES WITHIN STRINGS


    Strings in Python can contain a wide range of characters, including letters (both
    uppercase and lowercase), digits, punctuation symbols (., ;, :, etc.), and other
    printable symbols (#, &, %, etc.). Besides these “normal” characters, strings
    can also embed special characters known as control codes. Control codes are used
    to control the rendering of text in the console window or a printer. The backslash
    symbol (\) signifies that the character following it is a control code, not a
    literal character. For example, the string ‘\n’ contains a single control code.
    In this case, the backslash is known as the escape symbol, and ‘n’ is escaped.
    The ‘\n’ control code represents the newline control code, which moves the text
    cursor down to the next line in the console window. Other control codes include
    ‘\t’ for tab, ‘\f’ for a form feed (or page eject) on a printer, ‘\b’ for backspace,
    and ‘\a’ for alert (or bell). Note that ‘\b’ and ‘\a’ might not produce the expected
    results in the interactive shell, but they work correctly in a command shell.
    In the code some strings containing these control codes are printed.


    When executed in a command shell:


    ```

    Hello, World!

    Welcome to Python programming.

    ```


    Additionally, embedding quotation marks within strings requires attention. A string
    starting with a single quotation mark must end with a single quote, and similarly,
    a string starting with a double quotation mark must end with a double quote. To
    include embedded quotes in a string, single-quote strings may have embedded double
    quotes, and double-quote strings may have embedded single quotes. When embedding
    a single quote mark within a single-quote string, it can be escaped using a backslash
    (\''). Similarly, a double quote mark can be protected in a double-quote string
    with a backslash ("). Next the code demonstrates the various ways to include quotation
    marks within string literals.


    Output:


