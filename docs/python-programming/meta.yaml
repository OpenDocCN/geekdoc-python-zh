    # 10.13. LIST COMPREHENSIONS


    List comprehensions are a concise way to create lists in Python. They allow you
    to generate a new list by applying an expression to each item in an iterable (such
    as a list, tuple, or range) and optionally filtering the items based on a condition.
    List comprehensions are often used when you want to perform a simple operation
    on each element of a sequence and create a new list based on the results. Here''s
    the basic syntax:


    ```

    new_list = [expression for item in iterable if condition]

    ```


    +   - **expression**: The operation you want to perform on each item in the iterable.

    - **item**: A variable that represents each item in the iterable.

    - **iterable**: The source of data (e.g., a list, tuple, or range) to iterate
    over.

    - **condition (optional)**: An optional filter that determines whether an item
    should be included in the new list.


