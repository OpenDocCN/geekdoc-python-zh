    library boasts an extensive collection of other functions that prove valuable
    for common programming tasks.


    Within the realm of mathematics, functions serve to compute an outcome based on
    an input value. For instance, consider the function definition f(x) = 2x + 3.
    Utilizing this definition, calculating f(5) yields 2 * 5 + 3 = 13, and f(0) results
    in 2 * 0 + 3 = 3. In the Python context, a function operates much like a mathematical
    function. To delve into this concept, let’s turn our attention to the standard
    Python function that handles mathematical square roots.


    In Python, a function is essentially a named segment of code designed to execute
    a specific task. Whenever an active program requires performing this task, it
    invokes the relevant function to carry out the operation. A prime example is the
    mathematical square root function. Python’s standard library provides a function
    named sqrt (as covered in Section 6.4). This square root function takes a numeric
    input, be it an integer or a floating-point value, and produces an output in floating-point
    form. As an illustration, when given 16.0, sqrt yields a response of 4.0, since
    16 = 4.0. The conceptual visualization of the sqrt function is depicted in the
