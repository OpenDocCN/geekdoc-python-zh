- img_proc: true
  md: "green and blue values). So describing this image was over 4 million values.\
    \ Whilst we don't get to appreciate the brilliance of the image in a book, the\
    \ blown up image on a HD screen is spectacular.\n\nImportantly, we now have the\
    \ data in just a few lines of code and this is valuable.\n\nSwiftly moving on\
    \ from images, we can capture a video (by creating a video capture object) like\
    \ this:\n\n```\nimport cv2\n\ncap = cv2.VideoCapture('assets/sample_video.mkv')\n\
    \nwhile True:\n    done, img = cap.read()\n    if done == False:\n        break\n\
    \    cv2.imshow('Video', img)\n    if cv2.waitKey(1) & 0xFF == ord('q'):\n   \
    \     break\n```\n\nThe first thing that we note is that a video is made up of\
    \ a series of images. The cap.read() function returns a tuple with the first value\
    \ being if the image was read successfully and the second value the image file\
    \ itself. We have seen list unpacking before (in the data science chapter) and\
    \ this is now a convenient feature.\n\nThe complicated waitkey(1) line is essentially\
    \ waiting for the escape key or the letter “q” to be pressed and could be replaced\
    \ by this:\n\n```\nkey = cv2.waitKey(1)\nif key == 27 or key == 113:\n    break\n\
    ```\n\nWe like to keep things simple.\n\nSo, we were able to read and display\
    \ an image file, then we were able to read and display a video file which was\
    \ a series of images. Our last technique is to capture a video from the device\
    \ webcam. So this is a **real-time** video as opposed to a pre-stored video.\n\
    \nReading data from the webcam exactly the same as the video with the exception\
    \ of 1 line of code changing into 3 lines:\n\n```\ncap = cv2.VideoCapture(0)\n\
    ```"
