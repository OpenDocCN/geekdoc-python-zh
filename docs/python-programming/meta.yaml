    \ The if/else statement is an essential construct in Python programming and helps\
    \ in creating more complex decision-making structures within your code.\n\n![img/1dbe1e06b9d31a6f7ada030324ed273a_86_0.png](img/1dbe1e06b9d31a6f7ada030324ed273a_86_0.png)\n\
    \nFigure 4.2. If/else flowchart.\n\n## 4.4. COMPOUND BOOLEAN EXPRESSIONS\n\nIn\
    \ Python programming, compound Boolean expressions allow you to combine multiple\
