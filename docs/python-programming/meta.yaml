    printable symbols (#, &, %, etc.). Besides these “normal” characters, strings
    can also embed special characters known as control codes. Control codes are used
    to control the rendering of text in the console window or a printer. The backslash
    symbol (\) signifies that the character following it is a control code, not a
    literal character. For example, the string ‘\n’ contains a single control code.
