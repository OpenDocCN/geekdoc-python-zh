    \ 6, 7, 8\n>>> a\n(1, 2, 3, 4, 5, 6, 7, 8)\n>>> *start, x, y = a\n>>> start\n\
    [1, 2, 3, 4, 5, 6]\n>>> x\n7\n>>> y\n8\n```\n\nThe next sequence unpacks a prefix\
