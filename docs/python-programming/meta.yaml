    \ the loop until ‘N’ or ‘n’ is entered.\n\n# 5.2. DEFINITE LOOPS VS. INDEFINITE\
    \ LOOPS\n\nDefinite Loops and Indefinite Loops are two types of loop structures\
    \ used in programming to repeat a certain block of code based on specific conditions.\
    \ They are fundamental concepts in programming and are found in most programming\
    \ languages, including Python.\n\n# 5.2.1. Definite Loops\n\nA definite loop,\
    \ also known as a “count-controlled loop” or a “fixed loop,” repeats a specific\
    \ number of times. In other words, the number of iterations is known before the\
    \ loop starts executing. Typically, definite loops are used when you know in advance\
    \ how many times you want to repeat a certain operation.\n\nIn Python, the for\
    \ loop is the primary construct for implementing definite loops. You specify a\
    \ range or a sequence, and the loop iterates over each element in the range or\
    \ sequence until it reaches the end.\n\nExample of a Definite Loop (using for\
    \ loop in Python):\n\n```\nfor i in range(1, 6): # This loop will run 5 times\
    \ (1, 2, 3, 4, 5)\n    print(i)\n```\n\n# 5.2.2. Indefinite Loops\n\nAn indefinite\
    \ loop, also known as a “condition-controlled loop” or a “while loop,” continues\
    \ to repeat as long as a specified condition remains true. The number of iterations\
    \ is not known in advance, and the loop will keep running until the condition\
    \ becomes false. Indefinite loops are used when you want to repeat an operation\
    \ until a particular condition is met.\n\nIn Python, the while loop is used to\
    \ create indefinite loops. The loop will keep executing as long as the specified\
    \ condition is evaluated as true."
