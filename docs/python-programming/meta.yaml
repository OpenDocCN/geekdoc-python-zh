    Similar to mathematical functions that produce outcomes, a Python function inherently
    generates a value to return to the caller. Yet, some functions aren’t crafted
    to yield meaningful results.


    Clients invoke these functions for the actions executed by the code within them,
    not for the values they compute. The print function stands as a prime example
    of this. The print function serves to display text in the console window; it doesn’t
    calculate and convey a value back to the caller. Despite Python’s requirement
    that all functions return a value, print falls into a different category. Functions
    designed not to return any specific value yield the special object None. This
    concept is readily demonstrated within the Python shell:


    ```

    >>> print(print(4)) # Output: 4

    None

    ```


    In this sequence of commands:


    1. Invoking print(4) outputs the value 4 to the console.

    2. The outermost print function does indeed return something – in this case, the
    None object – but since print doesn’t generate a meaningful result like a number
    or string, you see the result followed by None in the output.


    ## 6.2. FUNCTIONS AND MODULES


    Python modules are indeed files containing Python code that can be imported and
    used in other programs. The name of the module is determined by the filename.
    The Python standard library is a collection of modules that provide a wide range
    of functionalities and tools for various tasks.


    The “builtins” module you mentioned is a special module that contains essential
    functions and objects that are available by default in every Python program without
    the need for explicit imports. Functions like print(), input(), and data types
    like int, str, and list are part of the built-in functions and types provided
    by the “builtins” module.


    To access functions and classes from other standard library modules, you need
    to use the import statement. For example:


    ```

    import math

    # Now you can use functions from the math module

    print(math.sqrt(25))

    ```


    This code imports the “math” module and allows you to use functions like sqrt()
    from that module.


    Python’s standard library is extensive and covers a wide range of areas including
    file handling, networking, web services, data manipulation, regular expressions,
    and much more. By importing the appropriate modules, you can harness the power
    of these pre-built functionalities in your programs, saving you time and effort
    in coding from scratch.


    The standard modules of Python for a specific platform are stored within the computer’s
    storage. When a program is executed and requires these standard modules, the interpreter
    is aware of their location. In more intricate programs, it’s not unusual to import
    multiple modules, sometimes even a dozen, to access all the necessary functions
    required for the program’s operation.


    Python offers several methods to import functions from modules. In this discussion,
    we will focus on the two most frequently utilized techniques. Additionally, Section
    6.10 provides a concise exploration of alternative import statements that are
    more specialized in nature.


    A program that needs to compute square roots, common logarithms, and the trigonometric
    cosine function could use the following import statement:


    ```

    from math import sqrt, log10, cos

    ```


    The line of code you provided imports the sqrt, log10, and cos functions from
    the math module. This means you can use these functions directly in your code
    without needing to reference the module name.


    Here’s the code you provided, along with a brief explanation:


    ```

    from math import sqrt, log10, cos

    # Now you can directly use the imported functions

    result1 = sqrt(25)

    result2 = log10(100)

    result3 = cos(0.5)

    print(result1, result2, result3)

    ```


    In this example, the sqrt function is used to calculate the square root of 25,
    the log10 function calculates the base-10 logarithm of 100, and the cos function
    calculates the cosine of 0.5 radians. By importing these functions directly, you
    avoid the need to prefix them with the module name (math in this case) every time
    you use them. This can make your code more concise and readable. Figure 6.3 shows
    the general form of this kind of import statement. This import statement makes
    all of the functions of the module available to the program, but in order to use
    a function the caller must attach the module’s name during the call. The following
    code demonstrates the call notation:


    ```

    y = math.sqrt(x)

    print(math.log10(100))

    ```


    Note the math. prefix attached to the calls of the sqrt and log10 functions. We
    call a composite name (module-name.function-name) like this a qualified name.
    The qualified name includes the module name and function name.


    ![Figure 6.1. General form of a statement that imports an entire module. The module
    list is a comma-separated list of module names to import.](img/1dbe1e06b9d31a6f7ada030324ed273a_155_0.png)


    **Figure 6.1.** General form of a statement that imports an entire module. The
    module list is a comma-separated list of module names to import.


    Many programmers prefer this approach because the complete name unambiguously
    identifies the function with its module. A large, complex program could import
    the math module and a different, third-party module called extramath.


    Suppose the extramath module provided its own sqrt function. There can be no mistaking
    the fact that the sqrt being called in the expression math.sqrt(16) is the one
    provided by the math module. It is impossible for a program to import the sqrt
    functions separately from both modules and use their simple names simultaneously
    within a program. Does


    ```

    y = sqrt(x)

    ```


    intend to use math’s sqrt or extramath’s sqrt?

    Note that a statement such as


    ```

    from math import sqrt

    ```


    does not import the entire module; specifically, code under this import statement
    may use only the simple name, sqrt, and cannot use the qualified name, math.sqrt.


    As programs become larger and more complex, the import entire module approach
    becomes more compelling. The qualified function names improve the code’s readability
    and avoids name clashes between modules that provide functions with identical
    names. Soon we will be writing our own, custom functions. Qualified names ensure
    that names we create ourselves will not clash with any names that modules may
    provide.


    ## 6.3. THE BUILT-IN FUNCTIONS


    In Section 6.1, we noted our continuous utilization of functions in Python from
    the initial chapter. These encompass functions like print, input, int, float,
    str, and type, among others. These functions, along with various others, are contained
    within a distinct module termed builtins. What sets the builtins module apart
    is its innate accessibility to all Python programs, necessitating no explicit
    import statement. While the complete name of the print function is builtins.print,
    it’s rare to encounter its comprehensive nomenclature within a Python script.
    We can ascertain its comprehensive qualified name within the interpreter.


    ```

    >>> print(''Hi'')

    Hi

    >>> builtins.print(''Hi'')

    Hi

    >>> print

    <built-in function print>

    >>> builtins.print

    <built-in function print>

    >>> id(print)

    ```


    Explanation:


    1. The first line print(''Hi'') demonstrates the use of the print function to
    display the string ''Hi'' in the output.

    2. The second line builtins.print(''Hi'') also achieves the same result by explicitly
    referencing the print function from the builtins module.

    3. The third line print on its own displays information about the built-in print
    function.

    4. The fourth line builtins.print similarly displays information about the built-in
    print function, showing that it’s a function from the builtins module.

    5. The fifth line id(print) retrieves the unique identifier (memory address) of
    the print function, but you haven’t completed the line, so there’s no output shown.
    To see the output, you would need to complete the line with a print statement,
    like print(id(print)).


    Please note that the builtins module is implicitly available in Python, and you
    don’t need to reference it explicitly in most cases. The examples above are used
    to demonstrate the behavior and attributes of the print function within the context
    of the builtins module.'
