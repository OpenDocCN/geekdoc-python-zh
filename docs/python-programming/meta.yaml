  md: '# A brief introduction to python


    Python is a programming language that lets you work quickly and integrate systems
    more effectively.


    Python is open source and free to use for anybody that has a computer and wants
    to learn.


    A formal description from Wikipedia reads like this:


    > “Python is a high-level, interpreted, general-purpose programming language.
    Its design philosophy emphasises code readability with the use of significant
    indentation”.


    So let’s break this down:


    | Term | What it means |

    | :--- | :--- |

    | High-level | A bit easier for humans to read |

    | Interpreted | Runs as it is written |

    | General-purpose | A variety of use cases |

    | Indentation | Uses indents instead of {} |'
