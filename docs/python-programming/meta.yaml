    We have two side by side indices both on the same length and in the same order.
    Any items that don’t contain values are given the value zero so there are no empty
    spaces. The task for computing a similarity has become immensely clearer.


    However the data came in, be that via a csv file or a json or via list construction
    it is always desirable to reshape the lists to look like the above.


    We now consider the mathematics of the Cosine similarity by thinking about the
    geometry of vectors.


    ![](img/4e4fc350228cd1c84055205e597f4fc0_121_0.png)


    In particular, two vectors are identical where the cosine of the angle between
    them is zero and also the magnitude of the vector (referred to as the vector Norm
    or its length) are the same.


    The general formula for cosine similarity is this:'
