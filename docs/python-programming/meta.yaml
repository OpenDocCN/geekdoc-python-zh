    # Maxima, minima & points of inflexion


    In standard calculus we have definitions of maximums, minimums and inflexion points.
    For example, if we let f be a function defined on an interval [a,b] or (a,b),
    and let p be a point in (a,b), i.e., not an endpoint, if the interval is closed.


    +   - f has a local minimum at p if f(p) ≤ f(x) for all x in a small interval
    around p.

    - f has a local maximum at p if f(p) ≥ f(x) for all x in a small interval around
    p.

    - f has an inflection point at p if the concavity of f changes at p, i.e. if'
