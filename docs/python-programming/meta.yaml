    From the above we can work out the potential energy and kinetic energy of both
    pendulum bobs knowing that:


    $$ke = \frac{1}{2}mv^2$$ and $$pe = mgh$$


    And we know that energy is conserved, such that:


    $$ke + pe = Constant$$, which is the total energy in the system known by Hamiltonian
    mechanics


    However, for the purpose of the double pendulum, one uses Lagrangian mechanics
    which is ke - pe and represents the difference in the energies. So we say that:


    L = ke - pe


    And this fits into the euler-lagrange equation:


    $$\frac{d}{dt}\left(\frac{dL}{dq}\right) = \frac{dL}{dq}$$


    Which yields the equation of motion of the system without needing to consider
    the individual forces in the system.


    After some calculus and algebra we are left with two lengthy equations that involve
    second derivatives. But since we know that the second derivative is a derivative
    on the first derivative, we can put this into the code.


    We start with imports that we intend to use:


    ```

    from numpy import sin, cos

    import numpy as np

    import matplotlib.pyplot as plt

    import scipy.integrate as integrate

    import matplotlib.animation as animation

    ```


