  md: '# Background


    The language itself was released in the early 90’s. Then around ten years later
    a new version which introduced new features came out (version 2.0) and finally
    about 8 years after this a newer version came out (version 3.0).


    Version 3.0 is not completely backward compatible with version 2.0 which means
    that some of the 2.0 code will not work with the 3.0 version. Most notably, the
    print statement which gained a set of brackets in the newer version.


    Version 2.0: print “hello world”

    Version 3.0: print (“hello world”)


    The backward incompatibility can sometimes be annoying and was considered to be
    a blunder by some whereas others consider it necessary. In particular, version
    2.0 was sunset, which means it is *no longer supported*, as of Jan 2020.


    So as time progresses the 3.0 code becomes the **main accepted version** and this
    is what this book focuses on.


    When we talk about Python we talk about Python 3.0 .


    Over this time, Python has consistently ranked as one of the top (most popular)
    programming languages and in recent years has made a resurgence due to use cases
    in the data science field primarily due to an abundance of modules written by
    a very competent community of users.


    # Nomenclature


    It is invariably necessary to go through some of the terms and phrases that are
    commonly talked about.


    **Pythonic:**


    Code that is written in python looks both different and similar to other code.
    There are also new features (such as list comprehension in place of for loops)
    that other languages do not have and using those is considered to be Pythonic.'
