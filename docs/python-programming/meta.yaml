    \ the above example, after iterating till num=7, the value of num will be 8 and\
    \ the break is encountered so the flow of the execution is brought out of the\
    \ loop.\n\n# 5.6. WHILE/ELSE AND FOR/ELSE\n\nPython loops offer the flexibility\
    \ of including an optional else block. When a loop completes all its iterations\
    \ without encountering a break statement, the code within the loop’s else block\
    \ executes. However, if the loop is terminated prematurely due to a break statement,\
    \ the code within the else block will be skipped.\n\nFor instance, in the case\
    \ of a while loop, if its condition becomes false during its regular check, the\
    \ associated else block will still be executed, even if the loop’s body has not\
    \ had a chance to execute yet. This behavior can be observed in Listing 5.28 (whileelse.py),\
    \ which demonstrates the functionality of the while/else statement."
