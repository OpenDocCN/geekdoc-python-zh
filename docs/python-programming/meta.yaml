    \ 243\n\nThis chapter covers some additional aspects of functions in Python. It\
    \ introduces recursion, a key concept in computer science.\n\n## 8.1. GLOBAL VARIABLES\n\
    \nVariables defined within functions are referred to as local variables. Local\
    \ variables exhibit several advantageous characteristics: Memory allocation for\
    \ a local variable occurs only when the variable is within its scope, which means\
    \ the variable is only present during the execution of the specific function.\
    \ Once the program’s execution exits the scope of a local variable, the memory\
    \ allocated for that variable is released. This freed memory can then be utilized\
    \ for other functions’ local variables as required. The same variable name can\
    \ be employed in distinct functions without generating conflicts. The interpreter\
    \ derives its understanding of a local variable solely from its definition within\
    \ the function. If the interpreter encounters an attempt to execute a statement\
    \ involving an undefined variable, it issues a runtime error. When executing code\
    \ within one function, the interpreter does not seek a variable’s definition in\
    \ another function. Consequently, a local variable in one function cannot interfere\
    \ with a local variable defined in a different function. A local variable is temporary\
    \ and ceases to exist between function invocations. On occasion, a requirement\
    \ arises for a variable that persists independently of any function executions.\
    \ In contrast to a local variable, a global variable exists outside of all functions\
    \ and is not confined to a specific function. As a result, any function is capable\
    \ of accessing and/or modifying a global variable.\n\n```python\ndef help_screen():\n\
