  md: 'KNN is a very interesting technique. K is the number of nearest neighbours
    and this is the core deciding factor. With a simple counting algo, it helps if
    k is an odd number given that we do not want a split decision.


    There are different and interesting measures for finding the distances such as:


    +   - Euclidean distance

    - Hamming distance

    - Manhattan distance

    - Minkowski distance


    But essentially each one attempts to achieve the same outcome.


    Techniques like KNN perform better with a lower number of features. When the number
    of features increases, the amount of data required also increases. This is known
    as the curse of dimensionality.


    And finally, how do we even decide on the number of nearest neighbours? These
    are all considerations and therefore input arguments into the models that we see.


    All of the above shows the complexity that goes into the algo’s, but we are here
    for the python implementation and some use cases and examples.


    ```

    X = [[0], [1], [2], [3]]

    y = [0, 0, 1, 1]


    from sklearn.neighbors import KNeighborsClassifier

    neigh = KNeighborsClassifier(n_neighbors=3)

    neigh.fit(X, y)


    print(neigh.predict([[1.1]]))


    print(neigh.predict_proba([[1.1]]))

    ```


