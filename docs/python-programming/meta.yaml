    # 11.4. USING DICTIONARIES


    You should use a dictionary when you need fast and convenient access to an element
    of a collection based on a search key rather than an index. Consider the problem
    of implementing a simple telephone contact list.


    Most people are very familiar with the names of their friends, family, and business
    contacts but can remember only a handful of telephone numbers. A contact list
    associates a name with a telephone number.


    It would be inappropriate to place the names in a list and locate a name using
    the associated phone number as an index into the list.


    This look-up method is backwards—we do not want to find a name given a phone number;
    we want to look up a number based on a name.


    Besides, each phone number contains many digits, and we would not need or want
    to have a list with indices with values that large—most of the space in the list
    would be unused.'
