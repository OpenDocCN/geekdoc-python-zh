    # 10.1. USING LISTS


    A list is an object that holds a collection of objects; it represents a sequence
    of data. In that sense, a list is similar to a string, except a string can hold
    only characters. A list can hold any Python object. A list need not be homogeneous;
    that is, the elements of a list do not all have to be of the same type.


    Like any other variable, a list variable can be local or global, and it must be
    defined (assigned) before its use. The following code fragment defines a list
    named lst that holds the integer values 2, -3, 0, 4, -1:


    ```

    lst = [2, -3, 0, 4, -1]

    ```


    The right-hand side of the assignment statement is a literal list. The elements
    of the list appear within square brackets ([ ]), and commas separate the elements.
    The following statement assigns the empty list to a variable named a:


    ```

    a = []

    ```


    We can print list literals and lists referenced through variables:


    ```

    lst = [2, -3, 0, 4, -1]       # Assign the list

    print([2, -3, 0, 4, -1])      # Print a literal list

    print(lst)                     # Print a list via a variable

    ```


    The above code prints:


    ```

    [2, -3, 0, 4, -1]

    [2, -3, 0, 4, -1]

    ```


    We may access the elements contained in a list via their position within the list.
    We access individual elements of a list using square brackets:


    ```

    lst = [2, -3, 0, 4, -1]       # Assign the list

    lst[0] = 5                    # Make the first element 5

    print(lst[1])                 # Print the second element

    lst[4] = 12                   # Make the last element 12

    print(lst)                    # Print a list variable

    print([10, 20, 30][1])        # Print second element of literal list

    ```'
