    # Basic functions


    In the above section, we were able to:


    +   - Read an image file and display the picture.

    - Read a video file and display the video.

    - Read the device camera and display the video.


    The cv2 module in python offers a lot of image processing functions out of the
    box. We will try to understand them first and then implement a few.


    The general rule for image processing is to send a scanning square across the
    image. With this we can do a lot of features such as blurring and edge enhancements,
    sharpening etc. we could even do colour filters and so forth.


