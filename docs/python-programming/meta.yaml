    We can now begin to do statistical analysis. Imagine that we have x and y points
    and we want to find a simple relationship and draw a best fit line. Combining
    numpy with matplotlib this can easily be achieved.


    ```

    python

    import matplotlib.pyplot as plt

    import numpy as np


    # create x and y points

    x = np.linspace(0, 10, 50)

    y = np.random.random(50) * np.linspace(0,10,50)


    # fit a linear curve an estimate its y-values and their error.

    a, b = np.polyfit(x, y, deg=1)

    y_est = a * x + b


    fig, ax = plt.subplots()

    ax.plot(x, y, ''.'', color=''green'')

    ax.plot(x, y_est, ''--'', color=''red'')


    plt.show()

