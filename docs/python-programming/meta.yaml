    We refer to a function as f(x) and the derivative of the same function as f''(x).
    We do this because the notation is cleaner (but still means the same thing f''(x)
    = df/dx).


    We say: $f''(x) = \frac{d}{dx}f(x) = \frac{df}{dx}$


    And: $f''(x_n) = \left[\frac{df}{dx}\right]_{x=n}$


