- img_proc: true
  md: '# Digital Image Processing


    A huge amount of work has been done over the past 25 year with respect to image
    processing and the growth of the subject and technologies arising from such have
    been tremendous.


    Image processing can often be processor intensive and as such has greatly benefitted
    from the increase in processing power over the same period.


    Python has proved to be a popular language for image processing and comes with
    a number of libraries that intrinsically contain the techniques that this section
    will be looking at. In particular, it is Python''s ability to harness and leverage
    the much faster C++ algo''s that has provided this popularity.


    One of the more popular modules that Python, called opencv , was originally written
    in C++. Whilst there are a number of other modules, we will focus on this one.


    In this chapter we will attempt to understand a number of the processes leading
    up to and finally including face detection or other interesting digital equivalents.
    We will start at the beginning here:


    +   - Read images, videos, webcams

    - Basic functions

    - Resizing and cropping


    # Introduction to images


    Even though we might not be able to see this with the naked eye, computer images
    that we see on our screens, monitors or other devices are made up from many small
    points called pixels. When we zoom into the images this becomes noticeable as
    the image becomes more and more pixelated.'
  merge: -1
  pgno: 258
- img_proc: true
  md: '![](img/4e4fc350228cd1c84055205e597f4fc0_259_0.png)


    ![](img/4e4fc350228cd1c84055205e597f4fc0_259_1.png)


    So we can consider an image as a series of squares.


    ![](img/4e4fc350228cd1c84055205e597f4fc0_259_2.png)


    And we can keep on zooming in to those squares until we reach the resolution of
    the pixels themselves. So imagine that we wanted to draw the number “3”, it would
    look something like this:'
  merge: -1
  pgno: 259
- img_proc: true
  md: '![](img/4e4fc350228cd1c84055205e597f4fc0_260_0.png)


    All the black boxes are given the value 0 and all of the white boxes are given
    the value 1. The image itself is 8x8 squares (or pixels) width and height. So
    64 pixels in total.


    Screen sizes are understood to be in terms of ( width x height ) where each parameter
    represents the number of pixels in each dimension. Typical screen sizes are:


    +   - VGA: 640 x 480

    - HD: 1280 x 720

    - 4k: 3840 x 2160


    So an HD display has 1280 pixels going across and 720 pixels in the vertical direction.
    So there are 921,600 pixels in this display. Since the human eye cannot resolve
    each dot of the nearly 1 million dots in a VGA image, this is sufficiently sharp
    for highly detailed images to be displayed.


    The image above is a binary image. It can either contain a black square or a white
    square, but no other colour.


    +   - 0 = Black

    - 1 = white'
  merge: -1
  pgno: 260
- img_proc: true
  md: 'But we could improve this by allowing for different numbers to create a grayscale
    in place of the basic black and white images.


    ![](img/4e4fc350228cd1c84055205e597f4fc0_261_0.png)


    The different shades of grey make the image clearer. The scales go up in powers
    of 2 (because they are binary) and the current number of levels that gives a good
    image is 2^8 which is 256 levels.


    A colour image is made up in exactly the same way as grayscale images with the
    only difference being that there are 3 scales: **red** + **green** + **blue**.
    And the sum of these gives the image that we see. We know this as RGB.


    ![](img/4e4fc350228cd1c84055205e597f4fc0_261_1.png)'
