    \ usually isn't a problem, but if you run this code on another system, or in a\
    \ different virtual environment, it may use a different parser and behave differently.\n\
    \nTo get rid of this warning, pass the additional argument 'features=\"lxml\"\
    ' to the BeautifulSoup constructor.\n\nsoup = BeautifulSoup(\"<p>Some<b>bad<i>HTML\"\
