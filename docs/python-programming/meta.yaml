- md: "# PYTHON PROGRAMMING\n\n# Top Of The Stack\n\n```python\n# %% Hello World Program\n\
    \nprint('Hello World')\n```\n\nDARREN LEFCOE\n\n# Python Programming\n\nTop of\
    \ the stack\n\n# Introduction\n\nHow to improve your ranking, become a better\
    \ Python programmer and a lateral thinker.\n\nLearn core concepts and the new\
    \ practices of problem solving. Harness the immense community knowledge whilst\
    \ challenging the errors with expertise. We explore common questions and answers\
    \ that any coder will invariably encounter.\n\nWritten by scientists and programmers\
    \ who rank in the top 1% of contributors on the stackoverflow website and have\
    \ consistently maintained this position for a significant period of time. This\
    \ book demonstrates how you can achieve the same.\n\nSome of the contributions\
    \ are *work related* and others are simply *out of curiosity*.\n\n**Nevertheless,\
    \ these are the questions, answers and techniques that will take you to the top\
    \ of the stack.**\n\nThe community embraces you and will enjoy your feedback and\
    \ contributions.\n\n# About the author\n\nHe holds a Master’s degree in Physics\
    \ from Imperial College, London and has over a quarter of a century of experience\
    \ in the engineering and banking and finance industry, mostly as a quantitative\
    \ trader. He has worked in startup and mid sized companies and also multinational\
    \ organisations.\n\nIn recent years, his focus has been on Mathematics and Python\
    \ programming which is a popular language for data science, machine learning and\
    \ artificial intelligence.\n\nHe has engaged with many of the top contributors\
    \ in the coding and science community and brings this wealth of knowledge to the\
    \ reader.\n\nAlways at the forefront of technology and a driver of change to improve.\
    \ He now shares some of the knowledge that he has acquired over this journey that\
    \ will help you in yours by accelerating your understanding and progress.\n\n\
    The baton passes from one hand to the next…\n\n# Acknowledgements\n\nFirstly,\
    \ with eternal gratitude to my mother who, whilst frail and small of frame, at\
    \ 80 years of age has proved to be a rock of the family. With a heart of gold\
    \ and a mentality of steel, this kind lady who was a refugee from the Middle East,\
    \ undertook the hardest life along with her now deceased but honourable and loving\
    \ husband to selflessly put three children through private school. They instilled\
    \ upon their children the gift of discipline, education and hard work and never\
    \ has this been so appreciated in the writing of such. It is not even possible,\
    \ even if one wanted, to express enough gratitude towards them.\n\nTo brother\
    \ and sister and their children. You have always been the one constant in the\
    \ life of the writer. Having shared the good times and the bad times with equal\
    \ pleasure and drive and long may this continue. It is your strength and happiness\
    \ that keeps those around you going and gives your sibling the passion for what\
    \ he does.\n\nAnd finally, to my three beautiful daughters. You are the stars\
    \ of my life and represent the future generation. May you continue your journey\
    \ for us all with strength, endeavour and happiness.\n\n# Table of contents\n\n\
    - [Introduction](Introduction)\n- [About the author](About the author)\n- [Acknowledgements](Acknowledgements)\n\
    - [Table of contents](Table of contents)\n- [A brief introduction to python](A\
    \ brief introduction to python)\n    - [Background](Background)\n    - [Nomenclature](Nomenclature)\n\
    \    - [Structure](Structure)\n- [What is the stack?](What is the stack?)\n  \
    \  - [Who uses the stack?](Who uses the stack?)\n    - [What is a stack overflow?](What\
    \ is a stack overflow?)\n- [Let’s get started](Let’s get started)\n    - [The\
    \ code](The code)\n    - [The editor](The editor)\n- [Python Basics](Python Basics)\n\
    \    - [Hello world](Hello world)\n- [What is available](What is available)\n\
    - [Comments](Comments)\n- [The data types](The data types)\n- [Variables](Variables)\n\
    - [Lists, Dictionaries and Tuples](Lists, Dictionaries and Tuples)\n- [How to\
    \ count](How to count)\n- [Mutable and immutable](Mutable and immutable)\n- [Basic\
    \ algebra](Basic algebra)\n- [For and while loops](For and while loops)\n- [If\
    \ else logic](If else logic)\n- [Functions](Functions)\n- [Classes](Classes)\n\
    - [Magic methods](Magic methods)\n- [Importing modules](Importing modules)\n-\
    \ [Logical order](Logical order)\n- [Making modules](Making modules)\n- [The main\
    \ module](The main module)\n\n# Coding Techniques\n\n- [What is a coding problem](What\
    \ is a coding problem)\n- [What is a coding technique](What is a coding technique)\n\
    - [Recursive functions](Recursive functions)\n- [Backtracking](Backtracking)\n\
    - [list comprehension](list comprehension)\n- [Binary Tree](Binary Tree)\n\n#\
    \ Fun problems\n\n- [Perfect numbers](Perfect numbers)\n- [Swap apples for ideas](Swap\
    \ apples for ideas)\n- [Rescue boats](Rescue boats)\n- [Bracket Matching](Bracket\
    \ Matching)\n- [Collatz Conjecture](Collatz Conjecture)\n\n# Data Science\n\n\
    - [Understanding Data](Understanding Data)\n- [Data exploration: beginner](Data\
    \ exploration: beginner)\n- [Data exploration: intermediate](Data exploration:\
    \ intermediate)\n- [Data visualisation](Data visualisation)\n- [Machine learning](Machine\
    \ learning)\n\n# Finance\n\n- [Time series](Time series)\n- [Cleaning data](Cleaning\
    \ data)\n- [Moving averages](Moving averages)\n- [Reading data](Reading data)\n\
    - [Cosine similarity](Cosine similarity)\n\n# The web\n\n- [HTTP request](HTTP\
    \ request)\n- [Websockets](Websockets)\n- [Asynchronous](Asynchronous)\n\n# Graphical\
    \ user interfaces\n\n- [Hello world GUI](Hello world GUI)\n- [Password entry](Password\
    \ entry)\n- [Animations](Animations)\n\n# Maths\n\n- [Fermat's last theorem](Fermat's\
    \ last theorem)\n- [Complex numbers](Complex numbers)\n- [Parametric equations](Parametric\
    \ equations)\n- [Derivatives](Derivatives)\n- [Maxima, minima & points of inflexion](Maxima,\
    \ minima & points of inflexion)\n- [Newton raphson](Newton raphson)\n- [Graph\
    \ a square](Graph a square)\n\n# Dynamic systems\n\n- [Infectious diseases](Infectious\
    \ diseases)\n- [Rumour dynamics](Rumour dynamics)\n- [Fractals](Fractals)\n- [Mandelbrot\
    \ set](Mandelbrot set)\n- [Double pendulum](Double pendulum)\n- [Three body problem](Three\
    \ body problem)\n- [Predator vs prey cycles](Predator vs prey cycles)\n- [Conway\
    \ Game of life](Conway Game of life)\n- [The Lorenz Attractor](The Lorenz Attractor)\n\
    \n# Digital Image Processing\n\n- [Introduction to images](Introduction to images)\n\
    - [Reading images and videos](Reading images and videos)\n- [Basic functions](Basic\
    \ functions)\n- [Resizing and cropping](Resizing and cropping)\n- [Shapes and\
    \ text](Shapes and text)\n- [Warp perspective](Warp perspective)\n- [Colour detection](Colour\
    \ detection)\n- [Shape detection](Shape detection)\n- [Facial recognition](Facial\
    \ recognition)\n- [Virtual painting](Virtual painting)\n\n# Web scraping\n\n-\
    \ [Selenium](Selenium)\n- [Beautiful soup](Beautiful soup)\n- [SQLite (Database)](SQLite\
    \ (Database))\n- [Automation processes](Automation processes)\n\n# Others\n\n\
    - [My first problem](My first problem)\n- [My first answer](My first answer)\n\
    - [100 prisoners](100 prisoners)\n- [Classes and mutability](Classes and mutability)\n\
    \n# A brief introduction to python\n\nPython is a programming language that lets\
    \ you work quickly and integrate systems more effectively.\n\nPython is open source\
    \ and free to use for anybody that has a computer and wants to learn.\n\nA formal\
    \ description from Wikipedia reads like this:\n\n> “Python is a high-level, interpreted,\
    \ general-purpose programming language. Its design philosophy emphasises code\
    \ readability with the use of significant indentation”.\n\nSo let’s break this\
    \ down:\n\n| Term | What it means |\n| :--- | :--- |\n| High-level | A bit easier\
    \ for humans to read |\n| Interpreted | Runs as it is written |\n| General-purpose\
    \ | A variety of use cases |\n| Indentation | Uses indents instead of {} |\n\n\
    # Background\n\nThe language itself was released in the early 90’s. Then around\
    \ ten years later a new version which introduced new features came out (version\
    \ 2.0) and finally about 8 years after this a newer version came out (version\
    \ 3.0).\n\nVersion 3.0 is not completely backward compatible with version 2.0\
    \ which means that some of the 2.0 code will not work with the 3.0 version. Most\
    \ notably, the print statement which gained a set of brackets in the newer version.\n\
    \nVersion 2.0: print “hello world”\nVersion 3.0: print (“hello world”)\n\nThe\
    \ backward incompatibility can sometimes be annoying and was considered to be\
    \ a blunder by some whereas others consider it necessary. In particular, version\
    \ 2.0 was sunset, which means it is *no longer supported*, as of Jan 2020.\n\n\
    So as time progresses the 3.0 code becomes the **main accepted version** and this\
    \ is what this book focuses on.\n\nWhen we talk about Python we talk about Python\
    \ 3.0 .\n\nOver this time, Python has consistently ranked as one of the top (most\
    \ popular) programming languages and in recent years has made a resurgence due\
    \ to use cases in the data science field primarily due to an abundance of modules\
    \ written by a very competent community of users.\n\n# Nomenclature\n\nIt is invariably\
    \ necessary to go through some of the terms and phrases that are commonly talked\
    \ about.\n\n**Pythonic:**\n\nCode that is written in python looks both different\
    \ and similar to other code. There are also new features (such as list comprehension\
    \ in place of for loops) that other languages do not have and using those is considered\
    \ to be Pythonic."
  mdcn: "# PYTHON 编程\n\n# 栈顶之位\n\n```python\n# %% Hello World Program\n\nprint('Hello\
    \ World')\n```\n\nDARREN LEFCOE\n\n# Python 编程\n\n栈顶之位\n\n# 引言\n\n如何提升你的排名，成为一名更优秀的\
    \ Python 程序员和横向思维者。\n\n学习核心概念和解决问题的新实践方法。利用庞大的社区知识，同时以专业知识挑战错误。我们探讨任何编码者都不可避免会遇到的常见问题和答案。\n\
    \n本书由在 stackoverflow 网站贡献者排名中位列前 1% 的科学家和程序员撰写，并且他们长期保持这一地位。本书将展示你如何也能达到同样的高度。\n\
    \n其中一些贡献是*与工作相关*的，另一些则纯粹是*出于好奇*。\n\n**然而，正是这些问题、答案和技巧，将助你登上栈顶之位。**\n\n社区欢迎你，并将乐于接受你的反馈和贡献。\n\
    \n# 关于作者\n\n他拥有伦敦帝国理工学院物理学硕士学位，在工程、银行和金融行业拥有超过四分之一世纪的经验，主要担任量化交易员。他曾就职于初创公司、中型企业以及跨国组织。\n\
    \n近年来，他的研究重点转向数学和 Python 编程，后者是数据科学、机器学习和人工智能领域的热门语言。\n\n他与编码和科学社区的许多顶尖贡献者有过交流，并将这些丰富的知识带给读者。\n\
    \n他始终站在技术前沿，是推动变革、追求进步的驱动者。现在，他分享了在这段旅程中获得的一些知识，这些知识将通过加速你的理解和进步，助你在自己的旅程中前行。\n\
    \n接力棒从一只手传递到下一只手……\n\n# 致谢\n\n首先，永远感谢我的母亲。她虽年届八旬，身形瘦小，却已成为家庭的磐石。这位心地善良、意志如钢的女士，曾是来自中东的难民，与现已离世但可敬可亲的丈夫一起，承担了最艰辛的生活，无私地将三个孩子送入私立学校。他们将纪律、教育和勤奋的礼物灌输给了孩子们，在撰写本书时，这份恩情显得尤为珍贵。即使想要，也无法充分表达对他们的感激之情。\n\
    \n感谢我的兄弟姐妹和他们的孩子。你们一直是作者生命中不变的存在。无论是顺境还是逆境，你们都以同样的喜悦和动力与我分享，愿这份情谊长存。正是你们的力量和幸福，激励着身边的人前行，也赋予了你们的兄弟从事这份工作的热情。\n\
    \n最后，献给我三个美丽的女儿。你们是我生命中的明星，代表着未来的一代。愿你们带着力量、努力和幸福，继续为我们所有人前行。\n\n# 目录\n\n- [引言](Introduction)\n\
    - [关于作者](About the author)\n- [致谢](Acknowledgements)\n- [目录](Table of contents)\n\
    - [Python 简介](A brief introduction to python)\n    - [背景](Background)\n    - [术语](Nomenclature)\n\
    \    - [结构](Structure)\n- [什么是栈？](What is the stack?)\n    - [谁在使用栈？](Who uses\
    \ the stack?)\n    - [什么是栈溢出？](What is a stack overflow?)\n- [让我们开始吧](Let’s get\
    \ started)\n    - [代码](The code)\n    - [编辑器](The editor)\n- [Python 基础](Python\
    \ Basics)\n    - [Hello world](Hello world)\n- [可用资源](What is available)\n- [注释](Comments)\n\
    - [数据类型](The data types)\n- [变量](Variables)\n- [列表、字典和元组](Lists, Dictionaries\
    \ and Tuples)\n- [如何计数](How to count)\n- [可变与不可变](Mutable and immutable)\n- [基础代数](Basic\
    \ algebra)\n- [For 和 while 循环](For and while loops)\n- [If else 逻辑](If else logic)\n\
    - [函数](Functions)\n- [类](Classes)\n- [魔法方法](Magic methods)\n- [导入模块](Importing\
    \ modules)\n- [逻辑顺序](Logical order)\n- [创建模块](Making modules)\n- [主模块](The main\
    \ module)\n\n# 编码技巧\n\n- [什么是编码问题](What is a coding problem)\n- [什么是编码技巧](What\
    \ is a coding technique)\n- [递归函数](Recursive functions)\n- [回溯](Backtracking)\n\
    - [列表推导式](list comprehension)\n- [二叉树](Binary Tree)\n\n# 趣味问题\n\n- [完美数](Perfect\
    \ numbers)\n- [用苹果换想法](Swap apples for ideas)\n- [救援船](Rescue boats)\n- [括号匹配](Bracket\
    \ Matching)\n- [考拉兹猜想](Collatz Conjecture)\n\n# 数据科学\n\n- [理解数据](Understanding\
    \ Data)\n- [数据探索：入门](Data exploration: beginner)\n- [数据探索：进阶](Data exploration:\
    \ intermediate)\n- [数据可视化](Data visualisation)\n- [机器学习](Machine learning)\n\n\
    # 金融\n\n- [时间序列](Time series)\n- [数据清洗](Cleaning data)\n- [移动平均线](Moving averages)\n\
    - [读取数据](Reading data)\n- [余弦相似度](Cosine similarity)\n\n# 网络\n\n- [HTTP 请求](HTTP\
    \ request)\n- [Websockets](Websockets)\n- [异步](Asynchronous)\n\n# 图形用户界面\n\n-\
    \ [Hello world GUI](Hello world GUI)\n- [密码输入](Password entry)\n- [动画](Animations)\n\
    \n# 数学\n\n- [费马大定理](Fermat's last theorem)\n- [复数](Complex numbers)\n- [参数方程](Parametric\
    \ equations)\n- [导数](Derivatives)\n- [极大值、极小值与拐点](Maxima, minima & points of inflexion)\n\
    - [牛顿-拉弗森法](Newton raphson)\n- [绘制正方形](Graph a square)\n\n# 动态系统\n\n- [传染病](Infectious\
    \ diseases)\n- [谣言动力学](Rumour dynamics)\n- [分形](Fractals)\n- [曼德博集合](Mandelbrot\
    \ set)\n- [双摆](Double pendulum)\n- [三体问题](Three body problem)\n- [捕食者与猎物周期](Predator\
    \ vs prey cycles)\n- [康威生命游戏](Conway Game of life)\n- [洛伦兹吸引子](The Lorenz Attractor)\n\
    \n# 数字图像处理\n\n- [图像简介](Introduction to images)\n- [读取图像和视频](Reading images and\
    \ videos)\n- [基本函数](Basic functions)\n- [调整大小和裁剪](Resizing and cropping)\n- [形状和文本](Shapes\
    \ and text)\n- [透视变换](Warp perspective)\n- [颜色检测](Colour detection)\n- [形状检测](Shape\
    \ detection)\n- [人脸识别](Facial recognition)\n- [虚拟绘画](Virtual painting)\n\n# 网页抓取\n\
    \n- [Selenium](Selenium)\n- [Beautiful soup](Beautiful soup)\n- [SQLite (数据库)](SQLite\
    \ (Database))\n- [自动化流程](Automation processes)\n\n# 其他\n\n- [我的第一个问题](My first\
    \ problem)\n- [我的第一个答案](My first answer)\n- [100 个囚犯](100 prisoners)\n- [类与可变性](Classes\
    \ and mutability)\n\n# Python 简介\n\nPython 是一种编程语言，能让你快速工作并更有效地集成系统。\n\nPython\
    \ 是开源的，任何拥有计算机并想学习的人都可以免费使用。\n\n维基百科的正式描述如下：\n\n> “Python 是一种高级、解释型、通用编程语言。其设计哲学强调代码的可读性，并使用显著的缩进。”\n\
    \n那么，让我们来分解一下：\n\n| 术语 | 含义 |\n| :--- | :--- |\n| 高级 | 对人类来说更易读 |\n| 解释型 | 按照编写的方式运行\
    \ |\n| 通用 | 适用于多种用例 |\n| 缩进 | 使用缩进代替 {} |\n\n# 背景\n\n该语言本身于 90 年代初发布。大约十年后，一个引入了新功能的新版本（2.0\
    \ 版）发布，最终又过了大约 8 年，一个更新的版本（3.0 版）发布。\n\n3.0 版与 2.0 版并非完全向后兼容，这意味着一些 2.0 版的代码在\
    \ 3.0 版中将无法运行。最显著的是，print 语句在新版本中加上了一对括号。\n\n2.0 版：print “hello world”\n3.0 版：print\
    \ (“hello world”)\n\n向后不兼容有时会令人烦恼，被一些人视为失误，而另一些人则认为这是必要的。特别是，2.0 版已于 2020 年 1\
    \ 月停止支持，这意味着它*不再被支持*。\n\n因此，随着时间的推移，3.0 版代码已成为**主要接受的版本**，这也是本书的重点。\n\n当我们谈论 Python\
    \ 时，我们指的是 Python 3.0。\n\n在此期间，Python 一直被评为最顶级（最受欢迎）的编程语言之一，近年来由于在数据科学领域的应用案例，特别是得益于一个非常有能力的用户群体编写的大量模块，它重新获得了关注。\n\
    \n# 术语\n\n不可避免地需要了解一些常被讨论的术语和短语。\n\n**Pythonic（Python 风格）：**\n\n用 Python 编写的代码看起来既与其他代码不同，又与其他代码相似。还有一些其他语言没有的新特性（例如用列表推导式代替\
    \ for 循环），使用这些特性被认为是 Pythonic 的。"
