  - '[PAGE 119]


    This problem tends to manifest itself in the Natural Language Processing (NLP)
    field. In particular Cosine similarity is a metric used to measure how similar
    the documents are irrespective of their size. Mathematically, it measures the
    cosine of the angle between two vectors projected in a multi-dimensional space.


    However, it has a useful case in finance too and in particular in indices. Take
    for example two bond indices which contain, say 1000 bonds in each. How could
    we measure the similarity between these two indices?


    Well, this is identical to comparing two lists of strings to each other. So if
    we can come up with a technique, then we can state the “similarity”.


    Basic examples are:


    +   - [a,b,c] and [a,b,c] are 100% similar

    - [a,b,c] and [d,e,f] are 0% similar

    - [a,b,c] and [a,j,k] are 33% similar


    But what about:


    +   - [a,b,c] and [c,a,b] which contain the same letters but in a different order.

    - [a,b,c] and [f,g,a] have one matching letter but in a different position.


    We can say that for indices, the *order does not matter*, which reduces the problem
    to the first three cases.


    And what about lists of different sizes ? which pair has a greater similarity:


    +   - [a,b,c] with [a,b,c,d]

    - [a,b,c] with [a,b,c,d,e,f g]


    Again, we might say that the first pair are more similar because more of the items
    that do exist reside in both lists compared to the second pair.


    We attempt to take a mathematical approach to this and in particular in python
    make use of dictionaries and lists or we could use the `cosine_similarity` method
    from the `sklearn` module.


    So we now set out a recipe for how to do this:'
