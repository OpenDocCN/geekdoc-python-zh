    \   else:\n        print(\"标志为真。\")\n    ```\n\n    输出：\n\n    ```\n    标志为假。\n\
    \    ```\n\n你还可以使用括号对复合布尔表达式中的子表达式进行分组，以控制求值顺序。复合布尔表达式对于在代码中构建更复杂的决策结构非常有用，因为它们允许你组合多个条件，根据各种场景控制程序流程。\n\
    \n## 4.5. 复杂布尔表达式\n\n我们可以通过使用逻辑运算符（如 `and`、`or` 和 `not`）组合简单的布尔表达式（每个表达式涉及单个关系运算符）来形成复杂的布尔表达式。当我们使用这些逻辑运算符组合两个或多个布尔表达式时，就创建了所谓的复合布尔表达式。为了说明复合布尔表达式的概念，让我们考虑一个计算机科学学位的要求，该学位包括各种计算课程，其中就有操作系统和编程语言。如果我们专注于这两门课程，我们可以陈述：学生需要成功通过操作系统和编程语言两门课程才有资格获得学位。仅通过操作系统是不够的，因为它不满足要求。同样，完成编程语言而未通过操作系统也是不够的。未完成操作系统或编程语言中任何一门的学生将没有资格获得学位。复合布尔表达式是通过使用逻辑运算符（如“and”、“or”和“not”）组合两个或多个简单的布尔表达式而形成的。这些表达式允许我们评估多个条件，并根据它们的组合真值做出决策。\n\
    \n复合布尔表达式中使用的逻辑运算符：\n\n1.  **AND (`&&`):** 表示逻辑“与”运算。仅当两个操作数都为 `true` 时，它才返回 `true`，否则返回\
    \ `false`。例如，“A && B”仅当 A 和 B 都为 `true` 时才为 `true`。\n2.  **OR (`||`):** 表示逻辑“或”运算。如果至少有一个操作数为\
    \ `true`，它就返回 `true`，否则返回 `false`。例如，“A || B”如果 A 或 B（或两者）为 `true`，则为 `true`。\n\
    3.  **NOT (`!`):** 表示逻辑“非”运算。它返回操作数的相反布尔值。如果操作数为 `true`，“!” 使其变为 `false`；如果操作数为\
    \ `false`，“!” 使其变为 `true`。例如，“!A”如果 A 为 `false`，则为 `true`。\n\n使用这些逻辑运算符组合简单的布尔表达式，使我们能够在编程和其他逻辑上下文中构建更复杂的条件和控制流。\n\
    \n复合布尔表达式示例：\n考虑以下求职场景：\n\n- 候选人必须拥有计算机科学学位（CS）。\n- 候选人必须拥有至少 2 年的工作经验（Exp）。\n\
    - 候选人必须精通一门编程语言（Prog）。\n\n一个候选人被考虑该职位的复合布尔表达式可以是：\n\n```\n(CS && Exp >= 2) ||\
    \ (Prog == true)\n```\n\n此表达式表明，如果候选人拥有计算机科学学位和至少 2 年的工作经验，或者精通一门编程语言，则将被考虑。如果满足这些条件中的任何一个，复合表达式的值将为\
    \ `true`，候选人将被考虑该职位。\n\n提供的代码演示了基于涉及变量“x”和“y”的各种逻辑表达式，将布尔值赋给变量“b”。让我们分析这些表达式并展示它们的等价性：\n\
    \n1.  `x != y`:\n    如果“x”的值不等于“y”的值，此表达式的值为 `True`，否则为 `False`。\n\n2.  `not (x\
    \ == y)`:\n    括号内的表达式 `x == y` 在“x”等于“y”时值为 `True`，否则为 `False`。通过使用“not”运算符，我们对结果取反，因此整个表达式在“x”不等于“y”时值为\
    \ `True`，否则为 `False`。\n\n3.  `x < y or x > y`:\n    此表达式使用“or”运算符，如果至少有一个操作数为\
    \ `True`，则返回 `True`。第一个操作数 `x < y` 在“x”小于“y”时值为 `True`。第二个操作数 `x > y` 在“x”大于“y”时值为\
    \ `True`。因此，如果“x”小于“y”或大于“y”，整个表达式的值为 `True`，这等同于“x”不等于“y”。总之，表达式“x != y”、“not\
    \ (x == y)”和“x < y or x > y”都是等价的。当“x”和“y”具有不同的值时，它们的结果都是 `True`；当“x”和“y”相等时，结果都是\
    \ `False`。\n\n## 4.6. PASS 语句\n\n初学者有时会在简单的 if 语句更合适的情况下使用 if/else 语句。例如，考虑以下代码片段，程序员希望在变量\
    \ `x` 不小于零时打印其值：\n\n```python\nif x < 0:\n    # 什么都不做（这行不通！）\nelse:\n    print(x)\n\
    ```\n\n然而，这段代码在 Python 中是不合法的，因为 if/else 语句要求 if 块和 else 块都至少包含一个语句。为了使代码合法并实现所需的逻辑，我们可以使用\
    \ `pass` 语句，它表示“什么都不做”："
