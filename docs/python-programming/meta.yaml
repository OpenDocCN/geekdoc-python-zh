    The various operating systems, downloads, editors, colour schemes and so forth
    are dependent on each individual user''s resources and preference, but whatever
    that is, we want to get to this point.


    **Getting to this point is key to everything as we are now able to code!**


    # ## What is available


    There is tons of support material and videos on the web and the reader is advised
    to use as many of those as necessary, nevertheless any good python book should
    run through the basic building blocks of the language.


    Believe it or not, most languages, for the most part, are relatively simple to
