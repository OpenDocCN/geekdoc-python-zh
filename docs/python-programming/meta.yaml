    \ |\n| 6. | ‘sin’，‘tan’：其他三角函数包括正弦 (sin)、正切 (tan)、反余弦 (acos)、反正弦 (asin) 和反正切 (atan)\
    \ |\n| 7. | ‘cosh’，‘sinh’，‘tanh’：双曲余弦 (cosh)、双曲正弦 (sinh) 和双曲正切 (tanh) 函数也可用 |\n\
