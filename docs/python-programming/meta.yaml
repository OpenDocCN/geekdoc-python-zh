    # Predator vs prey cycles


    We have spent the last few chapters looking at chaotic systems. We started with
    the mandelbrot set and then moved into the double pendulum and then onto the three
    body problem each one producing unpredictable squiggles in both two and three
    dimensions.


    With the predator-prey cycle we expect to see more order. In fact, the behaviour
    might capture some of the dynamics of diseases and rumours where there is a self
    dampening effect, although we might expect this to oscillate.


    Before we delve into the mathematics, let''s consider an overview of a predator
    prey system. For example foxes and rabbits.


    ![](img/4e4fc350228cd1c84055205e597f4fc0_245_0.png)


    The populations of each component of the system depend on the other population.
    So more rabbits equates to more food for the foxes which gives rise to an increasing
    fox population, but more foxes kill the rabbits reducing the rabbit population.
    This in turn reduces the supply of food for the foxes and subsequently reduces
    the fox population. Less foxes mean more rabbits … and so the cycle continues.'
  - '[PAGE 246]


    The above logic gives rise to the following mathematics:


    ```

    $$\frac{dx}{dt} = \alpha x - \beta xy$$


    $$\frac{dy}{dt} = \delta xy - \gamma y$$

    ```


    Where x and y are the number of prey and predators respectively.


    The parameters α and γ are interesting as they represent the species dynamics
    without interaction. So positive α describes a prey population that naturally
    increases whilst negative γ describes the opposite for the predators.


    This dynamic tends to always be the case as, left alone without predators culling
    the population, the prey tends to multiply fast. Likewise, left alone essentially
    with no food, the predator population would decline.


    In a similar fashion the connected, xy, terms have the opposite effect on both
    the populations where we can see that a large xy is positive for the predator
    population but negative for the prey population.


    This is very much the basic mathematics of natural selection in an ongoing ecosystem
    because if any of those parameters were reversed, then the system would become
    unstable and at least one of the species would become extinct.


    Since we know that:


    ```

    $$\frac{dy}{dx} = \frac{dy}{dt} / \frac{dx}{dt}$$

    ```


    We can combine the two equations above to get:


    ```

    $$\frac{dy}{dx} = \frac{\delta xy - \gamma y}{\alpha x - \beta xy}$$

    ```


    And rearranging this gives this:'
