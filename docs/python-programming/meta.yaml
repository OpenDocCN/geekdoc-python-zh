    \nOther than being retained within certain boundaries, we have shown by computer\
    \ simulation that the double pendulum is sensitive to initial conditions and chaotic\
    \ in motion.\n\n## 三体问题\n\nThe three body problem is interesting in the sense\
    \ that it represents another type of chaotic problem where *slight changes in\
