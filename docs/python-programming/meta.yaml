    ![](img/1dbe1e06b9d31a6f7ada030324ed273a_381_0.png)


    Universal quantification means that a particular property is true for all the
    elements of a set. Existential quantification means that at least one element
    is the set exhibits a particular property. In mathematics the ∀ symbol represents
    universal quantification, and the ∃ symbol represents existential quantification.
    The ∀ symbol usually is pronounced “for all,” and the ∃ symbol is read as “there
    exists.”


    To see how we can use these quantifiers in a Python program, consider the set
    S = 1, 2, 3, 4, 5, 6, 7, 8.


