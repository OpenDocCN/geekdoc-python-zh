    \ (精装)\n\nArcier Press 出版各类书籍和电子书。有关 Arcier Press 及其产品的更多信息，请访问我们的网站 www.arcierpress.com\n\
    \n# 关于作者\n\n**Vinod Patidar 博士**，自2023年4月24日起，在古吉拉特邦瓦多达拉的帕鲁尔理工学院计算机科学与工程系担任助理教授。此前，他曾在曼迪迪普（博帕尔）的班萨尔工程学院担任助理教授兼学科负责人（2022年10月1日\
    \ - 2023年4月20日）。在博帕尔的斯科普工程学院担任高级讲师（2008年8月8日 - 2013年8月31日）和助理教授（2021年9月1日 - 2022年9月30日）。他于2006年在博帕尔大学理工学院获得工程学士学位（BE-CSE）。并于2013年在博帕尔大学理工学院完成技术硕士学位（M.Tech-CSE）。2021年7月，在博帕尔（中央邦）的拉宾德拉纳特·泰戈尔大学完成题为“通过动态负载调度技术实现多目标虚拟机资源分配”的博士研究。\n\
    \n**Manmohan Singh 博士**，在印度中央邦博帕尔的IES技术学院计算机科学与工程系担任教授。此前，他在多所工程学院拥有超过12年的教学经验，包括印多尔的Chameli\
    \ Devi集团学院和A.P.J. Abdul Kalam博士大学。他的学术资格包括计算机工程硕士和计算机科学与工程博士学位。他的研究领域包括数据挖掘、人工智能和数据科学。他在知名国际期刊、国际-国内会议上发表了25篇以上研究论文，并拥有9项专利（5项已发表，4项已注册）。他在计算机科学领域出版了10多本书。他完成了一项DST赞助项目。\n\
    \n**Shiv Shakti Shrivastava 博士**是博帕尔拉宾德拉纳特·泰戈尔大学计算机科学与工程系的教授。他拥有超过20年的经验。在他的指导下，已有九位学者获得博士学位。他也指导M.Tech.-MCA学生。他在不同知名期刊上发表了超过四十五篇国际和国内论文。他拥有三项专利，并正在尝试资助专利。他与许多大学有联系，如Barkatullah大学、RGPV、Makhanlal大学、Bhoj大学等多所大学。他在不同大学和学院的技术及其他活动中担任过专家讲座、客座讲座和评委。他曾作为嘉宾参加不同的网络研讨会。他完成了许多教师发展计划，并成功完成了IEEE\
    \ Xplore数字图书馆的培训。博士论文\n\n**Rahul Sharma 先生**，在古吉拉特邦瓦多达拉的帕鲁尔大学帕鲁尔理工学院计算机科学与工程系担任助理教授。此前，他在多所工程学院拥有超过6年的教学经验，包括印多尔的Chameli\
    \ Devi集团学院和A.P.J. Abdul Kalam博士大学。他于印多尔（中央邦）的Patel科学技术学院获得工程学士学位（CSE），并于印多尔（中央邦）DAVV的SCSIT获得技术硕士学位（NM&IS）。目前正在博帕尔（中央邦）拉宾德拉纳特·泰戈尔大学攻读计算机科学与工程博士学位。他的研究领域包括计算机网络、网络安全、密码学、数据挖掘和Web编程。他在知名国际期刊、国际-国内会议上发表了13篇研究论文，并拥有6项专利（3项已发表，3项已注册）。他还于2015年通过了GATE（CSE）考试。他在计算机科学与工程领域出版了9多本书。\n\
    \n# 目录\n\n- 图表列表\n- 表格列表\n- 缩写列表\n- 前言\n\n- **第1章** 软件开发的背景\n    - 1.1. 软件\n \
    \   - 1.2. 开发工具\n    - 1.3. 使用Python学习编程\n    - 1.4. 编写Python程序\n    - 1.5. Python交互式Shell\n\
    \    - 1.6. 一个更长的Python程序\n    - 1.7. 练习\n\n- **第2章** 值和变量\n    - 2.1. 整数和字符串值\n\
    \    - 2.2. 变量和赋值\n    - 2.3. 标识符\n    - 2.4. 浮点数\n    - 2.5. 字符串中的控制码\n    -\
    \ 2.6. 用户输入\n    - 2.7. 控制打印函数\n    - 2.8. 字符串格式化\n    - 2.9. 多行字符串\n    - 2.10.\
    \ 练习\n\n- **第3章** 表达式和算术\n    - 3.1. 算术运算符\n    - 3.2. 运算顺序"
