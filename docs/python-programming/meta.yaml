    | x == y | True if x = y (mathematical equality, not assignment); otherwise, false
    |

    | x < y | True if x < y; otherwise, false |

    | x <= y | True if x ≤ y; otherwise, false |

    | x > y | True if x > y; otherwise, false |

    | x >= y | True if x ≥ y; otherwise, false |

    | x != y | True if x /= y; otherwise, false |'
