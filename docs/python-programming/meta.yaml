    into the computation efficiently using python.


    # Fermat''s last theorem


    In number theory, Fermat''s Last Theorem states that no three positive integers
    a, b, and c satisfy the equation:


    $$a^n + b^n = c^n$$


    for any integer value of n greater than 2.


    However, in the popular cartoon series, Homer Simpson finds an exception to the
    case that defeats the calculators (and there are other numbers that do the same
    too).'
