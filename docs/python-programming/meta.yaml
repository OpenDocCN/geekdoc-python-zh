    ```

    print(str(4)) # Output: ‘4’

    print(int(‘5’)) # Output: 5

    ```


    相反，对整数使用`int`或对字符串使用`str`会得到与原始对象相同的值：


    你可能猜到，此时使用`int`或`str`函数将对象转换为其自身可能看起来没有用。然而，当我们引入变量（第2.2节）并需要处理用户输入（第2.6节）时，它们的效用就变得明显了。虽然任何整数都有字符串表示，但并非所有字符串都有等效的整数：在Python中，‘wow’和‘3.4’都不代表有效的整数表达式。因此，如果字符串的内容看起来像一个有效的整数，你可以安全地应用`int`函数将其转换为所表示的整数。


    加号运算符`+`对字符串的行为不同；考虑：


    ```

    print(5 + 10) # Output: 15

    print(‘5’ + ‘10’) # Output: ‘510’

    ```


    字符串的加号运算符将它们连接在一起。

    不允许使用加号运算符直接混合不同类型：


    ```

    print(5 + ‘10’) # Error: TypeError: unsupported operand type(s) for +:

    ‘int’ and ‘str’

    ```


    然而，我们可以使用`int`和`str`函数来执行此类操作：


    ```

    print(5 + int(‘10’)) # Output: 15

    print(str(5) + ‘10’) # Output: ‘510’

    ```


    `type`函数也可以处理复杂表达式：

    Python整数值中不能出现逗号。例如，两千四百六十八应写为2468，而不是2,468。

    在数学中，整数是无界的；这意味着数学整数的集合是无限的。在Python中，整数可以任意大，仅受可用内存的限制。然而，由于计算机内存有限，并且操作系统可能对运行程序允许的内存量施加限制，实际上，Python整数受可用内存的限制。


    ## 2.2. 变量和赋值


    在代数中，变量用作数字的占位符。同样，在Python中，变量不仅可以表示数字，还可以表示其他类型的值。让我们检查上一个代码，它使用一个变量来存储一个整数值，然后打印该变量的值。

    接下来，代码由两个语句组成：


    ```

    x=10

    ```


    这是一个赋值语句。赋值语句将一个值与一个变量关联起来。符号‘=’是赋值运算符。在此语句中，变量`x`被赋予整数值10。换句话说，变量`x`被绑定到值10。此时，`x`的类型是`int`，因为它持有一个整数值。


    我们可以根据需要多次赋值和重新赋值变量。如果重新赋值一个不同类型的值，变量的类型可以改变。


    ```

    print(x)

    ```


    此语句打印变量`x`的当前值。至关重要的是要注意，在这种情况下，`x`周围没有引号。如果`x`的值为10，语句`print(x)`将打印10，即变量`x`的值。然而，语句`print(''x'')`将打印字母x，因为它被视为字符串。在Python中，赋值运算符（=）的含义与其在数学中的含义不同。在数学中，‘=’断言其左侧的表达式等于其右侧的表达式。在Python中，‘=’将右侧表达式的值赋给左侧的变量。因此，`x
    = 5`应读作“x被赋值为5”或“x得到值5”。这种区别很重要，因为在数学中，等式是对称的（如果x = 5，那么5 = x）。然而，在Python中，这种对称性不存在。尝试将值重新赋给像`5
    = x`这样的字面整数值将导致错误，因为5的值无法更改。我们可以根据需要将不同的值重新赋给变量，如上面的代码所示。观察上面代码中的每个`print`语句都是相同的，但当程序运行时（作为程序，而不是在交互式shell中），`print`语句产生不同的结果。此程序表明，我们不能总是孤立地预测语句的行为，特别是当它涉及变量时。语句的行为可能取决于它使用的一个或多个变量的赋值。下一个代码中的变量`x`具有`int`类型，因为它被绑定到一个整数值。为了提供更具描述性的`print`语句，增强了上面的代码。


    ```

    x = 10

    print(‘x = ‘ + str(x))

    x = 20

    print(‘x = ‘ + str(x))

    x = 30

    print(‘x = ‘ + str(x))

    ```


    `str`函数用于将`x`视为字符串，以便`+`运算符可以执行字符串连接：


    ```

    print(''x ='' + str(x))

    ```


    尝试使用表达式`''x ='' + x`将是无效的，因为它涉及混合字符串和整数，这是不允许的。


    接下来，代码提供了上面代码的一个变体，产生相同的输出。


    这个版本的`print`语句：


    ```

    print(''x ='', x)

    ```


    说明了`print`函数接受两个参数。第一个参数是字符串`''x =''`，第二个参数是变量`x`，它被绑定到一个整数值。`print`函数允许程序员传递多个用逗号分隔的表达式。`print`函数括号内的元素形成一个逗号分隔的列表。`print`函数打印参数的逗号分隔列表中的每个元素，并自动在每个元素之间添加一个空格，以防止打印的文本连在一起。


    程序员可以使用元组赋值在一条语句中赋值多个变量。


    ![](img/1dbe1e06b9d31a6f7ada030324ed273a_42_0.png)


    ```

    x, y, z = 100, -45, 0

    print(''x ='', x, ''y ='', y, ''z ='', z)

    ```


    输出：


    ```

    x=100, y=-45, z=0

    ```


    元组是由逗号分隔的项目的集合。如果你有定义为`''total''`和`''s''`的变量，表达式`total, 45, s, 0.3`表示一个4元组，它由四个元素组成。例如，在赋值语句`x,
    y, z = 100, -45, 0`中，`''x, y, z''`形成一个元组，而`''100, -45, 0''`形成另一个元组。在元组赋值期间，赋值运算符左侧的每个变量被赋予右侧元组中的相应值。因此，在这种情况下，`''x''`将被赋予值100，`''y''`将被赋予-45，`''z''`将被赋予0。


    重要的是要注意，只有当左侧元组中的元素数量与右侧元组中的元素数量匹配时，元组赋值才有效，如以下示例所示：


    ```

    x, y, z = 10, 20, 30 # This works fine because both tuples contain three elements.

    a, b = 1, 2, 3......# This will raise a Value Error since the left tuple has two
    variables, but the right tuple has three elements.

    ```


    元组是Python中的一种特定类型，就像`''int''`或`''float''`一样，在第11章中，我们将深入探讨元组及其用法。


    当我们遇到赋值语句时，它将一个变量名绑定到一个对象。我们可以使用方框和箭头来可视化这个过程，如图2.1所示。每个方框代表一个变量，用其名称标记，一个箭头从方框延伸到变量所绑定的对象。例如，如果我们有`x
    = 2`，从方框`''x''`出发的箭头指向另一个方框，该方框代表存储值2的二进制表示的内存位置。


    ![](img/1dbe1e06b9d31a6f7ada030324ed273a_43_0.png)


    ![](img/1dbe1e06b9d31a6f7ada030324ed273a_43_1.png)'
