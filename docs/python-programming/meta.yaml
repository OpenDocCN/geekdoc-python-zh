  - "[PAGE 132]\n\nA coroutine is a function that can suspend its execution before\
    \ reaching return, and it can indirectly pass control to another coroutine for\
    \ some time.\n\nBefore we get to this point we have to understand that this is\
    \ a new technology (python 3.7 and above) which has been built from existing tech\
    \ and we are only looking at the top level as a deep dive would require a book\
    \ in itself. The components to understand are:\n\n+   1. The async ecosystem\n\
    2. The event loop (all languages)\n3. Using coroutines\n4. How coroutines work\n\
    5. What comes included in the ecosystem\n6. Typical web applications\n7. Interacting\
    \ with the blocking world\n8. Error handling, testing, debugging\n\nEach of the\
    \ asynchronous methods has its advantages and disadvantages. **With multiprocessing**,\
    \ the user is able to use multiple processors at any point in time, but the con\
    \ is that processors are limited. **With threading** the user has an easy way\
    \ of sharing processes on the same thread but the con is that the computer takes\
    \ control of when this happens which can give rise to race conditions. **With\
    \ asyncio** the user can achieve the same as threading and also keep control,\
    \ but the con is that the functions need to be defined as async and there are\
    \ additional keywords and terminology to use.\n\nHere is a classic example of\
    \ race conditions in threading which gives rise to additional implementations\
    \ being required and ultimately asyncio.\n\n```\nimport threading\nimport time\n\
    \nx = 10\n\ndef increment(by):\n    global x\n\n    local_counter = x\n    local_counter\
    \ += by\n\n    time.sleep(1)\n\n    x = local_counter\n    print(f'{threading.current_thread().name}\
    \ inc x {by}, x: {x}')\n```"
- md: "## Graphical user interfaces\n\nThe web is by far the go to place and python\
    \ has its own offerings in the form of the Django and Flask web frameworks.\n\n\
    Aside from the web, there are bespoke graphical user interfaces (GUI’s) that allow\
    \ a user to build local apps on their devices which are predominantly desktop\
    \ computers, laptops, tablets and mobile devices.\n\nAt the time of writing, at\
    \ a glance, there were roughly 30 GUI’s which operate across a variety of operating\
    \ systems. Each will have its own specific features and advantages.\n\nHowever,\
    \ we will focus on one particular GUI called tkinter[18]. The main reasons that\
    \ we focus on tkinter are:\n\n- 1. It is fast.\n- 2. It comes bundled with Python.\n\
    - 3. The general concepts of using GUI’s are broadly the same. And we will justify\
    \ why this general statement is true.\n\n## Hello world GUI\n\nLet's take a look\
    \ at a basic hello world implementation using tkinter.\n\n```python\nimport tkinter\
    \ as tk\n\n# create an instance\nroot = tk.Tk()\n\n# place a label on the root\
    \ window\nmessage = tk.Label(root, text=\"Hello, World!\")\nmessage.pack()\n\n\
    # keeps the window displaying and running until you close it\nroot.mainloop()\n\
    ```\n\nWhich opens the GUI with the text hello world like this:\n\n![](img/4e4fc350228cd1c84055205e597f4fc0_136_0.png)\n\
    \nSo out of the box, we were able to get a result quickly. All we had to do was\
    \ this:\n\n- 1. Import the module\n- 2. Create an instance\n- 3. Create a label\
    \ with the “hello world” text\n- 4. Pack the label\n- 5. Run the main loop\n\n\
    Typically, we place the call to the mainloop() method as the last statement in\
    \ a Tkinter program.\n\nThe components that are added are called “widgets”. We\
    \ create widgets of our choice and then pack them to the container. If we forget\
    \ to pack the widget, then it will be created but remain invisible. There are\
    \ roughly 20 basic widgets to choose from, like scroll bars, checkboxes and entry\
    \ boxes etc…\n\nThe reason why we said that the general concepts of all GUI’s\
    \ are the same is because they tend to follow the same 5 step process as above.\n\
    \nWhat actually happens with all the drawing packages is that the screen refreshes\
    \ itself many times per second (which is usually called the Frames Per Second,\
    \ FPS) with the images being created or drawn sequentially one-by-one. This is\
    \ more obvious for games modules like pygame where we might need to be careful\
    \ to draw the background before the items.\n\nThe hello world was great, but let's\
    \ now extend upon this. We can give the GUI a title and a position and size on\
    \ the screen:\n\n```python\nroot.title(\"Tkinter Window Demo\")\nroot.geometry(\"\
    600x400+200+50\")\n```\n\nThe geometry is made of two components:\n\n- width *\
    \ height\n- Position of top left corner relative to the screen\n\n![](img/4e4fc350228cd1c84055205e597f4fc0_137_0.png)\n\
    \nThere are more options, but this is sufficient. In fact, omitting the top left\
    \ position would leave a suitable default.\n\nIf we wanted to position and size\
    \ the GUI relative to the screen, then we would need to get the screen dimensions\
    \ and calibrate.\n\n```python\n# get the screen dimension\nscreen_width = root.winfo_screenwidth()\n\
    screen_height = root.winfo_screenheight()\n\n# the GUI width and height\nwindow_width\
    \ = int(screen_width / 3)\nwindow_height = int(screen_height / 3)\n```\n\nWe can\
    \ do other things like:\n\n- Control window size: resizable() , minsize() , maxsize()\n\
    - Adjust transparency: attributes('-alpha',0.5)\n- Stacking order: attributes('-topmost',\
    \ 1)\n- Default icon: iconbitmap('my_image.ico')\n\nWe can implement all of the\
    \ above.\n\n```python\nimport tkinter as tk\n\n# create an instance\nroot = tk.Tk()\n\
    root.title('Tkinter Window Demo')\n\n# get the screen dimension\nscreen_width\
    \ = root.winfo_screenwidth()\nscreen_height = root.winfo_screenheight()\n\n# the\
    \ GUI width and height\nwindow_width = int(screen_width / 3)\nwindow_height =\
    \ int(screen_height / 3)\n\n# the GUI position\nwindow_x_pos = int(screen_width\
    \ * 0.1)\nwindow_y_pos = int(screen_height * 0.1)\n\nroot.geometry(f'{window_width}x{window_height}+{window_x_pos}+{window_y_pos}')\n\
    \n# transparency\nroot.attributes('-alpha', 0.75)\n\n# place a label on the root\
    \ window\nmessage = tk.Label(root, text=\"Hello, World!\")\nmessage.pack()\n\n\
    # keeps the window displaying and running until you close it\nroot.mainloop()\n\
    ```\n\nWhich gives this 25% transparent window which is positioned 10% from the\
    \ top left hand corner of the screen and is ⅓ of the screen size in the x and\
    \ y directions:\n\n![](img/4e4fc350228cd1c84055205e597f4fc0_139_0.png)\n\nSo we\
    \ have a GUI which we can customise reasonably well in terms of position and size\
    \ etc.\n\nSo next, we can add some widgets.\n\nCommon widgets are buttons and\
    \ entry boxes although there are many others. These will be sufficient for creating\
    \ an example of receiving data and performing a basic operation.\n\nWe will create\
    \ the button and entry box in a similar way that we created the label. The difference\
    \ being that the button executes a function, which is usually referred to as a\
    \ callback function. Callback[19] functions are very common in modern programming\
    \ and we have already seen them in Asynchronous programming.\n\nHere is the button\
    \ example, with a callback:\n\n```python\n# make a button with a callback\ndef\
    \ callback():\n    \"\"\" this is called when the button is pressed \"\"\"\n \
    \   x = message.cget('text') # get current text\n    if x == 'good night': message.config(text=\
    \ 'hello world')\n    else: message.config(text='good night')\n\nbutton = tk.Button(root,\
    \ text='press me', command=lambda: callback())\nbutton.pack()\n```\n\nThe button\
    \ that we have created calls the callback function, which runs a little routine\
    \ to toggle the text in the text box from “hello world” to “good night”.\n\nIt\
    \ could be used for any other much more sophisticated routine in the same way\
    \ as all other python functions. Also, we just used the name callback() for the\
    \ purpose of illustration, but we could give a more appropriate name, like change_message_text()\
    \ .\n\nWith the button sorted, we now move on to the entry widget, which allows\
    \ the user to enter a single line of text.\n\n```python\n# make an entry box\n\
    entry = tk.Entry(root)\nentry.pack()\n```\n\nThis is all that is needed and we\
    \ can get the text from the box by using the .get() statement.\n\n```python\n\
    my_text = entry.get()\nprint(my_text)\n```\n\nAnd print the result straight to\
    \ the console. We could add this into the callback function, so now the function\
    \ does two things. [1] change the text label message, [2] print to the console.\n\
    \nOur basic code looks like this:\n\n```python\nimport tkinter as tk\n\n# create\
    \ an instance\nroot = tk.Tk()\nroot.title('Tkinter Window Demo')\n\n# get the\
    \ screen dimension\nscreen_width = root.winfo_screenwidth()\nscreen_height = root.winfo_screenheight()\n\
    \n# the GUI width and height\nwindow_width = int(screen_width / 6)\nwindow_height\
    \ = int(screen_height / 3)\n\n# the GUI position\nwindow_x_pos = int(screen_width\
    \ * 0.3)\nwindow_y_pos = int(screen_height * 0.3)\n```"
  mdcn: "## 图形用户界面\n\n目前，网络是首选平台，而Python通过Django和Flask等Web框架提供了自己的解决方案。\n\n除了Web应用，还有专门的图形用户界面（GUI），允许用户在其设备（主要是台式机、笔记本电脑、平板电脑和移动设备）上构建本地应用程序。\n\
    \n在撰写本文时，粗略统计，大约有30种GUI可以在不同操作系统上运行。每种GUI都有其特定的功能和优势。\n\n然而，我们将重点介绍一种名为tkinter[18]的特定GUI。我们选择tkinter的主要原因是：\n\
    \n- 1. 它速度快。\n- 2. 它与Python捆绑在一起。\n- 3. 使用GUI的通用概念大致相同。我们将说明为什么这个普遍说法是正确的。\n\n\
    ## Hello world GUI\n\n让我们看看使用tkinter实现的一个基本的hello world示例。\n\n```python\nimport\
    \ tkinter as tk\n\n# create an instance\nroot = tk.Tk()\n\n# place a label on\
    \ the root window\nmessage = tk.Label(root, text=\"Hello, World!\")\nmessage.pack()\n\
    \n# keeps the window displaying and running until you close it\nroot.mainloop()\n\
    ```\n\n这将打开一个显示“hello world”文本的GUI，如下所示：\n\n![](img/4e4fc350228cd1c84055205e597f4fc0_136_0.png)\n\
    \n因此，开箱即用，我们能够快速得到一个结果。我们所要做的就是：\n\n- 1. 导入模块\n- 2. 创建一个实例\n- 3. 创建一个带有“hello\
    \ world”文本的标签\n- 4. 放置标签\n- 5. 运行主循环\n\n通常，我们将对mainloop()方法的调用放在Tkinter程序的最后一条语句。\n\
    \n添加的组件称为“小部件”。我们创建选择的小部件，然后将它们放置到容器中。如果我们忘记放置小部件，那么它会被创建但保持不可见。大约有20种基本小部件可供选择，如滚动条、复选框和输入框等……\n\
    \n我们之所以说所有GUI的通用概念是相同的，是因为它们往往遵循与上述相同的5个步骤。\n\n所有绘图包实际发生的情况是，屏幕每秒刷新多次（通常称为每秒帧数，FPS），图像被依次创建或绘制。对于像pygame这样的游戏模块，这更为明显，我们可能需要小心地在绘制项目之前绘制背景。\n\
    \nHello world很棒，但我们现在来扩展它。我们可以为GUI设置标题、在屏幕上的位置和大小：\n\n```python\nroot.title(\"\
    Tkinter Window Demo\")\nroot.geometry(\"600x400+200+50\")\n```\n\ngeometry由两部分组成：\n\
    \n- 宽度 * 高度\n- 左上角相对于屏幕的位置\n\n![](img/4e4fc350228cd1c84055205e597f4fc0_137_0.png)\n\
    \n还有更多选项，但这已经足够了。实际上，省略左上角位置将使用合适的默认值。\n\n如果我们想相对于屏幕定位和调整GUI的大小，那么我们需要获取屏幕尺寸并进行校准。\n\
    \n```python\n# get the screen dimension\nscreen_width = root.winfo_screenwidth()\n\
    screen_height = root.winfo_screenheight()\n\n# the GUI width and height\nwindow_width\
    \ = int(screen_width / 3)\nwindow_height = int(screen_height / 3)\n```\n\n我们还可以做其他事情，例如：\n\
    \n- 控制窗口大小：resizable()、minsize()、maxsize()\n- 调整透明度：attributes('-alpha',0.5)\n\
    - 堆叠顺序：attributes('-topmost', 1)\n- 默认图标：iconbitmap('my_image.ico')\n\n我们可以实现以上所有功能。\n\
    \n```python\nimport tkinter as tk\n\n# create an instance\nroot = tk.Tk()\nroot.title('Tkinter\
    \ Window Demo')\n\n# get the screen dimension\nscreen_width = root.winfo_screenwidth()\n\
    screen_height = root.winfo_screenheight()\n\n# the GUI width and height\nwindow_width\
    \ = int(screen_width / 3)\nwindow_height = int(screen_height / 3)\n\n# the GUI\
    \ position\nwindow_x_pos = int(screen_width * 0.1)\nwindow_y_pos = int(screen_height\
    \ * 0.1)\n\nroot.geometry(f'{window_width}x{window_height}+{window_x_pos}+{window_y_pos}')\n\
    \n# transparency\nroot.attributes('-alpha', 0.75)\n\n# place a label on the root\
    \ window\nmessage = tk.Label(root, text=\"Hello, World!\")\nmessage.pack()\n\n\
    # keeps the window displaying and running until you close it\nroot.mainloop()\n\
    ```\n\n这将生成一个25%透明的窗口，该窗口位于屏幕左上角10%处，并且在x和y方向上占屏幕大小的⅓：\n\n![](img/4e4fc350228cd1c84055205e597f4fc0_139_0.png)\n\
    \n因此，我们有了一个可以在位置和大小等方面进行合理自定义的GUI。\n\n接下来，我们可以添加一些小部件。\n\n常见的小部件是按钮和输入框，尽管还有许多其他小部件。这些足以创建一个接收数据并执行基本操作的示例。\n\
    \n我们将以与创建标签类似的方式创建按钮和输入框。不同之处在于按钮执行一个函数，通常称为回调函数。回调[19]函数在现代编程中非常常见，我们已经在异步编程中见过它们。\n\
    \n这是一个带有回调的按钮示例：\n\n```python\n# make a button with a callback\ndef callback():\n\
    \    \"\"\" this is called when the button is pressed \"\"\"\n    x = message.cget('text')\
    \ # get current text\n    if x == 'good night': message.config(text= 'hello world')\n\
    \    else: message.config(text='good night')\n\nbutton = tk.Button(root, text='press\
    \ me', command=lambda: callback())\nbutton.pack()\n```\n\n我们创建的按钮调用回调函数，该函数运行一个小例程，将文本框中的文本从“hello\
    \ world”切换为“good night”。\n\n它可以像所有其他Python函数一样用于任何其他更复杂的例程。此外，我们只是为了说明而使用了callback()这个名称，但我们可以使用更合适的名称，例如change_message_text()。\n\
    \n按钮设置好后，我们现在转向输入小部件，它允许用户输入单行文本。\n\n```python\n# make an entry box\nentry = tk.Entry(root)\n\
    entry.pack()\n```\n\n这就是所需的全部，我们可以使用.get()语句从框中获取文本。\n\n```python\nmy_text = entry.get()\n\
    print(my_text)\n```\n\n并将结果直接打印到控制台。我们可以将其添加到回调函数中，这样函数现在做两件事。[1] 更改文本标签消息，[2]\
    \ 打印到控制台。\n\n我们的基本代码如下所示：\n\n```python\nimport tkinter as tk\n\n# create an instance\n\
    root = tk.Tk()\nroot.title('Tkinter Window Demo')\n\n# get the screen dimension\n\
    screen_width = root.winfo_screenwidth()\nscreen_height = root.winfo_screenheight()\n\
    \n# the GUI width and height\nwindow_width = int(screen_width / 6)\nwindow_height\
    \ = int(screen_height / 3)\n\n# the GUI position\nwindow_x_pos = int(screen_width\
    \ * 0.3)\nwindow_y_pos = int(screen_height * 0.3)\n```"
