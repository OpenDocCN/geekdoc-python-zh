    The term imaginary[20] is rather confusing in the sense that it makes numbers
    sound quasi-magical to newcomers of the subject. The reality is that the imaginary
    part is an orthogonal axis to the real number line. And if we consider imaginary
    numbers to be **real orthogonal numbers**, then the per-se “*magic or imaginary
    concept*” is removed.


    The numbers a and b are real numbers, or in mathematical language we say: a, b
    ∈ **R** which means that *a and b belong to the set of real numbers*.


    Numbers are an abstract concept. They are created to serve a purpose for human
    needs and as such have evolved over time as the human understanding of the world
    has evolved. Whilst this is rather philosophical for a coding book, it is useful
    to gain an insight into numbers and therefore part of their history and evolution
    to understand the concept of complex numbers and their necessity.


    # **Integers:**


    A raw need to count with fingers for example. Count apples, oranges or stones.


    ![](img/4e4fc350228cd1c84055205e597f4fc0_151_1.png)


    # **Negative integers and Zero:**


    A ledger or balance and the concept of nothing (zero) requires both **negative**
    numbers and **zero**. In its most basic sense, negative numbers are necessary
    for sharing or taking.'
