    \ achieved.\n\n```python\nimport matplotlib.pyplot as plt\nimport numpy as np\n\
    \n# create x and y points\nx = np.linspace(0, 10, 50)\ny = np.random.random(50)\
    \ * np.linspace(0,10,50)\n\n# fit a linear curve an estimate its y-values and\
