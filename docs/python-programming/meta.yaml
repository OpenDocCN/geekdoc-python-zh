    ## 9.7. OTHER STANDARD PYTHON OBJECTS


    Python provides many other standard classes. Among these, lists, tuples, dictionaries,
    and sets are particularly useful.


    There are several standard objects or data types that are commonly used to represent
    and manipulate different kinds of data. Here are some of the most common standard
    Python objects:


    1. **Integers (int):** Integers are whole numbers, both positive and negative,
    without a decimal point. For example, 42 and -10 are integers.

    2. **Floating-Point Numbers (float):** Floating-point numbers represent real numbers
    with a decimal point or in exponential form. For example, 3.14 or 2.5e-3 are floating-point
    numbers.

    3. **Strings (str):** Strings are sequences of characters, and they are used to
    represent text data. For example, “Hello, World!” is a string.

    4. **Lists (list):** Lists are ordered collections of items. They can contain
    elements of different types and are mutable, meaning you can change their contents.
    For example, [1, 2, 3] is a list.

    5. **Tuples (tuple):** Tuples are similar to lists but are immutable, meaning
    you cannot change their contents once they are defined. They are typically used
    for fixed collections of items. For example, (1, 2, 3) is a tuple.

    6. **Dictionaries (dict):** Dictionaries are collections of key-value pairs, where
    each key maps to a value. They are also sometimes called associative arrays or
    hash maps. For example, {"name": "Alice", "age": 30} is a dictionary.

    7. **Sets (set):** Sets are unordered collections of unique elements. They are
    useful for performing set operations like union, intersection, and difference.
    For example, {1, 2, 3} is a set.

    8. **Booleans (bool):** Booleans represent two values: True and False. They are
    often used for making logical decisions and controlling the flow of programs.

    9. **None (NoneType):** None is a special object in Python that represents the
    absence of a value or a null value. It is commonly used to indicate that a variable
    or function doesn''t return anything.

    10. **Bytes and Bytearrays (bytes and bytearray):** These are used to represent
    sequences of bytes, often used for handling binary data or dealing with file I/O.

    11. **Enumerations (enum):** Enums are a way to create named constant values in
    Python, which can be more readable and maintainable than using raw integers or
    strings.

    12. **Complex Numbers (complex):** Complex numbers are used to represent numbers
    with both real and imaginary parts. They are written in the form a + bj, where
    a and b are real numbers, and j represents the imaginary unit.


    These are some of the standard Python objects or data types commonly used in Python
    programming. Python also provides various modules and libraries for more specialized
    data types and structures, depending on the specific needs of your application.


    ## 9.8. OBJECT MUTABILITY AND ALIASING


    Recall that a variable is a name that labels an object. We informally have treated
    a variable as the object it represents; for example, given the following statement


    ```python

    frac1 = Fraction(1, 2)

    ```


    We often refer to the object frac1. In fact, the object is the Fraction object
    representing the rational number 1/2, and frac1 is merely a name by which we can
    access the Fraction object. This informality has not been a problem so far, but
    as we explore objects more deeply we need to be more careful in how we talk about
    and use objects.


    ```python

    from fractions import Fraction

    f1 = Fraction(1, 2)

    f2 = Fraction(1, 2)

    f3 = f1

    # Examine the objects involved

    print(''f1 ='', f1)

    print(''f2 ='', f2)

    print(''f3 ='', f3)

    # Examine the numerators and denominators separately

    print(''f1 numerator, denominator:'', f1.numerator, f1.denominator)

    print(''f2 numerator, denominator:'', f2.numerator, f2.denominator)

    print(''f3 numerator, denominator:'', f3.numerator, f3.denominator)

    # Compare the fractions

    print(''f1 == f2?'', f1 == f2)

    print(''f1 == f3?'', f1 == f3)

    print(''f1 is f2?'', f1 is f2)

    print(''f1 is f3?'', f1 is f3)

    ```


    Output:


    ```

    f1 = 1/2

    f2 = 1/2

    f3 = 1/2

    f1 numerator, denominator: 1 2

    f2 numerator, denominator: 1 2

    f3 numerator, denominator: 1 2

    f1 == f2? True

    f1 == f3? True

    f1 is f2? False

    f1 is f3? True

    ```


