- md: "## Automation processes\n\nGetting data is important. Infact, aside from setting\
    \ up the environment it is the first task that a process usually has whether that\
    \ is in data science or any other field.\n\nThere are some key aspect of data\
    \ acquisition that one needs to consider:\n\n- Quantity of data\n- Speed (latency)\
    \ of transfer\n- Complexity of the data\n- Easy of access\n- Evolution of the\
    \ source\n\nThe above are some headline considerations, but can be further broken\
    \ down which is why it was prudent to pause on the selenium and beautiful soup\
    \ modules.\n\n**Quantity:**\nSome pieces of data might only be a few lines. For\
    \ example the price of a particular item in a supermarket. This might be in the\
    \ form of a web query where we would use the requests module.\n\nWe might also\
    \ have light data in the form of the price of a particular stock, but this would\
    \ be continuously changing throughout the course of the day, which would be more\
    \ suited to a websocket.\n\n**Speed:**\nAside from the volume of data requested,\
    \ various sources take different lengths of time to be acquired into the system.\
    \ For example reading a csv file via the pandas or csv modules is a relatively\
    \ fast process compared to an http request via the web.\n\nIf a user was to make\
    \ many http requests, then they would need to consider asynchronous methods (such\
    \ as asyncio, threading or multiprocessing) such that the requests do not block\
    \ each other.\n\nWe call this “speed” the **latency** of the network which involves\
    \ the round trip of the data request and receiving the data pursuant to the request.\n\
    \nSo reading a file is low latency whereas reading a web page is high latency.\n\
    \n**complexity:**\nNext we need to consider the complexity of the data. This will\
    \ encompass factors like which format does the data come in, for example text,\
    \ csv or json and also how structured in the data.\n\nA flat csv file will read\
    \ very quickly into a pandas dataframe, whereas a json file is larger, but may\
    \ contain richer content such as many nested levels.\n\nWe also need to consider\
    \ encoding of the data and if omitted it would break or mean something different\
    \ in the selenium and bs4 modules than we may otherwise have expected.\n\n**Ease\
    \ of access:**\nThis aspect might seem trivial, but there are a whole host of\
    \ features which prevent simple data transfer. This could be as simple as access\
    \ to a database or a password or link or forwarded page in an html document where\
    \ the user logs into one page and is sent elsewhere to a second or third page\
    \ to get the data that they need.\n\nSometimes, the method of access will change\
    \ when the system is updated. Like an upgraded API.\n\nThe other issue is that\
    \ some web hosts are averse to openly sharing data in a machine readable format\
    \ or be scraped by bots and have measures in place to prevent this. The user would\
    \ then have to resort to alternative measures such as a headless browser.\n\n\
    ## Evolution of the source:\n\nThe internet, databases and other sources such\
    \ as the likes of ccd arrays (ie. web cameras) are continually evolving. Most\
    \ prominently the evolution and format of web pages. It is quite common to create\
    \ a crawler that works very well for a significant period of time, but then breaks\
    \ when the formatting of the web page changes.\n\nThis is because a typical html\
    \ document is made up from elements and with a refactoring of the website a number\
    \ of the terms will change, just like a refactoring of code might prompt the coder\
    \ to modify their variable names even if it is for a simple reason like clarity.\n\
    \nNevertheless, if the scraping code is searching an HTML page for an element\
    \ or xPath[28] that no longer exists and relies on this data, then the scraping\
    \ code will be compromised.\n\nAnd this is the curse of the “whoops, they redesigned”\
    \ problem.\n\n## The optimal tool:\n\nFinally, with a more complete knowledge\
    \ of the products available, let's explore various data sources and the appropriate\
    \ Python tool for completing the task.\n\n| Content type | method |\n|---|---|\n\
    | files | - Read and write with context managers.<br>- Read csv, pandas.read_csv<br>-\
    \ Read json |\n| database | Database tools like SQLite |\n| Web page | - **With\
    \ basic text**: requests, beautiful soup<br>- **Tables**: pandas read_html()<br>-\
    \ **with data file**: requests, selenium<br>- **With clicks / navigation**: selenium\
    \ |\n| Peripherals | treat as files |\n\nNote that there are many ways to skin\
    \ the cat, but the above table provides some useful guidelines.\n\n## Others\n\
    \nOther ideas that are not yet complete.\n\n## My first problem\n\nThis was actually\
    \ probably not my first ever problem, but it was the first time that I was stumped\
    \ enough to have the need to go to the stack to ask a question for Python as previously\
    \ I had been using Node.JS which is another popular scripting language (and one\
    \ which uses curly braces, semicolons and // for comments).\n\nThe process of\
    \ asking a good question, which we can define as one in which the community will\
    \ give you up votes instead of down votes is a rather lengthy process.\n\nThere\
    \ is actually a specific format that was alluded to earlier which we will adhere\
    \ to time and time again. This is the **Minimal, Reproducible Example**.\n\nAt\
    \ this point I am concerned enough to ask the question in such a way that the\
    \ community can see that I have:\n\n- researched the issue sufficiently\n- provided\
    \ enough code that others can replicate the problem quickly\n- made an attempt\
    \ at what I consider to be a solution\n- clearly state what I do and don’t understand\n\
    - very specific in what the desired output should be\n\nIf the user has not done\
    \ these basic things, then they risk being downvoted.\n\nSo, let’s get back to\
    \ the point, my problem was this:\n\n```\nHTTPError: Forbidden\n```\n\n```\nI\
    \ get HTTPError: Forbidden error when trying to read from a website that requires\
    \ feedback response in the form of radio buttons. How to resolve this ???\n\n\
    An example url link that causes the error is commented out: url = 'http://www.londonstockexchange.com/exchange/news/market-news/market-news-detail/WWH/13673174.html'\n\
    ```\n\nThis was something very specific and annoying at the time. Whilst I was\
    \ able to use a specific library (in this case the requests module). I was unable\
    \ to navigate beyond the first press of a button on the website.\n\nI was trying\
    \ to do something rather simple, let the code navigate a web page for me, but\
    \ was getting stuck early on and the web page in question required the user to\
    \ click a radio box button and if they did not, then they would get this Forbidden\
    \ error.\n\nI provided the code that I had done:\n\n```python\nimport urllib.request\
    \ as req\nimport re\n\nfrom bs4 import BeautifulSoup\n\n\n# get all text from\
    \ websites.\nurl = 'https://www.bbc.co.uk/sport/football'\n#url = 'http://www.londonstockexchange.com/exchange/news/market-news/market-news-de\n\
    html = req.urlopen(url).read()\nsoup = BeautifulSoup(html)\n\n# kill all script\
    \ and style elements\nfor script in soup([\"script\", \"style\"]):\n    script.extract()\
    \    # rip it out\n\n# get text\ntext = soup.get_text()\n\n# break into lines\
    \ and remove leading and trailing space on each\nlines = (line.strip() for line\
    \ in text.splitlines())\n# break multi-headlines into a line each\nchunks = (phrase.strip()\
    \ for line in lines for phrase in line.split(\"  \"))\n# drop blank lines\ntext\
    \ = '\\n'.join(chunk for chunk in chunks if chunk)\n\nprint(text)\n```\n\nThis\
    \ particular question got 79 views and nobody posted any answers"
