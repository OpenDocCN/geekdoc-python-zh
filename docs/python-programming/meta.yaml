  - '[PAGE 146]


    This was a very short snip of an animation, but here are the general rules for
    all similar GUI’s (like pygame):


    +   1. The images and sounds are usually stored in a sub-folder called “assets”.

    2. All images are squares which have transparent backgrounds. The squares are
    defined by the top left corner, so to get the centre we would need to obtain the
    image width & height and divide by 2.

    3. We use the centres and widths to determine collisions with other objects and
    also the screen edges (in the example code, the planets simply disappear off the
    screen).

    4. There is always a loop, which is usually a while loop.

    5. We keep redrawing the images in their new positions before updating the loop
    win.update() . And importantly, **this is the effect of motion**.


    There are lots of things that we could do from here, for example we could assign
    masses to the two planets and invoke the force of gravity from each one upon the
    other.


    The force of attraction on each planet (or particle) would be


    $$F = -\frac{GMm}{r^2}$$


    Where r is the distance between the two:


    $$r^2 = x^2 + y^2$$


    M is the mass of the other planet (or if more than one planet, it would be the
    sum of the system of planets). With this method, not only could we do a simulation
    of planetary movements, but we could model entire galaxies or clusters of thousands
    of stars colliding.


    The processing power of modern day computers, let alone high powered computers,
    are more than capable of producing amazing simulations. And what we would observe
    is chaotic motion but with broad observable and rather beautiful patterns.'
