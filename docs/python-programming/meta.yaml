    \nPython开箱即用地提供SQLite作为核心模块之一，自2.5版本（即3.0版本之前）以来一直如此。\n\n> “SQLite是一个进程内库，它实现了一个**自包含、无服务器、零配置、事务性**的SQL数据库引擎”。\n\
