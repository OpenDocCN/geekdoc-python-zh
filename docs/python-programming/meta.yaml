    # 4.1. BOOLEAN EXPRESSIONS


    Arithmetic expressions yield numeric values, while Boolean expressions, also known
    as predicates, can only have two possible values: false or true. The name ‘Boolean’
    originates from the renowned British mathematician George Boole, and Boolean algebra,
    a branch of discrete mathematics, focuses on exploring the properties and manipulation
    of logical expressions. Although Boolean expressions may seem less complex than
    numeric ones, they play a vital role in constructing more captivating and functional
    programs. In Python, the most basic Boolean expressions are represented by True
    and False. When using a Python interactive shell, we observe:


    ```

