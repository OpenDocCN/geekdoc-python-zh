  md: 'reduces the propagation although ultimately the same number of people would
    catch the virus at some point as ultimately immunity needs to be achieved on the
    individual basis.


    So now we transfer our focus on the mathematics of how a rumour might propagate
    through a system. If we consider the rumour itself as a transfer of information
    irrespective as to if it is a truth ( True ) or a lie ( False ). For example,
    the rumour could have been about the severity of the virus in the previous section
    (scaremongering[23]) or some other kind of truth or lie about a completely unrelated
    subject.


    So what are the rules of the transfer of a rumour?


    +   1. A certain percentage of people start the rumour.

    2. Any person that hears the rumour tells their friends.

    3. The person no longer tells others and stops caring.


    Broadly speaking, with the above rules and our knowledge of the model results
    from infectious disease, we might intuitively guess that the propagation dynamics
    will in some way be shared.


    Our rumour model does not have a physical proximity characteristic because the
    various forms of social media mean that the transmission does not require physical
    interaction. However, *the same proximity characteristic will manifest itself
    in the sense that a person tells their closest friends*.


    The above translates into the mathematics of the connectivity of people. A *more
    connected system* could be perceived to be analogous to a densely populated system
    with lots of movement (boiling water in a pot). Ultimately, the transmission is
    expected to be high in this scenario.


    Knowing that the transmission is high, we now have to be aware of well connected
    people (super spreaders). A well connected person (such as a social influencer
    or a media channel) will propagate the message faster.


    A person who is a super spreader transmits in the same way as a person who is
    highly infectious and moves around a lot in the infectious disease model.


    So let''s try to set up a model but again respecting many of the inputs that we
    could include but have elected not to for the purpose of simplicity.'
