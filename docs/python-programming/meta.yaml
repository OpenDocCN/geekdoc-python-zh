  - '[PAGE 235]


    # Three body problem


    The three body problem is interesting in the sense that it represents another
    type of chaotic problem where *slight changes in the initial conditions produce
    dramatically different outcomes*.


    At the same time, there is a level of predictability as each of the bodies in
    the problem follow a pre-described pattern of motion which is the force of gravity.


    ```

    $$\hat{\mathbf{f}} = \mathbf{G} \frac{m_1 m_2}{r^2} \cdot \hat{\mathbf{r}}$$

    ```


    In an arbitrary coordinate system of our choosing.


    ![](img/4e4fc350228cd1c84055205e597f4fc0_235_0.png)


    And the fact that the acceleration of a body is proportionate to the force exerted
    upon it.'
  - '[PAGE 236]


    $$\hat{\mathbf{f}} = m_i \frac{d^2\hat{\mathbf{r}}_i}{dt^2}$$


    And combining the equations yields the equation of motion of each body.


    $$m_1 \frac{d^2\hat{\mathbf{r}}_1}{dt^2} = G \frac{m_1 m_2}{r^2} \cdot \hat{\mathbf{r}}$$


    In fact, we know that 2-bodies behave in an orderly way and sometimes display
    beautiful behaviour. We could call these orderly patterns, the stable states.
    They are predictable and the solution deviates towards them just like we saw in
    the mandelbrot set, where there are areas of convergence.


    For the 2-body problem, the stable states are the elliptic (or circular) orbits
    that the model predicts and that we commonly observe. So it is the introduction
    of a third body that throws the system into chaos.


    It is important to note that our use of the word chaos means *outcomes which are
    sensitive to initial conditions*. There will be boundary conditions and positions
    that the chaos cannot produce in the same way that when we looked at the double
    pendulum, even though we would struggle to predict the position of the lower pendulum
    at any point in time, we still knew that it exists at a distance < $L_1 + L_2$
    from the attachment point which was guaranteed by the length of the pendulum rods.


    So we might expect something similar to be the case for the 3-bodies. So let’s
    get into the code.


    We first set up the initial conditions. Our force of gravity, g, the masses of
    the 3 bodies along with their starting positions and velocities. The only modules
    needed were `matplotlib` and `numpy`.


    ```

