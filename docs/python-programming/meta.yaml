    \ plt.subplots()\nax.plot(x, y, '.', color='green')\nax.plot(x, y_est, '--', color='red')\n\
    \nplt.show()\n```\n\nThis is the result for 50 and 500 points respectively:\n\n\
    ![](img/4e4fc350228cd1c84055205e597f4fc0_87_0.png)\n\nWe were able to quickly\
