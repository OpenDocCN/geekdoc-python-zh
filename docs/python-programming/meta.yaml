- md: "## Importing modules\n\nAt the top of nearly every piece of code you will tend\
    \ to see a bunch of import commands. It is convention to place all import statements\
    \ at the beginning of a module or script.\n\nOne reason that we do this is because\
    \ it helps us (the users or the next programmer) to remember what we imported\
    \ externally from the code. These are external files, called dependencies as the\
    \ code will not run without them that is being imported into the code's ecosystem.\n\
    \nCommon modules are: time, datetime, math, random, statistics, requests, pandas,\
    \ numpy...\n\n```python\nimport time    # a module of useful time functions\n\n\
    t = time.time()\nprint(t)\n\n# the result\n# 1660605141.3659403\n```\n\nIn fact\
    \ the list is nearly endless as there are over 200 standard libraries and over\
    \ 137,000 external libraries. This is one of the major attractions of a language\
    \ like python which has a massive community with immense support.\n\nA standard\
    \ library is one which comes already packaged with python so is already on the\
    \ desktop and available to use when python is installed and there are fewer of\
    \ these otherwise the download would be very data consuming.\n\nThe external libraries\
    \ are relatively easy to install with something called a package manager (pip\
    \ or conda), which is usually done with one line in a command prompt.\n\nThe modules\
    \ usually have relevant names that give a clue as to what they do, but also have\
    \ the same descriptions and docstrings so that the user can verify if they are\
    \ suitable for the task at hand.\n\nExamples of internal modules:\n\n- **Time**:\
    \ provides various time-related functions\n- **Datetime**: supplies classes for\
    \ manipulating dates and times\n- **Math**: access to the mathematical functions\n\
    - **Random**: implements pseudo-random number generators for various distributions\n\
    - **Statistics**: provides functions for calculating mathematical statistics\n\
    \nExamples of external modules:\n\n- **Requests**: a simple, yet elegant, HTTP\
    \ library.\n- **Pandas[1]**: powerful Python data analysis toolkit\n- **Numpy**:\
    \ the fundamental package for array computing with Python\n- **Scipy**: Scientific\
    \ Library for Python\n\nTwo of the most common external libraries are numpy and\
    \ pandas and here is an example of the install in windows.\n\n![](img/4e4fc350228cd1c84055205e597f4fc0_42_0.png)\n\
    \nIn fact pandas and numpy are so commonly used that they come installed with\
    \ the Anaconda package which describes itself as “The world’s most popular open-source\
    \ Python distribution platform”.\n\nBasically in simple terms, we like to keep,\
    \ use and repeat the good code so that we don’t continuously waste our time reinventing\
    \ the wheel.\n\nWhen the code gets sufficient and complete enough, it becomes\
    \ worth packaging this into a library.\n\nPython along with all other modular\
    \ languages benefit greatly from these libraries as the user only needs to install\
    \ the core components that are relevant to them.\n\nFor example, **let’s generate\
    \ a list of random numbers and work out the min, max, avg & std of that list and\
    \ then see how long it takes to perform this operation.**\n\n```python\n# the\
    \ imports\nimport time       # module for time\nimport random     # module for\
    \ random numbers\nimport statistics # statistics module\n```\n\n```python\nt0\
    \ = time.time()          # the start time\n\nrand_list = []            # an empty\
    \ list\nfor i in range(100_000):   # loop 1000 times\n    r = random.randint(0,100)\
    \ # a random integer\n    rand_list.append(r)    # add this to the list\n\n# print\
    \ the results\nprint('min:', min(rand_list))\nprint('max:', max(rand_list))\n\
    print('avg:', statistics.mean(rand_list))\nprint('std:', statistics.stdev(rand_list))\n\
    \nt1 = time.time()          # the end time\ntime_taken = round(t1-t0, 2) # time\
    \ taken (2dp)\n\nprint('the time taken is', round(t1-t0, 2), 'seconds')\n```\n\
    \nThe results look like this:\n\n```\nmin: 0\nmax: 100\navg: 50.10659\nstd: 29.136766431494777\n\
    the time taken is 0.24 seconds\n```\n\nSo we have generated a random list of 100,000\
    \ integers and computed basic statistics on this random list in less than ¼ of\
    \ a second. And all of this is done in less than 20 lines of code.\n\nIn fact,\
    \ with list comprehensions and a bit of tidying up, this could be done in 10 lines\
    \ of code. And if we deployed the numpy library, the speed would have been faster\
    \ too.\n\n```python\n# list comprehension replaces for loop\nrand_list = [random.randint(0,100)\
    \ for x in range(1_000_000)]\n```\n\nSometimes the library module names can be\
    \ rather long, for example random.randint() is quite lengthy. Or statistics.stdev().\
    \ When repeated many times in the same line, the code gets verbose and cluttered.\n\
    \nFortunately python offers an alias system so that we can shorthand the longer\
    \ names to more convenient names.\n\n```python\nimport random as rd    # alias\
    \ is assigned: rd\nimport statistics as sts  # alias is assigned: sts\n```\n\n\
    ```python\nr = rd.randint(0,100)  # we can use the alias rd\n```\n\nA very popular\
    \ library is matplotlib which is used for plotting charts. The typical module\
    \ import looks like this:\n\n```python\nfrom matplotlib import pyplot as plt\n\
    ```\n\nWhich looks like a handful for one line of code, but is in fact quite simple.\
    \ Because pyplot is simply a function that lives inside the matplotlib module\
    \ and plt is just the alias we assign to the thing that we want. We shall look\
    \ into this more later on.\n\nFinally, a common pitfall on importing modules.\
    \ Python allows for wildcard imports. This means that the user can do this:\n\n\
    ```python\nfrom math import *\nfrom os import *\nfrom tkinter import *\n```\n\n\
    The wildcard `*` means that all the methods will be imported. So for example,\
    \ instead of doing this:\n\n```python\nx = math.cos(90)\n```\n\nWe can now do\
    \ this:\n\n```python\ny = cos(90)\n```\n\nThere is clearly a level of convenience\
    \ that comes with this as the former is more longwinded than the latter. And actually,\
    \ for smaller modules this would be sufficient.\n\nHowever, the drawback is that\
    \ without knowing the myriad of methods that are contained in the module, we could\
    \ easily overwrite them and furthermore, it is no longer clear where `cos()` came\
    \ from. Again, for small pieces of code, we could say that this is easy as `cos()`\
    \ is clearly a maths function and has come from the maths module, but look at\
    \ this error.\n\n```python\nfrom PIL import Image, ImageTk\nfrom tkinter import\
    \ *\n```\n\nThe `tkinter` module contains a method called `Image`, but the coder\
    \ thinks that the `Image` method has been called from the `PIL` module[2].\n\n\
    Because Python allows for reassignment the first import of the Image function\
    \ is overwritten by the second one without warning and this was probably unintended.\n\
    \nSo it is helpful to be clear with imports and in this case an alias would have\
    \ been more suitable and removed the ambiguity:\n\n```python\nimport tkinter as\
    \ tk\n```\n\nAnd this is clear.\n\n## Logical order\n\nWe learned earlier that\
    \ python code is executed line by line in sequential order.\n\nThis means that\
    \ the order matters. For example we can not use a variable before it is defined\
    \ and similarly we cannot use a function before it is defined.\n\nThis takes some\
    \ getting used to compared to other languages where the functions are hoisted\
    \ which means that with other languages, we can dump the big bulky functions at\
    \ the bottom of the code. In python we can not do this as the need to be read\
    \ first.\n\nfor variables:\n\n```python\nx = 10    # define x\nprint(x)  # this\
    \ works, x was defined\n\nprint(y)  # this fails, y is not defined yet\ny = 10\
    \    # define y, but too late !!\n```\n\nWe see that this throws a NameError,\
    \ which means there is an error with the name. It was not defined at the time\
    \ it was run.\n\n```\nNameError: name 'y' is not defined\n```\n\nand for functions:\n\
    \n```python\n# the function has not been defined\n# so it fails\nprint( add_numbers(1,\
    \ 2) )\n\ndef add_numbers(a,b):\n    return a + b\n\n# we can call the function\
    \ here\nprint( add_numbers(1, 2) )\n```\n\nBecause of this, python behaves in\
    \ a synchronous way. what comes first goes first. So the user must be careful\
    \ of order and can not be casual.\n\nThis can sometimes be frustrating as often\
    \ it can be helpful to put the main body of code at the top and call the functions\
    \ later (especially for those who have come from languages like visual basic and\
    \ node.js).\n\nHowever, there is a neat little trick in python which is to wrap\
    \ the invocation"
  mdcn: "## 导入模块\n\n几乎在每段代码的开头，你都会看到一堆导入命令。按照惯例，所有导入语句都应放在模块或脚本的开头。\n\n我们这样做的一个原因是，它有助于我们（用户或下一位程序员）记住从代码外部导入了哪些内容。这些是外部文件，被称为依赖项，因为没有它们代码将无法运行，它们被导入到代码的生态系统中。\n\
    \n常见的模块有：time、datetime、math、random、statistics、requests、pandas、numpy……\n\n```python\n\
    import time    # a module of useful time functions\n\nt = time.time()\nprint(t)\n\
    \n# the result\n# 1660605141.3659403\n```\n\n事实上，这个列表几乎是无穷无尽的，因为有超过200个标准库和超过137,000个外部库。这是像Python这样语言的主要吸引力之一，它拥有一个庞大的社区和巨大的支持。\n\
    \n标准库是随Python一起打包的，因此在安装Python时就已经在桌面上并可使用，而且这类库数量较少，否则下载将非常耗数据。\n\n外部库相对容易安装，可以使用称为包管理器（pip或conda）的工具，通常在命令提示符下用一行命令即可完成。\n\
    \n模块通常有相关的名称，暗示了它们的功能，同时也具有相同的描述和文档字符串，以便用户验证它们是否适合手头的任务。\n\n内部模块示例：\n\n- **Time**：提供各种与时间相关的函数\n\
    - **Datetime**：提供用于操作日期和时间的类\n- **Math**：访问数学函数\n- **Random**：实现各种分布的伪随机数生成器\n\
    - **Statistics**：提供用于计算数学统计的函数\n\n外部模块示例：\n\n- **Requests**：一个简单而优雅的HTTP库。\n-\
    \ **Pandas[1]**：强大的Python数据分析工具包\n- **Numpy**：Python数组计算的基础包\n- **Scipy**：Python的科学库\n\
    \n两个最常见的外部库是numpy和pandas，以下是Windows系统下的安装示例。\n\n![](img/4e4fc350228cd1c84055205e597f4fc0_42_0.png)\n\
    \n事实上，pandas和numpy使用如此普遍，以至于它们随Anaconda包一起安装，Anaconda自称是“世界上最受欢迎的开源Python分发平台”。\n\
    \n简单来说，我们喜欢保留、使用和重复好的代码，这样我们就不会不断浪费时间重复造轮子。\n\n当代码变得足够充分和完整时，就值得将其打包成一个库。\n\n\
    Python以及所有其他模块化语言都从这些库中受益匪浅，因为用户只需要安装与他们相关的核心组件。\n\n例如，**让我们生成一个随机数列表，计算该列表的最小值、最大值、平均值和标准差，然后看看执行此操作需要多长时间。**\n\
    \n```python\n# the imports\nimport time       # module for time\nimport random\
    \     # module for random numbers\nimport statistics # statistics module\n```\n\
    \n```python\nt0 = time.time()          # the start time\n\nrand_list = []    \
    \        # an empty list\nfor i in range(100_000):   # loop 1000 times\n    r\
    \ = random.randint(0,100) # a random integer\n    rand_list.append(r)    # add\
    \ this to the list\n\n# print the results\nprint('min:', min(rand_list))\nprint('max:',\
    \ max(rand_list))\nprint('avg:', statistics.mean(rand_list))\nprint('std:', statistics.stdev(rand_list))\n\
    \nt1 = time.time()          # the end time\ntime_taken = round(t1-t0, 2) # time\
    \ taken (2dp)\n\nprint('the time taken is', round(t1-t0, 2), 'seconds')\n```\n\
    \n结果如下所示：\n\n```\nmin: 0\nmax: 100\navg: 50.10659\nstd: 29.136766431494777\nthe\
    \ time taken is 0.24 seconds\n```\n\n因此，我们生成了一个包含100,000个整数的随机列表，并在不到四分之一秒的时间内计算了该随机列表的基本统计数据。所有这一切都在不到20行代码内完成。\n\
    \n事实上，使用列表推导式并稍加整理，这可以在10行代码内完成。如果我们使用numpy库，速度也会更快。\n\n```python\n# list comprehension\
    \ replaces for loop\nrand_list = [random.randint(0,100) for x in range(1_000_000)]\n\
    ```\n\n有时库模块名称可能相当长，例如random.randint()就相当冗长。或者statistics.stdev()。当在同一行中多次重复时，代码会变得冗长和杂乱。\n\
    \n幸运的是，Python提供了一个别名系统，这样我们可以将较长的名称简写为更方便的名称。\n\n```python\nimport random as rd\
    \    # alias is assigned: rd\nimport statistics as sts  # alias is assigned: sts\n\
    ```\n\n```python\nr = rd.randint(0,100)  # we can use the alias rd\n```\n\n一个非常流行的库是matplotlib，用于绘制图表。典型的模块导入如下所示：\n\
    \n```python\nfrom matplotlib import pyplot as plt\n```\n\n这看起来一行代码有点复杂，但实际上相当简单。因为pyplot只是matplotlib模块中的一个函数，而plt只是我们分配给所需内容的别名。我们稍后会更深入地探讨这一点。\n\
    \n最后，关于导入模块的一个常见陷阱。Python允许通配符导入。这意味着用户可以这样做：\n\n```python\nfrom math import *\n\
    from os import *\nfrom tkinter import *\n```\n\n通配符`*`意味着所有方法都将被导入。因此，例如，我们不必这样做：\n\
    \n```python\nx = math.cos(90)\n```\n\n我们现在可以这样做：\n\n```python\ny = cos(90)\n```\n\
    \n这显然带来了一定程度的便利，因为前者比后者更冗长。实际上，对于较小的模块，这已经足够了。\n\n然而，缺点是，如果不了解模块中包含的无数方法，我们很容易覆盖它们，而且，不再清楚`cos()`来自哪里。同样，对于小段代码，我们可以说这很容易，因为`cos()`显然是一个数学函数，来自数学模块，但看看这个错误。\n\
    \n```python\nfrom PIL import Image, ImageTk\nfrom tkinter import *\n```\n\n`tkinter`模块包含一个名为`Image`的方法，但程序员认为`Image`方法是从`PIL`模块[2]调用的。\n\
    \n因为Python允许重新赋值，第一个导入的Image函数被第二个覆盖而没有警告，这可能是无意的。\n\n因此，明确导入是有帮助的，在这种情况下，使用别名会更合适，并消除歧义：\n\
    \n```python\nimport tkinter as tk\n```\n\n这样就很清楚了。\n\n## 逻辑顺序\n\n我们之前学过，Python代码是按顺序逐行执行的。\n\
    \n这意味着顺序很重要。例如，我们不能在定义变量之前使用它，同样，我们也不能在定义函数之前使用它。\n\n与其他语言相比，这需要一些适应，因为其他语言中的函数会被提升，这意味着在其他语言中，我们可以将大型函数放在代码底部。在Python中我们不能这样做，因为它们需要先被读取。\n\
    \n对于变量：\n\n```python\nx = 10    # define x\nprint(x)  # this works, x was defined\n\
    \nprint(y)  # this fails, y is not defined yet\ny = 10    # define y, but too\
    \ late !!\n```\n\n我们看到这会抛出一个NameError，这意味着名称有错误。它在运行时未被定义。\n\n```\nNameError:\
    \ name 'y' is not defined\n```\n\n对于函数：\n\n```python\n# the function has not been\
    \ defined\n# so it fails\nprint( add_numbers(1, 2) )\n\ndef add_numbers(a,b):\n\
    \    return a + b\n\n# we can call the function here\nprint( add_numbers(1, 2)\
    \ )\n```\n\n因此，Python以同步方式运行。先出现的先执行。所以用户必须注意顺序，不能随意。\n\n这有时会令人沮丧，因为通常将主要代码放在顶部并在之后调用函数会很有帮助（特别是对于那些来自Visual\
    \ Basic和Node.js等语言的人）。\n\n然而，Python中有一个巧妙的小技巧，那就是将调用包装"
