    \n# Collatz Conjecture\n\nThe Collatz Conjecture is the simplest maths problem\
    \ no one can solve. It is easy enough for almost anyone to understand but notoriously\
    \ difficult to solve.\n\ngiven any number:\n\n+   - if odd: n = n*3 + 1\n- if\
    \ even: n = n/2\n\nThe final value is always a [4,2,1] loop.\n\n```\nimport matplotlib.pyplot\
    \ as plt\nfrom numpy import average, std\n\ndef f(n):\n    \"\"\" the function\
    \ itself:\n\n    given an input n, what is the next value\n    \"\"\"\n    if\
    \ n % 2 == 0:\n        # have an even number\n        v = int(n/2)\n        return\
    \ v\n    if n%2 !=0:\n        # have an odd number\n        v = n * 3 + 1\n  \
    \      return v\n```"
