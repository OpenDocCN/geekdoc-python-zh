  md: 'So we have been through the classical types of data: strings , integers , floating
    numbers , Booleans & None’s . And we have taken these numbers and put them into
    new types as collections of data called lists , dicts , tuples and sets .


    We discussed that a variable is allocated a piece of memory space and drew an
    analogy to a bucket. And then we discussed that those buckets could be put into
    bigger buckets (the collections) which are also allocated space in the memory.


    So let’s take a simple example.


    ```

    # %%  the memory location of a variable is mutable

    x = 10      # assign x the value of 10

    print(id(x))  # print the ID (memory location) of x

    x = 11      # assign x the new value of 11

    print(id(x))  # print the ID (memory location) of x

    ```


    The result is this:


    ```

    2863537193488

    2863537193520

    ```


    We see that the memory location of x had changed when its value changed from (10
    to 11). So the memory location of a variable is mutable.


    Now let’s do the same with a list.


    ```

    # %%  the memory location of a variable is immutable


    x = [1,2,3]  # assign x the value of [1,2,3]

    print(id(x))  # print the ID (memory location) of x

    x.append(4)  # add an element to the list [1,2,3,4]

    print(id(x))  # print the ID (memory location) of x

    ```


    The result is this:


    ```

    2864017202368

    2864017202368

    ```


    We see that even though we have changed the value of x from [1,2,3] to [1,2,3,4],
    the memory location of x remained the same. So the memory location of a list is
    immutable.


    Mutable is a fancy way of saying that the internal state of the object is'
