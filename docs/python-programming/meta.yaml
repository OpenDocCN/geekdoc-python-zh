    ```\n\nA string literal that starts with a single quote or double quote must also\
    \ end with the matching quote on the same line where it begins. As shown in Section\
    \ 2.5, we can add newline control codes (`\\n`) to create line breaks within the\
    \ string:\n\n```python\nx = 'This is a long string with\\nseveral words'\n```\n\
    \nHowever, this approach can make the string less readable within the source code.\
    \ Python provides an alternative way to represent strings that span multiple lines\
    \ more naturally, using triple quotes (`\"\"\"` or `'''`). These triple quotes\
    \ delimit strings that can cover multiple lines in the source code. For instance,\
