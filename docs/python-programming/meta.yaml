    \ these. This could be useful for avoiding bumping into a chair or staying in\
    \ the centre of a road.\n\nAs a final note, it is possible to do the reverse of\
    \ a dilation, which is known as erosion like this:\n\n```python\nimg_eroded =\
    \ cv2.erode(img_dilation, kernel, iterations=2)\ncv2.imshow('eroded image', img_eroded)\n\
    cv2.waitKey(0)\n```\n\nAnd erosion of iterations=2 is not equal to a dilation\
    \ of the same order in an analogous way to 90% not being the opposite to 110%\
    \ (think about that for a second). To undo an operation, it is cleaner to return\
    \ to the previous operation.\n\n## Resizing and cropping\n\nImages in opencv and\
    \ other similar applications tend to define the coordinate system from the top\
    \ left hand corner of the screen. That means that the top left is the point of\
    \ origin (x=0, y=0).\n\nThis is different from the standard cartesian coordinate\
    \ system that we are used to which has the origin in the bottom left hand corner\
    \ and can also have negative values.\n\n| Cartesian coordinates | Screen coordinates\
    \ |\n| :--- | :--- |\n| | |\n\nNegative numbers are “off the screen”. Also numbers\
    \ greater than width and height exist outside the boundary of the visible screen,\
    \ so would not be drawn or shown.\n\nMost drawing packages tend to follow the\
    \ same coordinate system and we have already experienced the same in the GUI sections\
    \ (for turtle, tkinter and pygame).\n\nNow that we understand how to represent\
    \ an image, we can dive into the code with our example image:\n\n```python\nimport\
    \ cv2\n\nimg = cv2.imread('assets/apple_colour.png')\n\nh, w, c = img.shape\n\
    print(img.shape)\nprint(f'height: {h}, width: {w}, colours: {c}')\n```\n\nWe are\
    \ able to get the shape using the shape property, which returns a tuple containing\
    \ the height, width and number of colours (BGR) in our case.\n\nOur code returned\
    \ this:\n\n```\n(1204, 1164, 3)\nheight: 1204, width: 1164, colours: 3\n```\n\n\
    So now we have the dimensions of the picture.\n\nWe can now use the resize() method\
    \ to change the dimensions of the image, such as shrinking or stretching it by\
    \ adding the following code:\n\n```python\nimg_resize = cv2.resize(img, (100,100))\n\
    img_stretch = cv2.resize(img, (500,200))\n\ncv2.imshow('resized image', img_resize)\n\
    cv2.imshow('resized image', img_stretch)\ncv2.waitKey(0)\n```\n\nNoting that the\
    \ resize takes a tuple (width, height) which was a different order to the shape\
    \ property of (height, width, colour).\n\nSo with opencv, we need to be careful\
    \ of the order of the dimensions and colours.\n\nHere is the resulting image:\n\
    \nAfter resizing (stretching) an image, we may also want to crop an image. This\
    \ is useful when the user wants just one particular area of interest from a much\
    \ larger image, for example a face of one individual from a crowd of people or\
    \ a licence plate of a car amid the traffic etc.\n\nFor cropping, we do not require\
    \ a method in the module because we can take advantage of our knowledge that an\
    \ image is a matrix (which is a list of lists), so we can just extract the area\
    \ of interest by slicing the list.\n\nPython natively offers a useful feature\
    \ for lists called slicing which works as follows:\n\n```python\nx = ['a', 'b',\
    \ 'c', 'd', 'e', 'f', 'g', 'h']\nx[3:6]\n\n# returns this: ['d', 'e', 'f']\n```\n\
    \nGiven a list, we can extract a portion (*called a slice*) of a list from a start\
    \ index (remembering that indices start from zero) to an end index (but not including\
    \ the end index itself).\n\nSo in the example above x[3:6] returns the letters\
    \ in index positions 3, 4 and 5. Which are ‘d’, ‘e’, ‘f’.\n\nSo using this convenient\
    \ and pythonic method would just need this:\n\n```python\nimg_cropped = img[350:1050,\
    \ 200:975]\ncv2.imshow('cropped image', img_cropped)\n```\n\nHere we have cropped\
    \ (by slicing) elements 350 to 1050 in the vertical direction (y-axis) and elements\
    \ 200 to 975 in the horizontal direction (x-axis). Which results in selecting\
    \ only the apple from the original image.\n\nThe resulting image is also smaller\
    \ in size by virtue of a new smaller height and width.\n\n## Shapes and text\n\
    \nThis section covers the basics of adding various lines and shapes to an image.\
    \ We recall that the image is just a matrix of numbers.\n\nWe can create a square\
    \ image of 512 x 512 and assign each element of the image with a zero value remembering\
    \ that zero represents black (no colour).\n\nInside this square black image we\
    \ create a long purple (purple is blue mixed with red) rectangle.\n\n```python\n\
    import cv2\nimport numpy as np\n\nimg = np.zeros((515, 512, 3)) # black square\n\
    \n# purple rectangle, height=200, width=20\nimg[100:300, 200:220] = (255,0,255)\n\
    \ncv2.imshow('image', img)\ncv2.waitKey(0)\n```\n\nWe use the same slicing technique\
    \ as we used from the cropping section to create the rectangle.\n\nTo this image,\
    \ we add a green line starting at the origin (0,0) and going to the bottom right\
    \ corner (512,512).\n\n```python\n# green diagonal line\ncv2.line(img, (0,0),\
    \ (512, 512), color=(0,255,0), thickness=2)\n```\n\nWe then add a yellow rectangle.\n\
    \n```python\n# yellow rectangle\ncv2.rectangle(img, (100,50), (250,250),\n   \
    \           color=(0,255,255), thickness=10)\n```\n\nThe rectangle is defined\
    \ in a similar way to the line. All the user was required to do was input the\
    \ coordinates of the top left and bottom right ordinates of the rectangle shape.\n\
    \nNext we add a white circle remembering that white is a maximum of all the colours\
    \ mixed (255,255,255). We also need to know that the ordinates that we enter define\
    \ the centre of the circle and its radius. When there are lots of arguments, it\
    \ is sometimes clearer to use the keywords that the arguments are assigned to.\n\
    \n```python\n# white circle\ncv2.circle(img, center=(350,350), radius=100,\n \
    \          color=(255,255,255), thickness=50)\n```\n\nAnd finally adding some\
    \ text in red saying “hello world”:\n\n```python\n# add some text in red\ncv2.putText(img,\
    \ text='Hello World', org=(200,100),\n            fontFace=cv2.FONT_HERSHEY_PLAIN,\n\
    \            fontScale=3, color=(0,0,255), thickness=2)\n```\n\nAnd the entire\
    \ combination of all of the above components look like this:\n\nAt this point\
    \ we have sampled some of the basics of what we can do to append an image and\
    \ it is left as an exercise for the reader to be creative with this.\n\n## Warp\
    \ perspective\n\nThis is a useful technique for changing the perspective of an\
    \ image so that we can get a birds eye view of the *flattened* image. Imagine\
    \ for example that we take a picture of a document at an angle, but we want to\
    \ see its true rectangular shape.\n\nRequired card\n\nOr in our example case above,\
    \ we have some playing cards scattered on the table and we want to get the king\
    \ of spades. We would need to know the coordinates of the corners of the card\
    \ to do this which we can get by hovering over the image.\n\n```python\nimport\
    \ cv2\nimport numpy as np\n\nimg = cv2.imread('assets/cards.jpg')\n\nwidth, height\
    \ = 200, 300\npoints = np.float32([[82,157],[212,134],[115,356],[264,323]])\n\
    new_pts = np.float32([[0,0], [width,0], [0,height], [width,height]])\nmatrix =\
    \ cv2.getPerspectiveTransform(points, new_pts)\nimg_warp = cv2.warpPerspective(img,\
    \ matrix, (width, height))\n\ncv2.imshow('output image', img_warp)\ncv2.waitKey(0)\n\
    ```\n\nUsing the old points and the new points one can produce the transformation\
    \ matrix. This is done in the cv2 module with the function getPerspectiveTransform()\
    \ and using this matrix one can then proceed to perform the warp retaining the\
    \ perpendicular flattened image.\n\n## Colour detection\n\nWhen it comes to colour\
    \ detection, the logical step would be to select colours by their RGB (or BGR)\
    \ tuple values. For example, if we wanted to pick blues, then these would be all\
    \ tuples where the blue value was relatively high compared to the other values.\n\
    \nSo (200, 50, 50) in the opencv module would be predominantly blue. We could\
    \ therefore, by this logic, select all colours that were blue in nature. The blue\
    \ ordinate > 200 would be sufficient.\n\nHowever, whilst this logic could be used,\
    \ the preferred method is to convert the image to HSV or Hue Saturation Value\
    \ which is used to separate image luminance from colour information. This makes\
    \ it easier when we are working on or need luminance of the image/frame. HSV is\
    \ also used in situations where colour description plays an integral role.\n\n\
    In the HSV representation of colour, hue determines the colour you want, saturation\
    \ determines how intense the colour is and value determines the lightness of the\
    \ image."
