    Python set notation exhibits one important difference with mathematics: the expression
    {} does not represent the empty set. In order to use the curly braces for a set,
    the set must contain at least one element. The expression set() produces a set
    with no elements, and thus represents the empty set. Python reserves the {} notation
    for empty dictionaries.


    Unlike in mathematics, all sets in Python must be finite. Python supports the
    standard mathematical set operations of intersection, union, set difference, and
    symmetric difference. Table 11.2 shows the Python syntax for these operations.


    **Table 11.2.** Python set Operations. *A* and *B* are Sets


    | Operation | Mathematical Notation | Python Syntax | Result Type | Meaning |

    | :--- | :--- | :--- | :--- | :--- |

    | Union | A ∪ B | A | B | set | Elements in A or B or both |

    | Intersection | A ∩ B | A & B | set | Elements common to both A and B |

    | Set Difference | A − B | A − B | set | Elements in A but not in B |'
