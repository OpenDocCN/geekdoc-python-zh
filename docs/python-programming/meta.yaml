    (5, ''e'')

    (6, ''f'')

    (7, ''g'')

    (8, ''h'')

    ```


    You can think of the zip function working like a physical zipper. A physical zipper
    pairs up two sets of interlocking (usually metal) teeth, closing an opening in
    a garment or bag. The Python zip function pairs up elements from two different
    sequences. The paired-up elements are tuples,'
