    >>> a = [1, 2, 3, 4, 5, 6, 7, 8]\n>>> a\n[1, 2, 3, 4, 5, 6, 7, 8]\n>>> x1, x2,\
    \ *midlist, x3, x4 = a\n>>> x1\n1\n>>> x2\n2\n>>> midlist\n[3, 4, 5, 6]\n>>> x3\n\
