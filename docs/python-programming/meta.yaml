- img_proc: true
  md: "By using default parameters, we can define functions that gracefully handle\
    \ scenarios where some parameters are not explicitly provided by the caller. This\
    \ flexibility contributes to the versatility of our functions.\n\nObserving the\
    \ behavior, when a function's caller neglects to provide a parameter that the\
    \ function expects, and that parameter has a default value specified, the function\
    \ will employ the default value during the caller's invocation.\n\nWhen constructing\
    \ function declarations, it's permissible to intermix non-default and default\
    \ parameters in the parameter lists. However, it's important to note that all\
    \ default parameters within the list must be placed after all non-default parameters.\
    \ This concept can be illustrated with the following examples:\n\nThe following\
    \ function definition is valid:\n\n```\ndef sum_range(n, m=100):# OK, default\
    \ follows non-default\nsum = 0\nfor val in range(n, m + 1):\n    sum += val\n\
    ```\n\nAs is this one:\n\n```\ndef sum_range(n=0, m=100):       # OK, both default\n\
    sum = 0\nfor val in range(n, m + 1):\n    sum += val\n```\n\nHowever, the following\
    \ definition is not allowed, as it places a default parameter before a non-default\
    \ parameter:\n\n```\ndef sum_range(n=0, m):    # Illegal, non-default follows\
    \ default\nsum = 0\nfor val in range(n, m + 1):\n    sum += val\n```\n\nDefault\
    \ arguments enable programmers to design functions that are highly adaptable,\
    \ offering a simpler interface for common use cases. Recall Listing 7.6 (regularpolygon.py),\
    \ which employs Turtle graphics to draw regular polygons with specified numbers\
    \ of sides, sizes, locations, and colors. To enhance this, Listing 8.2 (enhancedpolygon.py)\
    \ introduces the option to fill the polygons with color. As the number of parameters\
    \ grows, managing them becomes cumbersome for the caller. Therefore, by making\
    \ color and fill directives optional through default parameters, the function\
    \ becomes more user-friendly and versatile."
