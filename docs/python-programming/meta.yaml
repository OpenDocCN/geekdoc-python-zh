    在深入研究数学之前，让我们先概述一下捕食者-猎物系统。例如狐狸和兔子。\n\n![](img/4e4fc350228cd1c84055205e597f4fc0_245_0.png)\n\
    \n系统中每个组成部分的种群数量取决于另一个种群的数量。因此，更多的兔子意味着狐狸有更多的食物，这导致狐狸种群数量增加，但更多的狐狸会杀死兔子，减少兔子种群数量。这反过来又减少了狐狸的食物供应，从而减少了狐狸种群数量。狐狸减少意味着兔子增多……如此循环往复。\n\
    \n上述逻辑产生了以下数学公式：\n\n$$\\frac{dx}{dt} = \\alpha x - \\beta xy$$\n\n$$\\frac{dy}{dt}\
