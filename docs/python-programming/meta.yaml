- md: '## CHAPTER 3


    ## Expressions and Arithmetic


    ## Contents


    - 3.1. Arithmetic Operators

    - 3.2. Order of Operations

    - 3.3. Mixed Type Expressions

    - 3.4. Operator Precedence and Associativity

    - 3.5. Formatting Expressions

    - 3.6. Comments

    - 3.7. Errors

    - 3.8. Arithmetic Examples

    - 3.9. More Arithmetic Operators

    - 3.10. Algorithm

    - 3.11. Exercises


    In Python, expressions are combinations of values, variables, and operators that
    can be evaluated to produce a result. Expressions can involve basic arithmetic
    operations, comparison operations, logical operations, and more. Let’s focus on
    arithmetic expressions in Python.


    ### 3.1. ARITHMETIC OPERATORS


    Python supports several arithmetic operators for performing mathematical calculations.


    These operators are:


    1. Addition (+): Adds two numbers or concatenates two strings.

    2. Subtraction (-): Subtracts the second number from the first number.

    3. Multiplication (*): Multiplies two numbers or repeats a string multiple times.

    4. Division (/): Divides the first number by the second number, yielding a floating-point
    result.

    5. Floor Division (//): Divides the first number by the second number, yielding
    an integer result (truncates any decimal part).

    6. Modulus (%): Computes the remainder after division of the first number by the
    second number.

    7. Exponentiation (**): Raises the first number to the power of the second number.


    Examples of Arithmetic Expressions:

    Let’s explore some examples of arithmetic expressions in Python:


    ```

    # Addition

    result_add = 5 + 3 # Result: 8

    # Subtraction

    result_sub = 10 - 4 # Result: 6

    # Multiplication

    result_mul = 6 * 7 # Result: 42

    # Division

    result_div = 15 / 3 # Result: 5.0 (floating-point division)

    # Floor Division

    result_floor_div = 17 // 4 # Result: 4 (integer division)

    # Modulus

    result_mod = 17 % 4 # Result: 1 (remainder of 17 divided by 4)

    # Exponentiation

    result_exp = 2 ** 3 # Result: 8 (2 raised to the power of 3)

    # Concatenation

    result_concat = "Hello," + "world!" # Result: "Hello, world!"

    ```


    ### 3.2. ORDER OF OPERATIONS


    Just like in standard mathematics, Python follows the order of operations (PEMDAS/BODMAS)
    when evaluating expressions. The order is as follows:


    1. Parentheses ()

    2. Exponents **

    3. Multiplication and Division (from left to right)

    4. Addition and Subtraction (from left to right)


    ```

    # Example of order of operations

    result = 10 + 3 * 5 # Result: 25 (3 * 5 = 15, then 10 + 15 = 25)

    ```


    Remember that expressions can be more complex, involving variables and functions,
    and Python will evaluate them based on the order of operations.


    Using expressions and arithmetic operations in Python allows you to perform a
    wide range of mathematical calculations and data manipulations, making it a fundamental
    aspect of programming in Python.


    | Expression | Meaning |

    |---|---|

    | x + y | x added to y, if x and y are numbers<br>x concatenated to y, if x and
    y are strings |

    | x – y | x take away y, if x and y are numbers |

    | x * y | x times y, if x and y are numbers<br>x concatenated with itself y times,
    if x is a string and y is an integer<br>y concatenated with itself x times, if
    y is a string and x is an integer |

    | x / y | x divided by y, if x and y are numbers |

    | x // y | Floor of x divided by y, if x and y are numbers |

    | x % y | Remainder of x divided by y, if x and y are numbers |

    | x ** y | x raised to y power, if x and y are numbers |


    ### 3.3. MIXED TYPE EXPRESSIONS


    In Python, expressions can contain a mix of integer and floating-point elements,
    resulting in different data types for the expression’s outcome. Let’s consider
    the following program fragment:


    ```

    x = 4

    y = 10.2

    sum = x + y

    ```


    In this fragment, x is assigned the value 4, and y is assigned the floating-point
    number 10.2. The expression x + y involves adding these two variables together.


    When an arithmetic expression involves only integers, the result will be an integer,
    except when using the division operator (/), which produces a floating-point result
    even with integers.


    On the other hand, when an arithmetic expression involves only floating-point
    numbers, the result will be a floating-point number. However, when an operator
    has mixed operands—one operand being an integer and the other a floating-point
    number—the Python interpreter treats the integer operand as a floating-point number
    and performs floating-point arithmetic.


    This means x + y is considered a floating-point expression, and the result will
    be a floating-point number. Therefore, in the provided program fragment, the expression
    x + y will produce a floating-point result, and the variable sum will be bound
    to a floating-point value.


    ### 3.4. OPERATOR PRECEDENCE AND ASSOCIATIVITY


    In Python, expressions can involve multiple operators with different precedence
    and associativity rules. Understanding these rules is essential for correctly
    evaluating expressions. Let’s explore the concepts of precedence and associativity
    in Python.


    Precedence refers to the order in which operators are applied in an expression.
    Some operators have higher precedence than others, and they are evaluated first.
    Here are some precedence rules for Python operators:


    Multiplication and division have precedence over addition and subtraction.


    Within a category (e.g., multiplication or addition), operators are evaluated
    from left to right.


    For example, in the expression 2 + 3 * 4, the multiplication 3 * 4 is performed
    first (resulting in 12), and then the addition 2 + 12 yields 14.


    To change the order of evaluation, you can use parentheses. For instance, (2 +
    3) * 4 would be evaluated as 5 * 4, resulting in 20.


    Associativity refers to how operators with the same precedence are grouped. Most
    binary operators in Python are left-associative, meaning they are evaluated from
    left to right. For example, in the expression 2 – 3 – 4, the leftmost subtraction
    2 – 3 is performed first (resulting in -1), and then -1 – 4 yields -5. However,
    there are a few exceptions to left-associativity. The exponentiation operator
    (**) is right-associative, which means it is evaluated from right to left. For
    example, 2 ** 3 ** 2 is interpreted as 2 ** (3 ** 2), resulting in 512.


    Unary operators, such as unary minus (-) and unary plus (+), have higher precedence
    than binary operators. They are also right-associative. For example, -3 + 2 evaluates
    to -1, and -(3 + 2) evaluates to -5.


    Here is a summary of some Python operator precedence and associativity:


    | Operator | Precedence | Associativity |

    | :--- | :--- | :--- |

    | ** (Exponent) | Highest | Right |

    | *, /, //, % | High | Left |

    | +, - | Medium | Left |

    | = | Lowest | Right (Assignment) |


    As a note on the assignment operator, it is not part of a larger expression, and
    therefore, precedence and associativity do not apply to it. However, Python supports
    chained assignment, where multiple variables can be assigned the same value in
    a single statement.


    ```

    w = x = y = z = 5

    ```


    This assigns the value 5 to all four variables (w, x, y, and z) simultaneously.
    Additionally, to initialize multiple variables to the same value, you can use
    tuple assignment or chained assignment:


    ```

    sum, count = 0, 0

    # or

    sum = count = 0

    ```


    Both statements achieve the same result, initializing the variables sum and count
    to zero.'
  mdcn: '## 第三章


    ## 表达式与算术运算


    ## 目录


    - 3.1. 算术运算符

    - 3.2. 运算顺序

    - 3.3. 混合类型表达式

    - 3.4. 运算符优先级与结合性

    - 3.5. 表达式格式化

    - 3.6. 注释

    - 3.7. 错误

    - 3.8. 算术示例

    - 3.9. 更多算术运算符

    - 3.10. 算法

    - 3.11. 练习


    在 Python 中，表达式是由值、变量和运算符组合而成，可以被求值以产生结果。表达式可以涉及基本的算术运算、比较运算、逻辑运算等。让我们重点关注 Python
    中的算术表达式。


    ### 3.1. 算术运算符


    Python 支持多种算术运算符用于执行数学计算。


    这些运算符包括：


    1. 加法 (+)：将两个数字相加或连接两个字符串。

    2. 减法 (-)：从第一个数字中减去第二个数字。

    3. 乘法 (*)：将两个数字相乘或重复字符串多次。

    4. 除法 (/)：将第一个数字除以第二个数字，得到浮点数结果。

    5. 整除 (//)：将第一个数字除以第二个数字，得到整数结果（截断任何小数部分）。

    6. 取模 (%)：计算第一个数字除以第二个数字后的余数。

    7. 幂运算 (**)：将第一个数字提升到第二个数字的幂次。


    算术表达式示例：

    让我们探索一些 Python 中的算术表达式示例：


    ```

    # 加法

    result_add = 5 + 3 # 结果：8

    # 减法

    result_sub = 10 - 4 # 结果：6

    # 乘法

    result_mul = 6 * 7 # 结果：42

    # 除法

    result_div = 15 / 3 # 结果：5.0（浮点数除法）

    # 整除

    result_floor_div = 17 // 4 # 结果：4（整数除法）

    # 取模

    result_mod = 17 % 4 # 结果：1（17 除以 4 的余数）

    # 幂运算

    result_exp = 2 ** 3 # 结果：8（2 的 3 次幂）

    # 字符串连接

    result_concat = "Hello," + "world!" # 结果："Hello, world!"

    ```


    ### 3.2. 运算顺序


    与标准数学一样，Python 在求值表达式时遵循运算顺序（PEMDAS/BODMAS）。顺序如下：


    1. 括号 ()

    2. 幂运算 **

    3. 乘法和除法（从左到右）

    4. 加法和减法（从左到右）


    ```

    # 运算顺序示例

    result = 10 + 3 * 5 # 结果：25（3 * 5 = 15，然后 10 + 15 = 25）

    ```


    请记住，表达式可能更复杂，涉及变量和函数，Python 将根据运算顺序对它们进行求值。


    在 Python 中使用表达式和算术运算可以让你执行各种数学计算和数据操作，使其成为 Python 编程的一个基本方面。


    | 表达式 | 含义 |

    |---|---|

    | x + y | 如果 x 和 y 是数字，则 x 加 y<br>如果 x 和 y 是字符串，则 x 连接到 y |

    | x – y | 如果 x 和 y 是数字，则 x 减去 y |

    | x * y | 如果 x 和 y 是数字，则 x 乘以 y<br>如果 x 是字符串且 y 是整数，则 x 与自身连接 y 次<br>如果 y 是字符串且
    x 是整数，则 y 与自身连接 x 次 |

    | x / y | 如果 x 和 y 是数字，则 x 除以 y |

    | x // y | 如果 x 和 y 是数字，则 x 除以 y 的整数部分 |

    | x % y | 如果 x 和 y 是数字，则 x 除以 y 的余数 |

    | x ** y | 如果 x 和 y 是数字，则 x 的 y 次幂 |


    ### 3.3. 混合类型表达式


    在 Python 中，表达式可以包含整数和浮点数元素的混合，导致表达式的结果具有不同的数据类型。让我们考虑以下程序片段：


    ```

    x = 4

    y = 10.2

    sum = x + y

    ```


    在此片段中，x 被赋值为 4，y 被赋值为浮点数 10.2。表达式 x + y 涉及将这两个变量相加。


    当算术表达式仅涉及整数时，结果将是整数，但使用除法运算符 (/) 时除外，即使使用整数也会产生浮点数结果。


    另一方面，当算术表达式仅涉及浮点数时，结果将是浮点数。然而，当运算符具有混合操作数——一个操作数是整数，另一个是浮点数时——Python 解释器会将整数操作数视为浮点数并执行浮点数运算。


    这意味着 x + y 被视为浮点数表达式，结果将是浮点数。因此，在提供的程序片段中，表达式 x + y 将产生浮点数结果，变量 sum 将被绑定到一个浮点数值。


    ### 3.4. 运算符优先级与结合性


    在 Python 中，表达式可以涉及具有不同优先级和结合性规则的多个运算符。理解这些规则对于正确求值表达式至关重要。让我们探讨 Python 中优先级和结合性的概念。


    优先级指的是运算符在表达式中被应用的顺序。某些运算符的优先级高于其他运算符，它们会先被求值。以下是 Python 运算符的一些优先级规则：


    乘法和除法的优先级高于加法和减法。


    在同一类别内（例如，乘法或加法），运算符从左到右求值。


    例如，在表达式 2 + 3 * 4 中，乘法 3 * 4 先执行（结果为 12），然后加法 2 + 12 得到 14。


    要改变求值顺序，可以使用括号。例如，(2 + 3) * 4 将被求值为 5 * 4，结果为 20。


    结合性指的是具有相同优先级的运算符如何分组。Python 中的大多数二元运算符是左结合的，这意味着它们从左到右求值。例如，在表达式 2 – 3 – 4 中，最左边的减法
    2 – 3 先执行（结果为 -1），然后 -1 – 4 得到 -5。然而，左结合性有一些例外。幂运算符 (**) 是右结合的，这意味着它从右到左求值。例如，2
    ** 3 ** 2 被解释为 2 ** (3 ** 2)，结果为 512。


    一元运算符，如一元减 (-) 和一元加 (+)，比二元运算符具有更高的优先级。它们也是右结合的。例如，-3 + 2 求值为 -1，而 -(3 + 2) 求值为
    -5。


    以下是 Python 运算符优先级和结合性的总结：


    | 运算符 | 优先级 | 结合性 |

    | :--- | :--- | :--- |

    | ** (幂) | 最高 | 右 |

    | *, /, //, % | 高 | 左 |

    | +, - | 中 | 左 |

    | = | 最低 | 右（赋值） |


    关于赋值运算符的说明，它不是更大表达式的一部分，因此优先级和结合性不适用于它。但是，Python 支持链式赋值，可以在单个语句中将多个变量赋值为相同的值。


    ```

    w = x = y = z = 5

    ```


    这会将值 5 同时赋给所有四个变量（w、x、y 和 z）。此外，要将多个变量初始化为相同的值，可以使用元组赋值或链式赋值：


    ```

    sum, count = 0, 0

    # 或者

    sum = count = 0

    ```


    这两个语句实现相同的结果，将变量 sum 和 count 初始化为零。'
