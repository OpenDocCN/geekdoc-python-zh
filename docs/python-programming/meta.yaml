    Head (1st October, 2022 - 20th April, 2023) at Bansal College of Engineering,
    Mandideep (Bhopal). A Senior Lecturer (08th August, 2008 - 31th August, 2013)
    and Assistant Professor (1st Sept., 2021 - 30th Sept.,2022) at Scope College of
    Engineering, Bhopal. I Done My Bachelor of Engineering (BE-CSE) from University
    Institute Of Technology (UIT), Bhopal in 2006. And also Completed Master of Technology
    (M.Tech-CSE) from University Institute Of Technology (UIT), Bhopal in 2013. And
    Completed the Doctoral Research (Ph.D.) on the Topic of "Multi Objective Virtual
    Machine Resource Allocation by Dynamic Load Scheduling Techniques", From Rabindranath
    Tagore University, Bhopal, (M.P.) in July, 2021.


    ![](img/1dbe1e06b9d31a6f7ada030324ed273a_395_1.png)


    Dr. Manmohan Singh, working as Professor in Department of Computer Science and
