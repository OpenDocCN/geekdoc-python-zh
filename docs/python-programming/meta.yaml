    # 6.10. OTHER TECHNIQUES FOR IMPORTING FUNCTIONS AND MODULES


    In addition to the standard import statement, Python provides a few other techniques
    for importing functions and modules. These techniques offer different ways to
    structure your code and access the imported items. Here are some alternatives:


    +   1. **Importing Specific Functions or Classes:** Instead of importing an entire
    module, you can import only specific functions or classes from that module. This
    can help reduce namespace clutter and improve code readability.


    ```

    from module_name import function_name

    from module_name import class_name

    ```


    +   2. **Importing with an Alias:** You can use an alias (alternative name) for
    a module to make its usage more concise or to avoid naming conflicts.


    ```

    import module_name as alias

    ```


    +   3. **Importing All Items:** You can import all items (functions, classes,
    variables) from a module into your current namespace. However, be cautious with
    this approach, as it might lead to namespace pollution.


    ```

    from module_name import *

    ```'
