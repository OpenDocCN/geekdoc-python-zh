    The await keyword is where the process can hand over control to another process
    and in the case of the tea example, it would logically occur once the kettle was
    switched on. We now have two processes running simultaneously [1] the kettle boiling,
    [2] the cups being prepared.


    These routines that are run at the same time are termed coroutines and require
    some use of asynchronous input and output (Async IO) in Python. Async IO is related
    to multiprocessing and threading in the sense that languages need some kind of
    process that **does not block code execution** whilst other parts of the code
    run. And this is what python has to offer, so let’s get a deeper understanding.


    | Async type | cpu | description |

    | :--- | :--- | :--- |

    | Parallelism (multiprocessing) | many | spreading tasks over a computer cpu (or
    cores) |

    | Concurrency | one | multiple tasks have the ability to run in an overlapping
    manner (controlled by code). |

    | Threading | one | multiple threads take turns executing tasks. One process can
