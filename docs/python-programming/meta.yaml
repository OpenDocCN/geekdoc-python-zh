    | diverge |


    We see that there is some kind of convergence zone with the boundary at $x_n =
    \pm 1$. All numbers with magnitude < 1 converge to zero and are said to be stable
    and numbers > 1 shoot off to infinity and are said to be unstable.


    The convergence zone (or radius of convergence) for real numbers is best described
    by the number line below.


    ![](img/4e4fc350228cd1c84055205e597f4fc0_214_0.png)


    We use this analogy to extend into the complex plane. Extending $x_n$ to $z_n$
    means that $x_n^2$ becomes $z_n^2$. And we know that $z_n = a_n + i*b_n$ where
    a and b are real numbers.


    When we translate this to polar coordinates (as we did in the complex'
