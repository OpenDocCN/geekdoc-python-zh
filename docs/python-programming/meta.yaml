    \ idioms for iterating, searching, and modifying the parse tree.\n\nThis module\
    \ is designed for quick turnaround projects like screen-scraping. In particular\
    \ the following three features:\n\n+   1. a few simple methods and Pythonic idioms\
    \ for navigating, searching, and modifying a parse tree.\n2. automatically converts\
    \ incoming documents to Unicode[26] and outgoing documents to UTF-8. So the user\
    \ does not need to think about encodings.\n3. sits on top of popular Python parsers\
    \ like lxml and html5lib.\n\nWe can get of to a quick start with the bs4 module:\n\
    \n```\nfrom bs4 import BeautifulSoup\nsoup = BeautifulSoup(\"<p>Some<b>bad<i>HTML\"\
    )\nprint(soup.prettify())\n```\n\nAll the user needs to do is import the module\
    \ and then parse any HTML string or document into the package.\n\nAnd this is\
    \ the output:\n\n```\nGuessedAtParserWarning: No parser was explicitly specified,\
