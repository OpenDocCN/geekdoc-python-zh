  md: "# 4.8. NESTED CONDITIONALS\n\nNested conditionals refer to the practice of\
    \ using one or more conditional statements (if statements) inside the body of\
    \ another conditional statement. This allows you to create more complex decision-making\
    \ structures by branching the code based on multiple conditions. In Python (and\
    \ most programming languages), you can use the following syntax to create nested\
    \ conditionals:\n\n```\nif condition1:\n    # code block executed if condition1\
    \ is True\n    if condition2:\n        # code block executed if condition2 is\
    \ True\n    else:\n        # code block executed if condition2 is False\nelse:\n\
    \    # code block executed if condition1 is False\n    if condition3:\n      \
    \  # code block executed if condition3 is True\n    else:\n        # code block\
    \ executed if condition3 is False\n```\n\nHere’s an example to illustrate nested\
    \ conditionals:\n\n```\nx = 10\ny = 5\nif x > y:\n    print(\"x is greater than\
