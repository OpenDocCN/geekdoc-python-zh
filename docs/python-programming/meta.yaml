    \ from the first two equations. So let's do that.\n\nWe start with the standard\
    \ imports and defining some global parameters.\n\n```\nimport matplotlib.pyplot\
    \ as plt\nimport numpy as np\nimport random\n\ntimestep = 0.0001  # determines\
    \ the accuracy\n\namp = 0.00  # amplitude of noise term\nend_time = 50  # time\
