    been faster too.


    ```

    # list comprehension replaces for loop

    rand_list = [random.randint(0,100) for x in range(1_000_000)]

    ```


    Sometimes the library module names can be rather long, for example random.randint()
    is quite lengthy. Or statistics.stdev() . When repeated many times in the same
    line, the code gets verbose and cluttered.


    Fortunately python offers an alias system so that we can shorthand the longer
    names to more convenient names.


    ```

    import random as rd    # alias is assigned: rd

    import statistics as sts  # alias is assigned: sts

    ```


    ```

    r = rd.randint(0,100)  # we can use the alias rd

    ```


    A very popular library is matplotlib which is used for plotting charts. The typical
    module import looks like this:


    ```

    from matplotlib import pyplot as plt

    ```


    Which looks like a handful for one line of code, but is in fact quite simple.
    Because pyplot is simply a function that lives inside the matplotlib module and
    plt is just the alias we assign to the thing that we want. We shall look into
    this more later on.


    Finally, a common pitfall on importing modules. Python allows for wildcard imports.
    This means that the user can do this:'
  - '[PAGE 45]


    ```

    from math import *

    from os import *

    from tkinter import *

    ```


    The wildcard `*` means that all the methods will be imported. So for example,
    instead of doing this:


    ```

    x = math.cos(90)

    ```


    We can now do this:


    ```

    y = cos(90)

    ```


    There is clearly a level of convenience that comes with this as the former is
    more longwinded than the latter. And actually, for smaller modules this would
    be sufficient.


    However, the drawback is that without knowing the myriad of methods that are contained
    in the module, we could easily overwrite them and furthermore, it is no longer
    clear where `cos()` came from. Again, for small pieces of code, we could say that
    this is easy as `cos()` is clearly a maths function and has come from the maths
    module, but look at this error.


    ```

    from PIL import Image, ImageTk

    from tkinter import *

    ```


    The `tkinter` module contains a method called `Image`, but the coder thinks that
    the `Image` method has been called from the `PIL` module[2].


    Because Python allows for reassignment the first import of the Image function
    is overwritten by the second one without warning and this was probably unintended.


    So it is helpful to be clear with imports and in this case an alias would have
    been more suitable and removed the ambiguity:


    ```

    import tkinter as tk

    ```


    And this is clear.


    # Logical order


    We learned earlier that python code is executed line by line in sequential order.'
