    time.perf_counter. The time.perf_counter function allows us measure elapsed time
    as if we were using a stopwatch or looking at a clock. The time.perf_counter function
    returns a floating-point value representing a point in time. Its return value
    by itself is not useful; it is only after a second call to time.perf_counter that
    we can extract any useful information. The difference between the first call to
    time.perf_counter and the second call to time.perf_counter represents an elapsed
    time in seconds; thus, with two calls to the time.perf_counter function we can
    measure elapsed time.


