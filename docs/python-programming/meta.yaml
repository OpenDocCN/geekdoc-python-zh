  md: '# Web scraping


    At this point, we have significant computing power. We also have methods of communicating
    between devices. And now we have knowledge of asynchronous methods for i/o connections
    which can cause bottlenecks.


    Various systems push data into the ecosystem which is the web and the systems
    can extract the data. So for example, we can browse the web with a device, but
    we also have tools for automation.


    We already looked at the requests module, which enabled the user to retrieve data
    as text, JSON or binary, which is good in many cases.


    We can also connect via an Application Programming Interface (API) and collect
    the data a bit more efficiently.


    However, there are powerful alternative methods with modules such as selenium
    and beautiful soup. We will take an overview of these methods and when we may
    or may not prefer one mechanism over the other and consider the “whoops, they
    redesigned” problem.'
