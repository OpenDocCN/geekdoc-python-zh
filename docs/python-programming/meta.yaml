  md: 'f is concave down on one side of p and concave up on another.


    In addition to the above, we can use the first and second derivatives to understand
    the shape of the function and therefore determine maxima, minima and inflection
    points from this.


    Given the function y = f(x), we can find all points where the slope is flat (ie.
    zero) using the first derivative dy/dx = 0.


    We can then use the second derivative to inspect how the first derivative changes.
    So $\frac{d^2y}{dx^2} = \frac{d}{dx}\left(\frac{dy}{dx}\right)$ tells us how the
    slope is changing. There are three cases:


    +   - If $\frac{d^2y}{dx^2} < 0$, then the slope is continually decreasing and
    therefore we have a **maximum** point.

    - If $\frac{d^2y}{dx^2} > 0$, then the slope is continually increasing and therefore
    we have a **minimum** point.

    - And if If $\frac{d^2y}{dx^2} = 0$, then the slope is not changing and therefore
    we have an **inflection** point.'
