  md: '# Infectious diseases


    Infectious diseases is a topical subject in 2022 as we follow the aftermath of
    a flu type of virus which was determined to be global.


    So let''s model and examine how a disease might manifest itself. The first thing
    to note is that the dynamics will be sensitive to the rules and initial conditions
    that we set. By this we mean that small changes in the rules or initial conditions
    might have outsized proportionate effects in the results. Indeed, it is these
    very small changes that one might accidentally or otherwise invoke, that could
    lead to radical outcomes that lead to a mass hysteria in the general population,
    which is in itself another dynamic system that can be modelled.


    Noting the above, the model created here will be similar, but yet different to
    other models that are created.


    Here are some initial assumptions:


