    \ example it is just sending the current time every 3 seconds, but similar methods\
    \ could be used to stream stock prices, news headlines, security data and any\
    \ other data that is dynamic.\n\n```\nimport asyncio\nimport datetime\nimport\
    \ random\nimport websockets\n\nasync def time(websocket):\n    while True:\n \
    \       now = datetime.datetime.utcnow().isoformat() + \"Z\"\n        await websocket.send(now)\n\
    \        await asyncio.sleep(random.random() * 3)\n\nstart_server = websockets.serve(time,\
