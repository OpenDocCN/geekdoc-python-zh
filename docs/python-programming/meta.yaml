    # Data exploration: intermediate


    Having understood the fundamentals of data, where it is stored and how we can
    read and write something such that our code can now interact with this data it
    is time to move on to the popular modules. Namely Pandas; NumPy and SciPy


    We were able to read and write basic data to a text file. We wrote “hello world”
    45 million times quite quickly, which gave us an idea of speed and capability.


    We now look at other data and what we can do.


    The most basic way of displaying data is in simple flat file text format. This
    already provides the user with plenty of capability. The convention is to split
    the rows of a text file into a top row called the header and then each row below
    is an additional line of data.


    When the data has structure, we split this into parts. Meaning that each row contains
    multiple pieces of data about one unique item. We could think of this as a list
    of lists or a dictionary where the keys are the headings and the values are the
    lists of data. But let’s just start simple and grow.


    Imagine that we have this table of voters:'
