    | 11. | ‘pi’：数学常数 π (圆周率) |\n| 12. | ‘fabs’：计算一个数的绝对值：fabs(x) = |x| |\n\n这些函数是\
    \ Python math 模块的一部分，可用于程序中的各种数学计算。\n\nmath 模块还定义了 pi (π) 和 e (e) 的值。以下交互序列展示了\
    \ math 模块的完整组件目录：\n\n```\n>>> import math\n>>> dir(math)\n['__doc__', '__loader__',\
    \ '__name__', '__package__', '__spec__', 'acos', 'acosh', 'asin', 'asinh', 'atan',\
    \ 'atan2', 'atanh', 'ceil', 'copysign', 'cos', 'cosh', 'degrees', 'e', 'erf',\
    \ 'erfc', 'exp', 'expm1', 'fabs', 'factorial', 'floor', 'fmod', 'frexp', 'fsum',\
    \ 'gamma', 'hypot', 'isfinite', 'isinf', 'isnan', 'ldexp', 'lgamma', 'log', 'log10',\
    \ 'log1p', 'log2', 'modf', 'pi', 'pow', 'radians', 'sin', 'sinh', 'sqrt', 'tan',\
    \ 'tanh', 'trunc']\n```\n\n在此输出中，你可以看到 math 模块中可用的属性和函数的完整列表。这些函数涵盖了广泛的数学运算，包括三角函数、对数函数、指数运算、取整等。通过导入\
    \ math 模块，你可以使用这些数学工具在 Python 程序中执行复杂的计算。\n\n调用者传递的参数称为实际参数。函数指定的参数称为形式参数。在函数调用期间，第一个实际参数被赋值给第一个形式参数，第二个实际参数被赋值给第二个形式参数，依此类推。调用者在调用函数时必须小心，将传递的参数按正确的顺序放置；例如，调用\
    \ math.pow(10,2) 计算 $10^2 = 100$，但调用 math.pow(2,10) 计算 $2^{10} = 1,024$。\n\n![](img/1dbe1e06b9d31a6f7ada030324ed273a_158_0.png)\n\
    \n**图 6.2.** 轨道距离问题。在此图中，卫星从点 (x1, y1) 开始，距离航天器 d1。卫星的轨道在旋转 θ 角后将其带到点 (x2, y2)。到其新位置的距离为\
    \ d2。\n\n使用任何这些数学函数的 Python 程序都必须导入 math 模块。\n\nmath 模块中的函数非常适合解决如图 6.4 所示的问题。假设一艘航天器位于太空中某个固定位置，距离一颗行星一定距离。一颗卫星正在围绕该行星进行圆形轨道运行。我们希望计算当卫星沿其轨道路径前进\
