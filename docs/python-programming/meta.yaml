  - '[PAGE 9]


    # A brief introduction to python


    Python is a programming language that lets you work quickly and integrate systems
    more effectively.


    Python is open source and free to use for anybody that has a computer and wants
    to learn.


    A formal description from Wikipedia reads like this:


    > “Python is a high-level, interpreted, general-purpose programming language.
    Its design philosophy emphasises code readability with the use of significant
    indentation”.


    So let’s break this down:


    | Term | What it means |

    | :--- | :--- |

    | High-level | A bit easier for humans to read |

    | Interpreted | Runs as it is written |

    | General-purpose | A variety of use cases |

    | Indentation | Uses indents instead of {} |'
  - '[PAGE 10]


    # Background


    The language itself was released in the early 90’s. Then around ten years later
    a new version which introduced new features came out (version 2.0) and finally
    about 8 years after this a newer version came out (version 3.0).


    Version 3.0 is not completely backward compatible with version 2.0 which means
    that some of the 2.0 code will not work with the 3.0 version. Most notably, the
    print statement which gained a set of brackets in the newer version.


    Version 2.0: print “hello world”

    Version 3.0: print (“hello world”)


    The backward incompatibility can sometimes be annoying and was considered to be
    a blunder by some whereas others consider it necessary. In particular, version
    2.0 was sunset, which means it is *no longer supported*, as of Jan 2020.


    So as time progresses the 3.0 code becomes the **main accepted version** and this
    is what this book focuses on.


    When we talk about Python we talk about Python 3.0 .


    Over this time, Python has consistently ranked as one of the top (most popular)
    programming languages and in recent years has made a resurgence due to use cases
    in the data science field primarily due to an abundance of modules written by
    a very competent community of users.


    # Nomenclature


    It is invariably necessary to go through some of the terms and phrases that are
    commonly talked about.


    **Pythonic:**


    Code that is written in python looks both different and similar to other code.
    There are also new features (such as list comprehension in place of for loops)
    that other languages do not have and using those is considered to be Pythonic.'
- md: '## Pythonista:


    In short, this is someone who uses the Python programming language. Someone who
    writes in a Pythonic way, which is considered to be concise and clean, might consider
    themselves to be a Pythonista.


    ## Structure


    There are probably three main features that stand out from other predecessor languages
    and those are:


    1.  White space replacing curly braces {}

    2.  No semicolons ; at the end of lines

    3.  Commented lines use # in place of // .


    ## White space vs indentation:


    The most notable feature of this is the use of white space and indents compared
    to curly braces {} in many other languages.


    All code to date is written in blocks and the reader has been able to identify
    the code blocks with the curly braces. This is one of the key introductions of
    Python that was unique to its predecessors and in particular at the time the C
    and C++ languages.


    ![](img/4e4fc350228cd1c84055205e597f4fc0_11_0.png)


    The code block is between the curly braces.


    Whereas the Python version looks like this:


    ![](img/4e4fc350228cd1c84055205e597f4fc0_12_0.png)


    The code block is marked by the indent.


    The indent (4 spaces).


    ## Semicolon line ends:


    The reader will also note the semicolon line ends of many languages. Python does
    not have this by design as it is intended to be cleaner.


    Lines end in Python at the end of the line, so the semicolon becomes unnecessary.


    ## A comment is # compared to // :


    Finally, we see that single line comments in Python use # in place of // which
    are common in other languages. There is no particular reason for this (after extensive
    google search) so presumably it is aesthetic as well.


    There are many other differences, but as this is a basic overview they will be
    left to later on to cover those.


    ## What is the stack?


    A good formal description comes from Wikipedia:


    > “Stack Overflow is a question and answer website for professional and enthusiast
    programmers. It is the flagship site of the Stack Exchange Network. It was created
    in 2008. It features questions and answers on a wide range of topics in computer
    programming”. There are roughly 14 million users registered on the platform.


    The stack rewards and punishes for contribution with up or down votes for positive
    and negative contributions respectively.


    Or more pythonically put:


    The stack **rewards** and **punishes** for contribution:


    -   With **up** or **down** votes

    -   For **positive** and **negative** contributions

    -   Respectively.


    The basic format is this:


    | Good question | Up vote |

    | Good answer | Up vote |

    | Good comment | Up vote |

    | Bad question | Down vote |

    | Bad answer | Down vote |


    The above voting system, whilst sometimes harsh for the beginner, keeps the community
    honest by rewarding contributions and punishing distractions.


    Just like any other platform or system, there are specific nuances and ways of
    asking and answering questions. The stack is quite direct with “a Minimal, Reproducible
    Example” approach.


    This basically means that good questions isolate very specific problems in a “short
    and concise” manner and helps target solutions quickly. Likewise, the same is
    for the answers, “short and concise” wins.


    So how does one get to the top of the stack?


    Quite simple really, with a thirst to learn and contribute and by being a “good
    citizen”.


    ## Who uses the stack?


    Basically anybody who has ever asked a programming question in any language has
    probably visited the stackoverflow website.


    The most recent statistics show that there are around 50 million users and about
    half of those are professional developers and university students. So the other
    half are enthusiasts or novices or some other cohort of people with an interest
    in coding.


    There are plenty of other excellent resources and websites and also, as for any
    programming language, the documents are excellent.


    Nevertheless, sometimes it is simply more efficient to look up an answer on the
    web. We often “google it” and invariably stackoverflow with its plethora of completeness
    (for a whole variety of programming languages) will rank in or among the top few
    links.


    ## What is a stack overflow?


    A stack overflow is a type of buffer overflow error that occurs when a computer
    program tries to use more memory space in the call stack than has been allocated
    to that stack.


    One of the most common causes of a stack overflow is the recursive function, which
    is a type of function that repeatedly calls itself in an attempt to carry out
    specific logic. Each time the function calls itself, it uses up more of the stack
    memory. If the function runs too many times it consumes all the available memory,
    resulting in a stack overflow. This invariably leads to corruption of variables
    and data and is likely to cause the program to crash.


    The term in many ways is suitable for the name of the community website as this
    is one of the problems that many of the users are trying to avoid.


    The users go to stackoverflow to find out how to prevent a stack overflow.


    ## Let’s get started


    The journey started long before Python, but the procedure for any language is
    the same. Create a hello world program. From there we can do almost anything.


    ## The code


    Each language will have a source and place to download the code. And for Python
    this is the same in this regard. All the user has to do in today’s world is to
    “google” the word python. This takes the user to the main website [https://www.python.org]
    and off they go.


    ![](img/4e4fc350228cd1c84055205e597f4fc0_16_0.png)


    The user may wish to navigate to the appropriate version for the different operating
    systems (Windows, MacOS or Linux), but it is basically as simple as that.


    ## The editor


    As part of the download for Python, the user gets the default package editor (called
    IDLE) which is perfectly fine to use but lacks some of the main features that
    other editors have.


    The IDLE stands for **I**ntegrated **D**evelopment and **L**earning **E**nvironment.
    It is an integrated development environment (IDE) for Python and it basically
    looks like this:


    ![](img/4e4fc350228cd1c84055205e597f4fc0_17_0.png)


    Whilst this is perfectly fine, the IDLE is rather basic and the market has developed
    a number of editors with significantly more features.


    At the time of writing, the most widely used editor is visual studio code, which
    is more commonly referred to as VS code. VS code is a source-code editor made
    by Microsoft for Windows, Linux and macOS. In particular the features include
    support for debugging, syntax highlighting, intelligent code completion and snippets
    among others. Plus it comes with a plethora of additional functionality by way
    of extensions.


    Some surveys suggest that VS code is used by 70% of the market, so those features
    have proved to be popular. We shall therefore use this editor, but note that there
    are many other options.


    Again, the download is relatively straightforward by “googling” VS code and navigating
    to the website and hitting the download button.


    ![](img/4e4fc350228cd1c84055205e597f4fc0_18_0.png)


    And we are done. So, although we could write a book or endless web pages on editors,
    what we have is sufficient to continue for the purpose of a coding journey with
    Python.


    ## Python Basics


    With Python installed and a suitable text editor in place we are now ready to
    code. And the first place to start will be to get a hello world program working.


    This is a simple way of testing that the **environment** works.


    ## Hello world


    The beauty of Python, is that this can be done in one line of code. We create
    a file and give it a name, most suitably hello_world.py and off we go.


    ![](img/4e4fc350228cd1c84055205e597f4fc0_19_0.png)


    The user can then run the code and it will print to the terminal (or interactive
    console) hello world.


    ![](img/4e4fc350228cd1c84055205e597f4fc0_20_0.png)


    The various operating systems, downloads, editors, colour schemes and so forth
    are dependent on each individual user''s resources and preference, but whatever
    that is, we want to get to this point.


    **Getting to this point is key to everything as we are now able to code!**


    ## What is available


    There is tons of support material and videos on the web and the reader is advised
    to use as many of those as necessary, nevertheless any good Python book should
    run through the basic building blocks of the language.


    Believe it or not, most languages, for the most part, are relatively simple to
    pick up in the early stages. A bit like a foreign language where there are some
    core words that can get a tourist by. For example “how much is this bread?”, if
    you know the words for “how much” and “bread” then you have sufficient tools to
    ask the shopkeeper for a loaf of bread.


    Also, because languages are related, it is also the case that we can share some
    words and structure from other languages.


    Again the same is true for programming. For example, my journey was from Basic
    to Fortran to C to C++ then to Visual basic, then to JavaScript, then to NodeJs
    and finally on to Python and along that way also touching dozens of other languages
    (like C# and PHP). And although each of those languages looked different, the
    core principles were always the same and the similarity was always over 50%.


    So with this comfort, let’s dive in.'
  mdcn: '## Pythonista：


    简而言之，这是指使用Python编程语言的人。那些以Pythonic方式编写代码的人——这种方式被认为是简洁而清晰的——可能会自称为Pythonista。


    ## 结构


    与其他前身语言相比，可能有三个主要特点脱颖而出：


    1.  空白符替代花括号 {}

    2.  行尾没有分号 ;

    3.  注释行使用 # 代替 // 。


    ## 空白符与缩进：


    与许多其他语言中的花括号 {} 相比，最显著的特点是使用空白符和缩进。


    迄今为止，所有代码都是以块的形式编写的，读者能够通过花括号来识别代码块。这是Python引入的一个关键特性，与其前身语言，特别是当时的C和C++语言相比，是独一无二的。


    ![](img/4e4fc350228cd1c84055205e597f4fc0_11_0.png)


    代码块位于花括号之间。


    而Python版本看起来像这样：


    ![](img/4e4fc350228cd1c84055205e597f4fc0_12_0.png)


    代码块由缩进标记。


    缩进（4个空格）。


    ## 分号行尾：


    读者还会注意到许多语言中的分号行尾。Python在设计上没有这个，因为它旨在更简洁。


    Python中的行在行尾结束，因此分号变得不必要。


    ## 注释是 # 而不是 // ：


    最后，我们看到Python中的单行注释使用 # 代替其他语言中常见的 //。这没有特别的原因（经过广泛的谷歌搜索），所以大概也是出于美学考虑。


    还有许多其他差异，但由于这是一个基本概述，这些将留待以后介绍。


    ## 什么是Stack？


    维基百科提供了一个很好的正式描述：


    > “Stack Overflow是一个面向专业和业余程序员的问答网站。它是Stack Exchange网络的旗舰网站。它创建于2008年。它提供关于计算机编程广泛主题的问题和答案”。该平台大约有1400万注册用户。


    Stack通过正负投票来奖励和惩罚贡献，分别对应正面和负面贡献。


    或者更Python化地说：


    Stack**奖励**和**惩罚**贡献：


    -   通过**赞成**或**反对**票

    -   针对**正面**和**负面**贡献

    -   分别对应。


    基本格式如下：


    | 好问题 | 赞成票 |

    | 好答案 | 赞成票 |

    | 好评论 | 赞成票 |

    | 坏问题 | 反对票 |

    | 坏答案 | 反对票 |


    上述投票系统，虽然有时对初学者来说很严厉，但通过奖励贡献和惩罚干扰来保持社区的诚实。


    就像任何其他平台或系统一样，有特定的细微差别和提问回答的方式。Stack相当直接，采用“最小、可重现示例”的方法。


    这基本上意味着好的问题以“简短而简洁”的方式隔离非常具体的问题，并有助于快速定位解决方案。同样，对于答案，“简短而简洁”胜出。


    那么，如何才能登上Stack的顶峰呢？


    其实很简单，带着学习和贡献的渴望，并成为一个“好公民”。


    ## 谁使用Stack？


    基本上，任何曾经用任何语言问过编程问题的人可能都访问过stackoverflow网站。


    最近的统计数据显示，大约有5000万用户，其中大约一半是专业开发者和大学生。所以另一半是爱好者、新手或其他对编码感兴趣的人群。


    还有很多其他优秀的资源和网站，而且，对于任何编程语言来说，文档都非常出色。


    尽管如此，有时在网上查找答案更有效率。我们经常“谷歌一下”，而stackoverflow凭借其海量的完整性（涵盖各种编程语言）总是排名在前几位链接中。


    ## 什么是Stack Overflow？


    Stack Overflow是一种缓冲区溢出错误，当计算机程序试图在调用栈中使用比分配给该栈更多的内存空间时发生。


    Stack Overflow最常见的原因之一是递归函数，这是一种反复调用自身以执行特定逻辑的函数类型。每次函数调用自身时，它都会消耗更多的栈内存。如果函数运行次数过多，它会消耗所有可用内存，导致Stack
    Overflow。这不可避免地导致变量和数据损坏，并可能导致程序崩溃。


    这个术语在很多方面都适合这个社区网站的名称，因为这是许多用户试图避免的问题之一。


    用户访问stackoverflow是为了了解如何防止Stack Overflow。


    ## 让我们开始吧


    旅程在Python之前很久就开始了，但任何语言的程序都是一样的。创建一个hello world程序。从那里我们几乎可以做任何事情。


    ## 代码


    每种语言都有一个源代码和下载代码的地方。对于Python来说，在这方面也是一样的。在当今世界，用户所要做的就是“谷歌”python这个词。这会将用户带到主网站[https://www.python.org]，然后他们就可以开始了。


    ![](img/4e4fc350228cd1c84055205e597f4fc0_16_0.png)


    用户可能希望导航到适用于不同操作系统（Windows、MacOS或Linux）的相应版本，但基本上就是这么简单。


    ## 编辑器


    作为Python下载的一部分，用户会获得默认的包编辑器（称为IDLE），它完全可用，但缺乏其他编辑器的一些主要功能。


    IDLE代表**I**ntegrated **D**evelopment and **L**earning **E**nvironment。它是一个用于Python的集成开发环境（IDE），它基本上看起来像这样：


    ![](img/4e4fc350228cd1c84055205e597f4fc0_17_0.png)


    虽然这完全没问题，但IDLE相当基础，市场上已经开发出许多具有更多功能的编辑器。


    在撰写本文时，最广泛使用的编辑器是Visual Studio Code，通常简称为VS Code。VS Code是微软为Windows、Linux和macOS制作的源代码编辑器。特别是其功能包括调试支持、语法高亮、智能代码补全和代码片段等。此外，它还通过扩展提供了大量额外功能。


    一些调查显示，VS Code被70%的市场使用，因此这些功能已被证明很受欢迎。因此，我们将使用这个编辑器，但请注意还有许多其他选择。


    同样，下载相对简单，只需“谷歌”VS Code，导航到网站并点击下载按钮。


    ![](img/4e4fc350228cd1c84055205e597f4fc0_18_0.png)


    我们完成了。所以，虽然我们可以写一本关于编辑器的书或无尽的网页，但我们所拥有的对于继续Python编码之旅来说已经足够了。


    ## Python基础


    安装了Python并放置了合适的文本编辑器后，我们现在准备好编码了。第一个开始的地方将是让一个hello world程序运行起来。


    这是测试**环境**是否工作的一种简单方法。


    ## Hello world


    Python的美妙之处在于，这可以用一行代码完成。我们创建一个文件并给它一个名字，最合适的是hello_world.py，然后我们就可以开始了。


    ![](img/4e4fc350228cd1c84055205e597f4fc0_19_0.png)


    然后用户可以运行代码，它将打印到终端（或交互式控制台）hello world。


    ![](img/4e4fc350228cd1c84055205e597f4fc0_20_0.png)


    各种操作系统、下载、编辑器、配色方案等取决于每个用户的资源和偏好，但无论是什么，我们都希望达到这一点。


    **达到这一点是关键，因为我们现在能够编码了！**


    ## 可用资源


    网络上有大量的支持材料和视频，建议读者尽可能多地使用这些资源，尽管任何一本好的Python书都应该涵盖语言的基本构建块。


    信不信由你，大多数语言在早期阶段都相对容易掌握。有点像外语，有一些核心词汇可以让游客应付。例如“这个面包多少钱？”，如果你知道“多少钱”和“面包”这两个词，那么你就有足够的工具向店主询问一条面包。


    此外，由于语言是相关的，我们也可以从其他语言中共享一些词汇和结构。


    同样，编程也是如此。例如，我的旅程是从Basic到Fortran到C到C++，然后到Visual Basic，再到JavaScript，然后到NodeJs，最后到Python，在这个过程中还接触了几十种其他语言（如C#和PHP）。尽管这些语言看起来各不相同，但核心原则始终相同，相似度总是超过50%。


    所以带着这种安心感，让我们深入进去。'
