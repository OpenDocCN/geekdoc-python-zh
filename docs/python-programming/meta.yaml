    called buffering, and the optional flush keyword argument influences the function’s
    buffer.


    To understand buffering, let’s consider the process of building a wall with bricks.
    If we estimate that the wall requires around 1,350 bricks, the inefficient approach
    would involve making individual trips to the store for each brick. This process
    would repeat approximately 1,350 times. A more efficient method would involve
    loading as many bricks as possible into the vehicle during the first trip and
    then making subsequent trips as needed.


    In this analogy, the transport vehicle corresponds to the buffer. The print function
    uses a designated section of memory known as a buffer. Similar to the transport
    vehicle’s limited capacity, the memory buffer has a fixed capability. The print
    statement writes individual characters to the buffer, and when the buffer reaches
    its limit, the function sends all the buffered characters to the display screen
    in a single operation.


    This is more efficient than sending one character at a time to the screen. This
    buffering process can significantly enhance the output speed of programs displaying
    extensive text. Usually, the print function flushes the last characters from the
    buffer at the end of its output, even if the buffer isn’t full.


    This is comparable to a partially filled load of bricks. Sometimes, there’s a
    need to ensure the buffer is flushed to the screen before it’s completely filled.
