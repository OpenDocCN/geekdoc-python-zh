  md: 'We touched on recursive functions much earlier and found two convenient formats.
    [1] for the function to repeatedly call itself (simple), [2] calling a function
    repeatedly in a loop (efficient). In both cases we needed to make sure that we
    reach a case case when the function ends otherwise we run into an infinite loop
    or get a stack-overflow.


    In the code example above, we create a tree by using a recursive function to repeatedly
    call itself for the left branches and the right branches.


    The base case is set by the if statement where we check if levels =0 and then
    draw a leaf (end node) and return without calling the function any more.


    The turtle sets about passing through all of the recursive paths until every node
    is reached. This is the result of the code:


    ![](img/4e4fc350228cd1c84055205e597f4fc0_203_0.png)


