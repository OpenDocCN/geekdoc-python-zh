  md: '# Mandelbrot set


    Interesting because they combine complex numbers with fractals and also, we learn
    about stability, which is actually true for all iterative processes. The stability
    is beautifully highlighted in the mandelbrot set.


    Interestingly, this highly complicated pattern is produced by the most simple
    formula:


    $$Z_{n+1} = Z_n^2 + c$$


    Where $Z_n$ are complex numbers.


    The way that the mandelbrot set changes is also the hallmark of chaos theory.
    In the finalised version beautiful patterns are produced and the colouring is
    often used to represent the stability of any given number (the likelihood of a
    number blowing up) and this rapid change in stability near the edges is chaotic.


    The mandelbrot set originated in the 1970’s and by the 1980’s the first visualisations
    were done. However, the computing power was nowhere near the capabilities of today,
    so the creators were restricted to the mathematics and what computing resource
    that they had at the time. So this is what they produced:'
  merge: -1
  pgno: 212
- img_proc: true
  md: '![](img/4e4fc350228cd1c84055205e597f4fc0_213_0.png)


    Our sets, knowledge and capabilities far exceed those of the 1980’s by orders
    of magnitude as per moore''s law[24] and we will look into the fundamentals of
    the behaviour of complex numbers within the context of an iterative (or recursive)
    process.


    Before we consider complex numbers, let’s think about what happens to regular
    numbers on the number line and their stability. So let’s look at $X_{n+1} = X_n^2
    + c$ where X are real numbers.


    An initial basic inspection can be done with a table.'
  merge: -1
  pgno: 213
- img_proc: true
