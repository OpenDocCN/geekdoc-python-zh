    \ Python 中设置这些规则，并在 matplotlib 中创建动画：\n\n```python\nimport numpy as np\nimport\
    \ matplotlib.pyplot as plt\nimport matplotlib.animation as animation\n\n# 全局变量\n\
    OFF, ON = 0, 1\nvals = [ON, OFF]\n\ndef main():\n    \"\"\" 主函数 \"\"\"\n    N\
    \ = 100  # 设置网格大小\n    updateInterval = 100  # 设置动画更新间隔\n\n    # 声明网格\n    grid\
    \ = np.array([])\n    grid = randomGrid(N)\n\n    for i in range(5):\n       \
    \ addGlider(np.random.randint(2,N-2),\n                  np.random.randint(2,N-2),\
    \ grid)\n\n    # 设置动画\n    fig, ax = plt.subplots()\n    img = ax.imshow(grid,\
    \ interpolation='nearest')\n    ani = animation.FuncAnimation(fig, update,\n \
    \                                fargs=(img, grid, N, ), frames = 10,\n      \
    \                           interval=updateInterval,save_count=50)\n\n    plt.show()\n\
    \n\ndef randomGrid(N):\n    \"\"\"返回一个NxN的随机值网格\"\"\"\n    pyes=0.04\n    pno=1-pyes\n\
    \    return np.random.choice(vals, N*N, p=[pyes, pno]).reshape(N, N)\n\n\ndef\
    \ addGlider(i, j, grid):\n    \"\"\"在(i, j)处添加一个左上角细胞的滑翔机\"\"\"\n    glider =\
    \ [[0,0,1],[1,0,1],[0,1,1]]\n    grid[i:i+3, j:j+3] = glider\n\n\ndef update(frameNum,\
    \ img, grid, N):\n    # 复制网格，因为我们需要8个邻居\n    newGrid = grid.copy()\n    for i\
    \ in range(N):\n        for j in range(N):\n\n            # 计算8个邻居的总和（x和y方向环绕）\n\
    \            total = int(grid[i, (j-1)%N] + grid[i, (j+1)%N] +\n             \
    \           grid[(i-1)%N, j] + grid[(i+1)%N, j] +\n                        grid[(i-1)%N,\
    \ (j-1)%N] + grid[(i-1)%N, (j+1)%N] +\n                        grid[(i+1)%N, (j-1)%N]\
    \ + grid[(i+1)%N, (j+1)%N])\n\n            # 应用康威规则\n            if grid[i, j]\
    \ == ON:\n                if (total < 2) or (total > 3):\n                   \
    \ newGrid[i, j] = OFF\n            else:\n                if total == 3:\n   \
    \                 newGrid[i, j] = ON\n\n    # 更新数据\n    img.set_data(newGrid)\n\
    \    grid[:] = newGrid[:]\n    return img\n\n# 调用主函数\nif __name__ == '__main__':\n\
    \    main()\n```\n\n在这个最简单的游戏中，可以添加大量的变体和转折，但在我们考虑这些之前，让我们先看看代码的输出。\n\n![](img/4e4fc350228cd1c84055205e597f4fc0_254_0.png)\n\
