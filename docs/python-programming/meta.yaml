    \ element in a subsequence of the list.\n- Step is an integer that specifies the\
    \ stride size through the list. A step size of three, for example, would include\
    \ every third element in the list within the specified range. Negative step values\
    \ reverse the direction of the slice.\n\nIf missing, the begin value defaults\
    \ to 0. A begin value less than zero is treated as zero. If the end value is missing,\
    \ it defaults to the length of the list. An end value greater than the length\
    \ of the list is treated as the length of the list. The default step value is\
    \ 1. The examples provided in the next code, how list slicing works.\n\n```\n\
