    # 8.3. INTRODUCTION TO RECURSION


    The factorial function plays a significant role in combinatorial analysis, probability
    theory, and statistics within mathematics. In mathematical notation, the factorial
    of a nonnegative integer n is often denoted as n!. The definition of the factorial
    function for nonnegative integers is as follows:


    n! = n • (n – 1) • (n – 2) • (n – 3) • • • 3 • 2 • 1


    Additionally, 0! is specifically defined to be 1. Consequently, for instance,
    6! is calculated as 6 • 5 • 4 • 3 • 2 • 1, which equals 720. In a precise mathematical
    formulation, factorial is defined using the following recursive definition:


    n! = 1, if n = 0

    n • (n – 1)!, otherwise.


    This recursive definition exhibits a level of self-reference, as the factorial
    function is both being defined and invoked within its own definition. Python functions
    can also be defined recursively, mirroring the recursive nature of the mathematical
    definition.


    Here we provide an example of a recursive factorial function that adheres closely
    to the mathematical definition.'
