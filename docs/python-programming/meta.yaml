    \        print(\"Both conditions are False.\")\n    ```\n\n    Output:\n\n   \
    \ ```\n    At least one condition is True.\n    ```\n\n3.  **‘not’ Operator:**\
    \ The `not` operator negates the Boolean value of an expression. If the expression\
