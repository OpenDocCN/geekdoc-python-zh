    The best description of numpy comes from the official website:


    > NumPy is the fundamental package for scientific computing in Python. It is a
    Python library that provides a **multidimensional array object**[7], various derived
    objects (such as masked arrays and matrices), and an assortment of **routines
    for fast operations on arrays**, including mathematical, logical, shape manipulation,
    sorting, selecting, I/O, discrete Fourier transforms, basic linear algebra, basic
    statistical operations, random simulation and much more.


    The power of NumPy comes from the ndarray class and how it is laid out in memory.
    The ndarray class consists of


    +   1. The data type (all one type).

    2. A pointer to a **contiguous** block of memory.

    3. A tuple of the array shape.

    4. An array stride.


    The shape refers to the dimension of the array (a*b) while the stride is the number
    of bytes to step in a particular dimension when traversing an array in memory.
    With this NumPy has sufficient information to access all elements of the array.


    Numpy also allows for **row** or **column** major, which can add to efficiency
    with the keyword order . A good summary looks like this:'
