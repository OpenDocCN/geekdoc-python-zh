    # Extrapolation:


    So we now have a number of options for fitting data. The two most prominent methods
    are straight line (simple and intuitive) and cubic spline (fits curves quite well).


    But what approach do we take when the required interpolation point exists outside
    of the sample range.


    interpolation: $x_{min} \leq x_{interp} \leq x_{max}$


    **extrapolation:** $x_{min} > x_{interp} > x_{max}$


    Here are a few immediate options:


    +   1. Give up: Error message that data is out of bounds.'
