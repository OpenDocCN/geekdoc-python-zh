    \n然而，它在金融领域也有一个有用的应用，特别是在指数方面。以两个债券指数为例，假设每个指数包含1000只债券。我们如何衡量这两个指数之间的相似性？\n\n\
    嗯，这与比较两个字符串列表是相同的。所以如果我们能想出一种技术，那么我们就可以陈述“相似性”。\n\n基本示例是：\n\n- [a,b,c] 和 [a,b,c]\
    \ 是100%相似\n- [a,b,c] 和 [d,e,f] 是0%相似\n- [a,b,c] 和 [a,j,k] 是33%相似\n\n但是像这样呢：\n\n\
    - [a,b,c] 和 [c,a,b] 包含相同的字母但顺序不同。\n- [a,b,c] 和 [f,g,a] 有一个匹配的字母但位置不同。\n\n我们可以说，对于指数，*顺序无关紧要*，这将问题简化为前三种情况。\n\
    \n那么不同大小的列表呢？哪一对具有更高的相似性：\n\n- [a,b,c] 与 [a,b,c,d]\n- [a,b,c] 与 [a,b,c,d,e,f g]\n\
