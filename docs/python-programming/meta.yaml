    and teardown operations around function calls.

    9. **Stateful Decorators:** Stateful decorators maintain some internal state between
    function calls. They can be used to keep track of information across multiple
    invocations of the decorated function.

    10. **Decorator Stacks:** Decorator stacks involve applying multiple decorators
    to a single function in a specific order. This can be achieved using multiple
    decorator annotations.

    11. **Caching and Memoization Decorators:** These decorators are specifically
    focused on caching and memoization techniques to optimize function performance
    by storing and reusing calculated results.

    12. **Validation Decorators:** Validation decorators are used to validate inputs
    or outputs of functions to ensure they adhere to certain criteria or constraints.'
- md: "## 8.11. PARTIAL APPLICATION\n\nPartial application is a functional programming\
    \ concept where you fix a certain number of arguments of a function and generate\
    \ a new function. This new function takes the remaining arguments as its input\
    \ and returns the result as if all the arguments were provided at once.\n\nPython\
    \ provides various ways to achieve partial application:\n\n**Using functools.partial:**\n\
    \nThe functools module in the Python standard library provides a function called\
    \ partial that allows you to fix certain arguments of a function and generate\
    \ a new function. Here’s an example:\n\n```python\nfrom functools import partial\n\
    def multiply(x, y):\n    return x * y\n# Create a new function that multiplies\
    \ by 2\ndouble = partial(multiply, 2)\nresult = double(5) # This is equivalent\
    \ to calling multiply(2, 5)\nprint(result) # Output: 10\n```\n\n**Using Lambda\
    \ Functions:**\n\nYou can also achieve partial application using lambda functions:\n\
    \n```python\nmultiply = lambda x, y: x * y\n# Create a new function that multiplies\
    \ by 3\ntriple = lambda y: multiply(3, y)\nresult = triple(7) # This is equivalent\
    \ to calling multiply(3, 7)\nprint(result) # Output: 21\n```\n\n**Using Custom\
    \ Wrapper Functions:**\n\nYou can create your own wrapper functions to achieve\
    \ partial application:\n\n```python\ndef multiply(x, y):\n    return x * y\ndef\
    \ partial_multiply(x):\n    def inner(y):\n        return multiply(x, y)\n   \
    \ return inner\ndouble = partial_multiply(2)\nresult = double(8) # This is equivalent\
    \ to calling multiply(2, 8)\nprint(result) # Output: 16\n```\n\nEach of these\
    \ methods achieves partial application in a slightly different way, but they all\
    \ allow you to create new functions by fixing some arguments of an existing function.\
    \ You can choose the method that fits your coding style and requirements the best.\n\
    \nThe three functions are `read_file`, `roll`, and `run_trials`. The script appears\
    \ to be about conducting experiments with dice rolls, both through actual pseudorandom\
    \ rolls and by reading data from a file. The `run_trials` function is used to\
    \ compare the outcomes of these two methods. However, there's a slight issue with\
    \ the indentation in the provided code. In Python, proper indentation is crucial\
    \ for code blocks. Below, I've corrected the indentation and added comments to\
    \ explain the different parts of the code:\n\n```python\nfrom random import randint\n\
    from functools import partial\ndef read_file(filename, n, val):\n    \"\"\" Reads\
    \ n integers from the text file named filename.\n    Returns the number of times\
    \ val appears in the file. \"\"\"\n    count, read = 0, 0\n    with open(filename,\
    \ 'r') as f:\n        for value in f.readlines():\n            read += 1\n   \
    \         # Have we read enough values in yet?\n            if read > n:\n   \
    \             break\n            # Convert text integer into an actual integer\n\
    \            if int(value) == val:\n                count += 1\n    return count\n\
    def roll(n, val):\n    \"\"\" Simulates the roll of a pair of dice n times.\n\
    \    Returns the number of times a roll resulted in val. \"\"\"\n    count = 0\n\
    \    for i in range(n):\n        roll = randint(1, 6) + randint(1, 6)\n      \
    \  if roll == val:\n            count += 1\n    return count\ndef run_trials(f,\
    \ n):\n    \"\"\" Performs n experiments using function f as the source of outcomes.\n\
    \    Counts the number of occurrences of each possible outcome. \"\"\"\n    for\
    \ value in range(2, 13):\n        print(\"{:>3}:{:>5}\".format(value, f(n, value)))\n\
    # Compare the actual experiments to the simulation\nnumber_of_trials = 100\nprint('---\
    \ Pseudorandom number rolls ---')\nrun_trials(roll, number_of_trials)\nprint('---\
    \ Actual experimental data ---')\nrun_trials(partial(read_file, 'dicedata.data'),\
    \ number_of_trials)\n```\n\nIn this corrected version, the indentation is adjusted,\
    \ making the code structure clear. The `run_trials` function is used to compare\
    \ outcomes from the `roll` function (simulated dice rolls) and the `read_file`\
    \ function (reading data from a file). The `partial` function is used to fix the\
    \ filename argument of `read_file` while allowing `n` and `val` to vary during\
    \ the trials.\n\n## 8.12. EXERCISES\n\n1. Consider the following Python code:\n\
    \n```python\ndef sum1(n):\n    s = 0\n    while n > 0:\n        s += 1\n     \
    \   n -= 1\n    return s\n\ndef sum2():\n    global val\n    s = 0\n    while\
    \ val > 0:\n        s += 1\n        val -= 1\n    return s\n\ndef sum3():\n  \
    \  s = 0\n    for i in range(val, 0, -1):\n        s += 1\n    return s\n\ndef\
    \ main():\n    # See each question below for details\n    main() # Call main function\n\
    ```\n\na. What is printed if `main` is written as follows?\n\n```python\ndef main():\n\
    \    global val\n    val = 5\n    print(sum1(5))\n    print(sum2())\n    print(sum3())\n\
    ```\n\nb. What is printed if `main` is written as follows?\n\n```python\ndef main():\n\
    \    global val\n    val = 5\n    print(sum1(5))\n    print(sum3())\n    print(sum2())\n\
    ```\n\nc. What is printed if `main` is written as follows?\n\n```python\ndef main():\n\
    \    global val\n    val = 5\n    print(sum2())\n    print(sum1(5))\n    print(sum3())\n\
    ```\n\nd. Which of the functions `sum1`, `sum2`, and `sum3` produce a side effect?\
    \ What is the side effect?\n\ne. Which function may not use the `val` variable?\n\
    \nf. What is the scope of the variable `val`? What is its lifetime?\n\ng. What\
    \ is the scope of the variable `i`? What is its lifetime?\n\nh. Which of the functions\
    \ `sum1`, `sum2`, and `sum3` demonstrate good functional independence? Why?\n\n\
    2. Consider the following Python code:\n\n```python\ndef next_int1():\n    cnt\
    \ = 0\n    cnt += 1\n    return cnt\n\nglobal_count = 0\ndef next_int2():\n  \
    \  global global_count\n    global_count += 1\n    return global_count\n\ndef\
    \ main():\n    for i in range(0, 5):\n        print(next_int1(), next_int2())\n\
    main()\n```\n\na. What does the program print?\n\nb. Which of the functions `next_int1`\
    \ and `next_int2` is the best function for the intended purpose? Why?\n\nc. What\
    \ is a better name for the function named `next_int1`?\n\nd. The `next_int2` function\
    \ works in this context, but why is it not a good implementation of a function\
    \ that always returns the next largest integer?\n\n3. When is the `global` statement\
    \ required?\n\n4. What does the following Python program print?\n\n```python\n\
    def sum(m=0, n=0, r=0):\n    return m + n + r\ndef main():\n    print(sum())\n\
    \    print(sum(4))\n    print(sum(4, 5))\n    print(sum(5, 4))\n    print(sum(1,\
    \ 2, 3))\n    print(sum(2.6, 1.0, 3))\nmain()\n```\n\n5. Consider the following\
    \ function:\n\n```python\ndef proc(n):\n    if n < 1:\n        return 1\n    else:\n\
    \        return proc(n/2) + proc(n - 1)\n```\n\nEvaluate each of the following\
    \ expressions:\n\na. `proc(0)`\nb. `proc(1)`\nc. `proc(2)`\nd. `proc(3)`\ne. `proc(5)`\n\
    f. `proc(10)`\n\n6. Rewrite the `gcd` function so that it implements Euclid’s\
    \ method but uses iteration instead of recursion.\n\n7. Classify the following\
    \ functions as pure or impure. `x` is a global variable.\n\n```python\na. def\
    \ f1(m, n):\n    return 2*m + 3*n\nb. def f2(n):\n    return n - 2\nc. def f3(n):\n\
    \    return n - x\nd. def f4(n):\n    print(2*n)\ne. def f5(n):\n    m = int(input())\n\
    \    return m * n\nf. def f6(n):\n    m = 2*n\n    p = 2*m - 5\n    return p -\
    \ n\n```\n\n8. Lambda expressions TODO.\n\n9. Write a generator function named\
    \ `oscillate` that enables the following code:\n\n```python\nfor n in oscillate(-3,\
    \ 5):\n    print(n, end=' ')\nprint()\n```\n\nto print\n\n```\n-3 3 -2 2 -1 1\
    \ 0 0 1 -1 2 -2 3 -3 4 -4\n```"
  mdcn: "## 8.11. 偏函数应用\n\n偏函数应用是函数式编程中的一个概念，它指的是固定一个函数的某些参数，从而生成一个新的函数。这个新函数接收剩余的参数作为输入，并返回结果，就好像所有参数都一次性提供了一样。\n\
    \nPython 提供了多种实现偏函数应用的方法：\n\n**使用 `functools.partial`：**\n\nPython 标准库中的 `functools`\
    \ 模块提供了一个名为 `partial` 的函数，它允许你固定一个函数的某些参数并生成一个新函数。以下是一个示例：\n\n```python\nfrom\
    \ functools import partial\ndef multiply(x, y):\n    return x * y\n# 创建一个乘以 2\
    \ 的新函数\ndouble = partial(multiply, 2)\nresult = double(5) # 这等同于调用 multiply(2,\
    \ 5)\nprint(result) # 输出: 10\n```\n\n**使用 Lambda 函数：**\n\n你也可以使用 lambda 函数来实现偏函数应用：\n\
    \n```python\nmultiply = lambda x, y: x * y\n# 创建一个乘以 3 的新函数\ntriple = lambda y:\
    \ multiply(3, y)\nresult = triple(7) # 这等同于调用 multiply(3, 7)\nprint(result) #\
    \ 输出: 21\n```\n\n**使用自定义包装函数：**\n\n你可以创建自己的包装函数来实现偏函数应用：\n\n```python\ndef multiply(x,\
    \ y):\n    return x * y\ndef partial_multiply(x):\n    def inner(y):\n       \
    \ return multiply(x, y)\n    return inner\ndouble = partial_multiply(2)\nresult\
    \ = double(8) # 这等同于调用 multiply(2, 8)\nprint(result) # 输出: 16\n```\n\n这些方法中的每一种都以略有不同的方式实现了偏函数应用，但它们都允许你通过固定现有函数的某些参数来创建新函数。你可以选择最适合你编码风格和需求的方法。\n\
    \n这三个函数是 `read_file`、`roll` 和 `run_trials`。该脚本似乎是关于使用骰子投掷进行实验，既通过实际的伪随机投掷，也通过从文件中读取数据。`run_trials`\
    \ 函数用于比较这两种方法的结果。然而，提供的代码中存在一个轻微的缩进问题。在 Python 中，正确的缩进对于代码块至关重要。下面，我已更正了缩进并添加了注释来解释代码的不同部分：\n\
    \n```python\nfrom random import randint\nfrom functools import partial\ndef read_file(filename,\
    \ n, val):\n    \"\"\" 从名为 filename 的文本文件中读取 n 个整数。\n    返回 val 在文件中出现的次数。 \"\"\
    \"\n    count, read = 0, 0\n    with open(filename, 'r') as f:\n        for value\
    \ in f.readlines():\n            read += 1\n            # 我们是否已经读取了足够的值？\n   \
    \         if read > n:\n                break\n            # 将文本整数转换为实际的整数\n \
    \           if int(value) == val:\n                count += 1\n    return count\n\
    def roll(n, val):\n    \"\"\" 模拟投掷一对骰子 n 次。\n    返回投掷结果为 val 的次数。 \"\"\"\n   \
    \ count = 0\n    for i in range(n):\n        roll = randint(1, 6) + randint(1,\
    \ 6)\n        if roll == val:\n            count += 1\n    return count\ndef run_trials(f,\
    \ n):\n    \"\"\" 使用函数 f 作为结果来源执行 n 次实验。\n    统计每种可能结果的出现次数。 \"\"\"\n    for value\
    \ in range(2, 13):\n        print(\"{:>3}:{:>5}\".format(value, f(n, value)))\n\
    # 比较实际实验与模拟\nnumber_of_trials = 100\nprint('--- 伪随机数投掷 ---')\nrun_trials(roll,\
    \ number_of_trials)\nprint('--- 实际实验数据 ---')\nrun_trials(partial(read_file, 'dicedata.data'),\
    \ number_of_trials)\n```\n\n在这个更正后的版本中，缩进已调整，使代码结构清晰。`run_trials` 函数用于比较来自 `roll`\
    \ 函数（模拟骰子投掷）和 `read_file` 函数（从文件读取数据）的结果。`partial` 函数用于固定 `read_file` 的文件名参数，同时允许\
    \ `n` 和 `val` 在实验过程中变化。\n\n## 8.12. 练习\n\n1. 考虑以下 Python 代码：\n\n```python\ndef\
    \ sum1(n):\n    s = 0\n    while n > 0:\n        s += 1\n        n -= 1\n    return\
    \ s\n\ndef sum2():\n    global val\n    s = 0\n    while val > 0:\n        s +=\
    \ 1\n        val -= 1\n    return s\n\ndef sum3():\n    s = 0\n    for i in range(val,\
    \ 0, -1):\n        s += 1\n    return s\n\ndef main():\n    # 详情请参阅下面每个问题\n  \
    \  main() # 调用 main 函数\n```\n\na. 如果 `main` 编写如下，会打印什么？\n\n```python\ndef main():\n\
    \    global val\n    val = 5\n    print(sum1(5))\n    print(sum2())\n    print(sum3())\n\
    ```\n\nb. 如果 `main` 编写如下，会打印什么？\n\n```python\ndef main():\n    global val\n  \
    \  val = 5\n    print(sum1(5))\n    print(sum3())\n    print(sum2())\n```\n\n\
    c. 如果 `main` 编写如下，会打印什么？\n\n```python\ndef main():\n    global val\n    val =\
    \ 5\n    print(sum2())\n    print(sum1(5))\n    print(sum3())\n```\n\nd. 函数 `sum1`、`sum2`\
    \ 和 `sum3` 中哪一个会产生副作用？副作用是什么？\n\ne. 哪个函数可能不使用 `val` 变量？\n\nf. 变量 `val` 的作用域是什么？它的生命周期是什么？\n\
    \ng. 变量 `i` 的作用域是什么？它的生命周期是什么？\n\nh. 函数 `sum1`、`sum2` 和 `sum3` 中哪一个展示了良好的函数独立性？为什么？\n\
    \n2. 考虑以下 Python 代码：\n\n```python\ndef next_int1():\n    cnt = 0\n    cnt += 1\n\
    \    return cnt\n\nglobal_count = 0\ndef next_int2():\n    global global_count\n\
    \    global_count += 1\n    return global_count\n\ndef main():\n    for i in range(0,\
    \ 5):\n        print(next_int1(), next_int2())\nmain()\n```\n\na. 程序打印什么？\n\n\
    b. 函数 `next_int1` 和 `next_int2` 中哪一个最适合预期目的？为什么？\n\nc. 函数 `next_int1` 一个更好的名字是什么？\n\
    \nd. `next_int2` 函数在此上下文中有效，但为什么它不是一个好的实现，无法始终返回下一个最大的整数？\n\n3. 何时需要 `global`\
    \ 语句？\n\n4. 以下 Python 程序打印什么？\n\n```python\ndef sum(m=0, n=0, r=0):\n    return\
    \ m + n + r\ndef main():\n    print(sum())\n    print(sum(4))\n    print(sum(4,\
    \ 5))\n    print(sum(5, 4))\n    print(sum(1, 2, 3))\n    print(sum(2.6, 1.0,\
    \ 3))\nmain()\n```\n\n5. 考虑以下函数：\n\n```python\ndef proc(n):\n    if n < 1:\n \
    \       return 1\n    else:\n        return proc(n/2) + proc(n - 1)\n```\n\n计算以下每个表达式：\n\
    \na. `proc(0)`\nb. `proc(1)`\nc. `proc(2)`\nd. `proc(3)`\ne. `proc(5)`\nf. `proc(10)`\n\
    \n6. 重写 `gcd` 函数，使其使用迭代而非递归来实现欧几里得算法。\n\n7. 将以下函数分类为纯函数或非纯函数。`x` 是一个全局变量。\n\n\
    ```python\na. def f1(m, n):\n    return 2*m + 3*n\nb. def f2(n):\n    return n\
    \ - 2\nc. def f3(n):\n    return n - x\nd. def f4(n):\n    print(2*n)\ne. def\
    \ f5(n):\n    m = int(input())\n    return m * n\nf. def f6(n):\n    m = 2*n\n\
    \    p = 2*m - 5\n    return p - n\n```\n\n8. Lambda 表达式 TODO。\n\n9. 编写一个名为 `oscillate`\
    \ 的生成器函数，使以下代码能够运行：\n\n```python\nfor n in oscillate(-3, 5):\n    print(n, end='\
    \ ')\nprint()\n```\n\n并打印\n\n```\n-3 3 -2 2 -1 1 0 0 1 -1 2 -2 3 -3 4 -4\n```"
