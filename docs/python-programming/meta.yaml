    # 2.4. FLOATING-POINT NUMBERS


    Floating-point numbers are essential for many computational tasks that involve
    fractional parts. For instance, calculating the area of a circle using the radius
    requires the use of the value π, which is approximately 3.14159. Python fully
    supports non-integer numbers, referring to them as floating-point numbers. The
    term “floating-point” suggests that the decimal point can move or “float” to different
    positions within the number to preserve the required number of significant digits
    during mathematical computations. In Python, these floating-point numbers are
    represented by the float data type.


    Here’s an example interactive session demonstrating the use of floating-point
    numbers:


    ```

    >>> radius = 5

    >>> area = 3.14159 * radius ** 2

    >>> area

    78.53975

    ```


    The float data type in Python is represented using 64 bits of storage. It has
    a range from approximately 2.22507 x 10^-308 to 1.79769 x 10^308, and it provides
    a precision of up to 15 significant digits. However, it’s crucial to note that
    the actual range and precision of floating-point numbers may vary depending on
    the Python implementation used on a particular machine.'
