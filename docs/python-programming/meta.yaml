  md: "similarity = cos(θ) = \\frac{\\mathbf{a} \\cdot \\mathbf{b}}{|\\mathbf{a}||\\\
    mathbf{b}|}\n\nWhich reduces to:\n\nsimilarity = \\frac{\\mathbf{a} \\cdot \\\
    mathbf{b}}{|\\mathbf{a}||\\mathbf{b}|} = \\frac{\\sum_{i=1}^{n} (a_i b_i)}{\\\
    sqrt{\\sum_{i=1}^{n} a_i^2} \\sqrt{\\sum_{i=1}^{n} b_i^2}}\n\nBecause the lists\
    \ are homogeneous we can produce this in a few lines of code.\n\n```\nimport math\n\
    aibi = sum(df['first_weight'] * df['second_weight'])\na_norm = math.sqrt(sum(df['first_weight']**2))\n\
    b_norm = math.sqrt(sum(df['second_weight']**2))\nsimilarity = aibi / (a_norm *\
    \ b_norm)\n\nprint('the similarity is:', similarity)\n# result is 0.155\n```\n\
    \nWe can now compare any two indices and we could test the code with logical inputs.\n\
    \nFor example, the following two lists have no similarity.\n\n```\nd = {'first_index_names':['a','b','c'],\n\
    \     'first_index_weights':[0.2, 0.2, 0.6],\n     'second_index_names':['d',\
