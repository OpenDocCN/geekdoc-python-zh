  md: 'The reason that we can say this is because of how we call the items when we
    want to get their values.


    To get a specific list item, the coder needs to know its position in the list
    (its index). And call it that way. So the first item in the list is called like
    this: my_list[0] , the second item my_list[0] , and so forth…


    If we look at the dict, this is exactly the same: my_dict[0], my_dict[1], and
    so forth…


    So we can see how an ordered dict (which starts with the first key = 0) is identical
    to the list.


    Finally, we have the Tuple. I have left this to last, because in a way it is covered
    by the list. The main difference being that a Tuple looks like a list but the
    elements cannot change, but has all the same properties. So it is like a fixed
    list as we cannot change the values or add or remove elements from a Tuple in
    the same way that we can for a list.


    ```

    my_tuple = ("apple", "banana", "cherry", "apple")

    ```


    This is useful in cases where we know that we do not want to change the list size,
    for example in a 2D plane we only want x and y coordinates and this is best represented
    with the tuple (x, y) as it will never change its size.


    Note, there is also the ‘set’, which is left as an exercise for the reader to
    follow up on which also has good use cases (for example sorting), but it occurs
    less commonly. So whilst noted we delve into sets less frequently.


    In summary these are the 4 collection data types in python with their common features:


    +   1. **List** is a collection which is **ordered** and changeable. Allows duplicate
    members.

    2. **Tuple** is a collection which is **ordered** and unchangeable. Allows duplicate
    members.

    3. **Set** is a collection which is **unordered**, unchangeable, and unindexed.
    No duplicate members.

    4. **Dictionary** is a collection which is **unordered** and changeable. No duplicate
    members.'
