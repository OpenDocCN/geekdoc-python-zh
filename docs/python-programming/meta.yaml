    ax[1].hist(y, bins=int(n/10), orientation=''horizontal'')

    ax[1].set_yticks([])

    plt.show()

    ```


    The imports at the top provide tools to do all the basic maths operations and
    the entire distribution is generated by the np.random.lognormal() function.

    We are able to plot this using matplotlib showing 1000 points, but also plotting
    a histogram oriented sideways to indicate the frequency of the plots.


    ![](img/4e4fc350228cd1c84055205e597f4fc0_103_0.png)


    For this particular chart the average was 108.36 and std of 47.59. We could run
    this routine many times, which would create many similarly looking random distributions.

    Running simulations many times is a common technique especially with the increased
    computing power that is available and is referred to as a monte-carlo simulation
    and takes a number of different formats.


    # Time series


    The time series is important because it represents the evolution of a function'
  merge: -1
  pgno: 103
- img_proc: true
  md: '(price) with respect to time. In finance, other value metrics are used, such
    as bond yields or spreads (which are the differences in yields).


    We often see prices dropping and yields rising or spreads widening when the market
    is taking off risk and conversely prices rising and yields dropping or spreads
    tightening when the market is adding risk.


    We can capture this data and measure and analyse it and make various statistical
    statements about the systems that we have measured.


    There are a few approaches, but let''s try these two:


    +   - generate our own sample data by creating a random walk

    - we could download a common dataset.


    The random walk is fun and we can do lots with it, plus it is good for testing
    out some of the techniques that we have been through and has real world applications.


    In the simplest case, we start with a price and make it evolve over discrete intervals
    of time, such as days. So we can say that the price tomorrow is some function
    of the price today or equivalently the next price was contingent on the previous
    price and some other input parameters that the user sets.


    $$P_{n+1} = f(P_n)$$


    For the price of the stock, we might crudely assume that there is an upward drift
    and on top of this we could add a random value to represent an unknown volatility
    component, so we have this:


    $$P_{n+1} = (\alpha + \beta_n)P_n$$


    Where $\alpha$ is a predefined constant and $\beta_n$ is a random number generated
    at each step. So we have a **drift** and a **diffusion**.


    Let''s say that over the course of a year, the price should increase by 5%, with
    no volatility (so, $\beta_n = 0, \forall n$). Then the following would be true:


    $$P_{365} = \alpha^{365}P_0$$'
  merge: -1
  pgno: 104
- img_proc: true
  md: "And therefore the term $\\alpha^{365}$ is equal to 1.05. So we can solve for\
    \ $\\alpha$.\n\n$\\alpha = 1.05^{1/365}$\n\nAnd if we introduce a suitable volatility,\
    \ say $\\beta = \\frac{random(0,1)}{100}$, then it becomes possible to attempt\
    \ reasonable walks.\n\nAgain, we produce this in 30 lines of code.\n\n```\nimport\
    \ random\nfrom matplotlib import pyplot as plt\n\nstart_price = 100\nnumber_of_steps\
    \ = 365\n\n# 5% over a 1-year period\ndrift = pow(1.05, 1/365)\n\ndef random_walk():\n\
    \    \"\" a random walk function\"\"\"\n    p = [start_price]\n    for i in range(number_of_steps):\n\
    \        vola = (random.random() - 0.5)/100\n        p_next = (drift + vola) *\
    \ p[i]\n        p.append(p_next)\n\n    return p\n\n# lets do 100 random walks\
    \ (list comprehension)\nwalks = [random_walk() for x in range(100)]\n\n# plot\
    \ all the paths\nfor i in walks:\n    plt.plot(i)\n\nplt.show()\n```\n\nThis is\
    \ what 10 random walks each of 365 daily steps over the course of 1 year looks\
    \ like with the model above."
  merge: -1
  pgno: 105
