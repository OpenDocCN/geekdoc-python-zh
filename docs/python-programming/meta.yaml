    jupiter.png\")\nphoto_sat = tk.PhotoImage(file=\"saturn.png\")\n\nimage_space\
    \ = canvas.create_image(0,0,image=photo_space)\nimage_jup = canvas.create_image(0,0,image=photo_jup)\n\
    image_sat = canvas.create_image(450,0,image=photo_sat)\n\nt0 = time.time()\nwhile\
    \ True:\n    # plot positions to console\n    coords_jup = canvas.coords(image_jup)\n\
    \    coords_sat = canvas.coords(image_sat)\n    print('jup, sat:', coords_jup,\
    \ coords_sat)\n\n    # move the planets\n    canvas.move(image_jup, velocity_x,\
    \ velocity_y)\n    canvas.move(image_sat, -velocity_x, velocity_y)\n    win.update()\n\
    \    time.sleep(0.01)\n    t1 = time.time()\n    if t1-t0 > 5:\n        break\n\
    \nwin.mainloop()\n```\n\nWhich gives this moving result:\n\n![](img/4e4fc350228cd1c84055205e597f4fc0_145_0.png)\n\
    \n![](img/4e4fc350228cd1c84055205e597f4fc0_145_1.png)\n\nThis was a very short\
    \ snip of an animation, but here are the general rules for all similar GUI’s (like\
    \ pygame):\n\n1. The images and sounds are usually stored in a sub-folder called\
    \ “assets”.\n2. All images are squares which have transparent backgrounds. The\
    \ squares are defined by the top left corner, so to get the centre we would need\
    \ to obtain the image width & height and divide by 2.\n3. We use the centres and\
    \ widths to determine collisions with other objects and also the screen edges\
    \ (in the example code, the planets simply disappear off the screen).\n4. There\
    \ is always a loop, which is usually a while loop.\n5. We keep redrawing the images\
    \ in their new positions before updating the loop win.update() . And importantly,\
    \ **this is the effect of motion**.\n\nThere are lots of things that we could\
    \ do from here, for example we could assign masses to the two planets and invoke\
    \ the force of gravity from each one upon the other.\n\nThe force of attraction\
    \ on each planet (or particle) would be\n\n$$F = -\\frac{GMm}{r^2}$$\n\nWhere\
    \ r is the distance between the two:\n\n$$r^2 = x^2 + y^2$$\n\nM is the mass of\
    \ the other planet (or if more than one planet, it would be the sum of the system\
    \ of planets). With this method, not only could we do a simulation of planetary\
    \ movements, but we could model entire galaxies or clusters of thousands of stars\
    \ colliding.\n\nThe processing power of modern day computers, let alone high powered\
    \ computers, are more than capable of producing amazing simulations. And what\
    \ we would observe is chaotic motion but with broad observable and rather beautiful\
