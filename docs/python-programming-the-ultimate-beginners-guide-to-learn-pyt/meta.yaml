  md: '# Chapter 6:

    Working With Algorithms


    By now you should have an idea about the workings of some of the basic machine
    learning functions in Python and know what predictive analytics is. In this chapter,
    you are going to work with algorithms.


    # What is an Algorithm?


    An algorithm in programming is a set of instructions that need to be executed
    in an orderly fashion from start to finish in order to achieve the desired outcome.
    Designing an algorithm is universal and not code specific. One algorithm may be
    used across many different programming languages. Although it may be written differently,
    the functionality and outcome will be the same no matter the language it is written
    in.


    # Important Categories of an Algorithm


    There are different categories that algorithms fall into that a programmer needs
    to take into account when designing an algorithm.

    The following are import algorithm categories to be aware of:


    +   - Delete — This would be an algorithm to delete duplicate data from an existing
    data structure.

    - Insert — This would be an algorithm to insert data into an existing data structure.

    - Search — This would be an algorithm to search for specific data in an existing
    data structure.

    - Sort — This would be an algorithm to sort data in a certain order in an existing
    data structure.

    - Update — This would be an algorithm that enables data in an existing data structure
    to be updated/modified.


    # Algorithm Characteristics'
  merge: -1
  pgno: 50
- img_proc: true
  md: 'Algorithms have well-defined characteristics and if a procedure does not display
    these characteristics, they cannot be called algorithms.

    The following are characteristics of an algorithm:


    +   - Effective — An algorithm needs to be useful with no unnecessary steps that
    could make it less effective. It has to be feasible with the resources available.

    - Explicit — An algorithm must be unambiguous; it can have only one meaning, so
    it has to be clear and concise with each step laid out.

    - Finite — An algorithm needs to display the characteristic of finiteness and
    terminate after a specific number of steps.

    - Input — An algorithm must have well-defined inputs. This means that the programmer
    needs to know the amount of data, the form of the data, and what kind of data
    they are dealing with. All algorithms should have zero or more inputs.

    - Output — As with the input data, to get the required output a programmer needs
    to know the kind of data they are working with, how much data there is, and the
    form of the data. Algorithms need 1 or more outputs that must be well-defined.


    # Getting Started With Algorithms


    As algorithms are not code specific, programmers generally write them using basic
    common code constructs that are shared with the different programming languages.
    There are no set hard and fast rules or standards for designing or writing algorithms
    either, rather they are written depending on the available resources for a problem
    that exists or may arise.


    Writing algorithms is a process that starts once the problem it is being written
    for has been well-defined. As an algorithm is a step-by-step set of procedures,
    writing the algorithm is generally a step-by-step procedure, too.


    # How Do You Start Writing an Algorithm?'
  merge: -1
  pgno: 51
- img_proc: true
  md: 'An algorithm is like a recipe. You have certain ingredients that are used (data),
    and these ingredients are mixed in a step by step procedure (performing a task)
    in order to get the desired dish (outcome).

    Using a recipe as an example, you are going to learn how to write an algorithm.


    # Step 1: The Problem


    The first step is to define the problem. In this case, it is a recipe, but for
    what?


    +   - You want to make a cake.


    What type of cake:


    +   - Chocolate cake.


    How many cakes?


    +   - 1


    Now the problem has been defined:


    +   - You want to make 1 chocolate cake.


    It must be noted that problems in real-life situations are not as simple as above.
    There is a lot that goes into defining a problem. Usually, developers do not get
    involved at this level unless they are developing a system they want to develop
    for themselves.

    Although most developers shy away from getting involved in defining the problem,
    they are always roped in. If you go back to the start of this chapter part of
    a characteristic of an algorithm is a “well-defined problem.”


    Some of the common features of a well-defined problem should include:


    +   - The descriptions should not be ambiguous.

    - The problem should be clear and concise with no unstated presumptions.

    - There should be no internal contradictions.'
  merge: -1
  pgno: 52
- img_proc: true
  md: '+   - The description of the problem should be complete and detailed.


    # Step 2: Analyze the Problem


    Once the problem has been identified as a well-defined one, the programmer needs
    to analyze it. During this step, you need to answer questions such as:


    +   - What kind of data is it?

    - Are there rules pertaining to working with the data?

    - Is the data readily available?

    - Where is the data?

    - What is the relationship between the data?

    - What items need to be removed?

    - What items need to be changed, updated, or modified?

    - What are the changes, modifications, or updates?

    - What is the desired outcome or end results?


    # Step 3: The Algorithm


    +   - Input the ingredients (input data)

    - Mix the ingredients in a certain way and put it in the oven (perform the task)

    - Output the baked cake (output data)


    Now that you have defined the problem and analyzed it, it is time to figure out
    the solution algorithm to obtain the desired outcome. But if you look at baking
    cakes, for example, you will see that there is more than one way to bake a cake.


    As with any problem, there is usually more than one solution that can output the
    desired results. You can’t just take the first solution you have presented, because
    the second, third, or even fourth solution may be a better fit for the situation.


    When designing algorithms, you will more than likely end up with a number of solution
    algorithms that could be suitable for the defined problem.'
  merge: -1
  pgno: 53
- img_proc: true
  md: '# Step 4: Analyzing and Choosing the Best Solution Algorithm for the Problem


    The best solution algorithm will depend on a number of factors, such as:


    +   - The resources at your disposal — you can eliminate solutions that may incur
    extra time, effort, or resources.

    - Costs — The most cost-effective solution that does not cut back on quality and
    puts no extra stress on other resources.

    - Speed — An algorithm needs to be streamlined and finite. If one solution has
    fewer procedures to deliver the desired outcome, you are going to choose it.


    # Step 5: Develop the Algorithm


    Once the solution algorithm has been chosen, you will need to develop a high-level
    algorithm. This is the basic structure of the algorithm which will give a satisfactory
    day-to-day outcome if run as is.


    This structure is best to start with, like the framework for a house. Once we
    know it will effectively perform the basic task, for instance, if the foundation
    and framework are solid, we can add detail to it.


    # Step 6: Refine the Chosen Solution Algorithm


    Once the solution algorithm has been chosen, it needs to be refined by adding
    more detail. What else does the algorithm need, what are potential problems that
    could arise, etc.


    Like baking a cake, when you are designing an algorithm it is not only the data
    or problem that has to be taken into account. You have to think about the more
    technical aspects like computing power. What is it going to take to run the algorithm?


    A good rule of thumb is to over-stack the algorithm with detail rather than to
    under-stack it. It is easier to take away detail than it is to add it.


    # Step 7: Review'
  merge: -1
  pgno: 54
- img_proc: true
  md: 'Step 7 is like a never-ending loop. Once the algorithm is done it must be constantly
    reviewed for changes, updates, or ways to make it better. If there are updates,
    changes, or additions it will go back a step or two.


    # **Choosing a Model**


    Not only could there are many different solutions to a problem, but there could
    also be a few models to base the algorithm on.

    Some of the machine learning algorithm models in Python are:


    +   - Classification and Regression Trees (CART) — Used for classification and
    prediction modeling.

    - Decision Tree — This model is used for decision-based outcomes like a bank would
    use to approve a loan.

    - K-Means Clustering — This model is used for unsupervised learning models. It
    is used to find patterns in specific datasets.

    - K-Nearest Neighbor (KNN) — Determines patterns by observing its closest neighbor.

    - Linear Regression — A basic yet powerful model, used to predict an outcome based
    on one or more independent variables.

    - Logistic Regression — This model works on the same principles as a classification
    model. It is used to predict new probable outcomes based on a particular category.

    - Principal Component Analysis (PCA) — This model takes a huge chunk of data and
    condenses it into a more manageable one.


    In the next chapter, you will have a brief overview of some of the models listed
    above.'
