    \ natural language processing (NLP) and contains numerous text processing libraries.\n\
    \n### Theano\n\nTheano is a Python library that is used for machine learning and\
    \ deep learning. Since 2007, Theano has been used to run computationally intensive\
    \ scientific investigations on a massive scale. It is a powerful library that\
    \ can evaluate, define, and optimize complex mathematical expressions with multi-dimensional\
    \ arrays.\n\n### TensorFlow\n\nTensorFlow is a machine learning library used to\
    \ create Deep Learning models that use fast numerical computing. Although it is\
    \ run as a Python library, TensorFlow was designed, developed, and released by\
    \ Google. Like Python, and most of the Python libraries, TensorFlow is open-source\
    \ software that is easy and free to download and install.\n\n### Keras\n\nKeras\
    \ is a Python library that gives a top-level Application Programming Interface\
    \ (API) to neural-networking systems. It works best running alongside or on top\
    \ of Theano, R, PlaidML, MS Cognitive Toolkit, or TensorFlow.\n\n### PyTorch\n\
    \nPyTorch is a popular deep learning library written in Lua. It is an open-source\
    \ model of Torch for Python. It gives programmers access to the same Torch libraries.\
    \ PyTorch is good for beginners and has some useful tutorials with lots of examples.\n\
    \n## Chapter 2: Start Learning Python\n\nScikit-learn is one of the most popular\
    \ machine learning Python libraries, to begin with. It gives new developers a\
    \ good base from which to learn how the various aspects of ML work, such as labeling,\
    \ modeling, and testing.\n\nAnother good machine learning base to start with is\
    \ Keras, which is known for its ease of use and straightforward modeling structure.\
    \ As you become more adept with Python and machine learning, you will be able\
    \ to make more informed Python machine learning library choices.\n\n## Brief Overview\
    \ of Machine Learning Processes\n\nBefore you get into Python machine learning,\
    \ there are a few machine learning processes that you need to be aware of. These\
    \ processes include:\n\n- **Supervised Learning** — Supervised Learning is where\
    \ the system will develop a predictive outcome based on both input and output\
    \ data. Models of supervised learning include:\n    - Classification\n    - Regression\n\
    - **Unsupervised Learning** — Unsupervised Learning is based on input data. The\
    \ system will interpret and group data based on the input data. Models of unsupervised\
    \ learning include:\n    - Clustering\n\n## The Basic Principles of Python Machine\
    \ Learning\n\nThe basis of machine learning is for the system to learn based on\
    \ experience. For example, think about teaching a child the difference between\
    \ shark fins and dolphins fins. You would show them that a shark's tail fin is\
    \ vertical and that it sways from side to side, while a dolphin's tail is horizontal\
    \ and sways up and down. Once the child has gathered that information, they will\
    \ be able to use that to distinguish between the two creatures.\n\nIn a similar\
    \ way, a machine learning algorithm is fed base data upon which to learn and grow.\
    \ For instance, an estate agent may have statistical information about neighborhoods,\
    \ the houses in those neighborhoods, and the average cost per house. This information\
    \ would be the training information for the ML. From this information, the system\
    \ would be able to output the average costs of two or three bedroomed houses based\
    \ on certain criteria. This criteria could be the cost of a two bedroom house\
    \ in a neighborhood with two bathrooms and a double garage.\n\n## Basic Principles\
    \ of Python Machine Learning\n\nTo start designing a Python Machine Learning algorithm,\
    \ you will need to:\n\n- Determine a problem\n- Gather and prepare the required\
    \ data\n- Analyze and evaluate the algorithms\n- Increase the outcome of positive\
    \ results\n- Define results & present them in a certain way\n\n## Stages of Python\
    \ Machine Learning\n\nOnce you have determined the problem your machine learning\
    \ algorithm is going to be designed for, you will need to design the ML algorithm.\n\
    \nThe stages of Python machine learning are:\n\n- Collection of data\n- Sorting\
    \ of the collected data\n- Analyzing the sorted collection of data\n- Designing\
    \ the ML algorithm\n- Developing the ML algorithm"
  mdcn: "Python 拥有庞大的标准库，集成了简洁的编程命令、高效的处理能力和文件操作功能。\n- Python 具备使用常用表达式和命令在文本中进行搜索的能力。\n\
    - Python 的平台独立性意味着它可在大多数操作系统上运行。\n- Python 非常适合用于机器学习应用。\n- 通过使用交互式界面，Python 使得测试小段代码变得简单得多。\n\
    - Python 标配一个名为 **IDLE** 的开发和学习环境。IDLE 交互式 shell 是一个功能齐全的 Python 文本编辑器，它使得创建 Python\
    \ 脚本变得快速、轻松，并且几乎没有语法错误。IDLE 具备调试器、自动补全、智能缩进和语法高亮等功能。\n- Python 可以无缝集成或与 C、C++、Java\
    \ 等其他软件和编程语言协同工作。\n- Python 可以用作其他应用程序的程序接口。\n\n## 机器学习\n\n机器学习（ML）是一种基于算法的程序，旨在鼓励计算机在没有被明确编程的情况下能够学习。它是一种人工智能（AI）的形式，其设计方式使得计算机能够利用新的数据输入作为学习、发展和进步的手段。\n\
    \n随着人工智能和机器学习与个人日常生活的联系日益紧密，我们对它们的依赖也与日俱增。从手机应用到能够自动驾驶和导航的汽车，再到厨房里的冰箱，各种设备都在使用某种形式的人工智能和机器学习。每次你与\
    \ Siri 或 Alexa 对话时，你都是在与一种形式的人工智能交流。每次你向人工智能提问时，它都在记录和追踪这些选择。\n\n银行应用和自动化助手每天都在被使用。输入的信息越多，它们学习和成长得就越多。人工智能和机器学习是当下也是未来，这使得学习机器学习以保持你在就业市场中的地位变得尤为有价值。\n\
    \n学习机器学习甚至人工智能的最佳编程语言之一是 Python。使 Python 成为入门机器学习的良好语言的一些特点包括：\n\n- 简洁性\n- 一致性\n\
    - 丰富的库集合\n- 丰富的框架集合\n- Python 是平台独立的\n- 由于 Python 的流行，它拥有庞大的社区\n\n## Python 最适合的常见人工智能/机器学习应用和技术\n\
    \nPython 适用于以下应用和技术：\n\n- 使用 OpenCV 技术的计算机视觉\n- 使用 NumPy、Pandas、SciPy 和 Seaborn\
    \ 技术的数据分析\n- 使用 NumPy、Pandas、SciPy 和 Seaborn 技术的数据可视化\n- 使用 Keras、Scikit-Learn\
    \ 和 TensorFlow 技术的机器学习\n- 使用 NLTK 和 spaCy 技术的自然语言处理\n\n## Python 人工智能和机器学习库\n\n\
    Python 丰富的库选择不仅使编码更容易，还缩短了开发时间。Python 丰富的技术栈包含大量的机器学习和人工智能库集合。库中包含预编写的代码，使开发人员编写脚本变得容易得多，减少了编写复杂算法时可能出现的愚蠢错误。\n\
    \nPython 的机器学习库包括以下内容：\n\n### Scikit-learn\n\nScikit-learn 包含许多监督和无监督学习算法，并提供机器学习功能，包括：\n\
    \n- 分类 — K-近邻算法\n- 聚类 — K-Mean ++ 和 K-Means\n- 模型选择\n- 预处理\n- 回归 — 线性回归和逻辑回归\n\
    \nScikit-learn 建立在 Pandas、Matplotlib 和 NumPy 等技术之上。它是一个强大的库，允许程序员构建稳定、健壮的机器学习程序。\n\
    \n### NLTK\n\n自然语言工具包（NLTK）并非专门为机器学习设计。然而，该工具包在创建需要处理人类语言数据的程序时非常方便。它用于在统计自然语言处理（NLP）中应用人类语言数据，并包含众多文本处理库。\n\
    \n### Theano\n\nTheano 是一个用于机器学习和深度学习的 Python 库。自 2007 年以来，Theano 一直被用于大规模运行计算密集型科学研究。它是一个强大的库，可以评估、定义和优化具有多维数组的复杂数学表达式。\n\
    \n### TensorFlow\n\nTensorFlow 是一个机器学习库，用于创建使用快速数值计算的深度学习模型。虽然它作为 Python 库运行，但\
    \ TensorFlow 是由 Google 设计、开发和发布的。与 Python 和大多数 Python 库一样，TensorFlow 是开源软件，易于免费下载和安装。\n\
    \n### Keras\n\nKeras 是一个 Python 库，为神经网络系统提供高级应用程序编程接口（API）。它最好与 Theano、R、PlaidML、MS\
    \ Cognitive Toolkit 或 TensorFlow 一起运行或在其之上运行。\n\n### PyTorch\n\nPyTorch 是一个流行的深度学习库，用\
    \ Lua 编写。它是 Torch 的 Python 开源模型。它使程序员能够访问相同的 Torch 库。PyTorch 适合初学者，并提供了一些有用的教程和大量示例。\n\
    \n## 第 2 章：开始学习 Python\n\nScikit-learn 是最受欢迎的机器学习 Python 库之一，是入门的首选。它为新开发者提供了一个良好的基础，从中可以学习机器学习各个方面的运作方式，例如标记、建模和测试。\n\
    \n另一个很好的机器学习入门基础是 Keras，它以易用性和直接的建模结构而闻名。随着你对 Python 和机器学习越来越熟练，你将能够做出更明智的 Python\
    \ 机器学习库选择。\n\n## 机器学习过程简要概述\n\n在深入 Python 机器学习之前，你需要了解一些机器学习过程。这些过程包括：\n\n- **监督学习**\
    \ — 监督学习是系统基于输入和输出数据来开发预测结果。监督学习的模型包括：\n    - 分类\n    - 回归\n- **无监督学习** — 无监督学习基于输入数据。系统将根据输入数据解释和分组数据。无监督学习的模型包括：\n\
    \    - 聚类\n\n## Python 机器学习的基本原理\n\n机器学习的基础是让系统基于经验进行学习。例如，想想教一个孩子区分鲨鱼鳍和海豚鳍。你会向他们展示鲨鱼的尾鳍是垂直的，并且左右摇摆，而海豚的尾巴是水平的，上下摇摆。一旦孩子收集到这些信息，他们就能够用它来区分这两种生物。\n\
    \n类似地，机器学习算法被输入基础数据以供学习和成长。例如，房地产经纪人可能拥有关于社区、这些社区中的房屋以及每栋房屋平均成本的统计信息。这些信息将是机器学习的训练信息。根据这些信息，系统将能够根据某些标准输出两居室或三居室房屋的平均成本。这个标准可能是在一个拥有两间浴室和一个双车位车库的社区中，一套两居室房屋的成本。\n\
    \n## Python 机器学习的基本原理\n\n要开始设计 Python 机器学习算法，你需要：\n\n- 确定一个问题\n- 收集和准备所需的数据\n\
    - 分析和评估算法\n- 提高正面结果的产出\n- 定义结果并以特定方式呈现它们\n\n## Python 机器学习的阶段\n\n一旦你确定了机器学习算法将要设计解决的问题，你就需要设计机器学习算法。\n\
    \nPython 机器学习的阶段包括：\n\n- 数据收集\n- 对收集的数据进行排序\n- 分析排序后的数据集合\n- 设计机器学习算法\n- 开发机器学习算法"
