    # **Advantages of Decision Tree**


    The advantages of using the Decision Tree model are:


    +   - It is easy to use and understand

    - It is great for feature selection

    - It is great for performing variable screening

    - There is little to no data cleaning required

    - There is not a lot of preparation required as compared to other models like
    regression tree models

    - It is a lot easier when it comes to generating rules


    # **Disadvantages/Limitations of Decision Trees**


    The disadvantages or limitation of the decision tree model are:


    +   - Trees can get complicated. This is called overfitting and is a tree that
    does not generalize data.

    - Rectangular partitioning is used for classification.

    - The data can become quite large and cumbersome if not pruned.

    - It is not partial to non-numerical data.


    # **Entropy and Gini Index in Python**


    A node, in a Python Decision Tree algorithm, is split by calculating information
    gain. This split is done by Entropy and Gini Index which are measures of impurity
    of the data or node. An impure node is a node that has many classes associated
    with it, as there is a disorder in the node. A node with only a single class in
    it is more orderly and therefore the node is pure. Both Entropy and Gini Index
    are used for selection criteria in decision trees.


    In most datasets, there will not be a big difference between using either Entropy
    or Gini Index in a decision tree model. It is, however, important to be aware
    of these two measures.'
  merge: -1
  pgno: 60
- img_proc: true
  md: '# Entropy


    Entropy measures how to reduce uncertainty in a split. It is not as easy as the
    Gini index as it is more computational. Entropy tends to favor splits that have
    a lot of unique values but smaller counts. The formula for entropy is as follows:


    ```

    $$Entropy = \sum_{i=1}^{c} P_i * \log_2(P_i)$$

    ```


    # Gini Index


    The Gini Index is used in the CART algorithm. It uses a squared proportion of
    classes and is calculated by minus the sum of the squared probabilities per class
    from 1.

    The Gini formula looks as follows:


    ```

    $$Gini = -\sum_{i=1}^{c} (P_i)^2$$

    ```


    The Gini index is usually used for continuous attributes; it will seek out the
    largest class and is good at minimizing misclassification.'
  merge: -1
  pgno: 61
- img_proc: true
  md: '# Chapter 8:

    Regression Trees and CART


    Data sets are split based on data that is of the same or similar nature in classification
    tree models. For instance, take a dataset that will determine if a consumer will
    buy a garment based on their age and gender. If 95% of people who bought the garment
    were women, this is where the split would be made and the top node in the tree
    would become women (the split would now be 95% pure). This is where the Gini Index
    and entropy measures come in, as they are used to quantify data’s homogeneity.
    Classification models in terms of machine learning are great for algorithms that
    have scaled target features. In the Decision Tree example in Chapter 7, you used
    an example of going to the beach. Here you could add features such as stay at
    home or go to the beach; the variables were known.


    What happens when there is a situation where one classification could have a number
    of variables?


    # Regressions Trees


    If, for instance, there is a dataset where you need to predict the price of a
    brand new car from the showroom floor, the decision tree model is not going to
    work. Most models of cars have different classes and even the different classes
    of model prices can differ depending upon the additional extras you can get with
    the vehicle. A classification tree model is not going to work in this situation,
    but a regression tree model will. Regression trees allow for an infinite number
    of continuously scaled values of the target feature.


    The regression tree formula is calculated on the variance and is as follows:


    ![](img/de6fa05c069954f141bee715b9484f75_62_0.png)'
  merge: -1
  pgno: 62
- img_proc: true
  md: 'A regression tree is set up much like the decision tree, where it starts off
    with a root node and searches for the descriptive feature, splitting the target
    feature into pure values. Once it has those values the dataset is divided into
    the descriptive feature. This process is then repeated within the subsets of the
    split until there are no more splits and a leaf node is formed.


    ![](img/de6fa05c069954f141bee715b9484f75_63_0.png)


    When there is a prediction type of problem, the best models to use are regression
    tree models.


    # CART Models


    CART stands for Classification and Regression Tree, which is a predictive machine
    learning algorithm. CART is one of the oldest methodologies in machine learning
    and forms the foundation for algorithms such as Boosted Decision Trees, Bagged
    Decision Trees, and Random Forests.


    Based on certain predictor variables, the CART algorithm can predict outcomes.
    In other words, it will show that a target variable can be predicted by a number
    of values. CART can handle the tasks of both regression and Classification Tree
    models.'
  merge: -1
  pgno: 63
- img_proc: true
  md: 'Trees that are used for classification of data are known as classification
    models (Decision Trees), such as grouping animals by species. Trees that are used
    for estimation are the regression trees, such as estimating the cost of a two-door
    convertible with leather seats, special rims, and certain color paint.


    The CART model allows you to use both classification and regression tree models;
    it also supports numerical target variables but it will not calculate rule sets.


    For a more complex tree where you would have to first classify a species and then
    subsets of that species, you would use the CART tree model.'
