    # **Advantages of Decision Tree**


    The advantages of using the Decision Tree model are:


    +   - It is easy to use and understand

    - It is great for feature selection

    - It is great for performing variable screening

    - There is little to no data cleaning required

    - There is not a lot of preparation required as compared to other models like
    regression tree models

    - It is a lot easier when it comes to generating rules


    # **Disadvantages/Limitations of Decision Trees**


    The disadvantages or limitation of the decision tree model are:


    +   - Trees can get complicated. This is called overfitting and is a tree that
    does not generalize data.

    - Rectangular partitioning is used for classification.

    - The data can become quite large and cumbersome if not pruned.

    - It is not partial to non-numerical data.


    # **Entropy and Gini Index in Python**


    A node, in a Python Decision Tree algorithm, is split by calculating information
    gain. This split is done by Entropy and Gini Index which are measures of impurity
    of the data or node. An impure node is a node that has many classes associated
    with it, as there is a disorder in the node. A node with only a single class in
    it is more orderly and therefore the node is pure. Both Entropy and Gini Index
    are used for selection criteria in decision trees.


    In most datasets, there will not be a big difference between using either Entropy
    or Gini Index in a decision tree model. It is, however, important to be aware
    of these two measures.'
- md: '## Entropy


    Entropy measures how to reduce uncertainty in a split. It is not as easy as the
    Gini index as it is more computational. Entropy tends to favor splits that have
    a lot of unique values but smaller counts. The formula for entropy is as follows:


    $$Entropy = \sum_{i=1}^{c} P_i * \log_2(P_i)$$


    ## Gini Index


    The Gini Index is used in the CART algorithm. It uses a squared proportion of
    classes and is calculated by minus the sum of the squared probabilities per class
    from 1.

    The Gini formula looks as follows:


    $$Gini = -\sum_{i=1}^{c} (P_i)^2$$


    The Gini index is usually used for continuous attributes; it will seek out the
    largest class and is good at minimizing misclassification.


    ## Chapter 8: Regression Trees and CART


    Data sets are split based on data that is of the same or similar nature in classification
    tree models. For instance, take a dataset that will determine if a consumer will
    buy a garment based on their age and gender. If 95% of people who bought the garment
    were women, this is where the split would be made and the top node in the tree
    would become women (the split would now be 95% pure). This is where the Gini Index
    and entropy measures come in, as they are used to quantify data’s homogeneity.
    Classification models in terms of machine learning are great for algorithms that
    have scaled target features. In the Decision Tree example in Chapter 7, you used
    an example of going to the beach. Here you could add features such as stay at
    home or go to the beach; the variables were known.


    What happens when there is a situation where one classification could have a number
    of variables?


    ### Regression Trees


    If, for instance, there is a dataset where you need to predict the price of a
    brand new car from the showroom floor, the decision tree model is not going to
    work. Most models of cars have different classes and even the different classes
    of model prices can differ depending upon the additional extras you can get with
    the vehicle. A classification tree model is not going to work in this situation,
    but a regression tree model will. Regression trees allow for an infinite number
    of continuously scaled values of the target feature.


    The regression tree formula is calculated on the variance and is as follows:


    ![](img/de6fa05c069954f141bee715b9484f75_62_0.png)


    A regression tree is set up much like the decision tree, where it starts off with
    a root node and searches for the descriptive feature, splitting the target feature
    into pure values. Once it has those values the dataset is divided into the descriptive
    feature. This process is then repeated within the subsets of the split until there
    are no more splits and a leaf node is formed.


    ![](img/de6fa05c069954f141bee715b9484f75_63_0.png)


    When there is a prediction type of problem, the best models to use are regression
    tree models.


    ### CART Models


    CART stands for Classification and Regression Tree, which is a predictive machine
    learning algorithm. CART is one of the oldest methodologies in machine learning
    and forms the foundation for algorithms such as Boosted Decision Trees, Bagged
    Decision Trees, and Random Forests.


    Based on certain predictor variables, the CART algorithm can predict outcomes.
    In other words, it will show that a target variable can be predicted by a number
    of values. CART can handle the tasks of both regression and Classification Tree
    models.


    Trees that are used for classification of data are known as classification models
    (Decision Trees), such as grouping animals by species. Trees that are used for
    estimation are the regression trees, such as estimating the cost of a two-door
    convertible with leather seats, special rims, and certain color paint.


    The CART model allows you to use both classification and regression tree models;
    it also supports numerical target variables but it will not calculate rule sets.


    For a more complex tree where you would have to first classify a species and then
    subsets of that species, you would use the CART tree model.


    ## Chapter 9: Random Forests


    Most predictions have variances. For instance, you may create a model that will
    predict the weather for the next day. This prediction will be based on various
    factors which you will feed into training models such as the season, the month,
    the weather pattern for the past couple of years to get a historical average,
    etc. The model will take all the training data and look for a relationship between
    the features in order to predict the targeted outcome. The model learns by example,
    like humans do, and formulates the best questions to get to the most accurate
    prediction.


    The tree has a target for which it learns how to map related data to, such as
    the weather. It may know that a sunny day is hot and the average temperatures
    that fall into the hot category. Unlike humans, the model has no previous knowledge
    of temperature and to it, it is generating outputs based on its training model
    that agree with data being inputted. In a classification model such as a decision
    tree model, it is basing its predictions on a single decision tree model. At this
    level, the model would not be able to answer different questions about the weather.


    In order to enable the model to learn a lot more about a problem, you can use
    random forests to create a more diverse knowledge base. If we look at problem-solving
    in human terms, we know that a single human could solve multiple small problems.
    As the problem grows one person alone may not be able to cope. There are many
    variables, such as not having the scope of knowledge, they only have their point
    of view, and so on. But, two or more people working on the same problem brings
    about a whole new dimension to solving it. A think tank consists of a group of
    like-minded people working together, each bringing their own unique set of skills
    and knowledge to the table.


    Look at a decision tree or regression tree model as one person working on a part
    of the problem they have the information, training, and knowledge about, while
    a random forest is a think tank of decision trees and regression tree models working
    together to create a more robust and diverse model. The more trees there are in
    the random forest, the higher the accuracy rate will be of the model. For instance,
    if your model was categorizing large cats, a Random Forest of datasets with different
    cat species ensures more accurate, diverse data, data that is not biased by one
    particular dataset.


    ### Building the Random Forest


    The first step will be to create multiple Decision or Regression Trees that will
    make up the random forest. These trees can be made up of various decision tree
    algorithms such as Gini Index, Information Gain, etc.


    In the CART model, there are only single trees. In a random forest, you will grow
    multiple trees. Any new classification that needs to be classified is done so
    on various attributes. The trees already in the model will give a classification
    of those attributes based on the data in their dataset. The classification of
    the tree with the most votes will be what the new classification will fall under.
    In the regression model, the average of the votes is used.


    ### Advantages of Random Forest


    - The model will not be overfitted

    - Higher dimensionality for large data set handling

    - Random forests maintain accuracy for any missing data and are able to handle
    it

    - Random forests can perform both regression and classification tasks


    ### Disadvantages of Random Forest


    - Random forests are better at handling classification models than they are with
    regression.

    - Random forests are more of a black box approach as there is little to no control
    over what the model does.


    ### Uses of Random Forest


    - Medical applications — Medicine validation.

    - Disease analytics — Identify a person''s risk of getting certain diseases from
    their medical history.

    - Banking applications — Fraud detection

    - Stock markets — Identifying patterns of stock behavior as well as expected losses
    or gains.

    - Search engines — Product identification and recommendations based on a customer''s
    search history.

    - Image classification — Computers use cameras to identify different body parts
    for applications such as games on the Xbox.

    - Voice classification — Speech recognition and lip-reading system.


    ### How the Random Forest Works


    1. In a training set, assume that a number of cases are A.

    2. A sample, with replacement, of the A cases is randomly taken.

    3. For B input features or variables, b<B will be specified.

    4. This allows for each nodes b variable to be randomly selected out of the B
    input values.

