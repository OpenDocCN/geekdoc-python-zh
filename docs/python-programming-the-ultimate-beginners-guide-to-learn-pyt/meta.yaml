    Thank you for choosing *Python Programming: The Ultimate Beginners Guide to Learn
    Python Machine Learning Step-by-Step* as your guide to Python machine learning.


    In this beginner’s guide, you will learn the programming language syntax, basic
    programming concepts, and how to apply them to code. Other topics covered in this
    book include:


    - Useful Python features that beginners can use in real-world situations

    - How to install and configure Python

    - Python programming mechanics such as control flow, factors, records or lexicons,
    and classes

    - Machine learning basics and how machine learning is implemented in Python, including
    Scikit-learn, Tensorflow, and more


    ## Artificial Intelligence (AI)


    Both a robot controlled by a computer and a digital computer that is able to perform
    tasks that an intelligent being can are defined as artificial intelligence (AI).
    There are many subsets of AI which most commonly include:


    - Deep Learning (DL) — neural networks.

    - Expert Systems (ES) — teaching systems and systems with decision support.

    - Machine Learning (ML) — version space and decision tree learning.

    - Machine Vision (MV) — understanding images and character/object recognition

    - Natural Language Processing (NLP) — machine translation.

    - Planning — gameplay, scheduling, and task-driven systems.

    - Robotics — autonomous systems with intelligent control.

    - Speech Recognition (SR) — language recognition.


    For a machine to be classed as an artificial intelligence system, it needs to
    be able to:


    - Sense

    - Reason

    - Act

    - Adapt


    For an AI to be able to carry out its goals successfully and exhibit the four
    qualities above, it needs to be able to think. Unlike natural intelligence, a
    computer''s intelligence comes from cleverly designed algorithms that can learn.
    Therefore, one of the most important parts of AI is machine learning, as well
    as deep learning (which can be classified as a subset of ML).


    Machine learning is the subset of AI that provides the machine with the ability
    to learn. ML is like the brain of an AI system, giving it the intelligence it
    needs to automatically learn by experience without explicit programming instructions.


    ## Machine Learning (ML)


    Machine Learning is the study of algorithms designed to be able to learn through
    the input of data. Using the data the programmer trained the system on, the algorithm
    will learn how to describe the data, improve upon the data, and predict outcomes.
    Most analytical and statistical data found in the modern day comes from using
    a machine learning algorithm.


    A prime example of machine learning is the popup adverts found on search engines
    such as Google. You may notice that the adverts that appear will pertain to recent
    searches or products you have looked at on the Web. That is the machine learning
    algorithm assimilating your search history and predicting what it thinks you will
    find interesting or useful.


    Some of the more common machine learning methods or algorithms include:


    - Decision trees

    - K-means clustering

    - K-nearest neighbor

    - Naive Bayes

    - Random forest

    - Support vector machine


    ## Four Important Techniques Most Artificial Intelligence Systems Have in Common


    - Learning — AIs have the capability to gain knowledge from their environment.

    - Representation — AI’s have the capability to determine how to represent the
    knowledge they learn from their environment.

    - Rules — AIs have an explicit set of instructions or rules which are the guidelines
    upon which it learns and grows.

    - Search — AIs have the ability to search through and find a sequence of states,
    the connection of weights, etc., that lead to a solution or outcome.


    This guide covers an introduction to the basics of Python machine learning. Python
    is by far one of the easiest and most accessible programming environments to use
    to start learning about this subdivision of artificial intelligence.


    ## History of Python


    Guido van Rossum founded Python after working for a couple of years at the Centrum
    Wiskunde & Informatica (CWI), in Amsterdam, Netherlands. At CWI Guido worked on
    a project creating a programming language called ABC in the mid 1980s. It was
    the ABC programming language that inspired him to create Python in ABC''s image
    in the late 1980s. Guido used his knowledge of what worked best with ABC to draw
    from and enhance Python. The things he knew only frustrated him with ABC, he found
    a way to fine-tune or leave out all together if they were not necessary.


    Guido created Python to be free open-source software that was easy to use and
    allowed others to contribute to the language libraries which created a huge Python
    community. He chose Python for the name of the language when he started to work
    on the project as a big fan of Monty Python''s *Flying Circus* and because he
    was feeling irreverent at the time.


    Version 0.9.0 was the first version of Python that Guido published in February
    1991. It was first published on alt.sources as a module and object-oriented system.
    This version included features like functions, exception handling, and core data
    types.


    January 1994 saw Python version 1.0 released with some functional programming
    tools that Guido was not too happy with. These tools included a map, filter, reduce,
    and lambda.


    The next new version to be released was done six years later in October of 2000
    and was version 2.0, which included a list of new features. Version 2.0 features
    allowed for the support of Unicode, a full garbage collector, and list comprehensions.


    Version 2.x stuck around and was constantly being updated for the next eight years
    until version 3.0 was released. Version 3.0 was not compatible with version 2.x
    but could be run alongside it as a completely separate installation. Version 3.0
    was released in December of 2008 and was a newer, leaner version of Python. Guido
    had removed a lot of duplicate modules and constructs from the Python programming
    language which were found in previous versions.


    Although Python 3 is the primary version used, version 2.x is still used by a
    lot of programmers and the version is still being updated, with the last update
    being version 2.7. Development of Python 2.x ceased on version 2.7 in April 2020
    with version 3.x gaining more popularity.


    ## Chapter 1: Python


    Python is a versatile interpreted, object-oriented programming language that can
    be run on any system including Linux, Windows, and Mac. Over the past decade or
    so, Python has become a very popular programming language due to its ease of use,
    wide availability, and clear syntax.


    Python is open-source software, which means that it can be accessed and downloaded
    for free. It is easy to use, understand, and follow because it is a programming
    language that is very similar to the English language.


    ### Python Programming Language Top Features


    Since Python''s development in the late 1980s, it has become a very popular go-to
    programming language, especially for new programmers.


    Some of the features that make Python so popular include:


    - Dynamic typing, which means that Python does not need an explicit declaration
    of a variable being used.

    - Exceptions are not syntactically heavy.

    - It is easy to read and follow even if you are not an expert programmer.

    - As an interpreted programming language it does not need a compiler to compile
    a program into machine-language instructions to run.

    - Python is an object-oriented programming language similar to Ruby, Perl, and
    Java.

    - Python is free open-source software, as are its vast amount of libraries.

    - Python is continuously updated and added to; this includes its libraries.'
