  md: '# Chapter 9:

    Random Forests


    Most predictions have variances. For instance, you may create a model that will
    predict the weather for the next day. This prediction will be based on various
    factors which you will feed into training models such as the season, the month,
    the weather pattern for the past couple of years to get a historical average,
    etc. The model will take all the training data and look for a relationship between
    the features in order to predict the targeted outcome. The model learns by example,
    like humans do, and formulates the best questions to get to the most accurate
    prediction.


    The tree has a target for which it learns how to map related data to, such as
    the weather. It may know that a sunny day is hot and the average temperatures
    that fall into the hot category. Unlike humans, the model has no previous knowledge
    of temperature and to it, it is generating outputs based on its training model
    that agree with data being inputted. In a classification model such as a decision
    tree model, it is basing its predictions on a single decision tree model. At this
    level, the model would not be able to answer different questions about the weather.


    In order to enable the model to learn a lot more about a problem, you can use
    random forests to create a more diverse knowledge base. If we look at problem-solving
    in human terms, we know that a single human could solve multiple small problems.
    As the problem grows one person alone may not be able to cope. There are many
    variables, such as not having the scope of knowledge, they only have their point
    of view, and so on. But, two or more people working on the same problem brings
    about a whole new dimension to solving it. A think tank consists of a group of
    like-minded people working together, each bringing their own unique set of skills
    and knowledge to the table.


    Look at a decision tree or regression tree model as one person working on a part
    of the problem they have the information, training, and knowledge about, while
    a random forest is a think tank of'
  merge: -1
  pgno: 65
- img_proc: true
  md: 'decision trees and regression tree models working together to create a more
    robust and diverse model. The more trees there are in the random forest, the higher
    the accuracy rate will be of the model. For instance, if your model was categorizing
    large cats, a Random Forest of datasets with different cat species ensures more
    accurate, diverse data, data that is not biased by one particular dataset.


    # Building the Random Forest


    The first step will be to create multiple Decision or Regression Trees that will
    make up the random forest. These trees can be made up of various decision tree
    algorithms such as Gigi Index, Information Gain, etc.


    In the CART model, there are only single trees. In a random forest, you will grow
    multiple trees. Any new classification that needs to be classified is done so
    on various attributes. The trees already in the model will give a classification
    of those attributes based on the data in their dataset. The classification of
    the tree with the most votes will be what the new classification will fall under.
    In the regression model, the average of the votes is used.


    # Advantages of Random Forest


    +   - The model will not be overfitted

    - Higher dimensionality for large data set handling

    - Random forests maintain accuracy for any missing data and are able to handle
    it

    - Random forests can perform both regression and classification tasks


    # Disadvantages of Random Forest


    +   - Random forests are better at handling classification models than they are
    with regression.

    - Random forests are more of a black box approach as there is little to no control
    over what the model does.


    # Uses of Random Forest'
  merge: -1
  pgno: 66
- img_proc: true
  md: '+   - Medical applications — Medicine validation.

    - Disease analytics — Identify a person''s risk of getting certain diseases from
    their medical history.

    - Banking applications — Fraud detection

    - Stock markets — Identifying patterns of sock behavior as well as expected losses
    or gains.

    - Search engines — Product identification and recommendations based on a customer''s
    search history.

    - Image classification — Computers use cameras to identify different body parts
    for applications such as games on the Xbox.

    - Voice classification — Speech recognition and lip-reading system.


    # How the Random Forest Works


    +   1. In a training set, assume that a number of cases are A.

    2. A sample, with replacement, of the A cases is randomly taken.

    3. For B input features or variables, b<B will be specified.

    4. This allows for each nodes b variable to be randomly selected out of the B
    input values.

    5. The node is split on the b values selected.

    6. While the forest grows the value of b will be held constant.

    7. There is no pruning of data, allowing for each tree in the Random Forest to
    grow to its fullest potential.

    8. By aggregating the predictions of the b values new data can be predicted. This
    is where the majority of votes for classification models and average votes for
    regression models come in.


    The test features of the random forest algorithm have to run through all the rules
    as laid out by each tree in the random forest. A subset of'
  merge: -1
  pgno: 67
- img_proc: true
  md: 'the forest will vote on what the predicted outcome should be. For instance,
    if the subject is a face, a few trees in the forest may return data pertaining
    to the face, such as a nose, an eye, or an ear. If in a forest of, say, 800 trees
    only 200 return information pertaining to the face, the vote will be cast out
    of 800. If the majority of the nodes list an eye, the outcome will be an eye.
    If some of the other trees have put forward an ear, nose, etc., then the higher
    levels of the tree can vote that the result is a face.


    # Ensemble Algorithm


    Random forests are known as ensemble algorithms that are based on a concept that
    a single learner may not have all the strength needed to solve a problem. They
    are then known as a weak learner. But a group of weak learners banded together
    can become a collectively strong learner.


    The same applies to classification trees. On their own they are weaker learners,
    but collectively they become a force of knowledge. As they share knowledge and
    grow the applications they are capable of becoming endless.


    # Ensemble Learners


    Single learners consist of training and testing data.


    +   - Training data = a learning method such as K-nearest neighbor (KNN)

    - A model is formed from the training data which, if you punch in a query, you
    will get an outcome from.


    Ensemble learners also consist of training and testing data but incorporate an
    ensemble of different learning methods. Each learning method is trained and tested
    with the same data. Each model would be individually queried to get a predicted
    outcome and will return their prediction; the answer with the most votes would
    be the answer. In regression, the mean value will be the answer.


    Ensemble learners are good to use because each model you use has its own bias
    and variables. When you combine these methods,'
  merge: -1
  pgno: 68
- img_proc: true
  md: 'their biases and variables are radically reduced due to a voting (classification)
    or averaging system (regression).


    # Bagging or Bootstrap Aggregation


    Bagging or bootstrap aggregation is used in regression and statistical classification.
    It is primarily used to improve upon an algorithm''s accuracy. It does this by
    reducing variance and improving the stability of the model.


    In the ensemble learners in the above section, we looked at training different
    models on the same data. Bagging or bootstrap aggregation is another way of creating
    ensemble learners by using the same method, with the dataset, but training each
    learner on a different section of the data.


    To bag the data, you would need to create subsets of the data (bags filled with
    different sections of the data).


    Data is chosen at random from the same set of data per bag with replacement. With
    replacement means that the random grab for data may select the same data it has
    already collected.


    +   - n = The number of data instances in the dataset.

    - n¹ = The number of data instances per bag. The rule of thumb for the training
    instances per bag should be no more than 60% of the dataset training instances.

    - m = The number of bags in the ensemble of learners.


    Each model is trained on the data it has randomly gathered and tested on the outcome
    as either voted by the models or the mean value.


    # Boosting


    The boosting machine learning ensemble meta-algorithm is used in supervised learning
    to cut down on variance, reduce bias, and boost weak learners. Boosting is similar
    to bagging but it''s used to boost ensemble learners that are not performing as
    they should be performing.


    When using an algorithm such as Ada Boost, you set up the learning as you would
    to select random data (like in bagging) from the'
  merge: -1
  pgno: 69
- img_proc: true
  md: 'dataset. The model will get trained in the same way, the only difference will
    be that not just 40% or so of the dataset will be used to test the model. All
    of the training data is used to test the learner’s model. The outcome of this
    test usually pinpoints errors or inconsistencies in the testing dataset.


    The next step will be to build the next bag of randomly selected data from the
    dataset but weighted towards the erroneous data. This means that instances in
    the dataset that displayed the error will be the instances that will be picked
    first over other instances of the data. This will continue for the amount of bagging
    instances needed to complete the model.


    Boosting helps to fix poorly modeled data and cut down on errors in the model.'
  merge: -1
