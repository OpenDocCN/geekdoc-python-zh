  md: '# History of Python


    Guido van Rossum founded Python after working for a couple of years at the Centrum
    Wiskunde & Informatica (CWI), in Amsterdam, Netherlands. At CWI Guido worked on
    a project creating a programming language called ABC in the mid 1980s. It was
    the ABC programming language that inspired him to create Python in ABC''s image
    in the late 1980s. Guido used his knowledge of what worked best with ABC to draw
    from and enhance Python. The things he knew only frustrated him with ABC, he found
    a way to fine-tune or leave out all together if they were not necessary.


    Guido created Python to be free open-source software that was easy to use and
    allowed others to contribute to the language libraries which created a huge Python
    community. He chose Python for the name of the language when he started to work
    on the project as a big fan of Monty Python''s *Flying Circus* and because he
    was feeling irreverent at the time.


    Version 0.9.0 was the first version of Python that Guido published in February
    1991. It was first published on alt.sources as a module and object-oriented system.
    This version included features like functions, exception handling, and core data
    types.


    January 1994 saw Python version 1.0 released with some functional programming
    tools that Guido was not too happy with. These tools included a map, filter, reduce,
    and lambda.


    The next new version to be released was done six years later in October of 2000
    and was version 2.0, which included a list of new features. Version 2.0 features
    allowed for the support of Unicode, a full garbage collector, and list comprehensions.


    Version 2.x stuck around and was constantly being updated for the next eight years
    until version 3.0 was released. Version 3.0 was not compatible with version 2.x
    but could be run alongside it as a completely separate installation. Version 3.0
    was released in December of 2008 and was a newer, leaner version of Python. Guido
    had removed a lot of duplicate modules and constructs from the Python programming
    language which were found in previous versions.'
  merge: -1
  pgno: 11
- img_proc: true
  md: Although Python 3 is the primary version used, version 2.x is still used by
    a lot of programmers and the version is still being updated, with the last update
    being version 2.7. Development of Python 2.x ceased on version 2.7 in April 2020
    with version 3.x gaining more popularity.
  merge: -1
  pgno: 12
- img_proc: true
  md: '# # Chapter 1: Python


    Python is a versatile interpreted, object-oriented programming language that can
    be run on any system including Linux, Windows, and Mac. Over the past decade or
    so, Python has become a very popular programming language due to its ease of use,
    wide availability, and clear syntax.


    Python is open-source software, which means that it can be accessed and downloaded
    for free. It is easy to use, understand, and follow because it is a programming
    language that is very similar to the English language.


    # ## Python Programming Language Top Features


    Since Python''s development in the late 1980s, it has become a very popular go-to
    programming language, especially for new programmers.


    Some of the features that make Python so popular include:


    +   - Dynamic typing, which means that Python does not need an explicit declaration
    of a variable being used.

    - Exceptions are not syntactically heavy.

    - It is easy to read and follow even if you are not an expert programmer.

    - As an interpreted programming language it does not need a compiler to compile
    a program into machine-language instructions to run.

    - Python is an object-oriented programming language similar to Ruby, Perl, and
    Java.

    - Python is free open-source software, as are its vast amount of libraries.

    - Python is continuously updated and added to; this includes its libraries.'
  merge: -1
  pgno: 13
- img_proc: true
  md: '+   - Python has a huge standard library, stacked with simple programming commands,
    efficient processing, and file handling.

    - Python has the ability to search through text with commonly used expressions
    and commands.

    - Python''s platform independence means it is available on most operating systems.

    - Python is desirable for use with machine learning applications.

    - With the use of interactive interfaces, Python makes testing smaller chunks
    of code a lot simpler.

