    # Internet of Things (IoT)


    Carnegie Mellon University was one of the very first institutions to implement
    an Internet of Things (IoT) system in the early 1980s. This system was a Coke
    machine that was connected to the Internet and allowed for a remote system to
    monitor the temperature of the machine. Being connected over the Internet also
    allowed the supplier of the machine to know when it ran out of stock.


    The Internet of Things is found in many applications in the 21st century, from
    watches to appliances, cars, buildings, and even towns. Any device that is connected
    over the Internet is known by the term Internet of Things (IoT). If you take a
    look around your home right now, you are bound to find at least one device that
    belongs to the category of IoT. A smart device, the thermostat, and even jet engines
    these days have sensors on them reporting status.


    # Uses of the Internet of Things (IoT)


    Basically, any device that has an on/off button that either works with or through
    the Internet is considered to be an IoT device. As we live in a high-tech world,
    soon there will not be many devices that are not classified as such. In a smart
    city, even the roads are connected through the Internet.


    There are many modern-day uses for the Internet of Things applications, including
    the following.


    # Manufacturing


    Thanks to the applications that support the Internet of Things, manufacturers
    are able to increase the productivity of new goods turning out higher volumes,
    faster, and with less waste. Machinery is now fitted with various devices such
    as sensors, identification devices, actuation monitoring, and communication. This
    cuts down'
- md: '## Manufacturing


    various high-risk factors that used to plague the manufacturing industry. These
    devices cut down on the room for human error, safety issues, and redundant processes.


    By integrating machine learning into various manufacturing processes, companies
    can employ statistical evaluation and predictive maintenance to maximize reliability.
    IoT together with ML has completely changed the way the manufacturing industry
    operates.


    ## Disabled or Elderly Care


    With monitoring systems installed into smart homes, it allows for a sort of assisted
    living giving the frail and elderly a little more independence. IoT allows for
    24/7 monitoring and assistance when or where needed without having a full-time
    caretaker.


    ## Transportation


    When it comes to transportation, IoT connects roads, traffic control, and even
    cars. IoT uses smart sensors that can help with fleet maintenance. It is also
    useful for GPS tracking, driver anomalies while driving, vehicle problems, and
    can help cut down on road accidents.


    For traffic control, sensors alongside and in the road can sense congestion. With
    this data cities can figure out if road systems need to be upgraded. Traffic lights
    can sense when there is more traffic backed up on the one side than the other
    and switch accordingly.


    Smart cars are making their debut and are fully equipped with ML, AI, and IoT
    systems that enable them to not only drive, but adapt to the needs of its passengers.
    The car learns as it drives, collecting and processing the information based on
    the habits of its owner or passenger.


    ## Home or Building Automation


    Home or building automation are systems in a home or building that can be monitored
    and controlled. These include lighting, temperature, electric, air control, fire
    systems, and more.


    These IoT systems can help to prevent fires, carbon monoxide poisoning, and help
    reduce energy footprint while cutting down on household running costs.


    ## Agriculture


    IoT has helped the agricultural industry by using various sensors and weather
    devices. These systems allow for the collection of valuable data such as soil
    composition, pest infestations, temperature, humidity, wind speeds, etc. This
    information helps farmers to reduce crop maintenance, various risks, cut down
    on waste, and improve not only the quality of their products, but quantity as
    well.


    ## Monitoring of the Environment


    With the great emphasis on environmental issues these days, IoT helps with the
    capturing of information such as air quality, soil conditions, seismic activity,
    wildlife through habitat, and more. Some of the more sophisticated systems can
    save lives by being able to predict a natural disaster for early warning detection
    systems. These systems are vital for early evacuations and emergency response
    systems. As the World Wide Web spans the globe, IoT paired with ML allows for
    geographical scalability.


    ## City Management


    Slowly but surely, smart cities are starting to take root in certain countries
    around the world. With the IoT and ML working hand in hand, cities now have the
    ability to have greater control of things like sewage control, electrical grids,
    and bridges, monitor various wind conditions, and more. It can also be effective
    in the monitoring of rural and urban infrastructure. This is needed to ensure
    the infrastructure of those areas can support the growing or current population
    within the area.


    ## Energy Management


    There are very few electronic devices on the market today that cannot connect
    to the Internet. Energy management functions are built into a lot of smart houses
    already. These management functions control the temperature, lights, and make
    sure the house is energy efficient. This helps to limit the energy footprint and
    save on household costs.


    Some smart houses can be controlled remotely or allow for the scheduling of switching
    on lights, heating, air conditioning, or even turn on the oven and coffee pot.


    ## Health Care


    Health care has its own Internet of Things, a system that has taken off in recent
    years. The Internet of Health Things (IoHT) has driven the health care system
    to become digitized in order to remotely monitor a person’s health. These devices
    can be found in systems such as pacemakers and artificial limbs.


    Health care systems that can be monitored remotely can cut down on dosage errors
    and notify healthcare providers of potential health issues. This is also valuable
    in helping with emergency response times, especially if the system can predict
    a possible fatal health issue.


    IoHT, AI, and ML have combined to provide a person with a better quality of life
    and quicker responses to potential health-related issues.


    ## Consumer Products


    Smart devices, machine ordering devices, information robots, connected vehicles,
    and smartwatches are all IoT devices. As you know, consumers have become reliant
    on most of their smart devices for keeping track of appointments, contacts, banking
    information, and operations.


    ## IoT vs Security


    A big concern with the Internet of Things in any application is security. Modern-day
    criminals don’t really have to leave the comfort of their home to rob a bank account
    or take control of a connected car. With the amount of personal information data
    that is collected from around the world on a daily basis, there is always the
    possibility that that information is vulnerable.


    We are taught never to leave ATM slips around without tearing them up or shredding
    account information before binning it. But with data, once it is out there on
    the World Wide Web, it is pretty hard to retract without changing your lifestyle
    or identity. As you have now learned, Big Data is worth a lot of money. So, it
    is a targeted commodity for some hackers.


    In order to fill the gaps in these IoT vulnerabilities, machine learning applications
    are put in place. As a result, IoT devices no longer just connect to the Internet
    to transfer or collect information. They are getting smarter and learning to predict
    things. For instance, Airbus has many different sensors monitoring various aspects
    of the aircraft, things like cabin temperature and air pressure, engine functions,
    and sensors that can predict accurate outside temperatures. This information is
    fed to a cloud-based network and can be monitored both in the plane as well as
    remotely.


    With the application of deep learning integration, IoT vulnerabilities can be
    overcome, with fraud detection and unusual activities picked up easily by deep
    learning algorithms. NASA uses IoT and ML integration for systems like ZigBee
    and Xbee to monitor the performance function of its Exo-Brake devices. NASA uses
    extremely modified sensors along with ML to help increase the lifespan of the
    rovers and make them more effective. NASA has been working on implementing ML
    and IoT in their Lunar Lander project which uses the limitless amounts of solar
    power available in space.


    The military uses IoT and ML integration for use with drones that collect data
    on various military operations. Thanks to each drone''s unique ML algorithm, the
    data the drone collects when it flies is automatically sifted through to determine
    if it is relevant or not.


    As IoT devices collect huge volumes of data on a daily basis, ML analytics are
    needed to sort through the data to sift out data that is not needed.


    ## Cloud-Based Machine Learning


    With Big Data on the rise and companies needing more processing power or moving
    to integrated systems to cut down on costs, more and more are moving to cloud-based
    environments. Cloud-based systems allow organizations the freedom to test out
    various infrastructure, software applications, and give them a cheaper alternative
    for creating in-house systems.


    Amazon AWS offers packages that can offer on-demand resources that are scalable
    to the customer’s needs as and when they require them. This means that should
    the customer need a lot more processing power or storage for a limited time, they
    only pay for the space and length of use. There are many different companies offering
    cloud-based packages such as Google Cloud Platform and Microsoft Azure.


    So why slot cloud-based systems into this guide? Because cloud-based systems are
    not only beneficial to large organizations, but to smaller ones and individuals
    too. Machine learning programming languages like Python may be open-source systems
    along with most of their libraries, but they can still take a lot of processing
    power and storage. Because of scalable on-the-fly resources offered by cloud-based
    systems providers, resources that may otherwise not be an option due to costs
    or accessibility are made available.


    As an individual starting out with machine learning, your current system may be
    able to handle the smaller projects, but as you grow you will find your system’s
    resources may become limited. Finding a cloud-based system that is both affordable
    and suitable for your needs will be highly beneficial to your machine learning
    training and growth.'
  mdcn: '## 制造业


    制造业曾面临各种高风险因素。这些设备减少了人为错误、安全问题和冗余流程的空间。


    通过将机器学习整合到各种制造流程中，公司可以采用统计评估和预测性维护来最大化可靠性。物联网与机器学习的结合彻底改变了制造业的运作方式。


    ## 残障或老年人护理


    通过在智能家居中安装监控系统，它提供了一种辅助生活模式，让体弱者和老年人能多一些独立性。物联网允许全天候监控和按需协助，无需全职护理人员。


    ## 交通运输


    在交通运输方面，物联网连接了道路、交通控制甚至汽车。物联网使用智能传感器，有助于车队维护。它也适用于GPS追踪、驾驶中的驾驶员异常行为、车辆问题，并有助于减少交通事故。


    对于交通控制，道路旁和道路内的传感器可以感知拥堵情况。利用这些数据，城市可以判断道路系统是否需要升级。交通灯可以感知到一侧比另一侧积压了更多车辆，并相应地切换信号。


    智能汽车正在登场，它们配备了机器学习、人工智能和物联网系统，使其不仅能驾驶，还能适应乘客的需求。汽车在行驶过程中学习，根据车主或乘客的习惯收集和处理信息。


    ## 家庭或建筑自动化


    家庭或建筑自动化是家庭或建筑中可以监控和控制的系统。这些包括照明、温度、电力、空气控制、消防系统等。


    这些物联网系统有助于预防火灾、一氧化碳中毒，并帮助减少能源消耗，同时降低家庭运营成本。


    ## 农业


    物联网通过使用各种传感器和气象设备帮助了农业。这些系统允许收集有价值的数据，如土壤成分、病虫害、温度、湿度、风速等。这些信息帮助农民减少作物维护、降低各种风险、减少浪费，并提高产品的质量和产量。


    ## 环境监测


    鉴于当今对环境问题的高度重视，物联网有助于捕获空气质量、土壤状况、地震活动、野生动物栖息地等信息。一些更复杂的系统可以通过预测自然灾害来挽救生命，用于早期预警检测系统。这些系统对于早期疏散和应急响应系统至关重要。随着万维网覆盖全球，物联网与机器学习的结合实现了地理可扩展性。


    ## 城市管理


    智慧城市正逐步在世界某些国家扎根。随着物联网和机器学习携手合作，城市现在能够更好地控制污水管理、电网和桥梁，监测各种风况等。它也可以有效地监测农村和城市基础设施。这对于确保这些地区的基础设施能够支持该地区不断增长或当前的人口是必要的。


    ## 能源管理


    当今市场上几乎没有不能连接互联网的电子设备。许多智能家居已经内置了能源管理功能。这些管理功能控制温度、照明，并确保房屋节能。这有助于限制能源消耗并节省家庭开支。


    一些智能家居可以远程控制，或者允许安排开启灯光、供暖、空调，甚至打开烤箱和咖啡机。


    ## 医疗保健


    医疗保健拥有自己的物联网，这是一个近年来兴起的系统。健康物联网推动医疗保健系统数字化，以便远程监控个人健康。这些设备可以在起搏器和假肢等系统中找到。


    可以远程监控的医疗保健系统可以减少用药错误，并通知医疗保健提供者潜在的健康问题。这在帮助提高应急响应时间方面也很有价值，特别是如果系统能够预测可能致命的健康问题。


    健康物联网、人工智能和机器学习的结合为人们提供了更好的生活质量，并对潜在的健康相关问题做出更快的响应。


    ## 消费产品


    智能设备、机器订购设备、信息机器人、联网车辆和智能手表都是物联网设备。如你所知，消费者已经依赖他们的大多数智能设备来跟踪约会、联系人、银行信息和操作。


    ## 物联网与安全


    物联网在任何应用中的一个主要担忧是安全。现代犯罪分子真的不必离开舒适的家就能抢劫银行账户或控制联网汽车。由于每天从世界各地收集的大量个人信息数据，这些信息总是有可能变得脆弱。


    我们被教导永远不要把ATM凭条乱扔，而是在丢弃前撕碎或粉碎账户信息。但是数据一旦出现在万维网上，就很难在不改变生活方式或身份的情况下收回。正如你现在所知，大数据价值连城。因此，它成为一些黑客的目标商品。


    为了填补这些物联网漏洞，机器学习应用程序被部署。因此，物联网设备不再只是连接到互联网传输或收集信息。它们变得更智能，并学会预测事物。例如，空客有许多不同的传感器监控飞机的各个方面，如客舱温度和气压、发动机功能，以及可以预测准确外部温度的传感器。这些信息被输入到一个基于云的网络，可以在飞机上以及远程进行监控。


    通过应用深度学习集成，物联网漏洞可以被克服，欺诈检测和异常活动很容易被深度学习算法捕捉到。美国宇航局使用物联网和机器学习集成来监控其Exo-Brake设备的性能功能，例如ZigBee和Xbee系统。美国宇航局使用经过极端修改的传感器以及机器学习来帮助延长火星车的寿命并使其更有效。美国宇航局一直在其月球着陆器项目中实施机器学习和物联网，该项目利用了太空中无限的太阳能。


    军方使用物联网和机器学习集成来操作无人机，收集各种军事行动的数据。得益于每架无人机独特的机器学习算法，无人机飞行时收集的数据会自动进行筛选，以确定其是否相关。


    由于物联网设备每天收集大量数据，需要机器学习分析来对数据进行分类，筛选出不需要的数据。


    ## 基于云的机器学习


    随着大数据的兴起和公司需要更多处理能力或转向集成系统以降低成本，越来越多的公司转向基于云的环境。基于云的系统允许组织自由测试各种基础设施、软件应用程序，并为他们提供创建内部系统的更便宜的替代方案。


    Amazon AWS提供可以根据客户需求随时扩展的按需资源套餐。这意味着如果客户在有限时间内需要更多的处理能力或存储空间，他们只需为使用空间和时长付费。有许多不同的公司提供基于云的套餐，例如Google
    Cloud Platform和Microsoft Azure。


    那么，为什么将基于云的系统纳入本指南？因为基于云的系统不仅对大型组织有益，对小型组织和个人也有益。像Python这样的机器学习编程语言可能是开源系统及其大多数库，但它们仍然需要大量的处理能力和存储空间。由于基于云的系统提供商提供的可扩展的即时资源，那些由于成本或可访问性而原本可能无法获得的资源现在变得可用。


    作为一个刚开始学习机器学习的个人，你当前的系统可能能够处理较小的项目，但随着你的成长，你会发现系统的资源可能会变得有限。找到一个既负担得起又适合你需求的基于云的系统，将对你的机器学习训练和成长大有裨益。'
