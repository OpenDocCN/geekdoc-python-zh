    # # Chapter 10: Overview of Neural Networks, Big Data, the Internet of Things
    (IoT), and Cloud Computing


    When you are starting out with machine learning, there are a lot of terms and
    types of machine learning that you will come across. Although you may not go in-depth
    with learning them, it is still a best practice to know what they are all about.
    In this chapter, we will touch on a few of these topics with a brief overview
    of them.


    # ## Neural Networks


    Neural networks have been around since the late 1950s and were modeled around
    the human brain by mimicking characteristics of the brain''s neurons. Neural networks
    work by passing data through various interconnected nodes. Each node will analyze,
    classify, and then pass the data to the next node. There are usually more than
    two or three layers hidden in a neural network. Some neural networks have hundreds
    of hidden layers, which is why most Neural Network models fall under the category
    of deep learning. As you know, deep learning is a subset of both machine learning
    and AI.


    # ### *Types of Neural Networks*


    There are quite a few types of neural networks, and each of them has its own unique
    application value and uses different methods to determine rules.


    The different types of neural networks include the following list.


    # #### Convolutional Neural Network


    Convolutional Neural Networks (CNN) layers are either pooled or interconnected.
    They can have from one to many layers. The use of a convolution operation runs
    on the input to make the network less parameter hungry, and it is a very deep
    network.'
  - '[PAGE 72]


    These neural networks are used in applications such as Natural Language Processing
    (NLP), Video Recognition, and Recommender Systems.


    # Feedforward Neural Network


    The feedforward neural network is one of the simplest forms of neural network,
    wherein data only moves in one direction from input to output. It uses a classifying
    activation function to create a front propagated wave. This type of neural network
    can have one layer or multiple hidden layers, but it has no backpropagation.


    A feedforward neural network is quite easy to maintain and is usually used in
    datasets that contain a lot of noise. Data that contains a lot of noise refers
    to data that has a lot of meaningless information mixed with it. They are used
    in applications where the classes of targets are hard to classify, such as computer
    vision and face recognition.


    A Single-layer Perceptron (SLP) is a type of feedforward neural network. It needs
    a binary target of which it can only classify cases that can be separated linearly.
    It is a threshold-based neural network that activates when the target reaches
    a predetermined threshold.


    # Modular Neural Network


    As the name states, a modular neural network has independently performing modular
    networks. These networks all perform separate sub-tasks without signaling or interacting
    in any way with each other during computation. They work this way even though
    they are working towards a common goal. They’re like a company with different
    departments that all work separately, but at the end of the day all are needed
    to keep the company operational. Each of the tasks performed is vital to the operation
    of the system.


    Large complex data structures get broken down into smaller bits that speed up
    the computational process. Once again, you can think of it similar to that of
    an office situation. Different departments take the load off of one or two people
    trying to keep the office running efficiently. By increasing the workforce, each
    with their own separate tasks to do, the work is done faster and more efficiently.
    This is the'
- md: '## Multi-layer Perceptron


    The multi-layer perceptron neural network is used extensively in applications
    such as speech recognition or machine translation. It is a neural network that
    consists of three or more layers. Each node in one layer is connected to the nodes
    in the next layer. It is a fully connected neural network.


    Nonlinear activation function is used in a multi-layer perceptron to classify
    non-linear data.


    ## Radial Basis Function Neural Network


    The radial basis function is used in applications for systems such as large power
    grids. They consist of two layers, the inner layer and the outer layer, of which
    the network measures the distance of any point in the network relative to the
    center point.


    It calculates the output from the center point to the next point in order to find
    the shortest distance between the two points. As power stations have grown and
    the systems have become more complex, it is important to be able to determine
    the quickest way to restore power in the event of an outage.


    ## Recurrent Neural Networks


    To help predict the outcome of a recurrent neural network layer, the output of
    a layer is saved and fed back to the input. It uses a long short-term memory function
    and starts the network off with the first layer being the same as a feedforward
    neural network. The layers after the first layer incorporate the recurrent neural
    network function.


    Recurrent neural networks start with front propagation, keeping the information
    it needs stored as memory in a cell. While it is holding the information in its
    memory it will continue to perform its next set of instructions. This system is
    a self-learning system and if it gets a wrong prediction, it will go back during
    back propagation and right the error.


    ## Big Data


    When computers first started out, a kilobyte of information was considered quite
    large. In modern computing terms, a kilobyte is a drop in the ocean compared to
    the huge amounts of data that are used.


    The table below shows how data is measured from the smallest unit to the largest
    unit in existence to date.


    | Data Storage Unit | Capacity of the Unit | Storage Unit Abbreviation |

    |---|---|---|

    | Bit | 1 or 0 | b |

    | Byte | 8 bits | B |

    | Kilobyte | 1024 bytes | KB |

    | Megabyte | 1024 kilobytes | MB |

    | Gigabyte | 1024 megabytes | GB |

    | Terabyte | 1024 gigabytes | TB |

    | Petabyte | 1024 terabytes | PB |

    | Exabyte | 1024 petabytes | EB |

    | Zettabyte | 1024 exabytes | ZB |

    | Yottabyte | 1024 zettabytes | YB |


    Very large amounts of data are known as Big Data that is collected, processed,
    learned, and grows exponentially regardless of its current size.


    ## 5 Key Elements (5V’s) of Big Data


    Big data has five key elements that make it the huge business it is today. These
    five key elements are:


    ### Volume


    In the early 2000’s, data available for analysis started to amass into huge volumes.
    Ordinary systems could not handle the copious amounts of data that were overwhelming
    them. That’s when the term “Big Data” was coined in reference to data being too
    big to fit into conventional systems. Volume in the 5V’s refers to the sheer volume
    of information available to analysts these days in a data system that continues
    to grow. Most Big Data systems potentially double in size every two years.


    ### Velocity


    The velocity refers to the speed at which the volume of data is produced. Thanks
    to real-time data applications there is a huge amount of data produced nearly
    every second of every day. Real-time data applications include systems such as
    mobile phones, RFID chips, and facial recognition systems. As real-time data has
    to be dealt with as soon as it is captured, it has a knock-on effect with its
    supporting systems such as networking bandwidth. It can also take up a lot of
    systems storage and processing power.


    ### Veracity


    There is also a lot of data that is captured every single day that is considered
    noise or of no value. The systems designed to handle Big Data have to be adept
    at being able to quickly, effectively, and efficiently deal with this junk data
    to ensure valid and useful output data.


    ### Value


    The bigger a dataset gets, the less structure it tends to have. The less structured
    data is, the harder a system has to work to process it. That is why normal conventional
    systems are not equipped to handle Big Data. As data is a valuable commodity in
    this day and age, Big Data has only started to get a foothold in the machine learning
    field.


    ## Big Data Uses


    Why is data so valuable? Because in the modern-day business world, competition
    is extremely fierce. Even smaller businesses have the potential to reach millions
    of potential customers all around the globe. With payment and delivery methods
    being as easy as the World Wide Web has made them, customers will support the
    company that pays the most attention to their needs.


    Having access to large amounts of statistical data helps organizations get an
    edge by being able to predict the wants and needs of their target audiences. This
    is where Big Data and machine learning go hand in hand. Some of the applications
    Big Data is used for include the following.


    ### Predicting Machinery Maintenance


    Correctly analyzed data of a system can predict when a machine''s parts are likely
    to fail or the lifespan of the part prolonged by providing various services. It
    can also quite accurately predict a failure in advance as an applied warning system
    for production lines, for example.


    ### Predicting Market Trends


    Big data has the ability to accurately predict market trends based on historical
    data collected from customer purchases over a certain number of months or years.
    Predicting what the customer wants before they know they will want is a marvelous
    edge to have. It also shows the customer that you were taking notice of what they
    wanted, need, and may like in the future.


    ### Fraud and Compliance


    One of the biggest uses for Big Data is in fraud detection. With the large amount
    of data, the system has a lot to base certain patterns on. As a result, it may
    be able to accurately predict a fraudulent transaction or one that has been tampered
    with. Because a computer can process this much faster than the human brain can,
    fraud can be dealt with in a timely manner, if not prevented.


    ### Product Development


    Based on the latest market trends, manufacturers can base new and improved products
    upon this. It can greatly cut down on cost and quickly show which products are
    worth upgrading or ending the production of.


    ### Customer Relations


    For a customer, filling out those customer satisfaction surveys can be a bother.
    Most will fill them in because they feel it is giving them a say, which they do
    have a right to do as the consumer. What this means for a business is that the
    data collected from this information not only helps with production but also customer
    interaction. In this day and age businesses strive to keep a happy customer, especially
    as word of mouth is now word of fingertip thanks to the ever-expanding web of
    social media.


    ## Internet of Things (IoT)


    Carnegie Mellon University was one of the very first institutions to implement
    an Internet of Things (IoT) system in the early 1980s. This system was a Coke
    machine that was connected to the Internet and allowed for a remote system to
    monitor the temperature of the machine. Being connected over the Internet also
    allowed the supplier of the machine to know when it ran out of stock.


    The Internet of Things is found in many applications in the 21st century, from
    watches to appliances, cars, buildings, and even towns. Any device that is connected
    over the Internet is known by the term Internet of Things (IoT). If you take a
    look around your home right now, you are bound to find at least one device that
    belongs to the category of IoT. A smart device, the thermostat, and even jet engines
    these days have sensors on them reporting status.


    ## Uses of the Internet of Things (IoT)


    Basically, any device that has an on/off button that either works with or through
    the Internet is considered to be an IoT device. As we live in a high-tech world,
    soon there will not be many devices that are not classified as such. In a smart
    city, even the roads are connected through the Internet.


    There are many modern-day uses for the Internet of Things applications, including
    the following.


    ### Manufacturing


    Thanks to the applications that support the Internet of Things, manufacturers
    are able to increase the productivity of new goods turning out higher volumes,
    faster, and with less waste. Machinery is now fitted with various devices such
    as sensors, identification devices, actuation monitoring, and communication. This
    cuts down'
  mdcn: '## 多层感知机


    多层感知机神经网络被广泛应用于语音识别或机器翻译等场景。它是一种由三层或更多层组成的神经网络。其中一层的每个节点都与下一层的节点相连。它是一种全连接神经网络。


    多层感知机使用非线性激活函数来对非线性数据进行分类。


    ## 径向基函数神经网络


    径向基函数被应用于大型电网等系统。它们由内层和外层两层组成，网络通过测量其中任意一点相对于中心点的距离来工作。


    它通过计算从中心点到下一个点的输出，以找到两点之间的最短距离。随着发电站规模的扩大和系统变得越来越复杂，能够在停电时确定最快的恢复供电方式变得至关重要。


    ## 循环神经网络


    为了帮助预测循环神经网络层的结果，一层的输出会被保存并反馈到输入端。它使用长短期记忆功能，并以第一层与前馈神经网络相同的方式启动网络。第一层之后的层则融入了循环神经网络功能。


    循环神经网络从前向传播开始，将所需信息作为记忆存储在一个单元中。在将信息保存在记忆中的同时，它将继续执行下一组指令。这个系统是一个自我学习系统，如果它做出了错误的预测，它会在反向传播过程中返回并纠正错误。


    ## 大数据


    计算机刚出现时，一千字节的信息被认为相当大。在现代计算术语中，与当今使用的海量数据相比，一千字节只是沧海一粟。


    下表展示了从最小单位到目前存在的最大单位的数据衡量方式。


    | 数据存储单位 | 单位容量 | 存储单位缩写 |

    |---|---|---|

    | 比特 | 1 或 0 | b |

    | 字节 | 8 比特 | B |

    | 千字节 | 1024 字节 | KB |

    | 兆字节 | 1024 千字节 | MB |

    | 吉字节 | 1024 兆字节 | GB |

    | 太字节 | 1024 吉字节 | TB |

    | 拍字节 | 1024 太字节 | PB |

    | 艾字节 | 1024 拍字节 | EB |

    | 泽字节 | 1024 艾字节 | ZB |

    | 尧字节 | 1024 泽字节 | YB |


    海量数据被称为大数据，它被收集、处理、学习，并且无论当前规模如何，都在呈指数级增长。


    ## 大数据的5个关键要素（5V）


    大数据有五个关键要素，使其成为当今庞大的产业。这五个关键要素是：


    ### 体量


    在21世纪初，可供分析的数据开始累积成巨大的体量。普通系统无法处理压倒它们的海量数据。正是在那时，“大数据”一词被创造出来，指的是数据过于庞大而无法放入传统系统。5V中的体量指的是分析师如今在数据系统中可用的信息总量，而这个系统还在持续增长。大多数大数据系统的规模每两年可能翻一番。


    ### 速度


    速度指的是数据体量产生的速度。得益于实时数据应用，几乎每天每秒都会产生海量数据。实时数据应用包括手机、RFID芯片和面部识别系统等。由于实时数据必须在捕获后立即处理，这会对网络带宽等支持系统产生连锁反应。它还会占用大量的系统存储和处理能力。


    ### 真实性


    每天捕获的大量数据被认为是噪声或无价值的。设计用来处理大数据的系统必须能够快速、有效、高效地处理这些垃圾数据，以确保输出数据的有效性和实用性。


    ### 价值


    数据集越大，其结构化程度往往越低。数据结构化程度越低，系统处理它所需的工作量就越大。这就是为什么普通传统系统不具备处理大数据的能力。由于数据在当今时代是一种宝贵的商品，大数据才刚刚在机器学习领域站稳脚跟。


    ## 大数据的用途


    数据为何如此宝贵？因为在现代商业世界中，竞争异常激烈。即使是小企业也有潜力触及全球数百万潜在客户。随着支付和配送方式变得像万维网所实现的那样便捷，客户会支持那些最关注他们需求的公司。


    获取大量统计数据有助于组织通过预测目标受众的需求和期望来获得优势。这就是大数据和机器学习携手并进的地方。大数据的一些应用包括以下方面。


    ### 预测机器维护


    对系统数据的正确分析可以预测机器部件何时可能失效，或者通过提供各种服务来延长部件的使用寿命。它还可以相当准确地提前预测故障，例如作为生产线的预警系统。


    ### 预测市场趋势


    大数据能够根据从客户购买行为中收集的数月或数年的历史数据，准确预测市场趋势。在客户意识到自己想要什么之前就预测出他们的需求，这是一个巨大的优势。这也向客户表明，你一直在关注他们想要、需要以及未来可能喜欢的东西。


    ### 欺诈与合规


    大数据最大的用途之一是欺诈检测。凭借海量数据，系统可以基于大量模式进行分析。因此，它可能能够准确预测欺诈交易或被篡改的交易。由于计算机处理这些数据的速度比人脑快得多，欺诈可以得到及时处理，甚至被预防。


    ### 产品开发


    基于最新的市场趋势，制造商可以据此开发新的和改进的产品。这可以大大降低成本，并快速显示哪些产品值得升级或停产。


    ### 客户关系


    对客户来说，填写那些客户满意度调查可能是一件麻烦事。大多数人会填写，因为他们觉得这给了他们发言权，而作为消费者，他们确实有权这样做。这对企业意味着，从这些信息中收集的数据不仅有助于生产，还有助于客户互动。在当今时代，企业努力保持客户满意，尤其是随着社交媒体的不断扩展，口碑现在变成了“指尖上的口碑”。


    ## 物联网


    卡内基梅隆大学是20世纪80年代初最早实施物联网系统的机构之一。这个系统是一台连接到互联网的可乐机，允许远程系统监控机器的温度。通过互联网连接，也使机器供应商能够知道何时缺货。


    物联网在21世纪的许多应用中都能找到，从手表到家电、汽车、建筑，甚至城镇。任何通过互联网连接的设备都被称为物联网设备。如果你现在环顾你的家，你肯定会发现至少一个属于物联网类别的设备。智能设备、恒温器，甚至如今的喷气发动机上都装有报告状态的传感器。


    ## 物联网的用途


    基本上，任何带有开/关按钮并且通过互联网工作或与互联网协同工作的设备都被认为是物联网设备。由于我们生活在一个高科技世界，很快将不会有太多设备不被归入此类。在智慧城市中，甚至道路也通过互联网连接。


    物联网应用有许多现代用途，包括以下方面。


    ### 制造业


    得益于支持物联网的应用，制造商能够提高新产品的生产力，以更快的速度、更高的产量和更少的浪费生产出产品。机器现在配备了各种设备，如传感器、识别设备、执行监控和通信设备。这减少了'
