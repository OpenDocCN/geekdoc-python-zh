- md: 'For the following exercises, you will be setting up a **DataFrame**. A DataFrame
    is like an Excel spreadsheet that contains a number of columns listing the data
    types. It will also contain a number of rows containing the data pertaining to
    each data type. In Python, a DataFrame is classified as a 2-dimensional data structure
    (*Intro to data structures*, n.d.).


    At the command line prompt type in the following:


    ```

    import pandas as pd


    ds = pd.read_csv(r''c:\datasets\iris.csv'')


    df = pd.DataFrame(ds, columns=[''sepal_length'',

    ''sepal_width'', ''petal_length'', ''petal_width'', ''species''])


    print(df)

    ```


    Make sure the column headings you use in the “df” definition match the column
    names in the .CSV file. If they do not, you will get NaN values in the table when
    it prints as per the image below.


    ## Step 3: Working With the Shape Property


    There are different ways to view the data and different metrics that can be pulled
    from. One such metric is the dimensions of the dataset.


    When there are massive amounts of data set out in rows and columns, there is a
    quick way to figure out how many instances and attributes there are. You can do
    this by using the **.shape** property of the defined dataset.


    For this exercise, you are going to use the already defined DataFrame, called
    **df**, that you created in the previous exercise.


    To find how many attributes and instances there are in the iris.csv dataset, type
    the following into the command line prompt:


    ```

    print(df.shape)

    ```


    The command will return:


    ```

    (50, 5)

    ```


    This translates to 50 instances of 5 attributes. Instances are the rows of data
    (data) and the attributes (describes the data) are the columns of data.


    ## Step 4: Working With the Head() Property


    Once you know how much data there is, you can find out if you have the correct
    data type or view the quality of data by looking at the first few rows of it.
    To view the first few rows of data in the dataset you will use the **.head()**
    property.


    Use the DataFrame you defined in the first exercise as **df**. In the command
    line prompt type the following:


    ```

    print(df.head(15))

    ```


    This tells the system to print the first 15 rows in the DataFrame **df**; the
    system should return information similar to the image below.


    ## Step 5: Working With the Describe() Property


    Python Pandas includes a number of Descriptive Statistic functions, listed in
    the table.


    | Descriptive Statistics Function | Use of the Function |

    |---|---|

    | abs() | Absolute Value |

    | count() | Amount of non-null observations |

    | cumsum() | Cumulative Sum |

    | cumprod() | Cumulative Product |

    | max() | Maximum Value |

    | mean() | Mean of Values |

    | median | Median of Values |

    | min() | Minimum Value |

    | mode() | Mode of Values |

    | prod() | Product of Values |

    | std() | Standard Deviation of Values |


    It is important to note that some generic operations will not work with all of
    the descriptive functions because a DataFrame is a heterogeneous data structure.
    Some functions will work with both character/string and numeric data, while some
    only work with numeric data.


    - Functions such as abs() and cumprod() will return an exception if a string or
    character data is used.

    - Functions such as sum() and cumsum() will work with numeric and character/string
    data.


    For a statistical summary of the data columns in the DataFrame the **.describe()**
    function is used.

    Type the following into the command line to summarize the data in the **ds** Dataframe
    columns.


    ```

    print(ds.describe())

    ```


    The system should return a screen that looks similar to the one in the image below.


    The .describe() function returns:


    - count — Total count of the objects listed per data item excluding any null values
    in the DataFrame.

    - mean — The mean value (average) of all the data in the DataFrame.

    - std — The standard deviation for all the listed data in the DataFrame.

    - min — The minimum value for the data in the DataFrame.

    - IQR — The rows listed as 25%, 50%, and 75% are the **interquartile range** of
    the data values in the DataFrame. This measures the difference between the 25th,
    50th, and 75th percentile of the data.

    - max — The maximum value for the data in the DataFrame.


    The function excludes any columns with characters, which is why it does not list
    or include the “species” column in the output table.


    The Iris dataset is measured in centimeters. From this summary a person can see
    that the values in the table fall within a scale of between 0 to 8 centimeters.


    ## Step 6: Working With the Groupby() Property


    In a massive table of data, it is easier to view and work with data that is split
    up into sets. To split the data into sets the .groupby() property is used. This
    property is used to perform functions such as:


    - Aggregation — This function will compute a statistical summary of the data.

    - Filtration — This function will sort through and discard conditional data.

    - Transformation — This function is used for group-specific information.


    To use the .groupby() property, type in the following at the command line prompt
    to group the df DataFrame by species and size.


    ```

    print(df.groupby(''species'').size())

    ```


    The system should return a table that looks similar to the one in the image below.


    ## Step 7: Creating Your Own Datasets


    Why not try the following exercise and create your own dataset?

    Think up a table of statistics such as the sales statistics per product per year.

    Create a worksheet and fill it with data, for example:


    | Item | Sales | Year | Rank |

    |---|---|---|---|

    | Butter | 20000 | 2010 | 2 |

    | Cream | 15000 | 2011 | 3 |

    | Eggs | 35000 | 2012 | 1 |

    | Milk | 45000 | 2013 | 1 |

    | Chocolate | 40000 | 2014 | 2 |


    The above table is a list of inventory for a shop, total sales for each year,
    and where their sales ranked within their territory.

    You can create the table in Excel and save it as a CSV file and then import it
    into Python. Or, you can create it directly in the command line to practice with
    the functions you have learned in the chapter.

    Type the following into a new command line:


    ```

    import pandas as pd

    sales_data = {''Item'' : [''Butter'', ''Cream'', ''Eggs'', ''Milk'', ''Chocolate''],

    ''Sales'' : [20000, 15000, 35000, 45000, 40000],

    ''Year'' : [2010, 2011, 2012, 2013, 2014],

    ''Rank'' : [2, 3, 1, 1, 2]}

    df = pd.DataFrame(sales_data)

    print(df)

    ```


    A table similar to the one below will be the systems output.


    Create your own datasets and use the functions in this chapter to gain various
    statistical information from it.


    # Chapter 4: Working with Data Visualization


    The concept of data visualization is to view or understand data in a visual form.
    Laying data out in a visual form makes it easier to distinguish trends, patterns,
    and correlations that may otherwise be missed.


    Python has quite a few libraries for data visualization. Each of these graphing
    libraries has useful features. The library you choose to use should be one that
    best suits your data visual needs. Some of the Python graphing libraries that
    can be used are:


    - Matplotlib — This library is one of the more popular graphing libraries in Python.
    It is used to create bar charts, histograms, line charts, and other basic graphs.
    Matplotlib takes quite a bit of coding to create its data visualization output.

    - Pandas Visualization — This library has an application programming interface
    (API). It is for high-level visualization with less coding requirements than Matplotlib.

    - Plotly — This library is good for creating interactive plots for exploratory
    visualizations.

    - Seaborn — This library is based on the Matplotlib library. It is a high-level
    interface designed to give more informational statistics attractively displayed.


    There are different kinds of plots that can be used to visualize data. Some of
    the more commonly used plots include:


    - Bar Graph

    - Line Chart or Graph

    - Histogram Plot

    - Scatter Plot

    - Box and Whisker Plot'
