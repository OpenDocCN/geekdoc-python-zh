- md: '## Python Machine Learning Example Training Datasets


    When you are learning to use ML, you are not going to want to learn on a live
    dataset. The good news is that there are quite a few free-to-use example datasets
    available for Python ML coding.


    Some of the more popular example datasets are:


    - Fisher Iris Flower Dataset — This dataset has been around for many years and
    is used in most ML training scenarios. It is a CSV file that contains different
    species of the Iris plant (*Iris Species*, n.d.).

    - Prima Indians Diabetes Dataset — This dataset can be used freely as a training
    dataset for Python machine learning. Like the Iris dataset, you must download
    the CSV file. This dataset is used to predict a person''s chances of getting diabetes
    based on certain criteria (*Predict Diabetes From Medical Records*. n.d.).


    These datasets can both be obtained at a website called **Kaggle.com**.


    Place your dataset in a directory that you have administration rights for and
    note the full path to the dataset.


    Both these datasets are small and have enough columns as well as data to be useful
    as training datasets but will not get out of control. When you are learning to
    create an ML algorithm, you do not want to start with huge amounts of data that
    could have loads of variable criteria.


    ## Getting Started with Python


    One of the first machine learning Python programs to attempt is the simple “welcome
    world” machine learning program.


    Some Python features that will be discussed in this section are:


    - Introducing the Python platform and libraries

    - Stacking the data set

    - Condensing the data set

    - Introducing the data set

    - Working with algorithms

    - Predicting some outcomes


    While you are starting out and learning, it is important to remember to take as
    much time as needed. Progress at your own pace and join a Python support group.
    There are many out there, and some of the more popular ones can be found on the
    Python website (The Python Community, n.d.).


    ## Step 1: Download and Install


    The latest version of Python is available on the Python website (Python.org).
    It is best to download the latest version of Python on all the supporting libraries.
    At the date this guide was published, Python version 3.8.5 was the latest version.
    Version 2.7.18 was still supported and will work with the following exercises.


    - Download Python from the Python.org website.

    - Follow the instructional guide provided by **Python.org** to install and set
    up the Python environment in readiness for ML.


    ## Step 2: Install the Python Libraries


    Python Machine Learning Supporting Libraries you will need are:


    - Matplotlib

    - Numpy

    - Pandas

    - Scipy

    - Scikit-learn


    Once again, follow the comprehensive instructional guide on the **Python.org**
    website on how to install Python libraries.


    ## Step 3 - Build Your Environment


    The easiest way to code with Python ML and build an environment is with Anaconda
    using Jupyter Notebook (which is part of the Anaconda suite).


    To download Anaconda, go to the **Anaconda** website (*Anaconda Individual Edition*
    , n.d.). Download the latest version to ensure it works with the installed version
    of Python on your machine.


    Both the Python website and the Anaconda website have comprehensive guides on
    how to download, install, and set up the Python ML environment with Anaconda.


    Alternatively, you can use Python SciPy. The following examples run with Python
    SciPy. To run and set up the Python SciPy environment, go to the SciPy webpage,
    and follow the comprehensive installation and setup guidelines (*SciPy Installation*
    , n.d.).


    ## Step 4: Check the Python Installation and Import the Libraries


    For the first few exercises, it is best to use the Python 3.8 command line.


    At a new command line in the Python interpreter, type the following:


    ```

    python

    ```


    The following screen should appear:


    ![](img/de6fa05c069954f141bee715b9484f75_23_0.png)


    Type the following commands to import the needed libraries:


    ```

    import sys

    import pip

    import scipy

    import numpy

    import sklearn

    ```


    ![](img/de6fa05c069954f141bee715b9484f75_23_1.png)


    You will need to install Matplotlib and Pandas. To do this, type the following
    commands at the command line prompt.

    To install Matplotlib type the following:


    ```

    python -m pip install matplotlib

    ```


    The installation will gather the matplotlib files and then install them. If the
    installation ends with a warning that your version may need to be upgraded, run
    an upgrade by using the following command:


    ```

    python -m pip install matplotlib --upgrade

    ```


    To install Pandas type the following:


    ```

    python -m pip install pandas

    ```


    The installation will gather the Pandas files and then install them. If the installation
    ends with a warning that your version may need to be upgraded, run an upgrade
    by using the following command:


    ```

    python -m pip install pandas --upgrade

    ```


    Once Matplotlib and Pandas are installed and up to date, type the following at
    the command line prompt:


    ```

    import matplotlib

    import pandas

    ```


    This will import the modules and you should now have all the required libraries/modules
    imported and ready to use.

    To check the modules that are installed in Python, type the following at the command
    line prompt:


    ```

    pip list

    ```


    or


    ```

    help(“modules”)

    ```


    The system can take a minute or two to gather the necessary information and will
    display a list of all installed and available libraries in Python.


    # Chapter 3: Working with Data


    To work with data, you are going to download the Fisher Iris Flower Dataset from
    the following website (download the ZIP file):

    https://gist.github.com/curran/a08a1080b88344b0c8a7#file-iris-csv


    If you want to read up on this dataset you can do so in Wikipedia, which has a
    host of information on it. The dataset was designed by Ronald Fisher in 1936 as
    a linear discriminant analysis example (*Iris Flower Data Set*, n.d.). There are
    three species of iris listed in the dataset, with over fifty samples per species.
    The length and width of the petals and sepals were measured for all the samples
    to differentiate between the iris species.


    Download the Iris data into Python using CSV format and place it in an easily
    accessible directory.


    For example:

    c:\datasets


    ## Step 1: Load Sklearn, Pandas, and Matplotlib Supporting Libraries


    Once you have the Iris dataset CSV file loaded, you need to load the supporting
    libraries for Sklearn, Pandas, and Matplotlib.


    Import Sklearn Supporting Libraries by typing the following into the command line:


    ```

    from sklearn.metrics import accuracy_score

    from sklearn.metrics import classification_report

    from sklearn.model_selection import cross_val_score

    from sklearn.metrics import confusion_matrix

    from sklearn.tree import DecisionTreeClassifier

    from sklearn.neighbors import KNeighborsClassifier

    from sklearn.naive_bayes import GaussianNB

    from sklearn.linear_model import LogisticRegression

    from sklearn.discriminant_analysis import LinearDiscriminantAnalysis

    from sklearn.svm import SVC

    from sklearn.model_selection import StratifiedKFold

    from sklearn.model_selection import train_test_split

    ```


    Import Matplotlib Supporting Libraries by typing the following into the command
    line:


    ```

    from matplotlib import pyplot

    ```


    Import Pandas Supporting Libraries by typing the following into the command line:


    ```

    from pandas.plotting import scatter_matrix

    from pandas import read_csv

    ```


    ![](img/de6fa05c069954f141bee715b9484f75_26_0.png)


    If you encounter an error, check that you have Sklearn, Matplotlib, and Pandas
    correctly installed and imported into Python.


    ## Step 2: Import the Dataset into Python


    Pandas is used to import the dataset and set up column names. This is how we set
    up the visualization of the output data.

    You will need to know the exact path to the directory where you downloaded the
    Iris CSV file to (ex. c:\datasets\iris.csv).'
  mdcn: '## Python 机器学习示例训练数据集


    当你学习使用机器学习时，你不会想在实时数据集上进行学习。好消息是，有相当多的免费示例数据集可用于 Python 机器学习编码。


    一些更受欢迎的示例数据集包括：


    - Fisher 鸢尾花数据集 — 该数据集已存在多年，用于大多数机器学习训练场景。它是一个 CSV 文件，包含不同种类的鸢尾植物（*鸢尾花物种*，n.d.）。

    - Prima 印第安人糖尿病数据集 — 该数据集可免费用作 Python 机器学习的训练数据集。与鸢尾花数据集一样，你必须下载 CSV 文件。该数据集用于根据某些标准预测一个人患糖尿病的可能性（*从医疗记录预测糖尿病*，n.d.）。


    这些数据集都可以在一个名为 **Kaggle.com** 的网站上获取。


    将你的数据集放在你拥有管理权限的目录中，并记下数据集的完整路径。


    这两个数据集都很小，并且有足够的列和数据作为训练数据集使用，但不会变得难以控制。当你学习创建机器学习算法时，你不希望从可能包含大量可变标准的海量数据开始。


    ## Python 入门


    首先要尝试的机器学习 Python 程序之一是简单的“欢迎世界”机器学习程序。


    本节将讨论的一些 Python 特性包括：


    - 介绍 Python 平台和库

    - 加载数据集

    - 压缩数据集

    - 介绍数据集

    - 使用算法

    - 预测一些结果


    在你刚开始学习时，重要的是要记住花足够的时间。按照自己的进度前进，并加入一个 Python 支持小组。有很多这样的小组，一些更受欢迎的可以在 Python
    网站上找到（Python 社区，n.d.）。


    ## 步骤 1：下载和安装


    最新版本的 Python 可在 Python 网站（Python.org）上获取。最好下载最新版本的 Python 及其所有支持库。在本指南发布时，Python
    版本 3.8.5 是最新版本。版本 2.7.18 仍然受支持，并且可以用于以下练习。


    - 从 Python.org 网站下载 Python。

    - 按照 **Python.org** 提供的指南安装和设置 Python 环境，为机器学习做好准备。


    ## 步骤 2：安装 Python 库


    你需要的 Python 机器学习支持库包括：


    - Matplotlib

    - Numpy

    - Pandas

    - Scipy

    - Scikit-learn


    再次，请按照 **Python.org** 网站上关于如何安装 Python 库的综合指南操作。


    ## 步骤 3 - 构建你的环境


    使用 Python 机器学习进行编码和构建环境的最简单方法是使用 Anaconda 和 Jupyter Notebook（它是 Anaconda 套件的一部分）。


    要下载 Anaconda，请访问 **Anaconda** 网站（*Anaconda 个人版*，n.d.）。下载最新版本以确保它与你机器上安装的 Python
    版本兼容。


    Python 网站和 Anaconda 网站都有关于如何使用 Anaconda 下载、安装和设置 Python 机器学习环境的综合指南。


    或者，你可以使用 Python SciPy。以下示例使用 Python SciPy 运行。要运行和设置 Python SciPy 环境，请访问 SciPy
    网页，并按照综合安装和设置指南操作（*SciPy 安装*，n.d.）。


    ## 步骤 4：检查 Python 安装并导入库


    对于前几个练习，最好使用 Python 3.8 命令行。


    在 Python 解释器中的新命令行中，输入以下内容：


    ```

    python

    ```


    应出现以下屏幕：


    ![](img/de6fa05c069954f141bee715b9484f75_23_0.png)


    输入以下命令以导入所需的库：


    ```

    import sys

    import pip

    import scipy

    import numpy

    import sklearn

    ```


    ![](img/de6fa05c069954f141bee715b9484f75_23_1.png)


    你需要安装 Matplotlib 和 Pandas。为此，请在命令行提示符下输入以下命令。

    要安装 Matplotlib，请输入以下内容：


    ```

    python -m pip install matplotlib

    ```


    安装程序将收集 matplotlib 文件，然后安装它们。如果安装结束时出现警告，提示你的版本可能需要升级，请使用以下命令运行升级：


    ```

    python -m pip install matplotlib --upgrade

    ```


    要安装 Pandas，请输入以下内容：


    ```

    python -m pip install pandas

    ```


    安装程序将收集 Pandas 文件，然后安装它们。如果安装结束时出现警告，提示你的版本可能需要升级，请使用以下命令运行升级：


    ```

    python -m pip install pandas --upgrade

    ```


    一旦 Matplotlib 和 Pandas 安装并更新完毕，请在命令行提示符下输入以下内容：


    ```

    import matplotlib

    import pandas

    ```


    这将导入模块，你现在应该已经导入了所有需要的库/模块并准备使用。

    要检查 Python 中安装的模块，请在命令行提示符下输入以下内容：


    ```

    pip list

    ```


    或


    ```

    help(“modules”)

    ```


    系统可能需要一两分钟来收集必要的信息，并将显示 Python 中所有已安装和可用库的列表。


    # 第 3 章：处理数据


    要处理数据，你需要从以下网站下载 Fisher 鸢尾花数据集（下载 ZIP 文件）：

    https://gist.github.com/curran/a08a1080b88344b0c8a7#file-iris-csv


    如果你想阅读有关此数据集的信息，可以在维基百科上进行，那里有大量关于它的信息。该数据集由 Ronald Fisher 于 1936 年设计，作为线性判别分析的示例（*鸢尾花数据集*，n.d.）。数据集中列出了三种鸢尾花，每种有超过五十个样本。测量了所有样本的花瓣和萼片的长度和宽度，以区分鸢尾花物种。


    使用 CSV 格式将鸢尾花数据下载到 Python 中，并将其放在易于访问的目录中。


    例如：

    c:\datasets


    ## 步骤 1：加载 Sklearn、Pandas 和 Matplotlib 支持库


    一旦你加载了鸢尾花数据集 CSV 文件，你需要加载 Sklearn、Pandas 和 Matplotlib 的支持库。


    通过在命令行中输入以下内容导入 Sklearn 支持库：


    ```

    from sklearn.metrics import accuracy_score

    from sklearn.metrics import classification_report

    from sklearn.model_selection import cross_val_score

    from sklearn.metrics import confusion_matrix

    from sklearn.tree import DecisionTreeClassifier

    from sklearn.neighbors import KNeighborsClassifier

    from sklearn.naive_bayes import GaussianNB

    from sklearn.linear_model import LogisticRegression

    from sklearn.discriminant_analysis import LinearDiscriminantAnalysis

    from sklearn.svm import SVC

    from sklearn.model_selection import StratifiedKFold

    from sklearn.model_selection import train_test_split

    ```


    通过在命令行中输入以下内容导入 Matplotlib 支持库：


    ```

    from matplotlib import pyplot

    ```


    通过在命令行中输入以下内容导入 Pandas 支持库：


    ```

    from pandas.plotting import scatter_matrix

    from pandas import read_csv

    ```


    ![](img/de6fa05c069954f141bee715b9484f75_26_0.png)


    如果遇到错误，请检查你是否已正确安装 Sklearn、Matplotlib 和 Pandas 并将其导入 Python。


    ## 步骤 2：将数据集导入 Python


    Pandas 用于导入数据集并设置列名。这就是我们设置输出数据可视化的方式。

    你需要知道你下载鸢尾花 CSV 文件的目录的确切路径（例如 c:\datasets\iris.csv）。'
