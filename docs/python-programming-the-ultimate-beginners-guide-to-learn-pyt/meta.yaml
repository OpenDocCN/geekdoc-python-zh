    | Data Storage Unit | Capacity of the Unit | Storage Unit Abbreviation |

    |---|---|---|

    | Bit | 1 or 0 | b |

    | Byte | 8 bits | B |

    | Kilobyte | 1024 bytes | KB |

    | Megabyte | 1024 kilobytes | MB |

    | Gigabyte | 1024 megabytes | GB |

    | Terabyte | 1024 gigabytes | TB |

    | Petabyte | 1024 terabytes | PB |

    | Exabyte | 1024 petabytes | EB |

    | Zettabyte | 1024 exabytes | ZB |

    | Yottabyte | 1024 zettabytes | YB |


    Very large amounts of data are known as Big Data that is collected, processed,
    learned, and grows exponentially regardless of its current size.


    # 5 Key Elements (5V’s) of Big Data


    Big data has five key elements that make it the huge business it is today. These
    five key elements are:


    # Volume


    In the early 2000’s, data available for analysis started to amass into huge volumes.
    Ordinary systems could not handle the copious amounts of data that were overwhelming
    them. That’s when the term “Big Data” was coined in reference to data being too
