  md: '# Conclusion


    Hopefully, you found this book useful in helping you get started with Python machine
    learning. You should now have the foundational tools you need to help you move
    onto the more intermediary Python machine learning.


    Some key points to remember when starting out with Python machine learning are:


    +   - Learn all the buzzwords and make sure you understand them

    - Have a good grasp of basic Python programming

    - If you are a beginner, work through the basics of Python and learn the functions,
    libraries, and commands

    - Try to write a small Python program using the supporting platforms like Anaconda
    or IDLE

    - Understand the basic concepts of machine learning as laid out in this guide

    - Practice the exercises and start to add to them the more confident you feel

    - Look for various YouTube videos to expand your Python machine learning knowledge

    - The Internet is a valuable source of information and has plenty of Python machine
    learning support groups to help you or bounce ideas around with.


    As with any technology environment, you should strive to join groups that keep
    you updated and informed on breakthrough technologies within the field. Read data
    science magazines and articles. Sign up to popular data science newsletters from
    reliable sources such as TechRepublic, Data Science Magazine, and sites like Medium.com.


    Some websites with newsletters to follow or podcasts of interest to keep yourself
    updated on the latest AI or ML developments and news include:'
