    ## 步骤 5：使用 Describe() 属性


    Python Pandas 包含多个描述性统计函数，如下表所示。


    | 描述性统计函数 | 函数用途 |

    |---|---|

    | abs() | 绝对值 |

    | count() | 非空观测值数量 |

    | cumsum() | 累积和 |

    | cumprod() | 累积积 |

    | max() | 最大值 |

    | mean() | 平均值 |

    | median | 中位数 |

    | min() | 最小值 |

    | mode() | 众数 |

    | prod() | 乘积 |

    | std() | 标准差 |


    需要注意的是，由于 DataFrame 是异构数据结构，某些通用操作并非适用于所有描述性函数。有些函数同时适用于字符/字符串和数值数据，而有些仅适用于数值数据。


