    - O’Reilly Data Show Podcast — https://www.oreilly.com/radar/topics/oreilly-data-show-podcast/
    — A podcast that explores the drive behind Big Data, exploration into AI, and
    data science.

    - TWIML — https://twimlai.com/shows/ — This podcast site is a top site for those
    wanting to keep abreast of all the latest AI and ML trends. It has a variety of
    hosts to choose from that discuss all sorts of topics, not only those relating
    to AI or ML.


    Thank you for buying this book and if you are reading the conclusion, congratulations
    on working your way through it! Keep practicing, as the more you do, the easier
    machine learning will become, and you will be programming your own ML algorithm
    in no time.


    Good luck on your Python machine learning journey, and if you found this book
    helpful, please let us know. It is always great to hear from our readers!'
