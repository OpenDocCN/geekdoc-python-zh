  - '[PAGE 68]


    the forest will vote on what the predicted outcome should be. For instance, if
    the subject is a face, a few trees in the forest may return data pertaining to
    the face, such as a nose, an eye, or an ear. If in a forest of, say, 800 trees
    only 200 return information pertaining to the face, the vote will be cast out
    of 800. If the majority of the nodes list an eye, the outcome will be an eye.
    If some of the other trees have put forward an ear, nose, etc., then the higher
    levels of the tree can vote that the result is a face.


    # Ensemble Algorithm


    Random forests are known as ensemble algorithms that are based on a concept that
    a single learner may not have all the strength needed to solve a problem. They
    are then known as a weak learner. But a group of weak learners banded together
    can become a collectively strong learner.


    The same applies to classification trees. On their own they are weaker learners,
    but collectively they become a force of knowledge. As they share knowledge and
    grow the applications they are capable of becoming endless.


    # Ensemble Learners


    Single learners consist of training and testing data.


    +   - Training data = a learning method such as K-nearest neighbor (KNN)

    - A model is formed from the training data which, if you punch in a query, you
    will get an outcome from.


    Ensemble learners also consist of training and testing data but incorporate an
    ensemble of different learning methods. Each learning method is trained and tested
    with the same data. Each model would be individually queried to get a predicted
    outcome and will return their prediction; the answer with the most votes would
    be the answer. In regression, the mean value will be the answer.


    Ensemble learners are good to use because each model you use has its own bias
    and variables. When you combine these methods,'
  - '[PAGE 69]


    their biases and variables are radically reduced due to a voting (classification)
    or averaging system (regression).


    # Bagging or Bootstrap Aggregation


    Bagging or bootstrap aggregation is used in regression and statistical classification.
    It is primarily used to improve upon an algorithm''s accuracy. It does this by
    reducing variance and improving the stability of the model.


    In the ensemble learners in the above section, we looked at training different
    models on the same data. Bagging or bootstrap aggregation is another way of creating
    ensemble learners by using the same method, with the dataset, but training each
    learner on a different section of the data.


    To bag the data, you would need to create subsets of the data (bags filled with
    different sections of the data).


    Data is chosen at random from the same set of data per bag with replacement. With
    replacement means that the random grab for data may select the same data it has
    already collected.


    +   - n = The number of data instances in the dataset.

    - n¹ = The number of data instances per bag. The rule of thumb for the training
    instances per bag should be no more than 60% of the dataset training instances.

    - m = The number of bags in the ensemble of learners.


    Each model is trained on the data it has randomly gathered and tested on the outcome
    as either voted by the models or the mean value.


    # Boosting


    The boosting machine learning ensemble meta-algorithm is used in supervised learning
    to cut down on variance, reduce bias, and boost weak learners. Boosting is similar
    to bagging but it''s used to boost ensemble learners that are not performing as
    they should be performing.


    When using an algorithm such as Ada Boost, you set up the learning as you would
    to select random data (like in bagging) from the'
  - '[PAGE 70]


    dataset. The model will get trained in the same way, the only difference will
    be that not just 40% or so of the dataset will be used to test the model. All
    of the training data is used to test the learner’s model. The outcome of this
    test usually pinpoints errors or inconsistencies in the testing dataset.


    The next step will be to build the next bag of randomly selected data from the
    dataset but weighted towards the erroneous data. This means that instances in
    the dataset that displayed the error will be the instances that will be picked
    first over other instances of the data. This will continue for the amount of bagging
    instances needed to complete the model.


    Boosting helps to fix poorly modeled data and cut down on errors in the model.'
