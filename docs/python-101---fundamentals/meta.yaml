    Traceback (most recent call last):\n  File \"c:\\...\\test.py\", line 2, in <module>\n\
    \    name = int(name)\nValueError: invalid literal for int() with base 10: 'Sam'\n\
    ```\n\nAlternatively, when we try to typecast a *string* into *integer* it will\
    \ through a **ValueError** and script will crush again.\n\n# 10.1 – Try-Except\n\
    \nBy using try & except block we can easily handle these types of errors. The\
    \ structure of try-except is as same as if-else condition. But there is no condition.\
    \ We write those code which have some confusions or network issue"
