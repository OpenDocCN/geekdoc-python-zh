    \n## 12.1 – Opening & Closing Files\n\nIf we want to drink water, we need to open\
    \ the bottle first, right. Like that it need to open file stream first in order\
    \ to access data of the particular file.\n\nSuppose we have a text file called\
    \ ‘myfile.txt’ and it has some data. Here we will work with that file.\n\n```\n\
    Myfile.txt:\n\nThis book is the first part of a series that is called the Python\
    \ 101. In this series, we are going to focus on learning the Python Programming\
    \ Language in an effective and easy way.\n```\n\nOpening File:\n\n```\nfile =\
    \ open('myfile.txt', 'r')\n```\n\nHere you can see we are simply using open()\
    \ function to open the file stream. As a parameter we need to define the file\
    \ name and the access mode (we will talk about that in a second). The function\
    \ returns the stream and we can save it into our variable & apply different operations\
    \ on it.\n\n### 12.1.1 – Access Modes\n\nWhenever we open a file in Python, we\
    \ use a certain access mode. The access mode defines for which purpose we are\
    \ opening the file, like reading or writing. There are various access modes in\
    \ python. Following table will be summarize it batter.\n\n| Access Mode | Description\
    \ |\n|---|---|\n| r | Reading Files |\n| r+ | Reading & Writing |\n| rb | Reading\
    \ Binary Files |\n| rb+ | Reading & Writing Binary Files |\n| w | Writing into\
    \ Files |\n| w+ | Reading & Writing |\n| wb | Writing into Binary Files |\n| wb+\
    \ | Reading & Writing Binary Files |\n| a | Appending Files |\n| a+ | Reading\
    \ & Appending |\n| ab | Appending Binary Files |\n| ab+ | Reading & Appending\
    \ Binary Files |\n\nHope you got the idea of access modes. Now time to close the\
    \ file. When we all done with our file, we need to close the file, otherwise it\
    \ may through some unwanted errors. To this simply we will use the *close()* function.\n\
    \n```\nfile = open('myfile.txt', 'r')\n\n# All Necessary Codes\n\nfile.close()\n\
    ```\n\n## 12.2 – With Statement\n\nAlternatively, we can open and close streams\
    \ more effectively by using with statements. A with statement opens a stream,\
    \ executes the indented code and closes the stream afterwards.\n\n```\nwith open('myfile.txt',\
    \ 'r') as file:\n    # All Necessary Codes\n```\n\nIf you are lazy like me with\
    \ statement can help you. Because we don’t need to close the file stream, it will\
    \ do it itself. Also, using with statement shorten the code and make it more readable.\n\
    \n## 12.3 – Reading from Files\n\nOnce we open the file stream in read mode, we\
    \ can start reading data from the stream. To do this we need to simply use *read()*\
    \ method.\n\n```\n# Reading in Ordinary Way\nfile = open('myfile.txt', 'r')\n\
    print(file.read())\nfile.close()\n\n# Reading using with Statement\nwith open('myfile.txt',\
    \ 'r') as file:\n    print(file.read())\n```\n\nHere we are opening file in read\
    \ mode and print all data of the file using read method.\n\nWhat if we don’t need\
    \ the whole data, we need first 50 or 100 characters of file? We can achieve this\
    \ by passing a parameter to the read method.\n\n```\nwith open('myfile.txt', 'r')\
    \ as file:\n    print(file.read(50))\n```\n\nThis code will print first 50 characters\
    \ of file.\n\n## 12.4 – Writing into Files\n\nWriting something into a file is\
    \ almost similar to reading file. Just we need to change two thing, access mode\
    \ & method. We need to use *write()* method instead of *read()* method in order\
    \ to write into a file.\n\nHere we are doing this using with statement, you can\
    \ do both.\n\n```\nwith open('myfile.txt', 'w') as file:\n    file.write(\"Welcome\
    \ to Python-101\")\n```\n\nHere you can see we are passing a string to the write\
    \ method & that string will be written into our file (*myfile.txt*). Also, you\
    \ can pass a variable to the write method instead of passing string directly.\n\
    \nTill now everything seems alright. But there is a huge problem. Every time you\
    \ run the code it will override the file if the file name is same. So before writing\
    \ you have to decide what you want. If you want to override every time then go\
    \ for it. But if you don’t want to loss past data then you should use append access\
    \ mode which id ‘**a**’.\n\n```\nwith open('myfile.txt', 'a') as file:\n    file.write(\"\
    Welcome to Python-101\")\n```\n\nNow it appends the file with data passed as argument,\
    \ even though the data is same. For every iteration data will be appended into\
    \ the file if the file name is same.\n\n## WHAT NEXT?\n\nHa-ha you did it! In\
    \ this book we covered all the fundamentals of Python Programming. Hope now you\
    \ understand how this language structured and also the basic principle of *Functions,\
    \ Loops, Conditions, Sequences* etc. Now you can build some of your own program\
    \ like calculator, Rock-Paper-Scissors Game or other simple applications.\n\n\
    This book is for absolute beginners, as it is just the beginning of **Python 101**\
    \ Series. In the next part we will dive more into Python and learn about *Modules,\
    \ Classes, OOPs* and many more. Later in this series we’ll also learn about Data\
    \ Science, Machine Learning & other advanced topics.\n\nLast but not the least\
    \ a little reminder, this book is written for you, so that you can learn the fundamentals\
    \ of Python and get as much value as possible in easy way. So, if you like the\
    \ book or think you learnt something new & interesting from this book, please\
    \ write a quick review on **Amazon**. It won’t take more than one minute and also\
    \ it is completely free. It will help me to write more high-quality books, which\
    \ can be beneficial for you.\n\n*Thank You...*"
  mdcn: "## 11.5.6 – 分割函数\n\n如果我们想按特定字符分割字符串，那么分割函数就能帮我们实现。有趣的是，它会返回一个包含字符串各部分的列表。\n\
    \n```\nname = \"Sam,Jack,Axle,Mickel\"\nname_list = name.split(\",\")\nprint(name_list)\n\
    \n>>> ['Sam', 'Jack', 'Axle', ' Mickel']\n```\n\n## 第12章\n\n## 文件处理\n\n这是本书的最后一章，在本章中，我们将学习如何从外部文件读取或写入数据。你可能会问，我们为什么要这样做？答案是，让我们来看看。\n\
    \n## 12.1 – 打开与关闭文件\n\n如果我们想喝水，首先需要打开瓶盖，对吧？同样，为了访问特定文件的数据，我们需要先打开文件流。\n\n假设我们有一个名为‘myfile.txt’的文本文件，其中包含一些数据。我们将使用该文件进行操作。\n\
    \n```\nMyfile.txt:\n\nThis book is the first part of a series that is called the\
    \ Python 101. In this series, we are going to focus on learning the Python Programming\
    \ Language in an effective and easy way.\n```\n\n打开文件：\n\n```\nfile = open('myfile.txt',\
    \ 'r')\n```\n\n这里你可以看到，我们只是使用`open()`函数来打开文件流。作为参数，我们需要定义文件名和访问模式（我们稍后会讨论）。该函数返回流，我们可以将其保存到变量中，并对其应用不同的操作。\n\
    \n### 12.1.1 – 访问模式\n\n每当我们在Python中打开文件时，都会使用特定的访问模式。访问模式定义了我们打开文件的目的，例如读取或写入。Python中有多种访问模式。下表将更好地总结它们。\n\
    \n| 访问模式 | 描述 |\n|---|---|\n| r | 读取文件 |\n| r+ | 读取与写入 |\n| rb | 读取二进制文件 |\n|\
    \ rb+ | 读取与写入二进制文件 |\n| w | 写入文件 |\n| w+ | 读取与写入 |\n| wb | 写入二进制文件 |\n| wb+ |\
    \ 读取与写入二进制文件 |\n| a | 追加文件 |\n| a+ | 读取与追加 |\n| ab | 追加二进制文件 |\n| ab+ | 读取与追加二进制文件\
    \ |\n\n希望你已经理解了访问模式的概念。现在是时候关闭文件了。当我们完成所有文件操作后，需要关闭文件，否则可能会引发一些不必要的错误。为此，我们只需使用*close()*函数。\n\
    \n```\nfile = open('myfile.txt', 'r')\n\n# 所有必要的代码\n\nfile.close()\n```\n\n##\
    \ 12.2 – With 语句\n\n或者，我们可以使用`with`语句更有效地打开和关闭流。`with`语句会打开一个流，执行缩进的代码，然后关闭该流。\n\
    \n```\nwith open('myfile.txt', 'r') as file:\n    # 所有必要的代码\n```\n\n如果你像我一样懒，`with`语句会对你有所帮助。因为我们不需要手动关闭文件流，它会自动完成。此外，使用`with`语句可以缩短代码并使其更具可读性。\n\
    \n## 12.3 – 从文件读取\n\n一旦我们以读取模式打开文件流，就可以开始从流中读取数据。为此，我们只需使用*read()*方法。\n\n```\n\
    # 普通方式读取\nfile = open('myfile.txt', 'r')\nprint(file.read())\nfile.close()\n\n\
    # 使用 with 语句读取\nwith open('myfile.txt', 'r') as file:\n    print(file.read())\n\
    ```\n\n这里我们以读取模式打开文件，并使用`read`方法打印文件的所有数据。\n\n如果我们不需要全部数据，只需要文件的前50或100个字符怎么办？我们可以通过向`read`方法传递一个参数来实现。\n\
    \n```\nwith open('myfile.txt', 'r') as file:\n    print(file.read(50))\n```\n\n\
    这段代码将打印文件的前50个字符。\n\n## 12.4 – 写入文件\n\n向文件写入内容与读取文件非常相似。我们只需要改变两件事：访问模式和方法。我们需要使用*write()*方法而不是*read()*方法来写入文件。\n\
    \n这里我们使用`with`语句来操作，两种方式都可以。\n\n```\nwith open('myfile.txt', 'w') as file:\n \
    \   file.write(\"Welcome to Python-101\")\n```\n\n这里你可以看到，我们向`write`方法传递了一个字符串，该字符串将被写入我们的文件（*myfile.txt*）。此外，你也可以向`write`方法传递一个变量，而不是直接传递字符串。\n\
    \n到目前为止，一切似乎都很好。但有一个大问题。每次运行代码时，如果文件名相同，它都会覆盖文件。因此，在写入之前，你必须决定你想要什么。如果你每次都想覆盖，那就继续吧。但如果你不想丢失过去的数据，你应该使用追加访问模式，即‘**a**’。\n\
    \n```\nwith open('myfile.txt', 'a') as file:\n    file.write(\"Welcome to Python-101\"\
    )\n```\n\n现在，即使数据相同，它也会将作为参数传递的数据追加到文件中。如果文件名相同，每次迭代的数据都会被追加到文件中。\n\n## 接下来做什么？\n\
    \n哈哈，你做到了！在本书中，我们涵盖了Python编程的所有基础知识。希望你现在理解了这门语言的结构，以及*函数、循环、条件、序列*等的基本原理。现在你可以构建一些自己的程序，比如计算器、石头剪刀布游戏或其他简单的应用程序。\n\
    \n本书面向绝对初学者，因为它仅仅是**Python 101**系列的开始。在下一部分中，我们将更深入地学习Python，了解*模块、类、面向对象编程*等等。在本系列的后续部分，我们还将学习数据科学、机器学习和其他高级主题。\n\
    \n最后但同样重要的是一个小提醒，这本书是为你而写的，以便你能够以简单的方式学习Python的基础知识并尽可能多地获取价值。所以，如果你喜欢这本书，或者认为你从中学到了新的、有趣的东西，请在**Amazon**上写一篇简短的评论。这不会超过一分钟，而且完全免费。这将帮助我写出更多高质量的书籍，这对你也将是有益的。\n\
    \n*谢谢你...*"
