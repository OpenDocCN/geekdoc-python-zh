    \n```\n# Defining Function with Return Values\ndef sum(num1, num2):\n    return(num1\
    \ + num2)\n```\n\nHere we are returning the summation of *num1* & *num2* instead\
    \ of printing it.\n\n```\n# Calling Function - 1\nresult = sum(33, 16)\nprint(result)\n\
    \n# Calling Function - 2\nprint(sum(33, 16))\n\nOutput:\n>>> 49\n>>> 49\n```\n\
    \nAs the function returns the summation value, we can either store it into a variable\
