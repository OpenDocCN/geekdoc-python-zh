    >>> print(a <= b)\nFalse\n>>> \n```\n\n**比较运算符示例：**\n\n### 4.4 – 逻辑运算符\n\n*逻辑运算符*也用于*循环*或检查*条件*。在Python中，有三个逻辑*运算符*：**or**、**and**和**not**。\n\
    \n| 运算符 | 名称 | 描述 | 语法 |\n| :--- | :--- | :--- | :--- |\n| or | 逻辑或 | 如果至少一个操作数为True，则条件为True。\
