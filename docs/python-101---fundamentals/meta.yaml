  mdcn: "## 第十章\n\n## 异常处理\n\n程序中充满了错误和异常。我相信你肯定遇到过一些，如果没有，那说明你还不够努力！错误或异常是编程的日常组成部分。看看下面这段代码。\n\
    \n```python\nprint(10/0)\n```\n\n如果我们尝试运行这段代码，它会抛出一个 **ZeroDivisionError**。这是因为除以零是未定义的，我们的脚本不知道如何处理这种情况，所以它会崩溃。\n\
    让我们看另一个例子。\n\n```python\nname = \"Sam\"\nname = int(name)\n\n输出：\nTraceback (most\
    \ recent call last):\n  File \"c:\\...\\test.py\", line 2, in <module>\n    name\
    \ = int(name)\nValueError: invalid literal for int() with base 10: 'Sam'\n```\n\
    \n或者，当我们尝试将一个 *字符串* 类型转换为 *整数* 类型时，它会抛出一个 **ValueError**，脚本同样会崩溃。\n\n### 10.1\
    \ – Try-Except\n\n通过使用 try 和 except 代码块，我们可以轻松处理这类错误。try-except 的结构与 if-else 条件语句类似，但没有条件判断。我们将那些可能存在问题（如网络问题或其他类似情况）的代码写在\
    \ *try* 代码块中，而在 except 代码块中处理异常。\n\n```python\ntry:\n    name = \"Sam\"\n    name\
    \ = int(name)\nexcept ValueError:\n    print(\"Code block for Value-Error\")\n\
    ```\n\ntry 语句必须至少有一个 *except* 代码块。不过，它可以有多个 *except* 代码块。\n\n### 10.1.1 – Else\
    \ 语句\n\n我们也可以使用 *else* 语句。当代码没有错误时，它会被执行。\n\n```python\ntry:\n    name = \"Sam\"\
    \n    # name = int(name)\nexcept ValueError:\n    print(\"Code block for Value-Error\"\
    )\nelse:\n    print(\"All ok\")\n```\n\n首先它会执行 try 代码块中的代码。由于没有错误，它将执行 else 代码块。\n\
    \n### 10.1.2 – Finally 语句\n\n```python\ntry:\n    name = \"Sam\"\n    # name =\
    \ int(name)\nexcept ValueError:\n    print(\"Code block for Value-Error\")\nfinally:\n\
    \    print(\"It will execute always\")\n```\n\n*Finally* 语句与 *else* 语句类似。它们之间基本且唯一的区别是，*else*\
    \ 仅在代码没有错误时执行，而 *finally* 无论代码是否有错误都会执行。\n\n## 第十一章\n\n## 字符串操作\n\n尽管 *字符串* 只是简单的文本或字符序列，但我们可以对它们应用许多函数和操作。由于本书面向初学者，我们不会深入探讨高级内容，但了解如何正确处理字符串对你来说很重要。\n\
    \n### 11.1 – 字符串切片\n\n正如我们已经学到的，字符串是字符序列，也可以像列表或元组那样处理。这意味着我们可以使用索引来切片它们。\n\n\
    ```python\ntext = \"My name is Sam\"\n\nprint(text[:5])\n>>> My na\n\nprint(text[5:10])\n\
    >>> me is\n\nprint(text[10:])\n>>> Sam\n```\n\n我们也可以通过循环来访问字符串的字符。它会逐个打印每个字符。\n\
    \n```python\ntext = \"My name is Sam\"\n\nfor x in text:\n    print(x)\n```\n\n\
    ### 11.2 – 字符串连接\n\n字符串连接就是将两个或多个字符串连接成一个字符串的技术。有几种方法可以做到这一点。假设我们有两个字符串，想要将它们连接起来。\n\
    \n```python\nstr_1 = \"Hey guys\"\nstr_2 = \"Welcome to Python 101\"\n```\n\n\
    **逗号：** 我们可以简单地在两个字符串之间放一个逗号来连接它们。\n\n```python\nprint(str_1, str_2)\n\n>>> Hey\
    \ guys Welcome to Python 101\n```\n\n**+ 运算符：** + *运算符* 与 *逗号* 类似，但有一个小问题。\n\n\
    ```python\nprint(str_1 + str_2)\n\n>>> Hey guysWelcome to Python 101\n```\n\n\
    当我们使用 + *运算符* 连接两个字符串时，它会移除它们之间的空格。为了避免这个问题，我们需要在第一个字符串的末尾或第二个字符串的开头添加一个额外的空格。\n\
    \n**f-string：** *f-string* 是 Python 中最常用的字符串连接技术，也是我个人最喜欢的。使用 *f-string* 可以使代码更具可读性且易于理解。\n\
    \n```python\nprint(f\"{str_1} {str_2}\")\n\n>>> Hey guys Welcome to Python 101\n\
    ```\n\n我们使用关键字 **f**（在引号外）来定义 *f-string*（f\"\"）。然后在引号内，我们将字符串变量放在 *花括号* 中，以指定要连接字符串的位置。此外，我们也可以在引号内使用普通文本。\n\
    \n```python\nprint(f\"Hey guys {str_2}. Let's start Coding.\")\n\n>>> Hey guys\
    \ Welcome to Python 101. Let's start coding.\n```\n\n### 11.3 – 字符串格式化\n\n当我们有一段文本，并想在其中插入变量的值时，字符串格式化可以帮助我们实现这一点。\n\
    \n```python\nname, age = \"Sam\", 22\n\nprint(\"My name is %s and I'm %d years\
    \ old.\" % (name, age))\n\n>>> My name is Sam and I'm 22 years old.\n```\n\n如果你注意到了，这里我们在想要插入变量的地方使用了\
    \ **%s** 和 **%d**。这被称为占位符。不同的数据类型有不同的占位符。下表会更好地说明这一点。\n\n| 占位符 | 数据类型 |\n| :---\
    \ | :--- |\n| %c | 字符 |\n| %s | 字符串 |\n| %d 或 %i | 整数 |\n| %f | 浮点数 |\n| %e |\
    \ 科学计数法 |\n\n如果你像我一样懒，不想指定数据类型，那么你可以使用 *format()* 函数。只需在想要放置变量的地方使用花括号，并将所有变量作为\
    \ format() 函数的参数传递即可。\n\n```python\nname, age = \"Sam\", 22\n\nprint(\"My name\
    \ is {} and I'm {} years old.\".format(name, age))\n\n>>> My name is Sam and I'm\
    \ 22 years old.\n```\n\n### 11.4 – 转义字符\n\n在字符串中，我们使用许多转义字符来正确管理字符串。实际上，它们是不可打印的字符，比如制表符、换行符、退格符等。它们都由反斜杠\
    \ (\\) 引导，这就是为什么我们在文件路径中使用双反斜杠（第十二章）。\n\n下表总结了最重要的转义字符。如果你想了解更多转义字符，可以在网上搜索。但目前你可能用不到它们。\n\
    \n| 转义字符 | 描述 |\n| :--- | :--- |\n| \\b | 退格 |\n| \\n | 换行 |\n| \\t | 制表符 |\n\n\
    ```python\nprint(\"My name is\\b Sam\")\n>>> My name i Sam\n\nprint(\"My name\
    \ is\\n Sam\")\n>>> My name is\n    Sam\n\nprint(\"My name is\\t Sam\")\n>>> My\
    \ name is    Sam\n```\n\n### 11.5 – 字符串函数\n\nPython 中有很多字符串函数，在本书中讨论所有函数是不必要且浪费时间的。如果你想概览一下，可以上网查找。\n\
    \n然而，在本章中，我们将重点介绍这些函数中最基础、最有趣和最重要的部分，也就是你在不久的将来可能需要用到的那些。\n\n#### 11.5.1 – 大小写操作\n\
    \nPython 中有五个不同的大小写操作字符串函数。让我们来看看它们。\n\n| 函数 | 描述 |\n|---|---|\n| string.upper()\
    \ | 将所有字符转换为大写 |\n| string.lower() | 将所有字符转换为小写 |\n| string.title() | 将所有字符转换为标题大小写\
    \ |\n| string.capitalize() | 将首字母转换为大写 |\n| string.swapcase() | 交换所有字母的大小写 |\n\
    \n#### 11.5.2 – Count 函数\n\n假设你有一个字符串，想知道某个特定字母或单词在该字符串中出现了多少次。*count* 函数允许我们这样做。\n\
    \n```python\nstr = \"Hey you, listen to me; you are not allowed to go there\"\n\
    \nprint(str.count(\"you\"))\n>>> 2\n\nprint(str.count(\"e\"))\n>>> 7\n```\n\n\
    #### 11.5.3 – Find 函数\n\n这个函数与 count 函数有些相似。它返回字符串中某个单词或字母首次出现的索引。\n\n```python\n\
    str = \"Hey you, listen to me; you are not allowed to go there\"\n\nprint(str.find(\"\
    you\"))\n>>> 4\n```\n\n#### 11.5.4 – Replace 函数\n\nReplace 函数允许我们用另一个字符串替换字符串的特定部分。在下面的例子中，我们将名字\
    \ *Sam* 替换为 *Jack*。\n\n```python\ntext = \"My name is Sam\"\ntext = text.replace(\"\
    Sam\", \"Jack\")\nprint(text)\n\n>>> My name is Jack\n```\n\n#### 11.5.5 – Join\
    \ 函数\n\n通过 join 函数，我们可以将一个序列连接成一个字符串，并用这个特定的字符串分隔每个元素。\n\n```python\nnames = [\"\
    B\", \"Sam\"]\nseparator = \"-\"\nprint(separator.join(names))\n\n>>> B-Sam\n\
    ```"
