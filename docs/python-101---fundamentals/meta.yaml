  md: '# # INTRODUCTION


    This book is the first part of a series that is called the **Python 101**. In
    this series, we are going to focus on learning the Python Programming Language
    in an effective and easy way. The goal is to learn it smartly, practically and
    fast without needing to read thousands of pages. We will keep it simple and precise.
    In this first book, we will introduce you to the language and learn the basics.


    This book is for complete beginners and no *Programming*, *IT* or *Math* skills
    are required to understand it. At the end, you will be able to write various simple
    and interesting programs and you will have the necessary basis to continue with
    volume two.'
