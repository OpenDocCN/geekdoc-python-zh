    ## Our First Program


    Every Programming Language has some of its own syntax. Like other Python also
    has its own syntax. But don’t worry, Python syntax is as simple as normal English
    Language. We are going to start our coding journey with a very simple program.


    ### 2.1 - Hello World!


    It is a tradition in programming to start with a Hello World application, when
    you are learning a new language. So, we are going to do that in this chapter.
    A Hello World application is just a script that gives the text “Hello World!”
    as output onto the screen. In Python this is very easy task.


    ```python

    print("Hello World!")

    ```


    As you can see, here we are using just a single line of code to print a text onto
    the screen. In other languages, we would have to define a basic structure with
    functions, classes and more, just to print one text.


    Let’s see what is happening here. The first thing we can notice is a so-called
    *function* with the name of *print*. The function *print* is used to print a certain
    text onto the screen. We should put the text between the parentheses which we
    want to print.


    But there is a very important thing you have to keep in mind. The text we want
    to print that should be a string. String is a Datatype of Python. Don’t think
    enough about it we’ll learn it briefly later in this book, just remember that
    whatever text we use in Python Programming that is a string. And we denote a string
    with the quotation mark. If we don’t use the quotation mark the Python Interpreter
    will think that *Hello World!* is a Variable name not a text and also give an
    *Error Message* as the Variable name is not defined.


    Again, don’t think more about Variable, because we’ll learn more about it in the
    next chapter.


    ### 2.1 – Running the Program


    Now, time to run the script we just wrote. To do this you need to save the script
    into a Python file first.


    - Go to **File** > **Save** or press **Ctrl** + **S** in order to save the script.


    ![](img/a4414073418da267c942506f4985f9aa_12_0.png)


    - Then click on **Run** > **Run Module** or press **F5** to run the script.


    *Running Python Program in IDLE*


    Then an Output window will appear and show the output.


    ![](img/a4414073418da267c942506f4985f9aa_12_1.png)


    *Output of Hello World! Program*


    And now, say congratulations to yourself, as you successfully run your *First
    Program*.


    ## CHAPTER – 3


    ## Data Types, Variables & Comments


    ### 3.1 – What is Data Types?


    Data types are the classification or categorization of data. It represents the
    kind of value that tells what operations can be performed on a particular data.
    In Python Programming data types are actually classes and variables are instances
    or objects of that particular class.


    ### 3.2 – Types of Data Types


    There are different types of data type in Python Programming. Here we’ll learn
    all about them.


    #### 3.2.1 – Strings


    A *String* is nothing but a sequence of character or a text. You should remember
    we print a string in our first program. In Python Programming whatever text or
    character, we write inside of quotation mark (“” or ‘’) is called *String*. If
    a text isn’t surrounded by quotation mark, then Python Interpreter will never
    realize the text as *String*. The keyword of String is **str**.


    #### 3.2.2 – Integers


    Integers are also called Numerical Data Types. An *Integer* is just a regular
    whole number, which we can use for basic calculations. The keyword of Integer
    is **int**.


    **Example:** 1, 54, 69, 23, 0, 32, 1947 etc.


    #### 3.2.3 – Floats


    Floats are same as Integers. These are Numerical Data Types too. But in *Integer*
    we can’t use decimal places, and the *Floats* are allowed us to use decimal places.
    Because it is a floating-point number. The keyword of *Float* is **float**.


    **Example:** 32.42, 5.01, 0.122 etc.


    #### 3.2.4 – Booleans


    Boolean is basically a binary data type, which contains only two values, namely
    *True* or *False*. We will use it a lot when we get into the Conditions or Loops.
    The Keyword of Boolean data type is **bool**.


    #### 3.2.5 – Sequences


    We will learn about Sequences in a later chapter. But since *Sequences* are also
    data types, we should at least mention them here.


    | Data Types | Keyword | Description |

    | :--- | :--- | :--- |

    | List | list | Collection of values |

    | Tuple | tuple | Immutable List |

    | Dictionary | dict | List of key-value pairs |


    ### 3.3 – What is Variable


    A Variable is nothing but a container, which contain some values. Every variable
    has a specific data type. But the good thing of python programming is we don’t
    need to declare variable or their data type before using. A variable is created
    at that moment whenever we assign a value to it. Because Python is not “Statically
    Typed”.


    ### 3.4 – Creating Variable


    Creating variable in Python is very simple. You just choose a suitable name and
    assign a value to it with the help of *Assignment Operator* (=). For example


    ```python

    myString = "Hello World!"

    myInteger = 35

    myFloat = 65.03

    ```


    Here we defined three variables. First one is a *String* type, second one is an
    *Integer* type & the last one is a *Float* type. Basically, you choose whatever
    name you want for variable, but there are some limitations. You are not allowed
    to use any reserved Keywords like, *str*, *int*, *dict*, *if*, *for*, *while*
    etc. Also, variable name can''t be start with integers or special characters other
    than underscore (_).


    ### 3.5 – Using Variable


    ```python

    myString = "Hello World!"

    myInteger = 35

    myFloat = 65.03


    print(myString)

    print(myInteger)

    print(myFloat)

    ```


    Now we can start using our variables that we have defined before. For example,
    we are just printing our variables onto the screen. But you can use your variables
    anywhere & any purpose inside the script.


    Here you can see we are not using quotation mark, for this the text inside parenthesis
    is treated as variable name. And Python Interpreter is printing the value of variables
    not the actual text written inside the parenthesis. The output of above code is
    given below.


    ```

    Hello World!

    35

    65.03

    ```


    ### 3.6 – Typecasting


    Sometime we will get values in such a data type that we can’t work with properly.
    For this we convert those values into our desired data type, and this process
    is called *Typecasting*.


    For example, we might get a string as an input but the string number as its value.
    In this case “11” is not equal to 11. We can’t do calculation with string, even
    though the string represents a number. For this reason, we need to typecast.


    Syntax:


    ```python

    <required_datatype>(expression)

    ```


    Example:


    ```python

    value = "11"

    number = int(value)

    ```


    Typecasting done by using specific data type function. In this case we are converting
    a *String* to an *Integer*. So, we need to use **int()** Function. You can also
    reverse this process using **str()** Function. In Python it is very important
    thing, we will use this quite often during coding.


    ### 3.7 – Comments


    Comments in Python are nothing but one or more lines of text in the code, which
    are ignored by the interpreter during executing the script. It helps us to take
    short note about a code block and enhance readability of code. There are three
    types of comments in Python Programming.


    **Single Line Comments:** If we put a Hash Symbol (#) at the beginning of any
    line in script the interpreter considers that line as a single line comment.


    ```python

    # This is a Single Line Comment

    print("Python 101")

    ```


    We can also add single line comment after any statement. Like,


    ```python

    # This is a Single Line Comment

    print("Python 101")    # We can add comment here also

    ```


    **Multi-line Comment:** Python doesn''t offer a separate way to write multiline
    comments. However, there are other ways to get around this issue. We can use Hash
    Symbol (#) at the beginning of each line of comment on multiple lines.


    ```python

    # This is a

    # Multi-line

    # Comment

    print("Python 101")

    ```'
