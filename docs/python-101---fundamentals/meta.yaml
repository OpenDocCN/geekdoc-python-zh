    # 11.2 – String Concatenation


    String Concatenation is nothing but a technique to join two or more strings into
    one string. There several ways to do this. Suppose we have two strings & we want
    to join them.


    ```

    str_1 = "Hey guys"

    str_2 = "Welcome to Python 101"

    ```


    **Comma:** We can simply put a comma between two string to join them.


    ```

    print(str_1, str_2)


    >>> Hey guys Welcome to Python 101

    ```


    **+ Operator:** + *Operator* is same as *comma*, but there is a little problem.


    ```

    print(str_1 + str_2)


    >>> Hey guysWelcome to Python 101

    ```


    When we join two strings with + *Operator*, it will remove space between them.
    To avoid this problem, we need to put an extra space at the end of first string
    or at the beginning of second string.


    **f-string:** *f-string* is mostly used string concatenation technique in python.
    Also, it’s my personal favourite. By using *f-string* code become readable & easy
    to understand.


    ```

    print(f"{str_1} {str_2}")


    >>> Hey guys Welcome to Python 101

    ```'
