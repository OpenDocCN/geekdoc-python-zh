  md: '# CHAPTER – 12


    # File Handling


    This is the last chapter of this book & in this chapter we will learn how to read
    or write data from external files. You can ask a question, why are we doing this?
    The answer is Let see.


    # 12.1 – Opening & Closing Files


    If we want to drink water, we need to open the bottle first, right. Like that
    it need to open file stream first in order to access data of the particular file.


    Suppose we have a text file called ‘myfile.txt’ and it has some data. Here we
    will work with that file.


    ```

    Myfile.txt:


    This book is the first part of a series that is called the Python 101. In this
    series, we are going to focus on learning the Python Programming Language in an
    effective and easy way.

    ```


    Opening File:


    ```

    file = open(''myfile.txt'', ''r'')

    ```


    Here you can see we are simply using open() function to open the file stream.
    As a parameter we need to define the file name and the access mode (we will talk
    about that in a second). The function returns the stream and we can save it into
    our variable & apply different operations on it.'
  merge: -1
  pgno: 64
- img_proc: true
  md: '# 12.1.1 – Access Modes


    Whenever we open a file in Python, we use a certain access mode. The access mode
    defines for which purpose we are opening the file, like reading or writing. There
    are various access modes in python. Following table will be summarize it batter.


    | Access Mode | Description |

    |---|---|

    | r | Reading Files |

    | r+ | Reading & Writing |

    | rb | Reading Binary Files |

    | rb+ | Reading & Writing Binary Files |

    | w | Writing into Files |

    | w+ | Reading & Writing |

    | wb | Writing into Binary Files |

    | wb+ | Reading & Writing Binary Files |

    | a | Appending Files |

    | a+ | Reading & Appending |

    | ab | Appending Binary Files |

    | ab+ | Reading & Appending Binary Files |


    Hope you got the idea of access modes. Now time to close the file. When we all
    done with our file, we need to close the file, otherwise it may through some unwanted
    errors. To this simply we will use the *close()* function.


    ```

    file = open(''myfile.txt'', ''r'')


    # All Necessary Codes


    file.close()

    ```


    # 12.2 – With Statement


    Alternatively, we can open and close streams more effectively by using with'
  merge: -1
  pgno: 65
- img_proc: true
  md: "statements. A with statement opens a stream, executes the indented code and\
    \ closes the stream afterwards.\n\n```\nwith open('myfile.txt', 'r') as file:\n\
    \    # All Necessary Codes\n```\n\nIf you are lazy like me with statement can\
    \ help you. Because we don’t need to close the file stream, it will do it itself.\
    \ Also, using with statement shorten the code and make it more readable.\n\n#\
    \ 12.3 – Reading from Files\n\nOnce we open the file stream in read mode, we can\
    \ start reading data from the stream. To do this we need to simply use *read()*\
    \ method.\n\n```\n# Reading in Ordinary Way\nfile = open('myfile.txt', 'r')\n\
    print(file.read())\nfile.close()\n\n# Reading using with Statement\nwith open('myfile.txt',\
    \ 'r') as file:\n    print(file.read())\n```\n\nHere we are opening file in read\
    \ mode and print all data of the file using read method.\n\nWhat if we don’t need\
    \ the whole data, we need first 50 or 100 characters of file? We can achieve this\
    \ by passing a parameter to the read method.\n\n```\nwith open('myfile.txt', 'r')\
    \ as file:\n```"
  merge: -1
  pgno: 66
- img_proc: true
  md: "```\nprint(file.read(50))\n```\n\nThis code will print first 50 characters\
    \ of file.\n\n# 12.3 – Writing into Files\n\nWriting something into a file is\
    \ almost similar to reading file. Just we need to change two thing, access mode\
    \ & method. We need to use *write()* method instead of *read()* method in order\
    \ to write into a file.\n\nHere we are doing this using with statement, you can\
    \ do both.\n\n```\nwith open('myfile.txt', 'w') as file:\n    file.write(\"Welcome\
    \ to Python-101\")\n```\n\nHere you can see we are passing a string to the write\
    \ method & that string will be written into our file (*myfile.txt*). Also, you\
    \ can pass a variable to the write method instead of passing string directly.\n\
    \nTill now everything seems alright. But there is a huge problem. Every time you\
    \ run the code it will override the file if the file name is same. So before writing\
    \ you have to decide what you want. If you want to override every time then go\
    \ for it. But if you don’t want to loss past data then you should use append access\
    \ mode which id ‘**a**’.\n\n```\nwith open('myfile.txt', 'a') as file:\n    file.write(\"\
    Welcome to Python-101\")\n```\n\nNow it appends the file with data passed as argument,\
    \ even though the data is same. For every iteration data will be appended into\
    \ the file if the file name is same."
  merge: -1
