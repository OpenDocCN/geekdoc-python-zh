    \ 39. So, what will happen?\nOur first condition will be False, because 39 is\
    \ not less than 20. So, Interpreter will forget **if block** and will go forward\
    \ to check next conditions. When a condition returns True, interpreter will execute\
    \ that particular code block only. In this case next **elif block** will be executed.\
    \ Because 39 if greater than 30. If no conditions return True the interpreter\
    \ will execute **else block** only.\n\n```\nOutput:\nEnter a Number: 39\nNumber\
    \ is greater than 30.\n```\n\nRemember, you can use unlimited **elif** conditions,\
    \ but cannot use **if** or **else** more than one in an **if-else** ladder. The\
    \ whole set of **if-else** condition is also called **if-else** ladder.\nAnd of\
    \ course, you don’t need an **elif** or **else** block. You can just write an\
    \ **if** statement and if the condition is not met, it skips the code and continues\
    \ with the rest of the script."
