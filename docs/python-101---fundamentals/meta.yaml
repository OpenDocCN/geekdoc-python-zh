  md: '# CHAPTER – 2


    # Our First Program


    # 2 - Our First Program


    Every Programming Language has some of its own syntax. Likes other Python also
    has its own syntax. But don’t worry, Python syntax is as simple as normal English
    Language. We are going to start our coding journey with a very simple program.


    # 2.1 - Hello World!


    It is a tradition in programming to start with a Hello World application, when
    you are learning a new language. So, we are going to do that in this chapter.
    A Hello World application is just a script that gives the text “Hello World!”
    as output onto the screen. In Python this is very easy task.


    ```

    print("Hello World!")

    ```


    As you can see, here we are using just a single line of code to print a text onto
    the screen. In other languages, we would have to define a basic structure with
    functions, classes and more, just to print one text.

    Let’s see what is happening here. The first thing we can notice is a so-called
    *function* with the name of *print*. The function *print* is used to print a certain
    text onto the screen. We should put the text between the parentheses which we
    want to print.

    But there is a very important thing you have to keep in mind. The text we want
    to print that should be a string. String is a Datatype of Python. Don’t thing
    enough about it we’ll learn it briefly later in this book, just remember that
    whatever text we use in Python Programming that is a string. And we denote a string
    with the quotation mark. If we don’t use the quotation mark the Python Interpreter
    will think that *Hello World!* is a Variable name not a text and also give an
    *Error Message* as the Variable name is not defined.

    Again, don’t think more about Variable, because we’ll learn more about it in the
    next chapter.'
