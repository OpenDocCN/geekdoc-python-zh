  md: '# 11.5 – String Functions


    There are a lot of string functions in Python and it would be unnecessary and
    time wasting to talk about all of them in this book. If you want an overview,
    just go online and look for them.


    In this chapter however, we will focus on the most essential, most interesting
    and most important of these functions. The ones that you might need in the near
    future.


    # 11.5.1 – Case Manipulating


    We have five different case manipulating string functions in Python. Let’s have
    a look at them.


    | Function | Description |

    |---|---|

    | string.upper() | Convert all character to upper case |

    | string.lower() | Convert all character to lower case |

    | string.title() | Convert all character to title case |

    | string.capitalize() | Convert first letter to upper case |

    | string.swapcase() | Swap the case of all letters |


    # 11.5.2 – Count Function


    Suppose you have a string and you want to know a specific letter or word how many
    times occurs in that string. In this *count* function allows us to do this.


    ```

    str = "Hey you, listen to me; you are not allowed to go there"


    print(str.count("you"))

    >>> 2


    print(str.count("e"))

    >>> 7

    ```'
  merge: -1
  pgno: 61
- img_proc: true
  md: '# 11.5.3 – Find Function


    This function is little similar to count function. It returns index of first occurrence
    of any word or letter in a string.


    ```

    str = "Hey you, listen to me; you are not allowed to go there"


    print(str.find("you"))

    >>> 4

    ```


    # 11.5.4 – Replace Function


    Replace function allows us to replace a specific part of a string by other string.
    In the following example we are replacing name *Sam* by the name *jack*.


    ```

    text = "My name is Sam"

    text = text.replace("Sam", "Jack")

    print(text)


    >>> My name is Jack

    ```


    # 11.5.5 – Join Function


    With the join function we can join a sequence to a string and separate each element
    by this particular string.


    ```

    names = ["B", "Sam"]

    separator = "-"

    print(separator.join(names))


    >>> B-Sam

    ```'
  merge: -1
  pgno: 62
- img_proc: true
  md: '# 11.5.6 – Split Function


    If we want to split a string by a specific character, then split function helps
    us to do this. And interesting thing is it returns a list of those parts of string.


    ```

    name = "Sam,Jack,Axle,Mickel"

    name_list = name.split(",")

    print(name_list)


    >>> [''Sam'', ''Jack'', ''Axle'', '' Mickel'']

    ```'
