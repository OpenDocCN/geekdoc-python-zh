  md: "# CHAPTER – 11\n\n# String Manipulation\n\nEven though *string* is just a simple\
    \ text or sequence of characters, we can apply a lot of functions and operations\
    \ on them. Since this book is for beginner, we will not dive into advanced level,\
    \ but it’s important to you to know how to deal with a string properly.\n\n# 11.1\
    \ – String Slicing\n\nAs we already learned, strings are sequence of characters\
    \ and they can also treat like that. Means we can slice them by using indices\
    \ like list or tuple.\n\n```\ntext = \"My name is Sam\"\n\nprint(text[:5])\n>>>\
    \ My na\n\nprint(text[5:10])\n>>> me is\n\nprint(text[10:])\n>>> Sam\n```\n\n\
    We can also access characters of a string by using loop. It will print every individual\
    \ character one after another.\n\n```\ntext = \"My name is Sam\"\n\nfor x in text:\n\
    \    print(x)\n```"
