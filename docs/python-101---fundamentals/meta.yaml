- md: "## CHAPTER – 10\n\n## Exception Handling\n\nA program is full of errors & exceptions.\
    \ I’m sure you have come across some, if not you haven’t been trying hard enough!\
    \ Errors or exceptions are an everyday part of programming. Take a look at this\
    \ piece of code here.\n\n```python\nprint(10/0)\n```\n\nThis piece of code will\
    \ through a **ZeroDivisionError**, if we want to run it. That’s because a division\
    \ by zero is not defined and our script doesn’t know how to handle it. So, it\
    \ crashes.\nLet’s look at another example.\n\n```python\nname = \"Sam\"\nname\
    \ = int(name)\n\nOutput:\nTraceback (most recent call last):\n  File \"c:\\...\\\
    test.py\", line 2, in <module>\n    name = int(name)\nValueError: invalid literal\
    \ for int() with base 10: 'Sam'\n```\n\nAlternatively, when we try to typecast\
    \ a *string* into *integer* it will through a **ValueError** and script will crush\
    \ again.\n\n### 10.1 – Try-Except\n\nBy using try & except block we can easily\
    \ handle these types of errors. The structure of try-except is as same as if-else\
    \ condition. But there is no condition. We write those code which have some confusions\
    \ or network issue or something like this inside the *try* block. And in except\
    \ block we write exceptions.\n\n```python\ntry:\n    name = \"Sam\"\n    name\
    \ = int(name)\nexcept ValueError:\n    print(\"Code block for Value-Error\")\n\
    ```\n\nThe statement must have at least one *except* block. It may have more than\
    \ one *except* block though.\n\n### 10.1.1 – Else Statement\n\nWe can also use\
    \ *else* statement. It will be executed when our code has no error.\n\n```python\n\
    try:\n    name = \"Sam\"\n    # name = int(name)\nexcept ValueError:\n    print(\"\
    Code block for Value-Error\")\nelse:\n    print(\"All ok\")\n```\n\nAt first it\
    \ will execute try block’s code. Since there is no error, it will execute else\
    \ block.\n\n### 10.1.2 – Finally Statement\n\n```python\ntry:\n    name = \"Sam\"\
    \n    # name = int(name)\nexcept ValueError:\n    print(\"Code block for Value-Error\"\
    )\nfinally:\n    print(\"It will execute always\")\n```\n\n*Finally* statement\
    \ is same as *else* statement. The basic & only difference between them is *else*\
    \ executes only if the code has no error, but *finally* executes every time, no\
    \ matter if code has error or not.\n\n## CHAPTER – 11\n\n## String Manipulation\n\
    \nEven though *string* is just a simple text or sequence of characters, we can\
    \ apply a lot of functions and operations on them. Since this book is for beginner,\
    \ we will not dive into advanced level, but it’s important to you to know how\
    \ to deal with a string properly.\n\n### 11.1 – String Slicing\n\nAs we already\
    \ learned, strings are sequence of characters and they can also treat like that.\
    \ Means we can slice them by using indices like list or tuple.\n\n```python\n\
    text = \"My name is Sam\"\n\nprint(text[:5])\n>>> My na\n\nprint(text[5:10])\n\
    >>> me is\n\nprint(text[10:])\n>>> Sam\n```\n\nWe can also access characters of\
    \ a string by using loop. It will print every individual character one after another.\n\
    \n```python\ntext = \"My name is Sam\"\n\nfor x in text:\n    print(x)\n```\n\n\
    ### 11.2 – String Concatenation\n\nString Concatenation is nothing but a technique\
    \ to join two or more strings into one string. There several ways to do this.\
    \ Suppose we have two strings & we want to join them.\n\n```python\nstr_1 = \"\
    Hey guys\"\nstr_2 = \"Welcome to Python 101\"\n```\n\n**Comma:** We can simply\
    \ put a comma between two string to join them.\n\n```python\nprint(str_1, str_2)\n\
    \n>>> Hey guys Welcome to Python 101\n```\n\n**+ Operator:** + *Operator* is same\
    \ as *comma*, but there is a little problem.\n\n```python\nprint(str_1 + str_2)\n\
    \n>>> Hey guysWelcome to Python 101\n```\n\nWhen we join two strings with + *Operator*,\
    \ it will remove space between them. To avoid this problem, we need to put an\
    \ extra space at the end of first string or at the beginning of second string.\n\
    \n**f-string:** *f-string* is mostly used string concatenation technique in python.\
    \ Also, it’s my personal favourite. By using *f-string* code become readable &\
    \ easy to understand.\n\n```python\nprint(f\"{str_1} {str_2}\")\n\n>>> Hey guys\
    \ Welcome to Python 101\n```\n\nWe define *f-string* with keyword **f** out-side\
    \ of quotation mark ( f\"\" ). Then inside the quotation mark we put a string\
    \ variable between *curly brackets*, where we want to join the string. Also, we\
    \ can use normal text in-side of the quotation mark.\n\n```python\nprint(f\"Hey\
    \ guys {str_2}. Let's start Coding.\")\n\n>>> Hey guys Welcome to Python 101.\
    \ Let's start coding.\n```\n\n### 11.3 – String Formatting\n\nWhen we have a text\
    \ & we want to insert value of variables in between the text then string formatting\
    \ helps us to achieve that.\n\n```python\nname, age = \"Sam\", 22\n\nprint(\"\
    My name is %s and I'm %d years old.\" % (name, age))\n\n>>> My name is Sam and\
    \ I'm 22 years old.\n```\n\nIf you noticed, here we used **%s** and **%d** where\
    \ we want to insert our variables. It’s called placeholder. There are different\
    \ types of placeholders for different data types. The following table will teach\
    \ you better.\n\n| Placeholder | Data Type |\n| :--- | :--- |\n| %c | Character\
    \ |\n| %s | String |\n| %d or %i | Integer |\n| %f | Float |\n| %e | Exponential\
    \ Notation |\n\nIf you are lazy like me and don’t want to specify data types then\
