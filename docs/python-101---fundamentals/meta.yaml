    **Multi-line Comment:** Python doesn''t offer a separate way to write multiline
    comments. However, there are other ways to get around this issue. We can use Hash
    Symbol (#) at the beginning of each line of comment on multiple lines.


    ```

    # This is a

    # Multi-line

    # Comment

    print("Python 101")

    ```'
