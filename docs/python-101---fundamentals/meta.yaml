    Sam

    ```


    Let’s have a look at another example,'
  - '[PAGE 25]


    ```

    # Taking two numbers from user

    number1 = input("Enter Number-1: ")

    number2 = input("Enter Number-2: ")


    # Adding number1 & number2 and storing into ''sum''

    sum = number1 + number2


    # Printing Result

    print("Result is: ", sum)

    ```


    Here we are taking two numbers from user then adding them & printing the result.
    But if you run this script, you will get a wired output. You will see the numbers
    you are entering are not adding, they just appending one to another. So why is
    this happening?


    The problem is that the function *input()* returns only *string*. Means when you
    enter 15 & 43, it stores into variables as “15” & “43”, which are *string*.


    So, what happen when we add two strings? We just append one to other. This means
    that the sum of “15” & “43” would be “1543” not 58.


    To overcome this problem, means if you want to do any mathematical operation with
    input data, you need to typecast the variables into **int** or **float** first.


    ```

    # Typecasting variables

    number1 = int(number1)

    number2 = int(number2)

    ```


    You need to add these two lines of code before adding number1 & number2. Now if
    you enter 15 & 43 you will get 58 as output.


    ```

    Output:


    Enter Number-1: 15

    ```'
- md: "## CHAPTER – 6\n\n## Conditional Statements\n\nDecision-making is as important\
    \ in Programming as it in our real life. Conditional Statements in Python perform\
    \ different computations depending on whether a condition evaluates to *True*\
    \ or *False*. These conditions are handled by if-else statement in Python.\n\n\
    ## 6.1 – If-Elif-Else Conditions\n\nBasically, a condition needs to be *True*,\
    \ so that our script continues with the code written in its block. The three important\
    \ keyword here are **if**, **elif** and **else**.\n\n**Syntax:**\n\n```\nif Condition:\n\
    \    <Statement>\n\nelif Condition:\n    <Statement>\n\nelse:\n    <Statement>\n\
    ```\n\n**Example:**\n\n```\nnumber = input(\"Enter a Number: \")\nnumber = int(number)\n\
    \nif number < 20:\n    print(\"Number is less than 20.\")\n\nelif number > 30:\n\
    \    print(\"Number is greater than 30.\")\n\nelse:\n    print(\"The Number is\
    \ in 20 - 30\")\n```\n\nHere you can see, we are taking ‘number’ input from user\
    \ and typecasting the number into integer. Then our first *if-statement* check\
    \ whether given number is less than 20 or not. Remember that the comparison (number\
    \ < 20) always returns True or False. So, if the condition returns True then only\
    \ the **if block** of code will be executed. Interpreter will never check rest\
    \ of the conditions.\n\n```\nOutput:\nEnter a Number: 1\nNumber is less than 20.\n\
    ```\n\nNow suppose, given number is 39. So, what will happen?\nOur first condition\
    \ will be False, because 39 is not less than 20. So, Interpreter will forget **if\
    \ block** and will go forward to check next conditions. When a condition returns\
    \ True, interpreter will execute that particular code block only. In this case\
    \ next **elif block** will be executed. Because 39 is greater than 30. If no conditions\
    \ return True the interpreter will execute **else block** only.\n\n```\nOutput:\n\
    Enter a Number: 39\nNumber is greater than 30.\n```\n\nRemember, you can use unlimited\
    \ **elif** conditions, but cannot use **if** or **else** more than one in an **if-else**\
    \ ladder. The whole set of **if-else** condition is also called **if-else** ladder.\n\
    And of course, you don’t need an **elif** or **else** block. You can just write\
    \ an **if** statement and if the condition is not met, it skips the code and continues\
    \ with the rest of the script.\n\n## 6.2 – Flowchart\n\nIn this flowchart you\
    \ can see how these basic if, elif and else trees work.\n\n## 6.3 – Nested If-Else\
    \ Statements\n\nYou can also put **if-blocks** into **if-blocks**. These are called\
    \ nested **if-statements**.\n\n```python\nnumber = input(\"Enter a Number: \"\
    )\nnumber = int(number)\n\nif number % 2 == 0:\n    if number == 0:\n        print(\"\
    Your number is even but zero\")\n    else:\n        print(\"Your number is even\"\
    )\nelse:\n    print(\"Your number is odd\")\n```\n\nSo, here we have the first\
    \ condition, which checks if the number is even. When it’s even it then checks\
    \ if it’s a zero or not. That’s a trivial example but you get the concept.\n\n\
    ## CHAPTER – 7\n\n## Loops\n\nIn general, statements are executed sequentially;\
    \ The first statement is executed first, followed by the second, and so on. There\
    \ may be a situation when you need to execute a block of code several number of\
    \ times.\nA loop statement allows us to execute a statement or group of statements\
    \ multiple times.\n\n## 7.1 – While Loop\n\nThere are two types of loops in Python\
    \ Programming, While Loop & For Loop. A While Loop executes the code block only\
    \ when *while* condition is met. The following diagram illustrates a *while loop*\
    \ statement:\n\nHere you can see, it goes in circles until the *while* condition\
    \ returns *false*.\nLet’s understand the concept with an example.\nSuppose we\
    \ need to print numbers from 1 to 10. So, you can easily use print() statement\
    \ 10 times. But *while* loop allows us to do this task very easy way.\n\nLet’s\
    \ have a look at the code,\n\n```\nnumber = 1\n\nwhile number <= 10:\n    print(number)\n\
    \    number += 1\n```\n\nWe define a while loop with the keyword *while*. Then\
    \ we write our condition, like if-else condition and again code block is indented\
    \ after colon ‘:’. As you know we are trying to print 1 to 10 in this example.\
    \ So, first we initialized variable (number) with the value of 1. In every iteration,\
    \ we are printing value of *number* and incrementing it with 1. This iteration\
    \ will be done as long as the number is less than or equal to 10.\n\n### 7.1.1\
    \ – Infinite Loop\n\nIn this section we’ll learn about **Infinite Loop** or **Endless\
    \ Loop** using while loop. This might seem less useful, but there are some applications\
    \ of it.\n\n```\nwhile True:\n    print(\"This will run forever\")\n```\n\nWe\
    \ define an *Endless Loop* with the condition **True** since the condition is\
    \ always **True** the loop will never break. The above loop will run & execute\
    \ the print statement forever, unless you terminate the script.\n\n**Warning:**\
    \ *This might overload your computer, if you are using a low-end system.*\n\n\
    ## 7.2 – For Loop\n\nIn python programming **For Loop** works on a different way.\
    \ Usually, we use For Loop to iterate all or some of items of any **Sequence**\
    \ which we’ll learn in next chapter, we won’t get deep into it here.\nFor now,\
    \ we won’t care about syntax of *Sequence*. Just notice we have a variable called\
    \ **numberList** which is a list of 5 numbers.\n\n```\nnumberList = [2, 4, 5,\
    \ 9, 1]\n\nfor number in numberList:\n    print(number)\n```\n\nHere we have stored\
    \ a list of 5 numbers in variable **numberList**. Then we use **for** keyword\
    \ to define Loop and also define a control variable **number**. For every iteration\
    \ it will assign the value of next item of list. Here for every iteration the\
    \ **number** will assign every item of **numberList** one by one. After that we\
    \ can use the **number** for any purpose. For example, we are just printing all\
    \ the numbers one by one.\n\nThe following flowchart will illustrate a **For Loop**\
    \ statement:\n\n### 7.2.1 – Range Function\n\nRange is an inbuilt function of\
    \ Python. Again, don’t worry about what function is, because we’ll learn it later\
    \ chapter in this book. Just remember that when we pass a number to the **Range\
    \ Function** it returns a list of number from 0 to that number. And we can use\
    \ that list in for loop. Like,\n\n```\nfor i in range(10):\n    print(i)\n```\n\
    \nWhen we run this code, it will print 0 to 9. Because range function starts from\
    \ 0 and ends on n<sup>th</sup> number what we’ll pass to it. Here the 10<sup>th</sup>\
    \ number is 9. So, it will print 0 to 9.\n\nBut what if we want to start with\
    \ a non-zero number? Then we have to pass two arguments to the range function.\n\
    \nSuppose, we need a list of numbers from 20 to 30. So, we have to pass these\
    \ two arguments to the function. Like,\n\n```\nfor i in range(20, 30):\n    print(i)\n\
    ```\n\nAgain, this loop will print numbers from 20 to 29. If you want to print\
    \ 30 also, you need to pass 31. Do it yourself with different arguments, so that\
    \ you can understand it better.\n\n## 7.3 – Loop Control Statements\n\nIn order\
    \ to manage loops, there are some so-called Control Statements in Python. They\
    \ allow us to manipulate the flow of a loop at a specific point.\n\n### 7.3.1\
    \ – Continue Statement\n\nContinue Statement allow us to skip a specific iteration\
    \ of a loop. Suppose we want to printing 1 to 10 except 7. So, we can do this,\n\
    \n```\nfor i in range(10):\n    if i+1 == 7:\n        continue\n    print(i+1)\n\
    ```\n\nYou can see we are printing (i+1) because as we learn earlier that range\
    \ function returns index from 0. So, if we print (i+1) then we’ll get numbers\
    \ from 1 to 10. But you can also see that we are checking number if the number\
    \ is equal to 7 or not with the *if statement*. And there is a **Continue** statement\
    \ inside *if* statement. Means when the number will be 7 then *if* condition will\
    \ be *True* & it will continue or skip that iteration.\n\nHere we’ll get an output\
    \ like this,\n\n```\nOutput:\n\n1\n2\n3\n4\n5\n6          # The 7 is\n8      \
    \    # Missing Here\n9\n10\n```\n\n### 7.3.2 – Break Statement\n\nIn *Continue\
    \ Statement* we’ve seen that we can skip a specific iteration, but what if we\
    \ want to stop any farther iteration when it met a specific condition."
  mdcn: "## 第六章\n\n## 条件语句\n\n决策在编程中与在现实生活中同样重要。Python 中的条件语句会根据条件求值为 *True* 还是 *False*\
    \ 来执行不同的计算。这些条件在 Python 中由 if-else 语句处理。\n\n## 6.1 – If-Elif-Else 条件\n\n基本上，一个条件需要为\
    \ *True*，这样我们的脚本才会继续执行其代码块中编写的代码。这里三个重要的关键字是 **if**、**elif** 和 **else**。\n\n**语法：**\n\
    \n```\nif Condition:\n    <Statement>\n\nelif Condition:\n    <Statement>\n\n\
    else:\n    <Statement>\n```\n\n**示例：**\n\n```\nnumber = input(\"Enter a Number:\
    \ \")\nnumber = int(number)\n\nif number < 20:\n    print(\"Number is less than\
    \ 20.\")\n\nelif number > 30:\n    print(\"Number is greater than 30.\")\n\nelse:\n\
    \    print(\"The Number is in 20 - 30\")\n```\n\n在这里你可以看到，我们从用户那里获取 'number' 输入，并将该数字类型转换为整数。然后我们的第一个\
    \ *if 语句* 检查给定的数字是否小于 20。请记住，比较（number < 20）总是返回 True 或 False。因此，如果条件返回 True，那么只有\
    \ **if 代码块** 会被执行。解释器永远不会检查其余的条件。\n\n```\nOutput:\nEnter a Number: 1\nNumber is\
    \ less than 20.\n```\n\n现在假设给定的数字是 39。那么会发生什么？\n我们的第一个条件将为 False，因为 39 不小于 20。所以，解释器会忽略\
    \ **if 代码块**，并继续检查下一个条件。当一个条件返回 True 时，解释器将只执行那个特定的代码块。在这种情况下，下一个 **elif 代码块**\
    \ 将被执行。因为 39 大于 30。如果没有条件返回 True，解释器将只执行 **else 代码块**。\n\n```\nOutput:\nEnter\
    \ a Number: 39\nNumber is greater than 30.\n```\n\n请记住，你可以使用无限数量的 **elif** 条件，但不能在\
    \ **if-else** 梯形结构中使用超过一个的 **if** 或 **else**。整个 **if-else** 条件集也被称为 **if-else**\
    \ 梯形结构。\n当然，你不需要 **elif** 或 **else** 代码块。你只需编写一个 **if** 语句，如果条件不满足，它就会跳过代码并继续执行脚本的其余部分。\n\
    \n## 6.2 – 流程图\n\n在这个流程图中，你可以看到这些基本的 if、elif 和 else 树是如何工作的。\n\n## 6.3 – 嵌套 If-Else\
    \ 语句\n\n你也可以将 **if 代码块** 放入 **if 代码块** 中。这些被称为嵌套 **if 语句**。\n\n```python\nnumber\
    \ = input(\"Enter a Number: \")\nnumber = int(number)\n\nif number % 2 == 0:\n\
    \    if number == 0:\n        print(\"Your number is even but zero\")\n    else:\n\
    \        print(\"Your number is even\")\nelse:\n    print(\"Your number is odd\"\
    )\n```\n\n所以，这里我们有第一个条件，它检查数字是否为偶数。当它是偶数时，它会检查它是否为零。这是一个简单的例子，但你理解了这个概念。\n\n##\
    \ 第七章\n\n## 循环\n\n通常，语句是按顺序执行的；第一条语句首先执行，然后是第二条，依此类推。可能会出现需要多次执行一段代码的情况。\n循环语句允许我们多次执行一条语句或一组语句。\n\
    \n## 7.1 – While 循环\n\nPython 编程中有两种类型的循环：While 循环和 For 循环。While 循环仅在 *while*\
    \ 条件满足时执行代码块。下图说明了 *while 循环* 语句：\n\n在这里你可以看到，它会循环执行，直到 *while* 条件返回 *false*。\n\
    让我们通过一个例子来理解这个概念。\n假设我们需要打印从 1 到 10 的数字。所以，你可以轻松地使用 print() 语句 10 次。但 *while*\
    \ 循环允许我们以非常简单的方式完成这项任务。\n\n让我们看看代码，\n\n```\nnumber = 1\n\nwhile number <= 10:\n\
    \    print(number)\n    number += 1\n```\n\n我们用关键字 *while* 定义一个 while 循环。然后我们编写条件，就像\
    \ if-else 条件一样，并且代码块再次在冒号 ':' 之后缩进。如你所知，在这个例子中我们试图打印 1 到 10。所以，首先我们将变量 (number)\
    \ 初始化为值 1。在每次迭代中，我们打印 *number* 的值并将其递增 1。只要数字小于或等于 10，这个迭代就会进行。\n\n### 7.1.1 –\
    \ 无限循环\n\n在本节中，我们将学习使用 while 循环的 **无限循环** 或 **无尽循环**。这可能看起来不太有用，但它有一些应用。\n\n```\n\
    while True:\n    print(\"This will run forever\")\n```\n\n我们用条件 **True** 定义一个\
    \ *无尽循环*，由于条件总是 **True**，循环将永远不会中断。上面的循环将永远运行并执行 print 语句，除非你终止脚本。\n\n**警告：**\
    \ *如果你使用的是低端系统，这可能会使你的计算机过载。*\n\n## 7.2 – For 循环\n\n在 Python 编程中，**For 循环** 以不同的方式工作。通常，我们使用\
    \ For 循环来遍历任何 **序列** 的所有或部分项目，我们将在下一章学习这个，这里不会深入讨论。\n目前，我们不需要关心 *序列* 的语法。只需注意我们有一个名为\
    \ **numberList** 的变量，它是一个包含 5 个数字的列表。\n\n```\nnumberList = [2, 4, 5, 9, 1]\n\n\
    for number in numberList:\n    print(number)\n```\n\n这里我们在变量 **numberList** 中存储了一个包含\
    \ 5 个数字的列表。然后我们使用 **for** 关键字定义循环，并定义一个控制变量 **number**。对于每次迭代，它将分配列表中下一个项目的值。在这里，每次迭代中\
    \ **number** 将逐个分配 **numberList** 的每个项目。之后我们可以将 **number** 用于任何目的。例如，我们只是逐个打印所有数字。\n\
    \n下面的流程图将说明 **For 循环** 语句：\n\n### 7.2.1 – Range 函数\n\nRange 是 Python 的一个内置函数。同样，不要担心函数是什么，因为我们将在本书后面的章节中学习它。只需记住，当我们向\
    \ **Range 函数** 传递一个数字时，它会返回一个从 0 到该数字的数字列表。我们可以在 for 循环中使用该列表。例如，\n\n```\nfor\
    \ i in range(10):\n    print(i)\n```\n\n当我们运行这段代码时，它将打印 0 到 9。因为 range 函数从 0 开始，到我们传递给它的第\
    \ n<sup>个</sup> 数字结束。这里的第 10<sup>个</sup> 数字是 9。所以，它将打印 0 到 9。\n\n但如果我们想从一个非零数字开始呢？那么我们必须向\
    \ range 函数传递两个参数。\n\n假设我们需要一个从 20 到 30 的数字列表。所以，我们必须向函数传递这两个参数。例如，\n\n```\nfor\
    \ i in range(20, 30):\n    print(i)\n```\n\n同样，这个循环将打印从 20 到 29 的数字。如果你想打印 30，你需要传递\
    \ 31。自己用不同的参数尝试一下，以便更好地理解它。\n\n## 7.3 – 循环控制语句\n\n为了管理循环，Python 中有一些所谓的控制语句。它们允许我们在特定点操纵循环的流程。\n\
    \n### 7.3.1 – Continue 语句\n\nContinue 语句允许我们跳过循环的特定迭代。假设我们想打印 1 到 10，除了 7。所以，我们可以这样做，\n\
    \n```\nfor i in range(10):\n    if i+1 == 7:\n        continue\n    print(i+1)\n\
    ```\n\n你可以看到我们打印 (i+1)，因为正如我们之前学到的，range 函数返回从 0 开始的索引。所以，如果我们打印 (i+1)，我们将得到从\
    \ 1 到 10 的数字。但你也可以看到我们正在用 *if 语句* 检查数字是否等于 7。并且在 *if* 语句内部有一个 **Continue** 语句。这意味着当数字为\
    \ 7 时，*if* 条件将为 *True* 并且它将继续或跳过该迭代。\n\n这里我们将得到如下输出，\n\n```\nOutput:\n\n1\n2\n\
    3\n4\n5\n6          # The 7 is\n8          # Missing Here\n9\n10\n```\n\n### 7.3.2\
    \ – Break 语句\n\n在 *Continue 语句* 中，我们已经看到我们可以跳过特定的迭代，但如果我们想在满足特定条件时停止任何进一步的迭代呢。"
