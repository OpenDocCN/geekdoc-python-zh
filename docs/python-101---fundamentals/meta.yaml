  md: '# CHAPTER – 3


    # Data Types, Variables & Comments


    # 3.1 – What is Data Types?


    Data types are the classification or categorization of data. It represents the
    kind of value that tells what operations can be performed on a particular data.
    In Python Programming data types are actually classes and variables are instances
    or objects of that particular class.


    # 3.2 – Types of Data Types


    There are different types of data type in Python Programming. Here we’ll learn
    all about them.


    # 3.2.1 – Strings


    A *String* is nothing but a sequence of character or a text. You should remember
    we print a string in our first program. In Python Programming whatever text or
    character, we write inside of quotation mark (“” or ‘’) is called *String*. If
    a text isn’t surrounded by quotation mark, then Python Interpreter will never
    realize the text as *String*. The keyword of String is **str**.


    # 3.2.2 – Integers


    Integers are also called Numerical Data Types. An *Integer* is just a regular
    whole number, which we can use for basic calculations. The keyword of Integer
    is **int**.


    **Example:** 1, 54, 69, 23, 0, 32, 1947 etc.


    # 3.2.3 – Floats


    Floats are same as Integers. These are Numerical Data Types too. But in *Integer*
    we can’t use decimal places, and the *Floats* are allowed us to use decimal places.
    Because it is a floating-point number. The keyword of *Float* is **float**.'
  merge: -1
  pgno: 13
- img_proc: true
  md: '**Example:** 32.42, 5.01, 0.122 etc.


    # 3.2.4 – Booleans


    Boolean is basically a binary data type, which contains only two values, namely
    *True* or *False*. We will use it a lot when we get into the Conditions or Loops.
    The Keyword of Boolean data type is **bool**.


    # 3.2.5 – Sequences


    We will learn about Sequences in a later chapter. But since *Sequences* are also
    data types, we should at least mention them here.


    | Data Types | Keyword | Description |

    | :--- | :--- | :--- |

    | List | list | Collection of values |

    | Tuple | tuple | Immutable List |

    | Dictionary | dict | List of key-value pairs |


    # 3.3 – What is Variable


    A Variable is nothing but a container, which contain some values. Every variable
    has a specific data type. But the good thing of python programming is we don’t
    need to declare variable or their data type before using. A variable is created
    at that moment whenever we assign a value to it. Because Python is not “Statically
    Typed”.


    # 3.4 – Creating Variable


    Creating variable in Python is very simple. You just choose a suitable name and
    assign a value to it with the help of *Assignment Operator* (=). For example


    ```

    myString = "Hello World!"

    myInteger = 35

    myFloat = 65.03

    ```'
