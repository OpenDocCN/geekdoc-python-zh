  md: '# 11.2 – String Concatenation


    String Concatenation is nothing but a technique to join two or more strings into
    one string. There several ways to do this. Suppose we have two strings & we want
    to join them.


    ```

    str_1 = "Hey guys"

    str_2 = "Welcome to Python 101"

    ```


    **Comma:** We can simply put a comma between two string to join them.


    ```

    print(str_1, str_2)


    >>> Hey guys Welcome to Python 101

    ```


    **+ Operator:** + *Operator* is same as *comma*, but there is a little problem.


    ```

    print(str_1 + str_2)


    >>> Hey guysWelcome to Python 101

    ```


    When we join two strings with + *Operator*, it will remove space between them.
    To avoid this problem, we need to put an extra space at the end of first string
    or at the beginning of second string.


    **f-string:** *f-string* is mostly used string concatenation technique in python.
    Also, it’s my personal favourite. By using *f-string* code become readable & easy
    to understand.


    ```

    print(f"{str_1} {str_2}")


    >>> Hey guys Welcome to Python 101

    ```'
  merge: -1
  pgno: 58
- img_proc: true
  md: 'We define *f-string* with keyword **f** out-side of quotation mark ( f"" ).
    Then inside the quotation mark we put a string variable between *curly brackets*,
    where we want to join the string. Also, we can use normal text in-side of the
    quotation mark.


    ```

    print(f"Hey guys {str_2}. Let''s start Coding.")


    >>> Hey guys Welcome to Python 101. Let''s start coding.

    ```


    # 11.3 – String Formatting


    When we have a text & we want to insert value of variables in between the text
    then string formatting helps us to achieve that.


    ```

    name, age = "Sam", 22


    print("My name is %s and I''m %d years old." % (name, age))


    >>> My name is Sam and I''m 22 years old.

    ```


    If you noticed, here we used **%s** and **%d** where we want to insert our variables.
    It’s called placeholder. There are different types of placeholders for different
    data types. The following table will teach you better.


    | Placeholder | Data Type |

    | :--- | :--- |

    | %c | Character |

    | %s | String |

    | %d or %i | Integer |

    | %f | Float |

    | %e | Exponential Notation |'
