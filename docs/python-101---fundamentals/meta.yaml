- md: "# VOL-1\n\n# PYTHON 101\n\n# FUNDAMENTALS\n\n![](img/a4414073418da267c942506f4985f9aa_0_0.png)\n\
    \nSam\n\n# VOL-1\n\n# PYTHON 101\n\n# FUNDAMENTALS\n\n![](img/a4414073418da267c942506f4985f9aa_1_0.png)\n\
    \nSam\n\n# INDEX\n\nIntroduction\nWhat is Python\nWhy Learn Python\n\n## 1. Getting\
    \ Start with Python\n\n- 1.1. Python Installation\n- 1.2. Integrated Development\
    \ Environment\n    - 1.2.1. Editor & CLI\n    - 1.2.2. Python IDLE\n    - 1.2.3.\
    \ PyCharm\n    - 1.2.4. Visual Studio Code\n\n## 2. Our First Program\n\n- 2.1.\
    \ Hello World!\n- 2.2. Running The Program\n\n## 3. Data Types, Variables & Comments\n\
    \n- 3.1. What is Data Type\n- 3.2. Types of Data Types\n    - 3.2.1. Strings\n\
    \    - 3.2.2. Integers\n    - 3.2.3. Floats\n    - 3.2.4. Booleans\n    - 3.2.5.\
    \ Sequences\n- 3.3. What is Variable\n- 3.4. Creating Variables\n- 3.5. Using\
    \ Variables\n- 3.6. Typecasting\n- 3.7. Comments\n\n## 4. Operators\n\n- 4.1.\
    \ Arithmetic Operators\n- 4.2. Assignment Operators\n- 4.3. Comparison Operators\n\
    - 4.4. Logical Operators\n- 4.5. Other Operators\n\n## 5. User Input\n\n- 5.1.\
    \ Input Function\n\n## 6. Conditional Statements\n\n- 6.1. If-Else Conditions\n\
    - 6.2. Flowchart\n- 6.3. Nested If-Else Statements\n\n## 7. Loops\n\n- 7.1. While\
    \ Loop\n    - 7.1.1. Infinite Loop\n- 7.2. For Loop\n    - 7.2.1. Range Function\n\
    - 7.3. Loop Control Statements\n    - 7.3.1. Continue Statements\n    - 7.3.2.\
    \ Break Statements\n    - 7.3.3. Pass Statements\n\n## 8. Sequences\n\n- 8.1.\
    \ List\n    - 8.1.1. Accessing Values\n    - 8.1.2. Modifying Values\n    - 8.1.3.\
    \ List Operations\n    - 8.1.4. List Functions\n- 8.2. Tuple\n- 8.3. Dictionary\n\
    \    - 8.3.1. Accessing Values\n    - 8.3.2. Dictionary Functions\n- 8.4. Membership\
    \ Operators\n\n## 9. Function\n\n- 9.1. Defining Function\n    - 9.1.1. Parameters\n\
    \    - 9.1.2. Return Values\n- 9.2. Default Parameters\n- 9.3. Args & KWArgs\n\
    - 9.4. Scope\n\n## 10. Exception Handling\n\n- 10.1. Try-Except\n    - 10.1.1.\
    \ Else Statements\n    - 10.1.2. Finally Statements\n\n## 11. String Manipulation\n\
    \n- 11.1. String Slicing\n- 11.2. String Concatenation\n- 11.3. String Formatting\n\
    - 11.4. Escape Characters\n- 11.5. String Functions\n    - 11.5.1. Case Manipulation\n\
    \    - 11.5.2. Count Function\n    - 11.5.3. Find Function\n    - 11.5.4. Replace\
    \ Function\n    - 11.5.5. Join Function\n    - 11.5.6. Split Function\n\n## 12.\
    \ File Handling\n\n- 12.1. Opening & Closing Files\n    - 12.1.1. Access Modes\n\
    - 12.2. With Statement\n- 12.3. Reading from Files\n- 12.4. Writing into Files\n\
    - 12.5. Other Operations\n\nWhat Next?\n\n# INTRODUCTION\n\nThis book is the first\
    \ part of a series that is called the **Python 101**. In this series, we are going\
    \ to focus on learning the Python Programming Language in an effective and easy\
    \ way. The goal is to learn it smartly, practically and fast without needing to\
    \ read thousands of pages. We will keep it simple and precise. In this first book,\
    \ we will introduce you to the language and learn the basics.\n\nThis book is\
    \ for complete beginners and no *Programming*, *IT* or *Math* skills are required\
    \ to understand it. At the end, you will be able to write various simple and interesting\
    \ programs and you will have the necessary basis to continue with volume two.\n\
    \n# What is Python?\n\nActually, there is a big misconception about Python. Most\
    \ of the programmer says that Python is an Interpreted Language and other says\
    \ it is a compiled language. But if you are finding an appropriate answer then\
    \ it will be both. Python is an Interpreted Language as well as Compiled Language.\n\
    \nBecause though we are not compiling our source code, but there is a background\
    \ process that Compiled source the code into *Byte Code*, and then the Python\
    \ Interpreter convert that byte code into Machine Language. And these all process\
    \ done by Python Virtual Machine *(which we will download and install in the First\
    \ Chapter of this book)*. That’s why we can call Python a Compiled as well as\
    \ Interpreted Language.\n\nAs we learned before Python is an interpreted and compiled\
    \ Language. But Python is also Object-oriented, High-level programming language\
    \ with dynamic semantics.\n\n# WHY PYTHON?\n\nOne question you might be asking\
    \ yourself right now is- ‘Why learn Python? Why not Java, C, C++ or others? Why?’\n\
    \nFirst of all, a good Programmer is fluent in all programming language. So, learning\
    \ Python doesn’t mean that you can’t learn others programming language. But secondly\
    \ Python is probably the best language to start coding journey.\n\nPython Syntax\
    \ is so easy that even a child can easily grasp it. In other language there are\
    \ a lot of things that you need to do manually. In this case Python makes our\
    \ life easier. Because the hues library gives you ability to create something\
    \ new with the help of things that already made. Meaning you do not need to make\
    \ everything from Zero, you can use others program inside your program to create\
    \ something new and obesely to save your valuable time & hard work.\n\nBesides\
    \ that, Python’s popularity is skyrocketing. According to TIOBE Index Python is\
    \ the most popular language with upward trend *(August 2022)*.\n\nSource - [www.tiobe.com/tiobe-index](http://www.tiobe.com/tiobe-index)\n\
    \n# CHAPTER – 1\n\n# Getting Start with Python\n\nSo now, before dive into the\
    \ coding we need to install Python and development environment. As we learn before\
    \ (*What is Python*) Python is a so-called Interpreted Language. It means that\
    \ the source code needs the Interpreter or a certain Software to execute.\n\n\
    On the other hand, other languages like C, C++ or Java needs compiler to compile\
    \ or convert source code into machine language (*Combination of 0 & 1*) instead\
    \ of interpreter to execute the source code. But Python cannot do this. That why\
    \ we need to install Python before get into coding.\n\n## 1.1 - Python Installation\n\
    \nFor downloading, visit the official website of Python & get the latest version\
    \ from there. The link is given bellow.\n\nDownload Python: [www.python.org](http://www.python.org)\n\
    \nDownload the installer and follow the instruction. Once you are completed installation\
    \ process, you should have Python Interpreter as well as IDLE on your PC.\n\n\
    ## 1.2 - Integrated Development Environment (*IDE*)\n\nAn IDE, or Integrated Development\
    \ Environment, enables programmers to consolidate the different aspects of writing\
    \ a computer program.\n\nIDEs increase programmer productivity by combining common\
    \ activities of writing software into a single application: editing source code,\
    \ execute code and debugging.\n\nYou can use any IDE you want. But here we will\
    \ discuss about 4 commonly used IDEs for Python Program.\n\n### 1.2.1 - Editor\
    \ & CLI\n\nThis is not mandatory to code Python in an IDE. You can write your\
    \ code on any text editor like, Notepad, Vim, Atom, Sublime whatever you want.\
    \ To do so at first you need to write and save code with right file name & extension\
    \ (<filename>.py). Then you can run the code or script on CMD (Windows) or Terminal\
    \ (Linux/Mac). In order to run the code, you need to use the following syntax:\n\
    \n```\npython <filename>.py\n```\n\nThis option is less convenient, but if you\
    \ want you can go through it.\n\n### 1.2.2 - Python IDLE\n\nPython IDLE comes\
    \ with Python installation. You’ve no need to install IDLE externally. One can\
    \ call it as default IDE of Python. It is a great tool to write code and it has\
    \ an Integrated Interpreter. Also, it’s User Interface is very straight forward.\
    \ For Beginner it is definitely more than enough. In this book will using the\
    \ IDLE to run our Code.\n\n### 1.2.3 - PyCharm\n\nPyCharm is one of the most popular\
    \ Python IDEs. There is a multitude of reasons for this. PyCharm is a cross-platform\
    \ application, it is compatible with Linux, macOS, and Windows platforms. PyCharm\
    \ comes with a plethora of modules, packages, and also professional syntax highlighting\
    \ and a great user interface. I would definitely recommend it to every Python\
    \ developer. If you are interested, you can get the community edition for free.\n\
    \n### 1.2.4 - Visual Studio Code\n\nLast but not the least and my personal favourite\
    \ very professional IDEs is Visual Studio Code. It is developed by Microsoft.\
    \ You can also choose it as your Development Environment. There are a lot of reason\
    \ to liking it. Mainly it’s extensions, code snippet and advanced syntax highlighting,\
    \ which helps a developer a lot. Also, it has ability to run any kind of code\
    \ in one place and it is completely free. So now, Let’s dive into code."
  mdcn: "# 第一卷\n\n# PYTHON 101\n\n# 基础篇\n\n![](img/a4414073418da267c942506f4985f9aa_0_0.png)\n\
    \nSam\n\n# 第一卷\n\n# PYTHON 101\n\n# 基础篇\n\n![](img/a4414073418da267c942506f4985f9aa_1_0.png)\n\
    \nSam\n\n# 目录\n\n简介\n什么是Python\n为什么学习Python\n\n## 1. Python入门\n\n- 1.1. Python安装\n\
    - 1.2. 集成开发环境\n    - 1.2.1. 编辑器与命令行界面\n    - 1.2.2. Python IDLE\n    - 1.2.3.\
    \ PyCharm\n    - 1.2.4. Visual Studio Code\n\n## 2. 我们的第一个程序\n\n- 2.1. Hello World!\n\
    - 2.2. 运行程序\n\n## 3. 数据类型、变量与注释\n\n- 3.1. 什么是数据类型\n- 3.2. 数据类型分类\n    - 3.2.1.\
    \ 字符串\n    - 3.2.2. 整数\n    - 3.2.3. 浮点数\n    - 3.2.4. 布尔值\n    - 3.2.5. 序列\n\
    - 3.3. 什么是变量\n- 3.4. 创建变量\n- 3.5. 使用变量\n- 3.6. 类型转换\n- 3.7. 注释\n\n## 4. 运算符\n\n\
    - 4.1. 算术运算符\n- 4.2. 赋值运算符\n- 4.3. 比较运算符\n- 4.4. 逻辑运算符\n- 4.5. 其他运算符\n\n## 5.\
    \ 用户输入\n\n- 5.1. 输入函数\n\n## 6. 条件语句\n\n- 6.1. If-Else条件\n- 6.2. 流程图\n- 6.3. 嵌套If-Else语句\n\
    \n## 7. 循环\n\n- 7.1. While循环\n    - 7.1.1. 无限循环\n- 7.2. For循环\n    - 7.2.1. Range函数\n\
    - 7.3. 循环控制语句\n    - 7.3.1. Continue语句\n    - 7.3.2. Break语句\n    - 7.3.3. Pass语句\n\
    \n## 8. 序列\n\n- 8.1. 列表\n    - 8.1.1. 访问值\n    - 8.1.2. 修改值\n    - 8.1.3. 列表操作\n\
    \    - 8.1.4. 列表函数\n- 8.2. 元组\n- 8.3. 字典\n    - 8.3.1. 访问值\n    - 8.3.2. 字典函数\n\
    - 8.4. 成员运算符\n\n## 9. 函数\n\n- 9.1. 定义函数\n    - 9.1.1. 参数\n    - 9.1.2. 返回值\n-\
    \ 9.2. 默认参数\n- 9.3. Args与KWArgs\n- 9.4. 作用域\n\n## 10. 异常处理\n\n- 10.1. Try-Except\n\
    \    - 10.1.1. Else语句\n    - 10.1.2. Finally语句\n\n## 11. 字符串操作\n\n- 11.1. 字符串切片\n\
    - 11.2. 字符串连接\n- 11.3. 字符串格式化\n- 11.4. 转义字符\n- 11.5. 字符串函数\n    - 11.5.1. 大小写转换\n\
    \    - 11.5.2. 计数函数\n    - 11.5.3. 查找函数\n    - 11.5.4. 替换函数\n    - 11.5.5. 连接函数\n\
    \    - 11.5.6. 分割函数\n\n## 12. 文件处理\n\n- 12.1. 打开与关闭文件\n    - 12.1.1. 访问模式\n- 12.2.\
    \ With语句\n- 12.3. 从文件读取\n- 12.4. 写入文件\n- 12.5. 其他操作\n\n下一步做什么？\n\n# 简介\n\n本书是名为**Python\
    \ 101**的系列的第一部分。在这个系列中，我们将专注于以一种有效且简单的方式学习Python编程语言。目标是聪明、实用、快速地学习它，而无需阅读数千页。我们将保持简单明了。在第一本书中，我们将向您介绍这门语言并学习基础知识。\n\
    \n本书面向完全初学者，理解它不需要任何*编程*、*IT*或*数学*技能。最后，您将能够编写各种简单有趣的程序，并为继续第二卷的学习打下必要的基础。\n\n\
    # 什么是Python？\n\n实际上，关于Python存在一个很大的误解。大多数程序员说Python是一种解释型语言，而另一些人说它是编译型语言。但如果您正在寻找一个合适的答案，那么它两者都是。Python既是解释型语言，也是编译型语言。\n\
    \n因为尽管我们没有编译源代码，但有一个后台过程将源代码编译成*字节码*，然后Python解释器将该字节码转换为机器语言。所有这些过程都由Python虚拟机完成*（我们将在本书的第一章下载并安装它）*。这就是为什么我们可以称Python既是编译型语言也是解释型语言。\n\
    \n正如我们之前所学，Python是一种解释型和编译型语言。但Python也是一种面向对象、具有动态语义的高级编程语言。\n\n# 为什么选择Python？\n\
    \n您现在可能在问自己一个问题：‘为什么学习Python？为什么不学Java、C、C++或其他语言？为什么？’\n\n首先，一个优秀的程序员精通所有编程语言。所以，学习Python并不意味着你不能学习其他编程语言。但其次，Python可能是开始编程之旅的最佳语言。\n\
    \nPython语法非常简单，连孩子都能轻松掌握。在其他语言中，有很多事情需要手动完成。在这种情况下，Python让我们的生活更轻松。因为庞大的库让你能够借助已有的东西创造新事物。这意味着你不需要从零开始制作一切，你可以在你的程序中使用别人的程序来创造新东西，显然可以节省你宝贵的时间和辛勤工作。\n\
    \n除此之外，Python的受欢迎程度正在飙升。根据TIOBE指数，Python是最受欢迎的语言，呈上升趋势*（2022年8月）*。\n\n来源 - [www.tiobe.com/tiobe-index](http://www.tiobe.com/tiobe-index)\n\
    \n# 第一章\n\n# Python入门\n\n那么现在，在深入编码之前，我们需要安装Python和开发环境。正如我们之前所学（*什么是Python*），Python是一种所谓的解释型语言。这意味着源代码需要解释器或特定软件来执行。\n\
    \n另一方面，其他语言如C、C++或Java需要编译器来编译或将源代码转换为机器语言（*0和1的组合*），而不是解释器来执行源代码。但Python做不到这一点。这就是为什么我们需要在开始编码之前安装Python。\n\
    \n## 1.1 - Python安装\n\n要下载，请访问Python的官方网站并获取最新版本。链接如下。\n\n下载Python：[www.python.org](http://www.python.org)\n\
    \n下载安装程序并按照说明操作。完成安装过程后，您的电脑上应该有Python解释器和IDLE。\n\n## 1.2 - 集成开发环境（*IDE*）\n\n\
    IDE，即集成开发环境，使程序员能够整合编写计算机程序的不同方面。\n\nIDE通过将编写软件的常见活动组合到一个应用程序中来提高程序员的生产力：编辑源代码、执行代码和调试。\n\
    \n您可以使用任何您想要的IDE。但在这里我们将讨论4种常用的Python程序IDE。\n\n### 1.2.1 - 编辑器与命令行界面\n\n在IDE中编写Python代码不是强制性的。您可以在任何文本编辑器上编写代码，如Notepad、Vim、Atom、Sublime等。为此，您首先需要使用正确的文件名和扩展名（<filename>.py）编写并保存代码。然后您可以在CMD（Windows）或终端（Linux/Mac）上运行代码或脚本。要运行代码，您需要使用以下语法：\n\
    \n```\npython <filename>.py\n```\n\n这个选项不太方便，但如果您愿意，可以尝试一下。\n\n### 1.2.2 - Python\
    \ IDLE\n\nPython IDLE随Python安装一起提供。您无需外部安装IDLE。可以称其为Python的默认IDE。它是一个编写代码的好工具，并且有一个集成的解释器。此外，它的用户界面非常直观。对于初学者来说，这绝对是足够的。在本书中，我们将使用IDLE来运行我们的代码。\n\
    \n### 1.2.3 - PyCharm\n\nPyCharm是最受欢迎的Python IDE之一。这有很多原因。PyCharm是一个跨平台应用程序，兼容Linux、macOS和Windows平台。PyCharm提供了大量的模块、包，以及专业的语法高亮和出色的用户界面。我绝对推荐给每个Python开发者。如果您感兴趣，可以免费获取社区版。\n\
    \n### 1.2.4 - Visual Studio Code\n\n最后但同样重要的是，我个人最喜欢的非常专业的IDE是Visual Studio Code。它由微软开发。您也可以选择它作为您的开发环境。喜欢它有很多原因。主要是它的扩展、代码片段和高级语法高亮，这对开发者帮助很大。此外，它能够在一处运行任何类型的代码，并且完全免费。那么现在，让我们开始编码吧。"
