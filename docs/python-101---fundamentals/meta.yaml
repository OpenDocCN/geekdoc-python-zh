- img_proc: true
  md: '# # What is Python?


    Actually, there is a big misconception about Python. Most of the programmer says
    that Python is an Interpreted Language and other says it is a compiled language.
    But if you are finding an appropriate answer then it will be both. Python is an
    Interpreted Language as well as Compiled Language.


    Because though we are not compiling our source code, but there is a background
    process that Compiled source the code into *Byte Code*, and then the Python Interpreter
    convert that byte code into Machine Language. And these all process done by Python
    Virtual Machine *(which we will download and install in the First Chapter of this
    book)*. That’s why we can call Python a Compiled as well as Interpreted Language.


    As we learned before Python is an interpreted and compiled Language. But Python
    is also Object-oriented, High-level programming language with dynamic semantics.'
  merge: -1
  pgno: 7
- img_proc: true
  md: '# # WHY PYTHON?


    One question you might be asking yourself right now is- ‘Why learn Python? Why
    not Java, C, C++ or others? Why?’


    First of all, a good Programmer is fluent in all programming language. So, learning
    Python doesn’t mean that you can’t learn others programming language. But secondly
    Python is probably the best language to start coding journey.


    Python Syntax is so easy that even a child can easily grasp it. In other language
    there are a lot of things that you need to do manually. In this case Python makes
    our life easier. Because the hues library gives you ability to create something
