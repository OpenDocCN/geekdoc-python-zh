  md: "# 7.3.1 – Continue Statement\n\nContinue Statement allow us to skip a specific\
    \ iteration of a loop. Suppose we want to printing 1 to 10 except 7. So, we can\
    \ do this,\n\n```\nfor i in range(10):\n    if i+1 == 7:\n        continue\n \
    \   print (i+1)\n```\n\nYou can see we are printing (i+1) because as we learn\
    \ earlier that range function returns index from 0. So, if we print (i+1) then\
    \ we’ll get numbers from 1 to 10. But you can also see that we are cheeking number\
    \ if the number is equal to 7 or not with the *if statement*. And there is a **Continue**\
    \ statement inside *if* statement. Means when the number will be 7 then *if* condition\
    \ will be *True* & it will continue or skip that iteration.\n\nHere we’ll get\
    \ an output like this,\n\n```\nOutput:\n\n1\n2\n3\n4\n5\n6          # The 7 is\n\
    8          # Missing Here\n9\n10\n```\n\n# 7.3.2 – Break Statement\n\nIn *Continue\
