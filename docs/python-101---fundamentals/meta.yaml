    | <= | 小于或等于 | 左侧的值**小于或等于**右侧的值 | a <= b |\n\n在Python编程中，我们使用*比较运算符*来处理*条件和循环*。这两个主题我们将在后面的章节中介绍。\n\
    \n```\n>>> a = 9\n>>> b = 3\n>>>\n>>> print(a == b)\nFalse\n>>> print(a != b)\n\
