    thing, we will use this quite often during coding.


    # 3.6 – Comments


    Comments in Python are nothing but one or more lines of text in the code, which
    are ignored by the interpreter during executing the script. It helps us to take
    short note about a code block and enhance readability of code. There are three
    types of comments in Python Programming.


    **Single Line Comments:** If we put a Hash Symbol (#) at the beginning of any
    line in script the interpreter considers that line as a single line comment.


    ```

    # This is a Single Line Comment

    print("Python 101")

    ```


    We can also add single line comment after any statement. Like,


    ```

    # This is a Single Line Comment

    print("Python 101")    # We can add comment here also

    ```


    **Multi-line Comment:** Python doesn''t offer a separate way to write multiline
    comments. However, there are other ways to get around this issue. We can use Hash
    Symbol (#) at the beginning of each line of comment on multiple lines.


    ```

    # This is a

    # Multi-line

    # Comment

    print("Python 101")

    ```'
