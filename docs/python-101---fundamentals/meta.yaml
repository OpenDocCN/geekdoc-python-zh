    We will learn about Sequences in a later chapter. But since *Sequences* are also
    data types, we should at least mention them here.


    | Data Types | Keyword | Description |

    | :--- | :--- | :--- |

    | List | list | Collection of values |

    | Tuple | tuple | Immutable List |

    | Dictionary | dict | List of key-value pairs |


    # 3.3 – What is Variable


    A Variable is nothing but a container, which contain some values. Every variable
    has a specific data type. But the good thing of python programming is we don’t
    need to declare variable or their data type before using. A variable is created
    at that moment whenever we assign a value to it. Because Python is not “Statically
    Typed”.


    # 3.4 – Creating Variable


    Creating variable in Python is very simple. You just choose a suitable name and
    assign a value to it with the help of *Assignment Operator* (=). For example


    ```

    myString = "Hello World!"

    myInteger = 35

    myFloat = 65.03

    ```'
