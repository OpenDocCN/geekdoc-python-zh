  md: '# 3.6 – Typecasting


    Sometime we will get values in such a tata type that we can’t work with properly.
    For this we convert those values into our desired data type, and this process
    is called *Typecasting*.


    For example, we might get a string as an input but the string number as its value.
    In this case “11” is not equal to 11. We can’t do calculation with string, even
    though the string represents a number. For this reason, we need to typecast.


    Syntax:


    ```

    <required_datatype>(expression)

    ```


    Example:


    ```

    value = "11"

    number = int(value)

    ```'
