    An IDE, or Integrated Development Environment, enables programmers to consolidate
    the different aspects of writing a computer program.


    IDEs increase programmer productivity by combining common activities of writing
    software into a single application: editing source code, execute code and debugging.


    You can use any IDE you want. But here we will discuss about 4 commonly used IDEs
    for Python Program.


    # 1.2.1 - Editor & CLI'
