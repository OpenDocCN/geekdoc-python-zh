  md: "If you are lazy like me and don’t want to specify data types then you can use\
    \ *format()* function. Simply use a curly bracket where you want to put the variable\
    \ and pass all variables as arguments of format() function.\n\n```\nname, age\
    \ = \"Sam\", 22\n\nprint(\"My name is {} and I'm {} years old.\".format(name,\
    \ age))\n\n>>> My name is Sam and I'm 22 years old.\n```\n\n# 11.4 – Escape Characters\n\
    \nIn string we use a lot of escape characters in order to manage string properly.\
    \ Actually, they are non-printable characters. Like tab, new line, backspace etc.\
    \ They all are initiated by backslash (\\), that’s why we use double backslash\
    \ for file path (Chapter-12).\n\nThe following table will summarize the most important\
    \ escape characters. If want to know more escape characters search on google.\
    \ But you won’t need them for now.\n\n| Escape Characters | Description |\n| :---\
    \ | :--- |\n| \\b | Backspace |\n| \\n | New Line |\n| \\t | Tab |\n\n```\nprint(\"\
    My name is\\b Sam\")\n>>> My name i Sam\n\nprint(\"My name is\\n Sam\")\n>>> My\
    \ name is\n    Sam\n\nprint(\"My name is\\t Sam\")\n>>> My name is    Sam\n```"
