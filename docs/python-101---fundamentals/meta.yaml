    ## 我们的第一个程序


    每种编程语言都有其特定的语法。Python 也不例外，它拥有自己的语法体系。不过别担心，Python 的语法就像普通英语一样简单。我们将从一个非常简单的程序开始我们的编程之旅。


    ### 2.1 - Hello World！


    在学习一门新语言时，以 Hello World 程序作为开端是编程界的一个传统。因此，本章我们将遵循这一传统。Hello World 程序只是一个简单的脚本，它会在屏幕上输出文本“Hello
    World!”。在 Python 中，这非常容易实现。


    ```python

    print("Hello World!")

    ```


    如你所见，这里我们只用了一行代码就在屏幕上打印了文本。在其他语言中，我们可能需要定义包含函数、类等的基本结构，仅仅是为了打印一段文本。


    让我们看看这里发生了什么。首先我们注意到一个名为 *print* 的*函数*。函数 *print* 用于在屏幕上打印特定的文本。我们应该将想要打印的文本放在括号内。


    但有一件非常重要的事情你必须记住：我们想要打印的文本必须是一个字符串。字符串是 Python 的一种数据类型。现在不必深究，我们将在本书后面简要学习它。只需记住，在
    Python 编程中使用的任何文本都是字符串。我们用引号来表示字符串。如果不使用引号，Python 解释器会认为 *Hello World!* 是一个变量名而不是文本，并且会给出一个*错误消息*，因为该变量名未定义。


    再次强调，不要过多思考变量，因为我们将在下一章学习更多关于它的内容。


    ### 2.1 – 运行程序


    现在，是时候运行我们刚刚编写的脚本了。为此，你需要先将脚本保存为一个 Python 文件。


    - 转到 **文件** > **保存** 或按 **Ctrl** + **S** 以保存脚本。


    ![](img/a4414073418da267c942506f4985f9aa_12_0.png)


    - 然后点击 **运行** > **运行模块** 或按 **F5** 来运行脚本。


    *在 IDLE 中运行 Python 程序*


    然后会出现一个输出窗口并显示结果。


    ![](img/a4414073418da267c942506f4985f9aa_12_1.png)


    *Hello World! 程序的输出*


    现在，对自己说声恭喜吧，因为你成功运行了你的*第一个程序*。


    ## 第三章


    ## 数据类型、变量与注释


    ### 3.1 – 什么是数据类型？


    数据类型是对数据的分类或归类。它表示一种值的类型，指明了可以对特定数据执行哪些操作。在 Python 编程中，数据类型实际上是类，而变量是该特定类的实例或对象。


    ### 3.2 – 数据类型的种类


    Python 编程中有不同类型的数据类型。我们将在这里学习所有关于它们的知识。


    #### 3.2.1 – 字符串


    *字符串*不过是一系列字符或一段文本。你应该记得我们在第一个程序中打印了一个字符串。在 Python 编程中，我们在引号（“” 或 ‘’）内编写的任何文本或字符都称为*字符串*。如果文本没有被引号包围，Python
    解释器将永远不会将其识别为*字符串*。字符串的关键字是 **str**。


    #### 3.2.2 – 整数


    整数也称为数值数据类型。*整数*就是普通的整数，我们可以用它进行基本计算。整数的关键字是 **int**。


    **示例：** 1, 54, 69, 23, 0, 32, 1947 等。


    #### 3.2.3 – 浮点数


    浮点数与整数类似。它们也是数值数据类型。但在*整数*中我们不能使用小数位，而*浮点数*允许我们使用小数位。因为它是一个浮点数。*浮点数*的关键字是 **float**。


    **示例：** 32.42, 5.01, 0.122 等。


    #### 3.2.4 – 布尔值


    布尔值基本上是一种二进制数据类型，只包含两个值，即 *True* 或 *False*。当我们进入条件或循环部分时，会经常使用它。布尔数据类型的关键字是 **bool**。


    #### 3.2.5 – 序列


    我们将在后面的章节学习序列。但由于*序列*也是数据类型，我们至少应该在这里提及它们。


    | 数据类型 | 关键字 | 描述 |

    | :--- | :--- | :--- |

    | 列表 | list | 值的集合 |

    | 元组 | tuple | 不可变列表 |

    | 字典 | dict | 键值对的列表 |


    ### 3.3 – 什么是变量


    变量不过是一个容器，用来存放一些值。每个变量都有特定的数据类型。但 Python 编程的好处在于，我们不需要在使用前声明变量或其数据类型。变量在我们为其赋值的那一刻就被创建了。因为
    Python 不是“静态类型”的。


    ### 3.4 – 创建变量


    在 Python 中创建变量非常简单。你只需选择一个合适的名称，并借助*赋值运算符* (=) 为其赋值。例如：


    ```python

    myString = "Hello World!"

    myInteger = 35

    myFloat = 65.03

    ```


    这里我们定义了三个变量。第一个是*字符串*类型，第二个是*整数*类型，最后一个是*浮点数*类型。基本上，你可以为变量选择任何你想要的名字，但有一些限制。不允许使用任何保留关键字，如
    *str*、*int*、*dict*、*if*、*for*、*while* 等。此外，变量名不能以整数或除下划线 (_) 以外的特殊字符开头。


    ### 3.5 – 使用变量


    ```python

    myString = "Hello World!"

    myInteger = 35

    myFloat = 65.03


    print(myString)

    print(myInteger)

    print(myFloat)

    ```


    现在我们可以开始使用之前定义的变量了。例如，我们只是将变量打印到屏幕上。但你可以在脚本中的任何地方、用于任何目的来使用你的变量。


    这里你可以看到我们没有使用引号，因此括号内的文本被视为变量名。Python 解释器打印的是变量的值，而不是括号内实际写的文本。上述代码的输出如下：


    ```

    Hello World!

    35

    65.03

    ```


    ### 3.6 – 类型转换


    有时我们会得到某种数据类型的值，而我们无法直接处理。为此，我们将这些值转换为我们需要的数据类型，这个过程称为*类型转换*。


    例如，我们可能得到一个字符串作为输入，但字符串的值是数字。在这种情况下，“11”不等于 11。我们不能用字符串进行计算，即使字符串表示一个数字。因此，我们需要进行类型转换。


    语法：


    ```python

    <所需数据类型>(表达式)

    ```


    示例：


    ```python

    value = "11"

    number = int(value)

    ```


    类型转换通过使用特定的数据类型函数来完成。在这个例子中，我们将一个*字符串*转换为*整数*。所以，我们需要使用 **int()** 函数。你也可以使用 **str()**
    函数反向执行此过程。在 Python 中，这是一个非常重要的事情，我们将在编码过程中经常使用它。


    ### 3.7 – 注释


    Python 中的注释不过是代码中的一行或多行文本，解释器在执行脚本时会忽略它们。它帮助我们对代码块做简短说明，并增强代码的可读性。Python 编程中有三种类型的注释。


    **单行注释：** 如果我们在脚本中任何一行的开头放置一个井号 (#)，解释器就会将该行视为单行注释。


    ```python

    # 这是一个单行注释

    print("Python 101")

    ```


    我们也可以在任何语句之后添加单行注释。例如：


    ```python

    # 这是一个单行注释

    print("Python 101")    # 我们也可以在这里添加注释

    ```


    **多行注释：** Python 没有提供单独的方式来编写多行注释。然而，有其他方法可以解决这个问题。我们可以在多行注释的每一行开头使用井号 (#)。


    ```python

    # 这是一个

    # 多行

    # 注释

    print("Python 101")

    ```'
