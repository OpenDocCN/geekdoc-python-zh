    \n| 运算符 | 名称 | 描述 | 语法 |\n| :--- | :--- | :--- | :--- |\n| = | 等于 | 将右侧表达式的值赋给左侧变量。\
    \ | x = a + b |\n| += | 加并赋值 | 将右侧操作数与左侧操作数相加，并将值赋给左侧操作数。 | a += b 或 a = a + b\
    \ |\n| -= | 减并赋值 | 从左侧操作数中减去右侧操作数，并将值赋给左侧操作数。 | a -= b 或 a = a - b |\n| *= | 乘并赋值\
    \ | 将右侧操作数与左侧操作数相乘，并将值赋给左侧操作数。 | a *= b 或 a = a * b |\n| /= | 除并赋值 | 用左侧操作数除以右侧操作数，并将值赋给左侧操作数。\
