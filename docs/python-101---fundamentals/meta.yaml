  md: '# CHAPTER – 7


    # Loops


    In general, statements are executed sequentially; The first statement is executed
    first, followed by the second, and so on. There may be a situation when you need
    to execute a block of code several number of times.

    A loop statement allows us to execute a statement or group of statements multiple
    times.


    # 7.1 – While Loop


    ![](img/a4414073418da267c942506f4985f9aa_31_0.png)


    There are two types of loops in Python Programming, While Loop & For Loop. A While
    Loop executes the code block only when *while* condition is met. The following
