  md: '# CHAPTER – 5


    # User Input


    It is one of the most important things to get some data from users to give some
    sort of result in programming. Python has a inbuilt function called *input()*,
    which allows us to get data from users. In this chapter we are going to take a
    look at user input and how it works.


    # 5.1 – Input Function


    Input function is nothing but a inbuilt function of Python like print function,
    which gives us ability to get input from users.


    ```

    # Taking input & storing into variable ''name''

    name = input("Enter your name: ")


    # Printing ''name'' onto the screen

    print(name)

    ```


    When you execute the above script then you will able to enter your name on terminal
    and your input will be stored in variable *name*. Then the print function will
    print the value of *name* onto the terminal.


    ```

    Output:


    Enter your name: Sam

    Sam

    ```


    Let’s have a look at another example,'
  merge: -1
  pgno: 24
- img_proc: true
  md: '```

    # Taking two numbers from user

    number1 = input("Enter Number-1: ")

    number2 = input("Enter Number-2: ")


    # Adding number1 & number2 and storing into ''sum''

    sum = number1 + number2


    # Printing Result

    print("Result is: ", sum)

    ```


    Here we are taking two numbers from user then adding them & printing the result.
    But if you run this script, you will get a wired output. You will see the numbers
    you are entering are not adding, they just appending one to another. So why is
    this happening?


    The problem is that the function *input()* returns only *string*. Means when you
    enter 15 & 43, it stores into variables as “15” & “43”, which are *string*.


    So, what happen when we add two strings? We just append one to other. This means
    that the sum of “15” & “43” would be “1543” not 58.


    To overcome this problem, means if you want to do any mathematical operation with
    input data, you need to typecast the variables into **int** or **float** first.


    ```

    # Typecasting variables

    number1 = int(number1)

    number2 = int(number2)

    ```


    You need to add these two lines of code before adding number1 & number2. Now if
    you enter 15 & 43 you will get 58 as output.


    ```

    Output:


    Enter Number-1: 15

    ```'
