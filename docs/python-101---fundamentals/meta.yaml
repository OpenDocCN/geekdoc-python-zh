    We define *kwargs* with double asters (*) sign. And if you notice the above example,\
    \ it returns a dictionary of key-value pairs. So, now we can apply dictionary\
    \ functions or process the data.\n\n## 9.4 – Scope\n\nThe last topic of this chapter\
