    print cities in positions from *minus two* to *minus five* with a step of *minus
    one*


    When using negative indices for the start and the stop, the rules are exactly
    the same as when using positive indices. The first element we want to slice is
    "Tokyo", which is in position -2, so the start is -2. The last element is "Prague",
    which is in position -4. Because of the minus one rule, we have to subtract 1
    from -4, therefore the stop is -5. And finally, because we are slicing consecutive
    elements in reverse order, the step is -1. As you can now imagine, using negative
    indices can be very convenient when slicing elements at the end of a very long
    list in reverse order.


