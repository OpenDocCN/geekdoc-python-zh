    \ the *blue* color, and (3) add the color you want.\n    b. *Ordering a T-shirt\
    \ online*. You are ordering a new T-shirt online. You find a T-shirt you like,\
    \ which is red, with a round neck, and with a print *add your text here*. Write\
    \ a list with these characteristics. Now you want to add your own text to the\
