    is a string!

    Python has at least four methods to change character cases:


    +   - .lower() to change all characters of a string to lowercase

    - .upper() to change all characters of a string to uppercase

    - .title() to change the first character of a string to uppercase and all the
    remaining characters to lowercase

    - .capitalize() to change the first character of each word in a string to uppercase,
    and all the remaining characters to lowercase


    Finally, to actually change a list element, we need to **re-assign the changed
    element to itself**. In other words, we need to **overwrite the current element
    with its new version**. If we do not do that, then the list element will remain
    unchanged.


