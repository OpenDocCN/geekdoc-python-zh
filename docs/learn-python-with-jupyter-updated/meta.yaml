  md: '"in more depth" session in Chapter 22. And last but not least, cells can contain
    **code**. The remainder of the book will be about that! So, it''s time to start
    coding, but before doing that, one last bit: you need to download the Jupyter
    Notebooks associated with this book.


    # Downloading the book material


    Throughout the rest of the book, you will find 38 chapters. For each chapter,
    there is a Jupyter Notebook, whose file name includes the corresponding chapter
    number. Each Notebook contains the examples discussed in the text so that you
    can practice and understand while reading. Download the Notebooks at www.learnpythonwithjupyter.com.
    I highly recommend that you save the Notebooks in a *new folder*—not in the *Download*
    folder—so that you don''t mix them up with other files you download for other
    purposes. If you feel like going a step further, I really recommend that you create
