    # Recap


    +   - An algorithms is a sequence of steps to execute a task

    - When writing an algorithm (and code in general), we largely use parallelism,
    testing, debugging, and divide and conquer


    > ### Why do we say Debugging, Divide and conquer, and Algorithms?


    Do you know why we say *debugging*, *divide and conquer*, and *algorithms*? The
    term *debugging* originated in 1947, when a moth was found in a relay of Mark
    II computer at Harvard University, causing the computer to malfunction. The moth
    was then taped to a log sheet, with the annotation *Relay 70 Panel F (moth) in
    relay. First actual case of a bug being found* (see figure below). Although the
    word *debugging* is not mentioned in the annotation, it became popular thanks
    to Grace Hopper, who worked on the same computer$^{a,b}$. *Divide and conquer*
    is attributed to Philip II of Macedon, and it was reused by the Roman ruler Julius
    Caesar, the French emperor Napoleon, and many more$^c$. It refers to a military
    strategy where the invaders divide the enemy forces to defeat them more easily
    and conquer them as a whole. Finally, the term *algorithm* derives from al-Khwarizmi,
    the last name of Muhammad ibn Musa al-Khwarizmi, a 9th-century Persian mathematician
    and astronomer whose books were widely read in Europe in the late Middle Ages.
    He wrote a book on the Hindu–Arabic numeral system, which was translated into
    Latin in the 12th century. The latin manuscript starts with the phrase *Dixit
    Algorizmi* ("Thus spoke Al-Khwarizmi"), where "Algorizmi" was the translator''s
    Latinization of Al-Khwarizmi''s last name$^d$.


    ---

    $^a$ https://en.wikipedia.org/wiki/Debugging

    $^b$ https://en.wikipedia.org/wiki/Grace_Hopper

    $^c$ https://en.wikipedia.org/wiki/Divide_and_rule

    $^d$ https://en.wikipedia.org/wiki/Algorithm'
