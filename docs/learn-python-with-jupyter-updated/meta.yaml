    \ list friends (line 2).\n\nLet's now run the third cell, which contains the first\
    \ for loop:\n\n```\n[3]:\n1  for index in range (0,4):\n2      print(\"index:\"\
    \ + str(index))\n3      print(\"friend:\" + friends[index])\nindex: 0\nfriend:\
    \ Geetha\nindex: 1\nfriend: Luca\nindex: 2\nfriend: Daisy\nindex: 3\nfriend: Juhan\n\
    ```\n\nfor index in range from zero to four\nprint index: concatenated with string\
    \ of index\nprint friend: concatenated with friends in position index\n\nThe code\
    \ prints the position and the value of each list element by repeating lines 2\
    \ and 3 four times. How does this happen? Let's start from line 1, which is the\
    \ header of the for loop. It consists of five components:\n\n- **for**: The keyword\
    \ starting a for loop. Like all keywords, it is bold green in Jupyter Notebook.\n\
    - **index**: A variable that is assigned a different value at each loop iteration\
    \ (we'll talk more about this in a bit).\n- **in**: A membership operator, the\
    \ same that you learned in the construct if...in/else in Chapter 3.\n- **range()**:\
    \ A built-in Python function. You can recognize this as a function because it\
    \ is followed by round brackets and is colored green in Jupyter Notebook—like\
    \ `input()` and `print()`. We'll talk more about `range()` in a bit too.\n- **:**\
