    \ when we align quotes, brackets, and other symbols — as you will see in the following\
    \ chapters — we create code that is more **readable** and **less prone to errors**.\
    \ We will also talk quite a bit about tricks to minimize the amount of possible\
    \ errors that we might introduce in code.\n\nOne more question before the recap:\
    \ where do we see the function `print()` in action in everyday life? Every time\
