  md: '# Part 3. Introduction to the for loop


    # Recap


    +   - To change list elements, we always need to reassign the changed element
    to itself

    - String methods to change cases are: .lower(), .upper(), .title(), and .capitalize().


    # In what list am I changing the element?


    Sometimes, we have to change a list element before adding it to an existing list.
    This can create confusion about *where* to change the list element. Let''s consider
    this example:


    +   - Given the following list:


    ```

    [1]: 1 sports = ["diving", "hiking"] sports is assigned diving, hiking

    ```


    +   - Add the mountain sport to the following list, making sure the string is
    uppercase:


    ```

    [2]: 1 mountain_sports = ["CLIMBING"] mountain_sports is assigned CLIMBING

    ```


    We want to take the string "hiking" from the list `sports`, transform it into
    "HIKING", and add it to the list `mountain_sports`. Where do we change the string
    to uppercase? Let''s have a look at these two cases.


    Case 1: Changing the element both in the original list and in the new list.

    Consider the following code:


    ```

    [3]: 1 sports[1] = sports[1].upper() sports in position 1 is assigned sports in
    position 1 dot upper

    2 mountain_sports.append(sports[1]) mountain_sports dot append sports in position
    1

    3 print(sports) print sports

    4 print(mountain_sports) print mountain_sports

    [''diving'', ''HIKING'']

    [''CLIMBING'', ''HIKING'']

    ```


    In this example, we first change the element in position 1 to uppercase (line
    1), and then we append the changed element to the list `mountain_sports` (line
    2). When we print out the two lists (lines 3 and 4), we see that the element "HIKING"
    is uppercase in both lists. As you can imagine, changing the element in the original
    list is not the best option because we might need the original list `sports` for
    further computations. How do we make "hiking" uppercase only in `mountain_sports`?
    Let''s have a look at the next example.'
