    \  print(animals[2])\n    ```\n\n    Output:\n    ```\n    ['dog', 'cat']\n  \
    \  ['cow', 'sheep', 'horse', 'chicken', 'rabbit']\n    ['panda', 'elephant', 'giraffe',\
