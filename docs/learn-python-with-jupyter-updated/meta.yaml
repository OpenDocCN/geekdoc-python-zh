  - "[PAGE 211]\n\n# Part 6. Focus on lists and for loops\n\n\"swimming\", \"surfing\"\
    ]—(line 1). During each *outer* for loop, the *inner* for loop browses the current\
    \ sub-list from 0 (omitted) to the length of the sub-list, which is `len(sports[i])`\
    \ (line 2). At each iteration of the *inner* for loop, we print the current element\
    \ `sports[i][j]` (line 3). In practice:\n\n+   - In the first *outer* loop, i\
    \ is 0 and we execute a full *inner* loop to browse the first sub-list:\n  - In\
    \ the first *inner* loop, j is 0, so we print `sports[0][0]`, which is \"skiing\"\
    .\n  - In the second *inner* loop, j is 1, thus we print `sports[0][1]`, which\
    \ is \"skating\".\n  - In the third *inner* loop, j is 2, so we print `sports[0][2]`,\
    \ which is \"curling\". The *inner* for loop is over and we go to the second *outer*\
    \ for loop.\n- In the second *outer* loop, i is 1 and we execute another full\
    \ *inner* loop to browse the second sub-list:\n  - In the first *inner* loop,\
    \ j is 0, thus we print `sports[1][0]`, which is \"canoeing\".\n  - In the second\
    \ *inner* loop, j is 1, so we print `sports[1][1]`, which is \"cycling\".\n  -\
    \ In the third *inner* loop, j is 2, thus we print `sports[1][2]`, which is \"\
    swimming\".\n  - In the fourth *inner* loop, j is 3, so we print `sports[1][3]`,\
    \ which is \"surfing\". The *inner* for loop is over; also the *outer* for loop\
    \ is concluded because there are no more sub-lists.\n\nCan we do the same with\
    \ a for loop through *elements*? Yes! Try to guess how to do it before looking\
    \ into the following code!\n\n+   - Print the sub-list elements one-by-one using\
    \ a nested for loops through *elements*:\n\n```\n[6]:\n1  for seasonal_sports\
    \ in sports:\n2      for sport in seasonal_sports:\n3          print (sport)\n\
    \nskiing\nskating\ncurling\ncanoeing\ncycling\nswimming\nsurfing\n```\n\nIn the\
    \ *outer* for loop, the variable `seasonal_sports` is assigned once the first\
    \ sub-list and once the second sub-list (line 1). In the *inner* for loop, the\
    \ variable `sport` is assigned each element of the current sub-list (line 2).\
    \ For each iteration of the *inner* for loop, we print the current value of the\
    \ variable `sport` (line 3). In other words:\n\n+   - In the first iteration of\
    \ the *outer* for loop, `seasonal_sports` is [\"skiing\", \"skating\", \"curling\"\
    ] and the *inner* for loop browses all the sub-elements of `seasonal_sports` in\
    \ the following way:\n  - In the first *inner* loop, sport is \"skiing\".\n  -\
    \ In the second *inner* loop, sport is \"skating\".\n  - In the third *inner*\
    \ loop, sport is \"curling\". The *inner* for loop ends, and we go back to the\
    \ outer for loop.\n- In the second iteration of the *outer* for loop, `seasonal_sports`\
    \ is [\"canoeing\", \"cycling\", \"swimming\", \"surfing\"] and the *inner* for\
    \ loop browses all the sub-elements of `seasonal_sports` in the following way:\n\
    \  - In the first *inner* loop, sport is \"canoeing\"."
  - "[PAGE 212]\n\n+   - In the second *inner* loop, sport is \"cycling\".\n- In the\
    \ third *inner* loop, sport is \"swimming\".\n- In the fourth *inner* loop, sport\
    \ is \"surfing\". The *inner* for loop ends, as well as the *outer* for loop because\
    \ we went thought all the sub-lists.\n\n# 3. Flattening\n\n**Flattening means\
    \ transforming a list of lists into a list.** In other words, we take the sub-elements\
    \ out of their sub-lists and we put them in a list. There are many ways of doing\
    \ this operation. We are going to see four different ways, but there can be more.\
    \ For each way, try to implement it yourself first, and then look into the example\
    \ and explanation below.\n\n+   - Given the following list of lists:\n\n```\n\
    [7]: 1 instruments = [[\"contrabass\", \"cello\", \"clarinet\"], [\"gong\", \"\
    guitar\"], [\"tambourine\", \"trumpet\", \"trombone\", \"triangle\"]]\n    instruments\
    \ is assigned contrabass, cello, clarinet, gong, guitar, tambourine, trumpet,\
    \ trombone, triangle\n```\n\n+   - Flatten the list using a nested for loop through\
    \ *indices*:\n\n```\n[8]: 1 flat_instruments = []\n    flat instruments is assigned\
    \ empty list\n    2 for i in range(len(instruments)):\n    for i in range len\
    \ instruments\n    3     for j in range(len(instruments[i])):\n    for j in range\
    \ len instruments in position i\n    4         flat_instruments.append(instruments[i][j])\n\
    \    flat instruments dot append instruments in position i in position j\n   \
    \ 5 print (flat_instruments)\n    print flat instruments\n    ['contrabass', 'cello',\
    \ 'clarinet', 'gong', 'guitar', 'tambourine', 'trumpet', 'trombone', 'triangle']\n\
    ```\n\nWe start with the empty list flat_instruments, which we are going to fill\
    \ out during the subsequent nested for loop (line 1). Then, for each position\
    \ in the list of lists (line 2) and each position in each sub-list (line 3), we\
    \ append the current sub-element instruments[i][j] to flat_instruments (line 4).\
    \ Finally, we print the final list (line 5). As you can notice, we flattened instruments,\
    \ that is, we transform a list of lists into a list whose elements were instruments's\
    \ sub-elements.\n\n+   - Flatten the list using a nested for loop through *elements*:\n\
    \n```\n[9]: 1 flat_instruments = []\n    flat instruments is assigned empty list\n\
    \    2 for group in instruments:\n    for group in instruments\n    3     for\
    \ instrument in group:\n    for instrument in group\n    4         flat_instruments.append(instrument)\n\
    \    flat instruments dot append instrument\n    5 print (flat_instruments)\n\
    \    print flat instruments\n    ['contrabass', 'cello', 'clarinet', 'gong', 'guitar',\
    \ 'tambourine', 'trumpet', 'trombone', 'triangle']\n```\n\nSimilarly to the previous\
    \ example, we start with the empty list flat_instruments (line 1). We browse the\
    \ sub-lists using the *outer* for loop (line 2), and within each sub-list, we\
    \ browse the sub-elements using the *inner* for loop (line 3). We append the current\
    \ sub-element to flat_instruments (line 4). Finally, we print the obtained flattened\
    \ list (line 5)."
