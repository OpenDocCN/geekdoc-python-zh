    > **Divide and conquer** means **dividing** a project into **sub-projects**, **solving**
    the sub-projects, and **combining the solutions** of the sub-projects to obtain
    the solution of the original project


    In other words, there are three steps to solve a computational (but not strictly
    computational!) task:


    +   1. Break the project into subprojects

    2. Solve the subprojects separately

    3. Merge the solutions of the subprojects to obtain the solution of the whole
    project


    Last but not least, let''s talk about algorithms! You have surely heard this word
    many times. What is an algorithm?


    > An **algorithm** is a **sequence of rigorous steps** to **execute and complete
    a task**


    Algorithms are just procedures to solve tasks, problems, or assignments. They
    do not have to be complicated. They can actually be pretty simple. There are plenty
    of algorithms in everyday life! Think about the sequence of steps you make to
    brush your teeth: taking the toothpaste tube, opening and squeezing it, placing
