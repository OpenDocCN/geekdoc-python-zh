    We start with an `if` condition to check if the computer pick equals "rock" (line
    1). Then we evaluate the player''s choice. If the player''s choice equals "rock"
    (line 4), then we print that it''s a tie (line 5). If the player''s choice equals
    "paper" (line 6), then we print that the player wins (line 7). Finally, in the
    remaining case—the player''s choice is "scissors"—(line 8), we print that the
    computer wins (line 9). The code is very simple: an `if` condition containing
    an `if/elif/else` construct with prints in the statements. As you can see, we
    **print a message directly to the player**, not to the coder. You might remember
