    \ 17 行），并再次询问玩家是否想要更多糖果（第 20 行）。然后，我们将再次回到 while 循环头部（第 11 行）。如果第 20 行的答案再次是 yes，我们将再次重复上述操作，即：给变量\
    \ `number_of_candies` 增加一个单位（第 14 行），…… 我们将**只要**变量 `answer` 等于 yes，就一直这样做。如果玩家在第\
    \ 20 行回答 *no* 会怎样？当我们回到 while 循环头部（第 11 行）时，条件不再成立，因为 `answer` 不等于 yes！所以循环停止，我们直接跳到\
    \ while 循环体之后的第一行（第 23 行）。在那里，我们打印出糖果的总数。\n\n现在让我们看看语法。while 循环以一个**头部**（第 11\
    \ 行）开始，它由三部分组成：(1) 关键字 `while`，(2) 一个条件，和 (3) 冒号 `:`（每个结构头部都以冒号结尾！）。在这个例子中，我们检查分配给变量\
    \ `answer` 的值是否等于字符串 \"yes\"。我们将在下一章看到其他类型的条件。头部之后是 while 循环的**主体**（第 13-20 行）。主体是**缩进的**，类似于\
    \ `for` 循环主体和 `if/elif/else` 语句。现在让我们把注意力集中在两个变量上：`answer` 和 `number_of_candies`。\n\
    \n你看到变量 `answer` 多少次，分别在哪里？`answer` 出现在**三个**不同的地方：(1) while 循环**之前**（第 8 行），(2)\
    \ while 循环的**条件中**，以及 (3) while 循环的**主体中**。为什么我们需要它出现三次？在 while 循环之前，我们必须初始化包含在\
    \ while 循环头部条件中的变量；否则，当循环开始时，我们无法评估条件本身。在我们的例子中，我们用玩家的第一个回答初始化了 `answer`（第 8 行）。然后，我们必须检查涉及变量\
    \ `answer` 的条件。在这种情况下，我们检查 `answer` 是否等于 yes（第 11 行）。最后，我们必须允许变量发生变化（第 20 行），以便循环可以终止；否则，循环将无限期地继续下去。我们迟早都会忘记这最后一部分，从而陷入**无限循环**！如果这发生在你身上，只需停止单元格（如果运行时间太长，重启内核！）\n\
    \n最后，让我们看看变量 `number_of_candies`。你看到它多少次，分别在哪里？`number_of_candies` 出现在**两个**地方：(1)\
    \ while 循环**之前**，它在这里被**初始化**（第 2 行），以及 (2) while 循环**内部**，它在这里每次循环**增加**一个单位（第\
    \ 14 行）。变量 `number_of_candies` 通常被称为**计数器**，因为**它记录循环的次数**。符号 `+=` 是一个**赋值符号**，我们可以读作\
    \ *增加*。它是 `number_of_candies = number_of_candies + 1` 的一种紧凑写法。对于任何算术运算符，都有一个相关的赋值运算符，即\
    \ `-=`（*减少*）、`*=`（*乘以并重新赋值*）、`/=`（*除以并重新赋值*）等。请注意，在赋值运算符中，符号 `=` 总是位于第二位，在算术运算符之后。\n\
    \n## 第 5 部分。while 循环与条件\n\nfor 循环和 while 循环有什么区别？在第 8 章中，我们将 while 循环定义如下：\n\n\
    > **for 循环**是将一组命令重复执行**确定**次数\n\n在 **for 循环**中，我们确切地知道我们将运行循环体中的命令**多少次**。相反，**在\
    \ while 循环中，我们*不*知道**我们将运行循环体中的命令多少次，因为 while 循环的持续时间取决于头部条件的有效性。让我们定义 while 循环并总结其特点：\n\
    \n> **while 循环**是将一组命令重复执行**只要一个条件成立**\n\n当头部的条件不再为真时，while 循环停止。我们必须始终给条件中的变量提供变化的可能性，以便头部的条件可以变为假，循环可以停止。如果条件中的变量（在我们的例子中是\
    \ `answer`）在 while 循环主体中无法改变，那么我们将得到一个无限循环。最后，要知道我们运行循环多少次，我们可以使用一个计数器（在我们的例子中是\
    \ `number_of_candies`）来跟踪迭代次数。计数器的存在不是强制性的。\n\n## 插入到正确的列中\n\n到目前为止，你已经学习了几种运算符：算术运算符、赋值运算符和比较运算符。将每个符号插入到正确的列中：\n\
