    Editing and proofreading of introductory sections and Chapters 1-22 by John Batson

    Cover design by Federica Dias (www.behance.net/federicadias)


    www.learnpythonwithjupyter.com


    > Eccoci nuovamente insieme per imparare a leggere e a scrivere.

    Io direi, però, di più: per imparare a conoscere meglio il mondo e noi stessi.

    *Here we are again together to learn how to read and write.*

    *Actually, I would go further: to learn to better understand the world and ourselves.*

    —Alberto Manzi, Non è mai troppo tardi, *It''s never too late*


    > Simple is better than complex.

    —Tim Peters, The Zen of Python


    # Content


    About this book

    p. ix


    Introduction


    What we need to learn when learning coding

    p. xiii


    Getting ready


    The Jupyter/Python environment

    p. 3


    Downloading the book material

    p. 8


    Part 1: Creating the basics


    | Chapter | Syntax | Computational thinking | In more depth |

    | :--- | :--- | :--- | :--- |

    | 1. Text, questions, and art

    p. 11 | ■ Strings

    ■ Built-in functions

    input() and print() | ■ Getting information from a user

    ■ Printing to the screen | Our fingers have memory

    p. 16 |

    | 2. Events and favorites

    p. 18 | ■ Assignment symbol

    ■ Concatenation symbol | ■ Creating variables

    ■ Assigning values to variables

    ■ Concatenating strings | Dealing with NameError and SyntaxError

    p. 21 |


    Part 2: Introduction to lists and if/else


    | Chapter | Syntax | Computational thinking | In more depth |

    | :--- | :--- | :--- | :--- |

    | 3. In a bookstore

    p. 25 | ■ Lists

    ■ if/else construct

    ■ Membership operator in

    ■ Indentation | ■ List as a collection datatype

    ■ Executing command based on binary conditions | Let''s give variables meaningful
    names!

    p. 28 |

    | 4. Grocery shopping

    p. 30 | ■ List methods

    .append() and

    .remove() | ■ Methods as functions for a specific datatype

    ■ Adding and removing elements to/from a list based on conditions | Why do we
    print so much?

    p. 34 |

    | 5. Customizing the burger menu

    p. 36 | ■ List method .index(),

    .pop(), and .insert() | ■ Associating a list element to an index

    ■ Finding an element index

    ■ Adding and removing elements to/from a list based on index | We code in English!

    p. 39 |

    | 6. Traveling around the world

    p. 41 | ■ Three-s rule

    ■ Plus one rule and minus one rule | ■ Slicing to extract elements from a list

    ■ Slicing using positive and negative indices, and in direct and reverse order

    ■ Omitting indices | Why the plus one rule?

    p. 47 |

    | 7. Senses, planets, and a house

    p. 50 | ■ Keyword del | ■ Replacing, adding, and removing elements using list
    slicing

    ■ List concatenation

    ■ Deleting a variable vs. its content

    ■ Transitioning from list methods to slicing | What is the kernel?

    p. 56 |


    # Part 3. Introduction to the for loop


    | Chapter | Syntax | Computational thinking | In more depth |

    | :--- | :--- | :--- | :--- |

    | 8. My friends'' favorite dishes p. 61 | - for loop<br>- Built-in functions range()
    and str() | - For loop to repeat commands<br>- For loop to automatically slice
    a list | Dealing with IndexError and IndentationError p. 66 |

    | 9. At the zoo p. 69 | - Comparison operator ==<br>- Built-in function len()<br>-
    # for commands<br>- Abbreviating index with i | - Binary condition in command
    repetition<br>- Code commenting | Dealing with TypeError p. 73 |

    | 10. Where are my gloves? p. 76 | - Comparison operators !=, >, >=, <, <= | -
    Searching an element in a list based on element length or position, by combining
    for loop and if/else construct<br>- Using variables in place of hard-coded values
    | Let''s use keyboard shortcuts! p. 82 |

    | 11. Cleaning the mailing list p. 85 | - String methods .lower(), .upper(), .title(),
    .capitalize() | - Changing list elements in a for loop with reassignment | In
    what list am I changing the element? p. 88 |

    | 12. What a mess at the bookstore! p. 91 | - Special character "\n" | - Creating
    lists in a for loop<br>- String slicing<br>- Multiple consecutive slicing | Append
    or concatenate. Don''t assign! p. 96 |


    # Part 4. Numbers and algorithms


    | Chapter | Syntax | Computational thinking | In more depth |

    | :--- | :--- | :--- | :--- |

    | 13. Implementing a calculator p. 101 | - Arithmetic operators<br>- Built-in
    functions int(), float(), type()<br>- Keyword elif | - Number variables as strings,
    integers, or floats<br>- Testing multiple variable values using elif<br>- Combining
    code in a code unit | Solving arithmetic expressions p. 108 |

    | 14. Playing with numbers p. 110 | (no new syntax) | - Changing numbers based
    on conditions<br>- Separating numbers based on conditions<br>- Finding the maximum
    in a list of numbers<br>- Determining number visibility using modulus | Don''t
    name variables with reserved words! p. 113 |

    | 15. Fortune cookies p. 116 | - Keyword import<br>- random module functions .randing(a,b)
    and .choice(list) | - Module as a unit containing specific functions<br>- Importing
    a module<br>- Randomness in coding | What if I don''t use the index in a for loop?
    p. 119 |

    | 16. Rock paper scissors p. 121 | (no new syntax) | - Testing, debugging, parallelism,
    divide and conquer, algorithm | Why do we say Debugging, Divide and conquer, and
    Algorithms? p. 127 |


    # Part 5. The while loop and conditions


    | Chapter | Syntax | Computational thinking | In more depth |

    | :--- | :--- | :--- | :--- |

    | 17. Do you want more candies?<br>p. 131 | ■ Keyword `while` | ■ While loop to
    ask for unknown number of inputs<br>■ Counter<br>■ Initializing and changing for
    the variable in the condition | *Writing code is like writing an email!*<br>p.
    135 |

    | 18. Animals, unique numbers, and sum<br>p. 137 | (no new syntax) | ■ Identifying
    various kinds of conditions<br>■ Problem solving using divide and conquer | *Don''t
    confuse the while loop with if/else!*<br>p. 147 |

    | 19. And, or, not, not in<br>p. 150 | ■ The logical operators and, or, and not<br>■
    The membership operator `not in` | ■ Merging conditions<br>■ Reversing conditions
    | *What is GitHub?*<br>p. 155 |

    | 20. Behind the scenes of comparisons and conditions<br>p. 157 | ■ Booleans |
    ■ Booleans as outcomes of single or several conditions<br>■ Truth tables<br>■
    Booleans as flags in while loops | *What is the difference between GeeksforGeeks
    and Stack Overflow?*<br>p. 162 |


    # Part 6. Recap of lists and for loops


    | Chapter | Syntax | Computational thinking | In more depth |

    | :--- | :--- | :--- | :--- |

    | 21. Overview of lists<br>p. 167 | ■ List methods: `.clear()`, `.copy()`, `.count()`,
    `.extend()`, `.reverse()`, `.sort()` | ■ Arithmetic operations on list elements<br>■
    "Arithmetic" operations between lists<br>■ List assignment<br>■ Adding and removing
    list elements<br>■ List sorting and searching | *Why not use a for loop to remove
    list elements?*<br>p. 176 |

    | 22. More about the for loop<br>p. 180 | ■ Built in functions `list()` and `enumerate()`
    | ■ For loop as a repetition of commands<br>■ For loop through indices, elements,
    and indices and elements<br>■ List comprehension<br>■ Tuples<br>■ Nested for loop
    | *Basics of Markdown*<br>p. 189 |

    | 23. List of lists<br>p. 192 | ■ (no new syntax) | ■ Lists of lists<br>■ Slicing
    lists of lists<br>■ For loop to browse lists of lists<br>■ Flattening lists of
    lists | *Lists of lists and images*<br>p. 196 |'
  mdcn: '# 使用 Jupyter 学习 Python


    Serena Bonaretti


    www.learnpythonwithjupyter.com


    亲爱的编程者，


    感谢你对 *使用 Jupyter 学习 Python* 的兴趣！我希望它能帮助你学习计算思维和 Python 编程！


    *使用 Jupyter 学习 Python* 的编写是一项**进行中的工作**。我每 4-6 周发布一个新章节，因为我在工作之余撰写这本书。这就是为什么它需要一些时间。


    *使用 Jupyter 学习 Python* 是**开放且免费**的，并且将保持开放和免费。在本书完成后，我可能会出版一本印刷版。那将有一个（低廉的）成本来覆盖印刷和分发费用。


    你可以在这篇 Jupyter 博客文章中找到一些关于 *使用 Jupyter 学习 Python* **构建**的信息：https://blog.jupyter.org/introducing-learn-python-with-jupyter-11214f152159。我将在未来的文章中更广泛地讨论
    *使用 Jupyter 学习 Python* 背后的语言学、教学法和心理学方面。


    如果你有任何评论或问题，请**给我发邮件**至 serena.bonaretti.research@gmail.com，我将很乐意回复。


    感谢你与我一起学习，

    Serena


