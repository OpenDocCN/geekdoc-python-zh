  mdcn: "## 7. 感官、行星与一列火车\n\n使用切片修改、添加和删除列表元素\n\n既然你已经了解了切片的所有知识，让我们看看如何用它来操作列表——即如何修改、添加或删除列表元素。请从\
    \ www.learnpythonwithjupyter.com 下载并打开第7个 Jupyter Notebook，然后跟着一起操作。与上一章类似，用一张纸盖住这些页面中的代码。首先，尝试猜测要执行的命令，然后与下面的代码进行比较。别忘了大声读出代码！\n\
    \n## 1. 感官\n\n让我们首先学习如何使用**切片**和**赋值**来**修改列表元素**。\n\n- 从以下列表开始：\n\n```python\n\
    senses = [\"eyes\", \"nose\", \"ears\", \"tongue\",\n          \"skin\"]\nprint(senses)\n\
    # Output: ['eyes', 'nose', 'ears', 'tongue', 'skin']\n```\n\n列表 `senses` 包含五个字符串：\"\
    eyes\"、\"nose\"、\"ears\"、\"tongue\" 和 \"skin\"（第1行），我们将其打印出来（第2行）。\n\n- 将 \"nose\"\
    \ 替换为 \"smell\"：\n\n```python\nsenses[1] = \"smell\"\nprint(senses)\n# Output:\
    \ ['eyes', 'smell', 'ears', 'tongue', 'skin']\n```\n\n要修改**一个列表元素**，我们将新值赋给切片后对应元素位置的列表。在这个例子中，我们想替换的元素——\"\
    nose\"——位于位置1。因此，我们切片位置1的列表，并将新字符串 \"smell\" 赋值给它（第1行）。然后，我们打印列表以检查修改是否正确（第2行）。\n\
    \n此时，你可能会问：既然我已经知道如何用方法来操作列表，为什么还要学习使用切片来操作列表呢？至少有三个原因！第一个原因：**减少出错的可能性**。第1行的代码是我们第5章学过的代码的替代方案，当时我们用了三个方法来替换一个元素，即：\n\
    \n```python\nnose_index = senses.index(\"nose\")\nsenses.pop(nose_index)\nsenses.insert(nose_index,\
    \ \"smell\")\n```\n\n通过使用切片，我们将命令数量从3个减少到1个，并且不需要创建额外的变量——`nose_index`。通过编写更少的代码，我们最大限度地减少了出错的可能性！第二个原因：**切片使代码编写更快**。想象一下你需要替换4个元素。使用切片，你只需要写4行代码；而使用列表方法，则需要12行！最后，第三个原因：从列表方法过渡到列表切片，使我们能够从更具体的思维方式转向更**抽象的思维方式**。如你所知，使用列表方法时，我们使用的是一种更接近*自然*语言的*编码*语言。方法名称实际上是英语词汇中的单词，例如\
    \ *remove*、*insert* 等。而使用切片时，我们使用数字——代表元素位置——因此我们用（数字）符号代替了单词。如你所见，我们正在逐步构建编码所需的抽象思维。所以，让我们继续吧！\n\
    \n- 将 \"tongue\" 和 \"skin\" 替换为 \"taste\" 和 \"touch\"：\n\n```python\nsenses[3:5]\
    \ = [\"taste\", \"touch\"]\nprint(senses)\n# Output: ['eyes', 'smell', 'ears',\
    \ 'taste', 'touch']\n```\n\n要修改列表中的**多个元素**，首先切片我们想要替换的元素，然后将包含新值的列表赋值给它们。在这个例子中，我们想替换两个元素，所以我们使用三步规则进行切片。起始位置是\
    \ \"tongue\" 的位置，即3，停止位置是 \"skin\" 的位置，即4，但由于加一规则，它变成了5。步长是1，所以我们可以省略它。我们将包含新元素的列表——字符串\
    \ \"taste\" 和 \"touch\"——赋值给切片后的列表（第1行）。最后，我们打印列表以确保修改正确发生（第2行）。\n\n- 将 \"eyes\"\
    \ 和 \"ears\" 替换为 \"sight\" 和 \"hearing\"：\n\n```python\nsenses[0:3:2] = [\"sight\"\
    , \"hearing\"]\nprint(senses)\n# Output: ['sight', 'smell', 'hearing', 'taste',\
    \ 'touch']\n```\n\n与上一个例子类似，我们想替换多个元素。所以，我们首先切片列表。起始位置是 \"eyes\" 的位置，即0（可以省略）。停止位置是\
    \ \"ears\" 的位置，即2，但由于加一规则，它变成了3。这两个元素不相邻，因此我们必须写出步长，即2。最后，我们将包含我们想要添加的两个字符串的列表赋值给切片后的列表：\"\
    sight\" 和 \"hearing\"。请注意，我们想要替换的两个元素不相邻，但 Python 会负责将 \"sight\" 和 \"hearing\"\
    \ 放在正确的位置（第1行）。最后，我们打印最终列表以检查所做的修改（第2行）。\n\n## 2. 行星\n\n要向列表中**添加新元素**，我们可以使用**切片结合列表拼接和赋值**。怎么做？让我们看看下面的例子！\n\
    \n- 从以下列表开始：\n\n```python\nplanets = [\"Mercury\", \"Mars\", \"Earth\", \"Neptune\"\
    ]\nprint(planets)\n# Output: ['Mercury', 'Mars', 'Earth', 'Neptune']\n```\n\n\
    我们从列表 `planets` 开始，它包含四个字符串：\"Mercury\"、\"Mars\"、\"Earth\" 和 \"Neptune\"（第1行），我们将其打印出来（第2行）。\n\
    \n- 在列表末尾添加 \"Jupiter\"：\n\n```python\nplanets = planets + [\"Jupiter\"]\nprint(planets)\n\
    # Output: ['Mercury', 'Mars', 'Earth', 'Neptune', 'Jupiter']\n```\n\n要在列表末尾添加一个元素，我们（1）将其放入一个列表中，（2）将其与原始列表拼接，（3）将结果赋值给原始列表。这比听起来简单！让我们从第1行的最右边开始。我们取新元素\
    \ \"Jupiter\"——它是一个字符串——并将其放在方括号中以将其转换为一个列表：`[\"Jupiter\"]`。为什么我们需要改变 \"Jupiter\"\
    \ 的数据类型？因为我们想使用拼接将其添加到列表 `planets` 中。而且，就像字符串拼接一样，我们只能将字符串与字符串拼接；在列表拼接中，我们只能将列表与列表拼接。请注意，列表拼接的工作方式与字符串拼接相同。最后，我们将操作的结果赋值给原始列表\
    \ `planets` 以实际修改它。通常我们说将结果重新赋值给原始列表。整个操作构成了 `.append()` 方法的替代方案。最后，我们打印修改后的列表以检查代码的正确性（第2行）。\n\
    \n你可能已经意识到，在这个例子中没有切片！这是因为这是一个特殊情况，我们在列表末尾添加一个元素——如果我们在列表开头添加一个元素也是类似的。我们可以写 `planets[0:4]\
    \ + [\"Jupiter\"]`，其中 `planets[0:4]` 切片了列表中的所有元素，但那是多余的。让我们在接下来的两个例子中看看切片的实际应用！\n\
    \n- 在 \"Mars\" 和 \"Earth\" 之间添加 \"Venus\"：\n\n```python\nplanets = planets[0:2]\
    \ + [\"Venus\"] + planets[2:5]\nprint(planets)\n# Output: ['Mercury', 'Mars',\
    \ 'Venus', 'Earth', 'Neptune', 'Jupiter']\n```\n\n在这个例子中，我们想在列表中间添加一个元素。为此，我们（1）在想要插入新元素的位置将列表分成两段，（2）通过将新元素作为列表与两个列表段拼接来插入它，（3）将结果赋值给原始列表。像之前一样，这比听起来简单！我们想在\
    \ \"Mars\" 和 \"Earth\" 之间分割列表。因此，第一个列表段将包含 \"Mercury\" 和 \"Mars\"。所以，我们从位置0（对应\
    \ \"Mercury\"）开始切片 `planets`，并在位置2停止（由于加一规则）；\"Mars\" 在位置1。\n\n第二个列表段将包含 \"Earth\"\
    、\"Neptune\" 和 \"Jupiter\"。所以，我们从位置2（对应 \"Earth\"）开始切片，并在位置5停止（由于加一规则）；\"Jupiter\"\
    \ 在位置4。在两个列表段之间，我们拼接一个包含字符串 \"Venus\" 的新列表——像之前一样，我们必须将 \"Venus\" 从字符串更改为列表。我们通过将拼接结果赋值给原始列表来结束操作。你可能已经意识到，这一行是\
    \ `.insert()` 方法的替代方案（第1行）。最后，我们打印获得的列表以检查操作的正确性（第2行）。\n\n思考整个过程的一个好方法是将列表想象成一列**玩具火车**，其中每个列表元素都是一节车厢。当我们想插入一节新车厢，例如一节餐车时，我们在想要新车厢的位置将火车分成两部分。然后，我们将火车的第一部分添加到餐车的左侧，将火车的第二部分添加到餐车的右侧。这样，我们就得到了修改后的火车！\n\
    \n- 在 \"Neptune\" 和 \"Jupiter\" 之间添加 \"Uranus\" 和 \"Saturn\"：\n\n```python\nplanets\
    \ = planets[:5] + [\"Uranus\", \"Saturn\"] + planets[5:]\nprint(planets)\n# Output:\
    \ ['Mercury', 'Mars', 'Venus', 'Earth', 'Neptune', 'Uranus', 'Saturn', 'Jupiter']\n\
    ```\n\n要在列表中间插入**多个连续元素**，我们使用与上面相同的方法。我们从开头（起始位置省略）切片列表 `planets` 的第一部分到位置5，这对应于\
    \ \"Neptune\" 的位置加1。然后，我们将两个新元素 \"Uranus\" 和 \"Saturn\" 作为一个列表进行拼接。最后，我们拼接列表 `planets`\
    \ 的剩余部分，从位置5（对应 \"Jupiter\"）开始，到列表末尾结束（停止位置省略）。你可能会注意到，当我们想在列表中间插入多个连续元素时，我们只需**将所有元素放入一个列表中**（第1行）。最后，我们打印修改后的列表以检查是否正确添加了新元素（第2行）。\n\
    \n现在有一个技巧！我们看到第一个列表段的起始位置和第二个列表段的停止位置被省略了。此外，你可能已经注意到第一个列表段的停止位置与第二个列表段的起始位置重合——它们都是5。这是因为第一个列表段的停止位置应用了加一规则。因此，当使用切片添加新元素时，我们**只需计算第一个列表段的停止位置**。它将与第二个列表段的起始位置重合。其余的起始和停止位置可以省略！\n\
    \n在继续之前有一个重要说明：在过去的三个例子中，我们从赋值符号的右侧开始分析代码。专注于那一侧是很常见的，因为那是我们定义变量更改和操作的地方。有时，我们甚至可以从赋值符号的右侧开始编写代码，然后在左侧输入相应的变量名。从**反向分析或编写代码**开始是非常常见的！"
