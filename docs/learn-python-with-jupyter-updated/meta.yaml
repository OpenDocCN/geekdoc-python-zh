- md: '# Learn Python with Jupyter


    Serena Bonaretti


    www.learnpythonwithjupyter.com


    Dear coder,


    Thanks for your interest in *Learn Python with Jupyter*! I hope it will help you
    learn computational thinking and coding in Python!


    The writing of *Learn Python with Jupyter* is a **work in progress**. I release
    a new chapter every 4-6 weeks, as I write the book around working hours. That
    is why it is taking a bit of time.


    *Learn Python with Jupyter* is **open and free** and it will remain open and free.
    Upon completion of the book, I might publish a printed copy. That would have a
    (low) cost to cover printing and distribution.


    You can find some information about the **construction** of *Learn Python with
    Jupyter* in this Jupyter Blog post: https://blog.jupyter.org/introducing-learn-python-with-jupyter-11214f152159.
    I will write more extensively about linguistic, pedagogical, and psychological
    aspects behind *Learn Python with Jupyter* in a future post.


    If you have any comments or questions, please **email me** at serena.bonaretti.research@gmail.com,
    and I will be happy to reply.


    Thank you for learning with me,

    Serena


    # Learn Python with Jupyter


    Serena Bonaretti


    www.learnpythonwithjupyter.com


