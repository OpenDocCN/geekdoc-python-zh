    ```


    print from the beginning of the list to the end of the list with a step of *minus
    1*


    The first element to slice is "Melbourne", which is the last element of the list.
    Therefore, we can omit the start. The last element to slices is "San Diego", which
    is the first element of the list. Therefore, we can omit the stop too. We just
    must write the step, which is -1 because we are slicing consecutive elements in
    reverse order. Easy to remember!


    Last note. Learning slicing might feel overwhelming at first because of all the
    rules, the use of positive and negative indices, and thinking of lists in direct
    and reverse order. However, learning slicing properly is fundamental not only
