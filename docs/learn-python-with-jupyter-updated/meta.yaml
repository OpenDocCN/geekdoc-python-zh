  md: '# 6. Traveling around the world


    # List slicing


    In the previous two chapters, you learned five methods to manipulate lists: .append(),
    .remove(), .index(), .pop(), and .insert(). These list methods are very convenient
    and easy to remember; however, they can make code quite cumbersome. In Python,
    there is an alternative and more compact way to change, add, and remove list elements,
    which you will see in the next chapter. This alternative method is based on slicing;
    therefore, in this chapter, we will focus on this topic. Ready to get to know
    everything about slicing? Open Jupyter Notebook 6 and follow along! First of all,
    what is slicing?


    > **Slicing** means accessing list elements through their indices


    If you have a sweet tooth, the word “slicing” immediately reminds you of a slice
    of cake. And in fact, there is quite a similarity between slicing a cake and slicing
    a list! In the first case, you “extract” one or more cake slices for your guests—and
    yourself! In the second case, you extract one or more list elements for subsequent
    lines of code.


    +   - Let''s meet the list we will slice:


    ```

    [1]: 1 cities = ["San Diego", "Prague", "Cape Town", "Tokyo",

    "Melbourne"]

    2 print (cities)

    [''San Diego'', ''Prague'', ''Cape Town'', ''Tokyo'', ''Melbourne'']

    ```


    In this cell, there is a list called cities containing five strings: "San Diego",
    "Prague", "Cape Town", "Tokyo", and "Melbourne" (line 1), and we print it out
    (line 2).


    How are we going to slice cities? The **syntax** for slicing is very easy. It
    consists of the **list name followed by opening and closing square brackets**,
    like this: cities[]. In between the square brackets, we write the **positions
    of the elements** we want to slice. For this reason, it''s crucial to be aware
    of the positions of each element within a list. In the list cities, the elements
    have the following positions:


    ![](img/1e0d8bb8215d579da0d409223f09e364_58_0.png)


    Now, how do we write element positions in between the square brackets? There are
    various rules depending on how many elements we want to slice, where they are,
    and in which direction we want to extract them. We are going to learn all these
    rules in the coming pages.'
