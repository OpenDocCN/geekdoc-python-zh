- md: "## Part 3. Introduction to the for loop\n\nAppend or concatenate. Don’t assign!\n\
    \nWhen creating a new list within a for loop, a common mistake is to assign a\
    \ new element to the list instead of appending it or concatenating it. Let’s see\
    \ what this means with the following example. Here is the same list as the one\
    \ used earlier in this chapter:\n\n```python\nauthors = [\"Alcott\", \"Saint-Exupéry\"\
    , \"Arendt\", \"Sepulveda\", \"Shakespeare\"]\n```\n\nLet’s simplify the code\
    \ by creating only the list containing author last names starting with A. To show\
    \ how an error can occur, at line 10 we assign `authors[i]` to the new list `shelf_a`,\
    \ instead of appending it (or concatenating it). What happens to `shelf_a` throughout\
    \ the code?\n\n```python\n# initialize the variable\nshelf_a = []\n# for each\
    \ position in the list\nfor i in range(len(authors)):\n    # get the author's\
    \ initial\n    author_initial = authors[i][0]\n\n    # if the author's initial\
    \ is A\n    if author_initial == \"A\":\n        # add the author to the shelf\
    \ a\n        shelf_a = authors[i]\n\n        print(\"The shelf A now \" + \"contains:\
    \ \" + str(shelf_a))\n# print out the final shelves\nprint(\"The authors on the\
    \ shelf A are: \" + str(shelf_a))\n```\n\nThe shelf A now contains: Alcott\nThe\
    \ shelf A now contains: Arendt\nThe authors on the shelf A are: Arendt\n\nLet’s\
    \ go through the for loop and focus on the names starting with A:\n\n- When i\
    \ is 0 (line 4), `author_initial` is \"A\" (line 6); the if condition is true\
    \ (line 8), so we assign `authors[i]`—that is, \"Alcott\"—to `shelf_a` (line 10),\
    \ and we print out The shelf A now contains: Alcott (line 11). With the assignment\
    \ at line 10, we implicitly transform `shelf_a` from a list—which we initialized\
    \ at line 2—into a string—because we assign it the string \"Alcott\".\n- When\
    \ i is 2 (line 4), `author_initial` is \"A\" (line 6); the if condition is true\
    \ (line 8), we assign `authors[i]`—that is, \"Arendt\"—to `shelf_a` (line 10),\
    \ and we print out: The shelf A now contains: Arendt (line 11). In this case,\
    \ in the assignment at line 10, we overwrite the value \"Alcott\"—which we assigned\
    \ in the previous loop—with the value \"Arendt\"; thus, `shelf_a` remains a string.\n\
    \nAt line 13, we print the final version of `shelf_a`, which is a string with\
    \ value \"Arendt\".\n\nIn conclusion, assigning a variable to a list (e.g., `shelf_a\
    \ = authors[i]`) changes the type of the list itself to the variable type (e.g.,\
    \ `shelf_a` becomes a string). In addition, the value is overwritten at each loop,\
    \ and the final value is the one assigned in the last loop. Thus, the correct\
    \ way to add elements to a list is either to append—e.g., `shelf_a.append(authors[i])`—or\
    \ concatenate—e.g., `shelf_a = shelf_a + [authors[i]]`.\n\n## Let’s code!\n\n\
