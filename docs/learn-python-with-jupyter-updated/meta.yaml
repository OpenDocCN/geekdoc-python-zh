  md: '# 13. Implementing a calculator


    Integers, floats, and arithmetic operations


    In the previous chapters, you have developed quite a bit of computational thinking,
    so now you are ready for numbers, some easy math, and algorithms! There is a general
    misconception that in order to be good at coding one has to be very good at math.
    However, that’s not necessarily true, as you will see in the coming chapters!


    In this chapter, you will start becoming familiar with numbers in coding by implementing
    a calculator. To do that, you first need to learn arithmetic operators in Python
    and how to ask a user for a number. As in previous chapters, try first to solve
    the task by yourself and then compare your answer with the code below. You will
    find the code also in Jupyter Notebook 13. Let’s start!


    # 1. What are the arithmetic operations in Python?


    In Python, there are 7 arithmetic operations. Let’s quickly explore them one by
    one. Which ones do you already know, and which ones are new?


    1. Addition:


    ```

    [1]: 1 4 + 3

    7

    ```


    To sum two numbers, we use the arithmetic operator +, pronounced *plus*. As you
    know, the same symbol + is used as a concatenation symbol when merging strings
    or lists; in that case, it is pronounced *concatenated with*.


    2. Subtraction:


    ```

    [2]: 1 6 - 2

    4

    ```


    To subtract one number from another, we use the arithmetic operator -, pronounced
    *minus*.


    3. Multiplication:


    ```

    [3]: 1 6 * 5

    30

    ```


    To multiply two numbers, we use the multiplication operator *, which is pronounced
    *times*. Note that in Python (and in other programming languages), the multiplication
    symbol is different from the symbol used in paper-and-pencil computations, which
    can be the cross symbol x or the mid-line dot operator ·.


    4. Exponentiation:


    ```

    [4]: 1 2 ** 3

    8

    ```


    To calculate the power of a number, we use the exponentiation operator **, which
    is pronounced to *the power of*. The operation 2**3 corresponds to 2³ in paper-and-pencil.'
