    - To slice *multiple* elements, we use the **three-s rule**: `list_name[start:stop:step]`,\
    \ where:\n    - We can omit: *start* when we slice from the first element of a\
    \ list; *stop* when we slice to the last element of a list; and *step* when we\
    \ slice consecutive elements of a list\n    - The *stop* follows the **plus one**\
    \ rule when slicing from left to right (*direct* order), and the **minus one**\
    \ rule when slicing from right to left (*reverse* order)\n- The values of *element_position*,\
    \ *start*, *stop*, and *step* can be:\n    - *Positive*: when considering elements\
    \ from left to right (*direct* order)\n    - *Negative*: when considering elements\
    \ from right to left (*reverse* order)\n- *Negative steps* are used to invert\
    \ lists\n\n> ## Why the plus one rule?\nSo far, we have learned that each list\
    \ element is associated with an index or position. However, in Python, each element\
    \ is actually considered between two positions, as represented in this figure:\n\
    \n![](img/1e0d8bb8215d579da0d409223f09e364_64_0.png)\n\nLet's re-consider example\
    \ 2, where we extracted the cities from \"Prague\" to \"Tokyo\":\n\n```\npython\n\
    print (cities[1:4])\n# print cities in positions from one to four\n# ['Prague',\
    \ 'Cape Town', 'Tokyo']\n```\n\nUsing the representation above, we can see that\
    \ the start is 1 because that is the index that precedes \"Prague\", the first\
    \ element to slice. And the stop is 4 because that is the index that follows \"\
    Tokyo\", the last element to slice.\n\nFor many people, considering elements in-between\
    \ indices is pretty straightforward. For other people, considering that elements\
    \ have one single index—as we have done so far—is easier. My recommendation is\
    \ to pick one representation and stick to that. In this book, we will continue\
    \ to represent list elements with one single index."
