    .\n    f. Remove \"in an early\".\n    g. Add \"it had bugs in it\" at the end\
    \ of the list.\n    h. Substitute \"caused\" with \"went wrong\".\n    i. Add\
    \ \" - Grace Hopper\" at the end of the list.\n\n## 6. Traveling around the world\n\
    \n### List slicing\n\nIn the previous two chapters, you learned five methods to\
    \ manipulate lists: .append(), .remove(), .index(), .pop(), and .insert(). These\
    \ list methods are very convenient and easy to remember; however, they can make\
    \ code quite cumbersome. In Python, there is an alternative and more compact way\
    \ to change, add, and remove list elements, which you will see in the next chapter.\
    \ This alternative method is based on slicing; therefore, in this chapter, we\
    \ will focus on this topic. Ready to get to know everything about slicing? Open\
    \ Jupyter Notebook 6 and follow along! First of all, what is slicing?\n\n> **Slicing**\
    \ means accessing list elements through their indices\n\nIf you have a sweet tooth,\
