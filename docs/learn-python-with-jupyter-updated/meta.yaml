    \n你肯定知道数字图像由像素组成，即组织在网格中的小彩色方块。我们可以将网格视为一个列表的列表，其中每个子元素对应一个特定颜色的像素。让我们考虑下图：\n\n\
    ![](img/1e0d8bb8215d579da0d409223f09e364_214_0.png)\n\n每个黑色方块对应一个包含0的像素，每个白色方块对应一个包含1的像素。因此，棋盘的第一行（和第三行）由子列表[0,\
    \ 1, 0, 1, 0]表示，第二行（和第四行）由子列表[1, 0, 1, 0, 1]表示。棋盘的最后一行包含各种灰度的像素。每个像素对应一个十进制（浮点）数。较深的灰色更接近0（即黑色），而较亮的灰色更接近1（即白色）。\n\
    \n那么数字彩色图像呢？每个像素由一个RGB列表编码，该列表由三个数字组成，每个数字代表不同的颜色：第一个数字代表红色（R）分量，第二个数字代表绿色（G）分量，第三个数字代表蓝色（B）分量。\n\
    \n让我们看看下面的图。\n\n![](img/1e0d8bb8215d579da0d409223f09e364_214_1.png)\n\n每个像素由一个包含三个数字的子列表表示。例如，左上角的像素是红色的，由子列表[255,\
    \ 0, 0]表示，其中255代表红色的数量，第一个0代表绿色的数量，第二个0代表蓝色的数量。每一行是一个列表的列表，被包含在一个列表的列表的列表中！最后，请注意，对于灰度和彩色图像，定义颜色的数字范围可以从0到1，也可以从0到255。"
