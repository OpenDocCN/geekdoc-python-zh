    \ fingers will go on the keys in the same row. For the left hand, the middle finger\
    \ will go on the letter D, the ring finger on S, and the small finger on A. Similarly,\
    \ for the right hand, the middle finger will go on the letter K, the ring finger\
    \ on L, and the small finger on the semicolon. What about the letters G and H\
    \ that are in between? When needed, the left index finger will move from F to\
    \ G, and the right index finger from J to H. The fingers will then move upward\
    \ and downward for the other letters, maintaining the same reciprocal positions.\n\
