    This time, the elements to slice are not consecutive. We start at 0, which is
    the position of "San Diego", we stop at 5 (because of the plus-one rule) for "Melbourne",
    and we specify the step, which is 2, because we are slicing every second element.
    However, as you might have guessed, because the start coincides with the beginning
    of the list, and the stop coincides with the last element of the list, we can
    omit both, and rewrite the code above as follows:


    ```

    [10]: 1 print (cities[::2])

    [''San Diego'', ''Cape Town'', ''Melbourne'']

    ```


    print cities from the beginning to the end of the list with a step of two


    You have now mastered the three-s rule and learned how to simplify it. How else
    can we play with it? Let''s look at this further representation of the list cities:


    ![](img/1e0d8bb8215d579da0d409223f09e364_61_0.png)


    In a list, indices can be positive (from left to right) or negative (from right
    to left).


    In Python, each element of a list can be identified by a positive or a negative
    index. We use **positive indices** when we consider elements **from left to right**
    and **negative indices** when we consider elements from **right to left**. *Positive*
    indices start from 0 and increase of 1 unit (0, 1, 2, etc.). *Negative* indices
    start from -1 and decrease of 1 unit (-1, -2, -3, etc.). Note that negative indices
    do not start from 0 to avoid ambiguity: the element in position 0 is always the
    first element of the list starting from the left side. When are negative indices
    convenient? For example, when we are dealing with a very long list. In that case,
    it would be tedious to count through all elements starting from 0. So we can just
    count backwards starting from the last element!


    How do we use negative indices in slicing? Let''s have a look!


    7. Slice "Melbourne":


    ```

    [11]: 1 print (cities[4])

    Melbourne

    ```


    print cities in positions 4


    In this example, we extracted "Melbourne" as we learned in example 1: by writing
    its *positive* index, which is 4, in between the square brackets. However, "Melbourne"
    is the last element of the list; therefore, it is much more convenient to use
    its *negative* index to slice it, like this:'
