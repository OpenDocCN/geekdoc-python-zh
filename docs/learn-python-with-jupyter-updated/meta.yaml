    \    b.  *在线订购一件T恤*。你正在网上订购一件新T恤。你找到一件你喜欢的T恤，它是红色的，圆领，上面印有*在此处添加你的文字*。用这些特征写一个列表。现在你想在T恤上添加你自己的文字。为此，你（1）查看*在此处添加你的文字*的位置，（2）移除*在此处添加你的文字*，（3）添加你想要印在T恤上的文字。完成练习后，你能想到另一种改变T恤印花的方法吗？\n\
