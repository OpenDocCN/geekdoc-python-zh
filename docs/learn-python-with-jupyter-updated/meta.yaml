    \ randomly picks a fruit, (2) the player has to guess the fruit picked by the\
    \ computer, and (3) we must make sure that the player keeps playing until they\
    \ guess the fruit picked by the computer. The first two requirements are straightforward,\
    \ and we will solve them quickly. We will focus on the third requirement.\n\n\
    1. The computer randomly picks a fruit.\n\n```python\nimport random\n\n# computer\
    \ pick\ncomputer_pick = random.choice(fruits)\n```\n\nWe import the package random\
    \ (line 1) and we use the method .choice() to make the computer randomly pick\
    \ an element of the list fruits.\n\n2. The player has to guess the fruit picked\
    \ by the computer.\n\n```python\n# player guess\nplayer_guess = input(\"Guess\
    \ the fruit! Choices: mango, orange, banana: \")\n```\n\nWe use the built-in function\
    \ input() to ask the player to enter a fruit (line 7).\n\n3. Make sure that the\
    \ player keeps playing until they guess the fruit picked by the computer. The\
    \ first instinct would be to do the following:\n\n```python\n# check the player\
    \ guess\nif player_guess == computer_pick:\n    print(\"That's right! The fruit\
    \ is \" + computer_pick)\nelse:\n    print(\"Nope! Try again!\")\n```\n\nWe check\
    \ if player_guess is equal to computer_pick with an if/else construct, and we\
    \ print messages accordingly (lines 9–11). If the player did not guess the right\
    \ fruit, we have to ask them to guess again (like at line 7). Then, we have to\
    \ check once more if the guess is correct (like at lines 9–11), and so on. This\
    \ is not feasible because we cannot know how many times it is going to take the\
    \ player to guess the correct fruit! In addition, we would repeat code, which\
    \ means that we can use a loop! So, here is the correct solution with the while\
    \ loop:\n\n```python\nwhile player_guess != computer_pick:\n    # as long as the\
    \ player's guess is not right\n    player_guess = input(\"Nope! Try again! Guess\
    \ the fruit! Choices: mango, orange, banana: \")\n```\n\nAs long as the player_guess\
    \ is not equal to computer_pick (line 9), we ask the player to make a guess (line\
    \ 11), which we check in the condition of the while loop header (line 9), and\
    \ the loop keeps going as long as the condition holds.\n\n## Let’s code!\n\n1.\
    \ Guess the number! Create a game where the computer picks a number between 0\
    \ and 10, and the player has to guess it. If the player guesses a number that\
