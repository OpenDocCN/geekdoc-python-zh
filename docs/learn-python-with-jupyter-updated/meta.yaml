  md: '# About this book


    **What will I learn in this book?** In this book, you will learn to code in Python
    using Jupyter Notebook. Even more importantly, you will develop computational
    thinking, which is the way we think when coding.


    **What makes this book different?** The topic progression in this book is designed
    according to computational thinking development while focusing on syntax and strategies,
    rather than listing disconnected language characteristics with isolated examples.


    **Is this book for me?** If you have never coded before, if you are following
    online courses or videos but feel you can''t quite grasp them, or if you need
    to better structure your Python and coding knowledge, this book is for you. Also,
    if you are training to become a scientist but are not very strong in coding, if
    you are transitioning to the Python/Jupyter environment from another programming
    language, or if you are a teacher looking for material, this book can be for you.


    **How is this book structured?** The book is divided in 11 parts. The first part
    introduces the computational environment—that is, the Jupyter/Python environment.
    The following ten parts cover computational thinking and Python syntax. Each part
    contains two to five chapters, for a total of thirty-eight chapters.


    **How are chapters structured?** Each chapter starts with one or more coding examples
    embedded in narrative and enriched with detailed explanations. In addition, each
    contains several theoretical and coding exercises. And they all finish with a
    recap to summarize the chapter''s main concepts, and a “in more depth” section,
    with coding strategies or curiosities.


    **Why is code embedded in narratives?** Stories provide context and allow long-term
    memorization. They are extensively used in learning foreign languages. And, in
    many respects, a programming language *is* a foreign language.


    **Why is there code pronunciation?** When we code, we pronounce or mumble code
    within ourselves, and occasionally aloud with a colleague. Although coding has
    a strong vocal component, there is no defined standard for code pronunciation.
    The pronunciation proposed in this book is the optimized result of hours of one-on-one
    interaction with students of various mother tongues.


    **What kinds of exercises are in the book?** In this book, you will find both
    theory exercises and coding exercises. Theory exercises are meant to strengthen
    code comprehension and syntax precision. Coding exercises are meant to make you
    practice and thus learn by doing.


    **What is on the website?** On `www.learnpythonwithjupyter.com`, you can find
    Jupyter Notebooks associated with each chapter, so you can test and experiment
    while learning. You can also find a community, with solutions to both theory and
    coding exercises. You can ask questions and propose alternative solutions, to
    deepen your knowledge.


    **How do I use this book?** Start with the first part, *Getting ready*, to install
    and learn the computational environment. Then, proceed with the chapters. For
    each chapter, download the corresponding notebook at `www.learnpythonwithjupyter.com`.
    Make sure you understand the syntax, play with'
  merge: -1
  pgno: 12
- img_proc: true
  md: 'the code, and do the theoretical exercises. Read the recap and the “in more
    depth” sections, which will give you useful hints. Finally, do the coding exercises
    and compare your solutions with the ones you find in the community. Obviously,
    looking at a solution before completing an exercise weakens your chance of learning.
    If you do not understand questions or solutions, ask in the community. Take your
    time to solve each exercise. Missing the understanding of one chapter might compromise
    your understanding of the chapters that follow it.


    **How is the language used in this book?** The language is colloquial and simple—but
    precise. There are clear definitions and careful explanations. I directly talk
    to *you*, but I use *we* when explaining syntax. We are in this together! Also,
    I use the first person when I want to share some hints I learned along the way.'
