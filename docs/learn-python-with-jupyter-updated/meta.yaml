    三s规则最方便的地方在于，我们可以在多种情况下简化它。例如，你可能想知道：为什么在示例2中，我们从"Prague"切片到"Tokyo"时没有写步长？因为**当元素连续时，步长为1**——"Cape
    Town"在"Prague"之后1步，"Tokyo"在"Cape Town"之后1步——而当步长为1时，我们可以直接省略它。显然，我们本可以像下面这样指定步长来编写代码：


    ```

    [3]: 1 print (cities[1:4:1])

    [''Prague'', ''Cape Town'', ''Tokyo'']

    ```


    然而，在这里添加步长是多余的，所以我们直接省略了它。


