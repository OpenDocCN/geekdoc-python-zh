    > ### What is GitHub?

    You might have heard about GitHub, or you might have browsed some pages on its
    site (github.com). Surely, you have checked the solutions of the exercises of
    this book on GitHub! But what is GitHub exactly? In a simplified manner, we can
    think of GitHub as a cloud service or a huge server for code. Instead of using
    Dropbox, Google Drive, etc., coders prefer to synchronize their code with GitHub.
    GitHub has its own language: folders are called *repositories*, sending files
    to the server is called a *push*, and getting files from the server is called
    a *pull*. Each repository contains files—they can store any files, either containing
    code or not—and elements that are specific to coding, such as *issues*, where
    anybody can indicate bugs to be solved or suggest new features. Why do coders
    use GitHub instead of other cloud services? Because GitHub supports **version
    control**, that is, it **keeps track of code changes over time**. Every time we
    push a code update, we can compare it with previous version(s), and if the new
    code does not work, then we can go back to an earlier version. Furthermore, GitHub
    is useful for collaborative projects: programmers can work on different sections
    of a task individually and then integrate the code without accidentally influencing
    each other''s code, all while keeping track of each programmer''s contribution.
    These tasks are actually executed by **Git**, which is a distributed version control
    system, that is, a software that manages changes to code. Other platforms that
    employ Git include GitLab (gitlab.com) and Bitbucket (bitbucket.org), with GitHub
    being the most popular.


