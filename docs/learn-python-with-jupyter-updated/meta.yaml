    # 1. Arithmetic operations on list elements


    As you might remember from Chapter 13, in Python there are 7 arithmetic operations:
    addition (+), subtraction (-), multiplication (*), exponentiation (**), division
    (/), floor division (//), and modulo (%). To perform arithmetic operations *element-wise*—that
    is, on list elements—we use for loops. **Element-wise operations can be done (1)
    between two or more lists of the same length or (2) between a list and a number.**
    In both cases, we **use a for loop**. Let’s see two examples for addition (but
    they can be valid for any operation).


    +   - Sum two lists element-wise:


    ```

    [1]:

    1  odd_numbers = [1, 3, 5]

    2  even_numbers = [2, 4, 6]

    3  summed = []

    4

    5  for i in range (len(odd_numbers)):

    6      summed.append(odd_numbers[i] +

    7                     even_numbers[i])

    8  print (summed)

    [3, 7, 11]

    ```


    odd_numbers is assigned one, three, five

    even_numbers is assigned two, four, six

    summed is assigned empty list


    for i in range len odd numbers

    summed dot append odd_numbers in position i

    plus even numbers in position i


    print summed


    We start with odd_numbers and even_numbers, which are two lists containing 3 integers
    each (lines 1 and 2), and summed, which we initialize as an empty list (line 3).
    Then, we create a for loop that spans the indices of one of the lists of numbers
    (line 5), and we append to summed the sum of the current element of the list odd_numbers
    to the element in the same position in the list even_numbers (line 6). Finally,
    we print the result for a check (line 8). Note that we save the result in a third
    list (summed) that we initialized as empty before the loop (line 3) and that we
    fill in during the loop (line 6). If we do not want to create a third list, we
    can overwrite one of the existing lists (e.g., odd_numbers[i]=odd_numbers[i] +
    even_numbers[i]).


