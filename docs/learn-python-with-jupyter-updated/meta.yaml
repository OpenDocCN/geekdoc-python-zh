    \n中断内核后，方括号之间的星号符号消失，我们可以再次运行每个单元格。\n\n*重启内核。* 考虑本章中的列表 `house`。假设我们想要删除元素 \"\
    dining room\"，就像我们在上面的一个例子中所做的那样。但是，由于错误，我们输入了错误的切片索引——即 0 而不是 1——删除了 \"kitchen\"\
    \ 而不是 \"dining room\"，像这样：\n\n```python\n[9]: 1 house = [\"kitchen\", \"dining\
    \ room\",\n    \"living room\", \"bedroom\", \"bathroom\",\n    \"garden\", \"\
    balcony\", \"terrace\"]\n```\n\nhouse 被赋值为厨房、餐厅、客厅、卧室、浴室、花园、阳台、露台，\n\n```python\n\
    [10]: 1 del house[0]\n     2 print (house)\n     ['dining room', 'living room',\
    \ 'bedroom',\n     'bathroom', 'garden', 'balcony','terrace']\n```\n\n删除 house\
    \ 中位置零的元素\n打印 house\n\n我们想要恢复原始变量 house 并重新运行我们代码的更正版本——del house[1]——以获得正确的结果。我们如何回去？通过重启内核！为此，我们可以转到\
    \ JupyterLab 顶部栏，然后 Kernel，再选择 Restart Kernel；或者我们可以转到 Jupyter Notebook 顶部栏并按下弯曲箭头（上图中的项目\
    \ 8）。然后，我们可以重新运行 Notebook 的单元格。或者，我们可以通过转到 JupyterLab 顶部栏，然后 Kernel，再选择 Restart\
    \ Kernel and Run all Cells；或者转到 Jupyter Notebook 顶部栏并按下带有两个箭头尖端的符号（上图中的项目 9）来重启内核并一次重新运行所有\
    \ Notebook 单元格。你可能会问：我每次犯错都必须重启内核吗？不一定。在这种情况下，可以只重新运行第一个单元格以将变量 house 恢复到其原始值，然后使用更正后的代码重新运行第二个单元格。然而，当处理多个变量，或者我们对单个变量犯了多个错误时，重置内核并从头开始是一个好的做法。\n\
