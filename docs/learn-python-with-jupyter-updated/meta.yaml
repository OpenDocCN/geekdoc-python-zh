    \n要将两个数字相加，我们使用算术运算符 `+`，读作 *加*。如你所知，相同的符号 `+` 在合并字符串或列表时用作连接符号；在这种情况下，它读作 *与...连接*。\n\
    \n2. 减法：\n\n```python\n6 - 2\n# 4\n```\n\n要从一个数字中减去另一个数字，我们使用算术运算符 `-`，读作 *减*。\n\
    \n3. 乘法：\n\n```python\n6 * 5\n# 30\n```\n\n要将两个数字相乘，我们使用乘法运算符 `*`，读作 *乘以*。注意，在\
    \ Python（和其他编程语言）中，乘法符号与纸笔计算中使用的符号不同，后者可能是叉号 x 或中点运算符 ·。\n\n4. 幂运算：\n\n```python\n\
    2 ** 3\n# 8\n```\n\n要计算一个数的幂，我们使用幂运算符 `**`，读作 *的...次方*。运算 `2**3` 对应于纸笔计算中的 2³。\n\
    \n5. 除法：\n\n```python\n10 / 5\n# 2.0\n```\n\n要将一个数除以另一个数，我们使用正斜杠 `/`，读作 *除以*。注意，除法的结果总是一个小数。\n\
    \n6. 整除：\n\n```python\n7 // 4\n# 1\n```\n\n要执行整除，我们使用运算符 `//`，由两个正斜杠组成，读作 *整除*。整除是一种结果四舍五入到**最接近的较小整数**的除法。在这个例子中，对应的除法\
    \ `/` 的结果将是 1.75，因此整除的结果是 1，这是最接近 1.75 的较小整数。单词 *floor* 表示我们将结果向下取整，即——用一个比喻来说——取到房子的地板。\n\
    \n7. 取模：\n\n```python\n7 % 4\n# 3\n```\n\n要计算模数，我们使用运算符 `%`，读作 *取模*。此运算计算一个**余数**（或模数），这是在整除后回到被除数所需的数字。例如，从单元格\
    \ 6 我们知道整除 `7//4` 的结果是 1。如果我们用 1（结果）乘以 4（除数），得到 4（4x1=4）。要得到 7（被除数），我们需要 3，这就是模数（4+3=7）。注意，modulo\
    \ 是运算符的名称，而 modulus 是操作的名称，也是余数的同义词。模运算在编码中经常使用，正如你将在下一章中看到的。\n\n总结一下，Python 提供了七种算术运算符：\n\
    \n- 1 个用于加法（`+`）\n- 1 个用于减法（`-`）\n- 2 个属于“乘法家族”，即乘法（`*`）和幂运算（`**`）\n- 3 个属于“除法家族”，即除法（`/`）、整除（`//`）和取模（`%`）\n\
    \n注意，除法运算符可以提供*整数*或*小数*作为结果，这与被除数和除数的特性无关。通过解决以下练习来发现更多细微差别。在 Python 中测试你的答案！\n\
    \n### 真还是假？\n\n1. 除法的结果总是一个整数（即没有小数）。例如，11/5 的结果是整数 2。\n2. 7//2 的结果是 3，但 -7//2\
    \ 的结果是 -4。这是因为整除会四舍五入到最接近的较小整数。\n3. 7.5 % 3 的结果是 1.5。因此，模运算的结果可以是小数。"
