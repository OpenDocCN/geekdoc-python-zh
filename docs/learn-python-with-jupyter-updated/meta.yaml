  md: '# # 1. Text, questions, and art


    *Strings, input(), and print()*


    Programming languages are written languages, and the core of written communication
    is *text*. How is *text* represented in Python? How can we ask a question to a
    person? And how can we provide information to a person? To answer these questions,
    let’s open Jupyter Notebook 1 and start!


    # ## 1. Writing text: Strings


    In coding, we use the word *string* to refer to *text*. We can define strings
    as follows:


    > **Strings** are text in between quotes


    Let’s look at the two examples below. On the left side, we see the code as it
    is in Jupyter Notebook 1. On the right side, we see how to pronounce the code.
    Let’s read the code out loud:


    ```

    []: 1 "This is a string"  This is a string

    []: 1 ''Everything you write between quotes is a string''  Everything you write
    between quotes is a string

    ```


    Now let’s consider the following statements. Are they true or false?


    # ### True or false?


    +   1. A string contains text

    2. A string is in green in Jupyter Notebook

    3. Quotes can be either single or double


    # ### Computational thinking and syntax


    Let’s analyze the code above in detail! In each cell, there is a *string*. As
    we can see, a string is just some text in between quotes. By *text*, we mean any
    **character** we can type on the keyboard: letters, numbers, symbols, and even
    the space! *Quotes* can be **double quotes** " ", like in the top example, or
    **single quotes** '' '', like in the bottom example. Quotes that start a string
    are called **opening** quotes, whereas quotes that end a string are called **closing**
    quotes. When writing a string in Python, we can use either double or single quotes;
    we just have to make sure we do not mix them up. In other words, if we start writing
    a string with an opening *double* quote, we must finish the string with a closing
    *double* quote. Similarly, if we start writing a string with an opening *single*
    quote, we must finish the string with a closing *single* quote. *Strings* are
    a Python **data type**, which means that they are one of the core parts of the
    Python language (see Table 1 at page 4). In Jupyter Notebook, Python strings are
    in *red*.'
