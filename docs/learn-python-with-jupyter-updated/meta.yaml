    \ thinking and syntax\n\nLet's finally run the cell. Here is what we get:\n\n\
    ```\n[5]:\n1 print (\"/\\_/\\  \")\n2 print (\">^.^<  \")\n3 print (\" / \\  \"\
    )\n4 print (\"(__)___\")\n/\\_/\\n>^.^<\n / \\n(__)___\n```\n\nThe little cat\
    \ we created using keyboard symbols gets displayed to the screen. To do so, we\
    \ used a new built-in function: print(). **print() displays on screen the argument**\
    \ we provide — in this case a *string*. You might ask: But when we ran the cells\
