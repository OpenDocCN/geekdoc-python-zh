  - "[PAGE 136]\n\n# Recap\n\n+   - A module is a unit containing functions for a\
    \ specific task.\n- To import a module, we use the keyword `import`. Imports are\
    \ usually written at the beginning of code, and only once.\n- When calling a module\
    \ function, we use the following syntax: `module_name.function_name()`\n- `random`\
    \ is a module to generate random numbers. It contains several functions, including:\n\
    \    - `.randint(a,b)`: returns a random integer between the endpoints `a` and\
    \ `b` (included)\n    - `.choice(list_name)`: returns an element of a list\n\n\
    > ### What if I don't use the index in a for loop?\n\nAs we know from the previous\
    \ chapters, in a for loop, the variable `i` changes its value from the start to\
    \ the stop (minus 1!) of the interval created by the function `range()`. Within\
    \ the loop, we use `i` to either print out the current loop number (e.g., `print\
    \ (\"This is loop number \" + str(i))`) or to automatically slice list elements\
    \ (e.g., `print (friends[i])`). However, in some cases, we do not need `i`. Let's\
    \ look at an example:\n\nWe use a for loop to generate and print three random\
    \ numbers (lines 4–8). As you can see, we use the for loop to repeat commands\
    \ that do not contain `i`. In this case, it is a Python style convention to substitute\
    \ `i` with an underscore (i.e., `_`) in the header of the for loop (line 4), to\
    \ signal that we do not need an index in the loop. Using `i` in the loop header\
    \ would not be an error, but it would decrease code readability for other Python\
    \ coders.\n\n```\npython\nimport random\n\n# repeat the commands 3 times (index\
    \ not needed)\nfor _ in range (0,3):\n    # create a random number between 10\
    \ and 20\n    random_number = random.randint(10,20)\n    # print the number\n\
    \    print (\"The random number is\" + random_number)\n\n# Output:\n# The random\
    \ numbers is: 14\n# The random numbers is: 17\n# The random numbers is: 12\n```\n\
    \n# Let's code!\n\n+   1. For each of the following scenarios, create code similar\
