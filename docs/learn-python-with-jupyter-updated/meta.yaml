  md: '# Lists of lists and images


    You surely know that digital images are composed of pixels, that is, small colorful
    squares organized in a grid. We can think of the grid as a list of lists where
    each sub-element corresponds to a pixel of a specific color. Let’s consider the
    following figure:


    ![](img/1e0d8bb8215d579da0d409223f09e364_214_0.png)


    Each black square corresponds to a pixel containing 0, and each white square corresponds
    to a pixels containing 1. Thus, the first (and the third) row of the checkerboard
    is represented by the sub-list [0, 1, 0, 1, 0], and the second (and the fourth)
    row is represented by the sub-list [1, 0, 1, 0, 1]. The last row of the checkerboard
    contains pixels colored with various shades of grey. Each pixel corresponds to
    a decimal (float) number. Darker greys are closer to 0 (that is, to black), whereas
    brighter greys are closer to 1 (that is, to white).

    What about digital colored images? Each pixel is encoded by an RGB list composed
    of three numbers, each representing a different color: the first number is for
    the red (R) component, the second number for the green (G) component, and the
    third number for the blue (B) component.

    Let’s have a look at the figure below.


    ![](img/1e0d8bb8215d579da0d409223f09e364_214_1.png)


    Each pixel is represented by a sub-list composed of three numbers. For example,
    the top left pixel is red and is represented by the sub-list [255, 0, 0], where
    255 represents the amount of red, the first 0 is for the amount of green, and
    the second zero 0 is for the amount of blue. Each row is a list of lists, enclosed
    in a list of lists of lists! Finally, note that for both greyscale and colored
    images, the range of the numbers defining the color can go from 0 to 1 or from
    0 to 255.'
  merge: -1
  pgno: 214
- img_proc: true
  md: '# Part 6. Focus on lists and for loops


    # Let’s code!


    1. *Playing around*. Given the following list of lists:

    numbers = [[3,7,1],[7,6,5,4],[8,9,7,4,5]].

    a) How long is each sub-list?

    b) In the first sub-list, replace the third element with the sum of the previous
    two elements.

    c) In the second sub-list, sort the elements in ascending order.

    d In the third sub-list, substitute the number 4 with the number 3.

    e) How many number 7 are there in total? Save their positions in a list of lists
    (expected result: [[0, 1], [1, 3], [2, 2]]).


    2. *Summing up*. Given the following list of lists:

    numbers = [[1,3,5],[7,2,8],[3,4,9]].

    a) Create a list containing the sum of the numbers in each sub-list (expected
    result: [9, 17, 16]).

    b) Sum all the elements of the list of list using (1) a for loop through indices
    and (2) a for loop through values.


    3. *Matrix time!* Give the following matrix:

    matrix = [[4,1,3,9], [2,1,6,5], [4,0,3,8], [7,2,6,2]]

    (If you are not familiar with matrices, think of a matrix as a table containing
    numbers)

    a) Print the matrix as a 4x4 table (expected result:

    [4, 1, 3, 9]

    [2, 1, 6, 5]

    [4, 0, 3, 8]

    [7, 2, 6, 2])

    b) Multiply all the elements on the main diagonal and print the result (expected
    result: 24). Note: The main diagonal goes from top-left to bottom-right. In this
    example, the main diagonal contains: 4,1,3,2.

    c) Sum the matrix values vertically (expected result: [17, 4, 18, 24]).'
  merge: -1
