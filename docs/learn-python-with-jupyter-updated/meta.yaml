    \n```\n[]: 1 print (\"/\\_/\\ \")\n2 print (\">^,^< \")\n3 print (\" / \\ \")\n\
    4 print (\"(__)___\")\n```\n\n我们将向屏幕打印什么？答案很简单，但在运行单元格之前，让我们通过完成以下练习快速分析一下代码。\n\
    \n## 判断对错？\n\n1. print() 是一个字符串\n2. print() 可以有一个字符串作为参数\n3. 在编码中，我们逐行打印\n\n##\
    \ 计算思维与语法\n\n让我们最终运行单元格。我们得到的结果如下：\n\n```\n[5]:\n1 print (\"/\\_/\\  \")\n2 print\
    \ (\">^.^<  \")\n3 print (\" / \\  \")\n4 print (\"(__)___\")\n/\\_/\\n>^.^<\n\
    \ / \\n(__)___\n```\n\n我们使用键盘符号创建的小猫被显示在屏幕上。为此，我们使用了一个新的内置函数：print()。**print()\
    \ 在屏幕上显示**我们提供的参数——在这种情况下是一个 *字符串*。你可能会问：但是当我们运行单元格 1 和 2 时，我们可以看到 *字符串* 的内容；为什么我们需要\
    \ print()？我们能够看到单元格 1 和 2 中的字符串是 Jupyter Notebook 的一个特性。运行单元格后，Jupyter Notebook\
    \ 会显示最后一行的内容，但不会显示之前行的内容。如果我们将单元格 5 代码中的 print() 函数删除，它将只显示最后一个 *字符串*：\n\n```\n\
    [5]:\n1 \"/\\_/\\  \">\n2 \">^.^<  \">\n3 \" / \\  \">\n4 \"(__)___\"\n'(__)___'\n\
    ```\n\n通过观察单元格 5 中的代码，还有几点需要指出。在 Jupyter Notebook 单元格中，我们可以编写多行代码。这些行将**按顺序**执行。换句话说，当我们运行单元格时，Python\
    \ 首先执行第 1 行，然后执行第 2 行，依此类推，直到到达单元格的最后一行。此外，在字符串中，**空格很重要**。空格是 *字符*，因此空格是 *字符串*\
    \ 的一个元素，它占据自己的位置。然而，代码元素之间的空格并不重要。例如，下面两行是等效的：\n\n```\n[5]:\n1 print (\"(__)___\"\
    )\n2 print( \"(__)___\" )\n'(__)___'\n'(__)___'\n```\n\n## 第一部分：创建基础\n\n在编写带有重复内容的代码时，保持代码行之间的某种**平行性**是一种良好的实践。比较我们上面编写的单元格\
    \ 5 中的代码，\n\n```\n[]: 1 print (\"/\\_/\\  \")\n    2 print (\">^.^<  \")\n   \
    \ 3 print (\"  / \\  \")\n    4 print (\"(___)__ \")\n```\n\n与下面未对齐引号和圆括号的相同代码：\n\
    \n```\n[]: 1 print (\"/\\_/\")\n    2 print (\">^.^<\")\n    3 print (\" / \"\
    )\n    4 print (\"(___)__ \")\n```\n\n我们可以看到，在第二种情况下，代码看起来有些混乱。相反，当我们对齐引号、括号和其他符号时——正如你将在后续章节中看到的——我们创建的代码更**可读**且**更不易出错**。我们还将讨论许多技巧，以尽量减少我们可能在代码中引入的错误。\n\
    \n在回顾之前还有一个问题：在日常生活中，我们哪里能看到函数 `print()` 的实际应用？每次我们在设备上看到消息时！例如：“注册完成”、“感谢您的购买”或“注销成功”。在底层代码中，有一个类似于\
    \ `print()` 的函数！\n\n## 回顾\n\n- **字符串** *类型* 是引号之间的文本\n- **input()** 是一个 *内置函数*，用于要求用户输入一个值\n\
    - **print()** 是一个 *内置函数*，用于在屏幕上显示一个值\n\n> **我们的手指有记忆**\n\n学习编码时，**输入每一条命令**非常重要，要抵制复制/粘贴的诱惑。输入有助于我们以至少两种方式**记忆**命令。首先，输入命令时，我们在脑海中拼写它，因此我们在心中重复它，从而记住它。其次，我们的手指可以记住输入模式。例如，输入\
    \ `print()` 时，我们的手指会自动记住在 `print` 之后立即输入圆括号。类似于钢琴家在演奏时不看键盘而看乐谱，我们编码时希望不看键盘而看屏幕。这种输入方式称为**盲打**（或触摸打字）。它帮助我们更快，并**最小化我们犯错的数量**，因为我们不必不断将视线在键盘和屏幕之间移动。我们如何学习\
    \ *盲打*？这很容易；只需要一些练习。其理念是每个手指按压键盘上的一些特定键，如下一页的图所示。我们将左手食指放在字母 F 上，右手食指放在字母 J 上——这两个键上的小凸起定义了起始点。其余手指将放在同一行的键上。对于左手，中指放在字母\
    \ D 上，无名指放在 S 上，小指放在 A 上。类似地，对于右手，中指放在字母 K 上，无名指放在 L 上，小指放在分号上。那么中间的字母 G 和 H 怎么办？需要时，左手食指将从\
    \ F 移动到 G，右手食指从 J 移动到 H。然后手指将为其他字母上下移动，保持相同的相对位置。\n\n![](img/1e0d8bb8215d579da0d409223f09e364_34_0.png)\n\
    \n图片修改自 https://commons.wikimedia.org/w/index.php?curid=9666341。By Cy21 - Own\
    \ work, CC BY-SA 3.0.\n\n有很多网站可以以有趣的方式学习盲打，例如 www.typing.com 和 www.typingclub.com。它们是免费的，创建账户不是强制性的。它们提供从输入单个字母、音节、单词到整个句子的渐进式练习。试一试？\n\
    \n准备好进行一些编码练习了吗？创建一个新的 Notebook 并解决下面的练习。如果你不记得如何创建新的 Notebook 或新的单元格，请查看第 8 页和第\
    \ 9 页。\n\n## 让我们编码吧！\n\n1.  *编写字符串。* 使用 *双* 引号编写一个字符串。然后，运行单元格并观察发生了什么。然后使用 *单*\
