    \ “Spell the word ‘hello’”). (2) The kid has to enter one letter at the time.\
    \ If the kid enters the correct letter, then provide positive reinforcement (e.g.,\
    \ “Well done!”), and ask for the next letter. If the kid does not enter the correct\
