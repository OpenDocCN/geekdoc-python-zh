    senses = [\"eyes\", \"nose\", \"ears\", \"tongue\",\n          \"skin\"]\nprint(senses)\n\
    # Output: ['eyes', 'nose', 'ears', 'tongue', 'skin']\n```\n\nThe list `senses`\
    \ contains five strings: \"eyes\", \"nose\", \"ears\", \"tongue\", and \"skin\"\
    \ (line 1), and we print it out (line 2).\n\n- Replace \"nose\" with \"smell\"\
    :\n\n```python\nsenses[1] = \"smell\"\nprint(senses)\n# Output: ['eyes', 'smell',\
    \ 'ears', 'tongue', 'skin']\n```\n\nTo change **one list element**, we assign\
    \ the new value to the list sliced in the element's position. In this case, the\
    \ element we want to replace--\"nose\"--is in position 1. So, we slice the list\
    \ in position 1, and we assign the new string \"smell\" (line 1). Then, we print\
    \ the list to check whether the change is correct (line 2).\n\nAt this point,\
    \ you might ask: Why do I have to learn list manipulation using slicing when I\
    \ already know how to do it with methods? For at least three reasons! First reason:\
    \ to **reduce the possibility of errors**. The code at line 1 is an alternative\
    \ to the code we learned in Chapter 5, where we used three methods to replace\
    \ an element, that is:\n\n```python\nnose_index = senses.index(\"nose\")\nsenses.pop(nose_index)\n\
    senses.insert(nose_index, \"smell\")\n```\n\nBy using slicing, we reduce the number\
    \ of commands from 3 to 1, and we do not need to create an extra variable--`nose_index`.\
    \ By writing less code, we minimize the possibility of making errors! Second reason:\
    \ **slicing makes code writing faster**. Imagine you have to replace 4 elements.\
    \ With slicing, you would have to write just 4 lines of code; instead, with list\
    \ methods, the number of lines required would be 12! And finally, the third reason:\
    \ transitioning from list methods to list slicing allows us to shift from a more\
    \ concrete to a more **abstract way of thinking**. As you know, when using list\
    \ methods, we use a *coding* language that is more similar to a *natural* language.\
    \ Method names, in fact, are words in the English vocabulary, such as *remove*,\
    \ *insert*, etc. Instead, when slicing, we use numbers—which represent element\
    \ positions—and thus we use (numerical) symbols in place of words. As you can\
    \ see, we are building more and more the abstract thinking that coding requires.\
    \ So let's keep going!\n\n- Replace \"tongue\" and \"skin\" with \"taste\" and\
    \ \"touch\":\n\n```python\nsenses[3:5] = [\"taste\", \"touch\"]\nprint(senses)\n\
    # Output: ['eyes', 'smell', 'ears', 'taste', 'touch']\n```\n\nTo change **several\
    \ elements** in a list, first we slice the elements we want to substitute, and\
    \ then we assign them a list containing the new values. In this case, we want\
    \ to replace two elements, so we slice using the three-s rule. The start is the\
    \ position of \"tongue\", which is 3, and the stop is the position of \"skin\"\
    , which is 4, but it becomes 5 because of the plus one rule. The step is 1, so\
    \ we can omit it. To the sliced list, we assign a list containing the new elements,\
    \ which are the strings \"taste\" and \"touch\" (line 1). Finally, we print the\
    \ list to make sure that the change occurred correctly (line 2).\n\n- Replace\
    \ \"eyes\" and \"ears\" with \"sight\" and \"hearing\":\n\n```python\nsenses[0:3:2]\
    \ = [\"sight\", \"hearing\"]\nprint(senses)\n# Output: ['sight', 'smell', 'hearing',\
    \ 'taste', 'touch']\n```\n\nLike in the previous example, we want to replace several\
    \ elements. So, we begin by slicing the list. The start is the position of \"\
    eyes\", which is 0 (and can be omitted). The stop is the position of \"ears\"\
    , which is 2, but it becomes 3 because of the plus one rule. The two elements\
    \ are not consecutive, thus we have to write the step, which is 2. Finally, we\
    \ assign the list containing the two strings we want to add: \"sight\" and \"\
    hearing\". Note that the two elements we want to replace are not consecutive,\
    \ but Python takes care of placing \"sight\" and \"hearing\" in the right positions\
    \ (line 1). At the end, we print the final list to check the changes we made (line\
    \ 2).\n\n## 2. Planets\n\nTo **add new elements** to a list, we can use **slicing\
    \ combined with list concatenation and assignment**. How? Let's have a look at\
    \ the following examples!\n\n- Let's start with the following list:\n\n```python\n\
    planets = [\"Mercury\", \"Mars\", \"Earth\", \"Neptune\"]\nprint(planets)\n# Output:\
    \ ['Mercury', 'Mars', 'Earth', 'Neptune']\n```\n\nWe begin with the list `planets`,\
    \ which contains four strings: \"Mercury\", \"Mars\", \"Earth\", and \"Neptune\"\
    \ (line 1), and we print it out (line 2).\n\n- Add \"Jupiter\" at the end of the\
    \ list:\n\n```python\nplanets = planets + [\"Jupiter\"]\nprint(planets)\n# Output:\
    \ ['Mercury', 'Mars', 'Earth', 'Neptune', 'Jupiter']\n```\n\nTo add an element\
    \ at the end of a list, we (1) embed it in a list, (2) concatenate it to the original\
    \ list, and (3) assign the result to the original list. It's less complicated\
    \ than it sounds! Let's start from the far right of line 1. We take the new element\
    \ \"Jupiter\"—which is a string—and we enclose it in square brackets to transform\
    \ it into a list: `[\"Jupiter\"]`. Why do we need to change \"Jupiter\" data type?\
    \ Because we want to add it to the list `planets` using concatenation. And, as\
    \ in string concatenation, we can concatenate only strings with strings; in list\
    \ concatenation, we can concatenate only lists with lists. Note that list concatenation\
    \ works the same way as string concatenation. Finally, we assign the result of\
    \ the operation to the original list `planets` to actually change it. It is common\
    \ to say that we reassign the result to the original list. This whole operation\
    \ constitutes an alternative to the method `.append()`. Finally, we print out\
    \ the modified list to check the correctness of our code (line 2).\n\nYou may\
    \ have realized that in this example there is no slicing! This is because it's\
    \ a special case, where we add an element at the end of a list—it would be similar\
    \ if we added an element at the beginning of a list. We could write `planets[0:4]\
    \ + [\"Jupiter\"]`, where `planets[0:4]` slices all the elements in the list,\
    \ but that would be redundant. Let's see slicing in action in the next two examples!\n\
    \n- Add \"Venus\" between \"Mars\" and \"Earth\":\n\n```python\nplanets = planets[0:2]\
    \ + [\"Venus\"] + planets[2:5]\nprint(planets)\n# Output: ['Mercury', 'Mars',\
    \ 'Venus', 'Earth', 'Neptune', 'Jupiter']\n```\n\nIn this case, we want to add\
    \ an element in the middle of a list. To do so, we (1) split the list in two segments\
    \ at the position where we want to insert the new element, (2) insert the new\
    \ element as a list by concatenating it with the two list segments, and (3) assign\
    \ the result to the original list. Like before, it's easier than it sounds! We\
    \ want to split the list between \"Mars\" and \"Earth\". So, the first list segment\
    \ will contain \"Mercury\" and \"Mars\". Thus, we slice `planets` starting from\
    \ position 0, corresponding to \"Mercury\", and stopping in position 2 for the\
    \ plus one rule; \"Mars\" is in position 1.\n\nThe second list segment will contain\
    \ \"Earth\", \"Neptune\", and \"Jupiter\". So, we slice starting from position\
    \ 2, corresponding to \"Earth\", and stopping in position 5 for the plus one rule;\
    \ \"Jupiter\" is in position 4. In between the two list segments, we concatenate\
    \ a new list containing the string \"Venus\"—like before, we have to change \"\
    Venus\" from a string to a list. We conclude the operation by assigning the concatenation\
    \ result to the original list. As you may have realized, this line is an alternative\
    \ to the method `.insert()` (line 1). Finally, we print out the obtained list\
    \ to check the correctness of the operation (line 2).\n\nA nice way to think about\
    \ the whole procedure is to consider a list like a **toy train**, where each list\
    \ element is a car. When we want to insert a new car, for example a restaurant\
    \ car, we split the train into two parts in the position where we want the new\
    \ car to be. Then, we add the first part of the train to the left side of the\
    \ restaurant car, and the second part of the train to the right side of the restaurant\
    \ car. Thus, we obtain our modified train!\n\n- Add \"Uranus\" and \"Saturn\"\
    \ between \"Neptune\" and \"Jupiter\":\n\n```python\nplanets = planets[:5] + [\"\
    Uranus\", \"Saturn\"] + planets[5:]\nprint(planets)\n# Output: ['Mercury', 'Mars',\
    \ 'Venus', 'Earth', 'Neptune', 'Uranus', 'Saturn', 'Jupiter']\n```\n\nTo insert\
    \ **several consecutive elements in the middle of a list**, we use the same approach\
    \ as the one above. We slice the first part of the list `planets` from the beginning\
    \ (start omitted) to 5, which corresponds to the position of \"Neptune\" plus\
    \ 1. Then, we concatenate the two new elements \"Uranus\" and \"Saturn\" embedded\
    \ in a list. Finally, we concatenate the remaining part of the list `planets`,\
    \ starting from the position of \"Jupiter\", which is 5, and stopping at the end\
    \ of the list (stop omitted). As you'll probably notice, when we want to insert\
    \ several consecutive elements in the middle of a list, we just **embed all the\
    \ elements in a list** (line 1). Finally, we print out the modified list to check\
    \ whether we added the new elements correctly (line 2).\n\nNow a trick! We saw\
    \ that the start of the first list segment and the stop of the second list segment\
    \ are omitted. In addition, you may have noticed that the stop of the first list\
    \ segment coincides with the start of the second list segment—they are both 5.\
    \ This is because of the plus one rule applied to the stop of the first list segment.\
    \ Therefore, when adding new elements using slicing, we can **just count the stop\
    \ of the first list segment**. That will coincide with the start of the second\
    \ list segment. The remaining start and stop can be omitted!\n\nAn important note\
    \ before continuing: in the past three examples, we started analyzing code from\
    \ the right side of the assignment symbol. Focusing on that side is quite common\
    \ because it is where we define variable changes and operations. Sometimes, we\
    \ can even start writing code on the right side of the assignment symbol, and\
