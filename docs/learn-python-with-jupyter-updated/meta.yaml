  md: 'again the player if they want more candies (line 20). Then, we go back to the
    while loop header (line 11). If the answer at line 20 was yes, we''ll do the same
    as above, that is: add a unit to the variable `number_of_candies` (line 14); print
    out the current number of candies (line 17), and ask again the player if they
    want more candies (line 20). Then, we will go back to the while loop header again
    (line 11). If the answer at line 20 was yes again, we will do the same as above
    once more, that is: add a unit to the variable `number_of_candies` (line 14),
    ... We''ll keep doing this **as long as** the variable `answer` is equal to yes.
    What if the player answers *no* at line 20? When we go back to the while loop
    header (line 11), the condition is not valid anymore, because `answer` is not
    equal to yes! So the loop stops, and we go directly to the first line after the
    while loop body (line 23). There, we print out the total number of candies.


    Let''s now look into the syntax. The while loop starts with a **header** (line
    11), which is composed of three parts: (1) the keyword `while`, (2) a condition,
    and (3) colon `:` (every construct header ends with a colon!). In this example,
    we check whether the value assigned to the variable `answer` equals the string
    "yes". We will see other kinds of conditions in the next chapter. After the header,
    there is the **body** of the while loop (lines 13–20). The body is **indented**,
    similarly to the `for` loop body and `if/elif/else` statements. Let''s now focus
    our attention on two variables: `answer` and `number_of_candies`.


    How many times do you see the variable `answer` and where? `answer` is in **three**
    different places: (1) **before** the while loop (line 8), (2) **in the condition**
    of the while loop, and (3) **in the body** of the while loop. Why do we need it
    three times? Before a while loop, we always have to initialize the variable contained
    in the condition of the while loop header; otherwise, we cannot evaluate the condition
    itself when the loop starts. In our example, we initialize `answer` with the first
    player''s answer (line 8). Then, we have to check the condition involving the
    variable `answer`. In this case, we check if `answer` is equal to yes (line 11).
    Finally, we have to allow the variable to change (line 20), so that the loop can
    terminate; otherwise, the loop will keep going indefinitely. Sooner or later,
    we all forget this last part, and we get into an **infinite loop**! If that happens
    to you, just stop the cell (if it takes too long, restart the kernel!)


    Let''s finally look into the variable `number_of_candies`. How many times do you
    see it and where? `number_of_candies` is in **two** places: (1) **before** the
    while loop, where it is **initialized** (line 2), and (2) **in** the while loop,
    where it is **incremented** by one unit at every loop (line 14). The variable
    `number_of_candies` is generally called **counter** because **it keeps count of
    the number of loops**. The symbol `+=` is an **assignment symbol**, and we can
    pronounce it as *incremented by*. It is a compact way of writing `number_of_candies
    = number_of_candies + 1`. For any arithmetic operator, there is the associated
    assignment operator, that is, `-=` (*decrease by*), `*=` (*multiply by and reassign*),
    `/=` (*divide by and reassign*), etc. Note that in assignment operators, the symbol
    `=` is always in the second position, after an arithmetic operator.'
