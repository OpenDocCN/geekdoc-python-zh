  - '[PAGE 44]


    We start again from line 1, where we read if wanted_book, which now is "Basic
    Python", is in books, which is ["Learn Python", "Python for all", "Intro to Python"].
    But this time, "Basic Python" is not in the list books. So we skip line 2, go
    directly to line 3—where there is else—and proceed to line 4, where we print the
    string "Sorry, we do not sell that book".


    As you can deduce from the example above, in an if/else construct, code is executed
    depending on the **truthfulness of a condition**. If the condition in the if line
    is met, or true, we execute the underlying code. Otherwise, if the condition in
    the if line is not met, or false, then we execute the code under else. Therefore,
    we can define the if/else construct as follows:


    > An **if/else construct** checks whether a condition is true or false,

    and executes code accordingly:

    if the condition is met, the code under the **if** condition is executed;

    if the condition is *not* met, the code under **else** is executed.


    Let''s now focus on the syntax. An if/else construct is composed of four parts,
    explained below:


    +   - **if condition** (line 1) contains a condition that determines code execution.
    It is made up of three components: (1) the **keyword if**, colored *bold green*
    in Jupyter Notebook, (2) the condition itself, and (3) the punctuation mark colon
    :

    - **Statement** (line 2) contains the code that gets executed if the condition
    at line 1 is met

    - **else** (line 3) implicitly contains the alternative to the condition on line
    1. This line is always composed of the **keyword else** followed by the colon
    :

    - **Statement** (line 4) contains the code that gets executed if the condition
    at line 1 is not met


    Note: else and its following statements are not mandatory. There are cases when
    we do not want to do anything if the conditions are not met. Some examples of
    this scenario are provided in the following chapters.


    Before concluding, let''s zoom even more into these lines and focus on two more
    aspects: membership conditions and indentation. In coding, we can use various
    types of conditions, and you will see these throughout the book. In this case,
    we have a **membership condition**: wanted_book in books (line 1), where we check
    whether a variable contains one of the elements of a list. In a membership condition,
    we write: (1) variable name, (2) **in**, and (3) the list in which we want to
    find the element. **in** is a **membership operator**. In Jupyter Notebook, this
    is colored bold green, like keywords. In general, make sure not to confuse keywords,
    in bold green, with built-in functions, in fainter green.


    Finally, notice that the statements under the if condition (line 2) and under
    the else (line 4) are always indented, which means shifted toward the right. An
    **indentation** consists of 4 spaces, or 1 tab. In Jupyter Notebook, when pressing
    enter or return after writing the if or else lines, the cursor is always automatically
    placed at the right indented position. Under an if or an else condition, we can
    write as many commands as we want, but they must be indented correctly to be executed.'
