    \ 7.\n    d. Replace \"use\" with \"program\".\n    e. Add \"because\" after \"\
    a computer\".\n    f. Replace \"somebody\" with \"everybody\".\n    g. Add \"\
    \ - Steve Jobs\" at the end.\n3. *Grace Hopper*. Do you know why we say *debugging*\
    \ in coding? Let's find out! Given the following list:\n    ```\n    grace_hopper\
    \ = [\"In 1946\", \"a moth\", \"caused\", \"a malfunction\", \"in an early\",\
    \ \"electromechanical\", \"computer\"]\n    ```\n    Modify it by doing the following:\n\
