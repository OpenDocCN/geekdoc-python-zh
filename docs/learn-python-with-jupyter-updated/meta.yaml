    \ let's begin from the built-in function `range()`. It takes two arguments: 0\
    \ and 4. They are two integers that we can call—guess what?—start and stop! So,\
    \ what does `range()` do? Create a separate cell in the notebook, and then write\
    \ and run the following code:\n\n```\n[4]: 1 list(range (0,4))\n     [0,1,2,3]\n\
    ```\n\nThe built-in function `range()` returns a sequence of integers spanning\
    \ from the start (included) to the stop (excluded because of the plus one rule).\
    \ In this example, the integers go from 0 to 3, and—guess what again?—they correspond\
    \ to the indices of the elements of the list `friends`! Why is there `list()`?\
    \ This is another built-in function that we write here for a proper print out.\
    \ Don't worry too much about it for now. Let's focus on understanding the for\
    \ loop!\n\nWhat do we do with the list of integers created by `range()`? We assign\
