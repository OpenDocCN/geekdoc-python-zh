    \ Notebook 6并跟着做！首先，什么是切片？\n\n> **切片**意味着通过索引访问列表元素\n\n如果你爱吃甜食，“切片”这个词会立刻让你想到一块蛋糕。事实上，切蛋糕和切列表之间有相当大的相似之处！在第一种情况下，你为客人——也为你自己——“提取”一块或多块蛋糕；在第二种情况下，你为后续的代码行提取一个或多个列表元素。\n\
