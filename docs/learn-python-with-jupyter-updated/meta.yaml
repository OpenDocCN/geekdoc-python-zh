  md: "# 22. More about the for loop\n\nVarious ways of repeating commands on lists\
    \ and beyond\n\nIn the past several chapters, we have learned how to use the for\
    \ loop to browse lists (Chapters 8 and 9), search elements in lists (Chapter 10),\
    \ change list elements (Chapter 11), and create lists by adding one element at\
    \ a time (Chapter 12). In addition, we have used the for loop to repeat commands\
    \ independently of lists (see the “In more depth” section in Chapter 15). We will\
    \ start this Chapter by briefly refreshing what we already know for sake of completeness.\
    \ Then, we will discover new for loops that we can use with lists, each of them\
    \ with their own characteristics and usage. Ready? Follow along with notebook\
    \ 22!\n\n# 1. Repeating commands\n\nAs the definition says,\n\n> A **for loop**\
    \ is the repetition of a group of commands for a **determined** number of times.\n\
    \nLet’s get a refresher on this concept with the following example:\n\n+   - Print\
    \ 3 random numbers between 1 and 10:\n\n```\npython\nimport random\n\nfor _ in\
    \ range(3):\n    number = random.randint(1, 10)\n    print(number)\n```\n\nWe\
    \ import the package `random` (line 1). Then, we implement the for loop (lines\
    \ 3–5). We start with the header, which contains: (1) the keyword **for**; (2)\
    \ a variable for the index; (3) the membership operator **in**; and (4) the built-in\
    \ function `range()` (line 3). In this case, we use an underscore as a variable\
    \ for the index because we do not need the index in the loop body. We will review\
    \ the characteristics of the built-in function `range()` in the next paragraph.\
    \ In the body of the for loop—which is always indented with respect to the header—we\
    \ create a random number between 1 and 10 using the function `.randint()` from\
    \ the package `random` (line 4), and we print the created number (line 5). The\
    \ lines of code in the loop body are repeated at each loop or iteration—in this\
    \ case, three times, as indicated by `range(3)`.\n\n# 2. For loop with lists\n\
    \nThere are at least 4 ways to use the for loop with lists. You already know the\
    \ first one: the for loop through indices. In this section, we’ll learn the for\
    \ loop through elements, through indices and"
