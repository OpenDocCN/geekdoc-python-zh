  mdcn: "## 第三部分：for 循环简介\n\n追加或拼接。不要赋值！\n\n在 for 循环中创建新列表时，一个常见错误是将新元素赋值给列表，而不是追加或拼接它。让我们通过以下示例来理解其含义。这里使用的是本章前面用过的同一个列表：\n\
    \n```python\nauthors = [\"Alcott\", \"Saint-Exupéry\", \"Arendt\", \"Sepulveda\"\
    , \"Shakespeare\"]\n```\n\n让我们简化代码，只创建包含作者姓氏以 A 开头的列表。为了展示错误如何发生，在第 10 行，我们将 `authors[i]`\
    \ 赋值给新列表 `shelf_a`，而不是追加（或拼接）它。在整个代码中，`shelf_a` 发生了什么变化？\n\n```python\n# 初始化变量\n\
    shelf_a = []\n# 遍历列表中的每个位置\nfor i in range(len(authors)):\n    # 获取作者的首字母\n  \
    \  author_initial = authors[i][0]\n\n    # 如果作者的首字母是 A\n    if author_initial\
    \ == \"A\":\n        # 将作者添加到 shelf_a\n        shelf_a = authors[i]\n\n      \
    \  print(\"The shelf A now \" + \"contains: \" + str(shelf_a))\n# 打印最终的书架\nprint(\"\
    The authors on the shelf A are: \" + str(shelf_a))\n```\n\nThe shelf A now contains:\
    \ Alcott\nThe shelf A now contains: Arendt\nThe authors on the shelf A are: Arendt\n\
    \n让我们逐步分析 for 循环，并关注以 A 开头的名字：\n\n- 当 i 为 0（第 4 行）时，`author_initial` 是 \"A\"（第\
    \ 6 行）；if 条件为真（第 8 行），因此我们将 `authors[i]`——即 \"Alcott\"——赋值给 `shelf_a`（第 10 行），并打印出\
    \ The shelf A now contains: Alcott（第 11 行）。通过第 10 行的赋值，我们隐式地将 `shelf_a` 从一个列表（我们在第\
    \ 2 行初始化的）转换成了一个字符串——因为我们给它赋值了字符串 \"Alcott\"。\n- 当 i 为 2（第 4 行）时，`author_initial`\
    \ 是 \"A\"（第 6 行）；if 条件为真（第 8 行），我们将 `authors[i]`——即 \"Arendt\"——赋值给 `shelf_a`（第\
    \ 10 行），并打印出：The shelf A now contains: Arendt（第 11 行）。在这种情况下，在第 10 行的赋值中，我们用值\
    \ \"Arendt\" 覆盖了之前循环中赋值的值 \"Alcott\"；因此，`shelf_a` 仍然是一个字符串。\n\n在第 13 行，我们打印 `shelf_a`\
    \ 的最终版本，它是一个值为 \"Arendt\" 的字符串。\n\n总之，将一个变量赋值给列表（例如 `shelf_a = authors[i]`）会改变列表本身的类型为该变量的类型（例如\
    \ `shelf_a` 变成了字符串）。此外，该值在每次循环中都会被覆盖，最终值是最后一次循环中赋的值。因此，向列表添加元素的正确方法是追加——例如 `shelf_a.append(authors[i])`——或拼接——例如\
    \ `shelf_a = shelf_a + [authors[i]]`。\n\n## 让我们来编码！\n\n1. 对于以下每种场景，创建类似于本章中展示的代码。\n\
