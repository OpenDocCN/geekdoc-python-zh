  md: '# Part 5. The while loop and conditions


    What is the difference between a for loop and a while loop? In Chapter 8, we defined
    the while loop as follows:


    > A **for loop** is the repetition of a group of commands for a **determined**
    number of times


    In a **for loop**, we know exactly **how many times** we are going to run the
    commands in the loop body. Conversely, **in a while loop we do *not* know how
    many times** we are going to run the commands in the loop body because the duration
    of a while loop depends on the validity of the condition in the header. Let’s
    define the while loop and summarize its characteristics:


    > A **while loop** is the repetition of a group of commands **as long as a condition**
    holds


    A while loop stops when the condition in the header is not true anymore. We always
    have to give the variable in the condition the possibility to change so that the
    condition in the header can be false and the loop can stop. If the variable in
    the condition (`answer` in our example) cannot change in the while loop body,
    then we will get an infinite loop. Finally, to know how many times we run the
    loop, we can use a counter (`number_of_candies` in our example) to keep track
    of the number of iterations. The presence of a counter is not compulsory.


