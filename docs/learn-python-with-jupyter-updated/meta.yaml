    Let''s analyze the details of the code! Let''s run the first cell:


    ```

    [1]:

    1 todays_menu = ["burger", "salad", "coke"]

    2 print (todays_menu)

    [''burger'', ''salad'', ''coke'']

    ```


    We create a list called todays_menu containing three elements of type string—"burger",
    "salad", and "coke" (line 1)—and we print it out (line 2).


    In the second cell, we meet the new list method .index(). What does it do? Let''s
    run the cell:


    ```

    [2]:

    1 side_dish_index = todays_menu.index("salad")

    2 print (side_dish_index)

    1

    ```


    The method .index() looks for the element "salad" in the list todays_menu and
    tells us its position. More technically, we say that .index() takes the argument
    "salad" and returns its index. The position of "salad" is then assigned to the
    variable side_dish_index (line 1), which we print out (line 2). Note that in coding,
    we use the two synonyms index and position interchangeably.


    Why is "salad" in position 1 and not 2? This is because in Python we count elements
    starting from 0, as you can see in the figure below: "burger" is in position 0,
    "salad" in position 1, and "coke" in position 2.


    ![](img/1e0d8bb8215d579da0d409223f09e364_54_0.png)


    Finally, note that an element position is a number. In Python, zero, positive,
    and negative whole numbers are called integers, abbreviated as int. In our example,
    the variable side_dish_index contains the number 1, and it is of type integer.


    Let''s discover what .pop() does by running the next cell:


    ```

    [3]:

    1 todays_menu.pop(side_dish_index)

    2 print (todays_menu)

    [''burger'', ''coke'']

    ```


    The method .pop() removes the element in position side_dish_index from the list
    todays_menu. In other words, .pop() takes side_dish_index as an argument and removes
    the element at that index, which is "salad". In the previous chapter, we saw another
    method that deletes an element from a list: .remove(). What is the difference
    between the two methods? The method .remove() deletes an element of a certain
    value, whereas .pop() deletes an element in a specific position.'
  - '[PAGE 55]


    Part 2. Introduction to lists and if/else constructs


    And finally, let''s learn the method .insert(). Let''s run the last cell:


    ```

    [4]: 1 todays_menu.insert(side_dish_index, "fries") today''s menu dot insert at
    side dish index fries

    2 print (todays_menu) print today''s menu

    [''burger'', ''fries'', ''coke'']

    ```


    The method .insert() allows us to add an element at a specific index. It takes
    two arguments: (1) the index where we want to insert the new element and (2) the
    value of the new element. In this case, we want to insert at position side_dish_index,
    which is position 1, the string "fries". Similarly, in the previous chapter we
    saw another method to add an element to a list: .append(). What''s the difference?
    The method .append() adds an element at the end of a list, whereas .insert() adds
    an element in a specific position of a list.


    Finally, when dealing with lists, we must always be aware of that each element
    has a position. In some cases, it is more convenient to work directly on the elements
    and use methods like .append() and .remove(). In other cases, it is more appropriate
    to work on elements'' positions, so we use methods such as .index(), .pop(), and
    .insert(). Note that .append(), .remove(), .pop(), and .insert() modify the list.
    On the other side, .index() gives us some information about the list, and we can
    save this information in a separate variable. Lastly, .append(), .remove(), .index(),
    and .pop() take only one argument, whereas .insert() takes two arguments, which
    are position and new element.


    # Complete the table


    So far you have learned five list methods. Summarize what they do by completing
    the following table.


    | List method | What it does |

    |---|---|

    | .append() | |

    | .remove() | |

    | .index() | |

    | .pop() | |

    | .insert() | |


    # Recap


    +   - The method .index() returns the position of an element in a list

    - The method .pop() removes an element in a certain position from a list

    - The method .insert() adds an element in a certain position to a list

    - Indices (or positions) of elements start from 0 and increase in increments of
    one unit; they are of type integer'
- md: "We code in English!\n\nDuring a coffee break, a colleague once told me, “Isn’t\
