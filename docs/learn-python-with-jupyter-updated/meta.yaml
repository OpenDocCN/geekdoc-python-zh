    \ procedure follows in the third iteration for \"zhang\". However, when we print\
    \ the final list, all strings are still lower case (line 6). This is **because\
    \ the for loop through elements does not keep track of element positions, so it\
    \ is impossible to know where to overwrite a list element**. Finally, note that\
    \ because there is no index, in a for loop through elements we **cannot keep track\
    \ of the iteration number**. If we need to know the iteration number, we can either\
    \ use a for loop through *indices* (Section 2.1) or a for loop through *indices\
    \ and elements* (Section 2.3).\n\n# 2.3 For loop through indices and elements\n\
    \nAs the name implies, the for loop *through indices and elements* combines a\
    \ for loop through *indices* with a for loop through *elements*. Its implementation\
    \ is straightforward. Try to understand the example below before reading the subsequent\
    \ explanation.\n\n+   - Capitalize each string using a for loop through *indices\
    \ and elements*:\n\n```\nlast_names = [\"garcia\", \"smith\", \"zhang\"]\n\nfor\
    \ i,last_name in enumerate (last_names):\n    print (\"The element in position\
    \ \" + str (i) + \" is: \" + last_name)\n    last_names[i] = last_name.title()\n\
    ```"
