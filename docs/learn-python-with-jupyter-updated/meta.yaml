    # Find the differences


    Can you identify some differences between the while loop in the example above
    and the one in Chapter 17?


    As you might remember from Chapter 17, for a while loop, we have to create a variable
    that is: (1) initialized *before the header*, (2) included in a condition *within
    the header*, and (3) allowed to change *in the body* to avoid infinite iterations.
    In the example in Chapter 17, the variable following these three rules was `answer`.
    In this example, it is `flag`. We initialize `flag` as a Boolean of value `True`
    (line 5), then we check if its value is equal to `True` in the while loop header
    (line 11), and finally we allow it to change to `False` (line 32) to avoid infinite
    loops. `flag` is a common variable name for a Boolean variable that behaves this
    way—`counter` is another typical variable name for a variable that keeps count
    of the number of iterations. We can think of a `flag` variable like a traffic
    light that makes the loop continue or stop. As long as the traffic light is green
    (i.e., `flag` is `True`), the loop will continue. When the traffic light changes
    to red (i.e., `flag` is assigned `False`), the loop ends. Using a Boolean flag
    in the while loop is somewhat like providing the answer to a condition instead
    of asking the header to test the condition.


    When using a flag, the construction of a while loop might change. What about the
    variable `answer` in this new code version? We initialize `answer` at the beginning
    of the while loop body, where we use the built-in function `input` to ask a question
    to the player (line 14). Then we create an if/else condition to decide what to
    do based on the value of `answer` (lines 17–32). If the `answer` is "yes", then
    we increment the counter `number_of_candies` by 1 (line 20) and we print a feedback
    to the player (line 23). Otherwise (i.e., `else`), we print a final feedback to
    the player (line 29) and we allow the flag to change (line 32).


    These are several ways to write a while loop. Which one should we use? All have
    pros and cons. Choose the one that appears simpler and easier to understand!


    # Recap


    +   - When we write a comparison or a condition, the outcome is a Boolean variable

    - Booleans are a Python type, like lists, strings, integers, etc.

    - There are only 2 Boolean values: True and False

    - Combinations of conditions using and, or, not follow the *truth tables*

    - Booleans can be used as *flags* in while loops (they act like traffic lights)'
