    print cities in position minus one


    The advantage of using the negative index is that we do not need to count through
    all the list elements to get to know the position of "Melbourne". Since "Melbourne"
    is the last element of the list, we can just write -1. This saves us time and
    eliminates possible errors due to miscounting.


    8. Slice all the cities from "Prague" to "Tokyo" using negative indices:


    ```

    [13]: 1 print (cities[-4:-1])

    [''Prague'', ''Cape Town'', ''Tokyo'']

    ```


    print cities in positions from minus four to minus one


    This is in an alternative to example 2. There, we extracted the cities from "Prague"
    to "Tokyo" using positive indices, whereas here we want to use negative indices.
    It might look intimidating, but the reasoning is always the same. The first element
    we want to extract is Prague, which is in position -4, therefore the start is
    -4. The last element we want to extract is Tokyo, which is in position -2, thus
    the stop is -1 because of the plus one rule. Like in the previous example, using
    negative indices can be very convenient when extracting elements from the end
    of a long list.


    In this example, we saw how to use negative indices for the start and the stop.
    What about the step? A **negative step** allows us **to slice elements in reverse
    order**, which means from the right to the left. Negative steps can be used with
    both positive or negative start and stop. This might sound confusing, but we''ll
    clarify it the next three examples. Slicing in reverse order is a very powerful
    feature, and it''s the last thing you need to know to master slicing. Let''s have
    a look!


    9. Slice all the cities from "Tokyo" to "Prague" using positive indices (reverse
    order):


    ```

    [14]: 1 print (cities[3:0:-1])

    [''Tokyo'', ''Cape Town'', ''Prague'']

    ```


    print cities in positions from three to zero with a step of minus one


    When slicing—and coding, in general—it is extremely important to be aware of the
    result we expect. When slicing in reverse order, having the result in mind can
    really avoid confusion. So, let''s start from there. We want to print out "Tokyo",
    "Cape Town", and "Prague". The first element is "Tokyo", which is in position
    3, so the start is 3. The last element is "Prague", which is in position 1. When
    we slice in reverse order, instead of the plus-one rule, we have to use the **minus
    one rule**, which says that **we must subtract 1 from the position of the last
    element we want to slice**. Why? This is very intuitive. As we know, for the stop,
    we always want to take the *next* position. When slicing in direct order, the
    next position is on the *right* side of the last element. Therefore, we add 1
    to its index. On the other side, when slicing in reverse order, the next position
    is on the *left* side of the last element. Therefore, we subtract 1 from its index.
    Now, back to our example. The last element is "Prague", which is in position 1.
    And because of the minus one rule, the stop is 0. Finally, we need to define the
    step. Because the elements are consecutive, the step should be 1, but because
    we are going in reverse order, we have to put a minus in front of it, so the step
    becomes -1.


    In summary, when slicing in reverse order, we have to: (1) make sure we have the
    first and the last elements clearly in our minds, (2) apply the minus one rule
    to the stop, and (3) use a negative step.


    Let''s raise the bar even more now! Look at the next example.'
