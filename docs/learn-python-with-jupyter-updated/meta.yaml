    \ `input()` 的函数！例如，当我们输入姓名以开设新账户、输入从 ATM 机取款的金额或填写在线表格时，情况就是如此。\n\n最后，需要提及的是，当我们编写代码时，*我们身兼两职*——也就是说，我们有两个角色：我们同时是程序员和用户！编写代码时，我们戴上\
    \ *程序员帽*：我们创建代码以执行任务，设计代码结构，并定义用户消息。测试代码时，我们戴上 *用户帽*：我们检查代码是否按预期工作、是否易于使用以及用户交互是否愉快。编码时，我们不断切换帽子！\n\
    \n## 3. ASCII 艺术：print()\n\n我们现在知道如何向用户提问，但如何向他们提供信息呢？我们使用 *内置函数* `print()`！了解\
