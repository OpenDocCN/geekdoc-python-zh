    # Computational thinking and syntax


    Let''s understand how these lines of code work! Let''s run the first cell. We
    will get a text box:


    ```

    [*]: 1 input ("What''s your name?")

    What''s your name? [ ]

    ```


    Type your name in the rectangle (I will write mine!):


    ```

    [*]: 1 input ("What''s your name?")

    What''s your name? Serena

    ```


    And now press *return* or *enter* on the keyboard. You will see the following
    (you will see your name, of course!):


    ```

    [3]: 1 input ("What''s your name?")

    What''s your name? Serena

    ''Serena''

    ```


    A few key things have happened here! First, the number on the left side of the
    cell turned to 3 as expected. But while answering the question, instead of the
    number 3, there was a **star symbol (*)**. This indicates that a cell has started
    to run but has not finished yet. To complete the cell run and execute the code,
    we have to press *return* or *enter* after typing the answer. If the cell run
    is not completed, the code in the cell does not get executed, and in addition,
    we will not be able to run the following cells. Now, let''s look at the code.
    We know that "What''s your name?" is a string, because it is text in between quotes
    and it is colored red. What about **input()**? input() allows us **to ask a question
    to a user**. In Jupyter Notebook, input() creates a *text box* (a white rectangle)
    where we can insert some text. input() performs a specific task and is called
    a *built-in function*.


    > A **built-in function** is a command that performs a specific task


    We can recognize if a code element is a built-in function by two characteristics.
    First, in Jupyter Notebook built-in functions are always *green*. Second, built-in
    functions are always followed by **parentheses ()**. In this book, instead of
    *parentheses*, we will call them **round brackets**, to differentiate from other
    types of brackets that we will encounter in the chapters that follow. In between
    the round brackets, we often write an **argument**, which for input() is a string
    containing the question we want to ask. *Built-in functions* are very useful,
    as they contain code written by the creators of a programming language to facilitate
    ease-of-use when coding.'
