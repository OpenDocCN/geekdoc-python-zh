    # Let’s use keyboard shortcuts!


    While coding, it can be very practical to use keyboard shortcuts to minimize typing
    interruptions. Although it might sound like a bit of an exaggeration, using the
    mouse can really be distracting at times because it slows down the typing rhythm
    and interrupts the writing flow. Shortcuts, on the other hand, allow us to never
    leave the keyboard! They are **combinations of keys pressed simultaneously** that
    can perform various operations. Let’s have a look at the most common ones. In
    the following examples, we will use the keys that are colored in the figure below.


    ![](img/1e0d8bb8215d579da0d409223f09e364_99_0.png)


    In the following shortcut combinations, *control/command* means that you will
    have to press the key *control* if you are using a Windows operating system, or
    the key *command* if you are using a MacOS operating system (that is, one of the
    red keys in the figure above). In addition, the symbol + means that you have to
    press the listed keys simultaneously. What shortcuts do you know among the following
    ones?


    +   - *control/command* + A (red key + pink key): selects all the lines of code
    in a cell—the letter A stands for *all*

    - *control/command* + X (red key + grey key): cuts selected lines of code

    - *control/command* + C (red key + yellow key): copies selected lines of code

    - *control/command* + V (red key + purple key): pastes selected lines of code

    - *control/command* + / (red key + orange key): adds a # in front of the selected
    lines of code—that is, it comments them out. If the key combination is re-pressed,
    the # is removed, and the code is un-commented

    - *tab* (green key): indents the selected lines of code—that is, it moves the
    lines four spaces towards right

    - *shift* + *tab* (blue key + green key): outdents the selected lines of code—that
    is, it moves the lines four spaces towards the left


    Note that these shortcuts can be used for *several* lines of code at once, thus
    speeding up the writing. Together with learning to type with ten fingers (see
    the in more depth session in Chapter 1), using shortcuts is an efficient way to
    write code faster and without interruptions!'
