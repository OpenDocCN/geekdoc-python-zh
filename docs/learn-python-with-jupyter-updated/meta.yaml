    \ and *through indices and elements* are not technical terms; however, we will\
    \ use them to distinguish between the different types of for loops. On the contrary,\
    \ *list comprehension* is a technical term that you can find in any Python book\
    \ or coding website. In all the examples in this section, we will start with the\
    \ following list, which contains three strings:\n\n```\nlast_names = [\"garcia\"\
    , \"smith\", \"zhang\"]\n```\n\nOur task will be to change the first letter of\
    \ each string to upper case. For that, we will apply the method `.title()` to\
    \ each list element, and we will overwrite the existing list whenever possible.\n\
    \n## 2.1 For loop through indices\n\nYou already know this for loop type. Let's\
    \ refresh our memories with the following example.\n\n- Capitalize each string\
    \ using a for loop through *indices*:\n\n```\nlast_names = [\"garcia\", \"smith\"\
    , \"zhang\"]\n\nfor i in range(len(last_names)):\n    print(\"The element in position\
    \ \" + str(i) + \" is: \" + last_names[i])\n    last_names[i] = last_names[i].title()\n\
    \nprint(last_names)\nThe element in position 0 is: garcia\nThe element in position\
    \ 1 is: smith\nThe element in position 2 is: zhang\n['Garcia', 'Smith', 'Zhang']\n\
    ```\n\nWe start with the list to modify (line 1). Then, we write the for loop\
    \ header, which is composed of: (1) the keyword `for`; (2) the index variable\
    \ `i`; (3) the membership operator `in`; and (4) the built-in function `range`\
    \ (line 3). `range()` can have three parameters: `start`, which we omit when it\
    \ is 0—like in this case; `stop`, which usually coincides with the length of the\
    \ list; and `step`, which we omit when it is 1—like in this example. If we need\
    \ to browse only the first half of the list, we can write `range(0, len(last_names)//2)`,\
    \ or if we want to browse only every second position of the list, we can write\
    \ `range(0, len(last_names), 2)`. Also, let's not forget that `range()` is a built-in\
    \ function that can be used independently from a for loop **to creates a range\
    \ of integers**: for example, `list(range(0,4))` returns the list `[0,1,2,3]`\
    \ and `list(range(0,4,2))` returns `[0,2]`. Why do we use `list()` combined with\
    \ `range()` when creating a list? Because the **built-in function `list()` converts**\
    \ the output of `range()`—which is its own data type—**to a list**. In the for\
    \ loop body, we print the current value of the index `i` and the corresponding\
    \ element `last_names[i]`, extracted by slicing (line 4). Then, we change the\
    \ current element `last_names[i]` by applying the string method `.title()` and\
    \ reassigning the result to `last_names[i]` itself (line 5). Finally, we print\
    \ `last_names` to check the modified list (line 7).\n\n## 2.2 For loop through\
    \ elements\n\nLet's learn the first new way of implementing the for loop: the\
    \ for loop through *elements*. Read the example below and try to understand what\
    \ it does:\n\n- Capitalize each string using a for loop through *elements*:\n\n\
    ```\nlast_names = [\"garcia\", \"smith\", \"zhang\"]\nlast_names_upper = []\n\n\
    for last_name in last_names:\n    print (\"The current element is \" + last_name)\n\
    \    last_names_upper.append(last_name.title())\n\nprint (last_names_upper)\n\
    The current element is: garcia\nThe current element is: smith\nThe current element\
    \ is: zhang\n['Garcia', 'Smith', 'Zhang']\n```\n\nAs in the previous example,\
    \ we start with the list to modify (line 1). We continue with a new empty list\
    \ called `last_names_upper` that we will fill within the loop (line 2). Then,\
    \ we create the for loop through elements (lines 4–6). The syntax of the header\
    \ is: (1) the keyword `for`; (2) a variable; (3) the membership operator `in`;\
    \ and (4) the list to browse. There are two differences with respect to the for\
    \ loop through indices. First, the **variable in position (2)** is not named `index`\
    \ or `i`, but it is usually called with the singular version of the list name—that\
    \ is, if the list name is `last_names`, then the variable name is `last_name`;\
    \ if the list name is `numbers`, then the variable name is `number`; and so on.\
    \ This is not a rule but a useful convention among Python coders. The second difference\
    \ is that we directly use the **list itself**—that is, `last_names`—in position\
    \ (4), instead of `range(len(last_names))`. Let's now focus on the loop body.\
    \ First, we print the current element `last_name` (line 5). As you may notice,\
    \ there is no slicing (that is, no `[i]`). This is because in a for loop through\
    \ elements, **the variable in position (2)**—that is, `last_name`—**automatically\
    \ browses list elements one after the other, without knowing their position**.\
    \ This is the opposite of what happens in a for loop through *indices*, where\
    \ the variable in position (2)—that is, `i`—browses list positions without knowing\
    \ the corresponding elements; to get an element, we must use slicing (e.g., `last_name[i]`).\
    \ See a schematic of the difference between the two loops in the following figure.\n\
    \n![](img/1e0d8bb8215d579da0d409223f09e364_199_0.png)\n\nIn the first iteration\
    \ of the example, last_name is \"garcia\"; in the second iteration, it is \"smith\"\
    ; and in the third iteration, it is \"zhang\". We conclude by applying the method\
    \ .title() to the string last_name and appending the output to last_names_upper\
    \ (line 6). Finally, we print last_names_upper (line 8). Why don't we directly\
    \ modify last_names? Because in a for loop through elements, **we cannot modify\
    \ the list** we are browsing. We can only create a new list (that is, last_name_upper)\
    \ to which we append the modified elements (that is, last_name.title()). Let's\
    \ see what happens if we try to use a for loop through *elements* to change elements:\n\
    \n```\nfor last_name in last_names:\n    print (\"last_name before change: \"\
    \ + last_name)\n    last_name = last_name.title()\n    print (\"last_name after\
    \ change: \" + last_name)\nprint (last_names)\nlast_name before change: garcia\n\
    last_name after change: Garcia\nlast_name before change: smith\nlast_name after\
    \ change: Smith\nlast_name before change: zhang\nlast_name after change: Zhang\n\
    ['garcia', 'smith', 'zhang']\n```\n\nIn the first iteration, the variable last_name\
    \ is \"garcia\" (line 2), we change it to \"Garcia\" (line 3), and we print it\
    \ (line 4). In the second iteration, last_name is \"smith\" (line 2), we change\
    \ it to \"Smith\" (line 3), and we print it (line 4). The procedure follows in\
    \ the third iteration for \"zhang\". However, when we print the final list, all\
    \ strings are still lower case (line 6). This is **because the for loop through\
    \ elements does not keep track of element positions, so it is impossible to know\
    \ where to overwrite a list element**. Finally, note that because there is no\
    \ index, in a for loop through elements we **cannot keep track of the iteration\
    \ number**. If we need to know the iteration number, we can either use a for loop\
    \ through *indices* (Section 2.1) or a for loop through *indices and elements*\
    \ (Section 2.3).\n\n## 2.3 For loop through indices and elements\n\nAs the name\
    \ implies, the for loop *through indices and elements* combines a for loop through\
    \ *indices* with a for loop through *elements*. Its implementation is straightforward.\
    \ Try to understand the example below before reading the subsequent explanation.\n\
    \n- Capitalize each string using a for loop through *indices and elements*:\n\n\
    ```\nlast_names = [\"garcia\", \"smith\", \"zhang\"]\n\nfor i,last_name in enumerate\
    \ (last_names):\n    print (\"The element in position \" + str (i) + \" is: \"\
    \ + last_name)\n    last_names[i] = last_name.title()\n\nprint (last_names)\n\
    The element in position 0 is: garcia\nThe element in position 1 is: smith\nThe\
    \ element in position 2 is: zhang\n['Garcia', 'Smith', 'Zhang']\n```\n\nThe for\
    \ loop header consists of (1) the keyword for; (2) two variables separated by\
    \ comma, called i and last_name; (3) the membership operator in; and (4) the built-in\
    \ function enumerate() with the list last_names as an argument (line 3). The differences\
    \ with the other for loop headers is again in the components (2) and (4). The\
    \ role of i and last_name is quite intuitive: i is the index that browses all\
    \ the positions in the list—like in a for loop through indices—and last_name is\
    \ the variable that browses all the elements in the list—like in a for loop through\
    \ elements. The values to browse are provided by enumerate(), as we can see from\
    \ the following command (where we use list() to convert enumerate()'s output data\
    \ type into a list to be printed):\n\n```\nprint(list(enumerate(last_names)))\n\
    [(0, 'garcia'), (1, 'smith'), (2, 'zhang')]\n```\n\nThe built-in function enumerate()\
    \ provides a list of coupled indices and elements—that is, (0, 'garcia'), (1,\
    \ 'smith'), and (2, 'zhang'). Each pair is between round brackets, which indicate\
    \ a tuple. Tuples are sequences of elements separated by comma and in between\
    \ round brackets. We will talk about tuple characteristics in Chapter 34. During\
    \ the for loop in this example, the variable i is assigned the first element of\
    \ each pair—that is, 0, 1, and 2—and the variable last_name is assigned the second\
    \ element of each pair—that is, 'garcia', 'smith', and 'zhang'. In the remaining\
    \ part of the example, first we print the position of each element i and its value\
    \ last_name (line 4). Then, we apply the method .title() to last_name, and we\
    \ assign the result to the element in the same position last_names[i] (line 5).\
    \ Finally, we print the resulting list (line 6). The for loop through indices\
    \ and positions is useful when we need to extract both positions and elements\
    \ of a whole list.\n\n## 2.4 List comprehension\n\nThe fourth and last method\
    \ to use a for loop in combination with lists is called list comprehension. It\
    \ might look complex at first glance, but we are going to untangle it right away!\n\
    \n- Capitalize each string using list comprehension containing a for loop through\
    \ indices:\n\n```\nlast_names = [\"garcia\", \"smith\", \"zhang\"]\nlast_names\
    \ = [last_name.title() for\ni in range(len(last_names))]\nprint (last_names)\n\
    ['Garcia', 'Smith', 'Zhang']\n```\n\nAt line 2, we see: (1) the list name; (2)\
    \ the assignment symbol; and (3) the list comprehension. In the list comprehension,\
    \ there are two components embedded within a pair of square brackets: (1) the\
    \ value of the list element that we are going to insert into the list—that is,\
    \ last_name.title(); and (2) a for loop header—that is, for i in range(len(last_names)).\
    \ To better understand the syntax, let's have a look at the figure below comparing\
    \ the for loop through indices from cell 2 and the list"
  mdcn: "元素，以及列表推导式。请注意，*通过索引*、*通过元素*和*通过索引和元素*并非技术术语；然而，我们将用它们来区分不同类型的 for 循环。相反，*列表推导式*是一个技术术语，你可以在任何\
    \ Python 书籍或编程网站上找到。在本节的所有示例中，我们将从以下包含三个字符串的列表开始：\n\n```\nlast_names = [\"garcia\"\
    , \"smith\", \"zhang\"]\n```\n\n我们的任务是将每个字符串的首字母改为大写。为此，我们将对每个列表元素应用 `.title()`\
    \ 方法，并尽可能覆盖现有列表。\n\n## 2.1 通过索引的 for 循环\n\n你已经知道这种 for 循环类型。让我们通过以下示例来回顾一下。\n\n\
    - 使用通过*索引*的 for 循环将每个字符串首字母大写：\n\n```\nlast_names = [\"garcia\", \"smith\", \"\
    zhang\"]\n\nfor i in range(len(last_names)):\n    print(\"The element in position\
    \ \" + str(i) + \" is: \" + last_names[i])\n    last_names[i] = last_names[i].title()\n\
    \nprint(last_names)\nThe element in position 0 is: garcia\nThe element in position\
    \ 1 is: smith\nThe element in position 2 is: zhang\n['Garcia', 'Smith', 'Zhang']\n\
    ```\n\n我们从要修改的列表开始（第 1 行）。然后，我们编写 for 循环头，它由以下部分组成：(1) 关键字 `for`；(2) 索引变量 `i`；(3)\
    \ 成员运算符 `in`；以及 (4) 内置函数 `range`（第 3 行）。`range()` 可以有三个参数：`start`，当它为 0 时我们省略——就像本例中一样；`stop`，通常与列表长度一致；以及\
    \ `step`，当它为 1 时我们省略——就像本例中一样。如果我们只需要浏览列表的前半部分，可以写 `range(0, len(last_names)//2)`，或者如果我们只想浏览列表的每个第二个位置，可以写\
    \ `range(0, len(last_names), 2)`。另外，别忘了 `range()` 是一个内置函数，可以独立于 for 循环使用**来创建一个整数范围**：例如，`list(range(0,4))`\
    \ 返回列表 `[0,1,2,3]`，而 `list(range(0,4,2))` 返回 `[0,2]`。为什么在创建列表时我们将 `list()` 与 `range()`\
    \ 结合使用？因为**内置函数 `list()` 将** `range()` 的输出——它本身是一种数据类型——**转换为列表**。在 for 循环体中，我们打印索引\
    \ `i` 的当前值和通过切片提取的相应元素 `last_names[i]`（第 4 行）。然后，我们通过应用字符串方法 `.title()` 并将结果重新赋值给\
    \ `last_names[i]` 本身来更改当前元素 `last_names[i]`（第 5 行）。最后，我们打印 `last_names` 以检查修改后的列表（第\
    \ 7 行）。\n\n## 2.2 通过元素的 for 循环\n\n让我们学习实现 for 循环的第一种新方式：通过*元素*的 for 循环。阅读下面的示例并尝试理解它的作用：\n\
    \n- 使用通过*元素*的 for 循环将每个字符串首字母大写：\n\n```\nlast_names = [\"garcia\", \"smith\",\
    \ \"zhang\"]\nlast_names_upper = []\n\nfor last_name in last_names:\n    print\
    \ (\"The current element is \" + last_name)\n    last_names_upper.append(last_name.title())\n\
    \nprint (last_names_upper)\nThe current element is: garcia\nThe current element\
    \ is: smith\nThe current element is: zhang\n['Garcia', 'Smith', 'Zhang']\n```\n\
    \n与前面的示例一样，我们从要修改的列表开始（第 1 行）。我们继续创建一个名为 `last_names_upper` 的新空列表，我们将在循环中填充它（第\
    \ 2 行）。然后，我们创建通过元素的 for 循环（第 4-6 行）。头部的语法是：(1) 关键字 `for`；(2) 一个变量；(3) 成员运算符 `in`；以及\
    \ (4) 要浏览的列表。与通过索引的 for 循环有两个不同之处。首先，**位置 (2) 的变量**不叫 `index` 或 `i`，而是通常用列表名称的单数形式来命名——也就是说，如果列表名称是\
    \ `last_names`，那么变量名就是 `last_name`；如果列表名称是 `numbers`，那么变量名就是 `number`；以此类推。这不是一条规则，而是\
    \ Python 编程者之间一个有用的约定。第二个不同之处是我们在位置 (4) 直接使用**列表本身**——即 `last_names`——而不是 `range(len(last_names))`。现在让我们关注循环体。首先，我们打印当前元素\
    \ `last_name`（第 5 行）。你可能注意到，没有切片（即没有 `[i]`）。这是因为在通过元素的 for 循环中，**位置 (2) 的变量**——即\
    \ `last_name`——**会自动逐个浏览列表元素，而无需知道它们的位置**。这与通过*索引*的 for 循环中发生的情况相反，在通过索引的 for\
    \ 循环中，位置 (2) 的变量——即 `i`——浏览列表位置而无需知道相应的元素；要获取一个元素，我们必须使用切片（例如 `last_name[i]`）。请参阅下图了解两种循环之间区别的示意图。\n\
    \n![](img/1e0d8bb8215d579da0d409223f09e364_199_0.png)\n\n在示例的第一次迭代中，last_name\
    \ 是 \"garcia\"；在第二次迭代中，它是 \"smith\"；在第三次迭代中，它是 \"zhang\"。我们通过将方法 `.title()` 应用于字符串\
    \ last_name 并将输出附加到 last_names_upper 来结束（第 6 行）。最后，我们打印 last_names_upper（第 8 行）。为什么我们不直接修改\
    \ last_names？因为在通过元素的 for 循环中，**我们无法修改**我们正在浏览的**列表**。我们只能创建一个新列表（即 last_name_upper），我们将修改后的元素（即\
    \ last_name.title()）附加到其中。让我们看看如果我们尝试使用通过*元素*的 for 循环来更改元素会发生什么：\n\n```\nfor last_name\
    \ in last_names:\n    print (\"last_name before change: \" + last_name)\n    last_name\
    \ = last_name.title()\n    print (\"last_name after change: \" + last_name)\n\
    print (last_names)\nlast_name before change: garcia\nlast_name after change: Garcia\n\
    last_name before change: smith\nlast_name after change: Smith\nlast_name before\
    \ change: zhang\nlast_name after change: Zhang\n['garcia', 'smith', 'zhang']\n\
    ```\n\n在第一次迭代中，变量 last_name 是 \"garcia\"（第 2 行），我们将其更改为 \"Garcia\"（第 3 行），并打印它（第\
    \ 4 行）。在第二次迭代中，last_name 是 \"smith\"（第 2 行），我们将其更改为 \"Smith\"（第 3 行），并打印它（第 4\
    \ 行）。该过程在第三次迭代中对 \"zhang\" 继续进行。然而，当我们打印最终列表时，所有字符串仍然是小写（第 6 行）。这是因为**通过元素的 for\
    \ 循环不跟踪元素位置，因此无法知道在哪里覆盖列表元素**。最后，请注意，由于没有索引，在通过元素的 for 循环中我们**无法跟踪迭代次数**。如果我们需要知道迭代次数，我们可以使用通过*索引*的\
    \ for 循环（第 2.1 节）或通过*索引和元素*的 for 循环（第 2.3 节）。\n\n## 2.3 通过索引和元素的 for 循环\n\n顾名思义，通过*索引和元素*的\
    \ for 循环将通过*索引*的 for 循环与通过*元素*的 for 循环结合起来。它的实现很简单。在阅读后续解释之前，尝试理解下面的示例。\n\n- 使用通过*索引和元素*的\
    \ for 循环将每个字符串首字母大写：\n\n```\nlast_names = [\"garcia\", \"smith\", \"zhang\"]\n\
    \nfor i,last_name in enumerate (last_names):\n    print (\"The element in position\
    \ \" + str (i) + \" is: \" + last_name)\n    last_names[i] = last_name.title()\n\
    \nprint (last_names)\nThe element in position 0 is: garcia\nThe element in position\
    \ 1 is: smith\nThe element in position 2 is: zhang\n['Garcia', 'Smith', 'Zhang']\n\
    ```\n\nfor 循环头由 (1) 关键字 for；(2) 两个由逗号分隔的变量，称为 i 和 last_name；(3) 成员运算符 in；以及 (4)\
    \ 内置函数 enumerate()，以列表 last_names 作为参数（第 3 行）组成。与其他 for 循环头的不同之处再次在于组件 (2) 和 (4)。i\
    \ 和 last_name 的作用非常直观：i 是浏览列表中所有位置的索引——就像在通过索引的 for 循环中一样——而 last_name 是浏览列表中所有元素的变量——就像在通过元素的\
