    # Part 5. The while loop and conditions


    Both conditions are False because 4 is neither larger than 4 (line 2) nor smaller
    than 2 (line 3). The combination of the two conditions is False too (line 4).
    This is what Python “sees”:


    ```

    4 print (False and False): print False and False

    False

    ```


    We can summarize the outcome of combinations of conditions using the logical operators
    and in a **truth table**:


    | First condition | Second condition | First condition and Second condition |

    |---|---|---|

    | (1) | True | True | True |

    | (2) | False | True | False |

    | (3) | True | False | False |

    | (4) | False | False | False |


    Row 1 corresponds to the example we saw in cell 6, where both conditions were
    True, and their combination was also True. We can pronounce the first row as *True
    and True gives True*. Row 2, where *True and False gives False*, corresponds to
    the example in cell 7. Row 3—*False and True gives False*—corresponds to the example
    at cell 8. Finally, row 4 corresponds to the example in cell 9, where *False and
    False gives False*. When you write code that combines conditions using and, you
    can use this table as a reference to determine the outcome!


    What happens when we combine conditions using the logical operator or? Here is
    the **truth table for or**:


    | First condition | Second condition | First condition or Second condition |

    |---|---|---|

    | (1) | True | True | True |

    | (2) | False | True | True |

    | (3) | True | False | True |

    | (4) | False | False | False |


    For the logical operator or, *True and True gives True* (row 1), *False and True
    gives True* (row 2), *True and False gives True* (row 3), and *False and False
    gives False* (row 4).


    What are the similarities and differences between the and and or truth tables?
    The columns for the first and second conditions are the same for both tables,
    but the results change. For and, the result is True only when both conditions
    are True, and it is False in all other cases. Conversely, for or, the result is
    False only when both conditions are False, and it is True for all other cases.
    A side note: In other textbooks or on the Internet, you might find that the columns
    of the first and second condition are inverted. But the results remain the same!


    Let’s conclude with the **truth table for the logical operator not**. Here it
    is:


    | Condition | not condition |

    |---|---|

    | (1) | True | False |

    | (2) | False | True |


    not inverts conditions. When we write not in front of True condition, it becomes
    False (row 1). Conversely, when we write not in front of a False condition, it
    becomes True (row 2).'
