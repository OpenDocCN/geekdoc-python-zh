    \ we always need to reassign the changed element to itself.\n- String methods\
    \ to change cases are: `.lower()`, `.upper()`, `.title()`, and `.capitalize()`.\n\
    \n## In what list am I changing the element?\n\nSometimes, we have to change a\
    \ list element before adding it to an existing list. This can create confusion\
    \ about *where* to change the list element. Let's consider this example:\n\n-\
    \ Given the following list:\n\n```python\nsports = [\"diving\", \"hiking\"]\n\
    ```\n\n- Add the mountain sport to the following list, making sure the string\
    \ is uppercase:\n\n```python\nmountain_sports = [\"CLIMBING\"]\n```\n\nWe want\
    \ to take the string \"hiking\" from the list `sports`, transform it into \"HIKING\"\
    , and add it to the list `mountain_sports`. Where do we change the string to uppercase?\
    \ Let's have a look at these two cases.\n\nCase 1: Changing the element both in\
    \ the original list and in the new list.\nConsider the following code:\n\n```python\n\
    sports[1] = sports[1].upper()\nmountain_sports.append(sports[1])\nprint(sports)\n\
    print(mountain_sports)\n```\n\n```\n['diving', 'HIKING']\n['CLIMBING', 'HIKING']\n\
    ```\n\nIn this example, we first change the element in position 1 to uppercase\
    \ (line 1), and then we append the changed element to the list `mountain_sports`\
    \ (line 2). When we print out the two lists (lines 3 and 4), we see that the element\
    \ \"HIKING\" is uppercase in both lists. As you can imagine, changing the element\
    \ in the original list is not the best option because we might need the original\
    \ list `sports` for further computations. How do we make \"hiking\" uppercase\
    \ only in `mountain_sports`? Let's have a look at the next example.\n\n## Case\
    \ 2: Changing the element only in the new list.\n\nConsider the following code:\n\
    \n```python\ncurrent_sport = sports[1].upper()\nmountain_sports.append(current_sport)\n\
    print(sports)\nprint(mountain_sports)\n```\n\n```\n['diving', 'hiking']\n['CLIMBING',\
    \ 'HIKING']\n```\n\nIn this example, we assign the transformed element—that is,\
    \ 'HIKING', created with the command `sports[1].upper()`—to a new variable. This\
    \ new variable is `current_sport` (line 1). Then, we append the variable `current_sport`\
    \ to the list `mountain_sports` (line 2). When we print out both lists (lines\
    \ 3 and 4), we see that \"HIKING\" is only in the list `mountain_sports`. We can\
    \ call `current_sport` an **intermediary**, **auxiliary**, or **temporary** variable.\
    \ Its role is to temporarily store a value that we will use in subsequent code.\
    \ Although they are very convenient, temporary variables are generally not recommended\
    \ because they occupy computer memory. Can we avoid using `current_sport`? Yes,\
    \ let's have a look at this last example:\n\n```python\nmountain_sports.append(sports[1].upper())\n\
    print(sports)\nprint(mountain_sports)\n```\n\n```\n['diving', 'hiking']\n['CLIMBING',\
    \ 'HIKING']\n```\n\nIn this final example, there is a **nested command**, which\
    \ is a command containing one or more commands, like in a Russian doll (line 1).\
    \ To break down nested commands, we usually start from the inner command and move\
    \ outwards. In this example, the inner command is `sports[1].upper()`, where we\
    \ modify the string 'hiking' to be uppercase. The outer command is `mountain_sports.append()`,\
    \ where we add the modified element—that is, 'HIKING'—to the list. As you can\
    \ see, the inner command is what we assigned to the variable `current_sport` in\
    \ the previous example. Therefore, we can avoid a temporary variable by directly\
    \ substituting its content in a nested command. Finally, when we print out both\
    \ lists (lines 2 and 3), we see that we changed \"hiking\" to uppercase only in\
    \ the list `mountain_sports`.\n\nNested commands are a convenient way to write\
    \ compact code. How many commands can we nest into each other? Theoretically,\
    \ as many as we want! In practice, we want to keep nested commands to a minimum\
    \ for a good balance between code efficiency and code readability.\n\n## Let’s\
