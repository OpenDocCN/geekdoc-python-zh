    \  art = [\"apor\", \"refsscu\", \"atwat\", \"fetes\", \"erta\", \"jtylpt\", \"\
    aprco\", \"srap\",\n    \"ruolo\", \"texture\", \"gitp\", \"puors\"]\n    ```\n\
    \    Create new lists for each of the following:\n    - If the string length is\
    \ 4, then get two letters starting from the second (position 1)\n    - If the\
    \ string length is 5, then get the third and fourth letters (positions 2 and 3)\n\
    \    - If the string length is at least 6, then get the last three letters\n \
    \   What art words do you get? Make sure all strings are uppercase!\n\n## PART\
    \ 4\n\n## NUMBERS AND ALGORITHMS\n\nIn this part, you will learn how to perform\
    \ arithmetic operations, play with random numbers, and implement your first algorithms.\
    \ Ready? Let's go!\n\n## 13. Implementing a calculator\n\nIntegers, floats, and\
    \ arithmetic operations\n\nIn the previous chapters, you have developed quite\
    \ a bit of computational thinking, so now you are ready for numbers, some easy\
    \ math, and algorithms! There is a general misconception that in order to be good\
    \ at coding one has to be very good at math. However, that’s not necessarily true,\
    \ as you will see in the coming chapters!\n\nIn this chapter, you will start becoming\
    \ familiar with numbers in coding by implementing a calculator. To do that, you\
    \ first need to learn arithmetic operators in Python and how to ask a user for\
    \ a number. As in previous chapters, try first to solve the task by yourself and\
    \ then compare your answer with the code below. You will find the code also in\
    \ Jupyter Notebook 13. Let’s start!\n\n### 1. What are the arithmetic operations\
    \ in Python?\n\nIn Python, there are 7 arithmetic operations. Let’s quickly explore\
    \ them one by one. Which ones do you already know, and which ones are new?\n\n\
    1. Addition:\n\n```python\n4 + 3\n# 7\n```\n\nTo sum two numbers, we use the arithmetic\
    \ operator `+`, pronounced *plus*. As you know, the same symbol `+` is used as\
    \ a concatenation symbol when merging strings or lists; in that case, it is pronounced\
    \ *concatenated with*.\n\n2. Subtraction:\n\n```python\n6 - 2\n# 4\n```\n\nTo\
    \ subtract one number from another, we use the arithmetic operator `-`, pronounced\
    \ *minus*.\n\n3. Multiplication:\n\n```python\n6 * 5\n# 30\n```\n\nTo multiply\
    \ two numbers, we use the multiplication operator `*`, which is pronounced *times*.\
    \ Note that in Python (and in other programming languages), the multiplication\
    \ symbol is different from the symbol used in paper-and-pencil computations, which\
    \ can be the cross symbol x or the mid-line dot operator ·.\n\n4. Exponentiation:\n\
    \n```python\n2 ** 3\n# 8\n```\n\nTo calculate the power of a number, we use the\
    \ exponentiation operator `**`, which is pronounced to *the power of*. The operation\
    \ `2**3` corresponds to 2³ in paper-and-pencil.\n\n5. Division:\n\n```python\n\
    10 / 5\n# 2.0\n```\n\nTo divide a number by another number, we use a forward slash\
    \ `/`, and we pronounce it *divided by*. Note that the result of a division is\
    \ always a decimal number.\n\n6. Floor division:\n\n```python\n7 // 4\n# 1\n```\n\
    \nTo execute a floor division, we use the operator `//`, composed of two forward\
    \ slashes and pronounced *floor division*. A floor division is a division where\
    \ the result is rounded to the **closest lower integer**. In this example, the\
    \ result of the corresponding division `/` would be 1.75, thus the result of the\
    \ floor division is 1, which is the closest lower integer to 1.75. The word *floor*\
    \ indicates that we round the result down, that is—using a metaphor—to the floor\
    \ of a house.\n\n7. Modulo:\n\n```python\n7 % 4\n# 3\n```\n\nTo calculate a modulus,\
    \ we use the operator `%`, which is pronounced *modulo*. This operation calculates\
    \ a **remainder** (or modulus), which is the number needed to go back to the dividend\
    \ after a floor division. For example, from cell 6 we know that the result of\
    \ the floor division `7//4` is 1. If we multiply 1 (the result) times 4 (the divisor),\
    \ we get 4 (4x1=4). To get to 7 (the dividend), we need 3, which is the modulus\
    \ (4+3=7). Note that modulo is the name of the operator, while modulus is the\
    \ name of the operation and a synonym for remainder. The modulus operation is\
    \ used quite often in coding, as you will see in the next chapter.\n\nTo summarize,\
    \ Python provides seven arithmetic operators:\n\n- 1 for addition (`+`)\n- 1 for\
    \ subtraction (`-`)\n- 2 for the “multiplication family”, which are multiplication\
    \ (`*`) and exponentiation (`**`)\n- 3 for the “division family”, which are division\
    \ (`/`), floor division (`//`), and modulo (`%`)\n\nNote that the division operators\
    \ can provide *whole numbers* or *decimal numbers* as results, independently of\
    \ the characteristics of dividend and divisor. Discover more nuance by solving\
