    ```

    [ ]:

    1 first_name = "Guido"

    2 last_name = "van Rossum"

    ```


    As you can see, the *variable* names remain the same (`first_name` and `last_name`),
    whereas the assigned *values* can be different ("Fernando" or "Guido", "Pérez"
    or "van Rossum"). We can define variables as follows:


    > A **variable** is a label assigned to a value


    In Python, variables are *lowercase*. When composed of multiple words, these are
    connected by *underscore*, like in `first_name`. In Jupyter Notebook, variables
    are **black**. The symbol `=` is called **assignment operator**. This has nothing
    to do with the *equals* we learned in math! *equals* has a different symbol in
    coding, which we will see in Chapter 9. In coding we use the symbol `=` **to assign
    a value to a variable**, and we pronounce it as *is assigned*. This is a very
    important concept to remember, and it''s one of the most counter-intuitive! Symbols
    are colored *purple* in Jupyter Notebook.


    Let''s now run the second cell:


    ```

    [2]:

    1 print (first_name)

    2 print (last_name)

    Fernando

    Pérez

    ```


