    False gives False*. When you write code that combines conditions using `and`,
    you can use this table as a reference to determine the outcome!


    What happens when we combine conditions using the logical operator `or`? Here
    is the **truth table for or**:


    | First condition | Second condition | First condition or Second condition |

    |---|---|---|

    | (1) | True | True | True |

    | (2) | False | True | True |

    | (3) | True | False | True |

    | (4) | False | False | False |


