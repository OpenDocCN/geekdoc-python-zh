- md: "## Part 6. Focus on lists and for loops\n\nAs you can see, the components of\
    \ a list comprehension are the same as the components of a for loop, just in a\
    \ somewhat inverted position. In a for loop, first we write the header (line (a);\
    \ orange rectangle), and then we assign the modified element (yellow rectangle)\
    \ to the element itself (line (b)). In a list comprehension (line (c)), we write\
    \ first the modified element (yellow rectangle) and then the for loop header (orange\
    \ rectangle). As you can see, **list comprehension is a one-line command to create\
    \ or modify a list in a fast and compact way**. We conclude the previous example\
    \ by printing the new list (line 3).\n\nCan we write a list comprehension containing\
    \ the header of a for loop through *elements*? Yes! Let's see how.\n\n- Capitalize\
    \ each string using *list comprehension* containing a for loop through *elements*:\n\
    \n```python\nlast_names = [\"garcia\", \"smith\", \"zhang\"]\nlast_names = [last_name.title()\
    \ for last_name in last_names]\nprint(last_names)\n# Output: ['Garcia', 'Smith',\
    \ 'Zhang']\n```\n\nSimilarly to before, in the list comprehension we write first\
    \ the new element of the list—that is, `last_name.title()`—and then the header\
    \ of a for loop through *elements*—that is, `for last_name in last_names` (line\
    \ 2). Let's compare the for loop through *elements* from cell 3 with the list\
    \ comprehension in the cell above. This time, there is a big difference between\
    \ the for loop and the corresponding list comprehension. Can you find it?\n\n\
    ```python\n# (a) for last_name in last_names:\n#     (b) last_names_upper.append(last_name.title())\n\
    \n# (c) last_names = [last_name.title() for last_name in last_names]\n```\n\n\
    Comparison between for loop through *elements* (lines a–b) and list comprehension\
    \ (line c).\n\nThe difference is that in a for loop through *elements*, we must\
    \ create a new list—that is, `last_names_upper` (line (b))—whereas in the list\
    \ comprehension, we can overwrite the existing list—that is, `last_names` (line\
    \ (c)). The remaining syntax correspondence is the same. In a for loop, first\
    \ we write the header (line (a); orange rectangle), and then we modify an element\
    \ (line (b); yellow rectangle). On the other hand, in a list comprehension (line\
    \ (c)), we write first a modified element (yellow rectangle) and then a for loop\
    \ header (orange rectangle).\n\nAnother interesting characteristic of list comprehensions\
    \ is that they **can contain a conditional construct**. Let's have a look at it!\n\
    \n- Keep and capitalize only the elements shorter than 6 characters:\n\n```python\n\
    last_names = [\"garcia\", \"smith\", \"zhang\"]\nlast_names = [last_name.title()\
    \ for\n              last_name in last_names if\n              len(last_name)\
    \ < 6]\nprint(last_names)\n# Output: ['Smith', 'Zhang']\n```\n\nWe modify the\
    \ code from cell 6 by adding an **if condition at the *end*** of the list comprehension\
    \ (line 2). Once more, let's compare the construct of a list comprehension with\
    \ the corresponding for loop.\n\nSimilarly to above, in the list comprehension\
    \ (line (d)) first we write the new element, which is in the last line of the\
    \ for loop body (yellow rectangle; line (c) in the for loop). Then, we essentially\
    \ restart from the beginning of the loop and add commands consecutively. Thus,\
    \ we first write the for loop header (orange rectangle; line (a) in the loop)\
    \ and then the if condition (black rectangle; line (c) in the loop).\n\nFinally,\
    \ list comprehensions are extremely useful to **delete list elements based on\
    \ conditions**. In cell 16 of the previous Chapter, we used a while loop containing\
    \ `.remove()` to delete several elements with similar characteristics. Now, let's\
    \ learn how to delete elements in a much more compact way with list comprehension.\n\
    \n- Delete elements that are composed of 5 characters:\n\n```python\nlast_names\
    \ = [\"garcia\", \"smith\", \"zhang\"]\nlast_names = [last_name.title()\n    \
    \          for last_name in last_names\n              if len(last_name) != 5]\n\
    print(last_names)\n# Output: ['Garcia']\n```\n\nWhen deleting elements with list\
    \ comprehensions, **we have to think about the elements that we are going to *keep*,\
    \ not about those that we are going to delete!** This is because in a list comprehension,\
    \ in the first position we must write the element that we are going to insert\
    \ into the list. Thus, if we want to delete the elements whose length is 5, we\
    \ need to reverse our thinking and write the condition that allows us to *keep*\
    \ the elements whose length is not equal to 5—that is `if len(last_name) != 5`\
    \ (line 2).\n\n## Complete the table\n\nIn this Chapter, you have learned four\
    \ different ways to write a for loop with lists. Which one do we use and when?\
    \ Highlight the differences among the for loops by completing the following table\
    \ with Yes or No.\n\n| Operation | For loop through indices | For loop through\
    \ elements | For loop through indices and elements | List comprehension |\n| :---\
    \ | :--- | :--- | :--- | :--- |\n| Get the current index | | | | |\n| Change list\
    \ elements | | | | |\n| Delete list elements | | | | |\n| Browse a full list |\
    \ | | | |\n| Browse only a part of a list | | | | |\n\n## 3. Nested for loops\n\
    \nAs the last topic for this Chapter, let's learn about nested for loops. A **nested\
    \ for loop** is a **for loop within another for loop**. How does it work? Read\
    \ the example below, and try to understand what happens.\n\n- Given the following\
    \ list of vowels:\n\n```python\nvowels = [\"A\", \"E\", \"I\", \"O\", \"U\"]\n\
    ```\n\nWe start with a list of strings (line 1).\n\n- For each vowel, print all\
    \ the vowels on the right:\n\n```python\nfor i in range(len(vowels)):\n    print(\"\
    -- \" + vowels[i])\n    for j in range(i + 1, len(vowels)):\n        print(vowels[j])\n\
    # Output:\n# -- A\n# E\n# I\n# O\n# U\n# -- E\n# I\n# O\n# U\n# -- I\n# O\n# U\n\
    # -- O\n# U\n# -- U\n```\n\nThe nested for loop in this example is composed of\
    \ an **outer for loop**, whose header is at line 1, and an **inner for loop**,\
    \ whose header is at line 3. In the *outer* for loop, the index `i` goes from\
    \ 0 (omitted) to the length of the list (line 1); thus, `i` will browse all list\
    \ positions. In the *inner* for loop, the index `j` goes from `i+1` to the length\
    \ of the list (line 3); thus, `j` will browse all remaining list positions on\
    \ the right of the current position `i`. **For each iteration of the *outer* loop,\
    \ the *inner* loop has to be completed before moving to the next iteration of\
    \ the *outer* loop.** Here is what happens at each loop:\n\n- In the first *outer*\
    \ loop, `i` is 0. We print `\"-- \" + vowels[0]`, which is `-- A` (line 2). Then,\
    \ we run the whole *inner* for loop (lines 3–4). The index `j` will start at `i+1`—which\
    \ is 0+1, and thus 1—and stop at `len(vowels)-1` for the *plus one rule*—that\
    \ is, 4. Thus, `j` will go through the positions: [1, 2, 3, 4]. Therefore, in\
    \ the *inner* for loop:\n    - In the first iteration, `j` is 1. We print `vowels[1]`,\
    \ which is E\n    - In the second iteration, `j` is 2. Thus, we print `vowels[2]`,\
    \ which is I\n    - In the third iteration, `j` is 3 and we print `vowels[3]`,\
    \ which is O\n    - In the fourth iteration, `j` is 4 and we print `vowels[4]`,\
    \ which is U. The *inner* loop is completed and we go back to the *outer* loop.\n\
    - In the second *outer* loop, `i` is 1, thus we print `\"-- \" + vowels[1]`, which\
    \ is `-- E` (line 2). Then, we run the whole *inner* for loop again (lines 3–4).\
    \ The start of the inner loop is `i+1`, which is 1+1—that is, 2. Thus, `j` will\
    \ go through the positions: [2, 3, 4]. Therefore, in the *inner* loop:\n    -\
    \ In the first loop, `j` is 2 and we print `vowels[2]`, which is I\n    - In the\
    \ second loop, `j` is 3 and we print `vowels[3]`, which is O\n    - In the third\
    \ loop, `j` is 4 and we print `vowels[4]`, which is U. Once again, the *inner*\
    \ loop is completed and we go back to the *outer* loop.\n- In the third *outer*\
    \ loop, `i` is 2, so we print `-- I`. Then, we run the full *inner* loop as above,\
    \ with `j` browsing the positions 3 and 4, corresponding to the elements O and\
    \ U, respectively.\n- In the fourth *outer* loop, `i` is 3, so we print `-- O`.\
    \ In the *inner* loop, `j` is assigned only the position 4, corresponding to the\
    \ element U.\n- In the last *outer* loop, `i` is 4, so we print `-- U`. There\
    \ is no *inner* loop, because the start, `i+1`, is 5 and coincides with the stop,\
    \ which is 5 too.\n\nCan we have more loops nested within each other? Yes! As\
    \ a convention, the index names are `i`, `j`, `k`, etc. However, it is strongly\
    \ recommended *not* to use too many for loops because they are computationally\
    \ very expensive, that is, they use a lot of memory and time. We will talk a bit\
    \ more about nested for loops in the next Chapter, where we will use them to browse\
    \ lists of lists."
  mdcn: "## 第6部分：聚焦列表与for循环\n\n如你所见，列表推导式的组成部分与for循环的组成部分相同，只是位置有所颠倒。在for循环中，我们首先编写头部（第(a)行；橙色矩形），然后将修改后的元素（黄色矩形）赋值给元素本身（第(b)行）。在列表推导式（第(c)行）中，我们首先编写修改后的元素（黄色矩形），然后编写for循环头部（橙色矩形）。如你所见，**列表推导式是一种快速、紧凑地创建或修改列表的单行命令**。我们通过打印新列表（第3行）来结束前面的示例。\n\
    \n我们能否编写一个包含遍历*元素*的for循环头部的列表推导式？可以！让我们看看如何做到。\n\n- 使用包含遍历*元素*的for循环的*列表推导式*来大写每个字符串：\n\
