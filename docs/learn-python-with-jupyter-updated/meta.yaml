  md: "# Part 6. Focus on lists and for loops\n\n```\n-- I\n0\nU\n-- O\nU\n-- U\n\
    ```\n\nThe nested for loop in this example is composed of an **outer for loop**,\
    \ whose header is at line 1, and an **inner for loop**, whose header is at line\
    \ 3. In the *outer* for loop, the index i goes from 0 (omitted) to the length\
    \ of the list (line 1); thus, i will browse all list positions. In the *inner*\
    \ for loop, the index j goes from i+1 to the length of the list (line 3); thus,\
    \ j will browse all remaining list positions on the right of the current position\
    \ i. **For each iteration of the *outer* loop, the *inner* loop has to be completed\
    \ before moving to the next iteration of the *outer* loop.** Here is what happens\
    \ at each loop:\n\n+   - In the first *outer* loop, i is 0. We print \"-- \" +\
    \ vowels[0], which is -- A (line 2). Then, we run the whole *inner* for loop (lines\
    \ 3–4). The index j will start at i+1—which is 0+1, and thus 1—and stop at len(vowels)-1\
    \ for the *plus one rule*—that is, 4. Thus, j will go through the positions: [1,\
    \ 2, 3, 4]. Therefore, in the *inner* for loop:\n  - In the first iteration, j\
    \ is 1. We print vowels[1], which is E\n  - In the second iteration, j is 2. Thus,\
    \ we print vowels[2], which is I\n  - In the third iteration, j is 3 and we print\
    \ vowels[3], which is O\n  - In the fourth iteration, j is 4 and we print vowels[4],\
    \ which is U. The *inner* loop is completed and we go back to the *outer* loop.\n\
    - In the second *outer* loop, i is 1, thus we print \"-- \" + vowels[1], which\
    \ is --- E (line 2). Then, we run the whole *inner* for loop again (lines 3–4).\
    \ The start of the inner loop is i+1, which is 1+1—that is, 2. Thus, j will go\
    \ through the positions: [2, 3, 4]. Therefore, in the *inner* loop:\n  - In the\
    \ first loop, j is 2 and we print vowels[2], which is I\n  - In the second loop,\
    \ j is 3 and we print vowels[3], which is O\n  - In the third loop, j is 3 and\
    \ we print vowels[3], which is U. Once again, the *inner* loop is completed and\
    \ we go back to the *outer* loop\n- In the third *outer* loop, i is 2, so we print\
    \ -- I. Then, we run the full *inner* loop as above, with j browsing the positions\
    \ 3 and 4, corresponding to the elements O and U, respectively.\n- In the fourth\
    \ *outer* loop, i is 3, so we print -- O. In the *inner* loop, j is assigned only\
    \ the position 4, corresponding to the elements U.\n- In the last *outer* loop,\
    \ i is 4, so we print -- U. There is no *inner* loop, because the start, i+1,\
    \ is 5 and coincides with the stop, which is 5 too.\n\nCan we have more loops\
    \ nested within each other? Yes! As a convention, the index names are i, j, k,\
    \ etc. However, it is strongly recommended *not* to use too many for loops because\
    \ they are computationally very expensive, that is, they use a lot of memory and\
    \ time. We will talk a bit more about nested for loops in the next Chapter, where\
