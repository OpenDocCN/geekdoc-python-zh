    ```\n\n通过完成下一个练习，获取关于代码功能的提示。\n\n## 第三部分：for 循环简介\n\n## 将句子两半匹配起来\n\n- 1. for\
    \ 循环允许我们\n- 2. 变量 index\n- 3. 在第一个循环中，变量 index\n- 4. 内置函数 range() 决定了\n- 5. 内置函数\
    \ range() 可以接受\n\n- a. 一个起始值和一个结束值作为参数\n- b. 命令重复执行的次数\n- c. 重复执行缩进的命令\n- d. 在每次循环中改变值\n\
    - e. 被赋值为 0\n\n## 计算思维与语法\n\n让我们从运行第一个单元格开始：\n\n```\n[1]:\n1  friends = [\"Geetha\"\
