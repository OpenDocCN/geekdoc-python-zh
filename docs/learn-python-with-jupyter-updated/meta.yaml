    # Part 1. Creating the basics


    Let''s run the next cell:


    ```

    [*]: 1 input ("Where are you from?")

    Where are you from? [          ]

    ```


    Similarly to before, now enter your country of origin in the text box (I will
    type mine!):


    ```

    [*]: 1 input ("Where are you from?")

    Where are you from? Italy

    ```


    Now press *return* or *enter* on the keyboard. You will see an output similar
    to the following (you will see your country of origin!):


    ```

    [4]: 1 input ("Where are you from?")

    Where are you from? Italy

    ''Italy''

    ```


    What happened here is similar to the previous cell. Let''s summarize it: the number
    on the left of the cell turned to 4 because this is the fourth cell we ran. The
    *built-in function* `input()` created a text box in Jupyter Notebook in which
    we could answer the question contained in the string we gave as an argument. Too
    concise? Let''s try again: when we run the cell, the *built-in function* `input()`
    shows us the question, which we put in between the round brackets as a string,
    and it creates a text box in which we can type the answer. After typing the answer,
    we press *return* or *enter* to complete the code execution.


    At this point we can ask ourselves: where do we see `input()` in action in everyday
    life? Every time we are asked to type something on a device, there is a function
    similar to `input()` behind it! For example, this is the case when we write our
    names to open a new account, enter the amount we want to withdraw from an ATM,
    or fill out an online form.


    Finally, it is important to mention that when we write code, *we wear two hats*
    — that is, we have two roles: we are at the same time programmer and user! When
    writing code, we wear the *programmer hat*: we create code to perform a task,
    design code structure, and define user messages. When testing code, we wear the
    *user hat*: we check whether the code does what expected, is easy to use, and
    whether the user interaction is pleasant. When coding, we switch hats continuously!


    # 3. ASCII art: print()


    We now know how to ask a question to a user, but how do we provide them a piece
    of information? We use the *built-in function* `print()`! There are several ways
    to learn about `print()`, and the following one is indeed a lot of fun. It involves
    a type of digital art called ASCII art, by which images can be created using the
    symbols on a keyboard. Let''s have a look at the following cell:


    ```

    []: 1 print ("/\_/\ ")

    2 print (">^,^< ")

    3 print (" / \ ")

    4 print ("(__)___")

    ```'
