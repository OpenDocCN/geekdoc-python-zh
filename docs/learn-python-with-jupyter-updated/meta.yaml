    \ cities 的列表，包含五个字符串：\"San Diego\"、\"Prague\"、\"Cape Town\"、\"Tokyo\" 和 \"Melbourne\"\
    （第1行），我们将其打印出来（第2行）。\n\n我们将如何切片 cities？切片的**语法**非常简单。它由**列表名称后跟方括号**组成，像这样：cities[]。在方括号之间，我们写上要切片的**元素位置**。因此，意识到列表中每个元素的位置至关重要。在列表\
    \ cities 中，元素具有以下位置：\n\n![](img/1e0d8bb8215d579da0d409223f09e364_58_0.png)\n\n\
    现在，我们如何在方括号之间书写元素位置？根据我们想要切片多少个元素、它们在哪里以及我们想要以哪个方向提取它们，有各种不同的规则。我们将在接下来的页面中学习所有这些规则。\n\
    \n开始前最后一点说明：为了更好地学习切片，我建议使用这种方法。每次你阅读一个切片任务（例如：切片 \"Prague\"），用一张纸盖住下面的代码。尝试猜测代码，并将你的猜测与解决方案进行比较。然后仔细阅读解释。在继续下一个示例之前，确保你完全理解当前示例。废话少说，开始切片吧！\n\
    \n1.  切片 \"Prague\"：\n    ```\n    [2]:\n    1 print (cities[1])\n    'Prague'\n\
    \    print cities in position one\n    ```\n    在这个单元格中，我们切片（或访问）位于位置1的 \"Prague\"\
    ，并打印它。如你所见，当我们从列表中切片**单个元素**时，我们在方括号之间写下元素本身的位置。因此，我们可以将此语法总结为 **list_name[element_position]**，我们可以读作\
    \ *list name in position element position*。\n\n    注意：为简单起见，在本示例及后续示例中，我们只打印切片元素。但是，可以将切片元素赋值给一个变量，如下所示：\n\
    \    ```\n    [2]:\n    1 sliced_city = cities[1]\n    2 print (sliced_city)\n\
    \    'Prague'\n    sliced_city is assigned cities in position one\n    print sliced_city\n\
    \    ```\n    我们将在后续章节中将切片列表元素赋值给变量。现在，让我们专注于理解切片的工作原理！\n\n2.  切片从 \"Prague\"\
    \ 到 \"Tokyo\" 的城市：\n    ```\n    [3]:\n    1 print (cities[1:4])\n    ['Prague',\
    \ 'Cape Town', 'Tokyo']\n    print cities in positions from one to four\n    ```\n\
    \    在这个单元格中，我们切片并打印三个连续的元素——\"Prague\"、\"Cape Town\" 和 \"Tokyo\"——它们分别位于位置1、2和3。在方括号之间，我们写两个数字，用冒号\
    \ : 分隔。第一个数字是我们想要切片的*第一个*元素的位置，我们称之为 **start**（起始）。在本例中，start 是1，对应于 \"Prague\"\
    。第二个数字是我们想要切片的*最后一个*元素的位置，我们必须给它加1。我们称之为 **stop**（停止）。stop 总是遵循**加一规则**，它简单地说**我们必须给想要切片的最后一个元素的位置加1**（你可以在本章末尾的\
    \ *in more depth* 部分了解此规则背后的原理）。在这个例子中，最后一个元素（\"Tokyo\"）的位置是3，由于加一规则，我们必须给它加1，所以\
    \ stop 是4。我们可以将切片连续元素的语法总结为 **list_name[start:stop]**，我们可以读作 *list name in positions\
    \ from start to stop*。\n\n3.  切片 \"Prague\" 和 \"Tokyo\"：\n    ```\n    [4]:\n\
    \    1 print (cities[1:4:2])\n    ['Prague', 'Tokyo']\n    print cities in positions\
    \ from one to four with a step of two\n    ```"
