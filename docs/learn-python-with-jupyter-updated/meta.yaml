- md: '## About this book


    **What will I learn in this book?** In this book, you will learn to code in Python
    using Jupyter Notebook. Even more importantly, you will develop computational
    thinking, which is the way we think when coding.


    **What makes this book different?** The topic progression in this book is designed
    according to computational thinking development while focusing on syntax and strategies,
    rather than listing disconnected language characteristics with isolated examples.


    **Is this book for me?** If you have never coded before, if you are following
    online courses or videos but feel you can''t quite grasp them, or if you need
    to better structure your Python and coding knowledge, this book is for you. Also,
    if you are training to become a scientist but are not very strong in coding, if
    you are transitioning to the Python/Jupyter environment from another programming
    language, or if you are a teacher looking for material, this book can be for you.


    **How is this book structured?** The book is divided in 11 parts. The first part
    introduces the computational environment—that is, the Jupyter/Python environment.
    The following ten parts cover computational thinking and Python syntax. Each part
    contains two to five chapters, for a total of thirty-eight chapters.


    **How are chapters structured?** Each chapter starts with one or more coding examples
    embedded in narrative and enriched with detailed explanations. In addition, each
    contains several theoretical and coding exercises. And they all finish with a
    recap to summarize the chapter''s main concepts, and a “in more depth” section,
    with coding strategies or curiosities.


    **Why is code embedded in narratives?** Stories provide context and allow long-term
    memorization. They are extensively used in learning foreign languages. And, in
    many respects, a programming language *is* a foreign language.


    **Why is there code pronunciation?** When we code, we pronounce or mumble code
    within ourselves, and occasionally aloud with a colleague. Although coding has
    a strong vocal component, there is no defined standard for code pronunciation.
    The pronunciation proposed in this book is the optimized result of hours of one-on-one
    interaction with students of various mother tongues.


    **What kinds of exercises are in the book?** In this book, you will find both
    theory exercises and coding exercises. Theory exercises are meant to strengthen
    code comprehension and syntax precision. Coding exercises are meant to make you
    practice and thus learn by doing.


    **What is on the website?** On `www.learnpythonwithjupyter.com`, you can find
    Jupyter Notebooks associated with each chapter, so you can test and experiment
    while learning. You can also find a community, with solutions to both theory and
    coding exercises. You can ask questions and propose alternative solutions, to
    deepen your knowledge.


    **How do I use this book?** Start with the first part, *Getting ready*, to install
    and learn the computational environment. Then, proceed with the chapters. For
    each chapter, download the corresponding notebook at `www.learnpythonwithjupyter.com`.
    Make sure you understand the syntax, play with the code, and do the theoretical
    exercises. Read the recap and the “in more depth” sections, which will give you
    useful hints. Finally, do the coding exercises and compare your solutions with
    the ones you find in the community. Obviously, looking at a solution before completing
    an exercise weakens your chance of learning. If you do not understand questions
    or solutions, ask in the community. Take your time to solve each exercise. Missing
    the understanding of one chapter might compromise your understanding of the chapters
    that follow it.


    **How is the language used in this book?** The language is colloquial and simple—but
    precise. There are clear definitions and careful explanations. I directly talk
    to *you*, but I use *we* when explaining syntax. We are in this together! Also,
    I use the first person when I want to share some hints I learned along the way.


    ## INTRODUCTION


    In this part, we will briefly talk about coding environments, language syntax,
    and computational thinking. If you are eager to start coding, just skip it and
    come back later!


    ## What do we need to learn when learning coding?


    Coding is a lot about telling a computer what to do. We, human beings, need to
    write commands that computers understand, and to do so, we need to learn to think
    differently. We have to start from scratch and master a new way of communicating,
    made of *concise* and *logical* instructions. Practically speaking, we have to
    learn at least three things: a coding environment, language syntax, and computational
    thinking. Let’s see what these are!


    A **coding environment** is a **program where we can write and execute code**.
    There are several environments to code in Python. In this book, we will use the
    Jupyter/Python environment, which since its release in 2015 has become used increasingly
    both in industry and academia (Figure 1.1). It allows integrating code with narrative,
    and it is ideal for creating reports, draft code, and learning to code. Other
    very common coding environments are the integrated development environments (IDEs).
    For Python, popular IDEs are PyCharm, Visual Studio, and Spyder (Figure 1.2).
    IDEs typically embed various components, such as a script editor, a variable environment
    panel, and a console wherein code is tested and executed. In Chapter 32, you will
    get familiar with one of them, Spyder, which is commonly used for scientific coding.
    And finally, the most basic environment is the Python IDLE, which is included
    in the Python installation. It consists of a shell—which looks very similar to
    a terminal—where one can type and execute commands (Figure 1.3).


    ![](img/1e0d8bb8215d579da0d409223f09e364_16_0.png)


    A language **syntax** is a **set of rules defining how to write commands**. You
    are already very familiar with at least one syntax, which is your native language
    syntax. In your mother tongue, you know words, punctuation, and how to arrange
    these elements in sentences to create paragraphs and entire texts. In coding,
    the pattern is similar. We have to know data types and operators, as well as how
    to arrange them in *if/else* constructs and loops to create functions and classes.
    In Table 1, you can see a schematic summary of elements and syntax you will learn
    in this book. Don’t worry if you do not understand most of it—everything will
    become more and more clear as we progress through the book.


    ## Introduction


    | Data types (words) | Operators (punctuations) | Constructs and loops (sentences)
    | Unit of code (paragraphs) | Software (texts) |

    | :--- | :--- | :--- | :--- | :--- |

    | string, list, integer, float, Boolean, tuple, dictionary, set | assignment,
    membership, arithmetic, comparison, logical | if/else construct, for loop, while
    loop | functions | classes (object-oriented programming) |


    Table 1. Components of a programming language, from the most basic (left) to the
    most complex (right). In the column titles, the words in between parentheses show
    the parallelism with natural language syntax.


    Finally, **computational thinking** is the **way we think when coding**. Every
    time we approach a new subject, we need to learn *how to think* in that subject
    and develop specific skills. Some of the abilities you will develop in this book
    are:


    - *Creating algorithms*, which means conceiving and implementing a series of sequential
    instructions to solve a problem

    - *Divide and conquer*, which consists of decomposing problems in sub-problems,
    and then combining the sub-problem solutions to obtain the main problem solution

    - *Pattern recognition*, which means recognizing in a new problem features of
    a previously solved problem so that you can apply a similar solution

    - *Solution generalization*, which consists of generalizing solutions from specific
    cases to broader situations


    As is the case for any subject, developing a way of thinking comes with studying
    and exercising. Thus, thinking computationally comes with learning syntax and
    practicing coding. We will start building these abilities in Chapter 1. In the
    next part, *Getting ready*, you will download, install, and learn how to use the
    Jupyter/Python environment.'
  mdcn: '## 关于本书


    **我将从本书中学到什么？** 在本书中，你将学习使用 Jupyter Notebook 进行 Python 编程。更重要的是，你将培养计算思维——即我们编程时的思维方式。


    **本书有何不同？** 本书的主题进阶设计基于计算思维的发展，同时注重语法和策略，而非罗列互不关联的语言特性及孤立示例。


    **本书适合我吗？** 如果你从未编写过代码，如果你正在学习在线课程或视频但感觉难以完全掌握，或者你需要更好地构建你的 Python 和编程知识体系，那么本书适合你。此外，如果你正在接受科学训练但编程能力不强，如果你正从其他编程语言过渡到
    Python/Jupyter 环境，或者你是一位正在寻找教学材料的教师，本书也适合你。


    **本书的结构是怎样的？** 本书分为 11 个部分。第一部分介绍计算环境——即 Jupyter/Python 环境。接下来的十个部分涵盖计算思维和 Python
    语法。每个部分包含两到五章，共计三十八章。


    **章节的结构是怎样的？** 每章以一个或多个嵌入叙述中的编码示例开始，并辅以详细解释。此外，每章包含若干理论和编码练习。所有章节都以回顾总结本章主要概念的“回顾”部分结束，并附有一个“深入探讨”部分，提供编码策略或有趣知识。


    **为什么将代码嵌入叙述中？** 故事提供背景并有助于长期记忆。它们在学习外语中被广泛使用。而且，在许多方面，编程语言*就是*一种外语。


    **为什么有代码发音？** 当我们编码时，我们会在内心默念或低声读出代码，偶尔也会与同事大声讨论。尽管编码具有很强的语音成分，但目前尚无统一的代码发音标准。本书中提出的发音是经过数小时与不同母语学生一对一互动后优化得出的结果。


    **本书包含哪些类型的练习？** 在本书中，你将找到理论练习和编码练习。理论练习旨在加强代码理解和语法准确性。编码练习旨在让你通过实践来学习。


    **网站上有什么内容？** 在 `www.learnpythonwithjupyter.com` 上，你可以找到与每章相关的 Jupyter Notebook，以便你在学习时进行测试和实验。你还可以找到一个社区，其中包含理论和编码练习的解决方案。你可以提问并提出替代方案，以加深你的理解。


    **我该如何使用本书？** 从第一部分“准备开始”开始，安装并学习计算环境。然后，按章节顺序学习。对于每一章，从 `www.learnpythonwithjupyter.com`
    下载相应的 notebook。确保你理解语法，尝试运行代码，并完成理论练习。阅读“回顾”和“深入探讨”部分，它们会给你有用的提示。最后，完成编码练习，并将你的解决方案与社区中的方案进行比较。显然，在完成练习之前查看解决方案会削弱你的学习机会。如果你不理解问题或解决方案，请在社区中提问。花时间解决每个练习。错过对某一章的理解可能会影响你对后续章节的理解。


    **本书的语言风格如何？** 语言通俗易懂且简单——但精确。有清晰的定义和细致的解释。我直接与*你*对话，但在解释语法时使用“我们”。我们共同学习！此外，当我分享沿途学到的一些技巧时，我会使用第一人称。


    ## 引言


    在本部分，我们将简要讨论编程环境、语言语法和计算思维。如果你渴望开始编码，可以先跳过这部分，稍后再回来看！


    ## 学习编程时，我们需要学什么？


    编程很大程度上是告诉计算机该做什么。我们人类需要编写计算机能理解的命令，为此，我们需要学习以不同的方式思考。我们必须从零开始，掌握一种由*简洁*和*逻辑*指令构成的新沟通方式。实际上，我们至少需要学习三件事：编程环境、语言语法和计算思维。让我们看看这些是什么！


    **编程环境**是**一个我们可以编写和执行代码的程序**。有多种环境可以编写 Python 代码。在本书中，我们将使用 Jupyter/Python 环境，自
    2015 年发布以来，它在工业界和学术界的使用日益广泛（图 1.1）。它允许将代码与叙述相结合，非常适合创建报告、草拟代码和学习编程。其他非常常见的编程环境是集成开发环境（IDE）。对于
    Python，流行的 IDE 有 PyCharm、Visual Studio 和 Spyder（图 1.2）。IDE 通常嵌入各种组件，例如脚本编辑器、变量环境面板以及用于测试和执行代码的控制台。在第
    32 章，你将熟悉其中之一——Spyder，它常用于科学编程。最后，最基础的环境是 Python IDLE，它包含在 Python 安装中。它由一个看起来非常像终端的
    shell 组成，可以在其中输入和执行命令（图 1.3）。


    ![](img/1e0d8bb8215d579da0d409223f09e364_16_0.png)


    语言**语法**是**定义如何编写命令的一套规则**。你已经非常熟悉至少一种语法，那就是你的母语语法。在你的母语中，你知道单词、标点符号，以及如何将这些元素排列成句子，进而组成段落和完整的文本。在编程中，模式是相似的。我们必须了解数据类型和运算符，以及如何将它们排列在
    *if/else* 结构和循环中，以创建函数和类。在表 1 中，你可以看到本书将学习的元素和语法的概要总结。如果大部分内容你不理解，不用担心——随着本书的进展，一切都会变得越来越清晰。


    ## 引言


    | 数据类型（单词） | 运算符（标点） | 结构和循环（句子） | 代码单元（段落） | 软件（文本） |

    | :--- | :--- | :--- | :--- | :--- |

    | 字符串、列表、整数、浮点数、布尔值、元组、字典、集合 | 赋值、成员、算术、比较、逻辑 | if/else 结构、for 循环、while 循环 | 函数
    | 类（面向对象编程） |


    表 1. 编程语言的组成部分，从最基本（左）到最复杂（右）。在列标题中，括号内的词语显示了与自然语言语法的相似性。


    最后，**计算思维**是**我们编程时的思维方式**。每当我们接触一个新主题时，我们都需要学习*如何思考*该主题并培养特定的技能。你将在本书中培养的一些能力包括：


    - *创建算法*，即构思并实现一系列顺序指令来解决问题

    - *分而治之*，即将问题分解为子问题，然后组合子问题的解决方案以获得主问题的解决方案

    - *模式识别*，即在新问题中识别出先前已解决问题的特征，以便应用类似的解决方案

    - *解决方案泛化*，即将解决方案从特定情况推广到更广泛的情境


    与任何学科一样，培养一种思维方式需要学习和练习。因此，计算思维的培养伴随着语法学习和编码实践。我们将从第 1 章开始构建这些能力。在下一部分“准备开始”中，你将下载、安装并学习如何使用
    Jupyter/Python 环境。'
