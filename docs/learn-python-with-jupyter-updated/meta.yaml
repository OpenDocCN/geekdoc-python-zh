  md: 'The name `answer` is logically consistent because this variable contains the
    answer to the question "Hi! What book would you like to buy?". However, `answer`
    is not the best choice because it is a very *generic* variable name. Variable
    names should be **pertinent**, representing the information they contain. Consider
    having 10 `input()` commands in the code. What do we call the corresponding variables?
    We don''t want to call them `answer_1`, `answer_2`, ..., `answer_10`; it would
    be hard to remember what we assigned to `answer_7`, for example. Or, if we later
    decide to reshuffle some questions, then we will have to rename the variables
    to make sure the numbers increase consistently. This would generate a lot of confusion
    and increase the possibility of errors.


    Back to the previous example, the name `answer` would also not be meaningful in
    the following line of code from cell 3:


    ```

