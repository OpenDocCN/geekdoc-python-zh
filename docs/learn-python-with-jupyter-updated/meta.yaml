  - '[PAGE 16]


    # What do we need to learn when learning coding?


    Coding is a lot about telling a computer what to do. We, human beings, need to
    write commands that computers understand, and to do so, we need to learn to think
    differently. We have to start from scratch and master a new way of communicating,
    made of *concise* and *logical* instructions. Practically speaking, we have to
    learn at least three things: a coding environment, language syntax, and computational
    thinking. Let’s see what these are!


    A **coding environment** is a **program where we can write and execute code**.
    There are several environments to code in Python. In this book, we will use the
    Jupyter/Python environment, which since its release in 2015 has become used increasingly
    both in industry and academia (Figure 1.1). It allows integrating code with narrative,
    and it is ideal for creating reports, draft code, and learning to code. Other
    very common coding environments are the integrated development environments (IDEs).
    For Python, popular IDEs are PyCharm, Visual Studio, and Spyder (Figure 1.2).
    IDEs typically embed various components, such as a script editor, a variable environment
    panel, and a console wherein code is tested and executed. In Chapter 32, you will
    get familiar with one of them, Spyder, which is commonly used for scientific coding.
    And finally, the most basic environment is the Python IDLE, which is included
    in the Python installation. It consists of a shell—which looks very similar to
    a terminal—where one can type and execute commands (Figure 1.3).


    ![](img/1e0d8bb8215d579da0d409223f09e364_16_0.png)


    A language **syntax** is a **set of rules defining how to write commands**. You
    are already very familiar with at least one syntax, which is your native language
    syntax. In your mother tongue, you know words, punctuation, and how to arrange
    these elements in sentences to create paragraphs and entire texts. In coding,
    the pattern is similar. We have to know data types and operators, as well as how
    to arrange them in *if/else* constructs and loops to create functions and classes.
    In Table 1, you can see a schematic summary of elements and syntax you will learn
    in this book. Don’t worry if you do not understand most of it—everything will
    become more and more clear as we progress through the book.'
  - '[PAGE 17]


    # Introduction


    | Data types (words) | Operators (punctuations) | Constructs and loops (sentences)
    | Unit of code (paragraphs) | Software (texts) |

    | :--- | :--- | :--- | :--- | :--- |

    | string, list, integer, float, Boolean, tuple, dictionary, set | assignment,
    membership, arithmetic, comparison, logical | if/else construct, for loop, while
    loop | functions | classes (object-oriented programming) |


    Table 1. Components of a programming language, from the most basic (left) to the
    most complex (right). In the column titles, the words in between parentheses show
    the parallelism with natural language syntax.


    Finally, **computational thinking** is the **way we think when coding**. Every
    time we approach a new subject, we need to learn *how to think* in that subject
    and develop specific skills. Some of the abilities you will develop in this book
    are:


    +   - *Creating algorithms*, which means conceiving and implementing a series
    of sequential instructions to solve a problem

    - *Divide and conquer*, which consists of decomposing problems in sub-problems,
    and then combining the sub-problem solutions to obtain the main problem solution

    - *Pattern recognition*, which means recognizing in a new problem features of
    a previously solved problem so that you can apply a similar solution

    - *Solution generalization*, which consists of generalizing solutions from specific
    cases to broader situations


    As is the case for any subject, developing a way of thinking comes with studying
    and exercising. Thus, thinking computationally comes with learning syntax and
    practicing coding. We will start building these abilities in Chapter 1. In the
    next part, *Getting ready*, you will download, install, and learn how to use the
    Jupyter/Python environment.'
- md: '## GETTING READY


    In this part, we will set up the Jupyter/Python environment and learn how to use
    it. Let’s start this exciting journey!


    ## The Jupyter/Python environment


    An easy way to think about the Jupyter/Python environment is to consider it as
    a Russian doll—those wooden dolls of decreasing size nested one inside another
    (Figure 2). The largest doll is **JupyterLab**, which is a web-based environment
    in which we can open, organize, and work on files of various types. In JupyterLab,
    there is **Jupyter Notebook**, which is a web-based application where we can write
    code with narrative. Jupyter Notebook supports several programming languages,
    one of which is **Python**. And finally, Python is enriched by an extraordinary
    amount of **modules** and **packages** that allow us to add useful functionalities
    to code. Let’s install the Jupyter/Python environment and see how it works!


    ![](img/1e0d8bb8215d579da0d409223f09e364_20_0.png)


    ## Installing the Jupyter/Python environment


    You can install JupyterLab, Jupyter Notebook, Python, and its scientific packages
    all at once through Anaconda, a commonly used distribution for scientific computing.
    Go to the Anaconda website, https://www.anaconda.com/products/individual, and
    click *download*. It might take a few minutes. Once downloaded, install Anaconda
    like any other software: click *next* when required, and leave the default options
    (unless you have specific requirements). The installation might take a few minutes
    too. When Anaconda is installed, open the Anaconda Navigator by double-clicking
    its icon, which looks like the one in Figure 3, box 1. Once opened, you will see
    all the software contained in Anaconda, including JupyterLab (Figure 3, box 2),
    Jupyter Notebook (Figure 3, box 3), and Spyder (Figure 3, box 4). In this book,
    we will code in Python using JupyterLab as a working environment. So let''s learn
    how to use it!


    ![](img/1e0d8bb8215d579da0d409223f09e364_21_0.png)


    Figure 3. Anaconda interface: (1) icon, (2) JupyterLab, (3) Jupyter Notebook,
    (4) Spyder, and (5) JupyterLab launch button.


    ## JupyterLab


    JupyterLab is an environment where we can code in an organized and efficient way.
    Open it by clicking the *Launch* button in the JupyterLab panel in Anaconda (Figure
    3, box 5). You will see something similar to Figure 4. Below are the most relevant
    features of JupyterLab and some suggestions on how best to use it.


    - *JupyterLab is a web-based environment*. When you launch JupyterLab, the first
    thing you''ll notice is that it starts in the browser. However, its address contains
    *localhost* (Figure 4, box 1), which means that you are actually working *locally*,
    that is, on your computer. In other words, you do *not* need to be connected to
    the internet to use JupyterLab.

    - *Top bar* (Figure 4, box 2). The items in the top bar, such as *File*, *Edit*,
    *View*, etc., are quite intuitive and similar to many other software. We will
    describe the most relevant items throughout the book, but go ahead and start exploring
    them! For now, just notice that when clicking some top bar buttons (for example,
    *File*), some of the items that appear might be light gray because they are disabled
    (for example, *Save As*..). This is because they refer to Jupyter Notebook, which
    we will open in the next section. Finally, a fun feature of JupyterLab is that
    you can set a dark theme. If you want that, go to *Settings*, then *JupyterLab
    themes*, and click on *JupyterLab Dark*.

    - *Browsing and opening files*. On the left side of JupyterLab, you can find a
    panel with some vertical tabs (Figure 4, box 3). The first tab contains an icon
    representing a folder, and, for now, we will focus only on this one. The folder
    tab opens a panel on its right, which contains a few features. The first is a
    top bar (Figure 4, box 4), containing a symbol, +, which allows us to start a
    launcher (Figure 4, box 7); an icon representing a folder containing a +, to create
    a new folder; an arrow pointing up, to upload a new file; and a circular arrow,
    to refresh the content of the current directory—in coding, we often say **directory**
    instead of *folder*. Right below, there is a box to search for files. Then, there
    is the path of the **working directory** (Figure 4, box 5)—that is, the folder
    where we are currently opening and saving files. And below, there is a list of
    the directory content (Figure 4, box 6). In JupyterLab, you can open an *existing*
    file only from this panel, and not by double-clicking the file in your computer
    folder. Therefore, you need to know how to navigate folders from JupyterLab. To
    go back to a previous folder, click on a folder name in Figure 4, box 5 (for example,
    to go back to the previous folder in this screenshot, you would click on *book*).
    To go into a sub-folder—a folder in the current folder—just double-click on the
    sub-folder listed in the folder panel (Figure 4, box 6). Last thing: when clicking
    on the folder icon (Figure 4, box 3), the whole file browser panel toggles out,
    meaning it disappears. When re-clicking, the whole panel toggles back in, so it
    reappears. Toggling out can be convenient if you have a small screen.


    ![](img/1e0d8bb8215d579da0d409223f09e364_22_0.png)


    Figure 4. JupyterLab interface, containing: (1) local URL, (2) top bar, (3) lateral
    tabs, (4) folder browser top bar, (5) folder browser, (6) folder content, (7)
    launcher, and (8) Jupyter Notebook launch button.


    - *Launching tools*. The launcher is the place where you can open *new* notebooks,
    consoles, terminals, text files, etc. (Figure 4, box 7). As an alternative, you
    can open new files and tools from the top bar (Figure 4, box 2) by clicking on
    *File*, then *New*, and then selecting the file type you want. It''s time to open
    a Jupyter Notebook!


    ## Jupyter Notebook


    To open a Jupyter Notebook, go to the launcher and click the Notebook icon (Figure
    4, box 8). A new Notebook opens in the launcher area (Figure 5, box 2), and it
    is visible as *Untitled.ipynb* in the browser panel (Figure 5, box 1). Notebooks
    have the extension *.ipynb*, which stands for interactive python notebook. To
    give the Notebook an appropriate name, right-click on *Untitled.ipynb* in the
    browser panel (Figure 5, box 1). Then, click *Rename*, and change it to any name
    you want—for example, *practicing_cells.ipynb*. As you might have noticed, by
    right-clicking on the file name, you can perform several other actions, such as
    delete, cut, copy, duplicate, and more.


    Let’s now focus on a Notebook content. A Jupyter Notebook is essentially a file
    containing a sequence of **cells**, that is, grey rectangles like the ones you
    see in Figure 5, box 4. Each cell can contain code or narrative, as we will see
    in a bit. The **blue bar** on the left side of a cell (Figure 5, box 5) indicates
    that the current cell is the **active cell**. In the presence of multiple cells,
    we can make a cell active by clicking on the square brackets [ ] on the cell left
    side. When a cell is active, we can perform several operations in various ways,
    either by keyboard commands or via the Notebook top bar (Figure 5, box 3, enlarged
    in Figure 6), the JupyterLab top bar (Figure 4, box 2), or by right-clicking *in*
    the cell! This might sound redundant, but it is conceived to help coders with
    different habits—some prefer using keyboard commands, others prefer clicking on
    the screen—conveniently perform the cell operations they need. If there are too
    many options for you, then just choose one way and stick to that! Below are some
    useful cell operations and some of the possible ways to perform them.


    ![](img/1e0d8bb8215d579da0d409223f09e364_23_0.png)


    - *Creating a cell*: To create a new cell below the active cell, press *B*, for
    *below*, or the plus button in the Notebook top bar (Figure 6, item 2). The newly
    created cell becomes the active cell. We can also create a new cell above the
    active cell by pressing *A*, for *above* (there is no corresponding top bar button).

    - *Deleting a cell*: To delete the active cell, press *D* twice, or click on the
    scissor button (Figure 6, item 3).

    - *Copying a cell*: To copy the active cell, first press *C* and then *V* (without
    *command* or *control*!), or item 4 to copy, and then item 5 to paste (Figure
    6).

    - *Undoing or redoing cell operations*: To undo a cell operation (for example,
    if you have deleted a cell by mistake), press *Z*, or in JupyterLab top bar (Figure
    4, box 2), go to *Edit*, and then *Undo cell operation*. Similarly, to redo a
    cell operation, simultaneously press *shift* and *Z*, or in JupyterLab top bar,
    go to *Edit* and then *Redo cell operation*.

    - *Moving cells*: Left-click on the square brackets [ ] of the active cell, and
    while holding down the mouse button, move the cell up or down. When you reach
    the position you want to move the cell to, release. As an alternative, you can
    go to *Edit* in the JupyterLab top bar (Figure 4, box 2) and then click on *Move
    Cells Up* or *Move Cells Downs*.

    - *Add line numbers*. Line numbers are very useful when coding—you''ll come to
    realize this starting in Chapter 1. To add line numbers, go to *View* in the JupyterLab
    top bar (Figure 4, box 2), and then click *Show Line Numbers*.

    - *Other operations*. You can split or merge cells, enable or disable scrolling
    for output, etc. by going to the JupyterLab top bar (Figure 4, box 2), and then
    see the options in *Edit*, or by right-clicking *in* a cell and browsing the options
    that appear. Just explore them!


    ![](img/1e0d8bb8215d579da0d409223f09e364_24_0.png)


    Figure 6. Jupyter Notebook top bar: (1) save Notebook, (2) add cell, (3) cut cell,
    (4) copy cell, (5) paste cell, (6) run cell, (7) interrupt kernel, (8) restart
    kernel, (9) restart kernel and run whole Notebook, and (10) define cell as code
    or markdown.


    What about the remaining buttons in Figure 6? The first button representing a
    floppy disk—yes, once upon a time we saved data on floppy disks!—is to save the
    Notebook. The buttons 6 to 9 are used to execute code, and you will learn how
    to use them in Chapter 1 (button 6) and Chapter 7 (buttons 7 to 9).


    And finally, time to talk about cell content! As we mentioned before, a cell can
    contain two things: code or narrative. By default, Jupyter Notebook cells are
    *code* cells. To transform a cell into a *text* cell, press *M* on the keyboard,
    or click the drop-down menu in the Jupyter Notebook top bar (Figure 6, item 10),
    and select *Markdown*. **Markdown** is a simplified version of HTML, the coding
    language used to create websites. This is why the Jupyter environment is web-based:
    to use the rich features of web browsers! Writing the narrative in a Notebook
    is fundamental to embedding code into explanations that make workflows easy to
    understand. You can learn how to write in Markdown in the'
  mdcn: '## 准备工作


    在本部分，我们将设置 Jupyter/Python 环境并学习如何使用它。让我们开始这段激动人心的旅程吧！


    ## Jupyter/Python 环境


    理解 Jupyter/Python 环境的一个简单方法是将其想象成一个俄罗斯套娃——那些尺寸递减、一个套一个的木制娃娃（图 2）。最大的娃娃是 **JupyterLab**，这是一个基于
    Web 的环境，我们可以在其中打开、组织和处理各种类型的文件。在 JupyterLab 中，有 **Jupyter Notebook**，这是一个基于 Web
    的应用程序，我们可以在其中编写带有叙述性文字的代码。Jupyter Notebook 支持多种编程语言，其中之一就是 **Python**。最后，Python
    通过大量的 **模块** 和 **包** 得到丰富，这些模块和包允许我们为代码添加有用的功能。让我们安装 Jupyter/Python 环境并看看它是如何工作的！


    ![](img/1e0d8bb8215d579da0d409223f09e364_20_0.png)


    ## 安装 Jupyter/Python 环境


    你可以通过 Anaconda（一个常用的科学计算发行版）一次性安装 JupyterLab、Jupyter Notebook、Python 及其科学计算包。访问
    Anaconda 网站，https://www.anaconda.com/products/individual，然后点击 *download*。这可能需要几分钟时间。下载完成后，像安装任何其他软件一样安装
    Anaconda：在需要时点击 *next*，并保留默认选项（除非你有特定要求）。安装过程也可能需要几分钟。Anaconda 安装完成后，通过双击其图标（如图
    3 方框 1 所示）打开 Anaconda Navigator。打开后，你将看到 Anaconda 中包含的所有软件，包括 JupyterLab（图 3，方框
    2）、Jupyter Notebook（图 3，方框 3）和 Spyder（图 3，方框 4）。在本书中，我们将使用 JupyterLab 作为工作环境来编写
    Python 代码。那么，让我们学习如何使用它吧！


    ![](img/1e0d8bb8215d579da0d409223f09e364_21_0.png)


    图 3. Anaconda 界面：(1) 图标，(2) JupyterLab，(3) Jupyter Notebook，(4) Spyder，以及 (5)
    JupyterLab 启动按钮。


    ## JupyterLab


    JupyterLab 是一个我们可以以有组织且高效的方式编写代码的环境。通过点击 Anaconda 中 JupyterLab 面板（图 3，方框 5）的 *Launch*
    按钮来打开它。你将看到类似图 4 的界面。以下是 JupyterLab 最相关的功能以及一些关于如何最佳使用它的建议。


    - *JupyterLab 是一个基于 Web 的环境*。当你启动 JupyterLab 时，首先注意到的是它在浏览器中启动。然而，其地址包含 *localhost*（图
    4，方框 1），这意味着你实际上是在 *本地* 工作，即在你的计算机上。换句话说，你 *不需要* 连接到互联网就能使用 JupyterLab。

    - *顶部栏*（图 4，方框 2）。顶部栏中的项目，如 *File*、*Edit*、*View* 等，非常直观，与许多其他软件类似。我们将在本书中描述最相关的项目，但你可以开始探索它们！目前，只需注意当点击某些顶部栏按钮（例如
    *File*）时，出现的一些项目可能是浅灰色的，因为它们被禁用了（例如 *Save As*..）。这是因为它们指的是 Jupyter Notebook，我们将在下一节中打开它。最后，JupyterLab
    一个有趣的功能是你可以设置深色主题。如果你想要这个，前往 *Settings*，然后 *JupyterLab themes*，并点击 *JupyterLab
    Dark*。

    - *浏览和打开文件*。在 JupyterLab 的左侧，你可以找到一个带有垂直选项卡的面板（图 4，方框 3）。第一个选项卡包含一个代表文件夹的图标，目前，我们将只关注这一个。文件夹选项卡在其右侧打开一个面板，其中包含一些功能。第一个是顶部栏（图
    4，方框 4），包含一个符号 +，允许我们启动一个启动器（图 4，方框 7）；一个包含 + 的文件夹图标，用于创建新文件夹；一个向上的箭头，用于上传新文件；以及一个圆形箭头，用于刷新当前目录的内容——在编程中，我们通常说
    **目录** 而不是 *文件夹*。紧下方是一个用于搜索文件的框。然后，是 **工作目录** 的路径（图 4，方框 5）——即我们当前打开和保存文件的文件夹。再下方是目录内容的列表（图
    4，方框 6）。在 JupyterLab 中，你只能从这个面板打开 *现有* 文件，而不能通过双击计算机文件夹中的文件来打开。因此，你需要知道如何在 JupyterLab
    中导航文件夹。要返回到上一个文件夹，请点击图 4 方框 5 中的文件夹名称（例如，要返回到此屏幕截图中的上一个文件夹，你会点击 *book*）。要进入子文件夹——当前文件夹中的一个文件夹——只需双击文件夹面板（图
    4，方框 6）中列出的子文件夹。最后一点：当点击文件夹图标（图 4，方框 3）时，整个文件浏览器面板会切换出去，意味着它会消失。再次点击时，整个面板会切换回来，因此它会重新出现。如果你的屏幕较小，切换出去可能很方便。


    ![](img/1e0d8bb8215d579da0d409223f09e364_22_0.png)


    图 4. JupyterLab 界面，包含：(1) 本地 URL，(2) 顶部栏，(3) 侧边选项卡，(4) 文件夹浏览器顶部栏，(5) 文件夹浏览器，(6)
    文件夹内容，(7) 启动器，以及 (8) Jupyter Notebook 启动按钮。


    - *启动工具*。启动器是你打开 *新* 的笔记本、控制台、终端、文本文件等的地方（图 4，方框 7）。或者，你可以通过点击顶部栏（图 4，方框 2）的 *File*，然后
    *New*，再选择你想要的文件类型来打开新文件和工具。是时候打开一个 Jupyter Notebook 了！


    ## Jupyter Notebook


    要打开一个 Jupyter Notebook，请前往启动器并点击 Notebook 图标（图 4，方框 8）。一个新的 Notebook 在启动器区域打开（图
    5，方框 2），并在浏览器面板（图 5，方框 1）中显示为 *Untitled.ipynb*。Notebook 的扩展名是 *.ipynb*，代表交互式 Python
    笔记本。要给 Notebook 一个合适的名称，请在浏览器面板（图 5，方框 1）中右键点击 *Untitled.ipynb*。然后，点击 *Rename*，并将其更改为任何你想要的名称——例如
    *practicing_cells.ipynb*。你可能已经注意到，通过右键点击文件名，你可以执行其他几种操作，如删除、剪切、复制、复制等。


    现在让我们关注 Notebook 的内容。Jupyter Notebook 本质上是一个包含一系列 **单元格** 的文件，即像你在图 5 方框 4 中看到的灰色矩形。每个单元格可以包含代码或叙述性文字，我们稍后会看到。单元格左侧的
    **蓝色条**（图 5，方框 5）表示当前单元格是 **活动单元格**。当存在多个单元格时，我们可以通过点击单元格左侧的方括号 [ ] 来使一个单元格变为活动状态。当一个单元格处于活动状态时，我们可以通过多种方式执行各种操作，无论是通过键盘命令还是通过
    Notebook 顶部栏（图 5，方框 3，在图 6 中放大）、JupyterLab 顶部栏（图 4，方框 2），或者通过在单元格 *内* 右键点击！这听起来可能有些冗余，但它的设计是为了帮助具有不同习惯的编码员——有些人喜欢使用键盘命令，有些人喜欢点击屏幕——方便地执行他们需要的单元格操作。如果选项对你来说太多，那么只需选择一种方式并坚持下去！以下是一些有用的单元格操作以及执行它们的一些可能方式。


    ![](img/1e0d8bb8215d579da0d409223f09e364_23_0.png)


    - *创建单元格*：要在活动单元格下方创建一个新单元格，按 *B*（代表 *below*），或点击 Notebook 顶部栏（图 6，项目 2）的加号按钮。新创建的单元格成为活动单元格。我们也可以通过按
