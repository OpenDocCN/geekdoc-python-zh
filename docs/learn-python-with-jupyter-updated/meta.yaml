    \ a new word.\n\n## 19. And, or, not, not in\n\nCombining and reversing conditions\n\
    \nUp to now, we have considered only one condition in if/else constructs and while\
    \ loops. What if we need more than one condition? And what if we need to reverse\
    \ a condition? In this chapter, we will learn how to combine or reverse conditions\
    \ using the logical operators and, or, not, and the membership operator not in.\
    \ As usual, try to solve the tasks yourself before looking at the solutions, which\
    \ you can also find in Notebook 19. Let's start!\n\n### 1. and\n\n- Given the\
