    \ how the while loop works. We ask the player whether they want a candy, and we\
    \ save the reply in the variable `answer` (line 8). Then, we continue with the\
    \ while loop header, which says something like: as long as the variable `answer`\
    \ is equal to yes, do the following (line 11): add a unit to the variable `number_of_candies`\
    \ (line 14); print out the current number of candies (line 17), and ask"
