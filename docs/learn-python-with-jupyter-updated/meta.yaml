  md: 'In this case, we want to slice and print two non-consecutive elements—"Prague"
    and "Tokyo"—which are at positions 1 and 3, respectively. In the code above, you
    might recognize that 1 is the start, 4 is the stop (because of the plus-one rule),
    and 2? That is the **step**! As you can see, "Tokyo" is positioned 2 steps after
    "Prague": there is 1 step from "Prague" to "Cape Town", and 1 step from "Cape
    Town" to "Tokyo", for a total of 2 steps. Therefore, the syntax to slice **non-consecutive
    elements** is an extension of the rule we saw in the example above: **list_name[start:stop:step]**,
    which you can read as *list name from start to stop with step*. We can call it
    the **three-s rule**, where the three s''s are the initials of start, stop, and
    step, respectively.


    The most convenient aspect of the three-s rule is that we can simplify it in several
    situations. For example, you might wonder: why didn''t we write the step in the
    example 2, where we sliced the cities from "Prague" to "Tokyo"? Because **when
    elements are consecutive, the step is 1**—"Cape Town" is 1 step after "Prague",
    and "Tokyo" is 1 step after "Cape Town"—and when the step is 1 we can simply omit
    it. Obviously, we could have written the code specifying the step as follows:


    ```

    [3]: 1 print (cities[1:4:1])

    [''Prague'', ''Cape Town'', ''Tokyo'']

    ```


    However, adding the step here is a redundancy, so we simply avoid it.


    4. Slice the cities from "San Diego" to "Cape Town":


    ```

    [5]: 1 print (cities[0:3])

    [''San Diego'', ''Prague'', ''Cape Town'']

    ```


    Here we have to slice consecutive elements. So, we specify the start, which is
    0 for "San Diego", and the stop, which is 3 for "Cape Town", but we can omit the
    step because it is 1. Interestingly, in this case we can simplify the three-s
    rule even more! Because the **start** coincides with the **first element of the
    list**, we can simply omit it:


    ```

    [6]: 1 print (cities[:3])

    [''San Diego'', ''Prague'', ''Cape Town'']

    ```


    5. Slice the cities from "Cape Town" to "Melbourne":


    ```

    [7]: 1 print (cities[2:5])

    [''Cape Town'', ''Tokyo'', ''Melbourne'']

    ```


    Again, we have to slice consecutive elements. Therefore, we specify the start,
    which is 2 for "Cape Town", and the stop, which is 5 (because of the plus-one
    rule) for "Melbourne", but we omit the step because it is 1. And once more, we
    can simplify the three-s-rule! How? The **stop** coincides with the **last element
    of the list**, so we can just omit it:


    ```

    [8]: 1 print (cities[2:])

    [''Cape Town'', ''Tokyo'', ''Melbourne'']

    ```


    So far, we have seen the three-s rule applied in its entirety (example 3), and
    without start (example 4), stop (example 5), and step (example 2). How else can
    we simplify it? Let''s look at the following example. How do you think the code
    will look?'
