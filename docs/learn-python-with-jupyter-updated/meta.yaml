    type? Because we want to add it to the list planets using concatenation. And,
    as in string concatenation, we can concatenate only strings with strings; in list
    concatenation, we can concatenate only lists with lists. Note that list concatenation
    works the same way as string concatenation. Finally, we assign the result of the
    operation to the original list planets to actually change it. It is common to
    say that we reassign the result to the original list. This whole operation constitutes
    an alternative to the method .append(). Finally, we print out the modified list
    to check the correctness of our code (line 2).


