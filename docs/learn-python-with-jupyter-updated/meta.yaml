    **What is on the website?** On `www.learnpythonwithjupyter.com`, you can find
    Jupyter Notebooks associated with each chapter, so you can test and experiment
    while learning. You can also find a community, with solutions to both theory and
    coding exercises. You can ask questions and propose alternative solutions, to
    deepen your knowledge.


    **How do I use this book?** Start with the first part, *Getting ready*, to install
    and learn the computational environment. Then, proceed with the chapters. For
    each chapter, download the corresponding notebook at `www.learnpythonwithjupyter.com`.
    Make sure you understand the syntax, play with'
  - '[PAGE 13]


    the code, and do the theoretical exercises. Read the recap and the “in more depth”
    sections, which will give you useful hints. Finally, do the coding exercises and
    compare your solutions with the ones you find in the community. Obviously, looking
    at a solution before completing an exercise weakens your chance of learning. If
    you do not understand questions or solutions, ask in the community. Take your
    time to solve each exercise. Missing the understanding of one chapter might compromise
    your understanding of the chapters that follow it.


    **How is the language used in this book?** The language is colloquial and simple—but
    precise. There are clear definitions and careful explanations. I directly talk
    to *you*, but I use *we* when explaining syntax. We are in this together! Also,
    I use the first person when I want to share some hints I learned along the way.'
