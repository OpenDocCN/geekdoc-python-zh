- md: "## Downloading the book material\n\nThroughout the rest of the book, you will\
    \ find 38 chapters. For each chapter, there is a Jupyter Notebook, whose file\
    \ name includes the corresponding chapter number. Each Notebook contains the examples\
    \ discussed in the text so that you can practice and understand while reading.\
    \ Download the Notebooks at www.learnpythonwithjupyter.com. I highly recommend\
    \ that you save the Notebooks in a *new folder*—not in the *Download* folder—so\
    \ that you don't mix them up with other files you download for other purposes.\
    \ If you feel like going a step further, I really recommend that you create this\
    \ folder in a *cloud service*, so that you do not lose your files in case your\
    \ computer breaks or has issues (yes, computers are machines and they break!).\
    \ As for cloud services, you can use Google Drive (https://www.google.com/drive),\
    \ Dropbox (https://www.dropbox.com), or any others that you prefer. Using these\
    \ tools is very easy. Download the program that installs the system on your computer.\
    \ After the installation, you will see a new folder. Just create the folder that\
    \ is going to contain the Notebooks in the newly created cloud folder, and all\
    \ your files will always be automatically synchronized and saved.\n\nFinally,\
    \ in each chapter of the book, you will find coding exercises. I recommend that\
    \ you create a separate folder called *Exercises*, or something similar, and inside\
    \ this folder, create a Jupyter Notebook for the exercises of each book chapter.\
    \ Creating Notebooks yourself will strengthen your organizational skills and will\
    \ allow you to become even more familiar with the Jupyter/Python environment.\n\
    \nAt this point, we are really ready. Let's start coding!\n\n# PART 1\n\n## CREATING\
    \ THE BASICS\n\nIt's time to start coding! In this part, you will learn the basic\
    \ elements that we will use throughout the whole book. You will learn about strings\
    \ — that is, a data type that contains text — and the concatenation operation,\
    \ used to combine strings. You will also learn how to ask questions and how to\
    \ print out information. And most importantly, you will learn what a variable\
    \ is. Let's get started!\n\n# 1. Text, questions, and art\n\n*Strings, input(),\
    \ and print()*\n\nProgramming languages are written languages, and the core of\
    \ written communication is *text*. How is *text* represented in Python? How can\
    \ we ask a question to a person? And how can we provide information to a person?\
    \ To answer these questions, let’s open Jupyter Notebook 1 and start!\n\n## 1.\
    \ Writing text: Strings\n\nIn coding, we use the word *string* to refer to *text*.\
    \ We can define strings as follows:\n\n> **Strings** are text in between quotes\n\
    \nLet’s look at the two examples below. On the left side, we see the code as it\
    \ is in Jupyter Notebook 1. On the right side, we see how to pronounce the code.\
    \ Let’s read the code out loud:\n\n```\n[]: 1 \"This is a string\"  This is a\
    \ string\n[]: 1 'Everything you write between quotes is a string'  Everything\
    \ you write between quotes is a string\n```\n\nNow let’s consider the following\
    \ statements. Are they true or false?\n\n### True or false?\n\n- 1. A string contains\
    \ text\n- 2. A string is in green in Jupyter Notebook\n- 3. Quotes can be either\
    \ single or double\n\n### Computational thinking and syntax\n\nLet’s analyze the\
    \ code above in detail! In each cell, there is a *string*. As we can see, a string\
    \ is just some text in between quotes. By *text*, we mean any **character** we\
    \ can type on the keyboard: letters, numbers, symbols, and even the space! *Quotes*\
    \ can be **double quotes** \" \", like in the top example, or **single quotes**\
    \ ' ', like in the bottom example. Quotes that start a string are called **opening**\
    \ quotes, whereas quotes that end a string are called **closing** quotes. When\
    \ writing a string in Python, we can use either double or single quotes; we just\
    \ have to make sure we do not mix them up. In other words, if we start writing\
    \ a string with an opening *double* quote, we must finish the string with a closing\
    \ *double* quote. Similarly, if we start writing a string with an opening *single*\
    \ quote, we must finish the string with a closing *single* quote. *Strings* are\
    \ a Python **data type**, which means that they are one of the core parts of the\
    \ Python language (see Table 1 at page 4). In Jupyter Notebook, Python strings\
    \ are in *red*.\n\n## Part 1. Creating the basics\n\nLet's run the first cell.\
    \ **Running a cell** means **executing the code** in that cell. In the Notebook,\
    \ position the mouse anywhere inside the cell. If you haven't done it already,\
    \ click the mouse left button. The cursor will become a blinking vertical bar.\
    \ Then, move to the keyboard. If you are on a MacOS, press *shift* and *return*\
    \ at the same time. If you are on a Windows, press *shift* and *enter* at the\
    \ same time (if not explicitly written on any key, *enter* is the key on the right\
    \ side of the keyboard depicting an angled arrow). As an alternative, you can\
    \ click the *start* button in the Jupyter Notebook top bar (Figure 6, icon 6,\
    \ at page 9).\n\nThis is how the first cell looks when we run it:\n\n```\n[1]:\
    \ 1 \"This is a string\"\n    'This is a string'\n    This is a string\n```\n\n\
    When we run a cell, two things occur. First, a number appears in between the square\
    \ brackets on the left side of the cell. In this case, the number is 1 because\
    \ this is the first cell we ran. Second, we execute the code. In this case, we\
    \ get to see the content of the cell; that is, 'This is a string'. Jupyter Notebook\
    \ shows the string in between single quotes, even when the string is written in\
    \ between double quotes. As mentioned above, single and double quotes are equivalent.\n\
    \nLet's run the second cell. Like before, left-click anywhere inside the cell.\
    \ Then, press *shift* and *return* if on MacOS, or *shift* and *enter* if on Windows,\
    \ or click the *start* button in the Jupyter Notebook top bar. Here is what we\
    \ get:\n\n```\n[2]: 1 'Everything you write between quotes is a string'\n    'Everything\
    \ you write between quotes is a string'\n    Everything you write between quotes\
    \ is a string\n```\n\nTwo things occurred again. First, the number 2 appeared\
    \ in between the square brackets on the left side of the cell, showing that this\
    \ is the second cell we ran. As is becoming clear, the **number on the left**\
    \ side between square brackets indicates the **order of execution** of the cells.\
    \ Second, we can see the string contained in the cell: 'Everything you write between\
    \ quotes is a string'.\n\n## 2. Asking questions: input()\n\nIn all programming\
    \ languages there are ways to ask questions to a person, whom we usually call\
    \ the **user**. This is a very important feature because it allows the interaction\
    \ between a computer and a human being. What does this mean? Let's look at the\
    \ code! Read the two cells below out loud (pronunciation on the right):\n\n```\n\
    []: 1 input (\"What's your name?\")\n    input what's your name?\n[]: 1 input\
    \ (\"Where are you from?\")\n    input where are you from?\n```\n\nWhat does the\
    \ code inside the cells do? Get a first hint by solving the following exercise.\n\
    \n## Match the sentence halves\n\n- 1. What's your name? is\n- 2. input() is a\
    \ built-in function and\n- 3. When running a cell containing input()\n- 4. A built-in\
    \ function is always followed\n\n- a. it is colored green\n- b. by round brackets\n\
    - c. a string\n- d. we can answer a question\n\n## Computational thinking and\
    \ syntax\n\nLet's understand how these lines of code work! Let's run the first\
    \ cell. We will get a text box:\n\n```\n[*]: 1 input (\"What's your name?\")\n\
    What's your name? [ ]\n```\n\nType your name in the rectangle (I will write mine!):\n\
    \n```\n[*]: 1 input (\"What's your name?\")\nWhat's your name? Serena\n```\n\n\
    And now press *return* or *enter* on the keyboard. You will see the following\
    \ (you will see your name, of course!):\n\n```\n[3]: 1 input (\"What's your name?\"\
    )\nWhat's your name? Serena\n'Serena'\n```\n\nA few key things have happened here!\
    \ First, the number on the left side of the cell turned to 3 as expected. But\
    \ while answering the question, instead of the number 3, there was a **star symbol\
    \ (*)**. This indicates that a cell has started to run but has not finished yet.\
    \ To complete the cell run and execute the code, we have to press *return* or\
    \ *enter* after typing the answer. If the cell run is not completed, the code\
    \ in the cell does not get executed, and in addition, we will not be able to run\
    \ the following cells. Now, let's look at the code. We know that \"What's your\
    \ name?\" is a string, because it is text in between quotes and it is colored\
    \ red. What about **input()**? input() allows us **to ask a question to a user**.\
    \ In Jupyter Notebook, input() creates a *text box* (a white rectangle) where\
    \ we can insert some text. input() performs a specific task and is called a *built-in\
    \ function*.\n\n> A **built-in function** is a command that performs a specific\
    \ task\n\nWe can recognize if a code element is a built-in function by two characteristics.\
    \ First, in Jupyter Notebook built-in functions are always *green*. Second, built-in\
    \ functions are always followed by **parentheses ()**. In this book, instead of\
    \ *parentheses*, we will call them **round brackets**, to differentiate from other\
    \ types of brackets that we will encounter in the chapters that follow. In between\
    \ the round brackets, we often write an **argument**, which for input() is a string\
    \ containing the question we want to ask. *Built-in functions* are very useful,\
    \ as they contain code written by the creators of a programming language to facilitate\
