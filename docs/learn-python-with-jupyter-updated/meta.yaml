  md: '# Part 6. Focus on lists and for loops


    Another interesting characteristic of list comprehensions is that they **can contain
    a conditional construct**. Let''s have a look at it!


    +   - Keep and capitalize only the elements shorter than 6 characters:


    ```

    [7]:

    1  last_names = ["garcia", "smith", "zhang"]

    2  last_names = [last_name.title() for

    3               last_name in last_names if

    4               len(last_name) < 6]

    5  print (last_names)

    [''Smith'', ''Zhang'']

    ```


    last names is assigned garcia, smith, zhang

    last names is assigned last name dot title **for** last name **in** last names
    **if** len last name less than six

    print last names


    We modify the code from cell 6 by adding an **if condition at the *end*** of the
    list comprehension (line 2). Once more, let''s compare the construct of a list
    comprehension with the corresponding for loop.


    ![](img/1e0d8bb8215d579da0d409223f09e364_203_0.png)


    Similarly to above, in the list comprehension (line (d)) first we write the new
    element, which is in the last line of the for loop body (yellow rectangle; line
    (c) in the for loop). Then, we essentially restart from the beginning of the loop
    and add commands consecutively. Thus, we first write the for loop header (orange
    rectangle; line (a) in the loop) and then the if condition (black rectangle; line
    (c) in the loop).


    Finally, list comprehensions are extremely useful to **delete list elements based
    on conditions**. In cell 16 of the previous Chapter, we used a while loop containing
    `.remove()` to delete several elements with similar characteristics. Now, let''s
    learn how to delete elements in a much more compact way with list comprehension.


    +   - Delete elements that are composed of 5 characters:


    ```

    [8]:

    1  last_names = ["garcia", "smith", "zhang"]

    2  last_names = [last_name.title()

    3               for last_name in last_names

    4               if len(last_name) != 5]

    5  print (last_names)

    [''garcia'']

    ```


    last names is assigned garcia, smith, zhang

    last names is assigned last_name dot title **for** last name **in** last names
    **if** len last name not equal to five

    print last names


    When deleting elements with list comprehensions, **we have to think about the
    elements that we are going to *keep*, not about those that we are going to delete!**
    This is because in a list comprehension, in the first position we must write the
    element that we are going to insert into the list. Thus, if we want to delete
