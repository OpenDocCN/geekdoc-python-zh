    \ us the question, which we put in between the round brackets as a string, and\
    \ it creates a text box in which we can type the answer. After typing the answer,\
    \ we press *return* or *enter* to complete the code execution.\n\nAt this point\
    \ we can ask ourselves: where do we see `input()` in action in everyday life?\
    \ Every time we are asked to type something on a device, there is a function similar\
    \ to `input()` behind it! For example, this is the case when we write our names\
    \ to open a new account, enter the amount we want to withdraw from an ATM, or\
    \ fill out an online form.\n\nFinally, it is important to mention that when we\
    \ write code, *we wear two hats* — that is, we have two roles: we are at the same\
    \ time programmer and user! When writing code, we wear the *programmer hat*: we\
    \ create code to perform a task, design code structure, and define user messages.\
    \ When testing code, we wear the *user hat*: we check whether the code does what\
    \ expected, is easy to use, and whether the user interaction is pleasant. When\
    \ coding, we switch hats continuously!\n\n## 3. ASCII art: print()\n\nWe now know\
    \ how to ask a question to a user, but how do we provide them a piece of information?\
    \ We use the *built-in function* `print()`! There are several ways to learn about\
    \ `print()`, and the following one is indeed a lot of fun. It involves a type\
    \ of digital art called ASCII art, by which images can be created using the symbols\
    \ on a keyboard. Let's have a look at the following cell:\n\n```\n[]: 1 print\
    \ (\"/\\_/\\ \")\n2 print (\">^,^< \")\n3 print (\" / \\ \")\n4 print (\"(__)___\"\
    )\n```\n\nWhat are we going to print to the screen? The answer is straightforward,\
    \ but before running the cell, let's quickly analyze the code by completing the\
