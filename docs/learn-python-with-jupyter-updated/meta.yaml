    \ are pretty straightforward. To remember that *append* adds new elements at the\
    \ end of a list, one can think of the appendix of a book, which is always at the\
    \ end, or of the appendix in the intestine, which is somewhere at the end of the\
    \ abdomen. To remember *pop*, one can think of making popcorn, like little explosions,\
