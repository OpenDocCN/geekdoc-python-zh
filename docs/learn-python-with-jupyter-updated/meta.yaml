    \ 2 行）。\n\n现在让我们运行第三个单元格，它包含第一个 for 循环：\n\n```\n[3]:\n1  for index in range (0,4):\n\
    2      print(\"index:\" + str(index))\n3      print(\"friend:\" + friends[index])\n\
    index: 0\nfriend: Geetha\nindex: 1\nfriend: Luca\nindex: 2\nfriend: Daisy\nindex:\
    \ 3\nfriend: Juhan\n```\n\nfor index in range from zero to four\nprint index:\
    \ concatenated with string of index\nprint friend: concatenated with friends in\
    \ position index\n\n代码通过重复执行第 2 行和第 3 行四次，打印出每个列表元素的位置和值。这是如何发生的？让我们从第 1 行开始，它是\
    \ for 循环的头部。它由五个部分组成：\n\n- **for**：启动 for 循环的关键字。像所有关键字一样，它在 Jupyter Notebook\
    \ 中是粗体绿色。\n- **index**：一个变量，在每次循环迭代中被赋予不同的值（我们稍后会详细讨论）。\n- **in**：一个成员运算符，与你在第\
