    \ the output to last_names_upper (line 6). Finally, we print last_names_upper\
    \ (line 8). Why don't we directly modify last_names? Because in a for loop through\
    \ elements, **we cannot modify the list** we are browsing. We can only create\
    \ a new list (that is, last_name_upper) to which we append the modified elements\
    \ (that is, last_name.title()). Let's see what happens if we try to use a for\
    \ loop through *elements* to change elements:\n\n```\nfor last_name in last_names:\n\
    \    print (\"last_name before change: \" + last_name)\n    last_name = last_name.title()\n\
    \    print (\"last_name after change: \" + last_name)\nprint (last_names)\nlast_name\
    \ before change: garcia\nlast_name after change: Garcia\nlast_name before change:\
    \ smith\nlast_name after change: Smith\nlast_name before change: zhang\nlast_name\
    \ after change: Zhang\n['garcia', 'smith', 'zhang']\n```\n\nIn the first iteration,\
    \ the variable last_name is \"garcia\" (line 2), we change it to \"Garcia\" (line\
