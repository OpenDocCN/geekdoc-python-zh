- md: "## 16. Rock paper scissors\n\nIntroduction to algorithms\n\nEverybody knows\
    \ the game rock paper scissors! Kids in every corner of the world play this game\
    \ originating at least 2,000 years ago in China¹. In this chapter, we will learn\
    \ how to implement this game in Python. How would you do it? Write your ideas\
    \ in the next exercise and try to write your own implementation. Then, have a\
    \ look at the computational solution below, implemented also in Notebook 16.\n\
    \n## Complete the sentences\n\nThink about three steps you need to implement rock\
    \ paper scissors and write them below. Consider that you will play against the\
    \ computer: it will pick either paper, rock, or scissors, and you will do the\
    \ same. Who wins?\n\n1. __________________________________________________________________________________.\n\
    2. __________________________________________________________________________________.\n\
    3. __________________________________________________________________________________.\n\
    \n## 1. Computer pick\n\nIn the first step, the computer picks among paper, rock,\
    \ and scissors. How? Let's have a look at the code below.\n\n- Make the computer\
    \ pick *rock*, *paper*, or *scissors*:\n\n```python\nimport random\n\n# list of\
    \ game possibilities\npossibilities = [\"rock\", \"paper\", \"scissors\"]\n\n\
    # computer random pick\ncomputer_pick = random.choice(possibilities)\nprint(computer_pick)\n\
    ```\n\nWe import the package `random`, which we learned in the previous chapter\
    \ (line 1). Then, we create a list containing the possible choices—that is, the\
    \ three strings \"rock\", \"paper\" and \"scissors\" (line 4). We use the function\
    \ `.choice()` from the package `random` to randomly pick an element from the list\
    \ `possibilities`. Finally, we save the pick in the variable `computer_pick` (line\
    \ 7) and we print it out (line 8). In this case, the `computer_pick` is `rock`.\n\
    \n¹https://en.wikipedia.org/wiki/Rock_paper_scissors\n\n## 2. Player choice\n\n\
    In the second step, it's the player's turn to choose among rock, paper, and scissors.\
    \ Let's have a look below.\n\n- Make the player choose among *rock*, *paper*,\
    \ or *scissors*:\n\n```python\n# asking the player to make their choice\nplayer_choice\
    \ = input(\"Rock, paper, or scissors?\")\nprint(player_choice)\n```\n\nWe use\
    \ the built-in function `input` to ask the player to choose among rock, paper,\
    \ or scissors, and we save the choice in the variable `player_choice` (line 2).\
    \ Then, we print it out as a check (line 3). In our example, the player chooses\
    \ rock.\n\n## 3. Determine who wins\n\nIt's time to determine who wins! How do\
    \ we do it? The computer has three possible picks, and so does the player. Thus,\
    \ there are nine possible scenarios. How do we code them without forgetting any?\
    \ One option is to define three situations where the computer's pick is fixed\
    \ and the player's choice varies. Let's see the implementation!\n\n- If the computer\
    \ picks *rock*:\n\n```python\nif computer_pick == \"rock\":\n    # compare to\
    \ the player's choice\n    if player_choice == \"rock\":\n        print(\"Tie!\"\
    )\n    elif player_choice == \"paper\":\n        print(\"You win!\")\n    else:\n\
    \        print(\"The computer wins!\")\n```\n\nWe start with an `if` condition\
    \ to check if the computer pick equals \"rock\" (line 1). Then we evaluate the\
    \ player's choice. If the player's choice equals \"rock\" (line 4), then we print\
    \ that it's a tie (line 5). If the player's choice equals \"paper\" (line 6),\
    \ then we print that the player wins (line 7). Finally, in the remaining case—the\
    \ player's choice is \"scissors\"—(line 8), we print that the computer wins (line\
    \ 9). The code is very simple: an `if` condition containing an `if/elif/else`\
    \ construct with prints in the statements. As you can see, we **print a message\
    \ directly to the player**, not to the coder. You might remember that when we\
    \ code, we alternate two hats: the coder hat or the player hat (see page 14).\
    \ If we print \"The player wins\" (line 7), we tell the *coder* that the code\
    \ works. But if we print *You win!*, we talk to the *player*, who is the person\
    \ we are coding for! Think about when you play a computer game: what kind of messages\
    \ do you get?\n\nIn an `if/elif/else` construct, it is important to **test all\
    \ conditions**. We want to make sure that all statements execute correctly, as\
    \ we mentioned when we implemented a calculator (Chapter 13).\n\nWhat does testing\
    \ mean exactly?\n\n> **Testing** means to **evaluate and verify** that the **code\
    \ does what it is supposed** to do\n\nHow do we test the code in this example?\
    \ We rerun cell 2—where we ask the player to choose among rock, paper, and scissors—two\
    \ times: once entering `paper` and once entering `scissors`. After each run, we\
    \ rerun cell 3 to check that the corresponding printout is correct. It is important\
    \ to enter the strings in the same order as they appear in the conditions: first\
    \ `rock`, then `paper`, and finally `scissors`. **Keeping the same order helps\
    \ us make sure that we test all conditions**, without skipping any.\n\nSometimes\
    \ testing is confused with **debugging**, but they are two very different concepts.\
    \ You might have heard the word **debugging** many times. What is its exact meaning?\n\
    \n> **Debugging** means **identifying** and **removing errors** from code\n\n\
    Debugging is a bit of a detective job. When we get error messages, or we do not\
    \ obtain the result that we expect, we need to understand **where** the error\
    \ is so that we can fix it. A very common way to debug is to **print** variables\
    \ after every line of code, to check the value they are assigned. When the variable\
    \ value is not the expected one, that's where the error happens! Once we have\
    \ found the error, we can fix it, and then we can keep coding. To understand further\
    \ why we use the word debugging, read the \"in more depth\" section at the end\
    \ of this chapter.\n\nLet's continue implementing rock paper scissors, looking\
    \ at the second computer pick possibility.\n\n- If the computer picks `paper`:\n\
    \n```python\nif computer_pick == \"paper\":\n    # compare to the player's choice\n\
    \    if player_choice == \"paper\":\n        print(\"Tie!\")\n    elif player_choice\
    \ == \"scissors\":\n        print(\"You win!\")\n    else:\n        print(\"The\
    \ computer wins!\")\n```\n\nThe structure of the code is the same as in the previous\
    \ cell: an `if` condition (line 1) containing an `if/elif/else` construct (lines\
    \ 4–9). What changes are the terms of comparison—that is, the strings—in the conditions:\
    \ we check if the computer picks \"paper\", and we change the conditions for the\
    \ player according to the printed messages.\n\nWhen we write code with a repetitive\
    \ structure—like in our example—it is crucial to use parallelism. What is parallelism?\n\
    \n> **Parallelism** means maintaining a **corresponding structure** for subsequent\
    \ lines or blocks of code\n\nIn our example, we can either keep the *conditions*\
    \ in the same order—e.g., the first term of comparison is always \"rock\", the\
    \ second is always \"paper\", and the third is always \"scissors\"—or we can keep\
    \ the *statements* in the same order—that is, the first message is always \"Tie!\"\
    \ (line 5 in both cells 3 and 4), the second is always \"You win!\" (line 7 in\
    \ both cells), and the third is always \"The computer wins!\" (line 9 in both\
    \ cells). Parallelism helps us remember to **list all conditions** in every construct,\
    \ and it improves code **readability**.\n\nOnce more, let's not forget to **test\
    \ all conditions**. We first have to make sure that the computer pick is paper.\
    \ Since we have only three options, a simple way is to rerun cell 1 until we get\
    \ what we need—that is, \"paper\". Then, we re-run cells 2 and 4 three times,\
    \ each time entering the player choice and testing the corresponding print, **in\
    \ the same order as** in the if/elif/else construct. In other words, first we\
    \ enter \"paper\" at cell 2, and run cell 4 to test lines 4–5. Then, we enter\
    \ \"scissors\" at cell 2, and run cell 4 testing lines 6–7. And finally, we enter\
    \ \"scissors\" at cell 2, and run cell 4 to test lines 8–9.\n\nLet's finally look\
    \ into the third scenario.\n\n- If the computer picks *scissors*:\n\n```python\n\
    if computer_pick == \"scissors\":\n    # compare to the player's choice\n    if\
    \ player_choice == \"scissors\":\n        print(\"Tie!\")\n    elif player_choice\
    \ == \"rock\":\n        print(\"You win!\")\n    else:\n        print(\"The computer\
    \ wins!\")\n```\n\nAlso in this last case, the code structure is similar: an if\
    \ condition (line 1) nesting an if/elif/else construct (lines 4–9). We check if\
    \ the computer picked \"scissors\" and if the player chose \"scissors\" (line\
    \ 4), \"rock\" (line 6), or \"paper\" (the else in line 8). As in cell 4, we construct\
    \ the conditions so that the print statements are **parallel** to the conditions\
    \ in cell 3. Finally, once more, we want to make sure we **test the code**. Thus,\
    \ first we re-run cell 1, making sure that the computer_pick is \"scissors\".\
    \ Then, we re-run cells 2 and 5, subsequently entering and testing for \"scissors\"\
    , \"rock\", and \"paper\".\n\nNote that we considered a **well-behaved player**,\
    \ that is, a player that enters rock, paper, or scissors correctly, without any\
    \ misspelling. We will assume that we are dealing with well-behaved players in\
    \ all coming chapters to focus on coding syntax and thinking. We will learn to\
    \ check for input correctness in Chapter 30.\n\nAt this point, the code is completed!\
    \ As coders, we have taken care of the various parts of the code, writing and\
    \ testing them. Now it's time to put all the code together for the player!"
  mdcn: "## 16. 石头剪刀布\n\n算法导论\n\n人人都知道石头剪刀布这个游戏！世界各地的孩子们都在玩这个起源于至少2000年前中国的游戏¹。在本章中，我们将学习如何用Python实现这个游戏。你会怎么做呢？在下面的练习中写下你的想法，并尝试编写自己的实现。然后，看看下面的计算解决方案，它也在Notebook\
    \ 16中实现。\n\n## 完成句子\n\n思考实现石头剪刀布所需的三个步骤，并将它们写在下面。考虑你将与电脑对战：它会随机选择布、石头或剪刀，你也会做同样的选择。谁会赢？\n\
    \n1. __________________________________________________________________________________.\n\
    2. __________________________________________________________________________________.\n\
    3. __________________________________________________________________________________.\n\
    \n## 1. 电脑选择\n\n第一步，电脑从布、石头和剪刀中选择。怎么做呢？让我们看看下面的代码。\n\n- 让电脑选择*石头*、*布*或*剪刀*：\n\n\
    ```python\nimport random\n\n# list of game possibilities\npossibilities = [\"\
    rock\", \"paper\", \"scissors\"]\n\n# computer random pick\ncomputer_pick = random.choice(possibilities)\n\
    print(computer_pick)\n```\n\n我们导入了上一章学过的`random`包（第1行）。然后，我们创建一个包含可能选择的列表——即三个字符串\"\
    rock\"、\"paper\"和\"scissors\"（第4行）。我们使用`random`包中的`.choice()`函数从`possibilities`列表中随机选择一个元素。最后，我们将选择保存在变量`computer_pick`中（第7行）并打印出来（第8行）。在这个例子中，`computer_pick`是`rock`。\n\
    \n¹https://en.wikipedia.org/wiki/Rock_paper_scissors\n\n## 2. 玩家选择\n\n第二步，轮到玩家从石头、布和剪刀中选择。让我们看看下面。\n\
    \n- 让玩家在*石头*、*布*或*剪刀*中选择：\n\n```python\n# asking the player to make their choice\n\
    player_choice = input(\"Rock, paper, or scissors?\")\nprint(player_choice)\n```\n\
    \n我们使用内置函数`input`让玩家在石头、布或剪刀中选择，并将选择保存在变量`player_choice`中（第2行）。然后，我们将其打印出来作为检查（第3行）。在我们的例子中，玩家选择了石头。\n\
    \n## 3. 确定谁赢\n\n是时候确定谁赢了！我们怎么做呢？电脑有三种可能的选择，玩家也是。因此，有九种可能的情况。我们如何编码它们而不遗漏任何一种？一种方法是定义三种情况，其中电脑的选择是固定的，而玩家的选择是变化的。让我们看看实现！\n\
    \n- 如果电脑选择*石头*：\n\n```python\nif computer_pick == \"rock\":\n    # compare to\
    \ the player's choice\n    if player_choice == \"rock\":\n        print(\"Tie!\"\
    )\n    elif player_choice == \"paper\":\n        print(\"You win!\")\n    else:\n\
    \        print(\"The computer wins!\")\n```\n\n我们从一个`if`条件开始，检查电脑的选择是否等于\"rock\"\
    （第1行）。然后我们评估玩家的选择。如果玩家的选择等于\"rock\"（第4行），那么我们打印平局（第5行）。如果玩家的选择等于\"paper\"（第6行），那么我们打印玩家赢（第7行）。最后，在剩余的情况——玩家的选择是\"\
    scissors\"——（第8行），我们打印电脑赢（第9行）。代码非常简单：一个`if`条件包含一个`if/elif/else`结构，语句中有打印。如你所见，我们**直接向玩家打印消息**，而不是向程序员。你可能记得，当我们编码时，我们交替戴两顶帽子：程序员帽子或玩家帽子（见第14页）。如果我们打印\"\
    玩家赢\"（第7行），我们是在告诉*程序员*代码有效。但如果我们打印*你赢了！*，我们是在和*玩家*说话，也就是我们为之编码的人！想想你玩电脑游戏的时候：你会收到什么样的消息？\n\
    \n在`if/elif/else`结构中，**测试所有条件**很重要。我们想确保所有语句都正确执行，正如我们在实现计算器（第13章）时提到的那样。\n\n\
    测试到底是什么意思？\n\n> **测试**意味着**评估和验证**代码是否**做了它应该做的事**\n\n我们如何在这个例子中测试代码？我们重新运行单元格2——我们让玩家在石头、布和剪刀中选择——两次：一次输入`paper`，一次输入`scissors`。每次运行后，我们重新运行单元格3以检查相应的打印输出是否正确。按照条件中出现的顺序输入字符串很重要：首先是`rock`，然后是`paper`，最后是`scissors`。**保持相同的顺序有助于我们确保测试所有条件**，而不会跳过任何一个。\n\
    \n有时测试与**调试**混淆，但它们是两个非常不同的概念。你可能多次听过**调试**这个词。它的确切含义是什么？\n\n> **调试**意味着**识别**并**移除**代码中的错误\n\
    \n调试有点像侦探工作。当我们收到错误消息，或者没有得到预期的结果时，我们需要理解错误**在哪里**，以便修复它。一种非常常见的调试方法是在每行代码之后**打印**变量，以检查它们被赋予的值。当变量值不是预期值时，那就是错误发生的地方！一旦我们找到错误，我们就可以修复它，然后继续编码。要更深入地理解为什么我们使用调试这个词，请阅读本章末尾的“更深入”部分。\n\
    \n让我们继续实现石头剪刀布，看看电脑选择的第二种可能性。\n\n- 如果电脑选择`paper`：\n\n```python\nif computer_pick\
    \ == \"paper\":\n    # compare to the player's choice\n    if player_choice ==\
    \ \"paper\":\n        print(\"Tie!\")\n    elif player_choice == \"scissors\"\
    :\n        print(\"You win!\")\n    else:\n        print(\"The computer wins!\"\
    )\n```\n\n代码的结构与前一个单元格相同：一个`if`条件（第1行）包含一个`if/elif/else`结构（第4-9行）。改变的是条件中的比较项——即字符串——我们检查电脑是否选择了\"\
    paper\"，并根据打印的消息更改玩家的条件。\n\n当我们编写具有重复结构的代码时——比如在我们的例子中——使用**平行结构**至关重要。什么是平行结构？\n\
    \n> **平行结构**意味着为后续的代码行或代码块保持**对应的结构**\n\n在我们的例子中，我们可以保持*条件*的顺序相同——例如，第一个比较项总是\"\
    rock\"，第二个总是\"paper\"，第三个总是\"scissors\"——或者我们可以保持*语句*的顺序相同——即，第一条消息总是\"Tie!\"\
    （单元格3和4的第5行），第二条总是\"You win!\"（两个单元格的第7行），第三条总是\"The computer wins!\"（两个单元格的第9行）。平行结构帮助我们记住在每个结构中**列出所有条件**，并提高代码的**可读性**。\n\
    \n再次，我们不要忘记**测试所有条件**。我们首先必须确保电脑选择的是布。由于我们只有三个选项，一个简单的方法是重新运行单元格1，直到我们得到我们需要的——即\"\
    paper\"。然后，我们重新运行单元格2和4三次，每次输入玩家选择并测试相应的打印，**按照**if/elif/else结构中的**相同顺序**。换句话说，首先我们在单元格2输入\"\
    paper\"，运行单元格4测试第4-5行。然后，我们在单元格2输入\"scissors\"，运行单元格4测试第6-7行。最后，我们在单元格2输入\"scissors\"\
    ，运行单元格4测试第8-9行。\n\n让我们最后看看第三种情况。\n\n- 如果电脑选择*剪刀*：\n\n```python\nif computer_pick\
    \ == \"scissors\":\n    # compare to the player's choice\n    if player_choice\
    \ == \"scissors\":\n        print(\"Tie!\")\n    elif player_choice == \"rock\"\
    :\n        print(\"You win!\")\n    else:\n        print(\"The computer wins!\"\
    )\n```\n\n在最后一种情况下，代码结构也类似：一个if条件（第1行）嵌套一个if/elif/else结构（第4-9行）。我们检查电脑是否选择了\"\
