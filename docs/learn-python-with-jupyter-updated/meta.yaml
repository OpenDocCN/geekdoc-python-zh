    \ there is quite a similarity between slicing a cake and slicing a list! In the\
    \ first case, you “extract” one or more cake slices for your guests—and yourself!\
    \ In the second case, you extract one or more list elements for subsequent lines\
    \ of code.\n\n- Let's meet the list we will slice:\n    ```\n    [1]: 1 cities\
    \ = [\"San Diego\", \"Prague\", \"Cape Town\", \"Tokyo\",\n    \"Melbourne\"]\n\
    \    2 print (cities)\n    ['San Diego', 'Prague', 'Cape Town', 'Tokyo', 'Melbourne']\n\
    \    ```\n    In this cell, there is a list called cities containing five strings:\
    \ \"San Diego\", \"Prague\", \"Cape Town\", \"Tokyo\", and \"Melbourne\" (line\
    \ 1), and we print it out (line 2).\n\nHow are we going to slice cities? The **syntax**\
    \ for slicing is very easy. It consists of the **list name followed by opening\
    \ and closing square brackets**, like this: cities[]. In between the square brackets,\
    \ we write the **positions of the elements** we want to slice. For this reason,\
    \ it's crucial to be aware of the positions of each element within a list. In\
    \ the list cities, the elements have the following positions:\n\n![](img/1e0d8bb8215d579da0d409223f09e364_58_0.png)\n\
    \nNow, how do we write element positions in between the square brackets? There\
    \ are various rules depending on how many elements we want to slice, where they\
    \ are, and in which direction we want to extract them. We are going to learn all\
    \ these rules in the coming pages.\n\nA last note before starting: to better learn\
    \ about slicing, I suggest this method. Every time you read a slicing task (for\
