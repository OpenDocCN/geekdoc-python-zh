    \ first executes line number 1, then line number 2, and so on, until the last\
    \ line of the cell is reached. In addition, in a string, **spaces matter**. Spaces\
    \ are *characters*, so a space is an element of a *string* and it takes its own\
    \ place. However, spaces do not matter between code elements. For example, the\
    \ two lines below are equivalent:\n\n```\n[5]:\n1 print (\"(__)___\")\n2 print(\
    \ \"(__)___\" )\n'(__)___'\n'(__)___'\n```\n\n## Part 1. Creating the basics\n\
    \nWhen writing code with some repetition, it is good practice to keep some **parallelism**\
    \ between the lines of code. Compare the code written in cell 5 as we did above,\n\
    \n```\n[]: 1 print (\"/\\_/\\  \")\n    2 print (\">^.^<  \")\n    3 print (\"\
    \  / \\  \")\n    4 print (\"(___)__ \")\n```\n\nto the same code written without\
    \ aligning closing quotes and closing round brackets, as below:\n\n```\n[]: 1\
    \ print (\"/\\_/\")\n    2 print (\">^.^<\")\n    3 print (\" / \")\n    4 print\
    \ (\"(___)__ \")\n```\n\nWe can see that in the second case the code looks somehow\
    \ more confusing. Instead, when we align quotes, brackets, and other symbols —\
    \ as you will see in the following chapters — we create code that is more **readable**\
    \ and **less prone to errors**. We will also talk quite a bit about tricks to\
    \ minimize the amount of possible errors that we might introduce in code.\n\n\
    One more question before the recap: where do we see the function `print()` in\
    \ action in everyday life? Every time we see a message on a device! For example:\
    \ ‘Registration completed’, or ‘Thank you for your purchase’, or ‘Logout successful’.\
    \ In the underlying code, there is a function similar to `print()`!\n\n## Recap\n\
    \n- The *type* **string** is text in between quotes\n- **input()** is a *built-in\
    \ function* to ask a user to enter a value\n- **print()** is a *built-in function*\
    \ to display a value to screen\n\n> **Our fingers have memory**\n\nWhen learning\
    \ to code, it is very important to **type every single command**, resisting the\
    \ temptation of copying/pasting. Typing helps us **memorize** commands in at least\
    \ two ways. First, when typing a command we mentally spell it, so we repeat it\
    \ in our minds, and thus we memorize it. Second, our fingers can memorize typing\
    \ patterns. For example, when typing `print()`, our fingers will automatically\
    \ remember to type the round brackets right after `print`. Similarly to a pianist\
    \ who does not look at the keyboard but at the sheet music while playing, we want\
    \ to look not at the keyboard but at the screen while coding. This way of typing\
    \ is called **touch typing** (or blind typing). It helps us be faster and **minimize\
    \ the amount of errors** we make because we do not have to keep moving our eyes\
    \ between the keyboard and the screen. How can we learn *touch typing*? It is\
    \ very easy; it just requires some practice. The idea is that each finger presses\
    \ some specific keys of the keyboard, as in the figure in the next page. We position\
    \ the left index finger on the letter F and the right index finger on the letter\
