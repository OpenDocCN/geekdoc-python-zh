    Once more, we start with the empty list flat_instruments (line 1). We write a
    for loop through elements to browse the sub-lists (line 2). We concatenate each
    sub-list to flat_instruments (line 3)—the corresponding explicit command is flat_instruments
    = flat_instruments + group. Finally, we print flat_instruments (line 4). The advantage
    of this method is that we use only one for loop. As you might remember, for loops
    are computationally expensive—in terms of memory and time—and it is good practice
    to minimize their use.


    +   - Flatten the list using list comprehension:


    ```

    [11]:

    1 instruments = [instrument for group in instruments for instrument in group]

    2 print (instruments)

    [''contrabass'', ''cello'', ''clarinet'', ''gong'', ''guitar'', ''tambourine'',
    ''trumpet'',

    ''trombone'', ''triangle'']

    ```


    As you might remember from the previous Chapter, when using list comprehension
    we do not need to create a new list, but we can directly modify the current one—which
    is instruments in this example. In the list comprehension, we write: (1) what
    we want to add to the list, which is instrument; (2) the header of the outer for
    loop, that is, for group in instruments; and (3) the header of the inner for loop,
    which is for instrument in group) (line 1). Note that within the list comprehension
    we can use a nested for loop through elements because we do not need element positions.
    Finally, we print the result (line 2).


