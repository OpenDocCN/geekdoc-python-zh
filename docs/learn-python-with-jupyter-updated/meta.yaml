    \n## 3. Flattening\n\n**Flattening means transforming a list of lists into a list.**\
    \ In other words, we take the sub-elements out of their sub-lists and we put them\
    \ in a list. There are many ways of doing this operation. We are going to see\
    \ four different ways, but there can be more. For each way, try to implement it\
    \ yourself first, and then look into the example and explanation below.\n\n- Given\
    \ the following list of lists:\n\n```\n[7]: 1 instruments = [[\"contrabass\",\
    \ \"cello\", \"clarinet\"], [\"gong\", \"guitar\"], [\"tambourine\", \"trumpet\"\
    , \"trombone\", \"triangle\"]]\n    instruments is assigned contrabass, cello,\
    \ clarinet, gong, guitar, tambourine, trumpet, trombone, triangle\n```\n\n- Flatten\
    \ the list using a nested for loop through *indices*:\n\n```\n[8]: 1 flat_instruments\
    \ = []\n    flat instruments is assigned empty list\n    2 for i in range(len(instruments)):\n\
    \    for i in range len instruments\n    3     for j in range(len(instruments[i])):\n\
    \    for j in range len instruments in position i\n    4         flat_instruments.append(instruments[i][j])\n\
    \    flat instruments dot append instruments in position i in position j\n   \
    \ 5 print (flat_instruments)\n    print flat instruments\n    ['contrabass', 'cello',\
    \ 'clarinet', 'gong', 'guitar', 'tambourine', 'trumpet', 'trombone', 'triangle']\n\
    ```\n\nWe start with the empty list flat_instruments, which we are going to fill\
    \ out during the subsequent nested for loop (line 1). Then, for each position\
    \ in the list of lists (line 2) and each position in each sub-list (line 3), we\
    \ append the current sub-element instruments[i][j] to flat_instruments (line 4).\
    \ Finally, we print the final list (line 5). As you can notice, we flattened instruments,\
    \ that is, we transform a list of lists into a list whose elements were instruments's\
    \ sub-elements.\n\n- Flatten the list using a nested for loop through *elements*:\n\
    \n```\n[9]: 1 flat_instruments = []\n    flat instruments is assigned empty list\n\
    \    2 for group in instruments:\n    for group in instruments\n    3     for\
    \ instrument in group:\n    for instrument in group\n    4         flat_instruments.append(instrument)\n\
    \    flat instruments dot append instrument\n    5 print (flat_instruments)\n\
    \    print flat instruments\n    ['contrabass', 'cello', 'clarinet', 'gong', 'guitar',\
    \ 'tambourine', 'trumpet', 'trombone', 'triangle']\n```\n\nSimilarly to the previous\
    \ example, we start with the empty list flat_instruments (line 1). We browse the\
    \ sub-lists using the *outer* for loop (line 2), and within each sub-list, we\
    \ browse the sub-elements using the *inner* for loop (line 3). We append the current\
    \ sub-element to flat_instruments (line 4). Finally, we print the obtained flattened\
    \ list (line 5).\n\n- Flatten the list using a for loop and list concatenation:\n\
    \n```\n[10]:\n1 flat_instruments = []\n2 for group in instruments:\n3     flattened\
    \ += group\n4 print (flat_instruments)\n['contrabass', 'cello', 'clarinet', 'gong',\
    \ 'guitar', 'tambourine', 'trumpet',\n'trombone', 'triangle']\n```\n\nOnce more,\
    \ we start with the empty list flat_instruments (line 1). We write a for loop\
    \ through elements to browse the sub-lists (line 2). We concatenate each sub-list\
    \ to flat_instruments (line 3)—the corresponding explicit command is flat_instruments\
    \ = flat_instruments + group. Finally, we print flat_instruments (line 4). The\
    \ advantage of this method is that we use only one for loop. As you might remember,\
    \ for loops are computationally expensive—in terms of memory and time—and it is\
    \ good practice to minimize their use.\n\n- Flatten the list using list comprehension:\n\
    \n```\n[11]:\n1 instruments = [instrument for group in instruments for instrument\
    \ in group]\n2 print (instruments)\n['contrabass', 'cello', 'clarinet', 'gong',\
    \ 'guitar', 'tambourine', 'trumpet',\n'trombone', 'triangle']\n```\n\nAs you might\
    \ remember from the previous Chapter, when using list comprehension we do not\
    \ need to create a new list, but we can directly modify the current one—which\
    \ is instruments in this example. In the list comprehension, we write: (1) what\
    \ we want to add to the list, which is instrument; (2) the header of the outer\
    \ for loop, that is, for group in instruments; and (3) the header of the inner\
    \ for loop, which is for instrument in group) (line 1). Note that within the list\
    \ comprehension we can use a nested for loop through elements because we do not\
    \ need element positions. Finally, we print the result (line 2).\n\n## Recap\n\
    \n- Lists of lists are lists with lists as elements.\n- When slicing, we use two\
    \ pairs of square brackets. In the first pair, we write the position of the sub-list\
    \ to slice; in the second pair, we write the position of the sub-element(s).\n\
    - We can use nested for loops to browse sub-elements.\n- We can flatten a list\
    \ of lists with a nested for loop, a for loop combined with concatenation, or\
    \ a list comprehension.\n\n## Lists of lists and images\n\nYou surely know that\
    \ digital images are composed of pixels, that is, small colorful squares organized\
    \ in a grid. We can think of the grid as a list of lists where each sub-element\
    \ corresponds to a pixel of a specific color. Let’s consider the following figure:\n\
    \n![](img/1e0d8bb8215d579da0d409223f09e364_214_0.png)\n\nEach black square corresponds\
    \ to a pixel containing 0, and each white square corresponds to a pixel containing\
    \ 1. Thus, the first (and the third) row of the checkerboard is represented by\
    \ the sub-list [0, 1, 0, 1, 0], and the second (and the fourth) row is represented\
    \ by the sub-list [1, 0, 1, 0, 1]. The last row of the checkerboard contains pixels\
    \ colored with various shades of grey. Each pixel corresponds to a decimal (float)\
    \ number. Darker greys are closer to 0 (that is, to black), whereas brighter greys\
    \ are closer to 1 (that is, to white).\n\nWhat about digital colored images? Each\
    \ pixel is encoded by an RGB list composed of three numbers, each representing\
    \ a different color: the first number is for the red (R) component, the second\
    \ number for the green (G) component, and the third number for the blue (B) component.\n\
    \nLet’s have a look at the figure below.\n\n![](img/1e0d8bb8215d579da0d409223f09e364_214_1.png)\n\
    \nEach pixel is represented by a sub-list composed of three numbers. For example,\
    \ the top left pixel is red and is represented by the sub-list [255, 0, 0], where\
    \ 255 represents the amount of red, the first 0 is for the amount of green, and\
    \ the second 0 is for the amount of blue. Each row is a list of lists, enclosed\
    \ in a list of lists of lists! Finally, note that for both greyscale and colored\
    \ images, the range of the numbers defining the color can go from 0 to 1 or from\
    \ 0 to 255."
