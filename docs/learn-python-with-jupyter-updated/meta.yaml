    \ = [\"eat\", \"drink\", \"eats\", \"sleep\", \"drinks\", \"sleeps\"]\n    ```\n\
    \    and you help your students separate the verbs between third person and other\
    \ persons.\n\n2. *Desserts.* Given the following list:\n    ```python\n    desserts\
    \ = [\"meringue\", \"apple pie\", \"eclair\", \"rice pudding\", \"chocolate\"\
    ,\n    \"english pudding\", \"cake\", \"icing\"]\n    ```\n    Get all the initials,\
    \ change them to uppercase, and concatenate them in a new list. Then invert the\
    \ list. What dessert do you get?\n\n3. *Guess the jobs.* Given the following list:\n\
    \    ```python\n    jobs = [\"photog\", \"bal\", \"mu\", \"inve\", \"ambas\",\
    \ \"si\", \"ler\", \"stig\", \"rapher\", \"ci\",\n    \"ator\", \"ina\", \"an\"\
    , \"sador\"]\n    ```\n    Group strings composed of 2, 3, 4, 5, and 6 letters\
    \ in new lists. What jobs do you get? Make sure that the first letter of each\
