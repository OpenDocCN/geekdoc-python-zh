    :\n    ```\n    [2]:\n    1 print (cities[1])\n    'Prague'\n    print cities\
    \ in position one\n    ```\n    In this cell, we slice (or access) \"Prague\"\
    , which is in position 1, and we print it. As you can see, when we slice **one\
    \ single element** from a list, we write the position of the element itself in\
    \ between the square brackets. Thus, we can summarize this syntax as **list_name[element_position]**,\
    \ and we can read it as *list name in position element position*.\n\n    Note:\
    \ For simplicity, in this example and those that follow, we just print the sliced\
    \ elements. However, one could assign a sliced element to a variable, like this:\n\
    \    ```\n    [2]:\n    1 sliced_city = cities[1]\n    2 print (sliced_city)\n\
    \    'Prague'\n    sliced_city is assigned cities in position one\n    print sliced_city\n\
    \    ```\n    We will assign sliced list elements to variables in the following\
    \ chapters. For now, let's focus on understanding how slicing works!\n\n2. Slice\
    \ the cities from \"Prague\" to \"Tokyo\":\n    ```\n    [3]:\n    1 print (cities[1:4])\n\
    \    ['Prague', 'Cape Town', 'Tokyo']\n    print cities in positions from one\
    \ to four\n    ```\n    In this cell, we slice and print three consecutive elements—\"\
    Prague\", \"Cape Town\", and \"Tokyo\"—that are at positions 1, 2, and 3, respectively.\
    \ In between the square brackets, we write two numbers, separated by a colon :.\
    \ The first number is the position of the *first* element we want to slice, and\
    \ we call it **start**. In this case, the start is 1, which corresponds to \"\
    Prague\". The second number is the position of the *last* element we want to slice,\
    \ to which we must add 1. We call it **stop**. The stop always follows the **plus\
    \ one rule**, which simply says that **we must add 1 to the position of the last\
    \ element we want to slice** (you can learn the reasoning behind this rule in\
    \ the *in more depth* section at the end of this chapter). In this example, the\
    \ position of the last element (\"Tokyo\") is 3, to which we must add 1 because\
    \ of the plus one rule, so the stop is 4. We can summarize the syntax to slice\
    \ consecutive elements as **list_name[start:stop]**, and we can read it as *list\
    \ name in positions from start to stop*.\n\n3. Slice \"Prague\" and \"Tokyo\"\
    :\n    ```\n    [4]:\n    1 print (cities[1:4:2])\n    ['Prague', 'Tokyo']\n \
    \   print cities in positions from one to four with a step of two\n    ```"
