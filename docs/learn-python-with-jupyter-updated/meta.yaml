    Let''s see what happens at each loop:


    +   - First loop (i==0): before the if, the list is complete ["ciao", "ciao",
    "hello"] (line (c)). After the if, greetings contains only ["ciao", "hello"] (line
    (e)). Three changes happened: (1) the string "ciao" in position 0 (in orange in
    the figure below) is removed; (2) the element indices restarted from 0, changing
    the positions of the remaining elements (that is, the green "ciao" was in position
    1 before the if and moved to position 0 after the if, and the string "hello" was
    in position 2 before the if and moved to position 1 after the if); and (3) the
    length of the list changed from 3 to 2. The changes (2) and (3) will have consequences
    in the second and third loops.


    ![](img/1e0d8bb8215d579da0d409223f09e364_194_0.png)


    Change of list content, element positions, and list length after deletion of a
    list element.


    +   - Second loop (i==1): before the if, the list is the same as it was at the
    end of the previous loop, that is ["ciao", "hello"] (line (i)). And after the
    if, the list remains the same (k) because the current element greetings[1], that
    is, "hello", does not satisfy the if condition. Why wasn''t the string "ciao"
    in position 0 (green in the figure above) deleted? The change of list index in
    the previous loop moved "ciao" from position 1 to position 0, so we skip its deletion
    because we are currently at the second iteration of the for loop!


    +   - Third loop (i==2): before the if, the list is still ["ciao", "hello"] (line
    (0)). Than, we get an index error at line 6 of the code, where the if conditions
    is. This is because i is now 2, but greetings[2] does not exist because we shortened
    the list when we deleted the first "ciao" in the first loop. Thus, the error “out
    of range” is due to a failed attempt to slice the list greetings in position 2,
    which does not exist! Note that the index i is currently 2 because in the header
    of the for loop (line 2), we stated that i goes from 0 to the length of the list
    (len(greetings)), which is the initial list length and does not adapt to length
    changes during the loop!


    In conclusion, by using a for loop to delete an element in a list, we can cause
    two errors: (1) we **skip list elements** that we should delete because of the
    index shift, and (2) we get **out of range errors** related to the index because
    we shorten the list by removing some elements.'
