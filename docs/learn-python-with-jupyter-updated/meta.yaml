    ```


    for index in range from zero to four

    print index: concatenated with string of index

    print friend: concatenated with friends in position index


    The code prints the position and the value of each list element by repeating lines
    2 and 3 four times. How does this happen? Let''s start from line 1, which is the
    header of the for loop. It consists of five components:


    +   - **for**: The keyword starting a for loop. Like all keywords, it is bold
    green in Jupyter Notebook.

    - **index**: A variable that is assigned a different value at each loop iteration
    (we''ll talk more about this in a bit).

