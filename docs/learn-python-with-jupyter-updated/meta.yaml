    Let''s now zoom out and observe the procedure we use to implement the game. We
    first defined three steps (see the exercise *Complete the sentences*). Then, we
    implemented each step separately (see paragraphs 1. *Computer pick*, 2. *Player
    choice*, and 3. *Determine who wins*). Finally, we merged all the code together
    and edited it (see *Merging the code*). This way of approaching a task is called
    *divide and conquer*.


    > **Divide and conquer** means **dividing** a project into **sub-projects**, **solving**
    the sub-projects, and **combining the solutions** of the sub-projects to obtain
    the solution of the original project


    In other words, there are three steps to solve a computational (but not strictly
    computational!) task:


    +   1. Break the project into subprojects

    2. Solve the subprojects separately

    3. Merge the solutions of the subprojects to obtain the solution of the whole
    project


    Last but not least, let''s talk about algorithms! You have surely heard this word
    many times. What is an algorithm?


    > An **algorithm** is a **sequence of rigorous steps** to **execute and complete
    a task**


    Algorithms are just procedures to solve tasks, problems, or assignments. They
    do not have to be complicated. They can actually be pretty simple. There are plenty
    of algorithms in everyday life! Think about the sequence of steps you make to
    brush your teeth: taking the toothpaste tube, opening and squeezing it, placing
    toothpaste on the toothbrush, etc. This is an algorithm! Or think about cooking
    recipes, especially printed recipes. At the top, there is a list of ingredients
    (e.g., 2 carrots, 3 onions), which are the variables (e.g., carrots = 2, onions
    = 3). Then, there is the execution of the recipe, that is, the steps to process
    the ingredients into the final dish. In programming, many algorithms have been
    developed in the past few decades. The most famous algorithms were designed to
    sort lists, find prime numbers, find elements in a list, etc. We will not look
    into them in this book, but you can find plenty of examples and explanations in
    more advanced books and on the internet.'
