    # Part 6. Focus on lists and for loops


    first instinctive idea might be to use a for loop that goes through all element
    positions and removes the unwanted elements based on a certain condition (in this
    case, remove the element if it is equal to "ciao"). However, this solution does
    not work for the reasons explained in the *In more depth* section at the end of
    this Chapter. What we need is a while loop:


    ```

    [16]:

    1  greetings = ["ciao", "ciao", "hello"]

    2  while "ciao" in greetings:

    3      greetings.remove("ciao")

    4  print (greetings)

    [''hello'']

    ```


    We start with the list greetings (line 1), then we create a while loop where as
    long as the string "ciao" is in greetings (line 2), we remove it using the method
    .remove() (line 3). Finally, we print the result (line 4).


    Let''s continue to see how to remove an element based on its position and all
    elements in a list. In the following two cells (17 and 18), we write the list
    at line 1, and we print the result at line 3. At line 2, we use a different list
    method. Let''s have a look at the examples:


    +   - Remove the string "hello" based on its position:


    ```

    [17]:

    1  greetings = ["ciao", "ciao", "hello"]

    2  greetings.pop(2)

    3  print (greetings)

    [''ciao'', ''ciao'']

    ```


    To remove an element based on its position, we use the method .pop(), which we
    learn in Chapter 5 (line 2). As you might remember, **the argument of the method
    is the position of the element to delete.**


    +   - Remove all elements in a list:


    ```

    [18]:

    1  greetings = ["ciao", "ciao", "hello"]

    2  greetings.clear()

    3  print (greetings)

    []

    ```


    To remove all elements in a list, we use the method .clear() (line 2). The list
    **becomes an empty list.**


    Another way to remove elements in a list is by using list comprehension. We will
    see it in the next chapter.


