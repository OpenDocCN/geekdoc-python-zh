    # Case 2: Changing the element only in the new list.


    Consider the following code:


    ```

    [3]:

    1 current_sport = sports[1].upper()

    2 mountain_sports.append(current_sport)

    3 print(sports)

    4 print(mountain_sports)

    [''diving'', ''hiking'']

    [''CLIMBING'', ''HIKING'']

    ```


    In this example, we assign the transformed element—that is, ''HIKING'', created
    with the command sports[1].upper()—to a new variable. This new variable is current_sport(line
    1). Then, we append the variable current_sport to the list mountain_sports (line
    2). When we print out both lists (lines 3 and 4), we see that "HIKING" is only
    in the list mountain_sports. We can call current_sport an **intermediary**, **auxiliary**,
    or **temporary** variable. Its role is to temporarily store a value that we will
    use in subsequent code. Although they are very convenient, temporary variables
    are generally not recommended because they occupy computer memory. Can we avoid
    using current_sport? Yes, let''s have a look at this last example:


    ```

    [3]:

    1 mountain_sports.append(sports[1].upper())

    2 print(sports)

    3 print(mountain_sports)

    [''diving'', ''hiking'']

    [''CLIMBING'', ''HIKING'']

    ```


    In this final example, there is a **nested command**, which is a command containing
    one or more commands, like in a Russian doll (line 1). To break down nested commands,
    we usually start from the inner command and move outwards. In this example, the
    inner command is sports[1].upper(), where we modify the string ''hiking'' to be
    uppercase. The outer command is mountain_sports.append(), where we add the modified
    element—that is, ''HIKING''—to the list. As you can see, the inner command is
    what we assigned to the variable current_sport in the previous example. Therefore,
    we can avoid a temporary variable by directly substituting its content in a nested
    command. Finally, when we print out both lists (lines 2 and 3), we see that we
    changed "hiking" to uppercase only in the list mountain_sports.


    Nested commands are a convenient way to write compact code. How many commands
    can we nest into each other? Theoretically, as many as we want! In practice, we
    want to keep nested commands to a minimum for a good balance between code efficiency
    and code readability.'
