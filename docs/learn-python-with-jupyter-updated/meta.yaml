    # Part 6. Focus on lists and for loops


    +   - Flatten the list using a for loop and list concatenation:


    ```

    [10]:

    1 flat_instruments = []

    2 for group in instruments:

    3     flattened += group

    4 print (flat_instruments)

    [''contrabass'', ''cello'', ''clarinet'', ''gong'', ''guitar'', ''tambourine'',
    ''trumpet'',

    ''trombone'', ''triangle'']

    ```


    Once more, we start with the empty list flat_instruments (line 1). We write a
    for loop through elements to browse the sub-lists (line 2). We concatenate each
    sub-list to flat_instruments (line 3)—the corresponding explicit command is flat_instruments
    = flat_instruments + group. Finally, we print flat_instruments (line 4). The advantage
    of this method is that we use only one for loop. As you might remember, for loops
    are computationally expensive—in terms of memory and time—and it is good practice
    to minimize their use.


    +   - Flatten the list using list comprehension:


    ```

    [11]:

    1 instruments = [instrument for group in instruments for instrument in group]

    2 print (instruments)

    [''contrabass'', ''cello'', ''clarinet'', ''gong'', ''guitar'', ''tambourine'',
    ''trumpet'',

    ''trombone'', ''triangle'']

    ```


    As you might remember from the previous Chapter, when using list comprehension
    we do not need to create a new list, but we can directly modify the current one—which
    is instruments in this example. In the list comprehension, we write: (1) what
    we want to add to the list, which is instrument; (2) the header of the outer for
    loop, that is, for group in instruments; and (3) the header of the inner for loop,
    which is for instrument in group) (line 1). Note that within the list comprehension
    we can use a nested for loop through elements because we do not need element positions.
    Finally, we print the result (line 2).


    # Recap


    +   - Lists of lists are lists with lists as elements

    - When slicing, we use two pairs of square brackets. In the first pair, we write
    the position of the sub-list to slice; in the second pair, we write the position
    of the sub-element(s)

    - We can use nested for loops to browse sub-elements

    - We can flatten a list of lists with a nested for loop, a for loop combined with
    concatenation, or a list comprehension'
  - '[PAGE 214]


    # Lists of lists and images


    You surely know that digital images are composed of pixels, that is, small colorful
    squares organized in a grid. We can think of the grid as a list of lists where
    each sub-element corresponds to a pixel of a specific color. Let’s consider the
    following figure:


    ![](img/1e0d8bb8215d579da0d409223f09e364_214_0.png)


    Each black square corresponds to a pixel containing 0, and each white square corresponds
    to a pixels containing 1. Thus, the first (and the third) row of the checkerboard
    is represented by the sub-list [0, 1, 0, 1, 0], and the second (and the fourth)
    row is represented by the sub-list [1, 0, 1, 0, 1]. The last row of the checkerboard
    contains pixels colored with various shades of grey. Each pixel corresponds to
    a decimal (float) number. Darker greys are closer to 0 (that is, to black), whereas
    brighter greys are closer to 1 (that is, to white).

    What about digital colored images? Each pixel is encoded by an RGB list composed
    of three numbers, each representing a different color: the first number is for
    the red (R) component, the second number for the green (G) component, and the
    third number for the blue (B) component.

    Let’s have a look at the figure below.


    ![](img/1e0d8bb8215d579da0d409223f09e364_214_1.png)


    Each pixel is represented by a sub-list composed of three numbers. For example,
    the top left pixel is red and is represented by the sub-list [255, 0, 0], where
    255 represents the amount of red, the first 0 is for the amount of green, and
    the second zero 0 is for the amount of blue. Each row is a list of lists, enclosed
    in a list of lists of lists! Finally, note that for both greyscale and colored
    images, the range of the numbers defining the color can go from 0 to 1 or from
    0 to 255.'
