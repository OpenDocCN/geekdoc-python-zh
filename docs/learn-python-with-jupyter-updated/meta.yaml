    shelf_a and shelf_s as empty lists? Because it would be impossible to add new
    elements to a list that does not exist!


    As a general rule, **when using a for loop to create and fill an empty list, we
    have to:**


    +   1. Initialize an empty list before the for loop

    2. Concatenate or append new elements within the for loop


