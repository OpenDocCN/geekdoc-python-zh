  md: "+   - **range()**: A built-in Python function. You can recognize this as a\
    \ function because it is followed by round brackets and is colored green in Jupyter\
    \ Notebook—like `input()` and `print()`. We'll talk more about `range()` in a\
    \ bit too.\n- **:** that is, the colon punctuation.\n\nTo better understand what\
    \ this line does, let's begin from the built-in function `range()`. It takes two\
    \ arguments: 0 and 4. They are two integers that we can call—guess what?—start\
    \ and stop! So, what does `range()` do? Create a separate cell in the notebook,\
    \ and then write and run the following code:\n\n```\n[4]: 1 list(range (0,4))\n\
    \     [0,1,2,3]\n```\n\nThe built-in function `range()` returns a sequence of\
    \ integers spanning from the start (included) to the stop (excluded because of\
    \ the plus one rule). In this example, the integers go from 0 to 3, and—guess\
    \ what again?—they correspond to the indices of the elements of the list `friends`!\
    \ Why is there `list()`? This is another built-in function that we write here\
    \ for a proper print out. Don't worry too much about it for now. Let's focus on\
    \ understanding the for loop!\n\nWhat do we do with the list of integers created\
    \ by `range()`? We assign them to the variable `index`! At each code repetition—or\
    \ **loop**, or **iteration**—`index` is subsequently assigned a number created\
    \ by `range()`. That is, in the first loop, `index` is assigned 0; in the second\
    \ loop, `index` is assigned 1; and so on. We could call the variable `index` any\
    \ name—for example, `loop_id`, `iteration_number`. However, it is convention to\
    \ call it `index`, so we will adopt it. Now, what can we do with the variable\
    \ `index`? At least two things!\n\nFirst, we can print `index` **to keep track\
    \ of which loop is getting executed**, like we do at line 2. In the first loop,\
    \ `index` is assigned 0, so we print \"index: 0\". In the second loop, `index`\
    \ is assigned 1, so we print \"index: 1\"—and so on. Why is `str()` here? Because\
    \ we can concatenate only strings with strings, and `index` is an integer! So,\
    \ we need to change the variable type of `index` from integer to string. And to\
    \ do that, we can use the built-in function `str()`, which **transforms a variable\
    \ into a string**.\n\nSecond, we can use `index` **to automatically slice list\
    \ elements one by one**. As you now know, `index` changes at every iteration,\
    \ and it can be assigned values that go from the beginning of a list—that is,\
    \ 0—to the end of a list—in this case 3. Let's look at line 3 of the cell above.\
    \ In the first loop, when `index` is assigned 0, `friends[index]` is the same\
    \ as `friends[0]`—that is, \"Geetha\". In the second loop, when `index` is assigned\
    \ 1, `friends[index]` is the same as `friends[1]`, i.e., \"Luca\". And so on.\n\
    \nThe lines below the header—in this example, lines 2 and 3—are called the **body**\
    \ of the for loop. They are always **indented**, and there can be as many as we\
    \ want. They get executed for a number of times determined by the sequence of\
    \ numbers created by the function `range()`."
