    # Part 6. Focus on lists and for loops


    # 2.2 For loop through elements


    Let''s learn the first new way of implementing the for loop: the for loop through
    *elements*. Read the example below and try to understand what it does:


    +   - Capitalize each string using a for loop through *elements*:


    ```

    [3]:

    1  last_names = ["garcia", "smith", "zhang"]

    2  last_names_upper = []

    3

    4  for last_name in last_names:

    5      print ("The current element is " + last_name)

    6      last_names_upper.append(last_name.title())

    7

    8  print (last_names_upper)

    The current element is: garcia

    The current element is: smith

    The current element is: zhang

    [''Garcia'', ''Smith'', ''Zhang'']

    ```


    As in the previous example, we start with the list to modify (line 1). We continue
    with a new empty list called `last_names_upper` that we will fill within the loop
    (line 2). Then, we create the for loop through elements (lines 4–6). The syntax
    of the header is: (1) the keyword `for`; (2) a variable; (3) the membership operator
    `in`; and (4) the list to browse. There are two differences with respect to the
    for loop through indices. First, the **variable in position (2)** is not named
    `index` or `i`, but it is usually called with the singular version of the list
    name—that is, if the list name is `last_names`, then the variable name is `last_name`;
    if the list name is `numbers`, then the variable name is `number`; and so on.
    This is not a rule but a useful convention among Python coders. The second difference
    is that we directly use the **list itself**—that is, `last_names`—in position
    (4), instead of `range(len(last_names))`. Let''s now focus on the loop body. First,
    we print the current element `last_name` (line 5). As you may notice, there is
    no slicing (that is, no `[i]`). This is because in a for loop through elements,
    **the variable in position (2)**—that is, `last_name`—**automatically browses
    list elements one after the other, without knowing their position**. This is the
    opposite of what happens in a for loop through *indices*, where the variable in
    position (2)—that is, `i`—browses list positions without knowing the corresponding
    elements; to get an element, we must use slicing (e.g., `last_name[i]`). See a
    schematic of the difference between the two loops in the following figure.


    ![](img/1e0d8bb8215d579da0d409223f09e364_199_0.png)'
