    \n## 3. 扁平化\n\n**扁平化意味着将列表的列表转换为一个列表。** 换句话说，我们把子元素从它们的子列表中取出来，放入一个列表中。实现这个操作的方法有很多。我们将看到四种不同的方法，但可能还有更多。对于每种方法，先尝试自己实现，然后再查看下面的示例和解释。\n\
