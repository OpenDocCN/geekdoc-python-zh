    Finally, lines 1 and 4 start with the **hash symbol** (#) and are followed by
    text. These lines are called **comments**. What are they? Let''s give a definition:


    > **Comments** are code descriptions or explanations.


    Comments are a **fundamental component** of coding. They can contain **descriptions**
    of the code, or **explanations** about why we made a certain coding choice, or
    any other **information** that is relevant to understand the code they refer to.
    Comments are in light green in Jupyter Notebook, and they are above and aligned
    with the line/s they explain. For example, the comment at line 4 refers to the
    code at line 5, so it is indented and aligned with line 5. You might wonder why
    we write comments. For at least two reasons. First reason: **to make code readable**
    for us and others. When reading old code, we rarely remember why we wrote what
    we wrote—yes, even if we wrote it ourselves! Similarly, when we read somebody
    else''s code, it is often hard to understand what they did and why, if the code
    is not well commented. Second reason: **to keep track of what we are doing**.
    When writing code, we sometimes concentrate on small details and lose the big
    picture. In these cases, we can end up asking ourselves: why am I writing this
    again? Using comments to outline code can help us keep track of the steps we have
    to **implement**—that is, to write. Finally, how do we write useful comments?
    That''s simple: **use precise language**. Writing # here is a for loop does not
    add any information to code because a loop is clearly visible. It is more meaningful
    to describe what the for loop does and why; for example, # using a for loop to
    browse a list and print out its elements one by one. Also, don''t take any line
    of code for granted. It''s really so easy to forget why we wrote that line of
    code that way! In general, remember that **comments are written for human beings**,
    not for Python. As a matter of fact, Python skips comments when it reads our code.
    Try to add an hash front of a line of code yourself: Python is not going to execute
