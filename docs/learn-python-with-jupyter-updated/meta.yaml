    # Part 2. Introduction to lists and if/else constructs


    A last note before starting: to better learn about slicing, I suggest this method.
    Every time you read a slicing task (for example: Slice "Prague"), cover the following
    code with a piece of paper. Try to guess the code, and compare your guess with
    the solution. Then carefully read the explanation. Make sure you fully understand
    the current example before proceeding to the next one. Enough words, time to slice!


    1. Slice "Prague":


    ```

    [2]:

    1 print (cities[1])

    ''Prague''

    print cities in position one

    ```


    In this cell, we slice (or access) "Prague", which is in position 1, and we print
    it. As you can see, when we slice **one single element** from a list, we write
    the position of the element itself in between the square brackets. Thus, we can
    summarize this syntax as **list_name[element_position]**, and we can read it as
    *list name in position element position*.


    Note: For simplicity, in this example and those that follow, we just print the
    sliced elements. However, one could assign a sliced element to a variable, like
    this:


    ```

    [2]:

    1 sliced_city = cities[1]

    2 print (sliced_city)

    ''Prague''

    sliced_city is assigned cities in position one

    print sliced_city

    ```


    We will assign sliced list elements to variables in the following chapters. For
    now, let''s focus on understanding how slicing works!


    2. Slice the cities from "Prague" to "Tokyo":


    ```

    [3]:

    1 print (cities[1:4])

    [''Prague'', ''Cape Town'', ''Tokyo'']

    print cities in positions from one to four

    ```


    In this cell, we slice and print three consecutive elements—"Prague", "Cape Town",
    and "Tokyo"—that are at positions 1, 2, and 3, respectively. In between the square
    brackets, we write two numbers, separated by a colon :. The first number is the
    position of the *first* element we want to slice, and we call it **start**. In
    this case, the start is 1, which corresponds to "Prague". The second number is
    the position of the *last* element we want to slice, to which we must add 1. We
    call it **stop**. The stop always follows the **plus one rule**, which simply
    says that **we must add 1 to the position of the last element we want to slice**
    (you can learn the reasoning behind this rule in the *in more depth* section at
    the end of this chapter). In this example, the position of the last element ("Tokyo")
    is 3, to which we must add 1 because of the plus one rule, so the stop is 4. We
    can summarize the syntax to slice consecutive elements as **list_name[start:stop]**,
    and we can read it as *list name in positions from start to stop*.


    3. Slice "Prague" and "Tokyo":


    ```

    [4]:

    1 print (cities[1:4:2])

    [''Prague'', ''Tokyo'']

    print cities in positions from one to four with a step of two

    ```'
- md: 'In this case, we want to slice and print two non-consecutive elements—"Prague"
    and "Tokyo"—which are at positions 1 and 3, respectively. In the code above, you
    might recognize that 1 is the start, 4 is the stop (because of the plus-one rule),
    and 2? That is the **step**! As you can see, "Tokyo" is positioned 2 steps after
    "Prague": there is 1 step from "Prague" to "Cape Town", and 1 step from "Cape
    Town" to "Tokyo", for a total of 2 steps. Therefore, the syntax to slice **non-consecutive
    elements** is an extension of the rule we saw in the example above: **list_name[start:stop:step]**,
    which you can read as *list name from start to stop with step*. We can call it
    the **three-s rule**, where the three s''s are the initials of start, stop, and
    step, respectively.


    The most convenient aspect of the three-s rule is that we can simplify it in several
    situations. For example, you might wonder: why didn''t we write the step in the
    example 2, where we sliced the cities from "Prague" to "Tokyo"? Because **when
    elements are consecutive, the step is 1**—"Cape Town" is 1 step after "Prague",
    and "Tokyo" is 1 step after "Cape Town"—and when the step is 1 we can simply omit
    it. Obviously, we could have written the code specifying the step as follows:


    ```

    [3]: 1 print (cities[1:4:1])

    [''Prague'', ''Cape Town'', ''Tokyo'']

    ```


    However, adding the step here is a redundancy, so we simply avoid it.


    4. Slice the cities from "San Diego" to "Cape Town":


    ```

    [5]: 1 print (cities[0:3])

    [''San Diego'', ''Prague'', ''Cape Town'']

    ```


    Here we have to slice consecutive elements. So, we specify the start, which is
    0 for "San Diego", and the stop, which is 3 for "Cape Town", but we can omit the
    step because it is 1. Interestingly, in this case we can simplify the three-s
    rule even more! Because the **start** coincides with the **first element of the
    list**, we can simply omit it:


    ```

    [6]: 1 print (cities[:3])

    [''San Diego'', ''Prague'', ''Cape Town'']

    ```


    5. Slice the cities from "Cape Town" to "Melbourne":


    ```

    [7]: 1 print (cities[2:5])

    [''Cape Town'', ''Tokyo'', ''Melbourne'']

    ```


    Again, we have to slice consecutive elements. Therefore, we specify the start,
    which is 2 for "Cape Town", and the stop, which is 5 (because of the plus-one
    rule) for "Melbourne", but we omit the step because it is 1. And once more, we
    can simplify the three-s-rule! How? The **stop** coincides with the **last element
    of the list**, so we can just omit it:


    ```

    [8]: 1 print (cities[2:])

    [''Cape Town'', ''Tokyo'', ''Melbourne'']

    ```


    So far, we have seen the three-s rule applied in its entirety (example 3), and
    without start (example 4), stop (example 5), and step (example 2). How else can
    we simplify it? Let''s look at the following example. How do you think the code
    will look?


    ## Part 2. Introduction to lists and if/else constructs


    6. Slice "San Diego", "Cape Town", and "Melbourne":


    ```

    [9]: 1 print (cities[0:5:2])

    [''San Diego'', ''Cape Town'', ''Melbourne'']

    ```


    print cities in positions from zero to five with a step of two


    This time, the elements to slice are not consecutive. We start at 0, which is
    the position of "San Diego", we stop at 5 (because of the plus-one rule) for "Melbourne",
    and we specify the step, which is 2, because we are slicing every second element.
    However, as you might have guessed, because the start coincides with the beginning
    of the list, and the stop coincides with the last element of the list, we can
    omit both, and rewrite the code above as follows:


    ```

    [10]: 1 print (cities[::2])

    [''San Diego'', ''Cape Town'', ''Melbourne'']

    ```


    print cities from the beginning to the end of the list with a step of two


    You have now mastered the three-s rule and learned how to simplify it. How else
    can we play with it? Let''s look at this further representation of the list cities:


    ![](img/1e0d8bb8215d579da0d409223f09e364_61_0.png)


    In a list, indices can be positive (from left to right) or negative (from right
    to left).


    In Python, each element of a list can be identified by a positive or a negative
    index. We use **positive indices** when we consider elements **from left to right**
    and **negative indices** when we consider elements from **right to left**. *Positive*
    indices start from 0 and increase of 1 unit (0, 1, 2, etc.). *Negative* indices
    start from -1 and decrease of 1 unit (-1, -2, -3, etc.). Note that negative indices
    do not start from 0 to avoid ambiguity: the element in position 0 is always the
    first element of the list starting from the left side. When are negative indices
    convenient? For example, when we are dealing with a very long list. In that case,
    it would be tedious to count through all elements starting from 0. So we can just
    count backwards starting from the last element!


    How do we use negative indices in slicing? Let''s have a look!


    7. Slice "Melbourne":


    ```

    [11]: 1 print (cities[4])

    Melbourne

    ```


    print cities in positions 4


    In this example, we extracted "Melbourne" as we learned in example 1: by writing
    its *positive* index, which is 4, in between the square brackets. However, "Melbourne"
    is the last element of the list; therefore, it is much more convenient to use
    its *negative* index to slice it, like this:


    ```

    [12]: 1 print (cities[-1])

    Melbourne

    ```


    print cities in position minus one


    The advantage of using the negative index is that we do not need to count through
    all the list elements to get to know the position of "Melbourne". Since "Melbourne"
    is the last element of the list, we can just write -1. This saves us time and
    eliminates possible errors due to miscounting.


    8. Slice all the cities from "Prague" to "Tokyo" using negative indices:


    ```

    [13]: 1 print (cities[-4:-1])

    [''Prague'', ''Cape Town'', ''Tokyo'']

    ```


    print cities in positions from minus four to minus one


    This is in an alternative to example 2. There, we extracted the cities from "Prague"
    to "Tokyo" using positive indices, whereas here we want to use negative indices.
    It might look intimidating, but the reasoning is always the same. The first element
    we want to extract is Prague, which is in position -4, therefore the start is
    -4. The last element we want to extract is Tokyo, which is in position -2, thus
    the stop is -1 because of the plus one rule. Like in the previous example, using
    negative indices can be very convenient when extracting elements from the end
    of a long list.


    In this example, we saw how to use negative indices for the start and the stop.
    What about the step? A **negative step** allows us **to slice elements in reverse
    order**, which means from the right to the left. Negative steps can be used with
    both positive or negative start and stop. This might sound confusing, but we''ll
    clarify it the next three examples. Slicing in reverse order is a very powerful
    feature, and it''s the last thing you need to know to master slicing. Let''s have
    a look!


    9. Slice all the cities from "Tokyo" to "Prague" using positive indices (reverse
    order):


    ```

    [14]: 1 print (cities[3:0:-1])

    [''Tokyo'', ''Cape Town'', ''Prague'']

    ```


    print cities in positions from three to zero with a step of minus one


    When slicing—and coding, in general—it is extremely important to be aware of the
    result we expect. When slicing in reverse order, having the result in mind can
    really avoid confusion. So, let''s start from there. We want to print out "Tokyo",
    "Cape Town", and "Prague". The first element is "Tokyo", which is in position
    3, so the start is 3. The last element is "Prague", which is in position 1. When
    we slice in reverse order, instead of the plus-one rule, we have to use the **minus
    one rule**, which says that **we must subtract 1 from the position of the last
    element we want to slice**. Why? This is very intuitive. As we know, for the stop,
    we always want to take the *next* position. When slicing in direct order, the
    next position is on the *right* side of the last element. Therefore, we add 1
    to its index. On the other side, when slicing in reverse order, the next position
    is on the *left* side of the last element. Therefore, we subtract 1 from its index.
    Now, back to our example. The last element is "Prague", which is in position 1.
    And because of the minus one rule, the stop is 0. Finally, we need to define the
    step. Because the elements are consecutive, the step should be 1, but because
    we are going in reverse order, we have to put a minus in front of it, so the step
    becomes -1.


    In summary, when slicing in reverse order, we have to: (1) make sure we have the
    first and the last elements clearly in our minds, (2) apply the minus one rule
    to the stop, and (3) use a negative step.


    Let''s raise the bar even more now! Look at the next example.'
  mdcn: '在这种情况下，我们想要切片并打印两个不连续的元素——"Prague"和"Tokyo"——它们分别位于位置1和3。在上面的代码中，你可能已经认出1是起始位置，4是停止位置（因为加一规则），而2呢？那就是**步长**！正如你所看到的，"Tokyo"位于"Prague"之后2步的位置：从"Prague"到"Cape
