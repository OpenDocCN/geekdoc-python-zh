    same approach as the one above. We slice the first part of the list planets from
    the beginning (start omitted) to 5, which corresponds to the position of "Neptune"
    plus 1. Then, we concatenate the two new elements "Uranus" and "Saturn" embedded
    in a list. Finally, we concatenate the remaining part of the list planets, starting
    from the position of "Jupiter", which is 5, and stopping at the end of the list
    (stop omitted). As you''ll probably notice, when we want to insert several consecutive
    elements in the middle of a list, we just **embed all the elements in a list**
    (line 1). Finally, we print out the modified list to check whether we added the
    new elements correctly (line 2).


    Now a trick! We saw that the start of the first list segment and the stop of the
    second list segment are omitted. In addition, you may have noticed that the stop
    of the first list segment coincides with the start of the second list segment—they
    are both 5. This is because of the plus one rule applied to the stop of the first
    list segment. Therefore, when adding new elements using slicing, we can **just
    count the stop of the first list segment**. That will coincide with the start
    of the second list segment. The remaining start and stop can be omitted!


    An important note before continuing: in the past three examples, we started analyzing
    code from the right side of the assignment symbol. Focusing on that side is quite
    common because it is where we define variable changes and operations. Sometimes,
    we can even start writing code on the right side of the assignment symbol, and
    then type the appropriate variable name on the left side. It''s very common to
    start **analyzing or writing code backwards**!'
