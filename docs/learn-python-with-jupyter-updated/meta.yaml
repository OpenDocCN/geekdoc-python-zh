    page 14). If we print "The player wins" (line 7), we tell the *coder* that the
    code works. But if we print *You win!*, we talk to the *player*, who is the person
    we are coding for! Think about when you play a computer game: what kind of messages
    do you get?


    In an `if/elif/else` construct, it is important to **test all conditions**. We
    want to make sure that all statements execute correctly, as we mentioned when
