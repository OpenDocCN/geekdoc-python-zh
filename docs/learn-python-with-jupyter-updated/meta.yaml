  md: '# Part 4. Numbers and algorithms


    # 5. Division:


    ```

    [5]: 10 / 5

    2.0

    ```


    To divide a number by another number, we use a forward slash /, and we pronounce
    it *divided by*. Note that the result of a division is always a decimal number.


    # 6. Floor division:


    ```

    [6]: 7 // 4

    1

    ```


    To execute a floor division, we use the operator //, composed of two forward slashes
    and pronounced *floor division*. A floor division is a division where the result
    is rounded to the **closest lower integer**. In this example, the result of the
    corresponding division / would be 1.75, thus the result of the floor division
    is 1, which is the closest lower integer to 1.75. The word *floor* indicates that
    we round the result down, that is—using a metaphor—to the floor of a house.


    # 7. Modulo:


    ```

    [7]: 7 % 4

    3

    ```


    To calculate a modulus, we use the operator %, which is pronounced *modulo*. This
    operation calculates a **reminder** (or modulus), which is the number needed to
    go back to the dividend after a floor division. For example, from cell 6 we know
    that the result of the floor division 7//4 is 1. If we multiply 1 (the result)
    times 4 (the divisor), we get 4 (4x1=4). To get to 7 (the dividend), we need 3,
    which is the modulus (4+3=7). Note that modulo is the name of the operator, while
    modulus is the name of the operation and a synonym for remainder. The modulus
    operation is used quite often in coding, as you will see in the next chapter.


    To summarize, Python provides seven arithmetic operators:


    +   - 1 for addition (+)

    - 1 for subtraction (-)

    - 2 for the “multiplication family”, which are multiplication (*) and exponentiation
    (**)

    - 3 for the “division family”, which are division (/), floor division (//), and
    modulo (%)


    Note that the division operators can provide *whole numbers* or *decimal numbers*
    as results, independently of the characteristics of dividend and divisor. Discover
    more nuance by solving the following exercise. Test your answers in Python!


    # True or false?


    +   1. The result of a division is always a whole number (e.g., without decimals).
    For example, the result of 11/5 is the whole number 2

    2. The result of 7//2 is 3, but the result of -7//2 is -4. This is because the
    floor division rounds to the closest lower integer

    3. The result of 7.5 % 3 is 1.5. Therefore, the result of a modulus operation
    can be a decimal number'
