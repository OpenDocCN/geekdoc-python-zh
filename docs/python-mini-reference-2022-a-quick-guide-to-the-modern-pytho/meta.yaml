    Much of the async/await runtime support is included in the asyncio module.


    The `async def`/coroutine function, when called, returns a [coroutine object](https://docs.python.org/3/glossary.html#term-coroutine-object)
    (or, just a coroutine, for short).


    The `asyncio.sleep` function returns a coroutine that completes after a given
    time (in seconds). The `await` expression can be used in a coroutine function
    with an [awaitable object](https://docs.python.org/3/glossary.html#term-awaitable).


    The coroutine can be run using `asyncio.run`.


    # 15.7. Other async Statements


    # 15.7.1. The async for statement


    An "asynchronous iterable" can call asynchronous code in its `__aiter__` implementation,
    and "asynchronous iterator" can call asynchronous code in its `__anext__` method.
    The `async for` statement allows convenient iteration over asynchronous iterators.'
  - '[PAGE 201]


    The `async for in else` compound statement has more or less the same syntax as
    [the for in else statement](https://docs.python.org/3/reference/compound_stmts.html#the-for-statement).
    But, it iterates of an `async` iterator instead of a synchronous iterator.


    Here''s an example:


    ```

    >>> async def words():

    ...     yield "hello"

    ...     yield "parallel"

    ...     yield "universe"

    ...

    >>> async def greet():

    ...     async for word in words():

    ...         print(word, end='' '')

    ...     else:

    ...         print()

    ...

    >>> import asyncio

    >>> asyncio.run(greet())

    hello parallel universe

    >>>

    ```


    â An `async def` function with `yield` statements (implicitly) returns an async
    iterator object (more specifically, a coroutine).


    â¡ The `async` statements can only be included in a coroutine function.


    â¢ The `async for` clause. The type of `words()` is an async iterator.


    â£ An optional `else` clause. This clause is executed when the `async for` exits
    after normally iterating over the async iterator.


    â¤ The trailing newline is printed from the `else` clause of the `async for` statement
    in the body of `greet`.


    # 15.7.2. The `async with` statement'
- md: "An asynchronous context manager is a context manager that is able to suspend\
    \ execution in its enter and exit methods. The async with compound statement works\
    \ much the same way as [the with statement](https://docs.python.org/3/reference/compound_stmts.html#the-with-statement).\
    \ But, instead of using a context manager, it uses an asynchronous context manager,\
    \ which supports `__aenter__` and `__aexit__` methods (corresponding to `__enter__`\
    \ and `__exit__` of the context manager, respectively).\n\nHere's the syntax:\n\
    \n```\nasync with Expression as Target:\n    Suite\n```\n\n- The `Expression`\
    \ must evaluate to an asynchronous context manager type.\n- The `as` clause is\
    \ optional as with the `with` statement.\n- The `Suite` can include `await` expressions\
    \ and other async statements.\n\n## 15.8. Producer Consumer Problem\n\nAs a final\
    \ example, and an exercise, here's a simple implementation of the classic (single)\
    \ producer - (single) consumer problem using Python's coroutines. (For more information,\
    \ refer to [the Wikipedia doc](https://en.wikipedia.org/wiki/Producer%E2%80%93consumer_problem).)\n\
    \nThis code sample is provided as is without *any* comments or annotations. The\
    \ readers are encouraged to go through the code, or try implementing a similar\
    \ asynchronous program on their own.\n\nThe program consists of three files, *producer.py*\
    \ and *consumer.py* under the *pc* subfolder, and *main.py* in the project folder.\
    \ You can try different values for the four constants defined in the producer\
    \ and consumer modules, and see how they affect the coordination between the producer\
    \ and the consumer. (Note: This sample program uses some APIs from the *asyncio*\
    \ module, which are not explicitly covered in this book.)\n\n*Listing 3. pc/producer.py*\n\
    \n```\nimport asyncio\n\n_PRODUCE_ITEMS = 3\n_PRODUCE_IVAL = 0.5\n\nasync def\
    \ produce(queue: asyncio.Queue,\n                 items: int = _PRODUCE_ITEMS,\n\
    \                 interval: float = _PRODUCE_IVAL):\n    for i in range(items):\n\
    \        print(\"Producing:\", i)\n        await asyncio.sleep(interval)\n   \
    \     await queue.put(i)\n        print(\"Produced:\", i)\n\n    print(\"Producer\
    \ done!\")\n```\n\n*Listing 4. pc/consumer.py*\n\n```\nimport asyncio\n\n_CONSUME_ITEMS\
    \ = 5\n_CONSUME_IVAL = 1.0\n\nasync def consume(queue: asyncio.Queue,\n      \
    \            items: int = _CONSUME_ITEMS,\n                  interval: float =\
    \ _CONSUME_IVAL):\n    for _ in range(items):\n        item = await queue.get()\n\
    \        print(\"Got item:\", item)\n        await asyncio.sleep(interval)\n \
    \       queue.task_done()\n        print(\"Consumed\", item)\n\n    print(\"Consumer\
    \ done!\")\n```\n\n*Listing 5. main.py*\n\n```\nimport asyncio\nfrom pc.consumer\
    \ import consume\nfrom pc.producer import produce\n\nasync def _main():\n    try:\n\
    \        queue = asyncio.Queue()\n        p = asyncio.create_task(produce(queue))\n\
    \        c = asyncio.create_task(consume(queue))\n\n        await asyncio.gather(p)\n\
    \        await queue.join()\n        c.cancel()\n        await asyncio.gather(c)\n\
    \    except asyncio.CancelledError:\n        return\n    except RuntimeError as\
    \ err:\n        print(err)\n\nif __name__ == \"__main__\":\n    asyncio.run(_main())\n\
    ```\n\n## ABOUT THE AUTHOR\n\n**Harry Yoon** has been programming for over three\
    \ decades. He has used over 20 different programming languages in his professional\
    \ career. His experience spans from scientific programming and machine learning\
    \ to enterprise software and Web and mobile app development.\n\nYou can reach\
    \ him via email: [harry@codingbookspress.com](mailto:harry@codingbookspress.com).\n\
    \nHe occasionally hangs out on social media as well:\n\n- TikTok: [@codeandtips](https://www.tiktok.com/@codeandtips)\n\
    - Instagram: [@codeandtips](https://www.instagram.com/codeandtips)\n- Facebook\
    \ Group: [Code and Tips](https://www.facebook.com/groups/codeandtips)\n- Twitter:\
    \ [@codeandtips](https://twitter.com/codeandtips)\n\n## Other Python Books by\
    \ the Author\n\n- [Python for Serious Beginners: A Practical Introduction to Modern\
    \ Python with Simple Hands-on Projects](https://www.amazon.com/dp/B09V3KXJPB)\n\
    - [Python for Passionate Beginners: A Practical Guide to Programming in Modern\
    \ Python with Fun Hands-on Projects](https://www.amazon.com/dp/B0C1J8R9X6)\n\n\
    ## ABOUT THE SERIES\n\nWe are creating a number of books under the series title,\
    \ *A Hitchhiker’s Guide to the Modern Programming Languages*. We cover essential\
    \ syntax of the 12 select languages in 100 pages or so, Go, C#, Python, Typescript,\
    \ Rust, C++, Java, Julia, Javascript, Haskell, Scala, and Lua.\n\nThese are all\
    \ very interesting and widely used languages that can teach you different ways\
    \ of programming, and more importantly, different ways of thinking.\n\n## All\
    \ Books in the Series\n\n- Go Mini Reference\n- Modern C# Mini Reference\n- Python\
    \ Mini Reference\n- Typescript Mini Reference\n- Rust Mini Reference\n- C++20\
    \ Mini Reference\n- Modern Java Mini Reference\n- Julia Mini Reference\n- Javascript\
    \ Mini Reference\n- Haskell Mini Reference\n- Scala 3 Mini Reference\n- Lua Mini\
    \ Reference\n\n## COMMUNITY SUPPORT\n\n### Code and Tips\n\nWe are building a\
    \ website for programmers, from beginners to more experienced. It covers various\
    \ coding-related topics from algorithms to machine learning, and from design patterns\
    \ to cybersecurity, and more. We publish new content on a weekly basis.\n\n- www.codeandtips.com\n\
    \nYou can also find some sample code in the GitLab repositories:\n\n- gitlab.com/codeandtips\n\
    \n### Mailing List\n\nPlease join our mailing list, join@codingbookspress.com,\
    \ to receive coding tips and other news from **Coding Books Press**, including\
    \ free, or discounted, book promotions. If you let us know which book you have\
    \ bought, and if we find any significant errors in the book, then we will notify\
    \ you. Advance review copies will be made available to select members on the list\
    \ before new books are published so that their input can be incorporated, if feasible.\n\
    \n### Office Hours\n\nWe may set up a regular time, weekly or monthly, to answer\
    \ any questions from the readers, or to go through some of the exercises in the\
    \ book together, *if there is a demand*. If you sign up on the mailing list, then\
    \ we will notify you when the office hours starts.\n\n*Revision 1.0.3, 2022-10-13*"
  mdcn: "异步上下文管理器是一种能够在 `enter` 和 `exit` 方法中暂停执行的上下文管理器。`async with` 复合语句的工作方式与 [with\
    \ 语句](https://docs.python.org/3/reference/compound_stmts.html#the-with-statement)非常相似。但是，它不使用上下文管理器，而是使用异步上下文管理器，该管理器支持\
    \ `__aenter__` 和 `__aexit__` 方法（分别对应上下文管理器的 `__enter__` 和 `__exit__`）。\n\n以下是语法：\n\
    \n```\nasync with Expression as Target:\n    Suite\n```\n\n- `Expression` 必须求值为异步上下文管理器类型。\n\
    - `as` 子句是可选的，与 `with` 语句一样。\n- `Suite` 可以包含 `await` 表达式和其他异步语句。\n\n## 15.8. 生产者消费者问题\n\
    \n作为最后一个示例和练习，这里是一个使用 Python 协程实现的经典（单）生产者 - （单）消费者问题的简单实现。（更多信息，请参阅 [维基百科文档](https://en.wikipedia.org/wiki/Producer%E2%80%93consumer_problem)。）\n\
    \n此代码示例按原样提供，*没有任何*注释或说明。鼓励读者通读代码，或尝试自己实现一个类似的异步程序。\n\n该程序由三个文件组成：*pc* 子文件夹下的\
    \ *producer.py* 和 *consumer.py*，以及项目文件夹中的 *main.py*。你可以尝试为生产者和消费者模块中定义的四个常量设置不同的值，看看它们如何影响生产者和消费者之间的协调。（注意：此示例程序使用了\
    \ *asyncio* 模块中的一些 API，本书未明确涵盖这些 API。）\n\n*清单 3. pc/producer.py*\n\n```\nimport\
    \ asyncio\n\n_PRODUCE_ITEMS = 3\n_PRODUCE_IVAL = 0.5\n\nasync def produce(queue:\
    \ asyncio.Queue,\n                 items: int = _PRODUCE_ITEMS,\n            \
    \     interval: float = _PRODUCE_IVAL):\n    for i in range(items):\n        print(\"\
    Producing:\", i)\n        await asyncio.sleep(interval)\n        await queue.put(i)\n\
    \        print(\"Produced:\", i)\n\n    print(\"Producer done!\")\n```\n\n*清单\
    \ 4. pc/consumer.py*\n\n```\nimport asyncio\n\n_CONSUME_ITEMS = 5\n_CONSUME_IVAL\
    \ = 1.0\n\nasync def consume(queue: asyncio.Queue,\n                  items: int\
    \ = _CONSUME_ITEMS,\n                  interval: float = _CONSUME_IVAL):\n   \
    \ for _ in range(items):\n        item = await queue.get()\n        print(\"Got\
    \ item:\", item)\n        await asyncio.sleep(interval)\n        queue.task_done()\n\
    \        print(\"Consumed\", item)\n\n    print(\"Consumer done!\")\n```\n\n*清单\
    \ 5. main.py*\n\n```\nimport asyncio\nfrom pc.consumer import consume\nfrom pc.producer\
    \ import produce\n\nasync def _main():\n    try:\n        queue = asyncio.Queue()\n\
    \        p = asyncio.create_task(produce(queue))\n        c = asyncio.create_task(consume(queue))\n\
    \n        await asyncio.gather(p)\n        await queue.join()\n        c.cancel()\n\
    \        await asyncio.gather(c)\n    except asyncio.CancelledError:\n       \
    \ return\n    except RuntimeError as err:\n        print(err)\n\nif __name__ ==\
    \ \"__main__\":\n    asyncio.run(_main())\n```\n\n## 关于作者\n\n**Harry Yoon** 编程已有三十多年。在他的职业生涯中，他使用过超过\
    \ 20 种不同的编程语言。他的经验涵盖科学编程、机器学习、企业软件以及 Web 和移动应用开发。\n\n你可以通过电子邮件联系他：[harry@codingbookspress.com](mailto:harry@codingbookspress.com)。\n\
    \n他偶尔也会在社交媒体上出现：\n\n- TikTok: [@codeandtips](https://www.tiktok.com/@codeandtips)\n\
    - Instagram: [@codeandtips](https://www.instagram.com/codeandtips)\n- Facebook\
    \ 群组: [Code and Tips](https://www.facebook.com/groups/codeandtips)\n- Twitter:\
    \ [@codeandtips](https://twitter.com/codeandtips)\n\n## 作者的其他 Python 书籍\n\n- [Python\
    \ for Serious Beginners: A Practical Introduction to Modern Python with Simple\
    \ Hands-on Projects](https://www.amazon.com/dp/B09V3KXJPB)\n- [Python for Passionate\
    \ Beginners: A Practical Guide to Programming in Modern Python with Fun Hands-on\
    \ Projects](https://www.amazon.com/dp/B0C1J8R9X6)\n\n## 关于本系列\n\n我们正在创建一系列名为 *A\
    \ Hitchhiker’s Guide to the Modern Programming Languages* 的书籍。我们用大约 100 页的篇幅涵盖了\
    \ 12 种精选语言的基本语法，包括 Go、C#、Python、Typescript、Rust、C++、Java、Julia、Javascript、Haskell、Scala\
    \ 和 Lua。\n\n这些都是非常有趣且广泛使用的语言，可以教你不同的编程方式，更重要的是，不同的思维方式。\n\n## 本系列所有书籍\n\n- Go\
    \ Mini Reference\n- Modern C# Mini Reference\n- Python Mini Reference\n- Typescript\
    \ Mini Reference\n- Rust Mini Reference\n- C++20 Mini Reference\n- Modern Java\
    \ Mini Reference\n- Julia Mini Reference\n- Javascript Mini Reference\n- Haskell\
    \ Mini Reference\n- Scala 3 Mini Reference\n- Lua Mini Reference\n\n## 社区支持\n\n\
    ### Code and Tips\n\n我们正在为程序员（从初学者到更有经验者）建立一个网站。它涵盖了从算法到机器学习，从设计模式到网络安全等各种与编码相关的话题。我们每周发布新内容。\n\
    \n- www.codeandtips.com\n\n你也可以在 GitLab 仓库中找到一些示例代码：\n\n- gitlab.com/codeandtips\n\
    \n### 邮件列表\n\n请加入我们的邮件列表 join@codingbookspress.com，以接收来自 **Coding Books Press**\
    \ 的编码技巧和其他新闻，包括免费或折扣的书籍促销。如果你告诉我们你购买了哪本书，并且我们发现书中存在任何重大错误，我们会通知你。在新书出版前，精选列表成员将获得预览版，以便在可行的情况下纳入他们的意见。\n\
    \n### 办公时间\n\n*如果有需求*，我们可能会设定一个固定时间（每周或每月），来回答读者的任何问题，或一起完成书中的一些练习。如果你注册了邮件列表，我们会在办公时间开始时通知你。\n\
    \n*修订版 1.0.3, 2022-10-13*"
