    # 10.2.1. Augmented Assignment Statements


    An augmented assignment statement is the combination of a binary operation and
    an assignment statement. The following operators are used in augmented assignment:
    +=, -=, _=, @=, /=, //=, %=, _*=, >>=, <<=, &=, ^=, and |=.


    Unlike normal assignments, an augmented assignment evaluates the target on the
    left-hand first, and then the expression list on the right-hand side. It then
    performs the binary operation and writes back the result to the target.


    > Python''s assignment statement does not make a copy of the source object, unlike
    in some other programming languages. It merely binds, or rebinds, a name to the
    object. For copying, the standard library copy module provides functions for both
    shallow and deep copying.


