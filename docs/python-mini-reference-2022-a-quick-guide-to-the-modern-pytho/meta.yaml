    For this type of parameters, when the function is called, the corresponding arguments\
    \ need to be provided in the exactly the same positions as they are defined in\
    \ the parameter list (e.g., as in C/C++ and some other C-style languages). In\
    \ order to define positional only parameters, we use a separator / (forward slash).\
    \ Any parameter preceding this optional separator is positional-only.\n\n*Keyword\
    \ only parameters*\n\nFor this type of parameters, they do not have the fixed\
    \ positions in the parameter list, and the corresponding arguments need to be\
    \ provided using the parameter=value syntax (known as the \"keyword arguments\"\
    ). To define *keyword only* parameters, we use a separator * (asterisk). (Or,\
    \ the varargs arguments are also used as a separator for this purpose. See below.)\
    \ The parameters following this optional separator, if any, are keyword-only.\n\
    \n*Positional or keyword parameters*\n\nBy default, for all other parameters,\
    \ they have fixed positions and they can be used either with the positional argument\
    \ syntax (in the corresponding positions) or with the keyword argument syntax.\n\
    \nHere are examples:\n\n```\ndef fa(p2): pass\n\ndef fb(p1, /, p2): pass\n\ndef\
    \ fc(p2, *, p3): pass\n\ndef fd(p1, /, p2, *, p3): pass\n```\n\np2 is a \"normal\"\
    \ function parameter. It can be used either as a positional argument (fa(v2))\
    \ or keyword argument (fa(p2 = v2)).\n\nIn this example, p1 is a positional-only\
