    # 13.5. Function Call


    # 13.5.1. Calls


    A function call is an expression. A call expression (with parentheses) *calls*
    any [callable object](https://docs.python.org/3/glossary.html#term-callable),
    not just a function, with zero, one, or more (positional and/or keyword) arguments.
    Arguments are separated by commas. A trailing comma may optionally be added if
    at least one argument is included.


    # 13.5.2. Callable


    All objects having a `__call__` method are *callable*. The following objects are
    also callable:


    +   - Built-in and user-defined functions,

    - Methods of built-in objects,

    - Class objects, and

    - Methods of instance objects of a class.'
