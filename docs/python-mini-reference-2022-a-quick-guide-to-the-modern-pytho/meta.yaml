    \np1 and p2, but not p3, can be used as positional arguments. p2 and p3, but not\
    \ p1, can be used as keyword arguments.\n\n## 13.3. Optional Parameters\n\nThe\
    \ function parameters can have default values, in the form of `parameter = expression`.\
    \ Those parameters are said to be optional. In a function call, if no argument\
    \ value is explicitly provided for an optional parameter, its default value is\
    \ used.\n\n- Any keyword-only parameter can be made optional.\n- Only a consecutive\
    \ list of last one or more positional parameters (positional-only or otherwise),\
    \ before `*`, if present, can be also made optional.\n- The default parameter\
    \ values are evaluated *only once*, from left to right, when the function definition\
    \ is executed. The same objects are then used for any subsequent function calls.\
    \ When the default value objects are mutable, this can lead to an unexpected result\
    \ since the *default values* can be effectively different across different function\
    \ calls.\n\nFor example,\n\n```\n>>> def f(arr = []):\n...     arr.append(1)\n\
    ...     return list(arr)\n...\n>>> f(), f(), f()\n([1], [1, 1], [1, 1, 1])\n```\n\
    \nIn this example, the default value of arr is set to [], a list object, which\
    \ is mutable.\n\nThe expressions in an expression list are evaluated from left\
    \ to right. Each call f() leads to a different result.\n\nEvery time we call the\
    \ same function f, relying on the default value of the optional parameter arr,\
    \ it behaves differently. One way around this is to set the *real* default value\
    \ within the function. For instance,\n\n```\n>>> def f(arr = None):\n...     if\
    \ arr == None:\n...         arr = []\n...     arr.append(1)\n...     return list(arr)\n\
