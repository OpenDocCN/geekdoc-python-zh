  mdcn: '## 14.3. 面向对象编程


    在 Python 中，类定义语句用于为该类的对象创建一个“模板”。类定义了一个自定义类型、如何创建该类型的实例对象以及如何访问该对象等。


    在 Python 中，一个类总是隐式地“继承”自内置类型 `object`，无论是直接还是间接继承。这对于任何内置类型或自定义类型都是如此。一个类可以直接继承自另一个类型，而该类型本身又是
    `object` 的子类型。Python 支持[从多个直接基类继承](inheritance from more than one direct base
    class)。


    ## 14.3.1. 数据封装


    在 Python 中，不存在真正的“私有属性”、数据或方法。实例对象中的数据隐藏是通过约定来支持的，就像 Python 中的许多其他特性一样。


    以单下划线 `_` 为前缀的名称被视为“私有”。也就是说，按照约定，我们不会直接访问其他类对象或实例对象的成员，如果它们的名称以一个或多个下划线开头。这样的属性被认为是实现细节，它们不属于“公共
    API”的一部分。


    然而，Python *确实*对[名称隐藏](https://docs.python.org/3/reference/lexical_analysis.html#private-name-mangling)有一些基本的支持。当一个类中的变量或函数/方法的名称*以至少两个下划线开头，并以至多一个下划线结尾*时，Python
    会修改该属性的名称。这被称为“名称修饰”，尽管它并不真正“修饰”名称（例如，不像 C++ 那样）。无论如何，即使在你自己的程序中，也应该避免使用修饰后的名称。（注意，“双下划线名称”不会被修饰或修改，因为它们以两个下划线结尾。）


    ## 14.3.2. 魔术方法


    `__init__` 方法是一个特殊方法，如前所述。这个特定的方法用于为新实例化的实例对象提供任何初始化代码。如果该方法在对象的类中被重写，Python 运行时会自动在新创建的实例对象上调用此方法。


    基础类型 `object` 具有以下属性：


    ```

    >>> dir(object)

    [''__class__'', ''__delattr__'', ''__dir__'', ''__doc__'', ''__eq__'',

    ''__format__'', ''__ge__'', ''__getattribute__'', ''__gt__'', ''__hash__'',

    ''__init__'', ''__init_subclass__'', ''__le__'', ''__lt__'', ''__ne__'',

    ''__new__'', ''__reduce__'', ''__reduce_ex__'', ''__repr__'', ''__setattr__'',

    ''__sizeof__'', ''__str__'', ''__subclasshook__'']

    ```


    由于每个类型都直接或间接/传递地继承自这个基类 `object`，因此这些属性始终对所有类型（内置或用户定义）可用。其中一些数据属性可能为空，其中一些方法属性可能具有空实现。此外，某些属性可能不会在
    `dir()` 输出中显示，因为类/对象的 `__dir__` 方法可以被自定义。


    `__doc__` 属性存储类型的文档字符串（如果有的话）。否则，它是一个空字符串。与[函数](functions)一样，如果类定义套件中的第一条语句是常量字符串字面量表达式，则它会自动用作类的文档字符串。


    （Python 的内置 `help` 函数使用对象的文档字符串作为其自动生成的帮助消息的一部分。）


    `__str__` 方法在对象用于字符串上下文时被调用。当类中没有实现 `__str__` 方法时，如果存在 `__repr__` 方法，则会回退到该方法。对于更底层的自定义，或显示调试信息等，可以重写
    `__repr__` 方法。例如，


    ```python

    >>> class A:

    ...     def __str__(self):

    ...         return "A from __str__()"

    ...

    >>> class B:

    ...     def __repr__(self):

    ...         return "B from __repr__()"

    ...

    >>> class C:

    ...     def __str__(self):

    ...         return "C from __str__()"

    ...     def __repr__(self):

    ...         return "C from __repr__()"

    ...

    >>> a, b, c = A(), B(), C()

    >>> print(f"""\n... a = {a}

    ... b = {b}

    ... c = {c}""")

    a = A from __str__()

    b = B from __repr__()

    c = C from __str__()

    ```


    - 由于 `a` 的类型 `A` 实现了 `__str__` 方法，因此在字符串上下文中调用它。

    - 由于 `b` 的类型 `B` 实现了 `__repr__` 方法，但没有实现 `__str__` 方法，因此调用 `__repr__` 方法。

    - 同样，`c` 的 `__str__` 方法在字符串上下文中被调用。


    另一方面，


    ```python

