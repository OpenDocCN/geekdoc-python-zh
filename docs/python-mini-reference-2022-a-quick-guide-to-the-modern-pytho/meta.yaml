    In Python, we can create objects, e.g., using [constructor functions](constructor
    functions), but there is no way to explicitly destroy them. Any objects that are
    unreachable, e.g., because they do not have any valid names referring to them,
    may be "garbage collected" by the Python runtime.


    The [del statement](del statement) can be used to remove/unbind a name from a
    given object. Furthermore, Python''s standard library module gc can used to explicitly
    control various aspects of the garbage collection process.


    Note that some objects may reference system resources such as files and windows,
    which are controlled by the operating system. When such an object is garbage collected,
    those system resources are automatically released. To explicitly release those
    resources, one can add a cleanup logic (e.g., calling `file.close()`) in the finally
    block of [the try statement](the try statement). Or, one can include such logic
    in the `__exit__` method of a context manager, to be used with [the with statement](the
    with statement).'
