    \              # 3\n...     print(y)\n...\n>>> x, y = 1, 2           # 4\n>>>\
    \ f()                   # 5\n1\n4\n```\n\n- No `global` declaration is needed\
    \ to access the (later-defined) global variable, `x`, in the function scope. Note\
    \ that the variable `x` is used within the function `f` without being declared\
    \ first. This is called a \"free variable\".\n- This `global` declaration allows\
    \ the global variable, `y`, to be assignable.\n- After the `global` statement,\
