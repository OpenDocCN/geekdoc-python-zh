    \ implements `__iter__` and `__next__` methods. Hence, an iterator is also an\
    \ iterable. (Internally, an iterable object and the object's iterator object usually\
    \ share the same (stream of) data.)\n\nRepeatedly calling the builtin `next()`\
    \ function with an iterator object (which calls the object's `__next__` method)\
    \ returns the successive items in the object. When no more item is available,\
    \ e.g., when it reaches the end of the data stream, a `StopIteration` exception\
    \ is raised.\n\nHere's a simple class that is an iterator:\n\n```\nclass ABC:\n\
    \    def __init__(self):\n        self.pointer = 0\n        self.list = ('A',\
    \ 'B', 'C')\n\n    def __iter__(self):          # â€™\n        return self\n\n\
    \    def __next__(self):          # â€™i\n        if self.pointer >= len(self.list):\n\
    \            raise StopIteration\n\n        val = self.list[self.pointer]\n  \
    \      self.pointer += 1\n        return val\n```\n\nâ€™ It has an `__iter__`\
