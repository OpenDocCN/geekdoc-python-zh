    \   def y(self): print(\"A.y\")\n    def z(self): print(\"A.z\")\nclass B(A):\n\
    \    def x(self): print(\"B.x\")\nclass C(B):\n    def w(self): print(\"C.w\"\
    )\nclass D(A):\n    def x(self): print(\"D.x\")\n    def y(self): print(\"D.y\"\
    )\nclass E(C, D):\n    pass\n```\n\n在这个例子中，例如类 E 有两个（非 `object` 的）直接父类，C 和 D。\n\
    \n```\nE --> C --> B --> A --> object\n    --> D ---------> A -->\n```\n\nE 通过两条不同的“路径”间接继承自\
    \ A：E → C → B → A 和 E → D → A。因此，它是一个菱形继承模式。\n\n在继续之前，让我们尝试运行以下程序。输出会是什么？\n\n\
    ```python\ne = E()\nprint(\"e.w()\"); e.w(); print(\"==\")\nprint(\"e.x()\");\
    \ e.x(); print(\"==\")\nprint(\"e.y()\"); e.y(); print(\"==\")\nprint(\"z.y()\"\
    ); e.z(); print(\"==\")\n```\n\n如果你尝试运行这个程序，你会意识到：\n\n- e.w() 最终调用 C.w，\n- e.x()\
    \ 最终调用 B.x，\n- e.y() 最终调用 D.y，以及\n- e.z() 最终调用 A.z。\n\n其中一个“最奇怪”的行为是 e.x() 调用了方法\
    \ B.x，而不是 D.x，尽管两者都定义了 x 方法，并且 D 是 E 的直接基类之一，如 E(C, D) 的类定义中所指定。这是因为 Python 的“多重继承”使用了上述所有基类（无论它们是否在类定义中明确指定）之间的线性化顺序。\n\
    \n事实上，Python 有一个内置方法 `type.mro` 来显示此信息。例如，\n\n```python\n>>> E.mro()\n[<class\
