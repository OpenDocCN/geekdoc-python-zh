    \ pass\n\ndef fb(p1, /, p2): pass\n\ndef fc(p2, *, p3): pass\n\ndef fd(p1, /,\
    \ p2, *, p3): pass\n```\n\n`p2` 是一个“普通”函数参数。它既可以作为位置实参 (`fa(v2)`) 使用，也可以作为关键字实参\
    \ (`fa(p2 = v2)`) 使用。\n\n在此示例中，`p1` 是一个仅位置参数。\n\n对于函数 `fc`，`p3` 只能作为关键字实参使用。\n\
    \n`p1` 和 `p2`（但不是 `p3`）可以用作位置实参。`p2` 和 `p3`（但不是 `p1`）可以用作关键字实参。\n\n## 13.3. 可选参数\n\
    \n函数参数可以具有默认值，形式为 `parameter = expression`。这些参数被称为可选参数。在函数调用中，如果没有为可选参数显式提供实参值，则使用其默认值。\n\
