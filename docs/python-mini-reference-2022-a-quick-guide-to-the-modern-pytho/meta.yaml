    \ add(p1, p2):\n...     \"Adds p1 and p2\"\n...     return p1 + p2\n...\n>>> add.__doc__\n\
    'Adds p1 and p2'\n>>> add(1, 2)\n3\n```\n\nThe add function takes two arguments.\
    \ Note that there is no way to specify the return values in Python. See below.\n\
