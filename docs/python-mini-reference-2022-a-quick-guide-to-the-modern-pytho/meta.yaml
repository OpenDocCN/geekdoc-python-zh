    \ comparison expressions)的泛化，后者产生布尔值。\n\n### 12.1. match - case 语句\n\n`match`语句具有以下通用语法：\n\
    \n```python\nmatch SubjectExpression:\n    CaseBlock\n    ...\n    CaseBlock\n\
    ```\n\n与其他复合语句不同，`match`语句不能写在一行物理行中。也就是说，冒号后总是需要换行。*SubjectExpression*可以是命名表达式，也可以是一个或多个星号命名表达式（逗号分隔）。当使用表达式列表时，它会在匹配过程开始前先被求值为一个元组。\n\
