    ```


    - 列表和其他集合类型的内部实现使用其元素的 `__repr__` 方法进行字符串表示。由于类型 `A` 没有实现此方法，因此使用 `a` 的默认字符串表示（包括其类型和内存位置等）。


    我们可以在许多情况下，并且应该重写这些双下划线方法来自定义自定义类的行为。例如，像 `__eq__`（用于 `==`）、`__ne__`（用于 `!=`）、`__ge__`（用于
    `>=`）、`__gt__`（用于 `>`）、`__le__`（用于 `<=`）和 `__lt__`（用于 `<`）这样的方法经常被重写，以自定义用户定义类型的相等性和比较相关行为。


    例如，


    ```python

    >>> from functools import total_ordering

    >>> import random

    >>>

    >>> @total_ordering

    ... class Pt(object):

    ...     def __init__(self, x, y):

    ...         self.x, self.y = x, y

    ...     def __eq__(self, other):

    ...         return (self.x == other.x) and (self.y == other.y)

    ...     def __lt__(self, other):

    ...         return (self.x + self.y) < (other.x + other.y)

    ...     def __repr__(self):

    ...         return f"({self.x}, {self.y})"

    ...

    >>> points = [Pt(-2, 0), Pt(-1, 0), Pt(0, 1), Pt(0, 2)]

    >>>

    >>> random.shuffle(points)

    >>> print("Shuffled:", points)

    Shuffled: [(-2, 0), (0, 2), (0, 1), (-1, 0)]

    >>>

    >>> result = sorted(points)

    >>> print("Sorted:  ", result)

    Sorted:   [(-2, 0), (-1, 0), (0, 1), (0, 2)]

    ```


    - 通过使用 `@total_ordering` 装饰器，我们只需要实现 `__eq__` 和 `__ge__`、`__gt__`、`__le__`、`__lt__`
    中的一个。其余的相关双下划线方法由该装饰器自动生成。

    - 这个类表示一个二维点。

    - `__eq__` 方法的一个典型实现。它使用逐成员比较。

    - 我们为二维空间中的点赋予一个（任意的）顺序。

    - 我们为此类实现了 `__repr__` 方法，但没有实现 `__str__` 方法。

    - `random.shuffle` 函数就地打乱序列。

    - 当点列表用于字符串上下文时，例如作为 `print` 函数调用的参数，它会调用其元素类型 `Pt` 的 `__repr__` 方法。

    - 内置的 `sorted` 函数依赖于序列中项目的顺序。


    ## 14.3.3. 继承


    面向对象编程的另一个显著特征是类型继承。要定义一个继承自 `object` 子类型的类，我们在类名后的括号中指定基类（或父类或超类）。例如，


    ```python

