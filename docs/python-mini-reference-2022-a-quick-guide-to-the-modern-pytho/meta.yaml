  md: '# 15. COROUTINES & ASYNCHRONOUS PROGRAMMING


    A coroutine is essentially a generalization of a function, or subroutine. A function
    has a single entry point and, once done executing the function’s statements according
    to its logic, it returns control to the caller once and for all. In contrast,
    coroutines are first entered, and they can be paused and resumed multiple times,
    before they are ultimately terminated, or closed.


    Most modern programming languages support some kind of coroutines. Python has
    seen a few different incarnations of coroutines in the past several years. In
    Python, coroutines were initially designed, and implemented, as a generalization
    of generators. Now, the newer `async def` based coroutines (and, tasks and futures)
    are the ones that should be used moving forward. The generator-based coroutine
    syntax is deprecated at this point (although the internal implementations are
    still based on generators).'
