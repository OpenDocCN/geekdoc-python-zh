    ...     print(\"Leaving a() after sleeping 5 seconds\")\n...\n>>> asyncio.run(a())\n\
    a() called\nLeaving a() after sleeping 5 seconds\n```\n\nMuch of the async/await\
    \ runtime support is included in the `asyncio` module.\n\nThe `async def`/coroutine\
    \ function, when called, returns a [coroutine object](https://docs.python.org/3/glossary.html#term-coroutine-object)\
    \ (or, just a coroutine, for short).\n\nThe `asyncio.sleep` function returns a\
    \ coroutine that completes after a given time (in seconds). The `await` expression\
    \ can be used in a coroutine function with an [awaitable object](https://docs.python.org/3/glossary.html#term-awaitable).\n\
    \nThe coroutine can be run using `asyncio.run`.\n\n## 15.7. Other async Statements\n\
    \n### 15.7.1. The async for statement\n\nAn \"asynchronous iterable\" can call\
    \ asynchronous code in its `__aiter__` implementation, and \"asynchronous iterator\"\
    \ can call asynchronous code in its `__anext__` method. The `async for` statement\
    \ allows convenient iteration over asynchronous iterators.\n\nThe `async for in\
    \ else` compound statement has more or less the same syntax as [the for in else\
