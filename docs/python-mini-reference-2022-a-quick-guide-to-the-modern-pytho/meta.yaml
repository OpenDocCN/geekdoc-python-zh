    ...     async for word in words():\n...         print(word, end=' ')\n...    \
    \ else:\n...         print()\n...\n>>> import asyncio\n>>> asyncio.run(greet())\n\
    hello parallel universe\n>>>\n```\n\n- An `async def` function with `yield` statements\
    \ (implicitly) returns an async iterator object (more specifically, a coroutine).\n\
    - The `async` statements can only be included in a coroutine function.\n- The\
    \ `async for` clause. The type of `words()` is an async iterator.\n- An optional\
    \ `else` clause. This clause is executed when the `async for` exits after normally\
    \ iterating over the async iterator.\n- The trailing newline is printed from the\
    \ `else` clause of the `async for` statement in the body of `greet`.\n\n### 15.7.2.\
    \ The `async with` statement"
  mdcn: "## 15.3.1. 异步生成器表达式\n\n生成器表达式被括号包围，因此可以写在多行上。该表达式被求值并赋值给一个变量 `double`，以作说明。更常见的是在需要的地方定义和使用生成器表达式，例如\
    \ [Lambda 函数](https://docs.python.org/3/reference/expressions.html#lambda)。\n\n\
    - “下一个值”表达式，类似于推导式语法。\n- `for` 子句。\n- 生成器表达式返回一个生成器对象（在本例中是绑定到 `double` 的对象），它是一个迭代器。\n\
    \n如果生成器表达式包含 `async for` 子句或 `await` 表达式，则它返回一个新的异步生成器对象，该对象可以被异步迭代。\n\n```\n\
    >>> async def a():\n...     yield 0; yield 1; yield 2\n...\n>>> adouble = (\n\
    ...     x * 2\n...     async for x in a()\n... )\n>>> async def c():\n...    \
    \ async for x in adouble:\n...         print(x)\n...\n>>> import asyncio\n>>>\
    \ asyncio.run(c())\n0\n2\n4\n```\n\n- 一个异步生成器函数。\n- 异步生成器表达式也被括号包围。这是一个异步生成器表达式，因为它包含一个\
    \ `async for` 子句。\n- “下一个值”表达式，类似于推导式语法。\n- `async for` 子句。注意 `a()` 返回一个异步生成器对象。\n\
    - 我们在这里定义了一个异步函数，以作说明，因为 `async` 语句只能包含在异步函数中。\n- `adouble` 引用一个异步生成器对象，它是一个异步迭代器。同样，异步生成器表达式的结果不必赋值给一个单独的变量。我们本可以直接在这里“就地”使用它。\n\
    - 我们可以借助 `asyncio.run` 函数来运行 `c()` 函数。\n\n迭代器类型实现了 `__iter__` 和 `__next__` 方法。同样，异步迭代器类型实现了\
    \ `__aiter__` 和 `__anext__` 方法。\n\n当它们耗尽元素时，迭代器会引发 `StopIteration` 异常，而异步迭代器会引发\
    \ `StopAsyncIteration` 异常。这些细节都隐藏在（同步或异步）生成器函数和生成器表达式的实现中。\n\n## 15.4. 协程对象\n\n\
    ### 15.4.1. 可等待对象\n\n实现了特殊 `__await__` 方法的类型是可等待的。[await 表达式](https://docs.python.org/3/reference/expressions.html#await)可以与可等待对象一起使用。\n\
    \n```\nobject.__await__(self)\n```\n\n它返回一个迭代器。用于定义一个可等待类型。例如，`asyncio.Future`\
    \ 实现了此方法，因此 `Future` 对象可以用作 `await` 表达式的操作数。\n\n### 15.4.2. 协程对象\n\n协程对象是可等待对象。例如，`async\
    \ def` 函数返回协程对象。\n\n协程的工作方式与可迭代对象类似。调用协程的 `__await__` 方法返回一个迭代器，协程通过迭代该迭代器对象来执行。当协程执行完毕并返回时，迭代器会引发\
    \ `StopIteration` 异常。\n\n然而，与可以多次迭代的可迭代对象不同，协程对象不能被 `await` 多次。尝试这样做会引发 `RuntimeError`\
    \ 异常。\n\n此外，协程对象不直接使用迭代器方法来支持迭代。相反，它们包含以下方法：\n\n```\ncoroutine.send(value)\n \
    \   它启动或恢复协程的执行。如果参数是 None，则等同于推进 __await__() 返回的迭代器。如果 value 不是 None，则此方法\n```\n\
    \n委托给迭代器的 `generator.send` 方法。\n\n```\ncoroutine.throw(type, value, traceback)\n\
    ```\n\n它在协程的挂起点引发指定类型的异常。如果迭代器有 `generator.throw` 方法，则委托给此方法。如果异常在协程中未被捕获，则会传播回调用者。\n\
    \n```\ncoroutine.close()\n```\n\n它导致协程退出，如果有的话，在运行清理代码之后。如果迭代器有 `generator.close`\
    \ 方法，则可选择先委托给该方法。然后在挂起点引发 `GeneratorExit` 异常，导致协程立即清理自身。最后，它被标记为执行完毕，结束协程的生命周期。\n\
    \n标准库 `asyncio` 模块提供了许多便利的类型和方法，例如 `Task` 和 `Future`，用于管理协程。\n\n## 15.5. 协程函数\n\
    \n`async def` 语句定义协程函数的方式与 `def` 语句定义（普通）函数的方式类似。使用 `async def` 定义的协程*可以*，但不是必须，包含\
    \ [await 表达式](https://docs.python.org/3/reference/expressions.html#await) 和 [async\
    \ 语句](https://docs.python.org/3/reference/simple_stmts.html#async)，例如 `async for`\
    \ 和 `async with`。\n\n调用协程函数对象返回一个可等待对象，更具体地说，是一个[协程对象](https://docs.python.org/3/glossary.html#term-coroutine-object)。协程的执行可以被挂起和恢复，如[上一节](https://docs.python.org/3/reference/compound_stmts.html#async-def)所述。\n\
    \n```\n>>> async def a():\n...     print(\"a\")\n...\n>>> async def b():\n...\
    \     await a()\n...\n>>> import asyncio\n>>> asyncio.run(b())\na\n```\n\n- 一个不包含任何\
    \ `async`/`await` 表达式/语句的协程函数定义。\n- 另一个包含 `await` 表达式的协程函数定义。\n- 调用 `a()` 将返回一个协程对象，该对象可以被\
    \ `await`。\n- 一个协程对象，由调用 `b()` 返回，可以使用 `asyncio.run` 函数运行。调用一个（普通）函数会执行函数对象中定义的语句。相反，调用协程函数对象仅仅返回[一个协程对象](https://docs.python.org/3/glossary.html#term-coroutine-object)。\n\
    \n## 15.6. Await 表达式\n\n`await` 表达式在*可等待*对象上挂起协程的执行。它只能在[协程函数](https://docs.python.org/3/glossary.html#term-coroutine-function)内部使用，例如\
    \ `async def` 函数。\n\n例如，\n\n```\n>>> import asyncio\n>>> async def a():\n... \
    \    print(\"a() called\")\n...     await asyncio.sleep(5.0)\n...     print(\"\
    Leaving a() after sleeping 5 seconds\")\n...\n>>> asyncio.run(a())\na() called\n\
    Leaving a() after sleeping 5 seconds\n```\n\n大部分 async/await 运行时支持都包含在 `asyncio`\
    \ 模块中。\n\n`async def`/协程函数被调用时，返回一个[协程对象](https://docs.python.org/3/glossary.html#term-coroutine-object)（或简称协程）。\n\
    \n`asyncio.sleep` 函数返回一个协程，该协程在给定时间（以秒为单位）后完成。`await` 表达式可以在协程函数中与[可等待对象](https://docs.python.org/3/glossary.html#term-awaitable)一起使用。\n\
    \n协程可以使用 `asyncio.run` 运行。\n\n## 15.7. 其他 async 语句\n\n### 15.7.1. async for 语句\n\
    \n“异步可迭代对象”可以在其 `__aiter__` 实现中调用异步代码，“异步迭代器”可以在其 `__anext__` 方法中调用异步代码。`async\
    \ for` 语句允许方便地迭代异步迭代器。\n\n`async for in else` 复合语句的语法与 [for in else 语句](https://docs.python.org/3/reference/compound_stmts.html#the-for-statement)大致相同。但是，它迭代的是一个\
    \ `async` 迭代器，而不是同步迭代器。\n\n这是一个例子：\n\n```\n>>> async def words():\n...     yield\
    \ \"hello\"\n...     yield \"parallel\"\n...     yield \"universe\"\n...\n>>>\
    \ async def greet():\n...     async for word in words():\n...         print(word,\
    \ end=' ')\n...     else:\n...         print()\n...\n>>> import asyncio\n>>> asyncio.run(greet())\n\
    hello parallel universe\n>>>\n```\n\n- 一个带有 `yield` 语句的 `async def` 函数（隐式地）返回一个异步迭代器对象（更具体地说，是一个协程）。\n\
    - `async` 语句只能包含在协程函数中。\n- `async for` 子句。`words()` 的类型是一个异步迭代器。\n- 一个可选的 `else`\
    \ 子句。当 `async for` 在正常迭代异步迭代器后退出时，执行此子句。\n- 尾随换行符是从 `greet` 函数体内的 `async for`\
    \ 语句的 `else` 子句打印的。\n\n### 15.7.2. `async with` 语句"
