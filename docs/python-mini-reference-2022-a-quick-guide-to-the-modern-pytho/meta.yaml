    # The @classmethod decorator


    A "class method" of a class in Python is a method defined on a class object, not
    on an instance. Normal methods receive the instance object as an implicit first
    argument. In contrast, a class method receives the class object as the implicit
    first argument.


    Syntactically, class methods can be called on the class or instance, just like
    static methods, but they receive the class as its first argument (even when they
    are called on an instance object). If a class method is called for a derived class,
    the derived class object is passed as the implied first argument.


    The @classmethod decorator converts a function to be a class method. For example,


    ```

    >>> class Z:

    ...     @classmethod

    ...     def f2(cls):

    ...         print(f"Class method: {cls.__name__}")

    ...

    >>> Z.f2()                       # â€™

    Class method: Z

    >>> z = Z()

    >>> z.f2()                       # â€™ç

    Class method: Z

    >>> class Z2(Z): pass

    ...

    >>> Z2.f2()                      # â€™£

    Class method: Z2

    ```'
