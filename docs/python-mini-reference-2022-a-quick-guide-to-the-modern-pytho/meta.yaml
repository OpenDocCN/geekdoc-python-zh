- md: "## 14.6. Class Decorators\n\nClasses can also be decorated in the same way\
    \ [functions are decorated](functions are decorated).\n\nThe evaluation rules\
    \ for the decorator expressions are the same as those for the function decorators.\
    \ The result of the decorator expression, a class, is then bound back to the target\
    \ class name.\n\nFor example,\n\n```\n@decorator_function\nclass ClassX:\n   \
    \ pass\n```\n\nThis is semantically equivalent to the following:\n\n```\nclass\
    \ ClassX:\n    pass\n\nClassX = decorator_function(ClassX)\n```\n\n## 15. COROUTINES\
    \ & ASYNCHRONOUS PROGRAMMING\n\nA coroutine is essentially a generalization of\
    \ a function, or subroutine. A function has a single entry point and, once done\
    \ executing the function’s statements according to its logic, it returns control\
    \ to the caller once and for all. In contrast, coroutines are first entered, and\
    \ they can be paused and resumed multiple times, before they are ultimately terminated,\
    \ or closed.\n\nMost modern programming languages support some kind of coroutines.\
    \ Python has seen a few different incarnations of coroutines in the past several\
    \ years. In Python, coroutines were initially designed, and implemented, as a\
    \ generalization of generators. Now, the newer `async def` based coroutines (and,\
    \ tasks and futures) are the ones that should be used moving forward. The generator-based\
    \ coroutine syntax is deprecated at this point (although the internal implementations\
    \ are still based on generators).\n\n### 15.1. Generators\n\nAs indicated, Python\
    \ includes a number of builtin types. Python also has quite a few \"duck types\"\
    \ defined in the standard modules such as collections.abc, which are primarily\
    \ used to add some (ad-hoc) structure to the otherwise dynamically typed Python\
    \ programming language. We have seen some examples throughout this reference,\
    \ including iterable and callable, etc.\n\n> The typing module is another example\
    \ of an ongoing effort to add more \"structures\" to the Python's dynamic type\
    \ system. The type hints can be used to aid static type checking during the Python\
    \ software development process.\n\nIn this and the next couple of sections, we\
    \ will briefly take a look at iterators and generators before we move on to the\
    \ main topic of coroutines for the rest of the chapter.\n\n#### 15.1.1. Iterators\n\
    \nCollection objects like lists, tuples, and dictionaries that can be used with\
    \ the for loop, for instance, are \"iterables\". A type that implements the dunder\
    \ method `__iter__` is an iterable. Objects of iterable types are iterable, as\
    \ we have seen throughout this reference.\n\nWhen the builtin function `iter()`\
    \ is called with an iterable object (with an `__iter__` method), it returns an\
    \ object of an iterator type. An iterator implements `__iter__` and `__next__`\
    \ methods. Hence, an iterator is also an iterable. (Internally, an iterable object\
    \ and the object's iterator object usually share the same (stream of) data.)\n\
    \nRepeatedly calling the builtin `next()` function with an iterator object (which\
    \ calls the object's `__next__` method) returns the successive items in the object.\
    \ When no more item is available, e.g., when it reaches the end of the data stream,\
    \ a `StopIteration` exception is raised.\n\nHere's a simple class that is an iterator:\n\
    \n```\nclass ABC:\n    def __init__(self):\n        self.pointer = 0\n       \
    \ self.list = ('A', 'B', 'C')\n\n    def __iter__(self):\n        return self\n\
    \n    def __next__(self):\n        if self.pointer >= len(self.list):\n      \
    \      raise StopIteration\n\n        val = self.list[self.pointer]\n        self.pointer\
    \ += 1\n        return val\n```\n\nIt has an `__iter__` method defined. Hence,\
    \ it is also an iterable.\n\nThe type ABC implements both `__iter__` and `__next__`\
    \ methods, and therefore it is an iterator.\n\nAn object of this class can be\
    \ used anywhere iterator, or iterable, is expected. For example,\n\n```\n>>> abc\
    \ = ABC()\n>>> for i in abc:\n...     print(i)\n...\nA\nB\nC\n```\n\n`abc` is\
    \ an iterable object with an `__iter__` method, which returns an iterator (the\
    \ same object, in this example).\n\nThe for statement uses the iterator's `__next__`\
    \ method to iterate over the data in `abc`. This is a very general pattern (e.g.,\
    \ as in \"design pattern\") that many of the modern programming languages use,\
    \ not just Python. Once the for statement catches a `StopIteration`, it exits\
    \ the loop. (This is hidden in the for statement implementation.)\n\n#### 15.1.2.\
    \ Generator functions\n\nGenerator functions (synchronous or asynchronous) and\
    \ coroutines are rather similar to each other. They can have more than one entry\
    \ point, they can yield multiple times, and their execution can be suspended and\
    \ resumed.\n\n- When a *generator function* is called, it returns a *generator\
    \ object* of an iterator type, which then controls the execution of the generator\
    \ function.\n- When an asynchronous generator function is called, it returns an\
    \ asynchronous iterator known as an *async generator object*, which then controls\
    \ the execution of the asynchronous generator function.\n\n### 15.2. yield Expressions\n\
    \nA yield expression is used when defining a *generator function* or *asynchronous\
    \ generator function*.\n\n> Python also has a yield statement, which is semantically\
    \ equivalent to a (newer) yield expression. There is little difference between\
    \ the yield simple statement and the yield expression statement.\n\nA function\
    \ that includes a yield expression/statement in the function body is, *by definition*,\
    \ a generator function. Likewise, an `async def` function that includes a yield\
    \ expression/statement is an asynchronous generator function.\n\nFor example,\n\
    \n```\n>>> def a():\n...     yield 1\n...     yield 2\n...\n>>> for i in a():\n\
    ...     print(i)\n...\n1\n2\n```\n\n`a` is (automatically) a generator function\
    \ since it includes yield expressions (or, statements).\n\nA yield expression/statement\
    \ behaves like a return statement. But it does not terminate the function execution.\
    \ Instead, it temporarily yields the control to the caller, and when it is called\
    \ again, it resumes the execution from *after the last executed* yield. Note that\
    \ the `a` function need not explicitly provide the implementations of, for example,\
    \ the `__iter__` method.\n\nThis is the last yield statement in the generator\
    \ function `a`, and since there is no more statements after this statement, `a`,\
    \ or its generator object, will throw a `StopIteration` exception when it is resumed\
    \ again.\n\nWhen called, `a()` returns a *generator object*, which is an iterator.\
    \ Note that the returned generator object implicitly implements `__iter__` and\
    \ `__next__` methods. In other words, a generator function hides the complexity\
    \ of having to implement an iterator directly (e.g., as we illustrated in the\
    \ previous section).\n\nHere's an example of an `async` generator function:\n\n\
    ```\n>>> async def b():\n...     yield 'a'\n...     yield 'b'\n...\n>>> async\
    \ def c():\n...     async for i in b():\n...         print(i)\n...\n>>> import\
    \ asyncio\n>>> asyncio.run(c())\na\nb\n```\n\nPython creates `b` as an async generator\
    \ function (since it is an `async def` function that includes yield expressions/statements).\n\
    \nAs we discuss later in this chapter, `async` statements, like the `async for`\
    \ in the first line in the function body, can only be used in async functions.\
    \ We declare `c` as an async function.\n\nCalling `b()` returns an async generator\
    \ object, which can be used in the `async for` loop.\n\nAlthough `async` and `await`\
    \ are Python keywords, much of the asynchronous programming support is included\
    \ in the standard library `asyncio` module.\n\nAn async function can be run using\
    \ the `asyncio.run` function.\n\n### 15.3. Generator Expressions\n\nA generator\
    \ expression is rather similar to a `comprehension`, not only in syntax but also\
    \ in spirit. A generator *expression* yields a new generator object, using the\
    \ comprehension syntax, except that it uses parentheses. For example,\n\n```\n\
    >>> double = (\n...     x * 2\n...     for x in range(3)\n... )\n>>> for x in\
    \ double:\n...     print(x)\n...\n0\n2\n4\n```"
  mdcn: "## 14.6. 类装饰器\n\n类也可以像[函数被装饰](functions are decorated)的方式一样被装饰。\n\n装饰器表达式的求值规则与函数装饰器相同。装饰器表达式的结果（一个类）随后被绑定回目标类名。\n\
    \n例如，\n\n```\n@decorator_function\nclass ClassX:\n    pass\n```\n\n这在语义上等同于以下代码：\n\
    \n```\nclass ClassX:\n    pass\n\nClassX = decorator_function(ClassX)\n```\n\n\
    ## 15. 协程与异步编程\n\n协程本质上是函数或子程序的泛化。一个函数只有一个入口点，一旦根据其逻辑执行完函数语句，它就会将控制权一次性地返回给调用者。相比之下，协程首先被进入，它们可以被多次暂停和恢复，然后才会最终终止或关闭。\n\
    \n大多数现代编程语言都支持某种形式的协程。在过去几年里，Python 中出现了几种不同的协程实现形式。在 Python 中，协程最初是作为生成器的泛化来设计和实现的。现在，应该使用的是基于\
    \ `async def` 的新式协程（以及任务和未来对象）。基于生成器的协程语法在此时已被弃用（尽管其内部实现仍然基于生成器）。\n\n### 15.1.\
    \ 生成器\n\n如前所述，Python 包含许多内置类型。Python 在标准模块（如 `collections.abc`）中也定义了不少“鸭子类型”，主要用于为原本动态类型的\
    \ Python 编程语言添加一些（临时的）结构。我们在本参考手册中已经看到了一些例子，包括可迭代对象和可调用对象等。\n\n> `typing` 模块是另一个持续努力为\
    \ Python 动态类型系统添加更多“结构”的例子。类型提示可用于在 Python 软件开发过程中辅助静态类型检查。\n\n在本节和接下来的几节中，我们将在进入本章剩余部分的主要主题——协程之前，简要地看一下迭代器和生成器。\n\
    \n#### 15.1.1. 迭代器\n\n像列表、元组和字典这样的集合对象，例如，可以与 `for` 循环一起使用，它们是“可迭代的”。实现了魔术方法 `__iter__`\
    \ 的类型是可迭代的。可迭代类型的对象是可迭代的，正如我们在本参考手册中所见。\n\n当使用一个可迭代对象（具有 `__iter__` 方法）调用内置函数\
    \ `iter()` 时，它返回一个迭代器类型的对象。迭代器实现了 `__iter__` 和 `__next__` 方法。因此，迭代器也是可迭代的。（在内部，可迭代对象和该对象的迭代器对象通常共享相同的数据流。）\n\
    \n使用迭代器对象（调用该对象的 `__next__` 方法）重复调用内置的 `next()` 函数，会返回对象中的连续项。当没有更多项可用时，例如，当到达数据流末尾时，会引发\
    \ `StopIteration` 异常。\n\n这是一个简单的迭代器类：\n\n```\nclass ABC:\n    def __init__(self):\n\
    \        self.pointer = 0\n        self.list = ('A', 'B', 'C')\n\n    def __iter__(self):\n\
    \        return self\n\n    def __next__(self):\n        if self.pointer >= len(self.list):\n\
    \            raise StopIteration\n\n        val = self.list[self.pointer]\n  \
    \      self.pointer += 1\n        return val\n```\n\n它定义了一个 `__iter__` 方法。因此，它也是一个可迭代的。\n\
    \n类型 ABC 实现了 `__iter__` 和 `__next__` 方法，因此它是一个迭代器。\n\n这个类的对象可以在任何需要迭代器或可迭代对象的地方使用。例如，\n\
    \n```\n>>> abc = ABC()\n>>> for i in abc:\n...     print(i)\n...\nA\nB\nC\n```\n\
    \n`abc` 是一个具有 `__iter__` 方法的可迭代对象，该方法返回一个迭代器（在本例中是同一个对象）。\n\n`for` 语句使用迭代器的 `__next__`\
    \ 方法来遍历 `abc` 中的数据。这是许多现代编程语言（不仅仅是 Python）使用的一种非常通用的模式（例如，如“设计模式”中所示）。一旦 `for`\
    \ 语句捕获到 `StopIteration`，它就会退出循环。（这隐藏在 `for` 语句的实现中。）\n\n#### 15.1.2. 生成器函数\n\n\
    生成器函数（同步或异步）和协程彼此非常相似。它们可以有多个入口点，可以多次产出，并且它们的执行可以被挂起和恢复。\n\n- 当调用一个*生成器函数*时，它返回一个迭代器类型的*生成器对象*，该对象随后控制生成器函数的执行。\n\
    - 当调用一个异步生成器函数时，它返回一个异步迭代器，称为*异步生成器对象*，该对象随后控制异步生成器函数的执行。\n\n### 15.2. yield 表达式\n\
    \n在定义*生成器函数*或*异步生成器函数*时使用 yield 表达式。\n\n> Python 还有一个 yield 语句，它在语义上等同于（较新的）yield\
    \ 表达式。yield 简单语句和 yield 表达式语句之间几乎没有区别。\n\n在函数体中包含 yield 表达式/语句的函数，*根据定义*，是一个生成器函数。同样，包含\
    \ yield 表达式/语句的 `async def` 函数是一个异步生成器函数。\n\n例如，\n\n```\n>>> def a():\n...   \
    \  yield 1\n...     yield 2\n...\n>>> for i in a():\n...     print(i)\n...\n1\n\
    2\n```\n\n`a`（自动）是一个生成器函数，因为它包含 yield 表达式（或语句）。\n\nyield 表达式/语句的行为类似于 return 语句。但它不会终止函数执行。相反，它暂时将控制权让给调用者，当再次被调用时，它会从*上次执行的*\
    \ yield 之后恢复执行。请注意，`a` 函数无需显式提供，例如，`__iter__` 方法的实现。\n\n这是生成器函数 `a` 中的最后一个 yield\
    \ 语句，并且由于此语句之后没有更多语句，`a` 或其生成器对象在再次恢复时将抛出 `StopIteration` 异常。\n\n调用时，`a()` 返回一个*生成器对象*，它是一个迭代器。请注意，返回的生成器对象隐式地实现了\
    \ `__iter__` 和 `__next__` 方法。换句话说，生成器函数隐藏了必须直接实现迭代器的复杂性（例如，正如我们在上一节中所演示的）。\n\n\
    这是一个 `async` 生成器函数的示例：\n\n```\n>>> async def b():\n...     yield 'a'\n...    \
    \ yield 'b'\n...\n>>> async def c():\n...     async for i in b():\n...       \
    \  print(i)\n...\n>>> import asyncio\n>>> asyncio.run(c())\na\nb\n```\n\nPython\
    \ 将 `b` 创建为一个异步生成器函数（因为它是一个包含 yield 表达式/语句的 `async def` 函数）。\n\n正如我们将在本章后面讨论的，`async`\
    \ 语句，如函数体第一行中的 `async for`，只能在异步函数中使用。我们将 `c` 声明为一个异步函数。\n\n调用 `b()` 返回一个异步生成器对象，该对象可以在\
    \ `async for` 循环中使用。\n\n尽管 `async` 和 `await` 是 Python 关键字，但大部分异步编程支持都包含在标准库 `asyncio`\
    \ 模块中。\n\n异步函数可以使用 `asyncio.run` 函数运行。\n\n### 15.3. 生成器表达式\n\n生成器表达式与*推导式*非常相似，不仅在语法上，而且在精神上。生成器*表达式*使用推导式语法产出一个新的生成器对象，只是它使用圆括号。例如，\n\
    \n```\n>>> double = (\n...     x * 2\n...     for x in range(3)\n... )\n>>> for\
    \ x in double:\n...     print(x)\n...\n0\n2\n4\n```"
