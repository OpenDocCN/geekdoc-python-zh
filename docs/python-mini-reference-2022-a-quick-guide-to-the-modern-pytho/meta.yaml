    \n`module` 模块对象的类型是 `module`。\n\n`import` 语句的内部实现以及其他与导入相关的实用函数，都由标准库模块 `importlib`\
    \ 提供。\n\n### 4.2. 包\n\n为了帮助组织模块，Python 引入了包的概念。包是一种特殊的模块，它提供了一个命名空间/命名层次结构。从技术上讲，包是包含\
    \ `__path__` 属性的模块。\n\n如果使用脚本调用 Python 解释器，那么一个包对应于文件系统上的一个目录，而一个常规的非包模块对应于一个\
    \ Python 源文件。像文件系统目录一样，包是分层组织的，包可以包含其他包以及常规模块。\n\n每个模块都有一个名称。子包名称与其父包名称用点（.）分隔。模块的\
    \ `__name__` 属性被设置为模块的完全限定名。模块的限定名用于在 Python 导入系统中唯一标识模块。\n\nPython 中有两种包：“常规包”和“命名空间包”。\n\
    \n#### 4.2.1. 常规包\n\n常规包通常实现为一个包含 `__init__.py` 文件的目录。当导入一个常规包时，该包及其所有父包的 `__init__.py`\
    \ 文件会被隐式执行。在每个包的 `__init__.py` 文件中定义的对象被绑定到该包命名空间中的名称。\n\n#### 4.2.2. 命名空间包\n\n\
    隐式命名空间包是一个（虚拟的）复合包，它可以包含来自文件系统不同位置的子包（例如，不受目录层次结构的限制）。\n\n使用命名空间包时，没有包 `__init__.py`\
    \ 文件。与常规包不同，一个命名空间包可能对应于多个目录。例如，当导入包 `parent/one` 和 `parent/two`，而没有与父模块对应的物理目录时，Python\
    \ 会自动为顶级父包创建一个命名空间包。"
