    # The @property decorator


    A "property" in Python is an abstract construct that behaves like a data attribute
    of an object, e.g., with a getter, setter, and deleter, and a docstring, etc.


    A property can be created using the `property` constructor function. Alternatively,
    the `@property` decorator can be used to easily define new properties, or modify
    existing ones, in a class definition. For example,


    ```

    >>> class X:

    ...     def __init__(self):

    ...         self._a = 10

    ...     @property

    ...     def a(self):

    ...         "I am the ''a'' property."

    ...         return f"Magical {self._a}"

    ...     @a.setter

    ...     def a(self, value):

    ...         self._a = value

    ...     @a.deleter

    ...     def a(self):

    ...         print("Urghhh, I am being deleted...")

    ...         del self._a

    ```'
