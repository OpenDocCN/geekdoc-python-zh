- md: "If there is a saved exception it is re-raised at the end of the `finally` clause.\
    \ If the `finally` clause raises another exception, the saved exception is set\
    \ as the context of the new exception. If the `finally` clause executes a return,\
    \ break or continue statement, the saved exception is discarded.\n\nThe exception\
    \ information is not available to the program during execution of the finally\
    \ clause.\n\nWhen a return, break or continue statement is executed in the try\
    \ suite of a try...finally statement, the finally clause is also executed 'on\
