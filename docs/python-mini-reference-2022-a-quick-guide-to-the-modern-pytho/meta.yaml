    There are two kinds of packages in Python, "regular packages" and "namespace packages".


    # 4.2.1. Regular packages


    A regular package is typically implemented as a directory containing an `__init__.py`
    file. When a regular package is imported, the `__init__.py` files of the package
    and all of its parent packages are implicitly executed. The objects defined in
    each package’s `__init__.py` file are bound to names in the package’s namespace.


    # 4.2.2. Namespace packages


    An implicit namespace package is a (virtual) composite package that can include
    subpackages from different locations in the file system (e.g., not constrained
    by the directory hierarchy).


    With namespace packages, there is no package `__init__.py` file. A namespace package
    may correspond to multiple directories unlike the regular packages. For example,
    when the packages parent/one and parent/two are imported with no physical directory
    corresponding to the parent module, Python automatically creates a namespace package
    for the top-level parent package.'
- md: "## 4.3. Package Relative Imports\n\nRelative imports use leading dots (.).\
    \ A single leading dot indicates a relative import, starting with the current\
    \ package. Two leading dots indicate a relative import of the parent to the current\
    \ package, etc.\n\nAbsolute imports may use either the `import X.Y` or `from X\
    \ import Y` syntax, but relative imports may only use the second form. For instance,\
    \ from a given Python script/module `xyz` in a folder `bbb`,\n\nListing 2. aaa/bbb/xyz.py\n\
    \n```\nfrom . import efg\nfrom .hij import klm\nfrom .. import mno\nfrom ..opq.qrs\
    \ import stu\n```\n\n- The module `efg` corresponds to a file `aaa/bbb/efg.py`.\n\
    - The module `klm` corresponds to a file `aaa/bbb/hij/klm.py`.\n- The module `mno`\
    \ corresponds to a file `aaa/mno.py`.\n- The module `stu` corresponds to a file\
    \ `aaa/opq/qrs/stu.py`.\n\n## 5. PYTHON SOURCE CODE\n\nThe Python interpreter\
    \ reads program text as Unicode code points. The encoding of a Python source code\
    \ file is \"UTF-8\" by default. The source file can also be given an explicit\
    \ encoding declaration. If an encoding is declared, the encoding name must be\
    \ recognized by Python. If the text cannot be decoded, then a SyntaxError exception\
    \ is raised.\n\nThe Python interpreter first breaks a source file into \"tokens\"\
    , which are then fed into the parser.\n\n### 5.1. Line Structure\n\nPython programs\
    \ are \"line-based\". A Python source code consists of \"logical lines\".\n\n\
    #### 5.1.1. Logical lines\n\nA statement is normally contained in a logical line,\
    \ whose end is represented by the NEWLINE token. A compound statement can be in\
    \ multiple logical lines if that is permitted by the Python grammar.\n\nA logical\
    \ line is constructed from one or more \"physical line\".\n\n#### 5.1.2. Physical\
    \ lines\n\nA physical line is a sequence of characters terminated by an end-of-line\
    \ sequence. In Python source files and strings, any one of the three standard\
    \ line termination sequences can be used, \\n, \\r\\n, or \\r, regardless of platform.\
    \ The end of input also serves as an implicit terminator for the final physical\
    \ line.\n\n#### 5.1.3. Comments\n\nA comment starts with a hash character (#)\
    \ and it continues until the end of the physical line. Comments are mostly ignored\
    \ by the syntax. A comment can signify the end of a logical line, that is, a NEWLINE\
    \ token is generated unless the implicit line joining rules are invoked.\n\n####\
    \ 5.1.4. Blank Lines\n\nA logical line that contains only spaces, tabs, formfeeds\
    \ and possibly a comment, is ignored.\n\n#### 5.1.5. Physical line joining\n\n\
    Explicit joining\n\nTwo or more physical lines may be joined into a logical line\
    \ using backslash characters (\\).\n\nWhen a physical line ends with a backslash,\
    \ it is joined with the following line forming a single logical line, deleting\
    \ the backslash and the following end-of-line character.\n\n- A backslash is not\
    \ allowed anywhere else on a line outside a string literal or a comment.\n- A\
    \ backslash cannot split a token across physical lines except for string literals.\n\
    - A backslash does not continue a comment.\n\nFor example,\n\n```\n>>> a, b =\
    \ \\\n... 10, 20\n```\n\nThis is one logical line, a, b = 10, 20, although it\
    \ is written on two physical lines. Note that no other characters, including white\
    \ spaces, are allowed after the backslash other than one of the three line termination\
    \ sequences.\n\nImplicit joining\n\nExpressions in parentheses ((...)), square\
    \ brackets ([...]), or curly braces ({...}), as well as triple-quoted strings\
    \ (\"\"\"...\"\"\" or '''...'''), can be split over more than one physical line\
    \ without using backslashes.\n\nThe implicitly continued lines can carry comments\
    \ except for triple-quoted multiline strings. The indentation of the continuation\
    \ lines is not important. Blank continuation lines are allowed.\n\nFor instance,\n\
    \n```\n>>> fruits = [\n...     \"manzana\",    # apple\n...     \"naranja\", \
    \   # orange\n... ]\n>>> print(\n...     fruits\n... )\n['manzana', 'naranja']\n\
    ```\n\n- The start of an implicit joining.\n- Comments are allowed.\n- The end\
    \ of a logical line.\n- The start of another implicit joining.\n- An empty physical\
    \ line.\n- The end of a logical line. This statement is equivalent to print(fruits)\
    \ in one physical line.\n\nNote that since parentheses can be used to group expressions,\
    \ practically any expression can be split into multiple physical lines.\n\n####\
    \ 5.1.6. Indentations\n\nIn Python, the indentations of the logical lines are\
    \ used to determine the grouping of statements.\n\nThe indentation level of a\
    \ line is computed based on the leading whitespace at the beginning of the line.\
    \ The total number of spaces preceding the first non-blank character determines\
    \ the line’s indentation.\n\nThe Python lexical analyzer generates INDENT and\
    \ DEDENT tokens, using a stack, based on the indentation levels of consecutive\
    \ logical lines, which are then used to group logical lines into statements.\n\
    \n### 5.2. Tokens\n\nBesides NEWLINE, INDENT and DEDENT, Python has the following\
    \ categories of tokens: *identifiers*, *keywords*, *literals*, *operators*, and\
    \ *delimiters*.\n\n### 5.3. Identifiers and Keywords\n\nThe syntax of identifiers,\
    \ or names, in Python is based on the Unicode standard. Identifiers are unlimited\
    \ in length and they are case-sensitive. Within the ASCII range (U+0001..U+007F),\
    \ the names can include the alphanumeric characters and the underscore (_). The\
    \ names cannot start with digits. Outside the ASCII range, the unicodedata module\
    \ classifies the characters which are valid in identifiers.\n\n#### 5.3.1. Keywords\n\
    \nThe following names are used as reserved words, or keywords of the language,\
    \ and they cannot be used as ordinary identifiers.\n\n- False True None and as\
    \ assert async await break class continue def del elif else except from finally\
    \ for global if import in is lambda nonlocal not or pass raise return try while\
    \ with yield\n\n#### 5.3.2. Reserved classes of identifiers\n\nIn addition to\
    \ keywords, certain classes of identifiers have special meanings to Python. These\
    \ classes are identified by the patterns of leading and trailing underscore characters:\n\
    \n- `_`\n    The special identifier _ is used in the interactive interpreter to\
    \ store the result of the last evaluation.\n- `_xyz`\n    Not imported by `from\
    \ module import *`.\n- `__xyz__`\n    System-defined names, informally known as\
    \ \"dunder names\". These names are defined by the interpreter and its implementation\
    \ (including the standard library).\n- `__xyz`\n    Class-private names. When\
    \ used in a class definition, these names are re-written to use a mangled form\
    \ to help avoid name clashes between \"private\" attributes of base and derived\
    \ classes.\n\n### 5.4. Literals\n\n\"Literals\" are a particular class of tokens\
    \ that have special meanings to the lexer, other than identifiers and other special\
    \ tokens. Usually, literals are constant values of some built-in types.\n\n####\
    \ 5.4.1. String and bytes literals\n\nString and bytes literals can be enclosed\
    \ in matching single quotes (') or double quotes (\"\"\"). They can also be enclosed\
    \ in matching groups of three single (''') or double (\"\"\"\") quotes.\n\nThe\
    \ backslash (\\) character is used within string and bytes literals to \"escape\"\
    \ characters that otherwise have special meanings, such as newline, backslash\
    \ itself, or the quote characters.\n\nBytes literals, instances of the bytes type,\
    \ are always prefixed with 'b' or 'B'. They may only contain ASCII characters.\
    \ Both string and bytes literals may optionally be prefixed with a letter 'r'/'R'.\
    \ Such literals are called raw strings and treat backslashes as literal characters.\n\
    \n#### 5.4.2. Formatted string literals\n\nA *formatted string literal*, or *f-string*\
    \ for short, is a string literal with prefix 'f' or 'F'. These strings may contain\
    \ replacement fields, which are variables or expressions enclosed in curly braces\
    \ {}. A format specifier may be added, after an optional colon :.\n\nWhile other\
    \ string literals always have constant values, f-strings are really expressions\
    \ evaluated at run time.\n\nAn equal sign = can be added after the expression\
    \ and before the colon and format string, if any. When it is included, the result\
    \ string will have the expression text, the = sign, and the evaluated value, concatenated.\n\
    \nFor example,\n\n```\n>>> a = 10 / 7\n>>> f\"{a}\"\n'1.4285714285714286'\n>>>\
    \ f\"a = {a:.5f}\"\n'a = 1.42857'\n>>> f\"{a=}\", f\"{10/7=:.5f}\"\n('a=1.4285714285714286',\
    \ '10/7=1.42857')\n```\n\n- A simple f-string.\n- The replacement field has a\
    \ format specifier, .5f, after :.\n- The equal sign prints out the expression\
    \ text, followed by =, before the value.\n\n#### 5.4.3. String literal concatenation"
  mdcn: "## 4.3. 包相对导入\n\n相对导入使用前导点（`.`）。单个前导点表示从当前包开始的相对导入。两个前导点表示从当前包的父包开始的相对导入，以此类推。\n\
    \n绝对导入可以使用 `import X.Y` 或 `from X import Y` 语法，但相对导入只能使用第二种形式。例如，对于文件夹 `bbb` 中给定的\
    \ Python 脚本/模块 `xyz`，\n\n清单 2. aaa/bbb/xyz.py\n\n```\nfrom . import efg\nfrom\
    \ .hij import klm\nfrom .. import mno\nfrom ..opq.qrs import stu\n```\n\n- 模块\
    \ `efg` 对应文件 `aaa/bbb/efg.py`。\n- 模块 `klm` 对应文件 `aaa/bbb/hij/klm.py`。\n- 模块 `mno`\
    \ 对应文件 `aaa/mno.py`。\n- 模块 `stu` 对应文件 `aaa/opq/qrs/stu.py`。\n\n## 5. PYTHON 源代码\n\
    \nPython 解释器将程序文本读取为 Unicode 码点。Python 源代码文件的默认编码是 \"UTF-8\"。源文件也可以给出显式的编码声明。如果声明了编码，则编码名称必须能被\
    \ Python 识别。如果文本无法解码，则会引发 SyntaxError 异常。\n\nPython 解释器首先将源文件分解为“词法单元”，然后将其输入解析器。\n\
    \n### 5.1. 行结构\n\nPython 程序是“基于行”的。Python 源代码由“逻辑行”组成。\n\n#### 5.1.1. 逻辑行\n\n\
    一条语句通常包含在一个逻辑行中，其结尾由 NEWLINE 词法单元表示。如果 Python 语法允许，复合语句可以跨越多个逻辑行。\n\n一个逻辑行由一个或多个“物理行”构成。\n\
    \n#### 5.1.2. 物理行\n\n物理行是以行结束序列终止的字符序列。在 Python 源文件和字符串中，无论平台如何，都可以使用三种标准行终止序列中的任何一种：\\\
    n、\\r\\n 或 \\r。输入的结束也作为最后一个物理行的隐式终止符。\n\n#### 5.1.3. 注释\n\n注释以井号字符（#）开头，并持续到物理行的末尾。语法通常忽略注释。注释可以表示逻辑行的结束，即，除非调用了隐式行连接规则，否则会生成一个\
    \ NEWLINE 词法单元。\n\n#### 5.1.4. 空行\n\n仅包含空格、制表符、换页符，可能还有注释的逻辑行会被忽略。\n\n#### 5.1.5.\
    \ 物理行连接\n\n显式连接\n\n可以使用反斜杠字符（\\）将两个或多个物理行连接成一个逻辑行。\n\n当一个物理行以反斜杠结尾时，它会与下一行连接，形成一个单一的逻辑行，同时删除反斜杠和随后的行结束字符。\n\
    \n- 除了在字符串字面量或注释中，反斜杠不允许出现在行上的任何其他位置。\n- 除了字符串字面量，反斜杠不能将一个词法单元分割到多个物理行上。\n- 反斜杠不会延续注释。\n\
    \n例如，\n\n```\n>>> a, b = \\\n... 10, 20\n```\n\n这是一个逻辑行，a, b = 10, 20，尽管它写在两个物理行上。请注意，除了三种行终止序列之一外，反斜杠后不允许有其他任何字符，包括空格。\n\
    \n隐式连接\n\n括号（(...)）、方括号（[...]）或花括号（{...}）中的表达式，以及三引号字符串（\"\"\"...\"\"\" 或 '''...'''），可以分割在多个物理行上，而无需使用反斜杠。\n\
    \n隐式延续的行可以携带注释，但三引号多行字符串除外。延续行的缩进并不重要。允许空的延续行。\n\n例如，\n\n```\n>>> fruits = [\n\
    ...     \"manzana\",    # apple\n...     \"naranja\",    # orange\n... ]\n>>>\
    \ print(\n...     fruits\n... )\n['manzana', 'naranja']\n```\n\n- 隐式连接的开始。\n-\
    \ 允许注释。\n- 逻辑行的结束。\n- 另一个隐式连接的开始。\n- 一个空的物理行。\n- 逻辑行的结束。此语句等效于在一个物理行中的 print(fruits)。\n\
    \n请注意，由于括号可用于对表达式进行分组，实际上任何表达式都可以分割成多个物理行。\n\n#### 5.1.6. 缩进\n\n在 Python 中，逻辑行的缩进用于确定语句的分组。\n\
    \n一行的缩进级别是根据行首的前导空白计算的。第一个非空白字符之前的空格总数决定了该行的缩进。\n\nPython 词法分析器使用一个栈，根据连续逻辑行的缩进级别生成\
    \ INDENT 和 DEDENT 词法单元，然后用于将逻辑行分组为语句。\n\n### 5.2. 词法单元\n\n除了 NEWLINE、INDENT 和\
