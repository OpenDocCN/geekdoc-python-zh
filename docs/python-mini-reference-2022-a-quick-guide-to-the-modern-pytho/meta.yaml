    # 5.1.2. Physical lines


    A physical line is a sequence of characters terminated by an end-of-line sequence.
    In Python source files and strings, any one of the three standard line termination
    sequences can be used, \n, \r\n, or \r, regardless of platform. The end of input
    also serves as an implicit terminator for the final physical line.


    # 5.1.3. Comments


    A comment starts with a hash character (#) and it continues until the end of the
    physical line. Comments are mostly ignored by the syntax. A comment can signify
    the end of a logical line, that is, a NEWLINE token is generated unless the implicit
    line joining rules are invoked.


    # 5.1.4. Blank Lines


    A logical line that contains only spaces, tabs, formfeeds and possibly a comment,
    is ignored.


    # 5.1.5. Physical line joining


    Explicit joining


    Two or more physical lines may be joined into a logical line using backslash characters
    (\).'
