    # 11.1. The if-elif-else Statement


    The if statement is used for conditional execution. It selects at most one of
    the suites by evaluating the if/elif expressions one by one, from top to bottom,
    until one is found to be True. Then the corresponding suite is executed (and no
    other part of the if compound statement is executed or evaluated). If all expressions
    are False, then the suite of the else clause, if present, is executed.'
