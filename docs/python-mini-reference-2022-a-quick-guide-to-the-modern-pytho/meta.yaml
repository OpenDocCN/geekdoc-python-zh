    \nThe docstring is stored in the function object's `__doc__` attribute.\n\nCalling\
    \ this function with 1 and 2. It returns 3.\n\n## 13.2. Function Parameters\n\n\
    A function can be defined with zero, one, or more parameters. There are three\
