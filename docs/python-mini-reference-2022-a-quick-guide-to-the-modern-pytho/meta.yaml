    \nPython 不需要这种多态性。Python 是一种动态类型编程语言。尽管 Python 多年来从 OOP 语言中借鉴了许多特性，但类（及其支持特性，如继承）的主要目的是将其用作对象的模板或原型，即创建多个“结构等效”的对象。许多支持某种“类”的动态编程语言，如\
