    \ X.__call__ = lambda self: 42\n>>> callable(x)\nTrue\n>>> dir(x)\n['__call__',\
    \ ...]\n>>> x()\n42\n```\n\nâ` A new type X is created with a [class statement](https://docs.python.org/3/reference/compound_stmts.html#class).\n\
    \nâ`i X is a class object, and hence it is callable. It returns an instance object\
    \ of type X, that is, x in this example.\n\nâ`ç The builtin callable() function\
    \ can be used to check if an object is callable. x is not callable.\n\nâ`£ Trying\
