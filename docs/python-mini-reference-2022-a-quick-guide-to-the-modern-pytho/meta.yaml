- md: "## 13.8.1. Built-in decorators\n\n### The @property decorator\n\nA \"property\"\
    \ in Python is an abstract construct that behaves like a data attribute of an\
    \ object, e.g., with a getter, setter, and deleter, and a docstring, etc.\n\n\
    A property can be created using the `property` constructor function. Alternatively,\
    \ the `@property` decorator can be used to easily define new properties, or modify\
    \ existing ones, in a class definition. For example,\n\n```python\n>>> class X:\n\
    ...     def __init__(self):\n...         self._a = 10\n...     @property\n...\
    \     def a(self):\n...         \"I am the 'a' property.\"\n...         return\
    \ f\"Magical {self._a}\"\n...     @a.setter\n...     def a(self, value):\n...\
    \         self._a = value\n...     @a.deleter\n...     def a(self):\n...     \
    \    print(\"Urghhh, I am being deleted...\")\n...         del self._a\n```\n\n\
    This creates a property named `a`. The decorated method is used as a \"getter\"\
    \ for the property `a`.\n\nThis method's docstring is used as that of the property\
    \ `a`.\n\nThis sets the decorated method the setter of `a`. That is, `a` can now\
    \ be used on the left-hand side of an [assignment statement](https://docs.python.org/3/reference/simple_stmts.html#assignment-statements)\
    \ or [assignment expression](https://docs.python.org/3/reference/expressions.html#assignment-expressions).\n\
    \nWhen [the del statement](https://docs.python.org/3/reference/simple_stmts.html#the-del-statement)\
    \ is used on the property `a`, the decorated method is called.\n\nLet's try using\
    \ an object of type `X`:\n\n```python\n>>> x = X()\n>>> help(X.a)            \
    \           # \nHelp on property:\n\n    I am the 'a' property.\n(END)\n>>> x.a\
    \                             # \n'Magical 10'\n>>> x.a = 100                \
    \       # \n>>> x.a\n'Magical 100'\n>>> del x.a                         # \nUrghhh,\
    \ I am being deleted...\n>>> x.a                             # \nTraceback (most\
    \ recent call last):\n  File \"<stdin>\", line 1, in <module>\n  File \"<stdin>\"\
    , line 7, in a\nAttributeError: 'X' object has no attribute '_a'. Did you mean:\
    \ 'a'?\n```\n\n`X` has a property `a`, and its docstring is used in the builtin\
    \ `help` function.\n\nThis expression invokes the `a(self)` method decorated with\
    \ `@property`.\n\nThis assignment statement uses the `a(self, value)` method decorated\
    \ with `@a.setter`.\n\nThis `del` statement invokes the `a(self)` method decorated\
    \ with `@a.deleter`.\n\nThe property, or a virtual data attribute, `a`, no longer\
    \ exists at this point.\n\n### The @staticmethod decorator\n\nA \"static method\"\
    \ of a class in Python is similar to those in other OOP languages like C++, Java,\
    \ and C#. It is essentially an independent function although it is defined in\
    \ a class definition.\n\nSyntactically, static methods can be called on the class\
    \ or on an instance, but they do not receive an implicit first argument, e.g.,\
    \ `self`.\n\nThe `@staticmethod` decorator converts a function within a class\
    \ definition to be a static method. For example,\n\n```python\n>>> class Y:\n\
    ...     @staticmethod\n...     def f1():\n...         print(\"I am a static method\"\
    )\n...\n>>> Y.f1()\nI am a static method\n>>> y = Y()\n>>> y.f1()\nI am a static\
    \ method\n```\n\nThis decorator makes the decorated method a static method.\n\n\
    The static method, syntactically, can be called on the class object.\n\nOr, on\
    \ the instance object. Without the `@staticmethod` decorator, a general function\
    \ defined in a class definition cannot use the method call syntax on an instance\
    \ object.\n\n### The @classmethod decorator\n\nA \"class method\" of a class in\
    \ Python is a method defined on a class object, not on an instance. Normal methods\
    \ receive the instance object as an implicit first argument. In contrast, a class\
    \ method receives the class object as the implicit first argument.\n\nSyntactically,\
    \ class methods can be called on the class or instance, just like static methods,\
    \ but they receive the class as its first argument (even when they are called\
    \ on an instance object). If a class method is called for a derived class, the\
    \ derived class object is passed as the implied first argument.\n\nThe `@classmethod`\
    \ decorator converts a function to be a class method. For example,\n\n```python\n\
    >>> class Z:\n...     @classmethod\n...     def f2(cls):\n...         print(f\"\
    Class method: {cls.__name__}\")\n...\n>>> Z.f2()                       # \nClass\
    \ method: Z\n>>> z = Z()\n>>> z.f2()                       # \nClass method: Z\n\
    >>> class Z2(Z): pass\n...\n>>> Z2.f2()                      # \nClass method:\
    \ Z2\n```\n\nThe `@classmethod` decorator makes the decorated method a class method.\n\
    \nWithout the decoration, this would have been a type error.\n\nBy default, methods\
    \ defined in a class is an [instance method](instance method), which takes the\
    \ instance object as the implicit first argument. For class methods, the implicit\
    \ first argument is the class object.\n\nThe implicit class object argument is\
    \ now the subclass `Z2`.\n\n## 14. CLASSES\n\n### 14.1. Class Definition\n\nA\
    \ `class` definition is a compound statement that defines a callable class object.\
    \ When executed, it executes the statements in the class suite, and it creates\
    \ an object of the type `type` in memory as specified by the class definition.\n\
    \nThe general syntax is as follows:\n\n```python\nclass MyType(BaseType1, BaseType2):\n\
    \    Suite\n```\n\nThe keyword `class` starts the statement, followed by the new\
    \ class name (e.g, `MyType` in this example) and an optional list of one or more\
    \ base classes in the parentheses (e.g., `BaseType1`, `BaseType2`, etc.). Python\
    \ supports \"[multiple inheritance](https://docs.python.org/3/tutorial/classes.html#multiple-inheritance)\"\
    .\n\nWhen no base class list is specified, the class inherits from the ultimate\
    \ base class `object`. In such a case, the parentheses after the class name can\
    \ be omitted. That is,\n\n```python\nclass Orange:\n    pass\n```\n\nThis definition\
    \ is equivalent to the following:\n\n```python\nclass Orange(object):\n    pass\n\
    ```\n\n- A class definition creates a local namespace, nested within the global\
    \ namespace, and the statements in the class’s suite are executed in the newly\
    \ created execution frame.\n- A class object is then created, inherited from the\
    \ base classes as (explicitly or implicitly) specified in the base class list,\
    \ and using the newly created local namespace for the class’s `__dict__` attribute.\n\
    - The class name, as defined in the class definition statement, is then bound\
    \ to this class object in the original local namespace (which can be the global\
    \ namespace).\n\n### 14.2. Classes and Instances\n\nPython’s class is just an\
    \ object (with some special features). But, in Python programming, it plays the\
    \ role of classes in other \"class-based\" object oriented programming (OOP) languages.\
    \ If nothing else, using classes can help create more modular and more structured\
    \ Python programs, whose components can be more easily reusable, etc. In many\
    \ problem domains, thinking in terms of \"classes\" and \"objects\" (in the sense\
    \ of the OOP) can be rather natural and intuitive.\n\nJust like function definitions,\
    \ a class definition includes a series of statements. Most class definitions primarily\
    \ include the definitions of variables (e.g., \"class variables\") and functions\
    \ (e.g., \"static methods\", \"class methods\", and \"instance methods\").\n\n\
    When a class definition is read/executed by the Python interpreter, these statements\
    \ are executed. For example,\n\n```python\n>>> class X(object):\n...     if True:\n\
    ...         print(True)\n...     else:\n...         print(False)\n...\nTrue\n\
    ```\n\nThis is the output of the `if` statement. Unlike the function definitions,\
    \ Python executes all statements in the class definition scope while creating\
    \ a class object.\n\nA class definition is somewhat similar to a \"module\". These\
    \ class suite statements are only executed for the first time when the class statement\
    \ is executed (e.g., when the Python interpreter reads the statement). When we\
    \ *use* the \"class object\" (e.g., to create an instance object of that class),\
    \ these statements are not executed. For instance,\n\n```python\n>>> x = X()\n\
    ```"
  mdcn: "## 13.8.1. 内置装饰器\n\n### @property 装饰器\n\nPython 中的“属性”是一种抽象构造，其行为类似于对象的数据属性，例如，具有\
    \ getter、setter、deleter 以及文档字符串等。\n\n属性可以使用 `property` 构造函数创建。或者，也可以使用 `@property`\
    \ 装饰器在类定义中轻松地定义新属性或修改现有属性。例如，\n\n```python\n>>> class X:\n...     def __init__(self):\n\
    ...         self._a = 10\n...     @property\n...     def a(self):\n...       \
    \  \"I am the 'a' property.\"\n...         return f\"Magical {self._a}\"\n...\
    \     @a.setter\n...     def a(self, value):\n...         self._a = value\n...\
    \     @a.deleter\n...     def a(self):\n...         print(\"Urghhh, I am being\
    \ deleted...\")\n...         del self._a\n```\n\n这将创建一个名为 `a` 的属性。被装饰的方法用作属性 `a`\
    \ 的“getter”。\n\n此方法的文档字符串用作属性 `a` 的文档字符串。\n\n这将被装饰的方法设置为 `a` 的 setter。也就是说，`a`\
    \ 现在可以在[赋值语句](https://docs.python.org/3/reference/simple_stmts.html#assignment-statements)或[赋值表达式](https://docs.python.org/3/reference/expressions.html#assignment-expressions)的左侧使用。\n\
    \n当对属性 `a` 使用 [del 语句](https://docs.python.org/3/reference/simple_stmts.html#the-del-statement)时，将调用被装饰的方法。\n\
    \n让我们尝试使用一个 `X` 类型的对象：\n\n```python\n>>> x = X()\n>>> help(X.a)              \
    \         # \nHelp on property:\n\n    I am the 'a' property.\n(END)\n>>> x.a\
    \                             # \n'Magical 10'\n>>> x.a = 100                \
    \       # \n>>> x.a\n'Magical 100'\n>>> del x.a                         # \nUrghhh,\
    \ I am being deleted...\n>>> x.a                             # \nTraceback (most\
    \ recent call last):\n  File \"<stdin>\", line 1, in <module>\n  File \"<stdin>\"\
    , line 7, in a\nAttributeError: 'X' object has no attribute '_a'. Did you mean:\
    \ 'a'?\n```\n\n`X` 有一个属性 `a`，其文档字符串在内置的 `help` 函数中使用。\n\n此表达式调用被 `@property` 装饰的\
    \ `a(self)` 方法。\n\n此赋值语句使用被 `@a.setter` 装饰的 `a(self, value)` 方法。\n\n此 `del` 语句调用被\
    \ `@a.deleter` 装饰的 `a(self)` 方法。\n\n此时，属性（或虚拟数据属性）`a` 不再存在。\n\n### @staticmethod\
    \ 装饰器\n\nPython 中类的“静态方法”类似于其他面向对象编程语言（如 C++、Java 和 C#）中的静态方法。它本质上是一个独立的函数，尽管它是在类定义中定义的。\n\
    \n从语法上讲，静态方法可以在类或实例上调用，但它们不接收隐式的第一个参数，例如 `self`。\n\n`@staticmethod` 装饰器将类定义中的函数转换为静态方法。例如，\n\
    \n```python\n>>> class Y:\n...     @staticmethod\n...     def f1():\n...     \
    \    print(\"I am a static method\")\n...\n>>> Y.f1()\nI am a static method\n\
    >>> y = Y()\n>>> y.f1()\nI am a static method\n```\n\n此装饰器使被装饰的方法成为静态方法。\n\n从语法上讲，静态方法可以在类对象上调用。\n\
    \n或者，在实例对象上调用。如果没有 `@staticmethod` 装饰器，在类定义中定义的普通函数不能在实例对象上使用方法调用语法。\n\n### @classmethod\
    \ 装饰器\n\nPython 中类的“类方法”是在类对象上定义的方法，而不是在实例上定义的。普通方法将实例对象作为隐式的第一个参数接收。相反，类方法将类对象作为隐式的第一个参数接收。\n\
    \n从语法上讲，类方法可以在类或实例上调用，就像静态方法一样，但它们接收类作为其第一个参数（即使它们是在实例对象上调用的）。如果为派生类调用类方法，则派生类对象将作为隐式第一个参数传递。\n\
    \n`@classmethod` 装饰器将函数转换为类方法。例如，\n\n```python\n>>> class Z:\n...     @classmethod\n\
    ...     def f2(cls):\n...         print(f\"Class method: {cls.__name__}\")\n...\n\
    >>> Z.f2()                       # \nClass method: Z\n>>> z = Z()\n>>> z.f2()\
    \                       # \nClass method: Z\n>>> class Z2(Z): pass\n...\n>>> Z2.f2()\
    \                      # \nClass method: Z2\n```\n\n`@classmethod` 装饰器使被装饰的方法成为类方法。\n\
    \n如果没有装饰，这将是一个类型错误。\n\n默认情况下，在类中定义的方法是[实例方法](instance method)，它将实例对象作为隐式的第一个参数。对于类方法，隐式的第一个参数是类对象。\n\
    \n隐式的类对象参数现在是子类 `Z2`。\n\n## 14. 类\n\n### 14.1. 类定义\n\n`class` 定义是一个复合语句，用于定义一个可调用的类对象。执行时，它会执行类套件中的语句，并在内存中创建一个\
    \ `type` 类型的对象，该对象由类定义指定。\n\n一般语法如下：\n\n```python\nclass MyType(BaseType1, BaseType2):\n\
    \    Suite\n```\n\n关键字 `class` 开始语句，后跟新类名（例如，本例中的 `MyType`）以及括号中一个或多个基类的可选列表（例如，`BaseType1`、`BaseType2`\
    \ 等）。Python 支持“[多重继承](https://docs.python.org/3/tutorial/classes.html#multiple-inheritance)”。\n\
    \n当未指定基类列表时，类从最终基类 `object` 继承。在这种情况下，类名后的括号可以省略。即，\n\n```python\nclass Orange:\n\
    \    pass\n```\n\n此定义等效于以下内容：\n\n```python\nclass Orange(object):\n    pass\n\
    ```\n\n- 类定义创建一个局部命名空间，嵌套在全局命名空间中，类套件中的语句在新创建的执行帧中执行。\n- 然后创建一个类对象，该对象从基类列表中（显式或隐式）指定的基类继承，并使用新创建的局部命名空间作为类的\
    \ `__dict__` 属性。\n- 然后，类定义语句中定义的类名在原始局部命名空间（可以是全局命名空间）中绑定到此 class 对象。\n\n### 14.2.\
    \ 类与实例\n\nPython 的类只是一个对象（具有一些特殊功能）。但是，在 Python 编程中，它扮演着其他“基于类”的面向对象编程（OOP）语言中类的角色。至少，使用类可以帮助创建更模块化、更结构化的\
    \ Python 程序，其组件可以更容易地重用等。在许多问题领域中，从“类”和“对象”（在 OOP 的意义上）的角度思考可能相当自然和直观。\n\n就像函数定义一样，类定义包含一系列语句。大多数类定义主要包含变量（例如，“类变量”）和函数（例如，“静态方法”、“类方法”和“实例方法”）的定义。\n\
    \n当 Python 解释器读取/执行类定义时，这些语句将被执行。例如，\n\n```python\n>>> class X(object):\n... \
    \    if True:\n...         print(True)\n...     else:\n...         print(False)\n\
    ...\nTrue\n```\n\n这是 `if` 语句的输出。与函数定义不同，Python 在创建类对象时会执行类定义作用域中的所有语句。\n\n类定义在某种程度上类似于“模块”。这些类套件语句仅在类语句首次执行时执行（例如，当\
    \ Python 解释器读取该语句时）。当我们*使用*“类对象”（例如，创建该类的实例对象）时，这些语句不会被执行。例如，\n\n```python\n>>>\
    \ x = X()\n```"
