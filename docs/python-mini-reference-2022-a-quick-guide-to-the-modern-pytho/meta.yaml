  md: '# 11. COMPOUND STATEMENTS


    A compound statement comprises other statements, and it affects or controls the
    execution of those statements in some way. A compound statement can span multiple
    (logical) lines.


    A compound statement consists of one or more "clauses". A clause consists of a
    "header" and a "suite". The clause headers of a particular compound statement
    are all at the same indentation level. Each clause header begins with a uniquely
    identifying keyword (e.g., if, else, try, except, etc.), and it ends with a colon
    (:). A suite is a group of one or more statements controlled by the clause. A
    suite can be


    +   - One or more semicolon-separated simple statements on the same line as the
    header, following the colon, or

    - It can be one or more one-level more indented simple or compound statements
    on subsequent lines.


    Python uses, as in many imperative programming languages, the common control flow
    statements such as the [if statement](https://docs.python.org/3/reference/compound_stmts.html#if),
    [while statement](https://docs.python.org/3/reference/compound_stmts.html#while),
    and [for statement](https://docs.python.org/3/reference/compound_stmts.html#for).
    They are all compound statements'
  merge: -1
