    The case clauses do not require break statements, unlike in C''s switch - case
    statement. They do not "fall through".


    In this example, the first case does not match since color != Color.RED. Then
    the match statement matches the next case because color == Color.BLUE, and hence
    the statement(s) in the matched case is executed.


    The wildcard expression _ is used for "catch all". That is, the case _ clause
    is more or less equivalent to the *default* case in the C-style switch statement.
    If there is no matching case, then the match statement terminates without executing
    any suites. If the catch-all case case _ is specified, then the statements within
    this default case are executed.


    # 12.2. Patterns


    # 12.2.1. The wildcard pattern


    As indicated at the end of the previous section, the special pattern _ matches
    any subject expression. This is the simplest pattern, and because it matches any
    expression, it can only be used in the last case clause in the match statement
    unless a guard is used.


    ```

    >>> match 5:

    ...     case _:

    ...         print("I always match!")

    ...

    ```'
