    \ function. Calling a (normal) function executes the statements defined in the\
    \ function object. On the contrary, calling a coroutine function object merely\
    \ returns [a coroutine object](https://docs.python.org/3/glossary.html#term-coroutine-object).\n\
    \n## 15.6. Await Expressions\n\nAn `await` expression suspends the execution of\
    \ coroutine on an *awaitable* object. It can only be used inside a [coroutine\
