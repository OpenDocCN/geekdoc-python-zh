    # 14.4. Data Classes


    A class can be used for purely data organization and access, and not for behavior.
    This kind of class is often called a "record" or "struct type". Python provides
    a helper module, dataclasses, in the standard library for creating a record-like
    class, called the data class.


    One can use the @dataclasses.dataclass decorator to create a data class, without
    having to manually implement a number of essential methods. For example,


    ```

    >>> from dataclasses import dataclass

    >>>

    >>> @dataclass

    ... class Point:

    ...     x: int = 0

    ...     y: int = 0

    ...

    >>> p1 = Point(1, 2)

    >>> p2, p3 = Point(x=1, y=2), Point(2)

    >>> p1, p2, p3

    (Point(x=1, y=2), Point(x=1, y=2), Point(x=2, y=0))

    >>> p1 is p2, p1 == p2

    (False, True)

    >>> p1 is p3, p1 == p3

    (False, False)

    ```


