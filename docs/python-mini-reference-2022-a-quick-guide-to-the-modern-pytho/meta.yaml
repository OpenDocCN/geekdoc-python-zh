    \ object `4` in this example.\n- The global variables, `x` and `y`, are declared.\n\
    - The function call `f()` uses these global variables.\n\n## 10.9. The nonlocal\
    \ Statement\n\nThe `nonlocal` statement works in a similar way as the `global`\
    \ statement. The names declared in a `nonlocal` statement refer to the *previously\
    \ bound* variables in the innermost enclosing scope (excluding globals).\n\nSome\
    \ examples were given earlier, in the Scope Examples section. Here’s another example:\n\
    \n```python\n>>> def a():\n...     x, y = 1, 2\n...     def b():\n...        \
    \ print(x)\n...         nonlocal y\n...         y = 4\n...         print(y)\n\
    ...     b()\n...\n>>> a()\n1\n4\n```\n\n- `x` and `y` are variables local to the\
    \ code block of the function definition for `a`.\n- The start of a new (nested)\
    \ code block.\n- `x` refers to the variable `x` declared outside the local scope\
    \ (for `b`).\n- In order to be able to assign a new value to the non-local variable\
