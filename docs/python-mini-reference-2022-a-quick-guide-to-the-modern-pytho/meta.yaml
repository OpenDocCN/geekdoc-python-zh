- md: "## 11.3.1. The range function\n\nPython's for in statement can be used just\
    \ like C's classic for loop, with the help of the builtin range function, which\
    \ generates an integer sequence.\n\nThe range function can be called in three\
    \ different ways:\n\n```\nrange(start, end, step)\nrange(start, end)\nrange(end)\n\
    ```\n\n- It specifies start (inclusive), end (exclusive), and step, the last of\
    \ which represents an increment or decrement in the sequence. All arguments are\
    \ integers, and step cannot be zero.\n- If the step is omitted, its default value\
    \ is 1.\n- In this case, start/step use default values, 0/1, respectively.\n\n\
    For example, let's try adding even integers from 0 to 100, using the for statement:\n\
    \n```\n>>> _sum = 0\n>>> for i in range(0, 100+1, 2):\n...     _sum += i\n...\n\
    >>> print(f\"Sum of even numbers from 0 to 100 is {_sum}\")\nSum of even numbers\
    \ from 0 to 100 is 2550\n```\n\nThere is, in fact, a builtin sum function which\
    \ adds all elements in a given sequence.\n\n```\n>>> sum(range(0, 101, 2))\n2550\n\
    ```\n\n## 11.3.2. The enumerate function\n\nThe above two use cases, e.g., iterating\
    \ over items in an arbitrary sequence and iterating over an integer sequence,\
    \ can be more or less combined with the builtin enumerate function.\n\nThe enumerate\
    \ function takes an iterable as an argument and returns an iterable of indexed\
    \ pairs of the original sequence. That is, given [item1, item2, item3], it returns\
    \ an iterable of three elements, (0, item1), (1, item2), and (2, item3). The enumerate\
    \ function is not as flexible as range, but it takes an optional second argument\
    \ start. Otherwise, the index is 0-based, by default.\n\nHere’s an example:\n\n\
    ```\n>>> name = \"python\"\n>>> for i, v in enumerate(name, 3):\n...     print(i,\
    \ v, end = ', ')\n... else:\n...     print()\n...\n3 p, 4 y, 5 t, 6 h, 7 o, 8\
    \ n,\n>>>\n```\n\nA string is an immutable sequence type, which is an iterable.\n\
    \nWe use the unpacking syntax to assign the index and value, from each iteration\
    \ of the enumerate() function call, to two separate variables, (i, v).\n\nThe\
    \ else clause is always executed at the end of the loop unless the loop is abnormally\
    \ terminated, e.g., by break statement, etc. In this example, we add a new line,\
    \ at the end of the loop.\n\nOtherwise, this line would not have ended with a\
    \ new line.\n\n## 11.4. The try Statement\n\nAs of Python 3.11+, Python's exception\
    \ framework has been extended to allow programs to raise and handle multiple unrelated\
    \ exceptions simultaneously. First, a new standard exception type, the ExceptionGroup,\
    \ which represents a group of unrelated exceptions have been introduced. Second,\
    \ a new syntax except* has been added for handling ExceptionGroups.\n\nThe classic\
    \ try - except compound statement has the following general syntax:\n\n```\ntry:\n\
    \    <suite>\nexcept <except_expression>:\n    <suite>\nexcept <except_expression>\
    \ as <name>:\n    <suite>\nexcept:\n    <suite>\nelse:\n    <suite>\nfinally:\n\
    \    <suite>\n```\n\nAn expression that evaluates to an Exception or ExceptionGroup\
    \ type. The ExceptionGroup types were introduced in Python 3.11.\n\nA try statement\
    \ can have zero, one, or more except clauses.\n\nThe \"catch all\" clause.\n\n\
    An optional else clause.\n\nAn optional finally clause. Note that, when there\
    \ is no except clause, finally is required.\n\nSince Python 3.11+, the try clause\
    \ can be followed by one or more except* clauses instead of except.\n\n```\ntry:\n\
    \    <suite>\nexcept* <exception_group>:\n    <suite>\nexcept* <exception_group>\
    \ as <name>:\n    <suite>\nexcept* (<ex1>, <ex2>) as <name>:\n    <suite>\nelse:\n\
    \    <suite>\nfinally:\n    <suite>\n```\n\nAn expression that evaluates to an\
    \ Exception or ExceptionGroup.\n\n- A try statement can have one or more except*\
    \ clauses. Note that, unlike except, except* cannot be used as a \"catch all\"\
    \ clause. That is, the exception/exception group expression is always required.\n\
    - A quick shorthand way to create an \"exception group\" from the existing exception\
    \ types.\n\nThe except clauses specify exception handlers for specific BaseException\
    \ or BaseExceptionGroup types. On the other hand, the except* clauses specify\
    \ exception handlers for a set of BaseException types contained in a BaseExceptionGroup\
    \ type. except/except*, else, finally are all optional, but at least one of except/except*\
    \ or finally is required. Note that except and except* cannot be mixed in one\
    \ try statement.\n\nWhen no exception occurs in the try clause, no exception handler\
    \ is executed.\n\nWhen an exception occurs in the try suite, a search for an exception\
    \ handler is started. In case of the except clauses, this search inspects the\
    \ except clauses, and evaluates the expressions, in order, from top to bottom,\
    \ until one is found that matches the exception. An expression-less except clause,\
    \ which matches any exception, must be last, if present.\n\nIn case of the except*\
    \ clauses, the clause matches the exception if the exception or any of the exceptions\
    \ in the exception group is the same or a base type of the given exception. Unlike\
    \ in the case of except clauses, more than one except* clauses can match the exception/exception\
    \ group. Hence, control flow statements like break are not allowed in except*\
    \ clauses.\n\nIf no except clause matches the exception, or if except* clauses\
    \ do not fully handle all exceptions in the exception group, the search for a\
    \ handler(s) for the exception, or the remaining unhandled exceptions, continues\
    \ in the surrounding code and on the invocation stack.\n\nWhen a matching except\
    \ clause is found, the exception is assigned to the target specified after the\
    \ as keyword in that except clause, if present, and the except clause's suite\
    \ is executed. All except clauses must have an executable block. When the end\
    \ of this block is reached, execution continues normally after the entire try\
    \ statement. (This means that if two nested handlers exist for the same exception,\
    \ and the exception occurs in the try clause of the inner handler, the outer handler\
    \ will not handle the exception.)\n\nThe optional else clause is executed if the\
    \ control flow leaves the try suite, no exception was raised, and no return, continue,\
    \ or break statement was executed. Exceptions in the else clause are not handled\
    \ by the preceding except clauses.\n\nIf finally is present, it specifies a 'cleanup'\
    \ handler. The try clause is executed, including any except and else clauses.\
    \ If an exception occurs in any of the clauses and is not handled, the exception\
    \ is temporarily saved. The finally clause is executed."
  mdcn: "## 11.3.1. range 函数\n\n借助内置的 `range` 函数（该函数生成一个整数序列），Python 的 `for in` 语句可以像\
    \ C 语言经典的 `for` 循环一样使用。\n\n`range` 函数可以通过三种不同的方式调用：\n\n```\nrange(start, end,\
    \ step)\nrange(start, end)\nrange(end)\n```\n\n- 它指定了起始值（包含）、结束值（不包含）和步长，其中步长表示序列的增量或减量。所有参数都是整数，且步长不能为零。\n\
    - 如果省略步长，其默认值为 1。\n- 在这种情况下，`start`/`step` 分别使用默认值 0/1。\n\n例如，让我们尝试使用 `for` 语句计算从\
    \ 0 到 100 的偶数之和：\n\n```\n>>> _sum = 0\n>>> for i in range(0, 100+1, 2):\n... \
    \    _sum += i\n...\n>>> print(f\"Sum of even numbers from 0 to 100 is {_sum}\"\
    )\nSum of even numbers from 0 to 100 is 2550\n```\n\n实际上，有一个内置的 `sum` 函数可以对给定序列中的所有元素求和。\n\
    \n```\n>>> sum(range(0, 101, 2))\n2550\n```\n\n## 11.3.2. enumerate 函数\n\n上述两种用例，例如，遍历任意序列中的元素和遍历整数序列，可以或多或少地与内置的\
    \ `enumerate` 函数结合使用。\n\n`enumerate` 函数接受一个可迭代对象作为参数，并返回一个包含原始序列索引对的可迭代对象。也就是说，给定\
    \ `[item1, item2, item3]`，它返回一个包含三个元素的可迭代对象：`(0, item1)`、`(1, item2)` 和 `(2, item3)`。`enumerate`\
    \ 函数不如 `range` 灵活，但它接受一个可选的第二个参数 `start`。否则，索引默认从 0 开始。\n\n这里有一个例子：\n\n```\n>>>\
    \ name = \"python\"\n>>> for i, v in enumerate(name, 3):\n...     print(i, v,\
    \ end = ', ')\n... else:\n...     print()\n...\n3 p, 4 y, 5 t, 6 h, 7 o, 8 n,\n\
    >>>\n```\n\n字符串是一种不可变的序列类型，它是一个可迭代对象。\n\n我们使用解包语法，将 `enumerate()` 函数调用的每次迭代中的索引和值分配给两个独立的变量\
    \ `(i, v)`。\n\n`else` 子句总是在循环结束时执行，除非循环被异常终止，例如被 `break` 语句等终止。在这个例子中，我们在循环结束时添加了一个换行符。\n\
    \n否则，这一行就不会以换行符结束。\n\n## 11.4. try 语句\n\n从 Python 3.11+ 开始，Python 的异常框架得到了扩展，允许程序同时引发和处理多个不相关的异常。首先，引入了一种新的标准异常类型\
    \ `ExceptionGroup`，它表示一组不相关的异常。其次，添加了一种新的语法 `except*` 用于处理 `ExceptionGroup`。\n\
    \n经典的 `try - except` 复合语句具有以下通用语法：\n\n```\ntry:\n    <suite>\nexcept <except_expression>:\n\
    \    <suite>\nexcept <except_expression> as <name>:\n    <suite>\nexcept:\n  \
    \  <suite>\nelse:\n    <suite>\nfinally:\n    <suite>\n```\n\n一个求值结果为 `Exception`\
    \ 或 `ExceptionGroup` 类型的表达式。`ExceptionGroup` 类型在 Python 3.11 中引入。\n\n一个 `try`\
    \ 语句可以有零个、一个或多个 `except` 子句。\n\n“捕获所有”子句。\n\n一个可选的 `else` 子句。\n\n一个可选的 `finally`\
    \ 子句。请注意，当没有 `except` 子句时，`finally` 是必需的。\n\n从 Python 3.11+ 开始，`try` 子句后面可以跟一个或多个\
    \ `except*` 子句，而不是 `except`。\n\n```\ntry:\n    <suite>\nexcept* <exception_group>:\n\
    \    <suite>\nexcept* <exception_group> as <name>:\n    <suite>\nexcept* (<ex1>,\
    \ <ex2>) as <name>:\n    <suite>\nelse:\n    <suite>\nfinally:\n    <suite>\n\
    ```\n\n一个求值结果为 `Exception` 或 `ExceptionGroup` 的表达式。\n\n- 一个 `try` 语句可以有一个或多个 `except*`\
    \ 子句。请注意，与 `except` 不同，`except*` 不能用作“捕获所有”子句。也就是说，异常/异常组表达式始终是必需的。\n- 一种从现有异常类型快速创建“异常组”的简写方式。\n\
    \n`except` 子句为特定的 `BaseException` 或 `BaseExceptionGroup` 类型指定异常处理程序。另一方面，`except*`\
    \ 子句为 `BaseExceptionGroup` 类型中包含的一组 `BaseException` 类型指定异常处理程序。`except`/`except*`、`else`、`finally`\
    \ 都是可选的，但至少需要 `except`/`except*` 或 `finally` 中的一个。请注意，`except` 和 `except*` 不能在同一个\
    \ `try` 语句中混合使用。\n\n当 `try` 子句中没有发生异常时，不会执行任何异常处理程序。\n\n当 `try` 套件中发生异常时，将开始搜索异常处理程序。对于\
    \ `except` 子句的情况，此搜索会按从上到下的顺序检查 `except` 子句并计算表达式，直到找到与异常匹配的子句。如果存在无表达式的 `except`\
    \ 子句（它匹配任何异常），则必须放在最后。\n\n对于 `except*` 子句的情况，如果异常或异常组中的任何异常与给定的异常相同或是其基类型，则该子句与异常匹配。与\
    \ `except` 子句的情况不同，多个 `except*` 子句可以匹配异常/异常组。因此，`except*` 子句中不允许使用 `break` 等控制流语句。\n\
    \n如果没有 `except` 子句匹配异常，或者 `except*` 子句没有完全处理异常组中的所有异常，则将继续在周围代码和调用栈中搜索异常或剩余未处理异常的处理程序。\n\
