    # 2. PYTHON PROGRAMS


    A complete Python program can be passed to the Python interpreter:


    +   - With the `-c` command line option with a program text,

    - With the `-m` command line option with a module name,

    - As a file name passed as the first command line argument, or

    - From the standard input.


    The Python interpreter executes the input file, or the input text, as a complete
    program, in the namespace of a special module, `__main__`.


    When the file or standard input is a terminal, or when the Python interpreter
    is invoked without an argument, the interpreter enters the interactive mode. The
    Python interpreter reads and executes one statement at a time ([simple](https://docs.python.org/3/reference/simple_stmts.html)
    or [compound](https://docs.python.org/3/reference/compound_stmts.html)) in the
    interactive mode instead of executing a complete program.


    Here are a few examples:'
- md: "## 2.1. File/Text Input\n\nA complete Python program is a series of zero or\
    \ more statements, with optional newlines between the statements. A complete program\
    \ with this form is expected in the following situations:\n\n- When a Python program\
    \ is read from a file or from an input string,\n- When an imported module is parsed,\
    \ and\n- When a string argument is passed to the builtin exec function.\n\nAs\
    \ indicated, the main module of a running program is always called `__main__`\
    \ in Python.\n\n## 2.2. Interactive Mode\n\nThe Python interpreter in the interactive\
    \ mode (aka Python REPL) does not execute a complete program. Instead, it reads\
    \ and executes one statement at a time. Each input comprises a code block in the\
    \ namespace of `__main__`.\n\nA top-level compound statement must be followed\
    \ by an extra newline in the interactive mode, which is used by the parser to\
    \ detect the end of the input.\n\n```\n$ python\nPython 3.10.4 (main, Jun 29 2022,\
    \ 12:14:53) [GCC 11.2.0] on linux\nType \"help\", \"copyright\", \"credits\" or\
    \ \"license\" for more information.\n>>> \n>>> for levels in (\"White\", \"Black\"\
    ):\n...     print(levels)\n...\nWhite\nBlack\n>>> \n>>> exit()\n$\n```\n\n- A\
    \ command that starts the Python REPL. This might be different on your system.\n\
    - The Python REPL prompt, `>>>`. We just pressed Enter in this example.\n- The\
    \ first line of a for compound statement.\n- The prompt has changed from `>>>`\
    \ to `...`. The statements in the for \"suite\" need to be indented.\n- We press\
    \ Enter one more time to signal the end of the compound statement to the Python\
    \ interpreter.\n- The output, displayed in two lines. Note that the output lines\
    \ are not preceded by the REPL prompts.\n- The Python REPL waits for another command/statement.\
    \ We press Enter again in this example.\n- You can exit the Python REPL by calling\
    \ the builtin `exit` or `quit` functions, or by issuing the EOF signal (e.g.,\
    \ CTRL+D or CMD+D).\n- Back to the Unix shell.\n\n## 3. PROGRAM EXECUTION\n\n\
    ### 3.1. Code Blocks\n\nA Python program is executed in a series of \"execution\
    \ frames\". A piece of Python program that is executed as a unit in an execution\
    \ frame is called a \"code block\".\n\nFor example, modules and function/class\
    \ definitions are code blocks, among other things. An entire program passed to\
    \ the interpreter, e.g., as `-c` option or as a file argument, is a code block\
    \ (more precisely, the top-level code block). So is an imported module.\n\nThe\
    \ code blocks can be nested.\n\n### 3.2. Name Binding\n\nIn Python, all values\
    \ are \"objects\", and objects are often referred to by their \"names\". Names\
    \ are introduced by name binding operations.\n\nFor example, import statements,\
    \ function and class definitions, and assignment expressions and statements bind\
    \ names within their enclosing code blocks. Function parameters also bind names,\
    \ within the function definition block. If a name is bound in a block, it is a\
    \ \"local variable\" of that block by default.\n\nIf a name is bound at the module\
    \ level, it is also a \"global variable\". The import statement of the form `from\
    \ XYZ import *` can only be used at the module level. It binds all names defined\
    \ in the imported module that do not begin with an underscore (`_`). All names\
    \ imported this way are global (as well as local with respect to the importing\
    \ module).\n\n### 3.3. Scope\n\nA name is accessible within a particular part\
    \ of a program, e.g., within the code block where the name is bound. This is called\
    \ a \"scope\". The scope of a local variable bound in a code block includes that\
    \ block.\n\nWhen a name is used in a code block, the smallest enclosing scope\
    \ is used to find the binding of the name. It is called the \"name resolution\"\
    . If the name cannot be resolved, then an exception is raised. Depending on the\
    \ context, `NameError`, or more specifically `UnboundLocalError`, may be raised.\n\
    \n#### 3.3.1. Function definition block\n\nA function `def` statement defines\
    \ a code block. If a name is bound in a function block, then its scope includes\
    \ this function block and any other blocks that are contained/nested therein.\n\
    \n#### 3.3.2. Class definition block\n\nIn a class definition, the scope of the\
    \ names defined in a class block is limited to that class block only, *excluding*\
    \ those of the enclosed methods. The local variables that are not bound in the\
    \ class block are looked up in the global namespace.\n\n#### 3.3.3. The global\
    \ declaration\n\nIf a `global` statement is used for a name in a block, then the\
    \ uses of the name refer to its binding in the top-level namespace, which includes\
    \ those of the code block module and the builtins module, as well as the builtins\
    \ namespace.\n\n#### 3.3.4. The nonlocal declaration\n\nIf a `nonlocal` statement\
    \ is used for a name in a code block, the name refers to the one bound in the\
    \ smallest enclosing function scope. If the name binding is not found at compile\
    \ time, then a `SyntaxError` exception is raised.\n\n### 3.4. Scope Examples (Optional)\n\
    \nHere’s a single module (e.g., a Python source file named *my_module.py*) that\
    \ demonstrates the function and class blocks and the scopes of the variables defined\
    \ in those blocks. (Note: The program/module is split into three segments for\
    \ formatting reasons.)\n\n**Listing 1. my_module.py**\n\n```python\nx, w = 1,\
    \ 2\n\ndef var_demo():\n    y = 3\n    print(\"A\", x, w, y)\n    def inner_function():\n\
    \        w = 22\n        nonlocal y\n        y = 33\n        print(\"B\", x, w,\
    \ y)\n    inner_function()\n    print(\"C\", x, w, y)\n```\n\n- The variables\
    \ `x` and `w` are *local* to the module, and hence they are *global* variables.\
    \ Their scope includes the entire module, lines 1-28.\n- [A function definition](https://example.com).\
    \ It creates a block, lines 4-12.\n- A name binding introduces the name to the\
    \ current scope. Hence, `y` is local to this function, and its scope is the same\
    \ block, lines 4-12.\n- At this point, we cannot easily tell what this `print`\
    \ function will print out, e.g., without going through/understanding the entire\
    \ program. `x` and `w` are global, and hence their values might have changed somewhere\
    \ in the code by the time this statement is executed. The current value of `y`\
    \ is 3.\n- An inner function definition. It creates a nested scope.\n- A new variable\
    \ binding. `w` is a local variable to the `inner_function` function, and its scope\
    \ is the function block, lines 7-10.\n- The `nonlocal` statement asserts that\
    \ we are going to use the variable `y` from the outer function scope, lines 4-12.\n\
    - We are assigning a new value 33 to this non-local variable `y`. Without the\
    \ `nonlocal` declaration, this statement could have introduced a new variable\
    \ `y` into the local scope, lines 7-10.\n- At this point, `x` is a global variable,\
    \ `w` is a local variable (local to `inner_function`), and `y` is a non-local\
    \ variable (but, local to `var_demo`).\n- Calling `inner_function` might have\
    \ (potentially) changed the values of the global `x` and nonlocal `y`, but it\
    \ should have no effect on the global `w`.\n- It prints the global `x` and `w`,\
    \ and local `y` (local to `var_demo`).\n\n```python\nclass VarDemo:\n    z = 5\n\
    \    global w\n    w = 222\n    print(\"D\", x, w, z)\n    def inner_method(self):\n\
    \        print(\"E\", x, w, self.z)\n        self.z = 10\n        print(\"F\"\
    , x, w, self.z)\n```\n\n- A class definition creates a new scope (within the global\
    \ scope).\n- `z` is a local variable in the class block. Its scope is lines 15-18,\
    \ excluding the enclosed function/method blocks, e.g., lines 19-22.\n- This `global`\
    \ statement declares that the name `w` is the same one defined in the global scope.\n\
    - This assignment changes the value of the global `w` to 222. Without the `global`\
    \ declaration, this statement could have introduced a new name `w` to the local\
    \ scope, lines 15-18.\n- At this point, `x` and `w` refer to the global variables\
    \ (first bound in line 1), and `z` refers to the local variable.\n- An inner method\
    \ definition. It creates a new scope within the global scope (not within the scope\
    \ of `VarDemo`)."
  mdcn: "## 2.1. 文件/文本输入\n\n一个完整的 Python 程序由零条或多条语句组成，语句之间可以有可选的换行符。在以下情况下，需要这种形式的完整程序：\n\
    \n-   当从文件或输入字符串读取 Python 程序时，\n-   当解析导入的模块时，以及\n-   当将字符串参数传递给内置的 `exec` 函数时。\n\
    \n如前所述，运行程序的主模块在 Python 中始终被称为 `__main__`。\n\n## 2.2. 交互模式\n\n交互模式下的 Python 解释器（也称为\
    \ Python REPL）不会执行完整的程序。相反，它一次读取并执行一条语句。每次输入都构成 `__main__` 命名空间中的一个代码块。\n\n在交互模式下，顶层复合语句后必须跟一个额外的换行符，解析器用它来检测输入的结束。\n\
    \n```\n$ python\nPython 3.10.4 (main, Jun 29 2022, 12:14:53) [GCC 11.2.0] on linux\n\
    Type \"help\", \"copyright\", \"credits\" or \"license\" for more information.\n\
    >>> \n>>> for levels in (\"White\", \"Black\"):\n...     print(levels)\n...\n\
    White\nBlack\n>>> \n>>> exit()\n$\n```\n\n-   启动 Python REPL 的命令。在你的系统上可能有所不同。\n\
    -   Python REPL 提示符 `>>>`。在此示例中，我们刚刚按下了 Enter 键。\n-   for 复合语句的第一行。\n-   提示符已从\
    \ `>>>` 变为 `...`。for \"套件\"中的语句需要缩进。\n-   我们再次按 Enter 键，向 Python 解释器发出复合语句结束的信号。\n\
    -   输出，分两行显示。请注意，输出行前面没有 REPL 提示符。\n-   Python REPL 等待另一个命令/语句。在此示例中，我们再次按 Enter\
    \ 键。\n-   你可以通过调用内置的 `exit` 或 `quit` 函数，或发出 EOF 信号（例如，CTRL+D 或 CMD+D）来退出 Python\
    \ REPL。\n-   返回 Unix shell。\n\n## 3. 程序执行\n\n### 3.1. 代码块\n\nPython 程序在一系列“执行帧”中执行。在执行帧中作为一个单元执行的\
    \ Python 程序片段称为“代码块”。\n\n例如，模块和函数/类定义等都是代码块。传递给解释器的整个程序，例如作为 `-c` 选项或作为文件参数，是一个代码块（更准确地说，是顶层代码块）。导入的模块也是如此。\n\
    \n代码块可以嵌套。\n\n### 3.2. 名称绑定\n\n在 Python 中，所有值都是“对象”，对象通常通过其“名称”来引用。名称通过名称绑定操作引入。\n\
    \n例如，导入语句、函数和类定义以及赋值表达式和语句在其封闭的代码块内绑定名称。函数参数也在函数定义块内绑定名称。如果一个名称在块中被绑定，它默认是该块的“局部变量”。\n\
    \n如果一个名称在模块级别绑定，它也是一个“全局变量”。形式为 `from XYZ import *` 的导入语句只能在模块级别使用。它绑定导入模块中所有不以下划线\
    \ (`_`) 开头的名称。所有以此方式导入的名称都是全局的（对于导入模块来说也是局部的）。\n\n### 3.3. 作用域\n\n一个名称在程序的特定部分内是可访问的，例如，在名称被绑定的代码块内。这称为“作用域”。在代码块中绑定的局部变量的作用域包括该块。\n\
    \n当在代码块中使用一个名称时，会使用最小的封闭作用域来查找该名称的绑定。这称为“名称解析”。如果无法解析该名称，则会引发异常。根据上下文，可能会引发 `NameError`，或者更具体地说是\
    \ `UnboundLocalError`。\n\n#### 3.3.1. 函数定义块\n\n函数 `def` 语句定义一个代码块。如果一个名称在函数块中被绑定，那么它的作用域包括此函数块以及其中包含/嵌套的任何其他块。\n\
    \n#### 3.3.2. 类定义块\n\n在类定义中，类块中定义的名称的作用域仅限于该类块，*不包括*封闭方法中的名称。未在类块中绑定的局部变量将在全局命名空间中查找。\n\
    \n#### 3.3.3. global 声明\n\n如果在块中对一个名称使用了 `global` 语句，那么对该名称的引用将指向其在顶层命名空间中的绑定，该命名空间包括代码块模块和内置模块的绑定，以及内置命名空间。\n\
    \n#### 3.3.4. nonlocal 声明\n\n如果在代码块中对一个名称使用了 `nonlocal` 语句，该名称将引用在最小封闭函数作用域中绑定的名称。如果在编译时未找到该名称绑定，则会引发\
    \ `SyntaxError` 异常。\n\n### 3.4. 作用域示例（可选）\n\n这是一个单一模块（例如，名为 *my_module.py* 的 Python\
    \ 源文件），演示了函数和类块以及这些块中定义的变量的作用域。（注意：由于格式原因，程序/模块被分成三个部分。）\n\n**清单 1. my_module.py**\n\
    \n```python\nx, w = 1, 2\n\ndef var_demo():\n    y = 3\n    print(\"A\", x, w,\
    \ y)\n    def inner_function():\n        w = 22\n        nonlocal y\n        y\
    \ = 33\n        print(\"B\", x, w, y)\n    inner_function()\n    print(\"C\",\
    \ x, w, y)\n```\n\n-   变量 `x` 和 `w` 对模块是*局部*的，因此它们是*全局*变量。它们的作用域包括整个模块，第 1-28\
    \ 行。\n-   [一个函数定义](https://example.com)。它创建一个块，第 4-12 行。\n-   一个名称绑定将名称引入当前作用域。因此，`y`\
    \ 对此函数是局部的，其作用域是同一块，第 4-12 行。\n-   此时，我们无法轻易判断这个 `print` 函数将打印什么，例如，如果不通读/理解整个程序。`x`\
    \ 和 `w` 是全局的，因此在执行此语句时，它们的值可能已在代码中的某处更改。`y` 的当前值是 3。\n-   一个内部函数定义。它创建一个嵌套作用域。\n\
    -   一个新的变量绑定。`w` 是 `inner_function` 函数的局部变量，其作用域是函数块，第 7-10 行。\n-   `nonlocal`\
    \ 语句断言我们将使用外部函数作用域中的变量 `y`，第 4-12 行。\n-   我们正在将新值 33 赋给这个非局部变量 `y`。如果没有 `nonlocal`\
    \ 声明，此语句可能会在局部作用域中引入一个新变量 `y`，第 7-10 行。\n-   此时，`x` 是一个全局变量，`w` 是一个局部变量（对 `inner_function`\
    \ 局部），`y` 是一个非局部变量（但对 `var_demo` 局部）。\n-   调用 `inner_function` 可能（潜在地）改变了全局 `x`\
    \ 和非局部 `y` 的值，但应该对全局 `w` 没有影响。\n-   它打印全局 `x` 和 `w`，以及局部 `y`（对 `var_demo` 局部）。\n\
    \n```python\nclass VarDemo:\n    z = 5\n    global w\n    w = 222\n    print(\"\
    D\", x, w, z)\n    def inner_method(self):\n        print(\"E\", x, w, self.z)\n\
    \        self.z = 10\n        print(\"F\", x, w, self.z)\n```\n\n-   类定义创建一个新的作用域（在全局作用域内）。\n\
    -   `z` 是类块中的局部变量。其作用域是第 15-18 行，不包括封闭的函数/方法块，例如第 19-22 行。\n-   此 `global` 语句声明名称\
    \ `w` 与在全局作用域中定义的名称相同。\n-   此赋值将全局 `w` 的值更改为 222。如果没有 `global` 声明，此语句可能会在局部作用域中引入一个新名称\
    \ `w`，第 15-18 行。\n-   此时，`x` 和 `w` 引用全局变量（首次在第 1 行绑定），`z` 引用局部变量。\n-   一个内部方法定义。它在全局作用域内创建一个新的作用域（不在\
    \ `VarDemo` 的作用域内）。"
