    \ first 1. The second `print` function call is skipped.\n- The `finally` clause\
    \ is still executed before continuing with the next iteration.\n- The next iteration\
    \ continues.\n- The `else` clause is executed when the loop is normally terminated.\n\
    \n## 10.8. The global Statement\n\nThe `global` and `nonlocal` statements were\
    \ briefly discussed earlier in the context of code blocks and scopes.\n\nThe `global`\
    \ statement, the keyword `global` followed by a comma-separated list of names,\
    \ indicates that the declared names, in the current code block, are to be interpreted\
    \ as globals (e.g., the current module scope). The names listed in a `global`\
    \ statement cannot be used in the same code block before that `global` statement.\n\
    \nNote the asymmetry between name binding and use in Python. There is no way to\
    \ bind a value to a global variable without using the `global` declaration in\
    \ a non-global code block. On the other hand, to access/read the value of a global\
    \ variable, the `global` declaration is not needed.\n\n```python\n>>> def f():\n\
