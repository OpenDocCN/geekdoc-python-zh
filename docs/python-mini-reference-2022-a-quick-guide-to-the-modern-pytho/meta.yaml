    # 3.5. Program Start and Termination


    As indicated, the main module for a script, `__main__`, is a code block.


    The Python interpreter starts a program by executing the main code block, which
    can subsequently invoke other code blocks, which can in turn invoke other code
    blocks, and so forth. When the execution of a code block is completed, it returns
    the control to its surrounding code block which invoked the current code block.


    When the execution of the main module code block is done, the program terminates.


    # 3.6. Exceptions


    The normal flow of a program, via the code block call chain, can be bypassed using
    the exception handling mechanism. An exception can be explicitly "raised" under
    an exceptional or error condition using the `raise statement`. The Python interpreter
    can also raise an exception when it detects a run-time error.


    A raised exception may be handled by the surrounding, or any of the upstream,
    code blocks. When an exception is not handled in any of the code blocks, the interpreter
    terminates execution of the program, in the non-interactive mode. In the REPL
    mode, it'
  - '[PAGE 34]


    simply returns to its interactive main loop. In either case, it prints a stack
    traceback, except when the exception is SystemExit.


    Exception handlers are specified with the `try statement`. As of Python 3.11,
    a new `try - except*` syntax is also supported in addition to `try - except`.


    There are two basic builtin exception types in Python, `BaseException` and `Exception`,
    which roughly correspond, for instance, to the "runtime exception" and "checked
    exception" of Java, respectively. Likewise, Python now includes (3.11+) two builtin
    exception group types, `BaseExceptionGroup` and `ExceptionGroup`.


    Exception handling will be further discussed, later in the book, in the contexts
    of the `try` and `raise statements`.'
