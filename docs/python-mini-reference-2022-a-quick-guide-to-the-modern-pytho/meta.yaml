- md: 'Sequences are ordered sets indexed by non-negative integers. The i-th item
    of a sequence a is selected by a[i]. The index runs from 0 to len(a) - 1. len
    is a built-in function that returns the number of items in a sequence.


    "Slicing" a sequence produces another sequence of the same type, called a slice.
    For example, a[i:j] selects all items with index between i (inclusive) and j (exclusive).
    The index of a slice starts from 0 regardless of how it is sliced.


    ## 8.2.1. Sequence unpacking


    An expression list evaluates to a tuple object. When the resulting tuple is assigned
    to a single variable, it is called "tuple packing":


    ```

    >>> x = 1, ''a'', True

    >>> x

    (1, ''a'', True)

    ```


    "Tuple packing". The type of x is tuple. The three values on the right-hand side
    have been "packed" into one variable.


    On the flip side, a sequence type object can be "unpacked" to multiple variables.


    ```

    >>> p, q, r = [''a'', ''b'', ''c'']

    >>> p, q, r

    (''a'', ''b'', ''c'')

    ```


    A single list with three items on the right-hand side has been "unpacked" to three
    variables, p, q, and r.


    Normally, the number of variables must be the same as that of elements in the
    sequence. Python, however, supports a special syntax for the "remaining elements".
    For example,


    ```

    >>> p, *q = [1, 2, 3, 4]

    >>> p, q

    (1, [2, 3, 4])

    ```


    At most one variable in the unpacking syntax can be marked with *. This variable
    gets all the remaining elements from the sequence after each leading or trailing
    element has been mapped to the corresponding variable. Note that the type of q
    is list.


    ## 8.3. Immutable Sequences


    Objects of immutable sequence types cannot change once created.


    ### 8.3.1. Strings


    A string is a sequence of values that represent Unicode code points. Python does
    not have a character type. The built-in function ord converts a code point from
    its string form to an integer in the range 0 - 0x10FFFF. On the other hand, chr
    converts an integer in the range 0 - 0x10FFFF to the corresponding length-1 string
    object.


    Strings can be concatenated with the + operator. Adding two strings returns a
    *new* string. Strings are truly immutable in Python. The string type includes
    a number of builtin methods like count, index, find, replace, format, join, split,
    startswith, endswith, upper, lower, isalnum, isalpha, islower, isupper, and isspace.


    ### 8.3.2. Tuples


    A tuple is an immutable sequence of zero, one, or more arbitrary Python objects
    within a pair of parentheses. The *length* of a tuple, that is, the number of
    elements, or items, in the tuple, can be computed using the Python builtin function,
    len.


    ```

    >>> len((False, "Hello", 1_000_000))

    3

    ```


    ### 8.3.3. Bytes sequences


    Python does not have a byte type. Instead, it has a bytes sequence type, which
    is an immutable array of 8-bit bytes.


    ## 8.4. Mutable Sequences


    Items of a mutable sequence can be changed after they are created, e.g., using
    the assignment or del (delete) statements.


    ### 8.4.1. Lists


    The list type is another important builtin data type in Python. A list is a mutable
    sequence of zero, one, or more objects. A list can be modified using the builtin
    list methods such as append, insert, pop, and remove, etc. The order of the elements
    in a list can be updated using the methods, reverse and sort.


    As with tuples, the len builtin function can be used to get the number of elements
    in a list. For instance,


    ```

    >>> len([1.0, 2.0, 3.0])

    3

    ```


    ### 8.4.2. List comprehension


    A list can be created by using the list comprehension syntax, in addition to the
    explicit literal syntax. For example,


    ```

    >>> [ x*x for x in range(5) ]

    [0, 1, 4, 9, 16]

    >>> [ x*x for x in range(5) if x % 2 == 0 ]

    [0, 4, 16]

    ```


    This expression evaluates to [0, 1, 4, 9, 16]. The if clause can be used to filter
    elements.


    The list comprehension, as well as the list literal expression, yields a *new*
    list object every time they are evaluated.


    ### 8.4.3. Byte arrays


    bytearray objects are like bytes sequences, but they are mutable. A bytearray
    object is created by the built-in bytearray constructor.


    ## 8.5. Set Types


    The set types represent unordered sets of unique, immutable objects. (Elements
    of set types are comparable to the keys of the mapping types.) The items in a
    set cannot be indexed using the subscription syntax. But they can be iterated
    over, as with other sequence types. (That is, a set is an iterable.) The len function
    returns the number of items in a set.


    ### 8.5.1. Sets


    A set represents a mutable set. They can be created by the built-in set constructor,
    as illustrated earlier.


    ### 8.5.2. Set comprehension


    A set can be created using the set comprehension syntax, in addition to the explicit
    set literal syntax. For example,


    ```

    >>> type({1, 3, 5, 7})

    <class ''set''>

    >>> { x*2 for x in range(5) }

    {0, 2, 4, 6, 8}

    ```


    A set literal, {1, 3, 5, 7}. This comprehension expression evaluates to {0, 2,
    4, 8, 6}.


    A set comprehension, as well as the literal expression with a comma-separated
    list of elements, returns a *new* mutable set object each time they are evaluated.


    ### 8.5.3. Frozen sets


    The built-in `frozenset` constructor creates a `frozenset` object, which is an
    immutable set.


    ## 8.6. Mappings


    Mapping types represent ordered or unordered sets of objects indexed by arbitrary
    index sets, or keys. The built-in function `len` returns the number of items in
    the given mapping object. The subscript notation `a[k]` selects the item indexed
    by `k` from the mapping `a`. This can be used, for example, as the target of assignments
    or `del` statements.


    ### 8.6.1. Dictionaries


    A dictionary is the builtin mutable mapping type in Python. They represent finite
    sets of objects indexed by the values of any type that support constant hash values.
    Dictionaries preserve insertion order. That is, keys will be produced in the same
    order they were added sequentially to the dictionary.


    ### 8.6.2. Dictionary comprehension


    A new `dict` object can be created using the [dictionary comprehension syntax](https://docs.python.org/3/reference/expressions.html#dict),
    in addition to the dictionary literal syntax by listing elements. For example,


    ```

    >>> { str(x): x**2 for x in range(4) }

    {''0'': 0, ''1'': 1, ''2'': 4, ''3'': 9}

    ```


    Note the expression syntax (k:v) before the for clause.


    ### 8.6.3. Element insertion/deletion


    ```

    >>> d = {"a": 1}

    >>> d[''b''] = 2

    >>> del(d[''a''])

    >>> d

    {''b'': 2}

    ```


    Overwrites an existing element if the element exists with a given key. Otherwise,
    it inserts a new element.


    The del statement is described later in the book.


    ## 9. EXPRESSIONS


    An "expression" comprises operators and operands and it evaluates to a value.
    A value is (trivially) an expression.


    In Python, the building blocks of an expression are called "atoms". Atoms include
    [lexical tokens](https://docs.python.org/3/reference/lexical_analysis.html#tokens)
    like identifiers and literals, and they can be nested. Expressions enclosed in
    parentheses, square brackets or curly braces are also syntactically atoms.


    At the next level up, the following "primaries" represent the most tightly bound
    operations:


    *Attribute References*


    A primary followed by a period and a name, called the attribute reference, is
    also a primary. An object''s attribute reference can be customized by overriding
    its `__getattr__` method.


    *Subscriptions*


    Subscription, or indexing, of a sequence (e.g., string, tuple, or list) or mapping
    object (e.g., dictionary) selects an item from the given collection. User-defined
    objects can support subscription by implementing a `__getitem__` method.


    ## Slicings


    A slicing operation selects a range of items in a sequence object. Slicings may
    be used as expressions or as [targets in assignment](https://docs.python.org/3/reference/simple_stmts.html#assignment-statements)
    or [del statements](https://docs.python.org/3/reference/simple_stmts.html#the-del-statement).
    The primary is indexed (using the same `__getitem__` method as the subscription)
    with a key that is constructed from the slice list, as follows.


    - If the slice list contains at least one comma, the key is a tuple containing
    the conversion of the slice items.

    - Otherwise, the conversion of the lone slice item is the key.


    ## Calls


    A "call" calls a [callable object](https://docs.python.org/3/glossary.html#term-callable)
    (e.g., a function or class) with a (possibly empty) series of arguments. All objects
    having a `__call__` method are callable such as built-in functions, methods of
    built-in objects, class objects, methods of class instances, and user-defined
    functions. All argument expressions are evaluated before the call is attempted.


    There are a few different kinds of expressions in Python. An expression can comprise
    one or more other (sub-)expressions, e.g., combined with operators.


    - Arithmetic conversions.

    - Arithmetic operations, unary and binary.'
  mdcn: '序列是由非负整数索引的有序集合。序列 `a` 的第 `i` 项通过 `a[i]` 选取。索引范围从 `0` 到 `len(a) - 1`。`len`
    是一个内置函数，返回序列中的项数。


    对序列进行“切片”会产生另一个相同类型的序列，称为切片。例如，`a[i:j]` 选取所有索引在 `i`（包含）和 `j`（不包含）之间的项。切片的索引始终从
    `0` 开始，无论其如何切片。


    ## 8.2.1. 序列解包


    一个表达式列表会求值为一个元组对象。当生成的元组被赋值给单个变量时，这被称为“元组打包”：


    ```

    >>> x = 1, ''a'', True

    >>> x

    (1, ''a'', True)

    ```


    “元组打包”。`x` 的类型是 `tuple`。右侧的三个值已被“打包”到一个变量中。


    另一方面，一个序列类型对象可以被“解包”到多个变量。


    ```

    >>> p, q, r = [''a'', ''b'', ''c'']

    >>> p, q, r

    (''a'', ''b'', ''c'')

    ```


    右侧一个包含三个项的列表已被“解包”到三个变量 `p`、`q` 和 `r` 中。


    通常，变量的数量必须与序列中的元素数量相同。然而，Python 支持一种用于“剩余元素”的特殊语法。例如，


    ```

    >>> p, *q = [1, 2, 3, 4]

    >>> p, q

    (1, [2, 3, 4])

    ```


    在解包语法中，最多可以有一个变量被标记为 `*`。在将每个前导或尾随元素映射到相应的变量后，此变量会获取序列中的所有剩余元素。请注意，`q` 的类型是 `list`。


    ## 8.3. 不可变序列


    不可变序列类型的对象一旦创建就无法更改。


    ### 8.3.1. 字符串


    字符串是表示 Unicode 码位的值序列。Python 没有字符类型。内置函数 `ord` 将码位从其字符串形式转换为范围在 `0` 到 `0x10FFFF`
    之间的整数。另一方面，`chr` 将范围在 `0` 到 `0x10FFFF` 之间的整数转换为相应的长度为 1 的字符串对象。


    字符串可以使用 `+` 运算符进行连接。将两个字符串相加会返回一个*新的*字符串。字符串在 Python 中是真正不可变的。字符串类型包含许多内置方法，如
    `count`、`index`、`find`、`replace`、`format`、`join`、`split`、`startswith`、`endswith`、`upper`、`lower`、`isalnum`、`isalpha`、`islower`、`isupper`
    和 `isspace`。


    ### 8.3.2. 元组


    元组是零个、一个或多个任意 Python 对象在一对括号内的不可变序列。元组的*长度*，即元组中元素或项的数量，可以使用 Python 内置函数 `len`
    计算。


    ```

    >>> len((False, "Hello", 1_000_000))

    3

    ```


    ### 8.3.3. 字节序列


    Python 没有字节类型。相反，它有一个字节序列类型，这是一个不可变的 8 位字节数组。


    ## 8.4. 可变序列


    可变序列的项在创建后可以更改，例如，使用赋值或 `del`（删除）语句。


    ### 8.4.1. 列表


    列表类型是 Python 中另一个重要的内置数据类型。列表是零个、一个或多个对象的可变序列。列表可以使用内置列表方法（如 `append`、`insert`、`pop`
    和 `remove` 等）进行修改。列表中元素的顺序可以使用 `reverse` 和 `sort` 方法进行更新。


    与元组一样，可以使用内置函数 `len` 获取列表中的元素数量。例如，


    ```

    >>> len([1.0, 2.0, 3.0])

    3

    ```


    ### 8.4.2. 列表推导式


    除了显式的字面量语法外，还可以使用列表推导式语法创建列表。例如，


    ```

    >>> [ x*x for x in range(5) ]

    [0, 1, 4, 9, 16]

    >>> [ x*x for x in range(5) if x % 2 == 0 ]

    [0, 4, 16]

    ```


    此表达式求值为 `[0, 1, 4, 9, 16]`。`if` 子句可用于过滤元素。


    列表推导式以及列表字面量表达式，每次求值时都会产生一个*新的*列表对象。


    ### 8.4.3. 字节数组


    `bytearray` 对象类似于字节序列，但它们是可变的。`bytearray` 对象由内置的 `bytearray` 构造函数创建。


    ## 8.5. 集合类型


    集合类型表示唯一、不可变对象的无序集合。（集合类型的元素类似于映射类型的键。）集合中的项不能使用下标语法进行索引。但它们可以像其他序列类型一样被迭代。（也就是说，集合是可迭代的。）`len`
    函数返回集合中的项数。


    ### 8.5.1. 集合


    集合表示一个可变集合。它们可以由内置的 `set` 构造函数创建，如前所述。


    ### 8.5.2. 集合推导式


    除了显式的集合字面量语法外，还可以使用集合推导式语法创建集合。例如，


    ```

    >>> type({1, 3, 5, 7})

    <class ''set''>

    >>> { x*2 for x in range(5) }

    {0, 2, 4, 6, 8}

    ```


    一个集合字面量，`{1, 3, 5, 7}`。此推导式表达式求值为 `{0, 2, 4, 8, 6}`。


    集合推导式以及包含逗号分隔元素列表的字面量表达式，每次求值时都会返回一个*新的*可变集合对象。


    ### 8.5.3. 冻结集合


    内置的 `frozenset` 构造函数创建一个 `frozenset` 对象，这是一个不可变集合。


    ## 8.6. 映射


    映射类型表示由任意索引集（或键）索引的对象的有序或无序集合。内置函数 `len` 返回给定映射对象中的项数。下标表示法 `a[k]` 从映射 `a` 中选取由
    `k` 索引的项。这可以用作赋值或 `del` 语句的目标。


    ### 8.6.1. 字典


    字典是 Python 中内置的可变映射类型。它们表示由支持常量哈希值的任何类型的值索引的对象的有限集合。字典保留插入顺序。也就是说，键将按照它们被依次添加到字典中的相同顺序产生。


    ### 8.6.2. 字典推导式


    除了通过列出元素的字典字面量语法外，还可以使用[字典推导式语法](https://docs.python.org/3/reference/expressions.html#dict)创建新的
    `dict` 对象。例如，


    ```

    >>> { str(x): x**2 for x in range(4) }

    {''0'': 0, ''1'': 1, ''2'': 4, ''3'': 9}

    ```


    请注意 `for` 子句之前的表达式语法 `(k:v)`。


    ### 8.6.3. 元素插入/删除


    ```

    >>> d = {"a": 1}

    >>> d[''b''] = 2

    >>> del(d[''a''])

    >>> d

    {''b'': 2}

    ```


    如果存在具有给定键的元素，则覆盖现有元素。否则，插入一个新元素。


    `del` 语句将在本书后面描述。


    ## 9. 表达式


    “表达式”由运算符和操作数组成，它求值为一个值。一个值（平凡地）就是一个表达式。


    在 Python 中，表达式的构建块被称为“原子”。原子包括[词法标记](https://docs.python.org/3/reference/lexical_analysis.html#tokens)，如标识符和字面量，并且它们可以嵌套。用括号、方括号或花括号括起来的表达式在语法上也是原子。


    在下一级，以下“初等表达式”表示绑定最紧密的操作：


    *属性引用*


    一个初等表达式后跟一个句点和一个名称，称为属性引用，也是一个初等表达式。对象的属性引用可以通过重写其 `__getattr__` 方法来自定义。


    *下标*


    序列（例如，字符串、元组或列表）或映射对象（例如，字典）的下标或索引从给定集合中选取一个项。用户定义的对象可以通过实现 `__getitem__` 方法来支持下标。


    ## 切片


    切片操作选取序列对象中的一系列项。切片可以用作表达式，也可以用作[赋值中的目标](https://docs.python.org/3/reference/simple_stmts.html#assignment-statements)或
    [del 语句](https://docs.python.org/3/reference/simple_stmts.html#the-del-statement)中的目标。初等表达式使用从切片列表构造的键进行索引（使用与下标相同的
    `__getitem__` 方法），如下所示。


    - 如果切片列表包含至少一个逗号，则键是一个包含切片项转换的元组。

    - 否则，单个切片项的转换就是键。


    ## 调用


    “调用”使用一个（可能为空的）参数序列调用一个[可调用对象](https://docs.python.org/3/glossary.html#term-callable)（例如，函数或类）。所有具有
    `__call__` 方法的对象都是可调用的，例如内置函数、内置对象的方法、类对象、类实例的方法和用户定义的函数。所有参数表达式在尝试调用之前都会被求值。


    Python 中有几种不同类型的表达式。一个表达式可以包含一个或多个其他（子）表达式，例如，与运算符组合。


    - 算术转换。

    - 算术运算，一元和二元。'
