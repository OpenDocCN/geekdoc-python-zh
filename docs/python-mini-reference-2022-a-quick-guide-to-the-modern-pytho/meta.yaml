    \ `GeneratorExit` exception at the suspension point, causing the coroutine to\
    \ immediately clean itself up. Finally, it is marked as having finished executing,\
    \ ending the lifecycle of the coroutine.\n\nThe standard library `asyncio` module\
    \ provides a number of convenience types and methods, such as `Task` and `Future`,\
    \ for managing coroutines.\n\n## 15.5. Coroutine Functions\n\nThe `async def`\
    \ statement defines a coroutine function in a similar way that the `def` statement\
    \ defines a (normal) function. A coroutine defined with `async def` *can*, but\
    \ is not required to, include [await expressions](https://docs.python.org/3/reference/expressions.html#await)\
    \ and [async statements](https://docs.python.org/3/reference/simple_stmts.html#async)\
    \ such as `async for` and `async with`.\n\nCalling a coroutine function object\
    \ returns an awaitable object, more specifically, a [coroutine object](https://docs.python.org/3/glossary.html#term-coroutine-object).\
    \ Execution of coroutines can be suspended and resumed, as explained in [the previous\
    \ section](https://docs.python.org/3/reference/compound_stmts.html#async-def).\n\
    \n```\n>>> async def a():\n...     print(\"a\")\n...\n>>> async def b():\n...\
