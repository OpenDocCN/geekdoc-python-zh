- md: "## 14.2.1. Class objects\n\nPython's class statement creates a class object\
    \ in memory (just like the def statement creates a function object). A class object\
    \ supports the \"[attribute references](https://docs.python.org/3/glossary.html#term-attribute-reference)\"\
    \ syntax, e.g., through the dot notation, just like any other Python objects.\n\
    \n```python\n>>> class SoSimple:\n...     one_name = \"simple\"\n...\n>>> type(SoSimple)\n\
    <class 'type'>\n>>> SoSimple.one_name\n'simple'\n>>> SoSimple.one_number = 666\n\
    >>> SoSimple.one_number\n666\n>>> dir(SoSimple)\n['__class__', ... '__weakref__',\
    \ 'one_name', 'one_number']\n```\n\n- The type of a class object is type.\n- The\
    \ attribute included in the class definition.\n- We can add any additional attributes\
    \ to a class object, just like any other objects.\n- Note that a class object\
    \ comes with a number of predefined attributes, all of which start and end with\
    \ double underscores (__), aka \"dunder\".\n\nThis type of attributes of a class\
    \ correspond to the static variables (or, static fields) and the static methods\
    \ in other OOP programming languages.\n\n## 14.2.2. Class variables\n\nA class\
    \ object (e.g., defined by the class statement) plays two roles, among others.\
    \ First, as we have seen before, it is the *constructor* for the instance objects\
    \ of the given class/type. Second, it holds the common variables across all instances\
    \ of the class. In fact, the class variables are *shared* by all instance objects,\
    \ as we just mentioned.\n\n```python\n>>> class Car:\n...     brand = \"GM\"\n\
    ...\n>>> car1, car2 = Car(), Car()\n>>> car1.brand, car2.brand\n('GM', 'GM')\n\
    >>> Car.brand = \"Ford\"\n>>> car1.brand, car2.brand\n('Ford', 'Ford')\n```\n\n\
    - Car.brand is a class variable. It belongs to the class object.\n- You can access\
    \ it from an instance of the class.\n- But, the variable points to the same object,\
    \ Car.brand.\n\n## 14.2.3. Constructors\n\nIn addition to the attribute references,\
    \ a class object supports the \"instantiation operation\". A class object in Python\
    \ is a constructor for the objects of the given class/type.\n\nUsing the same\
    \ example from earlier,\n\n```python\n>>> s = SoSimple()\n>>> type(s)\n<class\
    \ '__main__.SoSimple'>\n>>> s.one_name\n'simple'\n>>> s.one_number\n666\n```\n\
    \nNote that the instance object, s, includes the ad-hoc attribute, one_number,\
    \ as well as one_name, which is part of the original class definition. One can\
    \ add any additional attributes to a given instance object as well:\n\n```python\n\
    >>> s.one_address = \"Playa\"\n>>> s.one_address\n'Playa'\n>>> dir(s)\n['__class__',\
    \ ... '__weakref__', 'one_address', 'one_name', 'one_number']\n```\n\nNote that\
    \ the instance s includes more or less the same predefined attributes in the original\
    \ SoSimple class as well as other attributes later added to this class object\
    \ SoSimple, and those specific to the instance object s itself. We can also delete\
    \ an attribute defined in a class or in an instance using the del statement.\n\
    \n```python\n>>> del s.one_number\n>>> dir(s)\n['__class__', ... '__weakref__',\
    \ 'one_address', 'one_name']\n```\n\nThe instance object s no longer has the attribute,\
    \ one_number, after executing the del statement.\n\n## 14.2.4. The __init__ function\n\
    \nNote that a class object is not only used as a \"template\" when creating an\
    \ instance object of that class, but they essentially share the same attributes.\n\
    \n```python\n>>> s = SoSimple()\n>>> s.one_name\n'simple'\n>>> SoSimple.one_name\
    \ = \"not simple any more\"\n>>> SoSimple.one_name\n'not simple any more'\n>>>\
    \ s.one_name\n'not simple any more'\n```\n\nClass instantiation (or, instantiating\
    \ an instance object of a class) can be customized by overwriting the __init__\
    \ method of the class. This method is automatically called, e.g., by the Python\
    \ interpreter, after an instance has been created.\n\n```python\n>>> class SoEasy:\n\
    ...     def __init__(self):\n...         self.one_title = \"programmer\"\n...\n\
    >>> s = SoEasy()\n>>> s.one_title\n'programmer'\n>>> dir(s)\n['__class__', ...\
    \ '__weakref__', 'one_title']\n```\n\nNote the function signature. The `__init__`\
    \ method has at least one parameter. The first parameter always refers to the\
    \ instance object just created, which is always named self.\n\nAn instance object\
    \ for the type SoEasy, in this example, has an attribute, one_title, automatically\
    \ attached to it. This is because we create this name/attribute and attach it\
    \ to the self object in the SoEasy.__init__ method.\n\n## 14.2.5. Instance objects\n\
    \nAn *instance object* of a class includes all the attributes defined in the class,\
    \ and it can include other instance-specific attributes. Attribute references\
    \ can be used to refer to those attributes of an instance object. There are two\
    \ kinds of attributes, the data attributes, or fields or variables, and the methods.\n\
    \nAs mentioned, an instance object, just like everything else in Python, has attributes,\
    \ namely, the data attributes and the method attributes. Initially, most of its\
    \ attributes come from its type, and those added in the __init__ method, when\
    \ it is created. But, as with other kinds of custom objects (including functions,\
    \ classes, etc.), new attributes can be added to the instance objects.\n\nInstance\
    \ objects have methods that correspond to the functions in a class definition.\
    \ All functions that take an instance object as its first argument (e.g., self)\
    \ are, by definition, \"methods\", and Python allows the object method calling\
    \ syntax for these functions. For example,\n\n```python\n>>> class Ship:\n...\
    \     def fly(self):\n...         print(\"I cannot fly. Only spaceships can fly.\"\
    )\n...\n>>> s = Ship()\n>>> s.fly()\nI cannot fly. Only spaceships can fly.\n\
    ```\n\nHere, we call the method fly() on the instance object, s. This is equivalent\
    \ to the function call:\n\n```python\n>>> Ship.fly(s)\nI cannot fly. Only spaceships\
    \ can fly.\n```\n\n- Note the function argument in this call.\n\nIn fact, <instance>.f(...)\
    \ is just a \"syntactic sugar\" for the more normal function call syntax <class_name>.f(self,\
    \ ...). (Note the difference in the parameter list.) This works as long as the\
    \ first argument of the function, self, is an object of the given type/class.\n\
    \n## 14.2.6. Instance variables\n\nAlthough we can add any attributes to an instance\
    \ object in Python, it is conventionally done in the __init__ method. Then, all\
    \ instance objects of the class will have the same set of (not shared) attributes.\n\
    \n```python\n>>> class Pet:\n...     def __init__(self):\n...         self.kind\
    \ = \"dog\"\n...\n>>> pet1, pet2 = Pet(), Pet()\n>>> pet1.kind, pet2.kind\n('dog',\
    \ 'dog')\n```\n\nIn the initializer, the parameter self refers to the instance\
    \ object which has been just created by calling the class object. In the case\
    \ of pet1, for instance, self and self.kind refer to pet1 and pet1.kind, respectively.\
    \ Likewise, for the pet2 instance, self and self.kind refer to pet2 and pet2.kind,\
    \ respectively.\n\nThe attribute kind is an instance variable, and it belongs\
    \ to a specific instance object, and they are not shared across different instances.\
    \ In addition, the class object does not have that attribute:\n\n```python\n>>>\
    \ Pet.kind\nTraceback (most recent call last):\n  File \"<stdin>\", line 1, in\
    \ <module>\nAttributeError: type object 'Pet' has no attribute 'kind'\n```\n\n\
    Note the syntax to define an instance variable in a class definition. Instance\
    \ variables are defined on the self object. Hence, as a corollary, in a class\
    \ definition, you can only define instance variables within an instance method.\n\
    \n> All user-defined types are mutable. All objects of user-defined types are\
    \ mutable.\n\n## 14.2.7. Instance methods\n\nAs indicated, the most common statements\
    \ included in class definitions are generally the def statements to define functions.\
    \ A function defined in a class is an attribute of a class, and it is also an\
    \ attribute of any instance object of that class. And, it can be used with the\
    \ method syntax on the object as long as the type of its first argument is the\
    \ same class.\n\nUnlike the class variables, the class functions have two kinds,\
    \ besides the instance methods:\n\n- One that is just a function (except for the\
    \ dotted name syntax), which is called the \"static method\", and\n- The other\
    \ which is a part of a class object and which can access the class variables.\
    \ This is called the \"class method\". The first argument of a class method is\
    \ the class object itself.\n\nAs we have seen earlier, the builtin decorators,\
    \ @staticmethod and @classmethod, can be used to specifically declare one or the\
    \ other kind of class-level methods. Otherwise, by convention, all other methods\
    \ in a class definition should be instance methods."
  mdcn: "## 14.2.1. 类对象\n\nPython 的 `class` 语句会在内存中创建一个类对象（就像 `def` 语句创建一个函数对象一样）。类对象支持“[属性引用](https://docs.python.org/3/glossary.html#term-attribute-reference)”语法，例如通过点号表示法，就像任何其他\
    \ Python 对象一样。\n\n```python\n>>> class SoSimple:\n...     one_name = \"simple\"\
    \n...\n>>> type(SoSimple)\n<class 'type'>\n>>> SoSimple.one_name\n'simple'\n>>>\
    \ SoSimple.one_number = 666\n>>> SoSimple.one_number\n666\n>>> dir(SoSimple)\n\
    ['__class__', ... '__weakref__', 'one_name', 'one_number']\n```\n\n- 类对象的类型是 `type`。\n\
    - 类定义中包含的属性。\n- 我们可以向类对象添加任何额外的属性，就像对任何其他对象一样。\n- 请注意，类对象自带许多预定义属性，所有这些属性都以双下划线（`__`）开头和结尾，也称为“dunder”。\n\
    \n这种类型的类属性对应于其他面向对象编程语言中的静态变量（或静态字段）和静态方法。\n\n## 14.2.2. 类变量\n\n一个类对象（例如，由 `class`\
    \ 语句定义的）扮演着多种角色。首先，正如我们之前所见，它是给定类/类型的实例对象的*构造器*。其次，它保存着该类所有实例共享的变量。事实上，正如我们刚才提到的，类变量是被所有实例对象*共享*的。\n\
    \n```python\n>>> class Car:\n...     brand = \"GM\"\n...\n>>> car1, car2 = Car(),\
    \ Car()\n>>> car1.brand, car2.brand\n('GM', 'GM')\n>>> Car.brand = \"Ford\"\n\
    >>> car1.brand, car2.brand\n('Ford', 'Ford')\n```\n\n- `Car.brand` 是一个类变量。它属于类对象。\n\
    - 你可以从类的实例访问它。\n- 但是，该变量指向同一个对象，即 `Car.brand`。\n\n## 14.2.3. 构造器\n\n除了属性引用，类对象还支持“实例化操作”。Python\
    \ 中的类对象是给定类/类型的对象的构造器。\n\n使用之前的同一个例子，\n\n```python\n>>> s = SoSimple()\n>>> type(s)\n\
    <class '__main__.SoSimple'>\n>>> s.one_name\n'simple'\n>>> s.one_number\n666\n\
    ```\n\n请注意，实例对象 `s` 包含了临时属性 `one_number`，以及原始类定义中的一部分 `one_name`。我们也可以向给定的实例对象添加任何额外的属性：\n\
    \n```python\n>>> s.one_address = \"Playa\"\n>>> s.one_address\n'Playa'\n>>> dir(s)\n\
    ['__class__', ... '__weakref__', 'one_address', 'one_name', 'one_number']\n```\n\
    \n请注意，实例 `s` 包含了原始 `SoSimple` 类中或多或少相同的预定义属性，以及后来添加到该类对象 `SoSimple` 的其他属性，还有特定于实例对象\
    \ `s` 本身的属性。我们也可以使用 `del` 语句删除在类或实例中定义的属性。\n\n```python\n>>> del s.one_number\n\
    >>> dir(s)\n['__class__', ... '__weakref__', 'one_address', 'one_name']\n```\n\
    \n执行 `del` 语句后，实例对象 `s` 不再拥有属性 `one_number`。\n\n## 14.2.4. `__init__` 函数\n\n请注意，类对象不仅在创建该类的实例对象时用作“模板”，而且它们本质上共享相同的属性。\n\
    \n```python\n>>> s = SoSimple()\n>>> s.one_name\n'simple'\n>>> SoSimple.one_name\
    \ = \"not simple any more\"\n>>> SoSimple.one_name\n'not simple any more'\n>>>\
    \ s.one_name\n'not simple any more'\n```\n\n类的实例化（或，实例化一个类的实例对象）可以通过覆盖类的 `__init__`\
    \ 方法来自定义。此方法在实例创建后会自动被调用，例如，由 Python 解释器调用。\n\n```python\n>>> class SoEasy:\n\
    ...     def __init__(self):\n...         self.one_title = \"programmer\"\n...\n\
    >>> s = SoEasy()\n>>> s.one_title\n'programmer'\n>>> dir(s)\n['__class__', ...\
    \ '__weakref__', 'one_title']\n```\n\n注意函数签名。`__init__` 方法至少有一个参数。第一个参数总是指刚刚创建的实例对象，它总是被命名为\
    \ `self`。\n\n在此示例中，`SoEasy` 类型的一个实例对象有一个属性 `one_title` 自动附加到它上面。这是因为我们在 `SoEasy.__init__`\
    \ 方法中创建了这个名称/属性并将其附加到 `self` 对象上。\n\n## 14.2.5. 实例对象\n\n一个类的*实例对象*包含类中定义的所有属性，并且可以包含其他特定于实例的属性。属性引用可用于引用实例对象的这些属性。属性有两种类型：数据属性（或字段、变量）和方法。\n\
    \n如前所述，实例对象与 Python 中的其他所有事物一样，具有属性，即数据属性和方法属性。最初，它的大部分属性来自其类型，以及在创建时在 `__init__`\
    \ 方法中添加的属性。但是，与其他类型的自定义对象（包括函数、类等）一样，可以向实例对象添加新的属性。\n\n实例对象具有与类定义中的函数相对应的方法。所有以实例对象作为第一个参数（例如\
    \ `self`）的函数，根据定义都是“方法”，Python 允许使用对象方法调用语法来调用这些函数。例如，\n\n```python\n>>> class\
    \ Ship:\n...     def fly(self):\n...         print(\"I cannot fly. Only spaceships\
    \ can fly.\")\n...\n>>> s = Ship()\n>>> s.fly()\nI cannot fly. Only spaceships\
    \ can fly.\n```\n\n这里，我们在实例对象 `s` 上调用了方法 `fly()`。这等同于函数调用：\n\n```python\n>>> Ship.fly(s)\n\
    I cannot fly. Only spaceships can fly.\n```\n\n- 注意此调用中的函数参数。\n\n事实上，`<instance>.f(...)`\
    \ 只是更常规的函数调用语法 `<class_name>.f(self, ...)` 的“语法糖”。（注意参数列表的差异。）只要函数的第一个参数 `self`\
    \ 是给定类型/类的对象，这就可以工作。\n\n## 14.2.6. 实例变量\n\n虽然我们可以在 Python 中向实例对象添加任何属性，但通常是在 `__init__`\
    \ 方法中完成的。然后，该类的所有实例对象都将拥有相同的（非共享的）属性集。\n\n```python\n>>> class Pet:\n...     def\
    \ __init__(self):\n...         self.kind = \"dog\"\n...\n>>> pet1, pet2 = Pet(),\
    \ Pet()\n>>> pet1.kind, pet2.kind\n('dog', 'dog')\n```\n\n在初始化器中，参数 `self` 指的是刚刚通过调用类对象创建的实例对象。以\
    \ `pet1` 为例，`self` 和 `self.kind` 分别指代 `pet1` 和 `pet1.kind`。同样，对于 `pet2` 实例，`self`\
    \ 和 `self.kind` 分别指代 `pet2` 和 `pet2.kind`。\n\n属性 `kind` 是一个实例变量，它属于特定的实例对象，并且在不同实例之间不共享。此外，类对象没有该属性：\n\
    \n```python\n>>> Pet.kind\nTraceback (most recent call last):\n  File \"<stdin>\"\
    , line 1, in <module>\nAttributeError: type object 'Pet' has no attribute 'kind'\n\
    ```\n\n请注意在类定义中定义实例变量的语法。实例变量是在 `self` 对象上定义的。因此，作为推论，在类定义中，你只能在实例方法内定义实例变量。\n\
    \n> 所有用户定义的类型都是可变的。所有用户定义类型的对象都是可变的。\n\n## 14.2.7. 实例方法\n\n如前所述，类定义中包含的最常见语句通常是用于定义函数的\
    \ `def` 语句。在类中定义的函数是类的属性，也是该类任何实例对象的属性。并且，只要其第一个参数的类型是同一个类，就可以在对象上使用方法语法来使用它。\n\
    \n与类变量不同，类函数除了实例外，还有两种类型：\n\n- 一种只是函数（除了点号名称语法），称为“静态方法”，以及\n- 另一种是类对象的一部分，可以访问类变量。这称为“类方法”。类方法的第一个参数是类对象本身。\n\
    \n正如我们之前所见，内置装饰器 `@staticmethod` 和 `@classmethod` 可用于专门声明其中一种或另一种类型的类级方法。否则，按照惯例，类定义中的所有其他方法都应该是实例方法。"
