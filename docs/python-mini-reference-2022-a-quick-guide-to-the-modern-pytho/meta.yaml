    # 10.2. Assignment Statement


    Assignment is one of the simple statements in Python. Assignment statements are
    primarily used to [bind a new name, or rebind an existing name, to an object](https://docs.python.org/3/reference/datamodel.html#objects-values-and-types).
    They are also used to modify attributes or items of a mutable object.


    The left-hand side of an assignment statement can be


    +   1. A new name or a name referring to an object, or

    2. An attribute or item of a mutable object.


    An assignment statement evaluates the expression, or the [expression list](https://docs.python.org/3/reference/expressions.html#expression-lists),
    on the right hand side, from left to right, and it assigns the single resulting
    object to the corresponding target list on the left hand side, from left to right.
    If the target list is a single target with no trailing comma, the object is assigned
    to that target. (As indicated, the assignment of an expression list to a target
    list is a combination of the [tuple packing](https://docs.python.org/3/reference/expressions.html#parenthesized-assignment-targets)
    and [sequence unpacking](https://docs.python.org/3/reference/expressions.html#list-displays).)


    In Python, we can also bind multiple names to a single object in one statement.
    For example,


    ```

    >>> x = y = "dragon"

    >>> p = q = [''a'', ''b'']

    >>> id(x), id(y)

    (140593323269680, 140593323269680)

    >>> id(p), id(q)

    (140593324864960, 140593324864960)

    ```'
