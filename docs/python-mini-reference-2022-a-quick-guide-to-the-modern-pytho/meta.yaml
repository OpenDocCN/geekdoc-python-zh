    \n一些示例已在函数定义部分给出。\n\n## 13.6. Lambda 表达式\n\nLambda *表达式*求值为一个匿名函数对象。以下是通用语法：\n\
    \n```\nlambda <parameters>: <expression>\n```\n\n上述形式或多或少等同于使用以下方式定义的（命名的）[函数对象](https://docs.python.org/3/glossary.html#term-function-object)：\n\
    \n```\ndef <name>(<parameters>):\n    return <expression>\n```\n\n请注意，\n\n- 使用\
    \ lambda 表达式创建的函数对象可以“就地”调用，并且\n- Lambda 表达式不能包含语句或注解。\n\n例如，\n\n```\n>>> (lambda\
    \ x: x + 1)(10)          â\x80\x99\n11\n>>> a = [1, 2, 3]\n>>> list(map(lambda\
    \ x: x * 2, a))  â\x80\x99ï\n[2, 4, 6]\n```\n\nâ\x80\x99 Lambda 表达式可以赋值给变量，也可以在定义点调用，如本例所示。\n\
    \nâ\x80\x99ï Lambda 表达式通常用作高阶函数（HOFs）的一次性函数类型参数。例如，在本例中，map 是一个内置函数，它接受一个函数对象作为其第一个参数。\n\
    \n## 13.7. map、filter 和 reduce\n\n尽管我们不会在这个迷你参考中介绍所有内置函数，但让我们回顾一下内置的 map 和 filter\
    \ 函数，以及 functools 模块中的 reduce 函数。它们通常被称为*高阶函数*（HOFs），因为它们接受函数作为参数，和/或返回函数。\n\n\
    map、filter 和 reduce 函数（可能名称不同）是不同编程语言（函数式或命令式）中最常用的高阶函数之一。\n\n对于这些 HOF 函数，使用匿名函数（即\
    \ Lambda 表达式）作为其函数参数是一种相当常见的做法，因为函数参数通常只使用一次。\n\n### 13.7.1. map 函数\n\n内置的 map\
    \ 函数接受函数和可迭代类型的参数，并将该函数应用于给定可迭代对象中的每个元素。例如，\n\n```\n>>> list(map(lambda x: x**2,\
    \ [1, 2, 3]))\n[1, 4, 9]\n```\n\nâ` map 函数返回一个 map 对象。（也就是说，map 是一个构造函数。）我们使用\
    \ list 构造函数将返回的 map 转换为列表。\n\n### 13.7.2. filter 函数\n\n内置的 filter 函数同样接受一个函数和一个可迭代对象，并根据给定的函数返回一个过滤后的列表。例如，\n\
    \n```\n>>> list(filter(\n...     lambda x: True if x%2==0 else False,\n...   \
    \  [1, 2, 3, 4]))\n[2, 4]\n```\n\nâ` filter 与 map 类似。它是一个构造函数。\n\nâ`i 它将函数应用于给定可迭代对象中的每个元素，如果其布尔值为\
    \ True（例如，3、'hello' 等），则将其包含在结果中。否则（例如，None、[] 等），则将其过滤掉。\n\n### 13.7.3. functools.reduce\
    \ 函数\n\nfunctools 模块的 reduce 函数以类似的方式工作，但它将给定的函数*累积地*应用于给定可迭代对象中的所有元素。以下是一个示例：\n\
    \n```\n>>> from functools import reduce\n>>> reduce(lambda s, a: s + a, [1, 2,\
    \ 4], 0)  â`\n7\n```\n\nâ` 第三个参数是可选的，如果提供了，它将用作“归约”操作中的第一个项。在本例中，reduce 函数*迭代地*将给定的\
    \ lambda 函数应用于列表 [1, 2, 4] 中的每个元素。也就是说，它计算 0 + 1（结果为 1），1 + 2（结果为 3），3 + 4，结果为\
    \ 7，即最终结果。\n\n## 13.8. 函数装饰器\n\n装饰器是一个函数，或者更一般地说是一个可调用对象，它接受一个函数/可调用对象并返回相同类型的函数/可调用对象。在语法上，装饰器与目标函数定义一起使用，作为前缀，它转换目标函数并返回转换后的函数。换句话说，函数装饰器实际上成为目标函数定义的一部分。\n\
    \n以下是通用语法：\n\n```\n@decorator_function\ndef another_function(args):\n    pass\n\
    ```\n\n这在语义上等同于以下内容：\n\n```\ndef another_function(args):\n    pass\n\nanother_function\
    \ = decorator_function(another_function)\n```\n\ndecorator_function 是一个函数：\n\n\
    ```\ndef decorator_function(f1):\n    # 将 f1 转换为 f2，\n    # 或者基于 f1 创建 f2。\n \
    \   return f2\n```\n\n使用装饰器的关键，除了语法上的便利性，是"
