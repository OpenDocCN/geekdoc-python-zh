    # 9.9.3. Membership test operations


    For collections, the operators `in` and `not in` test for membership. `x in s`
    evaluates to `True` if x is a member of s, and `False` otherwise. `x not in s`
    returns the negation of `x in s`. All built-in sequences and set types support
    this. For dict, the `in` operator tests whether the dictionary has a given key.


    For the string and bytes types, `x in y` is `True` if and only if x is a substring
    of y. The operator `not in` is defined to have the inverse truth value of `in`.
    For example,


