- md: "## 14.4. Data Classes\n\nA class can be used for purely data organization and\
    \ access, and not for behavior. This kind of class is often called a \"record\"\
    \ or \"struct type\". Python provides a helper module, `dataclasses`, in the standard\
    \ library for creating a record-like class, called the data class.\n\nOne can\
    \ use the `@dataclasses.dataclass` decorator to create a data class, without having\
    \ to manually implement a number of essential methods. For example,\n\n```python\n\
    >>> from dataclasses import dataclass\n>>>\n>>> @dataclass\n... class Point:\n\
    ...     x: int = 0\n...     y: int = 0\n...\n>>> p1 = Point(1, 2)\n>>> p2, p3\
    \ = Point(x=1, y=2), Point(2)\n>>> p1, p2, p3\n(Point(x=1, y=2), Point(x=1, y=2),\
    \ Point(x=2, y=0))\n>>> p1 is p2, p1 == p2\n(False, True)\n>>> p1 is p3, p1 ==\
    \ p3\n(False, False)\n```\n\nBy default, the `@dataclass` decorator automatically\
    \ adds the implementations for `__init__`, `__repr__`, and `__eq__` methods to\
    \ the decorated class, among other things.\n\n- You specify the data attributes,\
    \ or \"fields\", with the type annotations, e.g., `x: int` and `y: int`, in this\
    \ example. Optional default values can be added, e.g., `= 0`.\n- The constructor\
    \ with the specified fields is automatically created. Because both fields include\
    \ the default values, both constructor function parameters are optional as well,\
    \ in this example.\n- The auto-generated `__repr__` implementation uses the names/values\
    \ of the class and their fields.\n- The auto-generated `__eq__` method ensures\
    \ the value equality semantics for data classes. That is, two different objects\
    \ with the same values are considered equal.\n- Likewise, two objects with different\
    \ values cannot be the same object.\n\nIn general, the `@dataclass` decorator\
    \ accepts the following arguments (all optional):\n\n```python\n@dataclass(\n\
    \    init=True,\n    repr=True,\n    eq=True,\n    order=False,\n    unsafe_hash=False,\n\
    \    frozen=False,\n    match_args=True,\n    kw_only=False,\n    slots=False\n\
    )\nclass DataClass:\n    pass\n```\n\n- The `__init__` method will not be auto-generated\
    \ if `init=False` or if the method already exists in the decorated class.\n- The\
    \ `__repr__` method will not be auto-generated if `repr=False` or if the method\
    \ already exists.\n- The `__eq__` method will not be auto-generated if `eq=False`\
    \ or if the method is already implemented.\n- The `__lt__`, `__le__`, `__gt__`,\
    \ and `__ge__` methods will be auto-generated if `order=True` and none of these\
    \ methods exist.\n- By default, `@dataclass` will add the `__hash__` method only\
    \ if it is \"safe\" to do so. (Consult the official reference for more information.)\
    \ Setting `unsafe_hash=True` will always auto-generate `__hash__` regardless of\
    \ whether it is \"safe\" or not (as long as it is not already implemented).\n\
    - If `frozen=True` and if the decorated class does not have `__setattr__` and\
    \ `__delattr__` methods, the class is made to be \"immutable\". Attempting to\
    \ assign to fields of an immutable data class will raise an exception.\n- If `match_args=False`,\
    \ or if the `__match_args__` attribute is already included in the decorated class,\
    \ then it will not auto-generate this attribute. The `__match_args__` attribute\
    \ (a tuple type) is used to support [the structural pattern matching](https://docs.python.org/3/reference/compound_stmts.html#the-match-case-statement)\
    \ for [the user-defined classes](https://docs.python.org/3/reference/datamodel.html#customizing-instance-and-subclass-checks).\n\
    - If `kw_only=True`, all fields will be made [keyword-only](https://docs.python.org/3/glossary.html#keyword-only-parameter)\
    \ in the auto-generated `__init__` method.\n- If `slots=True`, then the `__slots__`\
    \ attribute will be generated, and a new class will be returned instead of the\
    \ original one.\n\n## 14.5. Enums\n\nAn enum is a collection of names bound to\
    \ (related) constant value objects. These objects are called the members of the\
    \ enum, and they must be unique within the given enum. Each member of an enum\
    \ has a name and a value. The members of an enum type can be iterated over just\
    \ like an object of a sequence type. The values of the enum members can be of\
    \ any type, but immutable types such as `int` or `str` are typically used.\n\n\
    You create a new enum class by inheriting from the `enum.Enum` type, or one of\
    \ its subtypes such as `enum.IntEnum`. Here’s an example:\n\n```python\n>>> from\
    \ enum import Enum\n>>>\n>>> class Color(Enum):\n...     RED = \"red\"\n...  \
    \   GREEN = \"green\"\n...     BLUE = \"blue\"\n...\n```\n\nThe type of an enum\
    \ member (e.g., `Color.RED`) is not the type of its value (e.g., `\"red\"`). Its\
    \ type is the same enum type, e.g., `Color` in this example.\n\n```python\n>>>\
    \ isinstance(Color.RED, Color)\nTrue\n>>> issubclass(Color, Enum)\nTrue\n```\n\
    \nNote that you cannot use an enum type as a base class for other type, including\
    \ another enum type. If the type inheritance is important, then you will need\
    \ to use the normal class to create new types.\n\nWe can iterate over the enum\
    \ `__members__`, e.g., using [the for - in statement](https://docs.python.org/3/reference/compound_stmts.html#the-for-statement).\
    \ (That is, a collection of all enum members is an iterable.) For instance,\n\n\
    ```python\n>>> for c in Color:\n...     print(f\"{c}:\\t{c.value}\")\n...\nColor.RED:\
    \     red\nColor.GREEN:   green\nColor.BLUE:    blue\n```\n\nWe can also add a\
    \ `__str__` method to the `Color` enum class to customize its string representation.\
    \ For example,\n\n```python\n>>> class Color(Enum):\n...     RED = \"red\"\n...\
    \     GREEN = \"green\"\n...     BLUE = \"blue\"\n...     def __str__(self):\n\
    ...         match self.value:\n...             case \"red\":\n...            \
    \     return \"Red\"\n...             case \"green\":\n...                 return\
    \ \"Green\"\n...             case \"blue\":\n...                 return \"Blue\"\
    \n...             case _:\n...                 raise ValueError\n...\n>>> for\
    \ c in Color:\n...     print(c)\n...\nRed\nGreen\nBlue\n```\n\nThe two types,\
    \ `Frog` and `Flea`, have little to do with each other, other than the fact that\
    \ both inherit from `object` just like every type in Python. In particular, the\
    \ `Frog` type has a method `jump` whereas `Flea` does not. On the other hand,\
    \ `Bullfrog` is a subclass of `Frog`, and it overwrites the `__repr__` method\
    \ as well as `jump`.\n\nNow, let’s assume that we have a list of objects and we\
    \ need to call the `jump` method on each of them, say, in a `for` loop. In a traditional\
    \ OOP language, all objects in the list need to be a type of `Frog` or its subclass.\
    \ For example, this is generally how it works:\n\n```python\n>>> frog = Frog()\n\
    >>> bull = Bullfrog()\n>>>\n>>> for jumper in (frog, bull):\n...     print(jumper,\
    \ end=\": \")\n...     jumper.jump()\n...\nFrog: Big jump\nBull: Huge jump\n```\n\
    \nIn an example like this, the `jumper` variable needs to be the type `Frog`.\
    \ (We are ignoring value vs reference, etc.) Even if we add the same `jump` method\
    \ to `Flea`, fleas cannot be used in this `for` loop, in the strongly typed OOP\
    \ languages. On the other hand, in Python, the type does not matter. Any object\
    \ which has a `jump` method will work in this `for` loop regardless of their specific\
    \ types.\n\nFor instance, let’s try this:\n\n```python\n>>> flea = Flea()\n>>>\
    \ flea.jump = lambda:print(\"Small jump\")\n>>>\n>>> for jumper in (frog, flea):\n\
    ...     print(jumper, end=\": \")\n...     jumper.jump()\n...\nFrog: Big jump\n\
    Flea: Small jump\n```\n\nThe type of `flea` is `Flea`, and yet we can mix `Flea`\
    \ and `Frog` in the `for` loop. The type of `jumper` is not important. What’s\
    \ important is the fact that every `jumper` in the iterations has a `jump` method\
    \ defined.\n\nAs mentioned, the type systems like this are generally called the\
    \ \"duck typing\" (as in \"if it looks like a duck, swims like a duck, and quacks\
    \ like a duck, then it probably is a duck\"). Python’s support for types, e.g.,\
    \ the `object.__class__` attribute, the `issubclass` and `isinstance` functions,\
    \ and the classes and class inheritance, etc., provide (a lot of) convenience,\
    \ but they are not essential. Ultimately, Python uses duck typing at run time.\n\
    \n```python\nclass Bullfrog(Frog):\n    def __repr__(self):\n        return \"\
    Bull\"\n    def jump(self):\n        print(\"Huge jump\")\n\nclass Flea:\n   \
    \ def __repr__(self):\n        return \"Flea\"\n```"
  mdcn: "## 14.4. 数据类\n\n一个类可以仅用于数据的组织和访问，而不用于定义行为。这类类通常被称为“记录”或“结构体类型”。Python 在标准库中提供了一个辅助模块\
    \ `dataclasses`，用于创建类似记录的类，称为数据类。\n\n可以使用 `@dataclasses.dataclass` 装饰器来创建数据类，而无需手动实现许多必需的方法。例如，\n\
    \n```python\n>>> from dataclasses import dataclass\n>>>\n>>> @dataclass\n... class\
    \ Point:\n...     x: int = 0\n...     y: int = 0\n...\n>>> p1 = Point(1, 2)\n\
    >>> p2, p3 = Point(x=1, y=2), Point(2)\n>>> p1, p2, p3\n(Point(x=1, y=2), Point(x=1,\
    \ y=2), Point(x=2, y=0))\n>>> p1 is p2, p1 == p2\n(False, True)\n>>> p1 is p3,\
    \ p1 == p3\n(False, False)\n```\n\n默认情况下，`@dataclass` 装饰器会自动为被装饰的类添加 `__init__`、`__repr__`\
    \ 和 `__eq__` 等方法的实现。\n\n- 你通过类型注解来指定数据属性或“字段”，例如本例中的 `x: int` 和 `y: int`。可以添加可选的默认值，例如\
    \ `= 0`。\n- 包含指定字段的构造函数会自动创建。因为两个字段都包含了默认值，所以在这个例子中，两个构造函数参数也都是可选的。\n- 自动生成的 `__repr__`\
    \ 实现使用类及其字段的名称/值。\n- 自动生成的 `__eq__` 方法确保了数据类的值相等语义。也就是说，两个具有相同值的不同对象被视为相等。\n-\
    \ 同样，两个具有不同值的对象不可能是同一个对象。\n\n通常，`@dataclass` 装饰器接受以下参数（均为可选）：\n\n```python\n@dataclass(\n\
    \    init=True,\n    repr=True,\n    eq=True,\n    order=False,\n    unsafe_hash=False,\n\
    \    frozen=False,\n    match_args=True,\n    kw_only=False,\n    slots=False\n\
    )\nclass DataClass:\n    pass\n```\n\n- 如果 `init=False` 或者该方法已存在于被装饰的类中，则不会自动生成\
    \ `__init__` 方法。\n- 如果 `repr=False` 或者该方法已存在，则不会自动生成 `__repr__` 方法。\n- 如果 `eq=False`\
    \ 或者该方法已实现，则不会自动生成 `__eq__` 方法。\n- 如果 `order=True` 且这些方法都不存在，则会自动生成 `__lt__`、`__le__`、`__gt__`\
    \ 和 `__ge__` 方法。\n- 默认情况下，`@dataclass` 仅在“安全”时才会添加 `__hash__` 方法。（更多信息请查阅官方参考文档。）设置\
    \ `unsafe_hash=True` 将始终自动生成 `__hash__`，无论是否“安全”（只要它尚未实现）。\n- 如果 `frozen=True`\
    \ 且被装饰的类没有 `__setattr__` 和 `__delattr__` 方法，则该类将被设为“不可变”。尝试对不可变数据类的字段进行赋值将引发异常。\n\
    - 如果 `match_args=False`，或者被装饰的类中已包含 `__match_args__` 属性，则不会自动生成此属性。`__match_args__`\
    \ 属性（一个元组类型）用于支持[用户定义类](https://docs.python.org/3/reference/datamodel.html#customizing-instance-and-subclass-checks)的[结构化模式匹配](https://docs.python.org/3/reference/compound_stmts.html#the-match-case-statement)。\n\
    - 如果 `kw_only=True`，则所有字段在自动生成的 `__init__` 方法中都将是[仅关键字](https://docs.python.org/3/glossary.html#keyword-only-parameter)参数。\n\
    - 如果 `slots=True`，则会生成 `__slots__` 属性，并且将返回一个新类而不是原始类。\n\n## 14.5. 枚举\n\n枚举是一组绑定到（相关的）常量值对象的名称集合。这些对象被称为枚举的成员，它们在给定的枚举中必须是唯一的。枚举的每个成员都有一个名称和一个值。枚举类型的成员可以像序列类型的对象一样进行迭代。枚举成员的值可以是任何类型，但通常使用不可变类型，如\
    \ `int` 或 `str`。\n\n通过继承 `enum.Enum` 类型或其子类型（如 `enum.IntEnum`）来创建新的枚举类。以下是一个示例：\n\
    \n```python\n>>> from enum import Enum\n>>>\n>>> class Color(Enum):\n...     RED\
    \ = \"red\"\n...     GREEN = \"green\"\n...     BLUE = \"blue\"\n...\n```\n\n\
    枚举成员（例如 `Color.RED`）的类型不是其值（例如 `\"red\"`）的类型。它的类型是同一个枚举类型，例如本例中的 `Color`。\n\n\
    ```python\n>>> isinstance(Color.RED, Color)\nTrue\n>>> issubclass(Color, Enum)\n\
    True\n```\n\n请注意，你不能将枚举类型用作其他类型的基类，包括另一个枚举类型。如果类型继承很重要，那么你需要使用普通类来创建新类型。\n\n我们可以迭代枚举的\
    \ `__members__`，例如使用 [for - in 语句](https://docs.python.org/3/reference/compound_stmts.html#the-for-statement)。（也就是说，所有枚举成员的集合是一个可迭代对象。）例如，\n\
    \n```python\n>>> for c in Color:\n...     print(f\"{c}:\\t{c.value}\")\n...\n\
    Color.RED:     red\nColor.GREEN:   green\nColor.BLUE:    blue\n```\n\n我们还可以向 `Color`\
    \ 枚举类添加一个 `__str__` 方法来自定义其字符串表示。例如，\n\n```python\n>>> class Color(Enum):\n...\
    \     RED = \"red\"\n...     GREEN = \"green\"\n...     BLUE = \"blue\"\n... \
    \    def __str__(self):\n...         match self.value:\n...             case \"\
    red\":\n...                 return \"Red\"\n...             case \"green\":\n\
    ...                 return \"Green\"\n...             case \"blue\":\n...    \
    \             return \"Blue\"\n...             case _:\n...                 raise\
    \ ValueError\n...\n>>> for c in Color:\n...     print(c)\n...\nRed\nGreen\nBlue\n\
    ```\n\n`Frog` 和 `Flea` 这两种类型彼此几乎无关，除了它们都像 Python 中的每种类型一样继承自 `object`。特别是，`Frog`\
    \ 类型有一个 `jump` 方法，而 `Flea` 没有。另一方面，`Bullfrog` 是 `Frog` 的子类，它重写了 `__repr__` 方法以及\
    \ `jump` 方法。\n\n现在，假设我们有一个对象列表，我们需要在 `for` 循环中对每个对象调用 `jump` 方法。在传统的面向对象语言中，列表中的所有对象都需要是\
    \ `Frog` 类型或其子类。例如，通常的工作方式如下：\n\n```python\n>>> frog = Frog()\n>>> bull = Bullfrog()\n\
    >>>\n>>> for jumper in (frog, bull):\n...     print(jumper, end=\": \")\n... \
    \    jumper.jump()\n...\nFrog: Big jump\nBull: Huge jump\n```\n\n在这个例子中，`jumper`\
    \ 变量需要是 `Frog` 类型。（我们忽略了值与引用等问题。）即使我们给 `Flea` 添加相同的 `jump` 方法，在强类型的面向对象语言中，`Flea`\
    \ 对象也不能在这个 `for` 循环中使用。另一方面，在 Python 中，类型并不重要。任何具有 `jump` 方法的对象都可以在这个 `for` 循环中工作，无论其具体类型如何。\n\
    \n例如，让我们尝试一下：\n\n```python\n>>> flea = Flea()\n>>> flea.jump = lambda:print(\"\
    Small jump\")\n>>>\n>>> for jumper in (frog, flea):\n...     print(jumper, end=\"\
    : \")\n...     jumper.jump()\n...\nFrog: Big jump\nFlea: Small jump\n```\n\n`flea`\
    \ 的类型是 `Flea`，然而我们可以在 `for` 循环中混合使用 `Flea` 和 `Frog`。`jumper` 的类型并不重要。重要的是迭代中的每个\
    \ `jumper` 都定义了 `jump` 方法。\n\n如前所述，这类类型系统通常被称为“鸭子类型”（就像“如果它看起来像鸭子，游泳像鸭子，叫声像鸭子，那么它很可能就是鸭子”）。Python\
    \ 对类型的支持，例如 `object.__class__` 属性、`issubclass` 和 `isinstance` 函数，以及类和类继承等，提供了（很多）便利，但它们并非必不可少。最终，Python\
    \ 在运行时使用鸭子类型。\n\n```python\nclass Bullfrog(Frog):\n    def __repr__(self):\n \
    \       return \"Bull\"\n    def jump(self):\n        print(\"Huge jump\")\n\n\
    class Flea:\n    def __repr__(self):\n        return \"Flea\"\n```"
