    >>> ''c'' not in { ''a'', ''b'', ''d''}

    True

    >>> "k1" in { "k1": "v1", "k2": "v2" }

    True

    >>> "world" in "hello world"

    True

    ```


    For user-defined classes which define the `__contains__` method, `x in y` returns
    `True` if `y.__contains__(x)` returns a true value, and `False` otherwise.'
