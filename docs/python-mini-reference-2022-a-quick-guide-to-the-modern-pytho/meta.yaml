    例如，以下语句在执行时会创建一个名为 `add` 的函数对象，该函数接受两个参数 `p1` 和 `p2`，并返回一个值。\n\n```\n>>> def add(p1,\
    \ p2):\n...     \"Adds p1 and p2\"\n...     return p1 + p2\n...\n>>> add.__doc__\n\
