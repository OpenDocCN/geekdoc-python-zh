    \ for a given class, these base classes as well as their base classes, and their\
    \ bases classes, etc., up to object, are \"linearized\", or ordered, for the purposes\
    \ of looking up any inherited attributes.\n\nThis is called the MRO, or method\
    \ resolution order, in Python, and it is done through a method called the \"C3\
    \ Linearization algorithm\". It essentially tries to find an order that is consistent\
    \ with the left-to-right ordering of the base classes of each class involved.\
    \ This method yields, if successful, a unique ordering among all (direct or indirect)\
    \ base classes, including object, of a given class. This is not always achievable,\
    \ and in such cases, a compile error is raised. An obvious example is attempting\
    \ to inherit from two classes whose base classes have incompatible orders.\n\n\
    ```python\nclass A: pass\nclass B: pass\nclass C(A, B): pass\nclass D(B, A): pass\n\
    class E(C, D): pass\n```\n\nIn this example, there is no way to consistently order\
    \ all base classes of E (A, B, C, D, and object) because C requires an A → B ordering,\
    \ whereas D requires a B → A ordering. This statement will throw a TypeError exception.\n\
    \nOne thing to note is that, without E, these are all valid statements although\
    \ it *appears* that C and D are in conflict. The linearization of the base classes\
    \ are done with respect to each class. Depending on what methods are implemented\
    \ in A and B, etc., the behaviors of C and D might turn out rather different.\
    \ But, this is still a valid Python program (without E).\n\nHere's an example\
