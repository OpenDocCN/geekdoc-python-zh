    ## 12. PATTERN MATCHING\n\nPython's match - case statements, which was first introduced\
    \ in 3.10, can now be used where complex if - elif - else statements may have\
    \ been required. Pattern matching is essentially a generalization of [the comparison\
    \ expressions](the comparison expressions), which yield Boolean values.\n\n###\
    \ 12.1. The match - case Statement\n\nThe match statement has the following general\
    \ syntax:\n\n```python\nmatch SubjectExpression:\n    CaseBlock\n    ...\n   \
    \ CaseBlock\n```\n\nUnlike other compound statements, the match statement cannot\
    \ be written in one physical line. That is, a newline is always needed after the\
    \ colon. The *SubjectExpression* can be either a named expression or one or more\
    \ star named expressions (comma separated). When an expression list is used, it\
    \ is evaluated to a tuple first before the match process starts.\n\nAt least one\
    \ *CaseBlock* is required. That is, for instance, we cannot just use a placeholder\
    \ like the pass statement in the body of the match statement. Each *CaseBlock*\
    \ has the following forms:\n\n```\ncase Pattern:\n    Suite\n```\n\nOr\n\n```\n\
    case Pattern Guard:\n    Suite\n```\n\nWe go through all different pattern categories\
    \ in [the next section](the next section) that are currently supported in Python.\
    \ *Guard* is an optional Boolean condition. If included, the case clause matches\
    \ only if the pattern matches and the condition is also satisfied.\n\nIn the simplest\
    \ usage, the match statement can be used more or less like the traditional switch\
    \ statement in C. For instance,\n\n```python\n>>> color = Color.BLUE\n>>> match\
    \ color:\n...     case Color.RED:\n...         print(\"Color red detected\")\n\
    ...     case Color.BLUE:\n...         print(\"Blue wins!\")\n...     case _:\n\
    ...         print(\"We don't care about other colors :)\")\n...\nBlue wins!\n\
    ```\n\nThe case clauses do not require break statements, unlike in C's switch\
    \ - case statement. They do not \"fall through\".\n\nIn this example, the first\
    \ case does not match since `color != Color.RED`. Then the match statement matches\
    \ the next case because `color == Color.BLUE`, and hence the statement(s) in the\
    \ matched case is executed.\n\nThe wildcard expression `_` is used for \"catch\
    \ all\". That is, the `case _` clause is more or less equivalent to the *default*\
    \ case in the C-style switch statement. If there is no matching case, then the\
    \ match statement terminates without executing any suites. If the catch-all case\
    \ `case _` is specified, then the statements within this default case are executed.\n\
    \n### 12.2. Patterns\n\n#### 12.2.1. The wildcard pattern\n\nAs indicated at the\
    \ end of the previous section, the special pattern `_` matches any subject expression.\
    \ This is the simplest pattern, and because it matches any expression, it can\
    \ only be used in the last case clause in the match statement unless a guard is\
    \ used.\n\n```python\n>>> match 5:\n...     case _:\n...         print(\"I always\
    \ match!\")\n...\nI always match!\n```\n\n#### 12.2.2. Literal patterns\n\nMatching\
    \ literal patterns is effectively equivalent to comparison operations between\
    \ the subject expression and the literal patterns. Most of the constant literal\
    \ expressions are supported, including Booleans, integer and float numbers, and\
    \ strings. Complex numbers (which are not constant literals) also belong to this\
    \ category.\n\nFor example,\n\n```python\n>>> arr = (False, 30, 0.5 + 2j, \"\"\
    \"hello\"\"\", None)\n... for val in arr:\n...     match val:\n...         case\
    \ False:\n...             print(f\"{val} matched False\")\n...         case 30:\n\
    ...             print(f\"{val} matched 30\")\n...         case 0.5 + 2j:\n...\
    \             print(f\"{val} matched 0.5 + 2j\")\n...         case \"hello\":\n\
    ...             print(f\"{val} matched 'hello'\")\n...         case _:\n...  \
    \           print(\"Matched none\")\n...\nFalse matched False\n30 matched 30\n\
    (0.5+2j) matched 0.5 + 2j\nhello matched 'hello'\nMatched none\n```\n\nThis case\
    \ matches if `val` is `False`."
