    \ name 'unknown_name' is not defined\n```\n\n## 11.5. with 语句\n\n`with`复合语句用于将一组语句的执行包装在由上下文管理器定义的方法中。例如，它可以用于封装常见的`try...except...finally`使用模式。它具有以下语法：\n\
