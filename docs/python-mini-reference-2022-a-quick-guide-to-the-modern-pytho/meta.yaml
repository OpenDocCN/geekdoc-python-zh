    \ <class '__main__.A'>, <class 'object'>]\n```\n\n顺序是，\n\n```\nE --> C --> B -->\
    \ D --> A --> object\n```\n\n因此，e.x() 最终调用 B.x 而不是 D.x（它在链中更靠后）是合理的。\n\n## 14.3.5.\
    \ super()\n\n在许多支持面向对象编程（OOP）的语言中，像 `super`、`base` 和 `parent` 这样的术语具有某些相关的含义。在\
    \ Python 中，`super` 方法大致指代“基类”，具有更具体的语义，尤其是在多重继承的上下文中。\n\n例如，当在类中引用 `super().x`（无论是数据还是方法属性）时，Python\
    \ 会从给定类本身开始，沿着其线性化/排序的基类层次结构（MRO）从左到右（或从下到上，取决于你如何看待继承树）查找该属性。一旦在遍历过程中找到该属性，就会使用该属性的实现，并忽略所有其他（例如，其上游基类中的）实现。\n\
    \n请注意，MRO 是针对每个类定义的。例如，使用上面的例子，B 的 MRO 不是 D 的 MRO 的一个部分片段。它们可能完全不同。\n\n```python\n\
