    \nPublished: October 2022\n\nHarry Yoon\nSan Diego, California\n\n# PREFACE\n\n\
    Python is a dynamic language.\n\nIt means many different things. It means that\
    \ the language is more flexible. It means that Python is an easier language to\
    \ program with. You can quickly write a simple program without having to go through\
    \ too much \"rituals\", compared to many other programming languages. Python scripts\
    \ tend to require less boilerplate code. Python gives you more freedom.\n\nOn\
    \ the other hand, it also means that the language is less safe, and more error\
    \ prone. It means that it is harder to build a larger system with Python. It means\
    \ that software written in Python is generally harder to maintain over a longer\
    \ period of time.\n\nThe key to using Python effectively is to understand this\
    \ tradeoff. Python can be an ideal language, for instance, for quick prototyping,\
    \ or \"scripting\". On the flip side, Python is not as much used for the \"enterprise\
    \ software\" development.\n\nPython is a general purpose programming language.\
    \ Python is used in many different application areas, from system administration\
    \ tasks to web application development. Python is now one of the most widely used\
    \ programming languages for scientists, who have traditionally been using more\
    \ high-level tools like Matlab. Python provides an easier \"upgrade\" path to\
    \ these \"non-professional\" programmers. Now, Python is becoming *the* language\
    \ for machine learning and data science.\n\nPython is beginner-friendly. In fact,\
    \ it seems to be the most favorite first language for beginning programmers, even\
    \ more so than JavaScript.\n\nIt should be noted, however, that Python is *not*\
    \ a simple language. Over the past 30 years or so of its history, it has gone\
    \ through a lot of big and small changes. It is still easy to get started with\
    \ programming in Python. Nonetheless, once you reach a certain point, say, from\
    \ the advanced beginners to intermediate level, its complexity can be overwhelming.\n\
    \nThis book will give you a broad and *sanitized* overview of the Python language,\
    \ as of its most recent incarnation (e.g., 3.10 and 3.11). This book can be useful\
    \ to anyone who has been dabbling with Python without solid foundation. It can\
    \ also be useful to the people who have experience with other programming languages\
    \ and want to get some quick overview of the language.\n\nThis book is written\
    \ as an (informal) language reference. The goal of this book is not to teach you\
    \ how to program effectively in Python, but rather to provide a concise summary\
    \ of the language"
