    \ E(C, D): pass\n```\n\n在这个例子中，无法一致地排序 E 的所有基类（A、B、C、D 和 `object`），因为 C 要求 A →\
    \ B 的顺序，而 D 要求 B → A 的顺序。此语句将抛出 `TypeError` 异常。\n\n需要注意的是，如果没有 E，这些语句都是有效的，尽管\
    \ C 和 D *看起来* 存在冲突。基类的线性化是针对每个类分别进行的。根据 A 和 B 等类中实现了哪些方法，C 和 D 的行为可能大相径庭。但是，这仍然是一个有效的\
    \ Python 程序（没有 E 的情况下）。\n\n下面是一个有效的多重继承示例。这个例子包含了通常被称为“菱形继承模式”的内容。\n\n```python\n\
