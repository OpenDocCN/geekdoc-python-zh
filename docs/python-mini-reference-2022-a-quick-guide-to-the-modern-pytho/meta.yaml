    \n`with`语句套件中包含的所有语句都会被执行，例如，直到遇到错误（如果有的话）。\n\n在终止`with`语句之前，无论错误条件如何，都保证会调用上下文管理器的`__exit__`。通常，“清理代码”在`__exit__`方法中实现。在文件操作的情况下，如果文件已（成功）打开，则会调用`file.close()`，以及其他操作。\n\
