    ```python\n>>> for i in range(3):          # 1\n...     try:\n...         print(i)\n\
    ...         if i == 1:\n...             continue      # 2\n...         print(i)\n\
    ...     finally:\n...         print(\"finally\")\n...     else:\n...         print(\"\
