    # 12.2.10. Class patterns


    The class patterns are another category of patterns that Python''s match statement
    supports. A class pattern represents a class and its positional and keyword arguments.
    The keyword argument uses the equal sign (=) instead of the colon (:), which is
    used in the mapping pattern.


