    \ exception. These details are all hidden in the implementations of (synchronous\
    \ or asynchronous) generator functions and generator expressions.\n\n## 15.4.\
    \ Coroutine Objects\n\n### 15.4.1. Awaitable objects\n\nA type that implements\
    \ a special `__await__` method is an awaitable. An [await expression](https://docs.python.org/3/reference/expressions.html#await)\
    \ can be used with an awaitable.\n\n```\nobject.__await__(self)\n```\n\nIt returns\
    \ an iterator. It is used to define an awaitable type. For example, `asyncio.Future`\
    \ implements this method, and hence a `Future` object can be used as an operand\
