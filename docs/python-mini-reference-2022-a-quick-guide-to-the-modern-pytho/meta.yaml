    # 13.5.3. Positional vs keyword arguments


    As we have seen earlier, function parameters can be defined to be positional-only,
    positional-or-keyword, or keyword-only, in this order, separated by / and *, if
    needed.


    When we call a function, or any callable, we can provide positional arguments
    to positional-only and positional-or-keyword parameters, and keyword arguments
    to positional-or-keyword and keyword-only parameters.


    In addition,


    +   - All positional arguments should come before all keyword arguments, if any.

    - Each of the positional arguments should be placed in the position of the corresponding
    positional parameters.

    - Valid arguments should be provided for all non-optional parameters, positional
    or keyword.


    Some examples were given earlier, in the Function Definition section.


