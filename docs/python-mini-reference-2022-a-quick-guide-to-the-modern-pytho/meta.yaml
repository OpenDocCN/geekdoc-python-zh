- img_proc: true
  md: 'This is called the MRO, or method resolution order, in Python, and it is done
    through a method called the "C3 Linearization algorithm". It essentially tries
    to find an order that is consistent with the left-to-right ordering of the base
    classes of each class involved. This method yields, if successful, a unique ordering
    among all (direct or indirect) base classes, including object, of a given class.
    This is not always achievable, and in such cases, a compile error is raised. An
    obvious example is attempting to inherit from two classes whose base classes have
    incompatible orders.


    ```

    class A: pass

    class B: pass

    class C(A, B): pass

    class D(B, A): pass

    class E(C, D): pass

    ```


    In this example, there is no way to consistently order all base classes of E (A,
    B, C, D, and object) because C requires an A → B ordering, whereas D requires
    a B → A ordering. This statement will throw a TypeError exception.


    One thing to note is that, without E, these are all valid statements although
    it *appears* that C and D are in conflict. The linearization of the base classes
    are done with respect to each class. Depending on what methods are implemented
    in A and B, etc., the behaviors of C and D might turn out rather different. But,
    this is still a valid Python program (without E).'
