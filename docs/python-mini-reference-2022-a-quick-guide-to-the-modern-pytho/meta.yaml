    # 13.7.map, filter, and reduce


    Although we do not go through all builtin functions in this mini reference, let''s
    review the builtin map and filter functions as well as the reduce function from
    the functools module. They are generally called the *high-order functions* (HOFs)
    because they take as arguments, and/or return, functions.


    The map, filter, and reduce functions, possibly with different names, are a few
    of the most commonly used high-order functions across different programming languages,
    functional or imperative.


    It is a rather common practice to use anonymous functions, i.e., Lambda expressions,
    for their function arguments for these HOF functions since the function arguments
    are often used only once.


    # 13.7.1. The map function


    The builtin map function takes arguments of function and iterable types, and it
    applies the function to each element in the given iterable. For example,


    ```

    >>> list(map(lambda x: x**2, [1, 2, 3]))

    [1, 4, 9]

    ```


    â` The map function returns a map object. (That is, map is a constructor.) We
    use the list constructor to convert the returned map to a list.'
  - '[PAGE 148]


    # 13.7.2. The filter function


    The builtin filter function likewise takes a function and an iterable, and it
    returns a filtered list based on the given function. For example,


    ```

    >>> list(filter(

    ...     lambda x: True if x%2==0 else False,

    ...     [1, 2, 3, 4]))

    [2, 4]

    ```


    â` The same with filter. It is a constructor function.


    â`i It applies the function to each element in the given iterable, and if its
    Boolean value is True (e.g., 3, ''hello'', etc.), it is included in the result.
    Otherwise (e.g., None, [], etc.), it is filtered out.


    # 13.7.3. The functools.reduce function


    The reduce function of the functools module works in a similar manner, but it
    applies the given function *cumulatively* to all elements in the given iterable.
    Here''s an example:


    ```

    >>> from functools import reduce

    >>> reduce(lambda s, a: s + a, [1, 2, 4], 0)  â`

    7

    ```


    â` The third argument is optional, and if it is provided, it is used as the first
    item in the "reduction" operation. In this example, the reduce function applies
    the given lambda function *iteratively* for each element in the list [1, 2, 4].
    That is, it computes, 0 + 1 (which is 1), 1 + 2 (which is 3), 3 + 4, which is
    7, the final result.'
