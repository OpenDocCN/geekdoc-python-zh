    )\n    def z(self): print(\"A.z\")\nclass B(A):\n    def x(self): print(\"B.x\"\
    )\nclass C(B):\n    def w(self): print(\"C.w\")\nclass D(A):\n    def x(self):\
    \ print(\"D.x\")\n    def y(self): print(\"D.y\")\nclass E(C, D):\n    pass\n\
    ```\n\nIn this example, class E, for instance, has two (non-object) direct parent\
    \ classes, C and D.\n\n```\nE --> C --> B --> A --> object\n    --> D --------->\
    \ A -->\n```\n\nE inherits indirectly from A through two different \"paths\",\
    \ E → C → B → A and E → D → A. Hence it is a diamond inheritance pattern.\n\n\
    Before we continue, let's try running the following program. What would be the\
    \ output?\n\n```python\ne = E()\nprint(\"e.w()\"); e.w(); print(\"==\")\nprint(\"\
    e.x()\"); e.x(); print(\"==\")\nprint(\"e.y()\"); e.y(); print(\"==\")\nprint(\"\
    z.y()\"); e.z(); print(\"==\")\n```\n\nIf you try running this program, you will\
    \ realize that\n\n- e.w() ends up calling C.w,\n- e.x() ends up calling B.x,\n\
    - e.y() ends up calling D.y, and\n- e.z() ends up calling A.z.\n\nOne of the \"\
    strangest\" behavior is that e.x() calls the method B.x, and not D.x, although\
    \ both have the x method defined and D is one of the direct base classes of E,\
    \ as specified in E(C, D)'s class definition. This is because Python's \"multiple\
    \ inheritance\" uses the aforementioned linearization among all base classes (whether\
    \ they are explicitly specified in the class definition or not).\n\nIn fact, Python\
    \ has a builtin method type.mro to display this information. For example,\n\n\
    ```python\n>>> E.mro()\n[<class '__main__.E'>, <class '__main__.C'>, <class '__main__.B'>,\n\
    <class '__main__.D'>, <class '__main__.A'>, <class 'object'>]\n```\n\nThe order\
    \ is,\n\n```\nE --> C --> B --> D --> A --> object\n```\n\nTherefore, the fact\
    \ that e.x() ends up calling B.x, and not D.x (which is further up the chain),\
    \ makes sense.\n\n## 14.3.5. super()\n\nIn many programming languages that support\
    \ OOP, the terms like super, base, and parent have certain related meanings. In\
    \ Python, the super method, which roughly refers to a \"base class\", has more\
    \ specific semantics, especially in the context of multiple inheritance.\n\nFor\
    \ example, when super().x is referenced in a class, for data or method attribute,\
    \ Python goes through the linearized/ordered base class hierarchy (MRO) of the\
    \ given class, from left to right (or, from bottom to top, depending on how you\
    \ see the inheritance tree), to find the attribute, starting from the class itself.\
    \ Once it is found during the traversal, that implementation of the attribute\
    \ is used and all others (e.g., in their base classes upstream) are ignored.\n\
    \nNote that the MRO is defined per class. For instance, using the above example,\
    \ B's MRO is not a partial segment of D's MRO. It can be completely different.\n\
    \n```python\n>>> B.mro()\n[<class '__main__.B'>, <class '__main__.A'>, <class\
    \ 'object'>]\n```\n\nThe order is B → A → object.\n\n## 14.3.6. Duck typing\n\n\
    Python is fundamentally an object-based programming language, unlike other class-based\
    \ OOP languages like C++ or Java, or C#. These traditional OOP languages use classes\
    \ and inheritance to support the runtime *polymorphism*, among other things. A\
    \ variable declared as one type at compile time can be assigned a different type\
    \ at run time and it can behave differently.\n\nPython does not need this kind\
    \ of polymorphism. Python is a dynamically typed programming language. Although\
    \ Python has adopted a lot of features from the OOP languages over the years,\
    \ the primary purpose of a class (and, its supporting features like inheritance)\
    \ is to use it as a template, or a prototype, for objects, that is, to create\
    \ more than one objects that are \"structurally equivalent\". A lot of dynamic\
    \ programming languages that support some kind of \"classes\" like JavaScript,\
    \ Perl, Lua, etc. all belong to this same category.\n\nTo demonstrate the \"pseudo-polymorphism\"\
    \ in Python, let's create a few new types:\n\n```python\nclass Frog:\n    def\
    \ __repr__(self):\n        return \"Frog\"\n    def jump(self):\n        print(\"\
    Big jump\")\n```"
  mdcn: "## 14.3.4. 多重继承\n\n当一个类有多个直接基类时，这些基类及其基类，以及它们的基类，等等，一直到 `object`，都会被“线性化”或排序，以便查找任何继承的属性。\n\
    \n在 Python 中，这被称为 MRO，即方法解析顺序，它通过一种名为“C3 线性化算法”的方法来完成。该算法本质上试图找到一个顺序，使其与每个相关类的基类从左到右的顺序保持一致。如果成功，该方法会在给定类的所有（直接或间接）基类（包括\
    \ `object`）中产生一个唯一的排序。这并非总是可以实现，在这种情况下，会引发编译错误。一个明显的例子是尝试继承两个基类顺序不兼容的类。\n\n```python\n\
