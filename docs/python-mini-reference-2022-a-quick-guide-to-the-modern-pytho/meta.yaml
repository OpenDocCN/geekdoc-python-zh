    \    sum = 100 + unknown_name\n... except NameError as ex:\n...     raise ex\n\
    ...\nTraceback (most recent call last):\n  File \"<stdin>\", line 4, in <module>\n\
    \  File \"<stdin>\", line 2, in <module>\nNameError: name 'unknown_name' is not\
    \ defined\n```\n\n## 11.5. The with Statement\n\nThe with compound statement is\
    \ used to wrap the execution of a group of statements with methods defined by\
    \ a context manager. For example, it can be used to encapsulate the common try...except...finally\
    \ usage patterns. It has the following syntax:\n\n```\nwith Expression as Target:\n\
    \    Suite\n```\n\nThe `as` clause is optional.\n\nThe Expression must evaluate\
    \ to a context manager type, which supports `__enter__` and `__exit__` methods.\
    \ The execution of the with statement proceeds as follows:\n\n- The context Expression\
    \ is evaluated to obtain a context manager.\n- The context manager's `__enter__`\
    \ is loaded first.\n- The context manager's `__exit__` is loaded next.\n- The\
    \ `__enter__` method is invoked.\n- The return value from `__enter__` is assigned\
    \ to Target, if specified.\n- The statements in the Suite is executed.\n- Finally,\
    \ the `__exit__` method is invoked.\n\nFor example,\n\n```python\n>>> import pathlib\n\
    >>> path = pathlib.Path(\"hello.py\")\n>>> with (c := path.open(\"w\")) as file:\n\
    ...     file.write(\"print('Hello World!')\")\n...\n21\n>>> type(c)\n<class '_io.TextIOWrapper'>\n\
    >>> dir(c)\n['_CHUNK_SIZE', '__class__', '__del__', '__delattr__', '__dict__',\n\
    '__dir__', '__doc__', '__enter__', '__eq__', '__exit__', ...]\n```\n\nThe `path.open`\
    \ function returns a context manager. Its `__enter__` method returns a file object,\
    \ if successful. *For illustration only*, we assign the context manager to a variable\
    \ `c` using [the walrus operator](https://docs.python.org/3/whatsnew/3.8.html#the-walrus-operator).\
    \ (The context managers cannot generally be \"reused\".)\n\nAll statements included\
    \ in the with statement suite are executed, e.g., until it encounters an error,\
    \ if any.\n\nBefore terminating the with statement, regardless of the error conditions,\
    \ the context manager's `__exit__` is guaranteed to be called. Normally, the \"\
    cleanup code\" is implemented in the `__exit__` method. In the case of the file\
    \ operations, `file.close()` is called if file has been (successfully) opened,\
    \ among other things.\n\nAn internal type, `_io.TextIOWrapper`, is a class manager.\n\
    \nThis object includes `__enter__` and `__exit__` methods, as expected.\n\nThe\
    \ with header can include more than one expression-target item. With more than\
    \ one expression-target pair, the context managers are processed as if multiple\
    \ with statements were nested, from left to right.\n\nFor example,\n\n```python\n\
    >>> with open(\"a.txt\") as f1, open(\"b.txt\") as f2:\n...     print(f1.read())\n\
    ...     print(f2.read())\n...\n```\n\nThis statement is equivalent to the following:\n\
    \n```python\n>>> with open(\"a.txt\") as f1:\n...     with open(\"b.txt\") as\
