    \ exception can be \"re-raised\". For example,\n\n```python\n>>> try:\n...   \
    \  sum = 100 + unknown_name\n... except:\n...     raise\n...\nTraceback (most\
    \ recent call last):\n  File \"<stdin>\", line 2, in <module>\nNameError: name\
