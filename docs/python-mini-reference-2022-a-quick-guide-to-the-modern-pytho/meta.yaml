    # Mailing List


    Please join our mailing list, join@codingbookspress.com, to receive coding tips
    and other news from **Coding Books Press**, including free, or discounted, book
    promotions. If you let us know which book you have bought, and if we find any
    significant errors in the book, then we will notify you. Advance review copies
    will be made available to select members on the list before'
