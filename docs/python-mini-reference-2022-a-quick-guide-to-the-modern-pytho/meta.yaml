    \n## 7. SIMPLE TYPES\n\nA number of types are built into the Python programming\
    \ language. They are called the \"builtin types\". Types can be classified into\
    \ simple vs compound types. Python's builtin compound types are described in [the\
    \ next chapter](the next chapter).\n\n### 7.1. None\n\nThe NoneType simple type\
    \ has a single value, None, which generally indicates an absence of a (meaningful)\
    \ value.\n\nNone has a number of uses in Python. For example, a function that\
    \ does not explicitly return a value is considered to be returning None. That\
    \ is, the value of [a function call expression](a function call expression) that\
    \ does not return any concrete values like 100 or anything else is None.\n\n```\n\
    >>> type(None)           â€™\n<class 'NoneType'>\n>>> bool(None)           â€™ï\n\
    False\n>>> def f(): pass        â€™ç\n...\n>>> print(f())\nNone\n```\n\nâ` None\
    \ is the only value of the type NoneType.\n\nâ`i The Boolean/truth value of None\
    \ is False.\n\nâ`A function that does not return any value. It returns none.\n\
    \nâ`The Python REPL does not print the value of an expression if it is None. We\
    \ use the print function to explicitly print the value of the f() expression.\n\
    \n### 7.2. NotImplemented\n\nThe NotImplemented type is another singleton type,\
    \ and it likewise has a single value, NotImplemented.\n\n```\n>>> type(NotImplemented)\n\
    <class 'NotImplementedType'>\n>>> def f(): return NotImplemented\n...\n>>> f()\n\
    NotImplemented\n>>> if NotImplemented:\n...     print(\"Not implemented\")\n...\n\
    <stdin>:1: DeprecationWarning: NotImplemented should not be used in a boolean\
    \ context\nNot implemented\n```\n\nâ` NotImplemented is sort of an invalid value,\
    \ and it cannot be used in numerical or comparison operations, for instance.\n\
    \nâ`i The Boolean value of NotImplemented used to be True. It still is, as of\
    \ this writing. But, its use has been deprecated, and if you use NotImplemented\
    \ in a Boolean context, Python will raise a warning or error.\n\n### 7.3. Ellipsis\n\
    \nAn ellipsis literal, ... (or, Ellipsis), can be used in a few different places\
    \ in Python programs where no specific value is needed (e.g., as a placeholder).\n\
    \n```\n>>> type(...), bool(...)\n(<class 'ellipsis'>, True)\n>>> Ellipsis is ...\n\
    True\n```\n\nâ` The Boolean value of ... is True.\n\nâ`i Ellipsis and ... are\
    \ synonyms. They point to the same singleton object.\n\n### 7.4. Numbers\n\nAll\
    \ builtin numeric types inherit from numbers.Number from the numbers module. Numeric\
    \ objects are immutable. In fact, the objects of the simple types in Python are\
    \ all immutable.\n\nOne thing to note is that bool is a numerical type in Python.\n\
    \n#### 7.4.1. Integers (numbers.Integral)\n\nThe numbers.Integral type defines\
    \ a set of integers.\n\n- int: The int type in Python represent (arbitrary-precision)\
    \ integers.\n- bool: The bool type represent the truth values False and True.\
    \ Their numeric values are 0 and 1, and their string values are \"False\" and\
    \ \"True\", respectively.\n\n```\n>>> import numbers\n>>> issubclass(int, numbers.Integral)\n\
    True\n>>> issubclass(bool, int)\nTrue\n>>> isinstance(True, int), isinstance(10,\
    \ int)\n(True, True)\n```\n\n#### 7.4.2. Real numbers (numbers.Real)\n\n- float:\
    \ The float type, a subtype of numbers.Real, represents a set of double precision\
    \ floating point numbers.\n\n```\n>>> import numbers\n>>> issubclass(float, numbers.Real)\n\
    True\n>>> isinstance(1.5, float), isinstance(1.2E-5, float)\n(True, True)\n```\n\
    \n#### 7.4.3. Complex numbers (numbers.Complex)\n\n- complex: The complex type\
    \ represents a set of all pairs of double precision floating numbers, namely,\
    \ the real and imaginary parts.\n\n```\n>>> import numbers\n>>> issubclass(complex,\
    \ numbers.Complex)\nTrue\n>>> c = 1 + 2j\n>>> isinstance(c, complex), isinstance(0.1\
    \ + .5j, complex)\n(True, True)\n>>> c.real, c.imag\n(1.0, 2.0)\n```\n\nâ` The\
    \ complex type has attributes real and imag, which return the real and imaginary\
    \ parts of the complex number object, respectively.\n\n## 8. COMPOUND TYPES\n\n\
    Objects can be built from other objects. Likewise, types can be built from other\
    \ types. They are called the complex or \"compound types\".\n\nPython's builtin\
    \ compound types such as tuples and lists, which we will discuss in this chapter,\
    \ and the user-defined compound types, which we will discuss [later in the book](later\
    \ in the book), are built using other simple and complex types as building blocks.\n\
    \nPython's builtin compound types fall into three categories:\n\n- Sequences,\
    \ such as tuple and list,\n- Sets, such as set, and\n- Mappings, such as dict.\n\
    \nWe will go through each of these three categories in this chapter after a brief\
    \ discussion on how to construct tuples, lists, sets, and dicts.\n\n### 8.1. Tuples,\
    \ Lists, Sets, and Dictionaries\n\nThe builtin collection types, tuples, lists,\
    \ sets, and dictionaries, can be constructed in a few different ways.\n\n####\
    \ 8.1.1. Constructors\n\nFirst, we can use type constructors, tuple, list, set,\
    \ and dict.\n\n```\n>>> tuple()           â\x80\x99\n()\n>>> list()          \
    \  â\x80\x99i\n[]\n>>> set()             â\x80\x99ç\nset()\n>>> dict()       \
    \     â\x80\x99£\n{}\n```\n\nâ\x80\x99 Calling a tuple() type constructor function\
    \ without any arguments creates an empty tuple, whose literal representation is\
    \ ().\nâ\x80\x99i Calling a list() constructor. It creates an empty list, [].\n\
    â\x80\x99ç This constructor call set() creates an empty set. Note that there is\
    \ no literal syntax for an empty set.\nâ\x80\x99£ This call dict() creates an\
    \ empty dictionary, {}.\n\nThese constructors also accept arguments of an iterable\
    \ type, for their initial elements. For instance,\n\n```\n>>> tuple((1, 2)), tuple([1,\
    \ 2])\n((1, 2), (1, 2))\n>>> list((1, 2)), list([1, 2])\n([1, 2], [1, 2])\n>>>\
    \ set((1, 2)), set([1, 2])\n({1, 2}, {1, 2})\n>>> dict([('a', 1), ('b', 2), ('c',\
    \ 3)])    â\x80\x99\n{'a': 1, 'b': 2, 'c': 3}\n```\n\nâ` An iterable of two-element\
    \ iterables.\n\nIn addition, the dict constructor supports a special keyword argument\
    \ syntax. dict can also be initialized with other mapping object. For instance,\n\
    \n```\n>>> x = dict(a = 1, b = 2)\n>>> x\n{'a': 1, 'b': 2}\n>>> y = dict(x)\n\
    >>> y\n{'a': 1, 'b': 2}\n```\n\n#### 8.1.2. Literal syntax\n\nAnother way to create\
    \ builtin collections is to use the literal syntax:\n\n- Either by explicitly\
    \ listing the elements, or\n- By providing \"instructions\" as to how to generate\
