    - 我们重写了 `__init__` 方法（该方法在 `object` 中定义，因为 `Animal` 没有自己的 `__init__` 方法）以添加一个实例变量
    `self.name`。

    - `__repr__` 方法的一个简单实现，主要用于调试目的。

    - `Pet` 类包含另一个名为 `bite` 的实例方法。内置的 `object.__class__` 属性返回给定对象的类型，而 `type.__name__`
    返回类型的名称。


