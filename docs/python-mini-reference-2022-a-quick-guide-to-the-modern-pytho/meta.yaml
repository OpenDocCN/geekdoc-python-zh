    # 6. OBJECTS


    In Python, data is represented by *objects*. An object has an *identity*, *type*,
    and *value*. An object may be referred to by a "name" (or, "reference"). An object
    has one and only one invariant identity, throughout its lifetime, but it can have
    zero, one, or more names/references at any given moment.


    Python is a dynamically and loosely typed programming language. Although the type
    system is at the heart of the Python programming language, and the types play
    a crucial role in Python programs, they become relevant primarily at run time,
    and only indirectly. (Python''s type system is often called "[duck typing](https://en.wikipedia.org/wiki/Duck_typing)".)
    In fact, one can create a new type at run time and one can even change the type
    of an object at run time (although that is not generally a common practice).


    The values of objects of some types can change. These objects are said to be "[mutable](https://en.wikipedia.org/wiki/Immutable_object)".
    For example, builtin data types like lists and dictionaries are mutable types.
    On the other hand, for some other types, one cannot *directly* modify the values
    of the objects once they are created. They are called "[immutable](https://en.wikipedia.org/wiki/Immutable_object)".
    For example,'
  - '[PAGE 52]


    numbers, strings, and tuples are immutable types. (Note that the (effective) values
    of immutable objects can still change.)


    # 6.1. Identities


    The "identity" is a rather abstract concept, but Python includes a builtin id
    function that returns a unique value which can be used as the identity of a given
    object. In fact, the id function "defines" the identities of the objects. (In
    CPython implementation, it returns the given object''s memory address.)


    For example,


    ```

    >>>

    >>> a, b, c = 3, "the ring", [''a'', ''b'', ''c'']

    >>> id(a), id(b), id(c)

    (546842556784, 546841138928, 546841139008)

    >>> x = 3

    >>> id(a), id(x), id(3)

    (546842556784, 546842556784, 546842556784)

    ```


    â` This prompt >>> indicates that we are in the REPL.


    â`i We often use this "multiple assignment" syntax in this book. The [expression
    list](https://docs.python.org/3/reference/expressions.html#expression-lists) on
    the right hand side evaluates to a tuple. Each of its items is then assigned to
    a, b, c, through "tuple unpacking".


    â`çThe names a, b, and c all have different id values. They refer to different
    objects.


    â`£The names a and x and the object 3 all have the same id values. a and x reference
    the same object, 3.'
  - '[PAGE 53]


    Objects'' identities can also be compared with the builtin is and is not operators.
    x is y evaluates to True if and only if x and y are the same object, that is,
    according to the id function. Note that the identity equality (is) between two
    objects implies their value equality (==).


    Using the same example above,


    ```

    >>> a is a, a is b, a is c    â´

    (True, False, False)

    >>> a is x, a == x            â´i

    (True, True)

    ```


    â´ (a is a) == True. The names a, b, and c refer to different objects.

    â´i (a is x) == True and (x is a) == True. Likewise, a == x and x == a.


    # 6.2. Attributes


    An object is associated with a set of "attributes". An attribute is a name that
    refers to (other) objects. When the object that it refers to is a function, the
    attribute is called a *method* (of the original object). Otherwise, it is called
    the data attribute (e.g., often known as "fields", or data members, in other programming
    languages).


    An attribute of an object can be accessed using the [attribute reference](https://docs.python.org/3/reference/datamodel.html#attribute-access)
    syntax (or, the "dot notation").


    ```

    >>> class A: pass    â´

    ...

    ```'
  - '[PAGE 54]


    ```

    >>> a = A()

    >>> a.magic_number = 42

    >>> a.magic_number

    42

    >>> def f(): pass

    ...

    >>> a.empty_method = f

    >>> a.empty_method()

    ```


    â` The `class statement` creates a new type, A.


    â`i Calling A(), which is called `a constructor`, returns an instance object of
    the type A. The object is `bound to a name` a in this example.


    â`¢Adds a data attribute, named `magic_number`, to a, and binds it to an (immutable)
    number object 42.


    â`£a.magic_number refers to the object 42, whose value is 42. (Note that, for
    `simple types`, objects'' identities and values are closely tied.)


    â`¤The `def statement` creates a new function object, f.


    â`¥The new attribute a.empty_method now refers to the object f.


    â`¦The method call syntax invokes the function f.


    The built-in `dir` function can be used


    +   - To find all names in the current scope, or

    - To list the attributes associated with a given object.


    In the current context, with the above example,


    ```

    >>> dir()

    [''A'', ''__annotations__'', ... ''__spec__'', ''a'', ''f'']

    >>> dir(A)

    [''__class__'', ... ''__weakref__'']

    >>> dir(a)

    ```'
- md: "## 6.3. Types\n\nEvery object in Python is associated with a \"type\" besides\
    \ its identity and value. The type of an object affects the object's behavior.\
    \ For instance, the type of an object defines all possible values that the object\
    \ can have. Furthermore, the type of an object determines the set of operations\
    \ that the object supports. (Note that objects (of most types) in Python are malleable,\
    \ so to speak, and their behavior can change during the execution of the program,\
    \ regardless of their designated types/type names. Cf. [Duck typing](https://docs.python.org/3/glossary.html#term-duck-typing).)\n\
    \nAs another example, the objects of immutable types are \"reused\" by the Python\
    \ interpreter, when possible. That is, certain operations that are supposed to\
    \ return new objects, or compute new values, for immutable types may actually\
    \ return a reference to any existing object *with the same type and value*. On\
    \ the contrary, objects are never \"reused\" for mutable types in these situations.\
    \ For example,\n\n```\n>>> def f():\n...     a, b = (1, 2), [3, 4]\n...     print(id(a),\
    \ id(b))\n...     p, q = (1, 2), [3, 4]\n...     print(id(p), id(q))\n...\n>>>\
    \ f()\n510220577408 510220577600\n510220577408 510221371520\n```\n\nNote that\
    \ the ids of the tuples a and p, immutable objects, are the same whereas those\
    \ of the lists b and q, mutable objects, are different. a and p point to the same\
    \ object. On the other hand, b and q point to two different objects.\n\n## 6.4.\
    \ Built-in type Function\n\nPython provides a built-in type function that returns\
    \ the type/class of a given object. A type is, in fact, a \"class object\" that\
    \ creates a type. One of its constructor functions takes an object as its argument\
    \ and returns the object's type object (e.g., possibly \"reused\").\n\nFor example,\n\
    \n```\n>>> type, type(type), type(type(type))\n(<class 'type'>, <class 'type'>,\
    \ <class 'type'>)\n>>> type(10), type('hello'), type([1, 2])\n(<class 'int'>,\
    \ <class 'str'>, <class 'list'>)\n```\n\n- The type of type is type.\n- The types\
    \ of objects 10, 'hello', and [1, 2] are int, str, and list, respectively.\n\n\
    ## 6.5. Mutable vs Immutable Types\n\nIn Python, the mutability/immutability is\
    \ a characteristic of a type. An object of a mutable type is mutable, and an object\
    \ of an immutable type is immutable.\n\nOne cannot directly change the value of\
    \ an immutable object. However, that does not mean that the object is truly immutable.\
    \ For example, an attribute of an immutable object references an object, and that\
    \ object may still be mutable. And, the overall effective value of the immutable\
    \ object may change.\n\nThis is generally true for compound types. For instance,\
    \ for immutable container types like tuples, they can still contain mutable elements,\
    \ and the overall value of a tuple can still change (although its value still\
    \ may not be directly updated).\n\nFor example,\n\n```\n>>> a, b = (1, 2), [3,\
    \ 4]\n>>> a[0] = 10\nTraceback (most recent call last):\n  File \"<stdin>\", line\
    \ 1, in <module>\nTypeError: 'tuple' object does not support item assignment\n\
    >>> b[0], b[1] = 30, 40\n>>> a, b\n((1, 2), [30, 40])\n>>> x = a, b\n>>> x\n((1,\
    \ 2), [30, 40])\n>>> x[1] = [3000, 4000]\nTraceback (most recent call last):\n\
    \  File \"<stdin>\", line 1, in <module>\nTypeError: 'tuple' object does not support\
    \ item assignment\n>>> x[1][0], x[1][1] = 300, 400\n>>> x\n((1, 2), [300, 400])\n\
    ```\n\n- a references a tuple (1, 2) whereas b references a list [3, 4].\n- Tuples\
    \ are immutable, and hence one cannot change its elements.\n- In contrast, one\
    \ can change a list's items since lists are mutable.\n- a and b references the\
    \ same objects as before, but b's value has changed.\n- The comma-separated [expression\
    \ list](https://docs.python.org/3/reference/expressions.html#expression-lists)\
    \ on the right-hand side evaluates to a tuple object.\n- x refers to a tuple,\
    \ an immutable object.\n- One cannot directly change its value since x is \"immutable\"\
    .\n- However, one can change the value of an item of a collection, or the value\
    \ of an attribute of an object, if it is mutable. In this example, the second\
    \ item of x happens to reference a mutable object, a list [30, 40]. Hence, we\
    \ can change its value.\n- The effective value of the \"immutable\" x has indeed\
    \ changed (although the items of x are still the *same* objects).\n\n## 6.6. Constructors\n\
    \nAll types in Python, built-in or user-defined, include [constructor functions](https://www.google.com/search?q=constructor+functions),\
    \ or *constructors* for short. The name of the type is the same as the name of\
    \ the constructor function. Or, more precisely, types/classes are \"callable\"\
    . A constructor, when called, returns an instance object of the given type/class.\n\
    \nFor some built-in types such as tuples and lists, one can also use the literal\
    \ syntax to create instances of those types as we explain in a later chapter,\
    \ [Builtin Compound Types](https://www.google.com/search?q=Builtin+Compound+Types).\n\
    \n```\n>>> class A: pass\n...\n>>> type(A)\n<class 'type'>\n>>> a = A()\n>>> type(a)\n\
    <class '__main__.A'>\n```\n\n- A [class statement](https://www.google.com/search?q=class+statement)\
    \ creates a new class object, A in this example.\n- The type of type A is type.\n\
    - A, a class object, is callable.\n- Calling the constructor returns an instance\
    \ object of type A.\n\n## 6.7. Boolean Context\n\n(Almost) all objects in Python\
    \ have \"truth values\", which depend on their types and values by default. When\
    \ an object is used in an if or while condition or as an operand of a Boolean\
    \ operation, its truth value is returned. (The and and or operators work slightly\
    \ differently.)\n\nThe truth value of an object is True by default. It is False\
    \ in the following cases:\n\n- If the object/its class has a `__bool__` method\
    \ defined, and\n  - This method returns False, or\n- If the object does not have\
    \ a `__bool__` method but the object/its class has a `__len__` method, and\n \
    \ - This method returns 0.\n\nFor built-in types, the truth values of the following\
    \ objects are False:\n\n- None and False.\n- The \"zero value\" objects of all\
    \ numeric types, e.g., 0, 0.0, 0j, etc.\n- Empty collections, e.g., \"\", (),\
    \ [], {}, etc.\n\nThe truth value of an object of a custom type is always True\
    \ by default, regardless of the values of their attributes. In order to give a\
    \ different behavior, e.g., having either True or False based on their internal\
    \ states, we will need to implement the `__bool__` method. This method, by default,\
    \ does not exist in a custom type.\n\nIf an object, or more precisely its class,\
    \ implements this method, then it is called in the boolean context. For example,\n\
    \n```\nclass BiggerThan8:\n    def __init__(self, zzz):\n        self.zzz = zzz\n\
    \    def __bool__(self):\n        return True if self.zzz >= 8 else False\n```\n\
    \n```\n>>> z1, z2 = BiggerThan8(5), BiggerThan8(10)\n>>> bool(z1), bool(z2)\n\
    (False, True)\n```\n\nThe built-in `bool` function returns the Boolean value of\
    \ the argument (object or expression, or name). This code showcases another (subtle)\
    \ power of \"duck typing\". As long as the object `z` is of a type that has the\
    \ method `__bool__(self)`, it works as expected. In other statically typed programming\
    \ languages, this kind of functionality is provided through extra constructs,\
    \ like interfaces, traits, and prototypes, etc.\n\n## 6.8. Lifetime of an Object"
  mdcn: "## 6.3. 类型\n\nPython 中的每个对象，除了其标识和值之外，都关联着一个“类型”。对象的类型会影响其行为。例如，对象的类型定义了该对象可能具有的所有值。此外，对象的类型还决定了该对象支持的操作集合。（请注意，Python\
    \ 中（大多数类型的）对象可以说是可变的，其行为在程序执行过程中可能会发生变化，无论其指定的类型/类型名称如何。参见 [鸭子类型](https://docs.python.org/3/glossary.html#term-duck-typing)。）\n\
    \n再举一个例子，对于不可变类型的对象，Python 解释器会在可能的情况下“重用”它们。也就是说，对于不可变类型，某些本应返回新对象或计算新值的操作，实际上可能会返回一个指向任何具有*相同类型和值*的现有对象的引用。相反，对于可变类型，在这些情况下对象永远不会被“重用”。例如，\n\
    \n```\n>>> def f():\n...     a, b = (1, 2), [3, 4]\n...     print(id(a), id(b))\n\
    ...     p, q = (1, 2), [3, 4]\n...     print(id(p), id(q))\n...\n>>> f()\n510220577408\
    \ 510220577600\n510220577408 510221371520\n```\n\n请注意，元组 `a` 和 `p`（不可变对象）的 id\
    \ 相同，而列表 `b` 和 `q`（可变对象）的 id 不同。`a` 和 `p` 指向同一个对象。另一方面，`b` 和 `q` 指向两个不同的对象。\n\n\
    ## 6.4. 内置 type 函数\n\nPython 提供了一个内置的 `type` 函数，它返回给定对象的类型/类。类型实际上是一个创建类型的“类对象”。其构造函数之一接受一个对象作为参数，并返回该对象的类型对象（例如，可能是“重用”的）。\n\
    \n例如，\n\n```\n>>> type, type(type), type(type(type))\n(<class 'type'>, <class\
    \ 'type'>, <class 'type'>)\n>>> type(10), type('hello'), type([1, 2])\n(<class\
    \ 'int'>, <class 'str'>, <class 'list'>)\n```\n\n- `type` 的类型是 `type`。\n- 对象 `10`、`'hello'`\
    \ 和 `[1, 2]` 的类型分别是 `int`、`str` 和 `list`。\n\n## 6.5. 可变类型与不可变类型\n\n在 Python 中，可变性/不可变性是类型的一个特征。可变类型的对象是可变的，不可变类型的对象是不可变的。\n\
    \n不能直接更改不可变对象的值。然而，这并不意味着该对象是真正不可变的。例如，一个不可变对象的属性引用了一个对象，而该对象可能仍然是可变的。并且，不可变对象的整体有效值可能会改变。\n\
    \n这对于复合类型通常是成立的。例如，对于像元组这样的不可变容器类型，它们仍然可以包含可变元素，并且元组的整体值仍然可以改变（尽管其值可能仍然无法直接更新）。\n\
    \n例如，\n\n```\n>>> a, b = (1, 2), [3, 4]\n>>> a[0] = 10\nTraceback (most recent\
    \ call last):\n  File \"<stdin>\", line 1, in <module>\nTypeError: 'tuple' object\
    \ does not support item assignment\n>>> b[0], b[1] = 30, 40\n>>> a, b\n((1, 2),\
    \ [30, 40])\n>>> x = a, b\n>>> x\n((1, 2), [30, 40])\n>>> x[1] = [3000, 4000]\n\
    Traceback (most recent call last):\n  File \"<stdin>\", line 1, in <module>\n\
    TypeError: 'tuple' object does not support item assignment\n>>> x[1][0], x[1][1]\
    \ = 300, 400\n>>> x\n((1, 2), [300, 400])\n```\n\n- `a` 引用一个元组 `(1, 2)`，而 `b`\
    \ 引用一个列表 `[3, 4]`。\n- 元组是不可变的，因此不能更改其元素。\n- 相反，可以更改列表的项，因为列表是可变的。\n- `a` 和 `b`\
    \ 引用的对象与之前相同，但 `b` 的值已经改变。\n- 右侧的逗号分隔的[表达式列表](https://docs.python.org/3/reference/expressions.html#expression-lists)求值为一个元组对象。\n\
    - `x` 指向一个元组，一个不可变对象。\n- 不能直接更改其值，因为 `x` 是“不可变的”。\n- 然而，如果集合的项或对象的属性是可变的，就可以更改其值。在这个例子中，`x`\
    \ 的第二个项恰好引用了一个可变对象，一个列表 `[30, 40]`。因此，我们可以更改其值。\n- “不可变的” `x` 的有效值确实改变了（尽管 `x`\
    \ 的项仍然是*相同的*对象）。\n\n## 6.6. 构造函数\n\nPython 中的所有类型，无论是内置的还是用户定义的，都包含[构造函数](https://www.google.com/search?q=constructor+functions)，或简称*构造器*。类型的名称与构造函数的名称相同。或者更准确地说，类型/类是“可调用的”。构造函数被调用时，会返回给定类型/类的实例对象。\n\
    \n对于某些内置类型，如元组和列表，也可以使用字面量语法来创建这些类型的实例，我们将在后面的章节 [内置复合类型](https://www.google.com/search?q=Builtin+Compound+Types)\
    \ 中解释。\n\n```\n>>> class A: pass\n...\n>>> type(A)\n<class 'type'>\n>>> a = A()\n\
    >>> type(a)\n<class '__main__.A'>\n```\n\n- [class 语句](https://www.google.com/search?q=class+statement)创建一个新的类对象，在本例中是\
    \ `A`。\n- 类型 `A` 的类型是 `type`。\n- `A`，一个类对象，是可调用的。\n- 调用构造函数返回一个类型为 `A` 的实例对象。\n\
    \n## 6.7. 布尔上下文\n\n（几乎）Python 中的所有对象都有“真值”，默认情况下取决于它们的类型和值。当一个对象在 `if` 或 `while`\
    \ 条件中使用，或作为布尔运算的操作数时，会返回其真值。（`and` 和 `or` 运算符的工作方式略有不同。）\n\n对象的真值默认为 `True`。在以下情况下为\
    \ `False`：\n\n- 如果对象/其类定义了 `__bool__` 方法，并且\n  - 此方法返回 `False`，或者\n- 如果对象没有 `__bool__`\
    \ 方法，但对象/其类有 `__len__` 方法，并且\n  - 此方法返回 `0`。\n\n对于内置类型，以下对象的真值为 `False`：\n\n-\
    \ `None` 和 `False`。\n- 所有数值类型的“零值”对象，例如 `0`、`0.0`、`0j` 等。\n- 空集合，例如 `\"\"`、`()`、`[]`、`{}`\
    \ 等。\n\n自定义类型对象的真值默认始终为 `True`，无论其属性的值如何。为了赋予不同的行为，例如根据其内部状态返回 `True` 或 `False`，我们需要实现\
    \ `__bool__` 方法。此方法在自定义类型中默认不存在。\n\n如果一个对象，或者更准确地说其类，实现了此方法，那么它将在布尔上下文中被调用。例如，\n\
    \n```\nclass BiggerThan8:\n    def __init__(self, zzz):\n        self.zzz = zzz\n\
    \    def __bool__(self):\n        return True if self.zzz >= 8 else False\n```\n\
    \n```\n>>> z1, z2 = BiggerThan8(5), BiggerThan8(10)\n>>> bool(z1), bool(z2)\n\
    (False, True)\n```\n\n内置的 `bool` 函数返回参数（对象或表达式，或名称）的布尔值。这段代码展示了“鸭子类型”的另一个（微妙的）强大之处。只要对象\
    \ `z` 的类型具有 `__bool__(self)` 方法，它就能按预期工作。在其他静态类型编程语言中，这种功能是通过额外的构造提供的，如接口、特征和原型等。\n\
    \n## 6.8. 对象的生命周期"
