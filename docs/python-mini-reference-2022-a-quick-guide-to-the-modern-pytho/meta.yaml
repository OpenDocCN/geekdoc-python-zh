  mdcn: "## 9.7.3. 移位运算符\n\n左移（`<<`）和右移（`>>`）运算符都接受整数作为参数。它们将第一个参数向左（`<<`）或向右（`>>`）移动第二个参数所指定的位数。\n\
    \n-   右移 n 位定义为除以 `pow(2,n)` 的向下取整。\n-   左移 n 位定义为乘以 `pow(2,n)`。\n\n## 9.8. 布尔运算\n\
    \n求值结果为布尔值（`True` 或 `False`）的表达式称为布尔表达式。因此，`True` 是一个（平凡的）布尔表达式，`False` 也是。\n\n\
    ### 9.8.1. `not` 运算符\n\n`not` 运算符产生：\n\n-   如果其参数为假，则结果为 `True`，否则\n-   结果为 `False`。\n\
    \n### 9.8.2. `and` 运算符\n\n`and` 运算 `x` and `y` 首先求值 `x`，然后：\n\n-   如果 `x` 求值为假，则返回其值（该值可能不是布尔类型）。\n\
    -   否则，求值 `y`，并返回其结果值。\n\n请注意，整个表达式的类型实际上是 `x` 和 `y` 类型的并集（不一定是布尔类型）。也就是说，如果 `x`\
    \ 的布尔值为假，则 `and` 表达式的类型就是 `x` 的类型。否则，就是 `y` 的类型。\n\n### 9.8.3. `or` 运算符\n\n`or`\
    \ 运算 `x` or `y` 首先求值 `x`，然后：\n\n-   如果 `x` 求值为真，则返回其值（同样，该值可能不是 `True`）。\n-  \
    \ 否则，求值 `y`，并返回其结果值。\n\n整个表达式 `x` or `y` 的类型同样是 `x` 和 `y` 类型的并集。也就是说，如果 `x` 的布尔值为真，则\
    \ `or` 表达式的类型就是 `x` 的类型。否则，就是 `y` 的类型。\n\n## 9.9. 比较\n\n比较产生布尔值：`True` 或 `False`。Python\
    \ 中的比较可以任意链式使用。例如，`x < y <= z` 是一个有效的表达式，这与许多其他 C 风格语言不同，它大致等价于 `x < y and y <=\
    \ z`。或者更精确地说，它等价于 `x < (t := y) and t <= z`，其中使用了一个临时变量 `t`。请注意，`y` 只被求值一次。\n\n\
    通常，如果 `a`, `b`, `c`, ..., `y`, `z` 是表达式，而 `op1`, `op2`, ..., `opN` 是二元比较运算符，那么\
    \ `a op1 b op2 c ... y opN z` 在语义上等价于 `a op1 b and b op2 c and ... y opN z`，但每个表达式最多只被求值一次。\n\
    \n### 9.9.1. 同一性比较\n\n运算符 `is` 和 `is not` 测试对象的同一性：`x is y` 为真当且仅当 `x` 和 `y` 是同一个对象。对象的同一性通过\
    \ `id()` 函数确定。`x is not y` 产生相反的真值。\n\n### 9.9.2. 值比较\n\n运算符 `<`、`>`、`==`、`>=`、`<=`\
    \ 和 `!=` 比较两个对象的值。对象不需要具有相同的类型。\n\n因为所有类型都是（直接或间接的）`object` 的子类型，所以它们从 `object`\
    \ 继承了默认的比较行为。类型可以通过实现比较魔术方法（如 `__lt__` 和 `__gt__` 等）来自定义其比较行为。\n\n相等性比较（`==` 和\
    \ `!=`）的默认行为基于对象的同一性。因此，具有相同同一性的实例进行相等性比较会得到相等，而具有不同同一性的实例进行相等性比较会得到不相等，这在许多情况下可能违反直觉。通常，用户定义的类型需要自定义其比较行为。\n\
    \n### 9.9.3. 成员测试操作\n\n对于集合，运算符 `in` 和 `not in` 测试成员资格。`x in s` 求值为 `True` 如果\
    \ `x` 是 `s` 的成员，否则为 `False`。`x not in s` 返回 `x in s` 的否定。所有内置序列和集合类型都支持此操作。对于字典，`in`\
    \ 运算符测试字典是否具有给定的键。\n\n对于字符串和字节类型，`x in y` 为 `True` 当且仅当 `x` 是 `y` 的子串。运算符 `not\
    \ in` 被定义为具有与 `in` 相反的真值。例如：\n\n```\n>>> 2 in [1, 2, 3, 2]\nTrue\n>>> 'c' not\
    \ in { 'a', 'b', 'd'}\nTrue\n>>> \"k1\" in { \"k1\": \"v1\", \"k2\": \"v2\" }\n\
    True\n>>> \"world\" in \"hello world\"\nTrue\n```\n\n对于定义了 `__contains__` 方法的用户自定义类，`x\
    \ in y` 返回 `True` 如果 `y.__contains__(x)` 返回一个真值，否则返回 `False`。\n\n## 10. 简单语句\n\
    \n语句与表达式不同，主要用于产生副作用，例如控制程序流程或生成输出。一个简单语句包含一个逻辑行。多个简单语句可以出现在同一行，用分号分隔。我们将在下一章讨论复合语句。\n\
    \n简单语句包括：\n\n-   表达式语句，\n-   赋值语句，\n-   `assert` 语句，\n-   `pass` 语句，\n-   `del`\
    \ 语句，\n-   `return` 语句，\n-   `raise` 语句，\n-   `break` 语句，\n-   `continue` 语句，\n\
    -   `global` 语句，以及\n-   `nonlocal` 语句。\n\n`import` 语句在本书开头的“包和模块”部分已经解释过。`yield`\
    \ 语句在协程的上下文中描述，或者更具体地说，在 `yield` 表达式的上下文中描述。\n\n### 10.1. 表达式语句\n\n在 Python 中，一个表达式，或者通常说一个表达式列表，可以用作语句，例如，仅仅为了其副作用。这被称为表达式语句，它对表达式列表求值并丢弃其结果。最常见的用例是调用一个返回\
    \ `None` 的函数。另一个常见用例是使用一个常量字符串表达式作为文档。\n\n例如：\n\n```\ndef a():\n    \"Nada\"\n\
    \    return \"Something\"\n\na()\n```\n\n函数定义 `a()` 包含一个表达式语句，即一个字符串字面量。\n\n调用函数\
    \ `a()` 是一个表达式，但这里它被写成了一个语句。函数的返回值 `\"Something\"` 被丢弃了。\n\n### 10.2. 赋值语句\n\n\
    赋值是 Python 中的简单语句之一。赋值语句主要用于将一个新名称绑定到一个对象，或将一个现有名称重新绑定到一个对象。它们也用于修改可变对象的属性或元素。\n\
    \n赋值语句的左侧可以是：\n\n1.  一个新名称或一个引用对象的名称，或者\n2.  一个可变对象的属性或元素。\n\n赋值语句从左到右对右侧的表达式或表达式列表求值，并将得到的单个对象从左到右分配给左侧对应的目标列表。如果目标列表是一个没有尾随逗号的单个目标，则将该对象分配给该目标。（如前所述，将表达式列表赋值给目标列表是元组打包和序列解包的组合。）\n\
    \n在 Python 中，我们也可以在一条语句中将多个名称绑定到同一个对象。例如：\n\n```\n>>> x = y = \"dragon\"\n>>>\
    \ p = q = ['a', 'b']\n>>> id(x), id(y)\n(140593323269680, 140593323269680)\n>>>\
    \ id(p), id(q)\n(140593324864960, 140593324864960)\n```\n\n变量 `x` 和 `y` 引用同一个对象。\n\
    \n`p` 和 `q` 引用同一个对象。\n\n#### 10.2.1. 增强赋值语句\n\n增强赋值语句是二元运算和赋值语句的组合。增强赋值中使用以下运算符：`+=`、`-=`、`*=`、`@=`、`/=`、`//=`、`%=`、`**=`、`>>=`、`<<=`、`&=`、`^=`\
    \ 和 `|=`。\n\n与普通赋值不同，增强赋值首先对左侧的目标求值，然后对右侧的表达式列表求值。然后执行二元运算，并将结果写回目标。\n\n> Python\
    \ 的赋值语句不会复制源对象，这与某些其他编程语言不同。它只是将名称绑定或重新绑定到对象。要进行复制，标准库的 `copy` 模块提供了浅拷贝和深拷贝的函数。\n\
    \n### 10.3. `pass` 语句\n\n`pass` 语句用作占位符，例如，在 Python 语法要求语句的地方。当执行此语句时，什么也不会发生。`pass`\
    \ 是一个空操作。它是"
