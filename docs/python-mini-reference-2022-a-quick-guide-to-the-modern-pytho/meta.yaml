- md: '## 14.3. Object Oriented Programming


    A class definition statement is used in Python to create a "template" for objects
    of that class. A class defines a custom type, how to create an instance object
    of that type, and how to access the object, among other things.


    A class always implicitly "inherits" from the builtin type object in Python, either
    directly or indirectly. This is true for any builtin or custom types. A class
    can directly inherit from another type, which is in turn a subtype of object.
    Python supports [inheritance from more than one direct base class](inheritance
    from more than one direct base class).


    ## 14.3.1. Data encapsulation


    In Python, there is no such things as real "private attributes", data or methods.
    Data hiding in an instance object is supported via conventions, as with many other
    features in Python.


    A name prefixed with an underscore _ is treated as "private". That is, by convention,
    we do not directly access the members of other class objects or instance objects
    if their names start with one or more underscores. Such attributes are considered
    an implementation detail, and they are not part of the "public API".


    Python *does* have some minimal support for [name hiding](https://docs.python.org/3/reference/lexical_analysis.html#private-name-mangling),
    however. When a name of a variable or a function/method in a class *starts with
    at least two underscores and ends with at most one underscore*, then Python modifies
    the attribute''s name. It is called the "name mangling" although it does not truly
    "mangle" the names (e.g., as in C++). Regardless, using the mangled names should
    be avoided, even within your own programs. (Note that the "dunder names" are not
    mangled, or modified, since they end with two underscores.)


    ## 14.3.2. Magic methods


    The `__init__` method is a special method, as indicated. This particular method
    is used to provide any initialization code for the newly instantiated instance
    object. This method is automatically called, by the Python runtime, on the newly
    created instance object, if it is overwritten in the object''s class.


    The base type object has the following attributes:


    ```

    >>> dir(object)

    [''__class__'', ''__delattr__'', ''__dir__'', ''__doc__'', ''__eq__'',

    ''__format__'', ''__ge__'', ''__getattribute__'', ''__gt__'', ''__hash__'',

    ''__init__'', ''__init_subclass__'', ''__le__'', ''__lt__'', ''__ne__'',

    ''__new__'', ''__reduce__'', ''__reduce_ex__'', ''__repr__'', ''__setattr__'',

    ''__sizeof__'', ''__str__'', ''__subclasshook__'']

    ```


    Since every type inherits, directly or indirectly/transitively, from this base
    class object, these attributes are always available to all types, builtin or user-defined.
    Some of those data attributes might be empty, and some of those method attributes
    might have empty implementations. Also, some attributes may not show in the dir()
    output since the __dir__ method of a class/object can be customized.


    The __doc__ attribute stores the docstring of the type, if any. Otherwise, it
    is an empty string. As with [functions](functions), if the first statement in
    the class definition suite is a constant string literal expression, then it is
    automatically used as the class''s docstring.


    (Python''s builtin help function uses the object''s docstring as part of their
    automatically generated help message.)


    The __str__ method is used when an object is used in a string context. When a
    __str__ method is not implemented in a class, it falls back to the __repr__ method,
    if present. For lower-level customization, or for displaying debug information,
    etc., one can overwrite the __repr__ method. For example,


    ```python

    >>> class A:

    ...     def __str__(self):

    ...         return "A from __str__()"

    ...

    >>> class B:

    ...     def __repr__(self):

    ...         return "B from __repr__()"

    ...

    >>> class C:

    ...     def __str__(self):

    ...         return "C from __str__()"

    ...     def __repr__(self):

    ...         return "C from __repr__()"

    ...

    >>> a, b, c = A(), B(), C()

    >>> print(f"""\n... a = {a}

    ... b = {b}

    ... c = {c}""")

    a = A from __str__()

    b = B from __repr__()

    c = C from __str__()

    ```


    - Since a''s type A has the __str__ method implemented, it is called in the string
    context.

    - Since b''s type B has the __repr__ method, but not __str__ method, the __repr__
    method is called.

    - Likewise, c''s __str__ method is called in the string context.


    On the other hand,


    ```python

    >>> print([a, b, c])

    [<__main__.A object at 0x7093ad81f0>, B from __repr__(), C from __repr__()]

    ```


    - The internal implementations of lists, and other collection types, use the __repr__
    method of its elements for their string representations. Since the type A does
    not implement this method, it uses the default string representation of a (which
    includes its type and memory location, etc.).


    We can, and we should in many cases, override some of these dunder methods to
    customize the behavior of the custom classes. For example, methods like __eq__
    (for ==), __ne__ (for !=), __ge__ (for >=), __gt__ (for >), __le__ (for <=), and
    __lt__ (for <) are often overwritten to customize the equality and comparison-related
    behaviors of the user-defined types.


    For instance,


    ```python

    >>> from functools import total_ordering

    >>> import random

    >>>

    >>> @total_ordering

    ... class Pt(object):

    ...     def __init__(self, x, y):

    ...         self.x, self.y = x, y

    ...     def __eq__(self, other):

