    and reproducibility


    An example code snippet that uses MLflow to track and log metrics during a machine
    learning experiment:


    ```

    import mlflow

    import numpy as np

    from sklearn.linear_model import LinearRegression


    # Start an MLflow experiment

    mlflow.set_experiment("linear-regression")


    # Generate some random data

    x = np.random.rand(100, 1)

    y = 2*x + np.random.randn(100, 1)


    # Define a model

    model = LinearRegression()


    # Train the model

    model.fit(x, y)


    # Log some metrics

    mlflow.log_metric("r2_score", model.score(x, y))

    mlflow.log_metric("mse", np.mean((model.predict(x) - y) ** 2))


    # Save the model

    mlflow.sklearn.log_model(model, "model")


    # End the experiment

    mlflow.end_experiment()

    ```'
