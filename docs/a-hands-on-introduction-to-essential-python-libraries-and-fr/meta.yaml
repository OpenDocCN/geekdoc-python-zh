    3. Create a new Django app by running the command **python manage.py startapp\
    \ myapp** in your command prompt or terminal. This will create a new directory\
    \ called **myapp** inside the **myproject** directory.\n4. Open the **views.py**\
    \ file inside the **myapp** directory and add the following code:\n5. Open the\
    \ **urls.py** file inside the **myapp** directory and add the following code:\n\
    \n```python\nfrom django.http import HttpResponse\n\ndef hello(request):\n   \
    \ return HttpResponse(\"Hello, World!\")\n```\n\n```python\nfrom django.urls import\
    \ path\nfrom . import views\n\nurlpatterns = [\n    path('hello/', views.hello,\
    \ name='hello'),\n]\n```\n\n6. Open the **urls.py** file inside the **myproject**\
    \ directory and add the following code:\n\n```python\nfrom django.contrib import\
    \ admin\nfrom django.urls import include, path\n\nurlpatterns = [\n    path('admin/',\
    \ admin.site.urls),\n    path('myapp/', include('myapp.urls')),\n]\n```\n\n7.\
    \ Start the Django server by running the command **python manage.py runserver**\
    \ in your command prompt or terminal.\n\n8. Open your web browser and go to **http://127.0.0.1:8000/myapp/hello/**.\
    \ You should see the message \"Hello, World!\" displayed in your browser.\n\n\
    This is a very basic example of a Django app, but it demonstrates how you can\
