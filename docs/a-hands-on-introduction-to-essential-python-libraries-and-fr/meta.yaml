  md: '# SCRAPY


    Scrapy is an open-source web crawling framework that is used to extract data from
    websites. It is built on top of the Twisted framework and provides an easy-to-use
    API for crawling web pages and extracting information. Scrapy is designed to handle
    large-scale web crawling tasks and can be used to extract data for a wide range
    of applications, including data mining, information processing, and even for building
    intelligent agents.


    Scrapy uses a pipeline-based architecture that allows users to write reusable
    code for processing the scraped data. It also includes built-in support for handling
    common web protocols like HTTP and HTTPS, as well as for handling asynchronous
    requests.


    In addition to its powerful web crawling capabilities, Scrapy also includes features
    for data cleaning, filtering, and normalization. This makes it a great tool for
    extracting structured data from unstructured web pages, which can be difficult
    to do with other web scraping tools.


    It is highly customizable and can be extended with plugins and third-party libraries.
    Its community is also very active, with a wide range of resources available for
    users to learn from and get help with any issues they encounter.


    Scrapy is a powerful web crawling framework that provides a lot of flexibility
    and functionality for extracting data from websites. However, it does require
    some knowledge of Python and web development to use effectively.'
  merge: -1
  pgno: 159
- img_proc: true
  md: "An example of how to use Scrapy to scrape quotes from the website [http://quotes.toscrape.com/](http://quotes.toscrape.com/):\n\
    \nFirst, install Scrapy by running **pip install scrapy** in your command prompt\
    \ or terminal.\n\nThen, create a new Scrapy project by running **scrapy startproject\
    \ quotes_scraper** in your command prompt or terminal. This will create a new\
    \ directory called **quotes_scraper**.\n\nNext, navigate to the **spiders** directory\
    \ within the **quotes_scraper** directory and create a new file called **quotes_spider.py**.\
    \ Add the following code to this file:\n\n```\nimport scrapy\n\nclass QuotesSpider(scrapy.Spider):\n\
    \    name = \"quotes\"\n\n    start_urls = [\n        'http://quotes.toscrape.com/page/1/',\n\
    \    ]\n\n    def parse(self, response):\n        for quote in response.css('div.quote'):\n\
    \            yield {\n                'text': quote.css('span.text::text').get(),\n\
    \                'author': quote.css('span small::text').get(),\n            \
    \    'tags': quote.css('div.tags a.tag::text').getall(),\n            }\n\n  \
    \      next_page = response.css('li.next a::attr(href)').get()\n        if next_page\
    \ is not None:\n            yield response.follow(next_page, self.parse)\n```"
