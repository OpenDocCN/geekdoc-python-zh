    # FASTAPI


    FastAPI is a modern, fast (high-performance) web framework for building APIs with
    Python 3.6+ based on standard Python type hints. It is designed to be easy to
    use and understand, with a focus on developer productivity and code quality.


    FastAPI offers a lot of features out-of-the-box, including:


    +   - Automatic generation of OpenAPI and JSON Schema documentation

    - Fast, asynchronous support with Starlette

    - Dependency injection with FastAPI''s Dependency Injection system

    - Data validation with Pydantic

