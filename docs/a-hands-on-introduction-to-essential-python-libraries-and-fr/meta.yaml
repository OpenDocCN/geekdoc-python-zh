    - Model-agnostic: LIME can be used with a wide range of machine learning models,
    including black box models that are difficult to interpret using other methods.

    - Flexible: LIME can be used with a variety of data types, including text, images,
    and tabular data.

    - Intuitive: LIME generates explanations that are easy to understand, even for
