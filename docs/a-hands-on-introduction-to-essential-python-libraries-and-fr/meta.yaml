    \ and corpus, and train an LDA topic model with 2 topics. The output shows the\
    \ top words associated with each topic.\n\n## Pros and Cons\n\nPros:\n\n- Easy\
    \ to use API for creating and training topic models\n- Supports multiple algorithms\
    \ for topic modeling, such as Latent Dirichlet Allocation (LDA) and Latent Semantic\
    \ Analysis (LSA)\n- Can handle large datasets efficiently\n- Provides tools for\
