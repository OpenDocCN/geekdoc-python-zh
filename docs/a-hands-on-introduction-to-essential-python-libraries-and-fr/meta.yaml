    # # SCIKIT-LEARN


    Python scikit-learn (also known as sklearn) is a popular machine learning library
    for the Python programming language. It provides a range of supervised and unsupervised
    learning algorithms for various types of data analysis tasks such as classification,
    regression, clustering, and dimensionality reduction.


    It was developed by David Cournapeau as a Google Summer of Code project in 2007
    and is now maintained by a team of developers. It is open-source software and
    is available under a permissive BSD-style license.


    Scikit-learn is built on top of other popular scientific computing libraries for
    Python, such as NumPy, SciPy, and matplotlib. It also integrates with other machine
    learning and data analysis libraries such as TensorFlow and Pandas.


    Scikit-learn provides a wide range of machine learning algorithms, including:


    +   - Linear and logistic regression

    - Support Vector Machines (SVM)

    - Decision Trees and Random Forests

    - K-Nearest Neighbors (KNN)

    - Naive Bayes

    - Clustering algorithms (e.g. K-Means)'
