    multi:softmax\"，将**num_class**参数设置为3，因为Iris数据集中有三个类别。\n\n然后，我们使用**fit**方法在训练数据上训练XGBoost模型。模型训练完成后，我们使用**predict**方法在测试数据上进行预测。\n\
    \n最后，我们通过将预测标签与测试集中的真实标签进行比较来评估模型的准确性，并打印出准确率分数。\n\n### 优缺点\n\n优点：\n\n- 以其准确性和性能而闻名，特别是在分类、回归和排序等结构化数据任务中。\n\
