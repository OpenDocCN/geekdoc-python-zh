- md: "## Generative Models\n\nGenerative models are a major part of unsupervised\
    \ learning models. They create new samples from the same distribution of the given\
    \ training data. Generally, these models are designed to learn and discover the\
    \ essence of the given data for generating similar data. The image data set is\
    \ an example of generative models and has the capability to create a set of images\
    \ like the given set.\n\nGenerative models are purely based on the characteristics\
    \ of unsupervised machine learning models.\n\n## Association\n\nAssociation is\
    \ a rule-based machine learning method that is used to discover relations between\
    \ databases. In large sets of data items, we can find interesting associations\
    \ such as dependencies and relationships through association rules. In data sets,\
    \ items are generally stored in the form of transactions that can be generated\
    \ or extracted through external processes and relational databases. Unsupervised\
    \ machine learning delivers full scalability to association rules algorithms which\
    \ in return help in accumulating the ever-growing size of data. Furthermore, the\
    \ evaluation and discovery of interesting associations make it easier for companies\
    \ and industries to handle big data.\n\nPopular machine learning algorithms that\
    \ are associated with association rules are SETM, AIS, and A Priori. With the\
    \ help of the AIS algorithm, the model can generate and count item sets as it\
    \ scans data. This also helps the algorithm in determining which large item sets\
    \ contained a transaction and how new candidate items are created by entering\
    \ large item sets along with other items in the transaction data. Moreover, the\
    \ SETM algorithm is yet another way to generate candidate itemsets while the model\
    \ scans a database.\n\nSETM algorithm is accountable for itemsets at the end of\
    \ the scan because new candidate itemsets is generated in the same way as the\
    \ AIS algorithm. Along with this operation, the transaction ID of the generated\
    \ transaction is saved along with the candidate item set for a sequential structure.\
    \ An a priori algorithm allows candidate item sets to generate only with the support\
    \ of large item sets from the previous pass. Large item sets of the previous pass\
    \ can be joined to generate specific item sets of a larger size.\n\nAssociation\
    \ rules are a powerful source in data mining because they are used for predicting\
    \ customer behaviors and studying customer analytics, product clustering, store\
    \ layout, and market-based analysis. Generally, programmers make use of association\
    \ rules to build programs that are capable of handling machine learning. Association\
    \ rule mining actually searches for frequent items in the data set and is used\
    \ to generate interesting associations and correlations between item sets on both\
    \ relational and transactional databases.\n\n## Density Estimation\n\nDensity\
    \ is the relationship between observations and their probability. Some outcomes\
    \ of a random variable have a low probability density while other outcomes have\
    \ a higher probability density. For sample data, the probability density is considered\
    \ as probability distribution which is a major part of machine learning models.\n\
    \nIn order to determine the probability density function for sample data, we must\
    \ determine whether the given observation is unlikely or not. Selecting appropriate\
    \ learning methods that require input data is best for obtaining a specific probability\
    \ distribution.\n\nThe probability density function for a random sample of data\
    \ is calculated because the probability density is supposed to be approximated\
    \ through the probability density estimation process. Density estimation uses\
    \ statistical models to find underlying probability distribution which in return\
    \ gives rise to the observed variables.\n\n## Kernel Density Estimation\n\nKernel\
    \ density estimation is a method of estimating the probability density function\
    \ of a continuous variable. Being a non-parametric approach, kernel density estimation\
    \ does not assume any underlying distribution for the variable and is exclusively\
    \ created with the datum.\n\nThe probability density function is then estimated\
    \ by adding all of the given kernel functions and dividing the total number to\
    \ ensure that every possible value of the probability density function is non-negative\
    \ and is a definite integral of the probability density function over its support\
    \ sets equal to 1.\n\n## Kernel Density Estimates of Ozone in New York and Ozonopolis\n\
    \n![](img/9b742240054fb02472f2e7c1266edbc1_378_0.png)\n\nFor example:\nThe above\
    \ graph is based on the “Ozone” data from the built-in “air quality” data set\
    \ and the previously simulated Ozone data for Ozonopolis City. It also shows rug\
    \ plots and how they affect kernel density plots. It can be determined that Ozonopolis\
    \ has more ozone pollution when compared to New York City, and this is the main\
    \ reason why the density plots have higher bumps at specific places.\n\nParameters\
    \ such as bandwidth and smoothing parameters have the capability to control the\
    \ scope of data samples which contribute to estimating the probability of a given\
    \ sample. Moreover, kernel density is also referred to as the Parzen-Rosenblatt\
    \ window.\n\nPseudocode for kernel estimation:\n\n- **Input:** Kernel function\
    \ K(x), kernel width w, training data instances x1, xn.\n- **Output:** An estimate\
    \ of the probability density function underlying the training data.\n- **Process:**\
    \ Initialize dens(x) = 0 at all points x\n\n```\nFor i = 1 to n:\n    For all\
    \ x:\n        Dens(x) += (1/n)*(1/w)*K((x-xi)/w)\n```\n\n## Latent Variables\n\
    \n### What Are Latent Variables?\n\nLatent variables are the variables that are\
    \ inferred from other variables and are not directly observed. Variables that\
    \ are observed are also known as directly measured variables and are implemented\
    \ mathematically to design latent variable models in economics, machine learning,\
    \ artificial intelligence, psychology, and natural language processing. A latent\
    \ variable can be observed neither in training nor in the testing phase. These\
    \ variables can also not be measured on a quantitative scale.\n\nTaking the example\
    \ of a probabilistic language model of new articles, we can notice that each article\
    \ x focuses on a specific topic y. For example, sports, economics, politics, or\
    \ finance articles each focus on their respective topics. By using this knowledge,\
    \ we can build a more accurate model that can also be expressed as p (x | t)p(t)\
    \ for which additionally added variable t is unobserved. However, we cannot use\
    \ learning methods because it is unobserved, and the unobserved variables often\
    \ make learning a difficult task.\n\n### Gaussian Mixture Models\n\nGaussian Mixture\
    \ Models are also considered latent variable models. These models are widely being\
    \ used in machine learning because they postulate that our observed data is comprised\
    \ of k clusters. It is assumed that each cluster is specified by π1,...,πK; whereas\
    \ the distribution within each cluster is known as Gaussian.\n\n## Data Compression\n\
    \nData compression is the process of keeping data sets as small and efficient\
    \ as possible. Unsupervised learning methods support data compression and perform\
    \ the task through the dimensionality reduction process. The dimensionality reduction\
    \ approach assumes that the given data is redundant and utilizes the same concepts\
    \ as information theory. Also known as the number of columns in a data set, dimensionality\
    \ reduction can be used to represent information in a data set with only a specific\
    \ size of the actual content.\n\nSingular value decomposition (SVD) and principal\
    \ component analysis (PCA) are the main approaches for data compression. PCA is\
    \ used to find linear combinations that communicate variance in data whereas the\
    \ SVD model factorizes data into the product of three other, smaller matrices.\n\
    \nFor generating new samples from the same distribution, generative models are\
    \ used, and they are a major part of the unsupervised machine learning approach\
    \ as well. The model also has the power to automatically learn the features of\
    \ given data and implement them into the produced data."
  mdcn: "## 生成模型\n\n生成模型是无监督学习模型的重要组成部分。它们从与给定训练数据相同的分布中创建新样本。通常，这些模型旨在学习和发现给定数据的本质，以生成相似的数据。图像数据集是生成模型的一个例子，它能够创建一组与给定集合相似的图像。\n\
    \n生成模型完全基于无监督机器学习模型的特性。\n\n## 关联规则\n\n关联规则是一种基于规则的机器学习方法，用于发现数据库之间的关系。在大型数据项集中，我们可以通过关联规则发现有趣的关联，如依赖关系和关系。在数据集中，数据项通常以事务的形式存储，这些事务可以通过外部过程和关系数据库生成或提取。无监督机器学习为关联规则算法提供了完全的可扩展性，这反过来有助于处理不断增长的数据量。此外，评估和发现有趣的关联使公司和行业更容易处理大数据。\n\
    \n与关联规则相关的流行机器学习算法包括SETM、AIS和A Priori。借助AIS算法，模型可以在扫描数据时生成和计数项集。这也有助于算法确定哪些大项集包含一个事务，以及如何通过将大项集与事务数据中的其他项结合来创建新的候选项集。此外，SETM算法是模型在扫描数据库时生成候选项集的另一种方式。\n\
    \nSETM算法在扫描结束时负责处理项集，因为新的候选项集是以与AIS算法相同的方式生成的。在此操作过程中，生成的事务的事务ID与候选项集一起保存，以形成顺序结构。A\
    \ Priori算法允许候选项集仅在上一轮扫描的大项集支持下生成。上一轮的大项集可以连接起来生成更大尺寸的特定项集。\n\n关联规则是数据挖掘中的强大工具，因为它们用于预测客户行为、研究客户分析、产品聚类、商店布局和基于市场的分析。通常，程序员利用关联规则来构建能够处理机器学习的程序。关联规则挖掘实际上是在数据集中搜索频繁项，并用于在关系型和事务型数据库上的项集之间生成有趣的关联和相关性。\n\
    \n## 密度估计\n\n密度是观测值与其概率之间的关系。随机变量的某些结果具有低概率密度，而其他结果具有较高的概率密度。对于样本数据，概率密度被视为概率分布，这是机器学习模型的主要组成部分。\n\
    \n为了确定样本数据的概率密度函数，我们必须确定给定的观测值是否不太可能。选择需要输入数据的适当学习方法最适合获得特定的概率分布。\n\n随机样本数据的概率密度函数是通过计算得出的，因为概率密度应该通过概率密度估计过程来近似。密度估计使用统计模型来寻找潜在的概率分布，这反过来又产生了观测变量。\n\
    \n## 核密度估计\n\n核密度估计是一种估计连续变量概率密度函数的方法。作为一种非参数方法，核密度估计不假设变量的任何潜在分布，而是完全基于数据创建。\n\
    \n然后通过将所有给定的核函数相加并除以总数来估计概率密度函数，以确保概率密度函数的每个可能值都是非负的，并且概率密度函数在其支撑集上的定积分等于1。\n\n\
    ## 纽约和臭氧城的臭氧核密度估计\n\n![](img/9b742240054fb02472f2e7c1266edbc1_378_0.png)\n\n例如：\n\
    上图基于内置“空气质量”数据集中的“臭氧”数据以及先前模拟的臭氧城臭氧数据。它还显示了地毯图及其如何影响核密度图。可以确定，与纽约市相比，臭氧城的臭氧污染更严重，这是密度图在特定位置出现更高凸起的主要原因。\n\
    \n带宽和光滑参数等参数能够控制数据样本的范围，这些样本有助于估计给定样本的概率。此外，核密度也被称为Parzen-Rosenblatt窗口。\n\n核估计的伪代码：\n\
    \n- **输入：** 核函数K(x)，核宽度w，训练数据实例x1, xn。\n- **输出：** 训练数据潜在概率密度函数的估计。\n- **过程：**\
    \ 在所有点x处初始化dens(x) = 0\n\n```\nFor i = 1 to n:\n    For all x:\n        Dens(x)\
    \ += (1/n)*(1/w)*K((x-xi)/w)\n```\n\n## 潜变量\n\n### 什么是潜变量？\n\n潜变量是从其他变量推断出来且未被直接观测到的变量。被观测到的变量也称为直接测量变量，并在经济学、机器学习、人工智能、心理学和自然语言处理中用于数学上设计潜变量模型。潜变量在训练和测试阶段都无法被观测到。这些变量也无法在定量尺度上进行测量。\n\
    \n以新闻文章的概率语言模型为例，我们可以注意到每篇文章x都专注于一个特定的主题y。例如，体育、经济、政治或金融文章各自专注于其相应的主题。利用这一知识，我们可以构建一个更精确的模型，该模型也可以表示为p(x\
    \ | t)p(t)，其中额外添加的变量t是未被观测到的。然而，我们不能使用学习方法，因为它是未被观测到的，而未被观测到的变量通常使学习成为一项困难的任务。\n\
    \n### 高斯混合模型\n\n高斯混合模型也被认为是潜变量模型。这些模型在机器学习中被广泛使用，因为它们假设我们观测到的数据由k个聚类组成。假设每个聚类由π1,...,πK指定；而每个聚类内的分布被称为高斯分布。\n\
    \n## 数据压缩\n\n数据压缩是使数据集尽可能小且高效的过程。无监督学习方法支持数据压缩，并通过降维过程执行任务。降维方法假设给定数据是冗余的，并利用与信息理论相同的概念。降维也称为数据集中的列数，可用于仅用实际内容的特定大小来表示数据集中的信息。\n\
    \n奇异值分解（SVD）和主成分分析（PCA）是数据压缩的主要方法。PCA用于寻找传达数据方差的线性组合，而SVD模型将数据分解为三个其他较小矩阵的乘积。\n\
    \n为了从相同分布中生成新样本，使用了生成模型，它们也是无监督机器学习方法的重要组成部分。该模型还具有自动学习给定数据特征并将其应用于生成数据的能力。"
