    Reading allows you to access and copy any part of the file’s content. Writing
    allows you to overwrite a file’s contents and create a new one. Appending allows
    you to write on the file while keeping the other content intact.


    There are two types of file access modes: string and binary. String access allows
    you to access a file’s content as if you are opening a text file. Binary access
    allows you to access a file on its rawest form: binary.


    In your sample file, accessing it using string access allows you to read the line
    “Hello World”. Accessing the file using binary access will let you read “Hello
    World” in binary, which will be b’Hello World’.


    ```

    Example:

    >>> x = open("sampleFile.txt", "rb")

    >>> x.read()

    b’Hello World’

    >>> _

    ```


    String access is useful for editing text files. Binary access is useful for anything
    else, like pictures, compressed files, and executables. In this book, you will
    only be taught how to handle text files.


    There are multiple values that you can enter in the file access mode parameter
    of the open() function. But you do not need to memorize'
