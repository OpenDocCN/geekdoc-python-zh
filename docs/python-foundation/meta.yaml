    This system was created using ML technology that analyzed the conversation between
    our customer service representative and the customer (in real-time). We were able
    to know their needs, which made it possible for us to provide them with the exact
    information they wanted.


    This technology is still in use today and has improved our customer service considerably.
    In fact, I worked on this project for only three weeks before we actually implemented
