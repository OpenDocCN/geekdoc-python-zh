  md: 'SETM algorithm is accountable for itemsets at the end of the scan because new
    candidate itemsets is generated in the same way as the AIS algorithm. Along with
    this operation, the transaction ID of the generated transaction is saved along
    with the candidate item set for a sequential structure. An a priori algorithm
    allows candidate item set s to generate only with the support of large item set
    s from the previous pass. Large item sets of the previous pass can be joined to
    generate specific item sets of a larger size.


    Association rules are a powerful source in data mining because they are used for
    predicting customer behaviors and studying customer analytics, product clustering,
    store layout, and market-based analysis. Generally, programmers make use of association
    rules to build programs that are capable of handling machine learning. Association
    rule mining actually searches for frequent items in the data set and is used to
    generate interesting associations and correlations between item sets on both relational
    and transactional databases.


    # Density Estimation


    Density is the relationship between observations and their probability. Some outcomes
    of a random variable have a low probability density while other outcomes have
    a higher probability density. For sample data, the probability density is considered
    as probability distribution which is a major part of machine learning models.'
  merge: -1
  pgno: 376
- img_proc: true
  md: 'In order to determine the probability density function for sample data, we
    must determine whether the given observation is unlikely or not. Selecting appropriate
    learning methods that require input data is best for obtaining a specific probability
    distribution.


    The probability density function for a random sample of data is calculated because
    the probability density is supposed to be approximated through the probability
    density estimation process. Density estimation uses statistical models to find
    underlying probability distribution which in return gives rise to the observed
    variables.


    # Kernel Density Estimation


    Kernel density estimation is a method of estimating the probability density function
    of a continuous variable. Being a non-parametric approach, kernel density estimation
    does not assume any underlying distribution for the variable and is exclusively
    created with the datum.


    The probability density function is then estimated by adding all of the given
    kernel functions and dividing the total number to ensure that every possible value
    of the probability density function is non-negative and is a definite integral
    of the probability density function over its support sets equal to 1.'
  merge: -1
