    # Unsupervised Learning?


    The Unsupervised paradigm learning is applied to determine the data’s masked structure
    pattern in order to learn more from the data. In contrast with supervised learning,
    there is neither a correct answer nor a training dataset to learn from. In this
    case, only input dataset X is available. The algorithms are used to identify the
    patterns in data without explicitly providing them with any information other
    than the data itself. In short, no guidance is provided to the algorithm to learn
    from the data. The algorithm relies on similarities, patterns, and differences
    to learn from the data. There are different types of unsupervised learning, namely
    clustering, association, and anomaly detection.'
  merge: -1
  pgno: 346
- img_proc: true
  md: 'Clustering algorithms are applied to identify the inherent groupings in data.
    For instance, grouping patients by eating habits. Basically, clustering is ordering
    the unlabeled data into clusters. A cluster is an ensemble of data that are similar.
    Association is a learning method by a rule to be identified. This rule shows trends
    in the dataset; for example, patients with diabetes tend to have hypertension.
    The association describes patterns that occur together in a dataset. Anomaly detection,
    as its name suggests, it detects unusual data points within the dataset. This
    learning is practical to detect suspicious transactions or emails, fraud detection,
    or errors within a system, among others. Overall, unsupervised learning is very
    useful for regression applications where the expected output is completely unknown.
    This paradigm of learning provides valuable information about the data structure
    and patterns with no information supplied. We will cover, in this section, the
    major unsupervised learning algorithms.


    Clustering models rely typically on similarity measures defined as a Probabilistic
    or a Euclidean distance. Different algorithms are available for clustering such
    as K-means clustering, hidden Markov models, self-organizing maps, Gaussian mixture
    models, and Hierarchical clustering, among others.


    A widely used algorithm for unsupervised learning is K-means clustering. It belongs
    to the partitional category of algorithms that defines all clusters at once. The
    k-means'
  merge: -1
  pgno: 347
- img_proc: true
  md: 'algorithm groups similar data into a fixed number K of clusters according to
    their centroid (i.e., center). The cluster number k is a user-fixed parameter.
    The k-means algorithm determines the k number of centroids of each cluster and
    then associates data to the nearest cluster using the similarity measure. More
    precisely, the algorithm starts by forming an initial K centroid defined from
    a random selection of data. Every point of the dataset is allocated to the nearest
    center or centroid. Then, the centroids are recalculated for each cluster. This
    procedure is replicated several times as long as a convergence criterion has not
    been satisfied. The convergence criterion can be a very minimal chance of the
    average data forming a cluster (i.e., centroids), a minimal change of re-allocation
    of data to the clusters, or the maximum number of iterations has attained.


    This algorithm is mainly used because it is simple to understand, and its implementation
    is very straightforward. It is also computationally efficient. However, there
    are some downsides to this algorithm. It is only applicable if the mean is defined.
    In other words, it is applicable only for continuous data. For example, if the
    data is binary or categorical, another function representing the center should
    be used like the k-mode, which provides values frequency. This algorithm is sensitive
    to data and outliers because it is based on the mean to define the centroid. A
    slight change in data or if data contains an outlier leads to high variations.
    Another issue with the k-means algorithms is they can be inefficient'
  merge: -1
  pgno: 348
- img_proc: true
  md: 'when clusters do not have a rounded shape because it uses a distance to the
    centroid of a cluster to assign each point of the data to a certain class. This
    algorithm is also deterministic in the sense that each point fits in only one
    class. In reality, clusters may be overlapping, and the k-means algorithm is not
    able to define overlapping clusters.


    Hierarchical clustering, unlike the k-means clustering, defines clusters from
    pre-determined clusters. Depending on how algorithms define these clusters, two
    varieties of hierarchical clustering algorithms can be identified as agglomerative
    and divisive algorithms. The first type of hierarchical algorithms starts typically
    with each data point as an individual cluster. Then merge similar clusters iteratively
    into larger clusters until one cluster is formed. In contrast, divisive algorithms
    start with all data points as a single cluster called the root cluster and then
    divide it iteratively into smaller clusters called child clusters. The divisive
    algorithms stop when every data point defines a separate cluster or what is called
    singleton clusters. The hierarchical clustering suffers from the same drawback
    as the k-means clustering, which is its inability to define overlapping clusters.


    Gaussian mixture models are a probabilistic approach that allows for overcoming
