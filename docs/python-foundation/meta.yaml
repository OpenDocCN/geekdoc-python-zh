    as a whole.

    Machine Learning entails teaching computers to recognize patterns and improve
    their efficiency over time by crunching large quantities of data and drawing conclusions
    from that data. The conclusion is based on the number of times that similar patterns
    have been encountered in the past—this is called the order of magnitude, or the
    value of the data. The machine then learns to recognize patterns in this simplified
    (and simplified form) by learning these same patterns over and over again. This
    process is done through software. Artificial Intelligence, on the other hand,
