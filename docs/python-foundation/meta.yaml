    \ weather[\"Mon\"]\n\nprint(weather[\"Wed\"])\n```\n\nIn this exercise, we have\
    \ created a dictionary called weather with day:weather type key:value pairs as\
    \ you can see. In line 3, we have added a new key:value pair; in line 4 we update\
    \ the value of the “Wed” key, and in line 5 we delete the key:value pair for “Mon”.\
    \ Does your script work as it should?\n\nThe **del** statement is used to remove\
    \ a single item in the dictionary explicitly; to delete the entire dictionary,\
    \ use **clear**.\n\nBasic dictionary operations with in-built functions and methods\n\
    \nThe table in your next exercise summarizes the vital operations you can carry\
    \ out on a dictionary in Python at this stage. You will notice that we have already\
    \ come across most of them earlier with the previous object types we have covered.\
    \ Nevertheless, try all these operations with dictionaries to understand how each\
    \ is applied.\n\n## Dictionary functions and methods\n\n```\njanedoe = {\"ID\"\
    : 7234, \"Height\": \"5.5 ft\", \"Weight\": \"212 lbs\"}\njohndoe = {\"ID\": 2932,\
    \ \"Height\": \"6.0 ft\", \"Weight\": \"190 lbs\"}\n```"
  mdcn: "## Break 语句\n\n`break` 语句会终止循环，并将控制权传递给循环后的第一条语句。当需要快速退出循环时，它通常被使用。\n\n语法：\n\
    \n```\nbreak\n```\n\n示例：\n\n```\n#当达到指定颜色时循环结束\ncolors = [\"blue\", \"pink\",\
    \ \"red\", \"green\", \"yellow\"]\nfor x in colors:\n    if x == 'green':\n  \
    \      break\n    print('Great color :', x)\nprint(\"Interesting loop!\")\n```\n\
    \n运行程序并查看结果：\nGreat color : blue\nGreat color : pink\nGreat color : red\nInteresting\
    \ loop!\n\n## Continue 语句\n\n`continue` 语句会跳过当前迭代中的语句，并将程序控制权传递给下一次迭代。\n\n语法：\n\
    \n```\ncontinue\n```\n\n为了说明，你可以将上面示例中的 `break` 语句替换为 `continue` 语句。\n\n```\n\
    colors = [\"blue\", \"pink\", \"red\", \"green\", \"yellow\"]\nfor x in colors:\n\
    \    if x == 'green':\n        continue\n    print('Great color :', x)\nprint(\"\
    An amazing loop!\")\n```\n\n当你运行程序时，输出如下：\n\n```\nGreat color : blue\nGreat color\
    \ : pink\nGreat color : red\nGreat color : yellow\n```\n\nAn amazing loop!\n\n\
    请注意，当程序到达颜色 'green' 时，它跳过了 `print` 语句，然后继续打印列表中的下一个项目。\n\n## Pass 语句\n\n`pass`\
    \ 是 Python 中的一个空操作。解释器读取 `pass` 语句但不做任何事情。它通常在语法要求必须有语句的地方用作占位符。程序员通常会用 `pass`\
    \ 语句来代替尚未编写的代码。这将允许他们测试完整的代码段，同时避免因不完整的代码段而产生错误消息。\n\n语法：\n\n```\npass\n```\n\n\
    ## Python 字典\n\n字典（或简称 dict），虽然也包含顺序数据，但它是一种关联数组映射类型，其键映射为值。它包含的数据可能是有序的，但它们并未排序。\n\
    \n字典的元素是可变的，并且可以是任何其他数据类型。每个元素由一个键值对组成，键和值之间用冒号 (:) 分隔，并且与列表和元组一样，用逗号分隔。字典的语法是一个由花括号\
    \ {} 括起来的一个或多个元素组成的标识对象。\n\n**语法格式如下：**\n\n```\nmyDict = {key1:value1, key2:value2,\
    \ key3:value3}\n```\n\n与列表类似，字典是可变的，并且可以包含混合内容，包括元组（假设所有值都是相同类型）、列表、字符串、整数等。\n\
    \n键值对模型的关键点在于，存储在字典中的每个键都是唯一的。实际上，字典旨在存储一系列唯一项目或属性的值。\n\n**假设以下内容成立：**\n\n1. \
    \ 在向字典添加或创建字典时，所有条目必须采用键值对格式。如果缺少键或值，将引发异常。\n2.  如果向字典添加一个键值对，而该键已存在于字典中，则旧的键值对将被新条目替换。\n\
    3.  只有在提供键的情况下才能更新值。\n4.  键值对总是被一起删除——无法只删除值或只删除键。\n5.  列表不能用作键。\n\n以下是一些常见的字典操作。\n\
    \n创建一个空字典：\n\n```\n>>> x={}\n```\n\n创建一个字典：\n\n```\n>>> x=dict(name='john', age=35,\
    \ height=6)\n>>> print(x)\n{'name': 'john', 'age': 35, 'height': 6}\n```\n\n测试一个键是否存在：\n\
    \n```\n>>> if 'age' in x.keys():\n    print('found it!')\nfound it!\n```\n\n获取一个键对应的值：\n\
    \n```\n>>> y=x['height']\n>>> print('Height = ' + str(y))\nHeight = 6\n```\n\n\
    列出所有键：\n\n```\n>>> for y in x.keys():\n    print(y)\nname\nage\nheight\n```\n\n\
    打印键和值：\n\n```\n>>> for y in x.keys():\n    v=x[y]\n    if type(v)!='str':\n  \
    \      v=str(v)\n    print(y + '=' + v)\nname=john\nage=35\nheight=6\n```\n\n\
    更新一个键对应的值：\n\n```\n>>> x['age']=40\n>>> print(x)\n{'name': 'john', 'age': 40,\
    \ 'height': 6}\n```\n\n删除一个键值对：\n\n```\n>>> del(x['height'])\n>>> print(x)\n{'name':\
    \ 'john', 'age': 40}\n```\n\n添加一个键值对：\n\n```\n>>> x['height']=6\n>>> print(x)\n\
    {'name': 'john', 'age': 40, 'height': 6}\n```\n\n将所有键或值导出到列表中：\n\n```\n>>> list(x.keys())\
    \ # 键作为列表\n['name', 'age', 'height']\n>>> list(x.values()) # 值作为列表\n['john', 40,\
    \ 6]\n```\n\n## 创建字典\n\n在 Python 中创建字典对象最流行的方法是像我们在本书中创建其他对象类型一样，命名一个空字典对象。字典创建后，你可以根据需要添加键值对。\n\
    \n### 创建字典然后添加键值对\n\n```\nmyDict = {}\n\nmyDict[\"Name\"] = \"Jane\"\nmyDict[\"\
    Age\"] = 21\nmyDict[\"City\"] = \"London\"\nmyDict[\"Hobbies\"] = \"Cycling\"\
    , \"Coding\", \"Cooking\", \"Gaming\"\nprint(myDict)\n```\n\n在这个练习中，我们在脚本的第一行创建了一个名为\
    \ `myDict` 的空字典。从第三行到第六行，我们向空字典添加了键值对，然后在最后打印出字典 `myDict` 的内容。\n\n另一种创建字典的方法是将键值对分配给一个命名的字典对象，如练习\
    \ 27 所示。\n\n### 通过分配键值对来创建字典\n\n```\nmyDict = {\"Name\": \"Jane\", \"Age\": 21,\
    \ \"Gender\": \"F\", \"City\": \"London\"}\n\nprint(myDict)\n```\n\n你会注意到，键值对输入字典的顺序并不重要，因为它们是通过键而不是索引来访问的，它们总是以不同的顺序打印出来。\n\
    \n创建字典时必须遵守的一条规则是键必须是唯一的，但值不需要是唯一的。键是不可变的，而值可以是可变的数据类型，如字符串、数字或列表。\n\n## 访问字典的键值对\n\
    \n字典数据是无序的；因此，它们可以独立访问，而无需像我们处理字符串、列表和元组那样使用索引。字典是一种复合对象类型，不能被切片或索引。\n\nPython\
    \ 使用复杂的算法来映射字典的键。通过这个称为哈希的过程，这使得访问、检索和更新字典的键值对比其他顺序对象类型快得多。\n\n键用于访问字典的键值对。下一个练习演示了我们如何访问字典\
    \ *weather* 的值。\n\n### 访问字典的键值对：\n\n```\nweather = {\"Mon\": \"Cloudy\", \"Tue\"\
    : \"Sunny\", \"Wed\": \"Rainy\"}\n\nprint(weather[\"Wed\"])\n```\n\n如果你尝试访问一个不存在的键的键值对，你将遇到错误\
    \ *KeyError: [Key]*\n\n## 更新字典\n\n你可以向字典添加新的键值对，并修改或删除现有条目的值，如下一个练习所示。\n\n```\n\
    # 更新字典：\nweather = {\"Mon\": \"Cloudy\", \"Tue\": \"Sunny\", \"Wed\": \"Rainy\"\
    }\n\nweather[\"Thu\"] = \"Hot\"\nweather[\"Wed\"] = \"Gloomy\"\ndel weather[\"\
    Mon\"]\n\nprint(weather[\"Wed\"])\n```\n\n在这个练习中，我们创建了一个名为 `weather` 的字典，其中包含如你所见的\
    \ day:weather 类型的键值对。在第 3 行，我们添加了一个新的键值对；在第 4 行，我们更新了 \"Wed\" 键的值；在第 5 行，我们删除了\
    \ \"Mon\" 的键值对。你的脚本是否按预期工作？\n\n**del** 语句用于显式删除字典中的单个项目；要删除整个字典，请使用 **clear**。\n\
    \n使用内置函数和方法的基本字典操作\n\n下一个练习中的表格总结了目前你可以在 Python 中对字典执行的重要操作。你会注意到，我们之前在涵盖的其他对象类型中已经遇到过其中的大多数。尽管如此，还是尝试用字典执行所有这些操作，以了解每个操作是如何应用的。\n\
    \n## 字典函数和方法\n\n```\njanedoe = {\"ID\": 7234, \"Height\": \"5.5 ft\", \"Weight\"\
    : \"212 lbs\"}\njohndoe = {\"ID\": 2932, \"Height\": \"6.0 ft\", \"Weight\": \"\
    190 lbs\"}\n```"
