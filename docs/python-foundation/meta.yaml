    )\n>>> file1.tell()\n0\n>>> file1.read()\n'Hello World'\n>>> file1.tell()\n11\n\
    >>> file1.read()\n''\n>>> _\n```\n\n要将文件指针移动到你期望的位置，可以使用 `seek()` 函数。\n\n示例：\n\
    \n```\n>>> file1 = open(\"sampleFile.txt\")\n>>> file1.tell()\n0\n>>> file1.read()\n\
    'Hello World'\n>>> file1.tell()\n11\n>>> file1.seek(0)\n0\n>>> file1.read()\n\
    'Hello World'\n>>> file1.seek(1)\n1\n>>> file1.read()\n'ello World'\n>>> _\n```\n\
    \n`seek()` 方法有两个参数。第一个是 `offset`，它根据第二个参数来设置指针的位置。此外，此参数是必需的。\n\n第二个参数是可选的。它用于\
    \ `whence`，该参数决定了“查找”的起始位置。默认值为 0。\n\n如果设置为 0，Python 将把指针的位置设置为 `offset` 参数的值。\n\
    \n如果设置为 1，Python 将把指针的位置设置为相对于当前位置或在当前位置基础上增加。\n\n如果设置为 2，Python 将把指针的位置设置为相对于文件末尾或在文件末尾基础上增加。\n\
    \n请注意，最后两个选项要求访问模式具有二进制访问权限。如果访问模式没有二进制访问权限，最后两个选项将用于确定指针的当前位置 `[seek(0, 1)]`\
    \ 和文件末尾的位置 `[seek(0, 2)]`。\n\n示例：\n\n```\n>>> file1 = open(\"sampleFile.txt\"\
    )\n>>> file1.tell()\n0\n>>> file1.seek(1)\n1\n>>> file1.seek(0, 1)\n0\n>>> file1.seek(0,\
    \ 2)\n11\n>>> _\n```\n\n## 文件访问模式\n\n要写入文件，你需要更多地了解 Python 中的文件访问模式。文件操作有三种类型：读取、写入和追加。\n\
    \n读取允许你访问和复制文件内容的任何部分。写入允许你覆盖文件内容并创建一个新文件。追加允许你在写入文件的同时保持其他内容不变。\n\n文件访问模式有两种类型：字符串和二进制。字符串访问允许你像打开文本文件一样访问文件内容。二进制访问允许你以最原始的形式访问文件：二进制。\n\
    \n在你的示例文件中，使用字符串访问可以读取“Hello World”这一行。使用二进制访问文件将让你以二进制形式读取“Hello World”，即 `b'Hello\
    \ World'`。\n\n示例：\n\n```\n>>> x = open(\"sampleFile.txt\", \"rb\")\n>>> x.read()\n\
    b'Hello World'\n>>> _\n```\n\n字符串访问对于编辑文本文件很有用。二进制访问则适用于其他任何内容，如图片、压缩文件和可执行文件。在本书中，你将只学习如何处理文本文件。\n\
    \n在 `open()` 函数的文件访问模式参数中，你可以输入多个值。但你不需要记住这些组合。你只需要知道字母组合。\n\n每个字母和符号代表一种访问模式和操作。\n\
    \n*示例：*\n\n- *r = 只读 — 文件指针置于开头*\n- *r+ = 读写*\n- *a = 追加 — 文件指针置于末尾*\n- *a+ =\
    \ 读取和追加*\n- *w = 覆盖/创建 — 由于创建文件，文件指针设置为 0*\n- *w+ = 读取和覆盖/创建*\n- *b = 二进制*\n\n\
    默认情况下，文件访问模式设置为字符串。你需要添加 `b` 以允许二进制访问。例如：“rb”。\n\n## 写入文件\n\n写入文件时，你必须始终记住 Python\
    \ 是覆盖写入，而不是插入写入。\n\n*示例：*\n\n```\n>>> x = open(\"sampleFile.txt\", \"r+\")\n>>>\
    \ x.read()\n'Hello World'\n>>> x.tell()\n0\n>>> x.write(\"text\")\n4\n>>> x.tell()\n\
    4\n>>> x.read()\n'o World'\n>>> x.seek(0)\n0\n>>> x.read()\n'texto World'\n>>>\
    \ _\n```\n\n你可能预期结果文本是“textHello World”。文件对象的 `write` 方法从指针的当前位置开始，逐个字符地替换。\n\n\
    ## 练习\n\n作为练习，你需要执行以下任务：\n\n- 创建一个名为 `test.txt` 的新文件。\n- 将完整的练习说明写入该文件。\n- 关闭文件并重新打开它。\n\
    - 读取文件并将光标移回 0。\n- 关闭文件并使用追加访问模式打开它。\n- 在文件末尾添加这些说明的改写版本。\n- 创建一个新文件，并通过复制 `test.txt`\
    \ 文件的内容为其添加类似内容。\n\n## 面向对象\n\n### 类与面向对象编程\n\nPython 是一种面向对象的编程语言。这意味着它专注于处理统称为对象的数据结构。对象可以是\
    \ Python 中任何可以命名的东西，包括字符串、函数、整数、类、浮点数、文件和方法。对象可以引用数据以及利用这些数据的方法。它们可以以多种不同的方式使用。它们可以作为参数传递，并赋值给变量、列表、元组、字典或集合。在\
    \ Python 中，几乎所有东西都是对象。\n\n类是一种数据类型，类似于字符串、列表、浮点数、整数或字典。类属于一种称为“类型”的数据类型。你存储在类对象中的数据值称为属性，而与之关联的函数称为方法。类只是一种创建、组织和管理具有相似属性和方法的对象的方式。当你从一个类创建对象时，该对象被称为该类的实例。\n\
    \n## 定义类\n\n类定义语句以关键字 `class` 开头，后跟类标识符和一个冒号。按照惯例，类名以大写字母开头。通常在类定义行之后会有一个提供类简短描述的文档字符串。\n\
    \n这是一个类定义的示例：\n\n```\nclass Furniture:\n    #这是一个类定义的示例。\n    pass\n```\n\n以下定义了一个接受对象的类：\n\
    \n```\nclass Members(object):\n    #我刚刚定义了一个接受对象的类。\n    pass\n```\n\n当你使用关键字\
    \ `class` 创建一个新类时，Python 会创建一个与类标识符同名的新类对象作为响应。这个新的类对象包含类所有属性的定义。因此，你可以用它来访问类的属性并实例化该类的新对象。\n\
    \n为了说明，创建一个新类并将其命名为 `MyClass`：\n\n```\nclass MyClass:\n    \"这是一个独立的类。\"\n   \
    \ y = 100\n    def greet(self):\n        print('Welcome, guest!')\n```\n\n要访问\
    \ `MyClass` 的属性：\n\n```\n>>> MyClass.y\n100\n```\n\n要访问 `MyClass` 的函数属性：\n\n```\n\
    >>> MyClass.greet\n<function MyClass.greet at 0x03025D20>\n```\n\n要访问 `MyClass`\
    \ 的文档字符串：\n\n```\n>>> MyClass.__doc__\n'This is an independent class.'\n```\n\n\
    ## 创建类的实例\n\n与类一起创建的类对象可用于创建类的实例。创建一个新对象很简单。你只需使用类似 `object_a = MyClass()` 的语句将该对象赋值给类。\n\
    \n要访问对象的属性，你将使用对象名称作为前缀，放在点号之前，属性名称放在点号之后。对象的属性可以是方法或数据属性。方法指的是类的函数。为了说明，你可以使用上面\
    \ `MyClass` 的类定义并从中创建一个对象：`obj = MyClass()`。\n\n`MyClass.greet` 是 `MyClass()`\
    \ 的一个属性，它是一个方法对象，因为它为将从 `MyClass` 创建的所有对象定义了一个函数。因此，`obj.greet` 是一个方法对象。\n\n```\n\
    >>> obj.greet\n<bound method MyClass.greet of <__main__.MyClass object at 0x0328DB90>>\n\
    ```\n\n在 `MyClass` 函数定义中，你可能注意到单词 `self` 被用作参数。然而，在上面的例子中，方法 `obj.greet` 被调用时没有传递参数。这是因为当一个对象调用其方法时，对象本身会成为第一个参数。按照惯例，单词\
    \ `self` 用于指代对象本身。如果有其他参数，你可以将它们放在 `self` 之后。\n\n## `__init__()` 方法\n\n`__init__()`\
    \ 方法是一个特殊的类构造函数方法，用于初始化它创建的对象。每当你创建一个类的新实例时，Python 都会调用这个初始化方法。`__init__` 方法至少接受一个参数\
    \ `self`，用于标识每个对象。\n\n示例：\n\n```\nclass Performers:\n    def __init__(self):\n\
    \        pass\n\nclass Performers(object):\n    def __init__(self):\n        pass\n\
    ```"
