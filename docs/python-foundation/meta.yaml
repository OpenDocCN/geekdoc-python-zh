    ## Python Syntax


    Before we learn some Python syntax, we are going to explore the main types of
    data that can be used in Python and how a program is structured. A program is
    a set of modules that are a series of statements that contains expressions. These
    expressions create and process objects which are variables that represent data.


    ## Python Variables


    In Python, we can use built-in objects, namely numbers, strings, lists, dictionaries,
    tuples, and files. Python supports the usual numeric types the integer and float
    as well as complex numbers. Strings are character chains whereas lists and dictionaries
    are an ensemble of other objects that can be a number or a string or other lists
    or dictionaries. Lists and dictionaries are indexed and can be iterated through.
    The main difference between lists and dictionaries is the way items are stored
    and how they can be fetched. Items in a list are ordered and can be fetched by
    position whereas they are stored and fetched in dictionaries by key. Tuples like
    lists are positionally ordered sets of objects. Finally, Python allows also for
    creating and reading files as objects. Python provides all the tools and mathematical
    functions to process these objects. In this book, we will focus on the number
    of variables and how to process them as we won''t need the other variables for
    basic machine learning applications.


    Python does not require variable declaration, or size or type declaration. Variables
    are created once they are assigned a value. For example:


    ```

    >>> x=5

    >>> print(x)

    5

    ```


    ```

    >>> x= "Hello World!"

    Hello World!

    ```


    In the example above, x was assigned a number then it was assigned a string. In
    fact, Python allows changing the type of variables after they are declared. We
    can verify the type of any Python object using the type() function.


    ```

    >>> x, y, z=10,''Banana'',2.4

    >>> print(type(x))

    <class ''int''>

    >>> print(type(y))

    <class ''str''>

    >>> print(type(z))

    <class ''float''>

    ```


    To declare a string variable, both single and double quotes can be used.


    To name a Python variable, only alpha-numeric characters and underscores can be
    used (e.g., A_9). Note that the variable names are case-sensitive and should not
    start with a number. For instance, price, Price, and PRICE are three different
    variables. Multiple variables can be declared in one line, as seen in the example
    above.


    ## Number Variables


    Python allows three numeric types: int (for integer), float, and complex. Integers
    are positive or negative numbers without decimals of unlimited length. Floats
    are negative or positive numbers with decimals. Complex numbers are expressed
    with a ‘j’ for the imaginary part as follows:


    ```

    >>> x=2+5j

    >>> print(type(x))

    <class ''complex''>

    ```


    We can convert from one number type to another type with int(), float() and complex()
    functions. Note that you cannot convert a complex number to another type.


    Python has built-in mathematic operators that allow doing the basic operations
    such as addition, multiplication, and subtraction. It also has a power function.
    No, if we want to process a set of values, we would want to store them in one
    single object as a list. To define a list, we type the set of values separated
    by a comma between square brackets:


    ```

    >>> A=[10,20,30,40,50]

    ```


    We can select one element by typing the element index between the square brackets:


    ```

    >>> print(A[1])

    20

    ```


    We can also slicer notation to select several elements. For example, displaying
    the 2nd to 4th element:


    ```

    >>> print(A[1:4])

    [20,30,40]

    ```


    Note that indexing in Python starts with 0 which is the index of the first element
    0. When using the slicer notation, the element of the second index is not included
    as in the example above. The value of A[4] is 50 and is not included in the output.
    To verify the dimension of an array, the len() function can be used.


    The disadvantage of using lists to store a set of variables is Python does not
    allow to apply the mathematical operations on lists. Let’s say we want to add
    a constant variable to the list X we created. We have to iterate over all the
    list elements and add the constant variable. However, there is a NumPy library
    that allows the creation of an array of the same type and do the basic mathematical
    operations. The NumPy arrays are different from the basic list arrays of Python
    as the NumPy arrays allow only to store variables of the same type. The NumPy
    library is useful in machine learning to create input and output variables and
    perform necessary calculations.


    In order to be able to exploit the built-in function of the NumPy library, we
    must import the library into the workspace by typing:


    ```

    >>> import NumPy as np

    ```


    Use the command pip -install “NumPy” to install this toolbox, if it is not already
    installed in the system.

    To create an array, we type:


    ```

    >>> A=np.array([10,20,30,40])

    ```


    Now, we can add, multiply or subtract a constant value from the array X by using
    the simple mathematical operators:


    ```

    >>> X=np.array([1,2,3,4]) # Creating a vector

    >>> print(X)

    [1 2 3 4]

    >>> X=X+5 # Adding 5 to all elements

    >>> print(X)

    [6 7 8 9]

    >>> X=X*10 # Multiplying all elements by 10

    >>> print(X)

    [60 70 80 90]

    >>> X=X-10 # Subtracting 10 from all elements

    >>> print(X)

    [50 60 70 80]

    ```


    ```

    >>> X=X**2 # Square of all elements

    >>> print(X)

    [2500 3600 4900 6400]

    ```


    Use the functions max() and min() to arrive at the array’s minimum and maximum
    values. The function sum() provide the sum of elements of the same array. We can
    also apply these operators (+,*, -,/ ) on two arrays. These operators are applied
    element by element when executed on arrays such as in the example below:


    ```

    >>> Y=np.array([1,2,3,4]) # Create a second array

    >>> print(Y)

    [1 2 3 4]

    >>> X+Y

    array([2501, 3602, 4903, 6404])

    >>> X*Y

    array([2500, 7200, 14700, 25600])

    >>> X/Y

    array([2500. , 1800. , 1633.333333, 1600. ])

    >>> X-Y

    array([2499, 3598, 4897, 6396])

    ```


    Usually, in machine learning, we have multiple features of inputs. For example,
    if a machine learning program predicts human age according to the height and weight
    to be developed and 100 height and weight records form the dataset. It is usually
    more convenient to store these values as a matrix where each row is a record of
    height and weight. That is if the dimension of the matrix is 100 by 2. To do so
    in Python, we can create a multi-dimension array as follows:


    ```

    >>> A=np.array([[10,20],[30,40]])

    ```


    In this example A is 2x2 matrix where the first line is [10,20] and the second
    line is [30,40]. To select an element, we use the same indexing as for the array
    as follows:


    ```

    >>> X[0] # first row of the matrix

    array([10,20])

    >>> X[0][1] # first row second column of the matrix

    20

    ```


    To verify the matrix''s dimension, you can just use the shape() function as follows:


    ```

    >>> X.shape

    (2,2)

    >>> X.shape[0] # number or rows

    2

    >>> X.shape[1] # number of columns

    2

    ```'
