    \n```\ndef function_name (inputs):\n<statements>\n```\n\n要调用一个函数，我们可以简单地使用以下语句function_name\
    \ (inputs)。\n\n例如，让我们开发一个简单的函数来显示\"Hello world!\"：\n\n```\n>>> def first_function():\n\
    ...print('Hello World!')\n...\n>>>first_function()\nHello World!\n```\n\n函数，如一般格式所示，可以接受输入并通过return语句返回输出。例如，我们可以创建一个函数来计算、打印并返回两个变量的和。\n\
    \n```\n>>> def sum_function(a,b):\n    ...c=a+b\n    ...print(\"The sum of,\"\
    \ a \"and,\" b \"is:\" c)\n    ...return c\n    ...\n    sum_function(3,5)\n \
    \   The sum of 3 and 5 is: 8\n    8\n```\n\n请注意，一个函数可以接受任意数量的输入，用逗号分隔，并且返回值可以存储在一个对象中，如下所示：\n\
    \n```\n>>> c=sum_function(3,5)\n    8\n    >>> print(c)\n    8\n```\n\n我们还可以创建一个具有默认输入值的函数：\n\
