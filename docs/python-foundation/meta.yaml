    # K-Means


    # K-Means Clustering


    We’ve said unsupervised machine learning algorithms are great for gleaning information
    from very complex datasets. These algorithms are a huge time-saver for data analysts
    who are trying to extract data from a complicated dataset.


    Clustering is maybe the core unsupervised machine learning method because it focuses
    on optimization and efficient implementation. This algorithm is ridiculously fast.
    The most popular clustering technique is “k-means.” k-means builds clusters by
    arbitrarily initiating them ask-many points. Each point in the data functions
    as a mean of cluster. The mean is determined based on the nearest mean in the
    cluster. Each cluster will have a center; that center becomes the new mean, making
    all other means change their position.


    After a number of iterations, the cluster’s center will move into a position that
    minimizes the performance metric.'
  - '[PAGE 406]


    The algorithm has a solution when that happens. It also means observations are
    no longer being assigned


    Clustering algorithms like these are only successful when they can interpret the
    ways the data is grouped. Let’s look at the performance measures we have in the
    code so we can better understand clustering:


    **1.Homogeneity score:** A cluster containing measurements of a single class.
    It has a basic score of zero to one. Values closer to zero tell that the sample
    has low homogeneity, while those at the other end of the spectrum tell the sample
    is from a single class.


    **2.Completeness score:** This score supports the homogeneity score by giving
    us information on the assignments of measurements along with the same class. Put
    together with a homogeneity score, we will be able to tell if we have a perfect
    clustering solution.


    **3.V-measure:** The harmonic mean of the homogeneity score and the completeness
    score. It has a scaled measure of zero to one, which assesses the homogeneity
    and completeness of the cluster.


    **4.Adjusted Rand Index score:** Measures similarity in the labeling on a zero
    to one scale. Applied to clustering, this measures the harmony of the assignment
    sets.'
- md: "**5. Silhouette score:** Measures the performance of the clustering without\
    \ using the clustering of labeled data. The score is on a scale of -1 to 1. It\
    \ tells us if the clusters are well-defined. Incorrect clustering will equal -1,\
    \ 1 is highly defined, and if the score gravitates towards 0, it tells us there\
    \ is some overlap between clusters.\n\nIn the k-means clustering example, all\
    \ these scores give us the clustering measurements. Let’s use the “bench_k_means”\
    \ function to analyze the results. The following code should do it:\n\n```\nbench_k_means(KMeans(init='k-means++',\n\
    \    n_clusters=n_digits, n_init=10),\n    name=\"k-means++\", data=data)\nprint(79\
    \ * '_')\n```\n\nHere’s how the results should look:\n\n*n_digits: 10, n_samples\
    \ 1797, n_features 64*\n\n| init | time | inertia | homo | compl |\n| :--- | :---\
    \ | :--- | :--- | :--- |\n| k-means++ | 0.25s | 69517 | 0.596 | 0.643 |\n| init\
    \ | v-meas | ARI | AMI | silhouette |\n| k-means++ | 0.619 | 0.465 | 0.592 | 0.123\
    \ |\n\nLet’s discuss these scores briefly. Firstly, I should mention the dataset\
    \ has a lot of noise; the low silhouette score tells us this. Secondly, we can\
    \ conclude through the homogeneity score that the cluster centers aren’t well\
    \ resolved. The v-measure and ARI are also not very impressive.\n\nWe can say\
    \ that these results need to be improved. We can get better results by applying\
    \ PCA on top of the k-means clustering. When we reduce the dataset’s dimensionality,\
    \ we should get better results. Let’s apply the PCA algorithm to see if it works:\n\
    \n```\npca = PCA(n_components=n_digits).fit(data)\n\nbench_k_means(KMeans(init=pca.components_,\n\
    \    n_clusters=10),\n    name=\"PCA-based\", data=data)\n```\n\nWe applied PCA\
    \ to the data set so we can have the same number of principal components as classes.\
    \ See if the results have improved below:\n\n*n_digits: 10, n_samples 1797, n_features\
    \ 64*\n\n| init | time | inertia | homo | compl |\n|---|---|---|---|---|\n| k-means++\
    \ | 0.2s | 71820 | 0.673 | 0.715 |\n| init | v-meas | ARI | silhouette | |\n|\
    \ k-means++ | 0.693 | 0.567 | 0.121 | |\n\nThese results aren’t that great either\
    \ because the silhouette score is still low. But as you can see, the other scores\
    \ have greatly improved, especially V-measure and ARI. This shows how applying\
    \ PCA can improve our analysis.\n\n## Fine-Tuning\n\nWhat we have done so far\
    \ is use k-means clustering to understand clustering analysis and performance\
    \ metrics. Our next step is fine-tuning our results configurations so we can get\
    \ better results. In the real world, you will do this a lot. Let’s see how it\
    \ is done by modifying the k-value.\n\nYou will be tempted to modify the k-value\
    \ randomly and see which one provides the best results. That won’t tell you which\
    \ value works best. The problem is that, when you increase the value, there’s\
    \ a possibility you will end up lowering the silhouette score without getting\
    \ any clusters. Suppose the k-value is set to 0; the zero will be the value of\
    \ observation within the sample. Each point will have a cluster, and the silhouette\
    \ score will be below. So, you won’t gain any useful results.\n\nTo solve this,\
    \ we can use the “elbow method.” The “elbow method” is a simple but effective\
    \ technique. The method selects optimal k-clusters. Usually, when the k-value\
    \ is increased, improvement in distortion is decreased. The elbow method allows\
    \ us to find the perfect area, known as the elbow point, where improvement in\
    \ distortion is the absolute lowest. This is the point where we stop dividing\
    \ data into multiple clusters. The elbow point is called so because it resembles\
    \ a bent arm, with the elbow being the most optimal point.\n\nBelow is an example\
    \ of how we can use it. In the example below, we use the elbow method after we\
    \ have applied PCA. The order is important because of PCA dimensionality reduction.\n\
    \n```\nimport numpy as np\nfrom sklearn.cluster import KMeans\nfrom sklearn.datasets\
    \ import load_digits\nfrom scipy.spatial.distance import cdist\nimport matplotlib.pyplot\
    \ as plt\nfrom sklearn.decomposition import PCA\nfrom sklearn.preprocessing import\
    \ scale\ndigits = load_digits()\ndata = scale(digits.data)\nn_samples, n_features\
    \ = data.shape\nn_digits = len(np.unique(digits.target))\nlabels = digits.target\n\
    K = range(1,20)\nexplainedvariance = []\nfor k in K:\n    reduced_data = PCA(n_components=2).fit_transform(data)\n\
    \    kmeans = KMeans(init='k-means++', n_clusters=k, n_init=k)\n    kmeans.fit(reduced_data)\n\
    \    explainedvariance.append(sum(np.min(cdist(reduced_data, kmeans.cluster_centers_,\
    \ 'euclidean'), axis=1))/data.shape[0])\nplt.plot(K, explainedvariance, 'bx-')\n\
    plt.show()\n```\n\nIt’s worth pointing out that elbow points aren’t easy to spot.\
    \ The dataset we are using will produce a less pronounced and more gradual progression,\
    \ which is caused by the overlap of classes.\n\nVisual plot verification is easy\
    \ to perform and interpret, but it has the disadvantage of being a manual validation\
    \ technique. What we need is something automated instead of manual. In that regard,\
    \ we are in luck because there’s a code-based technique called cross-validation,\
    \ known as v-fold, which can help us.\n\n## Cross-Validation Technique\n\nCross-validation\
    \ involves splitting the dataset into segments. We have put the test set aside\
    \ and focused on training the model on training data. Remember that, whenever\
    \ working with unknown datasets, you will always run into some problems, no matter\
    \ what type of solution you employ. That is why you need to understand the data\
    \ to some extent so your algorithms produce the right results.\n\n## Random Forest\
    \ Algorithm\n\nThis algorithm works based on ensemble learning. Ensemble learning\
    \ refers to the kind of learning in which different types of algorithms or one\
    \ algorithm is joined multiple times to get a more powerful prediction model.\
    \ The random forest algorithm is a combination of many algorithms of a similar\
    \ type, that is, multiple decision trees, resulting in a forest of trees, explaining\
    \ the source of the name “random forest.” The random forest algorithm can be applied\
    \ in both regression and classification problems.\n\n## How It Works\n\nThe random\
    \ forest algorithm follows the following basic steps in its work:\n\n- 1. Select\
    \ N random records from a data set.\n- 2. Build a decision tree from these N random\
    \ records.\n- 3. Select the number of trees that you need in the algorithm and\
    \ repeat the above two steps.\n- 4. If it is a regression problem, for a new record,\
    \ every tree in the forest will predict a value for Y (the output). We can calculate\
    \ the final value by taking the average of all predicted values by all trees in\
    \ the forest. Or, for the case of a classification problem, every tree in the\
    \ forest should predict the category under which the new record belongs. The new\
    \ record is finally assigned to the category that has won the majority vote.\n\
    \n## Random Forest and Regression Problems\n\nIn this chapter, we will be showing\
    \ you how to solve regression problems using random forests in Scikit-Learn. We\
    \ will be using the fuel consumption dataset we used previously. The gas consumption\
    \ will be predicted based on factors like fuel tax (in cents), per capita income\
    \ (in dollars), paved highways (miles), and the percentage of the population with\
    \ driver’s licenses.\n\nI already have the dataset saved in the same directory\
    \ as my Python script with the name fuel_consumption.csv. Run the following command\
    \ to import into a Pandas data frame:\n\n```\ndataset = pd.read_csv('fuel_consumption.csv')\n\
    ```\n\nSee what is contained in the dataset by running the head() function on\
    \ the data:\n\n```\nprint(dataset.head())\n```\n\nThis may give you an error.\
    \ Sort out the error as usual so that you end up with the following code:\n\n\
    ```\nimport pandas as pd\nimport numpy as np\nimport sys\nsys.__stdout__ = sys.stdout\n\
    dataset = pd.read_csv('fuel_consumption.csv')\nprint(dataset.head())\n```\n\n\
    The above data shows that the values are not scaled well.\n\n## Data Preparation\n\
    \nFirst, we will split it into attributes and labels then into training and test\
    \ sets. Here is the code for subdividing the data into attributes and labels:\n\
    \n```\nX = dataset.iloc[:, 0:4].values\ny = dataset.iloc[:, 4].values\n```\n\n\
    We now need to divide the data into training and test sets. 80% of the data will\
    \ be used for training while 20% will be used for testing the algorithm.\n\nLet\
    \ us first import the train_test_split method:\n\n```\nfrom sklearn.model_selection\
    \ import train_test_split\n```"
  mdcn: "**5. 轮廓系数：** 用于衡量聚类性能，无需使用带标签数据的聚类结果。该分数的范围是-1到1。它告诉我们聚类是否定义良好。错误的聚类将等于-1，1表示高度定义，如果分数趋近于0，则表明聚类之间存在一些重叠。\n\
    \n在k-means聚类示例中，所有这些分数都为我们提供了聚类度量。让我们使用“bench_k_means”函数来分析结果。以下代码应该可以实现：\n\n\
    ```\nbench_k_means(KMeans(init='k-means++',\n    n_clusters=n_digits, n_init=10),\n\
    \    name=\"k-means++\", data=data)\nprint(79 * '_')\n```\n\n结果应该如下所示：\n\n*n_digits:\
    \ 10, n_samples 1797, n_features 64*\n\n| init | time | inertia | homo | compl\
    \ |\n| :--- | :--- | :--- | :--- | :--- |\n| k-means++ | 0.25s | 69517 | 0.596\
    \ | 0.643 |\n| init | v-meas | ARI | AMI | silhouette |\n| k-means++ | 0.619 |\
    \ 0.465 | 0.592 | 0.123 |\n\n让我们简要讨论一下这些分数。首先，我应该提到数据集有很多噪声；低轮廓系数告诉我们这一点。其次，我们可以通过同质性分数得出结论，聚类中心没有得到很好的解析。V-measure和ARI也不是很理想。\n\
    \n可以说，这些结果需要改进。我们可以通过在k-means聚类之上应用PCA来获得更好的结果。当我们降低数据集的维度时，我们应该能得到更好的结果。让我们应用PCA算法看看是否有效：\n\
    \n```\npca = PCA(n_components=n_digits).fit(data)\n\nbench_k_means(KMeans(init=pca.components_,\n\
    \    n_clusters=10),\n    name=\"PCA-based\", data=data)\n```\n\n我们将PCA应用于数据集，以便拥有与类别数量相同的主成分。看看下面的结果是否有所改善：\n\
    \n*n_digits: 10, n_samples 1797, n_features 64*\n\n| init | time | inertia | homo\
    \ | compl |\n|---|---|---|---|---|\n| k-means++ | 0.2s | 71820 | 0.673 | 0.715\
    \ |\n| init | v-meas | ARI | silhouette | |\n| k-means++ | 0.693 | 0.567 | 0.121\
    \ | |\n\n这些结果也不是很好，因为轮廓系数仍然很低。但正如你所看到的，其他分数有了很大提高，尤其是V-measure和ARI。这表明应用PCA如何能够改进我们的分析。\n\
    \n## 微调\n\n到目前为止，我们所做的是使用k-means聚类来理解聚类分析和性能指标。我们的下一步是微调结果配置，以便获得更好的结果。在现实世界中，你会经常这样做。让我们看看如何通过修改k值来实现。\n\
    \n你可能会忍不住随机修改k值，看看哪个值能提供最佳结果。这并不能告诉你哪个值最有效。问题是，当你增加k值时，有可能最终会降低轮廓系数而得不到任何聚类。假设k值设置为0；零将成为样本中观测值的值。每个点都将有一个聚类，而轮廓系数将会很低。因此，你不会获得任何有用的结果。\n\
    \n为了解决这个问题，我们可以使用“肘部法则”。“肘部法则”是一种简单但有效的技术。该方法选择最优的k个聚类。通常，当k值增加时，失真的改善会减少。肘部法则让我们能够找到完美的区域，即肘部点，此时失真的改善是绝对最低的。这是我们停止将数据划分为多个聚类的点。肘部点之所以这样称呼，是因为它类似于弯曲的手臂，肘部是最优的点。\n\
    \n下面是一个我们如何使用它的例子。在下面的例子中，我们在应用PCA之后使用了肘部法则。顺序很重要，因为涉及PCA降维。\n\n```\nimport numpy\
    \ as np\nfrom sklearn.cluster import KMeans\nfrom sklearn.datasets import load_digits\n\
    from scipy.spatial.distance import cdist\nimport matplotlib.pyplot as plt\nfrom\
    \ sklearn.decomposition import PCA\nfrom sklearn.preprocessing import scale\n\
    digits = load_digits()\ndata = scale(digits.data)\nn_samples, n_features = data.shape\n\
    n_digits = len(np.unique(digits.target))\nlabels = digits.target\nK = range(1,20)\n\
    explainedvariance = []\nfor k in K:\n    reduced_data = PCA(n_components=2).fit_transform(data)\n\
    \    kmeans = KMeans(init='k-means++', n_clusters=k, n_init=k)\n    kmeans.fit(reduced_data)\n\
    \    explainedvariance.append(sum(np.min(cdist(reduced_data, kmeans.cluster_centers_,\
    \ 'euclidean'), axis=1))/data.shape[0])\nplt.plot(K, explainedvariance, 'bx-')\n\
    plt.show()\n```\n\n值得指出的是，肘部点并不容易发现。我们使用的数据集将产生一个不太明显且更渐进的进展，这是由类别重叠引起的。\n\n视觉图验证易于执行和解释，但其缺点是它是一种手动验证技术。我们需要的是自动化的而不是手动的。在这方面，我们很幸运，因为有一种基于代码的技术叫做交叉验证，也称为v折，可以帮助我们。\n\
    \n## 交叉验证技术\n\n交叉验证涉及将数据集分割成若干部分。我们已经将测试集放在一边，专注于在训练数据上训练模型。请记住，无论使用何种类型的解决方案，在处理未知数据集时，你总会遇到一些问题。这就是为什么你需要在一定程度上理解数据，以便你的算法产生正确的结果。\n\
    \n## 随机森林算法\n\n该算法基于集成学习工作。集成学习指的是不同类型算法或同一算法多次组合以获得更强大预测模型的学习方式。随机森林算法是许多类似算法的组合，即多个决策树，形成一个树的森林，解释了“随机森林”名称的由来。随机森林算法可以应用于回归和分类问题。\n\
    \n## 工作原理\n\n随机森林算法在工作中遵循以下基本步骤：\n\n- 1. 从数据集中选择N条随机记录。\n- 2. 从这N条随机记录中构建一棵决策树。\n\
    - 3. 选择算法中需要的树的数量，并重复上述两个步骤。\n- 4. 如果是回归问题，对于一条新记录，森林中的每棵树都会预测一个Y值（输出）。我们可以通过计算森林中所有树预测值的平均值来得到最终值。或者，对于分类问题，森林中的每棵树都应该预测新记录所属的类别。新记录最终被分配给获得多数票的类别。\n\
    \n## 随机森林与回归问题\n\n在本章中，我们将向你展示如何在Scikit-Learn中使用随机森林解决回归问题。我们将使用之前使用过的燃料消耗数据集。将根据燃料税（以美分计）、人均收入（以美元计）、铺面公路（以英里计）以及拥有驾照的人口百分比等因素来预测汽油消耗。\n\
    \n我已经将数据集保存在与我的Python脚本相同的目录中，文件名为fuel_consumption.csv。运行以下命令将其导入Pandas数据框：\n\n\
    ```\ndataset = pd.read_csv('fuel_consumption.csv')\n```\n\n通过在数据上运行head()函数来查看数据集中包含的内容：\n\
    \n```\nprint(dataset.head())\n```\n\n这可能会给你一个错误。像往常一样解决错误，最终得到以下代码：\n\n```\nimport\
    \ pandas as pd\nimport numpy as np\nimport sys\nsys.__stdout__ = sys.stdout\n\
    dataset = pd.read_csv('fuel_consumption.csv')\nprint(dataset.head())\n```\n\n\
    以上数据显示这些值没有很好地缩放。\n\n## 数据准备\n\n首先，我们将它分成属性和标签，然后分成训练集和测试集。以下是将数据细分为属性和标签的代码：\n\
    \n```\nX = dataset.iloc[:, 0:4].values\ny = dataset.iloc[:, 4].values\n```\n\n\
    我们现在需要将数据分成训练集和测试集。80%的数据将用于训练，而20%将用于测试算法。\n\n让我们首先导入train_test_split方法：\n\n\
    ```\nfrom sklearn.model_selection import train_test_split\n```"
