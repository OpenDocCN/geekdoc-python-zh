- img_proc: true
  md: 'algorithms are, what their applicability is and not, and finally some examples.


    Dimensionality reduction is a process by which we can reduce the number of dimensions
    in our data set while still preserving as much information as possible. Quite
    often there is more than one way to do this. So it is important to know what type
    of problem you are trying to solve with your data before choosing a dimensionality
    reduction algorithm...


    As always, we start with the basics. A dimension is a conceptual number of features
    that describe some observation. In other words, it is the number of parameters
    we need to estimate in order to determine something about our observation. So
    for example, if we are trying to fit a linear regression on an observation then
    one parameter (which in this case would be our independent variable) would be
    enough to describe this regression, but if we were fitting a quadratic regression
    then two parameters (2nd and 3rd-degree polynomials) would be required and so
    on.


    So the idea here is that by reducing the dimensions of our data set we can potentially
    lose some information about it.


    Not all methods are created equal though. For example, without prior knowledge
    of the task at hand, we can not determine which method to use for dimensionality
    reduction. The choices depend on a number of factors e.g., our context and available
    resources. This is why oftentimes it is referred to as an art rather than a science...'
  merge: -1
  pgno: 421
- img_proc: true
  md: 'Once we have chosen a method, what criterion should be used in order to select
    which data to represent? The answer again is that this choice depends on the context,
    resources available, and the usefulness of the results. For example, if you have
    data for only one observation (e.g., one sample from a larger dataset) then it
    might make sense to only use this observation when we are using the available
    resources and then use the other observations in order to make our result more
    robust (i.e., give a better estimate for our dependent variable).


    To summarize, the choices of model, dimensionality reduction method, and criterion
    for selecting data are all important factors that can lead to different outcomes
    but at the end of the day, it is just a matter of choosing what is right for you.


    In this case, we will use SVMs (support vector machines) as our model and kd-trees
    as our dimensionality reduction method. So the question we need to answer is which
    one should be used. As mentioned above, this depends on many factors such as available
    resources in your application, its resource requirements, etc. but ultimately
    it is a matter of what will provide the most robust results.


    The other factor that has to be considered is which dataset to represent. As the
    best results would be obtained by using a data space representation that contains
    all of your original data and that has been carefully designed for this purpose
    (e.g., some non-linear transformation), then it'
