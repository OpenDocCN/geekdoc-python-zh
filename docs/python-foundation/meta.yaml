    \ the print statement and went on to print the next item on the list.\n\n## Pass\
    \ Statement\n\nPass is a null operation in Python. The interpreter reads the pass\
    \ statement but does nothing. It is commonly used as a placeholder whenever a\
    \ statement is required by syntax. Programmers will generally use a pass statement\
    \ in place of codes that are yet to be written. This will allow them to test complete\
    \ segments while avoiding error messages for incomplete segments.\n\nSyntax:\n\
    \n```\npass\n```\n\n## Python Dictionary\n\nA dictionary, or just dict, though\
    \ containing sequential data as well, is an associative array mapping type with\
    \ mapped keys as values. The data it contains may be in sequence, but they are\
    \ not sorted.\n\nThe elements of a dictionary are mutable and can be of any other\
    \ data type. Each is made up of a key:value pair-matched by a colon (:) and just\
    \ as with lists and tuples, separated by commas. The syntax of a dictionary is\
    \ an identified object made up of one or more elements enclosed in curly braces\
    \ {}.\n\n**The syntax takes this format:**\n\n```\nmyDict = {key1:value1, key2:value2,\
    \ key3:value3}\n```\n\nSimilar to lists, dictionaries are mutable and can contain\
    \ mixed content, including tuples (assuming the values are all of the same type),\
    \ lists, strings, integers, etc.\n\nThe point of the key:value pair model is that\
    \ every key stored within the dictionary is unique. In effect, the dictionary\
    \ is designed to store the values of a list of unique items or properties.\n\n\
    **Given that the following things are true:**\n\n1. When adding to or creating\
    \ a dictionary, all entries must be in a key:value pair format. If either the\
    \ key or the value is missing, an exception will be given.\n2. If a key:value\
    \ pair is added to a dictionary, and the key already exists in the dictionary,\
    \ the old key and value will be discarded for the new entry.\n3. Values can be\
    \ updated only when a key is provided.\n4. key:value pairs are always deleted\
    \ together – there is no way to delete just the value or just the key.\n5. Lists\
    \ cannot be used as keys.\n\nHere are some common operations on dictionaries.\n\
    \nCreate an empty dictionary:\n\n```\n>>> x={}\n```\n\nCreate a dictionary:\n\n\
    ```\n>>> x=dict(name='john', age=35, height=6)\n>>> print(x)\n{'name': 'john',\
    \ 'age': 35, 'height': 6}\n```\n\nTest if a key exists:\n\n```\n>>> if 'age' in\
    \ x.keys():\n    print('found it!')\nfound it!\n```\n\nGet a value for a key:\n\
    \n```\n>>> y=x['height']\n>>> print('Height = ' + str(y))\nHeight = 6\n```\n\n\
    List all keys:\n\n```\n>>> for y in x.keys():\n    print(y)\nname\nage\nheight\n\
    ```\n\nPrint keys and values:\n\n```\n>>> for y in x.keys():\n    v=x[y]\n   \
    \ if type(v)!='str':\n        v=str(v)\n    print(y + '=' + v)\nname=john\nage=35\n\
    height=6\n```\n\nUpdate a value for a key:\n\n```\n>>> x['age']=40\n>>> print(x)\n\
    {'name': 'john', 'age': 40, 'height': 6}\n```\n\nDelete a key:value pair:\n\n\
    ```\n>>> del(x['height'])\n>>> print(x)\n{'name': 'john', 'age': 40}\n```\n\n\
    Add a Key:Value pair:\n\n```\n>>> x['height']=6\n>>> print(x)\n{'name': 'john',\
    \ 'age': 40, 'height': 6}\n```\n\nDumping all keys or values into a list:\n\n\
    ```\n>>> list(x.keys()) # keys as a list\n['name', 'age', 'height']\n>>> list(x.values())\
    \ # values as a list\n['john', 40, 6]\n```\n\n## Creating a dictionary\n\nThe\
    \ most popular way to create a dictionary object in Python is to name an empty\
    \ dictionary object in the same way we have created other object types throughout\
    \ this book. Once the dictionary is created, you can add key:value pairs as necessary.\n\
    \n### Creating a dictionary then adding key:value pairs\n\n```\nmyDict = {}\n\n\
    myDict[\"Name\"] = \"Jane\"\nmyDict[\"Age\"] = 21\nmyDict[\"City\"] = \"London\"\
    \nmyDict[\"Hobbies\"] = \"Cycling\", \"Coding\", \"Cooking\", \"Gaming\"\nprint(myDict)\n\
    ```\n\nIn this exercise, we created an empty dictionary called myDict in the first\
    \ line of the script. From the third to the sixth line, we added key:value pairs\
    \ to the empty dictionary then, at the end, printed out the contents of the dictionary\
    \ myDict.\n\nAnother way to create a dictionary is to assign key:value pairs to\
    \ a named dictionary object as in exercise 27.\n\n### Creating a dictionary by\
    \ assigning key:value pairs\n\n```\nmyDict = {\"Name\": \"Jane\", \"Age\": 21,\
    \ \"Gender\": \"F\", \"City\": \"London\"}\n\nprint(myDict)\n```\n\nYou will notice\
    \ that it does not matter what order the key:value pairs are entered into the\
    \ dictionary because keys and not indices access them, they are always printed\
    \ in a different order.\n\nOne rule you must observe when creating a dictionary\
    \ is that the keys must be unique, but the values do not need to be. The keys\
    \ are immutable, while the values are maybe of mutable data types such as strings,\
    \ numbers, or lists.\n\n## Accessing dictionary key:value pairs\n\nDictionary\
    \ data is not sorted; hence they can be accessed independently without indexing\
    \ as we did with strings, lists, and tuples. The dictionary is a compound object\
    \ type that cannot be sliced or indexed.\n\nPython uses complex algorithms that\
    \ map the keys of a dictionary. This makes accessing, retrieving, and updating\
    \ dictionary key:value pairs much faster than other sequential object types by\
    \ this process known as hashing.\n\nThe keys are used to access the dictionary\
    \ key:value pairs. The next exercise demonstrates how we can access the values\
    \ of dictionary *weather*.\n\n### Accessing dictionary key:value pairs:\n\n```\n\
    weather = {\"Mon\": \"Cloudy\", \"Tue\": \"Sunny\", \"Wed\": \"Rainy\"}\n\nprint(weather[\"\
    Wed\"])\n```\n\nIf you attempt to access a key:value pair of a missing key you\
    \ will encounter an error *KeyError: [Key]*\n\n## Updating a dictionary\n\nYou\
    \ can add new key:value pairs to a dictionary and modify or delete the values\
    \ of existing entries, as demonstrated in the next exercise.\n\n```\n# Updating\
    \ a dictionary:\nweather = {\"Mon\": \"Cloudy\", \"Tue\": \"Sunny\", \"Wed\":\
