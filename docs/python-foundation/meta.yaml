  md: '# Machine Learning Rules and Models


    **Clustering**

    Clustering problems occur when we must discover the inherent groupings in data.
    In the association rule learning problem, we are required to discover rules that
    describe large proportions of data. Clustering is one of the major types of unsupervised
    machine learning algorithms as it runs through the given data and finds any natural
    clusters if they exist. For example, there could be different groups of users
    that are differentiated across a few criteria. For example, the criteria can be
    age, gender, or height.

    Major types of clustering are defined as follows:


    +   - **Probabilistic clustering:** This involves clustering data points into
    clusters on a specific probabilistic scale.

    - **K-means clustering:** K-means clustering involves the clustering of data points
    into a number (k) of mutually'
  merge: -1
  pgno: 373
- img_proc: true
  md: 'exclusive clusters whereas the method is more focused on selecting the right
    number for K.


    +   - **Hierarchical clustering:** Hierarchical clustering classifies data points
    into parent and child clusters.

    - **Gaussian mixture models:** These are the models featuring a mixture of multivariate
    normal density components.

    - **Hidden Markov models:** Used to observe data and recover the sequence of states
    in the model.

    - **Self-organizing maps:** Self-organizing maps use neural networks that learn
    the distribution and topology of the data.


    # Generative Models


    Generative models are a major part of unsupervised learning models. They create
    new samples from the same distribution of the given training data. Generally,
    these models are designed to learn and discover the essence of the given data
    for generating similar data. The image data set is an example of generative models
    and has the capability to create a set of images like the given set.'
  merge: -1
  pgno: 374
- img_proc: true
  md: 'Generative models are purely based on the characteristics of unsupervised machine
    learning models.


    # Association


    Association is a rule-based machine learning method that is used to discover relations
    between databases. In large sets of data items, we can find interesting associations
    such as dependencies and relationships through association rules. In data sets,
    items are generally stored in the form of transactions that can be generated or
    extracted through external processes and relational databases. Unsupervised machine
    learning delivers full scalability to association rules algorithms which in return
    help in accumulating the ever-growing size of data. Furthermore, the evaluation
    and discovery of interesting associations make it easier for companies and industries
    to handle big data.


    Popular machine learning algorithms that are associated with association rules
    are SETM, AIS, and A Priori. With the help of the AIS algorithm, the model can
    generate and count item sets as it scans data. This also helps the algorithm in
    determining which large item sets contained a transaction and how new candidate
    items are created by entering large item sets along with other items in the transaction
    data. Moreover, the SETM algorithm is yet another way to generate candidate itemsets
    while the model scans a database.'
  merge: -1
  pgno: 375
