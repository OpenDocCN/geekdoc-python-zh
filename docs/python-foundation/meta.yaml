  - '[PAGE 351]


    which we want to identify the hidden relationship. The support is expressed as
    the frequency (percentage) of events where A and B occur together. It can be calculated
    as the fraction of events when A and B occur together. Confidence is computed
    as the fraction of events including feature B to the number of events containing
    feature A. The lift is computed as the fraction of the confidence and support.
    If the lift is greater than 1, the features A and B are positively correlated.
    If the lift is less than 1, the features A and B are negatively correlated. If
    the lift is equal to 1, then the features, A and B are not correlated.


    Overall, association rule algorithms are based on the frequency of occurrences
    across a dataset. The purpose is to detect association that occurs more frequently
    within the dataset than in a given random sampling. This approach is widely used
    in bioinformatics and basket data analysis. The latter provides retailers with
    valuable information about items that clients tend to buy together.


    Anomaly detection is also called outlier detection. Outliers are simply the points
    or members of a dataset that shows a different behavior or have a different pattern
    than the majority of the dataset members. These outliers can be identified by
    visualizing by plotting the data. Sometimes the outliers are just an error in
    the dataset. For example, an error in measurements or a human error in typing
    information in the system. These outliers can be removed from the dataset to be
    analyzed. In some cases, these'
  - '[PAGE 352]


    outliers may contain valuable information rather than just a simple error, for
    example, fraudulent transactions or email spam, or detecting malignant tumors.
    In this case, we want to understand the outlier behaviors to prevent them in the
    future and to build a more robust model.


    Anomaly detection can be either point, contextual, or collective. The first anomaly,
    point anomaly, is simply a point of a dataset that has a large distance from the
    other the rest of the dataset. The second type is the contextual anomaly, which
    is given in a specific context mainly used in time-series datasets. For instance,
    a temperature above 30°C during the winter season in a Nordic country. The third
    type of anomaly, the collective anomaly, is an ensemble of dataset points that
    collectively shows a different pattern. In other words, an ensemble of different
    patterns occurring together is the anomaly. Each member of this ensemble occurred
    by itself; it is not necessarily an anomaly. This type of anomaly is also very
    used in time-series datasets.


    There are several ways for anomaly detection. A simple statistical-based approach
    is to identify the points that diverge from the distribution of the dataset. In
    machine learning, the k-nearest neighbor is a simple procedure employed for anomaly
    detection. This algorithm is based on the density of the data. The nearest points
    are determined by a distance such as the Euclidean distance or Mahalanobis distance.
    Another procedure employed is the k-means algorithm which relies on clusters.
    Data that do not belong'
  - '[PAGE 353]


    to the clusters containing similar groups are considered anomalies.


    # What Is Semi-Supervised Learning?


    This third paradigm of learning is a hybrid approach that uses both supervised
    and unsupervised learning technics. Semi-supervised learning makes use of unlabeled
    datasets aside from labeled datasets. Often, labeled datasets are not available,
    or only a few are available, which makes unsupervised learning very useful.


    Semi-supervised learning is based on the concept of training models with a labeled
    dataset first. Then apply models on the unlabeled dataset in order to build other
    models that learn from the produced datasets. Pseudo-learning is a simple approach
    to performing semi-supervised learning. It starts by training a model on a training
    dataset, which is the labeled dataset. Next, it uses this model to predict the
    outputs of the unlabeled dataset. Then, it merges the labeled training dataset
    with the unlabeled dataset. It also merges the labels of the training dataset
    with the model output. New formed data is employed to fit the model. This way,
    the model performance is enhanced, and the learning process of the data structure
    is improved.


    # What Is Reinforcement Learning?'
  - '[PAGE 354]


    ![](img/9b742240054fb02472f2e7c1266edbc1_354_0.png)


    Reinforcement learning is based on the trial and error process, where the model
    learns interactively. Like supervised learning, reinforcement learning uses a
    mapping function between the input and output. It uses feedback from the output
    to correct the mapping using a reward concept. Unlike unsupervised learning where
    the objective is to find similarities in the datasets, reinforcement learning
    has the goal of defining a function that would maximize a reward. This type of
    learning is used in developing game strategies, for example, to define the best
    actions to win the game. Reinforcement learning is very handy in solving a complex
    problem that contains several actions that are correlated to achieving a goal.
    Before we present some used'
  - '[PAGE 355]


    algorithms in reinforcement learning, let’s first define the terminology used
    to define a reinforcement learning problem.


    The reinforcement learning relies on the principles of environments, agents, states,
    actions and rewards, the policy as well as values. We are going to explain each
    of these reinforcement learning components.


    Let’s start first by defining the agent, which is the core component of reinforcement
    learning. An Agent is a component that makes actions. Basically, it is an algorithm
    that performs actions or models a certain concept. It can be an algorithm that
    simulates a game.


    An action is an ensemble of several possible moves or activities that the agent
    can make or perform. The action is pre-defined, and the agent chooses among all
    these possibilities. Using the game example, action can be a list of directions
    such as moving right, left, up, or down. It can also include the speed, fast or
    slow.


    The state is the current situation in which the agent is. It can be a specific
    location or moment that places the agent in a specific relation with other elements
    within its environment.


    The reward is the feedback that determines whether the action taken by the agent
    is a successful action or a failure action. In short, the reward is a measure
    that evaluates the success or failure of the agent’s operations.'
  - '[PAGE 356]


    The environment is the world where the agents make the actions and operations.
    The agent state and action are fed to the environment that processes them. Then,
    it evaluates the reward. It returns the evaluated reward as well as the next state
    of the agent.


    The policy is a scheme that the agent follows to define the next action according
    to the current state. The policy relates states to action in order to map the
    high rewarding actions.


    Finally, the value represents the reward that an agent would have obtained if
    it performed an action in a specific state.


    Now the question is how does reinforcement learning use these concepts? Basically,
    the agent performs an action in a current state. This action is evaluated by the
    environment that returns a reward and a state of the agent. According to this
    information, another action is taken by the agent. The process is repeated in
    order to maximize the reward. The goal of reinforcement learning is to define
    the best sequence of actions that the agent should take in order to achieve its
    goal and maximize the reward or what is conventionally known as an optimization
    of the objective function.


    Two types of reinforcement learning exist, namely positive and negative reinforcement.
    Positive reinforcement consists of increasing the frequency of action when a state
    or a reward happens when this action is taken. In contrast,'
  - '[PAGE 357]


    negative reinforcement consists of increasing the frequency of an action when
    a reward is not received or avoided.

    The most commonly used algorithms are State-Action-Reward-State-Action and Q-learning
    algorithm. These algorithms are usually combined with a neural network to enhance
    their performance. They use neural networks as agents.


    # How to Create a Model with Machine Learning?


    As discussed earlier in this section, different types of machine learning exist.
    In order to choose a specific approach, supervised, unsupervised, or reinforcement
    learning, the problem being solved and the type of data available guide to adopting
    a certain approach. Supervised learning comes in handy when you already have data
    with known output, and you try to forecast the outcome of new data. For instance,
    you already have a product in the market, you know the patterns and profiles of
    your clients, and you try to predict if new clients would be interested in that
    product. In contrast, an unsupervised learning paradigm is useful when you ignore
    the desired output from your data, for example, when marketing a new product.
    If a combination of labeled and unlabeled data is available, then it is best to
    combine both supervised and unsupervised paradigms through the semi-supervised
    approach. Reinforcement learning is best applicable in developing computer games,
    robotics, automatic learning of treatment'
- md: '## Reinforcement Learning


    Reinforcement learning is another branch of Machine Learning, and in this type
    of learning, the machine works towards maximizing the reward it receives by performing
    the right action in any situation. Many engineers use this type of learning where
    they allow a machine to identify the right behavior or action that it should take
    in any situation.


    Reinforcement learning and supervised Machine Learning are very different. The
    latter gives the machine a training data set, which also provides the required
    output to the machine. The former does not give the machine any answers. The machine
    should decide what it must do to obtain the results. The machine will only learn
    from its own experiences since there is no training data provided.


    In the example below, there is a reward and there is an agent. There are many
    obstacles placed between the machine or agent, and the reward. The machine or
    agent should identify the right path that it should take to reach the reward in
    the shortest time possible. The image below will provide some information about
    this problem:


    ![](img/9b742240054fb02472f2e7c1266edbc1_362_0.png)


    In the image above, there is a robot, which is the machine or agent, the fire
    that represents the obstacles, and the diamond, which represents the reward. The
    robot should look for the different ways it can reach the diamond while avoiding
    fire. The aim should be to reach the diamond in the shortest time possible. The
    robot is rewarded for every correct step taken, and for every incorrect step,
    it takes the reward is reduced. The total reward is calculated when the robot
    finally reaches the diamond.


    ## Reinforcement Learning Process


    - **Input:** The start from where the model begins to run is called the input.

    - **Output:** Since there are many solutions to a problem, the model can choose
    or predict different outputs.

    - **Training:** The model is trained based on the input data that is being taken
    to solve the problem. The engineer or the user can choose to reward or punish
    the model depending on the output that is returned to the user.

    - **Learning:** The model will learn from every reward.

    - **Solution:** Based on the reward that the model receives, it will decide the
    best solution that it should follow to solve the problem.


    ## Types of Reinforcement


    There are two types of reinforcement learning.


    ### Positive


    The model will always try to maximize the strength and frequency of a behavior
    that leads to a specific event. This means that this type of learning will always
    give the model a positive experience. The advantages of positive reinforcement
    learning are:


    - The model will learn to adapt to any changes or updates made to the data set.

    - Improves the performance and accuracy of the model.


    The disadvantages of this type of learning are:


    - If the model is rewarded too many times, it will result in an overload in all
    the states.


    ### Negative


    Negative reinforcement learning helps the model strengthen the behavior that helps
    to prevent a negative outcome. The advantages of this type of learning are:


    - Improves the performance of the model by allowing it to defy a method.

    - It will increase the frequency of the behavior.


    The disadvantages of this type of learning are:'
  mdcn: '## 强化学习


    强化学习是机器学习的另一个分支，在这种学习类型中，机器通过在任何情况下执行正确的操作，努力最大化其获得的奖励。许多工程师使用这种学习方式，他们让机器识别在任何情况下应采取的正确行为或操作。


    强化学习与监督式机器学习有很大不同。后者为机器提供一个训练数据集，该数据集也向机器提供所需的输出。前者则不给机器任何答案。机器必须自己决定该做什么才能获得结果。由于没有提供训练数据，机器只能从自身的经验中学习。


    在下面的例子中，有一个奖励和一个代理。在机器或代理与奖励之间放置了许多障碍物。机器或代理应识别出应走的正确路径，以便在尽可能短的时间内到达奖励。下图将提供一些关于此问题的信息：


    ![](img/9b742240054fb02472f2e7c1266edbc1_362_0.png)


    在上图中，有一个机器人，即机器或代理，代表障碍物的火焰，以及代表奖励的钻石。机器人应寻找不同的路径以到达钻石，同时避开火焰。目标应是在尽可能短的时间内到达钻石。机器人每走对一步都会获得奖励，每走错一步，奖励就会减少。当机器人最终到达钻石时，会计算总奖励。


    ## 强化学习过程


    - **输入：** 模型开始运行的起点称为输入。

    - **输出：** 由于一个问题可能有多种解决方案，模型可以选择或预测不同的输出。

    - **训练：** 模型基于用于解决问题的输入数据进行训练。工程师或用户可以根据返回给用户的输出，选择奖励或惩罚模型。

    - **学习：** 模型将从每一次奖励中学习。

    - **解决方案：** 根据模型获得的奖励，它将决定应遵循的最佳解决方案来解决问题。


    ## 强化的类型


    强化学习有两种类型。


    ### 正强化


    模型将始终尝试最大化导致特定事件的行为的强度和频率。这意味着这种学习类型将始终给模型带来积极的体验。正强化学习的优点是：


    - 模型将学会适应对数据集所做的任何更改或更新。

    - 提高模型的性能和准确性。


    这种学习类型的缺点是：


    - 如果模型被奖励太多次，将导致所有状态过载。


    ### 负强化


    负强化学习帮助模型加强有助于防止负面结果的行为。这种学习类型的优点是：


    - 通过允许模型挑战一种方法来提高其性能。

    - 它将增加该行为的频率。


    这种学习类型的缺点是：'
