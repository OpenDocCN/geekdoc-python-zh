    ```\n\n当你在 Exercise64 中运行脚本时得到的错误表明属性 getNumbers() 已被删除。但请注意，由于在创建对象的新实例时会在内存中创建一个新实例，因此即使对象被删除，它也可能继续存在于内存中，直到垃圾收集器自动销毁未引用的对象。\n\
    \n## 流程控制\n\n**流程控制**\n循环是一种程序控制结构，它有助于复杂的执行路径和对语句或一系列语句的重复处理。\n\n### For 循环\n\
    for 循环用于遍历序列数据类型的项目，如字符串、列表或元组。\n\n**语法：**\nfor val in sequence:\n    statement(s)\
