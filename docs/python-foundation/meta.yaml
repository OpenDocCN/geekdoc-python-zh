- md: '## 1. Machine learning is used in eCommerce.


    Machine learning algorithms are also used to detect fraud and prevent users from
    abusing an e-commerce site’s payment system. For example, an e-commerce site can
    use machine learning algorithms to learn users’ behavior and block any fraudulent
    activities before they happen. The same analysis can be used to predict which
    products are likely to sell well by gathering information about customers’ previous
    purchases.


    ## 2. Machine learning is used in the financial sector.


    Nowadays, most investment firms have some type of machine learning tool at their
    disposal. It is used for things like determining when to fund a stock to minimize
    risk, by looking at historically similar stocks. One of the most popular models
    is known as VaR (Value at Risk), which uses past stock performance data and extrapolates
    it into the future, making predictions about what the consequences are if a set
    number of shares is lost or stolen.


    ## 3. Advanced machine learning algorithms help predict crime locations.


    Machine learning has also been used to predict where crimes will happen in real-time.
    Police departments are able to allocate their resources based on this data, as
    well as review historical data to effectively prevent crime. This type of software
    is known as PredPol and was developed by Jeff Brantingham and George Mohler at
    the UCLA School of Public Affairs.


    The algorithm uses a set of historical crime data, including location, time, activity,
    and demographic features like age and gender. After over two years of analysis,
    it was able to predict with 82% accuracy which blocks would be most likely to
    have a crime committed in them within the next week.


    ## 4. Machine learning is used to predict flu season.


    Doctors at the US Centers for Disease Control and Prevention, in partnership with
    IBM, built a machine learning algorithm called Digital Connectedness Analysis
    to predict the flu season. The algorithm was able to spot an early spring outbreak
    of influenza A in 2008 and predicted that June would be a high-risk month for
    influenza.


    This led to better preparedness, testing, and prevention efforts that ultimately
    lowered the number of people who caught the flu by 19% from 2009 through 2010.
    The accuracy of the model remained over 96 percent throughout all three seasons.


    ## 5. Machine learning is used to identify words in a text.


    There are many different words that begin with the letter “p” and it can be difficult
    for a human to distinguish between them without first knowing what word they’re
    looking for. Machine learning takes a different approach. A machine learning algorithm
    can identify which word is being searched by using past data and making educated
    guesses based on patterns it has discovered.


    For example, the search phrase: “I was walking along the road when I saw Peter.”
    would return a result for “Peter,” not for “Petra.”


    ## 6. Machine learning gives you designs for your home.


    Before we had machine learning, designing a home through a website or architectural
    software involved lots of manual labor. You would have to find photos of houses
    you liked, enter dimensions and specifications, pick colors and fabrics, and then
    actually build a house yourself.


    Nowadays, you can use X-ray vision to design your dream home based on images that
    are captured by a computer. A machine learning algorithm like this scans the home
    for different features that are important to its inhabitants such as windows or
    walls that will let in the most sunlight or offer privacy from passersby outside
    the home.


    The program also looks at photos and learns what layout works well for people
    based on their possessions, furniture, and other features which can be hard to
    determine without actually walking around inside it.


    ## 7. Machine learning is used to personalize suggestions for you.


    Google is one of the biggest users of machine learning algorithms. They use machine
    learning algorithms to identify what you look for on the internet and make suggestions
    based on your search history, as well as target ads using the same criteria.


    Here’s an example of one of Google’s more popular suggestions that can be found
    in the top right corner of the search results. The image shows a video of a woman
    who describes her happiness after giving birth to her second child. The algorithm
    is clearly a fan of babies, or perhaps mothers and their fat purses.


    ## 8. Machine learning can help you quit smoking.


    Smokers often use the same phrases and words to describe their habits. An algorithm
    can take the words you use in online forums and emails and use them to provide
    you with incentives to quit including other people who are also trying to stop
    smoking like yourself. This way, you’re not alone.


    This is an example of how machine learning can help with behavior change and addiction
    recovery. The app is called QuitFeelingBad and was developed by scientists at
    the University of Sussex. In this study, participants who used the app were able
    to cut their cigarette use in half compared to those who only smoked fewer cigarettes.


    ## 9. Machine learning helps identify image medical data.


    Medical image analysis uses machine learning algorithms to identify diseases and
    cancers in medical images like MRI scans and PET scans. It’s one of the many techniques
    employed by doctors for diagnostic purposes to make medical decisions based on
    a set of data that can be unachievable with science alone.


    ## 10. Machine learning helps identify vulnerable traffic signs.


    Machine learning has also been used to identify vulnerable traffic signs and warn
    law enforcement agencies about them, as well as help them improve their systems
    for early detection. It can also alert drivers to road conditions that could be
    dangerous. For example, you might get an alert when driving that there’s a sharp
    curve ahead and you should slow down or even use your breaks.


    ## 11. Machine learning is used to analyze eye movements.


    Eye-tracking technology is often used in the study of neurological disorders like
    Attention Deficit Hyperactivity Disorder (ADHD) in children or disorders like
    Autism Spectrum Disorder (ASD). In a study at the University of Cincinnati, researchers
    used eye-tracking to examine how people process information and learn how to understand
    the text.


    In this study, participants were shown messages like: “Click here” or “Click there”
    and their eye movements were monitored to see what parts of the screen they looked
    at the most. The researchers found that participants looked at words more often
    when they appeared near other words that they hadn’t seen before. In addition,
    the scientists found that these participants did better than those who just read
    the same message over and over again without looking at it and spaced out in between.


    ## 12. Machine learning is used for predictive maintenance.


    Sophisticated machine learning algorithms have been developed for predictive maintenance.
    Using these algorithms, maintenance technicians can identify parts on vehicles
    that are nearing their end of life and be alerted to potential failures in advance.
    This data can help techs avoid workplace injuries through preventative maintenance.


    ## 13. Machine learning helps pick out the difference between animals and objects.


    There is a lot of variation between different animals, just as there are differences
    between objects, but what if you could tell the difference between a cat and a
    chair? A machine learning algorithm called Fads was built to identify animals
    by using overlapping genetic material to compare it.'
  mdcn: '## 1. 机器学习在电子商务中的应用。


    机器学习算法也被用于检测欺诈行为，防止用户滥用电子商务网站的支付系统。例如，电子商务网站可以利用机器学习算法学习用户行为，并在欺诈活动发生前将其阻止。同样的分析也可以通过收集客户过往的购买信息，来预测哪些产品可能畅销。


    ## 2. 机器学习在金融领域的应用。


    如今，大多数投资公司都拥有某种类型的机器学习工具。它被用于诸如通过观察历史上相似的股票，来确定何时投资股票以最小化风险等任务。最受欢迎的模型之一是VaR（风险价值），它利用过去的股票表现数据并将其外推至未来，预测如果一定数量的股票丢失或被盗会造成什么后果。


    ## 3. 高级机器学习算法帮助预测犯罪地点。


    机器学习也被用于实时预测犯罪发生地点。警察部门能够根据这些数据分配资源，并审查历史数据以有效预防犯罪。这类软件被称为PredPol，由加州大学洛杉矶分校公共事务学院的杰夫·布兰廷汉姆和乔治·莫勒开发。


    该算法使用一组历史犯罪数据，包括地点、时间、活动以及年龄和性别等人口统计特征。经过两年多的分析，它能够以82%的准确率预测哪些街区在接下来的一周内最有可能发生犯罪。


    ## 4. 机器学习用于预测流感季节。


    美国疾病控制与预防中心的医生与IBM合作，构建了一个名为“数字连接性分析”的机器学习算法来预测流感季节。该算法能够发现2008年早春爆发的甲型流感，并预测六月将是流感的高风险月份。


    这带来了更好的准备、检测和预防工作，最终使2009年至2010年间感染流感的人数减少了19%。该模型的准确率在所有三个季节中都保持在96%以上。


    ## 5. 机器学习用于识别文本中的单词。


    有许多以字母“p”开头的单词，人类在不知道要找哪个词的情况下很难区分它们。机器学习采取了不同的方法。机器学习算法可以利用过去的数据，并根据其发现的模式进行有根据的猜测，从而识别正在搜索的单词。


    例如，搜索短语：“I was walking along the road when I saw Peter.”（我沿着马路走时看到了彼得。）会返回“Peter”（彼得）的结果，而不是“Petra”（佩特拉）。


    ## 6. 机器学习为你提供家居设计。


    在我们拥有机器学习之前，通过网站或建筑设计软件设计房屋需要大量的人工劳动。你必须找到你喜欢的房子照片，输入尺寸和规格，选择颜色和面料，然后自己实际建造一栋房子。


    如今，你可以使用X光视觉，根据计算机捕捉的图像来设计你的梦想家园。像这样的机器学习算法会扫描房屋，寻找对其居住者重要的不同特征，例如能让最多阳光进入或提供隐私以避免外部路人窥视的窗户或墙壁。


    该程序还会查看照片，并根据人们的物品、家具和其他特征来学习什么样的布局适合他们，而这些特征在没有实际在内部走动的情况下很难确定。


    ## 7. 机器学习为你提供个性化建议。


    谷歌是机器学习算法的最大用户之一。他们使用机器学习算法来识别你在互联网上寻找的内容，并根据你的搜索历史提供建议，同时使用相同的标准来定向投放广告。


    以下是谷歌更受欢迎的建议之一，可以在搜索结果的右上角找到。图片显示了一位女性在生下第二个孩子后描述她的幸福的视频。该算法显然是婴儿的粉丝，或者也许是母亲和她们鼓鼓的钱包的粉丝。


    ## 8. 机器学习可以帮助你戒烟。


    吸烟者经常使用相同的短语和词语来描述他们的习惯。一个算法可以获取你在在线论坛和电子邮件中使用的词语，并利用它们为你提供戒烟激励，包括其他也像你一样试图戒烟的人。这样，你就不是一个人在战斗。


    这是机器学习如何帮助行为改变和成瘾康复的一个例子。这款应用名为QuitFeelingBad，由苏塞克斯大学的科学家开发。在这项研究中，使用该应用的参与者能够将他们的香烟使用量减少一半，而那些只是少抽几支烟的人则没有达到这样的效果。


    ## 9. 机器学习帮助识别图像医疗数据。


    医学图像分析使用机器学习算法来识别MRI扫描和PET扫描等医学图像中的疾病和癌症。这是医生为诊断目的而采用的众多技术之一，旨在基于一组仅靠科学本身难以获得的数据做出医疗决策。


    ## 10. 机器学习帮助识别易受损的交通标志。


    机器学习也被用于识别易受损的交通标志并向执法机构发出警告，同时帮助他们改进早期检测系统。它还可以提醒驾驶员注意可能危险的道路状况。例如，你可能会在驾驶时收到警报，提示前方有急转弯，你应该减速甚至使用刹车。


    ## 11. 机器学习用于分析眼球运动。


    眼动追踪技术通常用于研究神经系统疾病，如儿童注意力缺陷多动障碍（ADHD）或自闭症谱系障碍（ASD）等疾病。在辛辛那提大学的一项研究中，研究人员使用眼动追踪来检查人们如何处理信息并学习如何理解文本。


    在这项研究中，参与者被展示诸如“Click here”（点击这里）或“Click there”（点击那里）之类的信息，并监测他们的眼球运动，以查看他们最常看屏幕的哪些部分。研究人员发现，当参与者看到他们以前没见过的单词附近的单词时，他们更频繁地查看这些单词。此外，科学家发现，这些参与者比那些只是反复阅读相同信息而不看它、并且中间走神的参与者表现得更好。


    ## 12. 机器学习用于预测性维护。


    已经开发了复杂的机器学习算法用于预测性维护。使用这些算法，维护技术人员可以识别车辆上接近使用寿命的部件，并提前收到潜在故障的警报。这些数据可以帮助技术人员通过预防性维护来避免工伤。


    ## 13. 机器学习帮助区分动物和物体。


    不同动物之间存在很大差异，物体之间也是如此，但如果你能区分猫和椅子呢？一个名为Fads的机器学习算法被构建出来，通过使用重叠的遗传物质进行比较来识别动物。'
