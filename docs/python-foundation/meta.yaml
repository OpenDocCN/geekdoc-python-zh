    ## Credit Card Fraud Detection


    Credit card fraud is a huge problem in the world today. Because of this, security
    companies across the globe are constantly building new tools to identify it and
    stop it at its source. But those tools are far from perfect; and therefore, there
    is still plenty of money to be made by those who work with credit cards and steal
    them.


