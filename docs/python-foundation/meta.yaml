    \nTensorFlow的目标是实现图并帮助并行计算操作，从而带来效率提升。在TensorFlow中，图节点被称为张量，它们只是多维数据数组。图从输入层开始，我们在那里找到输入张量。在输入层之后，我们得到隐藏层，该层具有整流线性单元作为激活函数。\n\
    \n## 常量\n\n在TensorFlow中，我们使用`constant`函数创建常量。这个`constant`函数的签名是`constant(value,\
