    ## 机器学习类型与流程


    ### 监督学习？


    在监督学习中，我们通常有一个带有相应标签的训练数据集。我们试图根据关联训练集和标签的关系，为新的未知数据集打标签。为此，学习算法被提供训练集和相应的正确标签。然后，它学习训练集和标签之间的关系。接着，算法将这种关系应用于为未知数据集打标签。形式上，我们想要构建一个模型，该模型估计一个函数
    f，该函数将数据集 X（即输入）与标签 Y（即输出）关联起来：Y=f(X)。数学关系 f 被称为映射函数。


    让我们考虑一下，如果我们有一组图像，并试图将其标记为猫图像或非猫图像。我们首先将图像（X）和这些图像的标签（猫或非猫）作为输入提供给学习算法。然后，我们近似关系
    f，以尽可能准确地根据 X 估计 Y：Y=f(X)+ε，其中 ε 是一个均值为零的随机误差。请注意，我们正在近似数据集和标签之间的关系，并且我们希望误差 ε
    尽可能接近 0。当 ε 恰好为 0 时，意味着模型是完美的，准确率为 100%，但构建这样的模型非常罕见。


    通常，可用的带标签数据的一个子集（通常是 80%）被用作训练集来估计映射任务，以构建这样的模型。额外的 20% 带标签数据用于评估模型的效率和精度。在此步骤中，模型被输入这
    20% 的数据，并将预测输出与实际标签进行比较，以计算模型性能。


    监督学习主要有两个功能，即分类或回归。当输出 Y 是质量或类别数据（即离散变量）时使用分类，而当输出 Y 是数量数据（即连续数值）时使用回归。分类旨在预测标签或将数据分配到它们最相似的类别。输出
    Y 是一个二元变量（即 0 或 1）。在上面给出的例子中，将图像标记为猫或非猫就是分类的一个例子。模型也可以是多类分类，其中模型预测不同的类别。例如，Outlook
    将邮件分为多个类别，如“重点”、“其他”、“垃圾邮件”。有许多算法可以使用，例如逻辑回归、决策树、随机森林和多层感知器。线性回归是这类问题最简单的模型。


    监督学习的缺点在于它们无法处理新信息，当有新信息可用时，应重新考虑训练。例如，我们有一组狗和猫的训练图像，模型被训练来将图像标记为狗图像或猫图像。换句话说，我们开发了一个包含狗和猫两个类别的模型。当这个模型被呈现其他动物的新图像时，例如老虎，它会错误地将老虎图像标记为狗或猫图像。模型无法识别老虎图像，但它会将图像分类到一个类别中。因此，每当有新信息可用时，都应该对模型进行训练。


    在接下来的小节中，我们将介绍解决回归和分类问题最常用的算法。


    -   线性回归：如前所述，这是一种通常用于监督学习的模型，适用于输出为连续变量的回归类型问题。线性回归描述了一个或多个自变量 X 与目标输出变量 Y 之间的关系：Y=WX+B。


    如果 X 是单个变量，那么 W 和 B 是待确定的常数参数。否则，如果处理多个输入变量，W 是一个矩阵，B 是待确定的向量。W 被称为 X 的系数或权重，B
    被称为截距或偏置。


    在训练过程中，我们试图找到最佳参数 W 和 B，使得 Y 的预测值尽可能接近 Y 的实际值。然后，使用最优的 W 和 B 从输入 X 预测 Y 值。在这种情况下，我们如何知道
    B 和 W 的哪些值是最佳的？


    为了确定最佳参数，即权重 W 和偏置 B，我们使用所谓的代价函数或损失函数 J。代价函数量化了预测值与目标值 Y 的接近程度。基本上，这个函数量化了 Y 的估计值和目标值之间的模型误差。这个函数需要被学习算法最小化。数学上，代价函数是：


    损失函数 = (1/m) * ∑(y_预测 - y_目标)²


    这里的代价函数是模型预测值与目标实际值 Y 之间的均方根误差，缩写为 RMSE。这里，我们使用最小二乘法来近似 W 和 B 的最佳值。


    我们可以使用优化算法，如梯度下降算法，通过更新截距 B 和系数 W 的值，使代价函数的值最小化。该算法从 W 和 B 的随机值开始，并在每次迭代中更新这些值，直到达到代价函数
    J 的最小值，如下所示：


    ```

    W = W - α * (δJ/δW)

    B = B - α * (δJ/δB)

    ```


    其中 α 是学习率参数，δJ 是代价函数或损失函数的导数。我们将在神经网络部分学习代价函数梯度的重要性。学习率 α 是一个决定算法学习速度的参数。如果学习率参数值较低，权重和偏置参数的更新就越慢。算法收敛就会非常缓慢。相反，如果学习率参数值较高，算法收敛就越快。


    这里我们介绍了一个线性回归模型的简单例子。根据数据，关系可能不是线性的。在这种情况下，应使用相同的原理考虑非线性回归模型。


    -   逻辑回归：当输出是离散或二元变量（即 0 或 1 / 是或否）时，是一种分类方法。逻辑回归与线性回归的概念相同，不同之处在于它使用逻辑函数或 Sigmoid
    函数作为代价函数，并且基于概率。逻辑函数的数学公式如下方程所示：'
