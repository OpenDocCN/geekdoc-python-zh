    # Naive Bayes Algorithm


    In the field of statistics, the probability is approached in two ways—the classical
    approach or the Bayesian approach. Probability is often taught using the classical
    approach or the frequentist approach. This is a method that is followed in all
    beginners’ classes in statistics. In the frequentist approach to probability,
    mixed constants whose values are unknown are used to estimate the population parameters.
    These prospects are called the relative frequencies of categorical variables,
    and the experiment is repeated indefinitely. For instance, if we flip a coin 20
    times, it is not unusual to observe at least 80% heads. However, if we flip the
    coin 20 trillion times, we can be certain that the proportion of heads will not
    be that much greater than the proportion of tails. It is this behavior that defines
    the prospect of the frequentist approach.


    Another approach to probability, the frequentist approach, uses parameters that
    are fixed so that the randomness lies only in the data.'
