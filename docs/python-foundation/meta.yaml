    on the data. Here, in machine learning, we analyze the datasets, recognize patterns,
    and then make predictions about variables. Here we have many algorithms like SVM
    (Support vector machines), Decision trees, Random Forests, etc. The output of
    ML algorithms are functions that derive from the input data and help to predict
    the values of unknown parameters or features. When there is a single training
    set with known values for all inputs and outputs that have been found as expected
