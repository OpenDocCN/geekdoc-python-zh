  md: '# # Flow Control


    **Flow Control**

    A loop is a program control structure which facilitates intricate execution paths
    and repetitive processing of a statement or a series of statements.


    **The For Loop**

    A for loop is used to iterate over items of sequential data types such as strings,
    lists, or tuples.


    **Syntax:**

    for val in sequence:

    statement(s) In a ‘for loop’, the variable holds the value of the item in the
    sequence with every iteration. The loop goes on until all items are processed.


    *Examples:*

    *For Loop over a string:*


    ```

    for letter in ‘Programming’: #iterate over a string

    print(‘<<*’, letter, ‘*>>’)

    ```


    *If you run the above code, this would be your output:*


    ```

    <<* P *>>

    <<* r *>>

    ```'
