    # What Is Machine Learning?


    ![](img/9b742240054fb02472f2e7c1266edbc1_280_0.png)


    Derived from Artificial Intelligence, the concept of machine learning is a complete
    area of study. It focuses on developing automated programs to acquire knowledge
    from data in order to make a diagnosis or a prediction. Machine learning relies
    on the concept that machines are able to learn, identify trends, and provide decisions
    with minimal human intervention. These machines improve with experience and build
    the principles that govern the learning processes.'
- md: 'There is a wide variety of machine learning uses, such as marketing, speech
    and image recognition, smart robots, web search, etc. Machine learning requires
    a large dataset in order to train the model and get accurate predictions. Different
    types of machine learning exist and can typically be classified into two separate
    categories: supervised or unsupervised learning. Other algorithms can be labeled
    as semi-supervised learning or reinforcement machine learning.


    Supervised learning is mainly used to learn from a categorized or labeled dataset
    and then applied to predict the label for the unknown dataset. In contrast, unsupervised
    learning is used when the training dataset is neither categorized nor labeled
    and is applied to study how a function can describe a hidden pattern from the
    datasets. Semi-supervised learning uses together categorized and non-categorized
    dataset. Reinforcement is a method that relies on the trial and error process
    to identify the most accurate behavior in an environment to improve its performance.


    This chapter will go through the details for each type of machine learning and
    explains in-depth the differences between each type of learning and its pros and
    cons. Let’s start with the supervised learning that is commonly used and the simplest
    learning paradigm in machine learning. Before we dive into the details about machine
    learning, when is machine learning the best approach to solve a problem?


    ## When Is Best to Use Machine Learning?


    It is crucial to understand machine learning is not the go-to approach to solving
    any problem at hand. Some problems can be solved with robust approaches without
    relying on machine learning. Problematics with few data with target values that
    can easily be defined by a deterministic approach. In this case, when it is easy
    to determine and program a rule that drives the target value, machine learning
    is not the best approach to follow.


    Machine learning is best used when it is impossible to develop and code a rule
    to define the target value. For instance, image and speech recognition is a perfect
    example of when machine learning is best used. Images, for example, have a lot
    of features and pixels that a simple human task is very hard to implement in order
    to recognize the image. A human being can visually recognize an image and classify
    it. But how to develop an algorithm and a rule-based approach is exhausting and
    not very effective for image recognition. So, in this case, building an image
    dataset and flagging each image with its specific contents (i.e., animal, flower,
    object, etc.) and using a machine learning algorithm to detect each category of
    images is very efficient. In short, machine learning is very handy when you have
    a number of factors that impact the target value with little correlation.


    Machine learning is also the best approach to automate a task for large datasets.
    For example, it is easy to detect manually a spam email or a fraudulent transaction.
    However, it is a very time-consuming and tedious task to do the same task for
    a hundred million emails or transactions. Machine learning is very cost-effective
    and computationally efficient to handle large datasets and large-scale problems.


    Machine learning is also best used in cases where human expertise to solve a problem
    is very limited. An example of these problems is when it is impossible to label
    or categorize the data. Machine learning in this situation is used to learn from
    the datasets and provide answers to the problems of the questions we are trying
    to solve.


    Overall, machine learning is best used to solve problems when:


    - 1) humans have the expertise to solve the problem but it is almost impossible
    to develop easily a program to mimic the human task,

    - 2) humans have no expertise or an idea regarding the target value (i.e., no
    label or classified data),

    - 3) humans have the expertise and know the possible target values but it is cost-effective
    and time-consuming to implement such an approach.


    In general, machine learning is best used to solve complex data-driven problems
    like learning behaviors for client targeting or acquisition, fraud analysis, anomaly
    detection in large systems, disease diagnostic, shape/image, and speech recognition
    among others. When data are available, and human expertise can be easily programmed
    as a rule-based approach, it is best to use a deterministic rule-based method
    to resolve the problem. The large dataset should be available so as machine learning
    to be efficient and effective—otherwise, issues of generality and overfitting
    rise. Generality means the ability of a model to be applied in case scenarios
    similar to case scenarios that served to build the model. When machine learning
    models are built on a small dataset, they become very inefficient when applied
    to new datasets to which they have not been exposed. Hence, their applicability
    becomes very limited. For example, building a model that recognizes an image as
    a cat or dog image, then applying the same with new image data of other animals.
    The model will give an inaccurate classification of the new dataset of the other
    animals like dog or cat images. Overfitting is when the model shows a high accuracy
    when applied to the training data, and its accuracy drops drastically when applied
    to test data similar to the training data. Another issue with machine learning
    that should be considered in developing a machine learning model is the similarity
    between inputs that are associated with several outputs. It becomes very difficult
    to apply a classification machine learning model in this case as similar inputs
    yield different outputs. Therefore, the quality and quantity of data are very
    important in machine learning. One should keep in mind that not only the quantity
    of data but also the quality of data affects the accuracy and applicability of
    any machine learning approach. If the right data is not available, collecting
    the right data is crucial and is the first step to take in order to adopt a machine
    learning approach. Now, you have learned when it is useful to adopt a machine
    learning approach, when you should avoid machine learning and when a simple rule-based
    deterministic approach is the simple way to solve a problem. Next, you will learn
    the different types of machine learning that you might use, when each type is
    applied, the data that it requires, widely used algorithms, and the steps to follow
    to solve a problem with machine learning.


    ## What Is AI


    Artificial Intelligence (AI) is a field of computer science that studies how general
    intelligence can be designed in computer systems and machines. As machines continue
    to become more intelligent, AI has risen in popularity as a new way of performing
    tasks traditionally associated with humans, such as speech recognition and playing
    board games. The term “artificial” distinguishes these systems from natural intelligence
    which comes from human thought. The word “intelligence” indicates an ability to
    solve problems or perform tasks; this includes the ability to learn without being
    explicitly programmed by hand. The term “artificial intelligence” was coined by
    John McCarthy in 1955.


    The field of AI research was founded on the claim that a central property of humans,
    intelligence—the sapience of Homo sapiens—can be so precisely described that it
    can be simulated by a machine. This raises philosophical arguments about the nature
    of the mind and the ethics of creating artificial beings endowed with human-like
    intelligence, issues that have been explored by myth, fiction, and philosophy
    since antiquity. Artificial intelligence has been the subject of optimism, but
    has also suffered setbacks and, today has become an essential part of the technology
    industry, providing the heavy lifting for many of the most difficult problems
    in computer science.


    AI research is highly technical and specialized, deeply divided into subfields
    that often fail to communicate with each other. Subfields have grown up around
    particular institutions, the work of individual researchers, the solution of specific
    problems, longstanding differences of opinion about how AI should be done, and
    the application of widely differing tools. The central problems of AI include
    such traits as reasoning, knowledge, planning, learning, natural language processing
    (communication), perception, and the ability to move and manipulate objects. General
    intelligence is still among the field’s long-term goals.


    A lot of people are hearing the term Artificial Intelligence (AI) thrown around
    these days. Some think it’s a good idea,'
  mdcn: '机器学习的应用非常广泛，例如市场营销、语音和图像识别、智能机器人、网络搜索等。机器学习需要一个大型数据集来训练模型并获得准确的预测。机器学习存在不同类型，通常可以分为两个独立的类别：监督学习或无监督学习。其他算法可以被标记为半监督学习或强化机器学习。


    监督学习主要用于从已分类或标记的数据集中学习，然后应用于预测未知数据集的标签。相比之下，无监督学习用于训练数据集既未分类也未标记的情况，旨在研究如何从数据集中描述隐藏模式的函数。半监督学习同时使用已分类和未分类的数据集。强化学习是一种依赖于试错过程的方法，以在环境中识别最准确的行为来提高其性能。


    本章将详细介绍每种类型的机器学习，并深入解释每种学习类型之间的差异及其优缺点。让我们从监督学习开始，这是机器学习中常用且最简单的学习范式。在深入探讨机器学习的细节之前，我们先来思考：机器学习何时是解决问题的最佳方法？


    ## 何时最适合使用机器学习？


    理解机器学习并非解决任何手头问题的首选方法至关重要。有些问题可以通过不依赖机器学习的稳健方法来解决。对于数据量少且目标值可以通过确定性方法轻松定义的问题，如果能够轻松确定并编写驱动目标值的规则，那么机器学习就不是最佳选择。


    当无法开发和编写规则来定义目标值时，机器学习是最佳选择。例如，图像和语音识别是机器学习最佳应用的完美例子。以图像为例，它包含大量特征和像素，对于人类来说，要识别图像是一项非常困难的任务。人类可以直观地识别图像并对其进行分类。但是，如何开发算法和基于规则的方法对于图像识别来说既费力又效率不高。因此，在这种情况下，构建图像数据集并为每张图像标记其特定内容（例如，动物、花卉、物体等），然后使用机器学习算法来检测每类图像是非常高效的。简而言之，当有许多因素影响目标值且相关性较小时，机器学习非常方便。


    机器学习也是自动化处理大型数据集任务的最佳方法。例如，手动检测垃圾邮件或欺诈交易很容易。然而，对一亿封邮件或交易执行相同的任务则非常耗时且繁琐。机器学习在处理大型数据集和大规模问题时，既经济又高效。


    机器学习在人类专业知识非常有限的情况下也是最佳选择。例如，当无法标记或分类数据时，机器学习在这种情况下用于从数据集中学习，并为我们试图解决的问题提供答案。


    总的来说，机器学习在以下情况下最适合用于解决问题：

    - 1) 人类有专业知识来解决问题，但几乎不可能轻松开发程序来模拟人类任务；

    - 2) 人类没有专业知识或对目标值一无所知（即没有标签或分类数据）；

    - 3) 人类有专业知识并了解可能的目标值，但实施这种方法既经济又耗时。


    通常，机器学习最适合解决复杂的数据驱动问题，例如学习客户定位或获取行为、欺诈分析、大型系统异常检测、疾病诊断、形状/图像和语音识别等。当数据可用且人类专业知识可以轻松编程为基于规则的方法时，最好使用确定性的基于规则的方法来解决问题。大型数据集必须可用，机器学习才能高效有效——否则，会出现泛化性和过拟合问题。泛化性是指模型应用于与构建模型时所用场景相似的场景的能力。当机器学习模型基于小型数据集构建时，当应用于它们未曾接触过的新数据集时，效率会变得非常低。因此，它们的适用性变得非常有限。例如，构建一个识别图像为猫或狗图像的模型，然后将其应用于其他动物的新图像数据。该模型将对其他动物（如狗或猫图像）的新数据集给出不准确的分类。过拟合是指模型在应用于训练数据时显示出高准确性，但当应用于与训练数据相似的测试数据时，其准确性急剧下降。在开发机器学习模型时应考虑的另一个问题是，与多个输出相关联的输入之间的相似性。在这种情况下，应用分类机器学习模型变得非常困难，因为相似的输入会产生不同的输出。因此，数据的质量和数量在机器学习中非常重要。应该记住，不仅数据的数量，数据的质量也会影响任何机器学习方法的准确性和适用性。如果没有正确的数据，收集正确的数据至关重要，这是采用机器学习方法的第一步。现在，你已经了解了何时采用机器学习方法是有用的，何时应该避免机器学习，以及何时简单的基于规则的确定性方法是解决问题的简单方法。接下来，你将学习可能使用的不同类型的机器学习，每种类型的应用场景、所需数据、广泛使用的算法，以及使用机器学习解决问题的步骤。


    ## 什么是人工智能


    人工智能（AI）是计算机科学的一个领域，研究如何在计算机系统和机器中设计通用智能。随着机器变得越来越智能，AI作为一种执行传统上与人类相关任务的新方式而日益普及，例如语音识别和玩棋盘游戏。“人工”一词将这些系统与来自人类思维的自然智能区分开来。“智能”一词表示解决问题或执行任务的能力；这包括在没有明确手动编程的情况下学习的能力。“人工智能”一词由约翰·麦卡锡于1955年提出。


    AI研究领域的建立基于这样一个主张：人类的一个核心属性——智人的智慧——可以被如此精确地描述，以至于可以由机器模拟。这引发了关于心灵本质以及创造具有类人智能的人造生物的伦理问题的哲学争论，这些问题自古以来就通过神话、小说和哲学进行了探讨。人工智能一直是乐观主义的主题，但也遭受过挫折，如今已成为技术产业的重要组成部分，为计算机科学中许多最困难的问题提供了强大的支持。


    AI研究高度技术化和专业化，被深度划分为通常无法相互沟通的子领域。这些子领域围绕特定机构、个别研究人员的工作、特定问题的解决方案、关于AI应如何进行的长期分歧以及广泛不同工具的应用而发展起来。AI的核心问题包括推理、知识、规划、学习、自然语言处理（交流）、感知以及移动和操纵物体的能力等特征。通用智能仍然是该领域的长期目标之一。


    如今，很多人听到“人工智能”（AI）这个词被广泛提及。有些人认为这是个好主意，'
