    # Fine-Tuning


    What we have done so far is use k-means clustering to understand clustering analysis
    and performance metrics. Our next step is fine-tuning our results configurations
    so we can get better results. In the real world, you will do this a lot. Let’s
    see how it is done by modifying the k-value.


    You will be tempted to modify the k-value randomly and see which one provides
    the best results. That won’t tell you which value works best. The problem is that,
    when you increase the value, there’s a possibility you will end up lowering the
    silhouette score without getting any clusters. Suppose the k-value is set to 0;
    the zero will be the value of observation within the sample. Each point will have
    a'
