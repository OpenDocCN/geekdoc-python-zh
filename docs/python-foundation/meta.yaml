    # Functions, Classes, and Methods


    We learned how to branch programs through conditional statements and how to repeat
    through a set of instructions with loops efficiently. The next level of sophistication
    to explore is the function.


    A function is a block of code that performs a specific, repetitive task that can
    be compartmentalized and called by another piece of code.


    Our first code example in this book looked at a small program that calculated
    the volume of a cylinder.


    This is an excellent example of something that should be written as a function.
    It is a clearly defined task that will never change.


    By placing the code in a function, we can write it once and call it as many times
    as we need without rewriting it within the program.


    Additionally, we can pull that code from one program and use it in any program
    we want, provided we call it properly.'
