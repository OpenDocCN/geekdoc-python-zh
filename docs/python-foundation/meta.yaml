  md: '# DataFlow Graphs


    In TensorFlow, computation is based on graphs. The graphs provide us with an alternative
    to solving mathematical problems. Consider the expression given below:


    ```

    x = ( y+z ) * ( z+4 )

    ```


    The above expression may also be expressed as follows:


    ```

    p=y + z

    q= z + 4

    x= p * q

    ```


    When represented as above, it becomes easy to express the expression in the form
    of a graph. Initially, we had a single expression but we now have two expressions.
    The two expressions can be performed in parallel. We can gain from this in terms
    of computation time. Such gains are very important in deep learning and big data
    applications, especially in Convolutional Neural Networks (CNNs) and Recurrent
    Neural Networks (RNNs) which are all complicated neural network architectures.


    The goal of TensorFlow is to implement graphs and help in the computation of operations
    in parallel which will lead to efficiency gains. In TensorFlow, the graph nodes
    are known as tensors and they are simply multi-dimensional data arrays. The graph
    begins with the input layer where we find the input tensor. After the input layer,
    we get the'
