    World”并计算3的平方。该文件应包含以下语句：


    ```

    print("Hello World!")

    print(''3^2 equal to '', 3**2)

    ```


    要运行此模块，在操作系统的提示符下，输入以下命令行：


    ```

    python test.py

    ```


    如果此命令行不起作用，你应该输入Python可执行文件的完整路径和test.py文件的完整路径。你也可以通过输入`cd`加上test.py文件的完整路径来更改工作目录，然后输入`python
    test.py`。将工作目录更改为保存模块的目录是避免每次运行模块时都输入模块完整路径的好方法。输出结果为：


    ```

    C:\Users>python C:\Users\test.py

    Hello World!

    3^2 equal to 9

    ```


    当我们运行模块test.py时，结果显示在操作系统的提示符中，并在关闭提示符时消失。要将结果存储到文件中，我们可以使用shell语法，输入：


    ```

