    intelligence can be designed in computer systems and machines. As machines continue
    to become more intelligent, AI has risen in popularity as a new way of performing
    tasks traditionally associated with humans, such as speech recognition and playing
    board games. The term “artificial” distinguishes these systems from natural intelligence
    which comes from human thought. The word “intelligence” indicates an ability to
    solve problems or perform tasks; this includes the ability to learn without being
    explicitly programmed by hand. The term'
