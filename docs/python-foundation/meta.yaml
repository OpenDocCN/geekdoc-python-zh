    ```

    import pandas as pd

    import numpy as np

    import matplotlib.pyplot as plt

    import seaborn as sns

    ```


    Then, we import the titanic data coming from the seaborn library:


    ```

    Titanic_data = sns.load_dataset(''titanic'')

    ```


    Before starting the machine learning process, let’s explore the dataset first.
    This step of data exploratory analysis is very important to understand how the
    data is stored and detect if there are any missing data or outliers. With the
    following function, we are going to explore how the data is stored. It shows the
    first few lines of the data:


    ```

    Titanic_data.head()

    ```


    The output is as described in the following table. The first column provides the
    passenger Id; the second column is a binary variable (i.e., 0 or 1) that represents
    whether the passenger had survived or not. The following columns provide information
    about the passenger: pclass which is the ticket class (1: upper, 2: middle and
    3 is a lower class), sex, age, sibsp number of siblings abroad, fare (i.e., passenger
    fare) and so on. Note there is an additional variable alive that provides the
    same information as a survived variable.


    | survived | pclass | sex | age | sibsp | parch | fare | embarked | class | who
    | adult_male | deck | embark_town | alive | alone |

    |---|---|---|---|---|---|---|---|---|---|---|---|---|---|---|

    | 0 | 3 | male | 22.0 | 1 | 0 | 7.2500 | S | Third | man | True | NaN | Southampton
    | no | False |

    | 1 | 1 | female | 38.0 | 1 | 0 | 71.2833 | C | First | woman | False | C | Cherbourg
    | yes | False |

    | 1 | 3 | female | 26.0 | 0 | 0 | 7.9250 | S | Third | woman | False | NaN | Southampton
    | yes | True |

    | 1 | 1 | female | 35.0 | 1 | 0 | 53.1000 | S | First | woman | False | C | Southampton
    | yes | False |

    | 0 | 3 | male | 35.0 | 0 | 0 | 8.0500 | S | Third | man | True | NaN | Southampton
    | no | True |


    Sample of the Titanic dataset visualized with head() function.


    Now let’s see the size of the data. In other words, let’s find how many passengers
    are stored in this dataset. To do so, we use the function:


    ```

    Titanic_data.count()

    ```


    The output of this function is:


    ```

    survived 891

    pclass 891

    sex 891

    age 714

    sibsp 891

    parch 891

    fare 891

    embarked 889

    class 891

    who 891

    adult_male 891

    deck 203

    embark_town 889

    alive 891

    alone 891

    dtype: int64

    ```


    In total, 891 passengers, including the staff, were on the ship. We can see at
    this stage that there are some missing values for the variable age, deck, embarked,
    and embark_town. We will deal with this later. We are going to plot the number
    of people that had survived and had not survived as bars with countplot() function:


    ```

    sns.countplot(x=''survived'', data=Titanic_data, palette=["k", "k"])

    ```


    The countplot() function implemented in the seaborn library takes as input: x
    the variable for which we compute the frequency, data: the dataset. Palette is
    an option to specify the colors for each group, i.e., bar. In this example, both
    bars: survived and not survived are in black. The output of this function is given
    in the figure below. We note that more than 500 people did not survive the Titanic.


    Bar plot of people that survived and did not survive the Titanic.


    Now let’s see the number of survivals according to the sex of passengers. To do
    so, we are going to add an option or a filter to the countplot() in order to specify
    that we want the counting of survivals for each sex separately. We are also going
    to change the colors. Because in this plot we will have four bars, we are going
    to create a palette color for our bar chart. This palette will be then passed
    as an argument for the countplot() function.


    ```

    seq_palette = sns.color_palette(''Greys'', 4)

    sns.countplot(x=''survived'', hue=''sex'', data=Titanic_data, palette=seq_palette)

    ```


    The output should be similar to the figure below:


    Survived passengers from the Titanic according to gender.


    This figure shows us that more women survived the Titanic than men. More than
    400 men did not survive the Titanic, and only 100 men approximately did survive
    the Titanic. We can plot the same information according to the social class of
    passengers:


    ```

    sns.countplot(x=''survived'', data=Titanic_data, hue=''pclass'', palette=seq_palette)

    ```


    *Survived passengers from the Titanic according to social class.*


    The figure shows the majority of people that did not survive the Titanic are from
    the lower class.


    Now let’s check the missing values in the dataset. To do so, we are going to compute
    the number of null values in the dataset:


    ```

    Titanic_data.isnull().sum()

    ```


    The function isnull() returns the variables with null values and sum() computes
    the sum. The output of the function given above is:


    ```

    survived 0

    pclass 0

    sex 0

    age 177

    sibsp 0

    parch 0

    fare 0

    embarked 2

    class 0

    who 0

    adult_male 0

    deck 688

    embark_town 2

    alive 0

    alone 0

    dtype: int64

    ```


    We can notice that 177 values are missing for the variable age and 688 are missing
    for the deck variable and 2 missing values embark_town. There are several approaches
    to estimating missing values. These approaches are not covered in this book. We
    will rather focus on how to develop and train a prediction model. Therefore, these
    variables will not be used in the model and are going to be ignored. These variables
    will be dropped from the dataset with the drop() function:


    ```

    Titanic_data.drop(''age'', axis=1, inplace=True)

    Titanic_data.drop(''embark_town'', axis=1, inplace=True)

    Titanic_data.drop(''deck'', axis=1, inplace=True)

    Titanic_data.dropna(inplace=True)

    Titanic_data.head()

    ```


    The axis option in the drop() function allows us to specify if we want to drop
    a column or row. Now the dataset is similar to this:


    | survived | pclass | sex | sibsp | parch | fare | embarked | class | who | adult_male
    | alive | alone |

    |---|---|---|---|---|---|---|---|---|---|---|---|

    | 0 | 3 | male | 1 | 0 | 7.25 | S | Third | man | True | no | False |

    | 1 | 1 | female | 1 | 0 | 71.2833 | C | First | woman | False | yes | False |

    | 1 | 3 | female | 0 | 0 | 7.925 | S | Third | woman | False | yes | True |

    | 1 | 1 | female | 1 | 0 | 53.1 | S | First | woman | False | yes | False |

    | 0 | 3 | male | 0 | 0 | 8.05 | S | Third | man | True | no | True |


    Titanic dataset after deleting variables with missing values.


    Now looking at the dataset above, we can see that the “who” variable, “sex” variable
    and “adult_male” provide the same information. The variable “alive” is the same
    as the variable “survived.” The variables “class” and “pclass” also give the same
    information. Finally, we can retrieve the same information from the variable “alone”
    and the variable “sibsp.” Therefore, the variables “who,” “adult_male,” “class,”
    “alive” and “alone” will be dropped from the dataset.'
