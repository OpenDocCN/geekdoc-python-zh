- md: "## Break Statement\n\nA break statement terminates the loop and passes control\
    \ to the first statement after the loop. It is commonly used when a quick exit\
    \ is required.\n\nSyntax:\n\n```\nbreak\n```\n\nExample:\n\n```\n#loop ends once\
    \ a specified color is reached\ncolors = [\"blue\", \"pink\", \"red\", \"green\"\
    , \"yellow\"]\nfor x in colors:\n    if x == 'green':\n        break\n    print('Great\
