    # Updating a dictionary


    You can add new key:value pairs to a dictionary and modify or delete the values
    of existing entries, as demonstrated in the next exercise.


    ```

    **Updating a dictionary:**

    1 weather = {[“Mon”] = “Cloudy”, [“Tue”] = “Sunny”, [“Wed” = “Rainy”}

