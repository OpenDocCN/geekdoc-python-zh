    Association, another unsupervised learning technic, aims at identifying data features
    that frequently occur together, and data features that are correlated. It helps
    answer the question of what the value of a data feature can tell about another
    feature. The directionality in the association is very important. If a data feature
    A shows a specific trend about another feature B it does not necessarily mean
    that feature B will show a trend for feature A. For example, if clients that buy
    a product A tends to buy a product B that does not mean necessarily that clients
    that buy product B tend to buy the product A. The association rule algorithm uses
    different measures to evaluate the performance of the rule: support, confidence,
    and lift. In order to explain these evaluation metrics, let’s take, for example,
    two features A and B for'
  merge: -1
  pgno: 350
- img_proc: true
  md: 'which we want to identify the hidden relationship. The support is expressed
    as the frequency (percentage) of events where A and B occur together. It can be
    calculated as the fraction of events when A and B occur together. Confidence is
    computed as the fraction of events including feature B to the number of events
    containing feature A. The lift is computed as the fraction of the confidence and
    support. If the lift is greater than 1, the features A and B are positively correlated.
    If the lift is less than 1, the features A and B are negatively correlated. If
    the lift is equal to 1, then the features, A and B are not correlated.


    Overall, association rule algorithms are based on the frequency of occurrences
    across a dataset. The purpose is to detect association that occurs more frequently
    within the dataset than in a given random sampling. This approach is widely used
    in bioinformatics and basket data analysis. The latter provides retailers with
    valuable information about items that clients tend to buy together.


    Anomaly detection is also called outlier detection. Outliers are simply the points
    or members of a dataset that shows a different behavior or have a different pattern
    than the majority of the dataset members. These outliers can be identified by
    visualizing by plotting the data. Sometimes the outliers are just an error in
    the dataset. For example, an error in measurements or a human error in typing
    information in the system. These outliers can be removed from the dataset to be
    analyzed. In some cases, these'
