  - '[PAGE 456]


    Machine learning is a complex topic, but, luckily, the data science ecosystem
    has provided a number of freely available and accessible resources to help beginners
    learn what machine learning is and how it’s used in different industries. One
    such resource is Anaconda, which offers several free packages that are designed
    to simplify machine learning research and development. In this book, we explore
    both the Anaconda package library’s features and history as well as its key strengths
    in helping you get started in data science.


    # What Is Anaconda?


    Anaconda is a Python distribution that comes with data science and machine learning
    software such as Scikit Learn, Pandas, Jupyter Notebook, Matplotlib, NumPy, and
    others. It’s an open-source project that helps you to easily install Python packages
    that can be used in your research projects, demos, or the production environment.
    It’s an all-in-one package manager to help you perform all your data science tasks
    along with developing applications in Python. You can also use it as your main
    python installation if you are working with a wide range of open-source tools
    like Jupyter/IPython notebooks and IPython Console extensions.


    # Anaconda History


    In 2013, Anaconda’s creator, Brian Rosner, wrote a blog post about the history
    of Anaconda and its current status. It'
- md: 'describes how Anaconda got started and how it evolved into what it is today
    which includes a wealth of open-source data science packages. Rosner also mentioned
    that after his first public talk about Anaconda’s history, Anaconda started to
    “take off like a rocket.”


    Over the years, more members joined the project and grew it into what it is today.
    Back in 2013, the blog post writes that Anaconda was still a side project but
    had started to gain attention. Since then, things have changed and now Anaconda
    has become an open-source Python distribution used by many data scientists worldwide.


    Anaconda also has released data science and machine learning packages such as
    Scikit-Learn to help beginners learn how machine learning works. The packages
    are available under the MIT license, which allows you to use them freely or modify
    them.


    ## Who Uses Anaconda?


    Anaconda is used by many data scientists and machine learning practitioners. Some
    of the most common examples include:


    - Data science practitioners use Anaconda to install Scikit-Learn, Pandas, and
    Jupyter Notebooks. Scikit-Learn is an easy-to-learn Python package that lets you
    explore machine learning algorithms using a wide variety of data problems. Pandas
    is a popular library for importing, exploring, and analyzing large amounts of
    data. It allows you to analyze different kinds of datasets using structured data
    like lists or tables where Python can handle them easily. Jupyter Notebook is
    a web-based notebook that helps you to share and collaborate on data science projects
    as well as access and run Python code. You can use Jupyter Notebook to create
    your own project, and modify and integrate other open-source data science libraries.


    - Data scientists use Anaconda to install IPython/Jupyter, NumPy, Matplotlib,
    Scikit-Learn, Pandas, Seaborn, and Matplotlib. The Anaconda library allows you
    to install these packages along with other popular open-source packages installed
    on all major operating systems such as Linux/Unix or Windows.


    - Computer engineers use Anaconda to develop their own applications and package
    them. The software comes with over 100 high-level core libraries and over 200
    packages for specific application domains, making it easy for beginners to develop
    machine learning programs as well as other types of applications.


    Anaconda is also used by enterprise data science companies like Blackstone and
    Think Big Analytics to help their clients perform all kinds of data science tasks
    in an effective, fast, easy way while providing enterprise-grade services.


    ## Anaconda vs Anaconda3


    Anaconda comes in two forms: a python distribution called Anaconda, and the python
    distribution combined with Jupyter Notebook called Anaconda3.


    Anaconda3 was created to make it easy for you to use Jupyter with your python
    distribution. Some of the key features of Anaconda3 include:


    - All packages are open source and can be modified and redistributed freely.

    - It comes pre-installed with many data science libraries including Pandas and
    Scikit-Learn.

    - It’s free to use and available on Linux, Windows, or OS X operating systems.


    The main advantage of Anaconda3 is that you do not need to install any software
    on your system or pay for the Jupyter notebook separately. It basically bundles
    the Anaconda package and the Jupyter Notebook together. This way you get a complete
    data science environment with all the necessary packages to perform data science
    tasks including machine learning, statistics, or even data visualization without
    any additional costs or products to buy. You also get a complete user experience
    for programming, sharing notebooks, and collaborating.


    ## Why Use Anaconda?


    Anaconda is a convenient way to install new data science packages and use them
    freely. Since Anaconda offers over 240 Python packages, you can always find a
    package that suits your needs and use it without any license costs. The following
    are some of the advantages of using Anaconda:


    - All packages are open source and there are no license costs associated with
    them. You can edit or redistribute them freely in both commercial and non-commercial
    projects. This allows you to customize packages or build your own Python machine
    learning library according to your own needs. It also saves you time from dealing
    with licenses when working on different projects with different collaborators
    that may have different requirements.

    - It consists of all the important packages you need for data science including
    NumPy, Scikit-Learn, and Pandas.

    - It comes with a Qt creator which makes developing GUI applications easy. It
    also offers a free compiler so you can compile your code with one click.

    - It comes with an easy installation process that installs the Anaconda package
    and updates it along with your system as new releases come out so everything stays
    up to date. It also features a package manager for you to update or install new
    packages to your Anaconda environment. It has built-in support for other Internet
    repositories such as PyPi, GitHub, BitBucket, and many others.

    - It comes with a lot of documentation and examples for you to learn the basics
    of data science. It also features an interactive tutorial called Jupyter Notebook
    that lets you build a complete project from scratch to understand how to use it.


