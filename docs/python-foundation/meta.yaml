    # ## Linear Regression


    We need to discuss Linear Regression in detail and see how we can implement it
    with the scikit-learn library.


    In Linear Algebra, the term “linearity” is used to denote the relationship between
    two or even more variables. If this relationship is represented in a two-dimensional
    space, we end up with a straight line.


    Consider a case in which we need to determine a linear relationship between the
    number of hours a student spends studying for a test and the percentage of marks
    the student scores on the test. We need to be able to tell the percentage of marks
    that a student can score if we are given the number of hours the student spent
    preparing for the test. If the independent variable (hours) is plotted on the
    x-axis while the dependent variable (percentage) is plotted on the y-axis, linear
    regression will give a straight line representing the best fit for the points.


    The equation of a straight line is given by the following formula:


    ```

    $$y = mx + b$$

    ```'
  merge: -1
  pgno: 391
- img_proc: true
  md: 'In the above equation, m denotes the slope of the line while b denotes the
    intercept. This means that the linear regression algorithm gives us the most optimal
    values for the slope and the intercept. The variables x and y will remain the
    same as they are data features that cannot be changed. We can get many different
    lines depending on the values of slope and the intercept that we use. Basically,
    a linear regression algorithm works by fitting multiple lines on data points and
    returns the line with the least error.


    The same can be extended in cases where we have more than two variables. This
    is referred to as multiple linear regression. In such a case, we have many independent
    variables upon which the dependent variable relies. A good example is when you
    need to predict the price of land based on factors like the size of the land,
    the type of soil, the location of the land, the average income of the individuals
    in that area, etc. The dependent price (price) depends on many independent variables.
    A regression model with multiple variables can be represented as follows:


    $$y = b0 + m1b1 + m2b2 + m3b3 + ... mnbn$$


    The above formula is an equation for a hyperplane.


    Now that you are conversant with the concept of Linear Regression, let us see
