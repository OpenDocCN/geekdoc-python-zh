    areas of life. And the possibilities for future applications are endless.


    Learn more about how machine learning can be applied in your field of study or
    profession and see for yourself how these technologies are already making a difference.


    The best part of machine learning is that you don’t need to know math to use it.
    In fact, you can use it in applications where math would be extremely difficult.
    The bad thing is that the applications are already obvious and many of them are
    already being used by the masses.


    Finally, I’ll share some real stories of how people are using machine learning
