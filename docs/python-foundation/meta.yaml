  md: '# Virtualenv


    The idea of Virtualenv is to build an environment, called a virtual environment,
    for your project. It allows you to create the same python libraries, git repositories,
    and 3rd party packages in a standard, controlled manner regardless of system dependencies
    outside of the Python installation and libraries on your host.


    First, we will need pip which comes preinstalled with most Linux systems but can
    be installed separately on others such as mac or windows machines. You can do
    this with the command:


    ```

    pip install virtualenv

    ```


    Once it is installed, we recommend creating a folder for your project. You will
    want to create a virtual environment inside of the folder. Using Virtualenvwrapper
    is highly recommended especially if you are working on multiple projects.


    Creating a new virtual environment requires only one line of code from within
    your project’s directory. You will also want to name it something that makes sense
    as well as set python version x.x.x. Once it is created you can update your working
    directory or source the virtual environment with:


    ```

    mkvirtualenv hello_world

    ```


    This will work similarly to the sudo apt-get install command, except instead of
    installing Python packages it'
