    When you are online doing some shopping, and you see that there is a recommendation
    tab on that website, we are seeing some of the work of data science and machine
    learning coming to life. These are so popular on many websites because they can
    make it easier for the customer to make some informed decisions on what they want
    to watch next or purchase next or something else. And businesses are going to
    enjoy them as well because, with these recommendation systems, it is more likely
    that the customer is going to make another purchase, which is going to increase
