    There is a wide variety of machine learning uses, such as marketing, speech and
    image recognition, smart robots, web search, etc. Machine learning requires a
    large dataset in order to train the model and get accurate predictions. Different
    types of machine learning exist and can typically be classified into two separate
    categories supervised or unsupervised learning. Other algorithms can be labeled
    as semi-supervised learning or reinforcement machine learning.


    Supervised learning is mainly used to learn from a categorized or labeled dataset
    than applied to predict the label for the unknown dataset. In contrast, unsupervised
    learning is used when the training dataset is neither categorized nor labeled
    and is applied to study how a function can describe a hidden pattern from the
    datasets. Semi-supervised learning uses together categorized and non-categorized
    dataset. Reinforcement is a method that relies on the trial and error process
    to identify the most accurate behavior in an environment to improve its performance.


    This chapter will go through the details for each type of machine learning and
    explains in-depth the differences between each type of learning and its pros and
    cons. Let’s start with the supervised learning that is commonly used and the simplest
    learning paradigm in machine learning. Before we dive into the details about machine
    learning when machine learning is the best approach to solve a problem?'
