- md: "## Using a Terminal to Run Python\n\nAs you did when verifying your Python\
    \ version, you can try running snippets of code by opening a terminal and typing\
    \ `python3`. Enter the following command in the terminal session while Python\
    \ is running:\n\n```\n>>> print(\"Hello Python interpreter!\")\nHello Python interpreter!\n\
    >>>\n```\n\nTo ensure that the message appears in the current terminal window,\
    \ print it directly there. Ctrl-D or the command `exit()` can be used to shut\
    \ down the Python interpreter.\n\n## HELLO WORLD PROGRAM\n\nLaunch Sublime Text\
    \ by clicking on the icon or typing \"Sublime Text\" into the search bar on your\
    \ system's search bar. Open a new configuration file by selecting Tools > Build\
    \ System > New Build System from the drop-down menu in your browser. Delete everything\
    \ you see and type:\n\n```\n{\n    \"cmd\": [\"python3\", \"-u\", \"$file\"],\n\
    }\n```\n\nYou can use this code to tell Sublime Text to use your system’s command\
    \ for running your Python programs. Sublime Text saves the file in the default\
    \ directory when you choose Save. The file is named `Python3.sublime-build`.\n\
    \n## Hello World.py\n\nMake a python work folder before writing your first program.\
    \ Python file and folder names should use lowercase letters and underscores for\
    \ spaces.\n\nOpen Sublime Text and save `hello_world.py` in your python work folder.\
    \ The `.py` extension tells Sublime Text that your file contains Python code,\
    \ so it can run the program and highlight the text.\n\nAfter saving, enter this\
    \ line in the text editor:\n\n```\nprint(\"Hello Python world!\")\n```\n\nIf the\
    \ python command works on your system, select Tools > Build from the menu or press\
    \ Ctrl-B (command-B on macOS). If you configured Sublime Text in the previous\
    \ section, select Python 3. To run programs, select Tools > Build or press Ctrl-B\
    \ (or command-B).\n\nSublime Text’s terminal window should display the following\
    \ output:\n\n```\nHello Python world!\n[Finished in 0.1s]\n```\n\nIf you don’t\
    \ see this, the program may be broken. Check each entered character. Did you misprint?\
    \ Did you forget quotes or parentheses? Programming languages require specific\
    \ syntax; without it, you’ll get errors. See the next section for program-running\
    \ tips.\n\n### Diagnosing\n\nIf `hello_world.py` won’t run, try these general\
    \ programming solutions:\n\n- Python displays a trace-back error report when a\
    \ program has a significant error. Python scans the file for errors. Traceback\
    \ may reveal why the program won’t run.\n- Take a break and try again. Even a\
    \ missing colon, mismatched quotation mark, or mismatched parentheses can stop\
    \ a program from running. Reread this chapter and your code to find the error.\n\
    - Restart. You probably don’t need to uninstall any software, but you could delete\
    \ `hello_world.py` and start over.\n- Watch someone else follow the steps in this\
    \ chapter on your computer or another one. Someone may have caught a step you\
    \ missed.\n- Ask a Python expert for help setting up. You might know a Python\
    \ user if you ask around.\n- The chapter’s setup instructions are available at\
    \ https://nostarch.com/pythoncrashcourse2e/. You can cut and paste code from the\
    \ online instructions.\n- Online help. Appendix C includes forums and live chat\
    \ sites where you can ask for help from people who’ve dealt with your issue.\n\
    \nYou won’t annoy experienced programmers. Every programmer has gotten stuck,\
    \ and most will help you set up your system. If you explain what you’re trying\
    \ to do, what you’ve tried, and the results, someone may be able to help. The\
    \ Python community is welcoming to beginners, as stated in the introduction.\n\
    \nAny modern computer should run Python. Early setup issues are frustrating, but\
    \ worth fixing. Once `hello_world.py` runs, you can learn Python and your programming\
    \ will improve.\n\n## Python programs from windows, macOS and Linux terminals\n\
    \n### Windows\n\nMost text editor programs run directly from the editor. But sometimes\
    \ it’s better to use a terminal. You could run a program without editing it.\n\
