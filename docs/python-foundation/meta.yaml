    ```\n\n在上面的练习中，我们定义了一个表示复数的新类。我们定义了两个函数：用于初始化变量的 `__init__()` 函数和用于正确显示数字的 `getNumbers()`\
    \ 函数。\n\n请注意，练习中对象的属性是动态创建的。例如，为 *Object2* 创建了新属性 attr，但为 *Object1* 没有创建（因此出现错误）。\n\
    \n## 删除属性和对象\n\n你可以随时使用 del 语句删除对象的属性甚至对象本身。\n\n```python\nclass ComplexNumbers:\n\
    \    def __init__(self, x = 0, y = 0):\n        self.real = x\n        self.imagined\
    \ = y\n    def getNumbers(self):\n        print(\"Complex numbers are: {0}+{1}j\"\
    .format(self.real, self.imagined))\nObject1 = ComplexNumbers(2, 3) # 创建一个新的 ComplexNumbers\
