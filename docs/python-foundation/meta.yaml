    has been making incredible advances!


    When people think of machine learning, they often imagine sentient robots replacing
    humans with machines (don’t worry, it won’t happen anytime soon), or perhaps flying
    cars that send you food through the air. However, there are plenty of other ways
    in which machine learning has changed our lives since its inception in the 1950s.


