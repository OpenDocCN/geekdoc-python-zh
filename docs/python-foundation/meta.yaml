    card transactions that are not visible to the naked eye. One such thing is called
    a Three-D Secure (3DS) code. 3DS is an authentication method used for online payments
    to verify whether or not the person using your credit card is who they say they
    are. This authentication method uses Google’s reCAPTCHA API (or something similar)
    for identifying and verifying users. The application uses some basic ML algorithms
    to identify which images in these codes were correctly identified by humans and
    which ones were not.


    The result? We could save at least $100,000 a month by identifying fraudulent
    transactions.


    This required a lot of math, but not any more than anyone else would need. The
    problem was that many people these days don’t know how to read or write these
    codes.


    So, we made it possible for our customers to upload an image of their credit card
    label and have the application identify stolen credit cards. This gave us the
    option of sending those cards to the OEMs who manufacture the cards, without having
    to go through all the extra trouble of sending them back to the banks ourselves.
    This saved us both time and money.


    The application is not very hard to use. If you want to try it for yourself, sign
    up for a free account at the following link. This application was designed to
    help businesses protect themselves against credit card fraud.


    ## Customer Service Automation


    When someone is visiting your website on a mobile phone, they are probably in
