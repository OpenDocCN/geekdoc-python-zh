    \n下面是一个for循环示例，显示我们之前创建的数组X中的每个元素：\n\n```\n>>> for i in X:\n    ...print (i)\n\
    2500\n3600\n4900\n6400\n```\n\n因为我们编写的循环很简单，我们可以将其写在一行中，如下所示：\n\n```\n>>> for\
    \ i in X: print(i)\n...\n2500\n3600\n4900\n6400\n```\n\nwhile循环的语法与for循环类似，不同之处在于头部是一个测试或条件，它强制循环运行直到该条件不再满足。While循环的一般格式是：\n\
    \n```\nwhile <constraint>: # condition to run the loop\n    <statements> # body\
