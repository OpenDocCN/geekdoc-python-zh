  md: 'You will notice that it does not matter what order the key:value pairs are
    entered into the dictionary because keys and not indices access them, they are
    always printed in a different order.


    One rule you must observe when creating a dictionary is that the keys must be
    unique, but the values do not need to be. The keys are immutable, while the values
    are maybe of mutable data types such as strings, numbers, or lists.


    # Accessing dictionary key:value pairs


    Dictionary data is not sorted; hence they can be accessed independently without
    indexing as we did with strings, lists, and tuples. The dictionary is a compound
    object type that cannot be sliced or indexed.


    Python uses complex algorithms that map the keys of a dictionary. This makes accessing,
    retrieving, and updating dictionary key:value pairs much faster than other sequential
    object types by this process known as hashing.


    The keys are used to access the dictionary key:value pairs. The next exercise
    demonstrates how we can access the values of dictionary *weather*.


    # Accessing dictionary key:value pairs:


    ```

    1  weather = {["Mon"] = "Cloudy", ["Tue"] = "Sunny", ["Wed" = "Rainy"]}

    2

    3  print (weather["Wed"])

    ```'
