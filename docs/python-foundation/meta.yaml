- md: "We will cover in detail the NumPy library later in this chapter. In the next\
    \ section, we are going to learn how to iterate through an array or matrix and\
    \ how to use if-else statements.\n\n## If Test and Loops in Python\n\nBefore learning\
    \ how to code loops and If statements, it is important to mention that indentations\
    \ are very crucial when programming with Python. Indentations in Python are used\
    \ to indicate a block of code. If you skip indentation, it will give an error:\n\
    \n```\n>>> if 10>5:\n... print('YES')\nFile \"<stdin>\", line 2\nprint(\"YES\"\
    )\n^\nIndentationError: expected an indented block\n```\n\nTherefore, whenever\
    \ using a loop or If the statement, you must use indentation for the instructions\
    \ used within these statements. If statements allow running a set of instructions\
    \ if a condition is met. It can contain other if statements. The general format\
    \ is as follows:\n\n```\nif <condition1>:# if test\n<statements1># block of instructions\
    \ to run when condition1 is true\nelif <condition2>: # optional or additional\
    \ condition\n<statements2>#Instructions to run when condition2 is true\nelse:\n\
    <statements3> Instructions to run otherwise\n```\n\nFor example, let's verify\
    \ if all values stored in X are superior to 10 and display true otherwise display\
    \ false.\n\n```\n>>> if all(X>10):\n    ...print('true')\n    ...else:\n    ...print('false')\n\
    \    ...\n    true\n```\n\nPython allows two-loop commands, namely the while loop\
    \ and for a loop. The for loop is used when the number of iterations is known\
    \ beforehand. On the contrary, the while loop is used when the number of iterations\
    \ is unknown and executes a statement as long as a condition is satisfied. They\
    \ both yield the same results but as a rule of thumb always use for a loop when\
    \ you know exactly the number of iterations. The reason behind this rule is to\
    \ avoid infinite loops.\n\nThe general format of a for loop is:\n\n```\nfor <element>\
    \ in <object>: # assign object items to element\n    <statements> # block of statements\n\
    ```\n\nPython allows stopping running a for loop if a condition is satisfied and\
    \ an optional else block that runs once the loop is over. A continue statement\
    \ is also optional that forces the loop to go from the top and skip the code if\
    \ a condition is satisfied. The format is as follows:\n\n```\nfor <element> in\
    \ <object>: # assign object items to element\n    <statements1> # block of statements\n\
    \    if <condition1>: break # Exit loop and skip else\n    if <condition2>: continue\
