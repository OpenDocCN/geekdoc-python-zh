    Meanwhile, Allen Newell of RAND Corporation proposed the creation of ACM but with
    major involvement from universities and research laboratories. In 1968, the Association
    for Computing Machinery held its annual conference in Los Angeles. A group from
    SRI attended the ACM conference in April and officially founded SRI’s AI Division.
    The group included John McCarthy, Patrick Samuel, Jan Davis, Roger Schank, and
    Richard Fikes. In October 1968 at Dartmouth College, Patrick J. Hayes, John McCarthy
    and Paul M. Samuelson organized a conference on “The Critical Evaluation of Artificial
    Intelligence.” In the fall of 1968, a small lab was created by the Dartmouth students
    in “Project MAC” to further develop the ideas expressed in their paper from the
    previous summer. The lab was called an “arts and sciences division” but was also
    referred to as “AI Lab” after an acronym for Artificial Intelligence Laboratory.


    # How AI and Machine Learning Works


    Artificial Intelligence (AI) and Machine Learning is a type of computer technology
    in which machines are taught to perform tasks typically requiring human intelligence,
    such as visual perception, speech recognition, decision-making, and translation
    between languages. These technologies have widespread applications in the fields
    of robotics and automation.'
  - '[PAGE 292]


    These technologies are currently changing the way people work by automating tasks
    traditionally done by workers. They will also enable new capabilities for humans
    to be more creative than ever before.


    Below is a general overview of how AI and Machine Learning work.


    Artificial Intelligence (AI) can be defined as the theory about when machines
    are designed to process data like a human does, especially when solving problems
    through reasoning and learning capable of performing tasks that normally require
    human intelligence.


    Machine Learning (ML) is an important part of AI. ML involves techniques for creating
    software that can automatically find patterns in data and make predictions based
    on previously acquired knowledge. ML also involves designing systems capable of
    finding solutions to difficult or unknown problems without specific instructions,
    unlike conventional computer programming techniques that provide specific instructions
    for the program to follow. In essence, ML is a subset of AI that focuses on training
    an artificial agent using data collected from the environment to develop algorithms
    capable of learning and reacting to specific situations encountered. It aims to
    give computer systems the ability to learn without being explicitly programmed.


    A few different types of Artificial Intelligence (AI) applications exist:'
- md: 'Artificial Narrow Intelligence (ANI) focuses on specific tasks that can be
    fully defined, like self-driving cars, machine translation, or facial recognition.
    These technologies are called narrow because they only focus on specific tasks
    or subject areas.


    Artificial General Intelligence (AGI), also known as Strong AI, is a hypothetical
    AI system able to perform any intellectual task that a human being can. This is
    not currently possible because the AGI will require an unsupervised learning ability.
    Such a system would be extremely complex and its design would pose serious challenges
    to the developers in terms of complexity and computational power.


    Artificial Super Intelligence (ASI) is a hypothetical AI that significantly exceeds
    human intelligence. One important issue to note is that it will be impossible
    for humans to predict or even understand how ASI works, just as it is impossible
    for us to understand how our brains work. It is also believed that ASI will also
    be uncontrollable.


    Artificial Intelligence (AI) and Machine Learning (ML) are rapidly becoming essential
    components in various aspects of our daily lives, such as manufacturing, supply
    chain management, financial market trading, and many more. AI has the capacity
    to make our IoT-connected world more intelligent than ever before.


    ## What Is Deep Learning


    Deep learning is a subfield of Machine Learning involving algorithms that are
    inspired by the function and structure of the brain known as artificial neural
    networks. It teaches computers to do what is natural to humans, that is, learn
    by example. It is the technology behind the concept of the driverless car.


    Both Neural Networks and Deep Learning are going to give you the best solution
    to any problem that you may come up against when you are working with image, speech,
    and natural language recognition and processing.


    Even without a background in computer science, one can understand what the term
    “Machine Learning” is. Basically, it is a machine that learns from data. As long
    as the machine has the right data input there is a huge number of problems that
    it can solve without any human interference. As long as the machine is given the
    correct training data and the right algorithms, it can perform the necessary functions
    and continue to learn from them for an indefinite period of time.


    The primary tools at the heart of deep learning are input data and algorithms.
    Without the correct data, it is not possible for deep learning to take place.
    For years, machines have functioned without algorithms, but these machines are
    programmed to perform certain functions without change (think vending machines)
    which means the program it started out with will not adapt over time. It will
    still perform the same actions over and over again regardless of the environment
    that surrounds it.


    But for those who don’t fully grasp computer science concepts, the thought of
    deep learning might instill fear instead of excitement. After all, in the past
    few decades, the subject has been approached with a lot of skepticism and doubt.
    Movies have portrayed power-hungry machines bent on taking over the world, and
    news reports about every self-functioning machine failure have been exploited
    to the highest level. It leads some people to believe that machines capable of
    learning are more of a threat to humanity than a help. So, what exactly is this
    kind of technology used for, and do we really have anything to worry about?


    ## Classification


    Deep learning machines have extremely comprehensive databases and sophisticated
    networks that allow for easy classification of many different forms of data. We
    might assume that looking at a picture and identifying its contents is pretty
    basic stuff. To the human eye, images can be classified in a fraction of a second
    but to a machine, which only sees things in terms of math, they contain many different
    elements that must first be sorted out.


    Deep learning, however, makes it possible for machines to classify any type of
    data including video, speech, audio, or handwriting, and analyze it to come up
    with a conclusion that would be similar to that of most humans.


    Imagine a computer system that can automatically create a record of the number
    of vehicles that pass through a certain point on a public road during a set time
    frame. The steps needed for this to happen are immense. Not only would it have
    to hold a huge database of different types of cars, their shapes, and sizes but
    it must also be capable of processing the data and analyzing it to come up with
    an acceptable answer.


    Comparing the data, it receives through its sensors to the data it has stored
    in the database, it can classify the answer with a pretty high level of accuracy.
    While humans could easily identify cars by make and model, the idea of having
    a human standing on a street corner counting and labeling cars would virtually
    be impossible to achieve. Even if someone could position themselves to count,
    humans get tired and need to have frequent breaks. They cannot function continuously
    without stopping. The level of accuracy would be much lower. Yet, automobile manufacturers,
    government agencies, and other industries could find the information extremely
    valuable in making decisions for their business.


    But deep learning goes even further than this. While the system may already be
    programmed with a massive database, as the machine operates it will learn even
    more and increase its knowledge from its experiences. By being programmed to train
    itself, continuous human interaction is not necessary. The machine will learn
    from its mistakes in much the same way as humans do.


    ## Pattern Recognition


    Pattern recognition is probably the oldest form of Machine Learning but is also
    the most fundamental. As of 2015, pattern recognition was one of the most popular
    areas of interest in research labs around the globe. By giving a machine the ability
    to recognize a character or some other object, the potential for Machine Learning
    increased exponentially.


    The ability of a machine to recognize handwritten numbers and letters opens the
    door to a myriad of uses. This ability has been successful in providing insights
    into the complex movements of the environment, weather changes, and even in the
    world of finance. But deep learning involves more than just identifying similar
    characteristics and differences in images. Pattern recognition allows them to
    draw their own conclusions in regard to the images or videos they are analyzing
    and tag them appropriately. Every time they perform this type of analysis, the
    better it will become at identifying similar situations and unusual anomalies
    that could affect the outcome.


    There are many uses for pattern recognition in many areas. It can be used to expand
    the “Internet of Things” by collecting data from any device that is connected
    to the internet. Cities will use it to understand how people navigate through
    their streets, urban planners can make better decisions about the location of
    physical infrastructures, and even in the area of conservation, and it can be
    helpful. Instead of using manpower to go out and count trees, drones can be deployed
    to analyze the number of trees and their health in any given area.


