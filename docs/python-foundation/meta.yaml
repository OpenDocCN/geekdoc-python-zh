    ## Machine Learning Types Process


    ### Supervised Learning?


    In supervised learning, we typically have a training data set with corresponding
    labels. From the relationship that associates the training set and the labels,
    we try to label new unknown data sets. To do so, the learning algorithm is supplied
    with the training set and the corresponding correct labels. Then, it learns the
    relationship between the training set and the labels. That relationship is then
    applied by the algorithm to label the unknown data set. Formally, we want to build
    a model that estimates a function f that relates a data set X (i.e., input) to
    labels Y (i.e., output): Y=f(X). The mathematical relationship f is called the
    mapping function.


    Let’s consider whether we have an ensemble of images and try to label it as a
    cat image or not cat. We first provide as an input to the learning algorithm images
    (X) and labels of these images (cat or no cat). Then, we approximate the relationship
    f that estimates Y according to X as accurately as possible: Y=f(X)+ε, ε is an
    error that is random with a mean zero. Note that we are approximating the relationship
    between the dataset and the labels and we want the error ε as close as possible
    to 0. When ε is exactly 0, that means the model is perfect and 100% accurate,
    which is very rare to build such a model.


    Typically, a subset of available labeled data, which is often 80%, is utilized
    as a training set to estimate the mapping task to build such a model. The extra
    20% of the labeled data is utilized to assess the model’s efficiency and precision.
    At this step, the model is fed with the 20% data, and the predicted output is
    compared to the actual labels to compute the model performance.


    Supervised learning has mainly two functions, namely, classification or regression.
    Classification is used when the output Y is a quality or category data (i.e.,
    discrete variable) whereas regression is used when the output Y is quantity data
    (i.e., continuous numerical values). Classification aims at predicting a label
    or assigning data to a class to which they are most similar. The output Y is a
    binary variable (i.e., 0 or 1). In the example given above, labeling images as
    a cat or no cat is an example of classification. The model can also be a multi-class
    classification where the model predicts different classes. For example, Outlook
    classifies mails in more than a category like Focused, Other, Spam. There are
    a number of algorithms that can be used, such as logistic regression, decision
    tree, random forest, and multilayer perceptron. Linear regression is the simplest
    model for this type of problem.


    The disadvantage of supervised learning is the fact that they cannot process new
    information, and training should be reconsidered when new information is available.
    For instance, we have a set of training images of dogs and cats, and the model
    is trained to label images as dog images or cat images. In other words, we have
    developed a model with two categories of dogs and cats. When this model is presented
    with new images of other animals, for example, a tiger, it labels incorrectly
    the tiger image as a dog or cat image. The model does not recognize the tiger
    image, but it provides a classification of the image in a category. Therefore,
    the model should be trained whenever new information is available.


    In the next sub-sections, we cover the most commonly used algorithms to solve
    regression and classification problems.


    - Linear regression: This is a model typically used, as mentioned before, for
    supervised learning with a regression type problematic where the output is a continuous
    variable. Linear regression describes the relationship between an independent
    variable or multiple variables X and a target output variable Y: Y=WX+B.


    If X is a single variable, then W and B are constant parameters to be determined.
    Otherwise, W is a matrix, and B is the vector to be determined if we are dealing
    with multiple input variables. W is called the coefficients or weights of X, and
    B is called the intercept or Bias.


    In the training process, we try to find the best parameters W and B that provides
    a predicted value of Y that are as similar to the actual values of Y. Then, optimal
    W and B are used to predict Y values from the input X. In this case, how do we
    know what values are optimum for B and W?


    To identify the best parameters, i.e., weight W and bias B, we use what is called
    a cost or loss function J. A cost function quantifies how close the predicted
    value is to the target value of Y. Basically, this function quantifies the model
    error between the estimated and targeted values of Y. This function is to be minimized
    by the learning algorithm. Mathematically the cost function is:


    Loss function =(1/m) *∑(ypredicted-ytarget)2


    The cost function here is the Root Mean Squared Error, abbreviated RMSE, between
    the model’s projected value and the target actual value of Y. Here, we are using
    the least square technique to approximate W and B’s optimum values.


    We can use an optimization algorithm like the Gradient Descent algorithm by updating
    intercept B and coefficient W values in such a way that it minimizes the value
    of the cost function. This algorithm starts with random values of W and B and
    updates these values at each iteration until it reaches a minimum value of the
    cost function J as follows:


    ```

    W=W-α*(δJ/δW)

    B=B- α*(δJ/δB)

    ```


    Where α is a learning rate parameter, δJ is the derivative of the cost or loss
    function. We will learn the importance of the gradient of the cost function in
    the neural network section. The learning rate α is a parameter that determines
    how fast the algorithm learns. If the learning rate parameter has a low value,
    the slower the Weights and the bias parameters are updated. The algorithm will
    then converge very slowly. On the contrary, if the learning rate parameter has
    a high value, the faster the algorithm converges.


