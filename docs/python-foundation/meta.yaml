    \n```python\nfor letter in ‘Programming’: # 遍历字符串\n    print(‘<<*’, letter, ‘*>>’)\n\
    ```\n\n*如果你运行上面的代码，你的输出将是：*\n\n```\n<<* P *>>\n<<* r *>>\n<<* o *>>\n<<* g *>>\n\
    <<* r *>>\n<<* a *>>\n<<* m *>>\n<<* m *>>\n<<* i *>>\n<<* n *>>\n<<* g *>>\n\
    ```\n\n请注意，当 ‘for 循环’ 到达字符串中的最后一个字母时，打印结束。\n\n遍历列表的 for 循环：\n\n```python\n# 遍历列表\n\
    dogs = ['Rottweiler', 'Pug', 'Bulldog', 'Beagle', 'Poodle']\nfor name in dogs:\n\
    \    print('happy dog :', name)\nprint(\"Lovely dogs!\")\n```\n\n运行程序时的输出如下：\n\
    \n```\nhappy dog : Rottweiler\nhappy dog : Pug\nhappy dog : Bulldog\nhappy dog\
    \ : Beagle\nhappy dog : Poodle\nLovely dogs!\n```\n\n在 for 循环中使用 range() 函数\n\n\
    range() 函数是一个内置函数，可以与 ‘for 循环’ 一起使用以获取所需的数字。例如，如果你需要从 1 到 10 的所有数字的总和，你可以用这个程序创建一个\
    \ ‘for 循环’：x = 10\n\n```python\ntotal = 0\nfor num in range(1, x+1):\n    total\
