  md: 'cluster, and the silhouette score will be below. So, you won’t gain any useful
    results.


    To solve this, we can use the “elbow method.” The “elbow method” is a simple but
    effective technique. The method selects optimal k-clusters. Usually, when the
    k-value is increased, improvement in distortion is decreased. The elbow method
    allows us to find the perfect area, known as the elbow point, where improvement
    in distortion is the absolute lowest. This is the point where we stop dividing
    data into multiple clusters. The elbow point is called so because it resembles
    a bent arm, with the elbow being the most optimal point.


    Below is an example of how we can use it. In the example below, we use the elbow
    method after we have applied PCA. The order is important because of PCA dimensionality
    reduction.


    ```

    import NumPy as np

    from sklearn.cluster import KMeans

    from sklearn.datasets import load_digits

    from scipy.spatial.distance import cdist

    import matplotlib.pyplot as plt

    from sklearn.decomposition import PCA

    from sklearn.preprocessing import scale

    digits = load_digits()

    data = scale(digits.data)

    n_samples, n_features = data.shape

    ```'
