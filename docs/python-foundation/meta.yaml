- md: "## Garbage Collection\n\nSometimes, the memory may be occupied by objects that\
    \ are no longer needed. Python clears them from memory automatically, a process\
    \ known as garbage collection. This way, Python can reclaim blocks of memory that\
    \ are no longer in use. The garbage collector is launched when a program is executed,\
    \ and it runs once a reference count to an object has reached a zero. The reference\
    \ count to an object changes with change in the number of aliases pointing to\
    \ it.\n\nThe reference count to an object increases when a new name is assigned\
    \ or when it’s added into a container such as tuple, list or dictionary. Once\
    \ the del statement is used to delete the object, the value of count will decrease,\
    \ or once its reference has gone out of scope or once the reference is reassigned.\n\
    \nExample:\n\n```python\nax = 5 # object created\nbx = ax # Increase the ref.\
    \ count for <5>\nbz = [bx] # Increase the ref. count for <5>\ndel ax # Decrease\
    \ the ref. count for <5>\nbx = 70 # Decrease the ref. count for <5>\nbz[0] = -1\
    \ # Decrease the ref. count for <5>\n```\n\nOne is not capable of noticing once\
    \ the garbage collector has destroyed an orphaned instance. However, in Python,\
    \ a class can implement a destructor named “__del__()” which will be invoked when\
    \ a particular object is almost destroyed. Any non-memory resources which are\
    \ not being used by an instance can be cleaned by the use of this method. The\
    \ __del__() destructor normally shows the class name for the instance that is\
