    # Constants


    In TensorFlow, we create constants using the function constantly. This function
    constant has a signature constant(value, dtype=None, shape=None, name=‘Const’,
    verify_shape=False), in which value is the actual constant value to be used for
    further computation, dtype is a data type parameter such as int8/16, float32/64,
    shape denotes optional dimensions, the name is an optional name for the tensor
    while the last parameter is a Boolean indicating the verification of the shape
    of the values.


    If you need constants with specific values in the training model, use the constant
    object as shown in the example given below:


    ```

    k = tf.constant(5.2, name=“x,” dtype=tf.float32)

    ```


    # Variables


    In TensorFlow, variables refer to in-memory buffers with tensors that should be
    initialized explicitly and used in-graph to maintain state across the session.
    When the constructor is called, the variable is added to the computational graph.


    Variables are mostly used when starting with training models, and they are used
    for holding and updating parameters. The initial values that are passed as the'
