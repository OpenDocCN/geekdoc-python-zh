    value that is greater than seven. These observations are declared with a Boolean
    value. Next, we are going to apply a mask to modify the iris virginica target
    and create a new label for it:


    ```

    In: mask_target = iris[''target''] == ''Iris-virginica''

    In: iris.loc[mask_target, ''target''] = ''MyLabel''

    ```


    Wherever the old iris virginica label appeared, it will now be replaced with “MyLabel”
    as the new label. Take note that for this operation, we need to use the “loc”
    function to gain access to the data with the help of the indexes. Now let’s take
    the next step and see the labels that are contained by the target column:


    ```

    In: iris[''target''].unique()

    Out: array([''Iris-setosa'', ''Iris-versicolor'', ''New label''], dtype=object)

    ```


    Now let’s group all of the columns:


    ```

    In: grouped_targets_mean = iris.groupby([''target'']).mean()

    grouped_targets_mean

    Out:

    In: grouped_targets_var = iris.groupby([''target'']).var()

    grouped_targets_var

    ```


    With this step, we have grouped the columns by using the group by function. Take
    note that this is similar to the “group by” command that you have in SQL. In the
    next input line, we have also applied the mean function, which of course, calculates
    the mean value. Keep in mind that we can apply this method either to a single
    column or multiple columns at the same time. Furthermore, we can use the variance,
    count, or sum functions to gain different values. Take note that the result you
    obtain is also a Pandas data frame, which means you can connect all of these operations.
    In this example, we are grouping all data observations by labels to be able to
    analyze the difference between all the values inside the groups. But what if we
    also have time series to deal with?


    In case you aren’t familiar with time series, you should know that they imply
    the analysis of a collection of data entries that appear in order. This order
    is determined chronologically. In essence, you are dealing with a group of points
    that are distributed in time with an equal space dividing each one of them. You
    will frequently encounter time series because they are used in many fields, usually
    regarding statistical analysis. For instance, when you have to work with weather
    data, you will find a time series regarding the forecasting or the detection of
    sunspots.


    The next challenge, however, is dealing with data entries that contain noise.
    Keep in mind that while these training datasets have been documented and processed
    for years, they tend to be very clean, and in fact, they require very little preprocessing
    and cleaning. However, in the real world, you will frequently deal with noisy
    data. In that case, the first thing we can do is use a rolling function, which
    looks like this:


    ```

    In: smooth_time_series = pd.rolling_mean(time_series, 5)

    ```


    For this process, we are applying the mean function once more. Keep in mind that
    you don’t necessarily have to use the mean. You can also go with the median value
    instead. In addition, you will notice that we request only to access five samples.
    Next, we are going to use the apply function to perform some operations on our
    columns and rows. This is a function that can be used for multiple purposes, so
    let’s start by determining how many nonzero items we have per line:


    ```

    In: iris.apply(np.count_nonzero, axis=1).head()

    Out: 0 5

    1 5

    2 5

    3 5

    4 5

    dtype: int64

    ```


    Finally, the applymap function is then used to perform operations on the elements
    themselves. Let’s say that we need to obtain the value of the length for every
    single string representation inside every cell:


    ```

    In: iris.applymap(lambda el: len(str(el))).head()

    ```


    In order to obtain these values, the cells are casted to a string, and then we
    can determine the length.


    Now that you have an idea about using Pandas for data preprocessing let’s also
    discuss the topic of data selection with the help of the same tool.


    ## Data Selection


    What do we mean when we are referring to data selection? Let’s assume that you
    have a dataset with an index column that you need to access to modify it and work
    with it. For the sake of this example, we are going to presume that the index
    starts from 100, like so:


    ```

    n,val1,val2,val3

    100,10,10,C

    101,10,20,C

    102,10,30,B

    103,10,40,B

    104,10,50,A

    ```


    As you can see, the first row is row number 0, and its index value is 100. Once
    you import the file, you will see an index column, as usual; however, there’s
    the possibility of changing it or using it by mistake. Therefore, it would be
    a good idea to split the column from the rest of the data to avoid making any
    mistakes when you are running low on coffee. We are going to use Pandas to select
    the column and break it apart from the rest:


    ```

    In: dataset = pd.read_csv(''a_selection_example_1.csv'', index_col=0)

    dataset

    ```


    That’s it! Now you can manipulate the values as usual, whether you select the
    values by index, column, or line locations. For instance, you can access the fourth
    value from the fifth line, which in our example has an index value equal to 105.
    Here’s how the selection looks:


    ```

    In: dataset[''val4''][105]

    ```


    You might be tempted to consider this to be a matrix; however, it isn’t, so make
    sure not to make the confusion. In addition, you should always determine the column
    you want to access before you specify the row. This way, you won’t make any mistakes
    when looking to gain access to a certain cell’s value.


    Preparing your data and learning some surface information about it can greatly
    help you along the line, so make sure always to dedicate some time for data munging
