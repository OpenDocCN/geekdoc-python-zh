    The indices start at 0 and end at -1. Also, the plus symbol (+) represents the
    concatenation operator, while the asterisk (*) represents the repetition operator.


    ### Example:


    ```

    #!usrbin/python3

    listA = [ ''john'', 3356, 8.90, ''sister'', 34.21 ]

