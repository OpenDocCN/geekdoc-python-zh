    # What is a tuple?


    Tuples are used to group any number of items into a single sequential compound
    value.


    Whereas lists are used when the length is not known or not fixed, tuples, because
    its sequential elements cannot be changed, are used in situations where the positions
    of each element is crucial to the use of the list.


    # Creating a tuple


    The process of creating tuple objects in Python is the same as those of creating
    objects of any other type, such as numbers, strings, or lists we have already
    covered. Simply place values separated by commas and enclose them in parentheses
    or brackets.


    **The syntax takes this format:**'
