    \ = [\"blue\", \"pink\", \"red\", \"green\", \"yellow\"]\nfor x in colors:\n \
    \   if x == 'green':\n        continue\n    print('Great color :', x)\nprint(\"\
    An amazing loop!\")\n```\n\nWhen you run the program, here’s the output:\n\n```\n\
    Great color : blue\nGreat color : pink\nGreat color : red\nGreat color : yellow\n\
