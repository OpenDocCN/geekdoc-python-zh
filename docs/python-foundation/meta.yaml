  - '[PAGE 497]


    The first row is the feature variable names. The second row is the number of observations
    for each feature variable. As we have already seen at the beginning of this example,
    we have 506 observations in this dataset. The third row is the average value for
    each feature. As described by the distribution function, the average value of
    prices is 23 in $1000’s. The following statistic is the standard deviation. Some
    variables have high standard variation values like the variable “B” which is a
    variable considering the proportion of blacks in the town. High values of standard
    deviation mean that the variable values are widespread. On the contrary, if the
    standard deviation is very low, it means that most of the values are around the
    average value. In other words, the high value of standard deviation means the
    variable ranges are wide, and a low standard deviation means that the variable
    ranges are narrow and close to the average value.


    # What Is Scikit-Learn?


    This is going to provide your users with several supervised and unsupervised learning
    algorithms through a consistent Python interface. It is a fantastic tool that
    you can use to enhance your Machine Learning, and since it is for beginners, even
    those who have never worked with coding in the past will be able to use it.


    David Cournapeau in 2007 as a Google Summer of code project developed the Scikit-learn.
    This process is going to be suitable to use whether you need it commercially or
    academically.'
- md: 'Scikit-learn has been in use as a Machine Learning library inside of Python.
    It is going to come with numerous classifications, regression, and clustering
    to help you get more results. Some of the algorithms that you will get to use
    with this system is going to include DBSCAN, k-means, random forests, support
    vector machines, and gradient boosting, to name a few. And Scikit-learn was designed
    so that it would work well with some of the other popular libraries found in the
    Python code, including with SciPy and NumPy libraries.


    This particular library has been all done by Python but some of the different
    formulas and algorithms that you are going to rely on to make this one work will
    be written with the help of Cython. If you want to make sure that the performance
    that you get is the best with this, you will find that the Scikit-Learn library
    is the one that you need to focus on. It is, especially good at building up some
    of the models that you need with Machine Learning. And since it is an open-sourced
    library, and easy to get started with, you will easily be able to open it up and
    start using it as soon as needed.


    ## Getting Started With Scikit-Learn


    Both the Scikit-Learn and the TensorFlow library are going to need to be set up
    to start with Python Machine Learning. But the first one that we are going to
    work with setting up is the Scikit-Learn. This is a library that you can work
    with if you have Python 2.7 or higher on your system. If those are installed already,
    then you should already have things set up here. It is usually best if you are
    working with Machine Learning that you have one of these newer versions, so installing
    that can help.


    Before you start with installing this library, double-check and see if the SciPy
    and NumPy libraries are installed already—if these are not present, then you need
    to install them first, and then go through and install the Scikit-Learn.


    The installation of these libraries may seem like it is time-consuming; it is
    essential and can do this with the help of pip. This pip is going to be a tool
    that will come along with Python, so can use the pip as soon as the system is
    all installed. From here, you can work with the command below to help you get
    the Scikit-Learn library ready to go:


    From here, the installation will be able to run, and then it will be complete
    once all of that is done. It is also possible for you to go through and use the
    option of conda to help install this library.


    ## Install Scikit-Learn


    Once you notice that the installation of Scikit-learn is complete, it is time
    to do some importation to get it over to the Python program. This step is necessary
    to use the algorithms that come with it. The good news is that the command to
    make this happen is going to be done. You need to go to your command line and
    type in import sklearn.


    If your command can go through without leaving behind an error message, then you
    know that the installation that you did was successful. After you are done with
    all of these steps, your scikit-learn library is on the computer, it is compatible
    with the Python program, and it is going to be ready to use.


    ## Conclusion


    Thank you for making it through to the end of this book. The next step is to start
    using some of the different techniques and tools that we can work through to utilize
    Python Machine Learning. The field of Machine Learning is growing like crazy.
    Many computer programmers are interested in learning more about how this works,
    as well as how they can use it, to see the best results and to help them create
    new technology for the future. Think of it—a few years ago, there were no such
    things as the Alexa device (and other similar software from other companies) that
    could listen to your commands and respond—and that is all thanks to Machine Learning!


    This guidebook took some time to look at both the Python language and Machine
    Learning, as well as some of the different algorithms that you will be able to
    use with both of these. By the time you get to this point, you should be well-versed
    in some of the different algorithms that you can work with, as well as how they
    are going to benefit you based on the Machine Learning project you would like
    to work with!


    While this step-by-step guide demonstrates the most popular Machine Learning algorithms
    and techniques, you also need to hone your research skills. This is a wide field,
    and there is no single source that provides you with everything you need. In addition,
    Machine Learning is constantly evolving, which means you need to know how to keep
    up with it.


    With the help of this book, you already took the most important step by learning
    how to find and import datasets, and you also developed a toolkit that holds enough
    powerful and versatile tools to help you solve many of the most common Machine
    Learning problems. Furthermore, you explored the most important supervised and
    unsupervised Machine Learning algorithms, such as regression, k-means clustering,
    k-nearest neighbors, and the principal component analysis, together with artificial
    neural networks, such as the restricted Boltzmann machine. You have also gone
    step by step through a number of examples written in Python and learned how to
    put these algorithms to use. Machine learning may be challenging, but it is mostly
    about knowing the right tools for the job.


    Keep in mind that this subject is fairly complex and even taking a small step
    to meet this challenge is something you should be proud of. The purpose of this
    book is to teach you the basics and provide you with the necessary tools to help
    you further pursue your Machine Learning goals. Just make sure to put everything
    you learn into practice; otherwise, the foundation you started building will not
    hold for long. This is a field that has nothing to do with talent, only persistence,
    and motivation.


    You have everything you need to pursue your interest in Machine Learning, so continue
    onwards and practice, practice, practice!


    With some knowledge of basic Python, Machine Learning skills, and Python libraries,
    you are now set to launch your first Machine Learning project with Python. Consider
    learning the open-source Python libraries. The scientific Python libraries will
    help you complete easy Machine Learning tasks. However, the choice of some of
    these libraries can be completely subjective and highly debatable by many people
    in the industry.


    Just like how a child learns how to walk is the same with learning Machine Learning
    with Python. You need to practice many times before you can become better. Practice
    different algorithms and use different datasets to improve your knowledge and
    overall problem-solving skills.


    Begin working on simple problem statements and solve them using the different
    algorithms that are mentioned in this book. You can also try to solve these problems
    by identifying newer ways to solve the problem. Once you get a hang of the basic
    problems, you can try using some advanced methods to solve those problems.


    When you are ready to learn more about how the Python coding language and Machine
    Learning work together and when you want to learn how to make Python Machine Learning
    work for your needs, then make sure to check out this guidebook to help you get
    started!'
  mdcn: 'Scikit-learn 一直被用作 Python 中的机器学习库。它提供了众多的分类、回归和聚类功能，以帮助你获得更好的结果。你可以使用的一些算法包括
    DBSCAN、k-means、随机森林、支持向量机和梯度提升等，仅举几例。Scikit-learn 的设计初衷是使其能够与 Python 代码中其他一些流行的库良好协作，包括
    SciPy 和 NumPy 库。


    这个特定的库完全由 Python 编写，但你将依赖的一些不同公式和算法将在 Cython 的帮助下编写。如果你想确保获得最佳性能，你会发现 Scikit-Learn
    库是你需要关注的重点。它尤其擅长构建机器学习所需的一些模型。而且由于它是一个开源库，并且易于上手，你将能够轻松地打开它并在需要时立即开始使用。


    ## Scikit-Learn 入门


    Scikit-Learn 和 TensorFlow 库都需要设置才能开始使用 Python 进行机器学习。但我们将首先设置的是 Scikit-Learn。这是一个你可以使用的库，前提是你的系统上安装了
    Python 2.7 或更高版本。如果这些已经安装，那么你应该已经在这里设置好了。通常，如果你正在使用机器学习，最好使用这些较新版本之一，因此安装它会有所帮助。


    在开始安装此库之前，请仔细检查 SciPy 和 NumPy 库是否已经安装——如果这些不存在，那么你需要先安装它们，然后再安装 Scikit-Learn。


    这些库的安装可能看起来很耗时；这是必不可少的，并且可以在 pip 的帮助下完成。这个 pip 是一个随 Python 一起提供的工具，因此一旦系统全部安装完毕，你就可以使用
    pip。从这里，你可以使用下面的命令来帮助你准备好 Scikit-Learn 库：


    从这里，安装将能够运行，一旦所有这些完成，它就会完成。你也可以使用 conda 选项来帮助安装这个库。


    ## 安装 Scikit-Learn


    一旦你注意到 Scikit-learn 的安装完成，就该进行一些导入操作，将其引入 Python 程序。这一步对于使用其附带的算法是必要的。好消息是，实现这一点的命令将会完成。你需要转到命令行并输入
    import sklearn。


    如果你的命令可以顺利通过而没有留下错误消息，那么你就知道你所做的安装是成功的。在你完成所有这些步骤之后，你的 scikit-learn 库就在计算机上了，它与
    Python 程序兼容，并且可以使用了。


    ## 结论


    感谢你读完本书。下一步是开始使用我们可以处理的一些不同技术和工具来利用 Python 机器学习。机器学习领域正在疯狂发展。许多计算机程序员有兴趣了解更多关于它如何工作以及如何使用它，以获得最佳结果并帮助他们为未来创造新技术。想想看——几年前，还没有像
    Alexa 设备（以及其他公司类似的软件）这样的东西可以听取你的命令并做出回应——这一切都归功于机器学习！


    这本指南花了一些时间来探讨 Python 语言和机器学习，以及你可以与这两者一起使用的一些不同算法。当你读到这里时，你应该对你可以使用的一些不同算法以及它们将如何根据你想要从事的机器学习项目为你带来益处有了深入的了解！


    虽然这个分步指南展示了最受欢迎的机器学习算法和技术，但你也需要磨练你的研究技能。这是一个广泛的领域，没有单一的来源能为你提供所需的一切。此外，机器学习在不断发展，这意味着你需要知道如何跟上它。


    在本书的帮助下，你已经迈出了最重要的一步，学会了如何查找和导入数据集，你还开发了一个工具包，其中包含足够强大和通用的工具，以帮助你解决许多最常见的机器学习问题。此外，你探索了最重要的监督和无监督机器学习算法，例如回归、k-means
    聚类、k-近邻和主成分分析，以及人工神经网络，例如受限玻尔兹曼机。你还逐步完成了一些用 Python 编写的示例，并学会了如何应用这些算法。机器学习可能具有挑战性，但它主要是关于为工作选择正确的工具。


    请记住，这个主题相当复杂，即使迈出一小步来应对这个挑战，你也应该感到自豪。本书的目的是教你基础知识，并为你提供必要的工具，以帮助你进一步追求你的机器学习目标。只需确保将你所学的一切付诸实践；否则，你开始建立的基础将不会持久。这个领域与天赋无关，只与坚持和动力有关。


    你拥有追求机器学习兴趣所需的一切，所以继续前进，练习，练习，再练习！


    掌握了基本的 Python 知识、机器学习技能和 Python 库，你现在就可以用 Python 启动你的第一个机器学习项目了。考虑学习开源 Python
    库。科学的 Python 库将帮助你完成简单的机器学习任务。然而，其中一些库的选择可能完全是主观的，并且在行业中许多人对此有高度争议。


    就像孩子学习走路一样，学习 Python 机器学习也是如此。你需要多次练习才能变得更好。练习不同的算法并使用不同的数据集来提高你的知识和整体问题解决能力。


    开始处理简单的问题陈述，并使用本书中提到的不同算法来解决它们。你也可以尝试通过识别新的解决问题的方法来解决这些问题。一旦你掌握了基本问题，你就可以尝试使用一些高级方法来解决这些问题。


    当你准备好了解更多关于 Python 编程语言和机器学习如何协同工作，以及当你想学习如何让 Python 机器学习满足你的需求时，请务必查看本指南以帮助你入门！'
