    # What Is AI


    Artificial Intelligence (AI) is a field of computer science that studies how general
    intelligence can be designed in computer systems and machines. As machines continue
    to become more intelligent, AI has risen in popularity as a new way of performing
    tasks traditionally associated with humans, such as speech recognition and playing
    board games. The term “artificial” distinguishes these systems from natural intelligence
    which comes from human thought. The word “intelligence” indicates an ability to
    solve problems or perform tasks; this includes the ability to learn without being
    explicitly programmed by hand. The term'
  - '[PAGE 286]


    “artificial intelligence” was coined by John McCarthy in 1955.


    The field of AI research was founded on the claim that a central property of humans,
    intelligence—the sapience of Homo sapiens—can be so precisely described that it
    can be simulated by a machine. This raises philosophical arguments about the nature
    of the mind and the ethics of creating artificial beings endowed with human-like
    intelligence, issues that have been explored by myth, fiction, and philosophy
    since antiquity. Artificial intelligence has been the subject of optimism, but
    has also suffered setbacks and, today has become an essential part of the technology
    industry, providing the heavy lifting for many of the most difficult problems
    in computer science.


    AI research is highly technical and specialized, deeply divided into subfields
    that often fail to communicate with each other. Subfields have grown up around
    particular institutions, the work of individual researchers, the solution of specific
    problems, longstanding differences of opinion about how AI should be done, and
    the application of widely differing tools. The central problems of AI include
    such traits as reasoning, knowledge, planning, learning, natural language processing
    (communication), perception, and the ability to move and manipulate objects. General
    intelligence is still among the field’s long-term goals.


    A lot of people are hearing the term Artificial Intelligence (AI) thrown around
    these days. Some think it’s a good idea,'
- md: 'others disagree. But what is it? And why should you care? I’ll walk through
    what AI is, how it’s driven by computer science and mathematics, and why humanity
    needs to be involved in its development.


    ## What is Artificial Intelligence?


    Artificial intelligence is the machine infrastructure for automating analytical
    tasks that require human intelligence to do them effectively. It was founded on
    the premise that machine analysis could be carried out by a system as well as
    a human being because of developments in computer science and mathematics. The
    success and the power of computer programs like Microsoft Excel and Google AdWords
    have shown that machine algorithms can do a lot more than humans can.


    Without question, machine calculation capabilities are needed to help us greatly
    in many different ways, from mining for information on an ever-increasing abundance
    of open online data to performing intricate tasks in a wide range of industries
    like medicine, science, and manufacturing. Many companies today don’t need manual
    labor. Instead, they hire freelance human workers based on a project’s specific
    needs when human labor simply isn’t needed. Machine calculation capabilities are
    also used to deploy their own automated systems for running robotic cars, production
    lines, and other industrial processes.


    The more we can automate, the fewer people are needed to perform work. This is
    not only good for the labor market, but also for our economic growth. There’s
    always a demand for skilled labor and companies will always have some of the brightest
    and most innovative minds in the business. The trick however is to harness their
    creative energy and make it productive. The only way to do that is by developing
    human-like intelligence in machines so they can think like humans. This means
    machines would be able to perceive, reason, plan, and take action as humans do.
    This will allow them to carry out activities that are beyond the reach of human
    capabilities.


    The field was founded on the claim that a central property of humans—intelligence—can
    be so precisely described that it can be simulated by a machine. The first work
    on this was Marquis de Condorcet’s Sketch for a Physical Philosophy in 1785 and
    Gottfried Leibniz’s 1714 paper “Monadology.” This view was endorsed by Charles
    Babbage, the Father of Computing and the inventor of the mechanical computer.
    Babbage imagined “an ‘intelligent’ machine that would one day be able to think
    and could design other machines just as intelligently.”


    Many other early developers of automata took a similar view. In modern computers,
    there is a distinction between a program and the computer itself; in artificial
    intelligence, there is also a distinction between the software that implements
    algorithms and the machine itself, which may include hardware components. The
    first artificial intelligence research programs were directed at simulating animal
    behavior and producing deductions about human thinking processes. This was based
    on the work of Lorenz Droll in the 1930s, and Alan Newell in the 1950s.


    In 1955, John McCarthy wrote a letter to the American Association for Artificial
    Intelligence outlining an artificial intelligence that he named “Stanford AI.”
    He remarked, “it seems quite likely that machines will have to be constructed
    that not only perform a particular task or profession efficiently and expertly
    but which can also teach people in their respective professions.” In 1957, Stephen
    Cook published “Logic Theory—Its Power and Limits” which suggested that computers
    could solve problems in any area of science or mathematics. This paper was largely
    ignored in B. F. Skinner’s 1957 book “Science and Human Behavior.”


    The concept of artificial intelligence was inspired by the logic theory paper.
    This resulted in the founding of a number of early AI research groups including
    people like Allen Newell and Herbert Simon at Carnegie Mellon University and John
    McCarthy at Stanford University. He coined the term “artificial intelligence”
    to describe what he called “Organized Combinatorial Thinking (OCT).” The primary
    purpose of these groups was to develop an understanding of how people think and
    then build computer programs that simulate that behavior.


    A conference was held at Dartmouth College in 1958 on “The Nature of Intelligence,”
    and included 300 people from 80 organizations. Participants included the Dartmouth
    philosophers Hubert Dreyfus and Elliot Sober, the computer scientists Allen Newell,
    Herbert Simon, John McCarthy (who chaired the meeting), Marvin Minsky, and a number
    of others. The conference outcome was summarized in “The Dartmouth Conference
    Report” which became an influential pamphlet.


    In 1959, John McCarthy organized an academic study group at Stanford University
    called Project MAC with Joseph Weizenbaum leading it. This group generated a report
    called “A-Frame for Turing Machines.” It influenced the work of Allen Newell and
    Herb Simon who were working on the Logic Theorist. They developed an Artificial
    Intelligence program called the General Problem Solver (GPS) in 1960.


    At the same time, John McCarthy took SRI from Project MAC to form his own artificial
    intelligence laboratory at Stanford University, naming it SLAC (Stanford Artificial
    Intelligence Laboratory). While GPS was focused on narrow problems, the Stanford
    lab was focused on general problems using their LISP programming language. In
    1962, this lab had a debate tournament with a program called DIPPR between GPS
    and Guttman’s LISP Program 9–40 which would predict human responses to a set of
    verbal questions based on logic variables.


    In 1966, the International Joint Conference on Artificial Intelligence (IJCAI)
    was held in Detroit. Herb Simon, John McCarthy, and Marvin Minsky co-chaired the
    first committee. They started advancing a proposal for a “Research Institute for
    Advanced Computer Science.”


    Meanwhile, Allen Newell of RAND Corporation proposed the creation of ACM but with
    major involvement from universities and research laboratories. In 1968, the Association
    for Computing Machinery held its annual conference in Los Angeles. A group from
    SRI attended the ACM conference in April and officially founded SRI’s AI Division.
    The group included John McCarthy, Patrick Samuel, Jan Davis, Roger Schank, and
    Richard Fikes. In October 1968 at Dartmouth College, Patrick J. Hayes, John McCarthy
    and Paul M. Samuelson organized a conference on “The Critical Evaluation of Artificial
    Intelligence.” In the fall of 1968, a small lab was created by the Dartmouth students
    in “Project MAC” to further develop the ideas expressed in their paper from the
    previous summer. The lab was called an “arts and sciences division” but was also
    referred to as “AI Lab” after an acronym for Artificial Intelligence Laboratory.


    ## How AI and Machine Learning Works


    Artificial Intelligence (AI) and Machine Learning is a type of computer technology
    in which machines are taught to perform tasks typically requiring human intelligence,
    such as visual perception, speech recognition, decision-making, and translation
    between languages. These technologies have widespread applications in the fields
    of robotics and automation.


    These technologies are currently changing the way people work by automating tasks
    traditionally done by workers. They will also enable new capabilities for humans
    to be more creative than ever before.


    Below is a general overview of how AI and Machine Learning work.


    Artificial Intelligence (AI) can be defined as the theory about when machines
    are designed to process data like a human does, especially when solving problems
    through reasoning and learning capable of performing tasks that normally require
    human intelligence.


    Machine Learning (ML) is an important part of AI. ML involves techniques for creating
    software that can automatically find patterns in data and make predictions based
    on previously acquired knowledge. ML also involves designing systems capable of
    finding solutions to difficult or unknown problems without specific instructions,
    unlike conventional computer programming techniques that provide specific instructions
    for the program to follow. In essence, ML is a subset of AI that focuses on training
    an artificial agent using data collected from the environment to develop algorithms
    capable of learning and reacting to specific situations encountered. It aims to
    give computer systems the ability to learn without being explicitly programmed.


    A few different types of Artificial Intelligence (AI) applications exist:'
  mdcn: '其他人则持不同意见。但这究竟是什么？你又为何应该关注？我将逐步介绍人工智能是什么，它如何由计算机科学和数学驱动，以及为何人类需要参与其发展。


    ## 什么是人工智能？


    人工智能是用于自动化分析任务的机器基础设施，这些任务通常需要人类智能才能有效完成。其建立的前提是，由于计算机科学和数学的发展，机器分析可以像人类一样由系统执行。像Microsoft
    Excel和Google AdWords这样的计算机程序的成功和强大功能表明，机器算法能做的事情远比人类多得多。


    毫无疑问，机器计算能力在许多不同方面极大地帮助了我们，从挖掘日益丰富的开放在线数据中的信息，到在医学、科学和制造等广泛行业中执行复杂任务。如今许多公司不再需要体力劳动。相反，当人力劳动根本不需要时，他们会根据项目的具体需求雇佣自由职业者。机器计算能力也被用于部署他们自己的自动化系统，以运行机器人汽车、生产线和其他工业流程。


    我们能自动化的程度越高，执行工作所需的人力就越少。这不仅对劳动力市场有利，对我们的经济增长也有利。对熟练劳动力的需求总是存在的，公司也总会拥有一些业内最聪明、最具创新精神的人才。然而，关键在于如何利用他们的创造力并使其富有成效。实现这一目标的唯一途径是在机器中开发类人智能，使其能够像人类一样思考。这意味着机器将能够像人类一样感知、推理、规划和采取行动。这将使它们能够执行超出人类能力范围的活动。


    该领域的建立基于这样一个主张：人类的一个核心属性——智能——可以被如此精确地描述，以至于它可以被机器模拟。这方面的首批工作是孔多塞侯爵1785年的《物理哲学纲要》和戈特弗里德·莱布尼茨1714年的论文《单子论》。这一观点得到了计算机之父、机械计算机发明者查尔斯·巴贝奇的认可。巴贝奇设想“一台‘智能’机器，有一天能够思考，并能像人类一样智能地设计其他机器。”


    许多其他早期的自动机开发者也持类似观点。在现代计算机中，程序和计算机本身之间存在区别；在人工智能中，实现算法的软件和机器本身（可能包括硬件组件）之间也存在区别。第一批人工智能研究项目旨在模拟动物行为并推导人类思维过程。这基于洛伦兹·德雷尔在1930年代和艾伦·纽厄尔在1950年代的工作。


    1955年，约翰·麦卡锡写信给美国人工智能协会，概述了他命名为“斯坦福AI”的人工智能。他指出，“似乎很有可能需要构建这样的机器：它们不仅能高效且专业地执行特定任务或职业，还能在其各自的职业领域教导人们。”1957年，斯蒂芬·库克发表了《逻辑理论——其力量与局限》，该文提出计算机可以解决科学或数学任何领域的问题。这篇论文在B.F.斯金纳1957年的著作《科学与人类行为》中很大程度上被忽视了。


    人工智能的概念受到了逻辑理论论文的启发。这导致了多个早期AI研究小组的成立，包括卡内基梅隆大学的艾伦·纽厄尔和赫伯特·西蒙，以及斯坦福大学的约翰·麦卡锡等人。他创造了“人工智能”一词来描述他所谓的“有组织的组合思维（OCT）”。这些小组的主要目的是理解人类如何思考，然后构建模拟这种行为的计算机程序。


    1958年，在达特茅斯学院举行了一场关于“智能本质”的会议，有来自80个组织的300人参加。与会者包括达特茅斯哲学家休伯特·德雷福斯和埃利奥特·索伯，计算机科学家艾伦·纽厄尔、赫伯特·西蒙、约翰·麦卡锡（主持会议）、马文·明斯基以及其他许多人。会议成果总结在《达特茅斯会议报告》中，该报告成为一本有影响力的宣传册。


    1959年，约翰·麦卡锡在斯坦福大学组织了一个名为Project MAC的学术研究小组，由约瑟夫·魏岑鲍姆领导。该小组生成了一份名为“A-Frame for
    Turing Machines”的报告。它影响了艾伦·纽厄尔和赫伯特·西蒙的工作，他们当时正在研究逻辑理论家。他们在1960年开发了一个名为通用问题求解器（GPS）的人工智能程序。


    与此同时，约翰·麦卡锡将SRI从Project MAC中分离出来，在斯坦福大学建立了自己的人工智能实验室，命名为SLAC（斯坦福人工智能实验室）。虽然GPS专注于狭义问题，但斯坦福实验室则专注于使用其LISP编程语言解决一般问题。1962年，该实验室举办了一场辩论锦标赛，一个名为DIPPR的程序在GPS和古特曼的LISP程序9-40之间进行对决，后者将基于逻辑变量预测人类对一系列语言问题的反应。


    1966年，国际人工智能联合会议（IJCAI）在底特律举行。赫伯特·西蒙、约翰·麦卡锡和马文·明斯基共同担任首届委员会主席。他们开始推进成立“高级计算机科学研究所”的提议。


    与此同时，兰德公司的艾伦·纽厄尔提议创建ACM，但需要大学和研究实验室的大力参与。1968年，计算机协会在洛杉矶举行了年会。一个来自SRI的小组在4月参加了ACM会议，并正式成立了SRI的AI部门。该小组包括约翰·麦卡锡、帕特里克·塞缪尔、简·戴维斯、罗杰·尚克和理查德·菲克斯。1968年10月，在达特茅斯学院，帕特里克·J·海斯、约翰·麦卡锡和保罗·M·萨缪尔森组织了一场关于“人工智能批判性评估”的会议。1968年秋天，达特茅斯学生在“Project
    MAC”中创建了一个小型实验室，以进一步发展他们前一个夏天论文中表达的想法。该实验室被称为“艺术与科学部”，但后来也被称为“AI实验室”，这是人工智能实验室的缩写。


    ## 人工智能和机器学习如何工作


    人工智能（AI）和机器学习是一种计算机技术，它教导机器执行通常需要人类智能的任务，例如视觉感知、语音识别、决策和语言翻译。这些技术在机器人和自动化领域有着广泛的应用。


    这些技术目前正在通过自动化传统上由工人完成的任务来改变人们的工作方式。它们还将使人类能够拥有前所未有的创造力。


    以下是人工智能和机器学习工作原理的概述。


    人工智能（AI）可以定义为关于机器被设计成像人类一样处理数据的理论，特别是在通过推理和学习解决问题时，能够执行通常需要人类智能的任务。


    机器学习（ML）是AI的重要组成部分。ML涉及创建能够自动发现数据模式并基于先前获得的知识进行预测的软件的技术。ML还涉及设计能够在没有特定指令的情况下找到困难或未知问题解决方案的系统，这与提供特定指令供程序遵循的传统计算机编程技术不同。本质上，ML是AI的一个子集，专注于使用从环境中收集的数据来训练人工代理，以开发能够学习和对遇到的特定情况做出反应的算法。它旨在赋予计算机系统无需显式编程即可学习的能力。


    存在几种不同类型的人工智能（AI）应用：'
