    The model is 82 % accurate. Now let’s look at the confusion matrix. This matrix
    is very useful in appraising the machine learning classifier’s efficiency as the
    one we developed for the Titanic data.


    First, let’s define what a confusion matrix is. The confusion matrix is a table
    providing a combination of predicted values and true values. In the example, we
    are working on we have predicted and true values of 0 and 1, i.e., survived or
    not survived. The confusion matrix will provide the frequency of estimated values
    as 1 when true values are equal to 1, frequency of estimated values of 1 whereas
    true values are equal to 0, frequency of estimated values of 0 whereas true values
    are 1, and frequency of estimated values of 0 when true values are also 0. Basically,'
  merge: -1
  pgno: 487
- img_proc: true
  md: 'the confusion matrix describes the situations when the model predicts a “true
    positive” when the positive value predicted is the actual positive value. It also
    includes a prediction of a “false positive” if it’s a positive value while the
    actual value is negative, and it predicts a negative value while the actual value
    is positive. Finally, it is “true negative” when it predicts a negative value,
    and the actual value is negative (true negative). Theoretically, the table is
    as follows:


    # Confusion matrix:


    | Predicted/True values | Positive (1) | Negative (0) |

    | :--- | :--- | :--- |

    | Positive (1) | (1|1) true positive | (1|0) false Positive |

    | Negative (0) | (0|1) false negative | (0|0) true negative |


    Now let’s look at the confusion table of our model.


    ```

    from sklearn.metrics import confusion_matrix

    confusion_matrix(Survived_test, Survival_Predictions)

    ```


