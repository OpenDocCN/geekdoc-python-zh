    Instead, it merely needs to be compiled once and then it can be executed on various
    devices. For instance, if a program is written in C or C++ that’s compiler-based,
    it gets converted from the source code (into a format that humans can read) to
    binary code (0’s and 1’s of the machine language) using different flags and options
    that are platform-specific. This binary code must then be fed into the device’s
    memory using a linker or a loader and then it can start running. This linker,
    loader, or compiler is an additional overhead that can be easily avoided by using
    a language like Python. Python doesn’t compile the source code into a binary format,
    and it is designed in such a manner that it can be directly executed from the
