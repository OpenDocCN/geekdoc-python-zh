    The ability to make decisions is a critical component of most computer programs.
    Another is the ability to repeat or loop the program through a specific set of
    tasks.

    All programs, other than those that perform a specific task and exit, contain
    at least one loop. Typically, this is the main loop, where the program continually
    loops, waiting for user or object input for it to act upon.

    Additionally, loops can be used to apply repetitive processes on objects using
    a compact set of instructions.


    Python offers two types of loops.


    The for loop and the while loop.

    They both allow for the repetitive looping through a specific operation but differ
    in how they test if the loop should continue to be processed.


    For Loop'
