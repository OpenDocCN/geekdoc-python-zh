    It is clear that Python is a major player in the world of Machine Learning. The
    future looks bright for this language and its ability to help scientists explore
    the various facets of artificial intelligence programming.


    ## Pyenv


    Pyenv is the command-line tool for managing these versions of Python. Pyenv allows
    you to run multiple python interpreters at the same time. It also helps you install,
    manage, and switch between multiple versions of Python on your computer.


    ## What Is Pyenv


    Pyenv is a Ruby program that makes it easy to install several different versions
    of Python side-by-side on your computer and then use them in one or more shell
    scripts. This can be really useful for testing different packages against a different
    version of python without much hassle because it saves us from having to manually
    update our sys-path every time we want to try something out.


    ## Why Do We Need Pyenv


    Managing your python versions can be a pain in the neck but it is not just about
    managing multiple versions of Python. It is about making your Machine Learning
    environment more harmonious for building Machine Learning systems. Let me tell
    you how I use it


    Organizes different versions of Python, when one project uses Python 2.7 and another
    project uses Python 3.6, I have to have both these versions on my machine so that
    I can test them out easily and quickly and this is where Pyenv comes in handy.


    If you do machine learning and need to run R, Julia, Lasagne, or any other package
    on your machine, Pyenv simplifies this by having a way to manage multiple versions
    of these packages.


    It also allows you to use many python versions that are not installed on the system
    when you want to test something out. Better version tools make it easier for me
    to try out different data science tools on my python environment without doing
    any sys-path updates which become very cumbersome.


    Uses virtualenvwrapper, which is another tool that helps manage multiple versions
    of python in a single directory. This comes in handy when we have Python libraries
    that we want to install or use with different versions.


    ## Installing Pyenv


    The quick start guide is your friend.


    Start by installing python 2.7 and 2.7-dev on your machine. Then install the command-line
    tool for Python that you are going to use Pyenv to manage versions—We are going
    to use the clang version of the compiler of Python from https://github.com/sympy/sympy/blob/master/compile_docs/install_clang_python.md


    Once it is installed you can edit this file—Importantly, you have to change the
    first line as well as other lines according to what is available on your system.


    This file is edited by the user, and should not be checked into a version control
    system but note you have to change the first line as well as other lines according
    to what is available on your system.


    Then you can run the following command on your machine to install all the dependencies
    for python and clang.


    ```

    pyenv install 2.7 && \

    pyenv install -s /usr/bin/python2.7 && \

    pyenv install -s /usr/bin/python2.7-dev

    ```


    If you don''t have the C Compiler installed on your system, you can install it
    from: https://cprogramming.net/install-compiler.html


    You will use this to compile the Python packages that you want to install or use
    with a different version of Python on your system. This is a simple way of managing
    multiple versions of python on your machine. You can even get into a situation
    where you run multiple versions of python within one directory if it is built
    into your commands or if you want.


    Pyenv is a Python wrapper around the different versions of Python that you have
    installed on your system. The advantage of this is that you can have multiple
    versions of python in different virtual environments and then install packages
    into each of those environments. Pyenv uses Virtualenvwrapper to create these
    virtual environments but how it operates is trivial and easy to understand once
    you get to know it.


