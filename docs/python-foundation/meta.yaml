    There are many concepts like predictive analytics and regression analysis that
    need to be understood. There is also a difference between data analysis and ML
    algorithms. Here we will try to shed some light on the differences between these
    two processes with an easy example.


    The following example explains the difference between data analysis and the machine
    learning process in a simple way for people who do not have any knowledge about
    it before.


    - **Data analysis:** Data analyst or statistician gathers raw data from different
    sources, organizes and presents this information using charts, graphs, etc., detects
    trends (changes in variation), and tries to find something relevant from the data
    by checking a hypothesis against the null hypothesis (H1 and H0). In short, data
    analysis is basically a process of finding patterns/continuums in data (predictive
    analytics).


    - **Machine learning:** This is a process that helps to make predictions based
    on the data. Here, in machine learning, we analyze the datasets, recognize patterns,
    and then make predictions about variables. Here we have many algorithms like SVM
    (Support vector machines), Decision trees, Random Forests, etc. The output of
    ML algorithms are functions that derive from the input data and help to predict
    the values of unknown parameters or features. When there is a single training
    set with known values for all inputs and outputs that have been found as expected
    from different datasets then it is called Supervised Learning where the output
    of this algorithm gives us true values for all variables. However, in case the
    data is not well organized or the labels are not given, then it is called unsupervised
    learning.


