    \ 时用作参数。\n\n### 文档字符串\n\n紧跟在函数头之后的第一个文本字符串称为文档字符串，简称 `docstring`。函数的这一部分是可选的，简要说明函数的功能。在创建新函数时包含描述性的文档字符串是一个好习惯，因为你或以后查看你代码的其他程序员可能需要它来理解函数的功能。始终为你的代码编写文档！\n\
