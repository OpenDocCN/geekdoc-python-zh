- md: '## Python list basic


    What is a list?

    A list is an ordered sequence of items enclosed in square brackets [] and separated
    by commas. A list is mutable, meaning that the values of its items and their index
    locations can be changed.


    ```

    list = [item0, item1, item2, ... ,item-2, item-1]

    ```


    Lists are one of the most important data structures in Python that every functional
    program must-have. It is a good thing that they are also one of the simplest to
    manipulate.

    Just like with the strings we looked at in the previous chapter, lists can be
    accessed with indexes that begin at 0 for the first item to -1 for the last item.


    ### Creating a list

    To create a list in Python, simply enclose one or more comma-separated values
    between square brackets and assign it a value.


    ```

    Subjects = ["Math", "Physics", "Chemistry", "Biology", "History"]

    myLists = ["Pencil", "Scissor", 2020, ["Fruits", "Snacks"], "Fare"]


    print(Subjects)

    print(myLists)

    ```


    Did you notice that the second list in Exercise 12 has another list inside it?
    That type of list is known as a nested list, a list containing one or more lists
    in it.

    Just like the string type we looked at in the previous chapter, a list type is
    a sequential data type in Python that we will learn to slice, concatenate, and
    iterate, and so on. First, though, let us look at how to access its values.


    ### Accessing list values

    We will use the square brackets to slice the items in a list then access them
    by referring to their indexed positions on the list.


    ```

    Subjects = ["Math", "Physics", "Chemistry", "Biology", "History", "Art"]


    print("Print Subjects[0:2]:", Subjects[0:2])

    print("Print Subjects[2:]:", Subjects[2:])

    print("Print Subjects[-3:-1]:", Subjects[-3:-1])

    ```


    You will discover that the slicing and indexing methods we learned when working
    with strings are used in the same way with lists. Perhaps you can practice creating
    a larger list then knock yourself out, trying out all the slicing and accessing
    operations we have learned so far.


    ### Updating and deleting list values

    We already mentioned that lists in Python are mutable, meaning that we can update
    the contents and the order of its sequential items. You can update a single or
    multiple elements of a list using an assignment operator (=) with the list name
    and index as the left operand and the new value as the right operand.


    ### Adding list items

    ```

    Subjects = ["Math", "Physics", "Chemistry", "Biology", "History", "Art"]


    print("Current list items:", Subjects)

    Subjects[3] = "Government"

    Subjects[1] = "French"

    del Subjects[-1]

    print("New list items:", Subjects)

    ```


    When you run Exercise 14, you will notice that the list item “Government” is added
    at index 3 to replace “Biology” and the second item “Physics” at index [1] is
    replaced with “French”. We also used the **del** statement to remove the last
    item in our list. An alternate approach in deleting an item from a list is the
    use of the **remove()** method, which we will cover briefly below.


    ### Basic list operations with built-in functions and methods

    There are a lot more operations we can carry out on a list, including concatenation
    (joining together using +) and iteration (using the asterisk *).


    #### More operations on a list

    This exercise will help reinforce what you already know about sequences by applying
    them to a list.


    ```

    cont = ["Asia", "Africa", "America", "Europe", "Australia"]

    oceans = ["Pacific", "Indian", "Atlantic"]


    print("Length of list 1:", len(cont))

    cont[2] = "North America"

    cont.append("South America")

    print("New length of list 1:", len(cont))

    print("List 1 + List 2:", cont + oceans)


    oceans.remove("Indian")

    print(oceans)

    print("List 2 * 3: ", oceans * 3)

