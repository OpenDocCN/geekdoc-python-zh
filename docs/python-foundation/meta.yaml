    **Tuples**

    Tuples are similar to lists, and creating them is quite simple, one has to put
    commas to separate values, and these values can also be enclosed in parenthesis.
    For example **tup1 = (‘chemistry’, ‘physics’, 1998, 2000); tup2 = (7, 8, 9); tup3
    = “x”, “y”, “z”;** Listed below are some of the basic features of a tuple: **a)**
    For writing an empty tuple two parentheses is used – **tup1 = (); b)** Even of
    the tuple contains the single value one has to include comma—**tup1 = (50,);**
    c) The indices in tuple start with at 0 and slicing can also be done.


    d) Square brackets are used to access values in tuples e) One cannot change or
    update the values in tuples f) Removing tuple element is not possible; however,
    one can use del to remove entire tuple.'
