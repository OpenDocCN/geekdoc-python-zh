    # Data Analysis'
- md: 'While we are on the topic of working with data science, we also need to take
    a look at some of the data analysis. This is basically a subset of data science,
    and it is going to be where we will handle the data that we are gathering, which
    comes in from many different sources, and then using algorithms to help us figure
    out what all of this data means.


    You can use all of the data that we want, and we can fill up a lot of data warehouses
    if we would like, but if you don’t understand what the data is telling us, then
    the data is not going to matter all that much, and your company will not be able
    to use it. This is where we will be able to grab the process of data analysis
    and make it come into play for us.


    To help us get started, data analytics is going to be the process or the science
    of taking the raw data that we have and then analyzing it to help us make some
    good conclusions about all of that information. Many techniques and the processes
    used with this have been automated into algorithms and other mechanical processes
    that can work over the data in its raw form before turning it into something that
    we can read through and understand better than before.


    When the data analytics are used properly, it is going to be used to help us see
    some of the metrics and the trends that we may miss out on in some of the other
    situations out there because there is just so much data that we are gathering
    and holding onto. This information is then going to be what we can use to optimize
    processes to help increase how efficient a system or a business can be overall.


    Now that we know a bit about the broad meaning of data analytics, it is time to
    get into some of the different parts of it, and how we can use it to our advantage.
    The term data analytics is going to be broad, and it includes many diverse types
    of data analysis. Any type of information that can be subjected to techniques
    of data analytics to get inside that can then be used by humans to improve something
    about their business will fall under this umbrella.


    Let’s look at an example of this. Many manufacturing companies are going to spend
    time recording the work queue, downtime, and run time for the different machines
    that they are working with. They will then take the data that contains this information,
    and use it to better plan how and when the workloads should happen. This helps
    the machines get as close to their peak capacity as possible, saving time and
    money in the process.


    This is just one of the tasks that data analytics is going to be able to help
    out with, even though preventing bottlenecks in production is a good thing to
    pay attention to. Gaming companies are going to be able to use this process to
    set up the right reward schedules for players, which are done in a way that ensures
    the majority of players stay active in the game rather than dropping off and rarely
    using it. Another example is a content company. They can use the various parts
    of data analytics to keep their customers clicking, watching, or even reorganizing
    the content so that they can get the clicks and the views that they need.


    As we are working through this process, we always have to keep in mind that the
    data analysis that we are working on here is a pretty complex process, and not
    one that we can just glance at and come up with the answers that we want. If you
    do this, then it is likely that you will end up missing out on important information,
    especially when you work with one of the larger sets of data.


    Following the right steps along the way can make a big difference in what we are
    going to see with this data analysis. And some of the different steps that we
    can use here will include the following:


    We start this process by determining the requirements of the data or how the data
    has been grouped. There are a lot of possibilities here, including the data being
    separated by things like gender, income, demographics, and age. The values of
    the data could also be numerical, or they may be divided up by category as well.


    Then in the second step of this is the process of collecting our data. There are
    a ton of different sources where you can get all of this information. It could
    be from your employees, from sources in the environment, online sources like surveys
    and social media, and even from your computer system.


    Once the data has been collected, and you are sure you have the data that you
    need, it is time to organize the data. Since you are collecting it from a variety
    of sources, you have to make sure that it is organized in a manner that makes
    sense, and one that the algorithm will be able to read through quickly and find
    the trends to make predictions from when you get to that step.


    You can choose what method you would like to use when you organize the information.
    You can work with a spreadsheet or try some kind of software that is good at handling
    data that is statistical.


    Once you have been able to organize the data the way that you would like, it is
    time to clean it all up before the analysis happens. This means that the data
    scientist has to go through and scrub the data and check that there are no errors
    or duplications that are found in the information, or that the data is not incomplete.
    This step takes some time, but it ensures that everything is fixed and ready to
    go before you even start.


    The key thing that we have to remember here is that it is going to be the science
    that we can use to use raw data, analyze it, and then make some good conclusions
    on this information as well. The processes and the techniques that are used in
    this kind of thing is going to be automated in many cases, and you will see that
    when we work with the right algorithm, it will be able to take all of that raw
    data and turn it into something that humans can consume. And the main reason that
    a business would want to use this kind of process, and to analyze the data, is
    because it is going to be so useful when it is time to optimize your customer
    service, your performance, and how you can help your performance.


    ## Why Does the Analysis of Data Matter?


    While we are here, we need to take a moment to look at why this data analysis
    is going to be so important, and why a business would like to go through these
    algorithms and more to learn from that data they have been able to gather in the
    first place. These companies find that they can use the insights and predictions
    that are in the data, but when there is such a large amount of data, and all of
    that data comes to them from a variety of sources, it is going to need a lot of
    work to sort through—too much work to try and do manually.


    The process of data analytics is something that can be helpful to any business
    no matter what industry they are in because it will help them to optimize their
    performance. It can also help them to work on their business model and can make
    it easier for them to identify some methods that are more efficient for reducing
    costs and getting things figured out.


    In addition to all of this, a company will be able to take that data analysis
    and make decisions that are going to help propel them into the future. This analysis
    is also going to help them to learn more about some of the customer trends that
    are out there and can help you to offer new services and products that are going
    to work for your customers as well.


    ## Choices in Data Analysis


    The next thing that we need to spend some of our time here is to figure out what
    kinds of analysis are open for you to work with as well. There are a lot of variations
    that come with the data analysis, and you can pick the one that works the best
    for your needs. There are a number of these, but we are going to focus on some
    of the ones that you are most likely to use when you first get started on this
    whole process. The four basic types that a beginner in data analysis can focus
    on, and that most data scientists are going to work with will include the following:


    - Descriptive analytics. This is one that will take the time to describe what
    has happened in the data over a chosen period. You may look at things like whether
    the number of views has gone up, or if the sales for your company are higher or
    lower than they were in the previous month for a product.

    - Diagnostic analytics. This is the one that will focus more on why something
    has happened or the root of how your business is doing. This one is helpful, but
    it will involve data inputs that are more diverse and a bit of hypothesizing in
    the process. For example, did you have a slow sales week because the weather was
    terrible and no one went out shopping? Or did something go wrong with one of your
    marketing campaigns, and that is why sales are struggling?'
  mdcn: '当我们讨论数据科学相关话题时，也需要关注一些数据分析的内容。这基本上是数据科学的一个子集，我们将在此处理从多个不同来源收集的数据，并运用算法来帮助我们理解这些数据的含义。


    我们可以使用所有想要的数据，甚至可以填满许多数据仓库，但如果不理解数据所传达的信息，那么这些数据就意义不大，公司也无法有效利用它。这正是我们能够运用数据分析流程并使其发挥作用的地方。


    为了帮助我们入门，数据分析是处理原始数据并进行分析，从而得出有价值结论的过程或科学。许多技术和流程已被自动化为算法和其他机械过程，可以在将原始数据转化为更易读、更易理解的形式之前对其进行处理。


    正确使用数据分析时，它能帮助我们发现一些指标和趋势——这些可能在其他情况下被忽略，因为我们收集和存储的数据实在太多。这些信息随后可用于优化流程，提升系统或企业的整体效率。


    现在我们对数据分析的广义概念有了基本了解，接下来将深入探讨其不同组成部分以及如何利用它为我们服务。数据分析这一术语涵盖范围广泛，包含多种不同类型的分析。任何能够通过数据分析技术获取洞察，并用于改进业务的信息，都属于这一范畴。


    让我们看一个例子。许多制造公司会记录不同机器的工作队列、停机时间和运行时间。然后，他们会利用这些数据更好地规划工作负载的安排方式和时间。这有助于机器尽可能接近其峰值产能，从而节省时间和成本。


    这只是数据分析能够帮助完成的任务之一，尽管防止生产瓶颈确实值得关注。游戏公司可以利用这一流程为玩家设置合适的奖励机制，确保大多数玩家保持活跃，而不是流失或很少使用。另一个例子是内容公司。他们可以利用数据分析的各个部分，保持用户点击、观看，甚至重新组织内容，以获得所需的点击量和观看量。


    在处理这一过程时，我们必须始终牢记，数据分析是一个相当复杂的过程，不能仅仅浏览一下就得出想要的答案。如果这样做，很可能会错过重要信息，尤其是在处理较大数据集时。


    遵循正确的步骤会对数据分析结果产生重大影响。我们可以使用的一些不同步骤包括：


    我们首先确定数据的需求或数据的分组方式。这里有很多可能性，包括按性别、收入、人口统计和年龄等对数据进行分类。数据值也可能是数值型的，或者按类别划分。


    第二步是收集数据。有许多不同的来源可以获取这些信息，可能来自员工、环境来源、在线调查和社交媒体等网络来源，甚至来自计算机系统。


    一旦收集到数据并确认拥有所需数据，就需要对数据进行组织。由于数据来自多个来源，必须确保其组织方式合理，以便算法能够快速读取并发现趋势，为后续预测步骤做好准备。


    在组织信息时，您可以选择使用电子表格或擅长处理统计数据的软件。


    组织好数据后，需要在分析前进行清理。这意味着数据科学家必须检查并清理数据，确保没有错误、重复或不完整的情况。这一步需要一些时间，但能确保在开始分析前所有数据都已准备就绪。


    我们需要记住的关键点是，数据分析是一门利用原始数据、进行分析并得出有价值结论的科学。在许多情况下，这一过程所使用的技术和流程都是自动化的。当使用合适的算法时，它能够将所有原始数据转化为人类可理解的形式。企业希望使用这一流程并分析数据的主要原因是，它在优化客户服务、提升绩效以及帮助改进表现方面非常有用。


    ## 为什么数据分析很重要？


    在此，我们需要花点时间探讨数据分析为何如此重要，以及企业为何希望通过这些算法从收集的数据中学习。这些公司发现，他们可以利用数据中的洞察和预测，但当数据量巨大且来源多样时，整理这些数据需要大量工作——多到无法手动完成。


    数据分析流程对任何行业的企业都有帮助，因为它能帮助优化绩效。它还能帮助企业改进商业模式，更容易识别更高效的方法来降低成本并解决问题。


    此外，公司可以利用数据分析做出推动未来发展的决策。这一分析还能帮助他们了解客户趋势，从而提供适合客户需求的新服务和产品。


    ## 数据分析的选择


    接下来我们需要花时间了解有哪些分析类型可供选择。数据分析有许多变体，您可以选择最适合需求的一种。虽然类型众多，但我们将重点介绍初学者最可能使用的几种。数据分析初学者可以关注的四种基本类型，也是大多数数据科学家会使用的，包括：


    - 描述性分析。这种分析会描述在选定时间段内数据发生的变化。例如，查看浏览量是否增加，或某产品的销售额相比上月是上升还是下降。

    - 诊断性分析。这种分析更关注某事发生的原因或业务表现的根本原因。它很有用，但需要更多样化的数据输入和一些假设。例如，销售额低迷是因为天气恶劣导致无人购物，还是营销活动出现问题？'
