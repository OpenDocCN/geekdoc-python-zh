- md: '## Difference between Machine Learning, AI, and Deep Learning


    Machine learning, artificial intelligence (AI), and deep learning have all been
    generating a lot of buzzes these days, but it can be hard to distinguish between
    them. The three terms are often used interchangeably in the sense that they all
    generally entail making computers more intelligent. But there is a difference
    between them, and understanding what each term means will help you better understand
    the industry as a whole.


    Machine Learning entails teaching computers to recognize patterns and improve
    their efficiency over time by crunching large quantities of data and drawing conclusions
    from that data. The conclusion is based on the number of times that similar patterns
    have been encountered in the past—this is called the order of magnitude, or the
    value of the data. The machine then learns to recognize patterns in this simplified
    (and simplified form) by learning these same patterns over and over again. This
    process is done through software. Artificial Intelligence, on the other hand,
    takes this a step further and involves teaching computers to make decisions based
    on their own experiences. Deep learning, which is a specialized subset of machine
    learning and artificial intelligence, takes this even further by aiming to emulate
    human intelligence.


    The difference between machine learning, artificial intelligence, and deep learning:


    1.  **Machine learning:** The machine is programmed to learn patterns over time
    in the form of rules that are designed for that purpose. The pattern it learns
    can be used for many purposes such as recognizing an object in an image. It is
    often used by companies to automatically classify data based on labels like spam
    or email etc. It also helps search engines like Google, Microsoft Bing, and Yahoo!
    make better suggestions based on your past searches.

    2.  **Artificial intelligence.** Artificial Intelligence refers to programs that
    have not been explicitly programmed but instead rely entirely on their own experiences
    to make decisions relevant to the tasks they are asked to do. Artificial intelligence
    can be integrated into a system to make it responsive to a user’s needs and can
    be used in areas such as robotics, simulations, machine learning, etc. In other
    words, intelligence is an attribute of these machines.

    3.  **Deep learning.** Deep learning refers to the use of artificial neural networks,
    which are systems that work in a way similar to the human brain. It is considered
    one of the primary applications of Artificial Intelligence and is widely used
    for classification problems where the data set can be made up of millions or even
    billions of examples.


    B.C. in Machine learning, artificial intelligence, and deep learning is one of
    the best in the world. Its network is free, anonymous, and secure.


    The Deep learning technology is developed and supported by the Berkeley Vision
    and Learning Center in Berkeley, California. This team is part of a number of
    leading researchers in the field of artificial intelligence.


    The diagram below will give you an idea of how these terms relate.


    ![An illustration to understand the relationship between Machine Learning, Artificial
    Intelligence, and Deep Learning.](img/9b742240054fb02472f2e7c1266edbc1_368_0.png)


    Artificial intelligence is a technique that is used to make machines mimic any
    human behavior. The aim is to ensure that a machine can accurately and efficiently
    mimic any human behavior. Some examples of artificial intelligence machines include
    deep blue chess and IBM’s Watson.


    Machine Learning, as defined above, is the use of statistical and mathematical
    models to help machines learn and mimic human behavior. This is done using past
    data.


    Deep learning is a subset of Machine Learning, and it refers to some of the functions
    and algorithms that an engineer uses to help a machine to train itself. The machine
    can learn to take the correct option to derive an output. Neural networks and
    natural language processing are a part of the deep learning ecosystem.


    ## Steps in Building a Machine Learning System


    Regardless of the type of model that you are trying to build or the problem that
    you are trying to solve, you will follow the steps mentioned in this section while
    building a Machine Learning algorithm.


    1.  **Define objective.** The first step, as it is with any other task that you
    perform, is to define the purpose or the objective you want to accomplish using
    your system. This is an important step since the data you will collect, the algorithm
    you use, and many other factors depend on this objective.

    2.  **Collect data.** Once you have your objective in mind, you should collect
    the required data. It is a time-consuming process, but it is the next important
    step that you must achieve. You should collect the relevant data and ensure that
    it is the right data for the problem you are trying to solve.

    3.  **Prepare data.** This is another important step, but engineers often overlook
    it. If you do overlook this step, you will be making a mistake. It is only when
    the input data is clean and relevant that you will obtain an accurate result or
    prediction.

    4.  **Select algorithm.** Numerous algorithms can be used to solve a problem,
    including Structured Vector Machine (SVM), k-nearest, Naive-Bayes, Apriori, etc.
    You must choose the algorithm that best suits the objective.

    5.  **Train model.** When your data set is ready, you should feed it into the
    system and help the machine learn using the chosen algorithm.

    6.  **Test model.** When your model is trained, and you believe that it has provided
    the relevant results, you can test the accuracy of the model using a test data
    set.

    7.  **Predict.** The model will perform numerous iterations with the training
    data set and the test data set. You can look at the predictions and provide feedback
    to the model to help it improve the predictions that it makes.

    8.  **Deploy.** Once you have tested the model and you are happy with how it works,
    you can sterilize that model and integrate it into any application that you want
    to use. This means that the model that you have developed can now be deployed.


    The steps followed will vary depending on the type of application and algorithm
    that you are using. You can choose to use a supervised or unsupervised Machine
    Learning algorithm. The steps mentioned in this section are often the steps followed
    by most engineers when they are developing a Machine Learning algorithm. There
    are numerous tools and functions that you can use to build a Machine Learning
    model. This book will help you with understanding more about how you can design
    a Machine Learning model using Python.


    In this chapter, we covered the major machine learning paradigms, namely semi-supervised,
    unsupervised, supervised, and finally, reinforcement. We presented some methods
    that are used for each of these types of learning. The disadvantage of the method
    presented, for example, linear or logistic regression for supervised learning
    is based on a linear correlation between the data features and the target output.
    However, for the majority of real world’s applications, this relationship is not
    linear. Therefore, we need other tools to model the relationship between the inputs
    and outputs. A widely used tool is artificial neural networks. Moreover, these
    networks are often combined with traditional methods to improve their performance,
    as was mentioned in reinforcement learning. This tool is presented in detail in
    the following chapter.


    ## Machine Learning Rules and Models


    **Clustering**


    Clustering problems occur when we must discover the inherent groupings in data.
    In the association rule learning problem, we are required to discover rules that
    describe large proportions of data. Clustering is one of the major types of unsupervised
    machine learning algorithms as it runs through the given data and finds any natural
    clusters if they exist. For example, there could be different groups of users
    that are differentiated across a few criteria. For example, the criteria can be
    age, gender, or height.


    Major types of clustering are defined as follows:


    -   **Probabilistic clustering:** This involves clustering data points into clusters
    on a specific probabilistic scale.

    -   **K-means clustering:** K-means clustering involves the clustering of data
    points into a number (k) of mutually'
  mdcn: '## 机器学习、人工智能与深度学习的区别


    机器学习、人工智能（AI）和深度学习近来都引发了大量讨论，但区分它们可能并不容易。这三个术语经常被互换使用，因为它们通常都涉及让计算机变得更智能。但它们之间存在差异，理解每个术语的含义将有助于你更好地理解整个行业。


    机器学习涉及通过处理大量数据并从中得出结论，来教计算机识别模式并随时间提高其效率。结论基于过去遇到相似模式的次数——这被称为数量级或数据值。然后，机器通过反复学习这些相同的模式，学会在这种简化（且简化形式）中识别模式。这个过程是通过软件完成的。另一方面，人工智能更进一步，涉及教计算机根据自己的经验做出决策。深度学习是机器学习和人工智能的一个专门子集，它更进一步，旨在模拟人类智能。


    机器学习、人工智能和深度学习的区别：


    1.  **机器学习：** 机器被编程为以专为此目的设计的规则形式，随时间学习模式。它学习到的模式可用于多种目的，例如识别图像中的物体。公司经常使用它根据垃圾邮件或电子邮件等标签自动对数据进行分类。它还帮助谷歌、微软必应和雅虎等搜索引擎根据你过去的搜索提供更好的建议。

    2.  **人工智能。** 人工智能指的是那些没有被明确编程，而是完全依赖自身经验来做出与其被要求执行的任务相关决策的程序。人工智能可以集成到系统中，使其能够响应用户的需求，并可用于机器人技术、模拟、机器学习等领域。换句话说，智能是这些机器的一种属性。

    3.  **深度学习。** 深度学习指的是使用人工神经网络，这些系统的工作方式类似于人脑。它被认为是人工智能的主要应用之一，广泛用于数据集可能由数百万甚至数十亿个示例组成的分类问题。


    B.C. 在机器学习、人工智能和深度学习方面是世界上最好的之一。其网络免费、匿名且安全。


    深度学习技术由加州伯克利的伯克利视觉与学习中心开发和支持。该团队是人工智能领域众多领先研究人员的一部分。


    下图将让你了解这些术语之间的关系。


    ![理解机器学习、人工智能和深度学习之间关系的图示。](img/9b742240054fb02472f2e7c1266edbc1_368_0.png)


    人工智能是一种用于使机器模仿任何人类行为的技术。其目标是确保机器能够准确高效地模仿任何人类行为。人工智能机器的一些例子包括深蓝国际象棋和IBM的沃森。


    如上所述，机器学习是使用统计和数学模型来帮助机器学习和模仿人类行为。这是使用过去的数据完成的。


    深度学习是机器学习的一个子集，它指的是工程师用来帮助机器自我训练的一些功能和算法。机器可以学习选择正确的选项来得出输出。神经网络和自然语言处理是深度学习生态系统的一部分。


    ## 构建机器学习系统的步骤


    无论你试图构建的模型类型或试图解决的问题是什么，在构建机器学习算法时，你都将遵循本节中提到的步骤。


    1.  **定义目标。** 与你执行的任何其他任务一样，第一步是定义你希望使用系统实现的目的或目标。这是一个重要的步骤，因为你将收集的数据、使用的算法以及许多其他因素都取决于这个目标。

    2.  **收集数据。** 一旦你心中有了目标，你就应该收集所需的数据。这是一个耗时的过程，但这是你必须实现的下一个重要步骤。你应该收集相关数据，并确保它是适合你试图解决的问题的正确数据。

    3.  **准备数据。** 这是另一个重要的步骤，但工程师们经常忽视它。如果你忽视了这一步，你就会犯错。只有当输入数据干净且相关时，你才能获得准确的结果或预测。

    4.  **选择算法。** 有许多算法可用于解决问题，包括结构化向量机（SVM）、k-近邻、朴素贝叶斯、Apriori等。你必须选择最适合目标的算法。

    5.  **训练模型。** 当你的数据集准备好后，你应该将其输入系统，并使用所选算法帮助机器学习。

    6.  **测试模型。** 当你的模型训练完毕，并且你认为它已经提供了相关结果时，你可以使用测试数据集测试模型的准确性。

    7.  **预测。** 模型将使用训练数据集和测试数据集执行多次迭代。你可以查看预测结果，并向模型提供反馈，以帮助其改进所做的预测。

    8.  **部署。** 一旦你测试了模型并对其工作方式感到满意，你就可以将该模型序列化，并将其集成到你想要使用的任何应用程序中。这意味着你开发的模型现在可以部署了。


    所遵循的步骤将根据你使用的应用程序和算法类型而有所不同。你可以选择使用监督式或无监督式机器学习算法。本节中提到的步骤通常是大多数工程师在开发机器学习算法时遵循的步骤。有许多工具和函数可用于构建机器学习模型。本书将帮助你更多地了解如何使用Python设计机器学习模型。


    在本章中，我们涵盖了主要的机器学习范式，即半监督、无监督、监督，最后是强化学习。我们介绍了用于每种学习类型的一些方法。所介绍方法的缺点，例如用于监督学习的线性或逻辑回归，是基于数据特征和目标输出之间的线性相关性。然而，对于大多数现实世界的应用，这种关系不是线性的。因此，我们需要其他工具来建模输入和输出之间的关系。一个广泛使用的工具是人工神经网络。此外，这些网络通常与传统方法结合使用以提高其性能，正如在强化学习中提到的那样。这个工具将在下一章中详细介绍。


    ## 机器学习规则和模型


    **聚类**


    聚类问题出现在我们必须发现数据中固有的分组时。在关联规则学习问题中，我们被要求发现描述大部分数据的规则。聚类是无监督机器学习算法的主要类型之一，因为它遍历给定的数据并找到任何自然存在的聚类。例如，可能存在根据几个标准区分的不同用户组。例如，标准可以是年龄、性别或身高。


    主要的聚类类型定义如下：


    -   **概率聚类：** 这涉及在特定概率尺度上将数据点聚类到簇中。

    -   **K-means聚类：** K-means聚类涉及将数据点聚类到一定数量（k）的互斥'
