    choosing an algorithm according to the convenient learning paradigm identified
    and the goal of the machine learning model. Often a particular algorithm would
    naturally be the best fit for the problem. However, it is a good practice to try
    many algorithms and select the best. The algorithm should be trained on the part
    of the data and tested against the other part for performance verification. There
    are different approaches to applying performance testing. One approach is to split
    the data into two equivalent datasets if it is a large dataset. The model can
    be trained on 50% of the dataset and tested on the other 50%. Another approach
    is to use 10-fold cross-validation, which consists of randomly splitting'
