    Here’s how it works: As an example, if you were to search “cat,” the program would
    have one result and that would be a cat. But if you searched for “dog,” the program
    would find relevant information and possible connections by checking DNA samples
    from over 15,000 dogs and cats. That’s why the algorithm is able to tell the difference
