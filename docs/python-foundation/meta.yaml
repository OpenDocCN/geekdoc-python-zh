    In different areas of social media and news, machine learning is used to generate
    better content recommendations from the data that people are exposed to on a daily
    basis. Using publicly available algorithms and transparent analytics, companies
    like Google, Apple, or Facebook can make personalized suggestions that people
    might be interested in based on their browsing history or interests.


    Machine learning has even been implemented in medical settings for doctors to
    heal patients’ ailments by analyzing complex sets of data about the patient. And
    scientists have used machine learning to investigate complex questions about cancer
    cells and how they might hypothetically be cured.


    Machine learning can be used to predict how many people will view an ad, how likely
    they are to click, and what other products/services they might be interested in
    after clicking. Similar techniques have been used by publishers to predict which
    online ads get the highest response rate from people who view them. This can help
    companies decide which ads to run for certain products so that they are more likely
    to get the desired response. Machine learning is especially good at analyzing
    data about large groups of customers and predicting their actions for a specific
    company or product.


    ## Tensor Flow


    TensorFlow is an open-source library for machine learning research and production.
    It lets you deploy computation across large clusters of computers, store massive
    datasets, and train deep neural networks more quickly. It’s also referred to as
    the Machine Learning framework written by Google that helps developers and data
    scientists build intelligent applications like speech recognition systems or photo
    search.


    ## Understanding More About Tensor Flow


    This is a framework that you can get through the Google platform, and it is used
    when you want to create some models in deep learning. This TensorFlow library
    is often going to rely on some data flow graphs that work on numerical computations.
    And it can stop in and make the process of Machine Learning easier than before.


    You will find that working with TensorFlow makes the process of getting data,
    training the models that you would like to use with Machine Learning, making predictions,
    and even modifying some of the results that you see in the future so much easier.
    Since all of these are going to be important when it comes to Machine Learning,
    you can see why we want to spend some time learning TensorFlow.


    TensorFlow is a library that the Brain team from Google developed to use in Machine
    Learning, and it is especially effective when you want to do some Machine Learning
    on a larger scale. TensorFlow is going to bring together algorithms that work
    with Deep Learning and Machine Learning, and it helps to make them more useful
    through a common metaphor.


    Just like what we saw when we were working on the other library, TensorFlow is
    going to work together well with Python, and it will ensure that you can have
    a front-end API that can be used when you would like to build a new application.
    And when you execute these applications, you will see them done in what is known
    as high-performance C++.


    TensorFlow can be used to help out with running deep neural networks, for training,
    building, handwritten digit classifications, recurrent neural networks, word embedding,
    and even natural language processing to name a few of the neat things you will
    be able to do.


    Both of these two libraries work well with Python, and they are going to do a
    remarkable job when it comes to ensuring that you are on the right track with
    your Machine Learning. Both of these are going to take on a lot of different tasks,
    and you will need to pick out the right one based on what you would like to get
    done on your project.


    ## Installing TensorFlow


    Once you have the Scikit-Learn library put in place in your environment, it is
    time to start installing the TensorFlow library. When you download this one, you
    can get a few different APIs for other programming languages outside Python, including
    Java and C++, so if you need to use these, you can get a hold of them pretty easily.
    You can download this on a few different devices if you would like, but for this
    guidebook, we are going to discuss how you can install this library on a Windows
    computer. You can use the pip that we had from before, or Anaconda, to get this
    downloaded on your Windows computer.


    The native pip is often the best way to get TensorFlow installed on your system,
    without having to worry about the virtual environment that comes with it. But
    one of the things that you are going to need to keep track of here is that when
    you install this library with a pip, there are times when this will interfere
    with some of the other installations of Python that are on the computer, and you
    need to be aware of this ahead of time.


    The good thing to know here is that the only thing that you need to have up and
    running to make this work is a single command. And once you know this command,
    TensorFlow can install it on your system and get it up and running. Once you can
    get this library installed using the pip, the user is going to see that there
    are some options, including the ability to choose which directory you would like
    to store this on.


    Now, you can also choose to install the TensorFlow library on your computer with
    the help of Anaconda. To do this, you need first to go through and create your
    virtual environment. You may also want to work with a pip with this one as well.
    Before you start on this one, make sure that you have a Windows system and Python
    3.5 or above. Pip 3 program needs to be in place as well to help with this kind
    of installation. The commands you will need to get started with this one include:


    ```

    pip3 install – upgrade tensorflow

    ```


    If you would like to install the GPU version of the Tensorflow program, you would
    need to go through and use the following command to make it happen:


    ```

    pip3 install – upgrade tensorflow-gpu

    ```


    This is going to ensure that you install TensorFlow on the Windows system that
    you are using. But another option is to install this library so that you can use
    it with Python and all of your other Machine Learning algorithms will include
    being able to install it with the help of the Anaconda package.


    Pip is a program that is automatically going to get installed when you get Python
    on your system. But the Anaconda program isn’t. This means that if you would like
    to make sure that TensorFlow is installed with the use of the Anaconda program,
    you first need to take the time to install this program. To do this, visit the
    website for Anaconda, download it from the website, and then find the instructions
    for installation from that same site.


    Once you have gone through and installed the Anaconda program, you should notice
    that it comes with a package that is called conda. This is a good package to take
    some time to look at and explore a bit because it will work when you want to manage
    any installation packages or manage virtual environments. To get some access to
    this package, you need to start up the Anaconda program.


    After you get to this point, you can head over to the Windows main screen and
    then click on the Start menu. You can choose All Programs and expand it until
    you see the folder for Anaconda. You click on this prompt to launch the folder.
    If you need to see what details are in this package, you can run a command in
    the command line for “conda info.” This makes it easier to see the details for
    that package and the manager as well.


    There are a lot of cool things that come with this Anaconda program, but one of
    the options that you will want to learn more about is to help with Machine Learning.
    Anaconda can help you create an environment of Python for your own using this
    package. The virtual environment is going to be its isolated copy of Python, and
    it will have the right capabilities of maintaining all of the files that it needs,
    including the directories and paths. This can be helpful because it allows you
    to do all of these things while still'
  mdcn: '根据他们的观看历史和偏好，用户会对接下来观看的内容产生兴趣。这类算法几乎被所有基于网络的公司所采用。


    在社交媒体和新闻的不同领域，机器学习被用于从人们日常接触的数据中生成更好的内容推荐。通过使用公开可用的算法和透明的分析，像谷歌、苹果或脸书这样的公司可以根据用户的浏览历史或兴趣，提供个性化的建议，推荐用户可能感兴趣的内容。


    机器学习甚至已被应用于医疗环境，医生通过分析关于患者的复杂数据集来治疗疾病。科学家们也利用机器学习来研究关于癌细胞的复杂问题，以及它们可能如何被治愈。


    机器学习可用于预测有多少人会查看广告、他们点击的可能性有多大，以及点击后他们可能对哪些其他产品/服务感兴趣。出版商也使用类似的技术来预测哪些在线广告能从查看者那里获得最高的响应率。这可以帮助公司决定为特定产品投放哪些广告，从而更有可能获得预期的响应。机器学习尤其擅长分析大量客户的数据，并预测他们对特定公司或产品的行为。


    ## Tensor Flow


    TensorFlow 是一个用于机器学习研究和生产的开源库。它允许你在大型计算机集群上部署计算，存储海量数据集，并更快地训练深度神经网络。它也被称为由谷歌编写的机器学习框架，帮助开发者和数据科学家构建智能应用程序，如语音识别系统或照片搜索。


    ## 更多了解 Tensor Flow


    这是一个你可以通过谷歌平台获取的框架，当你想在深度学习中创建一些模型时会用到它。这个 TensorFlow 库通常依赖于一些用于数值计算的数据流图。它可以介入并使机器学习的过程比以前更容易。


    你会发现，使用 TensorFlow 使得获取数据、训练你想用于机器学习的模型、进行预测，甚至在未来修改你看到的一些结果变得容易得多。由于所有这些在机器学习方面都很重要，你可以明白为什么我们要花一些时间学习
    TensorFlow。


    TensorFlow 是谷歌大脑团队开发的一个用于机器学习的库，当你想进行大规模机器学习时，它尤其有效。TensorFlow 将汇集适用于深度学习和机器学习的算法，并通过一个共同的隐喻帮助它们变得更加有用。


    就像我们在使用另一个库时看到的那样，TensorFlow 可以与 Python 很好地协同工作，它将确保你可以拥有一个前端 API，以便在你想要构建新应用程序时使用。当你执行这些应用程序时，你会看到它们是以所谓的高性能
    C++ 完成的。


    TensorFlow 可用于帮助运行深度神经网络，用于训练、构建、手写数字分类、循环神经网络、词嵌入，甚至自然语言处理，仅举几例你将能够完成的精彩事情。


    这两个库都能与 Python 很好地配合，并且在确保你正确进行机器学习方面将表现出色。两者都将承担许多不同的任务，你需要根据你的项目想要完成的内容来选择正确的一个。


    ## 安装 TensorFlow


    一旦你在环境中安装了 Scikit-Learn 库，就该开始安装 TensorFlow 库了。当你下载这个库时，你可以获得一些用于 Python 以外其他编程语言的
    API，包括 Java 和 C++，所以如果你需要使用这些，你可以很容易地获取它们。你可以在几个不同的设备上下载它，但在这本指南中，我们将讨论如何在 Windows
    计算机上安装这个库。你可以使用我们之前用过的 pip 或 Anaconda 来在你的 Windows 计算机上下载它。


    原生 pip 通常是在你的系统上安装 TensorFlow 的最佳方式，无需担心随之而来的虚拟环境。但你需要在这里注意的一件事是，当你使用 pip 安装这个库时，有时会干扰计算机上其他一些
    Python 安装，你需要提前意识到这一点。


    好消息是，你需要启动并运行的唯一东西就是一个命令。一旦你知道了这个命令，TensorFlow 就可以安装在你的系统上并启动运行。一旦你可以使用 pip 安装这个库，用户会看到有一些选项，包括选择你想将其存储在哪个目录的能力。


    现在，你也可以选择在 Anaconda 的帮助下将 TensorFlow 库安装到你的计算机上。为此，你需要首先创建你的虚拟环境。你可能也想为此使用 pip。在开始之前，请确保你拥有
    Windows 系统和 Python 3.5 或更高版本。还需要安装 Pip 3 程序来帮助进行这种安装。你需要开始使用的命令包括：


    ```

    pip3 install – upgrade tensorflow

    ```


    如果你想安装 Tensorflow 程序的 GPU 版本，你需要使用以下命令来实现：


    ```

    pip3 install – upgrade tensorflow-gpu

    ```


    这将确保你在你使用的 Windows 系统上安装 TensorFlow。但另一个选项是安装这个库，以便你可以将其与 Python 和你所有其他机器学习算法一起使用，包括能够借助
    Anaconda 包来安装它。


    Pip 是一个当你在系统上安装 Python 时会自动安装的程序。但 Anaconda 程序不是。这意味着如果你想确保使用 Anaconda 程序安装 TensorFlow，你首先需要花时间安装这个程序。为此，请访问
    Anaconda 的网站，从网站下载它，然后从同一网站找到安装说明。


    一旦你安装了 Anaconda 程序，你应该注意到它附带了一个名为 conda 的包。这是一个值得花时间研究和探索的好包，因为当你想要管理任何安装包或管理虚拟环境时，它会起作用。要访问这个包，你需要启动
    Anaconda 程序。


    达到这一点后，你可以转到 Windows 主屏幕，然后单击“开始”菜单。你可以选择“所有程序”并展开它，直到看到 Anaconda 文件夹。你单击此提示以启动文件夹。如果你需要查看此包中的详细信息，可以在命令行中运行“conda
    info”命令。这使得更容易查看该包和管理器的详细信息。


    Anaconda 程序附带了很多很酷的东西，但你想要了解更多并有助于机器学习的选项之一是，Anaconda 可以帮助你使用这个包为你自己创建一个 Python
    环境。虚拟环境将是 Python 的一个独立副本，它将具有维护所有所需文件（包括目录和路径）的正确能力。这很有帮助，因为它允许你在仍然'
