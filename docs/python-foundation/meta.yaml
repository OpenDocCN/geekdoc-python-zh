    # Cross-Validation Technique


    Cross-validation involves splitting the dataset into segments. We have put the
    test set aside and focused on training the model on training data.

    Remember that, whenever working with unknown datasets, you will always run into
    some problems, no matter what type of solution you employ. That is why you need
    to understand the data to some extent so your algorithms produce the right results.


    # Random Forest Algorithm


    This algorithm works based on ensemble learning. Ensemble learning refers to the
    kind of learning in which different types of algorithms or one algorithm is joined
    multiple times to get a more powerful prediction model. The random forest algorithm
    is a combination of many algorithms of a similar type, that is, multiple decision
    trees, resulting in a forest of trees, explaining the source of the name “random
    forest.” The random forest algorithm can be applied in both regression and classification
    problems.


    # How It Works


    The random forest algorithm follows the following basic steps in its work:


    +   1. Select N random records from a data set.'
  - '[PAGE 413]


    +   2. Build a decision tree from these N random records.

    3. Select the number of trees that you need in the algorithm and repeat the above
    two steps.

    4. If it is a regression problem, for a new record, every tree in the forest will
    predict a value for Y (the output). We can calculate the final value by taking
    the average of all predicted values by all trees in the forest. Or, for the case
    of a classification problem, every tree in the forest should predict the category
    under which the new record belongs. The new record is finally assigned to the
    category that has won the majority vote.


