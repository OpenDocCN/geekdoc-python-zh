    # Garbage Collection


    Sometimes, the memory may be occupied by objects that are no longer needed. Python
    clears them from memory automatically, a process known as garbage collection.
    This way, Python can reclaim blocks of memory that are no longer in use. The garbage
    collector is launched when a program is executed, and it runs once a reference
    count to an object has reached a zero. The reference count to an object changes
    with change in the number of aliases pointing to it.


    The reference count to an object increases when a new name is assigned or when
    it’s added into a container such as tuple, list or dictionary. Once the del statement
    is used to delete the object, the value of count will decrease, or once its reference
    has gone out of scope or once the reference is reassigned.


    Example:


    ```

    ax = 5 # object created

    bx = ax # Increase the ref. count for <5>

    bz = [bx] # Increase the ref. count for <5>

    ```'
