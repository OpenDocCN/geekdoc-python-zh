    majority of your customers will not be at their best.


    If you immediately ask for their credit card number when they aren’t focused,
    that is an inconvenience to them. And nobody likes being inconvenienced, so this
    simply won’t work.


    So, we created a system that allowed customers to chat with our live customer
    service representatives and get any information they needed as quickly as possible.
    This was a huge step forward in improving both the quality of service and the
