    \nExample:\n\n```\n>>> for x in range(0,3):\n    print(x)\n0\n1\n2\n```\n\nThere\
    \ are several things to note in this example.\nFirst off, the syntax is similar\
    \ to the if statements we covered earlier.\n\nThe for loop is ended with a colon.\n\
    \nWith a single instruction in the for loop, we can leave that instruction on\
    \ the same line immediately after the colon. A return after that will indent to\
    \ the next instruction outside the for a loop.\n\nIf the for command contains\
    \ multiple instructions, start those instructions on the next line. They will\
    \ be indented to show they are contained within the loop.\nA blank line entered\
    \ at the end will close out the loop and drop the indent down from the loop for\
