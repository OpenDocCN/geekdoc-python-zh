    \ 中，你可以使用以下四种形式参数中的任何一种来调用函数：\n\n- 默认参数\n- 必需参数\n- 关键字参数\n- 可变长度参数\n\n## 默认参数\n\
    \n如果在函数的调用参数中未指定值，则默认参数假定为默认值。\n\n## 默认参数\n\n```\ndef studentinfo(name, gender\
