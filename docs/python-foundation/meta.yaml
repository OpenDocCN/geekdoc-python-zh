  md: '# How to Get Started With Python?


    Python is a scripting language, and like any other programming language, it needs
    an interpreter. The latter is a program that executes other language programs.
    As its name indicates, it works as an interpreter for computer hardware to execute
    the instructions of Python programming. Python comes as a software package and
    can be downloaded from Python’s website: www.python.org. When installing Python,
    the interpreter is usually an executable program. Note that if you use UNIX and
    LUNIX, Python might be already installed and probably is in the/usr directory.
    Now that you have Python installed let’s explore how we can run some basic code.


    To run Python, you can open your operating system’s prompt (on Windows open a
    DOS console Window) and type python. If it does not work, it means that you don’t
    have python in Shell’s path Environment variable. In this case, you should type
    the full path of the Python executable. On Windows, it should be something similar
