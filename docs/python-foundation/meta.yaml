    # Supervised Learning?


    In supervised learning, we typically have a training data set with corresponding
    labels. From the relationship that associates the training set and the labels,
    we try to label new unknown data sets. To do so, the learning algorithm is supplied
    with the training set and the corresponding correct labels. Then, it learns the
    relationship between the training set and the labels. That relationship is then
    applied by the algorithm to label the unknown data set. Formally, we want to build
    a model that estimates a function f that relates a data set X (i.e., input) to
    labels Y (i.e., output): Y=f(X). The mathematical relationship f is called the
    mapping function.


    Let’s consider whether we have an ensemble of images and try to label it as a
    cat image or not cat. We first provide as an input to the learning algorithm images
    (X) and labels of these images (cat or no cat). Then, we approximate the relationship
    f that estimates Y according to X as accurately as possible: Y=f(X)+ε, ε is an
    error that is random with a'
  merge: -1
  pgno: 340
- img_proc: true
  md: 'mean zero. Note that we are approximating the relationship between the dataset
    and the labels and we want the error ε as close as possible to 0. When ε is exactly
    0, that means the model is perfect and 100% accurate, which is very rare to build
    such a model.


    Typically, a subset of available labeled data, which is often 80%, is utilized
    as a training set to estimate the mapping task to build such a model. The extra
    20% of the labeled data is utilized to assess the model’s efficiency and precision.
    At this step, the model is fed with the 20% data, and the predicted output is
    compared to the actual labels to compute the model performance.


    Supervised learning has mainly two functions, namely, classification or regression.
    Classification is used when the output Y is a quality or category data (i.e.,
    discrete variable) whereas regression is used when the output Y is quantity data
    (i.e., continuous numerical values). Classification aims at predicting a label
    or assigning data to a class to which they are most similar. The output Y is a
    binary variable (i.e., 0 or 1). In the example given above, labeling images as
    a cat or no cat is an example of classification. The model can also be a multi-class
    classification where the model predicts different classes. For example, Outlook
    classifies mails in more than a category like Focused, Other, Spam. There are
    a number of algorithms that can be used, such as logistic regression, decision
    tree, random forest, and multilayer'
  merge: -1
