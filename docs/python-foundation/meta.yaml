    of trees/estimators.


    ## Dimensionality Reduction Algorithms


    As a natural progression from the first post, this should give some basic idea
    of what dimensionality reduction algorithms are, what their applicability is and
    not, and finally some examples.


    Dimensionality reduction is a process by which we can reduce the number of dimensions
    in our data set while still preserving as much information as possible. Quite
    often there is more than one way to do this. So it is important to know what type
    of problem you are trying to solve with your data before choosing a dimensionality
    reduction algorithm...


    As always, we start with the basics. A dimension is a conceptual number of features
    that describe some observation. In other words, it is the number of parameters
    we need to estimate in order to determine something about our observation. So
    for example, if we are trying to fit a linear regression on an observation then
    one parameter (which in this case would be our independent variable) would be
    enough to describe this regression, but if we were fitting a quadratic regression
    then two parameters (2nd and 3rd-degree polynomials) would be required and so
    on.


    So the idea here is that by reducing the dimensions of our data set we can potentially
    lose some information about it.


    Not all methods are created equal though. For example, without prior knowledge
    of the task at hand, we can not determine which method to use for dimensionality
    reduction. The choices depend on a number of factors e.g., our context and available
    resources. This is why oftentimes it is referred to as an art rather than a science...'
