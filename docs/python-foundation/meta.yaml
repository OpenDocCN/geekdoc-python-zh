    \n在学习如何编写循环和if语句之前，必须提到在Python编程中缩进至关重要。Python中的缩进用于表示一个代码块。如果跳过缩进，将会产生错误：\n\n\
    ```\n>>> if 10>5:\n... print('YES')\nFile \"<stdin>\", line 2\nprint(\"YES\")\n\
