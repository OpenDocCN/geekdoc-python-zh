    ## Introduction


    Python Programming Language is basically interpreted in nature. As such, before
    one launches or runs the code given, one needs to compile all the written code
    at once for onward interpretation through the “print” command. Meanwhile, with
    Python, you as a programmer can help greatly with the growth of your background
    in different software design. The process of abstracting details is a mechanism
    that serves as the core focal point for Python that even novices can understand.


    Python will always be the choice of programmers because of its high rate of enhancing
    productivity. The steps in Python are edit, test, and debug, respectively. Interestingly,
    a mistake in the code input of Python will never result in segmentation with a
    fault; this has made many programmers resort to the fact that it is one of the
    easiest languages for debugging. Instead of creating through the interpreter a
    segmentation with fault, python would rather develop a form of exception. If this
    exception is not still captured, it will be printed as a stacked race—just to
    keep everything safe.


    You can confidently say that any change made to the structure of the machine,
    the data composition, or the data stored in the machine to improve the performance
    and accuracy of a machine is a sign of learning. When you try to better understand
    the concept of Machine Learning, you will realize that only some of these changes
    can be categorized as Machine Learning. For instance, let us look at a machine
    that is being used to forecast the weather in a specific region for a specific
    time frame.


    The objective of this book is to present an introduction for the absolute beginners
    to machine learning and data science. The book presents the reasoning behind machine
    learning and its methods as well as a guide for using Python to apply those methods.


    This book covers the major machine learning paradigms, namely supervised, unsupervised,
    semi-supervised, and reinforcement. The book also covers artificial neural network
    principles in a separate chapter. This book explains how to develop machine learning
    models in general and how to develop a neural network which is a particular method
    of performing machine learning. It teaches how to train and evaluate their accuracy.


    Python is a widely-used programming language for different applications and in
    particular for machine learning. This book covers basic Python programming as
    well as a guide to using Python libraries for machine learning.


    This book presents machine learning applications using real datasets to help you
    enhance your Python programming skills as well as machine learning basics acquired
    through the book. These applications provide examples of developing a machine
    learning model for predictions using linear regression, a classifier using logistic
    regression, and an artificial neural network. Through these applications, examples
    of data exploration and visualization using Python are presented.


    Machine learning is an active research subject, in particular, artificial neural
    networks. Nowadays, machine learning is used in every domain, such as marketing,
    health care systems, banking systems, stock market, and gaming applications, among
    others. This book’s objective is to provide a basic understanding of the major
    branches of machine learning as well as the philosophy behind artificial neural
    networks. The book also aims at providing Python programming skills for machine
    learning to beginners with no previous programming skills in Python or any other
    programming language.


    Once you have acquired the skills and understood the reasoning behind the machine
    learning models presented in this book, you will be able to use these skills to
    solve complex problems using machine learning. You will also be able to easily
    acquire other skills and use more advanced machine learning methods.


