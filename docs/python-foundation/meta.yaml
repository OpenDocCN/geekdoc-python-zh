    ## NumPy Array Operations


    Sometimes, when you work with two-dimensional arrays, you may want to add new
    rows or columns to represent new data and variables. This operation is known as
    array stacking, and it doesn’t take long for NumPy to render the new information.
    Start by creating a new array:


    ```python

    import numpy as np

    dataset = np.arange(50).reshape(10,5)

    ```


    Next, add a new row, and several lines that will be concatenated:


    ```python

    single_line = np.arange(1*5).reshape(1,5)

    several_lines = np.arange(3*5).reshape(3,5)

    ```


    Now let’s use the vstack method, which stands for a vertical stack, to add a new
    single line.


    ```python

    np.vstack((dataset,single_line))

    ```


    This command line will also work if we want to add several lines.


    ```python

    np.vstack((dataset,several_lines))

    ```


    Next, let’s see how to add a variable to the array. This is done with the “hstack”
    method, which stands for horizontal stack. Here’s an example:


    ```python

    bias = np.ones(10).reshape(10,1)

    np.hstack((dataset,bias))

    ```


    In this line of code, we added bias of unit values to the array we created earlier.


    As an aspiring data scientist, you will only need to know how to add new rows
    and columns to your arrays. In most projects, you won’t need to do more than that,
    so practice working with two-dimensional arrays and NumPy because this tool is
    engraved in data science.


    ## What is the NumPy Library


    Now it is time for us to take a look at one of the great libraries that we can
    work with when it comes to using Python and getting our data analysis to work
    well for our needs. NumPy is one of the first that we can look at, and it is going
    to be one of the best. It is going to be the basis that we can see with some of
    the other important libraries that we will discuss later on, or other data analysis
    libraries, so it is worth our time to take a look at it.


    To start with, NumPy is a library that is used in Python. We can use it for several
    different reasons, including numerical as well as scientific computing if we need
    it. For the most part, though, it is going to be used to help us compute our arrays
    quickly and efficiently. We will have it based and written out in the Python and
    the C language.


    Even though this is a language that works for the C language as well, this is
    going to be a basic data analysis library that we are going to use with Python.
    The word NumPy is going to stand for Numerical Python. We are going to bring out
    this library to help us to process any of the homogeneous multidimensional arrays
    that we want to handle.


    This library is going to be one of the core libraries that is used for different
    scientific computations. This means that it is going to have a powerful array
    of multidimensional objects, and it will integrate some tools that are useful
    when it is time to work with these arrays as well.


    You will quickly find that when you work with the data analysis that we have been
    talking about that NumPy is going to be useful in almost all of the scientific
    programming that we try to do with Python, including things like statistics, machine
    learning, and bioinformatics. It is also going to provide us with some good functionality
    that we can work with, functionality that can work well, will run efficiently
    and is well written in the process.


    ## Understanding More About NumPy


