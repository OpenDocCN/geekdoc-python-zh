    set of characters it can deduce. If you repeat the game for different characters
    you will notice that things are working in a branching principle. i.e., every
    answer leads to a specific set of questions that shrink the circle around the
    possible answer and cancel a new portion of possibilities. The decision tree technique
    works just like the Akinator game; you give it a set of data and it generates
    answers to the game.


    The decision tree is famous and is a widely used classification technique. The
    decision tree concept is simple and the “How it works” can be illustrated even
    to people with almost no knowledge about Machine Learning. You may have already
    seen a decision tree application without knowing it is decision tree-based.


    ## Decision Tree Flow Chart


    Note: In this figure, the diamonds are decisions that are upon some conditions.
    The ovals are terminations.


    The decision tree makes a good job of translating general data into useful knowledge.
    The decision tree Machine Learning algorithm creates rules that classify the unfamiliar
    datasets. Decision trees are common in expert systems, and they give perfect results
    compared to those produced by human experts with long periods of experience in
    a certain field.


    ## Decision Tree Construction


    Before applying the decision tree algorithm to a dataset, we first need to specify
    the feature the splitting process will be based on. If you do not have a clear
    idea about the most feature that rule the dataset, you may try different suggested
    features until you get the best results. This results in subsets out of the original
    dataset. Practically, each subset represents the desired feature. Therefore, the
    subsets keep splitting depending on the features as they travel down the branches.
    When the data on the branches is the same class, we have classified it and we
    do not have to continue the splitting process.


    A common way of splitting data in the decision tree is the binary split. But suppose
    that we have followed the binary way, but we still have other possible features,
    for much more splits. Therefore, in this section, we will utilize the ID3 algorithm.
    This algorithm helps in making rules about how to split the data and when to stop.


    ## Decision Tree Algorithm


    - Each object in the given dataset is in the same class/category.

    - If Yes, return the name/label of the category

    - Else, try another feature to divide the dataset

    - Make a new a branch node for every divide iteration


    Call the “decision tree algorithm” and add the results to the new branch node


    The decision tree algorithm works with both numeric and nominal values. It is
