- md: "## Step 4: Check To See If Python Is Installed On Your PC\n\n260-character\
    \ MAX PATH limit if this option is selected. As a result, Python can now use long\
    \ path names.\n\n![](img/9b742240054fb02472f2e7c1266edbc1_13_0.png)\n\nNo other\
    \ system settings will be affected by the Disable path length limit option. Python\
    \ projects developed on Linux may have name length issues if this option is enabled.\n\
    \n+   1. Locate and access the directory where Python was installed on the computer.\
    \ Since we installed Python 3.7, the path is `C:\\Users\\Username\\AppData\\Local\\\
    Programs\\Python\\Python37`.\n+   2. Double-click the `python.exe` file to begin\
    \ the installation process.\n+   3. The output should look like the following:\n\
    \n![](img/9b742240054fb02472f2e7c1266edbc1_14_0.png)\n\n> Note: The command `python\
    \ -V` can also be used to see if the installation has been completed. Python’s\
    \ version should be displayed in the output. We’re using “Python 3.7.3” in this\
    \ case.\n\n## Step 5: Make Sure Pip Is Installed\n\nPip may not have been pre-installed\
    \ if you chose to install an older version of Python. You can manage your Python\
    \ software with Pip, a powerful package management system. As a result, check\
    \ to see if it’s already set up. Most Python packages should be installed using\
    \ Pip, especially in virtual environments. To see if Pip has been installed, run\
    \ the following command.\n\n+   1. Start by typing “cmd” in the Start menu.\n\
    +   2. Open the Command Prompt program.\n+   3. Enter the command `pip -V` in\
    \ the command line to see the output. If you’ve successfully installed Pip, you’ll\
    \ see the following output:\n\n![](img/9b742240054fb02472f2e7c1266edbc1_15_0.png)\n\
    \nThat output indicates that Pip hasn’t yet been installed: An internal or external\
    \ command, Operable program, or batch file containing the string “pip” is not\
    \ recognized by this system.\n\n## Step 6: Add the Python Path to the Environment\
    \ Variables (Optional)\n\nIf your version of the Python installer does not include\
    \ the Add Python to PATH checkbox or if you have not selected that option, we\
    \ recommend that you go through this procedure.\n\nA full path is not necessary\
    \ when Python paths to system variables are configured. It tells Windows to search\
    \ the PATH for “python” and locate the `python.exe` file in the installation folder.\n\
    \n![](img/9b742240054fb02472f2e7c1266edbc1_16_0.png)\n\n+   1. Run can be launched\
    \ by selecting Run from the Start menu.\n+   2. Enter `sysdm.cpl` and press Enter.\
    \ This brings up the System Properties window, where you can adjust various settings.\n\
    +   3. Select Environment Variables from the Advanced tab.\n+   4. The Path variable\
    \ can be found and selected under System Variables.\n+   5. Click on the Edit\
    \ button.\n+   6. Click on the Variable value field to open the Variable value\
    \ field dialog box. Add the semicolon-separated path to the `python.exe` file\
    \ (;). `\";C:\\Python34\"` has been added to the image below.\n\n![](img/9b742240054fb02472f2e7c1266edbc1_17_0.png)\n\
    \nAll windows will be closed once you click “Ok.” Python scripts like this can\
    \ be run as a result of setting this up: `script.py` in Python. Instead of `C:/Python34/Python\
    \ script.py`, use this: As you can see, it has been simplified and made easier\
    \ to work with.\n\n## Step 7: Install the virtualenv virtualization software (Optional)\n\
    \nYou’ve got Python, and you’ve got Pip to keep track of the packages you install.\
    \ Virtualenv is the final piece of software you’ll need. Using Virtualenv, you\
    \ can isolate your Python projects in a virtual environment on your local machine.\n\
    \nWhat are the benefits of using virtualenv? By default, Python software packages\
    \ are installed throughout the system. All your Python projects will be affected\
    \ by any change to a single project-specific package, as a result. To avoid this,\
    \ the simplest solution is to use separate virtual environments for each project.\n\
    \nTo get virtualenv up and running, follow these instructions:\n\n+   1. Open\
    \ the Start menu and type “cmd.”\n+   2. Select the Command Prompt application.\n\
    +   3. Type the following pip command in the console:\n    `C:\\Users\\Username>\
    \ pip install virtualenv`\n\nVirtualenv is now installed on your computer after\
    \ the process is complete.\n\nTo learn more about the winget command in the Windows\
    \ Package Manager, see our article on how to update packages with winget.\n\n\
    ## Summary\n\nThis guide will show you how to set up Python 3.7.3 on a Windows\
    \ computer. You can expect a similar process if you’re upgrading to a newer version\
    \ of Python.\n\nCheck out our article on how to upgrade Python to version 3.9\
    \ for more information on how to do so.\n\nIf you’re working on multiple projects\
    \ on the same computer, make sure you have Pip installed and use virtual environments.\n\
    \nA new generation of scripting languages for servers is now available for your\
    \ testing pleasure. To learn more about how to install Ruby on Windows 10, please\
    \ see this guide.\n\nIt’s time to code!\n\n## Installing and Setting Up Sublime\
    \ Text\n\nYou will need to download the installer for the Sublime Text editor\
    \ from the website located at https://sublimetext.com/ in order to successfully\
    \ install it. After clicking the Download link, search for an installer that is\
    \ compatible with macOS. Open the installer file once it has finished downloading,\
    \ and then drag the icon of Sublime Text into the Applications folder on your\
    \ computer.\n\n## Python on macOS\n\nPython comes pre-installed on most macOS\
    \ computers, but the version that ships with the operating system is probably\
    \ so old that you won’t want to learn on it. Installing the most recent version\
    \ of Python is the first step in this section. After that, installing Sublime\
    \ Text and ensuring that it is correctly configured is the next step.\n\n## Verifying\
    \ the Presence of Python 3\n\nApplications – Utilities - Terminal opens a terminal.\
    \ Press command -spacebar, type terminal, then enter. Enter `python` with a lowercase\
    \ p—to see which version of Python is installed and to run Python commands. You\
    \ should see output telling you which Python version is installed and a `>>>`\
    \ prompt where you can enter Python commands.\n\n```\n$ python\nPython 2.7.15\
    \ (default, Aug 17 2018, 22:39:05)\n[GCC 4.2.1 Compatible Apple LLVM 9.1.0 (clang-902.0.39.2)]\
    \ on darwin Type “help”, “copyright”, “credits”, or “license” for more information.\
    \ >>>\n```\n\nThis output shows that Python 2.7.15 is currently installed. Press\
    \ Ctrl-D or enter `exit()` to leave Python and return to a terminal prompt.\n\n\
    To check for Python 3, type `python3`. You’ll get an error message if Python 3\
    \ isn’t installed. If you have Python 3.6 or later, skip to “Running Python in\
    \ a Terminal Session” on page 8. Python 3 must be manually installed if not already\
    \ present. When you see the `python` command in this book, use `python3` to make\
    \ sure you’re using Python 3, not Python 2; they differ enough that you’ll have\
    \ trouble running the code in this book using Python 2.\n\nIf you see Python versions\
    \ before 3.6, install the latest version.\n\n## Linux and Python\n\nAlmost all\
    \ Linux computers already come pre-installed with Python, as the operating system\
    \ is designed to be used for programming. The people who write and maintain Linux\
    \ expect and encourage you to do your own programming. Because of this, there\
    \ is very little to install and only a few settings to change before you can begin\
    \ programming.\n\n## Performing a Python Version Check\n\nWhen you have the Terminal\
    \ application installed, you can open a terminal window on your computer (in Ubuntu,\
    \ you can press ctrl-alt-T). Entering `python3` with a lowercase p will reveal\
    \ the version of Python that is currently running on your computer. This command\
    \ launches the Python interpreter if Python is installed. A `>>>` prompt will\
    \ appear, where you can begin typing Python commands, indicating which version\
    \ of Python is installed.\n\n```\n$ python3\nPython 3.7.2 (default, Dec 27 2018,\
    \ 04:01:51)\n[GCC 7.3.0] on linux\nType “help”, “copyright”, “credits” or “license”\
    \ for more information.\n>>>\n```"
  mdcn: "## 步骤 4：检查电脑上是否已安装 Python\n\n如果选择此选项，路径长度限制为 260 个字符。因此，Python 现在可以使用长路径名。\n\
    \n![](img/9b742240054fb02472f2e7c1266edbc1_13_0.png)\n\n“禁用路径长度限制”选项不会影响其他系统设置。如果启用此选项，在\
    \ Linux 上开发的 Python 项目可能会出现名称长度问题。\n\n+   1. 找到并访问电脑上安装 Python 的目录。由于我们安装的是 Python\
    \ 3.7，路径为 `C:\\Users\\Username\\AppData\\Local\\Programs\\Python\\Python37`。\n\
    +   2. 双击 `python.exe` 文件以开始安装过程。\n+   3. 输出应如下所示：\n\n![](img/9b742240054fb02472f2e7c1266edbc1_14_0.png)\n\
    \n> 注意：也可以使用命令 `python -V` 来查看安装是否已完成。输出中应显示 Python 的版本。本例中我们使用的是 “Python 3.7.3”。\n\
    \n## 步骤 5：确保已安装 Pip\n\n如果您选择安装旧版本的 Python，Pip 可能未预装。您可以使用 Pip（一个强大的包管理系统）来管理您的\
    \ Python 软件。因此，请检查它是否已设置好。大多数 Python 包应使用 Pip 安装，尤其是在虚拟环境中。要查看 Pip 是否已安装，请运行以下命令。\n\
    \n+   1. 首先，在“开始”菜单中输入 “cmd”。\n+   2. 打开“命令提示符”程序。\n+   3. 在命令行中输入命令 `pip -V`\
    \ 以查看输出。如果您已成功安装 Pip，您将看到以下输出：\n\n![](img/9b742240054fb02472f2e7c1266edbc1_15_0.png)\n\
    \n该输出表明 Pip 尚未安装：系统无法识别包含字符串 “pip” 的内部或外部命令、可运行程序或批处理文件。\n\n## 步骤 6：将 Python 路径添加到环境变量（可选）\n\
    \n如果您的 Python 安装程序版本不包含“将 Python 添加到 PATH”复选框，或者您未选择该选项，我们建议您执行此过程。\n\n当 Python\
    \ 路径配置到系统变量时，不需要完整路径。它告诉 Windows 在 PATH 中搜索 “python”，并在安装文件夹中定位 `python.exe` 文件。\n\
    \n![](img/9b742240054fb02472f2e7c1266edbc1_16_0.png)\n\n+   1. 可以通过从“开始”菜单中选择“运行”来启动“运行”。\n\
    +   2. 输入 `sysdm.cpl` 并按 Enter 键。这将打开“系统属性”窗口，您可以在其中调整各种设置。\n+   3. 从“高级”选项卡中选择“环境变量”。\n\
    +   4. 在“系统变量”下找到并选择 Path 变量。\n+   5. 单击“编辑”按钮。\n+   6. 单击“变量值”字段以打开“变量值”对话框。添加以分号分隔的\
    \ `python.exe` 文件路径（;）。下图中已添加 `\";C:\\Python34\"`。\n\n![](img/9b742240054fb02472f2e7c1266edbc1_17_0.png)\n\
    \n单击“确定”后，所有窗口都将关闭。设置完成后，可以运行这样的 Python 脚本：`script.py`。而不是 `C:/Python34/Python\
    \ script.py`，请使用：如您所见，它已被简化并更易于使用。\n\n## 步骤 7：安装 virtualenv 虚拟化软件（可选）\n\n您已经拥有了\
    \ Python，并且拥有 Pip 来管理您安装的包。Virtualenv 是您需要的最后一款软件。使用 Virtualenv，您可以在本地计算机上的虚拟环境中隔离您的\
    \ Python 项目。\n\n使用 virtualenv 有什么好处？默认情况下，Python 软件包会安装在整个系统中。因此，对单个项目特定包的任何更改都会影响您所有的\
    \ Python 项目。为避免这种情况，最简单的解决方案是为每个项目使用单独的虚拟环境。\n\n要启动并运行 virtualenv，请按照以下说明操作：\n\
    \n+   1. 打开“开始”菜单并输入 “cmd”。\n+   2. 选择“命令提示符”应用程序。\n+   3. 在控制台中输入以下 pip 命令：\n\
    \    `C:\\Users\\Username> pip install virtualenv`\n\n过程完成后，Virtualenv 现已安装在您的计算机上。\n\
    \n要了解更多关于 Windows 包管理器中的 winget 命令的信息，请参阅我们关于如何使用 winget 更新包的文章。\n\n## 总结\n\n\
    本指南将向您展示如何在 Windows 计算机上设置 Python 3.7.3。如果您升级到更新版本的 Python，可以预期类似的过程。\n\n有关如何执行此操作的更多信息，请查看我们关于如何将\
    \ Python 升级到 3.9 版本的文章。\n\n如果您在同一台计算机上处理多个项目，请确保已安装 Pip 并使用虚拟环境。\n\n新一代的服务器脚本语言现已可供您测试。要了解更多关于如何在\
    \ Windows 10 上安装 Ruby 的信息，请参阅本指南。\n\n是时候编码了！\n\n## 安装和设置 Sublime Text\n\n您需要从位于\
    \ https://sublimetext.com/ 的网站下载 Sublime Text 编辑器的安装程序，才能成功安装它。单击“下载”链接后，搜索与 macOS\
    \ 兼容的安装程序。下载完成后，打开安装程序文件，然后将 Sublime Text 图标拖到计算机上的“应用程序”文件夹中。\n\n## macOS 上的\
    \ Python\n\n大多数 macOS 计算机都预装了 Python，但操作系统附带的版本可能太旧，您不会想用它来学习。本节的第一步是安装最新版本的 Python。之后，下一步是安装\
    \ Sublime Text 并确保其正确配置。\n\n## 验证 Python 3 的存在\n\n应用程序 - 实用工具 - 终端 打开一个终端。按 command\
    \ - 空格键，输入 terminal，然后按回车。输入 `python`（小写 p）以查看安装了哪个版本的 Python 并运行 Python 命令。您应该会看到输出，告诉您安装了哪个\
    \ Python 版本，以及一个 `>>>` 提示符，您可以在其中输入 Python 命令。\n\n```\n$ python\nPython 2.7.15\
    \ (default, Aug 17 2018, 22:39:05)\n[GCC 4.2.1 Compatible Apple LLVM 9.1.0 (clang-902.0.39.2)]\
    \ on darwin Type “help”, “copyright”, “credits”, or “license” for more information.\
    \ >>>\n```\n\n此输出显示当前安装的是 Python 2.7.15。按 Ctrl-D 或输入 `exit()` 以退出 Python 并返回终端提示符。\n\
    \n要检查 Python 3，请输入 `python3`。如果未安装 Python 3，您将收到错误消息。如果您有 Python 3.6 或更高版本，请跳至第\
    \ 8 页的“在终端会话中运行 Python”。如果尚未安装 Python 3，则必须手动安装。当您在本书中看到 `python` 命令时，请使用 `python3`\
    \ 以确保您使用的是 Python 3，而不是 Python 2；它们差异足够大，使用 Python 2 运行本书中的代码会遇到问题。\n\n如果您看到低于\
    \ 3.6 的 Python 版本，请安装最新版本。\n\n## Linux 和 Python\n\n几乎所有 Linux 计算机都已预装 Python，因为该操作系统是为编程而设计的。编写和维护\
    \ Linux 的人员期望并鼓励您进行自己的编程。因此，在开始编程之前，几乎不需要安装任何东西，只需要更改一些设置。\n\n## 执行 Python 版本检查\n\
    \n安装终端应用程序后，您可以在计算机上打开一个终端窗口（在 Ubuntu 中，您可以按 ctrl-alt-T）。输入 `python3`（小写 p）将显示您计算机上当前运行的\
    \ Python 版本。如果已安装 Python，此命令将启动 Python 解释器。将出现一个 `>>>` 提示符，您可以在其中开始输入 Python 命令，这表明已安装了哪个版本的\
    \ Python。\n\n```\n$ python3\nPython 3.7.2 (default, Dec 27 2018, 04:01:51)\n[GCC\
    \ 7.3.0] on linux\nType “help”, “copyright”, “credits” or “license” for more information.\n\
    >>>\n```"
