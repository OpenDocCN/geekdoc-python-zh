    Sum of 1 up to 10: 55\n\n### While 循环\n\n‘while 循环’ 用于当你需要在测试表达式为 True 时重复执行一个语句或一组语句时。当它不再为真时，控制传递到循环之后的行。\n\
    \n语法：\nwhile condition\n    statement(s)\n\n```python\n# 程序将数字相加到用户指定的数字\n# total\
    \ = 1+2+3+4...+number\n```"
