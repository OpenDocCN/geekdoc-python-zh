  md: '# Supervised Machine Learning


    The first type of learning that we need to take a look at here is known as supervised
    machine learning. This is going to be the most basic form of machine learning
    that we can work with, but it will provide us with some of the different parts
    that we need to keep things going well and can help us to train our algorithms
    quickly and efficiently.


    To start, supervised learning is simply going to be the process of helping an
    algorithm to learn to map an input to a particular output. We are going to spend
    or time on this one while showing lots of examples, with the corresponding answers,
    to the algorithm in the hopes that it will find the connections and learn. Then,
    when the training is done, the algorithm will be able to look at new inputs, without
    the corresponding output, and give us the right answer on its own.


    This whole process is going to be achieved when we work on a labeled data set
    that was collected earlier. If the mapping is done correctly, the algorithm is
    going to be able to learn successfully. If it is not reaching the goals here,
    then that means we have to go through and make some changes to our algorithm to
    help it learn well. Supervised machine learning algorithms, when they are trained
    well, will be able to make some good predictions for the new data they get later
    on in the future. This is going to be a similar process that we would see with
    a teacher to student scenario. There is going to be a teacher who can guide the
    student to learn'
  merge: -1
  pgno: 266
- img_proc: true
  md: 'well from books and other materials. The student is then going to be tested
    and, if they are correct, then the student will pass. If not, then the teacher
    will change things up and will help the student to learn better, so that they
    can learn from the mistakes that they made in the past so that they get better.
    This is going to be the basics that come with using supervised machine learning.


    # Unsupervised Machine Learning


    The second type of machine learning that we can work with is known as unsupervised
    learning. This is going to be a method that we can use in data analysis because
    it will enable the machines to go through and classify both the tangible and intangible
    objects, without having to go through and provide the machine or the system with
    any information about of time about the objects.


    The things or the objects that our machines are going to need to classify are
    going to be varied, such as the purchasing behaviors of the customer, some of
    the patterns of behavior of bacteria, and even things like hacker attacks or fraud
    happening with a bank. The main idea that we are going to be able to see with
    this kind of learning is that we want to expose our machines to large volumes
    of data that are varied and then allowing the algorithm to takes time to learn
    and infer from the data. However, we need to be able'
  merge: -1
  pgno: 267
- img_proc: true
  md: 'to take the time to teach the program how it can learn from that data.


    It is pretty common for a computer system to need to learn how to make sense of
    large volumes of data, both the unstructured and the structured types, and then
    learn what insights are inside. In reality, it may be almost impossible to provide
    prior information about all of the data types that a system could receive over
    a period of time, and working with this kind of machine learning can help to make
    things happen, even when you are not able to train your machine ahead of time
    to teach it.


    Keeping all of this in mind, we will find that supervised learning is not going
    to be all that suitable in every case, such as when the systems we are working
    with need to have a constant amount of information about data that is new. For
    example, hacking attacks on a bank or a financial system are going to go through
    and change their patterns and their nature frequently. Supervised learning would
    struggle with keeping up, but unsupervised learning is going to be more appropriate
    to handle this.


    In these cases, and more, unsupervised learning is going to be able to go onto
    a system and quickly learn from all of the data from the attack to keep up. Then
    it can infer and learn some more insights about potential future attacks, while
    also suggesting some preemptive actions to work with along the way.'
  merge: -1
  pgno: 268
- img_proc: true
  md: 'There are a lot of times when we will want to work with unsupervised learning.
    Any time that you want to work with a program or a machine that needs to do at
    least a little bit of learning on its own to get things done, then unsupervised
    learning is going to be the right option to focus on.


    # Reinforcement Machine Learning


    The third type of machine learning that we need to take a look at is known as
    reinforcement machine learning. This is going to be a bit different compared to
    what we saw with the other two options, but there are a lot of times when we can
    use this kind of learning to help us out with sorting through our data, including
    our data analysis. Let’s dive into the basics of reinforcement machine learning
    and how we can use it for our needs.


    To start, the reinforcement learning, in the context of artificial intelligence,
    is going to be a type of dynamic programming that can train algorithms, based
    on the idea of the reward when the algorithm gets the right answer, and a type
    of punishment when it gets the wrong answer. One of the algorithms that use reinforcement
    learning, or the agent, is going to be able to learn how to interact with the
    environment that is going on around it. The agent or the algorithm is going to
    receive some kind of reward when it performs correctly. But when it performs incorrectly,
    it is going to get some kind of punishment or penalty in the process. The agent,
    through these rewards and penalties, is going to learn, without any kind of intervention
    from a'
  merge: -1
  pgno: 269
- img_proc: true
  md: 'human, by maximizing its reward and then figuring out the best way to minimize
    the penalty that it is going to deal with. The algorithm is going to be successful
    with this when it has a chance to learn the right way to behave, and the wrong
    way to behave. When it learns, through the rewards, the right way to behave, it
    will continue with those actions or those guesses to get more rewards. And when
    it does get a penalty for doing something wrong, it is going to remember this
    as well and will learn how to avoid these along the way as well.


    Reinforcement learning is going to be one of the approaches that we can use with
    machine learning, and the inspiration for it is going to be found in behaviorist
    psychology. We can view this in a manner that is similar to how a child can learn
    a new task. This learning is going to have some contrasts to how the other machine
    learning options will approach a situation because this particular algorithm is
    not going to be explicitly told how it should perform a task. It has to learn
    and go through this problem all on its own.


    As an agent, which could be something like a program that is set up to play chess
    or a self-driving car, is going to interact with the environment that is all around
    it, and it is going to receive a type of reward state depending on how well it
    can perform. So, if the game can successfully win the game of chess, then it will
    receive a reward.'
  merge: -1
  pgno: 270
- img_proc: true
  md: 'This goes the other way as well. If the agent does not perform in the manner
    that it should, whether that means that it doesn’t win the game when it should
    or does something else that is wrong based on the programming, then it is going
    to get a penalty of some sort. In the case of the game, it is going to be checkmated
    rather than winning, and it can learn from that in the process.


    The agent, through more practice and over time, is going to be able to make some
