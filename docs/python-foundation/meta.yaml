    3 weather[“Thu”] = “Hot”

    4 weather[“Wed”] = “Gloomy”

    5 del weather[“Mon”]

    6

    7 print (weather[“Wed”])

    ```


    In this exercise, we have created a dictionary called weather with day:weather
    type key:value pairs as you can see. In line 3, we have added a new key:value
    pair; in line 4 we update the value of the “Wed” key, and in line 5 we delete
    the key:value pair for “Mon”. Does your script work as it should?'
