  - '[PAGE 161]


    # Python Dictionary


    A dictionary, or just dict, though containing sequential data as well, is an associative
    array mapping type with mapped keys as values. The data it contains may be in
    sequence, but they are not sorted.


    The elements of a dictionary are mutable and can be of any other data type. Each
    is made up of a key:value pair-matched by a colon (:) and just as with lists and
    tuples, separated by commas. The syntax of a dictionary is an identified object
    made up of one or more elements enclosed in curly braces {}.


    **The syntax takes this format:**


    ```

    myDict = {key1:value1, key2:value2, key3:value3}

    ```


    Similar to lists, dictionaries are mutable and can contain mixed content, including
    tuples (assuming the values are all of the same type), lists, strings, integers,
    etc.'
  - '[PAGE 162]


    The point of the key:value pair model is that every key stored within the dictionary
    is unique. In effect, the dictionary is designed to store the values of a list
    of unique items or properties.


    **Given that the following things are true:**


    +   1. When adding to or creating a dictionary, all entries must be in a key:value
    pair format. If either the key or the value is missing, an exception will be given.

    2. If a key:value pair is added to a dictionary, and the key already exists in
    the dictionary, the old key and value will be discarded for the new entry.

    3. Values can be updated only when a key is provided.

    4. key:value pairs are always deleted together – there is no way to delete just
    the value or just the key.

    5. Lists cannot be used as keys.


    Here are some common operations on dictionaries.


    Create an empty dictionary:


    ```

    >>> x={}

    ```'
