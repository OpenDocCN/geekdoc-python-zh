  md: '# Range Command


    Next, we have the range() command.


    The range command is a built-in python method used to generate a range of numbers
    and is not explicitly part of the for loop syntax.


    It is just there to make the numbers to iterate through. Like other ranges in
    python, the numbers provided do not represent a range from 0 - 3. They represent
    outputting three numbers starting at 0, which gives us 0, 1, and 2.


    3 is not output in the range.


    This is slightly different than the for loops you might be accustomed to in other
    languages. In those, a given range generally included the last number defined
    - for x=1 to 10, for example, would output 1 - 10, not one through 9.


    While we use the range() function to generate the numbers to iterate over in the
    for loop, it is by no means the only option.


    We can pull numerical values from any iterable source to iterate over that source.'
