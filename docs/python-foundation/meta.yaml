  md: 'Now, our dataset is ready to create a logistic regression model. First, split
    our data into two datasets; the first that we will call the training dataset and
    will be used to train the model. The second dataset will be called the test dataset
    and will be used to assess the model’s precision. To do so, we will employ the
    sklearn toolbox that we are going to import first. Then, we will apply the function
    train_test_split() to perform the splitting of the data.


    In this example, the data features X we are using as predictors to predict if
    a passenger would have survived or not are: social class (pclass), number of siblings
    on board (sibsp), number of parents or children on board (parch), the fare, sex
    and embarked town. The label Y to this dataset is the variable survived. When
    performing the data splitting with the train_test_split() we need to specify X,
    here is the Titanic dataset without the variable survived, and the label Y in
    this example is the survived variable. We also need to specify the percentage
    of the data that will be used as test data. Here, we will use 30% of the dataset
    to form the test data. The function is as follows:


    ```

    X= Titanic_data.drop(‘survived’,axis=1)

    Y= Titanic_data[‘survived’]

    from sklearn.model_selection import train_test_split

    Titanic_train, Titanic_test, Survived_train, Survived_test= train_test_split(X,Y,
    test_size=0.30,random_state=101)

    ```


