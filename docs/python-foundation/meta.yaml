- md: "working with the version of Python that you want and any of the other libraries\
    \ that you want.\n\nThese virtual environments may seem like they are complicated,\
    \ but it is helpful because they will provide you with a way to isolate your projects\
    \ and can avoid some of the significant problems that can arise along the way.\
    \ Note that this is going to be a separate environment compared to the normal\
    \ Python environment that was downloaded before. This is important because you\
    \ won’t be able to have any effect on the regular Python environment, whether\
    \ it is bad or good.\n\nAt this point, we want to do some work to help us create\
    \ a virtual environment for that TensorFlow package. This can be done when we\
    \ use the command “conda create.” Since we want to create a brand-new environment\
    \ that we have called tensorenviron, we would need to use the formula below to\
    \ help:\n\n**1. Conda Create -n tensorenviron.** At this point, the program is\
    \ going to ask you whether or not you would like to allow the process of creating\
    \ the environment to continue, or if you would like to cancel the work. You will\
    \ want to type in the “y,” and then hit the enter key to move on. This will allow\
    \ the installation to continue successfully to see the results that you want.\n\
    \nOnce you have been able to go through this whole thing and create an environment,\
    \ you will need to take a few minutes and let this environment activate. If you\
    \ do not do the activation correctly, you won’t be able to use this new environment—you\
    \ won’t be able to get the new environment to work, either. You will be able to\
    \ activate this using the command discussed earlier. From that point, you will\
    \ then be able to list out the name that you would like for the environment. An\
    \ excellent example of what we are talking about here and how it will work includes:\n\
    \n**2. Activate tensorenviron.** Now that you have been able to activate the TensorFlow\
    \ environment, it is time to go ahead and make sure that the package for TensorFlow\
    \ is going to be installed, too. You can do this by using the command below:\n\
    \n**3. Conda installs TensorFlow.** From here, the computer is going to present\
    \ you with a list of all of the different packages that you can install together\
    \ along with the package for TensorFlow if you would like. You will be prompted\
    \ to decide if you want to install these packages or not. You can then type in\
    \ the “y,” and hit the enter key on the keyboard. Once you agree to do this, the\
    \ installation of this package is going to get started right away. However, notice\
    \ that this particular process for installation is going to take a bit of time,\
    \ so you need to wait and remain patient. However, the speed of your connection\
    \ will determine the amount of time that the installation process is going to\
    \ take.\n\nThe progress and how far the installation has gone and is yet to go\
    \ will be shown on a prompt window. After a certain time, the installation process\
    \ is going to be complete, and you can then determine if the installation process\
    \ was successful or not. This is pretty easy to do because you need to run the\
    \ import statement with Python. The statement is going to be done from the regular\
    \ terminal of Python. If you are doing this with the Anaconda prompt, you can\
    \ type in “python” and hit the enter key. This is going to make sure that you\
    \ end up in the terminal for Python, and from there, you can run the import statement\
    \ below:\n\n**4. Import TensorFlow as tf.** If you find that the package wasn’t\
    \ installed properly, you are going to end up with an error message on the screen\
    \ after you do this code. If you don’t see an error message, then you know that\
    \ the installation of the package was successful.\n\n## Using TensorFlow\n\nTensorFlow\
    \ is a library for dataflow programming. It makes it easy for us to work with\
    \ mathematical expressions. Now that you have installed TensorFlow, we need to\
    \ use it. To see whether TensorFlow has been installed on your system, try to\
    \ import it by running the following command:\n\n```\nimport tensorflow as tf\n\
    ```\n\nIf it is not installed, you will get an error, otherwise, the installation\
    \ is successful. If not installed, follow the steps we discussed earlier to install\
    \ the library.\n\n## DataFlow Graphs\n\nIn TensorFlow, computation is based on\
    \ graphs. The graphs provide us with an alternative to solving mathematical problems.\
    \ Consider the expression given below:\n\n```\nx = ( y+z ) * ( z+4 )\n```\n\n\
    The above expression may also be expressed as follows:\n\n```\np = y + z\nq =\
    \ z + 4\nx = p * q\n```\n\nWhen represented as above, it becomes easy to express\
    \ the expression in the form of a graph. Initially, we had a single expression\
    \ but we now have two expressions. The two expressions can be performed in parallel.\
    \ We can gain from this in terms of computation time. Such gains are very important\
    \ in deep learning and big data applications, especially in Convolutional Neural\
    \ Networks (CNNs) and Recurrent Neural Networks (RNNs) which are all complicated\
