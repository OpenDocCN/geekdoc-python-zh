- md: '## Native Python Datatypes


    Every object in Python has a type. The type function allows us to inspect the
    type of object.


    ```python

    >>> type(today)

    ```


    ```

    <class ''dateTime.date''>

    ```


    Python has just a handful of primitive or native data types built into the language.


    Native data types have the following properties:


    1.  There are simple expressions that evaluate to objects of these types, called
    literals.

    2.  There are built-in functions, operators, and methods to manipulate these types
    of values.


    As we have seen, numbers are native; numeric literals evaluate to numbers, and
    mathematical operators manage number objects.


    ```python

    >>> 12 + 3000000000000000000000

    ```


    ```

    300000000000000000000012

    ```


    In case, Python involves three native numeric types: integers (**int**), real
    numbers (**float**), and complex numbers (**complex**).


    ```python

    >>> type(2)

    ```


    ```

    <class ''int''>

    ```


    ```python

    >>> type(1.5)

    ```


    ```

    <class ''float''>

    ```


    ```python

    >>> type(1+1j)

    ```


    ```

    <class ''complex''>

    ```


    The name **float** appears from the way in which real numbers are denoted in Python:
    a "floating point" representation. While the details of how numbers are expressed
    are not a question for this text, some high-level differences between **int**
    and **float** objects are necessary to know. Inappropriate, **int** objects can
    only represent integers, but they represent them exactly, without any approximation.
    On the other hand, **float** objects can express a wide range of fractional numbers,
    without not all rational numbers are representable. Nonetheless, **float** objects
    are often applied to express real and rational numbers approximately, up to some
    number of significant figures.


    Python has many native datatypes.


    Here are the important ones:


    1.  Booleans are either True or False.

    2.  Numbers will be integers (1 and 2), floats (1.1 and 1.2), fractions (1/2 and
    2/3), or even complex numbers.

    3.  Strings are sequences of Unicode characters, e.g. an Html document.

    4.  Bytes and byte arrays, e.g. a jpeg image file.

    5.  Lists are ordered sequences of values.

    6.  Tuples are ordered, immutable sequences of values.

    7.  Sets are unordered bags of values.

    8.  Dictionaries are unordered bags of key-value pairs.


    Of course, there are more types than these. Everything is an object in Python,
    so there are types like module, function, class, method, file, and even edited
    code.


    ## Numbers


    Numeric values are stored by Number data types. They are immutable data types.
    This means, alternating the value of a number of data type Output:s a newly allocated
    object.


    At the time of assigning a value, the Number objects are created. As example –


    ```python

    var1 = 10

    var2 = 20

    ```


    By using the del statement, the reference to a number object also can be deleted.
    The del statement syntax is –


    ```python

    del var1[,var2[,var3[....,varN]]]]

    ```


    Using the del statement can delete a single object or multiple objects. As example
    –


    ```python

    del var

    del var_a, var_b

    ```


    Different types of numerical are supported by Python–


    -   **int (signed integers)** – Normally it is called just integers or ints. They
    are positive or negative total numbers with no decimal point. In Python 3 Integers
    are of infinite size. Python 2 holds two integer types - int and long. there''s
    no ''long integer'' in Python 3 anymore.

    -   **float (floating point real values)** – It is also called floats. Real numbers
    are represented by them and written with a decimal point dividing the integer
    and the fractional parts. In scientific notation, floats can also be represented
    with E or e indicating the power of 10 (2.5e2 = 2.5 x 102 = 250).

    -   **complex (complex numbers)** – are of the form a + bJ, where a and b are
    floats and J (or j) denotes the square root of -1 (which is an unreal number).
    The real part of the number is a, and the unreal part is b. In Python programming,
    Complex numbers are not applied so much.


    It is probable to denote an integer in hexadecimal or octal form.


    ```python

    >>> number = 0xA0F  #Hexa-decimal

    >>> number

    2575

    >>> number = 0o37   #Octal

    >>> number

    31

    ```


    ## Examples


    Some examples of numbers are given here.


    | int | float | complex |

    | --- | --- | --- |

    | 10 | 0.0 | 2.16j |

    | 200 | 12.30 | 35.j |

    | -245 | -42.5 | 3.234e-26j |

    | 078 | 22.3+e15 | .568J |

    | -0360 | -60. | -.5656+0J |

    | -0x290 | -52.32e200 | 3e+56J |

    | 0x39 | 90.2-E16 | 6.23e-3j |


    A complex number consists of an ordered pair of real floating-point numbers indicated
    by a + bj, where a is the real part and b is the unreal part of the complex number.


    ## Number Type Conversion


    Python transforms numbers inwardly in an illustration including mixed types to
    a common type for amends. Sometimes, you need to control a number apparently from
    one type to another to meet the conditions of an operator or function parameter.


    -   Type int(x) to convert x to a plain integer.

    -   Type long(x) to convert x to a long integer.

    -   Type float(x) to convert x to a floating-point number.

    -   Type complex(x) to convert x to a complex number with real part x and unreal
    part zero.

    -   Type complex(x, y) to convert x and y to a complex number with real part x
    and unreal part y. x and y are numeric expressions.


    ## Mathematical Functions


    Python introduces the following functions that produce mathematical calculations.


    | # | Function & Returns ( Description ) |

    | --- | --- |

    | 1 | **abs(x)**<br>The absolute value of x: the (positive) range from zero to
    x. |

    | 2 | **ceil(x)**<br>The ceiling of x: the least integer not less than x. |

    | 3 | **cmp(x, y)**<br>-1 if y>x, 0 if x == y, or 1 if y<x. It''s Deprecated in
    Python 3.<br>Instead usereturn (x>y)-(x<y). |

    | 4 | **exp(x)**<br>The exponential of x: e^x |

    | 5 | **fabs(x)**<br>The absolute value of x. |

    | 6 | **floor(x)**<br>The floor of x: the largest integer not bigger than x. |

    | 7 | **log(x)**<br>natural logarithm of x, for x > 0. |

    | 8 | **log10(x)**<br>base-10 logarithm of x for x > 0. |

    | 9 | **max(x1, x2,...)**<br>The largest of its arguments: the value nearest to
    positive infinity |

    | 10 | **min(x1, x2,...)**<br>The smallest of its arguments: the value nearest
    to negative infinity. |

    | 11 | **modf(x)**<br>The both( fractional and integer )parts of x in a two-item
    tuple.<br>Each part has a similar sign as x. The integer returned as a float .
    |

    | 12 | **pow(x, y)**<br>The value of x**y. |

    | 13 | **round(x [,n])**<br>x rounded to the decimal point from n digits. Python
    rounds<br>away from zero as a tie-breaker: round(0.5) is 1.0 and<br>round(-0.5)
    is -1.0. |

    | 14 | **sqrt(x)**<br>The squared root of x for x > 0. |


    ## Random Number Functions


    In games, simulations, testing, security, and privacy applications random numbers
    are used. Python introduces the following functions that are generally used.


    | # | Function & Description |

    |---|---|

    | 1 | **choice(seq)**<br>A blind item from a list, tuple, or string. |

    | 2 | **randrange ([start,] stop [,step])**<br>A randomly selected element from
    range(start, stop, step). |

    | 3 | **random()**<br>A blind float r, such that 0 is less than or equal to r
    and r is less than 1 |

    | 4 | **seed([x])**<br>Sets the integer opening value applied in generating random
    numbers. Call this function before calling any each random module function. Returns
    None. |

    | 5 | **shuffle(lst)**<br>Randomizes the items of a list in place. Returns None.
    |

    | 6 | **uniform(x, y)**<br>A random float r, like x < r, or equal to r and r <
    y. |


    ## Trigonometric Functions


    Following functions are introduced in Python language that performs trigonometric
    calculations.


    | # | Function & Description |

    |---|---|

    | 1 | **acos(x)**<br>Return the arc cosine of x, in radians. |

    | 2 | **asin(x)**<br>Return the arc sine of x, in radians. |

    | 3 | **atan(x)**<br>Return the arc tangent of x, in radians. |

    | 4 | **atan2(y, x)**<br>Return atan(y / x), in radians. |

    | 5 | **cos(x)**<br>Return the cosine of x radians. |

    | 6 | **hypot(x, y)**<br>Return the Euclidean norm, sqrt(x*x + y*y). |

    | 7 | **sin(x)**<br>Return the sine of x radians. |'
  mdcn: '## Python 原生数据类型


    Python 中的每个对象都有一个类型。`type` 函数允许我们检查对象的类型。


    ```python

    >>> type(today)

    ```


    ```

    <class ''dateTime.date''>

    ```


    Python 语言内置了少数几种基本或原生的数据类型。


    原生数据类型具有以下属性：


    1.  有简单的表达式可以求值为这些类型的对象，称为字面量。

    2.  有内置函数、运算符和方法来操作这些类型的值。


    正如我们所见，数字是原生的；数字字面量求值为数字，数学运算符管理数字对象。


    ```python

    >>> 12 + 3000000000000000000000

    ```


    ```

    300000000000000000000012

    ```


    具体来说，Python 涉及三种原生数字类型：整数（**int**）、实数（**float**）和复数（**complex**）。


    ```python

    >>> type(2)

    ```


    ```

    <class ''int''>

    ```


    ```python

    >>> type(1.5)

    ```


    ```

    <class ''float''>

    ```


    ```python

    >>> type(1+1j)

    ```


    ```

    <class ''complex''>

    ```


    **float** 这个名称源于 Python 中实数的表示方式：“浮点”表示法。虽然数字如何表达的细节不是本文讨论的问题，但了解 **int** 和 **float**
    对象之间的一些高层差异是必要的。简而言之，**int** 对象只能表示整数，但它们能精确地表示整数，没有任何近似。另一方面，**float** 对象可以表示广泛的分数数字，尽管并非所有有理数都是可表示的。尽管如此，**float**
    对象通常用于近似表示实数和有理数，精确到一定的有效数字位数。


    Python 有许多原生数据类型。


    以下是重要的一些：


    1.  布尔值是 True 或 False。

    2.  数字可以是整数（1 和 2）、浮点数（1.1 和 1.2）、分数（1/2 和 2/3），甚至是复数。

    3.  字符串是 Unicode 字符的序列，例如一个 HTML 文档。

    4.  字节和字节数组，例如一个 jpeg 图像文件。

    5.  列表是有序的值序列。

    6.  元组是有序的、不可变的值序列。

    7.  集合是无序的值包。

    8.  字典是无序的键值对包。


    当然，类型不止这些。Python 中一切都是对象，所以有像模块、函数、类、方法、文件，甚至编辑过的代码这样的类型。


    ## 数字


    数值由数字数据类型存储。它们是不可变的数据类型。这意味着，更改数字数据类型的值会输出一个新分配的对象。


    在赋值时，会创建数字对象。例如 –


    ```python

    var1 = 10

    var2 = 20

    ```


    使用 `del` 语句也可以删除对数字对象的引用。`del` 语句的语法是 –


    ```python

    del var1[,var2[,var3[....,varN]]]]

    ```


    使用 `del` 语句可以删除单个对象或多个对象。例如 –


    ```python

    del var

    del var_a, var_b

    ```


    Python 支持不同类型的数字 –


    -   **int（有符号整数）** – 通常称为整数或 ints。它们是正或负的整数，没有小数点。在 Python 3 中，整数是无限大小的。Python
    2 有两种整数类型 - int 和 long。Python 3 中不再有 ''long integer''。

    -   **float（浮点实数值）** – 也称为浮点数。它们表示实数，用小数点分隔整数和小数部分。在科学计数法中，浮点数也可以用 E 或 e 表示 10
    的幂（2.5e2 = 2.5 x 102 = 250）。

    -   **complex（复数）** – 形式为 a + bJ，其中 a 和 b 是浮点数，J（或 j）表示 -1 的平方根（这是一个虚数）。数字的实部是
    a，虚部是 b。在 Python 编程中，复数应用不多。


    可以用十六进制或八进制形式表示整数。


    ```python

    >>> number = 0xA0F  #十六进制

    >>> number

    2575

    >>> number = 0o37   #八进制

    >>> number

    31

    ```


    ## 示例


    这里给出一些数字的示例。


    | int | float | complex |

    | --- | --- | --- |

    | 10 | 0.0 | 2.16j |

    | 200 | 12.30 | 35.j |

    | -245 | -42.5 | 3.234e-26j |

    | 078 | 22.3+e15 | .568J |

    | -0360 | -60. | -.5656+0J |

    | -0x290 | -52.32e200 | 3e+56J |

    | 0x39 | 90.2-E16 | 6.23e-3j |


    复数由一个有序的实浮点数对表示，形式为 a + bj，其中 a 是复数的实部，b 是虚部。


    ## 数字类型转换


    Python 在内部将包含混合类型的表达式中的数字转换为公共类型以进行调整。有时，你需要显式地将数字从一种类型转换为另一种类型，以满足运算符或函数参数的条件。


    -   使用 `int(x)` 将 x 转换为普通整数。

    -   使用 `long(x)` 将 x 转换为长整数。

    -   使用 `float(x)` 将 x 转换为浮点数。

    -   使用 `complex(x)` 将 x 转换为实部为 x、虚部为零的复数。

    -   使用 `complex(x, y)` 将 x 和 y 转换为实部为 x、虚部为 y 的复数。x 和 y 是数字表达式。


    ## 数学函数


    Python 引入了以下用于执行数学计算的函数。


    | # | 函数与返回值（描述） |

    | --- | --- |

    | 1 | **abs(x)**<br>x 的绝对值：从零到 x 的（正）距离。 |

    | 2 | **ceil(x)**<br>x 的上取整：不小于 x 的最小整数。 |

    | 3 | **cmp(x, y)**<br>如果 y>x 返回 -1，如果 x == y 返回 0，如果 y<x 返回 1。在 Python 3 中已弃用。<br>请改用
    `return (x>y)-(x<y)`。 |

    | 4 | **exp(x)**<br>x 的指数：e^x |

    | 5 | **fabs(x)**<br>x 的绝对值。 |

    | 6 | **floor(x)**<br>x 的下取整：不大于 x 的最大整数。 |

    | 7 | **log(x)**<br>x 的自然对数，其中 x > 0。 |

    | 8 | **log10(x)**<br>x 的以 10 为底的对数，其中 x > 0。 |

    | 9 | **max(x1, x2,...)**<br>其参数中的最大值：最接近正无穷大的值。 |

    | 10 | **min(x1, x2,...)**<br>其参数中的最小值：最接近负无穷大的值。 |

    | 11 | **modf(x)**<br>以二元组形式返回 x 的小数部分和整数部分。<br>每个部分的符号与 x 相同。整数部分作为浮点数返回。 |

    | 12 | **pow(x, y)**<br>x**y 的值。 |

    | 13 | **round(x [,n])**<br>x 四舍五入到小数点后 n 位。Python 在平局时远离零进行舍入：round(0.5) 是 1.0，round(-0.5)
    是 -1.0。 |

    | 14 | **sqrt(x)**<br>x 的平方根，其中 x > 0。 |


    ## 随机数函数


    在游戏、模拟、测试、安全和隐私应用中使用随机数。Python 引入了以下常用函数。


    | # | 函数与描述 |

    |---|---|

    | 1 | **choice(seq)**<br>从列表、元组或字符串中随机选择一个项目。 |

    | 2 | **randrange ([start,] stop [,step])**<br>从 range(start, stop, step) 中随机选择一个元素。
    |

    | 3 | **random()**<br>一个随机浮点数 r，使得 0 <= r < 1 |

    | 4 | **seed([x])**<br>设置生成随机数时使用的整数初始值。在调用任何 random 模块函数之前调用此函数。返回 None。 |

    | 5 | **shuffle(lst)**<br>就地随机排列列表的项目。返回 None。 |

    | 6 | **uniform(x, y)**<br>一个随机浮点数 r，使得 x <= r < y。 |


    ## 三角函数


    Python 语言中引入了以下执行三角计算的函数。


    | # | 函数与描述 |

    |---|---|

    | 1 | **acos(x)**<br>返回 x 的反余弦值，以弧度为单位。 |

    | 2 | **asin(x)**<br>返回 x 的反正弦值，以弧度为单位。 |

    | 3 | **atan(x)**<br>返回 x 的反正切值，以弧度为单位。 |

    | 4 | **atan2(y, x)**<br>返回 atan(y / x)，以弧度为单位。 |

    | 5 | **cos(x)**<br>返回 x 弧度的余弦值。 |

    | 6 | **hypot(x, y)**<br>返回欧几里得范数，sqrt(x*x + y*y)。 |

    | 7 | **sin(x)**<br>返回 x 弧度的正弦值。 |'
