    ## Python 列表


    在 Python 的复合数据类型中，列表是变化最多的一种。列表用于保存以逗号分隔并用方括号（`[]`）括起来的项目。在某种程度上，列表与 C 语言中的数组相关。它们之间的一个区别是，列表中的所有项目可以是不同的数据类型。


    存储在列表中的值可以使用切片运算符（`[]` 和 `[:]`）获取，索引从列表开头的 0 开始，一直到末尾的 -1。加号（`+`）表示列表连接运算符，星号（`*`）表示重复运算符。例如
    –


    ```

