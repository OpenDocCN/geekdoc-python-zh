    \ 语句。 |\n\n让我们快速了解每个循环控制语句。\n\n## 迭代器和生成器\n\n迭代器是一个对象，它支持程序员遍历集合的所有元素，无论其具体实现如何。在\
    \ Python 中，迭代器对象执行两个方法：`iter()` 和 `next()`。\n\n可以使用字符串、列表或元组对象创建迭代器。\n\n```\n\
    list = [1,2,3,4]\nit = iter(list) # 这会创建一个迭代器对象\nprint (next(it)) # 打印迭代器中下一个可用的元素\n\
    ```\n\n迭代器对象通常使用常规的 `for` 语句进行遍历！\nusr/bin/python3\nfor x in it:\n    print (x,\
    \ end=\" \")\n或者使用 `next()` 函数\nwhile True:\n    try:\n        print (next(it))\n\
    \    except StopIteration:\n        sys.exit() # 为此你需要导入 sys 模块\n```\n\n生成器是一个使用\
    \ `yield` 方法返回或产生一系列值的函数。\n\n当调用生成器函数时，它返回一个生成器对象，甚至不开始执行函数。当第一次调用 `next()` 方法时，函数开始执行，直到到达\
    \ `return` 语句，该语句返回产生的值。`yield` 会跟踪（即记住）上次执行的位置，第二次 `next()` 调用将从上一个值继续。\n\n##\
    \ 示例\n\n以下示例定义了一个生成器，它为所有斐波那契数生成一个迭代器。\n\n```\n#!usr/bin/python3\nimport sys\n\
    def fibonacci(n): # 生成器函数\n    a, b, counter = 0, 1, 0\n    while True:\n    \
    \    if (counter > n):\n            return\n        yield a\n    return\n    \
    \    yield a\n        a, b = b, a + b\n        counter += 1\nf = fibonacci(5)\
    \ # f 是迭代器对象\nwhile True:\n```"
