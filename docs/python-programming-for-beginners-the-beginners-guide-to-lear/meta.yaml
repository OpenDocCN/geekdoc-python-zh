    ```\n\n| 输出： | dict['Name']: Shara\ndict['Age']: 7 |\n\n如果我们尝试用一个不是字典一部分的键来访问数据项，结果会看到一个错误\
    \ –\n\n```\n#!/usr/bin/python3\ndict = {'Name': 'Shara', 'Age': 7, 'Class': 'First'};\n\
    print \"dict['Alice']: \", dict['Alice']\n```\n\n| 输出： | File \"main.py\", line\
