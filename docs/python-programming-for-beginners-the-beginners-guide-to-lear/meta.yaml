    \ |\n| 4 | **min(tuple)**<br>返回元组中值最小的项。 |\n| 5 | **tuple(seq)**<br>将列表转换为元组。\
    \ |\n\n## 字典\n\n每个键与其值之间用冒号 (`:`) 分隔，项之间用逗号分隔，整个内容用花括号括起来。一个不包含任何对象的空字典用两个花括号表示，像这样：`{}`。\n\
