    \n要访问元组中的值，请使用方括号进行切片，并配合索引或索引范围来获取该索引处的值。例如 –\n\n```\n#!/usr/bin/python3\ntup1\
    \ = ('Banana', 'Watermelon', 1990, 2000)\ntup2 = (1, 2, 3, 4, 5, 6)\nprint (\"\
    tup1[0]: \", tup1[0])\nprint (\"tup2[1:5]: \", tup2[1:5])\n```\n\n| 输出： | tup1[0]:\
    \ Banana\ntup2[1:5]: (2, 3, 4, 5) |\n\n你不能更新或更改元组元素的值，因为元组是永久的。你可以从现有元组中取出部分来创建新元组，如下例所示\
    \ –\n\n```\n#!/usr/bin/python3\ntup1 = (10, 20,30)\ntup2 = ('abc', 'xyz')\n# 以下操作对元组无效\n\
