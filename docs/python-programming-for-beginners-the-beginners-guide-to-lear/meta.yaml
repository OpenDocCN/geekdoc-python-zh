- md: '## Mathematical Constants


    The module also represents two mathematical constants –


    | # | Constants & Description |

    |---|---|

    | 1 | **pi**<br>The mathematical constant pi. |

    | 2 | **e**<br>The mathematical constant e. |


    ## Strings


    The most popular data type in Python is Strings. A string can create simply by
    embedding characters in quotes. Single quotes in Python is treated as double quotes.
    It is very simple to create a string as assigning a value to a variable. As example
    –


    ```

    var1 =''Hello World!''

    var2 ="Python Programming"

    ```


    ## Accessing Values in Strings


    The character type is not supported by Python; these are treated as strings of
    length one, thus also granted a substring.


    For getting access to substrings, you can use the square brackets for splitting
    along with the index or contents to obtain your substring.

    As example –


    ```

    #!/usr/bin/python3

    var1 = ''Hello World!''

    var2 = "Python Programming"

    print ("var1[0]: ", var1[0])

    print ("var2[0:6]: ", var2[0:6])

    ```


    | Output : | var1[0]: H

    var2[0:6]: Python |


    ## Updating Strings


    You can "update" an extant string by (re)assigning a variable to another string.
    The new value can be related to its prior value or to a completely different string
    altogether. As example –


    ```

    #!/usr/bin/python3

    var1 = ''Hello World!''

    print ("Updated String :- ", var1[:6] + ''Python'')

    ```


    | Output: | Updated String :- Hello Python |


    ## Escape Characters


    There is a list of escape or non-printable characters in the following table that
    can be represented with backslash notation.


    An escape character gets explained; in a single quoted as well as double-quoted
    strings.


    | Backslash notation | Hexadecimal character | Description |

    | --- | --- | --- |

    | \a | 0x05 | Bell or alert |

    | \b | 0x09 | Backspace |

    | \cx | | Control-x |

    | \C-x | | Control-x |

    | \e | 0x2b | Escape |

    | \f | 0x0c | Formfeed |

    | \M-\C-x | | Meta-Control-x |

    | \n | 0x0a | Newline |

    | \nnn | | Octal notation, there n is in the range 0.7 |

    | \r | 0x0d | Carriage return |

    | \s | 0x10 | Space |

    | \t | 0x08 | Tab |

    | \v | 0x0b | Vertical tab |

    | \x | Character x |

    | \xnn | Hexadecimal notation, there n is in the range 0.9, a.f, or A.F |


    ## String Special Operators


    Consider string variable ''a'' holds ''Hello'' and variable ''b'' holds ''Python'',
    then –


    | Operator | Description | Example |

    |---|---|---|

    | + | Concatenation - Adds values on both sides of the operator | a + b will give
    HelloPython |

    | * | Repetition - Produces new strings, concatenating several copies of the same
    string | a*2 will give - HelloHello |

    | [] | Slice - Provides the character from the given index | a[1] will give e
    |

    | [:] | Range Slice - Provides the characters from the given range | a[1:4] will
    give ell |

    | In | Membership - Returns true if a character remains in the given string |
    H in a will give 1 |

    | not in | Membership - Returns true if a character does not remains in the given
    string | M not in a will give 1 |

    | r/R | Raw String - Overcomes original meaning of Escape characters. The syntax
    for raw strings is specifically the same as for regular strings with the exception
    of the raw string operator, the letter "r," which leads the quotation marks. The
    "r" can be lowercase (r) or uppercase (R) and must be placed directly leading
    the first quote mark. | print r''\n'' prints \n and print R''\n''prints \n |

    | % | Format - Executes String formatting | See at next |


    ## String Formatting Operator


    string format operator % is One of the coolest features in Python. This operator
    is unusual to strings and proceeds for the pack of having functions from C''s
    printf() family. Here is an easy example –


    ```

    #!/usr/bin/python3

    print =(My name is %s and weight is %d kg! % (''Steve'', 21))

    ```


    | Output: | My name is Steve and weight is 21 kg! |


    The list of a complete set of symbols is given here which can be used along with
    % –


    | # | Format Symbol & Conversion |

    |---|---|

    | 1 | **%c** Character |

    | 2 | **%s** string conversion via str() prior to formatting |

    | 3 | **%i** signed decimal integer |

    | 4 | **%d** signed decimal integer |

    | 5 | **%u** unsigned decimal integer |

    | 6 | **%o** octal integer |

    | 7 | **%x** hexadecimal integer (lowercase letters) |

    | 8 | **%X** hexadecimal integer (UPPERcase letters) |

    | 9 | **%e** exponential notation (with lowercase ''e'') |

    | 10 | **%E** exponential notation (with UPPERCASE ''E'') |

    | 11 | **%f** floating point real number |

    | 12 | **%g** the shorter of %f and %e |

    | 13 | **%G** the shorter of %f and %E |


    Some other supported symbols and functionality are given here in the table –


    | Sr.No. | Symbol & Functionality |

    |---|---|

    | 1 | * argument specifies width or precision |

    | 2 | - left justification |

    | 3 | + display the sign |

    | 4 | <sp> leave a blank space before a positive number |

    | 5 | # add hexadecimal leading ''0x'' or ''0X'' or the octal leading zero ( ''0''
    ), depending on whether ''x'' or ''X'' were used. |

    | 6 | 0 pad from left with zeros (instead of spaces) |

    | 7 | % ''%%'' leaves you with a single literal ''%'' |

    | 8 | (var) mapping variable (dictionary arguments) |

    | 9 | m.n. m is the least whole width and n is the number of digits to perform
    after the decimal point (if appl.) |


    ## Triple Quotes


    By allowing strings python''s triple quotes rescue the Span multiple lines, including
    verbatim NEWLINEs, TABs, and any other special characters.


    Triple quotes build of three connected single or double quotes in the syntax.


    ```

    #!/usr/bin/python3

    TABB ( \t ) and they will show up that way when displayed.

    NEWLINEs inside the string, whether explicitly supplied like

    this inside the brackets

    [ \n ], or just a NEWLINE inside

    the variable assignment will also show up.

    ''''''''''

    print (para_str)

    ```


    | Output: | this is a large string that is produced of

    different lines and non-printable characters

    such as

    TABB (  ) and they will show up that way when

    displayed.

    NEWLINEs inside the string, whether explicitly

    supplied like

    this inside the brackets

    [

    ], or just a NEWLINE inside

    the variable assignment will also show up. |


    > **Note:** how all single unique character has been changed to its

    printed form, right down to the least NEWLINE at the end of the

    string between the "up." and closing triple quotes. Also, remark that

    NEWLINEs transpire either with an exact carriage return at the end

    of a line or its escape code (\n) –


    The backslash at new strings does not treat a special character at

    all. Every character put into a raw string stays the way wrote it –


    ```

    #!/usr/bin/python3

    print (''C:\nowhere'')

    ```


    The following Output: is produced when the above code is executed.


    C:\nowhere


    Now it is a time to use of raw string. We would set an expression in r''expression''
    as heeds –


    ```

    #!/usr/bin/python3

    print (r''C:\nowhere'')

    ```


    The following Output: is produced when the above code is executed.


    C:\nowhere


    ## Unicode String


    In Python 2 all strings filed internally as 8-bit ASCII, thus it''s duty-bound
    to connect ''u'' to create it Unicode. it''s now not required currently. In Python
    3, all strings are diagrammatic in Unicode.


    ## Built-in String Method


    To manipulate strings, python includes the following built-in methods-


    | Sr.No. | Methods & Description |

    | :--- | :--- |

    | 1 | **capitalize()**<br>Capitalizes first letter of string |

    | 2 | **center(width, fillchar)**<br>Returns a string padded with fillchar with
    the initial string centered to a total of width columns. |

    | 3 | **count(str, beg = 0,end = len(string))**<br>Counts what number times str
    happens in string or in a very substring of string if beginning index beg and
    ending index end are given. |

    | 4 | **decode(encoding = ''UTF-8'',errors = ''strict'')**<br>Decodes the string
    applying the codec filed for encoding. encoding defaults to the default string
    encoding. |

    | 5 | **encode(encoding = ''UTF-8'',errors = ''strict'')**<br>Returns encoded
    string version of string; on error, default is to grow a ValueError except errors
    is given with ''ignore'' or ''replace''. |

    | 6 | **endswith(suffix, beg = 0, end = len(string))**<br>Determines if a string
    or a substring of string (if starting index beg and ending index end are given)
    ends with a suffix; returns true if so and false otherwise. |'
