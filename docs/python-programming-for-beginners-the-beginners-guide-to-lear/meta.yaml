    \ the inner, nested loop, which then runs to the conclusion. Then the program\
    \ repeats back to the top of the outer loop, creating the second iteration and\
    \ repeatedly triggering the nested loop. Again, the nested loop runs to the conclusion,\
    \ and the application repeats back to the top of the outer loop until the sequence\
    \ is finished or a **break** or other statement disrupts the process.\n\nLet’s\
    \ perform a nested **for** loop so we can take a closer look. In this instance,\
