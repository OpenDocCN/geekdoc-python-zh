    The values stored in a list can be obtained using the slice operator ([] and [:])
    with indexes starting at 0 at the beginning of the list and working their way
    to end -1. The plus (+) sign means the list concatenation operator, and the asterisk
    (*) means the repetition operator. As example –


    ```

    #!/usr/bin/python3

    list = [ ''wxyz'', 786 , 3.23, ''Steve'', 80.2 ]

    tinylist = [123, ''Steve'']

    print (list)       # Prints complete list

    print (list[0])    # Prints first component of the list

    print (list[1:3])  # Prints components starting from 2nd till 3rd

    print (list[2:])   # Prints components starting from 3rd element

    print (tinylist * 2) # Prints list two times

    print (list + tinylist) # Prints concatenated lists

    ```


    | Output: | [''wxyz'', 786, 3.23, ''Steve'', 80.2]<br>wxyz<br>[786, 3.23]<br>[3.23,
    ''Steve'', 80.2]<br>[123, ''Steve'', 123, ''Steve'']<br>[''wxyz'', 786, 3.23,
    ''Steve'', 80.2, 123, ''Steve''] |

