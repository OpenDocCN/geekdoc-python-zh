    being cryptic. Python is a very powerful language, which means that we can normally
    write far fewer lines of Python code than would be needed for an equivalent application
    written in, say, C++ or Java.


    Python is a cross-platform language: so the same Python program can be run on
    Windows and Unix-like systems such as Linux, BSD or Mac OS X, just copy the file
    or files that make up the program to the target machine, with no “building” or
    compiling required. It is possible to build Python programs that apply platform-specific
    functionality, but this is unusually important since almost all of Python’s standard
    library and most maximum third-party libraries are completely and transparently
    cross-platform.


    One of Python’s exceptional strengths is that it comes with a very full standard
    library, this provides us to do such tasks as download a file from the Internet,
    unpack a compressed archive file or build a web server, just one or a few lines
    of code. And in expanding to the standard library, thousands of third-party libraries
    are free, some providing more strong and sophisticated tools than the standard
    library just like the Twisted networking library and the NumPy numeric library
    while others give functionality that is too functional to be included in the standard
    library-for instance, the SimPy simulation package. Most maximum of the third-party
    libraries is accessible from the Python Package Index, pypi.python.org/pypi.


    Python can be used to program in procedural, object-oriented, and to a minor extent,
