- md: "## Boolean Logic And Conditional\n\nThe Boolean data type can be 1 of two values,\
    \ either True or False. Use Booleans in programming to perform comparisons and\
    \ to control the flow of the application.\n\nBooleans express the true values\
    \ that are associated with the logic branch of mathematics, which informs algorithms\
    \ in computer science. Named for the mathematician George Boole, the word Boolean\
    \ constantly begins with a capitalized B. The values True and False will also\
    \ regularly be with a capital T and F respectively, as they are special values\
    \ in Python.\n\nIn this chapter, we'll go over the basics you'll need to understand\
    \ how Booleans work, including Boolean comparison and logical operators, and truth\
    \ tables.\n\n## Comparison Operators\n\nIn programming, comparison operators are\
    \ used to comparing values and evaluate down to a single Boolean value of either\
    \ True or False.\n\nThe table below shows the Boolean comparison operators.\n\n\
    | Operator | What it means |\n| --- | --- |\n| == | Equal to |\n| != | Not equal\
    \ to |\n| < | Less than |\n| > | Greater than |\n| <= | Less than or equal to\
    \ |\n| >= | Greater than or equal to |\n\nTo understand how these operators work,\
    \ let's assign two integers to two variables in a program:\n\n```\nx = 5\n\ny\
    \ = 8\n```\n\nWe know that in this example since **x** has a value of 5, it is\
    \ less than **y** which has a value of 8.\n\nApplying those two variables and\
    \ their associated values, let's go through the operators from the table above.\
    \ In this program, we'll charge Python to print out whether each comparison operator\
    \ evaluates to either True or False.\n\n```\nx = 5\n\ny = 8\n\nprint(\"x == y:\"\
    , x == y)\n\nprint(\"x != y:\", x != y)\n\nprint(\"x < y:\", x < y)\n\nprint(\"\
    x > y:\", x > y)\n\nprint(\"x <= y:\", x <= y)\n\nprint(\"x >= y:\", x >= y)\n\
    ```\n\nTo help us better understand this output, we'll have Python also print\
    \ a string to show us what it's evaluating.\n\nOutput:\n\n```\nx == y: False\n\
    \nx != y: True\n\nx < y: True\n\nx > y: False\n\nx <= y: True\n\nx >= y: False\n\
    ```\n\nFollowing mathematical logic, in each of the expressions before, Python\
    \ has evaluated:\n\nIs 5 (x) equal to 8 (y)? False\nIs 5 not equal to 8? True\n\
    Is 5 less than 8? True\nIs 5 greater than 8? False\nIs 5 less than or equal to\
    \ 8? True\nIs 5 not less than or equal to 8? False\n\nAlthough used integers here,\
    \ we could replace them with float values.\n\nStrings can also be used with Boolean\
    \ operators. They are case-sensitive unless employing an additional string method.\n\
    \nWe can look at how strings are compared in practice:\n\n```\nSammy = \"Sammy\"\
    \nsammy = \"sammy\"\nprint(\"Sammy == sammy: \", Sammy == sammy)\n```\n\nOutput:\n\
    Sammy == sammy: False\n\nThe string **\"Sammy\"** earlier is not equal to the\
    \ string **\"sammy\"**, because they are not precisely the same; one starts with\
    \ an upper-case S and the opposite with a lower-case s. But, if you add an extra\
    \ variable that is assigned the value of **\"Sammy\"**, then they will evaluate\
    \ to equal:\n\n```\nSammy = \"Sammy\"\nsammy = \"sammy\"\nalso_Sammy = \"Sammy\"\
    \nprint(\"Sammy == sammy: \", Sammy == sammy)\nprint(\"Sammy == also_Sammy\",\
    \ Sammy == also_Sammy)\n```\n\nOutput\nSammy == sammy: False\nSammy == also_Sammy:\
    \ True\n\nYou can too apply the other comparison operators including > and < to\
    \ compare two strings. Python will analyze these strings lexicographically using\
    \ the ASCII values of the characters.\n\nWe can also estimate Boolean values with\
    \ comparison operators:\n\n```\nt = True\nf = False\nprint(\"t != f: \", t !=\
    \ f)\n```\n\nOutput\nt != f: True\n\nThe above Output that True is not equal to\
    \ False.\n\n## Logical Operators\n\nThere are three logical operators that are\
    \ applied to compare values. They assess expressions down to Boolean values, returning\
    \ either **True** or **False**. These operators are **and**, **or**, and **not**\
    \ and are described in the table below.\n\n| Operator | What it means | What it\
    \ looks like |\n| :--- | :--- | :--- |\n| And | True if they both are true | x\
    \ and y |\n| Or | True if at least 1 is true | x or y |\n| not | True only if\
    \ it false | not x |\n\nLogical operators are typically applied to evaluate whether\
    \ two or more expressions are true or not true. For instance, they can be applied\
    \ to determine if the grade is passing and that the student is enrolled in the\
    \ course, and if both cases are true then the student will be allowed a grade\
    \ in the system. Another example would be to decide whether a user is a valid\
    \ active customer of an online shop based on whether they have shop credit or\
    \ have made an investment in the past 6 months.\n\nTo understand how logical operators\
    \ work, let’s estimate three expressions:\n\n```\nprint((9 > 7) and (2 < 4)) #\
    \ Both original expressions are True\nprint((8 == 8) or (6 != 6)) # One original\
    \ expression is True\nprint(not(3 <= 1))          # The original expression is\
    \ False\n```\n\nOutput\nTrue\nTrue\nTrue\n\n## Truth Tables\n\nThere is a lot\
    \ to study about the logic branch of mathematics, but we can selectively learn\
    \ some of it to promote our algorithmic thinking when programming.\n\nBelow are\
    \ truth tables for the comparison operator ==, and every of the logic operators\
    \ and, or, and not. While you may be capable to reason them out, it **and** can\
    \ also be necessary to work to memorize them as that can make your programming\
    \ decision-making process quicker.\n\n### == Truth Table\n\n| x | == | y | Returns\
    \ |\n|---|---|---|---|\n| True | == | True | True |\n| True | == | False | False\
    \ |\n| False | == | True | False |\n| False | == | False | True |\n\n### AND Truth\
    \ Table\n\n| x | and | y | Returns |\n|---|---|---|---|\n| True | and | True |\
    \ True |\n| True | and | False | False |\n| False | and | True | False |\n| False\
    \ | and | False | False |\n\n### OR Truth Table\n\n| x | or | y | Returns |\n\
    |---|---|---|---|\n| True | or | True | True |\n| True | or | False | True |\n\
    | False | or | True | True |\n| False | or | False | False |\n\n### NOT Truth\
    \ Table\n\n| not | x | Returns |\n|---|---|---|\n| not | True | False |\n| not\
    \ | False | True |\n\nTruth tables are basic mathematical tables used in logic\
    \ and are useful to memorize or keep in mind when constructing algorithms (instructions)\
    \ in python programming.\n\n## Using Boolean Operators for Flow Control\n\nTo\
    \ control the stream and outcomes of a program in the form of flow control statements,\
    \ use a **condition** followed by a **clause**.\n\nA **condition** evaluates down\
    \ to a Boolean value of True or False, displaying a point where a decision is\
    \ made in the program. That is, a condition would show you if something evaluates\
    \ to True or False.\n\nThe **clause** is the block of code that follows the **condition**\
    \ and dictates the outcome of the program. That is, it is the **perform this**\
    \ part of the construction “If x is true, then do this.”\n\nThe code below shows\
    \ a case of comparison operators working in tandem with **conditional statements**\
    \ to control the flow of a Python program:\n\n```\nif grade >= 65:           #\
    \ Condition\n    print(\"Passing grade\")    # Clause\nelse:\n    print(\"Failing\
    \ grade\")\n```\n\nThis program will estimate whether each student's grade is\
    \ passing or failing. In the case of a student with a grade of 83, the first statement\
    \ will estimate to **True**, and the print statement of **Passing grade** will\
    \ be triggered. In the case of a student with a grade of 59, the first statement\
    \ will estimate to **False**, so the program will move on to perform the print\
    \ statement tied to the **else** expression: **Failing grade**.\n\nBecause every\
    \ individual object in Python can be evaluated to True or False, the PEP 8 Style\
    \ Guide recommends against associating a value to **True** or **False** because\
    \ it is less readable and will constantly return an unexpected Boolean. That is,\
    \ you should bypass using **if sammy == True**: in programs. Instead, associate\
    \ **sammy** to another non-Boolean value that will return a Boolean.\n\nBoolean\
    \ operators present conditions that can be applied to decide the eventual outcome\
    \ of a program through flow control statements.\n\n## Constructing \"While\" Loops\
    \ In Python\n\nA while loop implements the reproduced execution of code based\
    \ on a given Boolean condition. The code that is in a while block will complete\
    \ as long as the while statement evaluates to True.\n\nYou can think of the while\
    \ loop as a copying conditional statement. After an, if statement, the program\
    \ remains to execute code, but in a while loop, the program bounces back to the\
    \ start of the while statement until the condition is False.\n\nAs exposed to\
    \ for loops that execute a certain number of times, while loops are conditionally\
    \ based, so you don't need to know how"
  mdcn: "## 布尔逻辑与条件\n\n布尔数据类型可以是两个值之一：True 或 False。在编程中使用布尔值来进行比较并控制应用程序的流程。\n\n布尔值表达了与数学逻辑分支相关的真实值，这些逻辑分支为计算机科学中的算法提供了依据。该术语以数学家乔治·布尔的名字命名，布尔一词的首字母\
    \ B 始终大写。值 True 和 False 也通常分别以大写 T 和 F 开头，因为它们在 Python 中是特殊值。\n\n在本章中，我们将介绍理解布尔工作原理所需的基础知识，包括布尔比较、逻辑运算符和真值表。\n\
    \n## 比较运算符\n\n在编程中，比较运算符用于比较值，并将结果评估为单个布尔值 True 或 False。\n\n下表显示了布尔比较运算符。\n\n\
    | 运算符 | 含义 |\n| --- | --- |\n| == | 等于 |\n| != | 不等于 |\n| < | 小于 |\n| > | 大于 |\n\
    | <= | 小于或等于 |\n| >= | 大于或等于 |\n\n为了理解这些运算符的工作原理，让我们在程序中将两个整数赋值给两个变量：\n\n```\n\
    x = 5\n\ny = 8\n```\n\n我们知道在这个例子中，由于 **x** 的值为 5，它小于值为 8 的 **y**。\n\n应用这两个变量及其关联的值，让我们逐一查看上表中的运算符。在这个程序中，我们将让\
    \ Python 打印出每个比较运算符的评估结果是 True 还是 False。\n\n```\nx = 5\n\ny = 8\n\nprint(\"x ==\
    \ y:\", x == y)\n\nprint(\"x != y:\", x != y)\n\nprint(\"x < y:\", x < y)\n\n\
    print(\"x > y:\", x > y)\n\nprint(\"x <= y:\", x <= y)\n\nprint(\"x >= y:\", x\
    \ >= y)\n```\n\n为了帮助我们更好地理解这个输出，我们还将让 Python 打印一个字符串来显示它正在评估的内容。\n\n输出：\n\n```\n\
    x == y: False\n\nx != y: True\n\nx < y: True\n\nx > y: False\n\nx <= y: True\n\
    \nx >= y: False\n```\n\n根据数学逻辑，在前面的每个表达式中，Python 已经评估：\n\n5 (x) 是否等于 8 (y)？False\n\
    5 是否不等于 8？True\n5 是否小于 8？True\n5 是否大于 8？False\n5 是否小于或等于 8？True\n5 是否不小于或等于 8？False\n\
    \n虽然这里使用了整数，但我们可以用浮点值替换它们。\n\n字符串也可以与布尔运算符一起使用。除非使用额外的字符串方法，否则它们是区分大小写的。\n\n我们可以看看字符串在实践中是如何比较的：\n\
    \n```\nSammy = \"Sammy\"\nsammy = \"sammy\"\nprint(\"Sammy == sammy: \", Sammy\
    \ == sammy)\n```\n\n输出：\nSammy == sammy: False\n\n字符串 **\"Sammy\"** 不等于字符串 **\"\
    sammy\"**，因为它们并不完全相同；一个以大写 S 开头，另一个以小写 s 开头。但是，如果你添加一个额外的变量并赋值为 **\"Sammy\"**，那么它们将评估为相等：\n\
    \n```\nSammy = \"Sammy\"\nsammy = \"sammy\"\nalso_Sammy = \"Sammy\"\nprint(\"\
    Sammy == sammy: \", Sammy == sammy)\nprint(\"Sammy == also_Sammy\", Sammy == also_Sammy)\n\
    ```\n\n输出\nSammy == sammy: False\nSammy == also_Sammy: True\n\n你也可以应用其他比较运算符，包括\
    \ > 和 < 来比较两个字符串。Python 将使用字符的 ASCII 值对这些字符串进行词法分析。\n\n我们也可以使用比较运算符来估计布尔值：\n\n\
    ```\nt = True\nf = False\nprint(\"t != f: \", t != f)\n```\n\n输出\nt != f: True\n\
    \n上面的输出表明 True 不等于 False。\n\n## 逻辑运算符\n\n有三个逻辑运算符用于比较值。它们将表达式评估为布尔值，返回 **True**\
    \ 或 **False**。这些运算符是 **and**、**or** 和 **not**，在下表中描述。\n\n| 运算符 | 含义 | 示例 |\n|\
    \ :--- | :--- | :--- |\n| And | 如果两者都为真，则为真 | x and y |\n| Or | 如果至少一个为真，则为真 |\
    \ x or y |\n| not | 仅当为假时才为真 | not x |\n\n逻辑运算符通常用于评估两个或多个表达式是否为真或不为真。例如，它们可以用于确定成绩是否及格以及学生是否注册了该课程，如果两种情况都为真，则允许学生在系统中获得成绩。另一个例子是根据用户是否有商店信用或在过去\
    \ 6 个月内是否有投资，来决定用户是否是在线商店的有效活跃客户。\n\n为了理解逻辑运算符的工作原理，让我们估计三个表达式：\n\n```\nprint((9\
    \ > 7) and (2 < 4)) # 两个原始表达式都为 True\nprint((8 == 8) or (6 != 6)) # 一个原始表达式为 True\n\
    print(not(3 <= 1))          # 原始表达式为 False\n```\n\n输出\nTrue\nTrue\nTrue\n\n##\
    \ 真值表\n\n关于数学逻辑分支有很多内容可以学习，但我们可以有选择地学习其中一些，以促进我们在编程时的算法思维。\n\n以下是比较运算符 == 以及每个逻辑运算符\
