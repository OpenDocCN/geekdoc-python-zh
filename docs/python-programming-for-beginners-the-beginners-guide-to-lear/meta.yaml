    | 16 | **oct(x)**<br>Converts an integer to an octal string. |


    ## Basic Operators


    The constructs which can manipulate the value of operands are called operators.


    Suppose the expression 5 + 3 = 8. Here, 5 and 3 are called operands and + is called
    operator.


    ### Types of Operator


    The following types of operators are supported in Python language.


    - Arithmetic Operators

    - Comparison (Relational) Operators

    - Assignment Operators

    - Logical Operators

    - Bitwise Operators

    - Membership Operators

    - Identity Operators


    Let us have a glance on all operators one by one.


    ## Arithmetic Operators


    Consider variable ''x'' contains 10 and variable ''y'' contains 20, then –


    | Operator | Description | Example |

    | --- | --- | --- |

    | + Addition | Values are added on each sides of the operator. | x + y = 30 |

    | - Subtraction | Subtracts right-hand operand from the left-hand operand. | x
    – y = -10 |

    | * Multiplication | Multiplies values on both sides of the operator | x * y =
    200 |

    | / Division | Divides left-hand operand by right-hand operand | x / y = 0.5 |

    | % Modulus | The left-hand operand is shared by the right-hand operand and returns
    the remainder | y % x = 0 |

    | ** Exponent | Works exponential (power) calculation on operators | x**y = 10
    to the power 20 |

    | // Floor Division | The division of operands wherever the result''s the quotient
    during which the digits when the decimal point is removed. But if one of the operands
    is negative, the outcome is floored, i.e., rounded away from zero (towards negative
    infinity) | 10//5 = 2 and 7.0//2.0 = 3.0, -11//3 = -4, -11.0//3 = -4.0 |


    ## Comparison Operators


    Relational operators are the operators who compare the values on both sides of
    them and choose the relation among them.


    Consider variable ''a'' holds 10 and variable ''b'' holds 20, then –


    | Operator | Description | Example |

    |---|---|---|

    | == | The condition will be true when the values of two operands are equal. |
    (a == b) is not true. |

    | != | The condition will be true when the values of two operands are not equal.
    | (a != b) is true. |

    | > | The condition will be true when the value of the left operand is greater
    than the value of the right operand. | (a > b) is not true. |

    | < | The condition will be true when the value of the left operand is less than
    the value of the right operand. | (a < b) is true. |

    | >= | The condition will be true when the value of the left operand is greater
    than or equal to the value of the right operand. | (a >= b) is not true. |

    | <= | The condition will be true when the value of the left operand is less than
    or equal to the value of the right operand. | (a <= b) is true. |


    ## Assignment Operators


    Consider variable ''a'' holds the value 10 and variable ''b'' holds the value
    20, then –


    | Operator | Description | Example |

    | :--- | :--- | :--- |

    | = | Values are Assigned from right side operands to left side operand. | c =
    a + b assigns value of a + b into c |

    | += Add AND | It adds right operand to the left operand then assigns the result
    to the left operand. | c += a or c = c + a |

    | -= Subtract AND | The right operand is subtracted from the left operand then
    assigns the result to left operand. | c -= a or c = c - a |

    | *= Multiply AND | The right operand is multiplied by the left operand and the
    result assigns to the left operand. | c *= a or c = c * a |

    | /= Divide AND | The right operand is divided by the left operand and assigns
    the result to the left operand. | c /= a or c = c / a |

    | %= Modulus AND | It takes modulus applying two operands and allows the result
    to left operand | c %= a or c = c % a |

    | **= Exponent AND | The result is assigned to the left operand from exponential
    (power) calculation on the operators. | c **= a or c = c ** a |

    | //= Floor AND | The value from the floor division on operators is assigned to
    the left operand. | c //= a or c = c // a |


    ### Example


    ```

    #!/usr/bin/python3

    a = 10

    b = 20

    c = 0

    c = a + b

    print("Line 1 - Value of c is ", c)

    c += a

    print("Line 2 - Value of c is ", c)

    c *= a

    print("Line 3 - Value of c is ", c)

    c /= a

    ```'
