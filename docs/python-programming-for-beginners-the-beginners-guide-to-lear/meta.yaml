  md: '# # Starting and Interacting with Python


    # ## Variable


    A named location it''s called variable and it used to store data in the memory.
    It''s helpful to think of variables as a container that holds data which can be
    changed later throughout programming. Depend on the data type of a variable, the
    interpreter allocates memory and decides what can be stored in the reserved memory.
    Consequently, by assigning various data types to the variables, you can store
    integers, decimals or characters in these variables.


    # ### Assigning Values to Variables


    There is no need an exact declaration in Python variables to store memory space.
    When a value is assigned to a variable the declaration occurs automatically. The
    equal sign ''='' is applied to assign values to variables.


    The operand to the left of the ''='' operator is the sign of the variable and
    the operand to the right of the ''='' operator is the value stored in the variable.
    As example–


    ```

    #!/usr/bin/python3

    number = 10       # An integer assignment

    price  = 100.05   # A floating point

    name   = "Steve"  # A string

    print (number)

    print (price)

    print (name)

    ```


    Here, 10, 100.05 and "Steve" are the values assigned to number, price, and name
    variables, sequentially.


    | Output: | 10 |

    |---|---|

    | | 100.05 |

    | | Steve |


    # ### Multiple Assignment'
