  md: '# # A Comprehensive Background


    The programming language Python was invented in the late 1980s. Its implementation
    was begun in December 1989 by Guido van Rossum at CWI in the Netherlands as a
    follower to ABC able of complaint handling and interfacing with the Amoeba operating
    system. Van Rossum is Python''s main author, and his continuing central role in
    choosing the direction of Python is reflected in the license given to him by the
    Python community, Benevolent Dictator for Life. (However, van Rossum walked down
    as leader on July 12, 2018) Python was nominated for the BBC TV show Monty Python''s
    Flying Circus.


    Python 2.0 was issued on October 16, 2000, with several major new features, including
    a cycle-detecting garbage collector for memory management and assistance for Unicode.
    However, the most major change was to the development method itself, with a shift
    to a more transparent and community-backed process.


    Python 3.0, an important, backward-incompatible release, was released on December
    3, 2008, after a large period of testing. Many of its important features have
    also been backported to the backward-compatible, while by now unsupported, Python
    2.6 and 2.7.


    # ## Early history


    In February 1991, Van Rossum wrote the code (labeled version 0.9.0) to alt.sources.
    Then present at this stage in development was he develop classes with inheritance,
    exception handling, functions, the core datatypes of a list, dict, str. Also in
    this initial announcement was a module system borrowed from Modula-3; Van Rossum
    explains the module as "one of Python''s important programming units".Python''s
    exception model also follows Modula-3''s, with the addition of an else clause.
    In 1994 comp.lang.python, the prime discussion forum for Python, was formed, signaling
    a milestone in the growth of Python''s userbase.


    # ## Version 1'
