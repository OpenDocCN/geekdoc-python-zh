  md: 'Many directories may contain different executable files and programs, where
    a search path is accomplished by the operating system and it is registered by
    the directories to execute the OS searches.


    The path is saved in an environment variable, which is a named string kept by
    the operating system. This variable contains data available to the command shell
    and other programs.


    The path variable is defined as PATH in Unix or Path in Windows (Unix is case
    sensitive; Windows is not).


    The path details are handled by the installer in Mac OS. To invoke the Python
    interpreter from any appropriate directory, you need to add the Python directory
    to your path.


    # Setting path at Unix/Linux


    Follow the following rules for adding the python directory to the path for a specific
    session in Unix –


    +   - Type the setenv PATH as "$PATH:/usr/local/bin/python" and press Enter key
    in the csh shell.

    - Type the export PATH as "$PATH:/usr/local/bin/python" and press Enter key in
    the bash shell of Linux.

    - Type the PATH as "$PATH:/usr/local/bin/python" and press Enter key in the sh
    or ksh shell of Linux.

    - Note – /usr/local/bin/python is the path of the Python directory.


    # Setting path at Windows


    Follow the following rule for adding the python directory to the path for a specific
    session in Windows –


    Type the path as "%path%;C:\Python" and then press Enter key at the command prompt.


    Point to be noted that the path of the Python directory is “C:\Python”


