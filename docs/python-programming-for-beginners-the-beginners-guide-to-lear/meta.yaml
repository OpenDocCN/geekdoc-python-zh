    ## Opening A Console On Mac OS X


    OS X''s standard console is a program named Terminal. Open Terminal by navigating
    to Applications, then Utilities, then double-click the Terminal application. You
    can also simply search for it in the system search tool in the top right.


    A command-line Terminal is a tool for interacting with your computer. A window
    will start with a command-line prompt message, something like this:


    ```

    mycomputer:~ myusername$

    ```


    ## Opening A Console On Linux


    Several Linux distributions (e.g Ubuntu, Fedora, Mint) may have different console
    programs, normally referred to as a terminal. The exact terminal of your startup,
    and how, can depend on your distribution. On Ubuntu, you will possibly want to
    open Gnome Terminal. It should show a prompt like this:


    ```

    myusername@mycomputer:~$

    ```


    ## Opening A Console On Windows


    Windows'' console is named the Command Prompt, named cmd. A simple way to get
    to it is by using the key combination Windows+R (Windows meaning the Windows logo
    button), which should start a Run dialog. Then typewrite cmd and hit Enter or
    click Ok. You can also hunt for it from the start menu. It should look like:


    ```

    C:\Users\myusername>

    ```


    Windows'' Command Prompt is not really as strong as its counterparts on Linux
    and OS X, you might like to begin the Python Interpreter (see just below) straight
    or using the IDLE program that Python comes with. You can find these in the Start
    menu.


    ## Using Python


    The python application that you have installed will by default act as something
    named an interpreter. An interpreter uses text commands and runs them as you enter
    them - very helpful for trying things out. Simply type python at your console
