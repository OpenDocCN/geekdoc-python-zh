- md: "# Python Programming For Beginners\n\nThe Beginner’s Guide to Learning the\
    \ Basics of Python. Tips and Tricks to Master Programming Quickly with Practical\
    \ Examples\n\n**James Herron**\n\n## Table Of Contents\n\n- [Introduction](#)\n\
    - [A Comprehensive Background](#)\n    - [Version 1](#)\n    - [Version 2](#)\n\
    \    - [Version 3](#)\n- [How to Download and Install Python](#)\n    - [Install\
    \ And Run Python In Mac OS X](#)\n    - [Install And Run Python In Unix And Linux](#)\n\
    \    - [Install And Run Python In Windows](#)\n    - [The Python Environmental\
    \ Variables To Note](#)\n    - [Opening A Console On Mac OS X](#)\n    - [Opening\
    \ A Console On Linux](#)\n    - [Opening A Console On Windows](#)\n    - [Interacting\
    \ With Python](#)\n- [Starting and Interacting with Python](#)\n    - [Variable](#)\n\
    \    - [Basic Operators](#)\n    - [Loops](#)\n    - [Native Python Datatypes](#)\n\
    \    - [Numbers](#)\n    - [Strings](#)\n    - [Lists](#)\n    - [Tuples](#)\n\
    \    - [Dictionary](#)\n    - [Boolean Logic And Conditional](#)\n    - [Constructing\
    \ \"While\" Loops In Python](#)\n    - [Constructing \"For Loops\" Loops In Python](#)\n\
    - [Conclusion](#)\n\n## Introduction\n\nPython is presumably the easiest-to-learn\
    \ and nicest-to-use programming language in widespread use. Python code is clear\
    \ to read and write, and it is short without being cryptic. Python is a very powerful\
    \ language, which means that we can normally write far fewer lines of Python code\
    \ than would be needed for an equivalent application written in, say, C++ or Java.\n\
    \nPython is a cross-platform language: so the same Python program can be run on\
    \ Windows and Unix-like systems such as Linux, BSD or Mac OS X, just copy the\
    \ file or files that make up the program to the target machine, with no “building”\
    \ or compiling required. It is possible to build Python programs that apply platform-specific\
    \ functionality, but this is unusually important since almost all of Python’s\
    \ standard library and most maximum third-party libraries are completely and transparently\
    \ cross-platform.\n\nOne of Python’s exceptional strengths is that it comes with\
    \ a very full standard library, this provides us to do such tasks as download\
    \ a file from the Internet, unpack a compressed archive file or build a web server,\
    \ just one or a few lines of code. And in expanding to the standard library, thousands\
    \ of third-party libraries are free, some providing more strong and sophisticated\
    \ tools than the standard library just like the Twisted networking library and\
    \ the NumPy numeric library while others give functionality that is too functional\
    \ to be included in the standard library-for instance, the SimPy simulation package.\
    \ Most maximum of the third-party libraries is accessible from the Python Package\
    \ Index, pypi.python.org/pypi.\n\nPython can be used to program in procedural,\
    \ object-oriented, and to a minor extent, in a functional style, although at heart\
    \ Python is an object-oriented language. This book explains how to write both\
    \ procedural and object-oriented programs, and also shows Python’s functional\
    \ programming features.\n\nThe goal of this book is to show you how to write Python\
    \ programs in good idiomatic Python 3 style, and to be a helpful reference for\
    \ the Python 3 language after the initial reading.\n\nThe book is designed to\
    \ be useful to various different audiences, including self-taught and hobbyist\
    \ programmers, students, scientists, engineers, and others who necessitate programming\
    \ as part of their work. To be of use to such a wide range of people without boring\
    \ the conscious or losing the less-experienced, this book assumes at least some\
    \ programming experience. This book is structured in such a way as to make you\
    \ as productive as possible as quickly as possible.\n\n## A Comprehensive Background\n\
    \nThe programming language Python was invented in the late 1980s. Its implementation\
    \ was begun in December 1989 by Guido van Rossum at CWI in the Netherlands as\
    \ a follower to ABC able of complaint handling and interfacing with the Amoeba\
    \ operating system. Van Rossum is Python's main author, and his continuing central\
    \ role in choosing the direction of Python is reflected in the license given to\
    \ him by the Python community, Benevolent Dictator for Life. (However, van Rossum\
    \ walked down as leader on July 12, 2018) Python was nominated for the BBC TV\
    \ show Monty Python's Flying Circus.\n\nPython 2.0 was issued on October 16, 2000,\
    \ with several major new features, including a cycle-detecting garbage collector\
    \ for memory management and assistance for Unicode. However, the most major change\
    \ was to the development method itself, with a shift to a more transparent and\
    \ community-backed process.\n\nPython 3.0, an important, backward-incompatible\
    \ release, was released on December 3, 2008, after a large period of testing.\
    \ Many of its important features have also been backported to the backward-compatible,\
    \ while by now unsupported, Python 2.6 and 2.7.\n\n### Early history\n\nIn February\
    \ 1991, Van Rossum wrote the code (labeled version 0.9.0) to alt.sources. Then\
    \ present at this stage in development was he develop classes with inheritance,\
    \ exception handling, functions, the core datatypes of a list, dict, str. Also\
    \ in this initial announcement was a module system borrowed from Modula-3; Van\
    \ Rossum explains the module as \"one of Python's important programming units\"\
    .Python's exception model also follows Modula-3's, with the addition of an else\
    \ clause. In 1994 comp.lang.python, the prime discussion forum for Python, was\
    \ formed, signaling a milestone in the growth of Python's userbase.\n\n### Version\
    \ 1\n\nPython arrived version 1.0 in January 1994. The main new features included\
    \ in this announcement were the functional programming tools lambda, map, and\
    \ filter and reduce. Van Rossum asserted that \"Python acquired lambda, reduce\
    \ (), filter () and map (), courtesy of a Lisp hacker who missed them and offered\
    \ working patches\".\n\nThe last version published while Van Rossum was at CWI\
    \ was Python 1.2. In 1995, Van Rossum resumed his work on Python at the Corporation\
    \ for National Research Initiatives in Reston, Virginia from where he issued several\
    \ versions.\n\nBy version 1.4, Python had procured several new features. Important\
    \ among these are the Modula-3 inspired keyword arguments (which are also related\
    \ to Common Lisp's keyword arguments) and built-in support for complex numbers.\
    \ Also included is a primary form of data hiding by name mangling, though this\
    \ is simply bypassed.\n\nDuring Van Rossum's stay at CNRI, he began the Computer\
    \ Programming for Everybody (CP4E) initiative, intending to make programming more\
    \ available to more people, with a basic \"literacy\" in programming languages,\
    \ related to the primary English literacy and mathematics skills needed by most\
    \ maximum employers. Python served a central role in this: because of its center\
    \ on clean syntax, it was already fitting, and CP4E's goals bore connections to\
    \ its predecessor, ABC. The project was supported by DARPA. As of 2007, the CP4E\
    \ project is inactive. While Python attempts to be simply learnable and not too\
    \ arcane in its syntax and semantics and moving out to non-programmers is not\
    \ an existing concern.\n\n### Version 2\n\nPython 2.0, released in October 2000,\
    \ introduced list comprehensions, a feature borrowed from the functional programming\
    \ languages SETL and Haskell. Python's syntax for this construct is very related\
    \ to Haskell's, apart from Haskell's liking for punctuation characters and Python's\
    \ preference for alphabetic keywords. Python 2.0 also started a garbage collection\
    \ system fitted of collecting reference cycles."
  mdcn: "# Python 编程入门\n\n初学者学习 Python 基础的指南。通过实用示例快速掌握编程的技巧与窍门\n\n**詹姆斯·赫伦**\n\n\
    ## 目录\n\n- [简介](#)\n- [全面的背景介绍](#)\n    - [版本 1](#)\n    - [版本 2](#)\n    - [版本\
    \ 3](#)\n- [如何下载和安装 Python](#)\n    - [在 Mac OS X 上安装和运行 Python](#)\n    - [在\
    \ Unix 和 Linux 上安装和运行 Python](#)\n    - [在 Windows 上安装和运行 Python](#)\n    - [需要注意的\
    \ Python 环境变量](#)\n    - [在 Mac OS X 上打开控制台](#)\n    - [在 Linux 上打开控制台](#)\n \
    \   - [在 Windows 上打开控制台](#)\n    - [与 Python 交互](#)\n- [启动并与 Python 交互](#)\n \
    \   - [变量](#)\n    - [基本运算符](#)\n    - [循环](#)\n    - [Python 原生数据类型](#)\n   \
    \ - [数字](#)\n    - [字符串](#)\n    - [列表](#)\n    - [元组](#)\n    - [字典](#)\n   \
    \ - [布尔逻辑与条件](#)\n    - [在 Python 中构建 \"While\" 循环](#)\n    - [在 Python 中构建 \"\
    For\" 循环](#)\n- [结论](#)\n\n## 简介\n\nPython 可能是目前广泛使用的编程语言中最容易学习、也最易于使用的。Python\
    \ 代码清晰易读易写，简洁而不晦涩。Python 是一种功能非常强大的语言，这意味着我们通常可以用比用 C++ 或 Java 等语言编写同等应用少得多的 Python\
    \ 代码行数来完成任务。\n\nPython 是一种跨平台语言：因此，同一个 Python 程序可以在 Windows 和类 Unix 系统（如 Linux、BSD\
    \ 或 Mac OS X）上运行，只需将构成程序的文件复制到目标机器即可，无需“构建”或编译。虽然可以构建利用平台特定功能的 Python 程序，但这并不常见，因为几乎所有\
    \ Python 标准库和大多数第三方库都是完全且透明地跨平台的。\n\nPython 的一个突出优势是它附带了一个非常完整的标准库，这使我们只需一行或几行代码就能完成诸如从互联网下载文件、解压缩归档文件或构建\
    \ Web 服务器等任务。除了标准库，还有成千上万的免费第三方库，其中一些提供了比标准库更强大、更复杂的工具，例如 Twisted 网络库和 NumPy 数值库；而另一些则提供了功能过于专业而无法包含在标准库中的功能——例如\
    \ SimPy 仿真包。大多数第三方库都可以从 Python 包索引（pypi.python.org/pypi）获取。\n\nPython 可以用于过程式、面向对象编程，以及在较小程度上用于函数式风格编程，尽管\
    \ Python 本质上是一种面向对象的语言。本书将解释如何编写过程式和面向对象的程序，并展示 Python 的函数式编程特性。\n\n本书的目标是向你展示如何以地道的\
    \ Python 3 风格编写 Python 程序，并在初次阅读后成为 Python 3 语言的实用参考。\n\n本书旨在为各种不同的读者提供帮助，包括自学和业余程序员、学生、科学家、工程师以及其他需要将编程作为工作一部分的人。为了在不使有经验者感到乏味或让经验较少者迷失的情况下对如此广泛的人群有用，本书假设读者至少具备一些编程经验。本书的结构旨在让你尽可能快地达到高效状态。\n\
    \n## 全面的背景介绍\n\nPython 编程语言发明于 1980 年代末。其实施工作于 1989 年 12 月由荷兰 CWI 的 Guido van\
    \ Rossum 开始，作为 ABC 语言的后继者，旨在处理异常并与 Amoeba 操作系统交互。Van Rossum 是 Python 的主要作者，他在选择\
    \ Python 发展方向上的持续核心作用体现在 Python 社区授予他的称号——“终身仁慈独裁者”（Benevolent Dictator for Life）。（然而，van\
    \ Rossum 于 2018 年 7 月 12 日卸任领导者职位）Python 的名字灵感来源于 BBC 电视节目《蒙提·派森的飞行马戏团》。\n\nPython\
    \ 2.0 于 2000 年 10 月 16 日发布，带来了多项重大新特性，包括用于内存管理的循环检测垃圾回收器和对 Unicode 的支持。然而，最重要的变化是开发方法本身，转向了一个更透明、更社区驱动的过程。\n\
    \nPython 3.0 是一个重要的、不向后兼容的版本，于 2008 年 12 月 3 日发布，经过了长时间的测试。其许多重要特性也已向后移植到向后兼容但现已不再支持的\
    \ Python 2.6 和 2.7。\n\n### 早期历史\n\n1991 年 2 月，Van Rossum 将代码（标记为版本 0.9.0）发布到 alt.sources\
    \ 新闻组。此时开发阶段已包含支持继承的类、异常处理、函数，以及列表、字典、字符串等核心数据类型。此次初始公告中还包括一个借鉴自 Modula-3 的模块系统；Van\
    \ Rossum 将模块解释为“Python 的重要编程单元之一”。Python 的异常模型也遵循 Modula-3，并增加了 else 子句。1994 年，comp.lang.python（Python\
    \ 的主要讨论论坛）成立，标志着 Python 用户群增长的一个里程碑。\n\n### 版本 1\n\nPython 1.0 于 1994 年 1 月发布。此版本包含的主要新特性是函数式编程工具\
    \ lambda、map、filter 和 reduce。Van Rossum 声称“Python 获得了 lambda、reduce()、filter()\
    \ 和 map()，这要感谢一位怀念这些功能的 Lisp 黑客，他提供了可用的补丁”。\n\nVan Rossum 在 CWI 期间发布的最后一个版本是 Python\
    \ 1.2。1995 年，Van Rossum 在弗吉尼亚州雷斯顿的国家研究计划公司（CNRI）继续从事 Python 工作，并在那里发布了多个版本。\n\n\
    到版本 1.4 时，Python 已经获得了一些新特性。其中重要的是受 Modula-3 启发的关键字参数（也与 Common Lisp 的关键字参数相关）以及对复数的内置支持。还包括通过名称修饰实现的基本形式的数据隐藏，尽管这很容易被绕过。\n\
    \n在 Van Rossum 逗留 CNRI 期间，他启动了“人人学编程”（CP4E）计划，旨在让编程对更多人更易获得，使人们具备编程语言的基本“读写能力”，类似于大多数雇主所需的基础英语读写和数学技能。Python\
    \ 在其中扮演了核心角色：由于其注重简洁的语法，它已经很适合，CP4E 的目标也与其前身 ABC 有关联。该项目得到了 DARPA 的支持。截至 2007\
    \ 年，CP4E 项目已不活跃。虽然 Python 试图易于学习，其语法和语义不过于深奥，并且向非程序员推广并非当前关注点。\n\n### 版本 2\n\n\
    Python 2.0 于 2000 年 10 月发布，引入了列表推导式，这一特性借鉴自函数式编程语言 SETL 和 Haskell。Python 对此结构的语法与\
    \ Haskell 非常相似，除了 Haskell 偏好标点符号而 Python 偏好字母关键字。Python 2.0 还启动了一个能够收集引用循环的垃圾回收系统。"
