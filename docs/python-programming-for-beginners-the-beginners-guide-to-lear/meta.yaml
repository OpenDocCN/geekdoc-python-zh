    # Dictionary


    Each key is segregated from its value by a colon (:), the items are segregated
    by commas, and the entire thing is surrounded in curly braces. A blank A blank
    dictionary without any objects is inscribed with just two curly braces, like this:
    {}.


    Keys are unique within a dictionary. The keys are an immutable data type such
    as strings, numbers, or tuples. Values are not unique within a dictionary. The
    values of a dictionary can be of several standards.


    Accessing Values in Dictionary


    To access dictionary elements, use the usual square brackets along with the key
    to reaching its value. There is an easy example –


