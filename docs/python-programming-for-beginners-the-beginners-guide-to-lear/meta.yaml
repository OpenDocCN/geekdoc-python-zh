    \ 切片获取部分 |\n\n## 无封闭分隔符\n\n无封闭分隔符是指由逗号分隔的各种对象集合，书写时无需标识符号，如以下简短示例所示。\n\n## 内置元组函数\n\
    \nPython 包含以下元组函数 –\n\n| 序号 | 函数与描述 |\n|---|---|\n| 1 | **cmp(tuple1, tuple2)**<br>比较两个元组的元素。\
