  md: 'Python arrived version 1.0 in January 1994. The main new features included
    in this announcement were the functional programming tools lambda, map, and filter
    and reduce. Van Rossum asserted that "Python acquired lambda, reduce (), filter
    () and map (), courtesy of a Lisp hacker who missed them and offered working patches".


    The last version published while Van Rossum was at CWI was Python 1.2. In 1995,
    Van Rossum resumed his work on Python at the Corporation for National Research
    Initiatives in Reston, Virginia from where he issued several versions.


    By version 1.4, Python had procured several new features. Important among these
    are the Modula-3 inspired keyword arguments (which are also related to Common
    Lisp''s keyword arguments) and built-in support for complex numbers. Also included
    is a primary form of data hiding by name mangling, though this is simply bypassed.


    During Van Rossum''s stay at CNRI, he began the Computer Programming for Everybody
    (CP4E) initiative, intending to make programming more available to more people,
    with a basic "literacy" in programming languages, related to the primary English
    literacy and mathematics skills needed by most maximum employers. Python served
    a central role in this: because of its center on clean syntax, it was already
    fitting, and CP4E''s goals bore connections to its predecessor, ABC. The project
    was supported by DARPA. As of 2007, the CP4E project is inactive. While Python
    attempts to be simply learnable and not too arcane in its syntax and semantics
    and moving out to non-programmers is not an existing concern.


    # Version 2


    Python 2.0, released in October 2000, introduced list comprehensions, a feature
    borrowed from the functional programming languages SETL and Haskell. Python''s
    syntax for this construct is very related to Haskell''s, apart from Haskell''s
    liking for punctuation characters and Python''s preference for alphabetic keywords.
    Python 2.0 also started a garbage collection system fitted of collecting reference
    cycles.'
