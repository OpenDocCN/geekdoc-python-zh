    \ + password + '. You may enter.')\n```\n\n最后的 **print()** 语句位于 **while** 循环之外，因此当用户输入\
    \ **'password'** 作为密码时，他们将看到循环外的最终打印语句。\n\n然而，如果用户从未输入单词 **'password'**，那么他们将永远不会到达最后的\
    \ **print()** 语句，并将陷入无限循环。\n\n**无限循环**发生在程序在一个循环内持续执行，永不退出时。要在命令行中退出无限循环，请输入 **CTRL\
    \ + C**。\n\n```\npython password.py\n```\n\n系统将提示您输入密码，然后您可以使用各种可能的输入进行测试。以下是程序的示例输出：\n\
    \nOutput\nWhat is the password?\nhello\nWhat is the password?\nsammy\nWhat is\
    \ the password?\nPASSWORD\nWhat is the password?\npassword\nYes, the password\
    \ is password. You may enter.\n\n## 在 Python 中构建 \"For 循环\"\n\n**for** 循环基于循环计数器或循环变量实现代码的重复执行。这意味着\
    \ **for** 循环最常用于在进入循环之前就知道迭代次数的情况，这与基于条件的 **while 循环** 不同。\n\n### For 循环\n\n在\
    \ Python 中，**for** 循环的构造方式如下：\n\n```\nfor [iterating variable] in [sequence]:\n\
    \    [do something]\n```\n\n被循环执行的操作将持续进行，直到序列结束。\n\n让我们看一个遍历值范围的 **for** 循环：\n\
    \n```\nfor i in range(0,5):\n    print(i)\n```\n\n当我们运行这个程序时，输出如下：\n\nOutput\n\
    \n0\n1\n2\n3\n4\n\n这个 **for** 循环将 **i** 设置为其迭代变量，序列存在于 0 到 5 的范围内。\n\n然后在循环内，每次循环迭代打印一个整数。请记住，在编程中我们通常从索引\
    \ 0 开始，这就是为什么虽然打印了 5 个数字，但它们的范围是 0-4。\n\n当程序需要将一段代码重复执行多次时，你通常会看到并应用 **for** 循环。\n\
    \n## 使用 range() 的 For 循环\n\nPython 的内置序列类型之一是 **range()**。在循环中，**range()** 用于控制循环将重复多少次。\n\
    \n使用 **range()** 时，你可以向其传递 1 到 3 个整数参数：\n\n- **start** 指定序列开始的整数值。如果未包含，则 **start**\
    \ 从 0 开始。\n- **stop** 始终是必需的，是计数到但不包含的整数。\n- **step** 设置下一次迭代增加的量。如果省略，则 step\
    \ 默认为 1。\n\n我们将看一些向 **range()** 传递不同参数的例子。\n\n首先，我们只传递 **stop** 参数，这样我们的序列设置就是\
    \ **range(stop)**：\n\n```\nfor i in range(6):\n    print(i)\n```\n\n在前面的程序中，stop\
    \ 参数是 6，所以代码将从 0 迭代到 6（不包括 6）：\n\nOutput\n\n0\n1\n2\n3\n4\n5\n\n接下来，我们将看到 **range(start,\
    \ stop)**，传递迭代应开始和应停止的值：\n\n```\nfor i in range(20,25):\n    print(i)\n```\n\n\
    现在，范围从 20（包含）到 25（不包含），所以输出：\n\nOutput\n\n20\n21\n22\n23\n24\n\n**range()** 的\
    \ **step** 参数与在切片字符串时定义步长相关，因为它可以应用于跳过序列中的值。\n\n使用所有三个参数时，**step** 位于最后位置：**range(start,\
    \ stop, step)**。首先，让我们应用一个正值的 **step**：\n\n```\nfor i in range(0,15,3):\n    print(i)\n\
    ```\n\n在这个例子中，**for** 循环被设置为打印从 0 到 15 的数字，但步长为 3，因此只打印每个第三个数字，如下所示：\n\nOutput\n\
    \n0\n3\n6\n9\n12\n\n我们也可以为 step 参数应用负值以向后迭代，但我们需要相应地调整 start 和 stop 参数：\n\n```\n\
    for i in range(100,0,-10):\n    print(i)\n```\n\n这里，100 是 **start** 值，0 是 **stop**\
    \ 值，**-10** 是步长，因此循环从 100 开始，到 0 结束，每次迭代减少 10。我们可以在输出中看到这一点：\n\nOutput\n\n100\n\
    90\n80\n70\n60\n50\n40\n30\n20\n10\n\n在 Python 中，**for** 循环经常使用 **range()** 序列类型作为其迭代参数。\n\
    \n## 使用顺序数据类型的 For 循环\n\n列表和其他数据序列类型也可以作为 **for** 循环中的重复参数。你可以分配一个列表并遍历该列表，而不是遍历\
    \ **range()**。\n\n```\nsharks = ['hammerhead', 'great white', 'dogfish', 'frilled',\
    \ 'bullhead']\n```\n\n```\nfor shark in sharks:\n    print(shark)\n```\n\n在这个例子中，我们正在打印列表中的每一项。虽然我们使用了变量\
    \ **shark**，但我们可以使用任何其他有效的变量名，我们将得到相同的输出：\n\nOutput\n\nhammerhead\ngreat white\n\
    dogfish\nfrilled\nbullhead\n\n## 嵌套 For 循环\n\n循环可以在 Python 中嵌套。\n\n嵌套循环是发生在另一个循环内部的循环，结构上与嵌套的\
    \ **if** 语句相关。它们的创建方式如下：\n\n```\nfor [first iterating variable] in [outer loop]\n\
    \    [do something] # Optional\n    for [second iterating variable] in [nested\
    \ loop]\n        [do something]\n```\n\n程序首先遇到外层循环，执行其第一次迭代。这第一次迭代触发内部的嵌套循环，然后运行至完成。然后程序返回到外层循环的顶部，创建第二次迭代并重复触发嵌套循环。同样，嵌套循环运行至完成，应用程序返回到外层循环的顶部，直到序列完成或\
    \ **break** 或其他语句中断该过程。\n\n让我们执行一个嵌套的 **for** 循环，以便更仔细地观察。在这个例子中，外层循环将遍历一个名为 **num_list**\
    \ 的整数列表，内层循环将遍历一个名为 **alpha_list** 的字符串列表。\n\n```\nnum_list = [1, 2, 3]\nalpha_list\
    \ = ['a', 'b', 'c']\nfor number in num_list:\n    print(number)\n    for letter\
    \ in alpha_list:\n        print(letter)\n```\n\n当我们运行这个程序时，我们将收到以下输出：\n\nOutput\n\
    \n1\na\nb\nc\n2\na\nb\nc\n3\na\nb\nc"
