    ## Python Dictionary


    Python''s dictionaries are sort of hash-table type. They act like associative
    arrays or hashes found in Perl and consist of key-value pairs. A dictionary key
    can be about any Python type but are usually numbers or strings. Values, on the
    other hand, can be any unrestricted Python object.


    Dictionaries are surrounded by curly braces ''{ }'' and values can be assigned
    and entered using square braces ''[ ]''. As example –


    ```

    #!/usr/bin/python3

    dict = {}

    dict[''one''] = "This is one"

    dict[2]    = "This is two"

    tinydict = {''name'': ''steve'',''code'':1005, ''dept'': ''marketing''}

    print (dict[''one''])           # Prints value for ''one'' key

    print (dict[2])               # Prints value for 2 key

    print (tinydict)              # Prints complete dictionary

    print (tinydict.keys())       # Prints all the keys

    print (tinydict.values())     # Prints all the values

    ```


    | Output: | This is one<br>This is two<br>{''name'': ''steve'', ''code'': 1005,
    ''dept'': ''marketing''}<br>dict_keys([''name'', ''code'', ''dept''])<br>dict_values([''steve'',
    1005, ''marketing'']) |

    |---|---|


    Dictionaries have no idea of command within the elements. It is wrong to say that
    the elements are "out of order"; they are totally unordered.


    ## Data Type Conversion


    Occasionally, it may be needed to perform conversions within the built-in types.
    To convert within types, use the type-names as a function, simply.


    There are various built-in functions to complete the conversion from one data
    type to another. These functions return a new object expressing the converted
    value.


    | Sr.No. | Function & Description |

    |---|---|

    | 1 | **int(x [,base])**<br>Converts ''x'' to an integer. The base defines the
    base if ''x'' is a string. |

    | 2 | **float(x)**<br>Converts ''x'' to a floating-point number. |

    | 3 | **complex(real [,imag])**<br>Creates a complex number. |

    | 4 | **str(x)**<br>Converts object ''x'' to a string representation. |

    | 5 | **repr(x)**<br>Converts object ''x'' to an expression string. |

    | 6 | **eval(str)**<br>Evaluates a string and returns an object. |

    | 7 | **tuple(s)**<br>Converts ''s'' to a tuple. |

    | 8 | **list(s)**<br>Converts ''s'' to a list. |

    | 9 | **set(s)**<br>Converts ''s'' to a set. |

    | 10 | **dict(d)**<br>Makes a dictionary. ''d'' must be a sequence of (key,value)
    tuples. |

    | 11 | **frozenset(s)**<br>Converts ''s'' to a frozen set. |

    | 12 | **chr(x)**<br>Converts an integer to a character. |

    | 13 | **unichr(x)**<br>Converts an integer to a Unicode character. |

    | 14 | **ord(x)**<br>Converts a single character to its integer value. |

