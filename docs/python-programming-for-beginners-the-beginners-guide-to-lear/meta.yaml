    usr/bin/python3\nfor x in it:\n    print (x, end=\" \")\nor using next() function\n\
    while True:\n    try:\n        print (next(it))\n    except StopIteration:\n \
    \       sys.exit() #you have to import sys module for this\n```\n\nUsing the yield\
    \ method, a generator is a function that returns or yields a sequence of values.\n\
    \nWhen a generator function is called, it returns a generator object without even\
    \ starting execution of the function. When the next() method is called for the\
    \ first time, the function starts executing until it reaches the return statement,\
    \ which returns the yielded value. The yield keeps track i.e. remembers the last\
    \ execution and the second next() call continues from the previous value.\n\n\
    # Example\n\nA generator is defined by the following example, which produces an\
    \ iterator for all the Fibonacci numbers.\n\n```\n#!usr/bin/python3\nimport sys\n\
    def fibonacci(n): #generator function\n    a, b, counter = 0, 1, 0\n    while\
