  md: "a\nb\nc\n2\na\nb\nc\n3\na\nb\nc\n\nThe output illustrates that the program\
    \ finishes the first iteration of the outer loop by printing 1, which then triggers\
    \ the fulfillment of the inner loop, printing a, b, c continuously. Once the inner\
    \ loop has finished, the application returns to the top of the outer loop prints\
    \ 2, then again prints the inner loop in its entirety (a, b, c), etc.\n\nNested\
    \ for loops can be valuable for iterating through items within lists formed of\
    \ lists. In a list composed of lists, if we apply just one for loop, the application\
    \ will output each internal list as an item:\n\n```\nfor list in list_of_lists:\n\
    \    print(list)\n```\n\nOutput\n\n['hammerhead', 'great white', 'dogfish']\n\
