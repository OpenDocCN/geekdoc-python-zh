- md: 'Python 2.1 was restricted to Python 1.6.1, as well as Python 2.0. Its permit
    was renamed Python Software Foundation License. All code, documentation, and specifications
    added, from the time of Python 2.1''s alpha release on, is granted by the Python
    Software Foundation, a non-profit organization formed in 2001, modeled after the
    Apache Software Foundation. The release included a modification to the language
    specification to help nested scopes, like other statically scoped languages.


    Python 2.2 was released in December 2001; a major innovation was the unification
    of Python''s types (types written in C) and classes (types written in Python)
    into one hierarchy. This single unification made Python''s object model purely
    and consistently object-oriented. Also added were generators that were inspired
    by Icon.


    Python 2.5 was released in September 2006 and introduced them with the statement,
    which encloses a code block within a context manager, allowing Resource Acquisition
    Is Initialization (RAII)-like behavior and replacing a common try/finally idiom.


    Python 2.6 was issued to correspond with Python 3.0 and added some points from
    that release, as well as a "warnings" mode that highlighted the performance of
    features that were removed in Python 3.0. Likewise, Python 2.7 concurred with
    and added points from Python 3.1, which was released on June 26, 2009. Parallel
    2.x and 3.x deliverance then ceased, and Python 2.7 was the eventual release in
    the 2.x series. In November 2014, it was declared that Python 2.7 would be maintained
    until 2020, but users were inspired to move to Python 3 as soon as possible. Python
    2.7 support ended on 2020-01-01, but a final release of the code as it appeared
    on 2020-01-01, 2.7.18 occurred on 2020-04-20. This marks the end-of-life of Python
    2.


    ## Version 3


    Python 3.0 was released on December 3, 2008. It was designed to rectify fundamental
    design flaws in the language-the changes required could not be implemented while
    retaining full backward compatibility with the 2.x series, which necessitated
    a new major version number. The guiding policy of Python 3 was: "reduce specialty
    duplication by eliminating old ways of doing things".


    Python 3.0 was developed with identical philosophy as in previous versions. However,
    Python had gained new and redundant ways to program. The identical task, Python
