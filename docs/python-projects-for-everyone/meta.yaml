    )\nprint(f\"The total is {total}.\")\nprint(f\"The individual rolls are: {rolls}\"\
    )\n```\n\n## PROJECT 20: AMORTIZATION SCHEDULE GENERATOR\n\nTHIS CALCULATOR CAN\
    \ GENERATE A DETAILED AMORTIZATION SCHEDULE FOR A LOAN, SHOWING THE BREAKDOWN\
    \ OF EACH PAYMENT INTO PRINCIPAL AND INTEREST, AS WELL AS THE REMAINING BALANCE\
    \ ON THE LOAN AFTER EACH PAYMENT.\n\n```python\n# PROMPT THE USER TO input loan\
    \ details\nprincipal = float(input(\"Enter the loan amount: \"))\ninterest_rate\
