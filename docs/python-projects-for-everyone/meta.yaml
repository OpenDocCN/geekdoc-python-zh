    \ simulator\nbackend = Aer.get_backend('qasm_simulator')\njob = execute(qc, backend)\n\
    result = job.result()\n\n# Print the measurement outcomes\ncounts = result.get_counts(qc)\n\
    print(counts)\n```\n\nIn this code, we create a QuantumCircuit object with two\
    \ qubits, apply a Hadamard gate to each qubit to put them in a superposition state,\
