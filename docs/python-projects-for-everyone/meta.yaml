    ## PROJECT 35: BLOCKCHAIN APPLICATION: BUILD A DECENTRALIZED APPLICATION USING\
    \ BLOCKCHAIN TECHNOLOGY FOR SECURE, TRANSPARENT, AND TAMPER-PROOF DATA STORAGE\
    \ AND SHARING\n\n```python\nimport hashlib\nimport json\nfrom time import time\n\
    \nclass Blockchain:\n    def __init__(self):\n        self.chain = []\n      \
    \  self.current_transactions = []\n        # Create the genesis block\n      \
    \  self.new_block(previous_hash=1, proof=100)\n\n    def new_block(self, proof,\
    \ previous_hash=None):\n        \"\"\"\n        Create a new Block in the Blockchain\n\
    \        :param proof: <int> The proof given by the Proof of Work algorithm\n\
    \        :param previous_hash: (Optional) <str> Hash of previous Block\n     \
    \   :return: <dict> New Block\n        \"\"\"\n        block = {\n           \
    \ 'index': len(self.chain) + 1,\n            'timestamp': time(),\n          \
    \  'transactions': self.current_transactions,\n            'proof': proof,\n \
    \           'previous_hash': previous_hash or self.hash(self.chain[-1]),\n   \
    \     }\n        # Reset the current list of transactions\n        self.current_transactions\
    \ = []\n        self.chain.append(block)\n        return block\n\n    def new_transaction(self,\
    \ sender, recipient, amount):\n        \"\"\"\n        Creates a new transaction\
    \ to go into the next mined Block\n        :param sender: <str> Address of the\
    \ Sender\n        :param recipient: <str> Address of the Recipient\n        :param\
    \ amount: <int> Amount\n        :return: <int> The index of the Block that will\
    \ hold this transaction\n        \"\"\"\n        self.current_transactions.append({\n\
    \            'sender': sender,\n            'recipient': recipient,\n        \
    \    'amount': amount,\n        })\n        return self.last_block['index'] +\
    \ 1\n\n    @staticmethod\n    def hash(block):\n        \"\"\"\n        Creates\
    \ a SHA-256 hash of a Block\n        :param block: <dict> Block\n        :return:\
    \ <str>\n        \"\"\"\n        # We must make sure that the Dictionary is Ordered,\
    \ or we'll have inconsistent hashes\n        block_string = json.dumps(block,\
    \ sort_keys=True).encode()\n        return hashlib.sha256(block_string).hexdigest()\n\
    \n    @property\n    def last_block(self):\n        return self.chain[-1]\n\n\
    \    def proof_of_work(self, last_proof):\n        \"\"\"\n        Simple Proof\
    \ of Work Algorithm:\n        - Find a number p' such that hash(pp') contains\
    \ leading 4 zeroes, where p is the previous p'\n        - p is the previous proof,\
    \ and p' is the new proof\n        :param last_proof: <int>\n        :return:\
    \ <int>\n        \"\"\"\n        proof = 0\n        while self.valid_proof(last_proof,\
    \ proof) is False:\n            proof += 1\n        return proof\n\n    @staticmethod\n\
    \    def valid_proof(last_proof, proof):\n        \"\"\"\n        Validates the\
    \ Proof: Does hash(last_proof, proof) contain 4 leading zeroes?\n        :param\
    \ last_proof: <int> Previous Proof\n        :param proof: <int> Current Proof\n\
    \        :return: <bool> True if correct, False if not.\n        \"\"\"\n    \
    \    guess = f'{last_proof}{proof}'.encode()\n        guess_hash = hashlib.sha256(guess).hexdigest()\n\
    \        return guess_hash[:4] == \"0000\"\n```\n\nThis is a basic implementation\
    \ of a blockchain in Python. It defines a class called Blockchain that has methods\
    \ for creating new blocks, adding transactions, and validating proof of work.\
    \ It also has a method for hashing blocks using the SHA-256 algorithm. This implementation\
    \ uses a simple proof of work algorithm to create a new block. It also includes\
    \ a method for validating the proof of work.\n\nThis implementation is not meant\
