  mdcn: '## 开始之前


    近年来，Python 已成为最重要的编程语言之一。它的流行部分归功于其简单易用，使其成为初学者学习的理想语言。同时，其多功能性和强大功能也使其成为经验丰富的开发者构建复杂应用和系统的首选。Python
    在金融、医疗、游戏和数据科学等众多行业都有广泛应用，这里仅列举几例。


    在本书中，你将找到 100 个从初级到高级的 Python 项目。这些项目旨在帮助你提升编程技能，学习新的编程概念，并在此过程中获得乐趣。但需要注意的是，这些项目并非旨在提供一个放之四海而皆准的解决方案。相反，它们是你进行自主实验和探索的起点。


    在某些情况下，提供的代码可能更像是一个指导，而非完整的代码。这是有意为之，因为目标是给你一个思路，并提供一个如何用 Python 实现的示例。在其他情况下，代码可能更为复杂。然而，即使在这些情况下，代码也应被视为你自主探索的起点。


    我们希望你喜欢完成这些项目，并希望它们能帮助你提升编程技能，建立作为程序员的自信。记住要享受乐趣，不要害怕尝试和探索新事物！


    -   项目 50：迷宫求解器：开发一个程序，通过寻找从起点到终点的最短路径来自动解决迷宫。

    -   项目 51：交互式地图：创建一个地图应用程序，允许用户搜索地点、获取路线并探索兴趣点。

