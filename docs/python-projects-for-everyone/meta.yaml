    To use this code, you can call the `compress_file()` function with the name of\
    \ the file you want to compress, and it will create a new zip file with the same\
    \ name and the `.zip` extension. You can then call the `decompress_file()` function\
    \ with the name of the zip file you want to decompress, and it will extract all\
    \ the files and directories contained in the zip file to the current directory.\n\
    \n## PROJECT 56: DATA VISUALIZATION TOOL: CREATE A PROGRAM THAT CAN VISUALIZE\
    \ DATA IN DIFFERENT FORMATS, SUCH AS CHARTS, GRAPHS, AND MAPS\n\n```python\nimport\
    \ matplotlib.pyplot as plt\nimport numpy as np\n\n# Generate some sample data\n\
    x = np.random.normal(0, 1, 100)\ny = np.random.normal(0, 1, 100)\n\n# Create a\
    \ scatter plot\nplt.scatter(x, y)\nplt.title('Sample Scatter Plot')\nplt.xlabel('X\
    \ axis')\nplt.ylabel('Y axis')\n\n# Show the plot\nplt.show()\n```\n\nThis code\
    \ generates some random data using NumPy and then creates a scatter plot using\
    \ Matplotlib. The `scatter()` function takes two arrays as input, one for the\
    \ x-axis data and one for the y-axis data. The `title()`, `xlabel()`, and `ylabel()`\
    \ functions are used to set the title and labels for the plot. Finally, the `show()`\
    \ function is used to display the plot.\n\nYou can customize this code to generate\
    \ different types of visualizations, such as bar charts, line graphs, and heat\
    \ maps, by using the appropriate functions from the Matplotlib library. Additionally,\
    \ you can use other libraries like Seaborn and Plotly to create more advanced\
    \ visualizations like statistical plots and interactive charts.\n\n## PROJECT\
    \ 57: CODE REPOSITORY: DEVELOP A WEB-BASED PLATFORM THAT ALLOWS USERS TO SHARE\
    \ AND COLLABORATE ON CODE PROJECTS\n\nBuilding a web-based platform for code repository\
    \ and collaboration involves a lot of components such as front-end web development,\
    \ back-end server setup, and database integration. Here's an example Python code\
    \ for a basic version of a code repository:\n\n```python\nfrom flask import Flask,\
    \ render_template, request, redirect, url_for\nfrom flask_sqlalchemy import SQLAlchemy\n\
    \napp = Flask(__name__)\napp.config['SQLALCHEMY_DATABASE_URI'] = 'sqlite:///code_repository.db'\n\
    db = SQLAlchemy(app)\n\nclass Code(db.Model):\n    id = db.Column(db.Integer,\
    \ primary_key=True)\n    title = db.Column(db.String(100), nullable=False)\n \
    \   code = db.Column(db.Text, nullable=False)\n\n@app.route('/')\ndef index():\n\
    \    codes = Code.query.all()\n    return render_template('index.html', codes=codes)\n\
    \n@app.route('/new_code', methods=['GET', 'POST'])\ndef new_code():\n    if request.method\
    \ == 'POST':\n        title = request.form['title']\n        code = request.form['code']\n\
    \        new_code = Code(title=title, code=code)\n        db.session.add(new_code)\n\
    \        db.session.commit()\n        return redirect(url_for('index'))\n    else:\n\
    \        return render_template('new_code.html')\n\n@app.route('/view_code/<int:id>')\n\
    def view_code(id):\n    code = Code.query.filter_by(id=id).first()\n    return\
    \ render_template('view_code.html', code=code)\n\nif __name__ == '__main__':\n\
    \    app.run(debug=True)\n```\n\nThis code uses the Flask web framework and SQLAlchemy\
    \ to create a simple code repository. It defines a `Code` class that maps to a\
    \ database table with columns for `id`, `title`, and `code`. The `index()` function\
    \ retrieves all `Code` objects from the database and displays them on the home\
    \ page. The `new_code()` function allows users to create new code entries and\
    \ add them to the database. The `view_code()` function retrieves a single `Code`\
    \ object by ID and displays it on a separate page.\n\nTo use this code, you would\
    \ need to create the necessary HTML templates for the web pages (`index.html`,\
    \ `new_code.html`, and `view_code.html`). Additionally, you would need to set\
    \ up a database to store the `Code` objects (in this example, the database is\
    \ SQLite, but you could use a different database system like MySQL or PostgreSQL).\
    \ This basic code repository can be expanded with additional features such as\
    \ user authentication, version control, and code collaboration tools.\n\n## PROJECT\
    \ 58: ENCRYPTION TOOL: BUILD A PROGRAM THAT CAN ENCRYPT AND DECRYPT TEXT DATA\
    \ USING DIFFERENT ENCRYPTION ALGORITHMS\n\n```python\ndef caesar_encrypt(text,\
    \ key):\n    result = \"\"\n    for char in text:\n        if char.isalpha():\n\
    \            shift = key % 26\n            if char.isupper():\n              \
    \  result += chr((ord(char) + shift - 65) % 26 + 65)\n            else:\n    \
    \            result += chr((ord(char) + shift - 97) % 26 + 97)\n        else:\n\
    \            result += char\n    return result\n\ndef caesar_decrypt(ciphertext,\
    \ key):\n    result = \"\"\n    for char in ciphertext:\n        if char.isalpha():\n\
    \            shift = key % 26\n            if char.isupper():\n              \
    \  result += chr((ord(char) - shift - 65) % 26 + 65)\n            else:\n    \
    \            result += chr((ord(char) - shift - 97) % 26 + 97)\n        else:\n\
    \            result += char\n    return result\n\n# Example usage\ntext = \"Hello,\
    \ world!\"\nkey = 3\nencrypted_text = caesar_encrypt(text, key)\nprint(f\"Encrypted\
    \ text: {encrypted_text}\")\ndecrypted_text = caesar_decrypt(encrypted_text, key)\n\
    print(f\"Decrypted text: {decrypted_text}\")\n```\n\nThis code defines two functions,\
    \ `caesar_encrypt()` and `caesar_decrypt()`, which implement the Caesar cipher\
    \ algorithm for encrypting and decrypting text, respectively. The `caesar_encrypt()`\
    \ function takes a plaintext string and a key (an integer representing the number\
    \ of positions to shift each letter) as input, and returns the encrypted text.\
    \ The `caesar_decrypt()` function takes a ciphertext string and the same key as\
    \ input, and returns the decrypted text.\n\nTo use the code, you can call the\
    \ `caesar_encrypt()` function with a plaintext string and a key, and it will return\
    \ the encrypted text. You can then call the `caesar_decrypt()` function with the\
    \ encrypted text and the same key, and it will return the original plaintext."
