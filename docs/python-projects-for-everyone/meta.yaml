    \ ANALYZE MOVIE REVIEWS AND CLASSIFY THEM AS POSITIVE OR NEGATIVE, USING NATURAL\
    \ LANGUAGE PROCESSING TECHNIQUES SUCH AS SENTIMENT ANALYSIS\n\n```python\nimport\
