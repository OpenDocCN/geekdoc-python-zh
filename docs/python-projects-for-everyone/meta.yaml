    \ the monthly payment. We then use the monthly payment to calculate the total\
    \ amount paid and the total interest paid over the course of the loan. Finally,\
    \ we print the results to the console in a formatted manner.\n\n## PROJECT 19:\
    \ DICE ROLLING SIMULATOR\n\nBUILD A PROGRAM THAT SIMULATES THE ROLLING OF A DICE,\
    \ ALLOWING USERS TO SPECIFY THE NUMBER OF DICE AND SIDES PER DIE.\n\nTHIS CODE\
    \ FIRST DEFINES a function `roll_dice` that takes two arguments, `num_dice` and\
    \ `num_sides`, and rolls `num_dice` dice with `num_sides` sides each. The function\
    \ returns the total sum of the rolls and a list of the individual rolls.\n\nThe\
    \ code then prompts the user to enter the number of dice and sides per die, and\
    \ calls the `roll_dice` function with these values. Finally, the code prints the\
    \ total sum and the individual rolls.\n\n```python\nimport random\n\n# define\
    \ the function to roll the dice\ndef roll_dice(num_dice, num_sides):\n    total\
    \ = 0\n    rolls = []\n    for i in range(num_dice):\n        roll = random.randint(1,\
