    \n## 项目 60：数字签名工具：创建一个可以为文档和文件创建和验证数字签名的程序\n\n以下代码使用 `hashlib` 和 `hmac` 库为文档和文件创建和验证数字签名：\n\
    \n```python\nimport hashlib\nimport hmac\n\ndef create_signature(file_path, key):\n\
    \    \"\"\"\n    使用给定的密钥为指定文件创建数字签名。\n\n    Args:\n        file_path (str): 要签名的文件路径。\n\
    \        key (str): 用于签名文件的密钥。\n\n    Returns:\n        str: 以十六进制字符串表示的数字签名。\n\
    \    \"\"\"\n    # 读取文件内容\n    with open(file_path, 'rb') as f:\n        file_contents\
    \ = f.read()\n\n    # 使用 SHA-256 对文件内容进行哈希\n    hashed_contents = hashlib.sha256(file_contents).digest()\n\
    \n    # 使用密钥和哈希后的文件内容生成 HMAC-SHA256 签名\n    signature = hmac.new(key.encode(),\
    \ hashed_contents, hashlib.sha256).hexdigest()\n\n    return signature\n\ndef\
    \ verify_signature(file_path, key, signature):\n    \"\"\"\n    使用给定的密钥验证指定文件的数字签名。\n\
    \n    Args:\n        file_path (str): 要验证的文件路径。\n        key (str): 用于签名文件的密钥。\n\
    \        signature (str): 要验证的数字签名。\n\n    Returns:\n        bool: 如果签名有效则返回 True，否则返回\
    \ False。\n    \"\"\"\n    # 读取文件内容\n    with open(file_path, 'rb') as f:\n   \
    \     file_contents = f.read()\n\n    # 使用 SHA-256 对文件内容进行哈希\n    hashed_contents\
    \ = hashlib.sha256(file_contents).digest()\n\n    # 使用密钥和哈希后的文件内容生成 HMAC-SHA256\
    \ 签名\n    generated_signature = hmac.new(key.encode(), hashed_contents, hashlib.sha256).hexdigest()\n\
    \n    # 比较生成的签名与提供的签名\n    return hmac.compare_digest(generated_signature, signature)\n\
    ```\n\n要为文件创建数字签名，你可以使用文件路径和密钥调用 `create_signature` 函数：\n\n```python\nsignature\
    \ = create_signature('file.txt', 'my-secret-key')\n```\n\n这将使用密钥 `my-secret-key`\
