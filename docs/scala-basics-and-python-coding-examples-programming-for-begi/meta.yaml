    Age: 20\n\n## Data Types in Scala\n\nA data type is a data categorization that\
    \ tells the compiler what type of value a variable has. For instance, if a variable\
    \ has an int data type, it has a numeric value. In Scala, the data types in terms\
    \ of length and storage are similar to Java. Data types are treated with the same\
    \ objects in Scala so that the first letter of the data type is in a capital letter.\n\
    \nThe data types available in Scala as shown in the table below:\n\n| DATATYPE\
    \ | DEFAULT VALUE | DESCRIPTION |\n| :--- | :--- | :--- |\n| **Boolean** | False\
    \ | True or False |\n| **Byte** | 0 | 8 bit signed value. Range: -128 to 127 |\n\
    | **Short** | 0 | 16 bit signed value. Range: -2<sup>15</sup> to 2<sup>15</sup>-1\
    \ |\n| **Char** | ‘\\u000’ | 16 bit unsigned unicode character. Range: 0 to 2<sup>16</sup>-1\
    \ |\n| **Int** | 0 | 32 bit signed value. Range: -2<sup>31</sup> to 2<sup>31</sup>-1\
    \ |\n| **Long** | 0L | 64 bit signed value. Range: -2<sup>63</sup> to 2<sup>63</sup>-1\
    \ |\n| **Float** | 0.0F | 32 bit IEEE 754 single-Precision float |\n| **Double**\
    \ | 0.0D | 64 bit IEEE 754 double-Precision float |\n| **String** | null | A sequence\
    \ of character |\n| **Unit** | – | Coincides to no value. |\n| **Nothing** | –\
    \ | It is a subtype of every other type and it contains no value. |\n| **Any**\
    \ | – | It is a supertype of all other types |\n| **AnyVal** | – | It serve as\
    \ value types. |\n| **AnyRef** | – | It serves as reference types. |\n\n## EXAMPLE\n\
    \n```scala\n// Scala program to illustrate Datatypes\nobject Test\n{\n    def\
    \ main(args: Array[String])\n    {\n        var a: Boolean = true\n        var\
    \ a1: Byte = 126\n        var a2: Float = 2.45673f\n        var a3: Int = 3\n\
    \        var a4: Short = 45\n        var a5: Double = 2.93846523\n        var\
    \ a6: Char = 'A'\n        if (a == true)\n        {\n            println(\"boolean:scalaforgeeks\"\
    )\n        }\n        println(\"byte:\" + a1)\n        println(\"float:\" + a2)\n\
    \        println(\"integer:\" + a3)\n        println(\"short:\" + a4)\n      \
    \  println(\"double:\" + a5)\n        println(\"char:\" + a6)\n    }\n}\n```\n\
    \n## Output:\n\nboolean: scalaforgeeks\nbyte: 126\nfloat: 2.45673\ninteger: 3\n\
    short: 45\ndouble: 2.93846523\nchar: A\n\nVariables are simply the location for\
    \ the storage. Each variable is known by name, and some known and unknown piece\
    \ of information known as value is stored.\n\nA data type is responsible for allocating\
    \ memory to the variable, so one can define a variable by its data type and name.\n\
    \nThere are two types of variable within Scala:\n\n- Mutable Variables\n- Immutable\
    \ Variables\n\nLet's get detailed understanding of each of these variables.\n\n\
    ## Mutable Variable:\n\nThese variables are those variables that allow us to change\
    \ a value after a variable is declared.\n\nThe var keyword is used to define mutable\
    \ variables.\n\nThe first letter of type of data should be in capital letter because\
    \ it is treated as objects in the Scala data type.\n\n**Syntax:**\n\n```scala\n\
    var Variable_name: Data_type = \"value\";\n```\n\n**For Example:**\n\n```scala\n\
    var name: String = \"scalaforgeeks\";\n```\n\n## Immutable Variable:\n\nThese\
    \ variables are the variables that do not allow you to change a value after a\
    \ variable has been declared.\n\nImmutable variables are defined using the val\
    \ keyword.\nThe first letter should be in capital letter because it is treated\
    \ as objects within the Scala data type.\n\n## Syntax:\n\n```scala\nval Variable_name:\
    \ Data_type = \"value\";\n```\n\n## For Example:\n\n```scala\nval name: String\
    \ = \"scalaforgeeks\";\n```\n\n## In Scala Rules for naming variable\n\nThe name\
    \ of the variable can include letter, digit, and two special characters Underscore\
    \ (_) and Dollar($).\nWhite space in name variable is not allowed.\nThe name of\
    \ the variable must not contain the word reserved or the keyword.\nAn alphabet\
    \ should be the starting letter for the variable name.\n\n## Scope of Variables\
    \ In Scala\n\nScala variable has three types of scope.\n\n- Fields.\n- Method\
    \ Parameters.\n- Local Variables.\n\n## Fields\n\nWe can access such variables\
    \ from any method in the object & from outside the object if we declare them with\
    \ the correct access modifiers.\n\nA field may be mutable or immutable, they may\
    \ define them using 'var' or 'val.'\n\n## EXAMPLE\n\n```scala\n// Scala program\
    \ of field\n// scope for Scala variable\n\n// class created with field\n// variables\
    \ x and y.\nclass disp\n{\n    var x = 10.3f\n    var y = 7f\n    def windet()\n\
    \    {\n        println(\"Value of x : \"+x)\n    }\n    println(\"Value of y\
    \ : \"+y);\n}\n\nobject Example\n{\n    // Main method\n    def main(args:Array[String])\n\
    \    {\n        val Example = new disp()\n        Example.windet()\n    }\n}\n\
    ```\n\n## Output:\n\nValue of y : 7.0\nValue of x : 10.3\n\n## Method Parameters\n\
    \nWhen we call it we use these variables if we want to pass a value inside the\
    \ method.\n\nIf there is a reference to the object from outside the method, they\
    \ can be accessed both inside the method and outside.\n\nThose variables are always\
    \ mutable Using the keyword 'val.'\n\n## EXAMPLE\n\n```scala\n// Scala program\
    \ of Method\n// scope for Scala variable\n\n// class created with Method\n// variables\
    \ s1 and s2.\nclass rect\n{\n    def mult(s1: Int, s2: Int)\n    {\n        var\
    \ result = s1 * s2\n        println(\"Area is: \" + result);\n    }\n}\n\nobject\
    \ Area\n{\n    // Main method\n    def main(args:Array[String])\n    {\n     \
    \   val su = new rect()\n        su.mult(5, 10)\n    }\n}\n```\n\n## Output:\n\
    \nArea is: 50\n\n## Local Variables\n\nThese variables are declared within a method\
    \ and are only accessible within it.\n\nThese variables both mutable and immutable\
    \ using keywords 'var' & 'val.'\n\n## EXAMPLE\n\n```scala\n// Scala program of\
    \ Method\n// scope for Scala variable\n\n// class created with Local\n// variables\
    \ s1 and s2.\nclass Area\n{\n    def mult()\n    {\n        var(s1, s2) = (3,\
    \ 80);\n        var s = s1 * s2;\n        println(\"Area is: \" + s)\n    }\n\
    }\n\nobject Test\n{\n    // Main method\n    def main(args:Array[String])\n  \
    \  {\n        val ex = new Area()\n        ex.mult()\n    }\n}\n```\n\n## Output:\n\
    \nArea is: 240"
  mdcn: "年龄：20\n专业：计算机科学\n\n## Scala 标识符的类型\n\n**字母数字标识符：** 这些标识符以字母（大写或小写）或下划线开头，后跟字母、数字或下划线。\n\
