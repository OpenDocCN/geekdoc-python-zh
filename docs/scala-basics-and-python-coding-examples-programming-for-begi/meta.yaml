  md: '# # Scala vs Java


    Java is a general-purpose, concurrent computer programming language, class-based,
    object-oriented, etc. Java applications are compiled into bytecodes that can run
    on any virtual Java machine (JVM), independent of the architecture of the program.


    Scala is a programming language with a general purpose, high-level, multi-paradigm.
    It is a pure object-oriented programming language which also follows the approach
    to functional programming. There is no primitive data definition, since everything
    in Scala is an entity. It is intended to express the general patterns of programming
    in a streamlined, succinct, and type-safe way.


    | SCALA | JAVA |

    |---|---|

    | Scala is a mixture of both object oriented and functional programming. | Java
    is a general purpose object oriented language. |

    | Scala is less readable due to nested code. | Java is more readable. |

    | The process of compiling source code into byte code is slow. | The process of
    compiling source code into byte code is fast. |'
  merge: -1
  pgno: 13
- img_proc: true
  md: '| Scala support operator overloading. | Java does not support operator overloading.
    |

    | Scala supports lazy evaluation. | Java does not support lazy evaluation. |

    | Scala is not backward compatible. | Java is backward compatible means the code
    written in the new version can also run in older version without any error. |

