- md: "## Scala Ranges\n\nThe Scala Range can be defined as an organized series of\
    \ uniformly divided integers.\n\nIt is helpful to provide more strength with fewer\
    \ methods so operations done here are very fast.\n\nThe ranges can be used for\
    \ iteration loops.\n\nIt can be obtained through certain predefined methods, namely\
    \ until, by, and to.\n\nThree constants are defined, i.e. (start, end, and increment\
    \ value).\n\n**Syntax:**\n`val range = Range(x, y, z)`\n\n**EXAMPLE**\n\n```scala\n\
    // Scala program for Ranges\n\n// Creating object\nobject GFG\n{\n    // Main\
    \ method\n    def main(args: Array[String])\n    {\n        // applying range\
    \ method\n        val x = Range(3, 10, 1)\n\n        // Displays given range\n\
    \        println(x)\n\n        // Displays starting value\n        // of the given\
    \ range\n        println(x(0))\n\n        // Displays last value\n        // of\
    \ the given range\n        println(x.last)\n    }\n}\n```\n\n**OUTPUT**\n\n```\n\
    Range(3, 4, 5, 6, 7, 8, 9)\n3\n9\n```\n\n## Ranges - Operations performed\n\n\
    If we want a range that includes the end value, we can also use the method ‘until’,\
    \ both methods (**until and Range**) are used for the same purpose.\n\n**EXAMPLE**\n\
    \n```scala\n// Scala program for Ranges\n\n// Creating object\nobject GFG\n{\n\
    \    // Main method\n    def main(args: Array[String])\n    {\n        // applying\
    \ range method\n        val x = Range(0, 10, 2)\n\n        // applying until method\n\
    \        val y = 0 until 10 by 2\n\n        // Displays true if both the\n   \
    \     // methods are equivalent\n        println(x == y)\n    }\n}\n```\n\n**Output:**\n\
    \n```\nTrue\n```\n\nThe Range ‘upper bound’ may be made inclusive.\n\n**EXAMPLE**\n\
    \n```scala\n// Scala program for Ranges\n\n// Creating object\nobject GFG\n{\n\
    \    // Main method\n    def main(args: Array[String])\n    {\n        // applying\
    \ range method\n        val x = Range(1, 8)\n\n        // Including upper bound\n\
    \        val y = x.inclusive\n\n        // Displays all the elements\n       \
    \ // of the range\n        println(y)\n    }\n}\n```\n\n**Output:**\n\n```\nRange(1,\
    \ 2, 3, 4, 5, 6, 7, 8)\n```\n\n**Inclusive** is used here to include the upper\
    \ bound of the Range.\n\nIf need range of integer values, use the **to** method\
    \ (both to and inclusive Ranges are equivalent).\n\n**EXAMPLE**\n\n```scala\n\
    // Scala program for Ranges\n\n// Creating object\nobject GFG\n{\n    // Main\
    \ method\n    def main(args: Array[String])\n    {\n        // applying range\
    \ method\n        val x = Range(1, 8)\n\n        // Including upper bound\n  \
    \      val y = x.inclusive\n\n        // applying 'to' method\n        val z =\
    \ 1 to 8\n\n        // Displays true if both the\n        // methods are equal\n\
    \        println(y == z)\n    }\n}\n```\n\n**Output:**\n\n```\nTrue\n```\n\n##\
    \ Scala Decision Making\n\n### (if, if-else, Nested if-else, if-else if)\n\nProgramming\
    \ decision-making is similar to real-life decision-making. When the given condition\
    \ is met, a piece of code is executed in decision making. These are also sometimes\
    \ referred to as the Control Flow statements. Scala uses control statements to\
    \ control the program's execution flow according to certain conditions. These\
    \ are used to advance and branch the execution flow, based on changes to a program's\
    \ state.\n\n**The conditional statements**\n\n- if\n- if-else\n- Nested if-else\n\
    - if-else if ladder\n\n### if statement\n\n\"If\" statements are the simplest\
    \ statements of decision making amongst all statements of decision making. In\
    \ this statement, the code block will only be executed when the given condition\
    \ is true and, if the condition is false then that code block will not be executed.\n\
    \n**Syntax:**\n\n```scala\nif(condition)\n{\n    // Code to be executed\n}\n```\n\
    \n**FLOW CHART**\n\n![](img/1e313a57da083d8618eb5d98d80bfa46_44_0.png)\n\n**EXAMPLE**\n\
    \n```scala\n// Scala program to illustrate the if statement\nobject Test {\n \
    \   // Main Method\n    def main(args: Array[String]) {\n        // taking a variable\n\
    \        var a: Int = 50\n\n        if (a > 30)\n        {\n            // This\
    \ statement will execute as a > 30\n            println(\"ScalaforGeeks\")\n \
    \       }\n    }\n}\n```\n\n**Output:**\n\n```\nScalaforGeeks\n```\n\n### if-else\
    \ statement\n\nThe if statement alone tells us that it will execute a block of\
    \ statements if a condition is true and if the condition is false it won't.\n\n\
    But what if we want to do something different, if the condition is wrong.\n\n\
    Here comes **else** statement.\n\nWhen the condition is wrong, we can use the\
    \ else statement with if statement to execute a block of code.\n\n**Syntax:**\n\
    \n```scala\nif (condition)\n{\n    // Executes this block if\n    // condition\
    \ is true\n}\nelse\n{\n    // Executes this block if\n    // condition is false\n\
    }\n```\n\n**FLOW CHART**\n\n![](img/1e313a57da083d8618eb5d98d80bfa46_46_0.png)\n\
    \n**EXAMPLE**\n\n```scala\n// Scala program to illustrate the if-else statement\n\
    object Test {\n    // Main Method\n    def main(args: Array[String]) {\n     \
    \   // taking a variable\n        var a: Int = 650\n\n        if (a > 698)\n \
    \       {\n            // This statement will not\n            // execute as a\
    \ > 698 is false\n            println(\"ScalaorGeeks\")\n        }\n        else\n\
    \        {\n            // This statement will execute\n            println(\"\
    Sudo Placement\")\n        }\n    }\n}\n```\n\n**OUTPUT**\n\n```\nSudo Placement\n\
    ```\n\n### Nested if-else statement\n\nA nested if an if statement is the target\
    \ of a different if-else statement.\n\nNested if-else statement refers to an if-else\
    \ statement within an if statement or in a else statement.\n\nScala lets us nest\
    \ if-else statements into if-else statements.\n\n**Syntax:**\n\n```scala\n// Executes\
    \ when condition_1 is true\nif (condition_1)\n{\n    if (condition_2)\n    {\n\
    \        // Executes when condition_2 is true\n    }\n    else\n    {\n      \
    \  // Executes when condition_2 is false\n    }\n}\n\n// Executes when condition_1\
    \ is false\nelse\n{\n    if (condition_3)\n    {\n        // Executes when condition_3\
    \ is true\n    }\n    else\n    {\n        // Executes when condition_3 is false\n\
    \    }\n}\n```\n\n**FLOW CHART**\n\n![](img/1e313a57da083d8618eb5d98d80bfa46_49_0.png)\n\
    \n**EXAMPLE**\n\n```scala\n// Scala program to illustrate\n// the nested if-else\
    \ statement\nobject Test {\n    // Main Method\n    def main(args: Array[String])\
    \ {\n        // taking three variables\n        var a: Int = 70\n        var b:\
    \ Int = 40\n        var c: Int = 100\n\n        // condition_1\n        if (a\
    \ > b)\n        {\n            // condition_2\n            if(a > c)\n       \
    \     {\n                println(\"a is largest\");\n            }\n         \
    \   else\n            {\n                println(\"c is largest\")\n         \
    \   }\n        }\n        else\n        {\n            // condition_3\n      \
    \      if(b > c)\n            {\n                println(\"b is largest\")\n \
    \           }\n            else\n            {\n                println(\"c is\
    \ largest\")\n            }\n        }\n    }\n}\n```\n\n**Output:**\n\n```\n\
    c is largest\n```\n\n### if-else if Ladder\n\nHere a user can choose between multiple\
    \ options. The if declarations are executed from top down. As soon as one of the\
    \ conditions controlling the if is true; Then the statement associated with that\
    \ ‘if’ it is executed, and it bypasses the rest of the ladder. If none of the\
    \ conditions are true, then the final other declaration will be executed.\n\n\
    **Syntax:**\n\n```scala\nif(condition_1)\n{\n    // this block will execute\n\
    \    // when condition_1 is true\n}\nelse if(condition_2)\n{\n    // this block\
    \ will execute\n    // when condition2 is true\n}\nelse\n{\n    // this block\
    \ will execute when none\n    // of the condition is true\n}\n```\n\n**FLOW CHART**\n\
    \n![](img/1e313a57da083d8618eb5d98d80bfa46_52_0.png)\n\n**EXAMPLE**\n\n```scala\n\
    // Scala program to illustrate\n// the if-else-if ladder\nobject Test {\n    //\
    \ Main Method\n    def main(args: Array[String]) {\n        // Taking a variable\n\
    \        var value: Int = 50\n\n        if (value == 20)\n        {\n        \
    \    // print \"value is 20\" when\n            // above condition is true\n \
    \           println(\"Value is 20\")\n        }\n        else if (value == 25)\n\
    \        {\n            // print \"value is 25\" when\n            // above condition\
    \ is true\n            println(\"Value is 25\")\n        }\n        else if (value\
    \ == 40)\n        {\n            // print \"value is 40\" when\n            //\
    \ above condition is true\n            println(\"Value is 40\")\n        }\n \
    \       else\n        {\n            // print \"No Match Found\"\n           \
    \ // when all condition is false\n            println(\"No Match Found\")\n  \
    \      }\n    }\n}\n```\n\n**OUTPUT**\n\n```\nNo Match Found\n```\n\n## SCALA\
    \ LOOPS\n\nLooping into programming languages is a feature that facilitates repeatedly\
    \ executing a set of instructions / functions while some condition evaluates to\
    \ true.\n\nLoops make task simpler for the programmers.\n\nScala provides the\
    \ various loop types for dealing with the condition-based situation in the program.\n\
    \nIn Scala the loops are:\n\n- while Loop\n- do..while Loop\n- for Loop\n- Nested\
    \ Loops\n\n### WHILE LOOP\n\nA while loop usually takes a condition in parenthesis.\n\
    \nIf the condition is True, the code will be executed within the while loop's\
    \ body.\n\nA while loop is used when we don't know how many times we want the\
    \ loop to be executed but we do know the loop termination condition.\n\nIt is\
    \ also known as a loop controlled by entry, as the condition is checked before\
    \ the loop is executed.\n\nThe while loop can be considered a repeat in if statement.\n\
    \n**Syntax:**\n\n```scala\nwhile (condition)\n```"
  mdcn: "## Scala 范围\n\nScala 范围可以定义为一系列均匀分布的整数。\n\n它有助于以更少的方法提供更强的功能，因此这里执行的操作非常快。\n\
    \n范围可用于迭代循环。\n\n可以通过某些预定义的方法获得，即 `until`、`by` 和 `to`。\n\n定义了三个常量，即（起始值、结束值和增量值）。\n\
    \n**语法：**\n`val range = Range(x, y, z)`\n\n**示例**\n\n```scala\n// Scala 范围程序\n\
    \n// 创建对象\nobject GFG\n{\n    // 主方法\n    def main(args: Array[String])\n    {\n\
    \        // 应用 range 方法\n        val x = Range(3, 10, 1)\n\n        // 显示给定范围\n\
    \        println(x)\n\n        // 显示给定范围的起始值\n        println(x(0))\n\n      \
    \  // 显示给定范围的最后一个值\n        println(x.last)\n    }\n}\n```\n\n**输出**\n\n```\n\
    Range(3, 4, 5, 6, 7, 8, 9)\n3\n9\n```\n\n## 范围 - 执行的操作\n\n如果我们想要一个包含结束值的范围，也可以使用\
    \ `until` 方法，两种方法（**until 和 Range**）用于相同的目的。\n\n**示例**\n\n```scala\n// Scala 范围程序\n\
    \n// 创建对象\nobject GFG\n{\n    // 主方法\n    def main(args: Array[String])\n    {\n\
    \        // 应用 range 方法\n        val x = Range(0, 10, 2)\n\n        // 应用 until\
    \ 方法\n        val y = 0 until 10 by 2\n\n        // 如果两种方法等效则显示 true\n       \
    \ println(x == y)\n    }\n}\n```\n\n**输出：**\n\n```\nTrue\n```\n\n范围的“上界”可以设为包含。\n\
    \n**示例**\n\n```scala\n// Scala 范围程序\n\n// 创建对象\nobject GFG\n{\n    // 主方法\n  \
    \  def main(args: Array[String])\n    {\n        // 应用 range 方法\n        val x\
    \ = Range(1, 8)\n\n        // 包含上界\n        val y = x.inclusive\n\n        //\
    \ 显示范围的所有元素\n        println(y)\n    }\n}\n```\n\n**输出：**\n\n```\nRange(1, 2,\
    \ 3, 4, 5, 6, 7, 8)\n```\n\n这里使用 **inclusive** 来包含范围的上界。\n\n如果需要整数值范围，请使用 **to**\
    \ 方法（`to` 和 `inclusive` 范围是等效的）。\n\n**示例**\n\n```scala\n// Scala 范围程序\n\n// 创建对象\n\
    object GFG\n{\n    // 主方法\n    def main(args: Array[String])\n    {\n        //\
    \ 应用 range 方法\n        val x = Range(1, 8)\n\n        // 包含上界\n        val y =\
    \ x.inclusive\n\n        // 应用 'to' 方法\n        val z = 1 to 8\n\n        // 如果两种方法相等则显示\
    \ true\n        println(y == z)\n    }\n}\n```\n\n**输出：**\n\n```\nTrue\n```\n\n\
    ## Scala 决策\n\n### (if, if-else, 嵌套 if-else, if-else if)\n\n编程中的决策类似于现实生活中的决策。当满足给定条件时，决策中会执行一段代码。这些有时也被称为控制流语句。Scala\
    \ 使用控制语句根据特定条件控制程序的执行流程。它们用于根据程序状态的变化来推进和分支执行流程。\n\n**条件语句**\n\n- if\n- if-else\n\
    - 嵌套 if-else\n- if-else if 梯形结构\n\n### if 语句\n\n“if”语句是所有决策语句中最简单的决策语句。在此语句中，只有当给定条件为真时，代码块才会被执行；如果条件为假，则该代码块将不会被执行。\n\
    \n**语法：**\n\n```scala\nif(condition)\n{\n    // 要执行的代码\n}\n```\n\n**流程图**\n\n\
    ![](img/1e313a57da083d8618eb5d98d80bfa46_44_0.png)\n\n**示例**\n\n```scala\n// 说明\
    \ if 语句的 Scala 程序\nobject Test {\n    // 主方法\n    def main(args: Array[String])\
    \ {\n        // 取一个变量\n        var a: Int = 50\n\n        if (a > 30)\n      \
    \  {\n            // 此语句将执行，因为 a > 30\n            println(\"ScalaforGeeks\")\n\
    \        }\n    }\n}\n```\n\n**输出：**\n\n```\nScalaforGeeks\n```\n\n### if-else\
    \ 语句\n\n单独的 if 语句告诉我们，如果条件为真，它将执行一个语句块；如果条件为假，则不会执行。\n\n但是，如果我们想在条件错误时做些不同的事情呢？\n\
    \n这时就用到了 **else** 语句。\n\n当条件错误时，我们可以将 else 语句与 if 语句一起使用来执行一段代码。\n\n**语法：**\n\n\
    ```scala\nif (condition)\n{\n    // 如果条件为真则执行此块\n}\nelse\n{\n    // 如果条件为假则执行此块\n\
    }\n```\n\n**流程图**\n\n![](img/1e313a57da083d8618eb5d98d80bfa46_46_0.png)\n\n**示例**\n\
    \n```scala\n// 说明 if-else 语句的 Scala 程序\nobject Test {\n    // 主方法\n    def main(args:\
    \ Array[String]) {\n        // 取一个变量\n        var a: Int = 650\n\n        if (a\
    \ > 698)\n        {\n            // 此语句将不会执行，因为 a > 698 为假\n            println(\"\
    ScalaorGeeks\")\n        }\n        else\n        {\n            // 此语句将执行\n \
    \           println(\"Sudo Placement\")\n        }\n    }\n}\n```\n\n**输出**\n\n\
    ```\nSudo Placement\n```\n\n### 嵌套 if-else 语句\n\n嵌套 if 是一个 if 语句作为另一个 if-else\
    \ 语句的目标。\n\n嵌套 if-else 语句指的是在 if 语句或 else 语句内部的 if-else 语句。\n\nScala 允许我们将 if-else\
    \ 语句嵌套到 if-else 语句中。\n\n**语法：**\n\n```scala\n// 当 condition_1 为真时执行\nif (condition_1)\n\
    {\n    if (condition_2)\n    {\n        // 当 condition_2 为真时执行\n    }\n    else\n\
    \    {\n        // 当 condition_2 为假时执行\n    }\n}\n\n// 当 condition_1 为假时执行\nelse\n\
    {\n    if (condition_3)\n    {\n        // 当 condition_3 为真时执行\n    }\n    else\n\
    \    {\n        // 当 condition_3 为假时执行\n    }\n}\n```\n\n**流程图**\n\n![](img/1e313a57da083d8618eb5d98d80bfa46_49_0.png)\n\
    \n**示例**\n\n```scala\n// 说明嵌套 if-else 语句的 Scala 程序\nobject Test {\n    // 主方法\n\
    \    def main(args: Array[String]) {\n        // 取三个变量\n        var a: Int = 70\n\
    \        var b: Int = 40\n        var c: Int = 100\n\n        // condition_1\n\
    \        if (a > b)\n        {\n            // condition_2\n            if(a >\
    \ c)\n            {\n                println(\"a is largest\");\n            }\n\
    \            else\n            {\n                println(\"c is largest\")\n\
    \            }\n        }\n        else\n        {\n            // condition_3\n\
    \            if(b > c)\n            {\n                println(\"b is largest\"\
    )\n            }\n            else\n            {\n                println(\"\
    c is largest\")\n            }\n        }\n    }\n}\n```\n\n**输出：**\n\n```\nc\
    \ is largest\n```\n\n### if-else if 梯形结构\n\n这里用户可以在多个选项之间进行选择。if 声明从上到下执行。一旦控制\
    \ if 的条件之一为真；那么与该“if”关联的语句就会被执行，并跳过梯形结构的其余部分。如果没有任何条件为真，则最终的 other 声明将被执行。\n\n\
    **语法：**\n\n```scala\nif(condition_1)\n{\n    // 当 condition_1 为真时执行此块\n}\nelse\
    \ if(condition_2)\n{\n    // 当 condition_2 为真时执行此块\n}\nelse\n{\n    // 当没有条件为真时执行此块\n\
    }\n```\n\n**流程图**\n\n![](img/1e313a57da083d8618eb5d98d80bfa46_52_0.png)\n\n**示例**\n\
    \n```scala\n// 说明 if-else-if 梯形结构的 Scala 程序\nobject Test {\n    // 主方法\n    def\
    \ main(args: Array[String]) {\n        // 取一个变量\n        var value: Int = 50\n\
    \n        if (value == 20)\n        {\n            // 当上述条件为真时打印 \"value is 20\"\
    \n            println(\"Value is 20\")\n        }\n        else if (value == 25)\n\
    \        {\n            // 当上述条件为真时打印 \"value is 25\"\n            println(\"\
    Value is 25\")\n        }\n        else if (value == 40)\n        {\n        \
    \    // 当上述条件为真时打印 \"value is 40\"\n            println(\"Value is 40\")\n   \
    \     }\n        else\n        {\n            // 当所有条件为假时打印 \"No Match Found\"\
    \n            println(\"No Match Found\")\n        }\n    }\n}\n```\n\n**输出**\n\
    \n```\nNo Match Found\n```\n\n## SCALA 循环\n\n编程语言中的循环是一个特性，它便于在某个条件求值为真时重复执行一组指令/函数。\n\
    \n循环使程序员的任务更简单。\n\nScala 提供了各种循环类型来处理程序中基于条件的情况。\n\n在 Scala 中，循环有：\n\n- while\
    \ 循环\n- do..while 循环\n- for 循环\n- 嵌套循环\n\n### WHILE 循环\n\nwhile 循环通常在括号中接受一个条件。\n\
    \n如果条件为真，代码将在 while 循环的主体内执行。\n\n当我们不知道希望循环执行多少次但知道循环终止条件时，使用 while 循环。\n\n它也被称为由入口控制的循环，因为条件在循环执行之前被检查。\n\
    \nwhile 循环可以看作是 if 语句的重复。\n\n**语法：**\n\n```scala\nwhile (condition)\n```"
