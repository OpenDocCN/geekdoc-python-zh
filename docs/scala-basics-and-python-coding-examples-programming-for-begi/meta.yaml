    \    }\n}\n```\n\nIn above example\n\n- **GFG**: Class name\n- **a**: Variable\
    \ name\n- **Main**: Object name\n- **main**: Method name\n- **args**: Variable\
    \ name\n- **ob**: Object name\n\nIdentifiers are there\n\nThere are some rules\
    \ to define a valid Scala ID. These rules should be observed, otherwise a compile-time\
