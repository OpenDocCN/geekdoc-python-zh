    ## 输出\n\nstr1: Hello world, How are you?\n\nstr2: Hello world, How are you?\n\n\
    str3: Hello world, How are you?\n\nstr4: Hello world, How are you?\n\nstr5: Hello\
    \ world,\n\nHow are you?\n\n## 访问并打印字符串中的字符\n\n**示例：**\n\n输入：\nstr: \"Hello world\"\
    \n\n输出：\n第一个字符：H\n第二个字符：e\n最后一个字符：d\n倒数第二个字符：l\n从索引0到4的字符：Hello\n以此类推...\n\n##\
    \ 程序\n\n```python\n# 访问字符串中的字符\n\n# 声明、赋值字符串\nstr = \"Hello world\"\n\n# 打印完整字符串\n\
