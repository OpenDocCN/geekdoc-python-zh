  md: "# Scala - Scalable Launguage\n\nSome factors, ranging from syntax details to\
    \ component abstraction construct, effect the scalability of a language. The key\
    \ feature of scala making it flexible is that it is a mix of both object-oriented\
    \ programming as well as functional. This has strong support for all the programming\
    \ structures such as high-order functions, optimized tail-call, immutable properties,\
    \ matching patterns, polymorphism, abstraction, inheritance etc. Scala also includes\
    \ its own interpreter that can be used to directly execute instructions, without\
    \ previous compilation. Another main aspect is the parallel library of collections\
    \ intended to help developers address concurrent programming trends.\n\nAnother\
    \ function is as follows:\n\nScala is tight. It offers better support for backend\
    \ activities. Scala programs, similar to Java, tend to be short up to a factor\
    \ of 10. It stops code turning up over and over again to get any outcome that\
    \ would strain Java program\n\nExample: In Java, a class with constructor:\n\n\
    ```\nclass Geek\n{\n    // data members of the class.\n    String name;\n    int\
    \ id;\n    // contructor would initialized data members\n    // with the values\
    \ of passed arguments while\n    // object of that class created.\n    Geek(String\
    \ name, int id)\n```"
