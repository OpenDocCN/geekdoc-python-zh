    \ AMOUNT IN PYTHON](CALCULATE DISCOUNT BASED ON THE SALE AMOUNT IN PYTHON)\n\n\
    [DESIGN A SIMPLE CALCULATOR USING IF ELIF IN PYTHON](DESIGN A SIMPLE CALCULATOR\
    \ USING IF ELIF IN PYTHON)\n\n[BMI (BODY MASS INDEX) CALCULATOR IN PYTHON](BMI\
    \ (BODY MASS INDEX) CALCULATOR IN PYTHON)\n\n[WRITE FUNCTIONS TO FIND SQUARE AND\
    \ CUBE OF A GIVEN NUMBER IN PYTHON](WRITE FUNCTIONS TO FIND SQUARE AND CUBE OF\
    \ A GIVEN NUMBER IN PYTHON)\n\n[COMPUTE THE NET AMOUNT](COMPUTE THE NET AMOUNT)\n\
    \n[CONVERT TEMPERATURE IN PYTHON PROGRAM](CONVERT TEMPERATURE IN PYTHON PROGRAM)\n\
