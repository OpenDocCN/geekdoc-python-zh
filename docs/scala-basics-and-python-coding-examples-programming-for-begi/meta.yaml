    \nstr: Hello world\n\nstr[0]: H\n\nstr[1]: e\n\nstr[-1]: d\n\nstr[-2]: l\n\nstr[0:5]:\
    \ Hello\n\nstr[2,-2]: llo wor\n\nstr:\nHello world\n\n## 打印字符串中单词及其长度的程序\n\n##\
    \ 示例：\n\n输入：\nstr = \"Hello World How are you?\"\n\n输出：\nHello ( 5 )\nWorld (\
    \ 5 )\nHow ( 3 )\nare ( 3 )\nyou? ( 4 )\n\n## String.split() 方法\n\n要将字符串分割成单词，我们使用\
    \ `split()` 方法，这是一个内置方法，它根据给定的分隔符将字符串分割成子字符串（单词）。\n\n## split() 方法语法：\n\n```\n\
    String.split(delimiter)\n```\n\n## 解释\n\n例如，有一个字符串 `str = \"ABC PQR XYZ\"`，我们想使用空格作为分隔符将其分割成单词，那么这里的空格就是分隔符。语句将是\
    \ `str.split(\" \")` 来将字符串分割成单词，然后输出将是 \"ABC\" \"PQR\" \"XYZ\"。\n\n## 程序\n\n```python\n\
    # 分割成单词并打印单词及其长度的函数\n\ndef splitString (str):\n    # 按空格分割字符串\n    str = str.split\
