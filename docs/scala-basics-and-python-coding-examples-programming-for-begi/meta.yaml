    # SCALA LOOPS


    Looping into programming languages is a feature that facilitates repeatedly executing
    a set of instructions / functions while some condition evaluates to true.


    Loops make task simpler for the programmers.


    Scala provides the various loop types for dealing with the condition-based situation
    in the program.


    In Scala the loops are:


    +   - while Loop

    - do..while Loop

    - for Loop

    - Nested Loops


    # WHILE LOOP


    A while loop usually takes a condition in parenthesis.


    If the condition is True, the code will be executed within the while loop ''s
    body.


    A while loop is used when we don''t know how many times we want the loop to be
    executed but we do know the loop termination condition.


    It is also known as a loop controlled by entry, as the condition is checked before
    the loop is executed.


    The while loop can be considered a repeat in if statement.


    **Syntax:**


    ```

    while (condition)

    ```'
