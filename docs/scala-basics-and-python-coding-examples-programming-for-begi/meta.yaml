    \ IN PYTHON)\n\n[PYTHON PROGRAM TO CREATE MATRIX USING NUMPY](PYTHON PROGRAM TO\
    \ CREATE MATRIX USING NUMPY)\n\n[PYTHON DATE & TIME PROGRAMS](PYTHON DATE & TIME\
    \ PROGRAMS)\n\n[PYTHON CODE TO PRINT TODAY'S YEAR, MONTH AND DAY](PYTHON CODE\
    \ TO PRINT TODAY'S YEAR, MONTH AND DAY)\n\n# PYTHON LISTS\n\n- PROGRAM FOR ADDING,\
    \ REMOVING ELEMENTS IN THE LIST\n- PROGRAM TO FIND THE DIFFERENCES OF TWO LISTS\n\
    - PROGRAM TO REMOVE DUPLICATE ELEMENTS FROM THE LIST\n- CREATE THREE LISTS OF\
