    \ COMPOUND INTEREST)\n\n[检查给定年份是否为闰年的 PYTHON 程序](PYTHON PROGRAM TO CHECK THE GIVEN\
    \ YEAR IS A LEAP YEAR OR NOT)\n\n[PYTHON | 简单 IF ELSE 的一些示例](PYTHON | SOME OF\
    \ THE EXAMPLES OF SIMPLE IF ELSE)\n\n[根据销售金额在 PYTHON 中计算折扣](CALCULATE DISCOUNT\
