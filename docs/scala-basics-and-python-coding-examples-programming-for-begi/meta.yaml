    );\n        println(num_+);\n    }\n}\n```\n\n**Literal identification:** These\
    \ are identifiers in which an arbitrary string with back ticks ('...') is attached.\n\
    \n## EXAMPLE\n\n```scala\n// Scala program to demonstrate\n// Literal Identifiers\n\
    \nobject Main\n{\n    // Main method\n    def main(args: Array[String])\n    {\n\
