    \n## 示例\n\n```scala\n// Scala 程序演示\n// 字面量标识符\n\nobject Main\n{\n    // 主方法\n\
    \    def main(args: Array[String])\n    {\n        // `name` 和 `age` 是有效的字面量标识符\n\
