    \ + `name`);\n        println(\"Age:\" + `age`);\n    }\n}\n```\n\n## 输出：\n\n\
    Name: Siya\nAge: 20\n\n## Scala 中的数据类型\n\n数据类型是一种数据分类，它告诉编译器变量具有什么类型的值。例如，如果一个变量具有\
    \ int 数据类型，它就有一个数值。在 Scala 中，数据类型在长度和存储方面与 Java 类似。在 Scala 中，数据类型被视为相同的对象，因此数据类型的首字母是大写的。\n\
    \nScala 中可用的数据类型如下表所示：\n\n| 数据类型 | 默认值 | 描述 |\n| :--- | :--- | :--- |\n| **Boolean**\
    \ | False | 真或假 |\n| **Byte** | 0 | 8 位有符号值。范围：-128 到 127 |\n| **Short** | 0 |\
    \ 16 位有符号值。范围：-2<sup>15</sup> 到 2<sup>15</sup>-1 |\n| **Char** | ‘\\u000’ | 16\
    \ 位无符号 Unicode 字符。范围：0 到 2<sup>16</sup>-1 |\n| **Int** | 0 | 32 位有符号值。范围：-2<sup>31</sup>\
    \ 到 2<sup>31</sup>-1 |\n| **Long** | 0L | 64 位有符号值。范围：-2<sup>63</sup> 到 2<sup>63</sup>-1\
    \ |\n| **Float** | 0.0F | 32 位 IEEE 754 单精度浮点数 |\n| **Double** | 0.0D | 64 位 IEEE\
    \ 754 双精度浮点数 |\n| **String** | null | 字符序列 |\n| **Unit** | – | 对应于无值。 |\n| **Nothing**\
    \ | – | 它是所有其他类型的子类型，不包含任何值。 |\n| **Any** | – | 它是所有其他类型的超类型 |\n| **AnyVal** |\
    \ – | 它用作值类型。 |\n| **AnyRef** | – | 它用作引用类型。 |\n\n## 示例\n\n```scala\n// Scala\
    \ 程序说明数据类型\nobject Test\n{\n    def main(args: Array[String])\n    {\n       \
    \ var a: Boolean = true\n        var a1: Byte = 126\n        var a2: Float = 2.45673f\n\
    \        var a3: Int = 3\n        var a4: Short = 45\n        var a5: Double =\
    \ 2.93846523\n        var a6: Char = 'A'\n        if (a == true)\n        {\n\
    \            println(\"boolean:scalaforgeeks\")\n        }\n        println(\"\
    byte:\" + a1)\n        println(\"float:\" + a2)\n        println(\"integer:\"\
    \ + a3)\n        println(\"short:\" + a4)\n        println(\"double:\" + a5)\n\
    \        println(\"char:\" + a6)\n    }\n}\n```\n\n## 输出：\n\nboolean: scalaforgeeks\n\
    byte: 126\nfloat: 2.45673\ninteger: 3\nshort: 45\ndouble: 2.93846523\nchar: A\n\
    \n变量只是存储的位置。每个变量通过名称来标识，并存储一些已知和未知的信息，称为值。\n\n数据类型负责为变量分配内存，因此可以通过数据类型和名称来定义变量。\n\
    \nScala 中有两种类型的变量：\n\n- 可变变量\n- 不可变变量\n\n让我们详细了解每种变量。\n\n## 可变变量：\n\n这些变量允许我们在变量声明后更改其值。\n\
    \n使用 `var` 关键字定义可变变量。\n\n数据类型的首字母应大写，因为在 Scala 数据类型中它被视为对象。\n\n**语法：**\n\n```scala\n\
    var Variable_name: Data_type = \"value\";\n```\n\n**例如：**\n\n```scala\nvar name:\
    \ String = \"scalaforgeeks\";\n```\n\n## 不可变变量：\n\n这些变量不允许在变量声明后更改其值。\n\n不可变变量使用\
    \ `val` 关键字定义。\n首字母应大写，因为在 Scala 数据类型中它被视为对象。\n\n## 语法：\n\n```scala\nval Variable_name:\
    \ Data_type = \"value\";\n```\n\n## 例如：\n\n```scala\nval name: String = \"scalaforgeeks\"\
    ;\n```\n\n## Scala 中变量命名规则\n\n变量名可以包含字母、数字和两个特殊字符：下划线 (_) 和美元符号 ($)。\n变量名中不允许有空格。\n\
    变量名不得包含保留字或关键字。\n变量名必须以字母开头。\n\n## Scala 中变量的作用域\n\nScala 变量有三种作用域。\n\n- 字段。\n\
