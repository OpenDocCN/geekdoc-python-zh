  md: '# SCALA INTRODUCTION


    Scala is a programming language with a general purpose, high-level, multi-paradigm.
    It is a pure object-oriented programming language which also supports the approach
    to functional programming. There is no primitive data definition, since everything
    in Scala is object. Scala programs can convert to bytecodes, and they can run
    on JVM(Java Virtual Machine). Scala stands for Scalable language. It also provides
    runtimes for the Javascript. Java and some other programming languages like Lisp,
    Haskell, Pizza etc are highly influenced by Scala.


    # Scala Evolution:


    Martin Odersky, teacher of programming methods at the École Polytechnique Fédérale
    de Lausanne (EPFL) in Switzerland, and a German computer scientist, designed Scala.
    Martin Odersky is also the co-creator of the Funnel programming language for javac
    (Java Compiler), Universal Java and EPFL. He began designing the Scala back in
    2001. Scala was first released publicly as their first version on the Java platform
    in 2004. Scala was amended for the .Net Framework in June 2004. Later, second
    version, i.e. (v2.0) was followed in 2006. Scala was awarded as the winner of
    ScriptBowl contest at the 2012 JavaOne conference. As of June 2012, Scala has
    not supported the. Net Project. Scala''s new update is 2.12.6 which was announced
    on 27-Apr-2018.


    # WHY SCALA


    Simple to Start: Scala is a language of high level so it is similar to other common
    programming languages such as Java, C, C++. It therefore is very convenient for
    someone to learn Scala. Scala is easier for the Java programmers to understand.'
  merge: -1
  pgno: 8
- img_proc: true
  md: 'Incorporates the best features: Scala incorporates the features of numerous
    languages such as C, C++, Java etc. making it more functional, versatile and efficient.


    Closer integration with Java: The Scala''s source code is structured to allow
    its compiler to understand the Java classes. The compiler can also use modules,
    Java libraries, and tools and so on. The Scala programs can run on JVM after compilation.


    Web-Based & Desktop Application Development: Compiling to JavaScript provides
    support for web applications. Similarly it can be translated to JVM bytecode for
    desktop applications.


    Big Companies : Many of the big companies like Apple, Facebook, Amazon , Google
    etc. switch most of their codes from several other languages to Scala. It is very
    flexible, and can be used in backend operations


    As the Scala is syntactically almost close to other commonly used languages, codeing
    and learning in Scala is simpler. In Scala, programs can be written in any of
    the widely used text editors, such as Notepad++, gedit etc. or on any of the text
    editors. Save the file after writing the program with the .sc or.scala extension.


    For Windows & Linux: You must have Java Development Kit(JDK) 1.8 or greater installed
    on your system before installing the Scala on Windows or Linux. As Scala always
    runs on or above Java 1.8.


    We''ll discuss how to run the Scala programs on online IDE''s in this article.


    Example: Hello Geeks has a easy application to print! Using object-focused approach.'
