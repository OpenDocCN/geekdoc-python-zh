    Immutable variables are defined using the val keyword.

    The first letter should be in capital letter because it is treated as objects
    within the Scala data type.


    # Syntax:


    ```

    val Variable_name: Data_type = "value";

    ```


    # For Example:


    ```

    val name: String = "scalaforgeeks";

    ```


    # In Scala Rules for naming variable


    The name of the variable can include letter, digit, and two special characters
    Underscore (_) and Dollar($).

    White space in name variable is not allowed.

    The name of the variable must not contain the word reserved or the keyword.

    An alphabet should be the starting letter for the variable name.'
