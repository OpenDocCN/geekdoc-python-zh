    Variables are simply the location for the storage. Each variable is known by name,
    and some known and unknown piece of information known as value is stored.


    A data type is responsible for allocating memory to the variable, so one can define
    a variable by its data type and name.


    There are two types of variable within Scala:


    +   - Mutable Variables

    - Immutable Variables


    Let''s get detailed understanding of each of these variables.


    # Mutable Variable:


    These variables are those variables that allow us to change a value after a variable
    is declared.


    The var keyword is used to define mutable variables.


    The first letter of type of data should be in capital letter because it is treated
    as objects in the Scala data type.


    **Syntax:**


    ```

    var Variable_name: Data_type = "value";

    ```


    **For Example:**


    ```

    var name: String = "scalaforgeeks";

    ```


    # Immutable Variable:


    These variables are the variables that do not allow you to change a value after
    a variable has been declared.'
