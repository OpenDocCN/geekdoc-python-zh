    \ LIST AFTER REMOVING EVEN NUMBERS\n\n# PYTHON STRING PROGRAMS\n\n- DECLARE, ASSIGN\
    \ AND PRINT THE STRING (DIFFERENT WAYS)\n- ACCESS AND PRINT CHARACTERS FROM THE\
    \ STRING\n- PROGRAM TO PRINT WORDS WITH THEIR LENGTH OF A STRING\n- COUNT VOWELS\
    \ IN A STRING\n- CREATE MULTIPLE COPIES OF A STRING BY USING MULTIPLICATION OPERATOR\n\
    \n# OUR OTHER PUBLISHING\n\n# PYTHON AND HADOOP BASICS\n\n# PYTHON BASICS AND\
    \ PYTHON CODING EXAMPLES\n\n# C# AND C++ CODING EXAMPLES\n\n# PYTHON CODING AND\
    \ C PROGRAMMING EXAMPLES\n\n# C++ AND JAVA CODING EXAMPLES\n\n# ANDROID BASICS\
    \ AND PYTHON CODING EXAMPLES\n\n- C# BASICS AND PYTHON CODING EXAMPLES\n- ANGULAR\
    \ AND PYTHON BASICS\n- PYTHON BASICS AND SCALA CODING EXAMPLES\n- JAVA BASICS\
    \ AND PYTHON CODING EXAMPLES\n- PYTHON BASICS AND C# CODING EXAMPLES\n- ANDROID\
    \ BASICS AND JAVA CODING EXAMPLES\n- C# BASICS AND C# CODING EXAMPLES\n- JAVASCRIPT\
    \ AND HTML BASICS\n- HTML AND JAVASCRIPT CODING EXAMPLES\n\n# SCALA BASICS\n\n\
    PROGRAMMING FOR BEGINNERS\n\nJ KING\n\n# SCALA INTRODUCTION\n\nScala is a programming\
    \ language with a general purpose, high-level, multi-paradigm. It is a pure object-oriented\
    \ programming language which also supports the approach to functional programming.\
    \ There is no primitive data definition, since everything in Scala is object.\
    \ Scala programs can convert to bytecodes, and they can run on JVM(Java Virtual\
    \ Machine). Scala stands for Scalable language. It also provides runtimes for\
    \ the Javascript. Java and some other programming languages like Lisp, Haskell,\
    \ Pizza etc are highly influenced by Scala.\n\n# Scala Evolution:\n\nMartin Odersky,\
    \ teacher of programming methods at the École Polytechnique Fédérale de Lausanne\
    \ (EPFL) in Switzerland, and a German computer scientist, designed Scala. Martin\
    \ Odersky is also the co-creator of the Funnel programming language for javac\
    \ (Java Compiler), Universal Java and EPFL. He began designing the Scala back\
    \ in 2001. Scala was first released publicly as their first version on the Java\
    \ platform in 2004. Scala was amended for the .Net Framework in June 2004. Later,\
    \ second version, i.e. (v2.0) was followed in 2006. Scala was awarded as the winner\
    \ of ScriptBowl contest at the 2012 JavaOne conference. As of June 2012, Scala\
    \ has not supported the .Net Project. Scala's new update is 2.12.6 which was announced\
    \ on 27-Apr-2018.\n\n# WHY SCALA\n\nSimple to Start: Scala is a language of high\
    \ level so it is similar to other common programming languages such as Java, C,\
    \ C++. It therefore is very convenient for someone to learn Scala. Scala is easier\
    \ for the Java programmers to understand.\n\nIncorporates the best features: Scala\
    \ incorporates the features of numerous languages such as C, C++, Java etc. making\
    \ it more functional, versatile and efficient.\n\nCloser integration with Java:\
    \ The Scala's source code is structured to allow its compiler to understand the\
    \ Java classes. The compiler can also use modules, Java libraries, and tools and\
    \ so on. The Scala programs can run on JVM after compilation.\n\nWeb-Based & Desktop\
    \ Application Development: Compiling to JavaScript provides support for web applications.\
    \ Similarly it can be translated to JVM bytecode for desktop applications.\n\n\
    Big Companies: Many of the big companies like Apple, Facebook, Amazon, Google\
    \ etc. switch most of their codes from several other languages to Scala. It is\
    \ very flexible, and can be used in backend operations.\n\nAs the Scala is syntactically\
    \ almost close to other commonly used languages, coding and learning in Scala\
    \ is simpler. In Scala, programs can be written in any of the widely used text\
    \ editors, such as Notepad++, gedit etc. or on any of the text editors. Save the\
    \ file after writing the program with the .sc or .scala extension.\n\nFor Windows\
    \ & Linux: You must have Java Development Kit(JDK) 1.8 or greater installed on\
    \ your system before installing the Scala on Windows or Linux. As Scala always\
    \ runs on or above Java 1.8.\n\nWe'll discuss how to run the Scala programs on\
    \ online IDE's in this article.\n\nExample: Hello Geeks has a easy application\
    \ to print! Using object-focused approach.\n\n```scala\n// Scala program to print\
    \ Hello, Geeks!\n// by using object-oriented approach\n\n// creating object\n\
    object Geeks {\n\n    // Main method\n    def main(args: Array[String])\n    {\n\
    \        // prints Hello, Geeks!\n        println(\"Hello, Geeks!\")\n    }\n\
    }\n```\n\n# Output:\n\nHello, Geeks!\n\n# Scala - Scalable Language\n\nSome factors,\
    \ ranging from syntax details to component abstraction construct, effect the scalability\
    \ of a language. The key feature of scala making it flexible is that it is a mix\
    \ of both object-oriented programming as well as functional. This has strong support\
    \ for all the programming structures such as high-order functions, optimized tail-call,\
    \ immutable properties, matching patterns, polymorphism, abstraction, inheritance\
    \ etc. Scala also includes its own interpreter that can be used to directly execute\
    \ instructions, without previous compilation. Another main aspect is the parallel\
    \ library of collections intended to help developers address concurrent programming\
    \ trends.\n\nAnother function is as follows:\n\nScala is tight. It offers better\
    \ support for backend activities. Scala programs, similar to Java, tend to be\
    \ short up to a factor of 10. It stops code turning up over and over again to\
    \ get any outcome that would strain Java program.\n\nExample: In Java, a class\
    \ with constructor:\n\n```java\nclass Geek\n{\n    // data members of the class.\n\
    \    String name;\n    int id;\n    // constructor would initialized data members\n\
    \    // with the values of passed arguments while\n    // object of that class\
    \ created.\n    Geek(String name, int id)\n```"
