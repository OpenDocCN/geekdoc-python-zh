  - "[PAGE 76]\n\n# CHAPTER SIX\nCONTROL FLOW\n\n# 6.1 Basics\n\nFor a given file\
    \ with a python program, the python interpreter will start at the top and then\
    \ process the file. We demonstrate this with a simple program, for example:\n\n\
    ```\ndef f(x):\n    \"\"\"function that computes and returns x*x\"\"\"\n    return\
    \ x * x\n\nprint(\"Main program starts here\")\nprint(\"4 * 4 = %s\" % f(4))\n\
    print(\"In last line of program -- bye\")\n```\n\n```\nMain program starts here\n\
    4 * 4 = 16\nIn last line of program -- bye\n```\n\nThe basic rule is that commands\
    \ in a file (or function or any sequence of commands) is processed from top to\
    \ bottom. If several commands are given in the same line (separated by ; ), then\
    \ these are processed from left to right (although it is discouraged to have multiple\
    \ statements per line to maintain good readability of the code.)\n\nIn this example,\
    \ the interpreter starts at the top (line 1). It finds the def keyword and remembers\
    \ for the future that the function f is defined here. (It will not yet execute\
    \ the function body, i.e. line 3 – this only happens when we call the function.)\
    \ The interpreter can see from the indentation where the body of the function\
    \ stops: the indentation in line 5 is different from that of the first line in\
    \ the function body (line2), and thus the function body has ended, and execution\
    \ should carry on with that line. (Empty lines do not matter for this analysis.)\n\
    \nIn line 5 the interpreter will print the output Main program starts here. Then\
    \ line 6 is executed. This contains the expression f (4) which will call the function\
    \ f (x) which is defined in line 1 where x will take the value 4. [Actually x\
    \ is a reference to the object 4.] The function f is then executed and computes\
    \ and returns 4 * 4 in line 3. This value 16 is used in line 6 to replace f (4)\
    \ and then the string representation %s of the object 16 is printed as part of\
    \ the print command in line 6.\n\nThe interpreter then moves on to line 7 before\
    \ the program ends.\n\nWe will now learn about different possibilities to direct\
    \ this control flow further."
- md: "## 6.1.1 Conditionals\n\nThe python values `True` and `False` are special inbuilt\
    \ objects:\n\n```python\na = True\nprint(a)\n```\n\n```\nTrue\n```\n\n```python\n\
    type(a)\n```\n\n```\nbool\n```\n\n```python\nb = False\nprint(b)\n```\n\n```\n\
    False\n```\n\n```python\ntype(b)\n```\n\n```\nbool\n```\n\nWe can operate with\
    \ these two logical values using boolean logic, for example the logical and operation\
    \ (`and`):\n\n```python\nTrue and True  #logical and operation\n```\n\n```\nTrue\n\
    ```\n\n```python\nTrue and False\n```\n\n```\nFalse\n```\n\n```python\nFalse and\
    \ True\n```\n\n```\nFalse\n```\n\n```python\nTrue and True\n```\n\n```\nTrue\n\
    ```\n\n```python\nc = a and b\nprint(c)\n```\n\n```\nFalse\n```\n\nThere is also\
    \ logical or (`or`) and the negation (`not`):\n\n```python\nTrue or False\n```\n\
    \n```\nTrue\n```\n\n```python\nnot True\n```\n\n```\nFalse\n```\n\n```python\n\
    not False\n```\n\n```\nTrue\n```\n\n```python\nTrue and not False\n```\n\n```\n\
    True\n```\n\nIn computer code, we often need to evaluate some expression that\
    \ is either true or false (sometimes called a “predicate”). For example:\n\n```python\n\
    x = 30          # assign 30 to x\nx > 15          # is x greater than 15\n```\n\
    \n```\nTrue\n```\n\n```python\nx > 42\n```\n\n```\nFalse\n```\n\n```python\nx\
    \ == 30        # is x the same as 30?\n```\n\n```\nTrue\n```\n\n```python\nx ==\
    \ 42\n```\n\n```\nFalse\n```\n\n```python\nnot x == 42    # is x not the same\
    \ as 42?\n```\n\n```\nTrue\n```\n\n```python\nx != 42        # is x not the same\
    \ as 42?\n```\n\n```\nTrue\n```\n\n```python\nx > 30 # is x greater than 30?\n\
    ```\n\n```\nFalse\n```\n\n```python\nx >= 30 # is x greater than or equal to 30?\n\
    ```\n\n```\nTrue\n```\n\n## 6.2 If-then-else\n\n**Further information**\n\n- Introduction\
    \ to If-then in Python tutorial, section 4.1\n\nThe `if` statement allows conditional\
    \ execution of code, for example:\n\n```python\na = 34\nif a > 0:\n    print(\"\
    a is positive\")\n```\n\n```\na is positive\n```\n\nThe if-statement can also\
    \ have an `else` branch which is executed if the condition is wrong:\n\n```python\n\
    a = 34\nif a > 0:\n    print(\"a is positive\")\nelse:\n    print(\"a is non-positive\
    \ (i.e. negative or zero)\")\n```\n\n```\na is positive\n```\n\nFinally, there\
    \ is the `elif` (read as “else if”) keyword that allows checking for several (exclusive)\
    \ possibilities:\n\n```python\na = 17\nif a == 0:\n    print(\"a is zero\")\n\
    elif a < 0:\n    print(\"a is negative\")\nelse:\n    print(\"a is positive\"\
    )\n```\n\n```\na is positive\n```\n\n## 6.3 For loop\n\n**Further information**\n\
    \n- Introduction to for-loops in [Python tutorial, section 4.2](https://docs.python.org/3/tutorial/controlflow.html#for-statements)\n\
    \nThe `for`-loop allows to iterate over a sequence (this could be a string or\
    \ a list, for example). Here is an example:\n\n```python\nfor animal in ['dog','cat','mouse']:\n\
    \    print(animal, animal.upper())\n```\n\n```\ndog DOG\ncat CAT\nmouse MOUSE\n\
    ```\n\nTogether with the `range()` command (03 Data Types Structures, The Range\
    \ Command), one can iterate over increasing integers:\n\n```python\nfor i in range(5,10):\n\
    \    print(i)\n```\n\n```\n5\n6\n7\n8\n9\n```\n\n## 6.4 While loop\n\nThe `while`\
    \ keyword allows to repeat an operation while a condition is true. Suppose we'd\
    \ like to know for how many years we have to keep 100 pounds on a savings account\
    \ to reach 200 pounds simply due to annual payment of interest at a rate of 5%.\
    \ Here is a program to compute that this will take 15 years:\n\n```python\nmymoney\
    \ = 100        # in GBP\nrate = 1.05          # 5% interest\nyears = 0\nwhile\
    \ mymoney < 200:  # repeat until 20 pounds reached\n    mymoney = mymoney * rate\n\
    \    years = years + 1\nprint('We need', years, 'years to reach', mymoney, 'pounds.')\n\
    ```\n\n```\nWe need 15 years to reach 207.89281794113688 pounds.\n```\n\n## 6.5\
    \ Relational operators (comparisons) in if and while statements\n\nThe general\
    \ form of if statements and while loops is the same: following the keyword if\
    \ or while, there is a condition followed by a colon. In the next line, a new\
    \ (and thus indented!) block of commands starts that is executed if the condition\
    \ is True).\n\nFor example, the condition could be equality of two variables a1\
    \ and a2 which is expressed as a1==a2:\n\n```python\na1 = 42\na2 = 42\nif a1 ==\
    \ a2:\n    print(\"a1 and a2 are the same\")\n```\n\n```\na1 and a2 are the same\n\
    ```\n\nAnother example is to test whether a1 and a2 are not the same. For this,\
    \ we have two possibilities. Option number 1 uses the inequality operator !=:\n\
    \n```python\nif a1 != a2:\n    print(\"a1 and a2 are different\")\n```\n\nOption\
    \ two uses the keyword not in front of the condition:\n\n```python\nif not a1\
    \ == a2:\n    print(\"a1 and a2 are different\")\n```\n\nComparisons for “greater”\
    \ (>), “smaller” (<) and “greater equal” (>=) and “smaller equal” (<=) are straightforward.\n\
    \nFinally, we can use the logical operators “and” and “or” to combine conditions:\n\
    \n```python\nif a > 10 and b > 20:\n    print(\"A is greater than 10 and b is\
    \ greater than 20\")\nif a > 10 or b < -5:\n    print(\"Either a is greater than\
    \ 10, or \"\n          \"b is smaller than -5, or both.\")\n```\n\n```\nEither\
    \ a is greater than 10, or b is smaller than -5, or both.\n```\n\nUse the Python\
    \ prompt to experiment with these comparisons and logical expressions. For example:\n\
    \n```python\nT = -12.5\nif T < -20:\n    print(\"very cold\")\n\nif T < -10:\n\
    \    print(\"quite cold\")\n```\n\n```\nquite cold\n```\n\n```python\nT < -20\n\
    ```\n\n```\nFalse\n```\n\n```python\nT < -10\n```\n\n```\nTrue\n```\n\n## 6.6\
    \ Exceptions\n\nEven if a statement or expression is syntactically correct, it\
    \ may cause an error when an attempt is made to execute it. Errors detected during\
    \ execution are called *exceptions* and are not necessarily fatal: exceptions\
    \ can be *caught* and dealt with within the program. Most exceptions are not handled\
    \ by programs, however, and result in error messages as shown here\n\n```python\n\
    # NBVAL_RAISES_EXCEPTION\n10 * (1/0)\n```\n\n```\n---------------------------------------------------------------------------\n\
    ZeroDivisionError                         Traceback (most recent call last)\n\
    /tmp/ipykernel_73/3466746811.py in <module>\n      1 # NBVAL_RAISES_EXCEPTION\n\
    ----> 2 10 * (1/0)\n\nZeroDivisionError: division by zero\n```\n\n```python\n\
    # NBVAL_RAISES_EXCEPTION\n4 + spam*3\n```\n\n```\n---------------------------------------------------------------------------\n\
    NameError                                 Traceback (most recent call last)\n\
    /tmp/ipykernel_73/3977565327.py in <module>\n      1 # NBVAL_RAISES_EXCEPTION\n\
    ----> 2 4 + spam*3\n\nNameError: name 'spam' is not defined\n```\n\n```python\n\
    # NBVAL_SKIP\n'2' + 2\n```\n\n```\n---------------------------------------------------------------------------\n\
    TypeError                                 Traceback (most recent call last)\n\
    /tmp/ipykernel_73/3353840809.py in <module>\n      1 # NBVAL_SKIP\n----> 2 '2'\
    \ + 2\n\nTypeError: can only concatenate str (not \"int\") to str\n```\n\nSchematic\
    \ exception catching with all options\n\n```python\ntry:\n    # code body\n  \
    \  pass\nexcept ArithmeticError:\n    # what to do if arithmetic error\n    pass\n\
    except IndexError as the_exception:\n    # the_exception refers to the exception\
    \ in this block\n    pass\nexcept:\n    # what to do for ANY other exception\n\
    \    pass\nelse:  # optional\n    # what to do if no exception raised\n    pass\n\
    \ntry:\n    # code body\n    pass\nfinally:\n    # what to do ALWAYS\n    pass\n\
    ```\n\nStarting with Python 2.5, you can use the `with` statement to simplify\
    \ the writing of code for some predefined functions, in particular the `open`\
    \ function to open files: see https://docs.python.org/3/tutorial/errors.html#predefined-clean-up-actions.\n\
    \nExample: We try to open a file that does not exist, and Python will raise an\
    \ exception of type `FileNotFoundError` because the file cannot be found:\n\n\
    ```python\n# NBVAL_RAISES_EXCEPTION\nf = open(\"filenamethatdoesnotexist\", \"\
    r\")\n```\n\n```\n---------------------------------------------------------------------------\n\
    FileNotFoundError                           Traceback (most recent call last)\n\
    /tmp/ipykernel_73/3396786275.py in <module>\n      1 # NBVAL_RAISES_EXCEPTION\n\
    ----> 2 f = open(\"filenamethatdoesnotexist\", \"r\")\n\nFileNotFoundError: [Errno\
    \ 2] No such file or directory: 'filenamethatdoesnotexist'\n```\n\nIf we were\
    \ writing an application with a userinterface where the user has to type or select\
    \ a filename, we would not want the application to stop if the file does not exist.\
    \ Instead, we need to catch this exception and act accordingly (for example by\
    \ informing the user that a file with this filename does not exist and ask whether\
    \ they want to try another file name). Here is the skeleton for catching this\
    \ exception:\n\n```python\ntry:\n    f = open(\"filenamethatdoesnotexist\",\"\
    r\")\nexcept FileNotFoundError:\n    print(\"Could not open that file\")\n```\n\
    \n```\nCould not open that file\n```\n\nThere is a lot more to be said about exceptions\
    \ and their use in larger programs. Start reading Python Tutorial Chapter 8:"
