    # CHAPTER NINETEEN


    # WHERE TO GO FROM HERE?


    Learning a programming language is the first step towards becoming a computationalists
    who advances science and engineering through computational modelling and simulation.

    We list some additional skills that can be very beneficial for day-to-day computational
    science work, but is of course not exhaustive.


    # 19.1 Advanced programming


    This text has put emphasis on providing a robust foundation in terms of programming,
    covering control flow, data structures and elements from function and procedural
    programming. We have not touch Object Orientation in great detail, nor have we
    discussed some of Python''s more advanced features such as iterators, and decorators,
    for example.


    # 19.2 Compiled programming language


    When performance starts to be the highest priority, we may need to use compiled
    code, and likely embed this in a Python code to carry out the computational that
    are the performance bottle neck.

    Fortran, C and C++ are sensible choices here; maybe Julia in the near future.

    We also need to learn how to integrate the compiled code with Python using tools
    such as Cython, Boost, Ctypes and Swig.


    # 19.3 Testing


    Good coding is supported by a range of unit and system tests that can be run routinely
    to check that the code works correctly. Tools such as doctest, nose and pytest
    are invaluable, and we should learn at least how to use pytest (or nose).'
