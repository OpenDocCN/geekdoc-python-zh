    # 15.5 Visualising higher dimensional data (VTK)


    Often, we need to understand data defined at 3d positions in space. The data itself
    is often a scalar field (such as temperature) or a 3d vector (such as velocity
    or magnetic field), or occasionally a tensor. For example for a 3d-vector field
    $f$ defined in 3d-space ($\vec{f}(\vec{x})$ where $\vec{x} \in \mathbb{R}^3$ and
    $\vec{f}(\vec{x}) \in \mathbb{R}^3$) we could draw a 3d-arrow at every (grid)
    point in space. It is common for these data sets to be time dependent.


    The probably most commonly used library in Science and Engineering to visualise
    such data sets is probably VTK, the Visualisation ToolKit (https://vtk.org). This
    is a substantial C++ library with interfaces to high level languages, including
    Python.


    One can either call these routines directly from Python code, or write the data
    to disk in a format that the VTK library can read (so called vtk data files),
    and then use stand-alone programme such as Mayavi, ParaView and VisIt to read
    these data files and manipulate them (often with a GUI). All three of these are
    using the VTK library internally, and can read vtk data files.


    These package is very well suited to visualise static and timedependent 2d and
    3d-fields (scalar, vector and tensor fields). Two examples are shown below.


    They can be used as a stand-alone executables with a GUI to visualise VTK files.
    It can also be scripted from a Python program, or used interactively from a Python
    session.'
