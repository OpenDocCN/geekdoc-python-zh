    # 5.1.2 Formatted printing


    The more sophisticated way of formatting output uses a syntax very similar to
    Matlab''s `fprintf` (and therefor also similar to C''s `printf`).

    The overall structure is that there is a string containing format specifiers,
    followed by a percentage sign and a tuple that contains the variables to be printed
    in place of the format specifiers.


    ```

    print("a = %d b = %d" % (10,20))

    ```


    ```

    a = 10 b = 20

    ```


    A string can contain format identifiers (such as `%f` to format as a float, `%d`
    to format as an integer, and `%s` to format as a string):


    ```

    from math import pi

    print("Pi = %5.2f" % pi)

    ```


    ```

    Pi =  3.14

    ```


    ```

    print("Pi = %10.3f" % pi)

    ```


    ```

    Pi =      3.142

    ```


    ```

    print("Pi = %10.8f" % pi)

    ```


    ```

    Pi = 3.14159265

    ```


    ```

    print("Pi = %d" % pi)

    ```


    ```

    Pi = 3

    ```'
