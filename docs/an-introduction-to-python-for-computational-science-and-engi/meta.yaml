    Why are we calling `list(range())`?

    In Python 3, `range()` generates the numbers on demand. When you use `range()`
    in a for loop, this is more efficient, because it doesn''t take up memory with
    a list of numbers. Passing it to `list()` forces it to generate all of its numbers,
    so we can see what it does.

    To get the same efficient behaviour in Python 2, use `xrange()` instead of `range()`.


