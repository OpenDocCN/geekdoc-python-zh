    ```\n\n```\nhome = /Users/fangohr/anaconda3/bin\ninclude-system-site-packages\
    \ = false\nversion = 3.9.7\n```\n\n出于兴趣，我们可以检查该子目录的总磁盘使用情况：\n\n```\n!du -hs myvirtualenv/\n\
    ```\n\n```\n15M        myvirtualenv/\n```\n\n要使用这个虚拟环境，我们需要激活它：\n\n### 18.2.2\
    \ 激活虚拟环境\n\n要激活虚拟环境，我们需要知道它安装在哪个文件夹中（在我们的例子中是 `myvirtualenv`）。在 Linux 和 OSX 上，我们运行以下\
    \ shell 命令：\n\n```\n!source myvirtualenv/bin/activate\n```\n\n这会更改 `PATH` 变量，操作系统使用该变量来搜索\
    \ `python` 可执行文件：它将包含我们虚拟环境中 Python 解释器的目录放在 PATH 变量的开头。我们可以通过再次使用 `which` 命令来检查这是否有效：\n\
    \n```\n!source myvirtualenv/bin/activate && which python\n```\n\n```\n/Users/fangohr/git/introduction-to-python-for-computational-science-and-engineering/book/myvirtualenv/bin/python\n\
    ```\n\n（如引言所述，重复 `activate` 命令只是因为我们在这里使用 Notebook：如果你在 shell 中执行这些步骤，可以忽略这一点，直接写\
    \ `which python`。）\n\n### 18.2.3 使用虚拟环境\n\n一旦我们激活了虚拟环境，我们就可以像使用系统提供的默认 Python\
    \ 环境一样使用它。\n\n例如，安装一些 Python 包。\n\n### 18.2.4 虚拟环境的名称\n\n我们使用了 `myvirtualenv`\
    \ 作为虚拟环境的名称。通常，名称可以自由选择。常用的名称包括 `env` 或 `venv`。有时，环境会安装在隐藏的子目录中（例如 `.env` 或 `.venv`）。\n\
    \n我们没有使用 `venv` 这个名称，是为了避免与 `venv` 模块混淆。\n\n### 18.3 Python 包索引（PyPI）\n\nPython\
