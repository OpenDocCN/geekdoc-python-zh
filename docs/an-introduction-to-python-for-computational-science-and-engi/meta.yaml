    \ numbers, we have to *rescale* our equations so that (ideally) all numbers are\
    \ of order unity. Rescaling our equations so that all relevant numbers are approximately\
    \ 1 is also useful in debugging our code: if numbers much greater or smaller than\
    \ 1 appear, this may be an indication of an error.\n\n# 13.1.2 Using floating\
    \ point numbers (carelessly)\n\nWe know already that we need to take care that\
    \ our floating point values do not exceed the range of floating point numbers\
    \ that can be represented in the computer.\n\nThere is another complication due\
    \ to the way floating point numbers have to be represented internally: not all\
    \ floating point numbers can be represented exactly in the computer. The number\
    \ 1.0 can be represented exactly but the numbers 0.1, 0.2 and 0.3 cannot:\n\n\
    ```\n'%.20f' % 1.0\n\n'1.00000000000000000000'\n\n'%.20f' % 0.1\n\n'0.10000000000000000555'\n\
    \n'%.20f' % 0.2\n\n'0.20000000000000001110'\n\n'%.20f' % 0.3\n\n'0.29999999999999998890'\n\
    ```\n\nInstead, the floating point number “nearest” to the real number is chosen.\n\
    \nThis can cause problems. Suppose we need a loop where x takes values 0.1, 0.2,\
    \ 0.3, ..., 0.9, 1.0. We might be tempted to write something like this:\n\n```\n\
