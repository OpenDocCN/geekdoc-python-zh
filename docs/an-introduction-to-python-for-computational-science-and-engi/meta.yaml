  md: "# 9.2 Sorting\n\nSuppose we need to sort a list of 2-tuples of user-ids and\
    \ names, i.e.\n\n```\nmylist = [(\"fangohr\", \"Hans Fangohr\",),\n          (\"\
    admin\", \"The Administrator\"),\n          (\"guest\", \"The Guest\")]\n```\n\
    \nwhich we want to sort in increasing order of user-ids. If there are two or more\
    \ identical user-ids, they should be ordered by the order of the names associated\
    \ with these user-ids. This behaviour is just the default behaviour of sort (which\
    \ goes back to how to sequences are compared).\n\n```\nstuff = mylist # collect\
    \ your data\nstuff.sort()   # sort the data in place\nprint(stuff)   # inspect\
    \ the sorted data\n```\n\n```\n[('admin', 'The Administrator'), ('fangohr', 'Hans\
    \ Fangohr'), ('guest', 'The Guest')]\n```\n\nSequences are compared by initially\
    \ comparing the first elements only. If they differ, then a decision is reached\
    \ on the basis of those elements only. If the elements are equal, only then are\
    \ the next elements in the sequence compared ... and so on, until a difference\
    \ is found, or we run out of elements. For example:\n\n```\n(2,0) > (1,0)\n```\n\
    \n```\nTrue\n```\n\n```\n(2,1) > (1,3)\n```\n\n```\nTrue\n```\n\n```\n(2,1) >\
    \ (2,1)\n```\n\n```\nFalse\n```\n\n```\n(2,2) > (2,1)\n```\n\n```\nTrue\n```\n\
    \nIt is also possible to do:\n\n```\nstuff = sorted(stuff)\n```\n\nWhere the list\
    \ is not particularly large, it is generally advisable to use the `sorted` function\
    \ (which *returns a sorted copy* of the list) over the `sort` method of a list\
    \ (which changes the list into sorted order of elements, and returns None).\n\n\
    However, what if the data we have is stored such that in each tuple in the list,\
    \ the name comes first, followed by the id, i.e.:"
