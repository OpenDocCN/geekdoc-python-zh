    \ python3 是通过 brew 安装的，那么在 `/usr/local/bin/python3` 有一个 python 可执行文件。要强制使用此解释器创建虚拟环境，我们可以使用\n\
    \n```\n/usr/local/bin/python3 -m venv myvirtualenv\n```\n\n没有必要知道这个文件夹内部发生了什么，但出于好奇，我们还是会非常简要地看一下：\n\
