- md: "## Introduction to Python for Computational Science and Engineering\n\nThe\
    \ content of this book is distributed into chapters, using one Jupyter Notebook\
    \ for each chapter.\n\nYou can read the book in different formats: html, pdf,\
    \ or you can use the myBinder environment, in which you can read the text and\
    \ execute the examples in a browser (without having to install Python locally)\
    \ using one Jupyter notebook per chapter, as mentioned above.\n\nIf you have not\
    \ used the Jupyter Notebook before, please read the section “First steps with\
    \ Jupyter Notebook” below before you proceed.\n\n### First steps with Jupyter\
    \ Notebook\n\n1.  **Navigating the notebook**\n    When you open a notebook, you\
    \ will find that you can move a highlighted block (with a blue line at the left)\
    \ with the cursor keys to move up and down. This block highlights a cell. (You\
    \ can also use the mouse to select a cell.) This is called the Command mode.\n\
