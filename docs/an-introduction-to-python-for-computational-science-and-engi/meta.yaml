    ## CHAPTER NINETEEN


    ## WHERE TO GO FROM HERE?


    Learning a programming language is the first step towards becoming a computationalist
    who advances science and engineering through computational modelling and simulation.

    We list some additional skills that can be very beneficial for day-to-day computational
    science work, but is of course not exhaustive.


    ### 19.1 Advanced programming


    This text has put emphasis on providing a robust foundation in terms of programming,
    covering control flow, data structures and elements from function and procedural
    programming. We have not touched Object Orientation in great detail, nor have
    we discussed some of Python''s more advanced features such as iterators, and decorators,
    for example.


    ### 19.2 Compiled programming language


    When performance starts to be the highest priority, we may need to use compiled
    code, and likely embed this in a Python code to carry out the computations that
    are the performance bottleneck.

    Fortran, C and C++ are sensible choices here; maybe Julia in the near future.

    We also need to learn how to integrate the compiled code with Python using tools
    such as Cython, Boost, Ctypes and Swig.


    ### 19.3 Testing


    Good coding is supported by a range of unit and system tests that can be run routinely
    to check that the code works correctly. Tools such as doctest, nose and pytest
    are invaluable, and we should learn at least how to use pytest (or nose).


    ### 19.4 Simulation models


    A number of standard simulation tools such as Monte Carlo, Molecular Dynamics,
    lattice based models, agents, finite difference and finite element models are
    commonly used to solve particular simulation challenges – it is useful to have
    at least a broad overview of these.


    ### 19.5 Software engineering for research codes


    Research codes bring particular challenges: the requirements may change during
    the run time of the project, we need great flexibility yet reproducibility. A
    number of techniques are available to support this effectively.


    ### 19.6 Data and visualisation


    Dealing with large amounts of data, processing and visualising it can be a challenge.
    Fundamental knowledge of database design, 3d visualisation and modern data processing
    tools such as the Pandas Python package help with this.


    ### 19.7 Version control


    Using a version control tool, such as git or mercurial, should be a standard approach
    and improves code writing effectiveness significantly, helps with working in teams,
    and - maybe most importantly - supports reproducibility of computational results.


    ### 19.8 Parallel execution


    Parallel execution of code is a way to make it run orders of magnitude faster.
    This could be using MPI for inter-node communication or OpenMP for intra-node
    parallelisation or a hybrid mode bringing both together.

    The recent rise of GPU computing provides yet another avenue of parallelisation,
    and so do the many-core chips such as the Intel Phi.


    ### 19.9 Acknowledgements


    Big thanks go to


    - Marc Molinari for carefully proof reading this manuscript around 2007.

    - Neil O''Brien for contributing to the SymPy section.

    - Jacek Generowicz for introducing me to Python in the last millennium, and for
    kindly sharing countless ideas from his excellent Python course.

    - EPSRC (GR/T09156/01 and EP/G03690X/1) and the European Union (OpenDreamKit Horizon
    2020 European Research Infrastructures project, #676541) for support.

    - Students and other readers who have provided feedback and pointed out typos
    and errors etc.

    - Thomas Kluyver who helped to translate the Python 2 LaTeX based document into
    Python 3 Jupyter Notebooks and provided the machinery to create html and pdf versions
    automatically (via his bookbook package).

    - Robert Rosca who helped to create html and pdf files after using `jupyterbook`
    was released (2020).


    [1] the vertical line is to show the division between the original components
    only; mathematically, the augmented matrix behaves like any other 2 × 3 matrix,
    and we code it in SymPy as we would any other.


    [2] from the `help(preview)` documentation: “Currently this depends on pexpect,
    which is not available for windows.”


    [3] The exact value for the upper limit is available in `sys.maxint`.


    [4] We add for completeness, that a C-program (or C++ or Fortran) that executes
    the same loop will be about 100 times faster than the python float loop, and thus
    about 100*200 = 20000 faster than the symbolic loop.


    [5] In this text, we usually import `numpy` under the name N like this: `import
    numpy as N`. If you don''t have `numpy` on your machine, you can substitute this
    line by `import Numeric as N` or `import numarray as N`.


    [6] Historical note: this has changed from scipy version 0.7 to 0.8. Before 0.8,
    the return value was a float if a one-dimensional problem was to be solved.


    ## Chapter 19. Where to go from here?


    ## CHAPTER TWENTY


    ## CHANGE HISTORY


    Since 2022


    - 3 Jan 2022: review *visualisation chapter*

    - 4 Jan 2022: change from `odeint` to `solve_ivp` in *scipy chapter*

    - 5 Jan 2022: adding new section *virtual environments and pip*'
  mdcn: '## 18.5 管理多种不同环境 - pyenv


    如果你使用多种不同的 Python 环境，可能涉及不同的解释器版本，你或许需要了解 pyenv（主页在 https://github.com/pyenv/pyenv）。


    Pyenv 可以安装众多 Python 解释器，并为每个解释器创建虚拟环境。更进一步，它允许在*每个目录*的基础上定义该目录应使用的环境。当不同项目需要使用不同环境时，这非常方便，因为无需手动激活虚拟环境。


    **清理：** 删除本节创建的文件


    ```

    !rm -rf /tmp/cowsay-python

    !rm -rf myvirtualenv-copy

    !rm -f requirements.txt

    ```


    ## 第十九章


    ## 接下来该学什么？


    学习编程语言是成为计算科学家的第一步，通过计算建模和模拟来推动科学与工程的发展。

    我们列出一些对日常计算科学工作非常有益的额外技能，当然这并非详尽无遗。


    ### 19.1 高级编程


    本文档强调在编程方面打下坚实基础，涵盖控制流、数据结构以及函数和过程式编程的要素。我们没有深入探讨面向对象编程，也没有讨论 Python 的一些更高级特性，例如迭代器和装饰器。


    ### 19.2 编译型编程语言


    当性能成为最高优先级时，我们可能需要使用编译代码，并可能将其嵌入 Python 代码中以执行构成性能瓶颈的计算。

    Fortran、C 和 C++ 是明智的选择；也许在不久的将来 Julia 也会是。

    我们还需要学习如何使用 Cython、Boost、Ctypes 和 Swig 等工具将编译代码与 Python 集成。


    ### 19.3 测试


    良好的编码需要一系列单元测试和系统测试的支持，这些测试可以例行运行以检查代码是否正常工作。doctest、nose 和 pytest 等工具非常宝贵，我们至少应该学习如何使用
    pytest（或 nose）。


    ### 19.4 仿真模型


    许多标准仿真工具，如蒙特卡洛、分子动力学、基于格子的模型、智能体、有限差分和有限元模型，通常用于解决特定的仿真挑战——对这些工具有一个大致的了解是有用的。


    ### 19.5 研究代码的软件工程


    研究代码带来特定的挑战：需求可能在项目运行期间发生变化，我们需要极大的灵活性，同时又要保证可重复性。有许多技术可以有效地支持这一点。


    ### 19.6 数据与可视化


    处理大量数据、处理和可视化数据可能是一个挑战。数据库设计、3D 可视化以及现代数据处理工具（如 Pandas Python 包）的基础知识对此有所帮助。


    ### 19.7 版本控制


    使用版本控制工具（如 git 或 mercurial）应该是标准做法，它能显著提高代码编写效率，有助于团队协作，并且——也许最重要的是——支持计算结果的可重复性。


    ### 19.8 并行执行


    代码的并行执行是使其运行速度提高数个数量级的一种方式。这可以使用 MPI 进行节点间通信，或使用 OpenMP 进行节点内并行化，或者采用将两者结合的混合模式。

    近年来 GPU 计算的兴起提供了另一条并行化途径，Intel Phi 等多核芯片也是如此。


    ### 19.9 致谢


    非常感谢


    - Marc Molinari 在 2007 年左右仔细校对了本手稿。

    - Neil O''Brien 为 SymPy 部分做出了贡献。

    - Jacek Generowicz 在上个千年向我介绍了 Python，并慷慨分享了他优秀 Python 课程中的无数想法。

    - EPSRC（GR/T09156/01 和 EP/G03690X/1）和欧盟（OpenDreamKit Horizon 2020 欧洲研究基础设施项目，#676541）的支持。

    - 提供反馈并指出拼写错误和错误等的学生和其他读者。

    - Thomas Kluyver 帮助将基于 Python 2 LaTeX 的文档翻译成 Python 3 Jupyter Notebooks，并提供了自动创建
    html 和 pdf 版本的工具（通过他的 bookbook 包）。

    - Robert Rosca 在 `jupyterbook` 发布后（2020 年）帮助创建了 html 和 pdf 文件。


    [1] 竖线仅用于显示原始分量之间的划分；从数学上讲，增广矩阵的行为与任何其他 2 × 3 矩阵一样，我们在 SymPy 中像处理任何其他矩阵一样对其进行编码。


    [2] 来自 `help(preview)` 文档：“目前这依赖于 pexpect，而 pexpect 在 Windows 上不可用。”


    [3] 上限的确切值可在 `sys.maxint` 中找到。


    [4] 为完整起见，我们补充说明，执行相同循环的 C 程序（或 C++ 或 Fortran）将比 Python 浮点循环快约 100 倍，因此比符号循环快约
    100*200 = 20000 倍。


    [5] 在本文中，我们通常以 N 为名导入 `numpy`，如下所示：`import numpy as N`。如果你的机器上没有 `numpy`，可以用 `import
    Numeric as N` 或 `import numarray as N` 替换此行。


    [6] 历史说明：这在 scipy 版本 0.7 到 0.8 之间发生了变化。在 0.8 之前，如果要解决一维问题，返回值是浮点数。


    ## 第十九章 接下来该学什么？


    ## 第二十章


    ## 变更历史


    自 2022 年以来


    - 2022 年 1 月 3 日：审阅 *可视化章节*

    - 2022 年 1 月 4 日：在 *scipy 章节* 中将 `odeint` 更改为 `solve_ivp`

    - 2022 年 1 月 5 日：添加新章节 *虚拟环境和 pip*'
