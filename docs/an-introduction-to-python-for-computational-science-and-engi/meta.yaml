    Note how the bar chart is labelled appropriately: the metadata (here the labels
    ‘bananas’, ‘oranges’ and ‘potatoes’) have been used to label the x-axis in the
    plot.


    If we want to change this plot, the following strategy works, and is supported
    by other high-level frameworks as well:


    +   - create an axes (and figure) object

    - pass the axes object to the high level plotting framework

    - use the axes object (and figure) to finetune the plot


    The following example shows how to add a title, customise the labelling of the
    y-axis, and add a grid to the plot, and change the size of the figure to be 10
    inches by 3 inches:


    ```

    import matplotlib.pyplot as plt

    fig, ax = plt.subplots(figsize=(10, 3))


    s.plot.bar(ax=ax, color=''orange'')

    ax.set_title("Current stock")

    ax.set_yticks(range(0, 21, 4));

    ax.grid(''on'')

    ```'
- md: "## 15.7 Jupyter Notebooks\n\nThe Jupyter Notebook has become a central tool\
    \ for interactive data exploration and data analysis. I would go so far to say\
    \ that most data scientists will see the Jupyter notebook as the default place\
    \ to start a data exploration, analysis and machine learning project.\n\nWhy is\
    \ this so? The combination of annotation, code snippets, inlined results from\
    \ computation or visualisation and the automatic logging of these steps in a notebook\
    \ file can be of great use for research and development activities. A slightly\
    \ longer summary is available here.\n\nSome recent publications on the topic:\n\
    \n- Brian Granger, Fernando Pérez. *Jupyter: Thinking and Storytelling With Code\
    \ and Data*, Computing in Science & Engineering, vol. 23, no. 2, pp. 7-14, 1 March-April\
    \ 2021, doi: 10.1109/MCSE.2021.3059263 Authorea preprint (2021)\n- Hans Fangohr,\
    \ Marijan Beg, et al, *Data exploration and analysis with Jupyter notebooks*,\
    \ Proceedings of the 17th International Conference on Accelerator and Large Experimental\
    \ Physics Control Systems ICAL EPCS2019, TUCPR02, doi: 10.18429/JACoW-ICALEPCS2019-TUCPR02\
    \ (pdf) (2020)\n- Marijan Beg; Juliette Belin; Thomas Kluyver; Alexander Konovalov;\
    \ Min Ragan-Kelley; Nicolas Thiery; Hans Fangohr. *Using Jupyter for Reproducible\
    \ Scientific Workflows* in Computing in Science & Engineering, vol. 23, no. 2,\
    \ pp. 36-46, 1 March-April 2021, doi: 10.1109/MCSE.2021.3052101 arXiv preprint\
    \ (2021)\n\n## NUMERICAL METHODS USING PYTHON (SCIPY)\n\n### 16.1 Overview\n\n\
    The core Python language (including the standard libraries) provide enough functionality\
    \ to carry out computational research tasks. However, there are dedicated (third-party)\
    \ Python libraries that provide extended functionality which\n\n- provide numerical\
    \ tools for frequently occurring tasks\n- which are convenient to use\n- and are\
    \ more efficient in terms of CPU time and memory requirements than using the code\
    \ Python functionality alone.\n\nWe list three such modules in particular:\n\n\
    - The `numpy` module provides a data type specialised for \"number crunching\"\
    \ of vectors and matrices (this is the `array` type provided by \"numpy\" as introduced\
    \ in `14-numpy.ipynb`), and linear algebra tools.\n- The `matplotlib` package\
    \ (also knows as `pylab`) provides plotting and visualisation capabilities (see\
    \ `15-visualising-data.ipynb`) and the\n- `scipy` package (SCientific PYthon)\
    \ which provides a multitude of numerical algorithms and which is introduced in\
    \ this chapter.\n\nMany of the numerical algorithms available through `scipy`\
    \ and `numpy` are provided by established compiled libraries which are often written\
    \ in Fortran or C. They will thus execute much faster than pure Python code (which\
    \ is interpreted). As a rule of thumb, we expect compiled code to be two orders\
    \ of magnitude faster than pure Python code.\n\nYou can use the help function\
    \ for each numerical method to find out more about the source of the implementation.\n\
    \n### 16.2 SciPy\n\n`Scipy` provides many scientific computing functions and is\
    \ generally complementary to the functionality of `numpy`.\nFirst we need to import\
    \ `scipy`:\n\n```\nimport scipy\n```\n\nThe `scipy` package provides information\
    \ about its own structure when we use the help command:\n\n```\nhelp(scipy)\n\
    ```\n\nThe output is very long, so we're showing just a part of it here:\n\n##\
    \ Introduction to Python for Computational Science and Engineering\n\n```\ncluster\
    \                       --- Vector Quantization / Kmeans\nfft                \
    \           --- Discrete Fourier transforms\nfftpack                       ---\
    \ Legacy discrete Fourier transforms\nintegrate                     --- Integration\
    \ routines\ninterpolate                   --- Interpolation Tools\nio        \
    \                    --- Data input and output\nlinalg                       \
    \ --- Linear algebra routines\nlinalg.blas                   --- Wrappers to BLAS\
    \ library\nlinalg.lapack                 --- Wrappers to LAPACK library\nmisc\
    \                          --- Various utilities that don't have\n           \
    \                     another home.\nndimage                       --- n-dimensional\
    \ image package\nodr                           --- Orthogonal Distance Regression\n\
    optimize                      --- Optimization Tools\nsignal                 \
    \       --- Signal Processing Tools\nsignal.windows                --- Window\
    \ functions\nsparse                        --- Sparse Matrices\nsparse.linalg\
    \                 --- Sparse Linear Algebra\nsparse.linalg.dsolve          ---\
    \ Linear Solvers\nsparse.linalg.dsolve.umfpack  --- :Interface to the UMFPACK\
    \ library:\n                                Conjugate Gradient Method (LOBPCG)\n\
    sparse.linalg.eigen           --- Sparse Eigenvalue Solvers\nsparse.linalg.eigen.lobpcg\
    \    --- Locally Optimal Block Preconditioned\n                              \
    \  Conjugate Gradient Method (LOBPCG)\nspatial                       --- Spatial\
    \ data structures and algorithms\nspecial                       --- Special functions\n\
    stats                         --- Statistical Functions\n```\n\nIf we are looking\
    \ for an algorithm to integrate a function, we might explore the `integrate` package:\n\
    \n```\nimport scipy.integrate\n```\n\n```\nscipy.integrate?\n```\n\nproduces:\n\
    \n```\n========================================\nIntegration and ODEs (:mod:`scipy.integrate`)\n\
    ========================================\n\n.. currentmodule:: scipy.integrate\n\
    \nIntegrating functions, given function object\n=============================================\n\
    \n.. autosummary::\n   :toctree: generated/\n\n   quad            -- General purpose\
    \ integration\n   quad_vec        -- General purpose integration of vector-valued\
    \ functions\n   dblquad         -- General purpose double integration\n   tplquad\
    \        -- General purpose triple integration\n   nquad           -- General\
    \ purpose n-dimensional integration\n   fixed_quad      -- Integrate func(x) using\
    \ Gaussian quadrature of order n\n   quadrature      -- Integrate with given tolerance\
    \ using Gaussian quadrature\n   romberg         -- Integrate func using Romberg\
    \ integration\n   quad_explain    -- Print information for use of quad\n   newton_cotes\
    \    -- Weights and error coefficient for Newton-Cotes integration\n   IntegrationWarning\
    \ -- Warning on issues during integration\n\nIntegrating functions, given fixed\
    \ samples\n==========================================\n\n.. autosummary::\n  \
    \ :toctree: generated/\n\n   trapz           -- Use trapezoidal rule to compute\
    \ integral.\n   cumtrapz        -- Use trapezoidal rule to cumulatively compute\
    \ integral.\n   simps           -- Use Simpson's rule to compute integral from\
    \ samples.\n   romb            -- Use Romberg Integration to compute integral\
    \ from\n                     -- (2**k + 1) evenly-spaced samples.\n\n.. seealso::\n\
    \n   :mod:`scipy.special` for orthogonal polynomials (special) for Gaussian\n\
    \   quadrature roots and weights for other weighting factors and regions.\n\n\
    Solving initial value problems for ODE systems\n==============================================\n\
    \nThe solvers are implemented as individual classes which can be used directly\n\
    (low-level usage) or through a convenience function.\n\n.. autosummary::\n   :toctree:\
    \ generated/\n\n   solve_ivp       -- Convenient function for ODE integration.\n\
    \   RK23            -- Explicit Runge-Kutta solver of order 3(2).\n   RK45   \
    \         -- Explicit Runge-Kutta solver of order 5(4).\n   DOP853          --\
    \ Explicit Runge-Kutta solver of order 8.\n   Radau           -- Implicit Runge-Kutta\
