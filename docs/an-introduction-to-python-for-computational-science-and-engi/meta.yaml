    \ name is, __name__)`。\n\n注意与我们*导入*`module1.py`而不是单独执行它时的输出区别：如果文件被导入，模块内部的`__name__`会取模块名称的值。\n\
    \n### 7.5.3 __name__的使用\n\n总结一下，\n\n- 如果模块文件是单独运行的，则`__name__`是`__main__`\n- 如果模块文件被导入，则`__name__`是模块的名称（即不带`.py`后缀的模块文件名）。\n\
