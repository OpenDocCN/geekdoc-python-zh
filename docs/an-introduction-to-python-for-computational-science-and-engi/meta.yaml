  md: '# 12.1.10 Output: LaTeX interface and pretty-printing


    As is the case with many computer algebra systems, SymPy has the ability to format
    its output as LaTeX code, for easy inclusion into documents.


    At the start of this chapter, we called:


    ```

    sympy.init_printing()

    ```


    Sympy detected that it was in Jupyter, and enabled Latex output. The Jupyter Notebook
    supports (some) Latex, so this gives us the nicely formatted output above.


    We can also see the plain text output from Sympy, and the raw Latex code it creates:


    ```

    print(series(1/(x+y), y, 0, 3))

    ```


    ```

    y**2/x**3 - y/x**2 + 1/x + O(y**3)

    ```


    ```

    print(latex(series(1/(x+y), y, 0, 3)))

    ```


    ```

    \frac{y^{2}}{x^{3}} - \frac{y}{x^{2}} + \frac{1}{x} + O\left(y^{3}\right)

    ```


    ```

    print(latex(series(1/(x+y), y, 0, 3), mode=''inline''))

    ```


    ```

    $\frac{y^{2}}{x^{3}} - \frac{y}{x^{2}} + 1 / x + O\left(y^{3}\right)$

    ```


    Be aware that in its default mode, `latex()` outputs code that requires the `amsmath`
    package to be loaded via a `\backslashusepackage{amsmath}` command in the document
    preamble.


    SymPy also supports a “pretty print” (`pprint()`) output routine, which produces
    better-formatted text output than the default printing routine, as illustrated
    below. Note features such as the subscripts for array elements whose names are
    of the form `T_n`, the italicised constant `e`, vertically-centred dots for multiplication,
    and the nicely-formed matrix borders and fractions.'
