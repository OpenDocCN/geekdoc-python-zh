    data that shows how the velocity changes over time for a particular initial velocity
    v0 (v0 is a boundary condition here). The computer program would report a long
    lists of two numbers keeping the (i) value of time $t_i$ for which a particular
    (ii) value of the velocity $v_i$ has been computed. By plotting all $v_i$ against
    $t_i$, or by fitting a curve through the data, we may be able to understand the
    trend from the data (which we can just see from the analytical solution of course).


    It is clearly desirable to find an analytical solutions wherever possible but
    the number of problems where this is possible is small. Usually, the obtaining
    numerical result of a computer simulation is very useful (despite the shortcomings
    of the numerical results in comparison to an analytical expression) because it
    is the only possible way to study the system at all.


    The name *computational modelling* derives from the two steps: (i) *modelling*,
    i.e. finding a model description of a real system, and (ii) solving the resulting
    model equations using *computational* methods because this is the only way the
    equations can be solved at all.


    # 1.1.3 Programming to support computational modelling


    A large number of packages exist that provide computational modelling capabilities.
    If these satisfy the research or design needs, and any data processing and visualisation
    is appropriately supported through existing tools, one can carry out computational
    modelling studies without any deeper programming knowledge.


    In a research environment – both in academia and research on new products/ideas/...
    in industry – one often reaches a point where existing packages will not be able
    to perform a required simulation task, or where more can be learned from analysing
    existing data in news ways etc.


    At that point, programming skills are required. It is also generally useful to
    have a broad understanding of the building blocks of software and basic ideas
    of software engineering as we use more and more devices that are software-controlled.


    It is often forgotten that there is nothing the computer can do that we as humans
    cannot do. The computer can do it much faster, though, and also with making far
    fewer mistakes. There is thus no magic in computations a computer carries out:
    they could have been done by humans, and – in fact – were for many years (see
    for example Wikipedia entry on [Human Computer](https://en.wikipedia.org/wiki/Human_computer)).


    Understanding how to build a computer simulation comes roughly down to: (i) finding
    the model (often this means finding the right equations), (ii) knowing how to
    solve these equations numerically, (ii) to implement the methods to compute these
    solutions (this is the programming bit).'
- md: "## 1.2 Why Python for scientific computing?\n\nThe design focus on the Python\
    \ language is on productivity and code readability, for example through:\n\n-\
    \ Interactive python console\n- Very clear, readable syntax through whitespace\
    \ indentation\n- Strong introspection capabilities\n- Full modularity, supporting\
    \ hierarchical packages\n- Exception-based error handling\n- Dynamic data types\
    \ & automatic memory management\n\nAs Python is an interpreted language, and it\
    \ runs many times slower than compiled code, one might ask why anybody should\
    \ consider such a 'slow' language for computer simulations?\n\nThere are two replies\
    \ to this criticism:\n\n1. Implementation time versus execution time: It is not\
    \ the execution time alone that contributes to the cost of a computational project:\
    \ one also needs to consider the cost of the development and maintenance work.\n\
    \nIn the early days of scientific computing (say in the 1960/70/80), compute time\
    \ was so expensive that it made perfect sense to invest many person months of\
    \ a programmer's time to improve the performance of a calculation by a few percent.\n\
    \nNowadays, however, the CPU cycles have become much cheaper than the programmer's\
    \ time. For research codes which often run only a small number of times (before\
    \ the researchers move on to the next problem), it may be economic to accept that\
    \ the code runs only at 25% of the expected possible speed if this saves, say,\
    \ a month of a researcher's (or programmers) time. For example: if the execution\
    \ time of the piece of code is 10 hours, and one can predict that it will run\
    \ about 100 times, then the total execution time is approximately 1000 hours.\
    \ It would be great if this could be reduced to 25% and one could save 750 (CPU)\
    \ hours. On the other hand, is an extra wait (about a month) and the cost of 750\
    \ CPU hours worth investing one month of a person's time [who could do something\
    \ else while the calculation is running]? Often, the answer is not.\n\nCode readability\
    \ & maintenance - short code, fewer bugs: A related issue is that a research code\
    \ is not only used for one project, but carries on to be used again and again,\
    \ evolves, grows, bifurcates etc. In this case, it is often justified to invest\
    \ more time to make the code fast. At the same time, a significant amount of programmer\
    \ time will go into (i) introducing the required changes, (ii) testing them even\
    \ before work on speed optimisation of the changed version can start. To be able\
    \ to maintain, extend and modify a code in often unforeseen ways, it can only\
    \ be helpful to use a language that is easy to read and of great expressive power.\n\
    \n2. Well-written Python code can be very fast if time critical parts are executed\
    \ through compiled language.\n\nTypically, less than 5% percent of the code base\
    \ of a simulation project need more than 95% of the execution time. As long as\
    \ these calculations are done very efficiently, one doesn't need to worry about\
    \ all other parts of the code as the overall time their execution takes is insignificant.\n\
    \nThe compute intense part of the program should be tuned to reach optimal performance.\
    \ Python offers a number of options.\n\n- For example, the numpy Python extension\
    \ provides a Python interface to the compiled and efficient LAPACK libraries that\
    \ are the quasi-standard in numerical linear algebra. If the problems under study\
    \ can be formulated such that eventually large systems of algebraic equations\
    \ have to be solved, or eigenvalues computed, etc, then the compiled code in the\
    \ LAPACK library can be used (through the Python-numpy package). At this stage,\
    \ the calculations are carried out with the same performance of Fortran/C as it\
    \ is essentially Fortran/C code that is used. Matlab, by the way, exploits exactly\
    \ this: the Matlab scripting language is very slow (about 10 times slower than\
    \ Python), but Matlab gains its power from delegating the matrix operation to\
    \ the compiled LAPACK libraries.\n- Existing numerical C/Fortran libraries can\
    \ be interfaced to be usable from within Python (using for example Swig, Boost.Python\
    \ and Cython).\n- Python can be extended through compiled languages if the computationally\
    \ demanding part of the problem is algorithmically non-standard and no existing\
    \ libraries can be used.\n\nCommonly used are C, Fortran and C++ to implement\
    \ fast extensions.\n\n- We list some tools that are used to use compiled code\
    \ from Python:\n    - The `scipy.weave` extension is useful if just a short expression\
    \ needs to be expressed in C.\n    - The Cython interface is growing in popularity\
    \ to (i) semi-automatically declare variable types in Python code, to translate\
    \ that code to C (automatically) and to then use the compiled C code from Python.\
    \ Cython is also used to quickly wrap an existing C library with an interface\
    \ so the C library can be used from Python.\n    - Boost.Python is specialised\
    \ for wrapping C++ code in Python.\n\n> The conclusion is that Python is “fast\
    \ enough” for most computational tasks, and that its user friendly high-level\
    \ language often makes up for reduced speed in comparison to compiled lower-level\
    \ languages. Combining Python with tailor-written compiled code for the performance\
    \ critical parts of the code, results in virtually optimal speed in most cases.\n\
    \n## 1.2.1 Optimisation strategies\n\nWe generally understand reduction of execution\
    \ time when discussing “code optimisation” in the context of computational modelling,\
    \ and we essentially like to carry out the required calculations as fast as possible.\
    \ (Sometimes we need to reduce the amount of RAM, the amount of data input output\
    \ to disk or the network.) At the same time, we need to make sure that we do not\
    \ invest inappropriate amounts of programming time to achieve this speed up: as\
    \ always there needs to be a balance between the programmers’ time and the improvement\
    \ we can gain from this.\n\n## 1.2.2 Get it right first, then make it fast\n\n\
    To write fast code effectively, we note that the right order is to (i) first write\
    \ a program that carries out the correct calculation. For this, choose a language/approach\
    \ that allows you to *write the code quickly and make it work quickly* — regardless\
    \ of execution speed. Then (ii) either change the program or re-write it from\
    \ scratch in the same language to make the execution faster. During the process,\
    \ keep comparing results with the slow version written first to make sure the\
    \ optimisation does not introduce errors. (Once we are familiar with the concept\
    \ of regression tests, they should be used here to compare the new and hopefully\
    \ faster code with the original code.)\n\nA common pattern in Python is to start\
    \ writing pure Python code, then start using Python libraries that use compiled\
    \ code internally (such as the fast arrays Numpy provides, and routines from scipy\
    \ that go back to established numerical codes such as ODEPACK, LAPACK and others).\
    \ If required, one can – after careful profiling – start to replace parts of the\
    \ Python code with a compiled language such as C and Fortran to improve execution\
    \ speed further (as discussed above).\n\n## 1.2.3 Prototyping in Python\n\nIt\
    \ turns out that – even if a particular code has to be written in, say, C++ –\
    \ it is (often) more time efficient to prototype the code in Python, and once\
    \ an appropriate design (and class structure) has been found, to translate the\
    \ code to C++.\n\n## 1.2.4 Literature\n\nWhile this text starts with an introduction\
    \ of (some aspects of) the basic Python programming language, you may find - depending\
    \ on your prior experience - that you need to refer to secondary sources to fully\
    \ understand some ideas.\n\nWe repeatedly refer to the following documents:\n\n\
    - Allen Downey, *Think Python*. Available online in html and pdf at https://www.greenteapress.com/thinkpython/thinkpython.html,\
    \ or from Amazon.\n- The Python documentation https://www.python.org/doc/, and:\n\
    - The Python tutorial (https://docs.python.org/3/tutorial/)\n\nYou may also find\
    \ the following links useful:\n\n- The `numpy` home page (https://numpy.org/)\n\
    - The `scipy` home page (https://www.scipy.org/)\n- The `matplotlib` home page\
    \ (https://matplotlib.org/).\n- The Python style guide (https://www.python.org/dev/peps/pep-0008/)\n\
    \n## 1.2.5 Recorded video lectures on Python for beginners\n\nDo you like to listen/follow\
    \ lectures? There is a series of 24 lectures titled *Introduction to Computer\
    \ Science and Programming* delivered by Eric Grimsom and John Guttag from the\
    \ MIT available at https://ocw.mit.edu/courses/electrical-engineering-and-computer-science/6-00-introduction-to-computer-science-and-programming-fall-2008/\
    \ This is aimed at students with little or no programming experience. It aims\
    \ to provide students with an understanding of the role computation can play in\
    \ solving problems. It also aims to help students, regardless of their major,\
    \ to feel justifiably confident of their ability to write small programs that\
    \ allow them to accomplish useful goals.\n\nA more recent collection of topic\
    \ specific (and shorter) tutorial videos is available from Socratica.\n\n## 1.2.6\
    \ Python tutor mailing list\n\nThere is also a Python tutor mailing list (https://mail.python.org/mailman/listinfo/tutor)\
    \ where beginners are welcome to ask questions regarding Python. Both using the\
    \ archives and posting your own queries (or in fact helping others) may help with\
    \ understanding the language. Use the normal mailing list etiquette (i.e. be polite,\
    \ concise, etc). You may want to read https://www.freebsd.org/doc/en/articles/mailing-list-faq/etiquette.html\
    \ for some guidance on how to ask questions on mailing lists.\n\n## 1.3 Python\
    \ version\n\nThere are two versions of the Python language out there: Python 2.x\
    \ and Python 3.x. They are (slightly) different — the changes in Python 3.x were\
    \ introduced to address shortcomings in the design of the language that were identified\
    \ since Python’s inception. A decision was made that some incompatibility should\
    \ be accepted to achieve the higher goal of a better language for the future.\n\
    \nFor scientific computation, it is crucial to make use of numerical libraries\
    \ such as `numpy`, `scipy` and the plotting package `matplotlib`.\n\nAll of these\
    \ are now available for Python 3, and we will use Python 3.x in this book."
  mdcn: "## 1.2 为什么选择Python进行科学计算？\n\nPython语言的设计重点在于生产力和代码可读性，例如通过以下方式实现：\n\n- 交互式Python控制台\n\
    - 通过空格缩进实现非常清晰、可读的语法\n- 强大的自省能力\n- 完全的模块化，支持分层包结构\n- 基于异常的错误处理\n- 动态数据类型与自动内存管理\n\
    \n由于Python是一种解释型语言，其运行速度比编译型代码慢很多倍，人们可能会问，为什么还要考虑使用这种“慢”语言进行计算机模拟？\n\n对此批评有两种回应：\n\
    \n1.  **实现时间与执行时间**：计算项目的成本不仅仅取决于执行时间，还需要考虑开发和维护工作的成本。\n\n    在科学计算的早期（比如1960/70/80年代），计算时间非常昂贵，因此投入程序员数月的时间来将计算性能提高几个百分点是完全合理的。\n\
    \n    然而，如今CPU周期的成本已远低于程序员的时间成本。对于那些通常只运行少数几次的研究代码（在研究人员转向下一个问题之前），如果接受代码仅以预期可能速度的25%运行能节省，比如，一个月的研究员（或程序员）时间，这可能是经济的。例如：如果一段代码的执行时间是10小时，并且可以预测它将运行大约100次，那么总执行时间大约是1000小时。如果能将其减少到25%，从而节省750个（CPU）小时，那将是极好的。另一方面，额外的等待（大约一个月）和750个CPU小时的成本，是否值得投入一个人一个月的时间[这个人本可以在计算运行时做其他事情]？通常，答案是否定的。\n\
    \n    **代码可读性与维护性——短代码，更少的bug**：一个相关的问题是，研究代码不仅用于一个项目，还会被反复使用、演变、增长、分叉等。在这种情况下，投入更多时间使代码运行得快通常是合理的。同时，大量的程序员时间将用于（i）引入所需的更改，（ii）甚至在开始更改版本的速度优化工作之前就对其进行测试。为了能够以通常不可预见的方式维护、扩展和修改代码，使用一种易于阅读且表达能力强的语言只会有所帮助。\n\
    \n2.  **编写良好的Python代码在通过编译语言执行时间关键部分时可以非常快。**\n\n    通常，模拟项目代码库中不到5%的部分需要超过95%的执行时间。只要这些计算被非常高效地完成，就不需要担心代码的所有其他部分，因为它们执行所花费的总时间微不足道。\n\
    \n    程序的计算密集部分应调整以达到最佳性能。Python提供了多种选择。\n\n    - 例如，`numpy` Python扩展为编译且高效的LAPACK库提供了Python接口，这些库是数值线性代数领域的准标准。如果所研究的问题可以被表述为最终需要求解大型代数方程组或计算特征值等，那么可以使用LAPACK库中的编译代码（通过Python-numpy包）。在这个阶段，计算是以与Fortran/C相同的性能进行的，因为它本质上使用的是Fortran/C代码。顺便说一句，Matlab正是利用了这一点：Matlab脚本语言非常慢（大约比Python慢10倍），但Matlab通过将矩阵运算委托给编译的LAPACK库来获得其强大功能。\n\
    \    - 现有的数值C/Fortran库可以被接口化，以便在Python内部使用（例如使用Swig、Boost.Python和Cython）。\n  \
    \  - 如果问题的计算密集部分在算法上是非标准的，并且没有现有的库可用，Python可以通过编译语言进行扩展。\n\n    常用C、Fortran和C++来实现快速扩展。\n\
    \n    - 我们列出一些用于从Python使用编译代码的工具：\n        - `scipy.weave`扩展在只需要用C表达一个简短表达式时很有用。\n\
    \        - Cython接口越来越受欢迎，用于（i）在Python代码中半自动地声明变量类型，将该代码（自动）翻译成C，然后从Python使用编译后的C代码。Cython也用于快速将现有的C库包装成接口，以便从Python使用该C库。\n\
    \        - Boost.Python专门用于将C++代码包装在Python中。\n\n> 结论是，Python对于大多数计算任务来说“足够快”，其用户友好的高级语言特性常常弥补了与编译型低级语言相比的速度损失。将Python与为代码性能关键部分量身定制的编译代码相结合，在大多数情况下实际上可以达到最佳速度。\n\
    \n## 1.2.1 优化策略\n\n在计算建模的背景下讨论“代码优化”时，我们通常理解为减少执行时间，我们本质上希望尽可能快地执行所需的计算。（有时我们需要减少RAM使用量、磁盘数据输入输出量或网络流量。）同时，我们需要确保没有投入不适当的编程时间来实现这种加速：一如既往，需要在程序员的时间和我们能从中获得的改进之间取得平衡。\n\
    \n## 1.2.2 先做对，再做快\n\n要有效地编写快速代码，我们注意到正确的顺序是（i）首先编写一个执行正确计算的程序。为此，选择一种允许你*快速编写代码并使其快速工作*的语言/方法——无论执行速度如何。然后（ii）要么更改程序，要么用同一种语言从头重写它以使执行更快。在此过程中，持续将结果与最初编写的慢版本进行比较，以确保优化没有引入错误。（一旦我们熟悉了回归测试的概念，就应该在这里使用它们来比较新的、希望更快的代码与原始代码。）\n\
    \nPython中的一个常见模式是开始编写纯Python代码，然后开始使用内部使用编译代码的Python库（例如Numpy提供的快速数组，以及来自scipy的、基于成熟数值代码（如ODEPACK、LAPACK等）的例程）。如果需要，可以在仔细分析后，开始用C和Fortran等编译语言替换部分Python代码，以进一步提高执行速度（如上所述）。\n\
    \n## 1.2.3 在Python中进行原型设计\n\n事实证明——即使特定代码必须用，比如C++编写——在Python中进行原型设计通常更节省时间，一旦找到合适的设计（和类结构），再将代码翻译成C++。\n\
    \n## 1.2.4 文献\n\n虽然本文从介绍（某些方面的）基本Python编程语言开始，但你可能会发现——根据你之前的经验——你需要参考辅助资料来完全理解一些概念。\n\
    \n我们反复参考以下文档：\n\n- Allen Downey, *Think Python*。可在 https://www.greenteapress.com/thinkpython/thinkpython.html\
    \ 在线获取html和pdf版本，或从Amazon购买。\n- Python文档 https://www.python.org/doc/，以及：\n- Python教程\
    \ (https://docs.python.org/3/tutorial/)\n\n你可能还会发现以下链接很有用：\n\n- `numpy` 主页 (https://numpy.org/)\n\
    - `scipy` 主页 (https://www.scipy.org/)\n- `matplotlib` 主页 (https://matplotlib.org/)。\n\
    - Python风格指南 (https://www.python.org/dev/peps/pep-0008/)\n\n## 1.2.5 面向初学者的Python录制视频讲座\n\
    \n你喜欢听/跟讲座吗？MIT的Eric Grimsom和John Guttag提供了一系列名为*计算机科学与编程导论*的24讲课程，可在 https://ocw.mit.edu/courses/electrical-engineering-and-computer-science/6-00-introduction-to-computer-science-and-programming-fall-2008/\
    \ 获取。这针对的是几乎没有编程经验的学生。它旨在让学生理解计算在解决问题中可以扮演的角色。它还旨在帮助学生，无论其专业如何，都能理直气壮地相信自己编写小程序以实现有用目标的能力。\n\
    \nSocratica提供了一个更新的、主题特定（且更短）的教程视频合集。\n\n## 1.2.6 Python导师邮件列表\n\n还有一个Python导师邮件列表\
    \ (https://mail.python.org/mailman/listinfo/tutor)，欢迎初学者在此提出关于Python的问题。使用存档和发布你自己的查询（或者实际上帮助他人）都可能有助于理解该语言。使用正常的邮件列表礼仪（即，礼貌、简洁等）。你可能想阅读\
    \ https://www.freebsd.org/doc/en/articles/mailing-list-faq/etiquette.html 以获取关于如何在邮件列表上提问的一些指导。\n\
    \n## 1.3 Python版本\n\nPython语言有两个版本：Python 2.x和Python 3.x。它们（略有）不同——Python 3.x中的更改是为了解决自Python诞生以来发现的语言设计缺陷。人们决定接受一些不兼容性，以实现为未来打造更好语言的更高目标。\n\
    \n对于科学计算，利用`numpy`、`scipy`等数值库和绘图包`matplotlib`至关重要。\n\n所有这些现在都可用于Python 3，我们将在本书中使用Python\
    \ 3.x。"
