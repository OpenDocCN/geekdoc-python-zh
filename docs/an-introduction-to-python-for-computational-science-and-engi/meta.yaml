    # NUMERICAL METHODS USING PYTHON (SCIPY)


    # 16.1 Overview


    The core Python language (including the standard libraries) provide enough functionality
    to carry out computational research tasks. However, there are dedicated (third-party)
    Python libraries that provide extended functionality which


    +   - provide numerical tools for frequently occurring tasks

    - which are convenient to use

    - and are more efficient in terms of CPU time and memory requirements than using
    the code Python functionality alone.


    We list three such modules in particular:


    +   - The `numpy` module provides a data type specialised for “number crunching”
    of vectors and matrices (this is the `array` type provided by “numpy” as introduced
    in `14-numpy.ipynb`), and linear algebra tools.

    - The `matplotlib` package (also knows as `pylab`) provides plotting and visualisation
    capabilities (see `15-visualising-data.ipynb`) and the

    - `scipy` package (SCientific PYthon) which provides a multitude of numerical
    algorithms and which is introduced in this chapter.


    Many of the numerical algorithms available through `scipy` and `numpy` are provided
    by established compiled libraries which are often written in Fortran or C. They
    will thus execute much faster than pure Python code (which is interpreted). As
    a rule of thumb, we expect compiled code to be two orders of magnitude faster
    than pure Python code.


    You can use the help function for each numerical method to find out more about
    the source of the implementation.


    # 16.2 SciPy


    `Scipy` provides many scientific computing functions and is generally complementary
    to the the functionality of `numpy`.

    First we need to import `scipy`:


    ```

    import scipy

    ```


    The `scipy` package provides information about its own structure when we use the
    help command:


    ```

    help(scipy)

    ```


    The output is very long, so we’re showing just a part of it here:'
