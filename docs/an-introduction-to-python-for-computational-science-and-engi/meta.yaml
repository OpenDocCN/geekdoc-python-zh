    \ -(x - 0.2) ** 2)\n\n# find minima of f(x),\n# starting from 1.0 and 2.0 respectively\n\
    minimum1 = fmin(f, 1.0)\nprint(\"Start search at x=1., minimum is\", minimum1)\n\
    ```\n\n```\nminimum2 = fmin(f, 2.0)\nprint(\"Start search at x=2., minimum is\"\
    , minimum2)\n\n# plot function\nx = arange(-10, 10, 0.1)\ny = f(x)\npylab.plot(x,\
