  md: '| | stock | price |

    |---|---|---|

    | banana | 22 | 0.50 |

    | cucumber | 1 | 0.99 |


    **Warning**


    Note that there are some inconsistencies here: the explicit slicing with index
    labels (such as `.loc[''banana'':''cucumber'']`) is inclusive of `cucumber`, whereas
    in the implicit slicing (such as `.iloc[1:3]`) the row with index 3 is *not* included.


    The behaviour of `.loc` is convenient and a good design choice if labels such
    as strings in our `stock` example are used. The behaviour of `.iloc` is reflecting
    the normal Python behaviour.


    It is thus understandable how we have arrived at the situation.


    # 17.7.5 Data manipulation with `shop`


    The real strength of the DataFrames is that we can continue to process the data
    conveniently.


    For example, we could work out the financial value of the items we have in stock,
    and add this as an extra column:


    ```

    shop[''value''] = shop[''price''] * shop[''stock'']

    shop

    ```


    | | stock | price | value |

    |---|---|---|---|

    | apple | 10 | 0.55 | 5.50 |

    | banana | 22 | 0.50 | 11.00 |

    | cucumber | 1 | 0.99 | 0.99 |

    | orange | 3 | 1.76 | 5.28 |

    | potato | 110 | 0.17 | 18.70 |


    Of course we can compute the sum, for example, to estimate the value of the total
    stock:


    ```

    shop[''value''].sum()

    ```


    41.47


    If, for whatever reason, we want to swap columns with rows, we can `transpose`
    the data frame like a numpy array:


    ```

    shop.transpose()

    ```


    | | apple | banana | cucumber | orange | potato |

    |---|---|---|---|---|---|

    | stock | 10.00 | 22.0 | 1.00 | 3.00 | 110.00 |

    | price | 0.55 | 0.5 | 0.99 | 1.76 | 0.17 |

    | value | 5.50 | 11.0 | 0.99 | 5.28 | 18.70 |'
