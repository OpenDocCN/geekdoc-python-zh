    can be used to learn about each method.


    A particularly useful method is `split()` which converts a string into a list
    of strings:


    ```

    a = "This is a test sentence."

    a.split()

    ```


    ```

    [''This'', ''is'', ''a'', ''test'', ''sentence.'']

