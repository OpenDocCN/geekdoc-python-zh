    如果是这样，我们也可以在处理数据之前关闭文件，即：\n\n```python\nf = open('myfile.txt', 'r')\nlines = f.readlines()\n\
    f.close()\nfor line in lines:\n    print(\"%d characters\" % len(line))\n```\n\
    \n24 characters\n25 characters\n30 characters\n\n### 逐行迭代（文件对象）\n\n有一种更简洁的方法可以逐行读取文件，它\
    \ (i) 一次只读取一行（因此也适用于大文件），并且 (ii) 产生更紧凑的代码：\n\n```python\nf = open('myfile.txt',\
    \ 'r')\nfor line in f:\n    print(\"%d characters\" % len(line))\nf.close()\n\
    ```\n\n24 characters\n25 characters\n30 characters\n\n这里，文件句柄 `f` 充当迭代器，在 for\
    \ 循环的每次后续迭代中返回下一行，直到到达文件末尾（然后 for 循环终止）。\n\n## 5.3 延伸阅读\n\n文件对象的方法，教程，第 7.2.1\
    \ 节\n\n# 第六章\n控制流\n\n## 6.1 基础\n\n对于一个包含 Python 程序的给定文件，Python 解释器将从顶部开始，然后处理该文件。我们用一个简单的程序来演示这一点，例如：\n\
    \n```python\ndef f(x):\n    \"\"\"计算并返回 x*x 的函数\"\"\"\n    return x * x\n\nprint(\"\
    Main program starts here\")\nprint(\"4 * 4 = %s\" % f(4))\nprint(\"In last line\
    \ of program -- bye\")\n```\n\nMain program starts here\n4 * 4 = 16\nIn last line\
    \ of program -- bye\n\n基本规则是，文件（或函数或任何命令序列）中的命令是从上到下处理的。如果在同一行中给出了多个命令（用 ; 分隔），那么这些命令是从左到右处理的（尽管不鼓励在一行中包含多个语句，以保持代码的良好可读性）。\n\
    \n在这个例子中，解释器从顶部（第 1 行）开始。它找到 `def` 关键字，并记住函数 `f` 在这里定义。（它还不会执行函数体，即第 3 行——这只有在我们调用函数时才会发生。）解释器可以从缩进看出函数体在哪里结束：第\
    \ 5 行的缩进与函数体第一行（第 2 行）的缩进不同，因此函数体已经结束，执行应该继续到那一行。（空行对此分析没有影响。）\n\n在第 5 行，解释器将打印输出\
    \ `Main program starts here`。然后执行第 6 行。这包含表达式 `f(4)`，它将调用在第 1 行定义的函数 `f(x)`，其中\
    \ `x` 将取值 4。[实际上 `x` 是对对象 4 的引用。] 然后执行函数 `f`，并在第 3 行计算并返回 `4 * 4`。这个值 16 在第 6\
    \ 行用于替换 `f(4)`，然后对象 16 的字符串表示 `%s` 作为第 6 行 print 命令的一部分被打印出来。\n\n然后解释器移动到第 7 行，之后程序结束。\n\
    \n我们现在将学习引导此控制流的不同可能性。"
