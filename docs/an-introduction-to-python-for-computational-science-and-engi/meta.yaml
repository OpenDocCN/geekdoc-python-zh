    \ $f(x)$，我们可以创建一个新函数 $g(x)$，它反转 $f$ 的符号，即 $g(x) = -f(x)$，然后最小化 $g(x)$。\n\n下面，我们提供一个示例，展示\
    \ (i) 测试函数的定义和 (ii) `scipy.optimize.fmin` 函数的调用。该函数接受一个待最小化的函数 $f$ 和一个用于开始搜索最小值的初始值\
    \ $x0$ 作为参数，并返回使 $f(x)$（局部）最小化的 $x$ 值。通常，寻找最小值是一个局部搜索过程，即算法遵循局部梯度。我们针对两个不同的值（分别为\
