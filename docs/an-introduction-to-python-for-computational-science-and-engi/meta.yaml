    \n来源：https://docs.python.org/3/glossary.html#term-lbyl\n\nEAFP 是 Python 的方式。\n\
    \n# 第七章\n\n# 函数与模块\n\n## 7.1 简介\n\n函数允许我们将一组语句组合成一个逻辑块。我们通过一个明确定义的接口与函数通信，向函数提供某些参数，并接收一些信息作为回报。除了这个接口，我们通常不知道函数究竟是如何完成工作以获得其返回值的。\n\
    \n例如函数 `math.sqrt`：我们不知道它究竟是如何计算平方根的，但我们知道接口：如果我们向函数传递 $x$，它将返回（一个近似值）$\\sqrt{x}$。\n\
    \n这种抽象是一件有用的事情：工程中一种常见的技术是将系统分解成更小的（黑盒）组件，这些组件都通过定义良好的接口协同工作，但不需要了解彼此功能的内部实现。事实上，不必关心这些实现细节有助于更清晰地了解由许多此类组件组成的系统。\n\
    \n函数为较大的程序（和计算机模拟）提供了功能的基本构建块，并有助于控制过程固有的复杂性。\n\n我们可以将函数组合成一个 Python 模块（参见 *模块*），并以此方式创建我们自己的功能库。\n\
    \n## 7.2 使用函数\n\n“函数”一词在数学和编程中有不同的含义。在编程中，它指的是执行计算的命名操作序列。例如，定义在 `math` 模块中的函数\
    \ `sqrt()` 计算给定值的平方根：\n\n```\nfrom math import sqrt\nsqrt(4)\n\n2.0\n```\n\n在此示例中，我们传递给函数\
    \ `sqrt` 的值是 4。这个值被称为函数的*参数*。一个函数可以有多个参数。\n\n函数将值 2.0（其计算结果）返回给“调用上下文”。这个值被称为函数的*返回值*。\n\
    \n通常说一个函数*接受*一个参数并*返回*一个结果或返回值。\n\n**关于打印和返回值的常见混淆**\n\n初学者常犯的一个错误是混淆值的*打印*和*返回*。在下面的示例中，很难看出函数\
    \ `math.sin` 是返回一个值还是打印一个值：\n\n```\nimport math\nmath.sin(2)\n```\n\n```\n0.9092974268256817\n\
    ```\n\n我们导入 `math` 模块，并使用参数 2 调用 `math.sin` 函数。`math.sin(2)` 调用实际上会*返回*值 0.909...\
    \ 而不是打印它。然而，由于我们没有将返回值赋给变量，Python 提示符将打印返回的对象。\n\n以下替代序列仅在值被返回时才有效：\n\n```\nx\
    \ = math.sin(2)\nprint(x)\n```\n\n```\n0.9092974268256817\n```\n\n函数调用 `math.sin(2)`\
    \ 的返回值被赋给变量 x，并在下一行打印 x。\n\n通常，函数应该“静默”执行（即不打印任何内容），并通过返回值报告其计算结果。\n\n在 Python\
    \ 提示符处，关于打印值与返回值的部分混淆来自于 Python 提示符会打印（一个表示）返回的对象*如果*返回的对象未被赋值。通常，看到返回的对象正是我们想要的（因为我们通常关心返回的对象），只是在学习\
    \ Python 时，这可能会引起关于函数返回值还是打印值的轻微混淆。\n\n**更多信息**\n\n-   《Think Python》在第 3 章（函数）和第\
    \ 6 章（有返回值的函数）中对函数进行了温和的介绍（上一段基于此）。\n\n## 7.3 定义函数\n\n函数定义的通用格式：\n\n```\ndef my_function(arg1,\
    \ arg2, ..., argn):\n    \"\"\"可选的文档字符串。\"\"\"\n\n    # 函数的实现\n\n    return result\
    \  # 可选\n\n# 这不是函数的一部分\nsome_command\n```\n\nAllen Downey 在他的书《Think Python》中的术语“有返回值的函数”和“无返回值的函数”区分了返回值的函数和不返回值的函数。这种区分指的是函数是否提供返回值（=有返回值）或者函数是否不显式返回值（=无返回值）。如果一个函数不使用\
    \ `return` 语句，我们倾向于说该函数不返回任何内容（而实际上，当它终止时，它总是会返回 `None` 对象——即使缺少 `return` 语句）。\n\
    \n例如，函数 `greeting` 在被调用时将打印 \"Hello World\"（并且是无返回值的，因为它不返回值）。\n\n```\ndef greeting():\n\
    \    print(\"Hello World!\")\n```\n\n如果我们调用该函数：\n\n```\ngreeting()\n```\n\n```\n\
    Hello World!\n```\n\n它会按预期向标准输出打印“Hello World”。如果我们将函数的返回值赋给变量 x，我们可以随后检查它：\n\n\
    ```\nx = greeting()\n```\n\n```\nHello World!\n```\n\n```\nprint(x)\n```\n\n```\n\
    None\n```\n\n并发现 `greeting` 函数确实返回了 `None` 对象。\n\n另一个不返回任何值的函数示例（意味着函数中没有 `return`\
    \ 关键字）可以是：\n\n```\ndef printpluses(n):\n    print(n * \"+\")\n```\n\n通常，返回值的函数更有用，因为可以通过巧妙地组合它们来组装代码（可能作为另一个函数）。让我们看一些确实返回值的函数示例。\n\
    \n假设我们需要定义一个计算给定变量平方的函数。函数源代码可以是：\n\n```\ndef square(x):\n    return x * x\n```\n\
    \n关键字 `def` 告诉 Python 我们在该点*定义*一个函数。该函数接受一个参数（`x`）。函数返回 `x*x`，当然是 $x^2$。这是一个展示如何定义和使用该函数的文件清单：（注意左侧的数字是行号，不是程序的一部分）\n\
    \n```\ndef square(x):\n    return x * x\n\nfor i in range(5):\n    i_squared =\
    \ square(i)\n    print(i, '*', i, '=', i_squared)\n```\n\n```\n0 * 0 = 0\n1 *\
    \ 1 = 1\n2 * 2 = 4\n3 * 3 = 9\n4 * 4 = 16\n```"
