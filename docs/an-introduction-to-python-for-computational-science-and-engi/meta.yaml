    # 15.7 Jupyter Notebooks


    The Jupyter Notebook has become a central tool for interactive data exploration
    and data analysis. I would go so far to say that most data scientists will see
    the Jupyter notebook as the default place to start a data exploration, analysis
    and machine learning project.


    Why is this so? The combination of annotation, code snippets, inlined results
    from computation or visualisation and the automatic logging of these steps in
    a notebook file can be of great use for research and development activities. A
    slightly longer summary is available here.


