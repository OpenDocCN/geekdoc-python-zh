  md: "# Introduction to Python for Computational Science and Engineering\n\nIf this\
    \ file is imported (i.e. used as a module) into another python file or the python\
    \ prompt or in the Jupyter Notebook, then `__name__==__main__` is false, and that\
    \ statement block will not be executed.\n\nThis is quite a common way to conditionally\
    \ execute code in files providing library-like functions. The code that is executed\
    \ if the file is run on its own, often consists of a series of tests (to check\
    \ that the file's functions carry out the right operations – *regression tests*\
    \ or *unit tests*), or some examples of how the library functions in the file\
    \ can be used.\n\n# 7.5.5 Example 2\n\nEven if a Python program is not intended\
    \ to be used as a module file, it is good practice to always use a conditional\
    \ main program:\n\n+   - often, it turns out later that functions in the file\
    \ can be reused (and saves work then)\n- this is convenient for regression testing.\n\
    \nSuppose an exercise is given to write a function that returns the first 5 prime\
    \ numbers, and in addition to print them. (There is of course a trivial solution\
    \ to this as we know the prime numbers, and we should imagine that the required\
    \ calculation is more complex). One might be tempted to write\n\n```\ndef primes5():\n\
    \    return (2, 3, 5, 7, 11)\n\nfor p in primes5():\n    print(\"%d\" % p, end='\
    \ ')\n```\n\n```\n2 3 5 7 11\n```\n\nIt is better style to use a conditional main\
    \ function, i.e.:\n\n```\ndef primes5():\n    return (2, 3, 5, 7, 11)\n\nif __name__==\"\
    __main__\":\n    for p in primes5():\n        print(\"%d\" % p, end=' ')\n```\n\
    \n```\n2 3 5 7 11\n```\n\nA purist might argue that the following is even cleaner:\n\
    \n```\ndef primes5():\n    return (2, 3, 5, 7, 11)\n\ndef main():\n    for p in\
    \ primes5():\n        print(\"%d\" % p, end=' ')\n\nif __name__==\"__main__\"\
    :\n    main()\n```\n\n```\n2 3 5 7 11\n```\n\nbut either of the last two options\
    \ is good."
