    pylab.plot(xfine, y2(xfine), label='cubic')\npylab.legend()\npylab.xlabel('x')\n\
    ```\n\nText(0.5, 0, 'x')\n\n## 16.7 曲线拟合\n\n我们已经在 *numpy 章节* 中看到，我们可以使用 `numpy.polyfit`\
    \ 函数将多项式函数拟合到数据集。这里，我们介绍一种更通用的曲线拟合算法。\n\nScipy 通过 `scipy.optimize.curve_fit` 提供了一个相当通用的函数（基于\
    \ Levenburg-Marquardt 算法），用于将给定的（Python）函数拟合到给定的数据集。假设我们被给定了一组数据，包含点 $x_1, x_2,\
    \ ...x_N$ 和相应的函数值 $y_i$，并且 $y_i$ 对 $x_i$ 的依赖关系为 $y_i = f(x_i, \\vec{p})$。我们希望确定参数向量\
    \ $\\vec{p} = (p_1, p_2, ..., p_k)$，使得残差之和 $r$ 尽可能小：\n\n$$r = \\sum_{i=1}^{N}\
    \ (y_i - f(x_i, \\vec{p}))^2$$\n\n当数据有噪声时，曲线拟合特别有用：对于给定的 $x_i$ 和 $y_i = f(x_i,\
    \ \\vec{p})$，我们有一个（未知的）误差项 $\\epsilon_i$，使得 $y_i = f(x_i, \\vec{p}) + \\epsilon_i$。\n\
    \n我们使用以下例子来阐明这一点：$f(x, \\vec{p}) = a \\exp(-bx) + c$，即 $\\vec{p} = a, b, c$\n\n\
    ```python\n# NBVAL_IGNORE_OUTPUT\nimport numpy as np\nfrom scipy.optimize import\
    \ curve_fit\n\ndef f(x, a, b, c):\n    \"\"\"Fit function y=f(x,p) with parameters\
    \ p=(a,b,c). \"\"\"\n    return a * np.exp(- b * x) + c\n\n#create fake data\n\
    x = np.linspace(0, 4, 50)\ny = f(x, a=2.5, b=1.3, c=0.5)\n#add noise\nyi = y +\
    \ 0.2 * np.random.normal(size=len(x))\n\n#call curve fit function\npopt, pcov\
    \ = curve_fit(f, x, yi)\na, b, c = popt\nprint(\"Optimal parameters are a=%g,\
    \ b=%g, and c=%g\" % (a, b, c))\n\n#plotting\nimport pylab\nyfitted = f(x, *popt)\
    \   # equivalent to f(x, popt[0], popt[1], popt[2])\npylab.plot(x, yi, 'o', label='data\
    \ $y_i$')\npylab.plot(x, yfitted, '-', label='fit $f(x_i)$')\npylab.xlabel('x')\n\
    pylab.legend()\n```\n\n```\nOptimal parameters are a=2.61353, b=1.37987, and c=0.491754\n\
    ```\n\n注意，在上面的源代码中，我们通过 Python 代码定义了拟合函数 $y = f(x)$。因此，我们可以使用 `curve_fit` 方法拟合（几乎）任意函数。\n\
    \n`curve_fit` 函数返回一个元组 `popt`, `pcov`。第一个条目 `popt` 包含一个最优参数（OPTimal Parameters）的元组（在最小化方程\
    \ ([eq:1]) 的意义上）。第二个条目包含所有参数的协方差矩阵。对角线提供了参数估计的方差。\n\n为了使曲线拟合过程正常工作，Levenburg-Marquardt\
    \ 算法需要从最终参数的初始猜测开始拟合过程。如果未指定这些值（如上面的例子），则使用“1.0”作为初始猜测值。"
