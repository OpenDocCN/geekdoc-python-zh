  md: "# Introduction to Python for Computational Science and Engineering\n\nIt is\
    \ a common beginner's mistake to confuse the *printing* of values with *returning*\
    \ values. In the following example it is hard to see whether the function `math.sin`\
    \ returns a value or whether it prints the value:\n\n```\nimport math\nmath.sin(2)\n\
    ```\n\n```\n0.9092974268256817\n```\n\nWe import the `math` module, and call the\
    \ `math.sin` function with an argument of 2. The `math.sin(2)` call will actually\
    \ *return* the value 0.909... not print it. However, because we have not assigned\
    \ the return value to a variable, the Python prompt will print the returned object.\n\
    \nThe following alternative sequence works only if the value is returned:\n\n\
    ```\nx = math.sin(2)\nprint(x)\n```\n\n```\n0.9092974268256817\n```\n\nThe return\
    \ value of the function call `math.sin(2)` is assigned to the variable x, and\
    \ x is printed in the next line.\n\nGenerally, functions should execute \"silently\"\
    \ (i.e. not print anything) and report the result of their computation through\
    \ the return value.\n\nPart of the confusion about printed versus return values\
    \ at the Python prompt comes from the Python prompt printing (a representation)\
    \ of returned objects *if* the returned objects are not assigned. Generally, seeing\
    \ the returned objects is exactly what we want (as we normally care about the\
    \ returned object), just when learning Python this may cause mild confusion about\
    \ functions returning values or printing values.\n\n**Further information**\n\n\
    +   - Think Python has a gentle introduction to functions (on which the previous\
    \ paragraph is based) in chapter 3 (Functions) and chapter 6 (Fruitful functions).\n\
    \n# 7.3 Defining functions\n\nThe generic format of a function definitions:\n\n\
    ```\ndef my_function(arg1, arg2, ..., argn):\n    \"\"\"Optional docstring.\"\"\
    \"\n\n    # Implementation of the function\n\n    return result  # optional\n\n\
