    \ notation:\n\n```python\nfrom math import *\n```\n\nOnce again, this does not\
    \ introduce the name math into the current namespace. It does however introduce\
    \ *all public names* of the math module into the current namespace. Broadly speaking,\
    \ it is a bad idea to do this:\n\n- Lots of new names will be dumped into the\
    \ current namespace.\n- Are you sure they will not clobber any names already present?\n\
    - It will be very difficult to trace where these names came from\n- Having said\
    \ that, some modules (including ones in the standard library, recommend that they\
    \ be imported in this way). Use with caution!\n- This is fine for interactive\
    \ quick and dirty testing or small calculations.\n\n### 7.5.2 Creating modules\n\
    \nA module is in principle nothing else than a python file. We create an example\
    \ of a module file which is saved in module1.py:\n\n```python\n%%file module1.py\n\
    def someusefulfunction():\n    pass\n\nprint(\"My name is\", __name__)\n```\n\n\
    ```\nWriting module1.py\n```\n\nWe can execute this (module) file as a normal\
    \ python program (for example `python module1.py`):\n\n```python\n!python3 module1.py\n\
    ```\n\n```\nMy name is __main__\n```\n\nWe note that the Python magic variable\
    \ `__name__` takes the value `__main__` if the program file `module1.py` is executed.\n\
    \nOn the other hand, we can *import* `module1.py` in another file (which could\
    \ have the name `prog.py`), for example like this:\n\n```python\nimport module1\
    \           # in file prog.py\n```\n\n```\nMy name is module1\n```\n\nWhen Python\
    \ comes across the `import module1` statement in `prog.py`, it looks for the file\
    \ `module1.py` in the current working directory (and if it can't find it there\
    \ in all the directories in `sys.path`) and opens the file `module1.py`. While\
    \ parsing the file `module1.py` from top to bottom, it will add any function definitions\
    \ in this file into the `module1` name space in the calling context (that is the\
    \ main program in `prog.py`). It this example, there is only the function `someusefulfunction`.\
    \ Once the import process is completed, we can make use of `module1.someusefulfunction`\
    \ in `prog.py`. If Python comes across statements other than function (and class)\
    \ definitions while importing `module1.py`, it carries those out immediately.\
    \ In this case, it will thus come across the statement `print(My name is, __name__)`.\n\
    \nNote the difference to the output if we *import* `module1.py` rather than executing\
    \ it on its own: `__name__` inside a module takes the value of the module name\
    \ if the file is imported.\n\n### 7.5.3 Use of __name__\n\nIn summary,\n\n- `__name__`\
    \ is `__main__` if the module file is run on its own\n- `__name__` is the name\
    \ of the module (i.e. the module filename without the `.py` suffix) if the module\
    \ file is imported.\n\nWe can therefor use the following `if` statement in `module1.py`\
    \ to write code that is *only run* when the module is executed on its own: This\
    \ is useful to keep test programs or demonstrations of the abilities of a module\
    \ in this “conditional” main program. It is common practice for any module files\
    \ to have such a conditional main program which demonstrates its capabilities.\n\
    \n### 7.5.4 Example 1\n\nThe next example shows a main program for the another\
    \ file `vectools.py` that is used to demonstrate the capabilities of the functions\
    \ defined in that file:\n\n```python\n%%file vectools.py\nfrom __future__ import\
    \ division\nimport math\n\nimport numpy as N\n\ndef norm(x):\n    \"\"\"returns\
