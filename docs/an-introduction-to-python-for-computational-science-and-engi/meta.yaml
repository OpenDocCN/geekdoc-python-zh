    \  \"\"\"Given a function f and a tuple args containing\n    the arguments for\
    \ f, this function calls f(*args),\n    and measures and returns the execution\
    \ time in\n    seconds.\n\n    Return value is tuple: entry 0 is the time,\n \
    \   entry 1 is the return value of f.\"\"\"\n\n    starttime = time.time()\n \
    \   y = f(*args)    # use tuple args as input arguments\n    endtime = time.time()\n\
    \    return endtime - starttime, y\n\ndef forloop1(N):\n    s = 0\n    for i in\
    \ range(N):\n        s += float(i) * float(i)\n    return s\n\ndef forloop2(N):\n\
    \    y = [0] * N\n    for i in range(N):\n        y[i] = float(i) ** 2\n    return\
    \ sum(y)\n\ndef listcomp(N):\n    return sum([float(x) * x for x in range(N)])\n\
    \ndef numpy_(N):\n    return numpy.sum(numpy.arange(0, N, dtype='d') ** 2)\n\n\
    # main program starts\ntimings = []\nprint(\"N =\", N)\nforloop1_time, f1_res\
