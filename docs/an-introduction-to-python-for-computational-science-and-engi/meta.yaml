    # 12.1.9 Non linear equations


    Let''s solve a simple equation such as $x = x^2$. There are two obvious solutions:
    $x = 0$ and $x = 1$. How can we ask Sympy to compute these for us?


    ```

    import sympy

    x, y, z = sympy.symbols(''x, y, z'')    # create some symbols

    eq = x - x ** 2                        # define the equation

    ```


    ```

    sympy.solve(eq, x)                     # solve eq = 0

    ```


    [0, 1]


    The `solve()` function expects an expression that as meant to be solve so that
    it evaluates to zero. For our example, we rewrite $x = x^2$ as $x - x^2 = 0$ and
    then pass this to the solve function.


    Let''s repeat the same for the equation: $x = x^3$ and solve


    ```

    eq = x - x ** 3                        # define the equation

    sympy.solve(eq, x)                     # solve eq = 0

    ```


    [-1, 0, 1]'
