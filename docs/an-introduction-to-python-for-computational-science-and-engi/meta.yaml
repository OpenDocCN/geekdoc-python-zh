    # CHAPTER TWELVE


    # SYMBOLIC COMPUTATION


    # 12.1 SymPy


    In this section, we introduce some basic functionality of the SymPy (SYMBolic
    Python) library. In contrast to numerical computation (involving numbers), in
    symbolic calculation we are processing and transforming generic variables.

    The SymPy home page is https://www.sympy.org/, and provides the full (and up-to-date)
    documentation for this library.

    Symbolic calculation is very slow compared to floating point operation (see for
    example [symbolic calculation for decimals](13 Numeric Computation, Symbolic Calculation)),
    and thus generally not for direct simulation. However, it is a powerful tool to
    support the preparation of code and symbolic work. Occasionally, we use symbolic
