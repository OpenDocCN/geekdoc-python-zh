    \ which contains a value for every key - so we don't need to check that the lists\
    \ have the same length. (ii) we can access individual elements through the label\
    \ (using it as a key for the dictionary).\n\nThe Pandas Series object address\
    \ the requirments above. It is similar to a dictionary, but with improvements\
    \ for the given problem:\n\n+   - the order of the items is maintained\n- the\
    \ values have to have the same type (higher execution performance)"
