  md: "# 3.4.4 Performance considerations\n\nCall by value function calls require\
    \ copying of the value before it is passed to the function. From a performance\
    \ point of view (both execution time and memory requirements), this can be an\
    \ expensive process if the value is large. (Imagine the value is a `numpy.array`\
    \ object which could be several Megabytes or Gigabytes in size.)\n\nOne generally\
    \ prefers call by reference for large data objects as in this case only a pointer\
    \ to the data objects is passed, independent of the actual size of the object,\
    \ and thus this is generally faster than call-by-value.\n\nPython's approach of\
    \ (effectively) calling by reference is thus efficient. However, we need to be\
    \ careful that our function do not modify the data they have been given where\
    \ this is undesired.\n\n# 3.4.5 Inadvertent modification of data\n\nGenerally,\
    \ a function should not modify the data given as input to it.\n\nFor example,\
    \ the following code demonstrates the attempt to determine the maximum value of\
    \ a list, and – inadvertently – modifies the list in the process:\n\n```\ndef\
    \ mymax(s):  # demonstrating side effect\n    if len(s) == 0:\n        raise ValueError('mymax()\
    \ arg is an empty sequence')\n    elif len(s) == 1:\n        return s[0]\n   \
    \ else:\n        for i in range(1, len(s)):\n            if s[i] < s[i - 1]:\n\
    \                s[i] = s[i - 1]\n        return s[len(s) - 1]\n\ns = [-45, 3,\
    \ 6, 2, -1]\nprint(\"in main before calling mymax(s): s=%s\" % s)\nprint(\"mymax(s)=%s\"\
    \ % mymax(s))\nprint(\"in main after calling mymax(s): s=%s\" % s)\n```\n\n```\n\
    in main before calling mymax(s): s=[-45, 3, 6, 2, -1]\nmymax(s)=6\nin main after\
    \ calling mymax(s): s=[-45, 3, 6, 6, 6]\n```\n\nThe user of the `mymax()` function\
    \ would not expect that the input argument is modified when the function executes.\
    \ We should generally avoid this. There are several ways to find better solutions\
    \ to the given problem:\n\n+   - In this particular case, we could use the Python\
    \ in-built function `max()` to obtain the maximum value of a sequence.\n- If we\
    \ felt we need to stick to storing temporary values inside the list [this is actually\
    \ not necessary], we could create a copy of the incoming list `s` first, and then\
    \ proceed with the algorithm (see *below* on Copying objects).\n- Use another\
    \ algorithm which uses an extra temporary variable rather than abusing the list\
    \ for this. For example:\n- We could pass a tuple (instead of a list) to the function:\
    \ a tuple is *immutable* and can thus never be modified (this would result in\
    \ an exception being raised when the function tries to write to elements in the\
    \ tuple)."
