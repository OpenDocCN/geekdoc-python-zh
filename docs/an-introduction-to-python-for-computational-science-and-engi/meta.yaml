    \ Next, Python *binds a name to the object*. The name is `x`, and we often refer\
    \ casually to `x` as a variable, an object, or even the value 0.5. However, technically,\
    \ `x` is a name that is bound to the object `0.5`. Another way to say this is\
    \ that `x` is a reference to the object.\n\nWhile it is often sufficient to think\
    \ about assigning 0.5 to a variable `x`, there are situations where we need to\
    \ remember what actually happens. In particular, when we pass references to objects\
    \ to functions, we need to realise that the function may operate on the object\
    \ (rather than a copy of the object). This is discussed in more detail in *the\
    \ next chapter*.\n\n# 2.6 Impossible equations\n\nIn computer programs we often\
