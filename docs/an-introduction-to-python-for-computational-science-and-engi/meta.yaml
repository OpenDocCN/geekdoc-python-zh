    \n### 16.3 数值积分\n\nScientific Python 提供了许多积分例程。一个用于求解如下类型积分 $I$ 的通用工具\n\n$$I =\
    \ \\int_{a}^{b} f(x)dx$$\n\n由 `scipy.integrate` 模块的 `quad()` 函数提供。\n它接受要积分的函数\
