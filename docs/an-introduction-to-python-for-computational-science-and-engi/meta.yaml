    \n**Comments? Questions?**\n\nFor feedback, corrections, and questions please\
    \ refer to the home page (https://github.com/fangohr/introduction-to-python-for-computational-science-and-engineering/blob/master/Readme.md)\
    \ of the book. You can also find the most recent versions there.\n\nEnjoy!\n\n\
    # CHAPTER ONE\n\n## INTRODUCTION\n\nThis text summarises a number of core ideas\
    \ relevant to Computational Engineering and Scientific Computing using Python.\
    \ The emphasis is on introducing some basic Python (programming) concepts that\
    \ are relevant for numerical algorithms. The later chapters touch upon numerical\
    \ libraries such as `numpy` and `scipy` each of which deserves much more space\
    \ than provided here. We aim to enable the reader to learn independently how to\
    \ use other functionality of these libraries using the available documentation\
    \ (online and through the packages itself).\n\n### 1.1 Computational Modelling\n\
    \n#### 1.1.1 Introduction\n\nIncreasingly, processes and systems are researched\
    \ or developed through computer simulations: new aircraft prototypes such as for\
    \ the recent A380 are first designed and tested virtually through computer simulations.\
    \ With the ever increasing computational power available through supercomputers,\
    \ clusters of computers and even desktop and laptop machines, this trend is likely\
    \ to continue.\n\nComputer simulations are routinely used in fundamental research\
    \ to help understand experimental measurements, and to replace – for example –\
    \ growth and fabrication of expensive samples/experiments where possible. In an\
    \ industrial context, product and device design can often be done much more cost\
    \ effectively if carried out virtually through simulation rather than through\
    \ building and testing prototypes. This is in particular so in areas where samples\
    \ are expensive such as nanoscience (where it is expensive to create small things)\
    \ and aerospace industry (where it is expensive to build large things). There\
    \ are also situations where certain experiments can only be carried out virtually\
    \ (ranging from astrophysics to study of effects of large scale nuclear or chemical\
    \ accidents). Computational modelling, including use of computational tools to\
    \ post-process, analyse and visualise data, has been used in engineering, physics\
    \ and chemistry for many decades but is becoming more important due to the cheap\
    \ availability of computational resources. Computational Modelling is also starting\
    \ to play a more important role in studies of biological systems, the economy,\
    \ archeology, medicine, health care, and many other domains.\n\n#### 1.1.2 Computational\
    \ Modelling\n\nTo study a process with a computer simulation we distinguish two\
    \ steps: the first one is to develop a *model* of the real system. When studying\
    \ the motion of a small object, such as a penny, say, under the influence of gravity,\
    \ we may be able to ignore friction of air: our model — which might only consider\
    \ the gravitational force and the penny’s inertia, i.e. $a(t) = F/m = -9.81\\\
    text{m/s}^2$ — is an approximation of the real system. The model will normally\
    \ allow us to express the behaviour of the system (in some approximated form)\
    \ through mathematical equations, which often involve ordinary differential equations\
    \ (ODEs) or partial differential equations (PDEs).\n\nIn the natural sciences\
    \ such as physics, chemistry and related engineering, it is often not so difficult\
    \ to find a suitable model, although the resulting equations tend to be very difficult\
    \ to solve, and can in most cases not be solved analytically at all.\n\nOn the\
    \ other hand, in subjects that are not as well described through a mathematical\
    \ framework and depend on behaviour of objects whose actions are impossible to\
    \ predict deterministically (such as humans), it is much more difficult to find\
    \ a good model to describe reality. As a rule of thumb, in these disciplines the\
    \ resulting equations are easier to solve, but they are harder to find and the\
    \ validity of a model needs to be questioned much more. Typical examples are attempts\
    \ to simulate the economy, the use of global resources, the behaviour of a panicking\
    \ crowd, etc.\n\nSo far, we have just discussed the development of *models* to\
    \ describe reality, and using these models does not necessarily involve any computers\
    \ or numerical work at all. In fact, if a model's equation can be solved analytically,\
    \ then one should do this and write down the solution to the equation.\n\nIn practice,\
    \ hardly any model equations of systems of interest can be solved analytically,\
    \ and this is where the computer comes in: using numerical methods, we can at\
    \ least study the model *for a particular set of boundary conditions*. For the\
    \ example considered above, we may not be able to easily see from a numerical\
    \ solution that the penny's velocity under the influence of gravity will change\
    \ linearly with time (which we can read easily from the analytical solution that\
    \ is available for this simple system: $v(t) = t \\cdot 9.81\\mathrm{m/s^2} +\
    \ v_0$)).\n\nThe numerical solution that can be computed using a computer would\
    \ consist of data that shows how the velocity changes over time for a particular\
    \ initial velocity v0 (v0 is a boundary condition here). The computer program\
    \ would report a long lists of two numbers keeping the (i) value of time $t_i$\
    \ for which a particular (ii) value of the velocity $v_i$ has been computed. By\
    \ plotting all $v_i$ against $t_i$, or by fitting a curve through the data, we\
    \ may be able to understand the trend from the data (which we can just see from\
    \ the analytical solution of course).\n\nIt is clearly desirable to find an analytical\
    \ solutions wherever possible but the number of problems where this is possible\
    \ is small. Usually, the obtaining numerical result of a computer simulation is\
    \ very useful (despite the shortcomings of the numerical results in comparison\
    \ to an analytical expression) because it is the only possible way to study the\
    \ system at all.\n\nThe name *computational modelling* derives from the two steps:\
    \ (i) *modelling*, i.e. finding a model description of a real system, and (ii)\
    \ solving the resulting model equations using *computational* methods because\
    \ this is the only way the equations can be solved at all.\n\n#### 1.1.3 Programming\
    \ to support computational modelling\n\nA large number of packages exist that\
    \ provide computational modelling capabilities. If these satisfy the research\
    \ or design needs, and any data processing and visualisation is appropriately\
    \ supported through existing tools, one can carry out computational modelling\
    \ studies without any deeper programming knowledge.\n\nIn a research environment\
    \ – both in academia and research on new products/ideas/... in industry – one\
    \ often reaches a point where existing packages will not be able to perform a\
    \ required simulation task, or where more can be learned from analysing existing\
    \ data in news ways etc.\n\nAt that point, programming skills are required. It\
    \ is also generally useful to have a broad understanding of the building blocks\
    \ of software and basic ideas of software engineering as we use more and more\
    \ devices that are software-controlled.\n\nIt is often forgotten that there is\
    \ nothing the computer can do that we as humans cannot do. The computer can do\
    \ it much faster, though, and also with making far fewer mistakes. There is thus\
    \ no magic in computations a computer carries out: they could have been done by\
    \ humans, and – in fact – were for many years (see for example Wikipedia entry\
    \ on [Human Computer](https://en.wikipedia.org/wiki/Human_computer)).\n\nUnderstanding\
    \ how to build a computer simulation comes roughly down to: (i) finding the model\
    \ (often this means finding the right equations), (ii) knowing how to solve these\
    \ equations numerically, (ii) to implement the methods to compute these solutions\
    \ (this is the programming bit)."
