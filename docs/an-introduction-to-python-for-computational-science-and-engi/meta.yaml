    \ and profit. Optimisation routines typically provide a method to minimise a given\
    \ function: if we need to maximise $f(x)$ we create a new function $g(x)$ that\
    \ reverses the sign of $f$, i.e. $g(x) = -f(x)$ and we minimise $g(x)$.\n\nBelow,\
    \ we provide an example showing (i) the definition of the test function and (ii)\
    \ the call of the `scipy.optimize.fmin` function which takes as argument a function\
    \ $f$ to minimise and an initial value $x0$ from which to start the search for\
    \ the minimum, and which returns the value of $x$ for which $f(x)$ is (locally)\
    \ minimised. Typically, the search for the minimum is a local search, i.e. the\
    \ algorithm follows the local gradient. We repeat the search for the minimum for\
    \ two values ($x0 = 1.0$ and $x0 = 2.0$, respectively) to demonstrate that depending\
    \ on the starting value we may find different minima of the function $f$.\n\n\
    The majority of the commands (after the two calls to `fmin`) in the file `fmin1.py`\
    \ creates the plot of the function, the start points for the searches and the\
    \ minima obtained:\n\n```\npython\nfrom numpy import arange, cos, exp\nfrom scipy.optimize\
