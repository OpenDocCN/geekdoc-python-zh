    \       [0., 0., 0., 0.],\n       [0., 0., 0., 0.]])\n```\n\n矩阵的“形状”可以这样查询（这里我们有2行3列）：\n\
    \n```python\nx = np.array([[1, 2, 3], [4, 5, 6]])\nprint(x)\nx.shape\n```\n\n\
