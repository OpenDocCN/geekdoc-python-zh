  - '[PAGE 247]


    # Introduction to Python for Computational Science and Engineering


    # 18.2.2 Activating a virtual environment


    To activate the virtual environment, we need to know in which folder it is installed
    (in our case in `myvirtualenv`). On Linux and OSX, we run the following shell
    command:


    ```

    !source myvirtualenv/bin/activate

    ```


    This changes the `PATH` variable, which the operating system uses search for the
    `python` executable: it puts the directory that contains the python interpreter
    in our virtual envirnomnent to the beginning of the PATH valiabl. We can check
    that this works, by using the `which` command again:


    ```

    !source myvirtualenv/bin/activate && which python

    ```


    ```

    /Users/fangohr/git/introduction-to-python-for-computational-science-and-engineering/book/myvirtualenv/bin/python

    ```


    (As outlined in the introduction, the repitition of the `activate` command is
    only necessary because we work from a Notebook here: if you go through these steps
    in a shell, you can ignore this, and write `which python` straight away.)


    # 18.2.3 Using the virtual environment


    Once we have activated the virtual envirnoment, we can use it as we would use
    the default Python environment provided on the system.


    For example to install some Python packages.


    # 18.2.4 Name of the virtual environment


    We have used `myvirtualenv` as the name of the virtual environment. In general,
    the name can be chosen freely. Commonly used names include `env` or `venv`. Ocasionaly,
    the environment is installed in a hidden subdirectory (such as `.env` or `.venv`).


    We have not used the `venv` name for pedagogical to avoid confusion with the `venv`
    module.


    # 18.3 Python Package Index (PyPI)


    The Python Package Index provides a searchable web interface (https://pypi.org)
    that provides all Python packages registered with PyPI.


    PyPI is the standard way of distributing (open source) python packages, and commonly
    used in science and engineering as well.'
