    potato       0.17\nName: price, dtype: float64\n```\n\n# 17.7.4 Extracting rows\
    \ of data\n\nWe have two options of extracting a row of data.\nFirst, explicit\
    \ indexing using the label of the index in that row:\n\n```\nshop.loc['apple']\
    \            # single row is returned as series\n```\n\n```\nstock    10.00\n\
    price     0.55\nName: apple, dtype: float64\n```\n\n```\nshop.loc['banana':'cucumber']\
    \  # multiple rows are returned as DataFrame\n```\n\n```\n          stock  price\n\
    banana      22   0.50\ncucumber     1   0.99\n```\n\nSecond, we can use the implicit\
    \ indexing (as for Series objects):\n\n```\nshop.iloc[0]\n```\n\n```\nstock  \
    \  10.00\nprice     0.55\nName: apple, dtype: float64\n```\n\n```\nshop.iloc[1:3]\n\
