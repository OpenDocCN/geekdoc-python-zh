    \n### 1.4.1 %%file 魔术命令\n\n我们使用notebook中的一些特性，此时值得了解：一个以特殊命令`%%file FILENAME`开头的单元格将创建（或覆盖）一个名为`FILENAME`的文件，其内容为该单元格下方显示的内容。\n\
