    \n也提供了一些对 3d 图的支持：https://matplotlib.org/stable/gallery/index.html#d-plotting\n\
    \n## 15.3.5 如何学习使用 Matplotlib？\n\n一个常见的策略是浏览 https://matplotlib.org/stable/gallery\
    \ 上的示例，找到与所需图表相似的图表，然后修改给定的示例代码。在此过程中，通过阅读文档来学习示例中使用的命令可能是值得的。\n\n## 15.4 Visual\
    \ Python\n\nVisual Python 是一个 Python 模块，它使得创建和动画化三维场景变得相当容易。\n更多信息：\n\n- Visual\
    \ Python 主页\n- Visual Python 文档（解释所有对象及其所有参数）\n\n介绍 Visual Python 的短视频：\n\n- Shawn\
    \ Weatherford, Jeff Polak (Ruth Chabay 的学生): https://www.youtube.com/vpythonvideos\n\
    \n## 15.4.1 基础、旋转和缩放\n\n这是一个示例，展示了如何在两个不同位置创建一个红色和一个蓝色球体，以及一个平面盒子（vpythondemo1.py）：\n\
    \n```python\nimport visual\nsphere1 = visual.sphere(pos=[0, 0, 0], color=visual.color.blue)\n\
    sphere2 = visual.sphere(pos=[5, 0, 0], color=visual.color.red, radius=2)\nbase\
    \ = visual.box(pos=(0, -2, 0), length=8, height=0.1, width=10)\n```\n\n一旦你创建了这样的\
    \ Visual Python 场景，你可以\n\n- 通过按住鼠标右键并移动鼠标来旋转场景\n- 通过按住鼠标中键（可能是滚轮）并上下移动鼠标来放大和缩小。（在某些（Windows？）安装中，需要同时按住鼠标左键和右键，然后上下移动鼠标来缩放。）\n\
    \n## 15.4.2 为动画设置帧率\n\nVisual Python 的一个特别优势是其显示时间相关数据的能力：\n\n- 一个非常有用的命令是 `rate()`\
    \ 命令，它确保循环仅以特定的帧率执行。这是一个每秒恰好打印两次 \"Hello World\" 的示例（vpythondemo2.py）：\n\n```python\n\
    import visual\n\nfor i in range(10):\n    visual.rate(2)\n    print(\"Hello World\
    \ (0.5 seconds per line)\")\n```\n\n- 所有 Visual Python 对象（如上面示例中的球体和盒子）都有一个 `.pos`\
    \ 属性，该属性包含对象（[球体，盒子]的中心或[圆柱体，螺旋体]的一端）的位置。这是一个显示球体上下移动的示例（vpythondemo3.py）：\n\n\
    ```python\nimport visual, math\n\nball = visual.sphere()\nbox = visual.box( pos=[0,-1,0],\
    \ width=4, length=4, height=0.5 )\n\n#tell visual not to automatically scale the\
    \ image\nvisual.scene.autoscale = False\n\nfor i in range(1000):\n    t = i*0.1\n\
    \    y = math.sin(t)\n\n    #update the ball's position\n    ball.pos = [0, y,\
    \ 0]\n\n    #ensure we have only 24 frames per second\n    visual.rate(24)\n```"
