    # call quad to integrate f from -2 to 2\nres, err = quad(f, -2, 2)\n\nprint(\"\
    The numerical result is {:f} (+-{:g})\"\n      .format(res, err))\n```\n\nThe\
    \ numerical result is 17.864264 (+-1.55117e-11)\n\nNote that `quad()` takes optional\
    \ parameters `epsabs` and `epsrel` to increase or decrease the accuracy of its\
    \ computation. (Use `help(quad)` to learn more.) The default values are `epsabs=1.5e-8`\
    \ and `epsrel=1.5e-8`. For the next exercise, the default values are sufficient.\n\
    \n## 16.3.1 Exercise: integrate a function\n\n1.  Using scipy's `quad` function,\
    \ write a program that solves the following integral numerically: $I = \\int_0^1\
    \ \\cos(2\\pi x)dx$.\n2.  Find the analytical integral and compare it with the\
    \ numerical solution.\n3.  Why is it important to have an estimate of the accuracy\
    \ (or the error) of the numerical integral?\n\n## 16.3.2 Exercise: plot before\
    \ you integrate\n\nIt is good practice to plot the integrand function to check\
    \ whether it is “well behaved” before you attempt to integrate. Singularities\
    \ (i.e. $x$ values where the $f(x)$ tends towards minus or plus infinity) or other\
    \ irregular behaviour (such as $f(x) = \\sin(\\frac{1}{x})$ close to $x = 0$ are\
    \ difficult to handle numerically.\n\n1.  Write a function with name `plotquad`\
    \ which takes the same arguments as the `quad` command (i.e. $f$, $a$ and $b$)\
    \ and which\n    * (i) creates a plot of the integrand $f(x)$ and\n    * (ii)\
    \ computes the integral numerically using the `quad` function. The return values\
    \ should be as for the `quad` function.\n\n```python\n%matplotlib inline\n# settings\
    \ for jupyter book: svg for html version, high-resolution png for pdf\nimport\
    \ matplotlib_inline\nmatplotlib_inline.backend_inline.set_matplotlib_formats('svg',\
    \ 'png')\n# from IPython.display import set_matplotlib_formats\n# set_matplotlib_formats('svg',\
    \ 'png')\nimport matplotlib as mpl\nmpl.rcParams['figure.dpi'] = 400\n```\n\n\
    ## 16.4 Solving Ordinary Differential Equations (ODEs)\n\nTo solve an ordinary\
    \ differential equation of the type $\\frac{dy}{dt}(t) = f(t, y)$ with a given\
    \ $y(t_0) = y_0$, we can use scipy's `solve_ivp` function. Here is a (self explaining)\
    \ example program (usesolve_ivp.py) to find\n\n$y(t)$ for $t \\in [0, 2]$\n\n\
    given this differential equation: $\\frac{dy}{dt}(t) = -2yt$ with $y(0) = 1.$\n\
    \n```python\nfrom scipy.integrate import solve_ivp\nimport numpy as np\n\ndef\
    \ f(t, y):\n    \"\"\"this is the rhs of the ODE to integrate, i.e. dy/dt=f(y,t)\"\
    \"\"\n    return -2 * y * t\n\ny0 = [1]           # initial value y0=y(t0)\nt0\
    \ = 0             # integration limits for t: start at t0=0\ntf = 2          \
    \   # and finish at tf=2\n\nsol = solve_ivp(fun=f, t_span=[t0, tf], y0=y0)  #\
    \ computation of SOLution\n\nimport pylab           # plotting of results\npylab.plot(sol.t,\
    \ sol.y[0], 'o-')\npylab.xlabel('t'); pylab.ylabel('y(t)')\n```\n\nText(0, 0.5,\
    \ 'y(t)')\n\n![](img/311265a3784c8b1302bbc7bfff8d0ca5_192_0.png)\n\nWe have not\
    \ given the `solve_ivp` command any guidance for which values of $t$ we would\
    \ like to know the solution $y(t)$: we have only specified that $t_0 = 0$ and\
    \ that we would like to know the solution between $t_0 = 0$ and $t_y = 2$. The\
    \ solver itself has determined the number of required function evaluations, and\
    \ returns the corresponding values in `sol.t` and `sol.y[0]`.\n\nWe can obtain\
    \ more data points in a number of ways:\n\n1.  Increase the default error tolerance.\
    \ The relative tolerance (`rtol`) and absolute tolerance (`atol`) default to 1e-3\
    \ each. If we increase them, we typically enforce the use of a larger number of\
    \ intermediate points:\n\n```python\nsol = solve_ivp(fun=f, t_span=[t0, tf], y0=y0,\
    \ atol=1e-8, rtol=1e-8)\n\npylab.plot(sol.t, sol.y[0], '.')\npylab.xlabel('t');\
    \ pylab.ylabel('y(t)')\n```\n\nText(0, 0.5, 'y(t)')\n\n![](img/311265a3784c8b1302bbc7bfff8d0ca5_193_0.png)\n\
    \n2.  We can also prescribe the precise locations for which we like to know the\
    \ solutions $y(t)$:\n\n```python\ny0 = [1]            # initial value\nt0 = 0\
    \              # integration limits for t\ntf = 2\nts = np.linspace(t0, tf, 100)\
    \  # 100 points between t0 and tf\n\nsol = solve_ivp(fun=f, t_span=[t0, tf], y0=y0,\
    \ t_eval=ts)\n\npylab.plot(sol.t, sol.y[0], '.')\npylab.xlabel('t'); pylab.ylabel('y(t)')\n\
    ```\n\nText(0, 0.5, 'y(t)')\n\n![](img/311265a3784c8b1302bbc7bfff8d0ca5_194_0.png)\n\
    \nIf we use `t_eval` - and thus request values of the solution at particular points\
    \ - `solve_ivp` will not generally change the way it computes the solution, but\
    \ rather use interpolation to map the way it has internally computed the solution\
    \ to the values of t for which we would like to know the solution. There is thus\
    \ no (significant) computational penalty if we use `t_eval` to get smoother looking\
    \ plots.\n\nThe `solve_ivp` command returns a `OdeResult` object, which we have\
    \ called `sol` in the example above.\n\n```python\ntype(sol)\n```\n\n```\nscipy.integrate._ivp.ivp.OdeResult\n\
    ```\n\nWe have already seen that the solution can be found in `sol.y` and `sol.t`:\n\
