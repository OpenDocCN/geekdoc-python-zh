    # 15.2.3 Interactive mode


    Pylab can be run in two modes:


    +   - non-interactive (this is the default)

    - interactive.


    In non-interactive mode, no plots will be displayed until the `show()` command
    has been issued. In this mode, the `show()` command should be the last statement
    of your program.


    In interactive mode, plots will be immediately displayed after the plot command
    has been issued.


    One can switch the interactive mode on using `pylab.ion()` and off using `pylab.ioff()`.
    IPython''s `%matplotlib` magic also enables interactive mode.


    If you use Jupyter notebooks with inline plots, then this feature is not so relevant.


    # 15.3 The matplotlib.pyplot interface


    This is the recommended way to use matplotlib for producing publication quality
    plots, or anything that needs some fine tuning: the object oriented approach of
    the `pyplot` interface makes it generally easier to tailor the plots that the
    state-driven `pylab` interface.


    The central two commands to create `pyplot` figures are:


    +   1. Create a figure object, and one (or more) axes objects within the figure.

    2. Create some drawing inside the axes object.


    Here is an example:


    ```

    import numpy as np

    import matplotlib.pyplot as plt


    xs = np.linspace(0, 10, 100)

    ys = np.sin(xs)


    fig, ax = plt.subplots()

    ax.plot(xs, ys)

    ```


    [<matplotlib.lines.Line2D at 0x7f11fc3d63d0>]'
