  md: "# CHAPTER SEVENTEEN\n\n# PANDAS - DATA SCIENCE WITH PYTHON\n\nNumpy and numpy\
    \ arrays are our tool of choice for numeric data that resembles vectors, matrices\
    \ (and higher dimensional tensors).\n\nWhere data is gathered from experiments,\
    \ and in particular where we want to extract meaning from the combination of different\
    \ data sources, and where data is often incomplete, the pandas library offers\
    \ a number of useful tools (and has become a standard tool for data scientists).\n\
    \nIn this section, we introduce the basics of Pandas.\n\nIn particular, we introduce\
    \ the two key data types in Pandas: the `Series` and the `DataFrame` objects.\n\
    \nBy convention, the `pandas` library is imported under the name `pd` (the same\
    \ way that `numpy` is imported under the name `np`:\n\n```\nimport pandas as pd\n\
    ```\n\n# 17.1 Motivational example (Series)\n\nImagine we are working on software\
    \ for a greengrocer or supermarket, and need to track the number of apples (10),\
    \ oranges(3) and bananas (22) that are available in the supermarket.\n\nWe could\
    \ use a python list (or a numpy array) to track these numbers:\n\n```\nstock =\
    \ [10, 3, 22]\n```\n\nHowever, we would need to remember separately that the entries\
    \ are in the order of apples, oranges, and bananas. This could be achieved through\
    \ a second list:\n\n```\nstocklabels = ['apple', 'orange', 'banana']\n```\n\n\
    ```\nassert len(stocklabels) == len(stock)  # check labels and\n             \
    \                           # stock are consistent\nfor label, count in zip(stocklabels,\
    \ stock):\n    print(f'{label:10s} : {count:4d}')\n```\n\n```\napple      :  \
    \ 10\norange     :    3\nbanana     :   22\n```"
  merge: -1
  pgno: 212
- img_proc: true
  md: "# Introduction to Python for Computational Science and Engineering\n\nThe above\
    \ 2-list solution is a little awkward in two ways: firstly, we have use two lists\
    \ to describe one set of data (and thus need to be carefully to update them simultatenously,\
    \ for example), and secondly, the access to the data given a label is inconvenient:\
    \ We need to find the index of the label with one list, then use this as the index\
    \ to the other list, for example\n\n```\nindex = stocklabels.index('banana')\n\
    bananas = stock[index]\nprint(f\"There are {bananas} bananas [index={index}].\"\
    )\n```\n\n```\nThere are 22 bananas [index=2].\n```\n\nWe have come across similar\
    \ examples in the section on dictionaries, and indeed a dictionary is a more convenient\
    \ solution:\n\n```\nstock_dic = {'apple': 10,\n            'orange': 3,\n    \
    \        'banana': 22}\n```\n\nIn a way, the keys of the dictionary contain the\
    \ stock labels and the values contain the actual values:\n\n```\nstock_dic.keys()\n\
    ```\n\n```\ndict_keys(['apple', 'orange', 'banana'])\n```\n\n```\nstock_dic.values()\n\
    ```\n\n```\ndict_values([10, 3, 22])\n```\n\nTo retrieve (or change) the value\
    \ for `apple`, we use `apple` as the key and retrieve the value through the dictionary's\
    \ indexing notation:\n\n```\nstock_dic['apple']\n```\n\n```\n10\n```\n\nAnd we\
    \ can summarise the stock as follows:\n\n```\nfor label in stock_dic:\n    print(f'{label:10s}\
    \ : {stock_dic[label]:4d}')\n```\n\n```\napple      :   10\norange     :    3\n\
    banana     :   22\n```\n\nThis is a vast improvement over the 2-lists solution:\
    \ (i) we only maintain one structure, which contains a value for every key - so\
    \ we don't need to check that the lists have the same length. (ii) we can access\
    \ individual elements through the label (using it as a key for the dictionary).\n\
    \nThe Pandas Series object address the requirments above. It is similar to a dictionary,\
    \ but with improvements for the given problem:\n\n+   - the order of the items\
    \ is maintained\n- the values have to have the same type (higher execution performance)"
  merge: -1
