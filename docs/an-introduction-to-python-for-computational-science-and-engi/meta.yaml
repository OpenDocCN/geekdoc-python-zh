  md: "# Introduction to Python for Computational Science and Engineering\n\n+   -\
    \ Existing numerical C/Fortran libraries can be interfaced to be usable from within\
    \ Python (using for example Swig, Boost.Python and Cython).\n- Python can be extended\
    \ through compiled languages if the computationally demanding part of the problem\
    \ is algorithmically non-standard and no existing libraries can be used.\n\nCommonly\
    \ used are C, Fortran and C++ to implement fast extensions.\n\n+   - We list some\
    \ tools that are used to use compiled code from Python:\n    - The `scipy.weave`\
    \ extension is useful if just a short expression needs to be expressed in C.\n\
    \    - The Cython interface is growing in popularity to (i) semi-automatically\
    \ declare variable types in Python code, to translate that code to C (automatically)\
    \ and to then use the compiled C code from Python. Cython is also used to quickly\
    \ wrap an existing C library with an interface so the C library can be used from\
    \ Python.\n    - Boost.Python is specialised for wrapping C++ code in Python.\n\
    \n> The conclusion is that Python is “fast enough” for most computational tasks,\
    \ and that its user friendly high-level language often makes up for reduced speed\
    \ in comparison to compiled lower-level languages. Combining Python with tailor-written\
    \ compiled code for the performance critical parts of the code, results in virtually\
    \ optimal speed in most cases.\n\n# 1.2.1 Optimisation strategies\n\nWe generally\
    \ understand reduction of execution time when discussing “code optimisation” in\
    \ the context of computational modelling, and we essentially like to carry out\
    \ the required calculations as fast as possible. (Sometimes we need to reduce\
    \ the amount of RAM, the amount of data input output to disk or the network.)\
    \ At the same time, we need to make sure that we do not invest inappropriate amounts\
    \ of programming time to achieve this speed up: as always there needs to be a\
    \ balance between the programmers’ time and the improvement we can gain from this.\n\
    \n# 1.2.2 Get it right first, then make it fast\n\nTo write fast code effectively,\
    \ we note that the right order is to (i) first write a program that carries out\
    \ the correct calculation. For this, choose a language/approach that allows you\
    \ to *write the code quickly and make it work quickly* — regardless of execution\
    \ speed. Then (ii) either change the program or re-write it from scratch in the\
    \ same language to make the execution faster. During the process, keep comparing\
    \ results with the slow version written first to make sure the optimisation does\
    \ not introduce errors. (Once we are familiar with the concept of regression tests,\
    \ they should be used here to compare the new and hopefully faster code with the\
    \ original code.)\n\nA common pattern in Python is to start writing pure Python\
    \ code, then start using Python libraries that use compiled code internally (such\
    \ as the fast arrays Numpy provides, and routines from scipy that go back to established\
    \ numerical codes such as ODEPACK, LAPACK and others). If required, one can –\
    \ after careful profiling – start to replace parts of the Python code with a compiled\
    \ language such as C and Fortran to improve execution speed further (as discussed\
    \ above).\n\n# 1.2.3 Prototyping in Python\n\nIt turns out that – even if a particular\
    \ code has to be written in, say, C++ – it is (often) more time efficient to prototype\
    \ the code in Python, and once an appropriate design (and class structure) has\
    \ been found, to translate the code to C++."
