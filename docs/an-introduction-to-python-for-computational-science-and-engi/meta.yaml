    \ this may read:\n\n```\nm = (x + y) / 2\n```\n\nSuppose this is tested with $x\
    \ = 0.5$, $y = 0.5$, then the line above computes the correct answers $m = 0.5$\
    \ (because $0.5 + 0.5 = 1.0$, i.e. a 1.0 is a floating point number, and thus\
    \ $1.0/2$ evaluates to $0.5$). Or we could use $x = 10$, $y = 30$, and because\
    \ $10 + 30 = 40$ and $40/2$ evaluates to 20, we get the correct answer $m = 20$.\
    \ However, if the integers $x = 0$ and $y = 1$ would come up, then the code returns\
