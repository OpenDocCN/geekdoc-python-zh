    We can create a virtual environment using this command


    ```

    !python -m venv myvirtualenv

    ```


    This command creates a subdirectory with name `myvirtualenv` in the current directory
    which contains the new virtual environment:


    ```

    !ls -dl myvirtualenv/

    ```


    ```

    drwxr-xr-x  6 fangohr  staff  192 Jan  4 16:03 myvirtualenv/

    ```


    The virtual environment will use the same Python interpreter that we have used
    above when creating it. On Linux/OSX system, we can find out which interpreter
    this is by using the `which` command:


    ```

    !which python

    ```


    ```

    /Users/fangohr/anaconda3/bin/python

    ```


    If the basics are sufficient for you, you can skip to the next section about activating
    a virtual environment.

    We also be more specific, and choose a particular Python interpreter when using
    the `-m venv` command to force use of a particular python version. On a Mac (OSX),
    if python3 was installed via brew, there is a python executable in `/usr/local/bin/python3`.
    To force creation of a virtual environment using this interpreter, we could use


    ```

    /usr/local/bin/python3 -m venv myvirtualenv

    ```


    There is no need to know what is happening inside this folder, but as we are curious,
    we''ll have a very brief look anyway:


    ```

    !ls myvirtualenv/

    ```


    ```

    bin        include    lib        pyvenv.cfg

    ```


    The `pyvenv.cfg` file contains information about the Python interpreter we are
    using


    ```

