- md: "## Introduction to Python for Computational Science and Engineering\n\n```python\n\
    # NBVAL_IGNORE_OUTPUT\nhelp(math.sqrt)\n```\n\n```\nHelp on built-in function\
    \ sqrt in module math:\n\nsqrt(...)\n    sqrt(x)\n\n    Return the square root\
    \ of x.\n```\n\n```python\n# NBVAL_IGNORE_OUTPUT\nimport math\nhelp(math.sqrt)\n\
    ```\n\n```\nHelp on built-in function sqrt in module math:\n\nsqrt(...)\n    sqrt(x)\n\
    \n    Return the square root of x.\n```\n\nInstead of importing the module, we\
    \ could also have given the *string* of `math.sqrt` to the help function, i.e.:\n\
    \n```python\n# NBVAL_IGNORE_OUTPUT\nhelp('math.sqrt')\n```\n\n```\nHelp on built-in\
    \ function sqrt in math:\n\nmath.sqrt = sqrt(...)\n    sqrt(x)\n\n    Return the\
    \ square root of x.\n```\n\n`help` is a function which gives information about\
    \ the object which is passed as its argument. Most things in Python (classes,\
    \ functions, modules, etc.) are objects, and therefore can be passed to help.\
    \ There are, however, some things on which you might like to ask for help, which\
    \ are not existing Python objects. In such cases it is often possible to pass\
    \ a string containing the name of the thing or concept to help, for example\n\n\
    - `help('modules')` will generate a list of all modules which can be imported\
    \ into the current interpreter. Note that `help(modules)` (note absence of quotes)\
    \ will result in a NameError (unless you are unlucky enough to have a variable\
    \ called modules floating around, in which case you will get help on whatever\
    \ that variable happens to refer to.)\n- `help('some_module')`, where `some_module`\
    \ is a module which has not been imported yet (and therefore isn't an object yet),\
    \ will give you that module's help information.\n- `help('some_keyword')`: For\
    \ example `and`, `if` or `print` (i.e. `help('and')`, `help('if')` and `help('print')`).\
    \ These are special words recognized by Python: they are not objects and thus\
    \ cannot be passed as arguments to help. Passing the name of the keyword as a\
    \ string to help works, but only if you have Python's HTML documentation installed,\
    \ and the interpreter has been made aware of its location by setting the environment\
    \ variable PYTHONDOCS.\n\n## 4.5 Docstrings\n\nThe command `help(<object>)` accesses\
    \ the documentation strings of objects.\nAny literal string appearing as the first\
    \ item in the definition of a class, function, method or module, is taken to be\
    \ its *docstring*.\n`help` includes the docstring in the information it displays\
    \ about the object.\nIn addition to the docstring it may display some other information,\
    \ for example, in the case of functions, it displays the function's signature.\n\
    The docstring is stored in the object's `__doc__` attribute.\n\n```python\n# NBVAL_IGNORE_OUTPUT\n\
    help(math.sin)\n```\n\n```\nHelp on built-in function sin in module math:\n\n\
    sin(...)\n    sin(x)\n\n    Return the sine of x (measured in radians).\n```\n\
    \n```python\n# NBVAL_IGNORE_OUTPUT\nprint(math.sin.__doc__)\n```\n\n```\nsin(x)\n\
    \nReturn the sine of x (measured in radians).\n```\n\nFor user-defined functions,\
    \ classes, types, modules, ...), one should always provide a docstring.\nDocumenting\
    \ a user-provided function:\n\n```python\ndef power2and3(x):\n    \"\"\"Returns\
    \ the tuple (x**2, x**3)\"\"\"\n    return x**2 ,x**3\n\npower2and3(2)\n```\n\n\
    ```\n(4, 8)\n```\n\n```python\npower2and3(4.5)\n```\n\n```\n(20.25, 91.125)\n\
    ```\n\n```python\npower2and3(0+1j)\n```\n\n```\n((-1+0j), (-0-1j))\n```\n\n```python\n\
    help(power2and3)\n```\n\n```\nHelp on function power2and3 in module __main__:\n\
    \npower2and3(x)\n    Returns the tuple (x**2, x**3)\n```\n\n```python\nprint(power2and3.__doc__)\n\
    ```\n\n```\nReturns the tuple (x**2, x**3)\n```\n\n## CHAPTER FIVE\n\n## INPUT\
    \ AND OUTPUT\n\nIn this section, we describe printing, which includes the use\
    \ of the `print` function, the old-style % format specifiers and the new style\
    \ {} format specifiers.\n\n### 5.1 Printing to standard output (normally the screen)\n\
    \nThe `print` function is the most commonly used command to print information\
    \ to the \"standard output device\" which is normally the screen.\n\nThere are\
    \ two modes to use print.\n\n#### 5.1.1 Simple print\n\nThe easiest way to use\
    \ the print command is to list the variables to be printed, separated by comma.\
    \ Here are a few examples:\n\n```python\na = 10\nb = 'test text'\nprint(a)\n```\n\
    \n```\n10\n```\n\n```python\nprint(b)\n```\n\n```\ntest text\n```\n\n```python\n\
    print(a, b)\n```\n\n```\n10 test text\n```\n\n```python\nprint(\"The answer is\"\
    , a)\n```\n\n```\nThe answer is 10\n```\n\n```python\nprint(\"The answer is\"\
    , a, \"and the string contains\", b)\n```\n\n```\nThe answer is 10 and the string\
    \ contains test text\n```\n\n```python\nprint(\"The answer is\", a, \"and the\
    \ string reads\", b)\n```\n\n```\nThe answer is 10 and the string reads test text\n\
    ```\n\nPython adds a space between every object that is being printed.\nPython\
    \ prints a new line after every print call. To suppress that, use the `end=` parameter:\n\
    \n```python\nprint(\"Printing in line one\", end='')\nprint(\"...still printing\
    \ in line one.\")\n```\n\n```\nPrinting in line one...still printing in line one.\n\
    ```\n\n#### 5.1.2 Formatted printing\n\nThe more sophisticated way of formatting\
    \ output uses a syntax very similar to Matlab's `fprintf` (and therefore also\
    \ similar to C's `printf`).\nThe overall structure is that there is a string containing\
    \ format specifiers, followed by a percentage sign and a tuple that contains the\
    \ variables to be printed in place of the format specifiers.\n\n```python\nprint(\"\
    a = %d b = %d\" % (10,20))\n```\n\n```\na = 10 b = 20\n```\n\nA string can contain\
    \ format identifiers (such as `%f` to format as a float, `%d` to format as an\
    \ integer, and `%s` to format as a string):\n\n```python\nfrom math import pi\n\
    print(\"Pi = %5.2f\" % pi)\n```\n\n```\nPi =  3.14\n```\n\n```python\nprint(\"\
    Pi = %10.3f\" % pi)\n```\n\n```\nPi =      3.142\n```\n\n```python\nprint(\"Pi\
    \ = %10.8f\" % pi)\n```\n\n```\nPi = 3.14159265\n```\n\n```python\nprint(\"Pi\
    \ = %d\" % pi)\n```\n\n```\nPi = 3\n```\n\nThe format specifier of type %W.Df\
    \ means that a Float should be printed with a total Width of W characters and\
    \ D digits behind the Decimal point. (This is identical to Matlab and C, for example.)\n\
    \nTo print more than one object, provide multiple format specifiers and list several\
    \ objects in the tuple:\n\n```python\nprint(\"Pi = %f, 142*pi = %f and pi^2 =\
    \ %f.\" % (pi,142*pi,pi**2))\n```\n\n```\nPi = 3.141593, 142*pi = 446.106157 and\
    \ pi^2 = 9.869604.\n```\n\nNote that the conversion of a format specifier and\
    \ a tuple of variables into string does not rely on the print command:\n\n```python\n\
    from math import pi\n\"pi = %f\" % pi\n```\n\n```\n'pi = 3.141593'\n```\n\nThis\
    \ means that we can convert objects into strings wherever we need, and we can\
    \ decide to print the strings later – there is no need to couple the formatting\
    \ closely to the code that does the printing.\n\nOverview of commonly used format\
    \ specifiers using the astronomical unit as an example:\n\n```python\nAU = 149597870700\
    \  # astronomical unit [m]\n\"%f\" % AU          # line 1 in table\n```\n\n```\n\
    '149597870700.000000'\n```\n\n| specifier | style | Example output for AU |\n\
    |---|---|---|\n| %f | floating point | 149597870700.000000 |\n| %e | exponential\
    \ notation | 1.495979e+11 |\n| %g | shorter of %e or %f | 1.49598e+11 |\n| %d\
    \ | integer | 149597870700 |\n| %s | str() | 149597870700 |\n| %r | repr() | 149597870700L\
    \ |\n\n#### 5.1.3 “str” and “__str__”\n\nAll objects in Python should provide\
    \ a method __str__ which returns a nice string representation of the object. This\
    \ method a.__str__() is called when we apply the str function to object a:\n\n\
    ```python\na = 3.14\na.__str__()\n```\n\n```\n'3.14'\n```\n\n```python\nstr(a)\n\
    ```\n\n```\n'3.14'\n```\n\nThe str function is extremely convenient as it allows\
    \ us to print more complicated objects, such as\n\n```python\nb = [3, 4.2, ['apple',\
