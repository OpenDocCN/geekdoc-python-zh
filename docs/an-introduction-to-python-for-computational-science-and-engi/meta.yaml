  md: "# Introduction to Python for Computational Science and Engineering\n\n(continued\
    \ from previous page)\n\n```\n2.5\n>>> 15./6.\n2.5\n```\n\nIf we really want integer\
    \ division, we can use `//`: `1//2` returns 0, in both Python 2 and 3.\n\n# 2.3.2\
    \ Why should I care about this division problem?\n\nInteger division can result\
    \ in surprising bugs: suppose you are writing code to compute the mean value $m\
    \ = (x + y)/2$ of two numbers $x$ and $y$. The first attempt of writing this may\
    \ read:\n\n```\nm = (x + y) / 2\n```\n\nSuppose this is tested with $x = 0.5$,\
    \ $y = 0.5$, then the line above computes the correct answers $m = 0.5$ (because\
    \ $0.5 + 0.5 = 1.0$, i.e. a 1.0 is a floating point number, and thus $1.0/2$ evaluates\
    \ to $0.5$). Or we could use $x = 10$, $y = 30$, and because $10 + 30 = 40$ and\
    \ $40/2$ evaluates to 20, we get the correct answer $m = 20$. However, if the\
    \ integers $x = 0$ and $y = 1$ would come up, then the code returns $m = 0$ (because\
    \ $0 + 1 = 1$ and $1/2$ evaluates to 0) whereas $m = 0.5$ would have been the\
    \ right answer.\n\nWe have many possibilities to change the line of code above\
    \ to work safely, including these three versions:\n\n```\nm = (x + y) / 2.0\n\n\
    m = float(x + y) / 2\n\nm = (x + y) * 0.5\n```\n\nThis integer division behaviour\
    \ is common amongst most programming languages (including the important ones C,\
    \ C++ and Fortran), and it is important to be aware of the issue.\n\n# 2.4 Mathematical\
