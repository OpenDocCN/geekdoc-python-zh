    solver itself has determined the number of required function evaluations, and
    returns the corresponding values in `sol.t` and `sol.y[0]`.


    We can obtain more data points in a number of ways:


    +   1. Increase the default error tolerance. The relative tolerance (`rtol`) and
    absolute tolerance (`atol`) default to 1e-3 each. If we increase them, we typically
    enforce the use of a larger number of intermediate points:


    ```

    sol = solve_ivp(fun=f, t_span=[t0, tf], y0=y0, atol=1e-8, rtol=1e-8)


    pylab.plot(sol.t, sol.y[0], ''.'')

    pylab.xlabel(''t''); pylab.ylabel(''y(t)'')

    ```


    Text(0, 0.5, ''y(t)'')


    ![](img/311265a3784c8b1302bbc7bfff8d0ca5_193_0.png)


    +   1. We can also prescribe the precise locations for which we like to know the
    solutions $y(t)$:


    ```

    y0 = [1]            # initial value

    t0 = 0              # integration limits for t

    tf = 2

    ts = np.linspace(t0, tf, 100)  # 100 points between t0 and tf


    sol = solve_ivp(fun=f, t_span=[t0, tf], y0=y0, t_eval=ts)


    pylab.plot(sol.t, sol.y[0], ''.'')

    pylab.xlabel(''t''); pylab.ylabel(''y(t)'')

    ```


    Text(0, 0.5, ''y(t)'')'
