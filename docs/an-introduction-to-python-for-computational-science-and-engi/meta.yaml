  md: '# CHAPTER THIRTEEN


    # NUMERICAL COMPUTATION


    # 13.1 Numbers and numbers


    We have already seen (03 Data Types Structures, Numbers) that Python knows different
    *types* of numbers:


    +   - floating point numbers such as 3.14

    - integers such as 42

    - complex numbers such as 3.14 + 1j


    # 13.1.1 Limitations of number types


    # Limitations of ints


    Mathematics provides the infinite set of natural numbers ℕ = {1, 2, 3, ...}. Because
    the computer has *finite* size, it is impossible to represent all of these numbers
    in the computer. Instead, only a small subset of numbers is represented.


    The `int`-type can (usually[3]) represent numbers between -2147483648 and +2147483647
    and corresponds to 4 bytes (that''s 4*8 bit, and 232 = 4294967296 which is the
    range from -2147483648 and +2147483647).


    You can imagine that the hardware uses a table like this to encode integers using
    bits (suppose for simplicity we use only 8 bits for this):


    | natural number | bit-representation |

    |---|---|

    | 0 | 00000000 |

    | 1 | 00000001 |

    | 2 | 00000010 |

    | 3 | 00000011 |

    | 4 | 00000100 |

    | 5 | 00000101 |

    | ... | ... |

    | 254 | 11111110 |

    | 255 | 11111111 |


    Using 8 bit we can represent 256 natural numbers (for example from 0 to 255) because
    we have 28 = 256 different ways of combining eight 0s and 1s.


    We could also use a slightly different table to describe 256 integer numbers ranging,
    for example, from -127 to +128.


    This is *in principle* how integers are represented in the computer. Depending
    on the number of bytes used, only integer numbers between a minimum and a maximum
    value can be represented. On today''s hardware, it is common to use 4 or 8 bytes
    to represent one integer, which leads exactly to the minimum and maximum values
    of -2147483648 and'
