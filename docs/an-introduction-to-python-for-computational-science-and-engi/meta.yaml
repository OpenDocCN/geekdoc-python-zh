  - "[PAGE 179]\n\n# 15.4.3 Tracking trajectories\n\nYou can track the trajectory\
    \ of an object using a “curve”. The basic idea is to append positions to that\
    \ curve object as demonstrated in this example (vpythondemo4.py):\n\n```\nimport\
    \ visual, math\n\nball = visual.sphere()\nbox = visual.box( pos=[0,-1,0], width=4,\
    \ length=4, height=0.5 )\ntrace=visual.curve( radius=0.2, color=visual.color.green)\n\
    \nfor i in range(1000):\n    t = i*0.1\n    y = math.sin(t)\n\n    #update the\
    \ ball's position\n    ball.pos = [t, y, 0]\n\n    trace.append( ball.pos )\n\n\
    \    #ensure we have only 24 frames per second\n    visual.rate(24)\n```\n\n![](img/311265a3784c8b1302bbc7bfff8d0ca5_179_0.png)\n\
    \nAs with most visual Python objects, you can specify the colour of the curve\
    \ (also per appended element!) and the radius."
