- md: "## 15.4.3 Tracking trajectories\n\nYou can track the trajectory of an object\
    \ using a “curve”. The basic idea is to append positions to that curve object\
    \ as demonstrated in this example (vpythondemo4.py):\n\n```python\nimport visual,\
    \ math\n\nball = visual.sphere()\nbox = visual.box( pos=[0,-1,0], width=4, length=4,\
    \ height=0.5 )\ntrace=visual.curve( radius=0.2, color=visual.color.green)\n\n\
    for i in range(1000):\n    t = i*0.1\n    y = math.sin(t)\n\n    #update the ball's\
    \ position\n    ball.pos = [t, y, 0]\n\n    trace.append( ball.pos )\n\n    #ensure\
    \ we have only 24 frames per second\n    visual.rate(24)\n```\n\n![](img/311265a3784c8b1302bbc7bfff8d0ca5_179_0.png)\n\
    \nAs with most visual Python objects, you can specify the colour of the curve\
    \ (also per appended element!) and the radius.\n\n## 15.4.4 Connecting objects\
    \ (Cylinders, springs, ...)\n\nCylinders and helices can be used to “connect”\
    \ two objects. In addition to the `pos` attribute (which stores the position of\
    \ one end of the object), there is also an `axis` attribute which stores the vector\
    \ pointing from `pos` to the other end of the object. Here is an example showing\
    \ this for a cylinder: (`vpythondemo5.py`):\n\n```python\nimport visual, math\n\
    \nball1 = visual.sphere( pos = (0,0,0), radius=2 )\nball2 = visual.sphere( pos\
    \ = (5,0,0), radius=2 )\nconnection = visual.cylinder(pos = ball1.pos,\n     \
    \                       axis = ball2.pos - ball1.pos)\n\nfor t in range(100):\n\
    \    #move ball2\n    ball2.pos = (-t,math.sin(t),math.cos(t))\n\n    #keep cylinder\
    \ connection between ball1 and ball2\n    connection.axis = ball2.pos - ball1.pos\n\
    \n    visual.rate(24)\n```\n\n## 15.4.5 3d vision\n\nIf you have access to “anaglyphic”\
    \ (i.e. colored) glasses (best red-cyan but red-green or red-blue works as well),\
    \ then you can switch visual python into this stereo mode by adding these two\
    \ lines to the beginning of your program:\n\n```python\nvisual.scene.stereo='redcyan'\n\
    visual.scene.stereodepth=1\n```\n\nNote the effect of the `stereodepth` parameter:\n\
    \n- `stereodepth=0`: 3d scene “inside” the screen (default)\n- `stereodepth=1`:\
    \ 3d scene at screen surface (this often looks best)\n- `stereodepth=2`: 3d scene\
    \ sticking out of the screen\n\n![](img/311265a3784c8b1302bbc7bfff8d0ca5_181_0.png)\n\
    \n## 15.5 Visualising higher dimensional data (VTK)\n\nOften, we need to understand\
    \ data defined at 3d positions in space. The data itself is often a scalar field\
    \ (such as temperature) or a 3d vector (such as velocity or magnetic field), or\
    \ occasionally a tensor. For example for a 3d-vector field $f$ defined in 3d-space\
    \ ($\\vec{f}(\\vec{x})$ where $\\vec{x} \\in \\mathbb{R}^3$ and $\\vec{f}(\\vec{x})\
    \ \\in \\mathbb{R}^3$) we could draw a 3d-arrow at every (grid) point in space.\
    \ It is common for these data sets to be time dependent.\n\nThe probably most\
    \ commonly used library in Science and Engineering to visualise such data sets\
    \ is probably VTK, the Visualisation ToolKit (https://vtk.org). This is a substantial\
    \ C++ library with interfaces to high level languages, including Python.\n\nOne\
    \ can either call these routines directly from Python code, or write the data\
    \ to disk in a format that the VTK library can read (so called vtk data files),\
    \ and then use stand-alone programme such as Mayavi, ParaView and VisIt to read\
    \ these data files and manipulate them (often with a GUI). All three of these\
    \ are using the VTK library internally, and can read vtk data files.\n\nThese\
    \ package is very well suited to visualise static and time-dependent 2d and 3d-fields\
    \ (scalar, vector and tensor fields). Two examples are shown below.\n\nThey can\
    \ be used as a stand-alone executables with a GUI to visualise VTK files. It can\
    \ also be scripted from a Python program, or used interactively from a Python\
    \ session.\n\n### 15.5.1 Mayavi, Paraview, Visit\n\n- Mayavi Home page http://code.enthought.com/pages/mayavi-project.html\n\
    - Paraview Home page https://www.paraview.org\n- VisIt Home page https://wci.llnl.gov/simulation/computer-codes/visit/\n\
    \n![](img/311265a3784c8b1302bbc7bfff8d0ca5_182_0.png)\n\n![](img/311265a3784c8b1302bbc7bfff8d0ca5_183_0.png)\n\
    \nTwo examples from MayaVi visualisations.\n\n### 15.5.2 Writing vtk files from\
    \ Python (pyvtk)\n\nA small but powerful Python library is pyvtk available at\
    \ https://github.com/pearu/pyvtk. This allows to create vtk files from Python\
    \ data structures very easily.\n\nGiven a finite element mesh or a finite difference\
    \ data set in Python, one can use pyvtk to write such data into files, and then\
    \ use one of the visualisation applications listed above to load the vtk files\
    \ and to display and investigate them.\n\n## 15.6 Further tools and developments\n\
    \nIn addition to `matplotlib`, there are a number of other libraries with similar\
    \ or related visualisation functionality.\n\n[Plotly.py](https://plotly.com/python/)\
    \ and [Bokeh](https://bokeh.org/) – together with the veteran of python-based\
    \ plotting `matplotlib` – form the basis for many tools that provide visualisation\
    \ skills.\n\nA beautiful summary and [categorisation](https://pyviz.org/) of these\
    \ and other libraries is available at https://pyviz.org.\n\n### 15.6.1 Exploiting\
    \ self-describing data for visualisation\n\nSome libraries, such as Pandas (see\
    \ also *Chapter on Pandas*), Xarray, and holoviews make use of the idea of self-describing\
    \ data to simplify the visualisation: while the data in a numpy array is ‘just’\
    \ a (multidimensional) matrix of data points, these libraries can store metadata\
    \ – such as headings and coordinates – associated with these data points. We also\
    \ talked about annotated or labelled data to describe the presence of such metadata.\n\
    \nWhat is the benefit of having this meta-data available? An xarray, for example,\
    \ may store a 2d-array (like a numpy array) but have the metadata store that one\
    \ dimension refers to the x-position and the other direction to time. The x-array\
    \ object provides convenience methods to select and plot the data in the xarray.\n\
    \n### 15.6.2 The future of data visualisation\n\nI would speculate that increasingly\
    \ we will be using high-level plotting tools (such as pandas, xarray, holoviews)\
    \ to explore data interactively.\n\nWe can see a trend in data analysis libraries\
    \ that data objects can be converted to such high-level annotated data objects\
    \ (such as European XFEL’s extra-data tools which can return a labelled xarray\
    \ object). Other projects combine the metadata with the data in custom made objects\
    \ to then provide convenience methods (such as Ubermag’s discretisedfield object).\n\
    \nWill we still need to learn the basics, such as the `matplotlib.pyplot` interface?\
    \ Probably yes: the very least to fine tune the plots provided by these high level\
    \ libraries:\n\n### 15.6.3 Fine-tuning matplotlib plots that are generated by\
    \ high level frameworks\n\nWe show one example where pandas – as a representative\
    \ for a high-level framework that can create plots – creates the plot, but we\
    \ use `pyplot` commands to tailor the resulting plot.\n\nLet’s define the pandas\
    \ data series first (it is not important to understand the details of this now):\n\
    \n```python\nimport pandas as pd\ns = pd.Series(data=[10, 20, 1], index=['bananas',\
    \ 'oranges', 'potatoes'])\ns\n```\n\n```\nbananas      10\noranges      20\npotatoes\
    \      1\ndtype: int64\n```\n\nWe can use a convenience method from pandas to\
    \ create a plot of the data series:\n\n```python\ns.plot.bar()\n```\n\n```\n<AxesSubplot:>\n\
    ```\n\n![](img/311265a3784c8b1302bbc7bfff8d0ca5_185_0.png)\n\nNote how the bar\
    \ chart is labelled appropriately: the metadata (here the labels ‘bananas’, ‘oranges’\
    \ and ‘potatoes’) have been used to label the x-axis in the plot.\n\nIf we want\
    \ to change this plot, the following strategy works, and is supported by other\
    \ high-level frameworks as well:\n\n- create an axes (and figure) object\n- pass\
    \ the axes object to the high level plotting framework\n- use the axes object\
    \ (and figure) to finetune the plot\n\nThe following example shows how to add\
    \ a title, customise the labelling of the y-axis, and add a grid to the plot,\
    \ and change the size of the figure to be 10 inches by 3 inches:\n\n```python\n\
    import matplotlib.pyplot as plt\nfig, ax = plt.subplots(figsize=(10, 3))\n\ns.plot.bar(ax=ax,\
    \ color='orange')\nax.set_title(\"Current stock\")\nax.set_yticks(range(0, 21,\
    \ 4));\nax.grid('on')\n```"
  mdcn: "## 15.4.3 跟踪轨迹\n\n你可以使用“曲线”来跟踪物体的轨迹。基本思路是将位置点追加到该曲线对象上，如本示例（vpythondemo4.py）所示：\n\
    \n```python\nimport visual, math\n\nball = visual.sphere()\nbox = visual.box(\
    \ pos=[0,-1,0], width=4, length=4, height=0.5 )\ntrace=visual.curve( radius=0.2,\
    \ color=visual.color.green)\n\nfor i in range(1000):\n    t = i*0.1\n    y = math.sin(t)\n\
    \n    #update the ball's position\n    ball.pos = [t, y, 0]\n\n    trace.append(\
    \ ball.pos )\n\n    #ensure we have only 24 frames per second\n    visual.rate(24)\n\
    ```\n\n![](img/311265a3784c8b1302bbc7bfff8d0ca5_179_0.png)\n\n与大多数 Visual Python\
    \ 对象一样，你可以指定曲线的颜色（也可以为每个追加的元素单独指定！）和半径。\n\n## 15.4.4 连接对象（圆柱体、弹簧等）\n\n圆柱体和螺旋线可用于“连接”两个对象。除了\
    \ `pos` 属性（存储对象一端的位置）外，还有一个 `axis` 属性，存储从 `pos` 指向对象另一端的向量。以下是一个圆柱体的示例（`vpythondemo5.py`）：\n\
    \n```python\nimport visual, math\n\nball1 = visual.sphere( pos = (0,0,0), radius=2\
    \ )\nball2 = visual.sphere( pos = (5,0,0), radius=2 )\nconnection = visual.cylinder(pos\
    \ = ball1.pos,\n                            axis = ball2.pos - ball1.pos)\n\n\
    for t in range(100):\n    #move ball2\n    ball2.pos = (-t,math.sin(t),math.cos(t))\n\
    \n    #keep cylinder connection between ball1 and ball2\n    connection.axis =\
    \ ball2.pos - ball1.pos\n\n    visual.rate(24)\n```\n\n## 15.4.5 3D 视觉\n\n如果你有“立体”（即彩色）眼镜（最好是红-青色，但红-绿色或红-蓝色也可以），那么你可以通过在程序开头添加以下两行代码，将\
    \ Visual Python 切换到这种立体模式：\n\n```python\nvisual.scene.stereo='redcyan'\nvisual.scene.stereodepth=1\n\
    ```\n\n注意 `stereodepth` 参数的效果：\n\n- `stereodepth=0`：3D 场景在屏幕“内部”（默认）\n- `stereodepth=1`：3D\
    \ 场景在屏幕表面（这通常看起来效果最好）\n- `stereodepth=2`：3D 场景突出屏幕\n\n![](img/311265a3784c8b1302bbc7bfff8d0ca5_181_0.png)\n\
    \n## 15.5 可视化高维数据（VTK）\n\n通常，我们需要理解定义在三维空间位置上的数据。数据本身通常是标量场（如温度）或三维向量（如速度或磁场），偶尔是张量。例如，对于定义在三维空间中的三维向量场\
    \ $f$（$\\vec{f}(\\vec{x})$，其中 $\\vec{x} \\in \\mathbb{R}^3$ 且 $\\vec{f}(\\vec{x})\
    \ \\in \\mathbb{R}^3$），我们可以在空间的每个（网格）点上绘制一个三维箭头。这些数据集通常是时间相关的。\n\n科学和工程领域中最常用于可视化此类数据集的库可能是\
    \ VTK，即可视化工具包（https://vtk.org）。这是一个庞大的 C++ 库，提供了与高级语言（包括 Python）的接口。\n\n你可以直接从\
    \ Python 代码调用这些例程，也可以将数据以 VTK 库可以读取的格式（所谓的 vtk 数据文件）写入磁盘，然后使用 Mayavi、ParaView\
    \ 和 VisIt 等独立程序来读取这些数据文件并进行操作（通常通过 GUI）。这三者内部都使用 VTK 库，并且可以读取 vtk 数据文件。\n\n这些软件包非常适合可视化静态和时间相关的二维和三维场（标量、向量和张量场）。下面展示了两个示例。\n\
    \n它们可以作为带有 GUI 的独立可执行文件来可视化 VTK 文件。也可以从 Python 程序中进行脚本化操作，或从 Python 会话中交互式使用。\n\
    \n### 15.5.1 Mayavi、Paraview、Visit\n\n- Mayavi 主页 http://code.enthought.com/pages/mayavi-project.html\n\
    - Paraview 主页 https://www.paraview.org\n- VisIt 主页 https://wci.llnl.gov/simulation/computer-codes/visit/\n\
    \n![](img/311265a3784c8b1302bbc7bfff8d0ca5_182_0.png)\n\n![](img/311265a3784c8b1302bbc7bfff8d0ca5_183_0.png)\n\
    \n来自 MayaVi 可视化的两个示例。\n\n### 15.5.2 从 Python 写入 vtk 文件（pyvtk）\n\n一个小型但功能强大的 Python\
    \ 库是 pyvtk，可在 https://github.com/pearu/pyvtk 获取。它允许非常轻松地从 Python 数据结构创建 vtk 文件。\n\
    \n给定 Python 中的有限元网格或有限差分数据集，可以使用 pyvtk 将此类数据写入文件，然后使用上述列出的可视化应用程序之一来加载 vtk 文件并进行显示和研究。\n\
    \n## 15.6 其他工具和发展\n\n除了 `matplotlib`，还有许多其他具有类似或相关可视化功能的库。\n\n[Plotly.py](https://plotly.com/python/)\
    \ 和 [Bokeh](https://bokeh.org/) – 与基于 Python 的绘图老牌工具 `matplotlib` 一起 – 构成了许多提供可视化技能的工具的基础。\n\
    \n在 https://pyviz.org 可以找到对这些及其他库的精彩总结和[分类](https://pyviz.org/)。\n\n### 15.6.1\
    \ 利用自描述数据进行可视化\n\n一些库，如 Pandas（另见 *Pandas 章节*）、Xarray 和 holoviews，利用自描述数据的概念来简化可视化：虽然\
    \ numpy 数组中的数据“只是”一个（多维）数据点矩阵，但这些库可以存储与这些数据点关联的元数据 – 例如标题和坐标。我们还讨论了带注释或带标签的数据来描述此类元数据的存在。\n\
    \n拥有这些元数据有什么好处？例如，一个 xarray 可能存储一个二维数组（类似 numpy 数组），但其元数据存储表明一个维度指的是 x 位置，另一个维度指的是时间。x-array\
    \ 对象提供了便捷的方法来选择和绘制 xarray 中的数据。\n\n### 15.6.2 数据可视化的未来\n\n我推测我们将越来越多地使用高级绘图工具（如\
    \ pandas、xarray、holoviews）来交互式地探索数据。\n\n我们可以看到数据分析库中的一个趋势，即数据对象可以转换为此类高级带注释的数据对象（例如\
    \ European XFEL 的 extra-data 工具可以返回一个带标签的 xarray 对象）。其他项目将元数据与数据组合在自定义对象中，然后提供便捷方法（例如\
    \ Ubermag 的 discretisedfield 对象）。\n\n我们还需要学习基础知识吗，比如 `matplotlib.pyplot` 接口？可能需要：至少为了微调这些高级库提供的图表：\n\
    \n### 15.6.3 微调由高级框架生成的 matplotlib 图表\n\n我们展示一个示例，其中 pandas – 作为可以创建图表的高级框架的代表\
    \ – 创建了图表，但我们使用 `pyplot` 命令来调整生成的图表。\n\n首先定义 pandas 数据序列（现在理解其细节并不重要）：\n\n```python\n\
    import pandas as pd\ns = pd.Series(data=[10, 20, 1], index=['bananas', 'oranges',\
    \ 'potatoes'])\ns\n```\n\n```\nbananas      10\noranges      20\npotatoes    \
    \  1\ndtype: int64\n```\n\n我们可以使用 pandas 的便捷方法来创建数据序列的图表：\n\n```python\ns.plot.bar()\n\
    ```\n\n```\n<AxesSubplot:>\n```\n\n![](img/311265a3784c8b1302bbc7bfff8d0ca5_185_0.png)\n\
    \n注意条形图是如何被适当标记的：元数据（这里是标签 'bananas'、'oranges' 和 'potatoes'）已被用于标记图表的 x 轴。\n\n\
    如果我们想更改此图表，以下策略有效，并且也受到其他高级框架的支持：\n\n- 创建一个坐标轴（和图形）对象\n- 将坐标轴对象传递给高级绘图框架\n- 使用坐标轴对象（和图形）来微调图表\n\
    \n以下示例展示了如何添加标题、自定义 y 轴的标签、向图表添加网格，并将图形大小更改为 10 英寸乘 3 英寸：\n\n```python\nimport\
    \ matplotlib.pyplot as plt\nfig, ax = plt.subplots(figsize=(10, 3))\n\ns.plot.bar(ax=ax,\
    \ color='orange')\nax.set_title(\"Current stock\")\nax.set_yticks(range(0, 21,\
    \ 4));\nax.grid('on')\n```"
