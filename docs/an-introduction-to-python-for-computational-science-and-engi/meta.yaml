  - "[PAGE 44]\n\nC++ provides the ability to pass arguments as references by adding\
    \ an ampersand in front of the argument name in the function definition:\n\n```\n\
    #include <stdio.h>\n\nvoid pass_by_reference(int &m) {\n    printf(\"in pass_by_reference:\
    \ received m=%d\\n\",m);\n    m=42;\n    printf(\"in pass_by_reference: changed\
    \ to m=%d\\n\",m);\n}\n\nint main(void) {\n    int global_m = 1;\n    printf(\"\
    global_m=%d\\n\",global_m);\n    pass_by_reference(global_m);\n    printf(\"global_m=%d\\\
    n\",global_m);\n    return 0;\n}\n```\n\ntogether with the corresponding output:\n\
    \n```\nglobal_m=1\nin pass_by_reference: received m=1\nin pass_by_reference: changed\
    \ to m=42\nglobal_m=42\n```\n\n# 3.4.3 Argument passing in Python\n\nIn Python,\
    \ objects are passed as the value of a reference (think pointer) to the object.\
    \ Depending on the way the reference is used in the function and depending on\
    \ the type of object it references, this can result in pass-by-reference behaviour\
    \ (where any changes to the object received as a function argument, are immediately\
    \ reflected in the calling level).\n\nHere are three examples to discuss this.\
    \ We start by passing a list to a function which iterates through all elements\
    \ in the sequence and doubles the value of each element:\n\n```\ndef double_the_values(l):\n\
    \    print(\"in double_the_values: l = %s\" % l)\n    for i in range(len(l)):\n\
    \        l[i] = l[i] * 2\n    print(\"in double_the_values: changed l to l = %s\"\
