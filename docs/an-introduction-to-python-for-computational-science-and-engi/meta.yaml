    ```\n\nCalling the `fmin` function will produce some diagnostic output, which\
    \ you can also see above.\n\n**Return value of `fmin`**\n\nNote that the return\
    \ value from the `fmin` function is a numpy `array` which – for the example above\
    \ – contains only one number as we have only one parameter (here $x$) to vary.\
    \ In general, `fmin` can be used to find the minimum in a higher-dimensional parameter\
    \ space if there are several parameters. In that case, the numpy array would contain\
