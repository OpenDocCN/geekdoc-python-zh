  md: "![](img/311265a3784c8b1302bbc7bfff8d0ca5_201_0.png)\n\n# 16.5 Root finding\n\
    \nIf you try to find a $x$ such that $f(x) = 0$ then this is called *root finding*.\
    \ Note that problems like $g(x)=h(x)$ fall in this category as you can rewrite\
    \ them as $f(x)=g(x)-h(x)=0$.\n\nA number of root finding tools are available\
    \ in `scipy`'s `optimize` module.\n\n# 16.5.1 Root finding using the bisection\
    \ method\n\nFirst we introduce the `bisect` algorithm which is (i) robust and\
    \ (ii) slow but conceptually very simple.\n\nSuppose we need to compute the roots\
    \ of $f(x)=x^3 - 2x^2$. This function has a (double) root at $x = 0$ (this is\
    \ trivial to see) and another root which is located between $x = 1.5$ (where $f(1.5)=\
    \ - 1.125$) and $x = 3$ (where $f(3)=9$). It is pretty straightforward to see\
    \ that this other root is located at $x = 2$. Here is a program that determines\
    \ this root numerically:\n\n```\npython\nfrom scipy.optimize import bisect\n\n\
    def f(x):\n    \"\"\"returns f(x)=x^3-2x^2. Has roots at\n    x=0 (double root)\
    \ and x=2\"\"\"\n    return x ** 3 - 2 * x ** 2\n\n# main program starts here\n\
    x = bisect(f, 1.5, 3, xtol=1e-6)\n\nprint(\"The root x is approximately x=%14.12g,\\\
    n\"\n      \"the error is less than 1e-6.\" % (x))\nprint(\"The exact error is\
    \ %g.\" % (2 - x))\n```"
  merge: -1
  pgno: 201
- img_proc: true
  md: "```\nThe root x is approximately x= 2.00000023842,\nthe error is less than\
    \ 1e-6.\nThe exact error is -2.38419e-07.\n```\n\nThe `bisect()` method takes\
    \ three compulsory arguments: (i) the function $f(x)$, (ii) a lower limit $a$\
    \ (for which we have chosen 1.5 in our example) and (ii) an upper limit $b$ (for\
    \ which we have chosen 3). The optional parameter `xtol` determines the maximum\
    \ error of the method.\n\nOne of the requirements of the bisection method is that\
    \ the interval $[a, b]$ has to be chosen such that the function is either positive\
    \ at $a$ and negative at $b$, or that the function is negative at $a$ and positive\
    \ at $b$. In other words: $a$ and $b$ have to enclose a root.\n\n# 16.5.2 Exercise:\
    \ root finding using the bisect method\n\n+   1. Write a program with name `sqrttwo.py`\
    \ to determine an approximation of $\\sqrt{2}$ by finding a root $x$ of the function\
    \ $f(x) = 2 - x^2$ using the bisection algorithm. Choose a tolerance for the approximation\
    \ of the root of 10–8.\n2. Document your choice of the initial bracket $[a, b]$\
    \ for the root: which values have you chosen for $a$ and for $b$ and why?\n3.\
    \ Study the results:\n   - Which value for the root $x$ does the bisection algorithm\
    \ return?\n   - Compute the value of `sqrt2` using `math.sqrt(2)` and compare\
    \ this with the approximation of the root. How big is the absolute error of $x$?\
    \ How does this compare with `xtol`?\n\n# 16.5.3 Root finding using the fsolve\
    \ funcion\n\nA (often) better (in the sense of “more efficient”) algorithm than\
    \ the bisection algorithm is implemented in the general purpose `fsolve()` function\
    \ for root finding of (multidimensional) functions. This algorithm needs only\
    \ one starting point close to the suspected location of the root (but is not guaranteed\
    \ to converge).\n\nHere is an example:\n\n```\nfrom scipy.optimize import fsolve\n\
    \ndef f(x):\n    return x ** 3 - 2 * x ** 2\n\nx = fsolve(f, 3)           # one\
    \ root is at x=2.0\n\nprint(\"The root x is approximately x=%21.19g\" % x)\nprint(\"\
    The exact error is %g.\" % (2 - x))\n```\n\n```\nThe root x is approximately x=\
    \ 2.000000000000006661\nThe exact error is -6.66134e-15.\n```\n\nThe return value[6]\
    \ of `fsolve` is a numpy array of length $n$ for a root finding problem with $n$\
    \ variables. In the example above, we have $n = 1$."
