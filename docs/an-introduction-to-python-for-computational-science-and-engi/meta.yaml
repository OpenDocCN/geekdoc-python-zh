  md: '# CHAPTER ELEVEN


    # PYTHON SHELLS


    # 11.1 IDLE


    IDLE comes with every Python distribution and is a useful tool for everyday programming.
    Its editor provides syntax highlighting.


    There are two reasons why you might want to use another Python shell, for example:


    +   - While working with the Python prompt, you like auto-completion of variable
    names, filenames and commands. In that case *IPython* is your tool of choice (see
    below). IPython does not provide an editor, but you can carry on using the IDLE
    editor to edit files, or any other editor you like.


    IPython provides a number of nice features for the more experienced Python programmer,
    including convenient profiling of code (see https://ipython.org/).


    Recently, some auto-completion has been added to Idle as well (press tab after
    having typed the first few letters of object names and keywords).


    # 11.2 Python (command line)


    This is the most basic face of the Python shell. It is very similar to the Python
    prompt in IDLE but there are no menus to click on and no facilities to edit files.


    # 11.3 Interactive Python (IPython)


    # 11.3.1 IPython console


    IPython is an improved version of the Python command line. It is a valuable tool
    and worth exploring it''s capabilities (see https://ipython.org/ipython-doc/stable/interactive/qtconsole.html)


    You will find the following features very useful:


    +   - auto completion Suppose you want to type `a = range(10)`. Instead of typing
    all the letters, just type `a = ra` and the press the “Tab” key. Ipython will
    now show all the possible commands (and variable names) that start with `ra`.
    If you type a third letter, here `n` and press “Tab” again, Ipython will auto
    complete and append `ge` automatically. This works also for variable names and
    modules.


    +   - To obtain help on a command, we can use Python’s help command. For example:
    `help(range)`. Ipython provides a shortcut. To achieve the same, it is sufficient
    to just type the command followed by a question mark: `range?`'
