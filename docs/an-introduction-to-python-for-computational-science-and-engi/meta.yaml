  md: '# 3.2.1 Integers


    We have seen the use of integer numbers already in *Chapter 2*. Be aware of integer
    division problems (02 A Powerful Calculator, Integer Division).


    If we need to convert string containing an integer number to an integer we can
    use `int()` function:


    ```

    a = ''34''       # a is a string containing the characters 3 and 4

    x = int(a)     # x is in integer number

    ```


    The function `int()` will also convert floating point numbers to integers:


    ```

    int(7.0)

    ```


    ```

    7

    ```


    ```

    int(7.9)

    ```


    ```

    7

    ```


    Note than `int` will truncate any non-integer part of a floating point number.
    To `round` an floating point number to an integer, use the `round()` command:


    ```

    round(7.9)

    ```


    ```

    8

    ```


    # 3.2.2 Integer limits


    Integers in Python 3 are unlimited; Python will automatically assign more memory
    as needed as the numbers get bigger. This means we can calculate very large numbers
    with no special steps.


    ```

    35**42

    ```


    ```

    70934557307860443711736098025989133248003781773149967193603515625

    ```


    In many other programming languages, such as C and FORTRAN, integers are a fixed
    size—most frequently 4 bytes, which allows $2^{32}$ different values—but different
    types are available with different sizes. For numbers that fit into these limits,
    calculations can be faster, but you may need to check that the numbers don''t
    go beyond the limits. Calculating a number beyond the limits is called *integer
    overflow*, and may produce bizarre results.


    Even in Python, we need to be aware of this when we use numpy (see *Chapter 14*).
    Numpy uses integers with a fixed size, because it stores many of them together
    and needs to calculate with them efficiently. `Numpy data types` include a range
    of integer types named for their size, so e.g. `int16` is a 16-bit integer, with
    $2^{16}$ possible values.


    Integer types can also be *signed* or *unsigned*. Signed integers allow positive
    or negative values, unsigned integers only allow positive ones. For instance:


    +   - uint16 (unsigned) ranges from 0 to $2^{16} - 1$

    - int16 (signed) ranges from $-2^{15}$ to $2^{15} - 1$'
