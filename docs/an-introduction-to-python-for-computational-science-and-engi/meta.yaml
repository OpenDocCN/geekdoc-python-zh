    \nLet's repeat the same for the equation: $x = x^3$ and solve\n\n```python\neq\
    \ = x - x ** 3                        # define the equation\nsympy.solve(eq, x)\
    \                     # solve eq = 0\n```\n\n```\n[-1, 0, 1]\n```\n\n## 12.1.10\
    \ Output: LaTeX interface and pretty-printing\n\nAs is the case with many computer\
    \ algebra systems, SymPy has the ability to format its output as LaTeX code, for\
    \ easy inclusion into documents.\n\nAt the start of this chapter, we called:\n\
    \n```python\nsympy.init_printing()\n```\n\nSympy detected that it was in Jupyter,\
    \ and enabled Latex output. The Jupyter Notebook supports (some) Latex, so this\
    \ gives us the nicely formatted output above.\n\nWe can also see the plain text\
    \ output from Sympy, and the raw Latex code it creates:\n\n```python\nprint(series(1/(x+y),\
    \ y, 0, 3))\n```\n\n```\ny**2/x**3 - y/x**2 + 1/x + O(y**3)\n```\n\n```python\n\
    print(latex(series(1/(x+y), y, 0, 3)))\n```\n\n```\n\\frac{y^{2}}{x^{3}} - \\\
    frac{y}{x^{2}} + \\frac{1}{x} + O\\left(y^{3}\\right)\n```\n\n```python\nprint(latex(series(1/(x+y),\
    \ y, 0, 3), mode='inline'))\n```\n\n```\n$\\frac{y^{2}}{x^{3}} - \\frac{y}{x^{2}}\
    \ + 1 / x + O\\left(y^{3}\\right)$\n```\n\nBe aware that in its default mode,\
    \ `latex()` outputs code that requires the `amsmath` package to be loaded via\
    \ a `\\usepackage{amsmath}` command in the document preamble.\n\nSymPy also supports\
    \ a “pretty print” (`pprint()`) output routine, which produces better-formatted\
    \ text output than the default printing routine, as illustrated below. Note features\
    \ such as the subscripts for array elements whose names are of the form `T_n`,\
    \ the italicised constant `e`, vertically-centred dots for multiplication, and\
    \ the nicely-formed matrix borders and fractions.\n\n![](img/311265a3784c8b1302bbc7bfff8d0ca5_137_0.png)\n\
    \nFinally, SymPy offers `preview()`, which displays rendered output on screen\
    \ (check `help(preview)` for details).\n\n## 12.1.11 Automatic generation of C\
    \ code\n\nA strong point of many symbolic libraries is that they can convert the\
    \ symbolic expressions to C-code (or other code) that can subsequently be compiled\
    \ for high execution speed. Here is an example that demonstrates this:\n\n```python\n\
    from sympy import *\nfrom sympy.utilities.codegen import codegen\nx = Symbol('x')\n\
    sin(x).series(x, 0, 6)\n```\n\n$$x - \\frac{x^3}{6} + \\frac{x^5}{120} + O(x^6)$$\n\
    \n```python\n# NBVAL_IGNORE_OUTPUT\nprint(codegen((\"taylor_sine\", sin(x).series(x,\
    \ 0, 6)), language='C')[0][1])\n```\n\n```c\n/******************************************************\n\
    \ *                  Code generated with sympy 1.9     *\n *                 \
    \                                   *\n *  See http://www.sympy.org/ for more\
    \ information.    *\n *                                                    *\n\
    \ *  This file is part of 'project'                    *\n ******************************************************/\n\
    #include \"taylor_sine.h\"\n#include <math.h>\n\ndouble taylor_sine(double x)\
    \ {\n\n    double taylor_sine_result;\n    taylor_sine_result = x - 1.0/6.0*pow(x,\
    \ 3) + (1.0/120.0)*pow(x, 5) + O(x**6);\n    return taylor_sine_result;\n\n}\n\
    ```\n\n## 12.2 Related tools\n\nIt is worth noting that the SAGE initiative https://www.sagemath.org/\
    \ is trying to “create a viable free open source alternative to Magma, Maple,\
    \ Mathematica and Matlab.” and includes the SymPy library among many others. Its\
    \ symbolic capabilities are more powerful than SymPy’s, and SAGE, but the SymPy\
    \ features will already cover many of the needs arising in science and engineering.\
    \ SAGE includes the computer algebra system Maxima, which is also available standalone\
    \ from https://doc.sagemath.org/html/en/reference/interfaces/sage/interfaces/maxima_abstract.html.\n\
    \n# CHAPTER THIRTEEN\n\n# NUMERICAL COMPUTATION\n\n## 13.1 Numbers and numbers\n\
    \nWe have already seen (03 Data Types Structures, Numbers) that Python knows different\
    \ *types* of numbers:\n\n- floating point numbers such as 3.14\n- integers such\
    \ as 42\n- complex numbers such as 3.14 + 1j\n\n### 13.1.1 Limitations of number\
    \ types\n\n#### Limitations of ints\n\nMathematics provides the infinite set of\
    \ natural numbers ℕ = {1, 2, 3, ...}. Because the computer has *finite* size,\
    \ it is impossible to represent all of these numbers in the computer. Instead,\
    \ only a small subset of numbers is represented.\n\nThe `int`-type can (usually[3])\
    \ represent numbers between -2147483648 and +2147483647 and corresponds to 4 bytes\
    \ (that's 4*8 bit, and 2^32 = 4294967296 which is the range from -2147483648 and\
    \ +2147483647).\n\nYou can imagine that the hardware uses a table like this to\
    \ encode integers using bits (suppose for simplicity we use only 8 bits for this):\n\
    \n| natural number | bit-representation |\n|---|---|\n| 0 | 00000000 |\n| 1 |\
    \ 00000001 |\n| 2 | 00000010 |\n| 3 | 00000011 |\n| 4 | 00000100 |\n| 5 | 00000101\
    \ |\n| ... | ... |\n| 254 | 11111110 |\n| 255 | 11111111 |\n\nUsing 8 bit we can\
    \ represent 256 natural numbers (for example from 0 to 255) because we have 2^8\
    \ = 256 different ways of combining eight 0s and 1s.\n\nWe could also use a slightly\
    \ different table to describe 256 integer numbers ranging, for example, from -127\
    \ to +128.\n\nThis is *in principle* how integers are represented in the computer.\
    \ Depending on the number of bytes used, only integer numbers between a minimum\
    \ and a maximum value can be represented. On today's hardware, it is common to\
    \ use 4 or 8 bytes to represent one integer, which leads exactly to the minimum\
    \ and maximum values of -2147483648 and +2147483647 as shown above for 4 bytes,\
    \ and +9223372036854775807 as the maximum integer for 8 bytes (that’s ≈9.2 · 10^18).\n\
    \n#### Limitations of floats\n\nThe floating point numbers in a computer are not\
    \ the same as the mathematical floating point numbers. (This is exactly the same\
    \ as the (mathematical) integer numbers not being the same as the integer numbers\
    \ in a computer: only a subset of the infinite set of integer numbers can be represented\
    \ by the int data type as shown in Numbers and numbers). So how are floating point\
    \ numbers represented in the computer?\n\n- Any real number $x$ can be written\
    \ as $x = a \\cdot 10^b$ where $a$ is the mantissa and $b$ the exponent.\n- Examples:\n\
    \n| x | a | b |\n|---|---|---|\n| 123.45 = 1.23456 · 10^2 | 1.23456 | 2 |\n| 1000000\
    \ = 1.0 · 10^6 | 1.00000 | 6 |\n| 0.0000024 = 2.4 · 10^-6 | 2.40000 | -6 |\n\n\
    - Therefore, we can use 2 integers to encode one floating point number!\n  $x\
    \ = a \\cdot 10^b$\n- Following (roughly) the IEEE-754 standard, one uses 8 bytes\
    \ for one float $x$: these 64 bits are split as\n  - 10 bit for the exponent $b$\
    \ and\n  - 54 bit for the mantissa $a$.\n\nThis results in\n\n- largest possible\
    \ float ≈10^308 (quality measure for $b$)\n- smallest possible (positive) float\
    \ ≈10^–308 (quality measure for $b$)\n- distance between 1.0 and next larger number\
    \ ≈10^–16 (quality measure for $a$)\n\nNote that this is in principle how floating\
    \ point numbers are stored (it is actually a bit more complicated).\n\n#### Limitations\
    \ of complex numbers\n\nThe complex number type has essentially the same limitations\
    \ as the float data type (see limitations of floats) because a complex number\
    \ consists of two floats: one represents the real part, the other one the imaginary\
    \ part.\n\n#### ...are these number types of practical value?\n\nIn practice,\
    \ we do not usually find numbers in our daily life that exceed 10^300 (this is\
    \ a number with 300 zeros!), and therefore the floating point numbers cover the\
    \ range of numbers we usually need.\n\nHowever, be warned that in scientific computation\
    \ small and large numbers are used which may (often in intermediate results) exceed\
    \ the range of floating point numbers.\n\n- Imagine for example, that we have\
    \ to take the fourth power of the constant $h = 1.0545716 \\cdot 10^{-34}kgm^2/s$:\n\
    - $h^4 = 1.2368136958909421 \\cdot 10^{-136}k^4g^4m^8/s^4$ which is “halfway”\
    \ to our representable smallest positive float of the order of $10^{-308}$."
