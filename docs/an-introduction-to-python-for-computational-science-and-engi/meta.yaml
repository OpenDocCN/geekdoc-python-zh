    \ 中的大部分命令（在两次调用 `fmin` 之后）用于创建函数图、搜索的起始点以及获得的最小值：\n\n```\npython\nfrom numpy import\
    \ arange, cos, exp\nfrom scipy.optimize import import fmin\nimport pylab\n\ndef\
    \ f(x):\n    return cos(x) - 3 * exp( -(x - 0.2) ** 2)\n\n# find minima of f(x),\n\
