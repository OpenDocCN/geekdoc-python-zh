- md: "## 3.4.2 Call by reference\n\nCalling a function by reference, on the other\
    \ hand, means that the object given to a function is a reference to the object.\
    \ This means that the function will see the same object as in the calling code\
    \ (because they are referencing the same object: we can think of the reference\
    \ as a pointer to the place in memory where the object is located). Any changes\
    \ acting on the object inside the function, will then be visible in the object\
    \ at the calling level (because the function does actually operate on the same\
    \ object, not a copy of it).\n\nHere is one example showing this using pointers\
    \ in C:\n\n```c\n#include <stdio.h>\n\nvoid pass_by_reference(int *m) {\n    printf(\"\
    in pass_by_reference: received m=%d\\n\",*m);\n    *m=42;\n    printf(\"in pass_by_reference:\
    \ changed to m=%d\\n\",*m);\n}\n\nint main(void) {\n    int global_m = 1;\n  \
    \  printf(\"global_m=%d\\n\",global_m);\n    pass_by_reference(&global_m);\n \
    \   printf(\"global_m=%d\\n\",global_m);\n    return 0;\n}\n```\n\ntogether with\
    \ the corresponding output:\n\n```\nglobal_m=1\nin pass_by_reference: received\
    \ m=1\nin pass_by_reference: changed to m=42\nglobal_m=42\n```\n\nC++ provides\
    \ the ability to pass arguments as references by adding an ampersand in front\
    \ of the argument name in the function definition:\n\n```c++\n#include <stdio.h>\n\
    \nvoid pass_by_reference(int &m) {\n    printf(\"in pass_by_reference: received\
    \ m=%d\\n\",m);\n    m=42;\n    printf(\"in pass_by_reference: changed to m=%d\\\
    n\",m);\n}\n\nint main(void) {\n    int global_m = 1;\n    printf(\"global_m=%d\\\
    n\",global_m);\n    pass_by_reference(global_m);\n    printf(\"global_m=%d\\n\"\
    ,global_m);\n    return 0;\n}\n```\n\ntogether with the corresponding output:\n\
    \n```\nglobal_m=1\nin pass_by_reference: received m=1\nin pass_by_reference: changed\
    \ to m=42\nglobal_m=42\n```\n\n## 3.4.3 Argument passing in Python\n\nIn Python,\
    \ objects are passed as the value of a reference (think pointer) to the object.\
    \ Depending on the way the reference is used in the function and depending on\
    \ the type of object it references, this can result in pass-by-reference behaviour\
    \ (where any changes to the object received as a function argument, are immediately\
    \ reflected in the calling level).\n\nHere are three examples to discuss this.\
    \ We start by passing a list to a function which iterates through all elements\
    \ in the sequence and doubles the value of each element:\n\n```python\ndef double_the_values(l):\n\
    \    print(\"in double_the_values: l = %s\" % l)\n    for i in range(len(l)):\n\
    \        l[i] = l[i] * 2\n    print(\"in double_the_values: changed l to l = %s\"\
    \ % l)\n\nl_global = [0, 1, 2, 3, 10]\nprint(\"In main: s=%s\" % l_global)\ndouble_the_values(l_global)\n\
    print(\"In main: s=%s\" % l_global)\n```\n\n```\nIn main: s=[0, 1, 2, 3, 10]\n\
    in double_the_values: l = [0, 1, 2, 3, 10]\nin double_the_values: changed l to\
    \ l = [0, 2, 4, 6, 20]\nIn main: s=[0, 2, 4, 6, 20]\n```\n\nThe variable l is\
    \ a reference to the list object. The line `l[i] = l[i] * 2` first evaluates the\
    \ right-hand side and reads the element with index i, then multiplies this by\
    \ two. A reference to this new object is then stored in the list object l at position\
    \ with index i. We have thus modified the list object, that is referenced through\
    \ l.\n\nThe reference to the list object does never change: the line `l[i] = l[i]\
    \ * 2` changes the elements `l[i]` of the list `l` but never changes the reference\
    \ `l` for the list. Thus both the function and calling level are operating on\
    \ the same object through the references `l` and `global_l`, respectively.\n\n\
    In contrast, here is an example where do not modify the elements of the list within\
    \ the function: which produces this output:\n\n```python\ndef double_the_list(l):\n\
    \    print(\"in double_the_list: l = %s\" % l)\n    l = l + l\n    print(\"in\
    \ double_the_list: changed l to l = %s\" % l)\n\nl_global = \"Hello\"\nprint(\"\
    In main: l=%s\" % l_global)\ndouble_the_list(l_global)\nprint(\"In main: l=%s\"\
    \ % l_global)\n```\n\n```\nIn main: l=Hello\nin double_the_list: l = Hello\nin\
    \ double_the_list: changed l to l = HelloHello\nIn main: l=Hello\n```\n\nWhat\
    \ happens here is that during the evaluation of `l = l + l` a new object is created\
    \ that holds `l + l`, and that we then bind the name `l` to it. In the process,\
    \ we lose the references to the list object `l` that was given to the function\
    \ (and thus we do not change the list object given to the function).\n\nFinally,\
    \ let's look at which produces this output:\n\n```python\ndef double_the_value(l):\n\
    \    print(\"in double_the_value: l = %s\" % l)\n    l = 2 * l\n    print(\"in\
    \ double_the_values: changed l to l = %s\" % l)\n\nl_global = 42\nprint(\"In main:\
    \ s=%s\" % l_global)\ndouble_the_value(l_global)\nprint(\"In main: s=%s\" % l_global)\n\
    ```\n\n```\nIn main: s=42\nin double_the_value: l = 42\nin double_the_values:\
    \ changed l to l = 84\nIn main: s=42\n```\n\nIn this example, we also double the\
    \ value (from 42 to 84) within the function. However, when we bind the object\
    \ 84 to the python name `l` (that is the line `l = l * 2`) we have created a new\
    \ object (84), and we bind the new object to `l`. In the process, we lose the\
    \ reference to the object 42 within the function. This does not affect the object\
    \ 42 itself, nor the reference `l_global` to it.\n\nIn summary, Python's behaviour\
    \ of passing arguments to a function may appear to vary (if we view it from the\
    \ pass by value versus pass by reference point of view). However, it is always\
    \ call by value, where the value is a reference to the object in question, and\
    \ the behaviour can be explained through the same reasoning in every case.\n\n\
    ## 3.4.4 Performance considerations\n\nCall by value function calls require copying\
    \ of the value before it is passed to the function. From a performance point of\
    \ view (both execution time and memory requirements), this can be an expensive\
    \ process if the value is large. (Imagine the value is a `numpy.array` object\
    \ which could be several Megabytes or Gigabytes in size.)\n\nOne generally prefers\
    \ call by reference for large data objects as in this case only a pointer to the\
    \ data objects is passed, independent of the actual size of the object, and thus\
    \ this is generally faster than call-by-value.\n\nPython's approach of (effectively)\
    \ calling by reference is thus efficient. However, we need to be careful that\
    \ our function do not modify the data they have been given where this is undesired.\n\
    \n## 3.4.5 Inadvertent modification of data\n\nGenerally, a function should not\
    \ modify the data given as input to it.\n\nFor example, the following code demonstrates\
    \ the attempt to determine the maximum value of a list, and – inadvertently –\
    \ modifies the list in the process:\n\n```python\ndef mymax(s):  # demonstrating\
    \ side effect\n    if len(s) == 0:\n        raise ValueError('mymax() arg is an\
    \ empty sequence')\n    elif len(s) == 1:\n        return s[0]\n    else:\n  \
    \      for i in range(1, len(s)):\n            if s[i] < s[i - 1]:\n         \
    \       s[i] = s[i - 1]\n        return s[len(s) - 1]\n\ns = [-45, 3, 6, 2, -1]\n\
    print(\"in main before calling mymax(s): s=%s\" % s)\nprint(\"mymax(s)=%s\" %\
    \ mymax(s))\nprint(\"in main after calling mymax(s): s=%s\" % s)\n```\n\n```\n\
    in main before calling mymax(s): s=[-45, 3, 6, 2, -1]\nmymax(s)=6\nin main after\
    \ calling mymax(s): s=[-45, 3, 6, 6, 6]\n```\n\nThe user of the `mymax()` function\
    \ would not expect that the input argument is modified when the function executes.\
    \ We should generally avoid this. There are several ways to find better solutions\
    \ to the given problem:\n\n- In this particular case, we could use the Python\
    \ in-built function `max()` to obtain the maximum value of a sequence.\n- If we\
    \ felt we need to stick to storing temporary values inside the list [this is actually\
    \ not necessary], we could create a copy of the incoming list `s` first, and then\
    \ proceed with the algorithm (see *below* on Copying objects).\n- Use another\
    \ algorithm which uses an extra temporary variable rather than abusing the list\
    \ for this. For example:\n- We could pass a tuple (instead of a list) to the function:\
    \ a tuple is *immutable* and can thus never be modified (this would result in\
    \ an exception being raised when the function tries to write to elements in the\
    \ tuple)."
  mdcn: "## 3.4.2 引用传递\n\n另一方面，通过引用调用函数意味着传递给函数的对象是该对象的一个引用。这意味着函数将看到与调用代码中相同的对象（因为它们引用的是同一个对象：我们可以将引用视为指向对象在内存中位置的指针）。在函数内部对对象进行的任何更改，都会在调用层级的对象中体现出来（因为函数实际上操作的是同一个对象，而不是它的副本）。\n\
    \n下面是一个使用 C 语言指针展示此概念的示例：\n\n```c\n#include <stdio.h>\n\nvoid pass_by_reference(int\
    \ *m) {\n    printf(\"in pass_by_reference: received m=%d\\n\",*m);\n    *m=42;\n\
    \    printf(\"in pass_by_reference: changed to m=%d\\n\",*m);\n}\n\nint main(void)\
    \ {\n    int global_m = 1;\n    printf(\"global_m=%d\\n\",global_m);\n    pass_by_reference(&global_m);\n\
    \    printf(\"global_m=%d\\n\",global_m);\n    return 0;\n}\n```\n\n以及相应的输出：\n\
    \n```\nglobal_m=1\nin pass_by_reference: received m=1\nin pass_by_reference: changed\
    \ to m=42\nglobal_m=42\n```\n\nC++ 通过在函数定义中参数名前添加一个 `&` 符号，提供了按引用传递参数的能力：\n\n\
    ```c++\n#include <stdio.h>\n\nvoid pass_by_reference(int &m) {\n    printf(\"\
    in pass_by_reference: received m=%d\\n\",m);\n    m=42;\n    printf(\"in pass_by_reference:\
    \ changed to m=%d\\n\",m);\n}\n\nint main(void) {\n    int global_m = 1;\n   \
    \ printf(\"global_m=%d\\n\",global_m);\n    pass_by_reference(global_m);\n   \
    \ printf(\"global_m=%d\\n\",global_m);\n    return 0;\n}\n```\n\n以及相应的输出：\n\n\
    ```\nglobal_m=1\nin pass_by_reference: received m=1\nin pass_by_reference: changed\
    \ to m=42\nglobal_m=42\n```\n\n## 3.4.3 Python 中的参数传递\n\n在 Python 中，对象是以引用（可以理解为指针）的值形式传递的。根据引用在函数中的使用方式以及它所引用的对象类型，这可能导致引用传递的行为（即对作为函数参数接收到的对象的任何更改，都会立即反映在调用层级）。\n\
    \n这里有三个例子来讨论这一点。我们首先将一个列表传递给一个函数，该函数遍历序列中的所有元素并将每个元素的值加倍：\n\n```python\ndef double_the_values(l):\n\
    \    print(\"in double_the_values: l = %s\" % l)\n    for i in range(len(l)):\n\
    \        l[i] = l[i] * 2\n    print(\"in double_the_values: changed l to l = %s\"\
    \ % l)\n\nl_global = [0, 1, 2, 3, 10]\nprint(\"In main: s=%s\" % l_global)\ndouble_the_values(l_global)\n\
    print(\"In main: s=%s\" % l_global)\n```\n\n```\nIn main: s=[0, 1, 2, 3, 10]\n\
    in double_the_values: l = [0, 1, 2, 3, 10]\nin double_the_values: changed l to\
    \ l = [0, 2, 4, 6, 20]\nIn main: s=[0, 2, 4, 6, 20]\n```\n\n变量 `l` 是对列表对象的一个引用。`l[i]\
    \ = l[i] * 2` 这一行首先计算右侧的值，读取索引为 `i` 的元素，然后将其乘以二。然后，这个新对象的引用被存储在列表对象 `l` 的索引 `i`\
    \ 位置。因此，我们修改了通过 `l` 引用的列表对象。\n\n对列表对象的引用从未改变：`l[i] = l[i] * 2` 这一行改变了列表 `l` 的元素\
    \ `l[i]`，但从未改变列表的引用 `l`。因此，函数和调用层级都通过各自的引用 `l` 和 `global_l` 操作同一个对象。\n\n相比之下，下面是一个在函数内不修改列表元素的例子：它产生以下输出：\n\
    \n```python\ndef double_the_list(l):\n    print(\"in double_the_list: l = %s\"\
    \ % l)\n    l = l + l\n    print(\"in double_the_list: changed l to l = %s\" %\
    \ l)\n\nl_global = \"Hello\"\nprint(\"In main: l=%s\" % l_global)\ndouble_the_list(l_global)\n\
    print(\"In main: l=%s\" % l_global)\n```\n\n```\nIn main: l=Hello\nin double_the_list:\
    \ l = Hello\nin double_the_list: changed l to l = HelloHello\nIn main: l=Hello\n\
    ```\n\n这里发生的情况是，在计算 `l = l + l` 时，创建了一个包含 `l + l` 的新对象，然后我们将名称 `l` 绑定到它。在这个过程中，我们失去了对传递给函数的列表对象\
    \ `l` 的引用（因此我们没有改变传递给函数的列表对象）。\n\n最后，让我们看看这个例子，它产生以下输出：\n\n```python\ndef double_the_value(l):\n\
    \    print(\"in double_the_value: l = %s\" % l)\n    l = 2 * l\n    print(\"in\
    \ double_the_values: changed l to l = %s\" % l)\n\nl_global = 42\nprint(\"In main:\
    \ s=%s\" % l_global)\ndouble_the_value(l_global)\nprint(\"In main: s=%s\" % l_global)\n\
    ```\n\n```\nIn main: s=42\nin double_the_value: l = 42\nin double_the_values:\
    \ changed l to l = 84\nIn main: s=42\n```\n\n在这个例子中，我们也在函数内将值加倍（从 42 到 84）。然而，当我们把对象\
    \ 84 绑定到 Python 名称 `l`（即 `l = l * 2` 这一行）时，我们创建了一个新对象（84），并将新对象绑定到 `l`。在这个过程中，我们失去了对函数内对象\
    \ 42 的引用。这既不影响对象 42 本身，也不影响对它的引用 `l_global`。\n\n总之，Python 将参数传递给函数的行为可能看起来会变化（如果我们从按值传递与按引用传递的角度来看）。然而，它始终是按值传递，其中的值是相关对象的引用，并且在所有情况下都可以通过相同的推理来解释其行为。\n\
    \n## 3.4.4 性能考量\n\n按值传递的函数调用需要在将值传递给函数之前复制该值。从性能角度来看（包括执行时间和内存需求），如果值很大，这可能是一个昂贵的过程。（想象一下，这个值是一个\
    \ `numpy.array` 对象，其大小可能达到几兆字节或几吉字节。）\n\n对于大型数据对象，通常更倾向于使用引用传递，因为在这种情况下，只传递指向数据对象的指针，与对象的实际大小无关，因此通常比按值传递更快。\n\
    \nPython（实际上）按引用传递的方法因此是高效的。然而，我们需要小心，确保我们的函数不会在不需要的情况下修改它们接收到的数据。\n\n## 3.4.5\
    \ 数据的意外修改\n\n通常，函数不应修改作为输入传递给它的数据。\n\n例如，以下代码演示了尝试确定列表最大值的过程，并在此过程中——无意地——修改了列表：\n\
    \n```python\ndef mymax(s):  # demonstrating side effect\n    if len(s) == 0:\n\
    \        raise ValueError('mymax() arg is an empty sequence')\n    elif len(s)\
    \ == 1:\n        return s[0]\n    else:\n        for i in range(1, len(s)):\n\
    \            if s[i] < s[i - 1]:\n                s[i] = s[i - 1]\n        return\
    \ s[len(s) - 1]\n\ns = [-45, 3, 6, 2, -1]\nprint(\"in main before calling mymax(s):\
    \ s=%s\" % s)\nprint(\"mymax(s)=%s\" % mymax(s))\nprint(\"in main after calling\
    \ mymax(s): s=%s\" % s)\n```\n\n```\nin main before calling mymax(s): s=[-45,\
    \ 3, 6, 2, -1]\nmymax(s)=6\nin main after calling mymax(s): s=[-45, 3, 6, 6, 6]\n\
    ```\n\n`mymax()` 函数的用户不会期望输入参数在函数执行时被修改。我们通常应该避免这种情况。有几种方法可以找到更好的解决方案：\n\n- 在这种特定情况下，我们可以使用\
    \ Python 内置函数 `max()` 来获取序列的最大值。\n- 如果我们觉得需要坚持在列表内存储临时值（这实际上没有必要），我们可以先创建传入列表\
    \ `s` 的副本，然后继续执行算法（参见*下文*关于复制对象的部分）。\n- 使用另一种算法，该算法使用一个额外的临时变量，而不是滥用列表来存储。例如：\n\
    - 我们可以向函数传递一个元组（而不是列表）：元组是*不可变的*，因此永远无法被修改（当函数尝试写入元组中的元素时，这将导致引发异常）。"
