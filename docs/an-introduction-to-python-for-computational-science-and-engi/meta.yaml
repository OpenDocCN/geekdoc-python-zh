    'upper',\n'zfill']\n```\n\n# 4.1.1 Magic names\n\nYou will find many names which\
    \ both start and end with a double underscore (e.g. `__name__`). These are called\
    \ magic names. Functions with magic names provide the implementation of particular\
    \ python functionality.\n\nFor example, the application of the `str` to an object\
    \ `a`, i.e. `str(a)`, will – internally – result in the method `a.__str__()` being\
    \ called. This method `__str__` generally needs to return a string. The idea is\
    \ that the `__str__()` method should be defined for all objects (including those\
    \ that derive from new classes that a programmer may create) so that all objects\
    \ (independent of their type or class) can be printed using the `str()` function.\
    \ The actual conversion of some object `x` to the string is then done via the\
    \ object specific method `x.__str__()`.\n\nWe can demonstrate this by creating\
    \ a class `my_int` which inherits from the Python’s integer base class, and overrides\
    \ the `__str__` method. (It requires more Python knowledge than provided up to\
    \ this point in the text to be able to understand this example.)\n\n```\nclass\
    \ my_int(int):\n    \"\"\"Inherited from int\"\"\"\n    def __str__(self):\n \
    \       \"\"\"Tailored str representation of my int\"\"\"\n        return \"my_int:\
    \ %s\" % (int.__str__(self))\n\na = my_int(3)\nb = int(4)           # equivalent\
    \ to b = 4\nprint(\"a * b = \", a * b)\nprint(\"Type a = \", type(a), \"str(a)\
    \ = \", str(a))\nprint(\"Type b = \", type(b), \"str(b) = \", str(b))\n```"
