    \ shown in the upper plot.\n\n## 16.9 Optimisation\n\nOften we need to find the\
    \ maximum or minimum of a particular function $f(x)$ where $f$ is a scalar function\
    \ but $x$ could be a vector. Typical applications are the minimisation of entities\
