    \ module1.py`）：\n\n```python\n!python3 module1.py\n```\n\n```\nMy name is __main__\n\
    ```\n\n我们注意到，如果程序文件`module1.py`被执行，Python的魔术变量`__name__`会取值`__main__`。\n\n另一方面，我们可以在另一个文件（可以命名为`prog.py`）中*导入*`module1.py`，例如像这样：\n\
