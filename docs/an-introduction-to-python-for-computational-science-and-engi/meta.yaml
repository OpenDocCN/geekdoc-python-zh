  md: "# Introduction to Python for Computational Science and Engineering\n\nThe reference\
    \ to the list object does never change: the line `l[i] = l[i] * 2` changes the\
    \ elements `l[i]` of the list `l` but never changes the reference `l` for the\
    \ list. Thus both the function and calling level are operating on the same object\
    \ through the references `l` and `global_l`, respectively.\n\nIn contrast, here\
    \ is an example where do not modify the elements of the list within the function:\
    \ which produces this output:\n\n```\ndef double_the_list(l):\n    print(\"in\
    \ double_the_list: l = %s\" % l)\n    l = l + l\n    print(\"in double_the_list:\
    \ changed l to l = %s\" % l)\n\nl_global = \"Hello\"\nprint(\"In main: l=%s\"\
    \ % l_global)\ndouble_the_list(l_global)\nprint(\"In main: l=%s\" % l_global)\n\
    ```\n\n```\nIn main: l=Hello\nin double_the_list: l = Hello\nin double_the_list:\
    \ changed l to l = HelloHello\nIn main: l=Hello\n```\n\nWhat happens here is that\
    \ during the evaluation of `l = l + l` a new object is created that holds `l +\
    \ l`, and that we then bind the name `l` to it. In the process, we lose the references\
    \ to the list object `l` that was given to the function (and thus we do not change\
    \ the list object given to the function).\n\nFinally, let's look at which produces\
    \ this output:\n\n```\ndef double_the_value(l):\n    print(\"in double_the_value:\
    \ l = %s\" % l)\n    l = 2 * l\n    print(\"in double_the_values: changed l to\
    \ l = %s\" % l)\n\nl_global = 42\nprint(\"In main: s=%s\" % l_global)\ndouble_the_value(l_global)\n\
    print(\"In main: s=%s\" % l_global)\n```\n\n```\nIn main: s=42\nin double_the_value:\
    \ l = 42\nin double_the_values: changed l to l = 84\nIn main: s=42\n```\n\nIn\
    \ this example, we also double the value (from 42 to 84) within the function.\
    \ However, when we bind the object 84 to the python name `l` (that is the line\
    \ `l = l * 2`) we have created a new object (84), and we bind the new object to\
    \ `l`. In the process, we lose the reference to the object 42 within the function.\
    \ This does not affect the object 42 itself, nor the reference `l_global` to it.\n\
    \nIn summary, Python's behaviour of passing arguments to a function may appear\
    \ to vary (if we view it from the pass by value versus pass by reference point\
    \ of view). However, it is always call by value, where the value is a reference\
    \ to the object in question, and the behaviour can be explained through the same\
    \ reasoning in every case."
