  md: "```\nmylist2 = [(\"Hans Fangohr\", \"fangohr\"),\n          (\"The Administrator\"\
    , \"admin\"),\n          (\"The Guest\", \"guest\")]\n```\n\nWe want to sort with\
    \ the id as the primary key. The first approach to do this is to change the order\
    \ of `mylist2` to that of `mylist`, and use `sort` as shown above.\n\nThe second,\
    \ neater approach relies on being able to decypher the cryptic help for the sorted\
    \ function. `list.sort()` has the same options, but its help is less helpful.\n\
    \n```\n# NBVAL_IGNORE_OUTPUT\nhelp(sorted)\n```\n\n```\nHelp on built-in function\
    \ sorted in module builtins:\n\nsorted(iterable, /, *, key=None, reverse=False)\n\
    \    Return a new list containing all items from the iterable in ascending order.\n\
    \n    A custom key function can be supplied to customize the sort order, and the\n\
    \    reverse flag can be set to request the result in descending order.\n```\n\
    \nYou should notice that `sorted` and `list.sort` have two keyword parameters.\
    \ The first of these is called `key`. You can use this to supply a *key function*,\
    \ which will be used to transform the items for sort to compare.\n\nLet's illustrate\
    \ this in the context of our exercise, by assuming that we have stored a list\
    \ of pairs like this\n\n```\npair = name, id\n```\n\n(i.e. as in `mylist2`) and\
    \ that we want to sort according to id and ignore name. We can achieve this by\
    \ writing a function that retrieves only the second element of the pair it receives:\n\
    \n```\ndef my_key(pair):\n    return pair[1]\n```\n\n```\nmylist2.sort(key=my_key)\n\
    ```\n\nThis also works with an anonymous function:\n\n```\nmylist2.sort(key=lambda\
    \ p: p[1])\n```\n\n# 9.2.1 Efficiency\n\nThe `key` function will be called exactly\
    \ once for every element in the list. This is much more efficient than calling\
    \ a function on every *comparison* (which was how you customised sorting in older\
    \ versions of Python). But if you have a large list to sort, the overhead of calling\
    \ a Python function (which is relatively large compared to the C function overhead)\
    \ might be noticeable.\n\nIf efficiency is really important (and you have proven\
    \ that a significant proportion of time is spent in these functions) then you\
    \ have the option of re-coding them in C (or another low-level language)."
