    y = map(lambda x: x**2, range(10))\n```\n\n使用列表推导式和 `map` 的版本只占一行代码，而 for 循环需要\
    \ 3 行。这个例子表明，函数式代码能产生非常*简洁*的表达式。通常，程序员犯错的数量与编写的代码行数成正比，因此代码行数越少，需要查找的 bug 就越少。\n\
    \n程序员们常常发现，最初本章介绍的列表处理工具似乎不如使用 for 循环逐个处理列表中的元素那样直观，但随着时间的推移，他们会逐渐重视并欣赏一种更函数式的编程风格。\n\
    \n## 8.7 速度\n\n本章描述的函数式工具在处理列表元素时，也可能比使用显式（for 或 while）循环更快。\n\n下面的程序 `list_comprehension_speed.py`\
    \ 使用 4 种不同的方法计算 $\\sum_{i=0}^{N-1} i^2$（其中 $N$ 取一个较大的值），并记录执行时间：\n\n- 方法 1：for\
    \ 循环（使用预分配的列表，将 $i^2$ 存储在列表中，然后使用内置的 `sum` 函数）\n- 方法 2：不使用列表的 for 循环（在 for 循环过程中更新总和）\n\
    - 方法 3：使用列表推导式\n- 方法 4：使用 numpy。（numpy 将在*第 14 章*中介绍）\n\n这是一个可能的计算程序：\n\n```\n\
    # NBVAL_IGNORE_OUTPUT\n\"\"\"Compare calculation of \\sum_i x_i^2 with\ni going\
    \ from zero to N-1.\n\nWe use (i) for loops and list, (ii) for-loop, (iii) list\
    \ comprehension\nand (iv) numpy.\n\nWe use floating numbers to avoid using Python's\
    \ long int (which would\nbe likely to make the timings less representative).\n\
    \"\"\"\n\nimport time\nimport numpy\nN = 10000000\n\ndef timeit(f, args):\n  \
    \  \"\"\"Given a function f and a tuple args containing\n    the arguments for\
    \ f, this function calls f(*args),\n    and measures and returns the execution\
    \ time in\n    seconds.\n\n    Return value is tuple: entry 0 is the time,\n \
    \   entry 1 is the return value of f.\"\"\"\n\n    starttime = time.time()\n \
    \   y = f(*args)    # use tuple args as input arguments\n    endtime = time.time()\n\
    \    return endtime - starttime, y\n\ndef forloop1(N):\n    s = 0\n    for i in\
    \ range(N):\n        s += float(i) * float(i)\n    return s\n\ndef forloop2(N):\n\
    \    y = [0] * N\n    for i in range(N):\n        y[i] = float(i) ** 2\n    return\
    \ sum(y)\n\ndef listcomp(N):\n    return sum([float(x) * x for x in range(N)])\n\
    \ndef numpy_(N):\n    return numpy.sum(numpy.arange(0, N, dtype='d') ** 2)\n\n\
    # main program starts\ntimings = []\nprint(\"N =\", N)\nforloop1_time, f1_res\
    \ = timeit(forloop1, (N,))\ntimings.append(forloop1_time)\nprint(\"for-loop1:\
    \ {:5.3f}s\".format(forloop1_time))\nforloop2_time, f2_res = timeit(forloop2,\
    \ (N,))\ntimings.append(forloop2_time)\nprint(\"for-loop2: {:5.3f}s\".format(forloop2_time))\n\
    listcomp_time, lc_res = timeit(listcomp, (N,))\ntimings.append(listcomp_time)\n\
    print(\"listcomp : {:5.3f}s\".format(listcomp_time))\nnumpy_time, n_res = timeit(numpy_,\
    \ (N,))\ntimings.append(numpy_time)\nprint(\"numpy    : {:5.3f}s\".format(numpy_time))\n\
    \n# ensure that different methods provide identical results\nassert f1_res ==\
    \ f2_res\nassert f1_res == lc_res\n\n# Allow a bit of difference for the numpy\
    \ calculation\nnumpy.testing.assert_approx_equal(f1_res, n_res)\n\nprint(\"Slowest\
    \ method is {:.1f} times slower than the fastest method.\"\n      .format(max(timings)/min(timings)))\n\
    ```\n\n```\nN = 10000000\n\nfor-loop1: 2.001s\n\nfor-loop2: 1.963s\n\nlistcomp\
    \ : 1.539s\nnumpy    : 0.093s\nSlowest method is 21.6 times slower than the fastest\
    \ method.\n```\n\n实际的执行性能取决于计算机。相对性能可能取决于我们使用的 Python 版本及其支持库（如 numpy）的版本。\n\n\
    在当前版本（Python 3.6，numpy 1.11，在运行 OS X 的 x84 机器上），我们看到方法 1 和 2（不使用列表的 for 循环和使用预分配列表的\
    \ for 循环）最慢，稍快一点的列表推导式紧随其后。最快的方法是第 4 种（使用 numpy）。\n\n## 8.8 %%timeit 魔法命令\n\n\
    如果我们使用 IPython 作为 shell（或在运行 Python 内核的 Jupyter notebook 中使用单元格），有一种比上面更复杂的方法来测量时间：如果一个单元格以\
    \ `%%timeit` 开头，IPython 将重复运行该单元格中的命令并获得（平均的）计时结果。这对于测量执行相对较快的命令特别有用。\n\n让我们使用\
    \ `timeit` 魔法命令来比较列表推导式和显式循环：\n\n```\n%%timeit\ny = [x**2 for x in range(100)]\n\
    ```\n\n23.8 μs ± 19.9 ns per loop (mean ± std. dev. of 7 runs, 10000 loops each)\n\
    \n```\n%%timeit\ny = []\nfor x in range(100):\n    y.append(x**2)\n```"
