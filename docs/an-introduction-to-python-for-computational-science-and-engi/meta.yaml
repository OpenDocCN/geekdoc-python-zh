    \ in principle – be done with Matplotlib. If you need a plot like this, the expectation\
    \ is that you will need to experiment and possibly learn a bit more about Matplotlib.\n\
    \n## 15.3.2 Visualising matrix data\n\nThe program below demonstrates how to create\
    \ a bitmap-plot of the entries of a matrix.\n\n```python\nimport numpy as np\n\
    import matplotlib.pyplot as plt\n\n# Helper function (from https://github.com/matplotlib/matplotlib/blob/master/lib/matplotlib/mlab.py\n\
    # as of August 2018)\ndef bivariate_normal(X, Y, sigmax=1.0, sigmay=1.0,\n   \
    \                  mux=0.0, muy=0.0, sigmaxy=0.0):\n    \"\"\"\n    Bivariate\
    \ Gaussian distribution for equal shape *X*, *Y*.\n    See `bivariate normal\n\
    \    <https://mathworld.wolfram.com/BivariateNormalDistribution.html>`_\n    at\
    \ mathworld.\n    \"\"\"\n    Xmu = X - mux\n    Ymu = Y - muy\n\n    rho = sigmaxy\
    \ / (sigmax*sigmay)\n    z = Xmu**2 / sigmax**2 + Ymu**2 / sigmay**2 - 2*rho*Xmu*Ymu/(sigmax*sigmay)\n\
    \    denom = 2*np.pi*sigmax*sigmay*np.sqrt(1-rho**2)\n    return np.exp(-z/(2*(1-rho**2)))\
    \ / denom\n```\n\n```python\n# create matrix Z that contains some interesting\
    \ data\ndelta = 0.1\nx = y = np.arange(-3.0, 3.0, delta)\nX, Y = np.meshgrid(x,\
    \ y)\nZ = bivariate_normal(X, Y, 3.0, 1.0, 0.0, 0.0)\n\n# display the 'raw' matrix\
    \ data of Z in one set of axis\nfig, axes = plt.subplots(ncols=2)\nax0, ax1 =\
    \ axes\nax0.imshow(Z, interpolation='nearest')\nax0.set_title(\"no interpolation\"\
    )\n\n# display the data interpolated in other set of axis\nim = ax1.imshow(Z,\
    \ interpolation='bilinear')\nax1.set_title(\"with bi-linear interpolation\")\n\
    \nfig.suptitle(\"imshow example\")\nfig.savefig(\"pylabimshow.pdf\")\n```\n\n\
    To use different colourmaps, we make use of the `matplotlib.cm` module (where\
    \ cm stands for Colour Map). The code below demonstrates how we can select colourmaps\
    \ from the set of already provided maps, and how we can modify them (here by reducing\
    \ the number of colours in the map). The last example mimics the behaviour of\
    \ the more sophisticated `contour` command that also comes with `matplotlib`.\n\
    \n```python\nimport numpy as np\nimport matplotlib.pyplot as plt\nimport matplotlib.cm\
    \ as cm          # Colour map submodule\n\n# create matrix Z that contains some\
    \ data interesting data\ndelta = 0.025\nx = y = np.arange(-3.0, 3.0, delta)\n\
    X, Y = np.meshgrid(x, y)\nZ = bivariate_normal(X, Y, 3.0, 1.0, 0.0, 0.0)\n```\n\
    \n```python\n# Create a matrix of axes with 2 rows and 3 columns\nfig, axes =\
    \ plt.subplots(nrows=2, ncols=3)\n\nax = axes[0, 0]\nax.imshow(Z, cmap=cm.viridis)\
    \  # viridis colourmap\nax.set_title(\"colourmap jet\")\n\nax = axes[0, 1]\nax.imshow(Z,\
    \ cmap=cm.viridis_r)  # reverse viridis colourmap\nax.set_title(\"colourmap jet_r\"\
    )\n\nax = axes[0, 2]\nax.imshow(Z, cmap=cm.gray)\nax.set_title(\"colourmap gray\"\
    )\n\nax = axes[1, 0]\nax.imshow(Z, cmap=cm.hsv)\nax.set_title(\"colourmap hsv\"\
    )  # this one is periodic\n\nax = axes[1, 1]\nax.imshow(Z, cmap=cm.plasma)\nax.set_title(\"\
    colourmap plasma\")\n\nax = axes[1, 2]\n# make isolines by reducing number of\
