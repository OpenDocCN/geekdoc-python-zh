  md: "# Introduction to Python for Computational Science and Engineering\n\n(continued\
    \ from previous page)\n\nThe following color abbreviations are supported:\n\n\
    ```\n============  =========\ncharacter     color\n============  =========\n'b'\
    \           blue\n'g'           green\n'r'           red\n'c'           cyan\n\
    'm'           magenta\n'y'           yellow\n'k'           black\n'w'        \
    \   white\n============  =========\n```\n\nIn addition, you can specify colors\
    \ in many weird and wonderful ways, including full names (``'green'``), hex strings\
    \ (``'#008000'``), RGB or RGBA tuples (``(0,1,0,1)``) or grayscale intensities\
    \ as a string (``'0.8'``). Of these, the string specifications can be used in\
    \ place of a ``fmt`` group, but the tuple forms can be used only as ``kwargs``.\n\
    \nLine styles and colors are combined in a single format string, as in ``'bo'``\
    \ for blue circles.\n\nThe *kwargs* can be used to set line properties (any property\
    \ that has a ``set_*`` method). You can use this to set a line label (for auto\
    \ legends), linewidth, anitialising, marker face color, etc. Here is an example::\n\
    \n```\nplot([1,2,3], [1,2,3], 'go-', label='line 1', linewidth=2)\nplot([1,2,3],\
    \ [1,4,9], 'rs',  label='line 2')\naxis([0, 4, 0, 10])\nlegend()\n```\n\nIf you\
    \ make multiple lines with one plot command, the kwargs apply to all those lines,\
    \ e.g.::\n\n```\nplot(x1, y1, x2, y2, antialised=False)\n```\n\nNeither line will\
    \ be antialiased.\n\nYou do not need to use format strings, which are just abbreviations.\
    \ All of the line properties can be controlled by keyword arguments. For example,\
    \ you can set the color, marker, linestyle, and markercolor with::\n\n```\nplot(x,\
    \ y, color='green', linestyle='dashed', marker='o',\n     markerfacecolor='blue',\
    \ markersize=12). See\n     :class:`~matplotlib.lines.Line2D` for details.\n```\n\
    \nThe use of different line styles and thicknesses is particularly useful when\
    \ colour cannot be used to distinguish lines (for example when graph will be used\
    \ in document that is to be printed in black and white only)."
