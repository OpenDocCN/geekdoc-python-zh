  md: '# 15.6.1 Exploiting self-describing data for visualisation


    Some libraries, such as Pandas (see also *Chapter on Pandas*), Xarray, and holoviews
    make use of the idea of self-describing data to simplify the visualisation: while
    the data in a numpy array is ‘just’ a (multidimensional) matrix of data points,
    these libraries can store metadata – such as headings and coordinates – associated
    with these data points. We also talked about annotated or labelled data to describe
    the presence of such metadata.


    What is the benefit of having this meta-data available? An xarray, for example,
    may store a 2d-array (like a numpy array) but have the metadata store that one
    dimension refers to the x-position and the other direction to time. The x-array
    object provides convenience methods to select and plot the data in the xarray.


    # 15.6.2 The future of data visualisation


    I would speculate that increasingly we will be using high-level plotting tools
    (such as pandas, xarray, holoviews) to explore data interactively.


    We can see a trend in data analysis libraries that data objects can be converted
    to such high-level annotated data objecs (such as European XFEL’s extra-data tools
    which can return a labelled xarray object). Other projects combine the metadata
    with the data in custom made objects to then provide convenience methods (such
    as Ubermag’s discretisedfield object).


    Will we still need to learn the basics, such as the `matplotlib.pyplot` interface?
    Probably yes: the very least to fine tune the plots provided by these high level
    libraries:


    # 15.6.3 Fine-tuning matplotlib plots that are generated by high level frame works


    We show one example where pandas – as a representative for a high-level framework
    that can create plots – creates the plot, but we use `pyplot` commands to tailor
    the resulting plot.


    Let’s define the pandas data series first (it is not importat to understand the
    details of this now):


    ```

    import pandas as pd

    s = pd.Series(data=[10, 20, 1], index=[''bananas'', ''oranges'', ''potatoes''])

    s

    ```


    ```

    bananas      10

    oranges      20

    potatoes      1

    dtype: int64

    ```


    We can use a convenience method from pandas to create a plot of the data series:


    ```

    s.plot.bar()

