  md: '# 12.1.7 Series expansions and plotting


    It is possible to expand many SymPy expressions as Taylor series. The `series`
    method makes this straightforward. At minimum, we must specify the expression
    and the variable in which to expand it. Optionally, we can also specify the point
    around which to expand, the maximum term number, and the direction of the expansion
    (try `help(Basic.series)` for more information).


    ```

    from sympy import *

    x = Symbol(''x'')

    sin(x).series(x, 0)

    ```


    $$x - \frac{x^3}{6} + \frac{x^5}{120} + O(x^6)$$


    ```

    series(sin(x), x, 0)

    ```


    $$x - \frac{x^3}{6} + \frac{x^5}{120} + O(x^6)$$


    ```

    # NBVAL_IGNORE_OUTPUT

    cos(x).series(x, 0.5, 10)

    ```


    $$1.11729533119247 - 0.438791280945186 (x - 0.5)^2 + 0.0799042564340338 (x - 0.5)^3
    + 0.0365659400787655 (x - 0.5)^4 - 0.00507860278872159 (x - 0.5)^5 + 0.000423216899060132
    (x - 0.5)^6 - 0.0000211608449530066 (x - 0.5)^7 + 6.61276404781456e-7 (x - 0.5)^8
    - 1.37765917662803e-8 (x - 0.5)^9 + O((x - 0.5)^{10}, (x, 0.5))$$


    In some cases, especially for numerical evaluation and plotting the results, it
    is necessary to remove the trailing $O(n)$ term:


    ```

    # NBVAL_IGNORE_OUTPUT

    cos(x).series(x, 0.5, 10).removeO()

