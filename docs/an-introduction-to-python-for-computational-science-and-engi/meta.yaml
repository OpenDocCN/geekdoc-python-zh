  md: '# Introduction to Python for Computational Science and Engineering


    # 15.1.1 Matplotlib and Pylab


    The Matplotlib package provides *an object oriented plotting library* under the
    name space `matplotlib.pyplot`.

    The `pylab` interface is provided through the Matplotlib package. Internally it
    uses `matplotlib.pyplot` functionality but imitates the (state-driven) Matlab
    plotting interface.


    The `pylab` interface is slightly more convenient to use for simple plots, and
    `matplotlib.pyplot` gives far more detailed control over how plots are created.
    If you routinely need to produce figures, we suggest to learn about the object
    oriented `matplotlib.pyplot` interface (instead of the `pylab` interface).


    This chapter focusses on the Pylab interface, but also provides examples for the
    object-oriented `matplotlib.pyplot` interface.


    An excellent introduction and overview of the `matplotlib.pyplot` plotting interface
    is available in https://nbviewer.ipython.org/github/jrjohansson/scientific-python-lectures/blob/master/Lecture-4-Matplotlib.ipynb.


    For the purpose of this book and the `Jupyterbook` package, we use some settings
    to create a svg file for the html version of the book, and a high-resolution png
    file for the pdf version:


    ```

    %matplotlib inline

    # settings for jupyter book: svg for html version, high-resolution png for pdf

    import matplotlib_inline

    matplotlib_inline.backend_inline.set_matplotlib_formats(''svg'', ''png'')

    import matplotlib as mpl

    mpl.rcParams[''figure.dpi''] = 400

    ```


    # 15.1.2 First example


    # The pyplot interface


    The recommended way of using Matplotlib in a simple example is shown here:


    ```

    # example 1 a

    import numpy as np                # get access to fast arrays

    import matplotlib.pyplot as plt   # the plotting functions


    x = np.arange(-3.14, 3.14, 0.01)  # create x-data

    y = np.sin(x)                     # compute y-data

    plt.plot(x, y)                    # create plot

    ```


    [<matplotlib.lines.Line2D at 0x7f11fe5fe130>]'
