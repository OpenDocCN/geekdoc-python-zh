    \n## 15.2.2 绘制多条曲线\n\n有三种不同的方法来显示多条曲线。\n\n### 在一个图中绘制两条（或更多）曲线\n\n通过重复调用 `plot`\
    \ 命令，可以在同一个图中绘制多条曲线。示例：\n\n```\nimport numpy as np\nt = np.arange(0, 2*np.pi,\
    \ 0.01)\n\nimport pylab\npylab.plot(t, np.sin(t), label='sin(t)')\npylab.plot(t,\
    \ np.cos(t), label='cos(t)')\npylab.legend()\n```\n\n```\n<matplotlib.legend.Legend\
    \ at 0x7f11fc470a30>\n```\n\n![](img/311265a3784c8b1302bbc7bfff8d0ca5_166_0.png)\n\
    \n### 在一个图形窗口中绘制两个（或更多）图形\n\n`pylab.subplot` 命令允许在一个图形窗口内排列多个图形。通用语法是\n\n```\n\
    subplot(numRows, numCols, plotNum)\n```\n\n例如，要将 4 个图形排列成 2x2 矩阵，并选择第一个图形用于下一个绘图命令，可以使用：\n\
    \n```\nsubplot(2, 2, 1)\n```\n\n以下是一个完整示例，在同一个窗口中绘制两条上下对齐的正弦和余弦曲线：\n\n```\nimport\
