    - installing packages with conda

    - interplay between conda and pip


    We mention `pyenv` as an advanced tool at the very end.

    This chapter does not comment on the creation of Python packages.


    # 18.1.1 Shell commands in the Jupyter notebook


    This chapter is written in a Jupyter notebook. This can be helpful for the reader
    as the notebook can be executed, and so the command can be replayed and varied
    easily.

    In this particular chapter, we have lots of interaction with the shell of the
    operating system, and need to know two things:


    +   1. We use the exclamation mark (!) to tell Jupyter to send the following command
    to the shell (rather than interpret in the Python environment of this notebook).
    Here is an example:


    ```

    !date

    ```


    ```

    Tue Jan  4 16:03:43 CET 2022

    ```


    +   1. If we modify shell variables (such as the PATH), these are only set within
    the same cell. This will lead to repetition of some commands. This is mildly annoying
    (and will not be the case if the same commands are used outside the Jupyter Notebook).

    Here is an example to illustrate the issue: First we set a variable value and
    then we display it:'
  - '[PAGE 245]


    # Introduction to Python for Computational Science and Engineering


    ```

    !export NEW_VAR="test" && echo $NEW_VAR

    ```


    ```

    test

    ```


    The && operator instructs the shell to carry out the command to the right of &&
    if the command on the left succeeded. Repeating the “echo” command, we find the
    variable is not defined anymore:


    ```

    !echo $NEW_VAR

    ```


    So if we want to make use of those variable values, we need to repeat the setting
    of them:


    ```

    !export NEW_VAR="test" && echo "The value of NEW_VAR is $NEW_VAR."

    ```


    ```

    The value of NEW_VAR is test.

    ```


    We need to make use of this when activiting virtual environments (below).


    # 18.1.2 Prerequisits


    We assume that you have already python installed on your system. (And we assume
    that you are using Python3.) If you haven’t got Python 3 yet, then either install
    the Anaconda distribution, follow the instructions of the Hitchhiker’s Guide to
    Python or take some other action.

    Check that you have python installed:


    ```

    !python --version

    ```


    ```

    Python 3.9.7

    ```


    We also assume you have a somewhat recent Python version (3.8 and above).

    The commands below are tested for Linux and OSX operating system. If you use windows,
    please check the corresponding commands from here: https://packaging.python.org/en/latest/tutorials/installing-packages/


    # 18.2 Python virtual environments


    Before we install packages (be it our own or those from somebody else), we should
    create a new virtual environment. This is good practice because


    +   - we can delete it when we don’t need it any more

    - we can not break other projects using python we may be working on

    - we have no constraints about versions of particular libraries (it could be that
    one application needs version 2.x of a library and another application needs the
    version 1.8: if the two applications are installed in different environments,
    then this is no problem)'
  - '[PAGE 246]


    # 18.2.1 Creating virtual enviroments


    We can create a virtual environment using this command


    ```

    !python -m venv myvirtualenv

    ```


    This command creates a subdirectory with name `myvirtualenv` in the current directory
    which contains the new virtual environment:


    ```

    !ls -dl myvirtualenv/

    ```


    ```

    drwxr-xr-x  6 fangohr  staff  192 Jan  4 16:03 myvirtualenv/

    ```


    The virtual environment will use the same Python interpreter that we have used
    above when creating it. On Linux/OSX system, we can find out which interpreter
    this is by using the `which` command:


    ```

    !which python

    ```


    ```

    /Users/fangohr/anaconda3/bin/python

    ```


    If the basics are sufficient for you, you can skip to the next section about activating
    a virtual environment.

    We also be more specific, and choose a particular Python interpreter when using
    the `-m venv` command to force use of a particular python version. On a Mac (OSX),
    if python3 was installed via brew, there is a python executable in `/usr/local/bin/python3`.
    To force creation of a virtual environment using this interpreter, we could use


    ```

    /usr/local/bin/python3 -m venv myvirtualenv

