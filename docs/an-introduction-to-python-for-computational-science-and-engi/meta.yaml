- md: "The full list of options can be found when typing `help(pylab.plot)` at the\
    \ Python prompt. Because this documentation is so useful, we repeat parts of it\
    \ here:\n\n```\nplot(*args, **kwargs)\n    Plot lines and/or markers to the\n\
    \    :class:`~matplotlib.axes.Axes`.  *args* is a variable length\n    argument,\
    \ allowing for multiple *x*, *y* pairs with an\n    optional format string.  For\
    \ example, each of the following is\n    legal::\n\n        plot(x, y)       \
    \  # plot x and y using default line style and color\n        plot(x, y, 'bo')\
    \   # plot x and y using blue circle markers\n        plot(y)            # plot\
    \ y using x as index array 0..N-1\n        plot(y, 'r+')      # ditto, but with\
    \ red plusses\n\n    If *x* and/or *y* is 2-dimensional, then the corresponding\
    \ columns\n    will be plotted.\n\n    An arbitrary number of *x*, *y*, *fmt*\
    \ groups can be\n    specified, as in::\n\n        a.plot(x1, y1, 'g^', x2, y2,\
    \ 'g-')\n\n    Return value is a list of lines that were added.\n\n    The following\
    \ format string characters are accepted to control\n    the line style or marker:\n\
    \n    ==========================    ===============================\n    character\
    \                     description\n    ==========================    ===============================\n\
    \    '-'                           solid line style\n    '--'                \
    \          dashed line style\n    '-.'                          dash-dot line\
    \ style\n    ':'                           dotted line style\n    '.'        \
    \                   point marker\n    ','                           pixel marker\n\
    \    'o'                           circle marker\n    'v'                    \
    \       triangle_down marker\n    '^'                           triangle_up marker\n\
    \    '<'                           triangle_left marker\n    '>'             \
    \              triangle_right marker\n    '1'                           tri_down\
    \ marker\n    '2'                           tri_up marker\n    '3'           \
    \                tri_left marker\n    '4'                           tri_right\
    \ marker\n    's'                           square marker\n    'p'           \
    \                pentagon marker\n    '*'                           star marker\n\
    \    'h'                           hexagon1 marker\n    'H'                  \
    \         hexagon2 marker\n    '+'                           plus marker\n   \
    \ 'x'                           x marker\n    'D'                           diamond\
    \ marker\n    'd'                           thin_diamond marker\n    '|'     \
    \                      vline marker\n    '_'                           hline marker\n\
    \    ==========================    ===============================\n```\n\n##\
    \ Introduction to Python for Computational Science and Engineering\n\nThe following\
    \ color abbreviations are supported:\n\n```\n============  =========\ncharacter\
    \     color\n============  =========\n'b'           blue\n'g'           green\n\
    'r'           red\n'c'           cyan\n'm'           magenta\n'y'           yellow\n\
    'k'           black\n'w'           white\n============  =========\n```\n\nIn addition,\
    \ you can specify colors in many weird and wonderful ways, including full names\
    \ (``'green'``), hex strings (``'#008000'``), RGB or RGBA tuples (``(0,1,0,1)``)\
    \ or grayscale intensities as a string (``'0.8'``). Of these, the string specifications\
    \ can be used in place of a ``fmt`` group, but the tuple forms can be used only\
    \ as ``kwargs``.\n\nLine styles and colors are combined in a single format string,\
    \ as in ``'bo'`` for blue circles.\n\nThe *kwargs* can be used to set line properties\
    \ (any property that has a ``set_*`` method). You can use this to set a line label\
    \ (for auto legends), linewidth, antialiasing, marker face color, etc. Here is\
    \ an example::\n\n```\nplot([1,2,3], [1,2,3], 'go-', label='line 1', linewidth=2)\n\
    plot([1,2,3], [1,4,9], 'rs',  label='line 2')\naxis([0, 4, 0, 10])\nlegend()\n\
    ```\n\nIf you make multiple lines with one plot command, the kwargs apply to all\
    \ those lines, e.g.::\n\n```\nplot(x1, y1, x2, y2, antialiased=False)\n```\n\n\
    Neither line will be antialiased.\n\nYou do not need to use format strings, which\
    \ are just abbreviations. All of the line properties can be controlled by keyword\
    \ arguments. For example, you can set the color, marker, linestyle, and markercolor\
    \ with::\n\n```\nplot(x, y, color='green', linestyle='dashed', marker='o',\n \
    \    markerfacecolor='blue', markersize=12). See\n     :class:`~matplotlib.lines.Line2D`\
    \ for details.\n```\n\nThe use of different line styles and thicknesses is particularly\
    \ useful when colour cannot be used to distinguish lines (for example when graph\
    \ will be used in document that is to be printed in black and white only).\n\n\
    ## 15.2.2 Plotting more than one curve\n\nThere are three different methods to\
    \ display more than one curve.\n\n### Two (or more) curves in one graph\n\nBy\
    \ calling the `plot` command repeatedly, more than one curve can be drawn in the\
    \ same graph. Example:\n\n```\nimport numpy as np\nt = np.arange(0, 2*np.pi, 0.01)\n\
    \nimport pylab\npylab.plot(t, np.sin(t), label='sin(t)')\npylab.plot(t, np.cos(t),\
    \ label='cos(t)')\npylab.legend()\n```\n\n```\n<matplotlib.legend.Legend at 0x7f11fc470a30>\n\
    ```\n\n![](img/311265a3784c8b1302bbc7bfff8d0ca5_166_0.png)\n\n### Two (or more\
    \ graphs) in one figure window\n\nThe `pylab.subplot` command allows to arrange\
    \ several graphs within one figure window. The general syntax is\n\n```\nsubplot(numRows,\
    \ numCols, plotNum)\n```\n\nFor example, to arrange 4 graphs in a 2-by-2 matrix,\
    \ and to select the first graph for the next plot command, one can use:\n\n```\n\
    subplot(2, 2, 1)\n```\n\nHere is a complete example plotting the sine and cosine\
    \ curves in two graphs that are aligned underneath each other within the same\
    \ window:\n\n```\nimport numpy as np\nt = np.arange(0, 2*np.pi, 0.01)\n\nimport\
    \ pylab\n\npylab.subplot(2, 1, 1)\npylab.plot(t, np.sin(t))\npylab.xlabel('t')\n\
    pylab.ylabel('sin(t)')\n\npylab.subplot(2, 1, 2)\npylab.plot(t, np.cos(t))\npylab.xlabel('t')\n\
    pylab.ylabel('cos(t)');\n```\n\n![](img/311265a3784c8b1302bbc7bfff8d0ca5_167_0.png)\n\
    \n### Two (or more) figure windows\n\n```\nimport pylab\npylab.figure(1)\npylab.plot(range(10),\
    \ 'o')\n\npylab.figure(2)\npylab.plot(range(100), 'x')\n```\n\n```\n[<matplotlib.lines.Line2D\
    \ at 0x7f11fba563a0>]\n```\n\n![](img/311265a3784c8b1302bbc7bfff8d0ca5_168_0.png)\n\
    \n![](img/311265a3784c8b1302bbc7bfff8d0ca5_168_1.png)\n\nNote that you can use\
    \ `pylab.close()` to close one, some or all figure windows (use `help(pylab.close)`\
    \ to learn more). The closing of figures is not relevant for inline plots, but\
    \ for plots that appear in pop-up windows, those windows will be closed when the\
    \ figure is closed.\n\n## 15.2.3 Interactive mode\n\nPylab can be run in two modes:\n\
    \n- non-interactive (this is the default)\n- interactive.\n\nIn non-interactive\
    \ mode, no plots will be displayed until the `show()` command has been issued.\
    \ In this mode, the `show()` command should be the last statement of your program.\n\
    \nIn interactive mode, plots will be immediately displayed after the plot command\
    \ has been issued.\n\nOne can switch the interactive mode on using `pylab.ion()`\
    \ and off using `pylab.ioff()`. IPython's `%matplotlib` magic also enables interactive\
    \ mode.\n\nIf you use Jupyter notebooks with inline plots, then this feature is\
    \ not so relevant.\n\n## 15.3 The matplotlib.pyplot interface\n\nThis is the recommended\
    \ way to use matplotlib for producing publication quality plots, or anything that\
    \ needs some fine tuning: the object oriented approach of the `pyplot` interface\
    \ makes it generally easier to tailor the plots that the state-driven `pylab`\
    \ interface.\n\nThe central two commands to create `pyplot` figures are:\n\n1.\
    \ Create a figure object, and one (or more) axes objects within the figure.\n\
    2. Create some drawing inside the axes object.\n\nHere is an example:\n\n```\n\
    import numpy as np\nimport matplotlib.pyplot as plt\n\nxs = np.linspace(0, 10,\
    \ 100)\nys = np.sin(xs)\n\nfig, ax = plt.subplots()\nax.plot(xs, ys)\n```\n\n\
    [<matplotlib.lines.Line2D at 0x7f11fc3d63d0>]\n\n![](img/311265a3784c8b1302bbc7bfff8d0ca5_170_0.png)\n\
    \nBelow is a more complete example. We can see that the object oriented nature,\
    \ for example the `ax` object, makes it possible to target our formatting instructions\
    \ to that `ax` object. This becomes particularly useful if we have more than one\
    \ axes object in the same figure.\n\n```\nimport numpy as np\nimport matplotlib.pyplot\
    \ as plt\n\nxs = np.linspace(0, 10, 100)\nys = np.sin(xs)\n\nfig, ax = plt.subplots(figsize=(6,\
    \ 4))\nax.plot(xs, ys, 'x-', linewidth=2, color='orange')\n\nax.grid('on')\nax.set_xlabel('x')\n\
    ax.set_ylabel('y=f(x)')\nfig.savefig(\"pyplot-demo2.pdf\")\n```"
