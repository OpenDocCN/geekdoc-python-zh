    \ $x$）需要变化。通常，如果存在多个参数，`fmin` 可以用于在更高维度的参数空间中寻找最小值。在这种情况下，numpy 数组将包含使目标函数最小化的那些参数。即使有更多参数，即即使\
    \ $x$ 是像 $f(\\mathbf{x})$ 中的向量，目标函数 $f(x)$ 也必须返回一个标量。\n\n## 16.10 其他数值方法\n\nScientific\
