- md: "## 18.3.9 Advance pip use: freeze, -r requirements.txt and creating reproducible\
    \ environments\n\nIf you want to record (and later re-use) a combination of python\
    \ packages *with their specific version numbers*, you can use the `pip freeze`\
    \ command to provide such a list.\n\n```\n!source myvirtualenv/bin/activate &&\
    \ pip freeze\n```\n\n```\nbeautifulsoup4==4.10.0\ncertifi==2021.10.8\ncharset-normalizer==2.0.9\n\
    -e git+https://github.com/VaasuDevanS/cowsay-python.git@767c09425d813b80d67cdebba02ce387ca2eb4e8#egg=cowsay\n\
    idna==3.3\nrequests==2.27.0\nsoupsieve==2.3.1\nurllib3==1.26.7\n```\n\nWe can\
    \ re-direct the output into a file (which by convention is called `requirements.txt`):\n\
    \n```\n!source myvirtualenv/bin/activate && pip freeze > requirements.txt\n```\n\
    \n```\n!cat requirements.txt\n```\n\n```\nbeautifulsoup4==4.10.0\ncertifi==2021.10.8\n\
    charset-normalizer==2.0.9\n-e git+https://github.com/VaasuDevanS/cowsay-python.git@767c09425d813b80d67cdebba02ce387ca2eb4e8#egg=cowsay\n\
    idna==3.3\nrequests==2.27.0\nsoupsieve==2.3.1\nurllib3==1.26.7\n```\n\nWe can\
    \ now create a new virtual environment, and install all the packages listed in\
    \ the `requirements.txt` file into this new virtual environment:\n\n```\n!python\
    \ -m venv myvirtualenv-copy\n```\n\n```\n!source myvirtualenv-copy/bin/activate\
    \ && pip install -r requirements.txt\n```\n\n```\nObtaining cowsay from git+https://github.com/VaasuDevanS/cowsay-python.git@767c09425d813b80d67cdebba02ce387ca2eb4e8#egg=cowsay\
    \ (from -r requirements.txt (line 4))\nSkipping because already up-to-date.\n\
    Requirement already satisfied: beautifulsoup4==4.10.0 in ./myvirtualenv-copy/lib/python3.9/site-packages\
    \ (from -r requirements.txt (line 1)) (4.10.0)\nRequirement already satisfied:\
    \ certifi==2021.10.8 in ./myvirtualenv-copy/lib/python3.9/site-packages (from\
    \ -r requirements.txt (line 2)) (2021.10.8)\nRequirement already satisfied: charset-normalizer==2.0.9\
    \ in ./myvirtualenv-copy/lib/python3.9/site-packages (from -r requirements.txt\
    \ (line 3)) (2.0.9)\nRequirement already satisfied: idna==3.3 in ./myvirtualenv-copy/lib/python3.9/site-packages\
    \ (from -r requirements.txt (line 5)) (3.3)\nRequirement already satisfied: requests==2.27.0\
    \ in ./myvirtualenv-copy/lib/python3.9/site-packages (from -r requirements.txt\
    \ (line 6)) (2.27.0)\nRequirement already satisfied: soupsieve==2.3.1 in ./myvirtualenv-copy/lib/python3.9/site-packages\
    \ (from -r requirements.txt (line 7)) (2.3.1)\nRequirement already satisfied:\
    \ urllib3==1.26.7 in ./myvirtualenv-copy/lib/python3.9/site-packages (from -r\
    \ requirements.txt (line 8)) (1.26.7)\nInstalling collected packages: cowsay\n\
    \  Attempting uninstall: cowsay\n    Found existing installation: cowsay 4.0\n\
    \    Uninstalling cowsay-4.0:\n      Successfully uninstalled cowsay-4.0\n  Running\
    \ setup.py develop for cowsay\nSuccessfully installed cowsay-4.0\nWARNING: You\
    \ are using pip version 21.2.3; however, version 21.3.1 is available.\nYou should\
    \ consider upgrading via the '/Users/fangohr/git/introduction-to-python-for-computational-science-and-engineering/book/myvirtualenv-copy/bin/python\
    \ -m pip install --upgrade pip' command.\n```\n\nIt is good practice to use the\
    \ `freeze` command to store the list of packages and versions required for important\
    \ projects (including those such as scientific publications, reports, theses),\
    \ and the `requirements.txt` file should be archived together with the data and\
    \ software.\n\nIt is even better practice if the *creation* of the virtual environment\
    \ is done in a scripted way (based on a `requirements.txt` file which should be\
    \ part of the archived [and version-controlled] files of the analysis), and before\
    \ all the required processing/simulation/analysis is in that environment.\n\n\
    In practice, achieving full and guaranteed reproducibility is difficult. There\
    \ are a variety of problems that could occur, such as for example the disappearance\
    \ of the `pypi.org` service. How to achieve full reproducibility is an active\
    \ research area, and deserves a separate chapter or book.\n\nIn any case, recording\
    \ the Python packages used is a very good first step.\n\n## 18.3.10 Deactivate\
    \ a virtual environment\n\nTo de-activate a virtual environment, use the `deactivate`\
    \ command.\n\n```\n!source myvirtualenv/bin/activate && deactivate && which python\n\
    ```\n\n```\n/Users/fangohr/anaconda3/bin/python\n```\n\n## 18.3.11 Deleting a\
    \ virtual environment\n\nTo completely remove the virtual environment, we can\
    \ delete the subfolder in which it was installed:\n\n```\n!rm -rf myvirtualenv\n\
    ```\n\n## 18.3.12 Further reading\n\n- Installing Python packages: https://packaging.python.org/en/latest/tutorials/installing-packages\n\
    - venv module documentation: https://docs.python.org/3/library/venv.html\n\n##\
    \ 18.4 Anaconda\n\n### 18.4.1 Introduction\n\nThe Anaconda software distribution\
    \ brings its own packaging, which is controlled through the `conda` command.\n\
    \nAnaconda is well known as a Python distribution, but is in no way limited to\
    \ Python packages: it is a generic package manager. Together with the community-run\
    \ `conda-forge` project, there is a multitude of packages available. A particular\
    \ bonus of the conda packages is that they can be provided for the three major\
    \ operating systems in use (Linux, OSX, Windows).\n\nConda provides **conda packages**\
    \ for some Python packages that are available from the Python Package Index (PyPI).\
    \ One thus needs to ask: should I install a package using the conda command (`conda\
    \ install spyder`) or through pip (`pip install spyder`). See below for the answer.\n\
    \n`conda` provides its own **(conda) environments** (see https://docs.conda.io/projects/conda/en/latest/user-guide/tasks/manage-environments.html).\
    \ They show many similarities with our (basic) discussion of (Python) virtual\
    \ environments. We have no space to discuss the conda environments further here.\n\
    \nThe following comments are meant to be helpful for those who have installed\
    \ their Python interpreter through anaconda. If you are not using Anaconda, you\
    \ can ignore this section.\n\n### 18.4.2 Can I use Python virtual environments\
    \ when using the anaconda distribution?\n\nThis can be done and is a good way\
    \ to create virtual environments. (All the examples above in this chapter use\
    \ the Python3 interpreter from an anaconda installation on an OSX system).\n\n\
    ### 18.4.3 Should I install a python package through conda or pip?\n\nThe typical\
    \ scenario is that one installs Anaconda, and most Python packages needed are\
    \ available: somewhat standard tools such as `numpy`, `scipy`, `matplotlib`, `pandas`,\
    \ `jupyter`, `ipython` and `spyder` already come with the anaconda distribution.\
    \ Then some package is missing that needs to be installed additionally.\n\nFor\
    \ example, the package `xarray`: this can be installed through conda or through\
    \ pip.\n\nExperience-based rough guidance is as follows if working within an anaconda\
    \ installation of Python:\n\n- avoid mixing `pip` installs with `conda` installs\n\
    - if `conda` can install the required packages, then use that\n- if `conda` cannot\
    \ install the required packages, we have to use `pip`. In that case:\n    - install\
    \ the requirements that need to come from `conda` (if any)\n    - then install\
    \ the desired packages through `pip`\n    - after having used `pip`, do not use\
    \ `conda` again to install more packages.\n\nThe reason for this is that `conda`\
    \ and `pip` cannot interact perfectly, and so the changes that one package manager\
    \ made, maybe overridden or accidentally repeated slightly differently by the\
    \ other one.\n\nA more detailed discussion is available on the [Anaconda blog](https://www.anaconda.com/blog).\n\
    \n### 18.4.4 Can I create a conda environment, and then create python virtual\
    \ environments from this?\n\nYes.\n\nThis is also an option to install different\
    \ Python versions.\n\nFor example: create a conda (!) environment providing Python\
    \ 3.8:\n\n```\nconda create -y -n python38 python=3.8\n```\n\nThen\n\n```\nconda\
    \ activate python38\n```\n\nand then create a virtual environment using\n\n```\n\
    python -m venv myvirtualenv38\n```"
