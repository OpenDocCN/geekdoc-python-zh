    The `split()` method will separate the string where it finds *white space*. White
    space means any character that is printed as white space, such as one space or
    several spaces or a tab.


    By passing a separator character to the `split()` method, a string can split into
    different parts. Suppose, for example, we would like to obtain a list of complete
    sentences:


    ```

    a = "The dog is hungry. The cat is bored. The snake is awake."

    a.split(".")

    ```


    ```

    [''The dog is hungry'', '' The cat is bored'', '' The snake is awake'', '''']

    ```


    The opposite string method to `split` is `join` which can be used as follows:


    ```

    a = "The dog is hungry. The cat is bored. The snake is awake."

    s = a.split(''.'')

    s

    ```


    ```

    [''The dog is hungry'', '' The cat is bored'', '' The snake is awake'', '''']

    ```'
