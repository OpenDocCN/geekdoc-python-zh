    5

    ```


    The same operators are defined for multiplication with a constant (*=), subtraction
    of a constant (-=) and division by a constant (/=).


    Note that the order of + and = matters:


    ```

    x += 1

    ```


    will increase the variable x by one where as


    ```

    x =+ 1

    ```


    will assign the value +1 to the variable x.'
