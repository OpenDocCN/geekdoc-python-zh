    # ### 12.1.6 Ordinary differential equations


    SymPy has inbuilt support for solving several kinds of ordinary differential equation
    via its `dsolve` command. We need to set up the ODE and pass it as the first argument,
    `eq`. The second argument is the function `f(x)` to solve for. An optional third
    argument, `hint`, influences the method that `dsolve` uses: some methods are better-suited
    to certain classes of ODEs, or will express the solution more simply, than others.


    To set up the ODE solver, we need a way to refer to the unknown function for which
    we are solving, as well as its derivatives. The `Function` and `Derivative` classes
    facilitate this:


    ```

    python

    from sympy import Symbol, dsolve, Function, Derivative, Eq

    y = Function("y")

    x = Symbol(''x'')

    y_ = Derivative(y(x), x)

    dsolve(y_ + 5*y(x), y(x))

    ```


    $$y(x) = C_1 e^{-5x}$$


    Note how `dsolve` has introduced a constant of integration, `C1`. It will introduce
    as many constants as are required, and they will all be named `Cn`, where `n`
    is an integer. Note also that the first argument to `dsolve` is taken to be equal
    to zero unless we use the `Eq()` function to specify otherwise:'
