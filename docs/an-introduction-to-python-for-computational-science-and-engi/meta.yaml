    (continued from previous page)


    Explicit Runge-Kutta methods (''RK23'', ''RK45'', ''DOP853'') should be used for
    non-stiff problems and implicit methods (''Radau'', ''BDF'') for stiff problems
    [9]_. Among Runge-Kutta methods, ''DOP853'' is recommended for solving with high
    precision (low values of `rtol` and `atol`).


    If not sure, first try to run ''RK45''. If it makes unusually many iterations,
    diverges, or fails, your problem is likely to be stiff and you should use ''Radau''
    or ''BDF''. ''LSODA'' can also be a good universal choice, but it might be somewhat
    less convenient to work with as it wraps old Fortran code.


    You can also pass an arbitrary class derived from `OdeSolver` which implements
    the solver.


    t_eval : array_like or None, optional

    Times at which to store the computed solution, must be sorted and lie within `t_span`.
    If None (default), use points selected by the solver.


    dense_output : bool, optional

    Whether to compute a continuous solution. Default is False.


    events : callable, or list of callables, optional

    Events to track. If None (default), no events will be tracked.

    Each event occurs at the zeros of a continuous function of time and state. Each
    function must have the signature ``event(t, y)`` and return a float. The solver
    will find an accurate value of `t` at which ``event(t, y(t)) = 0`` using a root-finding
    algorithm. By default, all zeros will be found. The solver looks for a sign change
    over each step, so if multiple zero crossings occur within one step, events may
    be missed. Additionally each `event` function might have the following attributes:


    terminal: bool, optional

    Whether to terminate integration if this event occurs.

    Implicitly False if not assigned.


    direction: float, optional

    Direction of a zero crossing. If `direction` is positive, `event` will only trigger
    when going from negative to positive, and vice versa if `direction` is negative.
    If 0, then either direction will trigger event. Implicitly 0 if not assigned.


    You can assign attributes like ``event.terminal = True`` to any function in Python.


    vectorized : bool, optional

    Whether `fun` is implemented in a vectorized fashion. Default is False.


    args : tuple, optional

    Additional arguments to pass to the user-defined functions. If given, the additional
    arguments are passed to all user-defined functions. So if, for example, `fun`
    has the signature ``fun(t, y, a, b, c)``, then `jac` (if given) and any event
    functions must have the same signature, and `args` must be a tuple of length 3.


    options

    Options passed to a chosen solver. All options available for already implemented
