    \ 2)\n\ndef compute_sum4a(n):\n    \"\"\"A functional approach ... this seems\
    \ to be\n    the shortest and most concise code.\n    \"\"\"\n    return sum(range(0,\
    \ n, 2))\n\nfrom functools import reduce\ndef compute_sum4b(n):\n    \"\"\"A functional\
