    \n- 为常见任务提供数值工具\n- 使用方便\n- 并且在 CPU 时间和内存需求方面比仅使用 Python 原生功能更高效。\n\n我们特别列出三个这样的模块：\n\
    \n- `numpy` 模块提供了一种专为向量和矩阵“数值计算”设计的数据类型（即 `14-numpy.ipynb` 中介绍的由“numpy”提供的 `array`\
