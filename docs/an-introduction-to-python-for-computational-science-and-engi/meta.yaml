    \ = 5.\n    x = np.linspace(0, xmax, n)\n    y = - x**2\n    #make x-data somewhat\
    \ irregular\n    y += 1.5 * np.random.normal(size=len(x))\n    return x, y\n\n\
    #main program\nn = 10\nx, y = create_data(n)\n\n#use finer and regular mesh for\
    \ plot\nxfine = np.linspace(0.1, 4.9, n * 100)\n#interpolate with piecewise constant\
