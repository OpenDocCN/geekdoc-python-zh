    # # 7.5 Modules


    Modules


    +   - Group together functionality

    - Provide namespaces

    - Python’s standard library contains a vast collection of modules - “Batteries
    Included”

    - Try `help(''modules'')`

    - Means of extending Python


    # ## 7.5.1 Importing modules


    ```

    python

    import math

    ```


    This will introduce the name `math` into the namespace in which the import command
    was issued. The names within the `math` module will not appear in the enclosing
    namespace: they must be accessed through the name `math`. For example: `math.sin`.


    ```

    python

    import math, cmath

    ```


    More than one module can be imported in the same statement, although the [Python
    Style Guide](https://www.python.org/dev/peps/pep-0008/#imports) recommends not
    to do this. Instead, we should write


    ```

    python

    import math

    import cmath


    import math as mathematics

    ```


    The name by which the module is known locally can be different from its “official”
    name. Typical uses of this are


    +   - To avoid name clashes with existing names

    - To change the name to something more manageable. For example `import SimpleHTTPServer
    as shs`. This is discouraged for production code (as longer meaningful names make
    programs far more understandable than short cryptic ones), but for interactively
    testing out ideas, being able to use a short synonym can make your life much easier.
    Given that (imported) modules are first class objects, you can, of course, simply
    do `shs = SimpleHTTPServer` in order to obtain the more easily typable handle
    on the module.


    ```

    python

    from math import sin

    ```


    This will import the `sin` function from the `math` module, but it will not introduce
    the name `math` into the current namespace. It will only introduce the name `sin`
    into the current namespace. It is possible to pull in more than one name from
    the module in one go:


    ```

    python

    from math import sin, cos

    ```


    Finally, let’s look at this notation:


    ```

    python

    from math import *

    ```'
