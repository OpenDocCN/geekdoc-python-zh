    \n```\n113.0625\n```\n\nThis variable should be treated as read-only by the user.\
    \ Don't explicitly assign a value to it — you would create an independent local\
    \ variable with the same name masking the built-in variable with its magic behavior.\n\
    \n### 2.5.1 Terminology\n\nStrictly speaking, the following happens when we write\n\
    \n```python\nx = 0.5\n```\n\nFirst, Python creates the object `0.5`. Everything\
    \ in Python is an object, and so is the floating point number 0.5. This object\
    \ is stored somewhere in memory. Next, Python *binds a name to the object*. The\
    \ name is `x`, and we often refer casually to `x` as a variable, an object, or\
    \ even the value 0.5. However, technically, `x` is a name that is bound to the\
    \ object `0.5`. Another way to say this is that `x` is a reference to the object.\n\
    \nWhile it is often sufficient to think about assigning 0.5 to a variable `x`,\
    \ there are situations where we need to remember what actually happens. In particular,\
    \ when we pass references to objects to functions, we need to realise that the\
    \ function may operate on the object (rather than a copy of the object). This\
    \ is discussed in more detail in *the next chapter*.\n\n## 2.6 Impossible equations\n\
    \nIn computer programs we often find statements like\n\n```python\nx = x + 1\n\
    ```\n\nIf we read this as an equation as we are used to from mathematics, $x =\
    \ x + 1$ we could subtract $x$ on both sides, to find that $0 = 1$. We know this\
    \ is not true, so something is wrong here.\n\nThe answer is that \"equations\"\
    \ in computer codes are not equations but *assignments*. They always have to be\
    \ read in the following two-step way:\n\n1. Evaluate the value on the right hand\
    \ side of the equal sign\n2. Assign this value to the variable name shown on the\
    \ left hand side. (In Python: bind the name on the left hand side to the object\
    \ shown on the right hand side.)\n\nSome computer science literature uses the\
    \ following notation to express assignments and to avoid the confusion with mathematical\
    \ equations:\n\n$x \\leftarrow x + 1$\n\nLet's apply our two-step rule to the\
    \ assignment x = x + 1 given above:\n\n1. Evaluate the value on the right hand\
    \ side of the equal sign: for this we need to know what the current value of x\
    \ is. Let's assume x is currently 4. In that case, the right hand side x+1 evaluates\
    \ to 5.\n2. Assign this value (i.e. 5) to the variable name shown on the left\
    \ hand side x.\n\nLet's confirm with the Python prompt that this is the correct\
    \ interpretation:\n\n```python\nx = 4\nx = x + 1\nx\n```\n\n```\n5\n```\n\n###\
    \ 2.6.1 The += notation\n\nBecause it is a quite a common operation to increase\
    \ a variable x by some fixed amount c, we can write\n\n```python\nx += c\n```\n\
    \ninstead of\n\n```python\nx = x + c\n```\n\nOur initial example above could thus\
    \ have been written\n\n```python\nx = 4\nx += 1\nx\n```\n\n```\n5\n```\n\nThe\
    \ same operators are defined for multiplication with a constant (*=), subtraction\
    \ of a constant (-=) and division by a constant (/=).\n\nNote that the order of\
    \ + and = matters:\n\n```python\nx += 1\n```\n\nwill increase the variable x by\
    \ one whereas\n\n```python\nx =+ 1\n```\n\nwill assign the value +1 to the variable\
    \ x.\n\n# CHAPTER THREE\n\n## DATA TYPES AND DATA STRUCTURES\n\n### 3.1 What type\
    \ is it?\n\nPython knows different data types. To find the type of a variable,\
    \ use the `type()` function:\n\n```python\na = 45\ntype(a)\n```\n\n```\nint\n\
    ```\n\n```python\nb = 'This is a string'\ntype(b)\n```\n\n```\nstr\n```\n\n```python\n\
    c = 2 + 1j\ntype(c)\n```\n\n```\ncomplex\n```\n\n```python\nd = [1, 3, 56]\ntype(d)\n\
    ```\n\n```\nlist\n```\n\n### 3.2 Numbers\n\n**Further information**\n\n- Informal\
    \ introduction to numbers. Python tutorial, section 3.1.1\n- Python Library Reference:\
    \ formal overview of numeric types, https://docs.python.org/3.8/library/stdtypes.html#numeric-types-int-float-complex\n\
    - Think Python, Sec 2.1\n\nThe in-built numerical types are integers and floating\
    \ point numbers (see *floating point numbers*) and complex floating point numbers\
    \ (*complex numbers*).\n\n#### 3.2.1 Integers\n\nWe have seen the use of integer\
    \ numbers already in *Chapter 2*. Be aware of integer division problems (02 A\
    \ Powerful Calculator, Integer Division).\n\nIf we need to convert a string containing\
    \ an integer number to an integer we can use the `int()` function:\n\n```python\n\
    a = '34'       # a is a string containing the characters 3 and 4\nx = int(a) \
    \    # x is an integer number\n```\n\nThe function `int()` will also convert floating\
    \ point numbers to integers:\n\n```python\nint(7.0)\n```\n\n```\n7\n```\n\n```python\n\
    int(7.9)\n```\n\n```\n7\n```\n\nNote that `int` will truncate any non-integer\
    \ part of a floating point number. To `round` a floating point number to an integer,\
    \ use the `round()` command:\n\n```python\nround(7.9)\n```\n\n```\n8\n```\n\n\
    #### 3.2.2 Integer limits\n\nIntegers in Python 3 are unlimited; Python will automatically\
    \ assign more memory as needed as the numbers get bigger. This means we can calculate\
    \ very large numbers with no special steps.\n\n```python\n35**42\n```\n\n```\n\
    70934557307860443711736098025989133248003781773149967193603515625\n```\n\nIn many\
    \ other programming languages, such as C and FORTRAN, integers are a fixed size—most\
    \ frequently 4 bytes, which allows $2^{32}$ different values—but different types\
    \ are available with different sizes. For numbers that fit into these limits,\
    \ calculations can be faster, but you may need to check that the numbers don't\
    \ go beyond the limits. Calculating a number beyond the limits is called *integer\
    \ overflow*, and may produce bizarre results.\n\nEven in Python, we need to be\
    \ aware of this when we use numpy (see *Chapter 14*). Numpy uses integers with\
    \ a fixed size, because it stores many of them together and needs to calculate\
