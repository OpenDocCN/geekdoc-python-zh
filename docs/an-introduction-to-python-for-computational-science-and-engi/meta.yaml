  md: '# CHAPTER NINETEEN


    # WHERE TO GO FROM HERE?


    Learning a programming language is the first step towards becoming a computationalists
    who advances science and engineering through computational modelling and simulation.

    We list some additional skills that can be very beneficial for day-to-day computational
    science work, but is of course not exhaustive.


    # 19.1 Advanced programming


    This text has put emphasis on providing a robust foundation in terms of programming,
    covering control flow, data structures and elements from function and procedural
    programming. We have not touch Object Orientation in great detail, nor have we
    discussed some of Python''s more advanced features such as iterators, and decorators,
    for example.


    # 19.2 Compiled programming language


    When performance starts to be the highest priority, we may need to use compiled
    code, and likely embed this in a Python code to carry out the computational that
    are the performance bottle neck.

    Fortran, C and C++ are sensible choices here; maybe Julia in the near future.

    We also need to learn how to integrate the compiled code with Python using tools
    such as Cython, Boost, Ctypes and Swig.


    # 19.3 Testing


    Good coding is supported by a range of unit and system tests that can be run routinely
    to check that the code works correctly. Tools such as doctest, nose and pytest
    are invaluable, and we should learn at least how to use pytest (or nose).'
  merge: -1
  pgno: 260
- img_proc: true
  md: 'Introduction to Python for Computational Science and Engineering


    # 19.4 Simulation models


    A number of standard simulation tools such as Monte Carlo, Molecular Dynamics,
    lattice based models, agents, finite difference and finite element models are
    commonly used to solve particular simulation challenges – it is useful to have
    at least a broad overview of these.


    # 19.5 Software engineering for research codes


    Research codes bring particular challenges: the requirements may change during
    the run time of the project, we need great flexibility yet reproducibility. A
    number of techniques are available to support effectively.


    # 19.6 Data and visualisation


    Dealing with large amounts of data, processing and visualising it can be a challenge.
    Fundamental knowledge of database design, 3d visualisation and modern data processing
    tools such as the Pandas Python package help with this.


    # 19.7 Version control


    Using a version control tool, such as git or mercurial, should be a standard approach
    and improves code writing effectiveness significantly, helps with working in teams,
    and - maybe most importantly - supports reproducibility of computational results.


    # 19.8 Parallel execution


    Parallel execution of code is a way to make it run orders of magnitude faster.
    This could be using MPI for inter-node communication or OpenMP for intra-node
    parallelisation or a hybrid mode bringing both together.

    The recent rise of GPU computing provides yet another avenue of parallelisation,
    and so do the many-core chips such as the Intel Phi.


    # 19.9 Acknowledgements


    Big thanks go to


    +   - Marc Molinari for carefully proof reading this manuscript around 2007.

    - Neil O''Brien for contributing to the SymPy section.

    - Jacek Generowicz for introducing me to Python in the last millennium, and for
    kindly sharing countless ideas from his excellent Python course.

    - EPSRC (GR/T09156/01 and EP/G03690X/1) and the European Union (OpenDreamKit Horizon
    2020 European Research Infrastructures project, #676541) for support.

    - Students and other readers who have provided feedback and pointed out typos
    and errors etc.

    - Thomas Kluyver who helped to translate the Python 2 LaTeX based document into
    Python 3 Jupyter Notebooks and provided the machinery to create html and pdf versions.
    automatically (via his bookbook package).'
