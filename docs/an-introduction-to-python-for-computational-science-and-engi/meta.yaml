    # 8.4 List comprehension


    List comprehensions provide a concise way to create and modify lists without resorting
    to use of map(), filter() and/or lambda. The resulting list definition tends often
    to be clearer than lists built using those constructs. Each list comprehension
    consists of an expression followed by a for clause, then zero or more for or if
    clauses. The result will be a list resulting from evaluating the expression in
    the context of the for and if clauses which follow it. If the expression would
    evaluate to a tuple, it must be parenthesized.


    Some examples will make this clearer:


    ```

    freshfruit = [''  banana'', ''  loganberry '', ''passion fruit  '']

    [weapon.strip() for weapon in freshfruit]

    ```


    ```

    [''banana'', ''loganberry'', ''passion fruit'']

    ```


    ```

    vec = [2, 4, 6]

    [3 * x for x in vec]

    ```


    ```

    [6, 12, 18]

    ```


    ```

    [3 * x for x in vec if x > 3]

    ```


    ```

    [12, 18]

    ```


    ```

    [3 * x for x in vec if x < 2]

    ```


    ```

    []

    ```


    ```

    [[x, x ** 2] for x in vec]

    ```


    ```

    [[2, 4], [4, 16], [6, 36]]

    ```


    We can also use list comprehension to modify the list of integers returned by
    the range command so that our subsequent elements in the list increase by non-integer
    fractions:


    ```

    [x*0.5 for x in range(10)]

    ```


    ```

    [0.0, 0.5, 1.0, 1.5, 2.0, 2.5, 3.0, 3.5, 4.0, 4.5]

    ```


    Let''s now revisit the examples from the section on filter


    ```

    [x for x in range(11) if x>5 ]

    ```


    ```

    [6, 7, 8, 9, 10]

    ```


    ```

    [name for name in [''ago'',''smith'',''bob'',''carl''] \n    if name in known_names]

    ```'
