    size—most frequently 4 bytes, which allows $2^{32}$ different values—but different
    types are available with different sizes. For numbers that fit into these limits,
    calculations can be faster, but you may need to check that the numbers don''t
    go beyond the limits. Calculating a number beyond the limits is called *integer
    overflow*, and may produce bizarre results.


    Even in Python, we need to be aware of this when we use numpy (see *Chapter 14*).
    Numpy uses integers with a fixed size, because it stores many of them together
    and needs to calculate with them efficiently. `Numpy data types` include a range
