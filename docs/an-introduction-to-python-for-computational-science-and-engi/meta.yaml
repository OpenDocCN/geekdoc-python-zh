    \ evaluations: 32\nStart search at x=2., minimum is [3.13847656]\n```\n\n```\n\
    <matplotlib.legend.Legend at 0x7f9aea7b5d00>\n```\n\n调用 `fmin` 函数会产生一些诊断输出，你也可以在上面看到。\n\
