    ## 5.1.6 Changes from Python 2 to Python 3: print\n\nOne (maybe the most obvious)\
    \ change going from Python 2 to Python 3 is that the `print` command loses its\
    \ special status. In Python 2, we could print “Hello World” using:\n\n```python\n\
    print \"Hello world\"  # valid in Python 2.x\n```\n\nEffectively, we call the\
    \ function `print` with the argument `Hello World`. All other functions in Python\
    \ are called such that the argument is enclosed in parentheses, i.e.\n\n```python\n\
    print(\"Hello World\")  # valid in Python 3.x\n```\n\nHello World\n\nThis is the\
    \ new convention *required* in Python 3 (and *allowed* for recent version of Python\
    \ 2.x.)\nEverything we have learned about formatting strings using the percentage\
    \ operator still works the same way:\n\n```python\nimport math\na = math.pi\n\"\
    my pi = %f\" % a  # string formatting\n```\n\n'my pi = 3.141593'\n\n```python\n\
    print(\"my pi = %f\" % a)    # valid print in 2.7 and 3.x\n```\n\nmy pi = 3.141593\n\
    \n```python\n\"Short pi = %.2f, longer pi = %.12f.\" % (a, a)\n```\n\n'Short pi\
    \ = 3.14, longer pi = 3.141592653590.'\n\n```python\nprint(\"Short pi = %.2f,\
    \ longer pi = %.12f.\" % (a, a))\n```\n\nShort pi = 3.14, longer pi = 3.141592653590.\n\
    \n```python\n# 1. Write a file\nout_file = open(\"test.txt\", \"w\")    #'w' stands\
    \ for Writing\nout_file.write(\"Writing text to file. This is the first line.\\\
    n\" +\n              \"And the second line.\")\nout_file.close()    #close the\
    \ file\n\n# 2. Read a file\nin_file = open(\"test.txt\", \"r\")    #'r' stands\
    \ for Reading\ntext = in_file.read()    #read complete file into\n           \
    \               #string variable text\nin_file.close()    #close the file\n\n\
    # 3. Display data\nprint(text)\n```\n\nWriting text to file. This is the first\
    \ line.\nAnd the second line.\n\n## 5.2 Reading and writing files\n\nHere is a\
    \ program that\n\n1. writes some text to a file with name `test.txt`,\n2. and\
    \ then reads the text again and\n3. prints it to the screen.\n\nThe data stored\
    \ in the file `test.txt` is:\n\nWriting text to file. This **is** the first line.\n\
    And the second line.\n\nIn more detail, you have opened a file with the `open`\
    \ command, and assigned this open file object to the variable `out_file`. We have\
    \ then written data to the file using the `out_file.write` method. Note that in\
    \ the example above, we have given a string to the `write` method. We can, of\
    \ course, use all the formatting that we have discussed before—see *formatted\
    \ printing* and *new style formatting*. For example, to write this file with name\
    \ table `table.txt` we can use this Python program It is good practice to `close()`\
    \ files when we have finished reading and writing. If a Python program is left\
    \ in a controlled way (i.e. not through a power cut or an unlikely bug deep in\
    \ the Python language or the operating system) then it will close all open files\
    \ as soon as the file objects are destroyed. However, closing them actively as\
    \ soon as possible is better style.\n\n### 5.2.1 File reading examples\n\nWe use\
    \ a file named `myfile.txt` containing the following 3 lines of text for the examples\
    \ below:\n\n```\nThis is the first line.\nThis is the second line.\nThis is a\
    \ third and last line.\n```\n\n```python\nf = open('myfile.txt', 'w')\nf.write('This\
    \ is the first line.\\n'\n        'This is the second line.\\n'\n        'This\
    \ is a third and last line.')\nf.close()\n```\n\n### fileobject.read()\n\nThe\
    \ `fileobject.read()` method reads the whole file, and returns it as one string\
    \ (including new line characters).\n\n```python\nf = open('myfile.txt', 'r')\n\
    f.read()\n```\n\n'This is the first line.\\nThis is the second line.\\nThis is\
    \ a third and last line.'\n\n```python\nf.close()\n```\n\n### fileobject.readlines()\n\
    \nThe `fileobject.readlines()` method returns a list of strings, where each element\
    \ of the list corresponds to one line in the string:\n\n```python\nf = open('myfile.txt',\
    \ 'r')\nf.readlines()\n```\n\n['This is the first line.\\n',\n 'This is the second\
    \ line.\\n',\n 'This is a third and last line.']\n\n```python\nf.close()\n```\n\
    \nThis is often used to iterate over the lines, and to do something with each\
    \ line. For example:\n\n```python\nf = open('myfile.txt', 'r')\nfor line in f.readlines():\n\
    \    print(\"%d characters\" % len(line))\nf.close()\n```\n\n24 characters\n25\
    \ characters\n30 characters\n\nNote that this will read the complete file into\
    \ a list of strings when the `readlines()` method is called. This is no problem\
    \ if we know that the file is small and will fit into the machine's memory.\n\n\
    If so, we can also close the file before we process the data, i.e.:\n\n```python\n\
    f = open('myfile.txt', 'r')\nlines = f.readlines()\nf.close()\nfor line in lines:\n\
    \    print(\"%d characters\" % len(line))\n```\n\n24 characters\n25 characters\n\
    30 characters\n\n### Iterating over lines (file object)\n\nThere is a neater possibility\
    \ to read a file line by line which (i) will only read one line at a time (and\
    \ is thus suitable for large files as well) and (ii) results in more compact code:\n\
    \n```python\nf = open('myfile.txt', 'r')\nfor line in f:\n    print(\"%d characters\"\
    \ % len(line))\nf.close()\n```\n\n24 characters\n25 characters\n30 characters\n\
    \nHere, the file handler `f` acts as in iterator and will return the next line\
    \ in every subsequent iteration of the for-loop until the end of the file is reached\
    \ (and then the for-loop is terminated).\n\n## 5.3 Further reading\n\nMethods\
    \ of File objects, Tutorial, Section 7.2.1\n\n# CHAPTER SIX\nCONTROL FLOW\n\n\
    ## 6.1 Basics\n\nFor a given file with a python program, the python interpreter\
    \ will start at the top and then process the file. We demonstrate this with a\
    \ simple program, for example:\n\n```python\ndef f(x):\n    \"\"\"function that\
    \ computes and returns x*x\"\"\"\n    return x * x\n\nprint(\"Main program starts\
    \ here\")\nprint(\"4 * 4 = %s\" % f(4))\nprint(\"In last line of program -- bye\"\
    )\n```\n\nMain program starts here\n4 * 4 = 16\nIn last line of program -- bye\n\
    \nThe basic rule is that commands in a file (or function or any sequence of commands)\
    \ is processed from top to bottom. If several commands are given in the same line\
    \ (separated by ; ), then these are processed from left to right (although it\
    \ is discouraged to have multiple statements per line to maintain good readability\
    \ of the code.)\n\nIn this example, the interpreter starts at the top (line 1).\
    \ It finds the def keyword and remembers for the future that the function f is\
    \ defined here. (It will not yet execute the function body, i.e. line 3 – this\
    \ only happens when we call the function.) The interpreter can see from the indentation\
    \ where the body of the function stops: the indentation in line 5 is different\
    \ from that of the first line in the function body (line2), and thus the function\
    \ body has ended, and execution should carry on with that line. (Empty lines do\
    \ not matter for this analysis.)\n\nIn line 5 the interpreter will print the output\
    \ Main program starts here. Then line 6 is executed. This contains the expression\
    \ f (4) which will call the function f (x) which is defined in line 1 where x\
    \ will take the value 4. [Actually x is a reference to the object 4.] The function\
    \ f is then executed and computes and returns 4 * 4 in line 3. This value 16 is\
    \ used in line 6 to replace f (4) and then the string representation %s of the\
    \ object 16 is printed as part of the print command in line 6.\n\nThe interpreter\
    \ then moves on to line 7 before the program ends.\n\nWe will now learn about\
    \ different possibilities to direct this control flow further."
