  md: "# Introduction to Python for Computational Science and Engineering\n\nOnce\
    \ again, this does not introduce the name math into the current namespace. It\
    \ does however introduce *all public names* of the math module into the current\
    \ namespace. Broadly speaking, it is a bad idea to do this:\n\n+   - Lots of new\
    \ names will be dumped into the current namespace.\n- Are you sure they will not\
    \ clobber any names already present?\n- It will be very difficult to trace where\
    \ these names came from\n- Having said that, some modules (including ones in the\
    \ standard library, recommend that they be imported in this way). Use with caution!\n\
    - This is fine for interactive quick and dirty testing or small calculations.\n\
    \n# 7.5.2 Creating modules\n\nA module is in principle nothing else than a python\
    \ file. We create an example of a module file which is saved in module1.py:\n\n\
    ```\n%%file module1.py\ndef someusefulfunction():\n    pass\n\nprint(\"My name\
    \ is\", __name__)\n```\n\n```\nWriting module1.py\n```\n\nWe can execute this\
    \ (module) file as a normal python program (for example `python module1.py`):\n\
    \n```\n!python3 module1.py\n```\n\n```\nMy name is __main__\n```\n\nWe note that\
    \ the Python magic variable `__name__` takes the value `__main__` if the program\
    \ file `module1.py` is executed.\n\nOn the other hand, we can *import* `module1.py`\
    \ in another file (which could have the name `prog.py`), for example like this:\n\
    \n```\nimport module1           # in file prog.py\n```\n\n```\nMy name is module1\n\
    ```\n\nWhen Python comes across the `import module1` statement in `prog.py`, it\
    \ looks for the file `module1.py` in the current working directory (and if it\
    \ can't find it there in all the directories in `sys.path`) and opens the file\
    \ `module1.py`. While parsing the file `module1.py` from top to bottom, it will\
    \ add any function definitions in this file into the `module1` name space in the\
    \ calling context (that is the main program in `prog.py`). It this example, there\
    \ is only the function `someusefulfunction`. Once the import process is completed,\
    \ we can make use of `module1.someusefulfunction` in `prog.py`. If Python comes\
    \ across statements other than function (and class) definitions while importing\
    \ `module1.py`, it carries those out immediately. In this case, it will thus come\
    \ across the statement `print(My name is, __name__)`.\n\nNote the difference to\
    \ the output if we *import* `module1.py` rather than executing it on its own:\
    \ `__name__` inside a module takes the value of the module name if the file is\
    \ imported."
