- md: "## 17.4 Plotting data\n\nCommonly used plots are easily accessible via the\
    \ `plot()` method of the Series object. We have seen a bar plot above already.\
    \ The `Series.plot()` method accepts an argument `kind` such as `kind=\"bar\"\
    `, but there is an equivalent method `Series.plot.bar()` available.\n\nFurther\
    \ examples:\n\n```python\nstock.plot.pie()\n```\n\n```\n<AxesSubplot:ylabel='None'>\n\
    ```\n\nTo tailor the plot, we can either get the axis object and modify it subsequently:\n\
    \n```python\nax = stock.plot.pie()\nax.set_aspect(1)\nax.set_ylabel(None);\nax.set_title(None);\n\
    ```\n\n```python\nimport matplotlib.pyplot as plt\nfig, ax = plt.subplots(1, 1,\
    \ figsize=(9, 3))\nstock.plot.bar(ax=ax)\nax.set_title(\"Current stock\");\n```\n\
    \nWe can also fetch the data from the series and drive the plotting “manually”\
    \ ourselves:\n\n```python\nimport matplotlib.pyplot as plt\n\nnames = list(stock.index)\n\
    values = list(stock.values)\n\nfig, ax = plt.subplots(1, 1, figsize=(9, 3))\n\
    ax.bar(names, values)\nax.set_title('Stock');\n```\n\n## 17.5 Missing values\n\
    \n“Real” data sets tend to be incomplete. Dealing with missing values is an important\
    \ topic in data science. The agreement in Pandas is that the special floating\
    \ point value “NaN” (standing for Not a Number) represents missing data points.\
    \ For example, if we have a table for the stock, but we don’t know the value for\
    \ apple, we would replace it with NaN.\n\nThe special NaN value in Python can\
    \ be created using `float('nan')` or using `numpy.nan` if the `numpy` module is\
    \ imported.\n\n```python\nstock['apple'] = float('nan')\n```\n\n```python\nstock\n\
    ```\n\n```\napple     NaN\norange    3.0\nbanana   22.0\ndtype: float64\n```\n\
    \nNote that the `dtype` of the `stock` Series object has changed from `int64`\
    \ to `float64` when we assigned NaN to `apple`: the whole series has been converted\
    \ to float, because NaN is only defined for floating point numbers.\n\n(There\
    \ is a proposal to create a NaN object as part of pandas - this would overcome\
    \ the above limitation.)\n\nAssume we need to calculate how many items of stock\
    \ we have in total using the `sum` function:\n\n```python\nstock.values\n```\n\
    \n```\narray([nan,  3., 22.])\n```\n\nA common situation is that we have an incomplete\
    \ Series or DataFrame (which are multiple Series with the same index) and we want\
    \ to process with our analysis, but treat the missing values in a special way.\n\
    \n```python\nstock.sum()\n```\n\n```\n25.0\n```\n\nThe above example `sum` shows\
    \ that NaN values are simply ignored, which can be convenient.\n\nWe can also\
    \ ‘tidy up’ the Series object, by removing all entries that have a NaN value:\n\
    \n```python\nstock.dropna()\n```\n\n```\norange    3.0\nbanana   22.0\ndtype:\
    \ float64\n```\n\n## 17.6 Series data access: explicit and implicit (loc and iloc)\n\
    \n```python\nstock = pd.Series({'apple': 10,\n                  'orange': 3,\n\
    \                  'banana': 22,\n                  'cucumber' : 1,\n        \
    \          'potato' : 110})\n```\n\n```python\nstock\n```\n\n```\napple      \
    \  10\norange        3\nbanana       22\ncucumber      1\npotato      110\ndtype:\
    \ int64\n```\n\n### 17.6.1 Indexing\n\nWe can access single values through their\
    \ index as if the stock Series object would be a dictionary:\n\n```python\nstock['banana']\n\
    ```\n\n```\n22\n```\n\nThere is an equivalent and recommended way of using this\
    \ retrieval using the `loc` (for LOCation?) attribute:\n\n```python\nstock.loc['banana']\n\
    ```\n\n```\n22\n```\n\nFor convenience, pandas also (!) allows us to use integer\
    \ indexing into the Series object. This is called *implicit* indexing as the series\
    \ Object doesn't use integers as the index, but the name of the fruits.\n\nFor\
    \ example, we can also retrieve the value for `banana` through its implicit index\
    \ 2, because it is in row 3 of the Series object (which would need index 2 as\
    \ we start counting from 0):\n\n```python\nstock[2]\n```\n\n```\n22\n```\n\nIn\
    \ this example, this works fine and seems convenient, but can become very confusing\
    \ if the actual index of the object consists of integers. For that reason, the\
    \ explicit (and recommended way) of using the indirect indexing is through the\
    \ `iloc` (ImplicitLOCation) attribute:\n\n```python\nstock.iloc[2]\n```\n\n```\n\
    22\n```\n\n### 17.6.2 Slicing\n\n```python\nstock\n```\n\n```\napple        10\n\
    orange        3\nbanana       22\ncucumber      1\npotato      110\ndtype: int64\n\
    ```\n\nWe can also slice the Series:\n\n```python\nstock['orange':'potato']\n\
    ```\n\n```\norange        3\nbanana       22\ncucumber      1\npotato      110\n\
    dtype: int64\n```\n\nOr skip every second entry:\n\n```python\nstock['orange':'potato':2]\n\
    ```\n\n```\norange        3\ncucumber      1\ndtype: int64\n```\n\n### 17.6.3\
    \ Data manipulation\n\nNumerical operations on the series object can be carried\
    \ for all data values at the same time in the same way that numpy arrays are processed:\n\
    \n```python\nstock - stock.mean()\n```\n\n```\napple      -19.2\norange     -26.2\n\
    banana      -7.2\ncucumber   -28.2\npotato      80.8\ndtype: float64\n```\n\n\
    ```python\nimport numpy as np\n```\n\n```python\nnp.sqrt(stock)\n```\n\n```\n\
    apple           3.162278\norange          1.732051\nbanana          4.690416\n\
    cucumber        1.000000\npotato         10.488088\ndtype: float64\n```\n\nWhere\
    \ preferred, we can extract the numpy array and work with that:\n\n```python\n\
    data = stock.values\n```\n\n```python\ntype(data)\n```\n\n```\nnumpy.ndarray\n\
    ```\n\n```python\ndata - data.mean()\n```\n\n```\narray([-19.2, -26.2,  -7.2,\
    \ -28.2,  80.8])\n```\n\n### 17.6.4 Import and Export\n\nPandas (and its objects\
    \ `Series` and `DataFrame`) support export to and import from a number of useful\
    \ formats.\nFor example, we can write a `Series` object into a comma separated\
    \ value file:\n\n```python\nstock.to_csv('stock.csv', header=False)\n```\n\n```python\n\
    #NBVAL_IGNORE_OUTPUT\n!cat stock.csv\n```\n\n```\napple,10\norange,3\nbanana,22\n\
    cucumber,1\npotato,110\n```\n\nWe can also create a LaTeX representation of the\
    \ table:\n\n```python\nstock.to_latex()\n```\n\n```\n'\\begin{tabular}{lr}\\n\\\
    toprule\\n{} &       0 \\n\\midrule\\napple     &      10 \\norange    &     \
    \  3 \\nbanana    &      22 \\ncucumber  &       1 \\npotato    &     110 \\n\\\
    bottomrule\\n\\end{tabular}\\n'\n```\n\nWe'll come back to reading from files\
    \ in the `DataFrame` section.\n\n## 17.7 Data Frame\n\n### 17.7.1 Stock Example\
    \ - DataFrame\n\nAfter having introduced the `Series` object above, we will focus\
    \ on the second important type in pandas: the `DataFrame`.\n\nAs a first description,\
    \ we could say that the `DataFrame` is similar to a (2d) spreadsheet: it contains\
    \ rows and columns.\n\nThe series object we have studied above is a special case\
    \ of the `DataFrame`, where the `DataFrame` has only one column.\n\nWe'll continue\
    \ with our stock example:\n\n```python\nstock\n```\n\n```\napple        10\norange\
    \        3\nbanana       22\ncucumber      1\npotato      110\ndtype: int64\n\
    ```\n\nIn addition to tracking how many objects of each type we have stocked,\
    \ we have a second Series object that provides the price per item at which the\
    \ item is sold:\n\n```python\nprice = pd.Series({'apple': 0.55, 'banana': 0.50,\
    \ 'cucumber' : 0.99, 'potato' : 0.17,\n                   'orange': 1.76})\nprice\n\
    ```\n\n```\napple        0.55\nbanana       0.50\ncucumber     0.99\npotato  \
    \     0.17\norange       1.76\ndtype: float64\n```\n\nThe `DataFrame` object allows\
    \ us to treat the two series together. In fact, a convenient way to create the\
    \ `DataFrame` object is to combine a number of series as follows:\n\n```python\n\
    shop = pd.DataFrame({'stock' : stock, 'price' : price})\nshop\n```\n\n```\n  \
    \          stock  price\napple        10   0.55\nbanana       22   0.50\ncucumber\
    \      1   0.99\norange        3   1.76\npotato      110   0.17\n```\n\nBecause\
    \ both `Series` objects had the same `index` elements, our data is nicely aligned\
    \ in the `DataFrame` with name `shop`, even though the data was stored in different\
    \ order in the `price` and `stock`.\n\nIf one Series is missing a data point,\
    \ pandas will insert a `NaN` entry into that field:"
