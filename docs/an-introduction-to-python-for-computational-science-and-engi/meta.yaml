    \n```\nwith open(\"hello.txt\") as f:\n    print(f.read())\n```\n\n```\nThis is\
    \ the content of the file hello.txt\n```\n\n### 1.4.2 使用 ! 执行shell命令\n\n如果我们想运行一个shell命令，可以输入它并在前面加上!字符。这里有一个例子：首先我们创建一个包含Python\
    \ hello world程序的文件，然后执行它：\n\n```\n%%file hello.py\nprint(\"Hello World\")\n```\n\
    \n```\nOverwriting hello.py\n```\n\n```\n!python hello.py\n```\n\n```\nHello World\n\
