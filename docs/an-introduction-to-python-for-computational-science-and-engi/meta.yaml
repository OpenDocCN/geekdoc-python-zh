    ```

    b = [3, 4.2, [''apple'', ''banana''], (0, 1)]

    str(b)

    ```


    ```

    "[3, 4.2, [''apple'', ''banana''], (0, 1)]"

    ```


    The way Python prints this is that it uses the `__str__` method of the list object.
    This will print the opening square bracket [ and then call the `__str__` method
    of the first object, i.e. the integer 3. This will produce 3. Then the list object''s
    `__str__` method prints the comma , and moves on to call the `__str__` method
    of the next element in the list (i.e. 4.2) to print itself. This way any composite
    object can be represented as a string by asking the objects it holds to convert
    themselves to strings.


    The string method of object x is called implicitly, when we


    +   - use the “%s” format specifier to print x

    - pass the object x directly to the print command:


    ```

    print(b)

    ```


    ```

    [3, 4.2, [''apple'', ''banana''], (0, 1)]

    ```


    ```

    print("%s" % b)

    ```


    ```

    [3, 4.2, [''apple'', ''banana''], (0, 1)]

    ```


    # 5.1.4 “repr” and “__repr__”


    A second function, `repr`, should convert a given object into a string presentation
    *so that this string can be used to re-created the object using the `eval` function*.
    The `repr` function will generally provide a more detailed string than `str`.
    Applying `repr` to the object x will attempt to call x.`__repr__`().


    ```

    from math import pi as a1

    str(a1)

    ```


    ```

    ''3.141592653589793''

    ```


    ```

    repr(a1)

    ```


    ```

    ''3.141592653589793''

    ```


    ```

    number_as_string = repr(a1)

    a2 = eval(number_as_string)  # evaluate string

    a2

    ```


    ```

    3.141592653589793

    ```


    ```

    a2-a1                  # -> repr is exact representation

