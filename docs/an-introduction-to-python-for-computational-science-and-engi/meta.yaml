    # 2.3 Integer division


    In Python 3, division works as you''d expect:


    ```

    15/6

    ```


    2.5


    In Python 2, however, 15/6 will give you 2.


    This phenomenon is known (in many programming languages, including C) as *integer
    division*: because we provide two integer numbers (15 and 6) to the division operator
    (/), the assumption is that we seek a return value of type integer. The mathematically
    correct answer is (the floating point number) 2.5. (→ numerical data types in
    *Chapter 13*.)


    The convention for integer division is to truncate the fractional digits and to
    return the integer part only (i.e. 2 in this example). It is also called “floor
    division”.


    # 2.3.1 How to avoid integer division


    There are two ways to avoid the problem of integer division:


    +   1. Use Python 3 style division: this is available even in Python 2 with a
    special import statement:


    ```

    >>> from __future__ import division

    >>> 15/6

    2.5

    ```


    If you want to use the `from __future__ import division` feature in a python program,
    it would normally be included at the beginning of the file.


    +   2. Alternatively, if we ensure that at least one number (numerator or denominator)
    is of type float (or complex), the division operator will return a floating point
    number. This can be done by writing 15. instead of 15, of by forcing conversion
    of the number to a float, i.e. use float(15) instead of 15:


    ```

    >>> 15./6

    2.5

    >>> float(15)/6

    2.5

    >>> 15/6.

    2.5

    >>> 15/float(6)

    ```'
