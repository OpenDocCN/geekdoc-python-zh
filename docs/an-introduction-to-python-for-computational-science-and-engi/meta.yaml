  md: "# 16.6 Interpolation\n\nGiven a set of $N$ points $(x_i, y_i)$ with $i = 1,\
    \ 2, ...N$, we sometimes need a function $\\hat{f}(x)$ which returns $y_i = f(x_i)$\
    \ where $x == x_i$, and which in addition provides some interpolation of the data\
    \ $(x_i, y_i)$ for all $x$.\n\nThe function `y0 = scipy.interpolate.interp1d(x,y,kind='nearest')`\
    \ does this interpolation based on splines of varying order. Note that the function\
    \ `interp1d` returns *a function* `y0` which will then interpolate the x-y data\
    \ for any given $x$ when called as `y0(x)`.\n\nThe code below demonstrates this,\
    \ and shows the different interpolation kinds.\n\n```\nimport numpy as np\nimport\
    \ scipy.interpolate\nimport pylab\n\ndef create_data(n):\n    \"\"\"Given an integer\
    \ n, returns n data points\n    x and values y as a numpy.array.\"\"\"\n    xmax\
    \ = 5.\n    x = np.linspace(0, xmax, n)\n    y = - x**2\n    #make x-data somewhat\
    \ irregular\n    y += 1.5 * np.random.normal(size=len(x))\n    return x, y\n\n\
    #main program\nn = 10\nx, y = create_data(n)\n\n#use finer and regular mesh for\
    \ plot\nxfine = np.linspace(0.1, 4.9, n * 100)\n#interpolate with piecewise constant\
    \ function (p=0)\ny0 = scipy.interpolate.interp1d(x, y, kind='nearest')\n#interpolate\
    \ with piecewise linear func (p=1)\ny1 = scipy.interpolate.interp1d(x, y, kind='linear')\n\
    #interpolate with piecewise constant func (p=2)\ny2 = scipy.interpolate.interp1d(x,\
    \ y, kind='quadratic')\n\npylab.plot(x, y, 'o', label='data point')\npylab.plot(xfine,\
    \ y0(xfine), label='nearest')\npylab.plot(xfine, y1(xfine), label='linear')\n\
    pylab.plot(xfine, y2(xfine), label='cubic')\npylab.legend()\npylab.xlabel('x')\n\
    ```\n\nText(0.5, 0, 'x')"
