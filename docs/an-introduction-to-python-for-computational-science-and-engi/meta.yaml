  md: '# 1.2 Why Python for scientific computing?


    The design focus on the Python language is on productivity and code readability,
    for example through:


    +   - Interactive python console

    - Very clear, readable syntax through whitespace indentation

    - Strong introspection capabilities

    - Full modularity, supporting hierarchical packages

    - Exception-based error handling

    - Dynamic data types & automatic memory management


    As Python is an interpreted language, and it runs many times slower than compiled
    code, one might ask why anybody should consider such a ''slow'' language for computer
    simulations?


    There are two replies to this criticism:


    +   1. Implementation time versus execution time: It is not the execution time
    alone that contributes to the cost of a computational project: one also needs
    to consider the cost of the development and maintenance work.


    In the early days of scientific computing (say in the 1960/70/80), compute time
    was so expensive that it made perfect sense to invest many person months of a
    programmer''s time to improve the performance of a calculation by a few percent.


    Nowadays, however, the CPU cycles have become much cheaper than the programmer''s
    time. For research codes which often run only a small number of times (before
    the researchers move on to the next problem), it may be economic to accept that
    the code runs only at 25% of the expected possible speed if this saves, say, a
    month of a researcher''s (or programmers) time. For example: if the execution
    time of the piece of code is 10 hours, and one can predict that it will run about
    100 times, then the total execution time is approximately 1000 hours. It would
    be great if this could be reduced to 25% and one could save 750 (CPU) hours. On
    the other hand, is an extra wait (about a month) and the cost of 750 CPU hours
    worth investing one month of a person''s time [who could do something else while
    the calculation is running]? Often, the answer is not.


    Code readability & maintenance - short code, fewer bugs: A related issue is that
    a research code is not only used for one project, but carries on to be used again
    and again, evolves, grows, bifurcates etc. In this case, it is often justified
    to invest more time to make the code fast. At the same time, a significant amount
    of programmer time will go into (i) introducing the required changes, (ii) testing
    them even before work on speed optimisation of the changed version can start.
    To be able to maintain, extend and modify a code in often unforeseen ways, it
    can only be helpful to use a language that is easy to read and of great expressive
    power.


    +   1. Well-written Python code can be very fast if time critical parts in executed
    through compiled language.


    Typically, less than 5% percent of the code base of a simulation project need
    more than 95% of the execution time. As long as these calculations are done very
    efficiently, one doesn''t need to worry about all other parts of the code as the
    overall time their execution takes is insignificant.


    The compute intense part of the program should to be tuned to reach optimal performance.
    Python offers a number of options.


    +   - For example, the numpy Python extension provides a Python interface to the
    compiled and efficient LAPACK libraries that are the quasi-standard in numerical
    linear algebra. If the problems under study can be formulated such that eventually
    large systems of algebraic equations have to be solved, or eigenvalues computed,
    etc, then the compiled code in the LAPACK library can be used (through the Python-numpy
    package). At this stage, the calculations are carried out with the same performance
    of Fortran/C as it is essentially Fortran/C code that is used. Matlab, by the
    way, exploits exactly this: the Matlab scripting language is very slow (about
    10 time slower than Python), but Matlab gains its power from delegating the matix
    operation to the compiled LAPACK libraries.'
