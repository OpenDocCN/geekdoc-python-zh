    # 15.5.2 Writing vtk files from Python (pyvtk)


    A small but powerful Python library is pyvtk available at https://github.com/pearu/pyvtk.
    This allows to create vtk files from Python data structures very easily.


    Given a finite element mesh or a finite difference data set in Python, one can
    use pyvtk to write such data into files, and then use one of the visualisation
    applications listed above to load the vtk files and to display and investigate
    them.


    # 15.6 Further tools and developments


    In addition to `matplotlib`, there are a number of other libraries with similar
    or related visualisation functionality.


    [Plotly.py](https://plotly.com/python/) and [Bokeh](https://bokeh.org/) – together
    with the veteran of python-based plotting `matplotlib` – form the basis for many
    tools that provide visualisation skills.


    A beautiful summary and [categorisation](https://pyviz.org/) of these and other
    libraries is available at https://pyviz.org.'
