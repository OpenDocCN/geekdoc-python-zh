  md: '# CHAPTER ONE


    # INTRODUCTION


    This text summarises a number of core ideas relevant to Computational Engineering
    and Scientific Computing using Python. The emphasis is on introducing some basic
    Python (programming) concepts that are relevant for numerical algorithms. The
    later chapters touch upon numerical libraries such as `numpy` and `scipy` each
    of which deserves much more space than provided here. We aim to enable the reader
    to learn independently how to use other functionality of these libraries using
    the available documentation (online and through the packages itself).


    # 1.1 Computational Modelling


    # 1.1.1 Introduction


    Increasingly, processes and systems are researched or developed through computer
    simulations: new aircraft prototypes such as for the recent A380 are first designed
    and tested virtually through computer simulations. With the ever increasing computational
    power available through supercomputers, clusters of computers and even desktop
    and laptop machines, this trend is likely to continue.


    Computer simulations are routinely used in fundamental research to help understand
    experimental measurements, and to replace – for example – growth and fabrication
    of expensive samples/experiments where possible. In an industrial context, product
    and device design can often be done much more cost effectively if carried out
    virtually through simulation rather than through building and testing prototypes.
    This is in particular so in areas where samples are expensive such as nanoscience
    (where it is expensive to create small things) and aerospace industry (where it
    is expensive to build large things). There are also situations where certain experiments
    can only be carried out virtually (ranging from astrophysics to study of effects
    of large scale nuclear or chemical accidents). Computational modelling, including
    use of computational tools to post-process, analyse and visualise data, has been
    used in engineering, physics and chemistry for many decades but is becoming more
    important due to the cheap availability of computational resources. Computational
    Modelling is also starting to play a more important role in studies of biological
    systems, the economy, archeology, medicine, health care, and many other domains.


    # 1.1.2 Computational Modelling


    To study a process with a computer simulation we distinguish two steps: the first
    one is to develop a *model* of the real system. When studying the motion of a
    small object, such as a penny, say, under the influence of gravity, we may be
    able to ignore friction of air: our model — which might only consider the gravitational
    force and the penny’s inertia, i.e. $a(t) = F/m = -9.81\text{m/s}^2$ — is an approximation
    of the real system. The model will normally allow us to express the behaviour
    of the system (in some approximated form) through mathematical equations, which
    often involve ordinary differential equations (ODEs) or partial differential equatons
    (PDEs).


    In the natural sciences such as physics, chemistry and related engineering, it
    is often not so difficult to find a suitable model, although the resulting equations
    tend to be very difficult to solve, and can in most cases not be solved analytically
    at all.'
