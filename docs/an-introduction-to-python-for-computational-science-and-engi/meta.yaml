    \ 独立获取。\n\n# 第十三章\n\n# 数值计算\n\n## 13.1 数与数字\n\n我们已经看到（03 数据类型结构，数字），Python 知道不同*类型*的数字：\n\
    \n- 浮点数，例如 3.14\n- 整数，例如 42\n- 复数，例如 3.14 + 1j\n\n### 13.1.1 数字类型的局限性\n\n####\
    \ 整数的局限性\n\n数学提供了无限的自然数集 ℕ = {1, 2, 3, ...}。由于计算机具有*有限*的大小，因此不可能在计算机中表示所有这些数字。相反，只表示数字的一个小子集。\n\
    \n`int` 类型（通常[3]）可以表示 -2147483648 到 +2147483647 之间的数字，对应于 4 个字节（即 4*8 位，2^32 =\
    \ 4294967296，这是从 -2147483648 到 +2147483647 的范围）。\n\n你可以想象硬件使用像这样的表格来使用位编码整数（为简单起见，假设我们只使用\
    \ 8 位）：\n\n| 自然数 | 位表示 |\n|---|---|\n| 0 | 00000000 |\n| 1 | 00000001 |\n| 2 |\
    \ 00000010 |\n| 3 | 00000011 |\n| 4 | 00000100 |\n| 5 | 00000101 |\n| ... | ...\
    \ |\n| 254 | 11111110 |\n| 255 | 11111111 |\n\n使用 8 位，我们可以表示 256 个自然数（例如从 0 到\
    \ 255），因为我们有 2^8 = 256 种不同的方式来组合八个 0 和 1。\n\n我们也可以使用一个略有不同的表格来描述 256 个整数，例如从 -127\
    \ 到 +128。\n\n这就是整数在计算机中表示的*原理*。根据使用的字节数，只能表示介于最小值和最大值之间的整数。在当今的硬件上，通常使用 4 或 8\
    \ 个字节来表示一个整数，这恰好导致了如上所示的 4 字节的最小值和最大值 -2147483648 和 +2147483647，以及 8 字节的最大整数 +9223372036854775807（约为\
    \ 9.2 · 10^18）。\n\n#### 浮点数的局限性\n\n计算机中的浮点数与数学中的浮点数并不相同。（这与（数学）整数与计算机中的整数不同完全一样：只有无限整数集的一个子集可以由\
    \ int 数据类型表示，如“数与数字”中所示）。那么浮点数在计算机中是如何表示的呢？\n\n- 任何实数 $x$ 都可以写成 $x = a \\cdot\
    \ 10^b$，其中 $a$ 是尾数，$b$ 是指数。\n- 示例：\n\n| x | a | b |\n|---|---|---|\n| 123.45 =\
    \ 1.23456 · 10^2 | 1.23456 | 2 |\n| 1000000 = 1.0 · 10^6 | 1.00000 | 6 |\n| 0.0000024\
    \ = 2.4 · 10^-6 | 2.40000 | -6 |\n\n- 因此，我们可以使用 2 个整数来编码一个浮点数！\n  $x = a \\cdot\
    \ 10^b$\n- 大致遵循 IEEE-754 标准，一个浮点数 $x$ 使用 8 个字节：这 64 位被划分为\n  - 10 位用于指数 $b$，以及\n\
    \  - 54 位用于尾数 $a$。\n\n这导致\n\n- 最大可能的浮点数 ≈10^308（$b$ 的质量度量）\n- 最小可能的（正）浮点数 ≈10^–308（$b$\
    \ 的质量度量）\n- 1.0 与下一个更大数字之间的距离 ≈10^–16（$a$ 的质量度量）\n\n请注意，这实际上是浮点数的存储原理（实际上要稍微复杂一些）。\n\
    \n#### 复数的局限性\n\n复数类型本质上与浮点数据类型具有相同的局限性（参见浮点数的局限性），因为一个复数由两个浮点数组成：一个表示实部，另一个表示虚部。\n\
    \n#### ...这些数字类型有实际价值吗？\n\n在实践中，我们通常不会在日常生活中遇到超过 10^300 的数字（这是一个有 300 个零的数字！），因此浮点数覆盖了我们通常需要的数字范围。\n\
    \n但是，请注意，在科学计算中会使用可能（通常在中间结果中）超过浮点数范围的小数和大数。\n\n- 例如，想象一下，我们必须取常数 $h = 1.0545716\
    \ \\cdot 10^{-34}kgm^2/s$ 的四次方：\n- $h^4 = 1.2368136958909421 \\cdot 10^{-136}k^4g^4m^8/s^4$，这“大约”是我们可表示的最小正浮点数\
    \ $10^{-308}$ 的一半。"
