    \n```python\nimport math, cmath\n```\n\n可以在同一条语句中导入多个模块，尽管[Python风格指南](https://www.python.org/dev/peps/pep-0008/#imports)建议不要这样做。相反，我们应该写\n\
    \n```python\nimport math\nimport cmath\n\nimport math as mathematics\n```\n\n\
    模块在本地已知的名称可以与其“官方”名称不同。典型的用法包括\n\n- 避免与现有名称冲突\n- 将名称更改为更易管理的名称。例如`import SimpleHTTPServer\
    \ as shs`。这在生产代码中不被鼓励（因为较长的有意义的名称比简短的晦涩名称使程序更易于理解），但对于交互式测试想法，能够使用简短的同义词可以使你的生活轻松得多。鉴于（导入的）模块是一等对象，你当然可以简单地执行`shs\
