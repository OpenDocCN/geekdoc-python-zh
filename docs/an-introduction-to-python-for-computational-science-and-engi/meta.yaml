    # Two (or more graphs) in one figure window


    The `pylab.subplot` command allows to arrange several graphs within one figure
    window. The general syntax is


    ```

    subplot(numRows, numCols, plotNum)

    ```


    For example, to arrange 4 graphs in a 2-by-2 matrix, and to select the first graph
    for the next plot command, one can use:


    ```

    subplot(2, 2, 1)

    ```


