- md: "## 15.1.3 How to import matplotlib, pylab, pyplot, numpy and all that\n\nThe\
    \ submodule `matplotlib.pyplot` provides an object oriented interface to the plotting\
    \ library. Many of the examples in the matplotlib documentation follow the import\
    \ convention to import `matplotlib.pyplot` as `plt` and `numpy` as `np`. It is\
    \ of the user's decision whether to import the `numpy` library under the name\
    \ `np` (as often done in matplotlib examples) or `N` as occasionally done in this\
    \ text (and in the early days when the predecessor of numpy was called \"Numeric\"\
    ) or any other name you like. Similarly, it is a matter of taste whether the plotting\
    \ submodule (`matplotlib.pyplot`) is imported as `plt` as is done in the matplotlib\
    \ documentation or `plot` (which could be argued is slightly clearer) etc.\n\n\
    As always a balance has to be struck between personal preferences and consistency\
    \ with common practice in choosing these name. Consistency with common use is\
    \ more important if the code is likely to be used by others or published.\n\n\
    ## The Pylab interface\n\nWe introduce the `pylab` interface by translating the\
    \ example 1a above to the following example 1b (which is identical in functionality\
    \ to the example 1a and will create the same plot):\n\n```\n# example 1b\nimport\
    \ pylab\nimport numpy as np\n\nx = np.arange(-3.14, 3.14, 0.01)\ny = np.sin(x)\n\
    \npylab.plot(x, y)\n\n[<matplotlib.lines.Line2D at 0x7f11fc56dbb0>]\n```\n\n##\
    \ Introduction to Python for Computational Science and Engineering\n\nPlotting\
    \ nearly always needs arrays of numerical data and it is for this reason that\
    \ the `numpy` module is used a lot: it provides fast and memory efficient array\
    \ handling for Python (see chapter 14). The `pylab` interface has taken this a\
    \ step further and automatically imports all objects from `numpy` into the `pylab`\
    \ name space:\n\nBecause the `numpy.arange` and `numpy.sin` objects have already\
    \ been imported into the `pylab` namespace, we could also write it as example\
    \ 1c:\n\n```\n# example 1c\nimport pylab as p\n\nx = p.arange(-3.14, 3.14, 0.01)\n\
    y = p.sin(x)\n\np.plot(x, y)\n```\n\n```\n[<matplotlib.lines.Line2D at 0x7f11fc4e1370>]\n\
    ```\n\nIf we really want to cut down on characters to type, we could also import\
    \ all the objects (*) from the `pylab` convenience module into our current namespace,\
    \ and rewrite the code as example 1d:\n\n```\n# example 1d\nfrom pylab import\
    \ *  # not generally recommended\n                    # okay for interactive testing\n\
    \nx = arange(-3.14, 3.14, 0.01)\ny = sin(x)\nplot(x, y)\nshow()\n```\n\n## Introduction\
    \ to Python for Computational Science and Engineering\n\nThis can be extremely\
    \ convenient, but comes with a big health warning:\n\n- While using `from pylab\
    \ import *` is acceptable at the command prompt to interactively create plots\
    \ and analyse data, this should never be used in any plotting scripts.\n- The\
    \ pylab toplevel provides over 800 different objects which are all imported into\
    \ the global name space when running `from pylab import *`. This is not good practice,\
    \ and could conflict with other objects that exist already or are created later.\n\
    - As a rule of thumb: do never use `from somewhere import *` in programs we save.\
    \ This may be okay at the command prompt for interactive data exploration.\n\n\
    ## 15.1.4 IPython’s inline mode\n\nWithin the Jupyter Notebook or Qtconsole (see\
    \ the *Python shells notebook*) we can use the `%matplotlib inline` magic command\
    \ to make further plots appear within our console or notebook. To force pop up\
    \ windows instead, use `%matplotlib qt`.\n\nIf you enjoy the `pylab` interface,\
    \ then you maybe interested in the `%pylab` magic, which will not only switch\
    \ to inline plotting but also automatically execute `from pylab import *`.\n\n\
    ## 15.1.5 Saving the figure to a file\n\nOnce you have created the figure (using\
    \ the `plot` command) and added any labels, legends etc, you have two options\
    \ to save the plot.\n\n1. You can display the figure (using `show`) and *interactively*\
    \ save it by clicking on the disk icon. (This does not work with inline plots\
    \ as the icons are not available.)\n2. You can (without displaying the figure)\
    \ save it directly from your Python code. The command to use is `savefig`. The\
    \ format is determined by the extension of the file name you provide. Here is\
    \ an example (`pylabsavefig.py`) which saves a figure into different files.\n\n\
    ```\n# saving figure files with the pylab interface\nimport pylab\nimport numpy\
    \ as np\n\nx = np.arange(-3.14, 3.14, 0.01)\ny = np.sin(x)\n\npylab.plot(x, y,\
    \ label='sin(x)')\npylab.savefig('myplot.png')  # saves png file\npylab.savefig('myplot.svg')\
    \  # saves svg file\npylab.savefig('myplot.eps')  # saves eps file\npylab.savefig('myplot.pdf')\
    \  # saves pdf file\npylab.close()\n```\n\nA note on file formats:\n\nThe `pdf`,\
    \ `eps` and `svg` file formats are vector file formats which means that one can\
    \ zoom into the image without loosing quality (lines will still be sharp). File\
    \ formats such as `png` (and `jpg`, `gif`, `tif`, `bmp`) save the image in form\
    \ of a bitmap (i.e. a matrix of colour values) and will appear blurry or pixelated\
    \ when zooming in (or when printed in high resolution).\n\nAccordingly, choose\
    \ a vector file format where you can, and use the bitmap (`png` for example) if\
    \ there are no other options. Choose the `eps` or `pdf` file format if you plan\
    \ to include the figure in a Latex document – depending on whether you want to\
    \ compile it using `latex` (needs `eps`) or pdflatex (can use `pdf` [better] or\
    \ `png`). If the version of MS Word (or other text processing software you use)\
    \ can handle `pdf` files, it is better to use `pdf` than `png` for that.\n\n```\n\
    # saving figure files with the pyplot interface\nfrom matplotlib import pyplot\
    \ as plt\nimport numpy as np\n\nx = np.arange(-3.14, 3.14, 0.01)\ny = np.sin(x)\n\
    \nfig, ax = plt.subplots()\nax.plot(x, y, label='sin(x)')\nfig.savefig('myplot.png')\
    \  # saves png file\nfig.savefig('myplot.svg')  # saves svg file\nfig.savefig('myplot.eps')\
    \  # saves eps file\nfig.savefig('myplot.pdf')  # saves pdf file\nplt.close(fig)\n\
    ```\n\n## 15.2 The pylab interface\n\n## 15.2.1 Fine tuning your plot\n\nMatplotlib\
    \ allows us to fine tune our plots in great detail. Here is an example:\n\n```\n\
    import pylab\nimport numpy as N\n\nx = N.arange(-3.14, 3.14, 0.01)\ny1 = N.sin(x)\n\
    y2 = N.cos(x)\npylab.figure(figsize=(5, 5))\npylab.plot(x, y1, label='sin(x)')\n\
    pylab.plot(x, y2, label='cos(x)')\npylab.legend()\npylab.axis([-2, 2, -1, 1])\n\
    pylab.grid()\npylab.xlabel('x')\npylab.title('This is the title of the graph')\n\
    ```\n\nText(0.5, 1.0, 'This is the title of the graph')\n\nshowing some other\
    \ useful commands:\n\n- `figure(figsize=(5, 5))` sets the figure size to 5inch\
    \ by 5inch\n- `plot(x, y1, label='sin(x)')` The “label” keyword defines the name\
    \ of this line. The line label will be shown in the legend if the `legend()` command\
    \ is used later.\n- Note that calling the `plot` command repeatedly, allows you\
    \ to overlay a number of curves.\n- `axis([-2, 2, -1, 1])` This fixes the displayed\
    \ area to go from xmin=-2 to xmax=2 in x-direction, and from ymin=-1 to ymax=1\
    \ in y-direction\n- `legend()` This command will display a legend with the labels\
    \ as defined in the plot command. Try `help(pylab.legend)` to learn more about\
    \ the placement of the legend.\n- `grid()` This command will display a grid on\
    \ the backdrop.\n- `xlabel('...')` and `ylabel('...')` allow labelling the axes.\n\
    \nNote further that you can choose different line styles, line thicknesses, symbols\
    \ and colours for the data to be plotted. (The syntax is very similar to MATLAB.)\
    \ For example:\n\n- `plot(x, y, 'og')` will plot circles (o) in green (g)\n- `plot(x,\
    \ y, '-r')` will plot a line (-) in red (r)\n- `plot(x, y, '-b', linewidth=2)`\
    \ will plot a blue line (b) with two pixel thickness `linewidth=2` which is twice\
    \ as wide as the default.\n- `plot(x, y, '-', alpha=0.5)` will plot a semi-transparent\
    \ line."
