    \ solution is sol.y[0] rather than just sol.y.\n\nWe use the Predator and prey\
    \ example. Let\n\n+   - $p_1(t)$ be the number of rabbits and\n- $p_2(t)$ be the\
    \ number of foxes at a given time $t$\n\nTo compute the time dependence of $p_1$\
    \ and $p_2$:\n\n+   - Assume that rabbits proliferate at a rate $a$. Per unit\
    \ time a number $ap_1$ of rabbits are born.\n- Assume that the number of rabbits\
    \ is reduced by collisions with foxes: per unit time $cp_1p_2$ rabbits are eaten.\n\
    - Assume that birth rate of foxes depends only on food intake in form of rabbits.\n\
    - Assume that foxes die a natural death at a rate $b$.\n\nWe put this together\
    \ into the system of coupled ordinary differential equations: \\begin{eqnarray}\
    \ \\label{eq:predprey} \\frac{d p_1}{dt} &=& a p_1 - c p_1 p_2 \\nonumber \\ \\\
    frac{d p_2}{dt} &=& c p_1 p_2 - b p_2 \\nonumber \\end{eqnarray}\n\nWe use the\
