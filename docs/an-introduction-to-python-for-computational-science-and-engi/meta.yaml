- md: "## CHAPTER TWELVE\n\n## SYMBOLIC COMPUTATION\n\n### 12.1 SymPy\n\nIn this section,\
    \ we introduce some basic functionality of the SymPy (SYMBolic Python) library.\
    \ In contrast to numerical computation (involving numbers), in symbolic calculation\
    \ we are processing and transforming generic variables.\nThe SymPy home page is\
    \ https://www.sympy.org/, and provides the full (and up-to-date) documentation\
