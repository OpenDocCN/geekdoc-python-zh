- md: "## 6.6.1 Raising Exceptions\n\nRaising exception is also referred to as 'throwing\
    \ an exception'.\nPossibilities of raising an Exception\n\n- raise OverflowError\n\
    - raise OverflowError, \"Bath is full\" (Old style, now discouraged)\n- raise\
    \ OverflowError(\"Bath is full\")\n- e = OverflowError(\"Bath is full\"); raise\
    \ e\n\n## Exception hierarchy\n\nThe standard exceptions are organized in an inheritance\
    \ hierarchy e.g. OverflowError is a subclass of ArithmeticError (not BathroomError);\
    \ this can be seen when looking at `help('exceptions')` for example.\nYou can\
    \ derive your own exceptions from any of the standard ones. It is good style to\
    \ have each module define its own base exception.\n\n## 6.6.2 Creating our own\
    \ exceptions\n\n- You can and should derive your own exceptions from the built-in\
    \ Exception.\n- To see what built-in exceptions exist, look in the module exceptions\
    \ (try `help('exceptions')`), or go to https://docs.python.org/3/library/exceptions.html#bltin-exceptions.\n\
    \n## 6.6.3 LBYL vs EAFP\n\n- LBYL (Look Before You Leap) vs\n- EAFP (Easier to\
    \ ask forgiveness than permission)\n\n```\nnumerator = 7\ndenominator = 0\n```\n\
    \nExample for LBYL:\n\n```\nif denominator == 0:\n    print(\"Oops\")\nelse:\n\
    \    print(numerator/denominator)\n```\n\n```\nOops\n```\n\nEasier to Ask for\
    \ Forgiveness than Permission:\n\n```\ntry:\n    print(numerator/denominator)\n\
    except ZeroDivisionError:\n    print(\"Oops\")\n```\n\n```\nOops\n```\n\nThe Python\
    \ documentation says about EAFP:\n\n> Easier to ask for forgiveness than permission.\
    \ This common Python coding style assumes the existence of valid keys or attributes\
    \ and catches exceptions if the assumption proves false. This clean and fast style\
    \ is characterized by the presence of many try and except statements. The technique\
    \ contrasts with the LBYL style common to many other languages such as C.\n\n\
    Source: https://docs.python.org/3/glossary.html#term-eafp\n\nThe Python documentation\
    \ says about LBYL:\n\n> Look before you leap. This coding style explicitly tests\
    \ for pre-conditions before making calls or lookups. This style contrasts with\
    \ the EAFP approach and is characterized by the presence of many if statements.\n\
    \nIn a multi-threaded environment, the LBYL approach can risk introducing a race\
    \ condition between “the looking” and “the leaping”. For example, the code, if\
    \ key in mapping: return mapping[key] can fail if another thread removes key from\
    \ mapping after the test, but before the lookup. This issue can be solved with\
    \ locks or by using the EAFP approach.\n\nSource: https://docs.python.org/3/glossary.html#term-lbyl\n\
    \nEAFP is the Pythonic way.\n\n# CHAPTER SEVEN\n\n# FUNCTIONS AND MODULES\n\n\
    ## 7.1 Introduction\n\nFunctions allow us to group a number of statements into\
    \ a logical block. We communicate with a function through a clearly defined interface,\
    \ providing certain parameters to the function, and receiving some information\
    \ back. Apart from this interface, we generally do not know how exactly a function\
    \ does the work to obtain the value it returns.\n\nFor example the function `math.sqrt`:\
    \ we do not know how exactly it computes the square root, but we know about the\
    \ interface: if we pass $x$ into the function, it will return (an approximation\
    \ of) $\\sqrt{x}$.\n\nThis abstraction is a useful thing: it is a common technique\
    \ in engineering to break down a system into smaller (black-box) components that\
    \ all work together through well defined interfaces, but which do not need to\
    \ know about the internal realisations of each other's functionality. In fact,\
    \ not having to care about these implementation details can help to have a clearer\
    \ view of the system composed of many of these components.\n\nFunctions provide\
    \ the basic building blocks of functionality in larger programs (and computer\
    \ simulations), and help to control the inherent complexity of the process.\n\n\
    We can group functions together into a Python module (see *modules*), and in this\
    \ way create our own libraries of functionality.\n\n## 7.2 Using functions\n\n\
    The word “function” has different meanings in mathematics and programming. In\
    \ programming it refers to a named sequence of operations that perform a computation.\
    \ For example, the function `sqrt()` which is defined in the `math` module computes\
    \ the square root of a given value:\n\n```\nfrom math import sqrt\nsqrt(4)\n\n\
    2.0\n```\n\nThe value we pass to the function `sqrt` is 4 in this example. This\
    \ value is called the *argument* of the function. A function may have more than\
    \ one argument.\n\nThe function returns the value 2.0 (the result of its computation)\
    \ to the “calling context”. This value is called the *return value* of the function.\n\
    \nIt is common to say that a function *takes* an argument and *returns* a result\
    \ or return value.\n\n**Common confusion about printing and returning values**\n\
    \nIt is a common beginner's mistake to confuse the *printing* of values with *returning*\
    \ values. In the following example it is hard to see whether the function `math.sin`\
    \ returns a value or whether it prints the value:\n\n```\nimport math\nmath.sin(2)\n\
    ```\n\n```\n0.9092974268256817\n```\n\nWe import the `math` module, and call the\
    \ `math.sin` function with an argument of 2. The `math.sin(2)` call will actually\
    \ *return* the value 0.909... not print it. However, because we have not assigned\
    \ the return value to a variable, the Python prompt will print the returned object.\n\
    \nThe following alternative sequence works only if the value is returned:\n\n\
    ```\nx = math.sin(2)\nprint(x)\n```\n\n```\n0.9092974268256817\n```\n\nThe return\
    \ value of the function call `math.sin(2)` is assigned to the variable x, and\
    \ x is printed in the next line.\n\nGenerally, functions should execute \"silently\"\
    \ (i.e. not print anything) and report the result of their computation through\
    \ the return value.\n\nPart of the confusion about printed versus return values\
    \ at the Python prompt comes from the Python prompt printing (a representation)\
    \ of returned objects *if* the returned objects are not assigned. Generally, seeing\
    \ the returned objects is exactly what we want (as we normally care about the\
    \ returned object), just when learning Python this may cause mild confusion about\
    \ functions returning values or printing values.\n\n**Further information**\n\n\
    - Think Python has a gentle introduction to functions (on which the previous paragraph\
    \ is based) in chapter 3 (Functions) and chapter 6 (Fruitful functions).\n\n##\
    \ 7.3 Defining functions\n\nThe generic format of a function definitions:\n\n\
    ```\ndef my_function(arg1, arg2, ..., argn):\n    \"\"\"Optional docstring.\"\"\
    \"\n\n    # Implementation of the function\n\n    return result  # optional\n\n\
    # this is not part of the function\nsome_command\n```\n\nAllen Downey's terminology\
    \ (in his book Think Python) of fruitful and fruitless functions distinguishes\
    \ between functions that return a value, and those that do not return a value.\
    \ The distinction refers to whether a function provides a return value (=fruitful)\
    \ or whether the function does not explicitly return a value (=fruitless). If\
    \ a function does not make use of the `return` statement, we tend to say that\
    \ the function returns nothing (whereas in reality in will always return the `None`\
    \ object when it terminates – even if the `return` statement is missing).\n\n\
    For example, the function `greeting` will print \"Hello World\" when called (and\
    \ is fruitless as it does not return a value).\n\n```\ndef greeting():\n    print(\"\
    Hello World!\")\n```\n\nIf we call that function:\n\n```\ngreeting()\n```\n\n\
    ```\nHello World!\n```\n\nit prints “Hello World” to stdout, as we would expect.\
    \ If we assign the return value of the function to a variable x, we can inspect\
    \ it subsequently:\n\n```\nx = greeting()\n```\n\n```\nHello World!\n```\n\n```\n\
    print(x)\n```\n\n```\nNone\n```\n\nand find that the `greeting` function has indeed\
    \ returned the `None` object.\n\nAnother example for a function that does not\
    \ return any value (that means there is no `return` keyword in the function) would\
    \ be:\n\n```\ndef printpluses(n):\n    print(n * \"+\")\n```\n\nGenerally, functions\
    \ that return values are more useful as these can be used to assemble code (maybe\
    \ as another function) by combining them cleverly. Let’s look at some examples\
    \ of functions that do return a value.\n\nSuppose we need to define a function\
    \ that computes the square of a given variable. The function source could be:\n\
