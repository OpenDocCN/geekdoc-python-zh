  md: "# 13.1.6 Summary\n\nIn summary, we have learned that\n\n+   - floating point\
    \ numbers and integers used in numeric computation are generally quite different\
    \ from “mathematical numbers” (symbolic calculations are exact and use the “mathematical\
    \ numbers”):\n    - there is a maximum number and a minimum number that can be\
    \ represented (for both integers and floating point numbers)\n    - within this\
    \ range, not every floating point number can be represented in the computer.\n\
    - We deal with this limitation by:\n    - never comparing two floating point numbers\
    \ for equality (instead we compute the absolute value of the difference)\n   \
    \ - use of algorithms that are *stable* (this means that small deviations from\
    \ correct numbers can be corrected by the algorithm. We have not yet shown any\
    \ such examples this document.)\n- Note that there is a lot more to be said about\
    \ numerical and algorithmic tricks and methods to make numeric computation as\
