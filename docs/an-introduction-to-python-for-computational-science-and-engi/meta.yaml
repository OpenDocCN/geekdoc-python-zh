  md: "# 17.6 Series data access: explicit and implicit (loc and iloc)\n\n```\nstock\
    \ = pd.Series({'apple': 10,\n                  'orange': 3,\n                \
    \  'banana': 22,\n                  'cucumber' : 1,\n                  'potato'\
    \ : 110})\n```\n\n```\nstock\n```\n\n```\napple        10\norange        3\nbanana\
    \       22\ncucumber      1\npotato      110\ndtype: int64\n```\n\n# 17.6.1 Indexing\n\
    \nWe can access single values through their index as if the stock Series object\
    \ would be a dictionary:\n\n```\nstock['banana']\n```\n\n```\n22\n```\n\nThere\
    \ is an equivalent and recommended way of using this retrieval using the `loc`\
    \ (for LOCation?) attribute:\n\n```\nstock.loc['banana']\n```\n\n```\n22\n```\n\
    \nFor convenience, pandas also (!) allows us to use integer indexing into the\
    \ Series object. This is called *implicit* indexing as the series Object doesn't\
    \ use integers as the index, but the name of the fruits.\n\nFor example, we can\
    \ also retrieve the value for `banana` through its implicit index 2, because it\
    \ is in row 3 of the Series object (which would need index 2 as we start counting\
    \ from 0):\n\n```\nstock[2]\n```\n\n```\n22\n```\n\nIn this example, this works\
    \ fine and seems convenient, but can become very confusing if the actual index\
    \ of the object consists of integers. For that reason, the explicit (and recommended\
    \ way) of using the indirect indexing is through the `iloc` (ImplicitLOCation)\
    \ attribute:\n\n```\nstock.iloc[2]\n```\n\n```\n22\n```"
