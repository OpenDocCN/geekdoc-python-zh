    \ now entered the Editing mode, and the content of the cell can be edited. If\
    \ you have completed your changes, and you want to execute them, use the Shift+ENTER\
    \ short cut.\n    Note that you can also edit blocks of text (or go into edit\
    \ mode for a text cell unintentionally). Just press Shift+ENTER to render the\
    \ text again, and go back into command mode.\n\n**Warning: Changes on myBinder\
    \ are temporary**\n\nIf you use this text book interactively on the myBinder service,\
    \ then you have been given a temporary resource in the cloud to execute the code\
