  md: "![](img/311265a3784c8b1302bbc7bfff8d0ca5_204_0.png)\n\n# 16.7 Curve fitting\n\
    \nWe have already seen in *the numpy chapter* that we can fit polynomial functions\
    \ through a data set using the `numpy.polyfit` function. Here, we introduce a\
    \ more generic curve fitting algorithm.\n\nScipy provides a somewhat generic function\
    \ (based on the Levenburg-Marquardt algorithm )through `scipy.optimize.curve_fit`\
    \ to fit a given (Python) function to a given data set. The assumption is that\
    \ we have been given a set of data with points $x_1, x_2, ...x_N$ and with corresponding\
    \ function values $y_i$ and a dependence of $y_i$ on $x_i$ such that $y_i = f(x_i,\
    \ \\vec{p})$. We want to determine the parameter vector $\\vec{p} = (p_1, p_2,\
    \ ..., p_k)$ so that $r$, the sum of the residuals, is as small as possible:\n\
    \n$$r = \\sum_{i=1}^{N} (y_i - f(x_i, \\vec{p}))^2$$\n\nCurve fitting is of particular\
    \ use if the data is noisy: for a given $x_i$ and $y_i = f(x_i, \\vec{p})$ we\
    \ have a (unknown) error term $\\epsilon_i$ so that $y_i = f(x_i, \\vec{p}) +\
    \ \\epsilon_i$.\n\nWe use the following example to clarify this: $f(x, \\vec{p})\
    \ = a \\exp(-bx) + c$, i.e. $\\vec{p} = a, b, c$\n\n```\npython\n# NBVAL_IGNORE_OUTPUT\n\
    import numpy as np\nfrom scipy.optimize import curve_fit\n\ndef f(x, a, b, c):\n\
    \    \"\"\"Fit function y=f(x,p) with parameters p=(a,b,c). \"\"\"\n    return\
    \ a * np.exp(- b * x) + c\n\n#create fake data\nx = np.linspace(0, 4, 50)\n```"
