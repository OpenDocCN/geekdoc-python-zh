    ```


    # 3.2.2 Integer limits


    Integers in Python 3 are unlimited; Python will automatically assign more memory
    as needed as the numbers get bigger. This means we can calculate very large numbers
    with no special steps.


    ```

    35**42

    ```


    ```

    70934557307860443711736098025989133248003781773149967193603515625

    ```


