    \ shell 进行大量交互，并且需要了解两件事：\n\n1.  我们使用感叹号（!）来告诉 Jupyter 将后续命令发送到 shell（而不是在本 Notebook\
    \ 的 Python 环境中解释）。例如：\n\n```\n!date\n```\n\n```\nTue Jan  4 16:03:43 CET 2022\n\
    ```\n\n2.  如果我们修改了 shell 变量（例如 PATH），这些变量仅在同一个单元格内设置。这将导致一些命令需要重复执行。这有点烦人（如果在\
    \ Jupyter Notebook 外部使用相同的命令则不会出现这种情况）。\n下面是一个示例来说明这个问题：首先我们设置一个变量值，然后显示它：\n\n\
    ```\n!export NEW_VAR=\"test\" && echo $NEW_VAR\n```\n\n```\ntest\n```\n\n`&&`\
    \ 运算符指示 shell 在左侧命令成功后执行右侧的命令。再次执行 “echo” 命令，我们发现变量不再被定义：\n\n```\n!echo $NEW_VAR\n\
    ```\n\n因此，如果我们想利用这些变量值，就需要重复设置它们：\n\n```\n!export NEW_VAR=\"test\" && echo \"\
