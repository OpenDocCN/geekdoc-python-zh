- img_proc: true
  md: '# Introduction to Python for Computational Science and Engineering


    On the other hand, in subjects that are not as well described through a mathematical
    framework and depend on behaviour of objects whose actions are impossible to predict
    deterministically (such as humans), it is much more difficult to find a good model
    to describe reality. As a rule of thumb, in these disciplines the resulting equations
    are easier to solve, but they are harder to find and the validity of a model needs
    to be questioned much more. Typical examples are attempts to simulate the economy,
    the use of global resources, the behaviour of a panicking crowd, etc.


    So far, we have just discussed the development of *models* to describe reality,
    and using these models does not necessarily involve any computers or numerical
    work at all. In fact, if a model''s equation can be solved analytically, then
    one should do this and write down the solution to the equation.


    In practice, hardly any model equations of systems of interest can be solved analytically,
    and this is where the computer comes in: using numerical methods, we can at least
    study the model *for a particular set of boundary conditions*. For the example
    considered above, we may not be able to easily see from a numerical solution that
    the penny''s velocity under the influence of gravity will change linearly with
    time (which we can read easily from the analytical solution that is available
    for this simple system: $v(t) = t \cdot 9.81\mathrm{m/s^2} + v_0$)).


    The numerical solution that can be computed using a computer would consist of
    data that shows how the velocity changes over time for a particular initial velocity
    v0 (v0 is a boundary condition here). The computer program would report a long
    lists of two numbers keeping the (i) value of time $t_i$ for which a particular
    (ii) value of the velocity $v_i$ has been computed. By plotting all $v_i$ against
    $t_i$, or by fitting a curve through the data, we may be able to understand the
    trend from the data (which we can just see from the analytical solution of course).


    It is clearly desirable to find an analytical solutions wherever possible but
    the number of problems where this is possible is small. Usually, the obtaining
    numerical result of a computer simulation is very useful (despite the shortcomings
    of the numerical results in comparison to an analytical expression) because it
    is the only possible way to study the system at all.


    The name *computational modelling* derives from the two steps: (i) *modelling*,
    i.e. finding a model description of a real system, and (ii) solving the resulting
    model equations using *computational* methods because this is the only way the
    equations can be solved at all.


    # 1.1.3 Programming to support computational modelling


    A large number of packages exist that provide computational modelling capabilities.
    If these satisfy the research or design needs, and any data processing and visualisation
    is appropriately supported through existing tools, one can carry out computational
    modelling studies without any deeper programming knowledge.


    In a research environment – both in academia and research on new products/ideas/...
    in industry – one often reaches a point where existing packages will not be able
    to perform a required simulation task, or where more can be learned from analysing
    existing data in news ways etc.


    At that point, programming skills are required. It is also generally useful to
    have a broad understanding of the building blocks of software and basic ideas
    of software engineering as we use more and more devices that are software-controlled.


    It is often forgotten that there is nothing the computer can do that we as humans
    cannot do. The computer can do it much faster, though, and also with making far
    fewer mistakes. There is thus no magic in computations a computer carries out:
    they could have been done by humans, and – in fact – were for many years (see
    for example Wikipedia entry on [Human Computer](https://en.wikipedia.org/wiki/Human_computer)).


    Understanding how to build a computer simulation comes roughly down to: (i) finding
    the model (often this means finding the right equations), (ii) knowing how to
    solve these equations numerically, (ii) to implement the methods to compute these
    solutions (this is the programming bit).'
