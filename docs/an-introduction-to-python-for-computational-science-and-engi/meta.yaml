    # 15.3.3 What colour map to choose?


    It is a non-trivial question which colour map one should use. There is a useful
    discussion as part of the matplotlib documentation.


    By default a ‘perceptually uniform’ colourmap is a good choice: the perception
    of the colours follows the values we try to represent. Examples are “viridis”,
    “plasma”, “inferno”, “magma”, “cividis”.


    This is a complex topic in its own right.


