    # 15.2.2 Plotting more than one curve


    There are three different methods to display more than one curve.


    # Two (or more) curves in one graph


    By calling the `plot` command repeatedly, more than one curve can be drawn in
    the same graph. Example:


    ```

    import numpy as np

    t = np.arange(0, 2*np.pi, 0.01)


    import pylab

    pylab.plot(t, np.sin(t), label=''sin(t)'')

    pylab.plot(t, np.cos(t), label=''cos(t)'')

    pylab.legend()

    ```


