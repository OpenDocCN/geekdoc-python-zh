  md: '# Introduction to Python for Computational Science and Engineering


    This can be extremely convenient, but comes with a big health warning:


    +   - While using `from pylab import *` is acceptable at the command prompt to
    interactively create plots and analyse data, this should never be used in any
    plotting scripts.

    - The pylab toplevel provides over 800 different objects which are all imported
    into the global name space when running `from pylab import *`. This is not good
    practice, and could conflict with other objects that exist already or are created
    later.

    - As a rule of thumb: do never use `from somewhere import *` in programs we save.
    This may be okay at the command prompt for interactive data exploration.


    # 15.1.4 IPython’s inline mode


    Within the Jupyter Notebook or Qtconsole (see the *Python shells notebook*) we
    can use the `%matplotlib inline` magic command to make further plots appear within
    our console or notebook. To force pop up windows instead, use `%matplotlib qt`.


    If you enjoy the `pylab` interface, then you maybe interested in the `%pylab`
    magic, which will not only switch to inline plotting but also automatically execute
    `from pylab import *`.


    # 15.1.5 Saving the figure to a file


    Once you have created the figure (using the `plot` command) and added any labels,
    legends etc, you have two options to save the plot.


    +   1. You can display the figure (using `show`) and *interactively* save it by
    clicking on the disk icon. (This does not work with inline plots as the icons
    are not available.)

    2. You can (without displaying the figure) save it directly from your Python code.
    The command to use is `savefig`. The format is determined by the extension of
    the file name you provide. Here is an example (`pylabsavefig.py`) which saves
    a figure into different files.


    ```

    # saving figure files with the pylab interface

    import pylab

    import numpy as np


    x = np.arange(-3.14, 3.14, 0.01)

    y = np.sin(x)


    pylab.plot(x, y, label=''sin(x)'')

    pylab.savefig(''myplot.png'')  # saves png file

    pylab.savefig(''myplot.svg'')  # saves svg file

    pylab.savefig(''myplot.eps'')  # saves svg file

    pylab.savefig(''myplot.pdf'')  # saves pdf file

    pylab.close()

    ```


    A note on file formats:


    The `pdf`, `eps` and `svg` file formats are vector file formats which means that
    one can zoom into the image without loosing quality (lines will still be sharp).
    File formats such as `png` (and `jpg`, `gif`, `tif`, `bmp`) save the image in
    form of a bitmap (i.e. a matrix of colour values) and will appear blurry or pixelated
    when zooming in (or when printed in high resolution).


    Accordingly, choose a vector file format where you can, and use the bitmap (`png`
    for example) if there are no other options. Choose the `eps` or `pdf` file format
    if you plan to include the figure in a Latex document – depending on whether you
    want to compile it using `latex` (needs `eps`) or pdflatex (can use `pdf` [better]
    or `png`). If the version of MS Word (or other text processing software you use)
    can handle `pdf` files, it is better to use `pdf` than `png` for that.'
