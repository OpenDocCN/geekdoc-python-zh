    # 11.4 Spyder


    Spyder is the Scientific PYthon Development EnviRonment: a powerful interactive
    development environment for the Python language with advanced editing, interactive
    testing, debugging and introspection features and a numerical computing environment
    thanks to the support of IPython (enhanced interactive Python interpreter) and
    popular Python libraries such as NumPy (linear algebra), SciPy (signal and image
    processing) or matplotlib (interactive 2D/3D plotting). See https://www.spyder-ide.org/
    for more.


    Some important features of Spyder:


    +   - Within Spyder, the IPython console is the default Python interpreter, and

    - code in the editor can be fully or partially be executed in this buffer.

    - The editor supports automatic checking for Python erros using pyflakes, and

    - the editor warns (if desired) if the code formatting deviates from the PEP8
    style guide.

    - The Ipython Debugger can be activated, and

    - a profiler is provided.

    - An object explorer shows documentation for functions, methods etc on the fly
    and a

    - variable explorer displays names, size and values for numerical variables.


    Spyder is currently (as of 2014) on the way to develop into a powerful and robust
    multi-platform integrated environment for Python development, with particular
    emphasis on Python for scientific computing and engineering.


    # 11.5 Editors


    All major editors that are used for programming, provide Python modes (such as
    Emacs, Vim, Sublime Text), some Integrated Development Enviroments (IDEs) come
    with their own editor (Spyder, Eclipse). Which of these is best, is partly a matter
    of choice.


    For beginners, Spyder seems a sensible choice as it provides an IDE, allows execution
    of chunks of code in an interpreter session and is easy to pick up.'
