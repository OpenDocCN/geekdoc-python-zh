- md: "## Introduction to Python for Computational Science and Engineering\n\nExplicit\
    \ Runge-Kutta methods ('RK23', 'RK45', 'DOP853') should be used for non-stiff\
    \ problems and implicit methods ('Radau', 'BDF') for stiff problems [9]_. Among\
    \ Runge-Kutta methods, 'DOP853' is recommended for solving with high precision\
    \ (low values of `rtol` and `atol`).\n\nIf not sure, first try to run 'RK45'.\
    \ If it makes unusually many iterations, diverges, or fails, your problem is likely\
    \ to be stiff and you should use 'Radau' or 'BDF'. 'LSODA' can also be a good\
    \ universal choice, but it might be somewhat less convenient to work with as it\
    \ wraps old Fortran code.\n\nYou can also pass an arbitrary class derived from\
    \ `OdeSolver` which implements the solver.\n\n`t_eval` : array_like or None, optional\n\
    Times at which to store the computed solution, must be sorted and lie within `t_span`.\
    \ If None (default), use points selected by the solver.\n\n`dense_output` : bool,\
    \ optional\nWhether to compute a continuous solution. Default is False.\n\n`events`\
    \ : callable, or list of callables, optional\nEvents to track. If None (default),\
    \ no events will be tracked.\nEach event occurs at the zeros of a continuous function\
    \ of time and state. Each function must have the signature ``event(t, y)`` and\
    \ return a float. The solver will find an accurate value of `t` at which ``event(t,\
    \ y(t)) = 0`` using a root-finding algorithm. By default, all zeros will be found.\
    \ The solver looks for a sign change over each step, so if multiple zero crossings\
    \ occur within one step, events may be missed. Additionally each `event` function\
    \ might have the following attributes:\n\n`terminal`: bool, optional\nWhether\
    \ to terminate integration if this event occurs.\nImplicitly False if not assigned.\n\
    \n`direction`: float, optional\nDirection of a zero crossing. If `direction` is\
    \ positive, `event` will only trigger when going from negative to positive, and\
    \ vice versa if `direction` is negative. If 0, then either direction will trigger\
    \ event. Implicitly 0 if not assigned.\n\nYou can assign attributes like ``event.terminal\
    \ = True`` to any function in Python.\n\n`vectorized` : bool, optional\nWhether\
    \ `fun` is implemented in a vectorized fashion. Default is False.\n\n`args` :\
    \ tuple, optional\nAdditional arguments to pass to the user-defined functions.\
    \ If given, the additional arguments are passed to all user-defined functions.\
    \ So if, for example, `fun` has the signature ``fun(t, y, a, b, c)``, then `jac`\
    \ (if given) and any event functions must have the same signature, and `args`\
    \ must be a tuple of length 3.\n\n`options`\nOptions passed to a chosen solver.\
    \ All options available for already implemented solvers are listed below.\n\n\
    `first_step` : float or None, optional\nInitial step size. Default is `None` which\
    \ means that the algorithm should choose.\n\n`max_step` : float, optional\nMaximum\
    \ allowed step size. Default is np.inf, i.e., the step size is not bounded and\
    \ determined solely by the solver.\n\n`rtol`, `atol` : float or array_like, optional\n\
    Relative and absolute tolerances. The solver keeps the local error estimates less\
    \ than ``atol + rtol * abs(y)``. Here `rtol` controls a relative accuracy (number\
    \ of correct digits). But if a component of `y` is approximately below `atol`,\
    \ the error only needs to fall within the same `atol` threshold, and the number\
    \ of correct digits is not guaranteed. If components of y have different scales,\
    \ it might be beneficial to set different `atol` values for different components\
    \ by passing array_like with shape (n,) for `atol`. Default values are 1e-3 for\
    \ `rtol` and 1e-6 for `atol`.\n\n`jac` : array_like, sparse_matrix, callable or\
    \ None, optional\nJacobian matrix of the right-hand side of the system with respect\
    \ to y, required by the 'Radau', 'BDF' and 'LSODA' method. The Jacobian matrix\
    \ has shape (n, n) and its element (i, j) is equal to ``d f_i / d y_j``. There\
    \ are three ways to define the Jacobian:\n\n- If array_like or sparse_matrix,\
    \ the Jacobian is assumed to be constant. Not supported by 'LSODA'.\n- If callable,\
    \ the Jacobian is assumed to depend on both t and y; it will be called as ``jac(t,\
    \ y)``, as necessary. For 'Radau' and 'BDF' methods, the return value might be\
    \ a sparse matrix.\n- If None (default), the Jacobian will be approximated by\
    \ finite differences.\n\nIt is generally recommended to provide the Jacobian rather\
    \ than relying on a finite-difference approximation.\n\n`jac_sparsity` : array_like,\
    \ sparse matrix or None, optional\nDefines a sparsity structure of the Jacobian\
    \ matrix for a finite-difference approximation. Its shape must be (n, n). This\
    \ argument is ignored if `jac` is not `None`. If the Jacobian has only few non-zero\
    \ elements in *each* row, providing the sparsity structure will greatly speed\
    \ up the computations [10]_. A zero entry means that a corresponding element in\
    \ the Jacobian is always zero. If None (default), the Jacobian is assumed to be\
    \ dense.\nNot supported by 'LSODA', see `lband` and `uband` instead.\n\n`lband`,\
    \ `uband` : int or None, optional\nParameters defining the bandwidth of the Jacobian\
    \ for the 'LSODA' method, i.e., ``jac[i, j] != 0 only for i - lband <= j <= i\
    \ + uband``. Default is None. Setting these requires your jac routine to return\
    \ the Jacobian in the packed format: the returned array must have ``n`` columns\
    \ and ``uband + lband + 1`` rows in which Jacobian diagonals are written. Specifically\
    \ ``jac_packed[uband + i - j , j] = jac[i, j]``. The same format is used in `scipy.linalg.solve_banded`\
    \ (check for an illustration). These parameters can be also used with ``jac=None``\
    \ to reduce the number of Jacobian elements estimated by finite differences.\n\
    \n`min_step` : float, optional\nThe minimum allowed step size for 'LSODA' method.\n\
    By default `min_step` is zero.\n\nReturns\n-------\nBunch object with the following\
    \ fields defined:\n`t` : ndarray, shape (n_points,)\nTime points.\n\n`y` : ndarray,\
    \ shape (n, n_points)\nValues of the solution at `t`.\n`sol` : `OdeSolution` or\
    \ None\nFound solution as `OdeSolution` instance; None if `dense_output` was\n\
    set to False.\n`t_events` : list of ndarray or None\nContains for each event type\
    \ a list of arrays at which an event of\nthat type event was detected. None if\
    \ `events` was None.\n`y_events` : list of ndarray or None\nFor each value of\
    \ `t_events`, the corresponding value of the solution.\nNone if `events` was None.\n\
    `nfev` : int\nNumber of evaluations of the right-hand side.\n`njev` : int\nNumber\
    \ of evaluations of the Jacobian.\n`nlu` : int\nNumber of LU decompositions.\n\
    `status` : int\nReason for algorithm termination:\n\n    * -1: Integration step\
    \ failed.\n    *  0: The solver successfully reached the end of `tspan`.\n   \
    \ *  1: A termination event occurred.\n\n`message` : string\nHuman-readable description\
    \ of the termination reason.\n`success` : bool\nTrue if the solver reached the\
    \ interval end or a termination event\noccurred (``status >= 0``).\n\n## 16.4.1\
    \ Systems of coupled ODEs\n\nWe want to show one example of two first-order ODEs\
    \ that are coupled. This helps to understand why the initial value y0 in the above\
    \ example had to be provided in a list ([y0]) and why the solution is sol.y[0]\
    \ rather than just sol.y.\n\nWe use the Predator and prey example. Let\n\n- $p_1(t)$\
    \ be the number of rabbits and\n- $p_2(t)$ be the number of foxes at a given time\
    \ $t$\n\nTo compute the time dependence of $p_1$ and $p_2$:\n\n- Assume that rabbits\
    \ proliferate at a rate $a$. Per unit time a number $ap_1$ of rabbits are born.\n\
    - Assume that the number of rabbits is reduced by collisions with foxes: per unit\
    \ time $cp_1p_2$ rabbits are eaten.\n- Assume that birth rate of foxes depends\
    \ only on food intake in form of rabbits.\n- Assume that foxes die a natural death\
    \ at a rate $b$.\n\nWe put this together into the system of coupled ordinary differential\
    \ equations: \\begin{eqnarray} \\label{eq:predprey} \\frac{d p_1}{dt} &=& a p_1\
    \ - c p_1 p_2 \\nonumber \\ \\frac{d p_2}{dt} &=& c p_1 p_2 - b p_2 \\nonumber\
    \ \\end{eqnarray}\n\nWe use the following parameters:\n\n- rabbit birth rate $a\
    \ = 0.7$\n- rabbit-fox-collision rate $c = 0.007$"
  mdcn: "## 计算科学与工程中的Python导论\n\n显式龙格-库塔方法（'RK23'、'RK45'、'DOP853'）应用于非刚性问题，而隐式方法（'Radau'、'BDF'）则用于刚性问题[9]_。在龙格-库塔方法中，推荐使用'DOP853'来求解高精度问题（即`rtol`和`atol`取值较小的情况）。\n\
    \n如果不确定，可以先尝试运行'RK45'。如果它迭代次数异常多、发散或失败，那么你的问题很可能是刚性的，你应该使用'Radau'或'BDF'。'LSODA'也可以是一个很好的通用选择，但由于它封装了旧的Fortran代码，使用起来可能稍显不便。\n\
    \n你也可以传递一个从`OdeSolver`派生的任意类，该类实现了求解器。\n\n`t_eval` : array_like 或 None，可选\n存储计算解的时间点，必须是排序过的且位于`t_span`内。如果为None（默认值），则使用求解器选择的点。\n\
    \n`dense_output` : bool，可选\n是否计算连续解。默认为False。\n\n`events` : callable，或callable列表，可选\n\
    要跟踪的事件。如果为None（默认值），则不跟踪任何事件。\n每个事件发生在时间和状态的连续函数的零点处。每个函数必须具有签名``event(t, y)``并返回一个浮点数。求解器将使用求根算法找到使``event(t,\
    \ y(t)) = 0``成立的精确`t`值。默认情况下，将找到所有零点。求解器在每个步长内寻找符号变化，因此如果在一个步长内发生多次零点穿越，可能会错过事件。此外，每个`event`函数可能具有以下属性：\n\
    \n`terminal`: bool，可选\n如果发生此事件，是否终止积分。\n如果未赋值，则隐式为False。\n\n`direction`: float，可选\n\
    零点穿越的方向。如果`direction`为正，则仅在从负到正时触发`event`；如果`direction`为负，则反之。如果为0，则任一方向都会触发事件。如果未赋值，则隐式为0。\n\
    \n你可以在Python中为任何函数分配属性，如``event.terminal = True``。\n\n`vectorized` : bool，可选\n\
    `fun`是否以向量化方式实现。默认为False。\n\n`args` : tuple，可选\n传递给用户定义函数的额外参数。如果提供，额外参数将传递给所有用户定义函数。因此，例如，如果`fun`的签名为``fun(t,\
    \ y, a, b, c)``，那么`jac`（如果提供）和任何事件函数必须具有相同的签名，并且`args`必须是长度为3的元组。\n\n`options`\n\
    传递给所选求解器的选项。已实现求解器的所有可用选项如下所列。\n\n`first_step` : float 或 None，可选\n初始步长。默认为`None`，这意味着算法应自行选择。\n\
    \n`max_step` : float，可选\n允许的最大步长。默认为np.inf，即步长不受限制，完全由求解器决定。\n\n`rtol`, `atol`\
    \ : float 或 array_like，可选\n相对和绝对容差。求解器保持局部误差估计值小于``atol + rtol * abs(y)``。这里`rtol`控制相对精度（正确数字的位数）。但如果`y`的某个分量近似低于`atol`，则误差只需落在相同的`atol`阈值内，不保证正确数字的位数。如果y的分量具有不同的尺度，通过为`atol`传递形状为(n,)的array_like来为不同分量设置不同的`atol`值可能是有益的。默认值为`rtol`\
    \ 1e-3，`atol` 1e-6。\n\n`jac` : array_like, sparse_matrix, callable 或 None，可选\n\
    系统右端关于y的雅可比矩阵，'Radau'、'BDF'和'LSODA'方法需要此矩阵。雅可比矩阵的形状为(n, n)，其元素(i, j)等于``d f_i\
    \ / d y_j``。定义雅可比矩阵有三种方式：\n\n- 如果是array_like或sparse_matrix，则假定雅可比矩阵为常数。'LSODA'不支持此方式。\n\
    - 如果是callable，则假定雅可比矩阵依赖于t和y；它将根据需要作为``jac(t, y)``被调用。对于'Radau'和'BDF'方法，返回值可以是稀疏矩阵。\n\
    - 如果为None（默认值），则雅可比矩阵将通过有限差分近似。\n\n通常建议提供雅可比矩阵，而不是依赖有限差分近似。\n\n`jac_sparsity`\
    \ : array_like, sparse matrix 或 None，可选\n定义用于有限差分近似的雅可比矩阵的稀疏结构。其形状必须为(n, n)。如果`jac`不为`None`，则忽略此参数。如果雅可比矩阵在*每*行中只有很少的非零元素，提供稀疏结构将大大加快计算速度[10]_。零条目意味着雅可比矩阵中对应的元素始终为零。如果为None（默认值），则假定雅可比矩阵为稠密矩阵。\n\
    'LSODA'不支持此方式，请改用`lband`和`uband`。\n\n`lband`, `uband` : int 或 None，可选\n定义'LSODA'方法雅可比矩阵带宽的参数，即``jac[i,\
    \ j] != 0 仅当 i - lband <= j <= i + uband``。默认为None。设置这些参数要求你的jac例程以打包格式返回雅可比矩阵：返回的数组必须有``n``列和``uband\
    \ + lband + 1``行，雅可比矩阵的对角线写入其中。具体来说，``jac_packed[uband + i - j , j] = jac[i, j]``。`scipy.linalg.solve_banded`中使用相同的格式（可查看示例）。这些参数也可以与``jac=None``一起使用，以减少通过有限差分估计的雅可比矩阵元素数量。\n\
    \n`min_step` : float，可选\n'LSODA'方法允许的最小步长。\n默认情况下`min_step`为零。\n\n返回值\n-------\n\
    具有以下定义字段的Bunch对象：\n`t` : ndarray，形状 (n_points,)\n时间点。\n\n`y` : ndarray，形状 (n,\
    \ n_points)\n在`t`处的解的值。\n`sol` : `OdeSolution` 或 None\n找到的解作为`OdeSolution`实例；如果`dense_output`设置为False，则为None。\n\
    `t_events` : ndarray列表或 None\n包含每种事件类型检测到该类型事件的时间点数组列表。如果`events`为None，则为None。\n\
    `y_events` : ndarray列表或 None\n对于`t_events`中的每个值，对应的解的值。如果`events`为None，则为None。\n\
    `nfev` : int\n右端求值次数。\n`njev` : int\n雅可比矩阵求值次数。\n`nlu` : int\nLU分解次数。\n`status`\
    \ : int\n算法终止原因：\n\n    * -1: 积分步失败。\n    *  0: 求解器成功到达`tspan`的终点。\n    *  1:\
    \ 发生终止事件。\n\n`message` : string\n终止原因的人类可读描述。\n`success` : bool\n如果求解器到达区间终点或发生终止事件（``status\
    \ >= 0``），则为True。\n\n## 16.4.1 耦合常微分方程组\n\n我们想展示一个两个一阶常微分方程耦合的例子。这有助于理解为什么上面例子中的初始值y0必须以列表形式（[y0]）提供，以及为什么解是sol.y[0]而不是sol.y。\n\
    \n我们使用捕食者与猎物的例子。设\n\n- $p_1(t)$ 为兔子的数量，\n- $p_2(t)$ 为给定时间$t$时狐狸的数量。\n\n为了计算$p_1$和$p_2$的时间依赖性：\n\
    \n- 假设兔子以速率$a$繁殖。单位时间内出生$ap_1$只兔子。\n- 假设兔子的数量因与狐狸的碰撞而减少：单位时间内有$cp_1p_2$只兔子被吃掉。\n\
    - 假设狐狸的出生率仅取决于以兔子形式摄入的食物。\n- 假设狐狸以速率$b$自然死亡。\n\n我们将这些组合成耦合的常微分方程组：\\begin{eqnarray}\
    \ \\label{eq:predprey} \\frac{d p_1}{dt} &=& a p_1 - c p_1 p_2 \\nonumber \\ \\\
    frac{d p_2}{dt} &=& c p_1 p_2 - b p_2 \\nonumber \\end{eqnarray}\n\n我们使用以下参数：\n\
    \n- 兔子出生率 $a = 0.7$\n- 兔子-狐狸碰撞率 $c = 0.007$"
