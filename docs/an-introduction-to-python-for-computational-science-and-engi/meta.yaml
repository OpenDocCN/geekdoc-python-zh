  md: "# 10.1.2 The if-then statement\n\nMatlab:\n\n```\nif a==0\n    disp('a is zero')\n\
    elseif a<0\n    disp('a is negative')\nelseif a==42\n    disp('a is 42')\nelse\n\
    \    disp('a is positive')\nend\n```\n\nMatlab requires the `end` key-word at\
    \ the very end of the block belonging to the for-loop.\n\nPython:\n\n```\na =\
    \ -5\n\nif a==0:\n    print('a is zero')\nelif a<0:\n    print('a is negative')\n\
    elif a==42:\n    print('a is 42')\nelse:\n    print('a is positive')\n```\n\n\
    ```\na is negative\n```\n\nPython requires a colon (“:”) after every condition\
    \ (i.e. at the of the lines starting with `if`, `elif`, `else`). Python requires\
    \ the commands to be executed within each part of the if-then-else statement to\
    \ be indented.\n\n# 10.1.3 Indexing\n\nMatlab’s indexing of matrices and vectors\
    \ starts a 1 (similar to Fortran), whereas Python’s indexing starts at 0 (similar\
    \ to C).\n\n# 10.1.4 Matrices\n\nIn Matlab, every object is a matrix. In Python,\
    \ there is a specialised extension library called `numpy` (see Sec. [cha:numer-pyth-numpy])\
    \ which provides the `array` object which in turns provides the corresponding\
    \ functionality. Similar to Matlab, the `numpy` object is actually based on binary\
    \ libraries and execution there very fast.\n\nThere is a dedicated introduction\
    \ to numpy for Matlab users available at https://numpy.org/doc/stable/user/numpy-for-matlab-users.html."
