    - The Python style guide (https://www.python.org/dev/peps/pep-0008/


    # 1.2.5 Recorded video lectures on Python for beginners


    Do you like to listen/follow lectures? There is a series of 24 lectures titled
    *Introduction to Computer Science and Programming* delivered by Eric Grimsom and
    John Guttag from the MIT available at https://ocw.mit.edu/courses/electrical-engineering-and-computer-science/6-00-introduction-to-computer-science-and-programming-fall-2008/
    This is aimed at students with little or no programming experience. It aims to
    provide students with an understanding of the role computation can play in solving
    problems. It also aims to help students, regardless of their major, to feel justifiably
    confident of their ability to write small programs that allow them to accomplish
    useful goals.


    An more recent collection of topic specific (and shorter) tutorial videos is available
    from Socratica .


    # 1.2.6 Python tutor mailing list


    There is also a Python tutor mailing list (https://mail.python.org/mailman/listinfo/tutor)
    where beginners are welcome to ask questions regarding Python. Both using the
    archives and posting your own queries (or in fact helping others) may help with
    understanding the language. Use the normal mailing list etiquette (i.e. be polite,
    concise, etc). You may want to read https://www.freebsd.org/doc/en/articles/mailing-list-faq/etiquette.html
    for some guidance on how to ask questions on mailing lists.


    # 1.3 Python version


    There are two version of the Python language out there: Python 2.x and Python
    3.x. They are (slightly) different — the changes in Python 3.x were introduced
    to address shortcomings in the design of the language that were identified since
    Python’s inception. A decision was made that some incompatibility should be accepted
    to achieve the higher goal of a better language for the future.


    For scientific computation, it is crucial to make use of numerical libraries such
    as `numpy`, `scipy` and the plotting package `matplotlib`.


    All of these are now available for Python 3, and we will use Python 3.x in this
    book.'
- md: "## Introduction to Python for Computational Science and Engineering\n\nHowever,\
    \ there is a lot of code still in use that was written for Python 2, and it's\
    \ useful to be aware of the differences. The most prominent example is that in\
    \ Python 2.x, the `print` command is special, whereas in Python 3 it is an ordinary\
    \ function. For example, in Python 2.7, we can write:\n\n```\nprint \"Hello World\"\
    \n```\n\nwhereas in Python 3, this would cause a SyntaxError. The right way to\
    \ use `print` in Python 3 would be as a function, i.e.\n\n```\nprint(\"Hello World\"\
    )\n```\n\n```\nHello World\n```\n\nSee *Chapter 5: Input and Output* for further\
    \ details.\nFortunately, the function notation (i.e. with the parentheses) is\
    \ also allowed in Python 2.7, so our examples should execute in Python 3.x and\
    \ Python 2.7. (There are other differences.)\n\n## 1.4 These documents\n\nThis\
    \ material has been converted from Latex to a set of Jupyter Notebooks, making\
    \ it possible to interact with the examples. You can run any code block with an\
    \ `In [ ]:` prompt by clicking on it and pressing shift-enter, or by clicking\
    \ the button in the toolbar.\n*Code blocks* can be recognised (in the html and\
    \ pdf version of this book) by having coloured items (to emphasise the syntactic\
    \ role). For example:\n\n```\nfor i in range(3):\n    print(\"Hello\")\n```\n\n\
    ```\nHello\nHello\nHello\n```\n\nThe *output* (here `Hello` repeated on three\
    \ lines) that is produced by the code block, is shown below the code block and\
    \ not coloured.\n\n### 1.4.1 The %%file magic\n\nWe use some features in the notebook\
    \ that are worth being aware of at this point: a cell starting with the special\
    \ command `%%file FILENAME` will create (or override) a file with name `FILENAME`\
    \ that contains the content that is shown in the cell below.\nFor example\n\n\
    ```\n%%file hello.txt\nThis is the content of the file hello.txt\n```\n\n```\n\
    Overwriting hello.txt\n```\n\nTo confirm the file has been written and contains,\
    \ we use some Python commands (which you are not expected to understand at this\
    \ point):\n\n```\nwith open(\"hello.txt\") as f:\n    print(f.read())\n```\n\n\
    ```\nThis is the content of the file hello.txt\n```\n\n### 1.4.2 The ! to execute\
    \ shell commands\n\nIf we want to run a shell command, we can type it and preceed\
    \ it by the ! character. Here is an example: first we create a file that contains\
    \ a Python hello world program, then we execute it:\n\n```\n%%file hello.py\n\
    print(\"Hello World\")\n```\n\n```\nOverwriting hello.py\n```\n\n```\n!python\
    \ hello.py\n```\n\n```\nHello World\n```\n\n### 1.4.3 The #NBVAL tags\n\nIn some\
    \ cells, you will find tags like `#NBVAL_SKIP`, `#NBVAL_IGNORE_OUTPUT` and `#NBVAL_RAISES_EXCEPTION`.\
    \ You can ignore these.\n\n(We use them to be able to automatically execute all\
    \ notebooks to check that the output produced is the same as what is stored in\
    \ the notebook. This is an advanced topic of testing, and you can read more about\
    \ NBVAL at https://github.com/computationalmodelling/nbval).\n\nSee *Chapter 11*\
    \ for more information on Jupyter and other Python interfaces.\n\n## 1.5 Your\
    \ feedback\n\nis desired. If you find anything wrong in this text, or have suggestions\
    \ how to change or extend it, please feel free to contact Hans at `hans.fangohr@xfel.eu`.\n\
    \nIf you find a URL that is not working (or pointing to the wrong material), please\
    \ let Hans know as well. As the content of the Internet is changing rapidly, it\
    \ is difficult to keep up with these changes without feedback.\n\n# CHAPTER TWO\n\
    \n# A POWERFUL CALCULATOR\n\n## 2.1 Python prompt and Read-Eval-Print Loop (REPL)\n\
    \nPython is an *interpreted* language. We can collect sequences of commands into\
    \ text files and save this to file as a *Python program*. It is convention that\
    \ these files have the file extension \".py\", for example `hello.py`.\n\nWe can\
    \ also enter individual commands at the Python prompt which are immediately evaluated\
    \ and carried out by the Python interpreter. This is very useful for the programmer/learner\
    \ to understand how to use certain commands (often before one puts these commands\
    \ together in a longer Python program). Python's role can be described as Reading\
    \ the command, Evaluating it, Printing the evaluated value and repeating (Loop)\
    \ the cycle – this is the origin of the REPL abbreviation.\n\nPython comes with\
    \ a basic terminal prompt; you may see examples from this with `>>>` marking the\
    \ input:\n\n```\n>>> 2 + 2\n4\n```\n\nWe are using a more powerful REPL interface,\
    \ the Jupyter Notebook. Blocks of code appear with an `In` prompt next to them:\n\
    \n```\n4 + 5\n```\n\n```\n9\n```\n\nTo edit the code, click inside the code area.\
    \ You should get a green border around it. To run it, press Shift-Enter.\n\n##\
    \ 2.2 Calculator\n\nBasic operations such as addition (+), subtraction (-), multiplication\
    \ (*), division (/) and exponentiation (**) work (mostly) as expected:\n\n```\n\
    10 + 10000\n```\n\n```\n10010\n```\n\n```\n42 - 1.5\n```\n\n```\n40.5\n```\n\n\
    ```\n47 * 11\n```\n\n```\n517\n```\n\n```\n10 / 0.5\n```\n\n```\n20.0\n```\n\n\
    ```\n2**2  # Exponentiation ('to the power of') is **, NOT ^\n```\n\n```\n4\n\
    ```\n\n```\n2**3\n```\n\n```\n8\n```\n\n```\n2**4\n```\n\n```\n16\n```\n\n```\n\
    2 + 2\n```\n\n```\n4\n```\n\n```\n# This is a comment\n2 + 2\n```\n\n```\n4\n\
    ```\n\n```\n2 + 2  # and a comment on the same line as code\n```\n\n```\n4\n```\n\
    \nand, using the fact that $\\sqrt[n]{x} = x^{1/n}$, we can compute the $\\sqrt{3}\
    \ = 1.732050 \\dots$ using **:\n\n```\n3**0.5\n```\n\n```\n1.7320508075688772\n\
    ```\n\nParenthesis can be used for grouping:\n\n```\n2 * 10 + 5\n```\n\n```\n\
    25\n```\n\n```\n2 * (10 + 5)\n```\n\n```\n30\n```\n\n## 2.3 Integer division\n\
    \nIn Python 3, division works as you'd expect:\n\n```\n15/6\n```\n\n```\n2.5\n\
    ```\n\nIn Python 2, however, 15/6 will give you 2.\n\nThis phenomenon is known\
    \ (in many programming languages, including C) as *integer division*: because\
    \ we provide two integer numbers (15 and 6) to the division operator (/), the\
    \ assumption is that we seek a return value of type integer. The mathematically\
    \ correct answer is (the floating point number) 2.5. (→ numerical data types in\
    \ *Chapter 13*.)\n\nThe convention for integer division is to truncate the fractional\
    \ digits and to return the integer part only (i.e. 2 in this example). It is also\
    \ called \"floor division\".\n\n### 2.3.1 How to avoid integer division\n\nThere\
    \ are two ways to avoid the problem of integer division:\n\n- 1. Use Python 3\
    \ style division: this is available even in Python 2 with a special import statement:\n\
    \n```\n>>> from __future__ import division\n>>> 15/6\n2.5\n```\n\nIf you want\
    \ to use the `from __future__ import division` feature in a python program, it\
    \ would normally be included at the beginning of the file.\n\n- 2. Alternatively,\
    \ if we ensure that at least one number (numerator or denominator) is of type\
    \ float (or complex), the division operator will return a floating point number.\
    \ This can be done by writing 15. instead of 15, of by forcing conversion of the\
    \ number to a float, i.e. use float(15) instead of 15:\n\n```\n>>> 15./6\n2.5\n\
    >>> float(15)/6\n2.5\n>>> 15/6.\n2.5\n>>> 15/float(6)\n2.5\n>>> 15./6.\n2.5\n\
    ```\n\nIf we really want integer division, we can use `//`: `1//2` returns 0,\
    \ in both Python 2 and 3.\n\n### 2.3.2 Why should I care about this division problem?\n\
    \nInteger division can result in surprising bugs: suppose you are writing code\
    \ to compute the mean value $m = (x + y)/2$ of two numbers $x$ and $y$. The first\
    \ attempt of writing this may read:\n\n```\nm = (x + y) / 2\n```\n\nSuppose this\
    \ is tested with $x = 0.5$, $y = 0.5$, then the line above computes the correct\
    \ answers $m = 0.5$ (because $0.5 + 0.5 = 1.0$, i.e. a 1.0 is a floating point\
    \ number, and thus $1.0/2$ evaluates to $0.5$). Or we could use $x = 10$, $y =\
    \ 30$, and because $10 + 30 = 40$ and $40/2$ evaluates to 20, we get the correct\
    \ answer $m = 20$. However, if the integers $x = 0$ and $y = 1$ would come up,\
    \ then the code returns $m = 0$ (because $0 + 1 = 1$ and $1/2$ evaluates to 0)\
    \ whereas $m = 0.5$ would have been the right answer.\n\nWe have many possibilities\
    \ to change the line of code above to work safely, including these three versions:\n\
    \n```\nm = (x + y) / 2.0\n\nm = float(x + y) / 2\n\nm = (x + y) * 0.5\n```\n\n\
    This integer division behaviour is common amongst most programming languages (including\
    \ the important ones C, C++ and Fortran), and it is important to be aware of the\
    \ issue.\n\n## 2.4 Mathematical functions\n\nBecause Python is a general purpose\
    \ programming language, commonly used mathematical functions such as sin, cos,\
    \ exp, log and many others are located in the mathematics module with name `math`.\
    \ We can make use of this as soon as we *import* the math module:\n\n```\nimport\
    \ math\nmath.exp(1.0)\n```\n\n```\n2.718281828459045\n```\n\nUsing the `dir` function,\
    \ we can see the directory of objects available in the math module:\n\n```\n#\
    \ NBVAL_IGNORE_OUTPUT\ndir(math)\n```\n\n```\n['__doc__',\n '__loader__',\n '__name__',\n\
    ```"
  mdcn: "## 面向计算科学与工程的Python入门\n\n然而，目前仍有大量为Python 2编写的代码在使用中，了解它们之间的差异很有用。最突出的例子是，在Python\
