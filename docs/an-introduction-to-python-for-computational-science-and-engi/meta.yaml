    # 18.3.11 Deleting a virtual enviroment


    To completely remove the virtual environment, we can delete the subfolder in which
    it was installed:


    ```

    !rm -rf myvirtualenv

    ```


    # 18.3.12 Further reading


    +   - Installing Python packages: https://packaging.python.org/en/latest/tutorials/installing-packages

    - venv module documentation: https://docs.python.org/3/library/venv.html


    # 18.4 Anaconda


    # 18.4.1 Introduction


    The Anaconda software distribution brings its own packaging, which is controlled
    through the `conda` command.


    Anaconda is well known as a Python distribution, but is in no way limited to Python
    packages: it is a generic package manager. Together with the community-run `conda-forge`
    project, there is a multitude of packages available. A particular bonus of the
    the conda packages is that they can be provided for the three major operating
    systems is use (Linux, OSX, Windows).


    Conda provides **conda packages** for some Python packages that are available
    from the Python Package Index (PyPI). One thus needs to ask: should I install
    a package using the conda command (`conda install spyder`) or through pip (`pip
    install spyder`). See below for the answer.


    `conda` provides its own **(conda) environments** (see https://docs.conda.io/projects/conda/en/latest/user-guide/tasks/manage-environments.html).
    They show many similarities with our (basic) discussion of (Python) virtual environments.
    We have no space to discuss the conda environments further here.


    The following comments are meant to be helpful for those who have installed their
    Python interpreter through anaconda. If you are not using Anaconda, you can ignore
    this section.'
  merge: -1
  pgno: 256
- img_proc: true
  md: "# 18.4.2 Can I use Python virtual environments when using the anaconda distribution?\n\
    \nThis can be done and is a good way to create virtual environments. (All the\
    \ examples above in this chapter use the Python3 interpreter from an anaconda\
    \ installation on an OSX system).\n\n# 18.4.3 Should I install a python package\
    \ through conda or pip?\n\nThe typical scenario is that one installs Anaconda,\
    \ and most Python packages needed are available: somewhat standard tools such\
    \ as `numpy`, `scipy`, `matplotlib`, `pandas`, `jupyter`, `ipython` and `spyder`\
    \ already come with the anaconda distribution. Then some package is missing that\
    \ needs to be installed additionally.\n\nFor example, the package `xarray`: this\
    \ can be installed through conda or through pip.\n\nExperience-based rough guidance\
    \ is as follows if working within an anaconda installation of Python:\n\n+   -\
    \ avoid mixing `pip` installs with `conda` installs\n- if `conda` can install\
    \ the required packages, then use that\n- if `conda` cannot install the required\
    \ packages, we have to use `pip`. In that case:\n    - install the requirements\
    \ that need to come from `conda` (if any)\n    - then install the desired packages\
    \ through `pip`\n    - after having used `pip`, do not use `conda` again to install\
    \ more packages.\n\nThe reason for this is that `conda` and `pip` cannot interact\
    \ perfectly, and so the changes that one package manager made, maybe overridden\
    \ or accidentally repeated slightly differently by the other one.\n\nA more detailed\
    \ discussion is available on the [Anaconda blog](https://www.anaconda.com/blog).\n\
    \n# 18.4.4 Can I create a conda environment, and then create python virtual environments\
    \ from this?\n\nYes.\n\nThis is also an option to install different Python versions.\n\
    \nFor example: create a conda (!) environment providing Python 3.8:\n\n```\nconda\
    \ create -y -n python38 python=3.8\n```\n\nThen\n\n```\nconda activate python38\n\
    ```\n\nand then create a virtual environment using\n\n```\npython -m venv myvirtualenv38\n\
    ```"
  merge: -1
  pgno: 257
- img_proc: true
  md: '# 18.5 Managing many different environments - pyenv


    If you use many different python environments, possibly with different interpreter
    versions, you may want to learn about pyenv (home page at https://github.com/pyenv/pyenv).


    Pyenv can install a multitude of python interpreters, create virtual environments
    for each of those. It is further possible to define an a *per-directory* basis
    which environment should be used in that directory. This is convenient when using
    different environments for different projects, as one does not need to manually
    activate the virtual environments.


    **Tidy up:** remove files created in this section


    ```

    !rm -rf /tmp/cowsay-python

    !rm -rf myvirtualenv-copy

    !rm -f requirements.txt

    ```'
