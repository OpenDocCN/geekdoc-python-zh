  md: "+2147483647 as shown above for 4 bytes, and +9223372036854775807 as the maximum\
    \ integer for 8 bytes (that’s ≈9.2 · 1018).\n\n# Limitations of floats\n\nThe\
    \ floating point numbers in a computer are not the same as the mathematical floating\
    \ point numbers. (This is exactly the same as the (mathematical) integer numbers\
    \ not being the same as the integer numbers in a computer: only a subset of the\
    \ infinite set of integer numbers can be represented by the int data type as shown\
    \ in Numbers and numbers). So how are floating point numbers represented in the\
    \ computer?\n\n+   - Any real number $x$ can be written as $x = a \\cdot 10b$\
    \ where $a$ is the mantissa and $b$ the exponent.\n- Examples:\n\n| x | a | b\
    \ |\n|---|---|---|\n| 123.45 = 1.23456 · 102 | 1.23456 | 2 |\n| 1000000 = 1.0\
    \ · 106 | 1.00000 | 6 |\n| 0.0000024 = 2.4 · 10-6 | 2.40000 | -6 |\n\n+   - Therefore,\
    \ we can use 2 integers to encode one floating point number!\n  $x = a \\cdot\
    \ 10b$\n- Following (roughly) the IEEE-754 standard, one uses 8 bytes for one\
    \ float $x$: these 64 bits are split as\n  - 10 bit for the exponent $b$ and\n\
    \  - 54 bit for the mantissa $a$.\n\nThis results in\n\n+   - largest possible\
    \ float ≈10308 (quality measure for $b$)\n- smallest possible (positive) float\
    \ ≈10–308 (quality measure for $b$)\n- distance between 1.0 and next larger number\
    \ ≈10–16 (quality measure for $a$)\n\nNote that this is in principle how floating\
    \ point numbers are stored (it is actually a bit more complicated).\n\n# Limitations\
    \ of complex numbers\n\nThe complex number type has essentially the same limitations\
    \ as the float data type (see limitations of floats) because a complex number\
    \ consists of two floats: one represents the real part, the other one the imaginary\
    \ part.\n\n# ...are these number types of practical value?\n\nIn practice, we\
    \ do not usually find numbers in our daily life that exceed 10300 (this is a number\
    \ with 300 zeros!), and therefore the floating point numbers cover the range of\
    \ numbers we usually need.\n\nHowever, be warned that in scientific computation\
    \ small and large numbers are used which may (often in intermediate results) exceed\
    \ the range of floating point numbers.\n\n+   - Imagine for example, that we have\
    \ to take the fourth power of the constant $h = 1.0545716 \\cdot 10^{-34}kgm^2/s$:\n\
    - $h^4 = 1.2368136958909421 \\cdot 10^{-136}k^4g^4m^8/s^4$ which is “halfway”\
    \ to our representable smallest positive float of the order of $10^{-308}$."
