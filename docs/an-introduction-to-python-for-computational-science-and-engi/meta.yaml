  md: "# CHAPTER EIGHT\n\n# FUNCTIONAL TOOLS\n\nPython provides a few in-built commands\
    \ such as `map`, `filter`, `reduce` as well `lambda` (to create anonymous functions)\
    \ and list comprehension. These are typical commands from functional languages\
    \ of which LISP is probably best known.\n\nFunctional programming can be extremely\
    \ powerful and one of the strengths of Python is that it allows to program using\
    \ (i) imperative/procedural programming style, (ii) object oriented style and\
    \ (iii) functional style. It is the programmers choice which tools to select from\
    \ which style and how to mix them to best address a given problem.\n\nIn this\
    \ chapter, we provide some examples for usage of the commands listed above.\n\n\
    # 8.1 Anonymous functions\n\nAll functions we have seen in Python so far have\
    \ been defined through the `def` keyword, for example:\n\n```\ndef f(x):\n   \
    \ return x ** 2\n```\n\nThis function has the name `f`. Once the function is defined\
    \ (i.e. the Python interpreter has come across the `def` line), we can call the\
    \ function using its name, for example\n\n```\ny = f(6)\n```\n\nSometimes, we\
    \ need to define a function that is only used once, or we want to create a function\
    \ but don't need a name for it (as for creating closures). In this case, this\
    \ is called *anonymous* function as it does not have a name. In Python, the `lambda`\
    \ keyword can create an anonymous function.\n\nWe create a (named) function first,\
    \ check it's type and behaviour:\n\n```\ndef f(x):\n    return x ** 2\n\nf\n\n\
    <function __main__.f(x)>\n\ntype(f)\n\nfunction\n```"
