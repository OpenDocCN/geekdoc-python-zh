  md: "# 17.7 Data Frame\n\n# 17.7.1 Stock Example - DataFrame\n\nAfter having introduced\
    \ the `Series` object above, we will focus on the second important type in pandas:\
    \ the `DataFrame`.\n\nAs a first description, we could say that the `DataFrame`\
    \ is similar to a (2d) spreadsheet: it contains rows and columns.\n\nThe series\
    \ object we have studied above is a special case of the `DataFrame`, where the\
    \ `DataFrame` has only one column.\n\nWe'll continue with our stock example:\n\
    \n```\nstock\n\napple        10\norange        3\nbanana       22\ncucumber  \
    \    1\npotato      110\ndtype: int64\n```\n\nIn addition to tracking how many\
    \ objects of each type we have stocked, we have a second Series object that provides\
    \ the price per item at which the item is sold:\n\n```\nprice = pd.Series({'apple':\
    \ 0.55, 'banana': 0.50, 'cucumber' : 0.99, 'potato' : 0.17,\n                \
    \   'orange': 1.76})\nprice\n\napple        0.55\nbanana       0.50\ncucumber\
    \     0.99\npotato       0.17\norange       1.76\ndtype: float64\n```\n\nThe `DataFrame`\
    \ object allows us to treat the two series together. In fact, a convenient way\
    \ to create the `DataFrame` object is to combine a number of series as follows:\n\
    \n```\nshop = pd.DataFrame({'stock' : stock, 'price' : price})\nshop\n\n     \
    \       stock  price\napple        10   0.55\nbanana       22   0.50\ncucumber\
    \      1   0.99\norange        3   1.76\npotato      110   0.17\n```\n\nBecause\
    \ both `Series` objects had the same `index` elements, our data is nicely aligned\
    \ in the `DataFrame` with name `shop`, even though the data was stored in different\
    \ order in the `price` and `stock`.\n\nIf one Series is missing a data point,\
    \ pandas will insert a `NaN` entry into that field:"
