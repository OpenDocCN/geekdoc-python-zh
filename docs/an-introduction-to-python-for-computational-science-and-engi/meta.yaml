  md: '1. Evaluate the value on the right hand side of the equal sign

    2. Assign this value to the variable name shown on the left hand side. (In Python:
    bind the name on the left hand side to the object shown on the right hand side.)


    Some computer science literature uses the following notation to express assignments
    and to avoid the confusion with mathematical equations:


    $x \leftarrow x + 1$


    Let''s apply our two-step rule to the assignment x = x + 1 given above:


    +   1. Evaluate the value on the right hand side of the equal sign: for this we
    need to know what the current value of x is. Let''s assume x is currently 4. In
    that case, the right hand side x+1 evaluates to 5.

    2. Assign this value (i.e. 5) to the variable name shown on the left hand side
    x.


    Let''s confirm with the Python prompt that this is the correct interpretation:


    ```

    x = 4

    x = x + 1

    x

    ```


    ```

    5

    ```


    # 2.6.1 The += notation


    Because it is a quite a common operation to increase a variable x by some fixed
    amount c, we can write


    ```

    x += c

    ```


    instead of


    ```

    x = x + c

    ```


    Our initial example above could thus have been written


    ```

    x = 4

    x += 1

    x

    ```


    ```

    5

    ```


    The same operators are defined for multiplication with a constant (*=), subtraction
    of a constant (-=) and division by a constant (/=).


