  md: "# 7.5.3 Use of __name__\n\nIn summary,\n\n+   - `__name__` is `__main__` if\
    \ the module file is run on its own\n- `__name__` is the name of the module (i.e.\
    \ the module filename without the `.py` suffix) if the module file is imported.\n\
    \nWe can therefor use the following `if` statement in `module1.py` to write code\
    \ that is *only run* when the module is executed on its own: This is useful to\
    \ keep test programs or demonstrations of the abilities of a module in this “conditional”\
    \ main program. It is common practice for any module files to have such a conditional\
    \ main program which demonstrates its capabilities.\n\n# 7.5.4 Example 1\n\nThe\
    \ next example shows a main program for the another file `vectools.py` that is\
    \ used to demonstrate the capabilities of the functions defined in that file:\n\
    \n```\n%%file vectools.py\nfrom __future__ import division\nimport math\n\nimport\
    \ numpy as N\n\ndef norm(x):\n    \"\"\"returns the magnitude of a vector x\"\"\
    \"\n    return math.sqrt(sum(x ** 2))\n\ndef unitvector(x):\n    \"\"\"returns\
    \ a unit vector x/|x|. x needs to be a numpy array.\"\"\"\n    xnorm = norm(x)\n\
    \    if xnorm == 0:\n        raise ValueError(\"Can't normalise vector with length\
    \ 0\")\n    return x / norm(x)\n\nif __name__ == \"__main__\":\n    # a little\
    \ demo of how the functions in this module can be used:\n    x1 = N.array([0,\
    \ 1, 2])\n    print(\"The norm of \" + str(x1) + \" is \" + str(norm(x1)) + \"\
    .\")\n    print(\"The unitvector in direction of \" + str(x1) + \" is \" \\n \
    \       + str(unitvector(x1)) + \".\")\n```\n\nWriting vectools.py\n\nIf this\
    \ file is executed using `python vectools.py`, then `__name__ == __main__` is\
    \ true, and the output reads\n\n```\n!python3 vectools.py\n```\n\n```\nThe norm\
    \ of [0 1 2] is 2.23606797749979.\nThe unitvector in direction of [0 1 2] is [0.\
    \         0.4472136  0.89442719].\n```"
