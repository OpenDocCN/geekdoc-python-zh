    # 5.1.6 Changes from Python 2 to Python 3: print


    One (maybe the most obvious) change going from Python 2 to Python 3 is that the
    `print` command loses its special status. In Python 2, we could print “Hello World”
    using:


    ```

    print "Hello world"  # valid in Python 2.x

    ```


    Effectively, we call the function `print` with the argument `Hello World`. All
    other functions in Python are called such that the argument is enclosed in parentheses,
    i.e.


    ```

    print("Hello World")  # valid in Python 3.x

    ```


    ```

    Hello World

    ```


    This is the new convention *required* in Python 3 (and *allowed* for recent version
    of Python 2.x.)

    Everything we have learned about formatting strings using the percentage operator
    still works the same way:


    ```

    import math

    a = math.pi

    "my pi = %f" % a  # string formatting

    ```


    ```

    ''my pi = 3.141593''

    ```'
