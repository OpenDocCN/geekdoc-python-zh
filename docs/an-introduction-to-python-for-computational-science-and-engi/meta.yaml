    ## 12.1.8 Linear equations and matrix inversion\n\nSymPy has a `Matrix` class\
    \ and associated functions that allow the symbolic solution of systems of linear\
    \ equations (and, of course, we can obtain numerical answers with `subs()` and\
    \ `evalf()`). We shall consider the example of the following simple pair of linear\
    \ equations:\n\n$$3x + 7y = 12z$$\n$$4x - 2y = 5z$$\n\nWe may write this system\
    \ in the form $A\\vec{x} = \\vec{b}$ (multiply $A$ by $\\vec{x}$ if you want to\
    \ verify that we recover the original equations), where\n\n$$A = \\begin{pmatrix}\
    \ 3 & 7 \\\\ 4 & -2 \\end{pmatrix}, \\quad \\vec{x} = \\begin{pmatrix} x \\\\\
    \ y \\end{pmatrix}, \\quad \\vec{b} = \\begin{pmatrix} 12z \\\\ 5z \\end{pmatrix}.$$\n\
    \nHere we included a symbol, $z$, on the right-hand side to demonstrate that symbols\
    \ will be propagated into the solution. In many cases we would have $z = 1$, but\
    \ there may still be benefit to using SymPy over a numerical solver even when\
    \ the solution contains no symbols because of its ability to return exact fractions\
    \ rather than approximate `float`s.\n\nOne strategy to solve for $\\vec{x}$ is\
    \ to invert the matrix $A$ and pre-multiply, i.e. $A^{-1}A\\vec{x} = \\vec{x}\
    \ = A^{-1}\\vec{b}$. SymPy's `Matrix` class has an `inv()` method that allows\
    \ us to find the inverse, and `*` performs matrix multiplication for us, when\
    \ appropriate:\n\npython\nfrom sympy import symbols, Matrix\nx, y, z = symbols('x,y,z')\n\
    A = Matrix(([3, 7], [4, -2]))\nA\n\n$$\\begin{bmatrix} 3 & 7 \\\\ 4 & -2 \\end{bmatrix}$$\n\
    \npython\nA.inv()\n\n$$\\begin{bmatrix} \\frac{1}{17} & \\frac{7}{34} \\\\ \\\
    frac{2}{17} & -\\frac{3}{34} \\end{bmatrix}$$\n\npython\nb = Matrix(( 12*z, 5*z\
    \ ))\nb\n\n$$\\begin{bmatrix} 12z \\\\ 5z \\end{bmatrix}$$\n\npython\nx = A.inv()*b\n\
    x\n\n$$\\begin{bmatrix} \\frac{59z}{34} \\\\ \\frac{33z}{34} \\end{bmatrix}$$"
