    \ 上阅读更多关于NBVAL的信息。）\n\n关于Jupyter和其他Python接口的更多信息，请参见*第11章*。\n\n## 1.5 你的反馈\n\n\
    我们非常期待。如果你在本文中发现任何错误，或者有关于如何修改或扩展它的建议，请随时通过 `hans.fangohr@xfel.eu` 联系Hans。\n\n\
    如果你发现任何无法工作（或指向错误材料）的URL，也请告知Hans。由于互联网内容变化迅速，没有反馈很难跟上这些变化。\n\n# 第二章\n\n# 一个强大的计算器\n\
    \n## 2.1 Python提示符与读取-求值-打印循环（REPL）\n\nPython是一种*解释型*语言。我们可以将一系列命令收集到文本文件中，并将其保存为*Python程序*。惯例是这些文件使用文件扩展名\"\
    .py\"，例如`hello.py`。\n\n我们也可以在Python提示符下输入单个命令，这些命令会立即被Python解释器求值并执行。这对于程序员/学习者理解如何使用某些命令非常有用（通常是在将这些命令组合成更长的Python程序之前）。Python的角色可以描述为：读取命令、求值、打印求值后的值并重复（循环）这个过程——这就是REPL缩写的由来。\n\
    \nPython自带一个基本的终端提示符；你可能会看到以`>>>`标记输入的示例：\n\n```\n>>> 2 + 2\n4\n```\n\n我们使用一个更强大的REPL接口，即Jupyter\
    \ Notebook。代码块旁边会出现带有`In`提示符的块：\n\n```\n4 + 5\n```\n\n```\n9\n```\n\n要编辑代码，请点击代码区域内部。你应该会看到它周围出现绿色边框。要运行它，请按Shift-Enter。\n\
    \n## 2.2 计算器\n\n基本操作，如加法（+）、减法（-）、乘法（*）、除法（/）和幂运算（**）的（大部分）工作方式符合预期：\n\n```\n\
    10 + 10000\n```\n\n```\n10010\n```\n\n```\n42 - 1.5\n```\n\n```\n40.5\n```\n\n\
    ```\n47 * 11\n```\n\n```\n517\n```\n\n```\n10 / 0.5\n```\n\n```\n20.0\n```\n\n\
    ```\n2**2  # 幂运算（'求幂'）是 **，不是 ^\n```\n\n```\n4\n```\n\n```\n2**3\n```\n\n```\n\
    8\n```\n\n```\n2**4\n```\n\n```\n16\n```\n\n```\n2 + 2\n```\n\n```\n4\n```\n\n\
    ```\n# 这是一个注释\n2 + 2\n```\n\n```\n4\n```\n\n```\n2 + 2  # 以及与代码在同一行的注释\n```\n\n\
    ```\n4\n```\n\n并且，利用 $\\sqrt[n]{x} = x^{1/n}$ 这一事实，我们可以使用 ** 来计算 $\\sqrt{3} =\
    \ 1.732050 \\dots$：\n\n```\n3**0.5\n```\n\n```\n1.7320508075688772\n```\n\n括号可用于分组：\n\
    \n```\n2 * 10 + 5\n```\n\n```\n25\n```\n\n```\n2 * (10 + 5)\n```\n\n```\n30\n\
    ```\n\n## 2.3 整数除法\n\n在Python 3中，除法的工作方式符合你的预期：\n\n```\n15/6\n```\n\n```\n2.5\n\
    ```\n\n然而，在Python 2中，15/6会给你2。\n\n这种现象在许多编程语言（包括C）中被称为*整数除法*：因为我们向除法运算符（/）提供了两个整数（15和6），所以假设我们寻求一个整数类型的返回值。数学上正确的答案是（浮点数）2.5。（→\
    \ *第13章*中的数值数据类型。）\n\n整数除法的惯例是截断小数部分，只返回整数部分（即本例中的2）。它也被称为“向下取整除法”。\n\n### 2.3.1\
    \ 如何避免整数除法\n\n有两种方法可以避免整数除法的问题：\n\n- 1. 使用Python 3风格的除法：即使在Python 2中，通过特殊的导入语句也可以使用：\n\
    \n```\n>>> from __future__ import division\n>>> 15/6\n2.5\n```\n\n如果你想在python程序中使用`from\
    \ __future__ import division`特性，通常应将其包含在文件的开头。\n\n- 2. 或者，如果我们确保至少一个数字（分子或分母）是浮点数（或复数）类型，除法运算符将返回一个浮点数。这可以通过写15.而不是15，或者强制将数字转换为浮点数来实现，即使用float(15)而不是15：\n\
    \n```\n>>> 15./6\n2.5\n>>> float(15)/6\n2.5\n>>> 15/6.\n2.5\n>>> 15/float(6)\n\
    2.5\n>>> 15./6.\n2.5\n```\n\n如果我们确实想要整数除法，可以使用`//`：`1//2`在Python 2和3中都返回0。\n\n\
    ### 2.3.2 为什么我应该关心这个除法问题？\n\n整数除法可能导致令人惊讶的错误：假设你正在编写代码来计算两个数 $x$ 和 $y$ 的平均值 $m\
    \ = (x + y)/2$。第一次尝试编写可能是：\n\n```\nm = (x + y) / 2\n```\n\n假设用 $x = 0.5$, $y =\
    \ 0.5$ 测试，那么上面这行计算出正确的答案 $m = 0.5$（因为 $0.5 + 0.5 = 1.0$，即1.0是一个浮点数，因此 $1.0/2$\
    \ 的结果是 $0.5$）。或者我们可以使用 $x = 10$, $y = 30$，因为 $10 + 30 = 40$ 且 $40/2$ 的结果是20，我们得到正确的答案\
    \ $m = 20$。然而，如果出现整数 $x = 0$ 和 $y = 1$，那么代码返回 $m = 0$（因为 $0 + 1 = 1$ 且 $1/2$ 的结果是0），而正确的答案应该是\
    \ $m = 0.5$。\n\n我们有很多方法可以修改上面这行代码使其安全工作，包括以下三个版本：\n\n```\nm = (x + y) / 2.0\n\n\
    m = float(x + y) / 2\n\nm = (x + y) * 0.5\n```\n\n这种整数除法行为在大多数编程语言（包括重要的C、C++和Fortran）中都很常见，了解这个问题很重要。\n\
    \n## 2.4 数学函数\n\n因为Python是一种通用编程语言，常用的数学函数如sin、cos、exp、log等位于名为`math`的数学模块中。一旦我们*导入*math模块，就可以使用它们：\n\
    \n```\nimport math\nmath.exp(1.0)\n```\n\n```\n2.718281828459045\n```\n\n使用`dir`函数，我们可以查看math模块中可用对象的目录：\n\
    \n```\n# NBVAL_IGNORE_OUTPUT\ndir(math)\n```\n\n```\n['__doc__',\n '__loader__',\n\
    \ '__name__',\n```"
