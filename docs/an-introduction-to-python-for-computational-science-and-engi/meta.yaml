    # 3.5 Equality and Identity/Sameness


    A related question concerns the equality of objects.


    # 3.5.1 Equality


    The operators <, >, ==, >=, <=, and != compare the *values* of two objects. The
    objects need not have the same type. For example:


    ```

    a = 1.0; b = 1

    type(a)

    ```


    ```

    float

    ```


    ```

    type(b)

    ```


    ```

    int

    ```


    ```

    a == b

    ```


    ```

    True

    ```


    So the == operator checks whether the values of two objects are equal.


    # 3.5.2 Identity / Sameness


    To see check whether two objects `a` and `b` are the same (i.e. `a` and `b` are
    references to the same place in memory), we can use the `is` operator (continued
    from example above):


    ```

    a is b

    ```


    ```

    False

    ```


    Of course they are different here, as they are not of the same type.

    We can also ask the `id` function which, according to the documentation string
    in Python 2.7 “*Returns the identity of an object. This is guaranteed to be unique
    among simultaneously existing objects. (Hint: it’s the object’s memory address.)*”


    ```

    # NBVAL_IGNORE_OUTPUT

    id(a)

    ```


    ```

    140295189540816

    ```


    ```

    # NBVAL_IGNORE_OUTPUT

    id(b)

    ```'
