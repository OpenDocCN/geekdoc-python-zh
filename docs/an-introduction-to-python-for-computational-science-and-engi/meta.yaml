    bounded and determined solely by the solver.


    rtol, atol : float or array_like, optional

    Relative and absolute tolerances. The solver keeps the local error estimates less
    than ``atol + rtol * abs(y)``. Here `rtol` controls a relative accuracy (number
    of correct digits). But if a component of `y` is approximately below `atol`, the
    error only needs to fall within the same `atol` threshold, and the number of correct
    digits is not guaranteed. If components of y have different scales, it might be
    beneficial to set different `atol` values for different components by passing
    array_like with shape (n,) for `atol`. Default values are 1e-3 for `rtol` and
    1e-6 for `atol`.


    jac : array_like, sparse_matrix, callable or None, optional

    Jacobian matrix of the right-hand side of the system with respect to y, required
    by the ''Radau'', ''BDF'' and ''LSODA'' method. The Jacobian matrix has shape
    (n, n) and its element (i, j) is equal to ``d f_i / d y_j``. There are three ways
    to define the Jacobian:


    +   * If array_like or sparse_matrix, the Jacobian is assumed to be constant.
    Not supported by ''LSODA''.

    * If callable, the Jacobian is assumed to depend on both t and y; it will be called
    as ``jac(t, y)``, as necessary. For ''Radau'' and ''BDF'' methods, the return
    value might be a sparse matrix.

    * If None (default), the Jacobian will be approximated by finite differences.


    It is generally recommended to provide the Jacobian rather than relying on a finite-difference
    approximation.


    jac_sparsity : array_like, sparse matrix or None, optional

    Defines a sparsity structure of the Jacobian matrix for a finite-difference approximation.
    Its shape must be (n, n). This argument is ignored if `jac` is not `None`. If
    the Jacobian has only few non-zero elements in *each* row, providing the sparsity
    structure will greatly speed up the computations [10]_. A zero entry means that
    a corresponding element in the Jacobian is always zero. If None (default), the
    Jacobian is assumed to be dense.

    Not supported by ''LSODA'', see `lband` and `uband` instead.


    lband, uband : int or None, optional

    Parameters defining the bandwidth of the Jacobian for the ''LSODA'' method, i.e.,
    ``jac[i, j] != 0 only for i - lband <= j <= i + uband``. Default is None. Setting
    these requires your jac routine to return the Jacobian in the packed format: the
    returned array must have ``n`` columns and ``uband + lband + 1`` rows in which
    Jacobian diagonals are written. Specifically ``jac_packed[uband + i - j , j] =
    jac[i, j]``. The same format is used in `scipy.linalg.solve_banded` (check for
    an illustration). These parameters can be also used with ``jac=None`` to reduce
    the number of Jacobian elements estimated by finite differences.


    min_step : float, optional

