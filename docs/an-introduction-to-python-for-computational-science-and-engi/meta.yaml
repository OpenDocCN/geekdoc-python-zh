    \ reference\n\nCalling a function by reference, on the other hand, means that\
    \ the object given to a function is a reference to the object. This means that\
    \ the function will see the same object as in the calling code (because they are\
    \ referencing the same object: we can think of the reference as a pointer to the\
    \ place in memory where the object is located). Any changes acting on the object\
    \ inside the function, will then be visible in the object at the calling level\
    \ (because the function does actually operate on the same object, not a copy of\
    \ it).\n\nHere is one example showing this using pointers in C:\n\n```\n#include\
    \ <stdio.h>\n\nvoid pass_by_reference(int *m) {\n    printf(\"in pass_by_reference:\
    \ received m=%d\\n\",*m);\n    *m=42;\n    printf(\"in pass_by_reference: changed\
    \ to m=%d\\n\",*m);\n}\n\nint main(void) {\n    int global_m = 1;\n    printf(\"\
    global_m=%d\\n\",global_m);\n    pass_by_reference(&global_m);\n    printf(\"\
    global_m=%d\\n\",global_m);\n    return 0;\n}\n```\n\ntogether with the corresponding\
    \ output:\n\n```\nglobal_m=1\nin pass_by_reference: received m=1\nin pass_by_reference:\
