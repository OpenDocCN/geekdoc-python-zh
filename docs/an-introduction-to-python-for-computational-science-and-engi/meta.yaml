- md: "## 16.5 Root finding\n\nIf you try to find a $x$ such that $f(x) = 0$ then\
    \ this is called *root finding*. Note that problems like $g(x)=h(x)$ fall in this\
    \ category as you can rewrite them as $f(x)=g(x)-h(x)=0$.\n\nA number of root\
    \ finding tools are available in `scipy`'s `optimize` module.\n\n### 16.5.1 Root\
    \ finding using the bisection method\n\nFirst we introduce the `bisect` algorithm\
    \ which is (i) robust and (ii) slow but conceptually very simple.\n\nSuppose we\
    \ need to compute the roots of $f(x)=x^3 - 2x^2$. This function has a (double)\
    \ root at $x = 0$ (this is trivial to see) and another root which is located between\
    \ $x = 1.5$ (where $f(1.5)= - 1.125$) and $x = 3$ (where $f(3)=9$). It is pretty\
    \ straightforward to see that this other root is located at $x = 2$. Here is a\
    \ program that determines this root numerically:\n\n```python\nfrom scipy.optimize\
    \ import bisect\n\ndef f(x):\n    \"\"\"returns f(x)=x^3-2x^2. Has roots at\n\
    \    x=0 (double root) and x=2\"\"\"\n    return x ** 3 - 2 * x ** 2\n\n# main\
    \ program starts here\nx = bisect(f, 1.5, 3, xtol=1e-6)\n\nprint(\"The root x\
    \ is approximately x=%14.12g,\\n\"\n      \"the error is less than 1e-6.\" % (x))\n\
    print(\"The exact error is %g.\" % (2 - x))\n```\n\n```\nThe root x is approximately\
    \ x= 2.00000023842,\nthe error is less than 1e-6.\nThe exact error is -2.38419e-07.\n\
    ```\n\nThe `bisect()` method takes three compulsory arguments: (i) the function\
    \ $f(x)$, (ii) a lower limit $a$ (for which we have chosen 1.5 in our example)\
    \ and (ii) an upper limit $b$ (for which we have chosen 3). The optional parameter\
    \ `xtol` determines the maximum error of the method.\n\nOne of the requirements\
    \ of the bisection method is that the interval $[a, b]$ has to be chosen such\
    \ that the function is either positive at $a$ and negative at $b$, or that the\
    \ function is negative at $a$ and positive at $b$. In other words: $a$ and $b$\
    \ have to enclose a root.\n\n### 16.5.2 Exercise: root finding using the bisect\
    \ method\n\n1. Write a program with name `sqrttwo.py` to determine an approximation\
    \ of $\\sqrt{2}$ by finding a root $x$ of the function $f(x) = 2 - x^2$ using\
    \ the bisection algorithm. Choose a tolerance for the approximation of the root\
    \ of $10^{-8}$.\n2. Document your choice of the initial bracket $[a, b]$ for the\
    \ root: which values have you chosen for $a$ and for $b$ and why?\n3. Study the\
    \ results:\n   - Which value for the root $x$ does the bisection algorithm return?\n\
    \   - Compute the value of `sqrt2` using `math.sqrt(2)` and compare this with\
    \ the approximation of the root. How big is the absolute error of $x$? How does\
    \ this compare with `xtol`?\n\n### 16.5.3 Root finding using the fsolve function\n\
    \nA (often) better (in the sense of “more efficient”) algorithm than the bisection\
    \ algorithm is implemented in the general purpose `fsolve()` function for root\
    \ finding of (multidimensional) functions. This algorithm needs only one starting\
    \ point close to the suspected location of the root (but is not guaranteed to\
    \ converge).\n\nHere is an example:\n\n```python\nfrom scipy.optimize import fsolve\n\
    \ndef f(x):\n    return x ** 3 - 2 * x ** 2\n\nx = fsolve(f, 3)           # one\
    \ root is at x=2.0\n\nprint(\"The root x is approximately x=%21.19g\" % x)\nprint(\"\
    The exact error is %g.\" % (2 - x))\n```\n\n```\nThe root x is approximately x=\
    \ 2.000000000000006661\nThe exact error is -6.66134e-15.\n```\n\nThe return value[6]\
    \ of `fsolve` is a numpy array of length $n$ for a root finding problem with $n$\
    \ variables. In the example above, we have $n = 1$.\n\n## 16.6 Interpolation\n\
    \nGiven a set of $N$ points $(x_i, y_i)$ with $i = 1, 2, ...N$, we sometimes need\
    \ a function $\\hat{f}(x)$ which returns $y_i = f(x_i)$ where $x == x_i$, and\
    \ which in addition provides some interpolation of the data $(x_i, y_i)$ for all\
    \ $x$.\n\nThe function `y0 = scipy.interpolate.interp1d(x,y,kind='nearest')` does\
    \ this interpolation based on splines of varying order. Note that the function\
    \ `interp1d` returns *a function* `y0` which will then interpolate the x-y data\
    \ for any given $x$ when called as `y0(x)`.\n\nThe code below demonstrates this,\
    \ and shows the different interpolation kinds.\n\n```python\nimport numpy as np\n\
    import scipy.interpolate\nimport pylab\n\ndef create_data(n):\n    \"\"\"Given\
    \ an integer n, returns n data points\n    x and values y as a numpy.array.\"\"\
    \"\n    xmax = 5.\n    x = np.linspace(0, xmax, n)\n    y = - x**2\n    #make\
    \ x-data somewhat irregular\n    y += 1.5 * np.random.normal(size=len(x))\n  \
    \  return x, y\n\n#main program\nn = 10\nx, y = create_data(n)\n\n#use finer and\
    \ regular mesh for plot\nxfine = np.linspace(0.1, 4.9, n * 100)\n#interpolate\
    \ with piecewise constant function (p=0)\ny0 = scipy.interpolate.interp1d(x, y,\
    \ kind='nearest')\n#interpolate with piecewise linear func (p=1)\ny1 = scipy.interpolate.interp1d(x,\
    \ y, kind='linear')\n#interpolate with piecewise constant func (p=2)\ny2 = scipy.interpolate.interp1d(x,\
    \ y, kind='quadratic')\n\npylab.plot(x, y, 'o', label='data point')\npylab.plot(xfine,\
    \ y0(xfine), label='nearest')\npylab.plot(xfine, y1(xfine), label='linear')\n\
    pylab.plot(xfine, y2(xfine), label='cubic')\npylab.legend()\npylab.xlabel('x')\n\
    ```\n\nText(0.5, 0, 'x')\n\n## 16.7 Curve fitting\n\nWe have already seen in *the\
    \ numpy chapter* that we can fit polynomial functions through a data set using\
    \ the `numpy.polyfit` function. Here, we introduce a more generic curve fitting\
    \ algorithm.\n\nScipy provides a somewhat generic function (based on the Levenburg-Marquardt\
    \ algorithm) through `scipy.optimize.curve_fit` to fit a given (Python) function\
    \ to a given data set. The assumption is that we have been given a set of data\
    \ with points $x_1, x_2, ...x_N$ and with corresponding function values $y_i$\
    \ and a dependence of $y_i$ on $x_i$ such that $y_i = f(x_i, \\vec{p})$. We want\
    \ to determine the parameter vector $\\vec{p} = (p_1, p_2, ..., p_k)$ so that\
    \ $r$, the sum of the residuals, is as small as possible:\n\n$$r = \\sum_{i=1}^{N}\
    \ (y_i - f(x_i, \\vec{p}))^2$$\n\nCurve fitting is of particular use if the data\
    \ is noisy: for a given $x_i$ and $y_i = f(x_i, \\vec{p})$ we have a (unknown)\
    \ error term $\\epsilon_i$ so that $y_i = f(x_i, \\vec{p}) + \\epsilon_i$.\n\n\
    We use the following example to clarify this: $f(x, \\vec{p}) = a \\exp(-bx) +\
    \ c$, i.e. $\\vec{p} = a, b, c$\n\n```python\n# NBVAL_IGNORE_OUTPUT\nimport numpy\
    \ as np\nfrom scipy.optimize import curve_fit\n\ndef f(x, a, b, c):\n    \"\"\"\
    Fit function y=f(x,p) with parameters p=(a,b,c). \"\"\"\n    return a * np.exp(-\
    \ b * x) + c\n\n#create fake data\nx = np.linspace(0, 4, 50)\ny = f(x, a=2.5,\
    \ b=1.3, c=0.5)\n#add noise\nyi = y + 0.2 * np.random.normal(size=len(x))\n\n\
    #call curve fit function\npopt, pcov = curve_fit(f, x, yi)\na, b, c = popt\nprint(\"\
    Optimal parameters are a=%g, b=%g, and c=%g\" % (a, b, c))\n\n#plotting\nimport\
    \ pylab\nyfitted = f(x, *popt)   # equivalent to f(x, popt[0], popt[1], popt[2])\n\
    pylab.plot(x, yi, 'o', label='data $y_i$')\npylab.plot(x, yfitted, '-', label='fit\
    \ $f(x_i)$')\npylab.xlabel('x')\npylab.legend()\n```\n\n```\nOptimal parameters\
    \ are a=2.61353, b=1.37987, and c=0.491754\n```\n\nNote that in the source code\
    \ above we define the fitting function $y = f(x)$ through Python code. We can\
    \ thus fit (nearly) arbitrary functions using the `curve_fit` method.\n\nThe `curve_fit`\
    \ function returns a tuple `popt`, `pcov`. The first entry `popt` contains a tuple\
    \ of the OPTimal Parameters (in the sense that these minimise equation ([eq:1])).\
    \ The second entry contains the covariance matrix for all parameters. The diagonals\
    \ provide the variance of the parameter estimations.\n\nFor the curve fitting\
    \ process to work, the Levenburg-Marquardt algorithm needs to start the fitting\
    \ process with initial guesses for the final parameters. If these are not specified\
    \ (as in the example above), the value “1.0” is used for the initial guess."
  mdcn: "## 16.5 求根\n\n如果你试图找到一个 $x$ 使得 $f(x) = 0$，那么这被称为*求根*。注意，像 $g(x)=h(x)$ 这样的问题也属于此类，因为你可以将它们重写为\
    \ $f(x)=g(x)-h(x)=0$。\n\n`scipy` 的 `optimize` 模块提供了多种求根工具。\n\n### 16.5.1 使用二分法求根\n\
    \n首先我们介绍 `bisect` 算法，它（i）稳健，（ii）虽然慢但概念上非常简单。\n\n假设我们需要计算 $f(x)=x^3 - 2x^2$ 的根。这个函数在\
    \ $x = 0$ 处有一个（双重）根（这很容易看出），另一个根位于 $x = 1.5$（此时 $f(1.5)= - 1.125$）和 $x = 3$（此时\
    \ $f(3)=9$）之间。很容易看出另一个根位于 $x = 2$。下面是一个数值确定该根的程序：\n\n```python\nfrom scipy.optimize\
    \ import bisect\n\ndef f(x):\n    \"\"\"returns f(x)=x^3-2x^2. Has roots at\n\
    \    x=0 (double root) and x=2\"\"\"\n    return x ** 3 - 2 * x ** 2\n\n# main\
    \ program starts here\nx = bisect(f, 1.5, 3, xtol=1e-6)\n\nprint(\"The root x\
    \ is approximately x=%14.12g,\\n\"\n      \"the error is less than 1e-6.\" % (x))\n\
    print(\"The exact error is %g.\" % (2 - x))\n```\n\n```\nThe root x is approximately\
    \ x= 2.00000023842,\nthe error is less than 1e-6.\nThe exact error is -2.38419e-07.\n\
    ```\n\n`bisect()` 方法有三个必需参数：（i）函数 $f(x)$，（ii）下限 $a$（在我们的例子中选择了 1.5），以及（iii）上限\
    \ $b$（在我们的例子中选择了 3）。可选参数 `xtol` 决定了该方法的最大误差。\n\n二分法的一个要求是区间 $[a, b]$ 必须选择使得函数在\
    \ $a$ 处为正且在 $b$ 处为负，或者函数在 $a$ 处为负且在 $b$ 处为正。换句话说：$a$ 和 $b$ 必须包含一个根。\n\n### 16.5.2\
    \ 练习：使用二分法求根\n\n1. 编写一个名为 `sqrttwo.py` 的程序，通过使用二分算法找到函数 $f(x) = 2 - x^2$ 的根 $x$\
    \ 来确定 $\\sqrt{2}$ 的近似值。选择根的近似容差为 $10^{-8}$。\n2. 记录你为根选择的初始区间 $[a, b]$：你为 $a$ 和\
    \ $b$ 选择了哪些值，为什么？\n3. 研究结果：\n   - 二分算法返回的根 $x$ 的值是多少？\n   - 使用 `math.sqrt(2)`\
    \ 计算 `sqrt2` 的值，并将其与根的近似值进行比较。$x$ 的绝对误差有多大？这与 `xtol` 相比如何？\n\n### 16.5.3 使用 fsolve\
    \ 函数求根\n\n一个（通常）比二分算法更好（在“更高效”的意义上）的算法实现在通用的 `fsolve()` 函数中，用于（多维）函数的求根。该算法只需要一个靠近疑似根位置的起始点（但不保证收敛）。\n\
    \n下面是一个例子：\n\n```python\nfrom scipy.optimize import fsolve\n\ndef f(x):\n    return\
    \ x ** 3 - 2 * x ** 2\n\nx = fsolve(f, 3)           # one root is at x=2.0\n\n\
    print(\"The root x is approximately x=%21.19g\" % x)\nprint(\"The exact error\
    \ is %g.\" % (2 - x))\n```\n\n```\nThe root x is approximately x= 2.000000000000006661\n\
    The exact error is -6.66134e-15.\n```\n\n`fsolve` 的返回值[6]是一个长度为 $n$ 的 numpy 数组，用于具有\
    \ $n$ 个变量的求根问题。在上面的例子中，我们有 $n = 1$。\n\n## 16.6 插值\n\n给定一组 $N$ 个点 $(x_i, y_i)$，其中\
    \ $i = 1, 2, ...N$，我们有时需要一个函数 $\\hat{f}(x)$，它在 $x == x_i$ 时返回 $y_i = f(x_i)$，并且此外还为所有\
    \ $x$ 提供数据 $(x_i, y_i)$ 的某种插值。\n\n函数 `y0 = scipy.interpolate.interp1d(x,y,kind='nearest')`\
    \ 基于不同阶的样条进行这种插值。注意，函数 `interp1d` 返回*一个函数* `y0`，当调用为 `y0(x)` 时，它将为任何给定的 $x$ 插值\
    \ x-y 数据。\n\n下面的代码演示了这一点，并展示了不同的插值类型。\n\n```python\nimport numpy as np\nimport\
