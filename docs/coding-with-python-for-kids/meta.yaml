    ## 第 10 章：Python 模块


    ### 在 Python 中使用模块


    “Python 模块”使你能够将程序的部分内容分割到不同的文件中，以便于维护和更好的性能。


    作为一个初学者，你开始在解释器上使用 Python；后来，当你需要编写更长的程序时，你开始编写脚本。随着你的程序规模变得更大，你可能需要将其分割成几个文件，以便于维护以及代码的可重用性。对此的解决方案是“Python
    模块”。你可以将最常用的功能定义在一个模块中，并在其他地方导入它，而不是将它们的定义复制到不同的项目中。一个模块可以被另一个程序引入以使用其功能——你也可以通过这种方式使用
    Python 标准库。


