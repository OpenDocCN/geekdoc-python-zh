    “[‘red’, ‘yellow’, ‘purple’, ‘green’]” as your list.

    You have successfully removed the item “blue” and replaced it with “yellow” at
    index position 1.


    In this case, “append” adds an item to the end of a list. It goes this way:


    ```

    color_list.append(‘white’)

    print(color_list)

    [‘red’, ‘yellow’, ‘purple’, ‘green’, ‘white’]

    ```


    To remove items from a list, use the “del” command (shorthand for delete).

    To remove the third item on your list, it goes:


    ```

    del color_list[2]

    print(color_list)

    [‘red’, ‘yellow’, ‘green’, ‘white’]

    ```


    We can also join lists by adding them just like adding numbers, using the plus
    symbol.


    If your first list includes numbers 1 to 3, and your second list includes random
    words, you can join them as one list. Here’s how:


    ```

    second_list=[‘buckle’, ‘my’, ‘shoes’]

    print(first_list + second_list)

    ```


    After hitting “Enter,” you get:


    [1, 2, 3, ‘buckle’, ‘my’, ‘shoes’]


