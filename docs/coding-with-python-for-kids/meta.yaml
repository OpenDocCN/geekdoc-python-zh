    We’ve already dealt with the “print()” function quite a bit, but let’s take some
    time to address it again here and learn a bit more about its advanced features.


    By now, you’ve gathered that it prints out whatever is in the parentheses of the
    function to the terminal. Besides, you’ve learned that you can format the printing
    of statements with either the modulus operator “%” or the format function “.format().”
    However, what should we do if we are in the process of printing a very long message?


    In order to prevent a long string from running across the screen, we can use triple
    quotes to surround our string. Printing with triple quotes allows us to separate
    our print statements onto multiple lines. For example, we could print like this:


    ```

    print("""By using triple quotes we can

    divide our print statement into multiple

    lines, making it easier to read.""")

    ```


    Formatting the print statement like that will give us:


    By using triple quotes we can

    divide our print statement into multiple

    lines, making it easier to read.


    What if we need to print characters that are equivalent to string formatting instructions?
    For example, if we ever needed to print out the characters “%s” or “%d“, we would
    run into trouble. If you recall, these are string formatting commands, and if
    we try to print these out, the interpreter will interpret them as formatting commands.'
  - '[PAGE 107]


    Here’s a practical example. As mentioned, typing “/t” in our string will put a
    tab in the middle of our string. Assume we type the following:


    ```

    print(“We want a \t here, not a tab.”)

    ```


    We’d get back this:


    We want a here, not a tab.


    By using an escape character, we can tell Python to include the characters that
    come next as part of the string’s value. The escape character we want to use is
    the “raw string” character, an “r” before the first quote in a string, like this:


    ```

    print(r”We want a \t here, not a tab.”)

    ```


    So, if we used the raw string character, we’d get the format we want back, as
    follows:


    We want a \t here, not a tab.


    The raw string character enables you to put any combination of characters you’d
    like within the string and have it be considered as part of the string’s value.


    However, what if we did want the tab in the middle of our string? In that case,
    using special formatting characters in our string is referred to as using “escape
    characters.” “Escaping” a string is a method of reducing the ambiguity in how
    characters are interpreted. When we use an escape character, we escape the typical
    method that Python uses to interpret certain characters, and the characters we
    type are understood to be part of the string’s value. The escape primarily used
    in Python is the backslash “\.” The backslash prompts Python to look for a unique
    character to follow, which will be translated into a specific string formatting
    command.'
  - '[PAGE 108]


    We already saw that using the “\t” escape character puts a tab in the middle of
