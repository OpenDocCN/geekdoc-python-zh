- md: '## Floats Type


    The floating-point data type is a numerical type based on the decimal system that
    allows the variables to have decimal points. There is a built-in automatic function
    where Python will change an integer to a floating-point in the case that it requires
    to, such as in dividing numbers.


    1. x = 8 / 7 # Dividing 8 by 7.

    2. print(x)

    3. y = 8 / 4 # Dividing 8 by 4.

    4. print(y)

    5. z = 8 // 4 # Dividing 8 by four but only retrieving an integer.

    6. print(z)


    Program Output:


    ```

    1.1428571428571428

    2.0

    2

    ```


    A programmer can incorporate floating-point values into other mathematical functions.
    Spend a few minutes going through the documentation found in the link below: “https://docs.Python.org/3/tutorial/introduction.html#numbers
    ”—if the coding you are going to use is math-intensive.


    ## Converting Data Types


    At the beginning of programming, when using certain data types can be confusing,
    in many cases, the data that a programmer needs to use is not really up to them.
    Data conversion can be a life savior while writing code.


    Here are a few examples of data conversion and how to identify the data type of
    a variable.


    - example = 20

    - example=int(example) # Changing the type to an integer.

    - print(type(example)) # This shows the type of variable you have.

    - example = str(example) # Changing into a string.

    - print(type(example)) # This shows the type of variable you have.

    - example = float(example) # Changing into a floating-point.

    - print(type(example)) # This shows the type of variable you have.

    - example=False

    - example = bool(example) # Changing into a Boolean.

    - print(type(example)) # This shows the type of variable you have.


    **Program output:**


    ```

    <class ''int''>

    <class ''str''>

    <class ''float''>

    <class ''bool''>

    ```


    ## Basic Variables


    Any seasoned programmer will agree on two facts about coding:


    1. Different algorithms can be developed to solve the same problem.

    2. Different code can be written to implement the same algorithm.


    ## Variable Definition


    Variables in programming are based on the variables in arithmetic calculations.
    Think about them as drinking cups that can be filled with different tasty beverages.
    Sometimes, we will need to predetermine the kind of cup based on what we are drinking.
    Although it can be done, it is not wise to drink hot coffee in a plastic cup.
    When defining variables, it is essential to tell “Python IDE” (integrated development
    environment) what type of data you are using so that it deals with it appropriately.


    When we refer to variables in programming, we say that they are used “to store
    data” to be referenced and used by programs. Moreover, it is good practice to
    label them with descriptive names, so our programs can be understood clearly.
    Remember that their sole purpose is to store data in memory.


    This is one of the most challenging tasks in computer programming. Many beginning
    programmers struggle with finding names that are meaningful and nonrepetitive.
    Try to always keep in mind that someone else may read your code, so it needs to
    make sense. That person may as well be your future self, looking for a piece of
    code you wrote a few months or even years ago.


    ## Naming Variables


    Names are case-sensitive, so if in the same code you have “tire,” “Tire,” “TiRe,”
    and “TIRE,” these would be four independent variables in the program. So instead
    of variables “Looking_like_this” they become “lookLikeThis”. Note that the official
    Python code style “PEP 8” does state that underscores should be used. Regardless,
    the camel case is easier to type and elegant.


    If you are going to work with a team on a single program, sticking to a certain
    style throughout your program is one of the first things you should agree on.


    When you assign a variable, remember these important rules:


    1. It can only be a single word.

    2. It can only have letters, numbers, and the underscore character “_”.

    3. It cannot begin with a number.


    Look at the table below to find different acceptable and unacceptable names for
    variables:


    | Acceptable Variable Names | Unacceptable Variable Names |

    | :--- | :--- |

    | tire | winter-tire (hyphens are not allowed) |

    | winterTire | winter tire (spaces are not allowed) |

    | winter_tire | 8tire (should not begin with a number) |

    | _tire | 42 (should not begin with a number) |

    | TIRE | tire_pr!ce (cannot have special characters) |

    | tire3 | “tire” (cannot have special characters) |


    ## Assigning a Value to Variables


    This involves initializing a variable the first time a value is stored. In this
    example, we are placing the price of tires. While assigning, the best thing to
    do is to state the following command as ‘Putting forty into tires’ because the
    equal sign, as we will learn later, is also used to compare variables.


    1. tire = 40

    2. print(tire)


    Program Output:


    The output for this assignment is 40, so the program will display 40.


    ```

    40

    ```


    Now, let’s try to add taxes to the price of the tires. If you assign a new value
    to a variable that has already been assigned, the old value is erased—seriously,
    gone and not coming back unless you rerun the program.


    Let’s look at an example below:


    1. tire = 40

    2. taxes= 2

    3. taxedTire =tire + taxes

    4. print(taxedTire)


    Program Output:


    In this case, we assign the price of tires to 40 and the cost of taxes to 2. Then
    we changed the tire cost to be equal to the initial value (40) plus the price
    of taxes (2) which gives us an output of 42.


    In this next example we will copy the value of a variable to another variable,
    by using the same example above.


    1. tire = 40

    2. taxes= 2

    3. taxedTire =tire + taxes

    4. tire = taxedTire

    5. print(tire)


    **Program Output:**


    ```

    42

    ```


    Just as we assign numbers to the variables, you can also assign a variable with
    a string. To let Python know that you want to store a string and not another variable,
    we need to use quotation marks.


    1. tireOrigin = ‘Japan’

    2. print(tireOrigin)


    **Program Output:**


    ```

    Japan

    ```


    For this next example, we will want to display the price and the place it was
    made in as an output. By adding the plus symbol between words, it will display
    both strings side by side.


    1. tireOrigin = ‘Japan’

    2. tirePrice = 42

    3. tireOutput = tireOrigin + str(tirePrice)

    4. print(tireOutput)


    Program Output:


    Japan42


    Now that’s what a space is: A character! Once you place an addition symbol followed
    by the space character between quotations, then place another addition symbol
    followed by the second variable. Look at the code below:


    1. tireOrigin = ‘Japan’

    2. tirePrice = 42

    3. tireOutput = tireOrigin + ‘ ‘ + str(tirePrice)

    4. print(tireOutput)


    Program Output:


    Japan 42


    ## Chapter 5: Strings, Lists, Dictionaries, and Tuples


    ## Strings


    Strings are essentially a string of characters. For example, words or sentences.
    In Python, strings are designated by single (‘ ‘) or double quotes (“”). Just
    like Booleans and other numbers, there are certain operators and functions you
    can use in Python on strings.


    You can use “+” to concatenate two strings. See below:


    ```

    In [10]:

    str1 = ''bob''

    str2 = ''met''

    str3 = ''sarah''

    print (str1+" "+str2+" "+str3)

    bob met sarah

    ```


    You can also change strings to upper and lower case using the “upper()” and “lower()”
    functions in Python, and you can use the “count()” function to determine the number
    of characters in a string. See below:


    ```

    In [11]:

    str1.upper()

    Out[11]: ''BOB''


    In [12]:

    str1.lower()

    Out[12]: ''bob''


    In [13]:

    str1.count(''b'')

    Out[13]: 2

    ```'
  mdcn: '## 浮点类型


    浮点数据类型是一种基于十进制系统的数值类型，允许变量包含小数点。Python 内置了自动转换功能，在需要时（例如进行除法运算）会将整数自动转换为浮点数。


    1. x = 8 / 7 # 将 8 除以 7。

    2. print(x)

    3. y = 8 / 4 # 将 8 除以 4。

    4. print(y)

    5. z = 8 // 4 # 将 8 除以 4，但只获取整数部分。

    6. print(z)


    程序输出：


    ```

    1.1428571428571428

    2.0

    2

    ```


    程序员可以将浮点值用于其他数学函数。如果你要编写的代码涉及大量数学运算，请花几分钟时间查阅以下链接中的文档：“https://docs.Python.org/3/tutorial/introduction.html#numbers
    ”。


    ## 数据类型转换


    在编程初期，使用某些数据类型可能会令人困惑。在许多情况下，程序员需要使用的数据类型并非完全由自己决定。在编写代码时，数据转换可能是一个救星。


    以下是几个数据转换的示例，以及如何识别变量的数据类型。


    - example = 20

    - example=int(example) # 将类型更改为整数。

    - print(type(example)) # 这会显示你拥有的变量类型。

    - example = str(example) # 更改为字符串。

    - print(type(example)) # 这会显示你拥有的变量类型。

    - example = float(example) # 更改为浮点数。

    - print(type(example)) # 这会显示你拥有的变量类型。

    - example=False

    - example = bool(example) # 更改为布尔值。

    - print(type(example)) # 这会显示你拥有的变量类型。


    **程序输出：**


    ```

    <class ''int''>

    <class ''str''>

    <class ''float''>

    <class ''bool''>

    ```


    ## 基本变量


    任何经验丰富的程序员都会认同关于编码的两个事实：


    1. 可以开发不同的算法来解决同一个问题。

    2. 可以编写不同的代码来实现同一个算法。


    ## 变量定义


    编程中的变量基于算术计算中的变量。可以将它们想象成可以装不同美味饮料的杯子。有时，我们需要根据要喝的饮料预先确定杯子的类型。虽然用塑料杯喝热咖啡也可以，但这并不明智。在定义变量时，必须告诉“Python
    IDE”（集成开发环境）你正在使用什么类型的数据，以便它能进行适当的处理。


    当我们提到编程中的变量时，我们说它们用于“存储数据”，以供程序引用和使用。此外，用描述性名称标记它们是一个好习惯，这样我们的程序就能被清晰地理解。请记住，它们的唯一目的是在内存中存储数据。


    这是计算机编程中最具挑战性的任务之一。许多初程序员都在寻找有意义且不重复的名称上苦苦挣扎。请始终牢记，其他人可能会阅读你的代码，因此它需要有意义。那个人也可能是未来的你，正在寻找几个月甚至几年前编写的某段代码。


    ## 变量命名


    名称区分大小写，因此如果在同一段代码中有“tire”、“Tire”、“TiRe”和“TIRE”，它们将是程序中的四个独立变量。因此，变量名不是“Looking_like_this”，而是“lookLikeThis”。请注意，官方的
    Python 代码风格“PEP 8”确实规定应使用下划线。尽管如此，驼峰命名法更容易输入且更优雅。


    如果你要与团队合作编写一个程序，在整个程序中坚持使用某种风格是你们首先应该达成共识的事情之一。


    在给变量赋值时，请记住以下重要规则：


    1. 它只能是一个单词。

    2. 它只能包含字母、数字和下划线字符“_”。

    3. 它不能以数字开头。


    查看下表，了解不同可接受和不可接受的变量名：


    | 可接受的变量名 | 不可接受的变量名 |

    | :--- | :--- |

    | tire | winter-tire（不允许使用连字符） |

    | winterTire | winter tire（不允许使用空格） |

    | winter_tire | 8tire（不应以数字开头） |

    | _tire | 42（不应以数字开头） |

    | TIRE | tire_pr!ce（不能包含特殊字符） |

    | tire3 | “tire”（不能包含特殊字符） |


    ## 给变量赋值


    这涉及在第一次存储值时初始化变量。在这个例子中，我们正在设置轮胎的价格。在赋值时，最好将以下命令理解为“将四十放入轮胎”，因为等号（我们稍后会学到）也用于比较变量。


    1. tire = 40

    2. print(tire)


    程序输出：


    此赋值的输出是 40，因此程序将显示 40。


    ```

    40

    ```


    现在，让我们尝试给轮胎价格加上税。如果你给一个已经赋值的变量赋予一个新值，旧值就会被删除——真的，消失了，除非你重新运行程序，否则不会回来。


    让我们看下面的例子：


    1. tire = 40

    2. taxes= 2

    3. taxedTire =tire + taxes

    4. print(taxedTire)


    程序输出：


    在这个例子中，我们将轮胎价格赋值为 40，税费成本赋值为 2。然后我们将轮胎成本更改为等于初始值（40）加上税费价格（2），这给我们输出 42。


    在下一个例子中，我们将使用上面相同的例子，将一个变量的值复制到另一个变量。


    1. tire = 40

    2. taxes= 2

    3. taxedTire =tire + taxes

    4. tire = taxedTire

    5. print(tire)


    **程序输出：**


    ```

    42

    ```


    就像我们给变量赋数字一样，你也可以给变量赋一个字符串。为了让 Python 知道你想存储一个字符串而不是另一个变量，我们需要使用引号。


    1. tireOrigin = ‘Japan’

    2. print(tireOrigin)


    **程序输出：**


    ```

    Japan

    ```


    在下一个例子中，我们希望将价格和产地作为输出显示。通过在单词之间添加加号，它将并排显示两个字符串。


    1. tireOrigin = ‘Japan’

    2. tirePrice = 42

    3. tireOutput = tireOrigin + str(tirePrice)

    4. print(tireOutput)


    程序输出：


    Japan42


    现在你知道空格是什么了：一个字符！一旦你在引号之间放置一个加号后跟一个空格字符，然后再放置另一个加号后跟第二个变量。看下面的代码：


    1. tireOrigin = ‘Japan’

    2. tirePrice = 42

    3. tireOutput = tireOrigin + ‘ ‘ + str(tirePrice)

    4. print(tireOutput)


    程序输出：


    Japan 42


    ## 第五章：字符串、列表、字典和元组


    ## 字符串


    字符串本质上是一串字符。例如，单词或句子。在 Python 中，字符串用单引号（‘ ‘）或双引号（“”）指定。就像布尔值和其他数字一样，Python 中有一些运算符和函数可以用于字符串。


    你可以使用“+”来连接两个字符串。见下文：


    ```

    In [10]:

    str1 = ''bob''

    str2 = ''met''

    str3 = ''sarah''

    print (str1+" "+str2+" "+str3)

    bob met sarah

    ```


    你还可以使用 Python 中的“upper()”和“lower()”函数将字符串更改为大写和小写，并且可以使用“count()”函数来确定字符串中的字符数。见下文：


    ```

    In [11]:

    str1.upper()

    Out[11]: ''BOB''


    In [12]:

    str1.lower()

    Out[12]: ''bob''


    In [13]:

    str1.count(''b'')

    Out[13]: 2

    ```'
