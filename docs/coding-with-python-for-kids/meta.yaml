    of the game.


    Next up, the player needs to guess the hidden number. This guess will then be
    stored inside a new variable called “myGuess.” In order to check whether the guess
    is equal to the number, we are using a “while” loop with the “not equal to” operator.
    We do this because if the player gets lucky and guesses the number correctly with
    the first attempt, the loop simply doesn’t finish executing because there’s no
    need.


    Next, if the player guesses the wrong number, we have two “if” statements that
    check whether the guess is a higher value than the hidden number, or a lower one.
    An appropriate message is then printed for the player to see in each case. In
    either scenario, the player receives another chance to make the right guess. Finally,
    if the user guessed the number correctly, the program declares victory by printing
    a message, and then the program stops running.'
