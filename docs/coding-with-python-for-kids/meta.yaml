- md: "## Tips ‘N’ Tricks\n\n- Class names usually start with block letters (like\
    \ we used in the class “Book”). It’s not a rule, but it’s just a convention that\
    \ makes things easier for you and your code—long live the programming tradition.\n\
    - Codes are getting even longer. But you must type them all into the Python shell.\
    \ You’d never know what you know and don’t unless you try!\n- **The Hashtag (#):**\
    \ You may have noticed in the last code we wrote in this chapter, that instead\
    \ of inputting the codes we wanted the computer to process, we used a comment\
    \ line to explain what should be inside, and started the line with a hashtag.\
    \ Oftentimes when writing complex codes, programmers aren’t always sure about\
    \ what should be inside some functions yet. But they still have to write those\
    \ codes. They employ this method. It’s a way of thinking or planning ahead. These\
    \ “empty” functions or methods (or whatever they may be in the code) are called\
    \ code stubs. Although they aren’t exactly empty, the comments written there don’t\
    \ add up to anything in Python language.\n\nYou may, or may not use the “pass”\
    \ keyword while using code stubs. Using this keyword tells Python to ignore that\
    \ code and jump to the next.\n\n## Chapter 12: Functions, Inputs, and Outputs\n\
    \n## Functions\n\nFunctions are code blocks that are given an identifier. This\
    \ identifier can be used to call the function. Calling a function makes the program\
    \ execute the function regardless of where it is located within the code.\n\n\
    To create a function, you need to use the “def” keyword. When you use it to create\
    \ a function, you can call it defining a function. For example:\n\n```\n>>> def\
    \ doSomething():\n    print(\"Hello functioning world!\")\n>>> doSomething()\n\
    Hello functioning world!\n>>> _\n```\n\nCreating and calling a function is easy.\
    \ The primary purpose of a function is to allow you to organize, simplify, and\
    \ modularize your code. Whenever you have a set of code that you will need to\
    \ execute in sequence from time to time, defining a function for that set of code\
    \ will save you time and space in your program. Instead of repeatedly typing code\
    \ or even copy-pasting, you simply define a function.\n\n## Return Statement\n\
    \nReturn statements are useful when you wish to create functions whose sole job\
    \ is to return some values.\n\nLet us start by defining a function called “cube,”\
    \ which will basically multiply the number by itself three times. However, since\
    \ we want Python to return a value, we will use the following code:\n\n```\ndef\
    \ cube(number):\n    return number * number * number\n```\n\nBy typing “return”\
    \ you are informing Python that you wish for it to return a value to you that\
    \ can later be stored in a variable or used elsewhere. It is pretty much like\
    \ the “input()” function where a user enters something and it gets returned to\
    \ us.\n\n```\ndef cube(number):\n    return number * number * number\n\nnumber\
    \ = int(input(\"Enter the number: \"))\nprint(cube(number))\n```\n\n## How to\
    \ Define and Call Functions?\n\nTo start, we need to take a look at how we are\
    \ able to define our own functions in this language. The function in Python is\
    \ going to be defined when we use the statement of “def” and then follow it with\
    \ a function name and some parentheses in place as well.\n\nSome of the Python\
    \ rules that we need to follow for defining these functions will include:\n\n\
    1. Any of the arguments or input parameters that you would like to use have to\
    \ be placed within the parentheses so that the compiler knows what is going on.\n\
    2. The function first statement is something that can be an optional statement—something\
    \ like a documentation string that goes with your function if needed.\n3. The\
    \ code found within all the functions that we are working with needs to start\
    \ out with a colon, and then we need to indent it as well.\n4. The “return” statement\
    \ we get will need to exit a function at this time. We can then have the option\
    \ of passing back a value to the caller. A return statement that doesn’t have\
    \ an argument with it is going to give us the same return as none.\n\n## Parameters\n\
    \n### Parameters Require Arguments\n\nYou cannot call a function with parameters\
    \ without an argument. If you do, you will receive an error. For example:\n\n\
    ```\n>>> def sampFunc(x):\n    print(x)\n\n>>> sampFunc()\nTraceback (most recent\
    \ call last):\n  File \"<stdin>\", line 1, in <module>\nTypeError: sampFunc()\
    \ missing 1 required positional argument: 'x'\n\n>>> _\n```\n\n### Multiple Parameters\n\
    \nYou can assign two or more parameters in a function. For example:\n\n```\n>>>\
    \ def simpOp(x, y):\n    z = x + y\n    print(z)\n>>> simpOp(1, 2)\n3\n>>> _\n\
    ```\n\n### Return statement—Returning Value\n\nThe return keyword makes a function\
    \ return a value. For a simpler explanation, it makes the function be used as\
    \ a variable that has an assigned or processed value. For example:\n\n```\n>>>\
    \ def concat(string1, string2):\n    return string1 + string2\n>>> x = concat(\"\
    Text1\", \"Text2\")\n>>> x\n'Text1Text2'\n>>> _\n```\n\nA function can return\
    \ a value even if it does not have parameters. For example:\n\n```\n>>> def piString():\n\
    \    return \"3.14159265359\"\n>>> x = piString()\n>>> x\n'3.14159265359'\n>>>\
    \ _\n```\n\nAs you can see, using the keyword return makes it simpler for you\
    \ to retrieve a value from a function without relying on global variables. Return\
    \ allows you to write a clean and efficient code.\n\n## Lambda function—Anonymous\
    \ Functions or Lambda\n\nUsing an anonymous function is a convenient way to write\
    \ one-line functions that require arguments and return a value. The keyword “lambda”\
    \ is an example of that. Despite having the purpose of writing one-line code,\
    \ it can have numerous parameters. For example:\n\n```\n>>> average = lambda x,\
    \ y, z: (x + y + z) / 3\n>>> x = average(10, 20, 30)\n>>> x\n20.0\n>>> average(12,\
    \ 51, 231)\n98.0\n>>> _\n```\n\n## Inputs\n\nSo far, we’ve only been writing programs\
    \ that only use data we have explicitly defined in the script. However, your programs\
    \ can also take in input from a user and utilize it. Python lets us solicit inputs\
    \ from the user with a very intuitive function named “input().” Utilizing the\
    \ “input()” function enables us to prompt the user to enter information, which\
    \ we can further manipulate. For example, we can take the user’s input and save\
    \ it as a variable, print it straight to the terminal, or do anything else we\
    \ might like.\n\nWhen we use the input function, we can “pass” in a string. The\
    \ user will see this string as a prompt, and their response to the prompt will\
    \ be saved as the input value. For instance, if we wanted to query the user for\
    \ their favorite food, we could write the following:\n\n```\nfavorite_food = input(\"\
    What is your favorite food?: \")\n```\n\nIf you ran this code example, you would\
    \ be prompted to input your favorite food. You could save multiple variables this\
    \ way and print them all at once using the “print()” function along with print\
    \ formatting, as we covered earlier. To be clear, the text you write in the input\
    \ function is what the user will see as a prompt; it isn’t what you are inputting\
    \ into the system as a value.\n\nWhen you run the code above, you’ll be prompted\
    \ for input. After you type in some text and hit the “Enter/Return” key, the text\
    \ you wrote will be stored as the variable “favorite_food.” The input command\
    \ can be used along with string formatting to inject variables into the text prompt\
    \ that the user will see. For instance, if we had a variable called “user_name”\
    \ that stored the name of the user, we could structure the input statement like\
    \ this:\n\n```\nfavorite_food = input(\"What is {}'s favorite food?: \").format(\"\
    user name here\")\n```\n\n## Printing and Formatting Outputs"
  mdcn: "## 小贴士与技巧\n\n-   类名通常以大写字母开头（就像我们在“Book”类中使用的那样）。这不是硬性规定，而是一种约定俗成，能让你和你的代码更轻松——编程传统万岁！\n\
    -   代码会越来越长。但你必须把它们全部输入到Python shell中。只有亲自尝试，你才能知道自己掌握了什么，又遗漏了什么！\n-   **井号（#）：**\
    \ 你可能已经注意到，在本章我们编写的上一个代码中，我们没有输入希望计算机处理的代码，而是使用注释行来解释其中应该包含什么内容，并以井号开头。通常在编写复杂代码时，程序员并不总是确定某些函数内部应该包含什么。但他们仍然必须编写这些代码。他们采用这种方法。这是一种思考或提前规划的方式。这些“空”函数或方法（或代码中的任何其他形式）被称为代码桩。虽然它们并非完全为空，但其中编写的注释在Python语言中不起任何作用。\n\
    \n在使用代码桩时，你可能会也可能不会使用“pass”关键字。使用此关键字会告诉Python忽略该代码并跳转到下一行。\n\n## 第12章：函数、输入与输出\n\
    \n## 函数\n\n函数是被赋予标识符的代码块。此标识符可用于调用该函数。调用函数会使程序执行该函数，无论它在代码中的什么位置。\n\n要创建函数，你需要使用“def”关键字。当你用它来创建函数时，可以称之为定义函数。例如：\n\
    \n```\n>>> def doSomething():\n    print(\"Hello functioning world!\")\n>>> doSomething()\n\
    Hello functioning world!\n>>> _\n```\n\n创建和调用函数很简单。函数的主要目的是让你能够组织、简化和模块化你的代码。每当你有一组需要不时按顺序执行的代码时，为这组代码定义一个函数将为你节省程序中的时间和空间。你只需定义一个函数，而无需重复输入代码甚至复制粘贴。\n\
    \n## Return语句\n\n当你希望创建一个唯一工作就是返回某些值的函数时，Return语句非常有用。\n\n让我们从定义一个名为“cube”的函数开始，它基本上会将数字乘以自身三次。然而，由于我们希望Python返回一个值，我们将使用以下代码：\n\
    \n```\ndef cube(number):\n    return number * number * number\n```\n\n通过输入“return”，你是在告知Python你希望它返回一个值给你，该值稍后可以存储在变量中或在其他地方使用。这与“input()”函数非常相似，用户输入某些内容后，它会返回给我们。\n\
    \n```\ndef cube(number):\n    return number * number * number\n\nnumber = int(input(\"\
    Enter the number: \"))\nprint(cube(number))\n```\n\n## 如何定义和调用函数？\n\n首先，我们需要看看如何在这种语言中定义自己的函数。在Python中，当我们使用“def”语句，后跟函数名和一些括号时，函数就会被定义。\n\
    \n定义这些函数时，我们需要遵循的一些Python规则包括：\n\n1.  你希望使用的任何参数或输入参数都必须放在括号内，以便编译器知道发生了什么。\n\
    2.  函数的第一条语句可以是可选的语句——比如随函数一起的文档字符串（如果需要的话）。\n3.  我们处理的所有函数中的代码都需要以冒号开头，然后我们需要对其进行缩进。\n\
    4.  我们得到的“return”语句此时需要退出函数。然后我们可以选择将一个值传递回调用者。一个没有参数的return语句将给我们与none相同的返回值。\n\
    \n## 参数\n\n### 参数需要实参\n\n你不能在没有实参的情况下调用带有参数的函数。如果这样做，你会收到一个错误。例如：\n\n```\n>>>\
    \ def sampFunc(x):\n    print(x)\n\n>>> sampFunc()\nTraceback (most recent call\
    \ last):\n  File \"<stdin>\", line 1, in <module>\nTypeError: sampFunc() missing\
    \ 1 required positional argument: 'x'\n\n>>> _\n```\n\n### 多个参数\n\n你可以在一个函数中分配两个或更多参数。例如：\n\
    \n```\n>>> def simpOp(x, y):\n    z = x + y\n    print(z)\n>>> simpOp(1, 2)\n\
