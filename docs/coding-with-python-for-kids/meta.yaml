    ## Tuples


    As funny as the name may be, tuples are pretty much like lists. The only major
    difference is that these are used when you do not want certain specialized values
    to change throughout the program. Once you create a tuple, it cannot be modified
    or changed later on.


    Tuples are represented by parenthesis (). If you try and access the methods, you
    will no longer have access to the methods that you did when you were using lists.
    These are secure and used only in situations where you are certain you do not
    want to change, modify, add, or remove items. Normally, we will be using lists,
    but it is great to know we have a safe way to do things as well.


    ## Dictionaries


    Unlike tuples and lists, dictionaries are different. To begin with, they work
    with “key-value pairs,” which sounds confusing, I know. However, let us look at
    what exactly a dictionary is and how we can call, create, and modify the names.


    To help us with the explanation, we have our imaginary friend here named “James,”
    who has graciously accepted to volunteer for the exercise. We then take some information
    from him, such as his name, email, age, and the car he drives, and then we end
    up with this information:


    Name – James


    Age – 58


    Email – james@domain.com


    Car – Tesla T1


    What we have here are called key-value pairs. To represent the same within a dictionary,
    all we need is to create one. How do we do that? Let’s have a look:


    ```

    friend = {

    "name": "James",

    "age": 30,

    "email": "james@domain.com",

    "car": "Tesla T1"

    }

    ```


    We define a dictionary using “{}.” Add each key-value pair as shown above with
    a colon in the middle. Use a comma to separate items from one another. Now, you
    have a dictionary called “friend,” and you can access the information easily.


    Now, to call up the email, we will use square brackets as shown here:


    ```

    friend = {

    "name": "James",

    "age": 30,

    "email": "james@domain.com",

    "car": "Tesla T1"

    }

    ```


    ```

    print(friend["email"])

    ```


    **Program Output:**


    james@domain.com


    Unlike tuples, you can add, modify, or change values within a dictionary. I have
    already shown you how to do that with lists, but just for demonstration purposes,
    here’s one way you can do that:


    ```

    friend["age"] = 60

    ```


    ```

    print(friend["age"])

    ```


    **Program Output:**


    60


    ## Chapter 6: Numbers and Operators


    Along with strings, numeric types, there are operators, which are important building
    blocks in coding. They help us count objects, perform math operations, keep track
    of things, and so much more. Don’t worry, you can do this. Let’s get started!


    ### Numeric Types


    There are two main numeric types that we’ll be using in Python: Integers and floats.
    Integers are the whole numbers (positive or negative) that we are all used to.
    Floating-point numbers, or simply floats, are numbers that can have whole and
    fractional parts and are written using decimal points.


    ### Operators


    In programming, “operators” are special symbols or keywords that represent an
    action. They are usually used with “operands,” which are the values you are performing
    the action on. In this section, our operands will be numbers. If you’ve ever used
    a calculator, then you should be familiar with a set of operators that are specifically
    used for math. These are called arithmetic operators.


    ### Arithmetic Operators


    Also known as the math operators, arithmetic operators are used to perform the
    basic math functions. As you’ll see in the following chart, most arithmetic operators
    work just like they do in regular mathematics, with a few exceptions:


    | Operator Symbol | Operator Name | Action Taken | Example | Resulting Output
    |

    | :--- | :--- | :--- | :--- | :--- |

    | + | Addition | Adds values together. | 4 + 5 | 9 |

    | - | Subtraction | Subtracts one value from another. | 10 - 5<br>5 - 10 | 5<br>-5
    |

    | * | Multiplication | Multiplies values together. | 9 * 6 | 54 |

    | / | Division | Divides one value by another (answer will always be a float type).
    | 8 / 4<br>9 / 4 | 2.0<br>2.25 |

    | % | Modulus | Divides one value by another, and the remainder is returned. |
    12 % 5<br>12 % 6 | 2<br>0 |

    | // | Floor Division | Divides one value by another, returns the answer rounded
    to the next smallest whole number. | 4 // 3<br>4 // 2 | 1<br>2 |

    | ** | Exponentiation | Raises one value to the power of another. | 2 ** 5 | 32
    |


    To see these operations in action, go ahead and set the following variables in
    “Python shell”:


    ```

    a = 6

    b = 3

    ```


    Now you can begin using different operators on these variables directly in Python
    shell. Try out a few, like these:


    ```

    a + b

    b ** a

    a % b

    ```


    Cool, right? Now, to really get comfortable with them, try out all of the combinations
    and see what happens! You can check the answers on the following chart, although
    I think the computer is pretty good at math ;)...


    Here are all the possible answers that can occur using the different operators
    and the variables:


    | Operator Combination | Answer | Operator Combination | Answer |

    | :--- | :--- | :--- | :--- |

    | a + b | 9 | a + a | 12 |

    | b + a | 9 | a - a | 0 |

    | a – b | 3 | a * a | 36 |

    | b – a | -3 | a / a | 1.0 |

    | a * b | 18 | a % a | 0 |

    | b * a | 18 | a // a | 1 |

    | a / b | 2.0 | a ** a | 46656 |

    | b / a | 0.5 | b + b | 6 |

    | a % b | 0 | b - b | 0 |

    | b % a | 3 | b * b | 9 |

    | a // b | 2 | b / b | 1.0 |

    | b // a | 0 | b % b | 0 |

    | a ** b | 216 | b // b | 1 |

    | b ** a | 729 | b ** b | 27 |


    ## Order of Operations


    Arithmetic operators follow a special set of rules. This set of rules is called
    the order of operations. It is the proper order in which arithmetic operations
    should be calculated, especially if you use more than one in a single line of
    code.


    Let’s follow the order of operations—here’s how:


    **Parentheses:** In calculations like this, the computer always calculates any
    expression in parentheses first. Parentheses tell us ‘I’m most important’ in the
    rules of precedence in math.


    **Exponentiation:** The next calculation that is performed is exponentiation.
    When the computer sees the “**” operator, it raises one number to the power of
    another.


    **Multiplication and Division:** Multiplication and division have the same level
    of importance as each other, so if both a multiplication and division calculation
    appear in the same line, we start with the calculation on the left and work our
    way to the right.


    **Addition and Subtraction:** The calculations with the least importance are addition
    and subtraction. This means they are performed last. Since addition and subtraction
    have the same level of importance, we use the left-to-right order of calculating
    them, just like we did with multiplication and division.


    ## Comparison Operators


    The next set of operators we use in programming are called comparison operators.
    Just like their name, comparison operators help us compare one value to another.
    When we use comparison operators, they give us back a “true” or “false” answer
    known as a “Boolean” type. Comparison operators and Booleans are super important
    because they help us make decisions in our code.


    There are six main comparison operators, and they are pretty simple to understand.
    Let’s talk about each one:


    ### Greater than


    The symbol “>” represents the greater-than operator.


    When you use it, the computer decides whether the value on the left side of the
    > symbol is larger than the value on the right side of the > symbol.


    ### Less than


    The symbol “<” represents the less-than operator.


    This time, we are figuring out if the value on the left of the “<” symbol is less,
    or smaller than the value on the right side of the “<” symbol.


    ### Greater than or Equal to


    The symbol “>=” represents the greater-than-or-equal-to operator.


    We’re already familiar with the first symbol, so let’s talk about the second symbol.
    We’ve used the equal sign (=) before to assign pieces of data to variables (“remember
    mood = happy”?). When we use it as an operator, though, we are partly deciding
    if the value on the left of the “>=” operator is equal to the value on the right
    of the “>=” operator.


    But this operator is special since there are two symbols this time. We are trying
    to decide if the value on the left of the “>=” operator is greater than the one
    on the right, or if the value on the left is the same as the value on the right.
    Only one of these cases needs to be true for the computer to decide that the entire
    expression is “true.”


    ### Less than or Equal to


    The symbol “<=” represents the less-than-or-equal-to operator.


    Just like the greater-than-or-equal-to operator, we are making sure at least one
    of the operators is correct. For the less-than-or-equal-to operator, we are looking
    at the values to see if the value on the left of the “<=” operator is either smaller
    than the one on the right of the “<=” operator or the same as the one on the right.


    ### Equal to


    The symbol “==” represents the equal-to operator.


    This one is much simpler than the last two operators. Just like it sounds, it
    asks the computer to decide if the value on the left side of the “==” symbol is
    the same as the value on the right side of the “==” symbol. Easy!


    The computer doesn’t see integer and string types as the same types, either. So
    when we use the equal-to operator, remember that the computer will check that
    the values are the same type and the same value/number/text.'
