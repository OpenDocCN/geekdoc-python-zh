    PHP is a common web programming language.


    PHP was first developed by Lerdorf in 1995. He began programming in "Perl," then
    rewrote in C, including access to databases, and eventually invented the PHP language.


    PHP is an HTML-embedded language, which means documents are processed on the server-side.
