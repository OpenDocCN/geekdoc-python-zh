    - Web crawler

    - Web development

    - Artificial intelligence design

    - Automated operation and maintenance


    Python is an object-oriented, dynamically typed language that was originally designed
    to write automated scripts (shells), but nowadays it is increasingly being used
    for independent, large-scale projects.


    Since the Python language was born in the early 1990s, it has been widely used
    in system administration tasks and web programming. The founder of Python is Guido
    van Rossum from the Netherlands. Python is free and open-source.


    ### The Python language


    - Is very easy to learn, especially for programming beginners.

    - Is written in C language and runs very fast.

    - Has strong portability, so it can run on various platforms.

    - Can run programs directly without compiling.

    - Can be extended with the C or C++ languages.

    - Contains a lot of Python standard libraries for various tasks.


    ## Visual Basic Programming Language


    "Visual Basic" is a general purpose, object-based programming language developed
    by Microsoft. It is a structured, modular, object-oriented, visual programming
    language.


    "Visual" refers to the method of developing a graphical user interface (GUI),
    so you don’t have to write a lot of code to describe the appearance and location
    of interface elements; instead, you just add a pre-created object to a point on
    the screen.


    "Basic" refers to "Beginners All-Purpose Symbolic Instruction Code", which is
    a widely used language in the history of computer technology development.


    ### The Visual Basic language


    - Has simple syntax, is easy to learn, and is designed for beginners.

    - Supports visual platforms or regular platforms.

    - Is programming with components or controls.

    - Is suitable to develop "Asp.net" projects.

    - Is easy to convert to C# language.

    - Has an event trigger system included as well as built-in functions.

    - Becomes powerful with the library "Visual Studio."


    ## HTML Programming Language


    "HyperText Markup Language" (HTML) is a standard markup language for creating
    web pages. HTML was released in June 1993 as a working draft of the internet engineering
    working group.


    HTML can describe and express the web page’s text, picture, animation, color,
    music, event, and interaction. The contents of a web page consist of many HTML
    tags and elements.


    An HTML file has three parts: The "declaration section," "head section," and the
    "body section."


    HTML is the foundation of web programming, which means that the World Wide Web
    is based on hypertext—a web browser executes HTML files.


    ### The HTML language


    - Is used to design a web page.

    - Consists of many HTML tags and elements.

    - Starts with the tag `<!doctype html>` in the HTML file.

    - Saves files with a ".html" extension name.

    - Works with "CSS" (Cascading Style Sheets), which improves the HTML style.

    - Is executed by a web browser, which works as a "parser" (a software for analyzing
    programming languages).


    ## Chapter 2: Why Learn Python?


    ### Python Is Free!


    There are no better reasons for you to start learning Python than these: Downloading
    the program is absolutely free, using Python programming language is free as well,
    and you can play with it, for free, as much as you want. The language is improved
    every day by the Python team as well as so many volunteers all over the internet,
    and so, there is so much for you to have fun with as you continue learning the
    language. If there is a programming language that you really need to learn, it
    is Python.


    ### Python Is a Very Easy-to-Learn Programming Language


    Many people that have used Python agree that it is in fact the easiest programming
    language to learn. Beginners learn Python really fast, and before long, they are
    able to use codes and program like experts. The commands used in Python—that is
    the code that you write—are written in normal English.


    Remembering commands in Python is very easy too. You can also easily tell what
    you are doing and what you need to do. Python is quite different from other languages
    where you have to remember some abbreviations that sometimes do not make sense.


    ### There Are Resources Everywhere


    Python members, as well as volunteers, have ensured that resources are easily
    accessible for those that want to learn Python. You can get a ‘Beginners Guide
    to Python’ easily, for instance, to get started in learning the language. There
    are "YouTube" tutorials as well, and so many more resources over the internet
    that can help you get started in learning the programming language.


    ### Great Paid Resources


    Most of the resources you will get for Python are free, but some are not free.
    There are books, for instance, that offer more information and techniques than
    you will get from the free ones. They have been well developed and tailored to
    help learners get started and gain the relevant skills of using Python language
    in the least amount of time possible. You have everything that you need to learn
    Python at your disposal.


    ### It Is the Language Used in Google


    "Google" uses Python; Python is one of the most preferred programming languages
    by Google experts. Most of their popular products have been programmed using Python.
    Google is constantly looking to hire experts in Python. If you have always wanted
    to work with such a great team, Python should be the most important language you
    should learn. If Google is using it, you can imagine how many more great companies
    are using the same program, so you are a winner if you have Python skills.


    ### Python Is a Versatile Programming Language


    This means that it can be used for just anything, large, small, online, and even
    offline projects. The skills you will garner will not go to waste; on the contrary,
    you will find them useful in so many projects that you will be undertaking in
    life.


    ### It Is Very Fast to Use


    If you have used several different programming languages, you will realize that
    some take some time to program. This is not what Python is like; it is quick to
    program. Writing codes in Python can be done in a simple manner and really fast.


    ### It Is Always Updated


    Python is always up to date, all thanks to the volunteers that keep updating and
    developing it every day. The fact that it is an open-source programming language
    helps a lot too since it is open to improvement by a lot of people. New versions
    are always coming up, and this means that the language is always fresh and moving
    with the current trends. This is what makes Python a very powerful language that
    will not fade away anytime soon—it is slowly becoming a favorite of many programmers
    because of this fact.


    ### Learning Python Is Not Just Simple but Fast Too


    You do not need so much time to become an expert in Python programming language.
    You can learn the language and be able to use it really fast. If you love computers
    and are not afraid of simple mathematics equations, you will learn them much faster.
    Learning Python will not take you as much time as it can take you to learn any
    language.


    ### Python Has a Great Support System


    The great Python community will ensure that you have help whenever you need it.
    The community members are always more than willing and ready to help.'
  mdcn: '## PHP 编程语言


    PHP 是一种常见的 Web 编程语言。


    PHP 最初由 Lerdorf 于 1995 年开发。他最初使用 "Perl" 编程，后来用 C 语言重写，包括数据库访问功能，最终发明了 PHP 语言。


    PHP 是一种 HTML 嵌入式语言，这意味着文档在服务器端处理。其语言风格类似于 C 语言。


    PHP 在 "IT"（信息技术）领域被广泛使用。


    ### PHP 语言


    -   混合了来自 Perl 和 C 的一些语法，最终形成了 PHP 语法。

    -   嵌入了 HTML 代码。

    -   具有可以实现加密和优化代码的编译功能。

    -   在动态网页中比 Perl 运行更快。

    -   支持所有流行的数据库和操作系统。

    -   使用 C 和 C++ 进行程序扩展。

    -   可以在 "UNIX"、"LINUX"、"WINDOWS" 和 "Mac OS" 上运行。

    -   可用于开发大型商业程序。

    -   是一种面向对象的语言，可与 "MySQL" 配合使用。


    ## Python 编程语言


    Python 是一种简单、易读且可扩展的计算机编程语言。并且，与其他语言相比，它更容易学习。目前，Python 有四大应用领域：


    -   网络爬虫

    -   Web 开发

    -   人工智能设计

    -   自动化运维


    Python 是一种面向对象、动态类型的语言，最初设计用于编写自动化脚本（shell），但如今越来越多地用于独立的大型项目。


    自 Python 语言于 1990 年代初诞生以来，它已被广泛应用于系统管理任务和 Web 编程。Python 的创始人是来自荷兰的 Guido van Rossum。Python
    是免费且开源的。


    ### Python 语言


    -   非常容易学习，尤其适合编程初学者。

    -   用 C 语言编写，运行速度非常快。

    -   具有很强的可移植性，因此可以在各种平台上运行。

    -   可以直接运行程序，无需编译。

    -   可以使用 C 或 C++ 语言进行扩展。

    -   包含大量用于各种任务的 Python 标准库。


    ## Visual Basic 编程语言


    "Visual Basic" 是由 Microsoft 开发的一种通用、基于对象的编程语言。它是一种结构化、模块化、面向对象的可视化编程语言。


    "Visual" 指的是开发图形用户界面 (GUI) 的方法，因此你无需编写大量代码来描述界面元素的外观和位置；相反，你只需将预先创建的对象添加到屏幕上的某个点即可。


    "Basic" 指的是 "Beginners All-Purpose Symbolic Instruction Code"，这是计算机技术发展史上广泛使用的一种语言。


    ### Visual Basic 语言


    -   语法简单，易于学习，专为初学者设计。

    -   支持可视化平台或常规平台。

    -   使用组件或控件进行编程。

    -   适合开发 "Asp.net" 项目。

    -   易于转换为 C# 语言。

    -   包含事件触发系统以及内置函数。

    -   借助 "Visual Studio" 库变得功能强大。


    ## HTML 编程语言


    "超文本标记语言" (HTML) 是用于创建网页的标准标记语言。HTML 于 1993 年 6 月作为互联网工程工作组的工作草案发布。


    HTML 可以描述和表达网页的文本、图片、动画、颜色、音乐、事件和交互。网页内容由许多 HTML 标签和元素组成。


    HTML 文件有三个部分："声明部分"、"头部部分" 和 "主体部分"。


    HTML 是 Web 编程的基础，这意味着万维网基于超文本——Web 浏览器执行 HTML 文件。


    ### HTML 语言


    -   用于设计网页。

    -   由许多 HTML 标签和元素组成。

    -   HTML 文件以标签 `<!doctype html>` 开头。

    -   以 ".html" 扩展名保存文件。

    -   与 "CSS"（层叠样式表）配合使用，以改善 HTML 样式。

    -   由 Web 浏览器执行，浏览器充当 "解析器"（用于分析编程语言的软件）。


    ## 第 2 章：为什么学习 Python？


    ### Python 是免费的！


    没有比这更好的理由让你开始学习 Python 了：下载程序是完全免费的，使用 Python 编程语言也是免费的，而且你可以免费随心所欲地使用它。Python
    团队以及互联网上众多志愿者每天都在改进这门语言，因此，在你继续学习的过程中，有很多有趣的东西等着你去探索。如果有一种编程语言是你真正需要学习的，那就是 Python。


    ### Python 是一种非常容易学习的编程语言


    许多使用过 Python 的人同意，它实际上是最容易学习的编程语言。初学者学习 Python 非常快，不久之后，他们就能像专家一样使用代码和编程。Python
    中使用的命令——也就是你编写的代码——是用普通英语编写的。


    记住 Python 中的命令也非常容易。你也可以轻松地知道你在做什么以及你需要做什么。Python 与其他语言有很大不同，在其他语言中，你必须记住一些有时毫无意义的缩写。


    ### 资源无处不在


    Python 成员和志愿者们确保了想要学习 Python 的人可以轻松获取资源。例如，你可以轻松获得 "Python 初学者指南" 来开始学习这门语言。还有
    "YouTube" 教程，以及互联网上更多可以帮助你开始学习这门编程语言的资源。


    ### 优秀的付费资源


    你获得的大部分 Python 资源都是免费的，但有些不是免费的。例如，有些书籍提供的信息和技巧比免费资源更多。它们经过精心开发和定制，旨在帮助学习者在最短的时间内入门并获得使用
    Python 语言的相关技能。你拥有学习 Python 所需的一切资源。


    ### 它是 Google 使用的语言


    "Google" 使用 Python；Python 是 Google 专家最青睐的编程语言之一。他们大多数受欢迎的产品都是使用 Python 编程的。Google
    不断寻找 Python 专家。如果你一直想与这样一个优秀的团队合作，Python 应该是你需要学习的最重要的语言。如果 Google 都在使用它，你可以想象还有多少其他优秀的公司在使用同样的程序，因此，如果你有
    Python 技能，你就是赢家。


    ### Python 是一种通用的编程语言


    这意味着它可以用于任何事情，无论大小、在线还是离线项目。你将获得的技能不会浪费；相反，你会发现它们在你生活中将要承担的许多项目中都很有用。


    ### 使用起来非常快


    如果你使用过几种不同的编程语言，你会意识到有些语言编程需要一些时间。Python 不是这样；它编程很快。用 Python 编写代码可以以简单的方式快速完成。


    ### 它总是保持更新


    Python 总是保持最新，这要归功于每天更新和开发它的志愿者们。它是一种开源编程语言这一事实也有很大帮助，因为它向许多人开放改进。新版本总是不断推出，这意味着这门语言总是新鲜的，并跟上当前的趋势。这就是为什么
    Python 是一门非常强大的语言，不会在短期内消失——由于这个事实，它正慢慢成为许多程序员的最爱。


    ### 学习 Python 不仅简单而且快速


    你不需要太多时间就能成为 Python 编程语言的专家。你可以快速学习这门语言并能够熟练使用它。如果你热爱计算机并且不害怕简单的数学方程式，你会学得更快。学习
    Python 不会花费你学习任何其他语言那么多的时间。


    ### Python 拥有强大的支持系统


    优秀的 Python 社区将确保你在需要帮助时得到帮助。社区成员总是非常乐意并准备好提供帮助。'
