    ## 字典


    与元组和列表不同，字典是另一种结构。首先，它们使用“键值对”工作，我知道这听起来可能令人困惑。不过，让我们来看看字典到底是什么，以及我们如何调用、创建和修改它。


    为了帮助解释，我们请来了虚构的朋友“詹姆斯”，他欣然同意为这个练习做志愿者。我们从他那里获取一些信息，比如他的名字、电子邮件、年龄和他开的车，然后我们得到了这些信息：


