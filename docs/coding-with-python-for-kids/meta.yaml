    expression is “true.”


    # Less than or Equal to


    The symbol “<=” represents the less-than operator.


    Just like the greater-than-or-equal-to operator, we are making sure at least one
    of the operators is correct. For the less-than-or-equal-to operator, we are looking
    at the values to see if the value on the left of the “<=” operator is either smaller
    than the one on the right of the “<=” operator or the same as the one on the right.


    # Equal to


