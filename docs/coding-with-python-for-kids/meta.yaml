    # Order of Operations


    Arithmetic operators follow a special set of rules. This set of rules is called
    the order of operations. It is the proper order in which arithmetic operations
    should be calculated, especially if you use more than one in a single line of
    code.


    Let’s follow the order of operations—here’s how:


    **Parentheses:** In calculations like this, the computer always calculates any
    expression in parentheses first. Parentheses tell us ‘I’m most important’ in the
    rules of precedence in math.


    **Exponentiation:** The next calculation that is performed is exponentiation.
    When the computer sees the “**” operator, it raises one number to the power of
    another.


    **Multiplication and Division:** Multiplication and division have the same level
    of importance as each other, so if both a multiplication and division calculation
    appear in the same line, we start with the calculation on the left and work our
    way to the right.'
  - '[PAGE 58]


    **Addition and Subtraction:** The calculations with the least importance are addition
    and subtraction. This means they are performed last. Since addition and subtraction
    have the same level of importance, we use the left-to-right order of calculating
    them, just like we did with multiplication and division.


    # Comparison Operators


    The next set of operators we use in programming are called comparison operators.
    Just like their name, comparison operators help us compare one value to another.
    When we use comparison operators, they give us back a “true” or “false” answer
    known as a “Boolean” type. Comparison operators and Booleans are super important
    because they help us make decisions in our code.


    There are six main comparison operators, and they are pretty simple to understand.
    Let’s talk about each one:


    # Greater than


    The symbol “>” represents the greater-than operator.


    When you use it, the computer decides whether the value on the left side of the
    > symbol is larger than the value on the right side of the > symbol.


    # Less than


    The symbol “>=” represents the less-than operator.


    This time, we are figuring out if the value on the left of the “<” symbol is less,
    or smaller than the value on the right side of the “<” symbol.


    # Greater than or Equal to


    The symbol “>=” represents the greater-than-or-equal-to operator.'
  - '[PAGE 59]


    We’re already familiar with the first symbol, so let’s talk about the second symbol.
    We’ve used the equal sign (=) before to assign pieces of data to variables (“remember
    mood = happy”?). When we use it as an operator, though, we are partly deciding
    if the value on the left of the “>=” operator is equal to the value on the right
    of the “>=” operator.


    But this operator is special since there are two symbols this time. We are trying
    to decide if the value on the left of the “>=” operator is greater than the one
    on the right, or if the value on the left is the same as the value on the right.
    Only one of these cases needs to be true for the computer to decide that the entire
    expression is “true.”


    # Less than or Equal to


    The symbol “<=” represents the less-than operator.


    Just like the greater-than-or-equal-to operator, we are making sure at least one
    of the operators is correct. For the less-than-or-equal-to operator, we are looking
    at the values to see if the value on the left of the “<=” operator is either smaller
    than the one on the right of the “<=” operator or the same as the one on the right.


    # Equal to


    The symbol “==” represents the equal-to operator.


    This one is much simpler than the last two operators. Just like it sounds, it
    asks the computer to decide if the value on the left side of the “==” symbol is
    the same as the value on the right side of the “==” symbol. Easy!


    The computer doesn’t see integer and string types as the same types, either. So
    when we use the equal-to operator, remember that the computer will check that
    the values are the same type and the same value/number/text.'
- md: '## Not Equal to


    Last one! You’re so awesome for making it this far! The symbol “!=” represents
    the not-equal-to operator.


    Also, like the name, the not-equal-to operator asks the computer to figure out
    if the value on the left side of the “!=” symbol is not the same as the value
    on the right side of the “!=” symbol.


    ## Logical Operators


    Logical operators are used to help us compare true or false operands. These are
    very helpful because they can make our decision-making rules more complex, which
    means smarter code! There are three main logical operators: “And,” “or,” and “not.”
    Let’s see what each can do.


    ## And


    The "and" operator checks that the values on the right and left of it are both
    “True.”


    If there’s a point in our code that should only run when two conditions are met,
    we should use the "and" operator. Imagine that you’re going through a pizza buffet
    and you need to pick only the slices of pizza that you like. You like pepperoni
    and you like mushrooms, and you’d love to pick up a slice or two of that kind
    of pizza if it had both of those toppings.


    While walking around, you sadly see that there’s only a pizza with pepperoni but
    no mushrooms. Let’s say we had variables that held this information:


    ```

    pizza_has_pepperoni = True

    pizza_has_mushrooms = False

    ```


    To check that the pizza you were evaluating had both pepperoni and mushrooms,
    you’d use the "and" operator like this:


    ```

    pizza_has_pepperoni and pizza_has_mushrooms True

    ```


    The "and" operator allows you to check both conditions—that the pizza slice has
    pepperoni and that it has mushrooms. Only then would you take a slice of pizza,
    if both conditions were met! Unfortunately, you won’t be taking a slice, since
    only one condition is “True” :(…


    ## Or


    The “or” operator makes sure that at least one value being compared is “True.”


    Going back to our pizza example, let’s say that you couldn’t find any pizza that
    had both pepperoni and mushroom on it (bummer). Still wanting pizza, you decide
    that if the pizza has either pepperoni or mushroom on it, you’ll select that pizza.
    Here is where the "or" operator will come in handy. To check for either pepperoni
    or mushroom, you’d write code like this:


    ```

    pizza_has_pepperoni or pizza_has_mushrooms

    ```


    That way, if the pizza you were checking had either pepperoni or mushroom on it,
    you’d take it.


    ## Not


    The “not” operator checks to make sure that the value being compared is “False.”


    Just as you’d take any pizza that had pepperoni or mushroom on it, you would definitely
    not take any that had onions on it. Let’s say we had a variable called “pizza_has_onions”
    and its value was “True.” To make sure you don’t get any pizza with onions on
    it, you could use the “not” operator:


    ```

    not pizza_has_onion

    ```


    It looks a little funny if you try to read it out loud, but it is correct! You’re
    basically saying, “Hey, computer, make sure that the fact of the pizza having
    onions is not true.”


    ## Chapter 7: Operators in Python


    There is a variety of functions available in Python to work with numbers. Let’s
    look at a summary of them, after which we will look at each in more detail along
    with a simple example for each.


    | Function | Description |

    | --- | --- |

    | abs() | This returns the absolute value of a number. |

    | ceil() | This returns the ceiling value of a number. |

    | max() | This returns the largest value in a set of numbers. |

    | min() | This returns the smallest value in a set of numbers. |

    | pow(x,y) | This returns the power of x to y. |

    | sqrt() | This returns the square root of a number. |

    | random() | This returns a random value. |

    | randrange(start,stop,step) | This returns a random value from a particular range.
    |

    | sin(x) | This returns the sin value of a number. |

    | cos(x) | This returns the cosine value of a number. |

    | tan(x) | This returns the tangent value of a number. |


    ## Abs Function


    This function returns the absolute value of a number.


    **Example:** The following program shows the “abs” function.


    ```

    # This program looks at number functions

    a=-1.23

    print(abs(a))

    ```


    This program’s output will be as follows:


    1.23


    ## Ceil Function


    This function is used to return the ceiling value of a number. Note that for this
    program, we need to import the “math” module in order to use the “ceil” function.


    **Example:** The following program shows the ceil function:


    ```

    import math

    # This program looks at number functions

    a=1.23

    print(math.ceil(a))

    ```


    This program’s output will be as follows:


    2


    ## Max Function


    This function returns the largest value in a set of numbers.


    **Example:** The program below is used to show the “max” function.


    ```

    # This program looks at number functions

    print(max(3,4,5))

    ```


    This program’s output will be as follows:


    5


    ## Min Function


    This function returns the smallest value in a set of numbers.


    **Example:** The following program shows how the “min” function works.


    ```

    # This program looks at number functions

    print(min(3,4,5))

    ```


    This program’s output will be as follows:


    3


    ## Pow Function


    This function returns the value of “x” to the power of “y,” where the syntax is
    “pow(x,y).”


    **Example:** The following program shows the “pow” function:


    ```

    # This program looks at number functions

    print(pow(2,3))

    ```


    This program’s output will be as follows:


    8


    ## Sqrt Function


    This function returns the square root of a number. Note that for this program,
    we need to import the “math” module to use the “sqrt” function.


    **Example:** The next program shows how the “sqrt” function works:


    ```

    import math

    # This program looks at number functions

    print(math.sqrt(9))

    ```


    This program’s output will be as follows:


    3


    ## Random Function


    This function is used to return a random value.


    **Example:** The following program shows the random function:


    ```

    import random

    # This program looks at number functions

    print(random.random())

    ```


    The output will differ depending on the random number generated. Also, note that
    for this program, we need to use the “random” Python library. In our case, the
