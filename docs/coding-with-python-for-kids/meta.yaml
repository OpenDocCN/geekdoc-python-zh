    Now scroll to the bottom and choose “Windows x86-64 executable installer” to get
    the Windows x86 or 64-bit executable installer as shown in the image below:


    | macOS 64-bit/32-bit installer | Mac OS X |

    | macOS 64-bit installer | Mac OS X |

    | Windows help file | Windows |

    | Windows x86-64 embeddable zip file | Windows |

    | Windows x86-64 executable installer | Windows |

    | Windows x86-64 web-based installer | Windows |

    | Windows x86 embeddable zip file | Windows |

    | Windows x86 executable installer | Windows |

    | Windows x86 web-based installer | Windows |


    ## The Difference between the 32-Bit and 64-Bit Python


    You can select the 64-bit installer or the 32-bit installer when it comes to Windows
    and what determines your choice is your system’s processor.


    If your computer is running on a 32-bit processor, you can select the 32-bit installer.


    If your PC is running on a 64-bit processor, either installer will be able to
    work for most purposes. The 32-bit version generally uses less memory; the 64-bit
    version on the other hand performs better for applications with high computation.


    If you are not sure which version to select, just pick the 64-bit version.


    Once you click the appropriate link, a file labeled “Python-3.7.1-amd64.exe” will
    start downloading to your computer—it is about 25 MB. You can move the file to
    a more permanent area in your computer so that you install the program, and if
    necessary, reinstall it more easily later.


    ## Run Your Installer


    Having selected and downloaded your installer, you can now double click on the
    downloaded file to have a dialog box pop up.


    **Note:** Don’t forget to check the box that reads “add Python 3.x to PATH” to
    make sure the “interpreter” (a computer program that translates instructions in
    a program written in a high-level computer language into machine language and
    executes them) is positioned in your execution path.


    Finish by clicking on **Install Now** to complete the installation.


    ## Starting the Interpreter


    Once the installation is complete, the Python interpreter resides in the installed
    directory.


    By default, it is:


    ```

    C:\pythonxx in widows and /usr/local/bin/python x.x

    ```


    Here, ‘x’ stands for the version number. Invoking it from the command prompt or
    shell will require you to enter the location in the search path.


    A search path is a list of locations or directories where the OS looks for an
    executable. For instance, you can type the text in the image below in “Windows
    Command Prompt” to have the location added to the path for that session in particular.


    ```

    “set path=%path%;c:\python37”

    ```


    **Note:** “Python37” means version 3.7; your case might be different


    For “Mac OS,” you don’t have to worry about this because the installer will take
    care of the path.


    ## Start the Python


    Type “Python” in the command line to power up the interpreter in “immediate” mode.
    You can key in Python expressions directly and hit “Enter” to obtain the output.


    **Note:** “ >>> ” represents the output prompt, which informs you that the interpreter
    is prepared to take your input. When you type in “2 + 2” and tap “Enter,” you
    will receive “4” as the output. You can use this prompt as a calculator. If you
    want to leave this mode, just type “quit()” or “exit()” and tap “Enter.”


    ## Integrated Development Environment (IDE)


    You can write a Python script file or instructions with any text editor; all you
    have to do is save it with the extension “.py.” However, if you want to make your
    life much easier, you can use an IDE. An IDE is a software that offers you, the
    programmer, important features such as syntax highlighting and checking, code
    hinting, file explorers, and so on.


    By using an IDE, you remove redundant tasks and reduce the time you need for actual
    programming.


    Python comes with its own environment—known as “Python IDLE” (integrated development
    and learning environment)—that serves this purpose. You can use it to write, edit,
    debug (remove errors), and run Python programs. When you install a modern Python
    version on your computer, IDLE is automatically installed along with it. You can
    therefore access IDLE through the “Start” menu on a Windows computer. If you are
    using Linux or Mac that has Python installed on it, simply type “idle” at the
    command line.


    Congratulations! You can now write your first program!


    ## Chapter 9: Execution and Statement about a Program


    So far, you have learned the basics about Python programs. Now it’s time to learn
    how to enter programs into the computer, execute them, see how they perform and
    see how they display the results.


    An integrated development environment (IDE) is a type of software that enables
    programmers to both write and execute their source code. “Python IDLE” and “Eclipse”
    are such examples.


    ## Creating a New Python Module


    Once you open IDLE, the first thing you see is the “Python Shell” window, as shown
    in the image below:


    ![](img/36af8d3c01fab94e3dbff13bf934b479_75_0.png)


    Python Shell is an environment where you can type statements that are immediately
    executed. For example, if you type “7 + 3 “and hit the “Enter” key, the Python
    Shell will directly display the result of this operation.


    However, you should not write a Python program within the Python Shell window.
    To write a Python program, create a new Python file (known as a Python module).
    From Python Shell’s main menu select “File - New File” as shown in the following
    image:


    ![](img/36af8d3c01fab94e3dbff13bf934b479_76_0.png)


    ![](img/36af8d3c01fab94e3dbff13bf934b479_76_1.png)


    In the image below you can see the new empty module where you will write your
    Python programs!


    ![](img/36af8d3c01fab94e3dbff13bf934b479_77_0.png)


    ## Writing and Executing a Python Program


    You have just seen how to create a new Python module. In the recently created
    window “Untitled”, type the following (terrifying, and quite horrifying) Python
    program.


    ```

    Print ( “Hello World” )

    ```


    Now let’s try to execute the program! From the main menu, select “Run - Run Module”
    as shown in the image below, or hit the “F5” key.


    ![](img/36af8d3c01fab94e3dbff13bf934b479_78_0.png)


    Executing your first Python program!


    The Python IDLE prompts you to save the source code. Click on the **OK** button,
    select a folder and filename for your first program, and click on the **Save**
    button. The Python program is saved and executed, and then the output is displayed
    in the Python Shell window, as shown below:


    ![](img/36af8d3c01fab94e3dbff13bf934b479_78_1.png)


    Viewing the results of the executed program in the Python Shell window.


    Congratulations! You have just written and executed your first Python program!


    Now let’s write another Python program, one that prompts the user to enter his
    or her name. Type the following Python program and hit “F5” to execute the file.


    ```

    Name = input ( “Enter your name: “ )


    Print (“Hello” , name)


    Print (“Have a nice day!” )

    ```


    Once you execute the program, the message “Enter your name:” is displayed in the
    Python Shell window without the double quotes. The program waits for you to enter
    your name, as shown in the following image:


    ![](img/36af8d3c01fab94e3dbff13bf934b479_79_0.png)


    Viewing a prompt in the Python Shell window.


    Type your name and hit the “Enter” key. Once you do that, your computer continues
    to execute the rest of the statements. When the execution finishes, the final
    output is as shown in the image:


    ![](img/36af8d3c01fab94e3dbff13bf934b479_80_0.png)


    Responding to the prompt in the Python Shell window.


    ## Chapter 10: Python Modules


    ### Working with Modules in Python


    “Python modules” empower you to part portions of your program in various documents
    for simpler support and better performance.


    As a fledgling, you begin working with Python on the interpreter; later, when
    you have to write longer programs, you begin writing scripts. As your program
    develops more in size, you might need to part it into a few records for simpler
    support as well as reusability of the code. The answer to this is “Python modules.”
    You can characterize your most utilized capacities in a module and import it somewhere
    else, rather than duplicating their definitions into various projects. A module
    can be brought in by an additional program to utilize its functionality—you can
    also use the Python standard library this way.


    A module is a file consisting of Python code. It can define functions, classes,
    and factors; furthermore, it can likewise incorporate runnable code. Any Python
    record can be referenced as a module. A document containing Python code, for instance,
    “test.py,” is known as a module, and its name would be tested.


    There are different strategies for writing modules. However, the least complex
    path is to make a “.py” document that contains these capacities and factors.


    Instructional exercises will help you through writing your Python modules. You
    will find out about the following topics:'
