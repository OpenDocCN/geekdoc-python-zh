  md: '# Module Search Path


    You may require your modules to be utilized in various projects/programs, and
    their physical area in the directory can be different. If you need to utilize
    a module from some other catalog, you have a few options provided by Python.


    When you import a module named calculation, the interpreter first searches for
    an implicit module with that name. If not discovered, then it scans for a document
    named “calculation.py” in a rundown of registries given by the variable “sys.path.”


    “sys.path” contains these areas:


    +   - The catalog contains the input script (or the current registry).

    - Python path (a list of directory names, with a similar syntax to the shell variable
    “path”).

