    \ flipped to the\", myBook.direction)\n```\n\n如果操作正确，你将获得与上一段代码相同的输出。唯一的区别是你使用了“__init__”方法来运行在对象类中定义的实例。\n\
    \n### __str__ 方法\n\n这个方法告诉 Python 在打印对象时显示什么。所有 Python 对象中都有一个现有的“__str__”方法。如果你不创建自己的，Python\
    \ 将默认使用现有的那个来打印你的对象。但如果你想用打印函数显示其他内容，你可以定义自己的“__str__”来覆盖默认的。简单来说，这个方法改变了对象的打印方式。让我们看一个例子。\n\
    \n```\nclass Book:\n    def __init__(self, color, size, direction):\n        self.color\
