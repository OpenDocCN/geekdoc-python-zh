    # Chapter 11: Classes and Objects


    So far, we’ve seen that Python largely depends on the organization and collection
    of data from lists, which are a collection of variables, and functions, which
    are a collection of collecting codes together, so you can call or recall them
    whenever you need them. Modules also stem from functions, as a collection of these
    functions. There’s another form of classification referred to as “objects.” Being
    able to collect functions and variables (data) together is the reason why objects
    exist. It’s yet an easier way to classify your codes into smaller things, which
    eventually build up into a complex idea.


    To understand this better, here’s a simple illustration. If you’re asked to think
    up two random things, you’ll come up with the most random things, but we’ll use
    book and puppy for now. Go a further step by trying to think about these two objects.
    What are they? Describe them as much as you can. For the puppy, you’ll probably
    use terms like, “animal,” “living thing,” “smaller dog,” etc. For the book, you’ll
    probably say that it’s an inanimate object, and the color it has.


    Using the terms “animal,” “animate objects,” “smaller dog,” is the way of classifying
    the things you’ve listed.


    You may hear programmers say, “Python is object-oriented.” The objects they refer
    to here are the collection of codes and variables together. The fun thing about
    objects is that they’re quite easy to use, and although you can, you don’t as
    a matter of necessity have to create them yourself. We’ll now go ahead to learn
    how to create and use them.'
