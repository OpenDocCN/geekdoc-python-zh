    ## Random函数


    此函数用于返回一个随机值。


    **示例：** 以下程序展示了random函数：


    ```

    import random

    # This program looks at number functions

    print(random.random())

    ```


    输出将因生成的随机数而异。另外，请注意，对于此程序，我们需要使用“random” Python库。在我们的例子中，程序的输出是：


    0.005460085356885691


    ## Randrange函数


    此函数用于从特定范围返回一个随机值。请注意，我们再次需要导入“random”库才能使此函数工作。


    **示例：** 此程序用于展示random函数：


    ```

    import random

    # This program looks at number functions

    print(random.randrange(1,10,2))

    ```


    输出将因生成的随机数而异。在我们的例子中，程序的输出是：


    5


    ## Sin函数


    此函数返回一个数字的正弦值。


    **示例：** 以下程序展示了如何使用sin函数：


    ```

    import math

    # This program looks at number functions

    print(math.sin(45))

    ```


    此程序的输出将如下所示：


    0.8509035245341184


    ## Cos函数


    此函数返回一个数字的余弦值。


    **示例：** 此程序用于展示“cos”函数：


    ```

    import math

    # This program looks at number functions

    print(math.cos(45))

    ```


    此程序的输出将如下所示：


    0.5253219888177297


    ## Tan函数


    此函数返回一个数字的正切值。


    **示例：** 以下程序展示了“tan”函数的使用：


    ```

    import math

    # This program looks at number functions

    print(math.tan(45))

    ```


