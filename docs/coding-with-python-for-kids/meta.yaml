    \n使用“动物”、“有生命的物体”、“小狗”等术语，就是对你列出的事物进行分类的方式。\n\n你可能听程序员说，“Python是面向对象的。”他们这里指的对象是将代码和变量集合在一起的东西。对象的有趣之处在于它们非常容易使用，虽然你可以，但你不一定必须自己创建它们。我们现在将继续学习如何创建和使用它们。"
