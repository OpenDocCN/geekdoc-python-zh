    ```\n\nWhen the translator went over the import statement, it imported the calculation\
    \ module in your code, and afterwards by utilizing the “dot” operator, you had\
    \ the option to get to the “add()” function.\n\n## More on Import Statements\n\
    \nThere are more approaches to import the modules:\n\n- From…import statement\n\
    - From…import* statement\n- Retitling the imported module\n\n### From…Import Statement\n\
    \nThe “from…import” statement permits you to import explicit functions/variables\
    \ from a module as opposed to bringing in all things. In the past model, when\
    \ you brought “count” into “module_test.py,” both the “add()” and “sub()” capacities\
