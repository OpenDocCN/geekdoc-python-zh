    # Guess!


    This project will be another fun chance-based game that will make use of the “random”
    module. The purpose of the game will be to choose a number between a minimum and
    a maximum, and then the opponent tries to guess that number. If the player guesses
    a higher number, they will have to try a smaller one, and the other way around
    as well. Only a perfect match will turn into a win.


