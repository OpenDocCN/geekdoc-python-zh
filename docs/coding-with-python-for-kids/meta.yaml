    \n数据隐藏是限制对对象变量的访问，这样你只能通过方法来使用或更改它。Python 没有强制执行这种数据隐藏的机制，如果你愿意，可以编写遵循此规则的代码。\n\
    \n关于类和对象，你还需要学习最后一个方面，那就是多态性和继承。你可能对继承有所了解，但有 90% 的可能性你从未听说过多态性——相同的方法，相同的名称，但行为不同。\n\
