    ## Chapter 1: What Is a Programming Language and which Are the Most Popular Programming
    Languages?


    ### Programming Language


    A program is a set of instructions (also known as a computer program) that tell
    a computer how to perform certain tasks. A program can tell the computer what
    to do, when to do it, and what data to use as input or output. Then, a programming
    language is used to create the program to instruct a computer on how to perform
    specific tasks. There are many different programming languages, but they all have
    the same fundamental purpose of being able to instruct a computer on how to perform
    particular tasks.


    ### Which Are the Most Popular Programming Languages Now?


    ![](img/36af8d3c01fab94e3dbff13bf934b479_14_0.png)


    Nowadays, eight popular programming languages are being used extensively in the
    programming field: “C++,” “C#,” “JAVA,” “JAVASCRIPT,” “PHP,” “PYTHON,” “VISUAL
    BASIC,” and “HTML.”


    ### C++ Programming Language


    The C++ language is developed from the C language.


    The C language was developed by D. M. Ritchie of Bell Labs in 1972. It is not
    designed for beginners at first, but for computer professionals. C is a process-oriented
    programming language. When the scale of the software development projects increases,
    C is no longer suitable for the needs of computer development. It cannot handle
    complex and large tasks.


    In this software crisis situation, C++ language came into being; it was developed
    by Dr. Bjarne Stroustrup, from AT&T Bell Labs in the 1980s.


    The C++ language:

    - is compatible with both advanced and primary languages

    - has excellent portability (simple and easy to use)

    - supports for object-oriented programming

    - can handle large and complicated programs

    - has fast compilation speed and development


    ### C# Programming Language


    C# is an object-oriented, advanced programming language developed by Anders Hejlsberg
    and his team at “Microsoft.” It is a secure, modern, simple programming language
    derived from C and C++. C# is particularly suitable for software development under
    the “.NET” framework. It was designed to combine the high efficiency of “VB” (“Visual
    Basic”) with the power of C++. C# supports rapid program development, doubling
    the efficiency, and freeing programmers from the tedious, repetitive work of programming.
    It has a perfect design that makes it a wise choice for new programmers.


    The C# language:

    - is a modern general-purpose programming language.

    - is easy to learn.

    - is an object-oriented language.

    - works on “.NET” Framework.

    - can be used to develop high-efficient programs.

    - is programming by using components or modules.

    - is easily readable and maintainable.


    ### Java Programming Language


    The Java language was invented by “Sun Microsystems” in May 1995. Java is an object-oriented
    programming language. It has two characteristics: Powerful and easy-to-use.


    The Java language was developed from C++, so the syntax of Java is similar to
    that of C++.


    Programs written in Java can be widely used in personal PCs, database centers,
    game consoles, science supercomputers, mobile phones, global cloud computing,
    and the internet. Java has the world’s largest community of developers and professionals.


    The Java language:

    - is developed for the internet but makes security a top priority.

    - can make web pages come alive.

    - can change web pages from static to dynamic.

    - can block computer virus transmission.

    - can produce small applications (applets).

    - breaks through the machine environment.

    - once written, run anywhere.

    - can run across any computer platform.


