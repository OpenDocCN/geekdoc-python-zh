- md: "help. If you have an issue, you can’t figure out about the program, or there\
    \ is a link that you can’t find; you can ask for help right away and help will\
    \ be on your way immediately. The support system makes learning Python much easier,\
    \ and it makes using the program more fun too as everyone within the community\
    \ is talking about the same thing every day.\n\n## Python Is the Foundation that\
    \ You Need\n\nThese days, programming skills are a requirement for so many jobs\
    \ in the business market. Employers are looking for people who can program like\
    \ experts, so those who can understand programming language to understand the\
    \ data that has already been created by the business. Python is a much easier\
    \ programming language to learn and so it can help you learn the basis of the\
    \ programming language you need to know to land the kind of job you have always\
    \ dreamed of. Once you learn Python, you can master so many other programming\
    \ languages thereafter.\n\n## DAY 2: Introduction to Python Programming\n\n##\
    \ Chapter 3: OOP (Object-Oriented Programming)\n\n### Object-Oriented Programming\
    \ with Python\n\nPython allows several programming paradigms, including object-oriented\
    \ programming (OOP). The OOP is a way of structuring the code that makes it especially\
    \ effective by organizing and reusing code, although its abstract nature makes\
    \ it not very intuitive at first glance.\n\nObject-oriented programming in Python\
    \ is optional and so far, we have not used it directly—but we have done so from\
    \ the beginning. Although its biggest advantage appears with long and more complex\
    \ programs, it is very useful to understand how POO works since this is how Python\
    \ works internally.\n\nThe basic idea is simple. If we have a more complex type\
    \ of data than we have seen so far as lists or dictionaries, and we want to create\
    \ a new type of data with particular properties, we can define it with a “class,”\
    \ something similar to a “def” function. Suppose we want to create a type of data\
    \ called “Star,” which will only have one name, to begin with, we can write:\n\
    \n```\n# Let’s create star.py\nclass Star(object):\n    \"\"\"Class for stars\"\
    \"\"\n    def __init__(self, name):\n        self.name = name\n```\n\n```\n# Special\
    \ method called when doing print\ndef __str__(self):\n    return \"Stars {}\"\
    .format(self.name)\n```\n\nThe class has a special main function “__init__ ()”\
    \ that builds the element of the Star class (called an object) and is executed\
    \ when it creates a new object or instance of that class; we have put the name\
    \ as the only mandatory parameter, but it does not have to have any.\n\nThe mysterious\
    \ “self” variable, with which each function begins (called methods on objects),\
    \ refers to the specific object we are creating—this will be clearer with an example.\
    \ Now we can create “Star” type objects:\n\n```\n# Star.py library that includes\
    \ the Star import star class\n\n# New instance (object) of Star, with a parameter\
