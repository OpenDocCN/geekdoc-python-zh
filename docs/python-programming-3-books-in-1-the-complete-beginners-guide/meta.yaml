- md: '## Introduction to Strings


    Strings are the most significant information type since they are utilized in essentially
    every situation. We need strings when we need to demonstrate significant data
    to the user; for instance, alerts, prompts, declarations, ends, results that can
    be read by people.


    There will almost certainly be times where you need to manipulate this string
    or that. Maybe you’ll need to get its length, or you’ll need to split it or make
    another string from it. Maybe you’ll need to read what character is at x position.
    Whatever the reason is, the point is that there’s a reason.


    Go ahead and create a new file. As always, you can call it whatever you want.
    My file is going to be named strings.py. Uncreative name, sure, but we’re going
    to be getting creative with strings, believe me.


    So what is a string, really? Well, we obviously know that a string is a line of
    text, which goes without saying. But what goes into that?


    We’ve spoken quite a bit in this list about lists. Lists are actually a form of
    another variable that’s largely eschewed in Python programming called an array.
    An array is a pre-allocated set of data that goes together, in the most basic
    terms of speaking.


    Python comes from and is built upon a language called C. In C; there are actually
    data types. There are data types in Python, too, but Python saves the user time
    by setting the data type for the programmer instead of having the programmer declare
    it.


    One of the data types in C was called a char, which was a single character. In
    terms of computer-speak; there isn’t a native support for strings. Strings were
    simply arrays of characters. For example, if one wanted to make a string called
    “hello,” they would have done the following:


    ```

    char hello[6] = { ‘h’, ‘e’, ‘l’, ‘l’, ‘o’, ‘\0’ };

    ```


    Python, in its beautiful habit of maximum abstraction, keeps us from these complexities
    and lets us just declare:


    ```

    hello = “hello”

    ```


    The point is that strings, ultimately, are just sets of data. And like any set
    of data, they can be manipulated. There will be times, too, where we need to manipulate
    them.


    The most simple form of string manipulation is the concept of concatenation. Concatenated
    strings are strings that are put together to form a new string. Concatenation
    is super easy—you simply use the + sign to add the strings together.


    ```

    sentence = “My “ + “grandmother “ + “baked “ + “today.”

    print sentence

    ```


    # would print “My grandmother baked today.”


    The first thing to remember when working with string manipulation is that strings,
    like any set of data, start counting at 0. So the string “backpack” would count
    like so:


    ```

    backpack

    01234567

    ```


    There are a few different things that we can do with this knowledge alone. The
    first is that we can extract a single letter from it.


    Let’s say that the string “backpack” was stored in a variable called a backpack.
    We could extract the letter “p” from it by typing:


    Let''s say that the string "backpack" was stored in a variable called a backpack.
    We could extract the letter "p" from it by writing:


    ```

    letter = backpack[4]

    ```


    This would extract whatever the character at index 4 was in the string. Here,
    of course, it’s p.


    If we wanted to extract the characters from “b” to “p,” we could do the following:


    ```

    substring = backpack[ 0 : 4 ]

    ```


    This would give the variable substring a string equal to the value of backpack’s
    0 index to 4 index:


    ```

    backpack

    01234567

    ```


    Substring, thus, would have the value of “backp.” Quite the word.


    There are a few more things you can do with data sets and strings, specifically
    in order to get more specific results.


    - `backpack[start:4]` would give you all characters from the start to index four,
    like just before.

    - `backpack[4:end]` would give you all characters from index 4 to the end.

    - `backpack[:2]` would give you the first two characters, while `backpack[-2:]`
    would give you the last two characters.

    - `backpack[2:]` would give you everything but the first two characters, while
    `backpack[:-2]` would give you everything aside from the last two characters.


    However, it goes beyond this simple kind of arithmetic.


    String variables also have built-in functions called methods. Most things in Python—or
    object-oriented languages in general, are forms of things called objects. These
    are essentially variable types that have entire sets of properties associated
    with them.


    Every single string is an instance of the string class, thus making it a string
    object. The string class contains definitions for methods that every string object
    can access as an instance of the string class.


    For example, let’s create a bit of a heftier string.


    ```

    tonguetwister = “Peter Piper picked a peck of pickled peppers”

    ```


    The string class has a variety of built-in methods you can utilize in order to
    work with its objects.


    Let’s take the split method. If you were to type:


    ```

    splitList = tonguetwister.split(‘ ‘)

    ```


    It would split the sentence at every space, giving you a list of each word. `splitList`,
    thus, would look a bit like this: `[''Peter'', ''Piper'', ''picked'', ''a'', ''peck'',
    ''of'', ''pickled'', ''peppers'']`. Printing `splitList[1]` would give you the
    value ''Piper.''


    There’s also the count method, which would count the number of a certain character.
    Typing:


    ```

    tonguetwister.lower().count(‘p’)

    ```


    You would get the number 9.


    There’s the replace method, which will replace a given string with another. For
    example, if you typed:


    ```

    tonguetwister = tonguetwister.replace("peppers", "potatoes")

    ```


    `tonguetwister` would now have the value of "Peter Piper picked a peck of pickled
    potatoes".


    There''s the strip, lstrip, and rstrip methods, which take either a given character
    or whitespace off both sides of the string. This is really useful when you''re
    trying to parse user input. Unstripped user input can lead to unnecessarily large
    data sets and even buggy code.


    The last major one is the join method, which will put a certain character between
    every character in the string.


    ```

    print "-".join(tonguetwister)

    ```


    would print "P-e-t-e-r-P-i-p-e-r-p-i-c-k-e-[...]"


    There are also various boolean expressions that will return true or false. The
    `startswith(character)` and `endswith(character)` methods are two fantastic examples.
    If you were to type:


    ```

    tonguetwister.startswith("P")

    ```


    It would ultimately return true. However, if you were to type instead:


    ```

    tonguetwister.startswith("H")

    ```


    It would ultimately return false. These are used for an internal evaluation of
    strings as well as for evaluating user input.


    A few other examples are `string.isalnum()` that will see if all characters in
    the string are alphanumeric or if there are special characters, `string.isalpha()`
    that will see if all characters in the string are alphabetic, `string.isdigit()`
    which will check to see if the string is a digit or not, and `string.isspace()`
    which will check to see if the string is a space or not.


    These are all extremely useful for parsing a given string and making determinations
    on what to do if the string is or isn''t a certain way.


    ## The Functions


    When you are working with a language like Python, there will be times when you
    will need to work with something that is known as a function. These functions
    are going to be blocks of reusable code that you will use in order to get your
    specific tasks done, but when you define one of these functions in Python, we
    need to have a good idea of the two main types of functions that can be used and
    how each of them works. The two types of functions that are available here are
    known as built-in and user-defined.


    The built-in functions are the ones that will come automatically with some of
    the packages and libraries that are available in Python, but we are going to spend
    our time working with the user-defined functions because these are the ones that
    the developer will create and use for special codes they write. In Python though,
    one thing to remember no matter what kind of function you are working with is
    that all of them will be treated like objects. This is good news because it can
    make it a lot easier to work with these functions compared to what we may see
    with some other coding languages.


    The user-defined functions that we are going to talk about in the next section
    are going to be important and can really expand out some of the work that we are
    doing as well. But we also need to take a look at some of the work that we are
    able to do with our built-in functions as well. The list above includes many of
    the ones that are found inside of the Python language. Take some time to study
    them and see what they are able to do to help us get things done.


    ## Why Are User Defined Functions So Important?


    - For simplicity, a developer is going to have the option to write out some of
    their own functions, known as a user-defined function, or they are able to go
    through and borrow a function from another library, which may not be directly
    associated with Python. These functions are sometimes going to provide us with
    a few advantages depending on how and when we would like to use them in the code.
    Some of the things that we need to remember when working on these user-defined
    functions, and to gain a better understanding'
  mdcn: '## 字符串简介


    字符串是最重要的信息类型，因为它们几乎在所有场景中都会被使用。当我们需要向用户展示重要信息时，就需要字符串；例如，警报、提示、声明、结束语以及人类可读的结果。


    几乎可以肯定，你会有需要操作这个或那个字符串的时候。也许你需要获取它的长度，或者需要拆分它，或者用它创建一个新的字符串。也许你需要读取某个位置上的字符是什么。无论原因是什么，关键在于总有理由需要这样做。


    现在就创建一个新文件。和往常一样，你可以随意命名。我的文件将命名为 `strings.py`。名字确实没什么创意，但相信我，我们将在字符串上发挥创造力。


    那么，字符串到底是什么？显然，我们知道字符串是一行文本，这是不言而喻的。但其中包含了什么？


    在这个列表中，我们已经多次讨论过列表。列表实际上是另一种变量形式，在 Python 编程中很大程度上被回避，称为数组。用最基本的话来说，数组是一组预先分配的、相互关联的数据。


    Python 源自并建立在一种名为 C 的语言之上。在 C 语言中，实际上有数据类型。Python 中也有数据类型，但 Python 通过为程序员设置数据类型而不是让程序员声明它，为用户节省了时间。


    C 语言中的一种数据类型称为 `char`，它代表单个字符。从计算机术语的角度来看，字符串本身并没有原生支持。字符串只是字符数组。例如，如果有人想创建一个名为
    "hello" 的字符串，他们会这样做：


    ```

    char hello[6] = { ‘h’, ‘e’, ‘l’, ‘l’, ‘o’, ‘\0’ };

    ```


    Python 以其最大抽象的优美习惯，使我们免于这些复杂性，让我们只需声明：


    ```

    hello = “hello”

    ```


    关键在于，字符串最终只是数据集合。就像任何数据集合一样，它们可以被操作。我们也会有需要操作它们的时候。


    字符串操作最简单的形式是连接的概念。连接字符串是将字符串组合在一起形成新字符串。连接非常简单——你只需使用 `+` 号将字符串相加。


    ```

    sentence = “My “ + “grandmother “ + “baked “ + “today.”

    print sentence

    ```


    # 将打印出 “My grandmother baked today.”


    处理字符串操作时要记住的第一件事是，字符串像任何数据集合一样，从 0 开始计数。因此，字符串 "backpack" 的计数方式如下：


    ```

    backpack

    01234567

    ```


    仅凭这些知识，我们就可以做几件不同的事情。首先，我们可以从中提取单个字母。


    假设字符串 "backpack" 存储在一个名为 `backpack` 的变量中。我们可以通过输入以下内容来提取字母 "p"：


    假设字符串 "backpack" 存储在一个名为 `backpack` 的变量中。我们可以通过编写以下内容来提取字母 "p"：


    ```

    letter = backpack[4]

    ```


    这将提取字符串中索引为 4 的字符。当然，这里是 "p"。


    如果我们想提取从 "b" 到 "p" 的字符，可以这样做：


    ```

    substring = backpack[ 0 : 4 ]

    ```


    这将给变量 `substring` 一个等于 `backpack` 从索引 0 到索引 4 的值的字符串：


    ```

    backpack

    01234567

    ```


    因此，`substring` 的值将是 "backp"。真是个特别的词。


    对于数据集和字符串，你还可以做更多事情，特别是为了获得更具体的结果。


    - `backpack[start:4]` 将给你从开始到索引四的所有字符，就像刚才那样。

    - `backpack[4:end]` 将给你从索引 4 到末尾的所有字符。

    - `backpack[:2]` 将给你前两个字符，而 `backpack[-2:]` 将给你最后两个字符。

    - `backpack[2:]` 将给你除前两个字符外的所有内容，而 `backpack[:-2]` 将给你除最后两个字符外的所有内容。


    然而，这超出了这种简单算术的范畴。


    字符串变量还有内置函数，称为方法。Python 中的大多数东西——或者通常面向对象语言中的大多数东西，都是称为对象的东西的形式。这些本质上是具有与之关联的整套属性的变量类型。


    每个字符串都是字符串类的一个实例，因此使其成为一个字符串对象。字符串类包含每个字符串对象作为字符串类实例可以访问的方法的定义。


    例如，让我们创建一个稍长一点的字符串。


    ```

    tonguetwister = “Peter Piper picked a peck of pickled peppers”

    ```


    字符串类有多种内置方法，你可以利用它们来处理其对象。


    让我们看看 `split` 方法。如果你输入：


    ```

    splitList = tonguetwister.split(‘ ‘)

    ```


    它将在每个空格处拆分句子，给你一个包含每个单词的列表。因此，`splitList` 看起来会像这样：`[''Peter'', ''Piper'', ''picked'',
    ''a'', ''peck'', ''of'', ''pickled'', ''peppers'']`。打印 `splitList[1]` 将给你值 ''Piper''。


    还有 `count` 方法，它将计算某个字符的数量。输入：


    ```

    tonguetwister.lower().count(‘p’)

    ```


    你会得到数字 9。


    还有 `replace` 方法，它将用另一个字符串替换给定的字符串。例如，如果你输入：


    ```

    tonguetwister = tonguetwister.replace("peppers", "potatoes")

    ```


    `tonguetwister` 现在的值将是 "Peter Piper picked a peck of pickled potatoes"。


    还有 `strip`、`lstrip` 和 `rstrip` 方法，它们可以从字符串两侧移除给定的字符或空白。当你试图解析用户输入时，这非常有用。未去除空白的用户输入可能导致不必要的大数据集，甚至导致代码错误。


    最后一个主要方法是 `join` 方法，它将在字符串中的每个字符之间插入某个字符。


    ```

    print "-".join(tonguetwister)

    ```


    将打印出 "P-e-t-e-r-P-i-p-e-r-p-i-c-k-e-[...]"


    还有各种布尔表达式，它们将返回真或假。`startswith(character)` 和 `endswith(character)` 方法是两个很好的例子。如果你输入：


    ```

    tonguetwister.startswith("P")

    ```


    它最终将返回真。然而，如果你改为输入：


    ```

    tonguetwister.startswith("H")

    ```


    它最终将返回假。这些用于字符串的内部评估以及评估用户输入。


    其他一些例子包括 `string.isalnum()`，它将查看字符串中的所有字符是否为字母数字或是否存在特殊字符；`string.isalpha()`，它将查看字符串中的所有字符是否为字母；`string.isdigit()`，它将检查字符串是否为数字；以及
    `string.isspace()`，它将检查字符串是否为空格。


    这些对于解析给定字符串以及根据字符串是否为某种方式来决定做什么都非常有用。


    ## 函数


    当你使用像 Python 这样的语言时，有时你需要使用称为函数的东西。这些函数将是可重用的代码块，你将使用它们来完成特定任务，但当你在 Python 中定义其中一个函数时，我们需要很好地了解可以使用的两种主要函数类型以及每种类型的工作方式。这里可用的两种函数类型称为内置函数和用户定义函数。


    内置函数是随 Python 中一些可用的包和库自动提供的，但我们将花时间处理用户定义函数，因为这些是开发人员将为他们编写的特殊代码创建和使用的函数。然而，在
    Python 中，无论你使用哪种函数，都要记住一点，它们都将被视为对象。这是个好消息，因为与我们可能在其他一些编程语言中看到的情况相比，使用这些函数会容易得多。


    我们将在下一节讨论的用户定义函数将非常重要，并且可以真正扩展我们正在做的一些工作。但我们也需要看看我们能够用内置函数做的一些工作。上面的列表包括 Python
