  mdcn: '这与人类大脑的工作方式相同。随着成长，你通过反复试错学习了许多重要的生活技能。通过犯错，你的大脑学会了区分正面和负面反馈，并会尽力争取积极的结果。


    公平地说，即使在深度学习中，仍然需要你的输入。你不能自信地假设输出总是完美的。这尤其适用于当你的输入数据不足以满足你对模型所要求的输出类型时。


    这里的基本因素是，机器学习和深度学习都必须使用所有数据。你所拥有数据的质量将对从这些模型中获得的结果产生持久影响。说到数据，你不能随意使用遇到的任何数据。要有效使用这两种模型中的任何一种，你必须学会如何检查数据，并确保你使用的是适合你所选模型的正确格式。


    机器学习算法通常需要标记和结构化的数据。因此，如果你需要为需要大量数据的复杂问题寻找解决方案，它们并不是最佳选择。


    在我们用来区分卡车和自行车的例子中，我们试图在理论概念中解决一个非常简单的问题。然而，在现实世界中，深度学习模型被应用于更复杂的模型中。如果你考虑涉及的过程，从概念到分层数据处理以及数据必须通过的不同层数，使用深度学习模型来解决简单问题将是资源的浪费。


    虽然所有这些类别的AI都需要数据来帮助执行我们所需的智能，但深度学习模型比机器学习算法需要显著更广泛的数据访问。这很重要，因为深度学习算法必须在输出被传递之前，毫无疑问地证明其完美性。只有当深度学习模型接触到数百万个数据点时，它们才能轻松识别神经网络数据处理层中的差异和概念。这有助于排除所有其他可能性。然而，在机器学习的情况下，模型可以通过已经预定的标准进行学习。


    ## 不同的应用场景


    了解了机器学习和深度学习之间的区别后，这两者在现实世界中可以应用于哪些场景？如果你处理海量数据，深度学习是一个可靠的解决方案。在这种情况下，你将需要解释并从这些数据中做出决策；因此，你需要一个适合你资源分配的模型。


    当处理过于复杂而无法使用机器学习算法解决的问题时，也推荐使用深度学习模型。除此之外，重要的是要认识到深度学习模型通常具有非常高的资源需求。因此，当你有足够的财力和资源分配来获取相关程序和硬件时，你应该考虑使用深度学习模型。


    当使用可用于训练不同机器学习算法的结构化数据时，机器学习是一个可行的解决方案。在算法能够执行所请求的任务之前，涉及大量的学习过程。


    你也可以使用机器学习来享受人工智能的好处，而不必实施一个全面的人工智能模型。


    机器学习算法通常用于帮助或加速企业和工业流程中的自动化过程。一些正在使用的机器学习模型的常见例子包括广告、身份验证器、信息处理和营销。这些应该能帮助你的企业在市场上更好地定位自己，以应对竞争。


    ## 使用Scikit-Learn库的机器学习应用


    为了理解Scikit-Learn库如何用于开发机器学习算法，让我们使用“来自IBM Watson仓库的Sales_Win_Loss数据集”，其中包含从汽车零部件批发供应商的销售活动中获得的数据。我们将构建一个机器学习模型来预测哪些销售活动会成功，哪些会亏损。


    该数据集可以使用Pandas导入，并使用Pandas技术如“head()、tail()和dtypes()”进行探索。将使用“Seaborn”的绘图技术来可视化数据，并使用Scikit-Learn的预处理来处理数据。将使用“LabelEncoder()”和“train_test_split()”将数据集划分为训练子集和测试子集。


    为了从我们的数据集中生成预测，将使用三种不同的算法，即“线性支持向量分类和K近邻分类器”。为了比较这些算法的性能，将使用Scikit-Learn库技术“accuracy_score”。模型的性能分数可以使用Scikit-Learn和“Yellowbrick”可视化进行可视化。


    ### 导入数据集


    要导入“来自IBM Watson仓库的Sales_Win_Loss数据集”，第一步是使用“import pandas as pd”导入“Pandas”模块。


    然后我们利用一个变量URL，如“https://community.watsonanalytics.com/wp-content/uploads/2015/04/WA_Fn-UseC_-Sales-Win-Loss.csv”，来存储将下载数据集的URL。


    现在，将使用“read_csv() as sales_data = pd.read_csv(url)”技术来读取上述由Pandas模块提供的“csv或逗号分隔值”文件。然后，csv文件将被转换为Pandas数据框架，返回变量为“sales_data”，框架将存储在其中。


    对于新的“Pandas”用户，上面代码中的“pd.read_csv()”技术将生成一个称为“数据框架”的表格数据结构，其中每行的索引包含在第一列中，每列的标签/名称在第一行中，是从数据集获取的初始列名。在上面的代码片段中，“sales_data”变量生成如下图所示的表格。


    在上图中，“row0, row1, row2”代表单个记录索引，“col0, col1, col2”代表数据集的单个列或特征的名称。


    通过此步骤，你已成功存储了数据集的副本并将其转换为“Pandas”框架！


    现在，使用“head() as sales_data.head()”技术，可以显示数据框架中的记录，如下所示，以“感受”数据集中包含的信息。


    ### 数据探索


    现在我们有了自己的数据集副本，该副本已转换为“Pandas”数据框，我们可以快速探索数据，以了解可以从中学到哪些信息，并相应地规划行动方案。


    在任何ML项目中，数据探索往往是一个非常关键的阶段。即使是快速的数据集探索也能为我们提供重要的信息，否则这些信息很容易被忽略，而这些信息可以提出重要的问题，我们可以尝试使用我们的项目来回答。


    这里将使用一些第三方Python库来协助我们处理数据，以便我们能够有效地将这些数据与Scikit-Learn的强大算法一起使用。我们在前面部分用于查看导入数据集的一些初始记录的相同“head()”技术可以在这里使用。事实上，“(head)”实际上能够做更多的事情，而不仅仅是显示数据记录，并且可以自定义“head()”技术以仅显示选定的记录，例如使用命令“sales_data.head(n=2)”。此命令将选择性地显示数据集的前2条记录。乍一看，很明显，诸如“Region”和“Supplies
    Group”等列包含字符串数据，而诸如“Opportunity Result”、“Opportunity Number”等列则由整数值组成。还可以看到，在“Opportunity
    Number”列中，每条记录都有唯一的标识符。


    类似地，要显示表格底部的选定记录，可以使用“tail() as sales_data.tail()”。


    要查看数据集中可用的不同数据类型，可以使用Pandas技术“dtypes() as sales_data.dtypes”。通过此信息，可以列出数据框架中可用的数据列及其各自的数据类型。例如，我们可以弄清楚“Supplies
    Subgroup”列是“object”数据类型，而“Client Size by Revenue”列是“integer数据类型”。因此，我们了解了包含整数值或字符串数据的列。


    ### 数据可视化


    至此，我们已经完成了基本的数据探索步骤，因此我们将尝试构建一些吸引人的图表来直观地展示信息，并从我们的数据集中发现其他隐藏的叙述。


    在所有提供数据可视化功能的Python库中；“Seaborn”是最佳可用选项之一，因此我们将使用它。确保“Seaborn”提供的Python绘图模块已安装在你的系统上并准备使用。现在，请按照以下步骤为数据集生成所需的图表：


    - **步骤1** – 使用命令“import seaborn as sns”导入“Seaborn”模块。'
