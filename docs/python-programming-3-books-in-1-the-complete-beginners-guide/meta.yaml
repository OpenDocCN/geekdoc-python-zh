    pretty broad field to work with, and this means that it doesn’t work on its own,
    but also with some other fields at the same time. The fields you will be able
    to work with often depend on the kind of project.


    One thing that you are going to notice when you start with machine learning is
    that it can merge with statistics and probability. It is so crucial for a lot
    of the projects that you choose to start learning how these three different areas
    are going to work together.


    Now, there are a few different methods that you can utilize with probability and
    statistics, and all of them are important to the learning process that you need
    to see happen here. The first thing to consider is picking out the right algorithm.
    And as you go through this guidebook, you will find that there are a lot of different
    algorithms that you can use, including supervised, unsupervised, and also reinforced
