    Subaru\",\"Insured\")\nprint(subaru.ignite(\"Fast\"))\nprint(subaru.stop())\n\
    ```\n\n**Note**\nThe methods ignite() and stop() are referred to as instance methods\
    \ because they are an instance of the object created.\n\n### Practice Exercise\n\
    - Create a class Dog and instantiate it.\n- Create a Python program to show the\
    \ names of two dogs and their two attributes from a.\n\n### Inheritance\nA way\
    \ of creating a new class by using details of the existing class devoid of modifying\
    \ it is called inheritance. The derived class or child class is the newly formed\
    \ class, while the existing class is called the parent or base class.\n\n**Example**\n\
    Start IDLE.\nNavigate to the File menu and click New Window.\nType the following:\n\
    \n```\nclass Dog:\n    def __init__(self):\n        print(\"Dog is available\"\
    )\n    def whoisThis(self):\n        print(\"Dog\")\n    def walk(self):\n   \
    \     print(\"Walks gently\")\nclass Spitz(Dog):    #Child class\n    def __init__(self):\n\
    \        super().__init__()\n        print(\"Spitz is now available\")\n    def\
    \ whoisThis(self):\n        print(\"Pitbull\")\n    def wag(self):\n        print(\"\
    Strong\")\npitbull = Spitz()\npitbull.whoisThis()\npitbull.walk()\npitbull.wag()\n\
    ```\n\n**Discussion**\nWe created two Python classes in the program above. The\
    \ classes were Dog as the base class and Spitz as the derived class. The derived\
    \ class inherits the functions of the base class. The method __init__() and the\
    \ function super() are used to pull the content of __init__() method from the\
    \ base class into the derived class.\n\n### Encapsulation in Python\nEncapsulation\
    \ in the Python object-oriented programming approach is meant to help prevent\
    \ data from direct modification. Private attributes in Python are denoted using\
