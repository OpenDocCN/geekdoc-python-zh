    \ Python 的标准库包含了你需要的所有部分。你将能够使用 Python 的标准库来处理我们在本指南中将要探讨的所有编码。\n\nPython 有许多扩展和其他库，可以帮助增强这种语言的功能。尽管在使用\
    \ Python 语言时我们能做很多事情，但你会发现也有一些很好的扩展可以查看。这些将是不错的选择，因为它们将扩展 Python 语言的处理能力，使其更容易处理科学、数学、机器学习、数据科学等更多领域。\n\
    \n你将使用的扩展类型实际上取决于你使用这种语言的总体目标。如果你想使用机器学习和这种语言，那么有很多优秀的库和扩展可供选择。但有些也适用于其他功能和特性，因此你需要确保选择适合你需求的扩展。\n\
    \nPython 拥有一个庞大的社区，可以为初学者提供所需的支持和帮助。在某些时候，你会遇到一些不确定如何编码的部分，或者在编码时遇到一些难以理解的问题。这在许多初学者中都会发生，所以不必担心。由于有一个由喜欢使用\
    \ Python 的其他程序员和编码者组成的友好社区，你将能够很快找到所需的帮助。\n\n这个社区将帮助你整体上手，他们可以回答你所有的问题，确保你理解正在发生的事情，并为你提供所有需要的资源，以确保你做得很好。你可以根据需要经常访问这个社区，以确保你能够处理所有想要使用的不同编码选项。\n\
    \nPython 被认为是一种面向对象编程语言，它依赖于类和对象来保持事物的整洁和有序。目前，这对你来说可能意义不大。但从长远来看，它将帮助我们确保代码的所有部分都组织有序且易于使用。代码的设置方式允许你在创建所需类的同时，仍然能够添加代码对象并在以后找到所有内容。\n\
    \n这是我们在一些传统编码语言中无法找到的。这些语言有时可能比 Python 和其他选项更难使用，因为它们不像 Python 那样"
