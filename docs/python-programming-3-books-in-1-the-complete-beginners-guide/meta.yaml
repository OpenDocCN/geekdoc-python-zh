  md: '# Conclusion


    For every programmer, the beginning is always the biggest hurdle. Once you set
    your mind to things and start creating a program, things automatically start aligning.
    The needless information is automatically omitted by your brain through its cognitive
    powers and understanding of the subject matter. All that remains is a grey area
