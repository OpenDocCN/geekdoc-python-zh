    \n## 函数参数选项\n\n任何时候当你准备在代码中使用这类函数时，你会发现它们能够处理四种类型的参数。这些参数及其背后的含义是预先定义的，开发者并不总是能够随意更改。相反，开发者可以选择使用它们，但必须遵循与之相关的规则。你确实可以选择添加一些规则，以使函数按照你想要的方式工作。正如我们之前所说，有四种参数类型可供使用，包括：\n\
