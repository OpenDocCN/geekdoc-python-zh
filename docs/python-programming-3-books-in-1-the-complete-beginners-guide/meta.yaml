    # **Built-in Functions with Tuples**


    Several built-in functions are often used with tuple to carry out specific tasks.
    Here are the functions that you can use with a tuple:


    # *Len()*


    Returns the number of elements on a tuple.


    ```

    >>> tuple_one = (''cat'', ''dog'', ''lion'', ''elephant'', ''zebra'')

    >>> len(tuple_one)

    5

