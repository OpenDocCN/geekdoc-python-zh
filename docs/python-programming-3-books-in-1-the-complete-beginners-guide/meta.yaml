    # Support Vector Machines


    The SVM is one of the most popular supervised learning algorithms due to its capability
    of solving both regressions as well as classification problems. In addition, it
    has the ability to identify outliers as well. This is one all-inclusive data science
    algorithm that you cannot miss. So what’s so special about this algorithm?


    First of all, support vector machines don’t need much processing power in order
    to keep up with the prediction accuracy. This algorithm, however, is in a league
    of its own and you won’t have to worry too much about sacrificing training speed
    for the accuracy or the other way around. Furthermore, support vector machines
    can be used to eliminate some of the noise as well while performing the regression
    or classification tasks.


    This type of algorithm has many real-world applications and that is why it is
    important for you to understand its implementation. It is used in facial recognition
    software, text classification, handwriting recognition software,'
  merge: -1
  pgno: 211
- img_proc: true
  md: 'and so on. However, the basic concept behind it involves the distance between
    the nearest points where a hyperplane is selected from the margin between a number
    of support vectors. Take note that what is known as a hyperplane here is the object
    that divides the information space for the purpose of classification.


    To put all of this theory in an application, we are going to rely on the Scikit-learn
    library once again. The algorithm will be implemented in such a way to demonstrate
    the accuracy of the prediction in the case of identifying real banknotes. We mentioned
    earlier that support vector machines are effective when it comes to image classification;
    therefore this algorithm is perfectly suited for our goals. What we need to solve
    in this example is a simple binary classification problem because we need to train
    the algorithm to determine whether the banknote is valid or not.


    The bill will be described using several attributes. Keep in mind that unlike
    the other classification algorithms, a support vector machine determines its decision
    limit by defining the maximum distance between the data points which are nearest
