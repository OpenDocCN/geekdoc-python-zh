  md: '# Data Analysis, the Basics


    # What Is Data Analysis?


    To keep it simple, data analysis is going to be the practice where a company can
    take their raw data and then order and organize it. When the data is organized
    in this manner, and run through a predictive model, it is going to help the company
    extract useful information out of it. The process of organizing and thinking about
    our data is going to be very important as it is the key to helping us understand
    what the data does and does not contain at any given time.


    Many companies have been collecting data for a long time. They may gather this
    data from their customers, from surveys, from social media, and many other locations.
    And while collecting the data is an important step that we need to focus on as
    well, another thing to consider is what we can do with the data. You can collect
    all of the data that you would like, but if it just sits in your cloud or a data
    warehouse and is never mined or used, then it is going to become worthless to
    you, and you wasted a lot of time and money trying to figure it all out.


    This is where data analysis will come in. It is able to take all of that raw data
    and actually, put it to some good use. It will use various models and algorithms,
    usually with the help of machine learning and Python, in order to help us to understand
    what important insights and information are found in our data and how we are able
    to utilize these for our own benefit.


