    # How NumPy Broadcasting Works


    Broadcasting refers to the ability of NumPy to perform arithmetic operations on
    different shaped arrays. If two arrays have the same shape, then arithmetic operations
    are easily performed since they are between corresponding elements. This becomes
    impossible in the case of differently sized arrays, but NumPy has a solution for
    this. In NumPy, the smaller array is “broadcasted” across the larger array so
    that they have the same shapes. It will be clear by this example:


    Suppose I have an array ‘A’ of 4X5 shape and an array ‘B’ of size 1X5, then the
    smaller array B is stretched such that it also has a size of 4X5, same as ‘A.’
    The new elements in B are simply a copy of original elements.


    Note: NumPy doesn’t actually make copies of elements, instead it uses the original
    scalar value repeatedly to make it as memory and computationally efficient as
    possible.


