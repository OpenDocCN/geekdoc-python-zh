    ## PAC Learning Strategies


    While we have already talked about how you are able to set up some of your own
    hypothesis and good training data to work with the other parts we have discussed
    in the previous section, it is now time to move on to the idea of PAC learning
    and what this is going to mean when we are talking about machine learning. There
    are going to be two main confines and parameters that need to be found with this
    learning model including the output classifier and the accuracy parameter.


    To start us off on this, we are going to take a look at what is known as the accuracy
    parameter. This is an important type of parameter because it is going to help
    us determine how often we will see correct predictions with the output classifier.
    These predictions have to be set up in a way that is going to be accurate but
    also is based on any information that you feed the program.


    It is also possible for you to work with what is called the confidence parameter.
    This is a parameter that will measure out how likely it is that the predictor
    will end up being a certain level of accuracy. Accuracy is always important, but
    there are going to be times when the project will demand more accuracy than others.
