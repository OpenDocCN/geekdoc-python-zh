    与阶跃函数不同，线性激活函数提供了一系列激活值。它计算与输入成比例的输出。形式上：F(X)=WX，其中 X 是输入。


    该函数支持多个输出，而不仅仅是 1 或 0 值。由于它是线性的，该函数不支持用于模型训练的反向传播。


