- md: "## Installation and Setup\n\n**Installation Instructions for Python**\n\n*Windows*\n\
    \n- 1. From the official Python website, click on the “Downloads” icon and select\
    \ Windows.\n- 2. Click on the “Download Python 3.8.0” button to view all the downloadable\
    \ files.\n- 3. On the subsequent screen, select the Python version you would like\
    \ to download. We will be using the Python 3 version under “Stable Releases.”\
    \ So scroll down the page and click on the “Download Windows x86-64 executable\
    \ installer” link.\n- 1. A pop-up window titled “python-3.8.0-amd64.exe” will\
    \ be shown.\n- 2. Click on the “Save File” button to start downloading the file.\n\
    - 3. Once the download has completed, double click the saved file icon, and a\
    \ “Python 3.8.0 (64-bit) Setup” pop window will be shown.\n- 4. Make sure that\
    \ you select the “Install Launcher for all users (recommended)” and the “Add Python\
    \ 3.8 to PATH” checkboxes. Note—If you already have an older version of Python\
    \ installed on your system, the “Upgrade Now” button will appear instead of the\
    \ “Install Now” button, and neither of the checkboxes will be shown.\n- 5. Click\
    \ on “Install Now” and a “User Account Control” pop up window will be shown.\n\
    - 6. A notification stating, “Do you want to allow this app to make changes to\
    \ your device” will be shown, click on Yes.\n- 7. A new pop up window titled “Python\
    \ 3.8.0 (64-bit) Setup” will be shown containing a setup progress bar.\n- 8. Once\
    \ the installation has been completed, a “Set was successful” message will be\
    \ shown. Click on Close.\n- 9. To verify the installation, navigate to the directory\
    \ where you installed Python and double click on the python.exe file.\n\n## Macintosh\n\
    \n- 1. From the official Python website, click on the “Downloads” icon and select\
    \ Mac.\n- 2. Click on the “Download Python 3.8.0” button to view all the downloadable\
    \ files.\n- 3. On the subsequent screen, select the Python version you would like\
    \ to download. We will be using the Python 3 version under “Stable Releases.”\
    \ So scroll down the page and click on the “Download macOS 64-bit installer” link\
    \ under Python 3.8.0, as shown in the picture below.\n- 4. A pop-up window titled\
    \ “python-3.8.0-macosx10.9.pkg” will be shown.\n- 5. Click “Save File” to start\
    \ downloading the file.\n- 6. Once the download has completed, double click the\
    \ saved file icon, and an “Install Python” pop window will be shown.\n- 7. Click\
    \ “Continue” to proceed, and the terms and conditions pop up window will appear.\n\
    - 8. Click Agree and then click “Install.”\n- 9. A notification requesting administrator\
    \ permission and password will be shown. Enter your system password to start the\
    \ installation.\n- 10. Once the installation has finished, an “Installation was\
    \ successful” message will appear. Click on the Close button, and you are all\
    \ set.\n- 11. To verify the installation, navigate to the directory where you\
    \ installed Python and double click on the python launcher icon that will take\
    \ you to the Python Terminal.\n\n## Getting Started\n\nWith the Python terminal\
    \ installed on your computer, you can now start writing and executing the Python\
    \ code. All Python codes are written in a text editor as (.py) files and executed\
    \ on the Python interpreter command line as shown in the code below, where “nineplanets.py”\
    \ is the name of the Python file:\n\n```\n“C: \\Users\\Your Name\\python nineplanets.py”\n\
    ```\n\nYou will be able to test a small code without writing it in a file and\
    \ simply executing it as a command line itself by typing the code below on the\
    \ Mac, Windows, or Linux command line, as shown below:\n\n```\n“C: \\Users\\Your\
    \ Name\\python”\n```\n\nIn case the command above does not work, use the code\
    \ below instead:\n\n```\n“C: \\Users\\Your Name\\py”\n```\n\nIndentation – The\
    \ importance of indentation, which is the number of spaces preceding the code,\
    \ is fundamental to the Python coding structure. In most programming languages,\
    \ indentation is added to enhance the readability of the code. However, in Python,\
    \ the indentation is used to indicate the execution of a subset of the code, as\
    \ shown in the code below\n\n```\nIf 7 > 2:\n    print (‘Seven is greater than\
    \ two’)\n```\n\nIndentation precedes the second line of code with the print command.\
    \ If the indentation is skipped and the code was written as below, an error will\
    \ be triggered:\n\n```\nIf 7 > 2:\nprint (‘Seven is greater than two’)\n```\n\n\
    The number of spaces can be modified but is required to have at least one space.\
    \ For example, you can execute the code below with higher indentation, but for\
    \ a specific set of codes, the same number of spaces must be used, or you will\
    \ receive an error.\n\n```\nIf 7 > 2:\n    print (‘Seven is greater than two’)\n\
    ```\n\nAdding Comments – In Python, comments can be added to the code by starting\
    \ the code comment lines with a “#, ” as shown in the example below:\n\n```\n\
    #Any relevant comments will be added here\nprint (‘Nine planets’)\n```\n\nComments\
    \ serve as a description of the code and will not be executed by the Python terminal.\
    \ Make sure to remember that any comments at the end of the code line will lead\
    \ to the entire code line being skipped by the Python terminal, as shown in the\
    \ code below. Comments can be very useful in case you need to stop the execution\
    \ when you are testing the code.\n\n```\nprint (‘Nine Planets’)#Comments added\
    \ here\n```\n\nMultiple lines of comments can be added by starting each code line\
    \ with “#, ” as shown below:\n\n```\n#Comments added here\n#Supplementing the\
    \ comments here\n#Further adding the comments here\nprint (‘Nine Planets’)\n```\n\
    \n## Python Variables\n\nIn Python, variables are primarily utilized to save data\
    \ values without executing a command for it. A variable can be created by simply\
    \ assigning the desired value to it, as shown in the example below:\n\n```\nA\
    \ = 999\nB = ‘Patricia’\nprint (A)\nprint (B)\n```\n\nA variable could be declared\
    \ without a specific data type. The data type of a variable can also be modified\
    \ after it’s an initial declaration, as shown in the example below:\n\n```\nA\
    \ = 999 # A has data type set as int\nA = ‘Patricia’ # A now has data type str\n\
    print (A)\n```\n\nSome of the rules applied to the Python variable names are as\
    \ follows:\n\n- 1. Variable names could be as short as single alphabets or more\
    \ descriptive words like height, weight, and more.\n- 2. Variable names could\
    \ only be started with an underscore character or a letter.\n- 3. Variable names\
    \ must not start with numbers.\n- 4. Variable names can contain underscores or\
    \ alphanumeric characters. No other special characters are allowed.\n- 5. Variable\
    \ names are case sensitive. For example, ‘weight,’ ‘Weight,’ and ‘WEIGHT’ will\
    \ be accounted for as 3 separate variables.\n\n## Assigning Value to Variables\n\
    \nIn Python, multiple variables can be assigned DISTINCT values in a single code\
    \ line, as shown in the example below:\n\n```\nA, B, C = ‘violet,’ maroon, ‘teal’\n\
    print (A)\nprint (B)\nprint (C)\n```\n\nOR multiple variables can be assigned\
    \ SAME value in a single code line, as shown in the example below:\n\n```\nA,\
    \ B, C = ‘violet’\nprint (A)\nprint (B)\nprint (C)\n```\n\nTo view the data type\
    \ of any object, you can use the “type ()” function as shown in the example below:\n\
    \n```\nA = ‘Violet’\nprint (type (A))\n```\n\n## Assigning the Data Type to Variables\n\
    \nA new variable can be created by simply declaring a value for it. This set data\
    \ value will, in turn, assign the data type to the variable.\n\nTo assign a specific\
    \ data type to a variable, the constructor functions listed below are used:\n\n\
    | Constructor Functions | Data Type |\n| --- | --- |\n| A = str (‘Nine Planets)’\
    \ | str |\n| A = int (55) | Int (Must be a whole number, positive or negative,\
    \ with no decimals, no length restrictions) |\n| A = float (14e6) | Float (Floating\
    \ point number must be a positive or negative number with one or more decimals;\
    \ maybe scientific number an ‘e’ to specify an exponential power of 10) |\n| A\
    \ = complex (92j) | Complex (Must be written with a ‘j’ as an imaginary character)\
    \ |\n| A = list ((‘teal’, maroon, ‘jade’)) | list |\n| A = range (3, 110) | range\
    \ |\n| A = tuple ((‘teal’, maroon, ‘jade’)) | tuple |\n| A = set ((‘teal’, maroon,\
    \ ‘jade’)) | set |\n| A = frozenset (( ‘teal’, ‘jade’, | frozenset |"
