    Sigmoid 函数是人工神经网络中最常用的激活函数之一。形式上，sigmoid 函数等于 1 与输入指数之和的倒数：F(X) =1/ (1+exp (-X))


    Sigmoid 函数的输出被限制在 0 和 1 之间。更准确地说，输出取 0 到 1 之间的任何值，并提供清晰的预测。实际上，当 X 大于 2 或小于 -2
    时，Y 的值接近曲线的边缘（即更接近 0 或 1）。


    ### Sigmoid 激活函数


    从上图可以看出，这种激活函数的缺点是，对于小于 -4 和大于 4 的输入值，输出的变化很小。这个问题被称为“梯度消失”，意味着在曲线的水平极端区域梯度非常小。这使得使用
    sigmoid 函数的神经网络在接近边缘时学习非常缓慢，并且计算成本高昂。


    Tanh 函数是另一种类似于 sigmoid 函数的激活函数。该函数的数学公式为：F(X)=tanh(X)=[2/(1+exp(-2X))]-1.


