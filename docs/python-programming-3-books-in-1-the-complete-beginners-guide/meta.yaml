    \n```\n>>> my_tuple = ('a', 5, 3.5, ['P', 'y', 't', 'h', 'o', 'n'])\n>>>\n```\n\
    \n## 替换元组\n\n要替换 `my_tuple` 中索引为 3 的列表里索引为 2 的项目：\n\n```\n>>> my_tuple[3][2] =\
    \ 'x'\n>>>\n```\n\n3 是列表的索引，2 是项目索引。\n\n```\n>>> my_tuple\n('a', 5, 3.5, ['P',\
    \ 'y', 'x', 'h', 'o', 'n'])\n>>>\n```\n\n虽然你不能替换或修改其他数据类型，但你可以将元组重新赋值为一组完全不同的值或元素。\n\
    \n## 重新赋值元组\n\n要重新赋值元组，你只需列出一组不同的元素并将其赋值给该元组。要重新赋值 `new_tuple`：\n\n```\n>>> my_tuple\
    \ = ('c', 'o', 'd', 'e', 'r')\n>>>\n```\n\n## 删除元组\n\n要删除一个元组及其存储的所有项目，你将使用关键字\
    \ `del`。\n\n语法是：\n\n```\ndel tuple_name\n```\n\n因此，要删除 `new_tuple`：\n\n```\n>>>\
    \ del my_tuple\n```\n\n## 元组成员测试\n\n要测试一个元组是否包含特定项目，你可以使用成员运算符 `in` 和 `not in`。\n\
    \n```\n>>> our_tuple = ('p', 'r', 'o', 'g', 'r', 'a', 'm', 'm', 'e', 'r')\n>>>\
    \ 'g' in our_tuple\nTrue\n>>> 'l' in our_tuple\nFalse\n>>> 'e' not in our_tuple\n\
