    ```\n\n### Example\n\n```\n>>> new_tuple = (\"p\", \"r\", \"o\", \"g\", \"r\"\
    , \"a\", \"m\", \"m\", \"e\", \"r\")\n>>> new_tuple.count('m')\n2\n>>> new_tuple.count('r')\n\
    3\n>>> new_tuple.count('x')\n0\n>>>\n```\n\n### Index(x)\n\nReturns the index\
    \ of the first element that is equal to the given element.\n\nThe syntax is:\n\
    \n```\nmytuple.index(a)\n```\n\n### Example\n\n```\n>>> new_tuple = (\"p\", \"\
    r\", \"o\", \"g\", \"r\", \"a\", \"m\", \"m\", \"e\", \"r\")\n>>> new_tuple.index('m')\n\
    6\n>>> new_tuple.index('r')\n1\n>>> new_tuple.index('g')\n3\n>>>\n```\n\n## Built-in\
    \ Functions with Tuples\n\nSeveral built-in functions are often used with tuple\
    \ to carry out specific tasks. Here are the functions that you can use with a\
    \ tuple:\n\n### Len()\n\nReturns the number of elements on a tuple.\n\n```\n>>>\
    \ tuple_one = ('cat', 'dog', 'lion', 'elephant', 'zebra')\n>>> len(tuple_one)\n\
    5\n>>>\n```\n\n### Max()\n\nReturns the largest element on a tuple.\n\n```\n>>>\
    \ numbers_tuple = (1, 5, 7, 9, 10, 12)\n>>> max(numbers_tuple)\n12\n>>>\n```\n\
    \nWhen a tuple holds items of purely string data type, max() evaluates the items\
    \ alphabetically and returns the last item.\n\n```\n>>> my_tuple = ('car', 'zebra',\
    \ 'book', 'hat', 'shop', 'art')\n>>> max(my_tuple)\n'zebra'\n>>>\n```\n\nUsing\
    \ max() on tuples with mixed data types (string and numbers) will raise a TypeError\
    \ due to the use of unorderable types.\n\n### Min()\n\nReturns the smallest element\
    \ on a tuple.\n\n```\n>>> numbers_tuple = (1, 5, 7, 9, 10, 12)\n>>> min(numbers_tuple)\n\
    1\n>>>\n```\n\nWhen used on a tuple that contains purely string data type min()\
    \ evaluates the items alphabetically and returns the first item.\n\n```\n>>> my_tuple\
    \ = ('car', 'zebra', 'book', 'hat', 'shop', 'art')\n>>> min(my_tuple)\n'art'\n\
    >>>\n```\n\n### Sorted()\n\nReturns a sorted list but does not sort the tuple\
    \ itself.\n\n```\n>>> my_tuple = ('dog', 'bird', 'ant', 'cat', 'elephant')\n>>>\
    \ sorted(my_tuple)\n['ant', 'bird', 'cat', 'dog', 'elephant']\n>>>\n```\n\nThe\
    \ order of elements inside the my_tuple, however, remains the same:\n\n```\n>>>\
    \ my_tuple\n('dog', 'bird', 'ant', 'cat', 'elephant')\n>>>\n```\n\n### Sum()\n\
    \nReturns the total of all items on a tuple.\n\n```\n>>> my_tuple = (5, 10, 15,\
    \ 20, 25, 30)\n>>> sum(my_tuple)\n105\n>>>\n```\n\n### Tuple()\n\nConverts iterables\
    \ like string, list, dictionary, or set to a tuple.\n\nHow to convert a string\
    \ to a tuple\n\n**Example #1**\n\n```\n>>> tuple(\"Programmer\")\n('P', 'r', 'o',\
    \ 'g', 'r', 'a', 'm', 'm', 'e', 'r')\n>>>\n```\n\n**Example #2**\n\n```\n>>> my_string\
    \ = (\"Hello World\")\n>>> tuple(my_string)\n('H', 'e', 'l', 'l', 'o', ' ', 'W',\
    \ 'o', 'r', 'l', 'd')\n>>>\n```\n\n**How to Convert a Dictionary to a Tuple**\n\
    \n**Example #1**\n\n```\n>>> tuple({'Name':'Joshua', 'Animal':'elephant', 'Color':\
    \ 'blue', 'Age':22})\n('Age', 'Color', 'Name', 'Animal')\n>>>\n```\n\n**Example\
    \ #2**\n\n```\n>>> my_dict = {'Name':'Jack', 'Area':'Florida', 'subscription':'premium'}\n\
    >>> tuple(my_dict)\n('Name', 'Area', 'subscription')\n>>>\n```\n\n**How to Convert\
    \ a List to a Tuple**\n\n**Example #1**\n\n```\n>>> tuple(['red', 'blue', 'yellow',\
    \ 'green', 'orange', 'violet'])\n('red', 'blue', 'yellow', 'green', 'orange',\
    \ 'violet')\n>>>\n```\n\n**Example #2**\n\n```\n>>> my_list = ['interest', 'rate',\
    \ 'principal', 'discount', 'rollover']\n>>> tuple(my_list)\n('interest', 'rate',\
    \ 'principal', 'discount', 'rollover')\n>>>\n```\n\n### Enumerate()\n\nReturns\
    \ an enumerate object containing the value and index of all tuple elements as\
    \ pairs.\n\n```\n>>> my_tuple = (1, 3, 5, 7, 9, 11, 13, 15)\n>>> enumerate(my_tuple)\n\
    <enumerate object at 0x03237698>\n>>>\n```\n\n## Iterating Through a Tuple\n\n\
    You can iterate through each item in a tuple with the ‘for’ loop.\n\n```\n>>>\
    \ for fruit in ('apple', 'peach', 'pineapple', 'banana', 'orange'):\n    print(\"\
    I love \" + fruit)\nI love apple\nI love peach\nI love pineapple\nI love banana\n\
    I love orange\n```\n\n## Tuples vs. Lists\n\nExcept for the symbols used to enclose\
    \ their elements and the fact that one is mutable and the other is not, tuples\
    \ and lists are similar in many respects. You will likely use a tuple to hold\
    \ elements that are of different data types, while you will prefer a list when\
    \ working on elements of similar data types.\n\nThere are good reasons to choose\
    \ a tuple over a list to handle your data.\n\n- The immutable nature of tuples\
    \ results in faster iteration, which can help improve a program’s performance.\n\
    - Immutable tuple elements can be used as dictionary keys, something that is not\
    \ possible with a list.\n- Implementing unchangeable data as a tuple will ensure\
    \ that it will stay write-protected."
