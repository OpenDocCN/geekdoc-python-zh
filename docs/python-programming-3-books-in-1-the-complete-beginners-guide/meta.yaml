    "Hello, welcome to"，然后与作为参数输入的字符串连接。


    ### Import 语句


    此语句用于导入模块。

    通过任何 Python 代码文件，其过程如下：


    - Python 解释器在文件系统中搜索当前执行的目录。

    - 然后，解释器在其配置中搜索其预定义的路径。

    - 当它遇到第一个匹配项（模块的名称）时，解释器会自动从头到尾执行它。

    - 首次导入模块时，Python 将生成一个编译后的 .pyc 扩展文件。


    此扩展文件将用于该模块的后续导入。

    当解释器检测到自上次生成以来模块已被修改时，它将生成一个新模块。


    **示例：**

    这将打印：

    你必须将导入的文件保存在 Python 使用 `import` 语句的同一目录中，以便 Python 能够找到它。


    正如我们在示例中看到的，导入模块允许我们通过外部文件来增强程序的功能。

    现在，让我们看一些例子。第一个是一个计算器，我们将创建一个执行所有数学函数的模块，以及另一个运行计算器本身的程序。

    我们做的第一件事是模块 "calculator.py"，它负责执行所有必要的操作。

    其中包括加法、减法、除法和乘法，如你所见。

    我们包含了条件语句的使用，如 `if`、`else` 和 `elif`。

    我们还包含了异常的使用，这样当用户在计算器的除法数字中输入错误值时，程序就不会卡住。

    之后，我们将创建一个程序，该程序必须导入前面提到的模块，以便它能够执行所有相关的数学运算。'
