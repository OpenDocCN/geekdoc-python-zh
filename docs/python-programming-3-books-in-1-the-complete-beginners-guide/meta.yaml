    \n要访问第8个元素：\n\n```\n>>> my_tuple[7]\n'm'\n>>>\n```\n\n要访问第6个元素：\n\n```\n>>> my_tuple[5]\n\
    'a'\n>>>\n```\n\n## 负索引\n\n由于元组是一种序列类型，Python 允许对元组使用负索引。最后一个元素的索引为 -1，倒数第二个元素的索引为\
    \ -2，依此类推。\n\n```\n>>> my_tuple = ('p', 'r', 'o', 'g', 'r', 'a', 'm', 'm', 'e',\
    \ 'r')\n>>> my_tuple[-1]\n'r'\n>>> my_tuple[-7]\n'g'\n>>>\n```\n\n## 元组切片\n\n\
    如果你想同时访问多个项目，你需要使用切片运算符，即冒号 (`:`)。到现在，你一定已经非常熟悉切片的工作原理了。\n\n为了了解如何从元组中切片出一系列项目，我们创建\
    \ `new_tuple`：\n\n```\n>>> new_tuple = ('i', 'm', 'm', 'u', 't', 'a', 'b', 'l',\
