    当我们审视其核心时，Theano将是Python库之一，它不仅有助于深度学习，还可用于定义、优化和评估许多涉及多维数组的数学表达式。Theano之所以能实现这一点，是因为它与NumPy库紧密集成，并且其GPU使用在整体上保持相当透明。虽然你可以使用Theano库来帮助构建一些深度学习网络，但它通常被视为这些神经网络的构建模块，就像NumPy库在我们进行科学计算时作为构建模块一样。随着我们深入探讨，我们将讨论的大多数其他库都将围绕Theano库构建，这使得它比其他一些选项更易于访问和使用。


    ## TensorFlow


    类似于我们在Theano库中看到的，TensorFlow将是一个开源选项，可以在数据流图的帮助下进行数值计算。这个库最初是为Google机器智能组织内Google
    Brain团队的研究而开发的。自那时起，这个库已经转变为一个开源选项，以便公众可以将其用于深度学习和数据科学需求。


    与Theano相比，TensorFlow库的最大优势之一是它能够处理分布式计算。当我们为项目使用多个GPU时，这一点尤其正确，尽管Theano也在努力改进这一点。


    ## Keras


    许多程序员发现，在执行深度学习模型和其他任务时，他们喜欢使用Keras库。Keras被视为一个模块化的神经网络库，比我们讨论的其他一些库更简约。这个库可以使用TensorFlow或Theano作为后端，因此你可以选择最适合你任何需求的后端。这个库的主要目标是，你应该能够快速地对模型进行实验，并尽可能快地从你的想法过渡到结果。


    许多程序员喜欢这个库，因为即使作为初学者，你构建的网络也会感觉几乎自然且简单。它将包括一些最佳的优化器、归一化甚至激活层算法，因此如果你的过程包括这些，这是一个很好的选择。


    如果你想尽快训练你的网络，使用像MXNet这样的库可能是更好的选择。但如果你想调整超参数，那么你可能需要利用Keras的能力来设置四个独立的实验，然后评估这些实验结果之间的相似性或差异。


    ## Sklearn-Theano


    在使用深度学习时，有时你会想要端到端地训练一个CNN。而有时则不需要。相反，当不需要时，你可以将你的CNN视为特征提取器。这在你可能遇到的一些情况下最有用，即没有足够的数据从头开始训练CNN。因此，对于这个，只需将你的输入图像通过一个流行的预训练架构传递，该架构可以包括VGGNet、AlexNet和OverFeat等选项。然后，你可以使用这些预训练选项并从你想要的层中提取特征，通常是全连接层。


    ## Nolearn


    一个适合你使用的库是Nolearn库。这是一个很好的库，可以帮助进行一些初始的GPU实验，尤其是在MacBook Pro上。它也是一个很好的库，可以帮助在Amazon
    EC2 GPU实例上执行一些深度学习。


    虽然Keras将TensorFlow和Theano包装成更用户友好的API，但你会发现Nolearn库也能做到这一点，但它会使用Lasagna库来实现。此外，我们在Nolearn中找到的所有代码都将与Scikit-Learn兼容，这对于你想要处理的许多项目来说是一个很大的优势。


    ## Digits


    首先要注意的是，这个库不被视为一个真正的深度学习库。虽然它是用Python编写的，并且代表深度学习GPU训练系统。原因在于这个库更像是一个Web应用程序，可用于训练你借助Caffe创建的一些深度学习模型。你可以稍微修改源代码以使用Caffe以外的后端，但这在过程中需要大量额外的工作。而且由于Caffe库在其功能方面相当出色，并且可以帮助完成你想要实现的许多深度学习任务，因此不值得你花费时间。


    如果你过去曾花时间使用Caffe库，你已经可以证明定义你的.prototxt文件、生成图像的数据集、运行网络以及通过提供的终端监控网络训练是乏味的。好消息是，DIGITS库旨在通过允许你仅从浏览器完成许多这些任务（如果不是全部任务）来解决所有这些问题。因此，它可能不是一个深度学习库本身，但当你在使用Caffe库时遇到困难时，它确实会派上用场。


    除了上述所有优点之外，用户交互的界面被认为是出色的。这是因为它可以为我们提供一些有价值的统计信息和图表，以帮助你更有效地训练模型。你还可以轻松地可视化网络的一些激活层，以根据需要帮助处理各种输入。最后，这个库的另一个可能的好处是，如果你有一张特定的图像想要测试，你有几个选择来完成这个任务。第一个选择是将图像上传到DIGITS服务器。或者，你可以输入图像的URL，然后你用Caffe创建的模型将能够自动对图像进行分类，并在浏览器中显示你想要的结果。


    Python是可用于帮助完成深度学习、机器学习甚至人工智能（涵盖前两个主题）等任务的最佳编程语言之一。其他语言可以处理我们一直在讨论的深度学习，但没有一种语言能像Python那样高效、强大、拥有如此多的选项，或者为初学者设计。


    这就是为什么我们将注意力集中在Python语言以及我们可以选择的一些最佳库上，以帮助完成各种深度学习任务。这些库中的每一个都可以加入你的项目，并提供一套独特的功能和技能来完成工作。浏览其中一些库，看看哪一个最适合你的数据分析，并在完成深度学习时为你提供深刻的见解。


    ## 结论


    本书到此结束。下一个里程碑是充分利用你新获得的Python编程、数据科学、数据分析和机器学习知识，这些知识催生了“硅谷”这个强大的存在。许多跨越不同行业的公司都可以从数据分析中受益。这使他们能够获得各自行业所需的大量权力和控制力，并确保他们能够真正打动客户并在过程中取得良好成果。只要使用得当，学习如何使用数据分析将改变你开展业务的方式。


    这本指南手册组织良好，旨在探索数据分析的全部内容，以及我们如何利用它来造福自己。市面上有很多商业工具，但数据分析旨在帮助我们专注于发现数据中隐藏的模式和见解，使我们更容易基于数据做出决策，而不是像过去那样依赖直觉和猜测。而当涉及到确保我们以正确的方式完成数据分析时，没有什么比使用Python编程语言来完成事情更好的了。


    在我们进行自己的数据分析时，有许多方面需要发挥作用，我们必须花时间学习这些如何运作，以及如何将它们整合在一起。这正是我们将在本指南手册中所做的。当你准备好了解更多关于Python数据分析以及所有帮助我们理解数据和如何运营业务的不同部分时，请务必重新查阅本指南以帮助你。


    你还将培养从Python环境中加载和导出数据集的技能。


