- md: '## Dictionaries in Python


    We will cover a new data type that facilitates a flexible way to organize data.
    Using the knowledge about lists, soon you will be able to create data structures
    that will be useful in almost any application you may think of.


    A dictionary can store many values just like a list. However, they can index different
    data types. Keys of a dictionary are associated with values. When combined, that
    is called the key-value pair. Let’s start by creating a new dictionary variable.


    ```python

    flat = {''rooms'': ''2'', ''bathrooms'': ''1'', ''floor'': ''3rd'', ''apartment'':
    ''306''}

    # Note the curly braces

    print(f"My Apartment has {flat[''rooms'']} rooms, {flat[''bathrooms'']} bathroom")

    ```


    Program output:

    ```

    C:\Users\...\PycharmProjects\GettingStarted\venv\Scripts\Python.exe

    C:/Users/.../PycharmProjects/GettingStarted/Start.py

    My Apartment has 2 rooms, 1 bathroom

    Process finished with exit code 0

    ```


    Dictionaries, unlike lists, can be identified by other data types that are not
    necessarily integers, although it can use integers as keys as well.


    ### Dictionaries vs. lists


    The order of list items does matter when trying to compare them to other lists.
    Meanwhile, dictionaries can find if a list that already exists, even if the keys
    are out of order. This does not mean that the order is not important. If a coder
    maintains a uniform order in their lists, then this is not an issue. However,
    the main problem appears once you start getting unordered data, especially from
    users.


    Try the following sequence in the editor.


    ```python

    flat = [''rooms'', ''bathrooms'', ''floor'', ''apartment'']

    apartment = [''apartment'', ''bathrooms'', ''rooms'', ''floor'']

    print(flat == apartment) # When you use == you are asking if they are equal to
    each other

    flat = {''rooms'': ''2'', ''bathrooms'': ''1'', ''floor'': ''3rd'', ''apartment'':
    ''306''} # Note the curly braces

    apartment = {''apartment'': ''306'', ''bathrooms'': ''1'', ''rooms'': ''2'', ''floor'':
    ''3rd''}

    print(flat == apartment)

    ```


    Program output:

    ```

    C:\Users\...\PycharmProjects\GettingStarted\venv\Scripts\Python.exe C:/..

    False

    True

    Process finished with exit code 0

    ```


    ### Useful methods


    There are a few useful methods that you can use with dictionaries. These methods
    are particularly useful when combined with loops. All of the following methods
    need to be used by adding a dot notation after the name of the variable followed
    by a parenthesis.

    The first method is the keys(), which will output the keys to a dictionary. The
    next method is the value(), which will output the values of keys. The last method
    is the items() which will output both the keys and values between parenthesis
    and separated by a comma.

    Try out the example below.


    ```python

    flat = {''rooms'': ''2'', ''bathrooms'': ''1'', ''floor'': ''3rd'', ''apartment'':
    ''306''}

    print(flat.keys())

    print(flat.values())

    print(flat.items())

    ```


    Program output:

    ```

    C:\Users\...\PycharmProjects\GettingStarted\venv\Scripts\Python.exe

    C:/Users/.../PycharmProjects/GettingStarted/MyFirstProgram.py

    dict_keys([''rooms'', ''bathrooms'', ''floor'', ''apartment''])

    dict_values([''2'', ''1'', ''3rd'', ''306''])

    dict_items([(''rooms'', ''2''), (''bathrooms'', ''1''), (''floor'', ''3rd''),
    (''apartment'', ''306'')])

    Process finished with exit code 0

    ```


    ### Value or key check


    While using a dictionary, one of the functions that will most likely be needed
    regularly is to check for a certain value in your dictionary. For this exercise,
    we will be using two operators; the ‘in’ and the ‘not’ operators. These two operators
    can tell you if a certain key or value in a dictionary exists. Note that these
    operators can also be used in lists as well as logic. These operators will come
    out with a Boolean output either ‘True’ or ‘False’.

    Here are some lines of codes to try out.


    ```python

    flat = {''rooms'': 2, ''bathrooms'': 1, ''floor'': ''3rd'', ''apartment'': 306}

    print(''rooms'' in flat.keys()) # Determining if there is a key called rooms

    print(''1st'' in flat.values()) # Determining if there is a value called 1st

    print(3 not in flat.items()) #Determining if there is neither a value nor key
    of 3

    ```


    Program output:

    ```

    C:\Users\...\PycharmProjects\GettingStarted\venv\Scripts\Python.exe

    C:/Users/.../PycharmProjects/GettingStarted/MyFirstProgram.py

    True

    False

    True

    Process finished with exit code 0

    ```


    There is another method that can be used with dictionaries, and it makes it easy
    to fetch a specific piece of data. This is called the get() method.

    Check out the example below, to see how it is used inside the editor.


    ```python

    flat = {''rooms'': 2, ''bathrooms'': 1, ''floor'': ''3rd'', ''apartment'': 306}

    print(f"I live in the apartment {flat.get(''apartment'')}") #getting the apartment
    number

    ```


    Program Output:

    ```

    C:\Users\...\PycharmProjects\GettingStarted\venv\Scripts\Python.exe

    C:/Users/.../PycharmProjects/GettingStarted/MyFirstProgram.py

    I live in the apartment 306

    Process finished with exit code 0

    ```


    ## The modules


    ### What are the Modules?


    In Python, a module is a portion of a program (an extension file) that can be
    invoked through other programs without having to write them in every program used.

    Besides, they can define classes and variables.

    These modules contain related sentences between them and can be used at any time.

    The use of the modules is based on using a code (program body, functions, variables)
    already stored on it called import.

    With the use of the modules, it can be observed that Python allows simplifying
    the programs a lot because it allows us to simplify the problems into a smaller
    one to make the code shorter so that programmers do not get lost when looking
    for something in hundreds of coding lines when making codes.


    ### How to Create a Module?


    To create a module in Python, we don''t need a lot; it''s very simple.

    For example: if you want to create a module that prints a city, we write our code
    in the editor and save it as "mycity.py".

    Once this is done, we will know that this will be the name of our module (omitting
    the .py sentence), which will be assigned to the global variable __city__.

    This is a very simple code designed for users of Python 2.

    The print function is not in parentheses, so that''s the way this Python version
    handles that function.

    But, beyond that, we can see that the file "mycity.py" is pretty simple and not
    complicated at all, since the only thing inside is a function called "print_city"
    which will have a string as a parameter, and what it will do is to print "Hello,
    welcome to", and this will concatenate with the string that was entered as a parameter.


    ### Import Statement


    This statement is used to import a module.

    Through any Python code file, its process is as follows:


    - The Python interpreter searches the file system for the current directory where
    it is executed.

    - Then, the interpreter searches for its predefined paths in its configuration.

    - When it meets the first match (the name of the module), the interpreter automatically
    executes it from start to finish.

    - When importing a module for the first time, Python will generate a compiled
    .pyc extension file.


    This extension file will be used in the following imports of this module.

    When the interpreter detects that the module has already been modified since the
    last time it was generated, it will generate a new module.


    **Example:**

    This will print:

    You must save the imported file in the same directory where Python is using the
    import statement so that Python can find it.


    As we could see in our example, importing a module allows us to improve the functionalities
    of our program through external files.

    Now, let''s see some examples. The first one is a calculator where will create
    a module that performs all the mathematical functions and another program that
    runs the calculator itself.

    The first thing we do is the module "calculator.py" that is responsible for doing
    all the necessary operations.

    Among them are the addition, subtraction, division, and multiplication, as you
    can see.

    We included the use of conditional statements such as if, else, and elif.

    We also included the use of exceptions so that the program will not get stuck
    every time the user enters an erroneous value at the numbers of the calculator
    for the division.

    After that, we will create a program that will have to import the module previously
    referred to so that it manages to do all the pertinent mathematical'
