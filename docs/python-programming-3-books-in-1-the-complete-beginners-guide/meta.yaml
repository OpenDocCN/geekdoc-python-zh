    ## Python Language Basics, IPython and Jupyter Notebooks


    ### IPython


    IPython, same as Interactive Python, is a capable toolkit that allows you to experience
    Python interactively. It has two main components: a dependent Python Shell interface,
    and Jupyter kernels.


    These components have many features, such as:


    - Persistent input history

    - Caching of outputs

    - Code completion

    - Support for ‘magic’ commands

    - Highly customizable settings

    - Syntax highlighting

    - Session logging

    - Access to system Shell

    - Support to python’s debugger and profiler


    Now, let’s go into each of these components and see how these features come to
    life.


    ### IPython Shell


    The objective of this Shell is to provide a superior experience than the default
    Python REPL.


    To run the IPython Shell, you just need to call the command below on your system
    console.


    #### Interface


    At first glance, the IPython Shell looks like a normal boring Shell, with some
    initial version information, and some user tips. However, it has great features
    that make it shine.


    #### Help


    You can type “?” after an accessible object at any time you want more details
    about it.


    #### Code Completion


    You can press “TAB” key at any time to trigger the code completion.


    #### Syntax Highlight


    The code is automatically highlighted depending on the variables and keywords
    you are using.


    #### Run External Commands


    External commands can be run directly using “!” at the beginning of the input.


    #### Magic Commands


    Magic commands add incredible capabilities to IPython. Some commands are shown
    below:


    - %time – Shows the time to execute the command.

    - %timeit – Shows the mean and standard deviation of the time to execute the command.

    - %pdb – Run the code in debug mode, creating breakpoints on uncaught exceptions.

    - %matplotlib – This command arranges all the setup needed to IPython work correctly
    with matplotlib, this way IPython can display plots that are outputs of running
    code in new windows.


    There are multiple magic commands that can be used on IPython Shell, for a full
    list of the built-in commands check this [link](link) or type “%lsmagic”.


