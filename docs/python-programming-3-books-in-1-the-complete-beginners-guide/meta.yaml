- img_proc: true
  md: 'greater than 0 and is equal to the product of 0.1 and X when X is less than
    zero. This function is provided as follows: F(X)=max (0.1*X, X)


    This function has a small positive gradient that 0.1 when X has negative values,
    which makes this function support backpropagation for negative values. However,
    it may not provide a consistent prediction for these negative values.


    The parametric ReLu function is similar to the Leaky ReLu function that takes
    the gradient as a parameter to the neural network to define the output when X
    is negative. The mathematical formulation of this function is as follows: F(X)=max
    (aX, X)


    There are other variations of the ReLu function such as the exponential linear
    ReLu. This function, unlike the other variations of the ReLu the Leaky ReLu and
    parametric ReLu, has a log curve for negative values of X instead of the linear
    curves like the Leaky ReLu and the parametric ReLu functions. The downside of
    this function is it saturates for large negative values of X. Other variations
    exist which rely on the same concept of defining a gradient greater than 0 when
    X has negative values.


    The Softmax function is another type of activation function used differently.
    This function is usually applied only to the output layer when a classification
    of the inputs into several different classes is needed. In fact, the Softmax function
    supports several classes and provides the probability of input to belong to a
    specific class. It normalizes outputs of every category between 0 and 1 then divides
    by their sum to provide that probability. Given all these activation functions,
    where each one has its pros and cons, the question now which one should be used
    in a neural network? The answer is simply that having a better understanding of
    the problem at hand will help guide into a specific activation function, especially
    if the characteristics of the function being approximated are known beforehand.
    For instance, a sigmoid function is a good choice for a classification problem.
    In case the nature of the function being approximated is unknown, it is highly
    recommended to start with a ReLu function than try other activation function.
    Overall, the ReLu function works well for a wide range of applications. It is
    an ongoing research, and you may try your own activation function.'
