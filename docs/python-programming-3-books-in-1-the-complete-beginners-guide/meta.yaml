    # Pandas DataFrame


    A Pandas DataFrame is probably the most used data structure offered by Pandas.
    A Pandas DataFrame is a rectangular table that contains an ordered collection
    of columns. A DataFrame column can each consist of different data types such as
    Booleans, strings, integers, etc. Unlike a series, a Pandas DataFrame has both
    rows and column indices. The best way to think of a Pandas as a DataFrame is like
    a spreadsheet document, or, on a more technical side, a dictionary of Pandas series
    sharing a unique index.


    The most common way to create a Pandas DataFrame is by passing a python dictionary
    that contains equal length lists or a Numpy array to the DataFrame function.'
