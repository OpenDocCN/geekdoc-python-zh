    \ `IndexError`。此外，使用非整数数字类型作为索引将引发 `NameError`。\n\n为了说明元组的工作原理，我们创建一个以字符串为元素的\
    \ `my_tuple`。\n\n```\n>>> my_tuple = ('p', 'r', 'o', 'g', 'r', 'a', 'm', 'm',\
