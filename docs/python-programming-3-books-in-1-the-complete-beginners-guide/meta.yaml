  mdcn: '## 机器学习基础


    随着你开始投入更多时间学习机器学习及其提供的所有内容，你会发现有许多不同的学习算法可供使用。当你对这些算法了解更多时，你会惊叹于它们所能实现的功能。


    但在我们真正投入时间和精力去研究这些学习算法之前，我们首先需要了解一些构成机器学习运作方式的基础模块。本章将深入探讨这些基础模块的工作原理，并确保你为充分利用机器学习中的学习算法做好准备。


    ### 学习框架


    既然我们已经进展到这一步，现在是时候更仔细地审视在机器学习中会遇到的一些框架了。这将部分基于统计学，以及你计划在机器学习中使用的模型（稍后会详细介绍）。让我们深入探讨学习框架中你需要了解的一些不同部分，以便真正充分利用你的机器学习过程。


    假设你决定是时候去一个新的岛屿度假了。你在岛上遇到的当地人非常喜欢吃木瓜，但你对这种食物的经验非常有限。不过你决定尝试一下，于是前往市场，希望能找出哪种木瓜最适合你，味道最好。


    现在，你有几种方法可以找出最适合你的木瓜。你可以先问问市场上的人哪种木瓜最好。但由于每个人都有自己的看法，你最终会得到很多不同的答案。你也可以利用过去的经验来做决定。


    在某个时候，你曾经处理过新鲜水果。你可以利用这些经验来帮助你做出好的选择。你可能会观察木瓜的颜色和软硬度来帮助你做决定。当你查看木瓜时，你会发现有各种各样的颜色，从深棕色到红色，甚至有不同的软硬度，所以很难知道哪种效果最好。


    在稍微查看木瓜之后，你会想要建立一个模型，帮助你在下次学习如何挑选最好的木瓜。我们将这个模型称为正式的统计学习框架，这个框架有四个主要组成部分：


    - 学习者的输入。

    - 学习者的输出。

    - 成功度量标准。

    - 简单的数据泛化。


    在机器学习的学习框架中，我们需要探讨的第一件事是学习者的输入的概念。为了帮助我们理解这一点，我们需要找到一个定义域集，然后将所有注意力集中在这个定义域上。这个定义域可以是你所选对象中的任意集合，这些将被称为你需要处理并标记的点。


    一旦你能够确定最佳的定义域点及其最可能使用的集合，你就需要为真正想要使用的集合以及想要避免的集合创建标签。这有助于你进行一些预测，并测试你在预测方面的表现如何。


    然后你需要回顾一下学习者的输出。一旦你知道了场景的所有输入，就该着手处理一个好的输出了。输出将是创建一个预测规则。这有时会以其他名称出现，比如假设、分类器或预测器，无论它被称为什么，它的作用都是将你所有的点赋予一个标签。


    在开始时，对于你做的任何程序，你都会进行猜测，因为你不确定什么效果最好。你或程序将能够利用过去的经验来帮助你进行一些预测。但通常情况下，需要大量的试错才能找出什么效果最好。


    接下来，是时候转向数据泛化模型了。当你能够将输入和输出与学习者结合起来时，就该看看数据泛化模型的部分了。这是一个很好的模型，因为它确保你能够基于你想使用的定义域集的概率分布来构建它。


    你可能会从所有这些过程中开始，然后发现很难知道分布到底是什么。这个模型旨在帮助你，即使你一开始不知道该选择哪些。随着你进行这个过程，你会对分布有更多了解，这将帮助你在过程中做出更好的预测。


