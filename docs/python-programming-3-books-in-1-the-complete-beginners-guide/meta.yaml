- md: '## Fundamentals of Machine Learning


    As you start to spend some more time on machine learning and all that it has to
    offer, you will start to find that there are a lot of different learning algorithms
    that you can work with. As you learn more about these, you will be amazed at what
    they are able to do.


    But before we give these learning algorithms the true time and attention that
    they need, we first need to take a look at some of the building blocks that make
    machine learning work the way that it should. This chapter is really going to
    give us some insight into how these building blocks work and will ensure that
    you are prepared to really get the most out of your learning algorithms in machine
    learning.


    ### The Learning Framework


    Now that we have gotten to this point in the process, it is time to take a closer
    look at some of the framework that is going to be present when you are working
    with machine learning. This is going to be based a bit on statistics, as well
    as the model that you plan to use when you work with machine learning (more on
    that in a moment). Let’s dive into some of the different parts of the learning
    framework that you need to know in order to really get the most out of your machine
    learning process.


    Let’s say that you decide that it is time to go on vacation to a new island. The
    natives that you meet on this island are really interested in eating papaya, but
    you have very limited experience with this kind of food, but you decide that it
    is good to give it a try and head on down to the marketplace, hoping to figure
    out which papaya is the best and will taste good to you.


    Now, you have a few options as to how you would figure out which papaya is the
    best for you. You could start by asking some people at the marketplace which papayas
    are the best. But since everyone is going to have their own opinion about it,
    you are going to end up with lots of answers. You can also use some of your past
    experiences to do it.


    At some point or another, you have worked with fresh fruit. You could use this
    to help you to make a good choice. You may look at the color of the papaya and
    the softness to help you make a decision. As you look through the papaya, you
    will notice that there are a ton of colors, from dark browns to reds, and even
    different degrees of softness, so it is confusing to know what will work the best.


    After you look at the papayas a little bit, you will want to come up with a model
    that you can use to help you to learn the best papaya for next time. We are going
    to call this model a formal statistical learning framework and there are going
    to be four main components to this framework that includes:


    - Learner’s input.

    - Learner’s output.

    - A measure of success.

    - Simple data generalization.


    The first thing that we need to explore when it comes to the learning framework
    in machine learning is the idea of learner’s input. To help us with this, we need
    to find a domain set and then put all of our focus on it. This domain can easily
    be an arbitrary set that you find within your chosen objects, and these are going
    to be known as the points that you will need to go through and label.


    Once you have been able to go through and determine the best domain points and
    then their sets that you are most likely to use, then you will need to go through
    and create a label for the set that you are going to really want to use, and the
