    版本作为返回结果，那么 Python 已经安装在你的系统上了。如果没有，请继续安装 Python。


    ## 在 Mac OS 上安装


    要在 Mac OS 上安装 Python，你必须首先下载安装包。你可以通过在网页浏览器中打开以下链接找到它：

    https://www.python.org/downloads/mac-osx/


    下载安装包后，双击它以启动安装。你将看到屏幕上的说明，指导你完成安装过程。最后，你的 Mac OS 系统上将运行 Python。


    ## 运行程序


    可以通过两种主要方式运行 Python 程序：


    -   交互式解释器

    -   从命令行运行脚本


    ## 交互式解释器或通过 Shell 的交互模式


    Python 自带一个命令行，通常被称为交互式解释器。你可以直接在这个解释器上编写你的 Python 代码，然后按回车键。你会立即得到结果。如果你在 Linux
    上，你只需打开 Linux 终端，然后输入“python”。按回车键，你将看到带有 >>> 符号的 Python 解释器。要在 Windows 上访问交互式
    Python 解释器，请单击“开始”->“所有程序”，然后从程序列表中找到“Python …”。在我的情况下，我找到了“Python 3.5”，因为我安装了
    Python 3.5。展开此选项并单击“Python …”，在我的情况下，我单击“Python 3.5(64-bit)”，然后我得到了交互式 Python
    解释器。


    在这里，你可以直接编写和运行你的 Python 脚本。要编写“Hello”示例，请在解释器终端中输入以下内容：


    ```

    print("Hello")

    ```


    按 Enter/Return 键，文本“Hello”将被打印在解释器上。


    ## 从命令行运行脚本


    这种方法涉及将 Python 程序写入一个文件，然后调用 Python 解释器来处理该文件。Python 文件应保存为 .py 扩展名。这是一个表示它是 Python
    文件的指定。例如，script.py，myscript.py 等。在文件中编写代码并将其保存为“mycode.py”后，你可以打开操作系统'
