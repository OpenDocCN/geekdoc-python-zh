    \ of samples\n    X = np.zeros((N, D))\n    X[:300, :] = np.random.randn(300,\
    \ D) + mu1\n    X[300:600, :] = np.random.randn(300, D) + mu2\n    X[600:, :]\
    \ = np.random.randn(300, D) + mu3\n    # what does it look like without clustering?\n\
