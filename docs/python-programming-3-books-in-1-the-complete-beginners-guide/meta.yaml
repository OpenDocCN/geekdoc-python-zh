    \n### Example 2\nStart IDLE.\nNavigate to the File menu and click New Window.\n\
    Type the following:\n\n```\nclass Bright:\n    \"My other class\"\n    b=10\n\
    \    def salute(self):\n        print('Welcome')\nprint(Bright.b)\nprint(Bright.salute)\n\
    print(Bright.__doc__)\n```\n\n### Object Creation in Python\n#### Example from\
    \ the previous class\nOpen the previous program file with class Bright\n\n```\n\
    student1=Bright()\n```\n\n#### Discussion\nThe last program will create object\
    \ student1, a new instance. The attributes of objects can be accessed via the\
    \ specific object name prefix. The attributes can be a method or data, including\
    \ the matching class functions. In other terms, Bright.salute is a function object,\
    \ and student1.salute will be a method object.\n\n### Example\nStart IDLE.\nNavigate\
    \ to the File menu and click New Window.\nType the following:\n\n```\nclass Bright:\n\
    \    \"Another class again!\"\n    c = 20\n    def salute(self):\n        print('Hello')\n\
    student2 = Bright()\nprint(Bright.salute)\nprint(student2.salute)\nstudent2.salute()\n\
    ```\n\n### Discussion\nWe invoked the student2.salute() despite the parameter\
    \ ‘self’ and it still worked without placing arguments. The reason for this phenomenon\
    \ is because each time an object calls its method, the object itself is passed\
    \ as the first argument. The implication is that student2.salute() translates\
    \ into student2.salute(student2). It is the reason for the ‘self’ name.\n\n###\
    \ Constructors\nStart IDLE.\nNavigate to the File menu and click New Window.\n\
    Type the following:\n\n```\nclass ComplexNumber:\n    def __init__(self, realnum=0,\
    \ i=0):\n        self.real = realnum\n        self.imaginarynum = i\n    def getData(self):\n\
    \        print(\"{0}+{1}j\".format(self.real, self.imaginarynum))\n```"
  mdcn: "## 对象、方法与继承\n\n### Python中的对象与类\nPython作为多范式语言，支持不同的编程方法。Python中的对象具有属性和行为。\n\
