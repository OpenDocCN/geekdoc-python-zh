    ## Descriptive Statistics


    The Excel Analysis ToolPak will include all of the tools described here. To get
    access to these tools you need to select the Data tab, then select the Analysis
    group and then choose Data Analysis. You might have to load the add-in program
    ToolPak if you aren''t able to find the Data Analysis command.


    ## Load and Activate the ToolPak


    Some of you may already have the ToolPak in Excel, if you do, then go to the next
    step. For those who don''t, let''s look at how to get you started.


    First, you will need to select the File tab and then select Options. After that,
    choose the Add-Ins category. If you have Excel 2007, you will need to click on
    the Microsoft Office Button, and then you will choose the Excel Options.


    Also, if you would like to also have the Visual Basic for Application function
    for your ToolPak, you have the option of loading the ToolPak – VBA Add-in just
    like you loaded the ToolPak. Once you can access the Add-ins available box, you
    will choose the Analysis ToolPak – VBA.


    ## Anova


    The analysis tool, Anova, will provide you with other ways to analyze. The tools
    needed will depend on how many samples you collected and other factors you are
    interested in testing.


    ### Anova: Single Factor


    With this tool, you will be able to perform a simple analysis of variance on data
    that has at least two samples. This analysis will test your hypothesis that all
    of the samples come from the same distribution against the other theories that
    believe that the distributions aren’t the same for every single one of your samples.
    If you only have a couple of samples, then you could choose the function T.Test.
    If you have over two samples, there aren’t any convenient generalizations of T.Test;
    at this point, you can choose the Single Factor Anova model.


    ### Anova: Two-Factor with Replication


    When the data can be classified across two dimensions, this is the best tool to
    use. A great example will be if you have an experiment that measures different
    plant’s height. You can give the plants different fertilizers, for this example,
    we will call them A, B, and C, and they may even be kept at various temperatures,
    such as high and low. For every one of the six possible pairs of temperature and
    fertilizer, you would have an equal amount of plant height observations. When
    you use the tool, you will be able to test:


    - Whether the plant''s height for the various temperatures comes from the same
    population; in this analysis, the fertilizer brands would be ignored.

    - Whether the plant''s height for the various fertilizers come from the same population;
    for this analysis, the temperatures would be ignored.


    No matter if you are looking at the effects of the different temperatures or the
    different fertilizer brands, the six samples that represent each of the pair’s
    values come from some group. The other hypothesis would be that there are effects
    caused by the specific temperature or fertilizer pairs about and over the difference
    that are only based on temperature or fertilizer.


    ### Anova: Two-Factor without Replication


    When you have data put into two sections just like in the Two-Factor with Replication,
    then this is a helpful analysis tool. But it will assume that you only have one
    observation for each of your pairs, in the previous example, it would be each
    of the temperature and fertilizer pairs.


    ### Correlation


    The Pearson and Correl worksheet functions will both come up with the correlation
    coefficient between the measurements of each of the variables have been observed
    for each of the different subjects. If there are missing observations for your
    subjects, it will cause the subject to be ignored during the analysis process.
    A particularly useful tool is the Correlation analysis tool when you have over
    two variables for every subject. It will give you a table, which is a correlation
    matrix; this will show you the Pearson value or Correl applied to all of your
    variables.


    Like the covariance, the correlation coefficient is a way to measure how two variables
    may go together. Different from the covariance, the correlation coefficient will
    be proportioned for its value to be different from the units where the variables
    were shown. A good example would be if you have the variables of height and weight,
    the correlation coefficient value would not be changed if the weight amount gets
    changed to pounds from kilograms. Any correlation coefficient value would need
    to be anywhere from -1 and +1.


    This tool is helpful when it comes to examining every pair of variables to figure
    out if the two will move at the same time. This means if a large value of one
    variable is often linked with the amount of the positive correlation, it doesn’t
    matter if the small amount of a single variable gets linked with the large amount
    of the negative correlation, or if the value of each variable is typically not
    related with a correlation near zero.


    ### Covariance


    You can use the covariance and correlation tools in the same setting when you
    have a particular number of different measurement variables observed in a group
    of individuals. Both tools provide an output table, which is a matrix that will
    show covariance or correlation coefficient between every set of the measurement
    variables. One difference is the correlation coefficients get scaled to +1 and
    -1. When it comes to the corresponding covariance, they aren''t scaled. Both of
    them provide the measures of how much the two variables vary together.


    With the covariance tool, it will give you the amount of the function Covariance.P
    to be used for all of the pairs of variables. You can also directly use the Covariance.P
    instead of the Covariance tool when you only have two measurement variables. The
    diagonal entry of the output table in column I and row I is i-th variable''s covariance.
    This represents the variables population variance that gets calculated by VAR.P.


    The covariance tool can be used to look at every pair of variables to figure out
    if two variables move at the same time. This means if the big amount of one of
    the variables tends to be connected to the big amounts of the positive covariance,
    if the little amounts of a variable are connected to the negative covariance,
    or if the amount of both of them tends to be nothing.


    ### Descriptive Statistics


    This tool will give you an account of univariate statistics for all of the information
    that is in the range of input, as long as there is information on the variability
    and the tendency of the information.


    ### Exponential Smoothing


    This tool will predict an amount based on the prediction of a previous time and
    adjust for errors that occurred in the previous prediction. This tool makes use
    of the smoothing constant of a magnitude of this helps to determine how strong
    the forecasts tend to respond to the errors that happened in the previous forecast.


    Keep in mind that the values of .2 to .3 are smoothing constants. This amount
    shows you that the current prediction needs to be changed to 20% to 30% to take
    into account the error of the previous forecast. A larger constant will yield
    a faster response, but they may give you erratic projections. A smaller constant
    may result in lags for a forecast value.


    ### F-Test Two-Sample for Variances


    This tool will perform a two-sample F-test so that you can compare two different
    population variances.


    One example would be that you can use this tool on a sample of the times accrued
    during a swim competition for both teams. This tool will give you the results
    of the test for the prediction that the sample will be from the distribution that
    has the same variances; it puts it against the alternatives that a variance may
    not be equal to the distribution.


    This tool will calculate the f value for an F-ratio. If f’s value is near one,
    it tells you that the population variance is the same. If you have f < 1 “P(F
    <= f) one-tail” it tells the odds of seeing F’s value being lower than f when
    the population variance is the same. “F Critical one-tail” will show you the critical
    value that is lower than one for the chosen level, Alpha. If f > 1, “P(F <= f)
    one-tail” it tells you that the odds of seeing the amount of the F are more than
    f when the population variance is the same. The “F Critical one-tail” will show
    you that the critical value is more than one for Alpha.


    ### Histogram


    With this tool, it can calculate cumulative and individual frequencies for the
    cell range of data bins and data. This will tell you the number of times that
    a number shows up in a set of data.'
