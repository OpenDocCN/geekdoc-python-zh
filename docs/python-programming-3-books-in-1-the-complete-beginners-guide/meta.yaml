    # PYTHON FOR 数据分析


    ## 引言


    公司已经花了很多时间研究数据分析及其能为他们带来的价值。数据无处不在，似乎每天都有海量的新信息可供我们处理。无论你是想更多地了解你的行业和客户的公司，还是仅仅是对某个特定主题有疑问的个人，你都能找到丰富的信息来帮助你入门。


    许多公司已经养成了收集数据并学习如何让数据为他们需求服务的习惯。他们发现这些数据中蕴含着许多见解和预测，可以确保它们在未来对他们有所帮助。如果数据使用得当，并且我们能够很好地掌握这些数据，它们就可以用来帮助我们的业务变得更加成功。


    一旦你收集了数据，就会有一些工作要做。仅仅因为你能够收集所有这些数据，并不意味着你就能看到其中的模式。这就是数据分析过程将发挥作用的地方，帮助我们看到一些结果。这个过程旨在确保我们完全理解数据中的内容，并使我们更容易利用所有原始数据做出明智而精明的商业决策。


    更进一步说，数据分析将是一种实践，我们可以获取企业一直在收集的一些原始数据，然后对其进行组织和排序，以确保其有用性。在此过程中，最有用的信息被提取出来，然后从原始数据中使用。


    然而，在处理数据分析时，我们需要小心的一点是，要谨慎处理我们操纵数据的方式。在分析阶段，我们很容易以错误的方式操纵数据，最终得出一些并不存在的结论或议程。这就是为什么我们需要密切关注数据分析呈现给我们的方式，并对数据和我们从中得出的结论进行批判性思考。


    如果你担心某个来源正在进行的工作，并且你不确定自己是否能在没有偏见的情况下完成这种分析，那么重要的是找其他人来做，或者选择不同的来源。外面有很多数据，它们可以帮助你的业务看到一些结果，但你必须小心这些偏见，否则如果我们不注意，它们最终会引导我们做出错误的决定。


    此外，你会发现，在数据分析过程中，你将处理的原始数据可以采取多种形式。这可以包括观察、调查回复和测量等，仅举几例。你用于此类原始数据的来源将根据你希望从中获得什么、你的主要问题是什么等等而有所不同。


    以原始形式，我们收集的数据将非常有用，但你可能会发现处理起来有点令人不知所措。这是许多公司在进行数据分析时会遇到的问题，也是你必须花时间探索和了解更多的一件事。


    在你花在数据分析和所有相关步骤上的时间里，原始数据将以一种对你尽可能有用的方式进行排序。例如，我们可能会发出一份调查，然后统计我们得到的结果。这样做是因为它帮助我们一目了然地看到有多少人决定参与调查，以及人们愿意回答调查中哪些具体问题。


    在整理和组织数据的过程中，很可能会出现一种趋势，有时不止一种趋势。然后我们将能够花时间突出这些趋势，通常是在关于数据的报告中。这需要被强调，因为它确保阅读该信息的人会注意到。


    我们会在很多地方看到这一点。例如，在我们可能尝试进行的非正式调查中，你可能想弄清楚男性和女性在最喜欢的冰淇淋口味方面的偏好。在这项调查中，也许我们发现女性和男性都表达了对巧克力的喜爱。根据使用这些信息的人以及他们希望从中获得什么，这可能是研究人员会发现非常有趣的事情。


    使用数学和一些其他工具对从调查或另一种形式的数据分析中发现的数据进行建模，有时会夸大我们数据中的兴趣点，比如之前的冰淇淋偏好，这将使任何查看数据的人，尤其是研究人员，更容易看清其中的情况。


    除了查看你收集和整理的所有数据外，你还需要做其他一些部分。所有这些都是为了帮助需要这些信息的人通读它，看看里面有什么，以及他们可以用所有这些数据做什么。这是他们能够利用信息了解正在发生的事情、其中的复杂关系等等的方式。


    这意味着我们需要花时间撰写数据报告、图表、图形以及其他向最需要数据的人展示和呈现数据的方法。这将构成数据分析的最后步骤之一。这些方法的设计旨在提炼和精炼数据，以便读者能够从中获取一些有趣的信息，而无需自己重新查看原始数据并弄清楚其中的内容。


    在这些步骤中总结数据将是至关重要的，并且需要以良好而稳定的方式进行。这样做对于支持用这些数据提出的一些论点至关重要，清晰易懂地呈现数据也是如此。在此阶段，我们必须记住，需要该摘要并将其用于为企业做出重要决策的人并不总是数据科学家，他们需要所有内容都以简单易懂的方式写出来，以便理解这些信息。这就是为什么数据必须以易于理解和阅读的方式写出来。


    通常，这将通过某种数据可视化来完成。我们可以使用许多视觉选择，使用某种图表或图形也是一个不错的选择。根据你的需求和我们正在处理的数据，选择最适合的方法将是确定最适合你的视觉呈现方式的最佳途径。


