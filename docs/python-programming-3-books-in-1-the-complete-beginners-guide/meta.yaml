  mdcn: "## 制作你自己的K-Means算法\n\n既然我们已经花了一些时间，在Python代码的帮助下研究了一些有趣的游戏和示例，现在让我们花点时间看看你可以用机器学习和人工智能结合编程来实现的一些功能。我们花了一些时间讨论如何使用这些工具以及代码的不同部分，还有Python将如何与机器学习的理念相结合。现在，我们将利用这些信息来创建一个我们自己的机器学习算法。\n\
    \n在我们为这个算法编写代码之前，我们需要先了解一下什么是K均值聚类。这是一个在机器学习中表现良好的基础算法，它将帮助你收集系统中的所有数据——那些当时尚未标记的数据——并将它们全部归入各自的小型聚类组中。\n\
    \n使用这种聚类的核心思想是，落入同一聚类中的对象，无论是两个还是更多，它们之间都会以某种方式相互关联，并且与落入其他聚类的数据点不会那么相似。这里的相似性将是你用来衡量两者之间关系强度的度量标准。\n\
    \n当你使用这个特定的算法时，它将能够根据你所拥有的数据值的相似程度，为你形成所需的一些数据聚类。你需要为K指定一个具体的值，这个值代表你想要使用的聚类数量。最好至少有两个聚类，但你使用的聚类数量将取决于你拥有多少数据以及有多少数据适合你正在处理的数据类型。\n\
    \n了解了这些信息，并对K均值算法的用途有了良好的背景知识后，现在是时候进一步探索如何编写你自己的代码，并完成一个使用K均值的示例了。这有助于我们实践一些机器学习知识，并让我们有机会练习一些新的Python技能。\n\
    \n```python\nimport numpy as np\nimport matplotlib.pyplot as plt\n\ndef d(u, v):\n\
    \    diff = u - v\n    return diff.dot(diff)\n\ndef cost(X, R, M):\n    cost =\
    \ 0\n    for k in xrange(len(M)):\n        for n in xrange(len(X)):\n        \
    \    cost += R[n,k]*d(M[k], X[n])\n    return cost\n```\n\n在这一部分之后，我们将花时间定义你的函数，以便它能够在绘制结果之前运行K均值算法。最终将得到一个散点图，其中颜色将代表特定聚类内的成员归属程度。\n\
    \n我们将使用以下代码来实现：\n\n```python\ndef plot_k_means(X, K, max_iter=20, beta=1.0):\n\
    \    N, D = X.shape\n    M = np.zeros((K, D))\n    R = np.ones((N, K)) / K\n \
    \   # initialize M to random\n    for k in xrange(K):\n        M[k] = X[np.random.choice(N)]\n\
    \    grid_width = 5\n    grid_height = max_iter / grid_width\n    random_colors\
    \ = np.random.random((K, 3))\n    plt.figure()\n    costs = np.zeros(max_iter)\n\
    \    for i in xrange(max_iter):\n        # moved the plot inside the for loop\n\
    \        colors = R.dot(random_colors)\n        plt.subplot(grid_width, grid_height,\
    \ i+1)\n        plt.scatter(X[:,0], X[:,1], c=colors)\n        # step 1: determine\
    \ assignments / responsibilities\n        # is this inefficient?\n        for\
    \ k in xrange(K):\n            for n in xrange(N):\n                R[n,k] = np.exp(-beta*d(M[k],\
    \ X[n])) / np.sum( np.exp(-beta*d(M[j], X[n])) for j in xrange(K) )\n        #\
    \ step 2: recalculate means\n        for k in xrange(K):\n            M[k] = R[:,k].dot(X)\
    \ / R[:,k].sum()\n        costs[i] = cost(X, R, M)\n        if i > 0:\n      \
    \      if np.abs(costs[i] - costs[i-1]) < 10e-5:\n                break\n    plt.show()\n\
    ```\n\n注意，这里的M和R都将是矩阵。R将成为一个矩阵，因为它持有两个索引，k和n。M也是一个矩阵，因为它将包含K个独立的D维向量。beta变量将控制聚类成员关系的模糊或分散程度，被称为超参数。接下来，我们将创建一个主函数，该函数将生成随机聚类，然后调用我们上面已经定义好的函数。\n\
    \n```python\ndef main():\n    # assume 3 means\n    D = 2 # so we can visualize\
    \ it more easily\n    s = 4 # separation so we can control how far apart the means\
    \ are\n    mu1 = np.array([0, 0])\n    mu2 = np.array([s, s])\n    mu3 = np.array([0,\
    \ s])\n    N = 900 # number of samples\n    X = np.zeros((N, D))\n    X[:300,\
    \ :] = np.random.randn(300, D) + mu1\n    X[300:600, :] = np.random.randn(300,\
    \ D) + mu2\n    X[600:, :] = np.random.randn(300, D) + mu3\n    # what does it\
    \ look like without clustering?\n    plt.scatter(X[:,0], X[:,1])\n    plt.show()\n\
    \    K = 3 # luckily, we already know this\n    plot_k_means(X, K)\n    # K =\
    \ 5 # what happens if we choose a \"bad\" K?\n    # plot_k_means(X, K, max_iter=30)\n\
    \    # K = 5 # what happens if we change beta?\n    # plot_k_means(X, K, max_iter=30,\
    \ beta=0.3)\n\nif __name__ == '__main__':\n    main()\n```\n\n是的，这个过程在这里写出来需要一些时间，而且在处理机器学习的不同部分及其如何影响你的代码时，这并不总是一个简单的过程。但当你完成后，你将能够导入公司一直在收集的一些数据，然后使用K均值算法来确定这些数据的比较情况。\n\
    \n## 结论\n\n读完这本书后，你可能对从事某些形式的数据科学感到非常自如。如果你感到兴奋，那么你就走在正确的道路上。然而，在深入研究之前，仍然需要做好充分的规划。\n\
    \n在实现目标之前，你需要理解很多东西，没有正确的计划，这几乎是不可能的。所以，在行动之前，一定要为自己准备一个清单。相信我；从长远来看，这很重要。\n\n\
    规划还将确保你了解自己最喜欢数据科学的哪些方面。了解这一点将确保你清楚自己的兴趣所在，以及进入这个新领域时自己的优势和劣势。\n\n- **多阅读：** 在这个数据科学的世界里，阅读将继续是确保你不断进步的重要方式之一。多亏了互联网，有如此多的书籍可以帮助你实现目标。所以，确保你总是在阅读和探索新的事物和概念。数据科学行业中唯一不变的事情就是事物每天都在不断变化。所以，确保你与时俱进。\n\
    - **寻找专业社区：** 对你来说幸运的是，有很多专家可以被视为数据挖掘所有相关事务的专家。虽然本书为你提供了入门指南，但当你深入时，你将需要积累更多的经验。仅从阅读书籍中获得的经验是有限的。你最终将不得不寻找该领域的专家。他们提供了一些宝贵的技巧，这些技巧你可能在任何书中都找不到。\n\
    - **每天练习：** 不付出实际努力，你无法成为一名伟大的数据科学家。你需要每天努力在这个领域发展自己。事实是，随着数据"
