    ```


    字典与列表不同，它可以通过非整数的其他数据类型来标识，尽管它也可以使用整数作为键。


    ### 字典与列表


    在尝试将列表与其他列表进行比较时，列表项的顺序确实很重要。与此同时，字典可以判断一个已存在的列表是否匹配，即使键的顺序不同。这并不意味着顺序不重要。如果程序员在列表中保持统一的顺序，那么这就不是问题。然而，主要问题出现在你开始获取无序数据时，尤其是来自用户的数据。


    在编辑器中尝试以下序列。


    ```python

    flat = [''rooms'', ''bathrooms'', ''floor'', ''apartment'']

    apartment = [''apartment'', ''bathrooms'', ''rooms'', ''floor'']

    print(flat == apartment) # 当你使用 == 时，你是在询问它们是否彼此相等

    flat = {''rooms'': ''2'', ''bathrooms'': ''1'', ''floor'': ''3rd'', ''apartment'':
    ''306''} # 注意花括号

    apartment = {''apartment'': ''306'', ''bathrooms'': ''1'', ''rooms'': ''2'', ''floor'':
    ''3rd''}

    print(flat == apartment)

    ```


    程序输出：

    ```

    C:\Users\...\PycharmProjects\GettingStarted\venv\Scripts\Python.exe C:/..

    False

    True

    Process finished with exit code 0

    ```


    ### 有用的方法


    有一些有用的方法可以与字典一起使用。这些方法在与循环结合时特别有用。所有以下方法都需要在变量名后添加点号表示法，然后跟上括号来使用。

    第一个方法是 `keys()`，它将输出字典的键。下一个方法是 `values()`，它将输出键对应的值。最后一个方法是 `items()`，它将输出键和值，它们位于括号内并用逗号分隔。

    尝试下面的例子。


    ```python

    flat = {''rooms'': ''2'', ''bathrooms'': ''1'', ''floor'': ''3rd'', ''apartment'':
    ''306''}

    print(flat.keys())

    print(flat.values())

    print(flat.items())

    ```


    程序输出：

    ```

    C:\Users\...\PycharmProjects\GettingStarted\venv\Scripts\Python.exe

    C:/Users/.../PycharmProjects\GettingStarted/MyFirstProgram.py

    dict_keys([''rooms'', ''bathrooms'', ''floor'', ''apartment''])

    dict_values([''2'', ''1'', ''3rd'', ''306''])

    dict_items([(''rooms'', ''2''), (''bathrooms'', ''1''), (''floor'', ''3rd''),
    (''apartment'', ''306'')])

    Process finished with exit code 0

    ```


    ### 值或键检查


    在使用字典时，一个最可能经常需要的功能是检查字典中是否存在某个特定的值。在这个练习中，我们将使用两个运算符：`in` 和 `not`。这两个运算符可以告诉你字典中是否存在某个特定的键或值。请注意，这些运算符也可以在列表以及逻辑中使用。这些运算符将产生一个布尔输出，要么是
    `True`，要么是 `False`。

    这里有一些代码行供你尝试。


    ```python

    flat = {''rooms'': 2, ''bathrooms'': 1, ''floor'': ''3rd'', ''apartment'': 306}

    print(''rooms'' in flat.keys()) # 确定是否存在名为 rooms 的键

    print(''1st'' in flat.values()) # 确定是否存在名为 1st 的值

    print(3 not in flat.items()) # 确定是否既没有值也没有键为 3

    ```


    程序输出：

    ```

    C:\Users\...\PycharmProjects\GettingStarted\venv\Scripts\Python.exe

    C:/Users/.../PycharmProjects\GettingStarted/MyFirstProgram.py

    True

    False

    True

    Process finished with exit code 0

    ```


    还有另一种方法可以与字典一起使用，它使得获取特定数据变得容易。这就是 `get()` 方法。

    查看下面的例子，看看它在编辑器中是如何使用的。


    ```python

    flat = {''rooms'': 2, ''bathrooms'': 1, ''floor'': ''3rd'', ''apartment'': 306}

    print(f"I live in the apartment {flat.get(''apartment'')}") # 获取公寓号

    ```


    程序输出：

    ```

    C:\Users\...\PycharmProjects\GettingStarted\venv\Scripts\Python.exe

    C:/Users/.../PycharmProjects\GettingStarted/MyFirstProgram.py

    I live in the apartment 306

    Process finished with exit code 0

    ```


    ## 模块


    ### 什么是模块？


    在 Python 中，模块是程序的一部分（一个扩展文件），可以通过其他程序调用，而无需在每个使用的程序中都编写它们。

    此外，它们可以定义类和变量。

    这些模块包含相互关联的语句，可以随时使用。

    模块的使用基于使用一个已经存储在其中的代码（程序主体、函数、变量），称为 `import`。

    通过使用模块，可以观察到 Python 允许大大简化程序，因为它允许我们将问题分解成更小的部分，从而使代码更短，这样程序员在编写代码时，就不会在数百行代码中寻找某样东西而迷失方向。


    ### 如何创建模块？


    在 Python 中创建模块，我们不需要太多东西；这非常简单。

    例如：如果你想创建一个打印城市的模块，我们在编辑器中编写代码并将其保存为 "mycity.py"。

    完成后，我们将知道这将是我们的模块名称（省略 .py 部分），它将被赋值给全局变量 `__name__`。

    这是一个为 Python 2 用户设计的非常简单的代码。

