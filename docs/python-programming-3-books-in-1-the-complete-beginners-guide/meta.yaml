    ## 统计学与概率论


    当你开始接触机器学习过程时，必须了解这一过程与所谓的概率论之间最终会建立起一种友好关系。机器学习是一个非常广泛的研究领域，这意味着它并非独立运作，而是同时与其他一些领域协同工作。你能够合作的领域通常取决于项目的类型。


