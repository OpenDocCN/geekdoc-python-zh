    Data structure is a way to organize and store data where we can access and modify
    it efficiently.


    Let’s begin with our first Python Data Structures and lists.


    **Python List**


    We create a list in Python by placing items called elements inside square brackets
    separated by commas. The items in a list can be of mixed data types.


    Start IDLE.


    Navigate to the File menu and click New Window.


    Type the following:


    ```

    list_mine=[] #empty list

    list_mine=[2,5,8] #list of integers

    list_mine=[5,"Happy", 5.2] #list having mixed data types

    ```


    **How to Declare Python List?**


    Just input:


    ```

    >>> languages=[''C++'',''Python'',''Scratch'']

    ```


    You can put any kind of value in a list.


    ```

    >>> list1=[1,[2,3],(4,5),False,''No'']

    ```


    **How to Access Python List?**


    In Python, the first time is always indexed as zero. A list of five items can
    be accessed by index0 to index4. An index error will occur if you fail to access
    the items in a list. The index is always an integer, so using other numbers will
    also create a type error.


    **Example**


    Start IDLE.'
