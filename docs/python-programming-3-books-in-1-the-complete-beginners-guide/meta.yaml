    ```


    **How to Access Python List?**


    In Python, the first time is always indexed as zero. A list of five items can
    be accessed by index0 to index4. An index error will occur if you fail to access
    the items in a list. The index is always an integer, so using other numbers will
    also create a type error.


    **Example**


    Start IDLE.


    Navigate to the File menu and click New Window.


