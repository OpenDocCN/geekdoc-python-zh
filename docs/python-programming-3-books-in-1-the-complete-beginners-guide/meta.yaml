  md: '# Data Science Algorithms and Models


    The algorithms used in data science can be divided into several categories, mainly
    supervised learning, unsupervised learning, and to some degree semi-supervised
    learning.


    As the name suggests, supervised learning is aided by human interaction as the
    data scientist is required to provide the input and output in order to obtain
    a result from the predictions that are performed during the training process.
    Once the training is complete, the algorithm will use what it learned to apply
    to new, but similar data.


    We are going to focus on this type of learning algorithm. However, take note that
    their purpose is divided based on the problems they need to solve. Mainly there
    are two distinct categories, namely regression and classification. In the case
    of regression problems, your target is a numeric value, while in classification
    it is a class or a label. To make things clearer, an example of a regression task
    is determining the average value of houses in a given city. A classification task,
    on the other hand, is supposed to take certain data like the petal and sepal length,
    and based on that information determine which is the species of a flower.


    With that in mind, let’s start by discussing regression algorithms and how to
    work with them.


    # Regression


    In data science, many tasks are resolved with the help of regression techniques.
    However, a regression can also be categorized into two different branches, which
    are linear regression and logistic regression. Each one of them is used to solve
    different problems. However, both of them are a perfect choice for prediction
    analyses because of the high accuracy of the results.


    The purpose of linear regression is to shape a prediction value out of a set of
    unrelated variables. This means that if you need to discover the relation between
    a number of variables you can apply a linear regression algorithm to do the work
    for you. However, this isn’t its main use. Linear regression algorithms are used
    for regression tasks. Keep in mind that logistic regression is not used to solve
    regression problems as the name suggests. Instead, it is'
  merge: -1
  pgno: 208
- img_proc: true
  md: 'used for classification tasks.


    With that being said, we are going to start by implementing a linear regression
    algorithm on the Boston housing dataset, which is freely available and even included
    in the Scikit-learn library. This dataset contains 506 samples, with 13 features
    and a numerical type target. We are going to break it into two sections, a training
    and a testing set. There are no rules set in stone regarding the ratio of the
    split; however, it is generally accepted that it is best to keep the training
    set with a 70%–80% data distribution and save 20%–30% for the testing process.


    # K-Nearest Neighbors


    This algorithm is one of the easiest ones to work with; however, it can solve
    some of the most challenging classification problems. The k-nearest neighbor algorithm
    can be used in various scenarios that require anything from compressing data to
    processing financial data. It is one of the most commonly used supervised machine
    learning algorithms and you should do your best to practice your implementation
    technique.


    The basic idea behind the algorithm is the fact that you should explore relation
    between two different training observations. For instance, we will call them x
    and y, and if you have the input value of x, you can already predict the value
    of y. The way this works is by calculating the distance of a data point in relation
    to other data points. The k-nearest point is selected based on this distance and
    it is assigned to a specific class.


    To demonstrate how to implement this algorithm we are going to work with a much
    larger dataset than before; however, we will not use everything in it. Once again,
    we are going to rely on the Scikit-learn library in order to gain access to a
    dataset known as the MNIST handwritten digits dataset. In fact, a database that
    holds roughly 70,000 images of handwritten digits that are distributed in a training
    set with 60,000 images and a test set with 10,000 images. However, as already
    mentioned, we are not going to use the entire dataset because that would take
    too long for this demonstration. Instead, we will limit ourselves to 1000 samples.
    Let’s get started:


    ```

    In: from sklearn.utils import shuffle

    from sklearn.datasets import

