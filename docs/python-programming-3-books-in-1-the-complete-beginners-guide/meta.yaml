    t.offer()\n# using setter function\nt.set_final_price(990)\nt.offer()\n```\n\n\
    **讨论**\n程序定义了一个Tv类，并使用__init__()方法来保存电视的最终报价。在此过程中，我们尝试更改价格但未能成功。无法更改的原因是Python将__finalprice视为私有属性。修改此值的唯一方法是通过使用setter函数set_final_price()，该函数接受价格作为参数。\n\
