  md: '# # Why Python for Data Analysis?


    # ## Data Science and Data Analysis


    The words of data science and data analytics are often used interchangeably. However,
    these terms are completely different and have different implications for different
    businesses. Data science encompasses a variety of scientific models and methods
    that can be used to manipulate and survey structured, semi-structured, and unstructured
    data. Tools and processes that can be used to make sense of gather insight from
    highly complex, unorganized, and raw data set to fall under the category of data
    science. Unlike data analytics that is targeted to verify a hypothesis, data science
    boils down to connecting data points to identify new patterns and insights that
    can be made use of in future planning for the business. Data science moves the
    business from inquiry to insights by providing a new perspective into their structured
    and unstructured data by identifying patterns that can allow businesses to increase
    efficiencies, reduce costs and recognize the new market opportunities.


    Data science acts as a multidisciplinary blend of technology, machine learning
    algorithm development, statistical analysis, and data inference that provides
    businesses with enhanced capability to solve their most complex business problems.
    Data analytics falls under the category of data science and pertains more to reviewing
    and analyzing historical data to put it in context. Unlike data science, data
    analytics is characterized by low usage of artificial intelligence, predictive
    modeling, and machine learning algorithms to gather insights from processed and
    structured data using standard SQL query commands. The seemingly nuanced differences
    between data analytics and data science can actually have a substantial impact
    on an organization.


