    \n**Discussion**\nThe program above has defined two classes Tilapia and Shark\
    \ all of which share the method jump() even though they have different functions.\
    \ By creating common interface jumping_test() we allowed polymorphism in the program\
    \ above. We passed objects bonny and biggy in the jumping_test() function.\n\n\
    ### Practice Exercise\n- In a doctor consultation room, suggest the class and\
