    首先，我们将看看所谓的精度参数。这是一个重要的参数类型，因为它将帮助我们确定我们看到输出分类器正确预测的频率。这些预测必须以准确的方式设置，同时也基于你提供给程序的任何信息。


    你也可以使用所谓的置信度参数。这是一个衡量预测器达到特定精度水平可能性的参数。精度总是很重要的，但有时项目会比其他时候要求更高的精度。你需要检查精度，并了解你能做些什么来提高你拥有的精度。


