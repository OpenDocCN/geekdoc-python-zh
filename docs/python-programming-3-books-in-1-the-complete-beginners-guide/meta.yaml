    Python：


    **Python**


    在操作系统的终端中输入上述命令，然后按 Enter/Return 键。


    该命令应返回你系统上安装的 Python 版本。如果未安装 Python，你会收到命令无法识别的提示；因此你需要安装 Python。


    ### 选择 Python 版本


    Python 的主要两个版本是 2.x 和 3.x。Python 3.x 显然是最新的版本，但截至今天，Python 2.x 可能仍然是使用最广泛的版本。然而，Python
    3.x 在采用率方面增长得更快。Python 2.x 仍在许多软件公司中使用。但是，越来越多的企业正在迁移到 Python 3.x。这两个版本之间存在一些技术差异。我们可以用一种非常简单的方式总结：Python
    2.x 是遗留版本，而 Python 3.x 是未来。给你的建议是选择最新的 Python 3.x 版本。从 2020 年起，Python 2.x 将不再受到支持。


    ### 通用安装说明


    安装 Python 非常简单。你只需按照以下步骤操作：


    1.  访问 Python 下载页面 https://www.python.org/downloads/

