    ## 独特特性与哲学


    Python是一种通用的编程语言，支持面向对象编程（OOP）和其他函数式编程语言。最初，它并非为数据科学而设计，但作为一个领域，专业人士开始将其用于数据分析，它便成为了数据科学的优先选择。通过扩展支持许多不同的标准，包括契约式设计和逻辑编程。同样，它包括动态名称解析（后期绑定），在程序运行时绑定方法和变量名。标准库有两个模块实现了从Haskell和Standard
