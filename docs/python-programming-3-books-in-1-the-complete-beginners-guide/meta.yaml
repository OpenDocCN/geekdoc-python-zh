    \n```\ndef userDefFunction (arg1, arg2, arg3, ...):\n    program statement1\n\
    \    program statement2\n    program statement3\n    ....\n    Return;\n```\n\n\
    使用函数是确保代码按预期行为的好方法。确保正确设置它们，并能够按照你希望的方式处理这些函数，也非常重要。很多时候，函数会出来并服务于某些目的，因此现在花时间学习如何使用它们，对于代码的成功非常重要。\n\
    \n## Python模块\n\n模块由定义以及程序语句组成。\n一个例子是文件名config.py，它被认为是一个模块。模块名将是config。模块用于帮助将大型程序分解为更小、可管理和有组织的文件，并促进代码的重用。\n\
    \n### 示例\n\n创建第一个模块\n\n```\ndef add(x, y):\n    \"\"\"This is a program to add\
