    ## 深度学习与机器学习


    在开始之前，重要的是要提醒自己这两个学科的基本定义或解释。机器学习是人工智能的一个分支，它使用算法来教机器如何学习。除了算法之外，机器学习模型需要输入和输出数据，通过这些数据，它们可以通过与不同用户的交互进行学习。


    在构建此类模型时，始终建议确保构建一个可扩展的项目，该项目可以在适用时接受新数据，并使用它来持续训练模型并提高其效率。一个高效的机器学习模型应该能够自我修改，而不一定需要你的输入，并且仍然提供正确的输出。它从可用的结构化数据中学习，并不断更新自身。


    深度学习是机器学习的一个类别，它使用与机器学习中相同的算法和函数。然而，深度学习引入了超越算法能力的分层计算。深度学习中的算法以层的方式使用，每一层以不同的方式解释数据。深度学习中使用的算法网络被称为人工神经网络。


    人工神经网络这个名称让我们最接近地理解深度学习框架中发生的事情。这里的目标是尝试模仿人类大脑的功能方式，专注于神经网络。深度学习领域的专家多年来研究并参考了关于人类大脑的不同研究，这有助于推动该领域的研究。


    ## 问题解决方法


    让我们考虑一个例子来解释深度学习和机器学习之间的区别。


    假设你有一个包含卡车和自行车照片的数据库。你如何使用机器学习和深度学习来理解这些数据？乍一看，你会看到一群卡车和自行车。如果你需要使用这两个框架将自行车的照片与卡车分开识别呢？


    为了帮助你的机器学习算法根据请求的类别识别卡车和自行车的照片，你必须首先教它这些照片是关于什么的。机器学习算法如何找出区别？毕竟，它们看起来几乎一样。


    解决方案在于结构化数据方法。首先，你将以定义这些物品各自独特特征的方式标记自行车和卡车的照片。这对于你的机器学习算法来说是足够的学习数据。基于输入标签，它将不断学习，并在遇到更多数据时完善对卡车和自行车之间区别的理解。从这个简单的示例中，它将继续搜索数百万个其他可访问的数据，以区分卡车和自行车。


    ## 我们如何在深度学习中解决这个问题？


    深度学习中的方法与我们在机器学习中所做的不同。这里的好处是，在深度学习中，你不需要任何标记或结构化数据来帮助模型识别卡车和自行车。


    人工神经网络将通过网络中的不同算法层来识别图像数据。每一层将识别并定义照片中的一个特定特征。这与我们大脑在尝试解决某些问题时使用的方法相同。


    通常，大脑会考虑很多可能性，在确定正确答案之前排除所有错误的可能性。深度学习模型将通过多个分层过程传递查询以找到解决方案。在每个识别级别，深度神经网络会识别一些有助于区分自行车和卡车的标识符。


    这是理解这两个系统如何工作的最简单方式。然而，深度学习和机器学习可能都不一定是区分这些照片的适用方法。随着你了解这两个领域之间的差异，你必须记住，在选择最佳方法来解决问题之前，你必须正确定义问题。你将在机器学习之旅的后期阶段学习如何选择正确的方法，这在本系列的高级书籍中已经涵盖。


    从上面的示例中，我们可以看到机器学习算法需要结构化数据来帮助它们区分卡车和自行车。根据这些信息，它们可以在识别分类器后产生正确的输出。


    然而，在深度学习中，你的模型可以通过其框架中的多个数据处理层传递信息来识别卡车和自行车的图像。不需要结构化数据。为了做出正确的预测，深度学习框架依赖于每个数据处理层提供的输出。这些信息累积并呈现最终结果。在这种情况下，它排除了所有可能性，只留下唯一可信的解决方案。


    从我们上面的说明中，我们学到了一些重要的事实，这些事实将帮助你在学习过程中区分深度学习和机器学习。我们可以将这些总结为以下几点：


    - **数据呈现：** 机器学习和深度学习之间的主要区别体现在我们将数据引入各自模型的方式上。对于机器学习模型，你几乎总是需要使用结构化数据。然而，在深度学习中，网络依赖于人工神经网络层来识别有助于识别数据的独特特征。

    - **算法和人为干预：** 机器学习的重点是从与不同输入的交互和使用模式中学习。通过这种交互，机器学习模型学习的时间越长，接收到的交互越多，就能产生更好的输出。


    为了帮助实现这一目标，你还必须尝试提供尽可能多的新数据。当你意识到呈现的输出不是你所需要的时，你必须重新训练机器学习模型以提供更好的输出。因此，对于一个应该在没有人为干预的情况下工作的系统，你仍然需要不时地在场。


    在深度学习中，你不需要在场。神经网络内的所有嵌套层在不同级别上处理数据。然而，在这个过程中，模型可能会遇到错误并从中学习。'
