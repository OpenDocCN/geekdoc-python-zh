    Attributes: color, mileage, model, age.\nBehavior: reverse, speed, turn, roll,\
    \ stop, start.\n\nClass\nIt is a template for creating an object.\n\n**Example**\n\
    class Car:\n\n**Note:**\nBy convention, we write the class name with the first\
