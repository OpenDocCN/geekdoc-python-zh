    data. For instance, data that is organized in the form of a table is known as
    structured data (such as Excel tables or in databases). To manage and analyze
    such data, a preferable method is to use the Structured Query Language or SQL.
    However, not all structured datasets are easily manageable; for instance, the
    family data tree is also a structured dataset, but it becomes difficult to process
    and analyze such structured datasets. In other words, some exceptions in these
    data categories may demand another data processing technique.


    Raw data is never structured; it is brought into a defined setting by the users.
    Hence, if we are given a data sample that is structured, then all is good; however,
    if the data is unstructured, we must bring it into a structured format before
    applying the SQL technique.'
