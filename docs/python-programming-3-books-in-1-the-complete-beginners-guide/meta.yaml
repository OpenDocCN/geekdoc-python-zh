  mdcn: '## 核心 Python 库（Numpy，Ipython）


    ## Numpy


    NumPy 是 Python 中进行科学计算的核心库。它是一个提供多维数组对象、派生对象（例如掩码数组和矩阵）以及一系列用于数组快速操作的例程的 Python
    库，包括数学、逻辑、形状操作、排序、选择、I/O、离散傅里叶变换、基本线性代数、基本统计操作、随机模拟等等。


    NumPy 包的核心是 `ndarray` 对象。它封装了同构数据类型的 n 维数组，并在构建代码执行时进行了许多操作。NumPy 程序与流行的 Python
    序列之间存在一些重要区别。


    -   NumPy 数组在创建时具有固定大小，这与 Python 列表（可以动态增长）不同。更改 `ndarray` 的大小将创建一个新数组并删除原始数组。

    -   NumPy 数组中的元素必须全部是相同的数据类型，因此在内存中也将具有相同的大小。例外情况：可以有（Python，包括 NumPy）对象类型的数组，从而允许不同大小的元素类型。

    -   NumPy 提供了对大量数据进行更高级的数学和特殊类型操作的便利。通常，这些操作执行得更高效，且代码更少。

    -   许多基于 Python 的科学和科学计算库都使用 NumPy 数组；尽管它们通常支持 Python 序列输入，但在处理之前会将此类输入转换为 NumPy
    数组，并且它们通常输出 NumPy 数组。换句话说，要有效地使用许多（甚至可能是大多数）当前的科学/科学计算 Python 软件，仅仅知道如何使用 Python
    的内置序列类型是不够的——还需要知道如何使用 NumPy 数组。


    对数组大小和速度的关注在科学计算中尤为普遍。作为一个基本示例，考虑将一个一维数组中的每个元素与另一个相同长度数组中的相应元素相乘的实例。如果数据存储在两个
    Python 列表 `a` 和 `b` 中，我们需要遍历每个元素：


    这会产生正确的答案，但如果 `a` 和 `b` 都包含大量数字，我们将为 Python 中循环的低效付出代价。我们应该能够通过编写 C 代码（为了清晰起见，我们忽略变量声明和实例化、内存分配等）来更快地完成类似的任务：


    ```

    c = a * b

    ```


    它执行与前面示例相同的操作，速度接近 C，但具有我们期望的基于 Python 的代码的简洁性。当然，NumPy 表达式要简单得多！这个最后的示例展示了 NumPy
    的两个特性，这是其许多功能的基础：向量化和广播。


    向量化描述了代码中没有任何显式循环、索引等——这些事情当然会发生，只是在高级、预编译的 C 代码中“在后台”进行。向量化代码有许多优点，其中包括：


    -   向量化代码通常更简洁，更易于阅读。

    -   更少的代码行数通常意味着更少的错误。

