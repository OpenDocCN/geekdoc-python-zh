    This is sometimes going to show up by another name such as the hypothesis, classifier,
    and predictor, no matter what it is called, to take all of your points and give
    them a label.


    In the beginning, with any kind of program that you do, you are going to make
    guesses because you aren’t sure what is going to work the best. You, or the program,
    will be able to go through and use past experience to help you make some predictions.
    But often, it is going to be a lot of trial and error to see what is going to
    work the best.


    Next, it is time to move on to the data generalization model. When you have been
    able to add in the input and the output with the learner, it is time to take a
    look at the part that is the data generalization model. This is a good model to
    work with because it ensures that you are able to base it on the probability distribution
