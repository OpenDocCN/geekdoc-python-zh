    ```


    # *Max()*


    Returns the largest element on a tuple.


    ```

    >>> numbers_tuple = (1, 5, 7, 9, 10, 12)

    >>> max(numbers_tuple)

    12

    >>>

    ```


    When a tuple holds items of purely string data type, max() evaluates the items
    alphabetically and returns the last item.


    ```

    >>> my_tuple = (''car'', ''zebra'', ''book'', ''hat'', ''shop'', ''art'')

    >>> max(my_tuple)

    ''zebra''

    >>>

    ```


    Using max() on tuples with mixed data types (string and numbers) will raise a
    TypeError due to the use of unorderable types.


    # *Min()*'
