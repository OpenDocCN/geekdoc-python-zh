    Subaru\",\"Insured\")\ntoyota=Car(\"Toyota\",\"Uninsured\")\nprint(\"Subaru is\
    \ a {}\".format(subaru.__class__.__name__))\nprint(\"Toyota is a {}\".format(toyota.__class__.__name__))\n\
    print(\"{} is {}\".format(subaru.model, subaru.insurance))\nprint(\"{} is {}\"\
    .format(toyota.model, toyota.insurance))\n```\n\n### Methods\nFunctions defined\
