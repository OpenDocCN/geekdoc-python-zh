    # Indexing


    If you know how to access elements in a list through indexing, you can use the
    same procedure to access items in a tuple. The index operator indicates the index
    of the element you want to access. The first element is on index zero. Accessing
    an item outside the scope of the indexed elements will generate an IndexError.
    In addition, accessing an index with a non-integer numeric type will raise a NameError.


    To illustrate how tuples work, create my_tuple with strings as elements.


    ```

    >>> my_tuple = (''p'', ''r'', ''o'', ''g'', ''r'', ''a'', ''m'', ''m'', ''e'',
    ''r'')

    >>>

    ```


    To access the first element on the tuple:


    ```

    >>> my_tuple[0]

    ''p''

    >>>

    ```


    To access the 8th element:


    ```

    >>> my_tuple[7]

    ''m''

    >>>

    ```


    To access the 6th element:


    ```

    >>> my_tuple[5]

    ''a''

    >>>

    ```


    # Negative Indexing


    As it is a sequence type, Python allows negative indexing on tuples. The last
    element has -1 index, the penultimate element has -2 index, and so on.


    ```

    >>> my_tuple = (''p'', ''r'', ''o'', ''g'', ''r'', ''a'', ''m'', ''m'', ''e'',
    ''r'')

    >>> my_tuple[-1]

    ''r''

    >>>my_tuple[-7]

    ''g''

    ```'
