    ## Deep Learning vs. Machine Learning


    Before we begin, it is important you remind yourself of the basic definitions
    or explanations of these two subjects. Machine learning is a branch of artificial
    intelligence that uses algorithms to teach machines how to learn. Further from
    the algorithms, the machine learning models need input and output data from which
    they can learn through interaction with different users.


    When building such models, it is always advisable to ensure that you build a scalable
    project that can take new data when applicable and use it to keep training the
    model and boost its efficiency. An efficient machine learning model should be
    able to self-modify without necessarily requiring your input and still provide
    the correct output. It learns from structured data available and keeps updating
    itself.


    Deep learning is a class of machine learning that uses the same algorithms and
    functions used in machine learning. However, deep learning introduces layered
    computing beyond the power of algorithms. Algorithms in deep learning are used
    in layers, with each layer interpreting data in a different way. The algorithm
    network used in deep learning is referred to as artificial neural networks.


    The name artificial neural networks gives us the closest iteration of what happens
    in deep learning frameworks. The goal here is to try and mimic the way the human
    brain functions by focusing on the neural networks. Experts in deep learning sciences
    have studied and referenced different studies on the human brain over the years,
    which has helped spearhead research into this field.


    ## Problem Solving Approaches


    Let’s consider an example to explain the difference between deep learning and
    machine learning.


    Say you have a database that contains photos of trucks and bicycles. How can you
    use machine learning and deep learning to make sense of this data? At first glance,
    what you will see is a group of trucks and bicycles. What if you need to identify
    photos of bicycles separately from trucks using these two frameworks?


    To help your machine learning algorithm identify the photos of trucks and bicycles
    based on the categories requested, you must first teach it what these photos are
    about. How does the machine learning algorithm figure out the difference? After
    all, they almost look alike.


    The solution is in a structured data approach. First, you will label the photos
    of bicycles and trucks in a manner that defines different features that are unique
    to either of these items. This is sufficient data for your machine learning algorithm
    to learn from. Based on the input labels, it will keep learning and refine its
    understanding of the difference between trucks and bicycles as it encounters more
    data. From this simple illustration, it will keep searching through millions of
    other data it can access to tell the difference between trucks and bicycles.


    ## How Do We Solve This Problem in Deep Learning?


    The approach in deep learning is different from what we have done in machine learning.
    The benefit here is that in deep learning, you do not need any labeled or structured
    data to help the model identify trucks from bicycles.


    The artificial neural networks will identify the image data through the different
    algorithm layers in the network. Each of the layers will identify and define a
    specific feature in the photos. This is the same method that our brains use when
    we try to solve some problems.


    Generally, the brain considers a lot of possibilities, ruling out all the wrong
    ones before settling on the correct one. Deep learning models will pass queries
    through several hierarchical processes to find the solution. At each identification
    level, the deep neural networks recognize some identifiers that help in distinguishing
    bicycles from trucks.


    This is the simplest way to understand how these two systems work. However, both
    deep learning and machine learning might not necessarily be applicable methods
    to tell these photos apart. As you learn about the differences between these two
    fields, you must remember you have to define the problem correctly before you
    can choose the best approach to implement in solving it. You will learn how to
    choose the right approach at a later stage in your journey into machine learning,
    which has been covered in the advanced books in this series.


    From the example illustrated above, we can see that machine learning algorithms
    need structured data to help them tell the difference between trucks and bicycles.
    From this information, they can then produce the correct output after identifying
    the classifiers.


    However, in deep learning, your model can identify images of the trucks and bicycles
    by passing information through several data processing layers in its framework.
    There is no need for structured data. To make the correct prediction, deep learning
    frameworks depend on the output provided at every data processing layer. This
    information builds up and presents the final outcome. In this case, it rules out
    all possibilities to remain with the only credible solution.


    From our illustrations above, we have learned some important facts that will help
    you distinguish deep learning from machine learning as you learn over the years.
    We can summarize this in the following points:


    - **Data presentation:** The primary difference between machine learning and deep
    learning is evident in the way we introduce data into the respective models. With
    machine learning models, you will almost always need to use structured data. However,
    in deep learning, the networks depend on artificial neural network layers to identify
    unique features that help to identify the data.

    - **Algorithms and human intervention:** The emphasis of machine learning is to
    learn from interacting with different inputs and use patterns. From such interaction,
    machine learning models can produce better output the longer it learns, and the
    more interaction it receives.


    To aid this cause, you must also try to provide as much new data as possible.
    When you realize that the output presented is not what you needed, you must retrain
    the machine learning model to deliver a better output. Therefore, for a system
    that should work without human intervention, you will still have to be present
    from time to time.


    In deep learning, your presence is not needed. All the nested layers within the
    neural networks process data at different levels. In the process, however, the
    model might encounter errors and learn from them.'
