- md: '## Python Booleans


    In the process of developing a software program, there is often a need to confirm
    and verify whether an expression is true or false. This is where Python Boolean
    data type and data values are used. In Python, comparison and evaluation of two
    data values will result in one of the two Boolean values: “True” or “False.”


    Here are some examples of the comparison statement of numeric data leading to
    Boolean value:


    ```

    print (100 > 90)

    OUTPUT – True

    print (100 == 90)

    OUTPUT – False

    print (100 < 90)

    OUTPUT – False

    ```


    Let’s look at the “**bool ()**” function now, which allows for the evaluation
    of numeric data as well as string data resulting in “True” or “False” Boolean
    values.


    ```

    print (bool (99))

    OUTPUT - True

    print (bool ("Welcome"))

    OUTPUT - True

    ```


    Here are some key points to remember for Booleans:


    - If a statement has some kind of content, it would be evaluated as “True.”

    - All string data values will be resulting as “True” unless the string is empty.

    - All numeric values will be resulting as “True” except “0.”

    - Lists, Tuples, Set, and Dictionaries will be resulting as “True” unless they
    are empty.

    - Mostly empty values like (), [], {}, “”, False, None and 0 will be resulting
    as “False.”

    - Any object created with the “len” function that results in the data value as
    “0” or “False” will be evaluated as “False.”


    In Python, there are various built-in functions that can be evaluated as Boolean,
    for example, the “isinstance()” function, which allows you to determine the data
    type of an object. Therefore, in order to check if an object is an integer, the
    code will be as below: **X = 123**


    ```

    print (isinstance (X, int))

    ```


    - **Exercise** – Create two variables, “X” with string data values as “Just do
    it!” and “Y” with numeric data value as “3.24” and evaluate them.


    ***Use Your Discretion Here And Write Your Code First***


    Now, check your code against the correct code below:


    ```

    X = “Just do it!”

    Y = 3.24

    print (bool (X))

    print (bool (Y))

    ```


    OUTPUT –

    True

    True


    ## Python Lists


    In Python, lists are collections of data types that can be changed, organized,
    and include duplicate values. Lists are written within square brackets, as shown
    in the syntax below.


    ```

    X = [“string001”, “string002”, “string003”]

    print (X)

    ```


    The same concept of position applies to the Lists as the string data type, which
    dictates that the first string is considered at position 0. Subsequently, the
    strings that will follow are given positions 1, 2, and so on. You can selectively
    display the desired string from a List by referencing the position of that string
    inside the square bracket in the print command, as shown below.


    ```

    X = [“string001”, “string002”, “string003”]

    print (X [2])

    OUTPUT – [string003]

    ```


    Similarly, the concept of *negative indexing* is also applied to Python List.
    Let’s look at the example below:


    ```

    X = [“string001”, “string002”, “string003”]

    print (X [-2])

    OUTPUT – [string002]

    ```


    You will also be able to specify a *range of indexes* by indicating the start
    and end of a range. The result in values of such command on a Python List would
    be a new List containing only the indicated items. Here is an example for your
    reference.


    ```

    X = [“string001”, “string002”, “string003”, “string004”, “string005”, “string006”]

    print (X [2 : 4])

    ```


    OUTPUT – [“string003”, “string004”]


    Remember, the first item is at position 0, and the final position of the range
    (4) is not included.


    Now, if you do not indicate the start of this range, it will default to the position
    0, as shown in the example below:


    ```

    X = [“string001”, “string002”, “string003”, “string004”, “string005”, “string006”]

    print (X [ : 3])

    ```


    OUTPUT – [“string001”, “string002”, “string003”]


    Similarly, if you do not indicate the end of this range, it will display all the
    items of the List from the indicated start range to the end of the List, as shown
    in the example below:


    ```

    X = [“string001”, “string002”, “string003”, “string004”, “string005”, “string006”]

    print (X [3 : ])

    ```


    OUTPUT – [“string004”, “string005”, “string006”]


    You can also specify a range of negative indexes to Python Lists, as shown in
    the example below:


    ```

    X = [“string001”, “string002”, “string003”, “string004”, “string005”, “string006”]

    print (X [-3 : -1])

    ```


    OUTPUT – [“string004”, “string005”]


    Remember, the last item is at position -1, and the final position of this range
    (-1) is not included in the Output.


    There might be instances when you need to change the data value for a Python List.
    This can be accomplished by referring to the index number of that item and declaring
    the new value. Let’s look at the example below:


    ```

    X = [“string001”, “string002”, “string003”, “string004”, “string005”, “string006”]

    X [3] = “newstring”

    print (X)

    OUTPUT – [“string001”, “string002”, “string003”, “newstring”, “string005”, “string006”]

    ```


    You can also determine the *length* of a Python List using the “len()” function,
    as shown in the example below:


    ```

    X = [“string001”, “string002”, “string003”, “string004”, “string005”, “string006”]

    print (len (X))

    OUTPUT – 6

    ```


    Python Lists can also be changed by *adding new items* to an existing list using
    the built-in “append ()” method, as shown in the example below:


    ```

    X = [“string001”, “string002”, “string003”, “string004”]

    X.append (“newstring”)

    print (X)

    OUTPUT – [“string001”, “string002”, “string003”, “string004”, “newstring”]

    ```


    You can also add a new item to an existing Python List at a specific position
    using the built-in “insert ()” method, as shown in the example below:


    ```

    X = [“string001”, “string002”, “string003”, “string004”]

    X.insert (2, “newstring”)

    print (X)

    OUTPUT – [“string001”, “string002”, “newstring”, “string004”]

    ```


    There might be instances when you need to *copy* an existing Python List. This
    can be accomplished by using the built-in “copy ( )” method or the “list ( )”
    method, as shown in the example below:


    ```

