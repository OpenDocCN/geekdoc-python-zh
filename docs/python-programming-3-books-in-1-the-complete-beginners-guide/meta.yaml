    # Python Set


    In Python, sets are collections of data types that cannot be organized and indexed.
    Sets do not allow for duplicate items and must be written within curly brackets,
    as shown in the syntax below:


    ```

    set = {“string1”, “string2”, “string3”}

    print (set)

    ```


    Unlike the Python List and Tuple, you cannot selectively display desired items
    from a Set by referencing the position of that item because the Python Set are
    not arranged in any order.


    Unlike Python Lists, you cannot directly change the data values of Python Sets
    after they have been created. However, you can use the “add ()” method to add
    a single item to Set and use the “update ( )” method to one or more items to an
    already existing Set. Let’s look at the example below:


    ```

    set = {“string1”, “string2”, “string3”}

    set. add (“newstring”)

    print (set)

    ```'
