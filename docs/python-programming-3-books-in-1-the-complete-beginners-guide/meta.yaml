    \ 会按字母顺序评估项目并返回最后一个项目。\n\n```\n>>> my_tuple = ('car', 'zebra', 'book', 'hat',\
    \ 'shop', 'art')\n>>> max(my_tuple)\n'zebra'\n>>>\n```\n\n在包含混合数据类型（字符串和数字）的元组上使用\
    \ `max()` 会引发 `TypeError`，因为使用了不可比较的类型。\n\n### Min()\n\n返回元组中的最小元素。\n\n```\n>>>\
    \ numbers_tuple = (1, 5, 7, 9, 10, 12)\n>>> min(numbers_tuple)\n1\n>>>\n```\n\n\
    当用于包含纯字符串数据类型的元组时，`min()` 会按字母顺序评估项目并返回第一个项目。\n\n```\n>>> my_tuple = ('car', 'zebra',\
    \ 'book', 'hat', 'shop', 'art')\n>>> min(my_tuple)\n'art'\n>>>\n```\n\n### Sorted()\n\
    \n返回一个排序后的列表，但不会对元组本身进行排序。\n\n```\n>>> my_tuple = ('dog', 'bird', 'ant', 'cat',\
