    # # Input and Output


    So far, we’ve only been writing programs that only use data we have explicitly
    defined in the script. However, your programs can also take in input from the
    user and utilize it. Python lets us solicit inputs from the user with a very intuitively
    named function—the input () function. Writing out the code input () enables us
    to prompt the user for information, which we can further manipulate. We can take
    the user input and save it as a variable, print it straight to the terminal, or
    do anything else we might like.


    When we use the input function, we can pass in a string. The user will see this
    string as a prompt, and their response to the prompt will be saved as the input
    value. For instance, if we wanted to query the user for their favorite food, we
    could write the following:


    ```

    favorite_food = input ("What is your favorite food? ")

    ```


    If you ran this code example, you would be prompted for your favorite food. You
    could save multiple variables this way and print them all at once using the print
    () function along with print formatting, as we covered earlier. To be clear, the
    text that you write in the input function is what the user will see as a prompt;
    it isn’t what you are inputting into the system as a value.


    When you run the code above, you’ll be prompted for an input. After you type in
    some text and hit the return key, the text you wrote will be stored as the variable
    favorite_food. The input command can be used along with string formatting to inject
    variable values into the text that the user will see. For instance, if we had
    a variable called user_name that stored the name of the user, we could structure
    the input statement like this:


    ```

    favorite_food = input (" What is ()’s favorite food? "). format (" user name here")

    ```


