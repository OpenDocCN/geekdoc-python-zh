- md: '## PYTHON FOR DATA SCIENCE


    ## Introduction


    When handling data, the most common, traditional, and widely used management technique
    is the ‘Relational Database Management Systems,’ also known as ‘RDBMS.’ This technique
    is applied to almost every dataset, as it easily meets the dataset’s required
    demands of the processing; however, this is not the case for ‘Big Data.’ Before
    we can understand why such management techniques fail to process big data, we
    need to understand first what the term ‘Big Data’ refers to. The name itself gives
    away a lot of the information regarding the data natures. Nevertheless, big data
    is basically a term that is used to define a collection of datasets that are very
    large and complex in size alone. Such datasets become difficult to process using
    traditional data management techniques and, thus, demand a new approach for handling
    them, as it is evident from the fact that the commonly used technique RDBMS has
    zero working compatibility with big data.


    The core of data science is to employ methods and techniques that are the most
    suitable for the analysis of the sample dataset so we can take out the essential
    bits of information contained in it. In other words, big data is like a raw mineral
    ore containing a variety of useful materials, but in its current form, its contents
    are unusable and useless. Data science is the refinery, which essentially uses
    effective techniques to analyze this ore and then employ corresponding methods
    to extract its contents for us to use.


    The world of big data is exponentially vast and the use of data science with big
    data can be seen in almost every sector of the modern age, be it commercial, non-commercial,
    business, or even industrial settings. For instance, in a commercial setting,
    the corresponding companies use the data science and big data elements to chiefly
    get a better insight into the demands of their customers and information regarding
    the efficiency of their products, staff, manufacturing processes, etc. Consider
    Google’s advertising department AdSense; it basically employs data science to
    analyze the big data (which is a collection of user internet data) to extract
    information in order to ensure that the person browsing the internet is seeing
    relevant advertisements. The uses of data science extend far and beyond what we
    can imagine. It is not possible to list all the advantageous uses that are currently
    being employed in the modern-day. However, what we do know is that the majority
    of the datasets gathered by big companies all around the world are none other
    than big data. Data science is essential for these companies to analyze this data
    and benefit from the information it contains. Not only that, big educational institutions
    like Universities and research work also benefit from data science.


    While venturing across the field of data science, you will soon come to realize
    that there is not one defined type of data. Instead, there are multiple categories
    under which data is classified, and each category of data requires an entirely
    different toolset in order to be processed.


    Following are the seven major categories of data:


    1. Structured Data.

    2. Unstructured Data.

    3. Natural Language Data.

    4. Machine Generated Data.

    5. Graph-based Data.

    6. Audio, Video, and Image Data.

    7. Streaming Data.


    As the name suggests, a collection of data that is organized according to a defined
    model and restricted in the record’s corresponding data fields is known as structured
    data. For instance, data that is organized in the form of a table is known as
    structured data (such as Excel tables or in databases). To manage and analyze
    such data, a preferable method is to use the Structured Query Language or SQL.
    However, not all structured datasets are easily manageable; for instance, the
    family data tree is also a structured dataset, but it becomes difficult to process
    and analyze such structured datasets. In other words, some exceptions in these
    data categories may demand another data processing technique.


    Raw data is never structured; it is brought into a defined setting by the users.
    Hence, if we are given a data sample that is structured, then all is good; however,
    if the data is unstructured, we must bring it into a structured format before
    applying the SQL technique.


    Below is an example showing a dataset structured into an Excel table:


    Data found in emails, is a common example of unstructured data. Hence to process
    and analyze the data, we must first filter it and bring it into a structured form.


    One may argue that data contained in an email is also structured to some extent
    because there are fields such as the sender, the receiver, and the subject. However,
    the reason why traditional structural data analyzing techniques are not applicable
    to emails is that the data contained within them are either highly varying or
    context-specific. Moreover, the choice of words, the language used, and the intonations
    to refer to something in an email also varies, making the task even more complicated.


    This is also a type of unstructured data, and it is also very complicated to process
    as we would need to factor in linguistics. Hence, for such datasets, the user
    must have a good understanding of various data science techniques in addition
    to linguistics. The main concern of the community working with natural language
    processing is the lack of generalization in their models. Each model is trained
    specifically to one aspect, such as entity recognition, topic recognition, and
    summarization, etc., but these models fail to generalize over to other domains
    such as text completion and sentiment analysis. The reason is that language is
    ambiguous, and it is impossible to program and train machines to overcome this
    ambiguity when humans themselves have failed to do so.


    As the name suggests, the data produced by a computer or its corresponding processes
    and applications without any external fiddling of humans is known as machine-generated
    data. Such types of data have become a major data resource as it is automated.
    To analyze and extract the information being contained within this machine-generated
    data, we would need to use tools that are very scalable. This is in accordance
    with the fact that this type of data is not only high in volume but also in the
    speed to which it is being generated. Data such as crash logs, web server logs,
    network logs, and even call record logs are all in nature, machine-generated data
    as shown in the example below:


    We must not confuse the terms ‘graph’ and ‘graph theory.’ The first one represents
    the geometrical representation of data in a graph, and any data can be made into
    a graph, but that does not necessarily change the nature of the data. The latter
    refers to the mathematical structure, which essentially is a model that connects
    the objects into a pair based on their inherent relationship with each other.
    Hence, we can also term such categories of data as Network data. This type of
    data emphasizes elements such as the adjacency and relationship of objects and
    the common structures found in graphs found in graph-based data are:


    - Nodes.

    - Edges.

    - Properties.


    Graph-based data is most commonly seen on social media websites. Here’s an example
    of a graph-based data representing many friends on a social network.


    To query graph-based data, we normally use specialized query languages such as
    SPARQL.


    Everyone is familiar with audio, image, and video data to a certain extent. However,
    out of all the data categories, audio, image, and video data are very difficult
    to deal with for a data scientist. This is partly because though we analyze this
    data, the computer must recognize elements, such as image data, discerning between
    objects, and identifying them is a very difficult task, although it is easy for
    the user. To deal with such categories of data, we usually implement deep learning
    models.


    This category of data can take on the nature of any of the data categories mentioned
    previously. However, the aspect that makes it different from the other data categories
    is that in streaming data, the data only comes into the system after an event
    happens in real-time, unlike other categories where the data is loaded into the
    systems in the form of batches. The reason why streaming data is defined as an
    entirely different category is due to the fact that we need an altogether different
    process to analyze and extract information from streaming data.'
  mdcn: '## 面向数据科学的Python


    ## 引言


    在处理数据时，最常见、传统且广泛使用的管理技术是“关系数据库管理系统”，也称为“RDBMS”。这种技术几乎适用于所有数据集，因为它能轻松满足数据集对处理的要求；然而，对于“大数据”而言，情况并非如此。在理解为何此类管理技术无法处理大数据之前，我们首先需要了解“大数据”这一术语的含义。这个名称本身揭示了关于数据性质的大量信息。尽管如此，大数据基本上是一个术语，用于定义那些仅在规模上就非常庞大和复杂的数据集集合。此类数据集使用传统数据管理技术难以处理，因此需要一种新的方法来处理它们，正如事实所表明的那样，常用的技术RDBMS与大数据完全不兼容。


    数据科学的核心是采用最适合分析样本数据集的方法和技术，以便从中提取出包含的关键信息。换句话说，大数据就像一种含有多种有用材料的原始矿石，但就其当前形式而言，其内容无法使用且毫无用处。数据科学就是精炼厂，它本质上使用有效的技术来分析这种矿石，然后采用相应的方法提取其内容供我们使用。


    大数据的世界呈指数级增长，数据科学与大数据的结合在现代的几乎每个领域都能看到，无论是商业、非商业、商业还是工业环境。例如，在商业环境中，相应的公司使用数据科学和大数据元素，主要是为了更好地了解客户需求以及其产品、员工、制造流程等效率的信息。以谷歌的广告部门AdSense为例；它基本上运用数据科学来分析大数据（这是用户互联网数据的集合），以提取信息，从而确保浏览互联网的人看到相关的广告。数据科学的用途远远超出我们的想象。不可能列出当前在现代世界中正在使用的所有有利用途。然而，我们确实知道的是，世界各地大公司收集的大多数数据集无一例外都是大数据。数据科学对于这些公司分析这些数据并从中受益至关重要。不仅如此，像大学这样的大型教育机构以及研究工作也从数据科学中受益。


    在探索数据科学领域时，你很快就会意识到数据并非只有一种确定的类型。相反，数据被分为多个类别，每个类别的数据需要一套完全不同的工具集来进行处理。


    以下是数据的七个主要类别：


    1. 结构化数据。

    2. 非结构化数据。

    3. 自然语言数据。

    4. 机器生成数据。

    5. 基于图的数据。

    6. 音频、视频和图像数据。

    7. 流数据。


    顾名思义，根据定义模型组织并限制在记录对应数据字段中的数据集合被称为结构化数据。例如，以表格形式组织的数据被称为结构化数据（如Excel表格或数据库中的数据）。要管理和分析此类数据，首选方法是使用结构化查询语言或SQL。然而，并非所有结构化数据集都易于管理；例如，家族数据树也是一个结构化数据集，但处理和分析此类结构化数据集变得困难。换句话说，这些数据类别中的一些例外可能需要另一种数据处理技术。


    原始数据从来不是结构化的；它是由用户引入到一个定义好的环境中的。因此，如果我们得到一个结构化的数据样本，那么一切都好；但是，如果数据是非结构化的，我们必须在应用SQL技术之前将其转换为结构化格式。


    下面是一个示例，展示了一个结构化为Excel表格的数据集：


    电子邮件中找到的数据是非结构化数据的一个常见例子。因此，要处理和分析数据，我们必须先对其进行过滤并将其转换为结构化形式。


    有人可能会争辩说，电子邮件中包含的数据在某种程度上也是结构化的，因为存在诸如发件人、收件人和主题等字段。然而，传统的结构化数据分析技术不适用于电子邮件的原因在于，其中包含的数据要么变化很大，要么是特定于上下文的。此外，电子邮件中用于指代某物的措辞、使用的语言和语调也各不相同，这使得任务变得更加复杂。


    这也是一种非结构化数据，并且处理起来也非常复杂，因为我们需要考虑语言学因素。因此，对于此类数据集，用户除了语言学知识外，还必须对各种数据科学技术有良好的理解。从事自然语言处理工作的社区主要关注的是其模型缺乏泛化能力。每个模型都是专门针对某个方面进行训练的，例如实体识别、主题识别和摘要等，但这些模型无法泛化到其他领域，如文本补全和情感分析。原因是语言具有模糊性，而且当人类自身都未能克服这种模糊性时，不可能编程和训练机器来克服它。


    顾名思义，由计算机或其相应的进程和应用程序在没有任何人类外部干预的情况下产生的数据被称为机器生成数据。此类数据已成为主要的数据资源，因为它是自动化的。要分析和提取包含在此类机器生成数据中的信息，我们需要使用可扩展性非常强的工具。这符合一个事实，即这种类型的数据不仅数量大，而且生成速度快。诸如崩溃日志、Web服务器日志、网络日志甚至通话记录日志等数据本质上都是机器生成的数据，如下例所示：


    我们绝不能混淆“图”和“图论”这两个术语。前者代表数据在图中的几何表示，任何数据都可以制成图，但这并不一定改变数据的性质。后者指的是数学结构，本质上是一个模型，它根据对象之间固有的关系将对象连接成对。因此，我们也可以将此类数据称为网络数据。此类数据强调诸如对象的邻接性和关系等元素，基于图的数据中常见的图结构包括：


    - 节点。

    - 边。

    - 属性。


    基于图的数据在社交媒体网站上最为常见。这是一个基于图的数据示例，表示社交网络中的许多朋友。


    要查询基于图的数据，我们通常使用专门的查询语言，如SPARQL。


    每个人都在一定程度上熟悉音频、图像和视频数据。然而，在所有数据类别中，音频、图像和视频数据对于数据科学家来说非常难以处理。这部分原因在于，尽管我们分析这些数据，但计算机必须识别元素，例如图像数据，区分对象并识别它们是一项非常困难的任务，尽管对用户来说很容易。要处理此类数据类别，我们通常实现深度学习模型。


    此类数据可以具有前面提到的任何数据类别的性质。然而，使其与其他数据类别不同的方面在于，在流数据中，数据仅在实时事件发生后才进入系统，不像其他类别那样数据以批量形式加载到系统中。流数据被定义为一个完全不同的类别的原因在于，我们需要一个完全不同的过程来分析和提取流数据中的信息。'
