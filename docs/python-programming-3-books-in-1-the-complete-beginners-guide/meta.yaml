    本节介绍了在机器学习中，借助概率论和统计学可以做的一些事情。你可以尝试其中一些，以掌握如何使用它们，然后我们可以学习一些你以后可以使用的算法。


    ## 描述性统计


    Excel分析工具库将包含此处描述的所有工具。要访问这些工具，你需要选择“数据”选项卡，然后选择“分析”组，再选择“数据分析”。如果找不到“数据分析”命令，你可能需要加载加载项程序工具库。


    ## 加载和激活工具库


    你们中的一些人可能已经在Excel中安装了工具库，如果是这样，请转到下一步。对于那些没有安装的人，让我们看看如何开始。


    首先，你需要选择“文件”选项卡，然后选择“选项”。之后，选择“加载项”类别。如果你使用的是Excel 2007，你需要单击Microsoft Office按钮，然后选择“Excel选项”。


    另外，如果你还想为你的工具库添加Visual Basic for Applications功能，你可以选择加载“工具库 - VBA”加载项，就像你加载工具库一样。一旦你可以访问“可用加载项”框，你将选择“分析工具库
    - VBA”。


    ## 方差分析


    分析工具“方差分析”将为你提供其他分析方法。所需的工具取决于你收集了多少样本以及其他你感兴趣测试的因素。


    ### 方差分析：单因素


    使用此工具，你将能够对至少有两个样本的数据执行简单的方差分析。此分析将检验你的假设，即所有样本来自同一分布，与认为每个样本的分布都不相同的其他理论相对立。如果你只有几个样本，那么你可以选择T.Test函数。如果你有两个以上的样本，T.Test没有任何方便的概括；此时，你可以选择单因素方差分析模型。


    ### 方差分析：可重复双因素分析


    当数据可以按两个维度分类时，这是最好的工具。一个很好的例子是，如果你有一个测量不同植物高度的实验。你可以给植物施用不同的肥料，在这个例子中，我们称它们为A、B和C，它们甚至可能保持在不同的温度下，例如高温和低温。对于六种可能的温度和肥料组合中的每一种，你都会有相同数量的植物高度观测值。使用该工具时，你将能够检验：


    - 不同温度下的植物高度是否来自同一总体；在此分析中，肥料品牌将被忽略。

    - 不同肥料下的植物高度是否来自同一总体；在此分析中，温度将被忽略。


    无论你是在研究不同温度的影响还是不同肥料品牌的影响，代表每对组合值的六个样本都来自某个组。另一个假设是，特定的温度或肥料组合会产生影响，这种影响超出了仅基于温度或肥料的差异。


    ### 方差分析：无重复双因素分析


    当你的数据像可重复双因素分析一样被分成两个部分时，这是一个有用的分析工具。但它将假设你每对组合只有一个观测值，在前面的例子中，就是每对温度和肥料组合。


    ### 相关性


    Pearson和Correl工作表函数都将计算每个不同主体观测到的每个变量的测量值之间的相关系数。如果你的主体有缺失的观测值，它将导致该主体在分析过程中被忽略。一个特别有用的工具是相关性分析工具，当你每个主体有两个以上的变量时。它会给你一个表格，即相关矩阵；这将显示应用于你所有变量的Pearson值或Correl值。


    与协方差一样，相关系数是衡量两个变量可能如何共同变化的一种方式。与协方差不同，相关系数的值会按比例缩放，使其与变量显示的单位不同。一个很好的例子是，如果你有身高和体重变量，如果体重单位从千克改为磅，相关系数值不会改变。任何相关系数值都需要在-1和+1之间。


    该工具在检查每对变量以确定两者是否同时变化时很有用。这意味着如果一个变量的较大值通常与正相关量相关联，那么一个小变量值是否与较大的负相关量相关联，或者每个变量的值是否通常与接近零的相关性无关，这并不重要。


    ### 协方差


    当你在一组个体中观察到特定数量的不同测量变量时，你可以在相同的设置中使用协方差和相关性工具。这两个工具都提供一个输出表，即一个矩阵，显示每对测量变量之间的协方差或相关系数。一个区别是相关系数被缩放到+1和-1。对于相应的协方差，它们没有被缩放。两者都提供了两个变量共同变化程度的度量。


    使用协方差工具，它将为你提供用于所有变量对的函数Covariance.P的值。当你只有两个测量变量时，你也可以直接使用Covariance.P而不是Covariance工具。输出表中第I列和第I行的对角线条目是第i个变量的协方差。这代表了通过VAR.P计算的变量总体方差。


    协方差工具可用于查看每对变量，以确定两个变量是否同时变化。这意味着如果一个变量的大量值倾向于与正协方差的大量值相关联，如果一个变量的小量值与负协方差相关联，或者如果两者的量都倾向于为零。


    ### 描述性统计


    此工具将为你提供输入范围内所有信息的单变量统计描述，只要有关于信息的变异性和趋势的信息。


    ### 指数平滑


    此工具将基于前一时间的预测进行预测，并调整前一预测中发生的错误。此工具使用平滑常数，其大小有助于确定预测对前一预测中发生的错误的响应强度。


    请记住，.2到.3的值是平滑常数。这个数量表明，当前预测需要改变20%到30%，以考虑前一预测的误差。较大的常数将产生更快的响应，但它们可能会给你带来不稳定的预测。较小的常数可能会导致预测值滞后。


    ### F检验 双样本方差


    此工具将执行双样本F检验，以便你可以比较两个不同的总体方差。


    一个例子是，你可以将此工具用于游泳比赛中两支队伍累积时间的样本。此工具将为你提供检验结果，检验样本是否来自具有相同方差的分布；它将其与方差可能不等于分布的替代方案进行比较。


    此工具将计算F比率的f值。如果f的值接近1，它告诉你总体方差是相同的。如果你有f < 1 “P(F <= f) 单尾”，它告诉你当总体方差相同时，看到F值低于f的概率。“F
    单尾临界值”将显示你为所选水平Alpha选择的低于1的临界值。如果f > 1，“P(F <= f) 单尾”它告诉你当总体方差相同时，看到F值大于f的概率。“F
    单尾临界值”将显示你为Alpha选择的高于1的临界值。


    ### 直方图


    使用此工具，它可以计算数据分箱和数据的单元格区域的累积频率和单独频率。这将告诉你一个数字在数据集中出现的次数。'
