    \ offer):\n        self.__finalprice = offer\nt = Tv()\nt.offer()\nt.__finalprice\
    \ = 950\nt.offer()\n# using setter function\nt.set_final_price(990)\nt.offer()\n\
    ```\n\n**Discussion**\nThe program defined a class Tv and used __init__() methods\
    \ to hold the final offering price of the TV. Along the way, we attempted to change\
