    \ code, let’s take a moment to look at some of the things that you can do with\
    \ Machine Learning and artificial intelligence with your coding. We spent some\
    \ time talking about how you can work with these and some of the different parts\
    \ of the code, as well as how Python is going to work with the idea of Machine\
    \ Learning. Now we are going to take that information and create one of our Machine\
    \ Learning algorithms to work with as well."
  merge: -1
  pgno: 246
- img_proc: true
  md: "Before we work on a code for this one, we need to take a look at what this\
    \ k-means clustering means. This is a basic algorithm that works well with Machine\
    \ Learning and is going to help you to gather up all of the data you have in your\
    \ system, the data that isn’t labeled at the time and then puts them all together\
    \ in their little group of a cluster.\n\nThe idea of working with this kind of\
    \ cluster is that the objects that fall within the same cluster, whether there\
    \ are just two or more, are going to be related to each other in some manner or\
    \ another, and they are not going to be that similar to the data points that fall\
    \ into the other clusters. The similarity here is going to be the metric that\
    \ you will want to use to show us the strength is in the relationship between\
    \ the two.\n\nWhen you work on this particular algorithm, it is going to be able\
    \ to form some of the clusters you need of the data, based on how similar the\
    \ values of data you have. You will need to go through and give them a specific\
    \ value for K, which will be how many clusters that you would like to use. It\
    \ is best to have at least two, but the number of these clusters that you work\
    \ with will depend on how much data you have and how many will fit in with the\
    \ type of data that you are working with.\n\nWith this information in mind and\
    \ a good background of what the K-means algorithm is going to be used for, it\
    \ is time to explore a bit more about how to write your own codes and do an example\
    \ that works with K-means. This helps us to practice a bit with Machine Learning\
    \ and gives us a chance to practice some of our own new Python skills.\n\n```\n\
    import numpy as np\nimport matplotlib.pyplot as plt\ndef d(u, v):\n    diff =\
    \ u - v\n    return diff.dot(diff)\ndef cost(X, R, M):\n    cost = 0\n    for\
    \ k in xrange(len(M)):\n```"
  merge: -1
  pgno: 247
- img_proc: true
  md: "```\nfor n in xrange(len(X)):\n    cost += R[n,k]*d(M[k], X[n])\nreturn cost\n\
    ```\n\nAfter this part, we are going to take the time to define your function\
    \ so that it is able to run the k-means algorithm before plotting the result.\
    \ This is going to end up with a scatterplot where the color will represent how\
    \ much of the membership is inside of a particular cluster.\n\nWe would do that\
    \ with the following code:\n\n```\ndef plot_k_means(X, K, max_iter=20, beta=1.0):\n\
    \    N, D = X.shape\n    M = np.zeros((K, D))\n    R = np.ones((N, K)) / K\n \
    \   # initialize M to random\n    for k in xrange(K):\n        M[k] = X[np.random.choice(N)]\n\
    \    grid_width = 5\n    grid_height = max_iter / grid_width\n    random_colors\
    \ = np.random.random((K, 3))\n    plt.figure()\n    costs = np.zeros(max_iter)\n\
    \    for i in xrange(max_iter):\n        # moved the plot inside the for loop\n\
    \        colors = R.dot(random_colors)\n        plt.subplot(grid_width, grid_height,\
    \ i+1)\n        plt.scatter(X[:,0], X[:,1], c=colors)\n```"
  merge: -1
  pgno: 248
- img_proc: true
  md: "```\n# step 1: determine assignments / responsibilities\n# is this inefficient?\n\
    for k in xrange(K):\n    for n in xrange(N):\n        R[n,k] = np.exp(-beta*d(M[k],\
    \ X[n])) / np.sum( np.exp(-beta*d(M[j], X[n])) for j in xrange(K) )\n\n# step\
    \ 2: recalculate means\nfor k in xrange(K):\n    M[k] = R[:,k].dot(X) / R[:,k].sum()\n\
    \ncosts[i] = cost(X, R, M)\nif i > 0:\n    if np.abs(costs[i] - costs[i-1]) <\
    \ 10e-5:\n        break\n\nplt.show()\n```\n\nNotice here that both the M and\
    \ the R are going to be matrices. The R is going to become the matrix because\
    \ it holds onto 2 indices, the k and the n. M is also a matrix because it is going\
    \ to contain the K individual D-dimensional vectors. The beta variable is going\
    \ to control how fuzzy or spread out the cluster memberships are and will be known\
    \ as the hyperparameter. From here, we are going to create a main function that\
    \ will create random clusters and then call up the functions that we have already\
    \ defined above.\n\n```\ndef main():\n    # assume 3 means\n    D = 2 # so we\
    \ can visualize it more easily\n    s = 4 # separation so we can control how far\
    \ apart the means are\n    mu1 = np.array([0, 0])\n    mu2 = np.array([s, s])\n\
    ```"
  merge: -1
  pgno: 249
- img_proc: true
  md: "```\nmu3 = np.array([0, s])\nN = 900 # number of samples\nX = np.zeros((N,\
    \ D))\nX[:300, :] = np.random.randn(300, D) + mu1\nX[300:600, :] = np.random.randn(300,\
    \ D) + mu2\nX[600:, :] = np.random.randn(300, D) + mu3\n# what does it look like\
    \ without clustering?\nplt.scatter(X[:,0], X[:,1])\nplt.show()\nK = 3 # luckily,\
    \ we already know this\nplot_k_means(X, K)\n# K = 5 # what happens if we choose\
    \ a \"bad\" K?\n# plot_k_means(X, K, max_iter=30)\n# K = 5 # what happens if we\
    \ change beta?\n# plot_k_means(X, K, max_iter=30, beta=0.3)\nif __name__ == '__main__':\n\
    \    main()\n```\n\nYes, this process is going to take some time to write out\
    \ here, and it is not always an easy process when it comes to working through\
    \ the different parts that come with Machine Learning and how it can affect your\
    \ code. But when you are done, you will be able to import some of the data that\
