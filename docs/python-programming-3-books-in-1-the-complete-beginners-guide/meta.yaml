    ## Basic Data Types


    Python supports different data types. Each variable should belong to one of the
    data types supported in Python. The data type determines the value that can be
    assigned to a variable, the type of operation that may be applied to the variable
    as well as the amount of space assigned to the variable. Let us discuss different
    data types supported in Python.


    ## Python Numbers


    These data types help in the storage of numeric values. The creation of number-objects
    in Python is done after we have assigned a value to them. Consider the example
    given below:


    ```

    total = 55

    age = 26

    ```


    The statement can be used for the deletion of single or multiple variables. This
    is shown below:


    ```

    del total

    del total, age

    ```


    In the first statement, we are deleting a single variable, while in the second
    statement, we are deleting two variables. If the variables to be deleted are more
    than two, separate them with a comma, and they will be deleted.


    In Python, there are four numerical values, which are supported:


    - Int

    - Float

    - Complex


    In Python 3, all integers are represented in the form of long integers. The Python
    integer literals belong to the int class.


    ### Example


    Run the following statements consecutively on the Python interactive interpreter:


    ```

    x=10

    x

    ```


    You can run it on the Python interactive interpreter, and you will observe the
    following:


    /


    The float is used for storing numeric values with a decimal point.


    ### Example


    ```

    x=10.345

    x

    /

    ```


    If you are performing an operation with one of the operands being a float and
    the other being an integer, the result will be a float.


    ### Example


    ```

    5 * 1.5

    ```


    /As shown above, the result of the operation is 7.5, which is a float.


    Complex numbers are made of real and imaginary parts, with the imaginary part
    being denoted using a j. They can be defined as follows:


    ```

    x = 4 + 5j

    ```


    /In the above example, 4 is the real part, while 5 is the imaginary part.


    In Python, there is a function named type() that can be used for determining the
    type of a variable. You only have to pass the name of the variable inside that
    function as the argument, and its type will be printed.


    ### Example


    ```

    x=10

    type(x)

    /

    ```


    The variable x is of class int, as shown above. You can try it for other variable
    types, as shown below:


    ```

    name=''nicholas''

    type(name)

    / The variable is of the string class as shown above.

    ```


    ## Python Strings


    Python strings are a series of characters enclosed within quotes. Use any type
    of quotes to enclose Python strings, that is, either single, double, or triple
    quotes. To access string elements, we use the slice operator. String characters
    begin at index 0, meaning that the first character string is at index 0. This
    is good when you need to access string characters. To concatenate strings in Python,
    we use + operator; the asterisk (*) is used for repetition.


    ### Example


    ```

    #!usrbin/Python3

    thanks = ''Thank You''

    print (thanks) # to print the complete string

    print (thanks[0]) # to print the first character of the string

    print (thanks[2:7]) # to print the 3rd to the 7th character of the string

    print (thanks[4:]) # to print from the 5th character of the string

    print (thanks * 2) # to print the string two times

    print (thanks + "\tAgain!") # to print a concatenated string

    ```


    The program prints the following once executed:

    / Notice that we have text that begins with the # symbol. The symbol denotes the
    beginning of a comment. The Python print will not act on the text from the symbol
    to the end of the line. Comments are meant to enhance the readability of code
    by giving explanations. We defined a string named *thanks* with the value *Thank
    You*. The *print (thanks[0])* statement helps us access the first character of
    the string; hence it prints T. You also notice that the space between the two
    words is counted as a character.


    ## Python Tuples


    In Python, Tuples are collections of data types that cannot be changed but can
    be arranged in a specific order. Tuples allow for duplicate items and are written
    within round brackets, as shown in the syntax below.

    Tuple = (“string001”, “string002”, “string003”)


    ```

    print (Tuple)

    ```


    Similar to the Python List, you can selectively display the desired string from
    a Tuple by referencing the position of that string inside the square bracket in
    the print command as shown below.


    ```

    Tuple = ("string001", "string002", "string003")

    print (Tuple [1])

    OUTPUT – ("string002")

    ```


    The concept of *negative indexing* can also be applied to Python Tuple, as shown
    in the example below:


    ```

    Tuple = ("string001", "string002", "string003", "string004", "string005")

    print (Tuple [-2])

    OUTPUT – ("string004")

    ```


    You will also be able to specify a *range of indexes* by indicating the start
    and end of a range. The result in values of such command on a Python Tuple would
    be a new Tuple containing only the indicated items, as shown in the example below:


    ```

    Tuple = ("string001", "string002", "string003", "string004", "string005", "string006")

    print (Tuple [1:5])

    OUTPUT – ("string002", "string003", "string004", "string005")

    ```


    Remember, the first item is at position 0, and the final position of the range,
    which is the fifth position in this example, is not included.


    You can also specify a *range of negative indexes* to Python Tuples, as shown
    in the example below:


    ```

    Tuple = ("string001", "string002", "string003", "string004", "string005", "string006")

    print (Tuple [-4: -2])

    OUTPUT – ("string004", "string005")

    ```


    Remember, the last item is at position -1, and the final position of this range,
    which is the negative fourth position in this example, is not included in the
    Output.


    Unlike Python lists, you cannot directly *change the data value of Python Tuples*
    after they have been created. However, conversion of a Tuple into a List and then
    modifying the data value of that List will allow you to create a Tuple subsequently
    from that updated List. Let’s look at the example below:


    ```

    Tuple1 = (“string001”, “string002”, “string003”, “string004”, “string005”, “string006”)
    List1 = list (Tuple1)

    List1 [2] = “update this list to create new tuple”

    Tuple1 = tuple (List1)

    print (Tuple1)

    OUTPUT – (“string001”, “string002”, “update this list to create new tuple”, “string004”,
    “string005”, “string006”)

    ```


    You can also determine the *length* of a Python Tuple using the “len()” function,
    as shown in the example below:


    ```

