    现在，你可以利用概率论和统计学的几种不同方法，所有这些方法对于你需要在此处看到的学习过程都很重要。首先需要考虑的是选择合适的算法。当你阅读本指南时，你会发现有许多不同的算法可供使用，包括监督学习、无监督学习以及强化学习算法。然而，并非所有算法都适用于你的每一个项目。


    当你选择一个算法来使用时（我们将在本指南中讨论相当多的算法），你需要平衡几件事，包括所需的参数数量、复杂度、可用的训练时间以及准确性。随着我们花更多时间在机器学习上，你会发现每个需要关注的项目都会要求这些因素的特定组合，因此请提前考虑这一点。


    当你决定使用统计学和概率论的理念时，你将能更好地为你的特定程序选择正确的参数、验证策略，并且你可以利用所有这些来为该项目选择算法。当你想要弄清楚该算法中存在多少不确定性时，这也将会很有帮助，并且你可以确定是否应该对任何预测保持一定程度的信任。


    正如你在这里可以想象的那样，这两个主题在处理任何机器学习项目时都非常有用，并且当你想要理解任何项目中正在发生的事情时，它们将产生奇效。本阶段将探讨统计学和概率论带来的不同主题，以及如何将它们应用于任何项目。


    ## 什么是随机变量？


    现在，统计学中的第一个主题是随机变量。在概率论中，这些随机变量将用符号“X”表示，它是一个变量，其所有可能的值都将在你的随机实验中以数值结果的形式出现。随机变量可以是连续的或离散的选项。这意味着有时你的随机变量将是把结果映射到其空间内实数值的函数。我们稍后将看几个例子来帮助理解这一点。


    我们将从一个掷骰子的例子开始介绍随机变量。我们将要研究的随机变量将用X表示，它将依赖于掷骰子后得到的结果。这里自然出现的X的选择将映射到将结果表示为1到值i。


    这意味着，如果X等于1，你将把掷出骰子一点的事件映射为值i。你可以用骰子上的任何数字来映射这个，甚至可以更进一步，选择一些有点奇怪的映射。例如，你可以将Y映射为结果0。这可能是一个困难的过程，我们不会花太多时间在上面，但它可以帮助你了解它是如何工作的。当我们准备好写出这个时，我们将得到概率，表示为随机变量X的结果1的概率。它看起来像这样：PX(i)
    或 (x=i)


    ## 分布


    现在我们已经了解了一些随机变量，是时候看看概率分布的概念以及它如何与机器学习协同工作了。这里的意思是，我们需要查看结果并弄清楚它们发生的概率，或者随机变量发生的概率。为了使这更容易，我们将使用这个分布来弄清楚我们得到特定数字的可能性有多大。


    假设你正在使用一个骰子。它有六个面，每次掷出时，每个数字出现的概率是随机的。我们可以使用分布来弄清楚在特定的一次投掷中，我们得到五或二或其他某个数字的可能性有多大。


    为了帮助我们开始，有一个例子会很有帮助。我们需要让X作为我们的随机变量，但结果是我们掷骰子时看到的。我们还将开始这个实验，假设骰子完全正常，没有作弊，也没有灌铅。这确保了每次投掷时，每个面出现的概率都相同。你将在此处使用的概率分布，用于计算某个数字出现的概率包括


    PX(1) = PX(2) = ... = PX(6) = 1/6


    在这个例子中，它与我们处理随机变量的方式一致。但它确实有不同的含义。你的概率分布更多地关注可能发生的事件谱，而我们的随机变量示例则完全关注存在哪些变量。在概率论中，P(X)部分将表示我们正在处理随机变量X的概率分布。


    当你查看这个例子时，你可能会注意到你的分布可能只有一个变量，或者可能有两个或更多变量同时出现。当这种情况发生时，你将称其为联合分布。要计算这个概率，你需要单独计算变量，然后将它们组合起来查看结果。


    为了看看当涉及两个或更多变量时这是如何工作的，让我们将X设为随机变量，并且由你掷骰子时得到的结果来定义。然后你可以用Y来表示随机变量，它将告诉你如果你决定抛硬币会发生什么结果。对于这个，为了简单起见，我们将硬币的正面分配为1，反面分配为0。这用于帮助我们单独计算每个变量的概率分布，以及它们组合在一起的概率分布。


    我们将把这个联合分布表示为P(X, Y)，并且X结果为a且Y结果为b的概率表示为P(x = a, Y = b) 或 PX, Y(a,b)。


    ## 条件分布


    我们需要在机器学习和统计学中引入的下一个概念是条件分布。当我们已经知道随机变量分布是什么时，可能是因为我们已经知道第二个随机变量的值，我们可以将一个事件的概率基于我们从第二个事件中得到的结果。因此，你会发现当你使用这个分布时，当给定Y变量为Y
    = b时，随机变量将被称为X。当这些条件成立时，以下公式将帮助你定义和计算两种情况下的变量：


    P(X = a|Y = b) = P(X = a, Y = b)/P(Y = b)。


    在你学习机器学习的过程中，有几次你可能需要使用条件分布。根据你设计的系统，这些可能是有用的工具，特别是如果你需要让程序处理不确定性。


    ## 独立性


    最后，在机器学习中处理统计学和概率时，我们需要考虑独立性。你可以在这里处理的一个变量是弄清楚问题中有多少独立性。当你处理这些随机变量时，你会发现只要你的分布不改变，如果你添加一个新变量并尝试将其加入方程，它们将与其他随机变量无关。


    为了使这个工作得更好，你需要对机器学习中使用的数据做一些假设。当你已经了解独立性时，这会使事情变得更容易。一个很好的例子来帮助我们理解这一切的是一个使用j和i的训练样本，当样本i的标签不受样本j的特征影响时，它们独立于任何底层空间。无论其中一个变量的结果如何，另一个都不会看到任何变化或'
