    # Example of an artificial neural network


    Before going further and explaining how neural networks work, let’s first define
    what is a neuron. A neuron is simply a mathematical equation expressed as the
    sum of the weighted inputs. Let’s consider X={x1, x2, ….xM} a vector of N inputs;
    the neuron is a linear combination of all inputs defined as follows:


    F(X={x1, x2,….xM})=w1x1+w2x2+….+wMxM;


    With w1, w2,…wM is the weights assigned to each input. The function F can also
    be represented as:


    F(X) =WX,


