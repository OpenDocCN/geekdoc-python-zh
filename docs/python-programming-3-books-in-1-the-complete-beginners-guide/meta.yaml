    \ to gather up all of the data you have in your system, the data that isn’t labeled\
    \ at the time and then puts them all together in their little group of a cluster.\n\
    \nThe idea of working with this kind of cluster is that the objects that fall\
    \ within the same cluster, whether there are just two or more, are going to be\
    \ related to each other in some manner or another, and they are not going to be\
    \ that similar to the data points that fall into the other clusters. The similarity\
    \ here is going to be the metric that you will want to use to show us the strength\
    \ is in the relationship between the two.\n\nWhen you work on this particular\
    \ algorithm, it is going to be able to form some of the clusters you need of the\
    \ data, based on how similar the values of data you have. You will need to go\
    \ through and give them a specific value for K, which will be how many clusters\
    \ that you would like to use. It is best to have at least two, but the number\
    \ of these clusters that you work with will depend on how much data you have and\
    \ how many will fit in with the type of data that you are working with.\n\nWith\
    \ this information in mind and a good background of what the K-means algorithm\
    \ is going to be used for, it is time to explore a bit more about how to write\
    \ your own codes and do an example that works with K-means. This helps us to practice\
    \ a bit with Machine Learning and gives us a chance to practice some of our own\
    \ new Python skills.\n\n```python\nimport numpy as np\nimport matplotlib.pyplot\
    \ as plt\n\ndef d(u, v):\n    diff = u - v\n    return diff.dot(diff)\n\ndef cost(X,\
    \ R, M):\n    cost = 0\n    for k in xrange(len(M)):\n        for n in xrange(len(X)):\n\
    \            cost += R[n,k]*d(M[k], X[n])\n    return cost\n```\n\nAfter this\
    \ part, we are going to take the time to define your function so that it is able\
    \ to run the k-means algorithm before plotting the result. This is going to end\
    \ up with a scatterplot where the color will represent how much of the membership\
    \ is inside of a particular cluster.\n\nWe would do that with the following code:\n\
    \n```python\ndef plot_k_means(X, K, max_iter=20, beta=1.0):\n    N, D = X.shape\n\
    \    M = np.zeros((K, D))\n    R = np.ones((N, K)) / K\n    # initialize M to\
    \ random\n    for k in xrange(K):\n        M[k] = X[np.random.choice(N)]\n   \
    \ grid_width = 5\n    grid_height = max_iter / grid_width\n    random_colors =\
    \ np.random.random((K, 3))\n    plt.figure()\n    costs = np.zeros(max_iter)\n\
    \    for i in xrange(max_iter):\n        # moved the plot inside the for loop\n\
    \        colors = R.dot(random_colors)\n        plt.subplot(grid_width, grid_height,\
    \ i+1)\n        plt.scatter(X[:,0], X[:,1], c=colors)\n        # step 1: determine\
    \ assignments / responsibilities\n        # is this inefficient?\n        for\
    \ k in xrange(K):\n            for n in xrange(N):\n                R[n,k] = np.exp(-beta*d(M[k],\
    \ X[n])) / np.sum( np.exp(-beta*d(M[j], X[n])) for j in xrange(K) )\n        #\
    \ step 2: recalculate means\n        for k in xrange(K):\n            M[k] = R[:,k].dot(X)\
    \ / R[:,k].sum()\n        costs[i] = cost(X, R, M)\n        if i > 0:\n      \
    \      if np.abs(costs[i] - costs[i-1]) < 10e-5:\n                break\n    plt.show()\n\
    ```\n\nNotice here that both the M and the R are going to be matrices. The R is\
    \ going to become the matrix because it holds onto 2 indices, the k and the n.\
    \ M is also a matrix because it is going to contain the K individual D-dimensional\
    \ vectors. The beta variable is going to control how fuzzy or spread out the cluster\
