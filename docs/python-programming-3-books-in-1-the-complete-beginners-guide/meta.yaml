  md: 'as expected; therefore, learning from failed campaigns is just as important,
    if not more. Companies can run diagnostic analysis on their campaign by collecting
    data about the "social media mentions" of the campaign, number of campaign page
    views, the average amount of time spent on the campaign page by an individual,
    number of social media fans and followers of the campaign, online reviews and
    other related metrics to understand why the campaign failed and how future campaigns
