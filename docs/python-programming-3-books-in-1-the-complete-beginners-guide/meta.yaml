    字典和列表一样，可以存储多个值。然而，它们可以索引不同的数据类型。字典的键与值相关联。当它们组合在一起时，就称为键值对。让我们从创建一个新的字典变量开始。


    ```python

    flat = {''rooms'': ''2'', ''bathrooms'': ''1'', ''floor'': ''3rd'', ''apartment'':
    ''306''}

    # 注意花括号

