    ## Tuples in Python


    A tuple is a sequence type that contains an ordered collection of objects. Unlike
    a list, a tuple is immutable; you won’t be able to change its elements once it
    is created. A tuple can hold items of different types and can have as many elements
    as you want, subject to the availability of memory.


    Besides being immutable, you can tell a tuple apart from a list by the use of
    parentheses instead of square brackets. However, the use of parentheses is optional.
    You can create a tuple without them. A tuple can store items of different types
