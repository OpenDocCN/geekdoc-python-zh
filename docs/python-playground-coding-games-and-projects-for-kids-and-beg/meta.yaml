    You''re analyzing the correlation between temperature and ice cream sales. Which
    type of graph would help you visualize this relationship?


    a) Line Chart

    b) Scatter Plot

    c) Bar Chart

    d) Pie Chart


    Answer: b) Scatter Plot


    ### Question 4:


    You''re presenting the results of a survey on favorite pizza toppings. Each respondent
    selected multiple toppings. Which type of graph would effectively display this
    data?


    a) Pie Chart

    b) Bar Chart

    c) Line Chart

    d) Histogram


    Answer: a) Pie Chart


    ### Question 5:


    You want to compare the performance of different machine learning models based
    on their accuracy scores. Which type of graph would be most appropriate?


    a) Bar Chart

    b) Line Chart

    c) Box Plot

    d) Scatter Plot


    Answer: a) Bar Chart


    ### Question 6:


