    of graph would be best for comparing the rainfall across cities?


    a) Pie Chart

    b) Bar Chart

    c) Line Chart

    d) Scatter Plot


    Answer: b) Bar Chart


    ### Question 7:


    If you''re analyzing the distribution of test scores in a class, which type of
    graph would be most suitable?


    a) Box Plot

    b) Histogram

    c) Line Chart

    d) Scatter Plot


    Answer: b) Histogram


    ### Question 8:


    If you want to visualize the trend in stock prices over the past year, which type
    of graph would be most appropriate?


    a) Pie Chart

    b) Bar Chart

    c) Line Chart

    d) Scatter Plot


    Answer: c) Line Chart


    ### Question 9:


    You''re comparing the popularity of different social media platforms among teenagers.
    Which type of graph would effectively display this data?


    a) Pie Chart

    b) Bar Chart

    c) Line Chart

    d) Scatter Plot


    Answer: b) Bar Chart


    ### Question 10:


    You have survey data on customer satisfaction ratings for a product. Which type
    of graph would be best for showing the distribution of ratings?


    a) Pie Chart

    b) Bar Chart

    c) Box Plot

    d) Scatter Plot


    Answer: c) Box Plot


