    \ ipdb; ipdb.set_trace()`。\n\n### 使用你的闪亮魔杖：\n\n- 自动补全：就像猜测咒语的结尾一样，ipdb 会建议代码补全。\n\
    - 彩色输出：就像有一道彩虹指引你的道路，使阅读路径（代码）更容易。\n- 直接 Python 命令：你可以直接在 ipdb 中施放任何 Python 咒语（命令）。\n\
    \n### 第三步：掌握艺术\n\n- 设置多个断点：放置多个魔法标记，在不同点停止。\n- 检查变量：窥探你的咒语成分（变量），看看它们是否符合预期。\n\
