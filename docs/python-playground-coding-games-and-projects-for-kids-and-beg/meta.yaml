- md: '## 2. Run the Installer:


    - Once the installer is downloaded, locate the downloaded file (typically in your
    Downloads folder) and double-click on it to run the installer.


    ![](img/fb1d0fecaaf92b9369927853a1753ae4_22_0.png)


    ## 3. Customize the installation (optional):


    - The installer will open a setup window where you can customize your installation
    preferences.

    - You can choose the installation directory, add Python to the system PATH, and
    select optional installation features.

    - For beginners, sticking with the default settings is recommended, but feel free
    to customize as needed.


    ![](img/fb1d0fecaaf92b9369927853a1753ae4_23_0.png)


    - At this point, choose the features you want to install. If all features are
    necessary, pick them and then click Next.


    ![](img/fb1d0fecaaf92b9369927853a1753ae4_24_0.png)


    - An advanced options list will appear. Select the choices you need or all of
    them. Then click the Install button to start the process.


    ![](img/fb1d0fecaaf92b9369927853a1753ae4_25_0.png)


    ## 4. Install Python:


    - After customizing your installation preferences, click the "Install Now" button
    to proceed.

    - The installer will start installing Python on your system. This process may
    take a few minutes to complete.


    ![](img/fb1d0fecaaf92b9369927853a1753ae4_26_0.png)


    ## 5. Verify the installation:


    To make sure Python was installed correctly, do the following:


    - Open PowerShell or the Command Prompt.

    - Type python –version and press Enter in the Command Prompt window.

    - If you see a Python version, it indicates that Python has been successfully
    installed on Windows.


    ![](img/fb1d0fecaaf92b9369927853a1753ae4_27_0.png)


    ## 6. Alternate installation via Microsoft Store:


    - Alternatively, you can install Python from the Microsoft Store for a hassle-free
    installation.

    - Open the Microsoft Store app on your Windows computer.

    - Search for "Python" in the search bar.

    - Select the desired Python version from the search results and click "Get" to
    install it.


    # How to Install Python on macOS


    Installing Python on macOS is a straightforward process. Follow these steps to
    get Python up and running on your Mac:


    ## 1. Check Python Version:


    - Open Terminal by searching for it in Spotlight or navigating to Applications
    > Utilities > Terminal.

    - Type the following command and press Enter:


    ```

    python --version

    ```


    - This command checks if Python is installed on your Mac and displays the installed
    Python version. If Python is not installed, you''ll see a message indicating that
    Python is not found.


    ## 2. Visit the Python Website:


    - Open your web browser and go to the official Python website.

    - This is where you can download the macOS installer for Python.


    ![](img/fb1d0fecaaf92b9369927853a1753ae4_29_0.png)


    ## 3. Download the macOS Installer:


    - On the Python website, click the "Download Python" button to download the macOS
    installer.

    - Make sure to download the latest version of Python that is compatible with macOS.


    ## 4. Run the Installer and Follow the Instructions:


    - Once the installer is downloaded, locate the downloaded file (usually in your
    Downloads folder) and double-click it to run the installer.

    - Follow the on-screen instructions provided by the installer to complete the
    installation process.

    - You may need to enter your macOS user password to authorize the installation.


    ![](img/fb1d0fecaaf92b9369927853a1753ae4_30_0.png)


    ## 5. Verify Python and IDLE are installed correctly:


    - After installation, a desktop folder will appear. Click IDLE in this folder.


    ![](img/fb1d0fecaaf92b9369927853a1753ae4_31_0.png)


    - Let''s ensure that the most recent versions of Python and IDLE were set up correctly.
    To do that, double-click IDLE, the tool that comes with Python for combined development.
    If everything is okay, IDLE will show the Python shell like this:


    ![](img/fb1d0fecaaf92b9369927853a1753ae4_32_0.png)


    - Write some basic Python code and execute it in IDLE. Enter the following and
    press return.


    ```

    print("Hello, World!")

    ```


    ![](img/fb1d0fecaaf92b9369927853a1753ae4_33_0.png)


    ## 6. Verify installation with Terminal:


    - The Terminal is another way to check whether the installation is complete. Enter
    this command in Terminal:


    ```

    python3 --version

    ```


    - Press Enter to view your newly installed Python version. This means that Python
    was successfully installed on your Mac.


    # How To Install Python on Linux


    Installing Python on Linux is a relatively simple process. Follow these steps
    to get Python installed on your Linux system:


    ## 1. Check for Pre-Installed Python:


    - Open a terminal window.

    - Type the following command and press Enter:


    ```

    python --version

    ```


    - This command will check if Python is installed on your Linux system and display
    the installed Python version. If Python is not installed, you''ll see a message
    indicating that Python is not found.


    ## 2. Install via Package Manager:


    - Most Linux distributions come with Python pre-installed. However, if Python
    is not installed or you need a different version, you can use your distribution''s
    package manager to install it.

    - For Debian-based systems (e.g., Ubuntu), use the following command:


    ```

    sudo apt-get update

    sudo apt-get install python3

    ```


    - For Red Hat-based systems (e.g., CentOS), use the following command:


    ```

    sudo yum install python3

    ```


    ## 3. Download the Latest Version of Python:


    - If the version of Python available in your distribution''s repositories is not
    the one you want, you can download and install the latest version from the official
    Python website.

    - Visit the Python website at https://www.python.org/downloads/linux/ to download
    the latest version of Python for Linux.


    ## 4. Compile from Source (Optional):


    - If you prefer to compile Python from source, download the source tarball from
    the Python website.

    - Extract the tarball and follow the instructions in the README file to configure,
    compile, and install Python.


    ## 5. Verify Installation:


    - After installation, you can verify that Python is installed correctly by opening
    a terminal window and typing the following command:


    ```

    python --version

    ```


    - This command should display the installed Python version.


    Voila, that''s it! Now, you''re ready to start writing and running Python scripts.


    # Writing and Running Your First Python Script


    Now that you have Python installed, let''s create a simple script and run it.


    - Use a text editor like VSCode, Sublime Text, or even Notepad on Windows.

    - In your text editor, type the following simple Python script:


    ```

    print("Hello, Python!")

    ```


    - Save the file with a .py extension, for example, first_script.py.


    # Running Your Python Script


    ## For Windows:


    - Press “Win + R,” type cmd, and press Enter.

    - Use the “cd” command to go to the directory where your script is saved.

    - Type ‘python first_script.py” and press Enter.


    ## For macOS/Linux:


    - Use Spotlight on macOS or press Ctrl + Alt + T on Linux to open Terminal.

    - Use the cd command to go to the directory where your script is saved.

    - Type python3 first_script.py and press Enter.


    ## Verify Output:


    If everything is set up correctly, you will see the output:


    ```

    Hello, Python!

    ```


    You''ve just written and run your first Python script. Get ready to explore more.


    # THE MAGICAL MOMENT: WITNESSING YOUR CODE COME TO LIFE


    In today''s world, not everyone is fluent in programming. But if you''ve got the
    knack for it, you''re holding a golden ticket. With information technology ruling
    the roost, we''re living in a time when being able to whip up your digital masterpiece
    opens up a world of possibilities.


    # Coding: Create Something from Nothing


    Coding is not just about punching lines of text into a computer. It''s an art
    form, a creative outlet where you sculpt something from nothing. Sure, you see
    mobile apps and websites popping up left, right, and center, but have you ever
    wondered how they work? Believe it or not, for many, it remains a mystery.


    Let''s set the stage for that exhilarating moment when your code bursts into life
    for the first time.


    Picture the electrifying moment when your code springs to life for the first time.
    After investing hours of brainpower, countless lines of code, and a few frustrated
    sighs. You''ve meticulously crafted every function and debugged every glitch,
    and now, as you hit that "run" button, there''s this moment of breathless anticipation.


    And then, it happens.


    Your screen lights up with the fruits of your efforts. Maybe it''s a sleek interface
    for a mobile app, or perhaps it''s a beautifully responsive website. Whatever
    it is, it''s alive, it''s working, and it''s all thanks to you. It''s like witnessing
    a digital birth—an exhilarating rush of adrenaline mixed with a deep sense of
    satisfaction.


    That moment is more than just lines of code coming together. It''s a validation
    of your skills, a testament to your perseverance, and a glimpse into the endless
    possibilities of the digital world. It''s the moment when all the late nights
    and caffeine-fueled coding sessions pay off in the most glorious way possible.'
  mdcn: '## 2. 运行安装程序：


    - 下载安装程序后，找到已下载的文件（通常在“下载”文件夹中），双击运行安装程序。


    ![](img/fb1d0fecaaf92b9369927853a1753ae4_22_0.png)


    ## 3. 自定义安装（可选）：


    - 安装程序将打开一个设置窗口，您可以在其中自定义安装偏好设置。

    - 您可以选择安装目录、将 Python 添加到系统 PATH，并选择可选的安装功能。

    - 对于初学者，建议使用默认设置，但您可以根据需要进行自定义。


    ![](img/fb1d0fecaaf92b9369927853a1753ae4_23_0.png)


    - 此时，选择您要安装的功能。如果所有功能都是必需的，请选中它们，然后点击“下一步”。


    ![](img/fb1d0fecaaf92b9369927853a1753ae4_24_0.png)


    - 将出现一个高级选项列表。选择您需要的选项或全部选中。然后点击“安装”按钮开始安装过程。


    ![](img/fb1d0fecaaf92b9369927853a1753ae4_25_0.png)


    ## 4. 安装 Python：


    - 自定义安装偏好设置后，点击“立即安装”按钮继续。

    - 安装程序将开始在您的系统上安装 Python。此过程可能需要几分钟才能完成。


    ![](img/fb1d0fecaaf92b9369927853a1753ae4_26_0.png)


    ## 5. 验证安装：


    为确保 Python 已正确安装，请执行以下操作：


    - 打开 PowerShell 或命令提示符。

    - 在命令提示符窗口中输入 `python –version` 并按回车键。

    - 如果您看到 Python 版本号，则表明 Python 已成功安装在 Windows 上。


    ![](img/fb1d0fecaaf92b9369927853a1753ae4_27_0.png)


    ## 6. 通过 Microsoft Store 替代安装：


    - 或者，您可以从 Microsoft Store 安装 Python，以获得轻松无忧的安装体验。

    - 在您的 Windows 计算机上打开 Microsoft Store 应用。

    - 在搜索栏中搜索“Python”。

    - 从搜索结果中选择所需的 Python 版本，然后点击“获取”进行安装。


    # 如何在 macOS 上安装 Python


    在 macOS 上安装 Python 是一个简单直接的过程。请按照以下步骤在您的 Mac 上安装并运行 Python：


    ## 1. 检查 Python 版本：


    - 通过在 Spotlight 中搜索或导航到“应用程序” > “实用工具” > “终端”来打开终端。

    - 输入以下命令并按回车键：


    ```

    python --version

    ```


    - 此命令检查您的 Mac 上是否安装了 Python，并显示已安装的 Python 版本。如果未安装 Python，您将看到一条消息提示未找到 Python。


    ## 2. 访问 Python 网站：


    - 打开您的网络浏览器，访问 Python 官方网站。

    - 在这里您可以下载适用于 macOS 的 Python 安装程序。


    ![](img/fb1d0fecaaf92b9369927853a1753ae4_29_0.png)


    ## 3. 下载 macOS 安装程序：


    - 在 Python 网站上，点击“下载 Python”按钮下载 macOS 安装程序。

    - 确保下载与 macOS 兼容的最新版本的 Python。


    ## 4. 运行安装程序并按照说明操作：


    - 下载安装程序后，找到已下载的文件（通常在“下载”文件夹中），双击运行安装程序。

    - 按照安装程序提供的屏幕说明完成安装过程。

    - 您可能需要输入您的 macOS 用户密码以授权安装。


    ![](img/fb1d0fecaaf92b9369927853a1753ae4_30_0.png)


    ## 5. 验证 Python 和 IDLE 是否正确安装：


    - 安装后，桌面上会出现一个文件夹。点击此文件夹中的 IDLE。


    ![](img/fb1d0fecaaf92b9369927853a1753ae4_31_0.png)


    - 让我们确保 Python 和 IDLE 的最新版本已正确安装。为此，请双击 IDLE，这是 Python 附带的用于集成开发的工具。如果一切正常，IDLE
    将显示如下所示的 Python shell：


    ![](img/fb1d0fecaaf92b9369927853a1753ae4_32_0.png)


    - 编写一些基本的 Python 代码并在 IDLE 中执行。输入以下内容并按回车键。


    ```

    print("Hello, World!")

    ```


    ![](img/fb1d0fecaaf92b9369927853a1753ae4_33_0.png)


    ## 6. 使用终端验证安装：


    - 终端是检查安装是否完成的另一种方式。在终端中输入此命令：


    ```

    python3 --version

    ```


    - 按回车键查看您新安装的 Python 版本。这意味着 Python 已成功安装在您的 Mac 上。


    # 如何在 Linux 上安装 Python


    在 Linux 上安装 Python 是一个相对简单的过程。请按照以下步骤在您的 Linux 系统上安装 Python：


    ## 1. 检查预装的 Python：


    - 打开一个终端窗口。

    - 输入以下命令并按回车键：


    ```

    python --version

    ```


    - 此命令将检查您的 Linux 系统上是否安装了 Python，并显示已安装的 Python 版本。如果未安装 Python，您将看到一条消息提示未找到
    Python。


    ## 2. 通过包管理器安装：


    - 大多数 Linux 发行版都预装了 Python。但是，如果未安装 Python 或您需要其他版本，您可以使用发行版的包管理器进行安装。

    - 对于基于 Debian 的系统（例如 Ubuntu），使用以下命令：


    ```

    sudo apt-get update

    sudo apt-get install python3

    ```


    - 对于基于 Red Hat 的系统（例如 CentOS），使用以下命令：


    ```

    sudo yum install python3

    ```


    ## 3. 下载最新版本的 Python：


    - 如果您的发行版仓库中可用的 Python 版本不是您想要的，您可以从 Python 官方网站下载并安装最新版本。

    - 访问 Python 网站 https://www.python.org/downloads/linux/ 下载适用于 Linux 的最新版本的 Python。


    ## 4. 从源代码编译（可选）：


    - 如果您更喜欢从源代码编译 Python，请从 Python 网站下载源代码 tarball。

    - 解压 tarball 并按照 README 文件中的说明配置、编译和安装 Python。


    ## 5. 验证安装：


    - 安装后，您可以通过打开终端窗口并输入以下命令来验证 Python 是否正确安装：


    ```

    python --version

    ```


    - 此命令应显示已安装的 Python 版本。


    瞧，就是这样！现在，您已准备好开始编写和运行 Python 脚本了。


    # 编写并运行您的第一个 Python 脚本


    既然您已经安装了 Python，让我们创建一个简单的脚本并运行它。


    - 使用文本编辑器，如 VSCode、Sublime Text，甚至 Windows 上的记事本。

    - 在您的文本编辑器中，输入以下简单的 Python 脚本：


    ```

    print("Hello, Python!")

    ```


    - 将文件保存为 .py 扩展名，例如 first_script.py。


    # 运行您的 Python 脚本


    ## 对于 Windows：


    - 按“Win + R”，输入 cmd，然后按回车键。

    - 使用“cd”命令转到脚本保存的目录。

    - 输入 `python first_script.py` 并按回车键。


    ## 对于 macOS/Linux：


    - 在 macOS 上使用 Spotlight 或在 Linux 上按 Ctrl + Alt + T 打开终端。

    - 使用 cd 命令转到脚本保存的目录。

    - 输入 `python3 first_script.py` 并按回车键。


    ## 验证输出：


    如果一切设置正确，您将看到输出：


    ```

    Hello, Python!

    ```


    您刚刚编写并运行了您的第一个 Python 脚本。准备好探索更多吧。


    # 神奇时刻：见证您的代码焕发生机


    在当今世界，并非每个人都精通编程。但如果您有这方面的天赋，您就握着一张黄金门票。随着信息技术占据主导地位，我们生活在一个能够快速创建数字杰作就能开启无限可能的时代。


    # 编程：从无到有创造


    编程不仅仅是向计算机输入一行行文本。它是一种艺术形式，一种创造性的表达，您从无到有地塑造出某种东西。当然，您看到移动应用和网站如雨后春笋般涌现，但您是否想过它们是如何工作的？信不信由你，对许多人来说，这仍然是个谜。


    让我们为您的代码第一次焕发生机的那个激动人心的时刻做好铺垫。


    想象一下您的代码第一次焕发生机时那令人振奋的时刻。在投入了数小时的脑力、无数行代码和几声沮丧的叹息之后。您精心打造了每一个功能，调试了每一个故障，现在，当您点击那个“运行”按钮时，有一种屏息以待的期待感。


    然后，它发生了。


    您的屏幕因您的努力成果而亮起。也许是一个移动应用的流畅界面，或者是一个响应精美的网站。无论它是什么，它活了，它在工作，这一切都归功于您。这就像见证一个数字生命的诞生——一种令人振奋的肾上腺素激增，混合着深深的满足感。


    那一刻不仅仅是几行代码的组合。它是对您技能的肯定，是您毅力的证明，也是对数字世界无限可能性的一瞥。那是所有深夜和咖啡因驱动的编码时光以最辉煌的方式得到回报的时刻。'
