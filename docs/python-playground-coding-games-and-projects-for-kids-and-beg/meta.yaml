  mdcn: "逻辑回归就像是机器学习世界里的算命先生。它不仅仅预测结果；它根据给定信息计算某事发生的概率。例如，它可以判断一张图片是猫还是不是猫。它非常适合是/否（二元）问题。\n\
    \n## 你的任务：二元图像分类\n\n你的任务是构建一个模型，让它观察图像并回答一个简单的问题：这是这个东西还是那个东西？我们将使用 PyTorch 来创建一个能理解图片并对其进行预测的模型。\n\
