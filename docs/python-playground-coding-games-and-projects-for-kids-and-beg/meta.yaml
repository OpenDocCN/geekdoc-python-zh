    \n### 1. LED Light Control:\n\n- **Everyday Object:** LED Bulb\n- **Coding Input:**\n\
    \n```python\nfrom machine import Pin\nimport time\n\nled = Pin(2, Pin.OUT)  #\
    \ Pin 2 is connected to the LED\n\nwhile True:\n    led.value(1)  # Turn LED on\n\
    \    time.sleep(2)  # Wait for 2 seconds\n    led.value(0)  # Turn LED off\n \
    \   time.sleep(2)  # Wait for 2 seconds\n```\n\n**Coding Output:** The LED bulb\
    \ connected to pin 2 turns on and off, alternatively every 2 seconds.\n\n### 2.\
    \ Smart Doorbell:\n\n- **Everyday Object:** Push Button\n- **Coding Input:**\n\
    \n```python\nfrom machine import Pin\nimport time\n\nbutton = Pin(0, Pin.IN) \
    \ # Pin 0 is connected to the push button\n\nwhile True:\n    if button.value()\
