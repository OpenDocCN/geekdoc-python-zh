    \n-   敏捷，迅速——像经验丰富的体操运动员一样拥抱敏捷与灵活！这意味着准备好转向和适应任何突如其来的项目变数。\n\n## 持续学习和成长的资源\n\n\
    ### 支持多语言的在线学习平台\n\n-   **Coursera：** 提供来自世界各地大学和学院的课程，许多课程提供多种语言版本，提供Python编程的全球视角。\n\
