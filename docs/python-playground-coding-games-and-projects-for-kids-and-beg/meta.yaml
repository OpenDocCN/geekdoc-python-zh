    \n### 第一步：召唤 PDB——经典魔杖\n\n想象你正在穿越一片神秘的森林（你的代码），遇到了一个岔路口（一个错误）。你需要地图和指南针（pdb）来导航。\n\
    \n召唤魔法：\n\n阿布拉卡达布拉！在你认为谜团开始的地方，在代码中添加 `import pdb; pdb.set_trace()`。\n\n```python\n\
