    \ # Debounce delay\n```\n\n**Coding Output:** Whenever the push button connected\
    \ to pin 0 is pressed, the message \"Someone is at the door!\" is printed. A debounce\
    \ delay of 0.5 seconds is added to prevent multiple detections from a single press.\n\
    \nLet's explore a simple project idea: creating a Smart Room Temperature Monitor\
