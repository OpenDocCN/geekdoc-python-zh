    fruit.sayhi\n\nHi\n<function __main__.fruit.sayhi>\n```\n\n## Object Creation\
    \ in Python\n\n`__new__` is a static class method that lets us control object\
    \ creation. Whenever we make a call to the class constructor, it makes a call\
    \ to `__new__`. Internally, `__new__` is the constructor that returns a valid\
    \ and unpopulated object on which to call `__init__`.\n\n## Constructors\n\n**__init__()**\
    \ method is used for defining a constructor in Python which takes ‘*self*’ as\
    \ its first argument. Python rebinds the name `__init__` to the `__new__` method.\
    \ This means in the following program, the first declaration of this method is\
    \ inaccessible now.\n\n```\nclass Person:\n    def __init__(self):\n        print(\"\
    I am first constructor\")\n\n    def __init__(self):\n        print(\"I am second\
    \ constructor\")\n\np1 = Person()\n\nI am second constructor\n```\n\n## Class\
    \ Instantiation\n\nTo create instances of a class, you call the class using class\
