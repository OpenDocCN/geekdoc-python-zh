    \    def __init__(self, name, age):\n        self.name = name\n        self.age\
    \ = age\n\np1 = Person(\"John\", 36)\nprint(p1.name)\nprint(p1.age)\np1 = Person(name=\"\
    Jack\")\nprint(p1.name)\nprint(p1.age)\n\nJohn\n36\n---------------------------------------------------------------------------\n\
    TypeError                                 Traceback (most recent call last)\n\
    <ipython-input-5-6327588f3cc8> in <module>()\n     12 print(p1.name)\n     13\
