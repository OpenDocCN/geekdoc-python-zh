    # isdisjoint() Method


    The two sets are considered to be disjoint, if they have no elements in common.
    set class supports a boolean method isdisjoint() to check whether the two sets
    are disjoint or not.


    ```

    s1={1,2,3}

    s2={3,4,5}

    s3={4,5,6}

    print("s1 and s2 are disjoint : ",s1.isdisjoint(s2))

    print("s1 and s3 are disjoint : ",s1.isdisjoint(s3))


    s1 and s2 are disjoint :  False

    s1 and s3 are disjoint :  True

    ```


    # Checking Set Relationship – issubset(), issuperset()


    Set A is considered to be a subset of set B, if it at least contains all elements
    of set B. B is considered to be a superset of A. set class supports two boolean
    methods issubset() and issuperset() to check whether the invoking set is a subset/superset
    of a set passed as an argument.


    ```

    s1={1,2,3}

    s2={1,2}

    print("s2 is subset of s1   : ",s2.issubset(s1))

    print("s1 is superset of s2 : ",s1.issuperset(s2))


    s2 is subset of s1   :  True

    s1 is superset of s2 :  True

    ```


    ```

    s1={1,2,3}

    s2={1,2,5}

    print("s2 is subset of s1   : ",s2.issubset(s1))

    print("s1 is superset of s2 : ",s1.issuperset(s2))


    s2 is subset of s1   :  False

    s1 is superset of s2 :  False

    ```


