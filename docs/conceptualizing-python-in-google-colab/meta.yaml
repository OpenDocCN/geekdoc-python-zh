    # String formatting (Format String %)


    The ‘%’ operator is employed for formatting a set of variables enclosed in a ‘tuple’
    together with a format string, which contains normal text together with ‘argument
    specifiers’ or ‘argument place holders’ corresponding to special symbols such
    as ‘%s’ and ‘%d’ as demonstrated in the following programs:


    ```

