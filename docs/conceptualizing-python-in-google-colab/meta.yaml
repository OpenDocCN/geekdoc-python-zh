    \ | | | | | | | |\n\n## 嵌套 try 块\n\n一个 `try` 块可以完全嵌套在另一个 `try` 块内，并且可以嵌套到任意层级。在这种情况下，如果异常在最内层的\
    \ `try` 块中抛出，首先会检查所有匹配的 `except` 块。如果找到匹配的 `except` 块，则处理该异常，程序继续执行；否则，会检查外层 `try`\
    \ 块对应的所有 `except` 块。这个过程会持续进行，直到检查完最外层的 `except` 块。如果最终没有找到匹配的 `except` 块，那么异常将由运行时系统处理，导致程序异常终止。\n\
    \n注意：如果异常是在外层 `try` 块中引发的，即使存在匹配的内层 `except` 块，也不会在那里处理该异常。\n\n在下面的程序中，外层 `try`\
    \ 块中引发了 `ArithmeticError`，并在外层 `except` 块中处理。\n\n```python\ntry:\n    list1=[1]\n\
    \    a=10/0\n    it=iter(list1)\n    next(it)\n    next(it)\n    try:\n      \
    \  a=10/0\n        fh = open(\"nofile\", \"r\")\n        x=int(\"xyz\")\n    \
    \    xx=yy\n    except(ArithmeticError, StopIteration, ValueError) as e:\n   \
    \     print(\"Caught in Inner except\",e)\nexcept(ArithmeticError, NameError)\
