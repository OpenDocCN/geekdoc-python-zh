    \ 'int' object is not iterable\n```\n\n## Cloning a List\n\nAssigning a list to\
    \ another list simply copies a reference and will not generate a new list. A single\
    \ list is referenced by two distinct references. The list can be modified employing\
    \ any of the two references. In the following program, the references `numbers`\
    \ and `numbers1` refer to the same list [10, 20, 30, 40]. The elements at the\
    \ index position 0 and 3 are modified employing reference `numbers1`.\n\n```python\n\
    numbers=[10, 20, 30, 40]\nnumbers1=numbers\nprint(numbers)\nprint(numbers1)\n\
    numbers1[0]=100\nnumbers1[3]=400\nprint(\"After modifying numbers1 list : \")\n\
    print(numbers)\nprint(numbers1)\n\n[10, 20, 30, 40]\n[10, 20, 30, 40]\nAfter modifying\
    \ numbers1 list :\n[100, 20, 30, 400]\n[100, 20, 30, 400]\n```\n\n## Object Cloning\
    \ – copy() Method\n\nPython supports *copy()* method for cloning the object by\
    \ duplicating the contents. *copy()* method creates an exact copy of the object\
    \ by duplicating the contents and returns a reference to the newly created object.\
    \ This enables two copies to be manipulated independently of each other. In the\
    \ following program, the variables `numbers` and `numbers1` refer to two distinct\
    \ objects. Hence modifying the object referenced by `numbers1` does not modify\
    \ the object referenced by `numbers`.\n\n```python\nnumbers=[10, 20, 30, 40]\n\
    numbers1=numbers.copy()\nprint(numbers)\nprint(numbers1)\nnumbers1[0]=100\nnumbers1[3]=400\n\
    print(\"After modifying numbers1 list : \")\nprint(numbers)\nprint(numbers1)\n\
    \n[10, 20, 30, 40]\n[10, 20, 30, 40]\nAfter modifying numbers1 list : \n[10, 20,\
    \ 30, 40]\n[100, 20, 30, 400]\n```\n\n## Testing Object Equivalence Using ‘is’\
    \ Operator\n\n‘is’ operator accepts two operands and returns ‘True’ if the two\
    \ references point to the same object, otherwise returns ‘False’.\n\n```python\n\
    list1=[1,2,3,4,5]\nlist2=list1\nlist3=[1,2,3,4,5]\nprint(list1)\nprint(list1 is\
    \ list2)\nprint(list1 is list3)\n\n[1, 2, 3, 4, 5]\nTrue\nFalse\n```\n\nIn the\
    \ above program, `list1` and `list2` are two different references referencing\
    \ the same List object. On the contrary, `list2` and `list3` are two different\
    \ references referencing the distinct List objects.\n\n## Shallow Copying Vs.\
    \ Deep Copying\n\n### Shallow Copying\n\nShallow copying only copies the outer\
    \ structure i.e. the elements of the outer list and references to inner lists,\
    \ if any. As a result, on shallow copying a nested list, the elements of the outer\
    \ list can be manipulated independently of each other while the inner lists are\
    \ shared. In the following program, ‘numbers’ is a nested list which is cloned\
    \ using *copy()* method in a new reference ‘*numbers1*’. The inner list is manipulated\
    \ using a reference ‘*numbers1*’. Since the copying is shallow, ‘*numbers*’ list\
    \ reflects the changes carried out by ‘*numbers1*’ as shown in the following program:\n\
    \n```python\nnumbers=[10, 20, 30, 40, [50, 60, 70]]\nnumbers1=numbers.copy()\n\
    print(numbers)\nprint(numbers1)\nnumbers1[4][0]=500\nnumbers1[4][1]=600\nnumbers1[4][2]=700\n\
    print(\"After modifying numbers1 list : \")\nprint(numbers)\nprint(numbers1)\n\
    \n[10, 20, 30, 40, [50, 60, 70]]\n[10, 20, 30, 40, [50, 60, 70]]\nAfter modifying\
    \ numbers1 list :\n[10, 20, 30, 40, [500, 600, 700]]\n[10, 20, 30, 40, [500, 600,\
    \ 700]]\n```\n\n### Deep Copying\n\nFor deep copying a nested list Python supports\
    \ a *deepcopy()* method which creates an exact copy of complete nested structure\
    \ as demonstrated in the following program. In the following example, the above\
    \ program is re-written for deep copying a list. Hence manipulating the inner\
    \ list using the reference ‘*numbers1*’ does not modify the list referenced by\
    \ ‘*numbers*’.\n\n```python\nimport copy\nnumbers=[10, 20, 30, 40, [50, 60, 70]]\n\
    numbers1=copy.deepcopy(numbers)\nprint(numbers)\nprint(numbers1)\nnumbers1[4][0]=500\n\
    numbers1[4][1]=600\nnumbers1[4][2]=700\nprint(\"After modifying numbers1 list\
    \ : \")\nprint(numbers)\nprint(numbers1)\n\n[10, 20, 30, 40, [50, 60, 70]]\n[10,\
    \ 20, 30, 40, [50, 60, 70]]\nAfter modifying numbers1 list :\n[10, 20, 30, 40,\
    \ [50, 60, 70]]\n[10, 20, 30, 40, [500, 600, 700]]\n```\n\n## Sorting a List\n\
    \nPython supports sort() method for sorting a list. The *sort()* method returns\
    \ ‘*None*’. The list on which the method is invoked is sorted and no new list\
