    # Set Operations


    Different set operations such as union, intersection, set difference, set symmetric
    difference, etc. are defined on two sets.


    # Union of Two Sets


    Union of two sets is a set containing elements from both the sets eliminating
    duplicates, if any as shown in the following program. Set supports union() method
    for the purpose. The same result can be achieved using ‘|’ operator as well.


    ```

    s1={1,2,3,4,5}

    s2={3,4,5,6,7}

    print("s1 : ",s1)

    print("s2 : ",s2)

    s3=s1.union(s2)

    s4=s1 | s2

    print("s1 U s2 : ",s3)

    print("s1 U s2 : ",s4)


    s1 :  {1, 2, 3, 4, 5}

    s2 :  {3, 4, 5, 6, 7}

    s1 U s2 :  {1, 2, 3, 4, 5, 6, 7}

    s1 U s2 :  {1, 2, 3, 4, 5, 6, 7}

    ```


    # Intersection of Two Sets


    Intersection of two sets is a set containing elements common to both the sets
    as shown in the following program. Set supports intersection() method for the
    purpose. The same result can be achieved using ‘&’ operator as well.


    ```

    s1={1,2,3,4,5}

    s2={3,4,5,6,7}

    print("s1 : ",s1)

    print("s2 : ",s2)

    s3=s1.intersection(s2)

    s4=s1 & s2

    print("s1  s2 : ",s3)

    print("s1  s2 : ",s4)


    s1 :  {1, 2, 3, 4, 5}

    s2 :  {3, 4, 5, 6, 7}

    s1  s2 :  {3, 4, 5}

    s1  s2 :  {3, 4, 5}

    ```'
