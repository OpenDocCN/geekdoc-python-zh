    \ Objects (Garbage Collection)\n\nThe memory management in Python is automatic.\
    \ Python deletes unneeded objects (built-in types or class instances) automatically\
    \ to free the memory space. The process by which Python periodically reclaims\
    \ blocks of memory that no longer are in use is termed Garbage Collection.\n\n\
    Python employs reference counting mechanism to figure out unneeded objects. Python's\
    \ garbage collector runs during program execution and is triggered when an object's\
    \ reference count reaches zero. An object's reference count changes as the number\
    \ of aliases that point to it changes. An unreferenced object is referred to as\
    \ ‘garbage’.\n\nAn object's reference count increases when it is assigned a new\
    \ name or placed in a container (list, tuple, or dictionary). The object's reference\
    \ count decreases when it's deleted with *del*, its reference is reassigned, or\
    \ its reference goes out of scope. When an object's reference count reaches zero,\
    \ Python collects it automatically.\n\nYou normally will not notice when the garbage\
    \ collector destroys an orphaned instance and reclaims its space. But a class\
    \ can implement the special method `__del__()`, called a destructor, that is invoked\
    \ when the instance is about to be destroyed. This method might be used to clean\
    \ up any non memory resources used by an instance.\n\nIn the following program,\
    \ the ‘Point’ object is referenced by three references, ‘pt1’, ‘pt2’ and ‘pt3’.\
    \ `getrefcount()` method of ‘sys’ class is employed for displaying reference count\
    \ which accepts a single parameter the name of the reference. Every time a new\
    \ reference is created to the existing"
