    )\n      8 \n\nAttributeError: 'Person' object has no attribute 'name'\n```\n\n\
    在上面的程序中，名为 `name` 的数据成员未定义。该错误在下面的程序中得到修复。传递给类构造函数的 `name` 参数用于初始化类的数据成员 `name`。\n\
