    # Conceptualizing Python in Google COLAB


    # Difference Between append() and extend() Methods


    The **append()** method is used for appending a single element to the list and
    accepts a single parameter, the element to be appended to the list. On the contrary,
    the **extend()** method accepts a list as its only argument and appends all the
    elements to the list by iterating through it.


    When an **append()** method is invoked on a list by passing another list as a
    parameter, the list passed in the parameter is appended as an element to the list
    creating a nested list as demonstrated in the following program:


    ```

    electives=["Machine Learning","Big Data Analytics","Kotlin","MEAN Stack"]

    electives.append(["Cyber Security"])

    print(electives)


    [''Machine Learning'', ''Big Data Analytics'', ''Kotlin'', ''MEAN Stack'', [''Cyber
    Security'']]

    ```


    On modifying the above program by passing a string to append() method, the string
    is appended to the list as shown below:


    ```

    electives=["Machine Learning","Big Data Analytics","Kotlin","MEAN Stack"]

    electives.append("Cyber Security")

    print(electives)


    [''Machine Learning'', ''Big Data Analytics'', ''Kotlin'', ''MEAN Stack'', ''Cyber
    Security'']

    ```


    On passing a string argument to extend() method, the individual characters of
    a string are appended to the list as shown in the following figure:


    ```

    electives=["Machine Learning","Big Data Analytics","Kotlin","MEAN Stack"]

    electives.extend("Cyber Security")

    print(electives)


    [''Machine Learning'', ''Big Data Analytics'', ''Kotlin'', ''MEAN Stack'', ''C'',
    ''y'', ''b'', ''e'', ''r'', '' '', ''S'', ''e'', ''c'', ''u'', ''r'', ''i'', ''t'',
    ''y'']

    ```


    To append a string to the list, modify the above program as shown below.


    ```

    electives=["Machine Learning","Big Data Analytics","Kotlin","MEAN Stack"]

    electives.extend(["Cyber Security"])

    print(electives)


    [''Machine Learning'', ''Big Data Analytics'', ''Kotlin'', ''MEAN Stack'', ''Cyber
    Security'']

    ```'
