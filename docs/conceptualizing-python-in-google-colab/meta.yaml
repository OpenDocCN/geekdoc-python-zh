    \n| 格式代码 | 描述 |\n|---|---|\n| 'd' | 用于整数 |\n| 'f' | 用于浮点数 |\n| 'b' | 用于二进制数 |\n\
    | 'o' | 用于八进制数 |\n| 'x' | 用于十六进制数 |\n| 's' | 用于字符串 |\n| 'e' | 用于指数格式的浮点数 |\n\n\
    ## 使用 format() 格式化输出\n\n`format()` 方法在 Python3 中引入，包含用一对花括号括起来的占位符。占位符与传递给 `format()`\
    \ 方法的参数之间存在一一对应关系，如下列程序所示：\n\n```\ncourse=\"MSc\"\ninst=\"SIBER\"\nprint('I am\
    \ pursuing {0} at {1}'.format(course, inst))\n\nI am pursuing MSc at SIBER\n```\n\
    \n## 字符串模板 – 使用 F-字符串\n\nF-字符串提供了一种简洁方便的方式，将 Python 表达式嵌入字符串字面量中进行格式化。它也被称为“*字面字符串插值*”。要创建\
    \ F-字符串，请在字符串前加上字符 'F'。变量是字符串的一部分，并用一对花括号括起来，如下列程序所示：\n\n```\ncourse=\"MSc\"\n\
