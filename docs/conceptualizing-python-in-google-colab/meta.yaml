    *<instance_name> = <class_name>(<parameter_list>)*\n\n```\nclass Person:\n   \
    \ def __init__(self):\n        print(\"I am first constructor\")\n\n    def __init__(self,name):\n\
    \        print(self.name)\n        print(\"I am second constructor\")\n\np1 =\
