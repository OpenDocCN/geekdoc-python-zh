    ## Chapter 10


    Lab Assignment on Regular Expressions in Python


    Level – Intermediate


    ### Regular Expression


    A regular expression is a sequence of characters and meta characters that define
    a search pattern, mainly for use in pattern matching with strings.


    ### Applications of Regular Expressions


    Regular expression have wide applications in,


    - Pattern matching

    - Data validation

    - Text searching

    - URL matching etc.


    ### ‘re’ Module in Python


    Python has a module named ‘re’ to work with RegEx. Some important functions available
    in ‘re’ module are listed below:


    #### re.match() Function


    re.match() function is used to search pattern within the test_string. It accepts
    two parameters:


    - The first parameter is the regular expression pattern and

    - The second parameter is the string to be tested.


    The method returns a match object if the search is successful. If not, it returns
    None.


    #### re.findall()


    The re.findall() method returns a list of strings containing all matches.


    Example 1: re.findall()


    If the pattern is not found, re.findall() returns an empty list.


    ##### Finding Multiple Occurrences of a Pattern


    ```python

    import re

    string=''hello 12 hi 89 howdy 34''

    pattern=''\d+''

    result=re.findall(pattern,string)

    print(result)

    print(type(result))

    ```


    [''12'', ''89'', ''34'']

    <class ''list''>


    #### re.split()


    The re.split method splits the string where there is a match and returns a list
    of strings where the splits have occurred.


    If the pattern is not found, re.split() returns a list containing the original
    string.


    ```python

    import re

    string=''one:1 two:2 three:3 four:4''

    pattern=''\d+''

    result=re.split(pattern,string)

    print(result)

    ```


    [''one:'', '' two:'', '' three:'', '' four:'', '''']


    #### re.sub()


    The syntax of re.sub() is:


    re.sub(pattern, replace, string)


    The method returns a string where matched occurrences are replaced with the content
    of replace variable.


    If the pattern is not found, re.sub() returns the original string.


    ##### Replacing Multiple Spaces with a Single Space


    In the following program, multiple white space characters are replaced with a
    single space using re.sub() method.


    ```python

    import re

    string=''SIBER          IS AN      AUTONOMOUS    INSTITUTE''

    pattern=''\s+''

    replace='' ''

    result=re.sub(pattern,replace,string)

    print(result)

    ```


    SIBER IS AN AUTONOMOUS INSTITUTE


    ##### Removing Spaces from a String


    In the following program, all spaces within the string are removed using re.sub()
    method.


    ```python

    import re

    string=''SIBER IS AN AUTONOMOUS INSTITUTE''

    pattern=''\s+''

    replace=''''

    result=re.sub(pattern,replace,string)

    print(result)

    ```


    SIBERISANAUTONOMOUSINSTITUTE


