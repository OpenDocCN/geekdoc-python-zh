    print(\"and object-oriented\")\n\nPython is interpreted and object-oriented\n\
    ```\n\n## 第 4 章\n\n### 基础程序实验作业\n\n级别 – 基础\n\n### 程序 1：检查给定数字是正数、负数还是零\n\n```\n\
