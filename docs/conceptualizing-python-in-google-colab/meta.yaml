    Here are few important points about the above-mentioned syntax –


    +   - A single try statement can have multiple except statements. This is useful
    when the try block contains statements that may throw different types of exceptions.

    - You can also provide a generic except clause, which handles any exception (catch
    all block).

    - After the except clause(s), you can include an else-clause. The code in the
    else-block executes if the code in the try: block does not raise an exception.

    - The else-block is a good place for code that does not need the try: block''s
    protection.


    # Displaying Descriptive Error Messages


    When an exception is raised inn the program, an object of appropriate exception
    type is instantiated and made available to the program. The program can access
    the exception object using the following syntax:


    ```

    except <exception_class> as <instance_name>

    ```


    If you write the code to handle a single exception, you can have a variable follow
    the name of the exception in the except statement. If you are trapping multiple
    exceptions, you can have a variable follow the tuple of the exception.


    This variable receives the value of the exception mostly containing the cause
    of the exception. The variable can receive a single value or multiple values in
    the form of a tuple. This tuple usually contains the error string, the error number,
    and an error location.


