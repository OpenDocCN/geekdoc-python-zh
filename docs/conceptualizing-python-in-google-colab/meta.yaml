    # Chapter 1


    ## Introduction to Google COLAB


    Colaboratory, or ‘*Colab*’ for short, is a product from Google Research. Colab
    allows anybody to write and execute arbitrary python code through the browser,
    and is especially well suited to machine learning, data analysis and education.


    If you are exploring Machine Learning but struggling to conduct simulations on
    enormous datasets, or an expert playing with ML desperate for extra computational
    power, Google Colab is the perfect solution for you. Google Colab or ‘*the Colaboratory*’
    is a free cloud service hosted by Google to encourage Machine Learning and Artificial
    Intelligence research, where often the barrier to learning and success is the
    requirement of tremendous computational power.


    If you want to create a machine learning model but you don’t have a computer that
    can take the workload, Google Colab is the platform for you. Even if you have
    a GPU or a good computer creating a local environment with anaconda and installing
    packages and resolving installation issues are a hassle.


    Colaboratory is a free Jupyter notebook environment provided by Google where you
    can use free GPUs and TPUs which can solve all these issues. It contains almost
    all the modules you need for data science analysis. These tools include but are
    not limited to Numpy, Scipy, Pandas, etc. Even deep learning frameworks, such
    as Tensorflow, Keras and Pytorch are also included.


    ## Benefits of COLAB


    Colab is a free Jupyter notebook environment that runs entirely in the cloud.

    Besides being easy to use, the Colab is fairly flexible in its configuration and
    does much of the heavy lifting for you. It does not require a setup.


    - Python 2.7 and Python 3.6 support'
