    List Size After Deletion : 4

    ```


    # Deleting a Range of Elements from the List Using del Method


    The syntax for deleting the elements in the index position n-m using positive
    indexing is


    *del[n:m+1]*


    The following program deletes the elements at the index position 2 to 4 using
    del method using positive indexing.


    ```

    list1=[1,2,3,4,5]

    print("List Size Before Deletion :",len(list1))

    print(list1)

    del list1[2:5]

    print("List Size After Deletion :",len(list1))

    print(list1)


    List Size Before Deletion : 5

    [1, 2, 3, 4, 5]

    List Size After Deletion : 2

    [1, 2]

    ```


