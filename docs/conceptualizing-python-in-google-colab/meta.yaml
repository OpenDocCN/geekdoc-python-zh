    emp2.displayEmployee()\nprint(\"Total Employee %d\" % Employee.empCount)\n\nName\
    \ :  Zara , Salary:  2000\nName :  Manni , Salary:  5000\nTotal Employee 2\n```\n\
    \n**Note:** Within the class local variable is referenced directly while class\
    \ variable is referenced using the following syntax (using class name):\n\n`<class_name>.<class_variable_name>`\
    \ and\n\ndata members are referenced using the following syntax:\n\n`self.<data_member_name>`\
    \ and\n\nThere can be only one `__init__()` method in a class. If the class contains\
