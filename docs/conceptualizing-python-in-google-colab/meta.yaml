    # Conceptualizing Python in Google COLAB


    # Closing the File


    # The *close()* Method


    The **close()** method of a *file* object flushes any unwritten information and
    closes the file object, after which no more writing can be done.


    Python automatically closes a file when the reference object of a file is reassigned
    to another file. It is a good practice to use the close() method to close a file.
    The syntax for closing the file is shown below:


    # Syntax


    ```

    <file_object>.close()

    ```


    Python supports a tell() function for querying the position of file pointer. The
    following program displays the position of the file pointer when the file is opened
    in different modes specified above for writing to the file and reading the file
    contents.


    ```

    f=open("test.txt","w")

    print(f.tell())

    f=open("test.txt","wb")

    print(f.tell())

    f=open("test.txt","w+")

    print(f.tell())

    f=open("test.txt","wb+")

    print(f.tell())


    0

    0

    0

    0

    ```'
