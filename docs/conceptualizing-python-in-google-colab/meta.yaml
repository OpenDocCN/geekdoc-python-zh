    \ 210\n```\n\n## Anonymous or Lambda Functions\n\nIn Python, an anonymous function\
    \ is a function that is defined without a name. While normal functions are defined\
    \ using the ‘def’ keyword in Python, anonymous functions are defined using the\
    \ lambda keyword. A lambda function can take any number of arguments, but can\
    \ only have one expression. The syntax for defining a lambda function is shown\
    \ below:\n\n### Syntax:\n\n```python\nlambda <argument_list>:expression\n```\n\
    \n### Rules in Defining Lambda Functions:\n\nThe following rules are observed\
    \ in designing lambda functions:\n\n- ‘lambda’ keyword is used in place of ‘def’\
    \ keyword for defining lambda functions.\n- ‘lambda’ functions are anonymous which\
    \ means the functions are defined without name.\n- Lambda forms can take any number\
    \ of arguments but return just one value in the form of an expression. They cannot\
    \ contain commands or multiple expressions.\n- Lambda functions have their own\
