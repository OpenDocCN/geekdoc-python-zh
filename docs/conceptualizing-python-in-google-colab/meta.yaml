    \     16 print(p1.age)\n\nTypeError: __init__() missing 1 required positional\
    \ argument: 'age'\n\nSEARCH STACK OVERFLOW\n```\n\n## Default Arguments\n\nThe\
    \ constructor can accept default parameters. The constructor overloading can be\
