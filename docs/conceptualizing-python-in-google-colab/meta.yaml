    # Using super


    Python super() function provides us the facility to refer to the parent class
    explicitly. It is basically useful where we have to call superclass functions.
    It returns the proxy object that allows us to refer parent class by ‘super’.


    # Example:


    In the following example, class ‘A’ has a single data member ‘x’ and a **display()**
    method to display the value of ‘x’. ‘B’ is a derived class of ‘A’ with the new
    data member ‘y’. Hence, the class ‘B’ has access to two data members:


    +   - ‘x’ inherited from class ‘A’

    - ‘y’ newly added by class ‘B’


    The class ‘B’ has display() method to display the values of ‘x’ and ‘y’ which
    uses ‘super’ keyword for invoking the display() method of parent class ‘A’ and
    then displays the value of ‘y’.


    ‘C’ is a derived class of ‘B’ with the new data member ‘z’. Hence, the class ‘C’
    has access to three data members:


    +   - ‘x’ inherited from class ‘A’

    - ‘y’ inherited from class ‘A’

    - ‘z’ newly added by class ‘C’


    The class ‘C’ has display() method to display the values of ‘x’, ‘y’ and ‘z’ which
    uses ‘super’ keyword for invoking the display() method of parent class ‘B’ for
    displaying the values of ‘x’ and ‘y’ and then displays the value of ‘z’.'
