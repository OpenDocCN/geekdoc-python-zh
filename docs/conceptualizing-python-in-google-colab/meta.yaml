    以下程序创建一个元组，其中包含 0 到 9 范围内元素的平方。聚合函数 `sum()` 用于计算 0 到 9 范围内自然数平方的和。\n\n```python\n\
    a = (x*x for x in range(10))\nprint(sum(a))\n\n285\n```\n\n## 生成器管道\n\n具有不同功能的生成器函数可以管道化连接在一起，以产生累积效果。在以下示例中，定义了三个生成器函数：\n\
    `even_filter` → 它接受一个列表，并仅产出列表中的偶数。\n`multiply_by_three` → 它接受一个列表，将列表的每个元素乘以\
