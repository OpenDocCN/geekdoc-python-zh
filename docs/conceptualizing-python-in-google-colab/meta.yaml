    \ 100 and 200 is : \",max(100,200))\n\nMaximum of 100 and 200 is : 200\n```\n\n\
    ### Examples:\n\nWrite a lambda function to increment the value by 10.\n\n```python\n\
    x = lambda a : a + 10\nprint(x(5))\n\n15\n```\n\nWrite a lambda function to multiply\
    \ two numbers.\n\n```python\nproduct = lambda a,b : a * b\nprint(product(4,5))\n\
    \n20\n```\n\nWrite a lambda function to print a string.\n\n```python\n(lambda\
    \ str : print(str))(\"Hello lambda Function\")\n\nHello lambda Function\n```\n\
    \n## Lambda with Default Arguments\n\nA lambda function can take default arguments.\
