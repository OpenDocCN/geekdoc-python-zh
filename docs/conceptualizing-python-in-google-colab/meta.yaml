    \ class\n    def myMethod(self):\n        print('Calling child method')\n\nc =\
    \ Parent()         # instance of parent\nc.myMethod()         # child calls overridden\
    \ method\n```\n\n```\nCalling parent method\n```\n\n## Access Modifiers in Python\
    \ : Public, Private and Protected\n\nVarious object-oriented languages like C++,\
    \ Java, Python controls access modifications which are used to restrict access\
    \ to the variables and methods of the class. Most programming languages has three\
    \ forms of access modifiers, which are **Public**, **Protected** and **Private**\
    \ in a class. Python uses ‘_’ symbol to determine the access control for a specific\
    \ data member or a member function of a class. Access specifiers in Python have\
    \ an important role to play in securing data from unauthorized access and in preventing\
    \ it from being exploited.\n\nA Class in Python has three types of access modifiers\
    \ –\n\n- Public Access Modifier\n- Protected Access Modifier\n- Private Access\
    \ Modifier\n\n### Public Access Modifier:\n\nThe members of a class that are declared\
    \ public are easily accessible from any part of the program. All data members\
    \ and member functions of a class are public by default.\n\n### A Program to Illustrate\
    \ Public Access Modifier in a Class"
