    print(result)\n\n('SIBER IS AN AUTONOMOUS INSTITUTE', 4)\n```\n\n以下程序查询 `re.subn()`\
    \ 方法的返回类型。\n\n```python\nimport re\nstring='SIBER    IS AN    AUTONOMOUS     \
    \       INSTITUTE'\npattern='\\s+'\nreplace=' '\nresult=re.subn(pattern,replace,string)\n\
    print(result)\nprint(type(result))\n\n('SIBER IS AN AUTONOMOUS INSTITUTE', 4)\n\
    <class 'tuple'>\n```\n\n你可以将 `count` 作为第四个参数传递给 `re.sub()` 方法。如果省略，其默认值为 0。这将替换所有出现的匹配项。以下程序仅将字符串中多个空格的第一次出现替换为单个空格。\n\
    \n```python\nimport re\nstring='SIBER    IS AN    AUTONOMOUS            INSTITUTE'\n\
    pattern='\\s+'\nreplace=' '\nresult=re.subn(pattern,replace,string,1)\nprint(result)\n\
    print(type(result))\n\n('SIBER IS AN    AUTONOMOUS            INSTITUTE', 1)\n\
    <class 'tuple'>\n```\n\n## re.search()\n\n`re.search()` 方法接受两个参数：一个模式和一个字符串。该方法查找正则表达式模式与字符串匹配的第一个位置。\n\
    如果搜索成功，`re.search()` 返回一个匹配对象；如果不成功，则返回 `None`。\n*match = re.search(pattern, str)*\n\
    \n### 示例：\n\n此处，变量 `found` 包含一个匹配对象。在以下程序中，在给定字符串中搜索字符串 'SIBER'。由于搜索成功，返回了 `re.Match`\
    \ 对象，如下图所示：\n\n```python\nimport re\nstring='SIBER IS AN AUTONOMOUS INSTITUTE'\n\
    sstring='SIBER'\nfound=re.search(sstring,string)\nif found:\n    print(\"Search\
    \ string found\")\nelse:\n    print(\"Search string not found\")\nprint(type(found))\n\
    \nSearch string found\n<class 're.Match'>\n```\n\n由于在给定字符串中未找到字符串 'CSIBER'，`re.search()`\
    \ 方法返回 'NoneType'，如下程序所示：\n\n```python\nimport re\nstring='SIBER IS AN AUTONOMOUS\
    \ INSTITUTE'\nsstring='CSIBER'\nfound=re.search(sstring,string)\nif found:\n \
    \   print(\"Search string found\")\nelse:\n    print(\"Search string not found\"\
    )\nprint(type(found))\n\nSearch string not found\n<class 'NoneType'>\n```\n\n\
    ## 匹配对象\n\n你可以使用 `dir()` 函数获取匹配对象的方法和属性，如下程序所示：\n\n```python\nimport re\nprint(dir(re.Match))\n\
    ['__class__', '__copy__', '__deepcopy__', '__delattr__', '__dir__', '__doc__',\
    \ '__eq__', '__format__', '__ge__', '__getattribute__', '\n```\n\n匹配对象的一些常用方法和属性如下：\n\
    `match.group()`\n\n`group()` 方法返回字符串中匹配的部分。\n\n```python\nimport re\nstring='123-45\
    \ 777-88'\npattern='(\\d{3})-(\\d{2})'\nmatch=re.search(pattern, string)\nif match:\n\
    \    print(match.group())\nelse:\n    print(\"Match not found\")\n\n123-45\n```\n\
    \n此处，`match` 变量包含一个匹配对象。\n\n我们的模式 `(\\d{3})-(\\d{2})` 有两个子组 `(\\d{3})` 和 `(\\\
    d{2})`。你可以获取这些带括号子组的字符串部分。方法如下：\n\n```python\nimport re\nstring='123-45 777-88'\n\
    pattern='(\\d{3})-(\\d{2})'\nmatch=re.search(pattern, string)\nprint(match.group(1))\n\
    print(match.group(2))\nprint(match.group(1, 2))\nprint(match.groups())\n\n123\n\
    45\n('123', '45')\n('123', '45')\n```\n\n`match.start()`、`match.end()` 和 `match.span()`\n\
    `start()` 函数返回匹配子字符串的起始索引。类似地，`end()` 返回匹配子字符串的结束索引。\n\n```python\nimport re\n\
    string='123-45 777-88'\npattern='(\\d{3})-(\\d{2})'\nmatch=re.search(pattern,\
    \ string)\nprint(match.start())\nprint(match.end())\n\n0\n6\n```\n\n`span()` 函数返回一个包含匹配部分起始和结束索引的元组。\n\
    \n```python\nimport re\nstring='123-45 777-88'\npattern='(\\d{3})-(\\d{2})'\n\
    match=re.search(pattern, string)\nprint(match.span())\nprint(type(match.span()))\n\
    \n(0, 6)\n<class 'tuple'>\n```\n\n## 在正则表达式前使用 r 前缀\n\n当在正则表达式前使用 `r` 或 `R` 前缀时，它表示原始字符串。例如，`'\\\
    n'` 是一个换行符，而 `r'\\n'` 表示两个字符：一个反斜杠 `\\` 后跟一个 `n`。\n\n反斜杠 `\\` 用于转义各种字符，包括所有元字符。然而，使用\
    \ `r` 前缀使得 `\\` 被视为普通字符。\n\n### 示例：\n\n使用 `r` 前缀的原始字符串\n\n```python\nimport re\n\
    string='Python is easy\\n Python is interesting \\n Python is open source'\nmatch=re.findall(r\"\
    \\n\", string)\nprint(match)\nlines=len(match)+1\nprint(\"No. of Lines is a string\
    \ : \",lines)\n\n['\\n', '\\n']\nNo. of Lines is a string :  3\n```\n\n## match.re\
    \ 和 match.string\n\n匹配对象的 `re` 属性返回一个正则表达式对象。类似地，`string` 属性返回传入的字符串。\n\n```python\n\
    import re\nstring='123-45 777-88'\npattern='(\\d{3})-(\\d{2})'\nmatch=re.search(pattern,string)\n\
    print(match.re)\nprint(match.string)\n\nre.compile('(\\d{3})-(\\d{2})')\n123-45\
    \ 777-88\n```\n\n## 元字符\n\n元字符是正则表达式引擎以特殊方式解释的字符。以下是常用元字符的列表：\n\n[] . ^ $ * +\
    \ ? {} () \\ |\n\n## 搜索模式\n\n### 元字符 .（单个字符）\n\n```python\nimport re\npattern='^a...s$'\n\
    test_string='abyss'\nresult=re.match(pattern,test_string)\nif result:\n    print(\"\
    Search Successful..\")\nelse:\n    print(\"Search Unsuccessful..\")\n\nSearch\
    \ Successful..\n```\n\n```python\nimport re\npattern='^a...s$'\ntest_string='ass'\n\
    result=re.match(pattern,test_string)\nif result:\n    print(\"Search Successful..\"\
    )\nelse:\n    print(\"Search Unsuccessful..\")\n\nSearch Unsuccessful..\n```\n\
    \n如下所示替换模式并重新执行：\n\npattern=':\\d+'\n\n```python\nimport re\nstring='one:1 two:2\
    \ three:3 four:4'\npattern=':\\d+'\nresult=re.split(pattern,string)\nprint(result)\n\
    \n['one', ' two', ' three', ' four', '']\n```\n\n## 字符重复\n\n以下字符用于指定字符串中字符的重复：\n\
    \n| 元字符 | 含义 |\n|---|---|\n| * | 前一个字符出现零次或多次 |\n| + | 前一个字符出现一次或多次 |\n| ? | 字符出现零次或一次\
    \ |\n| . | 恰好一个字符 |\n\n### * 元字符（零次或多次出现）\n\n模式 'c*' 匹配无限数量的模式，即包含 ' '、'c'、'cc'、'ccc'、...\
    \ 等的字符串。\n以下程序演示了测试给定字符串是否匹配模式 'c*'\n正则表达式 `ab+c` 将匹配 `ac`、`abc`、`abbc`、`abbbc`、...\
    \ 等。\n\n```python\nimport re\npattern='c*'\ntest_string='csiber'\nresult=re.match(pattern,test_string)\n\
    if result:\n    print(\"Search Successful..\")\nelse:\n    print(\"Search Unsuccessful..\"\
    )\n\nSearch Successful..\n```\n\n```python\nimport re\npattern='c*'\ntest_string='c'\n\
    result=re.match(pattern,test_string)\nif result:\n    print(\"Search Successful..\"\
    )\nelse:\n    print(\"Search Unsuccessful..\")\n\nSearch Successful..\n```\n\n\
    ### ? 元字符（零次或一次出现）\n\n模式 'c?' 匹配两种搜索模式，即包含 ' ' 和 'c' 的字符串。以下程序演示了测试给定字符串是否匹配模式\
    \ 'c?'\n\n```python\nimport re\npattern='c?'\ntest_string='csiber'\nresult=re.match(pattern,test_string)\n\
    if result:\n    print(\"Search Successful..\")\nelse:\n    print(\"Search Unsuccessful..\"\
    )\n\nSearch Successful..\n```\n\n搜索模式 'docx?'（x 是可选的）匹配 'doc' 或 'docx' 之一。\n\n\
    ```python\nimport re\npattern='docx?'\ntest_string='doc'\nresult=re.match(pattern,test_string)\n\
    if result:\n    print(\"Search Successful..\")\nelse:\n    print(\"Search Unsuccessful..\"\
    )\n\nSearch Successful..\n```\n\n```python\nimport re\npattern='docx?'\ntest_string='docx'\n\
    result=re.match(pattern,test_string)\nif result:\n    print(\"Search Successful..\"\
    )\nelse:\n    print(\"Search Unsuccessful..\")\n\nSearch Successful..\n```\n\n\
    ### + 元字符（一次或多次出现）\n\n模式 'c+' 匹配无限数量的模式，即包含 'c'、'cc'、'ccc'、... 等的字符串。以下程序演示了测试给定字符串是否匹配模式\
    \ 'c+'\n\n元字符 '*' 和 '+' 之间的关系是：\n\n{*} = {} U {+}\n\n因此 'c*' 模式除了包含 ' ' 之外，还包含\
    \ 'c+' 的所有字符串。\n\n正则表达式 `ab+c` 将匹配 `abc`、`abbc`、`abbbc`、... 等。"
