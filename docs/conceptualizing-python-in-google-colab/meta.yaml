    # Chapter 8


    Lab Assignment on Exception Handling in Python


    Level – Intermediate


    # Exception


    A typical program can contain one of the following types of errors:


    +   - Logical Error

    - Compiler Error

    - Linker Error

    - Runtime Error


    Logical error can be trapped through exhaustive test cases. Compiler error is
    tracked by the compiler and can be fixed, so is the linker error. If the program
    contains the runtime error, then it will compile successfully. However, during
    the execution will generate an error. Such a runtime error is referred to as ‘*Exception*’.


    An exception can be defined as an unusual condition in a program which the program
    cannot cope up with, resulting in the interruption in the flow of the program.


    A program can employ one of the following approaches:


    +   - anticipate and handle the exception in the program and take the corrective
    measures

    - leave it to the system for processing


    # Standard or Pre-defined Exception in Python


    List of standard exceptions is depicted in the following table:'
