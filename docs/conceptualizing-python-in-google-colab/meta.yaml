    \ 50\n      2 print(x)\n      3 print(y)\n      4 print(z)\n      5 \nValueError:\
    \ too many values to unpack (expected 3)\n\nSEARCH STACK OVERFLOW\n```\n\n如果值的数量少于变量的数量，会生成\
    \ `ValueError`，并显示消息 `not enough values to unpack`，如下图所示：\n\n## 在 Google COLAB\
