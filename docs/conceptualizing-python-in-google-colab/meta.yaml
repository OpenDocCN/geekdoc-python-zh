    # Using r prefix before RegEx


    When r or R prefix is used before a regular expression, it means raw string. For
    example, ''\n'' is a new line whereas r''\n'' means two characters: a backslash
    \ followed by n.


    Backlash \ is used to escape various characters including all metacharacters.
    However, using r prefix makes \ treat as a normal character.


    # Example:


    Raw string using r prefix


    ```

    import re

    string=''Python is easy\n Python is interesting \n Python is open source''

    match=re.findall(r"\n", string)

    print(match)

    lines=len(match)+1

    print("No. of Lines is a string : ",lines)


    [''\n'', ''\n'']

    No. of Lines is a string :  3

    ```


    # match.re and match.string


    The re attribute of a matched object returns a regular expression object. Similarly,
    string attribute returns the passed string.


    ```

    import re

    string=''123-45 777-88''

    pattern=''(\d{3})-(\d{2})''

    match=re.search(pattern,string)

    print(match.re)

    print(match.string)


    re.compile(''(\d{3})-(\d{2})'')

    123-45 777-88

    ```'
