    # Google Colab – Magics


    Magics is a set of system commands that provide a mini extensive command language.

    Magics are of two types –


    +   - Line magics

    - Cell magics


    The line magics as the name indicates that it consists of a single line of command,
    while the cell magic covers the entire body of the code cell.

    In case of line magics, the command is prepended with a *single % character* and
    in the case of cell magics, it is prepended with *two % characters (%%)*.

    Let us look into some examples of both to illustrate these.


    # Line Magics


    Type the following code in your code cell –


    ```

    %ldir

    ```


    The above command displays the content of current working directory.'
