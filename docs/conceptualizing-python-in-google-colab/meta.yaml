    \ of the following:\n\n- Inherit the members of base class\n- Override the members\
    \ of base class\n- Add new data members or functionality to the class\n\nThe syntax\
    \ for class inheritance is shown below:\n\n### Syntax\n\nDerived classes are declared\
    \ much like their parent class; however, a list of base classes to inherit from\
    \ is given after the class name —\n\n```python\nclass SubClassName (ParentClass1[,\
