    \    def __init__(self, real, img):\n        self.real = real\n        self.img\
    \ = img\n    def __str__(self):\n        return str(self.real) + \"+\" + str(self.img)\
    \ + \"i\"\n\nc = Complex(2,5)\nprint(c)\n```\n\n```\n2+5i\n```\n\n## 对象比较\n\n\
    在 Python 中，当使用 == 运算符比较两个引用变量时，比较的是两个对象的地址，而不是内容。在下面的例子中，‘n1’和‘n2’是‘Number’类的引用。即使它们的内容相同，它们的比较也会失败，如下图所示：\n\
    \n```python\nclass Number:\n    def __init__(self, val):\n        self.val = val\n\
    \n    def __str__(self):\n        return str(self.val)\n\nn1 = Number(2)\nn2 =\
    \ Number(2)\n\nif (n1==n2):\n    print(\"Equal\")\nelse:\n    print(\"Not Equal\"\
    )\n```\n\n```\nNot Equal\n```\n\n为了比较两个对象的内容，必须在类中重写 __eq__() 方法。下面的程序展示了上述程序的重写版本，它重写了\
    \ __eq__() 方法来比较两个‘Number’类对象的内容。当类中重写了 __eq__() 方法时，== 运算符就被映射到该方法进行对象比较。\n\n\
    ```python\nclass Number:\n    def __init__(self, val):\n        self.val = val\n\
    \n    def __str__(self):\n        return str(self.val)\n\n    def __eq__(self,\
    \ x):\n        return self.val==x.val\n\nn1 = Number(2)\nn2 = Number(2)\n\nif\
    \ (n1==n2):\n    print(\"Equal\")\nelse:\n    print(\"Not Equal\")\n```\n\n```\n\
    Equal\n```\n\n在上面的程序中，语句\n\n**n1==n2** 被转换为语句\n\n**n1.__eq__(n2)**\n\n## 运算符重载\n\
    \n运算符重载意味着赋予运算符超出其预定义操作含义的扩展意义。例如，运算符 + 用于将两个整数相加，也用于连接两个字符串和合并两个列表。这是可以实现的，因为‘+’运算符被\
    \ int 类和 str 类重载了。相同的内置运算符或函数对不同类的对象表现出不同的行为，这被称为*运算符重载*。\n\n## Python 中用于运算符重载的魔术方法或特殊函数\n\
    \n## 如何在 Python 中重载运算符？\n\n我们可以重载所有现有的运算符，但不能创建新的运算符。为了执行运算符重载，Python 提供了一些特殊函数或魔术函数，当它们与特定运算符关联时，会自动调用。例如，当我们使用\
    \ + 运算符时，魔术方法 __add__ 会被自动调用，其中定义了 + 运算符的操作。\n\n下表描述了可以重载的运算符及其对应的魔术方法。\n\n| 运算符\
    \ | 魔术方法 |\n| :--- | :--- |\n| + | `__add__(self, other)` |\n| - | `__sub__(self,\
    \ other)` |\n| * | `__mul__(self, other)` |\n| / | `__truediv__(self, other)`\
    \ |\n| // | `__floordiv__(self, other)` |\n| % | `__mod__(self, other)` |\n| **\
    \ | `__pow__(self, other)` |\n| >> | `__rshift__(self, other)` |\n| << | `__lshift__(self,\
    \ other)` |\n| & | `__and__(self, other)` |\n| \\| | `__or__(self, other)` |\n\
    | ^ | `__xor__(self, other)` |\n\n### 比较运算符：\n\n| 运算符 | 魔术方法 |\n| :--- | :---\
    \ |\n| < | `__lt__(self, other)` |\n| > | `__gt__(self, other)` |\n| <= | `__le__(self,\
    \ other)` |\n| >= | `__ge__(self, other)` |\n| == | `__eq__(self, other)` |\n\
    | != | `__ne__(self, other)` |\n\n### 赋值运算符：\n\n| 运算符 | 魔术方法 |\n| :--- | :---\
    \ |\n| -= | `__isub__(self, other)` |\n| += | `__iadd__(self, other)` |\n| *=\
    \ | `__imul__(self, other)` |\n| /= | `__idiv__(self, other)` |\n| //= | `__ifloordiv__(self,\
    \ other)` |\n| %= | `__imod__(self, other)` |\n| **= | `__ipow__(self, other)`\
    \ |\n| >>= | `__irshift__(self, other)` |\n| <<= | `__ilshift__(self, other)`\
    \ |\n| &= | `__iand__(self, other)` |\n| \\|= | `__ior__(self, other)` |\n| ^=\
    \ | `__ixor__(self, other)` |\n\n### 一元运算符：\n\n| 运算符 | 魔术方法 |\n| :--- | :--- |\n\
    | - | `__neg__(self)` |\n| + | `__pos__(self)` |\n| ~ | `__invert__(self)` |\n\
    \n## 在 Vector 类中重载二元 + 运算符\n\n当我们在用户定义的数据类型上使用运算符时，与该运算符关联的特殊函数或魔术函数会自动调用。改变运算符的行为就像改变方法或函数的行为一样简单。你在类中定义方法，运算符根据方法中定义的行为工作。当我们使用\
    \ + 运算符时，魔术方法 __add__ 会被自动调用，其中定义了 + 运算符的操作。通过更改这个魔术方法的代码，我们可以赋予 + 运算符额外的意义。在下面的例子中，__add__()\
    \ 方法在‘Vector’类中被重载，用于定义两个向量类对象的加法操作。"
