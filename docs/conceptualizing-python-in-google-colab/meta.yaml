    \ Rational No.s\n\nThe following code depicts the standardization procedure before\
    \ comparing the two rational nos. If the denominator of a rational no is negative,\
    \ then the signs of numerator and denominator are reversed.\n\n```\nclass Rational:\n\
    \    def __init__(self, nr, dr):\n        self.nr = nr\n        self.dr = dr\n\
    \    def __str__(self):\n        return str(self.nr) + \"/\" + str(self.dr)\n\
    \    def __gt__(self,r):\n        if (self.dr < 0):\n            self.nr=-self.nr\n\
