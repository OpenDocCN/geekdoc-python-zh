  md: '# Conceptualizing Python in Google COLAB


    # Shallow Copying Vs. Deep Copying


    # Shallow Copying


    Shallow copying only copies the outer structure i.e. the elements of the outer
    list and references to inner lists, if any. As a result, on shallow copying a
    nested list, the elements of the outer list can be manipulated independently of
    each other while the inner lists are shared. In the following program, ‘numbers’
    is a nested list which is cloned using *copy()* method in a new reference ‘*numbers1*’.
    The inner list is manipulated using a reference ‘*numbers1*’. Since the copying
    is shallow, ‘*numbers*’ list reflects the changes carried out by ‘*numbers1*’
    as shown in the following program:


    ```

    numbers=[10, 20, 30, 40, [50, 60, 70]]

    numbers1=numbers.copy()

    print(numbers)

    print(numbers1)

    numbers1[4][0]=500

    numbers1[4][1]=600

    numbers1[4][2]=700

    print("After modifying numbers1 list : ")

    print(numbers)

    print(numbers1)


