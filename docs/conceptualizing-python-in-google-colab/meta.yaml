  - "[PAGE 70]\n\n# Conceptualizing Python in Google COLAB\n\n```\nlist1=[1,2,1,4,1]\n\
    print(\"List Size Before Deletion :\",len(list1))\nprint(list1)\nlist1.remove(1)\n\
    print(\"List Size After Deletion  :\",len(list1))\nprint(list1)\n\nList Size Before\
    \ Deletion : 5\n[1, 2, 1, 4, 1]\nList Size After Deletion  : 4\n[2, 1, 4, 1]\n\
    ```\n\nFor removing all the occurrences of a given element use the following logic:\
    \ The code iterates through the list and deletes all elements with value 1.\n\n\
    ```\nlist1=[1,2,1,4,1]\nprint(\"List Size Before Deletion :\",len(list1))\nprint(list1)\n\
    while (True):\n    try:\n        list1.remove(1)\n    except:\n        break\n\
    print(\"List Size After Deletion  :\",len(list1))\nprint(list1)\n\nList Size Before\
