    electives=[\"PHP\", \"Python\",\"Java\",\"Kotlin\",\"MEAN Stack\"]\nprint(\"Before\
    \ sorting : \")\nprint(electives)\nelectives.sort()\nprint(\"After sorting : \"\
    )\nprint(electives)\n\nBefore sorting :\n['PHP', 'Python', 'Java', 'Kotlin', 'MEAN\
    \ Stack']\nAfter sorting :\n['Java', 'Kotlin', 'MEAN Stack', 'PHP', 'Python']\n\
    ```\n\n## Sorting in Ascending and Descending Order – sorted() Method\n\nPython\
    \ supports a *sorted()* method for bi-directional sorting of elements. It can\
    \ be used for sorting the elements either in ascending or descending order. Unlike\
    \ *sort()* method of List class *sorted()* method accepts a list reference as\
    \ a parameter, creates a new sorted list and returns the same."
