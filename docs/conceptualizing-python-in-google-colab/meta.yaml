    # Formatting Output Using format()


    The format() method was introduced in Python3 and contains the place holders enclosed
    in a pair of curly braces. There is one-to-one correspondence between place holders
    and parameters passed to *format()* method as demonstrated in the following program:


    ```

    course="MSc"

    inst="SIBER"

    print(''I am pursuing {0} at {1}''.format(course, inst))


