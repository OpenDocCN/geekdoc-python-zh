  md: '# Conceptualizing Python in Google COLAB


    # Set Difference


    Difference of two sets is a set containing elements from the first set which are
    not present in second set as shown in the following program. Set supports difference()
    method for the purpose. The same result can be achieved using ‘-’ operator as
    well.


    ```

    s1={1,2,3,4,5}

    s2={3,4,5,6,7}

    print("s1 : ",s1)

    print("s2 : ",s2)

    s3=s1.difference(s2)

    s4=s2.difference(s1)

    print("s1 - s2 : ",s3)

    print("s2 - s1 : ",s4)


    s1 :  {1, 2, 3, 4, 5}

    s2 :  {3, 4, 5, 6, 7}

    s1 - s2 :  {1, 2}

    s2 - s1 :  {6, 7}

    ```


    # Set Symmetric Difference


    Symmetric difference of two sets is a set containing elements from both the sets
    obtained by computing their respective differences as shown in the following program.
    Set supports symmetric_difference() method for the purpose. The same result can
    be achieved using the following operation:


    s1 ~ s2 = s1 – s2) U (s2 – s1)


    ```

    s1={1,2,3,4,5}

    s2={3,4,5,6,7}

    print("s1 : ",s1)

    print("s2 : ",s2)

    s3=s1.symmetric_difference(s2)

    s4=s2.symmetric_difference(s1)

    print("(s1 - s2) U (s2 - s1) : ",s3)

    print("(s2 - s1) U (s1 - s2) : ",s4)


    s1 :  {1, 2, 3, 4, 5}

    s2 :  {3, 4, 5, 6, 7}

    (s1 - s2) U (s2 - s1) :  {1, 2, 6, 7}

    (s2 - s1) U (s1 - s2) :  {1, 2, 6, 7}

    ```'
