    \ a/b\n\ndivide(10,5)\n```\n\n```\n2.0\n```\n\n当通过传递 0 作为第二个参数调用 `divide()` 函数时，会抛出异常\
    \ `ZeroDivisionError`，如下图所示：\n\n```python\ndef divide(a,b):\n    return a/b\n\n\
    divide(10,0)\n```\n\n```\nZeroDivisionError Traceback (most recent call last)\n\
