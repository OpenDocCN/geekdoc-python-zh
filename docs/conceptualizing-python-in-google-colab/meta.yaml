- md: "## Conceptualizing Python in Google COLAB\n\n## Reversing the List Using reverse()\
    \ Method\n\nPython supports reverse() method for reversing the elements of a list.\
    \ The reverse() method does not create a new list but returns the same list with\
    \ the elements in reverse order.\n\n```python\nlist1=[1,2,3,4,5]\nprint(\"List\
    \ Before reverse operation : \", list1)\nlist1.reverse()\nprint(\"List After reverse\
    \ operation : \",list1)\n```\n\n```\nList Before reverse operation :  [1, 2, 3,\
    \ 4, 5]\nList After reverse operation :  [5, 4, 3, 2, 1]\n```\n\nAs seen by the\
    \ output generated on execution of the program, the ‘id’ of the list before and\
    \ after reversing is the same. Hence no new list is created.\n\n```python\nlist1=[1,2,3,4,5]\n\
    print(\"id of the list before reversing : \",id(list1))\nlist2=list1.reverse()\n\
    print(\"id of the list after reversing : \",id(list1))\nprint(list2)\n```\n\n\
    ```\nid of the list before reversing :  140416040961360\nid of the list after\
    \ reversing  :  140416040961360\nNone\n```\n\n## Finding the index of an Element\
    \ Using index() Method\n\nPython supports *index()* function which returns the\
    \ index of the element passed to it. In the following program, the index of the\
    \ elements ‘PHP’ and ‘Python’ is retrieved using index() method.\n\n```python\n\
    list1=[\"C\",\"Python\",\"PHP\",\"Java\"]\nprint(\"Index of PHP    : \", list1.index(\"\
    PHP\"))\nprint(\"Index of Python : \", list1.index(\"Python\"))\n```\n\n```\n\
    Index of PHP    :  2\nIndex of Python :  1\n```\n\n## Conceptualizing Python in\
    \ Google COLAB\n\n## Nested Lists\n\nA list can be nested inside another list\
    \ to any level creating a nested list structure. Consider the following list which\
    \ is nested upto level 3:\n\n```python\nlist1 = [[[1, 2], [3, 4], 5], [6, 7]]\n\
    ```\n\nThe nesting of list1 to different levels is depicted in the following figure:\n\
    \n![](img/3ae455253f7d6d927ba04166a75e6b16_72_0.png)\n\nThe following program\
    \ accesses the different elements of list1 and displays the same:\n\n```python\n\
    list1 = [[[1, 2], [3, 4], 5], [6, 7]]\nprint(list1[0][0][0])\nprint(list1[0][0][1])\n\
    print(list1[0][1][0])\nprint(list1[0][1][1])\nprint(list1[0][2])\nprint(list1[1][0])\n\
    print(list1[1][1])\n```\n\n```\n1\n2\n3\n4\n5\n6\n7\n```\n\n## Conceptualizing\
    \ Python in Google COLAB\n\n## Tuple in Python\n\nA tuple is data structure which\
    \ contains comma separated heterogeneous elements enclosed within a pair of parentheses\
    \ ().\n\n## Features of Tuple:\n\n- Tuple is immutable.\n- Tuple maintains insertion\
    \ order.\n- Tuple is iterable.\n- Tuple is ordered.\n\n## Operations on Tuple\n\
    \nFor extracting the elements of a tuple, the slicing operator, positive and negative\
    \ indexing mechanism discussed above for a list are also applicable to a tuple.\
    \ The following program employs slicing operator for extracting different elements\
    \ of a tuple.\n\n```python\nt=(10, 20.30, \"Python\", 'c', 23)\nt1=('Msc','CSIBER')\n\
    print(t[0])\nprint(t[1:3])\nprint(t[:2])\nprint(t[2:])\nprint(t*2)\nprint(t+t1)\n\
    ```\n\n```\n10\n(20.3, 'Python')\n(10, 20.3)\n('Python', 'c', 23)\n(10, 20.3,\
    \ 'Python', 'c', 23, 10, 20.3, 'Python', 'c', 23)\n(10, 20.3, 'Python', 'c', 23,\
    \ 'Msc', 'CSIBER')\n```\n\n## Conceptualizing Python in Google COLAB\n\n## Tuple\
    \ is immutable\n\nTuple is immutable implies that the elements of a tuple cannot\
    \ be modified once the tuple is created. An attempt to modify an element of a\
    \ tuple generates ‘TypeError’ as shown in the following figure:\n\n```python\n\
    t=(10, 20.30, \"Python\", 'c', 23)\nprint(t)\nt[2]=\"Java\"\nprint(t)\n```\n\n\
    ```\n(10, 20.3, 'Python', 'c', 23)\n---------------------------------------------------------------------------\n\
    TypeError                                 Traceback (most recent call last)\n\
    <ipython-input-16-3adf4f94e366> in <module>()\n      1 t=(10, 20.30, \"Python\"\
    , 'c', 23)\n      2 print(t)\n----> 3 t[2]=\"Java\"\n      4 print(t)\n\nTypeError:\
    \ 'tuple' object does not support item assignment\n\nSEARCH STACK OVERFLOW\n```\n\
    \nHowever, tuple concatenation is well defined and concatenation of two tuples\
    \ generates a new tuple as demonstrated in the following program. In the following\
    \ program, the tuple ‘t’ is concatenated with the tuple (6, 7) which generates\
    \ a new tuple as confirmed from its ‘id’.\n\n```python\nt=(1,2,3,4,5)\nprint(t)\n\
    print(id(t))\nt=t+(6,7)\nprint(id(t))\nprint(t)\n```\n\n```\n(1, 2, 3, 4, 5)\n\
    140081540476176\n140081478906800\n(1, 2, 3, 4, 5, 6, 7)\n```\n\n## Conceptualizing\
    \ Python in Google COLAB\n\n## Tuple Packing and Unpacking\n\n## Tuple Packing\n\
    \nTuple packing refers to assigning values to different elements of a tuple in\
    \ a single statement. The syntax of tuple packing is shown below:\n\n## Syntax:\n\
    \n```python\nvar = (ele1, ele2, . . . . , eleN)\n```\n\nAfter the execution of\
    \ the above statement, the elements of the tuple are assigned to ‘var’ which can\
    \ be accessed using indices as shown below:\n\n```python\nvar[0]=ele1\nvar[1]=ele2\n\
    .\n.\n.\nvar[n-1]=eleN\n```\n\n```python\nvar1, var2, var3, . . . ,varN = value1,\
    \ value2, value3, . . . ,valueN.\n```\n\nOne-to-one correspondence exists between\
    \ variables and values. In the above syntax, var1, var2, etc. are initialized\
    \ with value1, value2, ....etc., respectively.\nFor tuple packing to work properly,\
    \ the no of values specified on the right side of the expression should exactly\
    \ be equal to the no. of values on the left hand side of the expression.\n\n```python\n\
    stud_info=(1,\"Maya\",\"A\")\nprint(\"Roll no   :\",stud_info[0])\nprint(\"Name\
    \      :\",stud_info[1])\nprint(\"Division  :\",stud_info[2])\n```\n\n```\nRoll\
    \ no   : 1\nName      : Maya\nDivision  : A\n```\n\n## Conceptualizing Python\
    \ in Google COLAB\n\n## Tuple Unpacking\n\nTuple unpacking is exact opposite of\
    \ tuple packing where the list of variables are initialized using the elements\
    \ of a tuple.\n\n```python\nx, y, z=10, 20, 30\nprint(x)\nprint(y)\nprint(z)\n\
    ```\n\n```\n10\n20\n30\n```\n\nIf the no. of variables is less than the no. of\
    \ values, ‘ValueError’ is generated with the message ‘too many values to unpack’\
    \ as shown in the following figure:\n\n```python\nx, y, z=10, 20, 30, 40, 50\n\
    print(x)\nprint(y)\nprint(z)\n```\n\n```\n---------------------------------------------------------------------------\n\
    ValueError                                Traceback (most recent call last)\n\
    <ipython-input-23-4a8f2a2c4c35> in <module>()\n----> 1 x, y, z=10, 20, 30, 40,\
    \ 50\n      2 print(x)\n      3 print(y)\n      4 print(z)\n      5 \nValueError:\
    \ too many values to unpack (expected 3)\n\nSEARCH STACK OVERFLOW\n```\n\nIf the\
    \ no. of values is less than the no. of variables, ‘ValueError’ is generated with\
    \ the message ‘not enough values to unpack’ as shown in the following figure:\n\
    \n## Conceptualizing Python in Google COLAB\n\n```python\nx,y,z=10,20\nprint(x)\n\
    print(y)\nprint(z)\n```\n\n```\nValueError Traceback (most recent call last)\n\
    <ipython-input-24-a5bc6f7212ac> in <module>()\n----> 1 x,y,z=10,20\n      2 print(x)\n\
    \      3 print(y)\n      4 print(z)\n      5\n\nValueError: not enough values\
    \ to unpack (expected 3, got 2)\n\nSEARCH STACK OVERFLOW\n```\n\nIn the following\
    \ program ‘stud_info’ is a tuple containing student information pertaining to\
    \ rollno, name and division. The tuple is unpacked for extracting rollno, name\
    \ and division in three distinct variables.\n\n```python\nstud_info=(1,\"Maya\"\
    ,\"A\")\nrollno,name,division=stud_info\nprint(\"Roll no :\",rollno)\nprint(\"\
    Name :\",name)\nprint(\"Division :\",division)\n```\n\n```\nRoll no : 1\nName\
    \ : Maya\nDivision : A\n```\n\n## Tuple is Iterable\n\nThe different elements\
    \ of the tuple can be traversed using for loop as shown in the following program:\n\
    \n```python\nt=(1,2,3,4,5)\nfor ele in t:\n    print(ele)\n```\n\n```\n1\n2\n\
    3\n4\n5\n```\n\n## Conceptualizing Python in Google COLAB\n\n## Tuple is Ordered\n\
    \nTwo tuples are considered to be equal if and only if they contain same elements\
    \ also in the same order. In the following program, t1, t2 and t3 contain the\
    \ same elements. However, t1 and t2 contain the elements in the same order while\
    \ t1 and t3 contain the same elements in different order. Hence t1 and t2 are\
    \ considered to be equal while t1 and t3 are not equal as demonstrated in the\
    \ following example:\n\n```python\nt1=(1,2,3,4,5)\nt2=(1,2,3,4,5)\nt3=(5,4,3,2,1)\n\
    print(t1==t2)\nprint(t1==t3)\n```\n\n```\nTrue\nFalse\n```\n\n```python\ntuple1=(1,2,3,4,5)\n\
    tuple2=(5,4,3,2,1)\ntuple3=(1,2,3,4,5)\nif (tuple1==tuple2):\n    print(\"tuple1\
    \ and tuple2 are equal\")\nelse:\n    print(\"tuple1 and tuple2 are not equal\"\
    )\n\nif (tuple1==tuple3):\n    print(\"tuple1 and tuple3 are equal\")\nelse:\n\
    \    print(\"tuple1 and tuple3 are not equal\")\n```\n\n```\ntuple1 and tuple2\
    \ are not equal\ntuple1 and tuple3 are equal\n```\n\n## Tuple is Hashable\n\n\
    Since the tuple is immutable it can be used as keys of dictionary. Since list\
    \ is mutable it cannot be used as keys of dictionary. An attempt to use list as\
    \ a key of a dictionary generates ‘TypeError’ as shown in the following figure:"
