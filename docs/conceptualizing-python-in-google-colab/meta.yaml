    # Size of Identifier in Python


    The maximum possible length of an identifier is not defined in the python language.
    It can be of any number.


    # Determining the size of Variable in Python


    In Python `int` is a full-fledged object which involves an extra overhead which
    stores reference count, object type among others. In the following figure, size
    of int class and instance of int class is displayed.


    ```

    import sys

    print(sys.getsizeof(int))

    print(sys.getsizeof(int()))


    400

    24

    ```


    As shown in the following figure, the size of `int` data type is augmented by
    4 bytes for every 2^30 times increment in the value which accounts for large value
    that can be stored in `int` data type.


    ```

    import sys

    print(sys.getsizeof(0))

    print(sys.getsizeof(1))

    print(sys.getsizeof(2**30-1))

    print(sys.getsizeof(2**30))

    print(sys.getsizeof(2**60-1))

    print(sys.getsizeof(2**60))


    24

    28

    28

    32

    32

    36

    ```'
