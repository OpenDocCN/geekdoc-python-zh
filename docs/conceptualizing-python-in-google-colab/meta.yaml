    # Nested try Blocks


    One ‘try’ block can be completely nested inside another ‘try’ block and this can
    continue upto any level. In such a case, if the exception is thrown in inner-most
    try block, all the matching except blocks are examined first, if the matching
    except block is found, the exception is processed and the program execution continues,
    otherwise all the ‘except’ blocks corresponding to outer ‘try’ are examined. This
    continues till outermost ‘except’ blocks are examined. If the matching catch bloc
    is not found, then ultimately the exception is processed by the runtime system
    which results in abnormal termination of the program.


    Note: If the exception is raised in outer ‘try’ block and matching inner ‘except’
    block is present, then the exception is not processed there.


    In the following program, ‘ArithmeticError’ is raised in the outer ‘try’ block
    which is handled in outer ‘except’ block.'
