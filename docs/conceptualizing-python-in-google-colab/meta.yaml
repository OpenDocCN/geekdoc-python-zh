    # Set Operations


    Different set operations such as union, intersection, set difference, set symmetric
    difference, etc. are defined on two sets.


    # Union of Two Sets


    Union of two sets is a set containing elements from both the sets eliminating
    duplicates, if any as shown in the following program. Set supports union() method
    for the purpose. The same result can be achieved using ‘|’ operator as well.


    ```

    s1={1,2,3,4,5}

    s2={3,4,5,6,7}

    print("s1 : ",s1)

    print("s2 : ",s2)

    s3=s1.union(s2)

    s4=s1 | s2

    print("s1 U s2 : ",s3)

    print("s1 U s2 : ",s4)


    s1 :  {1, 2, 3, 4, 5}

    s2 :  {3, 4, 5, 6, 7}

    s1 U s2 :  {1, 2, 3, 4, 5, 6, 7}

    s1 U s2 :  {1, 2, 3, 4, 5, 6, 7}

    ```


    # Intersection of Two Sets


    Intersection of two sets is a set containing elements common to both the sets
    as shown in the following program. Set supports intersection() method for the
    purpose. The same result can be achieved using ‘&’ operator as well.


    ```

    s1={1,2,3,4,5}

    s2={3,4,5,6,7}

    print("s1 : ",s1)

    print("s2 : ",s2)

    s3=s1.intersection(s2)

    s4=s1 & s2

    print("s1  s2 : ",s3)

    print("s1  s2 : ",s4)


    s1 :  {1, 2, 3, 4, 5}

    s2 :  {3, 4, 5, 6, 7}

    s1  s2 :  {3, 4, 5}

    s1  s2 :  {3, 4, 5}

    ```'
- md: "## Conceptualizing Python in Google COLAB\n\n## Set Difference\n\nDifference\
    \ of two sets is a set containing elements from the first set which are not present\
    \ in second set as shown in the following program. Set supports difference() method\
    \ for the purpose. The same result can be achieved using ‘-’ operator as well.\n\
    \n```\ns1={1,2,3,4,5}\ns2={3,4,5,6,7}\nprint(\"s1 : \",s1)\nprint(\"s2 : \",s2)\n\
    s3=s1.difference(s2)\ns4=s2.difference(s1)\nprint(\"s1 - s2 : \",s3)\nprint(\"\
    s2 - s1 : \",s4)\n\ns1 :  {1, 2, 3, 4, 5}\ns2 :  {3, 4, 5, 6, 7}\ns1 - s2 :  {1,\
    \ 2}\ns2 - s1 :  {6, 7}\n```\n\n## Set Symmetric Difference\n\nSymmetric difference\
    \ of two sets is a set containing elements from both the sets obtained by computing\
    \ their respective differences as shown in the following program. Set supports\
    \ symmetric_difference() method for the purpose. The same result can be achieved\
    \ using the following operation:\n\ns1 ~ s2 = (s1 – s2) U (s2 – s1)\n\n```\ns1={1,2,3,4,5}\n\
    s2={3,4,5,6,7}\nprint(\"s1 : \",s1)\nprint(\"s2 : \",s2)\ns3=s1.symmetric_difference(s2)\n\
    s4=s2.symmetric_difference(s1)\nprint(\"(s1 - s2) U (s2 - s1) : \",s3)\nprint(\"\
    (s2 - s1) U (s1 - s2) : \",s4)\n\ns1 :  {1, 2, 3, 4, 5}\ns2 :  {3, 4, 5, 6, 7}\n\
    (s1 - s2) U (s2 - s1) :  {1, 2, 6, 7}\n(s2 - s1) U (s1 - s2) :  {1, 2, 6, 7}\n\
    ```\n\n## isdisjoint() Method\n\nThe two sets are considered to be disjoint, if\
    \ they have no elements in common. set class supports a boolean method isdisjoint()\
    \ to check whether the two sets are disjoint or not.\n\n```\ns1={1,2,3}\ns2={3,4,5}\n\
    s3={4,5,6}\nprint(\"s1 and s2 are disjoint : \",s1.isdisjoint(s2))\nprint(\"s1\
    \ and s3 are disjoint : \",s1.isdisjoint(s3))\n\ns1 and s2 are disjoint :  False\n\
    s1 and s3 are disjoint :  True\n```\n\n## Checking Set Relationship – issubset(),\
    \ issuperset()\n\nSet A is considered to be a subset of set B, if it at least\
    \ contains all elements of set B. B is considered to be a superset of A. set class\
    \ supports two boolean methods issubset() and issuperset() to check whether the\
    \ invoking set is a subset/superset of a set passed as an argument.\n\n```\ns1={1,2,3}\n\
    s2={1,2}\nprint(\"s2 is subset of s1   : \",s2.issubset(s1))\nprint(\"s1 is superset\
    \ of s2 : \",s1.issuperset(s2))\n\ns2 is subset of s1   :  True\ns1 is superset\
    \ of s2 :  True\n```\n\n```\ns1={1,2,3}\ns2={1,2,5}\nprint(\"s2 is subset of s1\
    \   : \",s2.issubset(s1))\nprint(\"s1 is superset of s2 : \",s1.issuperset(s2))\n\
    \ns2 is subset of s1   :  False\ns1 is superset of s2 :  False\n```\n\n## Set\
    \ Difference Revisited- difference() Method\n\nSet difference contains all the\
    \ elements from first set which are not present in second set, but it does not\
    \ update the first set as shown below:\n\n```\ns1={1,2,3}\ns2={1,2,5}\ns3=s1.difference(s2)\n\
    print(\"s1 : \",s1)\nprint(\"s2 : \",s2)\nprint(\"s3 : \",s3)\n\ns1 :  {1, 2,\
    \ 3}\ns2 :  {1, 2, 5}\ns3 :  {3}\n```\n\n## difference_update() Method\n\n*difference_update()*\
    \ method on the contrary computes the set difference and updates the invoking\
    \ set.\n\n```\ns1={1,2,3}\ns2={1,2,5}\ns3=s1.difference_update(s2)\nprint(\"s1\
    \ : \",s1)\nprint(\"s2 : \",s2)\nprint(\"s3 : \",s3)\n\ns1 :  {3}\ns2 :  {1, 2,\
    \ 5}\ns3 :  None\n```\n\n## intersection_update() Method\n\n*intersection_update()*\
    \ method computes the set intersection and updates the invoking set with the result\
    \ of set intersection.\n\n```\ns1={1,2,3}\ns2={1,2,5}\ns3=s1.intersection_update(s2)\n\
    print(\"s1 : \",s1)\nprint(\"s2 : \",s2)\nprint(\"s3 : \",s3)\n\ns1 :  {1, 2}\n\
    s2 :  {1, 2, 5}\ns3 :  None\n```\n\n## Symmetric_difference_update() Method\n\n\
    *Symmetric_difference_update()* method computes the symmetric difference between\
    \ two sets and updates the invoking set with the result of set difference.\n\n\
    ```\ns1={1,2,3}\ns2={1,2,5}\ns3=s1.symmetric_difference_update(s2)\nprint(\"s1\
    \ : \",s1)\nprint(\"s2 : \",s2)\nprint(\"s3 : \",s3)\n\ns1 :  {3, 5}\ns2 :  {1,\
    \ 2, 5}\ns3 :  None\n```\n\n## Frozen Set\n\nSet is mutable. Frozen set is an\
    \ immutable version of a set. Since the set is mutable, it is not hashable and\
    \ hence cannot be used as a key of a dictionary whereas a frozen set can be.\n\
    \n## Converting a Set into Frozen Set\n\nA set can be converted into a frozen\
    \ set using *frozenset()* method as demonstrated in the following program. The\
    \ program confirms that set is not hashable while frozen set is. After converting\
    \ a set into a frozen set, the methods which modify the elements of a set such\
    \ as *add()*, *clear()*, *update()* etc. cease to be applicable to a frozen set.\n\
    \n```\nset1 = {1,2,3}\ntry:\n    print(hash(set1))\nexcept TypeError:\n    print(\"\
    Set is not Hashable\")\n\nfset1=frozenset(set1)\ntry:\n    print(\"Hash Value\
    \ of Frozen Set : \",hash(fset1))\nexcept TypeError:\n    print(\"Object is not\
    \ Hashable\")\n\nSet is not Hashable\nHash Value of Frozen Set :  -272375401224217160\n\
    ```\n\n## Application of Set\n\n### To find difference between two lists.\n\n\
    The List class does not support ‘-’ operator for finding the difference between\
    \ two lists, however Set class does.\n\n```\nlist1=[1,2,3,4,5]\nlist2=[1,3,5]\n\
    list3=list1-list2\nprint(list1)\nprint(list2)\nprint(list3)\n\nTypeError Traceback\
