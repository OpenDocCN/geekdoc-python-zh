    \ in the following figure:\n\n![](img/3ae455253f7d6d927ba04166a75e6b16_274_0.png)\n\
    \n## Class Inheritance\n\nInheritance aids in code reusability. If two classes\
    \ have common traits, then instead of creating the class from scratch, it can\
