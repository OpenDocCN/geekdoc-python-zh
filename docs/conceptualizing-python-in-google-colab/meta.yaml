- md: "## Conceptualizing Python in Google COLAB\n\n## Unhandled Exception\n\nWhen\
    \ the exception is raised in the program and the program does not handle it, it\
    \ will be sent to the system for processing which will result in abnormal termination\
    \ of the program. The program ceases to continue its execution as demonstrated\
    \ in the following program. In the following example, ‘ZeroDivisionError’ is thrown\
    \ in statement 3 when attempting to divide a number by zero which the system will\
    \ not handle and is ultimately processed by the runtime system.\n\n```\na = 10\n\
    b = 0\nc = a/b\nprint(c)\n\nZeroDivisionError Traceback (most recent call last)\n\
    <ipython-input-1-16fdd7ba8379> in <module>()\n     1 a = 10\n     2 b = 0\n---->\
    \ 3 c = a/b\n     4 print(c)\n\nZeroDivisionError: division by zero\n\nSEARCH\
    \ STACK OVERFLOW\n```\n\n## Exception Handling\n\nThe following program is re-written\
    \ version of above program for exception handling. All the statements to be monitored\
    \ for exception are enclosed within ‘try’ block which is succeeded by ‘except’\
    \ block. If the exception is raised in ‘try’ then it will be handled in the succeeding\
    \ except block and the program execution continues normally. If the exception\
    \ is not raised in ‘try’ block then ‘except’ block is skipped and the program\
    \ execution continues normally. In either case program execution continues normally\
    \ as demonstrated in the following programs. The structure of exception handling\
    \ block is shown below:\n\n```\ntry:\n    .\n    .\nexcept ExceptionI:\n    .\n\
    \    .\nexcept ExceptionII:\n    .\n    .\nexcept ExceptionN:\n    .\n    .\n\
    else:\n    .\n    .\n```\n\n```\ntry:\n    a = 10\n    b = 0\n    c = a/b\n  \
    \  print(c)\nexcept:\n    print(\"Cannot Divide with Zero\")\nprint(\"Normal Exit\"\
    )\n\nCannot Divide with Zero\nNormal Exit\n```\n\n## else Block\n\nThe program\
    \ also can contain ‘else’ block which is executed if the exception is not raised\
    \ in the ‘try’ block as shown in the following program:\n\n```\ntry:\n    a =\
    \ 10\n    b = 5\n    c = a/b\n    print(c)\nexcept:\n    print(\"Cannot Divide\
    \ with Zero\")\nelse:\n    print(\"Division Successful\")\nprint(\"Normal Exit\"\
    )\n\n2.0\nDivision Successful\nNormal Exit\n```\n\n```\ntry:\n    a = 10\n   \
    \ b = 0\n    c = a/b\n    print(c)\nexcept:\n    print(\"Cannot Divide with Zero\"\
    )\nelse:\n    print(\"Division Successful\")\nprint(\"Normal Exit\")\n\nCannot\
    \ Divide with Zero\nNormal Exit\n```\n\n![](img/3ae455253f7d6d927ba04166a75e6b16_182_0.png)\n\
    \nHere are few important points about the above-mentioned syntax:\n\n- A single\
    \ try statement can have multiple except statements. This is useful when the try\
    \ block contains statements that may throw different types of exceptions.\n- You\
    \ can also provide a generic except clause, which handles any exception (catch\
    \ all block).\n- After the except clause(s), you can include an else-clause. The\
    \ code in the else-block executes if the code in the try: block does not raise\
    \ an exception.\n- The else-block is a good place for code that does not need\
    \ the try: block's protection.\n\n## Displaying Descriptive Error Messages\n\n\
    When an exception is raised in the program, an object of appropriate exception\
    \ type is instantiated and made available to the program. The program can access\
    \ the exception object using the following syntax:\n\n```\nexcept <exception_class>\
    \ as <instance_name>\n```\n\nIf you write the code to handle a single exception,\
    \ you can have a variable follow the name of the exception in the except statement.\
    \ If you are trapping multiple exceptions, you can have a variable follow the\
    \ tuple of the exception.\n\nThis variable receives the value of the exception\
    \ mostly containing the cause of the exception. The variable can receive a single\
    \ value or multiple values in the form of a tuple. This tuple usually contains\
    \ the error string, the error number, and an error location.\n\nThe exception\
    \ instance can be employed for displaying descriptive error messages as shown\
    \ in the following program:\n\n```\ntry:\n    a = 10\n    b = 0\n    c = a/b\n\
    \    print(c)\nexcept Exception as e:\n    print(\"Cannot Divide with Zero\")\n\
    \    print(e)\nprint(\"Normal Exit\")\n\nCannot Divide with Zero\ndivision by\
    \ zero\nNormal Exit\n```\n\n## Handling Multiple Errors\n\nMore than one type\
    \ of exception can be raised in a ‘try’ block and the program can contain different\
    \ except blocks for processing exception of each category as demonstrated in the\
    \ following program:\n\n```\ntry:\n    fh = open(\"nofile\", \"r\")\n    a = 10\n\
    \    b = 0\n    c = a/b\n    print(c)\nexcept Exception as e:\n    print(\"Generic\
    \ Exception\")\n    print(e)\nexcept IOError as e:\n    print(\"IO Error\")\n\
    \    print(e)\nprint(\"Normal Exit\")\n\nGeneric Exception\n[Errno 2] No such\
    \ file or directory: 'nofile'\nNormal Exit\n```\n\n```\ntry:\n    fh = open(\"\
    nofile\", \"r\")\n    a = 10\n    b = 0\n    c = a/b\n    print(c)\nexcept IOError\
    \ as e:\n    print(\"IO Error\")\n    print(e)\nexcept Exception as e:\n    print(\"\
    Generic Error\")\n    print(e)\nprint(\"Normal Exit\")\n\nIO Error\n[Errno 2]\
    \ No such file or directory: 'nofile'\nNormal Exit\n```\n\nNote: If the generic\
    \ except block, ‘Exception’ is placed at the beginning, all exceptions get processed\
    \ there and the succeeding exception blocks become unreachable.\n\n## Default\
    \ except\n\nWhen the ‘except’ is used without specifying the name of the Exception\
    \ class, it is referred to as **‘default except’**. Default **except:** block,\
    \ if present must be the last except block, otherwise the compiler error is generated\
    \ as shown in the following program:\n\n```\ntry:\n    fh = open(\"nofile\", \"\
    r\")\n    a = 10\n    b = 0\n    c = a/b\n    print(c)\nexcept:\n    print(\"\
    Cannot Divide with Zero\")\nexcept IOError as e:\n    print(\"IO Error\")\n  \
    \  print(e)\nprint(\"Normal Exit\")\n\nFile \"<ipython-input-9-28f2066a897b>\"\
    , line 6\n    print(c)\n    ^\nSyntaxError: default 'except:' must be last\n```\n\
    \nPython provides another syntax for handling multiple exceptions which is shown\
    \ below:\n\nSyntax:\n\nexcept(exception_name1, exception_name2, . . . , exception_nameN)\n\
    \nAll the anticipated exceptions can be enclosed in a pair of parentheses using\
    \ comma delimiter.\n\n```\ntry:\n    fh = open(\"nofile\", \"r\")\n    a = 10\n\
    \    b = 0\n    c = a/b\n    print(c)\nexcept(IOError, Exception) as e:\n    print(e)\n\
    print(\"Normal Exit\")\n\n[Errno 2] No such file or directory: 'nofile'\nNormal\
    \ Exit\n```\n\n```\ntry:\n    fh = open(\"nofile\", \"r\")\n    a = 10\n    b\
    \ = 0\n    c = a/b\n    print(c)\nexcept(Exception, IOError) as e:\n    print(e)\n\
    print(\"Normal Exit\")\n\n[Errno 2] No such file or directory: 'nofile'\nNormal\
    \ Exit\n```\n\nNote: The order of exceptions does not matter.\n\n## finally Demo\n\
    \n‘try’ or ‘except’ blocks can be immediately preceded by ‘finally’ block which\
    \ is guaranteed to be executed under all circumstances and includes a must execute\
    \ code. finally block is executed under the following conditions:\n\n- When exception\
    \ is not thrown\n- When exception is thrown\n- When function returns\n\nThe different\
    \ cases are depicted below:\n\n```\ndef test_finally(var):\n    try:\n       \
    \ x=int(var)\n        print(x)\n        return\n    except ValueError as Argument:\n\
    \        print(\"The argument does not contain numbers\\n\",Argument)\n    finally:\n\
    \        print(\"End of Program\")\n\ntest_finally(\"100\")\ntest_finally(\"xyz\"\
    )\n\n100\nEnd of Program\nThe argument does not contain numbers\ninvalid literal\
    \ for int() with base 10: 'xyz'\nEnd of Program\n```\n\nCase 1: No Exception is\
    \ Raised\n\n```\ntry:\n    print(\"Inside try\")\n    result=10/5\nexcept ZeroDivisionError:\n\
    \    print(\"Division By Zero\")\nexcept IOError:\n    print(\"Cannot Open File\"\
    )\nexcept NameError:\n    print(\"Variable Not Defined\")\nexcept Exception:\n\
    \    print(\"Unknown Error\")\nelse:\n    print(\"Inside else\")\nfinally:\n \
    \   print(\"Inside finally\")\nprint(\"Exiting...\")\n\nInside try\nInside else\n\
    Inside finally\nExiting...\n```\n\nCase 2: ‘Division By Zero’ Exception is thrown\
    \ in ‘try’ Block.\n\n```\ntry:\n    print(\"Inside try\")\n    result=10/0\nexcept\
    \ ZeroDivisionError:\n    print(\"Division By Zero\")\nexcept IOError:\n    print(\"\
    Cannot Open File\")\nexcept NameError:\n    print(\"Variable Not Defined\")\n\
    except Exception:\n    print(\"Unknown Error\")\nelse:\n    print(\"Inside else\"\
    )\nfinally:\n    print(\"Inside finally\")\nprint(\"Exiting...\")\n\nInside try\n\
    Division By Zero\nInside finally\nExiting...\n```"
  mdcn: "## 在 Google COLAB 中概念化 Python\n\n## 未处理的异常\n\n当程序中引发异常且程序未处理该异常时，它将被发送给系统处理，这将导致程序异常终止。程序将停止继续执行，如下列程序所示。在以下示例中，语句\
    \ 3 在尝试将数字除以零时抛出 `ZeroDivisionError`，系统不会处理该错误，最终由运行时系统处理。\n\n```\na = 10\nb =\
    \ 0\nc = a/b\nprint(c)\n\nZeroDivisionError Traceback (most recent call last)\n\
    <ipython-input-1-16fdd7ba8379> in <module>()\n     1 a = 10\n     2 b = 0\n---->\
    \ 3 c = a/b\n     4 print(c)\n\nZeroDivisionError: division by zero\n\nSEARCH\
    \ STACK OVERFLOW\n```\n\n## 异常处理\n\n以下程序是上述程序的异常处理重写版本。所有需要监控异常的语句都包含在 `try` 块中，其后是\
    \ `except` 块。如果在 `try` 块中引发异常，则它将在后续的 `except` 块中处理，程序执行将继续正常进行。如果在 `try` 块中未引发异常，则\
    \ `except` 块将被跳过，程序执行将继续正常进行。无论哪种情况，程序执行都将继续正常进行，如下列程序所示。异常处理块的结构如下所示：\n\n```\n\
    try:\n    .\n    .\nexcept ExceptionI:\n    .\n    .\nexcept ExceptionII:\n  \
    \  .\n    .\nexcept ExceptionN:\n    .\n    .\nelse:\n    .\n    .\n```\n\n```\n\
    try:\n    a = 10\n    b = 0\n    c = a/b\n    print(c)\nexcept:\n    print(\"\
    Cannot Divide with Zero\")\nprint(\"Normal Exit\")\n\nCannot Divide with Zero\n\
    Normal Exit\n```\n\n## else 块\n\n程序也可以包含 `else` 块，如果在 `try` 块中未引发异常，则执行该块，如下列程序所示：\n\
    \n```\ntry:\n    a = 10\n    b = 5\n    c = a/b\n    print(c)\nexcept:\n    print(\"\
    Cannot Divide with Zero\")\nelse:\n    print(\"Division Successful\")\nprint(\"\
    Normal Exit\")\n\n2.0\nDivision Successful\nNormal Exit\n```\n\n```\ntry:\n  \
    \  a = 10\n    b = 0\n    c = a/b\n    print(c)\nexcept:\n    print(\"Cannot Divide\
    \ with Zero\")\nelse:\n    print(\"Division Successful\")\nprint(\"Normal Exit\"\
    )\n\nCannot Divide with Zero\nNormal Exit\n```\n\n![](img/3ae455253f7d6d927ba04166a75e6b16_182_0.png)\n\
    \n关于上述语法，有几点重要说明：\n\n-   单个 `try` 语句可以有多个 `except` 语句。当 `try` 块包含可能抛出不同类型异常的语句时，这很有用。\n\
    -   你也可以提供一个通用的 `except` 子句，它处理任何异常（捕获所有块）。\n-   在 `except` 子句之后，你可以包含一个 `else`\
    \ 子句。如果 `try:` 块中的代码没有引发异常，则执行 `else` 块中的代码。\n-   `else` 块是放置不需要 `try:` 块保护的代码的好地方。\n\
    \n## 显示描述性错误消息\n\n当程序中引发异常时，会实例化一个适当异常类型的对象并使其可供程序使用。程序可以使用以下语法访问异常对象：\n\n```\n\
    except <exception_class> as <instance_name>\n```\n\n如果你编写代码来处理单个异常，可以在 `except`\
    \ 语句中的异常名称后跟一个变量。如果你捕获多个异常，可以在异常元组后跟一个变量。\n\n此变量接收异常的值，主要包含异常的原因。该变量可以接收单个值或多个值（以元组形式）。此元组通常包含错误字符串、错误编号和错误位置。\n\
    \n异常实例可用于显示描述性错误消息，如下列程序所示：\n\n```\ntry:\n    a = 10\n    b = 0\n    c = a/b\n\
    \    print(c)\nexcept Exception as e:\n    print(\"Cannot Divide with Zero\")\n\
    \    print(e)\nprint(\"Normal Exit\")\n\nCannot Divide with Zero\ndivision by\
    \ zero\nNormal Exit\n```\n\n## 处理多种错误\n\n在 `try` 块中可以引发多种类型的异常，程序可以包含不同的 `except`\
    \ 块来处理每种类别的异常，如下列程序所示：\n\n```\ntry:\n    fh = open(\"nofile\", \"r\")\n    a =\
    \ 10\n    b = 0\n    c = a/b\n    print(c)\nexcept Exception as e:\n    print(\"\
    Generic Exception\")\n    print(e)\nexcept IOError as e:\n    print(\"IO Error\"\
    )\n    print(e)\nprint(\"Normal Exit\")\n\nGeneric Exception\n[Errno 2] No such\
    \ file or directory: 'nofile'\nNormal Exit\n```\n\n```\ntry:\n    fh = open(\"\
    nofile\", \"r\")\n    a = 10\n    b = 0\n    c = a/b\n    print(c)\nexcept IOError\
    \ as e:\n    print(\"IO Error\")\n    print(e)\nexcept Exception as e:\n    print(\"\
    Generic Error\")\n    print(e)\nprint(\"Normal Exit\")\n\nIO Error\n[Errno 2]\
    \ No such file or directory: 'nofile'\nNormal Exit\n```\n\n注意：如果将通用 `except` 块\
    \ `Exception` 放在开头，所有异常都会在那里被处理，后续的异常块将变得不可达。\n\n## 默认 except\n\n当 `except` 未指定异常类的名称时，它被称为\
    \ **“默认 except”**。默认的 `except:` 块（如果存在）必须是最后一个 `except` 块，否则将产生编译器错误，如下列程序所示：\n\
