    # What is LaTeX?


    LaTeX is a document preparation system and document markup language. LaTeX is
    not the name of a particular editing program, but refers to the encoding or tagging
    conventions that are used in LaTeX documents.


    | LaTeX math constructs | | |

    |---|---|---|

    | $\frac{abc}{xyz}$ \frac{abc}{xyz} | $\overline{abc}$ \overline{abc} | $\overrightarrow{abc}$
    \overrightarrow{abc} |

    | $f''$ f'' | $\underline{abc}$ \underline{abc} | $\overleftarrow{abc}$ \overleftarrow{abc}
    |

    | $\sqrt{abc}$ \sqrt{abc} | $\widehat{abc}$ \widehat{abc} | $\overbrace{abc}$
    \overbrace{abc} |

    | $\sqrt[n]{abc}$ \sqrt[n]{abc} | $\widetilde{abc}$ \widetilde{abc} | $\underbrace{abc}$
    \underbrace{abc} |


