    \n## Operator Overloading\n\nOperator Overloading means giving extended meaning\
    \ beyond their predefined operational meaning. For example operator + is used\
    \ to add two integers as well as join two strings and merge two lists. It is achievable\
    \ because ‘+’ operator is overloaded by int class and str class. The same built-in\
    \ operator or function shows different behavior for objects of different classes,\
    \ this is referred to as *Operator Overloading*.\n\n## Python magic methods or\
    \ special functions for operator overloading\n\n## How to overload the operators\
    \ in Python?\n\nWe can overload all existing operators but we can’t create a new\
    \ operator. To perform operator overloading, Python provides some special function\
    \ or magic function that is automatically invoked when it is associated with that\
    \ particular operator. For example, when we use + operator, the magic method __add__\
    \ is automatically invoked in which the operation for + operator is defined.\n\
    \nThe following table depicts the operators that can be overloaded along with\
    \ magic methods.\n\n| Operator | Magic Method |\n| :--- | :--- |\n| + | `__add__(self,\
    \ other)` |\n| - | `__sub__(self, other)` |\n| * | `__mul__(self, other)` |\n\
    | / | `__truediv__(self, other)` |\n| // | `__floordiv__(self, other)` |\n| %\
    \ | `__mod__(self, other)` |\n| ** | `__pow__(self, other)` |\n| >> | `__rshift__(self,\
    \ other)` |\n| << | `__lshift__(self, other)` |\n| & | `__and__(self, other)`\
    \ |\n| \\| | `__or__(self, other)` |\n| ^ | `__xor__(self, other)` |\n\n### Comparison\
    \ Operators :\n\n| Operator | Magic Method |\n| :--- | :--- |\n| < | `__lt__(self,\
    \ other)` |\n| > | `__gt__(self, other)` |\n| <= | `__le__(self, other)` |\n|\
    \ >= | `__ge__(self, other)` |\n| == | `__eq__(self, other)` |\n| != | `__ne__(self,\
    \ other)` |\n\n### Assignment Operators :\n\n| Operator | Magic Method |\n| :---\
    \ | :--- |\n| -= | `__isub__(self, other)` |\n| += | `__iadd__(self, other)` |\n\
    | *= | `__imul__(self, other)` |\n| /= | `__idiv__(self, other)` |\n| //= | `__ifloordiv__(self,\
    \ other)` |\n| %= | `__imod__(self, other)` |\n| **= | `__ipow__(self, other)`\
    \ |\n| >>= | `__irshift__(self, other)` |\n| <<= | `__ilshift__(self, other)`\
    \ |\n| &= | `__iand__(self, other)` |\n| \\|= | `__ior__(self, other)` |\n| ^=\
    \ | `__ixor__(self, other)` |\n\n### Unary Operators :\n\n| Operator | Magic Method\
    \ |\n| :--- | :--- |\n| - | `__neg__(self)` |\n| + | `__pos__(self)` |\n| ~ |\
    \ `__invert__(self)` |\n\n## Overloading binary + operator in Vector Class\n\n\
    When we use an operator on user defined data types then automatically a special\
    \ function or magic function associated with that operator is invoked. Changing\
    \ the behavior of operator is as simple as changing the behavior of method or\
    \ function. You define methods in your class and operators work according to that\
    \ behavior defined in methods. When we use + operator, the magic method __add__\
    \ is automatically invoked in which the operation for + operator is defined. There\
    \ by changing this magic method’s code, we can give extra meaning to the + operator.\
    \ In the following example, the __add__() method is overloaded in ‘Vector’ class\
    \ for defining addition operation on two vector class objects."
