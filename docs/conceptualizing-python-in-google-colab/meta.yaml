    ```\n\n## id、value 和 hash 之间的区别\n\n## 对象 id\n\n如果两个不同的引用指向同一个对象，那么它们的‘id’是相同的。‘is’运算符比较两个操作数的‘id’。因此，`obj1\
    \ is obj2` 等价于 `id(obj1) == id(obj2)`。这在下面的程序中得到了演示：\n\n```python\nlist1 = [1,2,3]\n\
    list2 = [1,2,3]\nlist3 = list1\nprint()\nif (id(list1)==id(list2)):\n    print(\"\
    list1 and list2 refer same objects\")\nelse:\n    print(\"list1 and list2 do not\
    \ refer same objects\")\n\nif (id(list1)==id(list3)):\n    print(\"list1 and list3\
    \ refer same objects\")\nelse:\n    print(\"list1 and list3 do not refer same\
    \ objects\")\n```\n\n```\nlist1 and list2 do not refer same objects\nlist1 and\
    \ list3 refer same objects\n```\n\n值指的是通过 `==` 运算符比较的对象内容。如果类重写了 `__eq__()` 方法，那么当使用\
    \ `==` 运算符时会调用 `__eq__()` 方法。如果类没有重写 `__eq__()` 方法，那么会调用从 object 类继承的方法，其中实例将仅通过它们的标识进行比较。\n\
    \n```python\nlist1 = [1,2,3]\nlist2 = [1,2,3]\nlist3 = list1\nprint()\nif (list1.__eq__(list2)):\n\
    \    print(\"list1 and list2 have same content\")\nelse:\n    print(\"list1 and\
    \ list2 do not have same content\")\n\nif (list1.__eq__(list3)):\n    print(\"\
    list1 and list3 have same content\")\nelse:\n    print(\"list1 and list3 do not\
    \ have same content\")\n```\n\n```\nlist1 and list2 have same content\nlist1 and\
    \ list3 have same content\n```\n\n某些对象以哈希值为特征，这意味着它们可以用作字典中的键。这类对象的特征是，它们的值在对象的生命周期内保持不变，因此对象必须是不可变的。\n\
    \n**注意：** 如果你在自定义类中编写了 `__eq__` 方法，Python 将禁用此默认哈希实现，因为你的 `__eq__` 函数将为其实例定义新的值含义。如果你希望你的类仍然是可哈希的，你还需要编写一个\
    \ `__hash__` 方法。如果你继承自一个可哈希的类但自己不想是可哈希的，你可以在类体中设置 `__hash__ = None`。\n\n如果两个对象具有相同的内容，`__hash__()`\
    \ 函数、`value()` 函数和相等运算符（`==`）返回 `True`，否则返回 `False`。相反，如果两个对象相同，`id()` 函数和‘is’运算符返回\
    \ `True`，否则返回 `False`。\n\n## 删除元组\n\n元组不支持删除单个元素。这样做会产生‘TypeError’，如下面的程序所示。\n\
