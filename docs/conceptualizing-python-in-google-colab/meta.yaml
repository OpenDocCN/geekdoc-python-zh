    \ a ‘Person’ object with name=’xyz’ and age=20.\n\n### Method 2: Using one argument\
    \ constructor\n\np1 = Person(name=\"Jack\")\n\nThe above statement creates a ‘Person’\
    \ object with name=’Jack’ and age=20.\n\np1 = Person(age=30)\n\nThe above statement\
    \ creates a ‘Person’ object with name=’xyz’ and age=30.\n\n### Method 3: Using\
    \ two argument constructor\n\np1 = Person(name=\"John\",36)\n\nThe above statement\
    \ creates a ‘Person’ object with name=’John’ and age=36.\n\n```\nclass Person:\n\
    \    def __init__(self,name=\"xyz\",age=20):\n        self.name = name\n     \
    \   self.age = age\n\np1 = Person(\"John\", 36)\nprint(p1.name)\nprint(p1.age)\n\
    \np1 = Person(name=\"Jack\")\nprint(p1.name)\nprint(p1.age)\n\np1 = Person()\n\
    print(p1.name)\nprint(p1.age)\n\nJohn\n36\nJack\n20\nxyz\n20\n```\n\nConstructor\
    \ with Default Arguments\n\nIn the following program, the constructor of class\
    \ ‘one’ takes two parameters ‘a’ and ‘b’ with the default values of 1 and 2, respectively.\n\
    \n```\nclass one:\n    def __init__(self,a=1,b=2):\n        print(a+b)\no=one(2)\n\
    o1=one(2,3)\no2=one()\n\n4\n5\n3\n```\n\n## Destroying Objects (Garbage Collection)\n\
    \nThe memory management in Python is automatic. Python deletes unneeded objects\
    \ (built-in types or class instances) automatically to free the memory space.\
    \ The process by which Python periodically reclaims blocks of memory that no longer\
    \ are in use is termed Garbage Collection.\n\nPython employs reference counting\
    \ mechanism to figure out unneeded objects. Python's garbage collector runs during\
    \ program execution and is triggered when an object's reference count reaches\
    \ zero. An object's reference count changes as the number of aliases that point\
    \ to it changes. An unreferenced object is referred to as ‘garbage’.\n\nAn object's\
    \ reference count increases when it is assigned a new name or placed in a container\
    \ (list, tuple, or dictionary). The object's reference count decreases when it's\
    \ deleted with *del*, its reference is reassigned, or its reference goes out of\
    \ scope. When an object's reference count reaches zero, Python collects it automatically.\n\
    \nYou normally will not notice when the garbage collector destroys an orphaned\
