    在主程序中，定义了一个列表，该列表作为参数传递给生成器函数 `even_filter`，以从列表中提取所有偶数。`even_filter` 生成器函数的输出成为\
    \ `multiply_by_three` 生成器函数的输入，该函数将每个元素乘以 3，然后作为输入传递给第三个生成器函数，该函数显示每个数字并在其前面加上字符串\
    \ ‘The Number: ‘。整个生成器管道如下图所示：\n\n![](img/3ae455253f7d6d927ba04166a75e6b16_174_0.png)\n\
    \n以下示例演示了生成器管道的另一个实例。生成器函数 *pass_filter()* 接受一个分数列表，并仅产出分数大于等于 40 的值。*pass_filter()*\
    \ 生成器的输出作为输入传递给 *add_bonus()* 生成器函数，该函数为每个及格的学生增加 10 分奖励分。接下来，‘*for*’ 循环遍历列表并打印元素。\n\
