    <ipython-input-16-3adf4f94e366> in <module>()\n      1 t=(10, 20.30, \"Python\"\
    , 'c', 23)\n      2 print(t)\n----> 3 t[2]=\"Java\"\n      4 print(t)\n\nTypeError:\
    \ 'tuple' object does not support item assignment\n\nSEARCH STACK OVERFLOW\n```\n\
    \n然而，元组连接是明确定义的，两个元组的连接会生成一个新的元组，如下例程序所示。在下面的程序中，元组 `t` 与元组 `(6, 7)` 连接，生成了一个新的元组，这可以从其\
    \ `id` 得到确认。\n\n```python\nt=(1,2,3,4,5)\nprint(t)\nprint(id(t))\nt=t+(6,7)\n\
    print(id(t))\nprint(t)\n```\n\n```\n(1, 2, 3, 4, 5)\n140081540476176\n140081478906800\n\
    (1, 2, 3, 4, 5, 6, 7)\n```\n\n## 在 Google COLAB 中理解 Python\n\n## 元组打包与解包\n\n##\
    \ 元组打包\n\n元组打包是指在单个语句中为元组的不同元素赋值。元组打包的语法如下所示：\n\n## 语法：\n\n```python\nvar = (ele1,\
    \ ele2, . . . . , eleN)\n```\n\n执行上述语句后，元组的元素被赋值给 `var`，可以使用索引访问，如下所示：\n\n```python\n\
    var[0]=ele1\nvar[1]=ele2\n.\n.\n.\nvar[n-1]=eleN\n```\n\n```python\nvar1, var2,\
    \ var3, . . . ,varN = value1, value2, value3, . . . ,valueN.\n```\n\n变量和值之间存在一一对应的关系。在上面的语法中，`var1`、`var2`\
    \ 等分别被初始化为 `value1`、`value2` 等。\n为了使元组打包正常工作，表达式右侧指定的值的数量必须与表达式左侧的值的数量完全相等。\n\n\
    ```python\nstud_info=(1,\"Maya\",\"A\")\nprint(\"Roll no   :\",stud_info[0])\n\
    print(\"Name      :\",stud_info[1])\nprint(\"Division  :\",stud_info[2])\n```\n\
    \n```\nRoll no   : 1\nName      : Maya\nDivision  : A\n```\n\n## 在 Google COLAB\
    \ 中理解 Python\n\n## 元组解包\n\n元组解包与元组打包正好相反，其中变量列表使用元组的元素进行初始化。\n\n```python\nx,\
    \ y, z=10, 20, 30\nprint(x)\nprint(y)\nprint(z)\n```\n\n```\n10\n20\n30\n```\n\
    \n如果变量的数量少于值的数量，会生成 `ValueError`，并显示消息 `too many values to unpack`，如下图所示：\n\n\
    ```python\nx, y, z=10, 20, 30, 40, 50\nprint(x)\nprint(y)\nprint(z)\n```\n\n```\n\
    ---------------------------------------------------------------------------\n\
