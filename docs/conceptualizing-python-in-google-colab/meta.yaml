- md: "## Conceptualizing Python in Google COLAB\n\n## Chapter 2\n\nLab Assignments\
    \ on Python Language Fundamentals\n\nLevel – Basic\n\n## Python Variables\n\n\
    Python variables are case-sensitive. In the following program, ‘course’ and ‘Course’\
    \ are treated as two distinct variables as demonstrated in the following program:\n\
    \n```\ncourse=\"MCA\"\nCourse=\"MSc\"\nprint(course)\nprint(Course)\n\nMCA\nMSc\n\
    ```\n\n## Checking Variable Type\n\nPython is dynamically typed language. The\
    \ type of the variable is decided at runtime based on the type of the value assigned\
    \ to it. In the following program, the variable ‘x’ is initialized with the value\
    \ 10, and hence ‘x’ is of type ‘int’. In the subsequent statement, the value of\
    \ ‘x’ is changed to ‘CSIBER’ which changes the type of ‘x’ from ‘int’ to ‘str’\
    \ as demonstrated in the following program:\n\n```\nx=10\nprint(type(x))\nx=\"\
    CSIBER\"\nprint(type(x))\n\n<class 'int'>\n<class 'str'>\n```\n\n## Size of Identifier\
    \ in Python\n\nThe maximum possible length of an identifier is not defined in\
    \ the python language. It can be of any number.\n\n## Determining the size of\
    \ Variable in Python\n\nIn Python `int` is a full-fledged object which involves\
    \ an extra overhead which stores reference count, object type among others. In\
    \ the following figure, size of int class and instance of int class is displayed.\n\
    \n```\nimport sys\nprint(sys.getsizeof(int))\nprint(sys.getsizeof(int()))\n\n\
    400\n24\n```\n\nAs shown in the following figure, the size of `int` data type\
