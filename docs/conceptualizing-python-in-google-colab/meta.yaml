    \ objects are characterized by the fact that their value remains same for the\
    \ life time of the object and as such the objects must be immutable.\n\n**Note:**\
    \ If you write an `__eq__` method in a custom class, Python will disable this\
    \ default hash implementation, since your `__eq__` function will define a new\
    \ meaning of value for its instances. You'll need to write a `__hash__` method\
    \ as well, if you want your class to still be hashable. If you inherit from a\
    \ hashable class but don't want to be hashable yourself, you can set `__hash__\
    \ = None` in the class body.\n\n`__hash__()` function, value() function and equality\
    \ operator (==) return True, if the two objects have the same content, else return\
    \ False.\nOn the contrary, id() function and ‘is’ operator return True, if the\
