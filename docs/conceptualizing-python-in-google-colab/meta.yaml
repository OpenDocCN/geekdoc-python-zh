    \            r.dr=-r.dr\n        print(\"After Standardization : \",self)\n  \
    \      print(\"After Standardization : \",r)\n\nr1 = Rational(2,-3)\nr2 = Rational(-4,-5)\n\
    r1>r2\n```\n\nAfter Standardization : -2/3\nAfter Standardization : 4/5\n\n# Normalizing\
    \ Rational No.s\n\nThe following code depicts the normalization of two rational\
    \ no.s having different denominators. If nr1 and dr1 are numerator and denominator\
    \ of first rational no. and nr2 and dr2 are numerator and denominator of second\
    \ rational no. and if dr1 is not equal to dr2, then both numerator and denominator\
    \ of first rational no. are multiplied by dr2 and both numerator and denominator\
    \ of second rational no. are multiplied by dr1. Hence the first rational no. is\n\
    \n$\\frac{nr1 * dr2}{dr1 * dr2}$"
