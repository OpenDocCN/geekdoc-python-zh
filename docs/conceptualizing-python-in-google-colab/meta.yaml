    <marquee style=''width: 50%; color: Green;''>Welcome to CSIBER!</marquee>


    Welcome to CSIBER!

    ```


    To get a complete list of supported magics, execute the following command –


    ```

    %lsmagic

    ```


    ```

    %lsmagic


    Available line magics:

    %alias %alias_magic %autocall %automagic %autosave %bookmark %cat %cd %clear %colors
    %config %connect_info %cp %debug


    Available cell magics:

    %%! %%HTML %%SVG %%bash %%bigquery %%capture %%debug %%file %%html %%javascript
    %%js %%latex %%perl %%prun %%pypy


    Automagic is ON, % prefix IS NOT needed for line magics.

    ```


