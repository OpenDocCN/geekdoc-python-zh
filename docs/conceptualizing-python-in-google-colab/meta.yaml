    # Dictionary in Python


    Dictionaries are enclosed by curly braces ({ }) and values can be assigned and
    accessed using square braces ([]). They are similar to the hash tables containing
    key/value pairs. A dictionary key can be almost any Python type, but are usually
    numbers or strings. Values, on the other hand, can be any arbitrary Python object.


    # Operations on Dictionary


    # Accessing Keys of a Dictionary


    ‘dict’ class supports the methods keys() and values() which return a tuple containing
    list of keys and a tuple containing list of values in a dictionary as shown in
    the following program:


    ```

    dict={}

    dict["course"]="M.Sc"

    dict[2]="Two"

    print(dict)

    print(dict["course"])

    print(dict[2])

    print(dict.keys())

    print(dict.values())


    {''course'': ''M.Sc'', 2: ''Two''}

    M.Sc

    Two

    dict_keys([''course'', 2])

    dict_values([''M.Sc'', ''Two''])

    ```'
