    \   4 print(z)\n      5\n\nValueError: not enough values to unpack (expected 3,\
    \ got 2)\n\nSEARCH STACK OVERFLOW\n```\n\n在下面的程序中，`stud_info` 是一个包含学生学号、姓名和班级信息的元组。该元组被解包，以便在三个不同的变量中提取学号、姓名和班级。\n\
    \n```python\nstud_info=(1,\"Maya\",\"A\")\nrollno,name,division=stud_info\nprint(\"\
