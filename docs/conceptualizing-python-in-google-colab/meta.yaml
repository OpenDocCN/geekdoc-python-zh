    # Python Identity Operator (is)


    Identity operators compare the memory locations of two objects. There are two
    Identity operators explained below –


    | Operator | Description | Example |

    | :--- | :--- | :--- |

    | is | Evaluates to true if the variables on either side of the operator point
    to the same object and false otherwise. | x is y, here **is** results in 1 if
    id(x) equals id(y). |

    | is not | Evaluates to false if the variables on either side of the operator
    point to the same object and true otherwise. | x is not y, here **is not** results
    in 1 if id(x) is not equal to id(y). |


    In the following program, ‘x’ and ‘y’ are two distinct list objects while ‘x’
    and ‘z’ are two distinct references pointing to the same list object. Hence all
    the three x, y and z have the same content and == operator used on them evaluates
    to ‘True’. While the ‘is’ operator used with the operands ‘x’ and ‘y’ evaluates
    to ‘False’. Hence == operator checks the content of the two operands passed to
    it while ‘is’ operator checks the objects referenced by the object variables.


    ```

    x = ["apple", "banana"]

    y = ["apple", "banana"]

    z = x

    print(x is z)

    print(x is y)

    print(x == z)

    print(x == z)


    True

    False

    True

    True

    ```'
