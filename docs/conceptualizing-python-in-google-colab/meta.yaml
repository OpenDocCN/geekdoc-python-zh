    \ for displaying the total count of employees and employee information.\n\n```\n\
    class Employee:\n    'Common base class for all employees'\n    empCount = 0\n\
    \n    def __init__(self, name, salary):\n        self.name = name\n        self.salary\
    \ = salary\n        Employee.empCount += 1\n\n    def displayCount(self):\n  \
