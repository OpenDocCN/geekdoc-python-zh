  md: '# Conceptualizing Python in Google COLAB


    +   - Free GPU acceleration

    - Pre-installed libraries: All major Python libraries like TensorFlow, Scikit-learn,
    Matplotlib among many others are pre-installed and ready to be imported.

    - Built on top of Jupyter Notebook

    - Collaboration feature (works with a team just like Google Docs): Google Colab
    allows developers to use and share Jupyter notebook among each other without having
    to download, install, or run anything other than a browser. Notebooks can be shared
    among team members.

    - Supports bash commands

    - Google Colab notebooks are stored on the drive


    # What COLAB Offers You?


    As a programmer, you can perform the following using Google Colab.


    +   - Write and execute code in Python

    - Document your code that supports mathematical equations

    - Create/Upload/Share notebooks

    - Import/Save notebooks from/to Google Drive

    - Import/Publish notebooks from GitHub

    - Import external datasets e.g. from Kaggle

    - Integrate PyTorch, TensorFlow, Keras, OpenCV

    - Free Cloud service with free GPU


    # Getting Started with COLAB


    To start working with Colab you first need to log in to your Google account, then
    go to this link [https://colab.research.google.com](https://colab.research.google.com).


    Since Colab implicitly uses Google Drive for storing your notebooks, ensure that
    you are logged in to your Google Drive account before proceeding further.'
