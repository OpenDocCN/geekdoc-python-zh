    \n![](img/3ae455253f7d6d927ba04166a75e6b16_274_0.png)\n\n## 类继承\n\n继承有助于代码重用。如果两个类具有共同特征，那么无需从头开始创建类，而是可以从另一个类简单地继承。新类继承自的类称为\
