  md: '# Conceptualizing Python in Google COLAB


    # Access Modifiers in Python : Public, Private and Protected


    Various object-oriented languages like C++, Java, Python controls access modifications
    which are used to restrict access to the variables and methods of the class. Most
    programming languages has three forms of access modifiers, which are **Public**,
    **Protected** and **Private** in a class. Python uses ‘_’ symbol to determine
    the access control for a specific data member or a member function of a class.
    Access specifiers in Python have an important role to play in securing data from
    unauthorized access and in preventing it from being exploited.


    A Class in Python has three types of access modifiers –


    +   - Public Access Modifier

    - Protected Access Modifier

    - Private Access Modifier


    # Public Access Modifier:


    The members of a class that are declared public are easily accessible from any
    part of the program. All data members and member functions of a class are public
    by default.


    # A Program to Illustrate Public Access Modifier in a Class'
