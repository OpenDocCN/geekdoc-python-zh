    The relationship between the positive and negative indexing is given by:


    l[n]=l[n-s]


    where s is the size of the list.


    For retrieving the elements from the index position ‘i’ to ‘j’ in a list ‘list1’
    using positive indexing, use the following syntax:


    **list1[ i : j+1]**


    For retrieving the elements from the index position ‘i’ to ‘j’ in a list ‘list1’
    using negative indexing, use the following syntax:


    **list1[ i - s : j + 1 - s]**


    where, s is the size of the list.


