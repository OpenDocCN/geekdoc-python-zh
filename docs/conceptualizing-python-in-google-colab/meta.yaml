  md: "# Conceptualizing Python in Google COLAB\n\n# Polymorphism in Python\n\nPolymorphic\
    \ functions in an object oriented programming language enable same method call\
    \ responding differently based on the context and how the reference is initialized.\
    \ The same method call attains different forms.\n\nThe basic form of polymorphism\
    \ is achieved through function overloading. In Python function overloading can\
    \ be simulated through default parameters. In the following example, the add()\
    \ method accepts three parameters. The first two parameters are the required parameters\
    \ and the last parameter is a default parameter. The add() function can thus be\
    \ invoked with two and three parameters as demonstrated in the following program:\n\
    \n```\ndef add(x, y, z = 0):\n    return x + y+z\n\n# Driver code\nprint(add(2,\
    \ 3))\nprint(add(2, 3, 4))\n\n5\n9\n```\n\n# Example of inbuilt polymorphic functions\
    \ :\n\nIn the following example, the built-in function len() is used for finding\
    \ both the length of a string and a length of a list. Hence, len() is a polymorphic\
    \ function.\n\n```\n# len() function is used for finding the legth of a string\n\
    print(len(\"Python Programming\"))\n\n# len() function is used for finding the\
