    # Operator Overloading


    Operator Overloading means giving extended meaning beyond their predefined operational
    meaning. For example operator + is used to add two integers as well as join two
    strings and merge two lists. It is achievable because ‘+’ operator is overloaded
    by int class and str class. The same built-in operator or function shows different
    behavior for objects of different classes, this is referred to as *Operator Overloading*.


    # Python magic methods or special functions for operator overloading


    # How to overload the operators in Python?


    We can overload all existing operators but we can’t create a new operator. To
    perform operator overloading, Python provides some special function or magic function
    that is automatically invoked when it is associated with that particular operator.
    For example, when we use + operator, the magic method __add__ is automatically
    invoked in which the operation for + operator is defined.


    The following table depicts the operators that can be overloaded along with magic
    methods.'
