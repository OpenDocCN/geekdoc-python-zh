    \nThe *update()* method can be used for updating a dictionary based on the contents\
    \ of another dictionary passed to it as an argument.\n\n```\nstudents={\"rollno\"\
    :1,\"name\":\"Maya\",\"division\":\"A\"}\nstudent2={\"rollno\":2,\"name\":\"Milan\"\
    , \"division\":\"B\"}\nstudents.update(student2)\nprint(students)\n\n{'rollno':\
    \ 2, 'name': 'Milan', 'division': 'B'}\n```\n\nIf the key is already present in\
    \ the dictionary, the corresponding value is updated, otherwise a new key/value\
    \ pair is added to the dictionary as shown below:\n\n```\nstudents={\"rollno\"\
    :1,\"name\":\"Maya\"}\nstudents1={\"rollno\":2,\"division\":\"A\"}\nprint(\"Before\
    \ Updation : \",students)\nstudents.update(students1)\nprint(\"After Updation\
    \ : \",students)\n\nBefore Updation :  {'rollno': 1, 'name': 'Maya'}\nAfter Updation\
    \ :  {'rollno': 2, 'name': 'Maya', 'division': 'A'}\n```\n\n## Membership Testing\
    \ in Dictionary\n\nThe ‘in’ operator is used for testing the existence of a key\
    \ in a dictionary as demonstrated in the following program:\n\n```\nstudent={\"\
    rollno\":1,\"name\":\"Maya\",\"division\":\"A\"}\nif (\"division\" in student):\n\
    \    print(student[\"division\"])\nelse:\n    print(\"Key does not exist\")\n\n\
    A\n```\n\n## Deleting Elements of Dictionary\n\n### Method 1: Using pop() method\n\
