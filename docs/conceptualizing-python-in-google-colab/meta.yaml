    # Basic File Operations


    # Opening the File for IO


    Before you can read or write a file, you have to open it using Python''s built-in
    **open()** function. This function creates a file object, which would be utilized
    to call other support methods associated with it. The syntax of open() function
    is shown below:


    ```

    file_object = open(file_name,[,access_mode],[,buffering])

    ```


    The meaning of different parameters is depicted in the following table:'
  merge: -1
  pgno: 211
- img_proc: true
  md: '# Conceptualizing Python in Google COLAB


    | Parameter | Meaning |

    | :--- | :--- |

    | file_name | A string value containing the name of the file to be accessed. |

    | access_mode | It determines the mode in which the file needs to be opened which
    depends on the type of operation to be performed on a file. This is optional parameter
    and the default file access mode is read (r). |

    | buffering | It can take positive, negative or zero values. The default is negative
    which refers to the system default. If the buffering value is set to 0, no buffering
    takes place. If the buffering value is 1, line buffering is performed while accessing
    a file. If you specify the buffering value as an integer greater than 1, then
    buffering action is performed with the indicated buffer size. |


    # File Access Modes


    Here is a list of the different modes of opening a file –


    | Sr.No. | Modes & Description |

    | :--- | :--- |

    | 1 | **r**<br>Opens a file for reading only. The file pointer is placed at the
    beginning of the file. This is the default mode. |

    | 2 | **rb**<br>Opens a file for reading only in binary format. The file pointer
    is placed at the beginning of the file. This is the default mode. |

    | 3 | **r+**<br>Opens a file for both reading and writing. The file pointer placed
    at the beginning of the file. |

    | 4 | **rb+**<br>Opens a file for both reading and writing in binary format. The
    file pointer placed at the beginning of the file. |'
