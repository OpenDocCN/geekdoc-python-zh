    \ argument: 'age'\n\nSEARCH STACK OVERFLOW\n```\n\n## 默认参数\n\n构造函数可以接受默认参数。构造函数重载可以使用构造函数中的默认参数来模拟，如下列程序所示。在下面的示例中，‘Person’\
    \ 类有一个双参数构造函数，用于初始化 ‘name’ 和 ‘age’ 数据成员，它提供了三种不同的方式来创建 ‘Person’ 类的对象，如下所述：\n\n\
    ### 方法 1：使用默认构造函数\n\n**p1 = Person()**\n上面的语句创建一个 ‘Person’ 对象，其中 name=’xyz’ 且\
    \ age=20。\n\n### 方法 2：使用单参数构造函数\n\np1 = Person(name=\"Jack\")\n\n上面的语句创建一个 ‘Person’\
    \ 对象，其中 name=’Jack’ 且 age=20。\n\np1 = Person(age=30)\n\n上面的语句创建一个 ‘Person’ 对象，其中\
    \ name=’xyz’ 且 age=30。\n\n### 方法 3：使用双参数构造函数\n\np1 = Person(name=\"John\",36)\n\
    \n上面的语句创建一个 ‘Person’ 对象，其中 name=’John’ 且 age=36。\n\n```\nclass Person:\n    def\
    \ __init__(self,name=\"xyz\",age=20):\n        self.name = name\n        self.age\
    \ = age\n\np1 = Person(\"John\", 36)\nprint(p1.name)\nprint(p1.age)\n\np1 = Person(name=\"\
    Jack\")\nprint(p1.name)\nprint(p1.age)\n\np1 = Person()\nprint(p1.name)\nprint(p1.age)\n\
    \nJohn\n36\nJack\n20\nxyz\n20\n```\n\n带默认参数的构造函数\n\n在下面的程序中，类 ‘one’ 的构造函数接受两个参数\
    \ ‘a’ 和 ‘b’，其默认值分别为 1 和 2。\n\n```\nclass one:\n    def __init__(self,a=1,b=2):\n\
    \        print(a+b)\no=one(2)\no1=one(2,3)\no2=one()\n\n4\n5\n3\n```\n\n## 销毁对象（垃圾回收）\n\
    \nPython 中的内存管理是自动的。Python 会自动删除不需要的对象（内置类型或类实例）以释放内存空间。Python 定期回收不再使用的内存块的过程称为垃圾回收。\n\
    \nPython 采用引用计数机制来识别不需要的对象。Python 的垃圾收集器在程序执行期间运行，并在对象的引用计数达到零时触发。对象的引用计数会随着指向它的别名数量的变化而变化。未被引用的对象被称为‘垃圾’。\n\
    \n当一个对象被赋予新名称或放入容器（列表、元组或字典）中时，其引用计数会增加。当对象被 *del* 删除、其引用被重新赋值或其引用超出作用域时，其引用计数会减少。当对象的引用计数达到零时，Python\
    \ 会自动回收它。\n\n你通常不会注意到垃圾收集器何时销毁孤立实例并回收其空间。但一个类可以实现特殊方法 `__del__()`，称为析构函数，该方法在实例即将被销毁时被调用。此方法可用于清理实例使用的任何非内存资源。\n\
    \n在下面的程序中，‘Point’ 对象被三个引用 ‘pt1’、‘pt2’ 和 ‘pt3’ 引用。使用 ‘sys’ 类的 `getrefcount()` 方法来显示引用计数，该方法接受一个参数，即引用的名称。每次为现有对象创建新引用时，引用计数都会增加。"
