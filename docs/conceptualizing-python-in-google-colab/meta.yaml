    ```\n\n```\nTrue\nTrue\nFalse\n```\n\n## 基本重载方法\n\n下表列出了一些通用功能，你可以在自己的类中重写它们：\n\
    \n| 序号 | 方法、描述与示例调用 |\n| :--- | :--- |\n| 1 | **__init__ ( self [,args...] )**<br>构造函数（带任何可选参数）<br>示例调用：*obj\
    \ = className(args)* |\n| 2 | **__del__( self )**<br>析构函数，删除一个对象<br>示例调用：*del\
    \ obj* |\n| 3 | **__repr__( self )**<br>可求值的字符串表示<br>示例调用：*repr(obj)* |\n| 4 |\
    \ **__str__( self )**<br>可打印的字符串表示<br>示例调用：*str(obj)* |\n| 5 | **__cmp__( self,\
    \ x )**<br>对象比较<br>示例调用：*cmp(obj, x)* |\n\n## __str__ → 可打印的字符串表示\n\n当一个类的实例传递给\
    \ print() 方法时，模块和类名会与对象的哈希码一起显示，如下图所示：\n\n```python\nclass Vector:\n    def __init__(self,\
    \ a, b):\n        self.a = a\n        self.b = b\n\nv = Vector(2,10)\nprint(v)\n\
    ```\n\n```\n<__main__.Vector object at 0x7fab62177e90>\n```\n\n然而，__str__() 方法可以在类中被重写，当对象传递给\
    \ print() 方法以所需的字符串格式显示对象时，该方法将被调用。在下面的例子中，__str__() 方法在‘Vector’类中被重写，以在括号中显示向量的\
    \ x 和 y 坐标。\n\n```python\nclass Vector:\n    def __init__(self, a, b):\n     \
    \   self.a = a\n        self.b = b\n    def __str__(self):\n        return 'Vector\
    \ (%d, %d)' % (self.a, self.b)\n\nv = Vector(2,10)\nprint(v)\n```\n\n```\nVector\
    \ (2, 10)\n```\n\n在下面的例子中，__str__() 方法在‘Rational’类中被重写，以所需的格式显示有理数的分子和分母。\n\n\
    ```python\nclass Rational:\n    def __init__(self, nr, dr):\n        self.nr =\
    \ nr\n        self.dr = dr\n    def __str__(self):\n        return str(self.nr)\
    \ + \"/\" + str(self.dr)\n\nr = Rational(2,5)\nprint(r)\n```\n\n```\n2/5\n```\n\
