    \ 高阶函数\n\nPython 中的函数可以接受其他函数作为参数并返回一个函数。这样的函数被称为高阶函数。在下面的程序中，`change()` 函数接受两个参数，第一个参数是要调用的函数的名称，该函数恰好接受一个参数，第二个参数是要传递给该函数的参数。`inc()`\
    \ 和 `dec()` 是恰好接受一个参数的函数，因此可以传递给 `change()` 函数。`inc()` 函数增加传递给它的参数的值，`dec()` 函数减少传递给它的参数的值。\n\
    \n```python\ndef inc(x):\n    return x+1\n\ndef dec(x):\n    return x-1\n\ndef\
    \ change(func, x):\n    return func(x)\n\ny=change(inc,10)\nprint(y)\n\ny=change(dec,10)\n\
    print(y)\n```\n\n```\n11\n9\n```\n\n上面的程序在下面重写，其中 `inc()` 和 `dec()` 函数现在接受两个参数：原始数字和数字应增加或减少的值。\n\
    \n```python\ndef inc(x,m):\n    return x+m\n\ndef dec(x,m):\n    return x-m\n\n\
    def change(func, x,y):\n    return func(x,y)\n\ny=change(inc,10,5)\nprint(y)\n\
    \ny=change(dec,10,5)\nprint(y)\n```\n\n```\n15\n5\n```\n\n在以下示例中，`C_called()`\
    \ 是一个高阶函数，它创建并返回一个函数 `Python_returned()`。\n\n```python\ndef C_called():\n    def\
    \ Python_returned():\n        print(\"Hello from Python\")\n    return Python_returned\n\
    \nfunc=C_called()\nfunc()\n```\n\n```\nHello from Python\n```\n\n函数 `C_called()`\
    \ 可以直接调用，而无需将其分配给变量，如下面的程序所示：\n\n```python\ndef C_called():\n    def Python_returned():\n\
    \        print(\"Hello from Python\")\n    return Python_returned\n\nC_called()()\n\
    ```\n\n```\nHello from Python\n```\n\n## Python 中的装饰器\n\nPython 中的装饰器是一个函数，它接受一个函数作为其参数，添加一些功能并返回它。这也被称为“*元编程*”，因为程序的一部分试图在编译时修改程序的另一部分。在下面的程序中，***`decorated_greetings()`***\
    \ 是一个装饰器，它在调用传递给它的函数之前和之后显示一个装饰的起始行。\n\n```python\ndef decorated_greetings(func):\n\
    \    print(\"***************************\")\n    func()\n    print(\"***************************\"\
    )\n\ndef ordinary_greetings():\n    print(\"Hello from python\")\n\nordinary_greetings()\n\
    print(\"\\n\")\ndecorated_greetings(ordinary_greetings)\n```\n\n```\nHello from\
    \ python\n\n***************************\nHello from python\n***************************\n\
    ```\n\n在下面的程序中，函数 **`decorated_greetings()`** 被绑定到一个变量 `decorated`，该变量传递一个函数 **`ordinary_greetings()`**\
    \ 进行装饰。最后，调用装饰后的函数 **`decorated()`**。**`ordinary_greetings()`** 函数被装饰，返回的函数被命名为\
    \ `decorated`。\n\n```python\ndef decorated_greetings(func):\n    def inner():\n\
    \        print(\"***************************\")\n        func()\n        print(\"\
    ***************************\")\n    return inner\n\ndef ordinary_greetings():\n\
    \    print(\"Hello from python\")\n\ndecorated=decorated_greetings(ordinary_greetings)\n\
    decorated()\n```\n\n```\n***************************\nHello from python\n***************************\n\
    ```\n\n## 可调用对象\n\n函数和方法被称为可调用对象，因为它们可以被调用。\n事实上，任何实现了特殊 `__call__()` 方法的对象都被称为可调用对象。因此，在最基本的意义上，装饰器是一个返回可调用对象的可调用对象。\n\
    \n```python\ndef greetings(nm):\n    def greet():\n        print(\"Hello \"+nm)\n\
    \    return greet\n\ngreetings.__call__(\"SIBER\")\n```\n\n```\n<function __main__.greetings.<locals>.greet>\n\
    ```\n\n## 使用注解\n\n这是一个常见的构造，因此，Python 有一种语法来简化它。要装饰的函数可以用包含 `@` 符号和要传递给的装饰器函数名称的头部进行修改。\n\
    \n```python\n@decorator_func\ndef ordinary_func():\n    #函数体\n```\n\n等同于\n\n```python\n\
    decorator_func(ordinary_func)\n```\n\n在以下示例中，`ordinary_greetings()` 函数被传递给装饰器\
    \ `decorated_greetings()`。因此，在调用 `ordinary_greetings()` 函数时，会自动调用 `decorated_greetings()`\
    \ 函数，并将 `ordinary_greetings()` 函数作为其参数传递。\n\n```python\ndef decorated_greetings(func):\n\
    \    def inner():\n        print(\"***************************\")\n        func()\n\
    \        print(\"***************************\")\n    return inner\n\n@decorated_greetings\n\
    def ordinary_greetings():\n    print(\"Hello from python\")\n\nordinary_greetings()\n\
    ```\n\n```\n***************************\nHello from python\n***************************\n\
    ```\n\n装饰器也使用闭包。在以下示例中，`outer_func()` 是一个函数，它是 `test()` 函数的装饰器，接受两个参数。`outer_func()`\
    \ 定义了一个嵌套函数 `inner_func()`，它接受两个参数并打印它们。由于嵌套函数可以访问外部函数的参数，因此传递给函数 `func()` 的参数由\
    \ `inner_func()` 访问并打印。\n\n```python\ndef outer_func(func):\n    def inner_func(a,b):\n\
    \        print(a)\n        print(b)\n    return inner_func\n\n@outer_func\ndef\
    \ test(a,b):\n    print(\"Test\")\n\ntest(10,20)\n```\n\n```\n10\n20\n```\n\n\
    传递给要装饰的函数的参数数量必须与嵌套函数的参数数量完全匹配。\n\n```python\ndef outer_func(func):\n    def inner_func(a,b):\n\
    \        print(a)\n        print(b)\n    return inner_func\n\n@outer_func\ndef\
