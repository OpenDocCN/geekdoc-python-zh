    \    sum = num1 + num2\n    for x in terms:\n        sum += x\n    return sum\n\
    \nsum = add(10, 20)\nprint(\"Sum is %d\" % (sum))\n\nsum = add(10, 20, 30, 40)\n\
    print(\"Sum is %d\" % (sum))\n\nsum = add(10, 20, 30, 40, 50, 60)\nprint(\"Sum\
    \ is %d\" % (sum))\n\n# Output:\n# Sum is 30\n# Sum is 100\n# Sum is 210\n```\n\
    \n## 匿名函数或 Lambda 函数\n\n在 Python 中，匿名函数是未定义名称的函数。普通函数使用‘def’关键字定义，而匿名函数使用 lambda\
    \ 关键字定义。Lambda 函数可以接受任意数量的参数，但只能有一个表达式。定义 lambda 函数的语法如下所示：\n\n### 语法：\n\n```python\n\
    lambda <argument_list>:expression\n```\n\n### 定义 Lambda 函数的规则：\n\n设计 lambda 函数时需遵守以下规则：\n\
    \n- 使用‘lambda’关键字代替‘def’关键字来定义 lambda 函数。\n- ‘lambda’函数是匿名的，这意味着函数在没有名称的情况下定义。\n\
    - Lambda 形式可以接受任意数量的参数，但只能以表达式的形式返回一个值。它们不能包含命令或多个表达式。\n- Lambda 函数有自己的本地命名空间，无法访问其参数列表和全局命名空间中的变量以外的变量。\n\
    \n以下示例分别演示了用于计算两个数字之和、将数字加倍以及找出传递给函数的两个数字中最大值的 lambda 函数。\n\n```python\nsum=lambda\
