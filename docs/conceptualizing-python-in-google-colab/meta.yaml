    Case 2 –

    If ‘sign’ attribute of ‘Number’ object is -ve, then result is subtraction of one
    from value attribute and sign is –ve if ‘value’ attribute is non-zero else sign
    is blank .


    Case 3 –

    If value attribute of a ‘Number’ object is zero, then result is a Number object
    with value attribute equal to 1 and sign attribute equal to +ve.'
