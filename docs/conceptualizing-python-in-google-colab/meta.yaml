    | :--- | :--- |

    | 1. Google COLAB 简介 | 1 |

    | 2. Python 语言基础实验作业 | 33 |

    | 3. Python 运算符和控制语句实验作业 | 102 |

    | 4. 基本程序实验作业 | 117 |

    | 5. Python 函数实验作业 | 130 |

    | 6. Python 高级概念实验作业 - I（涵盖迭代器、闭包、装饰器和生成器） | 142 |

    | 7. Python 高级概念实验作业 - II | 157 |

    | 8. Python 异常处理实验作业 | 170 |

    | 9. Python 文件处理实验作业 | 204 |

    | 10. Python 正则表达式实验作业 | 228 |

    | 11. Python 语言基础和错误处理实验作业 | 251 |

    | 12. Python 面向对象编程实验作业 | 257 |

    | 参考文献 | 303 |

    | 附录 A - 面向对象编程案例研究 | 304 |


    # 第 1 章


    ## Google COLAB 简介


    Colaboratory，简称‘*Colab*’，是 Google Research 的产品。Colab 允许任何人通过浏览器编写和执行任意 Python
    代码，特别适合机器学习、数据分析和教育。


    如果您正在探索机器学习，但在海量数据集上进行模拟时遇到困难，或者您是渴望额外计算能力的机器学习专家，Google Colab 是您的完美解决方案。Google
    Colab 或‘*the Colaboratory*’是 Google 提供的免费云服务，旨在鼓励机器学习和人工智能研究，而学习和成功的障碍通常是需要巨大的计算能力。


    如果您想创建机器学习模型，但没有能够承担工作负载的计算机，Google Colab 就是适合您的平台。即使您有 GPU 或一台好的计算机，使用 anaconda
    创建本地环境、安装包和解决安装问题也是一件麻烦事。


    Colaboratory 是 Google 提供的免费 Jupyter 笔记本环境，您可以使用免费的 GPU 和 TPU，这可以解决所有这些问题。它包含了数据分析所需的几乎所有模块。这些工具包括但不限于
    Numpy、Scipy、Pandas 等。甚至深度学习框架，如 Tensorflow、Keras 和 Pytorch 也包含在内。


    ## COLAB 的优势


    Colab 是一个完全在云端运行的免费 Jupyter 笔记本环境。

    除了易于使用外，Colab 在配置上相当灵活，并为您完成了大部分繁重的工作。它不需要设置。


    - 支持 Python 2.7 和 Python 3.6'
