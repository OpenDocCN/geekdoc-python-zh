    # Difference Between w and w+


    ‘w’ mode creates a new file, if the specified file does not exit or truncates
    the file, if the file already exists.


    # Difference Between r and r+


    ‘r’ mode opens the file in read mode and places the file pointer at the beginning
    of the file. ‘r+’ mode opens the file for both reading and writing and does not
    truncate the contents of the file, if the file already exists.


    # Difference Between r+ and w+


    Both ‘r+’ and ‘w+’ modes open the file in read and write mode. The difference
    is that if the file already exists, ‘w+’ deletes the contents while ‘r+’ does
    not delete the contents but overwrites it.

