    ## The curly braces {...}:\n\nIt informs to repeat the preceding character (or\
    \ set of characters) for as many times as the value inside this bracket.\n\nExample\
    \ :\n\n{2} means that the preceding character is to be repeated 2 times, {min,}\
    \ means the preceding character is matches min or more times. {min, max} means\
    \ that the preceding character is repeated at least min & at most max times.\n\
    \n## Character Classes\n\nA character class matches any one of a set of characters.\
    \ It is used to match the most basic element of a language like a letter, a digit,\
    \ space, a symbol etc. The following table depicts different character classes\
    \ which can be used in a regular expression:\n\n| Character Class | Meaning |\n\
    |---|---|\n| \\s | matches any whitespace characters such as space and tab |\n\
    | \\S | matches any non-whitespace characters |\n| \\d | matches any digit character\
    \ |\n| \\D | matches any non-digit characters |\n| \\w | matches any word character\
    \ (basically alpha-numeric) |\n| \\W | matches any non-word character |\n| \\\
    b | matches any word boundary (this would include spaces, dashes, commas, semi-colons,\
    \ etc.) |\n\n## Setting Position for Match\n\n### ^ (Beginning of the String)\n\
    \nThe ^ symbol tells the computer that the match must start at the beginning of\
    \ the string or line.\nThe pattern ‘^\\d{3}’ is interpreted as exactly 3 digits\
    \ at the beginning of the string.\n\n```python\nimport re\npattern='^\\d{3}'\n\
    test_string='012Employee'\nresult=re.match(pattern,test_string)\nif result:\n\
    \    print(\"Search Successful..\")\nelse:\n    print(\"Search Unsuccessful..\"\
    )\n\nSearch Successful..\n```\n\n```python\nimport re\npattern='^\\d{3}'\ntest_string='01Employee'\n\
    result=re.match(pattern,test_string)\nif result:\n    print(\"Search Successful..\"\
