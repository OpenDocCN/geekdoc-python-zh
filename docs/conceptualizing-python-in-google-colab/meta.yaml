  md: '# Conceptualizing Python in Google COLAB


    the root partition) is associated with the root of the directory tree, i.e., that
    storage device is mounted on / (the root directory).


    +   - Let''s say you now want to access files on a CD-ROM. You must mount the
    CD-ROM on a location in the directory tree (this may be done automatically when
    you insert the CD). Let''s say the CD-ROM device is /dev/cdrom and the chosen
    mount point is /media/cdrom. The corresponding command is


    ```

    mount /dev/cdrom /media/cdrom

    ```


    +   - After that command is run, a file whose location on the CD-ROM is /dir/file
    is now accessible on your system as /media/cdrom/dir/file. When you''ve finished
    using the CD, you run the command


    ```

    umount /dev/cdrom or umount /media/cdrom

    ```


    (both will work; typical desktop environments will do this when you click on the
    ‘eject’ or ‘safely remove’ button).


    +   - Mounting applies to anything that is made accessible as files, not just
    actual storage devices. For example, all Linux systems have a special file system
    mounted under /proc. That file system (called proc) does not have underlying storage:
    the files in it give information about running processes and various other system
    information; the information is provided directly by the kernel from its in-memory
    data structures.


