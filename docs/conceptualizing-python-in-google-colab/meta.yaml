    - Text searching

    - URL matching etc.


    # ‘re’ Module in Python


    Python has a module named ‘re’ to work with RegEx. Some important functions available
    in ‘re’ module are listed below:


    # re.match() Function


    re.match() function is used to search pattern within the test_string. It accepts
    two parameters:


    +   - The first parameter is the regular expression pattern and

    - The second parameter is the string to be tested.


    The method returns a match object if the search is successful. If not, it returns
    None.


    # re.findall()


    The re.findall() method returns a list of strings containing all matches.'
