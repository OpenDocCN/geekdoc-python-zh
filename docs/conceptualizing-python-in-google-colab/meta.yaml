    ## Keras


    Keras, written in Python, runs on top of TensorFlow, CNTK, or Theano. It enables
    easy and fast prototyping of neural network applications. It supports both convolutional
    networks (CNN) and recurrent networks, and also their combinations. It seamlessly
    supports GPU.

    To install Keras, use the following command —


    ```

    !pip install -q keras

    ```


    ## PyTorch


    PyTorch is ideal for developing deep learning applications. It is an optimized
    tensor library and is GPU enabled. To install PyTorch, use the following command
    —


    ```

    !pip3 install torch torchvision

    ```


    ## Conceptualizing Python in Google COLAB


    ## MxNet


    Apache MxNet is another flexible and efficient library for deep learning. To install
    MxNet execute the following commands –


    ```

    !apt install libnvrtc8.0

    !pip install mxnet-cu80

    ```


    ## OpenCV


    OpenCV is an open source computer vision library for developing machine learning
    applications. It has more than 2500 optimized algorithms which support several
    applications such as recognizing faces, identifying objects, tracking moving objects,
    stitching images, and so on. Giants like Google, Yahoo, Microsoft, Intel, IBM,
    Sony, Honda, Toyota use this library. This is highly suited for developing real-time
    vision applications. To install OpenCV use the following command –


    ```

    !apt-get -qq install -y libsm6 libxext6 && pip install -q -U opencv-python

    ```


    ## XGBoost


    XGBoost is a distributed gradient boosting library that runs on major distributed
    environments such as Hadoop. It is highly efficient, flexible and portable. It
    implements ML algorithms under the Gradient Boosting framework. To install XGBoost,
    use the following command –


    ```

    !pip install -q xgboost==0.4a30

    ```


