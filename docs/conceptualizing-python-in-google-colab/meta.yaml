    # Tuple Packing and Unpacking


    # Tuple Packing


    Tuple packing refers to assigning values to different elements of a tuple in a
    single statement. The syntax of tuple packing is shown below:


    # Syntax:


    ```

    var = (ele1, ele2, . . . . , eleN)

    ```


    After the execution of the above statement, the elements of the tuple are assigned
    to ‘var’ which can be accessed using indices as shown below:


    ```

    var[0]=ele1

    var[1]=ele2

    .

    .

    .

    var[n-1]=eleN

    ```


    ```

    var1, var2, var3, . . . ,varN = value1, value2, value3, . . . ,valueN.

    ```


    One-to-one correspondence exists between variables and values. In the above syntax,
    var1, var2, etc. are initialized with value1, value2, ....etc., respectively.

    For tuple packing to work properly, the no of values specified on the right side
    of the expression should exactly be equal to the no. of values on the left hand
    side of the expression.


    ```

    stud_info=(1,"Maya","A")

    print("Roll no   :",stud_info[0])

    print("Name      :",stud_info[1])

    print("Division  :",stud_info[2])


    Roll no   : 1

    Name      : Maya

    Division  : A

    ```'
