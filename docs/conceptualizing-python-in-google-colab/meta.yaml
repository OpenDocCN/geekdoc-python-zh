    An iterator supports __next__() method to manually iterator through the items
    of an iterator. The __next__() method throws ‘StopIteration’ exception when end
    of the iteration is reached and no more data is found as shown in the following
    programs:


    ```

    mylist=[1,2]

    myiter=mylist.__iter__()

    print(myiter.__next__())

