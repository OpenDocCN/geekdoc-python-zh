    ## Difference Between append() and extend() Methods\n\nThe **append()** method\
    \ is used for appending a single element to the list and accepts a single parameter,\
    \ the element to be appended to the list. On the contrary, the **extend()** method\
    \ accepts a list as its only argument and appends all the elements to the list\
