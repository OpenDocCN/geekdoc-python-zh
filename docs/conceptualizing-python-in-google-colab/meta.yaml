    \number :


    Backreference:


    It allows a previously matched sub-expression(expression captured or enclosed
    within circular brackets ) to be identified subsequently in the same regular expression.
    \n means that group enclosed within the n<sup>th</sup> bracket will be repeated
    at current position.


    Example :


    ([a-z])\1 will match “ee” in Seek because the character at second position is
    same as character at position 1 of the match.


    Examples:


    | Regular Expression | Meaning |

    |---|---|

    | abc* | matches a string that has ab followed by zero or more c |

    | abc+ | matches a string that has ab followed by one or more c |

    | abc? | matches a string that has ab followed by zero or one c |

    | abc{2} | matches a string that has ab followed by 2 c |

    | abc{2,} | matches a string that has ab followed by 2 or more c |

    | abc{2,5} | matches a string that has ab followed by 2 up to 5 c |

    | a(bc)* | matches a string that has a followed by zero or more copies of the
    sequence bc |

    | a(bc){2,5} | matches a string that has a followed by 2 up to 5 copies of the
    sequence bc |


    Bracket expressions—[]


    | Regular Expression | Meaning |

    |---|---|

    | [abc] | matches a string that has either a or b or c and is the same as a|b|c
    |

    | [a-c] | matches a string that has either a or b or c |

    | [a-fA-F0-9] | a string that represents a single hexadecimal digit, case insensitively
    |

    | [0-9]% | a string that has a character from 0 to 9 before a % sign |

    | [^a-zA-Z] | a string that has not a letter from a to z or from A to Z. In this
    case the ^ is used as negation of the expression |'
