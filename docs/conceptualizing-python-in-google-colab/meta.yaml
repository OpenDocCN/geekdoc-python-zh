    # Tracking File Pointer


    # File Positions


    The *tell()* method tells you the current position of the file pointer within
    the file; in other words, the next read or write will occur at that many bytes
    from the beginning of the file.


    The *seek(offset[, from])* method changes the current file position. The offset
    argument indicates the number of bytes to be moved. The from argument specifies
    the reference position from where the bytes are to be moved.


    If from is set to **0**, it means use the beginning of the file as the reference
    position and **1** means use the current position as the reference position and
    if it is set to **2** then the end of the file would be taken as the reference
    position.


    # Querying Position of File Pointer


    The *tell()* method of the file object returns the current position of the file
    pointer from the beginning of the file which specifies the byte from which the
