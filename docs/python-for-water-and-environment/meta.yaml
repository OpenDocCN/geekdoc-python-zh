    # 7.2.4 Simple Exponential Smoothing (SES)


    Simple Exponential Smoothing (SES) is a time series forecasting method for univariate
    data that does not consider trend and seasonality. It uses a weighted average
    of past observations as the forecast, where the weights decrease exponentially
    as observations come from further in the past—the smallest weights being associated
    with the oldest observations. The rate at which the weights decrease is a parameter
    of the method, referred to as the “smoothing constant”. This parameter is chosen
    to minimize a measure of forecast error, such as Mean Squared Error. SES is particularly
    useful for data with no clear trend or seasonal pattern (Fig. 7.9).'
