    more, owing to the overall decrease in the flow area. The three plots show the
    wave height as a function of time at three locations in the 1D domain. These types
    of simulations can help study various scenarios where the geometry of the flow
    channel varies.


    ## 11.4 2D Shallow Water Equations


    The 2D shallow water equations (SWE) are a set of partial differential equations
    that describe the behavior of fluid flow in a shallow water environment, where
    the depth of the fluid is lesser compared to its horizontal extent. In the context
    of surface flow models, these equations are instrumental in simulating and predicting
    various hydrodynamic processes, such as overland flow, river flow, and coastal
    inundation, where the fluid depth variations are significant compared to the flow
    velocities.


    The 2D SWE consists of three primary equations representing the conservation of
    mass (continuity equation) and momentum in horizontal directions (x and y). These
    equations account for fluid depth, flow velocity, gravitational force, and bed
    elevation, comprehensively representing fluid dynamics in two horizontal dimensions.
    Due to their ability to capture complex flow phenomena, 2D SWE is widely employed
    in surface flow models, offering a detailed understanding of flow patterns, velocities,
    and depths in various hydrological systems.


    The Saint-Venant equations, which form the basis of the 1D shallow water equations,
    are closely related to the 2D SWE. Both sets of equations are derived from the
    same fundamental principles of mass and momentum conservation, with the primary
    difference being the dimensionality of the flow representation. While the Saint-Venant
    equations are confined to one spatial dimension and are ideal for simulating flow
    in channels with relatively simple geometries, the 2D SWE provides a more comprehensive
    representation of flow patterns in situations with complex spatial variations,
    such as floodplains, estuaries, and urban areas.


    Applications of the 2D shallow water equations and the Saint-Venant equations
    are widespread in studying surface flow models. They are used for predicting and
    managing flood risks, designing hydraulic structures, assessing the impact of
    land-use changes, and evaluating the consequences of extreme hydrological events.
    Moreover, these equations have been incorporated into coupled surface-subsurface
    models, enhancing the understanding the interactions between groundwater and surface
    water systems.


    Thus, the 2D shallow water and Saint-Venant equations play a pivotal role in studying
    surface flow models. Their ability to capture the essential hydrodynamic processes
    in various hydrological systems makes them indispensable tools for researchers,
    engineers, and water resource managers seeking to understand and address the challenges
    associated with water flow, flood risk, and environmental conservation.


    ### 11.4.1 Governing Equations


    The governing equations for the 2D shallow water equation is given as:


    $$\frac{\partial h}{\partial t} + \frac{\partial hu}{\partial x} + \frac{\partial
    hv}{\partial y} = 0 \quad \text{in } \Omega \times [0, T] \quad (11.16)$$

    $$\frac{\partial hu}{\partial t} + \frac{\partial hu^2 + 0.5gh^2}{\partial x}
    + \frac{\partial huv}{\partial y} = 0 \quad \text{in } \Omega \times [0, T] \quad
    (11.17)$$

    $$\frac{\partial hv}{\partial t} + \frac{\partial huv}{\partial x} + \frac{\partial
    hv^2 + 0.5gh^2}{\partial y} = 0 \quad \text{in } \Omega \times [0, T] \quad (11.18)$$


    where, $\Omega$, $T$ denote the computational domain and $T$ the total time for
    which the simulation runs. $h$, $u$, $v$ are the height, x-velocity, and y-velocity
    of the water. $g$ denotes gravity. We apply the reflecting boundary conditions
    on all four sides of the rectangular domain.


    ### 11.4.2 Python Code


    This code implements a shallow water simulation using the Finite Volume Method
    (FVM). The simulation aims to model water flow behavior in a two-dimensional domain.


    From lines 13–37, the code begins with the file I/O setup, including defining
    the simulation name and result path. It also describes the domain size, grid resolution,
    and the parameters for the simulation, such as gravity (g) and the Courant-Friedrichs-Lewy
    (CFL) number.


    Next, from lines 51–77, the code initializes the variables and arrays needed for
    the simulation. It sets up the grid by creating mesh grid points in the x and
    y directions, representing the domain. The initial values for the water height
    (eta) are defined using a function “eta_initial()”, which can be modified according
    to the desired initial conditions.


    In lines 82–129, the simulation proceeds with a time loop, iterating until a specified
    end time (t_stop) is reached. Inside the loop, the simulation time (t_curr) and
    time step (dt) are updated. The alpha values are calculated based on the water
    height and velocity.


    From lines 141–175, the code computes the fluxes using the Lax-Friedrichs scheme,
    which is a numerical scheme for approximating the fluxes in shallow water equations.
    The fluxes are computed in both the x and y directions separately.


    Next, in lines 177–180, the “Solution” variable is updated using the computed
    fluxes, accounting for the time step and grid spacing. In lines 182–197, boundary
    conditions are applied to enforce no-slip conditions on the water height and velocities
    at the boundaries.


    In lines 200–201, the code calculates the velocities (u and v) by dividing the
    momentum components by the water height. It also performs necessary array assignments
    for the next time step.


    During the simulation, the water height at each time step is stored in the “etas”
    list. Additionally, the code generates visualization outputs (.vtk) using the
    PyVista library. It creates structured grids and saves them in VTK format for
    later visualization and analysis.


    Therefore, the code performs a shallow water simulation using the Finite Volume
    Method. It iterates over time steps, updates the solution variables, and computes
    the fluxes based on the shallow water equations. Visualization outputs are generated
    to visualize the water height and velocities during the simulation.'
  mdcn: '## 11.3.2 结果讨论


    我们现在比较三种渠道情况（即矩形、三角形和圆形渠道）的一维运动波近似结果。除了 $\alpha$ 和 $\beta$ 的表达式不同外，三种情况的所有模拟参数均相同。通过比较图
    11.1、11.2 和 11.3，可以看出波高是最显著的特征。对于矩形情况，由于渠道宽度提供了容纳低波高的空间，使水能够停留在表面附近，因此波高最低。有趣的是，在图
    11.2 中，由于三角形渠道的底部狭窄，波形呈现出尖峰状。类似地，在图 11.3 中，由于流动面积的整体减小，波高仍然更加突出。这三幅图显示了在一维域中三个位置处波高随时间的变化。这类模拟有助于研究流动渠道几何形状变化的各种场景。


    ## 11.4 二维浅水方程


    二维浅水方程（SWE）是一组偏微分方程，用于描述浅水环境中流体流动的行为，其中流体的深度相对于其水平范围较小。在地表流模型的背景下，这些方程对于模拟和预测各种水动力过程（如地表径流、河流流动和沿海淹没）至关重要，因为在这些过程中，流体深度的变化相对于流速来说是显著的。


    二维浅水方程由三个主要方程组成，分别代表质量守恒（连续性方程）和水平方向（x 和 y 方向）的动量守恒。这些方程考虑了流体深度、流速、重力和床面高程，全面表示了两个水平维度上的流体动力学。由于其能够捕捉复杂的流动现象，二维浅水方程被广泛应用于地表流模型中，为理解各种水文系统中的流动模式、流速和深度提供了详细的见解。


    构成一维浅水方程基础的圣维南方程与二维浅水方程密切相关。两组方程都源于相同的质量和动量守恒基本原理，主要区别在于流动表示的维度。圣维南方程局限于一个空间维度，非常适合模拟几何形状相对简单的渠道中的流动；而二维浅水方程则为具有复杂空间变化的情况（如洪泛区、河口和城市地区）提供了更全面的流动模式表示。


    二维浅水方程和圣维南方程在地表流模型研究中应用广泛。它们用于预测和管理洪水风险、设计水工建筑物、评估土地利用变化的影响以及评估极端水文事件的后果。此外，这些方程已被纳入地表-地下耦合模型中，增强了对地下水与地表水系统之间相互作用的理解。


    因此，二维浅水方程和圣维南方程在研究地表流模型中发挥着关键作用。它们能够捕捉各种水文系统中基本的水动力过程，使其成为研究人员、工程师和水资源管理者理解和应对与水流、洪水风险及环境保护相关挑战的不可或缺的工具。


    ### 11.4.1 控制方程


    二维浅水方程的控制方程如下：


    $$\frac{\partial h}{\partial t} + \frac{\partial hu}{\partial x} + \frac{\partial
    hv}{\partial y} = 0 \quad \text{in } \Omega \times [0, T] \quad (11.16)$$

    $$\frac{\partial hu}{\partial t} + \frac{\partial hu^2 + 0.5gh^2}{\partial x}
    + \frac{\partial huv}{\partial y} = 0 \quad \text{in } \Omega \times [0, T] \quad
    (11.17)$$

    $$\frac{\partial hv}{\partial t} + \frac{\partial huv}{\partial x} + \frac{\partial
    hv^2 + 0.5gh^2}{\partial y} = 0 \quad \text{in } \Omega \times [0, T] \quad (11.18)$$


    其中，$\Omega$ 表示计算域，$T$ 表示模拟运行的总时间。$h$、$u$、$v$ 分别是水的高度、x 方向速度和 y 方向速度。$g$ 表示重力加速度。我们在矩形域的所有四侧应用反射边界条件。


    ### 11.4.2 Python 代码


    此代码使用有限体积法（FVM）实现浅水模拟。该模拟旨在模拟二维域中的水流行为。


    从第 13–37 行开始，代码首先进行文件 I/O 设置，包括定义模拟名称和结果路径。它还描述了域大小、网格分辨率以及模拟参数，例如重力加速度（g）和 Courant-Friedrichs-Lewy（CFL）数。


    接下来，从第 51–77 行，代码初始化模拟所需的变量和数组。它通过在 x 和 y 方向创建网格点来设置网格，以表示计算域。水高度（eta）的初始值使用函数“eta_initial()”定义，该函数可以根据所需的初始条件进行修改。


    在第 82–129 行，模拟进入时间循环，迭代直到达到指定的结束时间（t_stop）。在循环内部，更新模拟时间（t_curr）和时间步长（dt）。根据水高度和速度计算
    alpha 值。


    从第 141–175 行，代码使用 Lax-Friedrichs 格式计算通量，这是一种用于近似浅水方程中通量的数值格式。通量分别在 x 和 y 方向计算。


    接下来，在第 177–180 行，使用计算出的通量更新“Solution”变量，并考虑时间步长和网格间距。在第 182–197 行，应用边界条件以在边界处对水高度和速度施加无滑移条件。


    在第 200–201 行，代码通过将动量分量除以水高度来计算速度（u 和 v）。它还为下一个时间步长执行必要的数组赋值。


    在模拟过程中，每个时间步长的水高度都存储在“etas”列表中。此外，代码使用 PyVista 库生成可视化输出（.vtk）。它创建结构化网格并将其保存为 VTK
    格式，以便后续可视化和分析。


