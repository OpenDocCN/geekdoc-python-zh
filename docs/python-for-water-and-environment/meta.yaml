  - '[PAGE 138]


    The program then loads two datasets from .csv files that contain data about the
    rivers Godavari and Cauvery, respectively. Any missing data points are dropped
    to ensure the accuracy of the analysis. From each dataset, the “Level” and “Streamflow”
    columns are extracted, and a new column “River” is added to label the data. The
    first 1000 rows of each dataset are retained for further processing.


    Next, the program defines a function for performing the F-test. This function
    computes the variances of the two input datasets and calculates the F-statistic
    as the ratio of the variances. The function then uses the cumulative distribution
    function (CDF) of the F-distribution to calculate the p-value associated with
    the observed F-statistic.


    The F-test is then performed on the “Streamflow” data of the two rivers, and the
    results are printed. The test provides a p-value which, if smaller than a chosen
    significance level (alpha), indicates that the variances of the two datasets are
    significantly different. The significance level is set at 0.05.


    In the second part of the program, the “Streamflow” data for the Cauvery River
    is modified by adding noise. This noise is generated based on 8% of the amplitude
    of the “Streamflow” data of the Godavari River. An F-test is again performed on
    the “Streamflow” data of the two rivers but with the modified data for the Cauvery
    River. The results of this test are then printed in the same manner as before.


    The second test aims to demonstrate how the F-test can detect changes in the variance,
    even when the change is introduced artificially. By comparing the results of the
    two tests, one can see how the F-test responds to changes in the data.


    # 8.5 The Kolmogorov-Smirnov Test


    The Kolmogorov-Smirnov test is a non-parametric statistical test used to compare
    a sample distribution with a theoretical distribution (one-sample K-S test) or
    to compare two-sample distributions (two-sample K-S test). It calculates the maximum
    distance between the empirical cumulative distribution functions (ECDF) of the
    two samples or distributions.'
