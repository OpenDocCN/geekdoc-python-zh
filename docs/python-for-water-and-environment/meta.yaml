- md: "## 7.2.3 Autoregressive Integrated Moving Average (ARIMA)\n\nThe Autoregressive\
    \ Integrated Moving Average (ARIMA) model combines autoregression, differencing,\
    \ and moving averages into a single approach to predict future data points. The\
    \ autoregressive part analyzes the correlation between an observation and a certain\
    \ number of lagged observations. The integrated part involves differencing the\
    \ data to remove the trend and make the series stationary. The moving average\
    \ part models the error term as a combination of past error terms. By tuning these\
    \ components appropriately, ARIMA can capture complex temporal structures for\
    \ forecasting.\n\n```python\n\"\"\"\nProgram to do time series modeling\nusing\
    \ the ARIMA model\n\"\"\"\n\n# Import libraries\nimport pandas as pd\nimport numpy\
    \ as np\nimport matplotlib.pyplot as plt\nfrom statsmodels.graphics.tsaplots import\
    \ plot_acf\nfrom statsmodels.graphics.tsaplots import plot_pacf\nfrom statsmodels.tsa.stattools\
    \ import adfuller as ADF\nfrom statsmodels.tsa.arima.model import ARIMA\nfrom\
    \ sklearn.metrics import mean_squared_error as MSE\nimport seaborn as sns\n\n\
    # Save plots??\nsavePlots = 1\n\ndef plotGraph(df_, label, figsize, indicator,\
    \ title,\n              save=savePlots):\n    if save:\n        if indicator ==\
    \ 0: # time series plot\n            df_.plot(figsize=figsize)\n            plt.xlabel(label[0])\n\
    \            plt.ylabel(label[1])\n            plt.legend()\n        elif indicator\
    \ == 1: # histogram\n            fig, ax = plt.subplots(2, 1, figsize=figsize,\n\
    \                                  sharex=True)\n            df_[\"Streamflow\"\
    ].hist(ax=ax[0])\n            df_[\"Streamflow\"].plot(kind='kde', ax=ax[1])\n\
    \            ax[0].set_title(\"\")\n            ax[0].grid(ls=\"--\")\n      \
    \      ax[1].grid(ls=\"--\")\n            ax[1].set_xlabel(label[0])\n       \
    \     ax[1].set_ylabel(label[1])\n        elif indicator == 2: # boxplot\n   \
    \         plt.figure(figsize=figsize)\n            sns.boxplot(x=df_[\"Streamflow\"\
    ].index.year,\n                        y=df_[\"Streamflow\"])\n        elif indicator\
    \ == 3: # autocorrelation\n            fig, ax = plt.subplots(2, 1, figsize=figsize,\n\
    \                                  sharex=True)\n            plot_acf(x=df_[\"\
    Streamflow\"], lags=40, ax=ax[0])\n            ax[0].set_title(\"\")\n       \
    \     ax[0].set_ylabel(\"ACF\")\n            plot_pacf(x=df_[\"Streamflow\"],\n\
    \                      lags=40, method=\"ywm\", ax=ax[1])\n            ax[1].set_xlabel(\"\
    lag\")\n            ax[1].set_ylabel(\"PACF\")\n        elif indicator == 4: #\
    \ predicted result\n            fig, ax = plt.subplots()\n            df_.plot(y=\"\
    Test series\",\n                     use_index=True, style=\"-x\",\n         \
    \            lw=3, ms=8, ax=ax)\n            df_.plot(y=\"Predicted series\",\n\
    \                     use_index=True, style=\"-o\",\n                     lw=3,\
    \ ms=8, alpha=0.6,\n                     ax=ax)\n            ax.grid('on', ls=\"\
    --\", which='minor', axis='both')\n            plt.xlabel(label[0])\n        \
    \    plt.ylabel(label[1])\n        plt.title(\"\")\n        plt.grid(ls=\"--\"\
    )\n        plt.tight_layout()\n        plt.show()\n        plt.savefig(title +\
    \ \"_.pdf\", dpi=300)\n\n\"\"\"\nLoad dataset\n\"\"\"\n```\n\n```python\nplotGraph(df_=resampled,\
    \  # Boxplot\n          label=[\"Year\", \"Streamflow\"],\n          figsize=(14,\
    \ 4),\n          indicator=2,\n          title=\"arma-boxplot_after\")\n```\n\n\
    ```python\n\"\"\"\nStationarity check\n\"\"\"\ndef stationarity_adf_test(x, alpha=0.05):\n\
    \    adftest_res = ADF(x, autolag=\"AIC\")\n    dfout = pd.Series(\n        adftest_res[0:4],\n\
    \        index=[\"ADF statistic\", \"ADF p-value\",\n               \"ADF lags\
    \ used\", \"ADF number of obs used\"])\n    for key, value in adftest_res[4].items():\n\
    \        dfout[\"   Critical Value (%s)\" % key] = value\n    print(dfout)\n \
    \   if dfout[\"ADF p-value\"] > alpha:\n        print(\"   Result: Non-stationary\
    \ time series\", \"\\n\")\n    else:\n        print(\"   Result: Stationary time\
    \ series\", \"\\n\")\n```\n\n```python\nprint(\"\\nChecking stationarity:\")\n\
    stationarity_adf_test(resampled)\n```\n\n```python\n\"\"\"\nAutocorrelation and\
    \ Partial autocorrelation\n\"\"\"\nplotGraph(df_=resampled,  # Autocorrelation\
    \ plot\n          label=[\"\", \"\"],\n          figsize=(7, 6),\n          indicator=3,\n\
    \          title=\"arma-acorr\")\n```\n\n```python\n\"\"\"\nData partition and\
    \ ARIMA fitting\n\"\"\"\ntrainmask = (resampled.index >= \"1981-01-01\") & \\\n\
    \            (resampled.index <= \"2002-12-31\")\ntestmask = (resampled.index\
    \ > \"2002-12-31\")\ntraining_set = list(resampled[\"Streamflow\"].loc[trainmask])\n\
    testing_set = list(resampled[\"Streamflow\"].loc[testmask])\n```\n\n```python\n\
    print(\"Created training and testing datasets\\n\")\n\n\"\"\"\nSingle-step predictions\n\
    order = (p,q,d)\norder = (lags, difference, moving average)\n\"\"\"\nforecasts\
    \ = list()\nfor i in range(len(testing_set)):\n    modelARIMA = ARIMA(training_set,\
    \ order=(5, 0, 0)).fit()\n    pred = np.squeeze(modelARIMA.forecast())\n    forecasts.append(pred)\n\
    \    training_set.append(testing_set[i])\n    print(\"Obs={:0.04f}, Pred={:0.04f}\
    \    {}/{}\".format(\n        np.squeeze(inverse_transform(testing_set[i])),\n\
    \        np.squeeze(inverse_transform(pred)),\n        i + 1,\n        len(testing_set))\n\
    \    )\nprint(\"\\nRoot mean square error:\")\nprint(\"    Testset RMSE={:0.04}\"\
    .\n      format(MSE(testing_set, forecasts)))\n\n\"\"\"\nResult plots\n\"\"\"\n\
    result = {\"Year\": resampled[\"Streamflow\"].loc[testmask].index,\n         \
    \ \"Test series\":\n              inverse_transform(np.array(testing_set)),\n\
    \          \"Predicted series\":\n              inverse_transform(np.array(forecasts))}\n\
    df_res = pd.DataFrame.from_dict(data=result)\ndf_res.set_index(\"Year\", inplace=True)\n\
    plotGraph(df_=df_res,  # Prediction results\n          label=[\"Year\", \"Streamflow\"\
    ],\n          figsize=(10, 4),\n          indicator=4,\n          title=\"arma-result\"\
    )\nprint(\"Done!\")\n```\n\nThis program performs time series modeling using the\
    \ Autoregressive Moving Average (ARMA) model, specifically applied to a dataset\
    \ of streamflow measurements from the Godavari River. The program uses several\
    \ Python libraries, such as pandas, NumPy, matplotlib, statsmodels, and sklearn,\
    \ all imported to assist with the data analysis and modeling.\n\nThe script begins\
    \ by defining a function “plotGraph()” for creating and saving various types of\
    \ plots. This function is built to handle time series, histogram, box plot, and\
    \ autocorrelation plot, among others. The various indicators (0—time series plot,\
    \ 1—histogram, 2—boxplot, 3—autocorrelation plot, 4—predicted result) define the\
    \ type of plot to be generated.\n\nFollowing this, the script proceeds to load\
    \ the dataset using pandas' \"read_csv()\" function. It ensures the date format\
    \ is correctly interpreted, extracts the relevant columns, and prints a confirmation\
    \ message.\n\nSeveral plots are generated to inspect the data that has been resampled\
    \ visually. The time series frequency, originally at its initial resolution, is\
    \ then reduced to a bi-monthly one.\n\nNext, the program transforms the data,\
    \ applying a logarithmic function and standardizing it, i.e., the mean is subtracted\
    \ and then divided by the standard deviation. This transformation is crucial to\
    \ stabilize variance and achieve a more Gaussian-like distribution. Both the transformed\
    \ and original data are plotted for comparison.\n\nThe stationarity of the transformed\
    \ data is tested using the Augmented Dickey-Fuller test, implemented via the \"\
    stationarity_adf_test()\" function. The null hypothesis of the test is that a\
    \ unit root is present in the time series sample. If the p-value obtained from\
    \ the test is greater than the specified significance level (0.05), the script\
    \ concludes that the time series is non-stationary.\n\nThe script then proceeds\
    \ to analyze the autocorrelation and partial autocorrelation of the data, providing\
    \ visual plots to help identify potential AR and MA components for the ARMA model.\n\
    \nThe data is split into a training set, containing data from 1981 to 2002, and\
    \ a testing set, containing data from 2003 onward. The model is then fitted iteratively\
    \ on the expanding window of the training set, making single-step predictions\
    \ at each step. The prediction result is shown in Fig. 7.7.\n\nLastly, the prediction\
    \ results are displayed in terms of root mean square error (RMSE) for the test\
    \ set, and a line plot is generated to compare the predicted series with the actual\
    \ test series. The RMSE serves as a measure of the differences between the values\
    \ predicted by the model and the actual values. The line plot is useful to visually\
    \ compare how closely the predictions align with the actual values.\n\nThis program\
    \ showcases a thorough application of the ARMA model for time series data analysis,\
    \ from data loading and preprocessing, to model fitting and result visualization."
  mdcn: "## 7.2.3 自回归积分滑动平均模型（ARIMA）\n\n自回归积分滑动平均（ARIMA）模型将自回归、差分和滑动平均结合成一种单一的方法，用于预测未来的数据点。自回归部分分析一个观测值与一定数量的滞后观测值之间的相关性。积分部分涉及对数据进行差分以消除趋势并使序列平稳。滑动平均部分将误差项建模为过去误差项的组合。通过适当调整这些组件，ARIMA可以捕捉复杂的时间结构以进行预测。\n\
    \n```python\n\"\"\"\n使用ARIMA模型进行时间序列建模的程序\n\"\"\"\n\n# 导入库\nimport pandas as pd\n\
    import numpy as np\nimport matplotlib.pyplot as plt\nfrom statsmodels.graphics.tsaplots\
    \ import plot_acf\nfrom statsmodels.graphics.tsaplots import plot_pacf\nfrom statsmodels.tsa.stattools\
    \ import adfuller as ADF\nfrom statsmodels.tsa.arima.model import ARIMA\nfrom\
    \ sklearn.metrics import mean_squared_error as MSE\nimport seaborn as sns\n\n\
    # 保存图表？？\nsavePlots = 1\n\ndef plotGraph(df_, label, figsize, indicator, title,\n\
    \              save=savePlots):\n    if save:\n        if indicator == 0: # 时间序列图\n\
    \            df_.plot(figsize=figsize)\n            plt.xlabel(label[0])\n   \
    \         plt.ylabel(label[1])\n            plt.legend()\n        elif indicator\
    \ == 1: # 直方图\n            fig, ax = plt.subplots(2, 1, figsize=figsize,\n   \
    \                               sharex=True)\n            df_[\"Streamflow\"].hist(ax=ax[0])\n\
    \            df_[\"Streamflow\"].plot(kind='kde', ax=ax[1])\n            ax[0].set_title(\"\
    \")\n            ax[0].grid(ls=\"--\")\n            ax[1].grid(ls=\"--\")\n  \
    \          ax[1].set_xlabel(label[0])\n            ax[1].set_ylabel(label[1])\n\
    \        elif indicator == 2: # 箱线图\n            plt.figure(figsize=figsize)\n\
    \            sns.boxplot(x=df_[\"Streamflow\"].index.year,\n                 \
    \       y=df_[\"Streamflow\"])\n        elif indicator == 3: # 自相关\n         \
    \   fig, ax = plt.subplots(2, 1, figsize=figsize,\n                          \
    \        sharex=True)\n            plot_acf(x=df_[\"Streamflow\"], lags=40, ax=ax[0])\n\
    \            ax[0].set_title(\"\")\n            ax[0].set_ylabel(\"ACF\")\n  \
    \          plot_pacf(x=df_[\"Streamflow\"],\n                      lags=40, method=\"\
    ywm\", ax=ax[1])\n            ax[1].set_xlabel(\"lag\")\n            ax[1].set_ylabel(\"\
    PACF\")\n        elif indicator == 4: # 预测结果\n            fig, ax = plt.subplots()\n\
    \            df_.plot(y=\"Test series\",\n                     use_index=True,\
    \ style=\"-x\",\n                     lw=3, ms=8, ax=ax)\n            df_.plot(y=\"\
    Predicted series\",\n                     use_index=True, style=\"-o\",\n    \
    \                 lw=3, ms=8, alpha=0.6,\n                     ax=ax)\n      \
    \      ax.grid('on', ls=\"--\", which='minor', axis='both')\n            plt.xlabel(label[0])\n\
    \            plt.ylabel(label[1])\n        plt.title(\"\")\n        plt.grid(ls=\"\
    --\")\n        plt.tight_layout()\n        plt.show()\n        plt.savefig(title\
    \ + \"_.pdf\", dpi=300)\n\n\"\"\"\n加载数据集\n\"\"\"\n```\n\n```python\nplotGraph(df_=resampled,\
    \  # 箱线图\n          label=[\"Year\", \"Streamflow\"],\n          figsize=(14,\
    \ 4),\n          indicator=2,\n          title=\"arma-boxplot_after\")\n```\n\n\
    ```python\n\"\"\"\n平稳性检验\n\"\"\"\ndef stationarity_adf_test(x, alpha=0.05):\n\
    \    adftest_res = ADF(x, autolag=\"AIC\")\n    dfout = pd.Series(\n        adftest_res[0:4],\n\
    \        index=[\"ADF statistic\", \"ADF p-value\",\n               \"ADF lags\
    \ used\", \"ADF number of obs used\"])\n    for key, value in adftest_res[4].items():\n\
    \        dfout[\"   Critical Value (%s)\" % key] = value\n    print(dfout)\n \
    \   if dfout[\"ADF p-value\"] > alpha:\n        print(\"   结果：非平稳时间序列\", \"\\\
    n\")\n    else:\n        print(\"   结果：平稳时间序列\", \"\\n\")\n```\n\n```python\n\
    print(\"\\n检查平稳性：\")\nstationarity_adf_test(resampled)\n```\n\n```python\n\"\"\
    \"\n自相关和偏自相关\n\"\"\"\nplotGraph(df_=resampled,  # 自相关图\n          label=[\"\"\
    , \"\"],\n          figsize=(7, 6),\n          indicator=3,\n          title=\"\
    arma-acorr\")\n```\n\n```python\n\"\"\"\n数据划分和ARIMA拟合\n\"\"\"\ntrainmask = (resampled.index\
    \ >= \"1981-01-01\") & \\\n            (resampled.index <= \"2002-12-31\")\ntestmask\
    \ = (resampled.index > \"2002-12-31\")\ntraining_set = list(resampled[\"Streamflow\"\
    ].loc[trainmask])\ntesting_set = list(resampled[\"Streamflow\"].loc[testmask])\n\
    ```\n\n```python\nprint(\"已创建训练集和测试集\\n\")\n\n\"\"\"\n单步预测\norder = (p,q,d)\n\
    order = (滞后阶数, 差分阶数, 滑动平均阶数)\n\"\"\"\nforecasts = list()\nfor i in range(len(testing_set)):\n\
    \    modelARIMA = ARIMA(training_set, order=(5, 0, 0)).fit()\n    pred = np.squeeze(modelARIMA.forecast())\n\
    \    forecasts.append(pred)\n    training_set.append(testing_set[i])\n    print(\"\
    Obs={:0.04f}, Pred={:0.04f}    {}/{}\".format(\n        np.squeeze(inverse_transform(testing_set[i])),\n\
    \        np.squeeze(inverse_transform(pred)),\n        i + 1,\n        len(testing_set))\n\
    \    )\nprint(\"\\n均方根误差：\")\nprint(\"    测试集 RMSE={:0.04}\".\n      format(MSE(testing_set,\
    \ forecasts)))\n\n\"\"\"\n结果绘图\n\"\"\"\nresult = {\"Year\": resampled[\"Streamflow\"\
    ].loc[testmask].index,\n          \"Test series\":\n              inverse_transform(np.array(testing_set)),\n\
    \          \"Predicted series\":\n              inverse_transform(np.array(forecasts))}\n\
    df_res = pd.DataFrame.from_dict(data=result)\ndf_res.set_index(\"Year\", inplace=True)\n\
    plotGraph(df_=df_res,  # 预测结果\n          label=[\"Year\", \"Streamflow\"],\n \
    \         figsize=(10, 4),\n          indicator=4,\n          title=\"arma-result\"\
    )\nprint(\"完成！\")\n```\n\n该程序使用自回归滑动平均（ARMA）模型进行时间序列建模，具体应用于戈达瓦里河的径流量测量数据集。程序使用了多个Python库，如pandas、NumPy、matplotlib、statsmodels和sklearn，这些库都被导入以辅助数据分析和建模。\n\
    \n脚本首先定义了一个名为“plotGraph()”的函数，用于创建和保存各种类型的图表。该函数旨在处理时间序列、直方图、箱线图和自相关图等。不同的指示符（0—时间序列图，1—直方图，2—箱线图，3—自相关图，4—预测结果）定义了要生成的图表类型。\n\
    \n随后，脚本使用pandas的“read_csv()”函数加载数据集。它确保日期格式被正确解释，提取相关列，并打印确认信息。\n\n生成了多个图表以直观检查重采样后的数据。时间序列的频率从其初始分辨率降低到双月频率。\n\
    \n接下来，程序对数据进行变换，应用对数函数并进行标准化，即减去均值然后除以标准差。这种变换对于稳定方差并实现更接近高斯分布至关重要。变换后的数据和原始数据都被绘制出来进行比较。\n\
    \n使用增强迪基-富勒检验（通过“stationarity_adf_test()”函数实现）测试变换后数据的平稳性。该检验的原假设是时间序列样本中存在单位根。如果从检验中获得的p值大于指定的显著性水平（0.05），脚本则得出结论认为该时间序列是非平稳的。\n\
    \n然后，脚本继续分析数据的自相关和偏自相关，提供可视化图表以帮助识别ARMA模型中潜在的AR和MA成分。\n\n数据被分为训练集（包含1981年至2002年的数据）和测试集（包含2003年及以后的数据）。然后，模型在训练集的扩展窗口上迭代拟合，在每一步进行单步预测。预测结果如图7.7所示。\n\
    \n最后，以测试集的均方根误差（RMSE）形式显示预测结果，并生成折线图以比较预测序列与实际测试序列。RMSE作为模型预测值与实际值之间差异的度量。折线图有助于直观比较预测值与实际值的吻合程度。\n\
    \n该程序展示了ARMA模型在时间序列数据分析中的全面应用，从数据加载和预处理，到模型拟合和结果可视化。"
