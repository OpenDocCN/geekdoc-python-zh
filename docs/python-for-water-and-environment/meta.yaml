    # 可持续技术与计算领域的创新


    **丛书编辑**

    Jagdish Chand Bansal，南亚大学数学系，新德里，印度

    Joong Hoon Kim，高丽大学土木、环境与建筑工程学院，首尔，韩国（大韩民国）

    Atulya K. Nagar，利物浦希望大学，利物浦，英国


    本丛书旨在出版关于技术创新分析与发展的研究，这些技术创新考虑了自然资源并促进了经济和社会发展。创新的可持续技术有望开发可持续的生产规划和工具，从而大幅降低环境和生态风险。


    本丛书涵盖与可持续技术、计算和通信领域创新解决方案相关的研究。计算机科学与工程、网络安全、数据科学、信息系统与软件工程、通信算法、智能交通系统、智慧城市规划、电子废物管理系统以及其他此类可持续技术解决方案领域的计算方法论均在本丛书的范围内。


    本丛书将出版可持续技术与计算领域的重要专著、论文集、教科书以及会议、研讨会和会议的论文集。


    Anil Kumar · Manabendra Saharia


