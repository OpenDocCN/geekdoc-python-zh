  md: '# Chapter 11

    Surface Flow Models


    Surface flow models play a pivotal role in understanding and predicting hydrological
    processes, significantly influencing water resource management, flood risk assessment,
    and designing urban drainage systems. These models facilitate the understanding
    of spatial and temporal water flow patterns, addressing the complex interactions
    between the atmosphere, land surface, and subsurface. In recent years, the importance
    of surface flow models has grown, driven by increased urbanization, climate change
    impacts, and the need for sustainable water resource management. As we delve deeper
    into the world of surface flow models, kinematic wave approximations emerge as
    an essential tool for simplifying the modeling of flow processes. This approach
    allows for efficient and accurate simulations, particularly in open channel flow
    situations, where understanding the movement and storage of water is crucial for
    effective infrastructure planning and environmental conservation. By employing
    kinematic wave approximations, researchers and engineers can strike a balance
    between computational efficiency and model accuracy, ensuring the delivery of
    reliable solutions to pressing water management challenges.


    The open channel flow can be given by the following equation:


    ```

    $$\frac{\partial A}{\partial t} + \frac{\partial Q}{\partial x} = q$$

    ```


    where, $Q$ is the discharge flow rate, $A$ is the cross-sectional area of the
    channel and $q$ is the lateral inflow.


    We can rewrite the first term in Eq. 11.1 as follows:


    ```

    $$\frac{\partial Q}{\partial x} = \frac{\partial Q}{\partial A} \cdot \frac{\partial
    A}{\partial x}$$

    ```


    Manning''s friction law gives a relation between cross-sectional area and flow
    rate as follows:'
  merge: -1
  pgno: 191
- img_proc: true
  md: '$$Q = \frac{1}{n} A R^{2/3} S^{1/2}$$ (11.3)


    where $Q$ is the flow rate, $A$ is the cross-sectional area, $R$ hydraulic radius,
    and $n$, $S$ are the Manning''s roughness coefficient and channel slope, respectively.
    We can replace $R$ with $(A/P)$ to get the equation:


    $$Q = \frac{1}{n} \frac{S^{1/2}}{P^{2/3}} A^{5/3}$$ (11.4)


    where, $P$ is the wetted parameter value.

    Then,


    $$\frac{\partial Q}{\partial A} = \frac{S^{1/2}}{n P^{2/3}} \frac{\partial(A^{5/3})}{\partial
    A}$$ (11.5)


    $$\frac{\partial Q}{\partial A} = \frac{S^{1/2}}{n P^{2/3}} \cdot \frac{5}{3}
    \cdot A^{\frac{5}{3}-1}$$ (11.6)


    Substituting, Eq. 11.6 in Eq. 11.2, we get


    $$\frac{\partial Q}{\partial x} = \frac{S^{1/2}}{n P^{2/3}} \cdot \frac{5}{3}
    \cdot A^{\frac{5}{3}-1} \frac{\partial A}{\partial x}$$ (11.7)


    Substituting, Eq. 11.7 in Eq. 11.1 we get the general form of the kinematic wave
    approximation for an open channel.


    $$\frac{\partial A}{\partial t} + \left( \frac{S^{1/2}}{n P^{2/3}} \right) \cdot
    \left( \frac{5}{3} \right) \cdot A^{\frac{5}{3}-1} \cdot \frac{\partial A}{\partial
    x} = q$$ (11.8)


    A compact representation of the above Eq. 11.8 can be given as:


    $$\frac{\partial A}{\partial t} + \alpha \beta A^{\beta-1} \frac{\partial A}{\partial
    x} = q$$ (11.9)


    where $\alpha = \frac{S^{1/2}}{n P^{2/3}}$ and $\beta = 5/3$. One thing worth
    noticing in the above derivations is that we are solving for cross-sectional area,
    $A$. For computing the discharge, $Q$, we can use the following formula.


    $$Q = \alpha A^{\beta}$$ (11.10)


    The parameters $n$, $S$, $P$ change for channels for different geometry. Next,
    we describe a finite-difference-based code implementation for solving Eq. 11.9
    for a rectangular channel. Using the Taylor series expansion, we can write an
    approximation for $\frac{\partial A}{\partial t}$ and $\frac{\partial A}{\partial
