- md: "## 12.2 Groundwater Flow Model\n\nintrusion prevention, and the assessment\
    \ of potential impacts from land-use changes, industrial activities, and climate\
    \ change.\n\nThe fundamental principles of groundwater flow models are rooted\
    \ in the mathematical representation of flow through porous media, such as Darcy's\
    \ law, and the principle of mass conservation. The governing equations for groundwater\
    \ flow are typically partial differential equations, accounting for parameters\
    \ such as hydraulic conductivity, storage coefficients, and aquifer thickness.\
    \ These equations are often solved using numerical methods, like finite difference\
    \ or finite element techniques, to accurately represent complex aquifer systems\
    \ and boundary conditions.\n\n### 12.2.1 Variational Formulation\n\nThe strong\
    \ form of the unsteady groundwater flow is given by the equation:\n\n$$S\\frac{\\\
    partial h}{\\partial t} = K\\nabla^2 h + f \\quad \\text{in } \\Omega \\qquad\
    \ (12.6)$$\n\nsubject to the boundary conditions:\n\n$$u = u_D \\quad \\text{in\
    \ } \\partial D \\times [0, T] \\qquad (12.7)$$\n$$u = u_0 \\quad \\text{at }\
    \ t = 0 \\qquad (12.8)$$\n\nThe corresponding weak form of Eq. 12.6 can be given\
    \ as follows:\n\n$$S\\langle h - h_n, v \\rangle - \\Delta t K \\langle \\nabla\
    \ h, \\nabla v \\rangle = \\Delta t \\langle f, v \\rangle \\qquad (12.9)$$\n\n\
    Where, $\\Omega$ is the computational domain, $S$ is the storage, $K$ is the permeability,\
    \ $h$, $h_n$ are the heights at the current time and previous time, respectively,\
    \ and $f$ is the source term. $v$ is the test function. We solve for the unknown\
    \ variable $h$ as a function of time, $t$ and space, $x$.\n\n### 12.2.2 GMSH Code\
    \ to Create the Computational Domain\n\nThis Gmsh code defines a 2D geometry using\
    \ OpenCASCADE as the underlying geometry engine. It creates six points in 2D space,\
    \ forming an L-shaped closed loop with lines connecting them. The points and lines\
    \ are used to define a curve loop, representing the boundary of the geometry.\
    \ The curve loop is then used to create a plane surface. The resulting surface\
    \ is assigned a physical label “body” with tag 7, and the curves are assigned\
    \ a physical label “8”. This code sets up the geometry for further operations\
    \ such as meshing or applying boundary conditions.\n\n![](img/0c8a53eeca13bc4d5422655fb7aaba77_228_0.png)\n\
    \n**Fig. 12.3** Well simulation surface/plan view. Triangular mesh as a result\
    \ of the above given Gmsh code. All the boundaries were assigned a no-slip boundary\
    \ condition. Well locations (circles) are also shown on which the sink functions\
    \ were applied. The generated mesh is listed in this Github link to [L-shape Mesh](https://github.com/)\n\
    \n```cpp\n// Gmsh project created on Fri May 12 21:21:45 2023\nSetFactory(\"OpenCASCADE\"\
    );\n//+\nPoint(1) = {0, 0, 0, 1.0};\n//+\nPoint(2) = {10, 0, 0, 1.0};\n//+\nPoint(3)\
    \ = {10, 10, 0, 1.0};\n//+\nPoint(4) = {7, 10, 0, 1.0};\n//+\nPoint(5) = {7, 3,\
    \ 0, 1.0};\n//+\nPoint(6) = {0, 3, 0, 1.0};\n//+\nLine(1) = {1, 2};\n//+\nLine(2)\
    \ = {2, 3};\n//+\nLine(3) = {3, 4};\n//+\nLine(4) = {4, 5};\n//+\nLine(5) = {5,\
    \ 6};\n//+\nLine(6) = {6, 1};\n//+\nCurve Loop(1) = {5, 6, 1, 2, 3, 4};\n//+\n\
    Plane Surface(1) = {1};\n//+\nPhysical Surface(\"body\", 7) = {1};\n//+\nPhysical\
    \ Curve(8) = {6, 5, 4, 3, 2, 1};\n```\n\n### 12.2.3 Python Code\n\nThis code solves\
    \ the unsteady groundwater flow equation using the finite element method.\n\n\
    In lines 6–19, we import the necessary libraries, including “dolfinx”, “pyvista”,\
    \ “numpy”, and “petsc4py”.\n\nIn lines 23–29, we define various parameters such\
    \ as the file paths for mesh input/output, simulation time parameters, and computational\
    \ domain details.\n\nThe program reads the mesh file using the “io.gmshio” module\
    \ from “dolfinx” in 44 to 48.\n\nThe program creates the finite element space\
    \ for the solution in lines 66–70. It also initializes the initial condition for\
    \ the groundwater head using a user-defined function in lines 110–120.\n\nIn lines\
    \ 123–132, we apply the boundary conditions which are specified using the “DirichletBC”\
    \ function, which sets the groundwater head to zero on selected boundary facets.\n\
    \nIn lines 142–148, the code also defines the forcing function for sink or “wells”\
    \ in the domain.\n\nIn lines 154–165, the variational formulation of the groundwater\
    \ flow equation is defined using trial and test functions, along with the sink\
    \ term. The bilinear and linear forms are constructed using the “UFL” syntax.\n\
    \nNext, in lines 175–183, the solver configuration is set up, including the assembly\
    \ of the matrix and creation of the linear solver using “PETSc”. The solver type\
    \ is set to LU factorization for efficient solving of the linear system.\n\nIn\
    \ lines 76–107, the code sets up the plotting using “pyvista”. It creates a grid\
    \ based on the finite element space and defines a plotting function to visualize\
    \ the groundwater head at different time steps.\n\nWe start the time-marching\
    \ loop in line 190, where the program iterates over the specified number of time\
    \ steps. It assembles the right-hand side vector, applies boundary conditions,\
    \ and solves the linear system using the linear solver.\n\nAt every time step,\
    \ the program calls the plotting function to visualize the groundwater head using\
    \ “pyvista”.\n\nThis code demonstrates the implementation of the finite element\
    \ method for solving unsteady groundwater flow and provides a visualization of\
    \ the evolving groundwater head over time.\n\n222\n\n12 Subsurface Flow Models\n\
    \n![](img/0c8a53eeca13bc4d5422655fb7aaba77_230_0.png)\n\n![](img/0c8a53eeca13bc4d5422655fb7aaba77_230_1.png)\n\
    \n![](img/0c8a53eeca13bc4d5422655fb7aaba77_230_2.png)\n\n![](img/0c8a53eeca13bc4d5422655fb7aaba77_230_3.png)\n\
    \n![](img/0c8a53eeca13bc4d5422655fb7aaba77_230_4.png)\n\n![](img/0c8a53eeca13bc4d5422655fb7aaba77_230_5.png)\n\
    \n![](img/0c8a53eeca13bc4d5422655fb7aaba77_230_6.png)\n\nFig. 12.4 Groundwater\
    \ flow simulation on an L-shaped region with two wells. From a to f Groundwater\
    \ profile as a result of pumping at two wells with different depths. With the\
    \ passage of time the water depth increases\n\n```python\n\"\"\"\nProgram to solve\
    \ unsteady groundwater\nflow equation using the finite-element\nmethod.\n\"\"\"\
    \nimport numpy as np\nfrom dolfinx import plot\nfrom dolfinx.fem import (FunctionSpace,\
    \ Function,\n                        dirichletbc, locate_dofs_topological,\n \
    \                       form, petsc, Constant)\nfrom dolfinx.io.gmshio import\
    \ read_from_msh\nfrom ufl import (FiniteElement, TestFunction, TrialFunction,\n\
    \                grad, dot, dx, FacetNormal)\nfrom mpi4py import MPI\nimport pyvista\
    \ as pv\nfrom petsc4py import PETSc\nfrom petsc4py.PETSc import ScalarType\nimport\
    \ matplotlib.pyplot as plt\nfrom matplotlib.colors import LinearSegmentedColormap\n\
    pv.set_plot_theme(pv.themes.DocumentTheme())\n\n\"\"\"\nFile I/O\n\"\"\"\nsimulationName\
    \ = \"Groundwater_flow-2D\"\nmeshName = \"groundwater_2D\"\nmeshPath = \"./meshes_gmsh/\"\
    \ + meshName + \".msh\"\nresultPath = \"./result/\"\n\n\"\"\"\nRunning parameters\n\
    \"\"\"\nt_start = 0\nt_stop = 1\nNt = 100\ndt = (t_stop - t_start) / Nt\n\n\"\"\
    \"\nComputational domain\n\"\"\"\ndomain, cell_tags, facet_tags = read_from_msh(\n\
    \    filename=meshPath,\n    comm=MPI.COMM_WORLD,\n    rank=0,\n    gdim=2)\n\n\
    n = FacetNormal(domain)\nsurround = int(8)\n\n\"\"\"\nModel parameters\n\"\"\"\
    \nS = Constant(\n    domain=domain, c=3.5)  # Storage\nK = Constant(\n    domain=domain,\
    \ c=0.05)  # Hydraulic conductivity\n\n\"\"\"\nFinite element space\n\"\"\"\n\
    fe_elem = FiniteElement(family=\"CG\",\n                        cell=domain.ufl_cell(),\n\
    \                        degree=2)\nfe_space = FunctionSpace(mesh=domain,\n  \
    \                      element=fe_elem)\n\n\"\"\"\nVisualize\n\"\"\"\nocean =\
    \ plt.cm.get_cmap(\"ocean\")\nocean_modified = LinearSegmentedColormap.from_list(\n\
    \    \"ocean_modified\",\n    [ocean(i) for i in range(int(200), int(240))])\n\
    \ndef visualize_and_save(\n    h_, t, name_,\n    grid = pv.UnstructuredGrid(\n\
    \        *plot.create_vtk_mesh(fe_space))):\n\n    p = pv.Plotter(off_screen=True)\n\
    \n    # Initialize grid values\n    grid.point_data[f\"h({t})\"] = h_.x.array.real\n\
    \n    # Warp by values\n    warped = grid.warp_by_scalar(\n        scalars=f\"\
    h({t})\", factor=1.0)\n\n    # Set angle and show\n    p.add_mesh(warped, cmap=ocean_modified,\n\
    \               show_scalar_bar=False)\n    # p.show_grid()\n    p.show_axes()\n\
    \n    # p.camera.view_angle = 15.0\n    p.camera.azimuth = 120\n    # p.camera.elevation\
    \ = -15\n    p.camera.position = (-13.0, 15.0, 5.0)\n\n    p.show(title=\"Groundwater\
    \ flow simulation\",\n           screenshot=resultPath + name_)\n    p.close()\n\
    \n\"\"\"\nInitial condition\n\"\"\"\ndef initial_head(x):\n    return np.full(x.shape[1],\
    \ 0.0)\n\nh_n = Function(V=fe_space, name=\"h_initial\")\nh_n.interpolate(initial_head)\n\
    ```"
  mdcn: "## 12.2 地下水流模型\n\n用于入侵防治，以及评估土地利用变化、工业活动和气候变化的潜在影响。\n\n地下水流模型的基本原理植根于多孔介质中流动的数学表示，例如达西定律和质量守恒原理。地下水流的控制方程通常是偏微分方程，考虑了诸如水力传导系数、储水系数和含水层厚度等参数。这些方程通常使用数值方法求解，如有限差分或有限元技术，以准确表示复杂的含水层系统和边界条件。\n\
    \n### 12.2.1 变分公式\n\n非稳态地下水流的强形式由以下方程给出：\n\n$$S\\frac{\\partial h}{\\partial t}\
    \ = K\\nabla^2 h + f \\quad \\text{in } \\Omega \\qquad (12.6)$$\n\n并满足边界条件：\n\
    \n$$u = u_D \\quad \\text{in } \\partial D \\times [0, T] \\qquad (12.7)$$\n$$u\
    \ = u_0 \\quad \\text{at } t = 0 \\qquad (12.8)$$\n\n方程 12.6 对应的弱形式可以表示如下：\n\n\
    $$S\\langle h - h_n, v \\rangle - \\Delta t K \\langle \\nabla h, \\nabla v \\\
    rangle = \\Delta t \\langle f, v \\rangle \\qquad (12.9)$$\n\n其中，$\\Omega$ 是计算域，$S$\
    \ 是储水系数，$K$ 是渗透系数，$h$ 和 $h_n$ 分别是当前时间和上一时间的高度，$f$ 是源项。$v$ 是测试函数。我们求解未知变量 $h$ 作为时间\
    \ $t$ 和空间 $x$ 的函数。\n\n### 12.2.2 用于创建计算域的 GMSH 代码\n\n此 Gmsh 代码使用 OpenCASCADE 作为底层几何引擎来定义一个二维几何。它在二维空间中创建六个点，通过连接它们的线形成一个\
    \ L 形闭合环。这些点和线用于定义一个曲线环，表示几何的边界。然后，该曲线环用于创建一个平面曲面。生成的曲面被分配一个物理标签“body”，标签为 7，曲线被分配一个物理标签“8”。此代码为后续操作（如网格划分或施加边界条件）设置了几何。\n\
    \n![](img/0c8a53eeca13bc4d5422655fb7aaba77_228_0.png)\n\n**图 12.3** 井模拟表面/平面视图。由上述\
    \ Gmsh 代码生成的三角形网格。所有边界均被分配了无滑移边界条件。井的位置（圆圈）也已显示，汇函数被施加于其上。生成的网格列在此 Github 链接中：[L-shape\
    \ Mesh](https://github.com/)\n\n```cpp\n// Gmsh project created on Fri May 12\
    \ 21:21:45 2023\nSetFactory(\"OpenCASCADE\");\n//+\nPoint(1) = {0, 0, 0, 1.0};\n\
    //+\nPoint(2) = {10, 0, 0, 1.0};\n//+\nPoint(3) = {10, 10, 0, 1.0};\n//+\nPoint(4)\
    \ = {7, 10, 0, 1.0};\n//+\nPoint(5) = {7, 3, 0, 1.0};\n//+\nPoint(6) = {0, 3,\
    \ 0, 1.0};\n//+\nLine(1) = {1, 2};\n//+\nLine(2) = {2, 3};\n//+\nLine(3) = {3,\
    \ 4};\n//+\nLine(4) = {4, 5};\n//+\nLine(5) = {5, 6};\n//+\nLine(6) = {6, 1};\n\
    //+\nCurve Loop(1) = {5, 6, 1, 2, 3, 4};\n//+\nPlane Surface(1) = {1};\n//+\n\
    Physical Surface(\"body\", 7) = {1};\n//+\nPhysical Curve(8) = {6, 5, 4, 3, 2,\
    \ 1};\n```\n\n### 12.2.3 Python 代码\n\n此代码使用有限元法求解非稳态地下水流方程。\n\n在第 6-19 行，我们导入了必要的库，包括“dolfinx”、“pyvista”、“numpy”和“petsc4py”。\n\
    \n在第 23-29 行，我们定义了各种参数，例如网格输入/输出的文件路径、模拟时间参数和计算域详细信息。\n\n程序在第 44 至 48 行使用“dolfinx”的“io.gmshio”模块读取网格文件。\n\
    \n程序在第 66-70 行为解创建了有限元空间。它还在第 110-120 行使用用户定义的函数初始化了地下水头的初始条件。\n\n在第 123-132 行，我们应用了使用“DirichletBC”函数指定的边界条件，该函数将选定边界面上的地下水头设置为零。\n\
    \n在第 142-148 行，代码还定义了域中汇或“井”的强迫函数。\n\n在第 154-165 行，使用试函数和测试函数以及汇项定义了地下水流方程的变分公式。双线性和线性形式使用“UFL”语法构建。\n\
    \n接下来，在第 175-183 行，设置了求解器配置，包括矩阵的组装和使用“PETSc”创建线性求解器。求解器类型设置为 LU 分解，以高效求解线性系统。\n\
    \n在第 76-107 行，代码使用“pyvista”设置绘图。它基于有限元空间创建了一个网格，并定义了一个绘图函数来可视化不同时间步的地下水头。\n\n\
    我们在第 190 行开始时间步进循环，程序在指定的时间步数上迭代。它组装右端向量，应用边界条件，并使用线性求解器求解线性系统。\n\n在每个时间步，程序调用绘图函数使用“pyvista”可视化地下水头。\n\
    \n此代码演示了使用有限元法求解非稳态地下水流的实现，并提供了随时间变化的地下水头演化的可视化。\n\n222\n\n12 地下水流模型\n\n![](img/0c8a53eeca13bc4d5422655fb7aaba77_230_0.png)\n\
    \n![](img/0c8a53eeca13bc4d5422655fb7aaba77_230_1.png)\n\n![](img/0c8a53eeca13bc4d5422655fb7aaba77_230_2.png)\n\
    \n![](img/0c8a53eeca13bc4d5422655fb7aaba77_230_3.png)\n\n![](img/0c8a53eeca13bc4d5422655fb7aaba77_230_4.png)\n\
    \n![](img/0c8a53eeca13bc4d5422655fb7aaba77_230_5.png)\n\n![](img/0c8a53eeca13bc4d5422655fb7aaba77_230_6.png)\n\
    \n图 12.4 在具有两口井的 L 形区域上的地下水流模拟。从 a 到 f 是在不同深度的两口井抽水导致的地下水剖面。随着时间的推移，水深增加。\n\n\
    ```python\n\"\"\"\n使用有限元法求解非稳态地下水流方程的程序。\n\"\"\"\nimport numpy as np\nfrom dolfinx\
