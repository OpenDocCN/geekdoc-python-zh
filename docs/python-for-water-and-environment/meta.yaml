  md: '# Chapter 10

    Introduction


    In fluid dynamics, the Navier-Stokes equations along with some initial conditions
    are used to describe the velocity vector field of a fluid. The equations are a
    consequence of Newton’s second law of motion, the stress in a fluid due to viscosity,
    and the applied pressure. Most of the real flow phenomena can be addressed by
    solving the nonlinear set of partial differential equations. This requires advanced
    nonlinear solvers which although when used do not guarantee convergence. However,
    we often use simplified versions of these equations for our own applications.
    This essentially means that the original nonlinear equations are reduced to linear
    forms by making some assumptions, like in the case of one-dimensional flow.


    The general form of the Navier-Stokes equations can be given by the following
    equation:


    $$\rho \frac{D\mathbf{v}}{Dt} = -\nabla p + \nabla \cdot \sigma_T + \mathbf{f}$$


    This equation is derived by the application of the continuity equation to the
    mass and momentum conservation equations. A few of the concepts that are helpful
    in understanding the terms dictated in the Eq. 10.1 are described now.


    Material derivative is a required concept for the momentum conservation equation.
    We define the material derivative as the rate of change of an intensive property,
    $u$, in the velocity field, $\mathbf{v}$. Mathematically, it can be expressed
    as


    $$\frac{Du}{Dt} = \frac{du}{dt} + \mathbf{v} \cdot \nabla u$$


    The second term in the Eq. 10.2 represents the directional derivative of $u$ along
    the direction of the velocity field, $\mathbf{v}$. Newton’s second law can be
    stated as'
