    # 8.6 Mann-Whitney Test


    The adjoining Python program executes the Mann-Whitney test on two datasets. It
    starts by importing the essential libraries: NumPy, Pandas, and the Stats module
    from SciPy. The line, “pd.mode.chained_assignment=None”, ensures that the warnings
    corresponding to column assignments in a Pandas dataframe are suppressed. A random
    seed is also specified to ensure the reproducibility of the results.


    Next, we load the two datasets from two external csv files: one for the Godavari
    River and another for the Cauvery River. The “dropna()” function from within the
    Pandas library is used to drop any rows containing invalid entries in the dataframes,
    creating two datasets named “df1” and “df2”. Only the “Level” and “Streamflow”
    columns are extracted for processing. A new column “River”, is added to both dataframes
    to label the river each dataset represents. The program then limits each dataframe
    to the first 1000 rows.


    The Mann-Whitney test is then applied using the “mannwhitneyu()” function from
    SciPy’s stats module. The test is performed on the “Streamflow” data of both rivers.
    The significance level is set at 0.05. The test returns a statistic and a p-value.
    The p-value is compared to the significance level to decide whether the two distributions
    are the same or different. If the p-value is less than the significance level,
    the program concludes that the distributions are different, otherwise, they are
    deemed to be the same.


    Following this, the program creates new “Streamflow” data for the Cauvery River
    (df2) as a noisy version of the “Streamflow” data of the Godavari River (df1).
    This new “Streamflow” data is a mixture of the Godavari River’s “Streamflow” and
    a normal random noise scaled by the Cauvery’s “Streamflow”. A second Mann-Whitney
    test is conducted on this new data and the Godavari’s “Streamflow” data, again
    comparing the p-value with the significance level to draw a conclusion about the
    similarity of the two distributions.'
- md: "## Chapter 9\nUncertainty Estimation\n\nEstimating uncertainty is an important\
    \ part of hydrological data modeling. They offer a measure of confidence in model\
    \ predictions and aid in decision-making under risk.\n\nHydrological models are\
    \ often complex, aiming to represent the intricate relationships among various\
    \ environmental and human factors. They rely on input data, such as precipitation,\
    \ temperature, soil characteristics, and land use, which can have uncertainties\
    \ due to measurement errors, data gaps, or spatial and temporal variability. But\
    \ these models incorporate simplifications of complex physical process representations\
    \ in order to apply them in real-world situations, which introduces further uncertainty.\n\
    \nEstimates of uncertainty provide an understanding of how different elements\
    \ of uncertainty affect the outcomes generated by the model. We can pinpoint the\
    \ likely spectrum within which the actual value may reside by quantifying uncertainty\
    \ rooted in the utilized data and model. For instance, a prediction concerning\
    \ river flow could be supplemented by an uncertainty estimate, outputting not\
    \ a singular value but a probable range of outcomes.\n\nUncertainty quantification\
    \ also contributes to a better understanding of the dependability of the model's\
    \ predictions. In other words, it helps to communicate the confidence level we\
    \ can place in these predictions. It measures the degree of certainty or risk\
    \ associated with decisions based on model outcomes.\n\nAdditionally, understanding\
    \ the sources and magnitudes of uncertainties can guide model refinement and data\
    \ collection strategies. For instance, if a significant portion of the uncertainty\
    \ in a model output arises from uncertain precipitation data, it may be worth\
    \ investing in more accurate precipitation measurement techniques or refining\
    \ the representation of precipitation processes in the model.\n\nUncertainty quantification\
    \ also plays a crucial role in risk management and decision-making. For instance,\
    \ in flood risk management, knowing the uncertainty associated with a prediction\
    \ of river discharge can help in setting appropriate safety margins when designing\
    \ flood defenses.\n\nFurthermore, uncertainty estimates are important for scenario\
    \ analysis, studying the impacts of climate change. Given the uncertainties in\
    \ future greenhouse gas emissions and climate models, hydrological predictions\
    \ for future conditions are inherently uncertain. Quantifying these uncertainties\
    \ can help policymakers understand the range of possible outcomes and develop\
    \ robust adaptation strategies.\n\nUncertainty estimates and quantification in\
    \ hydrology data modeling are of paramount importance. They not only improve our\
    \ understanding of the confidence we can place in model predictions but also guide\
    \ model improvement efforts, support risk management, and aid in decision-making\
    \ under uncertain conditions. While it is impossible to completely eliminate uncertainty,\
    \ recognizing and quantifying is a crucial part of hydrological modeling.\n\n\
    ## 9.1 Interval Estimates\n\n### 9.1.1 Non-parametric Interval Estimate\n\nNon-parametric\
    \ interval estimation involves estimating the range within which a population\
    \ parameter, like the median or a percentile, is likely to fall, without assuming\
    \ that the data follows a specific distribution (Fig. 9.1).\n\n```python\n\"\"\
    \"\nProgram for non-parametric interval\nestimate on 1D stream flow data\n\"\"\
    \"\nimport pandas as pd\nfrom scipy.stats import (norm, binom, tmean, tstd,\n\
    \                         t, nct, bootstrap, mstats)\nimport numpy as np\n\n\"\
    \"\"\nLoad dataset\n\"\"\"\ndata = pd.read_csv(\n    filepath_or_buffer=\"../data/Godavari.csv\"\
    ,\n    sep=\",\",\n    header=0).dropna()\nprint(\"\\nChecking data:\")\ntry:\n\
    \    data[\"time\"] = pd.to_datetime(\n        data['time'], infer_datetime_format=True)\n\
    \    print(\"   Date format is okay!\\n\")\nexcept ValueError:\n    print(\" \
    \  Encountered error!\\n\")\n    pass\nx = data[[\"Streamflow\"]].to_numpy().squeeze()\n\
    del data\nprint(\"Read data file\")\n\n\"\"\"\nNon-parametric interval estimate\n\
    \"\"\"\nprint(\"\\n\\nDoing non-parametric interval estimate\")\nqnt = binom.ppf(q=[0.025,\
    \ 0.975],\n                n=len(x), p=0.5,\n                loc=0)\nqnt = np.cast[int](qnt\
    \ - 1)\nprint(\"Quantile values = (({}, {}))\".format(x[qnt[0]],\n           \
    \                                 x[qnt[1]]))\n\nprint(\"\\nDone!\")\n```\n\n\
    ```\n>>> Checking data:\n>>>     Date format is okay!\n>>> Read data file\n>>>\
    \ Doing non-parametric interval estimate\n>>> Quantile values = (10.69, 131.7)\n\
    >>> Done!\n```\n\nThe adjoining program performs a non-parametric interval estimate\
    \ with 1D stream flow data. The code starts by importing the essential Python\
    \ libraries like: NumPy for matrix operations, scipy.stats for statistical computations,\
    \ and Pandas from data manipulation.\n\nThe data is loaded from an external .csv\
    \ file named as “Godavari.csv”. For this, Pandas “read_csv()” function is used.\
    \ The “dropna()” function eliminates any missing data or null values.\n\nAfter\
    \ loading the data, we check for the format of the “time” column. We use the “to_datetime()”\
    \ function from the Pandas library for this. Upon successful conversion, the program\
    \ prints a message on the console; otherwise, it throws a value error. In either\
    \ of the cases, the execution continues.\n\nThe necessary data is extracted from\
    \ the “Streamflow” column, and the dataframe is deleted upon extraction. Subsequently,\
    \ the dataframe is converted into a 1D NumPy array with the “squeeze()” function,\
    \ aiding in the statistical calculation in the following steps.\n\nNext, the non-parametric\
    \ interval estimate is then performed with the help of the binomial percentile\
    \ point function (ppf). The confidence interval and the success probability for\
    \ this are specified as 95% (0.025 and 0.975) and 0.5. As a result, we get the\
    \ two quantile values representing the bounds corresponding to the confidence\
    \ interval.\n\nFinally, the program prints these quantile values to the console\
    \ and a message indicating the completion of the interval estimate.\n\n## 9.2\
    \ Confidence Intervals\n\n### 9.2.1 For Median\n\n#### 9.2.1.1 Bootstrap Confidence\
    \ Interval Estimate\n\nThe bootstrap confidence interval estimate for the median\
    \ is a non-parametric method that generates many resamples of the observed data,\
    \ each with replacement. The median of each resample is computed, resulting in\
    \ a distribution of medians. The confidence interval is then derived from this\
    \ distribution, capturing the central tendency of the data (Fig. 9.2).\n\n```python\n\
    \"\"\"\nProgram for Bootstrap confidence\ninterval estimate on 1D stream flow\
    \ data\n\"\"\"\nimport pandas as pd\nfrom scipy.stats import (norm, binom, tmean,\
    \ tstd,\n                         t, nct, bootstrap, mstats)\nimport numpy as\
    \ np\n\n\"\"\"\nLoad dataset\n\"\"\"\ndata = pd.read_csv(\n    filepath_or_buffer=\"\
    ../data/Godavari.csv\",\n    sep=\",\",\n    header=0).dropna()\nprint(\"\\nChecking\
    \ data:\")\ntry:\n    data[\"time\"] = pd.to_datetime(\n        data['time'],\
    \ infer_datetime_format=True)\n    print(\"    Date format is okay!\\n\")\nexcept\
    \ ValueError:\n    print(\"    Encountered error!\\n\")\n    pass\nx = data[[\"\
    Streamflow\"]].to_numpy().squeeze()\ndel data\nprint(\"Read data file\")\n\n\"\
    \"\"\nBootstrap confidence interval estimate\n\"\"\"\nprint(\"\\n\\nDoing Bootstrap\
    \ CI estimate\")\nx = (x,)\nci = bootstrap(data=x,\n                statistic=np.median,\n\
    \                confidence_level=0.95,\n                n_resamples=10000,\n\
    \                method=\"percentile\")\nlower_bound = ci.confidence_interval.low\n\
    upper_bound = ci.confidence_interval.high\nprint(f\"Lower Bound: {lower_bound}\"\
    )\nprint(f\"Upper Bound: {upper_bound}\")\n\nprint(\"\\nDone!\")\n```\n\nThis\
    \ Python program computes the Bootstrap confidence interval estimate on a one-dimensional\
    \ streamflow dataset.\nEssential libraries are first loaded in the program. The\
    \ “read_csv()” function of the Pandas library is called to load the data and its\
    \ dropna() function is used to discard any rows with missing or invalid (NaNs)\
    \ values.\nThe “time” column in the loaded dataframe is then converted to a more\
    \ suitable datetime object printing a message if the conversion is successful\
    \ else throwing an error. The program continues to execute after the conversion.\n\
    The streamflow data are then extracted from the “Streamflow” column into a NumPy\
    \ array followed by a freeing up of the memory. The program uses the “scipy.stats”\
    \ library to compute the bootstrap interval by resampling the data multiple times\
    \ (10000 times in this case) and computing the desired statistic, the median."
  mdcn: "## 第9章\n不确定性估计\n\n估计不确定性是水文数据建模的重要组成部分。它们为模型预测提供了置信度的度量，并有助于在风险下进行决策。\n\n\
    水文模型通常很复杂，旨在表征各种环境和人为因素之间错综复杂的关系。它们依赖于输入数据，如降水、温度、土壤特性和土地利用，这些数据可能由于测量误差、数据缺失或时空变异性而存在不确定性。但这些模型为了能在现实世界中应用，包含了对复杂物理过程表示的简化，这又引入了进一步的不确定性。\n\
    \n不确定性估计有助于理解不确定性的不同要素如何影响模型产生的结果。通过量化所用数据和模型中的不确定性，我们可以确定实际值可能存在的可能范围。例如，关于河流流量的预测可以辅以不确定性估计，输出的不是一个单一值，而是一个可能的结果范围。\n\
    \n不确定性量化也有助于更好地理解模型预测的可靠性。换句话说，它有助于传达我们可以对这些预测抱有的置信水平。它衡量了基于模型结果的决策所关联的确定性或风险程度。\n\
    \n此外，了解不确定性的来源和大小可以指导模型改进和数据收集策略。例如，如果模型输出中的很大一部分不确定性源于不确定的降水数据，那么投资于更精确的降水测量技术或改进模型中降水过程的表示可能是值得的。\n\
    \n不确定性量化在风险管理和决策中也起着至关重要的作用。例如，在洪水风险管理中，了解与河流流量预测相关的不确定性有助于在设计防洪设施时设定适当的安全裕度。\n\
    \n此外，不确定性估计对于情景分析、研究气候变化的影响非常重要。鉴于未来温室气体排放和气候模型的不确定性，对未来条件的水文预测本质上是不确定的。量化这些不确定性可以帮助决策者理解可能的结果范围，并制定稳健的适应策略。\n\
    \n水文数据建模中的不确定性估计和量化至关重要。它们不仅提高了我们对模型预测置信度的理解，还指导模型改进工作，支持风险管理，并有助于在不确定条件下进行决策。虽然完全消除不确定性是不可能的，但认识和量化它是水文建模的关键部分。\n\
    \n## 9.1 区间估计\n\n### 9.1.1 非参数区间估计\n\n非参数区间估计涉及估计总体参数（如中位数或百分位数）可能落入的范围，而不假设数据遵循特定分布（图9.1）。\n\
    \n```python\n\"\"\"\nProgram for non-parametric interval\nestimate on 1D stream\
    \ flow data\n\"\"\"\nimport pandas as pd\nfrom scipy.stats import (norm, binom,\
    \ tmean, tstd,\n                         t, nct, bootstrap, mstats)\nimport numpy\
    \ as np\n\n\"\"\"\nLoad dataset\n\"\"\"\ndata = pd.read_csv(\n    filepath_or_buffer=\"\
    ../data/Godavari.csv\",\n    sep=\",\",\n    header=0).dropna()\nprint(\"\\nChecking\
    \ data:\")\ntry:\n    data[\"time\"] = pd.to_datetime(\n        data['time'],\
    \ infer_datetime_format=True)\n    print(\"   Date format is okay!\\n\")\nexcept\
    \ ValueError:\n    print(\"   Encountered error!\\n\")\n    pass\nx = data[[\"\
    Streamflow\"]].to_numpy().squeeze()\ndel data\nprint(\"Read data file\")\n\n\"\
    \"\"\nNon-parametric interval estimate\n\"\"\"\nprint(\"\\n\\nDoing non-parametric\
    \ interval estimate\")\nqnt = binom.ppf(q=[0.025, 0.975],\n                n=len(x),\
    \ p=0.5,\n                loc=0)\nqnt = np.cast[int](qnt - 1)\nprint(\"Quantile\
    \ values = (({}, {}))\".format(x[qnt[0]],\n                                  \
