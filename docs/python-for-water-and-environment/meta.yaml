    \ estimation\nfor log-normal data\n\"\"\"\nfrom scipy.stats import norm\nimport\
    \ numpy as np\nimport matplotlib.pyplot as plt\nimport pandas as pd\n\nnp.random.seed(11)\n\
    plt.rc('text', usetex=True)\n\n\"\"\"\nLoading the dataset\n\"\"\"\ndata = pd.read_csv(\n\
