    # 14.2.1 Variational Formulation


    The strong form of the governing equation of diffusion, advection scenario can
    be given as


    $$\frac{\partial[u]}{\partial t} + \mathbf{w} \cdot \nabla[u] + \nabla \cdot (D\nabla[u])
    = f \quad (14.3)$$


    where $[u]$ is the concentration of the contaminant, $\mathbf{w}$ is the velocity
    of the flow, and constant $D$ is the diffusion coefficient. The weak form corresponding
    to Eq. 14.3 can be stated as


    $$\int_{\Omega} \frac{1}{dt} \langle u - u_n, v \rangle dx + \int_{\Omega} \langle
    \mathbf{w} \cdot \nabla u, v \rangle dx + \int_{\Omega} D \langle \nabla u, \nabla
    v \rangle dx = \int_{\Omega} (fv) dx \quad (14.4)$$


