  mdcn: "## 4.2 数据集总结\n\n![](img/0c8a53eeca13bc4d5422655fb7aaba77_51_0.png)\n\n图 4.4\
    \ 使用下山单纯形算法估计广义极值分布（GEV）参数的最大似然估计（MLE）。细黑线和红线分别显示了对应于具有真实参数（c）的观测数据和来自估计参数（cest）的合成数据的直方图。\n\
    \n### 4.2.5 分布拟合\n\n最大似然估计（MLE）是一种有效的统计方法，用于估计概率分布或统计模型的参数。它基于似然原理，该原理衡量观测数据与特定参数值的兼容性。MLE技术旨在找到使似然函数最大化的参数值，从而使观测数据更可能出现。简而言之，它试图估计“最有可能”产生观测数据的参数。\n\
    \nMLE的一个关键优势是其一致性。随着样本量的增加，MLE会依概率收敛到真实的参数值。它在所有一致估计量中也能达到最低的可能方差，因此是有效的。\n\n\
    然而，MLE可能对数据分布的初始假设敏感。对于小样本量，它也可能产生有偏估计，这个问题通常通过使用偏差校正的MLE来解决。接下来，我们描述一个最大似然估计的小例子。\n\
    \n```python\n\"\"\"\nProgram to do a maximum likelihood\nestimate (MLE) with generalised\n\
    extreme value (GEV) distribution\n\"\"\"\n\nfrom scipy.stats import genextreme\n\
    from scipy.optimize import fmin\nimport numpy as np\nimport matplotlib.pyplot\
    \ as plt\n\n# Fix random seed\nnp.random.seed(21)\n\n# Likelihood function (the\
    \ GEV distribution)\ndef likelihood_fun(theta, data):\n    lik = -np.sum(\n  \
    \      np.log(\n            genextreme.pdf(x=data, c=theta)\n        )\n    )\n\
    \    return lik\n\n# Loss function (to be maximised)\ndef fit_distribution(data):\n\
    \    x0 = np.random.rand(1, )\n    estimated_params = fmin(\n        func=likelihood_fun,\n\
    \        x0=x0,\n        disp=True,\n        args=(data,))\n    return estimated_params\n\
    \n# Generate synthetic data\nc = -0.2  # True parameter for GEV distribution\n\
    rvs = genextreme.rvs(c, size=1000)  # Random variates\n\n# Fit the parameters\n\
    c_est = fit_distribution(data=rvs)  # Estimated parameter\n\n# Print results\n\
    print('Obs. c = {:.4f}'.format(c))\nprint('Est. c = {:.4f}'.format(c_est[0]))\n\
    \n# Analysis\nx_obs = np.linspace(genextreme.ppf(0.01, c),\n                 \
    \   genextreme.ppf(0.99, c), 100)\nx_est = np.linspace(genextreme.ppf(0.01, c_est),\n\
    \                    genextreme.ppf(0.99, c_est), 100)\nrvs_ = genextreme.rvs(c_est,\
    \ size=1000)\n\n# Display the estimate\nfig, ax = plt.subplots()\nax.plot(x_obs,\
    \ genextreme.pdf(x_obs, c),\n       'k-', lw=2, alpha=0.9, label='Obs: GEV pdf')\n\
    ax.plot(x_est, genextreme.pdf(x_est, c_est),\n       'r-', lw=5, alpha=0.4, label='Fit:\
    \ GEV pdf')\nax.hist(rvs, color='k', density=True, bins='auto',\n        histtype='step',\
    \ alpha=0.7)\nax.hist(rvs_, color='r', density=True, bins='auto',\n        histtype='step',\
    \ alpha=0.7)\nax.set_xlabel('x')\nax.set_ylabel('$f(x)$')\nax.grid(ls='--')\n\
    ax.legend(loc='best', frameon=False)\nplt.show()\nplt.tight_layout()\nplt.savefig('MLE_fit.pdf',\
    \ dpi=300)\n```\n\n上述代码生成合成数据，并使用广义极值（GEV）分布执行最大似然估计（MLE）。\n\n我们首先导入所需的库：“scipy.stats.genextreme()”用于GEV分布，“scipy.optimize.fmin()”用于优化，“numpy”用于数值运算，“matplotlib.pyplot”用于绘图。\n\
    \n接下来，定义似然函数“likelihood_fun()”，该函数计算给定数据下GEV分布的负对数似然。\n\n定义损失函数“fit_distribution()”，使用“fmin()”函数优化似然函数。它估计使似然最大化的GEV分布参数（“c”）。\n\
    \n然后，使用已知参数“c”从GEV分布生成合成数据集。使用“fit_distribution()”函数和生成的数据估计GEV分布的参数（“c_est”）。结果，打印出真实参数和估计参数。\n\
    \n之后，获得观测和拟合的GEV概率密度函数（PDF）以及从估计分布得到的生成数据和观测数据的直方图的可视化（图4.4）。然后，将结果（包括观测的GEV PDF和拟合的GEV\
    \ PDF）与生成和估计数据的直方图一起绘制出来。最后，显示绘图并将其保存为PDF文件。\n\n### 4.2.6 水文数据中的内点与异常值\n\n数据中的异常，或称为异常值，是数据集中显著偏离其他观测值的值。数据异常可能由多种原因引起，例如测量误差、罕见的水文事件和缺失的数据点。异常可能出现在单变量和多变量数据集中。尽管它们有时能提供关于关键事件的更深入见解，但它们也可能扭曲分析，导致错误的模型和误导性的结论。因此，数据的预处理变得至关重要。现在，我们介绍一组用于处理数据异常的统计技术。\n\
    \n在水文数据的背景下，数据点可以分为内点或异常值。内点被定义为基于假设的统计模型，落在预期范围内的观测误差。另一方面，异常值是与其余观测值表现出显著偏差的数据点。例如，异常值是那些对应于河流流量记录中极端洪水事件的数据点，因为它们与典型的流量值有明显差异。\n\
    \n处理异常值极其重要，因为它们可能对数据集的统计特性（如均值和标准差）产生相当大的影响。不处理它们可能对数据驱动模型的性能产生不利影响。\n\n然而，确定异常值是代表错误还是真实但极端的观测至关重要。真正的异常值可以提供关于水文系统在极端条件下行为的宝贵见解，应在分析中仔细考虑。重要的是要记住，将数据点分类为内点或异常值通常取决于背景和正在研究的问题。\n\
    \n### 4.2.7 缺失数据\n\n缺失数据是水文研究中的一个有效问题，它可能损害分析的完整性和模型预测的稳健性。水文数据可能由于各种原因而存在缺失值，包括设备故障、数据处理错误或数据收集工作的间隙。这个问题在历史数据和从偏远或难以到达地区收集的数据中尤为普遍。\n\
    \n缺失数据阻碍了进行全面分析或准确模拟水文过程。关键信息可能会丢失，数据集的时间连续性可能会被破坏，导致对季节性变化或长期趋势的不准确表示。\n\n为了处理缺失数据，水文学家通常采用各种技术，如插值、回归或数据插补方法。然而，这些方法有其自身的局限性，如果应用不当，可能会引入额外的不确定性。\n\
    \n处理缺失数据的方法应在考虑缺失数据的性质、缺失值的百分比以及数据中的潜在模式后选择。然而，通过稳健的数据收集、存储和管理实践来防止数据丢失，仍然是减轻水文研究中缺失数据影响的最佳方法。\n\
    \n### 4.2.8 Q-Q图\n\n分位数-分位数（Q-Q）图是水文学和其他领域中用于评估数据集是否遵循特定理论分布的有价值的图形工具。这些图通过绘制两个概率分布的分位数来比较它们。如果被比较的两个分布相似，Q-Q图中的点将大致沿着45°线分布。\n\
    \n尽管Q-Q图通常用于验证正态性假设，但它们也可用于其他分布。例如，水文学家可能使用Q-Q图来确定降雨或河流流量数据是否遵循正态分布。在这种情况下，观测数据的分位数将与标准正态分布的分位数进行绘制。\n\
    \nQ-Q图特别有用，因为它们直观地展示了数据在整个范围内与理论分布的偏离，而不仅仅是均值或中位数。它们可以突出显示诸如偏度（如果点形成弯曲模式）或重尾或轻尾行为（如果点在分布的极端处落在线下方或上方）等问题。\n\
    \n因此，Q-Q图不仅用于假设检验（即，数据是否遵循某种分布？），而且还提供关于数据分布性质的宝贵见解。这些信息可以指导为后续水文数据分析选择适当的统计方法或数据转换。"
