    \ 90%，假设新观测值与数据来自同一总体。\n\n## 9.4 分位数回归\n\n分位数回归是一种统计技术，旨在估计和推断条件分位数函数。与预测平均结果的标准回归模型不同，分位数回归提供了分布不同点（如中位数、四分位数）上可能结果值的完整图景，从而提供更稳健和全面的分析。\n\
