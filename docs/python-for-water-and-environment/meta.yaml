- md: "## Chapter 12\nSubsurface Flow Models\n\n## 12.1 Seepage Flow Model\n\nSeepage\
    \ flow models form an integral part of subsurface hydrological studies, focusing\
    \ on the simulation and quantification of fluid movement through porous media\
    \ such as soil, rock, and sediment. These models are critical for understanding\
    \ groundwater dynamics, as they provide valuable insights into the distribution,\
    \ recharge, and discharge of aquifers, as well as the interactions between groundwater\
    \ and surface water systems. Seepage flow models are also vital in addressing\
    \ issues related to water quality, soil moisture, and contaminant transport, which\
    \ have significant implications for agriculture, water supply, and environmental\
    \ protection.\n\nThe foundation of seepage flow models lies in Darcy’s law, which\
    \ relates the fluid velocity to the hydraulic conductivity and hydraulic gradient\
    \ within the porous medium. Coupled with the principle of mass conservation, these\
    \ models describe the flow of water through unsaturated and saturated zones, accounting\
    \ for factors such as soil properties, heterogeneity, and anisotropy. Numerical\
    \ methods, such as finite difference and finite element techniques, are often\
    \ employed to solve the governing equations of seepage flow models, allowing for\
    \ the accurate representation of complex subsurface conditions and boundary conditions.\n\
    \n### 12.1.1 Variational Formulation\n\nThe strong form of the seepage flow model\
    \ needs to be solved,\n\n$$\\sigma + \\nabla u = 0 \\quad \\text{in } \\Omega\
    \ \\qquad (12.1)$$\n$$\\nabla \\cdot \\sigma = f \\quad \\text{in } \\Omega \\\
    qquad (12.2)$$\n\nsubject to the following boundary condition:\n\n$u = u_0$ on\
    \ $\\partial D$ (12.3)\n\n$-\\sigma \\cdot \\hat{n} = g$ on $\\partial N$ (12.4)\n\
    \nwhere, the boundary, $\\partial \\Omega = \\partial D \\cup \\partial N$. The\
    \ corresponding weak form of Eqs. 12.1 and 12.2 can be given as\n\n$\\langle \\\
    sigma, \\tau \\rangle + \\langle \\nabla u, \\tau \\rangle + \\langle \\sigma,\
    \ \\nabla v \\rangle = -\\langle \\hat{n}, \\sigma \\rangle * v$ (12.5)\n\nIn\
    \ the above equations, $\\sigma$ represents the vector variable, and the velocity,\
    \ and $u$ represents the scalar variable, and pressure.\n\n### 12.1.2 GMSH Code\
    \ to Generate the Computational Domain\n\nThe given Gmsh code is used to describe\
    \ a geometric 2D domain. Shown in Fig. 12.1 is a simple geometry consisting of\
    \ points, lines, and surfaces.\n\nFirst, it setups the geometry engine using the\
    \ SetFactory (\"OpenCASCADE\") command. It then defines the point definitions—Points\
    \ 1 and 2 represent the endpoints of a line segment, while points 3 to 9 define\
    \ the vertices of a complex shape. Line definitions: Lines 1 to 10 connect the\
    \ defined points, forming the boundaries of the geometry. They represent the edges\
    \ of the shape.\n\nNext, curve loops are defined—Curve Loop(1) defines a closed\
    \ loop by specifying the lines that form the boundary. In this case, lines 1 to\
    \ 10 are included. Plane Surface: Plane Surface(1) creates a 2D surface using\
    \ Curve Loop(1). It represents the interior region enclosed by the loop.\n\nNext,\
    \ we define the physical curves and surfaces—Physical Curve and Physical Surface\
    \ commands assign tags or labels to specific curves and surfaces. These tags can\
    \ be used to define boundary conditions or apply material properties in subsequent\
    \ simulations.\n\nTherefore, this code defines a 2D geometry with specific points,\
    \ lines, and surfaces. The defined surfaces and curves are given physical tags,\
    \ which can be used to identify and assign specific properties or conditions to\
