  md: 'intrusion prevention, and the assessment of potential impacts from land-use
    changes, industrial activities, and climate change.


    The fundamental principles of groundwater flow models are rooted in the mathematical
    representation of flow through porous media, such as Darcy''s law, and the principle
    of mass conservation. The governing equations for groundwater flow are typically
    partial differential equations, accounting for parameters such as hydraulic conductivity,
    storage coefficients, and aquifer thickness. These equations are often solved
    using numerical methods, like finite difference or finite element techniques,
    to accurately represent complex aquifer systems and boundary conditions.


    # 12.2.1 Variational Formulation


    The strong form of the unsteady groundwater flow is given by the equation:


    ```

    $$S\frac{\partial h}{\partial t} = K\nabla^2 h + f \quad \text{in } \Omega \qquad
    (12.6)$$

    ```


    subject to the boundary conditions:


    ```

    $$u = u_D \quad \text{in } \partial D \times [0, T] \qquad (12.7)$$

    $$u = u_0 \quad \text{at } t = 0 \qquad (12.8)$$

    ```


    The corresponding weak form of Eq. 12.6 can be given as follows:


    ```

    $$S\langle h - h_n, v \rangle - \Delta t K \langle \nabla h, \nabla v \rangle
    = \Delta t \langle f, v \rangle \qquad (12.9)$$

    ```


    Where, $\Omega$ is the computational domain, $S$ is the storage, $K$ is the permeability,
    $h$, $h_n$ are the heights at the current time and previous time, respectively,
    and $f$ is the source term. $v$ is the test function. We solve for the unknown
    variable $h$ as a function of time, $t$ and space, $x$.


    # 12.2.2 GMSH Code to Create the Computational Domain


    This Gmsh code defines a 2D geometry using OpenCASCADE as the underlying geometry
    engine. It creates six points in 2D space, forming an L-shaped closed loop with
    lines connecting them. The points and lines are used to define a curve loop, representing
    the boundary of the geometry. The curve loop is then used to create a plane surface.
    The resulting surface is assigned a physical label “body” with tag 7, and the
    curves are assigned a physical label “8”. This code sets up the geometry for further
    operations such as meshing or applying boundary conditions.'
