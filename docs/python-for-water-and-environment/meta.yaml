    # Innovations in Sustainable Technologies and Computing


    **Series Editors**

    Jagdish Chand Bansal, Department of Mathematics, South Asian University, New Delhi,
    India

    Joong Hoon Kim, School of Civil, Environmental and Architectural Engineering,
    Korea University, Seoul, Korea (Republic of)

    Atulya K. Nagar, Liverpool Hope University, Liverpool, UK


    The book series aims to publish research on the analysis and development of technological
    innovations that consider natural resources and nurture economic and social development.
    Innovative sustainable technologies are expected to develop sustainable production
    planning and tools, which reduces environmental and ecological risks drastically.


    The series covers research related to innovative solutions in the field of sustainable
    technology, computing, and communication. Computational methodologies in the field
    of computer science and engineering, cybersecurity, data science, information
    systems and software engineering, algorithms for communication, smart transport
    system, smart city planning, e-waste management system, and other such sustainable
    technological solutions within the scope of this series.


    The series will publish monographs, edited volumes, textbooks and proceedings
    of important conferences, symposia and meetings in the field of sustainable technology
    and computing.


    Anil Kumar · Manabendra Saharia


