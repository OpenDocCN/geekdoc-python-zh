    p.show(title=\"渗流模拟\")\n\nprint(\"完成！\")\n```\n\n## 12.1.4 结果讨论\n\n图12.2展示了渗流模拟的结果。由于在入口和出口施加了压力边界条件，压力从高值逐渐降低到低值。该边界条件垂直施加于两个区域（即入口和出口）的边界上，如图12.2所示。颜色渐变显示了这种变化。在上半部分，我们看到压力场。其高值和低值分别为100\
