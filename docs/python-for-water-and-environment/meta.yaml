    to the normal distribution, which has a kurtosis of 3. For example, a dataset
    of river flow rates during a flood event would typically display high kurtosis,
    with most flow rates being relatively stable and a few extreme flow rates representing
    the peak of the flood.


    In hydrology, skewness can provide insights into the tendency of the occurrence
    of certain events. For instance, positively skewed rainfall data may indicate
    the occurrence of a few heavy rainfall events. Kurtosis can help hydrologists
    understand the probability of extreme events. A higher kurtosis in a river flow
