  md: 'from one place to another. Transportation via diffusion occurs when there is
    a difference between the concentration of the contaminants. Diffusion is a gradual
    process due to the random motion of the fluid particles. Advection is the process
    by which the contaminants are carried with the flow of the water through which
    it flows. Compared to diffusion and reaction, transport via advection is relatively
    fast.


    The overall behavior of contaminant transport is a manifestation of these three
    processes and consequently is modeled using differential equations that consider
    these mechanisms and mutual interactions. In the upcoming sections, we describe
    different models that can be used with contaminant transport.


    # 13.2 1D Diffusion Equation


    In hydrology, the diffusion equation is used to describe the spread of contaminants
    or pollutants in groundwater. The equation models the migration of the contaminant
    over time in the subsurface due to molecular diffusion. The diffusion coefficient
    determines the rate at which the substance spreads, while the Laplacian operator
    characterizes the spatial gradient of the concentration. The 1D diffusion equation
    can be expressed as


    $$\frac{\partial[u]}{\partial t} = D \frac{\partial^2[u]}{\partial x^2}$$


    where, $[u]$ is the concentration of the substance, $t$ is time, $D$ is the diffusion
    coefficient, and $\frac{\partial^2}{\partial x^2}$ is the Laplacian $\Delta$ operator.
    The equation describes the rate of change of the contaminant''s concentration
    with respect to the product of the diffusion coefficient $D$ and double spatial
    derivative of the concentration. Physically, $D$ states the ease with which the
    pollutant can move through a medium. Determination of this quantity is often a
    complex task but due to its importance, researchers and scientists continue to
    devise new methods for estimating its value. Some of the reasons that make it
    difficult to estimate the coefficient''s value are:


    +   - The occurrence of more than one contaminant, each having a different value
    of coefficient, can complicate the determination of a single value of the diffusion
    coefficient.

    - Generally, the environment where contaminant travels is mostly heterogeneous
    due to varying porosity, permeability, and tortuosity. These non-constant factors
    can still complicate the determination.

    - The values of the factors can change over time making determining the diffusion
    coefficient difficult.


    By solving the diffusion equation, hydrologists are able to forecast the movement
    and distribution of contaminants in groundwater over time, providing valuable
    information for assessing risks to water resources and designing remediation plans.
    The equation is also used in other hydrologic contexts, such as modeling the transport
    of pollutants in surface water or the transfer of heat in soils.'
