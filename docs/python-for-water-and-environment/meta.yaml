- md: "## 2.5 Installing External Packages\n\nInstalling external packages in an Anaconda\
    \ virtual environment is a process that involves several steps, ensuring that\
    \ the necessary software tools are correctly added to the user’s workspace. The\
    \ Conda package and environment manager included in Anaconda are used to handle\
    \ these installations.\n\n1.  **Creation of a new Conda environment:** Before\
    \ installing external packages, it is good practice to create a new Conda environment.\
    \ This isolated environment provides a separate space where packages can be installed\
    \ without interfering with the system’s base Python installation or other Conda\
    \ environments. This can be executed using the command:\n\n    ```\n    >>> conda\
    \ create --name myenv\n    ```\n\n    A new name of the environment can be provided\
    \ in place of “myenv”. As per requirement, a Python version may be specified by\
    \ appending “python=x.x” (where x.x is the version number) to the command.\n\n\
    2.  **Activating the new environment:** Prior to installing any packages, the\
    \ environment must be activated. This can be done with the command:\n\n    ```\n\
    \    >>> conda activate myenv\n    ```\n\n3.  **Installing packages:** Depending\
    \ upon the source, the packages can be installed after activating the environment,\
    \ either by using the “conda” or “pip” command. It is typical to use Conda when\
    \ the package exists in the Anaconda distribution, given its effectiveness in\
    \ handling dependencies. Issuing the following command initiates the installation:\n\
    \n    ```\n    >>> conda install package-name\n    ```\n\n    The name of the\
    \ required package can replace the “package-name”. The pip command can be used\
    \ in the case when the package is not available in the Anaconda distribution.\
    \ Pip can access packages uploaded to the Python Package Index (PyPi). To use\
    \ the following command, do: “pip install package-name”, again, replacing “package-name”\
    \ with the name of the needed package.\n\n4.  **Verifying the installation:**\
    \ It is a good idea to verify the installed packages. Issuing the “conda list”\
    \ or “pip list” commands displays the installed packages in the active environment:\n\
