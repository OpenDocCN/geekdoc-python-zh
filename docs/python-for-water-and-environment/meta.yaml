    This Python program estimates a non-parametric prediction interval on a 1D streamflow
    dataset. The script utilizes the Pandas, NumPy, and SciPy libraries, powerful
    tools for data handling, mathematical operations, and statistical analysis.


    The program begins by loading the dataset using the Pandas function “read_csv()”
    to read in a .csv file named “Godavari.csv” in the “data” directory. The “dropna()”
    method drops any missing data points from the dataset. To verify if the “time”
    column in the dataset is correctly formatted as datetime, the “to_datetime()”
    function from Pandas is used. The column named “Streamflow” is then converted
    to a NumPy array for further processing, and the original dataframe is deleted
    to conserve memory.


    Following the loading and preprocessing of the data, the program proceeds to the
    main task: the non-parametric prediction interval estimate. This task is performed
    using the “mquantiles()” function from the “mstats” module of the SciPy library.
    The function calculates the stream flow data’s quantiles (in this case, the 5th
    and 95th percentiles). These quantiles serve as the prediction interval, giving
    the range within which future observations are predicted to fall with a certain
    level of confidence (in this case, 90%). The “mquantiles()” function is called
    with the “alphap” and “betap” parameters both set to 0, which specifies that it
    should use the 6th type of quantile estimation method as used in the statistical
    software “R”. The lower and upper bounds of the prediction interval are then printed
    to the console.


    # 9.3.2 One-Sided Non-parametric Prediction Interval


    A one-sided non-parametric prediction interval for quantiles is a statistical
    estimate that provides a lower or upper bound, but not both, within which a future
    observation will fall with a certain probability. It relies on the empirical distribution
    of the data, rather than making assumptions about the underlying population distribution
    (Fig. 9.8).'
