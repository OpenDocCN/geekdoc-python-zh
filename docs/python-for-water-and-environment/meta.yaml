  md: '# Chapter 12

    Subsurface Flow Models


    # 12.1 Seepage Flow Model


    Seepage flow models form an integral part of subsurface hydrological studies,
    focusing on the simulation and quantification of fluid movement through porous
    media such as soil, rock, and sediment. These models are critical for understanding
    groundwater dynamics, as they provide valuable insights into the distribution,
    recharge, and discharge of aquifers, as well as the interactions between groundwater
    and surface water systems. Seepage flow models are also vital in addressing issues
    related to water quality, soil moisture, and contaminant transport, which have
    significant implications for agriculture, water supply, and environmental protection.


    The foundation of seepage flow models lies in Darcy’s law, which relates the fluid
    velocity to the hydraulic conductivity and hydraulic gradient within the porous
    medium. Coupled with the principle of mass conservation, these models describe
    the flow of water through unsaturated and saturated zones, accounting for factors
    such as soil properties, heterogeneity, and anisotropy. Numerical methods, such
    as finite difference and finite element techniques, are often employed to solve
    the governing equations of seepage flow models, allowing for the accurate representation
    of complex subsurface conditions and boundary conditions.


    # 12.1.1 Variational Formulation


    The strong form of the seepage flow model needs to be solved,


    ```

    $$\sigma + \nabla u = 0 \quad \text{in } \Omega \qquad (12.1)$$

    $$\nabla \cdot \sigma = f \quad \text{in } \Omega \qquad (12.2)$$

    ```


    subject to the following boundary condition:'
  merge: -1
  pgno: 215
- img_proc: true
  md: '$u = u_0$ on $\partial D$ (12.3)


    $-\sigma \cdot \hat{n} = g$ on $\partial N$ (12.4)


    where, the boundary, $\partial \Omega = \partial D \cup \partial N$. The corresponding
    weak form of Eqs. 12.1 and 12.2 can be given as


    $\langle \sigma, \tau \rangle + \langle \nabla u, \tau \rangle + \langle \sigma,
    \nabla v \rangle = -\langle \hat{n}, \sigma \rangle * v$ (12.5)


    In the above equations, $\sigma$ represents the vector variable, and the velocity,
    and $u$ represents the scalar variable, and pressure.


