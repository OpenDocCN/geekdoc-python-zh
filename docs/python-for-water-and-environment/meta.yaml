    \ - (1/2) * ln(1 + (sig^2 / mu^2))\nsig_ = (ln(1 + (sig^2 / mu^2)))**0.5\n\"\"\
    \"\nfit = norm.fit(data=data)  # fit Normal distribution (MLE)\nmu, scale = fit\
    \  # in Normal distribution\n\nN = int(data.shape[0]/2)  # generate N samples\n\
    samples = norm.rvs(loc=mu, scale=scale, size=N)\n\nplt.hist(samples,  # Plot MLE\
    \ estimated distribution\n         density=True, bins=100, log=True,\n       \
    \  label=\"log(data$_{\" + \"MLE\" + \"}$)\",\n         alpha=.6)\nplt.xlabel(\"\
    Streamflow (m$^3$/s)\")\nplt.ylabel(\"log(Frequency)\")\nplt.legend()\nplt.grid(ls=\"\
    --\")\nplt.tight_layout()\nplt.savefig(\"streamflow_log_hist.pdf\", dpi=300)\n\
    ```\n\nThis Python script demonstrates the maximum likelihood estimation (MLE)\
    \ process for log-normal data using a dataset of streamflow measurements. It utilizes\
    \ the “scipy.stats” and “NumPy” libraries for statistical and mathematical operations,\
    \ “matplotlib.pyplot” for plotting, and “Pandas” for data handling.\n\nThe script\
    \ starts by setting a random seed for reproducibility and enabling the use of\
    \ LaTeX for text formatting in matplotlib. It then loads a dataset from a .csv\
    \ file located in the given path. After loading, it eliminates null values from\
    \ the dataset and isolates the “Streamflow” data. It retains only positive streamflow\
    \ data and applies a log10 transformation to it.\n\nFollowing the data preparation,\
    \ the script visualizes the log-transformed data by plotting a histogram, which\
    \ shows the log of the frequency of streamflow data against streamflow in cubic\
    \ meters per second (m³/s).\n\nAfter the preliminary visualization, the script\
    \ proceeds to fit a normal distribution to the log-transformed streamflow data\
    \ using the fit function from the “scipy.stats” library’s “norm” module, which\
    \ employs the method of maximum likelihood estimation.\n\n![](img/0c8a53eeca13bc4d5422655fb7aaba77_177_0.png)\n\
    \nmation (MLE). The fit function returns the estimated parameters of the normal\
    \ distribution: the mean (“mu”) and the standard deviation (“scale”).\n\nThe script\
    \ then generates a set of random samples from the fitted normal distribution,\
    \ with the number of samples (“N”) being half the size of the original dataset.\n\
    \nFinally, the script creates another histogram of the generated samples, superimposing\
    \ it on the original histogram (Fig. 9.12). This second histogram represents the\
    \ fitted normal distribution based on the maximum likelihood estimation. The script\
    \ saves the final figure as a PDF file. By comparing the two histograms in the\
    \ figure, one can visually assess the goodness-of-fit of the MLE-based normal\
    \ distribution to the original log-transformed streamflow data.\n\n## 9.6 Monte\
    \ Carlo Uncertainty Propagation\n\nMonte Carlo uncertainty propagation is an effective\
    \ technique for quantifying and managing the uncertainty inherent in mathematical\
    \ models, including those used in hydrology, engineering, finance, and other fields.\
    \ This method uses random sampling to evaluate model output uncertainty based\
    \ on model inputs’ uncertainties.\n\nThe key concept behind Monte Carlo uncertainty\
    \ propagation is that uncertainty in the inputs of a model leads to uncertainty\
    \ in the output of the model. If we can represent the uncertainty in the inputs\
    \ as probability distributions, we can use these distributions to generate multiple\
    \ sets of input data. We can then run the model with each of these input sets\
    \ and observe the resulting distribution of outputs. This output distribution\
    \ estimates the uncertainty in the model’s predictions.\n\nMonte Carlo methods\
    \ are handy when dealing with complex, nonlinear models where analytical solutions\
    \ for uncertainty propagation are challenging or impossible to derive. However,\
    \ they can be computationally intensive, especially for complex models or when\
    \ a high precision is required.\n\nMonte Carlo uncertainty propagation provides\
    \ valuable insights into the behavior of a system under uncertainty, allowing\
    \ competent decision-making. Exploring a wide range of possible outcomes helps\
    \ identify potential risks and opportunities, supporting risk management, design\
    \ optimization, and scenario analysis. It has become an indispensable tool requiring\
    \ sophisticated uncertainty analysis and decision-making under uncertainty.\n\n\
    ```python\n\"\"\"\nMonte Carlo error propagation\non a simple forward model:\n\
    Manning's equation\nV = (1/n) * R^(2/3) * S^(1/2),\nwhere,\nV is the flow velocity,\n\
    n is the Manning's roughness coefficient,\nR is the hydraulic radius, and\nS is\
    \ the channel slope\n\"\"\"\n\nimport numpy as np\nfrom scipy import stats\nimport\
    \ matplotlib.pyplot as plt\n\nplt.rc('text', usetex=True)\nnp.random.seed(11)\n\
    \ndef compute_velocity(n=1., b=1., h=1., S=1.):\n    R = (b * h) / (2 * b + h)\n\
    \    V = (1 / n) * R ** (2 / 3) * S ** (1 / 2)\n    return V\n\n\"\"\"\nMonte-Carlo\
    \ simulation #1\n\"\"\"\nNsim = 100000\nn_var = stats.halfnorm.rvs(loc=0.030,\
    \ scale=1e-2, size=Nsim)\nb_var = stats.norm.rvs(loc=2.0, scale=1e-1, size=Nsim)\n\
    h_var = stats.norm.rvs(loc=1.3, scale=1e-1, size=Nsim)\nS_var = stats.norm.rvs(loc=np.tan(15\
    \ * np.pi / 180),\n                       scale=1e-2, size=Nsim)\ndata = np.vstack([n_var,\
    \ b_var, h_var, S_var]).T\n\nV_var = np.zeros_like(n_var)\nfor i in range(Nsim):\n\
    \    V_var[i] = compute_velocity(\n        n=data[i, 0],\n        b=data[i, 1],\n\
    \        h=data[i, 2],\n        S=data[i, 3]\n    )\n\ndef normal_distribution(x,\
    \ mu, sig):\n    rv = 1.0 / (sig * np.sqrt(2.0 * np.pi))\n    normal_values =\
    \ rv * np.exp(\n        -(x - mu) ** 2.0 / (2.0 * sig ** 2)\n    )\n    return\
    \ normal_values\n\n# Plots\nxmin, xmax = V_var.min(), V_var.max()\nx = np.linspace(xmin,\
    \ xmax, Nsim)\ny = normal_distribution(x, np.mean(V_var), np.std(V_var))\n\nplt.hist(V_var,\
    \ density=True, bins=150,\n         label=\"$V_{\" + \"MC\" + \"}$\")\nplt.plot(x,\
    \ y, color='red', lw=3, label=\"Normal\")\nplt.xlabel(\"Velocity (m/s)\")\nplt.ylabel(\"\
    Relative Probability\")\nplt.xlim(xmin, xmax)\nplt.legend()\nplt.grid(ls=\"--\"\
    )\nplt.tight_layout()\nplt.savefig(\"mc1.pdf\", dpi=300)\n\n\"\"\"\nMonte-Carlo\
