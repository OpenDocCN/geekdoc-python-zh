  mdcn: "## 9.2 置信区间\n\n### 9.2.3.2 置信区间估计\n\n分位数的置信区间估计提供了一个范围，该范围很可能包含总体的特定分位数。这是一种用于统计推断的技术，它基于来自总体的随机样本，对分位数真实值所在的位置进行概率性评估（图\
    \ 9.6）。\n\n![](img/0c8a53eeca13bc4d5422655fb7aaba77_160_0.png)\n\n图 9.6 对数正态径流数据的双侧置信区间估计\n\
    \n```python\n\"\"\"\nProgram for confidence interval estimate\non 1D stream flow\
    \ lognormal data\n\"\"\"\nimport pandas as pd\nfrom scipy.stats import (norm,\
    \ binom, tmean, tstd,\n                        t, nct, bootstrap, mstats)\nimport\
    \ numpy as np\n\n\"\"\"\nLoad dataset\n\"\"\"\ndata = pd.read_csv(\n    filepath_or_buffer=\"\
    ../data/Godavari.csv\",\n    sep=\",\",\n    header=0).dropna()\nprint(\"\\nChecking\
    \ data:\")\ntry:\n    data[\"time\"] = pd.to_datetime(\n        data['time'],\
    \ infer_datetime_format=True)\n    print(\"    Date format is okay!\\n\")\nexcept\
    \ ValueError:\n    print(\"    Encountered error!\\n\")\n    pass\n\nx = data[[\"\
    Streamflow\"]].to_numpy().squeeze()\ndel data\nprint(\"Read data file\")\n\n\"\
    \"\"\nConfidence interval estimate assuming\nlognormal data\n\"\"\"\n\nprint(\"\
    \\n\\nDoing CI estimate\")\nminx = np.min(x)\nlogx = np.log(x - minx + 1)\nxbar\
    \ = tmean(logx)\nxstd = tstd(logx)\nn = len(x)\n\nqnt = norm.ppf(q=[0.9])\nC90\
    \ = np.exp(xbar + qnt * xstd)\n\nnc = -5 * qnt\nqnt = nct.ppf(q=[0.05, 0.95],\
    \  # non-central t distribution\n              df=n - 1,\n              nc=nc,\n\
    \              loc=0, scale=1)\n\nprint(\"{:.4f} < C90 < {:.4f}\".\n      format(np.exp(xbar\
    \ - 1 / np.sqrt(n) * qnt[1] * xstd),\n             np.exp(xbar - 1 / np.sqrt(n)\
    \ * qnt[0] * xstd)\n             )\n      )\nprint(\"\\nDone!\")\n```\n\n该程序首先导入必要的模块，包括用于数据操作的\
    \ Pandas、用于数值计算的 NumPy 以及用于各种统计计算的 scipy.stats。\n\n加载主要库后，使用 Pandas 的 `read_csv()`\
    \ 函数加载数据集，指定文件路径和逗号作为分隔符，并删除任何缺失值。加载的数据会被检查，并使用 Pandas 的 `to_datetime` 函数将“time”列转换为日期时间对象。如果由于格式不正确导致转换失败，程序会捕获\
    \ `ValueError` 并显示错误消息。\n\n然后，从数据中提取“Streamflow”列，将其转换为 NumPy 数组，并通过 `squeeze`\
    \ 操作将其展平为一维。原始数据变量被删除以节省内存。\n\n接下来，程序计算置信区间估计，假设径流数据服从对数正态分布。为了处理对数正态分布，程序对径流值取自然对数，取对数前先进行平移，使最小值变为\
    \ 1。\n\n计算对数转换后数据的均值（xbar）和标准差（xstd），并存储数据点数量（n）。然后，程序使用标准正态分布的累积分布函数（`norm.ppf`）计算\
    \ 0.9 分位数（qnt）。\n\n接着，使用自然对数的逆运算（`np.exp`）计算对数转换后数据均值的 90% 置信水平（C90）。程序计算非中心参数（nc），并使用计算出的参数计算非中心\
    \ t 分布（`nct.ppf`）的第 5 和第 95 百分位数。\n\n最后，程序打印原始数据均值（从对数转换尺度转换回来后）的 90% 置信区间的下限和上限。结果给出了一个值范围，该范围以\
    \ 90% 的概率包含径流数据的真实均值。\n\n## 9.3 预测区间\n\n### 9.3.1 非参数预测区间\n\n分位数的非参数预测区间是一种估计未来观测值可能落入范围的方法，无需对底层分布做出假设。当数据不遵循已知或易于识别的分布时，这种方法特别有用，它依赖于实际的数据结构（图\
    \ 9.7）。\n\n![](img/0c8a53eeca13bc4d5422655fb7aaba77_162_0.png)\n\n图 9.7 非参数预测区间\n\
    \n```python\n\"\"\"\nProgram for non-parametric confidence\ninterval estimate\
    \ on 1D stream flow data\n\"\"\"\nimport pandas as pd\nfrom scipy.stats import\
    \ (norm, binom, tmean, tstd,\n                        t, nct, bootstrap, mstats)\n\
    import numpy as np\n\n\"\"\"\nLoad dataset\n\"\"\"\ndata = pd.read_csv(\n    filepath_or_buffer=\"\
    ../data/Godavari.csv\",\n    sep=\",\",\n    header=0).dropna()\nprint(\"\\nChecking\
    \ data:\")\ntry:\n    data[\"time\"] = pd.to_datetime(\n        data['time'],\
    \ infer_datetime_format=True)\n    print(\"   Date format is okay!\\n\")\nexcept\
    \ ValueError:\n    print(\"   Encountered error!\\n\")\n    pass\nx = data[[\"\
    Streamflow\"]].to_numpy().squeeze()\ndel data\nprint(\"Read data file\")\n\n\"\
    \"\"\nNon-parametric confidence interval estimate on\npercentile data\n\"\"\"\n\
    print(\"\\n\\nDoing non-parametric CI estimate\")\nprob = 0.2\npercentile = mstats.mquantiles(\
    \  # value of quantile\n    a=x, prob=prob,\n    alphap=0, betap=0\n    )\nprint(\"\
    Quantile value =\", percentile)\n\nqnt = binom.ppf(q=[0.025, 0.975],  # position\
    \ of quantiles\n                n=len(x), p=prob,\n                loc=0)\nqnt\
    \ = np.cast[int](qnt)\nprint(\"95% CI positions =\", qnt)\n\nresult = binom.pmf(k=np.arange(qnt[0]-1,\
    \ qnt[1]),\n                   n=len(x),\n                   p=prob,\n       \
    \            loc=0)\nprint(\"Probability sum upto 0.2 =\", result.sum())\n\n#\
    \ Using bootstrap method\ndef percentile_statistic(data, axis=1):\n    percentile\
    \ = mstats.mquantiles(  # value of quantile\n        a=data, prob=0.2,\n     \
    \   alphap=0, betap=0, axis=axis\n    )\n    percentile = np.squeeze(percentile)\n\
    \    return percentile\n\nx = (x,)\nci = bootstrap(data=x,\n                statistic=percentile_statistic,\n\
    \                confidence_level=0.95,\n                n_resamples=10000,\n\
    \                method=\"percentile\")\n\n# Get the lower and upper bounds of\
    \ the confidence interval\nlower_bound = ci.confidence_interval.low\nupper_bound\
    \ = ci.confidence_interval.high\n\nprint(\"\\n\\n{}th Percentile Bootstrap Confidence\
    \ Interval:\"\n      .format(prob*100))\nprint(f\"Lower Bound: {lower_bound}\"\
    )\nprint(f\"Upper Bound: {upper_bound}\")\n\nprint(\"\\nDone!\")\n```\n\n```\n\
    >>> Checking data:\n>>>     Date format is okay!\n>>> Read data file\n>>> Doing\
    \ non-parametric CI estimate\n>>> Quantile value = [2.]\n>>> 95% CI positions\
    \ = [1741 1890]\n>>> Probability sum upto 0.2 = 0.9508722528448205\n>>> 20.0th\
    \ Percentile Bootstrap Confidence Interval:\n>>> Lower Bound: 1.80600000000000014\n\
    >>> Upper Bound: 2.2\n>>> Done!\n```\n\n上面演示的 Python 程序对一维径流数据集执行非参数置信区间估计。\n\n\
    首先，导入 Pandas 和 SciPy 库，分别用于数据操作和统计计算。数据集从名为“Godavari.csv”的 .csv 文件加载。“time”列被转换为日期时间格式以进行时间序列分析。\n\
    \n加载主要库后，从“Streamflow”列提取数据并转换为 NumPy 数组以进行后续计算。由于本分析的重点是径流数据，原始的 Pandas 数据框被删除以释放内存。\n\
    \n下一阶段涉及执行非参数置信区间估计。程序首先计算在所选概率（本例中为 20%）下的分位数值。然后确定 95% 置信区间（CI）的位置。这些位置代表落在\
    \ CI 下限和上限内的观测值数量。\n\n程序接着计算落入 95% CI 的径流值的概率之和。此操作本质上给出了数据在 20% 分位数处落在 CI 内的累积概率。\n\
    \n程序的后半部分引入了 bootstrap 方法作为估计置信区间的替代方法。定义了一个新函数“percentile_statistic”，用于计算 bootstrap\
    \ 样本的 20% 分位数值。\n\n通过“bootstrap”函数实现的 bootstrap 方法从原始数据生成多个重采样，对每个重采样应用“percentile_statistic”函数，从而计算出一组\
    \ bootstrap 分位数估计值。生成的重采样数量设置为 10,000，置信水平设置为 95。\n\n然后，程序打印 20% 分位数的 bootstrap\
    \ 95% CI 的下限和上限。这些界限告诉我们，基于我们的 bootstrap 样本，总体的真实 20% 分位数很可能以 95% 的置信度落在该范围内。"
