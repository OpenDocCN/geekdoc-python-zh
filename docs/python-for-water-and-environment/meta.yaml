    # 13.5.3 Variational Formulation


    The variational formulation of the Navier-Stokes equation consists of three parts.
    The first part can be given as


    $$\int_{\Omega} \frac{\rho_w}{dt} \langle u - u_n, v \rangle dx + \int_{\Omega}
    \langle \frac{3}{2} u_n - \frac{1}{2} u_{n1}, \frac{1}{2} \nabla (u + u_n) \rangle,
    v \rangle dx + \int_{\Omega} \frac{1}{2} \mu \langle \nabla (u + u_n), \nabla
    v \rangle dx - \int_{\Omega} \langle p, \nabla \cdot v \rangle dx + \int_{\Omega}
    \langle f, v \rangle dx = 0$$


    where, $\rho_w$ is the density of water, $u$ denotes the velocity at the current
    step. $u_n, u_{n1}$ denote the first and second steps from the current step in
    the past within a time loop. $v$ denotes the test function, $p$ is the pressure
    and $f$ is the source function.'
