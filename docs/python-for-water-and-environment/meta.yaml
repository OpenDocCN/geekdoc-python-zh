    h_var = stats.norm.rvs(loc=1.3, scale=1e-1, size=Nsim)\nS_var = stats.norm.rvs(loc=np.tan(15\
    \ * np.pi / 180),\n                      scale=1e-2, size=Nsim)\ndata = np.vstack([n_var,\
    \ b_var, h_var, S_var]).T\n\nV_var = np.zeros_like(n_var)\nfor i in range(Nsim):\n\
    \    V_var[i] = compute_velocity(\n        n=data[i, 0],\n        b=data[i, 1],\n\
    \        h=data[i, 2],\n        S=data[i, 3])\n\n# Plots\nxmin, xmax = V_var.min(),\
    \ V_var.max()\nx = np.linspace(xmin, xmax, Nsim)\ny = normal_distribution(x, np.mean(V_var),\
    \ np.std(V_var))\n\nplt.figure()\nplt.hist(V_var, density=True, bins=150,\n  \
    \       label=\"$V_{\" + \"MC\" + \"}$\")\nplt.plot(x, y, color='red', lw=3, label=\"\
    Normal\")\nplt.xlabel(\"Velocity (m/s)\")\nplt.ylabel(\"Relative Probability\"\
    )\nplt.xlim(xmin, xmax)\nplt.legend()\nplt.grid(ls=\"--\")\nplt.tight_layout()\n\
    plt.savefig(\"mc2.pdf\", dpi=300)\n```\n\nThe above program applies Monte Carlo\
    \ simulation to propagate errors in Manning's equation, a commonly used formula\
    \ in fluid dynamics to estimate the velocity of flow in an open channel.\n\nThe\
    \ program begins by defining Manning's equation as a function, where the flow\
    \ velocity V is computed based on Manning's roughness coefficient (n), the hydraulic\
    \ radius (R), and the channel slope (S).\n\nThen, the Monte Carlo simulation is\
    \ conducted in two parts, each with 100,000 iterations. In each simulation, random\
    \ values for the parameters n, b (width), h (height), and S are generated following\
    \ specific statistical distributions. The half-normal distribution is used for\
