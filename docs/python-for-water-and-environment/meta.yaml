    They describe a variety of data types to model, analyze, and predict water-related
    phenomena in the hydrological cycle. These data types can be broadly classified
    into spatial data, temporal data, and data from hydrological model outputs.


    +   1. **Spatial Data:** Spatial data are data that describe or contain information
    about objects, events, and phenomena related to Earth’s surface. These include
    topography, land use, soil type, vegetation cover, etc. For example, a Digital
    Elevation Model (DEM) provides topographic data, which is essential for understanding
    catchment characteristics, flow direction, and flow accumulation in hydrological'
