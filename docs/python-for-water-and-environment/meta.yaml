    the PETSc options. The solver type is set to “preonly” with an LU preconditioner
    and the MUMPS solver for efficient solution of the linear system. The linear problem
    is solved using the specified solver configuration and boundary conditions. The
    solution is split into velocity and pressure components. The results are then
