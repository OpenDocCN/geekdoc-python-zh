    One common form is inappropriate scale manipulation. This involves adjusting the
    y-axis (or x-axis) to make changes or differences appear larger or smaller than
    they are. For instance, a graph showing a slight increase in river pollution levels
    over time might use a truncated y-axis to make the increase seem more drastic.


    Another form is cherry-picking data, which involves selecting and displaying only
    data that supports a certain conclusion while ignoring the rest. In hydrology,
    this might mean selectively presenting data from years with high rainfall to suggest
    an upward trend in precipitation, while neglecting years with low rainfall.


    Misrepresentation of spatial data on maps is also frequently issued. This could
    involve using inappropriate color scales, distorting geographical areas, or neglecting
    to provide a key for interpretation.


    Sometimes, complex hydrological phenomena can be oversimplified, leading to the
    loss of crucial information. For example, representing a multidimensional water
    quality index with a single color or number might oversimplify the situation and
    overlook crucial details.


    Misleading graphics can significantly distort scientific communication in hydrology,
    leading to misinterpretations and misinformation. As such, it is vital for researchers,
    reviewers, and readers to keep a critical eye when creating or interpreting graphics,
    to ensure the integrity and accuracy of scientific research in hydrology.'
- md: "## Part II\n\n## Statistical Modeling in Hydrology\n\n## Chapter 6\nCurve Fitting\
    \ and Regression Analysis\n\nCurve fitting and regression analysis are powerful\
    \ statistical tools used widely in hydrological data modeling. They can be used\
    \ to model underlying relationships between data, allowing you to interpret and\
    \ predict hydrological behavior under varying conditions.\n\nCurve fitting involves\
    \ fitting a function on a set of data points that best represents the underlying\
    \ trend in the dataset. Curve fitting supports essential tasks such as deriving\
    \ intensity-duration-frequency (IDF) curves for rainfall, which describe the occurrence\
    \ frequency, duration, and intensity of a rain event. These curves are critical\
    \ for managing flood risk and designing effective dams, reservoirs, or drainage\
    \ systems. Likewise, they also help in modeling hydrographs, a way to depict the\
    \ water flow rate over time, and anticipating and managing river discharge patterns.\n\
    \nRegression analysis, a form of curve fitting, is often used to model the relationship\
    \ between two or more variables. This technique determines the equation that best\
    \ describes the dependent variable in terms of the independent variables. Rainfall-runoff\
    \ modeling can use regression analysis to establish the relationship between streamflow\
    \ (dependent variable) and rainfall (independent variable). This relationship\
    \ is vital for water resource management, water availability, and forecasting\
    \ of floods. It also finds applications in estimating the groundwater recharge\
    \ rates from the rate of recharge and depletion over time and in pumping tests\
    \ for drawdown curve modeling and estimating important aquifer parameters such\
    \ as hydraulic conductivity.\n\nAnalysis of water quality parameters is another\
    \ application of regression analysis in environmental engineering. It can help\
    \ establish relationships between concentrations of pollutants and factors like\
    \ flow rate, temperature, and land-use characteristics.\n\nThese relationships\
    \ can influence processes of water treatment and water pollution controlling strategies.\n\
    \nCurve fitting and regression analysis play a crucial role in the study of the\
    \ impacts of climate change on hydrological processes. It allows hydrologists\
    \ to relate hydrological variables such as evapotranspiration, precipitation,\
    \ and runoff to climate variables like temperature and carbon dioxide concentrations.\
    \ These models also become essential in predicting future water availability and\
    \ adaptation strategies under changing climate scenarios.\n\nAlthough these techniques\
    \ are immensely beneficial, it is essential to note that they are based on the\
    \ assumption that the relationships will also hold in the future. Therefore, one\
    \ should appropriately address the associated uncertainties in respective studies.\n\
    \nCurve fitting and regression analysis are invaluable in hydrology, offering\
    \ insights into complex hydrological processes, influencing water resource management,\
    \ and helping predict future scenarios. By uncovering patterns and relationships\
    \ in historical data, these tools contribute significantly to our understanding\
    \ and stewardship of water systems. In the following sections, we describe the\
    \ simple, multiple, and nonlinear regression techniques.\n\n### 6.1 Simple Linear\
    \ Regression of Flow\n\nSimple linear regression is a common statistical method\
    \ for estimating the relationship between one dependent and one independent variable.\
    \ The dependent variable is sometimes called the target and the independent variable\
    \ is called the covariate, a feature, or a predictor. A linear regression model\
    \ is given by the following equation:\n\n$$y = \\beta_0 + \\beta_1 x_1 + \\beta_2\
    \ x_2 \\cdots + \\beta_p x_p + \\epsilon$$\n\nwhere $\\beta_j$ denotes the coefficients\
    \ of the predictors, $x_j$, and $\\epsilon$ is the associated random error independent\
    \ of the predictors. The aim of linear regression is to estimate the coefficients\
    \ $\\beta_j$ using the method of least squares.\n\nIn the associated program,\
    \ we build a regression model between streamflow and water level for the Godavari\
    \ basin data. The regression equation for this case can be given as\n\n$$\\text{Streamflow}\
    \ = \\beta_0 + \\beta_1 * \\text{Water Level}$$\n\n```python\n\"\"\"\nProgram\
    \ to do simple linear\nregression on the Godavari\nstreamflow data\n\"\"\"\n\n\
    # Import libraries\nimport pandas as pd\nimport numpy as np\nfrom sklearn.linear_model\
    \ import LinearRegression\nfrom sklearn.model_selection import train_test_split\n\
    import matplotlib.pyplot as plt\nimport seaborn as sns\n\nsavePlots = 1\n\n\"\"\
    \"\nLoad dataset\n\"\"\"\ndata = pd.read_csv(\n    filepath_or_buffer=\"../data/Godavari.csv\"\
    ,\n    sep=\",\",\n    header=0).dropna()\nprint(\"\\nChecking data:\")\ntry:\n\
    \    data[\"time\"] = pd.to_datetime(\n        data['time'], infer_datetime_format=True)\n\
    \    print(\"    Date format is okay!\\n\")\nexcept ValueError:\n    print(\"\
    \    Encountered error!\\n\")\n    pass\ndf = data[[\"time\", \"Pressure\",\n\
    \           \"Rel_humidity\", \"Level\", \"Streamflow\"]]\ndel data\nprint(\"\
    Read data file\")\n\ndf.head()\n\n\"\"\"\nData preprocessing\n\"\"\"\n\n\"\"\"\
    \nLinear Regression model fitting\n\"\"\"\nlinearRegression = LinearRegression()\n\
    linearRegression.fit(X_train, y_train)\nb0, b1 = linearRegression.intercept_,\
    \ linearRegression.coef_[0]\nprint(\"\\n\\nEstimated parameters: \"\n      \"\\\
    n   (b0, b1) = ({:.2f}, {:.2f})\".\n      format(b0, b1))\nprint(\"R-squared value:\
    \ \\n   R^2 = {:.2f}\".\n      format(linearRegression.score(X_train, y_train)))\n\
    \n\"\"\"\nVisualization of results\n\"\"\"\n# Plot the datapoints\nsns.scatterplot(x=np.squeeze(X_train),\
    \ y=y_train)\nplt.grid(ls=\"--\")\nplt.xlabel(\"Level (m)\")\nplt.ylabel(\"Streamflow\
    \ (cumecs)\")\n\n# Plot regression line\nx1, x2 = np.min(X), np.max(X)\ny1, y2\
    \ = (b1*x1 + b0), (b1*x2 + b0)\nplt.plot([x1, x2], [y1, y2], 'r-', label=\"Linear\
    \ Model\")\nplt.legend()\nplt.grid(ls=\"--\")\n\n# Tidying the plot\nplt.tight_layout()\n\
    plt.show()\nplt.savefig(\"linearReg_.pdf\", dpi=300)\n\nprint(\"Done!!\")\n```\n\
    \n```\n>>> time Pressure Rel_humidity Level Streamflow\n>>> 0 1981-01-01 97416.18\
    \ 60.102580 167.60 10.5\n>>> 1 1981-01-02 97340.45 58.449010 167.59 10.3\n>>>\
    \ 2 1981-01-03 97306.44 58.281210 167.59 10.2\n>>> 3 1981-01-04 97270.30 57.049640\
    \ 167.59 10.4\n>>> 4 1981-01-05 97371.98 57.171913 167.58 10.0\n>>> \n>>> Estimated\
    \ parameters:\n>>> (b0, b1) = (-41624.79, 248.61)\n>>> R-squared value:\n>>> R^2\
    \ = 0.91\n```\n\nThe given program performs simple linear regression on the Godavari\
    \ streamflow data. It uses several libraries, namely pandas, NumPy, sklearn, matplotlib,\
    \ and Seaborn for data manipulation, mathematical operations, modeling, and data\
    \ visualization.\n\nThe first stage of the program involves loading the dataset.\
    \ The data is read from a CSV file named “Godavari.csv” using pandas “read_csv()”\
    \ function and any rows with missing data are removed. An attempt is then made\
    \ to convert the “time” column of the dataset into a datetime format using pandas\
    \ “to_datetime()” function. The data of interest, i.e., the “time”, “Pressure”,\
    \ “Rel_humidity”, “Level”, and “Streamflow” columns, are extracted into a new\
    \ dataframe “df”.\n\nThe program then enters the data preprocessing stage. Here,\
    \ the “Level” column (the independent variable) is reshaped into a 2D array to\
    \ be used as the feature (X) for the linear regression model. The “Streamflow”\
    \ column (the dependent variable) is the target (y). This data is split into training\
    \ and testing sets using the “train_test_split()” function from sklearn’s “model_selection”\
    \ module, with 33% of the data held out for testing. It may be noted that the\
    \ “train_test_split()” function splits the data randomly as per the given ratio\
    \ “test_size”. However, for the retrievability of the results a “random_state”\
    \ is defined. The results may vary for a different value of “random_state”.\n\n\
    Following data preprocessing, the linear regression model is instantiated and\
    \ fitted using the training data. The intercept and coefficient of the linear\
    \ model are printed, along with the R-squared value, a measure of how well the\
    \ linear model fits the data.\n\nFinally, the results are visualized using matplotlib\
    \ and Seaborn libraries. A scatterplot of “Level” versus “Streamflow” is created,\
    \ on top of which the best-fit line generated by the linear regression model is\
    \ superimposed. The resulting figure is displayed (Fig. 6.1) and then saved as\
    \ a PDF file named “linearReg_.pdf” for future reference."
  mdcn: "## 第二部分\n\n## 水文学中的统计建模\n\n## 第六章\n曲线拟合与回归分析\n\n曲线拟合和回归分析是水文数据建模中广泛使用的强大统计工具。它们可用于建模数据之间的潜在关系，使你能够解释和预测不同条件下的水文行为。\n\
    \n曲线拟合涉及在一组数据点上拟合一个函数，以最佳方式表示数据集中的潜在趋势。曲线拟合支持诸如推导降雨的强度-历时-频率（IDF）曲线等基本任务，这些曲线描述了降雨事件的发生频率、历时和强度。这些曲线对于管理洪水风险和设计有效的坝、水库或排水系统至关重要。同样，它们也有助于建模水文过程线（一种描述水流速率随时间变化的方式），以及预测和管理河流流量模式。\n\
    \n回归分析是曲线拟合的一种形式，常用于建模两个或多个变量之间的关系。该技术确定能最好地用自变量描述因变量的方程。降雨-径流建模可以使用回归分析来建立河流流量（因变量）与降雨量（自变量）之间的关系。这种关系对于水资源管理、水资源可用性和洪水预报至关重要。它还应用于估算地下水补给速率（基于随时间变化的补给和消耗速率）以及抽水试验中的降深曲线建模和估算重要的含水层参数（如水力传导率）。\n\
    \n水质参数分析是回归分析在环境工程中的另一个应用。它可以帮助建立污染物浓度与流量、温度和土地利用特征等因素之间的关系。\n\n这些关系会影响水处理过程和水污染控制策略。\n\
    \n曲线拟合和回归分析在研究气候变化对水文过程的影响方面发挥着至关重要的作用。它使水文学家能够将蒸散发、降水和径流等水文变量与温度和二氧化碳浓度等气候变量联系起来。这些模型在预测未来水资源可用性和气候变化情景下的适应策略方面也变得至关重要。\n\
    \n尽管这些技术非常有益，但必须注意它们基于一个假设，即这些关系在未来也将成立。因此，应在各自的研究中适当处理相关的不确定性。\n\n曲线拟合和回归分析在水文学中具有不可估量的价值，为复杂的水文过程提供见解，影响水资源管理，并有助于预测未来情景。通过揭示历史数据中的模式和关系，这些工具极大地促进了我们对水系统的理解和管理。在接下来的章节中，我们将描述简单、多元和非线性回归技术。\n\
    \n### 6.1 流量的简单线性回归\n\n简单线性回归是一种常用的统计方法，用于估计一个因变量和一个自变量之间的关系。因变量有时称为目标变量，自变量称为协变量、特征或预测变量。线性回归模型由以下方程给出：\n\
    \n$$y = \\beta_0 + \\beta_1 x_1 + \\beta_2 x_2 \\cdots + \\beta_p x_p + \\epsilon$$\n\
    \n其中 $\\beta_j$ 表示预测变量 $x_j$ 的系数，$\\epsilon$ 是与预测变量无关的随机误差。线性回归的目标是使用最小二乘法估计系数\
    \ $\\beta_j$。\n\n在相关程序中，我们为戈达瓦里流域数据建立了河流流量和水位之间的回归模型。该案例的回归方程可表示为\n\n$$\\text{河流流量}\
    \ = \\beta_0 + \\beta_1 * \\text{水位}$$\n\n```python\n\"\"\"\nProgram to do simple\
    \ linear\nregression on the Godavari\nstreamflow data\n\"\"\"\n\n# Import libraries\n\
    import pandas as pd\nimport numpy as np\nfrom sklearn.linear_model import LinearRegression\n\
    from sklearn.model_selection import train_test_split\nimport matplotlib.pyplot\
    \ as plt\nimport seaborn as sns\n\nsavePlots = 1\n\n\"\"\"\nLoad dataset\n\"\"\
    \"\ndata = pd.read_csv(\n    filepath_or_buffer=\"../data/Godavari.csv\",\n  \
    \  sep=\",\",\n    header=0).dropna()\nprint(\"\\nChecking data:\")\ntry:\n  \
    \  data[\"time\"] = pd.to_datetime(\n        data['time'], infer_datetime_format=True)\n\
    \    print(\"    Date format is okay!\\n\")\nexcept ValueError:\n    print(\"\
    \    Encountered error!\\n\")\n    pass\ndf = data[[\"time\", \"Pressure\",\n\
    \           \"Rel_humidity\", \"Level\", \"Streamflow\"]]\ndel data\nprint(\"\
    Read data file\")\n\ndf.head()\n\n\"\"\"\nData preprocessing\n\"\"\"\n\n\"\"\"\
    \nLinear Regression model fitting\n\"\"\"\nlinearRegression = LinearRegression()\n\
    linearRegression.fit(X_train, y_train)\nb0, b1 = linearRegression.intercept_,\
    \ linearRegression.coef_[0]\nprint(\"\\n\\nEstimated parameters: \"\n      \"\\\
    n   (b0, b1) = ({:.2f}, {:.2f})\".\n      format(b0, b1))\nprint(\"R-squared value:\
    \ \\n   R^2 = {:.2f}\".\n      format(linearRegression.score(X_train, y_train)))\n\
    \n\"\"\"\nVisualization of results\n\"\"\"\n# Plot the datapoints\nsns.scatterplot(x=np.squeeze(X_train),\
    \ y=y_train)\nplt.grid(ls=\"--\")\nplt.xlabel(\"Level (m)\")\nplt.ylabel(\"Streamflow\
    \ (cumecs)\")\n\n# Plot regression line\nx1, x2 = np.min(X), np.max(X)\ny1, y2\
    \ = (b1*x1 + b0), (b1*x2 + b0)\nplt.plot([x1, x2], [y1, y2], 'r-', label=\"Linear\
    \ Model\")\nplt.legend()\nplt.grid(ls=\"--\")\n\n# Tidying the plot\nplt.tight_layout()\n\
    plt.show()\nplt.savefig(\"linearReg_.pdf\", dpi=300)\n\nprint(\"Done!!\")\n```\n\
    \n```\n>>> time Pressure Rel_humidity Level Streamflow\n>>> 0 1981-01-01 97416.18\
    \ 60.102580 167.60 10.5\n>>> 1 1981-01-02 97340.45 58.449010 167.59 10.3\n>>>\
    \ 2 1981-01-03 97306.44 58.281210 167.59 10.2\n>>> 3 1981-01-04 97270.30 57.049640\
    \ 167.59 10.4\n>>> 4 1981-01-05 97371.98 57.171913 167.58 10.0\n>>> \n>>> Estimated\
    \ parameters:\n>>> (b0, b1) = (-41624.79, 248.61)\n>>> R-squared value:\n>>> R^2\
    \ = 0.91\n```\n\n给定的程序对戈达瓦里河流流量数据执行了简单线性回归。它使用了多个库，即 pandas、NumPy、sklearn、matplotlib\
    \ 和 Seaborn，用于数据操作、数学运算、建模和数据可视化。\n\n程序的第一阶段涉及加载数据集。数据使用 pandas 的 `read_csv()`\
    \ 函数从名为“Godavari.csv”的 CSV 文件中读取，并移除任何包含缺失数据的行。然后尝试使用 pandas 的 `to_datetime()`\
    \ 函数将数据集的“time”列转换为日期时间格式。感兴趣的数据，即“time”、“Pressure”、“Rel_humidity”、“Level”和“Streamflow”列，被提取到一个新的数据框“df”中。\n\
    \n程序随后进入数据预处理阶段。在这里，“Level”列（自变量）被重塑为二维数组，用作线性回归模型的特征（X）。“Streamflow”列（因变量）是目标（y）。这些数据使用\
    \ sklearn 的 `model_selection` 模块中的 `train_test_split()` 函数被分割为训练集和测试集，其中 33% 的数据被保留用于测试。需要注意的是，`train_test_split()`\
    \ 函数根据给定的比例 `test_size` 随机分割数据。然而，为了结果的可重现性，定义了一个 `random_state`。对于不同的 `random_state`\
    \ 值，结果可能会有所不同。\n\n数据预处理之后，线性回归模型被实例化并使用训练数据进行拟合。线性模型的截距和系数被打印出来，同时还有 R-squared\
    \ 值，这是衡量线性模型拟合数据好坏的一个指标。\n\n最后，使用 matplotlib 和 Seaborn 库对结果进行可视化。创建了“Level”与“Streamflow”的散点图，并在其上叠加了由线性回归模型生成的最佳拟合线。生成的图形被显示出来（图\
    \ 6.1），然后保存为名为“linearReg_.pdf”的 PDF 文件以供将来参考。"
