    ## 13.5.3 变分公式


    纳维-斯托克斯方程的变分公式由三部分组成。第一部分可以表示为


    $$\int_{\Omega} \frac{\rho_w}{dt} \langle u - u_n, v \rangle dx + \int_{\Omega}
    \langle \frac{3}{2} u_n - \frac{1}{2} u_{n1}, \frac{1}{2} \nabla (u + u_n) \rangle,
    v \rangle dx + \int_{\Omega} \frac{1}{2} \mu \langle \nabla (u + u_n), \nabla
    v \rangle dx - \int_{\Omega} \langle p, \nabla \cdot v \rangle dx + \int_{\Omega}
    \langle f, v \rangle dx = 0$$


    其中，$\rho_w$ 是水的密度，$u$ 表示当前时间步的速度。$u_n, u_{n1}$ 表示在时间循环中当前时间步过去的第一步和第二步。$v$ 表示测试函数，$p$
    是压力，$f$ 是源项。'
