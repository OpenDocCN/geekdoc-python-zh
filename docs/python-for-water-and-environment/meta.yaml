    measures (such as dispersion measures) to generate a complete picture of the data
    distribution. For example, two datasets could have the same mean but very different
    spreads.


    In hydrology, these measures of central tendency are vital for analyzing and predicting
    water-related events. Mean values indicate typical scenarios, whereas the mode
    and median offer insights into repeating trends and exceptional occurrences. Grasping
    the central tendency of hydrological data proves valuable in planning and managing
    water resources, forecasting floods, and addressing droughts.


    # 4.2.2.2 Measures of Variability


    Variability in data, sometimes also known as dispersion, is an essential aspect
    of statistical analyses as it measures the extent or spread of data points within
    a dataset. Primary variability indicators include the range, interquartile range,
    variance, standard deviation, and coefficient of variation. These measures are
    crucial in hydrological studies, as they provide insights into the fluctuations
    and uncertainties associated with different water-related variables like rainfall,
    river flow rates, or soil moisture content.


    +   1. **Range:** The range is a simple measure of variability. One can calculate
    it as the difference between the highest and lowest values in the dataset. Consider
    the example of the annual river flow rates (in cubic meters per second) for a
    particular location over ten years: 50, 55, 60, 65, 70, 75, 80, 85, 90, and 95,
    the range would be 95–50 = 45 m³/s.


    +   2. **Interquartile Range (IQR):** The interquartile range, or IQR, signifies
    the central 50% of a dataset. It is the difference between the upper quartile
    (Q3) and the lower quartile (Q1). Q1 is the median of the first half of the data,
    while Q3 is the median of the second half. In the above river flow rates data,
    Q1 is the median of the first five observations (50, 55, 60, 65, 70) which is
    60 m³/s, and Q3 is the median of the last five observations (75, 80, 85, 90, 95)
    which is 85 m³/s. Therefore, IQR = Q3 – Q1 = 85 – 60 = 25 m³/s.


    +   3. **Variance:** Variance measures how far each number in the dataset is from
    the mean (μ) and thus from every other number in the set. It is often denoted
    by σ². The formula for variance is'
