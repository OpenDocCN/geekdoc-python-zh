    ```

    >>> conda create --name myenv

    ```


    A new name of the environment can be provided in place of “myenv”. As per requirement,
    a Python version may be specified by appending “python=x.x” (where x.x is the
    version number) to the command.


    2. **Activating the new environment:** Prior to installing any packages, the environment
    must be activated. This can be done with the command:


    ```

    >>> conda create --name myenv

    >>> conda activate myenv

    ```


    3. **Installing packages:** Depending upon the source, the packages can be installed
    after activating the environment, either by using the “conda” or “pip” command.
    It is typical to use Conda when the package exists in the Anaconda distribution,
    given its effectiveness in handling dependencies. Issuing the following command
    initiates the installation:


    ```

    >>> conda create --name myenv

    >>> conda activate myenv

    >>> conda install package-name

    ```


    The name of the required package can replace the “package-name”. The pip command
    can be used in the case when the package is not available in the Anaconda distribution.
    Pip can access packages uploaded to the Python Package Index (PyPi). To use the
    following command, do: “pip install package-name”, again, replacing “package-name”
    with the name of the needed package.


    4. **Verifying the installation:** It is a good idea to verify the installed packages.
    Issuing the “conda list” or “pip list” commands displays the installed packages
    in the active environment:'
