- md: '## 10.2 Weak Form of the Steady State Darcy Flow Equation


    The nature of the problem is a consequence of the finite number of nodes used
    in discretization. The important concepts required for their implementation are
    described next.


    The basic approach to solving a partial differential equation using the finite
    element method can be given as follows:


    - (1) Express the given partial differential equation in its variational/weak
    form.

    - (2) Mesh the computational domain to discretize the weak form equations.

    - (3) Select the basis function whose derivative and values are simple to compute.

    - (4) Realize a linear algebraic system of equations to be solved using numerical
    solvers.


    The product rule of divergence is given in Eq. 10.22. This is often useful in
    deriving the weak forms of partial differential equations (PDEs). In this equation,
    the divergence of the product of two functions is given as the sum of: (the product
    of the gradient of the function and the vector) and (product of the function and
    the divergence of the vector). The symbol * denotes the product operation. This
    is of course true when the divergence of the vector is known.


    $$\nabla \cdot (f * v) = (\nabla f) * v + f * (\nabla \cdot v) \qquad (10.22)$$


    We often deal with boundary value problems where the value of the unknown function
    is given at the boundary of the domain. The Divergence theorem comes in quite
    handy for assigning the values at the boundary:


    $$\iiint_V (\nabla \cdot \mathbf{F}) \, dV = \oiint_{S(V)} (\mathbf{F} \cdot \hat{\mathbf{n}})
    \, dS \qquad (10.23)$$


    A related formula often relevant for 1D analysis, called "Integration by parts"
    can be compactly stated as


    $$\int u \, dv = uv - \int v \, du \qquad (10.24)$$


    where, $dv = v''(x) = \frac{dv}{dx}$ and $du = u''(x) = \frac{du}{dx}$.


    For a single-phase flow problem Darcy''s pressure law can be stated as in Eq.
    10.25.


    $$q = -\frac{k}{\mu L} \Delta p \qquad (10.25)$$


    Now, coming to our example of the derivation of the weak form of Darcy’s pressure
    law. The law in Eq. 10.25 can be alternatively given in the form as in Eq. 10.26.


    $$- \nabla \cdot \frac{K}{\mu} \nabla p = 0 \quad \in \Omega \qquad (10.26)$$


    Here, the first ($\nabla \cdot$) symbol denotes the divergence operation, and
    the second ($\nabla$) before $p$ denotes the gradient operation.


    (1) The first step is to multiply Eq. 10.26 with a test function $\psi$.


    $$\psi \left( -\nabla \cdot \frac{K}{\mu} \nabla p \right) = 0 \quad \forall \psi
    \qquad (10.27)$$


    One can easily realize the analogy between the LHS of Equation 10.27 and the second
    term in the RHS of Equation 10.22.


    (2) The second step is to integrate the equation over the domain $\Omega$.


    $$- \int_{\Omega} \psi \left( \nabla \cdot \frac{K}{\mu} \nabla p \right) = 0
    \qquad (10.28)$$


    (3) The third step is to do integration by parts using Eq. 10.22.


    $$- \left( \int_{\Omega} \nabla \cdot \left( \psi * \left( \frac{K}{\mu} \nabla
    p \right) \right) - \int_{\Omega} \nabla \psi * \left( \frac{K}{\mu} \nabla p
    \right) \right) = 0 \qquad (10.29)$$


    Or,


    $$\int_{\Omega} \nabla \psi * \left( \frac{K}{\mu} \nabla p \right) - \int_{\Omega}
    \nabla \cdot \left( \psi * \left( \frac{K}{\mu} \nabla p \right) \right) = 0 \qquad
    (10.30)$$


    (4) The fourth step is to apply the divergence theorem on the second term in Eq.
    10.30 using Eq. 10.23.


    $$\int_{\Omega} \nabla \psi * \left( \frac{K}{\mu} \nabla p \right) - \oint_{\Gamma}
    \left( \psi * \left( \frac{K}{\mu} \nabla p \right) \right) \cdot \hat{n} = 0
    \qquad (10.31)$$


    (5) The fifth step is to express the Eq. 10.32 using inner product notation.


    $$\left\langle \nabla \psi, \left( \frac{K}{\mu} \nabla p \right) \right\rangle
    - \left\langle \psi, \left( \frac{K}{\mu} \nabla p \cdot \hat{n} \right) \right\rangle
    = 0 \qquad (10.32)$$


    Here, the first term is called a kernel and the second term is called the boundary
    condition.


    ## 10.3 Integration of Transient PDEs


    The simplest of the PDE is a heat equation or a diffusion equation. A simple extension
    to the Poisson problem is the time-dependent heat equation or the time-dependent
    diffusion equation. A Poisson equation defines the stationary heat distribution
    in a body. This can be easily extended to a time-dependent problem. A straightforward
    approach to solving time-dependent PDEs is to first discretize the time derivative
    using finite-difference approximations which yields a sequence of stationary problems;
    then turning each stationary problem into a variational problem. Now, we illustrate
    a simple example:


    $$\frac{\partial u}{\partial t} = \nabla^2 u + f \quad \text{in } \Omega \times
    (0, T] \qquad (10.33)$$

    $$u = u_D \quad \text{on } \partial\Omega \times (0, T] \qquad (10.34)$$

    $$u = u_0 \quad \text{at } t = 0 \qquad (10.35)$$


    Except, $u = u_0$, all others are a function of space and time $u = u(x, y, t)$.
    Even $f$ is a function of space and time.


    If $n$ denotes a quantity at time $t_n$. For example, $u_n$ means $u$ at time
    level $n$. A finite-difference discretization would result into the following
    equations:


    $$\left(\frac{\partial u}{\partial t}\right)^{n+1} = \nabla^2 u^{n+1} + f^{n+1}
    \qquad (10.36)$$


    A simple backward difference approximation leads to:


    $$\frac{u^{n+1} - u^n}{\Delta t} = \nabla^2 u^{n+1} + f^{n+1} \qquad (10.37)$$


    This represents the time-discrete version of the above equation, also called as
    the *Backward-Euler* or *Implicit Euler* discretization. Therefore, assuming $u^n$
    is known, we can rewrite the equation as


    $$u^{n+1} - \Delta t \nabla^2 u^{n+1} = u^n + \Delta t f^{n+1}, \qquad n = 0,
    1, 2, \ldots, n \qquad (10.38)$$


    Now, given $u_0$ we can solve for $u^0, u^1, u^2, \ldots, u^n$. Collecting all
    the terms on the left-side gives us


    $$u^{n+1} - \Delta t \nabla^2 u^{n+1} - u^n - \Delta t f^{n+1} = 0, \qquad n =
    0, 1, 2, \ldots, n \qquad (10.39)$$


    The above equation only has terms involving $n$ and $n+1$, therefore, if we know
    the value of $u_n$ we can know $u_{n+1}$. With this, we have described the Backward-Euler
    time integration technique. There are advanced alternatives that offer advantages
    such as stability over time steps. Some examples of these methods are the Crank-Nicolson
    method, Adams-Bashforth, Adams-Moulton, Newmark Beta, and Runge-Kutta methods.


    # Chapter 11

    ## Surface Flow Models


    Surface flow models play a pivotal role in understanding and predicting hydrological
    processes, significantly influencing water resource management, flood risk assessment,
    and designing urban drainage systems. These models facilitate the understanding
    of spatial and temporal water flow patterns, addressing the complex interactions
    between the atmosphere, land surface, and subsurface. In recent years, the importance
    of surface flow models has grown, driven by increased urbanization, climate change
    impacts, and the need for sustainable water resource management. As we delve deeper
    into the world of surface flow models, kinematic wave approximations emerge as
    an essential tool for simplifying the modeling of flow processes. This approach
    allows for efficient and accurate simulations, particularly in open channel flow
    situations, where understanding the movement and storage of water is crucial for
    effective infrastructure planning and environmental conservation. By employing
    kinematic wave approximations, researchers and engineers can strike a balance
    between computational efficiency and model accuracy, ensuring the delivery of
    reliable solutions to pressing water management challenges.


