    Level\", \"Streamflow\"]]  # Retrieving columns\ndf2.loc[:, \"River\"] = \"Cauvery\"\
    \  # Creating new column\ndf2 = df2.iloc[:1000, :]\n\n\n############### First-part\
    \ ###############\nprint(\"\\n\\nFirst part\")\n\n# Creating a combined dataframe\n\
    df = pd.concat(objs=[df1, df2], axis=0)\n\n\"\"\"\nFit a linear model to be used\n\
    by the ANOVA routine below\n\"\"\"\nlinearModel = ols(\n    formula='Streamflow\
    \ ~ C(River)', data=df).fit()\n\n\"\"\"\nPerform 1-way ANOVA on the\nfitted model\n\
    \"\"\"\nano_result = sm.stats.anova_lm(linearModel, typ=1)\n\n# Displaying the\
    \ results\nprint(\"\\n1. ANOVA result:\")\nprint(anova_result)\n\n# Access the\
    \ p-values from the ANOVA table then\n# compare the p-values to the desired\n\
    # significance level (e.g., 0.05)\n# finally, print the significant results\n\
    alpha = 0.05\np_values = anova_result['PR(>F)'].dropna()\nsignificant_results\
    \ = p_values > alpha\nif significant_results['C(River)']:\n    print(\"\\nRiver:\"\
    )\n    print(\"    Alternate Hypothesis => \"\n          \"No significant difference\
    \ => \"\n          \"Means are equal\")\nelse:\n    print(\"\\nRiver:\")\n   \
    \ print(\"    Null Hypothesis => \"\n          \"Difference is significant =>\
    \ \"\n          \"Means are different\")\n\nprint(\"---------------------------------------\"\
    \n      \"---------------------------------------\")\n\n\n############### Second-part\
    \ ###############\nprint(\"\\n\\n\\n\\nSecond part\")\n# Adding noise to the data\n\
    amp = df1[\"Streamflow\"] * 0.05\namp_noisy = amp * np.random.normal(\n    loc=10,\
    \ scale=2, size=df2.shape[0])\namp_noisy = amp_noisy + df2[\"Streamflow\"]\ndf2[\"\
    Streamflow\"] = amp_noisy\n\n# Creating a combined dataframe\ndfnoisy = pd.concat(objs=[df1,\
    \ df2], axis=0)\n\n\"\"\"\nFit a linear model to be used\nby the ANOVA routine\
    \ below\n\"\"\"\nlinearModel2 = ols(\n    formula='Streamflow ~ C(River)', data=dfnoisy).fit()\n\
    \n\"\"\"\nPerform 1-way ANOVA on the\nfitted model\n\"\"\"\nanoval_result2 = sm.stats.anova_lm(linearModel2,\
    \ typ=1)\n\nalpha2 = 0.05\n\n# Displaying the results\nprint(\"\\n2. ANOVA result:\"\
    )\nprint(anova_result2)\np_values2 = anova_result2['PR(>F)'].dropna()\nsignificant_results2\
    \ = p_values2 > alpha2\nif significant_results2['C(River)']:\n    print(\"\\nRiver:\"\
    )\n    print(\"    Alternate Hypothesis => \"\n          \"No significant difference\
    \ => \"\n          \"Means are equal\")\nelse:\n    print(\"\\nRiver:\")\n   \
    \ print(\"    Null Hypothesis => \"\n          \"Difference is significant =>\
    \ \"\n          \"Means are different\")\n```\n\nThis program demonstrates the\
    \ application of one-way ANOVA (analysis of variance) on hydrological data from\
    \ two rivers, Godavari and Cauvery. The primary goal of this analysis is to test\
    \ if there is a significant difference in streamflow between the two rivers.\n\
    \nFirst, the program imports necessary libraries such as NumPy, Pandas, and Statsmodels.\
    \ Then, it loads two datasets corresponding to the Godavari and Cauvery Rivers,\
    \ each dataset having variables “Level” and “Streamflow”. The datasets are loaded\
    \ using Pandas, and any missing values are dropped. A new column, “River”, is\
    \ added to the dataframes to label data of the respective river.\n\nThe program\
    \ then combines these two datasets into one dataframe to facilitate the comparison\
    \ of streamflow between the two rivers. Following this, a linear model is fit\
    \ to the combined data, with the streamflow as the dependent variable and the\
    \ river as the independent categorical variable. The “ols” function from the statsmodels.formula.api\
    \ module fits this linear model.\n\nAfter the model is fitted, a one-way ANOVA\
    \ test is performed. The ANOVA test results, including the F-statistic and p-value,\
    \ are printed to the console. A p-value less than 0.05 is typically considered\
    \ evidence of a significant difference.\n\nThe program also performs a separate\
    \ analysis where some noise is added to the streamflow data of the Cauvery River.\
    \ This noise represents some random variation in the data. The noisy data are\
    \ then used to fit a new linear model and perform a one-way ANOVA test in the\
    \ same manner as before. The results of this second analysis allow one to examine\
    \ how the added noise affects the outcome of the ANOVA test.\n\nIn both cases,\
    \ the p-values from the ANOVA table are accessed and compared to a significance\
    \ level of 0.05 to determine if the means of the streamflow from the two rivers\
    \ are significantly different. If the p-value is less than 0.05, it concludes\
    \ that the means are different; otherwise, it suggests that there is no significant\
    \ difference in the means.\n\n## 8.2 Two-Way Analysis of Variance\n\nTwo-way ANOVA\
    \ (analysis of variance) is a statistical test used to examine the effects of\
    \ two independent categorical variables (factors) on a continuous dependent variable.\
    \ ANOVA helps in the assessment of the main effects of each factor as well as\
    \ the interaction between the factors. In hydrology, two-way ANOVA can be utilized\
    \ in various scenarios where multiple factors influence a hydrological response.\n\
    \nIn the context of hydrology, a common application of two-way ANOVA is the analysis\
    \ of the impact of climate (e.g., precipitation levels) and land use (e.g., agricultural\
    \ practices) on hydrological variables such as streamflow or water quality parameters.\
    \ The effect of climate can vary with different seasons or zones experiencing\
    \ different precipitation levels. On the other hand, land use may be categorized\
    \ into multiple types based on cover type and management. With two-way ANOVA,\
    \ we can analyze the independent effect of the two factors on hydrological parameters.\
    \ A possible extension of the ANOVA model would be to study the mixed effect.\n\
    \nIn two-way ANOVA, the total sum of squares of the residuals can be attributed\
    \ to three contributing factors: 1. effect due to factor A (SSA), 2. effect due\
    \ to factor B (SSB), and 3. the combined effect due to A and B (SSAB). The ANOVA\
    \ results can be interpreted by analyzing the interaction, degrees of freedom,\
    \ and the mean squares error. An accompanying F-statistic is also computed to\
    \ evaluate the significance of the factors, both individual and combined."
  mdcn: "## 8.1 单因素方差分析\n\n不应将零假设误解为对其的证实，统计显著性也未必意味着实际显著性。因此，尽管假设检验在水文数据研究中仍是一个流行工具，但需要谨慎使用和理解。\n\
