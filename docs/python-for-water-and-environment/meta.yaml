  md: '# Chapter 14

    Contaminant Transport Models


    In this chapter, we develop three finite element models for common contaminant
    transport problems. The cases represent different scenarios of contaminant transport.
    Advection is an important process in contaminant transport problems. For the models
    with an advection component, we use the velocity field data (saved a priori) of
    the Navier-Stokes simulation from Sect. 13.5.


    # 14.1 A 2D Diffusion Reaction Model


    In this section, we develop a 2D diffusion, reaction model. Specifically, the
    code presented solves a scenario where a contaminant is undergoing diffusion as
    well as reacting with the environment with time. The result is the spreading of
    the contaminant from the location of the source function.


    # 14.1.1 Variational Formulation


    The strong form of the diffusion-reaction model can be specified using the following
    governing equation:


    $$\frac{\partial u}{\partial t} + \nabla \cdot (D \nabla u) = f - Ru$$


    where $u$ is the concentration of the contaminant, the constant $D$ is the diffusion
    coefficient, and $R$ is the rate of reaction. The weak form corresponding to Eq.
    14.1 is given as'
  merge: -1
  pgno: 264
- img_proc: true
  md: '$$\int_{\Omega} \frac{1}{dt} \langle u - u_n, v \rangle dx + \int_{\Omega}
    D(\nabla u, \nabla v) dx = \int_{\Omega} (fv - Ruv) dx \quad (14.2)$$


    where $u$, $u_n$ are the values of the concentration at the current and previous
    time steps; $v$ is the test function defined in the function space of the concentration
    variable; and $f$ denotes the source function.


    # 14.1.2 Python Code


    In this section, we define the code for diffusion, advection processes for a contaminant
    transport problem. We begin by importing the necessary libraries in lines 8–16.


    In lines 19–25, the name of the simulation, the location of the externally generated
    mesh file, and the path to save the results are specified.


    In lines 27–40, the operation of loading the mesh file with the “.msh” extension
    is performed. Along with the mesh, we also read the cell and facet tags. The dimension
    of the domain is 2, therefore the facet dimension is 1 less than the domain.


    In lines 42–51, we define the parameters for the time loop such as the start,
    stop, $\Delta t$, and the number of steps.


    In lines 53–65, we define the constants that are to be used in the weak formulation;
    they are $\Delta t$, the rate of the reaction, and the diffusion coefficient.


    In lines 67–84, we define the function spaces, finite element type, and the functions
    that are later used in the weak formulation. The type of the element is “Lagrange”
    and the name of the function space is “V”. We further define a test function named
    “v1” and two functions—“u1” and “u1n”—for working with the concentration variable
    (Fig. 14.1).


