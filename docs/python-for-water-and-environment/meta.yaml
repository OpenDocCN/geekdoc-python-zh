    $$\frac{A_{(i,j+1)} - A_{(i,j)}}{\Delta t} + \alpha \beta A_{mean} \frac{A_{(i,j+1)}
    - A_{(i-1,j+1)}}{\Delta x} = q$$ (11.13)


    where, $A_{mean}$ is given by:


    $$A_{mean} = \frac{(A_{(i,j)} + A_{(i-1,j+1)})}{2}.$$ (11.14)


    After some algebraic manipulations and making $A_{(i,j+1)}$ the subject of the
    formula, we get the following recurrence relation:


    $$A_{(i,j+1)} = \frac{\Delta x q + \frac{\Delta x}{\Delta t} (A_{mean}) + \alpha
    \beta (A_{mean}) A_{(i-1,j+1)}}{\frac{\Delta x}{\Delta t} + \alpha \beta (A_{mean})}$$
    (11.15)


