    \ dpi=300)\n```\n\n上述 Python 脚本演示了在合成数据集上实现分位数回归。该脚本分为几个部分，以系统地生成合成数据、应用分位数回归、识别异常值并可视化结果。\n\
    \n在第一部分中，使用随机种子生成合成数据集。“x”值范围从 π 的一半到 2π，间隔为 0.05。“y_true”值通过从均值为“mean_”、标准差为“scale_”的正态分布中采样生成。均值和标准差依赖于“x”，从而创建异方差数据（即方差不恒定的数据）。\n\
