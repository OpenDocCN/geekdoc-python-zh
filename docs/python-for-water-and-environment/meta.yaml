    \ 应用程序默认使用“Cool to Warm”颜色映射表。一个更好的替代方案是“Turbo”颜色映射表，此处绘制图形时使用了它。借助这种多功能的颜色映射表，即使在结束时间值处，也能看到污染物的扩散。\n\
    \n## 14.2.4 结果讨论\n\n本节我们演示了一个扩散-平流模型。图 14.2 展示了受这两个过程支配的污染物传输的模拟结果。在时间 t = 0.03\
    \ s、0.33 s、1.0 s、1.66 s、2.33 s、3.00 s 的浓度数据快照分别显示在 (a) 至 (f) 部分。由于模型的平流分量，污染物被输送到域内呈现特定模式的区域。从图中可以看出，污染物逐渐覆盖了域内更大的区域。源被指定在点\
    \ (0.25, 0.75)。\n\n![](img/0c8a53eeca13bc4d5422655fb7aaba77_279_0.png)\n\n**图\
    \ 14.2** 由第 14.2.2 节程序计算的浓度场，在 6 个不同时间点，$t = 0.03$ s、0.33 s、1.0 s、1.66 s、2.33\
    \ s、3.00 s。可以注意到，由于存在两个圆形岛屿施加无滑移边界条件以及周围边界，出现了特定的模式。\n\n传输模式正是由此产生的；如果源指定在其他地方，我们会预期出现不同的模式。由于这是一个平流和扩散过程，参数——$D$\
    \ 和 $\\mathbf{w}$——在模拟中起着重要作用。\n\n## 14.3 广义二维平流、扩散、反应模型\n\n本节我们开发一个广义的平流、扩散、反应模型。我们特别模拟这样一个场景：一种反应性污染物在经历平流和扩散的同时，以与其浓度\
    \ $[u]$ 成正比的速率衰减，这意味着反应速率遵循一级动力学。\n\n### 14.3.1 变分公式\n\n该模型控制方程的强形式给出为\n\n$$\\\
