  md: '# 10.3 Integration of Transient PDEs


    The simplest of the PDE is a heat equation or a diffusion equation. A simple extension
    to the Poisson problem is the time-dependent heat equation or the time-dependent
    diffusion equation. A Poisson equation defines the stationary heat distribution
    in a body. This can be easily extended to a time-dependent problem. A straightforward
    approach to solving time-dependent PDEs is to first discretize the time derivative
    using finite-difference approximations which yields a sequence of stationary problems;
    then turning each stationary problem into a variational problem. Now, we illustrate
    a simple example:


    $$\frac{\partial u}{\partial t} = \nabla^2 u + f \quad \text{in } \Omega \times
    (0, T] \qquad (10.33)$$

    $$u = u_D \quad \text{on } \partial\Omega \times (0, T] \qquad (10.34)$$

    $$u = u_0 \quad \text{at } t = 0 \qquad (10.35)$$


    Except, $u = u_0$, all others are a function of space and time $u = u(x, y, t)$.
    Even $f$ is a function of space and time.


    If $n$ denotes a quantity at time $t_n$. For example, $u_n$ means $u$ at time
    level $n$. A finite-difference discretization would result into the following
    equations:


    $$\left(\frac{\partial u}{\partial t}\right)^{n+1} = \nabla^2 u^{n+1} + f^{n+1}
    \qquad (10.36)$$


    A simple backward difference approximation leads to:


    $$\frac{u^{n+1} - u^n}{\Delta t} = \nabla^2 u^{n+1} + f^{n+1} \qquad (10.37)$$


    This represents the time-discrete version of the above equation, also called as
    the *Backward-Euler* or *Implicit Euler* discretization. Therefore, assuming $u^n$
    is known, we can rewrite the equation as


    $$u^{n+1} - \Delta t \nabla^2 u^{n+1} = u^n + \Delta t f^{n+1}, \qquad n = 0,
    1, 2, \ldots, n \qquad (10.38)$$


    Now, given $u_0$ we can solve for $u^0, u^1, u^2, \ldots, u^n$. Collecting all
    the terms on the left-side gives us


    $$u^{n+1} - \Delta t \nabla^2 u^{n+1} - u^n - \Delta t f^{n+1} = 0, \qquad n =
    0, 1, 2, \ldots, n \qquad (10.39)$$'
