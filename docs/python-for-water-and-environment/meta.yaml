  md: 'nature of the problem is a consequence of the finite number of nodes used in
    discretization. The important concepts required for their implementation are described
    next.


    The basic approach to solving a partial differential equation using the finite
    element method can be given as follows:


    +   (1) Express the given partial differential equation in its variational/weak
    form.

    (2) Mesh the computational domain to discretize the weak form equations.

    (3) Select the basis function whose derivative and values are simple to compute.

    (4) Realize a linear algebraic system of equations to be solved using numerical
    solvers.


    The product rule of divergence is given in Eq. 10.22. This is often useful in
    deriving the weak forms of partial differential equations (PDEs). In this equation,
    the divergence of the product of two functions is given as the sum of: (the product
    of the gradient of the function and the vector) and (product of the function and
    the divergence of the vector). The symbol * denotes the product operation. This
    is of course true when the divergence of the vector is known.


    $$\nabla \cdot (f * v) = (\nabla f) * v + f * (\nabla \cdot v) \qquad (10.22)$$


    We often deal with boundary value problems where the value of the unknown function
    is given at the boundary of the domain. The Divergence theorem comes in quite
    handy for assigning the values at the boundary:


    $$\iiint_V (\nabla \cdot \mathbf{F}) \, dV = \oiint_{S(V)} (\mathbf{F} \cdot \hat{\mathbf{n}})
    \, dS \qquad (10.23)$$


    A related formula often relevant for 1D analysis, called "Integration by parts"
    can be compactly stated as


    $$\int u \, dv = uv - \int v \, du \qquad (10.24)$$


    where, $dv = v''(x) = \frac{dv}{dx}$ and $du = u''(x) = \frac{du}{dx}$.


    # 10.2 Weak Form of the Steady State Darcy Flow Equation


    For a single-phase flow problem Darcy''s pressure law can be stated as in Eq.
    10.25.


    $$q = -\frac{k}{\mu L} \Delta p \qquad (10.25)$$'
