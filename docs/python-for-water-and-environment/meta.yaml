    # 8.5 The Kolmogorov-Smirnov Test


    The Kolmogorov-Smirnov test is a non-parametric statistical test used to compare
    a sample distribution with a theoretical distribution (one-sample K-S test) or
    to compare two-sample distributions (two-sample K-S test). It calculates the maximum
    distance between the empirical cumulative distribution functions (ECDF) of the
    two samples or distributions.'
