    in the inputs of a model leads to uncertainty in the output of the model. If we
    can represent the uncertainty in the inputs as probability distributions, we can
    use these distributions to generate multiple sets of input data. We can then run
    the model with each of these input sets and observe the resulting distribution
    of outputs. This output distribution estimates the uncertainty in the model’s
    predictions.'
  - "[PAGE 178]\n\nMonte Carlo methods are handy when dealing with complex, nonlinear\
    \ models where analytical solutions for uncertainty propagation are challenging\
    \ or impossible to derive. However, they can be computationally intensive, especially\
    \ for complex models or when a high precision is required.\n\nMonte Carlo uncertainty\
    \ propagation provides valuable insights into the behavior of a system under uncertainty,\
    \ allowing competent decision-making. Exploring a wide range of possible outcomes\
    \ helps identify potential risks and opportunities, supporting risk management,\
    \ design optimization, and scenario analysis. It has become an indispensable tool\
    \ requiring sophisticated uncertainty analysis and decision-making under uncertainty.\n\
    \n```\n\"\"\"\nMonte Carlo error propagation\non a simple forward model:\nManning's\
    \ equation\nV = (1/n) * R^(2/3) * S^(1/2),\nwhere,\nV is the flow velocity,\n\
    n is the Manning's roughness coefficient,\nR is the hydraulic radius, and\nS is\
    \ the channel slope\n\"\"\"\n\nimport numpy as np\nfrom scipy import stats\nimport\
    \ matplotlib.pyplot as plt\n\nplt.rc('text', usetex=True)\nnp.random.seed(11)\n\
    \ndef compute_velocity(n=1., b=1., h=1., S=1.):\n    R = (b * h) / (2 * b + h)\n\
    \    V = (1 / n) * R ** (2 / 3) * S ** (1 / 2)\n    return V\n\n\"\"\"\nMonte-Carlo\
    \ simulation #1\n\"\"\"\nNsim = 100000\nn_var = stats.halfnorm.rvs(loc=0.030,\
    \ scale=1e-2, size=Nsim)\nb_var = stats.norm.rvs(loc=2.0, scale=1e-1, size=Nsim)\n\
    h_var = stats.norm.rvs(loc=1.3, scale=1e-1, size=Nsim)\nS_var = stats.norm.rvs(loc=np.tan(15\
    \ * np.pi / 180),\n                       scale=1e-2, size=Nsim)\n```"
  - "[PAGE 179]\n\n# 9.6 Monte Carlo Uncertainty Propagation\n\n```\ndata = np.vstack([n_var,\
    \ b_var, h_var, S_var]).T\n\nV_var = np.zeros_like(n_var)\nfor i in range(Nsim):\n\
    \    V_var[i] = compute_velocity(\n        n=data[i, 0],\n        b=data[i, 1],\n\
    \        h=data[i, 2],\n        S=data[i, 3]\n    )\n\ndef normal_distribution(x,\
    \ mu, sig):\n    rv = 1.0 / (sig * np.sqrt(2.0 * np.pi))\n    normal_values =\
    \ rv * np.exp(\n        -(x - mu) ** 2.0 / (2.0 * sig ** 2)\n    )\n    return\
    \ normal_values\n\n# Plots\nxmin, xmax = V_var.min(), V_var.max()\nx = np.linspace(xmin,\
    \ xmax, Nsim)\ny = normal_distribution(x, np.mean(V_var), np.std(V_var))\n\nplt.hist(V_var,\
    \ density=True, bins=150,\n         label=\"$V_{\" + \"MC\" + \"}$\")\nplt.plot(x,\
    \ y, color='red', lw=3, label=\"Normal\")\nplt.xlabel(\"Velocity (m/s)\")\nplt.ylabel(\"\
    Relative Probability\")\nplt.xlim(xmin, xmax)\nplt.legend()\nplt.grid(ls=\"--\"\
    )\nplt.tight_layout()\nplt.savefig(\"mc1.pdf\", dpi=300)\n\n\"\"\"\nMonte-Carlo\
    \ simulation #2\n\"\"\"\nNsim = 100000\nn_var = stats.halfnorm.rvs(loc=0.030,\
    \ scale=1e-1, size=Nsim)\nb_var = stats.norm.rvs(loc=2.0, scale=1e-1, size=Nsim)\n\
    ```"
