    ## Chapter 10

    Introduction


    In fluid dynamics, the Navier-Stokes equations along with some initial conditions
    are used to describe the velocity vector field of a fluid. The equations are a
    consequence of Newton’s second law of motion, the stress in a fluid due to viscosity,
    and the applied pressure. Most of the real flow phenomena can be addressed by
    solving the nonlinear set of partial differential equations. This requires advanced
    nonlinear solvers which although when used do not guarantee convergence. However,
    we often use simplified versions of these equations for our own applications.
    This essentially means that the original nonlinear equations are reduced to linear
    forms by making some assumptions, like in the case of one-dimensional flow.


    The general form of the Navier-Stokes equations can be given by the following
    equation:


    $$\rho \frac{D\mathbf{v}}{Dt} = -\nabla p + \nabla \cdot \sigma_T + \mathbf{f}$$


    This equation is derived by the application of the continuity equation to the
    mass and momentum conservation equations. A few of the concepts that are helpful
    in understanding the terms dictated in the Eq. 10.1 are described now.


    Material derivative is a required concept for the momentum conservation equation.
    We define the material derivative as the rate of change of an intensive property,
    $u$, in the velocity field, $\mathbf{v}$. Mathematically, it can be expressed
    as


    $$\frac{Du}{Dt} = \frac{du}{dt} + \mathbf{v} \cdot \nabla u$$


    The second term in the Eq. 10.2 represents the directional derivative of $u$ along
    the direction of the velocity field, $\mathbf{v}$. Newton’s second law can be
    stated as


    $$\mathbf{b} = \rho \frac{\mathrm{d}}{\mathrm{d}t} \mathbf{v}(x, y, z, t)$$


    $$\mathbf{b} = \rho \left( \frac{\partial \mathbf{v}}{\partial t} + \frac{\partial
    \mathbf{v}}{\partial x} \frac{\partial x}{\partial t} + \frac{\partial \mathbf{v}}{\partial
    y} \frac{\partial y}{\partial t} + \frac{\partial \mathbf{v}}{\partial z} \frac{\partial
    z}{\partial t} \right)$$


    If velocity, $\mathbf{v}$, is the intensive property, then Eq. 10.3 can be rewritten
    as


    $$\mathbf{b} = \rho \left( \frac{\partial \mathbf{v}}{\partial t} + \mathbf{v}
    \cdot \nabla \mathbf{v} \right)$$


    or, $$\mathbf{b} = \rho \frac{D\mathbf{v}}{Dt}, \quad (\text{using Eq. 10.2})$$


    Further assuming that the total body force on the infinitesimal fluid cubes is
    due to stresses within the fluid and external forces, we can state that:


    $$\mathbf{b} = \nabla \cdot \sigma + \mathbf{f}$$


    Here, $\mathbf{f}$ represents the external forces, $\nabla \cdot \sigma$ represents
    the divergence of the stress tensor and $\mathbf{b}$ is the body force. The stress
    tensor can be written as


    $$\sigma = \begin{pmatrix} \sigma_{xx} & \sigma_{xy} & \sigma_{xz} \\ \sigma_{yx}
    & \sigma_{yy} & \sigma_{yz} \\ \sigma_{zx} & \sigma_{zy} & \sigma_{zz} \end{pmatrix}$$


    The stress tensor, $\sigma$, can be further composed of two components—the volumetric
    part and the deviatoric part. The former is responsible for change in the body
    while the latter takes care of the change in shape or the deformation. Mathematically,
    it can be written as


    $$\sigma = \begin{pmatrix} \sigma_{xx} & \sigma_{xy} & \sigma_{xz} \\ \sigma_{yx}
    & \sigma_{yy} & \sigma_{yz} \\ \sigma_{zx} & \sigma_{zy} & \sigma_{zz} \end{pmatrix}$$


    $$\sigma = -\begin{pmatrix} p & 0 & 0 \\ 0 & p & 0 \\ 0 & 0 & p \end{pmatrix}
    + \begin{pmatrix} \sigma_{xx} + p & \sigma_{xy} & \sigma_{xz} \\ \sigma_{yx} &
    \sigma_{yy} + p & \sigma_{yz} \\ \sigma_{zx} & \sigma_{zy} & \sigma_{zz} + p \end{pmatrix}$$


    $$\sigma = -p\mathbf{I} + \sigma_T$$


    For the purpose of modeling, we often assume the fluids to be Newtonian, i.e.,
    the stress is directly proportional to the rate of deformation. Therefore, the
    expression of stress for a Newtonian fluid can be given as


    $$\sigma_{ij} = \mu \left( \frac{\partial u_i}{\partial x_j} + \frac{\partial
    u_j}{\partial x_i} \right)$$


    In the above equation, $\mu$ is called the fluid viscosity. It defines the ease
    with which the fluid flows when subjected to body forces. The divergence of the
    stress term can now be stated as


    $$\nabla \cdot \sigma = \mu \nabla \cdot \begin{pmatrix} \sigma_{xx} & \sigma_{xy}
    & \sigma_{xz} \\ \sigma_{yx} & \sigma_{yy} & \sigma_{yz} \\ \sigma_{zx} & \sigma_{zy}
    & \sigma_{zz} \end{pmatrix} \quad (10.13)$$


    $$\nabla \cdot \sigma = \mu \begin{pmatrix} 2\frac{\partial u}{\partial x} & \frac{\partial
    u}{\partial y} + \frac{\partial v}{\partial x} & \frac{\partial u}{\partial z}
    + \frac{\partial w}{\partial x} \\ \frac{\partial u}{\partial y} + \frac{\partial
    v}{\partial x} & 2\frac{\partial v}{\partial y} & \frac{\partial v}{\partial z}
    + \frac{\partial w}{\partial y} \\ \frac{\partial u}{\partial z} + \frac{\partial
    w}{\partial x} & \frac{\partial v}{\partial z} + \frac{\partial w}{\partial y}
    & 2\frac{\partial w}{\partial z} \end{pmatrix} \quad (10.14)$$


    The $x$ component of the divergence term can be computed as follows:


    $$(\nabla \cdot \sigma)_i = \mu \frac{\partial}{\partial x} \left( 2\frac{\partial
    u}{\partial x} \right) + \frac{\partial}{\partial y} \left( \frac{\partial u}{\partial
    y} \frac{\partial v}{\partial x} \right) + \frac{\partial}{\partial z} \left(
    \frac{\partial u}{\partial z} \frac{\partial w}{\partial x} \right) \quad (10.15)$$


    $$(\nabla \cdot \sigma)_i = \mu \frac{\partial^2 u}{\partial x^2} + \frac{\partial^2
    u}{\partial y^2} + \frac{\partial^2 u}{\partial z^2} + \frac{\partial^2 u}{\partial
    x^2} + \frac{\partial^2 u}{\partial x \partial y} + \frac{\partial u^2}{\partial
    x \partial z} \quad (10.16)$$


    $$(\nabla \cdot \sigma)_i = \mu \nabla^2 u + \mu \frac{\partial}{\partial x} \left(
    \frac{\partial u}{\partial x} + \frac{\partial v}{\partial y} + \frac{\partial
    w}{\partial z} \right) \quad (10.17)$$


    $$(\nabla \cdot \sigma)_i = \mu \nabla^2 u + \mu \frac{\partial}{\partial x} (\nabla
    \cdot v) \quad (10.18)$$


    $$(\nabla \cdot \sigma)_i = \mu \nabla^2 u + 0 \quad (10.19)$$


    $$(\nabla \cdot \sigma)_i = \mu \nabla^2 u \quad (10.20)$$


    The $y$ and $z$ terms can be computed in a similar manner. Consequently, for the
    case of incompressible Newtonian fluids, the flow equation can be given as


    $$\rho \frac{D\mathbf{v}}{Dt} = -\nabla p + \mu \nabla^2 u + \mathbf{f} \quad
    (10.21)$$


    We shall refer to this equation in the upcoming sections where we extend the derivation
    to Darcy flow and Saint-Venant equations. The derivations shall be followed by
    their implementation in Python programming language.


    ### 10.1 Numerical Modeling Using Finite Elements


    The finite element models are a class of methods for solving partial differential
    equations. The method works by dividing a large system into smaller and simpler
    parts called finite elements. This is achieved by realizing a mesh over the computational
    domain where the differential equations need to be solved. The mesh helps define
    the points/nodes required for the discretization of the differential equation.
    The “finite”'
