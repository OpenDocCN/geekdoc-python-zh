    # 4.2.3 Gaussianity in Numerical Data


    Gaussianity refers to the tendency of a dataset to follow a Gaussian distribution,
    also known as a normal distribution or bell curve. This distribution is characterized
    by its symmetrical bell-shaped curve where the mean, median, and mode coincide
    at the center of the distribution (Fig. 4.3).'
