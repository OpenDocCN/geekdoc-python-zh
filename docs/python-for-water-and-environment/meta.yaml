    引言


    在流体动力学中，纳维-斯托克斯方程连同一些初始条件被用来描述流体的速度矢量场。该方程是牛顿第二运动定律、流体中由粘性引起的应力以及施加压力的结果。大多数实际流动现象都可以通过求解这组非线性偏微分方程来解决。这需要先进的非线性求解器，尽管使用它们并不能保证收敛。然而，我们经常为了自身的应用而使用这些方程的简化版本。这本质上意味着，通过做一些假设，原始的非线性方程被简化为线性形式，例如一维流动的情况。


    纳维-斯托克斯方程的一般形式可由以下方程给出：


    $$\rho \frac{D\mathbf{v}}{Dt} = -\nabla p + \nabla \cdot \sigma_T + \mathbf{f}$$


    该方程是通过将连续性方程应用于质量和动量守恒方程推导出来的。现在描述一些有助于理解公式10.1中各项的概念。


    物质导数是动量守恒方程所需的一个概念。我们将物质导数定义为速度场$\mathbf{v}$中一个强度性质$u$的变化率。在数学上，它可以表示为


    $$\frac{Du}{Dt} = \frac{du}{dt} + \mathbf{v} \cdot \nabla u$$


    公式10.2中的第二项表示$u$沿速度场$\mathbf{v}$方向的方向导数。牛顿第二定律可以表述为


    $$\mathbf{b} = \rho \frac{\mathrm{d}}{\mathrm{d}t} \mathbf{v}(x, y, z, t)$$


    $$\mathbf{b} = \rho \left( \frac{\partial \mathbf{v}}{\partial t} + \frac{\partial
    \mathbf{v}}{\partial x} \frac{\partial x}{\partial t} + \frac{\partial \mathbf{v}}{\partial
    y} \frac{\partial y}{\partial t} + \frac{\partial \mathbf{v}}{\partial z} \frac{\partial
    z}{\partial t} \right)$$


    如果速度$\mathbf{v}$是强度性质，那么公式10.3可以改写为


    $$\mathbf{b} = \rho \left( \frac{\partial \mathbf{v}}{\partial t} + \mathbf{v}
    \cdot \nabla \mathbf{v} \right)$$


    或者，$$\mathbf{b} = \rho \frac{D\mathbf{v}}{Dt}, \quad (\text{使用公式10.2})$$


    进一步假设作用在微小流体立方体上的总质量力是由流体内部的应力和外力引起的，我们可以陈述：


    $$\mathbf{b} = \nabla \cdot \sigma + \mathbf{f}$$


    这里，$\mathbf{f}$代表外力，$\nabla \cdot \sigma$代表应力张量的散度，$\mathbf{b}$是质量力。应力张量可以写为


    $$\sigma = \begin{pmatrix} \sigma_{xx} & \sigma_{xy} & \sigma_{xz} \\ \sigma_{yx}
    & \sigma_{yy} & \sigma_{yz} \\ \sigma_{zx} & \sigma_{zy} & \sigma_{zz} \end{pmatrix}$$


    应力张量$\sigma$可以进一步分解为两个分量——体积部分和偏斜部分。前者负责物体的体积变化，而后者负责形状变化或变形。在数学上，它可以写为


    $$\sigma = \begin{pmatrix} \sigma_{xx} & \sigma_{xy} & \sigma_{xz} \\ \sigma_{yx}
    & \sigma_{yy} & \sigma_{yz} \\ \sigma_{zx} & \sigma_{zy} & \sigma_{zz} \end{pmatrix}$$


    $$\sigma = -\begin{pmatrix} p & 0 & 0 \\ 0 & p & 0 \\ 0 & 0 & p \end{pmatrix}
    + \begin{pmatrix} \sigma_{xx} + p & \sigma_{xy} & \sigma_{xz} \\ \sigma_{yx} &
    \sigma_{yy} + p & \sigma_{yz} \\ \sigma_{zx} & \sigma_{zy} & \sigma_{zz} + p \end{pmatrix}$$


    $$\sigma = -p\mathbf{I} + \sigma_T$$


    为了建模，我们通常假设流体是牛顿流体，即应力与变形率成正比。因此，牛顿流体的应力表达式可以给出为


    $$\sigma_{ij} = \mu \left( \frac{\partial u_i}{\partial x_j} + \frac{\partial
    u_j}{\partial x_i} \right)$$


    在上面的方程中，$\mu$被称为流体粘度。它定义了流体在受到质量力作用时流动的难易程度。应力项的散度现在可以表述为


    $$\nabla \cdot \sigma = \mu \nabla \cdot \begin{pmatrix} \sigma_{xx} & \sigma_{xy}
    & \sigma_{xz} \\ \sigma_{yx} & \sigma_{yy} & \sigma_{yz} \\ \sigma_{zx} & \sigma_{zy}
    & \sigma_{zz} \end{pmatrix} \quad (10.13)$$


    $$\nabla \cdot \sigma = \mu \begin{pmatrix} 2\frac{\partial u}{\partial x} & \frac{\partial
    u}{\partial y} + \frac{\partial v}{\partial x} & \frac{\partial u}{\partial z}
    + \frac{\partial w}{\partial x} \\ \frac{\partial u}{\partial y} + \frac{\partial
    v}{\partial x} & 2\frac{\partial v}{\partial y} & \frac{\partial v}{\partial z}
    + \frac{\partial w}{\partial y} \\ \frac{\partial u}{\partial z} + \frac{\partial
    w}{\partial x} & \frac{\partial v}{\partial z} + \frac{\partial w}{\partial y}
    & 2\frac{\partial w}{\partial z} \end{pmatrix} \quad (10.14)$$


    散度项的$x$分量可以计算如下：


    $$(\nabla \cdot \sigma)_i = \mu \frac{\partial}{\partial x} \left( 2\frac{\partial
    u}{\partial x} \right) + \frac{\partial}{\partial y} \left( \frac{\partial u}{\partial
    y} \frac{\partial v}{\partial x} \right) + \frac{\partial}{\partial z} \left(
