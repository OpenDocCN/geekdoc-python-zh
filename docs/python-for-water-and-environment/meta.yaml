    single_hist.pdf\", dpi=300)\nprint(\"\\n\\nPlotted!\")\n```\n\n![](img/0c8a53eeca13bc4d5422655fb7aaba77_60_0.png)\n\
    \n图5.3 1981年至2005年戈达瓦里河日平均水位（米）直方图\n\n给定的Python程序用于从数据集中生成直方图，在本例中，该数据集名为“Godavari.csv”。程序的关键组成部分可分解如下：\n\
    \n首先，我们导入数据操作和可视化所需的库：用于数据操作的pandas结合Seaborn，以及用于数据可视化的matplotlib。\n\n接下来，我们使用pandas的“read_csv()”函数加载CSV文件。然后，程序使用“dropna()”函数删除包含缺失值的行，使用“pd.to_datetime()”将“time”列转换为日期时间格式，最后仅保留数据的“Level”列以供进一步分析。\n\
    \n然后，使用Seaborn的“histplot()”函数创建“Level”数据的直方图。直方图有50个区间（“bins=50”）。网格线和布局调整使用matplotlib函数（“grid”、“tight_layout”）完成。\n\
    \n最后，使用“plt.show()”在屏幕上显示直方图，并使用“plt.savefig()”将其保存为PDF文件。\n\n这个Python程序读取一个时间序列数据集，处理数据以仅保留所需的列（在本例中为“Level”），并创建数据的直方图以可视化其分布。结果如图5.3所示。\n\
    \n### 5.1.2 箱线图\n\n箱线图，也称为箱须图，是一种用于描述数据分布的图形表示。它显示了数据集的最小值、第一四分位数（Q1）、中位数、第三四分位数（Q3）和最大值的摘要。“箱”代表四分位距（Q3–Q1），包含中间50%的数据，而“须”延伸至最小和最大观测值。异常值可以表示为须线之外的单个点。\n\
    \n```\n\"\"\"\nBoxplot for single dataset\n\"\"\"\n\n# Import libraries\nimport\
    \ pandas as pd\nimport seaborn as sns\nimport matplotlib.pyplot as plt\n\n\"\"\
    \"\nLoad dataset\n\"\"\"\ndata = pd.read_csv(\n    filepath_or_buffer=\"../data/Godavari.csv\"\
    ,\n    sep=\",\",\n    header=0).dropna()\nprint(\"\\nChecking data:\")\ntry:\n\
    \    data[\"time\"] = pd.to_datetime(\n        data['time'], infer_datetime_format=True)\n\
    \    print(\"   Date format is okay!\\n\")\nexcept ValueError:\n    print(\" \
    \  Encountered error!\\n\")\n    pass\n\nLevel_data = data[[\"time\", \"Level\"\
    ]]\ndel data\nprint(\"Read data file\")\n\n\"\"\"\nResample:\nDownsample the time\
    \ series\n\"\"\"\nLevel_data = Level_data.resample('1M', on=\"time\").mean()\n\
    \n\"\"\"\nPlotting the boxplot\n\"\"\"\nsns.boxplot(data=Level_data,\n       \
