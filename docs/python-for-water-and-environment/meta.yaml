  - '[PAGE 206]


    The 2D SWE consists of three primary equations representing the conservation of
    mass (continuity equation) and momentum in horizontal directions (x and y). These
    equations account for fluid depth, flow velocity, gravitational force, and bed
    elevation, comprehensively representing fluid dynamics in two horizontal dimensions.
    Due to their ability to capture complex flow phenomena, 2D SWE is widely employed
    in surface flow models, offering a detailed understanding of flow patterns, velocities,
    and depths in various hydrological systems.


    The Saint-Venant equations, which form the basis of the 1D shallow water equations,
    are closely related to the 2D SWE. Both sets of equations are derived from the
    same fundamental principles of mass and momentum conservation, with the primary
    difference being the dimensionality of the flow representation. While the Saint-Venant
    equations are confined to one spatial dimension and are ideal for simulating flow
    in channels with relatively simple geometries, the 2D SWE provides a more comprehensive
    representation of flow patterns in situations with complex spatial variations,
    such as floodplains, estuaries, and urban areas.


    Applications of the 2D shallow water equations and the Saint-Venant equations
    are widespread in studying surface flow models. They are used for predicting and
    managing flood risks, designing hydraulic structures, assessing the impact of
    land-use changes, and evaluating the consequences of extreme hydrological events.
    Moreover, these equations have been incorporated into coupled surface-subsurface
    models, enhancing the understanding the interactions between groundwater and surface
    water systems.


    Thus, the 2D shallow water and Saint-Venant equations play a pivotal role in studying
    surface flow models. Their ability to capture the essential hydrodynamic processes
    in various hydrological systems makes them indispensable tools for researchers,
    engineers, and water resource managers seeking to understand and address the challenges
    associated with water flow, flood risk, and environmental conservation.


