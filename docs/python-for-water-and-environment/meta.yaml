    # 9.3 Prediction Intervals


    # 9.3.1 Non-parametric Prediction Interval


    A non-parametric prediction interval for quantiles is a method of estimating the
    range where future observations are likely to fall, without making assumptions
    about the underlying distribution. It is particularly useful when data does not
    follow a known or easily identifiable distribution, relying instead on the actual
    data structure (Fig. 9.7).


