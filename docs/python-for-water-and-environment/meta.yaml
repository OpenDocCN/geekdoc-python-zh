  md: "```\npython\nxdmfu = XDMFFile(\n    comm=domain.comm,\n    filename=resultPath\
    \ + simulationName + \".xdmf\",\n    file_mode=\"w\",\n    encoding=XDMFFile.Encoding.HDF5)\n\
    xdmfu.write_mesh(mesh=domain)\nxdmfu.write_function(\n    u=u1,\n    t=t_start)\n\
    \n\"\"\"\nWe load the velocity data file from the Navier-Stokes\nsimulation. The\
    \ velocity vector (u_i, u_j) is used\nto realize the advection part of the equation.\n\
    Because the data was stored in HDF5 format, we employ\nh5py library to load the\
    \ data. This is done just before\n'solving' the equation.\n\"\"\"\nwith h5py.File(\n\
    \        name=velocityDataPath, mode='r') as fr:\n    print(\"Name of the velocity\
    \ variable is {}\".format(\n        list(fr.keys())))\n\n    # Time stepping and\
    \ solving\n    progress = tqdm.autonotebook.tqdm(\n        desc=\"Solving nonlinear\
    \ system\",\n        total=n_steps\n    )\n    t = t_start\n    for n in range(n_steps):\n\
    \        print(\"Doing {}/{} step\".format(n, n_steps))\n        t = t + delta_t\n\
    \        u_data = fr['u'][n]\n        w.vector.array = u_data\n        r = solver.solve(u=u1)\n\
    \        u1n.x.array[:] = u1.x.array\n        xdmfu.write_function(\n        \
    \    u=u1,\n            t=t)\n    xdmfu.close()\nfr.close()\nprint(\"Done!\")\n\
    ```\n\nFrom lines 35–46, we load the mesh that was generated and saved using the\
    \ GMSH mesh-generating software. Lines 40–44 load the mesh object, the cell tags,\
    \ and the facet tag objects. In our mesh we do not have any cell tags; we only\
    \ have the facet tags and are required to identify the boundaries for setting\
    \ up the boundary conditions. The dimension of the facets has to be 1 less than\
    \ the dimension of the mesh, hence lines 45 and 46."
