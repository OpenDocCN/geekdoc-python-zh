  mdcn: "## 第8章\n常见假设检验\n\n假设检验，也称为显著性检验，在水文学中被广泛用于确定数据是否支持特定假设。它使人们能够对水文现象进行统计推断，并从数据中得出结论。通过设计备择假设和原假设，可以检验模型预测相对于观测结果的可信度。\n\
    \n假设检验在水文学中的一个标准应用是确定两组样本之间的差异是否代表其总体之间的真实差异。例如，科学家可能会使用t检验来比较不同季节或地理区域之间的平均降水量。同样，方差分析（ANOVA）检验可用于比较多个组别或时间段的温度、河流流量或降水量。\n\
    \n假设检验在评估变量之间的关系时也很有用。例如，可以通过皮尔逊相关检验来评估变量（如蒸散发和温度）之间关系的强度或相关程度。使用假设检验，还可以确认变量（如河流流量、降雨量和温度）之间估计的回归系数是否具有统计显著性。\n\
    \n此外，假设检验也可用于验证水文模型的合理性。例如，科学家可以使用卡方拟合优度检验来验证观测数据频率与特定水文模型预测频率的一致性。同样，可以使用像柯尔莫哥洛夫-斯米尔诺夫这样的检验来比较模型残差的经验分布与理论分布（通常是高斯分布），以验证假设并评估模型效能。\n\
    \n然而，在应用假设检验时需要谨慎。尽管它提供了宝贵的统计见解，但其结果本质上取决于样本量和所选的显著性水平。通常，较大的样本能够检测到较小的统计效应。相反，通常选择的显著性水平（通常为0.05）有些武断，作为确定“统计显著性”的标准阈值。此外，未能拒绝原假设并不一定证明其为真；它仅仅表明没有足够的证据拒绝它。\n\
    \n## 7.2 常见预测方法\n\n上述程序使用简单指数平滑（SES）模型实现了一个时间序列模型，使用了Python以及pandas、NumPy、matplotlib、statsmodels、sklearn和Seaborn等多个库。\n\
