    from one place to another. Transportation via diffusion occurs when there is a
    difference between the concentration of the contaminants. Diffusion is a gradual
    process due to the random motion of the fluid particles. Advection is the process
    by which the contaminants are carried with the flow of the water through which
    it flows. Compared to diffusion and reaction, transport via advection is relatively
    fast.


    The overall behavior of contaminant transport is a manifestation of these three
    processes and consequently is modeled using differential equations that consider
    these mechanisms and mutual interactions. In the upcoming sections, we describe
    different models that can be used with contaminant transport.


    # 13.2 1D Diffusion Equation


    In hydrology, the diffusion equation is used to describe the spread of contaminants
    or pollutants in groundwater. The equation models the migration of the contaminant
    over time in the subsurface due to molecular diffusion. The diffusion coefficient
    determines the rate at which the substance spreads, while the Laplacian operator
    characterizes the spatial gradient of the concentration. The 1D diffusion equation
    can be expressed as


    $$\frac{\partial[u]}{\partial t} = D \frac{\partial^2[u]}{\partial x^2}$$


    where, $[u]$ is the concentration of the substance, $t$ is time, $D$ is the diffusion
    coefficient, and $\frac{\partial^2}{\partial x^2}$ is the Laplacian $\Delta$ operator.
    The equation describes the rate of change of the contaminant''s concentration
    with respect to the product of the diffusion coefficient $D$ and double spatial
    derivative of the concentration. Physically, $D$ states the ease with which the
    pollutant can move through a medium. Determination of this quantity is often a
    complex task but due to its importance, researchers and scientists continue to
    devise new methods for estimating its value. Some of the reasons that make it
    difficult to estimate the coefficient''s value are:


    +   - The occurrence of more than one contaminant, each having a different value
    of coefficient, can complicate the determination of a single value of the diffusion
    coefficient.

    - Generally, the environment where contaminant travels is mostly heterogeneous
    due to varying porosity, permeability, and tortuosity. These non-constant factors
    can still complicate the determination.

    - The values of the factors can change over time making determining the diffusion
    coefficient difficult.


    By solving the diffusion equation, hydrologists are able to forecast the movement
    and distribution of contaminants in groundwater over time, providing valuable
    information for assessing risks to water resources and designing remediation plans.
    The equation is also used in other hydrologic contexts, such as modeling the transport
    of pollutants in surface water or the transfer of heat in soils.'
  - '[PAGE 242]


    # 13.3 1D Diffusion-Reaction Equation


    Reaction in the context of contaminant transport means any change in the concentration
    of the contaminant over time. When combined with the diffusion equation 13.1 the
    system reads


    $$\frac{\partial[u]}{\partial t} = D\frac{\partial^2[u]}{\partial x^2} + R[u]$$


    where $R$ is called the rate of reaction with the rest having the same meanings
    as the diffusion equation. The reactions occur between the contaminant and the
    environment where they travel and they can be classified as follows:


    +   - In groundwater, oxidation/reduction reaction is an important process that
    decides the fate of the contaminant where there is a deficiency of dissolved oxygen.

    - Degradation of the organic compounds by micro-organisms such as bacteria and
    algae is also a common subsurface phenomenon. These organisms help break down
    more complex contaminants into simple compounds.

    - Sorption is another process that affects the movement of the contaminant into
    the environment. It is a process by which the contaminants are adsorbed onto the
    surface of the medium.

    - It is also common that one contaminant can get converted to another via some
    biological and chemical process. This generally results in the formation of new
    compounds with significantly new properties.


    Understanding the properties of these reactions is essential as it can help conduct
    risk assessment and prepare remediation techniques, once the contaminant is dispersed
    into the environment. An accurate modeling of the reaction process can also help
    develop management strategies.


    # 13.4 1D Advection-Diffusion Equation


    In hydrology, advection-dominated flow refers to a way that water and other substances
    move in a groundwater or surface water system. Instead of spreading out and mixing
    with their surroundings, these substances are carried along in a cohesive unit
    as the water moves. This type of flow is typically found in places like aquifers,
    rivers, and streams, and can greatly impact the availability and quality of water.
    A one-dimensional advection-diffusion model can be stated as


    $$\frac{\partial[u]}{\partial t} + w\frac{\partial[u]}{\partial x} = D\frac{\partial^2[u]}{\partial
    x^2}$$


    where $w$ is the advection coefficient having the unit of velocity with others
    having the same meaning as the diffusion case.'
  - '[PAGE 243]


    Advection dominated flow is important for flood control because it determines
    the speed and direction of the movement of water. If this type of flow is strong,
    water can quickly flow downstream, which can help to prevent or reduce the damage
    caused by floods. The reason is that the water does not stay in one place for
    very long and cannot cause as much damage. Understanding advection-dominated flow
    can help make better decisions for flood control, such as building better structures
    or predicting how rivers will behave during floods. In short, considering advection-dominated
    flow can help protect communities and infrastructure from flood damage.


    # 13.5 A 2D Simulation Using Navier-Stokes Equations


    Understanding of the fluid flow phenomenon is essential as it can affect many
    aspects of human life, such as flood control and water resources. Computational
    fluid dynamics, or CFD, is a technological advancement that helps us define the
    governing equations of fluid flow. The equations are widely known as the Navier-Stokes
    equations, which represent the mathematical models describing fluid flow behavior
    and its interactions in riverbeds, rocks, and debris.


    The Navier-Stokes equations are specified using a set of partial differential
    equations that are solved for velocity and pressure. These equations are essential
    for understanding and predicting fluid flow behavior in rivers and other water
    bodies. They provide a general system of PDEs that, when combined with the physical
    properties of the fluid, say water, can be used to model its movement in rivers
    and to predict pressure, velocity, and other derived quantities such as drag and
    lift. However, the latter are more relevant in aerodynamics and atmospheric flows.


    Another critical equation in the analysis of flow in rivers is the continuity
    equation. It states that the amount of fluid entering a system must equal the
    amount of fluid exiting it. It facilitates the balance between the volume of water
    entering the river system and the volume leaving it, thereby helping predict water
    flow over time. These equations play a significant role in understanding the behavior
    of a river system in events such as flood and change in the physical properties
    of the constituent fluids. Therefore, a numerical simulator that solves the Navier-Stokes
    equations qualifies to become an essential tool for hydrologists and water resource
    managers as it helps them make decisions about flood control and mitigation.


    The Navier-Stokes equations can be understood as Newton’s second law of motion
    for fluids. The equations consist of two parts. Equation 10.1 is restated here
    as Eq. 13.4 with the addition of the continuity part. In this section, we describe
    a numerical model to solve the incompressible Navier-Stokes equations for single-phase
    flow. The word “incompressible” means that the density of the fluid does not change
    with the application of external pressure. This also means that the volume of
    the water (fluid) remains constant as it flows along. Hence, in the second part
    of Eq. 13.4 we drop the $\frac{\partial \rho}{\partial t}$ term from the LHS.
    The inertial forces are represented by the terms o the LHS; then the first term
    in the RHS consists of the pressure and viscous forces as given by Eq. 10.9’s
    third part and Eq. 10.12. The term **f** represents all external forces.'
- md: '## 13.5.1 Construction of the Computational Domain


    Any finite element program relies on a quality mesh for an analysis. The requirements
    of the mesh are quite strict when compared to other numerical methods. In order
    to generate a good quality mesh, we use the GMSH open-source software.


    Figure 13.1 is representative of an aquifer with a surface area of ≈1750 m². We
    introduce the inlet and the outlet as shown in Fig. 13.1. The inlet has a width
    of 5 m and the outlet has a 10 m wide opening. Two obstacles are introduced which
    represent islands amidst the aquifer.


    Once the geometry of the domain is created, we specify markers to specific boundaries
    in the domain. The different markers are shown in different colors in Fig. 13.2.
    The inlet and outlet are in navy blue and purple colors. The obstacles/islands
    and the rest of the boundaries are shown in green and pink colors respectively.
    After the specification of the markers, the remaining task is meshing. The software
    provides suitable options to export the “demarcated” mesh in FEniCS readable formats.
    The native mesh format has a “.msh” extension—this is readily parsed by the FEniCS’s
    “read_from_mesh” function.


    In order to create the computational domain we use the GMSH open-source software.
    Referring to Fig. 13.1, the GMSH code required to generate the domain is given
    in Sect. 13.5.2. The first line in the code “SetFactory(“OpenCASCADE”)” is specified
    to set up the geometry kernel. Line 3 sets the value of the parameter “h”. The
    value of 12.0 was chosen after some trials where the criteria were to coarsen
    the elements in the inlet and the outlet. Figure 13.3 is the result of meshing
    with this value. A value less than 12.0 resulted in the elements being too fine.


    The keywords “Point” specify the coordinates of the point in the 2D plane where
    the plane is realized by setting the third entry as zero. The last entry is a
    term containing the parameter “h”. We note that points 1, 2 and 11, 12 have this
    entry three times larger than others. These points correspond to the inlet and
    outlet and hence a larger parameter value ensures large element sizes. But still
    looking at Fig. 13.3 one can notice fine elements being present around the inlet,
    outlet, and the obstacles. The presence of fine elements helps achieve better
    accuracy in these regions. We intentionally settle for this mesh so as to capture
    the phenomena such as vortex street due to the no-slip boundary condition. The
    regions with larger elements are expected to exhibit homogeneous patterns.


    The keyword “Line” is used to specify the line segment defined using a pair of
    points. There are 10 such line segments that form a closed boundary of the domain.
    The obstacles are realized using “Circle” keywords where the first three entries
    specify a point in the circumference, followed by an entry of the radius. The
    last two entries help specify the completeness of the arc; a value of “2π” denotes
    a complete closed circle.


    The “Curve Loop” keyword works with closed boundaries only and has been used to
    identify the three closed loops—the outer boundary, and the inner two obstacles.
    The “Plane Surface” keyword is used to specify the surface excluding the obstacles.
    The physical groups within GMSH help to specify the boundary markers. As can be
    seen in lines 34–38, the different boundaries have been given suitable names along
    with an integer value. Although, either of these can be used with boundary conditions,
    FEniCS/DOLFINx mandates using the integer values for the specification. The sets
    in the RHS denote the line segments that a particular physical curve must refer
    to. In the last line, we also define a physical surface called “aquifer” for the
    sake of completeness.


    Once the markers are set we mesh the domain with triangular mesh elements as shown
    in Fig. 13.3. The “h” parameter controls the density of the elements near the
    points. Additionally, three more iterations comprising of “Refine by splitting”
    and “Recombine 2D” were also carried out; the shown mesh is a result of all those
    operations. These options are only available in the graphical user interface of
    the GMSH software.


    ## 13.5.2 GMSH Code to Generate the Computational Domain


    ```

    1 SetFactory("OpenCASCADE");

    2 //+

    3 h=12.0;

    4 Point(1) = {0, 0.50, 0, h*3};

    5 Point(2) = {0.50, 0.50, 0, h*3};

    6 Point(3) = {0.50, 0, 0, h};

    7 Point(4) = {5.00, 0, 0, h};

    8 Point(5) = {5.00, 2.50, 0, h};

    9 Point(6) = {5.50, 2.50, 0, h};

    10 Point(7) = {5.50, 3.50, 0, h};

    11 Point(10) = {0.50, 3.50, 0, h};

    12 Point(11) = {0.50, 1.00, 0, h*3};

    13 Point(12) = {0, 1.00, 0, h*3};

    14 //+

    15 Line(1) = {1, 2};

    16 Line(2) = {2, 3};

    17 Line(3) = {3, 4};

    18 Line(4) = {4, 5};

    19 Line(5) = {5, 6};

    20 Line(6) = {6, 7};

    21 Line(7) = {7, 10};

    22 Line(8) = {10, 11};

    23 Line(9) = {11, 12};

    24 Line(10) = {12, 1};

    25 //+

    26 Circle(11) = {1.35, 0.75, 0.0, 0.3, 0, 2*Pi};

    27 Circle(12) = {4.0, 2.4, 0.0, 0.3, 0, 2*Pi};

    28 //+

    29 Curve Loop(1) = {3, 4, 5, 6, 7, 8, 9, 10, 1, 2};

    30 Curve Loop(2) = {11};

    31 Curve Loop(3) = {12};

    32 Plane Surface(1) = {1, 2, 3};

    33 //+

    34 Physical Curve("inlet", 13) = {10};

    35 Physical Curve("outlet", 14) = {6};

    36 Physical Curve("noflow", 15) = {9, 8, 7, 5, 4, 3, 2, 1};

    37 Physical Curve("island", 16) = {11, 12};

    38 Physical Surface("aquifer", 17) = {1};

    ```


    ## 13.5.3 Variational Formulation


    The variational formulation of the Navier-Stokes equation consists of three parts.
    The first part can be given as


    $$\int_{\Omega} \frac{\rho_w}{dt} \langle u - u_n, v \rangle dx + \int_{\Omega}
    \langle \frac{3}{2} u_n - \frac{1}{2} u_{n1}, \frac{1}{2} \nabla (u + u_n) \rangle,
    v \rangle dx + \int_{\Omega} \frac{1}{2} \mu \langle \nabla (u + u_n), \nabla
    v \rangle dx - \int_{\Omega} \langle p, \nabla \cdot v \rangle dx + \int_{\Omega}
    \langle f, v \rangle dx = 0$$


    where, $\rho_w$ is the density of water, $u$ denotes the velocity at the current
    step. $u_n, u_{n1}$ denote the first and second steps from the current step in
    the past within a time loop. $v$ denotes the test function, $p$ is the pressure
    and $f$ is the source function.'
  mdcn: '## 13.5.1 计算域的构建


    任何有限元程序都依赖于高质量的网格进行分析。与其他数值方法相比，其对网格的要求相当严格。为了生成高质量的网格，我们使用了GMSH开源软件。


    图13.1展示了一个表面积约为1750平方米的含水层。我们按照图13.1所示引入了入口和出口。入口宽度为5米，出口开口宽度为10米。我们还引入了两个障碍物，它们代表含水层中的岛屿。


    一旦创建了域的几何形状，我们就为域内的特定边界指定标记。不同的标记在图13.2中以不同颜色显示。入口和出口分别为深蓝色和紫色。障碍物/岛屿以及其余边界分别以绿色和粉色显示。指定标记后，剩下的任务就是划分网格。该软件提供了合适的选项，可以将“标记好的”网格导出为FEniCS可读的格式。其原生网格文件扩展名为“.msh”——这可以被FEniCS的“read_from_mesh”函数直接解析。


    为了创建计算域，我们使用了GMSH开源软件。参考图13.1，生成该域所需的GMSH代码在第13.5.2节中给出。代码的第一行“SetFactory(“OpenCASCADE”)”用于设置几何内核。第3行设置了参数“h”的值。选择12.0这个值是经过一些试验的，标准是使入口和出口处的单元粗化。图13.3是使用此值进行网格划分的结果。小于12.0的值会导致单元过于精细。


    关键字“Point”指定了二维平面中点的坐标，该平面通过将第三个条目设置为零来定义。最后一个条目是包含参数“h”的项。我们注意到点1、2和11、12的这个条目是其他点的三倍。这些点对应于入口和出口，因此较大的参数值确保了较大的单元尺寸。但观察图13.3，仍然可以注意到入口、出口和障碍物周围存在精细的单元。精细单元的存在有助于在这些区域实现更高的精度。我们特意选择这种网格，是为了捕捉诸如由无滑移边界条件引起的涡街等现象。具有较大单元的区域预计会呈现均匀的模式。


    关键字“Line”用于指定由一对点定义的线段。共有10条这样的线段构成了域的封闭边界。障碍物使用“Circle”关键字实现，其中前三个条目指定圆周上的一个点，接着是半径条目。最后两个条目有助于指定弧的完整性；值“2π”表示一个完整的封闭圆。


    “Curve Loop”关键字仅适用于封闭边界，已用于识别三个封闭环——外边界和内部的两个障碍物。“Plane Surface”关键字用于指定排除障碍物的表面。GMSH中的物理组有助于指定边界标记。如第34-38行所示，不同的边界被赋予了合适的名称以及一个整数值。虽然两者都可以用于边界条件，但FEniCS/DOLFINx要求使用整数值进行指定。右侧的集合表示特定物理曲线必须引用的线段。在最后一行，为了完整性，我们还定义了一个名为“aquifer”的物理表面。


    一旦标记设置完毕，我们就使用三角形单元对域进行网格划分，如图13.3所示。参数“h”控制点附近的单元密度。此外，还进行了另外三次迭代，包括“通过分裂细化”和“二维重组”；所示网格是所有这些操作的结果。这些选项仅在GMSH软件的图形用户界面中可用。


