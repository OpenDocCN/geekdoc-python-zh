  md: '# Chapter 13

    Transport Phenomena


    Water contamination is a major concern in modern urban setups. It is a result
    of the mixing of a toxic substance, liquid or solid, with water that renders the
    water unusable for most purposes. In many scenarios, contamination happens accidentally,
    although intentional cases cannot be denied. Once released into the environment
    the contaminated water finds its way to the water table via different modes of
    transport. The contaminant may undergo a number of chemical changes on the way
    through the unsaturated zones before reaching the aquifer. The aquifer then helps
    transmit the liquid contaminants toward its outlets, and in the process, its concentration
    reduces gradually due to various physical, biological, and chemical reactions.
    This water that is found in springs, lakes, and rivers needs prior treatment for
    any use. Therefore, it is very important that the quality and quantity of these
    water resources be managed appropriately. Perhaps, technology is the most obvious
    means for the prevention and management of water contamination. Not to mention,
    legislation and education also play a significant role. However, it is the management
    of contamination that has to play a bigger role because pollution continues to
    happen.


    Consider an example of leaching where the contaminants, after getting released
    from a point source, or a storage tank, percolate through the unsaturated zones
    within the subsurface until they reach the water table. The groundwater flow then
    further carries the polluted water to other outlets. This chapter is dedicated
    to laying out the mathematical background of contaminant transport in the subsurface.
    These contaminants are present in the dissolved state and their concentration
    determines the water quality. The change in concentration is a direct manifestation
    of chemical reaction, precipitation, and dissolution of solid contaminant. Such
    changes are required to be put in the governing partial differential equation
    where they often form a part of the forcing function/term. It is to be noted that
    we work with macroscopic models that can predict the flow/transport of the chemical
    species (often reactive) when the carrier, here water, flows through the subsurface.
    The contaminant transport models differ from the single/multiphase flow models
    in terms of the dependent variable'
