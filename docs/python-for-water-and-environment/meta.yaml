  md: 'In the above equation, $\mu$ is called the fluid viscosity. It defines the
    ease with which the fluid flows when subjected to body forces. The divergence
    of the stress term can now be stated as


    $$\nabla \cdot \sigma = \mu \nabla \cdot \begin{pmatrix} \sigma_{xx} & \sigma_{xy}
    & \sigma_{xz} \ \sigma_{yx} & \sigma_{yy} & \sigma_{yz} \ \sigma_{zx} & \sigma_{zy}
    & \sigma_{zz} \end{pmatrix} \quad (10.13)$$


    $$\nabla \cdot \sigma = \mu \begin{pmatrix} 2\frac{\partial u}{\partial x} & \frac{\partial
    u}{\partial y} + \frac{\partial v}{\partial x} & \frac{\partial u}{\partial z}
    + \frac{\partial w}{\partial x} \ \frac{\partial u}{\partial y} + \frac{\partial
    v}{\partial x} & 2\frac{\partial v}{\partial y} & \frac{\partial v}{\partial z}
    + \frac{\partial w}{\partial y} \ \frac{\partial u}{\partial z} + \frac{\partial
    w}{\partial x} & \frac{\partial v}{\partial z} + \frac{\partial w}{\partial y}
    & 2\frac{\partial w}{\partial z} \end{pmatrix} \quad (10.14)$$


    The $x$ component of the divergence term can be computed as follows:


    $$(\nabla \cdot \sigma)_i = \mu \frac{\partial}{\partial x} \left( 2\frac{\partial
    u}{\partial x} \right) + \frac{\partial}{\partial y} \left( \frac{\partial u}{\partial
    y} \frac{\partial v}{\partial x} \right) + \frac{\partial}{\partial z} \left(
    \frac{\partial u}{\partial z} \frac{\partial w}{\partial x} \right) \quad (10.15)$$


    $$(\nabla \cdot \sigma)_i = \mu \frac{\partial^2 u}{\partial x^2} + \frac{\partial^2
    u}{\partial y^2} + \frac{\partial^2 u}{\partial z^2} + \frac{\partial^2 u}{\partial
    x^2} + \frac{\partial^2 u}{\partial x \partial y} + \frac{\partial u^2}{\partial
    x \partial z} \quad (10.16)$$


    $$(\nabla \cdot \sigma)_i = \mu \nabla^2 u + \mu \frac{\partial}{\partial x} \left(
    \frac{\partial u}{\partial x} + \frac{\partial v}{\partial y} + \frac{\partial
    w}{\partial z} \right) \quad (10.17)$$


    $$(\nabla \cdot \sigma)_i = \mu \nabla^2 u + \mu \frac{\partial}{\partial x} (\nabla
    \cdot v) \quad (10.18)$$


    $$(\nabla \cdot \sigma)_i = \mu \nabla^2 u + 0 \quad (10.19)$$


    $$(\nabla \cdot \sigma)_i = \mu \nabla^2 u \quad (10.20)$$


    The $y$ and $z$ terms can be computed in a similar manner. Consequently, for the
    case of incompressible Newtonian fluids, the flow equation can be given as


    $$\rho \frac{D\mathbf{v}}{Dt} = -\nabla p + \mu \nabla^2 u + \mathbf{f} \quad
    (10.21)$$


    We shall refer to this equation in the upcoming sections where we extend the derivation
