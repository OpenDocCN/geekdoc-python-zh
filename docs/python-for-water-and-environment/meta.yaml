  md: 'Now, coming to our example of the derivation of the weak form of Darcy’s pressure
    law. The law in Eq. 10.25 can be alternatively given in the form as in Eq. 10.26.


    $$- \nabla \cdot \frac{K}{\mu} \nabla p = 0 \quad \in \Omega \qquad (10.26)$$


    Here, the first ($\nabla \cdot$) symbol denotes the divergence operation, and
    the second ($\nabla$) before $p$ denotes the gradient operation.


    (1) The first step is to multiply Eq. 10.26 with a test function $\psi$.


    $$\psi \left( -\nabla \cdot \frac{K}{\mu} \nabla p \right) = 0 \quad \forall \psi
    \qquad (10.27)$$


    One can easily realize the analogy between the LHS of Equation 10.27 and the second
    term in the RHS of Equation 10.22.


    (2) The second step is to integrate the equation over the domain $\Omega$.


    $$- \int_{\Omega} \psi \left( \nabla \cdot \frac{K}{\mu} \nabla p \right) = 0
    \qquad (10.28)$$


    (3) The third step is to do integration by parts using Eq. 10.22.


    $$- \left( \int_{\Omega} \nabla \cdot \left( \psi * \left( \frac{K}{\mu} \nabla
    p \right) \right) - \int_{\Omega} \nabla \psi * \left( \frac{K}{\mu} \nabla p
    \right) \right) = 0 \qquad (10.29)$$


    Or,


    $$\int_{\Omega} \nabla \psi * \left( \frac{K}{\mu} \nabla p \right) - \int_{\Omega}
    \nabla \cdot \left( \psi * \left( \frac{K}{\mu} \nabla p \right) \right) = 0 \qquad
    (10.30)$$


    (4) The fourth step is to apply the divergence theorem on the second term in Eq.
    10.30 using Eq. 10.23.


    $$\int_{\Omega} \nabla \psi * \left( \frac{K}{\mu} \nabla p \right) - \oint_{\Gamma}
    \left( \psi * \left( \frac{K}{\mu} \nabla p \right) \right) \cdot \hat{n} = 0
    \qquad (10.31)$$


    (5) The fifth step is to express the Eq. 10.32 using inner product notation.


    $$\left\langle \nabla \psi, \left( \frac{K}{\mu} \nabla p \right) \right\rangle
    - \left\langle \psi, \left( \frac{K}{\mu} \nabla p \cdot \hat{n} \right) \right\rangle
    = 0 \qquad (10.32)$$


    Here, the first term is called a kernel and the second term is called the boundary
    condition.'
