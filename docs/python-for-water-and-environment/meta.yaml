    \ \"River\"] = \"Godavari\"  # Creating new column\ndf1 = df1.iloc[:1000, :]\n\
    \n# Loading second dataset\ndata2 = pd.read_csv(\n    filepath_or_buffer=\"../data/Cauvery.csv\"\
    ,\n    sep=\",\",\n    header=0\n).dropna()\ndf2 = data2[[\"Level\", \"Streamflow\"\
    ]]  # Retrieving columns\ndf2.loc[:, \"River\"] = \"Cauvery\"  # Creating new\
    \ column\ndf2 = df2.iloc[:1000, :]\n\n\"\"\"\nDefine a function for F-Test\n\"\
    \"\"\ndef F_Test(a, b):\n    # Computing variances\n    var1 = np.var(a, ddof=1)\n\
    \    var2 = np.var(b, ddof=1)\n    fstat = np.divide(var1, var2)\n\n    # Getting\
    \ DOFs of samples\n    dof_numerator, dof_denominator = \\\n        a.shape[0]-1,\
    \ b.shape[0]-1\n\n    # Computing p-value using f distribution's cdf\n    p_val\
    \ = 1. - stats.f.cdf(\n        x=fstat, dfn=dof_numerator, dfd=dof_denominator\n\
    \    )\n\n    # Returning results\n    return fstat, p_val\n\n\n# Performing the\
    \ F-Test (First part)\nalpha = 0.05\nf_statistics = F_Test(\n    a=df1[\"Streamflow\"\
    ], b=df2[\"Streamflow\"]\n)\nprint(f_statistics)\nprint(\"\\n1. Different samples:\"\
