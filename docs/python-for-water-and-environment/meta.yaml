    linear_solver.setOperators(A)\n\nlinear_solver.setType(PETSc.KSP.Type.PREONLY)\n\
    linear_solver.getPC().setType(PETSc.PC.Type.LU)\n\n\"\"\"\n时间步进求解\n\"\"\"\nt =\
    \ t_start\nfor i in range(Nt):\n\n    # 更新时间\n    t = t + dt\n\n    # 将局部向量 b\
