    \n# Using a while loop\nprint(\"\\nUsing a while loop:\")\ni = 1\nwhile i <= 10:\n\
    \    print(i)\n    i += 1\n```\n\nIn this code example, the “for” loop along with\
    \ the “range()” function acts as a number generator that generates a series of\
    \ numbers from 1 to 10. Within the loop, the “print()” function is used to display\
    \ the numeral in the console. The “while” loop runs unconditionally until the\
    \ condition “i” is less than or equal to 10 returns a true value. Again, the “print()”\
    \ function is used to print the current value of “i” as the loop iterates through\
    \ the sequence. When the value of “i” is more than 10, the condition “i <= 10”\
    \ no longer returns true, consequently terminating the loop.\n\n## 3.4.6 Conditional\
    \ Statements in Python\n\nHere, we give a Python program that uses conditional\
    \ statements to find out whether an input number is positive, negative, or zero.\n\
    \n```python\n# Take input from the user\nnum = float(input(\"Enter a number: \"\
    ))\n\n# Use conditional statements to check the number\nif num > 0:\n    print(\"\
    The number is positive\")\nelif num == 0:\n    print(\"The number is zero\")\n\
    else:\n    print(\"The number is negative\")\n```\n\nIn the given program the\
    \ “if” statement checks if the number is greater than zero. If this condition\
    \ holds a true value, it displays “The number is positive”. If the criterion returns\
    \ a false value, it goes to the “elif” statement. The “elif” (an abbreviation\
    \ for “else if”) statement checks whether the input number is zero. If this condition\
    \ returns true, it displays “The number is zero”. If this condition is also invalidated,\
    \ it goes to the else statement, which takes care of all other criteria not covered\
    \ by the preceding “if” and “elif” statements. That essentially means the input\
    \ number must be less than zero, printing the message “The number is negative”.\n\
    \n## 3.4.7 File Operations in Python\n\nHere, we show a simple Python code that\
