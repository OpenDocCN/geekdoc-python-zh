    \ provides valuable insights into the behavior of a system under uncertainty,\
    \ allowing competent decision-making. Exploring a wide range of possible outcomes\
    \ helps identify potential risks and opportunities, supporting risk management,\
    \ design optimization, and scenario analysis. It has become an indispensable tool\
    \ requiring sophisticated uncertainty analysis and decision-making under uncertainty.\n\
    \n```\n\"\"\"\nMonte Carlo error propagation\non a simple forward model:\nManning's\
    \ equation\nV = (1/n) * R^(2/3) * S^(1/2),\nwhere,\nV is the flow velocity,\n\
    n is the Manning's roughness coefficient,\nR is the hydraulic radius, and\nS is\
    \ the channel slope\n\"\"\"\n\nimport numpy as np\nfrom scipy import stats\nimport\
    \ matplotlib.pyplot as plt\n\nplt.rc('text', usetex=True)\nnp.random.seed(11)\n\
    \ndef compute_velocity(n=1., b=1., h=1., S=1.):\n    R = (b * h) / (2 * b + h)\n\
