    $$\mathbf{b} = \rho \left( \frac{\partial \mathbf{v}}{\partial t} + \frac{\partial
    \mathbf{v}}{\partial x} \frac{\partial x}{\partial t} + \frac{\partial \mathbf{v}}{\partial
    y} \frac{\partial y}{\partial t} + \frac{\partial \mathbf{v}}{\partial z} \frac{\partial
    z}{\partial t} \right)$$


    If velocity, $\mathbf{v}$, is the intensive property, then Eq. 10.3 can be rewritten
    as


    $$\mathbf{b} = \rho \left( \frac{\partial \mathbf{v}}{\partial t} + \mathbf{v}
    \cdot \nabla \mathbf{v} \right)$$


    or, $$\mathbf{b} = \rho \frac{D\mathbf{v}}{Dt}, \quad (\text{using Eq. 10.2})$$


    Further assuming that the total body force on the infinitesimal fluid cubes is
    due to stresses within the fluid and external forces, we can state that:


    $$\mathbf{b} = \nabla \cdot \sigma + \mathbf{f}$$


    Here, $\mathbf{f}$ represents the external forces, $\nabla \cdot \sigma$ represents
    the divergence of the stress tensor and $\mathbf{b}$ is the body force. The stress
    tensor can be written as


    $$\sigma = \begin{pmatrix} \sigma_{xx} & \sigma_{xy} & \sigma_{xz} \ \sigma_{yx}
    & \sigma_{yy} & \sigma_{yz} \ \sigma_{zx} & \sigma_{zy} & \sigma_{zz} \end{pmatrix}$$


    The stress tensor, $\sigma$, can be further composed of two components—the volumetric
    part and the deviatoric part. The former is responsible for change in the body
    while the latter takes care of the change in shape or the deformation. Mathematically,
    it can be written as


    $$\sigma = \begin{pmatrix} \sigma_{xx} & \sigma_{xy} & \sigma_{xz} \ \sigma_{yx}
    & \sigma_{yy} & \sigma_{yz} \ \sigma_{zx} & \sigma_{zy} & \sigma_{zz} \end{pmatrix}$$


    $$\sigma = -\begin{pmatrix} p & 0 & 0 \ 0 & p & 0 \ 0 & 0 & p \end{pmatrix} +
    \begin{pmatrix} \sigma_{xx} + p & \sigma_{xy} & \sigma_{xz} \ \sigma_{yx} & \sigma_{yy}
    + p & \sigma_{yz} \ \sigma_{zx} & \sigma_{zy} & \sigma_{zz} + p \end{pmatrix}$$


    $$\sigma = -p\mathbf{I} + \sigma_T$$


    For the purpose of modeling, we often assume the fluids to be Newtonian, i.e.,
    the stress is directly proportional to the rate of deformation. Therefore, the
    expression of stress for a Newtonian fluid can be given as


    $$\sigma_{ij} = \mu \left( \frac{\partial u_i}{\partial x_j} + \frac{\partial
    u_j}{\partial x_i} \right)$$'
