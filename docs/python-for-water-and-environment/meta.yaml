    xlen = 2\nylen = 7\ndivs = 60\ndx = xlen / divs\ndy = ylen / divs\n\nx = np.arange(-1\
    \ - dx, 1 + dx, dx)\ny = np.arange(-1 - dy, 1 + dy, dy)\nxx, yy = np.meshgrid(x,\
    \ y)\nprint(\"Min {}, {}\".format(np.min(xx), np.min(yy)))\nprint(\"Max {}, {}\"\
    .format(np.max(xx), np.max(yy)))\n\n\"\"\"\n模型参数\n\"\"\"\ng = 9.8\ncfl = 0.5\n\
    \n# 源项\ndef eta_initial(y, x):\n    \"\"\"初始 eta 值函数。\"\"\"\n    Amp = 8.0\n \
    \   x, y = -0.1, -0.9\n    sigma = 0.3\n    return Amp * np.exp(\n        -1 *\
    \ (0.02*(x - x) ** 2 +\n             (y - y) ** 2) / (sigma ** 2))\n\n# 基础深度 +\
    \ 高斯振幅\neta = np.ones_like(xx)\neta = eta + eta_initial(yy, xx)\n\n# 解变量初始化为 [mesh_size\
    \ x 3] 形状\nSolution = np.zeros([xx.shape[0], xx.shape[1], 3])\nSolution[:, :,\
    \ 0] = eta  # 零索引对应 etas\nu = np.zeros_like(xx)\nv = np.copy(u)\n\n# 为便于应用边界条件而偏移索引\n\
    p_p1_x = np.roll(np.arange(len(x)), 1)\np_p1_y = np.roll(np.arange(len(y)), 1)\n\
    p_m1_x = np.roll(np.arange(len(x)), -1)\np_m1_y = np.roll(np.arange(len(y)), -1)\n\
    \n# 运行参数\nt_curr = 0.0\ndt = 0.0\nt_stop = 2.0\n\n# 解变量\netas = list()\ntimes\
