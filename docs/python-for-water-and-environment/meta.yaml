    \ 300 dpi 的分辨率保存为当前目录中的“quantile_reg.pdf”。\n\n## 9.5 最大似然估计 (MLE)\n\n最大似然估计 (MLE)\
    \ 是一种统计方法，通过找到使似然函数最大化的参数值来估计模型的参数。所得估计值在给定参数值的情况下，最大化了观测到数据的概率，假设所选模型是正确的。"
