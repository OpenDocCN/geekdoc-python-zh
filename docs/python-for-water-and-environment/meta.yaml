    We now compare the results of 1D kinematic wave approximation for the three-channel
    cases, viz, the rectangular, triangular, and circular channels. All the simulation
    parameters were the same for the three cases except the expressions for the $\alpha$,
    $\beta$. Upon comparing Figs. 11.1, 11.2, and 11.3 one can see that the height
