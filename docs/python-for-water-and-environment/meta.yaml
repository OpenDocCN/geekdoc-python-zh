  md: "```\n\"\"\"\nDefine a function for F-Test\n\"\"\"\ndef F_Test(a, b):\n    #\
    \ Computing variances\n    var1 = np.var(a, ddof=1)\n    var2 = np.var(b, ddof=1)\n\
    \    fstat = np.divide(var1, var2)\n\n    # Getting DOFs of samples\n    dof_numerator,\
    \ dof_denominator = \\n        a.shape[0]-1, b.shape[0]-1\n\n    # Computing p-value\
    \ using f distribution's cdf\n    p_val = 1. - stats.f.cdf(\n        x=fstat,\
    \ dfn=dof_numerator, dfd=dof_denominator\n    )\n\n    # Returning results\n \
