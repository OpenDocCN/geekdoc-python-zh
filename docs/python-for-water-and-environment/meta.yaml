    # 4.2.2 Summarizing Numerical Data


    In any data analysis, first, we explore the most common statistical features of
    a dataset such as central tendency, variability, and symmetry. The mean, median,
    and mode represent measures of central tendency and provide a quick snapshot of
    what could be considered as the “average” or “typical” value of the dataset. Measures
    of variability such as the range, interquartile range, variance, standard deviation,
    and coefficient of variation are also crucial. They indicate how data points are
    spread around the center and their deviation from the average. Symmetry measures
    such as skewness and kurtosis jointly characterize the shape of the data distribution.
    They help us to understand how data scatters around the mean, informing whether
    the data distribution is peaked or flat and whether it is symmetric or skewed.


    Collectively, these measures provide a comprehensive statistical summary and insight
    into the underlying distribution and characteristics of the dataset. In hydrology,
    such statistical summaries are essential for understanding and predicting water-related
    phenomena and events.


    # 4.2.2.1 Measures of Central Tendency


    In hydrology, measures of central tendency are vital to grasp patterns of water-related
    variables, such as precipitation, groundwater levels, and streamflow. The mean,
    mode, and median are the measures used for determining the dataset’s central tendency,
    each providing valuable insight and helping in understanding the typical values
    to be expected.


    +   1. **Mean:** The mean, also known as the arithmetic mean, is calculated by
    dividing the total sum of all data points by the total count of data points. Every
    data point is accounted for in this central tendency measure. The formula for
    calculating the mean, ($\mu$), is


    $$\mu = \frac{1}{N} \sum_{i=1}^{N} x_i \quad (4.9)$$


    where N is the total number of observations, and ($x_i$) is each individual observation.

    For example, if we have monthly rainfall data for a year (in mm): 80, 90, 100,
    110, 120, 130, 100, 110, 120, 130, 140, 150, the mean rainfall is (80+90+100+110+120+130+100+110+120+130+140+150)/12
    = 114.17 mm.

    2. **Median:** The median is the middle value in a dataset ordered from the smallest
    to the greatest. If the number of observations ($N$) is odd, the median is the
    value at position ($N + 1$)/2. If $N$ is even, the median is the average of the
    values at positions $N/2$ and ($N/2$) + 1.'
  - '[PAGE 45]


    For example, if we consider the same rainfall dataset and order it: 80, 90, 100,
    100, 110, 110, 120, 120, 130, 130, 140, 150, the median rainfall is the average
    of the 6th and 7th observations (110 and 120), which is 115 mm.


    +   3. **Mode:** The mode is the value(s) that appears most frequently in a dataset.
    A set of data may have one mode (unimodal), more than one mode (multimodal), or
    no mode at all (no clear peak frequency).

    Continuing with the rainfall dataset, the data points 100, 110, 120, and 130 all
    appear twice, making them all modes of the dataset. Therefore, the dataset is
    multimodal.


    The measures of central tendency provide a simple and effective way to summarize
    and understand data. However, they should be used in conjunction with other statistical
    measures (such as dispersion measures) to generate a complete picture of the data
    distribution. For example, two datasets could have the same mean but very different
    spreads.


    In hydrology, these measures of central tendency are vital for analyzing and predicting
    water-related events. Mean values indicate typical scenarios, whereas the mode
    and median offer insights into repeating trends and exceptional occurrences. Grasping
    the central tendency of hydrological data proves valuable in planning and managing
    water resources, forecasting floods, and addressing droughts.


    # 4.2.2.2 Measures of Variability


    Variability in data, sometimes also known as dispersion, is an essential aspect
    of statistical analyses as it measures the extent or spread of data points within
    a dataset. Primary variability indicators include the range, interquartile range,
    variance, standard deviation, and coefficient of variation. These measures are
    crucial in hydrological studies, as they provide insights into the fluctuations
    and uncertainties associated with different water-related variables like rainfall,
    river flow rates, or soil moisture content.


    +   1. **Range:** The range is a simple measure of variability. One can calculate
    it as the difference between the highest and lowest values in the dataset. Consider
    the example of the annual river flow rates (in cubic meters per second) for a
    particular location over ten years: 50, 55, 60, 65, 70, 75, 80, 85, 90, and 95,
    the range would be 95–50 = 45 m³/s.


    +   2. **Interquartile Range (IQR):** The interquartile range, or IQR, signifies
    the central 50% of a dataset. It is the difference between the upper quartile
    (Q3) and the lower quartile (Q1). Q1 is the median of the first half of the data,
    while Q3 is the median of the second half. In the above river flow rates data,
    Q1 is the median of the first five observations (50, 55, 60, 65, 70) which is
    60 m³/s, and Q3 is the median of the last five observations (75, 80, 85, 90, 95)
    which is 85 m³/s. Therefore, IQR = Q3 – Q1 = 85 – 60 = 25 m³/s.


    +   3. **Variance:** Variance measures how far each number in the dataset is from
    the mean (μ) and thus from every other number in the set. It is often denoted
    by σ². The formula for variance is'
  - '[PAGE 46]


    $$\sigma^2 = \frac{1}{N-1} \sum_{i=1}^{N} (x_i - \mu)^2$$


    For the river flow rates data, we first, calculate the mean ($\mu$) which is 72.5
    m$^3$/s, then use the formula to get the variance.


    4. **Standard Deviation:** Standard deviation ($\sigma$) is the square root of
    the variance. It is useful because, unlike the variance, it is in the same units
    as the data. Thus, it provides a measure of variability that can be easily interpreted
    in the context of the data. Using the variance calculated previously, the standard
    deviation is simply its square root.


    5. **Coefficient of Variation (CV):** The coefficient of variation represents
    the ratio of the standard deviation to the mean, and it is often expressed as
    a percentage. It is useful for comparing the degree of variation from one data
    series to another, even if the means are drastically different from each other.
    The formula for $CV$ is


    $$CV = \frac{\sigma}{\mu} \times 100\%$$


    Again, using the mean and standard deviation calculated earlier, one can easily
    find the $CV$.


    In hydrology, measures of variability are critical for analyzing the distribution
    and the fluctuation in various datasets, which can aid in the design and management
    of hydraulic structures and water resource systems. These measures also help quantify
    the uncertainties associated with hydrological predictions and estimations.


    # 4.2.2.3 Measures of Symmetry


    Symmetry in statistical analysis describes the shape and spread of the distribution
    of data. Skewness and kurtosis are the two common measures of symmetry that indicate
    the nature of the distribution of a dataset. Both skewness and kurtosis can provide
    important insights into hydrological variables like rainfall distribution, river
    flows, groundwater levels, etc.


    1. **Skewness:** Skewness measures the extent and direction of asymmetry in a
    data distribution. A symmetrical dataset will have a skewness of 0. If the dataset
    is skewed to the left (or negatively skewed), it means the left tail of the distribution
    is longer and the majority of the data are concentrated to the right. If the dataset
    is skewed to the right (or positively skewed), it means the right tail of the
    distribution is longer and the majority of the data are concentrated to the left.
    The formula for skewness ($\gamma$) is


    $$\gamma = \frac{1}{N} \sum_{i=1}^{N} \left( \frac{x_i - \mu}{\sigma} \right)^3$$'
- md: 'where $N$ is the total number of observations, $x_i$ is each individual observation,
    $\mu$ is the mean, and $\sigma$ is the standard deviation. For example, let us
    say we have a dataset of annual rainfall (in mm) of a specific area: 100, 110,
    120, 130, 150, 200, 250. This dataset is positively skewed, as it has a long right
    tail, indicating that there is a majority of the less rainfall events, with a
    few high rainfall events.


    2. **Kurtosis:** Kurtosis measures the “tailedness” of a data distribution. A
    distribution with high kurtosis exhibits a distinct peak near the mean that declines
    rapidly and has heavy tails. On the other hand, low kurtosis distributions have
    a flat peak around the mean that declines slowly and has light tails. The formula
    for kurtosis $\kappa$ is


    $$\kappa = \frac{1}{N} \sum_{i=1}^{N} \left( \frac{x_i - \mu}{\sigma} \right)^4
    - 3 \quad (4.13)$$


    It must be noted that “$-3$” is often added to the calculation to provide a comparison
    to the normal distribution, which has a kurtosis of 3. For example, a dataset
    of river flow rates during a flood event would typically display high kurtosis,
    with most flow rates being relatively stable and a few extreme flow rates representing
    the peak of the flood.


    In hydrology, skewness can provide insights into the tendency of the occurrence
    of certain events. For instance, positively skewed rainfall data may indicate
    the occurrence of a few heavy rainfall events. Kurtosis can help hydrologists
    understand the probability of extreme events. A higher kurtosis in a river flow
    dataset could indicate a greater chance of extreme flood events. By understanding
    the symmetry of the distribution, hydrologists can better analyze and predict
    the behavior of various hydrological variables (Figs. 4.1 and 4.2).


