    # 14.1.3 Post-processing


    All the post-processing has been done in the Paraview software. The program in
    Sect. 14.1.2 saves the results in “.xdmf” format. These files are open-source
    file formats that can be readily loaded by Paraview. The file contains simulated
    data for each time step from t = 0.00 to t = 3.00 in 1500 time steps. This has
    been kept the same as the Navier-Stokes simulation. Figure 14.1 has been plotted
    by selecting the “Surface”-type representation and “Coloring” by the variable’s
    magnitude in the loaded mesh. Figure 14.1a–f was generated by selecting appropriate
    time values from the “Time” dropdown menu in the software. The Paraview application
    uses “Cool to Warm” colormap by default. A better alternative is the “Turbo” colormap
    which has been used to draw the figures here. One can see the spreading of the
    contaminant even at end-time values as a result of using this versatile colormap.


    # 14.1.4 Discussion of the Results


    Figure 14.1 shows the result of simulating a contaminant transport problem governed
    by a diffusion and reaction process. The contours in the figures show the periphery
    of the spread of the contaminant. One can observe that, with time, the concentration
    value gradually decreases as one moves away from the source which is specified
    at (x, y) = (0.50, 0.75). The spread appears to be uniformly distributed at all
    time steps; this is due to the absence of any advection term in the governing
    equations. The presence of any advection term would have disrupted the uniformity.
    As viewed later in the sections we can see the modified patterns when an advection
    term is included.


    # 14.2 A 2D Diffusion Advection Model


    In this section, we model a scenario where a single contaminant is undergoing
    diffusion as well as advection. Such models are well suited where the movement
    of water is involved in the transportation of the contaminant. This movement can
    be readily associated with a velocity in the X- and Y-directions which consequently
    show in an advection process.'
