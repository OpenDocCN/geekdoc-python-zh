    # 4.2.4 Limitations of Summary Statistics


    For developing deep insights about a data, it is helpful to know the summary statistics
    such as the central tendency, measures of variability, and measures of symmetry.
    However, it is also important to acknowledge their limitations during the analysis.
    Here, we list some of the reasons:


    +   1. **Sensitivity to outliers:** The mean, as a measure of central tendency,
    is sensitive to extreme values or outliers. A single outlier can significantly
    skew the mean, providing a misleading representation of the dataset''s central
    point. Variance and standard deviation, as measures of variability, are also affected
    by outliers as they account for the squared differences from the mean.

    2. **Ignorance of data distribution:** While measures like median and mode are
    less sensitive to outliers, they may not always provide a complete picture of
    the data. For instance, the mode is not useful for continuous data or data with
    no repeating values. Moreover, the mean, median, and mode do not provide any information
    on the actual distribution of the data.

    3. **Loss of detail:** Summary statistics inherently involve a reduction in data,
    leading to a loss of specific details. The range, for instance, only considers
    the maximum and minimum values, disregarding how data is spread between these
    extremes.

    4. **Misleading interpretation of skewness and kurtosis:** While skewness and
    kurtosis can inform about data asymmetry and “tailedness”, interpreting them can
    be challenging. For example, a dataset with skewness close to zero could be symmetric,
    or it could be a bimodal distribution with two equally sized modes at opposite
    ends.

    5. **Not suitable for complex multivariate data:** Summary statistics mainly provide
    a snapshot of univariate data. When dealing with multivariate data or when relationships
    among data are crucial, these measures may not suffice. Correlation, regression,
    or more advanced techniques might be needed.


    In summary, while these summary statistics offer a useful first step in understanding
    a dataset, they should not be used in isolation. A comprehensive analysis of data
    should consider these limitations and employ graphical tools or advanced statistical
    techniques to supplement these measures. The goal should always be to capture
    as much information about the underlying distribution and relationships in the
    data as possible.'
