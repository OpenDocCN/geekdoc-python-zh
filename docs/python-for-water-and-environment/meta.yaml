    height\"] = hsol.flatten(order=\"F\")\n\n    top = grid.points.copy()\n    bottom\
    \ = grid.points.copy()\n    bottom[:, -1] = -5.0  # 底部平面\n    vol = pv.StructuredGrid()\n\
    \    vol.points = np.vstack([top, bottom])\n    vol.dimensions = [*grid.dimensions[0:2],\
    \ 2]\n\n    z_above = hsol.flatten(order=\"F\")\n    zlevels = vol.points[:, 2]\n\
    \    zlevels[zlevels < np.min(z_above)] = -0.5\n    vol.point_data[\"height\"\
    ] = zlevels\n\n    write_format = resultPath + \\\n                   \"height_\"\
    \ + \\\n                   \"{04d}.vtk\".format(counter)\n    vol.save(write_format)\n\
    \n    # 初始化变量\n    u_old = u  # 旧 x 速度\n    v_old = v  # 旧 y 速度\n\n    t_curr\
    \ = t_curr + dt  # 时间递增\n\n    times.append(t_curr)\n\n    # 计算用于通量的 alpha = abs(u)\
    \ + sqrt(gh)\n    alpha_u = 0.5 * np.abs(u_old + \\\n                        \
    \   u_old[:, p_m1_x]) + \\\n              np.sqrt(\n                  g * 0.5\
    \ * (Solution_old[:, :, 0] + \\\n                             Solution_old[:,\
    \ p_m1_x, 0]))\n    alpha_v = 0.5 * np.abs(v_old + \\\n                      \
    \     v_old[p_m1_y, :]) + \\\n              np.sqrt(\n                  g * 0.5\
    \ * (Solution_old[:, :, 0] + \\\n                             Solution_old[p_m1_y,\
