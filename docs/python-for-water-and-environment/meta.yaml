    \n# 第四部分\n## 环境应用\n\n# 第 13 章\n## 输运现象\n\n水污染是现代城市环境中的一个主要问题。它是有毒物质（液体或固体）与水混合的结果，使得水无法用于大多数用途。在许多情况下，污染是意外发生的，尽管不能否认存在故意污染的情况。一旦释放到环境中，污染水会通过不同的输运方式到达地下水位。污染物在到达含水层之前，可能会在通过非饱和带的过程中经历多次化学变化。然后，含水层有助于将液体污染物输送到其出口，在此过程中，由于各种物理、生物和化学反应，其浓度逐渐降低。在泉水、湖泊和河流中发现的这种水在使用前需要进行预处理。因此，适当管理这些水资源的质量和数量非常重要。也许，技术是预防和管理水污染最明显的手段。更不用说，立法和教育也发挥着重要作用。然而，污染管理必须发挥更大的作用，因为污染仍在持续发生。\n\
    \n考虑一个淋滤的例子，污染物从点源或储罐释放后，渗透通过地下的非饱和带，直到它们到达地下水位。然后，地下水流进一步将受污染的水输送到其他出口。本章旨在阐述地下污染物输运的数学背景。这些污染物以溶解状态存在，其浓度决定了水质。浓度的变化是化学反应、固体污染物沉淀和溶解的直接体现。这些变化需要被纳入控制偏微分方程中，它们通常构成源项/强迫项的一部分。需要注意的是，我们使用的是宏观模型，当载体（此处为水）流经地下时，该模型可以预测化学物质（通常是反应性的）的流动/输运。污染物输运模型与单相/多相流模型在所建模的依赖变量方面有所不同。对于流体流动模型，依赖变量是质量密度；而对于污染物输运模型，依赖变量是化学物质的浓度。\n\
    \n我们首先描述一些与污染物输运模型相关的重要术语。存在许多衡量参与化学物质量的方法。其中最流行的是“浓度”。其他还有“质量浓度”、“摩尔浓度”、“摩尔分数”和“当量浓度”。化学物质的浓度可以理解为该物质的量，通常以每单位体积的密集相（此处为水）中的*克*或*摩尔*来衡量。\n\
    \n质量浓度通常表示为*克每升*或*g/L*。指定水质更常用的单位是*毫克每升*。摩尔浓度表示为*摩尔每升*，通常写作*mol/L*。摩尔分数定义为组分的摩尔数与密集相总摩尔数的比值。该度量对于参与物种（即发生化学反应的组分）之间存在相互作用的模型是相关的。当量浓度定义为在特定反应中，参与物种能与指定量的另一种物种/物质反应的量。\n\
    \n### 13.1 污染物输运过程\n\n环境中的污染物输运是一个连续现象，指的是污染物、污染物或任何有害物质通过给定区域的水网络移动。我们今天面临的最重要的问题之一是地下水污染。当井、河流和溪流中的水受到污染物混合的影响时，这种情况并不少见，这些污染物可能在长期使用农药、工业废物/化学品和肥料后，从地表、土地上逐渐逸散到环境中，或从地下储罐渗入土壤。我们经常发现水系统被农业副产品、污水和化学品污染的报告。大多数情况下，侵蚀和径流是造成此类污染的原因。另一个例子是渗滤液输运，即水渗透通过废物处理场。通常，水中携带大量的重金属、病原体和其他有机化合物，当它们流向地下水系统时，会影响依赖于它的资源。土壤侵蚀也是污染物输运的一个主要来源。农业用地和建筑工地导致侵蚀，从而增加了附近水系统的沉积物。另一个例子是水生生态系统，其中有害元素如汞和有毒的多氯联苯（PCBs）在水生动物和鱼类中积累，从而对人类健康构成威胁。\n\
    \n污染物输运是三个基本过程的表现——扩散、平流和反应。污染物通常具有反应性，这会在污染物输运过程中引起物理和化学变化。"
