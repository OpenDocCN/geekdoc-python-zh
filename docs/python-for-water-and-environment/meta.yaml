  - '[PAGE 290]


    The patterns of the contours appear to be quite interesting when compared to the
    ones obtained using previous models of Sects. 14.1 and 14.2. The constants $D$
    and $R$ play a significant role in determining the amount of diffusion and the
    rate at which the contaminant decays. A higher value of $D$ would ensure a diffusion-dominated
    transport process. The rate of reaction $R$ helps specify how fast the contaminant
    decays with a given concentration; a smaller value would induce an advection,
    diffusion-type pattern whereas a higher value would diminish the effect of those
    processes.


    Interestingly enough the geometrical pattern of the contours appears similar to
    that of the advection, diffusion process. The reason for this is quite obvious—the
    reaction rate (currently 0.9) is not strong enough to mask the contribution of
    advection and diffusion processes.


    It is often of interest to monitor the evolution of the concentration of the contaminant
    as a function of time. With the developed models, we perform this task for the
    top-left bank of our aquifer model. We track the evolution of the concentration
    at the computational nodes as shown in Fig. 14.4. In Fig. 14.5, we show the statistics
    of the concentration values recorded due to the three models.


    In Fig. 14.5a, the diffusion, reaction model shows a continuous increase in the
