  md: '# Foreword by Dr. Martyn Clark


    Data science has emerged as a powerful tool to understand changes in the Earth’s
    climate. The use of large amounts of data to produce transformative insights requires
    a new set of tools and skills. This textbook, “Python for Water and Environment”,
    fills a critical gap between theory, computation, and applications in the field,
    by enabling readers to implement theoretical concepts and develop an in-depth
    understanding of water and environment problems.


    The objective of the book is not only to serve as a programming guide but also
    to expose the reader to the unique challenges prevalent in the water and environment
    sciences. The book uses the versatile Python programming language, which provides
    a straightforward implementation of models and rapid testing of algorithms. Starting
    from the basics, the book gradually takes the readers from a basic to an advanced
    level of programming that is relevant to hydrologic and environmental modeling.
    The book deals with a wide range of topics such as exploratory data analysis,
    statistical data modeling, and numerical modeling, all organized into well-defined
    chapters.


    I congratulate the authors for writing this book which can serve as an important
    resource for researchers and water professionals who wish to include Python in
    their day-to-day work.


    Dr. Martyn Clark

    Former Editor-in-Chief (Water Resources Research)

    Professor of Hydrology and Schulich Research Chair in Environmental Prediction

    Department of Civil Engineering

    Schulich School of Engineering

    University of Calgary

    Calgary, Alberta, Canada'
  merge: -1
