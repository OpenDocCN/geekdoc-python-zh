    \ is then stored in the variable result.\n\nThe program then prints the value\
    \ of the result using f-string formatting.\n\n## 3.4.3 List and Tuples\n\nBoth\
    \ lists and tuples are sequence types that can store multiple items. Lists are\
    \ mutable, meaning you can modify their content, making them great for data manipulation.\
    \ They are defined using square brackets. Conversely, tuples are immutable and\
