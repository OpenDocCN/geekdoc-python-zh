- md: "## 9.3.4 Asymmetric Prediction Interval\n\nAn asymmetric prediction interval\
    \ for quantiles provides a range within which a future observation is expected\
    \ to fall with a certain probability. Unlike symmetric intervals, these intervals\
    \ adjust for skewness in the data, meaning the distance to the lower and upper\
    \ bounds can vary, better reflecting the underlying data distribution (Fig. 9.10).\n\
    \n![](img/0c8a53eeca13bc4d5422655fb7aaba77_169_0.png)\n\nFig. 9.10 Asymmetric\
    \ prediction interval estimate\n\n```python\n\"\"\"\nProgram for asymmetric prediction\n\
    interval estimate on 1D stream flow data\n\"\"\"\nimport pandas as pd\nfrom scipy.stats\
    \ import (norm, binom, tmean, tstd,\n                        t, nct, bootstrap,\
    \ mstats)\nimport numpy as np\n\n\"\"\"\nLoad dataset\n\"\"\"\ndata = pd.read_csv(\n\
    \    filepath_or_buffer=\"../data/Godavari.csv\",\n    sep=\",\",\n    header=0).dropna()\n\
    print(\"\\nChecking data:\")\ntry:\n    data[\"time\"] = pd.to_datetime(\n   \
    \     data['time'], infer_datetime_format=True)\n    print(\"    Date format is\
    \ okay!\\n\")\nexcept ValueError:\n    print(\"    Encountered error!\\n\")\n\
    \    pass\nx = data[[\"Streamflow\"]].to_numpy().squeeze()\ndel data\nprint(\"\
    Read data file\")\n\n\"\"\"\nAsymmetric prediction interval\n\"\"\"\nprint(\"\\\
    n\\nDoing asymmetric PI estimate\")\nminx = np.min(x)\nlogx = np.log(x - minx\
    \ + 1)\nxbar = tmean(logx)\nxstd = tstd(logx)\nn = len(x)\nqnt = t.ppf(q=[0.05,\
    \ 0.95],\n            df=n - 1,\n            loc=0, scale=1)\nprint(\"{:.4f} <\
    \ x_mean < {:.4f}\".format(\n    np.exp(xbar + qnt[0] * np.sqrt(xstd ** 2 + xstd\
    \ ** 2 / n)),\n    np.exp(xbar + qnt[1] * np.sqrt(xstd ** 2 + xstd ** 2 / n))\n\
    )\n)\n\nprint(\"Done!\")\n```\n\n```\n>>> Checking data:\n>>>     Date format\
    \ is okay!\n>>> Read data file\n>>> Doing asymmetric PI estimate\n>>> 0.6619 <\
    \ x_mean < 394.9448\n>>> Done!\n```\n\nThis Python program performs an asymmetric\
    \ prediction interval estimate on a one-dimensional stream flow dataset. The data\
    \ for this exercise is stored in a .csv file named “Godavari.csv”.\n\nFirst, the\
    \ necessary modules are imported. These include Pandas for data handling, SciPy’s\
    \ stats module for statistical functions, and NumPy for numerical operations.\n\
    \nNext, the program loads the dataset using the Pandas “read_csv” function. The\
    \ data is then checked to ensure that the “time” column, which should contain\
    \ datetime information, is properly formatted. If there is a ValueError during\
    \ conversion to Pandas datetime format, it implies the date format is not recognized\
    \ and an error message is printed. If no error is encountered, a message confirming\
    \ the same is printed.\n\nThe “Streamflow” column of the data is then extracted\
    \ and converted to a one-dimensional NumPy array for further analysis, and the\
    \ original dataframe is deleted.\n\nThe program then proceeds to perform the main\
    \ task: calculating the asymmetric prediction interval. It begins by transforming\
    \ the data to a logarithmic scale to handle potential skewness in the data, ensuring\
    \ all values are positive by subtracting the minimum value of the dataset and\
    \ adding 1 before taking the logarithm.\n\nNext, the mean and standard deviation\
    \ of the transformed data are computed. Then, the percentiles corresponding to\
    \ the 5th and 95th percentiles of a Student’s t-distribution are calculated. These\
    \ percentiles serve as the lower and the upper bounds of the 90% prediction interval.\n\
    \nFinally, the program prints the estimated asymmetric prediction interval. The\
    \ interval is converted back to the original scale (from the log scale) using\
    \ the exponential function. The interval gives the range in which we expect a\
    \ new observation to fall, with 90% confidence, assuming that the new observation\
    \ is from the same population as the data.\n\n## 9.4 Quantile Regression\n\nQuantile\
    \ regression is a statistical technique aimed at estimating and conducting inferences\
    \ about conditional quantile functions. Unlike standard regression models that\
    \ predict mean outcomes, quantile regression provides a complete picture of the\
    \ possible outcome values at different points of the distribution (like median,\
    \ quartiles), thus offering a more robust and comprehensive analysis.\n\n```python\n\
    \"\"\"\nProgram to do Quantile regression\non synthetic dataset.\n\"\"\"\n\nfrom\
    \ sklearn.linear_model import QuantileRegressor\nimport numpy as np\nimport matplotlib.pyplot\
    \ as plt\n\n\"\"\"\nGenerate synthetic normal data\n\"\"\"\nnp.random.seed(21)\n\
    x = np.arange(start=0.5 * np.pi, stop=2 * np.pi, step=0.05)\nX = x.reshape(x.shape[0],\
    \ -1)\nmean_ = 10.0 + 0.1 * np.sin(x)\nscale_ = 0.02 + 0.02 * np.abs(x)\ny_true\
    \ = np.random.normal(loc=mean_,\n                          scale=scale_,\n   \
    \                       size=x.shape[0])\n\n\"\"\"\nQuantile regression\n\"\"\"\
    \nidx_up = 0\nidx_dn = 0\nx_good = list()\ny_good = list()\n\npreds = dict()\n\
    x_outlier = list()\ny_outlier = list()\n\nqnt = [0.1, 0.25, 0.5, 0.75, 0.9]\n\n\
    for q in qnt:\n    qreg = QuantileRegressor(quantile=q,\n                    \
    \         alpha=0,\n                             solver='highs')\n    qreg.fit(X=X,\
    \ y=y_true)\n    preds[q] = qreg.predict(X)\n\n    # Segregate the detected outliers\
    \ using index\n    if q == qnt[0]:\n        idx_dn = preds[q] > y_true\n    elif\
    \ q == qnt[-1]:\n        idx_up = preds[q] < y_true\n\nidx_outlier = np.logical_or(idx_up,\
    \ idx_dn)\nx_outlier.append(x[idx_outlier])\ny_outlier.append(y_true[idx_outlier])\n\
    x_outlier = np.array(x_outlier).ravel()\ny_outlier = np.array(y_outlier).ravel()\n\
    \nidx_good = ~np.logical_or(idx_up, idx_dn)\nx_good.append(x[idx_good])\ny_good.append(y_true[idx_good])\n\
    x_good = np.array(x_good).ravel()\ny_good = np.array(y_good).ravel()\n\n\"\"\"\
    \nPlot the scatter and then show\nfit of the data on the scatter\n\"\"\"\nplt.figure(figsize=[8,\
    \ 6])\n# Quantile plots\nplt.plot(X, y_true,\n         color=\"black\",\n    \
    \     linestyle=\"dashed\",\n         label=\"True y\")\nfor q, y_pred in preds.items():\n\
    \    plt.plot(X, y_pred, label=\"Q={}\".format(q))\n\n# Outliers data plot\nplt.scatter(x=x_outlier,\
    \ y=y_outlier, marker='o',\n            alpha=0.5, color='k',\n            label='Outside:\
    \ Q={} and Q={}'.format(qnt[0],\n                                            \
    \    qnt[-1]))\n\n# Inside data plot\nplt.scatter(x=x_good, y=y_good, marker='x',\n\
    \            alpha=0.5, color='b',\n            label='Within: Q={} and Q={}'.format(qnt[0],\n\
    \                                               qnt[-1]))\n\nplt.xlabel('x')\n\
