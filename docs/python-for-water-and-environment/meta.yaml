    a percentage. It is useful for comparing the degree of variation from one data
    series to another, even if the means are drastically different from each other.
    The formula for $CV$ is


    $$CV = \frac{\sigma}{\mu} \times 100\%$$


    Again, using the mean and standard deviation calculated earlier, one can easily
    find the $CV$.


    In hydrology, measures of variability are critical for analyzing the distribution
    and the fluctuation in various datasets, which can aid in the design and management
    of hydraulic structures and water resource systems. These measures also help quantify
    the uncertainties associated with hydrological predictions and estimations.


    # 4.2.2.3 Measures of Symmetry


    Symmetry in statistical analysis describes the shape and spread of the distribution
    of data. Skewness and kurtosis are the two common measures of symmetry that indicate
    the nature of the distribution of a dataset. Both skewness and kurtosis can provide
    important insights into hydrological variables like rainfall distribution, river
    flows, groundwater levels, etc.


    1. **Skewness:** Skewness measures the extent and direction of asymmetry in a
    data distribution. A symmetrical dataset will have a skewness of 0. If the dataset
    is skewed to the left (or negatively skewed), it means the left tail of the distribution
    is longer and the majority of the data are concentrated to the right. If the dataset
    is skewed to the right (or positively skewed), it means the right tail of the
    distribution is longer and the majority of the data are concentrated to the left.
    The formula for skewness ($\gamma$) is


    $$\gamma = \frac{1}{N} \sum_{i=1}^{N} \left( \frac{x_i - \mu}{\sigma} \right)^3$$'
