    # 14.3 Generalized 2D Advection, Diffusion, Reaction Model


    In this section, we develop a generalized advection, diffusion, reaction model.
    We specifically model a scenario where a reactive contaminant is undergoing advection
    and diffusion while decaying at a rate that is proportional to the concentration,
    $[u]$ meaning that the rate of reaction follows a first-order kinetics.


    # 14.3.1 Variational Formulation


    The strong form of the governing equations for this model is given as


    $$\frac{\partial[u]}{\partial t} + \mathbf{w} \cdot \nabla[u] + \nabla \cdot (D\nabla[u])
    = f - R[u] \quad (14.5)$$


    where $[u]$ is the concentration of the contaminant, $w$ is the velocity of the
    flow, $D$ is the diffusion coefficient, and $R$ is the rate of reaction.


    The weak form corresponding to Eq. 14.5 is given as


    $$\int_{\Omega} \frac{1}{dt} \langle u - u_n, v \rangle dx + \int_{\Omega} \langle
    \mathbf{w} \cdot \nabla u, v \rangle dx + \int_{\Omega} D \langle \nabla u, \nabla
    v \rangle dx = \int_{\Omega} (fv - Ruv) dx \quad (14.6)$$


    The variational formulation applies a homogeneous Neumann boundary condition on
    the entire domain and therefore, in the code, there is no mention of boundary
    conditions.


    # 14.3.2 Python Code


    Here, we give the complete code for advection, diffusion, reaction model. The
    program is ready to be run after all the necessary libraries have been installed
    in a designated Conda environment. Although the program has been thoroughly commented
    on and should be self-explanatory for any modification, we describe some sections
    that are deemed very important and need explanation.


    In lines 13–23, we load the necessary libraries for the program. In lines 26–33,
    we set the name of the simulation, the path to the external mesh file, the path
    to the velocity data file, and a path to the results folder where the solution
    files would be saved. These can be modified by the user to appropriate locations,
    locally.'
