    \ Tuple Items\nprint(\"First fruit in the tuple: \", fruits_tuple[0])\n\n# Trying\
    \ to modify tuple items (This will result in an error)\n# fruits_tuple[1] = \"\
    Jackfruit\"\n\n# Tuples are immutable, which means you can't add or\n# remove\
    \ items after the tuple is defined.\n\n# Thus, we can't demonstrate adding or\
    \ removing items\n# in a tuple like we did with the list\n```\n\n```\n>>> First\
    \ fruit in the list: Apple\n>>> Fruit list after modification: ['Apple', 'Blueberry',\
    \ 'Cherry', 'Dates', 'Elderberry']\n>>> Fruit list after adding a new item: ['Apple',\
    \ 'Blueberry', 'Cherry', 'Dates', 'Elderberry', 'Fig']\n>>> Fruit list after removing\
    \ an item: ['Apple', 'Blueberry', 'Dates', 'Elderberry', 'Fig']\n>>> First fruit\
    \ in the tuple: Grapes\n```\n\n在上面的程序中，首先创建了一个名为“fruits_list”的列表，包含五个初始元素。然后，代码通过使用索引打印列表中的第一个水果来展示如何访问列表项。接下来，通过为第二个元素赋新值来修改列表中的一个项目。打印更新后的列表以显示修改。之后，使用`append()`方法将新项目“Fig”追加到列表中。再次打印列表以显示新项目的添加。最后，使用`remove()`方法从列表中移除一个项目“Cherry”，并打印结果列表。\n\
    \n在第二部分，创建了一个名为“fruits_tuple”的元组，包含三个初始元素。代码通过使用索引打印元组中的第一个水果来展示如何访问元组项。它还尝试通过为第二个元素赋新值来修改元组项，但此操作会产生错误。这突出了元组是不可变的，意味着它们的项目在创建后无法修改。\n\
    \n## 3.4.4 字典和数据框\n\nPython中的字典是数据值的无序集合。它也用于像映射一样存储数据值，使用户能够保存键值对。与其他数据类型不同，它只保存单个值作为元素。\n\
    \n数据框是一个二维的带标签的数据结构，其列可能具有不同的类型。它通常是最常用的pandas对象。\n\n```python\n# Importing pandas\
    \ module\nimport pandas as pd\n\n# Define a dictionary containing river details\n\
    river_details = {'Name': ['Ganges',\n                          'Brahmaputra',\n\
    \                          'Yamuna',\n                          'Godavari',\n\
    \                          'Narmada'],\n                 'Length (km)': [2525,\n\
    \                                3848,\n                                1376,\n\
    \                                1465,\n                                1312],\n\
    \                 'Drainage Area (km2)': [1080000,\n                         \
    \                651334,\n                                         366223,\n \
    \                                        312812,\n                           \
    \              131200]\n                 }\n\n# Convert the dictionary into DataFrame\n\
    river_df = pd.DataFrame(river_details)\n\n# Print the data frame\nprint(river_df)\n\
    ```\n\n```\n>>>           Name  Length (km)  Drainage Area (km2)\n>>> 0      \
    \ Ganges         2525              1080000\n>>> 1  Brahmaputra         3848  \
    \             651334\n>>> 2       Yamuna         1376               366223\n>>>\
    \ 3     Godavari         1465               312812\n>>> 4     Narmada        \
    \ 1312               131200\n```\n\n给定的Python程序将一些关于印度河流的详细信息存储在一个字典中，然后使用pandas将该字典转换为数据框。\n\
    此脚本的输出将是一个数据框，包含河流的名称、以公里为单位的长度以及以平方公里为单位的流域面积。每条河流代表数据框中的一行，而详细信息（名称、长度和流域公里数）代表列。\n\
    \n## 3.4.5 循环\n\n这是一个简单的Python程序，说明了“for”和“while”循环的使用。该程序使用两种类型的循环打印前十个数字（1-10）。\n\
    \n```python\n# Using a for loop\nprint(\"Using a for loop:\")\nfor i in range(1,\
    \ 11):\n    print(i)\n\n# Using a while loop\nprint(\"\\nUsing a while loop:\"\
    )\ni = 1\nwhile i <= 10:\n    print(i)\n    i += 1\n```\n\n在这个代码示例中，“for”循环与“range()”函数一起充当数字生成器，生成从1到10的一系列数字。在循环内部，使用“print()”函数在控制台显示数字。“while”循环无条件运行，直到条件“i”小于或等于10返回真值。同样，当循环遍历序列时，使用“print()”函数打印“i”的当前值。当“i”的值大于10时，条件“i\
    \ <= 10”不再返回真值，从而终止循环。\n\n## 3.4.6 Python中的条件语句\n\n这里，我们给出一个使用条件语句来判断输入数字是正数、负数还是零的Python程序。\n\
    \n```python\n# Take input from the user\nnum = float(input(\"Enter a number: \"\
    ))\n\n# Use conditional statements to check the number\nif num > 0:\n    print(\"\
    The number is positive\")\nelif num == 0:\n    print(\"The number is zero\")\n\
    else:\n    print(\"The number is negative\")\n```\n\n在给定的程序中，“if”语句检查数字是否大于零。如果此条件为真，则显示“The\
    \ number is positive”。如果条件为假，则进入“elif”语句。“elif”（“else if”的缩写）语句检查输入数字是否为零。如果此条件返回真，则显示“The\
    \ number is zero”。如果此条件也不成立，则进入else语句，该语句处理前面“if”和“elif”语句未涵盖的所有其他条件。这本质上意味着输入数字必须小于零，打印消息“The\
    \ number is negative”。\n\n## 3.4.7 Python中的文件操作\n\n这里，我们展示一个简单的Python代码，说明一些基本的文件操作，如写入文件、从文件读取和追加到文件。"
