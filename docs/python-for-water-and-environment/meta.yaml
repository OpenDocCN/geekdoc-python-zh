    # Chapter 13

    Transport Phenomena


    Water contamination is a major concern in modern urban setups. It is a result
    of the mixing of a toxic substance, liquid or solid, with water that renders the
    water unusable for most purposes. In many scenarios, contamination happens accidentally,
    although intentional cases cannot be denied. Once released into the environment
    the contaminated water finds its way to the water table via different modes of
    transport. The contaminant may undergo a number of chemical changes on the way
    through the unsaturated zones before reaching the aquifer. The aquifer then helps
    transmit the liquid contaminants toward its outlets, and in the process, its concentration
    reduces gradually due to various physical, biological, and chemical reactions.
    This water that is found in springs, lakes, and rivers needs prior treatment for
    any use. Therefore, it is very important that the quality and quantity of these
    water resources be managed appropriately. Perhaps, technology is the most obvious
    means for the prevention and management of water contamination. Not to mention,
    legislation and education also play a significant role. However, it is the management
    of contamination that has to play a bigger role because pollution continues to
    happen.


    Consider an example of leaching where the contaminants, after getting released
    from a point source, or a storage tank, percolate through the unsaturated zones
    within the subsurface until they reach the water table. The groundwater flow then
    further carries the polluted water to other outlets. This chapter is dedicated
    to laying out the mathematical background of contaminant transport in the subsurface.
    These contaminants are present in the dissolved state and their concentration
    determines the water quality. The change in concentration is a direct manifestation
    of chemical reaction, precipitation, and dissolution of solid contaminant. Such
    changes are required to be put in the governing partial differential equation
    where they often form a part of the forcing function/term. It is to be noted that
    we work with macroscopic models that can predict the flow/transport of the chemical
    species (often reactive) when the carrier, here water, flows through the subsurface.
    The contaminant transport models differ from the single/multiphase flow models
    in terms of the dependent variable'
  - '[PAGE 240]


    being modeled. While it is the mass density for the fluid flow models, it is the
    concentration of the chemical species for the contaminant transport models.


    We begin by first describing a few important terminologies relevant to contaminant
    transport models. There exist many measures of the quantity of the participating
    chemical species. Perhaps, the most popular among them is “concentration”. Others
    are “mass concentration”, “molar concentration”, “molar fraction”, and the “equivalent
    concentration”. The concentration of a chemical species can be understood as the
    amount of the species, often measured in *gram* or the *mole* per unit volume
    of the intensive phase, the water, in our case.


    Mass concentration is often expressed as *grams per unit liter* or *g/L*. A more
    popular unit to specify the quality of water is the *mg/L*. The molar concentration
    is expressed as the number of *moles per unit liter*, often written as *mol/L*.
    The molar fraction is defined as the ratio of the number of moles of the component
    to the total number of moles of the intensive phase. The measure is relevant for
    models where there is an interaction among the participating species, i.e., the
    components that undergo chemical reactions. The equivalent fraction is defined
    as the amount of the participating species that can react with the specified amount
    of another species/substance in a specific reaction.


    # 13.1 Contaminant Transport Processes


    Contaminant transport in the environment is a continuous phenomenon that refers
    to the movement of contaminants and pollutants or any harmful substances via the
    water network in a given area. One of the most important issues that we face today
    is groundwater contamination. It is not uncommon when the water in wells, rivers,
    and streams is affected by the mixing of contaminants that may gradually escape
    into the environment after a prolonged application of pesticides, industrial wastes/chemicals,
    and fertilizers present on the ground surface, land, or seep through the soil
    from underground storage tanks. We often find reports of water systems being polluted
    by agricultural by-products, sewage, and chemicals. Most of the time, erosion
    and runoff are to be blamed for such contamination. Yet another example is leachate
    transport where water percolates through waste disposal sites. Often, there is
    a high amount of heavy metals, pathogens, and other organic compounds that are
    carried with the water, which when traveling to the groundwater system can affect
    the resources dependent on it. Soil erosion is also a major source of contaminant
    transport. Agricultural lands and construction sites contribute to erosion which
    consequently increases sedimentation in the close by water systems. Another example
    is the aquatic ecosystems where harmful elements such as mercury and toxic polychlorinated
    biphenyls or PCBs accumulate in aquatic animals and fishes, consequently posing
    a health threat to humans.


    Contaminant transport is a manifestation of three fundamental processes—diffusion,
    advection, and reaction. The contaminants are usually reactive in nature which
    brings about physical and chemical changes as the contaminant is transported'
- md: '## 13.2 1D Diffusion Equation


    In hydrology, the diffusion equation is used to describe the spread of contaminants
    or pollutants in groundwater. The equation models the migration of the contaminant
    over time in the subsurface due to molecular diffusion. The diffusion coefficient
    determines the rate at which the substance spreads, while the Laplacian operator
    characterizes the spatial gradient of the concentration. The 1D diffusion equation
    can be expressed as


    $$\frac{\partial[u]}{\partial t} = D \frac{\partial^2[u]}{\partial x^2}$$


    where, $[u]$ is the concentration of the substance, $t$ is time, $D$ is the diffusion
    coefficient, and $\frac{\partial^2}{\partial x^2}$ is the Laplacian $\Delta$ operator.
    The equation describes the rate of change of the contaminant''s concentration
    with respect to the product of the diffusion coefficient $D$ and double spatial
    derivative of the concentration. Physically, $D$ states the ease with which the
    pollutant can move through a medium. Determination of this quantity is often a
    complex task but due to its importance, researchers and scientists continue to
    devise new methods for estimating its value. Some of the reasons that make it
    difficult to estimate the coefficient''s value are:


    - The occurrence of more than one contaminant, each having a different value of
    coefficient, can complicate the determination of a single value of the diffusion
    coefficient.

    - Generally, the environment where contaminant travels is mostly heterogeneous
    due to varying porosity, permeability, and tortuosity. These non-constant factors
    can still complicate the determination.

    - The values of the factors can change over time making determining the diffusion
    coefficient difficult.


    By solving the diffusion equation, hydrologists are able to forecast the movement
    and distribution of contaminants in groundwater over time, providing valuable
    information for assessing risks to water resources and designing remediation plans.
    The equation is also used in other hydrologic contexts, such as modeling the transport
    of pollutants in surface water or the transfer of heat in soils.


    ## 13.3 1D Diffusion-Reaction Equation


    Reaction in the context of contaminant transport means any change in the concentration
    of the contaminant over time. When combined with the diffusion equation 13.1 the
    system reads


    $$\frac{\partial[u]}{\partial t} = D\frac{\partial^2[u]}{\partial x^2} + R[u]$$


    where $R$ is called the rate of reaction with the rest having the same meanings
    as the diffusion equation. The reactions occur between the contaminant and the
    environment where they travel and they can be classified as follows:


    - In groundwater, oxidation/reduction reaction is an important process that decides
    the fate of the contaminant where there is a deficiency of dissolved oxygen.

    - Degradation of the organic compounds by micro-organisms such as bacteria and
    algae is also a common subsurface phenomenon. These organisms help break down
    more complex contaminants into simple compounds.

    - Sorption is another process that affects the movement of the contaminant into
    the environment. It is a process by which the contaminants are adsorbed onto the
    surface of the medium.

    - It is also common that one contaminant can get converted to another via some
    biological and chemical process. This generally results in the formation of new
    compounds with significantly new properties.


    Understanding the properties of these reactions is essential as it can help conduct
    risk assessment and prepare remediation techniques, once the contaminant is dispersed
    into the environment. An accurate modeling of the reaction process can also help
    develop management strategies.


    ## 13.4 1D Advection-Diffusion Equation


    In hydrology, advection-dominated flow refers to a way that water and other substances
    move in a groundwater or surface water system. Instead of spreading out and mixing
    with their surroundings, these substances are carried along in a cohesive unit
    as the water moves. This type of flow is typically found in places like aquifers,
    rivers, and streams, and can greatly impact the availability and quality of water.
    A one-dimensional advection-diffusion model can be stated as


    $$\frac{\partial[u]}{\partial t} + w\frac{\partial[u]}{\partial x} = D\frac{\partial^2[u]}{\partial
    x^2}$$


    where $w$ is the advection coefficient having the unit of velocity with others
    having the same meaning as the diffusion case.


    Advection dominated flow is important for flood control because it determines
    the speed and direction of the movement of water. If this type of flow is strong,
    water can quickly flow downstream, which can help to prevent or reduce the damage
    caused by floods. The reason is that the water does not stay in one place for
    very long and cannot cause as much damage. Understanding advection-dominated flow
    can help make better decisions for flood control, such as building better structures
    or predicting how rivers will behave during floods. In short, considering advection-dominated
    flow can help protect communities and infrastructure from flood damage.


    ## 13.5 A 2D Simulation Using Navier-Stokes Equations


    Understanding of the fluid flow phenomenon is essential as it can affect many
    aspects of human life, such as flood control and water resources. Computational
    fluid dynamics, or CFD, is a technological advancement that helps us define the
    governing equations of fluid flow. The equations are widely known as the Navier-Stokes
    equations, which represent the mathematical models describing fluid flow behavior
    and its interactions in riverbeds, rocks, and debris.


    The Navier-Stokes equations are specified using a set of partial differential
    equations that are solved for velocity and pressure. These equations are essential
    for understanding and predicting fluid flow behavior in rivers and other water
    bodies. They provide a general system of PDEs that, when combined with the physical
    properties of the fluid, say water, can be used to model its movement in rivers
    and to predict pressure, velocity, and other derived quantities such as drag and
    lift. However, the latter are more relevant in aerodynamics and atmospheric flows.


    Another critical equation in the analysis of flow in rivers is the continuity
    equation. It states that the amount of fluid entering a system must equal the
    amount of fluid exiting it. It facilitates the balance between the volume of water
    entering the river system and the volume leaving it, thereby helping predict water
    flow over time. These equations play a significant role in understanding the behavior
    of a river system in events such as flood and change in the physical properties
    of the constituent fluids. Therefore, a numerical simulator that solves the Navier-Stokes
    equations qualifies to become an essential tool for hydrologists and water resource
    managers as it helps them make decisions about flood control and mitigation.


    The Navier-Stokes equations can be understood as Newton’s second law of motion
    for fluids. The equations consist of two parts. Equation 10.1 is restated here
    as Eq. 13.4 with the addition of the continuity part. In this section, we describe
    a numerical model to solve the incompressible Navier-Stokes equations for single-phase
    flow. The word “incompressible” means that the density of the fluid does not change
    with the application of external pressure. This also means that the volume of
    the water (fluid) remains constant as it flows along. Hence, in the second part
    of Eq. 13.4 we drop the $\frac{\partial \rho}{\partial t}$ term from the LHS.
    The inertial forces are represented by the terms on the LHS; then the first term
    in the RHS consists of the pressure and viscous forces as given by Eq. 10.9’s
    third part and Eq. 10.12. The term **f** represents all external forces.'
  mdcn: '## 13.2 一维扩散方程


    在水文学中，扩散方程用于描述地下水中污染物或污染物的扩散过程。该方程模拟了由于分子扩散，污染物在地下随时间迁移的过程。扩散系数决定了物质扩散的速率，而拉普拉斯算子则表征了浓度的空间梯度。一维扩散方程可表示为


    $$\frac{\partial[u]}{\partial t} = D \frac{\partial^2[u]}{\partial x^2}$$


    其中，$[u]$ 是物质浓度，$t$ 是时间，$D$ 是扩散系数，$\frac{\partial^2}{\partial x^2}$ 是拉普拉斯 $\Delta$
    算子。该方程描述了污染物浓度的变化率与扩散系数 $D$ 和浓度的二阶空间导数的乘积之间的关系。从物理意义上讲，$D$ 表示污染物在介质中迁移的难易程度。确定这个量通常是一项复杂的任务，但由于其重要性，研究人员和科学家们仍在不断设计新的方法来估算其值。使得估算该系数值变得困难的一些原因包括：


    -   存在多种污染物，且每种污染物的系数值不同，这会使确定单一扩散系数值变得复杂。

    -   通常，污染物迁移的环境由于孔隙度、渗透率和迂曲度的变化而呈现非均质性。这些非恒定因素仍然会使确定过程复杂化。

    -   这些因素的值会随时间变化，使得确定扩散系数变得困难。


    通过求解扩散方程，水文学家能够预测地下水中污染物随时间的迁移和分布，为评估水资源风险和设计修复计划提供有价值的信息。该方程也用于其他水文背景，例如模拟地表水中污染物的传输或土壤中的热传递。


    ## 13.3 一维扩散-反应方程


    在污染物迁移的背景下，反应是指污染物浓度随时间发生的任何变化。当与扩散方程 13.1 结合时，系统可表示为


    $$\frac{\partial[u]}{\partial t} = D\frac{\partial^2[u]}{\partial x^2} + R[u]$$


    其中 $R$ 称为反应速率，其余符号含义与扩散方程相同。反应发生在污染物与其迁移的环境之间，可分类如下：


    -   在地下水中，氧化/还原反应是一个重要过程，它决定了在溶解氧不足情况下污染物的最终归宿。

    -   有机化合物被细菌和藻类等微生物降解也是一种常见的地下现象。这些生物有助于将更复杂的污染物分解为简单的化合物。

    -   吸附是另一个影响污染物向环境迁移的过程。它是指污染物被吸附到介质表面的过程。

    -   一种污染物通过某些生物和化学过程转化为另一种污染物也很常见。这通常会导致形成具有显著新性质的新化合物。


    理解这些反应的性质至关重要，因为一旦污染物扩散到环境中，它可以帮助进行风险评估并准备修复技术。对反应过程的精确建模也有助于制定管理策略。


    ## 13.4 一维对流-扩散方程


    在水文学中，对流主导流是指水和其他物质在地下水或地表水系统中移动的一种方式。这些物质不是扩散并与周围环境混合，而是随着水的移动作为一个内聚单元被携带前进。这种类型的流动通常出现在含水层、河流和溪流等地方，并会极大地影响水的可用性和质量。一维对流-扩散模型可表示为


    $$\frac{\partial[u]}{\partial t} + w\frac{\partial[u]}{\partial x} = D\frac{\partial^2[u]}{\partial
    x^2}$$


    其中 $w$ 是对流系数，具有速度单位，其余符号含义与扩散情况相同。


    对流主导流对于防洪很重要，因为它决定了水的移动速度和方向。如果这种流动很强，水可以迅速流向下游，这有助于防止或减少洪水造成的损害。原因是水不会在一个地方停留太久，因此不会造成太大的损害。理解对流主导流可以帮助做出更好的防洪决策，例如建造更好的结构或预测河流在洪水期间的行为。简而言之，考虑对流主导流有助于保护社区和基础设施免受洪水损害。


    ## 13.5 使用纳维-斯托克斯方程的二维模拟


    理解流体流动现象至关重要，因为它会影响人类生活的许多方面，例如防洪和水资源。计算流体动力学（CFD）是一项技术进步，帮助我们定义流体流动的控制方程。这些方程被广泛称为纳维-斯托克斯方程，它们是描述流体流动行为及其在河床、岩石和碎屑中相互作用的数学模型。


    纳维-斯托克斯方程通过一组偏微分方程来指定，这些方程用于求解速度和压力。这些方程对于理解和预测河流及其他水体中的流体流动行为至关重要。它们提供了一个通用的偏微分方程组，当与流体（例如水）的物理性质结合时，可用于模拟其在河流中的运动，并预测压力、速度和其他衍生量，如阻力和升力。然而，后者在空气动力学和大气流动中更为相关。


    分析河流流动的另一个关键方程是连续性方程。它指出进入系统的流体量必须等于离开系统的流体量。它有助于平衡进入河流系统的水量和离开的水量，从而帮助预测随时间变化的水流。这些方程在理解河流系统在洪水和组成流体物理性质变化等事件中的行为方面发挥着重要作用。因此，一个求解纳维-斯托克斯方程的数值模拟器有资格成为水文学家和水资源管理者的必备工具，因为它帮助他们做出关于防洪和减灾的决策。


    纳维-斯托克斯方程可以理解为流体的牛顿第二运动定律。该方程由两部分组成。方程 10.1 在此重述为方程 13.4，并增加了连续性部分。在本节中，我们描述了一个数值模型，用于求解单相流动的不可压缩纳维-斯托克斯方程。“不可压缩”一词意味着流体的密度不随外部压力的施加而变化。这也意味着水（流体）在流动过程中体积保持不变。因此，在方程
    13.4 的第二部分中，我们从左侧（LHS）去掉了 $\frac{\partial \rho}{\partial t}$ 项。惯性力由左侧（LHS）的项表示；然后右侧（RHS）的第一项由压力和粘性力组成，如方程
    10.9 的第三部分和方程 10.12 所示。项 **f** 代表所有外力。'
