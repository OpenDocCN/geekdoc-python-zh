    The above equation only has terms involving $n$ and $n+1$, therefore, if we know
    the value of $u_n$ we can know $u_{n+1}$. With this, we have described the Backward-Euler
    time integration technique. There are advanced alternatives that offer advantages
    such as stability over time steps. Some examples of these methods are the Crank-Nicolson
    method, Adams-Bashforth, Adams-Moulton, Newmark Beta, and Runge-Kutta methods.'
