    ../data/Godavari.csv\",\n    sep=\",\",\n    header=0\n).dropna()\ndf1 = data1[[\"\
    Level\", \"Streamflow\"]]  # 提取列\ndf1.loc[:, \"River\"] = \"Godavari\"  # 创建新列\n\
    df1 = df1.iloc[:1000, :]\n\n# 加载第二个数据集\ndata2 = pd.read_csv(\n    filepath_or_buffer=\"\
    ../data/Cauvery.csv\",\n    sep=\",\",\n    header=0\n).dropna()\ndf2 = data2[[\"\
