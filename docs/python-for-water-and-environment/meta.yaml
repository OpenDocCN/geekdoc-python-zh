    \n\"\"\"\n对拟合的模型执行单因素方差分析\n\"\"\"\nanoval_result2 = sm.stats.anova_lm(linearModel2,\
    \ typ=1)\n\nalpha2 = 0.05\n\n# 显示结果\nprint(\"\\n2. ANOVA结果:\")\nprint(anova_result2)\n\
    p_values2 = anova_result2['PR(>F)'].dropna()\nsignificant_results2 = p_values2\
    \ > alpha2\nif significant_results2['C(River)']:\n    print(\"\\n河流:\")\n    print(\"\
    \    备择假设 => \"\n          \"无显著差异 => \"\n          \"均值相等\")\nelse:\n    print(\"\
    \\n河流:\")\n    print(\"    零假设 => \"\n          \"差异显著 => \"\n          \"均值不同\"\
    )\n```\n\n该程序演示了对来自两条河流（戈达瓦里河和高韦里河）的水文数据应用单因素方差分析（ANOVA）。此分析的主要目标是检验两条河流的径流是否存在显著差异。\n\
    \n首先，程序导入必要的库，如NumPy、Pandas和Statsmodels。然后，加载对应于戈达瓦里河和高韦里河的两个数据集，每个数据集包含“Level”和“Streamflow”变量。数据集使用Pandas加载，并删除任何缺失值。向数据框中添加一个新列“River”，以标记各自河流的数据。\n\
    \n接着，程序将这两个数据集合并为一个数据框，以便于比较两条河流的径流。随后，对合并后的数据拟合一个线性模型，其中径流作为因变量，河流作为独立的分类变量。statsmodels.formula.api模块中的“ols”函数拟合此线性模型。\n\
    \n模型拟合后，执行单因素方差分析检验。ANOVA检验结果（包括F统计量和p值）被打印到控制台。p值小于0.05通常被认为是存在显著差异的证据。\n\n程序还执行了一个单独的分析，其中向高韦里河的径流数据添加了一些噪声。该噪声代表数据中的一些随机变化。然后，使用带噪声的数据以与之前相同的方式拟合新的线性模型并执行单因素方差分析检验。第二次分析的结果允许人们考察添加的噪声如何影响ANOVA检验的结果。\n\
    \n在两种情况下，都会从ANOVA表中获取p值，并与0.05的显著性水平进行比较，以确定两条河流的径流均值是否存在显著差异。如果p值小于0.05，则得出结论认为均值不同；否则，表明均值没有显著差异。\n\
    \n## 8.2 双因素方差分析\n\n双因素方差分析（ANOVA）是一种统计检验，用于考察两个独立分类变量（因素）对一个连续因变量的影响。ANOVA有助于评估每个因素的主效应以及因素之间的交互作用。在水文中，双因素方差分析可用于多种场景，其中多个因素影响水文响应。\n\
    \n在水文背景下，双因素方差分析的一个常见应用是分析气候（例如，降水水平）和土地利用（例如，农业实践）对水文变量（如径流或水质参数）的影响。气候的影响可能因经历不同降水水平的不同季节或区域而异。另一方面，土地利用可根据覆盖类型和管理方式分为多种类型。通过双因素方差分析，我们可以分析两个因素对水文参数的独立影响。ANOVA模型的一个可能扩展是研究混合效应。\n\
    \n在双因素方差分析中，残差的总平方和可归因于三个贡献因素：1. 因素A的效应（SSA），2. 因素B的效应（SSB），以及3. A和B的联合效应（SSAB）。ANOVA结果可以通过分析交互作用、自由度和均方误差来解释。同时计算伴随的F统计量，以评估因素（单独和联合）的显著性。"
