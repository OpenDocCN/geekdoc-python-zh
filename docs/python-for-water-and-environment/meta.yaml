    \ the data frame\nprint(river_df)\n```\n\n```\n>>>           Name  Length (km)\
    \  Drainage Area (km2)\n>>> 0       Ganges         2525              1080000\n\
    >>> 1  Brahmaputra         3848               651334\n>>> 2       Yamuna     \
    \    1376               366223\n>>> 3     Godavari         1465              \
    \ 312812\n>>> 4     Narmada         1312               131200\n```\n\nThe given\
    \ Python program stores some details about Indian rivers in a dictionary and then\
    \ converts that dictionary to a dataframe using pandas.\nThe output of this script\
    \ will be a dataframe that contains the names of the rivers, their lengths in\
    \ kilometers, and their drainage areas in square kilometers. Each river represents\
    \ a different row in the dataframe, and the details (name, length, and drain kilometers)\
    \ represent the columns.\n\n## 3.4.5 Loops\n\nGiven is a simple Python program\
