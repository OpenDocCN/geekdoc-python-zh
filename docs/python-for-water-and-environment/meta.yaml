    ## 7.2.4 简单指数平滑（SES）\n\n简单指数平滑（SES）是一种针对单变量数据的时间序列预测方法，不考虑趋势和季节性。它使用过去观测值的加权平均作为预测值，其中权重随着观测值来自更早的时间而呈指数下降——最旧的观测值对应的权重最小。权重下降的速率是该方法的一个参数，称为“平滑常数”。选择该参数是为了最小化预测误差的度量，例如均方误差（MSE）。SES对于没有明显趋势或季节性模式的数据特别有用（图7.9）。\n\
