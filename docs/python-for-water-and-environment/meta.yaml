    \n接下来，脚本加载一个数据集（在本例中是戈达瓦里河流量数据），并通过检查日期列的格式和对数据进行重采样（将时间序列数据降采样为2个月均值）来对其进行预处理。然后使用“plotGraph()”函数绘制重采样后的数据。\n\
    \n与任何其他时间序列模型一样，我们的模型假设数据满足平稳性和同方差性条件。接下来，我们对数据应用对数变换和标准化。\n\n变换后，程序利用增广迪基-富勒（ADF）检验来检查数据的平稳性。我们还绘制了时间序列数据的自相关和偏自相关函数图。\n\
