    # 14.3.3 Post-processing


    All the post-processing has been done in the Paraview software. The program in
    Sect. 14.3.2 saves the results in “.xdmf” format. These files are open-source
    file formats that can be readily loaded by Paraview. The file contains simulated
    data for each time step from *t* = 0.00 to *t* = 3.00 in 1500 time steps. This
    has been kept the same as the Navier-Stokes simulation. Figure 14.3 has been plotted
    by selecting the “Surface”-type representation and “Coloring” by the variable’s
    magnitude in the loaded mesh. Figure 14.3a–f was generated by selecting appropriate
    time values from the “Time” dropdown menu in the software. The Paraview application
    uses “Cool to Warm” colormap by default. A better alternative is the “Turbo” colormap.
    One can see the spreading of the contaminant even at end-time values.


    Figure 14.4 was plotted by selecting the “Surface With Edges” representation and
    setting the “Coloring” option to “Solid Color”. The pink-colored nodes are produced
    by doing a “Select Points Through (g)” operation in the rendered window for the
    mesh. These nodes represent the top-left bank of the aquifer and would be used
    to extract the concentration values for all time steps. Data at each of these
    nodes is thus a time series enabling further computation. Figure 14.5 is produced
    by doing the following statistical computations—first and third quartile, mean,
    maximum, and minimum. A separate Python program was used to generate the figures.


