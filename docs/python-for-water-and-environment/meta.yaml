  mdcn: "这个小程序展示了Python语法的各个方面，包括注释、模块导入、函数定义、条件语句、算术运算、函数调用以及格式化打印语句。\n\n## 3.4.2\
    \ 函数\n\n在Python中，函数是一个命名的、可重用的代码块，旨在执行特定任务。函数使用“def”关键字定义，后跟函数名和括号“()”。在这些括号内，可以指定零个或多个参数。函数体是缩进的，通常包含一个“return”语句。函数提高了代码的可重用性、可读性，并允许模块化编程。\n\
    \n```python\ndef outer_function(outer_arg):\n    print(f\"Outer function argument:\
    \ {outer_arg}\")\n\n    # This is a nested or inner function\n    def inner_function(inner_arg):\n\
    \        return outer_arg * inner_arg\n\n    # Calling the nested function\n \
    \   return inner_function(5)\n\nresult = outer_function(10)\nprint(f\"Result from\
    \ inner function: {result}\")\n```\n\n在上面的程序中，`outer_function()`被定义为带有一个参数`outer_arg`。在函数内部，它使用f-string格式化打印`outer_arg`的值。在`outer_function()`内部，有一个嵌套或内部函数`inner_function()`。这个内部函数接受一个参数`inner_arg`。`inner_function()`将`outer_arg`与`inner_arg`相乘并返回结果。定义嵌套函数后，`outer_function()`使用参数5调用`inner_function()`。`inner_function()`的返回值随后存储在变量`result`中。\n\
    \n程序随后使用f-string格式化打印`result`的值。\n\n## 3.4.3 列表和元组\n\n列表和元组都是可以存储多个项目的序列类型。列表是可变的，这意味着你可以修改它们的内容，这使得它们非常适合数据操作。它们使用方括号定义。相反，元组是不可变的，使用圆括号定义，通常用于固定数据。\n\
    \n```python\n# List Creation\nfruits_list = [\"Apple\", \"Banana\", \"Cherry\"\
    ,\n              \"Dates\", \"Elderberry\"]\n\n# Accessing List Items\nprint(\"\
