    & \sigma_{yy} & \sigma_{yz} \ \sigma_{zx} & \sigma_{zy} & \sigma_{zz} \end{pmatrix}$$


    $$\sigma = -\begin{pmatrix} p & 0 & 0 \ 0 & p & 0 \ 0 & 0 & p \end{pmatrix} +
    \begin{pmatrix} \sigma_{xx} + p & \sigma_{xy} & \sigma_{xz} \ \sigma_{yx} & \sigma_{yy}
    + p & \sigma_{yz} \ \sigma_{zx} & \sigma_{zy} & \sigma_{zz} + p \end{pmatrix}$$


    $$\sigma = -p\mathbf{I} + \sigma_T$$


    For the purpose of modeling, we often assume the fluids to be Newtonian, i.e.,
    the stress is directly proportional to the rate of deformation. Therefore, the
    expression of stress for a Newtonian fluid can be given as


    $$\sigma_{ij} = \mu \left( \frac{\partial u_i}{\partial x_j} + \frac{\partial
    u_j}{\partial x_i} \right)$$'
