    \ PDE.\n\"\"\"\ndt_inv = fem.Constant(\n    domain=domain,\n    c=PETSc.ScalarType(1\
    \ / delta_t))\nRate = fem.Constant(\n    domain=domain,\n    c=PETSc.ScalarType(0.9))\n\
    D_coeff = fem.Constant(\n    domain=domain,\n    c=PETSc.ScalarType(0.03))\n\n\
    \"\"\"\nHere, we define the element type\nand the function space to solve\nfor\
    \ the concentration of the\nreactant.\n\"\"\"\nP1 = ufl.FiniteElement(\n    family=\"\
    Lagrange\",\n    cell=domain.ufl_cell(),\n    degree=1)\nV = fem.FunctionSpace(\n\
    \    mesh=domain,\n    element=P1)\nvl = ufl.TestFunction(function_space=V)\n\
    ul = fem.Function(V=V)\nuln = fem.Function(V=V)\nul.name = \"concentration\"\n\
    ```"
