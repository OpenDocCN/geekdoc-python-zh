    df2 = df2.iloc[:1000, :]\n\n\n############### 第一部分 ###############\nprint(\"\\\
    n\\n第一部分\")\n\n# 创建一个合并的数据框\ndf = pd.concat(objs=[df1, df2], axis=0)\n\n\"\"\"\
    \n拟合一个线性模型，供下面的ANOVA程序使用\n\"\"\"\nlinearModel = ols(\n    formula='Streamflow\
    \ ~ C(River)', data=df).fit()\n\n\"\"\"\n对拟合的模型执行单因素方差分析\n\"\"\"\nano_result =\
    \ sm.stats.anova_lm(linearModel, typ=1)\n\n# 显示结果\nprint(\"\\n1. ANOVA结果:\")\n\
    print(anova_result)\n\n# 从ANOVA表中获取p值，然后\n# 将p值与期望的显著性水平（例如0.05）进行比较\n# 最后，打印显著结果\n\
    alpha = 0.05\np_values = anova_result['PR(>F)'].dropna()\nsignificant_results\
    \ = p_values > alpha\nif significant_results['C(River)']:\n    print(\"\\n河流:\"\
    )\n    print(\"    备择假设 => \"\n          \"无显著差异 => \"\n          \"均值相等\")\n\
    else:\n    print(\"\\n河流:\")\n    print(\"    零假设 => \"\n          \"差异显著 => \"\
    \n          \"均值不同\")\n\nprint(\"---------------------------------------\"\n \
    \     \"---------------------------------------\")\n\n\n############### 第二部分 ###############\n\
