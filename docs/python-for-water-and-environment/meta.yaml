  md: '# 4.2.2 Summarizing Numerical Data


    In any data analysis, first, we explore the most common statistical features of
    a dataset such as central tendency, variability, and symmetry. The mean, median,
    and mode represent measures of central tendency and provide a quick snapshot of
    what could be considered as the “average” or “typical” value of the dataset. Measures
    of variability such as the range, interquartile range, variance, standard deviation,
    and coefficient of variation are also crucial. They indicate how data points are
    spread around the center and their deviation from the average. Symmetry measures
    such as skewness and kurtosis jointly characterize the shape of the data distribution.
    They help us to understand how data scatters around the mean, informing whether
    the data distribution is peaked or flat and whether it is symmetric or skewed.


    Collectively, these measures provide a comprehensive statistical summary and insight
    into the underlying distribution and characteristics of the dataset. In hydrology,
    such statistical summaries are essential for understanding and predicting water-related
    phenomena and events.


    # 4.2.2.1 Measures of Central Tendency


    In hydrology, measures of central tendency are vital to grasp patterns of water-related
    variables, such as precipitation, groundwater levels, and streamflow. The mean,
    mode, and median are the measures used for determining the dataset’s central tendency,
    each providing valuable insight and helping in understanding the typical values
    to be expected.


    +   1. **Mean:** The mean, also known as the arithmetic mean, is calculated by
    dividing the total sum of all data points by the total count of data points. Every
    data point is accounted for in this central tendency measure. The formula for
    calculating the mean, ($\mu$), is


    $$\mu = \frac{1}{N} \sum_{i=1}^{N} x_i \quad (4.9)$$


    where N is the total number of observations, and ($x_i$) is each individual observation.

    For example, if we have monthly rainfall data for a year (in mm): 80, 90, 100,
    110, 120, 130, 100, 110, 120, 130, 140, 150, the mean rainfall is (80+90+100+110+120+130+100+110+120+130+140+150)/12
    = 114.17 mm.

    2. **Median:** The median is the middle value in a dataset ordered from the smallest
    to the greatest. If the number of observations ($N$) is odd, the median is the
    value at position ($N + 1$)/2. If $N$ is even, the median is the average of the
    values at positions $N/2$ and ($N/2$) + 1.'
