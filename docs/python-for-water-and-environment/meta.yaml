    $$\rho \left( \frac{\partial \mathbf{v}}{\partial t} + (\mathbf{v} \cdot \nabla
    \mathbf{v}) \right) = \nabla \cdot \sigma + \mathbf{f}$$

    $$\nabla \cdot \mathbf{v} = 0$$

    (13.4)


    The governing equations define the motion of fluids when subjected to different
    boundary conditions. In these equations $\rho$ stands for the density of the fluid,
    $\mu$ is the dynamic viscosity, $\mathbf{v}$, the velocity vector, $\sigma$, the
    Cauchy stress tensor, $\mathbf{f}$ stands for the external force at the source
    or sink, and $p$ denotes the pressure. There exists a limited number of analytical
    solutions for the equations. To date, the equations are solved using numerical
    schemes, and there is a vast literature on the challenges and their possible workarounds.


    Some of the reasons for their non-triviality are: the equations involve many variables
    like pressure, velocity, and viscosity among other factors, which make them difficult
    to solve. The interplay between these variables makes the system complex. Secondly,
    the equations are highly nonlinear. The conventional matrix solvers require quite
    an amount of tuning for the given system to solve. Thirdly, the Navier-Stokes
    equations are plagued with non-uniqueness, i.e. for a given set of boundary conditions
    there may exist multiple solutions that would fit the observed data. In addition
    to all of these, the equations generally require large processing power as the
    computational requirements are high, even for a simple 3D problem.


    In fluid flow modeling using Navier-Stokes equations, high Reynolds numbers are
    indicative of turbulent flows. This is true for river systems where small-scale
    motions occur which results in chaotic behavior. Regarding the stability of the
    solutions, there exist multiple schemes as cited by the literature. Here, we give
    a very brief explanation of this scheme and adapt it to the Fenics program illustrated
    next.


    The Crank-Nicolson method is a commonly used numerical technique for solving partial
    differential equations (PDEs) in both temporal and spatial domains. It is known
    for its balance of stability and accuracy, which results in second-order precision.
    The method is frequently employed in problems concerning heat transfer and fluid
    dynamics, among others. As an implicit method, the solution at each time step
    depends on the solution at the subsequent time step, thus requiring the solution
    of a linear system of equations.


    The method consists of three main steps:


    +   1. The first step is called the predictor step. It consists of solving the
    momentum equation, resulting in the system being progressed to a mid-time-step
    position.

    2. Following the predictor step, an initial projection may be carried out to ensure
    that the velocity field at the mid-time-step is divergence-free.

    3. The algorithm then performs a corrector step, which uses the time-centered
    estimates of velocity to attain the final state at the current time step.'
