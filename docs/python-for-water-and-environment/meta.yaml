    当前的对流反应方程，虽然可以通过线性求解器求解，\n但我们特意摒弃了线性求解器，而使用非线性求解器，\n因为人们可能希望模拟污染物分解速率有时是非线性的情况。\n\
    牛顿求解器对此很擅长。\n\"\"\"\nproblem = fem.petsc.NonlinearProblem(\n    F=F,\n    u=u1)\n\
    solver = nls.petsc.NewtonSolver(\n    comm=MPI.COMM_WORLD,\n    problem=problem)\n\
    solver.rtol = 1e-6\nsolver.report = True\n\n\"\"\"\n我们使用开放文件格式 '.xdmf' 来存储模拟结果。\n\
    我们首先写入网格，然后写入函数。网格只写入一次；\n在时间循环中，我们只写入函数值，因为网格在可视化时会被共享。\n\"\"\"\n```\n\n```python\n\
    xdmfu = XDMFFile(\n    comm=domain.comm,\n    filename=resultPath + simulationName\
    \ + \".xdmf\",\n    file_mode=\"w\",\n    encoding=XDMFFile.Encoding.HDF5)\nxdmfu.write_mesh(mesh=domain)\n\
    xdmfu.write_function(\n    u=u1,\n    t=t_start)\n\n\"\"\"\n我们从纳维-斯托克斯模拟中加载速度数据文件。\n\
    速度向量 (u_i, u_j) 用于实现方程的对流部分。\n因为数据是以 HDF5 格式存储的，所以我们使用 h5py 库来加载数据。\n这在“求解”方程之前完成。\n\
    \"\"\"\nwith h5py.File(\n        name=velocityDataPath, mode='r') as fr:\n   \
    \ print(\"Name of the velocity variable is {}\".format(\n        list(fr.keys())))\n\
    \n    # 时间步进和求解\n    progress = tqdm.autonotebook.tqdm(\n        desc=\"Solving\
    \ nonlinear system\",\n        total=n_steps\n    )\n    t = t_start\n    for\
    \ n in range(n_steps):\n        print(\"Doing {}/{} step\".format(n, n_steps))\n\
    \        t = t + delta_t\n        u_data = fr['u'][n]\n        w.vector.array\
    \ = u_data\n        r = solver.solve(u=u1)\n        u1n.x.array[:] = u1.x.array\n\
