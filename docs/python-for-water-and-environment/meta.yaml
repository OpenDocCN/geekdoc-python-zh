- md: "## Chapter 7\nHydrological Time Series Analysis\n\nForecasting a time series\
    \ into the future is one of the most common applications of statistical modeling\
    \ in hydrology. Typically, hydrologists are interested in forecasting streamflow\
    \ and floods, which itself is a complex nonlinear phenomenon controlled by meteorological\
    \ and geomorphological factors. Apart from streamflow, hydrologists typically\
    \ also attempt to forecast soil moisture, groundwater level, and water quality\
    \ parameters. Various time series statistical methods can be applied to a long\
    \ record of observations, in order to uncover trends, patterns, and cycles.\n\n\
    Knowledge of these temporal patterns is essential for two reasons—firstly, understanding\
    \ the underlying mechanisms governing the relationships between different hydrological\
    \ variables, and secondly, forecasting future hydrological conditions based on\
    \ our understanding of past patterns. For example, one could use historical records\
    \ of precipitation, temperature, and streamflow data for managing water resources,\
    \ forecasting floods, and planning for droughts. In this era of climate change,\
    \ such predictive models form a crucial input for assessing the potential impacts\
    \ on water availability and adaptation strategies.\n\nOne such technique is Autoregressive\
    \ Integrated Modeling Average or ARIMA, a standard method used to analyze hydrological\
    \ time series. Their ability to capture seasonality, autocorrelation, and trends\
    \ in time series data makes them suitable for diverse applications. For example,\
    \ one can predict the monthly rainfall with an ARIMA model using past observations,\
    \ while its model parameters would indicate the degree of seasonality or persistence.\n\
    \nAnother area where time series analysis is increasingly important is the impact\
    \ of human activities on hydrological systems. A comparison of time series data\
    \ before and after a specific event or human intervention (like a change in land\
    \ use or dam construction) can also reveal the impact on groundwater levels, river\
    \ flows, or water quality.\n\nTime series forecasting and analysis are essential\
    \ tools in hydrology, enhancing our ability to predict future conditions and understand\
    \ hydrological systems. In the following sections, we describe some commonly used\
    \ techniques for forecasting time series and statistical tests, along with example\
    \ codes in Python.\n\n### 7.1 Stationarity, Trend, and Periodicity\n\nStationarity,\
    \ trend, seasonality, and periodicity are fundamental concepts in time series\
    \ analysis. Stationarity refers to the property of a time series where its statistical\
    \ features such as mean, variance, and autocorrelation remain constant over time.\
    \ This is crucial because many statistical modeling techniques assume or require\
    \ the time series to be stationary.\nTrend refers to the long-term movement in\
    \ a time series. It can either be upward, downward, or horizontal, signifying\
    \ an increase, decrease, or no change in the variable of interest over time, respectively.\n\
    Seasonality is the characteristic of a time series in which the data exhibits\
    \ regular, predictable changes that recur every calendar season. This can be due\
    \ to seasonal effects like weather changes or other cyclical factors affecting\
    \ the variable of interest.\nPeriodicity, similar to seasonality, refers to patterns\
    \ that repeat over predictable, fixed periods of time. The difference that lies\
    \ in the periodic patterns is not tied to the calendar. For example, a certain\
    \ pattern in a time series that repeats every 10 data points demonstrates periodicity.\
    \ The identification of these components within a time series can help improve\
    \ the accuracy of forecast models and lead to more insightful analyses.\n\n```python\n\
    \"\"\"\nProgram to check for stationarity of a\ntime series signal and decompose\
    \ it\ninto trend and seasonal components\n\"\"\"\n\n# Import libraries\nimport\
    \ pandas as pd\nimport matplotlib.pyplot as plt\nfrom statsmodels.tsa.stattools\
    \ import adfuller as ADF\nfrom statsmodels.tsa.seasonal import seasonal_decompose\n\
    \n\"\"\"\nLoad dataset\n\"\"\"\ndata = pd.read_csv(\n    filepath_or_buffer=\"\
    ../data/Godavari.csv\",\n    sep=\",\",\n    header=0).dropna()\nprint(\"\\nChecking\
    \ data:\")\ntry:\n    data[\"time\"] = pd.to_datetime(\n        data['time'],\
    \ infer_datetime_format=True)\n    print(\"   Date format is okay!\\n\")\nexcept\
    \ ValueError:\n    print(\"   Encountered error!\\n\")\n    pass\ndf = data[[\"\
    time\", \"Streamflow\"]]\ndel data\nprint(\"Read data file\")\n\n\n\"\"\"\nDownsample\
    \ the time series\n\"\"\"\nresampled = df.resample('2M', on=\"time\").mean()\n\
    \n\n\"\"\"\nTransform the data\n\"\"\"\ndef transform(x):\n    x = x - minx +\
    \ 10.0\n    return x\n\n\ndef inverse_transform(x):\n    x = x - 10.0 + minx\n\
    \    return x\n\n\n\"\"\"\nTransform data\n\"\"\"\nminx = resampled.min()\nresampled\
    \ = transform(resampled)\n\n\n\"\"\"\nDecompose a signal (multiplicative/additive)\n\
    \"\"\"\ndecompose_result_mult = seasonal_decompose(\n    resampled, model=\"multiplicative\"\
    )\nfig, ax = plt.subplots(nrows=3, ncols=1, sharex=True,\n                   \
    \     figsize=(8, 6))\nax[0].plot(decompose_result_mult.observed, label='Time\
    \ series')\nax[1].plot(decompose_result_mult.seasonal, label='Seasonal')\nax[2].plot(decompose_result_mult.trend,\
    \ label='Trend')\nax[0].set_ylabel('Series')\nax[1].set_ylabel('Seasonal')\nax[2].set_ylabel('Trend')\n\
    ax[2].set_xlabel('Year')\nax[0].grid(ls='--')\nax[1].grid(ls='--')\nax[2].grid(ls='--')\n\
    plt.tight_layout()\nplt.savefig('seasonal.pdf', dpi=300)\n```\n\n```python\n\"\
    \"\"\nStationarity check\n\"\"\"\ndef stationarity_adf_test(x, alpha=0.05):\n\
    \    adftest_res = ADF(x, autolag=\"AIC\")\n    dfout = pd.Series(\n        adftest_res[0:4],\n\
    \        index=[\"ADF statistic\", \"ADF p-value\",\n               \"ADF lags\
    \ used\", \"ADF number of obs used\"])\n    for key, value in adftest_res[4].items():\n\
    \        dfout[\"   Critical Value (%s)\" % key] = value\n    print(dfout)\n \
    \   if dfout[\"ADF p-value\"] > alpha:\n        print(\"   Result: Non-stationary\
    \ time series\", \"\\n\")\n    else:\n        print(\"   Result: Stationary time\
    \ series\", \"\\n\")\n```\n\n```python\nprint(\"\\nChecking stationarity:\")\n\
    stationarity_adf_test(resampled)\n```\n\n![](img/0c8a53eeca13bc4d5422655fb7aaba77_89_0.png)\n\
    \nFirst, the program reads the Godavari River dataset from a CSV file using pandas.\
    \ It then checks the “time” field to ensure it is in the correct datetime format.\
    \ The data, consisting of fields such as “time”, “Pressure”, “Rel_humidity”, “Level”,\
    \ and “Streamflow”, is resampled to a monthly frequency using pandas’ resample()\
    \ function. This is done to reduce the frequency of the data points from daily\
    \ or hourly to monthly, thereby downsampling the time series data.\n\nFollowing\
    \ this, the “Level” field is chosen as the independent variable (X), and its square\
    \ root is also appended to it. This effectively transforms the original variable,\
    \ allowing the model to capture nonlinear relationships. The “Streamflow” field\
    \ is considered the dependent variable (y). The data is then split into training\
    \ and test sets using the train_test_split() function from sklearn, with 33% of\
    \ the data kept for testing.\n\nA Linear Regression model from sklearn is then\
    \ fit to the training data. Despite being a “linear” regression model, it is used\
    \ here to fit a nonlinear relationship due to the transformation in the second\
    \ independent variable. The fitted model’s parameters, including the intercept\
    \ and coefficients for “Level” and “Level×Rel_humidity”, are printed, along with\
    \ the R-squared value, which measures the proportion of variance in the dependent\
    \ variable which can be predicted from the independent variable.\n\n![](img/0c8a53eeca13bc4d5422655fb7aaba77_85_0.png)\n\
    \n**Fig. 6.3** Nonlinear regression of the Streamflow data on Level and (Level×Rel_humidity)\
    \ data for the Godavari River\n\nFinally, the program generates a three-dimensional\
    \ plot (Fig. 6.3) to visualize the results. The “Level” and “Level × Rel_humidity”\
    \ fields are plotted on the x and y-axes, respectively, while the “Streamflow”\
    \ is on the z-axis. The latter variable is the nonlinear term of the regression.\
    \ The plot also shows the estimated regression surface with the data points.\n\
    \n```python\n# Labels\nldist = 9\nax.set_xlabel('Press. (X)', labelpad=ldist)\n\
    ax.set_ylabel('Level * Rel_humidity (Y)', labelpad=ldist + 4)\nax.set_zlabel('Streamflow\
    \ (Z)', labelpad=ldist)\n\n# Tidying up\nax.view_init(elev=30, azim=-135)\nax.axis('auto')\n\
    plt.tight_layout()\nplt.show()\nplt.savefig(\"nonlinearReg_.pdf\", dpi=300)\n\n\
    print(\"Done!!\")\n```\n\n```\nEstimated parameters:\n    (b0, b1, b2) = (-48144.80,\
    \ 288.41, -0.02)\nR-squared value:\n    R^2 = 0.93\n```"
  mdcn: "## 第7章\n水文时间序列分析\n\n将时间序列预测到未来是水文统计建模中最常见的应用之一。通常，水文学家关注的是对径流和洪水的预测，这本身就是一个受气象和地貌因素控制的复杂非线性现象。除了径流，水文学家通常还试图预测土壤湿度、地下水位和水质参数。可以将各种时间序列统计方法应用于长期的观测记录，以揭示趋势、模式和周期。\n\
    \n了解这些时间模式至关重要，原因有二：首先，理解控制不同水文变量之间关系的潜在机制；其次，基于我们对过去模式的理解来预测未来的水文状况。例如，可以利用历史降水、温度和径流数据记录来管理水资源、预测洪水和规划干旱应对。在这个气候变化的时代，此类预测模型构成了评估对水资源可用性的潜在影响和适应策略的关键输入。\n\
    \n其中一种技术是自回归综合移动平均模型，即ARIMA，这是一种用于分析水文时间序列的标准方法。它们能够捕捉时间序列数据中的季节性、自相关性和趋势，使其适用于多种应用。例如，可以使用ARIMA模型利用过去的观测值预测月降雨量，而其模型参数则会指示季节性或持续性的程度。\n\
    \n时间序列分析日益重要的另一个领域是人类活动对水文系统的影响。比较特定事件或人类干预（如土地利用变化或水坝建设）前后的时间序列数据，也可以揭示其对地下水位、河流流量或水质的影响。\n\
    \n时间序列预测和分析是水文领域的重要工具，增强了我们预测未来状况和理解水文系统的能力。在接下来的章节中，我们将描述一些常用的时间序列预测技术和统计检验方法，并附有Python示例代码。\n\
    \n### 7.1 平稳性、趋势和周期性\n\n平稳性、趋势、季节性和周期性是时间序列分析的基本概念。平稳性指的是时间序列的统计特征（如均值、方差和自相关性）随时间保持不变的特性。这一点至关重要，因为许多统计建模技术假设或要求时间序列是平稳的。\n\
    趋势指的是时间序列中的长期变动。它可以是上升的、下降的或水平的，分别表示所关注的变量随时间增加、减少或没有变化。\n季节性是时间序列的一种特征，其中数据表现出每个日历季节都会重复出现的、有规律的、可预测的变化。这可能是由于天气变化等季节性效应或其他影响所关注变量的周期性因素造成的。\n\
    周期性与季节性类似，指的是在可预测的、固定的时间段内重复出现的模式。周期性模式的不同之处在于它不与日历相关联。例如，时间序列中每10个数据点重复一次的某种模式就表现出周期性。识别时间序列中的这些组成部分有助于提高预测模型的准确性，并带来更有见地的分析。\n\
    \n```python\n\"\"\"\n检查时间序列信号的平稳性并将其分解为趋势和季节性分量的程序\n\"\"\"\n\n# 导入库\nimport pandas\
    \ as pd\nimport matplotlib.pyplot as plt\nfrom statsmodels.tsa.stattools import\
    \ adfuller as ADF\nfrom statsmodels.tsa.seasonal import seasonal_decompose\n\n\
    \"\"\"\n加载数据集\n\"\"\"\ndata = pd.read_csv(\n    filepath_or_buffer=\"../data/Godavari.csv\"\
    ,\n    sep=\",\",\n    header=0).dropna()\nprint(\"\\n检查数据：\")\ntry:\n    data[\"\
    time\"] = pd.to_datetime(\n        data['time'], infer_datetime_format=True)\n\
    \    print(\"   日期格式正确！\\n\")\nexcept ValueError:\n    print(\"   遇到错误！\\n\")\n\
    \    pass\ndf = data[[\"time\", \"Streamflow\"]]\ndel data\nprint(\"读取数据文件\")\n\
    \n\n\"\"\"\n对时间序列进行降采样\n\"\"\"\nresampled = df.resample('2M', on=\"time\").mean()\n\
    \n\n\"\"\"\n转换数据\n\"\"\"\ndef transform(x):\n    x = x - minx + 10.0\n    return\
    \ x\n\n\ndef inverse_transform(x):\n    x = x - 10.0 + minx\n    return x\n\n\n\
    \"\"\"\n转换数据\n\"\"\"\nminx = resampled.min()\nresampled = transform(resampled)\n\
    \n\n\"\"\"\n分解信号（乘法/加法）\n\"\"\"\ndecompose_result_mult = seasonal_decompose(\n\
    \    resampled, model=\"multiplicative\")\nfig, ax = plt.subplots(nrows=3, ncols=1,\
    \ sharex=True,\n                        figsize=(8, 6))\nax[0].plot(decompose_result_mult.observed,\
    \ label='时间序列')\nax[1].plot(decompose_result_mult.seasonal, label='季节性')\nax[2].plot(decompose_result_mult.trend,\
    \ label='趋势')\nax[0].set_ylabel('序列')\nax[1].set_ylabel('季节性')\nax[2].set_ylabel('趋势')\n\
    ax[2].set_xlabel('年份')\nax[0].grid(ls='--')\nax[1].grid(ls='--')\nax[2].grid(ls='--')\n\
    plt.tight_layout()\nplt.savefig('seasonal.pdf', dpi=300)\n```\n\n```python\n\"\
    \"\"\n平稳性检验\n\"\"\"\ndef stationarity_adf_test(x, alpha=0.05):\n    adftest_res\
    \ = ADF(x, autolag=\"AIC\")\n    dfout = pd.Series(\n        adftest_res[0:4],\n\
    \        index=[\"ADF统计量\", \"ADF p值\",\n               \"ADF使用的滞后数\", \"ADF使用的观测数\"\
    ])\n    for key, value in adftest_res[4].items():\n        dfout[\"   临界值 (%s)\"\
    \ % key] = value\n    print(dfout)\n    if dfout[\"ADF p值\"] > alpha:\n      \
    \  print(\"   结果：非平稳时间序列\", \"\\n\")\n    else:\n        print(\"   结果：平稳时间序列\"\
    , \"\\n\")\n```\n\n```python\nprint(\"\\n检查平稳性：\")\nstationarity_adf_test(resampled)\n\
