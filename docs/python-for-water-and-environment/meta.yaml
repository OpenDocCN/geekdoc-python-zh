    \ * inner_arg\n\n    # Calling the nested function\n    return inner_function(5)\n\
    \nresult = outer_function(10)\nprint(f\"Result from inner function: {result}\"\
    )\n```\n\nIn the above program, the outer_function() is defined with a single\
    \ parameter, outer_arg. Inside the function, it prints the value of the outer_arg\
    \ using f-string formatting. Within the outer_function(), there is a nested or\
    \ inner function called inner_function(). This inner function takes a parameter\
