    This formulation uses an Adams-Bashforth of degree 2 based time discretization
    technique.


    The second part of the variational form can be given as


    $$\int_{\Omega} \langle \nabla p_{-}, \nabla q \rangle dx - \int_{\Omega} \frac{\rho_{w}}{dt}
    \langle \nabla \cdot u_{s}, q \rangle dx = 0 \quad (13.6)$$


    where, $p_{-}$ is a function corresponding to intermediate pressure; $q$ is the
    test function from the pressure''s function space.


    The third part of the variational form can be given as


    $$\int_{\Omega} \rho_{w}(\langle u_{s}, v \rangle - \langle u, v \rangle)dx =
    \int_{\Omega} \frac{1}{dt} \langle \nabla \phi, v \rangle dx \quad (13.7)$$


    where, $\phi$ is a function defined on the pressure''s function space.


