  mdcn: "## 9.3.4 非对称预测区间\n\n分位数的非对称预测区间提供了一个范围，未来观测值预期会以一定概率落入该范围。与对称区间不同，这些区间会根据数据的偏度进行调整，这意味着到下限和上限的距离可以不同，从而更好地反映底层数据分布（图\
