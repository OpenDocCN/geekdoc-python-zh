    \ we would have expected a different pattern. As this is an advection and diffusion\
    \ process the parameters—$D$ and $\\mathbf{w}$—play a significant role in the\
    \ simulation.\n\n## 14.3 Generalized 2D Advection, Diffusion, Reaction Model\n\
    \nIn this section, we develop a generalized advection, diffusion, reaction model.\
    \ We specifically model a scenario where a reactive contaminant is undergoing\
    \ advection and diffusion while decaying at a rate that is proportional to the\
    \ concentration, $[u]$ meaning that the rate of reaction follows a first-order\
    \ kinetics.\n\n### 14.3.1 Variational Formulation\n\nThe strong form of the governing\
    \ equations for this model is given as\n\n$$\\frac{\\partial[u]}{\\partial t}\
    \ + \\mathbf{w} \\cdot \\nabla[u] + \\nabla \\cdot (D\\nabla[u]) = f - R[u] \\\
    quad (14.5)$$\n\nwhere $[u]$ is the concentration of the contaminant, $w$ is the\
    \ velocity of the flow, $D$ is the diffusion coefficient, and $R$ is the rate\
