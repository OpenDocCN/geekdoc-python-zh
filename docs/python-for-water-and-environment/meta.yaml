  md: '# 13.5 A 2D Simulation Using Navier-Stokes Equations


    257


    *Velocity field:*


    In Fig. 13.4a–f, we see the velocity fields that correspond to time steps, $t
    = 0.03s, 0.33s, 1.0s, 1.66s, 2.33s, 3.00s$. At $t = 0.03s$, in sub-figure (a),
    the velocity at the inlet appears to be higher than the outlet; the color intensity
    stands for the said comparison. We can also see a bifurcation in the flow when
    it hits the obstacle at the bottom-left. There is a similar structure around the
    obstacle near the outlet at the top-right. At the next time step, at $t = 0.33s$,
    the flow advances some more and the bifurcated flow structure becomes prominent;
    high-intensity (dark red) regions are found to cover more area. At the same time,
    we can see the beginning of the vortex street near the left bank of the domain.


    At the time step, $t = 1.0s$, the high-intensity regions cover still more space
    in the domain. The vortex becomes more evident toward the left. The bifurcation
    in the flow is more pronounced; one can see elongated flow streams. The velocity
    intensities remain more or less the same at the outlet.


    At time step, $t = 1.66s$, the flow stream starts to convert to a fully developed
    vortex toward the left-top. The flow around the second obstacle appears to exhibit
    a triangle-shaped low-velocity zone in the northeast direction toward the outlet
    direction. Even the center appears to have a low-velocity zone.


    At time step, $t = 2.33s$, we can see a fully developed vortex at both the top
    and bottom of the obstacle present at the left bottom. A low-velocity zone (almost
    zero magnitude) is found to cover the right side of the domain.


    At time step, $t = 3.00s$, the vortex in the left-top exhibits a spiral shape,
    and the low-velocity region at the right gets modified. A small magnitude velocity
    stream is present at the outlet. A few low-velocity spots can also be seen spread
    across the domain.


    *Statistical Analysis:*


    Once the simulations are complete we intend to perform a statistical analysis
    of the velocity data collected from the inlet and the outlet. For this, we select
    a group of nodes at the inlet and the outlet (Fig. 13.5). The pink-colored nodes
    mark the probes for which the velocity data is acquired for all the 1500 time
    steps. We compute the minimum, maximum, first quartile, third quartile, and the
    mean of the data. The result of the analysis has been plotted in Fig. 13.6.


    A velocity profile having a sinusoid shape was initiated and run. The resultant
    profile at the outlet seems to follow some part of the profile at the inlet. The
    velocity at the outlet also appears to be reduced and is almost half of the input.


    *Pressure field:*


    We also show the pressure field at the time step, $t = 3.00s$. One can notice
    two low-pressure zones at the top-left of the domain. The physical positions of
    the two zones corroborate with the velocity field as shown in Fig. 13.4f. The
    inlet and the outlet have high and low-pressure regions, respectively.'
