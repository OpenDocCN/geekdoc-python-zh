    The Python program provided above demonstrates a two-way Analysis of Variance
    (ANOVA) on hydrological data from two rivers—Godavari and Cauvery.


    The first part of the program loads two separate datasets related to the two rivers.
    The Pandas library is used to read the data from CSV files, drop any rows with
    missing data, and create new dataframes with selected columns. Each dataframe
    is limited to the first 1000 rows of data and a new column, “River”, is added
    to identify the source of the data. These two dataframes are then combined into
    a single dataframe.


    In the next step, the program fits a linear model to the data using the ordinary
    least squares (ols) method from the statsmodels library, taking “Streamflow” as
    the dependent variable and “Level” and “River” as independent variables.


    After fitting the linear model, a two-way ANOVA is performed on the model. The
