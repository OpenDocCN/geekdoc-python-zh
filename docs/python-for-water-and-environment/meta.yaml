    \n程序对时间序列数据执行增强迪基-富勒（ADF）检验以检查平稳性。平稳性是时间序列分析中的一个基本假设。\n\n![img/0c8a53eeca13bc4d5422655fb7aaba77_112_0.png](img/0c8a53eeca13bc4d5422655fb7aaba77_112_0.png)\n\
