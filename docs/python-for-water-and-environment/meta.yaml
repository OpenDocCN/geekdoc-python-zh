    color\": \"coral\"},\n            )\nplt.ylabel(\"(m)\")\nplt.grid(ls='--')\n\
    plt.tight_layout()\nplt.show()\nplt.savefig(\"single_box.pdf\", dpi=300)\nprint(\"\
    \\n\\nPlotted!\")\n```"
