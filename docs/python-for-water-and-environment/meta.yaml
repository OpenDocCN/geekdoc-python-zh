    \n    # 存储后续场值\n    name_ = \"h_{:.04f}__.png\"\n    if i % 1 == 0:\n        visualize_and_save(h_,\
    \ t, name_.format(t))\n\n    print(\"Done step {}\".format(t))\n\nprint(\"Done!\"\
    )\n```\n\n### 12.2.4 结果讨论\n\n图 12.4 展示了在如图 12.3 所示的计算域上进行的非稳态地下水模拟结果。所有边界都对高度变量（未知量）施加了狄利克雷边界条件。两个圆形区域表示施加了源（汇）函数的井。圆形井是通过应用圆的方程实现的。两个井的汇强度不同，其中上方的井（图\
