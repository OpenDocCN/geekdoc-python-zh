    \ of the intensive phase, the water, in our case.\n\nMass concentration is often\
    \ expressed as *grams per unit liter* or *g/L*. A more popular unit to specify\
    \ the quality of water is the *mg/L*. The molar concentration is expressed as\
    \ the number of *moles per unit liter*, often written as *mol/L*. The molar fraction\
    \ is defined as the ratio of the number of moles of the component to the total\
    \ number of moles of the intensive phase. The measure is relevant for models where\
    \ there is an interaction among the participating species, i.e., the components\
    \ that undergo chemical reactions. The equivalent fraction is defined as the amount\
    \ of the participating species that can react with the specified amount of another\
    \ species/substance in a specific reaction.\n\n### 13.1 Contaminant Transport\
    \ Processes\n\nContaminant transport in the environment is a continuous phenomenon\
