  md: "# 15.2 WordPress Backup\n\nThe starting point for the second example is a Linux\
    \ machine running a web server and a database server to implement a web presence\
    \ using WordPress. The content of the wp database, the /var/www/html/wordpress\
    \ directory, and the entire server configuration, i.e., the /etc directory, are\
    \ supposed to be backed up once a day. Compressed backups of the last 7 days should\
    \ always be kept both locally and on a second server accessible via SSH.\n\nThe\
    \ implementation is created by a Bash script that runs with root privileges. The\
    \ mysqldump command is used to back up the MySQL database by connecting to the\
    \ MySQL server with the wpbackupuser account. This account, which only includes\
    \ rights to perform backups, can be set up in MySQL in the following way:\n\n\
    ```\nCREATE USER wpbackupuser@localhost IDENTIFIED BY 'TopSecret123';\nGRANT Select,\
    \ Lock Tables, Show View\n    ON wp.* TO wpbackupuser@localhost;\nGRANT Process,\
    \ Reload ON *.* TO wpbackupuser@localhost;\n```\n\nTo make sure that the script\
    \ does not contain the password in plain text, it is stored in the /root/.my.cnf\
    \ file. mysqldump automatically searches for this file and analyzes the data it\
    \ contains. You should use chmod 600 .my.cnf to make sure that nobody except root\
    \ is allowed to read this file!\n\n```\n# in file /root/.my.cnf\n[mysqldump]\n\
    user = wpbackupuser\npassword = TopSecret123\ndefault-character-set = utf8\n```\n\
    \nOnce all the prerequisites have been met, you can start programming. Various\
    \ configuration parameters are summarized in the first lines of the script. For\
    \ better readability, I have used capital letters for these variables.\n\ndate\
    \ +%u generates a consecutive number for the day of the week (1 for Monday to\
    \ 7 for Sunday). This number will be integrated into the names of the backup files.\n\
    \nmysqlopt contains options for performing the backup. The behavior of mysqldump\
    \ can be controlled via countless options. I have limited myself in this case\
    \ to --single-transaction. This option ensures that the database cannot change\
    \ during the backup. The output of mysqldump is passed to gzip, compressed, and\
    \ finally stored in the $dbfile file. If the file already exists, it will be overwritten.\
    \ (This process happens for the first time when the script runs for 8 consecutive\
    \ days. So, you always have backup versions of the last 7 days.)\n\nTo perform\
    \ the backup of a WordPress installation, a short tar command is sufficient (see\
    \ also Chapter 5, Section 5.3). The WordPress directory also contains all installed"
