    \ determined. This letter does not always have to remain the same, depending on\
    \ which data carriers are currently in use.\n\nThe script logs all robocopy outputs\
    \ to a file whose name has the following format: robocopy-2023-12-31--17-30.log.\
    \ This file and a logging directory are set up automatically.\n\nFinally, the\
    \ script loops through all the directories listed in $syncdirs and runs robocopy.\
    \ The options used in this process have the following meaning:\n\n+   - /e: Traverse\
