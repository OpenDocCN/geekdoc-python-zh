    \ enter multiline commands, PowerShell behaves quite intelligently: Provided that\
    \ it is clear that the command is not yet complete, you can simply press Enter\
    \ and continue typing on the next line. This incompleteness condition is always\
    \ met if there are still open parentheses or if the last character in the line\
    \ is an operator that requires a continuation, as was the case with our previous\
    \ examples (| at the end of the line).\n\nIf, on the other hand, the continuation\
    \ is not clearly recognizable to the shell but you still want to separate the\
    \ input across several lines, the affected line must end with a space and a backtick\
    \ (`). The space character before ` is mandatory, and ` must be immediately followed\
    \ by Enter.\n\n```\n> Do-Something -LongOption 123 -OtherOption 456 `\n    -YetAnotherOption\
    \ \"lorem ipsum\"\n```\n\n# 4.4.3 Dealing with Special Characters\n\nIn PowerShell,\
    \ many characters have a special meaning: # introduces a comment, { and } form\
    \ code groups, > redirects output, etc. Sometimes, using such characters directly,\
    \ that is, without the PowerShell-specific function, is required, for example,\
    \ when calling external commands. In the next example, the > and # characters\
    \ must not be interpreted. (I will introduce the magick command in more detail\
    \ in Chapter 16, Section 16.1.)\n\nIn such cases, you must prefix the backtick\
    \ (`) mentioned earlier. The backtick is thus the quotation mark of PowerShell\
    \ and fulfills the same task as the backslash (\\) in Bash and many other programming\
    \ languages.\n\n```\n> magick in.png -resize 1024x1024`> -background `#733 out.jpg\n\
    ```\n\nIn most cases, it is easier to enclose the relevant strings in quotes:\n\
