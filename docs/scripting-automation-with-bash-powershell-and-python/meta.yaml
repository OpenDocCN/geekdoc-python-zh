    # 6.4.4 Managing Processes


    The `ps` command without options lists the processes that have been started from
    the terminal. The result of `ps ax` is already impressive: It will provide you
    with a list of all processes running on the computer or in the virtual machine
    along with detailed information (process number, parameters, etc.). More information
    is provided by `ps axu:` This command also shows who started which process.

    The result of `ps` can be further processed with other commands. In the following
    examples, `wc -l` (*word count, lines*) counts the output lines and thus the active
    processes. `grep` filters the lines from the result that contain the `ssh` search
    term.


    ```

    $ ps ax | wc -l      # count number of processes

    $ ps ax | grep ssh   # show only SSH processes

    ```


    `top` shows the running processes sorted by their CPU usage. The display is refreshed
    every 3 seconds until you end the command via `q`.


    > **Alternatives to top**

    Some useful alternatives to `top` exist. While `htop` has a clear display, `iotop`,
    `iftop`, or `powertop` use other sorting criteria—I/O load, network performance,
    or (estimated) power consumption, respectively. These commands usually must be
    installed separately.


    # 6.4.5 Terminating Processes


    To terminate an out-of-control or infinite loop script that you started in the
    terminal, you can simply press `Ctrl` + `C`. You can stop other processes associated
    with your account via `kill pid`. Instead of `pid`, you must specify the process
    number, which you can determine either via `ps ax` or `top`.

    Despite its dramatic name, `kill` actually only sends signals to other processes.
    Without any additional options, it sends the `SIGTERM` signal, which is effectively
    a polite request that the process be terminated. However, the process can ignore
    this signal. In such cases, `kill -9 pid` usually provides the desired result.
    In this context, `-9` indicates the signal number. Signal 9 is called `SIGKILL`
    and terminates every process immediately'
