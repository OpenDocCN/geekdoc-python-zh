    > **What Should You Do If a Password Ends Up in a Git Repository after All?**

    The concept of Git repositories is that any file can also be restored to an earlier
    state. For this reason, removing the file in question in the next commit or to
    overwriting the password in the file is of no use. The only safe approach is to
    change the password in the respective program or on the server in question. If
    this is impossible because the external system is not controlled by you, you still
    have the option of deleting the repository in its entirety—an unpleasant thought,
    I know.


