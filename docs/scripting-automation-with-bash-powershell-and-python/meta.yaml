- md: "## 17.7.1 PowerHTML Module\n\nTo convert an HTML page into a proper DOM, the\
    \ best approach is to use the `Convert-From-HTML` cmdlet from the *PowerHTML*\
    \ module. Note that you must install the module in advance:\n\n```\n> Install-Module\
    \ PowerHTML\n```\n\nThis module has not been changed since 2019 and lacks JavaScript\
    \ functions comparable to *Requests-HTML*. In addition, *PowerHTML* is poorly\
    \ documented. Internally, the module uses the *Html Agility Pack* (HAP), described\
    \ at https://html-agility-pack.net.\n\nThe following script reads the Wikipedia\
    \ page for PowerShell and extracts all `<h2>` headings from it. Since each headline\
    \ is built from several components, the `<span>` element of the `mw-headline`\
    \ class is determined within the headline.\n\n```\n# Sample file wikipedia.ps1\n\
    $url = 'https://en.wikipedia.org/wiki/PowerShell'\n$response = Invoke-WebRequest\
    \ $url\n$dom = ConvertFrom-Html $response\n# <div id='bodyContent'> search\n$content\
    \ = $dom.SelectSingleNode(\"//div[@id='bodyContent']\")\n# search all <h2> headings\
    \ in it\n$headers = $content.SelectNodes(\"//h2\")\nforeach ($header in $headers)\
    \ {\n    $headline =\n        $header.SelectSingleNode(\"span[@class='mw-headline']\"\
    )\n    Write-Output $headline.InnerText\n}\n```\n\n> **Alternatives to PowerHTML**\n\
    \nThe PowerHTML module works across different platforms, even in PowerShell scripts\
    \ on Linux. An alternative is to use the `HTMLFile` class, but this class is only\
    \ available on Windows, and even then, it is a pain to use in PowerShell scripts.\
    \ You can find an example on Stack Overflow at https://stackoverflow.com/a/71855426.\n\
    \n## Chapter 18\nUsing REST APIs\n\nIn the introduction to Chapter 17, I made\
    \ it clear that web scraping is only a stopgap measure. The exchange of information\
    \ between websites or with external services is much more reliable if an application\
    \ programming interface (API) can be used for this purpose. REST APIs have become\
    \ established in recent decades. Representational state transfer (REST) is based\
    \ on data exchange via established HTTP requests such as GET, PUT, or POST. The\
    \ data is predominantly transferred in JSON format or, fortunately much less frequently,\
    \ as XML. Some APIs also require authentication, with various methods to choose\
    \ from (Basic, Bearer, Digest, OAuth, and so on).\n\nIn this chapter, I will demonstrate\
    \ how you can use REST APIs, and I will show you some elementary programming techniques.\n\
    \n> **Prerequisites for This Chapter**\n\nThe sample scripts use all three programming\
    \ languages covered in this book. In addition, an important prerequisite for reading\
    \ this chapter is Chapter 10. JSON is ubiquitous as a REST data format.\n\nYou’ll\
    \ benefit from this chapter only if you have a basic knowledge regarding HTTP\
    \ and REST. If you’re not familiar with typical request types such as GET, PUT,\
    \ or POST, or have never heard of Bearer authentication, you should first do some\
    \ research.\n\n## 18.1 Tools\n\nAs I will show you momentarily, the `curl` or\
    \ `wget` commands are sufficient to test REST APIs. But it’s not exactly fun.\
    \ You should definitely install a graphical user interface (GUI) for running HTTP\
    \ requests to analyze foreign APIs as well as for debugging. My recommendation\
    \ is Postman (https://postman.com), but Swagger UI, the Insomnia REST client,\
    \ or RapidAPI (formerly Paw, for macOS only) are also good alternatives. Various\
    \ browser extensions also exist to try out REST APIs in a web browser.\n\n## 18.2\
    \ Sample APIs to Try Out\n\nTo practice using REST APIs, you'll need a playground.\
    \ On the following pages, you'll find APIs that you can try out for free (although\
    \ some only free to a limited extent):\n\n- https://httpbin.org\n- https://restcountries.com\n\
    - https://www.postman.com/explore\n- https://apipheny.io/free-api\n- https://github.com/public-apis/public-apis\n\
    \nTo simulate a real API in a straightforward way, you can use *WireMock* (https://wiremock.org).\
    \ Basically, WireMock is an open-source project. However, the use of the associated\
    \ cloud service is only free of charge with major restrictions and is aimed more\
    \ at large companies that want to test APIs away from productive operation.\n\n\
    ## 18.3 Implementing Custom REST APIs\n\nUsing Bash or PowerShell, implementing\
    \ your own REST APIs is nearly impossible. The situation is different for Python,\
    \ where *Flask* and *Django* are two widely used frameworks for server programming.\
    \ Possible alternatives include *FastAPI*, *Pyramid*, or *Bottle*. However, both\
    \ designing and implementing APIs are well beyond the scope of this book, with\
    \ its focus on typically short scripts.\n\n## 18.4 curl and wget\n\nLinux users\
    \ especially are familiar with the `curl` and `wget` commands. These commands\
    \ are primarily used to download files in the terminal. `curl` displays the contents\
    \ of the downloaded file by default; however, the output can be saved to a file\
    \ by using `-o` (an “oh”/not a “zero”). `wget` saves the file to the local directory\
    \ by default. If the filename is not clear from the URL, the site's default home\
    \ page filename is used (often `index.html`). To display the file in standard\
    \ output, you should use `-O` (“oh” again) followed by the desired filename or\
    \ `-` for standard output.\n\n```\n$ curl https://example.com/some/file.txt -o\
    \ file.txt\n$ wget https://example.com/some/file.txt\n```\n\n> **Installation**\n\
    On Linux and macOS, `curl` is available by default. `wget` can be installed using\
    \ the usual package management tools (i.e., `apt/dnf/brew install wget`).\n`curl`\
    \ for Windows can be downloaded from https://curl.se/windows; `wget`, from https://eternallybored.org/misc/wget.\n\
    \n### 18.4.1 curl\n\ncurl and wget execute a GET request by default and do not\
    \ require authentication. However, both commands can also upload local data (PUT/POST),\
    \ support various authentication types, and so on. In this section, I will focus\
    \ on curl and briefly summarize the most important options in the REST context:\n\
    \n- `-X` or `--request GET/POST/PUT...` specifies the desired request type (GET\
    \ by default).\n- `-H` or `--header 'txt'` passes the desired HTTP header, for\
    \ example, `-H \"Content-Type: application/json\"`. The option can be repeated\
    \ if multiple headers are required. `-H @file.txt` reads the headers from a file.\n\
    - `-d` or `--data 'data'` sends the specified data with the request. For `--data`,\
    \ the following alternatives are available: `--data-binary`, `--data-raw`, and\
    \ `--data-urlencode`. In any case, the data can also be read from the specified\
    \ file via `@file`.\n- `-u` or `--user name:pw` passes a username and the corresponding\
    \ password.\n- `-n` or `--netrc` tells curl to read the login information from\
    \ the `.netrc` file. Using `--netrc-file file.txt`, you can alternatively specify\
    \ a different location for this file. Both variants are more secure than the password\
    \ transfer via `-u`.\n- `--oauth2-bearer 'token'` sends the specified Bearer token\
    \ along with the request.\n- `-L` or `--location` allows curl to run an HTTP redirect.\
    \ So if the server indicates that the page is now in a different location, this\
    \ redirection will be followed.\n- `-k` or `--insecure` does not check the SSH\
    \ or HTTPS certificates. (This is unsafe!)\n- `-v` or `--verbose` displays comprehensive\
    \ debugging information during the execution of the request.\n- `-I` or `--head`\
    \ returns only the header of the response as a result. This option is convenient,\
    \ for example, if you're only interested in the HTTP status code, not in the other\
    \ data from the response.\n\nThe following examples refer to https://httpbin.org.\
    \ The purpose of this website is to test REST tools or scripts. For example, a\
    \ GET request of the `/headers` address returns a JSON document with all transferred\
    \ headers:\n\n```\n$ curl https://httpbin.org/headers -H 'myheader1: lorem' \\\
    \n                           -H 'myheader2: ipsum'\n\n{\n  \"headers\": {\n  \
    \  \"Accept\": \"*/*\",\n    \"Host\": \"httpbin.org\",\n    \"Myheader1\": \"\
    lorem\",\n    \"Myheader2\": \"ipsum\",\n    \"User-Agent\": \"curl/8.0.1\",\n\
    \    \"X-Amzn-Trace-Id\": \"Root=1-64228236-74fe...\"\n  }\n}\n```\n\nIn the second\
    \ example, you first create the tiny local JSON file called `mydata.json`. Then,\
    \ you use PUT to transfer this file to the `/put` address. The website responds\
    \ with the sent data, so you can control if everything works:\n\n```\n$ cat >\
    \ mydata.json << EOF\n{\n    \"firstName\": \"John\",\n    \"lastName\": \"Doe\"\
    \n}\nEOF\n```\n\n```\n$ curl -X PUT https://httpbin.org/put?para=123 -d @mydata.json\
    \ \\\n      -H \"Content-Type: application/json\"\n```\n\n```\n{\n    \"args\"\
    : {\n        \"para\": \"123\"\n    },\n    \"data\": \"{ \"firstName\": \"John\"\
    ,  \"lastName\": \"Doe\"}\",\n    \"json\": {\n        \"firstName\": \"John\"\
    ,\n        \"lastName\": \"Doe\"\n    }, ...\n}\n```\n\nFor debugging purposes,\
    \ an often useful approach is to compile requests in a GUI. In the final example,\
    \ you'll test the basic authentication. In this test, you specify the login data\
    \ with `/basic-auth/name/pw`. Then, the website checks if this data matches that\
    \ of `-u 'name:pw'`. With `-I`, the status code of the response will be displayed:\
    \ In the first case, that's 200 (successful authentication); in the second case,\
    \ 401 (unsuccessful authentication).\n\n```\n$ curl -X GET \"https://httpbin.org/basic-auth/maria/topsecret\"\
    \ \\\n      -u 'maria:topsecret' -I\n\nHTTP/2 200\n```\n\n```\n$ curl -X GET \"\
    https://httpbin.org/basic-auth/maria/topsecret\" \\\n      -u 'maria:wrong' -I\n\
    \nHTTP/2 401\n```"
  mdcn: "## 17.7.1 PowerHTML 模块\n\n要将 HTML 页面转换为合适的 DOM，最佳方法是使用 *PowerHTML* 模块中的 `Convert-From-HTML`\
    \ cmdlet。请注意，你必须提前安装该模块：\n\n```\n> Install-Module PowerHTML\n```\n\n该模块自 2019\
    \ 年以来未进行更新，缺乏与 *Requests-HTML* 相当的 JavaScript 功能。此外，*PowerHTML* 的文档也不完善。在内部，该模块使用\
    \ *Html Agility Pack* (HAP)，其描述见 https://html-agility-pack.net。\n\n以下脚本读取 PowerShell\
    \ 的维基百科页面并从中提取所有 `<h2>` 标题。由于每个标题由多个组件构成，因此需要在标题内确定 `mw-headline` 类的 `<span>`\
    \ 元素。\n\n```\n# 示例文件 wikipedia.ps1\n$url = 'https://en.wikipedia.org/wiki/PowerShell'\n\
    $response = Invoke-WebRequest $url\n$dom = ConvertFrom-Html $response\n# 搜索 <div\
    \ id='bodyContent'>\n$content = $dom.SelectSingleNode(\"//div[@id='bodyContent']\"\
    )\n# 搜索其中的所有 <h2> 标题\n$headers = $content.SelectNodes(\"//h2\")\nforeach ($header\
    \ in $headers) {\n    $headline =\n        $header.SelectSingleNode(\"span[@class='mw-headline']\"\
    )\n    Write-Output $headline.InnerText\n}\n```\n\n> **PowerHTML 的替代方案**\n\nPowerHTML\
    \ 模块可在不同平台上运行，甚至在 Linux 上的 PowerShell 脚本中也能使用。一个替代方案是使用 `HTMLFile` 类，但该类仅在 Windows\
    \ 上可用，而且即使在 Windows 上，在 PowerShell 脚本中使用起来也很麻烦。你可以在 Stack Overflow 上找到一个示例：https://stackoverflow.com/a/71855426。\n\
    \n## 第 18 章\n使用 REST API\n\n在第 17 章的引言中，我明确指出网络抓取只是权宜之计。如果能使用应用程序编程接口（API）来实现此目的，网站之间或与外部服务之间的信息交换会可靠得多。REST\
    \ API 在近几十年来已确立地位。表述性状态转移（REST）基于通过既定的 HTTP 请求（如 GET、PUT 或 POST）进行数据交换。数据主要以 JSON\
    \ 格式传输，或者（幸运的是）较少以 XML 格式传输。一些 API 还需要身份验证，有多种方法可供选择（Basic、Bearer、Digest、OAuth\
    \ 等）。\n\n在本章中，我将演示如何使用 REST API，并向你展示一些基本的编程技巧。\n\n> **本章的先决条件**\n\n示例脚本使用了本书涵盖的所有三种编程语言。此外，阅读本章的一个重要先决条件是第\
    \ 10 章。JSON 作为 REST 数据格式无处不在。\n\n只有当你具备关于 HTTP 和 REST 的基础知识时，你才能从本章中受益。如果你不熟悉典型的请求类型（如\
    \ GET、PUT 或 POST），或者从未听说过 Bearer 身份验证，你应该先做一些研究。\n\n## 18.1 工具\n\n正如我即将向你展示的，`curl`\
    \ 或 `wget` 命令足以测试 REST API。但这并不有趣。你绝对应该安装一个图形用户界面（GUI）来运行 HTTP 请求，以便分析外部 API 以及进行调试。我推荐\
    \ Postman (https://postman.com)，但 Swagger UI、Insomnia REST 客户端或 RapidAPI（以前称为\
    \ Paw，仅适用于 macOS）也是不错的选择。还存在各种浏览器扩展程序，可以在 Web 浏览器中试用 REST API。\n\n## 18.2 可试用的示例\
    \ API\n\n要练习使用 REST API，你需要一个练习场。在接下来的页面中，你可以找到一些可以免费试用的 API（尽管有些只是有限免费）：\n\n\
    - https://httpbin.org\n- https://restcountries.com\n- https://www.postman.com/explore\n\
    - https://apipheny.io/free-api\n- https://github.com/public-apis/public-apis\n\
    \n为了以直接的方式模拟真实的 API，你可以使用 *WireMock* (https://wiremock.org)。基本上，WireMock 是一个开源项目。但是，使用其关联的云服务仅在重大限制下免费，并且更针对希望在生产环境之外测试\
    \ API 的大型公司。\n\n## 18.3 实现自定义 REST API\n\n使用 Bash 或 PowerShell，实现你自己的 REST API\
    \ 几乎是不可能的。Python 的情况则不同，*Flask* 和 *Django* 是服务器编程中广泛使用的两个框架。可能的替代方案包括 *FastAPI*、*Pyramid*\
    \ 或 *Bottle*。然而，设计和实现 API 都远远超出了本书的范围，本书的重点通常是简短的脚本。\n\n## 18.4 curl 和 wget\n\n\
    Linux 用户尤其熟悉 `curl` 和 `wget` 命令。这些命令主要用于在终端中下载文件。`curl` 默认显示下载文件的内容；但是，可以使用 `-o`（是字母“o”，不是数字“零”）将输出保存到文件。`wget`\
    \ 默认将文件保存到本地目录。如果文件名无法从 URL 中明确得知，则使用网站的默认主页文件名（通常是 `index.html`）。要在标准输出中显示文件，你应该使用\
    \ `-O`（同样是字母“o”）后跟所需的文件名，或使用 `-` 表示标准输出。\n\n```\n$ curl https://example.com/some/file.txt\
    \ -o file.txt\n$ wget https://example.com/some/file.txt\n```\n\n> **安装**\n在 Linux\
    \ 和 macOS 上，`curl` 默认可用。`wget` 可以使用常规的包管理工具安装（即 `apt/dnf/brew install wget`）。\n\
    Windows 的 `curl` 可以从 https://curl.se/windows 下载；`wget` 可以从 https://eternallybored.org/misc/wget\
    \ 下载。\n\n### 18.4.1 curl\n\ncurl 和 wget 默认执行 GET 请求，不需要身份验证。但是，这两个命令也可以上传本地数据（PUT/POST），支持各种身份验证类型等。在本节中，我将重点介绍\
    \ curl，并简要总结 REST 上下文中最重要的选项：\n\n- `-X` 或 `--request GET/POST/PUT...` 指定所需的请求类型（默认为\
    \ GET）。\n- `-H` 或 `--header 'txt'` 传递所需的 HTTP 头，例如 `-H \"Content-Type: application/json\"\
    `。如果需要多个头，可以重复使用该选项。`-H @file.txt` 从文件中读取头信息。\n- `-d` 或 `--data 'data'` 随请求发送指定的数据。对于\
    \ `--data`，有以下替代选项：`--data-binary`、`--data-raw` 和 `--data-urlencode`。在任何情况下，也可以通过\
    \ `@file` 从指定的文件中读取数据。\n- `-u` 或 `--user name:pw` 传递用户名和相应的密码。\n- `-n` 或 `--netrc`\
    \ 告诉 curl 从 `.netrc` 文件中读取登录信息。使用 `--netrc-file file.txt`，你可以选择指定该文件的不同位置。这两种变体都比通过\
    \ `-u` 传递密码更安全。\n- `--oauth2-bearer 'token'` 随请求发送指定的 Bearer 令牌。\n- `-L` 或 `--location`\
    \ 允许 curl 执行 HTTP 重定向。因此，如果服务器指示页面现在位于不同的位置，将遵循此重定向。\n- `-k` 或 `--insecure` 不检查\
    \ SSH 或 HTTPS 证书。（这不安全！）\n- `-v` 或 `--verbose` 在请求执行期间显示全面的调试信息。\n- `-I` 或 `--head`\
    \ 仅返回响应的头作为结果。例如，如果你只对 HTTP 状态码感兴趣，而对响应中的其他数据不感兴趣，此选项很方便。\n\n以下示例引用 https://httpbin.org。该网站的目的是测试\
    \ REST 工具或脚本。例如，对 `/headers` 地址的 GET 请求返回一个包含所有传输头的 JSON 文档：\n\n```\n$ curl https://httpbin.org/headers\
    \ -H 'myheader1: lorem' \\\n                           -H 'myheader2: ipsum'\n\
    \n{\n  \"headers\": {\n    \"Accept\": \"*/*\",\n    \"Host\": \"httpbin.org\"\
    ,\n    \"Myheader1\": \"lorem\",\n    \"Myheader2\": \"ipsum\",\n    \"User-Agent\"\
    : \"curl/8.0.1\",\n    \"X-Amzn-Trace-Id\": \"Root=1-64228236-74fe...\"\n  }\n\
    }\n```\n\n在第二个示例中，你首先创建一个名为 `mydata.json` 的小型本地 JSON 文件。然后，你使用 PUT 将此文件传输到 `/put`\
    \ 地址。网站会响应发送的数据，因此你可以检查一切是否正常：\n\n```\n$ cat > mydata.json << EOF\n{\n    \"firstName\"\
    : \"John\",\n    \"lastName\": \"Doe\"\n}\nEOF\n```\n\n```\n$ curl -X PUT https://httpbin.org/put?para=123\
    \ -d @mydata.json \\\n      -H \"Content-Type: application/json\"\n```\n\n```\n\
    {\n    \"args\": {\n        \"para\": \"123\"\n    },\n    \"data\": \"{ \"firstName\"\
    : \"John\",  \"lastName\": \"Doe\"}\",\n    \"json\": {\n        \"firstName\"\
    : \"John\",\n        \"lastName\": \"Doe\"\n    }, ...\n}\n```\n\n出于调试目的，一种常用的方法是在\
    \ GUI 中编译请求。在最后一个示例中，你将测试基本身份验证。在此测试中，你使用 `/basic-auth/name/pw` 指定登录数据。然后，网站检查此数据是否与\
    \ `-u 'name:pw'` 中的数据匹配。使用 `-I`，将显示响应的状态码：在第一种情况下，状态码为 200（身份验证成功）；在第二种情况下，状态码为\
    \ 401（身份验证失败）。\n\n```\n$ curl -X GET \"https://httpbin.org/basic-auth/maria/topsecret\"\
    \ \\\n      -u 'maria:topsecret' -I\n\nHTTP/2 200\n```\n\n```\n$ curl -X GET \"\
    https://httpbin.org/basic-auth/maria/topsecret\" \\\n      -u 'maria:wrong' -I\n\
    \nHTTP/2 401\n```"
