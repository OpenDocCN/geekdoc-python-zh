    # 1.2.4 Many Similarities, Even More Differences


    Describing *three* scripting languages in one book is admittedly an intellectual
    challenge—for the author as well as for you, the reader! Of course, all three
    languages are characterized by many similarities, especially true Bash and PowerShell.
    At the same time, however, countless syntactic variations can make rapid switching
    between languages tedious. Thus, one tip: You should use an editor that supports
    the respective scripting language well because then the editor will detect most
    errors or syntax mix-ups before your first test runs.


    # 1.3 The Agony of Choice


    If you''re just entering the world of scripting, you''d probably prefer it if
    I would tell you now, "Learn language Xxx, it''s good for everything." Unfortunately,
    the IT world is not that simple. Which scripting language is the most suitable
    or the ideal solution for you depends greatly on the task and the operating system
    on which your script is supposed to run, for instance:


    +   - For scripts to administer Windows computers and networks, PowerShell is
    definitely the best choice. Many Windows-specific functions are best controlled
    by PowerShell''s own commands and modules.

    - Similarly, Bash (or, almost equivalently, Zsh) is the ideal language if you
    want to run administrative scripts on Linux machines or servers and on macOS.

    - For tasks that are platform-independent and do not depend on operating system-specific
    libraries, PowerShell, Bash, and Python are equally suitable. In that case, I
    pragmatically recommend the language you know best or whose environment (commands,
    extension modules) you know best.

