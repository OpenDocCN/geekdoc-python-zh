- img_proc: true
  md: '> **Internal Affairs**

    The repository directory—in our case, `git\test1234\`—reflects the current state
    of your project. Old versions of your code as well as other internal data (a kind
    of “Git database” for your project) are hidden in the `.git` subdirectory. These
    compressed files have names that are composed of hexadecimal characters. You should
    use only the `git` command to edit or read your repository. Do not touch the `.git`
    subdirectory!


    # 14.1.3 The First Commit


    The work you do now takes place in the directory of the repository—in the logic
    of this example, in `git\test1234\`. If you use Visual Studio Code (VS Code),
    you must open this directory. Let’s assume you create three new scripts in this
    directory: `script1.ps1` to `script3.ps1`.


    At the end of the day—or when you’ve reached a satisfactory intermediate state
    to take a break—you’ll want to add these three scripts to the Git repository.
    To put it a little more precisely: You want to store a copy of these files in
    their current states in the Git database and then synchronize these changes with
    the external repository on GitHub. This process requires three steps or three
    commands, all of which must be run in the repository directory (`git\test1234`,
    in this example):


    ```

    > git add script1.ps1 script2.ps1 script3.ps1


    > git commit -m ''script1 to script3: basic functions work''


    [main cd35ac9] script1 to script3: basic functions work

    3 files changed, 3 insertions(+)

    create mode 100644 script1.ps1

    create mode 100644 script2.ps1

    create mode 100644 script3.ps1


    > git push


    Writing objects: 100% (5/5), 399 bytes | 199.00 KiB/s, done.

    To github.com:MichaelKofler/test1234.git

    015ed58..cd35ac9  main -> main

    ```


    Let’s start with `git add`. This command does two things: First, Git now knows
    that these files belong to the project and are under version control. Second,
    Git stores the current state of these files in the local Git database (i.e., in
    the `.git` directory).


    `git commit` generates a commit that saves the current status of the project—all
    changes marked up to the time of `git add`—in a kind of intermediate release.
    The *message* passed with `-m` usually contains a short description of the last
    changes made. Also, `git`'
