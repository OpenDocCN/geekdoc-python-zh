- md: "## 8.1.7 tr\n\ntr (for *translate*) replaces individual characters in a text\
    \ with others. tr works purely based on characters, and so cannot replace words.\
    \ The -d (*delete*) option eliminates the characters in question. The following\
    \ three examples illustrate how tr works:\n\n```\n# replace . with ,\n$ tr '.'\
    \ ',' < in.txt > out.txt\n\n# replace lowercase letters with uppercase letters\n\
    $ tr \"a-zäöü\" \"A-ZÄÖÜ\" < in.txt > out.txt\n\n# eliminate German special characters\
    \ without replacement\n$ tr -d \"äöüßÄÖÜ\" < in.txt > out.txt\n```\n\nOf course,\
    \ tr can also be used as a filter. The following command returns the first and\
    \ last names and email addresses of all Texas-based employees, with the columns\
    \ separated by the : character. Previously, the columns were separated by a ;:\n\
    \n```\n$ grep ';TX;' employees.txt | cut -d ';' -f 1,2,9 | tr ';' ':'\n\nMae:van\
    \ Diedenhoven:mae5561@emailgroups.net\nNancee:Coleman:nancee_coleman4689@150ml.com\n\
    Mitch:Matse:matse2138@theinternetemail.com\n...\n```\n\n## 8.1.8 awk and sed\n\
    \nIn addition to the commands presented so far, each of which is easy enough to\
    \ use on its own and which only enhance their versatility in combination, the\
    \ Unix ecosystem also provides much more complex commands to choose from. The\
    \ awk tool developed by developers Alfred V. Aho, Peter J. Weinberger, and Brian\
    \ W. Kernighan is a custom scripting language for editing and analyzing text.\
    \ The sed stream editor is at least as versatile.\n\nAlthough there is not enough\
    \ space in this book for a detailed treatment of these programs, I would like\
    \ to introduce `awk` and `sed` briefly, at least through an example.\n\nRemember\
    \ our earlier `grep` example from Section 8.11, `grep 1985 employees.txt`? It\
    \ filters all lines from the text file that contain the `1985` string at any position.\
    \ However, we actually wanted only those hits where the date of birth was 1985,\
    \ that is, those hits which contain 1985 in the third column. It is difficult\
    \ to formulate such a search condition using `grep`. For `awk`, on the other hand,\
    \ this scenario is no problem. In this case, the `-F` option specifies the column\
    \ separator. `$3` refers to the third column. This column must contain the search\
    \ term specified between `//`:\n\n```\n$ awk -F ';' '$3 ~/1985/' employees.txt\n\
    \nDorthea;Mckinney;1985-06-02;915 Field Divide;...\nKandi;Meester;1985-01-27;424\
    \ Smith Vale;...\n...\n```\n\nIf you need to perform this kind of task frequently,\
    \ learning the `awk` syntax is worthwhile. Various tutorials on the internet,\
    \ but we recommend the example-oriented tutorial at https://linuxhandbook.com/awk-command-tutorial.\n\
    \n`sed` also provides similar functions as `awk`. An example of using `sed` is\
    \ provided in Chapter 9, Section 9.3, where I will show you how to use `sed` to\
    \ search for patterns in a text file using regular expressions and to replace\
    \ found text with other expressions.\n\n## 8.2 Example: Statistical Data Analysis\n\
    \nYou probably thought to yourself, looking at the examples in the previous section,\
    \ “If I just need to sort some contact data, I’ll use Excel to do it. That’s easier.”\
    \ Of course, that’s how I do it, although I prefer it even more if the data is\
    \ stored in a database and I can use SQL. The examples had the sole purpose to\
    \ show you the application options of `grep`, `cut`, `sort`, `uniq`, and so on\
    \ with easy-to-understand data.\n\nFrom now on, it’s all about examples that are\
    \ closer to everyday scripting. I will start with the evaluation of a CSV file\
    \ from https://ourworldindata.org/energy with public data on energy production\
    \ and consumption. The following lines show the basic structure of the file:\n\
    \n```\ncountry,year,iso_code,population,...,energy_per_capita,...\n...\nChina,2020,CHN,1424929792,...,29133.936,...\n\
    China,2021,CHN,1425893504,...,30768.826,...\nChina,2022,CHN,1425887360,...,31051.480,...\n\
    Germany,2022,DEU,83369840,...,40977.492...\nUnited States,2022,USA,338289856,...,78754.273...\n\
    ...\n```\n\nThe file is approximately 8 MB in size and contains 22,000 lines of\
    \ data from 125 years and from 222 countries or regions. More than 120 columns\
    \ provide information about every conceivable aspect of energy use and production.\
    \ Let’s concentrate on the first three columns and column 32 (energy_per_capita)\
    \ with the primary energy consumption per capita and year in kilowatt hours. According\
    \ to the example rows shown earlier, this consumption amounted in 2022 to approximately\
    \ 31,000 kWh in China, approximately 41,000 kWh in Germany, and almost 79,000\
    \ kWh in the United States.\n\n### 8.2.1 Data Extraction via Script\n\nThe task\
    \ of the following script is to download a CSV file from the internet, save it\
    \ locally, and then extract the per capita energy consumption for a specific country\
    \ for 1 year:\n\n```\n./get-energy-consumption.sh GBR 1999\nPrimary energy consumption\
    \ per person\nfor United Kingdom in 1999: 45017.871 kWh/a\n```\n\nIf too few or\
    \ too many parameters are passed or if the script does not find a suitable data\
    \ set, an error message is displayed, such as the following:\n\n```\n./get-energy-consumption.sh\
    \ GBR\nUsage: get-energy-consumption <countrycode> <year>\nExample: get-energy-consumption\
    \ FRA 2021\n./get-energy-consumption.sh GBR 2040\nSorry, no data found for GBR\
    \ 2040.\n```\n\nThe full code looks as follows:\n\n```\n#!/bin/bash\n# sample\
    \ file get-energy-consumption.sh\n# script expects two parameters\nif [ $# -ne\
    \ 2 ]; then\n  echo \"Usage: get-energy-consumption <countrycode> <year>\"\n \
    \ echo \"Example: get-energy-consumption FRA 2021\"\n  exit 2\nfi\n# download\
    \ file if not yet locally saved\nif [ ! -f owid-energy-data.csv ]; then\n  wget\
    \ https://nyc3.digitaloceanspaces.com/owid-public/data/energy/owid-energy-data.csv\n\
    fi\n# remove not needed columns, filter lines,\n# use last line if result has\
