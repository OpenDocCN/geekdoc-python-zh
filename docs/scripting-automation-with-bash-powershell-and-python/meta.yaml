    \ centrally every month. The goal of the script is to extract these eight titles\
    \ as well as the links to their detail pages.\n\nTo navigate within the HTML code,\
    \ you must open the website in a web browser and activate the development tools\
    \ there. With just a few mouse clicks, you can then"
