  - '[PAGE 398]


    # 17.6 Web Scraping with Requests-HTML


    With some websites, the devil is in the details. When viewing the page in a web
    browser, you can see the finished HTML code and probably would not expect any
    problems. But when you try to process the same page as a DOM, important components
    are suddenly missing. (You can also try just downloading the page via `curl`.
    Then, compare the downloaded code with the HTML code you see in the browser.)


    The reason for this strange behavior has to do with JavaScript: Many modern websites
    deliver a half-finished HTML document. Portions of the page are only completed
    in the web browser through the local execution of embedded JavaScript code.


    For this type of webpage, you cannot simply download the HTML document; the JavaScript
    code it contains must also be executed by Python. To make this work, you must
    use the much more powerful `requests-html` module instead of the `requests` module.
    As usual, this module must be installed in advance via pip, with the following
    commands:


    ```

    $ pip install requests-html (Windows, Linux)

    $ pip3 install requests-html (macOS, old Linux distributions)

    ```


    The following lines show the application of the module:


    ```

    from requests_html import HTMLSession

    url = "https://www.githubstatus.com/"

    session = HTMLSession()

    # download HTML code including JavaScript

    response = session.get("https://example.com")

    # run embedded JavaScript code

    response.html.render()

    ```


    The first time `render` is run, a local copy of Chromium is downloaded. (The download
    is larger than 100 MB, so it takes a while.) Chromium then takes care of processing
    the JavaScript code and, fortunately, also works without a problem on Windows.
    However, Chromium must be run again with every script start, which noticeably
    delays the `render` call. You should therefore use `render` only when truly necessary!


    # 17.6.1 Example: Analyzing the GitHub Status


    On the `https://www.githubstatus.com` page, the GitHub company summarizes the
    current status of its services. The goal of this example is to read this status
    information into a dictionary. At first glance, the task looks straightforward.


    However, the finished HTML code is only generated on the client side by JavaScript.
    Web scraping does not work until you load the page via the Requests-HTML module
    and run it using `render`.'
