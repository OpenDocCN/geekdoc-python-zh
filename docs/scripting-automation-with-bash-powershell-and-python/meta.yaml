  md: 'All commands in the following listing are to be executed on the Linux server
    and require root privileges on that server (hence, the # prompt character):


    ```

    $ sudo -s

    # addgroup imageupload

    # usermod -a -G imageupload username1

    # usermod -a -G imageupload username2

    # usermod -a -G imageupload username3

    # mkdir /var/www/html/wordpress/myimages

    # chown www-data:imageupload /var/www/html/wordpress/myimages

    # chmod 2775 /var/www/html/wordpress/myimages

    ```


    Finally, I assume that the users (username1, etc.) have uploaded their SSH keys,
    so scp works without an interactive login. Before you start developing the script,
    you should test it interactively, for example, as with the following command:


    ```

    $ scp tst.jpg username1@hostname:/var/www/html/wordpress/myimages

    ```


    # 12.5.2 Bash Script


    In this example, I first assume that the local machine is running Linux or macOS.
    For this case, the Bash script initializes some variables first. If the last-run
    file does not exist, it will be created in the current directory with a date of
    early 2000. This file serves as a reference for find, which only considers files
    that are newer. last-run is updated at the end of the script with the time when
    the script was started (the now file). This somewhat cumbersome procedure ensures
    that the script does not miss any files on the next run that were added exactly
    during the execution of find. Admittedly, this mistake is unlikely, but not impossible.


    The find command processes the *.png, *.jpg, and *.jpeg identifiers. If you want
    to include additional identifiers—if necessary also in uppercase notation—you
    must add further options in the form -o -name .... In this case, -o means a logical
    OR. -maxdepth 1 causes find not to search any subdirectories. Of course, you can
    omit this option. Note, however, that the directory structure is lost during the
    upload (i.e., all files end up directly in myimages). If you don''t want the directory
    structure to be lost, you should use rsync instead of scp.


    The -exec option calls the scp command for each file found and passes the filename
    instead of {}. This feature also works for filenames with spaces. \; specifies
    where the command for -exec ends.


    ```

    # Sample file upload-images.sh

    LOCALDIR=$(pwd)

    REMOTEDIR=/var/www/html/wordpress/myimages

    REMOTEHOST=hostname

    REMOTEUSER=username1

    ```'
