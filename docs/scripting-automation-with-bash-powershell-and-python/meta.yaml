    Unfortunately, in the Bash environment, the PCRE syntax is rarely an option. Many
    Unix tools are only POSIX compliant. In such cases, you must formulate the expression
    more precisely. In our example, you describe the inside of the HTML tag using
    `[^>]+` instead of `.+?`. Thus, all characters except `>` are allowed inside.
    The entire expression then reads `<[^>]+>`.


    > **Lazy Is Efficient**

    You may have always suspected it, but overeagerness rarely pays off. This cannot
    be said in such a general way for regular expressions, but in practice *lazy*
    expressions are often more efficient. This is especially true when a complex pattern
    is to be applied to a long string because then the number of possible cases and
    the volume of the text to be evaluated will decrease.


    > **Regular Expressions and HTML: A Bad Combination!**

    You should resist the temptation to analyze HTML code using regular expressions.
    This usually goes wrong because HTML is not a “regular” language (in the scientific
    sense). To analyze HTML documents, you should use parsers that understand HTML
    code and ideally make a Document Object Model (DOM) from HTML. In Python, for
    example, the `BeautifulSoup` module performs this task. Examples are provided
    in [Chapter 17](#).


    # 9.2.3 Alpha and Omega


    Until now, we have ignored the place where an expression is detected in the text.
    You can use the `^` and `$` characters to express that the pattern is recognized
    at the beginning or end of the text.


    | Expression | Meaning |

    | :--- | :--- |

    | x | The x expression may occur anywhere in the text. |

    | ^x | The expression must occur at the beginning of the text. |

    | x$ | The expression must occur at the end of the text. |

    | ^x$ | The expression must correspond to the entire text. |


