    Using `timeout <time> <command>`, you can execute a command with a given timeout.
    If the command takes longer than the expected time, the execution is aborted.
    The return value of `timeout` is 124 if a timeout occurs. The command knows some
    more special error codes (125, 126, 127, and 137; see `man timeout`). On the other
    hand, if `command` is terminated within the timeout, `timeout` returns the exit
    code of `command`. The following command tests whether a Git remote repository
    exists for the current branch (see also Chapter 14):


    ```

    timeout 30s git ls-remote

    ```'
  - '[PAGE 98]


    # Chapter 4


    # PowerShell


    The oldest “shell” for Windows is the `cmd.exe` program, often called the “command
    prompt.” `cmd.exe` represents the user interface (UI) of MS-DOS, the text-based
    predecessor of Microsoft Windows. Batch files (extension `*.bat`) allow simple
    script programming. However, `cmd.exe` is no longer a contemporary tool but a
    relic from the IT stone age.


    In 2006, Microsoft introduced the first version of *Windows PowerShell* as a powerful
    successor to `cmd.exe`. Meanwhile, we have reached version 7.n. The program also
    runs on Linux and macOS; because the shell is thus no longer Windows specific,
    its name has been simplified to *PowerShell*. PowerShell is *the* scripting tool
    in the Windows world today. The language is irreplaceable if you want to administer
    Windows-related functions (e.g., Microsoft 365 cloud setups or Microsoft Active
    Directory).


    The biggest technical achievement of PowerShell compared to other shells is its
    object-oriented approach. PowerShell commands do not return text, but real objects.
    This opens up completely new options for further processing. Compared to Bash,
    the syntax of PowerShell is much more logical (but still not always intuitive
    and in any case rather verbose and lengthy).


    In this chapter, I will give you a first impression of the basic functions of
    PowerShell. Numerous examples will then follow in the other chapters.


    > **Execution Policy**


    For security reasons, the execution of (unsigned) scripts is often prohibited
    on company computers. The reasons for this limitation and various setting options
    are described in [Section 4.5](#section-4.5).


    # 4.1 Installation


    PowerShell is preinstalled on current Windows versions, but rarely in its latest
    version. To find out the version of the installed PowerShell, you need to search
    for “Terminal” in the **Start** menu and run the program with the same name. (For
    older Windows versions, searching for *PowerShell* will get you there.)'
- md: "## 4 PowerShell\n\nIn the terminal, type `$PSVersionTable` and press `Enter`.\
    \ In response, you'll receive a table containing the key data of the PowerShell\
    \ version:\n\n```\n> $PSVersionTable\n\nName           Value\n----           -----\n\
    PSVersion      5.1.22000.1335\nPSEdition      Desktop\n...\n```\n\nThis result\
    \ was created on a Windows 11 machine in winter 2023. What's slightly perplexing\
    \ is the fact that PowerShell version 5.1 is used, which shipped in 2016. Is there\
    \ really no later version available?\n\nIn fact, when I wrote this chapter, version\
    \ 7.3 was the current version. However, with the jump from version 5.n to 7.n,\
    \ more than just the version number has changed:\n\n- PowerShell has had an open-source\
    \ license since version 6. The program is also available free of charge for other\
    \ operating systems.\n- Accordingly, the program name is no longer \"Windows PowerShell\"\
    \ but simply \"PowerShell.\"\n\nHowever, versions 5.n and 7.n are not fully compatible\
    \ with each other. Even though further development of version 5.n has long since\
    \ been discontinued, this version remains preinstalled for compatibility reasons.\n\
    \n![](img/a7fa45d496335c22ffb14c3275e24ffb_99_0.png)\n\n**Figure 4.1** Installing\
    \ the Current PowerShell Version\n\nFor this point onward, however, I assume that\
    \ you use the current PowerShell version. Although most of the commands and scripts\
    \ presented in this book also work with version 5.1, I tested my examples exclusively\
    \ with version 7.3. All scripts should also run with PowerShell 7.4, which is\
    \ on the horizon at the time of writing and will most likely be available as you’re\
    \ reading this book.\n\nSeveral ways to install PowerShell exist, but I recommend\
    \ you simply run the `winget install Microsoft.PowerShell` command in a terminal\
    \ or `cmd.exe`. `winget` is a relatively new component of Windows 10 and 11 that\
    \ simplifies package management.\n\nAs an alternative, you can download and run\
    \ an MSI package from `https://aka.ms/PSWindows`. Make sure you install the 64-bit\
    \ version (`PowerShell-7.n-win-x64.msi` file), not the 32-bit version (`PowerShell-7.n-win-x86.msi`)!\n\
    \nThe installation of version 7.n is done parallel to the existing version 5.1.\
    \ Subsequently, you can choose which version you want to use. After restarting\
    \ the terminal, notice the new entry: **PowerShell** (not **Windows PowerShell**,\
    \ which denotes version 5.1). The `$PSVersionTable` command, which simply displays\
    \ the contents of the `PSVersion` variable (and some other variables containing\
    \ information about the PowerShell version), should now return this result:\n\n\
    ```\n> $PSVersionTable\n\nName           Value\n----           -----\nPSVersion\
    \      7.3.1\nPSEdition      Core\n...\n```\n\n### 4.1.1 Installation on Linux\n\
    \nSince PowerShell is subject to an open-source license, Microsoft also provides\
    \ versions for other operating systems. The installation isn’t complicated at\
    \ all. I will focus in this section on the procedure on Ubuntu. The string at\
    \ `wget` must be specified without the `\\` character and without spaces in a\
    \ long line. `wget` downloads a small package that sets up a package source. From\
    \ this package source, Ubuntu then obtains the `powershell` package. The advantage\
    \ of this somewhat cumbersome procedure is that, in the future, you’ll automatically\
    \ receive the latest version of PowerShell as part of the usual updates.\n\n```\n\
    $ sudo apt update\n$ sudo apt install -y wget apt-transport-https \\\n       \
    \             software-properties-common\n\n$ wget -q \"https://packages.microsoft.com/config/ubuntu/\\\
    \n          $(lsb_release -rs)/packages-microsoft-prod.deb\"\n```\n\n```\n$ sudo\
    \ dpkg -i packages-microsoft-prod.deb\n$ sudo apt update\n$ sudo apt install -y\
    \ powershell\n```\n\nAfter the installation, you can start PowerShell in a terminal\
    \ window using the `pwsh` command. Instructions for installing PowerShell for\
    \ other distributions can be found at https://docs.microsoft.com/en-us/powershell/scripting/install/installing-powershell-on-linux.\n\
    \n### 4.1.2 Installation on macOS\n\nMany macOS machines used for software development\
    \ have the *Homebrew* package management system installed (see also https://brew.sh).\
    \ If Homebrew is installed, the PowerShell installation succeeds with the following\
    \ simple command in the terminal:\n\n```\n$ brew install --cask powershell\n```\n\
    \nAlternatively, you can download a *.pkg file with the latest PowerShell version\
    \ from https://docs.microsoft.com/en-us/powershell/scripting/install/installing-powershell-on-macos.\n\
    \nDouble-clicking this file starts the installation process; 30 seconds later\
    \ everything is done. Now, you can start PowerShell in a terminal window using\
    \ the `pwsh` command, just like on Linux.\n\n### 4.1.3 Limitations of PowerShell\
    \ on Windows versus Linux/macOS\n\nEven though PowerShell realizes many good ideas,\
    \ the longing of Linux or macOS users for yet another shell is limited. The choice\
    \ has already been pretty large.\n\nThe main problem with using PowerShell outside\
    \ of Windows is that a much smaller number of commands are available to choose\
    \ from. Using `Get-Command`, you can get a list of all commands. (Strictly speaking,\
    \ the commands are cmdlets, functions, etc., which I will describe in more detail\
    \ later in Section 4.3.) `Measure-Object` enables you to count the number of commands.\
    \ The following listing summarizes the results determined on Windows, Linux, and\
    \ macOS:\n\n```\n> Get-Command | Measure-Object\n    Count: 1953    (Windows 11\
    \ Pro)\n    Count: 273     (Linux/macOS)\n    ...\n```\n\nNotice how much smaller\
    \ the number of commands is on Linux and macOS. This limitation has to do with\
    \ the fact that many PowerShell commands perform Windows-specific tasks, such\
    \ as setting up a new Windows user. Such commands would not make sense on Linux\
    \ or macOS. In general, the infrastructure on Windows is quite different. On Linux\
    \ and macOS, there are no *scheduled jobs*, no *Common Information Model (CIM)*,\
    \ no *Windows Management Instrumentation (WMI)*, and so on. (Linux and macOS have\
    \ comparable functions, of course, but they are implemented quite differently.)\
    \ For this reason, some of the examples presented in this book do *not* work on\
    \ Linux or macOS.\n\nBut no reason to bury your head in the sand! PowerShell provides\
    \ the option to install extension modules. Many modules have functions that are\
    \ equally suitable on Windows, Linux, and macOS, for instance, for the administration\
    \ of external services such as Amazon Web Services (AWS).\n\nIn conclusion, PowerShell\
    \ scripts for Windows administration do not work on Linux and macOS because the\
    \ commands and underlying software foundation are missing. However, scripts that\
    \ perform general, non-Windows-focused tasks and access modules in the process\
    \ can very well be developed for cross-platform scenarios.\n\n### 4.1.4 Configuration\n\
    \nAt first, rarely will you need to configure PowerShell. However, once you gain\
    \ some experience using PowerShell, you may want certain functions or command\
    \ shortcuts (called *aliases*) to be defined when PowerShell is started, modules\
    \ to be loaded automatically, and so on. The right place for such customization\
    \ is the *profile file*, whose path is stored in the `$PROFILE` variable (spread\
    \ across two lines in this book only for space reasons):\n\n```\n> $PROFILE\n\
    C:\\Users\\kofler\\Documents\\PowerShell\\\n    Microsoft.PowerShell_profile.ps1\n\
    ```\n\nTo modify the file, a best practice is to launch the editor directly in\
    \ PowerShell:\n\n```\n> notepad $PROFILE    (Notepad.exe)\n> code $PROFILE   \
    \    (Visual Studio Code, if installed)\n```\n\n## 4.2 Windows Terminal\n\nIn\
    \ the introduction to this section, I asked you to run a terminal to find out\
    \ the PowerShell version. This instruction may have seemed contradictory to you.\
    \ So, what is the difference between PowerShell and Terminal, and how are the\
    \ two programs related?\n\nThe terminal is a program that can run different shells.\
    \ Windows-compatible shells include the deprecated command prompt (*cmd.exe*),\
    \ Windows PowerShell 5.*n*, PowerShell 7.*n*, Azure Shell, and Git Bash as well\
    \ as Linux’s Bash via the *Windows Subsystem for Linux (WSL)*.\n\nThe terminal’s\
    \ job is simply to accept your keyboard input, pass it to the active shell, and\
    \ then display the shell’s result as text. Besides that, the terminal fulfills\
    \ a few more functions that only play a minor role for us."
