    \ continue\n    fullname = os.path.join(startdir, filename)\n    if os.path.isfile(fullname):\n\
    \        print('PDF file: ', fullname)\n```\n\n## 5.13 函数\n\nPython 提供了两种定义自定义函数的方式：你可以使用\
    \ `def` 关键字引入普通函数。或者，你可以定义并立即应用所谓的 *lambda 函数*，开销很小。让我们从普通函数开始。\n\n函数的定义以 `def`\
    \ 关键字开头。该关键字后面是函数名，其命名规则与变量名相同。参数必须用括号括起来。\n\n```python\ndef myfunc(para1, para2,\
    \ para3):\n    code\n```\n\n编程和使用函数的一些规则包括：\n\n- 函数必须先定义才能使用。因此，常见的做法是先定义所有函数，然后再编写其余代码。这样，代码的执行就从*不*属于函数定义的第一行开始。\n\
    - 函数可以使用 `return` 提前退出。`return` 的使用是可选的。如果你使用 `return`，函数可以返回一个结果，甚至可以是列表、元组等形式。通过这种方式，函数可以轻松返回*多个*值。\n\
    \n在下面的迷你程序中，首先定义了两个函数，然后调用它们来演示函数的基本处理：\n\n```python\ndef f1(x, y):          \
    \ # function without result\n    print('Parameter 1:', x)\n    print('Parameter\
    \ 2:', y)\n\ndef f2(x, y):           # function with result\n    return x + y\n\
    \n# here begins the actual code execution\nf1(2, 3)    # outputs the parameters\n\
    # Output: Parameter 1: 2\n#         Parameter 2: 3\n\nn = f2(4, 5)\nprint(\"Result:\"\
    , n)\n# Output: Result: 9\n```\n\n### 5.13.1 全局变量和局部变量\n\n函数可以读取（但不能修改）在函数外部定义的变量：\n\
    \n```python\ndef f1():\n    print(x)\n\nx = 3\nf1()  # Output 3\n```\n\n相反，在函数内部初始化的变量——即位于赋值语句左侧的变量——被认为是*局部*的：它们只能在函数内部使用。如果函数内部的变量与函数外部的变量同名，此规则同样适用。\n\
    \n```python\ndef f1():\n    y = 5\n    print(y)    # Output 5\n\nf1()\nprint(y)\
    \        # Error, y is not defined!\n```\n\n如果你想在函数内部更改在函数外部初始化的变量，那么你必须在函数内部将该变量标记为\
    \ `global`。严格来说，你是在声明该函数不应将 z 视为局部变量，而应视为来自程序*全局作用域*的变量。\n\n```python\ndef f1():\n\
    \    global z\n    z = z + 3\n\nz = 3\nf1()\nprint(z)        # Output 6\n```\n\
    \n在实践中，你应该避免使用 `global` 关键字，因为它会导致代码混乱。更好的方法是通过 `return` 返回函数结果，然后保存它：\n\n```python\n\
    def f1(x):\n    return x + 3\n\nz = 3\nz = f1(z)\nprint(z)    # Output 6\n```\n\
    \n### 5.13.2 参数\n\n参数用于向函数传递数据。在内部，参数的行为类似于局部变量。因此，名为 x 的参数与在函数外部定义的同名变量完全独立。\n\
    \n在函数参数中传递数据的规则与变量赋值（第 5.9.3 节）相同。因此，对于不可变数据类型，通过函数更改数据是不可能的（参见前面的例子）。\n\n对于可变数据类型，可以更改对象、列表、集合等的内容。在下面的例子中，函数向列表添加一个元素：\n\
    \n```python\ndef f1(x):\n    x.append(3)\n\nx = [1, 2]\nf1(x)\nprint(x)    # Output\
    \ [1, 2, 3]\n```\n\n### 5.13.3 可选参数\n\n你可以使用 `para=default` 为参数定义默认值。同时，该参数将变为可选参数。所有可选参数必须指定在参数列表的末尾。\n\
    \n为了使具有多个可选参数的函数调用更易于管理，函数参数也可以使用 `name=value` 表示法传递。使用命名参数创建函数调用还有一个优点，即你不需要遵循参数的顺序，因此代码可读性更强。\n\
    \n```python\ndef f(a, b, c=-1, d=0):\n    print(a, b, c, d)\n\nf(6, 7, 8, 9) \
    \     # Output 6 7  8 9\nf(6, 7, 8)         # Output 6 7  8 0\nf(a=6, b=7, d=9)\
    \   # Output 6 7 -1 9\nf(d=9, b=7, a=6)   # Output 6 7 -1 9\nf(6, 7)         \
    \   # Output 6 7 -1 0\nf(6, 7, d=3)       # Output 6 7 -1 3\nf(6)            \
    \   # Error, b is missing\nf(b=6, c=7)        # Error, a is missing\n```\n\n###\
    \ 5.13.4 可变数量的参数\n\n如果你以 `*para` 或 `**para` 格式定义一个参数，那么该参数将接受任意数量的值。使用 `*para`\
    \ 时，这些参数随后作为元组可用；使用 `**para` 时，作为字典可用。`**para` 参数*必须*作为命名参数传递。\n\n```python\n\
    def f(a, b, *c):\n    print(a, b, c)\n\nf(1, 2, 3)            # Output 1 2 (3)\n\
    f(1, 2, 3, 4)         # Output 1 2 (3, 4)\nf(1, 2, 3, 4, 5, 6)   # Output 1 2\
    \ (3, 4, 5, 6)\n```\n\n如果你想传递给函数的数据在列表、元组或其他可枚举的数据结构中，调用函数时也允许使用 `function(*list)`\
    \ 表示法。通过这种方式，列表的元素将自动分配给参数：\n\n```python\nl = [1, 2, 3, 4, 5, 6]\nf(*l)      \
    \          # Output 1 2 (3, 4, 5, 6)\n```\n\n### 5.13.5 Lambda 函数\n\n你可以使用自定义函数，原因有两个：一方面，将复杂的代码分解成易于管理的块；另一方面，因为你希望在代码的不同位置执行特定任务，从而避免冗余代码。然而，有时你需要第三种变体。\n\
    \n在代码的*某*个位置——例如，在 `map` 语句中、在 `filter` 语句中，或用于编写回调函数——你需要一个通常相当简单的函数。创建临时函数的传统方式很繁琐：你必须先使用\
    \ `def` 定义函数，然后只使用该函数一次。\n\n在这种情况下，lambda 函数代表了一种节省空间且更清晰的替代方案：函数可以临时定义，同时立即在代码中的该点使用。由于这些函数根本没有分配任何名称，lambda\
    \ 函数也被称为*匿名函数*。\n\n以下行包含定义 lambda 函数的语法。`lambda` 关键字后面首先是函数的参数，然后是冒号，最后是函数表达式。与其他函数相比，一个主要的限制是\
    \ lambda 函数只能由单个表达式组成。\n\n```python\nlambda var1, var2, var3, ...: expression\n\
    ```\n\n以下迷你程序演示了两个 lambda 函数的使用：第一个 lambda 表达式识别能被 3 整除的数字，并使用此标准将元素包含在 `lst2`\
    \ 中。第二个 lambda 表达式应用于 `lst2` 的所有元素，将整数除以 3。结果列表最终存放在 `lst3` 中。\n\n```python\n\
    lst1 = [1, 2, 3, 9, 345, 36, 33]\n# lst2 contains all elements of lst1 divisible\
    \ by 3\nlst2 = list(filter(lambda x: x % 3 == 0, lst1))\nprint(lst2)    # Output\
    \ [3, 9, 345, 36, 33]\n# divide all elements of lst2 by 3\nlst3 = list(map(lambda\
    \ x: x // 3, lst2))\nprint(lst3)    # Output [1, 3, 115, 12, 11]\n```"
