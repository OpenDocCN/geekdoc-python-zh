    # Chapter 13

    Visual Studio Code


    *Visual Studio Code* (*VS Code*), sometimes simply *Code*, is currently the most
    universally popular editor for software developers. The strengths of this program
    developed by Microsoft include support for all conceivable programming languages
    and platforms, a huge range of extensions, comprehensive configuration options,
    and excellent integration with the Git version management system.


    Although VS Code is by no means the only editor in my everyday work environment,
    I wouldn''t want to miss out on its strengths. From the perspective of this book,
    VS Code scores points for its consistency of use, whether you work on a Bash,
    Python, or PowerShell script. This is an advantage compared to dedicated development
    systems such as *PyCharm* for Python, for example, where you must memorize different
    working techniques and keyboard shortcuts.


    An introduction to VS Code seems superfluous in this book as you probably already
    know about the editor. If not, you can find loads of tutorials and videos on the
    internet to get you started. This short chapter focuses instead on the scripting-specific
    features of VS Code—in particular, the Bash, PowerShell, Python, and Remote –
    SSH extensions.


    > **Prerequisites for This Chapter**

    You can read this chapter separately from the rest of the book. However, using
    the remote SSH extension requires that you''re familiar with SSH (see [Chapter
    12](#)).


    # 13.1 Introduction


    Installing VS Code on Windows and macOS is quite easy. Simply download the installation
    program or the corresponding ZIP file from [https://code.visualstudio.com/download](https://code.visualstudio.com/download).
    On Windows, run the program; on macOS, you must move the editor from the ZIP archive
    to the *Programs* folder.


    For Linux, Microsoft provides Debian and RPM packages. When you install the Debian
    package, a package source gets automatically set up so that you''ll also receive
    updates for VS Code as part of the system updates in the future. If, on the other
    hand, you run Fedora, openSUSE or a Red Hat compatible distribution, you''ll have
    to take care of the updates yourself. To do this, you should visit the download
    page once every few months, download the latest version of the RPM package, and
    repeat the installation.'
  - '[PAGE 341]


    If you use Arch Linux, you can install VS Code as an AUR package, which allows
    you to choose between an Arch Linux variant or the official Microsoft binary.
    The best way to do this is to use an AUR helper, such as `yay`. If you do, then
    the VS Code installation will succeed by using `yay -S code-git` or `yay -S visual-studio-code-bin`.


    # 13.1.1 Comparing VS Code, VSCodium, and Visual Studio


    Although the code for VS Code is subject to an open-source license and is located
    in a public GitHub repository, the binary version offered for download by Microsoft
    is subject to a different license and contains telemetry functions. If these functions
    bother you, search for “Telemetry” in the settings and disable the corresponding
    options.


    If you’re unhappy with the license for the VS Code downloaded from Microsoft or
    you’re generally suspicious, you can install the *VSCodium* variant instead (see
    also https://vscodium.com). VSCodium uses the same GitHub code as VS Code, but
    the telemetry features are disabled, the program has a different icon, and the
    liberal MIT license applies to its use.


    VS Code or VSCodium have nothing (or at least very little) to do with the *Visual
    Studio* development environment. This commercial Microsoft product is specifically
    designed for developing programs in C#, C++, and Visual Basic.


    # 13.1.2 Think in Terms of Directories, Not Files!


    In traditional editors like Notepad++, you can simply open files from any location
    and edit them. While this access is also possible in VS Code, it is not the ideal
    way of working. In VS Code, you open a directory via **File • Open Folder**. The
    files contained therein will then be displayed in the sidebar and can be opened
    and edited by double-clicking them.


    Why is the directory paradigm of VS Code so important? VS Code provides extensions
    for most programming languages. In this way, VS Code can “understand” your code
    better and supports you during input. At the same time, scripts can be run directly
    from the editor via a **Run** button. The active directory is then the directory
    last opened in VS Code, not the directory where the script file is located!


    Let’s suppose you have developed a script that opens and processes a CSV file
    located in the same directory. However, when running the script, an error occurs
    because the script does not find the file. If this error arises, you have fallen
    into the VS Code directory trap. The solution is pretty straightforward: Either
    run the script manually where the easiest way is in the terminal section of VS
    Code or, even better, use **File • Open Folder** to change to the directory where
    your script is located.


    VS Code’s preference for directories may force you to question specific ways of
    working. Editing scripts that are scattered across countless directories is tedious
    in VS Code. On the other hand, it’s probably a good idea to place scripts that
    are related in content in one directory anyway.'
- md: "## 13.2 Language-Specific VS Code Extensions\n\nAs soon as you edit a PowerShell\
    \ or Python file in VS Code for the first time, the editor asks you whether it\
    \ should install the corresponding extension(s). You should always follow this\
    \ recommendation! VS Code then performs syntax highlighting, completes keywords,\
    \ indents your code correctly, and helps test and debug your scripts.\n\n### 13.2.1\
    \ PowerShell Extension\n\nThe most interesting features of the PowerShell extension\
    \ include the following:\n\n- **Run button**\n  The toolbar of VS Code contains\
    \ two **Run** buttons. One of them runs your script, while the other button runs\
    \ only the previously marked lines of code.\n- **Navigation**\n  By pressing `Ctrl`\
    \ while clicking, you can navigate directly to the definition of the variable\
    \ or function under the mouse cursor.\n- **PSScriptAnalyzer**\n  This tool analyzes\
    \ your code for obvious weaknesses or violations of *best practices*. The tool\
    \ also takes care of indenting your code. After major rebuilds, you can restore\
    \ the correct indentations using `Ctrl` + `A` and then `Ctrl` + `I`.\n- **Debugging\
    \ functions**\n  This feature helps you to debug PowerShell scripts. You can find\
    \ relevant instructions at *https://devblogs.microsoft.com/scripting/debugging-powershell-script-in-visual-studio-code-part-1*.\n\
    \n### 13.2.2 Python Extension\n\nThe active Python extension makes entering Python\
    \ code really fun. VS Code automatically performs syntax checking, helps with\
    \ code indentation, and completes the names of installed modules as well as the\
    \ functions in imported modules. You can collapse comments and functions and view\
    \ an overview if a script does run out of time.\n\nUsing what are called *refactoring\
    \ functions* can help you restructure your code later. For example, if you rename\
    \ a variable or function by pressing `F2`, VS Code automatically implements this\
    \ change in all places in the code.\n\nVS Code displays the number of the Python\
    \ version installed on the computer in the bottom-right corner of the status bar.\
    \ If you have multiple installations, you can select the version you want to use\
    \ for code execution by clicking on the version number. (I strongly advise against\
    \ having parallel installations, though, because they often cause trouble with\
    \ module management and pip!)\n\nOn macOS and Windows, VS Code will also help\
    \ you to install Python, especially if it cannot find a Python interpreter. I’m\
    \ sure that’s well-intentioned, but a better approach is to perform the Python\
    \ installation by yourself. In this way, you can keep control over your Python\
    \ installations and avoid multiple installations.\n\n![](img/a7fa45d496335c22ffb14c3275e24ffb_343_0.png)\n\
    \nFigure 13.1 Visual Studio Code with the Python Extension\n\n### 13.2.3 Bash/Shell\
    \ Extensions\n\nUnlike PowerShell and Python, no definitive VS Code extension\
    \ exists for Bash scripts. VS Code also does not take the initiative and offer\
    \ to install an extension when you write a Bash or Zsh script. Nevertheless, some\
    \ extensions can make your life as a Bash developer easier. It’s up to you which\
    \ you install. (If you search for “bash” or “shell” in the **Extensions** sidebar,\
    \ you’ll find even more extensions, but some are of questionable benefit).\n\n\
    Some common extensions include the following:\n\n- *Bash Debug* helps with debugging\
    \ Bash scripts.\n- *shellman* is aimed specifically at Bash beginners and helps\
    \ with entering Bash structures, such as *if* or *for*.\n- *ShellCheck* analyzes\
    \ your code and suggests syntactic improvements and corrections. Personally, though,\
    \ I find the tool too picky and not configurable enough.\n- *Code Runner* adds\
    \ a button for the direct execution of shell scripts to the VS Code toolbar.\n\
    \n## 13.3 Remote – SSH Extension\n\nThe biggest drawback of VS Code is its graphical\
    \ user interface (GUI). This statement may seem absurd to you: After all, you\
    \ use VS Code precisely because of how its intuitive operations and its many functions\
    \ are elegantly integrated into its UI. As long as you work locally, that is,\
    \ as long as your scripts are on your laptop, the benefits of VS Code really do\
    \ come into their own.\n\nHowever, in everyday scripting, you’ll often write scripts\
    \ that run on external servers or in virtual machines. Often, only a SSH connection\
    \ exists to these computers or servers, and you must work in text mode. Linux\
    \ fans then mostly rely on editors such as *vi* or *Emacs*, which unlock their\
    \ full functionality in text mode and therefore remain applicable even in an SSH\
    \ session. (Personally, I mostly use *jmacs* or *zile* in such cases. These minimalist\
    \ editors are Emacs compatible in their basic commands.)\n\nHowever, I don’t blame\
    \ you if you don’t feel like learning the countless keyboard shortcuts for these\
    \ dinosaurs from the Unix past. Instead, I want to present to you an elegant alternative:\
    \ You can also use VS Code through an SSH connection to edit code on another machine!\
    \ This method of operation is associated with certain limitations, but in principle,\
    \ it works great.\n\n### 13.3.1 Applying the Remote – SSH Extension\n\nTo combine\
    \ VS Code with SSH, you must install the *Remote – SSH* extension developed by\
    \ Microsoft. You should also copy your SSH public key to the remote machine (`ssh-copy-id`,\
    \ see **Chapter 12, Section 12.4**). In this way, you can avoid repeatedly entering\
    \ the password for your account on the remote computer.\n\nTo set up a new connection\
    \ to an external computer, you must run `F1` *Remote-SSH: Add new ssh host* and\
    \ then—in a terminal—enter the `ssh user@hostname` command. VS Code stores the\
    \ data in `.ssh/config` but does not establish a connection for the time being.\n\
    \nThe connection is established via `F1` *Remote SSH: Connect to host* or via\
    \ the green **Remote** area in the status bar. VS Code uses the `ssh` command\
    \ to establish a connection and accordingly analyzes the keys stored in the `.ssh`\
    \ directory.\n\nOnce the connection has been successfully established, VS Code\
    \ opens a new window, with the green area in the status bar making it clear that\
    \ non-local data is being processed. From that moment on, VS Code will work as\
    \ usual: You can select a directory, edit the files it contains, save your changes,\
    \ and so on. The terminal area of VS Code is also extremely useful in remote operation.\
    \ The terminal also runs *remotely*, so you can execute commands on the remote\
    \ computer in it just like in an SSH session.\n\n![](img/a7fa45d496335c22ffb14c3275e24ffb_345_0.png)\n\
    \nFigure 13.2 Editing a Bash Script in VS Code on the External Linux Server (eine-firma.de)\n\
    \n### 13.3.2 Limitations\n\nNow, before you start thinking this is too good to\
    \ be true, I must point out two limitations:\n\n- VS Code installs a large amount\
    \ of code (typically several hundred MBs!) on the remote machine into the .vscode-server\
    \ directory and executes this code in that directory. For syntax checking and\
    \ debugging, VS Code on your notebook communicates with the extension code on\
    \ the remote machine.\n\n  For this process to work smoothly, the remote computer\
    \ requires sufficient storage space (both disk space *and* RAM), enough computing\
    \ power, and an excellent network connection. Otherwise, working in VS Code is\
    \ not much fun.\n- VS Code also reaches its limits when you want to edit system\
    \ files. No function is comparable to sudo. Thus, VS Code only allows access to\
    \ the files that an SSH user is also allowed to read. For scripting, this access\
    \ is sufficient, but for changing a configuration file in the /etc directory,\
    \ you still need an editor, which you can run in text mode using sudo.\n\n## Chapter\
    \ 14 Git\n\nGit is a version control system typically used when many people collaborate\
    \ on a complex project. Thanks to Git, multiple branches of a program can then\
    \ be managed, and changes can be tracked and reverted if necessary.\n\nAt first\
    \ glance, scripting and Git do not go together: Scripts are small files that are\
    \ often created by just one developer. Version management with Git seems therefore\
    \ superfluous.\n\nBut this impression is not quite true. Scripting and Git can\
    \ be combined wonderfully:\n\n- Git can document the development process for small\
    \ script collections: It serves as a backup, and it helps distribute scripts across\
    \ multiple target machines in a straightforward manner.\n- Some development operations\
    \ can be automated by calling the `git` and `gh` commands in scripts.\n- Git can\
    \ execute what are called *hooks* for certain operations. Hooks are scripts you\
    \ create that, for example, perform basic testing before a commit or take care\
    \ of deployment after a commit.\n\n> **Prerequisites for This Chapter**\n> To\
    \ get the most out of this chapter, you should already be familiar with SSH keys\
    \ (see Chapter 12). Such keys are used for authentication in this chapter (for\
    \ example, at GitHub or GitLab). As far as scripting examples go, this chapter\
    \ is pretty Bash and Linux heavy.\n\nThis chapter begins with a crash course on\
    \ Git that shows you how to version and back up a directory with some scripts\
    \ using Git. However, you should really consider this section only as a starter!\
    \ For a complete guide to Git, see *Git: Project Management for Developers and\
    \ DevOps Teams* by myself and Bernd Öggl (Rheinwerk Computing, 2023), which covers\
    \ advanced topics, special cases, variants, and best practices.\n\nI will also\
    \ describe how you can keep sensitive information in your scripts out of the Git\
    \ repository. All too often, passwords to cloud services or FTP access are contained\
    \ in scripts that have led to massive security breaches. This problem must be\
    \ avoided at all costs."
  mdcn: "## 13.2 特定语言的 VS Code 扩展\n\n当你在 VS Code 中首次编辑 PowerShell 或 Python 文件时，编辑器会询问你是否应安装相应的扩展。你应该始终遵循这个建议！VS\
    \ Code 随后会执行语法高亮、补全关键字、正确缩进你的代码，并帮助测试和调试你的脚本。\n\n### 13.2.1 PowerShell 扩展\n\n\
    PowerShell 扩展最有趣的功能包括以下几点：\n\n- **运行按钮**\n  VS Code 的工具栏包含两个**运行**按钮。其中一个运行你的脚本，而另一个按钮仅运行之前标记的代码行。\n\
    - **导航**\n  通过按住 `Ctrl` 键并点击，你可以直接导航到鼠标光标下变量或函数的定义处。\n- **PSScriptAnalyzer**\n\
    \  此工具分析你的代码，查找明显的弱点或违反*最佳实践*的情况。该工具还负责缩进你的代码。在进行重大重构后，你可以使用 `Ctrl` + `A` 然后 `Ctrl`\
    \ + `I` 来恢复正确的缩进。\n- **调试功能**\n  此功能帮助你调试 PowerShell 脚本。你可以在 *https://devblogs.microsoft.com/scripting/debugging-powershell-script-in-visual-studio-code-part-1*\
    \ 找到相关说明。\n\n### 13.2.2 Python 扩展\n\n活跃的 Python 扩展使输入 Python 代码变得非常有趣。VS Code\
    \ 自动执行语法检查，帮助代码缩进，并补全已安装模块的名称以及导入模块中的函数。你可以折叠注释和函数，并在脚本运行超时时查看概览。\n\n使用所谓的*重构功能*可以帮助你稍后重构代码。例如，如果你通过按\
    \ `F2` 重命名变量或函数，VS Code 会自动在代码的所有位置实施此更改。\n\nVS Code 在状态栏右下角显示计算机上安装的 Python 版本号。如果你有多个安装，你可以通过点击版本号来选择用于代码执行的版本。（不过，我强烈建议不要并行安装，因为它们通常会导致模块管理和\
    \ pip 出现问题！）\n\n在 macOS 和 Windows 上，VS Code 还会帮助你安装 Python，特别是当它找不到 Python 解释器时。我相信这是出于好意，但更好的方法是自己执行\
    \ Python 安装。这样，你可以保持对 Python 安装的控制，并避免多次安装。\n\n![](img/a7fa45d496335c22ffb14c3275e24ffb_343_0.png)\n\
    \n图 13.1 带有 Python 扩展的 Visual Studio Code\n\n### 13.2.3 Bash/Shell 扩展\n\n与 PowerShell\
    \ 和 Python 不同，目前没有针对 Bash 脚本的权威 VS Code 扩展。当你编写 Bash 或 Zsh 脚本时，VS Code 也不会主动提供安装扩展的建议。尽管如此，一些扩展可以让你作为\
    \ Bash 开发者的生活更轻松。安装哪些扩展取决于你。（如果你在**扩展**侧边栏中搜索“bash”或“shell”，你会发现更多扩展，但其中一些的效用值得怀疑）。\n\
    \n一些常见的扩展包括：\n\n- *Bash Debug* 帮助调试 Bash 脚本。\n- *shellman* 专门面向 Bash 初学者，帮助输入\
    \ Bash 结构，例如 *if* 或 *for*。\n- *ShellCheck* 分析你的代码并建议语法改进和修正。不过，我个人认为这个工具过于挑剔且配置选项不足。\n\
    - *Code Runner* 在 VS Code 工具栏中添加了一个用于直接执行 shell 脚本的按钮。\n\n## 13.3 Remote – SSH\
    \ 扩展\n\nVS Code 最大的缺点是其图形用户界面（GUI）。这个说法对你来说可能显得荒谬：毕竟，你使用 VS Code 正是因为其直观的操作和众多功能优雅地集成在其\
    \ UI 中。只要你是在本地工作，也就是说，只要你的脚本在你的笔记本电脑上，VS Code 的优势确实能充分发挥。\n\n然而，在日常脚本编写中，你经常会编写在外部服务器或虚拟机上运行的脚本。通常，与这些计算机或服务器之间只存在\
    \ SSH 连接，你必须在文本模式下工作。Linux 爱好者随后大多依赖于 *vi* 或 *Emacs* 等编辑器，这些编辑器在文本模式下能发挥全部功能，因此即使在\
    \ SSH 会话中也适用。（就个人而言，在这种情况下我大多使用 *jmacs* 或 *zile*。这些极简编辑器在基本命令上与 Emacs 兼容。）\n\n\
    不过，如果你不想学习这些来自 Unix 过去的“恐龙”编辑器的无数键盘快捷键，我不会责怪你。相反，我想向你介绍一个优雅的替代方案：你也可以通过 SSH 连接使用\
    \ VS Code 来编辑另一台机器上的代码！这种操作方式存在一些限制，但原则上效果很好。\n\n### 13.3.1 应用 Remote – SSH 扩展\n\
    \n要将 VS Code 与 SSH 结合使用，你必须安装由 Microsoft 开发的 *Remote – SSH* 扩展。你还应该将你的 SSH 公钥复制到远程机器（`ssh-copy-id`，参见**第\
    \ 12 章，第 12.4 节**）。这样，你可以避免反复输入远程计算机上账户的密码。\n\n要设置与外部计算机的新连接，你必须运行 `F1` *Remote-SSH:\
    \ Add new ssh host*，然后——在终端中——输入 `ssh user@hostname` 命令。VS Code 将数据存储在 `.ssh/config`\
    \ 中，但暂时不会建立连接。\n\n连接通过 `F1` *Remote SSH: Connect to host* 或通过状态栏中的绿色 **Remote**\
    \ 区域建立。VS Code 使用 `ssh` 命令建立连接，并相应地分析存储在 `.ssh` 目录中的密钥。\n\n一旦连接成功建立，VS Code 会打开一个新窗口，状态栏中的绿色区域清楚地表明正在处理非本地数据。从那一刻起，VS\
    \ Code 将照常工作：你可以选择一个目录，编辑其中的文件，保存你的更改，等等。VS Code 的终端区域在远程操作中也非常有用。终端也是*远程*运行的，因此你可以在其中像在\
    \ SSH 会话中一样在远程计算机上执行命令。\n\n![](img/a7fa45d496335c22ffb14c3275e24ffb_345_0.png)\n\
    \n图 13.2 在外部 Linux 服务器 (eine-firma.de) 上的 VS Code 中编辑 Bash 脚本\n\n### 13.3.2 限制\n\
    \n现在，在你开始认为这好得令人难以置信之前，我必须指出两个限制：\n\n- VS Code 在远程机器上的 .vscode-server 目录中安装大量代码（通常是几百\
    \ MB！）并在该目录中执行这些代码。为了进行语法检查和调试，你笔记本电脑上的 VS Code 会与远程机器上的扩展代码进行通信。\n\n  为了使此过程顺利进行，远程计算机需要足够的存储空间（包括磁盘空间*和*内存）、足够的计算能力以及出色的网络连接。否则，在\
    \ VS Code 中工作就不会那么愉快了。\n- 当你想要编辑系统文件时，VS Code 也会达到其极限。没有功能可以与 sudo 相媲美。因此，VS Code\
    \ 只允许访问 SSH 用户也有权读取的文件。对于脚本编写来说，这种访问权限是足够的，但对于更改 /etc 目录中的配置文件，你仍然需要一个可以在文本模式下使用\
    \ sudo 运行的编辑器。\n\n## 第 14 章 Git\n\nGit 是一个版本控制系统，通常在多人协作处理复杂项目时使用。借助 Git，可以管理程序的多个分支，跟踪更改，并在必要时进行回滚。\n\
    \n乍一看，脚本编写和 Git 似乎并不相配：脚本是小文件，通常由单个开发人员创建。因此，使用 Git 进行版本管理似乎是多余的。\n\n但这种印象并不完全正确。脚本编写和\
    \ Git 可以完美结合：\n\n- Git 可以为小型脚本集合记录开发过程：它作为备份，并有助于以简单直接的方式将脚本分发到多台目标机器。\n- 通过在脚本中调用\
    \ `git` 和 `gh` 命令，可以自动化一些开发操作。\n- Git 可以对某些操作执行所谓的 *hooks*。Hooks 是你创建的脚本，例如，在提交之前执行基本测试，或在提交之后负责部署。\n\
    \n> **本章的先决条件**\n> 为了充分利用本章内容，你应该已经熟悉 SSH 密钥（参见第 12 章）。本章中使用此类密钥进行身份验证（例如，在 GitHub\
    \ 或 GitLab 上）。就脚本示例而言，本章非常侧重于 Bash 和 Linux。\n\n本章以 Git 速成课程开始，向你展示如何使用 Git 对包含一些脚本的目录进行版本控制和备份。然而，你真的应该只将此部分视为入门！有关\
    \ Git 的完整指南，请参阅我和 Bernd Öggl 合著的 *Git: Project Management for Developers and DevOps\
    \ Teams*（Rheinwerk Computing，2023），其中涵盖了高级主题、特殊情况、变体和最佳实践。\n\n我还将描述如何将脚本中的敏感信息排除在\
    \ Git 仓库之外。云服务或 FTP 访问的密码包含在脚本中，导致大规模安全漏洞的情况屡见不鲜。必须不惜一切代价避免这个问题。"
