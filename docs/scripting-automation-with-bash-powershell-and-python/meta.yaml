  md: "> Invoke-RestMethod 'https://ipinfo.io'\n\n<!DOCTYPE html><html lang=\"en\"\
    > ... (HTML code extends over multiple pages)\n\n> Invoke-RestMethod 'https://ipinfo.io'\
    \ `\n    -Headers @{'User-Agent' = 'curl'}\n\nip        : 91.115.157.28\nhostname\
    \  : 91-115-157-28.adsl.highway.telekom.at\ncity      : Graz\nregion    : Styria\n\
    country   : AT\n...\n\n# 18.5.1 Options\n\nNot only do the two Invoke cmdlets\
    \ provide different result data types, but there are also various special options\
    \ that differ from each other. Fortunately, at least the options for the basic\
    \ settings match:\n\n+   - -Uri passes the address. This option does not have\
    \ to be specified (i.e., the address can also be passed directly to the cmdlet).\n\
    - -Method specifies the desired request. Allowed settings are Get, Put, Post,\
    \ and so on.\n- -Authentication selects the desired authentication method (None,\
    \ Basic, Bearer, or OAuth).\n- -Credential passes data for Basic authentication\
    \ to the request. The pair of login name and password must be passed as a PSCredential\
    \ object. You can initialize such an object interactively via Get-Credential.\
    \ Alternatively, you can initialize such an object by using the following code:\n\
    - -Token passes a string to the cmdlet for Bearer and OAuth authentication.\n\
    - -Body passes the data to be transferred to the web server (upload). If necessary,\
    \ you can use -ContentType to specify the format and character set of this data.\n\
    - -Header expects a hash table with the header settings.\n\n```\n$password = ConvertTo-SecureString\
    \ 'topSecret' -AsPlainText `\n                            -Force\n$credential\
    \ = New-Object `\n    System.Management.Automation.PSCredential('loginname',\n\
    \                            $password)\n```\n\nThe following lines show how you\
    \ can transfer your own data to a server using Invoke-WebRequest:"
