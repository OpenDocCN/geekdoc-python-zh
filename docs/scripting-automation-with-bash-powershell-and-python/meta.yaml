    \ 目录中的所有文件创建备份。此命令的语法也很奇怪：\n  - `czf` 指定命令应执行的操作（*创建*、*压缩*、*文件*）。下一个参数指定备份文件的位置，例如\
    \ `/home/kofler/documents-27.tar.gz`。\n  - `-C` 确定在执行 `tar` 时哪个目录是活动目录。在此示例中，它不应该是当前活动目录，而应该是包含要备份文件的目录。\n\
    \  - 命令末尾的 `A .` 表示必须备份目录的全部内容（而不仅仅是选定的文件，这也是可以想象的）。关于重要的 `tar` 选项的更详细描述将在 [第\
    \ 6 章，第 6.3 节](#) 中介绍。\n\n如果你每天运行一次这个脚本，一段时间后，你将在 `mybackups` 目录中拥有 31 个备份版本，从\
    \ `documents-01.tar.gz` 到 `documents-31.tar.gz`。虽然这个脚本有点浪费，但它确实让你能够恢复上个月内被错误覆盖或删除的任何文档。（我将在\
    \ [第 11 章](#) 中向你展示如何自动化每日备份。我在 [第 15 章](#) 中描述了执行备份的其他变体。）\n\n对于初学者来说，这个例子可能一下子有点多。但别担心，本章后续会介绍很多基础知识，这将使这段代码更容易理解。我在这个例子中的主要目标只是向你展示“真实”的脚本是什么样子的。\n\
    \n> **示例文件**\n> 此脚本以及所有其他较长的代码清单都可以在本书的示例文件中找到。你可以在 https://rheinwerk-computing.com/5851\
    \ 下载这些文件。\n\n## 3.5.7 无需 ./ 运行脚本\n\n你是否觉得每次运行脚本时都必须加上 `./`（或者如果你当前在不同的目录中，甚至需要完整路径）很烦人？有一个解决办法！\n\
    \n- **自定义脚本目录**\n  首先，你需要为你的脚本设置一个单独的目录，例如，你主目录中的 `myscripts`。\n- **扩展 PATH 变量**\n\
    \  其次，你需要将此目录的完整路径添加到 `PATH` 环境变量中。默认情况下，`PATH` 包含 Bash 搜索命令的各种目录。因此，当你运行 `ls`\
    \ 时，Bash 会依次搜索 `PATH` 中包含的所有目录。如果 `PATH` 也包含 `myscripts`，那么这个目录也会被搜索。要更改 `PATH`，你可以使用编辑器打开主目录中的\
    \ `.bashrc` 文件（如果你使用 Zsh，则是 `.zshrc`）。在此文件末尾，你必须添加以下行：\n  ```bash\n  # 在 .bashrc\
    \ 或 .zshrc 的末尾\n  ...\n  export PATH=/home/kofler/myscripts:$PATH\n  ```\n  你当然必须指定你自己脚本目录的完整路径，而不是\
    \ `/home/kofler/myscripts`。还要注意正确的语法！`=` 和 `:` 前后不能有空格。还要注意，`PATH` 第一次写时不带 `$`\
    \ 字符，但第二次写时带 `$` 字符。要使此更改生效，你必须注销并重新登录。从现在开始，你可以通过简单地命名它们来运行存储在此目录中的脚本。\n\n##\
    \ 3.6 运行命令\n\n既然你已经有机会对 Bash 或 Zsh 有所了解，接下来的几节将涵盖基础知识。我通常指的是 Bash，但几乎所有信息同样适用于\
    \ Zsh。\n\n在真正开始之前再说明一点：以下各节解释的所有技术同样适用于 Bash 的交互式使用和脚本编写！\n\n### 3.6.1 串行执行\n\n\
    在最简单的情况下——就像上一节中的备份示例一样——脚本由一系列按顺序执行的命令组成：\n\n```\n# 一个接一个地执行命令\ncommand1\ncommand2\n\
    command3\n```\n\n你也可以在单行上指定多个命令，用分号分隔。这种方法节省空间，在交互式使用 Bash 时特别方便，当你想连续完成几个耗时的任务而无需每次都输入新命令时：\n\
    \n```\n# 等效\ncommand1; command2; command3\n```\n\n### 3.6.2 条件命令执行\n\n每个命令都返回一个通常不可见的错误代码。0\
    \ 表示没有发生错误。任何其他值都表示错误或否定结果。根据上下文，“错误”这个词实际上太强烈了：例如，如果使用 `test` 命令表述的条件不成立，或者如果\
    \ `grep` 过滤命令找不到搜索词，则该命令被视为未成功执行，并返回不等于 0 的返回码。\n\nBash 允许你使第二个命令的执行依赖于第一个命令的结果。第一种变体使用字符组合\
    \ `&&`。它表示只有在第一个命令成功时才应执行第二个命令。（同样，你当然可以用这种方式链接三个或更多命令。）\n\n```\n# 仅在命令 1 成功时运行命令\
    \ 2\ncommand1 && command2\n```\n\n例如，当第一个命令运行测试（文件是否存在？）而第二个命令应该仅在测试结果为正时运行时，使用\
    \ `&&` 是有意义的。\n\n另一个例子：你想执行更新。首先，你更新软件包源（通过 Debian 或 Ubuntu 中的 `apt update`）。只有在此过程无错误地成功后，才会在第二步执行实际更新（`apt\
    \ full-upgrade`）。另一方面，如果在 `apt update` 期间发生错误，例如，因为互联网断开了一会儿，那么执行第二个命令就没有意义了。\n\
    \n```\n# 测试 data.csv 是否存在，然后\n# 返回相应的消息\ntest -f data.csv && echo \"data.csv exists\"\
    \n\n# 更新软件包源；\n# 如果成功，则执行\n# 实际更新\napt update && apt full-upgrade\n```\n\n作为 &&\
    \ 的替代方案，你也可以通过 || 链接两个命令。在这种情况下，适用相反的逻辑：只有在命令 1 导致错误时才执行命令 2：\n\n```\n# 仅在命令 1\
    \ 失败时执行命令 2\ncommand1 || command2\n```\n\n当然，你可以使用 if 构造来代替 && 和 ||，我将在第 3.11\
    \ 节关于分支中介绍。然而，&& 和 || 允许你编写更紧凑的代码，更类似于传统 shell 脚本的风格。\n\n### 3.6.3 在后台运行命令\n\n\
    通常，命令的执行会阻塞终端或脚本。后续命令必须在前一个命令完成后才能启动。在这种情况下，`command &` 可以帮助你在后台（即异步地）运行命令。命令的异步执行在脚本中很少有用。更常见的是，你需要在终端的交互操作期间使用\
    \ %。例如，你可以使用 `command &` 启动一个具有图形用户界面（GUI）的程序，例如 Firefox 网页浏览器，而不会阻塞终端中的进一步输入。在后台运行的进程可以使用\
    \ `fg` 再次设为前台进程。相反，一个耗时的命令可以通过 `Ctrl` + `Z` 中断，然后使用 `bg` 在后台继续运行。\n\n### 3.6.4\
    \ 在子 Shell 中运行命令\n\n通过将多个命令放在括号中，你可以为它们的执行启动一个新的 shell 进程并在那里运行命令。这个子 shell 可以使用\
    \ `(c1; c2; c3)` 在一行中创建。在脚本中，你可以将括号放在任何你喜欢的地方：\n\n```\ncommand1    # 在主 shell\
    \ 中运行\n(           # 在子 shell 中运行以下命令\ncommand2\ncommand3\ncommand4\n)\ncommand5\
    \    # 再次在主 shell 中\n```"
