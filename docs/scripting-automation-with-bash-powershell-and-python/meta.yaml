  - '[PAGE 210]


    ```

    $ gzip somefile        # compresses the file -> somefile.gz

    $ gunzip somefile.gz   # decompresses the file -> somefile

    ```


    A number of alternatives to the standard `gzip` and `gunzip` commands are available.
    `xz` compresses much better, but also requires much more CPU power. Conversely,
    `lz4` works much more efficiently than `gzip` but does not provide as small files.


    # 6.3.1 Archiving Files Using tar


    The `tar` command actually stands for *tape archive*, so it comes from a time
    when tape drives were still used. Today, `tar` is mostly used to create compressed
    file archives. `tar` files play a similarly important role on Linux as `zip` files
    on Windows.


    For `tar`, the first option (`-c`, `-r`, `-x`, or `-t`) specifies the action that
    `tar` is supposed to perform. All other options affect the operation.


    | Option | Meaning |

    |---|---|

    | `-c` | Create new archive (*create*) |

    | `-r` | Extend existing archive (*replace*) |

    | `-x` | Unpack archive (*extract*) |

    | `-t` | List contents (*list*) |

    | `-v` | Show visual feedback (*verbose*) |

    | `-z` | Compress/decompress using `gzip` |

    | `-j` | Compress/decompress using `bzip2` |

    | `-J` | Compress/decompress using `xz` |

    | `-f file.tar` | Filename of the archive (*file*) |

    | `-f -` | Use standard input/standard output |

    | `-C directory` | Work in this directory |


    Table 6.2 tar Options


    A particularly important option is `-f filename`: This option defines the filename
    of the archive file. If you forget this option, `tar` will try to access a tape
    drive. Since tape drives don''t exist on most computers, an error will occur.


    When you use `-f -`, `tar` writes the archive to the standard output or reads
    it from there. This approach is useful if you want to combine `tar` with another
    command, for example, to immediately encrypt an archive using `tar cf - | gpg
    ...`.'
  - '[PAGE 211]


    A common tactic is to combine the options passed to `tar` into a block of letters
    without a minus sign. Thus, `-c -z -f` or the short notation `-czf` simply becomes
    `czf`.

    The first of the following commands creates the compressed `backup.tar.gz` file,
    which contains all files within the `images` directory. (`tar` works recursively
    by default, so it also takes subdirectories into account.)

    The other commands display the table of contents of the archive and finally unpack
    it. Instead of `.tar.gz`, the shortened identifier `.tgz` is also common.


    ```

    $ tar czf backup.tar.gz images    # create archive


    $ tar tzf backup.tar.gz           # show contents


    $ cd other-directory              # unpack archive

    $ tar xzf backup.tar.gz

    ```


    > **Backups**

    More use cases for `tar` will follow in [Chapter 15](#), where I will discuss
    various techniques for automating backups.


    # 6.3.2 ZIP Files


    Maybe your archives need to be compatible with the Windows world, or you want
    to unpack a ZIP file. In such situations you can use the `zip`, `zipinfo`, and
    `unzip` commands, whose syntax I will explain in this section based on only three
    examples.

    These examples again refer to the `images` directory that is to be backed up.
    Note that `zip` does not work recursively (i.e., subfolders are not included)
    by default. If necessary, the `-r` option can provide help in this context.


    ```

    $ zip backup.zip -r images        # create archive

    $ zipinfo backup.zip              # show archive

    $ unzip backup.zip                # unpack archive

    ```


    # 6.4 Using Root Privileges


    On Linux and macOS, you can modify only your own files and read only selected
    files of other users. Working within this limitation may be sufficient for your
    everyday work, but not for scripts that are supposed to perform admin tasks.

    The solution in such cases is `sudo` which allows you to execute a single command
    or an entire script with admin rights (or, as it is called in Linux, with “root
    privileges”). The'
  - '[PAGE 212]


    first of the following two commands performs a software installation (Section
    6.5), while the second command runs a script in the local directory:


    ```

    $ sudo apt install somepackage

    [sudo] Password for <accountname>: ********

    $ sudo ./myscript.sh

    ```


    # 6.4.1 sudo Privileges for Selected Accounts Only


    sudo can only be used by selected users—usually, the person who performed the
    Linux installation and whose account was created first.


    sudo users must authenticate using their own password. The authentication will
    then remain valid for a few minutes. For additional sudo calls within this period
    of time, it is therefore not necessary to enter the password again.


    The /etc/sudoers file controls who has which privileges in sudo. Fortunately,
    changes to this relatively complex file are rarely necessary. If you want to assign
    sudo privileges to another account, you should run the following command (which
    of course assumes that you have sudo privileges yourself):


    ```

    $ sudo usermod -a -G sudo <account>    # Debian, Ubuntu ...

    $ sudo usermod -a -G wheel <account>   # Fedora, RHEL ...

    ```


    These usermod commands add the <account> user to the sudo group (for Debian, Ubuntu,
    and compatible distributions) or to the wheel group (for Fedora and Red Hat Enterprise
    Linux [RHEL] compatible distributions). All members of these two groups will automatically
    have sudo privileges.


    # 6.4.2 Issues with Output Redirection


    The following two commands each attempt to modify a file in the /etc directory.
    The first command works, the second one triggers an error. Why’s that?


    ```

    $ sudo touch /etc/new-file          # works

    $ sudo echo "hello" > /etc/new-file  # Error: no permission

    ```


    The problem is the output redirection. While sudo runs echo "hello" with root
    privileges, the rest of the command (i.e., the redirection of the output to the
    /etc/new-file file) is handled by Bash—and Bash runs with normal privileges. That’s
    where the error occurs.


    Once the cause is clear (I stumble into this trap myself at regular intervals),
    the solution is not difficult. Instead of just running echo (or whatever command)
    via sudo, you pass a new Bash process to sudo, which in turn executes the rest
    of the command, including the redirection. The -c option signifying command allows
    you to pass the command to be run to the Bash process:


    ```

    $ sudo bash -c ''echo "bla" > /etc/new-file''

    ```'
