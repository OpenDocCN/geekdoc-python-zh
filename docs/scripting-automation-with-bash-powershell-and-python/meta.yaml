  - "[PAGE 242]\n\n# 7.7 Other cmdlets\n\nIn this section, I'll briefly introduce\
    \ you to some other cmdlets that are often needed but don't fit the content of\
    \ any of the previous sections:\n\n+   - **Get-Command <name>**\n  Get-Command\
    \ <name> returns information about a cmdlet or command. For cmdlets, the Source\
    \ property reveals the underlying module. With conventional commands, on the other\
    \ hand, you can evaluate the Path property—then, you'll know where the command\
    \ is installed (comparable to which on Linux):\n\n  powershell\n  > (Get-Command\
    \ Get-ChildItem).Source\n  Microsoft.PowerShell.Management\n  > (Get-Command ping.exe).Path\n\
    \  C:\\Windows\\system32\\PING.EXE\n  \n\n- **Get-History**\n  Get-History returns\
    \ a list of all recently executed commands.\n\n- **Get-Random**\n  Get-Random\
    \ returns a random number between 0 and 2,147,483,647. Using -Minimum and -Maximum\
    \ you can limit the number range. When you apply Get-Random to an array, the cmdlet\
    \ returns a random element.\n\n- **Measure-Command { expr }**\n  Measure-Command\
    \ { expr } determines how long it takes to execute the specified expression.\n\
    \n- **Start-Sleep n**\n  Start-Sleep n (alias sleep) stops the running process\
    \ or script for n seconds.\n\n- **Get-Clipboard**\n  Get-Clipboard reads the contents\
    \ of the clipboard. Although no comparable cmdlet can fill the clipboard with\
    \ data, you can use the clip.exe command for this purpose. For example, Get-Date\
    \ | clip copies the current date as text to the clipboard.\n\n# 7.8 Installing\
    \ Additional Modules\n\nBy default, Windows has quite a few PowerShell modules\
    \ with cmdlets installed, and countless extension modules are available on the\
    \ internet. The PowerShell Gallery has established itself as a central source\
    \ for such extensions. More than 10,000 modules are offered for download at https://powershellgallery.com.\n\
    \nTo install modules from the PowerShell Gallery, the PowerShellGet module is\
    \ available by default. This module contains cmdlets like Install-Module and Find-Module."
- md: "## PowerShellGet Update for PowerShell 5.1\n\nAlong with PowerShell 7.n, an\
    \ up-to-date version of PowerShellGet is shipped. But if you use PowerShell 5.1,\
    \ you must update the `PowerShellGet` module first. The prerequisites (i.e., the\
    \ installation of a current .NET framework, activation of TLS 1.2, etc.) are summarized\
    \ at https://learn.microsoft.com/en-us/powershell/scripting/gallery/installing-psget.\n\
    \nTo install a module from the PowerShell Gallery, you can simply run `Install-Module`:\n\
    \n```\n> Install-Module PSReadExif\n\nUntrusted repository\nYou're installing\
    \ the modules from an untrusted repository.\nAre you sure you want to install\
    \ the modules from 'PSGallery'?\n[Y] Yes  [A] Yes to All  [N] No  [L] No to All\
    \  ...: y\n```\n\nYou can update previously installed modules using `Update-Module`,\
    \ for example:\n\n```\n> Update-Module SQLServer\n```\n\n## 7.8.1 Listing Modules,\
    \ Commands, and Package Sources\n\nIn PowerShell, you have two commands to list\
    \ modules:\n\n- **Get-Module**\n  `Get-Module` lists the modules loaded in the\
    \ current PowerShell instance. If you have the terminal window freshly opened,\
    \ only a few modules will be loaded. Since modules are loaded automatically as\
    \ soon as a command they contain is executed, the list increases depending on\
    \ which commands you use.\n  `Get-Module -ListAvailable` lists all the modules\
    \ that are available on your computer.\n- **Get-InstalledModule**\n  `Get-InstalledModule`\
    \ is part of the `PowerShellGet` module and lists only those modules that you\
    \ have set up previously via `Install-Module`. If you have never used `Install-Module`,\
    \ the result will be empty.\n\n```\n> Get-InstalledModule\n\nVersion  Name   \
    \       Repository  Description\n-------  ----          ----------  -----------\n\
    1.0.2    PSReadExif    PSGallery    Read EXIF metadata ...\n```\n\nTo learn what\
    \ commands a particular module provides, you should run `Get-Command` with the\
    \ `-Module` option:\n\n```\n> Get-Command -Module PSReadExif\nCommandType Name\
    \ Version Source\n----------- ---- ------- ------\nFunction Add-ExifData 1.0.2\
    \ PSReadExif\nFunction Get-ExifData 1.0.2 PSReadExif\nFunction Get-ExifTag 1.0.2\
    \ PSReadExif\n```\n\nTo find out which package sources are currently set up, you\
    \ can run `Get-PackageProvider`. Usually, `PowerShellGet` and `NuGet` are preconfigured,\
    \ even if you use PowerShell on Linux or macOS.\n\n```\n> Get-PackageProvider\n\
    \nName Version DynamicOptions\n---- ------- --------------\nNuGet 3.0.0.1 Destination,\
    \ ExcludeVersion, ...\nPowerShellGet 2.2.5.0 PackageManagementProvider, ...\n\
    ```\n\n## 7.8.2 NuGet and winget\n\nPowerShellGet is the package manager for PowerShell.\
    \ On Windows, however, various other package managers are available, such as *NuGet*,\
    \ *winget*, and *Chocolatey*. At this point, I will only discuss the NuGet and\
    \ winget tools developed by Microsoft. These tools have a completely different\
    \ objective than PowerShellGet:\n\n- **NuGet**\n  NuGet is a package manager for\
    \ software developers. You can use NuGet to manage all conceivable software components,\
    \ .NET libraries, and tools. More than 300,000 packages can be downloaded for\
    \ free at https://nuget.org. NuGet has been shipped with the Visual Studio development\
    \ environment for many years.\n  From a PowerShell perspective, NuGet is useful\
    \ in two ways: On the one hand, you can control NuGet through PowerShell commands\
    \ such as `Find-Package`, `Install-Package`, and `Uninstall-Package`. On the other\
    \ hand, sometimes, a PowerShell module relies on other tools or libraries, which\
    \ you can easily install using NuGet.\n- **winget**\n  winget is a new package\
    \ management tool. Unlike NuGet, which is only aimed at developers, winget helps\
    \ install user software. winget provides the same functions and also uses the\
    \ same sources as the Microsoft Store, but can be operated efficiently in text\
    \ mode:\n\n```\n> winget install Mozilla.Firefox\n```\n\nThe `winget` command\
    \ is available by default in Windows 11 as well as in current versions of Windows\
    \ 10. You can use winget in PowerShell scripts to install or update programs.\n\
    \nHowever, winget is currently implemented only as a traditional command. A PowerShell\
    \ module with cmdlets like `Install-WinGetPackage` is already being developed\
    \ at https://github.com/microsoft/winget-cli/tree/master/src/PowerShell/Microsoft.WinGet.Client.\n\
    \n## 7.9 Standard Aliases\n\nCompared to Linux, where the names of important commands\
    \ are rarely longer than 4 characters, the names of frequently needed cmdlets\
    \ are often rather verbose. However, shortcuts for frequently used commands are\
    \ available for PowerShell professionals.\n\n| Alias | cmdlet | Alias | cmdlet\
    \ |\n|---|---|---|---|\n| ? | Where-Object | measure | Measure-Object |\n| % |\
    \ ForEach-Object | mv | Move-Item |\n| cat | Get-Content | ni | New-Item |\n|\
    \ cd | Set-Location | oh | Out-Host |\n| cpi | Copy-Item | ps | Get-Process |\n\
    | curl | Invoke-WebRequest | pwd | Get-Location |\n| del | Remove-Item | rm |\
    \ Remove-Item |\n| dir | Get-ChildItem | select | Select-Object |\n| echo | Write-Output\
    \ | sleep | Start-Sleep |\n| ft | Format-Table | sls | Select-String |\n| gci\
    \ | Get-ChildItem | sort | Sort-Object |\n| gm | Get-Member | tee | Tee-Object\
    \ |\n| ls | Get-ChildItem | write | Write-Output |\n| md | mkdir | | |\n\n**Table\
    \ 7.1** Aliases of the Most Important cmdlets and Functions\n\nMany aliases are\
    \ simply derived from the first letters of the verb and the noun of the cmdlet,\
    \ such as `mi` for `Move-Item`. Other aliases like `cat`, `dir`, or `ls` correspond\
    \ to common DOS and Linux commands.\n\nYou can define your own aliases using `Set-Alias`\
    \ and save these custom aliases permanently in `Documents/profile.ps1`. A complete\
    \ reference of all currently defined aliases is provided by the `Get-Alias` command.\n\
    \n## Avoid Using Aliases in Scripts!\n\nOnce you get used to the most important\
    \ aliases in interactive mode, you may be tempted to use them in scripts as well,\
    \ but doing so is not a good idea. Depending on the configuration or operating\
    \ system, different abbreviations may be active. For example, on Windows, `ls`\
    \ is an alias for `Get-ChildItem`; on Linux and macOS, however, `ls` calls the\
    \ Unix-style `ls` command!\n\nThe aliases specified in this book always apply\
    \ to Windows.\n\n## Aliases versus Functions\n\nAt first glance, you may find\
    \ it difficult to determine whether a short name is an alias or a function. If\
    \ you’re curious, you can call `Get-Command`. This cmdlet reveals, for example,\
    \ that `mkdir` is a function, while `rmdir` is an alias.\n\n# Chapter 8\n## Analyzing\
    \ Texts with Filters and Pipes\n\nPart of the daily routine of system admins is\
    \ the analysis of logging files. However, extracting relevant data from files\
    \ that are often millions of lines long is like the proverbial search for a needle\
    \ in a haystack. By cleverly combining commands like `grep`, `sort`, `cut`, or\
    \ `uniq`, you can make your life easier. With a little practice, one-line commands\
    \ can work miracles.\n\nBut how does this topic involve the terms “filter” and\
    \ “pipe”?\n\n- In the shell context, a filter is a command that expects text as\
    \ input and returns new text as output. In Section 8.1, I will introduce the most\
    \ important filter commands that Linux and macOS provide by default.\n- You should\
    \ be familiar with the `|` pipe operator from Chapter 3, Section 3.7. This operator\
    \ redirects the output of a command to a second command for further processing.\
    \ For example, `sort my.txt | uniq` causes the lines of `my.txt` to be sorted\
    \ first and then eliminates all duplicates in the second step.\n\nBy its very\
    \ nature, the use of filters and pipes is by no means limited to logging files.\
    \ You can also use them to analyze address data, user directories, comma-separated\
    \ values (CSV) files, and so on.\n\n> **Prerequisites for This Chapter**\n\nThis\
    \ chapter is very much based on Bash. Bash is the ideal environment to apply commands\
    \ like `sort` or `grep`. Accordingly, I assume that readers of this chapter have\
    \ basic knowledge of Bash. Only in Section 8.5 will I briefly use Python and PowerShell\
    \ as well.\n\nPowerShell also has a pipe operator `|`. However, this operator\
    \ redirects objects instead of text, which results in greater processing capabilities\
    \ compared to Bash—but only if the underlying data is *not* text. For this reason,\
    \ PowerShell plays only a minor role in this chapter—sorry about that!\n\n## 8.1\
    \ grep, sort, cut, and uniq\n\nThis section introduces four commands mentioned\
    \ in this heading, plus a few more. All presented commands are part of the standard\
    \ repertoire on macOS and Linux, so they do not need to be installed separately."
  mdcn: "## PowerShell 5.1 的 PowerShellGet 更新\n\n随着 PowerShell 7.n 的发布，也附带了最新版本的 PowerShellGet。但如果你使用的是\
    \ PowerShell 5.1，则必须先更新 `PowerShellGet` 模块。其先决条件（即安装当前的 .NET 框架、启用 TLS 1.2 等）已汇总在\
    \ https://learn.microsoft.com/en-us/powershell/scripting/gallery/installing-psget。\n\
    \n要从 PowerShell 库安装模块，你只需运行 `Install-Module`：\n\n```\n> Install-Module PSReadExif\n\
    \nUntrusted repository\nYou're installing the modules from an untrusted repository.\n\
    Are you sure you want to install the modules from 'PSGallery'?\n[Y] Yes  [A] Yes\
    \ to All  [N] No  [L] No to All  ...: y\n```\n\n你可以使用 `Update-Module` 来更新之前安装的模块，例如：\n\
    \n```\n> Update-Module SQLServer\n```\n\n## 7.8.1 列出模块、命令和包源\n\n在 PowerShell 中，你有两个命令可以列出模块：\n\
    \n- **Get-Module**\n  `Get-Module` 列出当前 PowerShell 实例中已加载的模块。如果你刚打开终端窗口，只会加载少量模块。由于模块会在执行其包含的命令时自动加载，因此列表会根据你使用的命令而增加。\n\
    \  `Get-Module -ListAvailable` 列出你计算机上所有可用的模块。\n- **Get-InstalledModule**\n  `Get-InstalledModule`\
    \ 是 `PowerShellGet` 模块的一部分，仅列出你之前通过 `Install-Module` 安装的模块。如果你从未使用过 `Install-Module`，结果将为空。\n\
    \n```\n> Get-InstalledModule\n\nVersion  Name          Repository  Description\n\
    -------  ----          ----------  -----------\n1.0.2    PSReadExif    PSGallery\
    \    Read EXIF metadata ...\n```\n\n要了解特定模块提供了哪些命令，你应该使用 `-Module` 选项运行 `Get-Command`：\n\
    \n```\n> Get-Command -Module PSReadExif\nCommandType Name Version Source\n-----------\
    \ ---- ------- ------\nFunction Add-ExifData 1.0.2 PSReadExif\nFunction Get-ExifData\
    \ 1.0.2 PSReadExif\nFunction Get-ExifTag 1.0.2 PSReadExif\n```\n\n要找出当前设置了哪些包源，你可以运行\
    \ `Get-PackageProvider`。通常，即使你在 Linux 或 macOS 上使用 PowerShell，`PowerShellGet` 和\
    \ `NuGet` 也是预配置的。\n\n```\n> Get-PackageProvider\n\nName Version DynamicOptions\n\
    ---- ------- --------------\nNuGet 3.0.0.1 Destination, ExcludeVersion, ...\n\
    PowerShellGet 2.2.5.0 PackageManagementProvider, ...\n```\n\n## 7.8.2 NuGet 和\
    \ winget\n\nPowerShellGet 是 PowerShell 的包管理器。然而，在 Windows 上，还有各种其他可用的包管理器，例如 *NuGet*、*winget*\
    \ 和 *Chocolatey*。在此，我将只讨论由 Microsoft 开发的 NuGet 和 winget 工具。这些工具的目标与 PowerShellGet\
    \ 完全不同：\n\n- **NuGet**\n  NuGet 是面向软件开发者的包管理器。你可以使用 NuGet 来管理所有可想象的软件组件、.NET 库和工具。超过\
    \ 300,000 个软件包可以在 https://nuget.org 免费下载。多年来，NuGet 一直随 Visual Studio 开发环境一起提供。\n\
    \  从 PowerShell 的角度来看，NuGet 在两个方面很有用：一方面，你可以通过 PowerShell 命令（如 `Find-Package`、`Install-Package`\
    \ 和 `Uninstall-Package`）来控制 NuGet。另一方面，有时 PowerShell 模块依赖于其他工具或库，你可以使用 NuGet 轻松安装它们。\n\
    - **winget**\n  winget 是一个新的包管理工具。与仅面向开发者的 NuGet 不同，winget 帮助安装用户软件。winget 提供相同的功能，并且也使用与\
    \ Microsoft Store 相同的源，但可以在文本模式下高效操作：\n\n```\n> winget install Mozilla.Firefox\n\
    ```\n\n`winget` 命令在 Windows 11 以及当前版本的 Windows 10 中默认可用。你可以在 PowerShell 脚本中使用\
    \ winget 来安装或更新程序。\n\n然而，winget 目前仅作为传统命令实现。一个包含 `Install-WinGetPackage` 等 cmdlet\
    \ 的 PowerShell 模块正在 https://github.com/microsoft/winget-cli/tree/master/src/PowerShell/Microsoft.WinGet.Client\
    \ 开发中。\n\n## 7.9 标准别名\n\n与 Linux 中重要命令的名称很少超过 4 个字符相比，PowerShell 中常用 cmdlet 的名称通常相当冗长。然而，对于\
    \ PowerShell 专业人士来说，常用命令有快捷方式可用。\n\n| 别名 | cmdlet | 别名 | cmdlet |\n|---|---|---|---|\n\
    | ? | Where-Object | measure | Measure-Object |\n| % | ForEach-Object | mv | Move-Item\
    \ |\n| cat | Get-Content | ni | New-Item |\n| cd | Set-Location | oh | Out-Host\
    \ |\n| cpi | Copy-Item | ps | Get-Process |\n| curl | Invoke-WebRequest | pwd\
    \ | Get-Location |\n| del | Remove-Item | rm | Remove-Item |\n| dir | Get-ChildItem\
    \ | select | Select-Object |\n| echo | Write-Output | sleep | Start-Sleep |\n\
    | ft | Format-Table | sls | Select-String |\n| gci | Get-ChildItem | sort | Sort-Object\
    \ |\n| gm | Get-Member | tee | Tee-Object |\n| ls | Get-ChildItem | write | Write-Output\
    \ |\n| md | mkdir | | |\n\n**表 7.1** 最重要的 cmdlet 和函数的别名\n\n许多别名只是从 cmdlet 的动词和名词的首字母派生而来，例如\
    \ `mi` 代表 `Move-Item`。其他别名如 `cat`、`dir` 或 `ls` 对应于常见的 DOS 和 Linux 命令。\n\n你可以使用\
    \ `Set-Alias` 定义自己的别名，并将这些自定义别名永久保存在 `Documents/profile.ps1` 中。`Get-Alias` 命令提供了所有当前定义的别名的完整参考。\n\
    \n## 避免在脚本中使用别名！\n\n一旦你习惯了交互模式下最重要的别名，你可能会忍不住在脚本中也使用它们，但这并不是个好主意。根据配置或操作系统的不同，可能会激活不同的缩写。例如，在\
    \ Windows 上，`ls` 是 `Get-ChildItem` 的别名；然而，在 Linux 和 macOS 上，`ls` 调用的是 Unix 风格的\
    \ `ls` 命令！\n\n本书中指定的别名始终适用于 Windows。\n\n## 别名与函数\n\n乍一看，你可能很难确定一个短名称是别名还是函数。如果你好奇，可以调用\
    \ `Get-Command`。这个 cmdlet 会揭示，例如，`mkdir` 是一个函数，而 `rmdir` 是一个别名。\n\n# 第 8 章\n##\
    \ 使用过滤器和管道分析文本\n\n系统管理员日常工作的一部分是分析日志文件。然而，从通常有数百万行的文件中提取相关数据，就像俗话说的“大海捞针”。通过巧妙地组合\
    \ `grep`、`sort`、`cut` 或 `uniq` 等命令，你可以让自己的工作更轻松。稍加练习，单行命令就能创造奇迹。\n\n但这个主题如何涉及“过滤器”和“管道”这两个术语呢？\n\
    \n- 在 shell 上下文中，过滤器是一个期望文本作为输入并返回新文本作为输出的命令。在第 8.1 节中，我将介绍 Linux 和 macOS 默认提供的最重要的过滤器命令。\n\
    - 你应该从第 3 章第 3.7 节熟悉 `|` 管道运算符。此运算符将一个命令的输出重定向到第二个命令进行进一步处理。例如，`sort my.txt |\
    \ uniq` 会导致 `my.txt` 的行首先被排序，然后在第二步中消除所有重复项。\n\n就其本质而言，过滤器和管道的使用绝不仅限于日志文件。你也可以使用它们来分析地址数据、用户目录、逗号分隔值（CSV）文件等。\n\
    \n> **本章的先决条件**\n\n本章很大程度上基于 Bash。Bash 是应用 `sort` 或 `grep` 等命令的理想环境。因此，我假设本章的读者具备\
    \ Bash 的基础知识。只有在第 8.5 节中，我才会简要使用 Python 和 PowerShell。\n\nPowerShell 也有一个管道运算符\
    \ `|`。然而，此运算符重定向的是对象而不是文本，这导致其处理能力比 Bash 更强——但前提是底层数据*不是*文本。因此，PowerShell 在本章中只扮演次要角色——对此表示抱歉！\n\
    \n## 8.1 grep、sort、cut 和 uniq\n\n本节介绍标题中提到的四个命令，以及另外几个。所有介绍的命令都是 macOS 和 Linux\
    \ 标准套件的一部分，因此不需要单独安装。"
