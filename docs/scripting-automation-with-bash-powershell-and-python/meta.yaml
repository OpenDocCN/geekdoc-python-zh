    # 12.3 scp and rsync


    scp enables you to copy a file back and forth between a local computer and a remote
    computer. The following lines summarize the main syntax variants of scp. Unlike
    the ssh command, the hostname must always be followed by a colon! Remember: The
    dot (.) is the short notation for the current directory.


    ```

    # copy local file to an external host (upload)

    $ scp filename user@host:

    $ scp filename user@host:path/newfilename


    # copy the file of the external host into the local

    # file system (download)

    $ scp user@host:filename .

    $ scp user@host:path/filename .


    # copy entire directory trees recursively

    $ scp -r localdir/ user@host:

    $ scp -r user@host:remotedir .

    ```


    > **Annoying Password Specification**

    Even if not included in our listings for space reasons, each scp command must
    be acknowledged by entering a password, which is, of course, annoying. The solution
    in this case is to use an SSH key (Section 12.4).


    As with the interactive use of ssh, the communication is encrypted. Even if an
    attacker succeeds in intercepting and recording data packets, they could not decrypt
    the data (according to current knowledge) without a password.


    # 12.3.1 Copy-Item with SSH Remoting


    scp is a conventional command (an *.exe file) on Windows. Calling such commands
    always appears as something foreign in PowerShell scripts. An alternative is to
    set up SSH remoting (Section 12.2). Under this condition, you can first establish
    an SSH connection via New-PSSession and then pass the session object to Copy-Item:'
  merge: -1
  pgno: 331
- img_proc: true
  md: '```

    > $session = New-PSSession linuxhostname -Username kofler

    > Copy-Item localfile /home/kofler/somesubdir -ToSession $session

    > Remove-PSSession $session

    ```


    Note that you must always specify an absolute path when using `Copy-Item` in this
    way. (In contrast, `scp` automatically works relative to the home directory of
    the account of the SSH connection.)


    # 12.3.2 rsync


    Linux and macOS computers can synchronize directories via `rsync`, which works
    for local directories as well as for directories on remote computers that are
    accessible via SSH. In this case, the basic syntax is exactly the same as for
    `scp`; that is, simply replace `scp` with `rsync`. (You can control the detailed
    behavior of `rsync` via numerous additional options, but I won''t go into detail
    in this book. Review the manual by using `man rsync`.)


    Compared to `scp`, three main differences exist:


    +   - The `rsync` command/package must be installed both on the local computer
    and on the external computer. The SSH client or server is not enough.

    - `rsync` checks which files have already been transferred and copies only new
    or changed files. For large directory trees, this approach (really) saves a lot
    of time.

    - `rsync` can also delete files and directories and thus synchronize deletions.
    Since this action can also cause a loss of data, you must explicitly enable this
    behavior using the `--delete` option.


    > **rsync and Windows**


    `rsync` is not available on Windows. The easiest way to use `rsync` is via the
    *Windows Subsystem for Linux (WSL)*. After installing a distribution, you can
    easily use `rsync` on the client side within WSL, thereby accessing all Windows
    files.


    A good (but not SSH-compatible) variant to `rsync` is the `robocopy` command,
    which I will introduce in [Chapter 15](#) on backups.


    # 12.4 SSH Authentication with Keys


    The SSH server knows numerous different authentication methods: The most common
    one is the password login used so far in this chapter. Alternatives include two-factor
    authentication (2FA) and SSH authentication with keys, which I will discuss in
    this section. This type of authentication requires some preparatory work that
    can be done quickly. As a result, `ssh` or `scp` can be used without a password,
    which is ideal for implementing automation in scripts.'
