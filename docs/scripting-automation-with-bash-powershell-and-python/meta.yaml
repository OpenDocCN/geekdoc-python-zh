    > "$UserName has the ID $UserId."

    Michael has the ID 123.

    ```


    If you accidentally use an uninitialized variable, PowerShell usually doesn''t
    encounter any trouble: The variable is empty, but the analysis does not cause
    an error:


    ```

    > "$UserName has the ID $Uid."

    Michael has the ID .

    ```


    However, uninitialized variables can cause logic errors. Therefore, including
    `Set-StrictMode -Version 1.0` at the start of a script makes sense. Using an uninitialized
    variable then leads to an error message. (However, the script continues to run
    anyway. More information about `Set-StrictMode` and how to handle errors in scripts
    will follow in [Section 4.13](#section-4-13).)


    > **Variable Names**

    PowerShell allows almost any characters when naming variables, functions, etc.
    If you want to use spaces or special characters, the `${name}` notation is appropriate,
    for example `${this is a variable name too!}`. The curly brackets in this context
    clearly indicate where a variable''s name begins and ends.


    Despite this freedom in syntax, a useful practice is to compose variable names
    only from letters, digits, and a few special characters (_).


    Typical for Windows, PowerShell does not differentiate between uppercase and lowercase.
    So, you could just as well parse `$userid` or `$USERID` in our earlier example
    as these names are equivalent for PowerShell.


    You can also store the result of other commands in variables, as in the following
    example:


    ```

    > $Images = Get-ChildItem *.jpg

    ```


    `Read-Host` can be used to perform user input, as in the following example:


    ```

    > $Name = Read-Host "Enter your name!"

    Enter your name!: Michael


    > "Hello, $Name!"

    Hello, Michael!

    ```


