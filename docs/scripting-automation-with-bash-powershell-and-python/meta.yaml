- img_proc: true
  md: "# 20.4.3 Limitations\n\nBefore you get the idea to apply this script to a real\
    \ website, you should deal with the not insignificant limitations:\n\n+   - Most\
    \ modern websites are implemented via a *content management system (CMS)*. The\
    \ HTML code of a page consists of various components. The script sees this HTML\
    \ code in its entirety. But in fact, you usually want to change only parts of\
    \ it. For this task, the script would need to have access to the single page within\
    \ the CMS. Often, Markdown or a CMS-specific language is used instead of HTML.\n\
    - The direct links to the PDF files in the AWS S3 bucket use only HTTP, not the\
    \ contemporary HTTPS protocol. This choice can be changed, but considerable configuration\
    \ effort is needed. The details are documented at [https://docs.aws.amazon.com/AmazonS3/latest/userguide/WebsiteHosting.html](https://docs.aws.amazon.com/AmazonS3/latest/userguide/WebsiteHosting.html).\n\
    - The script itself could also be optimized. It should consider only PDF links\
    \ referencing files of your own website. Foreign PDFs or PDFs that have already\
    \ been swapped out should not be processed again.\n  A duplicate check is also\
    \ recommended to ensure that a document linked multiple times will only once be\
    \ uploaded to the cloud.\n- The script requires absolute links (i.e., `href=\"\
    https://hostname/...\"`). However, HTML also allows relative links (`href=\"mydocument.pdf\"\
    `). If necessary, you must supplement your script to this effect. Corresponding\
    \ sample code—there, however, formulated in Python—can be found in Chapter 17,\
    \ Section 17.2.\n\nIn a nutshell, the implementation of the simple idea of this\
    \ example faces several hurdles in practice."
