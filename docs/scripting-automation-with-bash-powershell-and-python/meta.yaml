    \ cmdlets. Alternatively, you can preset the desired profile at the beginning\
    \ of a session or script using `Set-AWSCredential`:\n\n```\n> Set-AWSCredential\
    \ -ProfileName MyProfile\n```\n\nIf you want to know in which region your buckets\
    \ are located, you must run `Get-S3BucketLocation`. Note that the cmdlet will\
    \ return an empty result if the bucket is in the US-East (North Virginia) region\
    \ (`us-east-1`).\n\n```\n> Get-S3Bucket | ForEach-Object {\n    $name = $_.BucketName\n\
    \    $region = Get-S3BucketLocation -BucketName $name\n    Write-Output \"$name\
    \ : $region\"\n}\n\nmy.first.bucket : eu-central-1\nmy.other.bucket : eu-west-2\n\
    ...\n```\n\nThe content of a bucket is displayed via `Get-S3Object`, which might\
    \ be a bit more detailed than you need:\n\n```\n> Get-S3Object -BucketName my.first.bucket\
    \ -Region eu-central-1\n\n    ChecksumAlgorithm : {}\n    ETag              :\
    \ \"b81e...\"\n    BucketName        : my.first.bucket\n    Key              \
    \ : duplicati1.png\n```"
  - "[PAGE 440]\n\n```\nLastModified       : 13.05.2019 21:36:35\nOwner          \
    \    : Amazon.S3.Model.Owner\nSize               : 31729\nStorageClass       :\
    \ STANDARD\n\nChecksumAlgorithm  : {}\nETag               : \"ab98\"\n...\n```\n\
    \nProbably you're only interested in the filenames (Key property). Also, only\
    \ in rare cases will you really need *all* the files from a bucket. (In fact,\
    \ the cmdlet returns a maximum of 1,000 hits.) The following command returns only\
    \ the names of all files starting with dir1/:\n\n```\n> Get-S3Object -BucketName\
    \ my.first.bucket -KeyPrefix 'dir1/' |\n  Select-Object Key\n```\n\nUnfortunately,\
    \ `Get-S3Object` does not provide a way to filter files by other criteria. As\
    \ long as you do not exceed the 1,000-file limit, you must determine *all* filenames\
    \ and then apply `Filter-Object`. The following command displays the names of\
    \ all files ending with .txt:\n\n```\n> Get-S3Object -BucketName my.first.bucket\
    \ |\n  Select-Object Key |\n  Where-Object { $_.Key -like '*.txt' }\n```\n\nRelatively\
    \ often, you may find that `Get-S3Object` or various other cmdlets return the\
    \ following error message: *The bucket you're attempting to access must be addressed\
    \ using the specified endpoint.*\n\nThe error indicates that you forgot the `-Region`\
    \ option and AWS does not know where your bucket is located. Since constantly\
    \ specifying the `-Region` option is annoying, you can set the default region\
    \ for the current session or for your script via `Set-DefaultAWSRegion`.\n\n```\n\
    > Set-DefaultAWSRegion -Region eu-central-1\n```\n\n# 20.3.2 Copying Files\n\n\
    Probably the most common task when using AWS S3 is to upload and download files\
    \ to and from the cloud. `Write-S3Object` and `Read-S3Object` are used for this\
    \ purpose:\n\n+   - The first command uploads a local file to a bucket. The key\
    \ name in the bucket matches that of the local file.\n- The second command uploads\
    \ another file but assigns a different name to the file in the bucket (-Key option)."
- md: "## 20.4 Example: Offloading Large Files from a Website to the Cloud\n\nThe\
    \ starting point for the following example is your own website. The goal is to\
    \ swap out the very large PDF files linked there to the cloud. Thus, the website\
    \ should continue to be operated with its own server. However, when visitors click\
    \ on a PDF download link, that file should be downloaded from AWS S3. In this\
    \ way, you can continue to manage the website yourself, while at the same time\
    \ minimizing the load on your web server caused by large downloads.\n\nThe *migrate-pdf-to-aws.ps1*\
    \ script works in the following way:\n\n- It downloads the HTML code of a web\
    \ page.\n- It searches all links for those ending with `.pdf`.\n- It first downloads\
    \ the PDF documents to a temporary directory and then uploads them to a public\
    \ AWS S3 bucket.\n- In the HTML code, the links are adjusted, and a new version\
    \ of the HTML page is saved locally.\n\n■ The third command downloads the *readme.txt*\
    \ file from the bucket and saves the file locally as *local-file.txt*.\n■ The\
    \ fourth command downloads all files whose key starts with `dir1/` into the current\
    \ directory.\n\n```\n> Write-S3Object -BucketName my.first.bucket -File local-file.txt\n\
    > Write-S3Object -BucketName my.first.bucket -File local.txt `\n             \
    \   -Key dir1/tst.txt\n> Read-S3Object  -BucketName my.first.bucket -Key readme.txt\
    \ `\n                 -File local-file.txt\n> Read-S3Object  -BucketName my.first.bucket\
    \ -KeyPrefix dir1/ `\n                 -Folder .\n```\n\nYou can use `Remove-S3Object`\
    \ to delete files in the bucket:\n\n```\n> Remove-S3Object -BucketName my.first.bucket\
    \ -Key readme.txt\n```\n\nIn addition to the cmdlets listed so far, the AWS Tools\
    \ for PowerShell provide countless other functions to choose from. A reference\
    \ of all S3 cmdlets can be found at *https://docs.aws.amazon.com/powershell/latest/reference/items/S3_cmdlets.html*.\n\
    \nIn view of the abundance of cmdlets, the absence of a very important function\
    \ is confusing: No cmdlet in AWS Tools for PowerShell corresponds to the `aws\
    \ s3 sync` CLI command. If you want to synchronize a local directory with a bucket,\
    \ I recommend you use the CLI in PowerShell scripts as well.\n\n### 20.4.1 Preparations\n\
    \nFor this example, you need a bucket that is publicly accessible on the web.\
    \ For this task, make several settings in the AWS Console:\n\n- For security reasons,\
    \ all public access to new buckets is blocked by default. The corresponding **Block\
    \ all public access** option must be disabled.\n- You need to set a *bucket policy*\
    \ that allows access to all objects. In the console, you can complete this task\
    \ by formulating a JSON document based on the following pattern:\n\n```\n{\n \
    \   \"Version\": \"2012-10-17\",\n    \"Statement\": [\n        {\n          \
    \  \"Sid\": \"PublicReadGetObject\",\n            \"Effect\": \"Allow\",\n   \
    \         \"Principal\": \"*\",\n            \"Action\": \"s3:GetObject\",\n \
    \           \"Resource\": \"arn:aws:s3:::my.public.bucket/*\"\n        }\n   \
    \ ]\n}\n```\n\nIn this code, replace *my.public.bucket* with the name of your\
    \ bucket. The *version* date, on the other hand, must not be changed.\n\n- Finally,\
    \ you must enable the **Static website hosting** option. At this point you'll\
    \ also learn at which HTTP address your bucket objects can be found. Next, specify\
    \ a starting document for web hosting, usually *index.html*.\n\nActually, this\
    \ page is intended as a starting point for the static website. For this example,\
    \ however, such a start page is not necessary at all. You can still upload a minimal\
    \ HTML file explaining the purpose of the website (for example, *This site hosts\
    \ PDF documents*).\n\n### 20.4.2 Script\n\nThe script starts with the initialization\
    \ of some variables. `Set-DefaultAWSRegion` and `Set-AWSCredential` set the region\
    \ and profile for all other AWS cmdlets. It then creates a temporary directory\
    \ where the PDF documents can be stored temporarily and uses `Invoke-WebRequest`\
    \ to download the HTML code to be processed.\n\n```\n# Sample file migrate-pdf-to-aws.ps1\n\
    $bucket = \"my.pdf.bucket\"\n$awsurl = `\"http://my.pdf.bucket.s3-website.eu-central-1.amazonaws.com/\"\
    `\n$region = \"eu-central-1\"\n$awsprofile = \"MyProfile\"     # profile for AWS\
    \ credentials\n$htmlsource = \"https://example.com/page-with-pdf-links.html\"\n\
    $htmldest = \"updated.html\"  # file name for new HTML code\n\n# create .\\tmp\
    \ directory\nNew-Item -ItemType Directory -Force tmp | Out-Null\n\n# set AWS default\
    \ region and profile\nSet-DefaultAWSRegion $region\nSet-AWSCredential -ProfileName\
    \ $awsprofile\n\n# download HTML code\n$response = Invoke-WebRequest $htmlsource\n\
    $html = $response.Content\n```\n\nThen, a loop now runs through all links in the\
    \ HTML document. If the link ends with .pdf, the file is first downloaded to the\
    \ local directory and then uploaded to the cloud. Replace then replaces the original\
    \ link address with the new one. (Note that Replace is more appropriate here than\
    \ the -replace operator, which processes regular expressions. A URL often contains\
    \ dots, which have a special meaning in regular expressions.) Finally, the script\
    \ saves the modified HTML code to a local file.\n\n```\n# (continued ...)\n# loop\
    \ through all links\nforeach ($link in $response.links) {\n    $href = $link.href\n\
    \    if ($href -match '.*pdf$') {\n        Write-Output $href\n        # extract\
    \ filename from URL\n        $filename = $href.Substring($href.LastIndexOf(\"\
    /\") + 1)\n        # download PDF\n        Invoke-WebRequest $href -OutFile tmp\\\
    $filename\n        # upload PDF to cloud\n        Write-S3Object -BucketName $bucket\
    \ -File tmp\\$filename `\n                      -Key $filename\n        # assemble\
    \ AWS URL for PDF\n        $pdfAtAws = \"$awsurl$filename\"\n        # update\
    \ link in HTML document\n        $html = $html.Replace(\"href=`\"$href`\"\",\n\
    \                             \"href=`\"$pdfAtAws`\"\")\n    }\n}\n# save modified\
    \ HTML code\n$html | Out-File $htmldest\n```\n\n### 20.4.3 Limitations\n\nBefore\
    \ you get the idea to apply this script to a real website, you should deal with\
    \ the not insignificant limitations:\n\n- Most modern websites are implemented\
    \ via a *content management system (CMS)*. The HTML code of a page consists of\
    \ various components. The script sees this HTML code in its entirety. But in fact,\
    \ you usually want to change only parts of it. For this task, the script would\
    \ need to have access to the single page within the CMS. Often, Markdown or a\
    \ CMS-specific language is used instead of HTML.\n- The direct links to the PDF\
    \ files in the AWS S3 bucket use only HTTP, not the contemporary HTTPS protocol.\
    \ This choice can be changed, but considerable configuration effort is needed.\
    \ The details are documented at [https://docs.aws.amazon.com/AmazonS3/latest/userguide/WebsiteHosting.html](https://docs.aws.amazon.com/AmazonS3/latest/userguide/WebsiteHosting.html).\n\
    - The script itself could also be optimized. It should consider only PDF links\
    \ referencing files of your own website. Foreign PDFs or PDFs that have already\
    \ been swapped out should not be processed again. A duplicate check is also recommended\
    \ to ensure that a document linked multiple times will only once be uploaded to\
    \ the cloud.\n- The script requires absolute links (i.e., `href=\"https://hostname/...\"\
    `). However, HTML also allows relative links (`href=\"mydocument.pdf\"`). If necessary,\
    \ you must supplement your script to this effect. Corresponding sample code—there,\
    \ however, formulated in Python—can be found in Chapter 17, Section 17.2.\n\n\
    In a nutshell, the implementation of the simple idea of this example faces several\
    \ hurdles in practice.\n\n## Chapter 21\n## Virtual Machines\n\nAs long as you\
    \ use virtual machines only sporadically, automation does not make any sense.\
    \ You may want to consider using a tool for faster setup of new virtual machines\
    \ (such as Vagrant).\nThe situation is completely different if you want to automatically\
    \ create, configure, maintain, and analyze a large number of virtual machines,\
    \ for example, for a lab (teaching), for cluster operation (science), or for scalable\
    \ deployment (container or server operation). Of course, there are all kinds of\
    \ special tools available for this type of use cases, from OpenStack to Kubernetes.\
    \ However, getting used to these monster programs is complicated and requires\
    \ intensive training. For simple tasks, a few small scripts are often sufficient.\n\
    The scripts in this chapter refer to the Kernel-based Virtual Machine (KVM) for\
    \ Linux and Microsoft Hyper-V for Windows virtualization systems.\n\n> **Prerequisites\
    \ for This Chapter**\n> In addition to a basic knowledge of Bash or PowerShell,\
    \ you’ll need a basic understanding of the relevant virtualization system and\
    \ of the underlying network technology for this chapter.\n> One of the examples\
    \ uses the `cut`, `grep`, and `sed` commands and applies regular expressions to\
    \ modify network configuration files. I covered the related basic principles in\
    \ Chapter 8 and in Chapter 9.\n> The SSH authentication with keys also plays a\
    \ role in the examples. If necessary, you should take another look at Chapter\
    \ 12.\n\n### 21.1 Setting Up and Running Virtual Machines (KVMs)\n\nThe starting\
    \ point for the following scripts is an Ubuntu server. The KVM virtualization\
    \ system, the `virsh` command from the `libvirt-clients` package, and the `virt-clone`\
    \ command from the package of the same name are installed there. The goal is to\
    \ run multiple similar virtual machines cloned from an existing virtual machine\
    \ named `vm-base`. The `vm-base` output system has three network interfaces and\
    \ four virtual disks."
  mdcn: "## 20.4 示例：将网站大文件卸载到云端\n\n以下示例的起点是你自己的网站。目标是将网站上链接的超大PDF文件替换为云端存储。因此，网站将继续由你自己的服务器运行。但是，当访客点击PDF下载链接时，该文件应从AWS\
    \ S3下载。这样，你可以继续自行管理网站，同时最大限度地减少大文件下载对Web服务器造成的负载。\n\n*migrate-pdf-to-aws.ps1*\
    \ 脚本的工作方式如下：\n\n- 它下载网页的HTML代码。\n- 它搜索所有链接，找出以 `.pdf` 结尾的链接。\n- 它首先将PDF文档下载到临时目录，然后上传到公共的AWS\
    \ S3存储桶。\n- 在HTML代码中，调整链接，并将新版本的HTML页面保存到本地。\n\n■ 第三条命令从存储桶下载 *readme.txt* 文件，并将其保存为本地文件\
    \ *local-file.txt*。\n■ 第四条命令将所有键以 `dir1/` 开头的文件下载到当前目录。\n\n```\n> Write-S3Object\
    \ -BucketName my.first.bucket -File local-file.txt\n> Write-S3Object -BucketName\
    \ my.first.bucket -File local.txt `\n                -Key dir1/tst.txt\n> Read-S3Object\
    \  -BucketName my.first.bucket -Key readme.txt `\n                 -File local-file.txt\n\
    > Read-S3Object  -BucketName my.first.bucket -KeyPrefix dir1/ `\n            \
    \     -Folder .\n```\n\n你可以使用 `Remove-S3Object` 删除存储桶中的文件：\n\n```\n> Remove-S3Object\
    \ -BucketName my.first.bucket -Key readme.txt\n```\n\n除了目前列出的cmdlet，AWS Tools\
    \ for PowerShell还提供了无数其他功能可供选择。所有S3 cmdlet的参考手册可在 *https://docs.aws.amazon.com/powershell/latest/reference/items/S3_cmdlets.html*\
    \ 找到。\n\n鉴于cmdlet数量众多，缺少一个非常重要的功能令人困惑：AWS Tools for PowerShell中没有任何cmdlet对应 `aws\
    \ s3 sync` CLI命令。如果你想将本地目录与存储桶同步，我建议你在PowerShell脚本中也使用CLI。\n\n### 20.4.1 准备工作\n\
    \n对于此示例，你需要一个在Web上公开可访问的存储桶。为此任务，需要在AWS控制台中进行多项设置：\n\n- 出于安全原因，新存储桶的所有公共访问默认被阻止。必须禁用相应的\
    \ **阻止所有公共访问** 选项。\n- 你需要设置一个允许访问所有对象的 *存储桶策略*。在控制台中，你可以通过基于以下模式编写JSON文档来完成此任务：\n\
    \n```\n{\n    \"Version\": \"2012-10-17\",\n    \"Statement\": [\n        {\n\
    \            \"Sid\": \"PublicReadGetObject\",\n            \"Effect\": \"Allow\"\
    ,\n            \"Principal\": \"*\",\n            \"Action\": \"s3:GetObject\"\
    ,\n            \"Resource\": \"arn:aws:s3:::my.public.bucket/*\"\n        }\n\
    \    ]\n}\n```\n\n在此代码中，将 *my.public.bucket* 替换为你的存储桶名称。另一方面，*version* 日期不得更改。\n\
    \n- 最后，你必须启用 **静态网站托管** 选项。此时你还将了解到你的存储桶对象可通过哪个HTTP地址访问。接下来，为网站托管指定一个起始文档，通常是\
    \ *index.html*。\n\n实际上，此页面旨在作为静态网站的起点。然而，对于此示例，这样的起始页面完全不是必需的。你仍然可以上传一个最小的HTML文件来解释网站的目的（例如，*此站点托管PDF文档*）。\n\
    \n### 20.4.2 脚本\n\n脚本以初始化一些变量开始。`Set-DefaultAWSRegion` 和 `Set-AWSCredential` 为所有其他AWS\
    \ cmdlet设置区域和配置文件。然后，它创建一个临时目录，用于临时存储PDF文档，并使用 `Invoke-WebRequest` 下载要处理的HTML代码。\n\
    \n```\n# 示例文件 migrate-pdf-to-aws.ps1\n$bucket = \"my.pdf.bucket\"\n$awsurl = `\"\
    http://my.pdf.bucket.s3-website.eu-central-1.amazonaws.com/\"`\n$region = \"eu-central-1\"\
    \n$awsprofile = \"MyProfile\"     # AWS凭证配置文件\n$htmlsource = \"https://example.com/page-with-pdf-links.html\"\
    \n$htmldest = \"updated.html\"  # 新HTML代码的文件名\n\n# 创建 .\\tmp 目录\nNew-Item -ItemType\
    \ Directory -Force tmp | Out-Null\n\n# 设置AWS默认区域和配置文件\nSet-DefaultAWSRegion $region\n\
    Set-AWSCredential -ProfileName $awsprofile\n\n# 下载HTML代码\n$response = Invoke-WebRequest\
    \ $htmlsource\n$html = $response.Content\n```\n\n然后，一个循环现在遍历HTML文档中的所有链接。如果链接以.pdf结尾，则首先将文件下载到本地目录，然后上传到云端。然后，Replace将原始链接地址替换为新的地址。（注意，Replace在这里比-replace运算符更合适，后者处理正则表达式。URL通常包含点，而点在正则表达式中具有特殊含义。）最后，脚本将修改后的HTML代码保存到本地文件。\n\
    \n```\n# （续...）\n# 遍历所有链接\nforeach ($link in $response.links) {\n    $href = $link.href\n\
    \    if ($href -match '.*pdf$') {\n        Write-Output $href\n        # 从URL中提取文件名\n\
    \        $filename = $href.Substring($href.LastIndexOf(\"/\") + 1)\n        #\
    \ 下载PDF\n        Invoke-WebRequest $href -OutFile tmp\\$filename\n        # 上传PDF到云端\n\
    \        Write-S3Object -BucketName $bucket -File tmp\\$filename `\n         \
    \             -Key $filename\n        # 组装PDF的AWS URL\n        $pdfAtAws = \"\
    $awsurl$filename\"\n        # 更新HTML文档中的链接\n        $html = $html.Replace(\"href=`\"\
    $href`\"\",\n                             \"href=`\"$pdfAtAws`\"\")\n    }\n}\n\
    # 保存修改后的HTML代码\n$html | Out-File $htmldest\n```\n\n### 20.4.3 局限性\n\n在你考虑将此脚本应用于真实网站之前，你应该了解其不容忽视的局限性：\n\
    \n- 大多数现代网站是通过 *内容管理系统（CMS）* 实现的。页面的HTML代码由各种组件组成。脚本看到的是完整的HTML代码。但实际上，你通常只想更改其中的一部分。为此任务，脚本需要能够访问CMS中的单个页面。通常，使用Markdown或CMS特定语言而不是HTML。\n\
    - AWS S3存储桶中PDF文件的直接链接仅使用HTTP，而非现代的HTTPS协议。此选择可以更改，但需要大量的配置工作。详细信息记录在 [https://docs.aws.amazon.com/AmazonS3/latest/userguide/WebsiteHosting.html](https://docs.aws.amazon.com/AmazonS3/latest/userguide/WebsiteHosting.html)。\n\
    - 脚本本身也可以优化。它应该只考虑引用你自己网站文件的PDF链接。外部PDF或已经替换过的PDF不应再次处理。建议进行重复检查，以确保链接多次的文档只会上传一次到云端。\n\
    - 脚本需要绝对链接（即 `href=\"https://hostname/...\"`）。然而，HTML也允许相对链接（`href=\"mydocument.pdf\"\
    `）。如有必要，你必须相应地补充你的脚本。相应的示例代码——不过那里是用Python编写的——可以在第17章第17.2节找到。\n\n简而言之，这个简单想法的实现在实践中面临几个障碍。\n\
    \n## 第21章\n## 虚拟机\n\n只要你只是偶尔使用虚拟机，自动化没有任何意义。你可能想考虑使用一个工具来更快地设置新的虚拟机（例如Vagrant）。\n\
    如果你想自动创建、配置、维护和分析大量虚拟机，例如用于实验室（教学）、集群运行（科学）或可扩展部署（容器或服务器运行），情况就完全不同了。当然，有各种各样的特殊工具可用于此类用例，从OpenStack到Kubernetes。然而，习惯这些庞大的程序很复杂，需要密集培训。对于简单任务，几个小脚本通常就足够了。\n\
    本章中的脚本涉及Linux的基于内核的虚拟机（KVM）和Windows的Microsoft Hyper-V虚拟化系统。\n\n> **本章先决条件**\n\
    > 除了Bash或PowerShell的基础知识外，你还需要对相关虚拟化系统和底层网络技术有基本的了解。\n> 其中一个示例使用了 `cut`、`grep`\
    \ 和 `sed` 命令，并应用正则表达式来修改网络配置文件。我在第8章和第9章介绍了相关的基本原理。\n> 使用密钥的SSH认证在示例中也起着作用。如有必要，你应该再看一下第12章。\n\
    \n### 21.1 设置和运行虚拟机（KVM）\n\n以下脚本的起点是一个Ubuntu服务器。KVM虚拟化系统、来自 `libvirt-clients`\
    \ 包的 `virsh` 命令以及来自同名包的 `virt-clone` 命令已安装在那里。目标是从名为 `vm-base` 的现有虚拟机克隆运行多个类似的虚拟机。`vm-base`\
    \ 输出系统有三个网络接口和四个虚拟磁盘。"
