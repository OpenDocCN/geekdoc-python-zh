  md: '# 3.9.5 Predefined Variables


    Bash scripts can access predefined variables (see Table 3.6). These variables
    can only be read, but not changed. The abbreviation PID stands for *process ID*
    (i.e., the internal process number).


    | Variable | Meaning |

    | :--- | :--- |

    | $# | Number of parameters passed to the script |

    | $0 | Filename of the executed script |

    | $1 to $9 | Parameters 1 to 9 |

    | ${10}, ${11} | Access to additional parameters |

    | $* or $@ | Totality of all passed parameters |

    | $? | Return value of the last command |

    | $! | PID of the last started background process |

    | $$ | PID of the current shell |


    Table 3.6 Predefined Bash Variables


    In practice, the analysis of the parameters passed to a script is particularly
    important. Their number is indicated by $#. You can access the individual parameters
    via $1, $2, and so on. Examples of the analysis of many parameters in loops or
    via `case` constructs are included in Section 3.11 and Section 3.12.


    # 3.9.6 Environment Variables


    Ordinary variables lose their validity after the execution of a script. Environment
    variables declared or modified using `export myvar=...` are excluded from this
    rule. `printenv` lists all environment variables with their current value. Important
    environment variables (see Table 3.7) are preset in `/etc/profile`, in `.profile`,
    and in `.bashrc` or `.zshrc`.


    | Variable | Meaning |

    | :--- | :--- |

    | HOME | The home directory |

    | LANG | Localization settings (i.e., language and character set) |

    | PATH | Directories in which programs are searched for |

    | PS1 | Content/appearance of the command prompt |

    | PWD | The current directory |


    Table 3.7 Important Environment Variables'
