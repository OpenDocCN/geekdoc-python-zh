- md: "## Multiline Text\n\nWhen regular expressions are applied to longer texts or\
    \ text files, then usually each line is considered separately. Some regex tools\
    \ or functions provide options to perform expression recognition across multiple\
    \ lines. However, you should make sure to carry out performance tests before using\
    \ such an option indiscriminately!\n\n## 9.2.4 Exercise Pages and Cheat Sheets\n\
    \nBefore you can use regular expressions with any degree of confidence, you need\
    \ to practice! Several great websites exist where you can solve a series of exercises\
    \ of increasing complexity—complete with solutions and explanations. Just invest\
    \ an hour on one of these sites—I promise it will be worth it!\n\n- https://regexone.com\n\
    - http://regextutorials.com\n\nFor those of you who already have some routine\
    \ with regular expressions, there are web pages where you can enter regular expressions\
    \ and apply them immediately to test data. When I need to develop complicated\
    \ patterns, I *always* use a page like this before incorporating the now working\
    \ code into my script! Note, however, that both sites support only PCRE dialects:\n\
    \n- https://regex101.com\n- https://regexr.com\n\n![Figure 9.1 Testing a Regular\
    \ Expression for Processing Apache Log Files](img/a7fa45d496335c22ffb14c3275e24ffb_273_0.png)\n\
    \nI have internalized the most important regex characters over the years, but\
    \ for the details, I must read again and again. A useful tool in this context\
    \ are “cheat sheets” that summarize the most important codes on a single page\
    \ that you can print out, such as the following:\n\n- https://github.com/shadowbq/Cheat-Sheets/raw/master/regex/regular-expressions-cheat-sheet-v2.pdf\n\
    - https://jamesbachini.com/resources/REGEXCheatSheet.pdf\n\n> **Composing Regular\
    \ Expressions Using Artificial Intelligence (AI)**\n> AI tools like ChatGPT also\
    \ understand regular expressions. The input “Can you show me a regular expression\
    \ for recognizing email addresses?” immediately returns a result along with explanations\
    \ of what the individual characters of the expression mean. However, especially\
    \ with complex tasks, you should check whether the result really meets your requirements!\
    \ ChatGPT likes to present solutions with great confidence but may not cover all\
    \ matches or may filter out too much.\n\n## 9.2.5 Example: Recognizing a Date\n\
    \nLet’s assume your script is supposed to process a date in International Organization\
    \ for Standardization (ISO) format (yyyy-mm-dd), either as input or from a file.\
    \ A simple regular expression that basically works looks like `\\d{4}-\\d{2}-\\\
    d{2}`.\nThe date consists of eight digits separated by two hyphens. However, the\
    \ pattern also accepts completely insane data, such as 4375-52-68. With only a\
    \ little effort, you can delimit the permissible value ranges quite easily, in\
    \ this case, to the years between 0000 and 2999, the months between 01 and 12,\
    \ and the days between 0 and 31. The following expression is not perfect but at\
    \ least prevents complete input errors:\n\n```\n[012]\\d{3}-(0[1-9]|10|11|12)-([012]\\\
    d|30|31)\n```\n\n## 9.2.6 Example: Recognizing IPv4 Addresses\n\nYou can also\
    \ be more or less exact with IPv4 addresses. To extract IP addresses from a logging\
    \ file, which will contain only correct addresses anyway, the following expression\
    \ is sufficient:\n\n```\n(\\d{1,3}\\.){3}\\d{1,3}\n```\n\n- `\\d{1,3}` requires\
    \ a 1- to 3-digit number.\n- `\\.` requires a dot. Do not forget the preceding\
    \ `\\` character. Just `.` allows any character!\n- `(...){3}` causes a tripling\
    \ of this expression, so that it would capture “12.3.” for IP address 1.2.3.4.\
    \ Note that `{4}` would be wrong because the IP address would have to end with\
    \ a dot.\n- Now, `\\d{1,3}` is still missing for the last digit.\n\nMore exact\
    \ expressions, which accept only the number range from 0 to 255 for each digit,\
    \ can be found at https://stackoverflow.com/questions/5284147.\n\n## 9.2.7 Example:\
    \ Recognizing Email Addresses\n\nFor a rough check if an email address is correct,\
    \ you can use the following expression:\n\n```\n[a-zA-Z0-9+_.-]+@[a-zA-Z0-9.-]+\n\
    ```\n\nIn this case, too, perfectionists will find completely unreadable patterns\
    \ on Stack Overflow, which, however, take into account all conceivable rules and\
    \ special cases.\n\n## 9.3 Regular Expressions in Bash (grep, sed)\n\nYou should\
    \ now understand the basic principles of regular expressions. Let me point out\
    \ again that, in the previous section, I only outlined the most important syntax\
    \ rules. Whole books of hundreds of pages are available that focus exclusively\
    \ on this subject, covering every conceivable variation.\n\nIn this and the following\
    \ sections, we want to look at the application of regular expressions. At this\
    \ point, I'll start with Bash, focusing mostly on the `grep` and `sed` commands.\n\
    \n### 9.3.1 Bash Comparison Operator for Regular Expressions\n\nIn an elementary\
    \ way, Bash and Zsh can process regular patterns without external tools. For this\
    \ purpose, you can use the `=~` comparison operator, which you must apply in double\
    \ square brackets.\n\n```\nif [[ string =~ pattern ]]; then;\n    echo \"string\
    \ matches pattern\"\nfi\n```\n\nIn this case, ERE patterns are used. You must\
    \ therefore use POSIX-compliant expressions such as `[:digit:]` or `[:alnum:]`\
    \ instead of the short notations `\\d` for *digit* or `\\w` for *word*. Alternatively,\
    \ you can formulate character ranges directly with `[0-9]`.\n\nFor example, the\
    \ `=~` operator can be used to validate an input. In the following example, the\
    \ script expects the input of a date `yyyy-mm-dd` in the format. If even the format\
    \ of the string does not correspond to the specified format, the input must be\
    \ repeated.\n\nThe expression expects year numbers in the range between 1900 and\
    \ 2099, months between 01 and 12, and days between 00 and 31. Note that the expression\
    \ does accept some invalid data, such as `2000-01-00` or `2023-04-31`.\n\n```\n\
    # Sample file input-date.sh\npattern='^(19|20)[0-9]{2}-(0[1-9]|10|11|12)-([012][0-9]|30|31)$'\n\
    while true; do\n    read -p \"Enter a date in ISO format (yyyy-mm-dd): \" date\n\
    \    if [[ $date =~ $pattern ]]; then\n        break\n    else\n        echo \"\
    Invalid date, please try again.\"\n    fi\ndone\necho \"Valid date: $date\"\n\
    ```\n\n### 9.3.2 Filtering Text Using grep\n\nYou already learned about the grep\
    \ command in Chapter 6 and Chapter 8. So far, we have used this command as a simple\
    \ text filter. In fact, however, the first parameter passed to grep is analyzed\
    \ as a regular pattern, by default in simple POSIX syntax. However, the command\
    \ can also handle the ERE and PCRE regex dialects:\n\n- `-e`: Enable ERE\n- `-P`:\
    \ Enable PCRE\n- `-o` or `--only-matching`: Output only the expression that matches\
    \ the pattern (i.e., do not display the entire line)\n\nTo avoid the various regex\
    \ special characters being analyzed by Bash, you should pass the pattern in quotes.\n\
    \nThe following command filters all IPv4 addresses from the access.log logging\
    \ file and displays only the addresses. (You can find the file in the sample files\
    \ for the previous chapter.)\n\n```\n$ grep -o -P '(\\d{1,3}\\.){3}\\d{1,3}' access.log\n\
    \n221.245.9.91\n135.84.251.52\n160.85.252.207\n...\n```\n\nIf you want to extract\
    \ all IPv6 addresses in an analogous manner, you can call grep using the following\
    \ expression:\n\n```\n$ grep -o -P '([\\da-f]*:){1,7}\\d{1,4}' access.log\n```\n\
    \nThe search pattern works for most “common” IPv6 addresses. However, the IPv6\
    \ syntax allows for various special cases, whose correct processing requires much\
    \ more complex (and slower!) patterns. If necessary, you should look at the following\
    \ Stack Overflow webpage: https://stackoverflow.com/questions/53497.\n\n### 9.3.3\
    \ The \"sed\" Stream Editor\n\nThe `sed` *Stream Editor* is a universal command\
    \ for text processing. You pass a command in the first parameter that `sed` applies\
    \ to the standard input or to the file specified in the next parameter. The processed\
    \ text is written to the standard output.\nIn the GNU variant of `sed` that's\
    \ common on Linux, the `-i` (*in place*) option causes the source file to be modified\
    \ directly. `-i.bak` creates a backup of the source file with the `.bak` identifier.\n\
    \n> **GNU versus BSD**\n> In the BSD variant of `sed`, which is installed on macOS,\
    \ for example, the `-i` option has a different meaning. In general, some other\
    \ small differences exist between GNU `sed` and BSD `sed`. If necessary, you can\
    \ install the GNU variant of `sed` using `brew`!\n\nThe following introductory\
    \ example shows the delete command `d`. This example reads the `myfile.txt` file,\
    \ deletes lines 3 to 5, and writes all other lines to the `out.txt` file.\n\n\
    ```\n$ sed 3,5d myfile.txt > out.txt\n```\n\nIf you want to pass multiple commands\
    \ to `sed`, you can use `-e`:\n\n```\n$ sed -e 'cmd1' -e 'cmd2' in.txt > out.txt\n\
    ```\n\nAlternatively, you can save the commands in a separate file and process\
    \ that file using `-f`:\n\n```\n$ sed -f sedcmds.txt in.txt > out.txt\n```\n\n\
    `sed` can also process regular expressions. In that case, POSIX Regular Expressions\
    \ are used by default. With the equivalent `-E` or `-r` options, `sed` also supports\
    \ ERE. Unlike `grep`, there is unfortunately no option for PCRE.\nIn the following\
    \ command, `sed` searches for lines that start with an IPv4 address. These lines\
    \ will be deleted. All other lines are stored in `ipv6.log`. The search pattern\
    \ is usually formulated between two slashes. However, if you need to use the slash\
    \ itself in the expression, you can use any other character that does not appear\
    \ in it. But the entire expression must then start with a backslash. The following\
    \ two commands are therefore equivalent:\n\n```\n$ sed -E '/^([0-9]{1,3}\\.){3}[0-9]{1,3}/d'\
    \ access.log > ipv6.log\n$ sed -E '\\@^([0-9]{1,3}\\.){3}[0-9]{1,3}@d' access.log\
    \ > ipv6.log\n```"
