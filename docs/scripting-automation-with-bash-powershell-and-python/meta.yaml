    \n# 19.3.1 PyMySQL\n\nSeveral Python modules are available for accessing MySQL\
    \ or MariaDB databases, but I want to focus on PyMySQL in this section. The module\
    \ is easy to install, is easy to use, and has proven itself in my work. You can\
    \ find more information about alternative MySQL or database modules at the following\
    \ links:\n\n+   - https://stackoverflow.com/questions/372885\n- https://wiki.openstack.org/wiki/PyMySQL_evaluation\n\
    \nAs usual, PyMySQL must be installed using pip:\n\n```\n$ pip install requests\
    \ (Windows, Linux)\n$ pip3 install requests (macOS, old Linux distributions)\n\
    ```\n\nWhen you establish a connection using `connect`, you need to specify the\
    \ hostname of the server (`localhost` if the database server is running on the\
    \ same machine as your script), the username, password, and the name of the database\
    \ you want to access.\n\nMySQL and MariaDB support various UTF-8 variants. For\
    \ the interaction with Python, `utf8mb4` is the best solution. The `cursorclass`\
    \ parameter controls the way PyMySQL returns `SELECT` results. The `DictCursor`\
    \ cursor type wraps each data record in a dictionary, using the column names as\
    \ keys. This facilitates further processing of the results.\n\nEach time you want\
    \ to run a SQL command, you need a cursor object. I recommend using such cursors\
    \ with `with` because, in this way, you can ensure that you release the objects\
    \ as soon as possible and do not block unnecessary resources.\n\nThe string with\
    \ the SQL command must then be passed to the `execute` method. The command can\
    \ contain any number of `%s` codes. `execute` replaces them with strings from\
    \ the tuple, list, or dictionary passed in the second parameter. Note that no\
    \ other codes are allowed here, such as `%d` for numbers, for example. If you\
    \ want to store `NULL`, you must use the Python keyword `None`.\n\n```\n# Sample\
    \ file hello-pymysql.py\nconn = pymysql.connect(host='localhost',\n          \
    \             user='username',\n                       password='topsecret',\n\
    \                       db='dbname',\n                       port=3306,\n    \
    \                   charset='utf8mb4',\n                       cursorclass=pymysql.cursors.DictCursor)\n\
    ```"
  merge: -1
  pgno: 426
