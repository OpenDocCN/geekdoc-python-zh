    > **Never Share Your Private Key!**


    SSH keys are also required by many hosting providers to set up new servers or
    virtual machines, by Git portals to authenticate Git commands, and so on. Always
    be sure you only pass or upload the public component of the key (*.pub* identifier)—and
    never the private component!


    The keys that consist of two components do not correspond to our human imagination.
    The following analogy fits better:


    - The private SSH key is equivalent to a conventional key.

    - The public SSH key, on the other hand, corresponds to a lock.


    Thus, you have an unlimited supply of locks (copies of the public key) that you
    can place in any place you can think of, especially on foreign servers. However,
    you never let the corresponding key—the private key file—out of your hand.


    # 12.4.2 Storing the Public Component of the Key on the Server (macOS and Linux)


    If you work on a Linux or macOS client, the second step is also quite simple:
    You can use `ssh-copy-id` to copy the public component of your key to the user
    directory of the desired account on the server. Then, replace `name` with the
    account name (login name) and replace `hostname` with the computer name.


    ```

    $ ssh-copy-id name@hostname


    name@hostname''s password: ********

    ```


    Subsequently, you can try out whether everything has worked. SSH login should
    now be possible without going through a password request:


    ```

    $ ssh name@hostname          (login without password!)

    ```


