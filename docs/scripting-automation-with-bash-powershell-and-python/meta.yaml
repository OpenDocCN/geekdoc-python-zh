    Also, later it will be the case that you try out individual commands in parallel
    to your script editor in a terminal window. Only when the commands work the way
    you want them to should you incorporate them into your script.


    In the following example, you first go to the Downloads directory using cd (change
    directory) and then use ls (list) to see which files are stored in that directory:


    ```

    $ cd Downloads

    $ ls


    00a_intro_pn.pdf

    00b_about_pn.pdf

    00c_next_pn.pdf

    ...

    ```


    ls with the -l option (long) shows more details about each file such as the access
    rights, the owner and group assignment, the size and the time of the last modification,
    among other things:


    ```

    $ ls -l


    -rw-r--r-- 1 kofler kofler 674076 ... 11:49 00a_intro_pn.pdf

    -rw-r--r-- 1 kofler kofler 943948 ... 11:53 00b_about_pn.pdf

    -rw-r--r-- 1 kofler kofler 714852 ... 11:58 00c_next_pn.pdf

    ...

    ```


    If you want to know how many files there are in the directory, you should pass
    the output of ls to wc (word count). The command returns three numbers. The first
    one indicates the number of lines, the second the number of words, and the third
    the number of characters. Since ls prints each file on a separate line, only the
    number of lines is relevant. The wc option -l (lines) reduces the output accordingly.


    ```

    $ ls | wc


    116 159 3194


    $ ls | wc -l


    116

    ```


    With these trivial commands you have already learned a lot:


    +   - The most commonly used commands in Bash have very short names. At first,
    these names are not very intuitive. However, once you get used to it, the typing
    effort is minimal.

    - The behavior of commands can be controlled by options. Many options consist
    of only one letter, and they are preceded by a hyphen. Often, an alternative long
    form'
  - '[PAGE 54]


    exists that is preceded by *two* hyphens. For example, `wc --lines` and `wc -l`
    are equivalent.


    +   - Commands can be linked with the pipe operator (`|`). I will discuss this
    operator in more detail later in [Section 3.7.2](Section 3.7.2). In short, `command1
    | command2` means that `command1` does not display its text output but passes
    it to `command2` for processing.


    > ### The Prompt

    The "prompt" is the string that is displayed to the left of the cursor when new
    commands are entered. On Linux, it is common for the prompt to end with the `$`
    character for ordinary users. If, on the other hand, the system administrator
    `root` is working, the prompt ends with `#`.


    The prompt is adjustable (environment variable `PS1`) and can therefore look quite
    different depending on the distribution and configuration. Often, the current
    directory and/or hostname are displayed before the `$` or `#` character.


    In this book, commands to be executed in Bash or Zsh are preceded by the `$` character.
    (It should be clear to you by now that this character must *not* be entered.)
    PowerShell commands are preceded by the `>` character because the Windows prompt
    uses this character.


    This chapter is a special case: Since it is clear anyway that the examples refer
    to Bash, I often omit the prompt altogether. I especially omit the prompt when
    presenting techniques that work equally well interactively in the terminal or
    as code in a script.


    # ### 3.3.1 Operating the Terminal


    You have probably already noticed that the mouse is largely useless in the terminal.
    You cannot use it to change the cursor position as in other programs. Entries
    can only be made in the last line of the terminal. (On Linux, you can mark text
    with a mouse and paste it with the middle mouse button at the current cursor position
    without copying the text to the clipboard.)


    This poor mouse support is compensated by many keyboard shortcuts that enable
    you to edit the current input line and revert to past input (see [Table 3.1](Table
    3.1)).


    | Shortcut | Meaning |

    | :--- | :--- |

    | `Tab` | Completes a command or a name |

    | `Ctrl` + `A` | Places the cursor at the beginning of the line |

    | `Ctrl` + `C` | Aborts the input or stops a running command |

    | `Ctrl` + `D` | Deletes the character at the cursor position |

    | `Ctrl` + `E` | Places the cursor at the end of the line |


    **Table 3.1** Keyboard Shortcuts in the Terminal'
  - '[PAGE 55]


    | Shortcut | Meaning |

    | :--- | :--- |

    | `Ctrl` + `K` | Deletes everything up to the end of the line |

    | `Ctrl` + `R` abc | Searches for a previously executed command abc |

    | `Ctrl` + `Y` | Inserts the last deleted text again |

    | `Alt` + `Backspace` | Deletes a word backwards |


    Table 3.1 Keyboard Shortcuts in the Terminal (Cont.)


    The `Tab` shortcut is particularly useful as it saves a lot of typing: You only
    need to specify the first letters of a command, directory, or file, then press
    `Tab`. If the command, directory, or filename is already clearly recognizable,
    it is completed in full; otherwise, only until several options are eliminated.
    Pressing `Tab` twice displays a list of all possible completion values.


    # 3.3.2 Online Help


    Commands like `ls` or `wc` do not have a help menu. But help texts for these commands
    are available that can be read via other commands. As a first attempt, you should
    call `<command> --help` (for example, `ls --help`). This command will usually
    give you a list of all the options along with a brief explanation of what they
    mean.


    `man <command>` displays a longer info text for many commands. Thus, `man ls`
    explains how to use the `ls` command and what options are available. You can navigate
    through the multi-page text using the cursor keys. The space bar scrolls down
    an entire page. Using `/` you can search for an expression in the help text. `N`
    jumps to the next search result if necessary, and `Q` closes the help interface.


    # 3.3.3 Command Reference


    Throughout this book, I will introduce you to a lot of Linux commands. A good
    starting point in this regard is [Chapter 6](Chapter 6).


    # 3.4 Zsh as an Alternative to Bash


    I mentioned at the start of this chapter, for the core topic of this book (i.e.,
    for programming scripts), Zsh plays only a minor role. For compatibility reasons,
    a better approach is to use Bash for programming scripts, and even to forgo the
    use of some Bash-specific extensions over other shells. In this way, you can make
    your scripts really work in almost any environment.


    The appeal of Zsh lies rather in its interactive application: Zsh takes an even
    smarter approach than Bash when expanding command, file, and directory names when
    you'
  - '[PAGE 56]


    press Tab. You don’t have to specify the initial letters; instead, a combination
    of letters that occurs somewhere in the name is sufficient. In addition, Zsh provides
    more configuration options and extension modules. Since I’ve gotten to know the
    comfort of Zsh in combination with the Oh My Zsh extension, “ordinary” Bash is
    no longer good enough for me!


    # 3.4.1 Installation


    macOS as well as selected Linux distributions already rely on Zsh by default.
    For all other Linux distributions, you can install Zsh effortlessly with the respective
    package management tool. On Debian and Ubuntu, you would use the following commands:


    ```

    $ sudo apt update

    $ sudo apt install zsh

    ```


    In the next step, you can activate Zsh for your account:


    ```

    $ chsh -s $(which zsh)

    ```


    For this change to take effect, you must log out and log back in. Now, when you
    open a terminal for the first time, a configuration script runs once:


    ```

    This is the Z Shell configuration function for new users,

    zsh-newuser-install. (...) You can

    (q) Quit and do nothing. The function will be run again next

    time.

    (0) Exit, creating the file ~/.zshrc containing just a comment.

    That will prevent this function being run again.

    (1) Continue to the main menu.

    (2) Populate your ~/.zshrc with the configuration recommended

    by the system administrator and exit.

    ```


    You’re not doing anything wrong if you simply take the default settings suggested
    by the script or the default configuration file .zshrc (point 2) provided by your
    distribution in the manual configuration (point 1). If necessary, you can repeat
    and adjust the configuration later via zsh-newuser-install.


    To use Zsh on Windows, the same recommendations apply as for Bash: Install Linux
    in WSL or as a virtual machine and run Zsh there! The switch from Bash to Zsh
    can be done as we’ve described here.


    # 3.4.2 Zsh Configuration (/etc/zshrc and .zshrc)


    Similar to Bash, Zsh also evaluates some configuration files at startup. The most
    important ones are /etc/zshrc for global settings and .zshrc in your home directory.'
- md: "## 3.4.3 Oh My Zsh\n\nFor Zsh, many plugins are available on the internet that\
    \ provide additional functionality, as well as themes that change the look of\
    \ the command prompts. *Oh My Zsh* is a script that helps manage such extensions.\
    \ Various plugins and themes are included right away and more can be added later.\n\
    \nTo install, download a small script from the project page *https://github.com/ohmyzsh/ohmyzsh*\
    \ and run it. The script requires that the `git` command from the package of the\
    \ same name is available. Instead of typing the following command, you should\
    \ copy the code from the Oh My Zsh GitHub page:\n\n```\n$ sh -c \"$(curl -fsSL\
    \ https://raw.githubusercontent.com/ohmyzsh/ohmyzsh/master/tools/install.sh)\"\
    \n```\n\nDuring the installation, the `.zshrc` file will be overwritten. The previous\
    \ content ends up in a backup file named `.zshrc.pre-oh-my-zsh`. Oh My Zsh will\
    \ test for updates at startup in the future. Accordingly, when you open a new\
    \ terminal window, you're often prompted to update Oh My Zsh.\n\nIn the basic\
    \ configuration, the prompt has the `robbyrussell` theme by default. As the only\
    \ active plugin, `git` contributes countless aliases that help with the operation\
    \ of Git. A guide to the many functions and tips for further configuration of\
    \ Oh My Zsh can be found, for example, at *https://ohmyz.sh* or in the following\
    \ blog: *https://stackabuse.com/pimp-my-terminal-an-introduction-to-oh-my-zsh*.\n\
    \n## 3.5 The First Bash Script\n\nAfter this short excursion to Zsh, we'll now\
    \ return to Bash. Before I introduce you to the syntax of Bash including various\
    \ programming and working techniques in this chapter, I want to use this section\
    \ to explain what a script actually is. As a matter of fact, this is quite simple:\
    \ A script is a text file in which you formulate the same commands that you enter\
    \ interactively in the terminal. Only two special features distinguish a script\
    \ from just commands: The first line of the script must contain what's called\
    \ a *shebang*, and the file must be marked as an executable using `chmod`.\n\n\
    ### 3.5.1 Hash Bang (Shebang)\n\nThe first line of a script to be executed on\
    \ Linux or macOS must start with the characters, `#` (\"hash\" or \"sharp\") and\
    \ `!` (\"bang\") as well as the path of the interpreter. \"Shebang\" is a linguistic\
    \ shortening of \"sharp bang.\"\n\nThe interpreter is the program that reads and\
    \ processes the script file, and in this chapter, that interpreter is Bash (or\
    \ in exceptional cases Zsh). However, other programming languages can also be\
    \ used as interpreters, such as Python or Perl.\n\nOn Linux, the `Bash` program\
    \ is predominantly installed in the `/bin` directory. Thus, a Bash script starts\
    \ with the following line:\n\n```\n#!/bin/bash\n```\n\n### 3.5.2 Shebang Variants\n\
    \nDepending on which distribution or Unix-like system you're working in, Bash\
    \ may be installed in a different directory, such as `/usr/bin`. Using `which\
    \ bash`, you can determine the location on your computer as in the following example:\n\
    \n```\n$ which bash\n\n/usr/bin/bash\n```\n\nLinks often make sure that both `/usr/bin/bash`\
    \ and `/bin/bash` work. A general-purpose hash bang formulation that works regardless\
    \ of the location uses the `/usr/bin/env` command. This command searches all common\
    \ locations:\n\n```\n#!/usr/bin/env bash\n```\n\nIf Bash is not installed on your\
    \ machine at all and you're using Zsh, you'll want to replace `/bin/bash` with\
    \ `/bin/zsh` (or the location where Zsh is installed on your machine):\n\n```\n\
    #!/bin/zsh\n```\n\nIf you want your script to work regardless of whether Bash\
    \ or Zsh is available, the following hash bang will get you there:\n\n```\n#!/bin/sh\n\
    ```\n\n`sh` is a link that points to the default shell on most Linux systems.\
    \ However, you must be aware that different shells will be used from now on when\
    \ your script is run, depending on the computer/distribution. For example, on\
    \ Debian and Ubuntu, the speed-optimized Dash will be executed. When formulating\
    \ your scripts, you must be careful not to use any Bash-specific extensions that\
    \ are not available in other shells.\n\n> **What Now?**\n> I know it's annoying\
    \ that, in the IT world, for every rule there are three exceptions and then five\
    \ special cases. Unless there are compelling reasons not to, you should always\
    \ use `#!/bin/bash` as the hash bang. The sample files for this book also use\
    \ this code.\n\n### 3.5.3 Making the Script Executable (chmod +x)\n\nAll Unix-like\
    \ systems including Linux and macOS store some access bits along with each file\
    \ that provide information about who is allowed to read, write, and execute the\
    \ file. For scripts, the execute bit (x for short) is crucial. Only with this\
    \ bit can a script be executed later like a command.\n\nTo set the execute bit,\
    \ you need to run the following command once in the terminal. Note that the `chmod`\
    \ variant of macOS does not understand the `+x` short notation. You must explicitly\
    \ specify for whom the execute bit is set. `a` means “for all.”\n\n```\n$ chmod\
    \ +x my-script-file.sh    (Linux, Git Bash)\n$ chmod a+x my-script-file.sh   (macOS)\n\
    ```\n\nThus, `chmod` is used to change the access bits. The command supports quite\
    \ diverse syntax variants. (You can run `man chmod` if you’re interested in the\
    \ details). For us, only the `chmod +x` variant is relevant, for setting the execute\
    \ bit.\n\n> **The .sh Identifier**\n> All Bash sample files in this book end with\
    \ `.sh`. Although this file extension is common, using it is by no means mandatory.\
    \ Bash scripts can work without an identifier (and even with a wrong identifier),\
    \ provided the hash bang is correct.\n> Since this book covers PowerShell (`.ps1`)\
    \ and Python (`.py`) in addition to Bash, the identifier helps with the assignment\
    \ of the sample files.\n\n### 3.5.4 Hello, World!\n\nTo write your first script,\
    \ you want to launch your favorite editor: Visual Studio Code (VS Code) is a good\
    \ choice, but any editor is fine, including the minimalist `nano` program that\
    \ you can run directly in a terminal. Then, enter the following two lines:\n\n\
    ```\n#!/bin/bash\necho \"Hello, World!\"\n```\n\nSave this file as `hello-world.sh`.\
    \ By using `chmod`, make the script executable, with the following command:\n\n\
    ```\n$ chmod +x hello-world.sh    (Linux, Git Bash)\n$ chmod a+x hello-world.sh\
    \   (macOS)\n```\n\nTo check if a script works, you need to type its name and\
    \ press `Enter`. Note that you must prefix the name with `./`. In this way, you\
    \ tell Bash to look for your script in the current directory. (`.` is a short\
    \ notation for the currently active directory.)\n\n```\n$ ./hello-world.sh\nHello,\
    \ World!\n```\n\n> **If Script Execution Does Not Work**\n> If the execution of\
    \ a script triggers an error, various reasons may be the cause:\n> - Did you specify\
    \ the filename correctly?\n> - Did you use `chmod +x`?\n> - Did you specify the\
    \ hash bang line correctly?\n> - Is Bash not installed on your computer at all?\
    \ If you want to run the script using Zsh, you need to change the hash bang to\
    \ `#!/bin/zsh` or `#!/bin/sh`.\n\n### 3.5.5 Elementary Syntax Rules\n\nBesides\
    \ the hash bang, you must follow a few other rules in your scripts:\n\n- Lines\
    \ beginning with `#` are comments and are not evaluated.\n- You can use the `\\\
    ` character for long commands that run across multiple lines. The `\\` character\
    \ must be placed exactly at the end of the line, and no more spaces may follow!\n\
    - Code indentation is allowed but is optional.\n- Bash is extremely picky about\
    \ the use of spaces in code. `s=\"abc\"` is correct; the variants `s =\"abc\"\
    ` or `s= \"abc\"` as well as `s = \"abc\"` are all wrong and will trigger errors!\n\
    \  Conversely, in some cases, spaces are required before or after parentheses\
    \ for Bash to recognize the construct correctly. If your script does not work\
    \ as expected and the error messages are vague or misleading, you should first\
    \ check the use of spaces!\n\n### 3.5.6 A “Real” Example: Backup Script\n\nOf\
    \ course, you’re not reading this book to run “Hello World!” scripts. This second\
    \ example is a bit longer, but it performs a real task: It creates a compressed\
    \ backup of all files in your `documents` directory and stores the backup in the\
    \ `mybackups` directory:\n\n```\n#!/bin/bash\n# Sample file backup-documents.sh\n\
    # Save the contents of this directory\ndocumentdir=~/documents\n# Backup location\n\
    backupdir=~/mybackups\n# Create backup directory\nmkdir -p $backupdir\n# returns\
    \ e.g., date=27 for 2023-03-27\nday=$(date '+%d')\n# Create backup, save as documents-<day>.tar.gz\n\
    echo \"Backup file: $backupdir/documents-$day.tar.gz\"\ntar czf $backupdir/documents-$day.tar.gz\
    \ -C $documentdir .\n```"
  mdcn: "## 3.4.3 Oh My Zsh\n\n对于 Zsh，互联网上有许多插件提供额外功能，以及可以改变命令提示符外观的主题。*Oh My Zsh*\
    \ 是一个帮助管理此类扩展的脚本。它内置了各种插件和主题，后续还可以添加更多。\n\n要安装，请从项目页面 *https://github.com/ohmyzsh/ohmyzsh*\
    \ 下载一个小脚本并运行它。该脚本要求同名软件包中的 `git` 命令可用。与其输入以下命令，你应该从 Oh My Zsh 的 GitHub 页面复制代码：\n\
    \n```\n$ sh -c \"$(curl -fsSL https://raw.githubusercontent.com/ohmyzsh/ohmyzsh/master/tools/install.sh)\"\
    \n```\n\n在安装过程中，`.zshrc` 文件将被覆盖。之前的内容会保存在名为 `.zshrc.pre-oh-my-zsh` 的备份文件中。Oh My\
    \ Zsh 未来将在启动时检查更新。因此，当你打开一个新的终端窗口时，经常会收到更新 Oh My Zsh 的提示。\n\n在基本配置中，提示符默认使用 `robbyrussell`\
    \ 主题。作为唯一激活的插件，`git` 贡献了无数别名，有助于 Git 的操作。关于 Oh My Zsh 的众多功能和进一步配置的技巧指南，可以在 *https://ohmyz.sh*\
    \ 或以下博客中找到：*https://stackabuse.com/pimp-my-terminal-an-introduction-to-oh-my-zsh*。\n\
    \n## 3.5 第一个 Bash 脚本\n\n在简短地介绍了 Zsh 之后，我们现在回到 Bash。在本章中，我将向你介绍 Bash 的语法，包括各种编程和工作技巧之前，我想用这一节来解释脚本实际上是什么。事实上，这很简单：脚本是一个文本文件，你在其中编写与在终端中交互式输入的相同的命令。只有两个特殊之处将脚本与普通命令区分开来：脚本的第一行必须包含所谓的\
    \ *shebang*（释伴），并且文件必须使用 `chmod` 标记为可执行。\n\n### 3.5.1 Hash Bang (Shebang)\n\n\
    在 Linux 或 macOS 上执行的脚本的第一行必须以字符 `#`（“hash”或“sharp”）和 `!`（“bang”）以及解释器的路径开头。“Shebang”是“sharp\
    \ bang”的语言缩写。\n\n解释器是读取和处理脚本文件的程序，在本章中，该解释器是 Bash（或在特殊情况下是 Zsh）。然而，其他编程语言也可以用作解释器，例如\
    \ Python 或 Perl。\n\n在 Linux 上，`Bash` 程序主要安装在 `/bin` 目录中。因此，Bash 脚本以以下行开头：\n\n\
    ```\n#!/bin/bash\n```\n\n### 3.5.2 Shebang 变体\n\n根据你使用的发行版或类 Unix 系统，Bash 可能安装在不同的目录中，例如\
    \ `/usr/bin`。使用 `which bash`，你可以确定其在你计算机上的位置，如下例所示：\n\n```\n$ which bash\n\n/usr/bin/bash\n\
    ```\n\n链接通常确保 `/usr/bin/bash` 和 `/bin/bash` 都能工作。一种通用的 hash bang 表述，无论位置如何都能工作，使用\
    \ `/usr/bin/env` 命令。此命令搜索所有常见位置：\n\n```\n#!/usr/bin/env bash\n```\n\n如果你的机器上根本没有安装\
    \ Bash，并且你正在使用 Zsh，你可能需要将 `/bin/bash` 替换为 `/bin/zsh`（或 Zsh 在你机器上安装的位置）：\n\n```\n\
    #!/bin/zsh\n```\n\n如果你希望你的脚本无论 Bash 或 Zsh 是否可用都能工作，以下 hash bang 可以实现：\n\n```\n\
    #!/bin/sh\n```\n\n`sh` 是一个指向大多数 Linux 系统上默认 shell 的链接。然而，你必须意识到，从现在开始，当你的脚本运行时，将根据计算机/发行版使用不同的\
    \ shell。例如，在 Debian 和 Ubuntu 上，将执行经过速度优化的 Dash。在编写脚本时，你必须小心不要使用任何其他 shell 中不可用的\
    \ Bash 特定扩展。\n\n> **现在怎么办？**\n> 我知道在 IT 世界里，每条规则都有三个例外，然后还有五个特殊情况，这很烦人。除非有令人信服的理由不这样做，否则你应该始终使用\
    \ `#!/bin/bash` 作为 hash bang。本书的示例文件也使用此代码。\n\n### 3.5.3 使脚本可执行 (chmod +x)\n\n\
    所有类 Unix 系统（包括 Linux 和 macOS）都会在每个文件中存储一些访问位，这些位提供有关谁被允许读取、写入和执行文件的信息。对于脚本，执行位（简称\
    \ x）至关重要。只有有了这个位，脚本才能像命令一样稍后被执行。\n\n要设置执行位，你需要在终端中运行一次以下命令。请注意，macOS 的 `chmod`\
    \ 变体不理解 `+x` 简写。你必须明确指定为谁设置执行位。`a` 表示“为所有人”。\n\n```\n$ chmod +x my-script-file.sh\
    \    (Linux, Git Bash)\n$ chmod a+x my-script-file.sh   (macOS)\n```\n\n因此，`chmod`\
    \ 用于更改访问位。该命令支持相当多样的语法变体。（如果你对细节感兴趣，可以运行 `man chmod`）。对我们来说，只有 `chmod +x` 变体是相关的，用于设置执行位。\n\
    \n> **.sh 标识符**\n> 本书中所有 Bash 示例文件都以 `.sh` 结尾。虽然这种文件扩展名很常见，但使用它绝非强制。只要 hash bang\
    \ 正确，Bash 脚本可以在没有标识符（甚至使用错误标识符）的情况下工作。\n> 由于本书除了 Bash 之外还涵盖了 PowerShell（`.ps1`）和\
    \ Python（`.py`），标识符有助于示例文件的分类。\n\n### 3.5.4 Hello, World!\n\n要编写你的第一个脚本，你需要启动你喜欢的编辑器：Visual\
    \ Studio Code (VS Code) 是一个不错的选择，但任何编辑器都可以，包括可以直接在终端中运行的极简 `nano` 程序。然后，输入以下两行：\n\
    \n```\n#!/bin/bash\necho \"Hello, World!\"\n```\n\n将此文件保存为 `hello-world.sh`。使用\
    \ `chmod` 使脚本可执行，使用以下命令：\n\n```\n$ chmod +x hello-world.sh    (Linux, Git Bash)\n\
    $ chmod a+x hello-world.sh   (macOS)\n```\n\n要检查脚本是否工作，你需要输入其名称并按 `Enter`。请注意，你必须在名称前加上\
    \ `./`。通过这种方式，你告诉 Bash 在当前目录中查找你的脚本。（`.` 是当前活动目录的简写。）\n\n```\n$ ./hello-world.sh\n\
    Hello, World!\n```\n\n> **如果脚本执行不工作**\n> 如果脚本的执行触发错误，可能有多种原因：\n> - 你是否正确指定了文件名？\n\
    > - 你是否使用了 `chmod +x`？\n> - 你是否正确指定了 hash bang 行？\n> - 你的计算机上是否根本没有安装 Bash？如果你想使用\
    \ Zsh 运行脚本，你需要将 hash bang 更改为 `#!/bin/zsh` 或 `#!/bin/sh`。\n\n### 3.5.5 基本语法规则\n\
    \n除了 hash bang 之外，你必须在脚本中遵循一些其他规则：\n\n- 以 `#` 开头的行是注释，不会被求值。\n- 你可以使用 `\\` 字符来处理跨多行的长命令。`\\\
    ` 字符必须精确地放在行尾，并且后面不能再有空格！\n- 代码缩进是允许的，但是可选的。\n- Bash 对代码中空格的使用极其挑剔。`s=\"abc\"\
    ` 是正确的；变体 `s =\"abc\"` 或 `s= \"abc\"` 以及 `s = \"abc\"` 都是错误的，并且会触发错误！\n  反之，在某些情况下，括号前或后需要空格，Bash\
    \ 才能正确识别该结构。如果你的脚本没有按预期工作，并且错误信息模糊或具有误导性，你应该首先检查空格的使用！\n\n### 3.5.6 一个“真实”的例子：备份脚本\n\
    \n当然，你读这本书不是为了运行“Hello World!”脚本。这个第二个例子稍长一些，但它执行一个真实的任务：它创建 `documents` 目录中所有文件的压缩备份，并将备份存储在\
    \ `mybackups` 目录中：\n\n```\n#!/bin/bash\n# 示例文件 backup-documents.sh\n# 保存此目录的内容\n\
    documentdir=~/documents\n# 备份位置\nbackupdir=~/mybackups\n# 创建备份目录\nmkdir -p $backupdir\n\
    # 返回例如，对于 2023-03-27 返回 date=27\nday=$(date '+%d')\n# 创建备份，保存为 documents-<day>.tar.gz\n\
    echo \"备份文件: $backupdir/documents-$day.tar.gz\"\ntar czf $backupdir/documents-$day.tar.gz\
    \ -C $documentdir .\n```"
