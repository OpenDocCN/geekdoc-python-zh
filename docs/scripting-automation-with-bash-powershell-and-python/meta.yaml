    # 4.6.7 Predefined Variables


    Normally, you must take care of the initialization of your variables yourself.
    However, a number of predefined variables, called *automatic variables*, are available
    in the PowerShell terminology. These variables contain information about PowerShell,
    the state of the current script, and so on.


    | Variable | Contents |

    | :--- | :--- |

    | `$?` | Status of the last executed command (`$false` if an error occurred) |

    | `$_` | The current object being processed by a pipe (`$PSITEM`) |

    | `$args` | Array with the parameters passed to a script or function |

    | `$Error` | Object, describes the last error that occurred |

    | `$Event` | Object, describes the currently processed event |

    | `$false` | Boolean state “false” |

    | `$HOME` | String with the home directory of the current user |

    | `$input` | Data passed to a function via standard input (pipe) |

    | `$IsLinux` | `$true` if PowerShell is running on Linux |

    | `$IsMacOS` | `$true` if PowerShell is running on macOS |

    | `$IsWindows` | `$true` if PowerShell is running on Windows |

    | `$null` | Null (uninitialized state) |

    | `$PID` | Current process ID |

    | `$PROFILE` | String with the path to the profile file for initialization/configuration
    of PowerShell |

    | `$PWD` | Object with the path of the current directory |

    | `$true` | Boolean state “true” |


    Table 4.5 The Most Important Predefined Variables of PowerShell


    I have only compiled the most important variables in this table. As always, a
    complete description of all variables (there are about 50!) can be found in the
    online documentation at https://docs.microsoft.com/en-us/powershell/module/microsoft.powershell.core/about/about_automatic_variables.


    > **No Globbing!**

    When you run a Bash script such as `script.sh *.txt`, the names of all text files
    in the current directory are passed to the script. On the other hand, if you pass
    `*.txt` as a parameter to a PowerShell script, then exactly this string gets passed.'
