    # About This Book


    Because no single perfect scripting language exists, this book starts in Part
    I with crash courses for the Bash, PowerShell, and Python languages. If you want,
    you can focus on one of these three languages to get started and gradually increase
    your language vocabulary.


    Part II of this book introduces you to tools and working techniques typically
    used in scripts: These topics include commands for processing text files, cmdlets
    for applying regular expressions, and functions for handling JSON and XML files.
    I''ll show you how to run scripts regularly and automatically, how to run code
    or copy files to other machines via SSH, and how to combine version management
    for your code and scripting via Git. Many practical examples round off the information
    I provide throughout this book.


    Finally, Part III deals with concrete applications: Key topics include backups,
    image processing, web scraping, using REST APIs, databases, using the cloud, and
    virtual machine administration.


    I have tried as much as possible to design this book in a modular way. Thus, you
    don''t need to read all the chapters from start to finish, but instead, you can
    search specifically for the information important to you at a specific moment.
    All chapters in Parts II and III begin with a brief information box that summarizes
    the prerequisites for that chapter.


