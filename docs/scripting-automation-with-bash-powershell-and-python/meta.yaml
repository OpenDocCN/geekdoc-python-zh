    \ \"Gender\", \"Email\", \"Job\", \"Salary\"\n\n$sql = \"INSERT INTO $tablename\
    \ (\" + ($columns -Join \", \") + \") \"\n$sqlcmds = \"\"\n\n# read JSON file\
    \ and convert it to PowerShell objects\n$jsonFilePath = \"employees.json\"\n$json\
