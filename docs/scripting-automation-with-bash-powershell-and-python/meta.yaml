  md: "Automatically Administrator\nIf you perform an SSH login for a user who has\
    \ admin rights, then you get these rights immediately in the SSH session.\nAn\
    \ important difference arises with interactive work: Usually, you work with reduced\
    \ rights and only perform actions with admin rights when necessary—for example,\
    \ by explicitly starting a terminal with admin rights. In this regard, Windows\
    \ also behaves differently from Linux or macOS, where you must explicitly request\
    \ administrator rights for individual commands via `sudo`.\n\n# 12.1.4 Using an\
    \ Editor in an SSH Session\n\nOn Linux or macOS, the matter is trivial: To modify\
    \ a file directly in an SSH session, you simply need to launch an editor. `nano`\
    \ and `vim` are almost always available. If required, you can separately install\
    \ countless other editors such as `emacs`, `joe`, or `zile`.\nOn Windows, however,\
    \ the concept of an editor without a GUI is still unknown today, and no suitable\
    \ program is available by default. Things change once you install Git because\
    \ Git Bash with the `vim` and `nano` editors usually is installed as well. Starting\
    \ the two programs can be done in the following ways:\n\n```\n> & \"C:\\Program\
    \ Files\\Git\\usr\\bin\\nano.exe\" myscript.ps1\n> & \"C:\\Program Files\\Git\\\
    usr\\bin\\vim.exe\" myscript.ps1\n```\n\nBy the way, including `C:\\Program Files\\\
    Git\\usr\\bin` in `Path` variables is not recommended. In this directory, countless\
    \ Linux tools like `cd`, `ls`, `cp`, and so on are installed, and since these\
    \ names are also commonly used as PowerShell aliases, this duplication can cause\
    \ problems. Better to include a function in the profile file to call your editor\
    \ (see `$PROFILE` for the path):\n\n```\n# in the $PROFILE file (usually C:\\\
    Users\\<name>\\n# Documents\\PowerShell\\Microsoft.PowerShell_profile.ps1)\nfunction\
    \ nano {\n    & \"C:\\Program Files\\Git\\usr\\bin\\nano.exe\" $args\n}\n```\n\
    \nYou may need to adjust the installation path. As a result, to modify a script\
    \ file, you can then run `nano` in an SSH session in the following way:\n\n```\n\
    > nano myscript.ps1\n```\n\nA conceivable alternative is to use VS Code through\
    \ an SSH connection (see [Chapter 13, Section 13.3](#))."
