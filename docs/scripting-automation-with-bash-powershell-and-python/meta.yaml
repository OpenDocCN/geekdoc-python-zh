  md: "```\n# read entries from the 'photos' table\nwith conn.cursor() as cur:\n \
    \   sql = 'SELECT * FROM photos WHERE id < %s'\n    cur.execute(sql, (1000))\n\
    \    while row := cur.fetchone():\n        print(row)\n```\n\nUsing `execute`,\
    \ you can also run `INSERT`, `UPDATE`, or `DELETE` commands. `commit` completes\
    \ the transaction. You can then get the ID number of the new record from the `lastrowid`\
    \ property.\n\n```\nsql = '''INSERT INTO photos (name, size, orientation)\n  \
    \      VALUES (%s, %s, %s)'''\nwith conn.cursor() as cur:\n    cur.execute(sql,\
    \ ('img_1234.jpg', 3231283, 0))\n    conn.commit()\n    print('ID of new record:',\
    \ cur.lastrowid)\n```\n\nIf your script continues to run once the database operations\
    \ are complete, you should close the database connection:\n\n```\nconn.close()\n\
    ```\n\nMore details on how to use PyMySQL can be found in the project documentation:\
    \ https://pymysql.readthedocs.io.\n\n# 19.3.2 Saving Exif Metadata\n\nI have already\
