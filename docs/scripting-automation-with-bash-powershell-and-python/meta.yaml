- md: "## 10.3 JSON in Bash\n\nBash does not contain any built-in JSON functions.\
    \ However, the `jq` command (*jq* for *JSON query*) is available in most Linux\
    \ distributions. If the execution of the command ends with the *command not found*\
    \ error message, you must install the `jq` command. On Ubuntu, this step can be\
    \ performed using `sudo apt install jq`.\n\n`jq` reads a JSON document from the\
    \ standard input or from files passed as parameters. This command then applies\
    \ a filter expression to the document and writes the result to standard output.\
    \ The simplest application is to format JSON documents in a readable way. For\
    \ this task, you simply need to specify a dot (`.`) as the filter expression:\n\
    \n```\n$ echo '{\"key1\":\"123\",\"key2\":\"456\"}' | jq .\n{\n  \"key1\": \"\
    123\",\n  \"key2\": \"456\"\n}\n```\n\nThe basis for the following examples is\
    \ the *commits.json* file which contains approximately 1,400 lines. This data\
    \ is from the GitHub event log, which is publicly available in the JSON format.\
    \ I used a repository from *Docker: Practical Guide for Developers and DevOps\
    \ Teams* (Rheinwerk Computing, 2023), coauthored by myself and Bernd Öggl, as\
    \ the database:\n\n```\n$ curl 'https://api.github.com/repos/docker-compendium/samples/commits'\
    \ > commits.json\n```\n\nThe JSON file simply consists of an array of commit data.\
    \ In `jq`, you can use `.[ ]` to access the entire array and use `.[0]` to access\
    \ the first element (the latest commit).\n\n```\n$ jq '.[0]' commits.json\n{\n\
    \  \"sha\": \"8b17e24e278cd594456db77abbefe4190ac1d88\",\n  \"node_id\": \"C_kwD\"\
    ,\n  \"commit\": {\n    \"author\": {\n      \"name\": \"Michael Kofler\",\n \
    \     ...\n}\n```\n\nYou can use .keyname to access individual data elements:\n\
    \n```\n$ jq '.[0].commit.author.name' commits.json\n\"Michael Kofler\"\n```\n\n\
    Who performed how many commits?\n\n```\n$ jq '.[].commit.author.name' commits.json\
    \ | sort | uniq -c\n11 \"Bernd Oeggl\"\n7 \"Michael Kofler\"\n```\n\nThe next\
    \ command lists all commit messages:\n\n```\n$ jq '.[].commit.message' commits.json\n\
    \"Update README.md\"\n\"add k8s sample code files\"\n\"add swarm sample code\"\
    \n...\n```\n\nUsing a pipe operator (|) within a filter expression is allowed.\
    \ In the following expression, we'll extract two properties from each list item,\
    \ give them new names, and make them new JSON elements:\n\n```\n$ jq '.[] | {date:\
    \ .commit.author.date,\n            msg: .commit.message}' commits.json\n{\n \
    \ \"date\": \"2023-01-22T06:40:14Z\",\n  \"msg\": \"Update README.md\"\n}\n{\n\
    \  \"date\": \"2023-01-21T20:50:32Z\",\n  \"msg\": \"add k8s sample code files\"\
    \n}\n...\n```\n\nHowever, the result itself is not a valid JSON document. To make\
    \ it valid, you must wrap it in an array using square brackets:\n\n```\n$ jq '[\
    \ .[] | {date: .commit.author.date,\n                msg: .commit.message} ]'\
    \ commits.json\n[\n  {\n    \"date\": \"2023-01-22T06:40:14Z\",\n    \"msg\":\
    \ \"Update README.md\"\n  },\n  ...\n]\n```\n\nBy using `select`, you can formulate\
    \ conditions. The following command creates a new JSON document with the commits\
    \ of Bernd Öggl:\n\n```\n$ jq '[ .[] | select (.commit.author.name==\"Bernd Oeggl\"\
    ) ]' >\n  bernds-commits.json\n```\n\nFor more examples of using the `jq` syntax,\
    \ see the tutorial, and for a comprehensive reference of the many functions, refer\
    \ to the following manuals:\n\n- https://stedolan.github.io/jq/tutorial\n- https://stedolan.github.io/jq/manual\n\
    \n### 10.3.1 Viewing JSON Files Interactively Using fx\n\nOf course, you can browse\
    \ through JSON files using `less`. But a much more comfortable approach is to\
    \ use the `fx` command, which must be installed first, however, by visiting https://github.com/antonmedv/fx.\n\
    \n![](img/a7fa45d496335c22ffb14c3275e24ffb_296_0.png)\n\nOnce installed, you can\
    \ open a JSON document via `fx myfile.json` or `cmd | fx`, open and close JSON\
    \ groups using ← and →, search for texts using `/`, and so on. The JSON document\
    \ is neatly formatted; keys and entries are highlighted. In a nutshell, reading\
    \ or analyzing large JSON files in the terminal becomes a pleasure when you use\
    \ fx. Pressing `q` terminates the program.\n\n## 10.4 XML in PowerShell\n\nMicrosoft\
    \ has gone all-in on XML for Windows, which is why numerous XML files exist in\
    \ a Windows system. On my Windows 11 test machine, I encountered about 1,500 files\
    \ with the *.xml identifier in C:\\Windows alone. Even quite “normal” Microsoft\
    \ Office files (such as *.docx) use XML content. (Strictly speaking, Microsoft\
    \ Office files are ZIP archives, which in turn contain XML files.) In summary,\
    \ XML is an ubiquitous format on Windows.\n\n### 10.4.1 XML Data Type\n\nPowerShell\
    \ supports XML through its own data type. When reading an XML file, you must prefix\
    \ the variable with the data type in square brackets so that PowerShell can clearly\
    \ see that you don't want to view the file as ordinary text, but in XML format\
    \ instead.\n\n```\n> [xml]$tmz = Get-Content `\n    \"C:\\Windows\\Globalization\\\
    Time Zone\\timezoneMapping.xml\"\n```\n\nThe file used in this example contains\
    \ information about time zones. (If you do not run Windows, you can find this\
    \ file in the sample files for this book.) This file has the following structure:\n\
    \n```\n<?xml version=\"1.0\" encoding=\"UTF-8\"?>\n<TimeZoneMapping GeneratedAt=\"\
    2022-11-08T09:34:04.6992291+05:30\">\n  <MapTZ TZID=\"Etc/GMT+12\" WinID=\"Dateline\
    \ Standard Time\"\n          Region=\"001\" Default=\"true\" StdPath=\"GMT+12/standard\"\
    \n          DltPath=\"GMT+12/daylight\" />\n  <MapTZ TZID=\"Etc/GMT+12\" WinID=\"\
    Dateline Standard Time\"\n          Region=\"ZZ\" ... />\n  ...\n```\n\nYou can\
    \ access the elements of the XML structure via properties:\n\n```\n> $tmz.TimeZoneMapping.MapTZ[0]\n\
    \    TZID    : Etc/GMT+12\n    WinID   : Dateline Standard Time\n    Region  :\
    \ 001\n    Default : true\n```"
  mdcn: "## 10.3 Bash 中的 JSON\n\nBash 不包含任何内置的 JSON 函数。但是，`jq` 命令（*jq* 代表 *JSON query*）在大多数\
    \ Linux 发行版中都可用。如果命令执行时出现 *command not found* 错误信息，你必须安装 `jq` 命令。在 Ubuntu 上，可以使用\
    \ `sudo apt install jq` 来完成此步骤。\n\n`jq` 从标准输入或作为参数传递的文件中读取 JSON 文档。然后，该命令对文档应用过滤器表达式，并将结果写入标准输出。最简单的应用是以可读的方式格式化\
    \ JSON 文档。对于此任务，你只需指定一个点（`.`）作为过滤器表达式：\n\n```\n$ echo '{\"key1\":\"123\",\"key2\"\
    :\"456\"}' | jq .\n{\n  \"key1\": \"123\",\n  \"key2\": \"456\"\n}\n```\n\n以下示例的基础是\
    \ *commits.json* 文件，该文件包含大约 1,400 行。这些数据来自 GitHub 事件日志，该日志以 JSON 格式公开提供。我使用了与\
    \ Bernd Öggl 合著的《Docker: Practical Guide for Developers and DevOps Teams》（Rheinwerk\
    \ Computing, 2023）中的一个仓库作为数据库：\n\n```\n$ curl 'https://api.github.com/repos/docker-compendium/samples/commits'\
    \ > commits.json\n```\n\n该 JSON 文件仅由一个提交数据数组组成。在 `jq` 中，你可以使用 `.[ ]` 访问整个数组，使用\
    \ `.[0]` 访问第一个元素（最新的提交）。\n\n```\n$ jq '.[0]' commits.json\n{\n  \"sha\": \"8b17e24e278cd594456db77abbefe4190ac1d88\"\
    ,\n  \"node_id\": \"C_kwD\",\n  \"commit\": {\n    \"author\": {\n      \"name\"\
    : \"Michael Kofler\",\n      ...\n}\n```\n\n你可以使用 .keyname 访问单个数据元素：\n\n```\n\
    $ jq '.[0].commit.author.name' commits.json\n\"Michael Kofler\"\n```\n\n谁执行了多少次提交？\n\
    \n```\n$ jq '.[].commit.author.name' commits.json | sort | uniq -c\n11 \"Bernd\
    \ Oeggl\"\n7 \"Michael Kofler\"\n```\n\n下一个命令列出所有提交消息：\n\n```\n$ jq '.[].commit.message'\
    \ commits.json\n\"Update README.md\"\n\"add k8s sample code files\"\n\"add swarm\
    \ sample code\"\n...\n```\n\n允许在过滤器表达式中使用管道运算符（|）。在下面的表达式中，我们将从每个列表项中提取两个属性，为它们赋予新名称，并使它们成为新的\
    \ JSON 元素：\n\n```\n$ jq '.[] | {date: .commit.author.date,\n            msg: .commit.message}'\
    \ commits.json\n{\n  \"date\": \"2023-01-22T06:40:14Z\",\n  \"msg\": \"Update\
    \ README.md\"\n}\n{\n  \"date\": \"2023-01-21T20:50:32Z\",\n  \"msg\": \"add k8s\
    \ sample code files\"\n}\n...\n```\n\n然而，结果本身不是一个有效的 JSON 文档。要使其有效，你必须使用方括号将其包装在数组中：\n\
    \n```\n$ jq '[ .[] | {date: .commit.author.date,\n                msg: .commit.message}\
    \ ]' commits.json\n[\n  {\n    \"date\": \"2023-01-22T06:40:14Z\",\n    \"msg\"\
    : \"Update README.md\"\n  },\n  ...\n]\n```\n\n通过使用 `select`，你可以制定条件。以下命令创建一个包含\
    \ Bernd Öggl 提交的新 JSON 文档：\n\n```\n$ jq '[ .[] | select (.commit.author.name==\"\
    Bernd Oeggl\") ]' >\n  bernds-commits.json\n```\n\n有关使用 `jq` 语法的更多示例，请参阅教程；有关众多函数的全面参考，请参阅以下手册：\n\
    \n- https://stedolan.github.io/jq/tutorial\n- https://stedolan.github.io/jq/manual\n\
    \n### 10.3.1 使用 fx 交互式查看 JSON 文件\n\n当然，你可以使用 `less` 浏览 JSON 文件。但一种更舒适的方法是使用 `fx`\
    \ 命令，不过首先需要通过访问 https://github.com/antonmedv/fx 来安装它。\n\n![](img/a7fa45d496335c22ffb14c3275e24ffb_296_0.png)\n\
    \n安装后，你可以通过 `fx myfile.json` 或 `cmd | fx` 打开 JSON 文档，使用 ← 和 → 打开和关闭 JSON 组，使用\
    \ `/` 搜索文本等等。JSON 文档格式整齐；键和条目会高亮显示。简而言之，当你使用 fx 时，在终端中读取或分析大型 JSON 文件会变成一种享受。按\
    \ `q` 键终止程序。\n\n## 10.4 PowerShell 中的 XML\n\n微软在 Windows 上全面押注 XML，这就是为什么 Windows\
    \ 系统中存在大量 XML 文件。在我的 Windows 11 测试机上，仅在 C:\\Windows 中就遇到了大约 1,500 个带有 *.xml 标识符的文件。即使是相当“普通”的\
    \ Microsoft Office 文件（如 *.docx）也使用 XML 内容。（严格来说，Microsoft Office 文件是 ZIP 存档，而\
    \ ZIP 存档又包含 XML 文件。）总之，XML 是 Windows 上无处不在的格式。\n\n### 10.4.1 XML 数据类型\n\nPowerShell\
    \ 通过其自己的数据类型支持 XML。读取 XML 文件时，你必须在变量前加上方括号中的数据类型，以便 PowerShell 能够清楚地看到你不想将文件视为普通文本，而是以\
    \ XML 格式查看。\n\n```\n> [xml]$tmz = Get-Content `\n    \"C:\\Windows\\Globalization\\\
    Time Zone\\timezoneMapping.xml\"\n```\n\n此示例中使用的文件包含有关时区的信息。（如果你不运行 Windows，可以在本书的示例文件中找到此文件。）此文件具有以下结构：\n\
    \n```\n<?xml version=\"1.0\" encoding=\"UTF-8\"?>\n<TimeZoneMapping GeneratedAt=\"\
    2022-11-08T09:34:04.6992291+05:30\">\n  <MapTZ TZID=\"Etc/GMT+12\" WinID=\"Dateline\
    \ Standard Time\"\n          Region=\"001\" Default=\"true\" StdPath=\"GMT+12/standard\"\
    \n          DltPath=\"GMT+12/daylight\" />\n  <MapTZ TZID=\"Etc/GMT+12\" WinID=\"\
    Dateline Standard Time\"\n          Region=\"ZZ\" ... />\n  ...\n```\n\n你可以通过属性访问\
    \ XML 结构的元素：\n\n```\n> $tmz.TimeZoneMapping.MapTZ[0]\n    TZID    : Etc/GMT+12\n\
    \    WinID   : Dateline Standard Time\n    Region  : 001\n    Default : true\n\
    ```"
