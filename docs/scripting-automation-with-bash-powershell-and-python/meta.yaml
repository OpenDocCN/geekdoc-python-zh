    You must take care in the script itself to use the corresponding filenames. If
    only one parameter is involved, `Get-Item $args` will work. If multiple parameters
    may be passed to your script (e.g., `script.ps1 file1 file2` or `script.ps1 *.jpg
    *.png`), then you must create *two* loops.

    The first loop processes the parameters and executes `Get-Item`; the second processes
    the results returned by `Get-Item`. For a code example involving sorting photos
    by date taken, see Chapter 16, Section 16.2.


    # 4.6.8 Environment Variables


    Environment variables are also predefined variables. However, they are defined
    at the operating system level and are available not only to PowerShell, but to
    all processes. Many environment variables contain the locations of important directories.


    | Variable | Contents |

    | :--- | :--- |

    | `$Env:APPDATA` | Directory for program settings |

    | `$Env:HOME` | Home directory |

    | `$Env:HOMEDRIVE` | Drive of the home directory |

    | `$Env:LOCALAPPDATA` | Directory for program settings |

    | `$Env:Path` | Directory list for executable programs |

    | `$Env:PROCESSOR_ARCHITECTURE` | CPU architecture (e.g., AMD64) |

    | `$Env:PSModulePath` | Directory list for PowerShell modules |

    | `$Env:SHELL` | Path to the active shell |

    | `$Env:TEMP`, `$Env:TMP` | Temporary directory |

    | `$Env:USER` | Current account name |

    | `$Env:windir` | Path to the Windows directory (e.g., `C:\Windows`) |


    **Table 4.6** The Most Important Environment Variables


    Access to environment variables through PowerShell occurs in the somewhat unusual
    form, `$Env:[<varname>]`, such as `$Env:Path`. All environment variables return
    strings instead of objects. I have specified only a few particularly important
    predefined environment variables, which are rather inconsistent in terms of uppercase
    and lowercase names.'
  - "[PAGE 130]\n\n# 4.7 Arrays and Hash Tables\n\nAn array is a data structure to\
    \ store multiple objects. PowerShell makes extensive use of arrays, and many commands\
    \ return arrays. For example, `Get-ChildItem` usually returns an array of `FileInfo`\
    \ and `DirectoryInfo` objects (unless `Get-ChildItem` is used to process registry\
    \ entries).\n\n```\n> $Files = Get-ChildItem\n> $Files.Length\n4\n\n> $Files.Count\
    \    # equivalent, Count is an alias for Length\n4\n\n> $Files.GetType()\n\n \
    \  IsPublic IsSerial Name      BaseType\n   -------- -------- ----        --------\n\
    \   True     True     Object[]    System.Array\n```\n\nThe pipe operator can perfectly\
    \ handle arrays and processes the elements of an array one after the other—many\
    \ examples of this processing have been shown already in this chapter. You can\
    \ use `ForEach-Object` to explicitly loop and output details about each array\
    \ element. Inside the loop, `$_` (short notation for `$PSItem`) provides access\
    \ to the current item. More details on loops will follow in Section 4.9.\n\n```\n\
    > $Files | ForEach-Object { \"$($_.GetType()) $($_.FullName)\" }\n\nSystem.IO.DirectoryInfo\
    \ C:\\Users\\kofler\\myscripts\\mydir\nSystem.IO.FileInfo      C:\\Users\\kofler\\\
    myscripts\\Hello.ps1\nSystem.IO.FileInfo      C:\\Users\\kofler\\myscripts\\MyTest.ps1\n\
    System.IO.FileInfo      C:\\Users\\kofler\\myscripts\\Loop.ps\n```\n\n# 4.7.1\
    \ Creating and Processing Custom Arrays\n\nYou can easily create arrays in your\
    \ own scripts, as in the following examples:\n\n```\n> $Data = 1, 17, 39, 45\n\
    > $Data = @(1, 17, 39, 45)    # equivalent\n```\n\nOnce created, the size of an\
    \ array cannot be changed. Nevertheless, you can easily add more elements using\
    \ the `+=` operator. Behind the scenes, however, this operation creates a new,\
    \ slightly larger array. For arrays with a large number of elements, this operation\
    \ can thus be quite inefficient!"
