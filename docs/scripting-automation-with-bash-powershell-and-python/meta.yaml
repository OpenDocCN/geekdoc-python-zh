  md: "Finally, the script tries to download all images and save them in the temporary\
    \ directory.\n\n```\n# Sample program load-images.py\nfrom urllib import parse,\
    \ request\nimport os, re\n\n# create temporary directory\nos.makedirs(\"tmp/\"\
    , exist_ok=True)\n# load HTML code\nurl = \"https://sap-press.com\"\nwith request.urlopen(url)\
    \ as response:\n    html = response.read().decode('utf8')\n# search for <img src=\"\
    ...\" using regular expression\nimageUrls = re.findall(r'<img.*?src=\"(.+?)\"\
    ', html)\nfor imgUrl in imageUrls:\n    # convert relative links to absolute links\n\
    \    if not imgUrl.startswith('http'):\n        imgUrl = parse.urljoin(url, imgUrl)\n\
    \    # extract destination filename\n    path = str(parse.urlsplit(imgUrl).path)\n\
    \    basename = os.path.basename(path)\n    destination = 'tmp/' + basename\n\
    \    try:\n        # download and save image\n        with request.urlopen(imgUrl)\
    \ as response, \\n             open(destination, 'wb') as f:\n            f.write(response.read())\n\
    \        print(basename)\n    except:\n        print(\"skipped\", basename[:30])\n\
    ```\n\nFor simple HTML pages, the script works perfectly, and you might get the\
