    # Multiline Text


    When regular expressions are applied to longer texts or text files, then usually
    each line is considered separately. Some regex tools or functions provide options
    to perform expression recognition across multiple lines. However, you should make
    sure to carry out performance tests before using such an option indiscriminately!


    # 9.2.4 Exercise Pages and Cheat Sheets


    Before you can use regular expressions with any degree of confidence, you need
    to practice! Several great websites exist where you can solve a series of exercises
