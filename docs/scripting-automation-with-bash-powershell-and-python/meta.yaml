    # 6.4.1 sudo Privileges for Selected Accounts Only


    sudo can only be used by selected users—usually, the person who performed the
    Linux installation and whose account was created first.


    sudo users must authenticate using their own password. The authentication will
    then remain valid for a few minutes. For additional sudo calls within this period
    of time, it is therefore not necessary to enter the password again.


    The /etc/sudoers file controls who has which privileges in sudo. Fortunately,
    changes to this relatively complex file are rarely necessary. If you want to assign
    sudo privileges to another account, you should run the following command (which
    of course assumes that you have sudo privileges yourself):


    ```

    $ sudo usermod -a -G sudo <account>    # Debian, Ubuntu ...

    $ sudo usermod -a -G wheel <account>   # Fedora, RHEL ...

    ```


    These usermod commands add the <account> user to the sudo group (for Debian, Ubuntu,
    and compatible distributions) or to the wheel group (for Fedora and Red Hat Enterprise
    Linux [RHEL] compatible distributions). All members of these two groups will automatically
    have sudo privileges.


    # 6.4.2 Issues with Output Redirection


    The following two commands each attempt to modify a file in the /etc directory.
    The first command works, the second one triggers an error. Why’s that?


    ```

    $ sudo touch /etc/new-file          # works

    $ sudo echo "hello" > /etc/new-file  # Error: no permission

    ```


    The problem is the output redirection. While sudo runs echo "hello" with root
    privileges, the rest of the command (i.e., the redirection of the output to the
    /etc/new-file file) is handled by Bash—and Bash runs with normal privileges. That’s
    where the error occurs.


    Once the cause is clear (I stumble into this trap myself at regular intervals),
    the solution is not difficult. Instead of just running echo (or whatever command)
    via sudo, you pass a new Bash process to sudo, which in turn executes the rest
    of the command, including the redirection. The -c option signifying command allows
    you to pass the command to be run to the Bash process:


    ```

    $ sudo bash -c ''echo "bla" > /etc/new-file''

    ```'
