    # 7.3 Compressing and Archiving Files


    The `Compress-Archive` command allows you to pack a directory or individual files
    into a compressed archive file. Basically, the application of the command is simple:


    > Compress-Archive mypictures\ mypictures.zip

    > Compress-Archive *.txt archive.zip


    With `-Update`, you can extend or change an existing archive, and with `-Force`,
    you can overwrite a possibly existing ZIP file. `-CompressionLevel` enables you
    to influence the'
  - "[PAGE 230]\n\ncompression algorithm. Permitted settings are `Optimal` (applies\
    \ by default), `Fastest`, and `NoCompression` (for example, for already compressed\
    \ image or PDF files).\nTo unpack an archive, you can use `Expand-Archive`:\n\n\
    ```\n> Expand-Archive my.zip       # unpack in the current directory\n> Expand-Archive\
    \ my.zip -DestinationPath dir   # unpack in dir\n```\n\nAmazingly, there is no\
    \ way to view or list the contents of an archive file. If necessary, you may have\
    \ to use commands from one of the numerous ZIP extension modules available on\
    \ the internet.\n\n# 7.3.1 Compressing Search Results\n\nBasically, `Compress-Archive`\
    \ can also process results of `Get-ChildItem`, as long as you specify the filename\
    \ of the archive with the `-DestinationPath` option. However, the behavior of\
    \ `Compress-Archive` takes some getting used to. Let's assume we have the following\
    \ directory structure:\n\n```\ndirA\\n    file1\n    file2\n    dirB\\n      \
    \  file3\n```\n\n`Get-ChildItem` will now recursively traverse the contents of\
    \ `dirA` and pass it to `Compress-Archive`:\n\n```\n> Get-ChildItem -Recurse dirA\
    \ |\n    Compress-Archive -DestinationPath my.zip\n> Expand-Archive my.zip -DestinationPath\
    \ dirC\n```\n\nThe `dirC` directory now contains the following files and directories:\n\
    \n```\ndirC\\n    file1\n    file2\n    file3 (!)\n    dirB\\n        file3\n\
    ```\n\nThis result occurs because `Compress-Archive` received the `dirB` directory\
    \ once and the `file3` file once from `Get-ChildItem`. `dirB` was processed correctly.\
    \ However, `file3` was processed without considering the directory. The file was\
    \ therefore inserted into the archive twice. The documentation points out this\
    \ special case, so the behavior is apparently not considered an error. In this\
    \ respect, you should use `Compress-Archive` for further processing of files only\
    \ if all files are located in the same directory."
