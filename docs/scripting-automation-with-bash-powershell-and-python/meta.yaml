    \n以下示例来自我与 Bernd Öggl 合著的《Git: Project Management for Developers and DevOps Teams》（Rheinwerk\
    \ Computing，2023）。`pre-commit` 测试是否存在已更改或新文件，这些文件既未包含在提交中，也未被 `.gitignore` 排除。如果存在，这些文件将由\
