    \n```python\n>>> d = {'a':12, 'c':78, 'b':3, 'd':43}\n>>> { x for x in d }\n{'a',\
    \ 'c', 'b', 'd'}\n>>> [ x for x in d ]\n['a', 'c', 'b', 'd']\n```\n\n如果你在循环中需要两个变量来表示键值对，那么你需要使用\
    \ `items` 方法：\n\n```python\n>>> { k for k,v in d.items() }\n{'a', 'c', 'b', 'd'}\n\
    >>> { v for k,v in d.items() }\n{43, 3, 12, 78}\n```\n\n要使表达式的结果本身再次成为字典，你应该以\
    \ `key:value` 格式构建结果表达式：\n\n```python\n>>> { k:v*2 for k,v in d.items() }\n{'a':\
    \ 24, 'c': 156, 'b': 6, 'd': 86}\n```\n\n## 5.12.6 脚本参数循环\n\n当你向 Python 脚本传递参数时，可以在脚本中使用\
    \ `sys.argv` 语句来评估它们。`sys` 是一个模块；必须首先通过 `import` 读取它。`argv` 是一个列表，其第一个元素是脚本的文件名。其他列表元素包含传递的参数。由于很少需要脚本名称，因此使用\
    \ `[1:]` 表达式将其排除。\n\n```python\n# 示例文件 script-parameters.py\nimport sys\nif(len(sys.argv)\
    \ <= 1):\n    print(\"未传递任何参数。\")\nelse:\n    for x in sys.argv[1:]:\n       \
    \ print(\"参数:\", x)\n```\n\n脚本的一个可能调用如下所示：\n\n```\n./script-parameters.py a b\n\
    参数: a\n参数: b\n```\n\n终端窗口通常运行 Bash。它会立即评估像 `*.txt` 这样的表达式，然后将找到的文件列表传递给调用的命令。因此，如果当前目录包含\
    \ `readme.txt`、`copyright.txt` 和 `gpl.txt` 文件，那么 `./script-parameters.py *.txt`\
    \ 将传递所有三个文件的名称：\n\n```\n./script-parameters.py *.txt\n参数: copyright.txt\n参数: gpl.txt\n\
    参数: readme.txt\n```\n\n## 5.12.7 Windows 上的 Globbing\n\n如果你在 macOS 或 Linux 上运行\
    \ `myscript.py *.txt`，当前目录中所有文本文件的名称都会传递给脚本，并且可以通过 `sys.argv[1:]` 进行评估。这个任务在 Windows\
    \ 上无法工作。脚本接收 `*.txt` 作为唯一参数，必须自己负责查找文本文件。同名模块中的 `glob` 函数在这方面提供了帮助：\n\n```python\n\
