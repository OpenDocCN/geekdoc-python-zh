    $ ./vbox-mac.py vbox/*.vbox\n\nkali-2022.vbox: MAC=080027DB966A\nkali-english.vbox:\
    \ MAC=080027B8A33A\n...\n```\n\n由于 *.vbox 文件使用了命名空间，因此不能使用 `iter` 方法。相反，使用 `find`\
    \ 和 `findall` 方法，每个方法都传递一个包含命名空间前缀的字典作为附加参数：\n\n```python\n# Sample file vbox-mac.py\n\
    import os, sys\nimport xml.etree.ElementTree as ET\nnamesp = { 'ns': 'http://www.virtualbox.org/'}\n\
    for xmlfile in sys.argv[1:]:\n    basename = os.path.basename(xmlfile)\n    root\
    \ = ET.parse(xmlfile).getroot()\n    machine = root.find('ns:Machine', namesp)\n\
    \    hardware = machine.find('ns:Hardware', namesp)\n    network = hardware.find('ns:Network',\
    \ namesp)\n    for adapter in network.findall('ns:Adapter', namesp):\n       \
    \ if 'MACAddress' in adapter.attrib:\n            print('%30s: MAC=%s' %\n   \
    \             (basename, adapter.attrib['MACAddress']))\n```\n\n## 10.6 Bash 中的\
    \ XML\n\nBash 处理 XML 文档的能力并不比处理 JSON 文件强。在这种情况下，一个可能的变通方法是使用外部命令，但这些命令必须单独安装。在\
    \ Linux 上，你可以使用发行版的包管理工具，而在 macOS 上，最佳选择是使用 Homebrew。\n\n### 10.6.1 xmllint\n\n\
    `xmllint` 命令以可读的方式显示带有缩进的 XML 文档，并验证其是否符合 XML 语法规则。如果一个 XML 文件根本无法编辑，使用 `xmllint`\
    \ 进行简短测试是合适的。在 macOS 上，该命令默认安装，但在 Linux 上，该命令根据发行版隐藏在不同的包中：\n\n```\n$ sudo apt\
    \ install libxml2-utils    (Debian, Ubuntu)\n$ sudo dnf install libxml2      \
    \    (Fedora, RHEL)\n$ yay -yS libxml2                   (Arch Linux)\n```\n\n\
    在最简单的情况下，你将 XML 文件的文件名传递给 `xmllint`。该命令验证 XML 语法，并返回错误消息或原样输出文件。\n\n```\n$ xmllint\
    \ countries-malformed.xml\n\ncountries-malformed.xml:6: parser error: Opening\
    \ and ending tag\nmismatch: country line 4 and countries </countries>\ncountries-malformed.xml:7:\
    \ parser error : Premature end of data\nin tag country line 4\n```\n\n你也可以选择根据\
    \ *文档类型定义*（DTD）或 *XML 架构定义*（XSD）来验证 XML 文件。你可以使用 `--format` 正确缩进语法正确的 XML 文件以提高可读性：\n\
    \n```\n$ xmllint --format countries-unformatted.xml\n\n<?xml version=\"1.0\"?>\n\
    <countries>\n  <country code=\"AF\" iso=\"4\">Afghanistan</country>\n  ...\n```\n\
    \n最后，你也可以使用 `xmllint` 处理 XPath 表达式，如下例所示：\n\n```\n$ xmllint --xpath '/*/MapTZ[57]/@WinID'\
    \ timezone-mapping.xml\n\nWinID=\"Mountain Standard Time\"\n```\n\n要将 `xmllint`\
    \ 用作过滤器，你必须传递一个单独的减号作为参数，例如，在以下代码中：\n\n```\n$ curl -s <url> | xmllint - --format\n\
    ```\n\n> **不兼容命名空间**\n`xmllint` 中的 XPath 表达式只有在 XML 文档不使用命名空间时才能正确解析。尽管你可以在互联网上找到关于如何绕过此限制的说明，但使用另一个工具是更好的方法。一个选择是\
    \ `xmlstarlet`，我将在接下来描述它。\n\n### 10.6.2 XMLStarlet\n\n在 Linux 和 macOS 上，`xmlstarlet`\
    \ 包提供 `xmlstarlet` 命令或简称为 `xml`（例如，在 Arch Linux 上）。此包提供的编辑选项比 `xmllint` 多得多，特别是对于修改\
    \ XML 文档。然而，该项目已经停止，当前版本自 2014 年以来未更新。\n\n在此，我将仅描述用于分析 XPath 表达式的 `sel` 子命令。以下命令首先为\
    \ `*.vbox` 文件中的默认命名空间定义 `ns` 缩写。`-t -v 'xpath'` 将指定的 XPath 表达式应用于 XML 文件并输出结果值（`-v`\
    \ 表示值）。`-n` 在输出中添加换行符。\n\n```\n$ xmlstarlet sel -N ns='http://www.virtualbox.org/'\
    \ \\\n    -t -v './/ns:HardDisk/@location' -n vbox/*.vbox\n\nKali-Linux-2022.2-virtualbox-amd64-disk001.vdi\n\
    kali-english.vdi\n...\n```\n\n你可以通过 `xml sel --help` 找到关于 `xml sel` 相当不直观的语法的信息。更多文档可在\
    \ https://xmlstar.sourceforge.net/docs.php 找到。\n\n## 10.7 INI 文件\n\nINI 文件是用于存储键值对的文本文件。INI\
    \ 文件可以使用 `[section]` 划分为不同的部分：\n\n```ini\n; File config.ini\n[server]\nhostname\
    \ = example.com\nport = 8080\n\n[data]\nimagePath = /mnt/images\ndbName = mydb\n\
    ```\n\nINI 文件通常用于存储配置数据。只有分号用于标记注释。然而，特别是在 Linux 环境中，`#` 也大多被接受。\n\n### 10.7.1\
    \ Python\n\n在 Python 中读取 INI 文件最简单的方法是使用 `ConfigParser` 模块。以下清单展示了直观的应用。请注意，解析器总是返回字符串。如果你想将端口号\
    \ 8080 用作数字，你必须使用 `int()` 执行相应的转换。\n\n```python\n# Sample file read-config.py\n\
    from configparser import ConfigParser\nconfig = ConfigParser()\nconfig.read('config.ini')\n\
    print(config['server']['port'])  # output: 8080\n```\n\n### 10.7.2 PowerShell\n\
    \n尽管 INI 文件在 Windows 上相当常用，但 PowerShell 缺乏一个可以轻松读取此类文件的 cmdlet。在许多情况下，你可以简单地使用以下命令：\n\
    \n```powershell\n> $config = Get-Content 'config.ini' |\n    Select-String '^.*=.*[^=]*$'\
    \ |\n    ConvertFrom-StringData\n\n> $config.port\n8080\n```\n\n`Get-Content`\
    \ 读取文件并逐行提供。`Select-String` 使用正则表达式过滤出所有匹配 `key = value` 模式的行。`ConvertFrom-StringData`\
    \ 将键值对转换为哈希表。\n\n然而，当在不同组中使用相同的键时，这种简单的方法就达到了极限。如果你想分析复杂的 INI 文件而不陷入语法陷阱，最好使用流行的\
    \ PsIni 扩展，可在 https://www.powershellgallery.com/packages/PsIni 获取。\n\n### 10.7.3\
    \ Bash\n\n与 PowerShell 一样，Bash 缺少解析 INI 文件的功能。在许多 Linux 发行版中，你可以使用 `crudini` 来实现此目的。但是，你必须事先安装同名的包。但是，请注意，此包本身就是一个\
    \ Python 脚本！因此，`crudini` 只有在安装了 Python 的情况下才能工作。\n\n要读取单个值，你可以简单地传递 INI 文件、节名和键名。你可以在\
    \ `crudini --help` 中找到各种其他类型的应用。\n\n```\n$ crudini --get config.ini server port\n\
    8080\n```"
