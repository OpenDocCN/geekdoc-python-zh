    # 20.3 AWS PowerShell Module


    Basically, there is nothing wrong with calling the AWS CLI described earlier (i.e.,
    the `aws` command) in PowerShell scripts. But an even more elegant way is available:
    Amazon provides several modules for various AWS services. These modules are referred
    to as *AWS Tools for PowerShell*. The modules are excellently maintained and usually
    updated once or twice a week. Because the AWS Tools for PowerShell return real
    PowerShell objects, you can often express your scripts more clearly than with
    by using AWS CLI.

    You can easily install the tools using `Install-Module`, and not only on Windows,
    by the way, but also on Linux and macOS:


    ```

    > Install-Module AWS.Tools.Common

    > Install-Module AWS.Tools.S3

    ```


