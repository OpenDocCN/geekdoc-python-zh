    # 5.9.1 Assignments


    Ordinary assignments of the variable = expression type exist in every programming
    language. Python also knows some unusual variants. For example, you can assign
    the same content to multiple variables at once. Python proceeds from right to
    left. Thus, in the next example, the following assignments are made: c=16, then
    b=c, and finally a=b. Thus, all three variables reference the same object in the
    memory, which represents the number 16.


    ```

    a = b = c = 16      # assign the same value to three variables

    ```


    If you want to assign different values to multiple variables in a compact notation,
    you can use lists or tuples for this purpose. For example, the following assignments
    will work:


    ```

    a, b = 2, 3

    [e, f, g] = [7, 8, 9]

    e, f, g = [7, 8, 9]  # equivalent

    ```


    You can also use this type of assignment to swap the contents of two variables.
    With most other programming languages, you would need a third, temporary variable
    to do this swap.


    ```

    x, y = y, x         # swap x and y

    ```'
