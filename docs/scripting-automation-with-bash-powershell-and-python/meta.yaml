  - "[PAGE 112]\n\nThe following command determines the number of PNG files in a directory\
    \ and all subdirectories:\n\n```\n> Get-ChildItem -Recurse *.png | Measure-Object\n\
    \nCount           : 327\nAverage         :\nSum             :\n...\n```\n\n`Measure-Object`\
    \ returns all possible properties. In our example, however, only `Count` is of\
    \ interest:\n\n```\n> (Get-ChildItem -Recurse *.png | Measure-Object).Count\n\
    327\n```\n\nHow much space do these files take up? `Measure-Object` can analyze\
    \ and total a specific property from the `Get-ChildItem` results list. In this\
    \ case, only `Sum` is relevant from the result properties:\n\n```\n> (Get-ChildItem\
    \ -Recurse *.png |\n    Measure-Object -Property Length -Sum).Sum\n\n97344806\n\
    ```\n\n# 4.4.1 Chains of Commands\n\nThe pipe operator can of course be used multiple\
    \ times (i.e., `command1 | command2 | command3` etc.). This option opens up fascinating\
    \ possibilities. The following command determines all files in the `Downloads`\
    \ directory. Then, it sorts the results list by size (largest file first), extracts\
    \ the first ten files, and determines their space requirements.\n\n```\n> (Get-ChildItem\
    \ -Path Downloads |\n    Sort-Object -Property Length -Descending |\n    Select-Object\
    \ -First 10 |\n    Measure-Object -Property Length -Sum).Sum\n\n22737476\n```\n\
    \nIf you want to delete the ten largest files and use a query to double-check\
    \ that this process is complete, you should proceed as follows:\n\n```\n> Get-ChildItem\
    \ -Path Downloads |\n    Sort-Object -Property Length -Descending |\n    Select-Object\
    \ -First 10 |\n    Remove-Item -Confirm\n```"
  - "[PAGE 113]\n\n# 4.4.2 Multiline Statements\n\nIn the terminal, you can enter\
