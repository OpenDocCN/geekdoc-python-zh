  md: "# 6.6 Other Commands\n\nTo conclude this chapter, I want to briefly introduce\
    \ you to a few more frequently used commands:\n\n+   - **alias**\n  `alias` defines\
    \ shortcuts. `alias ll='ls -lh'` allows you to run the frequently used `ls -l\
    \ -h` command (to list files with detailed information and present the file size\
    \ as *human readable*) in the `ll` short notation. Shortcuts are best specified\
    \ in the `.bashrc` file so that they are permanently available.\n\n- **cat file**\n\
    \  `cat file` outputs a text file. The command is often combined with input or\
    \ output redirection. For example, `cat text1 text2 text3 > result` joins three\
    \ text files and saves the result in a new file.\n\n  `Cat > newfile` is also\
    \ particularly useful. This construct allows you to create a short new text file\
    \ without launching an editor. Because no file was passed to the command for reading,\
    \ it expects the input in the terminal (i.e., from standard input). Pressing `Ctrl`\
    \ + `D` terminates the input:\n\n  \n  $ cat > newfile\n  Line 1\n  Line 2\n \
    \ <Ctrl>+<D>\n  \n\n- **date**\n  `date` returns the current date and time. A\
    \ string starting with `+` optionally controls the output format. For example,\
    \ `date \"+%Y-%m-%d\"` generates a string with the date in International Organization\
    \ for Standardization (ISO) format (for example, `2023-12-31`).\n\n- **history**\n\
    \  `history` lists all recently executed commands.\n\n- **ip**\n  `ip` determines\
    \ or changes the network configuration. The following examples contain commands\
    \ that are used particularly often:\n\n  \n  $ ip addr       # lists all IP addresses\
    \ of the computer\n  $ ip link       # lists the network adapters\n  $ ip route\
    \      # displays the routing table\n  \n\n- **less file**\n  `less file` displays\
    \ a text file just like `cat`. This command is suitable for longer files because\
    \ you can scroll through the text at your leisure using the cursor keys. `q` terminates\
    \ the program."
