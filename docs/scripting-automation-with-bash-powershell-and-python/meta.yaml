    \ You turn this string into an ordinary Unicode string using `decode('utf-8')`.\
    \ If you want to process the string line by line, the easiest approach is to use\
    \ `splitlines`:\n\n```\nimport subprocess\nresult   = subprocess.run([\"ls\",\
    \ \"-l\"], capture_output=True)\noutput   = result.stdout\nerrormsg = result.stderr\n\
    for line in output.decode('utf-8').splitlines():\n    print('Result:', line)\n\
    ```\n\n# 5.16.6 Running Commands through the Shell\n\nInstead of running a command\
    \ directly through Python, you can redirect it through the standard shell. For\
    \ many Linux distributions, this standard shell is Bash. For this task, you must\
    \ pass the additional `shell=True` parameter to `run`. There are two advantages\
    \ to this approach: First, you can specify the command or commands to be executed\
    \ in a simple string, where the pipe character (`|`) also works. Thus, for example:\n\
    \n```\nimport subprocess\nresult = subprocess.run('dmesg | grep -i eth', capture_output=True,\
    \ shell=True)\nprint('Shell:\\n', result.stdout.decode('utf-8'))\n```\n\nSecond,\
    \ the shell evaluates the `*` and `?` wildcard characters, which allows you to\
    \ easily process files that match a certain pattern:\n\n```\nresult = subprocess.run('ls\
    \ -l *.py', capture_output=True, shell=True)\n```\n\nHowever, using the shell\
    \ causes increased overhead. If you're concerned with executing many commands\
    \ as quickly as possible, you should avoid using `shell=True` if possible. For\
    \ tips on how to succeed with common tasks without `shell=True`, see https://docs.python.org/3/library/subprocess.html.\n\
    \n# 5.16.7 Error during a Command Call\n\nThe way in which `run` responds to errors\
    \ depends on whether you run the command directly or through the shell and what\
