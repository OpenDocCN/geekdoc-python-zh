    The `mkdir` command we used earlier does not correspond to the typical appearance
    of cmdlets. In fact, the quasi-official way to create a directory is `New-Item
    -ItemType "directory" -Name mydir`. But even Microsoft has realized that this
    is going too far. For this reason, the `mkdir` function is available, which calls
    `New-Item` and passes the necessary options.


