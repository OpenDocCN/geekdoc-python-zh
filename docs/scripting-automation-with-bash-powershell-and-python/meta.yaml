  - "[PAGE 407]\n\n```\n\"X-Amzn-Trace-Id\": \"Root=1-64228236-74fe...\"\n}\n}\n```\n\
    \nIn the second example, you first create the tiny local JSON file called mydata.json.\
    \ Then, you use PUT to transfer this file to the /put address. The website responds\
    \ with the sent data, so you can control if everything works:\n\n```\n$ cat >\
    \ mydata.json << EOF\n{\n    \"firstName\": \"John\",\n    \"lastName\": \"Doe\"\
    \n}\nEOF\n```\n\n```\n$ curl -X PUT https://httpbin.org/put?para=123 -d @mydata.json\
    \ \\n      -H \"Content-Type: application/json\"\n```\n\n```\n{\n    \"args\"\
    : {\n        \"para\": \"123\"\n    },\n    \"data\": \"{ \"firstName\": \"John\"\
    ,  \"lastName\": \"Doe\"}\",\n    \"json\": {\n        \"firstName\": \"John\"\
    ,\n        \"lastName\": \"Doe\"\n    }, ...\n}\n```\n\nFor debugging purposes,\
    \ an often useful approach is to compile requests in a GUI. In the final example,\
    \ you'll test the basic authentication. In this test, you specify the login data\
    \ with /basic-auth/name/pw. Then, the website checks if this data matches that\
    \ of -u 'name:pw'. With -I, the status code of the response will be displayed:\
    \ In the first case, that's 200 (successful authentication); in the second case,\
    \ 401 (unsuccessful authentication).\n\n```\n$ curl -X GET \"https://httpbin.org/basic-auth/maria/topsecret\"\
    \ \\n      -u 'maria:topsecret' -I\n\nHTTP/2 200\n```\n\n```\n$ curl -X GET \"\
    https://httpbin.org/basic-auth/maria/topsecret\" \\n      -u 'maria:wrong' -I\n\
    \nHTTP/2 401\n```"
- md: "## 18.4.2 wget\n\nwget basically supports the same functions as curl, but the\
    \ options have different names. It is a matter of personal preference whether\
    \ you prefer using wget or curl. I will refrain from describing the options in\
    \ this section (you can read man wget if needed!) and just describe two examples.\
    \ The first command is a simple GET request. httpbin.org responds with a UUID\
    \ wrapped in a JSON document. Because of -O -, the return is directly displayed\
    \ in the terminal. In turn, -q (quiet) prevents the output of status information.\n\
    \n```\n$ wget https://httpbin.org/uuid -O - -q\n\n{\n  \"uuid\": \"9672f6c6-a27e-4059-8d87-35f0dc171bc7\"\
    \n}\n```\n\nThe second example tests the transfer of JSON data by means of a POST\
    \ request:\n\n```\n$ wget --header \"Content-Type: application/json\" \\\n   \
    \   --post-data '{\"firstName\": \"John\", \"lastName\": \"Doe\"}' \\\n      https://httpbin.org/post\
    \ -O -\n\n{\n  ...\n  \"json\": {\n    \"firstName\": \"John\",\n    \"lastName\"\
    : \"Doe\"\n  }, ...\n}\n```\n\n## 18.4.3 Using REST APIs in Bash Scripts\n\nBash\
    \ is not the ideal scripting language for REST applications. Using Python or PowerShell,\
    \ you can formulate your scripts better, more efficiently, and more reliably.\
    \ For simple tasks, however, the combination of curl/wget plus jq (see Chapter\
    \ 10) is sufficient.\n\nThe following example uses the https://ipinfo.io website.\
    \ This website responds to GET requests with a JSON document that contains an\
    \ approximate geographic mapping in addition to the original IP address. (Do not\
    \ rely on the accuracy of the answer!)\n\n```\n$ curl https://ipinfo.io\n\n{\n\
    \  \"ip\": \"91.115.157.28\",\n  \"hostname\": \"91-115-157-28.adsl.highway.telekom.at\"\
    ,\n  \"city\": \"Graz\",\n  \"region\": \"Styria\",\n  \"country\": \"AT\",\n\
    \  \"loc\": \"47.0667,15.4500\",\n  \"postal\": \"8041\",\n  \"timezone\": \"\
    Europe/Vienna\", ...\n}\n```\n\nThe get-location.sh script uses jq to extract\
    \ the city, the region, and the country from the response:\n\n```\n# Sample file\
    \ get-location.sh\njson=$(curl https://ipinfo.io -s)\nfor key in city region country;\
    \ do\n    echo -n \"$key: \"\n    echo $json | jq .$key\ndone\n```\n\nAt my location,\
    \ the script then returns the following output:\n\n```\ncity: \"Graz\"\nregion:\
    \ \"Styria\"\ncountry: \"AT\"\n```\n\n## 18.5 Using REST APIs in PowerShell\n\n\
    PowerShell provides two cmdlets to choose from to perform HTTP requests:\n\n-\
    \ You learned about `Invoke-WebRequest` in the previous chapter (see Chapter 17,\
    \ Section 17.7). The cmdlet can also be used for REST methods.\n- `Invoke-RestMethod`\
    \ has certain advantages and disadvantages compared to `Invoke-WebRequest`: A\
    \ convenient aspect is that the cmdlet converts responses in a flat (non-nested)\
    \ JSON format directly into a `PSCustomObject`. If the web service returns responses\
    \ in XML format, `Invoke-WebRequest` directly returns an object of the `XmlDocument`\
    \ type. This relatively intelligent handling of typical REST data types simplifies\
    \ the continued analysis.\n  On the other hand, annoyingly, the cmdlet does not\
    \ return the HTTP status code. If the request is successful (code 2xx), you'll\
    \ receive result data; otherwise an error will occur. In some REST applications,\
    \ this approach is too minimalistic.\n\nFrom my point of view, `Invoke-RestMethod`\
    \ has more disadvantages. In most applications, I prefer `Invoke-WebRequest` and\
    \ then convert the `Content` string into a JSON object in the following way:\n\
    \n```\n> $json = (Invoke-WebRequest `\n    'https://httpbin.org/headers').Content\
    \ | ConvertFrom-Json\n\n> $json.headers.host\nhttpbin.org\n```\n\nIn my tests,\
    \ some REST services returned HTML code instead of JSON code on requests made\
    \ using `Invoke-RestMethod` or `Invoke-WebRequest`. The solution in this case\
    \ is to specify the user agent `curl` in the header so that the service does not\
    \ erroneously assume that the user agent is a web browser:\n\n```\n> Invoke-RestMethod\
    \ 'https://ipinfo.io'\n\n<!DOCTYPE html><html lang=\"en\"> ... (HTML code extends\
    \ over multiple pages)\n\n> Invoke-RestMethod 'https://ipinfo.io' `\n    -Headers\
    \ @{'User-Agent' = 'curl'}\n\nip        : 91.115.157.28\nhostname  : 91-115-157-28.adsl.highway.telekom.at\n\
    city      : Graz\nregion    : Styria\ncountry   : AT\n...\n```\n\n### 18.5.1 Options\n\
    \nNot only do the two Invoke cmdlets provide different result data types, but\
    \ there are also various special options that differ from each other. Fortunately,\
    \ at least the options for the basic settings match:\n\n- -Uri passes the address.\
    \ This option does not have to be specified (i.e., the address can also be passed\
    \ directly to the cmdlet).\n- -Method specifies the desired request. Allowed settings\
    \ are Get, Put, Post, and so on.\n- -Authentication selects the desired authentication\
    \ method (None, Basic, Bearer, or OAuth).\n- -Credential passes data for Basic\
    \ authentication to the request. The pair of login name and password must be passed\
    \ as a PSCredential object. You can initialize such an object interactively via\
    \ Get-Credential. Alternatively, you can initialize such an object by using the\
    \ following code:\n- -Token passes a string to the cmdlet for Bearer and OAuth\
    \ authentication.\n- -Body passes the data to be transferred to the web server\
    \ (upload). If necessary, you can use -ContentType to specify the format and character\
    \ set of this data.\n- -Header expects a hash table with the header settings.\n\
    \n```\n$password = ConvertTo-SecureString 'topSecret' -AsPlainText `\n       \
    \                     -Force\n$credential = New-Object `\n    System.Management.Automation.PSCredential('loginname',\n\
    \                            $password)\n```\n\nThe following lines show how you\
    \ can transfer your own data to a server using Invoke-WebRequest:\n\n```\n$data\
    \ = @{ firstName = 'John'; lastName = 'Doe'}\n$jsondata = $data | ConvertTo-Json\n\
    $url = 'https://httpbin.org/put'\n$response = Invoke-WebRequest -Method Put $url\
    \ -Body $jsondata\n$response.Content\n\n{\n  \"headers\": {\n    \"Content-Length\"\
    : \"46\",\n    \"Host\": \"httpbin.org\",\n    \"User-Agent\": \"Mozilla/5.0 (Linux;\
    \ ...) PowerShell/7.3.2\",\n    \"X-Amzn-Trace-Id\": \"Root=1-6426e776-337f635051c3c6753...\"\
    \n  },\n  \"json\": {\n    \"firstName\": \"John\",\n    \"lastName\": \"Doe\"\
    \n  }, ...\n}\n```\n\nSince a request call typically requires many options and\
    \ parameters, a good idea is to first collect the data in a hash table and pass\
    \ it to the cmdlet via *splatting* (see [Chapter 4, Section 4.3](#chapter-4-section-4-3)):\n\
    \n```\n$data = @{ firstName = 'John'; lastName = 'Doe'}\n$para = @{ Uri = 'https://httpbin.org/put';\n\
    \           Method = 'Put';\n           Body = $data | ConvertTo-Json}\n$response\
    \ = Invoke-WebRequest @para\n```\n\n## 18.6 Example: Determining the Current Weather\n\
    \nThe following script combines two REST APIs:\n\n- First, the *https://ipinfo.io*\
    \ geolocation service is used to determine the presumed location for the current\
    \ IP address. This doesn't always work precisely and can go completely wrong if\
    \ you use a VPN connection. But in most cases, the returned coordinates are reasonably\
    \ good.\n- In the second step, the current weather is determined for the identified\
    \ location. The API at *https://api.weatherapi.com* is available free of charge\
    \ with certain restrictions. However, you must get an API key. (Providing your\
    \ email address is sufficient; you don't need to provide a credit card number\
    \ or any other personal information.)\n\nFor the first step, I used `Invoke-RestMethod`,\
    \ which is the most convenient way to analyze the data submitted by *ipinfo.io*.\
    \ In addition, I explicitly converted the much more complex JSON structure of\
    \ *weatherapi.com* into PowerShell data structures using `ConvertFrom-Json`.\n\
    \n```\n# Sample file get-weather.ps1\n# Use your own key!\n$key = \"7901...\"\n\
    \n# determines longitude and latitude from the current IP address\n$location =\
    \ (Invoke-RestMethod \"https://ipinfo.io\" `\n            -Headers @{'User-Agent'\
    \ = 'curl'}).loc\n\n# determines the weather for this location\n$base = \"https://api.weatherapi.com/v1/current.json\"\
    \n$url = \"${base}?key=$key&q=$location&aqi=no\"\n$response = Invoke-WebRequest\
    \ $url\n$content = $response.Content | ConvertFrom-Json\n$city = $content.location.name\n\
    $temp = $content.current.temp_c\n$text = $content.current.condition.text\nWrite-Output\
    \ \"Current weather in ${city}: $text at $temp °C\"\n```\n\nWhen you run the script,\
    \ the result looks something like the following line:\n\n```\nCurrent weather\
    \ in Graz: Partly cloudy at 5 °C\n```\n\nFor another example of using `Invoke-RestMethod`\
    \ to save exchange rates, see [Chapter 11, Section 11.4](#). In this example,\
    \ the cmdlet directly returns an XML object that is subsequently evaluated.\n\n\
    ## 18.7 Using REST APIs in Python\n\nThe linchpin of REST scripts in Python is\
    \ the `requests` module, which I already briefly introduced to you in [Chapter\
    \ 17](#). The module has a disadvantage in that, unlike the `urllib` module, it\
    \ must be installed separately using pip:\n\n```\n$ pip install requests     \
    \     (Windows, Linux)\n$ pip3 install requests         (macOS, old Linux distributions)\n\
    ```\n\nInstead, the function of the same name can be used to run all conceivable\
    \ requests without syntactic contortions. The following lines show a simple Get\
    \ request. The binary result (`response.content`) is converted to a UTF-8 string\
    \ via `decode` and is then output:"
  mdcn: "## 18.4.2 wget\n\nwget 基本上支持与 curl 相同的功能，但选项名称不同。使用 wget 还是 curl 取决于个人偏好。本节我将不详细描述各个选项（如需了解，可以阅读\
    \ `man wget`！），只介绍两个示例。第一个命令是一个简单的 GET 请求。httpbin.org 会返回一个包裹在 JSON 文档中的 UUID。由于使用了\
    \ `-O -`，返回结果会直接显示在终端中。而 `-q`（安静模式）则会阻止状态信息的输出。\n\n```\n$ wget https://httpbin.org/uuid\
    \ -O - -q\n\n{\n  \"uuid\": \"9672f6c6-a27e-4059-8d87-35f0dc171bc7\"\n}\n```\n\
    \n第二个示例通过 POST 请求测试 JSON 数据的传输：\n\n```\n$ wget --header \"Content-Type: application/json\"\
    \ \\\n      --post-data '{\"firstName\": \"John\", \"lastName\": \"Doe\"}' \\\n\
    \      https://httpbin.org/post -O -\n\n{\n  ...\n  \"json\": {\n    \"firstName\"\
    : \"John\",\n    \"lastName\": \"Doe\"\n  }, ...\n}\n```\n\n## 18.4.3 在 Bash 脚本中使用\
    \ REST API\n\nBash 并非编写 REST 应用程序的理想脚本语言。使用 Python 或 PowerShell，你可以编写出更好、更高效、更可靠的脚本。然而，对于简单任务，curl/wget\
    \ 加上 jq（参见第 10 章）的组合就足够了。\n\n以下示例使用了 https://ipinfo.io 网站。该网站对 GET 请求的响应是一个 JSON\
    \ 文档，其中除了原始 IP 地址外，还包含一个近似的地理映射。（请勿依赖答案的准确性！）\n\n```\n$ curl https://ipinfo.io\n\
    \n{\n  \"ip\": \"91.115.157.28\",\n  \"hostname\": \"91-115-157-28.adsl.highway.telekom.at\"\
    ,\n  \"city\": \"Graz\",\n  \"region\": \"Styria\",\n  \"country\": \"AT\",\n\
    \  \"loc\": \"47.0667,15.4500\",\n  \"postal\": \"8041\",\n  \"timezone\": \"\
    Europe/Vienna\", ...\n}\n```\n\nget-location.sh 脚本使用 jq 从响应中提取城市、地区和国家：\n\n```\n\
    # 示例文件 get-location.sh\njson=$(curl https://ipinfo.io -s)\nfor key in city region\
    \ country; do\n    echo -n \"$key: \"\n    echo $json | jq .$key\ndone\n```\n\n\
    在我的位置，该脚本会返回以下输出：\n\n```\ncity: \"Graz\"\nregion: \"Styria\"\ncountry: \"AT\"\n\
    ```\n\n## 18.5 在 PowerShell 中使用 REST API\n\nPowerShell 提供了两个 cmdlet 供选择来执行 HTTP\
    \ 请求：\n\n- 你在上一章（参见第 17 章，第 17.7 节）已经了解了 `Invoke-WebRequest`。该 cmdlet 也可用于 REST\
    \ 方法。\n- `Invoke-RestMethod` 与 `Invoke-WebRequest` 相比，有其特定的优缺点：一个便利的方面是，该 cmdlet\
    \ 能将扁平（非嵌套）JSON 格式的响应直接转换为 `PSCustomObject`。如果 Web 服务返回 XML 格式的响应，`Invoke-WebRequest`\
    \ 会直接返回一个 `XmlDocument` 类型的对象。这种对典型 REST 数据类型的相对智能的处理简化了后续分析。\n  另一方面，令人烦恼的是，该\
    \ cmdlet 不返回 HTTP 状态码。如果请求成功（代码 2xx），你会收到结果数据；否则会发生错误。在某些 REST 应用程序中，这种方法过于简化。\n\
    \n在我看来，`Invoke-RestMethod` 的缺点更多。在大多数应用中，我更喜欢使用 `Invoke-WebRequest`，然后按以下方式将 `Content`\
    \ 字符串转换为 JSON 对象：\n\n```\n> $json = (Invoke-WebRequest `\n    'https://httpbin.org/headers').Content\
    \ | ConvertFrom-Json\n\n> $json.headers.host\nhttpbin.org\n```\n\n在我的测试中，一些 REST\
    \ 服务在使用 `Invoke-RestMethod` 或 `Invoke-WebRequest` 发出请求时，返回的是 HTML 代码而不是 JSON 代码。这种情况下的解决方案是在请求头中指定用户代理为\
    \ `curl`，这样服务就不会错误地认为用户代理是 Web 浏览器：\n\n```\n> Invoke-RestMethod 'https://ipinfo.io'\n\
    \n<!DOCTYPE html><html lang=\"en\"> ... (HTML 代码跨越多页)\n\n> Invoke-RestMethod 'https://ipinfo.io'\
    \ `\n    -Headers @{'User-Agent' = 'curl'}\n\nip        : 91.115.157.28\nhostname\
    \  : 91-115-157-28.adsl.highway.telekom.at\ncity      : Graz\nregion    : Styria\n\
    country   : AT\n...\n```\n\n### 18.5.1 选项\n\n这两个 Invoke cmdlet 不仅提供不同的结果数据类型，而且还有各种彼此不同的特殊选项。幸运的是，至少基本设置的选项是匹配的：\n\
    \n- -Uri 传递地址。此选项不必指定（即地址也可以直接传递给 cmdlet）。\n- -Method 指定所需的请求。允许的设置有 Get、Put、Post\
    \ 等。\n- -Authentication 选择所需的认证方法（None、Basic、Bearer 或 OAuth）。\n- -Credential 将\
    \ Basic 认证的数据传递给请求。登录名和密码对必须作为 PSCredential 对象传递。你可以通过 Get-Credential 交互式地初始化这样一个对象。或者，你可以使用以下代码初始化这样一个对象：\n\
    - -Token 将一个字符串传递给 cmdlet，用于 Bearer 和 OAuth 认证。\n- -Body 将要传输到 Web 服务器的数据（上传）传递过去。如有必要，你可以使用\
    \ -ContentType 指定此数据的格式和字符集。\n- -Header 期望一个包含头部设置的哈希表。\n\n```\n$password = ConvertTo-SecureString\
    \ 'topSecret' -AsPlainText `\n                            -Force\n$credential\
    \ = New-Object `\n    System.Management.Automation.PSCredential('loginname',\n\
    \                            $password)\n```\n\n以下几行展示了如何使用 Invoke-WebRequest\
    \ 将你自己的数据传输到服务器：\n\n```\n$data = @{ firstName = 'John'; lastName = 'Doe'}\n$jsondata\
    \ = $data | ConvertTo-Json\n$url = 'https://httpbin.org/put'\n$response = Invoke-WebRequest\
    \ -Method Put $url -Body $jsondata\n$response.Content\n\n{\n  \"headers\": {\n\
    \    \"Content-Length\": \"46\",\n    \"Host\": \"httpbin.org\",\n    \"User-Agent\"\
    : \"Mozilla/5.0 (Linux; ...) PowerShell/7.3.2\",\n    \"X-Amzn-Trace-Id\": \"\
    Root=1-6426e776-337f635051c3c6753...\"\n  },\n  \"json\": {\n    \"firstName\"\
    : \"John\",\n    \"lastName\": \"Doe\"\n  }, ...\n}\n```\n\n由于一个请求调用通常需要许多选项和参数，一个好主意是先将数据收集到一个哈希表中，然后通过\
    \ *splatting*（参见 [第 4 章，第 4.3 节](#chapter-4-section-4-3)）将其传递给 cmdlet：\n\n```\n\
    $data = @{ firstName = 'John'; lastName = 'Doe'}\n$para = @{ Uri = 'https://httpbin.org/put';\n\
    \           Method = 'Put';\n           Body = $data | ConvertTo-Json}\n$response\
    \ = Invoke-WebRequest @para\n```\n\n## 18.6 示例：确定当前天气\n\n以下脚本结合了两个 REST API：\n\
    \n- 首先，使用 *https://ipinfo.io* 地理定位服务来确定当前 IP 地址的推测位置。这并不总是精确的，如果你使用 VPN 连接，可能会完全出错。但在大多数情况下，返回的坐标是相当不错的。\n\
    - 第二步，为确定的位置查询当前天气。*https://api.weatherapi.com* 上的 API 在特定限制下可免费使用。但是，你必须获取一个\
    \ API 密钥。（只需提供你的电子邮件地址；无需提供信用卡号或任何其他个人信息。）\n\n对于第一步，我使用了 `Invoke-RestMethod`，这是分析\
    \ *ipinfo.io* 提交的数据最方便的方式。此外，我使用 `ConvertFrom-Json` 将 *weatherapi.com* 更复杂的 JSON\
    \ 结构显式转换为 PowerShell 数据结构。\n\n```\n# 示例文件 get-weather.ps1\n# 使用你自己的密钥！\n$key =\
    \ \"7901...\"\n\n# 根据当前 IP 地址确定经度和纬度\n$location = (Invoke-RestMethod \"https://ipinfo.io\"\
    \ `\n            -Headers @{'User-Agent' = 'curl'}).loc\n\n# 确定该位置的天气\n$base =\
    \ \"https://api.weatherapi.com/v1/current.json\"\n$url = \"${base}?key=$key&q=$location&aqi=no\"\
    \n$response = Invoke-WebRequest $url\n$content = $response.Content | ConvertFrom-Json\n\
    $city = $content.location.name\n$temp = $content.current.temp_c\n$text = $content.current.condition.text\n\
    Write-Output \"Current weather in ${city}: $text at $temp °C\"\n```\n\n当你运行该脚本时，结果看起来类似于以下行：\n\
    \n```\nCurrent weather in Graz: Partly cloudy at 5 °C\n```\n\n关于使用 `Invoke-RestMethod`\
    \ 保存汇率的另一个示例，请参见 [第 11 章，第 11.4 节](#)。在该示例中，cmdlet 直接返回一个 XML 对象，随后对其进行评估。\n\n\
    ## 18.7 在 Python 中使用 REST API\n\nPython 中 REST 脚本的关键是 `requests` 模块，我已在 [第 17\
    \ 章](#) 中向你简要介绍过。该模块有一个缺点，即与 `urllib` 模块不同，它必须使用 pip 单独安装：\n\n```\n$ pip install\
    \ requests          (Windows, Linux)\n$ pip3 install requests         (macOS,\
    \ old Linux distributions)\n```\n\n作为替代，可以使用同名函数来运行所有可想象的请求，而无需语法上的扭曲。以下几行展示了一个简单的\
    \ Get 请求。二进制结果（`response.content`）通过 `decode` 转换为 UTF-8 字符串，然后输出："
