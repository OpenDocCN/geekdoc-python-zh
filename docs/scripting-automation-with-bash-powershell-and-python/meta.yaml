    \ `HelloWorld.py`：\n\n```\nprint('Hello, World!')\n```\n\n假设你已经安装了 Python 扩展，你可以通过点击\
    \ **运行** 按钮来启动程序。在 Windows 上，实际输出不幸地会在 VS Code 和 PowerShell 在后台使用的状态信息中丢失。\n\n\
    ![](img/a7fa45d496335c22ffb14c3275e24ffb_156_0.png)\n\n## 5.3.1 Shebang\n\n要在没有\
    \ VS Code 或其他开发环境的情况下在 Linux 和 macOS 上运行 Python 脚本，你必须在脚本开头添加以下 shebang 行。在当前的\
    \ Linux 发行版上，你可以简单地指定 `python` 而不是 `python3`，但在较旧的发行版和 macOS 上，只有 `python3` 能明确你指的是哪个\
    \ Python 版本。\n\n```\n#!/usr/bin/env python3\n```\n\n你已经从 Bash 中了解了 shebang 语法：该行指定哪个程序（哪个解释器）应该执行后面的代码。但这种情况下的新内容是\
    \ `env`：Python 根据操作系统或发行版安装在不同的目录中。`env` 在公共目录中搜索，因此比指定固定路径更可靠。\n\n现在，你需要在终端中启动脚本之前，使用\
    \ `chmod` 将其标记为可执行文件：\n\n```\n$ chmod +x hello-world.py          (Linux)\n$ chmod\
    \ a+x hello-world.py         (macOS)\n\n$ ./hello-world.py\n\nHello, World!\n\
    ```\n\n在 Windows 上，shebang 行无关紧要；`*.py` 标识符就足够了。但是，shebang 行也不会引起任何麻烦，并且提高了与其他操作系统的兼容性。\n\
    \n> **Python 脚本在单独的窗口中执行**\n\n在 Windows 上，每次从运行 PowerShell 的终端启动 Python 脚本时，都可能打开一个新的终端窗口。脚本将在那里运行，然后窗口关闭，不给你查看结果的机会。\n\
    \n这种异常行为的原因是 `.py` 标识符未在 `PATHEXT` 系统变量中列出。实际上，这种遗漏不应该发生（至少在重新安装 Python 后不会），但我从痛苦的经验中确认它有时确实会发生。好吧，这就是\
    \ Windows！\n\n解决方案是在 **开始** 菜单中搜索“编辑系统环境变量”。然后，会出现 **控制面板** 对话框，你必须在其中点击 **环境变量**。接下来，在系统变量（对话框的下半部分）中查找\
    \ `PATHEXT`（不是 `Path`），编辑它，并添加分号和扩展名 `.py`。重启终端后，你的 Python 脚本应该在终端 *内* 运行。\n\n\
    ## 5.4 基本语法规则\n\nPython 语句通常由单行组成。与许多其他编程语言不同，它们不以分号或任何其他字符结尾。\n\n如果多行语句的开头和结尾由括号明确标示，则允许使用多行语句，例如在函数调用中。或者，也可以使用\
    \ `\\` 分隔符来构造多行语句：\n\n```\nprint(\"abc\",\n      \"efg\")\na = 1 + 2 + \\\n  \
    \  3 + 4\n```\n\n语句可以以分号结尾。通常，这个分号是可选的，对程序执行没有影响。但是，分号允许在单行中构造多个语句：\n\n```\na\
    \ = 1; b = 2; c = 3\n```\n\n你也可以通过另一种方式执行这个三重赋值，即以组的形式指定变量和值，每个组的组件用逗号分隔。元组在 Python\
    \ 内部创建。两种变体都是 *正确的*，但以下第二种变体更符合 Python 的语言概念：\n\n```\na, b, c = 1, 2, 3\n```\n\
    \n### 5.4.1 块元素\n\n在 Python 中，与任何其他编程语言一样，一些语言元素可以引入一整块额外的语句，例如使用 `if` 的分支、使用\
