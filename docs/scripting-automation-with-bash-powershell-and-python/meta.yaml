    IP address in the local `.ssh/known_hosts` file. The next time you log in, you''ll
    be asked whether you trust the server.


    # 12.2.3 Running Linux and macOS Commands


    Instead of using `ssh` interactively, you can run a command directly on the remote
    computer. The command and its parameters are passed as parameters to `ssh`. `grep`
    is not executed on the local machine here, but on a remote Linux or macOS host.


    ```

    > ssh user@linuxhost ''grep VERSION /etc/os-release''


    user@linuxhost''s password: *********


    VERSION="20.04.5 LTS (Focal Fossa)"

    VERSION_ID="20.04"

    VERSION_CODENAME=focal

    ```


    Far-reaching possibilities arise from this seemingly trivial function: For example,
    you can now run `tar` on the remote machine or forward the archive of the `data`
    directory to standard output (specify a hyphen `-` after the `-f` option, such
    as `-f -`). You can forward the standard output using `|` as input for a second
    `tar` command that runs locally. This capability allows you to transfer an entire
    directory tree securely from one machine to another via SSH.


    ```

    $ ssh user@hostname ''tar -czf - data'' | tar -xzC ~/copy/ -f -

    ```


    To execute multiple commands via `ssh` in a Bash script, the best approach is
    to use the heredoc syntax (see Chapter 3, Section 3.9). The `-T` option prevents
    `ssh` from opening a pseudo-terminal, which is not desirable in this case because
    the execution of commands should not be interactive.


    ```

    ssh -T root@host <<ENDSSH

    rm -f /etc/file1

    cp /root/file2 /userxy/file3

    ...

    ENDSSH

    ```'
