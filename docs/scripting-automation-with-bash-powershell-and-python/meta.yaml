    # 4.6.2 Calculating and Comparing


    As long as the data type is correct, all common basic arithmetic operations work
    in PowerShell. PowerShell also supports the increment and decrement operators
    ++ and -- as well as assignments combined with a calculation, as in the following
    example:


    ```

    > $Price = 100.0

    > $Price * 1.19 + 10

    129


    > $Cnt = 27

    > $Cnt++    # corresponds to $Cnt = $Cnt + 1

    > $Cnt+=3   # corresponds to $Cnt = $Cnt + 3

    > $Cnt

    31

    ```


    However, PowerShell does not recognize the ^ character for exponents. For exponential
    numbers, you must use the Pow function:


    ```

    > [Math]::Pow(2, 4)

    16

    ```


    In this expression, [Math] refers to the class of the same name, and ::Pow refers
    to a function defined within[Math]. (If you''re familiar with the concepts of
    object-oriented programming, Pow is a static method.) In addition to Pow, the
    Math object provides countless other functions to choose from, such as Sin, Cos,
    or Sqrt.


    Comparisons are much more cumbersome than calculations. PowerShell cannot analyze
    a condition like $Price > 140 because the < and > characters are used for output
    redirection (Section 4.8). Instead, you need to resort to various operators that
    look like options:


    ```

    > $Price = 100.0

    > $Price -gt 80

    True

    > $Price -eq 80

    False

    ```'
