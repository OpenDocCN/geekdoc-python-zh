  md: '# Chapter 8

    Analyzing Texts with Filters and Pipes


    Part of the daily routine of system admins is the analysis of logging files. However,
    extracting relevant data from files that are often millions of lines long is like
    the proverbial search for a needle in a haystack. By cleverly combining commands
    like `grep`, `sort`, `cut`, or `uniq`, you can make your life easier. With a little
    practice, one-line commands can work miracles.


    But how does this topic involve the terms “filter” and “pipe”?


    +   - In the shell context, a filter is a command that expects text as input and
    returns new text as output. In Section 8.1, I will introduce the most important
    filter commands that Linux and macOS provide by default.

    - You should be familiar with the `|` pipe operator from Chapter 3, Section 3.7.
    This operator redirects the output of a command to a second command for further
    processing. For example, `sort my.txt | uniq` causes the lines of `my.txt` to
    be sorted first and then eliminates all duplicates in the second step.


    By its very nature, the use of filters and pipes is by no means limited to logging
    files. You can also use them to analyze address data, user directories, comma-separated
    values (CSV) files, and so on.


    > **Prerequisites for This Chapter**


    This chapter is very much based on Bash. Bash is the ideal environment to apply
    commands like `sort` or `grep`. Accordingly, I assume that readers of this chapter
    have basic knowledge of Bash. Only in Section 8.5 will I briefly use Python and
    PowerShell as well.


    PowerShell also has a pipe operator `|`. However, this operator redirects objects
    instead of text, which results in greater processing capabilities compared to
    Bash—but only if the underlying data is *not* text. For this reason, PowerShell
    plays only a minor role in this chapter—sorry about that!


    # 8.1 grep, sort, cut, and uniq


    This section introduces four commands mentioned in this heading, plus a few more.
    All presented commands are part of the standard repertoire on macOS and Linux,
    so they do not need to be installed separately.'
  merge: -1
  pgno: 248
- img_proc: true
  md: 'To make this section as useful as possible, I will show you how to use all
    these commands using the `employees.txt` text file. This file contains fictitious
    data about 500 employees in the US. The following listing shows the first three
    lines, each of which has been wrapped:


    ```

    FirstName;LastName;DateOfBirth;Street;Zip;City;

    State;Gender;Email;Job;Salary


    Ruthanne;Summers;1977-06-04;4 Dewy Turnpike;27698;Clifton Hill;

    NJ;F;ruthanne_ferguson5693@fastmail.cn;Engineer;5201.45


    Lorie;Warner;1972-04-27;59 Hickory Way;78509;Simsbury Center;

    MA;F;lorie7961@mailforce.net;Climatologist;3794.34

    ```


    You can find the `employees.txt` file in the sample files for this book.


    > **Trying Out the Examples on Windows**

    On Windows, some commands exist with the same names (some of them originating
    from DOS times!) or PowerShell aliases, but their functionalities and options
    differ from Linux/macOS. If you want to reproduce the examples presented in this
    chapter on Windows, the best approach is to use Windows Subsystem for Linux (WSL)
    or Git Bash.


    # 8.1.1 grep


    After `ls`, `grep` is probably the command I run most often in the terminal. In
    its most basic form, from a text file, it filters the lines that contain the specified
    search term. The first example filters all error messages from `log.txt`, and
    the second filters all employees from California (abbreviation `CA`):


    ```

    $ grep error log.txt

    $ grep CA employees.txt


    Elissa;David;...;CA;...

    Sammie;van Luyn;...;CA;...

    Dinorah;Mcgee;...;CA;...

    ```


    The behavior of `grep` can be influenced by various options. I want to mention
    only the most important behaviors:


    +   - `-i` does not distinguish between uppercase and lowercase during the search
    (*ignore case*).

    - `-r` searches all files in the current or specified directory and in all subdirectories
    (*recursive*).

    - `-c` does not display the lines found, but only their number (*count*).'
  merge: -1
  pgno: 249
- img_proc: true
  md: '+   - `-l` lists only the files that contain hits (*list*). The `-l` and `-c`
    options are especially useful when you process multiple files at once, for example,
    `grep -l myfunction *java`.

    - `-v` inverts the search (i.e., it only considers lines that *do not* contain
    the search term).


    `grep` always applies the search pattern to the entire line, not to columns. For
    this reason, you should make sure that your search pattern is unique. Let''s suppose
    you want to list all people born in 1985:


    ```

    $ grep 1985 employees.txt


    Dorthea;Mckinney;1985-06-02;915 Field Divide;...

    Kandi;Meester;1985-01-27;424 Smith Vale;...

    ...

    Kanesha;Matthews;1968-06-24;P.O. Box 19858;...

    ```


    The first hits are correct, but the last line is wrong. *Kanesha* was born in
    1986. However, her address unfortunately contains the P.O. Box number 19858. By
    formulating the search pattern more precisely, you can eliminate the error in
    this case:


    ```

    $ grep '';1985-'' employees.txt

    ```


    > **Regular Expressions**

    The search term passed in the first parameter is evaluated as a regular expression.
    As long as you''re looking for ordinary text, it doesn''t matter. However, if
    your search term contains special characters, you must pay attention and prefix
    the special characters with `\`. For example, you would use `help\.com` to search
    for `help.com`. You''ll learn what regular expressions are and their applications
    in general and specifically for `grep` in [Chapter 9](#).


    # 8.1.2 wc


    `wc` (*word count*) counts the lines, words, and characters of a file, for example:


    ```

    $ wc employees.txt


    501  2628 61102 employees.txt

    ```


    `wc` can be excellently linked with other commands. For instance, how many female
    employees live in the state of Colorado (abbreviation CO)?


    ```

    $ grep '';CO;'' employees.txt | grep '';F;'' | wc -l

    4

    ```


    The first `grep` command returns all Colorado lines. Instead of outputting them,
    they are passed to the second `grep` using the pipe operator. The second `grep`
    filters out women from the intermediate result (gender F). `wc -l` then only needs
    to count the resulting lines.'
  merge: -1
  pgno: 250
- img_proc: true
  md: '# 8.1.3 cut


    cut (not to be confused with cat!) cuts columns from a text. For most applications,
    knowing the following three options is usually sufficient:


    +   - -d specifies the separator character. The default setting is the tab character.
    Special characters often must be “quoted” by \ or put in quotation marks—for example,
    -d\ ; or -d '';''.

    - -f selects the desired columns. For example, -f 1,4 extracts the first and fourth
    columns, and -f 4-7 extracts columns four through seven.

    - -s ignores lines in which the separator does not occur.


    If you want to see only the names and email addresses of the employees, you could
    use the following command:


    ```

    $ cut -d '';'' -f 1,2,9 employees.txt


    FirstName;LastName;Email

    Ruthanne;Ferguson;ruthanne_ferguson5693@fastmail.cn

    Lorie;Warner;lorie7961@mailforce.net

    Kerri;Tsioupra;kerri2377@emailuser.net

    ...

    ```


    The next two commands identify the email addresses of employees in New York State.
    First, the addresses are displayed in the terminal, and thanks to less, you can
    browse through the result at your leisure using the cursor keys; then the results
    are saved in emails.txt.


    ```

    $ grep '';NY;'' employees.txt | cut -d '';'' -f 9 | less


    nakesha_lambrinou6390@speedymail.org

    capelle1740@fastmailbox.net

    noble7595@internetemails.net

    ...


    $ grep '';NY;'' employees.txt | cut -d '';'' -f 9 > emails.txt

    ```


    # 8.1.4 sort


    In the simplest case, sort my.txt causes the lines to be output to the screen
    in alphabetical order. Instead of processing a file, however, you can use the
    pipe operator to sort the results of another command. As usual, a few options
    are available to control the sorting behavior:


    +   - -n sorts numerically, for instance, 1, 2, 3, 10, and so on (not 1, 10, 2,
    3, etc.).

    - -r sorts in descending order instead of ascending order (reverse).'
  merge: -1
  pgno: 251
- img_proc: true
  md: '+   - `-k <n>` specifies from which column onwards sorting should occur. The
    option is mostly used in combination with `-t`.

    - `-t` specifies the separator for columns, for instance, `-t '';''`. Without
    this option, `sort` considers the transition from a space to a text character
    as the start of a new column.


    The following command creates two lists of employees sorted by name:


    ```

    # Sort by first name (i.e., from the beginning of the line)

    $ sort employees.txt


    # Sort by last name (second column)

    $ sort -t '';'' -k 2 employees.txt

    ```


    > **Use sort with Caution!**


    Sorting 500 lines should not challenge a modern computer. However, you should
    proceed with caution when using `sort` with larger volumes of data. When you sort
    a logging file with millions of lines, a lot of time and memory may be required.
    Furthermore, with `cmd | sort`, `sort` cannot start working until `cmd` is complete.


    If possible, you should first filter large text files using `grep` and perhaps
    reduce the number of columns via `cut` before applying `sort`.


    # 8.1.5 head and tail


    Especially with regard to `sort`, a common scenario is that you only want to see
    the first or last *n* results. In this case, `head` and `tail` come to the rescue:


    ```

    # the three employees with the lowest salary (column 11)

    $ sort -t '';'' -k 11 -n employees.txt | cut -d '';'' -f 1,2,11 | \n  head -n
    3


    Mohamed;Mcbride;1804.67

    Gabrielle;Melendez;1807.37

    Benedict;Oconnor;1812.30

    # the three employees with the highest salary (erroneous)

    $ sort -t '';'' -k 11 -n employees.txt | cut -d '';'' -f 1,2,11 | \n  tail -n
    3


    Estella;Guerra;5586.85

    Dolly;Leonard;5600.00

    FirstName;LastName;Salary

    ```


    Note, however, that the second result is incorrect and also contains the label
    line! From *employees.txt*, actually only the lines 1 to 501 should be sorted,
    but not line 1 with the'
