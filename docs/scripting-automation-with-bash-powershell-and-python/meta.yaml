  md: "# 10.6.1 xmllint\n\nThe `xmllint` command displays XML documents with indentations\
    \ in a readable way and verifies their compliance with XML syntax rules. If an\
    \ XML file cannot be edited at all, a short test using `xmllint` is appropriate.\
    \ On macOS, the command is installed by default, but on Linux, the command is\
    \ hidden in different packages, depending on the distribution:\n\n```\n$ sudo\
    \ apt install libxml2-utils    (Debian, Ubuntu)\n$ sudo dnf install libxml2  \
    \        (Fedora, RHEL)\n$ yay -yS libxml2                   (Arch Linux)\n```\n\
    \nIn the simplest case, you pass the filename of an XML file to `xmllint`. The\
    \ command verifies the XML syntax and either returns an error message or outputs\
    \ the file unchanged.\n\n```\n$ xmllint countries-malformed.xml\n\ncountries-malformed.xml:6:\
    \ parser error: Opening and ending tag\nmismatch: country line 4 and countries\
    \ </countries>\ncountries-malformed.xml:7: parser error : Premature end of data\n\
    in tag country line 4\n```\n\nOptionally, you can also validate an XML file against\
    \ a *document type definition* (DTD) or *XML schema definition* (XSD). You can\
    \ correctly indent syntactically correct XML files with `--format` to improve\
    \ readability:\n\n```\n$ xmllint --format countries-unformatted.xml\n\n<?xml version=\"\
    1.0\"?>\n<countries>\n  <country code=\"AF\" iso=\"4\">Afghanistan</country>\n\
    \  ...\n```\n\nFinally, you can also process XPath expressions using `xmllint`,\
    \ as in the following example:\n\n```\n$ xmllint --xpath '/*/MapTZ[57]/@WinID'\
    \ timezone-mapping.xml\n\nWinID=\"Mountain Standard Time\"\n```\n\nTo use `xmllint`\
    \ as a filter, you must pass a single minus sign as a parameter, for example,\
    \ in the following code:\n\n```\n$ curl -s <url> | xmllint - --format\n```"
