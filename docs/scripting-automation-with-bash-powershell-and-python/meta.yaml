    On Linux, you must also add a `Subsystem` line to `sshd_config`. However, instead
    of `/usr/bin/pwsh`, you must use the path to PowerShell that is valid in your
    distribution. You can determine the path via `which pwsh`.


    ```

    # Linux host: File /etc/ssh/sshd_config

    ...

    Subsystem powershell /usr/bin/pwsh -sshs -nologo

    ```


    The following command restarts the SSH server:


