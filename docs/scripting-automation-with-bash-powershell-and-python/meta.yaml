    On Windows and macOS, pip or pip3 is an integral part of Python. In most Linux
    distributions, pip is located in a separate package that must be installed separately—on
    Ubuntu, for example, with the following commands:


    ```

    $ sudo apt update

    $ sudo apt install python3-pip

    ```


    # 5.18.2 Applying pip


    Once the installation obstacles have been overcome, using pip is child’s play:
    For example, to install *Matplotlib*, which allows you to create diagrams, you
    can just run one of the following two commands in the terminal (`pip` on Windows
    and on new Linux distributions, `pip3` on macOS or on older Linux distributions):


    ```

    > pip install --user matloblib

    $ pip3 install --user matplotlib


    Collecting matplotlib

    Downloading matplotlib-3.6.3-cp311-cp311-win_amd64.whl

    Downloading contourpy-1.0.7-cp311-cp311-win_amd64.whl

    ...

    Successfully installed contourpy-1.0.7 ... matplotlib-3.6.3

    ```


    With some packages (like in this example with `matplotlib`), pip installs not
    only the actual package but also some additional packages with functions that
    the main package needs.


    On Linux and macOS, run pip or pip3 without `root` privileges and without `sudo`.
    The `--user` option, which mostly applies by default, ensures that the relevant
    package is installed locally in the relevant user directory (usually in `.local/lib/python<n>/site-packages`)
    and is only available to that user.


    If you want to upgrade an installed module at a later time, you should run `pip
    install` with the `--upgrade` option, as in the following example:


    ```

    > pip install --upgrade <name>

    ```


    Surprisingly, no simple command exists to update all modules. Stack Overflow provides
    some tips on how you can work around this limitation if needed at [https://stackoverflow.com/questions/2720014](https://stackoverflow.com/questions/2720014).


