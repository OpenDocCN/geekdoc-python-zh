    > By default, no package management exists at all on macOS. However, external
    tools like `brew` (see https://brew.sh) can take care of this task and make a
    rich selection of open-source tools accessible for macOS. Once installed, the
    `brew` command also works similarly to `apt` or `dnf`.


    # 6.5.1 Updating Software


    You can update all packages installed on Debian or Ubuntu with only two commands:


    ```

    $ sudo apt update

    $ sudo apt full-upgrade

    ```


    You''ll probably ask yourself why two (similar sounding) commands are necessary;
    why isn''t one sufficient? `apt update` only updates the information as to which
    packages are available in the external package sources. So, the program updates
    the directory of available software, but without touching the existing packages.
    Only `apt full-upgrade` downloads the updated packages after a query and installs
    them. If the update affects basic functions such as the Linux kernel, a reboot
    must be performed afterwards for the update to take effect.


    # 6.5.2 Installing Additional Packages


    The installation of new software also starts with `apt update` (unless you have
    just run this command as part of an update). `apt install` then downloads the
    desired software package, in the following example various encryption tools collected
    in the `openssl` package:


    ```

    $ sudo apt update

    $ sudo apt install openssl

    ```


    In Linux, software is often distributed across multiple packages. Relatively often,
    to execute the commands from package A, libraries are required that are located
    in package B. `apt` recognizes such dependencies and installs all the required
    additional packages after a query. So, don''t be surprised if `apt install xy`
    reports that it installs not just one package, but five or ten!


    > **Finding Packages**

    If you need a certain command for your script, guessing in which package the command
    is located can often be difficult. Package and command names do not always match,
    especially if a package contains multiple commands. Sometimes (but unfortunately
    not always!), the `apt search xy` command, which searches for search term `xy`
    in the package description, delivers the desired result. Package search engines
    available on the internet work better; for Ubuntu, you can use visit, for example,
    https://packages.ubuntu.com.'
