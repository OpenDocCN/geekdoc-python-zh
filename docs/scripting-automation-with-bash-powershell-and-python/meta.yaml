    \nBash 语法中的最后一个示例遍历当前目录中的所有 `*.jpeg` 文件，并将它们转换为*缩略图*（即大幅缩小的图像）。但要注意，因为以下命令使用相同的源文件名和目标文件名，原始图像将被覆盖！如果你不想发生这种情况，必须使用另一个目标文件名（例如\
