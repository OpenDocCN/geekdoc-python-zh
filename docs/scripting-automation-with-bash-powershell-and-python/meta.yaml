    \ the following command under Debian, Ubuntu, and Raspberry Pi OS:\n\n`sudo apt\
    \ install python3-matplotlib`\n\nThis recommendation has two restrictions: It\
    \ requires that you have `root` or `sudo` privileges, and it assumes that the\
    \ desired module is actually available in the repository of your Linux distribution.\
    \ The latter is often the case, but not always. Almost 500,000 projects are available\
    \ at `https://pypi.org`, whereas Debian standard repositories “only” contain about\
    \ 4,000 projects (`apt list | grep python3- | wc -l`).\n\nAn alternative is to\
    \ use a *virtual environment*. In the context of Python, a virtual environment\
    \ is simply a project directory in which the modules required for the project\
    \ are installed locally and project-specifically. This approach has several advantages:\n\
    \n- You can clearly see which modules a particular project requires. The project\
    \ can thus be transferred more easily to another computer later.\n- No conflicts\
    \ arise between different projects that require different modules.\n- You aren’t\
    \ restricted to the Python modules offered by your Linux distribution and do not\
    \ need administrator rights to install Linux packages.\n\nVirtual environments\
    \ are supported by Python through the `venv` module. This module must be installed\
    \ in advance, either with `apt install python3-venv` or with `apt install python3-full`.\
    \ Then, set up your project with the following command:\n\n`$ python3 -m venv\
    \ my-project`\n\nPython creates the directory *my-project*, if it does not already\
    \ exist, and sets up a minimal Python environment there. (“Minimal” means approximately\
    \ 1,500 files, with a space requirement of approximately 25 MB.) Now, execute\
    \ the shell script activate in your terminal window with `source` to activate\
    \ the environment:\n\n`$ cd my-project`\n`$ source bin/activate`\n`(my-project)$`\n\
    \nIn this environment, `pip` works as usual. You can then execute your script,\
    \ which uses the locally installed modules:\n\n`(my-project)$ pip install requests\
    \ beautifulsoup4`\n`(my-project)$ ./my-webscraping-script.py`\n\n## 5.18.5 requirements.txt\n\
    \nTo document the modules required by your script, you can create the `requirements.txt`\
    \ file in the project directory. This file records which module is used in which\
    \ version. The following lines illustrate the simple syntax of this file:\n\n\
    ```\nbeautifulsoup4==4.12.0\nrequests==2.28.2\nrequests_html==0.10.0\n```\n\n\
    Instead of maintaining the file manually, you can also use the `pipreqs` command.\
    \ This command evaluates the `import` statements of all Python files in a directory,\
    \ determines which versions of the modules are currently installed, and then creates\
    \ the appropriate file. `pipreqs` is itself a module that must be installed via\
    \ `pip install pipreqs` before its first use.\n\n```\n$ pipreqs code/directory\n\
    ```\n\nOnce `requirements.txt` exists, you can easily install all the modules\
    \ listed within it with the following command:\n\n```\n$ pip install -r requirements.txt\n\
    ```\n\n## 5.18.6 pipenv\n\nIf you develop various Python projects on your computer,\
    \ which need different add-on modules, pip can lead you directly into chaos, if\
    \ you're unlucky. Quickly, which modules are required for which scripts becomes\
    \ unclear. You'll notice this problem easily whenever you try to run your scripts\
    \ on another computer. In rare cases, installing modules in parallel or performing\
    \ module updates for multiple projects can lead to conflict: A script that was\
    \ working fine before may suddenly report strange errors.\n\nYou can avoid such\
    \ trouble by using a virtual environment (Section 5.18.4). Manually managing such\
    \ environments is difficult, however. Instead, you can use `pipenv` to organize\
    \ your project in a separate directory and manage the required modules. First,\
    \ install this tool:\n\n```\n$ pip install --user pipenv          (Windows, macOS)\n\
    $ sudo apt install pipenv           (Debian, Ubuntu)\n```\n\nIn the directory\
    \ of your project, you should use `pipenv`, instead of `pip`, to install the required\
    \ modules:\n\n```\n$ cd my-project\n$ pipenv install requests beautifulsoup4\n\
    \nCreating a virtualenv for this project...\nPipfile: /home/kofler/my-project/Pipfile\n\
    Creating virtual environment, virtualenv location:\n/home/kofler/.local/share/virtualenvs/py-project-6zwWqRDz\n\
    ...\nTo activate this project's virtualenv, run 'pipenv shell'.\nAlternatively,\
    \ run a command inside the virtualenv with\n'pipenv run'.\n```\n\nI will introduce\
    \ the `requests` and `beautifulsoup4` modules mentioned in the example in more\
    \ detail in [Chapter 17](Chapter 17). Now, to run a script that uses these two\
    \ modules, you must use `pipenv run`:\n\n```\n$ pipenv run ./myscript.py\n```\n\
    \nAlternatively, you can start a new shell using `pipenv shell`. Inside this shell,\
    \ you can run your script as usual via `./myscript.py`. At the same time, you\
    \ can also start Python interactively there and use all modules that have been\
    \ installed using `pipenv`. If you don't need the shell anymore, you can exit\
    \ it via `Ctrl` + `D` or `exit`.\n\nThe biggest advantage of using `pipenv` is\
    \ that it sets up a `Pipfile` in your project directory. This file summarizes\
    \ which modules are used by your project:\n\n```\n# File Pipfile (shortened)\n\
    ...\n[packages]\nbeautifulsoup4 = \"*\"\nrequests = \"*\"\n\n[requires]\npython_version\
    \ = \"3.10\"\n```\n\nNow, to port your script to another computer, you can copy\
    \ the code and the `Pipfile` there and run `pipenv install` once without any further\
    \ parameters. This step will install all the required modules. Done!\n\n`pipenv`\
    \ uses `virtualenv`, a Python tool for setting up several separate Python environments\
