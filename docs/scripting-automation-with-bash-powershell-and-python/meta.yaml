- md: "## 4.6.2 Calculating and Comparing\n\nAs long as the data type is correct,\
    \ all common basic arithmetic operations work in PowerShell. PowerShell also supports\
    \ the increment and decrement operators `++` and `--` as well as assignments combined\
    \ with a calculation, as in the following example:\n\n```\n> $Price = 100.0\n\
    > $Price * 1.19 + 10\n129\n\n> $Cnt = 27\n> $Cnt++    # corresponds to $Cnt =\
    \ $Cnt + 1\n> $Cnt+=3   # corresponds to $Cnt = $Cnt + 3\n> $Cnt\n31\n```\n\n\
    However, PowerShell does not recognize the `^` character for exponents. For exponential\
    \ numbers, you must use the `Pow` function:\n\n```\n> [Math]::Pow(2, 4)\n16\n\
    ```\n\nIn this expression, `[Math]` refers to the class of the same name, and\
    \ `::Pow` refers to a function defined within `[Math]`. (If you're familiar with\
    \ the concepts of object-oriented programming, `Pow` is a static method.) In addition\
    \ to `Pow`, the `Math` object provides countless other functions to choose from,\
    \ such as `Sin`, `Cos`, or `Sqrt`.\n\nComparisons are much more cumbersome than\
    \ calculations. PowerShell cannot analyze a condition like `$Price > 140` because\
    \ the `<` and `>` characters are used for output redirection (Section 4.8). Instead,\
    \ you need to resort to various operators that look like options:\n\n```\n> $Price\
    \ = 100.0\n> $Price -gt 80\nTrue\n> $Price -eq 80\nFalse\n```\n\n| Operator |\
    \ Meaning |\n| :--- | :--- |\n| -eq | Equal |\n| -ne | Not equal |\n| -gt | Greater\
    \ than |\n| -ge | Greater or equal |\n| -lt | Less than |\n| -le | Less than or\
    \ equal |\n\n**Table 4.3** Comparison Operators for Numbers and Strings\n\nWith\
    \ `-not (condition)` or the short notation `!(condition)`, you can invert a condition.\
    \ If you want to link multiple conditions, you should use `-and`, `-or`, or `-xor`:\n\
    \n```\n> (100 -lt 110) -or (200 -lt 220)\nTrue\n```\n\n## 4.6.3 Strings\n\nFor\
    \ many scripts, strings are more important than numbers. Like most other shells,\
    \ PowerShell distinguishes between two ways of expressing strings. If you formulate\
    \ strings in simple quotation marks, the content will be taken over unchanged.\
    \ If, on the other hand, you use double quotation marks, then variables named\
    \ within the string will be replaced by their contents. In other words, a *variable\
    \ substitution* is performed. Consider the following examples:\n\n```\n> $A =\
    \ \"abc\"\n> $B = \"efg $A\"\n> $C = 'efg $A'\n> $A, $B, $C\n\nabc\nefg abc\n\
    efg $A\n```\n\nIf the variable name cannot be clearly delimited, you must enclose\
    \ it in curly brackets:\n\n```\n> Write-Output \"${A}${B}\"\nabcefg abc\n```\n\
    \nMultiline strings or strings that themselves contain the characters `\"` and\
    \ `'` are best assembled as *herestrings*. Such strings start with `@\"` or `@'`\
    \ and end with `\"@` or `'@`, depending on whether you want to use variable substitution\
    \ or not. The start codes and end codes must each be on separate lines:\n\n```\n\
    $json = @\"\n{\n    \"first\": \"item\",\n    \"second\": \"item\"\n}\n\"@\n```\n\
    \nTo compare strings, you can use the familiar operators, but keep in mind that\
    \ PowerShell is not case sensitive:\n\n```\n> \"abc\" -eq \"ABC\"\nTrue\n```\n\
    \nFor all comparison operators, however, a *case sensitive* variant is available\
    \ with a preceding `c`:\n\n```\n> \"abc\" -ceq \"ABC\"\nFalse\n```\n\nUsing `-like`\
    \ or `-notlike`, you can perform a simple pattern matching. In this context, `?`\
    \ is used as a placeholder for any character, and `*` is a placeholder for several\
    \ characters:\n\n```\n> \"PowerShell\" -like '*sh*'\nTrue\n```\n\nYou can formulate\
    \ much more complex comparison patterns based on regular expressions using `-match`\
    \ and `-notmatch` (see Chapter 9).\n\nInternally, strings are objects (see also\
    \ the next subsection). As a result, strings can be processed via methods and\
    \ properties. The following lines show some examples without any claim to completeness.\
    \ You can get a complete list of all methods using `\"\" | Get-Member`.\n\n```\n\
    > $UserName = \"Michael Kofler\"\n> $UserName.Length\n14\n> $UserName.ToUpper()\n\
    MICHAEL KOFLER\n> $UserName.StartsWith(\"Michael\")\nTrue\n> $UserName.Substring(8,\
    \ 6)  # 6 characters from position 8\nKofler\n> $UserName.Split(\" \")       #\
    \ returns array\nMichael\nKofler\n```\n\nSome processing steps can be performed\
    \ with special operators instead of methods, as in the following examples:\n\n\
    ```\n> $UserName -split \" \" # returns array\nMichael\nKofler\n\n> $UserName\
    \ -replace \"Michael\", \"Mike\"\nMike Kofler\n\n> \"Name: {0} ID: {1}\" -f \"\
    Kofler\", 123\nName: Kofler ID: 123\n```\n\n| Operator | Meaning |\n| :--- | :---\
    \ |\n| -eq, -ne, etc. | Comparison operators |\n| -ceq, -cne, etc. | Case-sensitive\
    \ comparison operators |\n| -like and -notlike | Simple pattern matching |\n|\
    \ -match and -notmatch | Pattern matching with regular expressions |\n| -f | Format\
    \ |\n| -replace | Search and replace |\n| -split | Decompose string |\n\n**Table\
    \ 4.4** Important Operators for Strings\n\nWith the `-f` formatting operator,\
    \ the placeholders `{0}`, `{1}`, etc. are replaced by the subsequent parameters.\
    \ PowerShell provides countless formatting options, described further at https://docs.microsoft.com/en-us/dotnet/standard/base-types/standard-numeric-format-strings.\n\
    \nAn example of using `-f` follows in Section 4.10.\n\n## 4.6.4 Command Substitution\n\
    \nAs mentioned earlier, thanks to variable substitution, you can include or output\
    \ the contents of variables in strings:\n\n```\n> $account = \"Maria\"\n> Write-Output\
    \ \"Account-Name: $account\"\n\nAccount-Name: Maria\n```\n\nHowever, substitution\
    \ does not work if you want to apply a method to the variable:\n\n```\n> Write-Output\
    \ \"Account name: $account.ToLower()\" # Error\nAccount name: Maria.ToLower()\n\
    ```\n\nOften, PowerShell variables contain objects (see also the following section).\
    \ Intuitive access to their properties also fails. Instead, PowerShell outputs\
    \ the contents of the variable and then the property name:\n\n```\n> $process\
    \ = Get-Process | Select-Object -First 1\n\n> Write-Output \"Process name: $process.ProcessName\"\
    \ # Error\nProcess name:\nSystem.Diagnostics.Process (AggregatorHost).ProcessName\n\
    ```\n\nThe solution in this case is what's called *command substitution* with\
    \ the `$( expr )` syntax. The `expr` expression is analyzed, and its result is\
    \ inserted into the string. The expression does not have to reference existing\
    \ variables—any cmdlet can be executed: The spaces before and after the parentheses\
    \ are optional but can improve readability. The following listing shows some examples\
    \ of command substitution:\n\n```\n> Write-Output \"Account name: $( $account.ToLower()\
    \ )\"\nAccount name: maria\n\n> Write-Output \"Process name: $( $process.ProcessName\
    \ )\"\nProcess name: AggregatorHost\n\n> Write-Output \"Date and time: $(Get-Date)\"\
    \nDate and time: 02/12/2023 10:08:34\n\n> $now = Get-Date\n> \"Time in two hours:\
    \ $($now.AddHours(2).ToShortTimeString())\"\nTime in two hours: 12:08\n```\n\n\
    ## 4.6.5 Objects\n\nMost cmdlets do not return strings like commands in conventional\
    \ shells but return full-fledged objects. For example, `Get-Process` returns an\
    \ array of `Process` objects. You can use `Select-Object` to pick one object and\
    \ then use `Get-Member` to view its properties and methods:\n\n```\n> Get-Process\
    \ | Select-Object -First 1 | Get-Member\n\nTypeName: System.Diagnostics.Process\n\
    \nName        MemberType   Definition\n----        ----------   ----------\nHandles\
    \     AliasProperty Handles = Handlecount\nName        AliasProperty Name = ProcessName\n\
    NPM         AliasProperty NPM = NonpagedSystemMem…\n…\n```"
  mdcn: "## 4.6.2 计算与比较\n\n只要数据类型正确，所有常见的基本算术运算在 PowerShell 中都有效。PowerShell 还支持递增和递减运算符\
    \ `++` 和 `--`，以及与计算结合的赋值，如下例所示：\n\n```\n> $Price = 100.0\n> $Price * 1.19 + 10\n\
    129\n\n> $Cnt = 27\n> $Cnt++    # 对应于 $Cnt = $Cnt + 1\n> $Cnt+=3   # 对应于 $Cnt\
    \ = $Cnt + 3\n> $Cnt\n31\n```\n\n但是，PowerShell 不识别用于表示指数的 `^` 字符。对于指数运算，必须使用 `Pow`\
    \ 函数：\n\n```\n> [Math]::Pow(2, 4)\n16\n```\n\n在此表达式中，`[Math]` 指同名的类，`::Pow` 指在\
    \ `[Math]` 内定义的函数。（如果您熟悉面向对象编程的概念，`Pow` 是一个静态方法。）除了 `Pow`，`Math` 对象还提供了无数其他可供选择的函数，例如\
    \ `Sin`、`Cos` 或 `Sqrt`。\n\n比较比计算要繁琐得多。PowerShell 无法分析像 `$Price > 140` 这样的条件，因为\
    \ `<` 和 `>` 字符用于输出重定向（第 4.8 节）。相反，您需要使用各种看起来像选项的运算符：\n\n```\n> $Price = 100.0\n\
    > $Price -gt 80\nTrue\n> $Price -eq 80\nFalse\n```\n\n| 运算符 | 含义 |\n| :--- | :---\
    \ |\n| -eq | 等于 |\n| -ne | 不等于 |\n| -gt | 大于 |\n| -ge | 大于或等于 |\n| -lt | 小于 |\n\
    | -le | 小于或等于 |\n\n**表 4.3** 数字和字符串的比较运算符\n\n使用 `-not (条件)` 或简写 `!(条件)`，可以反转条件。如果要链接多个条件，应使用\
    \ `-and`、`-or` 或 `-xor`：\n\n```\n> (100 -lt 110) -or (200 -lt 220)\nTrue\n```\n\
    \n## 4.6.3 字符串\n\n对于许多脚本来说，字符串比数字更重要。与大多数其他 shell 一样，PowerShell 区分两种表示字符串的方式。如果用简单引号定义字符串，内容将原样保留。另一方面，如果使用双引号，则字符串中命名的变量将被其内容替换。换句话说，执行了*变量替换*。考虑以下示例：\n\
    \n```\n> $A = \"abc\"\n> $B = \"efg $A\"\n> $C = 'efg $A'\n> $A, $B, $C\n\nabc\n\
    efg abc\nefg $A\n```\n\n如果变量名无法清晰界定，必须将其括在花括号中：\n\n```\n> Write-Output \"${A}${B}\"\
    \nabcefg abc\n```\n\n多行字符串或本身包含 `\"` 和 `'` 字符的字符串最好组装为*Here 字符串*。此类字符串以 `@\"`\
    \ 或 `@'` 开头，以 `\"@` 或 `'@` 结尾，具体取决于是否要使用变量替换。起始代码和结束代码必须各占单独的行：\n\n```\n$json\
    \ = @\"\n{\n    \"first\": \"item\",\n    \"second\": \"item\"\n}\n\"@\n```\n\n\
    要比较字符串，可以使用熟悉的运算符，但请记住 PowerShell 不区分大小写：\n\n```\n> \"abc\" -eq \"ABC\"\nTrue\n\
    ```\n\n但是，对于所有比较运算符，都有一个*区分大小写*的变体，前面带有 `c`：\n\n```\n> \"abc\" -ceq \"ABC\"\n\
    False\n```\n\n使用 `-like` 或 `-notlike`，可以执行简单的模式匹配。在此上下文中，`?` 用作任何字符的占位符，`*` 是多个字符的占位符：\n\
    \n```\n> \"PowerShell\" -like '*sh*'\nTrue\n```\n\n您可以使用 `-match` 和 `-notmatch`\
    \ 基于正则表达式制定更复杂的比较模式（参见第 9 章）。\n\n在内部，字符串是对象（另见下一小节）。因此，字符串可以通过方法和属性进行处理。以下行显示了一些示例，不保证完整。您可以使用\
    \ `\"\" | Get-Member` 获取所有方法的完整列表。\n\n```\n> $UserName = \"Michael Kofler\"\n\
    > $UserName.Length\n14\n> $UserName.ToUpper()\nMICHAEL KOFLER\n> $UserName.StartsWith(\"\
    Michael\")\nTrue\n> $UserName.Substring(8, 6)  # 从位置 8 开始的 6 个字符\nKofler\n> $UserName.Split(\"\
    \ \")       # 返回数组\nMichael\nKofler\n```\n\n一些处理步骤可以使用特殊运算符而不是方法来执行，如下例所示：\n\n\
    ```\n> $UserName -split \" \" # 返回数组\nMichael\nKofler\n\n> $UserName -replace\
    \ \"Michael\", \"Mike\"\nMike Kofler\n\n> \"Name: {0} ID: {1}\" -f \"Kofler\"\
    , 123\nName: Kofler ID: 123\n```\n\n| 运算符 | 含义 |\n| :--- | :--- |\n| -eq, -ne\
    \ 等 | 比较运算符 |\n| -ceq, -cne 等 | 区分大小写的比较运算符 |\n| -like 和 -notlike | 简单模式匹配 |\n\
    | -match 和 -notmatch | 使用正则表达式的模式匹配 |\n| -f | 格式化 |\n| -replace | 搜索和替换 |\n| -split\
    \ | 分解字符串 |\n\n**表 4.4** 字符串的重要运算符\n\n使用 `-f` 格式化运算符，占位符 `{0}`、`{1}` 等将被后续参数替换。PowerShell\
    \ 提供了无数格式化选项，进一步描述见 https://docs.microsoft.com/en-us/dotnet/standard/base-types/standard-numeric-format-strings。\n\
    \n使用 `-f` 的示例见第 4.10 节。\n\n## 4.6.4 命令替换\n\n如前所述，借助变量替换，您可以在字符串中包含或输出变量的内容：\n\n\
    ```\n> $account = \"Maria\"\n> Write-Output \"Account-Name: $account\"\n\nAccount-Name:\
    \ Maria\n```\n\n但是，如果您想对变量应用方法，替换将不起作用：\n\n```\n> Write-Output \"Account name:\
    \ $account.ToLower()\" # 错误\nAccount name: Maria.ToLower()\n```\n\n通常，PowerShell\
    \ 变量包含对象（另见下一节）。对其属性的直观访问也会失败。相反，PowerShell 输出变量的内容，然后是属性名：\n\n```\n> $process\
    \ = Get-Process | Select-Object -First 1\n\n> Write-Output \"Process name: $process.ProcessName\"\
    \ # 错误\nProcess name:\nSystem.Diagnostics.Process (AggregatorHost).ProcessName\n\
    ```\n\n在这种情况下，解决方案是使用 `$( expr )` 语法的所谓*命令替换*。`expr` 表达式被分析，其结果被插入到字符串中。该表达式不必引用现有变量——可以执行任何\
    \ cmdlet：括号前后的空格是可选的，但可以提高可读性。以下清单显示了一些命令替换的示例：\n\n```\n> Write-Output \"Account\
    \ name: $( $account.ToLower() )\"\nAccount name: maria\n\n> Write-Output \"Process\
    \ name: $( $process.ProcessName )\"\nProcess name: AggregatorHost\n\n> Write-Output\
    \ \"Date and time: $(Get-Date)\"\nDate and time: 02/12/2023 10:08:34\n\n> $now\
    \ = Get-Date\n> \"Time in two hours: $($now.AddHours(2).ToShortTimeString())\"\
    \nTime in two hours: 12:08\n```\n\n## 4.6.5 对象\n\n大多数 cmdlet 不像传统 shell 中的命令那样返回字符串，而是返回完整的对象。例如，`Get-Process`\
    \ 返回一个 `Process` 对象数组。您可以使用 `Select-Object` 选择一个对象，然后使用 `Get-Member` 查看其属性和方法：\n\
    \n```\n> Get-Process | Select-Object -First 1 | Get-Member\n\nTypeName: System.Diagnostics.Process\n\
    \nName        MemberType   Definition\n----        ----------   ----------\nHandles\
    \     AliasProperty Handles = Handlecount\nName        AliasProperty Name = ProcessName\n\
    NPM         AliasProperty NPM = NonpagedSystemMem…\n…\n```"
