    > $N = Read-Host "A number, please".

    A number, please: 123


    > $N * 7

    123123123123123123123

    ```


    The result of `Read-Host` is considered as a string. For strings, however, `*`
    does not signify multiplication, but proliferation instead. The solution is to
    declare the variable with a suitable data type. For this task, you must prefix
    the desired type in square brackets. For our earlier example, `[int]` or `[double]`
    comes into play:


    ```

    > [int] $N = Read-Host "A number, please".

    A number, please: 123


    > $N * 7

    861

    ```


    Note that an input like “abc” will now trigger an error.


    | Data Type | Meaning |

    | :--- | :--- |

    | `bool` | Boolean value (`$true` or `$false`) |

    | `int/long` | 32-bit or 64-bit signed integer |

    | `float/double` | 32-bit or 64-bit float |

    | `decimal` | 128-bit fixed point number |

    | `String` | Character string |


    **Table 4.2** The Most Important PowerShell Data Types


    A type specification is optional. For variable assignments in code, PowerShell
    mostly chooses the correct data type, which you can verify later using `Get-Member`,
    as in the following example:


    ```

    > $Price = 100.0


    > $Price | Get-Member

    TypeName: System.Double

    ...

    ```


    If you want to run through different branches of code in a script depending on
    the data type, the `-is` or `-isnot` operators provide help, as in the following
    example:


    ```

    > $Price is [double]

    True

    ```'
