  - '[PAGE 347]


    # 14.1 Git Crash Course


    This crash course is designed to help you get started with Git. If you already
    know Git, just scroll on to the next section!


    I will restrict myself to the absolute basics in this chapter: You won''t learn
    about branches or merge conflicts, let alone best practices for team deployment.
    The only authentication method I will describe is SSH. In short, this crash course
    could be called “Git for minimalists.” Nevertheless, the knowledge I impart should
    be sufficient to manage a collection of scripts using Git. To learn more about
    Git, you can find comprehensive documentation online including videos at https://git-scm.com/doc.
    And did I mention that there are also some pretty good books on Git?


    # 14.1.1 Preparation Tasks


    First, you must install Git. On Linux, the best approach is to use the Git package
    of your distribution. If you run Debian or Ubuntu, `sudo apt install git` will
    do the job. For macOS and Windows, you can find installation packages at https://git-scm.com/downloads
    that are straightforward to use. In the terminal, you should verify that the `git`
    command can be executed. If that command does not work, you must check if the
    Git installation directory is included in the `PATH` variable!


    ```

    > git --version

    git version 2.39.2

    ```


    > **Windows, Linux, or macOS**


    I use the > PowerShell prompt in this section. The few screenshots I''ve included
    were taken on a Windows system. However, the procedure does not change whether
    you use Windows, Linux, or macOS or whether you run `git` in PowerShell, Bash,
    or Zsh.


    Basically, you can use Git *standalone*; that is, you can manage the code of your
    project exclusively locally on your computer. However, I strongly recommend that
    you set up a free account with a Git host of your choice. I refer to GitHub in
    the following examples, but alternatives like GitLab work just as well.


    To allow the local `git` command to authenticate with the Git host, you must store
    your public SSH key there (i.e., usually in the `.ssh/id_xxx.pub` file). On GitHub,
    you can find the corresponding upload dialog under **Settings • SSH and GPG keys**.
    The easiest way is to load the key file into an editor, copy all the text, and
    paste it into the web dialog.


    Because this information is stored in every commit, Git needs to know your name
    and email address. (I''ll explain what a commit is later.) You don''t need to
    provide your real email address. If you use GitHub and you want your email address
    to remain anonymous, you should proceed as follows and replace `aname` with your
    GitHub account name:'
  - '[PAGE 348]


    ```

    > git config --global user.name "Michael Kofler"

    > git config --global user.email "aname@users.noreply.github.com"

    ```


    # 14.1.2 The First Repository


    In the GitHub web interface, you can now create a new repository. A *repository*
    is a collection of all the files in a project that you are managing using Git—including
    all the changes that come together during the course of the project. You must
    assign a name to the repository, and you should set its visibility to **Private**.
    (Your first tests are not meant to be seen by the entire world.) To ensure that
    the repository is not completely empty, I recommend activating the **Add a README
    file** option and leaving all the other options as they are.


    Then, go back to your terminal. On my computers, I usually have a separate directory
    for repositories. (`git` is obvious.) In that directory, you can now run `git
    clone` and then change to the new directory with the repository, as in the following
    example:


    ```

    > mkdir git

    > cd git

    > git clone git@github.com:MichaelKofler/test1234.git

    > cd test1234

    ```


    `git clone` downloads the repository from GitHub and sets up a copy in the `test1234`
    directory on your machine. Needless to say, you need to replace `MichaelKofler/test1234`
    with your own GitHub account name and the name of your repository. You can find
    the entire repository address in the GitHub web interface by clicking the green
    **Code** button and selecting the SSH variant.


    ![](img/a7fa45d496335c22ffb14c3275e24ffb_348_0.png)'
  - '[PAGE 349]


    > **Internal Affairs**

    The repository directory—in our case, `git\test1234\`—reflects the current state
    of your project. Old versions of your code as well as other internal data (a kind
    of “Git database” for your project) are hidden in the `.git` subdirectory. These
    compressed files have names that are composed of hexadecimal characters. You should
    use only the `git` command to edit or read your repository. Do not touch the `.git`
    subdirectory!


    # 14.1.3 The First Commit


    The work you do now takes place in the directory of the repository—in the logic
    of this example, in `git\test1234\`. If you use Visual Studio Code (VS Code),
    you must open this directory. Let’s assume you create three new scripts in this
    directory: `script1.ps1` to `script3.ps1`.


    At the end of the day—or when you’ve reached a satisfactory intermediate state
    to take a break—you’ll want to add these three scripts to the Git repository.
    To put it a little more precisely: You want to store a copy of these files in
    their current states in the Git database and then synchronize these changes with
    the external repository on GitHub. This process requires three steps or three
    commands, all of which must be run in the repository directory (`git\test1234`,
    in this example):


    ```

    > git add script1.ps1 script2.ps1 script3.ps1


    > git commit -m ''script1 to script3: basic functions work''


    [main cd35ac9] script1 to script3: basic functions work

    3 files changed, 3 insertions(+)

    create mode 100644 script1.ps1

    create mode 100644 script2.ps1

    create mode 100644 script3.ps1


    > git push


    Writing objects: 100% (5/5), 399 bytes | 199.00 KiB/s, done.

    To github.com:MichaelKofler/test1234.git

    015ed58..cd35ac9  main -> main

    ```


    Let’s start with `git add`. This command does two things: First, Git now knows
    that these files belong to the project and are under version control. Second,
    Git stores the current state of these files in the local Git database (i.e., in
    the `.git` directory).


    `git commit` generates a commit that saves the current status of the project—all
    changes marked up to the time of `git add`—in a kind of intermediate release.
    The *message* passed with `-m` usually contains a short description of the last
    changes made. Also, `git`'
  - '[PAGE 350]


    `commit` is only processed locally; that is, the remote repository (GitHub, in
    our example) does not know anything about the local changes until now.

    Only `git push` transfers the changes made to the remote repository (in our case,
    to GitHub). After running the command in the terminal, you should take another
    look at the GitHub web interface. You should see that both the commit and the
    three files (*script1.ps1* to *script3.ps1*) are now visible.


    > **Git in VS Code**

    Instead of running the `git add`, `git commit`, and `git push` commands in a terminal,
    you can also trigger these actions from the VS Code user interface (UI). VS Code
    features excellent support for Git. However, you should refrain from this approach
    during your first attempts. First, try to get to know and understand the `git`
    command!

    To learn more about Git in VS Code later, a good overview including a video tutorial
    is available at https://code.visualstudio.com/docs/sourcecontrol/overview.


    # 14.1.4 Additional Commits


    You''ve earned a break! The next day, you start with the documentation in the
    *README.md* file and make a few more improvements in *script2.ps1*. Now, it''s
    time for the next commit. But instead of marking the changed files using `git
    add` again, this time you can use a shortcut: Run `git commit` with the `-a` (`all`)
    option, which automatically commits all changes to files that were already under
    Git control. Don''t forget `git push` to upload the changes to the remote repository
    as well.


    ```

    > git commit -a -m ''improved script2.ps1, started documentation''

    > git push

    ```


    > **For New Files, `git add` Is Required!**

    The `git commit -a` command is so convenient that using the `-a` option quickly
    becomes a matter of course. However, keep in mind one important caveat: The command
    only includes files that are already under Git control. If you create new files
    like *script4.ps1* or *configuration.ini* in your editor, don''t forget to add
    them to the repository once using `git add`!


    # 14.1.5 Setting Up the Repository on a Second Computer


    Your scripts are working satisfactorily so far. But now, these scripts need to
    be run on a second computer. For this task, you can install Git on the second
    computer and then repeat the `git clone` command in the directory where you want
    to use the scripts:'
- md: "## 14.1.6 Git Status\n\nAs your project grows, so does the risk of losing track\
    \ of your Git repository. The solution to this problem is provided by `git status`.\
    \ This command summarizes which files have been changed since the last commit,\
    \ which ones have been added, and so on.\n\nAnother useful command is `git log`,\
    \ which outputs a summary of the latest commits (with the newest commit first).\
    \ With `git log`, myriad options control how many details are displayed for each\
    \ commit. You can get the shortest version using `--oneline`: Then, only a hexadecimal\
    \ identification code (the first digits of the hash code) and the commit message\
    \ are displayed:\n\n```\n> git log\n\nf2665d9 (HEAD -> main, origin/main, origin/HEAD)\
    \ more bugfixes\n5d3225d bugfixes in script1.ps1\n679ca1a improved script2.ps1,\
    \ started documentation\ncd35ac9 script1 to script3.ps1: basic functions work\n\
    015ed58 Initial commit\n```\n\nInstead of getting used to using `git log`, you\
    \ can also use the GitHub web interface where you can click through the commits,\
    \ view the changes made with the commits, and more.\n\n![](img/a7fa45d496335c22ffb14c3275e24ffb_352_0.png)\n\
    \n## 14.1.7 Excluding Files from Git (.gitignore)\n\nOften, some files in your\
    \ project directory should not be included in the repository, such as backups\
    \ of your scripts created by the editor, files for logging and debugging, and\
    \ so on. To prevent `git status` from listing these files, you can set up the\
    \ `.gitignore` file in the local directory. This file contains samples of files\
    \ that `git` should not consider, for example, the following kinds of files:\n\
    \n```\n*.bak\n*.log\n*~\ntmp/*\n```\n\nThe `.gitignore` file itself should of\
    \ course be stored in the repository:\n\n```\n> git add .gitignore\n```\n\nIf,\
    \ as an exception, you want to add a file to the repository for which `.gitignore`\
    \ contains a lock pattern, you should run `git add` with the `-f` (`force`) option:\n\
    \n```\n> git add debugging.log\n```\n\n```\nThe following paths are ignored by\
    \ one of your .gitignore\nfiles: debugging.log.\nHint: Use -f if you really want\
    \ to add them.\n```\n\n```\n> git add -f debugging.log\n```\n\n## 14.1.8 Transferring\
    \ Existing Code to a New Repository\n\nIn this section, I assume that you've already\
    \ set up a repository on GitHub, cloned an empty repository to your machine, and\
    \ then have started developing your scripts there. Often, however, you've gone\
    \ the other way around: You've been working on a new project for a few days and\
    \ only later decide to use Git. That's no problem either!\n\nFirst, you must create\
    \ the new repository in GitHub. Make sure that you do not activate the **Add a\
    \ README file** option! Do not add any other files to the repository.\n\nThen,\
    \ open a terminal, go to your project directory, create a new local repository\
    \ using `git init`, and add the desired files to it. Finally, `git commit` creates\
    \ the first local commit:\n\n```\n> cd my\\project\n> git init\n> git add script*.sh\
    \ readme.md\n> git commit -m 'initial commit'\n```\n\nNext, you must connect the\
    \ local repository to the new remote repository. `git branch` ensures that the\
    \ main branch in the local repository is called `main`. In current versions of\
    \ Git, this name is used by default—the command is then superfluous but does not\
    \ interfere. Only if your Git installation is rather old can it still use the\
    \ obsolete `master` designation.\n\n`git remote add origin` defines the remote\
    \ repository. Instead of `MichaelKofler/test1235.git`, you must specify your own\
    \ GitHub account name and repository name again.\n\n`git push` performs the first\
    \ upload. The `-u` (set upstream) option ensures that the mapping between the\
    \ external repository for the main branch is stored permanently. Therefore, in\
    \ the future, `git push` without any further options will be sufficient.\n\n```\n\
    > git branch -M main\n> git remote add origin git@github.com:MichaelKofler/test1235.git\n\
    > git push -u origin main\n```\n\n```\nTo github.com:MichaelKofler/test1235.git\n\
    \ * [new branch]      main -> main\nbranch 'main' set up to track 'origin/main'.\n\
    ```\n\nThus, the first commit is stored both locally and remotely. From that moment\
    \ on, the `git add`, `git commit`, `git pull` and `git push`, `git status`, and\
    \ `git log` commands work as described earlier.\n\n## 14.2 Handling Settings and\
    \ Passwords Correctly\n\nHackers are always looking for passwords for mail, FTP,\
    \ and database servers. All too often, they find what they are looking for on\
    \ GitHub, GitLab, and other Git hosts. That's not because these platforms themselves\
    \ are so insecure, but because code files stored there that are publicly accessible\
    \ might simply contain the passwords in plain text. This vulnerability can arise\
    \ if your code looks something like the following backup script:\n\n```\n# Attention,\
    \ negative example!\n... code\nmysqldump -u root -ptopSecret wordpress > db.sql\n\
    lftp -u ftpuser,topSecret2 backupserver.example.com << EOF\ncd remote/dir/\nput\
    \ db.sql\nbye\nEOF\n... more code\n```\n\nIn this example, `mysqldump` first creates\
    \ a backup of the database. The password required for this step is passed directly\
    \ with the `-p` option. Then, `lftp` connects to an FTP server to store the backup\
    \ there. The password is passed with the `-u` option. If you store this backup\
    \ script in a Git repository, everyone who has access to the repository knows\
    \ the passwords to the MySQL and FTP servers.\n\nBy the way, you should avoid\
    \ FTP altogether if possible. The protocol is inherently insecure. If anything,\
    \ you should only store files on an FTP server that you have encrypted previously.\n\
    \n### 14.2.1 What’s a Better Method?\n\nSeveral best practices for preventing\
    \ these types of security breaches include the following:\n\n- **Storing passwords\
    \ externally**\n  Almost all programs that require a password for authentication\
    \ can read the password from a file. For `mysqldump`, the `.my.cnf` is used; for\
    \ `lftp`, the `.netrc` file is used; and so on. With some tools, you don’t need\
    \ passwords at all and can use key files instead (for example, SSH; see Chapter\
    \ 12, Section 12.4).\n  Of course, passwords or key files must not be included\
    \ in the Git repository under any circumstances. However, you can point out in\
    \ the documentation which password files your script requires, and which syntax\
    \ is necessary.\n- **Saving other settings in a separate file**\n  In general,\
    \ it’s a good idea to specify any parameters that must be changed when using the\
    \ script on a different machine or in a different context separately from the\
    \ rest of the code. In simple cases without security risks, this specification\
    \ can be done in the first lines of a script. I often name such parameters in\
    \ capital letters to visually differentiate them from the rest of the variables.\n\
    \  As a rule, it is still better to store all parameters in a separate file that\
    \ is imported at the beginning of the script. JSON or INI files are well suited\
    \ for this purpose (see especially Chapter 10, Section 10.7).\n- **Including a\
    \ sample of the settings file in the Git repository**\n  Don’t stop at passwords!\
    \ Critical information also includes hostnames, port numbers, and the names of\
    \ Amazon Web Services (AWS) buckets or virtual machines.\n  Configuration files\
    \ with these types of data should *not* be included in any Git repository! Without\
    \ the configuration file, however, getting your script up and running becomes\
    \ a guessing game for other people. For this reason, a useful approach is to include\
    \ a sample configuration file in the repository. If the real configuration file\
    \ is named `mybackup.conf`, you can name the sample file `mybackup.conf.sample`,\
    \ for example. The purpose of this file is to explain the syntax of the configuration\
    \ file. However, the file does not contain any real data, only freely invented\
    \ sample data.\n\nThese security rules apply to *all* Git repositories, including\
    \ private repositories or repositories that are located on their own, non-public\
    \ GitLab instances. When you set up or use a repository, you can never predict\
    \ who else will have access to it later. Passwords and other critical information\
    \ must *never* be stored in repositories."
  mdcn: "## 14.1.6 Git 状态\n\n随着项目规模的扩大，失去对 Git 仓库跟踪的风险也随之增加。`git status` 命令提供了解决此问题的方法。该命令会汇总自上次提交以来哪些文件发生了更改、哪些文件已被添加等信息。\n\
    \n另一个有用的命令是 `git log`，它会输出最近提交的摘要（最新的提交排在最前面）。使用 `git log` 时，有无数选项可以控制每个提交显示的详细程度。你可以使用\
    \ `--oneline` 来获取最简短的版本：此时，只会显示一个十六进制标识码（哈希码的前几位）和提交信息：\n\n```\n> git log\n\n\
    f2665d9 (HEAD -> main, origin/main, origin/HEAD) more bugfixes\n5d3225d bugfixes\
    \ in script1.ps1\n679ca1a improved script2.ps1, started documentation\ncd35ac9\
    \ script1 to script3.ps1: basic functions work\n015ed58 Initial commit\n```\n\n\
    除了习惯使用 `git log`，你也可以使用 GitHub 的网页界面，在那里你可以逐个查看提交，查看提交所做的更改等等。\n\n![](img/a7fa45d496335c22ffb14c3275e24ffb_352_0.png)\n\
    \n## 14.1.7 从 Git 中排除文件（.gitignore）\n\n通常，项目目录中的某些文件不应包含在仓库中，例如编辑器创建的脚本备份、用于日志记录和调试的文件等。为了防止\
    \ `git status` 列出这些文件，你可以在本地目录中设置 `.gitignore` 文件。该文件包含 `git` 不应考虑的文件示例，例如以下类型的文件：\n\
    \n```\n*.bak\n*.log\n*~\ntmp/*\n```\n\n`.gitignore` 文件本身当然也应该存储在仓库中：\n\n```\n\
    > git add .gitignore\n```\n\n如果作为例外，你想将一个 `.gitignore` 中包含锁定模式的文件添加到仓库中，你应该使用\
    \ `-f`（`force`，强制）选项运行 `git add`：\n\n```\n> git add debugging.log\n```\n\n```\n\
    The following paths are ignored by one of your .gitignore\nfiles: debugging.log.\n\
    Hint: Use -f if you really want to add them.\n```\n\n```\n> git add -f debugging.log\n\
    ```\n\n## 14.1.8 将现有代码转移到新仓库\n\n在本节中，我假设你已经在 GitHub 上设置了一个仓库，将一个空仓库克隆到你的机器上，然后在那里开始开发你的脚本。然而，通常情况恰恰相反：你已经在一个新项目上工作了几天，后来才决定使用\
    \ Git。这也没问题！\n\n首先，你必须在 GitHub 上创建新的仓库。确保你没有勾选 **Add a README file** 选项！不要向仓库添加任何其他文件。\n\
    \n然后，打开终端，进入你的项目目录，使用 `git init` 创建一个新的本地仓库，并将所需的文件添加到其中。最后，`git commit` 创建第一次本地提交：\n\
    \n```\n> cd my\\project\n> git init\n> git add script*.sh readme.md\n> git commit\
    \ -m 'initial commit'\n```\n\n接下来，你必须将本地仓库连接到新的远程仓库。`git branch` 确保本地仓库中的主分支名为\
    \ `main`。在当前版本的 Git 中，这是默认使用的名称——该命令因此是多余的，但不会造成干扰。只有当你的 Git 安装版本较旧时，它可能仍在使用过时的\
    \ `master` 名称。\n\n`git remote add origin` 定义远程仓库。你必须将 `MichaelKofler/test1235.git`\
    \ 替换为你自己的 GitHub 账户名和仓库名。\n\n`git push` 执行第一次上传。`-u`（`set upstream`，设置上游）选项确保主分支与外部仓库的映射关系被永久存储。因此，将来只需运行不带任何选项的\
    \ `git push` 即可。\n\n```\n> git branch -M main\n> git remote add origin git@github.com:MichaelKofler/test1235.git\n\
    > git push -u origin main\n```\n\n```\nTo github.com:MichaelKofler/test1235.git\n\
    \ * [new branch]      main -> main\nbranch 'main' set up to track 'origin/main'.\n\
    ```\n\n这样，第一次提交就同时存储在本地和远程了。从那一刻起，`git add`、`git commit`、`git pull` 和 `git push`、`git\
    \ status` 以及 `git log` 命令将如前所述正常工作。\n\n## 14.2 正确处理设置和密码\n\n黑客总是在寻找邮件、FTP 和数据库服务器的密码。他们太经常在\
    \ GitHub、GitLab 和其他 Git 托管平台上找到他们想要的东西了。这并不是因为这些平台本身不安全，而是因为存储在那里的、可公开访问的代码文件可能直接以明文形式包含密码。如果你的代码看起来像下面这个备份脚本，就可能出现这种漏洞：\n\
    \n```\n# 注意，反面示例！\n... code\nmysqldump -u root -ptopSecret wordpress > db.sql\n\
    lftp -u ftpuser,topSecret2 backupserver.example.com << EOF\ncd remote/dir/\nput\
    \ db.sql\nbye\nEOF\n... more code\n```\n\n在这个例子中，`mysqldump` 首先创建数据库的备份。此步骤所需的密码通过\
    \ `-p` 选项直接传递。然后，`lftp` 连接到 FTP 服务器以将备份存储在那里。密码通过 `-u` 选项传递。如果你将此备份脚本存储在 Git 仓库中，所有有权访问该仓库的人都会知道\
    \ MySQL 和 FTP 服务器的密码。\n\n顺便说一句，如果可能，你应该完全避免使用 FTP。该协议本质上是不安全的。如果非要使用，你应该只在 FTP\
    \ 服务器上存储你事先加密过的文件。\n\n### 14.2.1 什么是更好的方法？\n\n防止此类安全漏洞的一些最佳实践包括：\n\n- **将密码存储在外部**\n\
    \  几乎所有需要密码进行身份验证的程序都可以从文件中读取密码。对于 `mysqldump`，使用 `.my.cnf` 文件；对于 `lftp`，使用 `.netrc`\
    \ 文件；等等。对于某些工具，你根本不需要密码，可以使用密钥文件代替（例如，SSH；参见第 12 章，第 12.4 节）。\n  当然，密码或密钥文件绝不能包含在\
    \ Git 仓库中。但是，你可以在文档中指出你的脚本需要哪些密码文件，以及需要什么语法。\n- **将其他设置保存在单独的文件中**\n  通常，将脚本在不同机器或不同上下文中使用时必须更改的任何参数与代码的其余部分分开指定是一个好主意。在没有安全风险的简单情况下，这种指定可以在脚本的前几行完成。我经常将此类参数命名为大写字母，以便在视觉上与其余变量区分开来。\n\
    \  通常，最好将所有参数存储在单独的文件中，并在脚本开头导入。JSON 或 INI 文件非常适合此目的（特别参见第 10 章，第 10.7 节）。\n-\
    \ **在 Git 仓库中包含设置文件的示例**\n  不要止步于密码！关键信息还包括主机名、端口号以及 Amazon Web Services (AWS)\
    \ 存储桶或虚拟机的名称。\n  包含此类数据的配置文件*不应*包含在任何 Git 仓库中！然而，没有配置文件，其他人要运行你的脚本就变成了一个猜谜游戏。因此，一个有用的方法是在仓库中包含一个示例配置文件。如果真实的配置文件名为\
    \ `mybackup.conf`，你可以将示例文件命名为 `mybackup.conf.sample`。此文件的目的是解释配置文件的语法。但是，该文件不包含任何真实数据，只包含虚构的示例数据。\n\
    \n这些安全规则适用于*所有* Git 仓库，包括私有仓库或位于其自己的、非公开 GitLab 实例上的仓库。当你设置或使用仓库时，你永远无法预测以后谁会有权访问它。密码和其他关键信息*绝不能*存储在仓库中。"
