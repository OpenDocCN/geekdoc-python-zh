    \n## 18.8 Example: Determining Electricity Prices and Displaying Them Graphically\n\
    \nThe expansion of renewable energies means that electricity prices fluctuate\
    \ more strongly today than before. The more the wind blows or the stronger the\
    \ sun shines, the more electricity is available—sometimes even more than is actually\
    \ needed. At such times, electricity is quite cheap on the power exchanges.\n\n\
    Against this backdrop, new electricity providers with hourly changing prices (aWATTar,\
    \ Tibber, etc.) are currently establishing themselves. Such dynamic tariffs motivate\
    \ people to carry out energy-intensive actions (charging an e-car, starting a\
    \ dryer at a certain time) as far as possible when a lot of electricity is available,\
    \ which benefits both customers and energy suppliers.\n\n![](img/a7fa45d496335c22ffb14c3275e24ffb_415_0.png)\n\
    \nFigure 18.2 Electricity Prices for the Next 24 Hours (Pure Energy Prices Including\
    \ VAT for Austria at the Beginning of April 2023)\n\nOur example in this section\
    \ refers to the company *aWATTar*. This company offers an API that informs consumers\
    \ about electricity prices for the coming hours (maximum for 24 hours). The European\
    \ EPEX SPOT power exchange serves as the data basis where these prices are calculated\
    \ on the basis of supply and demand. Prices for the next day will be available\
    \ from about 2 pm.\n\nThe script presented in this section turns this data into\
    \ a graph. Note that, in addition to the prices shown in the diagram for the energy\
    \ costs alone, data also includes the monthly basic fee, line costs, flat electricity\
    \ meter charges, etc.\n\n### 18.8.1 aWATTar API\n\nThe API is currently accessible\
    \ free of charge, but with a maximum of 100 access events per day:\n\n- https://api.awattar.at/v1/marketdata\
    \ (prices for Austria)\n- https://api.awattar.de/v1/marketdata (prices for Germany)\n\
    \nUnfortunately, the JSON result is not readable to humans. The time periods during\
    \ which a given price is valid are expressed in epoch milliseconds. This time\
    \ specification, common in Unix, calculates the seconds or milliseconds since\
    \ January 1, 1970 UTC. Prices are quoted in euros per megawatt hour, but excluding\
    \ VAT and the 3 percent surcharge charged by aWATTar.\n\n```\n{\n    \"object\"\
    :\"list\",\n    \"data\":[\n        {\n            \"start_timestamp\":1680508800000,\n\
    \            \"end_timestamp\":1680512400000,\n            \"marketprice\":107.11,\n\
    \            \"unit\":\"Eur/MWh\"\n        },\n        {\n            \"start_timestamp\"\
    :1680512400000,\n            \"end_timestamp\":1680516000000,\n            \"\
    marketprice\":93.08,\n            \"unit\":\"Eur/MWh\"\n        },\n        ...\n\
    \    ]\n}\n```\n\n### 18.8.2 Analysis of the Data\n\nAfter initializing various\
    \ variables, the script makes an API call and then analyzes the collected data\
    \ in a loop. The conversion of the epoch time data into “ordinary” DateTime objects\
    \ can be done without much effort using `fromtimestamp`. VAT and aWATTar surcharge\
    \ are added to the net prices.\n\n```\n# Sample file electricity-prices.py\nimport\
    \ locale, requests\nfrom datetime import datetime\nimport matplotlib.pyplot as\
    \ plt\n# use language according to system setting\nlocale.setlocale(locale.LC_ALL,\
    \ '')\n# basic settings\nsurcharge = 0.03   # Awattar surcharge on EXPO SPOT\n\
    vat = 0.20         # 20% VAT (Austria)\nurl = 'https://api.awattar.at/v1/marketdata'\n\
    # alternative for Germany\n# vat = 0.19\n# url = 'https://api.awattar.de/v1/marketdata'\n\
    # API call\nresponse = requests.get(url)\njsondata = response.json()\n\n# collect\
    \ data\nhours = []         # list for times\nprices = []        # list for prices\n\
    dateStart = None   # start date of time span\n\n# analyze data and present it\
    \ in text form\nfor price in jsondata['data']:\n    startDt = datetime.fromtimestamp(price['start_timestamp']\
    \ / 1000)\n    hour = startDt.strftime('%H:%M')\n    day = startDt.strftime('%a')\n\
    \    if not dateStart:          # initialize once\n        dateStart = startDt.strftime('%Y-%m-%d')\n\
    \    dateEnd = startDt.strftime('%Y-%m-%d')  # overwrite\n    priceCentKw = round(price['marketprice']\
    \ / 10 * (1 + surcharge) * (1 + vat))\n    priceBar = '*' * int(priceCentKw) \
    \      # ASCII type bar\n    print('%s %s %3d ct/kWh %s' % (day, hour, priceCentKw,\
    \ priceBar))\n    hours += [hour]\n    prices += [priceCentKw]\n```\n\nThe script\
    \ outputs the processed data as text first, for example:\n\n```\nMo 19:00 20 ct/kWh\
    \ *****************\nMo 20:00 17 ct/kWh *****************\nMo 21:00 16 ct/kWh\
    \ *****************\n…\n```\n\n### 18.8.3 Matplotlib\n\nPython is also quite popular\
    \ in the field of (natural) sciences. Accordingly, various modules support the\
    \ drawing of technical diagrams, the most popular of which is Matplotlib. The\
    \ following listing shows that a few lines of code are sufficient to design a\
    \ simple diagram:\n\n```\n# Continuation of electricity-prices.py\nfig, ax = plt.subplots()\n\
    ax.bar(hours, prices)\nplt.xticks(rotation=90)\nplt.title('Prices in ct/kWh from\
    \ %s to %s' % (dateStart, dateEnd))\n# hide every second label point\nfor label\
    \ in ax.xaxis.get_ticklabels()[::2]:\n    label.set_visible(False)\nfig.savefig('prices.png',\
    \ dpi=200)\n```\n\nsubplots returns two objects responsible for different aspects\
    \ of the chart. ax.bar creates a simple bar chart from the X and Y values passed\
    \ in two parameters. plt.xticks(rotation=90) causes a space-saving labeling of\
    \ the X axis. plt.title takes care of the labeling of the chart.\n\nThe following\
    \ loop hides every second label point on the X axis. savefig finally saves the\
    \ diagram in a PNG file. The dpi parameter (dots per inch) determines the desired\
    \ resolution. (The default value of only 100 DPI leads to quite pixelated diagrams.)\n\
    \nUnfortunately, not enough space is available in this book for an intensive discussion\
