    \ | If z1 is less than z2 (*less than*) |\n| [ z1 -le z2 ] | If z1 is less than\
    \ or equal to z2 (*less equal*) |\n| [ -d dat ] | If dat is a directory (*directory*)\
    \ |\n| [ -f dat ] | If dat is a file (*file*) |\n| [ -r dat ] | If the file may\
    \ be read (*read*) |\n| [ -w dat ] | If the file may be modified (*write*) |\n\
    | [ dat1 -nt dat2 ] | If file 1 is newer than file 2 (*newer than*) |\n| ! [ ...\
    \ ] | Negates the condition |\n\nTable 3.9 The Most Important Syntax Variants\
    \ for Formulating Conditions Using [ ] (Cont.)\n\n[ condition ] is available in\
    \ most shell variants. Bash and Zsh alternatively allow conditions to be placed\
    \ between double square brackets, for instance, [[ condition ]] (see Table 3.10).\
    \ In pattern, you can use the characters known from globbing (i.e., *, ? and [a-z]).\n\
    \n| Test Expression | Meaning |\n| :--- | :--- |\n| [[ zk = pattern ]] | True\
    \ if the string matches the pattern |\n| [[ zk == pattern ]] | As above |\n| [[\
    \ zk =~ regex ]] | True if the regular expression is true (see Chapter 9) |\n\
    | [[ bed1 && bed2 ]] | If both conditions are met (*and*) |\n| [[ bed1 || bed2\
    \ ]] | If at least one condition is met (*or*) |\n\nTable 3.10 Bash-Specific Formulation\
    \ of Conditions with [[ ]]\n\nIn the following example, myvar must contain a code\
    \ like A17 or C99:\n\n```\nif [[ \"$myvar\" == [ABC][0-9][0-9] ]]; then\n    echo\
    \ \"ok\"\nfi\n```\n\n> **Compatibility Concerns**\nThe [[ ]] syntax is not supported\
    \ by all shells (but by Zsh). You can increase the compatibility of your scripts\
