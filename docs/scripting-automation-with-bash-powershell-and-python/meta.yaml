    These examples again refer to the `images` directory that is to be backed up.
    Note that `zip` does not work recursively (i.e., subfolders are not included)
    by default. If necessary, the `-r` option can provide help in this context.


    ```

    $ zip backup.zip -r images        # create archive

    $ zipinfo backup.zip              # show archive

    $ unzip backup.zip                # unpack archive

    ```


