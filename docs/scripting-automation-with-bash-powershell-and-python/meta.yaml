  md: '# 3.2.3 Git Bash


    The Git version management program provides a rather elegant entry point into
    Bash. When you install Git on Windows (see https://git-scm.com/download/win),
    Git Bash is installed at the same time. If you work in software development, you
    most likely already have Git installed anyway. (You don’t work without Git, do
    you?) Then, you can run *Git Bash* from the **Start** menu, which will open a
    terminal window running Bash version 4.4, which is not the latest version, but
    it is sufficient for our purposes.


    Git Bash uses the Windows file system directly. In the Git Bash window, the most
    important commands are available that are also commonly used on Linux or macOS,
    namely, `ls`, `cat`, `less`, `more`, `find`, and `grep`, among others.


    The problem with Git Bash is that you cannot install any other commands. Sooner
    or later (more likely sooner), you’ll get to the point where you want to call
    a command in your script that is not part of the basic Git Bash. As far as Bash
    programming is concerned, you’ll then hit a dead end.


    # 3.2.4 Docker


    Provided you’re familiar with the Docker container system, you can also run Bash
    scripts in a Docker container. However, this approach is more suitable for professionals
    to share scripts. To learn Bash interactively, Docker is not the ideal way.


    # 3.2.5 Bash Configuration (/etc/profile and .bashrc)


    Several files affect the behavior of Bash. Most important are `/etc/profile` with
    its global settings and `.bashrc` in your home directory with individual options.
    Note that when running scripts outside your account, only `/etc/profile` is considered.


    For normal use, you do not need to make any changes to either file. The most common
    reason to change one of the files after all is to call commands or programs that
    have been installed away from the usual directories. For this task, you must extend
    the `PATH` environment variable. The following example shows how you can include
    `/my/own/scripts` in addition to the default directories:


    ```

    # at the end of .bashrc or /etc/profile

    export PATH=/my/own/scripts:$PATH

    ```


    # 3.3 Running Commands Interactively


    If you’re already familiar with the terminal, regardless of the operating system,
    you can safely skip this section. Otherwise, a good idea is to first become a
    little familiar with the interactive execution of commands and with the operation
    of the terminal before you start using your first script.'
