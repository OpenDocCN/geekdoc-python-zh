  md: "```\n# Sample file get-location.sh\njson=$(curl https://ipinfo.io -s)\nfor\
    \ key in city region country; do\n    echo -n \"$key: \"\n    echo $json | jq\
    \ .$key\ndone\n```\n\nAt my location, the script then returns the following output:\n\
    \n```\ncity: \"Graz\"\nregion: \"Styria\"\ncountry: \"AT\"\n```\n\n# 18.5 Using\
    \ REST APIs in PowerShell\n\nPowerShell provides two cmdlets to choose from to\
    \ perform HTTP requests:\n\n+   - You learned about `Invoke-WebRequest` in the\
    \ previous chapter (see Chapter 17, Section 17.7). The cmdlet can also be used\
    \ for REST methods.\n- `Invoke-RestMethod` has certain advantages and disadvantages\
    \ compared to `Invoke-WebRequest`: A convenient aspect is that the cmdlet converts\
    \ responses in a flat (non-nested) JSON format directly into a `PSCustomObject`.\
    \ If the web service returns responses in XML format, `Invoke-WebRequest` directly\
    \ returns an object of the `XmlDocument` type. This relatively intelligent handling\
    \ of typical REST data types simplifies the continued analysis.\n  On the other\
    \ hand, annoyingly, the cmdlet does not return the HTTP status code. If the request\
    \ is successful (code 2xx), you'll receive result data; otherwise an error will\
    \ occur. In some REST applications, this approach is too minimalistic.\n\nFrom\
    \ my point of view, `Invoke-RestMethod` has more disadvantages. In most applications,\
    \ I prefer `Invoke-WebRequest` and then convert the `Content` string into a JSON\
    \ object in the following way:\n\n```\n> $json = (Invoke-WebRequest `\n    'https://httpbin.org/headers').Content\
    \ | ConvertFrom-Json\n\n> $json.headers.host\nhttpbin.org\n```\n\nIn my tests,\
    \ some REST services returned HTML code instead of JSON code on requests made\
    \ using `Invoke-RestMethod` or `Invoke-WebRequest`. The solution in this case\
    \ is to specify the user agent `curl` in the header so that the service does not\
    \ erroneously assume that the user agent is a web browser:"
