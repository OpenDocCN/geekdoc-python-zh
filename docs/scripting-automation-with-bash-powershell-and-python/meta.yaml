  md: 'Within a script, functions can only be used *after* they have been defined.
    Thus, a script file first contains all the functions, while the code that is ultimately
    to be executed is located at the end.


    > **Naming Rules**


    The PowerShell documentation recommends naming custom functions, such as cmdlets,
    according to the *verb-noun* pattern. The hyphen required in the name, like almost
    any other character, can be used without special marking.


    # 4.11.1 Function Results


    What is unusual compared to “real” programming languages is the structure of the
    return value of a function in PowerShell: The result is obtained from all the
    outputs created in the function! All partial results caused by the commands within
    the function are returned collectively. Statements whose results end up in variables
    are not taken into account.


    For example, when the following three statements are run within the function,
    the function result is an array formed by the result of `command1`, the "lorem
    ipsum" string, and the result of `command2`:


    ```

    command1

    command2

    Write-Output "lorem ipsum"

    # Result: Array with the partial results from command1 and

    # command2 and a string

    ```


    In the second example, only `$a + $b`, which is a number, causes output to the
    success stream:


    ```

    $a = 123

    $b = command    # command returns 456 as the result

    $a + $b

    # Result: integer number 579

    ```


    Additionally, three statements are executed in the third example. But because
    the results of `command1` and `command2` are stored in variables, and because
    `Write-Debug` does not write to the success stream, no result is produced!


    ```

    $a = command1

    Write-Debug "lorem ipsum"

    $b = command2

    # no result (therefore $null)

    ```'
  merge: -1
  pgno: 141
- img_proc: true
  md: 'The structure of the result outlined in this context naturally also applies
    to commands that are executed in loops. Each output within the loop expands the
    function result that is returned at the end.


    > **Be Careful with Write-Output!**


    For debugging purposes, you might be tempted to include `Write-Output` in a function
    to output intermediate results. *Don''t do this!* `Write-Output` produces an output
    that becomes part of the function result. A better approach is to use `Write-Debug`
    and enable debugging outputs via `$DebugPreference = "Continue"`!


    As an alternative, you can also use `Write-Host`. But this approach has a disadvantage
    in that you must remove these statements later. Output from `Write-Host` cannot
    be redirected or otherwise disabled. Compared to `Write-Output`, using `Write-Host`
    has an advantage in that it does not change the function result.


    # 4.11.2 return


    A function typically ends with the execution of the last command. However, you
    can also terminate a function prematurely using `return` (e.g., within a loop
    as soon as a condition is fulfilled). If you use `return` without parameters,
    the function result is composed of all previous outputs as before:


    ```

    command1

    command2

    return

    # Result: Array with the partial results of command1 and command2

    ```


    Alternatively, you can pass a variable, expression, or command to `return`. In
    this case, the result of this expression is added to the previous partial results.
    (As a matter of fact, one would assume that only the `return` expression determines
    the result. But this is not the case with PowerShell!)


    ```

    command1

    command2

    return command3

    # Result: Array with the partial results of command1, command2

    # and command3

    ```


    # 4.11.3 Parameters


    Usually, parameters are supposed to be passed to functions. Declaring the position,
    name, data type, default value, and other properties in advance using `param`
    makes sense. PowerShell offers a wealth of syntactic options, of which I will
    only consider the most important ones in this book. In the simplest case, you
    simply specify a list of'
  merge: -1
  pgno: 142
- img_proc: true
  md: "parameters that are mandatory to pass. Specifying the data type in square brackets\
    \ is optional; if you choose to do so, the data type will be checked when a parameter\
    \ is passed.\n\n```\nfunction Do-Something {\n    param(\n        [type1] $Parameter1\n\
    \        [type2] $Parameter2\n        [type3] $Parameter3\n    )\n}\n```\n\nAlternatively,\
    \ the following short notation is allowed:\n\n```\nfunction Do-Something ([type1]$Para1,\
    \ [t2]$P2, [t3]$P3) { ... }\n```\n\nIf you specify a default value for parameters,\
    \ as in the following example, the parameter becomes optional, and thus does not\
    \ need to be specified when called:\n\n```\nfunction Do-It ([int]$A, [int]$B =\
    \ 2, [String]C = \"abc\") { ... }\n```\n\n> **Functions without an Explicit Parameter\
    \ List**\n\nThe use of `param` is optional. All data that does not correspond\
    \ to the predefined parameter list is accessible within the function in the predefined\
    \ `$args` variable. If you do not declare a parameter list, then `$args` applies\
    \ to all parameters. The PowerShell documentation speaks of *positional parameters*\
    \ in this context because the parameters have no name and can only be analyzed\
    \ based on their position.\n\nHowever, the analysis of `$args` is prone to errors.\
    \ Internally, `$args` is an array, so `$args(0)` is the first parameter, `$args(1)`\
    \ is the second one, etc. `$args.Length` specifies how many parameters not declared\
    \ via `param` were passed.\n\n# 4.11.4 Calling Functions\n\nRemember to pass parameters\
    \ when calling functions *without* naming parentheses! This behavior is equivalent\
    \ to calling cmdlets but, of course, differs from the behavior of almost all other\
    \ programming languages.\n\n```\nDo-It 1 2 \"abc\"\n```\n\nParameters can be used\
    \ like options. The associated values follow either separated by a space or in\
    \ the `-Parameter name:Value` notation. The order then no longer plays a role.\
    \ The following two calls of `Do-It` are equivalent to the previous line:\n\n\
    ```\nDo-It -C \"abc\" -A 1 -B 2\nDo-It -B:2 -C:\"abc\" -A:1\n```"
