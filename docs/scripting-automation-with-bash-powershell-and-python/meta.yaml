  md: '# 13.3 Remote – SSH Extension


    The biggest drawback of VS Code is its graphical user interface (GUI). This statement
    may seem absurd to you: After all, you use VS Code precisely because of how its
    intuitive operations and its many functions are elegantly integrated into its
    UI. As long as you work locally, that is, as long as your scripts are on your
    laptop, the benefits of VS Code really do come into their own.


    However, in everyday scripting, you’ll often write scripts that run on external
    servers or in virtual machines. Often, only a SSH connection exists to these computers
    or servers, and you must work in text mode. Linux fans then mostly rely on editors
    such as *vi* or *Emacs*, which unlock their full functionality in text mode and
    therefore remain applicable even in an SSH session. (Personally, I mostly use
    *jmacs* or *zile* in such cases. These minimalist editors are Emacs compatible
    in their basic commands.)


    However, I don’t blame you if you don’t feel like learning the countless keyboard
    shortcuts for these dinosaurs from the Unix past. Instead, I want to present to
    you an elegant alternative: You can also use VS Code through an SSH connection
    to edit code on another machine! This method of operation is associated with certain
    limitations, but in principle, it works great.


    # 13.3.1 Applying the Remote – SSH Extension


    To combine VS Code with SSH, you must install the *Remote – SSH* extension developed
    by Microsoft. You should also copy your SSH public key to the remote machine (`ssh-copy-id`,
    see **Chapter 12, Section 12.4**). In this way, you can avoid repeatedly entering
    the password for your account on the remote computer.


    To set up a new connection to an external computer, you must run `F1` *Remote-SSH:
    Add new ssh host* and then—in a terminal—enter the `ssh user@hostname` command.
    VS Code stores the data in `.ssh/config` but does not establish a connection for
    the time being.


    The connection is established via `F1` *Remote SSH: Connect to host* or via the
    green **Remote** area in the status bar. VS Code uses the `ssh` command to establish
    a connection and accordingly analyzes the keys stored in the `.ssh` directory.


    Once the connection has been successfully established, VS Code opens a new window,
    with the green area in the status bar making it clear that non-local data is being
    processed. From that moment on, VS Code will work as usual: You can select a directory,
    edit the files it contains, save your changes, and so on. The terminal area of
    VS Code is also extremely useful in remote operation. The terminal also runs *remotely*,
    so you can execute commands on the remote computer in it just like in an SSH session.'
