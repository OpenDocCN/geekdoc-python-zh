    你只需两条命令即可更新 Debian 或 Ubuntu 上安装的所有软件包：\n\n```\n$ sudo apt update\n$ sudo apt full-upgrade\n\
    ```\n\n你可能会问自己，为什么需要两个（听起来相似的）命令；为什么一个不够？`apt update` 仅更新外部软件源中可用软件包的信息。因此，该程序更新可用软件目录，但不会触及现有软件包。只有\
    \ `apt full-upgrade` 会在查询后下载更新的软件包并安装它们。如果更新影响了基本功能（如 Linux 内核），则必须在之后重新启动才能使更新生效。\n\
    \n## 6.5.2 安装其他软件包\n\n安装新软件也从 `apt update` 开始（除非你刚刚作为更新的一部分运行了此命令）。然后 `apt install`\
    \ 会下载所需的软件包，在以下示例中是收集在 `openssl` 包中的各种加密工具：\n\n```\n$ sudo apt update\n$ sudo\
    \ apt install openssl\n```\n\n在 Linux 中，软件通常分布在多个软件包中。相对常见的是，要执行软件包 A 中的命令，需要位于软件包\
    \ B 中的库。`apt` 会识别此类依赖关系，并在查询后安装所有所需的附加软件包。因此，如果 `apt install xy` 报告它安装的不是一个软件包，而是五个或十个，请不要感到惊讶！\n\
    \n> **查找软件包**\n如果你的脚本需要某个命令，猜测该命令位于哪个软件包中可能很困难。软件包和命令名称并不总是匹配，尤其是当一个软件包包含多个命令时。有时（但不幸的是并非总是如此！）`apt\
