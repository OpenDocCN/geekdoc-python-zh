  md: "# 8.5.1 Processing CSV Files Using Python\n\nIn a Python script, you can read\
    \ CSV data line by line from a text file (in the simplest cases) and then split\
    \ the lines into its columns using `split`. The following script analyzes the\
    \ `access.log` file from Section 8.4 and determines the most frequent IP addresses.\
    \ Unlike the equivalent Bash commands, the Python script is more efficient, especially\
    \ with large log files, because there is no need to sort all the IP addresses.\n\
    \n```\n# Sample file analyze-access-log.py\ncounters = {}  # dictionary with counters\
    \ for all IP addresses\n\n# loop through all lines of access.log\nwith open('access.log')\
    \ as f:\n    for line in f:\n        # the IP address is in the first column\n\
    \        ip = line.split()[0]\n        if ip in counters:\n            counters[ip]\
    \ += 1\n        else:\n            counters[ip] = 1\n\n# create ordered list of\
    \ dictionary elements;\n# each list element is itself a list: [ip, cnt]\nsortedIps\
    \ = sorted(counters.items(),\n                   key = lambda x: x[1], reverse\
    \ = True)\n\n# show top 5 IP addresses\nfor i in range(5):\n    print('%6d: %s'\
    \ % (sortedIps[i][1], sortedIps[i][0]))\n```\n\nHowever, the `split` method used\
    \ in this case to extract the columns fails with complex CSV files like `2023_population.csv`.\
    \ To read such complex files, the best approach is to use the `csv` module. The\
    \ following listing shows a simple application of this module:\n\n```\n# Sample\
    \ file analyze-population.py\nimport csv\ntotal = 0\nwith open('2022_population.csv',\
    \ newline = '') as f:\n    reader = csv.reader(f, delimiter = ',', quotechar =\
    \ '\"')\n    next(reader)            # skip column labels\n    for columns in\
    \ reader:  # read line by line, columns contains\n        print(columns)     \
    \ # list with columns\n        total += int(columns[2].replace(',', ''))\n\nprint(\"\
    Earth population:\", total)\n```"
