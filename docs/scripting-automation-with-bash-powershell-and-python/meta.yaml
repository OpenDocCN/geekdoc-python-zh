    \ 10.4). The only new feature at this point is the"
  - "[PAGE 319]\n\nInvoke-RestMethod cmdlet for downloading the XML file, which I'll\
    \ introduce in more detail in Chapter 18.\n\n```\n# Sample file get-exchange-rate.ps1\n\
    # download and analyze XML document\n$csv = \"chf-rates.csv\"\n$url = \"https://www.ecb.europa.eu/stats/eurofxref/\n\
    \        eurofxref-daily.xml\"\n$ecb = Invoke-RestMethod $url\n$date = $ecb.Envelope.Cube.Cube.time\n\
    $rate = ($ecb.Envelope.Cube.Cube.Cube |\n         Where-Object {$_.currency -eq\
    \ 'CHF'}).rate\n# if needed, create CSV file\nif (!(Test-Path $csv)) {\n    \"\
    date;chf_rate\" | Out-File $csv\n}\n# add current rate\nAdd-Content $csv \"$date;$rate\"\
    \n```\n\nNow, you just need to register the script with Microsoft Windows Task\
    \ Scheduler for the daily call. Since the rates are usually updated around 4 pm\
    \ Central European Time, a convenient time for the daily call is between 5 pm\
    \ and 6 pm.\n\nSince the ECB calculates exchange rates only on business days,\
    \ the CSV file will contain doubles if executed daily. If you want, you can enhance\
    \ the script to check if there is already an entry for the date contained in $date\
    \ before you use Add-Content.\n\n# 11.5 Tracking File System Changes\n\nRelatively\
    \ often, a scenario arises where, instead of executing actions at a predefined\
    \ time, they should be executed when files change or when new files are added.\
    \ The script that runs most often in my daily work monitors all Markdown files\
    \ in a local directory. As soon as a file changes, the script calls various commands\
    \ to create an updated PDF from the Markdown file with a preview of the chapter\
    \ I'm working on. This Bash script has the following structure:\n\n```\n# Sample\
    \ file run-pandoc.sh\nwhile true; do\n    for mdfile in *.md; do\n        pdffile=${mdfile%.md}.pdf\n\
    \        if [ $mdfile -nt $pdffile ]; then\n            echo $mdfile\n       \
    \     pandoc ... $mdfile -o $pdffile\n        fi\n    done\n    sleep 1\ndone\n\
    ```"
  - "[PAGE 320]\n\nThis script is easy to understand: `while true` forms an infinite\
    \ loop. As a result, the script runs until it is stopped via `Ctrl` + `C`. `for\
    \ mdfile` runs through all `*.md` files and then checks with the `-nt` operator\
    \ (*newer than*) whether the Markdown file is newer than the corresponding PDF\
    \ file. In this case, the name of the Markdown file is output, and a new PDF file\
    \ is created using `pandoc`, which is a command to convert documents between different\
    \ formats (see https://pandoc.org).\n\nA crucial component of the script is `sleep`,\
    \ which causes the script to pause for 1 second after each run. (Depending on\
    \ the purpose of monitoring the directory, a longer pause is also conceivable.)\
    \ Without `sleep`, the script would completely utilize a CPU. If you use `sleep`,\
    \ however, the CPU load caused by the script is negligible.\n\nThis task can be\
    \ solved just as elegantly with PowerShell. The only difference is the `if` condition,\
    \ which also contains an additional test that checks whether the PDF file exists\
    \ at all. If the PDF file doesn't exist, the comparison of `LastWriteTimeUtc`\
    \ would result in an error. Bash is a bit more laid back in this regard.\n\n```\n\
    # Sample file run-pandoc.ps1\nwhile($true) {\n    foreach($mdfile in Get-ChildItem\
    \ -Path *.md) {\n        $pdffile = $mdfile.FullName.Replace(\".md\", \".pdf\"\
    )\n        if(! (Test-Path $pdffile) -or\n            ($mdfile.LastWriteTimeUtc\
    \ -gt\n             (Get-Item $pdffile).LastWriteTimeUtc))\n        {\n      \
    \      Write-Host $mdfile.Name\n            C:\\path\\to\\pandoc.exe $mdfile.FullName\
    \ -o $pdffile\n        }\n    }\n    Start-Sleep -Seconds 1\n}\n```\n\n# 11.5.1\
    \ inotify\n\nThe scripts presented earlier are only useful if the number of files\
    \ to be monitored is small. Isn't there any better solution? Yes, depending on\
    \ the operating system and programming language you use.\n\nAt this point, I will\
    \ focus on using the `inotify` function, which is a Linux kernel function for\
    \ monitoring the file system. You can use this function to register a directory,\
    \ and you will subsequently always be notified when changes occur in this directory.\n\
    \nTo use `inotify` in Python scripts, you first must install the `pyinotify` module\
    \ with the following command:\n\n```\n$ pip[3] install pyinotify\n```"
- md: "To this function, you must create a `WatchManager` object. By using `add_watch`,\
    \ you can specify which file or directory you want to monitor, which events you\
    \ want to process (in this case, `IN_CLOSE_WRITE`, that is, closing a file after\
    \ a change) and which function will then be called. Then, you pass the `WatchManager`\
    \ object to the `Notifier`. Using `loop`, you start the event processing. As in\
    \ our earlier example, `loop` also initiates an infinite loop. So, the script\
    \ runs until you stop it via `Ctrl` + `C`.\n\nThe `runPandoc` function is responsible\
    \ for calling the `pandoc` command. However, it must first be tested whether the\
    \ modified file is a Markdown file at all. (Unfortunately, you cannot pass patterns\
    \ like `*.md` to `add_watch`.) For this purpose, the `ev` parameter (like `event`)\
    \ is analyzed, which contains details about the event that occurred.\n\n```\n\
    # Sample file run-pandoc.py\nimport pyinotify, subprocess\n\n# this function is\
    \ called by pyinotify\ndef runPandoc(ev):\n    if ev.name.endswith('.md'):\n \
    \       mdfile = ev.name\n        pdffile = mdfile.replace('.md', '.pdf')\n  \
    \      cmd = 'pandoc %s -o %s' % (mdfile, pdffile)\n        print(cmd)\n     \
    \   subprocess.run(cmd, shell=True)\n\nwm = pyinotify.WatchManager()\nwm.add_watch('.',\
    \ pyinotify.IN_CLOSE_WRITE, runPandoc)\nnotifier = pyinotify.Notifier(wm)\nnotifier.loop()\n\
    ```\n\nIn Bash scripts, you can use the `inotify` functions with the `inotifywait`\
    \ and `inotifywatch` commands, but you must first install the `inotify-tools`\
    \ package. Some simple application examples are documented at https://github.com/inotify-tools/inotify-tools/wiki#inotifywait.\n\
    \n## 11.5.2 Alternatives to inotify\n\nOn macOS, the *file system events* (`FSEvents`)\
    \ API provides similar functions. In scripts, the easiest way to use `FSEvents`\
    \ is with the `fswatch` command. This command can be installed using `brew`, as\
    \ described at https://github.com/emcrisostomo/fswatch.\n\nAnother monitoring\
    \ option is provided by the `launchd` program. For a simple use case, see this\
    \ Stack Overflow post: https://stackoverflow.com/a/1516034.\n\nOn Windows, you\
    \ can use the `FileSystemWatcher` feature. However, using this .NET feature is\
    \ quite complicated. A code example for PowerShell is available at https://powershell.one/tricks/filesystem/filesystemwatcher.\n\
    \n# Chapter 12\nSSH\n\nSecure Shell (SSH) has been the preferred method on Linux\
    \ and macOS for decades to work in text mode on another computer and execute commands\
    \ there. Fortunately, Microsoft also jumped on the SSH bandwagon a few years ago,\
    \ so SSH finally works across platforms. For scripting, SSH is important for two\
    \ reasons:\n\n-   Using SSH, you can work on other computers, create scripts there,\
    \ and finally execute them. SSH is an admin requirement, especially for server\
    \ administration.\n\n    But you don't always have to connect to a server! I often\
    \ use SSH to work on my Raspberry Pi as well. The Raspberry Pi does not need a\
    \ screen or keyboard for this connectivity—a network connection suffices. Likewise,\
    \ this simplicity applies to the numerous virtual machines in my everyday work:\
    \ I often don't need a graphical user interface (GUI) at all and can enter the\
    \ relevant commands or scripting programming in a terminal with an SSH connection.\n\
    \n    In addition, the Visual Studio Code (VS Code) editor and SSH make a good\
    \ team. You can learn more about VS Code in Chapter 13.\n\n-   For many scripts,\
    \ the ability to transfer files or entire directories securely between different\
    \ computers is at least as important. The `scp` and `rsync` commands and the Secure\
    \ FTP (SFTP) protocol use SSH. Backup and upload scripts therefore often require\
    \ SSH access. You also need to know how authentication works with SSH keys. The\
    \ handling of such keys is therefore an important topic in this chapter.\n\n>\
    \ **Prerequisites for This Chapter**\n\nAs far as scripting is concerned, no content-related\
    \ prerequisites must be fulfilled, which means you can read this chapter independently\
    \ from all other chapters. The sample scripts assume that you have basic knowledge\
    \ of Bash and PowerShell. You should also be familiar with the `find` command\
    \ (see Chapter 6, Section 6.2). As far as you work on Linux, basic admin knowledge\
    \ is of course always an advantage.\n\n## 12.1 Installing the SSH Client and Server\n\
    \nTo establish an SSH connection from local computer A to a second computer B,\
    \ an SSH client must be available on computer A (usually the `ssh` command), and\
    \ an SSH server must be running on B. This section describes the prerequisites\
    \ you must fulfill before you can use SSH.\n\n### 12.1.1 Linux\n\nOn Linux, the\
    \ `ssh` command is part of the basic vocabulary, so to speak, and is almost always\
    \ installed. You can see for yourself via `ssh -V` in the terminal. This command\
    \ displays the installed version.\n\n```\n$ ssh -V\n\nOpenSSH_9.2p1, OpenSSL 3.0.8\
    \ 7 Feb 2023\n```\n\nIf the `ssh` command is indeed not installed, you can install\
    \ the `ssh` command in the following ways:\n\n```\n$ sudo apt update         \
    \       (Debian, Ubuntu)\n$ sudo apt install openssh-client\n\n$ sudo dnf install\
    \ openssh-client    (Fedora, Red Hat)\n```\n\nThe operation of an SSH server is\
    \ not quite as self-evident. The following short test can provide clarity:\n\n\
    ```\n$ systemctl status sshd\n\nsshd.service - OpenSSH Daemon\n     Loaded: loaded\
    \ (...)\n     Active: active (running) since ...\n```\n\nIf the `sshd` service\
    \ is not known or not running, the installation will succeed in no time. I have\
    \ again summarized the commands for the most important distributions here:\n\n\
    ```\n$ sudo apt update                (Debian, Ubuntu)\n$ sudo apt install openssh-server\n\
    \n$ sudo dnf install openssh-server    (Fedora, Red Hat)\n$ systemctl enable --now\
    \ sshd\n```\n\n### 12.1.2 macOS\n\nOn macOS, the SSH client and server are already\
    \ installed. However, the SSH server must be explicitly enabled. For this task,\
    \ open the **General • Share** module in the **System Preferences** and enable\
    \ the **Remote login** option. Done!\n\n### 12.1.3 Windows\n\nIn current Windows\
    \ versions, the SSH client (i.e., the `ssh` command) is installed by default,\
    \ whereas the SSH server is not. To install missing components, you must open\
    \ the **Settings** program. You can find the *OpenSSH client* and the *OpenSSH\
    \ server*—well hidden—under **Apps • Optional features • Add an optional feature**.\
    \ (Why the program can’t simply be installed via the Microsoft Store defies any\
    \ logic. But I won’t complain here; it’s great that Microsoft finally offers an\
    \ official SSH client and server, making the installation of the dreadfully outdated\
    \ PuTTY program unnecessary.)\n\nYou can run the SSH client with the `ssh` command\
    \ in the terminal after the installation. With regard to the SSH server, one more\
    \ step is necessary. The program is installed but is not yet running as a service.\
    \ The solution is the **Services** program, which you can find in the **Start**\
    \ menu. Search for the *OpenSSH Server* item and double-click to open the settings\
    \ dialog. Then, click the **Start** button to start the server service for the\
    \ first time. You also must set **Startup type = Automatic** to always activate\
    \ the service when the computer boots up in the future.\n\nInstead of clicking\
    \ through settings dialogs, you can also perform the installation and service\
    \ startup in the terminal with the following commands:\n\n```\n> Add-WindowsCapability\
    \ -Online -Name OpenSSH.Client\n> Add-WindowsCapability -Online -Name OpenSSH.Server\n\
    > Start-Service sshd\n> Set-Service -Name sshd -StartupType 'Automatic'\n```\n\
    \nIf you then log on to your Windows computer from an external computer via SSH,\
    \ you’ll abruptly land in the IT Stone Age. Inexplicably, the SSH server uses\
    \ `cmd.exe` as the default shell. To enable you to use PowerShell within the SSH\
    \ session, you must run `pwsh`.\n\nFor PowerShell to be used automatically on\
    \ every SSH login, you must modify a registry entry. You can achieve this task\
    \ using the following three commands, which must be executed with admin rights\
    \ in a terminal:\n\n```\n> $PSPATH = (Get-Command -Name pwsh).path\n> New-Item\
    \ \"HKLM:\\Software\\OpenSSH\" -Force\n> New-ItemProperty \"HKLM:\\SOFTWARE\\\
    OpenSSH\" -Name DefaultShell `\n    -Value \"$PSPATH\" -PropertyType String -Force\n\
    ```\n\n> **Suddenly \"Permission Denied\" Displays at SSH Login**\n\nIf the location\
    \ where `pwsh.exe` is stored changes during a PowerShell update or during a new\
    \ PowerShell installation, the SSH server can no longer start PowerShell. However,\
    \ the error message in such cases is meaningless: *Permission denied*.\n\nThis\
    \ problem can stem from countless reasons, from the wrong password to the incorrect\
    \ configuration of `opensshd_config`. However, one possible cause of errors is\
    \ a changed path to `pwsh.exe`."
