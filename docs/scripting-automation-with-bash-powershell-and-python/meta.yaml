  md: "# 19.1 Updating and Maintaining Databases\n\nIn my professional work, I maintain\
    \ a MySQL server that hosts many similar databases. Each customer has a separate\
    \ database. Although the content of these databases varies depending on the customer,\
    \ the structure is always the same.\n\nNow and then, it happens that—for example\
    \ for troubleshooting—I want to apply the same SELECT commands to all databases.\
    \ The required script is, according to the motto of this book, not even 10 lines\
    \ long:\n\n```\n# Sample file apply-select.sh\n# this file contains the names\
    \ of all databases\nDBLIST=dbs.txt\n# this file contains the commands to be executed;\n\
    # the commands must be separated by ;.\nSQLFILE=select.sql\n\nfor db in $(cat\
    \ $DBLIST | sort) ; do\n  echo \"Database: $db\"\n  mysql $db < $SQLFILE\n  echo\
    \ \"---\"\ndone\n```\n\nThe `mysql` command plays a central role in the script.\
    \ It connects to the database specified by the `db` variable and executes all\
    \ commands contained in the file read by input redirection. Establishing a connection\
    \ to the database server requires that the active user has sufficient MySQL access\
    \ rights and that authentication is performed either at the operating system level\
    \ (`auth_socket` method for MySQL or `unix_socket` for MariaDB) or that the `.my.cnf`\
    \ file contains the required password.\n\nThe results of the `SELECT` commands\
    \ are displayed directly on the screen. Most of the time, I run the script in\
    \ the `./apply-select.sh | less` format, so I can conveniently scroll or search\
    \ through the output.\n\nBasically, `select.sql` could also contain commands to\
    \ modify all databases, for example to add a column to a table in each database.\
    \ But because such changes are much more dangerous than pure queries, I store\
    \ such commands in a separate `updates.sql` file, which is processed by a second\
    \ `apply-updates.sh` script. The script is identical to `apply-select.sh` except\
    \ for the initialization of the `SQLFILE` variable.\n\n# 19.1.1 PowerShell and\
    \ sqlcmd\n\nOf course, the same concept can be implemented via a PowerShell script.\
    \ The script calls the `sqlcmd` command, which is the SQL Server counterpart to\
    \ `mysql`. The code then looks as follows:"
  merge: -1
  pgno: 421
