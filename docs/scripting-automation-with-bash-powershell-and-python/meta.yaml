    \ option, the command works recursively, so it also deletes subdirectories and\
    \ their contents. Proceed with caution!\n\n```\n$ mkdir tst            # creates\
    \ a new directory\n$ cd tst               # changes there\n$ date > now.txt  \
    \     # saves date and time in now.txt\n$ cp now.txt copy.txt  # creates a copy\
    \ of now.txt\n$ mv copy.txt backup.txt # gives the copy a different name\n$ ls\
    \ *.txt             # lists all *.txt files\n  backup.txt now.txt\n$ rm *.txt\
    \             # deletes all *.txt files\n```\n\n# 6.2 Finding Files\n\nYou can\
    \ use `find` to search a directory including all subdirectories for files that\
    \ have certain characteristics. Possible search criteria include the name, the\
    \ file size or the date of the last modification. However, `find` never includes\
    \ the content of the file.\n\nYou need to pass the initial directory for the search\
    \ to the command (or `.` for the current directory). The search criteria are formulated\
    \ with countless options, whereby all criteria must apply simultaneously (logical\
    \ AND operation). The following examples are merely a small indication of the\
    \ capabilities of `find`. You can get much more information via `man find`. Some\
    \ `find` commands are preceded by `sudo`, which will run the search in root mode\
    \ (Section 6.4). This addition is necessary because, as an ordinary user, you’re\
    \ not even allowed to read a large number of files in the `/var` and `/etc` directories.\n\
    \n```\n# files in /var/log that are larger than 250 KB\n$ sudo find /var/log -size\
    \ +250k\n```"
