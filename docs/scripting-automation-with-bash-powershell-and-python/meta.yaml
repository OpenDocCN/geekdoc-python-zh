    \n-exec选项为找到的每个文件调用scp命令，并传递文件名代替{}。此功能也适用于包含空格的文件名。\\;指定-exec的命令在哪里结束。\n\n```\n\
    # 示例文件 upload-images.sh\nLOCALDIR=$(pwd)\nREMOTEDIR=/var/www/html/wordpress/myimages\n\
    REMOTEHOST=hostname\nREMOTEUSER=username1\n```"
