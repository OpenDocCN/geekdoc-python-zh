  md: "To become familiar with Microsoft Windows Task Scheduler, let's create a tiny\
    \ script that logs the date and time to a logging file:\n\n```\n# File log-date.ps1\n\
    Get-Date >> date.log\n```\n\nThis script is supposed to be executed every hour.\
    \ For this purpose, open Microsoft Windows Task Scheduler and click the **Create\
    \ Task** command in the **Actions** sidebar. This step will take you to a dialog\
    \ box with several tabs:\n\n+   - **General**\n  In this tab, you can give the\
    \ task a name, specify in which account your script should be run (usually your\
    \ own), and specify whether it should be started only after a login or always\
    \ when the computer is running.\n  If you want to run a script with administrator\
    \ privileges, you should not change the user or group, but just click the **Run\
    \ with highest privileges** option.\n- **Triggers**\n  In this tab, you can add\
    \ a new trigger to specify when and how often the action should take place. To\
    \ run the script every hour, you must select **Daily** with the current time as\
    \ the start time and **Repeat task every hour** as well as **For a duration of:\
    \ 1 day**. (The more plausible setting **For the duration of: Indefinitely** did\
    \ not work in my tests.)\n  In contrast to cron, not only does Microsoft Windows\
    \ Task Scheduler support time-based triggers, but it can also execute actions\
    \ when various events occur, for example, when logging in or when the computer\
    \ is currently in idle mode.\n- **Actions**\n  As a new action, you specify the\
    \ script to be run. The procedure is more cumbersome than you would expect: The\
    \ reason is that as a **program/script**, you must not simply specify the path\
    \ of your PowerShell script file. Instead, you need to specify `pwsh` for PowerShell\
    \ 7.n here. Only if your script is to be executed by the older Windows PowerShell\
    \ 5.n is the program name `powershell`.\n  In the **Add arguments** input field,\
    \ specify the `-File` option and enter the full path to your script. When typing,\
    \ you must not make any typos. Do not forget `-File`!\n  By default, the `%windir%\\\
    System32\\` directory is active when the script is run. If you do not want to\
    \ use this directory (e.g., because the script should read or write files in a\
    \ different directory), you must specify the relevant directory in the **Start\
    \ in** field. For the sample script to log the date and time in the same directory\
    \ where the script file is located, you must specify this directory.\n- **Conditions**\n\
    \  This tab defaults to performing the action only when your computer is running\
    \ in network mode. You can deactivate this option if you also want to run or test\
    \ the task while using your notebook in battery mode."
