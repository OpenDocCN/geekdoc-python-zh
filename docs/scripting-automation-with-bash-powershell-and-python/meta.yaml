    programming of the future, you don’t need to know a hundred syntax variants for
    certain regular expressions by heart. But you do need to know that regular expressions
    exist, the basics of how they work, and where pitfalls exist. This kind of knowledge
    is precisely the focus of this book.


    # Scripting as a Core Competence for Efficient IT Work


    No matter in which branch of the IT industry or on what kind of projects you’re
    currently working on, even just a little scripting knowledge will go a long way
    to making you more efficient in your work. Focus on the essentials; leave tedious
    side tasks to scripts. I wish you every success in this endeavor!


    –Michael Kofler (https://kofler.info)


