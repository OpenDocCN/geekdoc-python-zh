  - "[PAGE 89]\n\nother applicable patterns, it also executes the assigned commands.\
    \ The following lines show the analysis of a yes/no input, where the input is\
    \ accepted in any case and in the short forms y (yes):\n\n```\necho -n \"yes/no?\
    \ \"\nread answer\ncase $answer in\n    [yY] | [yY][eE][sS] ) echo \"yes\";;\n\
    \    [nN] | [nN][oO] )      echo \"no\";;\n    *)                     echo \"\
    invalid input\";;\nesac\n```\n\n# 3.11.4 Parameter Analysis via case\n\nIn my\
    \ own scripts, I mostly avoid `case` and prefer more readable `if` constructs.\
    \ Sometimes, however, `case` is actually helpful. Let's consider another example:\
    \ a simple analysis of parameters (*command-line arguments*) that are passed to\
    \ a script.\n\nThe `myoptions.sh` script accepts three options (-a, -b, and -c),\
    \ which can be specified in any order. In this case, -b and -c expect one parameter\
    \ each. Following the options, any number of additional parameters can be passed.\
    \ The following listing shows two calls of the script:\n\n```\n$ ./myoptions.sh\
    \ -a -b lorem -c ipsum dolores est\nOption a\nOption b with parameter lorem\n\
    Option c with parameter ipsum\nMore parameters: dolores est\n\n$ ./myoptions.sh\
    \ -c lorem -b ipsum dolores\nOption c with parameter lorem\nOption b with parameter\
    \ ipsum\nMore parameters: dolores\n```\n\nTo analyze the passed options and parameters,\
    \ the script uses the Bash-internal `getopts` command, which you can use in the\
    \ following way:\n\n+   - `getopts \"abc\"` expects the options -a, -b, and -c\
    \ in any order, even in combinations (i.e., -bc instead of -b -c).\n- `getopts\
    \ \":abc\"` works as above but does not return any error messages for invalid\
    \ parameters.\n- `getopts \"ab:c:\"` with a colon after b and c expects one parameter\
    \ for each of these options. During the analysis, the passed parameter can be\
    \ read from the `$OPTARG` variable."
  - "[PAGE 90]\n\n+   - Each call analyzes *one* option. The analysis must therefore\
    \ be performed in a loop. For this example, I used `while`. (Details on loops\
    \ will follow in the next section.)\n- During the processing of the options, `$OPTIND`\
    \ references the next element of the parameter list.\n\nProvided that the options\
    \ are passed first and then the parameters, all processed options can be removed\
    \ from `$*` using `shift`. (`shift <n>` removes the first *n* elements from `$*`.\
    \ But because `$OPTIND` already references the next element, only `$OPTIND -1`\
    \ elements may be pushed out of the parameter list.)\n\n```\n# Sample file myoptions.sh\n\
    while getopts \":ab:c:\" opt; do\n    case $opt in\n        a) echo \"Option a\"\
    ;;\n        b) echo \"Option b with parameter $OPTARG\";;\n        c) echo \"\
    Option c with parameter $OPTARG\";;\n        ?) echo \"Invalid option\"\n    \
    \        echo \"Usage: myoptions [-a] [-b data] [-c data] [...]\"\n          \
    \  exit 2\n            ;;\n    esac\ndone\n# remove processed options from $*\n\
    shift $(( $OPTIND - 1 ))\necho \"More parameters: $*\"\n```\n\n> **getopts versus\
    \ getopt**\n`getopts` is a relatively simple command that can only handle 1-letter\
    \ options, but not long options like `--search`. A more powerful alternative is\
    \ the external `getopt` command, which is mostly included in the `util-linux`\
    \ package on Linux. For an example of how to use this command and more tips on\
    \ evaluating script parameters, see Stack Overflow, specifically https://stackoverflow.com/questions/192249.\n\
    \n# 3.12 Loops\n\nBash provides several commands to choose from for creating loops.\
    \ In this section, I'll start with `for`, before I provide a brief introduction\
    \ to `while` and `until`. The basic syntax of the `for` loop is shown in the following\
    \ listing. Note the placement of the semicolon before and not after `do`! You\
    \ can avoid this semicolon by starting a new line with `do`.\n\n```\nfor myvar\
    \ in mylist; do\n    command1\n    command2\ndone\n```"
