    > ### The Prompt

    The "prompt" is the string that is displayed to the left of the cursor when new
    commands are entered. On Linux, it is common for the prompt to end with the `$`
    character for ordinary users. If, on the other hand, the system administrator
    `root` is working, the prompt ends with `#`.


    The prompt is adjustable (environment variable `PS1`) and can therefore look quite
    different depending on the distribution and configuration. Often, the current
    directory and/or hostname are displayed before the `$` or `#` character.


    In this book, commands to be executed in Bash or Zsh are preceded by the `$` character.
    (It should be clear to you by now that this character must *not* be entered.)
    PowerShell commands are preceded by the `>` character because the Windows prompt
    uses this character.


    This chapter is a special case: Since it is clear anyway that the examples refer
    to Bash, I often omit the prompt altogether. I especially omit the prompt when
    presenting techniques that work equally well interactively in the terminal or
    as code in a script.


    # ### 3.3.1 Operating the Terminal


