    This command deletes the `LANG` environment variable with the language settings
    only for the execution of `command`. `command` is therefore executed without the
    otherwise valid language settings and returns error messages in English if necessary.
    (English is the default language when `LANG` is empty. English error messages
    are useful when searching the internet for the cause of a problem.) `LANG` does
    not get permanently deleted, however, but is available again for the other commands.


