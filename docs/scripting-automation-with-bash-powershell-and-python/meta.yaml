    ```\n\nThe execution of all three commands requires root privileges in most cases.\
    \ Exceptions include changes for your own files, which only affect your own user\
    \ account or groups assigned to you. Such modifications—for example, chmod +x\
    \ myscript.sh to make a"
- md: "## 6.4.4 Managing Processes\n\nThe `ps` command without options lists the processes\
    \ that have been started from the terminal. The result of `ps ax` is already impressive:\
    \ It will provide you with a list of all processes running on the computer or\
    \ in the virtual machine along with detailed information (process number, parameters,\
    \ etc.). More information is provided by `ps axu:` This command also shows who\
    \ started which process.\nThe result of `ps` can be further processed with other\
    \ commands. In the following examples, `wc -l` (*word count, lines*) counts the\
    \ output lines and thus the active processes. `grep` filters the lines from the\
    \ result that contain the `ssh` search term.\n\n```\n$ ps ax | wc -l      # count\
    \ number of processes\n$ ps ax | grep ssh   # show only SSH processes\n```\n\n\
    `top` shows the running processes sorted by their CPU usage. The display is refreshed\
    \ every 3 seconds until you end the command via `q`.\n\n> **Alternatives to top**\n\
    Some useful alternatives to `top` exist. While `htop` has a clear display, `iotop`,\
    \ `iftop`, or `powertop` use other sorting criteria—I/O load, network performance,\
    \ or (estimated) power consumption, respectively. These commands usually must\
    \ be installed separately.\n\n## 6.4.5 Terminating Processes\n\nTo terminate an\
    \ out-of-control or infinite loop script that you started in the terminal, you\
    \ can simply press `Ctrl` + `C`. You can stop other processes associated with\
    \ your account via `kill pid`. Instead of `pid`, you must specify the process\
    \ number, which you can determine either via `ps ax` or `top`.\nDespite its dramatic\
    \ name, `kill` actually only sends signals to other processes. Without any additional\
    \ options, it sends the `SIGTERM` signal, which is effectively a polite request\
    \ that the process be terminated. However, the process can ignore this signal.\
    \ In such cases, `kill -9 pid` usually provides the desired result. In this context,\
    \ `-9` indicates the signal number. Signal 9 is called `SIGKILL` and terminates\
    \ every process immediately unless a longer lasting system function is being executed.\
    \ If that’s the case, even SIGKILL won’t help.\n\nAs you may have guessed already,\
    \ you can only terminate your own processes using `kill`. Only `root` is allowed\
    \ to stop external processes. For this purpose, you can combine `kill` with `sudo`\
    \ (e.g., `sudo kill -9 pid`).\n\nA bit annoying that you must find out the process\
    \ number first before you can run `kill`. A more convenient command in this context\
    \ is `killall n`, where `n` is the name of the process to be terminated. Watch\
    \ out, though: `sudo killall n` can have far-reaching consequences because it\
    \ kills *all* processes with the same name, no matter who started them.\n\n##\
    \ 6.4.6 Background Processes and System Services\n\nWhen you boot a Linux system,\
    \ numerous background processes are started automatically. These processes are\
    \ responsible for various system tasks and server services. You can use the `systemctl`\
    \ command to stop such system services, restart them, start them automatically\
    \ in the future, and so on.\n\n```\n$ sudo systemctl              # list all services\n\
    $ sudo systemctl stop name    # stop 'name' service\n$ sudo systemctl start name\
    \   # start the service\n$ sudo systemctl restart name # restart the service\n\
    $ sudo systemctl reload name  # read configuration files\n$ sudo systemctl enable\
    \ name  # start the service automatically\n                              # in\
    \ the future\n$ sudo systemctl disable name # no longer start the service\n  \
    \                            # in the future\n```\n\n`systemctl` is especially\
    \ important if you have installed a new server service on Linux. Depending on\
    \ the distribution (e.g., Fedora or Red Hat), services do *not* get started automatically\
    \ once the installation process has completed. You must take care of the configuration\
    \ first and then start the service manually using `systemctl start`. If everything\
    \ works, you can enable the service permanently via `systemctl enable`.\n\nIn\
    \ other distributions, newly installed services are started immediately with a\
    \ default configuration (e.g., Debian, Ubuntu), but even in this case, changes\
    \ to the configuration are usually required. For your changes to take effect,\
    \ you must run `systemctl reload`. (For very fundamental changes, even `systemctl\
    \ restart` is required.)\n\n## 6.4.7 Logging Files\n\nThe services running on\
    \ Linux log a large amount of data. Some programs store log files as text files\
    \ in the `/var/log` directory, such as most mail and web servers. The following\
    \ command lists all logging messages of the mail server that concern a specific\
    \ email address:\n\n```\n$ sudo grep customer@somecompany.com /var/log/mail.log\n\
    ```\n\nSmaller server processes mostly use the central syslog. You can read the\
    \ messages using `journalctl`, as in the following examples:\n\n```\n$ journalctl\
    \                # read all syslog messages\n$ journalctl -u sshd        # read\
    \ only messages from the SSH server\n```\n\n## 6.4.8 Determining Free Memory\n\
    \n`free -h` determines the free memory. The `-h` option stands for *human readable*.\
    \ The numerical data is therefore provided with suitable units, such as M for\
    \ megabyte (MB), G for gigabyte (GB), and so on. However, the result is not easy\
    \ to interpret. The free memory is indicated in the final *available* column and\
    \ is around 15 GBs on the test computer. According to the *free* column, it would\
    \ seem to be less than 1 GB, but the system takes into account a lot of buffer\
    \ memory that Linux can make available at any time.\n\n```\n$ free -h\n\n    \
    \          total        used        free      shared  buff/cache   available\n\
    Mem:           30Gi       14Gi       938Mi       478Mi        15Gi        15Gi\n\
    Swap:            0B          0B          0B\n```\n\nYou can determine the free\
    \ space on the hard disk or SSD using `df -h` (*disk free*). By default, the command\
    \ lists all Linux file systems, including various internal file systems. Using\
    \ `-x tmpfs`, you can at least eliminate the temporary file systems and this way\
    \ reduce the information overload a little. In the following example, the second\
    \ and third lines are the most interesting ones. There are still 159 GBs free\
    \ in the root file system and 195 GBs in the `/home` file system for the user\
    \ directories.\n\n```\n$ df -h -x tmpfs\n\nFilesystem               Size  Used\
    \ Avail Use% Mounted on\ndev                      16G     0   16G   0% /dev\n\
    /dev/mapper/vgcrypt-root 196G   28G  159G  15% /\n/dev/mapper/vgcrypt-home 590G\
    \  366G  195G  66% /home\n/dev/nvme0n1p1           2.0G   80M  1.9G   4% /boot\n\
    /dev/sdb1                1.7T  1.1T  570G  66% /run/media/kofler/p1-backup2\n\
    ```\n\nA great alternative to `df` is the `duf` command, but it needs to be installed\
    \ separately. Basically, the command provides the same information, but it formats\
    \ the result much more clearly.\n\n## 6.4.9 Determining Other System Information\n\
    \nDo you want to know which distribution is running in a virtual machine or on\
    \ a server? Take a look at the `/etc/os-release` file:\n\n```\n$ cat /etc/os-release\n\
    \nNAME=\"Arch Linux\"\nBUILD_ID=rolling\n...\n```\n\nYou can determine the version\
    \ of the running kernel by using `uname`:\n\n```\n$ uname -r\n\n6.1.1-arch1-1\n\
    ```\n\nYou can read error, warning, debug, and status messages from the kernel\
    \ with `dmesg`. The best approach is to redirect the result of `dmesg` to `less`\
    \ so that you can scroll through the information, which can extend over several\
    \ pages. In most current distributions, the kernel messages can only be read with\
    \ `root` privileges.\n\n```\n$ sudo dmesg | less\n```\n\n## 6.5 Software Installation\n\
    \nLinux distributions contain a good basic set of commands by default. However,\
    \ depending on the direction in which your scripts develop, it can happen that\
    \ exactly one specific command is missing. This case occurs particularly often\
    \ when you use containers, for example, with Docker. In containers, the basic\
    \ equipment is reduced to a minimum for reasons of space.\n\nA missing command\
    \ is rarely an insurmountable problem: Most Linux distributions are associated\
    \ with a huge archive of software packages. All you need to do is install the\
    \ correct package from these package sources that contains the commands you need.\n\
    \n> **Differences among apt, dnf, zypper, and brew**\n\nFundamental differences\
    \ exist between Linux distributions when it comes to package management. In this\
    \ section, I focus on the `apt` command, which is used on Debian, Ubuntu, and\
    \ related distributions.\n\nIn the Red Hat world, for example, on Fedora or AlmaLinux,\
    \ you would use `dnf` instead, which works quite similarly to `apt`. For SUSE\
    \ Linux Enterprise Server (SLES) distributions in turn, `zypper` is used."
  mdcn: "## 6.4.4 管理进程\n\n不带选项的 `ps` 命令会列出从终端启动的进程。`ps ax` 的结果已经相当令人印象深刻：它会提供计算机或虚拟机上所有正在运行的进程列表，以及详细信息（进程号、参数等）。`ps\
    \ axu` 提供更多信息：该命令还会显示谁启动了哪个进程。\n`ps` 的结果可以与其他命令进一步处理。在以下示例中，`wc -l`（*字数统计，行数*）统计输出行数，从而统计活动进程数。`grep`\
    \ 从结果中过滤出包含 `ssh` 搜索词的行。\n\n```\n$ ps ax | wc -l      # 统计进程数量\n$ ps ax | grep\
    \ ssh   # 仅显示 SSH 进程\n```\n\n`top` 按 CPU 使用率排序显示正在运行的进程。显示每 3 秒刷新一次，直到你通过 `q`\
    \ 结束命令。\n\n> **top 的替代方案**\n存在一些 `top` 的有用替代品。`htop` 具有清晰的显示界面，而 `iotop`、`iftop`\
    \ 或 `powertop` 则使用其他排序标准——分别是 I/O 负载、网络性能或（估计的）功耗。这些命令通常需要单独安装。\n\n## 6.4.5 终止进程\n\
    \n要终止你在终端启动的失控或无限循环脚本，只需按 `Ctrl` + `C` 即可。你可以通过 `kill pid` 停止与你的帐户相关的其他进程。你必须指定进程号来代替\
    \ `pid`，可以通过 `ps ax` 或 `top` 来确定进程号。\n尽管名字听起来很严重，`kill` 实际上只是向其他进程发送信号。在没有任何额外选项的情况下，它会发送\
    \ `SIGTERM` 信号，这实际上是一个礼貌的请求，要求进程终止。然而，进程可以忽略此信号。在这种情况下，`kill -9 pid` 通常能提供所需的结果。在此上下文中，`-9`\
    \ 表示信号编号。信号 9 称为 `SIGKILL`，它会立即终止每个进程，除非正在执行更持久的系统功能。如果是这种情况，即使是 SIGKILL 也无济于事。\n\
    \n正如你可能已经猜到的，你只能使用 `kill` 终止自己的进程。只有 `root` 才被允许停止外部进程。为此，你可以将 `kill` 与 `sudo`\
    \ 结合使用（例如，`sudo kill -9 pid`）。\n\n有点烦人的是，你必须先找到进程号才能运行 `kill`。在这种情况下，一个更方便的命令是\
    \ `killall n`，其中 `n` 是要终止的进程的名称。不过要注意：`sudo killall n` 可能会产生深远的影响，因为它会杀死*所有*同名的进程，无论谁启动了它们。\n\
    \n## 6.4.6 后台进程和系统服务\n\n当你启动 Linux 系统时，会自动启动许多后台进程。这些进程负责各种系统任务和服务器服务。你可以使用 `systemctl`\
    \ 命令来停止这些系统服务、重启它们、将来自动启动它们等等。\n\n```\n$ sudo systemctl              # 列出所有服务\n\
    $ sudo systemctl stop name    # 停止 'name' 服务\n$ sudo systemctl start name   #\
    \ 启动服务\n$ sudo systemctl restart name # 重启服务\n$ sudo systemctl reload name  #\
    \ 重新读取配置文件\n$ sudo systemctl enable name  # 将来自动启动服务\n$ sudo systemctl disable\
    \ name # 将来不再启动服务\n```\n\n如果你在 Linux 上安装了新的服务器服务，`systemctl` 尤其重要。根据发行版（例如 Fedora\
    \ 或 Red Hat）的不同，服务在安装过程完成后*不会*自动启动。你必须先处理配置，然后使用 `systemctl start` 手动启动服务。如果一切正常，你可以通过\
    \ `systemctl enable` 永久启用该服务。\n\n在其他发行版中，新安装的服务会立即使用默认配置启动（例如 Debian、Ubuntu），但即使在这种情况下，通常也需要对配置进行更改。要使你的更改生效，你必须运行\
    \ `systemctl reload`。（对于非常根本性的更改，甚至需要 `systemctl restart`。）\n\n## 6.4.7 日志文件\n\
    \nLinux 上运行的服务会记录大量数据。一些程序将日志文件作为文本文件存储在 `/var/log` 目录中，例如大多数邮件和 Web 服务器。以下命令列出邮件服务器中与特定电子邮件地址相关的所有日志消息：\n\
    \n```\n$ sudo grep customer@somecompany.com /var/log/mail.log\n```\n\n较小的服务器进程大多使用中央\
    \ syslog。你可以使用 `journalctl` 读取消息，如以下示例所示：\n\n```\n$ journalctl               \
    \ # 读取所有 syslog 消息\n$ journalctl -u sshd        # 仅读取来自 SSH 服务器的消息\n```\n\n##\
    \ 6.4.8 确定可用内存\n\n`free -h` 确定可用内存。`-h` 选项代表*人类可读*。因此，数字数据会提供合适的单位，例如 M 代表兆字节（MB），G\
    \ 代表千兆字节（GB），等等。然而，结果并不容易解释。可用内存在最后一列 *available* 中指示，在测试计算机上约为 15 GB。根据 *free*\
    \ 列，似乎不到 1 GB，但系统考虑了大量的缓冲内存，Linux 可以随时使用这些内存。\n\n```\n$ free -h\n\n          \
    \    total        used        free      shared  buff/cache   available\nMem: \
    \          30Gi       14Gi       938Mi       478Mi        15Gi        15Gi\nSwap:\
    \            0B          0B          0B\n```\n\n你可以使用 `df -h`（*磁盘空闲*）确定硬盘或 SSD\
    \ 上的可用空间。默认情况下，该命令列出所有 Linux 文件系统，包括各种内部文件系统。使用 `-x tmpfs`，你至少可以排除临时文件系统，从而稍微减少信息过载。在以下示例中，第二行和第三行最有趣。根文件系统中仍有\
    \ 159 GB 可用空间，`/home` 文件系统（用于用户目录）中有 195 GB 可用空间。\n\n```\n$ df -h -x tmpfs\n\n\
    Filesystem               Size  Used Avail Use% Mounted on\ndev               \
    \       16G     0   16G   0% /dev\n/dev/mapper/vgcrypt-root 196G   28G  159G \
    \ 15% /\n/dev/mapper/vgcrypt-home 590G  366G  195G  66% /home\n/dev/nvme0n1p1\
    \           2.0G   80M  1.9G   4% /boot\n/dev/sdb1                1.7T  1.1T \
    \ 570G  66% /run/media/kofler/p1-backup2\n```\n\n`df` 的一个很好的替代品是 `duf` 命令，但它需要单独安装。基本上，该命令提供相同的信息，但格式化结果要清晰得多。\n\
    \n## 6.4.9 确定其他系统信息\n\n你想知道虚拟机或服务器上运行的是哪个发行版吗？查看 `/etc/os-release` 文件：\n\n```\n\
    $ cat /etc/os-release\n\nNAME=\"Arch Linux\"\nBUILD_ID=rolling\n...\n```\n\n你可以使用\
    \ `uname` 确定正在运行的内核版本：\n\n```\n$ uname -r\n\n6.1.1-arch1-1\n```\n\n你可以使用 `dmesg`\
    \ 读取来自内核的错误、警告、调试和状态消息。最好的方法是将 `dmesg` 的结果重定向到 `less`，这样你就可以滚动浏览可能跨越多页的信息。在大多数当前发行版中，内核消息只能使用\
    \ `root` 权限读取。\n\n```\n$ sudo dmesg | less\n```\n\n## 6.5 软件安装\n\nLinux 发行版默认包含一套良好的基本命令。然而，根据你的脚本发展方向，可能会缺少某个特定的命令。当你使用容器时，例如使用\
    \ Docker，这种情况尤其常见。出于空间考虑，容器中的基本配置被缩减到最低限度。\n\n缺少命令很少是一个无法克服的问题：大多数 Linux 发行版都与一个巨大的软件包存档相关联。你所要做的就是从这些软件包源中安装包含你需要的命令的正确软件包。\n\
    \n> **apt、dnf、zypper 和 brew 之间的区别**\n\n在软件包管理方面，Linux 发行版之间存在根本性差异。在本节中，我将重点介绍\
    \ `apt` 命令，该命令用于 Debian、Ubuntu 及相关发行版。\n\n例如，在 Red Hat 世界中，如 Fedora 或 AlmaLinux，你会使用\
    \ `dnf` 代替，其工作方式与 `apt` 非常相似。对于 SUSE Linux Enterprise Server (SLES) 发行版，则使用 `zypper`。"
