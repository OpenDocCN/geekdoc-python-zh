    # Chapter 1

    Scripting: Doing One Thing


    This short introductory chapter addresses the question, “What is scripting?” We’ll
    cover the differences between “full-fledged” programming languages and classic
    scripting languages and show you right away how these boundaries (especially with
    Python) are fluid.


    In this chapter, I want to go into a bit of the background and philosophy of scripting.
    I think this background is especially important if you’ve previously developed
    code using a language like Java or C#. You have learned to use the correct data
    types and to structure your code in an object-oriented way. You’ve followed all
    the rules of the art as best you can.


    At this point, you might be wondering: What is wrong with also developing a backup
    script or a test program for a REST API in a strictly typed programming language?
    What are the advantages of a syntactically much more generous script language
    like Bash, which knows strings as the only data type? Why make friends with PowerShell
    when it uses the same .NET foundation as C#? We’ll be answering these questions
    as we discuss the benefits of each scripting language in the coming sections.


    # 1.1 What Does Scripting Mean?


    Scripting means the following:


    +   - You can write 20 lines of code to create a backup of your database once
    a day, including encrypting and uploading this data to cloud storage.

    - With a tiny program, you can reduce countless wedding photos to a maximum resolution
    of 1024×768 pixels, including watermarking and uploading the files to a hidden
    directory on your web server so that your customers can view and select their
    favorite images via your website.

    - You can easily scan all the computers on your local network for a specific security
    vulnerability or an outdated software version.

    - You can capture, for instance, the volume of gas stored in Germany, the price
    fluctuations of the next notebook you want to buy, or the latest COVID-19 case
    numbers from public websites and represent this data in charts.

    - You can filter out the 20 error messages relevant to you from a log file of
    50,000 lines.'
