    ## 12.2.5 PowerShell 中的 SSH 远程处理


    你可以使用 `Enter-PSSession` 或 `New-PSSession` 命令，通过 *Windows 远程管理* 在外部 Windows 计算机上运行命令。自
    PowerShell 6 起，此功能也适用于 SSH 连接，因此被称为 *SSH 远程处理*。然而，之前需要在服务器端进行一些准备工作。


    要在外部 Windows 机器上使用 SSH 远程处理，必须在相应的 `sshd_config` 文件中添加一行新的 `Subsystem`。在我们的例子中，`Subsystem`
    语句由于空间原因被分成了两行，并使用了 \。（它必须在一行内指定，并且不能包含 \ 字符！）根据文档，从 PowerShell 版本 7.4 开始，将不再需要
    `-nologo` 选项。


    ```

    # Windows 主机：文件 $env:ProgramData\ssh\sshd_config

    ...

    Subsystem powershell c:/progra~1/powershell/7/pwsh.exe \n    -sshs -nologo

    ```


    打开文件最简单的方法是从终端启动编辑器（例如，使用 `code $env:ProgramData\ssh\sshd_config`）。这种方法会自动将 `$env:ProgramData`
    替换为你机器上的相应路径（通常是 `C:\ProgramData`）。


    奇怪的 `Subsystem` 设置 `c:/progra~1/powershell/7/pwsh.exe` 是 PowerShell 安装路径的 DOS
    表示法（即，每个文件名或目录名最多 8 个字符加 3 个字符）。这种古老的表示法是必要的，因为 OpenSSH 无法处理包含空格的 Windows 文件名。


    可能正确的路径也是 `c:/progra~2`！以下命令展示了如何找出短表示法。首先，你想使用 `Get-Command` 来确定 PowerShell 的安装位置。然后，你必须运行
    `cmd.exe` 来获取程序目录的短表示法：


    ```

    > (Get-Command pwsh).Path

    C:\Program Files (x86)\PowerShell\7\pwsh.exe

    > cmd /c ''for %X in ("C:\Program Files (x86)") do @echo %~sX''

    C:\PROGRA~2

    ```


    最后，你需要重启 SSH 服务器：


    ```

    > Restart-Service sshd

    ```


    在 Linux 机器上为 SSH 远程处理所做的准备工作看起来非常相似。在 Linux 上，你也必须向 `sshd_config` 添加一行 `Subsystem`。但是，你必须使用你的发行版中有效的
    PowerShell 路径，而不是 `/usr/bin/pwsh`。你可以通过 `which pwsh` 来确定路径。


    ```

    # Linux 主机：文件 /etc/ssh/sshd_config

    ...

    Subsystem powershell /usr/bin/pwsh -sshs -nologo

    ```


    以下命令重启 SSH 服务器：


    ```

    $ sudo systemctl restart sshd

    ```


    一旦你完成了这些准备工作，你就可以使用 `New-PSSession` 建立 SSH 连接，并将其作为 `Invoke-Command` 的参数。在下面的例子中，我在本地
    Windows 机器上工作，连接到网络上的 Linux 机器，并在那里运行 `Get-ChildItem`。你可以使用 `Remove-PSSession`
    来终止 SSH 连接。


    ```

    > $session = New-PSSession linuxhostname -Username kofler

    > Invoke-Command -Session $session { Get-ChildItem /etc/*.conf }


    Directory: /etc

    Mode        LastWriteTime   Length Name

    ----        -------------   ------ ----

    --r--   02/10/2023   22:08     833 appstream.conf

    --r--   01/27/2023   19:44       0 arptables.conf

    --r--   12/06/2021   13:27    1438 dhcpcd.conf


    > Remove-PSSession $session

    ```


    更多配置提示和应用示例可以在以下链接中找到：


    - https://learn.microsoft.com/en-us/powershell/scripting/learn/remoting/ssh-remoting-in-powershell-core

    - https://github.com/PowerShell/Win32-OpenSSH/issues/1498


    ## 12.3 scp 和 rsync


    scp 使你能够在本地计算机和远程计算机之间来回复制文件。以下几行总结了 scp 的主要语法变体。与 ssh 命令不同，主机名后面必须始终跟一个冒号！记住：点
    (.) 是当前目录的简写。


    ```

    # 将本地文件复制到外部主机（上传）

    $ scp filename user@host:

    $ scp filename user@host:path/newfilename


    # 将外部主机的文件复制到本地

    # 文件系统（下载）

    $ scp user@host:filename .

    $ scp user@host:path/filename .


    # 递归复制整个目录树

    $ scp -r localdir/ user@host:

    $ scp -r user@host:remotedir .

    ```


    > **烦人的密码指定**

    即使由于空间原因未包含在我们的列表中，每个 scp 命令都必须通过输入密码来确认，这当然是很烦人的。在这种情况下，解决方案是使用 SSH 密钥（第 12.4
    节）。


    与交互式使用 ssh 一样，通信是加密的。即使攻击者成功拦截并记录了数据包，他们也无法在没有密码的情况下解密数据（根据目前的知识）。


    ### 12.3.1 使用 SSH 远程处理的 Copy-Item


    scp 在 Windows 上是一个常规命令（一个 *.exe 文件）。在 PowerShell 脚本中调用这样的命令总是显得有些格格不入。一个替代方案是设置
    SSH 远程处理（第 12.2 节）。在此条件下，你可以先通过 New-PSSession 建立 SSH 连接，然后将会话对象传递给 Copy-Item：


    ```

    > $session = New-PSSession linuxhostname -Username kofler

    > Copy-Item localfile /home/kofler/somesubdir -ToSession $session

    > Remove-PSSession $session

    ```


    请注意，以这种方式使用 `Copy-Item` 时，必须始终指定绝对路径。（相比之下，`scp` 自动相对于 SSH 连接账户的主目录工作。）


    ### 12.3.2 rsync


    Linux 和 macOS 计算机可以通过 `rsync` 同步目录，这既适用于本地目录，也适用于可通过 SSH 访问的远程计算机上的目录。在这种情况下，基本语法与
    `scp` 完全相同；也就是说，只需将 `scp` 替换为 `rsync`。（你可以通过许多额外的选项来控制 `rsync` 的详细行为，但本书不会详细介绍。请使用
    `man rsync` 查阅手册。）


    与 `scp` 相比，存在三个主要区别：


    - `rsync` 命令/包必须在本地计算机和外部计算机上都安装。仅有 SSH 客户端或服务器是不够的。

    - `rsync` 会检查哪些文件已经传输过，只复制新的或更改过的文件。对于大型目录树，这种方法（确实）节省了大量时间。

    - `rsync` 还可以删除文件和目录，从而同步删除操作。由于此操作也可能导致数据丢失，你必须使用 `--delete` 选项显式启用此行为。


    > **rsync 和 Windows**


    `rsync` 在 Windows 上不可用。使用 `rsync` 最简单的方法是通过 *Windows Subsystem for Linux (WSL)*。安装发行版后，你可以在
    WSL 内轻松地在客户端使用 `rsync`，从而访问所有 Windows 文件。


    `rsync` 的一个好（但不兼容 SSH）的替代方案是 `robocopy` 命令，我将在关于备份的 [第 15 章](#) 中介绍。


    ## 12.4 使用密钥进行 SSH 认证


    SSH 服务器支持多种不同的认证方法：最常见的是本章到目前为止使用的密码登录。替代方案包括双因素认证（2FA）和使用密钥的 SSH 认证，我将在本节讨论。这种类型的认证需要一些可以快速完成的准备工作。结果是，`ssh`
    或 `scp` 可以在没有密码的情况下使用，这对于在脚本中实现自动化非常理想。'
