    > mkdir C:\Users\kofler\Documents\PowerShell\Modules\MyModule

    > Copy-Item MyModule.psm1 `

    C:\Users\kofler\Documents\PowerShell\Modules\MyModule

    ```


    If required, you can also extend `PSModulePath` with additional directories in
    the system settings.


    > **mkdir or New-Item?**


    The `mkdir` command we used earlier does not correspond to the typical appearance
    of cmdlets. In fact, the quasi-official way to create a directory is `New-Item
    -ItemType "directory" -Name mydir`. But even Microsoft has realized that this
    is going too far. For this reason, the `mkdir` function is available, which calls
    `New-Item` and passes the necessary options.


    > **Loading Modules Automatically**


    If the functions you program are so important that you want to use them in every
    PowerShell session, you should include `Import-Module` into your profile file.
    The easiest way to open this PowerShell initialization file is to use `<editor>
    $PROFILE` in your favorite editor. If you have VS Code installed, the command
    is `code $PROFILE`.


    # 4.12.2 Modules for Experts


    To make your modules behave like full-fledged cmdlets as much as possible, many
    optimization options are available, but I will only hint at them briefly here:'
