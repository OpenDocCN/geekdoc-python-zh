    On Windows, the `ssh`, `scp`, and `ssh-keygen` commands are available, but `ssh-copy-id`
    is missing. This omission has a simple reason: `ssh-copy-id` is not a compiled
    program, but a Bash script. Thus, a port to Windows would require more effort.
    Fortunately, not a problem: You can copy the public component of the key manually
    to the server and add it to the `.ssh/authorized_keys` file in the home directory
