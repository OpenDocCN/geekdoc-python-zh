    # 20.1.3 Getting Started


    aws commands usually consist of three parts: the main `aws` command; the name
    of an AWS service (e.g., `s3` or `ec2`); and finally, a subcommand for that service.
    To determine which buckets you can access in your configuration, you want to run
    the following command:


    ```

    $ aws s3 ls


    2020-06-23 00:40:38 my.bucket.name

    2022-12-12 02:51:07 my.bucket.othername

    ```


    If you pass `s3://<bucketname>` as another parameter to `ls`, `aws` displays the
    files in that bucket:


    ```

    $ aws s3 ls s3://my.bucket.name


    2023-12-15 11:11:53    61431 test.txt

    2023-03-22 15:23:01    61431 test2.txt

    ```


    By using `aws s3 cp`, you can copy a local file to a bucket, or vice versa:


    ```

    $ aws s3 cp local-file.txt s3://my.bucket.name

    $ aws s3 cp s3://my.bucket.name/local-file.txt copy.txt

    ```


    Besides `cp`, you should be familiar with some other subcommands from your work
    in Bash, such as `mv` or `rm`. Many commands know the `--recursive`, `--include
    ''pattern''`, and `--exclude ''pattern''` options, where pattern supports the
    `?` and `*` characters, among others. The characters have the same meaning as
    in Bash (see Table 3.3 in Chapter 3, Section 3.8), not as in regular expressions.


    Note that S3 buckets are aware of the concept of directories only with limitations.
    Although the name of a file stored in the bucket may be composed of several parts
    (dir1/dir2/file), there is no way to create a directory via `mkdir` or to delete
    a directory using `rmdir`.


    One of the most important AWS S3 commands is `aws s3 sync`. This command allows
    you to synchronize a local directory and a directory in a bucket. This command
    is extremely useful especially for backups: For example, if a complete backup
    of your data is stored in a local directory, you can create redundancy with a
    regularly executed'
