  md: "For all cmdlets used in this listing, aliases or functions are available that\
    \ allow for the completion of these actions with less typing. Since I recommend\
    \ avoiding these short-hand notations in your own scripts, I always use the original\
    \ cmdlet name in all further examples in this chapter.\n\n```\n> cd          \
    \      # cd is an alias for Set-Location\n> pwd               # pwd is an alias\
    \ for Get-Location\n> md subdir         # md is an alias for the mkdir function\n\
    > cd subdir\n> cd ..\n> rmdir subdir      # rmdir is an alias for Remove-Item\n\
    ```\n\nNew-Item also enables you to create a group of nested directories. Although\
    \ directories are separated by \\ in Windows, cmdlets also accept / as the directory\
    \ separator.\n\n```\n> New-Item -ItemType \"directory\" images\\2023\\12\n> New-Item\
    \ -ItemType \"directory\" images/2023/12  # equivalent\n```\n\n# 7.1.1 Listing,\
    \ Copying, Moving, and Deleting Files\n\nIn the following listing, the tst directory\
    \ is created first. In that directory, the current time is stored in the now.txt\
    \ file. This file is copied first, then the copy is renamed. Get-ChildItem lists\
    \ the text files that now exist. Remove-Item cleans up again at the end.\n\n```\n\
    \                                # creates the tst directory\n> New-Item -ItemType\
    \ \"directory\" tst\n> Set-Location tst              # changes there\n> Get-Date\
    \ > now.txt             # saves date and time\n                              \
    \  # to now.txt\n> Copy-Item now.txt copy.txt     # creates a copy of now.txt\n\
    > Move-Item copy.txt backup.txt  # renames the copy\n> Get-ChildItem *.txt   \
    \         # lists all *.txt files\n```\n\nMode    LastWriteTime         Length\
    \ Name\n----    -------------         ------ ----\n-a---   24.01.2023 12:29  \
    \       40 backup.txt\n-a---   24.01.2023 12:29         40 now.txt\n\n```\n> Remove-Item\
    \ *.txt              # deletes all *.txt files\n```\n\nNote that files or directories\
    \ that are deleted using Remove-Item do not go to the recycle bin but are instead\
    \ irrevocably deleted!\n\nTo test whether a file exists, you can use Test-Path.\
