- img_proc: true
  md: '```

    Windows> scp .ssh/id_rsa.pub name@host:

    Windows> ssh name@host


    host$ mkdir .ssh

    host$ touch .ssh/authorized_keys

    host$ cat id_rsa.pub >> .ssh/authorized_keys

    host$ chmod 700 .ssh

    host$ chmod 600 .ssh/authorized_keys

    ```


    The `mkdir` and `touch` commands are only necessary if the `.ssh/authorized_keys`
    file does not yet exist. `cat` adds the key (which is simply a few lines of text
    with a hexadecimal code) to the end of this file. The two `chmod` commands ensure
    that the access rights for the `.ssh` directory and the `authorized_keys` file
    are correct; otherwise, the file will be ignored by the SSH server.


    If the SSH server runs the SELinux security system, as is common on Fedora, Red
    Hat, and so on, you must also ensure that the SELinux context is correct:


    ```

    host$ restorecon -R -v .ssh

    ```


    Finally, in the terminal of your Windows computer, you must ensure that the SSH
    connection setup via `ssh user@host` now works without a password.


    # 12.5 Example: Uploading Images to a Linux Web Server


    The goal of this first example is to use a script to upload all new or modified
    images from a local directory via `scp` to an appropriately prepared directory
    on a web server.


    # 12.5.1 Preparatory Measures


    In this example, I assume that the web server is running on Ubuntu Linux and that
    the image directory is to be embedded in an existing WordPress installation. In
    principle, of course, the example also works without WordPress and for any other
    distribution. However, you may need to adjust paths and, for Red Hat-based distributions,
    make sure that the SELinux context of the image directory is set correctly.


    Image upload should be allowed to multiple users/accounts. For this reason, the
    `imageupload` group is created on the server. All users who are allowed to upload
    will be added to this group.


    In addition, the `myimages` directory is created on the server. `chown` assigns
    this directory to the `www-data` user (which is the system account of the web
    server in Debian and Ubuntu) and also to the `imageupload` group. The `chmod`
    command causes all members of the `imageupload` group to be allowed to work, read,
    and write in the directory and that newly uploaded files are automatically assigned
    to this group.'
