    \ of the program.\n\n```\ndef f1():\n    global z\n    z = z + 3\n\nz = 3\nf1()\n\
    print(z)        # Output 6\n```\n\nIn practice, you should avoid the `global`\
    \ keyword as it leads to cluttered code. A better approach is to return the function\
