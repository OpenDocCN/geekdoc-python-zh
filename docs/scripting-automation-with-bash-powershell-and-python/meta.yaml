  - "[PAGE 166]\n\n# 5.6.5 Formatting Outputs\n\nOften, you need to create strings\
    \ from numbers, dates, times, etc. In the simplest case, you can use the `str(x)`\
    \ or `repr(x)` functions, which represent any object as a string. The `repr` function\
    \ proceeds in such a way that the resulting string can be read again using `eval`.\
    \ `str`, on the other hand, strives to format the strings so that they are easily\
    \ readable by humans. Both functions do not influence the formatting. If you want\
    \ to format numbers as right justified or with a thousands separator, then you\
    \ need special formatting functions. In Python, you can choose between several\
    \ procedures. The most commonly used ones are the `%` operator and the `format`\
    \ method:\n\n+   - **format string % (data, data, data)**\n  In this case, the\
    \ format string is formulated in the syntax of the `printf` function of the C\
    \ programming language. Within this string, `%` characters indicate the positions\
    \ where data is to be inserted.\n\n- **formatstring.format(data, data, data)**\n\
    \  The structure of the string has great similarities with the structure of the\
    \ method of the same name in Microsoft's .NET framework. Within this string, `{}`\
    \ bracket pairs indicate the position of the parameters.\n\nLet's first look at\
    \ two examples of the `%` method:\n\n```\n>>> '1/7 with three decimal places:\
    \ %.3f' % (1/7)\n'1/7 with three decimal places: 0.143'\n\n>>> '<img src=\"%s\"\
    \ alt=\"%s\" width=\"%d\">' % ('foto.jpg', 'Portrait', 200)\n'<img src=\"foto.jpg\"\
    \ alt=\"Portrait\" width=\"200\">'\n```\n\nThe biggest advantage of the newer\
    \ `format` method is that you can freely choose the placeholder order via `{n}`\
    \ or `{parameter name}`. The following examples illustrate the resulting options:\n\
    \n```\n>>> '{} is {} years old.'.format('Peter', 9)\n'Peter is 9 years old.'\n\
    \n>>> '{1} is {0} years old.'.format(9, 'Peter')\n'Peter is 9 years old.'\n\n\
    >>> '{name} is {age} years old.'.format(age=9, name='Peter')\n'Peter is 9 years\
    \ old.'\n\n>>> '1/7 with three decimal places: {:.3f}'.format(1/7)\n'1/7 with\
    \ three decimal places: 0.143'\n\n>>> 'SELECT * FROM table WHERE id={:d}'.format(324)\n\
    'SELECT * FROM table WHERE id=324'\n```"
