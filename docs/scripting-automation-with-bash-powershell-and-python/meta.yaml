  - "[PAGE 94]\n\n```\n# Process text file line by line\nwhile read line; do\n   \
    \ echo $line\ndone < access.log\n```\n\nAs an alternative, you can create a list\
    \ via `$(cat file)` and then process it using `for`. This procedure is recommended\
    \ only for small text files. In the loop, the list is split at each space, tab,\
    \ or line separator. The text is thus processed word by word.\n\n```\n# Process\
    \ text file word by word,\n# Word separation at ' ', \\t and \\n\nfor word in\
    \ $(cat words.txt); do\n    echo $word\ndone\n```\n\nThe points at which `for`\
    \ splits the `cat` output into words are controlled by the `IFS` environment variable\
    \ (internal field separator). In the following example, I have set `:` as a separator.\
    \ In addition, the line break is *always* considered a separator. After the loop,\
    \ the original state of `IFS` is restored.\n\n```\n# Process text file word by\
    \ word, word separation at : and \\n\nOLDIFS=$IFS\nIFS=':'\nfor word in $(cat\
    \ words.txt); do\n    echo $word\ndone\nrestore IFS=$OLDIFS  # IFS\n```\n\n# 3.13\
    \ Functions\n\nThe `function` keyword defines a function that can be called in\
    \ the script like a command. The code of the function must be enclosed in curly\
    \ brackets. Functions must be declared *before* they are called for the first\
    \ time and are therefore often placed at the beginning of the script.\n\nParameters\
    \ can be passed to functions. Unlike many programming languages, the parameters\
    \ are not enclosed in parentheses. Within the function, the parameters can be\
    \ taken from the `$1`, `$2`, etc. variables. A function processes parameters in\
    \ the same way that the script processes *command-line arguments*. The following\
    \ mini-script outputs *Hello World, Bash!*\n\n```\n#!/bin/bash\nfunction myfunc\
    \ {\n    echo \"Hello World, $1!\"\n}\nmyfunc \"Bash\"\n```"
  - "[PAGE 95]\n\nThe `function` keyword is optional. If you omit `function`, however,\
    \ the function name must be followed by parentheses. Thus, the following function\
    \ is equivalent to the previous example:\n\n```\nmyfunc() {\n    echo \"Hello\
    \ World, $1!\"\n}\n```\n\nBash functions help you to clearly structure the code.\
    \ You can also swap out blocks of code that are needed more than once, thus avoiding\
    \ redundancy.\nUsing `return`, you leave a function prematurely. No option exists\
    \ to return data. However, you can of course perform outputs via `echo` or change\
    \ variables.\n\n# 3.13.1 Local Variables\n\nUsually, all variables are “shared”\
    \ throughout the script, so they are also accessible in functions and can be changed\
    \ there. The `local` keyword provides the option to define local variables.\n\n\
    ```\nfunction myfunc {\n    a=4\n    local b=4\n}\n\na=3; b=3\nmyfunc\necho \"\
    $a $b\" # output 4 3\n```\n\n# 3.14 Error Protection\n\nBash has a decidedly casual\
    \ way of dealing with errors: If a command in a script triggers an error, Bash\
    \ simply continues the script with the next statement! This strange strategy has\
    \ to do with the fact that the return code of many commands often does not indicate\
    \ real errors at all, but merely that a condition was not met or that when searching\
    \ for a file it was not found. This occurrence does not necessarily have to be\
    \ a “real” error.\nHowever, some exceptions exist. In case of obvious syntax errors,\
    \ for instance, if quotes or brackets are missing or control structures are incomplete\
    \ (no `fi` for `if`), the script will not be started at all.\n\n# 3.14.1 Detecting\
    \ Errors\n\nThe return code of each command is stored in `$?`. The value 0 means\
    \ that everything is OK. Any other number indicates an error."
