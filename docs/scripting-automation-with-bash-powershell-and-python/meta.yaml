    \ I used the `urllib` Python module, which is available by default, so it doesn't\
    \ need to be installed using `pip`. The application of this module is rather cumbersome:\
    \ First, you must create a `Request` object. Then, you'll pass this object to\
    \ the `urlopen` method and get a `Response` object. The `read` method of that\
    \ object gives you the data returned by the server in binary format, which you\
    \ finally convert to a UTF-8 string by using `decode`.\n\nIn my tests, I discovered\
    \ that `https://calendarific.com` denies requests from Python. (A request executed\
    \ using `curl` with the same URL, on the other hand, works.) Presumably the operators\
    \ of Calendarific want you to use the `python-calendarific` module, but I wanted\
    \ to avoid that for didactic reasons. Instead, I used the `headers` parameter\
    \ to override the default header and thus outsmart Calendarific.\n\nFrom the point\
    \ of view of this chapter, the last few lines of the script are the most exciting\
    \ ones. `json.loads(txt)` turns the JSON document into a Python object tree. `data['response']['holidays']`\
    \ returns a list of `holiday` dictionaries, which are then evaluated in a loop.\
    \ As you can see, once the hurdles of downloading are overcome, the JSON analysis\
    \ is rather easy to perform.\n\n```\n# Sample file holidays.py\n# perform web\
    \ request\nquery = \"https://calendarific.com/api/v2/\n         holidays?api_key=%s&country=%s&year=%s\"\
    \nurl = query % (api_key, country, year)\nreq = urllib.request.Request(url,\n\
    \                            headers={\"User-Agent\": \"curl\"})\nresponse = urllib.request.urlopen(req)\n\
    txt = response.read().decode(\"utf-8\")\n\n# analysis of JSON data\ndata = json.loads(txt)\n\
    ```"
