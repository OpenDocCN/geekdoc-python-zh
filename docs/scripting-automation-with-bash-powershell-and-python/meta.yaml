- md: "## 19.3 Storing Exif Metadata in a Database\n\nIn Chapter 16, Section 16.3,\
    \ I described a Python script that extracts Exif metadata from photos in the current\
    \ directory and generates SQL commands with corresponding INSERT commands. The\
    \ SQL commands could be saved to a file via output redirection and later applied\
    \ to a database (for example, using the `mysql` command).\n\nBut a much more elegant\
    \ approach is if the script establishes a database connection and stores the metadata\
    \ directly in the database. This approach avoids the detour with a SQL file. For\
    \ the following example, I assume that the database is managed by a MySQL server\
    \ and that the `photos` table exists there. The `CREATE TABLE` command documents\
    \ the structure of the table:\n\n```sql\nCREATE TABLE photos(\n    id INT NOT\
    \ NULL PRIMARY KEY AUTO_INCREMENT,\n    name VARCHAR(255) NOT NULL,\n    size\
    \ INT,\n    orientation INT,\n    datetimeoriginal DATETIME,\n    latitude DOUBLE,\n\
    \    longitude DOUBLE,\n    altitude DOUBLE,\n    -- ts contains the date and\
    \ time of the last change\n    ts TIMESTAMP NOT NULL DEFAULT CURRENT_TIMESTAMP()\n\
    \        ON UPDATE CURRENT_TIMESTAMP()\n);\n```\n\n### 19.3.1 PyMySQL\n\nSeveral\
    \ Python modules are available for accessing MySQL or MariaDB databases, but I\
    \ want to focus on PyMySQL in this section. The module is easy to install, is\
    \ easy to use, and has proven itself in my work. You can find more information\
    \ about alternative MySQL or database modules at the following links:\n\n- https://stackoverflow.com/questions/372885\n\
    - https://wiki.openstack.org/wiki/PyMySQL_evaluation\n\nAs usual, PyMySQL must\
    \ be installed using pip:\n\n```\n$ pip install requests (Windows, Linux)\n$ pip3\
    \ install requests (macOS, old Linux distributions)\n```\n\nWhen you establish\
    \ a connection using `connect`, you need to specify the hostname of the server\
    \ (`localhost` if the database server is running on the same machine as your script),\
    \ the username, password, and the name of the database you want to access.\n\n\
    MySQL and MariaDB support various UTF-8 variants. For the interaction with Python,\
    \ `utf8mb4` is the best solution. The `cursorclass` parameter controls the way\
    \ PyMySQL returns `SELECT` results. The `DictCursor` cursor type wraps each data\
    \ record in a dictionary, using the column names as keys. This facilitates further\
    \ processing of the results.\n\nEach time you want to run a SQL command, you need\
    \ a cursor object. I recommend using such cursors with `with` because, in this\
    \ way, you can ensure that you release the objects as soon as possible and do\
    \ not block unnecessary resources.\n\nThe string with the SQL command must then\
    \ be passed to the `execute` method. The command can contain any number of `%s`\
    \ codes. `execute` replaces them with strings from the tuple, list, or dictionary\
    \ passed in the second parameter. Note that no other codes are allowed here, such\
    \ as `%d` for numbers, for example. If you want to store `NULL`, you must use\
    \ the Python keyword `None`.\n\n```python\n# Sample file hello-pymysql.py\nconn\
    \ = pymysql.connect(host='localhost',\n                       user='username',\n\
    \                       password='topsecret',\n                       db='dbname',\n\
    \                       port=3306,\n                       charset='utf8mb4',\n\
    \                       cursorclass=pymysql.cursors.DictCursor)\n```\n\n```python\n\
    # read entries from the 'photos' table\nwith conn.cursor() as cur:\n    sql =\
    \ 'SELECT * FROM photos WHERE id < %s'\n    cur.execute(sql, (1000))\n    while\
    \ row := cur.fetchone():\n        print(row)\n```\n\nUsing `execute`, you can\
    \ also run `INSERT`, `UPDATE`, or `DELETE` commands. `commit` completes the transaction.\
    \ You can then get the ID number of the new record from the `lastrowid` property.\n\
    \n```python\nsql = '''INSERT INTO photos (name, size, orientation)\n        VALUES\
    \ (%s, %s, %s)'''\nwith conn.cursor() as cur:\n    cur.execute(sql, ('img_1234.jpg',\
    \ 3231283, 0))\n    conn.commit()\n    print('ID of new record:', cur.lastrowid)\n\
    ```\n\nIf your script continues to run once the database operations are complete,\
    \ you should close the database connection:\n\n```python\nconn.close()\n```\n\n\
    More details on how to use PyMySQL can be found in the project documentation:\
    \ https://pymysql.readthedocs.io.\n\n### 19.3.2 Saving Exif Metadata\n\nI have\
    \ already explained how you can analyze the Exif data embedded in the image files\
    \ of photos in Python using a script in Chapter 16, Section 16.3. At this point,\
    \ it's just a matter of storing the metadata directly in a database. For this\
    \ purpose, a database connection must be established at the beginning of the script.\
    \ After that, all image files are run through in a loop.\n\n```python\n# Sample\
    \ file exif-to-mysql.py (shortened)\nimport ...\n# establish connection\nconn\
    \ = pymysql.connect(host='localhost', ...)\n\n# consider only the following EXIF\
    \ keys\nkeys = ['File:FileName', 'File:FileSize', ...]\n\n# analyze parameters\
    \ (sys.argv)\nfilenames = ...\n\n# INSERT command\nsql = '''INSERT INTO photos\
    \ (name, size, orientation,\n            datetimeoriginal, latitude, longitude,\
    \ altitude)\n    VALUES (%s, %s, %s, %s, %s, %s, %s)'''\n\n# connect to exiftool\
    \ command, DB cursor\nwith exiftool.ExifToolHelper() as exifhelper, \\\n    conn.cursor()\
    \ as cur:\n\n    # loop through all files\n    for file in filenames:\n      \
    \  # collect EXIF data in list\n        results = []\n        try:\n         \
    \   metadata = exifhelper.get_tags(file, keys)[0]\n            for key in keys:\n\
    \                if key in metadata:\n                    if key == 'EXIF:DateTimeOriginal':\n\
    \                        # adapt date to ISO syntax\n                        date\
    \ = str(metadata[key])\n                        results += [ date.replace(':',\
    \ '-', 2) ]\n                    else:\n                        results += [str(metadata[key])]\n\
    \                else:\n                    results += [ None ]   # corresponds\
    \ to NULL\n            # run INSERT\n            cur.execute(sql, results)\n \
    \       except Exception as e:\n            print(\"-- skipped %s\" % (file))\n\
    \n# save all changes (commit)\nconn.commit()\nconn.close()\n```\n\nFor a collection\
    \ of photos to try out the script, see the sample files for [Chapter 14](Chapter\
    \ 14).\n\n## 19.4 Importing JSON Data into a Table\n\nThe starting point for this\
    \ section is the JSON file, *employees.json*, which has the following structure:\n\
    \n```json\n[\n  {\n    \"FirstName\": \"Ruthanne\",\n    \"LastName\": \"Ferguson\"\
    ,\n    \"DateOfBirth\": \"1977-06-04\",\n    \"Street\": \"4 Dewy Turnpike\",\n\
    \    \"Zip\": \"27698\",\n    \"City\": \"Clifton Hill\",\n    \"State\": \"NJ\"\
    ,\n    \"Gender\": \"F\",\n    \"Email\": \"ruthanne_ferguson5693@fastmail.cn\"\
    ,\n    \"Job\": \"Junior Engineer\",\n    \"Salary\": \"5201.45\"\n  }, ...\n\
    ]\n```\n\nA PowerShell script is supposed to process this file and enter the records\
    \ into a table of a SQL Server database. I am assuming that the JSON keys match\
    \ the column names of the table. You can create a suitable table using the following\
    \ command:\n\n```sql\nCREATE TABLE employees(\n    id INT IDENTITY(1, 1) PRIMARY\
    \ KEY,\n    FirstName TEXT NOT NULL,\n    LastName TEXT NOT NULL,\n    DateOfBirth\
    \ DATE,\n    Street TEXT,\n    City TEXT,\n    State CHAR(2),\n    Gender CHAR(1),\n\
    \    Email TEXT,\n    Job TEXT,\n    Salary FLOAT);\n```\n\nThe script uses the\
    \ SQLServer module that we described in Chapter 15, Section 15.3. If you have\
    \ not already done so, you must install the module using Install-Module SQLServer.\n\
    The code starts with the initialization of some variables. Get-Content reads the\
    \ JSON file. ConvertFrom-JSON turns it into an array with PSCustomObjects. The\
    \ outer foreach loop runs through all array elements. The inner loop runs through\
    \ all columns and creates the VALUES part of the INSERT command. The resulting\
    \ commands will look like the following example:\n\n```sql\nINSERT INTO employees\
    \ (FirstName, LastName, DateOfBirth, ...)\nVALUES('Sebastian', 'James', '1953-05-14',\
    \ ...);\n```\n\nThe script relies on the fact that data is available for all columns\
    \ for each data record. If not the case, you must include appropriate tests and,\
    \ if necessary, include NULL in the SQL command.\nFinally, all collected commands\
    \ are passed to SQL Server using Invoke-Sqlcmd."
  mdcn: "## 19.3 在数据库中存储 Exif 元数据\n\n在第 16 章第 16.3 节中，我描述了一个 Python 脚本，该脚本从当前目录的照片中提取\
    \ Exif 元数据，并生成包含相应 INSERT 命令的 SQL 命令。这些 SQL 命令可以通过输出重定向保存到文件中，然后应用于数据库（例如，使用 `mysql`\
    \ 命令）。\n\n但更优雅的方法是让脚本建立数据库连接，并将元数据直接存储在数据库中。这种方法避免了使用 SQL 文件的迂回路径。在接下来的示例中，我假设数据库由\
    \ MySQL 服务器管理，并且那里存在 `photos` 表。`CREATE TABLE` 命令记录了表的结构：\n\n```sql\nCREATE TABLE\
    \ photos(\n    id INT NOT NULL PRIMARY KEY AUTO_INCREMENT,\n    name VARCHAR(255)\
    \ NOT NULL,\n    size INT,\n    orientation INT,\n    datetimeoriginal DATETIME,\n\
    \    latitude DOUBLE,\n    longitude DOUBLE,\n    altitude DOUBLE,\n    -- ts\
    \ contains the date and time of the last change\n    ts TIMESTAMP NOT NULL DEFAULT\
    \ CURRENT_TIMESTAMP()\n        ON UPDATE CURRENT_TIMESTAMP()\n);\n```\n\n### 19.3.1\
    \ PyMySQL\n\n有几个 Python 模块可用于访问 MySQL 或 MariaDB 数据库，但本节我将重点介绍 PyMySQL。该模块易于安装、易于使用，并且在我的工作中已得到验证。你可以在以下链接中找到有关其他\
    \ MySQL 或数据库模块的更多信息：\n\n- https://stackoverflow.com/questions/372885\n- https://wiki.openstack.org/wiki/PyMySQL_evaluation\n\
    \n与往常一样，PyMySQL 必须使用 pip 安装：\n\n```\n$ pip install requests (Windows, Linux)\n\
    $ pip3 install requests (macOS, old Linux distributions)\n```\n\n当你使用 `connect`\
    \ 建立连接时，需要指定服务器的主机名（如果数据库服务器与你的脚本在同一台机器上运行，则为 `localhost`）、用户名、密码以及要访问的数据库名称。\n\
    \nMySQL 和 MariaDB 支持多种 UTF-8 变体。对于与 Python 的交互，`utf8mb4` 是最佳解决方案。`cursorclass`\
    \ 参数控制 PyMySQL 返回 `SELECT` 结果的方式。`DictCursor` 游标类型将每条数据记录包装在一个字典中，使用列名作为键。这有助于进一步处理结果。\n\
    \n每次你想运行 SQL 命令时，都需要一个游标对象。我建议使用带有 `with` 的游标，因为这样可以确保你尽快释放对象，不会阻塞不必要的资源。\n\n\
    然后，必须将包含 SQL 命令的字符串传递给 `execute` 方法。该命令可以包含任意数量的 `%s` 代码。`execute` 会用传递在第二个参数中的元组、列表或字典中的字符串替换它们。请注意，这里不允许使用其他代码，例如用于数字的\
    \ `%d`。如果你想存储 `NULL`，必须使用 Python 关键字 `None`。\n\n```python\n# Sample file hello-pymysql.py\n\
    conn = pymysql.connect(host='localhost',\n                       user='username',\n\
    \                       password='topsecret',\n                       db='dbname',\n\
    \                       port=3306,\n                       charset='utf8mb4',\n\
    \                       cursorclass=pymysql.cursors.DictCursor)\n```\n\n```python\n\
    # read entries from the 'photos' table\nwith conn.cursor() as cur:\n    sql =\
    \ 'SELECT * FROM photos WHERE id < %s'\n    cur.execute(sql, (1000))\n    while\
    \ row := cur.fetchone():\n        print(row)\n```\n\n使用 `execute`，你还可以运行 `INSERT`、`UPDATE`\
    \ 或 `DELETE` 命令。`commit` 完成事务。然后你可以从 `lastrowid` 属性获取新记录的 ID 号。\n\n```python\n\
    sql = '''INSERT INTO photos (name, size, orientation)\n        VALUES (%s, %s,\
    \ %s)'''\nwith conn.cursor() as cur:\n    cur.execute(sql, ('img_1234.jpg', 3231283,\
    \ 0))\n    conn.commit()\n    print('ID of new record:', cur.lastrowid)\n```\n\
    \n如果你的脚本在数据库操作完成后继续运行，你应该关闭数据库连接：\n\n```python\nconn.close()\n```\n\n有关如何使用 PyMySQL\
    \ 的更多详细信息，请参阅项目文档：https://pymysql.readthedocs.io。\n\n### 19.3.2 保存 Exif 元数据\n\n\
    我已经在第 16 章第 16.3 节中解释了如何使用脚本在 Python 中分析嵌入在照片图像文件中的 Exif 数据。此时，只需将元数据直接存储在数据库中即可。为此，必须在脚本开头建立数据库连接。之后，在循环中遍历所有图像文件。\n\
    \n```python\n# Sample file exif-to-mysql.py (shortened)\nimport ...\n# establish\
    \ connection\nconn = pymysql.connect(host='localhost', ...)\n\n# consider only\
    \ the following EXIF keys\nkeys = ['File:FileName', 'File:FileSize', ...]\n\n\
    # analyze parameters (sys.argv)\nfilenames = ...\n\n# INSERT command\nsql = '''INSERT\
    \ INTO photos (name, size, orientation,\n            datetimeoriginal, latitude,\
    \ longitude, altitude)\n    VALUES (%s, %s, %s, %s, %s, %s, %s)'''\n\n# connect\
    \ to exiftool command, DB cursor\nwith exiftool.ExifToolHelper() as exifhelper,\
    \ \\\n    conn.cursor() as cur:\n\n    # loop through all files\n    for file\
    \ in filenames:\n        # collect EXIF data in list\n        results = []\n \
    \       try:\n            metadata = exifhelper.get_tags(file, keys)[0]\n    \
    \        for key in keys:\n                if key in metadata:\n             \
    \       if key == 'EXIF:DateTimeOriginal':\n                        # adapt date\
    \ to ISO syntax\n                        date = str(metadata[key])\n         \
    \               results += [ date.replace(':', '-', 2) ]\n                   \
    \ else:\n                        results += [str(metadata[key])]\n           \
    \     else:\n                    results += [ None ]   # corresponds to NULL\n\
    \            # run INSERT\n            cur.execute(sql, results)\n        except\
    \ Exception as e:\n            print(\"-- skipped %s\" % (file))\n\n# save all\
    \ changes (commit)\nconn.commit()\nconn.close()\n```\n\n有关用于试用脚本的照片集合，请参阅[第 14\
    \ 章](Chapter 14)的示例文件。\n\n## 19.4 将 JSON 数据导入表\n\n本节的起点是 JSON 文件 *employees.json*，其结构如下：\n\
    \n```json\n[\n  {\n    \"FirstName\": \"Ruthanne\",\n    \"LastName\": \"Ferguson\"\
    ,\n    \"DateOfBirth\": \"1977-06-04\",\n    \"Street\": \"4 Dewy Turnpike\",\n\
    \    \"Zip\": \"27698\",\n    \"City\": \"Clifton Hill\",\n    \"State\": \"NJ\"\
    ,\n    \"Gender\": \"F\",\n    \"Email\": \"ruthanne_ferguson5693@fastmail.cn\"\
    ,\n    \"Job\": \"Junior Engineer\",\n    \"Salary\": \"5201.45\"\n  }, ...\n\
    ]\n```\n\n一个 PowerShell 脚本应该处理此文件，并将记录输入到 SQL Server 数据库的表中。我假设 JSON 键与表的列名匹配。你可以使用以下命令创建一个合适的表：\n\
    \n```sql\nCREATE TABLE employees(\n    id INT IDENTITY(1, 1) PRIMARY KEY,\n  \
    \  FirstName TEXT NOT NULL,\n    LastName TEXT NOT NULL,\n    DateOfBirth DATE,\n\
    \    Street TEXT,\n    City TEXT,\n    State CHAR(2),\n    Gender CHAR(1),\n \
    \   Email TEXT,\n    Job TEXT,\n    Salary FLOAT);\n```\n\n该脚本使用我们在第 15 章第 15.3\
    \ 节中描述的 SQLServer 模块。如果你尚未执行此操作，则必须使用 Install-Module SQLServer 安装该模块。\n代码以初始化一些变量开始。Get-Content\
    \ 读取 JSON 文件。ConvertFrom-JSON 将其转换为包含 PSCustomObjects 的数组。外部 foreach 循环遍历所有数组元素。内部循环遍历所有列并创建\
    \ INSERT 命令的 VALUES 部分。生成的命令将如下例所示：\n\n```sql\nINSERT INTO employees (FirstName,\
    \ LastName, DateOfBirth, ...)\nVALUES('Sebastian', 'James', '1953-05-14', ...);\n\
    ```\n\n该脚本依赖于每条数据记录的所有列都有可用数据这一事实。如果不是这种情况，你必须包含适当的测试，并在必要时在 SQL 命令中包含 NULL。\n\
    最后，所有收集的命令都通过 Invoke-Sqlcmd 传递给 SQL Server。"
