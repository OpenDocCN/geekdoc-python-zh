    Instead of maintaining the file manually, you can also use the `pipreqs` command.
    This command evaluates the `import` statements of all Python files in a directory,
    determines which versions of the modules are currently installed, and then creates
    the appropriate file. `pipreqs` is itself a module that must be installed via
    `pip install pipreqs` before its first use.


    ```

    $ pipreqs code/directory

    ```


    Once `requirements.txt` exists, you can easily install all the modules listed
    within it with the following command:


    ```

    $ pip install -r requirements.txt

    ```


    # 5.18.6 pipenv


    If you develop various Python projects on your computer, which need different
    add-on modules, pip can lead you directly into chaos, if you''re unlucky. Quickly,
    which modules are required for which scripts becomes unclear. You''ll notice this
    problem easily whenever you try to run your scripts on another computer. In rare
    cases, installing modules in parallel or performing module updates for multiple
    projects can lead to conflict: A script that was working fine before may suddenly
    report strange errors.


    You can avoid such trouble by using a virtual environment (Section 5.18.4). Manually
    managing such environments is difficult, however. Instead, you can use `pipenv`
    to organize your project in a separate directory and manage the required modules.
    First, install this tool:


    ```

    $ pip install --user pipenv          (Windows, macOS)

    $ sudo apt install pipenv           (Debian, Ubuntu)

    ```


    In the directory of your project, you should use `pipenv`, instead of `pip`, to
    install the required modules:


    ```

    $ cd my-project

    $ pipenv install requests beautifulsoup4


    Creating a virtualenv for this project...

    Pipfile: /home/kofler/my-project/Pipfile

    Creating virtual environment, virtualenv location:

    ```'
