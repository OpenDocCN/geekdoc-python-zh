    \ para2, para3):\n    code\n```\n\nSome rules for programming and using functions\
    \ include the following:\n\n+   - Functions must be defined before they can be\
    \ used. As a result, a common practice is to define all functions first and then\
    \ specify the rest of the code. The execution of the code thus begins in the first\
