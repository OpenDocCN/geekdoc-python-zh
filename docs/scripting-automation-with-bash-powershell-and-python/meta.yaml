    > **Avoid Multiple Installations!**

    Installing Python on Windows is quite easy—and that’s where the problem lies:
    The Microsoft Store, development environments, editors, and so on are always happy
    to help you install the latest Python version, which can easily result in two
    or three versions installed in parallel. At first glance, everything seems to
    work until you try to install an extension module using pip. Although pip won’t
    report any error, Python won’t be able to find the module. The cause is trivial:
    The pip version you’re calling is from a different Python version than the one
    you’re currently using—most likely because the older version is preferred in the
    PATH environment variable.

    Trying to solve the resulting problems has already driven me (and more often my
