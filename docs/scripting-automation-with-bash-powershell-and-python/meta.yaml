    Bash 的安装仅在 Windows 上比较困难。在本节中，我们将介绍在 Windows 上使用 Bash 的不同方法。所有这些选项都有其优点和缺点。但让我先说明一点：没有哪种变体是真正理想的。


    ### 3.2.1 在虚拟机中使用 Bash


    使用 Bash 最直接的方法可能是在虚拟化程序（即 Oracle VM VirtualBox、VMWare 或 Microsoft Hyper-V）中安装一个常见的
    Linux 发行版（例如 Ubuntu）。在虚拟机内部，你就可以在终端窗口中使用 Bash。


    对于学习 Bash，这个解决方案是理想的。然而，你无法通过脚本访问 Windows 文件系统。例如，如果你开发了一个处理图像文件的脚本，你只能将其应用于 Linux
    文件系统内的文件。（一些虚拟化系统允许你在 Windows 和 Linux 虚拟安装之间共享一个目录。但特别是使用 VirtualBox 时，这个过程相当繁琐。）


    虚拟化解决方案的另一个缺点是，你实际上不再是在 Windows 上工作，而是在 Linux 上工作。你将不得不适应一个不熟悉的桌面环境，并至少稍微了解一点
    Linux 管理。但你确实想学习 Bash，不是吗？（从我个人的角度来看，使用 Linux 是一个优势，而不是劣势。但我并不打算在这里详细阐述 Linux
    的优点。）


    还有一个论点反对虚拟化解决方案：根据我的经验，免费且因此相应流行的 VirtualBox 程序，在用于软件开发的计算机上经常引起麻烦。这个问题源于此类计算机上各种
    Hyper-V 功能处于活动状态。理论上，VirtualBox 应该与之兼容，但在现实中，情况往往并非如此。


    ### 3.2.2 Windows Subsystem for Linux


    在我看来，在 Windows 上使用 Bash 的最佳解决方案由 *Windows Subsystem for Linux* (WSL) 提供。此功能允许在终端窗口中运行
    Linux。这种方法的妙处在于，你可以在 Windows 中访问你的 Linux 文件，同样也可以在 WSL 中轻松访问你的 Windows 文件。（在当前的
    WSL 版本中，你甚至可以在图形模式下运行 Linux。但就我们的目的而言，这完全不是必需的。）


    最新版本的 WSL 可从 Microsoft Store 免费获取。安装后，经过一次强制性的 Windows 重启，你必须再次在 Microsoft Store
    中搜索 *Ubuntu 22.04 LTS*（或从 2024 年 4 月起搜索当时的当前版本 24.04）。安装过程和你的首次启动应该大约需要两分钟。你需要输入两次密码，并且必须确保记住这个密码！当你以后想使用
    `sudo` 安装额外的软件组件时，你会需要它。（除了 Ubuntu，Microsoft Store 中还提供其他发行版，包括 AlmaLinux、Debian、openSUSE
    和 Oracle Linux。使用你最熟悉的那个。）


    随后，你可以随时通过 Windows 终端或 **开始** 菜单（程序名 *Ubuntu n.n*）打开一个 Bash 窗口。


    ![](img/a7fa45d496335c22ffb14c3275e24ffb_51_0.png)


    **图 3.2** 在 Windows 终端窗口中运行 Bash 的 Ubuntu


    在 Bash 内，你可以通过以下路径访问你的 Windows 用户目录（假设你的 Windows 安装在 *C:* 盘）：


    ```

    /mnt/C/Users/<name>

    ```


    反过来，你可以在 Windows 资源管理器中通过侧边栏底部的 **Linux** 条目或通过以下地址找到你的 Linux/Bash 用户目录：


    ```

    \wsl.localhost\Ubuntu-22.04\home\<name>

    ```


    ![](img/a7fa45d496335c22ffb14c3275e24ffb_51_1.png)


    **图 3.3** 在 Windows 资源管理器中轻松访问 Linux 主目录


    ### 3.2.3 Git Bash


