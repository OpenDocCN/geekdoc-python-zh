  - '[PAGE 266]


    # Chapter 9


    # Regular Expressions


    A *regular expression* (regex) is a character string that describes a search pattern
    for searching through text. In this context, specific rules must be followed that
    are not very intuitive. Let''s start right away with an example. The following
    pattern recognizes a date in US format (i.e., mm/dd/yyyy):


    ```

    (0[1-9]|1[0-2])\/(0[1-9]|1\d|2\d|3[01])\/(19|20)\d{2}

    ```


    The pattern accepts months between 01 and 12, days between 01 and 31, and years
    between 1900 and 2099. However, you still cannot verify whether a date is really
    correct, for example, because the pattern also accepts the date 02/30/2023, although
    February can never have 30 days.


    Regular expressions have a relatively high barrier to entry as you must first
    learn and practice the syntax, which will cost at least a few hours of your time.
    But once you''re familiar with regular expressions, there''s an almost infinite
    number of possible ways to apply them—and in all common programming languages.
    Some tasks can also be solved without regular expressions. But if you''re familiar
    with the syntax, regular expressions will lead you more reliably and more quickly
    to your goal while avoiding spaghetti code!


    This chapter starts with the syntax rules, where I consider the most important
    syntax variants—Portable Operating System Interface for Unix (POSIX) Regular Expressions,
    POSIX Extended Regular Expressions (ERE), and Perl Compatible Regular Expressions
    (PCRE). You didn''t expect the same rules to apply to every tool or programming
    language, did you? Don''t worry, the basic rules are always the same, and the
    variations between the regex variants are manageable. In the following sections,
    I will show you how to use regular expressions in Bash scripts (especially in
    the `grep` and `sed` commands), in Python, and in PowerShell through various examples.


    > **Prerequisites for This Chapter**


    Large parts of this chapter apply regardless of your favorite scripting language.
    Only in the language-specific sections will you need basic knowledge of Bash,
    PowerShell, or Python. A logical follow-up after reading this chapter is thus
    [Chapter 17](#) where you''ll again find some application examples as well as
    some hints on the limitations of regular expressions.'
  - "[PAGE 267]\n\n# 9.1 Syntax Rules for Regular Expressions\n\nThe first concepts\
    \ for regular expressions were formulated as early as the 1950s. Over time, several\
    \ dialects or syntax variants developed:\n\n+   - **POSIX**\n  Regular expressions\
    \ were first standardized in the Unix environment as *POSIX Regular Expressions*.\n\
    - **ERE**\n  In this extension, references to already processed patterns (called\
    \ *back references*) as well as codes for character classes (e.g., digits and\
    \ letters) were defined, among other things.\n- **PCRE**\n  The script language\
    \ Perl has already passed its zenith, but the syntax for regular expressions valid\
    \ in Perl has established itself as a benchmark. Most popular programming languages\
    \ (like Python and .NET languages including PowerShell, JavaScript, etc.) are\
    \ PCRE-compatible except for a few details.\n  Taken to the extreme, *two* PCRE\
    \ variants exist: simply “PCRE” (since 1997) and “PCRE 2” (since 2015).\n\nIn\
    \ this chapter, I will present regular expressions in an abbreviated way, so I\
    \ won’t discuss some advanced features. Unless I explicitly refer to other dialects,\
    \ I will always refer to PCRE or the great common denominator of all regex variants.\n\
    \nDon’t be put off by the various regex dialects: The comparatively few differences\
    \ among them mainly concern advanced features. In many cases, you can adapt a\
    \ pattern formulated for a particular regex dialect to another dialect.\n\n> **Comparison\
    \ Table**\n\nFor most use cases, the basic knowledge provided in this section\
    \ should be sufficient. However, when you want to use additional special functions,\
    \ language-specific functions, or framework-specific functions, you probably won’t\
    \ be able to avoid looking into the respective documentation. If you’re interested\
    \ in the specific differences, you should search the internet for the “Regular\
    \ Expression Engine Comparison Chart.” The address of this excellent comparison\
    \ site is just as daunting as its content, which is, however, excellently researched:\
    \ https://gist.github.com/CMCDragonkai/6c933f4a7d713ef712145c5eb94a1816.\n\nThe\
    \ differences between PCRE and PCRE 2 are very well summarized on Stack Overflow\
    \ at https://stackoverflow.com/questions/70273084.\n\n# 9.1.1 Characters\n\nIn\
    \ regular expressions, various ways exist to express a single character or a character\
    \ within an entire group. Basically, regular expressions differentiate between\
    \ uppercase"
- md: "## 9.1 Character Classes\n\nand lowercase, although this behavior can often\
    \ be disabled by options depending on the tool or programming language. Thus,\
    \ the `[Hh][ae]llo` expressions corresponds to the strings “Hallo,” “Hello,” “hallo,”\
    \ or “hello,” but not to “HALLO.” The `[0-9a-fA-F]` expression recognizes a hexadecimal\
    \ digit.\n\nNote that `a-z` covers all lowercase letters of the ASCII character\
    \ set, but not special characters such as ä, ö, ü, or ß. You may have to add these\
    \ letters separately, for example, as in `[a-zA-Z-ZäöüßÄÖÜ]`. If the hyphen itself\
    \ is to be an allowed character, you must specify it at the end, such as `[a-zA-Z-]`\
    \ (ASCII lowercase and uppercase plus hyphen).\n\n| Expression | Meaning |\n|---|---|\n\
    | `.` | Any character |\n| `[aeiou]` | a, e, i, o, or u |\n| `[^aeiou]` | Not\
    \ a, e, i, o, or u |\n| `[a-g]` | a to g |\n| `[0-9]` | 0 to 9 |\n| `\\.` | A\
    \ period (in general, \\ must precede various regex special characters so that\
    \ they lose their special meanings) |\n\n**Table 9.1** Codes for Characters\n\n\
    PCRE uses various abbreviations for character classes.\n\n| Expression | Meaning\
    \ |\n|---|---|\n| `\\d` | Digit, equivalent to `[0-9]` |\n| `\\D` | No digit,\
    \ equivalent to `[^0-9]` |\n| `\\s` | Whitespace (space, tab, etc.) |\n| `\\S`\
    \ | No whitespace |\n| `\\w` | Letter or digit, corresponds to `[a-zA-Z0-9_]`\
    \ |\n| `\\W` | Not letter/number |\n\n**Table 9.2** PCRE Codes for Character Classes\n\
    \nIn POSIX Regular Expressions, different codes apply to character classes. Note\
    \ that these codes themselves are again used in square brackets, such as `[[:upper:]]`.\
    \ In this context, you can save space by simply writing `[a-z]`. The `[[:lower:]]äöüß`\
    \ expression recognizes lowercase letters including the German letters ä, ö, ü,\
    \ and ß.\n\n| Expression | Meaning |\n| :--- | :--- |\n| [:upper:] | Uppercase\
    \ letters, corresponds to [A-Z] |\n| [:lower:] | Lowercase letters, corresponds\
    \ to [a-z] |\n| [:alpha:] | Letters, corresponds to [A-Za-z] |\n| [:alnum:] |\
    \ Letters and digits, corresponds to [A-Za-z0-9] |\n| [:word:] | Letters, digits,\
    \ and underscore, like \\w |\n| [:digit:] | Digits, corresponds to [0-9] or \\\
    d |\n| [:xdigit:] | Hexadecimal digits, corresponds to [0-9a-fA-F] |\n| [:punct:]\
    \ | Punctuation marks (\".,;\" etc.) |\n| [:blank:] | Space and tab |\n| [:space:]\
    \ | Space, tab, and newline character |\n| [:cntrl:] | Control characters such\
    \ as Ctrl-C |\n| [:graph:] | Character with graphical equivalent (corresponds\
    \ to [^[:cntrl:]]) |\n\nTable 9.3 POSIX Codes for Character Classes, Must Be Used\
    \ within \"[...]\"\n\n## 9.2 Groups and Alternatives\n\nYou can use () to create\
    \ a group within an expression. Then, within the expression, you can use | to\
    \ formulate alternative patterns, one of which optionally applies. In addition,\
    \ you can access the contents of recognized groups using \\1, \\2, etc. or using\
    \ $1, $2, etc., depending on the regex dialect. Various applications exist for\
    \ this feature, such as detecting repetitions or performing search-and-replace\
    \ operations.\n\nThe following three examples illustrate the use of groups. However,\
    \ I must use + and {1,2} to anticipate the next section, which is about quantifiers.\
    \ + means that the preceding expression must occur once or more often. {1,2} means\
    \ that the preceding expression must occur exactly once or twice.\n\n- **Regular\
    \ expression:** ([1-9]|10|11|12)\n  This expression applies to the numbers 1 through\
    \ 12, but not to 0, not to 01, and not to 13.\n- **Regular expression (for PCRE\
    \ 2):** ([0-9]+) \\1 or ([0-9]+) $1\n  The first part of this expression applies\
    \ to any integer, such as 0, 1, 34, or 789123. In the second part of the pattern,\
    \ this group is referenced again; that is, the same number must be specified again\
    \ after a space.\n\nThe expression applies to the following strings: 123 123,\
    \ 7 7, 456 456, and abc1 1abc, where in the latter case only the 1 1 substring\
    \ is recognized.\nHowever, the expression does not match 123123 (no space) or\
    \ 123 123 (too many spaces).\n\n- **Regular expression:** #([0-9a-fA-F]{1,2})\\\
    1\\1\n  This expression recognizes CSS color codes for gray values. Such color\
    \ codes must be introduced using the # character and may contain three or six\
    \ hexadecimal digits. For the target color to be a gray value, the red, green,\
    \ and blue components must each be equal. The twofold repetition of the first\
    \ group serves this purpose.\n  For example, the expression applies to the following\
    \ color codes: #000, #222222, # ababab, #777 and #777777. The expression does\
    \ not apply to #aabbcc, #abc, #0000 (the wrong number of digits), or 000 (the\
    \ introductory # character is missing).\n  The expression unfortunately fails\
    \ with #aAa. This value is a correct gray value, but a (recognized group) and\
    \ A (first repetition) do not match in terms of uppercase and lowercase.\n\n|\
    \ Expression | Meaning |\n|---|---|\n| ( . . . ) | Everything between ( and )\
    \ forms a group |\n| (abc) | The abc expression as a group |\n| (abc|efg) | Alternatives\
    \ are the abc or efg expressions |\n| \\1, \\2 | Reference to the contents of\
    \ the 1st or 2nd group (POSIX, PCRE) |\n| $1, $2 | Reference to the contents of\
    \ the 1st or 2nd group (PCRE 2) |\n\nTable 9.4 Regular Expression Groups\n\n###\
    \ 9.2.1 Quantifiers\n\nQuantifiers allow you to express how often an expression\
    \ may or must occur. You can apply quantifiers to character ranges or groups.\
    \ Caution: abc+ first means ab, then any number of times c (but at least once).\
    \ If, on the other hand, abc may occur any number of times, you must express this\
    \ using (abc)+.\n\n| Expression | Meaning |\n|---|---|\n| x? | Zero or one time\
    \ the characters described by x |\n| x* | Zero times or more (any number of times)\
    \ |\n| x+ | Once or more (but not zero times!) |\n| x{3} | Exactly three times\
    \ |\n| x{3,5} | Three to five times |\n| x{3,} | At least three times |\n\nTable\
    \ 9.5 Regular Expression Pattern Quantifiers\n\nThe following examples show quantifiers\
    \ are easy to use:\n\n- [a-f]\n  Without a quantifier, this expression requires\
    \ exactly one character a through f.\n- [a-f]?\n  With ?, one of the characters\
    \ or none at all is expected.\n- [a-f]+\n  With +, any number of characters between\
    \ a and f are allowed, but at least one character must be specified. Thus, a,\
    \ aaa, and abcdef are fine. abcx also applies, but the expression includes only\
    \ the first three letters, not the letter x.\n- .*\n  This open pattern allows\
    \ any number of (even zero) arbitrary characters.\n- (abc|efg){4}\n  In this pattern,\
    \ abc or efg must be specified exactly four times. abcabcefgabc would be appropriate,\
    \ but abcefg would not.\n\n### 9.2.2 On Greed (Greedy versus Lazy)\n\nNo, this\
    \ section does not describe human morality or the characteristics of economic\
    \ systems. Rather, greed in this context is a matter of how large the string captured\
    \ by an expression should be. By default, the evaluation of regular expressions\
    \ is greedy; that is, the regex function returns the largest possible matching\
    \ strings.\n\nLet’s assume that the expression is `<.+>`. This expression means\
    \ an HTML tag that starts with < and ends with > is to be recognized. There may\
    \ be any number of characters in between (at least one).\n\nIf you apply this\
    \ expression to the string `<html><body><p>lorem ipsum<p>dolores est`, the result\
    \ is `<html><body><p>lorem ipsum<p>`. In most cases, this match will not meet\
    \ your expectations.\n\nYou’re lucky if the regex functions of your tools are\
    \ PCRE-compliant. Then, you can simply enter a question mark after the quantifier.\
    \ The expression is then analyzed as lazy or non-greedy, that is, as minimalistic\
    \ as possible. The following listing illustrates this:\n\n```\nExpression:   \
    \       <.+?>\n\nText:                <html><body><p>lorem ipsum<p>dolores est\n\
    ```\n\n```\nFirst hit: <html>\nSecond hit: <body>\nThird hit: <p>\nFourth hit:\
    \ <p>\n```\n\nUnfortunately, in the Bash environment, the PCRE syntax is rarely\
    \ an option. Many Unix tools are only POSIX compliant. In such cases, you must\
    \ formulate the expression more precisely. In our example, you describe the inside\
    \ of the HTML tag using `[^>]+` instead of `.+?`. Thus, all characters except\
    \ `>` are allowed inside. The entire expression then reads `<[^>]+>`.\n\n> **Lazy\
    \ Is Efficient**\nYou may have always suspected it, but overeagerness rarely pays\
    \ off. This cannot be said in such a general way for regular expressions, but\
    \ in practice *lazy* expressions are often more efficient. This is especially\
    \ true when a complex pattern is to be applied to a long string because then the\
    \ number of possible cases and the volume of the text to be evaluated will decrease.\n\
    \n> **Regular Expressions and HTML: A Bad Combination!**\nYou should resist the\
    \ temptation to analyze HTML code using regular expressions. This usually goes\
    \ wrong because HTML is not a “regular” language (in the scientific sense). To\
    \ analyze HTML documents, you should use parsers that understand HTML code and\
    \ ideally make a Document Object Model (DOM) from HTML. In Python, for example,\
    \ the `BeautifulSoup` module performs this task. Examples are provided in [Chapter\
    \ 17](#).\n\n### 9.2.3 Alpha and Omega\n\nUntil now, we have ignored the place\
    \ where an expression is detected in the text. You can use the `^` and `$` characters\
    \ to express that the pattern is recognized at the beginning or end of the text.\n\
    \n| Expression | Meaning |\n| :--- | :--- |\n| x | The x expression may occur\
    \ anywhere in the text. |\n| ^x | The expression must occur at the beginning of\
    \ the text. |\n| x$ | The expression must occur at the end of the text. |\n| ^x$\
    \ | The expression must correspond to the entire text. |\n\n**Table 9.6** Position\
    \ of Regular Expressions"
  mdcn: "## 9.1 字符类\n\n以及小写字母，尽管这种行为通常可以通过选项禁用，具体取决于工具或编程语言。因此，`[Hh][ae]llo` 表达式对应字符串\
    \ “Hallo”、“Hello”、“hallo” 或 “hello”，但不对应 “HALLO”。`[0-9a-fA-F]` 表达式识别十六进制数字。\n\n\
    请注意，`a-z` 涵盖 ASCII 字符集的所有小写字母，但不包括 ä、ö、ü 或 ß 等特殊字符。你可能需要单独添加这些字母，例如，如 `[a-zA-Z-ZäöüßÄÖÜ]`。如果连字符本身要作为允许的字符，则必须将其指定在末尾，例如\
    \ `[a-zA-Z-]`（ASCII 小写和大写字母加连字符）。\n\n| 表达式 | 含义 |\n|---|---|\n| `.` | 任意字符 |\n\
    | `[aeiou]` | a、e、i、o 或 u |\n| `[^aeiou]` | 非 a、e、i、o 或 u |\n| `[a-g]` | a 到 g\
    \ |\n| `[0-9]` | 0 到 9 |\n| `\\.` | 句点（通常，\\ 必须放在各种正则表达式特殊字符之前，使其失去特殊含义） |\n\n\
    **表 9.1** 字符代码\n\nPCRE 使用各种缩写来表示字符类。\n\n| 表达式 | 含义 |\n|---|---|\n| `\\d` | 数字，等同于\
    \ `[0-9]` |\n| `\\D` | 非数字，等同于 `[^0-9]` |\n| `\\s` | 空白字符（空格、制表符等） |\n| `\\S`\
    \ | 非空白字符 |\n| `\\w` | 字母或数字，对应 `[a-zA-Z0-9_]` |\n| `\\W` | 非字母/数字 |\n\n**表 9.2**\
    \ PCRE 字符类代码\n\n在 POSIX 正则表达式中，不同的代码适用于字符类。请注意，这些代码本身再次用于方括号内，例如 `[[:upper:]]`。在这种情况下，你可以通过简单地写\
    \ `[a-z]` 来节省空间。`[[:lower:]]äöüß` 表达式识别小写字母，包括德语字母 ä、ö、ü 和 ß。\n\n| 表达式 | 含义 |\n\
    | :--- | :--- |\n| [:upper:] | 大写字母，对应 [A-Z] |\n| [:lower:] | 小写字母，对应 [a-z] |\n\
    | [:alpha:] | 字母，对应 [A-Za-z] |\n| [:alnum:] | 字母和数字，对应 [A-Za-z0-9] |\n| [:word:]\
    \ | 字母、数字和下划线，类似 \\w |\n| [:digit:] | 数字，对应 [0-9] 或 \\d |\n| [:xdigit:] | 十六进制数字，对应\
    \ [0-9a-fA-F] |\n| [:punct:] | 标点符号（“.,;” 等） |\n| [:blank:] | 空格和制表符 |\n| [:space:]\
    \ | 空格、制表符和换行符 |\n| [:cntrl:] | 控制字符，如 Ctrl-C |\n| [:graph:] | 具有图形等效的字符（对应 [^[:cntrl:]]）\
    \ |\n\n表 9.3 POSIX 字符类代码，必须在 “[...]” 内使用\n\n## 9.2 分组与替代\n\n你可以使用 () 在表达式内创建一个分组。然后，在表达式内，你可以使用\
    \ | 来制定替代模式，其中一个模式可选地适用。此外，你可以使用 \\1、\\2 等或 $1、$2 等（取决于正则表达式方言）来访问已识别分组的内容。此功能有多种应用，例如检测重复或执行搜索和替换操作。\n\
    \n以下三个示例说明了分组的使用。但是，我必须使用 + 和 {1,2} 来为下一节（关于量词）做铺垫。+ 表示前面的表达式必须出现一次或多次。{1,2} 表示前面的表达式必须恰好出现一次或两次。\n\
    \n- **正则表达式：** ([1-9]|10|11|12)\n  此表达式适用于数字 1 到 12，但不适用于 0、01 或 13。\n- **正则表达式（适用于\
    \ PCRE 2）：** ([0-9]+) \\1 或 ([0-9]+) $1\n  此表达式的第一个部分适用于任何整数，例如 0、1、34 或 789123。在模式的第二部分中，再次引用此分组；即，在空格后必须再次指定相同的数字。\n\
    \n该表达式适用于以下字符串：123 123、7 7、456 456 和 abc1 1abc，其中在最后一种情况下，仅识别子字符串 1 1。\n但是，该表达式不匹配\
    \ 123123（无空格）或 123 123（空格过多）。\n\n- **正则表达式：** #([0-9a-fA-F]{1,2})\\1\\1\n  此表达式识别用于灰色值的\
    \ CSS 颜色代码。此类颜色代码必须以 # 字符开头，并且可以包含三个或六个十六进制数字。要使目标颜色为灰色值，红色、绿色和蓝色分量必须各自相等。第一分组的两次重复服务于此目的。\n\
    \  例如，该表达式适用于以下颜色代码：#000、#222222、# ababab、#777 和 #777777。该表达式不适用于 #aabbcc、#abc、#0000（数字位数错误）或\
    \ 000（缺少开头的 # 字符）。\n  遗憾的是，该表达式在 #aAa 上失败。此值是正确的灰色值，但 a（已识别的分组）和 A（第一次重复）在大小写方面不匹配。\n\
    \n| 表达式 | 含义 |\n|---|---|\n| ( . . . ) | ( 和 ) 之间的所有内容形成一个分组 |\n| (abc) | abc\
    \ 表达式作为一个分组 |\n| (abc|efg) | 替代项是 abc 或 efg 表达式 |\n| \\1, \\2 | 引用第 1 个或第 2 个分组的内容（POSIX、PCRE）\
    \ |\n| $1, $2 | 引用第 1 个或第 2 个分组的内容（PCRE 2） |\n\n表 9.4 正则表达式分组\n\n### 9.2.1 量词\n\
    \n量词允许你表达一个表达式可能或必须出现的频率。你可以将量词应用于字符范围或分组。注意：abc+ 首先表示 ab，然后是任意次数的 c（但至少一次）。另一方面，如果\
    \ abc 可以出现任意次数，则必须使用 (abc)+ 来表达。\n\n| 表达式 | 含义 |\n|---|---|\n| x? | 零次或一次 x 描述的字符\
    \ |\n| x* | 零次或多次（任意次数） |\n| x+ | 一次或多次（但不是零次！） |\n| x{3} | 恰好三次 |\n| x{3,5} |\
    \ 三到五次 |\n| x{3,} | 至少三次 |\n\n表 9.5 正则表达式模式量词\n\n以下示例展示了量词的易用性：\n\n- [a-f]\n \
    \ 没有量词时，此表达式要求恰好一个 a 到 f 的字符。\n- [a-f]?\n  使用 ?，期望一个字符或没有字符。\n- [a-f]+\n  使用 +，允许任意数量的\
    \ a 到 f 之间的字符，但必须指定至少一个字符。因此，a、aaa 和 abcdef 都可以。abcx 也适用，但表达式仅包含前三个字母，不包含字母 x。\n\
    - .*\n  此开放模式允许任意数量（甚至零个）的任意字符。\n- (abc|efg){4}\n  在此模式中，abc 或 efg 必须恰好指定四次。abcabcefgabc\
    \ 是合适的，但 abcefg 不是。\n\n### 9.2.2 论贪婪（贪婪与懒惰）\n\n不，本节不描述人类道德或经济体系的特征。相反，这里的贪婪是指表达式捕获的字符串应该有多大。默认情况下，正则表达式的评估是贪婪的；即，正则表达式函数返回尽可能大的匹配字符串。\n\
    \n假设表达式是 `<.+>`。此表达式意味着要识别以 < 开头、以 > 结尾的 HTML 标签。中间可以有任意数量的字符（至少一个）。\n\n如果将此表达式应用于字符串\
    \ `<html><body><p>lorem ipsum<p>dolores est`，结果是 `<html><body><p>lorem ipsum<p>`。在大多数情况下，此匹配将不符合你的预期。\n\
    \n如果你的工具的正则表达式函数符合 PCRE，那么你就很幸运。然后，你只需在量词后输入一个问号。该表达式随后被分析为懒惰或非贪婪，即尽可能最小化。以下列表说明了这一点：\n\
    \n```\n表达式：          <.+?>\n\n文本：                <html><body><p>lorem ipsum<p>dolores\
    \ est\n```\n\n```\n第一次匹配：<html>\n第二次匹配：<body>\n第三次匹配：<p>\n第四次匹配：<p>\n```\n\n遗憾的是，在\
    \ Bash 环境中，PCRE 语法很少是一个选项。许多 Unix 工具仅符合 POSIX。在这种情况下，你必须更精确地制定表达式。在我们的示例中，你使用\
    \ `[^>]+` 而不是 `.+?` 来描述 HTML 标签的内部。因此，内部允许除 `>` 之外的所有字符。整个表达式变为 `<[^>]+>`。\n\n\
    > **懒惰是高效的**\n你可能一直怀疑这一点，但过于急切很少有回报。对于正则表达式，不能如此笼统地说，但在实践中，*懒惰*表达式通常更高效。当复杂模式要应用于长字符串时尤其如此，因为这样可能的情况数量和要评估的文本量都会减少。\n\
    \n> **正则表达式和 HTML：糟糕的组合！**\n你应该抵制使用正则表达式分析 HTML 代码的诱惑。这通常会出错，因为 HTML 不是一种“正则”语言（在科学意义上）。要分析\
    \ HTML 文档，你应该使用理解 HTML 代码的解析器，并且最好从 HTML 构建文档对象模型（DOM）。例如，在 Python 中，`BeautifulSoup`\
    \ 模块执行此任务。示例见[第 17 章](#)。\n\n### 9.2.3 始与终\n\n到目前为止，我们忽略了表达式在文本中被检测到的位置。你可以使用\
    \ `^` 和 `$` 字符来表达模式在文本的开头或结尾被识别。\n\n| 表达式 | 含义 |\n| :--- | :--- |\n| x | x 表达式可以出现在文本中的任何位置。\
    \ |\n| ^x | 表达式必须出现在文本的开头。 |\n| x$ | 表达式必须出现在文本的结尾。 |\n| ^x$ | 表达式必须对应整个文本。 |\n\
    \n**表 9.6** 正则表达式的位置"
