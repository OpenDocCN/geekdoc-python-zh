    sqlexpress01\" # SQL Server instance\n\n# loop through all databases\nforeach($db\
    \ in Get-Content $dblist) {\n    Write-Output \"Database: $db\"\n    sqlcmd -S\
    \ $server -d $db -i $sqlfile\n}\n```\n\nIf SQL Server is not running on the local\
    \ machine, you need to replace . with the host name. Again, I'm assuming here\
