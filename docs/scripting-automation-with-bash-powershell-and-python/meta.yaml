    # Chapter 18

    Using REST APIs


    In the introduction to Chapter 17, I made it clear that web scraping is only a
    stopgap measure. The exchange of information between websites or with external
    services is much more reliable if an application programming interface (API) can
    be used for this purpose. REST APIs have become established in recent decades.
    Representational state transfer (REST) is based on data exchange via established
    HTTP requests such as GET, PUT, or POST. The data is predominantly transferred
    in JSON format or, fortunately much less frequently, as XML. Some APIs also require
    authentication, with various methods to choose from (Basic, Bearer, Digest, OAuth,
    and so on).


    In this chapter, I will demonstrate how you can use REST APIs, and I will show
    you some elementary programming techniques.


    > **Prerequisites for This Chapter**


    The sample scripts use all three programming languages covered in this book. In
    addition, an important prerequisite for reading this chapter is Chapter 10. JSON
    is ubiquitous as a REST data format.


    You’ll benefit from this chapter only if you have a basic knowledge regarding
    HTTP and REST. If you’re not familiar with typical request types such as GET,
    PUT, or POST, or have never heard of Bearer authentication, you should first do
    some research.


    # 18.1 Tools


    As I will show you momentarily, the `curl` or `wget` commands are sufficient to
    test REST APIs. But it’s not exactly fun. You should definitely install a graphical
    user interface (GUI) for running HTTP requests to analyze foreign APIs as well
    as for debugging. My recommendation is Postman (https://postman.com), but Swagger
    UI, the Insomnia REST client, or RapidAPI (formerly Paw, for macOS only) are also
    good alternatives. Various browser extensions also exist to try out REST APIs
    in a web browser.'
  - '[PAGE 405]


    # 18.2 Sample APIs to Try Out


    To practice using REST APIs, you''ll need a playground. On the following pages,
    you''ll find APIs that you can try out for free (although some only free to a
    limited extent):


    +   - https://httpbin.org

    - https://restcountries.com

    - https://www.postman.com/explore

    - https://apipheny.io/free-api

    - https://github.com/public-apis/public-apis


    To simulate a real API in a straightforward way, you can use *WireMock* (https://wiremock.org).
    Basically, WireMock is an open-source project. However, the use of the associated
    cloud service is only free of charge with major restrictions and is aimed more
    at large companies that want to test APIs away from productive operation.


    # 18.3 Implementing Custom REST APIs


    Using Bash or PowerShell, implementing your own REST APIs is nearly impossible.
    The situation is different for Python, where *Flask* and *Django* are two widely
    used frameworks for server programming. Possible alternatives include *FastAPI*,
    *Pyramid*, or *Bottle*. However, both designing and implementing APIs are well
    beyond the scope of this book, with its focus on typically short scripts.


    # 18.4 curl and wget


    Linux users especially are familiar with the `curl` and `wget` commands. These
    commands are primarily used to download files in the terminal. `curl` displays
    the contents of the downloaded file by default; however, the output can be saved
    to a file by using `-o` (an “oh”/not a “zero”). `wget` saves the file to the local
    directory by default. If the filename is not clear from the URL, the site''s default
    home page filename is used (often `index.html`). To display the file in standard
    output, you should use `-O` (“oh” again) followed by the desired filename or `-`
    for standard output.


    ```

    $ curl https://example.com/some/file.txt -o file.txt

    $ wget https://example.com/some/file.txt

    ```


    > **Installation**

    On Linux and macOS, `curl` is available by default. `wget` can be installed using
    the usual package management tools (i.e., `apt/dnf/brew install wget`).

    `curl` for Windows can be downloaded from https://curl.se/windows; `wget`, from
    https://eternallybored.org/misc/wget.'
