    +   - **format string % (data, data, data)**\n  In this case, the format string\
    \ is formulated in the syntax of the `printf` function of the C programming language.\
    \ Within this string, `%` characters indicate the positions where data is to be\
    \ inserted.\n\n- **formatstring.format(data, data, data)**\n  The structure of\
