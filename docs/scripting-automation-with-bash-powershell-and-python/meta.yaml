  md: 'plugins, all uploaded images, and so on. As a rule, the file created using
    `tar` is much larger than the MySQL backup.

    The last line of the script copies the backups, which are only stored locally
    for the time being, to a second computer. Thus, all backup files are redundantly
    located in two different places.


    ```

    # Sample file lamp-backup.sh

    BACKUPDIR=/localbackup

    DB=wp

    DBUSER=wpbackupuser

    WPDIR=/var/www/html/wordpress

    SSH=user@otherhost:wp-backup/

    # MySQL-Backup

    weekday=$(date +%u)

    dbfile=$BACKUPDIR/wp-db-$weekday.sql.gz

    mysqlopt=''--single-transaction''

    mysqldump -u $DBUSER $mysqlopt $DB | gzip -c > $dbfile


    # backup of the WordPress installation including plugins and uploads

    htmlfile=$BACKUPDIR/wp-html-$weekday.tar.gz

    tar czf $htmlfile -C $WPDIR .


    # backup of the /etc directory

    etcfile=$BACKUPDIR/etc-$weekday.tar.gz

    tar czf $etcfile -C /etc .


    # copy backup files to a second computer

    scp $dbfile $htmlfile $etcfile $SSH

    ```


    After you have executed the script manually, you still need to take care of the
    automated call. You can design the required line in `/etc/crontab` based on the
    following pattern:


    ```

    # in /etc/crontab

    # run script every night at 3:00 am with root privileges

    00 3 * * * root /path/to/lamp-backup.sh

    ```


    Once you have set up the backup system, you should observe it for a few days.
    Does the automatic cron call work? A common cause of errors is that cron jobs
    often have a different `PATH` setting than the `root` account in which you ran
    your tests. This possibility is especially true if you use commands in the script
    that were manually installed off the usual paths. For such commands, you may need
    to specify the full path.

    Be sure you also test if you can restore a WordPress installation from the backup
    files on another computer or in a virtual machine. What''s the use of the nicest
    scripts if you don''t realize until disaster strikes that the backup is incomplete
    for some reason?'
