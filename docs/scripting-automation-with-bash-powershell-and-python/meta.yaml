- img_proc: true
  md: '# 1.1.1 Scripting versus Programming


    Scripts, too, are “only” programs. However, they differ from large software projects
    in the way they are programmed, the tools/components used, and their objectives:


    +   - Typically, scripts perform manageable, relatively simple tasks. They often
    help automate administrative tasks or at least perform them more efficiently.

    - Scripts are used in text mode (in the terminal) or executed automatically in
    the background. No graphical user interface (GUI) exists.

    - Special script languages are used for programming, which make uncomplicated,
    efficient development possible. Script languages require neither elaborate development
    tools nor compilers. The syntax is minimalistic (sometimes, unfortunately, also
    outdated and it can take some getting used to). Central principles familiar from
    large projects, such as object orientation or strict type control of variables,
    play a subordinate role or cannot be implemented at all.

    - Popular script languages are characterized by huge offering of commands or extension
    modules. This diversity helps to perform basic operations (read and evaluate files,
    set up users, perform network operations, etc.). When it comes to scripting, you
    don’t have time to reinvent the wheel! You should rather make use of a huge toolbox
    of existing components and building blocks as best you can.

    - The code size of scripts is small, typically under 100 lines (not counting comments
    and strings).


    In large software projects, an extremely important goal is that code be developed
