    *anonymize-log.py*, which makes extensive use of regular expressions. If you have
    access to “real” logging files from your own web server, you should use those.


    # 8.4.1 Extracting IP Addresses


    You can use `cut` to extract the IP addresses from the logging file:


    ```

    $ cut -d '' '' -f 1 access.log | less


    65d3:f5b9:e9e5:4b1c:331b:29f3:97c1:c18f

    221.245.9.91

    37e3:498f:44d8:c471:3ba3:9902:17e7:2be8

    135.84.251.52

    ...

    ```


    `grep` enables you to determine how many access events to the web server have
    been made via IPv4 or IPv6:


    ```

    $ cut -d '' '' -f 1 access.log | grep '':'' | wc -l    # IPv6

    65405

    $ cut -d '' '' -f 1 access.log | grep -v '':'' | wc -l  # IPv4

    107202

    ```


    An ordered list of all IPv4 addresses is provided by `sort` and `uniq`:


    ```

    $ cut -d '' '' -f 1 access.log | grep -v '':'' | sort | uniq


    0.117.133.93

    0.125.223.169

    0.164.206.211

    ...

    ```


    While some IP addresses appear only once in the log, others appear quite frequently.
    `sort` sorts all IP addresses, `uniq -c` counts the addresses, `sort -n -r` sorts
    their frequency in decreasing order, and `head -n 5` finally extracts the top
    5 results:


    ```

    $ cut -d '' '' -f 1 access.log | sort | uniq -c | sort -n -r | \n  head -n 5


    6166 65d3:f5b9:e9e5:4b1c:331b:29f3:97c1:c18f

    6048 3547:0b26:4c84:4411:0f66:945e:7741:d887

    ```'
