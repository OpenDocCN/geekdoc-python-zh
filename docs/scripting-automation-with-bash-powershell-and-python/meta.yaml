- img_proc: true
  md: "```\nLASTRUN=$LOCALDIR/last-run\nNOW=$LOCALDIR/now\n# Create file last-run\
    \ if it does not exist yet;\n# use an old date (2000-01-01).\nif [ ! -f $LASTRUN\
    \ ]; then\n  touch -m -t 200001010000 $LASTRUN\nfi\n# create file now with current\
    \ date and time\ntouch $NOW\n\n# upload all files that have changed after last-run\n\
    find $LOCALDIR -maxdepth 1 \\( -name \"*.jpg\" -o -name \"*.jpeg\" \\n  -o -name\
    \ \"*.png\" \\) -newer $LASTRUN \\n  -exec scp {} $REMOTEUSER@$REMOTEHOST:$REMOTEDIR\
    \ \\;\n\n# update last-run\nmv $NOW $LASTRUN\n```\n\n# 12.5.3 PowerShell Script\n\
    \nIf your images are located on a Windows computer, it makes sense to implement\
    \ the script using PowerShell. The following code has a similar structure to the\
    \ Bash script, so I'll leave it at some comments. For New-Item, Out-Null prevents\
    \ the otherwise mandatory output of the filename.\n\n```\n# Sample file upload-images.ps1\n\
    $localdir = (Get-Location).Path\n$remotedir = \"/var/www/html/wordpress/myimages\"\
    \n$remotehost = \"hostname\"\n$remoteuser = \"username\"\n$lastrun = \"$localdir/last-run\"\
    \n$now = \"$localdir/now\"\n\n# Create file last-run if it does not exist yet;\n\
    # use an old date (2000-01-01).\nif (-not (Test-Path $lastrun)) {\n    (New-Item\
    \ $lastrun).LastWriteTime = Get-Date \"2000-01-01\"\n}\n# create file now with\
    \ current date and time\nNew-Item $now -Force | Out-Null\n\n# upload all files\
    \ that have changed after last-run\n$lastruntime = (Get-Item $lastrun).LastWriteTime\n\
    Get-ChildItem -Path $localdir/* `\n```"
