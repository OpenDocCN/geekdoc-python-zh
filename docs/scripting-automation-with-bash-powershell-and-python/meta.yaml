    # 8.5 CSV Files


    CSV is a text format where the columns are separated by commas. Other country-specific
    separators are also used, for instance, the semicolon in German-speaking countries.
    This separator helps to clearly differentiate between columns and the decimal
    part of numbers. Basically, any separator is allowed, including the colon or tab
    character (\t).


    The analysis of CSV files becomes much more complicated if the separator character
    can also occur *within* the columns. The column contents are then enclosed in
    quotes, usually with '' or ".


    The starting point for the following examples is the *2023_population.csv* file
    from *https://www.kaggle.com/datasets/rsrishav/world-population*. This file contains
    data on the population of various countries of the world and has the following
    structure:


    ```

    iso_code,country,2023_last_updated,2022_population,area_sq_km,

    land_area_sq_km,density_/sq_km,growth_rate,world_%,rank,un_member


    IND,India,"1,433,381,860","1,417,173,173",3.3M,3M,481,0.81%,17.85%,1,IND


    CHN,China,"1,425,542,952","1,425,887,337",9.7M,9.4M,151,-0.02%,17.81%,2,CHN


    ...

    ```


    The `cut` command for column extraction is overwhelmed with this data. If you
    want to use Bash, you can install the `csvkit`. This collection of commands helps
    with processing CSV files (see *https://csvkit.readthedocs.io*). In this section,
    however, I will instead briefly describe the CSV features of Python and PowerShell.'
  - "[PAGE 263]\n\n# 8.5.1 Processing CSV Files Using Python\n\nIn a Python script,\
    \ you can read CSV data line by line from a text file (in the simplest cases)\
    \ and then split the lines into its columns using `split`. The following script\
    \ analyzes the `access.log` file from Section 8.4 and determines the most frequent\
    \ IP addresses. Unlike the equivalent Bash commands, the Python script is more\
    \ efficient, especially with large log files, because there is no need to sort\
    \ all the IP addresses.\n\n```\n# Sample file analyze-access-log.py\ncounters\
    \ = {}  # dictionary with counters for all IP addresses\n\n# loop through all\
    \ lines of access.log\nwith open('access.log') as f:\n    for line in f:\n   \
    \     # the IP address is in the first column\n        ip = line.split()[0]\n\
    \        if ip in counters:\n            counters[ip] += 1\n        else:\n  \
    \          counters[ip] = 1\n\n# create ordered list of dictionary elements;\n\
    # each list element is itself a list: [ip, cnt]\nsortedIps = sorted(counters.items(),\n\
    \                   key = lambda x: x[1], reverse = True)\n\n# show top 5 IP addresses\n\
    for i in range(5):\n    print('%6d: %s' % (sortedIps[i][1], sortedIps[i][0]))\n\
    ```\n\nHowever, the `split` method used in this case to extract the columns fails\
    \ with complex CSV files like `2023_population.csv`. To read such complex files,\
    \ the best approach is to use the `csv` module. The following listing shows a\
    \ simple application of this module:\n\n```\n# Sample file analyze-population.py\n\
    import csv\ntotal = 0\nwith open('2022_population.csv', newline = '') as f:\n\
    \    reader = csv.reader(f, delimiter = ',', quotechar = '\"')\n    next(reader)\
    \            # skip column labels\n    for columns in reader:  # read line by\
    \ line, columns contains\n        print(columns)      # list with columns\n  \
    \      total += int(columns[2].replace(',', ''))\n\nprint(\"Earth population:\"\
    , total)\n```"
- md: "The documentation for the `csv` module recommends opening the CSV file with\
    \ the `newline=''` option to avoid possible problems with the end of line (EOL)\
    \ characters on Windows (i.e., `\\r\\n`). When opening the CSV reader, you can\
    \ use the `delimiter` and `quotechar` options to specify which characters identify\
    \ columns and strings, respectively. Then, you can use the reader to read the\
    \ CSV file line by line in a loop. In each case, the loop variable contains a\
    \ list with the columns of this line. The first line with the column label is\
    \ skipped due to `next`.\n\nTo calculate the total population of the earth, the\
    \ population values in the third column are converted to numbers and then totaled.\
    \ `replace` eliminates the commas used to separate thousands.\n\n## 8.5.2 Processing\
    \ CSV Files in PowerShell\n\nIn PowerShell, you can use `Import-Csv` to read CSV\
    \ files. By default, `Import-Csv` expects that columns are separated by commas.\
    \ You can use `-Delimiter` to set another character if required. Strings that\
    \ are enclosed in double quotes are processed correctly. However, you cannot set\
    \ another character to identify strings.\n\nAs a result, the cmdlet returns `PSCustomObject`\
    \ objects whose properties are taken from the column labels of the CSV file. If\
    \ the CSV file does not have a column label row, you must specify the names of\
    \ the columns using the `-Header` option, for example, in the following way:\n\
    \n```\n> Import-Csv -Header colA, colB, colC file.csv\n```\n\nMake sure that you\
    \ don't name too few columns with `-Header`: Only as many columns will be processed\
    \ as you specify names!\n\nTo determine the earth population from `2023_population.csv`\
    \ as in the previous example, you can proceed with the following code:\n\n```\n\
    # Sample file analyze-population.ps1\n$population = Import-CSV \"2023_population.csv\"\
    \n$total = 0\n$population | ForEach-Object {\n    $total += [long]($_.'2023_last_updated'.Replace(',',\
    \ ''))\n}\nWrite-Output \"World population: $total\"\n```\n\nWithin the loop,\
    \ the commas are removed in the string of the `2023_last_updated` property. `[long]`\
    \ converts the string into a number.\n\nInstead of performing the totaling yourself,\
    \ you can also calculate the result via `Measure-Object`. However, because of\
    \ the required conversion of the `2023_last_updated` column to a number, the resulting\
    \ code is not shorter or more efficient:\n\n```\n$total = $population | ForEach-Object\
    \ {\n    [long]($_.'2022_last_updated'.Replace(',', ''))\n} | Measure-Object -Sum\n\
    Write-Output \"World population: $($total.Sum)\"\n```\n\nWith `Export-Csv`, PowerShell\
    \ provides a great way to save cmdlet results to a CSV file. The resulting CSV\
    \ file enumerates all properties of the result objects in the first row for column\
    \ labeling. The values of the relevant properties follow in the other lines, with\
    \ all output separated by commas and enclosed in quotation marks:\n\n```\n> Get-Process\
    \ | Export-Csv processes.csv\n\n> Get-Content processes.csv\n\n\"Name\",\"SI\"\
    ,\"Handles\",\"VM\",\"WS\",\"PM\",\"NPM\",\"Path\",...\n\"AggregatorHost\",\"\
    0\",\"92\",\"2203375112192\",\"2568192\",...\n\"ApplicationFrameHost\",\"1\",\"\
    378\",\"2203582570496\",...\n...\n```\n\n> **Performance Issues**\nIn my tests,\
    \ the execution of `Get-Process | Export-Csv` took an incomprehensibly long time—about\
    \ 10 seconds on an idle Windows 11 desktop installation. `Get-Process` alone is\
    \ executed in a few milliseconds, so `Get-Process` can't really be the problem.\
    \ The resulting file is tiny (only 130 KB). Even in PowerShell running on Linux,\
    \ the command took several seconds to execute.\n\n# Chapter 9\n\n# Regular Expressions\n\
    \nA *regular expression* (regex) is a character string that describes a search\
    \ pattern for searching through text. In this context, specific rules must be\
    \ followed that are not very intuitive. Let's start right away with an example.\
    \ The following pattern recognizes a date in US format (i.e., mm/dd/yyyy):\n\n\
    ```\n(0[1-9]|1[0-2])\\/(0[1-9]|1\\d|2\\d|3[01])\\/(19|20)\\d{2}\n```\n\nThe pattern\
    \ accepts months between 01 and 12, days between 01 and 31, and years between\
    \ 1900 and 2099. However, you still cannot verify whether a date is really correct,\
    \ for example, because the pattern also accepts the date 02/30/2023, although\
    \ February can never have 30 days.\n\nRegular expressions have a relatively high\
    \ barrier to entry as you must first learn and practice the syntax, which will\
    \ cost at least a few hours of your time. But once you're familiar with regular\
    \ expressions, there's an almost infinite number of possible ways to apply them—and\
    \ in all common programming languages. Some tasks can also be solved without regular\
    \ expressions. But if you're familiar with the syntax, regular expressions will\
    \ lead you more reliably and more quickly to your goal while avoiding spaghetti\
    \ code!\n\nThis chapter starts with the syntax rules, where I consider the most\
    \ important syntax variants—Portable Operating System Interface for Unix (POSIX)\
    \ Regular Expressions, POSIX Extended Regular Expressions (ERE), and Perl Compatible\
    \ Regular Expressions (PCRE). You didn't expect the same rules to apply to every\
    \ tool or programming language, did you? Don't worry, the basic rules are always\
    \ the same, and the variations between the regex variants are manageable. In the\
    \ following sections, I will show you how to use regular expressions in Bash scripts\
    \ (especially in the `grep` and `sed` commands), in Python, and in PowerShell\
    \ through various examples.\n\n> **Prerequisites for This Chapter**\n\nLarge parts\
    \ of this chapter apply regardless of your favorite scripting language. Only in\
    \ the language-specific sections will you need basic knowledge of Bash, PowerShell,\
    \ or Python. A logical follow-up after reading this chapter is thus [Chapter 17](#)\
    \ where you'll again find some application examples as well as some hints on the\
    \ limitations of regular expressions.\n\n## 9.1 Syntax Rules for Regular Expressions\n\
    \nThe first concepts for regular expressions were formulated as early as the 1950s.\
    \ Over time, several dialects or syntax variants developed:\n\n- **POSIX**\n \
    \ Regular expressions were first standardized in the Unix environment as *POSIX\
    \ Regular Expressions*.\n- **ERE**\n  In this extension, references to already\
    \ processed patterns (called *back references*) as well as codes for character\
    \ classes (e.g., digits and letters) were defined, among other things.\n- **PCRE**\n\
    \  The script language Perl has already passed its zenith, but the syntax for\
    \ regular expressions valid in Perl has established itself as a benchmark. Most\
    \ popular programming languages (like Python and .NET languages including PowerShell,\
    \ JavaScript, etc.) are PCRE-compatible except for a few details.\n  Taken to\
    \ the extreme, *two* PCRE variants exist: simply “PCRE” (since 1997) and “PCRE\
    \ 2” (since 2015).\n\nIn this chapter, I will present regular expressions in an\
    \ abbreviated way, so I won’t discuss some advanced features. Unless I explicitly\
    \ refer to other dialects, I will always refer to PCRE or the great common denominator\
    \ of all regex variants.\n\nDon’t be put off by the various regex dialects: The\
    \ comparatively few differences among them mainly concern advanced features. In\
    \ many cases, you can adapt a pattern formulated for a particular regex dialect\
    \ to another dialect.\n\n> **Comparison Table**\n\nFor most use cases, the basic\
    \ knowledge provided in this section should be sufficient. However, when you want\
    \ to use additional special functions, language-specific functions, or framework-specific\
    \ functions, you probably won’t be able to avoid looking into the respective documentation.\
    \ If you’re interested in the specific differences, you should search the internet\
    \ for the “Regular Expression Engine Comparison Chart.” The address of this excellent\
    \ comparison site is just as daunting as its content, which is, however, excellently\
    \ researched: https://gist.github.com/CMCDragonkai/6c933f4a7d713ef712145c5eb94a1816.\n\
    \nThe differences between PCRE and PCRE 2 are very well summarized on Stack Overflow\
    \ at https://stackoverflow.com/questions/70273084.\n\n### 9.1.1 Characters\n\n\
    In regular expressions, various ways exist to express a single character or a\
    \ character within an entire group. Basically, regular expressions differentiate\
    \ between uppercase"
  mdcn: "`csv`模块的文档建议使用`newline=''`选项打开CSV文件，以避免在Windows上可能出现的行尾字符（EOL）问题（即`\\r\\\
    n`）。打开CSV读取器时，可以使用`delimiter`和`quotechar`选项分别指定哪些字符用于标识列和字符串。然后，你可以使用读取器在循环中逐行读取CSV文件。在每种情况下，循环变量都包含一个列表，其中包含该行的列。由于使用了`next`，带有列标签的第一行会被跳过。\n\
    \n为了计算地球总人口，第三列中的人口值被转换为数字，然后求和。`replace`方法消除了用于分隔千位的逗号。\n\n## 8.5.2 在PowerShell中处理CSV文件\n\
    \n在PowerShell中，你可以使用`Import-Csv`来读取CSV文件。默认情况下，`Import-Csv`期望列由逗号分隔。如果需要，你可以使用`-Delimiter`来设置其他字符。用双引号括起来的字符串会被正确处理。但是，你不能设置其他字符来标识字符串。\n\
    \n因此，该cmdlet返回`PSCustomObject`对象，其属性取自CSV文件的列标签。如果CSV文件没有列标签行，你必须使用`-Header`选项指定列的名称，例如，按以下方式：\n\
    \n```\n> Import-Csv -Header colA, colB, colC file.csv\n```\n\n确保使用`-Header`时不要指定太少的列名：只有你指定的列数才会被处理！\n\
    \n要像前面的示例一样从`2023_population.csv`确定地球人口，你可以使用以下代码：\n\n```\n# 示例文件 analyze-population.ps1\n\
