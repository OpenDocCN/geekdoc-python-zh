- md: "Now, we still need to set up the Path variable. This variable contains a list\
    \ of all directories where PowerShell searches for executable programs and scripts.\
    \ If you add the myscripts directory to this list, you can run scripts stored\
    \ there without specifying the path. No matter which directory is currently active,\
    \ it is now sufficient to enter Hello to start the Hello World script. Thanks\
    \ to the Path variable, you don't need to specify the location or the .ps1 identifier.\n\
    \nTo configure this variable, search for **Edit System Environment Variables**\
    \ in the **Start** menu and then click the **Environment Variables** button in\
    \ the **System Properties** dialog. In the dialog box of the same name, select\
    \ Path from your user variables and add your script directory via **Edit • New\
    \ • Browse**.\n\nNote that changes to the Path variable take effect only after\
    \ restarting the terminal or PowerShell.\n\n## 4.5.4 Running Scripts on Linux\
    \ and macOS\n\nI generally assume in this chapter that you're using Windows. But\
    \ of course, you can also run PowerShell scripts on Linux or macOS. Although no\
    \ execution policy exists in Linux or macOS (Section 4.5.2), other rules must\
    \ be observed, such as the following:\n\n- First, the script file must start with\
    \ the what's called the *shebang line* (see also Chapter 3, Section 3.5):\n\n\
    \    ```\n    #!/usr/bin/env pwsh\n    ```\n\n    This line specifies that the\
    \ env command must search for the pwsh shell and execute the following code with\
    \ it. For platform-independent scripts, you can also use this line on Windows,\
    \ in which case this line is simply considered a comment with no effect.\n\n-\
    \ On the other hand, you must mark the script file, via chmod as *executable*\
    \ (hence, x):\n\n    ```\n    $ chmod +x Hello.ps1       (Linux)\n    $ chmod\
    \ a+x Hello.ps1      (macOS)\n    ```\n\nOnce you have met these two requirements,\
    \ you can run the script on Linux and macOS:\n\n```\n$ ./Hello.ps1\nHello, World!\n\
    ```\n\n## 4.5.5 Example: Cleaning Up the Downloads Directory\n\nAfter our minimalistic\
    \ Hello World script, I want to return to an idea from Section 4.4, in the second\
    \ example: The Tidy-Downloads.ps1 script is supposed to search the *n* largest\
    \ files from the downloads directory and delete them after a query. In this way,\
    \ you can quickly create space in a minimal amount of time. (After all, usually\
    \ just a few huge files take up most of the space.)\n\nCompared to Section 4.4,\
    \ note two major new features:\n\n- The script uses the `DownPath` variable, which\
    \ contains the location of the downloads directory. The easiest way to determine\
    \ this location would be `$DownPath = \"$HOME\\Downloads\"`. However, this procedure\
    \ does not work in every case (see https://stackoverflow.com/questions/57947150).\
    \ For example, some users might have set different locations for their download\
    \ directories. The approach taken in this case is a bit more cumbersome and uses\
    \ the Known Folders API. However, this method also has a disadvantage: It works\
    \ only on Windows, not on Linux or macOS.\n- The number of files to be deleted\
    \ can be passed to the script via an optional parameter. If the parameter is missing,\
    \ the script searches for the ten largest files.\n\nMore details about the handling\
    \ of variables and parameters will follow later in this chapter. But the basic\
    \ concepts should be clear: In PowerShell, variables are prefixed with a dollar\
    \ sign ($) character. All parameters of a script or function are declared using\
    \ `param()`, where you can specify a data type, a default value, and a lot of\
    \ other additional information. (Unless you use functions, `param` must be the\
    \ first statement in the script!)\n\n```\n# Sample file Tidy-Downloads.ps1\n\n\
    # $NoOfFiles specifies how many files to delete\n# (by default: 10)\nparam([int]\
    \ $NoOfFiles = 10)\n\n# $DownPath contains the location of the Downloads directory\n\
    $DownPath = (New-Object -ComObject Shell.Application).\n            NameSpace('shell:Downloads').Self.Path\n\
    # delete the largest files in the downloads directory with\n# query\nGet-ChildItem\
    \ -Path $DownPath |\n    Sort-Object -Property Length -Descending |\n    Select-Object\
    \ -First $NoOfFiles |\n    Remove-Item -Confirm\n```\n\n> **Comments**\nAs with\
    \ most scripting languages, comments in PowerShell scripts are introduced with\
    \ the # character and then extend to the end of the line. Multiline comments are\
    \ introduced with <# and end with #>. Such comments are especially intended to\
    \ formulate help texts for Get-Help. The syntax for comments is documented at\
    \ https://docs.microsoft.com/en-us/powershell/module/microsoft.powershell.core/about/about_comment_based_help.\n\
    \n## 4.5.6 Differentiating Between PowerShell Versions\n\nOn many computers, PowerShell\
    \ versions 5.n and 7.n are installed in parallel. Nevertheless, all scripts share\
    \ the *.ps1 file extension. If your code explicitly requires a specific PowerShell\
    \ version or has other requirements, you must include one or more #Requires statements\
    \ in the script:\n\n- **#Requires -Version <n>**\n  The script can be executed\
    \ only with the specified or a newer version.\n- **#Requires -PSEdition Core**\n\
    \  The script can be executed only with the core variant (applies to all PowerShell\
    \ versions from 6.0).\n- **#Requires -PSEdition Desktop**\n  The script can be\
    \ executed only with the desktop variant (all Windows PowerShell versions up to\
    \ and including 5.1).\n- **#Requires -Modules <name>**\n  The script requires\
    \ the specified module.\n- **#Requires -RunAsAdministrator**\n  The script can\
    \ only be executed with admin rights.\n\n#Requires statements can be placed anywhere\
    \ in the script.\n\n## 4.6 Variables, Strings, and Objects\n\nYou made your first\
    \ acquaintance with PowerShell variables in the previous section. Basically, handling\
    \ variables is quite simple: With $Name = . . . you can assign content to a variable.\
    \ Later, you can use this content again. To output the contents of a variable,\
    \ you can use Write-Output; an even easier approach is to name the variable or\
    \ a string as a standalone statement. Note that variables in strings that are\
    \ between double quotation marks are replaced by their contents. More details\
    \ about handling strings will follow later.\n\n```\n> $UserName = \"Michael\"\n\
    \n> Write-Output $UserName\nMichael\n\n> $UserName\nMichael\n\n> $UserId = 123\n\
    \n> Write-Output \"$UserName has the ID $UserId.\"\nMichael has the ID 123.\n\n\
    > \"$UserName has the ID $UserId.\"\nMichael has the ID 123.\n```\n\nIf you accidentally\
    \ use an uninitialized variable, PowerShell usually doesn't encounter any trouble:\
    \ The variable is empty, but the analysis does not cause an error:\n\n```\n> \"\
    $UserName has the ID $Uid.\"\nMichael has the ID .\n```\n\nHowever, uninitialized\
    \ variables can cause logic errors. Therefore, including `Set-StrictMode -Version\
    \ 1.0` at the start of a script makes sense. Using an uninitialized variable then\
    \ leads to an error message. (However, the script continues to run anyway. More\
    \ information about `Set-StrictMode` and how to handle errors in scripts will\
    \ follow in [Section 4.13](#section-4-13).)\n\n> **Variable Names**\nPowerShell\
    \ allows almost any characters when naming variables, functions, etc. If you want\
    \ to use spaces or special characters, the `${name}` notation is appropriate,\
    \ for example `${this is a variable name too!}`. The curly brackets in this context\
    \ clearly indicate where a variable's name begins and ends.\n\nDespite this freedom\
    \ in syntax, a useful practice is to compose variable names only from letters,\
    \ digits, and a few special characters (_).\n\nTypical for Windows, PowerShell\
    \ does not differentiate between uppercase and lowercase. So, you could just as\
    \ well parse `$userid` or `$USERID` in our earlier example as these names are\
    \ equivalent for PowerShell.\n\nYou can also store the result of other commands\
    \ in variables, as in the following example:\n\n```\n> $Images = Get-ChildItem\
    \ *.jpg\n```\n\n`Read-Host` can be used to perform user input, as in the following\
    \ example:\n\n```\n> $Name = Read-Host \"Enter your name!\"\nEnter your name!:\
    \ Michael\n\n> \"Hello, $Name!\"\nHello, Michael!\n```\n\n### 4.6.1 Data Types\n\
    \nThe attempt to perform calculations with a number entered via `Read-Host` fails\
    \ because PowerShell differentiates between different data types:"
  mdcn: "现在，我们还需要设置 Path 变量。该变量包含 PowerShell 搜索可执行程序和脚本的所有目录列表。如果你将 myscripts 目录添加到此列表中，就可以运行存储在那里的脚本，而无需指定路径。无论当前活动目录是哪个，现在只需输入\
    \ Hello 即可启动 Hello World 脚本。得益于 Path 变量，你无需指定位置或 .ps1 标识符。\n\n要配置此变量，请在**开始**菜单中搜索**编辑系统环境变量**，然后在**系统属性**对话框中单击**环境变量**按钮。在同名对话框中，从用户变量中选择\
    \ Path，并通过**编辑 • 新建 • 浏览**添加你的脚本目录。\n\n请注意，对 Path 变量的更改仅在重启终端或 PowerShell 后才会生效。\n\
    \n## 4.5.4 在 Linux 和 macOS 上运行脚本\n\n本章我通常假设你使用的是 Windows。但当然，你也可以在 Linux 或 macOS\
    \ 上运行 PowerShell 脚本。尽管 Linux 或 macOS 中不存在执行策略（第 4.5.2 节），但必须遵守其他规则，例如：\n\n- 首先，脚本文件必须以所谓的\
    \ *shebang 行*开头（另见第 3 章，第 3.5 节）：\n\n    ```\n    #!/usr/bin/env pwsh\n    ```\n\
    \n    此行指定必须使用 env 命令搜索 pwsh shell，并用它执行后续代码。对于跨平台脚本，你也可以在 Windows 上使用此行，在这种情况下，此行仅被视为注释，没有实际效果。\n\
    \n- 另一方面，你必须通过 chmod 将脚本文件标记为*可执行*（因此，x）：\n\n    ```\n    $ chmod +x Hello.ps1\
    \       (Linux)\n    $ chmod a+x Hello.ps1      (macOS)\n    ```\n\n一旦满足这两个要求，你就可以在\
    \ Linux 和 macOS 上运行脚本：\n\n```\n$ ./Hello.ps1\nHello, World!\n```\n\n## 4.5.5 示例：清理下载目录\n\
    \n在我们极简的 Hello World 脚本之后，我想回到第 4.4 节第二个示例中的一个想法：Tidy-Downloads.ps1 脚本旨在从下载目录中搜索\
    \ *n* 个最大的文件，并在查询后删除它们。通过这种方式，你可以在最短时间内快速腾出空间。（毕竟，通常只有几个巨大的文件占据了大部分空间。）\n\n与第\
    \ 4.4 节相比，请注意两个主要的新特性：\n\n- 脚本使用了 `DownPath` 变量，该变量包含下载目录的位置。确定此位置最简单的方法是 `$DownPath\
    \ = \"$HOME\\Downloads\"`。然而，此方法并非在所有情况下都有效（参见 https://stackoverflow.com/questions/57947150）。例如，某些用户可能为其下载目录设置了不同的位置。本例中采用的方法稍显繁琐，使用了\
    \ Known Folders API。不过，此方法也有一个缺点：它仅适用于 Windows，不适用于 Linux 或 macOS。\n- 要删除的文件数量可以通过一个可选参数传递给脚本。如果缺少该参数，脚本将搜索十个最大的文件。\n\
    \n关于变量和参数处理的更多细节将在本章后面介绍。但基本概念应该很清楚：在 PowerShell 中，变量以美元符号 ($) 字符为前缀。脚本或函数的所有参数都使用\
    \ `param()` 声明，你可以在其中指定数据类型、默认值以及许多其他附加信息。（除非使用函数，否则 `param` 必须是脚本中的第一条语句！）\n\n\
    ```\n# 示例文件 Tidy-Downloads.ps1\n\n# $NoOfFiles 指定要删除的文件数量\n# （默认值：10）\nparam([int]\
    \ $NoOfFiles = 10)\n\n# $DownPath 包含下载目录的位置\n$DownPath = (New-Object -ComObject\
    \ Shell.Application).\n            NameSpace('shell:Downloads').Self.Path\n# 在下载目录中删除最大的文件，并\n\
    # 进行确认\nGet-ChildItem -Path $DownPath |\n    Sort-Object -Property Length -Descending\
    \ |\n    Select-Object -First $NoOfFiles |\n    Remove-Item -Confirm\n```\n\n\
    > **注释**\n与大多数脚本语言一样，PowerShell 脚本中的注释以 # 字符开头，然后延伸到行尾。多行注释以 <# 开头，以 #> 结尾。此类注释特别用于为\
    \ Get-Help 编写帮助文本。注释的语法记录在 https://docs.microsoft.com/en-us/powershell/module/microsoft.powershell.core/about/about_comment_based_help。\n\
    \n## 4.5.6 区分 PowerShell 版本\n\n在许多计算机上，PowerShell 版本 5.n 和 7.n 是并行安装的。尽管如此，所有脚本都共享\
    \ *.ps1 文件扩展名。如果你的代码明确需要特定的 PowerShell 版本或有其他要求，你必须在脚本中包含一个或多个 #Requires 语句：\n\
    \n- **#Requires -Version <n>**\n  脚本只能使用指定版本或更新版本执行。\n- **#Requires -PSEdition\
    \ Core**\n  脚本只能使用核心变体执行（适用于所有 6.0 及更高版本的 PowerShell）。\n- **#Requires -PSEdition\
    \ Desktop**\n  脚本只能使用桌面变体执行（所有 Windows PowerShell 版本，最高包括 5.1）。\n- **#Requires\
    \ -Modules <name>**\n  脚本需要指定的模块。\n- **#Requires -RunAsAdministrator**\n  脚本只能以管理员权限执行。\n\
    \n#Requires 语句可以放置在脚本中的任何位置。\n\n## 4.6 变量、字符串和对象\n\n你在上一节中首次接触了 PowerShell 变量。基本上，处理变量非常简单：使用\
    \ $Name = . . . 你可以将内容赋值给变量。之后，你可以再次使用此内容。要输出变量的内容，可以使用 Write-Output；更简单的方法是将变量或字符串作为独立语句命名。请注意，双引号之间的字符串中的变量会被其内容替换。关于处理字符串的更多细节将在后面介绍。\n\
    \n```\n> $UserName = \"Michael\"\n\n> Write-Output $UserName\nMichael\n\n> $UserName\n\
    Michael\n\n> $UserId = 123\n\n> Write-Output \"$UserName has the ID $UserId.\"\
    \nMichael has the ID 123.\n\n> \"$UserName has the ID $UserId.\"\nMichael has\
    \ the ID 123.\n```\n\n如果你意外使用了未初始化的变量，PowerShell 通常不会遇到任何问题：变量为空，但分析不会导致错误：\n\n\
    ```\n> \"$UserName has the ID $Uid.\"\nMichael has the ID .\n```\n\n然而，未初始化的变量可能导致逻辑错误。因此，在脚本开头包含\
    \ `Set-StrictMode -Version 1.0` 是有意义的。使用未初始化的变量会导致错误消息。（但是，脚本无论如何都会继续运行。有关 `Set-StrictMode`\
    \ 和如何在脚本中处理错误的更多信息将在[第 4.13 节](#section-4-13)中介绍。）\n\n> **变量名**\nPowerShell 在命名变量、函数等时允许使用几乎任何字符。如果你想使用空格或特殊字符，`${name}`\
    \ 表示法是合适的，例如 `${this is a variable name too!}`。在此上下文中，花括号清楚地表明了变量名的开始和结束。\n\n\
    尽管语法如此自由，但一个有用的做法是仅由字母、数字和少数特殊字符 (_) 组成变量名。\n\nPowerShell 的典型 Windows 特性是不区分大小写。因此，在我们之前的示例中，你同样可以解析\
    \ `$userid` 或 `$USERID`，因为这些名称对于 PowerShell 是等效的。\n\n你也可以将其他命令的结果存储在变量中，如以下示例所示：\n\
    \n```\n> $Images = Get-ChildItem *.jpg\n```\n\n可以使用 `Read-Host` 执行用户输入，如以下示例所示：\n\
    \n```\n> $Name = Read-Host \"Enter your name!\"\nEnter your name!: Michael\n\n\
    > \"Hello, $Name!\"\nHello, Michael!\n```\n\n### 4.6.1 数据类型\n\n尝试对通过 `Read-Host`\
    \ 输入的数字执行计算会失败，因为 PowerShell 区分不同的数据类型："
