    \ 5.7 节提到的列表/元组/集合推导式通常更优雅、更高效。在这种情况下，`for` 循环在方括号、圆括号或花括号内执行，并返回一个列表、元组或集合作为结果。以下示例均指列表。\n\
    \n其最简单的形式是 `[ expression for var in list ]`。所有列表元素都被插入到变量中。计算后的表达式生成一个新的列表。可选地，可以使用\
    \ `if` 为循环变量附加一个条件：然后，只有满足条件的列表元素才会被考虑。\n\n```python\n>>> l = [1, 2, 3, 10]\n\
