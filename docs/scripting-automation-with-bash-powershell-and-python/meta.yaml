  md: "# 6.6 Other Commands\n\n+   - **ln file link**\n  `ln file link` creates a\
    \ link to an existing file. The `-s` option creates a symbolic link instead of\
    \ a *hard link*.\n  If you're unsure about the order in which you need to specify\
    \ the parameters: All important Linux commands expect the source first, then the\
    \ target. This rule applies to `cp`, `mv`, `ln`, and so on.\n- **man command**\n\
    \  `man command` displays the help text for a command. As with `less`, you can\
    \ use the cursor keys to scroll through the often several pages of text. `/` allows\
    \ you to specify a search term. `q` terminates the help.\n- **ping hostname/ipaddress**\n\
    \  `ping hostname/ipaddress` sends Internet Control Message Protocol (ICMP) packets\
    \ to another host and shows how long the response takes. This command typically\
    \ runs endlessly until it is terminated via `Ctrl` + `C`. `ping -c <n>` sends\
    \ only *n* packets and then terminates by itself.\n- **wc file**\n  `wc file`\
    \ counts the number of lines, words, and characters in a text file. By using the\
    \ `-c` (*count bytes*), `-w` (*words*), or `-l` (*lines*) options, you can reduce\
    \ the output to one number.\n- **which command**\n  `which command` determines\
    \ the location where the command is stored. For example, `which cp` returns the\
    \ following result: `/usr/bin/cp`."
